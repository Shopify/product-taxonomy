# Disclosures.
#
# The disclosure axis models legally-required product disclosures (safety
# warnings, chemical exposure notices, etc.) that a merchant may need to show
# for a product in a given jurisdiction.
#
# Row-shaped: each entry maps 1:1 to a disclosure node. Numeric `id`s are
# explicit and stable — never renumber an existing `id` or `public_id`, as
# downstream systems reference them by global ID.
#
# Hierarchy is expressed via `parent_id` (numeric). A node with no `parent_id`
# is a grouping/root node; a node that no other node points at is a leaf.
#
# Authoring rules (enforced by ProductTaxonomy::Disclosure validations):
#   - Only leaf nodes define `jurisdictions` and `display_preferences`.
#   - Grouping/root nodes must NOT define `jurisdictions` or `display_preferences`.
#   - `display_preferences.surfaces` values must be a unique subset of
#     product_page, cart, checkout.

