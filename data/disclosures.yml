# Disclosures.
#
# The disclosure axis models legally-required product disclosures (safety
# warnings, chemical exposure notices, etc.) that a merchant may need to show
# for a product in a given jurisdiction.
#
# Row-shaped: each entry maps 1:1 to a disclosure node, keyed by a stable
# `public_id` slug — never rename an existing `public_id`, as downstream systems
# reference it by global ID.
#
# Hierarchy is expressed via `parent_public_id`. A node with no `parent_public_id`
# is a grouping/root node; a node that no other node points at is a leaf.
#
# Authoring rules (enforced by ProductTaxonomy::Disclosure validations):
#   - Only leaf nodes define `jurisdictions`.
#   - Grouping/root nodes must NOT define `jurisdictions` or `display_preferences`.
#   - Display leaves define `display_preferences`; `surfaces` values must be a
#     unique subset of product_page, cart, checkout.
#   - A leaf that instead carries a `metaobject_definition` is a *reference*
#     disclosure: it wires up a metaobject rather than being displayed, so it
#     omits `display_preferences`/`title`/`content` but still carries
#     `jurisdictions`, `legal_citation`, and `source`.

