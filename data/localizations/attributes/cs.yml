    lampshade_shape:
      name: Tvar stínítka lampy
      description: Popisuje geometrický tvar stínítka lampy.
    laundry_ball_texture:
      name: Struktura prací koule
      description: Popisuje strukturu povrchu koule, která ovlivňuje míchání prádla
