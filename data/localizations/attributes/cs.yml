      description: Označuje certifikaci nebo schválení oficiálním řídicím orgánem
        pálkované nebo jiného sportu.
    row_counter_format:
      name: Formát počítadla řádků
      description: Určuje formát/styl počítadla řádků pletení (např. kroužkové, řetízkové,
