    airbrush_operation_method:
      name: Způsob fungování spreje
      description: Určuje způsob provozu stříkacích pistolí, například dvojčinné nebo
        jednočinné
    aircraft_engine_configuration:
      name: Konfigurace leteckého motoru
      description: Určuje počet motorů pohánějících letadlo, jako je jeden nebo dva
