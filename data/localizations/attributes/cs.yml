    perch_design:
      name: Provedení bidýlka
      description: Popisuje konstrukční styl nebo tvar bidýlka.
    perch_surface_texture:
      name: Povrchová textura bidýlka
      description: Určuje povrchovou úpravu / texturu bidýlka, která ovlivňuje přilnavost
