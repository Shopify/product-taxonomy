    pattern_match_type:
      name: Typ napojení vzoru
      description: Určuje, jak mají být při instalaci zarovnány jednotlivé pásy podle
        vzoru.
    pendulum_compatibility:
      name: Kompatibilita s kyvadlem
      description: Označuje, zda strojek může pohánět kyvadlo a zda je kyvadlo součástí
