      description: Popisuje, jak se uživatel dostane na vyvýšenou spací plošinu.
    accessibility_features:
      name: Funkce pro usnadnění přístupu
      description: Určuje vybavení a konfigurace minibusu související s přístupností.
    accessories_included:
