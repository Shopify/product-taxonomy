    allergens:
      name: Alergeny
      description: Označuje potenciální alergeny ve zdravotnických výrobcích, např.
        lněný olej nebo limonen
    allergy_friendly_features:
      name: Vlastnosti vhodné pro alergiky
      description: Identifikuje, zda je produkt vhodný pro alergiky, jako např. bez
        latexu nebo odolný vůči plísním
    amino_acid_subtype:
      name: Podtyp aminokyseliny
      description: Určuje primární typ nebo profil aminokyselin obsažených v doplňku
    amplifier/booster_suitable_location:
      name: Vhodné umístění zesilovače
      description: Určuje nejlepší umístění pro zesilovač zvuku nebo signálu, jako
