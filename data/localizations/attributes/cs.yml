      description: Poukazuje na všechny speciální funkční prvky poklice, které usnadňují
        vaření nebo čištění.
    lid_vent_type:
      name: Typ otvoru pro únik páry v poklici
      description: Uvádí, zda a jak víko umožňuje únik páry.
    lift_mechanism:
      name: Ovládací mechanismus
      description: Označuje ovládací mechanismus používaný ke zvedání, spouštění nebo
