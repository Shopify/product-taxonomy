    number_of_compartments:
      name: Počet přihrádek
      description: Uvádí, kolik samostatných oddílů má nádoba na odpad pro třídění
        odpadu nebo recyklovatelných materiálů.
    numeral_style:
      name: Styl číslic
      description: Udává vizuální styl nebo vzhled číslic na ciferníku hodin.
    oil_dispenser_spout_design:
      name: Design hrdla dávkovače oleje
      description: Popisuje styl výpustného hrdla nebo trysky, který ovlivňuje průtok
