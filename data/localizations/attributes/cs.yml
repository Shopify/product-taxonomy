    piping_tip_shape:
      name: Tvar trezírovací špičky
      description: Udává tvar nebo provedení trezírovací/zdobicí špičky.
    pitcher_spout_style:
      name: Styl hubičky džbánku
      description: Určuje design hubičky, který ovlivňuje přesnost při vytváření latte
