        povrchovou úpravu, nebo zda je nutné jej nalakovat.
    scale_model_pose:
      name: Póza zmenšeného modelu
      description: Určuje zobrazenou pózu modelu koně pro porovnání zobrazení/diorámatu.
    scale_model_rotor_configuration:
      name: Konfigurace rotoru modelu v měřítku
      description: Určuje konfiguraci rotoru vrtulníku znázorněnou modelem.
    scale_model_truck_era:
      name: Éra modelu nákladního vozu v měřítku
      description: Označuje éru/období skutečného nákladního vozu, které model představuje
        (užitečné pro sběratele, kteří hledají porovnání historických a moderních
        nákladních vozů).
    scale_model_truck_propulsion_type:
      name: Typ pohonu modelu nákladního vozu v měřítku
      description: Určuje, zda je zobrazený nákladní vůz poháněn naftou, benzínem,
        elektricky, hybridně nebo jiným typem pohonu (jak je znázorněno/uváděno na
        trh modelem).
    scale_units:
      name: Jednotky měřítka
      description: Měrné jednotky vytištěné/vyryté na nosníku pro nastavení poloměru/průměru
    scent_function:
      name: Funkce vůně
      description: Definuje primární funkci vůně, aby lovci mohli rychle zúžit výběr
        správného nástroje (např. atraktant vs. odstraňovač pachů).
    scent_source:
      name: Zdroj vůně
      description: Uvádí primární biologický nebo aromatický zdroj použitý ve složení
        produktu, včetně typů moči, potravinových vůní, rostlinných aromat atd.
    school_bus_body_type:
      name: Typ karoserie školního autobusu
      description: Klasifikuje školní autobus podle běžných formátů karoserie/třídy
        používaných na trhu (např. typ A–D).
    school_bus_safety_feature:
      name: Bezpečnostní prvek školního autobusu
      description: Významné bezpečnostní vybavení nainstalované ve školním autobusu
    school_glue_washability:
      name: Omyvatelnost školního lepidla
      description: Udává, jak snadno lze zaschlé/vlhké lepidlo očistit z kůže/oděvu/povrchů.
    scissors_application:
      name: Nůžky aplikace
      description: Primární určený účel stříhání / materiál pro nůžky
    scooter_brake_pad_material:
      name: Materiál brzdových destiček pro skútry
      description: Určuje směs použitou v brzdových destičkách, která ovlivňuje výkonnost,
        hluk a životnost.
    scoring_method:
      name: Metoda bodování
      description: Určuje, jak se zapisuje skóre na stolním fotbálku, například pomocí
        ručních korálkových počitadel nebo elektronických výsledkových tabulí.
    scoring_pattern:
      name: Bodovací vzor
      description: Rozvržení bodovacích zón vytištěných na hřišti.
    scoring_system_type:
      name: Typ bodovacího systému
      description: Popisuje styl mechanismu pro záznam skóre, který je součástí stolu,
        jako jsou manuální posuvníky nebo různé elektronické displeje.
    scottish_smallpipes_bag_material:
      name: Materiál měchu skotských malých dud
      description: Určuje materiál vaku (vzduchové nádrže) dodávaného s malými trubkami.
    scottish_smallpipes_drone_tuning_configuration:
      name: Konfigurace ladění základního basového tónu skotských malých dud
      description: Udává nastavení ladění základního basového tónu vydávaného nástrojem
        (výšky / role základních basových tónů vzhledem k tónice).
    scottish_smallpipes_reed_type:
      name: Skotské malé dudy plátkového typu
      description: Určuje typ rákosu použitého pro chanter (a/nebo zda jsou rákosy
        syntetické nebo třtinové).
    scraping_surface_type:
      name: Typ škrábacího povrchu
      description: Určuje konstrukci/geometrii škrabací plochy, která produkuje zvuk
        (např. drážkovaná, hřeben/zuby, vlnitá).
    screw_drive_type:
      name: Typ šroubového pohonu
      description: Určuje typ vybrání pro utahování šroubu nebo závitu, což značí
        nástroj potřebný k jeho utažení nebo odstranění (např. šestihran/inbus, torx).
    screw_thread_size:
      name: Velikost závitu šroubu
      description: Určuje standard velikosti závitu dodaných nebo kompatibilních šroubů
        (např. M4, M5, M6).
    sculpting_clay_base_type:
      name: Typ základu z hliněné sochy
      description: Popisuje základní složení / základ sochařské hlíny.
    seafood_cut:
      name: Řez mořských plodů
      description: Popisuje fyzický řez nebo prezentaci mořských plodů (např. celek,
        filet, steak).
    seafood_processing_method:
      name: Metoda zpracování mořských plodů
      description: Určuje primární techniku konzervace nebo zpracování mořských plodů,
        například uzené, solené nebo lyofilizované.
    seafood_source:
      name: Zdroj mořských plodů
      description: Udává, zda mořské plody pochází z volné přírody, z chovu na farmě,
        zda jsou rostlinného původu nebo pochází z jiného zdroje, což pomáhá nakupujícím
        s hodnocením udržitelnosti a kvality.
    seal_material:
      name: Materiál těsnění
      description: Materiál použitý na těsnění nebo manžety na krku, zápěstí a kotnících,
        které udržují oblek vodotěsný.
    seal_type:
      name: Typ těsnění
      description: Určuje metodu těsnění používanou armaturou k zabránění úniku chladicí
        kapaliny.
    sealant_formulation:
      name: Složení tmelu
      description: Označuje primární chemické složení nebo aditivní technologii tmelu
        pro pneumatiky jízdních kol (např. na bázi latexu, vyztužený vlákny, akrylát).
    seals_leak_type:
      name: Typ netěsnosti těsnění
      description: Typ/místo netěsnosti chladicího systému, kterou má výrobek utěsnit.
    seam_construction:
      name: Konstrukce švů
      description: Popisuje, jak se tvoří šev míče, což ovlivňuje švih, odolnost a cit.
    seam_design:
      name: Provedení švu
      description: Určuje konstrukci švu nebo ozdobné prvky švu punčochového zboží.
    seam_gauge_scale_type:
      name: Typ stupnice měřidla švů
      description: Označuje, jaké stupnice/značky jsou uvedeny na měřidle švů kromě
        základní stupnice pravítka.
    seam_gauge_slider_material:
      name: Materiál posuvníku švového měřidla
      description: Identifikuje materiál komponenty nastavitelného posuvníku/ukazatele,
        pokud je přítomna.
    seam_ripper_tip_style:
      name: Styl hrotu páradla švů
      description: Popisuje funkční design hrotu používaného k bezpečnému zasunutí
        pod stehy a rozstřižení nití.
    seam_sealing_type:
      name: Typ těsnění švů
      description: Popisuje metodu použitou k zabránění pronikání vody do švů pláštěnky
        (např. plně podlepené, svařené).
    seam_type:
      name: Typ švu
      description: Popisuje styl prošívání baseballového míče, který ovlivňuje přilnavost,
        aerodynamiku a zamýšlenou úroveň hry.
    season_condition_protection:
      name: Sezónní/stavová ochrana
      description: Označuje primární počasí/podmínky, proti kterým má fólie na čelní
        sklo chránit.
    season_rating:
      name: Hodnocení sezóny
      description: Určuje sezónní hodnocení stanu, které ukazuje jeho vhodnost pro
        různé povětrnostní podmínky (např. 3sezónní, 4sezónní, 5sezónní/expediční).
    seasoning_variety:
      name: Odrůda koření
      description: Klasifikuje koření podle způsobu přípravy nebo tradičního kulinářského
        použití.
    seat_adjustment_power_type:
      name: Typ elektrického nastavení sedadla
      description: Určuje, jak se ovládají mechanismy nastavení sedadla (manuální
        páky vs. elektromotory), což může ovlivnit zapojení/kompatibilitu.
    seat_belt_attachment_type:
      name: Typ upevnění bezpečnostního pásu
      description: Určuje, jak se popruh připevňuje k vozidlu/ hardware pásu.
    seat_belt_buckle_electrical_connector_type:
      name: Typ elektrického konektoru spony bezpečnostního pásu
      description: Určuje konektor/rozhraní použité pro zapojení spínače spony/předpínače,
        pokud je to relevantní.
    seat_belt_buckle_mounting_type:
      name: Typ upevnění spony bezpečnostního pásu
      description: Popisuje, jak se spona/pouzdro připevňuje k vozidlu, sedadlu nebo
        ovladači bezpečnostního pásu (např. přišroubováním, zacvaknutím).
    seat_belt_buckle_release_button_color:
      name: Barva tlačítka uvolnění spony bezpečnostního pásu
      description: Určuje barvu tlačítka pro uvolnění spony.
    seat_belt_cover_placement:
      name: Kryt bezpečnostního pásu
      description: Určuje, na které části bezpečnostního pásu je kryt určen k použití.
    seat_belt_integration:
      name: Integrace bezpečnostního pásu
      description: Určuje, zda sedadlo obsahuje integrovaný bezpečnostní pás a/nebo
        pouzdro pro sponu, nebo zda je pro instalaci nutné použít originální pouzdro
        pro sponu od výrobce vozidla.
    seat_belt_provision:
      name: Zajištění bezpečnostních pásů
      description: Označuje, zda jsou bezpečnostní pásy a/nebo související hardware
        pásů (například přezky) součástí sestavy zadního sedadla, nebo zda je nutné
        je vyjmout z původního sedadla.
    seat_belt_strap_installation_location:
      name: Instalace bezpečnostního pásu v místě instalace
      description: Označuje, kde je v systému bezpečnostních pásů nainstalován popruh.
    seat_cover_placement:
      name: Umístění potahu sedadla
      description: Označuje, pro kterou polohu sezení ve vozidle je potah určen.
    seat_cover_securement_method:
      name: Způsob upevnění potahu sedadla
      description: Označuje primární způsob upevnění potahu sedadla k sedadlu. Pokud
        se používá více metod, vyberte tu hlavní/primární.
    seat_cover_set_contents:
      name: Obsah sady potahů sedadel
      description: Popisuje, jaké díly jsou součástí balení (např. pouze spodní části
        sedadel vs. celé sedadlo + opěrky hlavy).
    seat_fabric:
      name: Látka sedadla
      description: Primární látka použitá pro sedák a opěradlo židle.
    seat_height_category:
      name: Kategorie výšky sedadla
      description: Klasifikuje stoličku podle typického rozsahu výšky sedáku (např.
        výška pultu nebo baru) pro zjednodušení výběru.
    seat_material:
      name: Materiál sedáku
      description: Identifikuje primární materiál sedáku lavice.
    seat_mounting_type:
      name: Typ uchycení sedadla
      description: Konfigurace montáže/drážky sloužící k upevnění sedadla k podlaze
        vozidla.
    seating_surface_material:
      name: Materiál povrchu sedáku
      description: Určuje materiál plochy, na které se osoba opírá (např. textilenová
        síťovina, látka na potahování šátků, proutí, polstrované čalounění).
    seatpost_clamp_mechanism:
      name: Mechanismus upnutí sedlovky
      description: Typ upínacího/uzavíracího systému, který zajišťuje sedlovku.
    section_orientation_compatibility:
      name: Kompatibilita orientace oddílu
      description: Označuje, zda je příslušenství vhodné pro levou, pravou nebo univerzální
        orientaci.
    sectional_configuration:
      name: Sekční konfigurace
      description: Definuje konkrétní modul nebo orientaci sekční jednotky (např.
        roh, konec levého ramene, lenoška), takže nakupující mohou sestavit požadované
        rozvržení.
    sectional_shape:
      name: Tvar oddílu
      description: Definuje celkovou geometrickou konfiguraci/rozvržení sekční pohovky.
    secured_components:
      name: Zajištěné komponenty
      description: Uvádí konkrétní části jízdního kola, které chrání pojistná jehla
        nebo bezpečnostní matice (např. přední kolo, zadní kolo, sedlovka).
    seed_content:
      name: Obsah semen
      description: Označuje, zda je citrusový plod bez semen, má málo semen nebo je
        plně semenný.
    seed_size_classification:
      name: Klasifikace velikosti semen
      description: Značí relativní velikost nejedlého jádra uvnitř liči, která ovlivňuje
        množství jedlé dužiny.
    self_adhesive_backing_format:
      name: Formát samolepicího podkladu
      description: Fyzický formát lepicího podkladu dodávaného s kartou knotu (předlepená
        podložka vs. samostatné samolepky atd.).
    self_adhesive_hook_loop_backing_type:
      name: Samolepicí suchý zip se zadní stranou
      description: Určuje konstrukci podkladové/vložkové vrstvy a systém lepidla použitý
        na samolepicí straně.
    self_adhesive_hook_loop_fastener_shape:
      name: Tvar samolepicího suchého zipu
      description: Udává řez/tvar dodaného spojovacího materiálu.
    self_hardening_clay_finish:
      name: Samotvrdnoucí jílový povrch
      description: Popisuje vzhled/lesk povrchu po úplném vytvrzení (užitečné pro
        výběr mezi přírodním matem, saténovým atd.).
    self_hardening_clay_water_resistance_after_curing:
      name: Odolnost samotvrdnoucího jílu proti vodě po vytvrzení
      description: Označuje odolnost vůči vodě po úplném vytvrzení (bez dalšího tmelu).
    sensor_functions:
      name: Funkce snímače
      description: Označuje, kterou cyklistickou metriku snímač měří.
    sensor_measurement_mode:
      name: Mód měření senzoru
      description: Označuje, které metriky senzor dokáže zachytit (např. pouze kadenci,
        pouze rychlost, dvojí rychlost a kadenci).
    sensor_mounting_position:
      name: Pozice montáže senzoru
      description: Určuje místo na kole nebo jezdci, kde je snímač nainstalován, jako
        je například rameno kliky, náboj kola nebo bota. To má vliv na kompatibilitu
        s různými sestavami kol.
    sensor_mounting_type:
      name: Typ montáže senzoru
      description: Určuje, jak se senzor MAP montuje na sací potrubí/motor (např.
        šroubovaná příruba vs. zasouvací průchodka).
    sensor_or_gauge_mounting_location:
      name: Místo montáže snímače nebo měřidla
      description: Určuje, kam na vozidle má být nainstalován snímač nebo měřidlo
        (na úrovni systému/umístění, nikoli vlevo/vpravo).
    sensory_modality:
      name: Senzorická modalita
      description: Primární smyslový zážitek (zážitky), který(é) má hračka poskytovat
        (může být multisenzorický).
    sensory_toy_fidget_mechanism:
      name: Hmatový mechanismus smyslové hračky
      description: Primární interakce/mechanismus používaný pro vrtění a samoregulaci.
    sensory_toy_light_features:
      name: Vlastnosti senzorické hračky se světlem
      description: Světelné chování/efekty poskytované hračkou.
    sensory_toy_texture_type:
      name: Typ textury smyslové hračky
      description: Dominantní prvky povrchového pocitu/textury používané pro hmatovou
        stimulaci.
    sequin_application_method:
      name: Metoda aplikace flitrů
      description: Jak se má flitr aplikovat/použít (přišívání vs. lepení vs. tepelné
        fixace atd.).
    sequin_finish:
      name: Flitrová úprava
      description: Popisuje povrchovou/vizuální úpravu a reflexní efekt flitrů použitých
        na nášivce (např. matný, metalický, holografický), nikoli podkladovou vrstvu
        nášivky ani způsob připevnění.
    serger_stitch_functions:
      name: Funkce overlockovacího stehu
      description: Funkce stehování, které overlock podporuje (varianty overlockových/obnitkových
        stehů a speciální overlockové stehy).
    serger_thread_count:
      name: Počet vláken overlocku
      description: Počet nití, které může overlock použít pro šití (např. 2/3/4/5-nítová
        schopnost).
    service_interval:
      name: Servisní interval
      description: Doporučená maximální doba mezi požadovanými kontrolami/servisem
        schválenou čerpací stanicí.
    serving_temperature:
      name: Teplota podávání
      description: Označuje zamýšlenou teplotu podávání nebo stav produktu při konzumaci.
    sesame_seed_hull_status:
      name: Stav slupky sezamových semínek
      description: Určuje, zda je tahini vyrobeno z loupaných nebo neloupaných sezamových
        semínek, což ovlivňuje barvu, chuť a nutriční hodnoty.
    sesame_seed_roast_level:
      name: Stupeň pražení sezamových semínek
      description: Udává, jak moc byla sezamová semínka pražena před mletím, což pomáhá
        nakupujícím zvolit jejich preferovanou intenzitu chuti.
    sesame_seed_variety:
      name: Odrůda sezamových semínek
      description: Identifikuje barvu nebo odrůdu sezamových semínek použitých k výrobě
        oleje.
    set_classification:
      name: Klasifikace sady
      description: Definuje zamýšlenou úroveň hry nebo styl kroketové sady (např.
        turnajová, rekreační, cestovní).
    set_components:
      name: Sada komponent
      description: Označuje, jaké položky jsou součástí produktu (např. pouze středová
        páka vs. celá sada).
    set_items_included:
      name: Položky obsažené v sadě
      description: Určuje oděvy nebo doplňky obsažené v sadě, jako je látka na sárí,
        dupatta nebo pásek.
    setup_mechanism:
      name: Mechanismus nastavení
      description: Popisuje primární způsob rozložení stanu (např. vyskakovací obchod,
        nafukovací, skořepinový střešní).
    setup_type:
      name: Typ nastavení
      description: Jak se sestavuje nebo rozkládá herní stan/tunel.
    sew_in_interfacing_elasticity:
      name: Elasticita všité mezivrstvy
      description: Označuje, zda je všitá mezivrstva pružná, a pokud ano, v jakém
        směru (směrech), aby odpovídala pleteným nebo tkaným projektům.
    sew_in_label_placement:
      name: Umístění nášivky
      description: Označuje zamýšlené umístění na hotové položce.
    sew_on_edge_finish:
      name: Přišívací úprava okraje
      description: Označuje, zda jsou okraje suchého zipu surové/ořezané nebo upravené,
        aby se zabránilo třepení.
    sew_on_rhinestone_hole_orientation:
      name: Orientace otvoru pro našití kamene
      description: Uspořádání/orientace otvorů vzhledem ke kameni (např. vedle sebe,
        protilehlé, křížem) pro podporu různých stylů stehů.
    sewing_kit_components_included:
      name: Komponenty obsažené v šicí sadě
      description: Uvádí seznam šicích potřeb/nářadí, které jsou součástí šicí sady,
        aby si nakupující mohli porovnat, co je v každé sadě obsaženo.
    sewing_machine_bobbin_class:
      name: Třída cívky šicího stroje
      description: Určuje třídu/systém cívky kompatibilní se šicím strojem pro cívky
        a pouzdra cívky.
    sewing_machine_buttonhole_type:
      name: Typ knoflíkové dírky šicího stroje
      description: Způsob vytváření knoflíkových dírek podporovaný strojem.
    sewing_machine_display_type:
      name: Typ displeje šicího stroje
      description: Typ ovládacího/zobrazovacího rozhraní na šicím stroji.
    sewing_machine_needle_point_type:
      name: Typ hrotu jehly šicího stroje
      description: Definuje geometrii/skupinu hrotů jehly, která určuje, jak proniká
        různými látkami (např. ostrá vs. kuličková vs. klínová).
    sewing_machine_needle_system:
      name: Systém jehel šicího stroje
      description: Standardizované číslo systému/modelu jehly, které určuje kompatibilitu
        se strojem (často ve formátu 130/705 H, HAx1, DBx1, 15x1 atd.).
    sewing_machine_needle_type:
      name: Typ jehly šicího stroje
      description: Určuje zamýšlenou aplikaci/styl jehly (např. univerzální, kuličková,
        džínová), což ovlivňuje kvalitu stehu a vhodnost látky.
    sewing_machine_shank_type:
      name: Typ stopky šicího stroje
      description: Určuje standard rozhraní mezi dříkem a kotníkem přítlačné patky,
        pro který je patka navržena, a zajišťuje kompatibilitu se šicím strojem (např.
        nízký dřík, vysoký dřík, šikmý dřík).
    sewing_pattern_accessory_type:
      name: Typ příslušenství pro vzory šití
      description: Určuje, jaký doplněk šicí vzor vytváří.
    sewing_pattern_notions_required:
      name: Požadované pojmy týkající se šicích vzorů
      description: Uvádí významné další materiály/prvky potřebné k dokončení projektu
        (kromě látky a nití).
    sewing_pattern_recommended_fabric:
      name: Doporučený střih látky
      description: Uvádí doporučené typy/gramáže látek pro šicí střih (jak je poskytl
        návrhář střihu).
    sewing_pattern_size_range:
      name: Rozsah velikostí šicích vzorů
      description: Určuje zamýšlený rozsah velikostí, který střih pokrývá (např. od
        miminek po dospělé, nadměrné velikosti).
    sewing_thread_size_system:
      name: Systém velikostí šicí nitě
      description: Velikostní norma používaná k vyjádření velikosti vlákna (např.
        Tex, Denier, Ticket, číslo hmotnosti, V velikost).
    shaft_curvature:
      name: Zakřivení hřídele
      description: Popisuje celkový tvar hřídele, který ovlivňuje vůli, rozsah a ergonomii.
    shaft_kick_point:
      name: Bod úderu hřídele
      description: Určuje polohu podél hřídele, kde se během švihu nejvíce ohýbá,
        ovlivňující trajektorii letu míče.
    shaft_length_type:
      name: Typ délky násady
      description: Standardní označení velikosti šipek (např. krátká, střední), které
        se používá v případech, kdy nejsou k dispozici přesné milimetrové rozměry.
    shaft_shape:
      name: Tvar hřídele
      description: Definuje profil průřezu šachty tonfy (např. kulatý, čtvercový,
        osmihranný).
    shaker_fill_material:
      name: Materiál náplně šejkru
      description: Určuje primární vnitřní výplň použitou k vytvoření zvuku třepačky
        (pokud je to relevantní), například korálky, semínka nebo broky.
    shaker_shell_material:
      name: Materiál pláště šejkru
      description: Určuje primární materiál těla/pláště ganzy (vnějšího plášť).
    shallot_variety:
      name: Odrůda šalotky
      description: Identifikuje konkrétní kultivar, druh trhu nebo odrůdu šalotky.
    shank_style:
      name: Styl stopky
      description: Popisuje celkový tvar/konfiguraci dříků obrubníku (např. rovné,
        zakřivené, pastevní).
    shapewear_enhancement_feature:
      name: Funkce vylepšení stahovacího prádla
      description: Zdůrazňuje primární funkční vylepšení, které oděv nabízí (např.
        kontrola bříška, zvednutí hýždí, nepropustná podšívka).
    sheath_type:
      name: Typ pochvy
      description: Typ pouzdra/pochvy dodávané se sběratelským nožem.
    sheet_music_clip_padding_material:
      name: Materiál vnitřního okraje klipů na noty
      description: Materiál jakékoli výplně čelistí/úchopu, která se dotýká papíru
        nebo okraje stojanu, aby se zabránilo roztržení a sklouznutí.
    sheet_music_clip_spring_tension_level:
      name: Úroveň napětí pružiny klipu na notový zápis
      description: Relativní pevnost pružiny klipu / upínací síla.
    sheet_music_clip_use_environment:
      name: Prostředí pro použití klipu s notovým zápisem
      description: Primární zamýšlené prostředí, ve kterém je klip navržen pro optimální
        výkon.
    shell_construction:
      name: Konstrukce skořepiny
      description: Určuje konstrukci korpusu basového bubnu, což silně ovlivňuje tón
        a hmotnost.
    shell_finish:
      name: Povrchová úprava skořepiny
      description: Varianta vnější úpravy skořepiny bubnu doumbek.
    shell_hull_status:
      name: Stav skořepiny/trupu
      description: Určuje, zda se ořechy nebo semena prodávají s neporušenými skořápkami
        nebo slupkami, nebo bez nich.
    shift_boot_attachment_method:
      name: Způsob upevnění boty řazení
      description: Určuje, jak se řadicí manžeta připevňuje ke konzole/obložení řadicí
        páky vozidla (např. připínací obložení, pojistný kroužek, lepidlo).
    shift_boot_installation_hardware_included:
      name: Součástí je montážní hardware pro kryt řadicí páky
      description: Uvádí instalační hardware a komponenty dodávané s krytem řadicí
        páky.
    shift_knob_illumination:
      name: Osvětlení řadicí páky
      description: Určuje, zda řadicí páka obsahuje podsvícení, a způsob/typ podsvícení
        (např. fotoluminiscenční, LED, optické vlákno, podsvícený vzor).
    shift_knob_installation_method:
      name: Způsob instalace řadicí páky
      description: Určuje, jak se řadicí páka připevňuje k řadicí páce/páce.
    shift_knob_shape:
      name: Tvar řadicí páky
      description: Popisuje celkový ergonomický tvar řadicí páky.
    shift_pattern_type:
      name: Typ vzoru řazení
      description: Určuje styl označení převodového stupně na řadicí páce (pokud existuje).
    shifter_compatibility:
      name: Kompatibilita řadiče
      description: Označuje, zda je prodloužení řídítek kompatibilní s elektronickými
        řadicími pákami, mechanickými řadicími pákami, oběma, nebo zda není kompatibilní
        s řadicími pákami.
    shifter_mounting_interface:
      name: Rozhraní pro montáž řadiče
      description: Popisuje, jak se řadicí páka připevňuje ke kolu (např. velikost
        objímky, I-Spec, MatchMaker, na řídítka, na dolní rámovou trubku, bezdrátové
        připojení).
    shifting_actuation_type:
      name: Typ ovládání řazení
      description: Identifikuje mechanismus použitý k řazení v sadě mechanický, elektronický
        kabelový, elektronický bezdrátový, hydraulický).
    shifting_mechanism:
      name: Řadicí mechanismus
      description: Určuje, zda řadicí páka pracuje mechanicky nebo elektronicky a
        zda je indexovaná nebo třecí.
    shim_purpose:
      name: Účel podložky
      description: Definuje funkční typ produktu (např. podložka, klín, distanční
        vložka), aby cyklisté mohli rychle najít správné řešení nastavení, aniž by
        potřebovali samostatné podkategorie.
    shin_guard_attachment_method:
      name: Způsob upevnění chrániče holení
      description: Klasifikuje celkový design chrániče holení, včetně integrace chrániče
        kotníku nebo konstrukce ponožky.
    shirt_cuff_style:
      name: Styl manžety košile
      description: Určuje konstrukci manžety rukávu, která ovlivňuje formálnost, kombinování
        s manžetovými knoflíčky a pohodlí.
    shochu_base_ingredient:
      name: Základní ingredience šóčú
      description: Určuje primární zdroj škrobu nebo cukru použitý k výrobě šóčú.
    shochu_soju_variety:
      name: Odrůda šóčú a soju
      description: Klasifikuje produkt podle jeho uznávaného stylu nebo typu.
    shock_absorber_bushing_material:
      name: Materiál pouzdra tlumiče pérování
      description: Materiál montážních pouzder/izolátorů dodávaných s tlumičem pérování
        (nebo zabudovaných).
    shock_absorber_charge_type:
      name: Typ plnění tlumiče pérování
      description: Určuje technologii plnění/tlumení nárazů (např. hydraulická/olejová,
        plynová, vzduchová) a/nebo související konstrukci trubek, kde je to relevantní.
    shock_absorber_mount_type_lower:
      name: Typ uchycení tlumiče (spodní)
      description: Styl rozhraní pro spodní montáž tlumiče pro přizpůsobení montáže.
    shock_absorber_mount_type_upper:
      name: Typ uchycení tlumiče (horní)
      description: Určuje styl horního (horního) montážního rozhraní tlumiče pérování
        motorového vozidla pro porovnání vhodnosti/kompatibility.
    shock_absorber_position:
      name: Poloha tlumiče pérování
      description: Určuje, zda je tlumič určen pro přední, zadní, levou nebo pravou
        část vozidla (podrobnější umístění než pouze na nápravě).
    shock_absorption_system:
      name: Systém tlumení nárazů
      description: Definuje mechanismus používaný ke snížení vibrací a hluku při odrazu.
    shoe_collar_height:
      name: Výška límce boty
      description: Definuje boty podle výšky límce/střihu (nízké, střední, vysoké)
        a určuje zakrytí/oporu kotníků.
    shoe_cover_height:
      name: Výška návleku na boty
      description: Určuje úroveň krytí návleků na cyklistické boty, čímž odlišuje
        návleky na špičky od plných vysokých návleků na boty.
    shoe_sizing_system:
      name: Systém velikostí bot
      description: Určuje standard velikostí (US, UK, EU, JP, Mondopoint atd.) pro
        uvedenou velikost boty.
    shoelace_aglet_material:
      name: Materiál tkaniček
      description: Určuje materiál použitý na konce tkaniček (štítky/aglety), ovlivňující
        trvanlivost a styl.
    shooting_rest_design:
      name: Design střelecké opory
      description: Klasifikuje konstrukční styl opěrky (opěrka na brašnu, saně, opěrka
        na stativ, svěrák na zbraň atd.).
    shooting_stick_yoke_design:
      name: Design třmenu střelecké hole
      description: Určuje styl kolébky nebo jha, které se propojuje se střelnou zbraní
        nebo optikou.
    shooting_target_style:
      name: Styl střelby na terč
      description: Klasifikuje styl nebo design krasobruslařských a hokejových terčů,
        aby si zákazníci mohli vybrat produkt dle vhodného tréninkového zaměření.
    shooting_target_type:
      name: Typ střeleckého terče
      description: Klasifikuje terče podle konstrukčního stylu, materiálu nebo designu
        (např. gong, silueta, papírový, otočný), což střelcům umožňuje rychle najít
        správný terč pro jejich disciplínu a typ střelné zbraně.
    short_block_assembly_balance_type:
      name: Typ vyvážení sestavy krátkého bloku
      description: Označuje, zda je rotující sestava interně nebo externě vyvážena.
    short_block_intended_use:
      name: Zamýšlené použití krátkého bloku
      description: Primárně zamýšlený případ použití krátkého bloku.
    short_block_rotating_assembly_included:
      name: Součástí je otočná sestava krátkého bloku
      description: Určuje, které hlavní součásti rotační sestavy jsou součástí krátkého
        bloku.
    shot_size:
      name: Velikost výstřelu
      description: Určuje velikost střely pro volné broky nebo součásti munice.
    shotgun_action_type:
      name: Typ závěru brokovnice
      description: Určuje ovládací mechanismus/činnost brokovnice.
    shotgun_choke_type:
      name: Typ tlumivky pro brokovnici
      description: Určuje konfiguraci tlumivky hlavně (hlavní) brokovnice.
    shotgun_gauge:
      name: Kalibr brokovnice
      description: Určuje ráži brokovnice (a .410 otvor (pokud je to relevantní)
        pro identifikaci a filtrování v seznamu sběratelských předmětů.
    shotgun_stock_material:
      name: Materiál pažby brokovnice
      description: Určuje primární materiál pažby/předpažbí.
    shuffleboard_speed_rating:
      name: Rychlostní hodnocení shuffleboardu
      description: Udává relativní rychlost klouzání, kterou prášek na shuffleboard
        nebo jiný údržbový produkt poskytuje na stole, což hráčům umožňuje zvolit
        si vhodnou rychlost podle jejich úrovně dovedností a délky stolu.
    shuffleboard_table_length_compatibility:
      name: Kompatibilita délek stolu pro shuffleboard
      description: Standardní délka stolu pro shuffleboard, ke které je produkt navržen
        nebo pro kterou je určen.
    shuttlecock_base_material:
      name: Materiál základny košíčku
      description: Určuje materiál použitý na nos/základnu péráku, který ovlivňuje
        odolnost, pocit a odskok.
    shuttlecock_feather_material:
      name: Materiál péra pro kuželku
      description: Identifikuje primární zdroj peří nebo typ konstrukce použitý na
        sukni míčku, ovlivňující trvanlivost, konzistenci a cenu.
    shuttlecock_grade:
      name: Kuželka třídy
      description: Určuje zamýšlenou úroveň hry nebo klasifikaci kvality (např. trénink,
        klub, soutěžní).
    shuttlecock_speed_rating:
      name: Rychlostní třída košíčku
      description: Určuje výrobcem určenou rychlost neboli rating míčku, což hráčům
        umožňuje vybrat správnou rychlost letu pro jejich herní stav, teplotu a nadmořskou
        výšku.
    side_panel_installation_state:
      name: Stav instalace bočního panelu
      description: Určuje, zda je boční panel dodáván holý, opatřený základním nátěrem,
        natřený nebo jinak potažený/připravený k instalaci.
    side_wall_mechanism:
      name: Mechanismus boční stěny
      description: Popisuje, jak se otevírá nebo spouštějí stěny postele pro přístup
        k dítěti.
    signal_source:
      name: Zdroj signálu
      description: Udává, jak počítadlo kilometrů přijímá/odvozuje informace o vzdálenosti
        nebo čase.
    silk_fiber_type:
      name: Typ hedvábného vlákna
      description: Typ/zdroj hedvábného vlákna použitého k výrobě látky (např. moruše
        nebo tussah), ovlivňující texturu, jednotnost a cenu.
    simulated_game_species:
      name: Simulované druhy zvěře
      description: Označuje konkrétního lovného ptáka nebo zvířete, které produkt
        napodobuje pro dosažení realistického tréningu.
    singlet_cut_style:
      name: Styl střihu tílka
      description: Určuje střih/model zápasnického tílka s ohledem na výšku ramínek,
        styl zádového švu a varianty pro pohlaví/mládež.
    sink_material:
      name: Materiál dřezu
      description: Určuje materiál integrovaného dřezu dodávaného s umyvadlem.
    sinker_attachment_style:
      name: Styl uchycení platiny
      description: Popisuje mechanismus, kterým je olověná hruška připevněna k vlasci
        nebo montáži.
    sinker_finish:
      name: Povrchová úprava platiny
      description: Určuje vnější nátěr nebo variantu povrchu platiny.
    sinker_shape:
      name: Tvar závaží
      description: Definuje geometrický tvar platiny (např. kulkový, válcovitý, kapkovitý),
        aby si rybáři mohli vybrat optimální prezentaci a odolnost proti zaseknutí.
    siren_system_included:
      name: Sirénový systém je součástí dodávky
      description: Označuje, zda je nainstalována siréna/PA systém a její typ.
    siren_system_type:
      name: Typ sirénového systému
      description: Určuje konfiguraci sirény/PA na policejním voze.
    size_designation:
      name: Označení velikosti
      description: Standardizované označení velikosti trojúhelníkového nástroje.
    size_system:
      name: Systém velikostí
      description: Určuje systém velikostí nebo regionální normu, které odpovídá štítek
        s velikostí (např. US, UK, EU, mezinárodní).
    sizzle_mechanism:
      name: Mechanismus činely
      description: Určuje, jak činel vytváří efekt syčení (např. nýty instalované
        v činelu, připojitelný řetízek/syčení nebo žádný hardware).
    skate_blade_discipline:
      name: Disciplína na brusli s čepelí
      description: Identifikuje bruslařskou disciplínu nebo aplikaci, pro kterou je
        čepel určena, například hokej nebo krasobruslení, což umožňuje nakupujícím
        filtrovat relevantní čepele.
    skate_brake_type:
      name: Typ brzdy brusle
      description: Určuje typ brzdného mechanismu dodávaného s bruslemi.
    skateboard_nut_thread_size:
      name: Velikost závitu matice skateboardu
      description: Určuje průměr a stoupání matice pro zajištění kompatibility s osami,
        čepy nebo montážním hardware skateboardu.
    skein_winder_bearing_bushing_type:
      name: Typ ložiska/pouzdra navíječe přadena
      description: Určuje typ ložiska nebo pouzdra použitého v rotační sestavě navíječe
        přadena.
    skein_winder_drive_type:
      name: Typ pohonu navíječe přadena
      description: Jak je navíječ přadena napájen/otáčen během používání.
    ski_binding_mechanism:
      name: Mechanismus vázání lyží
      description: Definuje základní mechanickou konstrukci nebo disciplínu vázání
        (např. alpské, technické/připnuté, telemarkové).
    ski_binding_part_type:
      name: Typ součásti lyžařského vázání
      description: Identifikuje konkrétní komponentu nebo příslušenství pro lyžařské
        vázání, což umožňuje rychlé filtrování napříč mnoha typy.
    ski_boot_sole_standard:
      name: Standardní podrážka lyžařské boty
      description: Identifikuje normu podrážky nebo standard kompatibility s vázáním,
        pro který je lyžařská bota certifikována.
    skill_focus:
      name: Zaměření dovednosti
      description: Určuje primární basketbalovou dovednost, kterou má tréninková pomůcka
        rozvíjet.
    skimboard_construction:
      name: Konstrukce skimboardu
      description: Popisuje primární konstrukci desky se zaměřením na jádro a techniku
        vrstvení (např. pěnové jádro, dřevěné jádro).
    skin_presence:
      name: Přítomnost kůže
      description: Určuje, zda se kuře prodává s kůží, bez kůže nebo částečně bez
        kůže.
    slapstick_handle_type:
      name: Typ rukojeti slapstick
      description: Popisuje styl úchopu/rukojeti integrované do dřívka, který ovlivňuje
        ergonomii a pohodlí při hraní.
    slapstick_playing_surface_material:
      name: Materiál hrací plochy dřívka
      description: Určuje materiál úderových/plácacích prvků, které se vzájemně dotýkají
        a vytvářejí zvuk.
    sled_brake_type:
      name: Typ brzdy saní
      description: Určuje brzdný mechanismus, který je součástí saní (pokud existuje).
    sled_towing_method:
      name: Metoda tažení saní
      description: Označuje primární způsob tahání nebo vlečení saní.
    sleep_position_suitability:
      name: Vhodnost polohy při spánku
      description: Označuje, pro kterou polohu (polohy) při spaní je matrace navržena
        tak, aby nejefektivněji podporovala.
    sleeping_bag_shape:
      name: Tvar spacího pytle
      description: Celkový střih spacáku, který ovlivňuje teplo, hmotnost a prostornost.
    sleeping_pad_type:
      name: Typ karimatky
      description: Určuje konstrukční styl vložky, jako například pěna s uzavřenými
        buňkami nebo nafukovací. To přímo ovlivňuje pohodlí, hmotnost a izolaci.
    sleepwear_set_pieces_included:
      name: Kusy obsažené v sadě nočního prádla
      description: Uvádí jednotlivé součásti vícedílné sady pyžamového nebo domácího
        oblečení.
    sleeve_bearing_type:
      name: Typ kluzného ložiska
      description: Identifikuje technologii, která umožňuje rotaci rukávu a ovlivňuje
        kvalitu rotace při olympijských zdvihech.
    sleeve_style:
      name: Styl rukávu
      description: Určuje styl rukávu nad rámec délky (např. raglán).
    slide_board_accessories_included:
      name: Obsažené příslušenství slajdu
      description: Uvádí doplňkové položky přibalené k výsuvné desce, takže nakupující
        přesně vědí, co je součástí balení, a mohou balíček porovnat.
    slide_installation_type:
      name: Typ instalace pojezdu
      description: Jak má být skluzavka instalována nebo připevněna (samostatně, připevněna
        k herní sadě atd.).
    slide_intended_finger:
      name: Zamýšlený prst pro slajd
      description: Označuje, na kterém prstu se má slajd používat, nebo zda se nepoužívá
        (např. tónová lišta).
    slide_safety_features:
      name: Bezpečnostní prvky pro skluzavky
      description: Bezpečnostní prvky designu zahrnuté na skluzavce.
    slide_type:
      name: Typ skluzavky
      description: Určuje, k čištění jakého typu (typů) mosazného posuvného mechanismu
        je produkt určen.
    slide_water_use_capability:
      name: Funkce využití vody na skluzavce
      description: Zda je skluzavka určena pro použití s vodou (např. s hadicí) a
        jakým způsobem.
    slime_putty_kit_components_included:
      name: Součástí balení jsou i sliz a plastelína.
      description: Uvádí nástroje a doplňky, které jsou součástí produktu slime/putty
        (zejména pro sady/balíčky).
    sling_material:
      name: Materiál závěsu
      description: Určuje vlákno/textilii použitou v popruhu expresky (kost).
    smith_machine_bar_path:
      name: Dráha osy u Smithova stroje
      description: Popisuje pevnou dráhu pohybu osy a informuje uživatele o biomechanice
        a prostorových požadavcích.
    smoke_color:
      name: Barva kouře
      description: Barva kouře produkovaného světlicí/kouřovým signálem (odlišná od
        barvy těla produktu).
    smoked_malt_smoking_material:
      name: 'Materiál pro generování kouře: uzený slad'
      description: U uzených sladů identifikuje materiál použitý při uzení (např.
        specifický druh dřeva nebo rašelina).
    snack_mix_variety:
      name: Různé druhy svačinových směsí
      description: Klasifikuje produkt podle druhu směsi (např. s rozinkami, s oříšky,
        namkeen...).
    snack_processing_method:
      name: Metoda zpracování svačiny
      description: Označuje primární techniku zpracování nebo konzervace použitou
        k vytvoření pokrmu např. lyofilizace, pečení, pražení).
    snack_texture:
      name: Textura svačiny
      description: Označuje fyzické kousnutí nebo pocit v ústech ze sezamových tyčinek.
    snap_installation_method:
      name: Metoda instalace patentky
      description: Jak je patentní knoflík instalován/připevněn k materiálu projektu.
    snare_drum_bearing_edge_profile:
      name: Profil hrany ložiska virblu
      description: Profil/výřez nosné hrany korpusu virblu.
    snare_drum_finish_type:
      name: Typ povrchové úpravy malého bubnu
      description: Vysoce kvalitní provedení/typ použitý na korpusu virblu.
    snare_drum_hoop_type:
      name: Typ obruče malého bubnu
      description: Typ obručí/ráfků použitých na malém bubnu.
    snare_drum_mounting_type:
      name: Typ uchycení malého bubnu
      description: Jak se má virbl namontovat/používat.
    snare_drum_shell_material:
      name: Materiál pláště malého bubnu
      description: Určuje kov/slitinu použitou pro korpus malého bubnu (hlavní tělo),
        což silně ovlivňuje tón, hmotnost a odolnost.
    snare_drum_strainer_mechanism:
      name: Mechanismus sítka u virblu
      description: Typ mechanismu napínáku/odpojovače strun pro zapojení/odpojení
        strun.
    snare_drum_strainer_type:
      name: Typ sítka pro virbl
      description: Typ mechanismu napínáku/odpojovače strun pro zapojení/odpojení
        strun.
    snare_hoop_type:
      name: Typ obruče pro malý buben
      description: Typ obručí/rámů na malém bubnu.
    snare_throw_off_type:
      name: Typ odpouštěcího mechanismu virblu
      description: Typ napínacího/odpouštěcího mechanismu pro zapnutí/uvolnění drátů
        virblu.
    snip_cutter_spring_mechanism:
      name: Pružinový mechanismus nůžek na štípání
      description: Označuje, zda nůžky na štípání používají pružinový/vratný mechanismus
        a jeho typ.
    snorkel_mount_position:
      name: Poloha upevnění šnorchlu
      description: Popisuje, kde je šnorchl umístěn na hlavě uživatele během používání.
    snorkel_top_type:
      name: Typ vrchní části šnorchlu
      description: Popisuje styl ochrany proti vniknutí vody v horní části šnorchlu,
        která je součástí sady.
    snow_condition_suitability:
      name: Vhodnost pro sněhové podmínky
      description: Popisuje primární sněhové podmínky, pro které je vosk určen.
    snow_sports_helmet_safety_certification:
      name: Certifikace bezpečnosti přilby pro zimní sporty
      description: Určuje bezpečnostní normu, kterou helma pro lyžování a snowboarding
        splňuje.
    snowboard_base_material:
      name: Základní materiál snowboardu
      description: Identifikuje základní složení nebo povrchovou úpravu (extrudované,
        slinuté jakosti, chráněné receptury), která ovlivňuje rychlost, trvanlivost
        a údržbu.
    snowboard_width_class:
      name: Třída šířky snowboardu
      description: Kategorizuje celkovou šířku desky vzhledem k velikosti boty (např.
        běžná či široká).
    soccer_ball_compartment_type:
      name: Typ přihrádky na fotbalový míč
      description: Určuje, jak (nebo zda) se do batohu vejde fotbalový míč.
    soccer_ball_type:
      name: Typ fotbalového míče
      description: Určuje zamýšlené použití nebo styl fotbalového míče (např. zápas,
        trénink, futsal), takže nakupující mohou rychle najít tu správnou variantu
        bez nutnosti procházet mnoho podkategorií.
    soccer_dummy_base_type:
      name: Typ základny fotbalové figuríny
      description: Popisuje styl základny nebo kotevního mechanismu, který figurína
        používá.
    soccer_dummy_design:
      name: Návrh fotbalové figuríny
      description: Určuje konstrukční styl figuríny fotbalové branky, například pevnou
        nebo nafukovací.
    soccer_goal_target_style:
      name: Styl cíle pro fotbalové branky
      description: Definuje fyzický tvarový faktor nebo design tréninkového terče,
        aby si nakupující mohli vybrat styl, který nejlépe vyhovuje jejich cvičení.
    soccer_goal_type:
      name: Typ fotbalové branky
      description: Označuje konstrukční styl nebo zamýšlené použití branky (např.
        vyskakovací, odrážecí, pouliční).
    sock_cushioning:
      name: Polstrování ponožek
      description: Označuje množství a styl polstrování pod chodidlem neboli vnitřního
        okraje u ponožky.
    sock_cushioning_level:
      name: Úroveň polstrování ponožky
      description: Určuje množství polstrování pod chodidlem integrovaného do ponožky.
    sock_grip_type:
      name: Typ protiskluzu ponožky
      description: Popisuje veškeré trakční nebo protiskluzové prvky použité na podrážce
        ponožky.
    sock_toe_style:
      name: Styl ponožkové špičky
      description: Popisuje konstrukční styl oblasti prstů ponožky.
    soft_bait_style:
      name: Styl měkké návnady
      description: Klasifikuje design těla nebo profil měkké plastové návnady (např.
        červ, swimbait, larva).
    soft_top_attachment_type:
      name: Typ uchycení měkké střechy
      description: Označuje způsob upevnění skládací střechy k vozidlu (kanál, patentky,
        suchý zip atd.).
    soft_top_includes_frame_hardware:
      name: Součástí měkké střechy je rám a kování
      description: Označuje, zda produkt obsahuje rám/oblouky skládací střechy a/nebo
        montážní materiál.
    soft_top_installation_type:
      name: Typ instalace měkké střechy
      description: Uvádí, jakým způsobem se střecha vozidla montuje/upevňuje, a popisuje
        předpokládaný postup montáže a potřebnou námahu.
    soft_top_window_configuration:
      name: Konfigurace oken měkké střechy
      description: Ukazuje, kolik oken má skládací střecha a jaké jsou její polohy.
    softball_certification:
      name: Certifikace na softbal
      description: Uvádí razítka nebo schválení řídících orgánů vytištěná na míči,
        která určují způsobilost k účasti v lize/zápase.
    softness_level:
      name: Úroveň měkkosti
      description: Označuje, jak měkká/nízkoprofilová je strana s poutky, relevantní
        pro pohodlí při kontaktu s pokožkou a aplikace s malým objemem.
    solar_system_model_included_bodies:
      name: Model sluneční soustavy včetně těles
      description: Uvádí, která nebeská tělesa jsou v této sadě modelů zastoupena.
    solar_system_model_scaling:
      name: Škálování modelu sluneční soustavy
      description: Uvádí, zda je model sluneční soustavy v měřítku, pokud jde o velikost
        planet, vzdálenosti/oběžné dráhy, obojí, nebo zda se jedná o schematické znázornění
        bez dodržení měřítka.
    sold_secure_certification_level:
      name: Úroveň certifikace Sold Secure
      description: Uvádí hodnocení Sold Secure, které zámku udělila nezávislá britská
        zkušební organizace (Bronz, Stříbro, Zlato, Diamant).
    sold_secure_rating:
      name: Hodnocení Sold Secure
      description: Označuje úroveň certifikace Sold Secure přiřazenou zámku.
    sole_construction:
      name: Konstrukce podrážky
      description: Označuje, jak je podrážka boty konstruována (plná, dělená, dvoudílná
        atd.), což přímo ovlivňuje flexibilitu, kontakt s podlahou a vhodnost pro
        specifické taneční techniky.
    sole_type:
      name: Typ podrážky
      description: Popisuje strukturální styl podrážky s uvedením flexibility a zamýšleného
        použití.
    soprano_saxophone_body_style:
      name: Styl těla soprán saxofonu
      description: Popisuje fyzické uspořádání těla soprán saxofonu.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Bafl typ náustku pro sopránový saxofon
      description: Popisuje konstrukci přepážky/střechy náustku (obrys za špičkou),
        která ovlivňuje jas, projekci a odezvu.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Velikost komory náustku sopránového saxofonu
      description: Popisuje velikost vnitřní komory náustku pro soprán saxofon, která
        ovlivňuje odpor a tónovou barvu.
    soprano_saxophone_mouthpiece_finish:
      name: Povrchová úprava náustku sopránového saxofonu
      description: Povrchová úprava/pokovení aplikované na náustek (pokud je to relevantní).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Náustek pro sopránový saxofon včetně příslušenství
      description: Určuje, které příslušenství je součástí náustku.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Tónový charakter náustku pro sopránový saxofon
      description: Vysoký tónový profil, který se obvykle spojuje s konstrukcí náustku.
    sound_character:
      name: Zvukový charakter
      description: Popisuje obecné zabarvení zvuku produkovaného dřívkem.
    sound_expansion_method:
      name: Metoda expanze zvuku
      description: Určuje, jak modul může přidávat nebo rozšiřovat svou interní zvukovou
        knihovnu nad rámec továrních zvuků (např. obsah balíčku, import samplů, rozšiřující
        karty).
    sound_module_sound_library_focus:
      name: Zaměření zvukové knihovny zvukového modulu
      description: Hlavní zaměření tovární sady zvuků má zákazníkům pomoci najít modul,
        který bude vyhovovat jejich stylu a způsobu použití.
    sound_port_type:
      name: Typ zvukového portu
      description: Popisuje konstrukci zvukového otvoru/portu na zadní straně cajonu,
        který ovlivňuje projekci a basovou odezvu.
    sound_sensitivity_control:
      name: Ovládání citlivosti na zvuk
      description: Udává, zda a jak lze upravit citlivost zvuku.
    sound_synthesizer_patch_memory:
      name: Paměť patche zvukového syntetizátoru
      description: Určuje, zda syntezátor umí ukládat a vyvolávat presety (patche).
    sound_type:
      name: Typ zvuku
      description: Primární typ(y) zvuku nebo zvukové výstupy, které podložka produkuje
        (např. nástroje, písně, hlasové pokyny) pro vedení hry.
    soundboard_material:
      name: Materiál rezonanční desky
      description: Materiál použitý na rezonanční desku harfy (horní desku), která
        určuje rezonanci a tón.
    soup_or_broth_variety:
      name: Druh polévky nebo vývaru
      description: Uvádí styl, recepturu nebo kulinářskou úpravu polévky či vývaru,
        aby nakupující mohli rychle najít svůj preferovaný druh.
    sour_cream_variety:
      name: Druh zakysané smetany
      description: Rozděluje výrobky ze zakysané smetany podle konkrétního druhu nebo
        kulinářského stylu, jako je například crème fraîche nebo mexická crema.
    soy_sauce_variety:
      name: Druh sójové omáčky
      description: Uvádí konkrétní druh nebo variantu sójové omáčky (např. světlá,
        tmavá, tamari, ponzu), což zákazníkům umožňuje rychle filtrovat podle chuťového
        profilu a kulinářského využití.
    spark_plug_electrode_material:
      name: Materiál elektrody zapalovací svíčky
      description: Materiál/technologie elektrod (střední a/nebo uzemněné) zapalovací
        svíčky, jak je uváděno na trh výrobcem (např. měď, platina, iridium).
    spark_plug_seat_type:
      name: Typ sedla zapalovací svíčky
      description: Typ těsnění/sedla použitý u zapalovací svíčky v místě styku s hlavou
        válců.
    spark_plug_terminal_type:
      name: Typ koncovky zapalovací svíčky
      description: Styl horního kontaktu pro připojení zapalovacího kabelu/krytu svíčky.
    sparkler_shape:
      name: Tvar prskavky
      description: Celkový originální tvar a provedení zapalovací svíčky.
    speaker_cone_material:
      name: Materiál membrány reproduktoru
      description: Primární materiál membrány reproduktoru (basová/středobasová membrána).
    speaker_size:
      name: Velikost reproduktoru
      description: Jmenovitá velikost měniče / velikost kompatibility komponentního
        reproduktoru (např. 6,5 palce, 6x9 palců), používaná pro sladění s továrními
        rozměry a adaptéry reproduktorů.
    special_effects_output_interface:
      name: Rozhraní pro výstup speciálních efektů
      description: Určuje výstupní konektor/rozhraní používané k ovládání zařízení
        se speciálními efekty.
    special_effects_stand_stability_features:
      name: Stabilizační prvky stojanu pro speciální efekty
      description: Uvádí vestavěné stabilizační a bezpečnostní prvky, které mají zabránit
        převrácení nebo sklouznutí během akcí.
    specialty_malt_name_type:
      name: Název/druh speciálního sladu
      description: Určuje konkrétní druh speciálního sladu (často se používá jako
        obchodní název stylu).
    specimen_presentation:
      name: Prezentace vzorku
      description: Označuje, jak je sběratelský exemplář připraven nebo prezentován
        (např. surový/nepřipravený, leštěný, broušený nebo zasazený).
    speed_bag_accessories_included:
      name: Příslušenství pro boxovací hrušku je součástí balení
      description: Uvádí další příslušenství dodávané spolu se speedbagem, jako jsou
        rukavice, pumpy, otočné karabiny, řetězy nebo stojany.
    speed_rating:
      name: Rychlostní index
      description: Udává rychlost hry danou potahem kulečníkového stolu (např. pomalá,
        střední nebo rychlá).
    speedometer_backlight_type:
      name: Typ podsvícení rychloměru
      description: Určuje, zda a jak je rychloměr podsvícen pro lepší viditelnost
        v noci.
    speedometer_display_type:
      name: Typ zobrazení tachometru
      description: 'Označuje styl odečtu rychlosti na rychloměru: analogová ručička/ciferník,
        digitální numerický odečet nebo kombinace analogových a digitálních prvků.'
    speedometer_unit_of_measure:
      name: Jednotka měření tachometru
      description: Určuje jednotky rychlosti zobrazené na číselníku/displeji.
    spike_replaceability:
      name: Vyměnitelnost hrotů
      description: Označuje, zda jsou hroty na botě vyměnitelné, pevné nebo zda je
        bota bez hrotů.
    spike_shape:
      name: Tvar hrotu
      description: Určuje geometrický tvar hrotu, který ovlivňuje přilnavost a vhodnost
        pro různé povrchy tratí.
    spike_thread_size:
      name: Velikost závitu hrotu
      description: Určuje velikost nebo standard základny závitu pro boty (např. 1/4-20).
    spin_classification:
      name: Klasifikace rotace
      description: Označuje profil rotace, pro který je disk navržen (nízká, střední,
        vysoká, hyper rotace).
    spin_profile:
      name: Profil rotace
      description: Určuje relativní rotační charakteristiky, které hřídel podporuje.
    spin_types_supported:
      name: Podporované typy otáčení
      description: Uvádí druhy rotace, které může stroj udělit míčkům, aby si hráči
        mohli procvičovat různé styly úderů.
    spinach_preparation_style:
      name: Styl přípravy špenátu
      description: Popisuje fyzickou přípravu listů špenátu nebo formát produktu (např.
        celý list, nakrájený, na kostky).
    spinach_variety:
      name: Odrůda špenátu
      description: Identifikuje botanickou nebo tržní odrůdu špenátu (např. baby,
        savoy, water, červená) a umožňuje nakupujícím vybrat přesný druh, který chtějí.
    spindle_bearing_surface_material:
      name: Materiál povrchu ložiska vřetena
      description: Materiál hrotu/opěrné plochy používaný u opěrných vřeten (špička/spodní
        část), který ovlivňuje plynulost a opotřebení.
    spindle_bearing_type:
      name: Typ ložiska vřetena
      description: Typ spojení mezi hrotem vřetena a ložiskem, který snižuje tření
        o opěrnou misku/pohár.
    spindle_finish:
      name: Povrchová úprava vřetena
      description: Povrchová úprava/nátěr vřetena, která ovlivňuje pocit z používání,
        trvanlivost a estetiku.
    spindle_hook_type:
      name: Typ vřetena s hákem
      description: Mechanismus pro zachycení příze v horní části vřetena, který slouží
        k upevnění navazovacího dílu/příze.
    spindle_support_method:
      name: Metoda podpory vřetena
      description: Jak má být vřeteno podepřeno během předení.
    spindle_tip_style:
      name: Styl hrotu vřetena
      description: Tvar/konstrukce části v misce/pohárku (opěrná plocha), ovlivňující
        tření a plynulost otáčení.
    spindle_whorl_position:
      name: Pozice přeslenu vřetena
      description: Místo, kde přeslen sedí na hřídeli vřetena.
    spinner_blade_shape:
      name: Tvar čepele
      description: Identifikuje primární tvar čepele použité na rotující třpytce,
        ovlivňující vibrace, záblesky a hloubku chodu.
    spinner_control_card_design_type:
      name: Konstrukce/typ karty pro ovládání ukazatele načítání
      description: Popisuje typ řídicí karty ukazatele načítání z hlediska způsobu,
        jakým zobrazuje řídicí informace (např. referenční poměr, referenční napětí,
        převodní tabulka).
    spinner_subtype:
      name: Podtyp spinneru
      description: Klasifikuje celkový design nebo rodinu třpytek (např. inline třpytka,
        spinnerbait).
    spinning_oil_application_area:
      name: Oblast aplikace rotačního oleje
      description: Určuje zamýšlený bod (body) aplikace oleje na kolovratu.
    spinning_oil_application_tool:
      name: Nástroj pro nanášení oleje při spřádání
      description: Označuje typ aplikátoru/špičky balení používané k nanášení oleje
        na součásti kolovratu pro kontrolované dávkování.
    spinning_oil_features:
      name: Vlastnosti rotačního oleje
      description: Zdůrazňuje funkční vlastnosti relevantní pro oleje pro kolovrátky
        (zbytky, skvrny, oxidace a omyvatelnost).
    spinning_top_features:
      name: Vlastnosti vřetena
      description: Speciální herní funkce zahrnuté v káči nad rámec základního točení.
    spinning_top_launch_mechanism:
      name: Mechanismus spouštění káči
      description: Jak se káča spouští/pohání pro roztočení.
    spinning_wheel_brake_tension_system_type:
      name: Typ brzdy/napínacího systému kolovratu
      description: Určuje systém brzdění/napínání příze používaný k řízení navíjení
        příze.
    spinning_wheel_drive_system:
      name: Systém pohonu kolovrátku
      description: Označuje pohonný systém, pro který je cívka určena.
    spinning_wheel_hook_system:
      name: Systém háků na kolovrat
      description: Určuje, jakým způsobem se příze vede podél ramen křídla.
    spinning_wheel_part_application:
      name: Aplikace dílů pro kolovrat
      description: Určuje, pro které součásti kolovratu je olej určen.
    spinning_wheel_portability_foldability:
      name: Přenosnost/skládatelnost kolovratu
      description: Označuje, zda je kolo navrženo tak, aby se dalo složit pro přepravu.
    spinning_wheel_tension_adjustment_type:
      name: Typ nastavení napnutí kolovratu
      description: Jak se nastavuje napětí na kole pro kontrolu navíjení.
    splice_termination_type:
      name: Typ spoje/zakončení
      description: Určuje ukončení koncové části kotevní šňůry (např. spletené oko,
        očko, řetězový hák).
    split_shot_cut_type:
      name: Typ řezu split broků
      description: Určuje typ drážky nebo otvoru, který umožňuje připevnění k vlasci.
    split_shot_shape:
      name: Tvar rozděleného závaží
      description: Popisuje fyzickou formu split broků, která ovlivňuje hydrodynamiku
        a odolnost vůči zachycení.
    split_shot_size:
      name: Velikost split broků
      description: Standardizovaný alfanumerický kód velikosti (např. Standardizovaný
        alfanumerický kód velikosti (např. SSG, AAA, BB, 1) používaný výrobci a rybáři
        pro klasifikaci split broků. Doplňuje přesné měření hmotnosti.
    spoiler_adjustability:
      name: Nastavitelnost spoileru
      description: Označuje, zda je úhel/výška spoileru nastavitelná.
    spoke_accessory_function:
      name: Funkce příslušenství pro dráty kola
      description: Klasifikuje primární funkci příslušenství na kole, například dekorativní,
        reflexní nebo osvětlené.
    spoke_butting_profile:
      name: Profil spojování paprsků
      description: Popisuje, jak se průměr paprsku mění v závislosti na jeho délce
        (hladký, s jednoduchým, dvojitým, trojitým nebo čtyřnásobným zúžením), což
        má vliv na hmotnost a pevnost.
    spoke_gauge:
      name: Měřidlo drátů
      description: Určuje tloušťku drátu (jmenovitou tloušťku drátu) drátů, se kterými
        je nipl kompatibilní.
    spoke_interface_type:
      name: Typ rozhraní špice
      description: Označuje typ hlavy drátu, pro který je náboj navržen (J-bend, straight-pull,
        T-head).
    spoke_shape:
      name: Tvar drátu/paprsku kola
      description: Určuje vnější průřez drátu paprsku, který ovlivňuje aerodynamiku
        a vzhled.
    spool_form_factor:
      name: Tvarový faktor cívky
      description: Konstrukční provedení těla cívky a způsob uchycení nitě/příze (např.
        s přírubou vs. kuželové).
    spoon_style:
      name: Styl lžíce
      description: Označuje funkční podtyp nebo styl třpytky, například nahazovaná,
        třepetavá nebo trollingová třpytka.
    sports_bra_padding_type:
      name: Typ vnitřního okraje sportovní podprsenky
      description: Určuje druh vnitřního okraje sportovní podprsenky.
    sports_cap_style:
      name: Styl sportovní čepice
      description: Určuje celkovou konstrukci/styl čepice (např. baseballová čepice,
        snapback), bez ohledu na značku týmu.
    sports_governing_body_certification:
      name: Certifikace sportovních řídících orgánů
      description: Označuje oficiální certifikace nebo schválení od uznávaných sportovních
        organizací, které potvrzují, že výrobek splňuje soutěžní normy.
    sports_surface_compatibility:
      name: Kompatibilita se sportovními povrchy
      description: Uvádí typy podkladů, na které lze barvu bezpečně nanášet.
    sports_toy_set_contents:
      name: Obsah sady sportovních hraček
      description: Určuje, jaké komponenty jsou součástí sady sportovních hraček (např.
        míč, pálka, síť, terče).
    spray_string_cleanup_method:
      name: Metoda čištění provázku ve spreji
      description: Doporučený způsob odstranění/čištění zbytků provázku ve spreji.
    spray_string_finish_effect:
      name: Povrch/efekt provázku ve spreji
      description: Vizuální efekt provázku ve spreji po aplikaci (lesk/reflexe a speciální
        efekty).
    spray_string_formulation_type:
      name: Typ složení provázku ve ve spreji
      description: Jak se produkt chová během a po použití spreje (např. omyvatelný
        vs. permanentní).
    spray_string_recommended_surface:
      name: Doporučený povrch pro provázek ve spreji
      description: Typy povrchů, pro které je provázek ve spreji určen k použití (a
        ze kterého ho lze vyčistit).
    spray_string_scent:
      name: Vůně provázku ve spreji
      description: Profil vůně nebo zápachu provázku ve spreji (pokud je nějaký).
    spray_string_suitable_age_group:
      name: Věková skupina pro provázek ve spreji
      description: Doporučený minimální věk/věková skupina uživatele pro bezpečné
        používání.
    spread_consistency:
      name: Konzistence nátěrky
      description: Popisuje strukturu či konzistenci dipu nebo nátěrky, aby si čtenář
        mohl udělat představu o pocitu v ústech a způsobu použití (např. hladká, s
        kousky, našlehaná).
    spread_variety:
      name: Variace nátěrky
      description: Rozlišuje konkrétní druhy ovocných nátěrek (např. džem, želé, marmeláda,
        ovocný krém), aby zákazníci mohli rozlišit různé způsoby přípravy a konzistence.
    spreader_bar_type:
      name: Typ rozpěrné tyče
      description: Uvádí typ rozpěrné tyče nebo systému háků, který je součástí dodávky
        nebo je kompatibilní s postrojem.
    sprint_canoe_class:
      name: Třída závodní kánoe
      description: Určuje oficiální označení třídy pro závody na kánoích.
    sprout_presentation:
      name: Prezentace klíčků
      description: Označuje fyzickou prezentaci produktu (např. čerstvé klíčky, mikrozelenina,
        květináč s rostlinou, prášek).
    squash_and_gourd_variety:
      name: Odrůda dýní a tykví
      description: Identifikuje konkrétní kultivar nebo odrůdu dýně nebo tykve, což
        pomáhá nakupujícím rychle najít požadovaný druh.
    stability_class:
      name: Třída stability
      description: Obecná klasifikace stability odvozená z letových hodnocení nebo
        marketingových tvrzení.
    stabilizer_thread_size:
      name: Velikost závitu stabilizátoru
      description: Závitová specifikace sloužící k připevnění stabilizátoru nebo příslušenství
        k luku nebo kuši.
    stabilizer_type:
      name: Typ stabilizátoru
      description: Určuje typ nebo polohovou klasifikaci stabilizátoru luku nebo kuše.
    stages_supported:
      name: Počet podporovaných stupňů
      description: Udává, s kolika stupni je raketa nebo stavebnice navržena k letu.
    stain_remover_format:
      name: Formát odstraňovače skvrn
      description: Určuje formu dodání/formát produktu používaného k odstraňování
        skvrn z vozidel (rozprašovač, aerosol, pěna, gel, prášek, ubrousky, pero/fix).
    stake_shape:
      name: Tvar kolíku
      description: Určuje průřez nebo konstrukční provedení kolíku do stanu, což ovlivňuje
        jeho přilnavost v různých typech půdy.
    stamp_block_features:
      name: Vlastnosti bloku razítka
      description: Zdůrazňuje funkční prvky bloků razítka, jako jsou měřicí mřížky,
        úchyty nebo protiskluzové povrchy.
    stamp_block_type:
      name: Typ bloku razítka
      description: Určuje konstrukci/typ razítkového bloku, který se používá k uchycení
        razítek (např. průhledný akrylový blok, blok s dřevěnou základnou nebo polohovací
        blok).
    stamp_set_pieces_included:
      name: Kusy obsažené v sadě razítek
      description: Uvádí, jaké součásti jsou součástí sady razítek a razítkových polštářků
        (např. razítka, razítkové polštářky, fixy).
    stand_padding_material:
      name: Materiál vycpávky stojanu
      description: Materiál použitý na styčných místech k ochraně povrchu přístroje
        (např. pěna, guma, silikon).
    staple_fiber_animal_fiber_type:
      name: Typ střižového zvířecího vlákna
      description: Specifický typ vlákna živočišného původu, pokud je typ zdroje stříže
        Zvíře.
    staple_fiber_crimp_level:
      name: Úroveň krimpování střižových vláken
      description: Míra přirozené zvlněnosti vlákna.
    staple_fiber_preparation_type:
      name: Typ přípravy střižových vláken
      description: Stav přípravy/zpracování vlákna v době prodeje (jak je vlákno uspořádáno/zpracováno),
        který má zásadní vliv na způsob spřádání, snadnost protahování a konečný výsledek.
    staple_fiber_source_type:
      name: Typ zdroje střižových vláken
      description: Široká kategorie místa původu vlákna.
    starch_processing_type:
      name: Typ zpracování škrobu
      description: Uvádí, zda se jedná o přírodní škrob, nebo zda byl fyzikálně či
        chemicky upraven (např. instantní, předželatinovaný), aby vykazoval určité
        funkční vlastnosti, jako je rychlost zahušťování nebo teplotní odolnost.
    starch_source:
      name: Zdroj škrobu
      description: Uvádí rostlinný zdroj, z něhož je škrob nebo zahušťovadlo získáváno
        (např. kukuřice, brambory, tapioka). Zdroj je hlavním rozlišovacím znakem
        pro kuchyňské škroby a přímo Impact vhodnost receptů, alergeny a vyhledávací
        chování spotřebitelů.
    starfruit_variety:
      name: Odrůda karamboly
      description: Identifikuje konkrétní kultivar nebo odrůdu karamboly (např. Arkin,
        Fwang Tung).
    starter_drive_type:
      name: Typ pohonu startéru
      description: Typ mechanismu pro zapojení/spuštění startéru, který slouží k záběru
        pastorku s ozubeným věncem.
    starter_pistol_action_type:
      name: Typ závěru startovací pistole
      description: Určuje spouštěcí mechanismus startovací pistole (např. jednočinný,
        dvojčinný, poloautomatický).
    starter_pistol_caliber:
      name: Ráže startovací pistole
      description: Určuje ráži slepých nábojů nebo nábojů, pro kterou je startovací
        pistole určena.
    starter_terminal_type:
      name: Typ svorky startéru
      description: Určuje typ svorky/konektoru používaný pro elektrické připojení
        na startéru nebo solenoidu startéru (např. šroubová svorka, vidlicová svorka,
        zásuvkový konektor).
    starting_block_anchoring_method:
      name: Metoda ukotvení startovacího bloku
      description: Popisuje, jakým způsobem se bloky upevňují k povrchu dráhy (např.
        hroty, přísavky, gumové podložky).
    steerer_tube_design:
      name: Konstrukce řídicí trubky
      description: Popisuje konstrukční provedení řídicí trubky (rovná, zúžená, se
        závitem atd.), které určuje kompatibilitu hlavového složení a rámu.
    steering_cable_end_fitting_type:
      name: Typ koncovky lanka řízení
      description: Určuje typ zakončení/upevnění na koncích řidicího lanka plavidla
        (na straně kormidla a na straně motoru/kormidelní páky), aby byla zajištěna
        kompatibilita s připojovacími body kormidla a motoru. V případě potřeby použijte
        označení normy nebo výrobce.
    steering_column_adjustability_features:
      name: Funkce nastavení sloupku řízení
      description: Uvádí, které funkce nastavení jsou integrovány do sloupku řízení.
    steering_column_ignition_provision:
      name: Zápalování na sloupku řízení
      description: Uvádí, zda je sloupek řízení uzpůsoben pro montáž vložky zámku
        zapalování a/nebo zámku řízení.
    steering_column_shaft_end_interface_type:
      name: Typ rozhraní konce hřídele řízení
      description: Určuje typ spojení na konci hřídele sloupku řízení (např. drážkované,
        Double D, s perem).
    steering_column_shift_type:
      name: Typ řazení ve sloupku řízení
      description: Určuje, zda je na sloupku řízení umístěn řadicí mechanismus, a
        dále uvádí typ převodovky.
    steering_component_drive_type:
      name: Typ pohonu komponenty řízení
      description: Určuje hnací/podpůrný mechanismus související s komponenty řízení
        (zejména čerpadla a systémy EPS).
    steering_position:
      name: Poloha řízení
      description: Určuje, zda má dodávka levostranné nebo pravostranné řízení.
    steering_pump_pulley_type:
      name: Typ řemenice čerpadla u řízení
      description: Určuje typ/rozhraní pohonu řemenice používaného u čerpadla řízení.
    steering_rack_finish_coating:
      name: Povrchová úprava/potažení řízení
      description: Určuje vnější povrchovou úpravu/nátěr pro ochranu proti korozi.
    steering_rack_position:
      name: Pozice řídicího hřebenu
      description: Určuje, kde je držák namontován/používán v systému řízení vozidla.
    steering_wheel_cover_installation_type:
      name: Typ montáže potahu volantu
      description: Jak se potah volantu nasazuje/upevňuje na volant.
    steering_wheel_grip_material:
      name: Materiál povrchu volantu
      description: Určuje materiál, z něhož je vyroben okraj volantu (místo, kde se
        ho dotýkají ruce), který se může lišit od materiálu jádra volantu a jeho paprsků.
    steering_wheel_mounting_pattern:
      name: Schéma montáže volantu
      description: Určuje rozteč upevňovacích otvorů a šroubů, která se používá k
        připevnění volantu k náboji nebo adaptéru (např. 3 šrouby, 5 šroubů).
    steering_wheel_rim_material_grip_surface:
      name: Materiál ráfku volantu (povrch pro uchopení)
      description: Určuje hlavní materiál, z něhož je vyroben obal rukojeti/ráfku
        (na rozdíl od materiálu, z něhož je vyroben celý produkt).
    stem_material:
      name: Materiál dýmky
      description: Udává materiál, z něhož je vyrobena dýmková trubice nebo náustek
        (např. akrylát, ebonit, lucit).
    stencil_machine_consumable_type:
      name: Typ spotřebního materiálu pro šablonový stroj
      description: Uvádí spotřební materiál potřebný k provozu (pokud existuje).
    step_surface_texture:
      name: Povrchová textura schodu
      description: Určuje vzor nebo materiál nášlapné plochy, který má zlepšit přilnavost
        a pohodlí za mokra.
    stepper_motion_type:
      name: Typ krokového pohybu
      description: Definuje primární krokový pohyb, který stroj nabízí.
    stick_bow_profile:
      name: Profil ohybu hole
      description: Určuje profil zakřivení (neboli „typ ohybu“) dříku hokejky, což
        je klíčový faktor ovlivňující ovládání míčku, výkon při drag-flicku a herní
        styl.
    stick_construction:
      name: Konstrukce hole
      description: Určuje konstrukční provedení hokejky, například jednodílná kompozitní,
        dvoudílná kompozitní nebo dřevěná.
    stick_curvature_type:
      name: Typ zakřivení oštěpu
      description: Popisuje profil zakřivení oštěpu, který ovlivňuje délku hodu a
        přesnost.
    stick_head_shape:
      name: Tvar hlavy hokejky
      description: Určuje tvar hlavy hokejky, což má vliv na zachycování puku, styl
        úderu a kontrolu nad pukem v těsné blízkosti.
    stick_size_compatibility:
      name: Kompatibilita velikosti hole
      description: Určuje velikostní skupinu hokejek, pro kterou je produkt určen
        (např. mládež, junioři, středně pokročilí, senioři, brankáři, univerzální).
    sticker_decal_features:
      name: Vlastnosti samolepek/obtisků
      description: Zachycuje vlastnosti použití a výkonu typické pro samolepky (např.
        bez bublin, přemisťovatelné).
    sticker_finish:
      name: Povrchová úprava nálepky
      description: Popisuje povrchovou úpravu/vizuální efekt samolepek.
    sticker_format:
      name: Formát samolepky
      description: Určuje typ balení dekorativních samolepek (např. arch, role, jednotlivé
        kusy, knížka).
    sticker_material_type:
      name: Typ materiálu samolepky
      description: Určuje hlavní podkladový materiál dekorativní samolepky (nikoli
        ozdobné prvky).
    stilt_foot_attachment_type:
      name: Typ uchycení nohy na chůdách
      description: Určuje, jakým způsobem uživatel připevní svoje nohy k chůdám (např.
        přezkou, suchým zipem, šněrováním).
    stirrup_style:
      name: Styl třmenu
      description: Rozlišuje typy třmenů podle jejich konstrukce nebo podle konkrétního
        jezdeckého odvětví, přičemž zohledňuje rozdíly v oblasti bezpečnosti, odvětví
        a konstrukce.
    stirrup_tread_material:
      name: Materiál třmenového nášlapu
      description: Určuje materiál použitý pro nášlapnou plochu třmenu, který ovlivňuje
        pevnost, pohodlí a opotřebení.
    stitch_marker_and_counter_style:
      name: Styl značkovače a počítadla stehů
      description: Určuje typ nebo provedení značkovače nebo počítadla ok/řad (např.
        zajišťovací značkovač, značkovač s rozdělovacím kroužkem, kroužkový počítadlo,
        digitální počítadlo).
    stitch_types:
      name: Typy stehů
      description: Druhy stehů (funkční a ozdobné), které stroj dokáže vyšívat.
    stitching_method:
      name: Metoda šití
      description: Uvádí, jak jsou jednotlivé panely míče spojeny.
    stitching_state:
      name: Stav sešívání
      description: Uvádí, zda jsou díly oděvu dodávány nesešité, částečně sešité,
        sešité nebo jako hotový oděv.
    stock_car_race_series:
      name: Série závodních sériových vozů
      description: Určuje schvalovací orgán nebo závodní sérii/třídu, ve které je
        sériový vůz vyroben.
    stone_adhesion:
      name: Uchycení pecky
      description: Udává, zda se u broskve nebo nektarinky jedná o pecku volnou, přilnutou
        nebo částečně volnou.
    stone_creation_method:
      name: Metoda vytvoření kamene
      description: Uvádí, zda je pecka přírodní, vypěstovaná v laboratoři, umělá nebo
        recyklovaná.
    stone_cut_grade:
      name: Stupeň brusu
      description: Udává celkové hodnocení kvality brusu kamene.
    stone_cut_style:
      name: Styl výbrusu kamene
      description: Styl brusu/fasetování skleněného kamene (např. fasetovaný vs. kabošon).
    stone_fruit_cultivar:
      name: Odrůda peckovin
      description: Určuje konkrétní kultivar/odrůdu broskve nebo nektarinky.
    stone_fruit_variety:
      name: Odrůda peckovin
      description: Rozlišuje poddruh v rámci dané kategorie (např. broskve, nektarinky,
        kulaté/ploché broskve).
    stone_setting_type:
      name: Typ uchycení kamene
      description: Určuje způsob uchycení kamene v šperku (v rámečku, v prstencích,
        v pavé atd.).
    stone_transparency:
      name: Průhlednost kamene
      description: Optická průhlednost/neprůhlednost skleněného kamene.
    storage_case_type:
      name: Typ úložného obalu
      description: Uvádí typ obalu, ve kterém je sada dodávána pro účely skladování
        a přepravy (např. krabice, kufřík, taška).
    storage_compartment_type:
      name: Typ úložného prostoru
      description: Určuje typ úložného prostoru, který plavecká bóje nabízí pro osobní
        věci.
    storage_media_and_transfer_methods_supported:
      name: Podporovaná paměťová média a metody přenosu
      description: Podporovaná média nebo způsoby připojení pro import/export vzorků
        a ukládání/načítání projektů.
    storage_requirements:
      name: Požadavky na skladování
      description: Uvádí, jak by měl být výrobek skladován před a/nebo po otevření,
        aby byla zachována jeho kvalita a bezpečnost.
    stove_jack_compatibility:
      name: Kompatibilita s kamnovými trubkami
      description: Udává, zda je stan vybaven ohnivzdorným otvorem pro kamnovou trubku.
    straight_pin_application:
      name: Použití přímých kolíků
      description: Určuje zamýšlené použití přímých kolíků.
    straight_pin_finish:
      name: Povrchová úprava přímých kolíků
      description: Popisuje povrchovou úpravu nebo povlak kolíku (např. poniklovaný),
        který ovlivňuje odolnost proti korozi a kluznost.
    straight_pin_head_material:
      name: Materiál hlavičky kolíku
      description: Určuje materiál hlavičky kolíku (je-li k dispozici), například
        plast nebo sklo.
    straight_pin_head_shape:
      name: Tvar rovné hlavy čepu
      description: Popisuje tvar/styl hlavy kolíku z hlediska použitelnosti a viditelnosti.
    strand_configuration:
      name: Konfigurace pramenů
      description: Udává, z kolika samostatných řad nebo pramenů se řetízek na peněženku
        skládá (jednořadý, dvouřadý, třířadý).
    strand_material:
      name: Materiál pramene
      description: Určuje materiál použitý pro jednotlivé prameny/stuhy.
    strap_attachment_hardware:
      name: Kování pro uchycení popruhu
      description: Určuje typ/konstrukci hardwaru, který se používá k připevnění popruhu
        k nástroji/opěrnému bodu.
    strap_configuration:
      name: Konfigurace popruhu
      description: Udává počet upevňovacích bodů helmy na popruhu (např. 2bodové,
        4bodové), což má zásadní význam pro správné usazení, bezpečnost a splnění
        ligových požadavků.
    strap_functionality:
      name: Funkce popruhu
      description: Určuje hlavní zamýšlené použití nebo provedení popruhu podložky
        na jógu.
    strap_padding:
      name: Vnitřní okraj popruhu
      description: Udává míru polstrování popruhu, které má zvýšit pohodlí a rovnoměrně
        rozložit zatížení.
    strap_side:
      name: Strana popruhu
      description: Označuje, zda je popruh určen pro levé vázání, pravé vázání nebo
        se prodává ve dvojici.
    strap_width:
      name: Šířka popruhu
      description: Uvádí relativní šířku ramenních popruhů (úzké, střední, široké),
        aby pomohlo zákazníkům, kteří hledají konkrétní krytí nebo oporu.
    strength_classification:
      name: Pevnostní klasifikace
      description: Označení síly, které značky běžně používají (např. lehký, silný,
        extra silný).
    strength_grade:
      name: Stupeň pevnosti
      description: Popisuje zamýšlenou pevnost v tahu/úroveň suchého zipu.
    stretch_level:
      name: Úroveň natažení
      description: Udává, jak moc se textilie při používání natáhne.
    stretch_type:
      name: Typ streče
      description: Udává, zda je látka mechanicky nebo elasticky pružná a v jakém
        směru či směrech.
    stretcher_bar_material:
      name: Materiál rámu
      description: Materiál použitý na napínací lišty/rám (např. borovice, jedle,
        topol, bříza, MDF/dřevotřísková deska).
    strike_shield_shape:
      name: Tvar úderové plochy
      description: Určuje celkový tvar úderové plochy.
    string_core_shape:
      name: Tvar jádra struny
      description: Určuje tvar jádrového drátu používaného u vinutých strun, což ovlivňuje
        pocit při hře a stabilitu.
    string_coverage:
      name: Rozsah strun
      description: Určuje, které struny má částečný kapodastr zakrývat (podle počtu
        nebo společné sady).
    string_end_type:
      name: Typ zakončení struny
      description: Určuje, jakým způsobem je struna zakončena u kobylky/struníku,
        a to z důvodu kompatibility (důležité zejména u akustických a elektrických
        kytar a u některých baskytar).
    string_set_type:
      name: Typ sady strun
      description: Určuje, zda se jedná o kompletní sadu nebo o jednotlivé náhradní
        struny.
    strung_status:
      name: Stav výpletu
      description: Uvádí, zda je hlavice lakrosky dodávána s předem napnutým výpletem
        a kapsou, nebo zda se prodává bez výpletu.
    strut_placement:
      name: Umístění vzpěry
      description: Určuje zamýšlené místo montáže tlumiče na vozidle (vpředu/vzadu
        a vlevo/vpravo).
    stud_attachment_type:
      name: Typ uchycení hřebu
      description: Určuje způsob upevnění nebo uspořádání špuntů na podrážce, což
        má vliv na přilnavost, údržbu a soulad s ligovými pravidly.
    stud_configuration:
      name: Konfigurace hřebů
      description: Určuje tvar a uspořádání výstupků na podrážce, což ovlivňuje přilnavost
        a výkonnost na různém povrchu.
    stud_material:
      name: Materiál hřebu
      description: Identifikuje primární materiál kolíků/zarážek, informuje o trvanlivosti,
        hmotnosti a shodě s bezpečnostními předpisy.
    stuffed_animal_features:
      name: Vlastnosti plyšáka
      description: Představuje hlavní herní a komfortní vlastnosti plyšáka.
    stump_base_type:
      name: Typ základny pálky
      description: Určuje typ základny nebo upevňovacího systému, který pálka využívá
        (hrot, pružinový mechanismus, závaží z gumy atd.).
    stump_mechanism:
      name: Mechanismus brankové tyče
      description: Určuje mechanismus návratu nebo upevnění pálky (např. pružinový,
        pevný).
    stump_size:
      name: Velikost pálky
      description: Kategorický popis velikosti používaný u kriketových pálek, který
        udává typickou výšku a vhodnou věkovou skupinu hráčů.
    subwoofer_installation_type:
      name: Typ instalace subwooferu
      description: Jak má být subwoofer instalován do audiosystému vozidla.
    sugar_cane_variety:
      name: Odrůda cukrové třtiny
      description: Určuje konkrétní kultivar nebo tržní odrůdu cukrové třtiny, což
        může mít vliv na barvu, sladkost a obsah vlákniny.
    sugar_content_level:
      name: Úroveň obsahu cukru
      description: Uvádí celkový obsah cukru nebo složení nápojového koncentrátu,
        což zákazníkům umožňuje rychle najít varianty s běžným obsahem cukru, se sníženým
        obsahem cukru nebo bez cukru.
    sugar_refinement_level:
      name: Stupeň rafinace cukru
      description: Udává stupeň nebo způsob rafinace (barvu, obsah melasy nebo stupeň
        zpracování).
    sugar_source:
      name: Zdroj cukru
      description: Identifikuje botanický nebo materiálový původ, ze kterého je cukr
        získán.
    suit_fit:
      name: Střih obleku
      description: Celkový střih obleku, který udává, jak těsně přiléhá k tělu.
    suit_pieces:
      name: Části obleku
      description: Určuje, kolik sladěných oděvů obsahuje daná sada obleku (např.
        dvoudílný, třídílný, čtyřdílný).
    suitable_for_anchoring_use:
      name: Vhodné pro kotvení
      description: Označuje zamýšlené použití lana/provazu v souvislosti s kotvením.
    suitable_for_craft_type:
      name: Vhodné pro typ řemeslné výroby
      description: Blokovací drát je určen především pro vyšívání.
    suitable_for_paint_type:
      name: Vhodné pro typ barvy
      description: Označuje, pro jaké typy barev je plátno určeno/ je bezpečné používat.
    suitable_for_swim_stroke:
      name: Vhodné pro plavecké styly
      description: Uvádí, pro který plavecký styl je plavecká rukavice určena nebo
        optimalizována.
    suitable_mounting_surface_material:
      name: Vhodný materiál pro montážní povrch
      description: Určuje zamýšlený montážní povrch/materiál, ke kterému má být lepicí
        podklad přilepen.
    suitable_play_location:
      name: Vhodné místo pro hru
      description: Hlavní prostředí, pro která je hračka „mlýn na písek a vodu“ určena.
    suitable_riding_conditions:
      name: Vhodné jezdecké podmínky
      description: Udává jízdní podmínky (např. suché, mokré, zimní), pro které je
        mazivo nebo čisticí prostředek na kolo určen.
    suitable_snow_conditions:
      name: Vhodné sněhové podmínky
      description: Označuje primární sněhové podmínky, pro které je vosk určen.
    suitable_surface_type:
      name: Vhodný typ povrchu
      description: Určuje povrchy, pro které je rukojeť určena.
    suitable_table_size:
      name: Vhodná velikost stolu
      description: Uvádí délku kulečníkového stolu, pro kterou je svítidlo určeno.
    sun_protection_rating_upf:
      name: Stupeň ochrany před sluncem (UPF)
      description: Uvádí certifikovanou úroveň ochrany proti slunečnímu záření (UPF)
        daného oděvu.
    sun_shade_attachment_method:
      name: Metoda uchycení sluneční clony
      description: Jak se sluneční clona připevňuje k oknu/čelnímu sklu.
    sun_shade_style:
      name: Styl sluneční clony
      description: Konstrukce/provedení výrobku pro rozložení a složení sluneční clony.
    sunchoke_variety:
      name: Odrůda slunečnice topinambur
      description: Uvádí konkrétní kultivar nebo odrůdu topinamburu a poskytuje podrobné
        informace pro zahradníky, kuchaře a náročné zákazníky.
    sunflower_oil_variety:
      name: Druh slunečnicového oleje
      description: Určuje složení mastných kyselin nebo odrůdu slunečnicového oleje
        (např. s vysokým/středním obsahem kyseliny olejové, s obsahem kyseliny linolové).
    sunflower_variety:
      name: Odrůda slunečnice
      description: Kultivar/odrůda slunečnice (běžné odrůdy pro řezané květiny).
    support_brace_features:
      name: Vlastnosti ortézy
      description: Seznam významných funkčních vlastností ortézy na zápěstí, jako
        je prodyšný materiál, odnímatelná dlahu nebo nastavitelná kovová výztuž.
    support_leg_count:
      name: Počet opěrných nohou
      description: Počet nohou, které se dotýkají země při použití střelecké podpěry
        (např. monopod, bipod, stativ).
    support_padding:
      name: Polstrování
      description: Uvádí, zda má popruh/podpora integrované polstrování v místech
        kontaktu (krk/rameno/palec).
    support_structure_type:
      name: Typ struktury podpory
      description: Uvádí způsob konstrukce, který zajišťuje stabilitu větrolamu.
    supported_bowling_delivery_types:
      name: Podporované typy hodů při bowlingu
      description: Určuje varianty nadhozu v kriketu, které stroj dokáže simulovat,
        jako jsou nadhozy s vnitřním a vnějším obloukem a různé typy rotace.
    supported_dive_modes:
      name: Podporované režimy potápění
      description: Určuje provozní režimy potápění, které potápěčský počítač podporuje,
        jako například Vzduch, Nitrox nebo Manometr.
    supported_equipment_type:
      name: Podporovaný typ vybavení
      description: Uvádí, pro jaké zimní sportovní vybavení je nosič určen (např.
        lyže, snowboardy, lyžařské hůlky).
    supported_spin_types:
      name: Podporované typy rotace
      description: Určuje, jaké druhy rotace míče může hráč provádět.
    supported_spool_bobbin_types:
      name: Podporované typy cívek
      description: Určuje, pro jaké formáty cívek je elektrický navíječ určen.
    surf_wax_temperature_rating:
      name: Teplotní rozsah surfového vosku
      description: Udává rozsah teplot vody, pro který je vosk určen, a zajišťuje
        tak optimální přilnavost v různých klimatických podmínkách.
    surface_coating_or_finish:
      name: Povrchový nátěr nebo úprava
      description: Uvádí jakoukoli povrchovou úpravu kleští, která slouží k jejich
        ochraně nebo ke zvýšení jejich funkčnosti.
    surface_coating_or_wrap:
      name: Povrchový nátěr nebo obal
      description: Úprava vnějšího povrchu sloužící k lepšímu uchopení a ovládání
        střední tyče (a někdy i ručních tyčí).
    surface_finish:
      name: Povrchová úprava
      description: Popisuje pocit a strukturu povrchu míče, které ovlivňují uchopení
        a pohyb při kontaktním žonglování.
    surface_finish_prep:
      name: Povrchová úprava/příprava
      description: Udává stav třecího povrchu (např. broušený, obráběný, v surovém
        stavu) v době prodeje.
    surface_types_included:
      name: Obsažené typy podkladů
      description: Určuje, jaký podklad sada obsahuje pro kreslení/malování (pokud
        existuje), například plátno, blok papíru, dřevěné desky nebo žádný.
    surfboard_construction:
      name: Konstrukce surfu
      description: Určuje primární konstrukční technologii nebo vrstvu surfového prkna.
    surfboard_tail_shape:
      name: Tvar zadní části surfového prkna
      description: Určuje obrys zadní části prkna, který ovlivňuje ovladatelnost a
        stabilitu.
    suspension_bushing_type:
      name: Typ pouzdra pro zavěšení
      description: Určuje funkci/styl instalace pouzdra zavěšení.
    suspension_configuration:
      name: Konfigurace odpružení
      description: Uvádí, zda je tříkolka vybavena odpružením a kde se nachází.
    suspension_material:
      name: Materiál odpružení
      description: Uvádí materiál řetězů, lan nebo kabelů použitých k zavěšení houpačky.
    suspension_trainer_accessories_included:
      name: Včetně příslušenství pro závěsný trenažér.
      description: Uvádí další položky dodávané v sadě trenažéru (např. kotvu do dveří,
        prodlužovací popruh, úložnou tašku), což zákazníkům pomáhá pochopit, co balení
        obsahuje, a porovnat výhodnost balíčku.
    suspension_trainer_anchor_type:
      name: Typ uchycení závěsného trenažéru
      description: Určuje způsob upevnění nebo úchytný bod, pro který jsou popruhy
        určeny (např. dveře, strop, strom), a informuje tak o kompatibilitě s prostředím
        uživatele.
    suspension_type:
      name: Typ zavěšení
      description: Určuje, zda je vidlice tuhá, nebo zda využívá konkrétní systém
        odpružení (vzduchové, pružinové, hybridní, elastomerové atd.), což jezdcům
        pomáhá přizpůsobit vidlici jejich stylu jízdy.
    sustain_pedal_form_factor:
      name: Provedení sustain pedálu
      description: Popisuje fyzický vzhled sustain pedálu (např. pedál ve stylu klavíru
        vs. kompaktní nožní spínač), který ovlivňuje pocit při hře a zamýšlené použití.
    sustain_pedal_switch_type:
      name: Typ spínače sustain pedálu
      description: Uvádí, zda pedál vysílá momentální signál (udržování tónu po dobu
        stisknutí) nebo přepínací signál (aktivace sešlápnutím).
    sustainability_certification:
      name: Certifikace udržitelnosti
      description: Certifikace v oblasti životního prostředí nebo certifikace původu
        dřevěného materiálu.
    swab_intended_bassoon_section:
      name: Určení části fagotu, pro kterou je čisticí tyčinka určena
      description: Udává, kterou část fagotu má tyčinka čistit (různé vnitřní trubky/části
        vyžadují různé tvary a velikosti tyčinek).
    swab_style:
      name: Styl čisticí tyčinky
      description: Popisuje fyzický tvar a provedení tyčinky, která se používá k pročištění
        nebo dosažení určitých částí nástroje.
    swab_weight_material:
      name: Materiál zatížení tyčinky
      description: Materiál průtažné zátěže/čelního zatížení (je-li součástí), který
        ovlivňuje riziko poškrábání a životnost.
    swab_weight_style:
      name: Typ váhy s tyčinkou
      description: Určuje, jak je čisticí tyčinka zatížena, aby prošla otvorem fagotu.
    sway_bar_adjustability:
      name: Nastavitelnost stabilizátoru
      description: Zda a jak je nastavitelná tuhost stabilizátoru (obvykle pomocí
        několika montážních otvorů koncových ramen).
    sway_bar_coating:
      name: Povlak stabilizátoru
      description: Povrchová úprava nebo nátěr stabilizátoru pro odolnost proti korozi
        a lepší vzhled.
    sway_bar_fitment_front_rear_kit:
      name: Montáž stabilizátoru (přední/zadní/sada)
      description: Označuje, zda je stabilizátor určen pro přední nápravu, zadní nápravu
        nebo se prodává jako sada pro přední a zadní nápravu.
    sweatshirt_pocket_type:
      name: Typ kapsy na mikinu
      description: Popisuje styl kapes na mikině.
    sweet_potato_variety:
      name: Odrůda sladkých brambor
      description: Identifikuje konkrétní kultivar nebo tržní odrůdu batátu.
    sweet_spot_position:
      name: Poloha optimálního úderového bodu
      description: Určuje, kde se na pálce nachází optimální úderový bod, což ovlivňuje
        styl hry a podmínky při odpalu.
    sweetener_presence:
      name: Použití sladidla
      description: Uvádí, zda jsou v ořechovém másle přítomna přidaná sladidla a v
        jakém množství.
    sweetening_type:
      name: Typ slazení
      description: Popisuje, jak je produkt slazen nebo jaká je jeho úroveň sladkosti.
    swim_armband_construction_type:
      name: Typ konstrukce plaveckých rukávků
      description: Určuje konstrukční provedení nebo způsob plavání rukávků (nafukovací
        vs. z pevné pěny, hybridní atd.).
    swim_belt_purpose:
      name: Účel plaveckého pásu
      description: Funkční zařazení plaveckého pásu (např. plavecká pomůcka, aquajogging,
        odporový trénink, statické uchycení, připevnění brzdícího padáku, zátěž, bezpečnostní
        pomůcka při brodění).
    swim_board_features:
      name: Vlastnosti plovací desky
      description: Zdůrazňuje speciální vlastnosti nebo vylepšení plaveckého prkna,
        které zlepšují použitelnost nebo bezpečnost.
    swim_bottom_length:
      name: Délka nohavic plavek
      description: Určuje, jak velkou část nohou plavky zakrývají (např. krátké plavky
        vs. plavky po kolena).
    swim_buoy_features:
      name: Vlastnosti plavecké bóje
      description: Popisuje další významné vlastnosti nebo doplňky, které zvyšují
        viditelnost, bezpečnost nebo užitečnost plavecké bóje.
    swim_cap_style:
      name: Styl plavecké čepice
      description: Určuje konstrukci nebo styl plavecké čepice (např. pro dlouhé vlasy,
        kopulovitá/závodní, bublinová/turbanová).
    swim_diaper_feature:
      name: Vlastnost plavací pleny
      description: Uvádí, zda mají plavky integrovanou nepropustnou plenku, nebo zda
        je nutné použít samostatnou plaveckou plenku.
    swim_trainer_features:
      name: Vlastnosti plaveckého trenažéru
      description: Zdůrazňuje další funkční nebo komfortní vlastnosti plaveckého trenažéru.
    swim_trainer_type:
      name: Typ plaveckého trenažéru
      description: Určuje konstrukční styl nebo formát plaveckého trenažéru, což usnadňuje
        vyhledávání podle designu a účelu tréninku.
    swim_training_focus:
      name: Zaměření plaveckého tréninku
      description: Uvádí hlavní tréninkový cíl, na který je plavecká pomůcka zaměřena
        (např. technika, síla, izolace svalů).
    swim_weight_style:
      name: Styl plavecké zátěže
      description: Klasifikuje tvar plavecké zátěže, což zákazníkům pomáhá rozlišit
        mezi zásadně odlišnými typy produktů v rámci jedné kategorie.
    swimbait_buoyancy:
      name: Vztlak plavky
      description: Udává, jak se plavka chová ve vodním sloupci (plave na hladině,
        vznáší se ve vodě, klesá atd.), což rybářům umožňuje vybrat si návnadu vhodnou
        pro cílovou hloubku a styl navíjení.
    swimbait_style:
      name: Styl plavky
      description: Klasifikuje konstrukci nebo způsob pohybu plavky, například typu
        paddle-tail nebo glide bait.
    swimwear_pieces_included:
      name: Kusy plavek v balení
      description: Uvádí jednotlivé součásti oděvu dodávané v sadě burkin, aby zákazníci
        přesně věděli, co balení obsahuje.
    swimwear_set_pieces_included:
      name: Kusy obsažené v sadě plavek
      description: Uvádí součásti oděvu, které jsou dodávané v sadě burkin, aby zákazníci
        věděli, co přesně dostanou (např. top, legíny, hidžáb/čepici).
    swing_attachment_connection_type:
      name: Houpací nástavec/typ připojení
      description: Způsob upevnění, kterým se houpačka zavěšuje na nosnou konstrukci
        (např. lano, řetěz, popruhy).
    swing_trainer_type:
      name: Typ trenažeru švihu
      description: Klasifikuje typ nebo mechanismus houpacího trenažéru, aby si zákazníci
        mohli rychle vyhledat zařízení, která odpovídají jejich tréninkovým cílům.
    swing_training_objective:
      name: Cíl tréninku švihu
      description: Klasifikuje hlavní zaměření tréninku, mechanismus nebo cíl houpacího
        trenažéru (např. tempo, rychlost, úchop).
    switch_electrical_positions:
      name: Elektrické polohy spínače
      description: Určuje počet a chování elektrických poloh na spínači (např. 3 polohy,
        momentální zapnutí).
    swivel_type:
      name: Typ otočného prvku
      description: Určuje typ otočného mechanismu, díky kterému se vodítko tolik nezamotává.
    sword_scabbard_material:
      name: Materiál pochvy na meč
      description: Určuje primární materiál přiložené pochvy (je-li součástí).
    synthesizer_form_factor:
      name: Provedení syntezátoru
      description: Popisuje formát fyzického/herního rozhraní syntezátoru.
    synthetic_feather_style:
      name: Styl syntetického peří
      description: Styl/sestřih syntetického peří pro různé vzhledy a kreativní tvoření.
    synthetic_formulation_type:
      name: Typ syntetické báze oleje
      description: Upřesňuje typ syntetické báze/složení oleje (např. PAO, ester,
        hydrokrakát skupiny III).
    syrup_base_ingredient:
      name: Základní přísada sirupu
      description: Identifikuje primární rostlinu nebo zdroj cukru, ze kterého se
        sirup nebo nektar získává (např. javor, agáve, třtinový cukr).
    syrup_variety:
      name: Druh sirupu
      description: Definuje obecně druh nebo kategorii sirupu na základě jeho složení
        nebo tradičního použití (např. javorový, ovocný, léčivý, do kávy).
    t_shirt_fit:
      name: Střih trička
      description: Popisuje zamýšlený střih trička.
    tabla_included_components:
      name: Komponenty bubnů tabla
      description: Označuje, které základní položky jsou součástí daného bubnu tabla
        (jeden buben nebo sada, obaly, ladicí klíč atd.).
    tabla_set_pieces_included:
      name: Kusy obsažené v sadě tabla
      description: Označuje, které komponenty jsou součástí sady bubnů tabla (např.
        dayan, bayan, kruhy, ochranné obaly, ladicí nástroje, přepravní pouzdro).
    tabla_tonal_pitch_range_bayan:
      name: Rozsah ladění bubnu tabla (bayan)
      description: Popisuje typickou kategorii tónových výšek pro bubny bayan (basy)
        na základě jejich velikosti a konstrukce.
    table_base_material:
      name: Materiál podstavce stolu
      description: Uvádí hlavní materiál podnože nebo podstavce stolu (nikoli noh
        nebo desky stolu), což usnadňuje filtrování podle materiálu.
    table_base_type:
      name: Typ podnože ke stolům
      description: Upřesňuje provedení konstrukce, která podepírá desku stolu (např.
        podstavec, kozlík, podnož ve tvaru X).
    table_coverage_position:
      name: Poloha stolu k zakrytí
      description: Upřesňuje, pro kterou polohu (polohy) pingpongového stolu – složenou,
        hrací, nebo obě – je ochranný potah nebo kryt navržen.
    table_hockey_part_type:
      name: Typ dílu stolního hokeje
      description: Udává konkrétní typ dílu různých typů stolního hokeje.
    table_leg_design:
      name: Tvar noh ke stolům
      description: Udává konstrukční styl nebo geometrii nohy, aby si nakupující mohli
        vybrat vhodný typ z hlediska estetiky i potřebné opory.
    table_size:
      name: Velikost stolu
      description: Výrobcem udávaná celková velikost kulečníkového stolu (ve stopách).
        Nakupující si může rychle vybrat z běžných variant, jako jsou barové (hospodské)
        stoly o délce 7 stop nebo turnajové stoly o délce 9 stop.
    table_size_category:
      name: Kategorie velikosti stolu
      description: Rozděluje stolní fotbálek do kategorií podle celkové plochy. Nakupující
        tak nemusí řešit přesné rozměry, ale řídí se velikostí prostoru, který mají
        k dispozici.
    table_tennis_certification:
      name: Certifikace pro stolní tenis
      description: Uvádí oficiální normy nebo certifikace, které produkt splňuje (např.
        normy federace ITTF, třídy normy EN 14468-2).
    tabletop_tilt_function:
      name: Funkce naklonění desky stolu
      description: Upřesňuje, zda se deska stolu může naklánět, překlápět nebo otáčet
        do různých úhlů.
    tackle_components_included:
      name: Komponenty vybavení v balení
      description: Uvádí konkrétní součásti rybářské výstroje, které jsou součástí
        sady, aby nakupující věděli, co přesně je dodáváno.
    talking_drum_accessories_included:
      name: Součástí dodávky je příslušenství pro mluvící bubny
      description: Uvádí, jaké příslušenství je dodáváno s mluvícím bubnem (v balení).
    talking_drum_cord_material:
      name: Materiál šňůry pro mluvící buben
      description: Materiál použitý na napínací šňůry, které spojují blány na bubnech.
    talking_drum_tuning_mechanism:
      name: Ladicí mechanismus mluvícího bubnu
      description: Jak se buben ladí (tónová výška, napětí blány) během hraní nebo
        před hraním.
    tam_tam_construction_style:
      name: Provedení tamtamu
      description: Konstrukce / styl tepání tamtamu.
    tam_tam_items_included:
      name: Součásti balení tamtamu
      description: Příslušenství dodávané spolu s tamtamem (např. palička, stojan,
        ochranný obal).
    tamarillo_variety:
      name: Odrůda rajčenky
      description: Upřesňuje odrůdu nebo barevnou variantu tamarilla.
    tamarind_variety:
      name: Odrůda tamarindu
      description: Upřesňuje botanickou nebo komerční odrůdu tamarindu, která může
        ovlivňovat chuť, texturu a kulinářské využití tohoto ovoce.
    tambourine_frame_style:
      name: Styl rámu tamburíny
      description: Popisuje konstrukci rámu, za který se tamburína v ruce drží a na
        který se hraje.
    tambourine_head_material:
      name: Materiál hlavy tamburíny
      description: Upřesňuje materiál blány (membrány) u tamburín s blánou.
    tambourine_jingle_configuration:
      name: Konfigurace činelek na tamburíně
      description: Jak jsou činelky uspořádány nebo připevněny na tamburíně.
    tambourine_jingle_material:
      name: Materiál činelek na tamburíně
      description: Upřesňuje materiál, ze kterého jsou činelky (kovové plíšky) vyrobeny,
        protože tento materiál ovlivňuje jejich tón a životnost.
    tambourine_mounting_type:
      name: Typ držení tamburíny
      description: Jak se má tamburína při hraní držet nebo jak se má namontovat.
    tambourine_tuning_mechanism:
      name: Ladicí mechanismus tamburíny
      description: Upřesňuje systém ladění určený pro laditelné ruční tamburíny (pokud
        je to relevantní).
    tank_model_scale:
      name: Měřítko modelu tanku
      description: Upřesňuje měřítko, ve kterém je model tanku vyroben (např. 1:35,
        1:72).
    tank_top_back_style:
      name: Styl tílka zezadu
      description: Upřesňuje tvar nebo střih zadní části tílka, které ovlivňují poskytovanou
        oporu, volnost pohybu a estetickou funkci.
    tape_application_area:
      name: Oblast aplikace pásky
      description: Udává, na jakou část vybavení nebo část těla hráče má být páska
        aplikována, aby si nakupující mohli vybrat správný typ.
    tape_finish:
      name: Povrchová úprava pásky
      description: Povrchová/vizuální úprava pásky (lesk nebo textura).
    tape_purpose:
      name: Účel pásky
      description: Upřesňuje základní funkční využití pásky k údržbě rakety nebo k jejímu
        přizpůsobení.
    tape_type:
      name: Typ pásky
      description: Klasifikuje pásku podle funkce nebo provedení do kategorií jako
        tkanina, průhledný polyethylen, gripová, strečová, na holeně nebo semišová.
    tapenade_main_ingredients:
      name: Hlavní ingredience tapenády
      description: Upřesňuje primární základní ingredienci, která tapenádu definuje
        (olivy, rajčata, lilek, paprika atd.). Tuto informaci ocení nakupující, kteří
        si vybírají podle oblíbených surovin nebo na základě svých stravovacích omezení.
    tapestry_loom_loom_format:
      name: Provedení gobelínového tkalcovského stavu
      description: Celkový tvar konstrukce / styl stojanu gobelínového tkalcovského
        stavu.
    tapestry_loom_shedding_method:
      name: Způsob prošlupování na gobelínovém tkalcovském stavu
      description: Jak se na tkalcovském stavu vytváří prošlup (který odděluje nitě
        osnovy) pro procházení útku.
    tapestry_loom_tensioning_system:
      name: Systém napínání gobelínu
      description: Způsob, jakým se napíná a upevňuje osnova na gobelínovém tkalcovském
        stavu.
    tar_head_material:
      name: Materiál blány bubnu tar
      description: Udává materiál blány (membrány) na bubnu tar, který silně ovlivňuje
        pocit při hraní, tón bubnu a životnost blány.
    tar_playing_style:
      name: Styl hraní na bubnu tar
      description: Upřesňuje hlavní pozici/techniku hraní, pro kterou je daný buben
        tar určen.
    tar_tuning_system:
      name: Systém ladění bubnu tar
      description: Upřesňuje, jak se buben tar ladí (jak se napíná blána).
    target_components:
      name: Komponenty terče
      description: Upřesňuje, které komponenty sání paliva/vzduchu má produkt čistit.
    target_relative_humidity_rh:
      name: Cílová relativní vlhkost (RV)
      description: Zamýšlená cílová relativní vlhkost, kterou má produkt uvnitř nástroje /
        v pouzdru s nástrojem udržovat.
    target_resetting_mechanism:
      name: Mechanismus obnovení terče
      description: Popisuje, jak se terč po zásahu vrátí do původní polohy, nebo zda
        se vůbec vrátí.
    target_trainer_type:
      name: Typ tréninkového terče
      description: Klasifikuje celkový styl nebo podobu trenažéru na raketbal nebo
        squash.
    targeted_contaminants:
      name: Likvidované kontaminanty
      description: Druhy mikrobů nebo parazitů, k jejichž likvidaci je produkt certifikován.
    targeted_muscle_group:
      name: Cílová svalová skupina
      description: Hlavní svalová skupina, pro kterou je toto příslušenství určeno
        za účelem tréninku nebo opory.
    taro_variety:
      name: Odrůda tara
      description: Upřesňuje odrůdu, druh nebo obchodní název nabízeného kořene taro
        (např. Purple Taro, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Typ uchycení lemovky s třásněmi
      description: Upřesňuje řešení horní části / uchycení lemovky k podkladu (např.
        páska, prýmek, šňůrka).
    tassel_trim_use_case:
      name: Použití třásňové lemovky
      description: Primárně určeno na lemy s třásněmi.
    taste_profile:
      name: Profil chuti
      description: Popisuje dominantní chuťové vlastnosti odrůdy jablek.
    tea_variety:
      name: Druh čaje
      description: Udává konkrétní druh čaje (např. černý, zelený, matcha, rooibos),
        takže si nakupující mohou filtrovat své oblíbené chutě.
    teasing_tool_style:
      name: Typ nástroje na česání vlny
      description: Konstrukční typ nástroje na rozčesávání vláken (např. kartáč, hrábě,
        hřeben).
    tee_base_style:
      name: Typ základny vykopávací podložky
      description: Udává konstrukční řešení základny vykopávací podložky (kopátka)
        na rugby, na kterou se staví míč.
    temper_hardness:
      name: Tvrdost
      description: Udává, jak je drát měkký nebo tvrdý (jak dobře drží tvar).
    temperature_control_type:
      name: Typ regulace teploty
      description: Udává způsob ovládání/nastavování teploty nástroje.
    tenkara_action_ratio:
      name: Poměr akce prutu
      description: Označuje poměr ohybu u prutů Tenkara, který popisuje, kde se prut
        při zatížení ohýbá (např. 6:4).
    tennis_ball_court_surface:
      name: Povrch tenisového kurtu
      description: Upřesňuje, na jaký povrch (povrchy) je míček určen, aby byla zajištěna
        jeho optimální výkonnost a životnost.
    tennis_ball_pressure_type:
      name: Typ tlaku tenisového míčku
      description: Udává vnitřní tlak nebo konstrukci míčku (tlakový, beztlakový,
        nízkotlaký, pěnový), které ovlivňují jeho odraz a životnost.
    tennis_racket_grip_size:
      name: Velikost rukojeti tenisové rakety
      description: Upřesňuje standardizovaný obvod rukojeti rakety (L0–L5 nebo ekvivalenty
        v palcích), aby raketa dobře padla do ruky a pohodlně se držela.
    tenor_flutophone_fingering_system:
      name: Prstoklad tenorového flutofonu
      description: Udává prstoklad, který se používá při hře na tenorový flutofon
        (učební osnovy / notový zápis).
    tenor_recorder_joint_type:
      name: Typ spojení dílů tenorové zobcové flétny
      description: Uvádí typ spojení mezi jednotlivými částmi tenorové zobcové flétny.
    tenor_saxophone_key_system:
      name: Klapkový systém tenorsaxofonu
      description: Upřesňuje použitý systém/standard rozmístění klapek (u saxofonů
        často označovaný jako francouzský/Boehmův klapkový systém).
    tenor_saxophone_pad_material:
      name: Materiál podlepek na tenorsaxofon
      description: Určuje primární materiál použitý pro klapky nástroje.
    tenor_trombone_slide_type:
      name: Typ snižce tenorového trombonu
      description: Typ snižce použitého u tenorového pozounu (např. standardní/přímý
        nebo s ventilem typu trigger / axial flow).
    tenor_trombone_valve_configuration:
      name: Konfigurace ventilů tenorového pozounu
      description: Udává, zda má tenorový pozoun ventil / rotační ventil a jakou konfiguraci
        používá.
    tension_control_type:
      name: Typ regulace napětí
      description: Udává, jak (nebo zda) člunek při odvíjení příze umožňuje nastavitelný
        odpor/napínání na cívce.
    tension_mechanism:
      name: Mechanismus napínání
      description: Způsob napínání, kterým se řídí podávání útku z cívky během tkaní.
    tension_pitch_modulation_system:
      name: Modulace napětí a výšky tónu
      description: Jak se u mluvícího bubnu mění výška tónu a napětí blány během hry
        (například stisknutím napínacích šňůr).
    tension_system:
      name: Systém napínání
      description: Systém napínání/utahování kolovratu, pro který je navíječ určen.
    tent_fabric_material:
      name: Materiál látky stanu
      description: Udává hlavní materiál tropika / vnitřního stanu, který ovlivňuje
        hmotnost, prodyšnost a odolnost stanu proti povětrnostním vlivům.
    tent_season_rating:
      name: Sezónnost
      description: Klasifikuje stan podle počtu ročních období nebo povětrnostních
        podmínek, pro které je určen (např. 3sezónní, 4sezónní, expediční).
    tent_setup_type:
      name: Typ stavby stanu
      description: Udává způsob stavby stanu, například samonosný, polosamonosný,
        nesamonosný, nafukovací / s nafukovací konstrukcí nebo samorozkládací stan.
    tent_style:
      name: Provedení stanu
      description: Popisuje konstrukční řešení stanu (např. kopule, tunel, „áčko“).
    test_result_output_method:
      name: Způsob prezentace výsledků testu
      description: Upřesňuje, jak tester autobaterií zobrazuje nebo dodává uživateli
        výsledky testu (např. kontrolky, obrazovka, tiskový výstup, aplikace nebo
        softwarový výkaz).
    tether_strap_system:
      name: Upínací prvky
      description: Typ systému propojení chrániče krku s helmou/postrojem (pokud je
        to relevantní).
    text_color:
      name: Barva textu
      description: Barva tištěného nebo vyšívaného textu na štítku, odlišná od barvy
        pozadí na štítku.
    textile_craft_machine_operation_type:
      name: Obsluha textilního stroje
      description: Jak se stroj ovládá (ruční vs. nožní vs. motorový/elektrický).
    textile_finish_treatment:
      name: Textilní úprava
      description: Upřesňuje podstatné povrchové úpravy aplikované na textilní materiál.
    texture_inclusions:
      name: Prvky textury
      description: Udává přidané prvky, které obohacují texturu, jako je dužina aloe
        vera, semínka bazalky, kokosový olej, praskací kuličky nebo kousky ovoce.
    therapeutic_technology:
      name: Terapeutická technologie
      description: Upřesňuje jakékoli integrované fyzioterapeutické funkce, jako je
        chladicí gel, magnetické proužky nebo infračervená keramika.
    thermal_set_components:
      name: Komponenty sady termoprádla
      description: Určuje, zda produkt obsahuje pouze spodní díl, pouze vrchní díl,
        nebo oba kusy jako sadu.
    thermal_weight:
      name: Hřejivost
      description: Udává kategorii hřejivosti tkaniny, z níž je kukla vyrobena.
    thermostat_type:
      name: Typ termostatu
      description: Provedení nebo ovládání termostatu chladicího systému motorového
        vozidla.
    thimble_guide_size:
      name: Velikost náprstku
      description: Označuje velikost náprstku, obvykle se udává jako S/M/L, a nikoli
        jako přesný rozměr.
    thread_connection_size:
      name: Velikost závitu
      description: Definuje technické parametry závitu, který spojuje násady, hroty
        a adaptéry (např. 6 mm, 5/16"-24).
    thread_construction:
      name: Konstrukce vlákna
      description: Jak je vlákno vyrobeno nebo ošetřeno (např. vyšívací příze z oddělitelných
        vláken vs. lepená nit).
    thread_cord_type_beading_pattern:
      name: Typ vlákna/šňůrky (korálkování)
      description: Doporučený typ vlákna nebo šňůrky na navlékání korálků.
    thread_cutter_form_factor:
      name: Provedení odstřihovače nití
      description: Udává provedení odstřihovače nití, například ruční nůžtičky, přívěsek
        nebo prsten.
    thread_cutter_mechanism:
      name: Mechanismus odstřihávání
      description: Popisuje odstřihávání nebo způsob fungování odstřihovače nití.
    thread_cutter_safety_features:
      name: Bezpečnostní prvky odstřihovače nití
      description: Označuje zabudované bezpečnostní prvky, které snižují riziko náhodného
        pořezání nebo chrání čepele při skladování.
    thread_cutter_usage_application:
      name: Použití odstřihovače nití
      description: Uvádí hlavní zamýšlené použití odstřihovače nití v rámci rukodělných
        činností.
    thread_finish_treatment:
      name: Povrchová úprava / ošetření nitě
      description: Povrchová úprava nebo ošetření vlákna, které ovlivňují manipulaci
        a funkci (např. voskované, lepené, mercerované).
    thread_material:
      name: Materiál nitě
      description: Hlavní materiál nitě/příze (nikoli tkaniny).
    thread_material_fiber:
      name: Materiál nitě (vlákno)
      description: Upřesňuje hlavní materiál nitě/příze (ne tkaniny).
    thread_package_format:
      name: Typ návinu
      description: Forma návinu nitě (např. cívka, konus, špulka).
    thread_rack_compatible_spool_type:
      name: Typ cívky kompatibilní se stojanem na nitě
      description: Typ cívek, na které je stojan navržen (cívky, konusy atd.).
    thread_standard_size:
      name: Standardní velikost nitě
      description: Udává normu označení síly (jemnosti) nitě uvedené na produktovém
        štítku (např. wt, Tex, denier).
    thread_type:
      name: Typ nitě
      description: Upřesňuje konstrukci/typ vyšívací příze určené pro křížkovou výšivku.
    thread_weight_system:
      name: Systém síly (jemnosti) nití
      description: Norma používaná k označení síly (jemnosti) nitě.
    thread_yarn_guide_mounting_attachment_style:
      name: Typ upevnění vodiče nitě/příze
      description: Popisuje, jak se vodič nosí nebo připevňuje k použití.
    thread_yarn_guide_tension_control:
      name: Kontrola napínání nitě/příze na vodiči
      description: Udává, zda a jak lze na vodiči přizpůsobit napínání/odpor nitě
        nebo příze.
    thread_yarn_organizer_features:
      name: Funkce organizéru na nitě a příze
      description: Zdůrazňuje praktické uspořádání a přenosnosti úložného prostoru
        na nitě/přízi.
    threader_intended_use:
      name: Zamýšlené použití navlékače
      description: Udává hlavní kreativní využití, ke kterému je navlékač nití určen.
    threading_system:
      name: Systém navlékání nití
      description: Označuje způsob navlékání nitě do šicího stroje a příslušné pomůcky
        (např. ruční, podle barev, naváděné, pneumatické).
    threading_type:
      name: Typ navlékání
      description: Udává, zda šperk využívá vnitřní závity, vnější závity, bezzávitové
        uchycení nebo nelze použít.
    throttle_type_scooter_conversion:
      name: Typ ovládání plynu (přestavba koloběžky)
      description: Upřesňuje provedení/rozhraní pro ovládání plynu, které je součástí
        přestavbové sady nebo které přestavba vyžaduje.
    throw_rope_end_attachment:
      name: Zakončení záchranného házecího lana
      description: Spojovací zakončení nebo smyčka na pracovním konci (koncích) házecího
        lana.
    throw_rope_storage_packaging_type:
      name: Úložný prostor na házecí lano / typ balení
      description: Jak se házecí lano skladuje nebo nasazuje (např. vak nebo naviják).
    throw_rope_visibility_features:
      name: Viditelnost házecího lana
      description: Prvky, které zlepšují viditelnost a identifikaci lana ve vodě /
        za šera.
    thrower_operation_type:
      name: Typ ovládání vrhače
      description: Klasifikuje mechanismus/obsluhu vrhače k rychlému výběru ručního
        nebo automatického řešení.
    thumb_design:
      name: Provedení palce
      description: Popisuje, jak je palec začleněn do rukavice, což ovlivňuje bezpečnost
        a úchop.
    tiara_design:
      name: Design tiáry
      description: Upřesňuje celkový styl nebo siluetu tiáry.
    tie_down_points_straps_included:
      name: Úchyty / upínací popruhy jsou součástí balení
      description: Udává, zda jsou součástí nosiče úchyty nebo upínací popruhy k zajištění
        motocyklu/skútru.
    tiling_format:
      name: Formát rozložení na stránky
      description: Určuje styl rozvržení souboru PDF pro tisk k následnému sestavení
        stránek.
    time_current_characteristic:
      name: Časově-proudová charakteristika
      description: Označuje chování pojistky v závislosti na čase a proudu (např.
        rychlá vs. zpožděná), což ovlivňuje její vhodnost pro obvody s nárazovým zapínacím
        proudem.
    timer_count_mode:
      name: Režim časovače
      description: Upřesňuje režim časovače, například odpočítávání, připočítávání
        (stopky), obojí nebo intervaly/opakování.
    timer_display_type:
      name: Typ zobrazení časovače
      description: Označuje, jak časovač zobrazuje zbývající čas hry (např. digitální
        displej, analogový ciferník, přesýpací hodiny nebo jej nijak nezobrazuje).
    timer_operating_modes:
      name: Provozní režimy časovače
      description: Režimy časovače dostupné ke spouštění efektů.
    timing_belt_construction_material_rubber_compound:
      name: Materiál rozvodového řemene (pryžová směs)
      description: Hlavní pryžová směs rozvodového řemene (např. HNBR), která ovlivňuje
        jeho odolnost proti teplu/oleji a životnost.
    timing_belt_profile:
      name: Profil rozvodového řemene
      description: Standardní profil/tvar zubů rozvodového řemene (např. lichoběžníkový
        vs. obloukový).
    timing_belt_reinforcement_cord_material:
      name: Materiál výztužných vláken rozvodového řemene
      description: Upřesňuje materiál vnitřních výztužných vláken v rozvodovém řemeni
        (např. sklolaminát, aramid), který ovlivňuje pevnost a roztažnost řemene.
    timing_component_material:
      name: Materiál komponenty časování
      description: Hlavní materiál rozvodového dílu (směs řemene, kov řetězu / ozubeného
        kola, materiál krytu).
    tin_whistle_body_material:
      name: Materiál těla irské flétny
      description: Udává materiál těla irské flétny podrobněji, než uvádí obecný údaj
        o materiálu nástroje.
    tin_whistle_bore_type:
      name: Typ vývrtu irské flétny
      description: Specifikuje způsob vývrtu irské flétny.
    tin_whistle_included_accessories:
      name: Příslušenství irské flétny v balení
      description: Příslušenství, které je dodáváno s irskou flétnou (např. obal,
        vytěrák).
    tip_finish_coating:
      name: Povrchová úprava/povlak špičky
      description: Upřesňuje povrchovou úpravu pracovního konce (např. pochromování,
        práškové lakování), která ovlivňuje odolnost proti korozi a riziko poškození
        ráfku.
    tip_shape:
      name: Tvar špičky
      description: Popisuje tvar nebo ostrost špičky trsátka na kytaru, která ovlivňuje
        charakter úhozu a pocit při hře.
    tippet_rating:
      name: Hodnocení návazce
      description: Maximální doporučená pevnost návazce vyjádřená označením X (např.
        4X) pro muškaření.
    tire_changer_operation_type:
      name: Typ ovládání stroje na výměnu pneumatik
      description: Upřesňuje, jak se ovládá/obsluhuje stroj na výměnu pneumatik (např.
        ruční, pneumatický, hydraulický). Nejde o obecný atribut „Zdroj energie“;
        používá se k popisu způsobu ovládání stroje.
    tire_changer_type:
      name: Typ stroje na výměnu pneumatik
      description: Obecně obsluha, konstrukce nebo úroveň automatizace stroje na výměnu
        pneumatik.
    tire_compound_type:
      name: Typ směsi pneumatiky
      description: Upřesňuje klasifikaci pryžové směsi použité v pneumatikách (např.
        měkká, do deště, hladká), která ovlivňuje přilnavost a odolnost za různých
        podmínek.
    tire_load_range:
      name: Rozsah nosnosti pneumatiky
      description: Udává rozsah nosnosti pneumatiky (běžně u pneumatik lehkých nákladních
        vozidel) a odráží kapacitu zatížení nákladem.
    tire_position:
      name: Poloha pneumatiky
      description: Doporučená pozice montáže na vozidle.
    tire_repair_kit_components:
      name: Komponenty sady na opravu pneumatik
      description: Upřesňuje položky obsažené v sadě, aby si zákazníci mohli porovnat,
        co všechno je její součástí.
    tire_sidewall_type:
      name: Typ bočnice pneumatiky
      description: Upřesňuje provedení a konstrukční prvky bočnice.
    tire_speed_rating:
      name: Rychlostní index pneumatiky
      description: Písmeno označuje rychlostní index pneumatiky (např. H, V, W) odpovídající
        maximální trvale udržitelné rychlosti.
    tire_spoon_type:
      name: Typ montpáky na pneumatiky
      description: Kategorizuje montpáky na pneumatiky podle tvaru konců a zamýšleného
        použití.
    tire_system_compatibility:
      name: Kompatibilita s typem pneumatikového systému
      description: Udává, zda je tmel určen pro bezdušové pneumatiky, dušové pneumatiky
        nebo pro oba typy.
    tire_temperature_rating_utqg:
      name: Teplotní index pneumatik (UTQG)
      description: Třída teplotní odolnosti UTQG pro automobilové pneumatiky (např.
        A, B, C).
    tire_traction_rating_utqg:
      name: Trakční index pneumatik (UTQG)
      description: Stupeň přilnavosti UTQG při brzdění na mokru.
    tire_tread_style:
      name: Styl dezénu pneumatiky
      description: Popisuje obecný vzorek dezénu galuskové pneumatiky. Odráží terén,
        pro který je určen, a trakční vlastnosti.
    tire_tube_type:
      name: Typ duše pneumatiky
      description: Zda je pneumatika určena k použití s duší nebo bez duše.
    title_status:
      name: Stav vlastnického listu
      description: Právní/registrační stav vozidla.
    tobacco_application:
      name: Způsob použití tabáku
      description: Udává zamýšlený způsob konzumace nebo zařízení ke kouření, pro
        které je sypaný tabák určen.
    tobacco_cut_type:
      name: Typ řezu tabáku
      description: Upřesňuje fyzický řez nebo přípravu sypaného tabáku, což obojí
        ovlivňuje rychlost hoření, způsob balení a celkový zážitek z kouření.
    tobacco_strength:
      name: Síla tabáku
      description: Udává vnímané tělo tabáku nebo nikotinový účinek tabáku při konzumaci,
        což nakupující pomáhá s výběrem preferované intenzity.
    toe_construction:
      name: Konstrukce špičky
      description: Upřesňuje konstrukci neoprenových bot v oblasti prstů, která ovlivňuje
        rovnováhu, cit pro prkno a vnímání tepla.
    toe_coverage:
      name: Krytí špičky
      description: Udává typ provedení špičky u ponožky.
    toe_pick_style:
      name: Typ zoubků
      description: Popisuje provedení zoubků na špičce bruslařských čepelí.
    toe_protection_type:
      name: Typ ochrany špičky
      description: Uvádí, zda a jak je oblast špičky z bezpečnostních důvodů vyztužena
        (např. ocelová špička, měkká špička).
    toe_reinforcement_type:
      name: Typ vyztužení špičky
      description: Uvádí informace o konstrukci špičky, která ovlivňuje odolnost a kompatibilitu
        s botou.
    toe_stop_stem_thread_size:
      name: Velikost závitu dříku brzdy
      description: Udává velikost závitu dříku brzdy, aby byla zajištěna kompatibilita
        s podvozkem brusle.
    tofu_preparation_style:
      name: Styl přípravy tofu
      description: Klasifikuje tradiční typy nebo podtypy tofu z jiných hledisek,
        než je pevnost (např. jako hedvábné, v bloku, nadýchané, tofu kůže, uzlíky,
        fermentované).
    tom_mount_adjustment_features:
      name: Funkce nastavení držáku tomu
      description: Upřesňuje, jaké možnosti držák tomu nabízí pro nastavení polohy
        bubnu (např. náklon, otáčení, výška).
    tom_mount_components_included:
      name: Komponenty uchycení tom v balení
      description: Udává, které díly jsou součástí balení držáku na tom (přijímač,
        rameno, kulový kloub, objímky, paměťové zámky atd.).
    tom_mount_mounting_position:
      name: Montážní poloha držáku tomu
      description: Upřesňuje, kam se má držák tomu připojit (např. basový buben, stojan
        na činely, rack).
    tonneau_cover_mounting_style:
      name: Styl montáže krytu korby
      description: Udává, jak se kryt korby instaluje/připevňuje k bočnicím korby
        nákladního prostoru.
    tool_case_form_factor:
      name: Typ kufru na nářadí
      description: Udává fyzický vzhled kufru na nářadí, který má vliv na přenosnost
        a skladování nářadí (např. aktovka, pevná skořepina).
    tool_functions_included:
      name: Obsažené funkce nářadí
      description: Uvádí konkrétní úkony opravy nebo údržby, které může víceúčelové
        nářadí nebo sada nářadí zvládat.
    top_bunk_access_method:
      name: Přístup k horní palandě
      description: Specifikuje, jak se lidé dostanou k horní palandě, což napomáhá
        bezpečnosti a řeší velikost prostoru.
    top_fit:
      name: Střih vrchního dílu
      description: Upřesňuje celkovou siluetu nebo střih horního dílu (např. slim
        nebo oversized).
    top_hat_style:
      name: Styl cylindru
      description: Identifikuje specifickou stylovou variantu cylindru.
    top_soundboard_material:
      name: Materiál vrchní (rezonanční) desky
      description: Specifikuje materiál vrchní/rezonanční desky kytary (hlavní deska
        vytvářející tón).
    topping_form:
      name: Podoba polevy
      description: Definuje provedení nebo konzistenci polevy na dezert, aby si nakupující
        mohli rychle vybrat vhodnou polevu pro požadovaný účel.
    topping_type:
      name: Typ polevy
      description: Uvádí hlavní polevu nebo jiné zdobení donutu.
    tow_hook_type:
      name: Typ tažného háku
      description: Označuje, zda je kneeboard opatřen integrovaným tažným hákem, a specifikuje
        typ jeho mechanismu.
    tow_point_configuration:
      name: Konfigurace tažného bodu
      description: Upřesňuje rozmístění tažných bodů (jeden, dva, více bodů), které
        nabízí tažená atrakce pro různé způsoby jízdy.
    tow_strap_protective_features:
      name: Ochranné prvky tažného popruhu
      description: Popisuje bezpečnostní prvky integrované do konstrukce tažného popruhu,
        které zvyšují také jeho odolnost.
    tow_strap_type:
      name: Typ tažného popruhu
      description: Uvádí funkci tažného popruhu, například statický tažný popruh vs.
        kinetický vyprošťovací popruh.
    towable_tube_style:
      name: Typ tažené atrakce
      description: Uvádí obecně design nebo tvar tažené atrakce, který určuje polohu
        jezdce a zážitek z jízdy.
    towed_water_sport_discipline:
      name: Disciplína vlečného vodního sportu
      description: Určuje hlavní vlečný vodní sport, pro kterou jsou rukavice určeny.
    towel_features:
      name: Vlastnosti ručníku
      description: Uvádí speciální vlastnosti nebo prvky ručníku.
    towel_style:
      name: Typ ručníku
      description: Klasifikuje funkční provedení nebo formát golfového ručníku.
    toy_airplane_control_type:
      name: Typ ovládání modelu letadla
      description: Upřesňuje, jakým způsobem uživatel model letadla (hračku) ovládá.
    toy_airplane_features:
      name: Vlastnosti modelu letadla
      description: Popisuje hlavní herní prvky modelu letadla.
    toy_airplane_flight_capability:
      name: Funkce létání modelu letadla
      description: Udává, zda je model letadla navržen ke skutečnému létání/klouzání,
        nebo je primárně určen k hraní na zemi / k vystavení.
    toy_audio_features:
      name: Zvukové funkce hračky
      description: Uvádí zvukové funkce a zvukové efekty hračky.
    toy_boat_play_features:
      name: Vlastnosti lodičky na hraní
      description: Popisuje hlavní interaktivní prvky lodiček na hraní, které usnadňují
        jejich vyhledávání a filtrování.
    toy_boat_recommended_play_environment:
      name: Doporučené prostředí ke hře s lodičkou
      description: Upřesňuje zamýšlené prostředí pro hru s lodičkou, které splní očekávání
        nakupujících a zaručí bezpečnost (např. vana vs. volná vodní plocha).
    toy_bowling_equipment_included:
      name: Obsažené vybavení na dětský bowling
      description: Upřesňuje, které bowlingové díly sada na dětský bowling obsahuje
        (např. kuželky, koule, dráha/podložka, přepravní taška).
    toy_car_features:
      name: Vlastnosti autíčka
      description: Popisuje herní prvky autíčka na hraní (nezávislé na pohonu), jako
        jsou světla, zvuky nebo otevírací části.
    toy_drawing_tablet_accessories_included:
      name: Přiložené příslušenství hračkového kreslicího tabletu
      description: Další dodávané příslušenství mimo samotný tablet (např. náhradní
        stylus, razítka).
    toy_drawing_tablet_erase_method:
      name: Metoda mazání dětské kreslicí tabulky
      description: Jak se čistí/maže kreslicí plocha.
    toy_drawing_tablet_screen_type:
      name: Typ obrazovky kreslicí tabulky
      description: Typ kreslicího/zobrazovacího povrchu (např. LCD psací tablet vs.
        magnetický).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Nástroj k psaní/kreslení na kreslicí tabulce
      description: Základní nástroj používaný ke kreslení na tabulce (typ stylusu).
    toy_figure_sound_feature:
      name: Zvuková funkce figurky na hraní
      description: Udává, zda zvířecí figurka vydává zvuky a jaké (např. řev, realistický
        zvířecí zvuk).
    toy_game_features:
      name: Vlastnosti hračky/hry
      description: Popisuje důležité herní vlastnosti nebo konstrukční prvky hraček
        na pískoviště a na pláž.
    toy_gift_basket_items_included:
      name: Položky v dárkovém koši s hračkami
      description: 'Uvádí hlavní typy hraček, které jsou součástí dárkového koše (například:
        plyšová hračka, stavebnice, puzzle).'
    toy_glider_launch_method:
      name: Metoda vypouštění hračky kluzáku
      description: Upřesňuje, jak se model kluzáku vypouští, což způsob hraní a použití
        výrobku.
    toy_helicopter_control_type:
      name: Typ ovládání modelu vrtulníku
      description: Popisuje, jak se model vrtulníku ovládá (nezávisle na pohonu),
        například ručním dálkovým ovládáním, přes aplikaci nebo ovládat nelze (volný
        let).
    toy_helicopter_features:
      name: Vlastnosti modelu vrtulníku
      description: Klíčové funkce modelu vrtulníku (zejména u RC modelů), které ovlivňují
        použití a přínos pro hru.
    toy_jacks_set_items_included:
      name: Obsah sady hry s kůstkami
      description: Upřesňuje, které základní položky jsou součástí sady (např. kůstky,
        míček, pytlík).
    toy_keyboard_learning_mode:
      name: Způsob učení podporovaný klávesnicí na hraní
      description: Definuje vzdělávací přístup podporovaný klávesnicí na hraní (např.
        podsvěcování kláves, společné zpívání, lekce s průvodcem, učení s pomocí aplikace).
    toy_keyboard_sound_theme:
      name: Zvukový motiv klávesnice na hraní
      description: Typy nabízených zvuků/hlasů nástroje (kromě standardního klavíru).
    toy_kitchen_appliances_included:
      name: Obsažené kuchyňské spotřebiče na hraní
      description: Udává, jaké kuchyňské spotřebiče sada obsahuje, pokud je výrobkem
        spotřebič nebo sada zaměřená na spotřebiče.
    toy_kitchen_assembly_requirement:
      name: Požadavek na sestavení dětské kuchyňky
      description: Označuje, zda je nutná montáž, včetně odhadované náročnosti montáže.
    toy_kitchen_interactive_features:
      name: Interaktivní prvky dětské kuchyňky
      description: Udává interaktivní prvky, které dětské kuchyňky běžně obsahují,
        včetně souvisejícího příslušenství.
    toy_motorcycle_feature_set:
      name: Vlastnosti motocyklu na hraní
      description: Klíčové herní prvky motocyklu na hraní (vyberte vše, co platí).
    toy_motorcycle_scale:
      name: Měřítko modelu motocyklu
      description: Měřítko provedení motocyklu na hraní / sběratelského modelu motocyklu
        (např. 1:12).
    toy_parachute_launch_method:
      name: Způsob vypouštění hračky s padákem
      description: Jak se má hračka vypouštět / nasazovat k letu.
    toy_piano_and_keyboard_accessories_included:
      name: Obsažené příslušenství k dětskému klavíru nebo klávesám
      description: Příslušenství, které je dodáváno s dětským klavírem nebo klávesami.
    toy_playset_assembly_required:
      name: Herní sada vyžaduje montáž
      description: Označuje, zda je před hraním nutná montáž, kterou provede dospělá
        osoba (nárorčnější než jednoduché zacvaknutí).
    toy_playset_items_included:
      name: Položky v hrací sadě
      description: Uvádí hlavní díly herní sady (co je v balení).
    toy_safety_certification:
      name: Bezpečnostní certifikace hraček
      description: Bezpečnostní normy a značky souladu platné pro hračky na trhu nakupujícího
        (např. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Vlastnosti kosmické lodi na hraní
      description: Udává běžné interaktivní/herní prvky kosmické lodi na hraní.
    toy_spaceship_size_class:
      name: Třída velikosti kosmické lodi na hraní
      description: Udává orientační velikost kosmické lodi na hraní pro rychlejší
        filtrování. Nejde o přesné rozměry (délka/šířka/výška) ani měřítko modelu
        (např. 1:72).
    toy_tableware_pieces_included:
      name: Kusy obsažené v sadě hračkového nádobí
      description: Upřesňuje, jaké nádobí je součástí sady na hraní (talíře, hrnky,
        příbory, servírovací předměty).
    toy_tool_electronic_features:
      name: Elektronické funkce nářadí na hraní
      description: Popisuje interaktivní/elektronické funkce dětského nářadí (světla,
        zvuky, otáčení atd.).
    toy_tool_set_components_included:
      name: Komponenty obsažené v sadě hračkového nářadí
      description: Upřesňuje konkrétní položky k napodobovací hře, které jsou součástí
        balení (zejména u sad s nářadím).
    toy_train_scale:
      name: Měřítko hračkového vlaku
      description: Udává standardní měřítko vláčku na hraní / modelu vlaku (neboli
        velikost kolejí), aby byla zajištěna kompatibilita se stávajícími vlaky a kolejemi.
    toy_train_track_layout_type:
      name: Typ rozložení kolejí pro vláčky
      description: Popisuje rozložení nebo tvar kolejí v sadě s vláčky nebo jejím
        rozšíření.
    toy_weapon_gadget_features:
      name: Vlastnosti dětských zbraní
      description: Udává běžné interaktivní a funkční prvky specifické pro dětské
        zbraně a špionážní vybavení.
    tpms_sensor_frequency_band:
      name: Frekvenční pásmo senzoru TPMS
      description: Rádiové frekvenční pásmo podporované příslušenstvím souvisejícím
        se systémem TPMS (pokud je to relevantní).
    track_and_field_discipline:
      name: Atletická disciplína
      description: Udává, k jaké konkrétní atletické disciplíně je produkt určen (např.
        vrh koulí, skok o tyči, sprinty).
    track_event_specialization:
      name: Specializace na běžeckou disciplínu
      description: Označuje typ disciplíny, pro kterou jsou tretry optimalizovány.
    track_field_event_suitability:
      name: Vhodnost pro atletické disciplíny
      description: Udává, pro jaké konkrétní atletické disciplíny je tréninková pomůcka
        určena.
    track_set_special_features:
      name: Speciální prvky sady
      description: Udává důležité herní prvky, které jsou součástí dráhy, mimo základní
        dráhu a autíčka.
    track_surface_compatibility:
      name: Kompatibilita s povrchem dráhy
      description: Udává, pro jaký běžecký povrch (povrchy) jsou tretry určeny.
    tracking_aid_type:
      name: Typ pomůcky pro sledování směru
      description: Udává, zda kajak obsahuje zařízení, která pomáhají lépe udržovat
        přímý směr.
    traction_pattern_type:
      name: Typ trakčního vzoru
      description: Popisuje hlavní vzor nebo drážky trakční podložky, které zajišťují
        přilnavost k surfu.
    trading_card_league:
      name: Liga sběratelských karet
      description: Označuje sportovní ligu, která se se sadou karet nebo předmětem
        pojí (pokud je to relevantní).
    trailer_construction:
      name: Konstrukce přívěsu
      description: Udává hlavní konstrukční materiál rámu nebo karoserie přívěsu (např.
        hliník, ocel nebo smíšená konstrukce).
    trailer_coupler_size:
      name: Velikost tažného zařízení pro přívěs
      description: Upřesňuje velikost tažné koule nezbytnou pro tažení přívěsu.
    trailer_hitch_mounting_location_method:
      name: Místo/způsob montáže tažného zařízení
      description: Upřesňuje, kam a jak se tažné zařízení na vozidle montuje (např.
        zadní přijímač, přední přijímač, montáž na rám, montáž na nárazník, montáž
        na korbu).
    trailer_light_function:
      name: Funkce světel přívěsu
      description: Základní funkce/umístění světla na přívěsu.
    trailer_suspension_type:
      name: Typ odpružení přívěsu
      description: Upřesňuje typ systému odpružení cyklistického přívěsu, například
        vinuté pružiny nebo listové pružiny, pro větší pohodlí při jízdě a lepší ochranu
        nákladu.
    trailer_wiring_circuit:
      name: Elektroinstalace přívěsu
      description: Uvádí světelné, brzdové a pomocné obvody/signály vedené kabeláží
        přívěsu (tj. jaké jsou tam napájecí/uzemňovací a signálové vodiče).
    trailer_wiring_connector_type:
      name: Typ konektoru elektroinstalace přívěsu
      description: Udává standard konektoru na straně vozidla nebo přívěsu, který
        určuje kompatibilitu kabelových svazků a adaptérů.
    train_whistle_intended_use:
      name: Zamýšlené použití vlakové píšťaly
      description: Primární zamýšlený kontext pro použití píšťaly.
    train_whistle_sound_character:
      name: Zvuk vlakové píšťaly
      description: Popisuje vnímaný tónový charakter zvuku píšťalky (zabarvení).
    trainer_mounting_type:
      name: Typ uchycení trenažeru
      description: Popisuje, jak je jízdní kolo uchyceno na trenažér (např. s nasazeným
        zadním kolem nebo bez zadního kola).
    training_dummy_shape:
      name: Tvar tréninkové figuríny
      description: Upřesňuje celkový vzhled nebo siluetu figuríny, která ovlivňuje
        způsob, jakým ji pes uchopí, a realističnost výcviku.
    training_focus:
      name: Zaměření tréninku
      description: Popisuje, na jakou hlavní oblast dovedností se pomůcka zaměřuje
        (např. reflexy, práce nohou, koordinace ruka-oko).
    training_focus_area:
      name: Oblast zaměření tréninku
      description: Upřesňuje, jakou základní lakrosovou dovednost má pomůcka rozvíjet.
    training_objective:
      name: Cíl tréninku
      description: Upřesňuje, jakou základní dovednost nebo techniku má produkt zlepšit.
    training_surface_suitability:
      name: Vhodnost tréninkového povrchu
      description: Určuje, na kterých površích lze trenažér použít.
    training_surface_usage:
      name: Využití tréninkového povrchu
      description: Upřesňuje, pro které základní aktivity je tréninkový povrch určen.
        Udává, zda se jedná o panely ze syntetického ledu určené k bruslení, nebo
        o podložky pro trénink na suchu nebo víceúčelové sportovní podložky.
    training_usage_type:
      name: Typ tréninkového využití
      description: Upřesňuje primární zamýšlenou dobu nebo kontext použití tréninkových
        kalhot, například k tréninku přes den nebo na noc.
    trampoline_enclosure_type:
      name: Typ ochranné sítě trampolíny
      description: Upřesňuje konstrukci ochranné sítě trampolíny včetně způsobu/místa
        montáže.
    trampoline_safety_certifications:
      name: Bezpečnostní certifikace trampolíny
      description: Označuje, které bezpečnostní normy/certifikace relevantní pro trampolíny,
        které výrobek dle deklarace výrobce splňuje.
    transfer_application_method:
      name: Metoda nanášení obtisku
      description: Upřesňuje, jak se aplikuje transfer na látku (např. nažehlování
        vs. tepelný lis).
    transfer_method:
      name: Způsob aplikace transferu
      description: Upřesňuje, jak se design přenáší na látku.
    transfer_peel_temperature:
      name: Teplota odlepování transferu
      description: Upřesňuje doporučený teplotní stav (horký, teplý nebo studený),
        při kterém by se měla po lisování odstranit nosná fólie.
    transmission_cooler_construction:
      name: Konstrukce chladiče převodovky
      description: Specifikuje konstrukci jádra chladiče převodovky.
    transmission_fluid_specification:
      name: Specifikace převodové kapaliny
      description: Standard OEM / specifikace, které převodová kapalina splňuje (např.
        řady Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Materiál silentbloku převodovky
      description: Upřesňuje elastomerový nebo izolační materiál použitý v silentbloku/izolátoru
        (prvek tlumící vibrace).
    transmission_mount_type:
      name: Typ uložení převodovky
      description: Udává konstrukční typ uložení převodovky (např. hydraulické nebo
        pevné), který ovlivňuje montáž, tlumení vibrací a hlučnost (NVH) i určení
        použití.
    transparency_level:
      name: Úroveň transparentnosti
      description: Popisuje, jak průhledné jsou regály, aby se nakupující mohli rozhodnout
        mezi průhlednými a skrytými úložnými prostory.
    transport_case_type:
      name: Typ transportního obalu
      description: Klasifikuje konstrukci/pevnost přepravního řešení s ohledem na
        míru ochrany a způsob balení.
    transposition_modes:
      name: Transpoziční režimy
      description: Udává podporované režimy ladění – koncertní tóninu a transpozice
        pro transponující nástroje (např. B♭, E♭).
    trap_design:
      name: Design pasti
      description: Udává konstrukční typ nebo mechanismus pasti, který určuje způsob
        její aktivace a vhodné použití (druh zvířete, prostředí).
    trap_spring_configuration:
      name: Konfigurace pružiny pasti
      description: Udává počet nebo uspořádání pružin, které past pohánějí. Tento
        údaj ovlivňuje sílu pasti a její soulad s legislativou.
    travel_bassinet_accessories_included:
      name: Obsažené příslušenství k cestovním dětským košům/postýlkám
      description: Uvádí doplňkové příslušenství k cestovnímu dětskému koši/postýlce.
    travel_spinning_wheel_assembly_required:
      name: Nutnost sestavení cestovního kolovrátku
      description: Udává, zda je nutné kolovrátek před použitím sestavit/nastavit,
        a nikoli pouze rozložit (např. připevnit křídla, napnutí, šlapky).
    travel_spinning_wheel_portability_features:
      name: Vlastnosti přenosnosti cestovního kolovrátku
      description: Prvky konstrukce související s možností přenášet cestovní kolovrátek,
        jako je skládací konstrukce a dodávaná přenosná řešení.
    travel_trailer_appliances_fuel_type:
      name: Typ paliva pro spotřebiče v obytném přívěsu
      description: Primární palivo používané pro spotřebiče/topení/vaření v přívěsu
        (nikoli v tažném vozidle).
    travel_trailer_holding_tank_type:
      name: Typ sběrné nádrže v obytném přívěsu
      description: Udává, které sběrné nádrže se v obytném přívěsu nacházejí (vyberte
        všechny platné možnosti).
    travel_trailer_power_hookup_shore_power:
      name: Připojení obytného přívěsu k elektrickému napájení (ze sítě)
      description: Podporované standardy elektrického připojení k napájení ze sítě.
    tread_pattern_type:
      name: Typ vzoru dezénu
      description: Klasifikuje celkový dezén pneumatiky, například jako slick (hladký),
        semi-slick (polohladký) nebo knobby (hrubý), což ovlivňuje trakci, valivý
        odpor i povrch, na který je pneumatika určena.
    treadmill_key_type:
      name: Typ klíče na běžecký trenažér
      description: Popisuje provedení nebo způsob uchycení bezpečnostního klíče (např.
        magnetický kulatý, plastová vložka, klip).
    treadmill_part_type:
      name: Typ dílu běžeckého pásu
      description: Identifikuje konkrétní komponent běžeckého trenažéru, aby nakupující
        snadno poznali, kam náhradní díl patří (např. pás vs. motor).
    treadmill_position:
      name: Umístění na běžeckém trenažéru
      description: Označuje umístění dílu na běžeckém trenažéru (vpředu, vzadu, nahoře,
        dole, uprostřed).
    triangle_striker_material:
      name: Materiál paličky na triangl
      description: Materiál dodané paličky.
    trigger_input_connector:
      name: Konektor spouštěcího vstupu
      description: Určuje standard fyzického konektoru používaného pro spouštěcí vstupy.
    trigger_input_connector_type:
      name: Typ konektoru spouštěcího vstupu
      description: Určuje typ konektoru použitého pro spouštěcí vstup.
    trigger_input_zone_support:
      name: Podpora zón spouštěcího vstupu
      description: Udává, zda spouštěcí vstupy podporují jednu zónu, dvě zóny (např.
        (např. hrací plocha / ráfek) nebo více zón.
    trim_application_method:
      name: Metoda aplikace lemu
      description: Udává, jak má být lemovka přichycena k projektu (např. přišitím,
        nažehlením, lepením).
    trim_detail:
      name: Ozdobné prvky
      description: Uvádí výrazné ozdobné okraje nebo povrchové úpravy na oděvu (např.
        střapce, třásně, krajka).
    trim_elasticity:
      name: Pružnost lemu
      description: Označuje, zda je ozdobný lem ric-rac dostatečně pružný k použití
        na pružných materiálech, jako jsou úplety nebo sportovní oděvy.
    trim_finish:
      name: Povrchová úprava lemu
      description: Povrchové úpravy lemů (např. metalická, třpytivá, reflexní).
    trim_tilt_type:
      name: Typ naklápění
      description: Udává, zda a jak motor podporuje naklápění a trimování.
    trolleybus_power_supply_type:
      name: Typ napájení trolejbusu
      description: Specifikuje, jak trolejbus odebírá trakční proud z elektrické sítě.
    truck_bed_body_type:
      name: Typ korby/karoserie nákladního vozidla
      description: Konfigurace korby nebo karoserie za kabinou.
    truck_bed_length_class:
      name: Třída délky korby nákladního vozidla
      description: Označuje třídu délky korby nákladního vozidla, pro kterou je navržena
        síť na náklad (běžně se korba označuje jeko krátká/standardní/dlouhá).
    truck_mounting_hole_pattern:
      name: Schéma montážních otvorů pro truck
      description: Specifikuje rozvržení otvorů k uchycení trucků k desce skateboardu
        (např. Old school, New school, Universal).
    truck_mounting_style:
      name: Styl montáže na nákladní vůz
      description: Udává způsob uchycení trucků k desce skateboardu (zespodu desky,
        výřezem v desce atd.), což ovlivňuje výšku a stabilitu jízdy.
    truck_profile:
      name: Profil trucku
      description: Označuje klasifikaci výšky jízdy skateboardového trucku vzhledem
        k desce, což ovlivňuje prostor pro kolečka a pocit z jízdy na skateboardu.
    trumpet_bell_material:
      name: Materiál ozvučníku trumpety
      description: Materiál použitý na ozvučník (někdy se liší od zbytku nástroje).
    trumpet_leadpipe_material:
      name: Materiál vstupní trubice trubky
      description: Materiál nebo povrchová úprava použité na nátrubkovou trubici (hlavní
        trubici vedoucí od nátrubku k ventilům).
    trundle_mechanism:
      name: Výsuvný mechanismus
      description: Popisuje, jak se přistýlka vysouvá z hlavního rámu.
    trunk_part_type:
      name: Typ dílu zavazadlového prostoru
      description: Upřesňuje, který komponent karosérie související se zavazadlovým
        prostorem je nabízen (např. víko kufru, pant, západka).
    tuba_leadpipe_material:
      name: Materiál nátrubkové trubice tuby
      description: Udává materiál použitý na nátrubkovou trubici (nátrubek) tuby.
    tube_base_type:
      name: Typ patice elektronky
      description: Upřesňuje typ patice elektronky pro mechanickou/elektrickou kompatibilitu
        (např. Octal, Noval/9-pin).
    tube_matching_grade:
      name: Stupeň párování elektronek
      description: Označuje, zda jsou elektronky testovány/párovány v sadě a jaký
        je typ dodaného párování.
    tube_weight_category:
      name: Hmotnostní kategorie duše
      description: Zařazuje duši do kategorií podle konstrukce/hmotnosti (např. ultralehká,
        standardní, zesílená), aby mohli nakupující rychle porovnat odolnost a jvýkonnost.
    tubeless_compatible:
      name: Kompatibilní s bezdušovými pneumatikami
      description: Označuje, zda má být kolo při použití bezdušových pneumatik používáno
        bez duše.
    tubing_shape:
      name: Profil trubek konstrukce
      description: Upřesňuje průřez podpůrných trubek stojanu.
    tubular_construction_type:
      name: Typ trubkové konstrukce
      description: Specifikuje konstrukci galuskových pneumatik jízdních kol a rozlišuje
        mezi tradičními lepenými galuskami a novějšími variantami.
    tulip_type_flower_form:
      name: Typ tulipánu (tvar květu)
      description: Určuje zahradnický typ tulipánu podle tvaru květu v kytici (např.
        jednoduchý, plnokvětý, papouškovitý).
    tuner_input_method:
      name: Typ vstupu ladičky
      description: Upřesňuje, jak ladička detekuje výšku tónu (mikrofon, vibrační/klipsový
        snímač, vstup pro nástrojový kabel, kontaktní snímač).
    tuning_mechanism:
      name: Mechanismus ladění
      description: Jak jsou blány bubnů bongo napnuté/naladěné.
    tuning_system:
      name: Ladicí systém
      description: Způsob ladění pohárového bubnu nebo zda je laditelný.
    turn_signal_lens_color:
      name: Barva krytu směrového světla
      description: Barva viditelného krytu na tělesu směrového světla (nikoli barva
        vyzařovaného světla).
    turn_signal_lighting_style:
      name: Typ signalizace směrového světla
      description: Vizuální styl nebo animace signalizace směrovým světlem.
    turnip_and_rutabaga_variety:
      name: Odrůda vodnice a tuřínu
      description: Identifikuje konkrétní kultivar nebo odrůdu vodnice nebo tuřínu.
    tweeter_crossover_type:
      name: Typ výhybky výškového reproduktoru
      description: Označuje typ hornopropustné výhybky nebo ochrany u výškového reproduktoru,
        pokud taková existuje.
    tweeter_material:
      name: Materiál výškového reproduktoru
      description: Materiál hlavní membrány/kopule výškového reproduktoru.
    tweeter_mount_type:
      name: Typ uchycení výškového reproduktoru
      description: Upřesňuje, jak má být výškový reproduktor ve vozidle nainstalován
        (způsob montáže / hardware).
    twill_direction:
      name: Směr keprové vazby
      description: Označuje směr keprové vazby v džínovině.
    twist_direction:
      name: Směr stáčení
      description: Směr zákrutu příze (S-zákrut nebo Z-zákrut).
    u_joint_series_size:
      name: Řada/velikost kardanového kloubu
      description: Specifikuje standardní řadu nebo velikostní označení kardanového
        kloubu (např. řada 1310).
    uilleann_pipes_bag_material:
      name: Materiál irských loketních dud
      description: Materiál měchu (pokud je součástí), který ovlivňuje pocit ze hry,
        odolnost a údržbu dud.
    uilleann_pipes_handedness:
      name: Provedení irských loketních dud
      description: Udává, zda jsou dudy určené pro praváka nebo pro leváka.
    uilleann_pipes_set_configuration:
      name: Konfigurace sady irských loketních dud
      description: Upřesňuje, co sada loketních dud obsahuje, na základě vybavení
        regulátory a borduny.
    uk_childrens_shoe_size:
      name: Velikost dětské obuvi UK
      description: Určuje britskou velikost dětské obuvi, například 4 nebo 4 Wide.
    uk_clothing_size:
      name: Britská velikost oblečení
      description: Určuje britskou velikost oblečení, například 12 nebo 18.
    uk_cup_size:
      name: Britská velikost košíčku
      description: Určuje britskou velikost košíčku podprsenky, například C nebo FF.
    uk_mens_shoe_size:
      name: Britská velikost pánské obuvi
      description: Určuje britskou velikost pánské obuvi, například 9 nebo 9 Wide.
    uk_womens_shoe_size:
      name: Velikost dámské obuvi UK
      description: Upřesňuje velikost dámské obuvi podle britského systému, například
        6 nebo 6 rozšířená.
    ukulele_back_and_sides_wood:
      name: Dřevo zadní desky a lubů ukulele
      description: Udává dřevo/materiál použité na zadní stranu a luby ukulele.
    ukulele_body_cutaway:
      name: Výřez v tělu ukulele
      description: Udává, zda má tělo koncertního ukulele výřez pro snadnější přístup
        k vyšším pražcům.
    ukulele_body_shape:
      name: Tvar těla ukulele
      description: Obecný styl/tvar těla daného ukulele.
    ukulele_bridge_material:
      name: Materiál kobylky ukulele
      description: Udává materiál použitý na kobylku ukulele.
    ukulele_construction_type:
      name: Typ konstrukce ukulele
      description: Udává, jak je konstruována vrchní/zadní deska / luby nástroje (masiv
        vs. laminát).
    ukulele_electronics_configuration:
      name: Konfigurace elektroniky ukulele
      description: Uvádí, zda je ukulele pouze akustické, nebo zda je vybaveno vestavěnou
        elektronikou (snímačem a/nebo předzesilovačem) pro zesílení zvuku.
    ukulele_string_re_entrant_tuning:
      name: Ukulele s re-entrantním laděním strun
      description: Zda je ukulele naladěno re-entrantně, tedy s vysokým G, oproti
        lineárnímu ladění s nízkým G. Toto ladění zákazníci preferují a ovlivňuje
        zvuk.
    ukulele_top_wood:
      name: Horní dřevěná deska ukulele
      description: Označuje dřevo/materiál použitý pro horní/rezonanční desku ukulele.
    ukulele_tuner_mechanism:
      name: Ladicí mechanismus ukulele
      description: Specifikuje styl/mechanismus ladění použitý na ukulele.
    ukulele_tuner_type:
      name: Typ ladicího mechanismu ukulele
      description: Styl ladicí mechaniky použité na hlavě ukulele.
    ukulele_tuning:
      name: Ladění ukulele
      description: Určuje zamýšlené standardní ladění pro kapesní ukulele.
    ultralight_aircraft_wing_configuration:
      name: Konfigurace křídla ultralehkého letadla
      description: Umístění a konfigurace primárního křídla vzhledem k trupu/konstrukci.
    under_bed_features:
      name: Vlastnosti prostoru pod postelí
      description: Označuje primární funkční prvek umístěný pod platformou lůžka.
    underfoot_strap_type:
      name: Typ řemínku pod chodidlem
      description: Označuje materiál nebo provedení použité pro řemínek pod obuví.
    underwear_fit:
      name: Střih spodního prádla
      description: Označuje celkový střih boxerek (např. přiléhavý, volný, stahovací).
    underwear_pieces_included:
      name: Kusy spodního prádla v balení
      description: Identifikuje dodávané kusy oděvu (horní, spodní, oba nebo jednodílný
        overal), aby zákazníci věděli, zda kupují kompletní sadu nebo jednu položku.
    uniform_pieces_included:
      name: Součásti kompletu uniformy
      description: Označuje, které oděvní součásti jsou dodávány (např. košile, kalhoty,
        vesta). Upřesňuje rozpis položek v balíku pro hromadný nebo samostatný nákup.
    uniform_role:
      name: Účel uniformy
      description: Určuje profesní role nebo agenturu, pro kterou je položka uniformy
        určena (např. policie, šerif, záchranáři).
    update_method:
      name: Způsob aktualizace
      description: Způsob aplikace firmwaru/softwaru do čtečky.
    upholstery_fabric_backing_type:
      name: Typ podkladu látky
      description: Označuje podkladovou vrstvu/laminaci čalounické látky, která ovlivňuje
        instalaci a pocit při používání.
    upholstery_fabric_water_resistance:
      name: Voděodolnost čalouněné látky
      description: Označuje odolnost čalouněné látky vůči vodě a polití.
    upper_material:
      name: Materiál svršku
      description: Označuje primární materiál použitý na svrchní části tenisky, který
        ovlivňuje prodyšnost, odolnost a estetiku.
    upright_bass_pickup_system:
      name: Systém snímání kontrabasu
      description: Označuje, zda je na kontrabasu nainstalován systém snímání/předzesilovače
        určený pro zesílení.
    upright_piano_power_source:
      name: Zdroj napájení pro pianino
      description: Napájení pianina. Platí pro akustické pianino bez napájení i pro
        pianino s tichými/hybridními systémy vyžadujícími elektřinu.
    urination_device_features:
      name: Vlastnosti močové pomůcky
      description: Zdůrazňuje vlastnosti speciální konstrukce zvyšující funkčnost
        nebo pohodlí.
    us_childrens_shoe_size:
      name: Americká velikost dětské obuvi
      description: Určuje americkou velikost dětské obuvi, například 5 nebo 5 Wide.
    us_clothing_size:
      name: Americká velikost oblečení
      description: Určuje americkou velikost oblečení, například 8 nebo 14.
    us_cup_size:
      name: Americká velikost košíčku
      description: Určuje americkou velikost košíčku podprsenky, například C nebo
        DDD
    us_mens_shoe_size:
      name: Americká velikost pánské obuvi
      description: Určuje americkou velikost pánské obuvi, například 10 nebo 10 Wide.
    us_ring_size:
      name: Americká velikost prstenu
      description: Určuje americkou velikost prstenu, například 7 nebo 9.5.
    us_womens_shoe_size:
      name: Americká velikost dámské obuvi
      description: Určuje americkou velikost dámské obuvi, například 8 nebo 8 Wide.
    usage:
      name: Použití
      description: Popisuje zamýšlené použití/ladění vačkového hřídele.
    usda_honey_grade:
      name: Třída kvality medu USDA
      description: Označuje oficiální stupeň přiřazený medu Ministerstvem zemědělství
        USA (USDA).
    user_control_method:
      name: Metoda ovládání uživatelem
      description: Uvádí, jak uživatel komunikuje se strojem (např. pomocí integrovaného
        ovládacího panelu, dálkového ovládání, aplikace, hlasu), a informuje o aspektech
        snadnosti použití.
    vacuum_boost_reference_port:
      name: Referenční přípojka podtlaku/přetlaku
      description: Označuje, zda regulátor má referenční přípojku pro podtlak/přetlak
        a o jaký typ se jedná.
    valve_base_shape:
      name: Tvar patky ventilku
      description: Určuje geometrii rozhraní mezi patkou ventilku a ráfkem (kulatá,
        kuželová, s bočním otvorem, ve tvaru T atd.), která ovlivňuje těsnění a kompatibilitu
        pěnové vložky.
    valve_core_type:
      name: Typ ventilkové vložky
      description: Označuje, zda je jádro ventilku odnímatelné, pevné nebo bez jádra,
        což je informace, která ovlivňuje postupy údržby a kompatibilitu s nástroji
        pro vstřikování prostředku pro utěsnění.
    valve_cover_gasket_material:
      name: Materiál těsnění víka ventilů
      description: Specifikuje materiál těsnění víka ventilů, které je součástí víka
        ventilů, nebo doporučený materiál těsnění, pokud se prodává bez těsnění (podle
        typu).
    valve_cover_material:
      name: Materiál krytu veltilku
      description: Primární konstrukční materiál víka ventilů.
    valve_design:
      name: Konstrukce ventilu
      description: Označuje konstrukci/design ventilu motoru.
    valve_guard_coverage_area:
      name: Oblast krytí chrániče ventilu
      description: Označuje, které části ventilové sekce daný kryt chrání.
    valvetrain_configuration:
      name: Konfigurace ventilového rozvodu
      description: Specifikuje rozvržení vačky/ventilového rozvodu.
    varnish_formulation_base:
      name: Báze laku
      description: Specifikuje primární složení / chemické složení laku na strunné
        nástroje, které ovlivňuje vzhled, reverzibilitu a kompatibilitu se stávajícími
        povrchovými úpravami.
    varnish_transparency_tint:
      name: Průhlednost/tónování laku
      description: Popisuje, zda je lak průhledný nebo tónovaný, a pokud je tónovaný,
        jeho obecnou skupinu odstínů.
    vegetable_matter_vm_content:
      name: Obsah rostlinné hmoty (VM)
      description: Množství rostlinných zbytků/nečistot přítomných ve vlákně.
    vegetable_preparation_style:
      name: Styl přípravy zeleniny
      description: Popisuje, jak je zelenina před prodejem prezentována, krájena nebo
        jinak upravena (např. celá, nakrájená na kostičky, růžičky).
    vehicle_audio_dsp_form_factor:
      name: Konstrukční provedení DSP
      description: Specifikuje fyzický/instalační formát jednotky DSP.
    vehicle_battery_charger_features:
      name: Vlastnosti nabíječky akumulátoru vozidla
      description: Seznam provozních režimů a integrovaných funkcí nabíječky akumulátoru
        vozidla (např. udržovací režim, desulface).
    vehicle_body_filler_form:
      name: Forma tmelu na karoserii vozidla
      description: Fyzická forma / způsob balení výplňového tmelu.
    vehicle_coaxial_speaker_nominal_size:
      name: Jmenovitá velikost koaxiálního reproduktoru vozidla
      description: Jmenovitá velikost reproduktoru použitého v osazení (např. 6,5
        palce, 6x9 palců).
    vehicle_cover_size_class:
      name: Třída velikosti plachty na vozidlo
      description: Obecné rozdělení velikostí udávající, pro jakou velikost vozidla
        je plachta navržena.
    vehicle_decor_set_items_included:
      name: Obsah dekorační sady
      description: Uvádí typy dekoračních položek obsažených v sadě příslušenství
        (viditelnost na úrovni komponent pro nakupující).
    vehicle_door_lock_actuation_method:
      name: Způsob ovládání zámku dveří vozidla
      description: Označuje, jak je ovládán zámek dveří vozidla.
    vehicle_door_lock_actuator_kit_contents:
      name: Obsah balení sady ovládání zámku
      description: Označuje, co je součástí ovládání (pouze akční člen, táhla, držáky,
        kabeláž).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfigurace zapojení ovladače zámku dveří vozidla
      description: Určuje typ zapojení potřebný pro instalaci (počet vodičů a účel).
    vehicle_door_lock_included_components:
      name: Obsah balení zámku vozidla
      description: Seznam součástí balení (užitečné pro sady/sestavy).
    vehicle_electrical_connector_type:
      name: Typ elektrického konektoru vozidla
      description: Určuje typ nebo tvar elektrického konektoru regulátoru / buzení
        alternátoru (nezahrnuje hlavní silový vývod B+).
    vehicle_equipment_fit_out_level:
      name: Úroveň výbavy vozidla
      description: Označuje úroveň policejní výbavy dodávky.
    vehicle_glass_cleaner_form:
      name: Forma čističe skel vozidel
      description: Fyzická forma čističe skel vozidel (např. sprej, pěna, ubrousky,
        gel, koncentrát).
    vehicle_hitch_cover_illumination_type:
      name: Typ osvětlení krytu tažného zařízení vozidla
      description: Určuje, zda má kryt tažného zařízení osvětlení a jaké.
    vehicle_hitch_cover_mounting_type:
      name: Typ uchycení krytu tažného zařízení vozidla
      description: Označuje metodu použitou k uchycení/připevnění krytu tažného zařízení
        v uchycení tažného zařízení.
    vehicle_license_plate_finish:
      name: Povrchová úprava registrační značky vozidla
      description: Povrchová úprava značky.
    vehicle_license_plate_frame_anti_theft_design:
      name: Zabezpečení registrační značky vozidla
      description: Bezpečnostní konstrukční prvky určené k ochraně registrační značky
        vozidla před odstraněním nebo neoprávněnou manipulací.
    vehicle_license_plate_frame_plate_standard:
      name: Standard rozměru registrační značky
      description: Standard nebo regionální rozměr registrační značky, pro který je
        rámeček určen.
    vehicle_license_plate_frame_profile:
      name: Profil rámečku registrační značky vozidla
      description: Jak rámeček ohraničuje značku (pokrytí/tvar), což ovlivňuje čitelnost
        a dodržování předpisů.
    vehicle_license_plate_mounting_hole_count:
      name: Počet montážních otvorů registrační značky vozidla
      description: Počet montážních otvorů ve značce.
    vehicle_license_plate_mounting_hole_pattern:
      name: Vzor montážních otvorů SPZ vozidla
      description: Vzor umístění montážních otvorů značky.
    vehicle_license_plate_reflectivity:
      name: Odrazivost registrační značky vozidla
      description: Zda a jak povrch značky odráží světlo (důležité pro viditelnost
        a dodržení předpisů u některých novějších značek).
    vehicle_license_plate_size_standard:
      name: Standard velikosti SPZ vozidla
      description: Označuje regionální/vozidlovou normu, pro kterou je značka dimenzována
        (rozteč montážních otvorů a celkový rozměr).
    vehicle_license_plate_text_style:
      name: Styl textu SPZ vozidla
      description: Styl znaků na značce (pokud existují), včetně reliéfních a tištěných
        znaků.
    vehicle_license_plate_theme:
      name: Téma SPZ vozidla
      description: Hlavní motiv grafického designu podložky.
    vehicle_lift_actuation_method:
      name: Metoda ovládání zvedáku vozidla
      description: Jak je zvedák/hever poháněn/ovládán pro zvedání vozidla.
    vehicle_lift_mounting_type:
      name: Typ montáže zvedáku vozidla
      description: Označuje, jak je zvedák v dílně nainstalován nebo ukotven.
    vehicle_lift_type:
      name: Typ zvedáku vozidla
      description: Specifikuje typ konstrukce zvedáku vozidel používaného pro servis
        nebo skladování (např. 2sloupkový, 4sloupkový, nůžkový).
    vehicle_magnet_attachment_type:
      name: Typ uchycení magnetu ve vozidle
      description: Určuje primární způsob upevnění/montáže produktů prodávaných jako
        magnety do vozidel (například pouze magnetické nebo magnetické s lepidlem).
    vehicle_magnet_intended_use:
      name: Zamýšlené použití magnetu ve vozidle
      description: Označuje primární zamýšlené použití magnetu do vozidla.
    vehicle_mirror_adjustment_type:
      name: Typ ovládání zrcátka vozidla
      description: Určuje, jak se zrcátko nastavuje/ovládá.
    vehicle_mirror_glass_type:
      name: Typ skla zrcátka vozidla
      description: Určuje optický typ/tvar povrchu zrcátka.
    vehicle_organizer_features:
      name: Vlastnosti organizéru do vozidla
      description: Klíčové funkční vlastnosti organizérů do vozidel, jako je možnost
        složení, nepromokavá podšívka, izolované kapsy nebo protiskluzová základna.
    vehicle_paint_chemistry_base:
      name: Báze laku na vozidla
      description: Označuje chemické složení laku na vozidla.
    vehicle_polish_application_method:
      name: Způsob aplikace lestěnky na vozidla
      description: Specifikuje doporučený způsob nebo nástroj pro nanášení leštěnky
        na vozidlo.
    vehicle_pursuit_package:
      name: Paket pro stíhací vozidla
      description: Indikuje, zda je vozidlo vybaveno výkonnostním paketem pro policejní
        stíhací službu (například vylepšené chlazení, brzdy, odpružení a kalibrace
        motoru).
    vehicle_safety_equipment_position:
      name: Umístění bezpečnostního vybavení vozidla
      description: Určuje, kde na vozidle nebo ve vozidle se má bezpečnostní zařízení
        použít nebo nainstalovat.
    vehicle_safety_equipment_visibility_features:
      name: Prvky viditelnosti bezpečnostního vybavení vozidla
      description: Označuje prvky zvyšující viditelnost, jejichž cílem je zvýšit nápadnost.
    vehicle_seat_row:
      name: Řada sedadel ve vozidle
      description: Označuje, pro kterou zadní řadu je sedadlo určeno (druhá řada nebo
        třetí řada), včetně použití zadního výklopného sedadla.
    vehicle_steering_assist_type:
      name: Typ asistence řízení vozidla
      description: Specifikuje systém podpory řízení, pro který je součást navržena.
    vehicle_steering_wheel_lock_form_factor:
      name: Konstrukce zámku volantu vozidla
      description: Popisuje fyzický styl zámku a jeho propojení s volantem (a volitelně
        s dalšími ovládacími prvky).
    vehicle_wax_polish_product_form:
      name: Forma vosku/leštěnky
      description: Fyzická forma / formát dávkování vosku, leštěnky, ochranného prostředku
        nebo těsnicího prostředku.
    vehicle_wheel_valve_stem_type:
      name: Typ dříku ventilku kola vozidla
      description: Určuje typ podporovaného nebo zahrnutého dříku ventilku.
    vehicle_windshield_fluid_formula:
      name: Typ směsi do ostřikovačů
      description: Primární zaměření složení kapaliny pro čištění/odstraňování nečistot
        z čelního skla.
    veil_length_type:
      name: Typ délky závoje
      description: Klasifikuje závoj pomocí standardního označení délky namísto číselných
        údajů.
    vellum_opacity_level:
      name: Úroveň průsvitnosti papíru
      description: Označuje, jak průsvitný nebo neprůsvitný papír je.
    ventilation_configuration:
      name: Konfigurace ventilace
      description: Primární ventilace / přívod a odvod vzduchu v helmě.
    ventilation_control_type:
      name: Typ ovládání ventilace
      description: Určuje styl řízení proudění vzduchu zabudovaného do helmy.
    ventilation_level:
      name: Úroveň ventilace
      description: Určuje míru prodyšnosti a způsob odvětrávání ochranných prvků.
    venting_design:
      name: Konstrukce odvětrávání
      description: Indikuje přítomnost a typ odvětrávání krytu, které zabraňuje srážení
        vody a tvorbě plísní při skladování.
    vestibule_type:
      name: Typ předsíně
      description: Klasifikuje rozvržení předsíně vzhledem ke stanu.
    vibraphone_bar_material:
      name: Materiál kamenů vibrafonu
      description: Materiál tónových kamenů/kláves vibrafonu (tvořících zvuk).
    vibraphone_motor_type:
      name: Typ motoru vibrafonu
      description: Určuje typ motorku, který pohání rotující ventilátory v rezonančních
        trubicích pro docílení vibrato efektu (podle výbavy).
    vibraphone_range_octaves:
      name: Rozsah vibrafonu (oktávy)
      description: Výškový rozsah vibrafonu vyjádřený v oktávách (např. 3 oktávy,
        3,5 oktávy).
    vibraphone_resonator_tube_material:
      name: Materiál rezonančních trubic vibrafonu
      description: Materiál rezonančních trubic vibrafonu pod kameny.
    vibraphone_tuning_standard:
      name: Standard ladění vibrafonu
      description: Referenční výška tónu použitá pro ladění (A=440 Hz atd.).
    viewing_sides:
      name: Strany zobrazení
      description: Určuje, kolik stran výsledkové tabule zobrazuje informace (jednostranná,
        dvoustranná, čtyřstranná atd.).
    vintage_advertisement_decade:
      name: Dekáda historických reklam
      description: Určuje dekádu, ve které byla reklama původně vytištěna nebo vyrobena
        (přibližně, pokud přesné datum není známo).
    vintage_advertisement_format:
      name: Formát staré reklamy
      description: Určuje fyzický formát nebo médium sběratelského předmětu historické
        reklamy.
    vintage_advertisement_subject_category:
      name: Kategorie předmětu retro reklamy
      description: Identifikuje kategorii inzerovaného produktu/služby (na co je reklama
        určena).
    vintage_classic_truck_cab_type:
      name: Kabina klasického a historického nákladního vozu
      description: Konfigurace kabiny/typ karoserie prostoru pro cestující nákladního
        vozidla.
    virginia_tech_helmet_star_rating:
      name: Hvězdičkové hodnocení pro helmy Virginia Tech
      description: Hodnocení bezpečnosti přidělené laboratoří Virginia Tech Helmet
        Lab (0–5 hvězdiček).
    virtual_analog_synthesizer_form_factor:
      name: Formát virtuálního analogového syntezátoru
      description: Specifikuje konstrukční provedení těla syntezátoru (klávesový model
        vs. samostatný modul/rack).
    viscosity_thickness:
      name: Viskozita/hustota
      description: Popisuje, jak hustá nebo tekutá je nátěrová hmota v prodávaném
        stavu nebo v doporučené pracovní konzistenci.
    vise_configuration:
      name: Konfigurace svěráku
      description: Určuje strukturální rozvržení nebo počet kusů v sadě svěráku, což
        ovlivňuje přenositelnost a složitost nastavení.
    visibility_features:
      name: Reflexní prvky
      description: Upozorňuje na bezpečnostní prvky, které zlepšují viditelnost jezdce
        v provozu.
    visor_brim_type:
      name: Typ hledí/štítu
      description: Označuje přítomnost a styl hledí nebo kšiltu na přilbě.
    visor_configuration:
      name: Konfigurace průzoru
      description: Popisuje přítomnost a styl jakéhokoli vestavěného hledí nebo obličejového
        štítu.
    visor_lens_finish:
      name: Povrchová úprava hledí
      description: Určuje odstín, optickou úpravu nebo grafický styl použitý na hledí.
    visor_style:
      name: Styl hledí
      description: Označuje, zda kapuce obsahuje hledí/štít a jeho konfiguraci.
    voc_compliance_standard:
      name: Norma pro shodu s VOC
      description: Regulační prohlášení o shodě s limity VOC pro daný produkt (je-li
        relevantní).
    voc_regulatory_class:
      name: Regulační třída VOC
      description: Deklarovaná regulační třída VOC pro daný produkt (podle etikety/bezpečnostního
        listu), která se využívá pro regionální legislativní a ekologická omezení.
    vodka_base_ingredient:
      name: Základní přísada vodky
      description: Hlavní plodina, ze které se vodka destiluje (např. pšenice, brambory,
        kukuřice).
    voice_coil_configuration:
      name: Konfigurace kmitací cívky
      description: Počet/uspořádání kmitací cívky pro flexibilitu zapojení a možnosti
        impedance.
    voice_effects:
      name: Hlasové efekty
      description: Vestavěné typy hlasových efektů podporovaných sadou karaoke.
    voltage_rating_type:
      name: Typ jmenovitého napětí
      description: Určuje, zda se jmenovité napětí pojistky vztahuje na střídavý proud,
        stejnosměrný proud nebo oba typy proudů.
    voltage_regulator_connector_type:
      name: Typ konektoru regulátoru napětí
      description: Určuje provedení připojovacích svorek a kontaktů pro připojení
        regulátoru do palubní sítě vozidla nebo k alternátoru.
    wader_foot_type:
      name: Typ nohavice brodicích kalhot
      description: Určuje, zda mají brodicí kalhoty integrované holínky, nebo samostatnou
        neoprenovou ponožku.
    wader_sole_type:
      name: Typ podrážky pro brodicí kalhoty
      description: Určuje materiál a typ trakce podrážky brodicí obuvi.
    waistband_style:
      name: Provedení pasu
      description: Popisuje provedení pasu a způsob jeho zajištění nebo nastavení
        pro pohodlné nošení.
    wakeboard_binding_mounting_pattern:
      name: Schéma montáže vázání pro wakeboard
      description: Určuje schéma vložky/desky na wakeboardu kompůatibilní s vázáním.
    wakeboard_riding_style:
      name: Styl jízdy na wakeboardu
      description: Klasifikuje zamýšlené prostředí nebo styl použití wakeboardu.
    wall_decal_style:
      name: Styl samolepky na zeď
      description: Určuje způsob výroby a aplikace samolepky (např. tvarový výřez,
        přenosová fólie, arch samolepek).
    wallyball_equipment_included:
      name: Vybavení pro wallyball v balení
      description: Obsahuje přesný seznam součástí balení, aby zákazník přesně věděl,
        co kupuje, a mohl snadno porovnat různé sady.
    warp_beam_type:
      name: Typ osnovního válu
      description: Specifikuje konfiguraci osnovního válu, který je součástí dodávky
        nebo je již nainstalován na tkacím stavu.
    washability:
      name: Pratelnost
      description: Označuje, zda se lepidlo po aplikaci čistí vodou a/nebo je omyvatelné.
    watch_band_design:
      name: Konstrukce řemínku hodinek
      description: Popisuje konstrukční styl nebo designový vzor řemínku hodinek (např.
        NATO, Milanese, Link).
    watch_movement:
      name: Strojek hodinek
      description: Specifikuje typ hodinového strojku, který hodinky pohání – klíčový
        parametr pro výběr a porovnání jednotlivých modelů.
    water_activation:
      name: Aktivace vodou
      description: Zda se maják může automaticky aktivovat po ponoření do vody (běžné
        pro EPIRB kategorie I/II).
    water_chamber_configuration:
      name: Konfigurace vodní komory
      description: Popisuje vnitřní uspořádání vzduchových komor matrace (např. jedna
        nebo dvě komory), které ovlivňuje oporu těla, regulaci teploty a přenos pohybu
        partnera.
    water_dispensing_mechanism:
      name: Mechanismus dávkování vody
      description: Definuje, jak je voda z jednotky vypouštěna, například kohoutky,
        rozprašovacími tryskami nebo samospádem.
    water_exposure_protection_level:
      name: Úroveň ochrany proti vystavení vodě
      description: Označuje úroveň ochrany produktu při vystavení vodě (např. postříkání
        nebo dočasné ponoření). Pokud je k dispozici oficiální kód IP, použijte stupeň
        krytí (IP).
    water_fed_design:
      name: Provedení s přívodem vody
      description: Indikuje, zda je kartáč navržen pro použití s tekoucí vodou pomocí
        průtokové rukojeti nebo připojení na hadici.
    water_gun_features:
      name: Vlastnosti vodní pistole
      description: Přehled významných funkcí, konstrukčních prvků a doplňků, které
        jsou součástí balení vodní pistole.
    water_gun_operating_mechanism:
      name: Ovládací mechanismus vodní pistole
      description: Jak vodní pistole během používání natlakuje a vytlačuje vodu.
    water_gun_spray_pattern:
      name: Tvar proudu vody z pistole
      description: Určuje typ a tvar vodního paprsku, který tryska vytváří při střelbě.
    water_heating_method:
      name: Způsob ohřevu vody
      description: Popisuje, jak se voda před použitím ohřívá, nebo zda se vůbec ohřívá
        – například solární absorpcí, propan-butanovými hořáky, elektrickými topnými
        tělesy, bateriovým vytápěním, tepelně izolační ochranou nebo bez ohřevu.
    water_mattress_construction:
      name: Konstrukce vodní matrace
      description: Určuje typ konstrukce vodní matrace (např. hardside nebo softside),
        což ovlivňuje kompatibilitu s rámem postele a celkový pocit při ležení.
    water_play_features:
      name: Vlastnosti her ve vodě
      description: Součástí aquaparku/skluzavky jsou prvky pro vodní aktivity.
    water_polo_competition_approval:
      name: Oficiální schválení pro vodní pólo
      description: Identifikuje řídící orgán nebo úroveň soutěže, pro kterou je míč
        oficiálně schválen nebo certifikován.
    water_polo_goal_type:
      name: Typ branky pro vodní pólo
      description: Klasifikuje konstrukční nebo montážní konfiguraci branky (např.
        plovoucí, montovaná na plošině, přenosná).
    water_pump_drive_type:
      name: Typ pohonu vodního čerpadla
      description: Určuje, jak je vodní čerpadlo poháněno/ovládáno v chladicím systému
        vozidla.
    water_pump_housing_material:
      name: Materiál pouzdra vodního čerpadla
      description: Materiál tělesa/skříně vodního čerpadla.
    water_pump_impeller_material:
      name: Materiál oběžného kola vodního čerpadla
      description: Určuje materiál oběžného kola vodního čerpadla (vnitřní rotor/lopatka,
        která pohybuje chladicí kapalinou).
    water_pump_mounting_type:
      name: Typ montáže vodního čerpadla
      description: Určuje způsob montáže/tvarový faktor vodního čerpadla pro montáž
        do motoru (např. šroubovaná skříň nebo kazeta/vložka).
    water_purification_method:
      name: Metoda čištění vody
      description: Identifikuje hlavní mechanismus, kterým produkt upravuje vodu v
        terénu na pitnou (např. pomocí pumpy, gravitace nebo UV záření).
    water_resistance:
      name: Voděodolnost
      description: Sděluje stupeň ochrany před povětrnostními vlivy, například vodotěsnost
        nebo voděodolnost.
    water_resistance_level:
      name: Úroveň voděodolnosti
      description: Udává, zda textilie odpuzuje vodu a do jaké míry.
    water_resistance_rating_case_protection_level:
      name: Vodotěsnost (ochrana pouzdra)
      description: Indikuje úroveň ochrany před vodou, kterou kufr poskytuje (z hlediska
        běžného užívání a materiálů, nikoli jako certifikované IP krytí pro elektroniku),
        např. voděodolný vs. vodotěsný.
    water_rocket_kit_items_included:
      name: Obsah balení vodní rakety
      description: Hlavní součásti zahrnuté v balení produktu.
    water_rocket_propulsion_type:
      name: Typ pohonu vodní rakety
      description: Primární pohon/zdroj energie použitý k vypuštění rakety.
    water_rocket_recovery_system:
      name: Systém návratu vodní rakety
      description: Určuje metodu použitou pro návrat rakety po vypuštění.
    water_ski_base_design:
      name: Profil skluznice vodních lyží
      description: Specifikuje tvar a profil spodní strany vodních lyží, což zásadně
        ovlivňuje jejich ovladatelnost a jízdní vlastnosti.
    water_ski_fin_type:
      name: Typ ploutve vodních lyží
      description: Specifikuje konfiguraci a provedení stabilizační ploutve na vodních
        lyžích, což přímo ovlivňuje držení stopy a ovladatelnost při jízdě.
    water_source:
      name: Zdroj vody
      description: Určuje přírodní zdroj, ze kterého byla voda čerpána před samotným
        procesem sycení.
    water_sports_safety_standard:
      name: Bezpečnostní standardy pro vodní sporty
      description: Uvádí formální bezpečnostní nebo vztlakové normy, které výrobek
        splňuje (např. CE EN 1385 pro helmy, ISO 12402-5 pro vztlakové pomůcky, USCG
        Type III).
    water_table_feature_set:
      name: Vlastnosti vodního stolu
      description: Upozorňuje na integrované zábavné prvky vodního stolu, mezi které
        patří například vodopády, střikovače, mechanické pumpy či kaskádovité bazénky.
    water_table_items_included:
      name: Součásti vodního stolu
      description: Určuje seznam příslušenství dodávaného spolu s vodním stolem, jako
        jsou například nádoby, formičky, lodičky či postavičky.
    water_table_water_source_type:
      name: Typ zdroje vody pro vodní stůl
      description: Určuje metodu doplňování vody do herního stolu.
    waterbed_stabilization_level:
      name: Úroveň stabilizace vodní postele
      description: Určuje stupeň redukce pohybu vody uvnitř matrace.
    watercolor_ink_water_resistance_after_drying:
      name: Voděodolnost akvarelového inkoustu (po zaschnutí)
      description: Označuje, zda se akvarelový inkoust po zaschnutí stává voděodolným
        (dle tvrzení výrobce).
    watercraft_care_application_area:
      name: Oblast péče o plavidla
      description: Označuje hlavní oblast nebo součást plavidla, na které je výrobek
        určen k použití.
    watercraft_drive_mechanism:
      name: Pohonný mechanismus plavidla
      description: Popisuje konkrétní integrovaný nebo podporovaný pohonný mechanismus.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Typ uchycení palivového snímače v nádrži plavidla
      description: Specifikuje montážní vzor/normu pro snímače hladiny paliva v nádrži
        a kompatibilní měřidla (např. běžné montážní vzory šroubů pro lodní použití).
    watercraft_fuel_tank_shape:
      name: Tvar palivové nádrže plavidla
      description: Popisuje celkový fyzický tvar palivové nádrže na podporu plánování
        umístění.
    watercraft_hull_material:
      name: Materiál trupu plavidla
      description: Určuje primární materiál konstrukce trupu.
    watercraft_ignition_part_voltage:
      name: Napětí zapalování plavidla
      description: Jmenovité hodnoty napětí nebo požadavky na napájení pro zapalovací
        část (pokud je součástí), jako jsou například standardní 12V systémy.
    watercraft_impeller_material_grade:
      name: Materiál oběžného kola plavidla
      description: Určuje materiál oběžného kola plavidla (např. neoprenová pryž,
        nitril, bronz).
    watercraft_lighting_certification_compliance:
      name: Certifikace / shoda s předpisy pro osvětlení plavidel
      description: Označuje shodu s předpisy/normami, podle kterých je světlo certifikováno
        pro námořní použití (např. splňuje požadavky pobřežní stráže USA/ABYC/COLREG).
    watercraft_motor_mount_adjustment_features:
      name: Možnosti nastavení držáku motoru
      description: Funkce nastavení držáku (např. naklápění, zvedání, posuv), které
        ovlivňují použitelnost a usazení.
    watercraft_piston_part_type:
      name: Typ pístové části plavidla
      description: Určuje přesný typ komponenty v rámci pístové sady.
    watercraft_propeller_blade_rake:
      name: Sklon listů lodního šroubu
      description: Specifikuje úhel sklonu listu (úhel listu vzhledem k náboji vrtule),
        který zásadně ovlivňuje zvedání přídě.
    watercraft_propeller_rotation_direction:
      name: Směr otáčení lodního šroubu plavidla
      description: Označuje požadovaný směr otáčení lodního šroubu pro kompatibilitu
        s hnacím ústrojím (např. pravotočivý/standardní nebo levotočivý/protitočný).
    watercraft_pump_stage_impeller_role:
      name: Stupeň čerpadla plavidla / funkce oběžného kola
      description: Určuje, zda je oběžné kolo určeno pro specifickou role čerpadla
        (např. čerpadlo surové vody/mořské vody, oběh chladicí kapaliny, proudové
        čerpadlo).
    watercraft_registration_status:
      name: Stav registrace plavidla
      description: Indikuje, zda je plachetnice dodávána včetně vlastnického certifikátu
        (technického průkazu) a platné registrační dokumentace.
    watercraft_safety_equipment_activation_type:
      name: Typ aktivace bezpečnostního vybavení plavidla
      description: Primární metoda aktivace bezpečnostního zařízení (pro majáky /
        alarmy MOB / PLB), odlišná od nafouknutí.
    watercraft_steering_cable_core_material:
      name: Materiál jádra lanka řízení plavidla
      description: Určuje materiál vnitřního lanka/jádra, které přenáší sílu.
    watercraft_steering_cable_hardware_included:
      name: Zahrnuté montážní prvky kormidelního lanovodu plavidla
      description: Specifikuje, které montážní prvky a příslušenství jsou součástí
        balení kormidelního lanovodu.
    watercraft_steering_cable_system_type:
      name: Typ systému lanového řízení plavidla
      description: Specifikuje architekturu kormidelního systému, pro kterou je lanovod
        navržen (např. rotační, hřebenový).
    watercraft_steering_wheel_hub_bore_type:
      name: Typ náboje/vývrtu volantu plavidla
      description: Specifikuje styl středového montážního/vrtaného rozhraní (např.
        kuželové, drážkované) spojení volantu nebo kola s nábojem či adaptérem.
    watercress_variety:
      name: Odrůda řeřichy
      description: Identifikuje konkrétní odrůdu nebo druh řeřichy seté, která se
        prodává.
    waterproof_level:
      name: Vodotěsnost
      description: Označuje úroveň vodotěsnosti obuvi, včetně případných tvrzení o
        vodotěsnosti, na která se vztahuje záruka.
    wax_blend_composition:
      name: Složení voskové směsi
      description: Uvádí voskové materiály smíchané v produktu a/nebo marketingový
        typ směsi.
    wax_coat_type:
      name: Typ voskového nátěru
      description: Označuje, zda je vosk určen jako základní nátěr, vrchní nátěr nebo
        univerzální/jednovrstvý nátěr.
    wax_hardness:
      name: Tvrdost vosku
      description: Udává relativní tvrdost vosku, která ovlivňuje odolnost a skluz
        na různých typech sněhu.
    wax_physical_form:
      name: Fyzická forma vosku
      description: Označuje fyzickou formu/tvar, ve kterých se surový vosk na svíčky
        dodává.
    wax_recommended_candle_application:
      name: Doporučené použití vosku pro výrobu svíček
      description: Označuje primární styl(y) svíček, pro které je vosk určen.
    wax_tackiness_level:
      name: Úroveň lepivosti vosku
      description: Popisuje úroveň lepivosti/přilnavosti, kterou vosk poskytuje na
        listu.
    weapon_system_integration:
      name: Integrace zbraňového systému
      description: Označuje, zda vozidlo obsahuje integrované zbraňové systémy nebo
        lafety.
    weather_suitability:
      name: Vhodnost pro počasí
      description: Označuje stav prostředí, pro které jsou rukavice určeny, například
        pro hraní v chladném nebo mokrém počasí.
    weave_finish:
      name: Tkaní/úprava
      description: Popisuje primární tkaní látky nebo povrchovou úpravu, která ovlivňuje
        texturu a lesk kravaty.
    weave_style:
      name: Styl tkaní
      description: Specifikuje tradiční vzor tkaní použitý při výrobě panamského klobouku,
        který ovlivňuje prodyšnost, poddajnost, vzhled a cenu.
    weave_type:
      name: Typ vazby
      description: Identifikuje styl tkaní/konstrukce látky (obchodní název vazby),
        který ovlivňuje texturu, lesk a splývavost.
    weaving_beater_edge_type:
      name: Typ hrany tkacího paprsku
      description: Popisuje profil pracovní hrany plochého tkacího paprsku, která
        přichází do styku s útkem (např. rovná nebo zoubkovaná).
    weaving_beater_style:
      name: Styl tkalcovského paprsku
      description: Identifikuje funkční styl/formát plochého tkacího paprsku.
    weaving_shuttle_tip_style:
      name: Typ hrotu tkacího člunku
      description: Specifikuje design předního hrotu/špičky člunku, který ovlivňuje,
        jak prochází prošlupem a jaká je pravděpodobnost zachycení osnovních nití.
    weaving_shuttle_use_case:
      name: Účel použití tkacího člunku
      description: Určuje zamýšlenou tkalcovskou aplikaci, pro kterou je člunek navržen
        nebo optimalizován.
    webbing_construction_type:
      name: Typ konstrukce popruhu
      description: Popisuje fyzický styl tkaní nebo opletení popruhu, který ovlivňuje
        manipulaci, pevnost a zamýšlené použití.
    webbing_design:
      name: Konstrukce popruhů
      description: Popisuje styl proplétání mezi prsty, který ovlivňuje trénink odporu
        a pohyb.
    weight_adjustability:
      name: Nastavitelnost hmotnosti
      description: Popisuje, zda může uživatel měnit odpor produktu (např. pomocí
        voliče nebo přidáváním závaží), nebo zda je pevně stanoven na jedné hmotnosti.
    weight_integration_system:
      name: Systém integrace závaží
      description: Popisuje, zda a jakým způsobem jsou zátěžové kapsy/integrovaná
        zátěž zakomponovány do žaketu (BCD) (např. odnímatelné zátěžové kapsy, žádné,
        volitelné příslušenství).
    weight_plate_compatibility:
      name: Kompatibilita s kotouči
      description: Definuje, jaké průměry závaží stroj akceptuje (olympijské, standardní
        nebo obojí).
    weight_plate_style:
      name: Styl závaží
      description: Klasifikuje provedení/typ závaží (např. olympijské, s bumperem,
        selektorizované) pro rychlé filtrování kompatibility.
    weightlifting_belt_style:
      name: Styl vzpěračského opasku
      description: Kategorizuje celkový design nebo účelovou konfiguraci opasku (např.
        opasek s pákovou přezkou, opasek na shyby se zátěží, zužující se opasek).
    weightlifting_federation_certification:
      name: Certifikace vzpěračské federace
      description: Oficiální schválení nebo shoda produktu se silovými sportovními
        federacemi, jako je IPF nebo IWF.
    wetsuit_boot_height:
      name: Výška boty neoprenového obleku
      description: Klasifikuje výšku/střih boty na noze, což ovlivňuje míru krytí,
        pohyblivost a vnikání vody.
    wetsuit_entry_system:
      name: Systém zapínání/vstupu do neoprenu
      description: Popisuje typ a umístění rozepínání/systému zipu, který se používá
        pro oblékání neoprenu.
    wetsuit_seam_construction:
      name: Konstrukce švů neoprenového obleku
      description: Určuje, jak jsou švy vyrobeny a utěsněny, což ovlivňuje teplo,
        flexibilitu a trvanlivost.
    wheat_product_form:
      name: Forma produktu z pšenice
      description: Určuje fyzickou nebo zpracovanou formu pšeničného produktu.
    wheel_arrangement:
      name: Uspořádání kol
      description: Specifikuje uspořádání pojezdových kol parní lokomotivy (Whyteův
        systém), což je klíčová charakteristika a běžný sběratelský nebo vyhledávací
        výraz.
    wheel_brake_type:
      name: Typ brzdy kola
      description: Detailně popisuje konfiguraci brzd na kolech nebo otočných kolečkách
        (kolečkách s vidlicí) vozíku.
    wheel_chock_grip_features:
      name: Prvky přilnavosti/protiskluzové vlastnosti zakládacího klínu
      description: Konstrukční prvky trakce a přilnavosti, které zvyšují přídržnou
        sílu na povrchu a proti pneumatikám.
    wheel_cleaner_acidity_ph_category:
      name: Kategorie kyselosti / pH čističe kol
      description: Udává, zda je čistič kol kyselý, neutrální nebo zásaditý (a volitelně
        zda má uvedenou hodnotu pH).
    wheel_cleaner_formula_type:
      name: Typ složení čističe kol
      description: U čističů kol a souvisejících mycích roztoků označuje primární
        kategorii složení produktu (např. na bázi kyselin, nekyselý, s neutrálním
        pH/s nízkým obsahem kyselin nebo reagující se železem).
    wheel_construction_type:
      name: Typ konstrukce kola
      description: Specifikuje metodu výroby/konstrukce kola (např. litá, kovaná,
        vícedílná kola).
    wheel_contaminant_target:
      name: Cílený typ znečištění kol
      description: Specifikuje primární typy nečistot, k jejichž odstranění je čistič
        určen (např. brzdový prach, silniční špína, asfalt).
    wheel_core_type:
      name: Typ jádra kola
      description: Popisuje styl konstrukce středu/jádra kola, který ovlivňuje hmotnost,
        tuhost a přenos energie.
    wheel_cylinder_inlet_port_thread_standard:
      name: Standard závitu vstupního otvoru brzdového válečku
      description: Specifikuje standard závitu vstupního otvoru pro brzdové potrubí
        na brzdovém válečku (např. metrický s kulovým zakončením/kuželový vs. SAE
        s obráceným kuželem).
    wheel_fastener_seat_type:
      name: Typ dosedací plochy kolového šroubu/matice
      description: Specifikuje styl dosedací plochy kolové matice/šroubu, která dosedá
        na kolo (např. kuželová, kulová/radiální, plochá).
    wheel_illumination:
      name: Osvětlení kol
      description: Indikuje, zda má kolo integrované osvětlení nebo svítící/luminiscenční
        prvky.
    wheel_material:
      name: Materiál koleček
      description: Identifikuje primární složení koleček, které ovlivňuje odolnost,
        přilnavost a tlumení vibrací.
    wheel_profile:
      name: Profil kola
      description: Popisuje tvar příčného průřezu kolečka, který ovlivňuje rychlost,
        přilnavost a obratnost.
    wheel_setup_type:
      name: Typ sestavení kola
      description: Definuje styl konfigurace koleček použitý na bruslích.
    wheel_system_finish:
      name: Povrchová úprava systému kol
      description: Povrchová úprava/povlak ráfků/kol a určitých kolových dílů/příslušenství.
    whip_style:
      name: Styl biče/bičíku
      description: Klasifikuje produkt podle specifického stylu jezdeckého biče/bičíku
        nebo určené disciplíny.
    whipped_cream_base:
      name: Základ šlehačky
      description: Identifikuje primární základní ingredienci použitou k výrobě šlehačky,
        například smetanu nebo kokos.
    whipped_cream_form:
      name: Forma šlehačky
      description: Označuje fyzickou formu, ve které se šlehačka prodává.
    whistle_head_material:
      name: Materiál hlavy píšťalky
      description: Specifikuje materiál hlavice/náustku píšťalky (jádra/špuntu/zátky
        v hlavici).
    whistle_light_features:
      name: Světelné funkce/prvky píšťalky
      description: Indikuje, zda píšťalka obsahuje integrované světelné efekty na
        party (např. LED).
    whistle_purpose:
      name: Účel píšťalky
      description: Identifikuje primární zamýšlené použití píšťalky (sportovní koučování,
        bezpečnost na moři, výcvik psů atd.).
    whistle_sound_style:
      name: Styl zvuku pískání
      description: Popisuje styl/charakter zvuku pískání (např. jednotónový nebo vícetónový).
    white_glue_finish_appearance_when_dry:
      name: Výsledný vzhled bílého lepidla po zaschnutí
      description: Specifikuje, jak lepidlo vypadá po zaschnutí při použití pro kreativní
        tvorbu nebo v kanceláři (např. transparentní nebo neprůhledné).
    white_glue_washability:
      name: Smývatelnost bílého lepidla
      description: Označuje, zda lze zaschlé lepidlo smýt/vyčistit z tkanin nebo kůže.
    whitewater_kayak_style:
      name: Styl kajaku na divokou vodu
      description: Primární konstrukční účel v segmentu divoké vody (např. Creekboat,
        River Runner, Playboat).
    whitewater_rating_class:
      name: Hodnocení pro divokou vodu (třída)
      description: Nejvyšší třída mezinárodní stupnice obtížnosti řek (International
        Scale of River Difficulty), pro kterou je raft certifikován/určen.
    whorl_mounting_interface:
      name: Rozhraní pro montáž přeslenu
      description: Způsob uchycení přeslenu k přadnému kolu (styl hřídele/připojení).
    wick_construction_type:
      name: Typ konstrukce knotu
      description: Konstrukce/styl knotu (pletený, plochý, čtvercový opletený, s jádrem,
        dřevěný atd.).
    wick_core_type:
      name: Typ jádra knotu
      description: Udává, zda je knot bez jádra, nebo zda obsahuje materiálové jádro
        (např. papírové nebo zinkové), což ovlivňuje tuhost a charakteristiku hoření.
    wick_tab_crimp_type:
      name: Typ nalisování/krimpování plíšku knotu
      description: Jakým způsobem plíšek zajišťuje knot (konstrukce/styl nalisování
        či krimpování).
    wick_tab_material:
      name: Materiál podložky knotu
      description: Materiál připojeného plíšku/stojánku knotu (obvykle pocínovaný
        plech), důležitý pro odolnost proti korozi a regulační preference (např. zamezení
        obsahu olova).
    wick_tab_shape:
      name: Tvar plíšku/stojánku knotu
      description: Tvar/provedení základny plíšku knotu.
    wick_type_included:
      name: Typ knotu v balení
      description: Určuje materiál/typ knotu, který je součástí sady.
    wig_fiber_material:
      name: Materiál vláken paruky
      description: Identifikuje primární vlákno použité pro výrobu paruky, takže nakupující
        si mohou snadno vybrat mezi variantami lidských vlasů a syntetickými variantami
        s různými stylingovými vlastnostmi a dlouhou životností.
    wildlife_attractant_scent:
      name: Vůně lákadla na zvěř
      description: Identifikuje hlavní vůni/pach použitý k lákání divoké zvěře, což
        zahrnuje přírodní pach potravy i pachy na bázi feromonů.
    willow_grade:
      name: Třída vrby
      description: Určuje třídu kvality použitého vrbového dřeva, která vypovídá o
        struktuře vláken (letokruhů) a celkové výkonnostní úrovni pálky.
    willow_type:
      name: Typ vrby
      description: Ukazuje, z jakého druhu vrby nebo jiného materiálu je vyrobena
        čepel pálky. Volba materiálu má zásadní vliv na její odolnost, herní vlastnosti
        a cenu.
    wind_up_mechanism_type:
      name: Typ natahovacího mechanismu
      description: Specifikuje, jak se hračka natahuje nebo uvádí do provozu.
    wind_up_toy_movement_pattern:
      name: Vzor pohybu natahovací hračky
      description: Popisuje hlavní pohyb, který vzniká po natažení.
    windbreak_purpose:
      name: Účel větrolamu
      description: Určuje primární způsob využití větrolamu.
    windfoil_board_mounting_system:
      name: Systém pro upevnění windfoilu
      description: Určuje typ boxu nebo systém uchycení hydrofoilu zabudovaný v prkně.
    windfoil_sail_style:
      name: Typ plachty na windfoil
      description: Klasifikuje plachtu podle zamýšleného stylu jízdy nebo disciplíny.
    winding_direction:
      name: Směr natahování
      description: Určuje režim otáčení natahovače hodinek (doprava, doleva nebo oběma
        směry).
    winding_method:
      name: Způsob natahování
      description: Specifikuje navíjení a vkládání útkové nitě do tkacího člunku.
    winding_speed_control_type:
      name: Typ regulace rychlosti navíjení
      description: Označuje metodu použitou k ovládání rychlosti navíjení během používání.
    winding_type:
      name: Typ vinutí
      description: Určuje typ vinutí basových strun (tvar profilu vnějšího drátu).
    windlass_control_station_type:
      name: Typ ovládacího stanoviště kotevního vrátku
      description: Typ ovládacího rozhraní, které je součástí nebo je podporováno
        pro ovládání vrátku.
    windlass_mount_type:
      name: Typ uchycení vrátku
      description: Kam/jak má být vrátek na lodi namontován.
    window_component_location:
      name: Umístění součásti okna
      description: Určuje konkrétní okno vozidla, na které se díl montuje (např. přední
        sklo, dveřní sklo, zadní sklo či pevné boční okénko).
    window_configuration:
      name: Konfigurace okna
      description: Určuje, zda má wingfoilové křídlo průhledná průzorová okna a jaká
        je jejich přibližná velikost.
    window_glass_construction:
      name: Konstrukce okenního skla
      description: Specifikuje bezpečnostní/laminovanou konstrukci okenního skla motorového
        vozidla.
    window_glass_features:
      name: Vlastnosti okenního skla
      description: Označuje, zda sklo podporuje integrované technologie vozidla (např.
        dešťový senzor, držák kamery).
    window_glass_finish:
      name: Povrchová úprava okenního skla
      description: Určuje variantu povrchové úpravy/tónování/ochrany soukromí okenního
        skla motorového vozidla.
    window_glass_tint_color:
      name: Barva tónování okenního skla
      description: Specifikuje barevný odstín tónování samotného skla (nikoli obecnou
        barvu produktu).
    window_glass_tint_level:
      name: Stupeň tónování okenního skla
      description: Určuje přibližný stupeň továrního tónování skla (originální zatmavení,
        nikoli folie z druhovýroby). Pokud není známa přesná hodnota VLT, použijte
        popisné úrovně.
    window_net_latch_mechanism:
      name: Mechanismus západky okenní sítě
      description: Specifikuje mechanismus západky/uvolnění použitý u okenní sítě
        (např. tlačítko, páčka, spona ve stylu bezpečnostního pásu).
    window_net_mounting_hardware:
      name: Montážní prvky okenní sítě
      description: Identifikuje typ montážního materiálu nebo způsob uchycení použitý
        k instalaci okenní sítě (např. klipy, šrouby, háček/tyč), případně zda je
        montážní materiál součástí balení.
    window_net_opening_direction:
      name: Směr otevírání okenní sítě
      description: Specifikuje, jak se okenní síť otevírá/uvolňuje vzhledem k posádce
        pro případ opuštění vozidla a v souladu s předpisy.
    window_regulator_operation:
      name: Způsob ovládání stahování oken
      description: Specifikuje, jak je stahování oken ovládáno (manuální klička nebo
        elektrický pohon).
    windshield_coverage_area:
      name: Oblast pokrytí čelního skla
      description: Určuje, které části přední části vozidla má kryt čelního skla chránit
        (např. pouze čelní sklo nebo zahrnuje stěrače, zrcátka, boční okna nebo okraj
        kapoty).
    windshield_mount_attachment_method:
      name: Metoda uchycení držáku na čelní sklo
      description: Specifikuje, jak držák přilne k povrchu čelního skla nebo jak se
        na něj uchycuje.
    windshield_washer_fluid_seasonality:
      name: Sezónnost kapaliny do ostřikovačů
      description: Indikuje určenou sezónu/klimatické podmínky nebo hlavní účel použití
        dané směsi do ostřikovačů (např. zimní proti zamrzání, letní proti hmyzu,
        celoroční).
    windsurf_fin_style:
      name: Styl windsurfingových ploutví
      description: Určuje typ windsurfingové frosky/flinty podle disciplíny a podmínek
        (např. wave, slalom, weed na vodní trávu).
    windsurfing_connection_standard:
      name: Standard upevnění k windsurfingu
      description: Specifikuje mechanické rozhraní nebo typ boxu použitý k upevnění
        dílu k prknu nebo oplachtění.
    windsurfing_sail_style:
      name: Styl plachty pro windsurfing
      description: Klasifikuje windsurfingovou plachtu podle zamýšlené disciplíny
        nebo způsobu použití, jako je wave, freeride nebo foil.
    wine_additive_type:
      name: Typ přísady do vína
      description: Specifikuje, o jaký typ produktu pro výrobu červeného vína se jedná
        (ingredience, aditivum, kvasinky, čiřicí prostředek, sadu atd.).
    wine_body:
      name: Tělo vína
      description: Popisuje vnímanou hmotnost a pocit z vína v ústech.
    wine_carbonation:
      name: Sycení vína oxidem uhličitým
      description: Indikuje, zda je víno tiché, perlivé nebo šumivé, a pokud je to
        relevantní, také intenzitu jeho perlení.
    wine_making_ingredient_type:
      name: Typ vinařské suroviny
      description: Specifikuje kategorii funkčních složek pro spotřebovatelné přísady
        a ingredience používané ve víně.
    wine_making_stage:
      name: Fáze výroby vína
      description: Určuje, pro který krok vinařského procesu je produkt určen.
    wine_style:
      name: Styl vína
      description: Klasifikuje širší styl produkce vína nad rámec jeho barvy, například
        na tiché, šumivé nebo fortifikované (portské, dolihované).
    winemaking_process_stage:
      name: Fáze procesu výroby vína
      description: Indikuje hlavní fázi vinařského procesu, pro kterou je daný produkt
        nebo materiál určen.
    wing_count:
      name: Počet křídel
      description: Počet křídel/ramen na bumerangu.
    wing_handle_type:
      name: Typ křídlové rukojeti
      description: Specifikuje styl systému úchopů (madel) na wingfoilovém křídle.
    wing_part_type:
      name: Typ části křídla
      description: Identifikuje konkrétní komponent nebo náhradní díl pro wingfoilové
        křídlo.
    wingfoiling_style:
      name: Styl jízdy na wingfoilu
      description: Označuje konkrétní disciplínu wingfoilingu nebo styl jízdy, na
        který je produkt zaměřen.
    wiper_arm_finish:
      name: Povrchová úprava raménka stěrače
      description: Povrchová úprava nebo ochranný povlak aplikovaný na raménko stěrače,
        který ovlivňuje odolnost proti korozi a vzhled.
    wiper_arm_pivot_mount_type:
      name: Typ uchycení otočného čepu raménka stěrače
      description: Určuje, jak se raménko stěrače montuje na táhlo nebo čep stěrače
        vozidla.
    wiper_blade_attachment_type:
      name: Typ uchycení stírátka stěrače
      description: Určuje typ konektoru/upevnění použitý k montáži stírací lišty k
        raménku stěrače.
    wiper_blade_rubber_material:
      name: Pryžový materiál stěrače
      description: Materiál stíracího prvku (vložky/náplně), který je v kontaktu se
        sklem.
    wiper_system_position:
      name: Poloha systému stěračů
      description: Označuje montážní polohu na vozidle pro systém stěračů.
    wire_coating_material:
      name: Materiál povlaku drátu
      description: Specifikuje materiál vnějšího potahu/pláště aplikovaného na drát
        (nikoli materiál samotného jádra), což může ovlivnit odolnost proti oděru
        a plynulost průvleku otvory korálků.
    wire_coating_type:
      name: Typ potahu drátu
      description: Specifikuje, zda a jakým způsobem je drát potažen/izolován (za
        účelem úpravy barvy, ochrany a textury).
    wire_construction_type:
      name: Typ konstrukce drátu
      description: Specifikuje fyzickou konstrukci korálkového drátku, například stočený
        vs. plný a zda je potažený.
    wire_finish:
      name: Povrchová úprava drátu
      description: Specifikuje povrchovou úpravu, povlak nebo pokovení nanesené na
        drát (např. leštěný, smaltovaný, galvanizovaný, pokovený), které ovlivňují
        vzhled a odolnost proti zašlosti/korozi.
    wire_gauge_awg:
      name: Tloušťka drátu (AWG)
      description: Velikost vodičů použitých v kabelovém svazku podle American Wire
        Gauge (AWG).
    wire_insulation_material:
      name: Materiál izolace drátu
      description: Materiál izolace/pláště drátu použitého v kabelovém svazku (ovlivňuje
        teplotní/chemickou odolnost).
    wire_packaging_type:
      name: Typ balení drátu
      description: Určuje způsob, jakým je drát prodáván/balen.
    wire_shape_profile:
      name: Tvar/profil drátu
      description: Popisuje tvar průřezu drátu.
    wiring_configuration:
      name: Konfigurace zapojení
      description: Označuje, zda je šermířský kord dodáván s předinstalovaným zapojením
        pro elektrické bodování, bez zapojení, bezdrátový, nebo určený pro neelektrický
        trénink.
    wobbler_style:
      name: Styl wobleru
      description: Definuje konkrétní design/akční styl wobleru, například crankbait
        nebo jerkbait.
    wood_block_surface_preparation:
      name: Příprava povrchu dřevěného špalku
      description: Označuje stav povrchu dřevěného špalku připraveného k použití pro
        povrchovou úpravu a řemeslnou tvorbu.
    wood_grain_direction:
      name: Směr letokruhů dřeva
      description: Směr letokruhů dřeva vzhledem k nejdelšímu rozměru produktu (důležité
        pro pevnost, chování při řezání a vzhled).
    wood_slice_edge_style:
      name: Styl okraje plátku dřeva
      description: Stav okraje plátku, například přirozený okraj s kůrou vs. hladký/obroušený
        okraj.
    wooden_block_special_features:
      name: Zvláštní vlastnosti dřevěného bloku
      description: Významné funkční vlastnosti obsažené v sadě dřevěných bloků.
    woodwind_body_construction:
      name: Konstrukce těla dřevěného dechového nástroje
      description: Označuje, zda je nástroj vyroben z jednoho kusu nebo z více částí
        (např. 2dílný/3dílný), což ovlivňuje čištění, skladování a přenositelnost.
    woodwind_polishing_cloth_intended_use:
      name: Zamýšlené použití leštěnky pro dřevěné dechové nástroje
      description: Specifikuje, co je hadřík primárně určen čistit/leštit na dřevěném
        dechovém nástroji.
    woodwind_small_part_type:
      name: Typ malého dílu dřevěného dechového nástroje
      description: Specifikuje, o jaký druh malého náhradního dílu klarinetu se jedná
        (např. klapkové součásti, klapky/korek/filcy, kroužky).
    woofer_mounting_type:
      name: Typ uchycení basového reproduktoru
      description: Způsob montáže/použití basového reproduktoru (volné ozvučení vs.
        v ozvučnici) a běžné způsoby montáže v automobilech.
    woofer_surround_material:
      name: Materiál závěsu basového reproduktoru
      description: Materiál použitý na závěs basového reproduktoru (vnější závěsný
        kroužek).
    worn_on_finger:
      name: Prst pro nošení
      description: Určuje, na kterém prstu se má náprstkový vodič nosit.
    wrap_style:
      name: Styl omotání
      description: Označuje, kolikrát se má pásek ovinout kolem pasu.
    wrapping_occasion:
      name: Příležitost pro balení
      description: Hlavní příležitost, pro kterou je balicí papír určen (např. dárek
        či oslava).
    wrapping_paper_features:
      name: Vlastnosti balicího papíru
      description: Funkční vlastnosti balicího papíru související s udržitelností,
        například odolnost proti roztržení, obsah recyklovaného materiálu nebo formáty
        předem nařezaných listů.
    wrestling_dummy_design:
      name: Provedení zápasnické figuríny
      description: Celkový tvar nebo postoj figuríny, například stojící lidská postava
        nebo házecí pytel, který určuje vhodná tréninková cvičení.
    wrestling_mat_safety_certifications:
      name: Bezpečnostní certifikace zápasnické žíněnky
      description: Vyjmenovává průmyslové nebo sportovní bezpečnostní certifikace
        či standardy, které žíněnka splňuje.
    wrist_strap_style:
      name: Styl pásku na zápěstí
      description: Popisuje styl pásku na zápěstí (nebo jeho absenci), který ovlivňuje
        oporu a padnutí.
    wrist_support_style:
      name: Styl podpory zápěstí
      description: íIdentifikuje konstrukci nebo styl podpory zápěstí, například ortéza,
        rukavice, páska nebo obvaz, pro snadnější výběr podle preferencí a požadovaného
        výkonu.
    xylophone_range_octaves:
      name: Rozsah xylofonu (oktávy)
      description: Celkový rozsah xylofonu vyjádřený v oktávách (např. 2,5 oktávy,
        3 oktávy, 4 oktávy).
    xylophone_resonator_type:
      name: Typ rezonátoru xylofonu
      description: Typ rezonátorového systému použitého k zesílení tónu (je-li přítomen).
    yam_variety:
      name: Odrůda jamů
      description: Určuje kultivar nebo běžnou odrůdu prodávaného jamu (např. fialový,
        žlutý, sloní noha).
    yarn_cutter_physical_style:
      name: Fyzický styl odstřihovače příze
      description: Identifikuje fyzický styl odstřihovače příze (např. přívěsek, prsten,
        nůžky), aby se usnadnilo procházení a filtrování v této kategorii.
    yarn_finish_or_effect:
      name: Povrchová úprava nebo efekt příze
      description: Zvýrazňuje speciální vizuální nebo funkční úpravy aplikované na
        přízi, například fluorescenci nebo kovový lesk.
    yarn_guide_style:
      name: Styl vodiče příze
      description: Fyzický styl součásti vodící přízi.
    yarn_swift_adjustability:
      name: Nastavitelnost odvíječe příze
      description: Označuje, zda a jak lze odvíječ nastavit (rozšiřitelný, skládací/sklápěcí),
        což ovlivňuje skladování a rozsah velikostí přaden, které dokáže zvládnout.
    yarn_swift_bearing_type:
      name: Typ ložiska odvíječe příze
      description: Popisuje mechanismus podpory rotace (např. kuličkové ložisko),
        který ovlivňuje plynulost a rychlost navíjení.
    yeast_application:
      name: Použití kvasinek
      description: Označuje primární kulinářské nebo fermentační použití kvasnicového
        produktu.
    yo_yo_accessory_part_type:
      name: Typ příslušenství/dílu jo-jo
      description: Identifikuje, o jaký druh náhradního dílu nebo příslušenství jo-jo
        se jedná (např. provázek, ložisko, odezvové podložky).
    yo_yo_axle_system_type:
      name: Typ osového systému jo-jo
      description: Konstrukční řešení osy jo-jo (např. pevná osa vs. převodovka s
        rozvodovkou), které ovlivňuje pocit při hraní a údržbu.
    yo_yo_bearing_size_class:
      name: Velikostní třída ložiska jo-jo
      description: Standardizovaná velikostní třída ložiska použitého v jo-jo, je-li
        relevantní.
    yo_yo_bearing_type:
      name: Typ ložiska jo-jo
      description: Konfigurace ložiska, která ovlivňuje odezvu a charakteristiky rotace.
    yo_yo_play_style:
      name: Styl hry s jo-jo
      description: Primární zamýšlený styl hry s jo-jo, odrážející disciplínu (provázek/triky),
        pro kterou je produkt navržen.
    yo_yo_response_system:
      name: Odezvový systém jo-jo
      description: Určuje odezvový mechanismus jo-jo, pro který je tento díl navržen
        (kompatibilita).
    yo_yo_responsiveness:
      name: Odezva jo-jo
      description: Zda se jojo vrací do ruky po lehkém zatažení (reaktivní), nebo
        je třeba ho přitáhnout (nereaktivní).
    yo_yo_string_material:
      name: Materiál provázku jo-jo
      description: Materiálové složení provázku jo-jo.
    yogurt_base_ingredient:
      name: Základní přísada jogurtu
      description: Uvádí hlavní zdroj mléka nebo rostlinné složky použitý k výrobě
        jogurtu, což je důležité z hlediska stravovacích preferencí a alergenů.
    yoke_type:
      name: Typ vidlice
      description: Identifikuje styl kolébky nebo vidlice, která podpírá střelnou
        zbraň na monopodu.
    zill_playing_style:
      name: Styl hry na prstové činely
      description: Zamýšlený kontext/styl hraní (obvykle břišní tance vs. orchestrální/kulturní
        varianty).
    zill_strap_material:
      name: Materiál pásku prstových činel
      description: Materiál prstového pásku/gumičky sloužící k uchycení prstových
        činelů (jsou-li součástí balení), který ovlivňuje pohodlí, odolnost a přilnavost.
    zills_strap_adjustability:
      name: Nastavitelnost pásku prstových činelů
      description: Zda a jak lze přiložený pásek/elastik upravit pro správné padnutí.
    zipper_application:
      name: Použití zipu
      description: Určuje zamýšlený projekt nebo použití, pro které je zip navržen.
    zipper_chain_type:
      name: Typ zipového řetězu
      description: Určuje konstrukci/typ zipového řetězu/zubů.
    zipper_end_type:
      name: Typ zakončení zipu
      description: Označuje, jak zip končí a zda je rozdělitelný (otevřený konec)
        nebo uzavřený (nerozdělitelný), včetně běžných součástí dělitelného konce
        používaných u řemeslných zipů.
    zipper_gauge:
      name: Velikost zipu
      description: 'Označuje velikostní označení zipového řetězu, obvykle vyjádřené
        číslem s # (například #3 nebo #5), které odpovídá šířce zubů/spirály a zamýšlenému
        použití.'
    zipper_opening_length:
      name: Délka otevírání zipu
      description: Definuje, jak velká část předního otvoru je opatřena zipem, rozlišuje
        styly s plným zipem, polovičním zipem nebo čtvrtinovým zipem.
    zipper_pull_material:
      name: Materiál táhla zipu
      description: Specifikuje materiál táhla zipu nebo táhla (části, kterou uchopíte),
        odlišný od zubů/řetízku a pásky zipu.
    zipper_pull_side:
      name: Strana jezdce zipu
      description: Specifikuje, ze které strany (stran) zipu je přístup k táhlu.
    zipper_pull_strap_cord_tab_material:
      name: Zip s popruhem/šňůrkou/materiál táhla
      description: Materiál pásku/šňůrky/poutka/střapce připevněného k táhlu zipu
        (je-li k dispozici), s výjimkou samotného kování/těla táhla zipu.
    zipper_reversibility_mechanism:
      name: Mechanismus oboustranného zapínání na zip
      description: Specifikuje, jak je zip oboustranný (např. oboustranný jezdec vs.
        překlápěcí/samosvorný jezdec navržený pro oboustranné oblečení).
    zipper_separating_type:
      name: Typ dělení zipu
      description: Označuje, zda se zip dělí dole/nahoře, nebo má uzavřený konec,
        pro použití u bund, spacích pytlů, tašek atd.
    zipper_side:
      name: Strana zipu
      description: Specifikuje stranu, na které se nachází hlavní zip, když spací
        pytel leží lícem nahoru.
    zipper_slider_material:
      name: Materiál jezdce zipu
      description: Specifikuje materiál jezdce zipu (pohyblivý mechanismus), který
        může ovlivnit pevnost a odolnost proti korozi.
    zipper_slider_pull_configuration:
      name: Konfigurace jezdce/táhla zipu
      description: Označuje, zda má zip jeden jezdec/táhlo nebo dva, a zda jsou táhla
        na jedné nebo obou stranách jezdce.
    zipper_style:
      name: Styl zipu
      description: Označuje délku nebo přítomnost zipu na oděvu (např. bez zipu, čtvrtinový
        zip, poloviční zip, plný zip).
    zipper_tape_material:
      name: Materiál pásky zipu
      description: Určuje primární materiál pásky zipu (textilní strany), která je
        všita do projektu.
    zipper_teeth_type:
      name: Typ zubů zipu
      description: Specifikuje konstrukční styl zipového řetězu/zubů (např. spirála,
        lisovaný plast, kov, neviditelný), který ovlivňuje pružnost, pevnost a typické
        použití.
