---
cs:
  attributes:
    3d_glasses_fit_design:
      name: Návrh nasazení 3D brýlí
      description: Označuje, jak se brýle nosí nebo připevňují (např. klip, wrap-around,
        fit-over).
    3d_glasses_material:
      name: Materiál 3D brýlí
      description: Určuje materiál použitý pro 3D brýle, jako je bambus nebo nerezová
        ocel
    3d_glasses_technology:
      name: Technologie 3D brýlí
      description: Určuje technologii 3D obrazu/synchronizace, pro kterou jsou brýle
        navrženy, což určuje kompatibilitu s konkrétními displeji nebo projektory.
    3d_printer_case_style:
      name: Styl pouzdra 3D tiskárny
      description: Klasifikuje celkový typ produktu, aby nakupující mohli rozlišit
        mezi měkkými přenosnými taškami, pevnými pouzdry, stacionárními kryty a jednoduchými
        ochrannými kryty proti prachu.
    3d_printer_cleaning_kit_components_included:
      name: Obsažené součásti čisticí sady pro 3D tiskárnu
      description: Uvádí jednotlivé nástroje a spotřební materiál dodávané v sadě,
        aby nakupující přesně věděli, co kupují.
    3d_printing_resin_type:
      name: Typ pryskyřice pro 3D tisk
      description: Určuje složení nebo zamýšlené použití pryskyřice, což pomáhá nakupujícím
        rychle identifikovat, zda je pryskyřice standardní, průmyslová, odlévatelná
        nebo jiných specializovaných typů.
    80_plus_efficiency_rating:
      name: Hodnocení účinnosti 80 Plus
      description: Označuje oficiální úroveň certifikace energetické účinnosti 80
        Plus, které PSU dosáhl.
    abrasive_material:
      name: Brusný materiál
      description: Označuje typ brusiva v brusných nástrojích, jako je diamant nebo
        karbid křemíku
    absinthe_style:
      name: Druh absintu
      description: Definuje styl absinthu, např. míchaný, destilovaný
    absinthe_variety:
      name: Příchuť absintu
      description: Rozlišuje absinty podle jedinečných druhů, např. rouge, verte
    absorbency_level:
      name: Úroveň savosti
      description: Určuje absorpční kapacitu, většinou u kosmetických produktů, např.
        přes noc, světlo
    absorbent_hygiene_product_features:
      name: Vlastnosti absorpčního hygienického produktu
      description: Identifikuje speciální vlastnosti hygienických produktů, jako jsou
        nepropustné či hypoalergenní
    academic_level:
      name: Akademická úroveň
      description: Určuje akademickou úroveň mediálního obsahu, jako je bakalářská
        nebo doktorská
    accessibility_design_features:
      name: Funkce pro usnadnění přístupu
      description: Uvádí speciální designové prvky, které pomáhají uživatelům s poruchami
        sluchu, zraku nebo motoriky.
    accessory_material:
      name: Materiál doplňku
      description: Určuje typ materiálu v příslušenství, obvykle u balicích potřeb;
        tj. plast, lepenka
    accessory_size:
      name: Velikost doplňku/příslušenství
      description: Definuje velikost doplňku, jako je univerzální velikost nebo kompaktní
    accordion_tuning:
      name: Ladění akordeonu
      description: Určuje typ ladění akordeonu, jako je suché nebo koncertní ladění
    activation_mechanism:
      name: Aktivační mechanismus
      description: Určuje primární metodu, která spouští alarm.
    activation_method:
      name: Způsob aktivace
      description: Popisuje, jak si uživatel předplacený kredit nebo SIM kartu aktivuje.
    active_ingredient:
      name: Účinná látka
      description: Identifikuje hlavní látky ve zdravotnických produktech, např. vitamín
        A, retinol
    activewear_clothing_features:
      name: Vlastnosti aktivního oblečení
      description: Identifikuje jedinečné vlastnosti aktivního oblečení, jako je čtyřsměrný
        streč nebo prodyšnost
    activity:
      name: Činnost
      description: Určuje sport nebo aktivitu, pro kterou je produkt určen, jako je
        tenis nebo pilates
    activity_tracker_design:
      name: Design sledovače aktivity
      description: Určuje, jak se sledovací přístroj nosí, např. klipsna, páska na
        ruku
    acupuncture_model_format:
      name: Formát modelu znázorňujícího akupunkturní body
      description: Definuje velikost a měřítko akupunkturních modelů, např. v životní
        velikosti, miniaturní
    acupuncture_model_type:
      name: Typ modelu znázorňujícího akupunkturní body
      description: 'Specifikuje část těla nebo druh, který akupunkturní model představuje,
        např. hlava, ruka, zvíře '
    adapter_directionality:
      name: Směrovost adaptéru
      description: Označuje, zda adaptér podporuje tok signálu v obou směrech nebo
        pouze v jednom určeném směru.
    adapter_operating_modes:
      name: Provozní režimy adaptéru
      description: Určuje, zda adaptér funguje jako Bluetooth přijímač, vysílač nebo
        obojí.
    adaptive_sync_technology:
      name: Technologie adaptivní synchronizace
      description: Určuje technologii variabilní obnovovací frekvence (VRR) podporovanou
        monitorem pro vizuály bez trhání.
    adc_resolution:
      name: Rozlišení ADC
      description: Určuje rozlišení (v bitech) integrovaného analogově-digitálního
        převodníku, definující přesnost měření.
    additional_animation_software_features:
      name: Další vlastnosti animačního softwaru
      description: Určuje jedinečné funkce v softwaru pro úpravu animací, jako je
        animace postav nebo vizuální efekty
    additional_cleaning_technology:
      name: Další čisticí technologie
      description: Uvádí jakékoli zahrnuté čisticí technologie mimo páru (např. ultrazvuková,
        UV, ozón).
    additional_design_software_type:
      name: Další typ designérského softwaru
      description: Určuje další možnosti designérského softwaru, jako je virtuální
        prohlídka nebo návrh krajiny
    additional_financial_software_features:
      name: Další vlastnosti finančního softwaru
      description: Identifikuje další funkce finančního softwaru, jako je správa aktiv
        nebo audit a dodržování předpisů
    additional_graphic_software_features:
      name: Další vlastnosti grafického softwaru
      description: Zvýrazňuje další možnosti grafického softwaru, jako je digitální
        ilustrace nebo návrh rozvržení
    additional_publishing_software_features:
      name: Další vlastnosti publikačního softwaru
      description: Zvýrazňuje další funkce v publikačním softwaru, jako je návrh tisku
        nebo digitální publikování
    additional_security_software_features:
      name: Jiné vlastnosti grafického softwaru
      description: Identifikuje další možnosti bezpečnostního softwaru, např. šifrování
        disku, detekce narušení
    adhesive_application_type:
      name: Typ aplikace lepidla
      description: Definuje, pro jaký typ prodlužování řas nebo použití je lepidlo
        určeno
    adhesive_features:
      name: Vlastnosti lepidla
      description: Zvýrazňuje speciální vlastnosti lepidla používaného na náplastech
        nebo páskách.
    adhesive_format:
      name: Formát lepidla
      description: Označuje fyzickou formu, ve které je lepidlo dodáváno pro použití
        při opravách
    adhesive_strength:
      name: Síla lepidla
      description: Určuje úroveň přilnavosti nebo zvedací síly lepidla nosní náplasti
        (např. původní, extra silná)
    adhesive_type:
      name: Typ přilnavosti
      description: Označuje typ lepidla v produktu, například odstranitelné nebo trvalé
    aftershave_product_form:
      name: Forma přípravku po holení
      description: Identifikuje konzistenci produktu po holení, jako je balzám nebo
        krém
    age_group:
      name: Věková skupina
      description: Definuje cílové věkové rozmezí pro produkt, jako dospělí nebo děti
    age_restrictions:
      name: Věková omezení
      description: Označuje minimální věkový požadavek pro produkt nebo událost, například
        18 let nebo starší
    ai_application:
      name: Aplikace AI
      description: Určuje funkci umělé inteligence v softwaru, jako je prediktivní
        analýza nebo rozpoznávání řeči
    air_freshener_form:
      name: Forma osvěžovače vzduchu
      description: Definuje typ osvěžovače vzduchu do auta, např. olej, připnutí na
        mřížku ventilace
    air_fryer_functions:
      name: Funkce vzduchové fritézy
      description: Uvádí různé režimy vaření dostupné ve fritéze nebo podobném zařízení,
        např. fritování, pečení
    air_mattress_features:
      name: Vlastnosti nafukovací matrace
      description: Popisuje jedinečné vlastnosti nafukovací matrace, jako je snadné
        nafouknutí nebo odolnost proti propíchnutí
    air_tube_configuration:
      name: Konfigurace vzduchové hadičky
      description: Uvádí počet nebo styl nafukovacích hadiček integrovaných s manžetou
    airbrush_feed_type:
      name: Typ plnění spreje
      description: Identifikuje způsob dodávání barvy ve stříkacích pistolích, jako
