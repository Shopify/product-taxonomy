    liner_installation_method:
      name: Způsob instalace podložky
      description: Popisuje, jak podložka drží na povrchu.
    lint_roller_type:
      name: Typ válečku na šaty
      description: Uvádí typ mechanismu či konstrukce válečku na šaty.
    live_trap_design:
      name: Provedení živolovné pasti
      description: Určuje celkový konstrukční typ pasti.
    lock_keying_option:
      name: Možnost konfigurace klíčů zámku
      description: Určuje konfiguraci klíčů zámku a pomáhá tak kupujícím, kteří potřebují
