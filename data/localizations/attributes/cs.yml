    row_counter_mechanism:
      name: Mechanismus počítadla řádků
      description: Určuje, jak se v nástroji zaznamenává/zvyšuje počet řádků.
    row_counter_mounting_method:
      name: Způsob montáže počítadla řádků
      description: Jak se počítadlo/značkovače připevňují během používání (k jehle,
        k prstu, k výčnělku atd.).
    rowel_type:
      name: Typ Rowela
      description: Popisuje tvar nebo profil hrany kolečka ostruhy pro preference
        jezdce a citlivost koně.
    rowing_machine_part_type:
      name: Typ dílu veslovacího trenažeru
      description: Identifikuje konkrétní součást veslovacího trenažéru, kterou má
        produkt nahradit, takže nakupující mohou rychle najít přesně ten díl, který
        potřebují, aniž by museli vytvářet explozi mikrokategorií.
    rubber_ducky_character_theme:
      name: Postava/motiv gumové kachničky
      description: Motiv nebo styl postavy gumové kachničky (užitečné pro netradiční/sběratelské
