    meat_tenderizer_face_type:
      name: Typ zakončení paličky na maso
      description: Popisuje strukturu povrchu zakončení paličky na maso.
    meat_tenderizer_mechanism:
      name: Mechanismus paličky na maso
      description: Uvádí hlavní funkční mechanismus paličky na maso.
    medical_specialty:
      name: Lékařská specializace
      description: Určuje lékařskou specializaci nebo obor zdravotní péče, pro který
