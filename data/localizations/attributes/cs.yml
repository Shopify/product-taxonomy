    lamp_post_base_mounting_type:
      name: Způsob montáže stojanu na lampu
      description: Udává, jak se stojan instaluje nebo upevňuje k zemi nebo k jinému
        povrchu.
    lamp_shade_fitter_type:
      name: Typ úchytu stínítka na lampu
      description: Určuje upevňovací mechanismus mezi stínítkem a lampou a umožňuje
        zjistit kompatibilitu, aniž by bylo potřeba hádat.
    lamp_shade_shape:
      name: Tvar stínítka na lampu
      description: Určuje geometrický tvar stínítka, což umožňuje zákazníkům rychle
        najít ten, který chtějí.
    lamp_shade_translucency:
      name: Průsvitnost stínítka na lampu
      description: Udává, kolik světla stínítkem prochází, a pomáhá uživatelům vybrat
