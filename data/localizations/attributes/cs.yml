    aircraft_engine_type:
      name: Typ leteckého motoru
      description: Určuje typ motoru pohánějícího letadlo, jako je proudový nebo turbovrtulový
    airflow_opening_design:
      name: Konstrukce otvorů pro proudění vzduchu
      description: Popisuje dýchací nebo větrací konfiguraci vestavěnou do náustku
    airsoft_equipment_included:
      name: Obsažené airsoftové vybavení
      description: Určuje další vybavení dodávané s airsoftovými produkty, jako jsou
