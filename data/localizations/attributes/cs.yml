      description: Popisuje styl dráhy míčku použitý na ruletovém kole, který ovlivňuje
        realismus a herní pocit.
    roulette_wheel_numbering_system:
      name: Systém číslování ruletových kol
      description: Označuje číslování ruletového kola a nulovou konfiguraci pro kompatibilitu
        hratelnosti/kurzů.
    rounders_equipment_included:
      name: Výbava pro klepanou v balení
      description: Uvádí konkrétní položky nebo příslušenství k rounderům dodávané
