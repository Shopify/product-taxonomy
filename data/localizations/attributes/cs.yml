    rubber_ducky_features:
      name: Vlastnosti gumové kachničky
      description: Funkční/designové prvky specifické pro gumové kachničky do koupele
    rubber_ducky_size_class:
      name: Třída velikosti gumové kachničky
      description: Uživatelsky přívětivé seskupení velikostí pro gumové kachničky
