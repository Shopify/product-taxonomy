    saddle_mounting_type:
      name: Typ uchycení sedla
      description: Určuje rozhraní mezi sedlem a sedlovkou z hlediska kompatibility
        (např. s lištou, středové, I-nosník).
    saddle_pad_shape:
      name: Tvar podložky pod sedlo
      description: Popisuje fyzický střih/obrys podložky, který ovlivňuje kompatibilitu
