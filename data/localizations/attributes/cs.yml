    amplifier_class:
      name: Třída zesilovače
      description: Definuje typ zesilovače, jako je AB nebo D
    amplifier_configuration:
      name: Konfigurace zesilovače
      description: Určuje nastavení zesilovačů do auta, jako jsou dvoukanálový nebo
        čtyřkanálový
    amputation_level:
      name: Úroveň amputace
      description: Označuje úroveň amputace, pro kterou je stahovací návlek navržen
    analyte_measured:
      name: Měřený analyt
      description: Identifikuje biomarker(y), pro které kontrolní roztok poskytuje
        kalibraci
    anamorphic_squeeze_ratio:
      name: Poměr anamorfního stlačení
      description: Udává faktor horizontální anamorfní komprese anamorfního objektivu
        a umožňuje uživatelům porovnat objektivy podle požadovaného výsledného roztažení.
    anatomical_detail_displayed:
      name: Zobrazený anatomický detail
      description: Uvádí, které anatomické nebo meridiánové prvky jsou na modelu zvýrazněny
    anchor_type:
      name: Typ kotvy
      description: Definuje kotvu taženého vybavení pro vodní sporty, jako je ramenová
        nebo pluhová
    anemometer_application:
      name: Aplikace anemometru
      description: Označuje zamýšlené použití anemometru, například průmyslový nebo
