      description: Konstrukce jádra vinutých strun.
    acoustic_piano_key_material:
      name: Materiál kláves akustického klavíru
      description: Udává primární materiál použitý pro povrch kláves klavíru.
    acoustic_piano_lid_type:
      name: Typ víka pro akustické klavíry
      description: Určuje styl mechanismu víka/krytu použitého u akustického piana
        (pro rozlišení mezi křídlem/svislým sklopným krytem/horním víkem).
    acoustic_piano_plate_frame_material:
      name: Materiál desky/rámu akustického klavíru
      description: Určuje hlavní materiál rámu piana (harfy), obvykle litinu.
    acoustic_piano_soundboard_material:
      name: Materiál rezonanční desky akustického klavíru
      description: Určuje primární materiál použitý pro rezonanční desku klavíru.
    action_figure_scale:
      name: Měřítko akčních figurek
      description: Udává měřítko (např. 1:12), pro které je tento sběratelský doplněk
        určen.
    action_type:
      name: Akční typ
      description: Popisuje mechanismus střelby nebo napínání zbraně (např. závěr,
        zlamovací mechanismus, pákový mechanismus).
    actuation_mechanism:
      name: Ovládací mechanismus
      description: 'Udává, jak páka ovládá brzdový systém: čistě mechanický lankový,
        plně hydraulický, hydraulicky ovládaný lankem nebo elektronický/bezdrátový.'
    actuation_method:
      name: Způsob ovládání
      description: Způsob aktivace nebo spuštění hasicího systému.
    adapter_orientation:
      name: Orientace adaptéru
      description: Určuje úhel nebo konfiguraci adaptéru ventilku pneumatiky jízdního
        kola, což ovlivňuje přístupnost pumpy (např. rovně, 90°).
    additive_application_stage:
      name: Fáze aplikace aditiv
      description: Označuje, v jaké fázi procesu je produkt určen k použití.
    adhesive_backing:
      name: Lepicí podložka
      description: Zda má potisknutelný hedvábný materiál lepicí podložku pro aplikaci
        metodou odlepení a nalepení.
    adhesive_formulation:
      name: Lepidlo
      description: Označuje chemický základ nebo složení lepidla, například kyanoakrylát
        nebo epoxid.
    adhesive_sides:
      name: Lepicí strany
      description: Označuje, zda je tavitelné lepidlo na jedné, nebo na obou stranách
        pásky či mřížky.
    adjunct_grain_processing_form:
      name: Způsob zpracování nesladových obilnin
      description: Označuje fyzickou/zpracovatelskou formu přídavného zrna prodávaného
        k vaření piva (např. vločkové, torifikované, sladové, syrové).
    adjustability_type:
      name: Typ nastavitelnosti
      description: Určuje, do jakého typu nastavení případně vzpěra sedí.
    adjustable_cup_mutes:
      name: Nastavitelné kalíškové dusítko
      description: Označuje, zda je košíček nastavitelný/odnímatelný, a způsob nastavení.
    adjustable_zones:
      name: Nastavitelné zóny
      description: Určuje, které části základny lze nastavit nezávisle.
    adjustment_type:
      name: Typ nastavení
      description: Označuje, zda je regulátor nastavitelný a jak se nastavení provádí.
    administration_method:
      name: Způsob podávání
      description: Uvádí, jak se odčervovač koni podává (např. orálně nebo injekčně),
        což pomáhá nakupujícím dodržovat veterinární pokyny a zvolit zvládnutelnou
        metodu aplikace.
    advice_card_prompt_type:
      name: Typ textu výzvy na kartě s radou
      description: Typ textové výzvy vytištěné na kartě (případně absence výzvy).
    aeration_method:
      name: Způsob větrání
      description: Popisuje typ provzdušňování poskytovaného nebo podporovaného kontejnerem,
        které zajišťuje dostatek kyslíku pro živou návnadu.
    aero_package_components:
      name: Komponenty aerodynamického balíčku
      description: Udává, které klíčové aerodynamické komponenty jsou na vozidle instalovány
        (vyberte všechny odpovídající).
    aerodynamic_elements_included:
      name: Zahrnuty aerodynamické prvky
      description: Určuje, které aerodynamické komponenty jsou součástí formulového
        vozu (vyberte všechny, které se vztahují, pokud jsou podporovány).
    aftertouch_support:
      name: Podpora Aftertouch
      description: Zda ovladač podporuje aftertouch (kanálový nebo polyfonní) na klávesách
        či padech.
    agave_content_classification:
      name: Klasifikace podle obsahu agáve
      description: Určuje, zda je tequila vyrobena ze 100% modré agáve Weber, nebo
        se jedná o směs s minimálně 51 % agávových cukrů.
    aida_cloth_count:
      name: Hustota vyšívací látky Aida
      description: Určuje hustotu vyšívací látky Aida (počet čtverečků/stehů na palec),
        která udává velikost stehu a měřítko motivu.
    aida_cloth_pre_cut_format:
      name: Předřezaný formát látky Aida
      description: Označuje, zda se látka Aida prodává jako předřezaný kus, metráž
        stříhaná z role, nebo v celé roli.
    air_bag_material:
      name: Materiál měchu
      description: Určuje materiál vaku neboli měchu použitého u irských dud (warpipe).
    air_bed_internal_construction:
      name: Vnitřní konstrukce nafukovací postele
      description: Popisuje vnitřní strukturu nebo technologii použitou uvnitř nafukovací
        postele pro pohodlí a stabilitu.
    air_dry_clay_color_form:
      name: Forma barvy samotvrdnoucí modelovací hmoty
      description: Zda se modelovací hmota prodává předbarvená, bílá či neutrální
        k barvení nebo jako směs různých druhů.
    air_hockey_items_included:
      name: Obsažené položky pro vzdušný hokej
      description: Uvádí konkrétní součásti příslušenství obsažené v sadě, aby zákazníci
        přesně věděli, co dostanou (např. dva odpalovače, čtyři puky, dvě plstěné
        podložky).
    air_intake_temperature_sensor_mounting_style:
      name: Způsob montáže snímače teploty nasávaného vzduchu
      description: Způsob fyzické montáže snímače IAT v sacím systému.
    air_integration_capability:
      name: Funkce integrace vzduchu
      description: Označuje, zda a jak potápěčský počítač podporuje bezdrátové vysílače
        tlaku v lahvi.
    air_mattress_valve_type:
      name: Typ ventilu nafukovací matrace
      description: Určuje typ ventilu, pro který je příslušenství určeno nebo který
        obsahuje, což zajišťuje kompatibilitu mezi pumpami, ventily a náhradními díly.
    air_water_rocket_kit_items_included:
      name: Obsažené součásti sady rakety na vzduch a vodu
      description: Klíčové komponenty součástí raketové sady (odpalovací zařízení,
        čerpadlo, ploutve, náhradní díly pro doplnění).
    air_water_rocket_launch_method:
      name: Způsob startu rakety na vzduch a vodu
      description: Jak je raketa natlakována a vypuštěna (interakce s uživatelem a
        typ vybavení).
    airbag_position:
      name: Poloha airbagu
      description: Určuje zamýšlenou polohu/zónu zádržného systému, která je součástí
        podpory airbagu.
    aircraft_ads_b_capability:
      name: Funkce ADS-B letadla
      description: Určuje, zda je letadlo vybaveno pro shodu se standardem ADS-B Out.
    aircraft_airframe_material:
      name: Materiál draku letadla
      description: Hlavní materiál(y) použitý(é) při konstrukci draku letadla.
    aircraft_cabin_configuration:
      name: Provedení kabiny letadla
      description: Udává uspořádání kabiny letadla (např. konferenční uspořádání,
        pohovkové, čtyřzónovou kabinu).
    aircraft_documentation_included:
      name: Součástí je dokumentace k letadlu
      description: Uvádí, které dokumenty jsou dodávány s dílem (např. 8130-3).
    aircraft_galley_configuration:
      name: Provedení palubní kuchyňky
      description: Přítomnost a typ kuchyňky nebo palubního občerstvení v kabině.
    aircraft_installation_location:
      name: Lokalita instalace letadel
      description: Kde je v letadle součástka nebo příslušenství instalována nebo
        používána.
    aircraft_internet_connection:
      name: Internetové připojení v letadle
      description: Označuje přítomnost/typ internetového připojení v kabině.
    aircraft_landing_gear_type:
      name: Typ podvozku letadla
      description: Udává konfiguraci podvozku vírníku.
    aircraft_lavatory_configuration:
      name: Konfigurace toalet v letadle
      description: Typ konfigurace palubní toalety.
    aircraft_maintenance_program_enrollment:
      name: Zápis do programu údržby letadel
      description: Uvádí, zda je letadlo zapsáno do programu údržby motoru a/nebo
        draku letadla, a pokud ano, jaký typ krytí se vztahuje (motor, drak letadla
        nebo obojí).
    aircraft_operational_certification:
      name: Provozní certifikace letadel
      description: Specifikuje regulační nebo provozní certifikační předpis, podle
        kterého je letadlo provozováno (v závislosti na jurisdikci, např. FAA část
        91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Certifikace ochranných pomůcek pro letadla
      description: Udává letecký/regulační nebo průmyslový standard, který ochranná
        pomůcka splňuje.
    aircraft_system_application:
      name: Aplikace leteckých systémů
      description: Identifikuje, do kterého systému nebo oblasti letadla díl/příslušenství
        patří (používá se pro procházení a filtrování různých dílů letadla).
    airflow_resistance_level:
      name: Úroveň odporu proudění vzduchu
      description: Udává, jak velký odpor vzduchu / zpětný tlak dusítko klade při
        hraní.
    airship_envelope_material:
      name: Materiál obalu vzducholodi
      description: Hlavní materiál pláště vzducholodě.
    airsoft_part_type:
      name: Typ airsoftové součástky
      description: Identifikuje funkční součást nebo typ příslušenství pro airsoftové
        zbraně (např. zásobník, hlaveň, předpažbí).
    airworthiness_approval_basis:
      name: Základ pro schválení letové způsobilosti
      description: Udává, na základě čeho je daný díl schvalován/certifikován, pokud
        se to na něj vztahuje (např. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Nastavitelnost hlasitosti budíku
      description: Označuje, zda a jak může uživatel upravit hlasitost budíku.
    alcohol_ink_finish_effect:
      name: Efekt alkoholového inkoustu
      description: Popisuje vizuální efekt nebo povrchovou úpravu vytvořenou alkoholovým
        inkoustem (kromě samotné barvy), například metalický nebo perleťový efekt.
    alignment_aid_style:
      name: Typ vyrovnávací pomůcky
      description: Popisuje typ zarovnávacích vodítek vytištěných nebo vložených na
        povrch podložky (např. přímky, značky vzdálenosti).
    alternator_cooling_type:
      name: Typ chlazení alternátoru
      description: Popisuje způsob chlazení a ventilace alternátoru.
    alternator_marine_ignition_protection_rating:
      name: Stupeň ochrany proti vznícení pro lodní alternátory
      description: Označuje, zda je alternátor chráněn proti zapálení pro motorové
        prostory lodních vozidel (např. vyhovuje normě SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Konfigurace montáže alternátoru
      description: Určuje fyzickou montážní konfiguraci použitou k připevnění alternátoru
        k držáku motoru.
    alternator_pulley_type:
      name: Typ řemenice alternátoru
      description: Určuje provedení řemenice/spojky alternátoru (případně udává, že
        řemenice není součástí dodávky).
    alternator_regulator_type:
      name: Typ regulátoru alternátoru
      description: Udává, zda je regulátor napětí interní nebo externí a zda je řízen
        výrobcem (OEM) (řídí jej počítač/PCM).
    alternator_terminal_connection_type:
      name: Typ připojení svorek alternátoru
      description: Hlavní typ elektrického připojení pro výstupní/budicí svorky alternátoru
        pro zajištění kompatibility s kabelovým svazkem.
    altitude_suitability:
      name: Vhodnost pro nadmořskou výšku
      description: Označuje, zda je míč navržen pro specifické podmínky nadmořské
        výšky, které ovlivňují jeho rychlost a odraz.
    ambulance_stretcher_mount_type:
      name: Typ uchycení nosítek pro sanitky
      description: Určuje typ systému nakládání/montáže nosítek, který sanitka podporuje.
    american_football_safety_certification:
      name: Bezpečnostní certifikace pro americký fotbal
      description: Označuje bezpečnostní certifikace nebo normy specifické pro americký
        fotbal, které produkt splňuje.
    amplifier_tube_function:
      name: Funkce zesilovací elektronky
      description: Určuje funkční role elektronky v obvodu přístrojového zesilovače
        (např. předzesilovač vs. výkon).
    analog_synthesizer_cv_gate_i_o:
      name: Analogový syntezátor CV/Gate I/O
      description: Určuje funkční roli elektronky v obvodu přístrojového zesilovače
        (např. předzesilovač vs. výkonový zesilovač).
    analog_synthesizer_keybed_configuration:
      name: Konfigurace kláves analogového syntezátoru
      description: Popisuje, zda syntezátor obsahuje vestavěnou klaviaturu, a pokud
        ano, počet kláves.
    anchor_configuration:
      name: Konfigurace kotvení
      description: Označuje, zda závěsný systém používá jeden centralizovaný kotevní
        bod nebo více nezávislých kotevních bodů, což ovlivňuje rozmanitost cvičení
        a složitost nastavení.
    animal_raising_method:
      name: Metoda chovu zvířat
      description: Popisuje zemědělské nebo hospodářské postupy používané pro zdrojové
        zvíře.
    animal_species:
      name: Druhy zvířat
      description: Určuje zvíře nebo tvora, kterého plyšák představuje (např. medvěd,
        králíček, dinosaurus).
    animal_trap_jaw_style:
      name: Styl čelisti pro zvířecí past
      description: Konstrukce čelistí pasti, která ovlivňuje sílu sevření a welfare
        zvířat.
    animal_trap_type:
      name: Typ pasti na zvířata
      description: Klasifikuje mechanické provedení/konstrukci pasti, což nakupujícím
        umožňuje rychle najít přesný způsob odchytu, který potřebují nebo který povolují
        předpisy.
    ankle_collar_style:
      name: Styl límce na kotník
      description: Popisuje styl nebo konstrukci kotníkového lemu boty, například
        nízký, střední či vysoký střih, ponožkový lem nebo provedení bez tkaniček,
        což ovlivňuje oporu, padnutí a estetiku.
    ankle_guard_protection_level:
      name: Úroveň ochrany chráničů kotníků
      description: Hodnotí celkovou míru ochrany proti nárazům, kterou chránič kotníku
        poskytuje.
    ankle_strap_padding_type:
      name: Typ polstrování kotníkového pásku
      description: Popisuje tlumicí materiál nebo způsob polstrování uvnitř popruhu,
        který ovlivňuje pohodlí.
    ankle_strap_type:
      name: Typ kotníkového řemínku
      description: Klasifikuje konstrukci nebo design kotníkového popruhu na snowboardové
        vázání.
    ant_farm_habitat_medium_type:
      name: Typ média nebo výplně mravenčí farmy
      description: Určuje primární tunelovací/pozorovací médium poskytované nebo vyžadované
        mravenčí farmou.
    ant_farm_kit_contents:
      name: Obsah sady mravenčí farmy
      description: Udává, které komponenty jsou součástí sady mravenčí farmy (např.
        formikárium, písek/gel, poukaz na mravence, krmicí nástroje).
    ant_farm_lighting_type:
      name: Typ osvětlení mravenčí farmy
      description: Určuje typ vestavěného osvětlení (pokud existuje) použitého pro
        pozorování.
    antenna_fit_type:
      name: Typ montáže antény
      description: Pro jaké provedení antény je anténní kulička určena.
    anti_caking_agent:
      name: Protispékavá látka
      description: Určuje typ protispékavé látky přidané k zabránění shlukování, což
        je informace důležitá pro zvážení alergenů a přesnost receptury.
    anti_g_suit_bladder_material:
      name: Materiál měchýře obleku Anti-G
      description: Materiál použitý na vnitřní nafukovací vak(y) uvnitř anti-G obleku;
        pokud je použito více materiálů, uveďte všechny, které jsou jeho součástí.
    anti_g_suit_connector_type:
      name: Typ konektoru anti-G obleku
      description: Určuje typ/standard konektoru vzduchové/tlakové hadice použitého
        k propojení s letadlem nebo regulátorem.
    anti_g_suit_inflation_method:
      name: Způsob nafukování anti-G obleku
      description: Udává, jakým způsobem jsou vaky obleku natlakovány, aby poskytovaly
        ochranu proti přetížení.
    anti_g_suit_size_system:
      name: Systém velikostí anti-G obleků
      description: Velikostní norma používaná k určení velikosti/střihu obleku.
    anti_reverse_type:
      name: Typ s protiběžným chodem
      description: Určuje typ mechanismu proti zpětnému chodu (anti-reverse), který
        ovlivňuje úspěšnost zaseknutí háčku a vůli navijáku.
    anti_theft_feature:
      name: Funkce proti krádeži
      description: Označuje, zda držák/držák poskytuje ochranu proti krádeži, například
        zamykací uzávěry nebo odolnost proti neoprávněné manipulaci.
    antique_gun_ignition_system:
      name: Systém zapalování starožitných zbraní
      description: Udává historický systém střelby/zapalování použitý u starožitné
        palné zbraně.
    apple_variety:
      name: Odrůda jablek
      description: Udává kultivar nebo odrůdu jablka (např. Gala, Fuji, Granny Smith),
        což zákazníkům pomáhá s výběrem na základě chuti, textury a využití v kuchyni.
    applique_edge_finish:
      name: Zakončení okraje aplikace
      description: Popisuje způsob zakončení hran, což ovlivňuje vzhled a odolnost
        proti třepení.
    arbor_type:
      name: Typ trnu
      description: Klasifikuje naviják podle konstrukce středu cívky, která ovlivňuje
        rychlost navíjení, maximální návin podkladové šňůry a tvarovou paměť vlasce.
    archery_accessory_type:
      name: Typ příslušenství pro lukostřelbu
      description: Určuje typ příslušenství určeného pro lukostřelecké nástroje, aby
        nakupující mohli produkty rychle filtrovat.
    archery_part_type:
      name: Typ dílu lukostřeleckého vybavení
      description: Identifikuje konkrétní prodávaný hardware nebo náhradní díl (např.
        střed luku, rameno, tětivu), což umožňuje přesné filtrování bez zahlcení stromu
        kategorií.
    archery_range_accessory_type:
      name: Typ příslušenství pro lukostřeleckou střelnici
      description: Klasifikuje konkrétní druh příslušenství používaného na lukostřelnici,
        což umožňuje nakupujícím rychle filtrovat přesně tu položku, kterou potřebují.
    archery_target_features:
      name: Terčové prvky pro lukostřelbu
      description: Uvádí specializované funkční nebo praktické prvky, které nejsou
        zahrnuty v jiných parametrech (např. samoregenerační pěna, rukojeť pro přenášení).
    archery_tool_type:
      name: Typ lukostřeleckého nástroje
      description: Klasifikuje konkrétní druh lukostřeleckého nářadí nebo součásti
        vybavení.
    armband_features:
      name: Vlastnosti náramku
      description: Udává speciální funkční nebo vizuální prvky, které náramek vylepšují.
    armguard_style:
      name: Provedení chrániče předloktí
      description: Udává konstrukční styl nebo provedení chrániče předloktí, což napovídá
        o míře ochrany a tradičním či moderním vzhledu.
    armor_protection_type:
      name: Typ pancéřové ochrany
      description: Typ ochrany, kterou poskytuje pancéřování vozidla.
    armrest_adjustability:
      name: Nastavitelnost loketní opěrky
      description: Definuje rozměrovou nastavitelnost a konfiguraci područek židle
        (např. pevné, 2D, 3D, výklopné).
    armrest_type:
      name: Typ loketní opěrky
      description: Popisuje přítomnost a nastavitelnost područek na židli (např. žádné
        područky, pevné, nastavitelné, odnímatelné).
    arrow_bolt_point_type:
      name: Typ hrotu šípu nebo šipky do kuše
      description: Definuje styl hrotu nebo špičky na šípu nebo střele do kuše.
    arrow_component_type:
      name: Typ součásti šípu
      description: Klasifikuje konkrétní součástku nebo příslušenství pro šíp (vložka,
        obal, pouzdro, lepidlo atd.), takže zákazníci mohou položky filtrovat bez
        nutnosti desítek dalších podkategorií.
    arrow_containment_level:
      name: Úroveň vedení šípu
      description: Popisuje, zda zakládka šíp plně fixuje, částečně fixuje, nebo jej
        nefixuje.
    arrow_fletching_orientation:
      name: Orientace operení šípu
      description: Určuje orientaci křídla nebo odsazení operení (např. levé křídlo,
        pravé křídlo, spirálovité), která určuje směr otáčení šípu.
    arrow_nock_groove_size:
      name: Velikost drážky končíku šípu
      description: Udává velikostní klasifikaci drážky/zářezu končíku pro tětivu,
        která určuje kompatibilitu s různými průměry tětiv.
    arrow_nock_type:
      name: Typ končíku šípu
      description: Design/styl končíku šípu, který je v kontaktu s tětivou.
    arrow_rest_style:
      name: Typ zakládky šípu
      description: Určuje funkční styl/mechanismus zakládky šípu (např. padací, žiletková
        nebo štětinová zakládka typu whisker biscuit). Tento styl určuje, jak zakládka
        šíp podpírá, fixuje a uvolňuje, a pro nakupující představuje hlavní kritérium
        pro výběr produktu.
    arrow_shaft_compatibility:
      name: Kompatibilita s dříkem šípu
      description: Označuje standard šachty/pouzdra šípu, pro který osvětlený končík
        pasuje (např. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Tvar hrotu uměleckých/řemeslných nástrojů
      description: Popisuje tvar a profil funkčního hrotu (např. špičatý vs. zaoblený
        kulový), čímž určuje druh reliéfních stop, které vytváří.
    art_ink_lightfastness_rating:
      name: Světlostálost uměleckého inkoustu
      description: Udává odolnost inkoustu vůči blednutí při vystavení světlu, obvykle
        vyjádřená pomocí standardních hodnot.
    art_ink_opacity:
      name: Kryvost uměleckého inkoustu
      description: Určuje úroveň krytí inkoustu po nanesení.
    art_security_rating:
      name: Úroveň bezpečnostní certifikace ART
      description: Uvádí nizozemské hvězdičkové hodnocení ART (1–5 hvězdiček), které
        zámek získal.
    artichoke_cut:
      name: Řez artyčoku
      description: Označuje, která část nebo způsob úpravy artyčoku se nabízí (např.
        celý, srdíčko, dno), aby zákazníci rozuměli výtěžnosti a zamýšlenému kulinářskému
        využití.
    artichoke_variety:
      name: Odrůda artyčoku
      description: Určuje kultivar nebo botanickou odrůdu artyčoku, což nakupujícím
        pomáhá rozlišit produkty podle velikosti, barvy, chuti a kulinářského využití.
    articulation_features:
      name: Artikulační rysy
      description: Označuje, zda má model dinosaura pohyblivé části (polohovatelnou
        čelist, končetiny, ocas) a celkovou polohovatelnost.
    artificial_bait_form:
      name: Tvar umělé nástrahy
      description: Udává fyzický tvar nebo provedení rybářské nástrahy.
    asa_mounting_type:
      name: Typ montáže ASA
      description: Označuje typ rozhraní adaptéru zdroje vzduchu (ASA) nebo montážní
        standard, který využívá adaptér posunu regulátoru (drop forward) – např. rybinu,
        lištu či přímou montáž.
    ascender_descender_type:
      name: Typ zvedacího/slaňovacího zařízení
      description: Klasifikuje typ horolezeckého blokantu nebo slaňovací brzdy pro
        přesnější filtrování.
    aspiration_type:
      name: Typ aspirace
      description: Určuje, zda je motor s atmosférickým sáním, nebo s přeplňováním.
    assembly_state:
      name: Stav sestavy
      description: Označuje, zda je skříň připravena k montáži, předem smontována
        nebo v jiné formě.
    assistance_mechanism:
      name: Mechanismus pomoci
      description: Určuje jakýkoli vestavěný asistenční nebo odporový systém, který
        posilovací věž poskytuje pro shyby, dřepy nebo jiná cvičení.
    atemoya_cultivar:
      name: Kultivar Atemoya
      description: Určuje jakýkoli vestavěný asistenční nebo odporový systém, který
        posilovací věž poskytuje pro shyby, kliky na bradlech nebo jiná cvičení.
    athletic_cup_size:
      name: Velikost sportovního suspenzoru
      description: Označuje velikost ochranného košíku určenou výrobcem, aby sportovci
        suspenzor správně padnul.
    attachment_position:
      name: Poloha upevnění
      description: Udává, kde na sedle nebo jezdci má být brašna připevněna.
    attractant_scent_profile:
      name: Profil vůně lákadla
      description: Popisuje specifický zápach nebo chuť používanou k přilákání divokých
        zvířat nebo maskování lidského pachu.
    atv_utv_intended_use:
      name: Zamýšlené použití čtyřkolek/UTV
      description: Primární zamýšlené použití/styl čtyřkolky/UTV.
    audio_channel_configuration:
      name: Konfigurace audio kanálů
      description: Počet samostatných zvukových kanálů, které ekvalizér či DSP podporuje
        (např. dvoukanálové stereo, čtyřkanálové uspořádání vpředu/vzadu, šestikanálové
        uspořádání).
    audio_inputs:
      name: Audiovstupy
      description: Určuje typy zvukových vstupů dostupných pro samplování nebo nahrávání
        (např. 1/4" linkový jack, XLR, 3,5mm jack, mikrofonní předzesilovač, phono).
    audio_output:
      name: Audiovýstup
      description: Označuje, zda hračka vydává zvuk a jakým způsobem je zvuk přehráván.
    audio_outputs:
      name: Audiovýstupy
      description: Určuje dostupné audio výstupy, včetně hlavních výstupů a všech
        přiřaditelných/aux výstupů.
    audio_playback_source:
      name: Zdroj přehrávání zvuku
      description: Primární mediální zdroje, ze kterých může karaoke sada přehrávat
        hudbu.
    autograph_authentication:
      name: Ověřování autogramu
      description: Označuje stav/typ ověření autogramu na kartě.
    autograph_format:
      name: Formát autogramu
      description: Popisuje, zda se jedná o originální vlastnoruční podpis, ražené/tištěné
        faksimile nebo věnování/vpisek.
    autogyro_cockpit_enclosure:
      name: Provedení kokpitu vírníku
      description: Určuje, zda je kokpit otevřený nebo uzavřený.
    available_firing_modes:
      name: Dostupné režimy střelby
      description: Udává volitelné režimy střelby, pro které byl paintballový marker
        vyroben.
    avocado_variety:
      name: Odrůda avokáda
      description: Určuje kultivar nebo odrůdu avokáda, což nakupujícím pomáhá rozlišit
        rozdíly v chuti, textuře, velikosti a obsahu oleje.
    award_customization_included:
      name: Možnost přizpůsobení ocenění v ceně
      description: Označuje, jaká personalizace nebo přizpůsobení je zahrnuto v ceně
        nákupu ocenění.
    award_material:
      name: Materiál pro ocenění
      description: Určuje hlavní materiál či materiály ocenění (trofeje, štítku plakety,
        medaile, odznaku nebo kovových prvků stuhy).
    award_mounting_display_type:
      name: Typ upevnění/zobrazení ocenění
      description: Určuje, jak má být ocenění vystaveno nebo upevněno (na stěnu vs.
        na stůl vs. nošené).
    award_plaque_plate_material:
      name: Materiál štítku plakety s oceněním
      description: Určuje materiál jmenovky/gravírovací destičky připevněné k plaketě
        (odlišný od podkladového materiálu).
    award_ribbon_attachment_type:
      name: Typ uchycení stuhy k zavěšení ocenění
      description: Určuje, jak má být stuha připevněna nebo nošena.
    award_ribbon_imprint_method:
      name: Způsob potisku stuhy k zavěšení ocenění
      description: Určuje, jak se text nebo grafika aplikují na stuhu.
    award_ribbon_material:
      name: Materiál stuhy pro ocenění
      description: Hlavní materiál stuhy (např. satén, polyester).
    award_ribbon_placement_title:
      name: Umístění/titul stuhy ocenění
      description: Standardní umístění nebo titul vyjádřený stuhou (např. 1. místo,
        účastník).
    axle_compatibility:
      name: Kompatibilita s osou kol
      description: Udává standard osy, pro který je kolo určeno, aby byla zajištěna
        kompatibilita s rámem a vidlicí jízdního kola.
    back_beam_type:
      name: Typ zadního nosníku
      description: Typ/nastavitelnost zadního nosníku (např. pevný nebo výškově nastavitelný).
    back_design:
      name: Design zadní strany
      description: Určuje výrazné konstrukce zad na oděvech, které ovlivňují styl
        a podporu.
    back_panel_type:
      name: Typ zadního panelu
      description: Určuje styl nebo materiál zadního panelu skříně, což ovlivňuje
        viditelnost na displeji a sladění dekorace.
    back_sides_material:
      name: Materiál zadní strany a boků
      description: Určuje materiál použitý pro zadní stranu a boky těla klasické kytary.
    backing_type:
      name: Typ podkladu
      description: Popisuje způsob uchycení nebo typ spodní strany prodávané štrasové
        aplikace (u samolepicích produktů).
    backup_camera_mounting_location:
      name: Místo montáže couvací kamery
      description: Označuje zamýšlené místo instalace couvací kamery na vozidle.
    backup_camera_video_interface:
      name: Video rozhraní couvací kamery
      description: Určuje video výstup, rozhraní nebo konektor používaný couvací kamerou
        pro připojení k monitoru, DVR nebo hlavní jednotce (např. kompozitní RCA,
        LVDS OEM, IP přes Ethernet).
    badminton_set_components_included:
      name: Součástí badmintonové sady přiloženy
      description: Uvádí jednotlivé položky obsažené v badmintonové sadě.
    bag_attachment_method:
      name: Způsob upevnění tašky
      description: Označuje primární způsob upevnění hydratačního vaku/držáku k jinému
        vybavení (např. popruh MOLLE, poutko na opasek, karabina).
    bag_case_carrying_style:
      name: Způsob nošení tašky nebo pouzdra
      description: Určuje hlavní celkový způsob nošení pouzdra či obalu (způsob, jakým
        je konstruováno pro přenášení).
    bag_cover_material:
      name: Materiál obalu tašky
      description: Určuje svrchní materiál vaku (vnějšího potahu), který ovlivňuje
        odolnost, úchop a vzhled.
    bag_embellishment:
      name: Ozdobné prvky tašky
      description: Popisuje výrazné dekorativní prvky na vnější straně tašky, jako
        jsou třásně, cvočky nebo prošívání.
    bag_fill_medium:
      name: Plnicí materiál vaku
      description: Identifikuje látku použitou k naplnění nebo natlakování vaku (např.
        vzduch, voda, písek).
    bag_material:
      name: Materiál tašky
      description: Materiál vzduchového vaku nebo duše.
    bag_padding_level:
      name: Úroveň polstrování tašky
      description: Udává míru nebo styl polstrování použitého v tašce nebo na obalu.
    bag_size_descriptor:
      name: Velikost tašky (deskriptor)
      description: Marketingová velikostní kategorie pro kabelky typu bucket bag (např.
        mini, large), která doplňuje přesné rozměry.
    bagel_size:
      name: Velikost bagelu
      description: Určuje obecnou velikost bagelu, např. mini, tenké, standardní,
        velké, extra velké nebo jumbo.
    bagpipe_accessories_included:
      name: Obsažené příslušenství k dudám
      description: Uvádí hlavní součásti a příslušenství dodávané s dudami (nad rámec
        samotného nástroje), například pouzdro, cvičnou píšťalu, kryt, šňůry nebo
        systém regulace vlhkosti.
    bagpipes_playing_mode:
      name: Režim hry na dudy
      description: Způsob přívodu vzduchu do nástroje během hry.
    bait_compatibility:
      name: Kompatibilita s návnadou
      description: Udává typy nástrah, pro které je toto peletové příslušenství určeno,
        což rybářům pomáhá zajistit, aby zvolená pomůcka odpovídala jejich preferované
        nástraze.
    bait_species:
      name: Druhy návnad
      description: Udává hlavního živočicha, který je nabízen jako nástraha, což rybářům
        pomáhá zajistit dodržení předpisů a účinnost na cílové druhy ryb.
    baking_chip_form:
      name: Tvar kousků na pečení
      description: Popisuje fyzickou velikost nebo tvar čokoládových čoček do pečených
        moučníků, který ovlivňuje jejich rozpouštění a vzhled moučníku.
    balance_board_style:
      name: Typ balanční desky
      description: Klasifikuje balanční desky podle jejich mechanismu nebo konstrukčního
        stylu, což určuje, jak se deska pohybuje a jakou tréninkovou náročnost nabízí.
    balance_cushion_accessories_included:
      name: Obsažené příslušenství k balančnímu polštáři
      description: Udává veškeré doplňky přiložené k polštáři, což nakupujícím umožňuje
        porovnat výhodnost celé sady.
    balance_type:
      name: Typ vyvážení
      description: Označuje stav nebo stupeň vyvážení prodávaného hnacího hřídele
        (např. továrně vyvážený, vysokorychlostně vyvážený, nevyvážený).
    ball_bladder_material:
      name: Materiál duše míče
      description: Udává materiál použitý na výrobu vnitřní duše házenkářského míče,
        který ovlivňuje udržení tlaku vzduchu, odraz a celkovou odolnost.
    ball_certification:
      name: Certifikace míče
      description: Označuje oficiální výkonnostní certifikace nebo schválení, které
        míč získal.
    ball_construction:
      name: Provedení míče
      description: Udává výrobní metodu použitou ke spojení panelů míče, což ovlivňuje
        odolnost, cit, absorpci vody a cenu.
    ball_core_construction:
      name: Provedení jádra míče
      description: Detailně popisuje vnitřní konstrukci míče, která ovlivňuje jeho
        odraz a herní vlastnosti.
    ball_core_type:
      name: Typ jádra míče
      description: Označuje vnitřní konstrukci míče, která ovlivňuje odskok a rozložení
        hmotnosti.
    ball_cup_game_included_pieces:
      name: Obsažené díly hry s míčkem v pohárku
      description: Určuje, které součásti jsou zahrnuty v balení hry kendama.
    ball_drilling_state:
      name: Stav vyvrtání koule
      description: Udává, zda jsou v kouli vyvrtané otvory pro prsty a případně v
        jakém rozsahu.
    ball_holder_type:
      name: Typ držáku míče
      description: Určuje konstrukční styl nebo provedení držáku na míče.
    ball_pit_ball_surface_finish:
      name: Povrchová úprava míčků do balónkového bazénku
      description: Popisuje hmatovou/vizuální povrchovou úpravu míče, která ovlivňuje
        jeho přilnavost (úchop), cit při hře a čištění.
    ball_pit_safety_features:
      name: Bezpečnostní prvky hřiště s míčky
      description: Bezpečnostní konstrukční prvky týkající se míčkových bazénků.
    ball_pump_accessory_type:
      name: Typ příslušenství k pumpičce na míče
      description: Definuje konkrétní druh příslušenství k pumpičce na míče, aby prodejci
        mohli v rámci jedné nadřazené kategorie označit tlakoměry, hadičky, maziva
        a další doplňky.
    ball_return_mechanism:
      name: Mechanismus pro vracení míčů
      description: Určuje typ systému vracení míčku, pokud je součástí podložky.
    ball_return_type:
      name: Typ vracení míčků/koulí
      description: Typ systému do kapsy/návratu, který vybírá míčky během hry.
    ball_speed_rating:
      name: Rychlost míče
      description: Rychlostní kategorie určená výrobcem, která udává, jak rychle se
        míč pohybuje/letí za standardních podmínek.
    ball_surface_texture:
      name: Struktura povrchu míče
      description: Popisuje vnější texturu neboli vzorek pruhování míčů, který může
        ovlivnit přilnavost a estetiku.
    ball_surface_type:
      name: Typ povrchu míče
      description: Popisuje vnější povrchovou úpravu nebo odpružení míče, které určuje
        pocit při nárazu a přilnavost.
    ballonet_configuration:
      name: Provedení balonetu
      description: Typ/konfigurace balonetového systému používaného pro řízení vyvážení
        a tlaku (pro netuhé/polotuhé vzducholodě).
    balloon_closure_valve_type:
      name: Typ uzávěru/ventilu nafukovacího balonku
      description: Určuje, jak je balónek po nafouknutí utěsněn (např. stahováním,
        samotěsnicím ventilem).
    balloon_kit_finish:
      name: Povrchová úprava prvků balónkové sady
      description: Popisuje povrchovou/vizuální úpravu balonků obsažených v sadě.
    balloon_kit_material:
      name: Materiál nafukovacích balonků v sadě
      description: Určuje primární materiál balónků obsažených v sadě.
    banana_variety:
      name: Odrůda banánů
      description: Určuje nabízený kultivar nebo druh banánu.
    banjo_head_type:
      name: Typ blány na banjo
      description: Typ/materiál blány banja, který ovlivňuje ostrost zvuku, hlasitost
        a hmatový vjem.
    banjo_neck_material:
      name: Materiál krku banja
      description: Materiál krku, který ovlivňuje hmatový vjem, stabilitu a tón.
    banjo_pickup_configuration:
      name: Konfigurace snímačů banja
      description: Zda banjo obsahuje vestavěný snímač a jakou obecnou technologii
        snímaní využívá.
    banjo_rim_material:
      name: Materiál ráfku banja
      description: Materiál korpusu neboli ráfku (kruhového těla), který výrazně ovlivňuje
        tón a hmotnost.
    banjo_tone_ring_type:
      name: Typ rezonančního prstence banja
      description: Určuje konstrukci/materiálovou řadu tonového ringu banja, který
        utváří barvu zvuku a hlasitost.
    banjo_tuning_machine_type:
      name: Typ ladící mechaniky banja
      description: Typ ladicích mechanik používaných na banju.
    banknote_authentication_grading:
      name: Ověřování/klasifikace bankovek
      description: Případný externí subjekt, který ověřil pravost/provedl certifikaci
        stavu bankovky.
    banknote_grade:
      name: Stav bankovky (grade)
      description: Standardizovaný stav bankovky na sběratelské stupnici.
    banknote_holder_type:
      name: Typ obalu/pouzdra na bankovky
      description: Označuje kontext fyzického stavu bankovky (např. volná vs. v certifikovaném
        plastovém obalu).
    banknote_material:
      name: Materiál bankovek
      description: Primární substrát/materiál bankovky.
    banknote_security_features:
      name: Ochranné prvky bankovek
      description: Bankovka má výrazné bezpečnostní/designové prvky.
    banknote_serial_number_type:
      name: Typ sériového čísla bankovky
      description: Označuje, zda je sériové číslo přítomno a/nebo má zvláštní sběratelské
        vlastnosti (ne skutečné číslo).
    banner_display_location:
      name: Umístění banneru
      description: Určuje zamýšlené umístění banneru a jeho okolí (např. vchod, stěna,
        pozadí za stolem).
    banner_hanging_hardware_type:
      name: Typ závěsných prvků banneru
      description: Určuje hlavní závěsné/montážní prvky, které jsou součástí banneru
        nebo jsou do něj přímo zakomponovány (např. očka, tunýlek na tyč, lano).
    banner_message_type:
      name: Typ textu na banneru
      description: Udává, zda je text/sdělení na banneru předtištěné (pevné), nebo
        zda je banner čistý/přizpůsobitelný.
    banner_shape:
      name: Tvar banneru
      description: Určuje celkový tvar/střih fanouškovského banneru.
    banquette_configuration:
      name: Konfigurace banketů
      description: Celkový tvar nebo orientace lavice (banketu).
    bar_coating:
      name: Povrchová úprava tyčí
      description: Identifikuje vnější jedlý povlak aplikovaný na tyčinku, pokud existuje.
    bar_pad_style:
      name: Styl barové podložky
      description: Styl designu podložky a krytu hrazdy.
    bar_texture:
      name: Struktura tyče
      description: Popisuje celkovou texturu nebo skus tyčinky.
    barb_type:
      name: Typ protihrotu
      description: Označuje, zda má háček protihrot a jeho typ.
    barbell_finish:
      name: Povrchová úprava vzpěračské tyče
      description: Popisuje ochrannou nebo estetickou povrchovou úpravu nanesenou
        na tyč a/nebo rukávy, což ovlivňuje odolnost proti korozi, pocit při úchopu
        a cenu.
    barbell_knurling_pattern:
      name: Vzor vroubkování vzpěračské tyče
      description: Popisuje styl a drsnost vroubkované části úchopu na vzpěračské
        tyči, včetně specifických značek pro powerlifting nebo vzpírání.
    barista_suitability:
      name: Vhodnost pro baristy
      description: Popisuje, zda je výrobek určen k přípravě a napěňování kávy.
    barre_rail_configuration:
      name: Provedení baletní tyče
      description: Udává počet vodorovných tyčí dodávaných s baletní tyčí.
    barrel_or_cask_type:
      name: Typ sudu nebo sudu
      description: Určuje typ sudu použitý ke zrání nebo dozrávání tequily (např.
        americký dub, sudy po bourbonu, sudy po sherry).
    barrel_profile:
      name: Profil hlavně
      description: Popisuje celkový tvar nebo vyvážení tělíčka šipky.
    barrel_thread_standard:
      name: Standard závitu hlavně
      description: Určuje závit hlavně použitý na paintballovém markeru (zbrani) pro
        kompatibilitu s dokupovanými hlavněmi jiných výrobců.
    base_anchoring_method:
      name: Způsob ukotvení základny
      description: Určuje, jak je základna upevněna k zemi, což značí její vhodnost
        pro různé povrchy a herní podmínky.
    base_ballast_method:
      name: Způsob zatížení základny
      description: Označuje, jak (nebo zda) je základna trenažéru zatížena pro stabilitu
        (např. naplnění vodou, naplnění pískem).
    base_configuration:
      name: Provedení základny
      description: Udává konstrukční uspořádání základny panelu.
    base_fill_material:
      name: Základní výplňový materiál
      description: Určuje látku použitou k vyplnění nebo zatížení základny basketbalového
        tréninkového panáka, což ovlivňuje stabilitu a náročnost montáže.
    base_ingredient:
      name: Základní složka
      description: Identifikuje primární zemědělskou složku, ze které se destiluje
        šóčú nebo sodžu.
    base_oil_type:
      name: Typ základového oleje
      description: Určuje složení základového oleje převodové kapaliny (např. plně
        syntetický, polosyntetický nebo minerální).
    base_storage_type:
      name: Typ úložného prostoru v základně
      description: Určuje, zda základna poskytuje včleněný úložný prostor, a uvádí
        použitý mechanismus.
    baseball_glove_type:
      name: Typ baseballové rukavice
      description: Kategorizuje rukavice nebo palčáky podle pozice hráče nebo funkčního
        účelu.
    baseball_softball_league_certification:
      name: Certifikace baseballové a softballové ligy
      description: Určuje standardy řídícího orgánu nebo ligy, které produkt splňuje.
    baseball_softball_usage_role:
      name: Role použití v baseballu a softballu
      description: Určuje roli na hřišti nebo typ účastníka, pro který je chránič
        nohou určen (např. chytač, pálkař, rozhodčí, hráč v poli).
    baseball_toy_set_components_included:
      name: Obsažené součásti baseballové herní sady
      description: Určuje, které baseballové součásti jsou přiloženy (např. pálka,
        míček, odpaliště, mety).
    baseplate_construction:
      name: Konstrukce základové desky
      description: Označuje způsob výroby základní desky podvozku, který ovlivňuje
        pevnost a hmotnost.
    basketball_hoop_accessory_type:
      name: Typ příslušenství k basketbalovému koši
      description: Klasifikuje konkrétní druh součásti nebo příslušenství basketbalového
        koše pro účely filtrování a porovnání.
    basketball_padding_location:
      name: Umístění basketbalového polstrování
      description: Označuje část basketbalového systému, kterou má chránič zakrývat.
    basketball_rim_type:
      name: Typ basketbalové obruče
      description: Určuje konstrukční nebo funkční provedení basketbalové obruče,
        aby si nakupující mohli vybrat to, které odpovídá jejich úrovni hry a požadavkům
        na montáž.
    basketball_toy_features:
      name: Vlastnosti basketbalové hračky
      description: Vyzdvihuje pozoruhodné herní nebo funkční vlastnosti basketbalových
        hraček nad rámec základních rozměrů.
    bass_clarinet_body_material:
      name: Materiál korpusu basklarinetu
      description: Hlavní materiál korpusu basklarinetu (kromě klapkového mechanismu,
        sloupků a dalších kovových prvků).
    bass_clarinet_lowest_written_note:
      name: Nejnižší psaná nota basklarinetu
      description: Nejnižší nota, kterou dokáže basklarinet zahrát (hráči ji často
        popisují jako nízké E♭, nízké D, nízké C nebo nízké prodloužení B).
    bass_drum_beater_head_shape:
      name: Tvar hlavy paličky na basový buben
      description: Popisuje geometrický tvar/profil úderové plochy pedálu velkého
        bubnu (strana, která je v kontaktu s blánou).
    bass_drum_beater_shaft_material:
      name: Materiál stopky paličky na basový buben
      description: Určuje materiál stopky nebo tyče paličky (nikoli hlavy paličky).
    bass_drum_head_built_in_muffling:
      name: Integrované tlumení blány velkého bubnu
      description: Typ integrovaného tlumení obsaženého v konstrukci blány.
    bass_drum_head_configuration:
      name: Konfigurace blány basového bubnu
      description: Popisuje, které blány jsou součástí balení nebo jsou nainstalovány
        na basovém bubnu při nákupu.
    bass_drum_head_surface_finish:
      name: Povrchová úprava blány basového bubnu
      description: Povrchová textura neboli úprava blány basového bubnu.
    bass_drum_head_type:
      name: Typ blány velkého bubnu
      description: Typ konstrukce nebo speciální provedení blány velkého bubnu.
    bass_drum_hoop_material:
      name: Materiál obruče pro basový buben
      description: Určuje materiál obručí (protiobručí) basového bubnu, který ovlivňuje
        odolnost, estetiku a hmotnost.
    bass_drum_mounting_style:
      name: Styl montáže basového bubnu
      description: Označuje, jak je basový buben navržen k podepření či použití (nožičky
        k soupravě, kolébka/stojan, pochodový závěs atd.).
    bass_harmonica_comb_material:
      name: Materiál hřebene basové harmoniky
      description: Materiál hřebenu neboli těla (bloku vzdušné komory) basové harmoniky.
    bass_harmonica_mouthpiece_style:
      name: Provedení nátrubku basové foukací harmoniky
      description: Označuje konfiguraci náustku basové harmoniky.
    bass_harmonica_reed_material:
      name: Materiál jazýčků basové harmoniky
      description: Materiál jazýčků používaných v basové harmonice.
    bass_harmonica_tuning_system:
      name: Systém ladění basové harmoniky
      description: Určuje ladící systém neboli temperaturu použitou pro basovou harmoniku.
    bass_recorder_bocal_type:
      name: Typ esíčka basové zobcové flétny
      description: Určuje typ esíčka nebo vzdušné štěrbiny sloužící k přívodu vzduchu
        k náustku basové zobcové flétny.
    bass_recorder_included_accessories:
      name: Obsažené příslušenství k basové zobcové flétně
      description: Seznam příslušenství dodávaného s basovou zobcovou flétnou.
    bass_recorder_keywork_material:
      name: Materiál pro klávesy basové zobcové flétny
      description: Určuje materiál klapkového mechanismu zobcové flétny (pokud je
        jím vybavena).
    bass_trombone_slide_material:
      name: Materiál snižce pro basový pozoun
      description: Určuje hlavní materiál/povrchovou úpravu vnějších trubek snižce
        (a/nebo celé sestavy snižce) u basového pozounu.
    bass_trombone_valve_wrap_style:
      name: Typ vinutí ventilového systému basového pozounu
      description: Určuje typ vyvedení trubek systému ventilů použitého na nástroji.
    bass_ukulele_string_type:
      name: Typ strun pro basové ukulele
      description: Označuje obecný typ strun používaných na basovém ukulele.
    bassinet_cradle_accessory_features:
      name: Vlastnosti příslušenství ke kolébkám
      description: Vyzdvihuje důležité funkční vlastnosti nebo charakteristiky příslušenství
        pro dětské postýlky a kolébky (např. vodotěsnost, certifikaci bio materiálu,
        hypoalergenní vlastnosti).
    bassoon_bell_material:
      name: Materiál ozvučníku fagotu
      description: Určuje materiál, z něhož je vyrobena hlavice fagotu.
    bassoon_bocal_system:
      name: Typ esíčka fagotu
      description: Varianta/typ esa pro různé systémy fagotů a způsoby použití.
    bassoon_case_shell_type:
      name: Typ skořepiny pouzdra na fagot
      description: Udává ochrannou konstrukci pouzdra (měkká, pevná nebo hybridní).
    bassoon_keywork_material:
      name: Materiál klapek fagotu
      description: Materiál nebo povrchová úprava klapkového mechanismu fagotu (kláves
        a mechanických prvků).
    bassoon_model_level:
      name: Úroveň modelu fagotu
      description: Označuje zamýšlenou úroveň hráče na fagot.
    bassoon_performance_level:
      name: Úroveň výkonnosti fagotu
      description: Určuje úroveň hráče, pro kterou je model fagotu určen.
    bassoon_reed_scrape_style:
      name: Typ seříznutí plátku fagotu
      description: Udává styl seříznutí/profilu plátku fagotu.
    bassoon_reed_thread_color:
      name: Barva nitě na plátku fagotu
      description: Barva vázací nitě použité na plátku.
    bassoon_reed_type:
      name: Typ plátku fagotu
      description: Určuje podtyp fagotového plátku, pro který je produkt vhodný (pokud
        je to relevantní).
    bassoon_system:
      name: Prstokladový systém fagotu
      description: Identifikuje systém kláves fagotu / designovou tradici používanou
        nástrojem.
    bat_construction:
      name: Provedení pálky
      description: Udává, kolik různých kusů nebo spojených sekcí tvoří tělo pálky
        (např. jednodílné, dvoudílné, hybridní), což ovlivňuje flexibilitu, kontrolu
        vibrací a celkovou výkonnost.
    bat_handle_size_compatibility:
      name: Kompatibilita velikosti rukojeti pálky
      description: Udává velikost(i) rukojeti kriketové pálky, pro které je grip určen.
    bath_book_interactive_features:
      name: Interaktivní funkce knížky do vany
      description: Integrované herní/vzdělávací prvky obsažené v knížce do vany.
    bath_bubble_machine_features:
      name: Vlastnosti bublinkového stroje do koupele
      description: Klíčové funkční vlastnosti výrobníku mýdlových bublin do vany nad
        rámec běžné produkce bublin.
    bath_crayon_features:
      name: Vlastnosti pastelek do vany
      description: Klíčové funkční/bezpečnostní vlastnosti pastelek do vany
    bath_squirter_spray_pattern:
      name: Způsob stříkání hračky do vany
      description: Popisuje, jak stříkací hračka do vany stříká vodu (způsob střiku)
        při zmáčknutí nebo aktivaci.
    bath_toy_molded_drain_design:
      name: Koupelová hračka s tvarovaným odtokem
      description: Označuje, zda je hračka navržena tak, aby z ní voda odtékala a
        snadno vysychala, což omezuje zadržování vody uvnitř.
    bath_toy_water_play_function:
      name: Funkce vodní hry hračky do vany
      description: Určuje hlavní mechanismus interakce s vodou / mechanismus hračky.
    baton_size_standard:
      name: Velikostní standard štafetového kolíku
      description: Velikostní klasifikace štafetového kolíku pro soutěže (junior nebo
        senior).
    battery_case_certification_standard:
      name: Certifikace/standard pouzdra na baterie
      description: Uvádí příslušné přepravní či bezpečnostní certifikace nebo zkušební
        normy, které pouzdro splňuje pro přepravu a skladování baterií.
    battery_case_interior_padding_material:
      name: Materiál vnitřního polstrování pouzdra na baterie
      description: Určuje hlavní polstrovací nebo vložkový materiál použitý uvnitř
        pouzdra (pokud je to relevantní).
    battery_configuration:
      name: Provedení baterie
      description: Udává fyzické uspořádání/tvar akumulátoru (form factor), aby uživatelé
        mohli baterii přizpůsobit omezenému prostoru pro komoru v konkrétních airsoftových
        zbraních (replikách).
    battery_group_size:
      name: Velikost skupiny baterií
      description: Standardizovaná velikost pouzdra/autobaterie (např. BCI skupina
        24F, H6) používaná pro montáž do mnoha vozidel.
    battery_polarity:
      name: Polarita baterie
      description: Určuje polaritu/orientaci pólů (kladná poloha pólů), což je klíčové
        omezení pro montáž u mnoha automobilových a sportovních baterií.
    battery_standards_supported:
      name: Podporované standardy baterií
      description: Určuje normy pro testování baterií, které zkoušečka podporuje při
        ověřování startovacího výkonu nebo celkového stavu baterie.
    battery_voltage_class:
      name: Napěťová třída baterie
      description: Běžná napěťová třída systému akumulátoru elektromobilu (EV), která
        slouží k rychlému filtrování (např. 400V či 800V systémy).
    batting_cage_components_included:
      name: Obsažené součásti pálkařské sítě
      description: Uvádí jednotlivé díly dodávané s produktem, aby si kupující mohl
        ověřit, zda je součástí balení kompletní systém, nebo specifické náhradní
        díly.
    batting_helmet_accessories_included:
      name: Dodávané příslušenství k baseballové / pálkařské helmě
      description: Uvádí ochranné či kosmetické doplňky dodávané s odpalovací helmou.
    batting_stuffing_form_factor:
      name: Forma vatelínu a výplňového materiálu
      description: Určuje, zda se produkt prodává jako sypká výplň, listy, role, předřezané
        kusy nebo tvarované formy.
    batting_stuffing_loft_level:
      name: Výška a nadýchanost výplňového materiálu
      description: Udává nadýchanost/výšku výplňového materiálu (relativní objem/výšku),
        která se obvykle používá při výběru materiálu pro prošívání a polstrování.
    batting_stuffing_thermal_insulation_level:
      name: Úroveň tepelné izolace vatelínu a výplně
      description: Relativní tepelná/izolační výkonnost vatelínu používaného v prošívaných
        dekách, bundách a přikrývkách.
    batting_tee_base_design:
      name: Provedení základny baseballového odpaliště
      description: Popisuje styl nebo konstrukci základny odpaliště (tee), což ovlivňuje
        stabilitu a typy hracích povrchů, pro které je vhodné.
    battle_top_arena_stadium_compatibility:
      name: Kompatibilita s arénou/stadionem pro bojové káči
      description: Udává, pro který systém arény/stadionu je produkt určen (zejména
        u sad nebo stadionů specifických tvarů).
    battle_top_items_included:
      name: Součásti sady bojových káčí přiloženy
      description: Určuje, které součásti sady bojových káčí jsou součástí balení
        (např. káča, odpalovač, stadion/aréna, ozubený pásek, náhradní díly).
    battle_top_performance_type:
      name: Herní vlastnosti bojové káči
      description: Popisuje obecný styl výkonnosti bitevního topu, obvykle odrážející
        jeho chování v aréně (agresivní vs. zaměřený na výdrž atd.).
    bayan_included_accessories:
      name: Dodávané příslušenství k bajanu
      description: Příslušenství dodávané společně s bajanem (v balení).
    bayan_tuning_system_type:
      name: Typ systému ladění bajanu
      description: Způsob, jakým se bajan napíná/ladí (konstrukční styl), což má vliv
        na přenosnost a snadnost ladění.
    bb_gun_action_type:
      name: Typ závěru vzduchovky
      description: Označuje mechanický způsob napínání nebo cyklování vzduchovky (např.
        pákový mechanismus, pumpování, zlamování hlavně).
    bb_gun_caliber:
      name: Ráže BB zbraně (airsoft / vzduchovky)
      description: Definuje průměr kuliček, pro které je zbraň určena, což zajišťuje
        kompatibilitu střeliva.
    bb_gun_part_type:
      name: Typ dílu pro BB zbraně (vzduchovky / airsoftové zbraně)
      description: Klasifikuje konkrétní součástku nebo příslušenství určené pro BB
        zbraně, což nakupujícím umožňuje rychle najít přesný náhradní, vylepšený nebo
        doplňkový díl (např. hlaveň, těsnění pístu, rychloplnič).
    beach_ball_features:
      name: Vlastnosti plážového míče
      description: Pozoruhodné funkční vlastnosti specifické pro plážové míče.
    beach_bucket_features:
      name: Vlastnosti kyblíku na pláž
      description: Funkční vlastnosti plážového kyblíku, které ovlivňují jeho používání,
        odolnost a praktičnost.
    beach_sand_toy_items_included:
      name: Obsažené součásti sady hraček na pláž a písek
      description: Další hrací prvky na pláž/písek jsou součástí balení (pokud se
        prodávají jako sada).
    bead_breaker_type:
      name: Typ odražeče patek
      description: Typ/provedení mechanismu odlamovače patek.
    bead_hole_style:
      name: Styl dírky pro korálky
      description: Určuje styl nebo konfiguraci otvoru/štěrbiny v korálku, což ovlivňuje,
        jak sedí na háčku nebo vlasci.
    bead_type:
      name: Typ korálku
      description: Primární typ(y) korálků požadovaných vzorem.
    bead_type_patch_embellishment:
      name: Typ korálků (zdobení na nažehlovačkách/nášivkách)
      description: Primární typ korálků použitých na povrchu záplaty.
    beaded_accessory_project_type:
      name: Typ projektu korálkových doplňků
      description: Jaký doplněk vzor vytváří.
    beading_needle_flexibility:
      name: Pružnost korálkovací jehly
      description: Relativní pružnost dříku jehly pro snadnější průchod složitými
        korálkovými vzory.
    beading_pattern_bead_size:
      name: Velikost korálků v předloze pro korálkování
      description: Doporučené velikosti korálků specifikované ve vzoru (běžně velikosti
        rokajlu, např. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formát schématu korálkového vzoru
      description: Jak je vzor znázorněn vizuálně (např. graficky vs. fotografie krok
        za krokem).
    beading_pattern_stitch_technique:
      name: Steh/technika korálkového vzoru
      description: Primární steh nebo technika korálkování použitá ve vzoru.
    beading_technique_stitch:
      name: Technika / steh na korálkování
      description: Identifikuje primární techniku korálkování nebo steh použitý ve
        vzoru (např. peyote steh, cihlový steh).
    beading_thread_fiber_type:
      name: Typ materiálu nitě na korálkování
      description: Určuje podtyp vlákna/materiálu korálkovací nitě (specifičtější
        než obecný materiál) s ohledem na její funkční vlastnosti.
    beading_thread_size:
      name: Tloušťka korálkovací nitě
      description: Udává označení velikosti od výrobce/podle oborových standardů používané
        pro korálkovací nitě (specifické pro konkrétní značku/produktovou řadu), jako
        je velikost D nebo 00.
    beading_thread_use_case:
      name: Účel použití korálkovací nitě
      description: Identifikuje primární doporučené použití pro vlákno pro navlékání
        korálků a pomáhá nakupujícím vybrat ten správný produkt pro jejich projekt.
    beading_wire_coating_material:
      name: Materiál na potahování drátu pro korálkování
      description: Určuje materiál vnějšího potahu (případného) korálkovacího lanka,
        který ovlivňuje poddajnost, trvanlivost a odolnost proti zalamování.
    beading_wire_strand_count:
      name: Počet pramenů korálkovacího lanka
      description: Označuje počet pramenů ve vícepramenném drátu pro navlékání korálků
        (např. 7pramenný, 19pramenný, 49pramenný), což ovlivňuje flexibilitu a splývavost.
    beadlock_type:
      name: Typ systému zajištění patky pneumatiky (beadlocku)
      description: Označuje, zda je disk vybaven systémem beadlock a o jaký typ se
        jedná (pomáhá zájemcům o jízdu v terénu / vozidla UTV).
    beam_material:
      name: Materiál nosníku
      description: Hlavní materiál nosníku/táhla (často se liší od materiálu hlavic/koncovek).
    beam_pattern:
      name: Tvar světelného kuželu
      description: Charakter rozložení světelného toku použitého pro běžné osvětlení
        nebo jízdu v terénu.
    bean_bag_fabric_material:
      name: Materiál potahu sedacího vaku
      description: Určuje vnější látku házecích pytlíků dodávaných se sadou.
    bean_paste_variety:
      name: Odrůda fazolové pasty
      description: Klasifikuje konkrétní typ fazolové pasty na základě způsobu výroby
        nebo hlavní ingredience.
    bean_preparation:
      name: Příprava fazolí
      description: Označuje, jak jsou fazole před prodejem připraveny nebo zpracovány
        (např. celé lusky, vyloupané, sekané, naklíčené).
    bean_variety:
      name: Odrůda fazolí
      description: Označuje botanickou nebo obchodní odrůdu fazolí (např. zelené fazolky,
        edamame, vigna čínská).
    beanie_style:
      name: Styl čepice
      description: Označuje celkový design, strukturu nebo tvar kulicha, aby si nakupující
        mohli rychle vybrat z běžných variant.
    bearing_clearance:
      name: Vůle ložiska
      description: Udává třídu vnitřní radiální vůle ložiska (velikost vnitřní vůle);
        třída C0 se označuje také jako CN nebo běžná vůle.
    bearing_construction_type:
      name: Typ provedení ložiska
      description: Identifikuje konstrukci nebo typ ložisek použitých v náboji (např.
        průmyslová, s volnými kuličkami).
    bearing_edge_type:
      name: Typ úložné hrany bubnu
      description: Typ/profil úložné hrany korpusu, který ovlivňuje atak a dozvuk.
    bearing_lubrication:
      name: Mazání ložisek
      description: Označuje typ maziva aplikovaného na ložisko během výroby, například
        plastické mazivo nebo olej.
    bearing_material:
      name: Materiál ložiska
      description: Identifikuje materiál ložiska (např. ocel, keramický hybrid), což
        jezdcům pomáhá vybrat si z hlediska odolnosti, ceny a výkonu.
    bearing_rating:
      name: Únosnost ložiska / třída přesnosti ložiska
      description: Určuje toleranci nebo výkonnostní třídu ložisek použitých v bruslích
        (např. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Kód těsnění ložiska
      description: Typ krytí ložiska
    bearing_seal_type:
      name: Typ těsnění ložiska
      description: Určuje provedení těsnění nebo krytí, které chrání vnitřní část
        ložiska před nečistotami a ovlivňuje tření (např. 2RS, ZZ, LLU, otevřené).
    bearing_shield_type:
      name: Typ stínění nebo těsnění, které chrání vnitřek ložiska.
      description: Styl stínění nebo těsnění chránícího vnitřní části ložiska.
    bearing_size_code:
      name: Kód velikosti ložiska
      description: Standardizované označení ložisek (např. 608, 688), které kombinuje
        vnitřní průměr, vnější průměr a šířku.
    bearing_type:
      name: Typ ložiska
      description: Označuje konstrukční styl ložisek použitých v hlavovém složení.
    beater_head_material:
      name: Materiál hlavy beateru
      description: Určuje materiál kontaktní plochy neboli hlavy beateru basového
        bubnu (např. plsť, dřevo, guma).
    beaters_included:
      name: Obsažené beatery
      description: Určuje, kolik beaterů (paliček) je součástí nebo nainstalováno
        u pedálu basového bubnu (např. jednoduchý nebo dvojitý beater), případně zda
        žádný beater součástí není.
    bed_base_type:
      name: Typ postelového roštu
      description: Určuje konstrukční styl základny postele nebo válendy (např. pevná
        deska, lamelový rošt, nastavitelný).
    bed_storage_type:
      name: Typ úložného prostoru v posteli
      description: Určuje integrovaný úložný prostor v rámu postele.
    bedroom_furniture_items_included:
      name: Obsažené kusy ložnicového nábytku
      description: Označuje jednotlivé kusy nábytku, které jsou součástí ložnicové
        sestavy (např. postel, komoda, noční stolky), což nakupujícím umožňuje rychle
        zjistit obsah balení bez čtení dlouhých popisů.
    bedroom_vanity_items_included:
      name: Obsažené součásti toaletního stolku
      description: Uvádí jednotlivé položky dodávané se sadou toaletního stolku, aby
        zákazníci přesně věděli, co je v dodávce (např. zrcadlo, stolička, osvětlení).
    beer_based_cocktail_variety:
      name: Různé koktejly na bázi piva
      description: Klasifikuje míchané nápoje z piva podle jejich konkrétního druhu,
        např. Radler, Shandy, Michelada.
    beet_variety:
      name: Odrůda řepy
      description: Označuje kultivar nebo odrůdu řepy, což nakupujícím pomáhá identifikovat
        chuť, barvu a využití v kuchyni (např. červená, žlutá, Chioggia).
    bell_actuation_mechanism:
      name: Mechanismus spouštění zvonku
      description: Určuje akci uživatele potřebnou k zazvonění zvonku, což pomáhá
        nakupujícím zvolit preferovanou ergonomii.
    bell_guard_coverage_area:
      name: Oblast pokrytí zvonového strážce
      description: Označuje, kterou část zvonu má ochranný kryt chránit.
    bell_material:
      name: Materiál zvonku
      description: Materiál zvonové součásti (pokud je specifikován odděleně od celkového
        materiálu přístroje).
    bellhousing_bolt_pattern:
      name: Rozložení šroubů zvonového krytu
      description: Označuje standard rozteče šroubů skříně spojky / strany motoru
        nebo řadu roztečí, které jsou využívány ve skříni převodovky.
    bellows_material:
      name: Materiál měchu
      description: Materiál tělesa/krytu měchu (pokud je součástí).
    bellows_orientation:
      name: Orientace měchů
      description: Označuje konfiguraci měchů použitou k vedení vzduchu do potrubí.
    belly_panel_style:
      name: Styl břišního panelu
      description: Popisuje, jak je tvořena pasovka nebo břišní dílec, který se přizpůsobuje
        rostoucímu bříšku.
    belt_buckle_type:
      name: Typ spony na opasek
      description: Popisuje konkrétní mechanismus nebo provedení spony použité na
        opasku.
    beret_style:
      name: Baretový styl
      description: Identifikuje specifický design baretu nebo kulturní variantu.
    berry_species:
      name: Druhy bobulí
      description: Označuje druh bobulí obsažených v produktu, aby si nakupující mohli
        rychle filtrovat požadované bobule.
    beta_casein_variant:
      name: Varianta beta-kaseinu
      description: Pro spotřebitele s obavami o stravitelnost specifikuje, která varianta
        betaverze-kaseinového proteinu (např. A2) je v mléce přítomna.
    beverage_sweetness_level:
      name: Míra sladkosti nápoje
      description: Klasifikuje nápoj podle stupně přidané sladkosti nebo cukru.
    bezel_graduation_units:
      name: Jednotky odstupňování lunety
      description: Určuje označení jednotek na otočné lunetě (stupně, mily nebo dvojité
        škálování).
    bicycle_brake_set_components_included:
      name: Součásti sady cyklistických brzd v balení
      description: Uvádí jednotlivé díly obsažené v sadě, aby nakupující přesně věděli,
        co je zahrnuto, a mohli porovnávat různé konfigurace balíčku.
    bicycle_cage_mounting_position:
      name: Montážní poloha klece na jízdní kolo
      description: Určuje, na které místo na kole má být košík namontován.
    bicycle_computer_mount_placement:
      name: Umístění držáku cyklopočítače
      description: Označuje, kam se na kolo montuje držák cyklopočítače, například
        předsazený před řídítka nebo na krytku představce.
    bicycle_folding_mechanism:
      name: Skládací mechanismus jízdního kola
      description: Určuje mechanický systém skládání použitý na rám jízdního kola
        (např. poloviční skládání, vertikální skládání).
    bicycle_frame_design:
      name: Konstrukce rámu jízdního kola
      description: Určuje celkový styl rámu jízdního kola, který ovlivňuje přístupnost,
        nosnost a úložný prostor.
    bicycle_frame_style:
      name: Styl rámu jízdního kola
      description: Popisuje konstrukční styl rámu kola (s nízkým nástupem, lowrider,
        chopper stretch atd.), který ovlivňuje posed jezdce a estetiku.
    bicycle_handlebar_type:
      name: Typ řídítek jízdního kola
      description: Identifikuje specifický styl nebo geometrii řídítek a pomáhá jezdcům
        vybrat řídítka vhodná pro jejich jízdní pozici a disciplínu.
    bicycle_headset_configuration:
      name: Konfigurace hlavového složení jízdního kola
      description: Označuje konstrukční styl nebo standard hlavového složení jízdního
        kola podle uspořádání jeho misek (např. External Cup, ZeroStack, Integrated,
        vlákno).
    bicycle_hub_type:
      name: Typ náboje kola
      description: Popisuje mechanismus náboje dodávaný s kolem, ovlivňující kompatibilitu
        hnacího ústrojí a styl jízdy.
    bicycle_lock_security_certification:
      name: Certifikace zabezpečení zámků jízdních kol
      description: Nezávislá certifikace třetí strany, která ověřuje úroveň zabezpečení
        proti krádeži (např. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Typ pedálu jízdního kola
      description: Určuje celkový styl ovládání nebo design pedálu, například platformový,
        bezklipový nebo hybridní, a pomáhá jezdcům vybrat si správné rozhraní pro
        jejich styl jízdy.
    bicycle_propulsion_type:
      name: Typ pohonu tříkolky
      description: Určuje, jak je jízdní kolo poháněno, například ručním šlapáním,
        elektrickou asistencí nebo spalovacím motorem.
    bicycle_pump_type:
      name: Typ cyklistické pumpičky
      description: Identifikuje konstrukční styl čerpadla a pomáhá nakupujícím vybrat
        design, který nejlépe vyhovuje jejich potřebám při jízdě, skladování nebo
        nouzových situacích.
    bicycle_rack_mounting_type:
      name: Typ upevnění na kolo
      description: Popisuje hlavní způsob nebo umístění, pokud jde o montáž nosiče
        na kolo, což uživatelům pomáhá ověřit kompatibilitu s jejich rámem a montážními
        prvky.
    bicycle_suspension_type:
      name: Typ odpružení jízdního kola
      description: Označuje, že jízdní kolo je vybaveno odpružením, a udává jeho konfiguraci.
    bicycle_tire_tread_pattern:
      name: Vzorek dezénu jízdní pneumatiky
      description: Určuje styl dezénu pneumatiky, Influence trakci a valivý odpor
        na různých površích.
    bidirectional_charging_capability:
      name: Funkce obousměrného nabíjení
      description: Označuje, zda elektromobil podporuje obousměrné režimy nabíjení,
        například V2G a/nebo V2H.
    bike_rack_mounting_style:
      name: Způsob upevnění nosiče kol
      description: Jak je jízdní kolo podepřeno/zajištěno regálem.
    bike_rack_tilt_function:
      name: Funkce sklápění nosiče kol
      description: Zda/jaké funkce naklápění existují pro přístup do zadního zavazadlového
        prostoru, když je nosič nainstalován.
    bikini_top_style:
      name: Styl vrchního dílu bikin
      description: Označuje design nebo střih horního dílu plavek, což nakupujícím
        pomáhá najít upřednostňovaný střih a tvar.
    billiard_brush_type:
      name: Typ kulečníkového kartáče
      description: Definuje konkrétní typ nástroje na čištění kulečníkového stolu
        (např. kartáč na stůl, kartáč na mantinely, vyhlazovací blok na sukno).
    billiard_glove_finger_coverage:
      name: Krytí prstů kulečníkové rukavice
      description: Označuje, které prsty rukavice zakrývá, což umožňuje přesné filtrování
        specifických modelů kulečníkových rukavic.
    billiard_pocket_style:
      name: Styl kulečníkových kapes
      description: Označuje konstrukční nebo dekorační styl koše, což má vliv na kompatibilitu
        se stolem a jeho vzhled.
    billiard_rack_style:
      name: Kulečník v královském stylu
      description: Popisuje fyzický vzhled nebo typ trojúhelníku/stojanu (např. tradiční
        pevný rám, stavěcí podložka, skládací provedení).
    billiard_table_type:
      name: Typ kulečníkového stolu
      description: Identifikuje konstrukci nebo typ ložisek použitých v náboji (např.
        průmyslová, s volnými kuličkami).
    billiards_discipline:
      name: Typ úložné hrany bubnu
      description: Označuje konkrétní variantu kulečníkové hry (typ hry), pro kterou
        je produkt určen nebo s jakou je kompatibilní.
    binding_compatibility_standard:
      name: Označuje typ maziva aplikovaného na ložisko během výroby, například plastické
        mazivo nebo olej.
      description: Identifikuje materiál ložiska (např. ocel, keramický hybrid), což
        jezdcům pomáhá vybrat si z hlediska odolnosti, ceny a výkonu.
    binding_inclusion:
      name: Určuje toleranci nebo výkonnostní třídu ložisek použitých v bruslích (např.
        ABEC 7, ILQ 9, Swiss).
      description: Označuje typ těsnění ložiska, který ovlivňuje jeho životnost a
        valivý odpor.
    binding_interface:
      name: Systém uchycení vázání
      description: Označuje desku vázání nebo standard rozhraní, se kterým jsou lyže
        dodávány (předmontovány) nebo se kterým jsou kompatibilní, což zajišťuje kompatibilitu
        boty a vázání.
    binding_liner_type:
      name: Typ krytí ložiska
      description: Popisuje styl vnitřní vložky použité ve vázání/botě (např. vyjímatelná,
        pochozí, tepelně tvarovatelná).
    binding_mounting_system:
      name: Montážní systém vázání
      description: Označuje rozhraní použité k připevnění vázání k lyži (přímá montáž/flat
        mount, podložka s lištou/rail, deska atd.).
    binding_position:
      name: Spojovací poloha
      description: Označuje zamýšlenou polohu montáže nebo konfiguraci vázání (např.
        přední bota, zadní bota, ARTP).
    binding_strap_position:
      name: Pozice popruhu vázání
      description: Označuje, na které místo na vázání je řemínek určen k instalaci.
    bingo_components_included:
      name: Komponenty balení binga
      description: Uvádí součásti balení sady bingo, jako jsou koule bingo, karty
        a značky.
    bingo_number_range:
      name: Číselný rozsah bingo
      description: Označuje číselný rozsah nebo variantu binga, kterou sada podporuje.
    bingo_set_features:
      name: Vlastnosti sady na bingo
      description: Určuje primární formát produktu sady bingo (fyzická/manuální vs.
        elektronická/interaktivní).
    bipod_mounting_interface:
      name: Rozhraní pro montáž dvojnožky (bipodu)
      description: Určuje připojovací rozhraní používané k připevnění bipodu ke zbrani
        nebo kolejnicovému systému.
    bit_attachment_type:
      name: Typ připojení bitů
      description: Určuje způsob připojení náhlavníku k udidlu (např. uvazovací konce,
        přezkové konce, chicagské šroubové konce).
    bit_mouthpiece_design:
      name: Design náustku udidla
      description: Označuje konstrukční styl nebo uspořádání kloubů udítka, které
        určuje rozložení tlaku, volný prostor pro podnebí (patro tlamy) a celkovou
        ostrost udidla.
    bit_ring_style:
      name: Styl kroužku udidla
      description: Definuje styl ramen nebo kroužků udidla, které se připínají k uzdečce,
        což ovlivňuje působení, boční vedení a kontakt s otěžemi.
    bladder_material:
      name: Materiál membrány
      description: Určuje materiál vnitřního vaku, který drží vzduch.
    blade_attachment_type:
      name: Typ uchycení čepele
      description: Označuje, zda brusle používá odklápěcí (závěsný) mechanismus, nebo
        pevné uchycení nože.
    blade_finish_coating:
      name: Povrchová úprava/povlak nože
      description: Povrchová úprava aplikovaná na čepel z estetických důvodů nebo
        kvůli ochraně proti korozi.
    blade_hosel_type:
      name: Typ krčku / patky čepele
      description: Určuje styl připojení hůlky nože, který zapadá do násady, a ovlivňuje
        kompatibilitu (např. standardní nebo zúžený).
    blade_length_type:
      name: Typ délky nože
      description: Klasifikuje délku nože ploutve jako krátkou, střední nebo dlouhou,
        přičemž každá ovlivňuje kadenci kopu a tréninkové cíle.
    blade_lie:
      name: Sklon nože
      description: Označuje úhel čepele (lie) hokejky, který určuje, jak čepel sedí
        na ledě vzhledem k shaftu.
    blade_sharpness:
      name: Ostrost nože
      description: Označuje, zda je ostří zbraně nabroušené, nebo tupé pro účely tréninku.
    blade_size_category:
      name: Kategorie velikosti čepele
      description: Standardizovaný mezinárodní kód velikosti čepele šavle (0–5) používaný
        k rozlišení čepelí pro mládež a dospělé.
    blade_size_class:
      name: Třída velikosti čepele
      description: Klasifikuje nůž podle konvence velikosti hráče, odpovídající velikostem
        holí, jako jsou Youth, Junior, Intermediate nebo Senior.
    blade_size_number:
      name: Číslo velikosti nože
      description: Standardni číselný kód velikosti (0–5) definovaný šermířskými pravidly,
        který určuje délku čepele a způsobilost pro danou věkovou kategorii.
    blaster_mechanism:
      name: Mechanismus blasteru
      description: Určuje vnitřní mechanismus gelového blasteru (např. GBB, AEG, pružina).
    block_edge_style:
      name: Styl hran bloku
      description: Popisuje úpravu hran a rohů dřevěných kostek z hlediska haptiky
        a bezpečnosti.
    blocking_mat_features:
      name: Vlastnosti blokovací podložky
      description: Funkční vlastnosti specifické pro blokovací podložky (skladování,
        přenositelnost, použitelnost).
    blocking_mat_grid_unit:
      name: Jednotka mřížky blokovací podložky
      description: Systém jednotek použitý na vytištěné mřížce, který uživatelům pomáhá
        sladit vzory a rozměry.
    blocking_mat_surface_markings:
      name: Značení na povrchu blokovací podložky
      description: Typ značek měření/vodítek vytištěných nebo vylisovaných na povrchu
        podložky.
    blocking_wire_coating:
      name: Potah blokovacího drátu
      description: Povrchová úprava/povlak blokovacích drátů ovlivňující odolnost
        proti korozi, hladkost a riziko zachycení.
    blocking_wire_end_cap_type:
      name: Typ koncovky blokovacího drátu
      description: Určuje typ koncové ochrany/úpravy použité na koncích blokovacích
        drátů pro bezpečnost a ochranu tkaniny.
    blocking_wire_set_includes:
      name: Sada blokovacích drátů obsahuje
      description: Určuje, které součásti jsou dodávány s blokovacími dráty (např.
        T-špendlíky, úložná trubice).
    blocking_wire_usage:
      name: Účel použití blokovacího drátu
      description: Hlavní účel použití, pro který je flexibilní blokovací drát navržen.
    bloom_stage:
      name: Fáze květu
      description: Označuje, jak otevřené jsou květy sedmikrásek při doručení/odeslání.
    blower_motor_bearing_type:
      name: Typ ložiska motoru ventilátoru
      description: Určuje konstrukci ložiska použitého v motoru ventilátoru.
    blower_motor_mounting_position:
      name: Montážní poloha motoru ventilátoru
      description: Označuje, kde je motor ventilátoru nainstalován v jednotce topení
        či klimatizace / ve vozidle (např. vpředu, vzadu).
    blowpipe_valve_type:
      name: Typ ventilu foukačky
      description: Určuje typ zpětného ventilu fukovodu dud (pokud je součástí).
    bo_staff_style:
      name: Model tyče bó
      description: Definuje konstrukční styl nebo provedení tyče (např. rovná, zužující
        se, s pěnovým polstrováním, skládací).
    board_game_theme:
      name: Motiv deskové hry
      description: Tematické a příběhové zasazení deskové hry (slouží k vyhledávání
        a prohlížení).
    board_rail_shape:
      name: Tvar hran desky
      description: Označuje profil hran surfu (např. měkké, tvrdé, 50/50), což ovlivňuje
        držení stopy a jízdu na vlně.
    board_size_classification:
      name: Klasifikace velikosti prkna
      description: Klasifikuje desku nebo sadu na cornhole do běžných standardizovaných
        velikostí.
    board_type_compatibility:
      name: Kompatibilita typů desek
      description: Označuje typ prkna, pro které je leash (bezpečnostní řemen) určen.
    boat_construction_type:
      name: Typ konstrukce lodi
      description: Popisuje konstrukční styl nebo typ veslice (např. nafukovací, pevná).
    boat_hook_flotation:
      name: Schopnost lodního háku držet se na hladině (vztlak)
      description: Označuje, zda je lodní hák navržen tak, aby po pádu do vody plaval.
    boat_ladder_stowage_style:
      name: Způsob uložení lodního žebříku
      description: Popisuje typ žebříku (např. skládací, teleskopický, odnímatelný)
        a jak se ukládá, pokud se nepoužívá.
    boat_trailer_construction_type:
      name: Typ konstrukce lodního přívěsu
      description: Označuje, zda přívěs podpírá loď pomocí podélných opěr, válečků
        nebo hybridního systému.
    boat_weaving_shuttle_weft_exit_type:
      name: Typ výstupu útkové příze z tkalcovského člunku
      description: Jak útková příze opouští člunek během tkaní.
    bobbin_loading_type:
      name: Typ vkládání cívky
      description: Označuje, jak se cívka vkládá do šicího stroje.
    bobbin_system:
      name: Systém cívky
      description: Systém/typ zavádění cívky používaný šicím strojem.
    bobbin_type:
      name: Typ cívky
      description: Určuje formát nosiče příze, pro který je člunek navržen (nebo který
        obsahuje), což určuje kompatibilitu a obvyklé použití (např. člunkové lodičky
        často využívají cívky, zatímco hadrové člunky mohou být otevřené pro proužky
        látky).
    bobbin_winder_winding_direction:
      name: Směr navíjení navíječky cívky
      description: Určuje směr navíjení/otáčení podporovaný navíječem cívky.
    bobble_mechanism:
      name: Mechanism kývání (hlavy)
      description: Označuje typ mechanismu kývání, který má vliv na pohyb a odolnost
        (figurky).
    bocal_material:
      name: Materiál trysky
      description: Označuje materiál dodávaného esa (k dechovému nástroji).
    bodhr_n_head_material:
      name: Materiál blány bubnu bodhrán
      description: Materiál hrací blány (membrány), který silně ovlivňuje tón a požadavky
        na údržbu.
    bodhr_n_tuning_system_type:
      name: Typ ladicího systému bodhránu
      description: Styl vestavěného ladicího mechanismu používaného k nastavení napětí
        blány (pokud je laditelný).
    body_armor_coverage_area:
      name: Plocha krytí ochranné vesty / balistické ochrany
      description: Označuje, které části těla produkt chrání.
    body_armor_intended_use:
      name: Zamýšlené použití ochran karoserie
      description: Určuje hlavní scénář jízdy nebo použití, pro který jsou ochranné
        prvky karoserie čtyřkolky/UTV navrženy.
    body_cord_connector_style:
      name: Typ konektoru šermířské tělové šňůry
      description: Popisuje uspořádání konektorů na koncích šňůry (např. počet kolíků
        nebo bajonetové provedení), které určuje kompatibilitu se zbraněmi a signalizačními
        aparáty.
    body_panel_finish_state:
      name: Stav povrchové úpravy panelů karoserie
      description: Popisuje stav přípravy a povrchové úpravy bočního panelu karoserie
        (blatníku) při prodeji z hlediska lakování nebo instalace.
    body_shape:
      name: Tvar těla
      description: Určuje obecný tvar nebo styl těla elektrické kytary.
    bodysuit_bottom_coverage:
      name: Střih spodní části body
      description: Definuje střih a míru zakrytí spodní části body, což ovlivňuje
        pohodlí a kompatibilitu s dalšími kusy oblečení.
    boilie_shape:
      name: Tvar boilies
      description: Označuje tvar boilies vyráběného na rolovací desce (rolleru), což
        rybářům umožňuje vybrat si mezi různými profily nástrah.
    boilie_stop_buoyancy:
      name: Vztlak zarážky na boilies
      description: Určuje, zda je zarážka na boilies navržena jako plovoucí, potápivá
        nebo s neutrálním vztlakem, což ovlivňuje prezentaci nástrahy ve vodním sloupci.
    bok_choy_variety:
      name: Odrůda pak choi (bok choy)
      description: Určuje kultivar, obchodní název nebo odrůdu čínského zelí bok choy
        (např. Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), což nakupujícím umožňuje
        vybrat si požadovanou chuť, velikost a vzhled.
    bolt_drive_style:
      name: Styl pohonu šroubu
      description: Určuje styl pohonu montážních šroubů skateboardu a rozlišuje mezi
        běžnými typy hlav/šroubováků, jako je imbusový nebo křížový.
    bone_content:
      name: Obsah kostí
      description: Určuje, zda maso obsahuje kosti.
    bongo_center_block_material:
      name: Materiál středového bloku bubnů bongo
      description: Materiál středového bloku spojujícího oba korpusy bubnů bongo (pokud
        je to relevantní).
    bongo_shell_material:
      name: Materiál korpusu bonga
      description: Materiál skořepin bubnů (korpusu bubnů) bongo s výjimkou blan a
        hardwaru.
    bongo_tuning_system:
      name: Systém ladění bonga
      description: Určuje způsob ladění nebo konstrukci ladicího mechanismu bubnů
        bongo (např. tradiční ladění pomocí šroubů vs. ladění pomocí provazů), což
        ovlivňuje náročnost údržby a autenticitu.
    boning_type:
      name: Typ kostice
      description: Určuje podpůrný systém výztuh uvnitř stahovacího korzetu, přičemž
        kombinuje materiál a styl či tvar použitých kostic, což přímo ovlivňuje míru
        opory, flexibilitu a odolnost.
    boot_liner_type:
      name: Typ vložky do boty
      description: Popisuje konstrukci nebo možnost přizpůsobení vnitřní vložky ve
        snowboardové botě (např. tepelně tvarovatelná, vyjímatelná).
    boot_sole_compatibility:
      name: Kompatibilita podrážky boty
      description: Uvádí normy pro podrážky bot nebo systémy rozhraní, které vázání
        akceptuje.
    boot_support_level:
      name: Úroveň podpory boty
      description: Popisuje celkovou tuhost/oporu kotníku nebo boty, kterou brusle
        poskytují.
    boot_width_code:
      name: Kód šířky boty
      description: Označení šířky založené na písmenech výrobce používané konkrétně
        při určování velikostí krasobruslí (např. AAA, AA, B, C, D).
    booth_configuration:
      name: Uspořádání stánku
      description: Označuje celkovou konfiguraci sedadel v kabině (např. jednostranná,
        rohová, modulární).
    bootie_toe_design:
      name: Design špičky botičky
      description: Označuje styl konstrukce špičky surfařských bot a bot do vody s
        extra odolnou podrážkou.
    border_type:
      name: Typ ohraničení
      description: Úprava okraje/styl lemu vyšívané nášivky (ovlivňuje vzhled, odolnost
        proti třepení a vnímanou kvalitu).
    bore_cleaner_format:
      name: Forma čističe hlavně / vývrtu
      description: Označuje fyzickou formu produktu na čištění vývrtu (zda jde o mechanický
        nástroj, nebo o spotřební materiál).
    bore_cleaner_safe_for_finish:
      name: Čistič hlavní bezpečný pro povrchovou úpravu
      description: Označuje, pro které běžné povrchové úpravy mosazných nástrojů je
        čistič vnitřní části nástroje bezpečný.
    bottle_cage_loading_direction:
      name: Směr vkládání lahve do košíku
      description: Popisuje směr, ze kterého se láhev vkládá do košíku nebo se z něj
        vyjímá.
    bottle_neck_finish_closure_size:
      name: Velikost hrdla / uzávěru lahve
      description: Standardizovaná velikost hrdla/otvoru lahve, která zajišťuje kompatibilitu
        s víčky, zátkami a korunkovými uzávěry (např. 26mm korunkovým uzávěrem).
    bottle_style:
      name: Typ/tvar lahve
      description: Běžné typy a tvary stáčecích lahví používané při domácím vaření
        piva a výrobě vína.
    bottom_bracket_interface:
      name: Rozhraní středového složení
      description: Určuje standard osy/středového složení, pro který jsou kliky navrženy,
        a zajišťuje tak kompatibilitu rámu a středového složení.
    bottom_bracket_standard:
      name: Standard středového složení
      description: Typ středového složení/rozhraní podporovaný rámem, který určuje
        kompatibilitu klik.
    bottom_type_suitability:
      name: Vhodnost typu dna
      description: Popisuje typ mořského dna / podloží, ve kterém má kotva nejlepší
        přídržnou sílu.
    bounce_level:
      name: Úroveň odrazu (odskoku)
      description: Označuje, jak moc se míč po dopadu nebo odhození odrazí, což uživatelům
        pomáhá vybrat správný míč na cvičení, například pro házení míčem o stěnu nebo
        driblování.
    bouncy_ball_surface_finish:
      name: Povrchová úprava hopíku
      description: Označuje hmatovou a/nebo vizuální povrchovou úpravu hopíku (např.
        hladký, s ostny, se třpytkami).
    boundary_marker_type:
      name: Typ lajnování (označení hranic hřiště)
      description: Definuje fyzickou podobu produktu pro označení hranic hřiště nebo
        kurtu (např. kužel, páska, barva, šablona, lajnovací vozík).
    bouquet_size_tier:
      name: Velikostní kategorie kytice
      description: Standardizovaná velikostní kategorie pro kytici nebo svazek bez
        ohledu na počet stonků (užitečné u kombinovaných svazků).
    bow_and_yo_yo_edge_finish:
      name: Povrchová úprava okrajů mašle a ozdobného joja
      description: Popisuje olemování nebo začištění okrajů použité na mašli či joju
        (zejména u stuhových mašlí).
    bow_case_shell_type:
      name: Typ skořepiny na luk
      description: Popisuje konstrukční provedení vnější části pouzdra na luk (např.
        pevná skořepina vs. měkké pouzdro).
    bow_compatibility:
      name: Kompatibilita s luky
      description: Určuje typ luku, pro který je lovecký hrot (broadhead) určen nebo
        pro jehož výkon je konstruován.
    bow_hair_color:
      name: Barva žíní smyčce
      description: Určuje barvu a vzhled žíní použitých na smyčci orchestrálního smyčcového
        nástroje (např. bílé/bělené, přírodní bílé, černé).
    bow_stick_material:
      name: Materiál příčníku
      description: Označuje materiál použitý na prut (hlavní tyč) smyčce, který zásadně
        ovlivňuje jeho hmotnost, ovladatelnost a cenu.
    bow_type:
      name: Typ smyčce
      description: Určuje konstrukční provedení luku pro mládež (např. kladkový, reflexní,
        dlouhý luk), což výrazně ovlivňuje styl střelby, potřebné příslušenství a
        tréninkové programy.
    bow_winding_material:
      name: Materiál na ovinutí smyčce
      description: Označuje materiál použitý na ovinutí/omotávku smyčce, což má vliv
        na jeho úchop a vyvážení.
    bow_yo_yo_embellishment_style:
      name: Způsob zdobení mašle/joja
      description: Určuje způsob konstrukce ozdoby (mašle nebo látkové jo-jo).
    bowling_ball_core_type:
      name: Typ jádra bowlingové koule
      description: Označuje konstrukci vnitřního jádra nebo symetrii bowlingové koule,
        což ovlivňuje rotaci a potenciál zahýbání koule.
    bowling_ball_coverstock_type:
      name: Typ povrchového materiálu bowlingové koule
      description: Určuje vnější materiál nebo technologii povrchu bowlingové koule,
        což určuje její trakci a potenciál pro zahnutí dráhy (hook).
    bowling_set_style:
      name: Styl bowlingové sady
      description: Definuje celkový styl nebo účel použití bowlingové sady.
    box_lid_type:
      name: Typ víka krabice
      description: Typ víka nebo otevíracího mechanismu dárkové krabičky či plechovky.
    box_spring_profile:
      name: Výška profilu pružinové základny (boxspringu)
      description: Klasifikuje celkovou výšku boxspringu do přehledných výškových
        kategorií (např. nízký profil, standardní, vysoký profil), což zákazníkům
        umožňuje rychlé filtrování i bez znalosti přesných rozměrů.
    box_spring_requirement:
      name: Nutnost boxspringové (spodní) matrace
      description: Označuje, zda matrace vyžaduje dodatečnou pružinovou základnu (boxspring)
        nebo pevný podklad.
    boxing_ring_style:
      name: Ve stylu boxerského ringu
      description: Klasifikuje celkový konstrukční styl nebo zamýšlený účel použití
        boxovacího ringu (např. soutěžní vs. tréninkový, vyvýšený vs. podlahový).
    bra_length_type:
      name: Typ délky podprsenky
      description: Určuje klasifikaci délky podprsenek na základě vertikálního střihu,
        například standardní, prodloužená (longline), midi nebo zkrácená (cropped).
    bra_padding_type:
      name: Typ vycpávek podprsenky
      description: Popisuje míru nebo výskyt výztuže v košíčcích.
    braces_compatibility:
      name: Kompatibilita s výztuhami
      description: Určuje, zda lze chránič zubů nosit s ortodontickými rovnátky a
        do jaké míry.
    brake_band_form:
      name: Tvar brzdového pásu
      description: Označuje, zda je brzdový pás dodáván jako nekonečná smyčka (vcelku),
        nebo v metráži (nastříhané délce), kterou je nutné spojit.
    brake_band_material_type:
      name: Typ materiálu brzdového pásu
      description: Označuje funkční materiál brzdového pásku (např. bavlněnou šňůru,
        nylonové lanko nebo pružinovou ocel), který má vliv na odolnost, přilnavost,
        průtažnost a hlučnost.
    brake_band_style:
      name: Styl brzdového pásu
      description: Označuje systém/typ napínání brzdového pásku používaný na kolovratu
        k regulaci napětí křídla/cívky.
    brake_bleeding_method:
      name: Způsob odvzdušnění brzd
      description: Způsob odvzdušnění, který tato sada podporuje.
    brake_booster_assist_type:
      name: Typ posilovače brzd
      description: Označuje mechanismus podpory (posilování) využívaný posilovačem
        brzd.
    brake_booster_diaphragm_configuration:
      name: Konfigurace membrány posilovače brzd
      description: Označuje počet nebo typ membrán použitých v posilovači brzd.
    brake_caliper_bleeder_screw_position:
      name: Poloha odvzdušňovacího šroubu brzdového třmenu
      description: Označuje polohu odvzdušňovacího šroubu na brzdovém třmenu po montáži
        (slouží k ověření toho, zda je odvzdušňovací ventil v nejvyšším bodě pro správné
        odvzdušnění).
    brake_caliper_finish:
      name: Povrchová úprava brzdového třmenu
      description: Určuje povrchovou úpravu nebo ochranný nátěr aplikovaný na těleso
        brzdového třmenu (např. barva, pokovování, eloxování).
    brake_caliper_included_hardware:
      name: Montážní příslušenství brzdového třmenu přiložené v balení
      description: Určuje, co všechno je součástí sestavy brzdového třmenu.
    brake_caliper_mount_type:
      name: Typ uchycení brzdového třmenu
      description: Typ montážního rozhraní (uchycení) používaný k připevnění třmenu
        k těhlici/konzole.
    brake_caliper_paint_base_chemistry:
      name: Chemické složení báze laku na brzdové třmeny
      description: Typ použitého lakovacího/pryskyřičného systému nebo chemické báze.
    brake_caliper_paint_kit_contents:
      name: Obsah sady barvy na brzdové třmeny
      description: Označuje, co všechno je součástí balení nad rámec samotné barvy.
    brake_circuit_type:
      name: Typ brzdového okruhu
      description: Konfigurace hydraulického obvodu podporovaná hlavním brzdovým válcem.
    brake_clutch_fluid_base_chemistry:
      name: Chemické složení brzdové a spojkové kapaliny
      description: Primární chemická báze brzdové/spojkové hydraulické kapaliny, která
        ovlivňuje kompatibilitu a mísitelnost.
    brake_clutch_fluid_dot_specification:
      name: Brzdová/spojková kapalina specifikace DOT
      description: Klasifikace DOT podle výkonnosti pro hydraulické brzdové/spojkové
        kapaliny (např. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Povrchová úprava/překrytí brzdového bubnu
      description: Povrchová úprava nebo ochranný nátěr nanesený na brzdový buben
        (např. elektrolytický nátěr, lakování, pozinkovaný).
    brake_drum_type:
      name: Typ brzdového bubnu
      description: Typ konstrukce brzdového bubnu (s integrovaným nábojem/ložiskem
        nebo bez něj).
    brake_fluid_base:
      name: Báze brzdové kapaliny
      description: Určuje chemické složení požadované nebo zahrnuté brzdové kapaliny.
    brake_fluid_base_chemistry:
      name: Chemické složení báze brzdové kapaliny
      description: Definuje chemickou bázi brzdové kapaliny, která určuje kompatibilitu
        a pravidla pro míchání.
    brake_fluid_dot_specification:
      name: Specifikace brzdové kapaliny podle normy DOT
      description: Označuje specifikaci brzdové kapaliny DOT (např. DOT 3, DOT 4)
        pro brzdové kapaliny.
    brake_fluid_standards_compliance:
      name: Splnění norem pro brzdové kapaliny
      description: Průmyslové normy, které brzdová kapalina splňuje (nad rámec hodnocení
        DOT).
    brake_fluid_type:
      name: Typ brzdové kapaliny
      description: Určuje brzdovou kapalinu požadovanou pro hydraulické brzdové třmeny
        jízdních kol.
    brake_hose_end_fitting_type:
      name: Typ koncovky brzdové hadice
      description: Typ připojení na každém konci brzdové hadice (např. banjo, nalisované,
        s vnitřním/vnějším závitem), který slouží k zajištění kompatibility s brzdovými
        třmeny a trubkami.
    brake_lever_pull_type:
      name: Typ tahu brzdové páčky
      description: Definuje poměr/mechaniku tahu lanka, pro kterou je páčka navržena,
        což zajišťuje kompatibilitu s konkrétními brzdovými třmeny (např. ráfkové
        brzdy s krátkým tahem oproti V-brzdě s dlouhým tahem).
    brake_light_switch_actuation_type:
      name: Způsob ovládání spínače brzdových světel
      description: Určuje, jaký fyzický podnět aktivuje spínač (pedál/píst vs. hydraulický
        tlak atd.).
    brake_light_switch_connector_type:
      name: Typ konektoru spínače brzdových světel
      description: Určuje typ/formát elektrického konektoru používaného spínačem brzdových
        světel pro připojení k kabelovému svazku vozidla.
    brake_light_switch_contact_type:
      name: Typ kontaktu spínače brzdových světel
      description: Konfigurace/chování elektrického kontaktu spínače brzdových světel
        (např. spínací, rozpínací, přepínací nebo víceobvodový).
    brake_light_switch_mounting_style:
      name: Způsob montáže spínače brzdových světel
      description: Způsob montáže/instalace spínače brzdových světel na vozidle nebo
        v brzdovém systému (např. na závit, zacvaknutím, upevněním na držák, pomocí
        šroubu banjo).
    brake_master_cylinder_mounting_type:
      name: Typ uchycení hlavního brzdového válce
      description: Popisuje způsob montáže hlavního brzdového válce k vozidlu/posilovači
        brzd (rozteč šroubů / typ příruby).
    brake_master_cylinder_reservoir_type:
      name: Typ nádržky hlavního brzdového válce
      description: Typ/konfigurace nádržky na brzdovou kapalinu, která je součástí
        dodávky nebo je dána typem hlavního brzdového válce.
    brake_mount_type:
      name: Typ uchycení brzdy
      description: Označuje typ montážního rozhraní pro brzdu integrovaného na vidlici,
        aby si jezdci mohli ověřit kompatibilitu brzdového systému.
    brake_mounting_flange_bolt_pattern:
      name: Rozteč šroubů montážní příruby brzdy
      description: Specifikuje rozteč otvorů/šroubů montážní příruby použité k připevnění
        brzdového štítu nebo držáku třmenu k nápravě přívěsu (např. 4 šrouby).
    brake_pad_backing_plate_material:
      name: Materiál nosné desky brzdové destičky
      description: Označuje materiál nosné desky brzdové destičky, který ovlivňuje
        odvod tepla a hmotnost.
    brake_pad_compatible_rotor_type:
      name: Typ brzdového kotouče kompatibilní s brzdovými destičkami
      description: Označuje zamýšlený typ povrchu rotoru/kotouče, pro který je destička
        navržena.
    brake_pad_compound:
      name: Směs do brzdových destiček
      description: Určuje složení třecího materiálu brzdové destičky.
    brake_pad_form_factor:
      name: Tvar a rozměry (form factor) brzdových destiček
      description: Určuje brzdový systém nebo konstrukční tvar, pro který je destička
        určena (např. kotoučová, bubnová, parkovací brzda).
    brake_pad_material:
      name: Materiál brzdových destiček
      description: Označuje třecí směs / typ materiálu použitého v obložení brzdové
        destičky.
    brake_pad_shim_included:
      name: Protihluková podložka brzdové destičky je součástí balení
      description: Označuje, zda jsou protihlukové podložky součástí balení nebo jsou
        již předmontované.
    brake_pad_wear_indicator_type:
      name: Typ indikátoru opotřebení brzdových destiček
      description: Označuje, jaký typ indikátoru opotřebení je součástí brzdových
        destiček (např. mechanický akustický plíšek nebo elektronický senzor).
    brake_position:
      name: Umístění brzdy
      description: Označuje, kde na vozidle má být brzdový komponent namontován.
    brake_rotor_mount_type:
      name: Typ uchycení brzdového kotouče
      description: Definuje typ rozhraní (uchycení) používaný k připevnění brzdového
        kotouče k náboji (pokud je to relevantní).
    brake_service_kit_components_included:
      name: Obsah servisní sady brzdy je součástí balení
      description: Seznam nářadí, adaptérů a spotřebního materiálu, který je součástí
        servisní sady brzd.
    brake_shoe_friction_material:
      name: Třecí materiál brzdové čelisti
      description: Označuje třecí směs/obložení použité na brzdové čelisti (materiál,
        který je v kontaktu s bubnem).
    brake_shoe_set_contents:
      name: Obsah sady brzdových čelistí
      description: Označuje, co je součástí balení (např. pouze čelisti nebo čelisti
        včetně montážního příslušenství/pružin).
    brake_system_type:
      name: Typ brzdového systému
      description: Označuje technologii brzdného mechanismu používanou k regulaci
        otáčení cívky během nahazování.
    brake_type:
      name: Typ brzdy
      description: Typ brzdného/napínacího mechanismu osnovního válu.
    brandy_age_classification:
      name: Klasifikace brandy podle stáří
      description: Kategorizuje brandy pomocí standardních označení kvality/věku (např.
        VS, VSOP, XO), která odrážejí minimální požadavky na zrání.
    brass_cleaning_tool_type:
      name: Typ čističe na žesťové nástroje
      description: Určuje typ nástroje používaného k čištění nebo údržbě žesťových
        nástrojů.
    brass_instrument_application_area:
      name: 'Oblast použití: na žesťové nástroje'
      description: Označuje části žesťového nástroje, pro které je dezinfekční sprej
        určen.
    brass_instrument_care_kit_purpose:
      name: Zamýšlený účel sady péče o žesťové nástroje
      description: Popisuje zamýšlený scénář použití sady (běžná údržba, důkladné
        čištění, cestování/nouzové případy, startovací sada pro studenty atd.).
    brass_instrument_case_shell_material:
      name: Materiál skořepiny pouzdra na žesťové nástroje
      description: Označuje hlavní materiál pevné skořepiny/rámu pouzdra (pokud je
        to relevantní), odděleně od materiálu běžné tašky/obalu.
    brass_instrument_lubricant_additives_features:
      name: Aditiva/vlastnosti maziva pro žesťové nástroje
      description: Významné funkční vlastnosti složení maziva.
    brass_instrument_lubricant_base_composition:
      name: Základní složení maziva pro žesťové nástroje
      description: Základní mazivo/chemické složení používané pro maziva pro žesťové
        hudební nástroje.
    brass_instrument_lubricant_viscosity_grade:
      name: Třída viskozity maziva pro žesťové nástroje
      description: Označuje relativní hustotu/tekutost maziva určeného pro žesťové
        nástroje.
    brass_instrument_replacement_part_type:
      name: Typ náhradního dílu pro žesťové nástroje
      description: Určuje, o jaký druh náhradního dílu se jedná pro žesťové nástroje
        (komponenty ventilů, snižců či vodních klapek, korky/plsti, ochranné kryty
        atd.).
    brass_instrument_valve_configuration:
      name: Konfigurace ventilů žesťového nástroje
      description: Označuje, jak nástroj mění výšku tónu (ventilový nebo snižcový
        mechanismus).
    brass_lubricant_application_area:
      name: Oblast použití maziva na mosaz
      description: Označuje mechanismus žesťového nástroje, pro který je mazivo určeno.
    brass_mouthpiece_backbore:
      name: Zadní vývrt (backbore) náustku žesťových nástrojů
      description: Profil nebo kategorie zadního vývrtu náustku (tvar a velikost zadního
        vývrtu), což ovlivňuje tón a intonaci.
    brass_mouthpiece_cup_depth:
      name: Hloubka kotlíku nátrubku pro žesťové nástroje
      description: Klasifikace hloubky kotlíku náustku (jak hluboký je kotlík), která
        ovlivňuje tón a odezvu.
    brass_polishing_cloth_abrasiveness_level:
      name: Stupeň abrazivnosti lešticího hadříku na mosaz
      description: Udává, jak účinný je hadřík při odstraňování zašlého povrchu v
        porovnání s poskytnutím jemného lesku.
    bread_crumb_base_ingredient:
      name: Hlavní složka strouhanky
      description: Určuje hlavní složku, ze které je strouhanka vyrobena, například
        pšenici, rýži, vepřové kůže nebo mandle.
    bread_variety:
      name: Druh chleba
      description: Určuje druh nebo odrůdu chleba či pečiva, což pomáhá nakupujícím
        najít konkrétní druhy (např. brioška, bageta, naan).
    breadstick_style:
      name: Typ chlebových tyčinek
      description: Určuje specifický tradiční styl nebo formát chlebových tyčinek.
    bridge_head_material:
      name: Materiál mostové hlavy
      description: Materiál použitý výhradně pro hlavici kulečníkového můstku (hrabiček),
        což ovlivňuje hmotnost, pocit při hře a odolnost.
    bridge_head_type:
      name: Typ hlavy můstku
      description: Určuje styl hlavice kulečníkového můstku, což pomáhá kupujícím
        vybrat si požadovaný tvar opěrky tága.
    bridle_part_type:
      name: Typ části uzdečky
      description: Označuje konkrétní komponent můstku, který tento náhradní díl představuje,
        což zákazníkům pomáhá najít přesnou součást, kterou potřebují.
    bridle_style:
      name: Model uzdy
      description: Klasifikuje celkové provedení nebo konstrukci uzdy, aby jezdci
        mohli rychle najít vybavení vhodné pro jejich potřeby nebo disciplínu.
    broadhead_field_point_attachment_style:
      name: Způsob uchycení loveckého hrotu nebo cvičného polního hrotu
      description: Specifikuje, jak se lovecký hrot nebo terčový hrot připevňuje k
        tělu šípu.
    broadhead_thread_size:
      name: Velikost závitu loveckého hrotu (broadhead)
      description: Udává specifikaci závitu použitého k připevnění loveckého nebo
        terčového hrotu k vložce nebo tělu šípu.
    broadhead_tip_type:
      name: Typ hrotu loveckého šípu (broadhead)
      description: Definuje provedení špičky/patice loveckého hrotu, který proniká
        do zvěře a ovlivňuje účinnost u různé zvěře.
    broccoli_cut:
      name: Způsob porcování brokolice
      description: Označuje, jak byla brokolice před zabalením naporcována nebo upravena
        (např. celá hlavička, růžičky, brokolicová rýže).
    broccoli_variety:
      name: Odrůda brokolice
      description: Označuje konkrétní kultivar nebo tržní odrůdu brokolice (např.
        řapíkatá brokolice Tenderstem, Romanesco).
    broom_head_material:
      name: Materiál hlavice smetáku
      description: Označuje materiálové složení hlavy koštěte, které ovlivňuje životnost
        a herní vlastnosti.
    brush_format:
      name: Formát štětce
      description: Označuje fyzický formát kartáče na lyže nebo snowboard a rozlišuje
        mezi ručními bloky a rotačními formáty poháněnými vrtačkou, jako jsou válce
        s roto vlnou nebo roto plstí.
    brush_shape:
      name: Tvar štětce
      description: Označuje fyzický tvar nebo profil svazku vlasu štětce, což ovlivňuje
        kontaktní plochu a manipulaci.
    brussel_sprout_preparation:
      name: Způsob přípravy růžičkové kapusty
      description: Popisuje způsob přípravy nebo styl řezu dodávané růžičkové kapusty.
    brussels_sprout_variety:
      name: Odrůda růžičkové kapusty
      description: Označuje kultivar nebo odrůdu růžičkové kapusty a zohledňuje současné
        i budoucí odrůdy.
    bubble_blower_features:
      name: Vlastnosti bublifuku
      description: Uvádí běžné funkční vlastnosti bublifuků.
    bubble_gun_bubble_output_modes:
      name: Režimy vypouštění bublin u bublinové pistole
      description: Určuje provozní režimy bublinkové pistole, například režim s jednou
        bublinou, kontinuální režim nebo režim s více rychlostmi.
    bubble_machine_features:
      name: Vlastnosti stroje na bubliny
      description: Vyzdvihuje běžné funkční vlastnosti bublinových automatů nad rámec
        základního provozu.
    bubble_machine_items_included:
      name: Součásti balení bublinkovače
      description: Uvádí hlavní položky, které jsou součástí balení (např. roztok
        do bublifuku, náhradní foukátka, popruh na přenášení, dálkové ovládání).
    bubble_output_rate:
      name: Rychlost tvoření bublin
      description: Označuje přibližnou/kvalitativní rychlost tvorby bublin u bublifuku
        (např. nízká/střední/vysoká), včetně informace, zda je rychlost regulovatelná.
    bubble_solution_container_type:
      name: Typ kontejneru s bublinovým roztokem
      description: Specifikuje, jak je roztok do bublifuku dodáván/používán s bublinovou
        pistolí (např. integrovaná nádržka, našroubovaná lahvička, samostatná miska
        na namáčení).
    bubble_toy_included_accessories:
      name: Příslušenství dodávané k bublifukové hračce
      description: Uvádí běžné položky, které jsou součástí bublinkové hračky (např.
        lahvička s roztokem, tácek, náhradní hůlky).
    buckwheat_processing_method:
      name: Způsob zpracování pohanky
      description: Popisuje způsob zpracování pohanky před prodejem (např. pražená,
        naklíčená, pufovaná).
    buckwheat_product_form:
      name: Forma pohankového produktu
      description: Fyzická prezentace specifická pro pohanku, která zahrnuje formy
        neuvedené v obecném seznamu (např. vločky, pukance, instantní sáčky).
    bug_collecting_kit_items_included:
      name: Položky sady na sbírání hmyzu
      description: Nástroje a vzdělávací materiály obsažené v sadě pro sběratele hmyzu.
    built_in_storage_type:
      name: Typ vestavěného úložného prostoru
      description: Určuje typy úložných prostorů zabudovaných do rámu palandy (např.
        zásuvky, police, úložný prostor v integrovaných schůdcích).
    bumper_finish:
      name: Povrchová úprava nárazníku
      description: Určuje povrchovou úvarnu nebo lakování aplikované na nárazník.
    bumper_sensor_cutouts:
      name: Otvory pro senzory v nárazníku
      description: Označuje, které otvory/výřezy pro tovární asistenty (OEM) nárazník
        obsahuje nebo podporuje.
    bunk_bed_configuration:
      name: Konfigurace palandy
      description: Označuje konstrukční rozvržení a kombinaci velikostí matrací u
        palandy.
    buoyancy:
      name: Vztlak
      description: Označuje vztlakové vlastnosti návnady nebo nástrahy ve vodním sloupci,
        například plovoucí, potápivá nebo s neutrálním vztlakem.
    burkini_pieces_included:
      name: Včetně dílů na burkini
      description: Uvádí součásti oděvu dodávané v sadě burkin, aby zákazníce přesně
        věděly, co kupují.
    burn_rate:
      name: Rychlost hoření
      description: Popisuje, jak rychle cigaretový papírek po zapálení hoří.
    bus_model_type:
      name: Typ modelu autobusu
      description: Určuje povrchovou úpravu nebo lakování aplikované na nárazník.
    bust_design:
      name: Provedení košíčků/hrudní části body
      description: Popisuje uspořádání oblasti hrudníku a zakrytí výstřihu body (např.
        s otevřeným hrudníkem, s všitou podprsenka, hluboký výstřih).
    butter_variety:
      name: Odrůda másla
      description: Specifikuje způsob výroby nebo charakteristický druh másla, jako
        je zakysané (tradiční), ze sladké smetany, evropského typu, přepuštěné (ghí)
        nebo syrovátkové máslo.
    buttermilk_variety:
      name: Druh podmáslí
      description: Označuje konkrétní druh nebo formu prodávaného podmáslí (např.
        kysané, tradiční, sušené).
    button_application:
      name: Způsob uchycení knoflíku
      description: Označuje zamýšlený typ použití nebo projektu pro knoflík (např.
        oděvy, čalounění).
    button_attachment_type:
      name: Způsob uchycení knoflíku
      description: Označuje typ knoflíku z hlediska jeho připevnění k látce (např.
        s dírkami pro přišívání nebo na stopce), nikoli způsob zapínání.
    button_finish:
      name: Povrchová úprava knoflíku
      description: Popisuje povrchovou úpravu/vzhled knoflíku (např. matný oproti
        lesklému).
    buttonhole_elastic_application:
      name: Použití pruženky (gumy) do knoflíkové dírky
      description: Hlavní zamýšlený účel/použití pruženky.
    cab_type:
      name: Typ kabiny
      description: Určuje konfiguraci kabiny nákladního vozidla.
    cabasa_construction_type:
      name: Typ konstrukce Cabasa
      description: Určuje fyzickou konstrukci/styl těla cabasy a sestavy řetízku/korálků.
    cabbage_variety:
      name: Odrůda hlávkového zelí
      description: Označuje kultivar nebo druh kapusty či zelí (např. hlávkové zelí,
        pekingské zelí, hlávková kapusta), aby nakupující mohli filtrovat podle chuti,
        textury a využití v kuchyni.
    cabinet_door_style:
      name: Provedení dvířek skříňky
      description: Určuje vizuální design panelu dvířek skříňky, například ve stylu
        Shaker nebo s vyvýšenou výplní, aby lépe ladil s estetikou kuchyně.
    cabinet_overlay_type:
      name: Typ překrytí dvířek skříňky
      description: Určuje, jak dvířka překrývají korpus nebo jak jsou usazena vzhledem
        k rámu skříňky.
    cable_end_type:
      name: Typ zakončení kabelu
      description: Popisuje tvar nebo styl zakončení lanka, které zapadá do brzdových
        nebo řadicích páček.
    cable_housing_construction:
      name: Konstrukce bowdenu kabelu
      description: Popisuje konstrukční provedení bowdenu, například vinuté, bezkompresní
        nebo segmentované články, což ovlivňuje odolnost proti stlačení, flexibilitu
        a pocit při jízdě.
    cable_housing_liner_type:
      name: Typ vložky bowdenu kabelu
      description: Označuje, zda bowden obsahuje vnitřní vložku a/nebo lubrikační
        vrstvu, a také použitý materiál či technologii, což ovlivňuje snížení tření
        a odolnost proti povětrnostním vlivům.
    cable_management_type:
      name: Typ vedení kabelů
      description: Určuje typ vestavěných kabelových rozvodů nebo prvků pro správu
        napájení, které konferenční stůl nabízí.
    cable_surface_treatment:
      name: Povrchová úprava lanka
      description: Určuje jakýkoli speciální nátěr nebo povrchovou úpravu aplikovanou
        na lanko pro snížení tření nebo ochranu proti korozi.
    cabochon_back_type:
      name: Provedení zadní strany kabošonu
      description: Označuje profil/povrchovou úpravu zadní strany kabošonu, což ovlivňuje
        způsob fasování/lepení a kompatibilitu.
    cacao_bean_variety:
      name: Odrůda kakaových bobů
      description: Určuje botanickou odrůdu nebo kultivar použitého kakaového bobu.
    cacao_roast_level:
      name: Stupeň pražení kakaa
      description: Popisuje stupeň pražení kakaa před mletím.
    cage_package_type:
      name: Typ balení klece
      description: Definuje, které součásti jsou zahrnuty v nákupu (např. pouze síť,
        sada rámu, kompletní balení).
    cajon_body_shell_material:
      name: Materiál těla/korpusu cajonu
      description: Identifikuje materiál těla/skořepiny cajonu (s výjimkou tapy).
    cajon_corner_control_system:
      name: Systém ovládání rohů cajonu
      description: Určuje, zda cajon podporuje úpravu zvuku v rozích (např. pomocí
        rohových šroubů) pro změnu odezvy na slap.
    cajon_corner_edge_design:
      name: Konstrukce rohů/hran cajonu
      description: Popisuje konstrukci rohů/hran, která ovlivňuje pohodlí a herní
        vlastnosti.
    cajon_feet_type:
      name: Typ nožiček cajonu
      description: Určuje typ nožiček na cajonu, což ovlivňuje stabilitu a rezonanci
        nástroje.
    cajon_snare_adjustability:
      name: Nastavitelnost virblu cajonu
      description: Označuje, zda a jak lze upravit efekt virblu (napětí strunění,
        přítlak nebo obojí).
    cajon_snare_system_type:
      name: Typ virblového systému cajonu
      description: Určuje vnitřní strunění (snare mechanismus) použité k vytvoření
        efektu virblu.
    cake_shape:
      name: Tvar bábovky
      description: Popisuje fyzický tvar, ve které se kávová bábovka peče.
    cake_topping:
      name: Dortová poleva
      description: Identifikuje primární polevu nebo povrchovou úpravu aplikovanou
        na kávový dort.
    cake_type:
      name: Druh dortu
      description: Popisuje styl nebo druh dortu (např. třený, piškotový, tvarohový).
    caliper_mount_type:
      name: Typ uchycení třmenu
      description: Definuje standard uchycení na rámu nebo vidlici, který je v brzdovém
        třmenu využíván (např. Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Standard montáže brzdového třmenu
      description: Určuje montážní rozhraní/standard (např. Flat Mount, Post Mount,
        IS atd.) použitý k připevnění brzdového třmenu k rámu nebo vidlici jízdního
        kola.
    camera_mounting_location_vehicle_exterior:
      name: Místo montáže kamery (exteriér vozidla)
      description: Místo, kam mají být kamery na vozidle namontovány (např. přední
        mřížka, zadní část, boční zrcátka).
    camouflage_environment_type:
      name: Typ kamuflažního prostředí
      description: Označuje hlavní prostředí, pro které je maskáčový vzor určen, jako
        je les, poušť nebo bažina.
    camping_oil_application:
      name: Použití kempingového oleje
      description: Specifikuje hlavní zamýšlené použití oleje/paliva při kempování
        (např. palivo do luceren či palivo do vařičů).
    camshaft_construction:
      name: Konstrukce vačkového hřídele
      description: Označuje způsob výroby / typ polotovaru vačkového hřídele.
    camshaft_material:
      name: Materiál vačkového hřídele
      description: Označuje hlavní materiál jádra/hřídele vačkového hřídele (základní
        materiál).
    camshaft_position:
      name: Poloha vačkového hřídele
      description: Specifikuje zamýšlené umístění/typ vačkového hřídele v motoru (např.
        sací nebo výfukový, případně konkrétní řadu/polohu válců).
    candle_container_type_included:
      name: Typ přiložené nádoby na svíčku
      description: Určuje typ případných nádob na svíčky, které jsou součástí sady.
    candle_dye_form:
      name: Forma barviva na svíčky
      description: Určuje fyzikální formu barviva používaného při výrobě svíček.
    candle_fragrance_form:
      name: Forma vůně svíčky
      description: Určuje typ/formu vonné přísady určené pro výrobu svíček.
    candle_making_tool_type:
      name: Typ nástroje na výrobu svíček
      description: Určuje, o jaký druh nástroje pro výrobu svíček se produkt jedná
        (např. nalévací nádoba, nástroj pro centrování knotu, teploměr).
    candy_texture:
      name: Textura cukrovinek
      description: Popisuje pocit v ústech nebo konzistenci bonbónu nezávisle na chuti
        nebo tvaru.
    candying_method:
      name: Způsob kandování
      description: Popisuje, jak bylo ovoce kandováno nebo konzervováno cukrem (např.
        krystalizováno, glazováno, naloženo do sirupu).
    canned_meat_form:
      name: Forma konzervovaného masa
      description: Klasifikuje formu zpracování nebo prezentaci masa v balení.
    canoe_construction_type:
      name: Typ konstrukce kánoe
      description: Rozlišuje mezi styly konstrukce trupu kánoe, jako je pevná skořepina,
        nafukovací a skládací.
    canoe_hull_shape:
      name: Tvar trupu kánoe
      description: Definuje primární průřez trupu nebo profil dna, který ovlivňuje
        stabilitu a ovladatelnost.
    canoe_stern_design:
      name: Konstrukce zádí kánoe
      description: Definuje styl zádě trupu, což ovlivňuje kompatibilitu s motorem
        a ovladatelnost.
    canopy_type:
      name: Typ stříšky
      description: Popisuje styl stříšky nebo horního krytí, které je součástí plážové
        postele.
    canvas_compatible_media:
      name: Média kompatibilní s plátnem
      description: Označuje, pro jaká umělecká/řemeslná média je plátno určeno.
    canvas_format:
      name: Formát plátna
      description: Označuje, zda se tisknutelné plátno prodává v archích, rolích nebo
        jako předřezané panely.
    canvas_mounting_format:
      name: Montáž/formát plátna
      description: Fyzický formát/způsob montáže malířského plátna.
    canvas_stretcher_assembly_type:
      name: Typ montáže napínacího rámu na plátno
      description: Označuje, zda se napínací rám prodává již sestavený jako hotový
        rám, nebo jako samostatné lišty/sady, které je třeba smontovat.
    canvas_stretcher_corner_joint_type:
      name: Typ rohového spoje napínacího rámu plátna
      description: Jak jsou rohy napínacího rámu spojeny/konstruovány (např. čepový
        spoj, klínový spoj, sponkování, klínování).
    canvas_surface_tone:
      name: Tón povrchu plátna
      description: Základní tón/barva natřeného povrchu plátna (podkladu), nikoli
        potištěný design nebo vzor (např. bílá, černá, tónovaná).
    canvas_weave_type:
      name: Typ vazby plátna
      description: Popisuje strukturu vazby povrchu plátna, která ovlivňuje texturu
        a chování barvy.
    cap_attachment_style:
      name: Způsob uchycení víčka
      description: Určuje konstrukci/způsob uchycení krytky náustku saxofonu, což
        může ovlivnit ochranu a kompatibilitu s pouzdrem.
    cap_construction:
      name: Střih čepice
      description: Určuje, jak je paruka vyrobena (např. s krajkou vpředu, s celou
        krajkou, ručně vázaná), což ovlivňuje realismus, pohodlí a všestrannost stylingu.
    cap_crown_structure:
      name: Struktura koruny čepice
      description: Označuje, zda je koruna čepice strukturovaná (vyztužená), nebo
        nestrukturovaná (měkká).
    cap_fit_type:
      name: Typ uchycení čepice
      description: Označuje, jak kšiltovka sedí nebo se přizpůsobuje hlavě nositele
        (např. pevná velikost oproti upravitelné).
    cap_seal_type:
      name: Typ těsnění víčka
      description: Určuje těsnící prvek použitý k zabránění úniku oleje a výparů (např.
        O-kroužek, těsnění).
    cap_size:
      name: Velikost čepice
      description: Standardní označení velikosti, které udává celkovou velikost hlavy
        pro síťku paruky.
    cap_type:
      name: Typ uzávěru
      description: Typ uzávěru/víčka expanzní nádržky.
    caper_size_grade:
      name: Velikostní třída kaparů
      description: Klasifikuje kapary podle standardních názvů tříd v oboru, které
        odpovídají průměru poupát.
    capo_clamping_mechanism:
      name: Upínací mechanismus kapodastru
      description: Určuje způsob sevření/ovládání použitý k vyvíjení tlaku na struny
        (způsob ovládání kapodastru).
    capo_finish:
      name: Povrchová úprava kapodastru
      description: Popisuje povrchovou úpravu těla kapodastru (vzhled/omak) nezávisle
        na barvě (např. matná oproti lesklé).
    capo_fit_type:
      name: Typ uchycení kapodastru
      description: Určuje profil krku, pro který je kapodastr navržen (včetně poloměru/plochosti),
        což ovlivňuje bezhlučné upínání a intonaci.
    capo_pad_material:
      name: Materiál podložky kapodastru
      description: Určuje materiál kontaktní plošky, která se dotýká strun/hmataníku
        (ovlivňuje úchop, stabilitu ladění a možné poškození povrchové úpravy).
    capo_tension_mechanism:
      name: Mechanismus napínání kapodastru
      description: Specifikuje, jak se vyvíjí a upravuje tlak/přítlak na struny u
        posuvného kapodastru.
    capture_method:
      name: Způsob odchytu
      description: Označuje, zda je past určena k odchytu živého jedince nebo k jeho
        usmrcení.
    car_ev_conversion_kit_motor_type:
      name: Typ motoru sady pro přestavbu auta na elektromobil
      description: Určuje technologii trakčního motoru obsajenou nebo vyžadovanou
        v sadě pro přestavbu (např. asynchronní motor vs. synchronní motor s permanentními
        magnety).
    car_playset_items_included:
      name: Součásti hercí sady s autíčky
      description: Uvádí hlavní komponenty, které jsou součástí hercí sady s autíčky,
        nad rámec základní konstrukce (např. auta, figuráky, cedule).
    car_shampoo_application_method:
      name: Způsob aplikace autošamponu
      description: Popisuje, jakým způsobem se má šampon během mytí nanášet.
    car_wash_solution_form:
      name: Složení roztoku pro mytí aut
      description: Specifikuje fyzickou formu přípravku na mytí auta (např. tekutý,
        pěna, vlhčené ubrousky).
    car_wash_solution_scent:
      name: Parfemace přípravku na mytí auta
      description: Určuje vůni/parfemaci roztoku na mytí aut (pokud je parfémovaný).
    carbonated_water_variety:
      name: Druh perlivé vody
      description: Klasifikuje perlivou vodu na základě běžných druhů a složení (např.
        tonik, minerální voda, funkční perlivá voda).
    carbonation:
      name: Perlivost
      description: Popisuje úroveň nebo styl perlivosti nápoje (např. neperlivý, lehce
        perlivý, perlivý, nitro).
    carburetor_barrel_count:
      name: Počet komor karburátoru
      description: Označuje počet komor/hrdel karburátoru.
    carburetor_choke_type:
      name: Typ sytiče karburátoru
      description: Označuje způsob uvádění sytiče do chodu používaný karburátorem.
    carburetor_mounting_flange_type:
      name: Typ montážní příruby karburátoru
      description: Specifikuje styl montážního rozhraní karburátoru, aby bylo zajištěno
        napasování na sání/potrubí (např. nástrčné propojení oproti přírubě s otvory
        pro šrouby).
    card_binder_page_type:
      name: Typ stránek do pořadače na karty
      description: 'Pro pořadače/portfolia: styl stránek používaný k uchovávání karet.'
    card_box_holder_type:
      name: Typ krabičky/držáku na karty
      description: Určuje funkční provedení produktu pro sběr nebo uchovávání karet
        na události (např. krabice, schránka ve stylu poštovní schránky, košík, stojánek).
    card_game_accessory_features:
      name: Vlastnosti příslušenství pro karetní hry
      description: Významné funkční vlastnosti příslušenství pro karetní hry.
    card_lot_type:
      name: Typ sady karet
      description: Označuje, zda se jedná o jednu kartu nebo vícekartovou šarži/sortiment.
    card_sleeve_size_format_compatibility:
      name: Velikost obalů na karty / kompatibilita formátu
      description: Specifikuje velikost(i) karet, pro které jsou obaly/stránky alba/krabičky
        na herní balíčky navrženy.
    carding_surface_pin_material:
      name: Materiál hrotů mykacího povrchu
      description: Materiál hrotů/zubů používaných k rozvolňování a mykání vláken.
    care_durability:
      name: Odolnost symbolů údržby
      description: Označuje očekávanou odolnost štítku proti praní a teplu po jeho
        aplikaci.
    care_label_attachment_type:
      name: Typ upevnění štítku s pokyny k údržbě
      description: Způsob, jakým je štítek s pokyny k údržbě navržen pro aplikaci
        na položku (např. našití, nažehlení/termotransfer, nalepení).
    care_label_format:
      name: Formát štítku s pokyny k údržbě
      description: Fyzický/tištěný format štítku s pokyny k údržbě.
    care_label_symbol_system:
      name: Systém symbolů na štítku s pokyny k údržbě
      description: Sada norem/symbolů použitých na štítku (např. symboly údržby ISO
        či symboly ASTM/US).
    cargo_area_configuration:
      name: Konfigurace nákladového prostoru
      description: Specifikuje konstrukční styl nebo umístění nákladového prostoru
        na nákladním kole (např. longtail, přední nákladní kolo, tříkolka).
    cargo_net_adjustability:
      name: Nastavitelnost nákladové sítě
      description: Označuje, zda a jak lze nastavit napnutí/přizpůsobení nákladní
        sítě.
    cargo_net_position:
      name: Poloha nákladové sítě
      description: Kde v zavazadlovém/nákladním prostoru má být síť upevněna nebo
        jakou má plnit funkci.
    cargo_net_stretch_type:
      name: Typ roztažnosti sítě do zavazadlového prostoru
      description: Zda je síť do zavazadlového prostoru elastická/pružná nebo pevná/nepružná.
    cargo_net_style:
      name: Styl nákladové sítě
      description: Specifikuje konstrukční styl nebo provedení nákladní sítě (např.
        elastické lano, popruhovina, dělicí síť, síť, závěsná síť).
    cargo_rack_finish:
      name: Povrchová úprava nosiče nákladu
      description: Povrchová úprava / lakování vnějšího povrchu nákladního nosiče.
    carpet_cleaner_application_method:
      name: Způsob aplikace čističe na koberce
      description: Povrchová úprava nosiče nákladu
    carrier_style:
      name: Určuje zamýšlený způsob aplikace a zapracování produktu do koberce (nad
        rámec obecné formy).
      description: Styl nosiče
    carrot_size:
      name: Velikost mrkve
      description: Klasifikuje běžnou velikost mrkve.
    carrot_variety:
      name: Odrůda mrkve
      description: Identifikuje konkrétní odrůdu nebo kultivar mrkve.
    carrying_capacity_pairs_boards:
      name: Nosnost (lyže/snowboardy)
      description: Udává, kolik párů lyží nebo snowboardů příslušenství umožňuje nebo
        má nést při použití s nosičem (např. rozšiřující sady).
    cartridge_thread_compatibility:
      name: Kompatibilita závitu cartridge
      description: Označuje standard závitu, který vaporizér nebo baterie podporuje,
        což zajišťuje fyzickou kompatibilitu cartridgí a baterií.
    case_capacity_butts_shafts:
      name: Kapacita pouzdra (spodní díly × vršky)
      description: Definuje, kolik spodních dílů (butts) a vrchních dílů (shafts)
        tága se do pouzdra vejde, vyjádřeno ve formátu spodní díly x vrchní díly (např.
        2×4 = 2 spodní díly a 4 vrchní díly).
    case_features:
      name: Vlastnosti pouzdra
      description: Zdůrazňuje funkční vlastnosti pouzdra na činely/bicí soupravu související
        s ochranou a přepravou.
    case_humidifier_refill_type:
      name: Typ náplně zvlhčovače pouzdra
      description: Označuje, zda zvlhčovač používá opakovaně použitelná (znovu smáčivá/regenerovatelná)
        média nebo jednorázové vyměnitelné náplně.
    case_lining_material:
      name: Materiál výstelky pouzdra
      description: Označuje primární materiál, který tvoří podšívku pouzdra nebo povlaku,
        dotýká se nástroje nebo obsahu a chrání jej.
    case_material:
      name: Materiál pouzdra
      description: Identifikuje primární materiál pouzdra hodinek, který ovlivňuje
        trvanlivost, hmotnost a vzhled.
    case_mounting_method:
      name: Způsob montáže do pouzdra
      description: Popisuje, jak má být zvlhčovač umístěn nebo připevněn uvnitř pouzdra
        na hudební nástroj.
    case_structure:
      name: Konstrukce pouzdra
      description: Označuje tuhost konstrukce pouzdra.
    case_style_cymbal_drum:
      name: Typ pouzdra (činely/buben)
      description: Určuje, zda se jedná o měkký povlak, pevné pouzdro nebo hybridní
        provedení pro přepravu činelů nebo bicích sad.
    casing_material:
      name: Materiál pouzdra
      description: Označuje hlavní tkaninu použitou v kostře pneumatiky, což ovlivňuje
        její hmotnost, jízdní vlastnosti a ochranu proti propíchnutí.
    casino_set_chip_material:
      name: Materiál žetonů kasinové sady
      description: Hlavní materiál obsažených žetonů (pokud jsou součástí balení).
    casino_set_layout_included:
      name: Součástí je hrací plátno kasinové sady
      description: Určuje, jaký druh hrací plochy/rozvržení je součástí sady.
    cask_finish:
      name: Zrání v sudech
      description: Určuje sud nebo soudek použitý k dokončení nebo zrání lihoviny,
        například sud po bourbonu nebo soudek po sherry.
    cassava_variety:
      name: Odrůda manioku
      description: Identifikuje konkrétní kultivar nebo odrůdu nabízené juky/manioku,
        což ovlivňuje chuť, barvu a kulinářské vlastnosti.
    cassette_body_type:
      name: Typ těla kazety
      description: Standard ořechu (volnoběžného tělesa), který je kompatibilní se
        zadním nábojem nebo kolem (např. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Sada funkcí kazetového magnetofonu
      description: Označuje funkce pro přepravu a přehrávání kazet, které jsou běžné
        u kazetových přehrávačů zabudovaných do palubní desky.
    cassette_speed_compatibility:
      name: Kompatibilita rychlosti kazety
      description: Označuje počet rychlostí (např. 7 rychlostí, 12 rychlostí), pro
        který je kazeta nebo vícekolečko navrženo, což zajišťuje kompatibilitu řetězu,
        řazení a přehazovačky.
    castanet_shell_size_class:
      name: Velikostní třída mušlí kastanět
      description: Standardizovaná třída velikosti pro kastaněty, běžně používaná
        hráči/učiteli k výběru vhodné velikosti a tónu.
    castanets_included_pieces:
      name: Kastaněty součástí balení
      description: Označuje, co je součástí nabídky produktu (pár či jeden kus, případně
        s doplňky).
    castanets_pitch:
      name: Ladění kastanět
      description: Označuje běžné označení ladění/velikosti, které výrobci používají
        k popisu zvukového rozsahu.
    castanets_type:
      name: Typ kastanět
      description: Určuje styl kastanět nebo kategorii zamýšleného použití.
    caster_type:
      name: Typ otočného kolečka
      description: Identifikuje typ koleček nebo kol namontovaných na košíku (např.
        otočná, aretační), což informuje o manévrovatelnosti a stabilitě.
    castle_playset_included_items:
      name: Obsah balení herní sady s hradem
      description: Zachycuje hlavní komponenty, které jsou součástí herní sady hradu,
        takže nakupující mohou sady porovnávat (např. figurky, nábytek, vozidla, doplňky).
    catcher_equipment_included:
      name: Včetně vybavení pro chytače
      description: Určuje součásti vybavení chytače, jako je například chytařská helma
        nebo chránič hrudníku.
    catcher_helmet_style:
      name: Typ helmy pro chytače
      description: Označuje celkový designový styl ochranné pokrývky hlavy chytače.
    cattle_breed:
      name: Plemeno skotu
      description: Identifikuje plemeno skotu, ze kterého pochází hovězí maso (např.
        Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Odrůda květáku
      description: Označuje kultivar, barvu nebo speciální odrůdu prodávaného květáku.
    celery_form:
      name: Druh celeru
      description: Určuje fyzickou formu nebo způsob řezu, ve kterém se celer prodává.
    celery_variety:
      name: Odrůda celeru
      description: Označuje konkrétní kultivar nebo odrůdu celeru, což nakupujícím
        umožňuje výběr podle chuti, barvy nebo využití v kuchyni.
    cereal_bar_texture:
      name: Textura cereální tyčinky
      description: Popisuje pocit v ústech a konzistenci cereální tyčinky (např. žvýkací,
        křupavá).
    cereal_type:
      name: Typ obiloviny
      description: Klasifikuje tvar nebo formát cereálií či granoly (vločky, pufované
        cereálie, granolové shluky, müsli atd.), aby pomohl nakupujícím najít preferovanou
        texturu nebo způsob přípravy.
    certificate_border_style:
      name: Provedení okraje certifikátu
      description: Popisuje varianty ozdobného okraje použité na certifikátu.
    certificate_personalization_type:
      name: Typ personalizace certifikátu
      description: Určuje, jak lze certifikát personalizovat (prázdný pro rukopis,
        tisknutelná šablona, předtištěný s proměnnými poli atd.).
    certification_service:
      name: Certifikační služba
      description: Nezávislý subjekt provádějící hodnocení/certifikaci (je-li to relevantní).
    certification_standard:
      name: Certifikační standard
      description: Určuje certifikaci bezpečnosti a požární odolnosti nebo normu shody,
        kterou musí kukla splňovat.
    chain_coating_finish:
      name: Povrchová úprava/nátěr řetězu
      description: Specifikuje případnou povrchovou úpravu řetězu aplikovanou za účelem
        zvýšení odolnosti, snížení tření, prevence koroze nebo změny vzhledu (např.
        nitrid titanu, DLC, niklování, korozivzdorná úprava EPT).
    chain_connection_type:
      name: Typ spojení řetězu
      description: Specifikuje způsob uzavření, který je k dispozici nebo je nutný
        ke spojení konců řetězu.
    chain_tier_configuration:
      name: Konfigurace řad řetězu
      description: Určuje počet/uspořádání řetězových pater v záchytné sestavě (jednoduchá,
        dvojitá nebo trojitá).
    chain_tool_type:
      name: Druh nýtovačky
      description: Klasifikuje konkrétní druh nářadí na řetěz kola, takže nakupující
        dokáže rychle najít to správné zařízení.
    chainring_shape:
      name: Tvar převodníků
      description: Označuje tvar převodníku, například kulatý či oválný/eliptický.
    chair_accessories_included:
      name: Včetně příslušenství k židli
      description: Uvádí vestavěné nebo zahrnuté příslušenství, které vylepšuje funkčnost
        židle.
    chair_sash_care_instructions:
      name: Pokyny pro péči o šerpu na židli
      description: Popisuje doporučený způsob čištění/údržby šerpy na židli.
    chair_sash_finish:
      name: Povrchová úprava šerpy na židli
      description: Popisuje povrchový lesk/úpravu látky šerpy.
    chair_storage_design:
      name: Konstrukce úložného prostoru židle / možnost skladování židlí
      description: Označuje, jak má být závěsná židle skladována (např. skládací,
        stohovatelná, neskládací), aby zákazníci mohli lépe posoudit skladovatelnost
        a přenosnost.
    chaise_or_sectional_orientation:
      name: Orientace lehátka nebo sekčního prvku
      description: Určuje stranu, na které se nachází integrovaná lenoška nebo prodloužená
        sekce, když je otočena čelem k pohovce.
    chamber_size:
      name: Velikost komory
      description: Označuje velikost/objem komory nátrubku (hubičky), což ovlivňuje
        odpor a barvu tónu.
    chanter_finger_spacing:
      name: Rozteč prstů na melodické píšťale
      description: Označuje rozteč prstů/profil velikosti melodické píšťaly (často
        popisovaný jako standardní, malé ruce nebo velké ruce).
    chanter_type:
      name: Typ zpěvu
      description: Styl/konfigurace píšťaly (chanteru) dodávané s nástrojem (nebo
        používané nástrojem), např. otevřená, uzavřená, cvičná či osazená klapkami.
    chard_variety:
      name: Odrůda mangoldu
      description: Identifikuje konkrétní kultivar nebo barevnou variantu prodávaného
        mangoldu.
    charging_port_location:
      name: Umístění nabíjecího portu
      description: Fyzická poloha primárního externího nabíjecího portu vozidla (nabíjecí
        port).
    chassis_construction_type:
      name: Typ konstrukce podvozku
      description: Popisuje primární metodu konstrukce podvozku použitou pro vozidlo.
    checkbook_loading_orientation:
      name: Orientace vkládání šekové knížky
      description: Označuje, zda je obálka šekové knížky kompatibilní s formáty šeků
        s horním, bočním nebo univerzálním formátem.
    cheekpiece_style:
      name: Styl lícnice
      description: Definuje typ konfigurace lícnice/kroužku na udidle, která určuje
        účinek otěží a boční stabilitu.
    cheese_alternative_form:
      name: Alternativní forma sýra
      description: Určuje fyzickou formu nebo řez, ve kterém se alternativa sýra prodává.
    cheese_form:
      name: Sýrová forma
      description: Popisuje fyzickou formu sýrového produktu (např. bochník, blok,
        plátky, strouhaný).
    cheese_texture:
      name: Textura sýru
      description: Klasifikuje sýr podle jeho obecné textury nebo pevnosti.
    cheese_variety:
      name: Druh sýru
      description: Označuje druh sýru použitého jako hlavní ingredience v dané přesnídávce.
    cherimoya_variety:
      name: Odrůda čerimoje
      description: Identifikuje konkrétní kultivar/odrůdu cherimoyi (např. Fino de
        Jete, El Bumpo).
    cherry_variety:
      name: Odrůda třešní
      description: Určuje kultivar nebo odrůdu třešní, což pomáhá nakupujícím vybrat
        konkrétní druhy známé svou chutí, barvou, velikostí nebo zamýšleným kulinářským
        využitím.
    chest_pocket_style:
      name: Styl náprsní kapsy
      description: Určuje přítomnost a uspořádání náprsních kapes na košili.
    chewing_tobacco_form:
      name: Forma žvýkacího tabáku
      description: Označuje fyzickou formu, způsob řezu nebo velikost sáčku u žvýkacího
        tabáku (např. sypané listy, dlouhý řez, úzký sáček).
    chicory_variety:
      name: Odrůda čekanky
      description: Identifikuje konkrétní odrůdu nebo kultivar čekanky, která se prodává
        (např. Radicchio, belgická čekanka, endivie).
    chiffon_recommended_use:
      name: Doporučené použití šifonu
      description: Primární doporučené šicí/kreativní aplikace pro šifonovou látku.
    child_seat_accessory_type:
      name: Typ příslušenství pro dětskou sedačku
      description: Definuje konkrétní druh příslušenství nebo náhradního dílu pro
        dětskou sedačku (např. podsedák, opěrka nohou, montážní adaptér), což nakupujícím
        umožňuje rychle zúžit výběr na požadovanou položku bez vytváření mnoha mikrokategorií.
    child_seat_mounting_type:
      name: Typ montáže dětské sedačky
      description: Specifikuje, jak se dětská cyklosedačka připevňuje k rámu kola,
        nosiči nebo v oblasti řídítek.
    chime_sound_character:
      name: Druh zvuku
      description: Popisuje zamýšlenou barvu tónu zvonkohry.
    chin_cup_type:
      name: Typ podbradníku
      description: Určuje styl nebo konstrukci podbradníku, která ovlivňuje pohodlí
        a ochranu před nárazy.
    chin_strap_type:
      name: Typ zapínání pod bradou
      description: Určuje typ pásku pod bradu klobouku – žádný, pevný, nastavitelný
        nebo odnímatelný – aby se nakupujícím pomohlo vybrat styly, které zůstanou
        bezpečné ve větrném nebo aktivním počasí.
    china_cymbal_edge_shape:
      name: Tvar hrany čínských činelů
      description: Popisuje profil hrany/příruby typický pro čínské činely (jak je
        obrouček zahnutý nahoru), který ovlivňuje pocit a zvuk.
    china_cymbal_sound_character:
      name: Zvukový charakter čínských činelů
      description: Primární deskriptor zvuku/tonálního charakteru pro čínský činel
        používaný k vyhledávání a filtrování (např. brak, tmavý, jasný). Může platit
        více hodnot.
    chinstrap_type:
      name: Typ podbradníku
      description: Styl podbradního řemínku dodávaného s helmou.
    chip_cut_style:
      name: Typ řezu třísek
      description: Určuje fyzický řez nebo styl textury hranolků (např. rýhované,
        vařené v kotli, pražené).
    chip_denomination:
      name: Nominální hodnota čipu
      description: Které nominální hodnoty čipů jsou zahrnuty v sadě (vytištěné nebo
        přiřazené).
    chocolate_form:
      name: Čokoládová forma
      description: Popisuje fyzickou formu, ve které se čokoláda na pečení prodává.
    choy_sum_variety:
      name: Odrůda Choy sum
      description: Identifikuje konkrétní trh nebo botanickou odrůdu choy sum, která
        se prodává.
    cigar_wrapper_color:
      name: Barva obalu doutníku
      description: Standardní klasifikace barev krycího listu doutníku.
    cigarette_filter_type:
      name: Typ cigaretového filtru
      description: Určuje, zda má cigareta filtr, a pokud ano, konstrukci nebo zvláštní
        vlastnost tohoto filtru.
    cigarette_size:
      name: Velikost cigarety
      description: Klasifikuje cigarety podle standardní délky nebo formátu v oboru
        (např. king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Označení intenzity cigarety
      description: Marketingové označení toho, jak jsou cigarety silné, které značky
        tradičně používají k vyjádření intenzity dehtu/nikotinu (např. Light, Bold,
        Silver).
    cinch_liner_material:
      name: Materiál podšívky podbřišníku
      description: Označuje materiál použitý na podšívku nebo polstrování, které přiléhá
        přímo ke koni.
    circular_knitting_needle_cable_type:
      name: Typ lanka kruhových pletacích jehlic
      description: Materiál/chování a konstrukce kabelu (např. potažená ocel, nylon)
        ovlivňující paměť/tvorbu kliček a chování otočného závesu.
    circular_knitting_needles_tip_material:
      name: Materiál špiček kruhových pletacích jehlic
      description: Materiál dvou špiček jehlic (lišící se od materiálu spojovacího
        lanka).
    circumference_adjustment_mechanism:
      name: Mechanismus pro nastavení obvodu
      description: Mechanismus používaný k nastavení nebo uzamčení obvodu přadena.
    clamp_design:
      name: Konstrukce svorky
      description: Popisuje konstrukci nebo mechanismus svorky.
    clamp_sheet_music_clip_features:
      name: Funkce klipu na noty
      description: Funkční a ochranné vlastnosti upínacích klipů na noty (např. polstrování,
        protiskluzové, otočné).
    clamping_closure_type:
      name: Typ upínání/uzavírání
      description: Určuje mechanismus používaný k utažení nebo zajištění vyšívacího
        rámečku kolem látky.
    clarinet_bell_acoustic_design:
      name: Akustická konstrukce ozvučníku klarinetu
      description: Popisuje zvukový/odvětrávací design zvonu, jehož cílem je ovlivnit
        odezvu a intonaci.
    clarinet_bell_adjustment_mechanism:
      name: Mechanismus pro nastavení ozvučníku klarinetu
      description: Popisuje, jak se nastavuje délka/geometrie zvonu.
    clarinet_bell_ring_material:
      name: Materiál kroužku na klarinet
      description: Určuje materiál ochranného kroužku/pásu na ráfku klarinetu, pokud
        je přítomen.
    clarinet_bell_tuning_effect:
      name: Efekt zvonu na ladění klarinetu
      description: Označuje, jak je ozvučník navržen tak, aby ovlivňoval ladění/intonaci
        (zejména hrdelní tóny a spodní rejstřík) ve srovnání se standardním ozvučníkem.
    clarinet_body_type:
      name: Typ těla klarinetu
      description: Označuje primární typ konstrukce těla pro klarinet A.
    clarinet_bore_type:
      name: Typ otvoru pro klarinet
      description: Popisuje konstrukci otvoru altového klarinetu.
    clarinet_cap_style:
      name: Styl čepice pro klarinet
      description: Způsob konstrukce krytky dodávané s ligaturou klarinetu a/nebo
        samostatné krytky hubičky (např. obrácená nebo odvětrávaná).
    clarinet_care_kit_intended_use:
      name: Zamýšlené použití sady pro péči o klarinet
      description: Primární zamýšlený účel použití, pro který je sada navržena (např.
        rychlé každodenní vysoušení oproti hloubkovému čištění/údržbě).
    clarinet_included_accessories:
      name: Příslušenství dodávané s klarinetem
      description: Označuje, co je součástí balení u B klarinetu.
    clarinet_keywork_material:
      name: Materiál pro klávesy klarinetu
      description: Specifikuje materiál mechaniky (klapkového systému) klarinetu (např.
        mosaz, alpaka/nové stříbro, postříbřená mechanika).
    clarinet_keywork_plating:
      name: Pokovení klapek klarinetu
      description: Specifikuje pokovení/povrchovou úpravu mechaniky (klapky) klarinetu.
    clarinet_mouthpiece_baffle_profile:
      name: Vnitřní tvar hubičky klarinetu
      description: Popisuje vnitřní profil přepážky/střechy náustku klarinetu, který
        ovlivňuje jas a projekci zvuku.
    clarinet_mouthpiece_beak_shape:
      name: Tvar zobáčku hubičky klarinetu
      description: Určuje vnější profil/úhel zobáku pro pohodlí hráče a pocit z nátisku.
    clarinet_mouthpiece_chamber_size:
      name: Velikost komory náustku klarinetu
      description: Popisuje relativní velikost komory hubičky klarinetu (jak uvádí
        výrobce), která může ovlivňovat barvu zvuku a odpor při hře.
    clarinet_mouthpiece_intended_tone:
      name: Zamýšlený tón náustku pro klarinet
      description: Popisuje obecný zvukový charakter specifikovaný pro danou hubičku.
    clarinet_mouthpiece_player_level:
      name: Úroveň hráče na náustek pro klarinet
      description: Označuje typickou úroveň hráče, pro něhož je daná hubička určena.
    clarinet_reed_cut:
      name: Řez plátku pro klarinet
      description: Specifikuje řez/profil plátku (např. francouzský/s proužkem neboli
        filed oproti americkému/bez proužku neboli unfiled a další komerční styly
        řezu), což ovlivňuje odezvu a barvu tónu.
    clarinet_reed_material_type:
      name: Typ materiálu plátku pro klarinet
      description: Označuje, z čeho je rákos vyroben (rákosový vs. syntetický a běžné
        syntetické podtypy).
    clarinet_thumb_rest_type:
      name: Typ opěrky palce klarinetu
      description: Typ/vlastnost opěrky pravého palce.
    classical_guitar_string_3rd_string_type:
      name: Typ 3. struny pro klasickou kytaru
      description: Zda je struna G (3.) hladká (monofilní) nebo vinutá.
    classical_guitar_string_bass_winding_material:
      name: Materiál vinutí basové struny klasické kytary
      description: Materiál opředení/vinutí používaný na basových strunách (obvykle
        struny 4–6).
    classical_guitar_string_set_configuration:
      name: Konfigurace sady strun pro klasickou kytaru
      description: Označuje, zda jde o kompletní sadu, nebo konkrétní struny (obvykle
        pro melodickou neboli treble stranu, či basovou neboli bass stranu) pro klasickou
        kytaru.
    clay_modeling_dough_base_material:
      name: Základní materiál z hlíny a modelovacího těsta
      description: Primární formulace/základní typ modelovacího materiálu.
    clay_modeling_dough_curing_method:
      name: Metoda vytvrzování hlíny a modelovacího těsta
      description: Popisuje, jak materiál tuhne/tvrdne (nebo zda zůstává znovu použitelný),
        což určuje potřebné nástroje a typické případy použití.
    clay_paintability:
      name: Možnost malování hlíny
      description: Uvádí, zda lze vytvrzený hliněný povrch natřít a jaké typy barev
        se doporučují.
    clay_primary_composition:
      name: Primární složení jílu
      description: Hlavní základní materiál/pojivová složka samotvrdnoucí modelovací
        hmoty (např. na bázi papíru, na bázi minerálů).
    clay_shooting_discipline:
      name: Disciplína sportovní střelby na asfaltové holuby
      description: Označuje disciplínu nebo závod ve střelbě na asfaltové terče, pro
        které je produkt určen.
    cleaner_format:
      name: Forma čističe
      description: Balení/formát produktu čisticího prostředku na posuvníky.
    cleaner_sanitizer_intended_area:
      name: Prostor určený k použití čisticího/dezinfekčního prostředku
      description: Primární část žesťového nástroje, kterou je produkt určen k čištění/dezinfekci.
    cleaning_formula:
      name: Složení čisticího prostředku
      description: Udává hlavní chemickou kategorii určenou pro čištění/dezinfekci,
        do které produkt spadá (nikoli značku), což pomáhá zajistit bezpečnost, kompatibilitu
        a filtrování podle použití.
    cleaning_task_focus:
      name: Účel čištění
      description: Identifikuje primární problémy s čištěním, které má bezvodé mytí
        řešit.
    cleanup_method:
      name: Metoda čištění
      description: Určuje, jak má být lepidlo (za mokra) odstraněno z rukou/nářadí/povrchů.
    clear_glue_application_method:
      name: Metoda nanášení průhledného lepidla
      description: Určuje styl dávkování/aplikátoru, který je součástí balení průhledného
        lepidla.
    clear_glue_finish_after_drying:
      name: Povrchový vzhled průhledného lepidla (po zaschnutí)
      description: Popisuje vzhled lepidla po zaschnutí/vytvrzení (např. průzračně
        čisté či průsvitné, lesklé či matné).
    cleat_bolt_pattern:
      name: Rozteč šroubů hrotů golfových bot
      description: Určuje konfiguraci šroubů boty použitých k upevnění zarážky, která
        určuje kompatibilitu pedálů a bot (např. 2šroubové horské kolo vs. 3šroubové
        silniční kolo.
    cleat_compatibility:
      name: Kompatibilita s nášlapnými pedály
      description: Určuje, pro které pedálové nebo zarážkové systémy je návlek na
        botu určen.
    cleat_finish:
      name: Povrchová úprava klampy
      description: Určuje povrchovou úpravu/nátěr úchytu dok, která ovlivňuje odolnost
        proti korozi a vzhled.
    cleat_receptacle_system:
      name: Systém uchycení hrotů golfových bot
      description: Označuje kompatibilní rozhraní pro uchycení hrotů golfové obuvi.
    cleat_release_mechanism:
      name: Mechanismus uvolnění nášlapu
      description: Určuje, jak se zarážka jízdního kola odpojí od pedálu (např. jednostranné
        nebo vícesměrné uvolnění).
    cleat_stud_type:
      name: Typ golfového hrotu
      description: Určuje konstrukci nebo styl uchycení kolíků/kopávek na podrážce
        bot pro americký fotbal.
    climate_control_module_function:
      name: Funkce modulu klimatizace
      description: Určuje primární úlohu modulu v systému HVAC vozidla.
    climbing_hold_mounting_type:
      name: Typ upevnění lezeckého chytu
      description: Specifikuje způsob upevnění chytu na stěnu či tréninkovou desku
        (campus board).
    climbing_hold_type:
      name: Typ lezeckého chytu
      description: Kategorizuje tvar či druh chytu, který má vliv na způsob jeho úchopu.
    climbing_protection_device_type:
      name: Typ jistícího zařízení
      description: Určuje typ ochranného zařízení (např. vačka, matice, skoba), což
        pomáhá horolezcům rychle zúžit výběr správného vybavení pro daný skalní prvek
        nebo styl lezení.
    climbing_rope_middle_marking:
      name: Středové značení lezeckého lana
      description: Popisuje, jak je identifikován střed (a/nebo konce) lana, aby se
        usnadnilo bezpečné slanění a spouštění.
    climbing_rope_treatment:
      name: Ochranná úprava lezeckého lana
      description: Označuje jakoukoli vodoodpudivou, suchou nebo ochrannou povrchovou
        úpravu aplikovanou na plášť a/nebo jádro lana.
    climbing_rope_type:
      name: Typ lezeckého lana
      description: Klasifikuje lano podle certifikace UIAA a zamýšleného použití (např.
        dynamické jednoduché, poloviční, dvojité, statické lano či pomocná šňůra /
        „repka“), což nakupujícím umožňuje rychle najít správné lano pro jejich aktivitu.
    climbing_safety_certifications:
      name: Bezpečnostní certifikace pro horolezectví
      description: Uvádí lezecké a průmyslové bezpečnostní normy, které zařízení splňuje.
    clip_color:
      name: Barva klipu
      description: Primární barva klipu na noty.
    clip_mechanism_type:
      name: Typ mechanismu klipu
      description: Definuje mechanismus zapínání používaný u spon na peníze či peněženek
        se sponou na peníze (dolarovek), což pomáhá nakupujícím vybrat si mezi magnetickým
        mechanismem, odpruženou tyčinkou, páčkou či jinými druhy.
    clip_style:
      name: Styl klipu
      description: Označuje konkrétní mechanismus klipu použitý k připevnění držáku,
        což poskytuje informace o kompatibilitě (např. čelisťové uchycení či karabina).
    clipper_motor_technology:
      name: Technologie motoru zastřihovače
      description: Identifikuje konstrukci motoru použitého v zastřihovači, ovlivňující
        výkon, hlučnost, odolnost a údržbu.
    closet_configuration:
      name: Uspořádání šatny
      description: Definuje celkový tvar nebo rozvržení šatny (např. tvar L, tvar
        U, ostrůvek).
    closing_mechanism:
      name: Dovírací mechanismus
      description: Udává způsob zavírání zásuvky, např. standardní, s tlumeným dovíráním,
        se samozavíráním či s otevíráním stlačením.
    cloth_construction:
      name: Tkaninová konstrukce
      description: Označuje vazbu nebo povrchovou úpravu látky, která ovlivňuje rychlost
        a trvanlivost (např. česaná vs. vlněná).
    cloth_thickness:
      name: Tloušťka látky
      description: Označuje tloušťku/gramáž čisticího/lešticího hadříku.
    club_head_material:
      name: Materiál hlavy golfové hole
      description: Určuje hlavní materiál použitý při konstrukci hlavy hole.
    clutch_hydraulic_system_type:
      name: Typ hydraulického systému spojky
      description: Označuje kompatibilitu ovládání spojky / hydraulického systému
        (např. za účelem přestavby hydraulické spojky či spojky s ovládacím lankem).
    clutch_line_connection_type:
      name: Typ propojení spojkové linky
      description: Specifikuje koncovku/připojovací rozhraní použité na spojkovém
        vedení (důležité pro kompatibilitu s hlavním/pomocným spojkovým válcem a pevným
        potrubím).
    clutch_pressure_plate_actuation_type:
      name: Způsob ovládání přítlačné desky spojky
      description: Udává, zda je spojka uvolněna tlačným nebo tažným uvolňovacím mechanismem
        (ovládání talířovou pružinou).
    clutch_pressure_plate_release_mechanism_type:
      name: Typ mechanismu uvolnění přítlačné desky spojky
      description: Styl rozhraní pro uvolnění/ovládání používaného přítlačnou deskou.
    clutch_pressure_plate_surface_type:
      name: Typ povrchu přítlačného kotouče spojky
      description: Styl třecí kontaktní plochy přítlačné desky.
    clutch_slave_cylinder_connection_type:
      name: Typ připojení pomocného válce spojky
      description: Hydraulické rozhraní přípoje na sekundárním válci (závitový port,
        rychlospojka, banjo atd.).
    clutch_slave_cylinder_mounting_type:
      name: Typ montáže pomocného spojkového válce
      description: Způsob montáže pomocného válce k převodovce/skříni převodovky (např.
        šroubováním, zacvaknutím, integrovaným koncentrickým upevněním).
    coating_type:
      name: Typ povlaku
      description: Označuje jakoukoli polevu nebo glazuru aplikovanou na cereální
        tyčinku (např. čokoládovou, jogurtovou).
    cocking_mechanism:
      name: Natahovací mechanismus
      description: Určuje primární metodu nebo zařízení používané k natažení nebo
        uvolnění tětivy kuše.
    cocktail_garnish_form:
      name: Forma na ozdobu koktejlů
      description: Popisuje, jak je ozdoba prezentována/zpracována k použití (např.
        čerstvá vs. dehydrovaná).
    cocktail_mix_variety:
      name: Druh koktejlové směsi
      description: Označuje konkrétní koktejl, k jehož přípravě je směs určena (např.
        Margarita, Mojito, Piña colada).
    cocktail_napkin_features:
      name: Vlastnosti koktejlových ubrousků
      description: Vyzdvihuje funkční, praktické či ekologické vlastnosti koktejlových
        ubrousků.
    cocktail_pick_tip_style:
      name: Styl hrotu pro koktejly
      description: Popisuje tvar/prvek hrotu používaný k propíchnutí nebo uchycení
        ozdob.
    cocktail_pick_top_handle_style:
      name: Styl vršku/rukojeti párátka na koktejly
      description: Popisuje dekorativní zakončení či tvar rukojeti sloužící k uchopení
        či prezentaci.
    cocktail_type:
      name: Typ koktejlu
      description: Označuje konkrétní koktejlový recept či druh, který daný hotový
        produkt (premix) představuje (např. Margarita, Negroni, Piña colada).
    cocktail_umbrella_handle_pick_material:
      name: Materiál špejle koktejlového deštníčku
      description: Materiál tyčinky/hrotu (kromě baldachýnu) koktejlového slunečníku.
    cocoa_processing_method:
      name: Způsob zpracování kakaa
      description: Uvádí, jak byl kakaový prášek zpracován (např. přírodní, holandsky
        zpracované, černé kakao).
    cocoa_product_form:
      name: Forma kakaového výrobku
      description: Definuje fyzickou formu, ve které se kakaový produkt prodává.
    coconut_husk_status:
      name: Stav kokosových slupek
      description: Označuje rozsah, do jaké míry byl odstraněn vnější obal nebo skořápka
        kokosového ořechu, což ovlivňuje snadnost použití, skladování a odpad.
    coconut_maturity_stage:
      name: Stupeň zralosti kokosu
      description: Označuje fázi vývoje kokosového ořechu při sklizni, která zásadně
        ovlivňuje chuť, obsah vody a využití (např. na pití či na vaření).
    coconut_oil_refinement_type:
      name: Typ rafinace kokosového oleje
      description: Specifikuje stupeň rafinace či kvalitu kokosového oleje, např.
        panenský, rafinovaný, MCT, frakcionovaný.
    coconut_preparation_form:
      name: Forma na přípravu kokosu
      description: Specifikuje, jak je kokos fyzicky zpracován či nasekán (celý, plátky,
        strouhaný, pyré atd.), což nakupujícím pomáhá rychle najít druh potřebný pro
        recepty či svačinu.
    coffee_bean_species:
      name: Druhy kávových zrn
      description: Určuje druh kávových zrn použitých v produktu.
    coffee_beverage_variety:
      name: Druh kávového nápoje
      description: Klasifikuje kávové nápoje připravené k přímé konzumaci nebo míchané
        kávové nápoje podle stylu.
    coffee_processing_method:
      name: Způsob zpracování kávy
      description: Označuje techniku zpracování kávových zrn po sklizni.
    coil_material:
      name: Materiál cívky
      description: Určuje primární materiál nebo typ síťoviny použitý v topné spirále,
        ovlivňující chuť, životnost a kompatibilitu s regulací teploty.
    coil_spring_design:
      name: Konstrukce vinuté pružiny
      description: Specifikuje tuhost/tvarové provedení vinuté pružiny, které ovlivňuje
        jízdní vlastnosti.
    coil_spring_finish_coating:
      name: Povrchová úprava/potažení vinuté pružiny
      description: Povrchová úprava či potažení za účelem ochrany proti korozi.
    coil_spring_material:
      name: Materiál vinuté pružiny
      description: Hlavní materiál/složení vinuté pružiny.
    coil_system_type:
      name: Typ cívkového systému
      description: Údaj o specifickém cívkovém nebo pružinovém systému používaném
        v příslušných matracích, jako jsou kapsové pružiny nebo pružiny Bonnell.
    coil_type:
      name: Typ cívky
      description: Popisuje konstrukci nebo použitou technologii žhavící hlavy, ovlivňující
        produkci páry a chuť.
    coin_grade_numismatic:
      name: Zachovalost mince (numismatika)
      description: Standardizovaný stupeň zachovalosti mince (např. Sheldonova stupnice
        či slovní hodnocení).
    coin_strike_or_finish:
      name: Ražba mince nebo povrchová úprava
      description: Typ ražby nebo povrchová úprava mince (např. obchodní ražba, proof).
    coin_strike_type:
      name: Typ ražby mince
      description: Popisuje typ ražby/povrchové úpravy mince (např. proof, business
        strike).
    collar_style:
      name: Styl límce
      description: Definuje provedení límce či výstřihu na oděvu.
    collectible_gun_accessories_included:
      name: Součástí balení je sběratelské příslušenství ke zbraním
      description: Uvádí příslušenství a dokumentaci dodávanou se sběratelskou zbraní
        (např. pouzdro, vnitřní balení, bajonet, dokumentace).
    collectible_gun_firing_mechanism:
      name: Mechanismus střelby sběratelské zbraně
      description: Určuje typ mechanismu střelby/zapalování zbraně u sběratelských
        střelných zbraní (zejména starožitných a historických kusů).
    collectible_knife_blade_finish:
      name: Povrchová úprava čepele sběratelského nože
      description: Popisuje povrchovou úpravu/zpracování čepele z hlediska vzhledu
        (a někdy také odolnosti proti korozi).
    color_code_system:
      name: Systém kódování barev
      description: Identifikuje systém kódování barev použitý pro číselné označení
        barvy vlákna (např. DMC, Anchor), pokud je to relevantní.
    color_coding_standard:
      name: Standard kódování barev
      description: Označuje, zda se značka řídí mezinárodním kódem barev (např. IWF
        nebo IPF) nebo jiným schématem.
    color_effect:
      name: Barevné efekty
      description: Určuje speciální techniky nebo efekty barvení aplikované na prodloužení
        vlasů.
    color_family:
      name: Barevná kategorie
      description: Nadřazená kategorie barev pro sumi inkoust (užitečné, když je barva
        příliš zrnitá, např. teplá černá vs. modrá-černá).
    color_finish:
      name: Barevné provedení
      description: Určuje povrchovou úpravu viditelných součástí chrániče rukou (např.
        matná vs. lesklá), pokud samotná barva nestačí.
    coloring_finish:
      name: Povrchová úprava barvením
      description: Specifikuje vizuální efekt či speciální vzhled vytvořený zbarvením,
        jako je metalíza či neon.
    comb_material:
      name: Materiál hřebenu
      description: Materiál hřebenu harmoniky (těleso, které tvoří vzduchové komory).
    comb_type:
      name: Typ hřebenu
      description: Klasifikuje hřebeny pro péči o koně podle jejich primárního funkčního
        stylu (např. kovový kartáč, hřeben na hřívu, hřeben na vytahování), což pomáhá
        nakupujícím rychle najít ten správný nástroj pro specifické potřeby péče o
        koně.
    combat_shorts_cut_style:
      name: Střih bojových kraťasů
      description: Označuje střih nebo styl nošení specifický pro kraťasy pro bojové
        sporty (např. vysoký střih, retro střih, kompresní střih).
    comic_creator_role:
      name: Role tvůrce komiksu
      description: Určuje roli uvedeného tvůrce relevantní pro daný záznam (např.
        spisovatel, umělec).
    commemorative_coin_finish:
      name: Povrchová úprava pamětní mince
      description: Popisuje typ ražby/úpravy pamětní mince.
    commemorative_coin_mint_mark:
      name: Značka mincovny pamětní mince
      description: Označuje značku mincovny (nebo žádnou značku mincovny) na minci.
    commemorative_subject:
      name: Námět pamětní mince
      description: Hlavní předmět oslavy (událost, osoba, místo, výročí, organizace
        atd.).
    commercial_vehicle_class:
      name: Třída užitkových vozidel
      description: Regulační/průmyslová třída založená na GVWR používaná k popisu
        hmotnostní třídy užitkového vozidla pro prohlížení a filtrování.
    compass_damping_medium:
      name: Tlumicí médium kompasu
      description: Specifikuje médium použité ke stabilizaci pohybu střelky uvnitř
        kapsle kompasu.
    compass_illumination_type:
      name: Typ osvětlení kompasu
      description: Určuje, jak jsou značky kompasu viditelné při slabém osvětlení
        (např. luminiscenční barva, tritium, LED podsvícení).
    compass_mounting_style:
      name: Způsob upevnění kompasu
      description: Popisuje, jak se kompas přenáší, nosí nebo instaluje.
    compass_scale_units:
      name: Jednotky stupnice kompasu
      description: Označuje měrné jednotky (stupně, dílce či obojí) vyznačené na pouzdře
        kompasu.
    compatible_abs_system:
      name: Kompatibilní systém ABS
      description: Označuje, zda je hlavní brzdový válec určen pro vozidla vybavená
        systémem ABS.
    compatible_adapter_brand:
      name: Značka kompatibilního adaptéru
      description: Označuje značku hlavy golfové hole, pro jejíž adaptér je shaft
        předem nakonfigurován.
    compatible_airbag_system_type:
      name: Kompatibilní typ systému airbagů
      description: Označuje generaci/sadu funkcí systému airbagů, se kterou je díl
        kompatibilní (např. jednostupňový vs. dvoustupňový).
    compatible_amplifier_fit_method:
      name: Kompatibilní metoda přizpůsobení zesilovače
      description: Označuje, jak je definována kompatibilita krytu či pouzdra (univerzální
        velikost či pro konkrétní model nebo podle rozměrů).
    compatible_apparatus:
      name: Kompatibilní zařízení
      description: Určuje gymnastické náčiní nebo aktivitu, pro kterou jsou úchopy
        určeny.
    compatible_archery_tool:
      name: Kompatibilní lukostřelecká pomůcka
      description: Označuje hlavní lukostřeleckou pomůcku či část vybavení, pro které
        je příslušenství určeno.
    compatible_axle_size:
      name: Kompatibilní velikost nápravy
      description: Specifikuje průměr náboje/osy či standard závitu, pro který je
        stupačka (pecka) určena (např. 10 mm / 3/8 palce, 14 mm, 3/8 palce s 26 TPI).
    compatible_axle_type:
      name: Typ kompatibilní nápravy
      description: Identifikuje standard(y) uchycení zadní nápravy u trenažéru, například
        rychloupínací osa nebo průběžná osa.
    compatible_axle_weight_rating:
      name: Kompatibilní hmotnostní kategorie osy
      description: Určuje jmenovité zatížení nápravy přívěsu (kapacita na nápravu),
        pro které je brzdová sestava přívěsu navržena.
    compatible_bait_type:
      name: Kompatibilní typ návnady
      description: Identifikuje typy rybářských návnad, se kterými je vrták kompatibilní,
        aby si rybáři mohli vybrat nástroj, který odpovídá jejich preferované návnadě.
    compatible_bass_scale_length:
      name: Kompatibilní mensura baskytary
      description: Označuje délku(y) menzury basu, pro které je sada strun určena
        (důležité pro správnou délku vinutí a usazení).
    compatible_battle_top_system:
      name: Kompatibilní systém bojových káčí
      description: Identifikuje ekosystém produktů nebo sérii, pro kterou je top navržen
        (používá se k zajištění kompatibility dílů a arény).
    compatible_bb_size:
      name: Kompatibilní velikost BB
      description: Označuje průměr airsoftových diabolek, které produkt podporuje.
    compatible_bed_frame_style:
      name: Kompatibilní model rámu postele
      description: Určuje styl postele nebo rámu, pro který je příslušenství navrženo.
    compatible_bicycle_tire_type:
      name: Kompatibilní typ pneumatiky pro jízdní kola
      description: Specifikuje, které typy cyklistických plášťů lze pomocí produktu
        opravit či utěsnit.
    compatible_bike_component:
      name: Kompatibilní komponent jízdního kola
      description: Specifikuje, k údržbě kterého komponentu jízdního kola je nástroj
        či produkt určen.
    compatible_billiard_game:
      name: Kompatibilní kulečníková hra
      description: Identifikuje formát(y) kulečníkové hry, pro který je regál navržen,
        aby zákazníci vybrali regál, který odpovídá jejich hře.
    compatible_billiard_table_size:
      name: Kompatibilní velikost kulečníkového stolu
      description: Určuje standardní délku(y) stolu, pro kterou je kryt navržen, a
        zajišťuje tak, aby si nakupující vybrali kryt správné velikosti pro svůj kulečníkový
        stůl.
    compatible_bit_type:
      name: Kompatibilní typ bitu
      description: Typy udidel, se kterými lze chránič použít.
    compatible_blade_hosel:
      name: Kompatibilní krček čepele
      description: Označuje, na který typ krčku/kuželu čepele lze shaft nasadit, což
        zajišťuje, že shaft a čepel do sebe správně zapadnou.
    compatible_blade_system:
      name: Kompatibilní systém čepelí
      description: Označuje systém/formát náhradní čepele, který nůž akceptuje (např.
        standardní hobby č. 11, odlamovací segmentové čepele).
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibilní tkalcovský stav pro člunek
      description: Pro jaké typy tkalcovských stavů je člunek určen.
    compatible_bobbin_type:
      name: Kompatibilní typ cívky
      description: Označuje, pro jaký typ cívky/špulky je člunek určen.
    compatible_bottle_mouth:
      name: Kompatibilní hrdlo lahve
      description: Typ či průměr hrdla lahve, pro které je brčko či uzávěr určen.
    compatible_bow_attachment_system:
      name: Kompatibilní systém uchycení luku
      description: Označuje rozhraní končetiny nebo příslušenství, pro které je součást
        navržena (např. ILF, šroubové uchycení, rychlospojka).
    compatible_bow_crossbow_type:
      name: Kompatibilní typ luku/kuše
      description: Označuje styl luku či kuše, pro které je příslušenství určeno.
    compatible_brake_fluid:
      name: Kompatibilní brzdová kapalina
      description: Specifikace DOT brzdové kapaliny, se kterými jsou těsnění/materiály
        hlavního válce kompatibilní.
    compatible_brake_pad:
      name: Kompatibilní brzdové destičky
      description: Označuje, pro které směsi brzdových destiček je kotouč schválen,
        což zajišťuje bezpečnost a optimální opotřebení.
    compatible_brake_service_system:
      name: Kompatibilní systém údržby brzd
      description: Specifikuje, zda je díl určen pro kotoučové brzdy, bubnové brzdy
        či obojí.
    compatible_brake_system:
      name: Kompatibilní brzdový systém
      description: Specifikuje klíčové poznámky ke kompatibilitě systému s použitím
        brzdové kapaliny.
    compatible_brake_type:
      name: Kompatibilní typ brzd
      description: Specifikuje typ brzd, se kterými je nosič kompatibilní, jako jsou
        kotoučové či ráfkové.
    compatible_brass_instrument_finish:
      name: Povrchová úprava vhodná pro žesťové nástroje
      description: Určuje, na které povrchové úpravy žesťových nástrojů je čistič
        bezpečný, aniž by došlo k poškození povrchové úpravy.
    compatible_building_toy_system:
      name: Kompatibilní systém stavebnic
      description: Označuje, s jakým stavebním systémem/standardem je hračka kompatibilní
        (nebo ekvivalentní velikost), například „kompatibilní s LEGO“ nebo „chráněný“.
    compatible_capo_fretboard_radius:
      name: Kompatibilní rádius hmatníku pro kapodastr
      description: Určuje poloměr/profil hmatníku, pro který je kapodátoř navržena
        pro optimální kontakt a stabilitu ladění.
    compatible_capo_number_of_strings:
      name: Kompatibilní kapodastr počet strun
      description: Udává, na kolik strun je kapodastr určen k upnutí (použitelné pro
        6-, 7-, 8-, 12-strunové a speciální nástroje).
    compatible_cardio_machine_type:
      name: Typ kompatibilního kardio stroje
      description: Označuje typ kardio trenažéru, pro který je příslušenství či díl
        určen.
    compatible_chain_link_type:
      name: Kompatibilní typ řetězového článku
      description: Identifikuje styl řetězového článku, který nástroj podporuje (standardní,
        poloviční článek, rychlý článek atd.).
    compatible_chain_size:
      name: Kompatibilní velikost řetězu
      description: Specifikuje standardy šířky či rozteče řetězu (např. 1/8 palce,
        3/32 palce), pro které lze nástroj používat.
    compatible_chain_width:
      name: Kompatibilní šířka řetězu
      description: Označuje velikosti řetězů, pro které je volnoběžka určena.
    compatible_chip_denomination:
      name: Kompatibilní nominální hodnota čipu
      description: Označuje, které nominální hodnoty čipů mají v zásobníku/pouzdru
        označené nebo vyhrazené přihrádky (nebo pro jejichž uspořádání je určeno).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatibilní ligatura pro náustek pro klarinet
      description: Označuje standard velikosti ligatury či poznámky k její kompatibilitě
        s hubičkou.
    compatible_classical_guitar_string_scale_length:
      name: Kompatibilní délka menzury strun klasické kytary
      description: Zamýšlená mensura kytary či kompatibilní délka strun pro danou
        sadu.
    compatible_clay_target_size:
      name: Kompatibilní velikost hliněného terče
      description: Označuje velikosti či tvary hliněných/asfaltových terčů (holubů),
        které vrhačka dokáže pojmout pro správné usazení a výkon.
    compatible_cleat_system:
      name: Kompatibilní systém nášlapů
      description: Určuje rozhraní zarážek nebo rozteč šroubů podpory pedálu, aby
        si jezdci mohli přizpůsobit své boty správnému systému.
    compatible_clipless_pedal_system:
      name: Kompatibilní systém nášlapných pedálů
      description: Identifikuje konkrétní standard bezklipových pedálů/zarážek, pro
        který je produkt navržen.
    compatible_clutch_type:
      name: Kompatibilní typ spojky
      description: Kompatibilita rozhraní spojky pro setrvačník (kde je to použitelné).
    compatible_coffee_pod_system:
      name: Kompatibilní systém kávových kapslí
      description: Určuje kávovar nebo spařovací systém, pro který jsou pody nebo
        kapsle určeny.
    compatible_construction_set_system:
      name: Kompatibilní systém stavebnice
      description: Označuje, se kterým stavebním systémem/ekosystémem značky je sada
        kompatibilní (např. kompatibilní s LEGO, kompatibilní s DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibilní bodec či stojan pro kontrabasový klarinet
      description: Označuje požadované rozhraní stojanu/kolíku nebo styl podpory.
    compatible_coolant_chemistry:
      name: Kompatibilní chemické složení chladicí kapaliny
      description: Určuje, se kterými skupinami chladicích kapalin je přísada kompatibilní.
    compatible_cooling_system_material:
      name: Materiál kompatibilního chladicího systému
      description: Určuje, pro které chladicí systémy/materiály je proplach chladiče
        bezpečný (např. hliníkové radiátory, systémy se smíšenými kovy).
    compatible_crib_format:
      name: Kompatibilní formát pro dětskou postýlku
      description: Definuje obecnou velikost nebo kategorii tvaru matrace nebo prostěradla,
        pro které je doplněk navržen.
    compatible_cross_stitch_fabric_count:
      name: Kompatibilní počet látek pro křížkový steh
      description: Doporučené hustoty látky pro vyšívání vzoru.
    compatible_cross_stitch_frame:
      name: Kompatibilní rám pro křížkový steh
      description: Označuje, k čemu je rám určen (ruční použití, stolní stojan, podlahový
        stojan nebo univerzální).
    compatible_crossbar:
      name: Kompatibilní příčka
      description: Kompatibilita regálu s příčníky střešního nosiče vozidla (pokud
        jsou montovány na střechu), včetně tvarů/profilových norem příčníků.
    compatible_cycling_cleat:
      name: Kompatibilní cyklistické zarážky
      description: Určuje systém zarážek nebo pedálů, pro který jsou cyklistické boty
        navrženy.
    compatible_cymbal_size:
      name: Vhodná velikost činelů
      description: Určuje zamýšlený (nebo maximální) průměr činelu, na který je pouzdro
        navrženo; jedná se o kompatibilitu velikosti činelu, nikoli vnějšího průměru
        pouzdra.
    compatible_device_type:
      name: Typ kompatibilního zařízení
      description: Označuje, pro jaký druh zařízení je držák určen (např. monitor/TV,
        tablet, chytrý telefon, přenosný DVD přehrávač).
    compatible_dock_structure_type:
      name: Kompatibilní typ struktury dok
      description: Konstrukce mola, k jejímuž namontování jsou schůdky určeny.
    compatible_dough_type:
      name: Vhodný typ těsta
      description: Určuje, s jakými typy/značkami těsta jsou nástroje určeny k práci
        (např. standardní plastelína, modelovací hlína).
    compatible_drawing_ink_surface:
      name: Kompatibilní povrch pro kreslicí tuš
      description: Označuje doporučené povrchy/podklady pro dosažení nejlepší výkonnosti.
    compatible_drivetrain_brand:
      name: Značka kompatibilního pohonu
      description: Označuje značky hnacího ústrojí či brzdového systému, pro které
        je lanko určeno.
    compatible_drivetrain_speeds:
      name: Kompatibilní rychlosti hnacího ústrojí
      description: Určuje počet rychlostí hnacího ústrojí (např. 10 rychlostí) pro
        kliky nebo převodníky.
    compatible_equipment:
      name: Kompatibilní zařízení
      description: Určuje typ zimního sportovního vybavení, pro které je svěrák určen.
    compatible_evap_system:
      name: Kompatibilní systém EVAP
      description: Označuje, zda je víčko palivové nádrže navrženo tak, aby splňovalo
        požadavky systému EVAP (např. těsnění dle specifikace OEM) a omezilo rozsvícení
        kontrolek motoru.
    compatible_exercise_bike_style:
      name: Kompatibilní styl rotopedu
      description: Označuje, pro které modely rotopedů jsou příslušenství či náhradní
        díl určeny.
    compatible_fencing_weapon:
      name: Kompatibilní šermířská zbraň
      description: Specifikuje, pro kterou šermířskou zbraň či disciplínu je bunda
        nebo lamé určeno.
    compatible_fiber_type:
      name: Kompatibilní typ optického vlákna
      description: Primární typy vláken, které má bubnový česač efektivně zpracovávat.
    compatible_fin_box_system:
      name: Kompatibilní systém uchycení ploutví
      description: Identifikuje box na ploutve nebo montážní systém, pro který je
        ploutev navržena, což pomáhá surfařům nakupovat ploutve kompatibilní s jejich
        surfovacím prknem (např. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Kompatibilní poloměr hmatníku
      description: Určuje poloměr hmatníku (plochý, zakřivený nebo složený), pro který
        je kapodastr navržen pro rovnoměrný přítlak a snížení bzučení.
    compatible_finish_type:
      name: Kompatibilní typ povrchové úpravy
      description: Označuje typy povrchových úprav nástrojů, pro které je sprej deklarován
        jako bezpečný.
    compatible_fishing_reel_type:
      name: Kompatibilní typ rybářského navijáku
      description: Specifikuje typ rybářského navijáku, pro který je příslušenství
        určeno či se kterým je zkombinovatelné (např. smekací, multiplikátor, muškařský).
    compatible_fly_line_weight:
      name: Kompatibilní hmotnostní třída muškařské šňůry
      description: Označuje hmotnostní třídy muškařských šňůr AFTMA, pro které je
        cívka určena.
    compatible_flywheel_type:
      name: Kompatibilní typ setrvačníku
      description: Určuje typ setrvačníku, pro který je určena přítlačná deska spojky.
    compatible_football_kick_type:
      name: Kompatibilní typ kopu (americký fotbal)
      description: Identifikuje kopové situace, pro které je produkt navržen (např.
        výkop, field goal), a pomáhá sportovcům rychle najít vhodné vybavení.
    compatible_fuel_system_type:
      name: Typ kompatibilního palivového systému
      description: Určuje systém přívodu paliva, pro který je čistič určen.
    compatible_gas_type:
      name: Kompatibilní typ plynu
      description: Označuje typ stlačeného plynu, pro který je vzduchová láhev na
        paintball určena.
    compatible_gel_wax_additives:
      name: Kompatibilní přísady do gelového vosku
      description: Určuje, které typy přísad jsou kompatibilní s tímto gelovým voskem
        (např. typ barviva, vložené).
    compatible_glaze_layering:
      name: Kompatibilní vrstvení glazury
      description: Zda je glazura určena k vrstvení s jinými glazurami za účelem dosažení
        různých efektů.
    compatible_golf_bag_type:
      name: Kompatibilní typy golfových tašek
      description: Označuje, pro které formáty golfových bagů jsou kryt či pouzdro
        určeny.
    compatible_ground_polarity:
      name: Kompatibilní polarita uzemnění
      description: Označuje, zda je regulátor napětí určen pro elektrické systémy
        vozidel s ukostřeným záporným pólem či kladným pólem (nebo zda není citlivý
        na polaritu).
    compatible_guitar_body_shape:
      name: Kompatibilní tvar těla kytary
      description: Označuje, pro jaký tvar/typ korpusu kytary je pouzdro určeno.
    compatible_guitar_case:
      name: Kompatibilní kytarové pouzdro
      description: Určuje, pro které styly kytarových pouzder je zvlhčovač navržen
        a pro které správně funguje.
    compatible_guitar_scale_length:
      name: Kompatibilní menzura kytary
      description: Udává, na jakou délku menzury kytary má sada strun sedět (na základě
        délky vinutí/celkové délky).
    compatible_gun_platform:
      name: Kompatibilní platforma pro zbraně
      description: Určuje operační platformu nebo zdroj napájení, se kterým je produkt
        kompatibilní (např. AEG, GBB, HPA).
    compatible_hair_length:
      name: Kompatibilní délka vlasů
      description: Určuje maximální délku nebo objem vlasů, který pokrývka hlavy pohodlně
        pojme.
    compatible_head_and_neck_restraint_system:
      name: Kompatibilní zádržný systém hlavy a krku
      description: Označuje, zda helma obsahuje kotvicí body a/nebo je kompatibilní
        se systémy pro uchycení hlavy a krku (např. HANS), včetně stavu začlenění/instalace
        kotvicích sloupků.
    compatible_helmet_certification_standard:
      name: Kompatibilní certifikační standard přilby
      description: Označuje jakoukoli bezpečnostní normu nebo certifikační kontext
        přilby, ve kterém je příslušenství navrženo k podpoře (např. odtrhávací pásky
        pro závodní použití často odkazují na specifická sankční pravidla).
    compatible_helmet_shell_size:
      name: Kompatibilní velikost skořepiny přilby
      description: Označuje, pro kterou velikost skořepiny helmy se náhradní vnitřní
        díl hodí (velikost skořepiny se často vztahuje k rozsahům velikostí, jako
        například XS–S, M, L–XL).
    compatible_helmet_size:
      name: Vhodná velikost helmy
      description: Označuje velikost helmy, se kterou je maska kompatibilní.
    compatible_helmet_type:
      name: Kompatibilní typy helem
      description: Kategorie přileb, pro kterou je navržena podpora krku.
    compatible_hitch_receiver_size:
      name: Kompatibilní velikost přijímače tažného zařízení
      description: Velikost otvoru přijímače tažného zařízení, na který je příslušenství
        navrženo (pro standardní příslušenství montované na tažné zařízení).
    compatible_hook_size:
      name: Vhodná velikost háčku
      description: Systém(y) velikostí háčků pro háčkování a/nebo velikostní rozsah,
        na který je organizér navržen (např. velikosti US písmen/číslic, metrický
        rozsah v mm).
    compatible_horse_coat_type:
      name: Kompatibilní typ srsti koně
      description: Určuje vlastnosti srsti koně, pro které je daný odchlupovač nejvhodnější
        (např. hustá zimní srst nebo citlivá srst).
    compatible_host_platform:
      name: Kompatibilní hostitelská platforma
      description: Určuje, se kterými hostovanými platformami nebo typy zařízení je
        pad ovladač kompatibilní (např. Windows, macOS, iOS, Android) nebo zda může
        fungovat samostatně bez počítače.
    compatible_inflation_gas:
      name: Kompatibilní nafukovací plyn
      description: Specifikuje, čím se má balonek nafouknout (vzduchem, heliem či
        obojím).
    compatible_injection_type:
      name: Kompatibilní typ vstřikování
      description: Označuje, k čištění jakého systému vstřikování paliva je produkt
        určen.
    compatible_instrument_surface_material:
      name: Kompatibilní povrch/materiál nástroje
      description: Označuje, na které povrchy/materiály nástrojů je leštidlo určeno
        k použití.
    compatible_intercom_system:
      name: Kompatibilní systém intercom
      description: Označuje připravenost/kompatibilitu helmy pro montáž nebo instalaci
        interkomového/komunikačního systému helmy.
    compatible_interior_material:
      name: Kompatibilní materiál pro vnitřní použití
      description: Označuje, pro které materiály interiéru vozidla je odstraňovač
        skvrn bezpečný či účinný (např. koberec, látkové čalounění, kůže, vinyl).
    compatible_kayak_type:
      name: Kompatibilní s typem kajaku
      description: Označuje obecné styly kajaků, k jejichž namontování je plachtová
        sada určena.
    compatible_license_plate_hole_pattern:
      name: Kompatibilní vzor otvorů pro registrační značku
      description: Určuje konfiguraci montážních otvorů podporovaných držákem/montážní
        deskou (na straně vozidla a/nebo na straně desky).
    compatible_license_plate_size:
      name: Kompatibilní velikost registrační značky
      description: Označuje regionální či rozměrové velikosti registračních značek
        (SPZ), pro které je držák určen.
    compatible_loom:
      name: Kompatibilní tkalcovský stav
      description: Specifikuje typy tkalcovských stavů, pro které je ploché tkalcovské
        bidlo určeno.
    compatible_loom_type:
      name: Kompatibilní typ svazku vodičů
      description: Označuje uspořádání tkalcovského stavu, pro které je bidlo určeno
        (např. hřebenové stavy vs. gobelínové stavy).
    compatible_machine_type:
      name: Kompatibilní typ stroje
      description: Označuje, pro jaký typ uspořádání je prošívací rám určen (pouze
        ruční prošívání, domácí šicí stroj či dlouhoramenný prošívací stroj).
    compatible_mast_type:
      name: Kompatibilní typ stožáru
      description: 'Specifikuje, pro které průměry stěžňů je plachta určena: zmenšený
        průměr (RDM), standardní průměr (SDM) či oba.'
    compatible_model_system_train_scale:
      name: Kompatibilní modelový systém (škálování vlaků)
      description: Specifikuje měřítko/systém modelové železnice, pro které je příslušenství
        vhodné (např. H0, N, O).
    compatible_mounting_surface:
      name: Kompatibilní montážní povrch
      description: Zamýšlený povrch či předmět, k jehož přichycení je klip určen.
    compatible_mouthpiece_patch:
      name: Kompatibilní náplast na náustek
      description: Označuje, zda je hubička určena pro použití s polštářky/nálepkami
        na hubičku a doporučený rozsah tloušťky těchto nálepek.
    compatible_mouthpiece_type:
      name: Typ kompatibilního náustku
      description: Označuje, pro jaký typ náustku/dřík je melofon určen (obvykle přijímače
        ve stylu lesního rohu nebo trubky v závislosti na modelu).
    compatible_neck_profile_width:
      name: Kompatibilní profil/šířka krku
      description: Označuje třídu profilu/šířky krku kytary, pro kterou je kapodastr
        určen (např. úzký pro elektrickou kytaru či široký pro klasickou kytaru).
    compatible_needle_size:
      name: Vhodná velikost jehly
      description: Označuje velikosti/typy jehel, pro které je pouzdro určeno (např.
        vyšívací, gobelínové, délky jehel pro ruční šití).
    compatible_needle_system:
      name: Kompatibilní systém jehel
      description: Systém (systémy) jehel, se kterými je stroj kompatibilní (např.
        130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibilní mechanismus parkovací brzdy
      description: Označuje, zda je brzdový třmen určen k použití s integrovaným mechanismem
        parkovací brzdy.
    compatible_pedal_instrument_type:
      name: Kompatibilní typ pedálového nástroje
      description: Určuje, k čemu je pedál určen (např. digitální piano, klávesy/syntezátor,
        MIDI ovladač).
    compatible_pedal_type:
      name: Kompatibilní typ pedálu
      description: Označuje styl nebo systém pedálů, pro který je popruh nebo klip
        navržen (např. platforma, SPD, Look Keo).
    compatible_pin_type:
      name: Kompatibilní typ konektoru
      description: S jakým typem kolíků má být podložka používána (nebo zda je možné
        ji ukotvit kolíky).
    compatible_pipe_filter_size:
      name: Kompatibilní velikost potrubního filtru
      description: Označuje velikost nebo typ filtru, pro který je dýmka navržena
        (nebo že filtr není vyžadován).
    compatible_plate_size:
      name: Vhodná velikost desky
      description: Rozměry či standardizované velikosti balistických plátů, které
        vesta dokáže pojmout.
    compatible_play_vehicle_scale:
      name: Měřítko kompatibilních autíček
      description: Označuje měřítko hračky, pro které je příslušenství navrženo (např.
        1:64), což zlepšuje kompatibilitu/vhodnost pro sběratele a sledovací systémy.
    compatible_playing_surface:
      name: Vhodný povrch pro hru
      description: Označuje typ hrací plochy nebo povrchu, pro který jsou americké
        fotbalové boty určeny.
    compatible_pole_dimensions:
      name: Kompatibilní rozměry pólů
      description: Specifikuje velikost průřezu tyče/sloupu, pro kterou je příslušenství
        vhodné.
    compatible_pole_shape:
      name: Kompatibilní tvar tyče
      description: Určuje tvar průřezu sloupu nebo sloupce, na který je výplň/polstrování
        navrženo.
    compatible_power_steering_system:
      name: Kompatibilní systém posilovače řízení
      description: Označuje typ(y) systému řízení, pro který(é) je kapalina určena.
    compatible_powerplant_type:
      name: Kompatibilní typ pohonné jednotky
      description: Označuje systém pohonu vzduchové zbraně, pro který je díl určen
        (např. pružina-píst, CO2, PCP).
    compatible_presser_foot:
      name: Kompatibilní přítlačná patka
      description: Specifikuje systém uchycení/kompatibility přítlačné patky podporovaný
        šicím strojem (např. rychloupínací vs. šroubovací; nízký/vysoký/šikmý dřík).
        Pokud je podporováno více systémů nebo jsou součástí dodávky adaptéry, použijte
        „univerzální/vícečetné“.
    compatible_protective_gear:
      name: Kompatibilní ochranná výstroj
      description: Určuje, s jakými dalšími ochrannými prostředky je krční ortéza
        určena k použití.
    compatible_protective_gear_integration:
      name: Integrace kompatibilních ochranných pomůcek
      description: Popisuje, jak má být chránič nošen nebo integrován s jiným vybavením
        (např. vložená kapsa, samostatný popruh).
    compatible_punching_bag_type:
      name: Kompatibilní typ boxovacího pytle
      description: Určuje, se kterými typy boxovacích nebo tréninkových pytlů je produkt
        kompatibilní.
    compatible_racing_discipline:
      name: Kompatibilní závodní disciplína
      description: Disciplína či disciplíny motorsportu, pro které je přilba určena
        či certifikována.
    compatible_rc_scale:
      name: Kompatibilní RC měřítko
      description: Označuje poměr RC měřítka (např. 1:10), na který je příslušenství
        nebo součást navržena.
    compatible_recorder_size:
      name: Kompatibilní velikost záznamového média
      description: Specifikuje velikosti zobcových fléten, pro které je pouzdro určeno.
    compatible_recorder_type:
      name: Kompatibilní typ záznamníku
      description: Specifikuje typ zobcové flétny (kategorii/velikost), se kterou
        je příslušenství kompatibilní (např. sopránová, altová).
    compatible_reed_cut:
      name: Kompatibilní řez plátků
      description: Specifikuje typ řezu plátku, se kterým má být ligatura kompatibilní
        (např. zarovnaný řez / francouzský řez či nezarovnaný řez / americký řez).
    compatible_reed_type:
      name: Kompatibilní typ plátků
      description: Specifikuje řez/typ plátku, pro který je hubička určena.
    compatible_reel_type:
      name: Kompatibilní typ navijáku
      description: Určuje typ rybářského navijáku, pro který je taška, vnitřní balení
        nebo kryt navržen/a.
    compatible_refrigerant_type:
      name: Kompatibilní typ chladiva
      description: Označuje, s jakým chladivem je výparník klimatizace určen k použití.
    compatible_ride_equipment:
      name: Kompatibilní vybavení pro jízdu
      description: Typy kolečkového sportovního vybavení, pro které je rampa určena.
    compatible_roof_height:
      name: Kompatibilní výška střechy
      description: Označuje, pro který profil střechy je kryt určen (standardní vs.
        prodloužená/vysoká střecha).
    compatible_roof_rail_type:
      name: Kompatibilní typ střešních ližin
      description: Určuje, k jaké konfiguraci střechy je základní systém nosičů navržen
        pro připojení.
    compatible_rope_count:
      name: Kompatibilní počet lan
      description: Určuje konfiguraci lana boxerského ringu, pro kterou je součást
        navržena, například ring se 3 lany, ring se 4 lany nebo univerzální provedení.
    compatible_rope_type:
      name: Typ kompatibilního lana
      description: Specifikuje, které konstrukce lan lze s tímto zařízením použít.
    compatible_saddle_type:
      name: Kompatibilní typ sedla
      description: Specifikuje styl sedla či jezdeckou disciplínu, pro které je příslušenství
        určeno, což zajišťuje správnou kompatibilitu napříč anglickými, westernovými
        či jinými sedly.
    compatible_saxophone_size:
      name: Vhodná velikost saxofonu
      description: Označuje, s jakou velikostí saxofonu je produkt kompatibilní (např.
        soprán, alt, tenor).
    compatible_saxophone_type:
      name: Kompatibilní typ saxofonu
      description: Určuje, pro který saxofon je ligatura/krytka náustku navržena.
    compatible_scale_length:
      name: Kompatibilní délka menzury
      description: Určuje délkový rozsah menzury kytary, pro který jsou struny určeny
        (např. krátká menzura, standard, baryton).
    compatible_seat_airbag:
      name: Kompatibilní airbag sedadla
      description: Označuje, zda sedadlo podporuje/obsahuje boční airbagy nebo zda
        je kompatibilní s vozidly vybavenými airbagy integrovanými v sedadlech.
    compatible_seating_capacity:
      name: Kompatibilní kapacita počtu míst k sezení
      description: Určuje počet sedadel nebo konfiguraci, pro kterou je příslušenství
        navrženo.
    compatible_sensor_port_type:
      name: Kompatibilní typ portu senzoru
      description: Specifikuje, zda olejová vana podporuje snímače hladiny a/nebo
        teploty oleje, a případně typ portu.
    compatible_shifter_type:
      name: Kompatibilní typ řadicí páky
      description: Označuje typ či konfiguraci řadicí páky, pro kterou je manžeta
        řazení určena.
    compatible_shis:
      name: Kompatibilní SHIS
      description: Uvádí kód(y) standardizovaného systému identifikace hlavové soupravy
        (SHIS), ke kterému díl pasuje (např. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Kompatibilní bruslařská disciplína
      description: Označuje bruslařskou disciplínu (disciplíny), pro kterou je díl
        nebo příslušenství určen.
    compatible_snowshoe_deck_type:
      name: Kompatibilní typ desky pro sněžnice
      description: Určuje styl rámu nebo desky sněžnic, se kterým je vázání kompatibilní.
    compatible_special_effects_lighting_features:
      name: Kompatibilní funkce osvětlení pro speciální efekty
      description: Zdůrazňuje běžné funkční příznaky, které ovlivňují nákupní rozhodnutí
        u efektových světel (mimo barev/vzorů), jako je propojení jednotek nebo reakce
        na zvuk.
    compatible_spinning_wheel_drive_system:
      name: Kompatibilní systém pohonu kolovratu
      description: Specifikuje, s kterým systémem či systémy pohonu kolovratu lze
        příslušenství používat.
    compatible_spoke_gauge:
      name: Kompatibilní tloušťka drátu výpletu
      description: Označuje velikosti tloušťky drátu výpletu, pro které jsou závity
        niplu určeny, což kupujícím umožňuje správně spárovat dráty a niple.
    compatible_steering_wheel_airbag:
      name: Kompatibilní airbag volantu
      description: Označuje, zda je volant určen pro použití s originálními airbagovými
        moduly (nebo je určen pro aplikace bez airbagu).
    compatible_steering_wheel_control_button:
      name: Kompatibilní tlačítko pro ovládání na volantu
      description: Označuje kompatibilitu s továrními ovládacími prvky na volantu
        (audio/tempomat/telefon) a související kabeláží.
    compatible_stencil_material:
      name: Kompatibilní materiál šablony
      description: Materiály, ze kterých stroj dokáže vytvářet šablony nebo které
        dokáže zpracovávat (např. papír, plastová fólie, mylar).
    compatible_stencil_media_format:
      name: Kompatibilní formát materiálu pro šablony
      description: 'Označuje, které materiály pro šablony stroj podporuje: archy,
        role nebo obojí.'
    compatible_strap_retractor:
      name: Kompatibilní navíječ popruhů
      description: Označuje, zda je popruh kompatibilní se zatahovacími systémy, nebo
        je určen pro nezatahovací (statické) pásy.
    compatible_string_instrument_finish:
      name: Povrchová úprava vhodná pro strunné nástroje
      description: Určuje, na které typy povrchové úpravy nástrojů je leštidlo bezpečné
        použít.
    compatible_substrate_material:
      name: Kompatibilní materiál podkladu
      description: Povrchový materiál (materiály), ke kterému má barva přilnout.
    compatible_surface:
      name: Kompatibilní povrch
      description: Určuje povrch/materiál, ke kterému má být suchý zip přilepen.
    compatible_surface_material:
      name: Kompatibilní materiál povrchu
      description: Materiály povrchu vozidel, na které je výrobek určen.
    compatible_tear_off_system:
      name: Kompatibilní odtrhávací systém
      description: Označuje, zda brýle podporují strhávací slídy (tear-offs) a/nebo
        odvíjecí systémy (roll-offs), včetně toho, zda mají montážní kolíky pro strhávací
        slídy.
    compatible_thermostat_type:
      name: Typ kompatibilního termostatu
      description: Zda je hrdlo/pouzdro výstupu chladicí kapaliny navrženo pro instalaci
        termostatu, a pokud ano, jaký typ/velikost.
    compatible_thread:
      name: Kompatibilní vlákno
      description: Označuje, pro jaké druhy nití/přízí je navlékač určen (podle tloušťky
        či typu).
    compatible_thread_spool_format:
      name: Kompatibilní formát vlákna/cívky
      description: Označuje, které formáty nití má krabička pojmout (špulky, cívky,
        dutinky/karty na vyšívací bavlnky, kužely atd.).
    compatible_thread_yarn_tool:
      name: Kompatibilní nástroj na vlákno a přízi
      description: Kompatibilita strojů/systémů pro nástroje, které se montují na
        jiné zařízení nebo se s ním používají (např. šicí stroj, overlock, tkalcovský
        stav, kolovrat).
    compatible_tire_application:
      name: Kompatibilní způsob využití pneumatiky
      description: Označuje použití pneumatiky/kola, pro který je odstraňovač patek
        určen (na základě servisované pneumatiky/kola, nikoli modelu vozidla).
    compatible_tom_pad_mounting:
      name: Kompatibilní montáž padů tomů
      description: Určuje, k čemu se elektronický tom-tom montuje (např. svorka/tyč,
        L-tyč, stojan), což ovlivňuje, zda bude pasovat na stávající systémy stojanů.
    compatible_toy_vehicle_scale:
      name: Měřítko kompatibilních autíček
      description: Označuje měřítko hračky vozidla či přibližnou velikost vozidla,
        se kterou je herní sada kompatibilní.
    compatible_tpms_sensor_type:
      name: Kompatibilní typ senzoru TPMS
      description: Určuje, zda kolo podporuje senzory TPMS a/nebo požadovaný typ ventilu/senzoru.
    compatible_training_equipment:
      name: Kompatibilní tréninkové vybavení
      description: Označuje typy tréninkového či fitness zařízení, které lze k držáku
        připojit.
    compatible_treadmill_design:
      name: Kompatibilní design běžeckého pásu
      description: Specifikuje konstrukci běžeckého pásu, se kterou je příslušenství
        kompatibilní, jako jsou skládací či neskládací modely.
    compatible_tube:
      name: Kompatibilní trubka
      description: Označuje konstrukci duše či pneumatiky, pro kterou je záplata určena,
        jako je butyl, latex, TPU či bezdušové provedení.
    compatible_valve_type:
      name: Kompatibilní typ ventilu
      description: Určuje, s jakým typem mosazného ventilu je mazivo kompatibilní.
    compatible_vaporizing_material:
      name: Kompatibilní odpařovací materiál
      description: Označuje typy materiálů, pro které je zařízení určeno odpařovat.
    compatible_vehicle_windshield_fluid:
      name: Kompatibilní kapalina pro čelní sklo vozidla
      description: Tvrzení o kompatibilitě týkající se vybavení vozidla nebo variant
        skla (např. bezpečné pro dešťové povlaky, bezpečné pro ostřikovače světlometů).
    compatible_visor_system:
      name: Kompatibilní systém štítu
      description: Označuje, se kterými typy systémů štítů/vložek je motocyklová helma
        kompatibilní.
    compatible_water_board_type:
      name: Kompatibilní typ surfu
      description: Které vodní sportovní prkna je regál určen k přepravě.
    compatible_water_sport_board_type:
      name: Kompatibilní typ prkna pro vodní sporty
      description: Uvádí typy desek, k jejichž přepravě je regál určen.
    compatible_watercraft_communication_standard:
      name: Kompatibilní komunikační standard pro plavidla
      description: Specifikuje podporované standardy námořní komunikace/sítě nebo
        integrační protokoly pro interoperabilitu s palubní elektronikou.
    compatible_watercraft_engine_type:
      name: Kompatibilní typ motoru plavidla
      description: Označuje cílovou konfiguraci hnacího ústrojí, pro kterou je díl
        vhodný (vnější/vnitřní/záďový/vodní pohon).
    compatible_weight_plate_diameter:
      name: Kompatibilní průměr závaží
      description: Specifikuje, s kterými průměry posilovacích kotoučů stroj může
        fungovat.
    compatible_wheel_finish:
      name: Kompatibilní povrchová úprava kol
      description: Určuje povrchovou úpravu/materiály kol, na které je čistič bezpečný
        (podle udání výrobce).
    compatible_whorl_drive_band_type:
      name: Kompatibilní typ hnacího řemínku whorlíku
      description: Specifikuje, se kterým typem hnací šňůry má přeslen fungovat.
    compatible_wick_series:
      name: Kompatibilní série knotů
      description: Označuje běžné řady/typy knotů, pro které je kalíšek/plíšek navržen
        (odvětvové označení), pokud je specifikováno prodejcem.
    compatible_winder_head_bit:
      name: Kompatibilní hlava/nástavec navíječe
      description: Určuje styl rozhraní ladicí klávesy/hlavy pro podporu navíječe
        (např. drážkovaná hlava, vyměnitelné bity, univerzální hlava).
    compatible_windlass_rode:
      name: Kompatibilní kotvový řetěz/lano navijáku
      description: Určuje, jaký typ kotvového lana/řetězu je vrátek určen zpracovávat.
    compatible_windshield_type:
      name: Kompatibilní typ čelního skla
      description: Určuje, pro jaké nastavení čelního skla je kryt navržen.
    compatible_wood:
      name: Vhodné druhy dřeva
      description: Určuje, pro které druhy dřeva hmatníku je leštidlo doporučeno/bezpečné.
    compatible_writing_surface:
      name: Kompatibilní psací plocha
      description: Specifikuje povrchy/papíry, s nimiž je inkoust nejkompatibilnější.
    compatible_zipper_size:
      name: Vhodná velikost zipu
      description: 'Označuje velikost zipu, pro kterou je jezdec určen (často vyjádřenou
        jako #3, #5, #8, #10), což umožňuje lepší filtrování kompatibility.'
    compliance_certification:
      name: Osvědčení o shodě
      description: Shoda/schválení s normami, které světelná rampa splňuje pro použití
        na pozemních komunikacích a elektromagnetickou kompatibilitu.
    component_position:
      name: Poloha komponenty
      description: Určuje relativní polohu součásti v sestavě rozvodu motoru (např.
        přední vs. zadní kryt, horní vs. spodní). Nejde o umístění vozidla vpředu/vzadu.
    concentration_level:
      name: Úroveň koncentrace
      description: Kvalitativní údaj o tom, jak koncentrovaný je rajčatový protlak
        (jednoduchý, dvojitý, trojitý), užitečný pro sladění s požadavky receptu.
    concentration_type:
      name: Typ koncentrace
      description: Uvádí, zda je produkt připraven k použití nebo koncentrát, a (pokud
        se jedná o koncentrát) typické pokyny k ředění.
    concert_bass_drum_mounting_stand_type:
      name: Typ stojanu pro montáž koncertního basového bubnu
      description: Jak je koncertní basový buben podepřen nebo upevněn k použití při
        vystoupení.
    concert_pitch_standard:
      name: Standardní koncertní výška tónu
      description: Specifikuje referenční komorní tón (A4), na který je klavír v době
        prodeje naladěn (např. A440, A442, A444).
    condiment_form:
      name: Forma dochucovadla
      description: Označuje fyzickou formu či konzistenci křenového produktu (např.
        pasta, prášek, krém). pasta, prášek, krém).
    condiment_texture:
      name: Textura koření
      description: Popisuje fyzickou konzistenci relishe nebo čatní (např. hustá,
        hladká).
    confetti_format:
      name: Formát konfet
      description: Specifikuje formát konfet na základě toho, jak jsou konfety baleny
        či odpalovány (např. volně sypané vs. vystřelovací tubusy/kanóny).
    conga_head_tensioning_system:
      name: Systém napínání blány congy
      description: Typ mechanických prvků (hardwaru) použitých k napínání/ladění blány
        bubnu conga (např. tradiční ladění pomocí šroubů či moderní rychloladicí mechanismy).
    conga_set_included_drum_types:
      name: Typy bubnů, které jsou součástí sady conga
      description: Které typy konga jsou zahrnuty v sadě konga (např. quinto + conga
        + tumba).
    connector_case_style:
      name: Typ pouzdra pro konektory
      description: Klasifikuje celkový konstrukční styl pouzdra konektoru (např. tvrdá
        skořepina vs. měkké pouzdro) tak, aby odrážel úroveň ochrany a přenosnost.
    console_cover_installation_method:
      name: Způsob instalace krytu konzoly
      description: Specifikuje, jak se kryt konzoly připevňuje ke středové konzole
        či loketní opěrce (např. navléknutím, elastickými popruhy, suchým zipem, lepidlem,
        nacvaknutím).
    console_display_type:
      name: Typ displeje konzoly
      description: Určuje styl uživatelského displeje poskytovaného na stroji (např.
        LCD, LED, dotyková obrazovka).
    construction_design:
      name: Stavební projekt
      description: Označuje, z kolika kloubových částí se chránič skládá, což má vliv
        na pohyblivost (např. jednodílný či třídílný).
    contact_angle:
      name: Kontaktní úhel
      description: Určuje kontaktní úhel ložiskových drážek, vyjádřený jako jeden
        úhel nebo dvojice úhlů (např. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Typ náplně kontaktní žonglovací koule
      description: Označuje, zda je míč plný, či plněný (a pokud je plněný, jakým
        druhem výplně), což ovlivňuje jeho rozložení hmotnosti a odolnost.
    contact_juggling_ball_transparency:
      name: Průhlednost kontaktního žonglovacího míčku
      description: Určuje průhlednost/optický vzhled míče.
    contact_surface_material:
      name: Materiál styčné plochy
      description: Označuje materiál použitý v místech kontaktu, která se dotýkají
        nástroje (např. korek/guma), aby se zabránilo poškrábání a zlepšil se úchop.
    container_material:
      name: Materiál nádoby
      description: Specifikuje primární materiál maloobchodního obalu produktu (např.
        sklo, PET plast, hliník).
    contaminant_removal:
      name: Odstraňování nečistot
      description: Uvádí třídy kontaminantů, které je produkt certifikován k odstranění
        nebo snížení.
    contra_alto_clarinet_body_configuration:
      name: Konfigurace těla kontraaltového klarinetu
      description: Popisuje fyzickou konstrukci kontraaltového klarinetu (např. rovné
        vs. složené provedení).
    contra_alto_clarinet_lowest_note_extension:
      name: Rozšíření nejnižšího tónu pro kontraaltový klarinet
      description: Označuje prodloužení nejnižšího hratelného tónu nástroje (nejnižší
        tón, který klapkový systém umožňuje), což se běžně používá k rozlišení modelů
        s nízkým Es či nízkým D či nízkým C.
    contra_bass_clarinet_bell_type:
      name: Kontrabasový klarinet, zvonový typ
      description: Konfigurace ozvučníku použitá na kontrabasovém klarinetu.
    contra_bass_clarinet_bore_type:
      name: Typ vnitřního průměru kontrabasového klarinetu
      description: Konstrukce otvoru nástroje.
    contra_bass_clarinet_lowest_written_note:
      name: Nejnižší nota v partituře pro kontrabasový klarinet
      description: Nejnižší zapsaný tón, který nástroj dokáže zahrát (často závisí
        na prodloužení pro nízké C či nízké Es).
    control_arm_bushing_material:
      name: Materiál pouzder příčného ramene
      description: Specifikuje materiál případně přiložených/instalovaných pouzder
        (silentbloků).
    control_arm_bushings_included:
      name: Pouzdra ramen jsou součástí dodávky
      description: Označuje, zda je řídicí rameno dodáváno s již nainstalovanými pouzdry
        (silentbloky).
    control_arm_finish:
      name: Povrchová úprava příčných ramen
      description: Určuje ochrannou povrchovou úpravu aplikovanou na příčné rameno
        nápravy (ochrana proti korozi a vzhled).
    control_arm_grease_fitting_type:
      name: Typ mazacího prvku příčného ramene
      description: Určuje, zda sestava ramene řízení/kulového čepu obsahuje mazací
        prostředek (zerk) a zda je provozuschopný.
    control_arm_material:
      name: Materiál řídicího ramene
      description: Určuje primární materiál a výrobní konstrukci tělesa příčného ramene.
    control_arm_position:
      name: Poloha příčného ramene
      description: Určuje polohu zavěšení, pro kterou je příčné rameno navrženo v
        kontextu rohu/boku nápravy (např. horní/dolní, přední/zadní, levá/pravá).
    control_arm_style:
      name: Provedení řídicího ramene
      description: Identifikuje geometrický/designový styl ovládacího ramene použitého
        při rozvržení zavěšení kol.
    control_cable_connector_type:
      name: Typ konektoru řídicího kabelu
      description: Určuje styl koncovky/konektoru používaného ovládacím kabelem (kabely)
        pro propojení s řídicí jednotkou a motorem (např. koncovky specifické pro
        výrobce originálního vybavení).
    control_voltage_or_gate_connectivity:
      name: Řídicí napětí nebo připojení hradla
      description: Určuje podporu připojení řídicího napětí / brány pro integraci
        s modulárními/analogovými zařízeními.
    controller_function:
      name: Funkce správce
      description: Označuje hlavní roli řídicí desky běžeckého pásu, jako je řízení
        motoru, napájecí zdroj či invertorový pohon.
    controller_type:
      name: Typ správce
      description: Specifikuje kontrolér motoru / řídicí systém, který je součástí
        sady pro přestavbu skútru na EV (či je vyžadován pro použití) se zaměřením
        na vlastnosti kontroléru týkající se kompatibility a výkonu.
    conversion_kit_cooling_method:
      name: Metoda chlazení konverzní sady
      description: Primární přístup k tepelnému řízení použitý pro integraci motoru/měniče/baterie.
    conversion_kit_installation_complexity:
      name: Náročnost instalace konverzní sady
      description: Očekávaná úroveň instalačního úsilí na základě typických dovedností
        zákazníka/požadovaných nástrojů.
    converted_bed_size:
      name: Velikost přestavěné postele
      description: Označuje velikost či konfiguraci postele, na kterou se dětská postýlka
        po instalaci této sady přemění.
    convertible_configuration:
      name: Konvertibilní konfigurace
      description: Udává, do kolika různých konfigurací postelí lze produkt přeměnit
        (např. postýlka 3 v 1 → dětská postel → denní postel).
    convertible_high_chair_modes:
      name: Režimy skládací vysoké židličky
      description: Určuje konfigurace sedadel, do kterých lze židli přeměnit.
    cookie_decorating_kit_items_included:
      name: Součásti sady na zdobení sušenek
      description: Označuje jednotlivé dekorativní prvky v balení, aby zákazníci přesně
        věděli, co krabice obsahuje (např. tuby s polevou, posypy, vykrajovátka na
        sušenky).
    cookie_variety:
      name: Druh sušenek
      description: Identifikuje konkrétní styl nebo druh souboru sušenek, což pomáhá
        nakupujícím rychle najít jejich preferovaný druh.
    cooking_state:
      name: Stav přípravy (vařením/pečením)
      description: Označuje stupeň připravenosti kuřecího výrobku při prodeji (syrový,
        plně uvařený, marinovaný atd.).
    coolant_additive_purpose:
      name: Účel přísady do chladicí kapaliny
      description: Hlavní zamýšlená funkce aditiva do chladicí kapaliny (nejde o produkty
        pro průplach chladiče či specializované těsnicí produkty).
    coolant_base_fluid:
      name: Základní kapalina chladicí směsi
      description: Identifikuje primární glykolovou bázi použitou v nemrznoucí směsi/chladicí
        kapalině.
    coolant_outlet_connection_style:
      name: Typ připojení odtoku chladicí kapaliny
      description: Styl výstupního propojovacího rozhraní pro připojení hadice chladiče
        nebo potrubí chladicí kapaliny.
    coolant_outlet_neck_angle:
      name: Úhel hrdla výstupu chladicí kapaliny
      description: Úhel/orientace výstupu vodního hrdla vzhledem k montážní přírubě/motoru
        (užitečné pro vedení horní hadice chladiče).
    coolant_technology:
      name: Technologie chladicí kapaliny
      description: Určuje chemii/technologii chladicí kapaliny používanou nemrznoucí
        kapalinou/chladicí kapalinou (běžně označovanou na obalu).
    coolant_temperature_sensor_port:
      name: Zásuvka pro snímač teploty chladicí kapaliny
      description: Zda je na hrdle chladicí kapaliny port pro snímač nebo spínač teploty
        chladicí kapaliny a jaké rozhraní používá.
    coolant_temperature_sensor_seal_type:
      name: Typ těsnění snímače teploty chladicí kapaliny
      description: Typ použitého těsnění mezi snímačem a průchodem motoru/chladicí
        kapaliny.
    cooling_system_component_included:
      name: Zahrnutá součást chladicího systému
      description: Označuje další součásti chladicího systému dodávané s vodním čerpadlem.
    cooling_system_flush_application_step:
      name: Krok aplikace proplachu chladicího systému
      description: Označuje, kam produkt patří v rámci servisního procesu (např. čistič
        před oplachováním vs. konečný oplach/neutralizér).
    cooling_system_type:
      name: Typ chladicího systému
      description: Určuje konfiguraci chladicího systému používaného vestavěným lodním
        motorem (např. chlazení surovou vodou/otevřeným okruhem, chlazení uzavřeným
        okruhem/sladkovodním okruhem s výměníkem tepla, chlazení kýlem).
    cord_material:
      name: Materiál šňůry
      description: Specifikuje materiál šňůry/lanka používaného k protahování čisticího
        tamponu saxofonem.
    core_type_bass_strings:
      name: Typ jádra (basová struna)
      description: Určuje základní tvar struny, který ovlivňuje cit a flexibilitu.
    cork_grease_base_material:
      name: Základní materiál pro korkové mazivo
      description: Primární základ receptury korkového maziva (např. na bázi lanolinu).
    cork_grease_form:
      name: Forma mazadla na korek
      description: Fyzikální tvarový faktor korkového maziva.
    corn_presentation:
      name: Forma kukuřice
      description: Označuje fyzický vzhled nebo formu kukuřičného produktu (např.
        celý klas v listenech, zrna, prášek).
    corn_syrup_variety:
      name: Odrůda kukuřičného sirupu
      description: Určuje konkrétní styl nebo variantu zpracování sirupu.
    corn_variety:
      name: Odrůda kukuřice
      description: Identifikuje konkrétní botanickou nebo trhovou odrůdu prodávané
        kukuřice, což umožňuje nakupujícím rozlišit mezi druhy, které se liší chutí,
        texturou, barvou a kulinářským využitím.
    corner_compatibility:
      name: Kompatibilita s rohovými prvky
      description: Specifikuje tvar rohu stolu (čtvercový či kulatý), pro který je
        potah určen.
    corner_flag_features:
      name: Vlastnosti rohového praporku
      description: Zdůrazňuje zvláštní funkční vlastnosti nebo vylepšení rohové vlajky
        (např. skládací stožár, reflexní materiál).
    cornet_mouthpiece_shank_type:
      name: Typ stopky nátrubku kornetu
      description: Označuje standard roury/stopky nátrubku, který lze na kornet umístit,
        pro zajištění kompatibility.
    cornhole_league_certification:
      name: Certifikace Cornhole ligy
      description: Označuje oficiální certifikace nebo schválení ligy, které produkt
        splňuje.
    corrosion_resistance:
      name: Odolnost proti korozi
      description: Označuje protikorozní ošetření či hodnocení držáku/příchytky pro
        venkovní použití.
    corrosion_resistance_level:
      name: Stupeň odolnosti proti korozi
      description: Označuje ochranu proti korozi vhodnou pro sladkovodní či slanovodní
        prostředí.
    costume_components_included:
      name: Součásti kostýmu
      description: Označuje části oděvu a doplňky, které jsou součástí kostýmu, aby
        bylo jasné, co sada obsahuje.
    cotton_weave_type:
      name: Typ vazby bavlny
      description: Označuje vazbu tkaniny či pleteniny potisknutelného bavlněného
        povrchu, která ovlivňuje texturu a ostrost tisku.
    counter_type:
      name: Typ pultu
      description: Označuje přítomnost a styl vestavěného opakování nebo sledování
        síly.
    counterweight_fill_material:
      name: Výplňový materiál protizávaží
      description: Označuje látku, kterou lze použít k přidání zátěže či k předběžnému
        naplnění protizávaží.
    counterweight_type:
      name: Typ protizávaží
      description: Určuje design nebo konstrukční styl protizávaží, například pytel
        s pískem nebo ocelový plech, pro usnadnění kompatibility a instalace.
    coupler_system:
      name: Spřahovací systém
      description: Typ/systém spřáhla namontovaný na modelové lokomotivě pro kompatibilitu
        s kolejovými vozidly.
    court_surface_suitability:
      name: Vhodnost pro povrch hřiště
      description: Označuje povrch basketbalového hřiště, pro který je podrážka boty
        navržena, což pomáhá nakupujícím vybrat správnou trakci a odolnost pro vnitřní
        dřevěné palubovky, venkovní asfalt či beton nebo obojí.
    cover_fit_style:
      name: Střih s přiléhavým lemem
      description: Označuje, jak potah sedí na stole, což ovlivňuje vzhled a úroveň
        ochrany.
    cover_fit_type:
      name: Typ krytu
      description: Označuje, zda je krycí plachta šitá na míru (zakázková či polozakázková)
        nebo univerzální a zda je určena pro kotvení lodi na vodě, skladování či přepravu
        na přívěsu.
    cowbell_beater_type:
      name: Typ paličky pro kravský zvon
      description: Doporučený typ úderového nástroje pro zvuk/povrchovou úpravu kravského
        zvonu (pokud je produktem specifikován).
    cowbell_mounting_method:
      name: Způsob upevnění kravského zvonku
      description: Jak má být kravský zvon namontován/používán (ruční vs. namontován
        na hardware).
    cowbell_sound_character:
      name: Charakteristický zvuk kravského zvonce
      description: Obecný tónový charakter použitý při výčtu (podpora objevování mimo
        velikosti).
    cradle_capacity:
      name: Kapacita kolébky
      description: Označuje, zda je kolébka navržena pro jedno dítě či pro dvojčata.
    craft_cutter_embosser_machine_operation:
      name: Způsob ovládání řemeslného vyřezávacího či embosovacího strojku
      description: Určuje, jak funguje řezačka/emboser z pohledu pracovního postupu
        uživatele (např. ruční klika, elektrické tlačítko, ovládání aplikací).
    craft_decoration_maker_accessories_included:
      name: Obsažené příslušenství výrobce kreativních dekorací
      description: Uvádí klíčové příslušenství dodávané s výrobcem kreativních dekorací
        (např. startovací páska/fólie, náplně do samolepek, třpytivé kazety, čisticí
        nástroje).
    craft_foil_application_method:
      name: Způsob aplikace metalické fólie pro řemeslné použití
      description: Určuje, jak má být řemeslná fólie aplikována/aktivována (lepidlo,
        teplo, toner/reaktivní látka atd.).
    craft_foil_format:
      name: Formát řemeslné fólie
      description: Označuje fyzický formát prodávané řemeslné fólie (např. role vs.
        listy).
    craft_glue_finish:
      name: Výsledný vzhled lepidla pro řemeslné použití po zaschnutí
      description: Označuje vzhled lepidla po zaschnutí (např. čiré, bílé/neprůhledné,
        průsvitné, lesklé či matné).
    craft_magnet_application:
      name: Využití řemeslných magnetů
      description: Primární zamýšlené řemeslné využití nebo montážní plocha pro produkt
        magnetu.
    craft_magnet_holding_strength_level:
      name: Úroveň přídržné síly řemeslného magnetu
      description: Kategorie relativní síly magnetů pro řemeslné použití, která pomáhá
        nakupujícím vybrat správnou přídržnou sílu pro jejich projekt.
    craft_organizer_storage_features:
      name: Úložné prostory organizéru pro řemeslné použití
      description: Popisuje organizační prvky a vnitřní úložné prvky řemeslných organizérů
        (např. nastavitelné přepážky, zásuvky, průhledné kapsy).
    craft_scoring_board_included_accessories:
      name: Přiložené příslušenství rýhovací podložky pro řemeslné použití
      description: Příslušenství dodávané s rýhovací podložkou (např. rýhovací jehla
        / knihařská kost, trojúhelníkové pravítko, nástroj na obálky).
    craft_scoring_board_measurement_system:
      name: Systém měření rýhovací podložky pro řemeslné použití
      description: Určuje měrnou soustavu vyznačenou na bodovací tabuli (imperiální,
        metrická, duální nebo neoznačená).
    craft_wire_finish_coating:
      name: Povrchová úprava/potažení drátu pro řemeslné použití
      description: Označuje povrchovou úpravu či potah aplikovaný na drát za účelem
        jeho obarvení a zajištění odolnosti proti ztrátě lesku či ochrany.
    craft_wood_surface_preparation:
      name: Příprava povrchu dřeva pro řemeslné použití
      description: Označuje, zda je dřevěný povrch připraven k povrchové úpravě/natření,
        nebo zda vyžaduje přípravu (např. broušení/penetraci).
    crank_spindle_interface:
      name: Rozhraní osy kliky
      description: Označuje systém osy kliky, který středové složení podporuje (např.
        SRAM DUB, zapuštěný čtyřhran), což zajišťuje kompatibilitu mezi klikami a
        středovým složením.
    crankshaft_balance_type:
      name: Typ vyvážení klikového hřídele
      description: Udává, zda je klikový hřídel interně zůstatek (neutrální) nebo
        externě zůstatek (vyžaduje harmonické vyvažovací závaží/závaží setrvačníku).
    crankshaft_bolt_pattern:
      name: Rozteč šroubů klikového hřídele
      description: Rozložení šroubů na zadní přírubě pro upevnění setrvačníku/pružné
        desky.
    crankshaft_sensor_reluctor_type:
      name: Typ impulzního kotouče snímače klikového hřídele
      description: Použitá konfigurace kola snímače polohy klikové hřídele/spouštěče
        (pokud je to relevantní).
    craps_accessories_included:
      name: Včetně příslušenství ke hře Skořápky
      description: Označuje další specifické příslušenství pro hru v kostky dodávané
        nad rámec kostek, žetonů či herní desky.
    crash_cymbal_profile:
      name: Profil činelu Crash
      description: Celkové zakřivení/profil činelu (jak výrazné je klenutí), ovlivňující
        výšku tónu a odezvu.
    crash_cymbal_sound_character:
      name: Charakter zvuku crash činelu
      description: Hlavní charakteristiky tónu pro zvuk činelů typu crash.
    crash_pad_size_class:
      name: Velikostní kategorie dopadové žíněnky
      description: Označuje obecnou velikostní kategorii lezecké dopadové žíněnky
        a poskytuje rychlý přehled o pokrytí povrchu bez nutnosti přesných rozměrů.
    crate_engine_assembly_level:
      name: Úroveň sestavy motoru přepravky
      description: Jak kompletní je motor v přepravní bedně při dodání (které hlavní
        součásti jsou zahrnuty).
    cream_base_ingredient:
      name: Základní složka krému
      description: Identifikuje primární zdroj smetany, a to jak z mléčných výrobků,
        tak z rostlinných alternativ.
    cream_cheese_base:
      name: Základ z krémového sýra
      description: Označuje hlavní mléčný či rostlinný zdroj použitý k výrobě krémového
        sýru, což pomáhá nakupujícím, pokud jde o dietní omezení, alergeny či chuťové
        preference.
    cream_cheese_form:
      name: Forma na smetanový sýr
      description: Popisuje fyzickou formu nebo texturu smetanového sýra (např. kostkový,
        šlehaný, dip), která ovlivňuje roztíratelnost a zamýšlené použití.
    cream_variety:
      name: Druh krému
      description: Určuje konkrétní druh smetany na základě obsahu tuku, způsobu zpracování
        nebo zamýšleného kulinářského použití (např. půl na půl, dvojitá smetana,
        smetana na vaření).
    crib_accessory_features:
      name: Vlastnosti příslušenství k dětské postýlce
      description: Označuje funkční vlastnosti či charakteristiky týkající se pohodlí
        pro doplňky do dětských postýlek a postelí pro batolata, jako je prodyšnost
        či elastické okraje.
    crib_bumper_features:
      name: Vlastnosti zábrany do postýlky
      description: Zdůrazňuje zvláštní funkční vlastnosti ochranného mantinelu do
        postýlky.
    crib_conversion_kit_components:
      name: Součásti sady pro přestavbu dětské postýlky
      description: Uvádí hlavní součásti obsažené v sadě, aby si nakupující mohli
        ověřit, zda mají vše potřebné k instalaci.
    cricket_ball_grade:
      name: Třída kriketového míčku
      description: Určuje úroveň kvality nebo zamýšlený herní standard míče.
    cricket_ball_piece_construction:
      name: Konstrukce dílů kriketového míčku
      description: Označuje počet vnějších dílů nebo tvarovaných sekcí použitých k
        výrobě pláště míče, což je klíčový ukazatel kvality a ceny.
    cricket_ball_type:
      name: Typ kriketového míčku
      description: Určuje typ kriketového míčku dodávaného s produktem nebo označuje,
        zda míček není součástí dodávky.
    cricket_bat_accessory_type:
      name: Typ příslušenství k kriketové pálce
      description: Určuje typ příslušenství ke kriketové pálce nebo položky údržby,
        takže nakupující mohou rychle filtrovat na produkt, který potřebují.
    cricket_bat_size:
      name: Velikost kriketové pálky
      description: Označuje standardizovanou klasifikaci velikosti kriketové pálky
        (0–6, Harrow, SH, LH), která se obvykle volí na základě věku a výšky hráče.
    cricket_bat_size_compatibility:
      name: Kompatibilita velikostí kriketových pálek
      description: Označuje velikosti pálek, pro které je příslušenství navrženo,
        což zajišťuje správnou kompatibilitu.
    cricket_helmet_role:
      name: Role kriketové helmy
      description: Označuje herní roli, pro kterou je helma určena, například odpalování
        nebo udržování branky.
    cricket_leg_guard_type:
      name: Typ chrániče nohou pro kriket
      description: Označuje konkrétní druh kriketových chráničů nohou.
    cricket_player_role:
      name: Role hráče kriketu
      description: Určuje primární herní roli, pro kterou je bota určena.
    cricket_protection_grade:
      name: Stupeň ochrany v kriketu
      description: Určuje stupeň ochrany přiřazený výrobcem kriketového vybavení.
    cricket_stump_base_type:
      name: Typ základny kriketového kolíku
      description: Označuje styl podkladu nebo materiál, ze kterého jsou tyče branky
        vyrobeny, což ovlivňuje stabilitu a vhodnost hrací plochy.
    cricket_stump_target_features:
      name: Cílové prvky kriketové branky
      description: Označuje jasně rozlišené funkční vlastnosti, které zvyšují funkčnost
        při tréninku, viditelnost, odolnost či stabilitu.
    cricket_stump_type:
      name: Typ kriketové branky
      description: Označuje druh či konstrukci kriketových branek, což pomáhá nakupujícím
        vybrat si mezi tradičními zápasovými brankami, tréninkovými variantami či
        moderními osvětlenými modely.
    cricket_training_focus:
      name: Zaměření tréninku kriketu
      description: Hlavní kriketová dovednost či disciplína, k jejímuž zlepšení je
        pomůcka navržena.
    croquet_set_components_included:
      name: Součásti sady na kroket
      description: Označuje všechny klíčové součásti dodávané v rámci sady (např.
        branky/kolíky, břevna, přenosnou tašku), aby zákazníci přesně věděli, co kupují.
    cross_country_binding_system:
      name: Systém vázání na běžky
      description: Určuje standard vázání pro běžecké lyže, pro který je produkt navrtán
        nebo s nímž je kompatibilní.
    cross_stitch_chart_symbol_type:
      name: Typ symbolu křížkové výšivky
      description: Jak je graf znázorněn (symboly, barvy nebo obojí).
    cross_stitch_finishing_type:
      name: Typ dokončení křížkového stehu
      description: Zamýšlený typ dokončení/zobrazení pro vyšívaný projekt.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mechanismus uchycení látky vyšívacího rámečku pro křížkový steh
      description: Označuje, jak je látka v rámu zajištěna/napnuta (např. spony, svorky,
        připínáčky), což ovlivňuje snadnost použití a kompatibilitu s látkou.
    cross_stitch_frame_included_components:
      name: Součásti rámu pro křížkovou výšivku
      description: Uvádí, co je součástí balení (např. pouze rám vs. rám + svorky
        + stojan), což snižuje nejednoznačnost a vrácení zboží.
    cross_stitch_frame_type:
      name: Typ vyšívacího rámečku pro křížkový steh
      description: Označuje konstrukci/typ vyšívacího rámečku pro křížkový steh (způsob
        uchycení látky), což ovlivňuje použitelnost a kompatibilitu s projektem.
    cross_stitch_pattern_technique:
      name: Technika vzoru křížkového stehu
      description: Technika či styl křížkového stehu podle předlohy.
    crossbar_shape_profile:
      name: Tvar/profil příčníku
      description: Označuje aerodynamický tvar či profil příčníku.
    crossbar_style:
      name: Typ příčníku
      description: Identifikuje konstrukční styl hrazdy a rozlišuje pevné soutěžní
        hrazdy od flexibilních nebo hybridních tréninkových hrazd.
    crossbow_type:
      name: Typ kuše
      description: Označuje základní konstrukční typ kuše, jako je kladková, reflexní
        či pistolová. Konstrukční typ určuje výkon, velikost a účel použití, takže
        nakupující podle něj často filtrují.
    crossover_component_type:
      name: Typ komponentu reproduktorové výhybky
      description: Označuje hlavní topologii komponentů použitou v síti pasivní reproduktorové
        výhybky.
    crossover_configuration:
      name: Konfigurace typu crossover
      description: Označuje, zda výhybka využívá jeden dělicí bod či více bodů (např.
        2pásmové či 3pásmové provedení).
    crossover_type:
      name: Typ výhybky
      description: Typ výhybky je součástí sady komponent.
    crown_profile:
      name: Profil korunky
      description: Určuje výšku/profil korunky čepice nad okrajem.
    crown_style:
      name: Styl koruny
      description: Definuje celkovou siluetu nebo profil koruny na buřince.
    crust_taste_profile:
      name: Chuťový profil kůrky
      description: Označuje, zda je inherentní chuťová orientace kůrky sladká, slaná
        nebo neutrální.
    crystal_finish:
      name: Křišťálová povrchová úprava
      description: Označuje povrchovou úpravu či stav zpracování volného krystalu
        (např. surový, leštěný, tromlovaný, broušený/broušený s fasetami, matný, pokov
        s efektem aury, barvený či tepelně upravený).
    crystal_material:
      name: Krystalový materiál
      description: Označuje materiál použitý na sklíčko hodinek chránící ciferník.
    crystalline_finish_style:
      name: Typ krystalického povrchu
      description: Charakteristický krystalický/peříčkový vzhled vytvářený palmovým
        voskem v hotových svíčkách.
    cucumber_variety:
      name: Odrůda okurky
      description: Určuje kultivar nebo odrůdu okurky (např. anglická, perská, Kirby).
    cue_compatibility:
      name: Kompatibilita tága
      description: Označuje konfiguraci spoje tága, pro kterou je pouzdro navrženo,
        např. jednodílná či 3/4 dělená tága.
    cue_construction:
      name: Konstrukce tága
      description: Označuje, jak je tágo konstruováno – počet dílů nebo zda se jedná
        o částečnou součást, například pouze s tupým koncem nebo pouze s tělem – což
        ovlivňuje přenositelnost a kompatibilitu.
    cue_head_material:
      name: Materiál hlavice tága
      description: Určuje materiál hlavy tága (části, která se dotýká puku), který
        ovlivňuje odolnost a ochranu povrchu.
    cue_sport_compatibility:
      name: Kompatibilita s tágo sportem
      description: Určuje, pro který tágový sport je příslušenství určeno.
    cue_thread_size:
      name: Velikost závitu tága
      description: Určuje specifikaci vlákna používanou na prodlužovacích nástavcích,
        chráničích kloubů, zátěžových šroubech a dalším příslušenství tágů pro zajištění
        správného uchycení.
    cue_tip_hardness:
      name: Tvrdost kůže na tága
      description: Označuje pevnost kůže na tága, která ovlivňuje kontrolu bílé koule
        a odezvu při úderu.
    cuff_height:
      name: Výška manžety
      description: Uvádí výšku manžety boty (nízká, střední, vysoká, odnímatelná/nastavitelná),
        ovlivňující oporu a flexibilitu.
    cuff_position:
      name: Poloha manžety
      description: Označuje, ke které části těla jezdce se má manžeta pojistného řemenu
        připevnit.
    cultivation_method:
      name: Kultivační metoda
      description: Určuje, jak se listová zelenina pěstovala, včetně pěstitelských
        technik a zemědělských postupů.
    cup_type:
      name: Typ šálku
      description: Označuje profil povrchu flitru (plochý vs. vyklenutý) a hloubku
        vyklenutí, což může ovlivnit třpyt, texturu a to, jak flitr sedí při šití
        nebo lepení.
    cupcake_size:
      name: Velikost košíčku na cupcake
      description: Určuje kategorii fyzické velikosti prodávaných cupcakes (např.
        mini, standardní, jumbo).
    curd_size:
      name: Velikost sraženiny
      description: Určuje velikost nebo texturu tvarohu.
    cure_method:
      name: Způsob léčby
      description: Popisuje proces potřebný k vytvrzení lepidla (např. UV záření,
        vlhkost vzduchu, teplo).
    curing_or_preparation_method:
      name: Způsob zrání či přípravy
      description: Uvádí, jak byly olivy naloženy nebo jinak upraveny (např. naložené
        v nálevu, naložené v oleji, grilované).
    curling_broom_head_material:
      name: Materiál hlavy curlingového koštěte
      description: Identifikuje primární materiálové složení hlavice nebo podložky
        koštěte.
    curling_broom_head_type:
      name: Typ hlavy curlingového koštěte
      description: Určuje styl nebo konstrukci rozmetací hlavice/padu.
    curling_shoe_slider_material:
      name: Materiál sliderů pro curlingové boty
      description: Označuje hlavní materiál kluzné podrážky použité na curlingové
        obuvi.
    curling_training_aid_type:
      name: Typ tréninkové pomůcky na curling
      description: Určuje typ pomůcky pro trénink curlingu.
    curry_variety:
      name: Druh kari
      description: Označuje produkty kari omáček podle konkrétního typu kari či receptu,
        k jehož vytvoření jsou určeny, jako je tikka masala, massaman či thajské zelené
        kari, což umožňuje přesné filtrování podle chuti či typu.
    cushion_rubber_profile:
      name: Profil tlumicí gumy
      description: Tvar či kód profilu kusů železničních tlumicích gum.
    cushioning_level:
      name: Úroveň tlumení
      description: Udává množství polstrování pod chodidlem, které ponožka poskytuje
        pro ochranu před nárazy a pohodlí.
    custom_label_content_type:
      name: Typ obsahu přizpůsobeného štítku
      description: Označuje, jaké informace jsou přizpůsobeny na všívaném štítku (např.
        jméno, logo, text, velikost, symboly údržby či kontaktní údaje).
    customization_type:
      name: Typ přizpůsobení
      description: Označuje, zda je dres nepotištěný, jde o hráčskou edici či je přizpůsoben
        s uvedením konkrétního jména a čísla.
    cut_or_preparation_style:
      name: Styl řezu nebo přípravy
      description: Určuje, jak jsou kousky zeleniny krájeny nebo připraveny uvnitř
        konzervy nebo sklenice (např. celé, nakrájené na kostičky, tyčinky).
    cut_resistance_rating:
      name: Stupeň odolnosti proti proříznutí
      description: Určuje formálně testovanou úroveň odolnosti položky proti proříznutí.
    cut_type:
      name: Typ řezu
      description: Označuje, zda se látka prodává na metráž (na yardy/metry), jako
        předem nařezaný kus či v roli/štůčku.
    cutting_application:
      name: Aplikace řezání
      description: Primárně zamýšlený případ použití nůžek ke stříhání.
    cutting_mat_grid_style:
      name: Typ mřížky řezací podložky
      description: Styl vytištěného návodu na povrchu podložky.
    cutting_mat_intended_use:
      name: Zamýšlené použití řezací podložky
      description: Hlavní účel použití, pro který je řezací podložka navržena, např.
        řemeslné práce či jako pracovní plocha.
    cv_boot_clamp_type:
      name: Typ svěrky manžety homokinetického kloubu
      description: Označuje typ spony či pásky použité k zajištění manžety homokinetického
        kloubu (CV boot).
    cv_boot_kit_contents:
      name: Manžeta homokinetického kloubu (CV)
      description: Označuje, co je součástí dodávky manžety homokinetického kloubu
        (např. spony, balení vazelíny, stahovací pásky).
    cv_boot_material:
      name: Materiál manžety homokinetického kloubu
      description: Určuje primární materiálovou konstrukci manžety homokinetického
        kloubu.
    cv_boot_position:
      name: Konfigurace kol pouzdra pro činely a buben
      description: Určuje, zda manžeta homokinetického kloubu odpovídá vnitřní (vnitřní)
        nebo vnější (vnější) poloze homokinetického kloubu na nápravě.
    cycling_apparel_fit:
      name: Střih cyklistického oblečení
      description: Označuje střih oděvu s uvedením zamýšlené těsnosti a aerodynamiky
        (např. závodní/přiléhavý, volný).
    cylinder_head_assembly:
      name: Sestava hlavy válců
      description: Označuje míru kompletnosti prodávané hlavy válců (např. plně sestavená
        s instalovanými komponenty rozvodového mechanismu oproti holému/nesestavenému
        odlitku).
    cylinder_head_material_grade:
      name: Druh materiálu hlavy válců
      description: Určuje materiál a jakost použitý pro odlitek hlavy válců.
    cylinder_head_position:
      name: Poloha hlavy válců
      description: Určuje, do které řady/strany nebo orientace hlavy válců pasuje
        u motorů s více řadami válců (např. levá/pravá strana nebo řada 1/řada 2).
    cymbal_alloy:
      name: Slitina činelu
      description: Slitina/složení činelu (činelů) v sadě.
    cymbal_application:
      name: Použití činelu
      description: Primární hrací aplikace, pro kterou je činel určen/propagován.
    cymbal_arm_mounting_interface:
      name: Rozhraní pro montáž ramene činelu
      description: Určuje, jak se raménko činelu připevňuje ke zbytku bicího hardware
        (např. svěrce, regálu, přijímači stojanu).
    cymbal_arm_rotation_positioning_features:
      name: Funkce otáčení/polohování ramene činelu
      description: Označuje polohovací prvky, které ovlivňují, jak lze rameno naklonit/otočit
        a zajistit.
    cymbal_arm_style:
      name: Styl paže činelu
      description: Určuje, zda je rameno činelu rovné nebo vyčnívající, z hlediska
        dosahu a polohy.
    cymbal_drum_case_wheel_configuration:
      name: Konfigurace kol pouzdra pro činely a buben
      description: Označuje, zda má pouzdro kolečka a (pokud ano) konfiguraci koleček
        pro přepravu tažením.
    cymbal_hammering_style:
      name: Styl úderů na činely
      description: Proces/vzhled kladívkování ovlivňující složitost a pocit.
    cymbal_kit_components_included:
      name: Součásti sady činelů v balení
      description: Označuje, které typy činelů jsou součástí sady/balení k činelu
        typu ride (kromě samotného činelu typu ride).
    cymbal_kit_items_included:
      name: Součásti sady činelů
      description: Určuje, které činely jsou zahrnuty v sadě/balení (podle typu činelu).
    cymbal_lathing:
      name: Soustružení činelu
      description: Určuje, zda/jaká část povrchu činelu je soustružená (drážkovaná)
        oproti nesoustružené/surové.
    cymbal_playing_style_genre:
      name: Styl/žánr hry na činely
      description: Identifikuje typický kontext vystoupení, pro který jsou činely
        určeny (např. činely pro břišní tanec vs. pochodové/orchestrální ruční činely).
    cymbal_set_configuration:
      name: Konfigurace sady činelů
      description: Označuje, zda je produkt prodáván jako samostatný činel, spárovaná
        dvojice nebo sada více párů (např. pro výuku skupiny).
    cymbal_sound_character:
      name: Charakter zvuku činelů
      description: Označuje celkový zvukový profil či charakteristiku činelu pro snazší
        vyhledávání (např. veselý či temný).
    cymbal_sustain:
      name: Dotah činelů
      description: Jak dlouho činel po úderu zní (dozvuk).
    cymbal_type:
      name: Typ činelu
      description: Určuje funkční roli činelu, kterou má elektronický pad činelu emulovat.
    cymbal_volume_level:
      name: Úroveň hlasitosti činelu
      description: Vnímaná hlasitost/výstupní kategorie činelu.
    cymbal_weight_class:
      name: Váhová kategorie činelu
      description: Označuje váhovou kategorii činelu, která má vliv na tón, hlasitost
        a odezvu.
    dairy_heat_treatment:
      name: Tepelné ošetření mléčných výrobků
      description: Určuje stupeň zpracování nebo pasterizace smetany (např. syrová,
        pasterizovaná, UHT), který ovlivňuje trvanlivost, chuť a výkonnost šlehání.
    damage_type:
      name: Typ poškození
      description: Označuje typy poškození čelního skla, k jejichž opravě je sada
        určena.
    damper_pedal_style:
      name: Styl tlumicího pedálu
      description: Popisuje fyzický styl tlumicího pedálu používaného s klávesami/digitálními
        piany.
    damping_adjustability:
      name: Nastavitelnost tlumení
      description: Označuje, které parametry tlumení či světlé výšky jsou na tlumiči
        nastavitelné.
    damping_level:
      name: Úroveň tlumení
      description: Udává relativní míru snížení hlasitosti a sustainu, kterou funkce
        ztlumení poskytuje.
    dance_occasion:
      name: Účel použití při tanci
      description: Označuje zamýšlený účel použití oděvu v rámci tanečního tréninku
        či vystoupení.
    darbuka_accessories_included:
      name: Včetně příslušenství k darbukám
      description: Uvádí běžné příslušenství dodávané s darbukou.
    darbuka_body_finish_type:
      name: Typ povrchové úpravy korpusu darbuky
      description: Označuje vnější povrchovou úpravu, nátěr či dekorativní provedení
        korpusu darbuky.
    darbuka_head_material:
      name: Materiál hlavy Darbuka
      description: Určuje materiál membrány bubnu na darbuce.
    dart_barrel_material:
      name: Materiál hlavně šipky
      description: Určuje primární materiál hlavně šipky, což ovlivňuje rozložení
        hmotnosti, odolnost a cenu.
    dart_shaft_design:
      name: Design násadky šipky
      description: Označuje mechanické provedení násadky, například zda je pevná,
        otočná, teleskopická či s integrovanou letkou, což ovlivňuje funkční vlastnosti
        a cenu.
    dart_shaft_thread_type:
      name: Typ závitu násadky šipky
      description: Označuje velikost či typ závitu použitého k našroubování násadky
        do tělíčka šipky, což zajišťuje kompatibilitu mezi násadkami a tělíčky.
    dart_thread_size:
      name: Velikost závitu šipky
      description: Určuje velikost/standard vlákna, se kterým je díl kompatibilní,
        a zajišťuje tak usazení mezi hřídelemi, hroty a válci.
    dart_tip_compatibility:
      name: Kompatibilita hrotů šipek
      description: Označuje, zda je část šipky určena pro ocelovou špičku, měkkou
        špičku nebo oba typy šipek.
    dart_tip_connection_type:
      name: Typ propojení hrotu šipky
      description: Popisuje specifikaci vlákna nebo montážní systém, který hrot používá
        k připevnění k hlavni nebo násadě šipky, a zajišťuje tak kompatibilitu.
    dartboard_tournament_approval:
      name: Schválení turnajového terče
      description: Označuje, zda je terč oficiálně schválen konkrétními šipkařskými
        federacemi či ligami.
    dartboard_type:
      name: Typ terče
      description: Označuje terč podle technologie konstrukce a kompatibility se šipkami
        (např. sisalový, elektronický, magnetický).
    dash_cover_construction_type:
      name: Typ konstrukce krytu palubní desky
      description: Popisuje, jak je kryt palubní desky tvarován/strukturován (např.
        tvarován vs. šitý), což ovlivňuje přesnost a vzhled.
    dash_cover_cutout_configuration:
      name: Konfigurace výřezů krytu palubní desky
      description: Označuje, pro které otvory/senzory v panelu OEM je kryt předřezaný
        nebo vytvarovaný.
    dashboard_accessory_position:
      name: Poloha příslušenství palubní desky
      description: Určuje, kam na/kolem panelu má být příslušenství umístěno nebo
        namontováno.
    date_variety:
      name: Odrůda datlí
      description: Určuje kultivar/odrůdu datlí (např. Medjool, Deglet Noor, Ajwa). Rozmanitost
        silně ovlivňuje chuť, velikost, texturu a je zdůrazněna ve většině názvů produktů
        a popisů, takže její zachycení zlepšuje filtrování a objevování.
    dayan_head_material:
      name: Materiál hlavice Dayan
      description: Materiál hrací plochy (pudi), například přírodní zvířecí kůže nebo
        syntetický.
    dayan_strap_material:
      name: Materiál řemínku Dayan
      description: Materiál napínacích řemínků (baddhi) použitých k sešněrování bubnu
        typu dajan.
    dayan_syahi_type:
      name: Typ Dayan syahi
      description: Typ aplikace syahi (černá ladící pasta) na dayanovou hlavu.
    decaffeination_method:
      name: Způsob dekofeinace
      description: Identifikuje proces používaný k odstranění kofeinu z bezkofeinové
        kávy.
    decal_installation_method:
      name: Způsob instalace samolepky
      description: Způsob aplikace obtisku na povrch vozidla (např. suchá aplikace,
        mokrá aplikace). Údaje o nástroji/požadavky (např. přenosová páska nebo horkovzdušná
        pistole) by měly být uvedeny v návodu k použití nebo v souvisejících atributech
        nástroje, pokud je to relevantní.
    decal_orientation:
      name: Orientace obtisku
      description: Označuje, zda jsou samolepka/dekál určeny k aplikaci na vnitřní
        stranu skla či na vnější povrch.
    decal_placement_type:
      name: Typ umístění obtisku
      description: Označuje, kam na vozidle má být samolepka/dekál aplikován/a (např.
        panel karoserie, nárazník, kapota).
    decal_visibility_property:
      name: Vlastnost viditelnosti samolepky/dekálu
      description: Optické vlastnosti či vlastnosti týkající se viditelnosti samolepky/dekálu
        určené ke zlepšení viditelnosti či reakce na světlo (např. reflexní, fluorescenční,
        ve tmě svítící či průhledné vlastnosti).
    deck_concave_level:
      name: Úroveň prohnutí desky (concave)
      description: Označuje hloubku nebo intenzitu konkávního tvaru desky (např. mírný,
        střední, hluboký).
    deck_flex_rating:
      name: Stupeň pružnosti (flexe) desky
      description: Kvalitativní hodnocení flexibility/tuhosti skateboard desky.
    deck_material:
      name: Materiál terasy
      description: Označuje hlavní konstrukční materiál skateboardové desky.
    decoder_interface_socket_type:
      name: Rozhraní dekodéru / typ patice
      description: Typ rozhraní digitálního dekodéru nebo konfigurace palubního dekodéru
        pro model lokomotivy.
    decoration_technique:
      name: Technika dekorace
      description: Určuje primární metodu použitou k aplikaci grafiky nebo ozdob na
        tričko.
    decorative_stamp_form_factor:
      name: Tvarový faktor dekorativního razítka
      description: Identifikuje formát fyzického razítka a způsob tisku návrhu (jednotlivé
        razítko, sada, váleček, pozadí atd.).
    decorative_tape_application:
      name: Aplikace dekorativní pásky
      description: Hlavní účel použití ozdobné pásky v rámci řemeslných prací, pro
        který je navržena či prodávána.
    decorative_tape_format:
      name: Formát ozdobné pásky
      description: Určuje, jak je dekorativní páska dodávána/balena pro použití.
    decoy_buoyancy:
      name: Vztlak návnady
      description: Popisuje, jak se návnada chová ve vodním sloupci (plave, vznáší
        se nebo se potápí).
    decoy_joint_type:
      name: Typ klamného kloubu
      description: Označuje, zda je tělo nástrahy/balabánu pevné či kloubové, což
        ovlivňuje pohyb při plavání.
    decoy_motion_mechanism:
      name: Mechanismus pohybu nástrahy/balabánu
      description: Popisuje, jakým způsobem, pokud vůbec, návnada vytváří pohyb nebo
        rušení vody k přilákání zvěře.
    decoy_posture:
      name: Pozice nástrahy/balabánu
      description: Označuje zobrazený postoj nebo aktivitu zvířete modelovaného návnadou
        (např. krmení, odpočinek, bdělost).
    decoy_size_class:
      name: Váhová/velikostní kategorie nástrahy/balabánu
      description: Kategorizuje relativní velikost návnady ve srovnání se skutečným
        zvířetem (např. Standard, Magnum, Oversize).
    decoy_style:
      name: Styl návnady
      description: Označuje fyzické provedení či konstrukční třídu nástrahy/balabánu,
        což lovcům pomáhá vybrat správnou výbavu.
    deli_meat_variety:
      name: Druh lahůdkového masa/uzeniny
      description: Označuje konkrétní druh lahůdkového masa/uzeniny (např. salám,
        špekáček/parizer, prosciutto, roastbeef).
    delivery_form:
      name: Formulář pro doručení
      description: Fyzická forma/formát čističe vstřikovačů.
    denim_composition:
      name: Složení džínoviny
      description: Hlavní vláknové složení džínoviny (základní vlákna bez barviv či
        povrchových úprav).
    denim_finish:
      name: Džínová úprava
      description: Povrchová úprava/zpracování džínoviny.
    denim_intended_use:
      name: Zamýšlené použití džínoviny
      description: Typický účel/použití, pro které je džínovina prodávána.
    denim_stretch_type:
      name: Typ strečového denimu
      description: Zda je denim mechanicky strečový, s přidaným elastanem/spandexem
        nebo žádný streč.
    denim_wash:
      name: Džínovina sepraná
      description: Označuje odstín či sepranost džínoviny (např. světlá, tmavá, surová
        (nesepraná), plísňová).
    derailleur_cage_length:
      name: Délka ramínka přehazovačky
      description: Označuje délku ramínka přehazovačky, která určuje kapacitu řetězu
        (především pro přehazovačku).
    derailleur_mounting_style:
      name: Způsob montáže přehazovačky
      description: Označuje, jak se přehazovačka/přesmykač montuje na rám kola či
        patku (např. navářka, objímka, přímá montáž, UDH).
    derailleur_type:
      name: Typ přehazovačky
      description: Označuje, zda se jedná o přední měnič (přesmykač) či zadní měnič
        (přehazovačku).
    deshedder_tool_type:
      name: Typ nástroje pro odstraňování chlupů
      description: Označuje typ vyčesávače, aby si kupující mohli vybrat preferovaný
        způsob péče o srst (např. břitový, blokový, gumové hřeblo či rukavice).
    diabolo_axle_system:
      name: Systém náprav Diabolo
      description: Určuje systém/konfiguraci nápravy diabola, která ovlivňuje broušení,
        stabilitu a opotřebení řetězce.
    diagnostic_functions_supported:
      name: Podporované diagnostické funkce
      description: Označuje diagnostické či údržbářské funkce, které dokáže autodiagnostika
        provádět.
    diagnostic_interface_type:
      name: Typ diagnostického rozhraní
      description: Připojení/rozhraní používané k usnadnění komunikace s vozidlem
        či zařízením (např. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Stupeň barvy diamantu
      description: Označuje barvu diamantů, od D (bezbarvý) do Z (světlá barva), nebo
        označuje ozdobné barvy diamantů.
    diaper_cover_style:
      name: Styl krytu plenky
      description: Označuje střih či dekorativní styl svrchních plenkových kalhotek
        pro usnadnění procházení či filtrování na základě typu.
    diastatic_power_unit:
      name: Jednotka diastatické síly
      description: Určuje jednotkový systém používaný k výkazům hodnoty diastatického
        výkonu produktu (např. °Lintner vs Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Systém ladění diatonické harmoniky
      description: Určuje ladící systém/systém rozvržení not používaný diatonickou
        harmonikou.
    dice_sides:
      name: Strany kostek
      description: Počet stěn jednotlivých kostek v sadě (např. d6, d20). Pokud sada
        obsahuje různé druhy kostek, zadejte tu hlavní, nebo zvolte více možností
        (je-li to možné).
    didgeridoo_construction_type:
      name: Typ konstrukce didgeridoo
      description: Jak je didgeridoo konstruováno nebo tvarováno (tradiční nebo moderní
        konstrukční přístup).
    dietary_formulation_claim:
      name: Informace o výživovém složení
      description: Zdůrazňuje klíčové atributy nebo výjimky ve složení týkající se
        výživy koní (např. bez obilovin, s nízkým obsahem škrobu, organické).
    dinosaur_playset_scale_figure_size_class:
      name: Měřítko dinosauří herní sady/kategorie velikosti figurky
      description: Označuje celkové měřítko obsažených dinosaurů/figurek pro zajištění
        kompatibility s jinými sadami.
    dinosaur_species_included:
      name: Zahrnuty druhy dinosaurů
      description: Označuje, které druhy dinosaurů jsou v herní sadě zastoupeny (figurky
        či modely dinosaurů).
    dipsy_diver_size_designation:
      name: Označení velikosti potápěče Dipsy
      description: Označuje výrobcem definovaný kód velikosti potápěcího závažíčka
        Dipsy, který koreluje s hmotností a hloubkou ponoru.
    disc_brake_rotor_mount_type:
      name: Typ uchycení kotouče brzdového kotouče
      description: Označuje způsob, jakým se kotouč kotoučové brzdy montuje na náboj
        (např. 6 šroubů, Center Lock).
    disc_lock_accessories_included:
      name: Příslušenství k zámku na kotouč je součástí balení
      description: Určuje další položky dodávané se zámkem kotouče jízdního kola,
        jako například připomínkový kabel, přepravní pouzdro, montážní držák nebo
        baterie.
    disco_ball_mirror_tile_material:
      name: Materiál zrcadlových dlaždic ve stylu disco koule
      description: Materiál reflexních dlaždic na disko kouli (pokud je to relevantní).
    disco_ball_mirror_tile_size:
      name: Velikost zrcátkových dlaždic disco koule
      description: Přibližná velikost jednotlivých zrcadlových čtverečků/pásků na
        diskokouli.
    display_backlight_color:
      name: Barva podsvícení displeje
      description: Barva podsvícení/osvětlení displeje či stupnice přístroje.
    disposable_compostable_claim:
      name: Informace o jednorázovosti či kompostovatelnosti
      description: Označuje, zda je produkt kompostovatelný, biologicky rozložitelný,
        recyklovatelný nebo nerecyklovatelný (pokud je to relevantní).
    distillation_method:
      name: Destilační metoda
      description: Identifikuje metodu destilace nebo typ destilačního přístroje použitý
        k výrobě lihoviny.
    distilled_water_intended_use:
      name: Zamýšlené použití destilované vody
      description: Označuje hlavní účel použití destilované vody (např. na pití, pro
        přístroj CPAP, zvlhčovač vzduchu, napařovací žehličku).
    distress_transmission_frequency:
      name: Frekvence tísňového vysílání
      description: Primární rádiová frekvence/frekvence používané pro tísňové volání.
    distressing_level:
      name: Úroveň záměrného opotřebení
      description: Označuje míru úmyslného obnošení, roztrhání či roztřepení materiálu.
    distressing_style:
      name: Styl záměrného opotřebení
      description: Označuje typ či míru ošoupanosti džínů, např. roztrhaný či vrásčitý
        efekt.
    distributor_advance_mechanism:
      name: Mechanismus posunu rozdělovače
      description: Označuje typ mechanismu regulace předstihu zapalování použitého
        v rozdělovači.
    distributor_cap_terminal_type:
      name: Typ kontaktů víčka rozdělovače
      description: Označuje typ kontaktů víčka rozdělovače.
    distributor_gear_material:
      name: Materiál ozubeného kola rozdělovače
      description: Určuje materiál ozubeného kola rozdělovače.
    distributor_ignition_type:
      name: Typ zapalování rozdělovače
      description: Určuje, zda je rozdělovač určen pro kontakty přerušovače, elektronické
        zapalování nebo systémy typu HEI.
    distributor_kit_contents:
      name: Obsah sady rozdělovače
      description: Označuje, které komponenty jsou součástí rozdělovače (např. víčko,
        palec, zapalovací modul, těsnění/O-kroužek, hnací kolo, kabeláž/konektor).
    dive_computer_form_factor:
      name: Tvarový faktor potápěčského počítače
      description: Označuje fyzické provedení či způsob montáže potápěčského počítače,
        jako je montáž na konzoli či forma náramkových hodinek.
    diving_mask_design:
      name: Provedení potápěčské masky
      description: Definuje celkový konstrukční styl potápěčské masky, ovlivňující
        padnutí, zorné pole a zamýšlené použití.
    divot_tool_prong_configuration:
      name: Konfigurace hrotů nástroje Divot
      description: Určuje počet a uspořádání hrotů na nástroji pro odstraňování dírek,
        které se používají k opravě poškození trávníku.
    divot_tool_style:
      name: Typ vypichovátka na golfové ferveje
      description: Definuje celkový strukturální styl nebo styl nasazení nástroje
        Divot, například pevný, vyklápěcí/skládací, multifunkční nástroj nebo příslušenství,
        které se připíná na klobouk nebo hůl.
    djembe_shell_construction:
      name: Konstrukce těla bubnu djembe
      description: Popisuje metodu konstrukce těla/skořepiny djembe.
    djembe_tuning_system:
      name: Ladicí systém Djembe
      description: Označuje způsob, jakým se djembe napíná/ladí.
    dmx_output_connector_type:
      name: Typ DMX výstupního konektoru
      description: Formát fyzického konektoru používaný pro výstupní porty DMX ovladače.
    doctor_playset_items_included:
      name: Součásti sady s lékařskou tematikou
      description: Označuje lékařské nástroje a doplňky na hraní, které jsou součástí
        doktorské sady (např. stetoskop, injekční stříkačka, reflexní kladívko).
    doctor_playset_role_play_setting:
      name: Scénář hraní rolí doktorské herní sady
      description: Označuje konkrétní lékařský obor, ke kterému se dětská doktorská
        sada na hraní vztahuje.
    doctor_playset_wearable_items_included:
      name: Součástí sady na hraní s lékařem jsou doplňky k oblékání
      description: Označuje nositelné kostýmní součásti, které jsou součástí herní
        sady.
    doll_accessory_type:
      name: Doplňky pro panenky
      description: Definuje, o jaký druh doplňku pro panenku nebo akční figurku se
        produkt jedná (např. oblečení, boty, nábytek, stojany), což umožňuje nakupujícím
        procházet a filtrovat v rámci této kategorie doplňků.
    doll_eye_type:
      name: Typ oka pro panenky
      description: Označuje, jak jsou vytvořeny oči panenky (např. vsazené akrylové,
        malované, s LED osvětlením).
    doll_hair_fiber_type:
      name: Typ vlasového vlákna pro panenky
      description: Typ vlasů/vlákna použitého na panence (nebo žádné), ovlivňující
        realismus, styling a péči.
    doll_making_kit_components_included:
      name: Součásti sady na výrobu panenek
      description: Uvádí klíčové materiály a nástroje, které jsou součástí sady pro
        výrobu panenek, aby si nakupující mohli porovnat balíčky a vědět, co si sami
        potřebují obstarat.
    dollhouse_installation_placement_type:
      name: Typ instalace/umístění domečku pro panenky
      description: Označuje, jak má být domeček pro panenky používán či umístění (např.
        na stůl, volně na podlahu či namontován na stěnu).
    dollhouse_items_included:
      name: Součásti domečku pro panenky
      description: Identifikuje, co je součástí krabice s domečkem pro panenky (nábytek,
        panenky, doplňky).
    dollhouse_lighting_type:
      name: Typ osvětlení domečku pro panenky
      description: Typ osvětlení, které je součástí domečku pro panenky nebo které
        domeček pro panenky podporuje.
    dollhouse_room_type:
      name: Typ pokoje pro panenky
      description: Označuje konkrétní místnost či část domečku pro panenky, pro kterou
        je doplněk obvykle určen.
    dollhouse_scale:
      name: Měřítko domečku pro panenky
      description: Poměr měřítka domečku pro panenky nebo příslušenství k domečku
        pro panenky (např. 1:12) pro zajištění kompatibility mezi domečky, nábytkem
        a figurkami.
    dollhouse_style_theme:
      name: Styl/motiv domečku pro panenky
      description: Celkový styl nebo motiv domečku pro panenky pro prohlížení a dárky
        (např. moderní vs. viktoriánský).
    donnos_playing_technique:
      name: Technika hry na buben tama
      description: Označuje, jak se na buben tama hraje či jak se rozezvučuje (pouze
        rukama či paličkou/tloukem), aby nástroj splnil očekávání kupujícího, a jaké
        příslušenství je součástí balení.
    donnos_tuning_system:
      name: Tuningový systém Donnos
      description: Hlavní metoda používaná k ladění či změně výšky tónu (např. napínací
        šňůry či stiskový mechanismus).
    door_assembly_type:
      name: Typ dveřní sestavy
      description: 'Označuje, co je součástí dodávky: pouze rám dveří, panel dveří
        nebo kompletní sestava dveří.'
    door_closure_mechanism:
      name: Mechanismus zavírání dveří
      description: Definuje mechanismus, který ovládá zavírání dveří (např. tlumené
        zavírání, magnetická západka).
    door_handle_components_included:
      name: Součástí jsou komponenty kliky dveří
      description: Označuje, které klíčové komponenty jsou součástí dveřní kliky (např.
        vložka zámku, těsnění, krytka, montážní materiál, kabelový svazek, západka/zámek
        dveří).
    door_handle_operation:
      name: Způsob ovládání kliky dveří
      description: Určuje primární způsob ovládání/provozu sestavy kliky dveří vozidla
        (např. mechanické spojení, vložka klíče, bezklíčový dotyk/tlačítko, vyskakovací
        vypínač).
    door_lock_knob_attachment_method:
      name: Způsob upevnění knoflíku zámku dveří
      description: Určuje, jak se knoflík dveřního zámku připevňuje k tyči zámku (např.
        závitové, natlačovací).
    door_lock_position:
      name: Poloha zámku dveří
      description: Označuje, na které konkrétní dveře mají být zámek či jeho součásti
        umístěny.
    door_seal_feature_set:
      name: Sada funkcí těsnění dveří
      description: Funkční vlastnosti těsnění dveří.
    door_seal_material_type:
      name: Typ materiálu těsnění dveří
      description: Hlavní skupina elastomerů či materiálů použitá na těsnění dveří
        (specifické typy nad rámec běžných materiálů).
    door_seal_product_form:
      name: Forma těsnění dveří
      description: Označuje prodejní/balení tvar těsnění dveří.
    door_window_operation:
      name: Ovládání oken ve dveřích
      description: Označuje, zda je systém stahování oken ve dveřích určen pro manuální
        či elektrické ovládání, případně zda jsou dveře bez okna.
    double_decker_bus_deck_configuration:
      name: Konfigurace paluby dvoupatrového autobusu
      description: Určuje konfiguraci přístupu na palubu/střechy dvoupatrového autobusu.
    double_drum_pedal_linkage_medium:
      name: Typ spojovacího média dvojitého bubnového pedálu
      description: Označuje způsob propojení sekundárního pedálu s primárním pedálem
        (např. spojovací hřídel, řetěz či řemen).
    double_end_bag_core_type:
      name: Typ jádra vaku s dvojitým koncem
      description: Identifikuje konstrukci vnitřního úderového jádra, která určuje
        rychlost odrazu, pocit z odpalu a požadavky na údržbu.
    double_pointed_needle_point_style:
      name: Typ hrotu oboustranné pletací jehlice
      description: Označuje ostrost či tvar hrotu určený pro různé příze či styly
        pletení.
    dough_extruder_accessories_included:
      name: Příslušenství, které je součástí lisu na těsto
      description: Další komponenty dodávané s extruderem těsta.
    dough_extruder_operation_type:
      name: Typ provozu extrudéru těsta
      description: Jak se těsto protlačuje extruderem za účelem vytvoření tvarů.
    dough_extruder_shape_disc_included:
      name: Extruder na těsto, disk tvarů je součástí balení
      description: Tvary, které dokáže lis na těsto vytvářet pomocí obsažených kotoučů/trysek.
    dough_format:
      name: Formát těsta
      description: Označuje fyzickou podobu/tvar těsta uvnitř balení (např. bochník/koule,
        plát, placka, trhané prameny).
    doumbek_accessories_included:
      name: Včetně příslušenství k doumbeku
      description: Příslušenství přiložené k bubnu doumbek (např. ladicí klíč, pouzdro).
    doumbek_head_material:
      name: Materiál blány doumbeku
      description: Materiál blány bubnu (membrány) na doumbek.
    doumbek_head_type:
      name: Typ hlavy Doumbek
      description: Konstrukce/typ blány bubnu doumbek (způsob výroby či montáže membrány).
    doumbek_playing_style_technique:
      name: Doumbekův styl/technika hry
      description: Zamýšlený herní kontext/styl běžně spojovaný s doumbekem.
    doumbek_tuning_system:
      name: Systém ladění doumbeku
      description: Označuje, jak se buben doumbek napíná či ladí (případně zda se
        neladí).
    dowel_end_style:
      name: Typ zakončení dřevěného kolíku
      description: Popisuje řez/tvar konců hmoždinek, ovlivňující snadnost vkládání,
        bezpečnost a zamýšlené řemeslné využití.
    dowel_surface_texture:
      name: Struktura povrchu kolíku
      description: Popisuje stav povrchu hmoždinky, například hladký nebo vroubkovaný,
        což ovlivňuje vzhled a přilnavost lepidla.
    drafting_compass_adjustment_mechanism:
      name: Mechanismus nastavení kružítka
      description: Primární mechanismus jemného nastavení sloužící k přesnému nastavení
        poloměru.
    drafting_compass_fine_adjustment_mechanism:
      name: Mechanismus jemného nastavení rýsovacího kružítka
      description: Označuje typ jemného nastavení používaného k přesnému nastavení
        poloměru (je-li k dispozici).
    drafting_compass_lead_holder_type:
      name: Typ držáku tuhy pro kreslící kompas
      description: Typ vložky/držáku výkresu, který je součástí kompasu nebo který
        je podporován.
    drag_system_material:
      name: Materiál brzdového systému
      description: Identifikuje materiál nebo technologii použitou v tažném zásobníku,
        ovlivňující tepelnou odolnost a hladkost.
    drag_system_type:
      name: Typ tažného zařízení
      description: Určuje typ brzdného mechanismu použitého v navijáku, například
        přední, zadní, páková, hvězdicová, magnetická nebo kotoučová brzda.
    drag_type:
      name: Typ brzdného mechanismu navijáku
      description: Označuje styl brzdového mechanismu použitého u navijáku (umístění
        či způsob ovládání).
    drawer_features:
      name: Vlastnosti zásuvek
      description: Označuje speciální konstrukční prvky či funkce zásuvek (např. tlumené
        dovírání, plstěné polstrování).
    drawer_slide_type:
      name: Typ výsuvu zásuvky
      description: Označuje způsob montáže a typ výsuvu pojezdů zásuvek (např. spodní
        montáž, plnovýsuv).
    drawing_ink_compatible_tools:
      name: Kompatibilní nástroje pro kreslicí inkoust
      description: Určuje aplikační nástroje, pro které je inkoust určen (např. pero
        pro namáčení vs. štětec).
    drawing_ink_permanence:
      name: Stálost kreslicího inkoustu
      description: Označuje charakteristiky stálosti důležité pro hotové umělecké
        dílo a reprodukci.
    dress_embellishment:
      name: Zdobení šatů
      description: Zdůrazňuje výrazné dekorativní prvky začleněné do designu šatů.
    dress_train_type:
      name: Typ vlečky šatů
      description: Označuje, zda šaty mají vlečku, a délku či typ případné vlečky
        šatů, což napovídá o formálnosti oděvu a vhodnosti pro danou příležitost.
    dried_surface_finish:
      name: Povrchová úprava po zaschnutí
      description: Popisuje typický vzhled povrchu po zaschnutí (lesk/textura).
    drink_tube_insulation:
      name: Izolace picí trubice
      description: Označuje, zda hadička pitného vaku obsahuje izolaci či termonávlek,
        který chrání tekutiny před zahřátím či zamrznutím.
    drive_band_cross_section_shape:
      name: Tvar průřezu hnacího pásu
      description: Tvar profilu hnacího pásu (kulatý, plochý atd.).
    drive_band_join_type:
      name: Typ spojení hnacího řemenu
      description: Označuje, jak je hnací řemen spojen či konstruován (nekonečný/bezešvý
        či vyžadující napojení apod.).
    drive_band_material_type:
      name: Typ materiálu hnacího řemene
      description: Určuje materiál/typ hnacího pásu použitého na kolovrátcích.
    drive_location:
      name: Umístění pohonu
      description: Označuje, kde je setrvačník či hnací mechanismus na eliptickém
        trenažéru umístěn, což ovlivňuje celkové rozměry a pocit z pohybu.
    drive_mechanism:
      name: Pohonný mechanismus
      description: Určuje typ hnacího ústrojí použitého k přenosu výkonu z pedálů
        na setrvačník.
    drive_shaft_material:
      name: Materiál hnací hřídele
      description: Označuje hlavní konstrukční materiál tubusu hnacího hřídele či
        celé sestavy.
    drive_system:
      name: Pohonný systém
      description: Označuje mechanismus, který přenáší sílu z pedálů do brzdného systému.
    drivetrain_configuration:
      name: Konfigurace pohonného systému
      description: Určuje nastavení hnacího ústrojí na kole, zda je zadní náboj pevný,
        volnoběžný s jednou rychlostí nebo překlápěcí.
    drivetrain_speed_compatibility:
      name: Kompatibilita rychlostí hnacího ústrojí
      description: Uvádí rychlosti kazety, pro které je převodník navržen, což zajišťuje
        správný profil a rozteč zubů.
    drone_positioning_system:
      name: Poziční systém dronu
      description: Technologie pozicování/udržování podporovaná dronem pro navigaci
        a stabilní vznášení.
    drone_transmission_type:
      name: Typ přenosu signálu dronu
      description: Primární metoda použitá pro ovládání a/nebo video spojení mezi
        dronem a ovladačem/zařízením.
    drop_spindle_whorl_position:
      name: Poloha přeslenu na ručním vřetenu
      description: Umístění přeslenu na hřídeli.
    drum_carder_accessories_included:
      name: Včetně příslušenství k bubnovému mykacímu stroji
      description: Běžné součásti zahrnuté v sadě bubnové mykačky vlny.
    drum_clamp_locking_mechanism:
      name: Zajišťovací mechanismus svěrky bubnu
      description: Určuje, jak se svorka upevňuje/utahuje k trubce/obruči (např. křídlový
        šroub, šroub s klínem na buben, rychloupínák).
    drum_clamp_mount_interface:
      name: Typ úchytu pro montáž bubnových ráfků
      description: Určuje, co svorka umožňuje pro upevnění příslušenství (např. přijímač
        L-tyče, kulový kloub, naklápěč činelu).
    drum_clamp_type:
      name: Typ bubnové svorky
      description: Určuje funkční styl svorky použitý v montážním hardware pro sadu
        bicích (např. kruhová svorka vs. svorka na trubky/rám).
    drum_head_application_batter_resonant:
      name: Aplikace bubnové hlavy (plátkové/rezonanční)
      description: Určuje, pro kterou stranu/roli je blána na bubnu určena (horní
        hrací plocha vs. spodní rezonanční/strana virblu).
    drum_head_collar_type:
      name: Typ objímky blány bubnu
      description: Určuje, zda má hlava standardní límec, nízký límec nebo speciální
        profil límce, aby odpovídala určitým hranám/skořepinám bubnů.
    drum_head_damping_control:
      name: Ovládání tlumení blány bubnu
      description: Vestavěné funkce ovládání alikvotního tónu nebo styl tlumení zahrnuté
        v konstrukci hlavy.
    drum_head_film_material:
      name: Materiál fólie pro bubnovou blánu
      description: Hlavní materiál blány bubnu (obvykle PET/Mylar, či specifické materiály).
    drum_head_hoop_collar_type:
      name: Typ obruče/límce bubnové blány
      description: Označuje konstrukci obruče a límce blány bubnu (např. profil límce
        či materiál obruče), což může mít vliv na usazení a stabilitu ladění u některých
        korpusů a ráfků.
    drum_head_hoop_rim_material:
      name: Materiál obruče/ráfku blány bubnu
      description: Materiál obruče/rámce (vložené obruče uvnitř blány), který může
        ovlivnit odolnost a stabilitu ladění.
    drum_head_included:
      name: Přiložená blána bubnu
      description: Označuje, zda jsou součástí bubnu blány a/nebo rezonanční blány.
    drum_head_muffling_feature:
      name: Funkce tlumení bubnové blány
      description: Vestavěné funkce ovládání alikvotního tónu integrované do blány
        bubnu.
    drum_head_muffling_type:
      name: Typ tlumení blány bubnu
      description: Označuje, zda blána bubnu obsahuje vestavěné prvky pro ovládání
        alikvotního tónu/tlumení.
    drum_head_ply_count:
      name: Počet vrstev blány bubnu
      description: Počet vrstev materiálu použitých při výrobě blány bubnu (např.
        jednovrstvá, dvouvrstvá).
    drum_head_position:
      name: Poloha blány bubnu
      description: Označuje, zda je blána bubnu určena jako úderová (horní/úderová),
        rezonanční (spodní), blána na stranu virblu (spodní), nebo zda lze použít
        obojím způsobem.
    drum_head_reinforcement_type:
      name: Typ výztuhy hlavy bubnu
      description: Označuje, zda blána pro malý buben obsahuje zpevňující prvky, jako
        je středový terč či tlumicí kroužek pro zvýšení odolnosti a čistší tón.
    drum_head_surface_finish:
      name: Povrchová úprava bubnové blány
      description: Povrchová textura/úprava blány, která ovlivňuje ostrost zvuku a
        odezvu při hře metličkami.
    drum_head_type:
      name: Typ blány bubnu
      description: Určuje konstrukci/typ blány použitý na bubnu (primárně pro úderové/rezonanční
        blány jako dodávané).
    drum_key_design_type:
      name: Typ konstrukce klíče na buben
      description: Popisuje funkční provedení klíče napínacího bubnu (např. standardní,
        ráčnové, T-rukojeť).
    drum_key_drive_type:
      name: Typ pohonu bubnového klíče
      description: Určuje styl pohonu/rozhraní bubnového klíče použitého k zapojení
        napínací tyče nebo montážního hardware.
    drum_key_handle_style:
      name: Styl rukojeti bubnového klíče
      description: Popisuje rukojeť/ergonomický styl bubnového klíče, který ovlivňuje
        pohodlí a pákový efekt při ladění.
    drum_kit_included_items:
      name: Součásti zahrnuté v sadě bicích
      description: Uvádí, jaké hlavní položky jsou součástí balíčku sady bicích kromě
        korpusů/padů (např. hardware, činely, trůn).
    drum_kit_portability:
      name: Přenosnost sady bicích
      description: Označuje, zda je sada určena pro kompaktní skladování/přepravu
        (např. cestovní/kompaktní/skládací).
    drum_kit_shell_construction_features:
      name: Konstrukční vlastnosti korpusu bicích
      description: Způsob konstrukce skořepin (počet/typ vrstev), který ovlivňuje
        tón a trvanlivost.
    drum_mount_clamp_type:
      name: Typ upínací svorky pro montáž na buben
      description: Označuje konstrukční řešení úchytu používaného u montážního hardwaru
        pro bicí.
    drum_multi_clamp_clamp_type:
      name: Typ multiclampu pro bicí
      description: Funkční styl/konfigurace multifunkční svorky (jak upíná a co spojuje).
    drum_mute_material:
      name: Materiál tlumítka na buben
      description: Označuje hlavní materiál tlumítka na buben, který je v kontaktu
        s blánou nebo tlumí vibrace.
    drum_pad_triggering_zones:
      name: Zóny spoušťového bubnu
      description: Označuje počet/typ snímacích zón podporovaných tom padem (např.
        pouze blána či blána + ráfek), což ovlivňuje expresivitu hry a kompatibilitu
        s modulem.
    drum_pedal_accessories_included:
      name: Včetně příslušenství k pedálu bicích
      description: Uvádí hlavní příslušenství a komponenty přiložené k pedálu pro
        bicí.
    drum_pedal_baseplate_type:
      name: Typ základny pedálu k basovému bubnu
      description: Označuje, zda pedál využívá pevnou základní desku či plovoucí/bezrámovou
        konstrukci.
    drum_pedal_bearing_type:
      name: Typ ložiska bubnového pedálu
      description: Určuje mechanismus ložiska použitý v primárních otočných bodech
        (např. vahadlo, pata, vačka).
    drum_pedal_cam_type:
      name: Typ vačkového mechanismu pedálu bicích
      description: Určuje geometrii vačky bicího pedálu, která ovlivňuje pocit a odezvu
        (např. lineární vs. akcelerační).
    drum_pedal_chain_configuration:
      name: Konfigurace řetězu pedálu k basovému bubnu
      description: Určuje uspořádání řetězu používané bicím pedálem s řetězovým pohonem
        (např. jednoduchý řetěz, dvojitý řetěz nebo ofsetový řetěz).
    drum_pedal_chain_type:
      name: Řetězový typ pedálu bicích
      description: Označuje typ řetězu použitého v pohonu (např. válečkový řetěz vs.
        řetěz jízdního kola), který může ovlivnit plynulý chod a trvanlivost.
    drum_pedal_clamp_type:
      name: Typ svorky na bicí pedál
      description: Označuje způsob, jakým se pedál přichycuje k ráfku basového bubnu.
    drum_pedal_intended_use:
      name: Zamýšlené použití bicího pedálu
      description: Označuje primární herní kontext, pro který je řemenový pohonný
        pedál navržen/propagován.
    drum_pedal_spring_adjustment_method:
      name: Způsob nastavení pružiny bubnového pedálu
      description: Označuje, jak se nastavuje napětí pružiny na pedálu.
    drum_pedal_spring_type:
      name: Typ pružiny pedálu bicích
      description: Určuje pružinový mechanismus použitý pro zpětný chod pedálu.
    drum_shell_material:
      name: Materiál korpusu bubnu
      description: Označuje hlavní konstrukční materiál korpusu akustických bubnů
        (např. javor, bříza, akryl).
    drum_shell_wood_species:
      name: Druhy dřeva skořepiny bubnu
      description: Identifikuje druh dřeva použitý pro korpus bubnu, ovlivňující tón
        a rezonanci.
    drumhead_type:
      name: Typ blány bubnu
      description: Konfigurace/typ hlavy použitý na oktobanu.
    drumstick_model:
      name: Model paličky
      description: Standardizované označení modelu/velikosti bubenických paliček používané
        u mnohých značek (např. 5A, 7A).
    drumstick_taper:
      name: Zúžení paličky
      description: Označuje profil zúžení paličky od těla ke špičce, což ovlivňuje
        její odraz a vyvážení.
    drysuit_footwear_style:
      name: Typ obuvi u suchého potápěčského obleku
      description: Popisuje integrovanou úpravu spodní části nohavic suchého obleku
        (např. vestavěné boty, neoprenové ponožky, ponožky nebo těsnění na kotníky).
    dumbbell_style:
      name: Konstrukční typ činky
      description: Označuje základní konstrukční provedení jednoruční činky – zda
        se jedná o pevný odlitek, zda je nastavitelná nebo má hřídel pro nakládací
        činku – což má při nákupu zásadní vliv a dopad na možnosti využití při tréninku.
    dundun_playing_position:
      name: Dundun hrající pozice
      description: Zamýšlená poloha bubnu při hře či přenášení.
    dye_status:
      name: Barevná úprava
      description: Označuje, zda je plstěný materiál barvený, nebarvený/přírodní,
        nebo obsahuje více barev/směsí.
    dye_style:
      name: Barevné provedení
      description: Označuje, zda má niť jednolitou barvu, je vícebarevná/strakatá
        či jinak speciálně obarvená.
    dye_technique:
      name: Technika barvení
      description: Metoda použitá k barvení vlákna (např. ručně barvené, barvené v
        kotli, barvené v prostoru).
    dye_type_needlecraft_fabric:
      name: Typ barviva (látka na vyšívání)
      description: Označuje, zda je lněná tkanina jednobarevná, ručně barvená nebo
        speciálně barvená.
    dyeing_color_processing:
      name: Barvení / zpracování barev
      description: Označuje, zda a jak bylo vlákno barveno (např. nebarvené, bělené/bílé
        či barvené specifickou technikou).
    e_bike_certification_class:
      name: Certifikační třída elektrokola
      description: Určuje oficiální rychlostní index pneumatiky pro elektrická kola
        (např. E-25, E-50).
    e_bike_speed_rating:
      name: Rychlostní třída elektrokola
      description: Uvádí oficiální úroveň certifikace pneumatiky pro elektrokola (např.
        E25 pro ≤25 km/h, E50 pro ≤50 km/h).
    e_scooter_connector_type:
      name: Typ konektoru elektrokoloběžky
      description: Označuje provedení elektrického konektoru či zástrčky použité pro
        přenos napájení či signálu mezi komponenty.
    e_scooter_throttle_type:
      name: Typ páčky plynu elektrické koloběžky
      description: Určuje typ páčky plynu používané k ovládání zrychlení na elektrické
        koloběžce.
    ear_coverage:
      name: Krytí uší
      description: Označuje, zda přilba obsahuje ochranu uší a zda je odnímatelná.
    ear_coverage_style:
      name: Typ zakrytí uší
      description: Popisuje, jak, nebo zda, jsou uši zakryté maskou proti hmyzu.
    ear_coverage_type:
      name: Typ krytí uší
      description: Označuje, jakým způsobem čepice kryje či chrání uši, včetně výskytu
        a typu klapek na uši.
    ear_guard_type:
      name: Typ chrániče sluchu
      description: Popisuje typ chrániče uší integrovaného do čepice, například z
        tvrdého plastu, s vycpávkou nebo odnímatelné chrániče.
    earmuff_style:
      name: Styl chráničů uší
      description: Popisuje, jak se zimní klapky na uši nosí nebo jaké je jejich provedení
        (např. přes hlavu nebo okolo týlu hlavy).
    earring_closure_type:
      name: Typ zapínání náušnice
      description: Určuje mechanismus použitý k upevnění náušnice k uchu (např. zatlačení
        zpět, páčka zpět, spona).
    easel_art_desk_features:
      name: Vlastnosti stojanu a uměleckého stolu
      description: Zdůrazňuje běžné funkční prvky, které jsou součástí stojanu nebo
        uměleckého stolu.
    easel_art_desk_surface_type:
      name: Typ povrchu malířského stojanu a umělecké pracovní plochy
      description: Identifikuje použitelnou plochu (plochy) pro kreslení/psání (např.
        tabule, bílá tabule, role papíru, magnetická tabule).
    eb_clarinet_body_type:
      name: Typ těla klarinetu Eb
      description: Udává, zda se jedná o sopránovou nebo altovou variantu Eb klarinetu.
    eco_material_type:
      name: Typ materiálu z hlediska ekologie
      description: Zdůrazňuje ekologicky šetrnou pěnu nebo materiálovou technologii
        použitou v podložce.
    edge_construction:
      name: Konstrukce hran
      description: Označuje, zda má lyže kovovou hranu vůbec, po části délky nebo
        po celé délce.
    edge_tuner_type:
      name: Typ brousku na hrany
      description: Upřesňuje typ brousku hran lyží nebo snowboardů, například vodítko
        pilníku nebo elektrické zařízení.
    edible_plant_part:
      name: Jedlá část rostliny
      description: Označuje, která část rostliny je prodávána ke konzumaci.
    educational_guide_included:
      name: Součástí je výuková příručka
      description: Označuje, jaké studijní materiály jsou součástí modelu.
    educational_topic:
      name: Vzdělávací téma
      description: Primární téma doplněné o vzdělávací obsah týkající se mravenčí
        farmy.
    egg_component:
      name: Vaječná složka
      description: Určuje, kterou část vajec výrobek obsahuje, například celá vejce,
        pouze bílky, žloutky nebo směsi/náhražky.
    egg_component_replaced:
      name: Nahrazená vaječná složka
      description: Označuje, kterou část vejce má výrobek nahradit (např. celé vejce,
        vejce bílé).
    egg_enrichment:
      name: Přídatné látky ve vejcích
      description: Označuje jakékoli živiny sloužící k obohacení vajec, například
        omega-3 mastné kyseliny nebo vitamín D.
    egg_farming_method:
      name: Způsob chovu nosnic
      description: Označuje použitou metodu produkce nebo chovu vajec (např. bezklecový
        chov, volný výběh, ekologický chov).
    egg_grade:
      name: Jakostní třída vajec
      description: Označuje úroveň kvality stanovenou regulačními nebo oborovými institucemi.
    egg_processing_state:
      name: Stav zpracování vajec
      description: Označuje jakékoli zpracování vajec před prodejem (např. čerstvá,
        solená, century egg).
    egg_production_method:
      name: Metoda produkce vajec
      description: Upřesňuje systém chovu nebo umístění slepic v rámci produkce vajec
        (např. bezklecový chov, volný výběh, ekologický chov).
    egg_replacer_main_ingredient:
      name: Hlavní složka náhražky vajec
      description: Označuje primární základní složku, ze které je náhražka vajec vyrobena,
        což pomáhá spotřebitelům, kteří dodržují speciální dietu nebo vyžadují určité
        vlastnosti při pečení.
    egg_size:
      name: Velikost vajec
      description: Klasifikuje vejce podle standardních označení velikosti trhu.
    egg_source_animal:
      name: Živočišný zdroj vajec
      description: Označuje druh živočicha, od kterého pochází vejce.
    egg_white_processing_method:
      name: Způsob zpracování vaječných bílků
      description: Udává, jak byly bílky po oddělení zpracovány (např. pasterizace,
        sušení rozprašováním), což má vliv na zdravotní nezávadnost potravin, trvanlivost
        a způsob využití.
    eggplant_variety:
      name: Odrůda lilku
      description: Určuje kultivar nebo trhovou odrůdu lilku, umožňuje nakupujícím
        vybrat druhy, které se liší velikostí, chutí, barvou a kulinářským využitím.
    eggshell_color:
      name: Barva vaječné skořápky
      description: Udává převládající barvu skořápky vajec.
    elastic_edge_finish_type:
      name: Elastická úprava/typ okraje
      description: Popisuje strukturu okrajů elastické tkaniny, která má vliv na pohodlí
        a použitelnost.
    elastic_intended_use:
      name: Elastické zamýšlené použití
      description: Hlavní účel, pro který je elastický prvek určen (pomáhá s vyhledáváním
        a snižuje neshody).
    elastic_recovery_performance:
      name: Elastická zotavovací výkonnost
      description: Popisuje, jak dobře se tkaná elastická tkanina po natažení vrací
        do původní délky.
    elastic_recovery_quality:
      name: Kvalita elastického zotavení
      description: Udává, jak rychle se elastický materiál po natažení vrací do původní
        délky.
    elastic_stretch_level:
      name: Stupeň elastického roztažení
      description: O kolik se elastická hmota může natáhnout pod napětím (často vyjádřeno
        jako relativní úrovně, pokud není uvedeno přesné procento).
    elastic_structure:
      name: Elastická struktura
      description: Určuje strukturální provedení gumičky do knoflíkových dírek (např.
        pletená, tkaná, opletená), která může ovlivnit roztažnost, zotavení a výkonnost
        šití.
    elastic_type:
      name: Elastický typ
      description: Určuje typ konstrukce gumy (např. překládaná guma (FOE), pletená,
        tkaná).
    electric_assist_type:
      name: Typ elektrické asistence
      description: Udává, zda má jízdní kolo motorovou asistenci a o jaký druh asistence
        jde.
    electric_bicycle_motor_position:
      name: Poloha motoru elektrického jízdního kola
      description: Umístění motoru na elektrickém kole, například středový pohon,
        přední náboj, zadní náboj nebo oba náboje.
    electric_bike_class:
      name: Třída elektrokol
      description: Kategorizuje elektrokola podle regulačních tříd, které definují
        rychlostní limity a asistenční pohon.
    electric_guitar_bridge_type:
      name: Typ kobylky pro elektrickou kytaru
      description: Určuje typ systému kobylky/vibrata na elektrické kytaře.
    electric_instrument_output_connection_type:
      name: Typ výstupního propojení elektrického nástroje
      description: Určuje fyzický zvukový výstup (propojení) elektrického violoncella.
    electric_riding_vehicle_control_options:
      name: Možnosti ovládání elektrických vozidel
      description: Možnosti ovládání/používání, které má jezdec/rodič k dispozici
        (např. pedál, volant, dálkové ovládání).
    electric_spinning_wheel_speed_control_type:
      name: Regulace otáček elektrického kolovrátku
      description: Popisuje, jak uživatel nastavuje rychlost otáčení elektrického
        kola.
    electric_ukulele_output_jack_type:
      name: Typ výstupního konektoru elektroakustického ukulele
      description: Určuje fyzický výstupní konektor používaný elektrickým ukulele.
    electric_van_body_length_class:
      name: Třída podle délky karoserie elektrických dodávek
      description: Běžná třída velikosti dodávek založená na rozvoru/délce použitá
        v seznamu.
    electric_van_roof_height_class:
      name: Výšková třída střechy elektrické dodávky
      description: Běžná klasifikace výšky střechy dodávkových vozů (zejména užitkových).
    electric_vehicle_drivetrain_layout:
      name: Rozvržení pohonu elektrického vozidla
      description: Konfigurace motoru/nápravy, která popisuje, kolik motorů je umístěno
        a kde se nachází (nad rámec jednoduchého pohonu všech kol/předních/zadních
        kol).
    electric_winder_accessories_included:
      name: Příslušenství k elektrickému navíječi, které je součástí balení
      description: Uvádí příslušenství dodávané s elektrickým navíječem (např. svorky,
        adaptéry).
    electrical_connector_type:
      name: Typ elektrického konektoru
      description: Určuje typ konektoru používaný systémem dveřního zámku/zamykání
        pro elektrickou integraci (pokud je to relevantní).
    electrical_system_voltage:
      name: Napětí elektrické sítě
      description: Udává jmenovité napětí elektrické soustavy vozidla, pro které je
        regulátor navržen.
    electronic_cymbal_trigger_zones:
      name: Spouštěcí zóny elektronického činelu
      description: Udává, kolik samostatných spouštěcích zón má činelový pad (např.
        tělo/obruč/zvon).
    electronic_drum_module_audio_interface_functionality:
      name: Funkce zvukové karty elektronických bicích
      description: Označuje, zda moduly mohou fungovat jako USB audio rozhraní pro
        nahrávání/přehrávání (kromě MIDI).
    electronic_drum_module_metronome_features:
      name: Funkce metronomu elektronických bicích modulů
      description: Určuje vestavěné funkce pro cvičení/metronom.
    electronic_drum_module_power_source:
      name: Zdroj napájení pro elektronické bicí moduly
      description: Určuje požadovaný nebo podporovaný zdroj napájení pro řídicí modul.
    electronic_drum_module_sample_import_support:
      name: Podpora importu samplů u elektronických bicích
      description: Označuje, zda bicí souprava umožňuje uživatelům importovat samply,
        případně jakým způsobem.
    electronic_drum_pad_playing_surface_type:
      name: Typ hrací plochy elektronického bicího padu
      description: Popisuje, jak je navržena hrací plocha tom padu (např. síťková
        nebo gumová blána), což ovlivňuje odskok, průraznost a dojem z úderu.
    electronic_features:
      name: Elektronické funkce
      description: Označuje elektronické/interaktivní prvky zahrnuté v položce Play
        Banking (pokud existují).
    electronic_lights_and_sound:
      name: Elektronická světla a zvuk
      description: Označuje, zda hrací sada s domečkem pro panenky obsahuje elektronická
        světla a/nebo zvukové prvky (např. světla, zvonek u dveří, hudbu, zvukové
        efekty).
    electronics_power_source:
      name: Zdroj energie pro elektroniku
      description: Určuje způsob napájení aktivních elektronických částí (pokud je
        to relevantní).
    eligible_race_series:
      name: Způsobilé závodní série
      description: Závodní série nebo schvalovací orgán, ve kterém je vůz oprávněn
        soutěžit.
    elliptical_trainer_part_type:
      name: Typ součástky eliptického trenažéru
      description: Udává konkrétní druh příslušenství nebo náhradního dílu pro eliptický
        trenažér (např. pás, konzole, pedál), takže si nakupující mohou rychle vyfiltrovat
        položku, kterou potřebují, aniž by museli procházet velké množství podkategorií.
    embellishment_technique:
      name: Technika zdobení
      description: Udává primární dekorativní nebo povrchovou úpravu oděvu, například
        výšivka, potisk nebo korálkové vyšívání.
    embellishment_type:
      name: Typ ozdoby
      description: Určuje typ ozdobného prvku podvazku, například krajka, mašle nebo
        perly.
    embossing_pen_ink_color:
      name: Barva inkoustu pro embosovací pero
      description: Určuje barvu inkoustu naneseného embossovacím perem (čirý/lepkavý
        nebo pigmentovaný). Jde o jiný údaj, než je barva pera/nástroje.
    embossing_stylus_tip_shape:
      name: Tvar hrotu stylusu pro embosování
      description: Popisuje geometrii embossovacího hrotu používaného k vytvoření
        různých efektů (např. kulový vs. špičatý).
    embroidered_coverage_level:
      name: Stupeň krytí vyšívaným materiálem
      description: Přibližné množství vyšívacího vlákna na lícní straně nášivky.
    embroidered_patch_backing_type:
      name: Způsoby aplikace vyšívané nášivky
      description: Nažehlovací/podkladová vrstva na rubové straně vyšívané nášivky,
        která ovlivňuje životnost a způsob aplikace.
    embroidery_hoop_type:
      name: Typ vyšívacího rámečku
      description: Identifikuje konstrukční styl vyšívacího rámečku a jeho primární
        napínací mechanismus.
    embroidery_machine_bobbin_type:
      name: Typ cívky vyšívacího stroje
      description: Typ/způsob vkládání cívky.
    emergency_lighting_configuration:
      name: Konfigurace nouzového osvětlení
      description: Určuje konfiguraci primárního instalovaného nouzového výstražného
        osvětlení na vozidle (např. střešní světelná rampa, světla v mřížce).
    emergency_lighting_package:
      name: Balíček nouzového osvětlení
      description: Určuje typy instalovaných nouzových výstražných světel.
    emissions_compliance_standard:
      name: Norma pro shodu s emisními normami
      description: Označuje homologaci motoru/shodu s emisními normami, pokud je to
        relevantní.
    emissions_standard:
      name: Emisní norma
      description: Norma pro splnění emisních požadavků vozidla (liší se podle oblasti
        a roku).
    enclosure_panel_configuration:
      name: Konfigurace plachty
      description: Určuje, které panely nebo boky krytu jsou zahrnuty (konfigurace
        pokrytí), například plný kryt, pouze boční závěsy nebo 3stranný (otevřený
        přední/zadní).
    enclosure_window_material:
      name: Materiál průhledných oken krytu
      description: Identifikuje materiál použitý pro průhledné okenní panely krytu.
    end_fitting_type:
      name: Typ koncového kování
      description: Typ konektoru použitý na každém konci vzpěry (na straně vozidla
        a na straně víka), určující kompatibilitu montáže.
    end_type:
      name: Typ zakončení
      description: Udává typ zakončení/uchycení na koncích tažného popruhu pro uchycení
        k vyprošťovacím bodům.
    ends_style_blocking_wires:
      name: Styl zakončení (blokovací dráty)
      description: Jak jsou konce blokovacího drátu upraveny pro bezpečnost a snadné
        provlékání okraji krajky.
    enduro_bike_suspension_adjustability:
      name: Nastavitelnost odpružení enduro kola
      description: Označuje, která nastavení odpružení jsou k dispozici (obvykle pro
        přední vidlici a zadní tlumič).
    engine_bay_mounting_location:
      name: Umístění v rámci motorového prostoru
      description: Kde je přepouštěcí nádrž určena k montáži v prostoru motoru (relativní
        poloha).
    engine_bearing_coating:
      name: Povlak ložiska motoru
      description: Popisuje případný povlak ložiska (zvyšující odolnost proti opotřebení,
        pohltivost, snižující tření).
    engine_bearing_position:
      name: Poloha ložiska motoru
      description: Určuje umístění/funkci ložiska v motoru.
    engine_bearing_size:
      name: Velikost ložiska motoru
      description: Určuje, zda se jedná o standardní velikost ložiska nebo o variantu
        s podměrečnou/nadměrnou velikostí (běžně spojováno s broušením klikového hřídele
        a vůlemi).
    engine_configuration:
      name: Konfigurace motoru
      description: Popisuje rozvržení/konfiguraci válců motoru (např. řadový, do V,
        plochý/boxer).
    engine_cooling_type:
      name: Typ chlazení motoru
      description: Udává způsob chlazení motoru.
    engine_degreaser_form:
      name: Odmašťovač motoru
      description: Fyzický formát / dodávaná forma odmašťovače motoru.
    engine_degreaser_rinse_requirement:
      name: Požadavek na oplach po aplikaci odmašťovače motoru
      description: Zda je odmašťovač určen k opláchnutí vodou po aplikaci.
    engine_mount_type:
      name: Typ uložení motoru
      description: Určuje funkční provedení uložení motoru (např. hydraulické, pevné,
        s torzní vzpěrou).
    engine_oil_formulation:
      name: Složení motorového oleje
      description: Označuje zaměření motorového oleje na složení, například standardní
        použití, úprava pro vysoký počet najetých kilometrů, prodloužené intervaly
        výměny oleje nebo aplikace pro vozový park/těžké třídy.
    engine_oil_specification:
      name: Specifikace motorového oleje
      description: Specifikace/norma, kterou olej splňuje (např. API SP, API SN Plus,
        API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Obsah sady pro repasi motoru
      description: Určuje, které hlavní komponenty jsou součástí generální opravy
        motoru.
    engine_rotation_direction:
      name: Směr otáčení motoru
      description: Určuje směr otáčení motoru používaný v námořních aplikacích.
    engine_timing_system_drive_type:
      name: Typ rozvodů motoru
      description: Udává, zda jsou rozvody motoru řešeny řemenem, řetězem nebo ozubenými
        koly, za účelem zajištění kompatibility.
    engine_valve_coating:
      name: Povlak ventilů motoru
      description: Identifikuje jakékoli povrchové úpravy nebo povlaky aplikované
        na ventil z důvodu odolnosti proti opotřebení/tepelné odolnosti.
    engine_valve_position:
      name: Umístění ventilů motoru
      description: Určuje, zda je ventil motoru určen pro sací nebo výfukovou stranu
        motoru.
    engine_valve_stem_tip_type:
      name: Typ zakončení dříku ventilu motoru
      description: Určuje styl nebo konstrukci hrotu dříku ventilu v bodě kontaktu
        s vahadlem nebo seřizovačem.
    engine_valvetrain_type:
      name: Typ ventilového rozvodu motoru
      description: Uspořádání ventilového rozvodu/vačkového hřídele.
    enhancement_level:
      name: Intenzita push-up efektu
      description: 'Přibližné zvýšení objemu, které vložka poskytuje, vyjádřené ve
        velikosti košíčků: Nepatrné (do 1 šálku), Střední (1–2 šálky), Významné (2+
        šálky).'
    entry_zipper_location:
      name: Umístění vstupního zipu
      description: Určuje, kde se nachází primární vstupní zip nebo otvor na obleku
        (např. vpředu, vzadu, na rameni, diagonálně).
    epee_point_type:
      name: Typ hrotu kordu
      description: Určuje značku nebo standard hrotu instalovaného na čepeli, což
        ovlivňuje kompatibilitu a údržbu.
    equestrian_discipline:
      name: Jezdecká disciplína
      description: Určuje jezdeckou disciplínu, pro kterou je ostruha určena nebo
        nejvhodnější.
    equestrian_helmet_safety_certification:
      name: Certifikace bezpečnosti jezdecké helmy
      description: Určuje bezpečnostní normu (normy) nebo certifikace, které helma
        splňuje.
    equine_application_area:
      name: Oblast použití u koní
      description: Upřesňuje část těla nebo materiál, pro který je produkt určen (např.
        kopyto, hříva, jezdecké potřeby).
    equipment_contact_material_brew_wine:
      name: Materiál, ze kterého je vyrobeno zařízení přicházející do kontaktu s potravinami
        (pivo/víno)
      description: Primární materiál položky, který přichází do styku s kapalinou
        (např. sklo, nerezová ocel, plast).
    eu_children_clothing_size:
      name: Velikost dětského oblečení EU
      description: Určuje velikost dětského oblečení EU podle výšky, například 104
        nebo 140
    eu_clothing_size:
      name: Velikost oblečení (EU)
      description: Určuje velikost oděvu podle evropské normy, například 38 nebo 46
    eu_cup_size:
      name: Velikost košíčků v EU
      description: Určuje velikost košíčků podprsenky EU, například C nebo E
    eu_ring_size:
      name: Velikost prstenů v EU
      description: Určuje velikost prstenu EU podle obvodu, například 52 nebo 63
    eu_shoe_size:
      name: Velikost boty v EU
      description: Udává velikost obuvi (EU), například 42 nebo 42 Široká
    euphonium_included_accessories:
      name: Příslušenství k eufoniu
      description: Uvádí položky běžně dodávané s eufoniem (např. náustek, pouzdro).
    euphonium_valve_configuration:
      name: Konfigurace eufoniového ventilu
      description: Udává počet ventilů, a zda je 4. ventil ovládán ručně nebo pomocí
        bočního mechanismu.
    european_sword_historical_period:
      name: Historické období, ze kterého je evropský meč
      description: Primární historické období, na kterém je vzor/replika meče založena
        (nebo doba originálu).
    european_sword_pattern_type:
      name: Evropský vzor/typ meče
      description: Specifický evropský vzor/typ (model), který sběratelský meč představuje.
    ev_connector_adapter_direction:
      name: Směr konektoru/adaptéru pro elektromobily
      description: Určuje, co adaptér převádí z (strana vstupu vozidla) na (strana
        nabíječky/kabelu), což umožňuje přesné filtrování kompatibility.
    ev_conversion_kit_completeness_level:
      name: Úroveň kompletnosti sady pro přestavbu na elektromobil
      description: Udává, zda se jedná o kompletní sadu pro přestavbu na elektromobil,
        nebo o sadu částečnou nebo balíček (např. pouze motor+řídicí jednotka).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfigurace hnacího ústrojí sady pro přestavbu na elektromobil
      description: Popisuje architekturu hnacího ústrojí sady pro přestavbu na elektromobil,
        včetně umístění elektromotoru / rozvržení pohonu a informace, zda je zachována
        stávající převodovka.
    ev_conversion_kit_voltage_class:
      name: Třída napětí sady pro přestavbu na elektromobil
      description: Jmenovitá třída napětí systému (bucket), pro kterou je elektromobil
        navržen. Použijte toto pro filtrování podle běžných tříd napětí systému a
        zároveň pro přesné měření napětí.
    evaporator_core_type:
      name: Typ jádra výparníku
      description: Popisuje konstrukci jádra výparníku autoklimatizace.
    evenweave_fabric_finish_treatment:
      name: Povrchová úprava/varianta vyšívací látky Evenweave
      description: Označuje jakoukoli předběžnou úpravu aplikovanou na látku, která
        ovlivňuje manipulaci nebo vzhled.
    evenweave_fabric_package_format:
      name: Formát balení látky Evenweave
      description: Jak se látka prodává (nastříhané kusy nebo metráž).
    exercise_bike_accessory_part_type:
      name: Typ příslušenství/dílu rotopedu
      description: Popisuje primární funkci nebo typ součásti položky (např. pedál,
        hnací řemen, držák na láhev, kryt displeje, klika).
    exercise_bike_cushion_component:
      name: Součást polštáře rotopedu
      description: Určuje komponentu dodávanou se sedadlem, jako je například podložka
        sedadla, sedlo nebo potah sedadla.
    exercise_bike_metrics_tracked:
      name: Výkonnostní metriky, které rotoped sleduje
      description: Zobrazuje seznam výkonnostních dat, která může počítač měřit a
        zobrazovat v reálném čase.
    exercise_mat_accessories_included:
      name: Příslušenství k podložce na cvičení, které je součástí balení
      description: Popisuje další součásti, které jsou dodávány s podložkou, jako
        jsou popruhy nebo chrániče kolen.
    exhaust_cooling_type:
      name: Typ chlazení výfuku
      description: Označuje, zda je díl výfuku určen pro mokrý výfukový systém (chlazený
        vodou / se vstřikováním vody) nebo pro suchý výfukový systém.
    exhaust_installation_position:
      name: Umístění výfuku
      description: Označuje, kde je díl na vozidle namontován.
    exhaust_outlet_configuration:
      name: Konfigurace výfukového otvoru
      description: Popisuje rozvržení vyústění výfuku v zadní části vozidla.
    expansion_tank_cap_connection_type:
      name: Víčko expanzní nádrže typu propojení
      description: Mechanický způsob propojení používaný k připevnění a utěsnění víčka
        k hrdlu expanzní nádrže.
    expansion_tank_cap_pressure_relief_feature:
      name: Funkce odlehčení tlaku víčka expanzní nádrže
      description: Zda a jak víčko zajišťuje funkci odlehčení tlaku/vakua.
    expansion_tank_cap_seal_material:
      name: Materiál těsnění víčka expanzní nádoby
      description: Materiál těsnění, které dosedá na hrdlo expanzní nádoby.
    extension_attachment_method:
      name: Způsob upevnění prodloužení
      description: Označuje, jak se prodloužení připevňuje k kokpitu/řidítkům jízdního
        kola, což pomáhá jezdcům ověřit kompatibilitu s jejich stávajícím nastavením.
    extension_bend_type:
      name: Typ prodlužovacího ohybu
      description: Popisuje geometrický styl nebo ohyb prodloužení řídítek, který
        ovlivňuje ergonomii a aerodynamiku jezdce.
    extension_mechanism:
      name: Mechanismus rozšíření
      description: Popisuje způsob, jakým lze zvětšit délku nebo povrch desky stolu,
        pokud je to relevantní.
    extension_table_features:
      name: Vlastnosti rozkládacího stolu
      description: Zdůrazňuje funkční vlastnosti specifické pro rozšiřovací stoly
        šicích strojů.
    eyelet_grommet_installation_method:
      name: Způsob instalace oček a průchodek
      description: Určuje, jak je očko/průchodka instalována/upevněna do materiálu.
    eyewear_lens_shape:
      name: Tvar brýlových čoček
      description: Označuje geometrický tvar čočky, například válcový nebo kulový,
        které ovlivňují zorné pole, zkreslení a styl.
    eyewear_strap_material:
      name: Materiál řemínku na brýle
      description: Určuje materiál nastavitelného popruhu, který upevňuje ochranné
        brýle nebo brýle k hlavě uživatele.
    fabric_backing_type:
      name: Typ nažehlovací látky
      description: Určuje, zda potisknutelná bavlna obsahuje stabilizační papírový
        podklad (a jaký), což určuje, zda ji lze tisknout standardními tiskárnami.
    fabric_cut_format:
      name: Formát střihu látky
      description: Určuje střih/formát plátna pro vyšívání.
    fabric_end_use:
      name: Konečné použití tkaniny
      description: Identifikuje primární zamýšlené použití látky (k čemu se nejlépe
        hodí).
    fabric_finish:
      name: Povrchová úprava látky
      description: Povrchová úprava/varianta aplikovaná na hedvábnou tkaninu ovlivňující
        lesk, pocit na omak a životnost.
    fabric_intended_use:
      name: Účel použití látky
      description: Primární doporučené aplikace/projekty pro lněnou tkaninu.
    fabric_opacity_level:
      name: Stupeň neprůhlednosti látky
      description: Udává průhlednost látky, a tedy zda může být nutné ji vrstvit nebo
        podšít.
    fabric_patch_shape:
      name: Tvary textilních záplat
      description: Popisuje tvary záplat, které jsou součástí sady.
    fabric_repair_kit_application_method:
      name: Způsob aplikace opravné sady na tkaniny
      description: Určuje, jak je oprava nanesena na látku (např. nažehlováním, přišíváním,
        lepením).
    fabric_repair_kit_components_included:
      name: Součástí balení jsou i součástky pro opravu látek
      description: Uvádí konkrétní součásti sady (např. záplaty, nit, jehla, lepidlo).
    fabric_repair_kit_intended_use:
      name: Účel použití opravné sady na tkaniny
      description: Určuje obvyklý typ oprav, pro který je sada určena (např. trhliny,
        díry, lemování).
    fabric_selling_format:
      name: Prodávaný formát látek
      description: Určuje, jak se látka prodává (souvislá délka, předřezaný kus, role/šroub
        nebo vzorek).
    fabric_stretch_level:
      name: Míra pružnosti látky
      description: Popisuje stupeň roztažnosti/elasticity látky a pomáhá nakupujícím
        vybrat vhodné látky pro přiléhavé oděvy nebo strukturované projekty.
    fabric_stretch_type:
      name: Typ pružné tkaniny
      description: Označuje pružnost materiálu kraťasů, která je důležitá z hlediska
        pohyblivosti při surfování nebo plavání.
    fabric_texture:
      name: Textura látky
      description: Popisuje, jak látka, z níž je košilka vyrobena, působí na omak
        a jakou má strukturu.
    fabric_use_case:
      name: Typy použití látky
      description: Primární účel použití kusu/štůčku saténové látky.
    fabric_weight_class:
      name: Gramáž látky
      description: Kategorizuje flanel podle typických použití s ohledem na gramáž,
        aby nakupující mohli filtrovat, aniž by znali přesnou gramáž v g/m2
        (oz/yd2).
    face_mask_material:
      name: Materiál roušky
      description: Materiálové složení obličejové masky, která je součástí helmy nebo
        je s ní kompatibilní.
    face_mask_style:
      name: Styl roušky
      description: Definuje celkový tvar nebo konstrukční styl módní obličejové masky
        a pomáhá nakupujícím najít preferovaný střih a estetiku.
    face_mask_style_code:
      name: Kód stylu obličejové masky
      description: Definuje styl strukturálního pruhu nebo rodinu průmyslových kódů
        obličejové masky (např. ROPO, OPO, RJOP).
    face_protection_type:
      name: Typ ochrany obličeje
      description: Označuje typ ochrany obličeje dodávané s helmou nebo zabudované
        do ní, například ochranné štíty nebo hledí.
    faceplate_security_features:
      name: Bezpečnostní prvky čelního panelu
      description: Zachycuje funkce odstrašování proti krádeži a přístupu související
        s čelním panelem, nad rámec základního designu.
    facing_length:
      name: Délka dráhy
      description: Určuje délku oblouku (délku zakřivení) náustku, což ovlivňuje odezvu
        a výběr jazýčku.
    fan_shroud_type:
      name: Typ krytu ventilátoru
      description: Určuje styl krytí/geometrie pláště ventilátoru (např. plný vs.
        poloviční vs. kruhový).
    farming_method:
      name: Metoda hospodaření
      description: Zdůrazňuje dobré životní podmínky zvířat nebo hospodářské postupy
        používané při chovu zvířat, jako je volný výběh nebo ekologický chov.
    farming_practice:
      name: Způsob pěstování
      description: Identifikuje primární metodu pěstování použitou pro produkt (např.
        konvenční, organická, hydroponická).
    fascinator_style:
      name: Styl fascinátora
      description: Popisuje provedení nebo tvar fascinátoru, takže nakupující můžou
        rychle filtrovat podle oblíbených stylů klobouků.
    fastener_grade:
      name: Druh spojovacího prvku
      description: Označuje pevnostní stupeň/třídu šroubu, například třída 8 nebo
        třída 10.9, která určuje mechanické vlastnosti šroubu.
    fat_rendering_state:
      name: Stav škvaření tuku
      description: Určuje, zda je tuk vyškvařený, neškvařený (syrový) nebo částečně
        vyškvařený, což ovlivňuje trvanlivost a kulinářské aplikace.
    fat_source:
      name: Zdroj tuku
      description: Identifikuje primární zdroj tuku použitého k výrobě másla, ghí
        nebo margarínu (živočišného nebo rostlinného), což podporuje filtrování alergenů
        a stravy.
    faucet_hole_configuration:
      name: Konfigurace otvorů pro baterii
      description: Označuje počet a umístění předvrtaných otvorů pro baterii na vrchní
        desce umyvadla.
    feather_application:
      name: Aplikace z peří
      description: Primární účel použití nebo aplikace krocaního peří v rámci tvoření
        a vyrábění.
    feather_attachment_format:
      name: Uchycení/formát peří
      description: Jak se syntetické peří připravuje/prodává k použití (volně, na
        šňůrce, na pásce atd.).
    feather_coloration_style:
      name: Styl zbarvení peří
      description: Popisuje, jak je barva nanesena / jaký tvoří na peříčcích efekt
        (např. jednolitá, barvení na konečcích, barevné přechody), bez ohledu na základní
        hodnotu barvy.
    feather_component:
      name: Složka peří
      description: Určuje, která část/styl pavího pera se prodává (např. oční pero
        vs. paví pero).
    feather_curvature:
      name: Zakřivení peří
      description: Celkový tvar/profil zakřivení pera.
    feather_finish:
      name: Úprava peříček
      description: Označuje, zda jsou pštrosí peří přírodní, nebo zda byla zpracována
        (např. barvena nebo bělena) pro dekorativní účely.
    feather_form:
      name: Tvar peří
      description: Určuje fyzickou formu prodávaných kusů husího peří.
    feather_grade:
      name: Jakost peří
      description: Celková kvalita/výběrová třída peří pro kreativní využití vs. pro
        vystavení.
    feather_part:
      name: Součást pera
      description: Část/struktura prodávaného krocaního peří (běžné v nabídkách potřeb
        pro tvoření a vázání mušek).
    feather_processing_type:
      name: Typ zpracování peří
      description: Jak bylo peří zpracováno/ošetřeno pro kreativní použití (např.
        barvené, bělené, přírodní/nebarvené).
    feather_product_form:
      name: Forma produktu z peří
      description: Fyzická forma/střih peří, jak se prodává (např. volné peří vs.
        boa vs. třásně).
    feather_quantity_unit:
      name: Jednotka množství peří
      description: Definuje, jak se produkt prodává (např. po kusech, na váhu, po
        svazcích), za účelem snadnějšího porovnání nabídek.
    feather_source:
      name: Zdroj peří
      description: Uvádí živočišný zdroj peří použitého v péřových míčcích.
    feather_stiffness:
      name: Tuhost peří
      description: Relativní tuhost/pevnost větviček/struktury.
    feed_mechanism:
      name: Podávací mechanismus
      description: Označuje, jak jsou míče přiváděny do nadhazovacího stroje.
    feed_purpose:
      name: Účel krmení
      description: Popisuje primární nutriční nebo funkční cíl krmiva nebo doplňku
        stravy.
    feeder_mechanism_type:
      name: Typ podávacího mechanismu
      description: Identifikuje dávkovací mechanismus, který podavač používá k uvolňování
        krmiva.
    feijoa_cultivar:
      name: Kultivar feijoa
      description: Identifikuje konkrétní kultivar nebo odrůdu feijoa, protože různé
        kultivary nabízejí odlišné chutě, velikost a dobu sklizně.
    felt_duty:
      name: Plsť cla
      description: Určuje klasifikaci plsti tenisového míčku (např. extra duty, regular
        duty), která ovlivňuje jeho životnost na různých površích.
    felting_mold_intended_use:
      name: Účel použití plstící formy
      description: Jaký tvar má forma vytvořit nebo k čemu má být při plstění použita.
    felting_pad_surface_material:
      name: Materiál povrchu plsticí podložky
      description: Materiál použitý na pracovní ploše plstěné podložky/rohože, která
        je v kontaktu s vláknem/jehlou.
    fencing_certification:
      name: Certifikace šermířského vybavení
      description: Uvádí oficiální schválení řídících orgánů, která šermířská zbraň
        splňuje (např. FIE, USFA), s uvedením legality soutěží a standardů kvality.
    fencing_connector_type:
      name: Typ konektoru fleretové šňůry
      description: Určuje konfiguraci konektorů použitou k připojení plotových šňůr,
        zásuvek nebo cívek (např. 2připojení, 3připojení, bajonet) a zajišťuje tak
        kompatibilitu komponent.
    fencing_discipline:
      name: Disciplína sportovního šermu
      description: Určuje šermířskou zbraň nebo disciplínu, pro kterou je produkt
        navržen nebo s níž je kompatibilní.
    fencing_weapon_type:
      name: Typ šermířské zbraně
      description: Určuje styl šermířské nebo cvičné zbraně, se kterým je tréninková
        pomůcka kompatibilní nebo který reprezentuje, a pomáhá uživatelům najít vhodné
        vybavení.
    fender_finish_state:
      name: Stav povrchové úpravy blatníku
      description: Označuje povrch/konečnou úpravu dodaného blatníku, a zda je připraven
        k lakování a montáži.
    fender_pieces_included:
      name: Součástí balení jsou kryty blatníků
      description: Uvádí seznam komponentů dodávaných s produktem, aby bylo možné
        objasnit, zda se jedná o jeden blatník nebo o kompletní sadu s příslušenstvím.
    fender_type:
      name: Typ blatníku
      description: Popisuje celkový design nebo styl blatníku.
    fennel_trimming:
      name: Ořezávání fenyklu
      description: Označuje, které části rostliny patří k cibuli fenyklu (např. s
        listy, oříznutým vrcholem a kořenem).
    fennel_variety:
      name: Odrůda fenyklu
      description: Určuje kultivar nebo tržní odrůdu prodávaných bulv fenyklu.
    fermentation_application:
      name: Fermentační aplikace
      description: Označuje primární potravinu nebo nápoj, jehož fermentaci má kultura
        zajistit (např. sýr, jogurt, mléčný kefír, kvásek).
    fermentation_method:
      name: Fermentační metoda
      description: Uvádí, jak byla sójová omáčka vyrobena nebo fermentována (např.
        přirozeně vařená, chemicky hydrolyzovaná).
    fermentation_vessel_material:
      name: Materiál fermentační nádoby
      description: Primární materiál fermentační nádoby, která je součástí sady (pokud
        existuje).
    ferrule_material:
      name: Materiál ferule
      description: Určuje materiál použitý pro objímku hřídele (např. Juma, fenolický,
        polykarbonát, XTC nebo žádný), ovlivňující odolnost a pocit při úderu.
    fia_homologation_certification:
      name: Homologace/certifikace FIA
      description: Označuje, zda je vůz (nebo karoserie) certifikován/homologován,
        případně podle jaké normy.
    fiber_animal_source_type:
      name: Typ/zdroj textilního vlákna
      description: Živočišný nebo primární zdroj, ze kterého pochází přást (popřípadě
        zda je ze syntetického materiálu), jako je merino vlna, alpaka nebo rostlinná
        vlákna.
    fiber_luster_level:
      name: Úroveň lesku tkaniny
      description: Vizuální lesk vlákna, od matného až po vysoký lesk.
    fiber_preparation_processing_stage:
      name: Fáze přípravy/zpracování vláken
      description: Označuje, jak byl pramen vláken připraven/zpracován k použití (např.
        mykaný vs. česaný, směsný, superwash).
    fiber_preparation_type:
      name: Typ přípravy vlákna
      description: Identifikuje, jak bylo vlákno připraveno pro kreativní zpracování
        (např. česaný pramen, bubnový pramen, předplstěný arch).
    field_hockey_ball_playing_surface:
      name: Hrací plocha pro pozemní hokej
      description: Označuje hrací plochu nebo prostředí, pro které je míč určen.
    field_hockey_ball_type:
      name: Typ míče na pozemní hokej
      description: Kategorizuje míč na pozemní hokej podle jeho zamýšleného použití
        nebo speciální vlastnosti.
    field_hockey_goal_size_standard:
      name: Standardní rozměry branky na pozemní hokej
      description: Klasifikuje gól podle běžných standardů pozemního hokeje nebo tréninkové
        velikosti (např. venkovní předpisy FIH, mládežnická, mini).
    field_hockey_training_objective:
      name: Cíl tréninku pozemního hokeje
      description: Definuje primární dovednost nebo oblast zaměření, kterou má tréninková
        pomůcka zlepšit.
    field_point_attachment_method:
      name: Metoda připojení bodu pole
      description: Označuje, jak je hrot šípu upevněn k dříku nebo vložce (např. šroubováním,
        lepením).
    field_point_tip_style:
      name: Styl hrotu polního bodu
      description: Definuje geometrii nebo funkční profil hrotu, které mají vliv na
        průraznost, snadnost vyjmutí a legálnost.
    fielding_glove_position:
      name: Pozice v poli
      description: Označuje obrannou pozici nebo účel použití, pro které je rukavice
        během hraní baseballu nebo softballu určena.
    fielding_training_focus:
      name: Zaměření tréninku v poli
      description: Určuje primární oblast dovednosti, na kterou se pomůcka zaměřuje
        během nácviku.
    fig_variety:
      name: Odrůda fíků
      description: Určuje konkrétní kultivar nebo odrůdu prodávaných fíků.
    figure_8_device_design:
      name: Design zařízení osmičky
      description: Určuje specifickou konfiguraci zařízení na obrázku 8, která má
        vliv na manipulační vlastnosti a účel použití.
    figure_finish_type:
      name: Typ dokončení figurky
      description: Označuje povrchovou úpravu/lakování figurky koně (jak vypadá/působí
        jako sběratelský předmět).
    figurine_scale:
      name: Měřítko figurky
      description: Měřítko/poměr velikosti figurky vůči skutečné předloze (pokud existuje),
        např. 1:6.
    fill_status:
      name: Stav naplnění
      description: Označuje, zda se drapák prodává předem naplněný, nenaplněný nebo
        částečně naplněný, což určuje náklady na dopravu a kupní úsilí.
    filling_consistency:
      name: Konzistence náplně
      description: Popisuje texturu nebo viskozitu náplně, jak je dodávána (např.
        hladký krém, kousky ovoce, pasta).
    filling_type:
      name: Typ náplně
      description: Označuje hlavní náplň nebo krém uvnitř sušenky, pokud existuje.
    filtration_and_mother_status:
      name: Filtrace a stav octové matky
      description: Označuje, zda je ocet filtrovaný, nefiltrovaný, syrový nebo obsahuje
        „matku“, a je určen pro spotřebitele hledající probiotické nebo syrové varianty.
    filtration_method:
      name: Filtrační metoda
      description: Materiál nebo technika používaná k filtraci a úpravě vodky po destilaci.
    fin_box_system:
      name: Systém ploutví
      description: Určuje krabici s žebry nebo montážní rozhraní, které deska používá,
        a určuje tak kompatibilitu žeber s náhradními díly.
    fin_buoyancy:
      name: Vztlak ploutví
      description: Udává, zda mají ploutve pozitivní, neutrální nebo negativní vztlak,
        což má vliv na udržení těla v trimu a rovnováhu výstroje.
    fin_flex_rating:
      name: Hodnocení pružnosti ploutve
      description: Udává relativní tuhost nebo úroveň pružnosti ploutve, která ovlivňuje
        celkovou výkonnost.
    fin_mounting_system:
      name: Systém upevnění ploutve
      description: Popisuje použitý systém nebo typ nasazení ploutvičky na kiteboard
        (např. FCS II, šroubovací, na 4 šrouby) za účelem zajištění kompatibility
        ploutviček a kiteboardů.
    fin_position:
      name: Poloha ploutvičky
      description: Určuje zamýšlenou montážní polohu žebra na desce.
    fin_strap_type:
      name: Typ uchycení ploutve
      description: Určuje styl řemínku nebo zajišťovacího systému použitého k upevnění
        ploutve k patě/chodidlu.
    fin_template:
      name: Vzor ploutvičky
      description: Kategorizuje hydrodynamickou šablonu nebo obrys ploutve surfového
        prkna, ovlivňující styl otáčení, rychlost a celkový pocit z jízdy na prkně.
    finger_count:
      name: Počítání prstů
      description: Označuje počet prstů, které má rukavice, karta nebo uvolňovací
        rukojeť podporovat.
    finger_coverage:
      name: Krytí prstů
      description: Ukazuje, jak velká část prstů je zakryta.
    finger_grip_adjustability:
      name: Nastavitelnost gripu na prsty
      description: Označuje, jak se úchop pro prsty připevňuje nebo přizpůsobuje různým
        velikostem ruky.
    finger_hole_configuration:
      name: Uspořádání otvorů pro prsty
      description: Určuje orientaci otvorů pro prsty v ruce (pro praváky, leváky nebo
        pro praváky i leváky).
    finger_hole_count:
      name: Počet otvorů pro prsty
      description: Udává počet otvorů pro prsty v kůži gripu, což je klíčový údaj
        odlišující modely bez prstů od modelů se 2, 3 a 4 otvory.
    finger_pick_band_style:
      name: Styl trsátka
      description: Typ řemínku/poutka, který se navléká na prst, ovlivňuje pohodlí
        a nastavitelnost.
    finger_pick_blade_length:
      name: Délka plochy trsátka
      description: Délka čepele vyčnívající z pásku.
    finger_pick_blade_shape:
      name: Tvar čepele prstového trsátka
      description: Tvar/profil čepele, která se dotýká strun.
    finger_pick_size:
      name: Velikost trsátka
      description: Velikost pásku/smyčky trsátka pro různé obvody prstů nebo palců
        (ne velikost nástroje).
    finger_pick_wear_location:
      name: Místo nošení prstového trsátka
      description: Označuje, na kterém prstu je trsátko určeno k nošení, nebo zda
        se jedná o sadu palce a prstu.
    finger_protection:
      name: Ochrana prstů
      description: Označuje, zda rukavice obsahuje ochranu prstů a hřbetů prstů a
        zda jsou hřbety odnímatelné.
    fingerboard_bearing_type:
      name: Typ ložiska hmatníku
      description: Určuje typ ložiska použitého v kolečkách na fingerboard.
    fingerboard_grip_type:
      name: Typ úchopu na hmatníku
      description: Určuje materiál/typ povrchu použitý na desce fingerboardu.
    fining_agent_active_ingredient:
      name: Aktivní složka zjasňujícího činidla
      description: Primární čiřicí nebo zjasňující činidlo použité ve výrobku.
    fining_agent_type:
      name: Typ čeřidla
      description: Udává chemické složení čiřidla/čiřícího prostředku nebo materiálu
        produktů, které se používají k čiření červeného vína.
    finish_after_baking:
      name: Konečná úprava po vypálení
      description: Popisuje typický vzhled povrchu po vytvrzení/vypálení.
    finish_effect:
      name: Dokončovací efekt
      description: Popisuje speciální povrchové/optické efekty aplikované na kamínky.
    finish_type:
      name: Typ povrchové úpravy
      description: Konečná úprava povrchu těla ukulele.
    finished_product_format:
      name: Formát dokončeného produktu
      description: Určuje typ vonného produktu, který je sada určena k výrobě.
    fire_pit_accessories_included:
      name: Včetně příslušenství k ohništi
      description: Uvádí seznam důležitých doplňků dodávaných s ohništěm, jako jsou
        ochranné kryty nebo lávové kameny, který jasně ukazuje, co je v krabici.
    firework_assortment_launch_type:
      name: Typ odpalu zábavní pyrotechniky
      description: Popisuje, jak se obvykle odpalují ohňostroje, které jsou součástí
        balení.
    firework_assortment_types_included:
      name: Typy zábavní pyrotechniky, které jsou součástí balení
      description: Identifikuje primární typy ohňostrojů obsažené v sortimentu, aby
        pomohl nakupujícím porovnávat obsah balíčku (např. fontány, římské svíčky,
        petardy).
    firework_effect_types:
      name: Typy ohňostrojných efektů
      description: Primární skupiny vizuálních a/nebo senzorických efektů produkovaných
        sortimentem (vyberte všechny, které se hodí).
    firework_ignition_method:
      name: Způsob odpalu ohňostroje
      description: Udává, jak se zábavní pyrotechnika odpaluje (např. zápalnou šňůrou
        nebo elektrickým odpalovačem).
    firework_visual_intensity_level:
      name: Úroveň vizuální intenzity ohňostroje
      description: Celková vizuální intenzita/objem jisker pro efekt fontány.
    firing_mode:
      name: Režim střelby
      description: Uvádí volitelné nebo primární režimy střelby pro airsoftovou zbraň.
    first_day_cover_cachet_type:
      name: Typ razítka na obálce prvního dne
      description: Typ přítisku na obálce prvního dne (např. tištěný, ručně malovaný).
    first_day_cover_cancellation_type:
      name: Typ razítka na obálce prvního dne
      description: Typ/způsob poštovního razítka použitého na obálce prvního den (např.
        strojové razítko, ruční razítko).
    first_day_cover_set_type:
      name: Typ sady obálek prvního dne
      description: Označuje, zda obálka představuje jednu edici, celou sadu nebo podmnožinu/kombinaci.
    fishing_hook_size:
      name: Velikost rybářského háčku
      description: Udává standardizované označení velikosti rybářského háčku (např.
        č. 4, 1/0, 10/0), což pomáhá rybářům vybrat správný rozměr háčku pro daný
        druh ryby a návnady.
    fishing_hook_style:
      name: Typ rybářského háčku
      description: Označuje specifický typ nebo vzor zahnutí očka, což má vliv na
        vzhled, sílu záseku a účel použití.
    fishing_hook_type:
      name: Typ rybářského háčku
      description: Popisuje konfiguraci háčku dodávaného s rybářskou lžící (pokud
        existuje).
    fishing_line_application:
      name: Aplikace rybářského vlasce
      description: Udává účel použití vlasce nebo návazcového materiálu (např. návazec,
        hlavní vlasec, tippet).
    fishing_line_buoyancy_type:
      name: Typ vztlaku vlasce
      description: Klasifikuje chování vlasce ve vodě (např. plovoucí, středně plovoucí,
        potápivý), což pomáhá rybářům zvolit vhodnou hloubkovou prezentaci.
    fishing_needle_purpose:
      name: Účel rybářské jehly
      description: Označuje primární účel použití jehly při zhotovování udice.
    fishing_needle_types_included:
      name: Zahrnuté typy rybářských jehel
      description: Uvádí konkrétní styly jehel nebo rigovacích nástrojů dodávaných
        v sadě, aby si zákazníci mohli rychle prohlédnout obsah sady.
    fit_profile:
      name: Profil přizpůsobení
      description: Popisuje celkový střih a siluetu vložky, která ovlivňuje pohyblivost
        a zakrytí.
    fit_volume_classification:
      name: Klasifikace objemu přizpůsobení
      description: Kategorizuje celkový vnitřní objem boty podle značek (např. LV
        pro nízký objem).
    fitting_angle:
      name: Úhel montáže
      description: Určuje úhel ohybu tělesa tvarovky (např. rovný, 45°, 90°). Pro
        armatury s proměnným úhlem použijte možnost „Nastavitelné / otočné“ a pro
        neobvyklé úhly možnost „Jiné“.
    flag_base_type:
      name: Typ základny vlajky
      description: Definuje ukotvení nebo základní styl použitý k zajištění rohové
        praporky na různých hracích površích.
    flag_design_theme:
      name: Motiv na vlajce
      description: Popisuje primární motiv znázorněný na vlajce (např. země/národ,
        sportovní tým, svátek), což podporuje vyhledávání a filtrování při nakupování
        podle záměru.
    flag_mounting_method:
      name: Způsob upevnění vlajky
      description: Určuje, jak se vlajka připevňuje k vozidlu (např. pomocí anténního
        držáku, držáku na tažné zařízení, magnetického upevnění).
    flag_type:
      name: Typ vlajky
      description: Klasifikuje konkrétní účel nebo styl golfové vlajky, například
        připnutá vlajka, vlajka košík nebo cvičná vlajka.
    flame_resistance_standard:
      name: Norma pro odolnost proti plameni
      description: Označuje specifickou normu/certifikaci nehořlavosti nebo odolnosti
        proti obloukovému výboji, kterou oděv splňuje.
    flamenco_cajon_snare_system:
      name: Strunění u flamencového cajonu
      description: Popisuje vnitřní mechanismus strunění, který se používá k vytvoření
        charakteristického flamencového drnčení (pokud existuje).
    flammability_compliance:
      name: Shoda s požadavky na hořlavost
      description: Upřesňuje příslušnou třídu hořlavosti, do které textilie spadá
        s ohledem na použití v interiéru vozidel.
    flannel_brushing_finish:
      name: Flanelová kartáčovaná povrchová úprava
      description: Označuje, zda je flanel kartáčovaný a na které straně (stranách),
        což ovlivňuje měkkost, teplo a vzhled.
    flannel_use_type:
      name: Typ použití flanelu
      description: Primární účel použití kusu/štůčku flanelu.
    flap_configuration:
      name: Uspořádání klapek
      description: Udává typ bočnice sedla, například jednobočnicové nebo dvoubočnicové.
    flare_color:
      name: Barva světlice
      description: Barva vyzařovaného světla/plamene (nebo barva čočky u LED světlic).
    flash_card_included_features:
      name: Prvky výukových karet
      description: Zdůrazňuje funkční vlastnosti učení/používání, které jsou součástí
        flash karet.
    flavor_intensity:
      name: Intenzita chuti
      description: Udává, jak koncentrovaný je ochucovací produkt, což pomáhá uživatelům
        určit vhodné dávkování (např. standardní síla, super síla).
    flavor_solvent_base:
      name: Základ rozpouštědla pro aroma
      description: Označuje primární nosič nebo rozpouštědlo použité v ochucovadle
        (např. alkohol, propylenglykol, glycerin).
    fleece_fiber_animal_type:
      name: Typ zvířete pro vlákno rouna
      description: Živočišný zdroj rouna (druh).
    fleece_finish_surface:
      name: Flísová úprava / povrch
      description: Popisuje povrch/konečnou úpravu rouna (např. protižmolková, kartáčovaná),
        která má vliv na žmolkování, životnost, měkkost a vzhled.
    fleece_preparation_method:
      name: Metoda přípravy rouna
      description: Jak se rouno připravuje/zpracovává pro ruční tvorbu a předení (stav
        vlákna).
    flesh_color:
      name: Barva dužniny
      description: Určuje vnitřní barvu dužiny melounu.
    fletching_orientation:
      name: Orientace letek
      description: Určuje, jak jsou opeření nastavena na dříku (např. rovně, odsazeně,
        spirálovitě), což ovlivňuje rotaci a let šípu.
    fletching_profile:
      name: Profil opeření
      description: Definuje geometrický tvar nebo řez opeření, které ovlivňují odpor
        vzduchu, vůli, hluk a celkové letové vlastnosti šípu.
    flight_system_type:
      name: Typ letového systému
      description: Identifikuje konstrukční styl letu a rozlišuje mezi skládacími,
        lisovanými a integrovanými systémy letu a hřídele.
    float_attachment_method:
      name: Způsob upevnění plováku
      description: Popisuje, jak je splávek upevněn na vlasci (např. průběžná montáž
        nebo pevný splávek), což rybářům umožňuje filtrovat podle typu montáže.
    float_design:
      name: Design plováku
      description: Klasifikuje celkový styl nebo typ rybářského splávku (např. bobber,
        waggler, pencil), aby si rybáři mohli rychle vybrat model vhodný pro jejich
        techniku a podmínky.
    float_raft_use_environment:
      name: Prostředí, kde se plovák/raft používá
      description: Primární zamýšlené vodní prostředí pro nafukovací produkt (bazén
        vs. klidná otevřená voda vs. vlny), odrážející očekávání v oblasti odolnosti
        a designu.
    floatation:
      name: Plovatelnost
      description: Zda je maják navržen tak, aby plaval ve vodě.
    floor_construction_type:
      name: Typ podlahové konstrukce
      description: Popisuje konstrukci dna raftu (např. samovylévací, drop-stitch),
        která má vliv na odtékání vody, tuhost a výkon.
    floor_design:
      name: Návrh podlahy
      description: Styl podlahové krytiny dodávané s výběhem.
    floor_inclusion:
      name: Zahrnutí podlahy
      description: Udává, zda má předsíň podlahu, případně zda je tato podlaha odnímatelná.
    floor_mat_cleaning_method:
      name: Metoda čištění podlahových rohoží
      description: Označuje výrobcem doporučenou primární metodu čištění autokoberců.
    floor_mat_edge_style:
      name: Styl okraje podlahové rohože
      description: Popisuje, zda má rohož vyvýšené okraje/lem pro zachycení rozlitých
        tekutin a nečistot.
    floor_mat_format:
      name: Formát podlahové rohože
      description: Definuje fyzický formát nebo styl produktu na ochranu podlahy (např.
        jednoduchá rohož, propojovací dlaždice, role).
    floor_mat_retention_system:
      name: Způsob přichycení autokoberců
      description: Určuje metodu použitou k udržení rohože na místě.
    floor_mat_set_configuration:
      name: Konfigurace sady podlahových rohoží
      description: Udává, pro která místa jsou položky obsažené v balení určeny (např.
        pouze přední pár, kompletní sada).
    floss_sugar_granulation_grade:
      name: Stupeň krystalizace cukru na cukrovou vatu
      description: Popisuje velikost krystalů cukerné směsi (jemná, střední, hrubá),
        která může ovlivnit výkonnost stroje a konečnou texturu.
    floss_sugar_product_form:
      name: Forma produktu cukru na cukrovou vatu
      description: Udává, zda je cukrová vata připravena k použití, zda se jedná o
        koncentrované ochucovadlo, které je nutné smíchat se základním cukrem, nebo
        o bezbarvý základní cukr.
    flour_grind_texture:
      name: Textura mletí mouky
      description: Označuje velikost mletí nebo texturu mouky, například superjemné,
        střední, hrubé nebo kamenné mletí, což může ovlivnit výkonnost receptu.
    flour_processing_method:
      name: Způsob zpracování mouky
      description: Zachycuje významné metody zpracování nebo varianty použité na mouku
        (např. mletí na kamenech, bělení, naklíčení, obohacování), které ovlivňují
        chuť, barvu nebo nutriční hodnoty.
    flower_care_instructions:
      name: Pokyny pro péči o květiny
      description: Poskytuje doporučené kroky péče specifické pro čerstvé řezané květiny
        (např. zastřihování stonků, změna frekvence zalévání).
    flugelhorn_leadpipe_material:
      name: Materiál, ze kterého je vyrobena ústnice křídlovky
      description: Materiál součásti náústku pokud je uveden odlišně od materiálu
        celého nástroje).
    flugelhorn_trigger_type:
      name: Typ spouštěče křídlovky
      description: Označuje, zda křídlovka obsahuje ladicí spouštěc a který šoupátko/ventil
        ovládá.
    fluorescence_grade:
      name: Fluorescenční stupeň
      description: Udává intenzitu fluorescence diamantu při vystavení UV záření.
    fluorescence_under_uv:
      name: Fluorescence pod UV zářením
      description: Udává, zda/jaký druh fluorescence vzorek vykazuje pod ultrafialovým
        světlem.
    fluorocarbon_content:
      name: Obsah organofluoridů
      description: Označuje, zda vosk obsahuje fluorokarbonové přísady a v jakém množství.
    flute_case_capacity:
      name: Kapacita pouzdra na flétnu
      description: Udává, k čemu je pouzdro (kromě hlavního těla flétny) určeno (např.
        flétna + pikola, extra hlavice).
    flute_cleaning_rod_tip_type:
      name: Typ hrotu čisticí tyčinky na flétnu
      description: Popisuje konstrukci zakončení tyčky, které drží hadřík/tampon nebo
        se dotýká nástroje (např. s drážkou, vláknem, očkem).
    flute_footjoint_type:
      name: Typ nožky flétny
      description: Určuje konfiguraci paty flétny.
    flute_headjoint_cork_type:
      name: Typ korkové zátky hlavice flétny
      description: Určuje materiál/typ sestavy korku/zátky hlavového kloubu dodávané
        s hlavovým kloubem.
    flute_key_system:
      name: Systém klapek na flétně
      description: Označuje mechanický systém / soustavu klapek flétny (např. Boehmův
        systém), pokud je relevantní.
    flute_keywork_material:
      name: Materiál klapek flétny
      description: Materiál a/nebo pokovení kláves (klíčů), pokud je specifikováno
        odděleně od materiálu těla.
    flute_offset_g:
      name: Vysunuté G
      description: Určuje, zda má flétna posunuté rozvržení klávesy G.
    flute_wall_thickness:
      name: Tloušťka stěny flétny
      description: Kategorie tloušťky stěny tubusu flétny (tenkostěnná, standardní,
        silnostěnná).
    fly_pattern_type:
      name: Typ vzoru mušky
      description: Klasifikuje umělou mušku podle stylu lovu nebo napodobeniny hmyzu/kořisti,
        aby rybářům pomohl rychle najít správný styl mušky.
    fly_rod_style:
      name: Styl muškařského prutu
      description: Udává třídu prutu podle rybolovné techniky nebo účelu, pro které
        je určen (např. jednoruč, switch, spey).
    fly_style:
      name: Styl létání
      description: Určuje typ zapínání na poklopec nebo přední zapínání na kalhotách.
    fly_tying_tools_included:
      name: Včetně nástrojů pro vázání mušek
      description: Uvádí konkrétní vázací nástroje, které jsou součástí sady, aby
        nakupující věděli, co přesně je součástí sady, a mohli porovnat balíčky.
    fly_type:
      name: Typ mušky
      description: Určuje, zda spodky termoprádla zahrnují funkční poklopec, a styl
        tohoto poklopce.
    flyer_hook_mounting_method:
      name: Způsob montáže háku na vřeteno
      description: Způsob upevnění háčku k vřetenu (např. šroubováním vs. zalisováním),
        který ovlivňuje instalovatelnost a kompatibilitu.
    flyer_hook_orientation:
      name: Orientace napínače příze
      description: Zda je háček určen pro levou nebo pravou stranu vřetena, nebo je
        oboustranný/univerzální.
    flyer_kit_finish_coating:
      name: Povrchová úprava/nátěr sady vřetena
      description: Povrchová úprava aplikovaná na komponenty sady vřetena.
    flyer_kit_included_components:
      name: Obsažené komponenty sady vřetena
      description: Udává, jaké díly jsou součástí sady.
    flyer_orifice_type:
      name: Typ otvoru vřetena
      description: Udává typ otvoru v napínači příze.
    flying_disc_feature_set:
      name: Sada prvků létajícího disku
      description: Pozoruhodné funkční vlastnosti létajícího disku.
    flysheet_material:
      name: Materiál tropika
      description: Udává hlavní materiál, ze kterého je vyroben vnější stan / tropiko,
        což má vliv na hmotnost, životnost a odolnost vůči nepřízni počasí.
    flywheel_balance_type:
      name: Typ setrvačníku
      description: Udává, zda je setrvačník v neutrální poloze, nebo zda je vyvažován
        externím prvkem.
    foam_blocks_size_class:
      name: Pěnové bloky třídy velikosti
      description: Označuje obecnou třídu velikostí bloků v sadě.
    foam_blocks_surface_texture:
      name: Povrchová textura pěnových bloků
      description: Popisuje úpravu vnějšího povrchu pěnových bloků.
    foam_surface_effect:
      name: Povrchová úprava pěny
      description: Popisuje běžné dekorativní povrchové úpravy nanesené na pěnové
        desky nebo polystyren, například třpytky, metalické nebo holografické povrchové
        úpravy.
    foil_color:
      name: Barva fólie
      description: Určuje barvu akcentové fólie použitou na certifikátu (pokud je
        to relevantní).
    foil_curtain_mounting_method:
      name: Způsob montáže party závěsu
      description: Způsob instalace nebo zavěšení fóliové clony (např. lepicí páska,
        průchodky).
    foil_discipline:
      name: Fleretová disciplína
      description: Označuje primární způsob jízdy nebo disciplínu, pro kterou je nafukovací
        křídlo určeno.
    foil_mast_board_mounting_type:
      name: Typ montáže stožáru hydrofoilu na desku
      description: Definuje stykovou plochu v horní části stěžně, která dosedá na
        desku nebo do drážek na křídle.
    foil_mast_fuselage_connection_type:
      name: Fóliový stěžeň trupu propojení typu
      description: Určuje, jak se stěžeň připevňuje k trupu nebo konstrukci předního
        křídla.
    foil_mounting_interface:
      name: Rozhraní pro upevnění křídla
      description: Určuje standard připojení, který součást používá k připevnění k
        desce nebo jiným součástem hydrofoilu.
    foil_mounting_system:
      name: Systém upevnění křídla
      description: Určuje montážní rozhraní pro hydrofoily nebo ploutve na prkně a
        zajišťuje kompatibilitu se stávajícím hardware jezdce.
    foil_mounting_type:
      name: Typ upevnění křídla
      description: Označuje systém připevnění křídla k desce, za účelem zajištění
        kompatibility dílů.
    fold_over_elastic_application:
      name: Překládací elastická aplikace
      description: Primární zamýšlené použití/aplikace pro gumičku do knoflíkových
        dírek.
    foldability:
      name: Skládatelnost
      description: Popisuje, zda a jak se dělicí příčka skládá nebo sbalí pro skladování
        nebo rekonfiguraci.
    foldability_stow:
      name: Rozložitelnost (uložení)
      description: Zda se nosič složí/uloží, když se nepoužívá (např. sklopí k vozidlu).
    folding_style:
      name: Styl rozložení
      description: Označuje, jak se nárazníková podložka skládá pro přepravu a skladování,
        což ovlivňuje rovnoměrnost a sbalitelnost přistávací plochy.
    food_basket_items_included:
      name: Položky zahrnuté v dárkovém koši
      description: Uvádí hlavní druhy potravin obsažených v košíku, aby pomohl nakupujícím
        vybrat košíky, které odpovídají chuti nebo stravovacím potřebám příjemců.
    food_coloring_form:
      name: Forma potravinářského barviva
      description: Udává fyzickou formu nebo formát, ve kterém je potravinářské barvivo
        dodáváno (např. gel, tekutina, prášek, sprej).
    food_contact_material:
      name: Materiál určený pro kontakt s potravinami
      description: Primární materiál položky vinařského zařízení (fermentory, sifony,
        trychtýř) používané u moštu/vína.
    food_packing_medium:
      name: Médium pro balení potravin
      description: Udává tekutinu, ve které jsou ovoce nebo zelenina dodávány (např.
        voda, nálev, sirup, olej).
    foosball_rod_type:
      name: Typ tyče na stolní fotbal
      description: Udává mechanickou konstrukci tyče, která má vliv na zážitek ze
        hry a bezpečnost.
    foot_arch_type_compatibility:
      name: Kompatibilita typu klenby nohy
      description: Identifikuje profil klenby nohy, pro který je vložka určena.
    foot_arch_type_suitability:
      name: Vhodnost pro daný typ klenby chodidla
      description: Udává profil klenby chodidla, kterou má vložka posílit.
    foot_coverage:
      name: Zakrytí chodidel
      description: Označuje, zda jsou nohavice s podpatkem, bez podpatku, s třmenem
        nebo s otevřeným podpatkem.
    foot_guard_type:
      name: Typ chrániče nohou
      description: Označuje, zda chránič nohou obsahuje krytku prstů/chodidla, a specifikuje,
        zda je krytka pevná nebo odnímatelná.
    foot_support_level:
      name: Úroveň opory chodidla
      description: Označuje úroveň strukturální podpory nebo pevnosti, kterou vložka
        do bot poskytuje, například nízká, střední, vysoká nebo extra vysoká.
    footbag_play_style:
      name: Styl hry footbag
      description: Primární styl hry s footbagem.
    football_ball_type:
      name: Typ fotbalového míče
      description: Určuje primární zamýšlené použití nebo kontext fotbalového míče,
        například hraní, trénink nebo vystavení sběratelského předmětu.
    football_dummy_type:
      name: Typ fotbalové figuríny
      description: Klasifikuje styl nebo funkční design figuríny tak, aby odrážel
        její specifický tréninkový účel.
    football_glove_certification:
      name: Certifikace fotbalových rukavic
      description: Označuje certifikaci nebo shodu se standardy požadovanými pro soutěžní
        hru (např. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Způsob upevnění podnožky
      description: Udává, jak se přední čelo připevňuje k rámu postele nebo k podlaze,
        což pomáhá při výběru kompatibilních dílů a způsobů instalace.
    footboard_style:
      name: Styl podnožky
      description: Definuje konstrukční nebo estetický styl předního čela.
    footrest_adjustability:
      name: Nastavitelnost opěrky nohou
      description: Určuje, zda a jak lze opěrky nohou nastavit tak, aby vyhovovaly
        různým délkám nohou dítěte.
    footrest_type:
      name: Typ opěrky nohou
      description: Identifikuje přítomnost a provedení podnožky na stoličce.
    footstrap_configuration:
      name: Konfigurace nožního popruhu
      description: Udává typ uchycení nožního popruhu na desce prkna.
    footswitch_action_style:
      name: Styl akce nožního spínače
      description: Udává, zda nožní přepínač přepíná dočasně, zda má aretaci nebo
        zda podporuje obojí.
    footswitch_power_source:
      name: Zdroj napájení nožního přepínače
      description: Udává, jak je nožní přepínač napájen, pokud je to relevantní (pasivně
        přes zesilovač, baterii, externí adaptér, USB atd.).
    footwear_construction_method:
      name: Způsob konstrukce obuvi
      description: Definuje techniku použitou k připevnění svršku k podrážce, ovlivňující
        trvanlivost, možnosti výměny podrážky a cenu.
    footwear_cut:
      name: Střih obuvi
      description: Označuje výšku límce u kotníku (nízký střih, střední střih, vysoký
        střih), vyrovnávající mobilitu a podporu.
    footwear_size_system:
      name: Systém velikostí obuvi
      description: Identifikuje regionální standard velikosti použitý pro udanou velikost
        bot (např. USA, EU, Spojené království).
    footwear_support_type:
      name: Typ podpory obuvi
      description: Udává úroveň biomechanické podpory nebo kontroly pronace, kterou
        bota poskytuje (např. neutrální, stabilita, kontrola držení nohy).
    fork_material:
      name: Materiál vidlice
      description: Určuje materiál použitý pro přední vidlici jízdního kola, ovlivňující
        tuhost, hmotnost a jízdní vlastnosti.
    form_factor:
      name: Tvarový faktor
      description: Primární hardwarový tvarový faktor DMX ovladače.
    formula_car_series_class:
      name: Série/třída formulových vozů
      description: Určuje závodní sérii nebo třídu, pro kterou je formulový vůz vyroben.
    formulation_style:
      name: Styl formulace
      description: Zdůrazňuje specializované receptury určené pro konkrétní použití
        nebo preference (např. Barista, Extra Creamy).
    formulation_type:
      name: Typ formulace
      description: Styl složení dezinfekčního spreje.
    fossil_preparation_level:
      name: Úroveň preparace fosilií
      description: Stupeň preparace/vyčištění nálezu (např. nepraparovaný v matečné
        hornině vs. plně preparovaný).
    fossil_preservation_type:
      name: Typ fosilní konzervace
      description: Typ fosilních konzervací (např. permineralizovaná, odlitá, forma,
        imprese).
    fossil_restoration_status:
      name: Stav obnovy fosilií
      description: Zda a jak byl nález opraven/restaurován (např. fixace lepidlem,
        restaurování, tvorba kompozitů).
    foundation_configuration:
      name: Konfigurace roštu
      description: Udává, zda se rošt dodává jako jeden kus nebo jako dělená/dvoudílná
        sada určená pro matrace větších rozměrů.
    foundation_profile:
      name: Profil základu
      description: Udává výškovou třídu roštu– např. ultranízká, nízká, standardní
        nebo vysoká – takže si nakupující mohou rychle vybrat správnou výšku matrace
        a rozměry ložního prádla.
    frame_adjustability:
      name: Nastavitelnost rámu
      description: Označuje, zda a jak lze rám upravit (např. nastavitelnost šířky/výšky,
        otáčení/náklon), což ovlivňuje ergonomii a přizpůsobení projektu.
    frame_drum_jingle_configuration:
      name: Konfigurace činelek tamburíny
      description: Zda rámový buben obsahuje znělky, a pokud ano, tak obecnou konfiguraci.
    frame_drum_tuning_system:
      name: Systém ladění rámového bubnu
      description: Jak je naladěn rámový buben nebo zda je laditelný.
    frame_finish:
      name: Povrchová úprava rámu
      description: Popisuje ochranný nátěr nebo povrchovou úpravu rámu, která má vliv
        na životnost a vzhled.
    frame_mounting_standard:
      name: Standardní montáž na rám
      description: Definuje specifikaci rozhraní mezi botou a rámem (např. 195 mm
        2bodové, Trinity 3bodové), což je klíčové pro kompatibilitu rámu.
    frame_steel_gauge:
      name: Tloušťka oceli rámu
      description: Udává tloušťku ocelových trubek použitých pro sloupky regálu, což
        je kritický ukazatel pevnosti a stability.
    frame_suspension_type:
      name: Typ zavěšení rámu
      description: Označuje konstrukci odpružení rámu jízdního kola, například tuhé,
        hardtail nebo celoodpružené, aby si kupující mohli vybrat rám, který odpovídá
        jejich konstrukčnímu záměru.
    free_reed_instrument_orientation:
      name: Orientace nástroje s volným jazýčkem
      description: Udává, jak se nástroj drží/hraje (ruční s měchem, přes rameno atd.),
        což je důležité z hlediska ergonomie a filtrování podle účelu použití.
    free_weight_rack_type:
      name: Typ stojanu na činky
      description: Popisuje konstrukce nebo funkci stojanu (např. stojan na obouruční
        činky, stojan na kettlebelly, stojan na kotouče).
    freehub_body_type:
      name: Typ ořechu náboje
      description: Určuje standard tělesa volnoběžky nebo kazetového driveru podporovaný
        zadním nábojem jízdního kola.
    freehub_driver_standard:
      name: Standard driveru volnoběžky
      description: Identifikuje rozhraní kazety/driveru, které náboj podporuje (např.
        Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Standard závitu volnoběžky
      description: Určuje standard nebo velikost závitu náboje, se kterým je volnoběžka
        kompatibilní.
    french_horn_bell_construction:
      name: Konstrukce zvonu lesního rohu
      description: Určuje, jak je zvon konstruován a zda jej lze pro přepravu/servis
        demontovat.
    french_horn_bell_material:
      name: Materiál ozvučníku lesního rohu
      description: Popisuje materiál/slitinu ozvučníku (a často i korpusu) lesního
        rohu.
    french_horn_bell_type:
      name: Typ zvonu lesního rohu
      description: Konstrukční styl zvonu.
    french_horn_finish:
      name: Povrchová úprava lesního rohu
      description: Vnější povrchová úprava/pokovení nástroje.
    french_horn_included_accessories:
      name: Dodávané příslušenství k lesnímu rohu
      description: Příslušenství dodávané s lesním rohem (pouzdro, hubička atd.).
    french_horn_leadpipe_material:
      name: Materiál náústku lesního rohu
      description: Udává materiál/slitinu ústnice.
    french_horn_wrap_type:
      name: Typ s ovinutím pro lesní roh
      description: Celkové obalení/tvar konfigurace lesního rohu.
    fretboard_radius_fit:
      name: Poloměr hmatníku
      description: Označuje, zda je radius kapodastru určen pro ploché, nebo vypouklé
        hmatníky, nebo zda je nastavitelný pro více poloměrů zakřivení hmatníků.
    friction_surface_included:
      name: Třecí plocha je součástí balení
      description: Zda setrvačník obsahuje vyměnitelnou/fixní třecí lamelu (např.
        vložku, kotouč), nebo se jedná o jednodílnou třecí plochu.
    fringe_curtain_finish:
      name: Úprava šňůrkového závěsu
      description: Popisuje vizuální úpravu povrchu šňůrek (lesk/textura).
    fringe_curtain_material:
      name: Materiál šňůrkového závěsu
      description: Udává primární materiál, ze kterého jsou vyrobeny šňůrky závěsu
        (např. PET fólie, plast, papír, textil).
    fringe_curtain_use_location:
      name: Místo použití třásňového závěsu
      description: Udává, zda je šňůrkový závěs určen pro vnitřní použití, venkovní
        použití nebo obojí.
    fringe_trim_style:
      name: Styl s třásněmi
      description: Určuje konstrukci/styl třásňového lemování (jak jsou prameny nebo
        smyčky tvarovány a prezentovány).
    front_axle_standard:
      name: Standardní přední náprava
      description: Uvádí průměr a rozteč osy, pro které je vidlice navržena (např.
        Boost 15 x 110 mm), a zajišťuje tak kompatibilitu s nábojem.
    front_button_configuration:
      name: Nastavení předních tlačítek
      description: Popisuje přední zapínání saka, tedy zda je jednořadé nebo dvouřadé,
        a udává počet knoflíků.
    front_closure_style:
      name: Přední zapínání
      description: Popisuje typ střihu přední části trenčkotu, například jednořadý
        nebo dvouřadý, otevřený, zavinovací nebo na zip.
    front_decoration_type:
      name: Typ přední dekorace
      description: Popisuje typ ozdoby nebo nášivky na přední straně klobouku (např.
        výšivka, kožená nášivka).
    front_point_configuration:
      name: Nastavení předního bodu
      description: Popisuje konstrukci předních hrotů (jednobodové, dvoubodové, modulární,
        vyměnitelné), což má vliv na přesnost zasekávání při lezení na ledu a při
        mixovém lezení.
    front_seat_position:
      name: Typ předního sedadla
      description: Pro kterou stranu/pozici v první řadě je sedadlo určeno.
    front_style:
      name: Přední styl
      description: Popisuje přední konstrukci chino kalhot a uvádí, zda jsou kalhoty
        ploché, skládané nebo jinak detailní.
    frosting_or_icing_type:
      name: Typ polevy nebo polevy
      description: Určuje typ polevy nebo polevy aplikované na dort nebo dezertní
        tyčinku.
    fruit_cultivar_or_variety:
      name: Odrůda nebo kultivar ovoce
      description: Určuje konkrétní kultivar nebo název odrůdy ovoce (např. Gala,
        Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Styl řezu ovoce
      description: Popisuje, jak je ovoce připraveno nebo krájeno (např. celé, nakrájené
        na plátky, kostky).
    fruit_mix_variety:
      name: Druh ovocné směsi
      description: Popisuje složky nebo druh ovocné směsi (např. tropická směs, směs
        bobulí).
    fruit_piece_form:
      name: Forma kousků ovoce
      description: Popisuje fyzické řezání nebo prezentaci kousků sušeného ovoce,
        např. v celku, nakrájené na plátky, v prášku.
    fruit_snack_form:
      name: Ovocná svačinka
      description: Klasifikuje fyzickou formu nebo styl, ve kterém je ovocná svačina
        prezentována.
    fruit_topping_format:
      name: Formát ovocné polevy
      description: Popisuje fyzickou formu, texturu nebo styl polevy, takže nakupující
        si může vybrat mezi omáčkami, sirupy, kousky hrubého ovoce, praskajícími perlami
        atd.
    fruit_variety:
      name: Odrůda ovoce
      description: Identifikuje primární ovoce použité pro recept na ovocné víno/sadu/zásoby
        (např. jablko, třešeň, ostružina).
    fuel_cap_gasket_seal_material:
      name: Materiál těsnění/těsnicího kroužku víčka palivové nádrže
      description: Určuje materiál použitý pro těsnicí kroužek/o-kroužek na víčku
        palivové nádrže.
    fuel_cap_locking_mechanism:
      name: Zámkový mechanismus víčka palivové nádrže
      description: Označuje způsob uzamčení používaný uzamykatelným víčkem palivové
        nádrže.
    fuel_cap_type:
      name: Typ uzávěru palivové nádrže
      description: Určuje funkční typ/provedení víčka palivové nádrže používaného
        pro plnicí hrdlo palivové nádrže vozidla.
    fuel_cap_venting:
      name: Odvětrávání víčka palivové nádrže
      description: Označuje, zda je víčko palivové nádrže odvětrávané, a pokud je
        to relevantní, tak i typ odvětrávání.
    fuel_filter_features:
      name: Vlastnosti palivového filtru
      description: Udává významné funkční vlastnosti palivového filtru (odlučovač
        vody, vypouštěcí ventil, koncovka pro senzor atd.).
    fuel_filter_media_material:
      name: Materiál palivového filtru
      description: Popisuje primární filtrační médium uvnitř vložky palivového filtru.
    fuel_filter_mounting_connection_type:
      name: Typ montáže/propojení palivového filtru
      description: Určuje, jak se palivový filtr připojuje/instaluje (závitové/šroubovací,
        rychlospojka, hadicový hrot, banjo atd.).
    fuel_injection_cleaning_method:
      name: Způsob čištění vstřiků
      description: Uvádí, jak se sada používá k čištění systému vstřikování paliva.
    fuel_injector_electrical_connector_type:
      name: Typ elektrického konektoru vstřikovače paliva
      description: Popisuje standard/tvar konektoru vstřikovače.
    fuel_injector_seat_type:
      name: Typ sedla vstřikovače paliva
      description: Určuje styl rozhraní hrotu/sedla vstřikovače použitý pro utěsnění
        u sání/palivového potrubí.
    fuel_injector_spray_pattern:
      name: Tvar rozstřiku proudu paliva
      description: Identifikuje vzorec rozstřiku/distribuce paliva vstřikovače pomocí
        terminologie výrobce nebo průmyslu (např. kužel, vějíř, tužkový proud, víceotvorový).
    fuel_level_sensor_mounting_type:
      name: Typ montáže snímače hladiny paliva
      description: Popisuje rozhraní pro montáž snímače hladiny paliva k palivové
        nádrži nebo palivovému čerpadlu.
    fuel_level_sensor_sensing_mechanism:
      name: Mechanismus snímání hladiny paliva
      description: Popisuje snímací mechanismus/technologii snímače hladiny paliva
        nebo jednotky snímače sloužící k měření hladiny paliva.
    fuel_line_compliance_standard:
      name: Norma pro shodu palivového potrubí
      description: Identifikuje regulační nebo průmyslovou normu, kterou palivové
        potrubí splňuje (běžné v námořních aplikacích).
    fuel_line_connector_interface_type:
      name: Typ rozhraní konektoru palivového potrubí
      description: Popisuje způsob propojení/rozhraní na konci (koncích) palivového
        potrubí nebo armatury.
    fuel_pressure_regulator_body_material:
      name: Materiál tělesa regulátoru tlaku paliva
      description: Udává materiál pouzdra/těla regulátoru, což má vliv na životnost
        a odolnost proti korozi.
    fuel_pressure_regulator_mounting_type:
      name: Typ montáže regulátoru tlaku paliva
      description: Určuje, jak je regulátor tlaku paliva namontován nebo instalován,
        což ovlivňuje jeho vhodnost a kompatibilitu.
    fuel_pump_inlet_type:
      name: Typ vstupu palivového čerpadla
      description: Styl propojení na vstupu čerpadla.
    fuel_pump_mounting_location:
      name: Umístění palivového čerpadla
      description: Místo, kde je palivové čerpadlo instalováno v palivové soustavě
        vozidla.
    fuel_pump_outlet_connection_type:
      name: Typ napojení vývodu palivového čerpadla
      description: Určuje fyzický typ propojení na výstupu palivového čerpadla z hlediska
        kompatibility s montáží/instalací.
    fuel_system_application:
      name: Typ palivové soustavy
      description: Architektura systému doručení paliva palivové čerpadlo je navrženo
        tak, aby podporovalo (např. karburátor, EFI, GDI, vznětový zdvih/Převody).
    fuel_system_connection_type:
      name: Typ palivové soustavy
      description: Popisuje standardní spojky nebo adaptéry palivového systému, pro
        které je sada určena.
    fuel_system_type:
      name: Typ palivového systému
      description: Určuje systém přívodu paliva motoru (např. karburátor nebo architektura
        vstřikování paliva).
    fuel_tank_installation_position:
      name: Umístění palivové nádrže
      description: Popisuje typické umístění palivové nádrže ve vozidle.
    fuel_tank_orientation:
      name: Orientace palivové nádrže
      description: Určuje, zda je palivová nádrž určena k instalaci vodorovně nebo
        svisle.
    fuel_tank_shape:
      name: Tvar palivové nádrže
      description: Popisuje celkový tvar palivové nádrže pro podporu fyzického uchycení
        a shody náhradních dílů.
    fur_type:
      name: Typ srsti
      description: Identifikuje druh nebo umělý materiál jakékoli kožešiny na vnější
        straně rukávníku nebo kabelky.
    furniture_finish:
      name: Povrchová úprava nábytku
      description: Popisuje varianty povrchu nebo konečných úprav nábytku, které mají
        vliv na jeho vzhled a údržbu.
    fuse_form_factor:
      name: Formát pojistky
      description: Udává fyzický typ/rozměr jističe, aby se zajistilo, že se vejde
        do adaptéru nebo pojistkové skříňky (např. nožová vs. kazetová).
    fuse_terminal_or_mount_style:
      name: Konektor pojistky nebo typ zapojení
      description: Udává, jak se pojistka mechanicky/elektricky zapojuje (zásuvné
        vs. závitové vs. na vodiči).
    fusible_application_method:
      name: Metoda nanášení pomocí tavného lepidla
      description: Určuje, jak se aktivuje/aplikuje tavitelné lepidlo (např. nažehlováním,
        lisováním, vyztužením šitím).
    fusible_hem_tape_application_method:
      name: Metoda aplikace tavné lemovací pásky
      description: Popisuje, jak se páska aktivuje/aplikuje (např. nažehlováním, tepelným
        lisováním).
    fusible_seam_tape_activation_method:
      name: Způsob aktivace tavné pásky pro švy
      description: Udává, jak se lepidlo během aplikace aktivuje.
    fusible_seam_tape_application:
      name: Aplikace tavné švové pásky
      description: Upřesňuje primární účel použití nažehlovací lemovací pásky.
    fusible_seam_tape_material:
      name: Materiál nažehlovací lemovací pásky
      description: Materiál nebo složení pásky/pavučiny/dopravce (ne látka, ke které
        se lepí).
    fusible_seam_tape_washability:
      name: Pratelnost tavné švové pásky
      description: Označuje, zda svařený šev zůstává po praní nebo čištění neporušený.
    fusible_seam_tape_waterproof_rating:
      name: Voděodolnost tavné švové pásky
      description: Udává, zda je lemovací páska určena k vytvoření vodotěsného nebo
        voděodolného spoje.
    fusible_tape_backing_type:
      name: Typ podložky z tavné pásky
      description: Určuje, zda má páska uvolňovací papírový/podložku a jaký má tvar,
        což ovlivňuje manipulaci a aplikaci.
    futon_frame_conversion_mechanism:
      name: Rozkládací mechanismus futonu
      description: Definuje mechanismus nebo konstrukční styl použitý k přepínání
        rámu mezi polohami pohovky, lehátka a postele.
    gaiter_height_type:
      name: Typ výšky návleku
      description: Zatřiďuje návleky podle toho, jak velkou část nohy zakrývají, například
        po kotníky, do poloviny lýtek, po kolena nebo po stehna.
    game_variation:
      name: Varianta hry
      description: Určuje styl hraní, pro který je sada určena (např. klasický tetherball,
        tether tenis, speedball).
    garlic_preparation_style:
      name: Způsob přípravy česneku
      description: Popisuje přípravu nebo zpracování česneku před jeho prodejem (např.
        celý, mletý, práškový).
    garlic_variety:
      name: Odrůda česneku
      description: Identifikuje nabízenou botanickou nebo komerční odrůdu/kultivar
        česneku.
    garment_back_style:
      name: Styl zadní části oděvu
      description: Popisuje střih nebo konstrukci zadní části oděvu (např. odhalená
        záda, boxerský střih, šněrovaní).
    garment_pattern_type:
      name: Typ střihu oděvu
      description: Udává typ oděvu, pro který je střih určen.
    garnish_type:
      name: Typ ozdoby
      description: Určuje, jaká ozdoba (ingredience nebo druh ozdoby) se používá k
        dokončení koktejlu.
    gas_lift_class:
      name: Třída plynového pístu
      description: Určuje bezpečnostní a pevnostní hodnocení plynového zvedacího válce
        použitého pro nastavení výšky sedadla.
    gas_propellant_type:
      name: Typ plynového pohonného materiálu
      description: Určuje typ doporučeného nebo kompatibilního hnacího plynu, pokud
        je zbraň poháněna plynem.
    gatta_tabla_tuning_block_material:
      name: Materiál, ze kterého je vyrobena gattha (dřevěné válečky určené k ladění
        tabel)
      description: Materiál ladicích bloků (gatta) použitých mezi ladicím páskem a
        korpusem.
    gauge_mounting_type:
      name: Způsob upevnění měřidla
      description: Jak je palivoměr připevněn/instalován na plavidle.
    gauge_style:
      name: Styl manometru
      description: Určuje typ tlakoměru, který čerpadlo používá, například analogový
        ciferník, digitální odečet nebo žádný.
    gear_oil_api_classification:
      name: Klasifikace API převodového oleje
      description: Klasifikace API GL pro převodové oleje používané v diferenciálech/manuálních
        převodovkách.
    gel_wax_density_grade:
      name: Stupeň hustoty gelového vosku
      description: Označuje stupeň hustoty gelového vosku, který ovlivňuje čirost,
        obsah parfemace a vhodnost pro vložky.
    gel_wax_transparency_level:
      name: Stupeň průhlednosti gelového vosku
      description: Popisuje čirost/neprůhlednost gelového vosku při jeho použití dle
        určení.
    gelatin_form:
      name: Forma želatiny
      description: Údaje o fyzické podobě želatiny, aby si uživatelé mohli vybrat
        správný formát pro recepty a průmyslové aplikace.
    gelatin_or_gelling_agent_source:
      name: Zdroj želatiny nebo želírující látky
      description: Označuje původ nebo typ želírující látky použité v produktu, důležité
        z dietních a náboženských důvodů.
    gelatin_source:
      name: Zdroj želatiny
      description: Označuje živočišný, rostlinný nebo syntetický původ želatiny, aby
        bylo možné ověřit její kompatibilitu s dietními, etickými nebo náboženskými
        požadavky.
    gelling_agent:
      name: Želírující činidlo
      description: Udává primární látku, která způsobuje zhoustnutí nebo ztuhnutí
        dezertu, což je důležité z hlediska dietních omezení a textury.
    gemstone_clarity_grade:
      name: Stupeň čistoty drahokamu
      description: Stupeň čistoty drahokamu (pokud je klasifikován).
    gemstone_creation_method:
      name: Způsob výroby drahokamu
      description: Označuje, zda je drahokam přírodní, laboratorně vyrobený nebo imitace/simulant.
    gemstone_cut_style:
      name: Styl brusu drahokamů
      description: Popisuje styl brusu/povrchovou úpravu vzorku drahokamu.
    gemstone_treatment_status:
      name: Stav úpravy drahokamu
      description: Označuje, zda a jak byl drahokam ošetřen/vylepšen.
    geological_period:
      name: Geologické období
      description: Geologický útvar (případně epocha), ze které pochází fosilie, pokud
        je známo (např. jura, křída, eocén).
    gift_box_tin_insert_type:
      name: Typ vložky do dárkové krabice/plechovky
      description: Konfigurace vnitřní vložky pro uspořádání/ochranu položek uvnitř
        krabice/plechovky.
    gift_box_tin_sustainability_features:
      name: Ekologické vlastnosti dárkové krabice/plechovky
      description: Vlastnosti dárkové krabice / plechovky s ohledem na udržitelnost.
    gift_box_tin_window_type:
      name: Dárková krabička/plechovka s průhledovým okénkem
      description: Zda má dárková krabice průhledné víko a jakého je typu.
    gift_message_option:
      name: Možnost přidat dárkovou kartu se vzkazem
      description: Určuje, zda lze zahrnout dárkovou zprávu/poznámku a jak (žádná,
        zahrnutá, přizpůsobitelná).
    ginger_maturity:
      name: Zralost zázvoru
      description: Udává fázi růstu zázvoru, kdy byl sklizen, například zda je raný
        nebo zralý, což ovlivňuje intenzitu chuti a možné využití v kuchyni.
    ginger_variety:
      name: Odrůda zázvoru
      description: Udává kultivar, typ nebo příbuzný oddenek v rámci čeledi zázvorníkovitých
        za účelem rozlišení chuťových profilů a způsobů využití v kuchyni.
    glass_kiln_controller_type:
      name: Typ sklářské pece
      description: Typ řídicí jednotky teploty/vypalování, která je součástí pece.
    glass_kiln_firing_application:
      name: Aplikace výpalu ve sklářské peci
      description: Primární typy využití v rámci sklářství, pro které je pec určena.
    glass_stone_application_method:
      name: Způsob aplikace skleněných oblázků
      description: Určuje, jakým způsobem mají být skleněné kameny v projektech připevněny/aplikovány
        (např. lepením, připevněním zkratkou, přišitím).
    glass_tint:
      name: Tónování skla
      description: Skleněné/plastové odstíny používané na lahve pro regulaci expozice
        světlu (běžné při výrobě vína/pivovarnictví).
    glaze_firing_atmosphere:
      name: Vypalovací atmosféra pro glazování
      description: Vypalovací atmosféra (atmosféry), pro kterou je glazura určena.
    glaze_opacity:
      name: Průhlednost glazury
      description: Jak průhledná se glazura jeví po vypálení.
    glaze_product_form:
      name: Forma pro glazované výrobky
      description: Fyzikální forma, ve které se glazurový produkt dodává (např. kapalina,
        suchý prášek, koncentrát, sprej).
    glider_avionics_package:
      name: Balíček avioniky kluzáku
      description: Udává celkovou úroveň navigačních a leteckých přístrojů, kterými
        je kluzák vybaven.
    glider_certification_rating:
      name: Způsobilost pilota kluzáku
      description: Oficiální certifikační třída označující úroveň bezpečnosti a výkonnosti
        kluzáku (např. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Konfigurace podvozku kluzáku
      description: Určuje konfiguraci podvozku používaného kluzákem.
    glider_launch_method:
      name: Způsob vypouštění kluzáku
      description: Určuje, jak se kluzák obvykle vypouští nebo startuje.
    glider_performance_class:
      name: Výkonnostní třída kluzáku
      description: Třída nebo kategorie soutěže/výkonnosti běžně používaná pro kluzáky.
    glitter_application_method:
      name: Způsob nanášení třpytek
      description: Popisuje techniku nanášení/aplikace třpytek při tvoření (např.
        posypání/třepání, vmíchávání, vtírání, nanášení na lepidlo, nanášení štětcem,
        stříkání, tepelné vytvrzení/embossování).
    glitter_eco_friendly_claim:
      name: Prohlášení o ekologické nezávadnosti třpytek
      description: Prohlášení o ochraně životního prostředí/ekologických účincích
        specifická pro sypké třpytky.
    glitter_effect_type:
      name: Typ třpytivého efektu
      description: Popisuje vizuální efekt třpytek/flitrů nad rámec základní barvy
        (např. holografický, duhový).
    glitter_glue_base_solvent_type:
      name: Typ báze/rozpouštědla třpytivého lepidla
      description: Popisuje primární bázi třpytivého lepidla (běžné nakupující obavy
        z čistoty a kompatibility materiálů).
    glitter_opacity_coverage:
      name: Kryvost/průhlednost třpytek
      description: Označuje, jak neprůhledný je třpytivý efekt po aplikaci.
    glitter_use_suitability:
      name: Vhodnost použití třpytek
      description: Udává primární zamýšlený nebo schválený účel použití třpytivého
        prášku (např. pouze pro kreativní tvoření, kosmetická čistota/zdravotně nezávadný
        nebo nezávadný při kontaktu s potravinami).
    glove_armor_placement:
      name: Umístění rukavic a brnění
      description: Označuje umístění ochranných prvků na rukavici.
    glove_cuff_length:
      name: Délka manžety rukavice
      description: Udává délku manžety/chrániče u závodní rukavice na zápěstí/předloktí.
    glove_finger_coverage:
      name: Krytí prstů u rukavice
      description: Popisuje úroveň krytí prstů poskytovaného rukavicemi, od provedení
        s plnými prsty až po provedení bez prstů.
    glove_finger_design:
      name: Typ prstů rukavice
      description: Určuje konfiguraci prstů rukavice, například pětiprsté nebo palčáky.
    glove_fit_profile:
      name: Profil rukavice
      description: Udává vnitřní tvar a celkovou siluetu rukavice, aby si hráči mohli
        vybrat rukavice, které jim sedí.
    glove_insulation:
      name: Izolace rukavic
      description: Popisuje izolaci / tepelnou konstrukci nebo vyhřívání rukavice
        (např. úroveň izolace, technologie podšívky/izolace nebo typ vyhřívání).
    glove_palm_material:
      name: Materiál dlaně rukavice
      description: Určuje primární materiál použitý na dlani rukavice (hlavní kontaktní/úchopová
        plocha), který se může lišit od hřbetu ruky.
    glove_size:
      name: Velikost rukavice
      description: Označuje obecnou velikost ruky, pro kterou jsou lapače na tašku
        navrženy, často vyjádřená kódy velikosti ve stylu oděvu nebo velikostmi pro
        mládež.
    glove_webbing_style:
      name: Styl popruhů rukavic
      description: Definuje design tkaniny nebo kapsy rukavice, což ovlivňuje kontrolu
        míče, vhodnost pozice a předvolby hráče.
    glow_effect:
      name: Světelný efekt
      description: Udává, zda gelové kuličky svítí ve tmě nebo se dají nasvítit při
        hraní za slabého osvětlení.
    glow_plug_connector_type:
      name: Typ konektoru žhavicí svíčky
      description: Koncovka/konektor žhavicí svíčky, který slouží k jejímu připojení
        ke kabelovému svazku vozidla.
    glow_plug_heating_element_type:
      name: Typ topného tělesa žhavicí svíčky
      description: Typ/technologie topného tělesa žhavicí svíčky.
    glue_application_format:
      name: Formát aplikace lepidla
      description: Popisuje aplikátor/dávkovač sloužící k nanášení univerzálního lepidla.
    glue_applicator_type:
      name: Typ aplikátoru lepidla
      description: Určuje styl vestavěného aplikátoru/dávkovací trysky používané k
        nanášení tekutého lepidla.
    glue_base_formulation:
      name: Receptura lepidlové báze
      description: Označuje primární chemické složení / bázi tekutého lepidla určeného
        pro tvoření (což je důležité z hlediska účinnosti, bezpečnosti a nároků na
        čištění).
    glue_gun_nozzle_style:
      name: Styl trysky lepicí pistole
      description: Určuje fyzický styl trysky lepicí pistole, který ovlivňuje přesnost
        aplikace a pokrytí lepidlem.
    glue_safety_standard:
      name: Bezpečnostní norma lepidla
      description: Označuje, zda je lepidlo nezávadné / bezpečné pro děti podle pravidel
        označování zboží a běžných norem.
    goal_frame_material:
      name: Materiál rámu branky
      description: Určuje materiál brankových tyčí/rámu, který ovlivňuje hmotnost,
        přenosnost a odolnost vůči povětrnostním vlivům.
    goal_size:
      name: Velikost gólu
      description: Přiřazuje fotbalovou branku k jedné z běžným oficiálních nebo tréninkových
        velikostí, což umožňuje rychlejší výběr oproti výběru na základě hrubých rozměrů.
    goal_size_classification:
      name: Klasifikace velikosti branky
      description: Označuje standardizovanou třídu velikosti branky (např. regulace
        plné velikosti, mládežnická, mini), aby si uživatelé mohli rychle vybrat vybavení
        vhodné pro jejich úroveň hry.
    goal_size_standard:
      name: Standardní velikost branky
      description: Označuje, který oficiální nebo věkový standard cíl splňuje (např.
        předpis Světové vodní federace, 12U).
    goalie_configuration:
      name: Nastavení brankáře
      description: Udává počet brankářů na každé straně herního stolu (americký styl
        se 3 brankáři vs. evropský styl s 1 brankářem).
    goalie_playing_surface:
      name: Hrací plocha pro brankáře
      description: Určuje primární hrací plochu nebo prostředí, pro které je sada
        vybavení hokejového brankáře určena.
    goalkeeper_glove_cut:
      name: Střih brankářských rukavic
      description: Označuje styl konstrukce (střih) dlaně/prstů brankářských rukavic,
        který ovlivňuje padnutí, pocit z míče a kontrolu.
    goalkeeper_training_aid_type:
      name: Typ tréninkové pomůcky pro brankáře
      description: Identifikuje styl tréninkové pomůcky pro brankáře a umožňuje přesné
        filtrování.
    goblet_drum_playing_style:
      name: Styl hry na pohárový buben
      description: Zda je nástroj určen primárně pro ruční hraní nebo pro použití
        s paličkami/kladivkami.
    gobo_format:
      name: Formát goba
      description: Určuje velikost/standard goba, který projektor akceptuje (rodina
        průměru a tloušťky), a zajišťuje tak kompatibilitu s náhradními/vlastními
        goby.
    gobo_root_variety:
      name: Odrůda kořene Gobo
      description: Identifikuje konkrétní kultivar nebo odrůdu kořene gobo (lopuchu).
    gobo_rotation:
      name: Rotace goba
      description: Určuje, zda se gobo může otáčet a jaká směrovost je podporována.
    goggle_accessory_type:
      name: Typ příslušenství k brýlím
      description: Udává druh příslušenství (např. obal, pouzdro, popruh), takže nakupující
        můžou filtrovat různé sady produktů v rámci zastřešující kategorie.
    goggle_features:
      name: Funkce ochranných brýlí
      description: Uvádí speciální funkční nebo designové vlastnosti, které ochranné
        brýle nabízejí.
    goggle_fit_design:
      name: Design přizpůsobený brýlím
      description: Popisuje, jak mají být brýle nasazeny nebo jak se mají nosit, včetně
        kompatibility s brýlemi přes brýle (OTG).
    goggle_gasket_material:
      name: Materiál těsnění brýlí
      description: Materiál těsnění, které přiléhá k obličeji, ovlivňující pohodlí,
        obavy z alergií a prevenci úniku.
    goggle_integration:
      name: Integrace Goggle
      description: Zda je helma navržena pro použití s ochrannými brýlemi a/nebo obsahuje
        integrované prvky pro uchycení brýlí.
    goggle_lens_shape:
      name: Tvar čoček ochranných brýlí
      description: Definuje profil zakřivení náhradní čočky, což má vliv na zkreslení
        a zorné pole (např. válcové, sférické, torické).
    goggle_lens_tint:
      name: Tónování čoček brýlí
      description: Definuje odstín nebo povrchovou úpravu čočky, což má vliv na propustnost
        světla, vnímání barev a estetický vzhled.
    goggle_strap_material:
      name: Materiál popruhu na brýle
      description: Primární materiál použitý pro hlavový popruh, ovlivňující odolnost
        a pohodlí.
    golf_accessory_set_purpose:
      name: Účel sady golfového příslušenství
      description: Určuje primární zamýšlené použití nebo motiv sady golfového příslušenství.
    golf_bag_style:
      name: Styl golfové tašky
      description: Označuje primární design nebo styl použití golfového bagu (např.
        stojan, košík, Staff).
    golf_ball_alignment_design:
      name: Typ šablony pro značení golfových míčků
      description: Určuje jakoukoli vestavěnou vizuální pomůcku pro zarovnání vytištěnou
        nebo vylisovanou na povrchu koule.
    golf_ball_construction:
      name: Konstrukce golfového míčku
      description: Určuje počet vrstev/dílů použitých v konstrukci golfového míčku,
        což ovlivňuje rotaci, pocit a vzdálenost.
    golf_ball_cover_material:
      name: Materiál pláště golfového míčku
      description: Označuje materiál vnějšího pláště golfového míčku, který má vliv
        na rotaci, odolnost a držení.
    golf_cart_cover_climate_use:
      name: Klimatické využití krytu golfového vozíku
      description: Označuje primární klimatické/roční podmínky, kterým je úložný kryt
        navržen.
    golf_cart_enclosure_fit_type:
      name: Typ ohrady golfového vozíku
      description: Určuje, zda je plachta navržena pro konkrétní počet sedadel / tvar
        a rozměry, nebo je univerzální/nastavitelná.
    golf_cart_intended_use:
      name: Zamýšlené použití golfového vozíku
      description: Primárně zamýšlený případ použití, pro který je golfový vozík navržen
        nebo konfigurován.
    golf_club_number:
      name: Číslo golfové hole
      description: Udává konkrétní číslo nebo označení wedge, které se nachází na
        holi (např. 5, PW, GW).
    golf_club_part_type:
      name: Typ součástky golfové hole
      description: Kategorizuje příslušenství nebo komponent golfové hole do běžných
        podtypů (např. adaptér, objímka, závaží).
    golf_grip_size:
      name: Velikost golfového gripu
      description: Určuje celkovou kategorii vnější velikosti golfového gripu, která
        udává, jak silný je grip v ruce.
    golf_shoe_spike_type:
      name: Typ hrotu pro golfové boty
      description: Popisuje typ systému pro zvýšení přilnavosti podrážek golfových
        bot (např. s hroty nebo bez hrotů).
    golf_tee_style:
      name: Ve stylu golfového odpaliště
      description: Popisuje konstrukční nebo funkční styl/design golfového odpaliště,
        který ovlivňuje výšku míčku, odolnost nebo snížení rotace.
    golf_training_focus:
      name: Zaměření na golfový trénink
      description: Udává primární dovednost nebo aspekt, který má produkt zlepšit.
    golf_training_objective:
      name: Cíl golfového tréninku
      description: Uvádí hlavní golfovou dovednost nebo aspekt, k jehož zdokonalení
        je tréninková pomůcka určena.
    gong_profile_type:
      name: Typ profilu gongu
      description: Popisuje fyzický profil operního gongu (např. plochý vs. vyvýšený
        střed), který silně ovlivňuje tón a styl hry.
    grading_scale:
      name: Hodnoticí škála
      description: Hodnotící stupnice používaná pro hodnocení zlaté mince (např. Sheldon
        1–70).
    grading_service:
      name: Hodnoticí služba
      description: Třetí strana — třídicí/certifikační služba pro mince nebo bankovky
        (např. PCGS, NGC).
    graduation_increment:
      name: Přírůstek dílků stupnice
      description: Určuje nejmenší vytištěné/ryté dělení na stupnici měřidla švu (rozlišení
        značení).
    grain_processing_method:
      name: Způsob zpracování obilí
      description: Identifikuje primární metodu zpracování zrna (např. předvaření,
        válcování, naklíčení), která ovlivňuje dobu vaření, texturu a nutriční hodnoty.
    grand_piano_soundboard_material:
      name: Materiál rezonanční desky klavíru
      description: Primární materiál, ze kterého je vyrobena ozvučnice (rezonanční
        deska) klavíru, což má vliv na kvalitu zvuku a odolnost.
    grappling_dummy_pose:
      name: Postoj tréninkového panáka
      description: Popisuje výchozí polohu/držení těla figuríny a určuje, které cviky
        a techniky podporuje.
    grease_application:
      name: Účel použití plastického maziva
      description: Popisuje primární část vozidla nebo způsob použití, pro které je
        plastické mazivo určeno.
    grease_consistency_grade_nlgi:
      name: Stupeň konzistence plastického maziva (NLGI)
      description: Určuje číslo konzistence NLGI označující tuhost plastického maziva
        (např. NLGI 2 je běžné víceúčelové).
    grease_thickener_type:
      name: Typ zahušťovadla plastického maziva
      description: Identifikuje systém zahušťovadla/mýdla použitý ve složení plastického
        maziva.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Typ klapky píšťaly skotských dud
      description: Popisuje systém zpětných klapek píšťaly.
    great_highland_bagpipes_drone_configuration:
      name: Konfigurace bordunů pro dudy Great Highland
      description: Určuje typy dronů v sadě.
    great_highland_bagpipes_mounting_material:
      name: Montážní materiál pro dudy Great Highland
      description: Určuje materiál ozdobných úchytů na dudách (např. niklové stříbro,
        imitace slonoviny).
    greens_maturity_stage:
      name: Stupeň zralosti raných odrůd
      description: Označuje vývojové stádium zeleniny při sklizni.
    greens_preparation_state:
      name: Stav přípravy zeleniny
      description: Popisuje, jak je listová zelenina zpracovávána nebo balena (např.
        předem omytá, nakrájená, připravená k jídlu).
    grenade_effect_type:
      name: Typ efektu granátu
      description: Označuje primární funkční efekt, který paintballový granát produkuje
        po aktivaci (např. kouř, barva, zábleskový granát).
    grid_unit:
      name: Měřítko
      description: Primární měřítko souřadnic natištěných na podložce (pokud je k
        dispozici).
    grille_emblem_provision:
      name: Ustanovení o emblému mřížky
      description: Určuje, zda mřížka chladiče podporuje emblém/odznak OEM a jakým
        způsobem.
    grille_mounting_method:
      name: Způsob montáže mřížky
      description: Udává, jak se maska chladiče připevňuje na vozidlo (např. přímá
        výměna vs. vložení/překrytí; přišroubování vs. zacvaknutí; nutnost vrtání
        vs. není nutné vrtání).
    grille_style:
      name: Styl mřížky
      description: Popisuje vzhled/design masky chladiče vozidla.
    grip_chalk_form:
      name: Forma hořčíkového prášku
      description: Identifikuje fyzickou formu hořčíkového prášku dodávané nebo použité
        s pytlíkem.
    grip_coverage:
      name: Krytí úchopu
      description: Identifikuje přítomnost a umístění silikonových nebo pogumovaných
        úchopových prvků na ponožce.
    grip_design:
      name: Design úchytů
      description: Popisuje konfiguraci úchytů nebo otvorů v kotouči, které přispívají
        ke snadnější manipulaci a všestrannosti při cvičení.
    grip_enhancer_effect:
      name: Efekt zesílení úchopu
      description: Popisuje primární vlastnost, kterou produkt propůjčuje (např. absorpce
        vlhkosti nebo lepivý pryskyřičný povrch).
    grip_enhancer_form:
      name: Forma pro zlepšení úchopu
      description: Identifikuje fyzickou formu nebo formát produktu pro zvýšení úchopu,
        aby si sportovci mohli vybrat vhodnou metodu aplikace.
    grip_features:
      name: Vlastnosti úchopu
      description: Popisuje vestavěné funkce úchytu/držáku, které zlepšuji držení,
        pohodlí nebo ovládání během hraní.
    grip_material:
      name: Materiál rukojeti
      description: Určuje materiál použitý pro úchopovou plochu kalhot.
    grip_shape:
      name: Tvar gripu
      description: Popisuje tvar nebo styl průřezu rukojeti, zejména u rukojetí putterů.
    grip_surface_type:
      name: Typ povrchu rukojeti
      description: Popisuje design běhounu/trakční plochy pedálu, který ovlivňuje
        přilnavost a pocit z jízdy.
    grip_tackiness_level:
      name: Úroveň přilnavosti a lepivosti
      description: Udává, jak lepkavý nebo přilnavý je povrch omotávky, což pomáhá
        hráčům vybrat si mezi typy, které zanechávají dlaně suché, a mimořádně lepivými
        omotávkami.
    grip_tape_form:
      name: Forma pro protiskluzovou pásku
      description: Označuje formát produktu přilnavé pásky (např. arch, role, nástřiková
        sada).
    grip_wax_form:
      name: Vosková forma na uchopení
      description: Udává fyzickou formu, ve které se vosk na prsty prodává.
    gripper_coverage:
      name: Pokrytí úchopem
      description: Popisuje typ neklouzavých podrážek na obuv a udává plochu povrchu
        a odnímatelnost.
    grommet_application_material:
      name: Materiál aplikace průchodek
      description: Primární materiál (materiály), do kterého (kterých) jsou průchodky
        určeny k instalaci (např. látka, kůže, vinyl, plachta/plátno).
    grommet_duty_rating:
      name: Třída průchodky
      description: Udává pevnostní třídu / kategorii použití průchodky.
    grommet_style:
      name: Styl s průchodkou
      description: Způsob konstrukce sady průchodek (způsob montáže/použití).
    grooming_glove_texture_type:
      name: Typ textury rukavice na vyčesávání srsti
      description: Identifikuje primární texturu povrchu použitou k péči o vzhled,
        s uvedením zamýšleného účelu, jako je drhnutí, leštění nebo mytí.
    groove_orientation:
      name: Orientace drážky
      description: Popisuje směr/rozvržení zářezů nebo výstupků na nástroji.
    groove_sampler_onboard_effects:
      name: Groove sampler vestavěné efekty
      description: Označuje kategorie vestavěných efektů dostupných na groove sampleru
        (insert/master), jako například reverb, delay, komprese, distortion, EQ, filtrování.
    groove_sampler_storage_expansion_type:
      name: Typ rozšíření úložiště Groove sampleru
      description: Popisuje typy vyjímatelných/rozšiřitelných úložišť, s kterými je
        groovebox kompatibilní.
    ground_attachment_method:
      name: Způsob upevnění k podkladu
      description: Popisuje, jak je přihrávkový oblouk upevněn k hrací ploše, což
        ovlivňuje stabilitu a kompatibilitu s povrchem.
    groupset_components_included:
      name: Přiložené součásti sady
      description: Popisuje konkrétní komponenty pohonu, které jsou součástí kompletní
        sady komponentů na kolo, aby zákazníci věděli, co balíček obsahuje.
    gt_racing_class:
      name: Závodní kategorie GT
      description: Určuje kategorii/třídu GT, pro kterou je vůz vyroben nebo homologován.
    guard_construction_type:
      name: Typ konstrukce zábrany
      description: Ať už se jedná o chránič s tvrdou skořepinou, měkkou pancéřovou
        vložku nebo design s rukávem/popruhem.
    guard_size_measurement_basis:
      name: Základ měření velikosti chrániče
      description: Na jakém rozměru je udávaná velikost založena (např. obvod lokte,
        obvod zápěstí, obvod předloktí).
    guard_style:
      name: Styl chrániče
      description: Popisuje konstrukci nebo typ chrániče nožů bruslí, aby mohli nakupující
        rychle rozlišit mezi tvrdými chrániči pro chůzi, měkkými chrániči, pružinovými
        chrániči a dalšími provedeními.
    guava_flesh_color:
      name: Barva dužniny guave
      description: Označuje vnitřní barvu dužiny plodu guava.
    guava_variety:
      name: Odrůda guavy
      description: Identifikuje konkrétní kultivar nebo tržní odrůdu kvajávy, která
        se prodává (např. guava jablečná, mexická smetana, thajská, růžová, bezsemenná,
        bílá).
    guide_material:
      name: Materiál vodítka
      description: Materiál použitý pro očka vlasce nebo vložky prutu.
    guide_type:
      name: Typ průvodce
      description: Určuje typ oček instalovaných na rybářském prutu, například jednoduchá
        očka, rolovací očka nebo hadičková očka.
    guideline_markings:
      name: Vodicí značky
      description: Typ vizuálního značení pro zarovnání vytištěného nebo vyraženého
        na povrchu nadhazovací podložky pro usnadnění nácviku nadhazování.
    guiro_scraper_material:
      name: Materiál paličky pro guiro
      description: Materiál přiložené nebo doporučené škrabky/úderníku používaného
        s guirem.
    guiro_surface_style:
      name: Styl povrchu guira
      description: Popisuje vzor/geometrii hrací plochy, která je škrábána za účelem
        vytvoření zvuku.
    guitar_body_finish_type:
      name: Typ povrchové úpravy kytarového těla
      description: Určuje povrchovou úpravu použitou na těle kytary.
    guitar_bridge_system_type:
      name: Typ kobylkového systému kytary
      description: Typ kobylky/struníku (pro účely kompatibility a procházení).
    guitar_case_style:
      name: Styl pouzdra/kufru pro kytaru
      description: Popisuje celkový styl ochrany/konstrukce pouzdra nebo obalu na
        kytaru.
    guitar_humidifier_placement:
      name: Umístění zvlhčovače vzduchu pro kytaru
      description: Určuje, kde má být zvlhčovač použit/umístěn vzhledem k přístroji
        nebo prostředí.
    guitar_pedal_i_o_configuration:
      name: Konfigurace I/O kytarového pedálu
      description: Označuje, zda pedál podporuje Mono nebo stereo vstupní/výstupní
        směrování.
    guitar_pedal_output_connector_type:
      name: Typ výstupního konektoru pro kytarový pedál
      description: Udává typ konektoru zvukového výstupu pedálu.
    guitar_slide_finish:
      name: Povrchová úprava slidu na kytaru
      description: Povrchová úprava slidu, která má vliv na držení a odpor při tření
        o struny.
    guitar_slide_style:
      name: Styl hry s kytarovým slidem
      description: Určuje tvar a rozměry slidu nebo tonebaru kytary a způsob jeho
        nošení/používání.
    guitar_stand_type:
      name: Typ stojanu na kytaru
      description: Udává primární tvar a rozměry kytarového stojanu (jakou oporu poskytuje
        kytaře / jak se do něj kytara vkládá).
    guitar_strap_attachment_type:
      name: Typ uchycení kytarového popruhu
      description: Udává, jak se popruh (nebo zámky na popruh) připevňuje ke kytaře,
        včetně toho, zda je použito tradiční uchycení nebo rychloupínací řešení.
    guitar_strap_end_material:
      name: Materiál koncovek kytarového popruhu
      description: Materiál použitý na koncích popruhů/kartách (části, které se připevňují
        k tlačítku popruhu nebo systémům strap-lock).
    guitar_strap_features:
      name: Vlastnosti kytarového popruhu
      description: Významné funkční vlastnosti kytarového popruhu nad rámec základní
        velikosti/materiálu (vícenásobný výběr).
    guitar_string_coating:
      name: Povlak na struny kytary
      description: Označuje, zda mají struny ochranný povlak, a pokud je to relevantní,
        tak i typ povlaku.
    guitar_string_gauge_type:
      name: Typ měření tloušťky kytarových strun
      description: Kategorie tloušťky strun v sadě pro akustickou kytaru (např. extra
        lehká, lehká, střední). Často aproximováno tloušťkou vysoké E struny; přesné
        rozsahy se mohou lišit podle výrobce.
    guitar_string_set_gauge_category:
      name: Kategorie kytarových strun podle tloušťky
      description: Společné rodiny marketingových měřítek pro sadu kytarových strun
        (typicky odvozené od vysoké E/1. struny).
    guitar_string_winding_type:
      name: Typ vinutí kytarové struny
      description: Udává styl vnějšího obalu ovinutých strun v sadě.
    guitar_tuning_peg_button_shape:
      name: Tvar tlačítka ladicího kolíčku kytary
      description: Tvar/styl ladicího klíče/tlačítka.
    guitar_tuning_peg_configuration:
      name: Konfigurace ladicích kolíčků na kytaru
      description: Rozvržení ladicí mechaniky na hlavě kytary.
    guitar_tuning_peg_mounting_style:
      name: Způsob upevnění ladicích kolíků na kytaře
      description: Jak se ladicí mechanika upevňuje k hlavě (typ objímek a metoda
        zabraňující protáčení).
    guitar_tuning_peg_shaft_type:
      name: Typ hřídele ladicího kolíčku pro kytaru
      description: Zda je ladicí kolík jednolitý nebo se zářezem a jak je struna uchycena.
    guitar_tuning_peg_style:
      name: Typ ladicího kolíčku na kytaru
      description: Styl a formát montáže fyzické ladicí mechaniky/kolíku používaný
        na hlavě nástroje (např. uzavřené ozubené kolo vs. otevřené ozubené kolo,
        zamykací, rozdělený kolík).
    gum_condition:
      name: Stav razítka
      description: Stav/lepidlo na rubové straně poštovní známky (např. nikdy nepřilepena
        na podložku, přilepena na podložku, bez lepidla).
    gun_action_type:
      name: Typ mechanismu zbraně
      description: Typ mechanismu sloužící k nabíjení/střelbě (např. opakovací puška,
        pákový mechanismus).
    gun_operational_status:
      name: Provozní stav zbraně
      description: Označuje, zda je sběratelská zbraň deaktivovaná/nestřílí (a jak
        je prezentována).
    gun_type:
      name: Typ zbraně
      description: Označuje obecný tvar a rozměry střelné zbraně u starožitných zbraní.
    gusset_material:
      name: Materiál výztužného klínu
      description: Udává materiál podšívky rozkroku/klínku, který má vliv na prodyšnost,
        hygienu a pohodlí.
    gymnastics_discipline:
      name: Gymnastická disciplína
      description: Určuje, pro jaký druh gymnastiky je produkt určen (např. sportovní,
        rytmická, akrobatická).
    hair_extension_texture:
      name: Textura vlasových pásků
      description: Popisuje kudrnatost, vlnitost nebo texturu prodlužujících pramenů
        do vlasů.
    hair_net_style:
      name: Styl síťky na vlasy
      description: Identifikuje design nebo styl konstrukce vlasové síťky (např. nafouklý
        drdol, nákrčník, zakrytí drdolu).
    hair_quality_grade:
      name: Stupeň kvality vlasů
      description: Označuje průmyslovou kvalitu/původ vlasů.
    halter_style:
      name: Styl ohlávky
      description: Identifikuje funkční nebo designový styl ohlávky (např. provazová,
        odtrhovací, přehlídková) a pomáhá nakupujícím vybrat ohlávku vhodnou pro jejich
        zamýšlené použití.
    hammock_style:
      name: Styl houpací sítě
      description: Popisuje konstrukční styl nebo konstrukci houpací sítě.
    hand_and_foot_coverage:
      name: Pokrytí rukou a nohou
      description: Popisuje integrované nebo odnímatelné palčáky a botičky, které
        zakrývají ruce a/nebo nohy.
    hand_cymbal_set_configuration:
      name: Konfigurace sady ručních činelů
      description: Označuje, zda se produkt prodává jako spárovaný činel, jeden činel
        nebo větší sada.
    hand_drum_head_material:
      name: Materiál blány ručního bubínku
      description: Materiál blány (membrány) pohárovitého bubnu.
    hand_exerciser_style:
      name: Styl posilovače zápěstí
      description: Udává celkový styl nebo mechanismus posilovače zápěstí.
    hand_guard_backbone_material:
      name: Materiál páteře chrániče rukou
      description: Materiál nosné konstrukce (pokud je přítomna), který určuje pevnost
        a ochranu.
    hand_guard_coverage_style:
      name: Styl krytí chrániče ruky
      description: Popisuje pokrytí/profil chrániče ruky, který ovlivňuje ochranu
        před větrem/nárazem.
    hand_guard_mounting_type:
      name: Typ montáže chrániče rukou
      description: Udává, jak se chrániče rukou montují na motocykl (např. upevňovací
        prvky do řidítek nebo pouze svorka).
    hand_guard_set_configuration:
      name: Konfigurace sady chráničů rukou
      description: Zda se produkt prodává jako levý/pravý spárovaný pár nebo jako
        jednostranný.
    hand_guard_style:
      name: Styl chrániče ruky
      description: Popisuje styl nebo design chrániče (např. uzavřený, otevřený, plný,
        odlehčený, standardní).
    hand_guard_weather_protection:
      name: Chránič ruky s ochranou proti povětrnostním vlivům
      description: Označuje zamýšlenou ochranu před povětrnostními vlivy, kterou poskytují
        chrániče rukou.
    hand_paddle_strap_type:
      name: Typ pásku plaveckých pacek
      description: Určuje typ popruhu, nebo jeho absenci, používaného k upevnění ručního
        pádla k ruce uživatele.
    hand_percussion_mount_attachment_mechanism:
      name: Mechanismus upevnění perkusí na stojan
      description: Určuje, jak se držák připevňuje ke stojanu, regálu nebo jinému
        hardware (např. upínací vs. držák na tyč).
    hand_percussion_mounting_handling:
      name: Montáž/manipulace s ručními perkusemi
      description: Ať už je přístroj během typického používání ruční, nošený, připevněný
        nebo umístěný na stole/podlaze.
    hand_percussion_pitch_type:
      name: Typ výšky tónu ručního úderu
      description: Udává, zda nástroj produkuje určitou výšku tónu (laditelné/tóniny),
        nebo neurčitou výšku tónu.
    hand_percussion_playing_method:
      name: Metoda hry na ruční bicí nástroje
      description: Jak se na nástroj obvykle hraje, aby se vytvořil zvuk (např. zatřesením
        vs. škrábáním).
    hand_percussion_set_configuration:
      name: Konfigurace sady ručních perkusí
      description: Ať už se jedná o jeden nástroj, spárovaný nástroj nebo vícedílnou
        sadu.
    hand_percussion_size_class:
      name: Kategorie velikostí ručních bicích nástrojů
      description: Obecná kategorie velikostí přístroje, pokud není k dispozici přesné
        měření nebo pro snadné filtrování.
    hand_sewing_needle_point_type:
      name: Typ hrotu jehly pro ruční šití
      description: Tvar/styl hrotu jehly pro ruční šití používané k pronikání do různých
        materiálů (např. tkanin, pletenin, kůže) nebo přízí.
    hand_support_level:
      name: Úroveň opory pro ruce
      description: Určuje stupeň podpory nebo komprese poskytovaný rukavicí, obalem
        nebo popruhem.
    hand_support_size:
      name: Velikost opěrky pro ruce
      description: Výrobcem deklarovaná velikost rukavice, omotávky nebo bandáže (XS-XXL
        nebo univerzální velikost).
    handball_ball_type:
      name: Typ házenkářského míče
      description: Označuje kategorii použití házenkářského míče, například zápas,
        trénink nebo pláž.
    handball_playing_surface:
      name: Házenkářská hrací plocha
      description: Označuje sportovní povrchy, na které je házenkářský míč určen.
    handball_target_type:
      name: Typ terče pro házenou
      description: Určuje styl nebo design střeleckého terče určeného pro trénink
        házené týmů.
    handbrake_actuation_type:
      name: Typ ovládání ruční brzdy
      description: Určuje, jak se aktivuje parkovací brzda.
    handbrake_orientation:
      name: Orientace ruční brzdy
      description: Určuje, zda je ruční brzda určena pro vozidla s levostranným nebo
        pravostranným řízením, nebo zda je univerzální.
    handgun_grip_material:
      name: Materiál rukojeti pistole
      description: Primární materiál rukojetí/panelů pistolí.
    handle_configuration:
      name: Nastavení rukojeti
      description: Popisuje strukturální styl rukojeti wakeboardu (např. single, double,
        Deep-V, T-wrap), takže nakupující může přiřadit dovednostem, trikům nebo typu
        boardu.
    handle_ergonomics:
      name: Ergonomie rukojeti
      description: Popisuje ergonomické vlastnosti rukojeti určené ke zlepšení pohodlí
        a ovládání.
    handle_grip_material:
      name: Materiál rukojeti
      description: Určuje materiál použitý na úchopové ploše rukojeti, který ovlivňuje
        pohodlí a trakci, zejména za mokra.
    handle_grip_type:
      name: Typ rukojeti
      description: Určuje potah/materiál nebo styl povrchu rukojeti určeného ke zlepšení
        pohodlí a ovládání.
    handle_shape:
      name: Tvar rukojeti
      description: Tvar průřezu nebo profil rukojeti.
    handlebar_design:
      name: Design řídítek
      description: Udává typ madel schodového stepperu, například žádná, pevná, s
        nastavitelnou výškou, skládací, nebo úchopy expandéru.
    handlebar_type:
      name: Typ řídítek
      description: Určuje styl řídítek namontovaných na kole, ovlivňující držení těla
        při jízdě, ovladatelnost a pohodlí.
    handslide_bore_type:
      name: Typ otvoru pro ruční posuv
      description: Udává, zda se průměr trubice basového trombónu nemění nebo zda
        má dva různé průměry.
    handwear_cuff_style:
      name: Styl manžety na ruce
      description: Popisuje styl konstrukce manžety nebo zápěstí rukavic nebo palčáků,
        který ovlivňuje krytí a padnutí.
    handwear_insulation_material:
      name: Izolační materiál na ruce
      description: Označuje izolační nebo podšívkový materiál použitý uvnitř rukavic
        nebo palčáků.
    handwear_size:
      name: Velikost rukavic
      description: Určuje velikost rukavic nebo jiných rukavičkových výrobků pro zajištění
        správného padnutí.
    hang_glider_design:
      name: Návrh závěsného kluzáku
      description: Klasifikuje konstrukční styl kluzáku (např. s ohebným křídlem,
        tuhým křídlem, motorem).
    hanger_thread_size:
      name: Velikost závitu závěsného kolíčku
      description: Označuje velikost/standard šroubu použitého k upevnění závěsu na
        vidličky nebo signalizátory, čímž je zajištěna kompatibilita.
    hanging_suspension_method:
      name: Metoda zavěšení
      description: Definuje primární hardware nebo systém použitý k zavěšení houpačky
        (např. lano, řetěz, rám stojanu).
    hardtop_finish_type:
      name: Typ povrchové úpravy pevné střechy
      description: Určuje stav vnější povrchové úpravy pevné střechy (např. základní
        nátěr vs. lak), což ovlivňuje připravenost k instalaci a vzhled.
    hardtop_shell_material:
      name: Materiál skořepiny pevné střechy
      description: Udává primární materiál skořepiny pevné střechy vozidla (nikoli
        plátěné střechy), například sklolaminát nebo hliník.
    hardtop_window_configuration:
      name: Konfigurace okna pevné střechy
      description: Udává, jaká okna jsou součástí pevné střechy, případně jejich konfiguraci.
    harmonica_comb_material:
      name: Materiál hřebenu harmoniky
      description: Materiál použitý pro hřeben harmoniky (tělo vzduchové komory).
    harmonica_cover_plate_finish:
      name: Povrchová úprava krycí desky harmoniky
      description: Udává povrchovou úpravu nebo lakování krycích štítků harmoniky.
    harmonica_cover_plate_material:
      name: Materiál krycí desky harmoniky
      description: Materiál použitý pro vnější krycí desky.
    harmonica_finish:
      name: Povrchová úprava harmoniky
      description: Povrchová úprava krycích desek/těla harmoniky.
    harmonica_included_accessories:
      name: Příslušenství dodávané s harmonikou
      description: Udává, jaké příslušenství je součástí balení harmoniky.
    harmonica_note_range:
      name: Rozsah not harmoniky
      description: Klasifikace hudebního rozsahu používaná v orchestrálním kontextu
        (např. bas, baryton, tenor).
    harmonica_reed_plate_material:
      name: Materiál plátku harmoniky
      description: Materiál, ze které jsou vyrobeny plátky (např. mosaz, nerezová
        ocel, hliník).
    harmonica_system_type:
      name: Systém/typ harmoniky
      description: Identifikuje orchestrální harmonický systém nebo tvarový faktor
        (např. Chord, bas, baryton, polyfonie).
    harmonica_tuning_system:
      name: Systém ladění harmoniky
      description: Udává ladění harmoniky (např. Richter, sólo, orchestrální).
    harness_shell_type:
      name: Typ skořepiny trapézu
      description: Popisuje tuhost konstrukce skořepiny trapézu (např. softshell,
        hardshell, hybrid).
    harness_style:
      name: Styl postroje
      description: Definuje konstrukční styl/design postroje, např. pasový, sedací,
        hrudní/vestový, pásový, boardshort nebo hybridní.
    harness_type:
      name: Typ postroje
      description: Klasifikuje konstrukční styl lezeckého úvazku, například sedový,
        celotělový nebo hrudní.
    harp_action_type:
      name: Typ mechaniky harfy
      description: Primární mechanismus používaný ke změně výšky tónu/náhodných tónů
        na harfe.
    harp_finish:
      name: Harfová úprava
      description: Povrchová úprava těla harfy (např. přírodní, mořená, malovaná,
        lakovaná).
    harp_included_accessories:
      name: Součástí balení je harfa a příslušenství
      description: Seznam příslušenství dodávaného s nákupem pedálové harfy.
    harvest_method:
      name: Metoda sklizně
      description: Označuje, zda byly mořské plody uloveny ve volné přírodě, chovány
        na farmě nebo získány jinou metodou.
    harvest_stage:
      name: Fáze sklizně
      description: Určuje fázi růstu, ve které byla rukola sklizena, například mikrozelenina,
        mladý list nebo zralý trs.
    hat_style:
      name: Styl klobouku
      description: Konstrukce/styl společenského klobouku (např. kuželový klobouk,
        koruna, cylindr, kšilt) odrážející základní vzhled položky.
    hazard_signal_mode:
      name: Mód výstražných signálů
      description: Volitelné režimy svícení pro LED/elektronické silniční světlice.
    head_configuration:
      name: Konfigurace hlavy
      description: Určuje, zda hlava cepínu obsahuje teslici, kladivo, obojí nebo
        ani jedno, což přímo ovlivňuje funkčnost při lezení na ledu a v klasických
        mixech.
    head_material:
      name: Materiál hlavy
      description: Materiál hrací hlavice dodávané s kvintem.
    head_movement_type:
      name: Typ pohybu hlavice
      description: Směrová pohyblivost dvojnožky nebo hlavice střelecké hole (např.
        otáčení, naklápění, náklon).
    head_side:
      name: Hlavová strana
      description: Udává, zda je blána bubnu určena pro úderovou stranu, rezonanční
        stranu nebo pro kteroukoli z nich.
    head_weight_style:
      name: Styl hlavičky
      description: Identifikuje konfiguraci hmotnosti v hlavě mouchy, která ovlivňuje
        rychlost klesání a prezentaci.
    headband_embellishment:
      name: Ozdoba čelenky
      description: Označuje ozdobné prvky připevněné k čelence (např. mašle, perly,
        krystaly, zvířecí uši).
    headboard_style:
      name: Styl čela postele
      description: Popisuje design nebo konstrukci čela, které je dodáváno s postelí.
    headgear_strap_configuration:
      name: Rozmístění řemínků chrániče uší
      description: Označuje počet popruhů použitých k upevnění zápasnické pokrývky
        hlavy.
    headjoint_crown_style:
      name: Styl korunky hlavice
      description: Popisuje styl nebo design korunky (uzávěru) hlavice flétny, což
        může mít vliv na vzhled a hmotnost/rovnováhu.
    headjoint_pitch_standard:
      name: Standardní rozteč hlavic
      description: Popisuje standard ladění hlavice (např. A=440 vs. A=442).
    headliner_product_form:
      name: Formulář pro hlavní produkt
      description: Určuje, zda se jedná o kompletní sestavu tvarovaného čalounění
        stropu, náhradní látku nebo součást pro opravu/obložení.
    headrest_mount_attachment_method:
      name: Způsob upevnění opěrky hlavy
      description: Určuje, jak se držák připevňuje k opěrce hlavy/sedlu.
    headrest_provision:
      name: Zajištění opěrky hlavy
      description: Udává, zda jsou součástí dodávky opěrky hlavy a/nebo zda jsou k
        dispozici montážní body pro opěrky hlavy.
    headset_standard:
      name: Standard hlavového složení
      description: Typ rozhraní hlavové trubky/hlavového složení používaného rámem.
    headstall_style:
      name: Styl ohlaví
      description: Klasifikuje konstrukční provedení nebo konfiguraci ušní části/čelního
        pásku ohlaví.
    headwear_intended_use:
      name: Účel použití pokrývky hlavy
      description: Označuje primární účel nebo kontext nošení turbanu (např. chemoterapie,
        vypadávání vlasů, plavání, náboženské účely).
    hearing_enhancer_style:
      name: Styl zesilovače sluchu
      description: Popisuje fyzický tvar a rozměr zařízení, aby si uživatelé mohli
        vybrat mezi provedením přes uši, do uší, za krk a dalšími provedeními.
    heart_rate_monitoring_method:
      name: Způsob sledování srdeční frekvence
      description: Určuje, jak stroj zaznamenává data o tepové frekvenci během tréninku.
    heart_rate_sensing_technology:
      name: Technologie snímání tepové frekvence
      description: Určuje fyziologickou metodu měření, kterou monitor používá k detekci
        srdeční frekvence (např. elektrické EKG vs. optické PPG).
    heart_rate_sensor_placement:
      name: Umístění snímače tepové frekvence
      description: Označuje, kde je senzor nošený nebo umístěný (na těle nebo na kole),
        což ovlivňuje pohodlí a přesnost měření.
    heat_retention_technology:
      name: Technologie uchování tepla
      description: Popisuje jakoukoli technologii, povlak nebo materiál, který zvyšuje
        pocení nebo tepelnou aktivitu u kalhot zaměřených na cvičení (např. neoprenový
        saunový efekt).
    heated_glass_feature:
      name: Funkce vyhřívaného skla
      description: Označuje, zda okenní sklo obsahuje integrované elektrické prvky,
        jako je zadní odmrazovací mřížka a/nebo anténa vložená do skla.
    heater_control_actuation_method:
      name: Způsob ovládání topení
      description: Určuje, jakým způsobem ovládání topení/HVAC ovládá skříň HVAC vozidla
        (např. ovládané lankem, podtlakem nebo elektronickou signalizací).
    heater_control_electrical_connector_type:
      name: Typ elektrického konektoru pro ovládání ohřívače
      description: Určuje typ/rozhraní elektrického konektoru používaného sestavou
        ovládání ohřívače (např. pigtail vs. typ zástrčky).
    heating_technology:
      name: Technologie vytápění
      description: Označuje primární mechanismus ohřevu, který vaporizér využívá k
        přeměně materiálu na páru.
    heel_shape:
      name: Tvar podpatku
      description: Určuje geometrický styl nebo siluetu samotného podpatku, pomáhá
        nakupujícím filtrovat podle strukturálního vzhledu a preferencí stability
        (např. jehlové podpatky vs. blokové).
    helicopter_mission_type:
      name: Typ mise vrtulníku
      description: Primární účel použití/funkce vrtulníku.
    helicopter_rotor_configuration:
      name: Konfigurace rotoru vrtulníku
      description: Popisuje uspořádání rotoru vrtulníku (hlavní rotor/ocasní rotor),
        například jeden hlavní + ocasní, souosé, tandemový nebo překrývající).
    helmet_accessory_type:
      name: Typ příslušenství k přilbě
      description: Udává konkrétní druh součástky nebo příslušenství cyklistické helmy,
        takže nakupující mohou okamžitě najít tu správnou položku.
    helmet_audio_connector_type:
      name: Typ audio konektoru pro helmu
      description: Určuje typ leteckého audio konektoru používaného v kabelovém svazku
        helmy, pokud je k dispozici.
    helmet_communication_system_readiness:
      name: Připravenost komunikačního systému přilby
      description: Zda je helma navržena pro připojení interkomu/komunikačního systému
        Bluetooth.
    helmet_construction_type:
      name: Typ konstrukce přilby
      description: Popisuje styl konstrukce skořepiny a výstelky helmy (např. pěnová,
        tvrdá skořepina, hybridní).
    helmet_fit_head_shape:
      name: Typ helmy (tvar hlavy)
      description: Vnitřní profil přizpůsobení je určen pro různé tvary hlavy.
    helmet_interior_liner_type:
      name: Typ vnitřní vložky helmy
      description: Typ komfortní vložky a zda je vyjímatelná/pratelná.
    helmet_liner_material:
      name: Materiál vnitřní výstelky přilby
      description: Určuje materiál vnitřní vložky nebo polstrování, který zajišťuje
        pohodlí a absorpci nárazu.
    helmet_retention_closure_type:
      name: Typ zapínání/uzavírání helmy
      description: Určuje mechanismus zapínání/zajištění řemínku na helmě (např. dvojitý
        D-kroužek, mikrometrická ráčna).
    helmet_safety_certification:
      name: Certifikace bezpečnosti přilby
      description: Uvádí bezpečnostní normy nebo certifikace, které helma splňuje.
    helmet_safety_certification_standard:
      name: Norma pro certifikaci bezpečnosti přileb
      description: Bezpečnostní/homologační normy, které motocyklová helma certifikovaně
        splňuje.
    helmet_shell_material:
      name: Materiál skořepiny přilby
      description: Primární materiál nebo konstrukce vnější skořepiny použitá pro
        helmu.
    helmet_size_system:
      name: Systém velikostí přileb
      description: Schéma velikostí používané k vyjádření velikosti helmy.
    helmet_sun_visor_type:
      name: Typ sluneční clony pro helmu
      description: Určuje, zda helma obsahuje vnitřní výsuvnou sluneční clonu, tónovaný
        vnější štít, obojí nebo žádný.
    helmet_vehicle_fit:
      name: Přilba vhodná pro vozidla
      description: Typ vozidla/jízdy, pro které je helma určena.
    helmet_ventilation_adjustability:
      name: Nastavitelnost ventilace helmy
      description: Určuje, jak může jezdec ovládat ventilaci helmy.
    helmet_ventilation_configuration:
      name: Konfigurace ventilace helmy
      description: Popisuje rozvržení a nastavitelnost ventilace helmy (např. větrací
        otvory na bradě, větrací otvory na čele/vstupní otvory, uzavíratelné větrací
        otvory).
    helmet_visor_peak_adjustability:
      name: Nastavitelnost hledí/kšiltu helmy
      description: Zda je kšilt/hledí helmy pro jízdu v terénu nastavitelný a/nebo
        odnímatelný.
    helmet_visor_shield_optical_features:
      name: Optické vlastnosti štítu (hledí) helmy
      description: Optické a kompatibilitní vlastnosti hlavního obličejového štítu/hledí.
    helmet_visor_shield_type:
      name: Typ štítu/hledí helmy
      description: Primární konfigurace obličejového štítu/hledí, který je součástí
        helmy.
    hem_style:
      name: Styl lemu
      description: Určuje styl konečné úpravy otvoru pro nohy – například čistý, rolovaný
        nebo surový – který silně ovlivňuje vzhled oděvu.
    hemisphere_compatibility:
      name: Kompatibilita s hemisférami
      description: Udává, pro kterou polokouli je hvězdná mapa určena, na základě
        viditelných souhvězdí.
    hemline_style:
      name: Styl lemování
      description: Definuje střih nebo design spodního okraje šatů.
    herbal_infusion_function:
      name: Funkce bylinného nálevu
      description: Označuje primární zdravotní přínos nebo přínos pro funkci, kvůli
        kterému je nálev uváděn na trh.
    hex_size:
      name: Šestihranná velikost
      description: Pro montáž/demontáž žhavicí svíčky je nutný šestihranný klíč.
    hi_hat_pair_type:
      name: Typ hi-hatu z hlediska párování
      description: Udává, zda se nabídka týká párového hi-hatu nebo jen jedné jeho
        části.
    hi_hat_sound_character:
      name: Charakter zvuku hi-hatu
      description: Popisuje celkový tónový profil, aby pomohl nakupujícím filtrům
        s požadovaným zvukem.
    high_visibility_class:
      name: Třída s vysokou viditelností
      description: Určuje úroveň klasifikace viditelnosti oděvu dle normy ANSI/ISEA
        107.
    highback_style:
      name: Styl opěrné patky
      description: Popisuje konstrukci/design opěrné patky, který má vliv na jízdní
        vlastnosti.
    hitch_ball_diameter:
      name: Průměr koule tažného zařízení
      description: Průměr kulového čepu (koule) tažného zařízení, která se spojuje
        s přívěsným zařízením (např. 1 7/8 palce, 2 palce, 2 5/16 palce, 50 mm).
    hitch_ball_mounting_style:
      name: Způsob montáže tažné koule
      description: Zda se jedná o standardní kulový čep na šroub, pevnou konstrukci
        pro specifické spojovací hlavy, nebo zda obsahuje integrované zařízení.
    hobby_horse_handle_type:
      name: Typ rukojeti hobby koně
      description: Určuje konstrukci rukojeti/madla používanou k držení nebo řízení
        hobby koně.
    hobby_horse_sound_features:
      name: Zvukové funkce pro koníčky
      description: Označuje, zda koník obsahuje zvukové efekty a jaké.
    hockey_goal_type:
      name: Typ hokejové branky
      description: Určuje styl nebo zamýšlený případ použití hokejové branky (např.
        regulérní led, pouliční, mini).
    hockey_size_category:
      name: Velikostní kategorie pro hokej
      description: Udává standardní velikost vybavení, ke které je díl vhodný (Mládež,
        Junior, Středně pokročilý, Senior).
    hockey_size_segment:
      name: Velikost hokeje Segmenty
      description: Udává standardní velikost hokejového vybavení, která určuje celkový
        rozměr a velikost chráničů.
    hold_surface_texture:
      name: Zachovat strukturu povrchu
      description: Popisuje drsnost nebo hmatovou úpravu úchopové plochy rukojeti.
    home_decor_sewing_pattern_project_type:
      name: Typ projektu šicího vzoru pro domácí dekorace
      description: Určuje typ domácí dekorace, kterou šicí vzor vytváří (např. povlak
        na polštář, záclona, běhoun).
    homologation_rule_set:
      name: Homologace / sada pravidel
      description: Uvádí sankční orgán nebo soubor pravidel, kterým je vozidlo v souladu
        (pokud je to relevantní).
    honey_form:
      name: Forma medu
      description: Určuje fyzickou formu nebo vzhled včelího produktu.
    honey_processing_method:
      name: Způsob zpracování medu
      description: Označuje, jak byl med ošetřen nebo zpracován před balením.
    honey_variety:
      name: Odrůda medu
      description: Identifikuje botanický nebo květinový zdroj medu – ať už monoflórový
        nebo polyflórový – což přímo ovlivňuje chuť, barvu a cenu.
    hood_configuration:
      name: Provedení kapuce
      description: Popisuje typ kapuce a možnosti nošení.
    hood_design:
      name: Design kapuce
      description: Určuje, zda má oděv kapuci a jaký má styl.
    hood_style:
      name: Styl kapuce
      description: Označuje přítomnost a styl kapuce na oděvu.
    hood_type:
      name: Typ kapuce
      description: Popisuje zvláštní konstrukční vlastnosti kapuce.
    hook_and_eye_size_hook_number:
      name: Velikost háčku a očka (číslo háčku)
      description: Standardizované označení velikosti/číslování háčků a oček (pokud
        je to relevantní) používané na baleních k označení celkové velikosti háčku/očka.
    hook_and_loop_fastener_duty_rating:
      name: Hodnocení třídy spolehlivosti suchého zipu
      description: Označuje zamýšlenou pevnost/úroveň výkonu suchého zipu.
    hook_and_loop_fastener_format:
      name: Formát suchého zipu
      description: Udává fyzickou formu nebo dodávaný formát suchého zipu (např. role/páska,
        tečky, proužky).
    hook_and_loop_fastener_side:
      name: Strana se suchým zipem
      description: Určuje, zda produkt obsahuje pouze stranu s háčkem, pouze stranu
        s očkem nebo sadu obsahující obě strany.
    hook_coating_finish:
      name: Povrchová úprava háku
      description: Povrchová úprava nebo pokovení háčku, které dodává odolnost proti
        korozi, nenápadnost nebo barvu (např. černý nikl, lesklý cín).
    hook_configuration:
      name: Konfigurace háku
      description: Popisuje přítomnost a styl háčků dodávaných s návnadou.
    hook_eye_style:
      name: Styl háku s očkem
      description: Určuje tvar nebo orientaci očka háčku, což ovlivňuje způsob vázání
        nebo připevnění háčku.
    hook_eye_type:
      name: Typ háku s očkem
      description: Určuje design očka háčku, ovlivňuje výběr uzlu a takeláž.
    hook_loop_format:
      name: Formát suchého zipu
      description: Udává fyzický tvar a rozměry suchého zipu určeného k našití.
    hook_loop_side:
      name: Strana se suchým zipem
      description: Udává, zda se jedná o stranu s háčky, smyčkami nebo o sadu s oběma
        odpovídajícími stranami.
    hook_material:
      name: Materiál háčků
      description: Identifikuje materiál použitý konkrétně pro háček/hlavici gafflu,
        což je klíčový faktor pro pevnost a odolnost proti korozi při použití ve slané
        vodě.
    hook_organizer_style:
      name: Styl organizéru s háčky
      description: Fyzický styl nebo tvarový faktor hákového organizéru (například
        pouzdro, role nebo váček), používaný k podpoře procházení a filtrování podle
        typu organizéru.
    hook_point_configuration:
      name: Konfigurace háčku
      description: Určuje, zda má hák dva hroty (dvojitý) nebo tři hroty (trojitý).
    hook_point_type:
      name: Typ hákového hrotu
      description: Popisuje broušení nebo tvar hrotu rybářského háčku, které ovlivňují
        průnik a schopnost držení.
    hook_shank_length:
      name: Délka háčku
      description: Označuje relativní délkovou klasifikaci háčku (např. krátký, dlouhý)
        pro rychlé vizuální a funkční srovnání.
    hooks_eyes_attachment_method:
      name: Způsob upevnění pomocí háčků a oček
      description: Jak jsou háčky a očka připevněny k hotovému nebo rozpracovanému
        oděvu.
    hop_up_type:
      name: Typ hop-up mechanismu
      description: Definuje hop-up systém používaný k propůjčení zpětné rotace kuličkám
        pro větší dostřel a přesnost.
    horse_blanket_type:
      name: Typ deky pro koně
      description: Udává primární styl nebo účel použití deky nebo přikrývky na koně.
    horse_brush_type:
      name: Typ kartáče pro koně
      description: Udává třídu kartáče podle specifického stylu péče nebo účelu použití,
        což umožňuje zákazníkům filtrovat bez zacházení do podkategorií.
    horse_care_purpose:
      name: Účel péče o koně
      description: Primární účel produktu v rámci péče o koně, zahrnující zdravotní
        ošetření, čištění a veškerou péči.
    horse_feed_stage:
      name: Fáze krmení koní
      description: Označuje fázi života koně nebo fyziologický stav, pro který je
        krmivo určeno.
    horse_groomer_type:
      name: Typ střihacího strojku pro koně
      description: Udává styl střihacího strojku, aby nakupující mohli rychle najít
        konkrétní nástroj, který potřebují.
    horse_leg_protection_type:
      name: Typ ochrany koňských nohou
      description: Klasifikuje specifický styl nebo funkci koňské boty, bandáže nebo
        obvazu.
    horse_model_breed:
      name: Modelové plemeno koní
      description: Určuje plemeno koně zobrazené zmenšeným modelem (je-li použito).
    hosiery_toe_style:
      name: Styl špičky punčochového zboží
      description: Definuje konstrukci oblasti špičky punčochového zboží, důležitou
        pro odolnost a kompatibilitu s obuví s otevřenou špičkou.
    hot_air_balloon_basket_type:
      name: Typ koše horkovzdušného balónu
      description: Udává primární konfiguraci/styl koše (např. standardní sportovní,
        komerční s vysokou kapacitou, přepažený, volně přístupný/s dvířky) určeného
        pro přepravu osob a zamýšlený typ provozu.
    hot_air_balloon_burner_type:
      name: Typ hořáku pro horkovzdušný balón
      description: Typ/konfigurace hořákového systému balónu.
    hot_air_balloon_envelope_material:
      name: Materiál obalu horkovzdušného balónu
      description: Primární látka/materiál použitý pro obal balónu (baldachýn).
    hotfix_application_tool:
      name: Nástroj pro aplikaci hotfix kamenů
      description: Doporučený nástroj nebo zdroj tepla sloužící k aplikaci nažehlovacích
        kamínků.
    hub_axle_type:
      name: Typ nábojové nápravy
      description: Označuje systém uchycení osy, pro který je náboj určen (rychloupínák,
        pevná osa atd.).
    hub_motor_type:
      name: Typ motoru v náboji
      description: Popisuje konstrukci motoru v náboji (převodový, přímý pohon, kartáčový,
        bezkartáčový), aby měli nakupující informace o točivém momentu, hmotnosti
        a výkonnostních charakteristikách.
    hula_hoop_construction_type:
      name: Typ konstrukce hula hoopu
      description: Popisuje, jak je obruč konstruována/sestavena.
    hula_hoop_features:
      name: Vlastnosti hula hoopu
      description: Zdůrazňuje významné funkční nebo designové prvky hula hoopu.
    hull_design:
      name: Návrh trupu
      description: Popisuje tvar trupu, který má vliv na výkon a ovladatelnost.
    hull_type:
      name: Typ trupu
      description: Popisuje tvar trupu, který ovlivňuje výkonnost a stabilitu.
    humidifier_refill_medium_type:
      name: Typ náplně/média zvlhčovače
      description: Identifikuje médium pro zadržování vlhkosti/doplňování používané
        zvlhčovačem v pouzdru (co se navlhčí nebo vymění).
    humidifier_refill_method:
      name: Způsob doplňování zvlhčovače
      description: Popisuje, jak se do zvlhčovače doplňuje voda nebo jak se vyměňuje.
    humidifying_medium:
      name: Zvlhčovací médium
      description: Identifikuje zvlhčovací prvek/médium použité produktem (co se namáčí/aktivuje).
    hummus_base_ingredient:
      name: Základní ingredience hummusu
      description: Identifikuje primární luštěninu nebo zeleninový základ použitý
        k výrobě hummusu.
    hunting_call_type:
      name: Typ lovecké vábničky
      description: Klasifikuje primární styl ovládání nebo mechanismus vábničky (např.
        foukaná ústy, elektronická, krabičková), aby si lovci mohli rychle vybrat
        formát, který nejlépe vyhovuje jejich potřebám a úrovni dovedností.
    hunting_dog_collar_function:
      name: Funkce obojku pro lovecké psy
      description: Klasifikuje primární funkční styl nebo účel obojku, což pomáhá
        filtrovat nakupované produkty podle funkcí, jako je sledování, výcvik, viditelnost
        nebo standardní použití.
    hvac_control_functions:
      name: Funkce řízení systémů vytápění, ventilace a klimatizace
      description: Označuje, které funkce klimatizace/odmrazování/ventilace jsou řízeny
        jednotkou (mechanické nebo elektronické).
    hybrid_drivetrain_configuration:
      name: Konfigurace hybridního pohonu
      description: Označuje architekturu systému PHEV a popisuje, jak elektromotor(y)
        a spalovací motor zajišťují pohon.
    hybrid_system_type:
      name: Typ hybridního systému
      description: Klasifikuje hybridizační architekturu používanou vozidlem.
    hybrid_truck_cab_type:
      name: Typ kabiny hybridního nákladního vozu
      description: Určuje konfiguraci kabiny nákladního vozidla, která ovlivňuje počet
        sedadel a vnitřní prostor.
    hydration_bag_features:
      name: Vlastnosti hydratačního vaku
      description: Poukazuje na důležité designové nebo funkční vlastnosti specifické
        pro hydratační vaky.
    hydration_belt_features:
      name: Vlastnosti hydratačního pásu
      description: Uvádí významné integrované funkce, které zvyšují použitelnost,
        bezpečnost nebo pohodlí hydratačního pásu.
    hydration_bladder_compatibility:
      name: Kompatibilita s hydratačními vaky
      description: Označuje, zda vesta obsahuje nebo podporuje systém hydratačního
        vaku.
    hydration_mouthpiece_style:
      name: Styl hydratačního náustku
      description: Specifikuje design nebo funkční styl náustku či ventilu hydratačního
        systému, takže pomáhá nakupujícím vybrat si preferované rozhraní pro pití
        a zajistit kompatibilitu.
    hydration_pack_style:
      name: Styl hydratačního batohu
      description: Určuje konstrukční styl hydratačního batohu, například batoh nebo
        vesta, pro lepší padnutí a filtrování podle případu použití.
    hydration_system_insulation:
      name: Izolace hydratačního systému
      description: Označuje, zda je zásobník a/nebo pitná trubice izolována, aby se
        udržela teplota kapaliny v horkém nebo studeném prostředí.
    hydration_valve_type:
      name: Typ hydratačního ventilu
      description: Identifikuje typ pitného ventilu nebo náustku dodávaného se systémem
        nebo lahví, zahrnuje běžné konstrukce skusových ventilů a trysek s vysokým
        průtokem.
    hydraulic_fluid_type:
      name: Typ hydraulické kapaliny
      description: Určuje typ brzdové kapaliny, pro kterou je určena hydraulická brzdová
        páka jízdního kola. Tyto informace jsou zásadní pro údržbu a bezpečnost.
    hydrogenation_level:
      name: Úroveň hydrogenace
      description: Udává, zda je tuk nehydrogenovaný, částečně hydrogenovaný nebo
        plně hydrogenovaný, což ovlivňuje obsah trans-tuků a výkonnost pečení.
    hydrophobicity_level:
      name: Úroveň hydrofobicity
      description: Udává stupeň tvorby vodních perliček/vrstvy (výkonnost trhu) produktu.
    ice_cream_format:
      name: Formát zmrzliny
      description: Popisuje fyzickou formu nebo prezentaci zmrzlinového produktu (např.
        půllitr, tyčinka, moči).
    ice_skate_sharpener_type:
      name: Typ brousku na brusle
      description: Klasifikuje celkový design nebo formát ostřiče (ruční kámen, elektrický
        strojek, přípravek atd.).
    ice_temperature_suitability:
      name: Vhodnost pro teplotu ledu
      description: Uvádí teplotní rozsah ledu, pro který je vosk na hokejku určený,
        a ovlivňuje jeho vlastnosti a schopnost odpuzovat sníh.
    icing_sugar_variety:
      name: Různé druhy moučkového cukru
      description: Klasifikuje složení nebo funkční typ moučkového cukru (např. fondán,
        netající sněhový prášek, barevný, ochucený).
    ignition_coil_configuration:
      name: Konfigurace zapalovací cívky
      description: Specifikuje provedení zapalovací cívky (jednoduchá cívka / cívka
        na svíčce, blok zapalovacích cívek s vývody podle počtu válců, balení podle
        počtu válců, zapalovací lišta/kazeta nebo systém s rozdělovačem).
    ignition_lead_compliance_standard:
      name: Norma shody zapalovacího kabelu
      description: Formální průmyslová norma nebo certifikace, kterou zapalovací kabely
        splňují, jak tvrdí výrobce (např. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Izolační materiál zapalovacího kabelu
      description: Primární izolace/materiál pláště použitý na zapalovacím kabelu
        (izolace vnějšího kabelu).
    ignition_lead_set_type:
      name: Typ sady zapalovacích kabelů
      description: Zda je produktem jeden zapalovací kabel nebo kompletní sada a k
        čemu je sada určena.
    ignition_lead_terminal_type:
      name: Typ terminálu zapalovacího kabelu
      description: Typ koncovky/konektoru používaný na koncích zapalovacího kabelu
        (např. koncovka pro svíčku a koncovka pro cívku/rozdělovač).
    illumination_type:
      name: Typ osvětlení
      description: Určuje, zda a jakým způsobem je míč osvětlen při hraní v noci (např.
        fosforeskující provedení, LED dioda aktivovaná nárazem).
    immobilizer_installation_type:
      name: Způsob montáže imobilizéru
      description: Označuje, jak je imobilizér nainstalován nebo připojen k vozidlu.
    immobilizer_unlock_method:
      name: Způsob odemknutí imobilizéru
      description: Určuje, jak se imobilizér aktivuje/deaktivuje nebo odemyká.
    impact_protection_certifications:
      name: Certifikace ochrany proti nárazu
      description: Uvádí konkrétní bezpečnostní normy, které chránič splňuje nebo
        převyšuje.
    impact_protection_level:
      name: Úroveň ochrany proti nárazům
      description: Určuje úroveň nárazové ochrany nebo technologii, kterou atletický
        pohár nabízí.
    impact_protection_rating:
      name: Hodnocení nárazové ochrany
      description: Určuje certifikovanou úroveň nárazové ochrany dle norem (např.
        EN 1621-1 úroveň 1, EN 14120 úroveň 2), což pomáhá jezdcům filtrovat pro vyšší
        stupeň ochrany.
    impact_surface_material:
      name: Materiál nárazové plochy
      description: Popisuje primární materiál povrchu absorbujícího nárazy kvůli bezpečnosti
        a komfortu (např. pěna, plast).
    incense_base_material:
      name: Základní materiál pro kadidlo
      description: Primární základní/pojivový materiál používaný k výrobě kadidla
        (práškový základ) v sadě.
    incense_making_method:
      name: Metoda výroby kadidla
      description: Zamýšlený proces Craft podporovaný sadou.
    incense_tool_type:
      name: Typ nástroje na kadidlo
      description: Určuje, o jaký druh nástroje pro výrobu kadidla se jedná (používá
        se k tvarování, měření, lisování, míchání nebo sušení kadidla).
    incline_adjustment_type:
      name: Typ nastavení sklonu
      description: Popisuje, jak (nebo zda) lze sklon během cvičení měnit.
    included_accessories:
      name: Součásti balení
      description: Uvádí doplňky, jako například náhradní hlavice/bity, úložné pouzdro,
        nabíjecí kabel nebo síťový adaptér.
    included_case_type:
      name: Typ přiloženého pouzdra
      description: Typ přepravního/úložného pouzdra dodávaného s bassaxofonem (pokud
        je dodáváno).
    included_components:
      name: Součásti v balení
      description: Uvádí, co je součástí balení (užitečné pro sady nářadí a balíčky).
    included_fastener_components:
      name: Upevňovací prvky v balení
      description: Určuje, zda se jedná o zapínání na háčky a očka, pouze na háčky,
        pouze na očka nebo o související variantu zapínání na oděv.
    included_hydration_vessel_type:
      name: Typ hydratační nádoby v ceně
      description: Identifikuje styl hydratační nádoby, kterou pás zahrnuje nebo podporuje.
    included_items_woodwind_instrument:
      name: Příslušenství v balení (dřevěný dechový nástroj)
      description: Uvádí, které běžně dodávané položky jsou dodávány v balení bassaxofonu.
    included_materials:
      name: Zahrnuté materiály
      description: Označuje, jaké komponenty jsou součástí nákupu střihu (pouze střih
        vs. střih + materiály).
    included_mounting_accessories:
      name: Dodávané montážní příslušenství
      description: Uvádí, které montážní/upevňovací příslušenství je součástí balení
        reproduktoru.
    included_pump_type:
      name: Typ zahrnutého čerpadla
      description: Identifikuje typ pumpy dodávané s nafukovací matrací nebo integrované
        v ní.
    included_scraper_implement_type:
      name: Typ nářadí shrnovače
      description: Označuje, které hrací náčiní je součástí hudební škrabky (např.
        škrabka, tyčinka/tyčinka, drátěný kartáč).
    indicator_design:
      name: Návrh indikátoru
      description: Klasifikuje fyzický tvar nebo styl indikátoru záběru při rybolovu.
    indicator_functions_tracked:
      name: Sledované funkce indikátoru
      description: Uvádí specifické herní metriky, které indikátor sleduje, jako například
        míče, striky, outy, směny, počet nadhozů, overy, branky, góly nebo downy.
    indoor_outdoor_use:
      name: Použití v interiéru/exteriéru
      description: Uvádí, zda je bowlingová hračka určena pro použití v interiéru,
        venku nebo pro obojí.
    inflatable_decoration_items_included:
      name: Nafukovací dekorační položka je součástí balení
      description: Uvádí klíčové příslušenství, které je součástí nafukovací dekorace
        (např. ventilátor, kolíky, upevňovací lana).
    inflatable_decoration_type:
      name: Typ nafukovací dekorace
      description: Určuje druh nafukovací párty dekorace (tvar/formát) pro podporu
        procházení a filtrování.
    inflatable_raft_float_features:
      name: Vlastnosti nafukovacího raftu/plováku
      description: Funkční vlastnosti nafukovacího raftu/plováku.
    inflation_method_included:
      name: Metoda nafukování v ceně
      description: Určuje typ roztoku pro huštění pneumatik, který je součástí opravné
        sady, pokud existuje.
    infused_scent:
      name: Vůně
      description: Identifikuje vonné nebo chuťové přísady, kterými je materiál návnady
        napuštěn.
    ingredient_base_type:
      name: Typ základní ingredience
      description: Identifikuje primární základ použitý pro fermentaci (např. koncentrát
        hroznové šťávy vs. čerstvá šťáva vs. ovocný koncentrát).
    ingredient_physical_form:
      name: Fyzická forma složky
      description: Určuje fyzickou formu, ve které se vonná složka dodává (používá
        se pro manipulaci, měření a formulaci).
    ingredient_processing_method:
      name: Způsob zpracování surovin
      description: Určuje primární techniku zpracování použitou na složku (např. lyofilizace,
        pražení, fermentace).
    ink_colors_included:
      name: Barvy inkoustů obsažené v balení
      description: Určuje barvy inkoustu obsažené v inkoustových polštářcích v sadě.
    ink_pad_application_method:
      name: Metoda aplikace inkoustového polštářku
      description: Jak se inkoust dávkuje/používá z polštářku (tradiční razítkovací
        polštářek vs. roztírací polštářek vs. polštářek se štětcem).
    ink_pad_permanence:
      name: Trvalost inkoustového polštářku
      description: Zda je razítkový inkoust permanentní anebo archivní (odolnost vůči
        blednutí a vodě po zaschnutí).
    ink_pad_size:
      name: Velikost inkoustové podložky
      description: Standardizovaná velikost/tvarový faktor povrchu inkoustového polštářku/pouzdra.
    ink_pad_special_effects:
      name: Speciální efekty inkoustového polštářku
      description: Speciální vizuální/funkční efekty inkoustu při razítkování (např.
        metalický, třpytivý).
    ink_permanence:
      name: Trvanlivost inkoustu
      description: Informuje, zda je zaschlý inkoust Sumi určen jako permanentní/archivní
        či omyvatelný/dočasný.
    ink_preparation_required:
      name: Nutná příprava inkoustu
      description: Označuje, zda je inkoust sumi připraven k použití, nebo zda je
        nutné jej před použitím zředit vodou či rozemlít.
    inline_skate_brake_type:
      name: Typ brzdy pro inline brusle
      description: Určuje konfiguraci brzdy, která je součástí inline bruslí, například
        odnímatelná patní brzda nebo žádná brzda.
    inner_tent_configuration:
      name: Konfigurace vnitřního stanu
      description: Určuje konfiguraci nebo styl vnitřního stanu, například plná vložka,
        síťovaná vložka nebo tepelná vložka.
    innerspring_coil_type:
      name: Pružinový typ
      description: Určuje konstrukční styl pružinového systému uvnitř matrace, který
        ovlivňuje oporu, izolaci pohybu a cenu.
    input_connector_type:
      name: Typ vstupního konektoru
      description: Určuje typ vstupního audio konektoru používaného pedálem (obvykle
        1/4palcový TS konektor).
    input_valve_type:
      name: Typ ventilku
      description: Označuje normu ventilku duše/kola na jízdním kole, ze kterého se
        adaptér připojuje.
    insecticide_treatment:
      name: Insekticidní ošetření
      description: Označuje, zda byla síťovina z výroby ošetřena insekticidem, a pokud
        ano, typ ošetření použitého pro dodatečnou ochranu.
    insert_coverage_area:
      name: Oblast pokrytí vložky
      description: Určuje, pod kterou částí chodidla má vložka být (např. po celé
        délce, pouze pod patou).
    insert_length_type:
      name: Zadejte typ délky
      description: Udává, jakou část stélky zaujímá opora klenby.
    inside_message_type:
      name: Typ sdělení uvnitř
      description: Informuje, zda přání obsahuje předtištěné sdělení a zda ho lze
        přizpůsobit.
    insole_attachment_method:
      name: Způsob uchycení vložky
      description: Určuje, jakým způsobem se opora klenby drží na místě uvnitř boty
        (volně vložená, nalepovací, suchý zip atd.).
    insole_material:
      name: Materiál vložky
      description: Popisuje materiál stélky nebo vložky, na které spočívá chodidlo,
        polstrování proti nárazu a opory.
    installation_fabrication_level:
      name: Úroveň provedení instalace
      description: Informuje o typickém rozsahu vlastního zhotovení či úprav potřebných
        k instalaci sady.
    installation_location:
      name: Místo instalace
      description: Určuje typický bod instalace snímače tlaku oleje v olejovém systému
        motoru (např. otvor olejového kanálu bloku, pouzdro filtru, sendvičová deska
        nebo montáž vzdáleného potrubí).
    installation_method:
      name: Způsob instalace
      description: Specifikuje, jak je podložka nebo dlaždice upevněna či instalována
        na podlaze.
    instant_coffee_form:
      name: Forma instantní kávy
      description: Popisuje fyzickou formu, ve které se instantní káva dodává, což
        má vliv na způsob přípravy a trvanlivost.
    instep_coverage:
      name: Krytí nártu
      description: Určuje, zda produkt chrání pouze holeň, nebo holeň i nárt/chodidlo.
    instruction_format:
      name: Formát pokynů
      description: Formát pokynů přiložených k sadě.
    instrument_cleaning_swab_form_factor:
      name: Provedení čisticího tamponu na nástroje
      description: Určuje fyzický styl tamponu (např. protahovací hadřík vs. systém
        tyč/kartáč) tak, aby odpovídal omezením hráče a nástroje.
    instrument_dimensions_unit_context:
      name: Kontext jednotek rozměru nástroje
      description: Vysvětluje, na co se vztahují uvedené rozměry výšky/šířky/délky
        (např. celý nástroj, délka jedné trubice, výška stojanu).
    instrument_electronics_type:
      name: Typ přístrojové elektroniky
      description: Uvádí, zda je systém snímání/předzesilovače nástroje aktivní nebo
        pasivní.
    instrument_key:
      name: Legenda k notám
      description: Specifikuje tóninu zobcové flétny uváděnou v katalozích (u větších
        zobcových fléten obvykle C nebo F).
    instrument_level:
      name: Úroveň přístroje
      description: Cílová úroveň hráče pro nabídku nástrojů.
    instrument_part_mounting_method:
      name: Způsob montáže části nástroje
      description: Určuje, jak se součást připevňuje nebo instaluje (např. upevnění
        svorkami vs. lepidlem vs. šroubováním).
    instrument_parts_included:
      name: Součásti nástroje jsou součástí balení
      description: Uvádí hlavní součásti/části, které jsou součástí balení pro A klarinet.
    instrument_playing_technique:
      name: Technika hry na nástroj
      description: Jak se na nástroj obvykle hraje (např. třesením, údery, klepáním).
    instrument_size_class:
      name: Velikostní třída nástroje
      description: Obecná velikost nástroje vyjádřená jako uživatelsky přívětivá kategorie
        namísto přesných rozměrů.
    insulation_fill_material:
      name: Izolační výplňový materiál
      description: Identifikuje primární materiál použitý k izolaci bundy nebo vesty.
    integrated_bottom_type:
      name: Integrovaný spodní typ
      description: Označuje, zda oděv obsahuje všité trenýrky, kraťasy, trikot nebo
        podobné podkladové vrstvy k zakrytí těla při pohybu.
    integrated_charging_options:
      name: Integrované možnosti nabíjení
      description: Zobrazuje seznam vestavěných napájecích nebo nabíjecích rozhraní
        dostupných na nočním stolku.
    integrated_furniture_function:
      name: Funkce integrovaného nábytku
      description: Označuje další integrované prvky nábytku, které jsou součástí sklápěcí
        postele nebo rámu (např. stůl, pohovka, police).
    integrated_locking:
      name: Integrované zamykání
      description: Zda je regál vybaven integrovaným zámkem pro propojení regálu s
        vozidlem a/nebo z kola s regálem.
    integrated_power_options:
      name: Integrované možnosti napájení
      description: Označuje typ vestavěného napájení nebo funkcí nabíjení, které toaletní
        stolek nabízí.
    integrated_storage_features:
      name: Integrované úložné funkce
      description: Označuje další úložné prostory nebo příslušenství, které kulečníkový
        stojan na tága obsahuje, nad rámec slotů pro tága.
    integrated_tool_functions:
      name: Obsažené funkce nástroje
      description: Další nástroje integrované do páky (např. háček na drátky, odstraňovač
        jádra ventilku, sesazovač patek pneumatiky).
    intended_board_type:
      name: Zamýšlený typ desky
      description: Určuje styl kiteboardu, pro který je ploutev určena (např. twin
        tip, směrový surf, hydrofoil).
    intended_consumption:
      name: Zamýšlený způsob konzumace
      description: Určuje, jak má být produkt konzumován, a to s uvedením, zda je
        bezpečný pro konzumaci syrový, zda vyžaduje pečení nebo zda je částečně upečený.
    intended_craft:
      name: Zamýšlené kreativní využití
      description: Primární kreativní kontext, pro který je průvodce přízí určen.
    intended_culinary_use:
      name: Zamýšlené kulinářské použití
      description: Označuje primární kulinářské použití omáčky, jako je namáčení,
        vaření nebo glazování.
    intended_handlebar_style:
      name: Zamýšlený styl řídítek
      description: Popisuje, pro jaký typ řídítek nebo způsob použití je páčka určená
        (např. plochá, zahnutá, aero). Lze tak rychle upřesnit kompatibilitu bez nutnosti
        dalších podkategorií.
    intended_player_role:
      name: Zamýšlená role hráče
      description: Určuje roli na hřišti, pro kterou je chránič hlavy určen (např.
        chytač, rozhodčí).
    intended_playing_surface:
      name: Zamýšlená hrací plocha
      description: Povrch, pro který je puk, míč nebo kroužek určen, např. led, asfalt,
        podlahy tělocvičen nebo syntetický led.
    intended_repair_location:
      name: Místo zamýšlené opravy
      description: Místo na pneumatice, které má sada opravit.
    intended_seating_position:
      name: Zamýšlená poloha sezení
      description: Určuje polohu sezení ve vozidle, pro kterou je popruh bezpečnostního
        pásu určen k instalaci nebo použití.
    intended_sewing_application:
      name: Zamýšlená šicí aplikace
      description: Zamýšlené šicí aplikace, pro které je nit navržena (např. univerzální
        šití oděvů, prošívání, čalounění).
    intended_technique:
      name: Zamýšlená technika
      description: Primární technika plstění, pro kterou je podložka/rohož určena.
    intended_use:
      name: Zamýšlené použití
      description: Primární kontext použití nástroje.
    intended_use_fleece_fabric:
      name: Zamýšlené použití (fleecová tkanina)
      description: Primární projekt/aplikace, pro kterou je fleecová tkanina uváděna
        na trh.
    intended_user:
      name: Zamýšlený uživatel
      description: Označuje, pro koho je ochranná výstroj letadla určena.
    intended_yarn_form:
      name: Zamýšlený tvar příze
      description: Určuje prezentaci příze, ke které se miska na přízi nejlépe hodí.
    interaction_mode:
      name: Způsob interakce
      description: Primární metoda interakce používaná ke spouštění zvuků nebo aktivit.
    interactive_effects:
      name: Interaktivní efekty
      description: Označuje interaktivní elektronické nebo mechanické efekty, které
        dětská kuchyňka nabízí.
    interfacing_application_area:
      name: Propojení aplikační oblasti
      description: Identifikuje běžné oblasti šití/kreativní výroby, které má výztuha
        podporovat.
    interfacing_color_family:
      name: Barevná rodina výztuží
      description: Označuje typickou základní barvu mezivrstvy používanou pro použití
        pod světlé nebo tmavé tkaniny.
    interfacing_selling_format:
      name: Propojovací prodejní formát
      description: 'Popisuje prodejní formát propojení (například kontinuální řezané
        produkty: délka, předřezané kusy, role nebo vzorky).'
    interfacing_stiffness_level:
      name: Úroveň tuhosti rozhraní
      description: Popisuje stupeň tuhosti/pevnosti poskytovaný rozhraním.
    interior_padding_type:
      name: Typ vnitřního polstrování
      description: Typ vnitřního polstrování nebo vkládacího systému používaného uvnitř
        pouzdra k ochraně a uspořádání obsahu.
    interior_stall_configuration:
      name: Konfigurace vnitřního stánku
      description: Specifikuje vnitřní rozvržení/konfiguraci pro přepravu zvířat (orientace
        stání a způsob rozdělení).
    invitation_printing_coverage:
      name: Pokrytí tisku pozvánek
      description: Která strana (strany) pozvánky se potištějí (pouze přední vs. oboustranná).
    iodization:
      name: Jodizace
      description: Udává, zda a v jakém množství byl do soli přidán jód.
    iridescence_level:
      name: Úroveň iridescence
      description: Popisuje intenzitu přirozeného/ošetřeného duhového lesku typického
        pro paví peří.
    irish_warpipe_set_configuration:
      name: Konfigurace irských dud
      description: Označuje, jaká konfigurace se prodává (celý nástroj vs. díly/částečná
        sada) konkrétně pro irské warpipes.
    iron_on_applique_application_method:
      name: Metoda aplikace nažehlovací aplikace
      description: Určuje, jak se má nažehlovací aplikace aplikovat na podklad.
    ironing_center_features:
      name: Funkce žehlicího centra
      description: Uvádí specializované funkce žehlicích center, které zvyšují použitelnost
        a pohodlí.
    jacket_breast_style:
      name: Styl saka
      description: Určuje, zda je sako jednořadé nebo dvouřadé.
    jacket_vent_style:
      name: Střih s rozparky
      description: Označuje typ rozparku na zadní straně saka.
    jam_and_jelly_consistency:
      name: Konzistence džemu a želé
      description: Popisuje texturu pomazánky a informuje o přítomnosti kousků ovoce
        nebo semínek.
    jaw_shape:
      name: Tvar čelistí
      description: Geometrie čelistí nebo špiček (např. rovné, zahnuté, dlouhé), která
        má vliv na přesnost a dosah.
    jerky_form:
      name: Trhaný tvar
      description: Popisuje fyzickou formu nebo řez sušeného masa (např. proužky,
        tyčinky, kousky).
    jersey_style:
      name: Styl bundy
      description: Určuje tvar dresu nebo styl nošení pro fanouškovské dresy.
    jew_harp_accessories_included:
      name: Včetně příslušenství k ústní harfě
      description: Uvádí položky přibalené k židovské harfě (např. pouzdro, váček,
        návod).
    jew_s_harp_frame_style:
      name: Styl rámu židovské harfy
      description: Popisuje konstrukční styl rámu/těla židovské harfy, který ovlivňuje
        pocit při hraní, odolnost a ergonomii.
    jew_s_harp_tongue_profile:
      name: Profil jazýčku brumle
      description: Popisuje profil/geometrii jazýčku (plátku) brumle, který ovlivňuje
        citlivost a zabarvení tónu.
    jewelry_pieces_included:
      name: Součástí balení jsou šperky
      description: Uvádí konkrétní šperkovní položky obsažené v sadě, aby nakupující
        věděli, jaké kusy si kupují.
    jigsaw_puzzle_piece_shape:
      name: Tvar skládačky puzzle
      description: Obecný styl řezu/tvar kusů a profil hran.
    jockstrap_design_features:
      name: Konstrukční prvky jockstrapu
      description: Popisuje speciální designové prvky jedinečné pro suspenzory, které
        ovlivňují funkčnost nebo estetiku.
    juggling_club_construction_type:
      name: Typ konstrukce žonglovacího kuželu
      description: Specifikuje celkový typ konstrukce žonglovacího kuželu (např. jednodílný
        vs. vícedílný), který může mít vliv na životnost, dojem při používání a údržbu.
    juggling_club_core_material:
      name: Základní materiál žonglovacího kuželu
      description: Hlavní materiál použitý uvnitř hole (odlišný od vnějšího obalu/pásky).
    juggling_prop_set_size:
      name: Velikost sady žonglérských pomůcek
      description: Počet hlavních rekvizit obsažených v sadě (např. sada 3 míčků,
        spárovaný pár poi).
    juggling_ring_edge_style:
      name: Styl okraje žonglovacího prstenu
      description: Profil hrany kroužku, který má vliv na komfort a chytání.
    juice_form:
      name: Typ džusu
      description: Určuje fyzickou formu nebo fázi zpracování produktu (např. kapalina
        s jednou koncentrací, koncentrát, prášek).
    juice_processing_method:
      name: Způsob zpracování šťávy
      description: Specifikuje primární techniku zpracování džusu nebo nápoje, která
        má vliv na chuť, zachování živin a trvanlivost.
    jump_rope_style:
      name: Styl švihadla
      description: Klasifikuje konstrukční typ lanka/šňůry švihadla (např. korálkové,
        látkové, rychlostní), který výrazně ovlivňuje zamýšlené použití a vlastnosti.
    kale_variety:
      name: Odrůda kapusty
      description: Identifikuje konkrétní kultivar nebo odrůdu kapusty (např. kadeřavá,
        černá). Nakupující si tak mohou vybrat na základě chuti, textury a kulinářského
        využití.
    kaleidoscope_viewing_type:
      name: Typ kaleidoskopu
      description: Určuje způsob nahlížení do kaleidoskopu nebo styl jeho ovládání
        (např. klasický okulár, teleidoskop s čočkou, ovládání kolečkem, projekční).
    kayak_construction_type:
      name: Typ konstrukce kajaku
      description: Určuje primární konstrukční typ kajaku, například s tvrdou skořepinou
        nebo nafukovací.
    kayak_design_type:
      name: Typ konstrukce kajaku
      description: Klasifikuje primární konstrukční záměr kajaku (např. surfski, playboat,
        touring).
    kayak_hull_design:
      name: Návrh trupu kajaku
      description: Identifikuje primární tvar trupu, který má vliv na manipulační
        vlastnosti, jako jsou stabilita a manévrovatelnost ve vlnách.
    kayak_storage_bag_type:
      name: Typ tašky na uložení kajaku
      description: Určuje styl nebo formát úložného vaku na kajak, například nepromokavého
        vaku nebo vaku na pádla.
    kayak_style:
      name: Kajakový styl
      description: Určuje primární design nebo styl použití kajaku (např. rekreační,
        turistický, nafukovací).
    keel_type:
      name: Typ kýlu
      description: Identifikuje konfiguraci kýlu plachetnice.
    kettlebell_style:
      name: Styl kettlebellu
      description: Identifikuje konstrukční nebo stylové varianty kettlebellu (např.
        soutěžní, nastavitelný, měkký), což pomáhá nakupujícím vybrat ten správný
        zvon pro jejich tréninkové potřeby.
    key_attachment_mechanism:
      name: Mechanismus uchycení klíče
      description: Určuje hardware použitý k zajištění klíčů uvnitř pouzdra, jako
        jsou kroužky, spony nebo šroubovací sloupky.
    key_retention_when_unlocked:
      name: Držení klíče v odemčeném stavu
      description: Označuje, zda lze klíč vyjmout ze zámku, když je v odemčené poloze.
    keyboard_amplifier_inputs:
      name: Vstupy zesilovače kláves
      description: Zobrazí vstupní propojení podporovaná klávesovým zesilovačem (např.
        1/4 vstup TRS, MIDI vstup, Bluetooth).
    keyboard_amplifier_output_types:
      name: Typy výstupů zesilovače kláves
      description: Určuje typy primárních výstupních konektorů podporovaných zesilovačem
        kláves pro posílání zvuku do jiných systémů.
    keyboard_case_handle_type:
      name: Typ rukojeti pouzdra klávesnice
      description: Primární systém rukojeti sloužící k pohybu/přenášení pouzdra klávesnice
        (kromě popruhů).
    keyboard_case_interior_padding_type:
      name: Typ vnitřního polstrování pouzdra klávesnice
      description: Primární vnitřní čalounění/obložení použité uvnitř pevného pouzdra.
    keyboard_case_protection_level:
      name: Úroveň ochrany pouzdra klávesnice
      description: Celková třída ochrany/pevnosti pevného pouzdra, odlišující pouzdra
        s lisovaným tvrdým pláštěm od pouzder heavy-duty/ATA stylu.
    keyboard_case_wheel_type:
      name: Kryt s klávesnicí a kolečky
      description: Konfigurace kol pro pevná pouzdra s kolečky.
    keyboard_pedal_connector_type:
      name: Typ konektoru pro klávesový pedál
      description: Určuje typ konektoru/zástrčky použitého pro připojení sustain pedálu
        k klávesám nebo digitálnímu pianu.
    keyboard_power_supply_type:
      name: Typ napájení klávesnice
      description: Primární způsob napájení kláves (baterie, síťový adaptér, napájení
        přes USB).
    keyboard_stand_tier_type:
      name: Typ stojanu na klávesnici
      description: Informuje, zda se stojan prodává pouze jako základní stojan, nebo
        zda zahrnuje/přidává příslušenství druhé úrovně.
    keyboard_stand_tiers:
      name: Úrovně stojanů na klávesy
      description: Počet hracích pater podporovaných stojanem ve tvaru Z (např. jednopatrový
        nebo dvoupatrový).
    keychain_attachment_type:
      name: Typ uchycení na klíčenku
      description: Určuje primární upevňovací hardware používaný k upevnění klíčenky
        ke klíčům, taškám nebo opaskům.
    keychain_style:
      name: Styl klíčenky
      description: Popisuje celkový tvar klíčenky (jak fyzicky vypadá).
    keywork_finish:
      name: Povrchová úprava klapek
      description: Popisuje povrchovou úpravu/pokovení konkrétně na klíčích (klávesách),
        odděleně od povrchové úpravy těla.
    kick_point:
      name: Bod výkopu
      description: Určuje umístění ohebného bodu kickpointu na shaftu hokejky, což
        ovlivňuje rychlost a pocit při střele.
    kick_zone_grip_system:
      name: Systém odrazu
      description: Označuje technologii použitou v odrazové zóně lyže pro lepší trakci.
    kickboard_features:
      name: Vlastnosti kickboardu
      description: Vyzdvihuje speciální vlastnosti plovací desky, které pomáhají nácviku
        nebo pohodlí, včetně textury povrchu a možností úchopu.
    kickboard_handle_style:
      name: Styl úchopu plovací desky
      description: Určuje, zda a jaké má deska úchopy nebo povrchové úpravy, které
        mají vliv na manipulaci a pohodlí.
    kickstand_mounting_position:
      name: Montážní poloha stojánku
      description: Označuje místo na rámu jízdního kola, kde se upevňuje stojánek
        (např. středový úchyt, úchyt na řetězovou vzpěru, úchyt na zadní nápravu).
    kickstand_type:
      name: Typ stojánku
      description: Popisuje konstrukční styl nebo mechanismus stojánku (např. boční
        stojan s jednou nohou, středový stojan s dvěma nohami, teleskopický).
    kidney_belt_support_level:
      name: Úroveň podpory ledvinového pásu
      description: Výrobcem určená celková úroveň podpory poskytovaná ledvinovým pásem
        pro stabilizaci dolní části zad a břicha.
    kiln_firing_atmosphere:
      name: Atmosféra při vypalování v peci
      description: Určuje vypalovací atmosféru (atmosféry), kterou může pec během
        provozu podporovat (např. oxidaci nebo redukci).
    kiln_heating_element_type:
      name: Typ topného tělesa pece
      description: Typ/materiál topných těles použitých v peci.
    kingpin_design:
      name: Konstrukce kingpinu
      description: Popisuje konstrukční typ samotného kování kingpinu, který má vliv
        na hmotnost a prostor pro grindování.
    kingpin_orientation:
      name: Orientace kingpinu
      description: Určuje orientaci kingpinu podvozku, která ovlivňuje jízdní vlastnosti
        a kompatibilitu s deskami.
    kit_components_included:
      name: Součásti sady v balení
      description: Uvádí fyzický seznam součástí hardware dodávaného v sadě (např.
        zemní kolíky, šrouby, pásky, instalační nástroje), aby nakupující věděli,
        co přesně kupují.
    kit_format:
      name: Formát sady
      description: Určuje způsob balení a přepravy sady (např. sáček, pouzdro, krabice).
    kit_items_included:
      name: Součásti sady
      description: Uvádí nejdůležitější vybavení a spotřební materiál sady pro výrobu
        vína, aby mohli nakupující odlišit startovací sady od sad k pouhému doplnění
        ingrediencí.
    kit_pouch_case_type:
      name: Typ pouzdra na sadu
      description: Určuje typ zahrnutého úložného řešení pro sadu péče (pokud existuje).
    kit_tools_included:
      name: Nástroje v sadě
      description: Uvádí hlavní nástroje obsažené v sadě (pokud existují) pro dokončení
        projektu.
    kite_inflation_system:
      name: Systém nafukování draků
      description: Označuje, jak jsou nafouknuty náběžná hrana a vzpěry draka.
    kite_line_configuration:
      name: Konfigurace šňůry draka
      description: Označuje počet šňůr/řídicích šňůr, pro které je kiteplachta navržena,
        což je běžná specifikace pro správné párování tyčí a šňůr.
    kite_type:
      name: Typ draka
      description: Definuje kategorii konstrukčního provedení draka (tvar a styl uzdy).
    kiteboard_bag_style:
      name: Styl tašky na kiteboard
      description: Specifický styl nebo podtyp pouzdra na kiteboard (např. vak na
        prkno, golfový bag, cestovní pouzdro, fóliové pouzdro).
    kiwifruit_variety:
      name: Odrůda kiwi
      description: Identifikuje konkrétní kultivar nebo barvu odrůdy kiwi (zelená,
        zlatá, červená atd.).
    knee_pad_pocket_type:
      name: Typ s kapsou na chrániče kolen
      description: Označuje, zda a jak se na oděv dají nasadit ochranné chrániče kolen.
    knee_pad_style:
      name: Typ chrániče kolen
      description: Popisuje konstrukční styl nebo provedení chrániče kolen (např.
        návlek, ortéza, chránič).
    knee_protection_design:
      name: Konstrukce chrániče kolen
      description: Označuje počet výklopných kolenních částí zabudovaných do chrániče
        nohou.
    kneeboard_construction:
      name: Konstrukce kolenní desky
      description: Identifikuje primární konstrukční techniku nebo kompozitní konstrukci
        desky (např. rotační lisování plastu, kompresní lisování, uhlíková vlákna).
    kneeboard_strap_type:
      name: Typ popruhu klekacího prkna
      description: Popisuje styl systému kolenních popruhů používaných k zajištění
        jezdce k prknu.
    knife_lock_mechanism:
      name: Zajišťovací mechanismus nože
      description: Určuje mechanismus používaný k zajištění čepele skládacího nože
        v otevřené poloze nebo označuje provedení bez uzamčení.
    knife_locking_mechanism:
      name: Zajišťovací mechanismus nože
      description: Určuje typ mechanismu, který drží čepel v otevřené poloze, a přímo
        definuje bezpečnost, pevnost a snadnost použití zavíracího nože.
    knife_opening_mechanism:
      name: Mechanismus otevírání nože
      description: Popisuje, jak se čepel otevírá z rukojeti – rozlišují se manuální,
        asistované, automatické a speciální styly otevírání.
    knife_system:
      name: Systém nožů
      description: Zda a jak funguje řezací nůž na ovíječce.
    knit_elastic_application:
      name: Pletená elastická aplikace
      description: Určuje zamýšlené šití/kreativní použití pro pletený elastický lem.
    knit_pattern:
      name: Pletený vzor
      description: Identifikuje primární pletený steh nebo texturu použitou v látce
        kardiganu, jako je copánkový, žebrovaný nebo vaflový vzor, což umožňuje nakupujícím
        najít specifické textury a tepelné vlastnosti.
    knit_style:
      name: Pletený styl
      description: Určuje primární úpletovou konstrukci, texturu nebo dekorativní
        vzor použitý na látce svetru.
    knitting_marker_counter_type:
      name: Typ pletací značky/počítadla
      description: Určuje funkční typ produktu v rámci pletacích značek a čítačů.
    knitting_needle_tip_style:
      name: Styl hrotu pletací jehlice
      description: Ostrost/tvar špičky optimalizované pro různé příze a techniky.
    knock_sensor_technology:
      name: Technologie snímače klepání
      description: Technologie snímání použitá v senzoru klepání.
    knurl_aggressiveness:
      name: Agresivita vroubkování
      description: Popisuje ostrost nebo texturu vroubkovaného vzoru na tyči, ovlivňující
        pohodlí a bezpečnost úchopu.
    knurl_marking_standard:
      name: Standardní značení vroubkovaných hran
      description: Určuje polohu referenčních kroužků s vroubkováním používaných pro
        umístění ruky (např. značky IPF nebo IWF).
    kohlrabi_variety:
      name: Odrůda kedlubnu
      description: Určuje kultivar nebo odrůdu kedlubnu, což umožňuje zákazníkům vybrat
        si mezi různými chuťovými profily, velikostmi a barvami.
    koji_mold_type:
      name: Typ formy Koji
      description: Označuje typ nebo kmen plísně koji použitý během fermentace, což
        ovlivňuje aroma a chuť.
    kumquat_variety:
      name: Odrůda kumquatu
      description: Identifikuje kultivar nebo odrůdu nabízených kumquatů, umožňuje
        nakupujícím vybrat ovoce na základě chuťového profilu, velikosti nebo kulinářské
        aplikace.
    label_edge_type:
      name: Typ okraje nášivky
      description: Určuje styl úpravy lemů použitý za účelem zabránění třepení a definování
        estetiky.
    label_finish:
      name: Ohraničení nášivky
      description: Určuje povrchovou úpravu, texturu nebo ochranný nátěr/úpravu aplikovanou
        na štítek.
    label_finish_edge_style:
      name: Ohraničení nášivky / styl lemu
      description: Způsob úpravy okrajů, který ovlivňuje pohodlí a odolnost (např.
        tkaný okraj vs. laserově řezaný okraj).
    label_fold_type:
      name: Typ přehybu štítku
      description: Určuje, jak je všívaný štítek konstruován pro šití do položky (např.
        koncový přehyb vs. středový přehyb), což ovlivňuje způsob jeho aplikace a
        umístění.
    label_text_type:
      name: Typ textu na štítku
      description: Informuje, zda je nášivka čistá, předtištěná nebo je určena k úpravě/přizpůsobení.
    lace_area_size:
      name: Velikost krajkové oblasti
      description: Definuje velikost nebo konfiguraci krajkové části (např. zapínání
        4×4, čelní 13×6), což určuje dostupný dělící prostor.
    lace_tightener_style:
      name: Styl utahovače tkaniček
      description: Identifikuje mechanické provedení nebo tvarový faktor zařízení
        pro utahování tkaniček.
    lace_type:
      name: Typ krajky/tkaničky
      description: Popisuje krajkový materiál nebo povrchovou úpravu na linii vlasů/čepice,
        což ovlivňuje realismus a shodu s odstínem pleti.
    lacrosse_ball_certification:
      name: Certifikace lakrosového míče
      description: Určuje schválení nebo standardy sportovních řídících orgánů, které
        lakrosový míč splňuje.
    lacrosse_goal_regulation_certification:
      name: Oficiální certifikace lakrosové branky
      description: Označuje, zda lakrosová branka nebo síť splňuje specifikaci konkrétního
        řídícího orgánu (např. NCAA nebo NFHS).
    lacrosse_pocket_type:
      name: Typ kapsy na lakros
      description: Určuje obecný styl kapsy nebo síťoviny zapletené do hlavy, ovlivňující
        kontrolu míče a jeho uvolnění.
    lacrosse_string_type:
      name: Typ lakrosového výpletu
      description: Klasifikuje přesnou formu nebo zamýšlené použití výpletu nebo síťoviny,
        aby zákazníci mohli rozlišovat mezi kusy síťoviny, sadami a konkrétní role
        šňůr v kapse.
    ladder_position:
      name: Poloha žebříku
      description: Označuje, kde se na dětské posteli Loft nachází žebřík nebo schodiště.
    lanyard_attachment_hardware:
      name: Prvek k upevnění šňůrky na krk
      description: Označuje typ prvku na konci šňůrky, který slouží k upevnění ke
        klíčům, průkazům, telefonům nebo jiným doplňkům.
    lanyard_style:
      name: Typ šňůrky
      description: Určuje, jak se šňůrka na krk nosí.
    lanyard_type:
      name: Typ šňůrky na krk
      description: Popisuje styl šňůrky na krk dodávané s píšťalkou nebo s ní kompatibilní.
    lap_hand_loom_accessories_included:
      name: Příslušenství v balení ručního tkalcovského stavu
      description: Příslušenství je součástí balení ručního tkalcovského stavu.
    lapel_style:
      name: Styl klopy
      description: Určuje design klopy saka (např. zářez, kšilt, šál).
    laser_safety_class:
      name: Třída laserové bezpečnosti
      description: Klasifikace laserové bezpečnosti produktu (např. třída 2, 3R, 3B,
        4), jak je uvedená v dokumentaci / na štítku zařízení.
    latex_processing_method:
      name: Způsob zpracování latexu
      description: Určuje výrobní proces používaný k výrobě latexové pěny (obvykle
        Dunlop nebo Talalay), který ovlivňuje dojem, odezvu a cenu.
    latex_type:
      name: Typ latexu
      description: Uvádí původ a složení latexu použitého v matraci (přírodní, organický,
        syntetický nebo směsný), informuje nakupující o trvanlivosti, ekologické šetrnosti
        a potenciálních alergenech.
    launch_profile:
      name: Odpalový profil
      description: Označuje typickou trajektorii odpalu (nízká, střední, vysoká),
        pro kterou je shaft golfové hole navržen.
    launcher_mounting_configuration:
      name: Konfigurace upevnění odpalovacího zařízení
      description: Identifikuje, jak je odpalovací zařízení namontováno nebo konfigurováno
        pro použití, což pomáhá kupujícím, kteří potřebují samostatné, podhlavňové
        nebo na lištu montované varianty.
    layer_construction:
      name: Stavba vrstev
      description: Určuje konstrukci laminované tkaniny (např. 2vrstvá, 2,5vrstvá,
        3vrstvá), která ovlivňuje hmotnost, sbalitelnost a trvanlivost.
    layer_design:
      name: Návrh vrstev
      description: Popisuje konstrukci síťky na vlasy z hlediska vrstev nebo oboustrannosti.
    lazy_kate_tension_control_type:
      name: Typ regulace napětí Lazy Kate
      description: Jak líná kate aplikuje odpor/napětí na cívky během navíjení nebo
        pletení.
    lead_hardware_type:
      name: Typ kování vodítka
      description: Definuje styl upevnění nebo upevňovacího prvku na konci vodítka
        (patentka, spona, smyčka, řetízek atd.), ovlivňující snadnou použitelnost,
        bezpečnost a vhodnost pro daný obor.
    leaf_gelatin_grade:
      name: Jakost plátkové želatiny
      description: Určuje standardizovaný stupeň pevnosti používaný pro želatinové
        listy.
    leaf_preparation:
      name: Příprava listů
      description: Popisuje, jak se listy připravují před balením, například sekanými,
        drcenými nebo nakrájenými na kousky.
    leaf_spring_material:
      name: Materiál listových pružin
      description: Primární konstrukční materiál listových pružin.
    leak_protection_layer:
      name: Ochranná vrstva proti průsaku
      description: Označuje, zda vestavěný systém plenek plaveckého ochranného systému
        používá jednovrstvou nebo dvouvrstvou konstrukci pro ochranu proti protečení.
    leash_clip_type:
      name: Typ spony na vodítko
      description: Určuje typ klipu nebo hardware používaného k připevnění vodítka
        k obojku nebo postroji (např. karabina, otočná klipsna, spona na šroub).
    leash_style:
      name: Styl šňůry
      description: Popisuje konfiguraci nebo styl navíjení šňůry.
    leash_type:
      name: Typ vodítka
      description: Klasifikuje celkový styl nebo účelem definovanou konfiguraci vodítka
        pro rychlé filtrování podle zamýšleného použití.
    leavening_action_type:
      name: Typ kynutí
      description: Identifikuje chemické složení nebo způsob kypření prášku do pečiva
        (např. jednočinný, dvojčinný, bez hliníku). To má přímý vliv na průběh pečení
        a vhodnost pro recepty.
    leavening_agent:
      name: Kypřicí látka
      description: Určuje primární mechanismus kynutí použitý v těstě.
    led_color_options:
      name: Možnosti LED barev
      description: Zobrazuje seznam volitelných barev LED diod na hlásiči k vizuální
        indikaci záběru.
    led_indicator_color:
      name: Barva LED indikátoru
      description: Identifikuje barvu LED indikátoru produktu, což pomáhá rybářům
        sladit více hlásičů nebo přizpůsobit jejich osobní preference.
    led_light_color:
      name: Barva LED světla
      description: Určuje barvu případného integrovaného LED osvětlení.
    leek_variety:
      name: Odrůda póru
      description: Určuje kultivar nebo odrůdu pórku, což umožňuje rozlišení podle
        chuti, velikosti a vegetačního období.
    leg_coverage:
      name: Krytí nohou
      description: Určuje, jakou část nohy neopren zakrývá (např. krátký, plný).
    leg_cuff_style:
      name: Styl manžety na nohavici
      description: Určuje styl zakončení kotníkového vyústění kalhot.
    leg_cut_height:
      name: Výška řezu nohavic
      description: Označuje, jak vysoko je vyříznut otvor pro nohy na spodním dílu
        bikin.
    leg_cut_style:
      name: Střih s rozparkem na nohavici
      description: Popisuje tvar zakončení nohavice, který má vliv na vzhled, pohodlí
        a opálení.
    leg_length:
      name: Délka nohavice
      description: Kategorizuje trenýrky podle relativní délky nohavic (krátké, střední,
        dlouhé), aby si nakupující mohli vybrat preferovanou variantu bez rozdělování
        kategorie.
    leg_loop_type:
      name: Typ závěsu na nohu
      description: Popisuje konstrukci nožních popruhů.
    leg_opening_style:
      name: Styl zakončení nohavice
      description: Určuje, jak jsou zakončeny nohavice joggerů, například elastickými
        manžetami, lemy se zipem nebo otevřenými lemy.
    leg_style:
      name: Styl nohou
      description: Definuje designový nebo konstrukční styl nohou nebo podstavce lavice.
    legging_foot_design:
      name: Provedení chodidel legín
      description: Určuje, zda jsou legíny bez chodidel, s chodidly, nebo se dají
        mezi oběma styly proměňovat.
    leggings_waistband_style:
      name: Provedení pasu legín
      description: Určuje provedení šití pasu legín, které má vliv na pohodlí, oporu
        a estetiku.
    lei_closure_style:
      name: Styl zapínání lei
      description: Popisuje, zda je havajský věnec tvořen souvislou smyčkou, nebo
        má volné konce, které se zavazují (případně stuhou).
    lemon_variety:
      name: Odrůda citronu
      description: Identifikuje konkrétní kultivar nebo odrůdu citronů (např. Eureka,
        Meyer, Amalfi).
    length_adjustment_method:
      name: Metoda nastavení délky
      description: Označuje, zda a jak lze délku švihadla upravit tak, aby vyhovovala
        uživateli.
    lens_color_tint:
      name: Barva čočky/tónování
      description: Barva nebo odstín čoček ochranných brýlí dodávaných s produktem.
    lens_construction:
      name: Konstrukce objektivu
      description: Určuje strukturální provedení čočky (např. jednovrstvá, dvouvrstvá
        tepelná) s ohledem na odolnost vůči zamlžení a optické vlastnosti.
    lens_tint_category:
      name: Kategorie zabarvení skel
      description: Klasifikuje tmavost čoček na základě mezinárodních kategorií odstínů,
        což pomáhá zákazníkům vybrat čočky vhodné pro různé světelné stavy.
    lettuce_variety:
      name: Odrůda salátu
      description: Identifikuje konkrétní zahradnickou odrůdu salátu (např. ledový,
        římský, máslový), což umožňuje přesné filtrování a porovnávání.
    level_of_play:
      name: Úroveň hry
      description: Výrobcem stanovená výkonová úroveň, která odpovídá soutěžní úrovni
        hráče a cenové relaci.
    lever_configuration:
      name: Konfigurace páky
      description: Informuje o konfiguraci páky/rukojeti ovládání motoru plavidla
        (např. jednopákové vs. dvoupákové).
    lever_type:
      name: Typ páky
      description: Typ/mechanismus pák pro změnu výšky tónu na strunách harfy.
    license_plate_cover_style:
      name: Provedení krytu na registrační značku
      description: Specifikuje konstrukční provedení krytu na registrační značku (např.
        celkový kryt vs. čepičky na šrouby).
    license_plate_personalization_type:
      name: Typ přizpůsobení registrační značky
      description: Určuje, zda je registrační značka čistá, předtištěná nebo umožňuje
        přizpůsobení kupujícím (textem anebo grafikou).
    license_usage_terms:
      name: Licenční/používací podmínky
      description: Práva k užívání vzoru (např. pouze pro osobní použití vs. omezené
        komerční použití).
    licensed_sports_property:
      name: Licencované sportovní značky
      description: Označuje, zda je produkt oficiálně licencován ligou/týmem/organizací.
    lid_hinge_mechanism:
      name: Mechanismus pantu víka
      description: Určuje mechanismus pantů použitý pro víko, ovlivňující bezpečnost
        a snadnost použití.
    lid_support_positions:
      name: Pozice podpory víka
      description: Určuje podporované polohy páček víka pro klavír (jak daleko lze
        víko otevřít).
    lie_angle_color_code:
      name: Kód pro barvu úhlu ležení
      description: Označuje barevně kódovaný systém ležení úhlu používaný u některých
        holí (např. černá tečka, zelená tečka).
    life_jacket_certification_standard:
      name: Norma pro certifikaci záchranných vest
      description: Oficiální bezpečnostní klasifikace nebo norma, kterou produkt splňuje,
        například typ USCG nebo úrovně ISO/AS.
    life_raft_certification_standard:
      name: Norma pro certifikaci záchranných člunů
      description: Bezpečnostní norma/certifikace, kterou je raft postaven a servisován
        tak, aby splňoval.
    life_raft_container_type:
      name: Záchranný vor kontejnerového typu
      description: Jak je záchranný člun zabalen pro skladování a vypuštění.
    life_vest_approval_standard:
      name: Norma pro schvalování záchranných vest
      description: Určuje certifikační/schválení normu, kterou záchranná vesta splňuje.
    life_vest_intended_user:
      name: Zamýšlený uživatel záchranné vesty
      description: Označuje zamýšlenou kategorii uživatele z hlediska vhodnosti a
        přípravy.
    lifebuoy_approval_standard:
      name: Záchranný kruh schválení standard
      description: Bezpečnostní schválení nebo norma, které záchranný kruh splňuje
        (např. USCG/SOLAS).
    lifebuoy_features:
      name: Vlastnosti záchranného kruhu
      description: Funkční bezpečnost, montáž/manipulace a dodávané příslušenství
        pro záchranné kruhy.
    lift_mechanism_type:
      name: Typ zvedacího mechanismu
      description: Určuje mechanismus, který pomáhá při zvedání/spouštění nebo otevírání/zavírání
        nástěnné postele.
    lift_stand_support_point:
      name: Zvedací/stájecí bod podpory
      description: Místo, kde se zvedák/stojan dotýká/podpírá vozidlo.
    lifting_gas_type:
      name: Typ zvedacího plynu
      description: Určuje primární nosný plyn nebo vztlakové médium používané vzducholodí.
    lifting_support_type:
      name: Typ zvedací podpěry
      description: Označuje, zda je na zvedák najížděno po drahách nebo zda jsou na
        něj zvedány ramena/podložky, které se dotýkají rámu/zvedacích bodů.
    ligature_and_cap_component_type:
      name: Typ komponenty ligatury a krytky
      description: Označuje, zda je produkt ligatura, krytka nebo sada, která obsahuje
        obojí.
    ligature_material:
      name: Materiál ligatury
      description: Primární materiál těla ligatury, který je v kontaktu s jazýčkem
        a zajišťuje ho (např. kov, kůže, látka).
    ligature_plating_or_finish:
      name: Pokovení nebo povrchová úprava ligatury
      description: Určuje pokovování a/nebo povrchovou úpravu aplikovanou na kovovou
        ligaturu a/nebo krytku klarinetu.
    ligature_reed_contact_style:
      name: Způsob kontaktu ligatury s plátkem
      description: Určuje, jak se ligatura dotýká plátku (např. minimální kontakt,
        vícebodový kontakt, celoplošný kontakt).
    ligature_screw_position_relative_to_reed:
      name: Poloha šroubu ligatury (vzhledem k jazýčku)
      description: Označuje polohu utahovacích šroubů ligatury vzhledem ke straně
        směřující k plátku/hráči při instalaci na náustek.
    ligature_tension_adjustment_mechanism:
      name: Mechanismus nastavení napětí ligatury
      description: Popisuje, jak ligatura vyvíjí/nastavuje tlak na jazýček (konstrukce
        upevnění).
    ligature_tightening_mechanism_type:
      name: Typ mechanismu utahování ligatury
      description: Určuje mechanismus, kterým se ligatura utahuje kolem náustku a
        plátku (např. jeden šroub, dva šrouby, páčka/rychloupínák).
    light_bar_housing_material:
      name: Materiál krytu světelné rampy
      description: Primární materiál pouzdra/tělesa světelné rampy, ovlivňující odolnost
        a odvod tepla.
    light_bar_lens_material:
      name: Materiál čoček světelné lišty
      description: Primární materiál čočky/krytu světelné lišty, který může ovlivnit
        odolnost a optickou čistotu.
    light_bar_mounting_location:
      name: Umístění světelné lišty
      description: Primární zamýšlená poloha montáže na vozidle.
    light_stand_style:
      name: Provedení stojanu na světlo
      description: Určuje konstrukční provedení nebo stavbu stojanu s ohledem na podporu
        efektových světel (např. stativ, téčko, klikový), nikoli instalační povrch
        (stěna/strop), což určuje typ montáže.
    light_switch_function:
      name: Funkce spínače světla
      description: Identifikuje, které osvětlovací obvody nebo funkce spínač ovládá.
    lighting_control_protocols_supported:
      name: Podporované protokoly pro řízení osvětlení
      description: Protokoly řízení/sítě, které ovladač podporuje kromě nebo místo
        DMX512.
    lighting_effects:
      name: Světelné efekty
      description: Určuje případné integrované prvky osvětlení, které zlepšují dojem
        z hry nebo estetiku.
    lighting_mode:
      name: Režim osvětlení
      description: Vyjmenovává dostupné provozní světelné režimy, například trvalé
        svícení, blikání, stroboskop nebo SOS.
    lily_variety:
      name: Odrůda lilie
      description: Určuje komerční/botanickou odrůdu lilie prodávanou jako čerstvě
        řezaná květina (např. asijská, orientální).
    limb_articulation:
      name: Kloubení končetin
      description: Udává stupeň flexibility končetin nebo artikulace figuríny (žádná,
        pevná, částečně flexibilní, plně pohyblivá).
    limb_material:
      name: Materiál končetin
      description: Primární materiál použitý v ramenech luku nebo kuše, ovlivňující
        hmotnost, odolnost, vibrace a celkovou výkonnost.
    lime_variety:
      name: Odrůda limety
      description: Identifikuje konkrétní botanickou nebo komerční odrůdu prodávané
        limetky.
    line_buoyancy:
      name: Vztlaková síla
      description: Popisuje, zda pletená šňůra přirozeně plave nebo se potápí (a jakou
        rychlostí se potápí), což ovlivňuje prezentaci nástrahy a práci s vlascem.
    line_purpose:
      name: Účel linky
      description: Definuje zamýšlené funkce šňůry v rámci systému draka (např. přední
        šňůra, depowerová šňůra, vývazová šňůra).
    linen_finish_treatment:
      name: Lněná povrchová úprava/ošetření
      description: Jakýkoli proces konečné úpravy lněné tkaniny, který mění omak,
        vzhled nebo výkonnost.
    linen_weave_type:
      name: Typ lněné vazby
      description: Určuje strukturu vazby lněné tkaniny, která ovlivňuje texturu,
        prodyšnost a splývavost.
    liner_padding_type:
      name: Typ polstrování vložky
      description: Označuje konstrukci nebo styl polstrování vložky (např. síťovina,
        lehce polstrovaná, prošívaná).
    liner_shape:
      name: Tvar vložky
      description: Popisuje celkový tvar vložky do spacáku, aby si zákazníci mohli
        přizpůsobit svůj spacák a zajistit si tak pohodlí.
    liner_type:
      name: Typ podšívky
      description: Označuje, zda kraťasy obsahují vnitřní vložku, a pokud ano, o jaký
        styl se jedná.
    lining:
      name: Podšívka
      description: Informuje, zda a jak jsou slipové plavky podšité, včetně rozsahu
        podšívky uvnitř oděvu.
    lining_material:
      name: Materiál podšívky
      description: Určuje materiál použitý pro vnitřní vložku boty, který ovlivňuje
        pohodlí, prodyšnost a udržování tepla.
    lining_type:
      name: Typ podšívky
      description: Určuje, zda je plavecký oděv podšitý a do jaké míry.
    link_connection_style:
      name: Styl propojení článku
      description: Klasifikuje způsob připojení článku k řetězu (např. rychločlánek,
        připevnění), což umožňuje jezdcům zvolit správný způsob instalace nebo náhradní
        díl.
    live_bait_form:
      name: Živá návnada
      description: Určuje fyzickou formu nebo stav uchování návnady, například živá,
        zmrazená nebo sušená.
    living_room_furniture_items_included:
      name: Součástí je nábytek do obývacího pokoje
      description: Specifikuje jednotlivé kusy nábytku, které jsou součástí sady do
        obývacího pokoje, a pomáhá nakupujícím rychle pochopit, jaké součásti (např.
        pohovka, dvoumístná pohovka, konferenční stolek) jsou součástí.
    load_mechanism:
      name: Zaváděcí mechanismus
      description: Určuje primární metodu, kterou se vyvolává nebo zesiluje odpor
        stroje (např. stoh volitelných závaží, zátěžové kotouče, zátěžové pásy).
    lock_cylinder_type:
      name: Typ zámkové vložky
      description: Určuje typ použitého válce/jádra klíče (relevantní pro odpor při
        otevírání a náhradní klíče).
    lock_security_level:
      name: Úroveň zabezpečení zámku
      description: Popisuje bezpečnostní prvky zámku/cylindrické vložky proti vloupání
        a odvrtání.
    lock_system:
      name: Systém zámku
      description: Typ bezpečnostního blokačního systému používaného k zabránění pádu
        výtahu.
    locker_bench_configuration:
      name: Konfigurace lavičky ve skříňkách
      description: Popisuje orientaci nebo konstrukční uspořádání lavice u šatních
        skříněk (např. jednostranná, oboustranná ostrůvková, nástěnná).
    locomotive_prototype_power_type:
      name: Typ pohonu prototypu lokomotivy
      description: Určuje typ pohonu skutečné lokomotivy, kterou model reprezentuje.
    locomotive_wheel_arrangement_whyte_notation:
      name: Uspořádání kol lokomotivy (Whyteova notace)
      description: Uspořádání kol prototypu lokomotivy (např. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Klasifikace výšky patrové postele
      description: Označuje celkovou výšku patrové postele (nízká, střední, vysoká,
        extra vysoká), což nakupujícím pomáhá vyhovět požadavkům na výšku stropu a
        prostor pod postelí.
    logo_application_method:
      name: Způsob použití loga
      description: Popisuje, jak je školní znak nebo logo aplikováno na oděv (např.
        vyšíváno nebo potištěno).
    logo_label_compatible_fabric_weight:
      name: Gramáž tkaniny kompatibilní se štítkem loga
      description: Doporučená hmotnostní kategorie tkaniny pro připevnění nášivky
        bez deformování nebo nahromadění.
    logo_label_edge_finish:
      name: Zakončení okrajů nášivky
      description: Určuje zakončení/lemování okrajů nášivky, které má vliv na odolnost
        vůči třepení a příjemnost při kontaktu s kůží.
    logo_label_print_production_method:
      name: Způsob potisku/výroby nášivky s logem
      description: Jak je logo aplikováno/zhotoveno na povrchu nášivky.
    long_block_completeness:
      name: Úplnost dlouhého bloku
      description: Určuje, které hlavní komponenty jsou součástí sestavy dlouhého
        bloku.
    long_john_pieces_included:
      name: Součásti termoprádla (long john) obsažené v balení
      description: Upřesňuje, zda produkt obsahuje pouze spodní část, pouze horní
        část nebo oba díly sady termoprádla.
    longan_variety:
      name: Odrůda Longan
      description: Určuje kultivar nebo komerční odrůdu longanu (např. Kohala, Biew
        Kiew), což pomáhá identifikovat požadovanou chuť, velikost a sladkost.
    loom_accessories_included:
      name: Součástí balení je příslušenství k tkalcovskému stavu
      description: Klíčové příslušenství je součástí balení/krabice tkalcovského stavu.
    loom_finish:
      name: Povrchová úprava tkalcovského stavu
      description: Povrchová úprava tkalcovského stavu (zejména u dřevěných tkalcovských
        stavů).
    loom_folding_portability_design_type:
      name: Typ skládacího/přenosného tkalcovského stavu
      description: Zda a jak lze tkalcovský stav složit kvůli přepravě nebo skladování.
    loom_frame_folding_design:
      name: Skládací konstrukce rámu tkalcovského stavu
      description: Určuje, zda a jak se rám tkalcovského stavu skládá nebo demontuje
        pro skladování nebo přepravu.
    loom_tension_adjustment_method:
      name: Metoda nastavení napětí tkalcovského stavu
      description: Primární metoda používaná k nastavení napětí osnovy na tkalcovském
        stavu.
    loom_tie_up_system:
      name: Systém vázání tkalcovského stavu
      description: Typ použitého systému vázání/propojení mezi nášlapnými kladkami/lamely/hřídeli
        (např. Texsolv nebo kovový řetěz).
    loquat_variety:
      name: Odrůda mišpule
      description: Určuje kultivar nebo odrůdu mišpule, odrážející rozdíly ve velikosti,
        chuti, období zrání a vzhledu.
    lubricant_features:
      name: Vlastnosti maziva
      description: Zdůrazňuje speciální vlastnosti, přísady nebo výhody maziva.
    lubrication_requirement:
      name: Požadavky na mazání
      description: Informuje, zda je běžecký pás předběžně ošetřen / nevyžaduje údržbu,
        nebo zda vyžaduje průběžné mazání či voskování.
    lubrication_type:
      name: Typ mazání
      description: Specifikuje možnosti mazání pouzdra a to, zda je navrženo pro mazání
        plastickým mazivem (např. drážky nebo maznice).
    lug_nut_seat_profile:
      name: Profil usazení matice kola
      description: Určuje profil uložení matice kola požadovaný pro kolo, aby byla
        zajištěna správná kompatibilita matice a bezpečná montáž.
    lumbar_support_type:
      name: Typ bederní opěrky
      description: Popisuje styl bederní opěrky dodávané s křeslem (např. odnímatelný
        polštář, nastavitelný mechanismus, masážní systém).
    lunge_trainer_style:
      name: Styl výpadového trenažéru
      description: Definuje konstrukční řešení trenažéru pro šermířské výpady.
    lure_buoyancy:
      name: Vztlak nástrahy
      description: Určuje, jak se nástraha chová ve vodním sloupci v klidu nebo při
        navíjení (např. plave na hladině, vznáší se ve vodě nebo se potápí).
    luster:
      name: Lesk
      description: Popisuje způsob, jakým světlo interaguje s povrchem vzorku (např.
        sklovitý, kovový).
    lychee_cultivar:
      name: Kultivar liči
      description: Identifikuje konkrétní odrůdu nebo kultivar liči – například Brewster,
        Hak Ip nebo Mauritius – které se mohou lišit chutí, velikostí semen, obdobím
        sklizně a cenou.
    lyre_flip_folder_mounting_location:
      name: Místo upevnění Lyre/flip folderu
      description: Kde je lyra nebo skládací mechanika určena k upevnění na nástroj
        nebo příslušenství (např. zvon, přívodní trubka, stojan).
    lyrics_display_type:
      name: Typ zobrazení textu písně
      description: Jak se zobrazují texty písní (pokud jsou podporovány) během karaoke.
    magazine_compatibility:
      name: Kompatibilita se zásobníky
      description: Identifikuje primární kalibry nebo typy zásobníků, pro které jsou
        vestavěné kapsy na vestě navrženy.
    magnet_requirement:
      name: Požadavek na magnet
      description: Označuje, zda senzor k provozu potřebuje externí magnet.
    magnet_toy_storage_included:
      name: Magnetický úložný prostor na hračky je součástí balení
      description: Typ úložiště/pouzdra součástí magnetové hračky pro organizaci stolu
        a cestování.
    malanga_variety:
      name: Odrůda Malanga
      description: Identifikuje konkrétní odrůdu malanga/kořenu taro, která se prodává,
        aby pomohla nakupujícímu vybrat požadovanou příchuť, barvu nebo kulinářskou
        aplikaci.
    malt_color_rating_system:
      name: Systém hodnocení sladových barev
      description: Určuje, ke které barevné škále se uvedená barva vztahuje (Lovibond,
        SRM, nebo EBC).
    malt_crush:
      name: Drcení sladu
      description: Označuje, zda se základní slad prodává celý/nemletý nebo předdrcený,
        a pokud ano, tak způsob drcení.
    malt_form:
      name: Sladová forma
      description: Udává, zda se produkt prodává jako celá zrna nebo zpracovaný na
        rmutování (např. drcený).
    malt_intended_use:
      name: Účel použití sladu
      description: Zamýšlené primární použití sladu (pivovarnictví, palírenství, nebo
        obojí).
    malt_treatment:
      name: Sladová varianta
      description: Popisuje, jak bylo obilí/slad zpracováno nad rámec standardního
        sušení (běžné speciální procesy).
    malt_usage_purpose:
      name: Účel použití sladu
      description: Popisuje primární funkční přínos speciálního sladu pro recepturu
        piva.
    man_overboard_system_type:
      name: Typ systému „muž přes palubu“
      description: Určuje primární kategorii řešení pro případ pádu člověka přes palubu
        (MOB), kterou produkt poskytuje.
    mandolin_back_sides_wood:
      name: Dřevo zadní desky a boků mandolíny
      description: Určuje druh dřeva použitý pro zadní a boční desky mandolíny.
    mandolin_body_top_wood:
      name: Vrchní deska mandolíny ze dřeva
      description: Primární dřevo/materiál použitý pro rezonanční desku mandolíny
        (horní).
    mandolin_bridge_type:
      name: Typ mandolínového mostu
      description: Určuje typ kobylky použité na mandolíně.
    mandolin_pickup_configuration:
      name: Konfigurace snímačů pro mandolínu
      description: Uvádí, zda mandolína obsahuje elektroniku a jaký typ snímače je
        instalován.
    mandolin_string_configuration:
      name: Konfigurace strun mandolíny
      description: Specifikuje konfiguraci strun mandolíny podle celkového počtu strun
        a počtu sborů (např. 8 strun / 4 sbory).
    mangosteen_variety:
      name: Odrůda mangostanu
      description: Identifikuje konkrétní druh nebo kultivar mangostany nebo blízce
        příbuzného plodu druhu Garcinia, který je prodáván.
    mannequin_style:
      name: Manekýnský styl
      description: Popisuje konstrukční návrh nebo konstrukční styl cvičné figuríny.
    manufacturing_process:
      name: Výrobní proces
      description: Primární metoda výroby těla navijáku nebo cívky (např. CNC obrábění,
        tlakové lití).
    map_coverage_sky_planet_body:
      name: Pokrytí mapou (obloha/planetární těleso)
      description: 'Označuje, co mapa zobrazuje: noční oblohu (souhvězdí) nebo konkrétní
        planetární těleso.'
    map_format:
      name: Formát mapy
      description: Definuje fyzickou nebo digitální prezentaci loveckých map a průvodců.
    map_sensor_output_signal_type:
      name: Typ výstupního signálu MAP senzoru
      description: Určuje typ výstupního signálu, který snímač MAP poskytuje řídicí
        jednotce motoru (ECU).
    map_size_sheet:
      name: Velikost mapy (list)
      description: Určuje konečnou velikost mapového listu/plakátu/planisféry pro
        lepší zobrazení a kompatibilitu (velikost rámu, plocha zdi).
    marabou_feather_form:
      name: Tvar peří marabu
      description: Tvarový faktor produktu z marabu peří v prodávaném stavu.
    marabou_feather_treatment:
      name: Ošetření peří marabu
      description: Jak bylo peří marabu zpracováno nebo dokončeno pro kreativní použití.
    marble_track_set_feature_modules:
      name: Funkční moduly kuličkové skluzavky
      description: Zdůrazňuje speciální funkční moduly, které jsou součástí sady (např.
        výtah, spouštěč, spínače).
    marine_flare_certification_standard:
      name: Certifikace/norma námořní světlice
      description: Označuje, které certifikace nebo normy námořní bezpečnosti světlice
        údajně splňuje.
    marine_safety_standard_compliance:
      name: Dodržování norem námořní bezpečnosti
      description: Označuje, kterým formálním normám nebo schválením pro vodní bezpečnost
        příslušenství vyhovuje.
    marine_transmission_type:
      name: Typ lodní převodovky
      description: Určuje typ lodní převodovky spárované s vestavěným motorem (např.
        přímý pohon vs. V-drive).
    marker_action_type:
      name: Typ akce značky
      description: Popisuje základní mechanismus střelby/fungování značkovače.
    marker_caliber:
      name: Ráže markeru
      description: Určuje průměr kuliček, které má značkovač vystřelovat.
    marking_durability:
      name: Trvanlivost značení
      description: Udává, jak dlouho se očekává, že natřená čára zůstane viditelná
        za normálních podmínek, například dočasných (až 3 týdny), polotrvalých (až
        6 měsíců) nebo trvalých (více než 6 měsíců).
    marking_tip_type:
      name: Typ značkovacího hrotu
      description: Typ značkovací vložky, kterou kompas používá ke kreslení (např.
        držák tuhy, inkoust, nebo rýsovací hrot).
    marshmallow_processing_method:
      name: Metoda zpracování marshmallow
      description: Popisuje případné speciální zpracování marshmallow, které ovlivňuje
        texturu, trvanlivost nebo chuť.
    marshmallow_size:
      name: Velikost marshmallow
      description: Klasifikuje relativní velikost jednotlivých kousků marshmallow.
    martial_arts_belt_rank:
      name: Hodnocení pásu bojových umění
      description: Označuje úroveň/hodnost reprezentovanou barvou opasku nebo speciální
        kombinací barev.
    mask_bib_type:
      name: Typ masky s náprsníkem
      description: Určuje typ náprsníku na šermířské masce, například standardní látkový,
        vodivý, odnímatelný nebo žádný.
    mask_cage_material:
      name: Materiál klece masky
      description: Materiál použitý speciálně pro obličejovou masku nebo rám masky.
    mask_goggle_design:
      name: Design masky/brýlí
      description: Definuje celkový konstrukční návrh nebo styl krytí ochranných prostředků.
    mask_skirt_material:
      name: Materiál lemu masky
      description: Označuje materiál měkké obruby, která zajišťuje vodotěsné utěsnění
        mezi maskou a obličejem.
    mask_strap_material:
      name: Materiál popruhu masky
      description: Určuje materiál popruhu, kterým je maska připevněna k hlavě.
    mass_air_flow_sensor_measurement_type:
      name: Typ měření snímače hmotnostního průtoku vzduchu
      description: Určuje technologii snímání / typ výstupu používaný snímačem MAF.
    mass_air_flow_sensor_mounting_type:
      name: Typ montáže snímače hmotnostního průtoku vzduchu
      description: Jak je senzor MAF nebo sestava senzoru namontován/instalován v
        sacím systému.
    massage_feature:
      name: Masážní funkce
      description: Označuje, zda nastavitelná základna obsahuje integrovanou masážní
        funkci, a pokud ano, kolik masážních zón nabízí.
    mast_attachment_interface:
      name: Rozhraní pro upevnění stěžně
      description: Určuje standard propojení mezi trupem a stožárem, pomáhá nakupujícím
        při zajištění lícování komponent.
    mast_base_type:
      name: Typ základny stěžně
      description: Identifikuje montážní rozhraní, které spojuje stožár s deskou nebo
        adaptérem.
    mast_bend_curve:
      name: Křivka ohybu stěžně
      description: Pružný vzor stěžně, který určuje kompatibilitu a manipulaci s plachtou.
    mast_diameter_type:
      name: Typ průměru stožáru
      description: Standardizovaná klasifikace průměru windsurfingového stožáru (např.
        RDM, SDM, MDM) použitá pro kontroly kompatibility.
    mat_backing_type:
      name: Typ podložky
      description: Určuje typ podkladové vrstvy na spodní straně rohože, která pomáhá
        udržet ji na místě na různých površích.
    mat_installation_method:
      name: Způsob pokládky rohoží
      description: Označuje, jak je rohož nainstalována nebo zajištěna na místě.
    mat_style:
      name: Styl rohože
      description: Definuje konstrukční styl nebo tvarový faktor podložky (např. skládací
        podložka, zámková dlaždice, nárazová podložka).
    maternity_panel_type:
      name: Typ panelu pro těhotné
      description: Označuje styl strečového panelu nebo pasu navrženého tak, aby se
        přizpůsobil růstu v těhotenství.
    maternity_waistband_style:
      name: Styl těhotenského pasu
      description: Označuje design a umístění pasu nebo břišního panelu specifické
        pro těhotenské kalhoty a popisuje, jak oděv podporuje rostoucí bříško.
    mattress_top_type:
      name: Typ svrchní vrstvy matrace
      description: Určuje styl vrchní vrstvy nebo povrchové konstrukce matrace, například
        vrchní vrstva s polštářem nebo pevná vrchní vrstva.
    maturation_vessel_material:
      name: Materiál vyzrávací nádoby
      description: Určuje primární materiál nádoby nebo sudu použitého pro zrání šóčú.
    maximum_quilt_size_supported:
      name: Maximální podporovaná velikost prošívané deky
      description: Maximální velikost prošívané deky / projektu, jaká se do rámu vejde
        (běžně označovaná podle velikosti postele nebo maximální šířky).
    meal_course:
      name: Jídlo
      description: Identifikuje typickou příležitost stolování pro daný produkt.
    meal_preparation_state:
      name: Stav přípravy jídla
      description: Udává, kolik přípravy je zapotřebí před konzumací (např. připraveno
        ke konzumaci, sada k přípravě jídla).
    meat_processing_state:
      name: Stav zpracování masa
      description: Označuje stupeň tepelné úpravy nebo naložení/sušení, kterým masný
        výrobek před prodejem prošel.
    meat_quality_grade:
      name: Třída kvality masa
      description: Označuje stupeň kvality nebo klasifikaci přiřazenou masu uznaným
        orgánem pro hodnocení (např. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Tvrzení o produkci masa
      description: Zdůrazňuje běžná tvrzení o dobrých životních podmínkách zvířat
        nebo o hospodářských postupech spojených s masem (např. krmení trávou, volný
        výběh).
    mechanical_loom_assembly_status:
      name: Stav sestavy mechanického tkalcovského stavu
      description: Jak je tkalcovský stav dodáván z hlediska požadavků na montáž.
    mechanical_loom_weaving_type:
      name: Typ mechanického tkalcovského stavu
      description: Primární mechanismus/typ tkaní podporovaný tkalcovským stavem.
    mechanical_puzzle_primary_mechanism:
      name: Primární mechanismus mechanického puzzle
      description: Primární interakce/mechanismus použitý k vyřešení mechanické hádanky.
    mechanical_puzzle_solution_format:
      name: Formát řešení mechanické hádanky
      description: Formát, ve kterém jsou poskytovány rady/řešení, pokud jsou součástí.
    medal_attachment_style:
      name: Způsob uchycení medaile
      description: Určuje, jak má být medaile nošena nebo vystavována (např. se stuhou
        na krk, se špendlíkem).
    medal_award_level:
      name: Úroveň udělení medaile
      description: Určuje úroveň ocenění, kterou medaile představuje (např. 1. místo,
        účastník).
    medal_finish:
      name: Povrchová úprava medaile
      description: Určuje povrchovou úpravu medaile (vizuální lesk/texturu), nezávisle
        na materiálu.
    medal_packaging:
      name: Balení medaile
      description: Označuje typ prezentačního obalu, který se s medailí dodává.
    melodica_accessory_set_included:
      name: Sada příslušenství dodávaného k melodice
      description: Jaké obvyklé příslušenství je součástí balení melodiky.
    melodica_air_chamber_material:
      name: Materiál vzduchové komory melodiky
      description: Materiál vzduchové komory/těla melodiky (akrylonitril-butadien-styren,
        dřevo atd.), kdy jej prodejci odlišují od ostatních částí.
    melodica_included_accessories:
      name: Součástí balení je melodika
      description: Příslušenství dodávané spolu s melodikou v balení.
    melodica_key_color_scheme:
      name: Barevné schéma kláves melodiky
      description: Barevné schéma kláves (ne těla), což ovlivňuje čitelnost (zejména
        pro děti/začátečníky).
    melodica_mouthpiece_configuration:
      name: Konfigurace náustku melodiky
      description: Označuje, které foukací rozhraní jsou zahrnuty/používané pro hraní
        melodiky.
    melodica_mouthpiece_type:
      name: Typ náustku Melodica
      description: Styl foukacího rozhraní je součástí melodiky (náustek a/nebo ohebná
        trubice).
    melodica_reed_plate_material:
      name: Materiál plátků melodiky
      description: Materiál jazýčkové destičky (odlišný od celkového materiálu těla
        nástroje), který může ovlivnit trvanlivost a tón.
    melodica_size_class:
      name: Třída velikosti melodiky
      description: Obecná třída velikosti/přenositelnosti melodiky, obvykle založená
        na seskupeních počtu kláves a tvarovém faktoru (např. mini/studentské vs.
        standardní vs. modely s rozšířeným rozsahem).
    melon_variety:
      name: Odrůda melounu
      description: Uvádí konkrétní druh melounu v produktu, aby pomohl nakupujícím
        rychle identifikovat jejich preferovanou odrůdu.
    memory_foam_infusion_material:
      name: Napouštěcí materiál paměťové pěny
      description: Označuje speciální látky, kterými se napouští paměťová pěna kvůli
        chlazení, potlačování zápachu nebo antimikrobiálním vlastnostem.
    memory_wire_gauge:
      name: Tloušťka paměťového drátu
      description: Určuje velikost paměťového vodiče v americké měřicí jednotce AWG
        (American Wire Gauge).
    memory_wire_project_size:
      name: Velikost projektu s paměťovým drátem
      description: Určuje zamýšlený tvar šperku/velikost cívky, pro kterou je paměťový
        drát tvarován (např. náramek, náhrdelník, prsten).
    metal_purity:
      name: Čistota kovu
      description: Označuje ryzost nebo stupeň čistoty kovu použitého ve špercích,
        obvykle vyjádřený v karátech (K) nebo v promilech.
    metrics_counted:
      name: Započítané metriky
      description: Uvádí jednotlivé statistiky nebo události, které má počítadlo sledovat.
    metronome_display_style:
      name: Styl zobrazení metronomu
      description: Určuje, jak se tempo zobrazuje/indikuje uživateli (jehla/kyvadlo
        vs. numerická LED/LCD vs. blikající světlo).
    metronome_output_method:
      name: Metoda výstupu metronomu
      description: Určuje dostupné výstupní metody pro zvuk/signál metronomu.
    microphone_toy_feature_set:
      name: Sada funkcí hračky s mikrofonem
      description: Klíčové funkce mikrofonů se zaměřením na hraní u hraček s mikrofonem
        (hlasové efekty, zesilování, nahrávání atd.).
    midi_output_type:
      name: Typ MIDI výstupu
      description: Určuje typ(y) MIDI výstupu poskytovaného modulem spouště.
    military_branch:
      name: Vojenská složka
      description: Identifikuje vojenskou pobočku, pro kterou je uniforma vydána nebo
        podle které je inspirována.
    milk_base_type:
      name: Typ mléčné základny
      description: Určuje případné primární mléko nebo alternativu mléka použité v
        nápoji.
    milk_feeding_method:
      name: Způsob krmení mlékem
      description: Udává, jak byla zvířata krmena (např. trávou nebo obilím), což
        může mít vliv na chuť a výživové vlastnosti.
    milk_processing_method:
      name: Způsob zpracování mléka
      description: Určuje způsob ošetření nebo techniku zpracování, kterou mléko prošlo,
        která ovlivňuje bezpečnost, trvanlivost a nutriční vlastnosti.
    milk_source_animal:
      name: Zvíře, z něhož pochází mléko
      description: Identifikuje zvíře, od kterého bylo mléko získáno, a pomáhá spotřebitelům
        vybrat si kravské, kozí, buvolí nebo jiné mléčné výrobky živočišného původu.
    millet_processing_method:
      name: Způsob zpracování prosa
      description: Označuje primární metodu zpracování nebo stav prosa (např. neleštěné,
        loupané, naklíčené).
    millet_variety:
      name: Odrůda prosa
      description: Identifikuje konkrétní druh prosa obsaženého v produktu (např.
        perlové, liščí, prstové).
    milling_process:
      name: Mlýnský proces
      description: Označuje metodu výroby použitou k mletí moučky, která může ovlivnit
        chuť, tepelnou expozici a nutriční profil.
    mint_mark:
      name: Značka mincovny
      description: Značka mincovny, jak je uvedena na minci (pokud je relevantní).
    mirror_configuration:
      name: Konfigurace zrcadel
      description: Určuje styl nebo strukturu zrcadla, které je součástí sady umyvadel.
    mirror_coverage:
      name: Pokrytí zrcadly
      description: Popisuje rozsah pokrytí posuvných dveří zrcadlovými panely.
    mirror_curvature_type:
      name: Typ zakřivení zrcadla
      description: Určuje, zda je zrcadlový povrch konvexní, plochý nebo konkávní,
        což má vliv na zorné pole.
    mirror_mounting_location:
      name: Místo montáže zrcadla
      description: Určuje, kam na kole nebo jezdci má být zrcátko namontováno.
    mirror_shape:
      name: Tvar zrcadla
      description: Označuje geometrický tvar nebo provedení primárního zrcadla, které
        je součástí sady koupelnového nábytku.
    mix_ratio:
      name: Mísicí poměr
      description: Určuje doporučený poměr ředění chladicí kapaliny a vody (u koncentrátů)
        nebo potvrzuje pevný poměr mísení již naředěných produktů.
    mma_glove_type:
      name: Typ rukavice pro MMA
      description: Označuje primární zamýšlené použití nebo styl rukavice v rámci
        tréninku nebo soutěže MMA.
    mobility_features:
      name: Funkce mobility
      description: Označuje vestavěné prvky umožňující pohyb nebo přesun, jako jsou
        kolečka či skládací nohy.
    model_aircraft_assembly_level:
      name: Úroveň montáže modelů letadel
      description: Udává, kolik práce na sestavení je nutné před použitím letadla.
    model_making_kit_items_included:
      name: V ceně modelářské sady
      description: Uvádí, co je součástí modelářského sadu nebo balíčku (např. barvy,
        lepidlo, štětec).
    model_making_product_type:
      name: Typy modelářského produktu
      description: Identifikuje, co je daná položka v rámci modelářství v podstatě
        (sada, příslušenství, nástroj nebo materiál), aby se zlepšilo prohlížení a
        filtrování produktů smíšených typů v rámci modelářství.
    model_rocket_kit_contents:
      name: Obsah sady modelové rakety
      description: Označuje, zda se jedná o kompletní sadu modelu vícestupňové rakety,
        nebo o sadu doplňků/modulů/dílů (např. komponenty pomocného či letového stupně).
    model_rocket_kit_format:
      name: Formát stavebnice modelové rakety
      description: Určuje, zda se raketa prodává jako sada, a úroveň připravenosti
        k montáži.
    model_rocket_motor_impulse_class:
      name: Výkonnostní třída raketového motoru
      description: Označuje celkovou výkonnostní třídu standardizovaného motoru modelu
        rakety (např. A, B, C...).
    model_rocket_motor_mount_size:
      name: Velikost úchytu motoru modelové rakety
      description: Určuje průměr těla motoru, pro který je držák motoru rakety navržen.
    model_rocket_power_source_required:
      name: Vyžadovaný zdroj energie pro modelovou raketu
      description: Označuje, zda produkt vyžaduje baterie / externí napájení a jaký
        typ.
    model_rocket_propellant_type:
      name: Typ raketového paliva pro model
      description: Identifikuje palivový/motorový systém používaný pro pohon modelů
        raket.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Doporučená velikost odpalovací tyče nebo kolejnice pro model rakety
      description: Určuje průměr odpalovací tyče nebo velikost kolejnice, pro kterou
        je raketa navržena (např. tyč 1/8 palce, odpalovací lišta 1010).
    model_rocket_recovery_method:
      name: Metoda zotavení modelové rakety
      description: Systém primárního návratu sloužící k bezpečnému návratu rakety
        po letu.
    model_rocket_recovery_system_type:
      name: Typ záchranného systému modelové rakety
      description: Určuje primární metodu záchrany používanou k bezpečnému návratu
        rakety po letu.
    model_rocket_staging:
      name: Stupně modelu rakety
      description: Udává, pro kolik motorových stupňů je model rakety navržen.
    model_train_accessory_electrical_connection_type:
      name: Typ elektrického propojení příslušenství modelového vlaku
      description: Určuje typ konektoru nebo terminálu použitého k připojení příslušenství
        poháněného vláčku ke kolejišti (pokud je to relevantní).
    model_train_coupler_type:
      name: Typ spřáhla pro modelový vlak
      description: Určuje standard spřáhla instalovaného na modelovém vagónu či lokomotivě.
    model_train_gauge:
      name: Rozchod modelových vláčků
      description: Určuje systém modelové železnice, pro který je příslušenství určeno
        (pokud je to relevantní), a pomáhá tak zajistit fyzickou kompatibilitu se
        sledovatelností a rozvržením uživatele.
    model_train_lighting_features:
      name: Funkce osvětlení modelových vláčků
      description: Určuje funkce osvětlení, které jsou součástí modelového vláčku/lokomotivy.
    model_train_power_pickup_method:
      name: Metoda odběru proudu modelového vlaku
      description: Určuje, jak model přijímá energii pro provoz (napájení ze sítě,
        baterie atd.).
    model_train_scale:
      name: Měřítko modelových vláčků
      description: Určuje standard měřítka/velikost modelu vlaku (vztah mezi modelem
        a skutečným vlakem).
    model_train_sound_features:
      name: Zvukové funkce modelového vlaku
      description: Označuje, zda model obsahuje palubní zvukové efekty a jaký typ
        zvukové nabídky nabízí.
    model_train_track_gauge:
      name: Rozchod koleje vláčku
      description: Určuje standard rozchodu koleje, pro který je model určený (např.
        standardní rozchod, úzký rozchod, nebo specifické rozchody podle značky/systému,
        kde je to relevantní).
    modeling_dough_base_material:
      name: Základní materiál pro modelovací těsto
      description: Primární základ/složení modelovacího těsta (např. na bázi pšenice/mouky
        vs. na bázi polymeru).
    modeling_dough_features:
      name: Vlastnosti modelovacího těsta
      description: Klíčové funkční vlastnosti modelovacího těsta, podle kterých nakupující
        běžně filtrují.
    modification_level:
      name: Úroveň modifikace
      description: Označuje stupeň modifikace sladu (jak důkladně je rozložen endosperm/proteiny
        ječmene), často shrnující se jako nedostatečně modifikovaný/modifikovaný/nadměrně
        modifikovaný.
    molasses_base_ingredient:
      name: Základní složka melasy
      description: Identifikuje primární rostlinný nebo ovocný zdroj, ze kterého se
        melasa vyrábí.
    molasses_grade:
      name: Jakost melasy
      description: Klasifikuje melasu podle fáze extrakce/rafinace, což přímo ovlivňuje
        intenzitu chuti, barvu a výživové vlastnosti.
    mold_material:
      name: Materiál formy
      description: Složení primárního materiálu samotné formy (např. silikon, plast,
        kov).
    molle_compatibility:
      name: Kompatibilita s MOLLE
      description: Označuje, zda vesta obsahuje popruhy MOLLE/PALS pro připevnění
        modulárních kapes a příslušenství.
    motor_belt_type:
      name: Typ řemene motoru
      description: Definuje konstrukci/profil řemene použitého v systému pohonu běžeckého
        pásu.
    motor_configuration:
      name: Konfigurace motoru
      description: Udává, kolik nezávislých hnacích motorů koloběžka používá.
    motor_mounting_configuration:
      name: Uspořádání uchycení motoru
      description: Popisuje, jakým způsobem se motor ze sady ke konverzi skútru montuje/instaluje.
    motor_mounting_position:
      name: Poloha upevnění motoru
      description: Označuje, kde je na elektrické koloběžce namontován motor, například
        v náboji předního kola, náboji zadního kola, náboji dvou kol nebo v náboji
        MID-drive.
    motor_position:
      name: Poloha motoru
      description: Označuje umístění motoru na elektrokole, což má vliv na jízdní
        vlastnosti a údržbu.
    motor_vehicle_a_v_integration_features:
      name: Integrace audiovizuálních prvků do motorových vozidel
      description: Funkce integrace chytrých telefonů a palubních zařízení podporované
        hlavní jednotkou (např. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Aplikace/poloha žárovky motorového vozidla
      description: Určuje zamýšlenou polohu osvětlení vozidla nebo funkci, pro které
        je žárovka určena (např. potkávací světla, brzdové světlo).
    motor_vehicle_bulb_approval_standard:
      name: Standardní schválení žárovky motorového vozidla
      description: Označuje dodržování předpisů/schválení značení pro použití na pozemních
        komunikacích na cílovém trhu.
    motor_vehicle_oxygen_sensor_bank:
      name: Sada kyslíkových senzorů pro motorová vozidla
      description: Označuje, do které řady válců motoru lambda sonda pasuje (např.
        řada 1 vs. řada 2) u motorů typu V/boxer; použijte Nevztahuje se na řadové
        motory.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Počet vodičů lambda sondy motorového vozidla
      description: Počet vodičů v kabelovém svazku lambda sondy.
    motor_vehicle_oxygen_sensor_position:
      name: Poloha lambda sondy v motorovém vozidle
      description: Určuje, kde ve výfukovém systému se lambda sonda nachází vzhledem
        ke katalyzátoru.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Číslo senzoru kyslíku v motorovém vozidle
      description: Označuje číslo senzoru (např. senzor 1 nebo senzor 2) v rámci daného
        označení banky/pozice.
    motor_vehicle_oxygen_sensor_type:
      name: Typ kyslíkového senzoru pro motorová vozidla
      description: Určuje konstrukci/technologii kyslíkového senzoru.
    motor_vehicle_paint_application_method:
      name: Metoda nanášení laku na motorová vozidla
      description: Jak se má barva nanášet na povrch vozidla.
    motor_vehicle_paint_system_step:
      name: Krok systému lakování motorových vozidel
      description: Označuje, pro který krok nebo součást systému lakování automobilů
        je produkt určen (např. plniče, základní vrstva, bezbarvý lak).
    motor_vehicle_speaker_mounting_type:
      name: Typ montáže reproduktoru motorového vozidla
      description: Způsob instalace reproduktoru ve vozidle (montážní provedení).
    motor_vehicle_subwoofer_size:
      name: Velikost subwooferu do motorového vozidla
      description: Jmenovitý průměr měniče subwooferu (např. 8 palců, 10 palců, 12
        palců) sloužící k přizpůsobení prostoru ve vozidle a kompatibilitě s pouzdrem.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfigurace měniče subwooferu motorového vozidla
      description: Počet/konfigurace kmitací cívky použitá pro sladění možností zapojení
        zesilovače (např. SVC vs. DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedance měniče subwooferu motorového vozidla (na cívku)
      description: Impedanční hodnota každé kmitací cívky (ne konečné zapojení), použitá
        pro výpočty zapojení.
    motor_vehicle_voltage_regulator_type:
      name: Typ regulátoru napětí motorového vozidla
      description: Označuje technologii/typ regulátoru používaného v motorových vozidlech.
    motorcycle_armor_certification_standard:
      name: Norma pro certifikaci motocyklových chráničů
      description: Označuje formální bezpečnostní normu (normy), které je chránič
        certifikován (např. EN 1621-2 pro chrániče zad, EN 1621-3 pro chrániče hrudníku).
    motorcycle_cover_size_class:
      name: Třída velikosti plachty na motocykl
      description: Standardizovaná velikostní kategorie pro kryty na motocykly na
        základě typické kategorie/délkového rozsahu motocyklů, pro které se hodí.
    motorcycle_glove_certification_standard:
      name: Certifikační norma pro motocyklové rukavice
      description: Určuje ochrannou certifikaci/normu, kterou rukavice splňují (např.
        úrovně EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Nepromokavé provedení motocyklových rukavic
      description: Určuje typ metody impregnace použité v rukavici (pokud existuje).
    motorcycle_guard_coverage_area:
      name: Oblast pokrytí motocyklové ochrany
      description: Primární oblast pokrytí poskytovaného produktem (loket, zápěstí,
        předloktí, kombinace).
    motorcycle_kidney_belt_construction_type:
      name: Typ konstrukce ledvinového pásu motocyklu
      description: Konstrukční styl ledvinového pásu, který ovlivňuje tuhost, proudění
        vzduchu a ochranu.
    motorcycle_kidney_belt_purpose:
      name: Účel ledvinového pásu na motocykl
      description: Identifikuje primární styl jízdy nebo scénář, pro který je ledvinový
        pás motocyklu určen.
    motorcycle_luggage_capacity_class:
      name: Třída kapacity zavazadlového prostoru motocyklu
      description: Udává objemovou kapacitu zavazadla motocyklu, vyjádřenou v litrech.
    motorcycle_luggage_mounting_system:
      name: Systém pro upevnění zavazadel na motocykl
      description: Systém upevnění/montáže používaný k upevnění brašny/brašny k motocyklu
        (např. přehazovací popruhy, rychloupínací systém montovaný na motocyklu).
    motorcycle_luggage_side:
      name: Boční strana zavazadlového prostoru motocyklu
      description: Týká se brašen a informuje, zda je položka určena pro levou stranu,
        pravou stranu, nebo jde o pár/sadu.
    motorcycle_protective_gear_size_system:
      name: Systém velikostí motocyklových ochranných pomůcek
      description: Označuje systém velikostí použitý na produktu (např. alfanumerické,
        numerické, jedna velikost).
    motorcycle_rack_carrier_style:
      name: Styl nosiče na motocykl
      description: Popisuje funkční styl dopravy pro přepravu motocyklu nebo skútru
        (plošina vs. kolejnice vs. zvedací plošina atd.).
    motorcycle_riding_discipline:
      name: Disciplína v jízdě na motocyklu
      description: Určuje hlavní disciplínu, pro kterou je krční ortéza určena.
    motorcycle_tire_speed_rating:
      name: Rychlostní index motocyklových pneumatik
      description: Určuje maximální udržovanou rychlost, pro kterou je pneumatika
        dimenzována, a využívá standardní písmenný kód (např. H, V, W).
    motorsport_window_net_certification:
      name: Certifikace okenní sítě pro motorsport
      description: Certifikace nebo homologace pro závodní bezpečnost, kterou okenní
        síť splňuje (např. SFI nebo FIA), včetně případného čísla specifikace.
    mound_usage_type:
      name: Typ využití kopce
      description: Identifikuje zamýšlené aplikační prostředí kopce, například tréninkové,
        herní, bullpen nebo víceúčelové.
    mount_attachment_method:
      name: Způsob upevnění držáku
      description: Určuje, jak se držák připevňuje k povrchu/konstrukci vozidla.
    mountainboard_truck_type:
      name: Typ trucku Mountainboard
      description: Klasifikuje styl podvozků dodávaných s deskou, což ovlivňuje odezvu
        zatáčení a odolnost.
    mounting_attachment_method:
      name: Způsob montáže/upevnění
      description: Jak je držák/obal navržen pro připevnění k bubnu, stojanu, opasku
        nebo jinému povrchu.
    mounting_attachment_type:
      name: Způsob upevnění/nasazení
      description: Jak se příslušenství pro poměr připevňuje nebo propojuje s rotujícím
        kolem.
    mounting_hardware_included_for_installation:
      name: Montážní hardware je součástí dodávky (pro instalaci)
      description: Označuje, zda jsou montážní prvky potřebné k instalaci zadního
        sedadla (např. konzoly, šrouby, lišty) součástí balení produktu.
    mounting_location:
      name: Místo montáže
      description: Určuje zamýšlenou oblast umístění světla/reflektoru na vybavení
        nebo těle (např. přední vidlice, helma, paprsky kola).
    mounting_method:
      name: Způsob montáže
      description: Způsob upevnění nebo montáže držáku tyčinky/štětce (např. pomocí
        svorky, připínací pásek, lepidlo).
    mounting_position:
      name: Poloha montáže
      description: Určuje, kde má být v kabině vozidla namontován/instalován ovladač
        ruční brzdy.
    mounting_rail_type:
      name: Typ montážní lišty
      description: Určuje standard lišty nebo rozhraní, ke kterým se příslušenství
        upevňuje, například Picatinny nebo M-LOK.
    mounting_receiver_size:
      name: Velikost montážní konzoly
      description: Požadovaná velikost přijímače tažného zařízení pro nosiče nákladu
        montované na tažné zařízení.
    mounting_storage_type:
      name: Typ montáže/skladování
      description: Jak má být zařízení namontováno nebo uloženo v plavidle / na osobě.
    mouth_grip_type:
      name: Typ úchopu v ústech
      description: Popisuje typ úchopu nebo chrániče úst na píšťalce pro pohodlí a
        hygienu.
    mouthguard_mold_type:
      name: Typ tvarování chrániče zubů
      description: Popisuje, jak je chránič zubů nasazen na zuby sportovce (např.
        systém „vař a skus“, individuální nasazení na zuby).
    mouthpiece_facing_length:
      name: Délka odklonu náustku
      description: Udává kategorii délky odklonu (dráhy) náustku (nikoli celkovou
        délku náustku), která ovlivňuje odezvu, odpor a kompatibilitu s plátky.
    mouthpiece_material:
      name: Materiál náustku
      description: Určuje materiál náustku/špičky foukacího přístroje (párty foukače),
        který je v kontaktu s ústy a který se může lišit od materiálu hlavního těla.
    mouthpiece_shank_receiver_size:
      name: Stopka náustku/přijímač velikost
      description: Určuje standard stopky/dříku náustku kompatibilní s křídlovkou.
    mouthpiece_shank_size:
      name: Velikost dříku náustku
      description: Určuje standard uchycení náustku/pouzdra pro zajištění kompatibility
        s určeným žesťovým nástrojem.
    mouthpiece_shank_type:
      name: Typ dříku náustku
      description: Určuje standard kompatibility s pouzdrem/stopkou náustku (pokud
        je to relevantní).
    mouthpiece_style:
      name: Typ náustku
      description: Klasifikuje design/tvar náustku udidla, který ovlivňuje tlakové
        body, závažnost a preference koně.
    mouthpiece_type:
      name: Typ náustku
      description: Typ náustku na foukacím konci (vestavěný, odnímatelný nebo doplňkový).
    movement_mechanism:
      name: Pohybový mechanismus
      description: Definuje, jak se lavička během používání pohybuje (houpání, klouzání,
        kývání atd.).
    muffin_size:
      name: Velikost muffinu
      description: Klasifikuje fyzickou velikost formátu muffinu (např. mini, standardní,
        jumbo).
    mushroom_variety:
      name: Odrůda hub
      description: Identifikuje konkrétní druh nebo odrůdu houby nebo lanýže obsažené
        v produktu (např. shiitake, ústřice královská, černá lanýž).
    music_stand_desk_tilt_adjustment:
      name: Nastavení sklonu notového stojanu
      description: Uvádí, zda a jak lze nastavit sklon desky stolu.
    music_stand_intended_use:
      name: Zamýšlené použití notového stojanu
      description: Označuje primárně zamýšlené prostředí/použití pro stojan.
    musical_block_pitch_type:
      name: Typ výšky tónu hudební kostky
      description: Popisuje, zda hudební blok produkuje určitý (naladěný) nebo neurčitý
        tón.
    musical_box_mechanism_type:
      name: Typ mechanismu hudební skříňky
      description: Jak hudební skříňka produkuje/přehrává zvuk (např. natahovací pohyb
        vs. elektronické přehrávání).
    musical_keyboard_case_fit_type:
      name: Typ přizpůsobení pouzdra pro hudební klávesnici
      description: Popisuje, jak je pouzdro dimenzováno pro nástroj (např. univerzální/obecný
        rozsah velikostí vs. modelově specifické/na míru přizpůsobené).
    musical_ratchet_sound_character:
      name: Zvukový projev hudební řehtačky
      description: Obecný popis zabarvení/hlasitosti ráčny.
    musical_scraper_groove_surface_material:
      name: Materiál drážkovaného povrchu drhla
      description: Určuje materiál rýhované/drážkované škrábací plochy (může se lišit
        od materiálu tělesa).
    musical_scraper_type:
      name: Typ hudební škrabky
      description: Určuje styl/design hudebního rytmického nástroje (např. guiro vs.
        reco-reco), který ovlivňuje zvuk a techniku hry.
    mute_attachment_method:
      name: Způsob připevnění tlumiče
      description: Určuje, jak se dusítko činelů připevňuje (např. gel, statická elektřina,
        magnet, klip).
    mute_attenuation_level:
      name: Úroveň útlumu ztlumení
      description: Udává, o kolik dusítko snižuje vnímanou hlasitost, což je důležité
        zejména pro cvičná dusítka.
    mute_cork_padding_material:
      name: Materiál korku/polstrování dusítka
      description: Určuje materiál kontaktního polstrování dusítka (např. korkové
        pásky/podložky), které slouží k pevnému uchycení a ochraně ozvučníku.
    mute_coverage_type:
      name: Typ ztlumení
      description: Označuje styl/pokrytí tlumiče na hrací ploše, od malých bodových
        tlumičů až po celoplošné cvičné tlumiče.
    mute_finish:
      name: Povrchová úprava dusítka
      description: Povrchová úprava dusítka, která může mít vliv na odolnost a estetiku
        (např. leštěná vs. matná).
    name_label_text_template:
      name: Šablona textu jmenovky
      description: Určuje přednastavený text nebo šablonu vytištěnou na jmenovce (např.
        „Majitel:“, „Výrobce:“).
    napkin_ply:
      name: Ubrousek
      description: Udává tloušťku koktejlového ubrousku podle počtu vrstev.
    neck_brace_fit_system:
      name: Systém uchycení krční ortézy
      description: Označuje primární metodu používanou k nastavení a upevnění krční
        ortézy jezdce.
    neck_brace_size_basis:
      name: Velikostní reference krčních ortéz
      description: Označuje velikostní základ použitý pro výběr správné velikosti
        krčního ortézy.
    neck_configuration:
      name: Konfigurace krku
      description: Určuje styl/konfiguraci krku saxofonu dodávaného s nástrojem, což
        ovlivňuje ergonomii a hratelnost.
    neck_coverage_type:
      name: Typ krytí krku
      description: Určuje styl zakrytí krku dodávaného s dekou.
    neck_support_size_system:
      name: Velikostní systém krčních opor
      description: Označuje systém velikostí použitý pro závodní krční podporu/ortézu
        (např. pro dospělé, pro mládež nebo pro jednu velikost).
    necklace_length_type:
      name: Délka náhrdelníku
      description: Určuje konvenční kategorii délky náhrdelníku, například choker
        nebo operní, pro usnadnění nakupování na základě stylu.
    needle_balance_zone:
      name: Jehlová zóna
      description: Označuje magnetickou zónu nebo polokouli, na kterou je střelka
        kompasu naladěna, kvůli zajištění přesného odečtu hodnot po celém světě.
    needle_case_format:
      name: Formát pouzdra na jehly
      description: Celkové provedení organizéru v pouzdru na jehly.
    needle_damping_type:
      name: Typ tlumení jehly
      description: Popisuje, jak je jehla kompasu stabilizována (např. kapalinou,
        nasucho nebo elektronicky), což ovlivňuje dobu ustálení a odolnost.
    needle_felting_needle_profile:
      name: Profil jehly pro plstění
      description: Průřez/profil jehly pro plstění, který má vliv na pohyb vláken
        a dosažený výsledek.
    needle_holder_features:
      name: Vlastnosti držáku jehly
      description: Hlavní funkční vlastnosti držáku jehel.
    needle_holder_mounting_attachment_method:
      name: Způsob montáže/upevnění držáku jehly
      description: Jak má být držák jehly připevněn nebo používán při skladování (např.
        magneticky, sponou, popruhem).
    needle_holder_style:
      name: Styl držáku jehly
      description: Fyzický způsob uložení nebo nošení/design držáku jehly.
    needle_pushing_surface_type:
      name: Typ povrchu pro tlačení jehly
      description: Typ/provedení povrchu pro tlačení jehly ochranou dlaně (např. kovový
        důlek, terčík nebo zesílené místo).
    needle_requirement_beading_pattern:
      name: Potřeba jehly (vzor na korálkování)
      description: Typ/velikost jehlic doporučená pro daný vzor.
    needle_size_system:
      name: Systém velikostí jehel
      description: Velikostní norma použitá k označení velikostí jehel.
    needle_threader_compatible_needle_type:
      name: Typ jehly kompatibilní s navlékačem nitě
      description: Určuje, pro které typy jehel je navlékač nití určen (podle kategorie/použití
        jehly).
    needle_threader_mechanism_type:
      name: Typ mechanismu navlékače jehly
      description: Popisuje, jak navlékač zachycuje/protahuje vlákno skrz očko jehly.
    needle_threader_packaging_type:
      name: Typ balení navlékače nitě do jehly
      description: Jak je produkt prodáván/balen (jednotlivé vs. vícenásobné balení
        vs. sada).
    needlecraft_fabric_color_family:
      name: Rodina barev látek na vyšívání
      description: Normalizovaná řada barev pro tkaniny s rovnoměrnou vazbou (používá
        se společně s barvami k podrobnému filtrování výsledků).
    needlecraft_fabric_composition:
      name: Složení látky pro vyšívání
      description: Určuje složení/směs vláken látky pro vyšívání (např. 100% bavlna,
        směs lnu a bavlny).
    needlecraft_fabric_weave_type:
      name: Typ tkaní látky s vyšívanou textilií
      description: Určuje vazbu/konstrukci plátna pro vyšívání (např. rovnoměrná vazba
        vs. tradiční plátno), což ovlivňuje chování stehu a vzhled.
    needlecraft_kit_items_included:
      name: Součásti sady pro ruční práce
      description: Uvádí hlavní součásti sady pro vyšívání (nářadí a spotřební materiál).
    needlecraft_kit_project_type:
      name: Typ projektu sady pro vyšívání
      description: Identifikuje, jakou hotovou položku sada vytvoří (výsledek projektu).
    needlecraft_stitching_coverage:
      name: Pokrytí vyšíváním
      description: Označuje, zda se látka prošívá přes 1 vlákno na čtvereček nebo
        přes 2 vlákna (běžné pro rovnoměrnou vazbu a len).
    needlepoint_canvas_mesh_count:
      name: Počet vláken plátna na vyšívání
      description: Zamýšlený počet ok/vláken na palec (vlákna na palec), pro který
        je návrh stanoven (běžně nazývaný počet plátna).
    needlepoint_frame_canvas_attachment_method:
      name: Způsob upevnění plátna ve vyšívacím rámu
      description: Popisuje, jak je vyšívací plátno připevněno k vyšívacímu rámu.
    needlepoint_frame_compatible_stand_type:
      name: Typ stojanu kompatibilního s rámem pro needlepoint
      description: Pokud je rám navržen pro montáž na stojan, určuje typ(y) stojanu,
        se kterými je kompatibilní.
    needlepoint_frame_contents:
      name: Obsah balení vyšívacího rámu
      description: Určuje, které komponenty a příslušenství jsou součástí rámu pro
        vyšívání (např. rám, náhradní tyče/tyčky, připínáčky/špendlíky, uchopovací
        proužky, přepravní taška).
    needlepoint_frame_tension_adjustment_type:
      name: Typ nastavení napětí vyšívacího rámu
      description: Označuje, jak (nebo zda) lze během používání upravit napětí rámu.
    needlepoint_pattern_chart_format:
      name: Formát schématu pro vyšívání
      description: Jak je vzor s jehlovým hrotem znázorněn pro vyšívání (průvodce
        s mapou vs. tištěný/malovaný).
    needlepoint_project_type:
      name: Typ projektu vyšívání
      description: Zamýšlená hotová položka/kategorie, pro kterou je návrh vyšívané
        špičky určen.
    net_design:
      name: Návrh sítě
      description: Identifikuje konstrukční typ sítě a informuje, zda se dá kvůli
        přenášení zasunout nebo složit.
    net_mesh_pattern:
      name: Vzor sítě
      description: Určuje geometrický tvar otvorů sítě, které mohou ovlivnit viditelnost
        a pevnost.
    net_twine_gauge:
      name: Měřidlo síťového provázku
      description: Udává tloušťku provázku nebo pevnost sítě, tradičně vyjadřovanou
        jako číslo gauge (např. 18, 36).
    nicotine_source:
      name: Zdroj nikotinu
      description: Označuje, zda je nikotin v produktu tabákového původu, syntetický,
        nebo zda produkt neobsahuje žádný nikotin.
    nipple_drive_interface:
      name: Typ hlavy niplu
      description: Identifikuje typ/standard hlavy niplu (vnější nebo vnitřní), od
        kterého se odvíjí požadovaný nástroj a metoda konstrukce kola.
    nock_activation_method:
      name: Metoda aktivace nocku
      description: Určuje mechanismus, kterým se zapíná nebo vypíná LED osvětlení
        končíku šípu (např. tlak tětivy, snímač pohybu, ruční spínač).
    nock_fitment_code:
      name: Kód uchycení končíku
      description: Kód výrobce nebo průmyslový kód, který identifikuje rodinu/sérii
        končíků.
    nock_throat_size:
      name: Velikost drážky končíku
      description: Určuje velikost drážky (koncovky), která se nasazuje na tětivu.
    nock_transparency_level:
      name: Úroveň průhlednosti hrotu
      description: Popisuje, jak průhledný, průsvitný, neprůhledný nebo svítí ve tmě
        materiál končíku ovlivňuje viditelnost a estetiku.
    nock_type:
      name: Typ končíku
      description: Určuje provedení končíku šípu nebo šipky, například kolíkové, půlměsícové
        nebo svítící.
    noise_reduction_type:
      name: Typ potlačení šumu
      description: Určuje technologii redukce hluku použitou (nebo nepoužitou) v integrovaném
        headsetu helmy, pokud je to relevantní.
    noise_suppression_technology:
      name: Technologie potlačení hluku
      description: Určuje, zda produkt používá pasivní tlumení nebo aktivní elektronické
        obvody, které tlumí hlasité zvuky a/nebo zesilují okolní zvuk.
    non_slip_base_features:
      name: Protiskluzové základní prvky
      description: Označuje protiskluzové prvky, které zabraňují pohybu pedálu během
        jízdy.
    nose_bridge_type:
      name: Typ nosního můstku
      description: Označuje design nosního můstku, který ovlivňuje přizpůsobení různým
        velikostem obličeje.
    nose_clip_accessories_included:
      name: Nosní spona v balení
      description: Uvádí veškeré další příslušenství dodávané s nosní sponou pro plavání
        (např. špunty do uší, úložné pouzdro).
    nose_clip_features:
      name: Vlastnosti nosní spony
      description: Vyzdvihuje obecné funkční nebo komfortní vlastnosti nosní spony.
    nose_coverage_style:
      name: Způsob zakrytí nosu
      description: Informuje o přítomnosti a typu ochranného panelu nosu či tlamy
        na masce proti hmyzu.
    noseband_type:
      name: Typ nánosníku
      description: Určuje provedení nánosníku (pokud existuje) dodávaného s uzdou.
    number_of_canvas_meshes:
      name: Počet vláken plátna
      description: Velikost ok plastové plátěné desky, vyjádřená v počtu otvorů na
        palec (HPI) nebo v počtu, která určuje velikost stehů a údaje o projektu.
    number_of_chainrings:
      name: Počet převodníků
      description: Udává, kolik převodníků je klika určena k montáži nebo s kolika
        je dodávána.
    number_of_control_stations:
      name: Počet řídicích stanic
      description: Udává počet kormidelních/řídicích stanic podporovaných ovládací
        sadou (jedna stanice vs. dvě stanice atd.).
    number_of_digits:
      name: Počet číslic
      description: Kolik číslic počítadlo zobrazuje (např. 1 číslice, 2 číslice, 3
        číslice).
    number_of_guitar_slots:
      name: Počet slotů pro kytary
      description: Udává, pro kolik kytar je interní balení/gig bag navrženo.
    number_of_needlecraft_fabrics:
      name: Počet látek na vyšívání
      description: Určuje hustotu látky plátna pro vyšívání, která se obvykle vyjadřuje
        počtem čtverečků/vláken na palec (např. 14).
    number_of_plastic_canvas_meshes:
      name: Počet plastových sítěk
      description: Určuje počet ok plastové plachty (otvorů na palec), který určuje
        velikost stehu a úroveň dat projektu.
    number_of_quilting_frame_rails:
      name: Počet kolejnic prošívacího rámu
      description: Počet kolejnic/válců na prošívacím rámu (např. systémy se 2 kolejnicemi
        vs. systémy se 3 kolejnicemi).
    number_of_rope_slots:
      name: Počet otvorů pro lana
      description: Informuje, zda je jistítko určeno k použití s jedním nebo dvěma
        lany.
    number_of_switch_poles:
      name: Počet pólů spínače
      description: Počet samostatných obvodů (pólů) ovládaných přepínačem (např. SPST,
        DPST).
    number_of_switch_throws:
      name: Počet přepnutí spínače
      description: Počet výstupních cest (vrhů) na pól (např. SPDT).
    number_of_timing_chain_rows:
      name: Počet řad rozvodového řetězu
      description: Udává, zda je rozvodový řetěz jednořadý nebo víceřadý.
    number_of_trailer_axles:
      name: Počet náprav přívěsu
      description: Počet náprav na přívěsu.
    number_of_wheel_pieces:
      name: Počet dílů kola
      description: Určuje, zda má kolo jednodílnou, dvoudílnou nebo třídílnou konstrukci.
    numbering_style:
      name: Styl číslování
      description: Označuje, zda a jak jsou startovní čísla předčíslována pro identifikaci
        týmu (např. nečíslovaná, 1–10, vlastní).
    nunchuck_connector_type:
      name: Typ konektoru nunčaku
      description: Styl spojení mezi dvěma rukojeti nunchaku (např. lano, řetěz, otočný
        řetěz).
    nursing_access:
      name: Přístupnost kvůli kojení
      description: Označuje způsob přístupu kvůli kojení, který plavky případně umožňují.
    nursing_access_type:
      name: Typ přístupu kvůli kojení
      description: Určuje, jak oděv zajišťuje přístup k prsům pro kojení nebo odsávání.
    nut_butter_texture:
      name: Textura ořechového másla
      description: Popisuje fyzickou konzistenci ořechového másla, takže nakupující
        si mohou snadno vybrat mezi hladkou, křupavou atd.
    nutrient_fortification:
      name: Obohacení živinami
      description: Identifikuje klíčové živiny, o které je nápoj nebo potravinářský
        výrobek obohacen.
    oak_product_form:
      name: Forma pro výrobky z dubového dřeva
      description: Určuje fyzickou formu dubového dřeva použitého pro zrání/ochucení
        produktů.
    oak_toast_level:
      name: Stupeň vypálení dubového dřeva
      description: Určuje stupeň pražení dubových produktů.
    oboe_case_capacity:
      name: Nosnost pouzdra na hoboj
      description: Označuje, pro jaké nástroje a hlavní součásti je pouzdro určeno.
    oboe_case_carry_configuration:
      name: Konfigurace přenášení pouzdra hoboje
      description: Označuje primární konfiguraci přenášení nabízenou pouzdrem/gigbagem.
    oboe_case_design:
      name: Design pouzdra hoboje
      description: Klasifikuje konstrukci/tuhost vnitřního obalu nebo pouzdra na hoboj
        (např. tvrdé, polotuhé, měkké) pro indikaci úrovně ochrany.
    oboe_case_internal_fit_type:
      name: Typ vnitřního přizpůsobení pouzdra hoboje
      description: Označuje, zda je interiér tvarován pro konkrétní konfiguraci nástroje,
        nebo zda používá nastavitelné přihrádky.
    oboe_keywork_plating:
      name: Pokovení kláves hoboje
      description: Určuje pokovení/povrchovou úpravu klíčů hoboje, odděleně od materiálu
        těla.
    oboe_strap_padding:
      name: Polstrování popruhu hoboje
      description: Popisuje přítomnost/typ polstrování v kontaktní oblasti popruhu/opory
        kvůli pohodlí (např. polstrovaná oblast ramen/krku).
    oboe_swab_style:
      name: Styl tampónu pro hoboj
      description: Určuje funkční styl/konstrukci čisticí tamponu na hoboj (např.
        průtažný, vážený hedvábný).
    observation_window_material:
      name: Materiál pozorovacího okna
      description: Určuje materiál průhledových panelů/okna (ovlivňuje průhlednost
        a trvanlivost).
    ocarina_accessories_included:
      name: Včetně příslušenství k okarině
      description: Příslušenství dodávané s okarínou, například pouzdro, popruh nebo
        tabulka prstokladu.
    ocarina_chamber_count:
      name: Počet komor okaríny
      description: Udává, kolik komor má inline okarína, což ovlivňuje rozsah a složitost
        hraní (jednoduchá/dvojitá/trojitá atd.).
    ocarina_fingering_system:
      name: Systém prstokladu na okaríně
      description: Určuje systém/standard prstokladu, který přívěsná okarína dodržuje
        (pokud je to relevantní).
    ocarina_finish_type:
      name: Typ povrchové úpravy okaríny
      description: Povrchová úprava těla okaríny, která má vliv na dojem z hraní a
        estetiku.
    occupant_classification_sensor_support:
      name: Podpora senzoru klasifikace obsazenosti
      description: Označuje, zda sedadlo obsahuje senzor klasifikace/hmotnosti cestujícího
        nebo zda je možné nainstalovat originální senzor (běžně u sedadel spolujezdce).
    octave_harmonica_cover_plate_material:
      name: Materiál krycí desky oktávové harmoniky
      description: Materiál vnějších krycích desek oktávové harmoniky.
    octave_harmonica_tuning_system:
      name: Ladicí systém pro oktávovou harmoniku
      description: Ladění/temperament používaný pro oktávovou harmoniku.
    octoban_mounting_system_type:
      name: Typ montážního systému Octoban
      description: Jak je oktoban upevněn/umístěn během hraní (upevnění/držák/stojan).
    odor_control_features:
      name: Vlastnosti omezující zápach
      description: Uvádí, zda produkt poskytuje funkci neutralizace/deodorace zápachu
        a jakým způsobem.
    office_furniture_items_included:
      name: Součástí je kancelářský nábytek
      description: Označuje konkrétní položky kancelářského nábytku, které jsou součástí
        sady, například stůl nebo kartotéku.
    oil_cooler_core_type:
      name: Typ jádra chladiče oleje
      description: Určuje vnitřní konstrukci jádra chladiče oleje, která ovlivňuje
        účinnost chlazení, tlakový pokles a trvanlivost.
    oil_cooler_mounting_style:
      name: Způsob montáže chladiče oleje
      description: Popisuje, jak má být chladič oleje namontován/instalován na vozidle.
    oil_dipstick_component_type:
      name: Typ součásti měrky oleje
      description: Určuje, která součástka pro měření hladiny oleje se prodává (např.
        pouze měrka/tyč, pouze rukojeť, kompletní sestava, trubice měrky atd.).
    oil_dipstick_measurement_markings:
      name: Značky na měrce oleje
      description: Určuje, jaké značky/škálování jsou přítomny na měrce pro odečítání
        hladiny oleje.Určuje, jaké značky/stupnice jsou přítomny na měrce pro odečítání
        hladiny oleje.
    oil_dipstick_tube_mounting_type:
      name: Typ uchycení měrky oleje
      description: Určuje, jak je měrka oleje upevněna k motoru nebo bloku motoru.
    oil_drain_plug_head_drive_type:
      name: Typ pohonu hlavy vypouštěcí zátky oleje
      description: Určuje rozhraní pro záběr nástroje na hlavě vypouštěcí zátky oleje,
        které se používá pro instalaci a demontáž.
    oil_drain_plug_magnet_type:
      name: Typ magnetu vypouštěcí zátky oleje
      description: Určuje, zda je vypouštěcí zátka magnetická, a pokud ano, jakého
        je typu.
    oil_fill_cap_type:
      name: Typ plnicího víčka oleje
      description: Styl/typ rozhraní plnicího hrdla oleje používaného krytem ventilů
        (pokud je to relevantní).
    oil_filler_cap_attachment_type:
      name: Typ upevnění víčka plnicího hrdla oleje
      description: Určuje, jak je víčko plnicího hrdla oleje upevněno na motoru/plnicím
        hrdle oleje (např. závitové, bajonet/otočení o čtvrt otáčky, zalisování).
    oil_filler_cap_installation_position:
      name: Poloha instalace víčka plnicího otvoru oleje
      description: Určuje, kde se používá víčko, pokud existuje více míst k plnění
        olejem (např. kryt ventilů, plnicí trubice).
    oil_filler_cap_locking_type:
      name: Zámek víčka palivové nádrže
      description: Určuje, zda je víčko plnicího otvoru oleje nezamykatelné, nebo
        zda používá zamykací/zabezpečenou metodu odstraňování (např. klíčem nebo pomocí
        nástroje), která pomáhá zabránit neoprávněné manipulaci/krádeži nebo náhodnému
        otevření.
    oil_filler_cap_tether_type:
      name: Upevňovací úchyt víčka palivové nádrže
      description: Určuje, zda je víčko plnicího otvoru oleje upevněno/zajištěno,
        aby se zabránilo ztrátě, a jaký typ upevnění se používá.
    oil_filler_cap_venting_type:
      name: Typ odvětrávání víčka plnicího otvoru oleje
      description: Určuje, zda je víčko odvětrávané, a odvětrávací mechanismus (pokud
        je k dispozici).
    oil_filter_style:
      name: Styl olejového filtru
      description: Určuje tvar olejového filtru a způsob montáže/instalace pro kompatibilitu
        s držákem filtru motoru.
    oil_pan_baffle_windage_features:
      name: Vlastnosti přepážky/ochrany proti větru pro olejovou vanu
      description: Označuje vnitřní funkce kontroly oleje, které jsou součástí pánve.
    oil_pan_finish_coating:
      name: Povrchová úprava/povlak olejové vany
      description: Popisuje povrchovou úpravu nebo nátěr olejové vany (lak, práškový
        lak, pokovení, neošetřený povrch atd.).
    oil_pressure_sensor_function_type:
      name: Typ funkce senzoru tlaku oleje
      description: Označuje, zda se jedná o snímač tlaku oleje s proměnným výstupem
        pro manometr / řídicí jednotku motoru, nebo o spínač/vypínač tlaku oleje,
        který rozsvěcuje výstražnou kontrolku.
    oil_pressure_sensor_signal_output_type:
      name: Typ výstupního signálu snímače tlaku oleje
      description: Určuje typ elektrického výstupu/signálu generovaného snímačem tlaku
        oleje.
    oil_processing_method:
      name: Způsob zpracování ropy
      description: Určuje, jak byl olej vyroben nebo rafinován (např. lisován za studena,
        panenský, rafinovaný), což má vliv na chuť, výživové hodnoty a vhodnost pro
        kulinářské použití.
    oil_pump_drive_method:
      name: Způsob pohonu olejového čerpadla
      description: Informuje, co pohání olejové čerpadlo v motoru.
    oil_pump_mounting_style:
      name: Způsob upevnění olejového čerpadla
      description: Určuje, kde a jak je olejové čerpadlo v motoru namontováno (např.
        interní vs. externí/vzdálené, na krytu, na olejové vaně).
    oil_system_connection_thread_standard:
      name: Standard závitu propojení olejového systému
      description: Určuje normu závitu/propojení používanou rozhraním olejového systému
        součásti pro instalaci/kompatibilitu (např. M12x1,5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Stupeň viskozity oleje
      description: Popisuje relativní hustotu oleje pro spřádání kreativního zařízení
        (ne automobilových tříd SAE).
    okra_variety:
      name: Odrůda okry
      description: Identifikuje konkrétní kultivar nebo odrůdu nabízené okry, například
        Clemson Spineless, červená Burgundy nebo Baby Okra.
    olfactory_arts_material_form:
      name: Forma materiálu pro čichové umění
      description: Určuje fyzickou formu materiálu v prodeji.
    olfactory_arts_tool_kit_content:
      name: Obsah sady nástrojů pro čichové umění
      description: Uvádí, které komponenty jsou součástí balení, pokud se produkt
        prodává jako sada pro výrobu svíček / vonných tyčinek / parfémů.
    olive_variety:
      name: Odrůda oliv
      description: Určuje použitý kultivar oliv, což má vliv na chuť, texturu, barvu
        a regionální autenticitu.
    onion_variety:
      name: Odrůda cibule
      description: Určuje konkrétní druh cibule, aby mohli nakupující rychle najít
        preferovanou barvu, chuť a účel použití. Zároveň umožňuje obchodníkovi přesně
        vypsat seznam produktů.
    opacity_level:
      name: Úroveň neprůhlednosti
      description: Udává, jak průsvitná nebo neprůhledná je látka.
    operating_modes:
      name: Provozní režimy
      description: Primární vestavěné efekty/pohybové režimy podporované laserovým
        světlem.
    operating_voltage:
      name: Provozní napětí
      description: Určuje jmenovité napětí systému, pro které je vstřikovač navržen.
    optical_toy_features:
      name: Vlastnosti optické hračky
      description: Zdůrazňuje primární vizuální/optický efekt, který hračka vytváří.
    orchestral_string_core_material:
      name: Základní materiál orchestrální struny
      description: Určuje materiál, z něhož je vyrobeno jádro struny, což silně ovlivňuje
        pocit, odezvu a tón.
    orchestral_string_end_type:
      name: Typ zakončení orchestrální struny
      description: Určuje styl uchycení na konci struny s kobylkou.
    orchestral_string_included_strings:
      name: Součástí orchestru byly smyčcové nástroje
      description: Uvádí, které konkrétní struny jsou součástí balení (liší se podle
        nástroje).
    orchestral_string_instrument_fitting_part_type:
      name: Typ příslušenství/součásti orchestrálního smyčcového nástroje
      description: Určuje, o jaký druh příslušenství/dílu se jedná (např. můstek,
        struník, podbradník).
    orchestral_string_instrument_mute_type:
      name: Typ tlumiče pro smyčcové orchestrální nástroje
      description: Určuje funkční typ tlumiče orchestrálního strunového nástroje (např.
        cvičný/hotelový vs. koncertní) a/nebo běžný styl designu.
    orchestral_string_instrument_part_position:
      name: Poloha části koncertního smyčcového nástroje
      description: Označuje, kam část nástroje patří (to se hodí, když jsou části
        dodávány v horní/dolní nebo levé/pravé variantě).
    orchestral_string_winding_material:
      name: Materiál pro navíjení strun pro orchestrální nástroje
      description: Určuje materiál vnějšího vinutí/ovíjení použitý na struně.
    organza_finish_sheen:
      name: Povrch/lesk organzy
      description: Popisuje vzhled povrchu organzy (matný vs. lesklý/duhový efekt).
    organza_ribbon_transparency_level:
      name: Stupeň průhlednosti organzové stuhy
      description: Popisuje, jak je organzová stuha průhledná.
    organza_transparency_level:
      name: Stupeň průsvitnosti organzy
      description: Popisuje, jak průsvitná je organza v jedné vrstvě.
    origami_paper_shape:
      name: Tvar papíru pro origami
      description: Určuje tvar listu použitý pro ohýbání.
    origami_paper_sidedness:
      name: Rozdílnost stran papíru pro origami
      description: Informuje, zda má papír pro origami stejnou barvu/vzor na obou
        stranách, nebo má kontrastní strany.
    ostrich_feather_part:
      name: Část pštrosího peří
      description: Identifikuje druh/část pštrosího peří (např. křídelní vs. tělové),
        což má vliv na měkkost, hustotu a obvyklé řemeslné použití.
    outboard_motor_shaft_type:
      name: Typ hřídele přívěsného motoru
      description: Standardní třída délky hřídele používaná u závěsných motorů (štítek
        používaný v námořním průmyslu).
    outboard_motor_steering_type:
      name: Typ řízení závěsného motoru
      description: Určuje rozhraní/mechanismus řízení používaný přívěsným motorem
        (např. oj nebo systém dálkového řízení).
    outdoor_table_functionality:
      name: Funkčnost zahradního stolu
      description: Označuje specializované vestavěné funkce, které jdou nad rámec
        jednoduchého povrchu stolu (např. chladicí přihrádka, úložný prostor, kryt
        na palivovou nádrž, podstavec pro slunečník, konektor pro židli, skládací
        konstrukce, trezor do bazénu, nastavitelná výška, integrovaná kolečka, LED
        osvětlení).
    outerwear_length_type:
      name: Typ délky svrchního oblečení
      description: Klasifikuje celkovou délku svrchního oděvu do standardních popisných
        rozsahů.
    outerwear_pieces_included:
      name: Zahrnuje svrchní oblečení
      description: Uvádí kusy oděvu dodávané při prodeji produktu jako sady.
    outfit_attachment_mechanism:
      name: Upevňovací mechanismus pro výstroj
      description: Určuje, jak se oblečení nebo doplňky připevňují k panence (např.
        karta, lepidlo, magnety).
    outfit_items_included:
      name: Součásti oblečení
      description: Uvádí konkrétní položky oděvu, která jsou součástí sady (např.
        body, kraťasy, čelenka).
    outlet_thread_type:
      name: Typ závitu na výstupu
      description: Norma závitu používaná na výstupních otvorech brzdového potrubí
        hlavního válce (např. holendr typu F vs. holendr typu E).
    output_jack_type_instrument:
      name: Typ výstupního konektoru (nástroj)
      description: Určuje typ konektoru audiovýstupu na elektrické mandolíně.
    output_signal_type:
      name: Typ výstupního signálu
      description: Chování/typ elektrického výstupu generovaného snímačem (např. analogový
        odpor termistoru NTC).
    outsole_marking_type:
      name: Typ značení podrážky
      description: Informuje, zda podrážka boty zanechává stopy na površích hřiště,
        což je zásadní faktor pro halové raketové sporty.
    outsole_material:
      name: Materiál podrážky
      description: Označuje materiál podrážky boty, který se dotýká země a ovlivňuje
        přilnavost, flexibilitu a odolnost.
    outsole_stud_type:
      name: Typ kolíků na podrážce
      description: Popisuje konfiguraci podrážek/kopaček (např. tvarované kopačky,
        pryžové výstupky, výstupky na trávník), které zajišťují trakci na zvoleném
        povrchu hřiště.
    oven_bake_clay_formulation:
      name: Receptura z hlíny vypálené v peci
      description: Identifikuje skupinu složení hlíny pálené v peci (např. polymerní
        jíl vs. pryskyřičný jíl), která ovlivňuje manipulaci, vytvrzování a konečné
        vlastnosti.
    oven_housing_configuration:
      name: Konfigurace skříně trouby
      description: Definuje zamýšlené uspořádání spotřebičů, pro které je skříňka
        určena (např. jednoduchá trouba, dvojitá trouba nebo kombinace trouby a mikrovlnné
        trouby).
    overhead_mount_installation_method:
      name: Způsob instalace nad hlavou
      description: Jak je horní držák připevněn k vozidlu (hardware/spojovací materiál).
    oversize_or_undersize_grade:
      name: Nadměrný nebo podměrný stupeň
      description: Určuje rozměrovou třídu sady (nadměrně velké písty/kroužky a/nebo
        podměrečná ložiska) vzhledem ke standardní velikosti od výrobce.
    p_tex_application_method:
      name: Způsob nanášení P-Texu
      description: Popisuje, jak se materiál P-Tex aplikuje na skluznici lyží nebo
        snowboardu.
    p_tex_form:
      name: Forma/formát P-Tex
      description: Identifikuje fyzickou podobu, ve které se opravný materiál dodává.
    packability:
      name: Sbalitelnost
      description: Označuje, zda a jak lze vestu sbalit nebo uložit, když se nepoužívá.
    packaging_format:
      name: Formát balení
      description: Jak se struny balí/prodávají (jednotlivé obálky, hromadné balení
        atd.).
    packaging_material:
      name: Obalový materiál
      description: Určuje primární materiál lahve nebo nádoby, která drží vodu.
    packaging_type:
      name: Typ obalu
      description: Popisuje, jak je figurka s kývací hlavičkou zabalena pro maloobchodní
        prodej / vystavení / sběratelské skladování.
    packing_medium:
      name: Obalové médium
      description: Označuje kapalinu nebo médium (například vodu, různé sirupy, džus
        nebo nálev) použité ke konzervaci ovoce uvnitř nádoby.
    pad_components_included:
      name: Součástí balení jsou podložky
      description: Určuje, které díly jsou součástí, když se produkt prodává jako
        sada (např. chrániče kolen a loktů, pouze chrániče zápěstí).
    pad_controller_additional_control:
      name: Doplňkové ovládací prvky pad ovladače
      description: Typy dalších fyzických ovládacích prvků nad rámec padů (knoby,
        fadery, tlačítka) přítomných na jednotce.
    pad_controller_performance_features:
      name: Výkonové funkce Pad kontroleru
      description: Hlavní vlastnosti chráničů pro hraní a ovládání
    pad_coverage_area:
      name: Oblast pokrytí chrániče
      description: Určuje tělesné zóny, které chrání integrované chrániče opasku.
    pad_material_or_technology:
      name: Materiál nebo technologie podložky
      description: Určuje chráněnou technologii tlumení nárazů nebo značkový materiál
        použitý v chrániči.
    pad_mounting_or_holding_style:
      name: Způsob upevnění nebo držení chrániče
      description: Označuje, jak je chránič držen, jak se nosí nebo upevňuje během
        používání.
    pad_saver_style:
      name: Styl chrániče
      description: Označuje fyzický styl/design chrániče destiček používaného k sušení
        destiček a vývrtu.
    pad_shape:
      name: Tvar podložky
      description: Definuje geometrický tvar nebo zakřivení úderové plochy nebo celkového
        těla padu (např. kulatý, zakřivený, obdélníkový, plochý), což pomáhá uživatelům
        přizpůsobit pad tréninkovým cílům a typům úderů.
    pad_shell_type:
      name: Typ skořepiny chrániče
      description: Klasifikuje konstrukční styl vnějšího povrchu chrániče (např. tvrdá
        skořepina, měkká skořepina, vnitřní vložka).
    pad_style:
      name: Styl chrániče
      description: Určuje typ nebo provedení podložky dodávané se saněmi.
    padding_layers:
      name: Vrstvy výplně
      description: Udává počet vrstev pěny použitých pro absorpci nárazu.
    padding_level:
      name: Úroveň výplně
      description: Označuje míru polstrování integrovaného do kontaktních ploch popruhu/podpory
        (krk/rameno/záda).
    padding_material:
      name: Materiál polstrování
      description: Určuje vnitřní výplň neboli polstrovací látku, která absorbuje
        náraz uvnitř tašek, štítů, lapačích rukavic a figurín.
    paddle_ball_attachment_type:
      name: Typ uchycení míče na pádlo
      description: Určuje, jak je míč připojen k pálce (nebo zda není připevněný).
    paddle_leash_style:
      name: Styl vodítka na pádlo
      description: Určuje styl nebo design šňůry na vodítko k pádlu.
    paddle_shape:
      name: Tvar pádla
      description: Definuje celkovou siluetu hlavy/těla pádla (např. standardní, protáhlá,
        široké tělo), ovlivňující dosah, velikost sladkého bodu a ovladatelnost.
    paddleboard_intended_use:
      name: Zamýšlené použití paddleboardu
      description: Klasifikuje primární účel konstrukce nebo aktivitu, pro kterou
        je prkno vyrobeno (např. turistika, jóga, závodění).
    paint_application_method:
      name: Způsob nanášení barvy
      description: Primární způsob, jakým se má výrobek aplikovat na třmen
    paint_by_number_surface_type:
      name: Typ povrchu pro malování podle čísla
      description: Povrch, na který je vytištěn číslovaný vzor (např. plátno, papír,
        dřevěná deska)
    paint_medium_application_method:
      name: Metoda aplikace malířského média
      description: Značí doporučený způsob nanesení média.
    paint_medium_intended_effect:
      name: Zamýšlený efekt malířského média
      description: Zachycuje primární výsledek, který má médium vytvořit (textura,
        lesk, lazura, tekutost atd.).
    paint_safe_bristles:
      name: Štětiny bezpečné pro lakování
      description: Značí, zda jsou štětiny štětce bezpečné pro použití na automobilovém
        laku / průhledném nátěru (bez poškrábání).
    paintable_surface:
      name: Přetíratelný povrch
      description: Označuje, zda jsou tvary z papírové hmoty připraveny k malování
        tak, jak jsou (např. natřeny základním nátěrem/utěsněny), nebo zda vyžadují
        přípravu.
    paintball_caliber:
      name: Kalibr paintballu
      description: Určuje průměr/ráži kuliček nebo kompatibilního vybavení.
    paintball_feed_system:
      name: Systém podávání paintballových kuliček
      description: Definuje, jak jsou kuličky podávány do značkovače.
    paintball_fill_color:
      name: Barva náplně paintballu
      description: Značí barvu vnitřní značkovací výplně, která se může lišit od vnějšího
        pláště, a určuje barvu zanechanou po dopadu.
    paintball_fill_type:
      name: Typ náplně pro paintball
      description: Popisuje jakékoli speciální složení nebo vlastnost výplně (např.
        omyvatelná, svítící ve tmě, prášková).
    paintball_grade:
      name: Pro paintball
      description: Popisuje výkonnostní třídu nebo zamýšlenou úroveň použití (např.
        vstupní, terénní, soutěžní, zimní).
    paintball_mask_coverage_level:
      name: Stupeň krytí paintballové masky
      description: Označuje, které části obličeje nebo hlavy paintballové brýle nebo
        maska chrání (pouze brýle, polovina obličeje, celý obličej nebo celá hlava).
    paintball_tank_valve_type:
      name: Typ ventilu paintballové nádrže
      description: Popisuje rozhraní ventilu nebo regulátoru na nádrži.
    painting_surface_priming_type:
      name: Typ základního nátěru na lakovaný povrch
      description: Určuje základní nátěr/povrch na malovaném povrchu (nad rámec pouze
        základního/bez základního nátěru), což ovlivňuje přilnavost barvy a kompatibilitu
        technik.
    palette_knife_blade_edge_profile:
      name: Profil ostří čepele špachtle
      description: Popisuje profil pracovní hrany čepele paletového nože (ne ostrost),
        který ovlivňuje vytváření značek a míchání.
    palette_knife_flexibility:
      name: Flexibilita špachtle
      description: Popisuje tuhost/ohebnost čepele paletového nože.
    palette_surface_finish:
      name: Povrchová úprava palety
      description: Popisuje smíšenou povrchovou úpravu/povrchovou úpravu, která ovlivňuje
        odolnost vůči skvrnám a snadnost čištění.
    palm_padding_level:
      name: Úroveň polstrování dlaní
      description: Popisuje množství vycpávek v oblasti dlaně rukavice nebo úchopového
        chrániče.
    palm_padding_type:
      name: Typ polstrování dlaně
      description: Označuje materiál nebo konstrukci použitou pro polstrování dlaně
        (např. gel, pěna, dvouvrstvá).
    palm_wax_blend_readiness:
      name: Připravenost směsi palmového vosku
      description: Zda se jedná o čistý palmový vosk nebo předem namíchanou směs určenou
        pro dosažení specifických výkonnostních charakteristik.
    palm_wax_form:
      name: Forma palmového vosku
      description: Fyzikální forma palmového vosku v prodeji, která ovlivňuje snadnost
        měření, rychlost tavení a manipulaci.
    pan_flute_tuning_standard:
      name: Standard ladění Panovy flétny
      description: Referenční frekvence používaná pro ladění (např. A4=440 Hz), důležitá
        pro hru s jinými nástroji
    pannier_configuration:
      name: Nastavení košíku
      description: Označuje, zda se produkt prodává jako samostatná brašna, spojená
        dvojitá brašna nebo sada trojitých brašen.
    pannier_mounting_system:
      name: Systém uchycení bočních brašen
      description: Definuje mechanismus používaný k upevnění brašny k nosiči nebo
        rámu jízdního kola a zajišťuje kompatibilitu s různým nastavením.
    pant_cuff_style:
      name: Styl manžety kalhot
      description: Označuje zakončení nebo úpravu u kotníku kalhot (např. elastické
        manžety, kotníkové zipy, otevřený lem).
    pant_leg_conversion_type:
      name: Typ konverze nohavic
      description: Označuje, zda a jak lze nohavice kalhot přeměnit nebo upravit pro
        různé délky.
    pantyhose_crotch_style:
      name: Punčocháče v rozkroku
      description: Definuje design oblasti rozkroku a rozlišuje standardní verze s
        uzavřeným rozkrokem, bez rozkroku nebo s vyztuženým klínkem.
    papaya_variety:
      name: Odrůda papáji
      description: Určuje kultivar nebo odrůdu papáji (např. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Formát papírových a magnetických panenek
      description: Určuje, zda se jedná o tradiční sadu papírových panenek, sadu magnetických
        panenek nebo hybridní formát.
    paper_color_family:
      name: Rodina barev papíru
      description: Určuje, zda je balení vyrobeno z jedné barvy, různých barev nebo
        ze speciálních směsí (užitečné, když je barva určena pro danou položku, ale
        balení jsou smíšená).
    paper_magnetic_doll_set_contents:
      name: Obsah sady papírových a magnetických panenek
      description: Označuje, které hlavní komponenty jsou součástí sady.
    paper_opacity:
      name: Neprůhlednost papíru
      description: Označuje, jak je papír průhledný, od velmi průhledného po neprůhledný
        (užitečné pro obkreslování).
    paraglider_certification_rating:
      name: Kvalifikace pro paragliding
      description: Uvádí oficiální hodnocení letové způsobilosti přiřazenou padákovému
        křídlu (např. třída EN nebo LTF).
    parasite_types_controlled:
      name: Kontrolované typy parazitů
      description: Uvádí vnitřní parazity, proti kterým je produkt účinný, takže kupující
        mohou přizpůsobit odčervení specifickým druhům zamoření.
    parking_camera_mounting_location:
      name: Umístění parkovací kamery
      description: Kam na vozidle má být kamera instalována (např. oblast SPZ, povrchová
        montáž na zadní straně vozidla, zapuštěná montáž)
    parking_camera_night_vision_technology:
      name: Technologie nočního vidění parkovací kamery
      description: Metoda podpory při slabém osvětlení používaná kamerou
    parking_camera_orientation:
      name: Orientace parkovací kamery
      description: Zda je kamera určena pro zadní (záloha) pohled, přední pohled nebo
        volitelné/zrcadlové použití.
    parking_sensor_finish:
      name: Povrchová úprava parkovacího senzoru
      description: Označuje povrchovou úpravu čelní strany / krytky parkovacího senzoru
        (např. přetíratelná/základní, matná, lesklá), aby lépe ladila s estetikou
        nárazníku.
    parking_sensor_type:
      name: Typ parkovacího senzoru
      description: Určuje technologii snímání používanou parkovacím senzorem (např.
        ultrazvuková, elektromagnetická, radarová, optická).
    parsley_root_variety:
      name: Odrůda kořenové petrželky
      description: Uvádí kultivar nebo odrůdu kořene petržele, pokud ji uvádí dodavatel.
    parsnip_variety:
      name: Odrůda pastináku
      description: Identifikuje konkrétní odrůdu nebo kultivar pastináku, jako je
        Hollow Crown nebo bílý Gem, což umožňuje kupujícímu vybrat na základě rozdílů
        chuti, sladkosti nebo velikosti.
    part_condition:
      name: Stav dílu
      description: Označuje, zda je díl nový, použitý, repasovaný atd.
    part_placement:
      name: Umístění dílu
      description: Označuje, kde na stroji (např. schody nebo stepper) je součást
        nainstalována, například vlevo, vpravo, vpředu nebo vzadu.
    partial_capo_covered_strings:
      name: Struny zakryté částečným kapodastrem
      description: Určuje rozsah strun částečného kapodastru pomocí standardního číslování
        6 strun kytary (1 = vysoké E, 6 = nízké E).
    parting_style:
      name: Způsob rozdělení
      description: Označuje, jak je paruka rozdělena nebo může být rozdělena (např.
        uprostřed, na stranu, volná část), což ovlivňuje flexibilitu stylingu.
    party_favor_type:
      name: Typ dárku na párty
      description: Určuje, o jaký druh dárku z večírku se jedná (např. samolepky,
        mini hračky, bublifuky), aby bylo možné procházet/filtrovat v rámci kategorie
        Dárky z večírku.
    party_game_format:
      name: Formát párty hry
      description: Primární fyzický formát společenské hry.
    party_horn_mouthpiece_type:
      name: Typ náustku párty foukačky
      description: Určuje konstrukci náustku, která ovlivňuje hygienu a pohodlí.
    party_horn_style:
      name: Styl párty rohu
      description: Popisuje styl konstrukce/chování párty foukačky (jak se vysunuje
        nebo jak produkuje zvuk).
    passenger_car_type:
      name: Typ osobního automobilu
      description: Identifikuje konkrétní typ osobního vozového parku (osobního vozu)
        pro daný model (např. autokar, lůžkový vůz), používaný pro prohlížení a sestavování
        sad.
    passion_fruit_variety:
      name: Odrůda mučenky
      description: Identifikuje/specifikuje nabízenou botanickou nebo komerční odrůdu
        mučenky (např. purpurová, žlutá, Granadilla).
    pasta_sauce_texture:
      name: Textura těstovinové omáčky
      description: Popisuje konzistenci omáčky (např. hladkou, hustou, krémovou) tak,
        aby odpovídala pocitu v ústech a preferencím spotřebitele.
    pasta_sauce_variety:
      name: Druh omáčky na těstoviny
      description: Klasifikuje omáčky na těstoviny podle receptu nebo stylu, takže
        nakupující mohou rychle najít klasiku jako marinara nebo speciální omáčky
        jako vodka nebo pesto.
    pastry_crust_state:
      name: Stav těsta
      description: Popisuje přípravu nebo stav pečení kůrky při nákupu.
    pastry_crust_style:
      name: Styl pečiva
      description: Identifikuje konkrétní druh pečiva nebo typ těsta.
    pastry_filling_type:
      name: Typ náplně do těsta
      description: Určuje primární vnitřní náplň těsta nebo koláčku.
    patch_adhesion_method:
      name: Metoda aplikování nášivek
      description: Určuje, jak se záplata přichytí k duši nebo pneumatice (např. samolepicí,
        vulkanizační s cementem nebo tepelně aktivovaná).
    patch_backing_material:
      name: Podkladový materiál náplasti
      description: Materiál použitý na zadní/spodní straně nášivky (např. plsť, kepr),
        který se dotýká zdobené položky.
    patch_backing_type:
      name: Typ podkladu nášivky
      description: Podkladová vrstva použitá na nášivce (např. za tepla / nažehlovací,
        samolepicí, suchý zip, žádná)
    patch_base_material:
      name: Základní materiál nášivky
      description: Primární základní/podkladový textilní materiál nášivky s motivem
        (nikoli dekorativních ozdob)
    patch_border_edge_finish:
      name: Povrchová úprava okraje/okraje záplaty
      description: Způsob úpravy okrajů záplaty (např. obšitý/overlockový okraj, laserem
        řezaný okraj) ovlivňující trvanlivost a vzhled.
    patch_placement_area:
      name: Oblast umístění nášivky
      description: Běžná zamýšlená oblast pro umístění nášivky na oděvu/doplňcích
    pathogen_removal_capability:
      name: Funkce odstraňování patogenů
      description: Určuje, které třídy mikroorganismů (bakterie, prvoky, viry) je
        čerpadlo certifikováno k odstranění.
    pattern_sizing_system:
      name: Systém dimenzování vzorů
      description: Určuje regionální systém velikostí nebo standard použitý pro tabulku
        velikostí střihu (např. USA, Spojené království, EU).
    peak_style:
      name: Vrcholový styl
      description: Určuje styl hledí nebo kšiltu na helmě, ovlivňuje krytí, estetiku
        a pravidla disciplíny.
    pear_variety:
      name: Odrůda hrušek
      description: Identifikuje kultivar nebo odrůdu hrušek (např. Bartlett, Bosc,
        Conference), což umožňuje nakupujícím zvolit si preferovanou chuť, texturu
        a kulinářské využití.
    pearl_luster_grade:
      name: Stupeň lesku perly
      description: Kvalitativní stupeň lesku/lesknutí povrchu perly.
    pearl_matching_level:
      name: Úroveň shody perly
      description: Udává, jak dobře se perly shodují v rámci šarže nebo vlákna (např.
        podle barvy, velikosti a lesku).
    pearl_shape:
      name: Tvar perly
      description: Celková kategorie tvaru perly.
    pearl_surface_condition:
      name: Perleťový povrch
      description: Označuje viditelný stav povrchu perly na základě přítomnosti a
        závažnosti skvrn nebo vadů.
    pearl_treatment:
      name: Ošetření perly
      description: Zveřejňuje jakékoli ošetření použité na perle ovlivňující barvu/vzhled.
    pearl_type:
      name: Typ perly
      description: U volně ložených perel určuje druh/původ perly (např. sladkovodní,
        Akoya, tahitská, Jižní moře).
    peat_level:
      name: Hladina PPM
      description: Popisuje intenzitu vlivu rašelinového kouře na whisky, od nerašelinové
        po silně rašelinnou.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilita pedálů a zarážek
      description: Určuje, pro které standardy pedálů nebo zarážek je podložka nebo
        klín navržen, a zajišťuje tak, aby si nakupující vybrali produkt, který bude
        odpovídat jejich pedálům a botám.
    pedal_configuration:
      name: Konfigurace pedálů
      description: Označuje, zda má židle jeden pedál, rozdělené/nezávislé pedály
        nebo konvertibilní design.
    pedal_mounting_style:
      name: Způsob upevnění pedálu
      description: Určuje, jak se pedál nebo kryt/destička pedálu připevňuje k vozidlu
        (způsob instalace/upevnění).
    pedal_set_components:
      name: Komponenty sady pedálů
      description: Určuje, které pedály jsou součástí sady.
    pedal_spindle_material:
      name: Materiál osy pedálu
      description: Materiál použitý pro osu/vřeteno pedálu, ovlivňující pevnost, hmotnost
        a odolnost proti korozi.
    pedal_spindle_thread_size:
      name: Velikost závitu osy pedálu
      description: Určuje standard závitu vřetena pedálu, které se šroubuje do kliky.
    pedal_type:
      name: Typ pedálu
      description: Popisuje styl pedálů dodávaných s kolem, s uvedením kompatibility
        s obuví a stylem jízdy.
    pellet_accessory_type:
      name: Typ příslušenství pro pelety
      description: Identifikuje konkrétní druh příslušenství na pelety, aby rybáři
        mohli rychle najít vrtáky, pásky nebo zarážky podle svých potřeb při stavbě
        montáže.
    pellet_grade:
      name: Druh kuliček
      description: Označuje přesnost výroby nebo stupeň výkonnosti airsoftových kuliček.
    pen_ink_color:
      name: Barva inkoustu pro pero
      description: Označuje skutečnou barvu inkoustu dávkovanou perem, která se může
        lišit od barvy vnějšího těla.
    penalty_card_accessories_included:
      name: Příslušenství pro trestné karty, které je součástí balení
      description: Uvádí další příslušenství pro rozhodčí, které je součástí trestné
        karty, jako je peněženka, záznamník, tužka, mince, píšťalka nebo pouzdro.
    penalty_card_colors_included:
      name: Včetně barev penaltových karet
      description: Uvádí barvy trestných karet obsažených v sadě produktů.
    penalty_flag_throw_distance:
      name: Vzdálenost hodu trestným praporkem
      description: Klasifikace designu udávající zamýšlený dosah házení vlajky.
    pendant_cutter_safety_features:
      name: Bezpečnostní prvky řezačky přívěsků
      description: Označuje integrované bezpečnostní prvky, které snižují riziko náhodného
        řezu během nošení/přenášení.
    pendant_cutter_wear_method:
      name: Metoda opotřebení frézy na přívěsky
      description: Určuje, jak se má řezačka přívěsků nosit.
    pepper_variety:
      name: Odrůda papriky
      description: Určuje odrůdu nebo druh papriky použitý v produktu, což umožňuje
        rozlišovat mezi různými chuťovými profily a stupni pálivosti.
    percussion_case_style:
      name: Styl pouzdra na perkusní nástroje
      description: Klasifikuje celkový styl/konstrukci pouzdra (soft bag vs. hard/rigid
        pouzdro vs. hybrid).
    percussion_instruments_included:
      name: Zahrnuty jsou bicí nástroje
      description: Uvádí typy bicích nástrojů, které jsou součástí sady, pokud je
        produktem vícenástrojová hračka.
    percussion_mallet_handle_grip_style:
      name: Styl úchopu rukojeti perkusní paličky
      description: Identifikuje typ ošetření úchopové plochy rukojeti nad rámec obecné
        textury (holé dřevo, lakovaná, pogumovaná rukojeť nebo omotávka).
    percussion_mallet_head_construction:
      name: Konstrukce hlavy perkusní paličky
      description: Popisuje styl sestavení/konstrukce hlavy paličky (např. omotaná
        přízí, omotaná plstí, guma, surové dřevo), který má vliv na zvuk a trvanlivost.
    perfumery_base_carrier_type:
      name: Typ nosiče parfémové báze
      description: Specifikuje systém nosiče/rozpouštědla parfémové báze (z čeho je
        základ primárně vyroben v zájmu ředění a výkonu).
    perfumery_base_intended_application:
      name: Zamýšlené použití parfémové báze
      description: Označuje konečný formát použití, pro který je báze určena (např.
        jemný vonný sprej vs. roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Nosič/rozpouštědlo parfémové přísady
      description: Identifikuje nosič/rozpouštědlo, ve kterém je složka dodávána,
        pokud je zředěná (např. ethanol, DPG, jojobový olej).
    perfumery_ingredient_form:
      name: Formulář pro parfémové přísady
      description: Určuje fyzickou formu/stav parfémové přísady jako dodávané.
    perfumery_ingredient_type:
      name: Typ parfémové složky
      description: Klasifikuje parfumérskou přísadu podle toho, co v parfumérské praxi
        znamená (např. esenciální olej, aromatická chemikálie).
    perfumery_ingredient_usage_note:
      name: Poznámka k použití parfumérských složek
      description: Označuje obvyklou roli ve struktuře vůně (vrchní tóny, střed/srdce,
        báze) s ohledem na to, že jednotlivé látky mohou překračovat hranice tónů.
    perfumery_ingredients:
      name: Složky parfémů
      description: Uvádí typy spotřebních vonných materiálů obsažených v sadě (např.
        esenciální oleje, vonné oleje, alkoholová báze).
    perfumery_note_position:
      name: Pozice parfémové noty
      description: Označuje typickou roli složky ve struktuře vůně (vrch/srdce/základ).
    persimmon_variety:
      name: Odrůda tomelu
      description: Identifikuje kultivar nebo odrůdu tomelu, protože různé odrůdy,
        jako například Fuyu nebo Hachiya, se liší texturou, chutí, trpkostí a kulinářským
        využitím.
    personalization_type:
      name: Typ personalizace
      description: Určuje, zda a jak lze produkt přizpůsobit pro událost (např. monogram,
        jméno/datum, vložení fotografie).
    phonics_focus:
      name: Zaměření na foniku
      description: Určuje, na jaké dovednosti čtení podle výslovnosti a čtení slov
        se čtecí hračka zaměřuje.
    physalis_variety:
      name: Odrůda mochyně
      description: Identifikuje konkrétní botanický druh, kultivar nebo běžnou odrůdu
        physalis, která se prodává.
    pi_ata_filler_type_included:
      name: Typ výplně piñaty, která je součástí
      description: Pokud je součástí výplň, uveďte typ poskytnutého obsahu.
    pi_ata_hanging_method:
      name: Metoda zavěšení piñaty
      description: Jak je piñata navržena k zavěšení nebo podepření (smyčka, háček,
        řetězec v ceně atd.).
    pi_ata_opening_type:
      name: Typ otevírání piñaty
      description: Jak se lze dostat do plnicího otvoru nebo ho zavřít (klapka, suchý
        zip, před-uzavřený atd.).
    piccolo_key_system:
      name: Systém klíčů Piccolo
      description: Identifikuje systém/design klapek použitý na pikole (obvykle Boehmův
        systém pro moderní pikoly).
    piccolo_keywork_features:
      name: Vlastnosti klapek pikoly
      description: Určuje významné mechanismy a možnosti ovládání kláves na pikole.
    pick_grip_aid:
      name: Pomůcka pro uchopení trsátka
      description: Označuje primární vestavěnou úchopovou pomůcku na trsátku nad rámec
        obecného pocitu/textury povrchu (např. otvory pro úchop, reliéfní logo, gumová
        vložka).
    pickleball_construction_type:
      name: Typ konstrukce hřiště na pickleball
      description: Výrobní konstrukce míče, například bezešvá jednodílná nebo svařovaná
        dvoudílná, která má vliv na odolnost a konzistenci letu.
    pickling_method:
      name: Metoda moření
      description: Určuje konzervační médium nebo techniku použitou pro moření, například
        octový nálev nebo laktofermentaci.
    pickup_and_preamp_configuration:
      name: Konfigurace snímače a předzesilovače
      description: Označuje, zda viola obsahuje snímač a/nebo aktivní předzesilovač
        pro zesílený výkon nebo nahrávání.
    pickup_configuration:
      name: Konfigurace korby
      description: Popisuje celkové uspořádání snímače elektrické kytary pomocí běžného
        zkráceného zápisu (např. SSS, HSS, HH).
    pickup_cover_material:
      name: Materiál krytu korby
      description: Určuje primární materiál krytu snímače (pokud je přítomen), včetně
        běžných pokovených povrchových úprav, pokud je tak výrobce specifikován.
    pickup_cover_type:
      name: Typ krytu snímače
      description: Určuje, zda má elektrická kytara kryt snímače, a materiál/styl
        krytu (např. kov vs. plast).
    pickup_string_spacing:
      name: Rozteč strun snímače
      description: Standardní rozteč pólových nástavců/strun, pro který je snímač
        vyroben (např. Fender/rozteč F vs. Gibson/standard), což ovlivňuje zarovnání
        kytar s tremolem.
    pie_crust_type:
      name: Typ křehkého těsta
      description: Určuje styl nebo typ těsta použitého pro koláč nebo dortík, například
        lístkové těsto, grahamové krekrové těsto nebo bezlepkové těsto.
    piece_configuration:
      name: Konfigurace kusu
      description: Udává, z kolika samostatných částí se tágo, násada nebo pomocné
        tágo skládá, což ovlivňuje přenositelnost a styl hry.
    pillow_form_size:
      name: Velikost sypky na polštáře
      description: Standardizované označení velikosti hotového výrobku pro polštářové
        sypky/vložky (např. 18" × 18").
    pilot_helmet_communications_integration:
      name: Integrace komunikace s pilotní helmou
      description: Označuje, zda helma obsahuje nebo je pro leteckou komunikační komponentu
        předkonfigurována.
    pilot_helmet_visor_configuration:
      name: Konfigurace hledí pilotní helmy
      description: Určuje konfiguraci štítu/obličejového štítu, která je součástí
        pilotní helmy.
    pin_attachment_type:
      name: Typ uchycení pomocí kolíků
      description: Určuje mechanismus připnutí/zadní strana použitý k připevnění připnutí
        k oděvu nebo povrchu (např. motýlí spona, magnetická zadní strana).
    pin_backing_type:
      name: Typ podložky pro připínáčky
      description: Určuje upevňovací/zadní mechanismus používaný k upevnění připnutého
        k oděvu nebo doplňkům.
    pin_cushion_attachment_style:
      name: Styl uchycení jehelníčku
      description: Jak se jehelníček nosí, připevňuje nebo umisťuje během používání.
    pin_cushion_features:
      name: Vlastnosti jehelníčku
      description: Funkční vlastnosti nad rámec základního držení špendlíku.
    pin_face_customization_method:
      name: Metoda přizpůsobení líce odznaku
      description: Určuje, jak je vyroben design přední strany (např. tvrdý smalt,
        měkký smalt, potištěný).
    pin_type:
      name: Typ odznaku
      description: Určuje styl nebo formát použitý pro sběratelské předměty sportovních
        fanoušků.
    ping_pong_certification:
      name: Certifikace ping pongu
      description: Deklaruje oficiální standard nebo úroveň schválení produktu řídícím
        orgánem.
    ping_pong_competition_certification:
      name: Certifikace ping pongu pro soutěže
      description: Označuje oficiální certifikační status pingpongového míčku pro
        schválenou hru (např. schváleno ITTF).
    ping_pong_paddle_handle_style:
      name: Styl rukojeti pingpongové pálky
      description: Definuje tvar/styl rukojeti pádla, ovlivňující pohodlí úchopu a
        techniku hry.
    ping_pong_robot_accessory_type:
      name: Typ příslušenství pro robota Ping pong
      description: Identifikuje funkční podtyp příslušenství, aby nakupující mohli
        rychle zúžit výsledky (např. sítě vs. napájecí adaptéry).
    ping_pong_rubber_surface_type:
      name: Typ gumového povrchu ping pongu
      description: Určuje styl/texturu gumového povrchu použitého na pálku, který
        má vliv na rotaci a rychlost.
    ping_pong_rubber_type:
      name: Typ gumy ping pongu
      description: Určuje styl konstrukce povrchu gumové vrstvy na pingpongové pálce,
        který má vliv na herní vlastnosti.
    ping_pong_table_type:
      name: Typ pingpongového stolu
      description: Klasifikuje celkový styl nebo formát stolu pro snazší porovnání
        (např. soutěž, multifunkční, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Metoda ozvučení / produkce zvuku píšťalového nástroje
      description: Určuje, jak nástroj produkuje zvuk (mechanismus proudění vzduchu),
        což pomáhá rozlišovat skupiny aerofonu, plátkových nástrojů a píšťaly varhan
        ve filtrech.
    piston_application_type:
      name: Typ použití pístu
      description: Zamýšlené určení/případ použití pístu (náhradní vs. výkonnostní/závodní
        vs. heavy-duty).
    piston_crown_dish_style:
      name: Pístní korunka/miskový tvar
      description: Tvar korunky pístu, který ovlivňuje objem spalovacího prostoru
        a kompresi (např. plochá hlava, kopule, miska).
    piston_pin_retention_type:
      name: Typ zajištění pístního čepu
      description: Určuje, jak je pístní čep zajištěn v sestavě pístu a ojnice.
    pit_configuration:
      name: Uspořádání boxů
      description: Definuje strukturální formát přistávací plochy (jednodílná vs.
        modulová) a v širším smyslu i počet sekcí neboli dodávaných modulů.
    pit_cover_type:
      name: Typ krytu jímky
      description: Určuje ochranný povrch nebo vrstvu dodávanou s hřištěm, které mají
        vliv na odolnost proti hrotům, ochranu proti povětrnostním vlivům a preference
        sportovce.
    pitahaya_flesh_color:
      name: Barva masa pitahaye
      description: Určuje barvu vnitřní dužiny pitahaje (dračího ovoce) (např. bílá,
        červená, purpurová), což je klíčový rozlišovací znak ovlivňující chuť, vzhled
        a vnímanou nutriční hodnotu.
    pitch_mat_coverage_length:
      name: Délka pokrytí hrací plochy
      description: Klasifikuje podložku kriketového hřiště podle části branky, kterou
        pokrývá (např. plné nebo poloviční hřiště).
    pitch_range:
      name: Rozsah výšek
      description: Popisuje vnímaný rozsah/jas tónu třepačky.
    pitch_standard:
      name: Standardní výška tónu
      description: Určuje referenční ladění, pro které je zobcová flétna vyrobena
        (např. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Označení velikosti nadhazovací gumy
      description: Označuje standardní klasifikaci velikosti hřiště pro gumu hřiště,
        což zjednodušuje výběr, aniž by nakupující musel znát přesné rozměry.
    pitching_screen_style:
      name: Styl odpalovací sítě
      description: Definuje konstrukční návrh obrazovky tak, aby nakupující dokázal
        rychle vybrat správné ochranné rozvržení pro svůj tréninkový scénář.
    pitching_target_design:
      name: Návrh terče pro nadhazování
      description: Klasifikuje celkový styl nebo konfiguraci nadhozového terče.
    pitching_wheel_count:
      name: Počet odpalovacích koleček
      description: Udává počet hnacích kol, které odpalovací stroj používá.
    pivot_adjustability:
      name: Nastavitelnost otočného čepu
      description: Označuje, zda mají nůžky nastavitelný otočný šroub pro nastavení
        napětí při střihu.
    pivot_piece_type:
      name: Typ otočného kusu
      description: Rozlišuje mezi různými tvary pivotního rozhraní, jako jsou tradiční
        misky nebo trubky.
    place_card_holder_closure_mechanism:
      name: Uzavírací mechanismus držáku karty
      description: Určuje, jak držák uchopí nebo zajistí kartu.
    place_card_orientation:
      name: Orientace jmenovek
      description: Určuje orientaci mapy místa při použití/zobrazení.
    place_card_printing_status:
      name: Stav tisku karty místa
      description: Označuje, zda je karta s místem prázdná pro ruční psaní/tisk, předtištěná
        (jména nejsou personalizovaná) nebo personalizovaná/vytištěná na míru.
    placket_type:
      name: Typ rozparku
      description: Určuje styl předního zapínání na polokošili, včetně počtu tlačítek
        nebo alternativních zapínání.
    planetarium_content_theme:
      name: Téma obsahu planetária
      description: Primární obsah zobrazený projektorem planetária.
    planetarium_projection_content_format:
      name: Formát obsahu projekce planetária
      description: Určuje mechanismus promítání obsahu, který planetárium používá
        (fyzické disky/diapozitivy vs. digitální / LED efekt).
    plant_fiber_type:
      name: Typ rostlinného vlákna
      description: Specifický typ rostlinného vlákna, pokud je typem zdroje střižových
        vláken rostlina.
    plaster_gauze_finish:
      name: Sádrová gázová úprava
      description: Výsledná tendence povrchové vrstvy po aplikaci a vyhlazení
    plaster_gauze_grade:
      name: Třída sádrové gázy
      description: Zamýšlený stupeň použití sádrové gázy (např. kreativní/studentská
        vs. profesionální).
    plaster_gauze_weave_density:
      name: Hustota tkaní sádrové gázy
      description: Relativní otevřenost/těsnost gázové vazby, ovlivňující pevnost
        a schopnost zadržet sádru.
    plastic_canvas_finish:
      name: Povrchová úprava z plastového plátna
      description: Povrchová úprava plastové plachtoviny v roli.
    plastic_canvas_sheet_finish:
      name: Povrchová úprava z plastového plátna
      description: Úprava povrchu a okrajů plastového plátna.
    plastic_canvas_transparency:
      name: Průhlednost plastového plátna
      description: Jak průhledné/neprůhledné je plastové plátno
    plate_bottom_design:
      name: Design spodní desky
      description: Popisuje konstrukci spodní strany desky, která ovlivňuje trakci,
        stabilitu a bezpečnost na různých hracích površích.
    plate_compatibility_standard:
      name: Norma pro kompatibilitu desek
      description: Označuje standard závaží, pro který je tyč určena (např. olympijský
        50 mm, standardní 25 mm).
    plate_installation_type:
      name: Typ instalace desky
      description: Určuje, jak je deska upevněna nebo umístěna na hřišti (např. v zemi,
        s hroty, skládací), což umožňuje nakupujícím vybrat si mezi trvale upevněnou
        a přenosnou variantou.
    plate_size_category:
      name: Kategorie velikosti desky
      description: Klasifikuje desku podle úrovně hry nebo regulačního standardu,
        aby nakupující mohli rychle najít vybavení kompatibilní s ligou.
    play_dough_putty_kit_contents:
      name: Obsah sady s modelínou a chytrou modelínou
      description: Identifikuje hlavní součásti nad rámec samotné směsi (např. nástroje,
        formy, extruder, úložný prostor).
    play_dough_tool_set_items_included:
      name: Sada nástrojů na modelínu, které jsou součástí
      description: Identifikuje typy nástrojů a doplňků, které jsou součástí sady
        nástrojů na modelínu (např. válečky, kráječe, formy).
    play_environment_suitability:
      name: Vhodnost herního prostředí
      description: Určuje zamýšlené herní prostředí pro sadu (např. uvnitř, venku,
        ve vodě).
    play_food_features:
      name: Funkce přehrávání jídla
      description: Speciální funkční nebo realistické vlastnosti hraček ve tvaru potravin.
    play_food_items_included:
      name: Obsažené položky hraček ve tvaru potravin
      description: Označuje druhy jídla na hraní, které jsou součástí kuchyňské herní
        sady.
    play_food_size_scale:
      name: Měřítko velikosti herního jídla
      description: Označuje přibližné měřítko velikosti jídla na hraní pro kompatibilitu
        s kuchyňkami na hraní, panenkami a herními sadami.
    play_money_set_components_included:
      name: Součástí sady jsou následující komponenty
      description: Určuje, které typy komponent jsou zahrnuty v herní sadě Peníze/bankovnictví.
    play_pattern:
      name: Herní schéma
      description: Primární způsob, jakým je hračka určena k použití (např. vrtění
        se/odbourávání stresu, sochařství/umění na stole, stavba/stavba nebo puzzle).
    play_sprinkler_mounting_type:
      name: Typ montáže herního postřikovače
      description: Jak je herní postřikovač umístěn/zajištěn během používání.
    play_vehicle_lights_and_sounds:
      name: Světa a zvuky aut na hraní
      description: Označuje, zda auto na hraní obsahuje elektronické herní efekty,
        jako jsou světla a/nebo zvuky.
    play_vehicle_scale:
      name: Měřítko hracích vozidel
      description: Označuje poměr měřítka hracího vozidla (běžně používané pro tlakově
        litá a modelová hračková vozidla).
    player_size_category:
      name: Kategorie velikosti hráče
      description: Definuje zamýšlenou velikost/věkovou kategorii hráče, pro kterou
        sada vybavení chytače odpovídá (např. hráč na odpaliště, mládež, středně pokročilý,
        dospělý).
    player_size_range:
      name: Rozsah velikostí hráčů
      description: Určuje zamýšlený rozsah velikostí popruhu/podpěry pro uživatele
        (např. dítě, dospělý, univerzální).
    playing_environment:
      name: Herní prostředí
      description: Určuje primární herní povrch nebo kontext, pro který je míč na
        pozemní hokej navržen.
    playing_method:
      name: Způsob hraní
      description: Primární způsob, jakým se má nástroj hrát/aktivovat.
    playing_surface_material:
      name: Materiál hrací plochy
      description: Označuje materiál přední hrací plochy kachonu (tapa), který má
        silný vliv na tón a pocit ze hry.
    playing_surface_type:
      name: Typ hrací plochy
      description: Popisuje konstrukci hrací plochy/pocit z cvičební podložky.
    playset_activities_included:
      name: Aktivity v herní sadě, které jsou součástí
      description: Identifikuje hlavní herní aktivity/komponenty zabudované do houpačky/herní
        sestavy, aby nakupující mohli filtrovat podle toho, co děti na konstrukci
        mohou dělat.
    playset_installation_type:
      name: Způsob instalace herní sady
      description: Určuje, jak je houpačka / herní set nainstalován nebo zajištěn.
    playset_items_included:
      name: Součásti herní sady
      description: Určuje typy hracích položek, které jsou součástí piknikové sady
        (jídlo, nádobí, deka, košík atd.).
    pliers_jaw_style:
      name: Kleště s čelistním tvarem
      description: Popisuje primární konfiguraci čelistí nebo funkční styl kleští.
    plum_variety:
      name: Odrůda švestky
      description: Identifikuje konkrétní kultivar nebo odrůdu švestky, což umožňuje
        nakupujícím vybrat si na základě chuti, barvy a zamýšleného kulinářského využití.
    plumcot_variety:
      name: Odrůda švestkomeruňky
      description: Identifikuje konkrétní kultivar nebo komerční odrůdu plumcot (švestkomeruňky)
        (např. Flavor King, Dapple Dandy), která může ovlivnit chuť, barvu a sezónnost.
    plunger_mute_handle_type:
      name: Typ rukojeti plunger mute
      description: Určuje styl rukojeti nebo úchopu používaný k držení a manipulaci
        ztlumení pístu pro kvákavý efekt.
    pocket_closure_type:
      name: Typ zapínání kapsy
      description: Definuje, jak je každá kapsa zajištěna, a pomáhá uživatelům najít
        kalhoty s bezpečným úložným prostorem během aktivity.
    pocket_knife_opening_mechanism:
      name: Mechanismus otevírání kapesního nože
      description: Jak se čepel nasazuje/otevírá (zářez pro manuální otevření, palec,
        ploutev, asistované, automatické atd.).
    pocket_style:
      name: Kapesní styl
      description: Určuje konstrukci hlavní kapsy na kalhotách.
    pocket_type:
      name: Kapesní typ
      description: Určuje styl nebo přítomnost kapes na oděvu.
    pod_retention_system:
      name: Systém pro udržení kapslí
      description: Popisuje, jak se paintballové kapsle drží na místě a uvolňují z postroje
        nebo balení.
    pogo_stick_footrest_type:
      name: Typ podnožky Pogo stick
      description: Popisuje konstrukci plošiny/kolíku používaných pro stání na skákací
        tyči pogo.
    pogo_stick_suspension_type:
      name: Typ zavěšení skákací tyče pogo
      description: Určuje odskokový mechanismus skákací tyče pogo, má vliv na pocit,
        odolnost a údržbu.
    poi_handle_type:
      name: Typ rukojeti poi
      description: Určuje styl rukojeti/uchopení/připevnění použitého k držení poi.
    poi_light_source:
      name: Zdroj světla poi
      description: U osvětlených poi specifikuje technologii osvětlení.
    poi_tether_type:
      name: Typ úvazu Poi
      description: Označuje typ popruhu, který spojuje hlavu poi s rukojetí, knoflíkem
        nebo smyčkou na zápěstí (např. šňůra, lano, řetěz).
    poi_type:
      name: Typ poi
      description: Určuje primární typ konstrukce/použití poi (např. cvičné, LED,
        oheň).
    point_type:
      name: Typ hrotu
      description: Tvar/styl hrotu použitého na vyšívací jehle.
    pointe_shoe_shank_length:
      name: Délka výztuhy baletní špičky
      description: Část délky boty, kterou podporuje klenek, například plná nebo tříčtvrteční
        délka.
    pointe_shoe_shank_strength:
      name: Pevnost dříku špičky
      description: Stupeň tuhosti dříku špičky, který ovlivňuje podporu a dobu záběhu.
    poker_accessory_storage_included:
      name: Úložný prostor pro pokerové příslušenství je součástí balení
      description: Označuje, pro kterou další pokerovou položku příslušenství poskytuje
        vyhrazený úložný prostor.
    poker_chip_tray_rack_configuration:
      name: Konfigurace zásobníku na pokerové čipy/regálu
      description: Popisuje styl vnitřní organizace zásobníku na čipy/regálu (řádky
        a kapacita řádku).
    pole_anchoring_method:
      name: Metoda kotvení sloupů
      description: Definuje, jak je tyč upevněna k zemi nebo hrací ploše.
    pole_basket_type:
      name: Typ s košíkem na tyči
      description: Klasifikuje styl nebo velikost košíku upevněného v blízkosti špičky
        lyžařské hole, což naznačuje zamýšlené sněhové podmínky.
    pole_connection_system:
      name: Systém propojení pólů
      description: Identifikuje mechanismus, který spojuje části tyčí dohromady, například
        systémy s rázovou šňůrou, závitem nebo náboji, což pomáhá uživatelům posoudit
        rychlost nastavení a kompatibilitu.
    pole_system_type:
      name: Typ tyčového systému
      description: Popisuje konstrukční systém podpory nebo styl postavení stanu (např.
        hliníkové tyče, nafukovací trubice, místo pro trekingové hole).
    police_equipment_fitment:
      name: Příslušenství k vybavení policie
      description: Určuje, pro jaké vybavení pro vymáhání práva je vozidlo nakonfigurováno
        nebo předem zapojeno.
    police_vehicle_equipment_package:
      name: Balíček vybavení policejního vozidla
      description: Označuje policejní výbavu/vybavení, které je součástí prodávaného
        vozidla.
    police_vehicle_light_siren_equipment:
      name: Světelná/sirénová výbava policejních vozidel
      description: Určuje, která nouzová výstražná zařízení jsou nainstalována v policejním
        voze.
    police_vehicle_upfit_level:
      name: Úroveň vybavení policejního vozidla
      description: Popisuje, jaké policejní vybavení/vybavení je na vozidle instalováno.
    polish_formulation:
      name: Složení leštidla
      description: Označuje složení/chemické složení leštidla na hmatníky (nikoli
        způsob aplikace).
    polish_purpose:
      name: Účel laku
      description: Primární zamýšlený výsledek laku na povrchu nástroje.
    pollen_level:
      name: Hladina pylu
      description: Udává množství/pravděpodobnost zabarvení pylem u dané odrůdy lilie.
    polymer_clay_firmness_level:
      name: Stupeň pevnosti polymerové hmoty
      description: Relativní pevnost/měkkost polymerové hlíny před vypálením (zpracovatelnost).
    polymer_clay_translucency:
      name: Průsvitnost polymerové hlíny
      description: Vizuální neprůhlednost/průhlednost polymerové hlíny po vytvrzení.
    pom_pom_handle_style:
      name: Rukojeť s bambulkami
      description: Popisuje styl nebo konstrukci rukojeti/uchopení používaného k držení
        bambule.
    pom_pom_trim_backing_tape_material:
      name: Podkladový/páskový materiál třásňové ozdoby
      description: Identifikuje materiál šité pásky nebo lemovky, ke kterému jsou
        pompomy připevněny (obruba).
    pom_pom_type:
      name: Typ pompomu
      description: Označuje přítomnost a konkrétní typ bambule na klobouku.
    pomegranate_product_form:
      name: Forma produktu z granátového jablka
      description: Popisuje nabízenou fyzickou formu (celé ovoce, oloupané semenné
        míšky, jádra, mražené semenné míšky).
    pomegranate_variety:
      name: Odrůda granátového jablka
      description: Identifikuje konkrétní kultivar nebo odrůdu granátového jablka
        (např. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Styl gumičky na culík
      description: Popisuje konkrétní konstrukci nebo tvarový faktor držáku na culík,
        aby si nakupující mohli vybrat svůj preferovaný styl.
    popcorn_form:
      name: Popcorn forma
      description: Označuje fyzickou formu nebo formu přípravy výrobku z popcornu,
        jako je hotový výrobek, jádra, balení do mikrovlnky, sada na koření nebo dárková
        plechovka.
    pork_rind_form:
      name: Forma vepřové kůže
      description: Kategorizuje fyzickou formu nebo styl pochutin z vepřové kůže (např.
        kůže, škvarky, pusinky, pelety atd.).
    portability_features:
      name: Funkce pro snadné přenášení
      description: Uvádí vestavěné prvky, které usnadňují přemisťování, přenášení
        nebo obsluhu lehátka.
    portability_frame_type:
      name: Přenositelnost/typ rámu
      description: Zda jsou orchestrální zvonkohry přenosné/terénní nebo pevné/koncertní.
    portable_electronic_game_features:
      name: Funkce přenosných elektronických her
      description: Klíčové herní/hardware funkce podporované zařízením.
    post_surgery_stage_suitability:
      name: Vhodnost pro pooperační období
      description: Označuje, pro jakou fázi rekonvalescence (pokud nějakou existuje)
        je body určeno, důležité pro nakupující zdravotnické stahovací prádlo.
    postage_stamp_format:
      name: Formát poštovní známky
      description: Jak je konečná známka nabízena/balena (jednotlivá, spárovaná, pásková,
        bloková, aršíková, v brožuře, v cívce atd.).
    postmark_type:
      name: Typ poštovní známky
      description: Typ razítka/zrušení poštovní známky přítomné na použitých definitivních
        známkách.
    potato_cut_style:
      name: Styl řezu brambor
      description: Označuje fyzický řez nebo způsob úpravy brambor, pokud se neprodávají
        vcelku.
    potato_intended_use:
      name: Zamýšlené použití brambor
      description: Rozlišuje brambory určené k okamžité spotřebě od brambor určených
        jako sadbové brambory nebo zmrazené zpracované produkty.
    potato_variety:
      name: Odrůda brambor
      description: Specifikuje kultivar/odrůdu brambor, což umožňující nakupujícím
        najít konkrétní druhy jako „Yukon Gold“, „Maris Piper“ nebo „Purple Majesty“.
    pottery_clay_firing_required:
      name: Vypálení hrnčířské hlíny povinné
      description: Zda materiál vyžaduje vypalování v peci k dosažení požadované konečné
        tvrdosti/úpravy.
    pottery_slip_application_method:
      name: Metoda aplikace keramických sklíček
      description: Určuje zamýšlenou techniku použití pro licí břečku.
    pottery_slip_compatible_clay_body:
      name: Hliněné těleso kompatibilní s keramikou
      description: Označuje typ jílové základu, se kterým má licí břečka ladit nebo
        fungovat.
    pottery_slip_form:
      name: Hrnčířská forma
      description: Označuje, zda se licí břečka prodává jako tekutina připravená k použití,
        nebo jako suchá směs / prášek vyžadující smíchání.
    pouch_design:
      name: Design pouzdra
      description: Popisuje konstrukci nebo vylepšené vlastnosti přední části pouzdra.
    pouch_style:
      name: Styl pouzdra
      description: Určuje design přední části kapsy s ohledem na pohodlí, podporu
        a estetiku.
    powdered_beverage_variety:
      name: Druh instantního nápoje
      description: Klasifikuje produkt podle typu nápoje, který připravuje (např.
        limonáda, sportovní nápoj, proteinový koktejl).
    power_rack_style:
      name: Styl silového stojanu
      description: Specifikuje celkovou konstrukci/konfiguraci regálu, což pomáhá
        nakupujícím rozlišovat mezi plnými klecemi, polovičními regály a prostorově
        úspornými variantami.
    power_steering_fluid_formulation:
      name: Složení kapaliny posilovače řízení
      description: Obecná skupina složení kapaliny (na bázi ATF vs. specializovaná
        hydraulická/CHF vs. univerzální), používaná pro podrobné filtrování kompatibility.
    practice_mute_audio_output:
      name: Výstup zvuku cvičného dusítka
      description: Určuje typ audio výstupu dostupného na cvičném dusitelném zesilovači
        pro monitorování a/nebo nahrávání (běžné u tichých/elektronických dusitelných
        zesilovačů pro cvičení).
    practice_mute_intonation_impact:
      name: Vliv cvičného tlumiče na intonaci
      description: Popisuje očekávaný efekt ladění/intonace při použití cvičného dusítka.
    practice_mute_venting_valve_type:
      name: Typ odvětrávání/ventilu cvičného tlumiče
      description: Určuje, zda a jak je cvičný tlumič odvětráván, nebo zda obsahuje
        nastavitelný ventil pro změnu odporu/hlasitosti.
    practice_pad_features:
      name: Vlastnosti cvičné podložky
      description: Zdůrazňuje funkční vlastnosti cvičební podložky nad rámec velikosti/materiálu.
    practice_pad_mounting_style:
      name: Způsob upevnění cvičebních podložek
      description: Označuje, jak má být cvičební podložka umístěna nebo připevněna
        během používání.
    practice_pad_rebound_level:
      name: Úroveň odskoku cvičné podložky
      description: Udává relativní odezvu/reakci cvičného padu v porovnání s typickými
        blánami.
    practice_pad_surface_configuration:
      name: Konfigurace povrchu cvičné podložky
      description: Popisuje, zda má pad jednu nebo více hracích ploch a zda se liší
        v pocitu odezvy.
    pregnancy_stage_suitability:
      name: Vhodnost pro stádium těhotenství
      description: Označuje, pro které těhotenství nebo poporodní období je oděv určen.
    preparation_state:
      name: Stav přípravy
      description: Označuje stupeň přípravy nebo vaření potřebný před konzumací.
    preparation_style:
      name: Způsob přípravy
      description: Definuje stav řezu nebo zpracování kotvice plovoucí při prodeji
        (např. celá, plátky, pečená, mražená).
    preservation_medium:
      name: Konzervační médium
      description: Určuje primární tekutinu nebo médium, ve kterém jsou olivy nebo
        kapary konzervovány (např. slaný nálev, olivový olej, ocet).
    presser_foot_attachment_method:
      name: Způsob upevnění přítlačné patky
      description: Označuje, jak se přítlačná patka šicího stroje připevňuje k držáku/dříku
        přítlačné patky (např. zacvakávací vs. šroubovací), což ovlivňuje kompatibilitu.
    pressure_gauge_type:
      name: Typ tlakoměru
      description: Označuje typ tlakoměru dodávaného s pumpičkou na kolo, pokud je
        součástí dodávky.
    pressure_measurement_unit:
      name: Jednotka pro měření tlaku
      description: Označuje jednotku použitou pro odečet nebo kalibraci tlakového
        snímače, což se hodí pro porovnání produktů a zajištění kompatibility měřidel /
        řídicí jednotky.
    pressure_plate_balance_type:
      name: Typ vyvážení přítlačné desky
      description: Označuje, zda je přítlačná deska interně vyvážená, nebo vyžaduje/předpokládá
        externí vyvážení odpovídající nastavení motoru/setrvačníku.
    pressure_plate_components_included:
      name: Součásti přítlačné desky jsou součástí dodávky
      description: Co je součástí nabídky přítlačné desky.
    pressure_sensor_application:
      name: Aplikace tlakového senzoru
      description: Identifikuje systém vozidla/měřicí bod, pro který je tlakový senzor
        navržen.
    pressure_sensor_port_thread_standard:
      name: Port/standardní závit senzoru tlaku
      description: Určuje mechanický port / standard závitu použitý k instalaci snímače
        do systému vozidla.
    pressurization_method:
      name: Metoda tlakování
      description: Určuje, jak se uvnitř zařízení generuje nebo udržuje tlak.
    pretend_housekeeping_set_items_included:
      name: Položky sady napodobenin uklízecích potřeb, které jsou součástí
      description: Uvádí, jaké příslušenství pro úklid je součástí sady (např. mop,
        koště, lopatka, rozprašovač).
    pretend_play_electronic_features:
      name: Elektronické prvky hraní na předstírané hry
      description: Elektronické/interaktivní prvky zahrnuté v produktu pro hraní na
        fantasy.
    pretend_play_set_pieces_included:
      name: Součástí sady pro hraní na role jsou dílky
      description: Klíčové rekvizity/součásti obsažené v sadě pro hraní (např. pokladna,
        hračkové jídlo, nářadí).
    pretend_play_set_theme:
      name: Motiv sady pro napodobovací hry
      description: Primární scénář/motiv hry na předstírané téma reprezentovaný produktem
        (užitečné pro průřezové objevování napříč všemi dětmi hrajícími na předstírané
        téma).
    pretzel_coating:
      name: Poleva preclíků
      description: Označuje jakékoli vnější koření nebo povlak aplikovaný na preclík,
        a to jak slané (slané, kořeněné), tak sladké (čokoládové, jogurtové, karamelové)
        varianty.
    pretzel_shape:
      name: Tvar preclíku
      description: Určuje fyzický tvar preclíku (např. kroucený, tyčinkový, kousací),
        což je klíčový rozlišovací znak, který zákazníci používají při vyhledávání
        nebo filtrování.
    primary_component_material:
      name: Materiál primární součásti
      description: Primární materiál bloku motoru.
    primary_dish_application:
      name: Aplikace primárního jídla
      description: Označuje hlavní pokrm nebo způsob přípravu, pro které je těsto
        určeno.
    primary_plant_base:
      name: Primární rostlinná základna
      description: Označuje hlavní nemléčnou složku (složky) použitou k vytvoření
        alternativy sýra.
    primary_plant_protein_source:
      name: Primární zdroj rostlinných bílkovin
      description: Identifikuje hlavní rostlinnou složku, která zajišťuje bílkoviny
        v produktu.
    primary_sweetener_source:
      name: Primární zdroj sladidla
      description: Identifikuje rostlinu nebo surovinu, ze které se sirup získává.
    print_placement:
      name: Umístění potisku
      description: Označuje, kde je na tričku umístěn hlavní grafický prvek/logo.
    print_technique:
      name: Technika tisku
      description: Určuje způsob zdobení/tisku použitý na grafice trička.
    printable_canvas_intended_use:
      name: Zamýšlené použití plátna k potisku
      description: Primární použití, pro které je plátno k potisku optimalizováno
    printable_fabric_format:
      name: Tisknutelný formát látky
      description: Určuje, jak se potisknutelná bavlna dodává (jednotlivé listy vs.
        souvislá role), což ovlivňuje podávání papíru do tiskárny a postup práce na
        projektu.
    prism_material:
      name: Materiál hranolu
      description: Určuje materiál samotného optického prvku (hranolu), který ovlivňuje
        čistotu obrazu, trvanlivost a odolnost proti poškrábání.
    prisoner_transport_configuration:
      name: Konfigurace pro přepravu vězňů
      description: Určuje, zda a jak je dodávka konfigurována pro přepravu zadržených/vězňů.
    prisoner_transport_partition_type:
      name: Typ přepážky pro přepravu vězňů
      description: Typ vnitřní přepážky/klece oddělující přední a zadní prostor
    privacy_or_acoustic_feature:
      name: Soukromí nebo akustický prvek
      description: Určuje vestavěné prvky pro zajištění soukromí nebo akustické prvky,
        jako jsou dělicí panely, akustické zástěny nebo úplné kryty.
    processing_state:
      name: Stav zpracování
      description: Zda je peří sterilizované/prané nebo jinak připravené pro kreativní
        použití.
    produce_grade:
      name: Produktová třída
      description: Klasifikuje stupeň kvality přiřazený kiwi na základě velikosti,
        vzhledu a stavu.
    produce_growth_stage:
      name: Fáze růstu plodiny
      description: Určuje fázi růstu, ve které se produkt prodává (např. mikrozelenina,
        mladý list, zralý list, živá rostlina, semeno).
    produce_washing_state:
      name: Stav mytí produktů
      description: Označuje, zda byla zelenina umytá a připravená k jídlu.
    profile_shape:
      name: Profil/tvar
      description: Celkové zakřivení/profil činelu (jak strmě stoupá od okraje k rozteči).
    projectile_ammunition_type:
      name: Typ projektilu/munice
      description: Určuje typ projektilů nebo spotřebních materiálů používaných zbraní
        na hraní, pokud je to relevantní.
    projectile_finish:
      name: Dokončení projektilu
      description: Specifikuje jakýkoli povrchový nátěr aplikovaný na BB, který napomáhá
        odolnosti proti korozi nebo viditelnosti (např. poměděný, pozinkovaný, lakovaný).
    projectile_type:
      name: Typ projektilu
      description: Identifikuje druh projektilu, který produkt používá nebo pro který
        je určen.
    pronation_support:
      name: Pronační podpora
      description: Označuje typ chůze nebo pronačního vzoru, pro který je bota navržena.
    propellant_type:
      name: Typ pohonné látky
      description: Určuje pohonnou látku, pro kterou je součást nebo příslušenství
        určeno.
    propeller_blade_cup:
      name: Miska vrtulového listu
      description: Udává míru zvlnění zadní hrany na lopatkách.
    propeller_hub_type:
      name: Typ náboje vrtule
      description: Určuje systém náboje/pouzdra používaný vrtulí (vyměnitelný náboj
        nyní vs. zalisovaný).
    propeller_rotation:
      name: Rotace vrtule
      description: Určuje směr otáčení vrtule.
    protectant_formula_base:
      name: Báze složení ochranného prostředku
      description: Určuje složení báze ochranného prostředku, které ovlivňuje lesk,
        pocit na dotek a čistotu (např. na vodní bázi vs. na bázi rozpouštědla).
    protection_coverage_area:
      name: Oblast pokrytí ochrany
      description: Identifikuje, které části hodinek ochranné příslušenství zakrývá.
    protection_level:
      name: Úroveň ochrany
      description: Označuje zamýšlenou úroveň ochrany pouzdra pro přepravu a skladování
        nástroje.
    protective_case_interior_protection_type:
      name: Typ ochrany vnitřní strany ochranného pouzdra
      description: Popisuje hlavní metodu ochrany vnitřní strany používanou k zajištění
        a polstrování obsahu.
    protective_case_shell_type:
      name: Typ skořepiny ochranného pouzdra
      description: Identifikuje celkový konstrukční styl vnějšího pouzdra (tuhost),
        který ovlivňuje ochranu proti rozdrcení a přenosnost.
    protective_contact_padding_material:
      name: Materiál ochranné kontaktní vycpávky
      description: Materiál použitý na kontaktních bodech nástroje (třmen/vložka zvonu)
        zabraňující poškrábání (např. plsť, guma).
    protective_cup_configuration:
      name: Konfigurace suspenzoru
      description: Určuje, zda je ochranný kalíšek součástí balení, zda je odnímatelný,
        nebo zda má oděv pouze kapsu pro kalíšek.
    protective_eyewear_standard_compliance:
      name: Shoda s normami pro ochranné brýle
      description: Určuje bezpečnostní normy nebo normy nárazové odolnosti či certifikace,
        které brýle splňují nebo překračují pro sportovní použití.
    protective_gear_certification_standard:
      name: Norma pro certifikaci ochranných pomůcek
      description: 'Označuje bezpečnostní/certifikační normu, kterou výstroj splňuje
        (liší se podle typu položky: normy pro helmy, normy pro obleky, normy pro
        nárazovou ochranu).'
    protective_gear_items_included:
      name: Položky ochranných pomůcek, které jsou součástí
      description: Uvádí jednotlivé kusy obsažené ve vícedílné sadě ochranných pomůcek.
    protective_gear_padding_type:
      name: Typ polstrování ochranné výstroje
      description: Určuje typ polstrování používaného v ochranných pomůckách pro nárazovou
        ochranu.
    protective_gear_safety_certifications:
      name: Certifikace bezpečnosti ochranných pomůcek
      description: Uvádí uznávané sportovní bezpečnostní nebo výkonnostní normy, které
        produkt splňuje, jako například normy NOCSAE nebo ASTM pro přilby v pozemním
        hokeji.
    protective_pad_components_included:
      name: Součástí balení jsou ochranné podložky
      description: Určuje, které konkrétní ochranné položky jsou součástí vícedílné
        sady, abyste si mohli být jisti, které části těla jsou zakryty.
    protective_shorts_intended_use:
      name: Zamýšlené použití ochranných šortek
      description: Primární jezdecká/závodní disciplína, pro kterou jsou ochranné
        kraťasy určeny.
    protective_shorts_padding_type:
      name: Typ vycpávek ochranných šortek
      description: Určuje konstrukci/formát ochranných prvků použitých v kraťasech.
    protective_shorts_padding_zones:
      name: Zóny vycpávek ochranných šortek
      description: Určuje, které části těla mají v ochranných šortkách vestavěné vycpávky/výztuže.
    protective_treatment:
      name: Ochranné ošetření
      description: Určuje jakoukoli ochrannou povrchovou úpravu nebo vrstvu použitou
        pro odolnost vůči skvrnám, vodě nebo UV záření (např. Teflon).
    protector_coverage_area:
      name: Oblast krytí chrániče
      description: Určuje, kterou oblast trupu má chránič zakrývat (např. hrudník,
        záda, boky).
    puck_bottom_style:
      name: Styl dna puku
      description: Popisuje spodní profil puku, který ovlivňuje rychlost a kontrolu
        na různých površích shuffleboardu.
    puck_type:
      name: Typ puku
      description: Klasifikuje funkční styl nebo zamýšlené použití hokejového puku,
        od oficiální hry až po sběratelské suvenýry.
    pull_buoy_style:
      name: Styl tažné bóje
      description: Označuje funkční styl nebo konfiguraci pull-kick bóje, například
        standardní, kotníková nebo pull-kick kombinovaná.
    pull_through_weight_material:
      name: Materiál protahovacího závaží
      description: U protahovacích tamponů identifikuje materiál závaží použitého
        k vedení tamponu skrz nástroj.
    pulp_content:
      name: Obsah dužiny
      description: Udává množství ovocné nebo zeleninové dřeně přítomné v nápoji.
    pump_accessories_included:
      name: Přiložené příslušenství pumpy
      description: Uvádí doplňkové položky dodávané s kuličkovou pumpou, aby nakupující
        rozuměli obsahu balíčku.
    pumping_compatibility:
      name: Kompatibilita s čerpadly
      description: Označuje, zda je kojící podprsenka určena pro odsávání a krmení
        bez použití rukou.
    punch_pad_type:
      name: Typ boxovacího polštáře
      description: Určuje design nebo styl boxovacího/tréninkového polštáře, aby si
        nakupující mohli vybrat správný polštář pro své tréninkové potřeby.
    punching_training_bag_shape:
      name: Tvar boxovacího/tréninkového pytle
      description: Určuje geometrický styl pytle, což pomáhá nakupujícím vybrat si
        modely vhodné pro nácvik konkrétních úderů (např. háky, údery do těla).
    puncture_protection_technology:
      name: Technologie ochrany proti propíchnutí
      description: Uvádí veškeré chráněné nebo generické vrstvy proti propíchnutí
        nebo technologie výztuže bočnic/pláště zabudované do pneumatiky (např. EXO,
        SnakeSkin, Kevlar pás).
    puppet_features:
      name: Vlastnosti loutky
      description: Zdůrazňuje funkční nebo výkonnostní vlastnosti loutky (např. pohyblivá
        ústa, zvukové efekty, oboustrannost).
    puppet_puppet_theater_accessory_type:
      name: Typ příslušenství loutek a loutkového divadla
      description: Určuje, o jaký druh příslušenství se jedná (např. rekvizita, kostým
        loutky, ovládací tyč, náhradní provázek).
    purity_unit:
      name: Jednotka čistoty
      description: Jak se u mince vyjadřuje ryzost (ryzost vs. karát).
    push_up_bar_design:
      name: Design přitahovací hrazdy
      description: Označuje funkční styl designu klikových hrazd (např. pevné, otočné,
        paralelní).
    pushrod_end_type:
      name: Typ zakončení rozvodové tyče
      description: Určuje styl zakončení/upevnění rozvodové tyče použité na rozhraní
        pedálu nebo hlavního válce.
    putty_glow_activation_method:
      name: Metoda aktivace záře tmelu
      description: Jak se tmel nabíjí/aktivuje, aby zářil (např. slunečním zářením,
        UV/černým světlem).
    putty_glow_color:
      name: Tmel zářivá barva
      description: Identifikuje barvu, kterou tmel vydává, když svítí ve tmě.
    putty_inclusions:
      name: Příměsi tmelu
      description: Mezi pozoruhodné patří přísady uvnitř tmelu (např. třpytky, konfety,
        pěnové korálky).
    putty_texture:
      name: Textura tmelu
      description: Primární manipulační chování tmelu (např. pružnost, pružnost, tekutost).
    puzzle_accessory_features:
      name: Funkce příslušenství k puzzle
      description: Funkční vlastnosti a designové prvky příslušenství k skládačkám
        (liší se podle typu příslušenství).
    pyrometric_cone_range:
      name: Rozsah pyrometrického kužele
      description: Doporučený pyrometrický kužel (kužely), pro který (které) je glazura
        určena k vypalování (např. kužel 06–04, kužel 5–6).
    quarter_panel_coverage_type:
      name: Typ pokrytí čtvrtpanelu
      description: Určuje, jakou část plochy bočního panelu karoserie produkt nahrazuje/opravuje.
    quarter_panel_set_contents:
      name: Obsah sady čtvrtpanelu
      description: Určuje konfiguraci balíčku čtvrtpanelu zahrnutou v nabídce (jednostranná,
        pár nebo s dalšími opravnými oddíly).
    quilting_ruler_markings:
      name: Značení na prošívacím pravítku
      description: Určuje typy tištěných značek na prošívacím pravítku používaném
        pro stříhání/zarovnání.
    quilting_ruler_non_slip_feature:
      name: Protiskluzová funkce prošívacího pravítka
      description: Označuje, zda má pravítko protiskluzovou podložku/povrchovou úpravu
        pro snížení jeho posouvání na látce.
    quilting_ruler_transparency:
      name: Průhlednost prošívacího pravítka
      description: Označuje průhlednost/viditelnost materiálu pravítka pro viditelnost
        látky a značek pod ním.
    quilting_thread_usage:
      name: Použití prošívací nitě
      description: Označuje zamýšlené použití prošívání pro danou nit (jak se má používat).
    quilting_thread_weight_system:
      name: Systém váhového číslování prošívacích nití
      description: Určuje systém hodnocení velikosti/tloušťky nitě používaný k vyjádření
        tloušťky nitě (např. wt, Tex, Denier), aby bylo možné správně interpretovat
        číselnou velikost.
    quince_variety:
      name: Odrůda kdoule
      description: Identifikuje konkrétní kultivar nebo odrůdu kdoule, protože chuť,
        vůně a kulinářská vhodnost se mohou u jednotlivých odrůd lišit.
    quinoa_variety:
      name: Odrůda quinoy
      description: Identifikuje konkrétní barvu nebo odrůdu quinoy, protože různé
        odrůdy mají odlišné chutě, textury a doby vaření.
    quinto_tuning_system:
      name: Systém ladění Quinto
      description: Jak se quinto ladí/napíná
    race_car_class:
      name: Třída závodních vozů
      description: Soutěžní třída/kategorie, pro kterou je vůz vyroben (soubor pravidel/homologační
        skupina).
    racing_balaclava_face_opening_style:
      name: Styl otevírání obličejové části závodní kukly
      description: Provedení otvoru pro obličej u kukly, které má vliv na to, jak
        helma padne, těsní a jak je pohodlná.
    racing_balaclava_neck_coverage_length:
      name: Délka krytí krku závodní kukly
      description: Délka krytí nákrčníku/zástěrky určená k zastrčení do obleku/poutání
        krku pro utěsnění a ochranu.
    racing_balaclava_ventilation_zones:
      name: Ventilační zóny závodní kukly
      description: Vyhrazené prodyšné/síťované nebo odvětrávané zóny umístění pro
        zlepšení proudění vzduchu pod helmou.
    racing_chest_guard_intended_use:
      name: Zamýšlené použití chrániče hrudníku pro závodní účely
      description: Primární disciplína motoristického sportu nebo kontext, pro který
        je chránič hrudníku určen.
    racing_chest_guard_size_type:
      name: Typ velikosti závodního chrániče hrudníku
      description: Označuje, zda je velikost produktu určena pro mládež, dospělé nebo
        je univerzální/nastavitelná.
    racing_glove_certification_standard:
      name: Certifikační standard závodních rukavic
      description: Uvádí bezpečnostní certifikaci/normu, kterou závodní rukavice splňují
        (např. FIA, SFI, CE), a volitelně i hodnocení/úroveň, pokud je to relevantní.
    racing_goggles_lens_system:
      name: Systém čoček závodních brýlí
      description: Určuje systém výměny čoček / připravenosti k odtržení, který brýle
        podporují.
    racing_helmet_certification_standard:
      name: Certifikační standard závodní přilby
      description: Bezpečnostní certifikace, které závodní helma splňuje
    racing_kart_brake_type:
      name: Typ brzdy pro závodní motokáry
      description: Typ primárního brzdového systému namontovaného na motokáře.
    racing_kart_class:
      name: Třída závodních motokár
      description: Soutěžní třída nebo soubor pravidel, kterým je motokára postavena.
    racing_kart_frame_material:
      name: Materiál rámu závodní motokáry
      description: Primární materiál rámu/podvozku motokáry.
    racing_kart_seat_size:
      name: Velikost sedadla závodní motokáry
      description: Označení velikosti sedla motokáry používané pro montáž.
    racing_neck_support_style:
      name: Styl závodní krční opory
      description: Konstrukční styl závodní krční opory/ortézy a její propojení s
        trupem/helmou jezdce.
    racing_suit_certification_standard:
      name: Certifikační standard závodního obleku
      description: Určuje certifikaci/homologaci závodní bezpečnosti, kterou oblek
        splňuje (např. normy FIA nebo SFI).
    racing_suit_cuff_design:
      name: Design manžety závodní kombinézy
      description: Typ manžety na kotník/zápěstí používané k propojení s rukavicemi/botami
        a ke zlepšení utěsnění/pohodlí.
    racing_suit_size_system:
      name: Velikostní systém závodního obleku
      description: Velikostní systém použitý pro oblek (např. Alpha S-XXL, Numeric
        EU/US, Youth).
    racing_truck_discipline:
      name: Disciplína závodních trucků
      description: Určuje primární závodní disciplínu/formát, pro který je vůz vyroben.
    rack_side_configuration:
      name: Konfigurace boku regálu
      description: Označuje, zda jsou rohože v regálu uloženy na jedné straně nebo
        obou stranách, což má vliv na efektivní využití prostoru a přístup.
    rack_system_configuration:
      name: Konfigurace systému regálu
      description: Popisuje celkové rozvržení/tvar systému regálu pro bubny.
    racket_dampener_type:
      name: Typ tlumiče rakety
      description: Určuje instalační mechanismus nebo funkční styl tlumiče vibrací
        rakety.
    racket_grip_size:
      name: Velikost úchopu rakety
      description: Určuje velikostní klasifikaci rakety podle obvodu rukojeti (např.
        G1–G6), aby bylo zajištěno správné padnutí do ruky a pohodlí.
    racket_sport_shoe_court_surface:
      name: Povrch kurtu pro boty pro raketové sporty
      description: Určuje povrch tenisového kurtu, pro který je bota navržena nebo
        optimalizována, a pomáhá hráčům vybrat si obuv se správným vzorem podrážky
        a gumovou směsí pro jejich typický hrací povrch.
    racket_string_pattern:
      name: Vzor výpletu rakety
      description: Určuje počet hlavních a příčných strun v loži strun (např. 16 x
        18), které ovlivňují ovládání, rotaci a odolnost.
    racket_stringing_status:
      name: Stav výpletu rakety
      description: Označuje, zda je raketa prodávaná vyplétaná, bez výpletu nebo předem
        vyplétaná.
    racket_weight_class:
      name: Kategorie hmotnosti rakety
      description: Nabízí standardní váhové kategorie badmintonu „U“, což hráčům umožňuje
        vybrat si rakety v rámci jejich preferovaného hmotnostního rozmezí.
    racquet_toy_set_equipment_included:
      name: Vybavení sady raketových hraček, které jsou součástí
      description: Uvádí, jaké položky jsou součástí hračky nebo sady (např. síť,
        míče, pálky/rakety).
    racquetball_squash_training_aid_type:
      name: Typ tréninkové pomůcky pro racquetball a squash
      description: Klasifikuje konkrétní druh tréninkové pomůcky nebo příslušenství,
        aby nakupující mohli rychle najít položku, kterou potřebují.
    radiator_cap_gasket_material:
      name: Materiál těsnění víčka chladiče
      description: Materiál těsnění použitého (použitých) na víčku chladiče.
    radiator_cap_pressure_relief_style:
      name: Víčko chladiče s odlehčením tlaku
      description: Určuje způsob odlehčení/odvzdušnění/ovládání víčka chladiče, což
        může ovlivnit manipulaci, bezpečnost a zamýšlené použití.
    radiator_expansion_tank_cap_application:
      name: Aplikace uzávěru chladiče/expanzní nádoby
      description: Určuje, zda je krytka určena pro plnicí hrdlo chladiče nebo pro
        expanzní/přepadovou nádržku chladicí kapaliny.
    radiator_fan_control_type:
      name: Typ ovládání ventilátoru chladiče
      description: Určuje způsob ovládání ventilátoru chladiče/spouštěč.
    radiator_fan_mounting_pattern:
      name: Schéma montáže ventilátoru chladiče
      description: Určuje způsob/vzor montáže použitý k připevnění ventilátoru nebo
        sestavy ventilátoru.
    radiator_fan_type:
      name: Typ ventilátoru chladiče
      description: Určuje funkční typ/konfiguraci sestavy ventilátoru chladiče.
    radiator_hose_end_type:
      name: Typ koncovky hadice chladiče
      description: Určuje primární typ připojení/těsnění použitý na konci (koncích)
        hadice (hadic) chladiče pro propojení s otvory chladiče/motoru.
    radiator_hose_position:
      name: Poloha hadice chladiče
      description: Funkční poloha/typ hadice chladiče v chladicím systému
    radiator_hose_shape:
      name: Tvar hadice chladiče
      description: Celková geometrie/provedení hadice použité pro směrování instalace
        a montáž
    radiator_overflow_tank_level_sensor_provision:
      name: Zajištění snímače hladiny v přepadové nádržce chladiče
      description: Označuje, zda nádrž obsahuje nebo podporuje snímač hladiny chladicí
        kapaliny.
    radiator_overflow_tank_shape:
      name: Tvar přepadové nádrže chladiče
      description: Celkový tvar těla přepadové nádrže.
    radish_variety:
      name: Odrůda ředkviček
      description: Určuje kultivar nebo druh ředkvičky, takže si nakupující mohou
        vybrat konkrétní chuť, barvu nebo velikost (např. Daikon, Watermelon, French
        Breakfast).
    radius_of_hollow:
      name: Poloměr dutiny
      description: Určuje profil dutiny čepele vytvořený ořezávátkem, vyjádřený jako
        běžná diskrétní velikost nebo plochý profil.
    rail_coverage_configuration:
      name: Provedení pokrytí kolejnice
      description: Označuje, kterou část (části) postýlky sada potahů chrání, a upřesňuje,
        zda se jedná o jeden přední panel nebo vícedílnou obvodovou sadu.
    rail_mount_standard:
      name: Standardní montáž na lištu
      description: Identifikuje lištu nebo normu montážního rozhraní používanou k
        připevnění příslušenství (např. mířidel, svítilny) k vzduchovce.
    rail_side:
      name: Strana kolejnice
      description: Označuje, zda je náhradní lišta určena pro levou stranu, pravou
        stranu nebo se prodává jako spárovaný pár.
    rail_style:
      name: Styl montážní lišty
      description: Kategorizuje celkový design nebo provedení kolejnice (např. A-rám,
        duha, natočená), což určuje možnosti provádění triků a požadovaný prostor.
    rail_system:
      name: Systém kolejnic
      description: Identifikuje rozhraní pro montáž příslušenství na zbrani (např.
        Picatinny, M-LOK).
    rain_sensor_technology:
      name: Technologie dešťového senzoru
      description: Princip snímání používaný k detekci vody na čelním skle
    rain_suit_configuration:
      name: Konfigurace pláštěnky
      description: Určuje, zda se jedná o jednodílný overal, vícedílnou sadu nebo
        jinou konfiguraci.
    rainstick_construction_type:
      name: Typ konstrukce dešťové hole
      description: Popisuje, jak je dešťová hůl zkonstruována (tradiční kaktusová/dřevěná
        trubka vs. moderní alternativy).
    rainstick_fill_material:
      name: Výplňový materiál Rainstick
      description: Určuje vnitřní výplň použitou k vytvoření kaskádového zvuku (např.
        semínka, korálky).
    rainstick_playing_technique:
      name: Technika hry na dešťovou hůlku
      description: Označuje doporučené techniky hry nebo styl manipulace k dosažení
        zamýšleného efektu na dešťové holi.
    rainstick_sound_character:
      name: Charakter zvuku dešťové hole
      description: Popisuje obecný charakter zvuku produkovaného dešťovou holí.
    raising_method:
      name: Způsob chovu
      description: Popisuje, jak byla zvířata chována a zušlechtěna před zpracováním
        (např. krmena trávou, chov na pastvinách, zušlechtěna na obilí).
    rally_competition_class:
      name: Třída rallyových soutěží
      description: Sankční orgán nebo třída pravidel, podle které je rallyový vůz
        vyroben (pokud je známa).
    rally_surface_setup:
      name: Nastavení povrchu rallye
      description: Primární povrch/terén, na který je cíleno nastavení nebo sestavení
        rally vozu
    ramp_surface_texture:
      name: Povrchová textura rampy
      description: Popisuje povrchovou úpravu nebo úroveň přilnavosti jízdního povrchu
        rampy.
    ratchet_mounting_style:
      name: Styl montáže ráčny
      description: Jak se hudební ráčna drží nebo upevňuje během hry nebo nastavení.
    rattle_element_material:
      name: Materiál chrastítka
      description: Materiál chrastících prvků (např. zuby/cinkající korálky), které
        vytvářejí charakteristické bzučení/chrastění.
    rattle_type:
      name: Typ chrastítka
      description: Označuje, zda návnada obsahuje vnitřní chrastítko nebo zvukovou
        komoru, a pokud ano, typ použitého chrastítka.
    rc_airship_lifting_gas_type:
      name: Typ plnu pro vzlet RC vzducholodě
      description: Označuje, jakým plynem má být obal vzducholodi/blimpu naplněn (pokud
        je to relevantní).
    rc_helicopter_control_frequency:
      name: Frekvence ovládání RC vrtulníku
      description: Rádiové frekvenční pásmo používané mezi ovladačem a vrtulníkem,
        které má vliv na odolnost proti rušení a kompatibilitu (např. 2,4 GHz)
    rc_helicopter_stabilization_features:
      name: Funkce stabilizace RC vrtulníku
      description: Uvádí funkce podpory stability/ovládání, které usnadňují let nebo
        rozšiřují možnosti.
    rc_motorcycle_controller_type:
      name: Typ ovladače RC motocyklu
      description: Tvarový faktor dodávaného ovladače.
    rc_plane_takeoff_launch_method:
      name: Způsob vzletu/startu RC letadla
      description: Jak se letadlo obvykle startuje/vzlétá, ovlivňující kde a jak lze
        jej použít.
    rc_vehicle_controller_type:
      name: Typ ovladače RC vozidla
      description: Určuje provedení ovladače použité k ovládání RC vozidla.
    rc_vehicle_scale:
      name: Měřítko RC vozidla
      description: Určuje poměr měřítka (třída velikosti) auta/kamionu na dálkové
        ovládání (např. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Typ terénu RC vozidla
      description: Označuje primární terén, pro který je automobil / nákladní vůz
        na dálkové ovládání určen.
    reach_adjustment_type:
      name: Typ nastavení dosahu
      description: Označuje, zda lze nastavit vzdálenost mezi lopatkou páky a řídítky,
        a pokud ji lze nastavit, zda ji lze seřídit bez použití nářadí, nebo zda je
        nářadí nutné.
    rear_axle_spacing:
      name: Rozteč zadních náprav
      description: Velikost patek/osy, pro kterou je navržena zadní část rámu, což
        má vliv na kompatibilitu kol
    rear_axle_standard:
      name: Standardní zadní náprava
      description: Definuje rozhraní/formát osy používaný zadním kolem (např. rychloupínák,
        různé velikosti pevných os).
    rear_axle_type:
      name: Typ zadní nápravy
      description: Určuje upevňovací systém a průměr osy použitý k upevnění zadního
        kola k rámu.
    rear_coverage:
      name: Zadní krytí
      description: Určuje, jak velkou část hýždí zakrývá spodní díl bikin (např. drzý,
        plný).
    rear_opening_type:
      name: Typ otevírání zezadu
      description: Popisuje styl přístupu zezadu nebo funkci "zadní klopy" pro pohodlné
        používání koupelny, jako je například sklápěcí sedátko nebo zip po celé délce
        zadní části.
    rear_seat_configuration:
      name: Konfigurace zadních sedadel
      description: Určuje provedení sestavy zadních sedadel pro podporu uchycení a výběr
        rozvržení interiéru.
    rear_view_mirror_ornament_attachment_type:
      name: Typ upevnění ozdoby na zpětné zrcátko
      description: Určuje, jak se ozdoba připevňuje k nosníku nebo pouzdru zpětného
        zrcátka (např. provázková smyčka, spona, háček).
    rearview_mirror_mount_attachment_type:
      name: Typ uchycení držáku zpětného zrcátka
      description: Definuje, jak se držák fyzicky připevňuje k sestavě zpětného zrcátka
        (těleso nebo dřík zrcátka), například pomocí svorky, spony, pásku, lepicí
        podložky nebo přišroubovaného držáku.
    rebound_board_face_type:
      name: Typ odrazové plochy desky
      description: Popisuje konfiguraci povrchu, která určuje chování při odrazu,
        například ploché, šikmé nebo víceplošné provedení.
    rebound_level:
      name: Úroveň odrazu
      description: Udává, o kolik se míč odrazí zpět od zdi po nárazu, což uživatelům
        pomáhá vybrat si mezi provedením s nulovým a středním odskokem.
    rebound_surface_configuration:
      name: Konfigurace odrazové plochy
      description: Určuje rozvržení odrazových ploch a předvídatelnost odrazů (jednostranné,
        dvoustranné nebo vícestranné; předvídatelné vs. nepředvídatelné).
    rebounder_design:
      name: Provedení rebounderu
      description: Definuje strukturální styl nebo provedení odrazové plochy produktu.
    rebounder_design_type:
      name: Typ konstrukce odrážedla
      description: Určuje primární mechanismus odrazu nebo konstrukční styl trenažéru
        (např. základna z elastické šňůry, síť v rámu, vyskakovací terč).
    rebounder_sides:
      name: Strany odrazu
      description: Označuje, zda odražeč může vracet míče z jedné nebo obou stran.
    rebounding_mechanism_type:
      name: Typ odrazového mechanismu
      description: Určuje technologii použitou k vrácení puku nebo míče (např. gumový
        nárazník, bungee šňůra).
    recipient_relationship:
      name: Vztah k příjemci
      description: Zamýšlený vztah příjemce (např. máma, táta, přítel) pro pozdravnou
        kartu.
    recliner_control_type:
      name: Typ ovládání polohovacího křesla
      description: Určuje, jak se ovládá mechanismus sklápění (např. ruční páka, elektrické
        tlačítkový panel, dálkové ovládání).
    recliner_motion_type:
      name: Typ pohybu polohovacího křesla
      description: Definuje primární pohybovou funkci polohovacího křesla (např. houpací,
        kluzné, otočné, posuvné, zvedání).
    reclining_mechanism:
      name: Sklápěcí mechanismus
      description: Určuje mechanismus používaný k ovládání sklápění pohovky.
    recommended_candle_format:
      name: Doporučený formát svíčky
      description: Označuje doporučený formát svíčky, pro který jsou tyto samolepicí
        karty s knotem určeny.
    recommended_container_type:
      name: Doporučený typ kontejneru
      description: Materiály kontejneru, které jsou doporučené/bezpečné pro gelové
        voskové svíčky.
    recommended_fabric_type:
      name: Doporučený typ tkaniny
      description: Doporučená látka (látky) pro dosažení nejlepších výsledků se šicím
        vzorem.
    recommended_fabric_weight:
      name: Doporučená gramáž látky
      description: Označuje doporučenou kategorii gramáže látky pro daný střih.
    recommended_food_pairing:
      name: Doporučené párování s jídlem
      description: Identifikuje primární bílkoviny nebo pokrmy, pro které je omáčka
        určena (např. kuře, vepřové maso, hovězí maso, ryby, zelenina).
    recommended_lane_condition:
      name: Doporučený stav jízdního pruhu
      description: Označuje mazací model nebo stav dráhy, pro kterou je koule určena.
    recommended_motor_impulse_class:
      name: Doporučená impulsní třída motoru
      description: Určuje doporučenou třídu celkového impulzu modelu raketového motoru
        pro bezpečný/optimální let.
    recommended_reading_level:
      name: Doporučená úroveň čtení
      description: Označuje doporučenou čtenářskou úroveň/zdatnost pro produkt, aby
        ji nakupující mohli přizpůsobit aktuálnímu vývoji čtenářských dovedností dítěte.
    recommended_sleep_position:
      name: Doporučená poloha při spaní
      description: Určuje, pro které polohy spánku je matrace navržena tak, aby pohodlně
        podporovala (např. spaní na boku nebo na zádech).
    recommended_storage:
      name: Doporučené skladování
      description: Označuje, jak by se měl produkt skladovat, aby si zachoval čerstvost.
    recommended_surfaces:
      name: Doporučené povrchy
      description: Udává zamýšlené lepené povrchy / kategorie materiálů pro lepidlo,
        nad rámec obecné kompatibility pro vyrábění (např. pouze papír vs. více povrchů).
    recommended_use_case:
      name: Doporučený případ použití
      description: Primární zamýšlený scénář použití tmelu (dočasná/nouzová oprava
        vs. dlouhodobá oprava).
    recommended_use_location:
      name: Doporučené místo použití
      description: Zamýšlené prostředí pro houpačku (domácí zahrada vs. komerční hřiště
        atd.).
    recommended_vehicle_surfaces:
      name: Doporučené povrchy vozidel
      description: Určuje povrchy / povrchové úpravy vozidel, pro které je štětec
        bezpečný (např. průhledný lak, matný/saténový lak, vinylová fólie / PPF, sklo,
        kola).
    recorder_accessories_included:
      name: Přiložené příslušenství zobcové flétny
      description: Uvádí příslušenství, které je součástí balení velké basové zobcové
        flétny.
    recorder_bore_design:
      name: Konstrukce vývrtu zobcové flétny
      description: Konstrukce profilu vnitřního vrtání zobcové flétny
    recorder_bore_type:
      name: Typ vývrtu zobcové flétny
      description: Určuje typ vrtání zobcové flétny.
    recorder_case_shell_type:
      name: Typ skořepiny pouzdra na zobcovou flétnu
      description: Popisuje strukturální tuhost pouzdra.
    recorder_finish:
      name: Povrchová úprava zobcové flétny
      description: Povrchová úprava / zpracování těla zobcové flétny (zejména důležité
        pro dřevěné altové zobcové flétny)
    recorder_hole_type:
      name: Typ otvoru zobcové flétny
      description: Zda jsou tónové otvory jednoduché (žádné dvojité otvory) nebo zda
        obsahují dvojité otvory pro vylepšené chromatické prstoklady
    recorder_joint_configuration:
      name: Konfigurace spojení zobcové flétny
      description: Popisuje, kolik dílů má zobcová flétna, což ovlivňuje přenosnost,
        čištění a výměnu dílů.
    recorder_joint_style:
      name: Styl kloubu zobcové flétny
      description: Styl spojení/propojení mezi sekcemi zobcové flétny, pokud je to
        relevantní.
    recorder_keywork:
      name: Klávesy zobcové flétny
      description: Označuje, zda zobcová flétna obsahuje klávesu(y) (kovový/plastový
        mechanismus) pro nízké tóny, typické pro tenorové/basové/velké zobcové flétny.
    recorder_mouthpiece_type:
      name: Typ náustku zobcové flétny
      description: Popisuje, zda je náustek/hlavice zobcové flétny integrovaná (jednodílná)
        nebo odnímatelná/vyměnitelná.
    recorder_pitch_standard_a4:
      name: Standard rozteče zobcové flétny (A4)
      description: Označuje referenční výšku tónu, pro kterou je zobcová flétna vyrobena
        (např. A=440 Hz moderní výška tónu vs. A=415 Hz barokní výška tónu).
    recorder_thumb_hole_type:
      name: Typ palcového otvoru zobcové flétny
      description: Určuje, zda má zobcová flétna konstrukci s jedním nebo dvěma otvory
        pro palec.
    recreational_vehicle_holding_tank_type:
      name: Typ sběrné nádrže pro rekreační vozidla
      description: Označuje, jaké nádrže na odpad má obytný vůz.
    recreational_vehicle_leveling_system:
      name: Vyrovnávací systém pro rekreační vozidla
      description: Typ instalovaného nivelačního/stabilizačního systému.
    recycled_material_content:
      name: Podíl recyklovaného materiálu
      description: Udává podíl oděvu vyrobeného z recyklovaných vláken nebo přízí.
    reed_dent_material:
      name: Materiál důlků/zubů osnovy
      description: Materiál důlků/zubů osnovy (prvků, které oddělují konce osnovy),
        který ovlivňuje trvanlivost a oděr příze.
    reed_type:
      name: Typ jazýčku
      description: Určuje typ konstrukce rákosu používaný melodickým přívěsem a bordunovými
        píšťalami dudy.
    reeds_included:
      name: Plátky jsou součástí balení
      description: Určuje, které plátky jsou součástí sady dud Great Highland (melodická
        píšťala a/nebo základní basový tón) a zda jsou třtinové nebo syntetické.
    reefing_method:
      name: Metoda refování
      description: Označuje mechanismus (pokud existuje) pro stažení nebo uložení
        plachty na vodě.
    reel_profile:
      name: Profil navijáku
      description: Klasifikuje konstrukční styl/profil těla navijáku pro baitcasting.
    reel_seat_material:
      name: Materiál držáku navijáku
      description: Určuje konstrukční materiál sedla navijáku, který ovlivňuje hmotnost,
        citlivost a odolnost proti korozi.
    reel_seat_type:
      name: Typ sedla navijáku
      description: Určuje styl zajišťovacího mechanismu, který zajišťuje muškařský
        naviják k prutu.
    reel_size_class:
      name: Velikostní třída navijáku
      description: Hodnocení velikosti určené výrobcem (např. 1000, 3000, 5000), které
        udává kapacitu cívky a celkovou konstrukci navijáku
    referee_wallet_accessories_included:
      name: Příslušenství k peněžence rozhodčího v ceně
      description: Uvádí extra položky v balíčku s peněženkou rozhodčího, jako jsou
        červené/žluté karty, výsledkové listiny nebo psací potřeby, takže nakupující
        bude vědět, zda se peněženka prodává jako kompletní sada.
    refinement_level:
      name: Úroveň rafinace
      description: Označuje stupeň rafinace oleje, který ovlivňuje chuť, barvu, nutriční
        hodnoty a bod kouření.
    reflective_finish:
      name: Reflexní povrchová úprava
      description: Určuje povrchovou úpravu disko koule (např. zrcadlové dlaždice
        vs. holografické/iridescentní efekty).
    reflective_or_glow_effect:
      name: Reflexní nebo zářivý efekt
      description: Označuje, zda má anténní koule viditelné efekty, jako je reflexní
        materiál, prvky svítící ve tmě nebo světelné/LED prvky.
    reflective_tape_pattern:
      name: Vzor reflexní pásky
      description: Popisuje konfiguraci reflexní pásky na oděvu používané ke splnění
        požadavků na viditelnost.
    regulation_standard:
      name: Regulační norma
      description: Určuje oficiální standard nebo rozměr/certifikaci řídícího orgánu,
        kterou síť splňuje.
    regulator_diaphragm_material:
      name: Materiál membrány regulátoru
      description: Určuje materiál membrány, který ovlivňuje kompatibilitu paliva/etanolu
        (např. E85) a trvanlivost.
    regulator_port_thread_standard:
      name: Standard závitu portu regulátoru
      description: Určuje normu závitu/propojení portů použitou na tělese regulátoru
        pro vstupní/výstupní/zpětné porty.
    rein_features:
      name: Vlastnosti otěží
      description: Zdůrazňuje speciální funkční nebo bezpečnostní prvky přítomné na
        otěžích.
    rein_style:
      name: Rein styl
      description: Identifikuje konstrukční provedení nebo konfiguraci otěží, což
        jezdcům umožňuje vybrat si správný typ pro jejich disciplínu a osobní preference.
    reinforced_areas:
      name: Zesílené oblasti
      description: Určuje, které části oděvu jsou zesíleny pro odolnost proti oděru.
    reinforcement_type:
      name: Typ výztuže
      description: Konstrukční výztuha použitá v hadici chladiče pro pevnost a odolnost
        vůči teplotě/tlaku.
    release_activation_method:
      name: Metoda aktivace uvolnění
      description: Určuje, jak lukostřelec spouští pomůcku pro uvolnění šípu.
    release_bearing_material:
      name: Materiál vypínacího ložiska
      description: Primární materiál ložiskových/čelních komponent (pokud ho výrobce
        uvádí)
    release_jaw_style:
      name: Styl uvolňovací čelisti
      description: Popisuje konstrukci čelistí nebo háku uvolňovací hlavy.
    release_strap_type:
      name: Typ uvolňovacího popruhu
      description: Označuje popruh nebo systém propojení dodávaný s pomůckou pro uvolnění
        šípu.
    remote_control_airship_envelope_material:
      name: Materiál pláště vzducholodi na dálkové ovládání
      description: Určuje primární materiál obalu vzducholodi/blimpu (plynového vaku),
        odlišný od celkového materiálu hračky.
    remote_control_motorcycle_scale:
      name: Měřítko motocyklu na dálkové ovládání
      description: Měřítko RC motocyklu vzhledem ke skutečnému motocyklu (pokud je
        modelován jako vozidlo v měřítku)
    remote_control_motorcycle_terrain_suitability:
      name: Vhodnost motocyklu na dálkové ovládání do terénu
      description: Primární terén, pro který je RC motocykl navržen
    remote_control_motorcycle_water_resistance:
      name: Voděodolnost motocyklu s dálkovým ovládáním
      description: Stupeň ochrany proti vodě pro elektroniku RC motocyklů
    remote_control_plane_kit_completion_level:
      name: Úroveň úplnosti sady letounu na dálkové ovládání
      description: Označuje, co je součástí dodávky a jak úplná je sada (např. připravena
        k letu vs. vyžaduje samostatný vysílač/přijímač/baterii).
    remote_control_plane_landing_gear_type:
      name: Typ podvozku letadla s dálkovým ovládáním
      description: Označuje konfiguraci podvozku, která ovlivňuje odolnost a vzletové/přistávací
        plochy.
    remote_control_plane_power_type:
      name: Typ napájení letadla na dálkové ovládání
      description: Určuje, jak je letadlo poháněno (elektrické vs. žhavicí/plynové/nitro),
        což ovlivňuje údržbu, hluk a kde s ním lze létat.
    remote_control_watercraft_features:
      name: Funkce plavidla na dálkové ovládání
      description: Zdůrazňuje klíčové vlastnosti specifické pro RC plavidla, které
        ovlivňují použitelnost a odolnost.
    remote_control_watercraft_propulsion_drive_type:
      name: Typ pohonu/pohonu plavidla na dálkové ovládání
      description: Určuje, jak se plavidlo na dálkové ovládání pohání ve vodě.
    remote_control_watercraft_water_environment:
      name: Vodní prostředí na dálkové ovládání plavidla
      description: Označuje zamýšlené podmínky vody, při kterých RC plavidlo dosahuje
        nejlepších výsledků.
    remote_keyless_system_programming_method:
      name: Metoda programování dálkového bezklíčového systému
      description: Jak je dálkový ovladač/systém naprogramován nebo spárován s vozidlem
        (např. palubní postup vs. profesionální nástroj).
    repair_compound_type:
      name: Typ opravné směsi
      description: Typ/složení použitého spotřebního opravného materiálu (např. typ
        tmelu karoserie, typ pryskyřice na čelní sklo, typ cementu/tmelu na zátky
        pneumatik)
    repair_kit_components:
      name: Součásti opravné sady
      description: Uvádí konkrétní položky obsažené v opravné sadě, což nakupujícímu
        umožňuje porozumět obsahu a porovnat balíčky.
    repair_method:
      name: Metoda opravy
      description: Určuje primární přístup k opravě, který sada používá, například
        samolepicí záplaty typu „sloupni a nalep“ nebo výměnu ventilu.
    replacement_part_purpose:
      name: Účel náhradního dílu
      description: Označuje, zda se jedná o originální náhradní díl od výrobce, díl
        pro vylepšení/výkonnost nebo doplňkové příslušenství.
    replacement_part_type:
      name: Typ náhradního dílu
      description: Identifikuje funkční kategorii dílu eliptického trenažéru, což
        umožňuje nakupujícím filtrovat komponenty, které potřebují.
    replacement_parts_availability:
      name: Dostupnost náhradních dílů
      description: Označuje, zda jsou pro navlékač nitě podporovány spotřební/vyměnitelné
        díly (např. náhradní háčky/dráty).
    replica_gun_action_type:
      name: Typ mechanismu repliky zbraně
      description: Určuje typ ovládání/západu repliky střelné zbraně (jak je znázorněno),
        například závěrový nebo pákový mechanismus.
    replica_gun_firing_mechanism:
      name: Mechanismus střelby z repliky zbraně
      description: Označuje, zda a jak replika simuluje střelbu/funkce (nesmrtící),
        jako je střelba na kapsle nebo ne-střelba.
    replica_gun_moving_parts:
      name: Pohyblivé části replik zbraní
      description: Označuje, které části na replice jsou funkční/pohyblivé.
    reservoir_orientation:
      name: Orientace nádrže
      description: Určuje zamýšlenou orientaci nebo profil měchu v balení.
    reservoir_type:
      name: Typ nádrže
      description: Typ konfigurace nádržky pro hlavní spojkový válec.
    resin_suitability:
      name: Vhodnost pryskyřice
      description: Určuje, zda je házená míč určena pro použití s pryskyřicí (lepidlem)
        nebo bez pryskyřice.
    resistance_adjustability:
      name: Nastavitelnost odporu
      description: Určuje, zda může uživatel změnit dýchací odpor.
    resistance_band_design:
      name: Provedení odporové gumy
      description: Popisuje fyzickou formu nebo styl odporového pásu (např. smyčka,
        trubka s rukojeti, tvar osmy), pomáhá nakupujícím vybrat si správný design
        pro jejich cvičební rutinu.
    resistance_loading_type:
      name: Typ odporového zatížení
      description: Udává, jak je zajišťován nebo poskytován odpor/zátěž na multipressu
        (např. kotoučem nebo volitelným zásobníkem závaží).
    response_fields_included:
      name: Pole pro odpověď, která jsou součástí
      description: Určuje, která standardní pole/možnosti odpovědi jsou k dispozici
        na kartě pro odpověď (např. přijetí/odmítnutí, volba jídla).
    restoration_status:
      name: Stav obnovy
      description: Označuje, zda je dodávka originální, restaurovaná, restaurovaná
        nebo projektová.
    rhinestone_base_color_family:
      name: Skupina barev podkladu štrasových kamenů
      description: Určuje skupinu barev podkladu štrasových kamenů (např. průhledné/křišťálová,
        zlatá/žlutá, modrá).
    rhinestone_facet_style:
      name: Styl broušení kamínků
      description: Vzorek líce/brusu kamínku ovlivňující třpyt a vzhled (např. Xilion
        rose, briliantový brus, fazetovaný vs. hladký).
    rhinestone_hole_reinforcement_material:
      name: Materiál výztuhy otvorů pro štrasové kameny
      description: Materiál kolem otvorů / v otvorech (např. kovová průchodka, lisovaný
        plast), který má vliv na odolnost během šití
    rhinestone_setting_type:
      name: Typ upevnění štrasových kamenů
      description: Jak je kámen připevněn/okrajován pro šití (např. způsob zasazení
        prong, rám nebo lemovaný).
    rhubarb_product_cut_type:
      name: Typ řezu produktu z rebarbory
      description: Popisuje fyzickou přípravu nebo řez rebarborového produktu.
    ribbon_construction:
      name: Konstrukce stuhy
      description: Popisuje klíčové konstrukční vlastnosti grogrénové stuhy, jako
        je například drátěná nebo elastická, což mění její použití (např. mašle vs.
        šití).
    ribbon_packaging_type:
      name: Typ balení s páskou
      description: Označuje, jak je páska dodávána/prodávána.
    ribbon_pattern_style:
      name: Styl vzoru stuhy
      description: Klasifikuje metodu aplikace vzoru běžně používanou na stuze grosgrain.
    ribbon_sheen_level:
      name: Úroveň lesku pásky
      description: Značí vizuální lesk/zářivost povrchu saténové stuhy.
    ribbon_style:
      name: Styl stuhy
      description: Určuje vizuální vzor/styl stuhy (např. plný, pruhovaný, tříbarevný).
    ribbon_trim_backing_type:
      name: Typ podkladové pásky/lemování
      description: Značí, zda má stuha/lemování podkladovou vrstvu a jakou (pro snadnou
        aplikaci).
    ribbon_trim_edge_finish:
      name: Povrchová úprava okraje stuhy/lemování
      description: Popisuje provedení / povrchovou úpravu okraje stuhy/lemování (užitečné
        pro chování při třepení a zamýšlené použití).
    ric_rac_wave_size:
      name: Velikost vlny Ric-rac
      description: Popisuje amplitudu/stupnici klikaté stuhy (rikrak) (jak velké je
        klikatění/vlny).
    rice_grain_length:
      name: Délka zrna rýže
      description: Klasifikuje rýžové produkty podle délky zrna, například na krátká,
        střední nebo dlouhá zrna, což ovlivňuje vlastnosti vaření a kulinářské využití.
    rice_processing_method:
      name: Metoda zpracování rýže
      description: Popisuje, jak byla rýže zpracována nebo připravena (např. předvařená,
        naklíčená, vločková), ovlivňující dobu vaření, nutriční hodnoty a použití.
    rice_variety:
      name: Odrůda rýže
      description: Určuje konkrétní odrůdu nebo kultivar rýže, což umožňuje nakupujícím
        vybrat si zrna s preferovanou chutí, vůní, texturou a zamýšleným použitím.
    riding_toy_features:
      name: Vlastnosti hraček na jízdu
      description: Zdůrazňuje běžné funkční/bezpečnostní prvky specifické pro hračky
        na jízdu.
    rifle_action_type:
      name: Typ mechanismu pušky
      description: Ovládací mechanismus pušky (jak se nabíjí/vystřeluje/vyhazuje),
        důležitý pro identifikaci a zájem sběratelů.
    rifle_finish:
      name: Povrchová úprava pušky
      description: Primární vnější povrchová úprava / nátěr kovových konstrukcí
    rifle_magazine_type:
      name: Typ zásobníku pušky
      description: Typ podávacího systému pro pušku.
    rifle_stock_material:
      name: Materiál pažby pušky
      description: Primární materiál použitý pro pažbu/kování pušky (např. ořech,
        polymer).
    rim_clamping_method:
      name: Způsob upínání ráfku
      description: Jak stroj zajišťuje kolo/ráfek během montáže a demontáže
    rim_strip_type:
      name: Typ ráfkového pásku
      description: Klasifikuje pásek/pásku podle stylu, provedení nebo specifické
        aplikace (např. páska ráfku bezdušové pneumatiky vs. ochranný gumový pásek).
    rim_tubeless_compatibility:
      name: Kompatibilita s bezdušovými ráfky
      description: Označuje, zda je ráfek, páska nebo kolo určeno pro nastavení bezdušové
        pneumatiky.
    ripeness_stage:
      name: Fáze zralosti
      description: Označuje stupeň zralosti ovoce v době prodeje (např. nezralé, zralé,
        připravené k jídlu).
    riser_pad_type:
      name: Typ podpěry
      description: Klasifikuje funkční styl podložky (např. standardní distanční vložka,
        tlumič nárazů, úhlový klín).
    roasted_malt_processing_type:
      name: Typ zpracování praženého sladu
      description: Specifický zpracovatelský přístup nebo varianta použitá k vytvoření
        praženého sladu nebo praženého zrna (např. nesladovaný pražený ječmen, černý
        slad, varianta zbavená hořkosti nebo bez slupek).
    robotic_toy_interaction_mode:
      name: Režim interakce s robotickou hračkou
      description: Popisuje primární způsob, jakým robot interaguje nebo se pohybuje
        během hry.
    robotic_toy_light_features:
      name: Světelné funkce robotické hračky
      description: Označuje, zda a jak hračka používá světla jako součást hry (např.
        LED diody, projekci).
    robotic_toy_programming_supported:
      name: Podpora programování robotické hračky
      description: Určuje, jaký programovací přístup, pokud nějaký, hračka podporuje.
    robotic_toy_skill_level:
      name: Úroveň dovedností s robotickými hračkami
      description: Označuje úroveň složitosti operace/programování očekávanou od uživatele.
    robotic_toy_sound_features:
      name: Zvukové funkce robotické hračky
      description: Označuje možnosti zvuku robotické hračky.
    rod_butt_style:
      name: Styl tupého dílu prutu
      description: Definuje konfiguraci koncovky prutu používané v trollingových aplikacích.
    rod_construction_type:
      name: Typ konstrukce prutu
      description: Označuje celkový styl konstrukce prutu z hlediska počtu dílů a
        skládatelnosti.
    rod_guide_material:
      name: Materiál vodítka udice
      description: Určuje materiál použitý pro vodítka nebo vložky vlasce rybářské
        udice, který má vliv na odolnost, hmotnost a tření vlasce.
    rod_guide_type:
      name: Typ vodítka udice
      description: Určuje primární typ vodítek vlasce instalovaných na prutu.
    rod_handle_type:
      name: Typ rukojeti prutu
      description: Určuje provedení úchytu rybářské udice, což přispívá k většímu
        pohodlí a usnadňuje výběr techniky.
    roll_cage_tubing_material:
      name: Materiál trubek ochranného rámu
      description: Určuje materiál/slitinu trubek použité pro ochranný rám (např.
        ocel DOM vs. chrommolybdenová ocel 4130).
    roller_skate_brake_shape:
      name: Tvar brzdy kolečkových bruslí
      description: Popisuje geometrický tvar/profil brzdové hlavy pro preferenci výkonu
        nebo estetiky.
    roller_skate_brake_type:
      name: Typ brzdy kolečkových bruslí
      description: Určuje brzdový systém použitý u kolečkových bruslí.
    roller_ski_technique:
      name: Technika jízdy na kolečkových lyžích
      description: Určuje techniku běžkového lyžování, pro kterou jsou kolečkové lyže
        určeny.
    roller_technology:
      name: Technologie válečků
      description: Označuje integrovanou technologii, která zvyšuje výkonnost masáže,
        například vibracemi nebo teplem.
    rolling_case_wheel_configuration:
      name: Provedení kolečka pro pouzdro na kolečkách
      description: Určuje konfiguraci kol použitou na pouzdro pro rolovací hudební
        klávesnici.
    rolling_paper_format:
      name: Formát cigaretových papírků
      description: Identifikuje fyzickou prezentaci produktu (např. ploché desky,
        předrolované kužely, obaly).
    rolling_paper_gum_type:
      name: Typ gumy pro cigaretové papírky
      description: Určuje lepidlo (gumu) použité na okraji papírku k utěsnění, které
        může mít vliv na chuť a výkon.
    rolling_paper_size:
      name: Velikost cigaretového papírku
      description: Označuje standardní velikostní klasifikaci rolovacího papíru nebo
        kuželu, což umožňuje nakupujícím rychle vybrat správnou šířku/délku pro jejich
        potřeby.
    rolling_stock_type:
      name: Typ kolejových vozidel
      description: Určuje, o jaký typ vlaku/kolejového vozidla se model jedná (lokomotiva
        vs. osobní/nákladní vagóny a běžné podtypy vagónů).
    roof_cargo_net_hook_fastener_style:
      name: Styl háčku/upevnění střešní sítě
      description: Určuje typ koncového hardware použitého k připojení sítě ke kotevním
        bodům (např. S-hák, karabina, J-hák).
    roof_height_class:
      name: Třída výšky střechy
      description: Kategorizuje výšku střechy běžně používanou u dodávek (obzvláště
        relevantní pro konverze/obytné vozy).
    roof_type:
      name: Typ střechy
      description: Konfigurace střešní nebo stropní části rozvaděče.
    root_variety:
      name: Odrůda kořene
      description: Identifikuje odrůdu nebo běžný typ kořene (např. křen versus pravé
        odrůdy wasabi).
    rope_buoyancy:
      name: Vztlak lana
      description: Uvádí, zda je lano navrženo tak, aby plavalo na vodní hladině,
        což pomáhá jezdcům vyhnout se zamotání a zjednodušuje jeho vyprošťování.
    rope_construction:
      name: Konstrukce lana
      description: Určuje konstrukci vláken nad rámec stylu opletení, například kroucené
        vs. opletené jádro/plášť a zda je lano typu kernmantle.
    rope_material:
      name: Materiál lana
      description: Identifikuje materiál ladicího lana/šňůry.
    rope_strand_compatibility:
      name: Kompatibilita pramenů lana
      description: Označuje, která provedení provazce lana jsou vhodná pro jisticí
        zařízení (jednoduché, poloviční/dvojité, dvojité nebo kombinace).
    rope_stretch_type:
      name: Typ natažení lana
      description: Popisuje vlastnosti natažení lana a rozlišuje mezi nepružnými,
        mírně pružnými, standardními a bungee typy.
    rose_bloom_stage:
      name: Fáze květu růže
      description: Udává, jak otevřené jsou květy růže při doručení/příchodu (od poupěte
        po úplné otevření).
    rose_grade:
      name: Růžová odrůda
      description: Komerční jakostní třída řezaných růží
    rosette_center_type:
      name: Typ kokardy uprostřed
      description: Určuje typ středového údaje nebo vložky na přední straně rozety.
    rosin_dust_level:
      name: Hladina prachu z kalafuny
      description: Označuje očekávané množství kalafunového prachu produkovaného během
        běžného používání.
    rosin_formula_additives:
      name: Vzorec kalafuny / přísady
      description: Identifikuje významné vlastnosti složení, jako jsou hypoalergenní,
        nízkoprašné nebo směsi s příměsí kovu.
    rosin_hardness:
      name: Tvrdost kalafuny
      description: Udává relativní tvrdost/měkkost kalafuny smyčce, která může ovlivnit
        přilnavost a prašnost v různých klimatických podmínkách a stylech hry.
    rotation_mechanism_type:
      name: Typ rotačního mechanismu
      description: Určuje mechanismus, který umožňuje otáčení lana, ovlivňující plynulost
        a dosažitelnou rychlost (např. kuličková ložiska vs. pouzdra).
    rotation_motion_features:
      name: Funkce rotace/pohybu
      description: Udává, zda planety/oběžné dráhy rotují nebo se pohybují a jak.
    rotor_configuration_type:
      name: Typ konfigurace rotoru
      description: Identifikuje konfiguraci rotoru a styl řízení RC vrtulníku (např.
        koaxiální, jednorotorový s pevnou roztečí vs. s kolektivní roztečí, vícerotorový),
        které podstatně ovlivňují letové vlastnosti a vhodnost pro různé úrovně dovedností.
    rotor_construction_type:
      name: Typ konstrukce rotoru
      description: Určuje styl konstrukce rotoru, ovlivňující hmotnost, tuhost a odvod
        tepla.
    rotor_mounting_interface:
      name: Rozhraní pro montáž rotoru
      description: Definuje standard rozhraní náboje používaný k připevnění rotoru
