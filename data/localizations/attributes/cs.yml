    laundry_wash_accessory_type:
      name: Typ příslušenství na praní prádla
      description: Udává konkrétní typ sáčku nebo košíku na praní.
    lawn_aerator_type:
      name: Typ provzdušňovače trávníku
      description: Kategorizuje provzdušňovače trávníku podle základní funkční konstrukce
