      description: Uvádí, zda je návlek izolovaný, aby udržoval teplotu nápoje.
    insulation_technology:
      name: Izolační technologie
      description: Určuje konstrukci izolace použité k udržování teploty.
    insulation_type:
      name: Typ izolace
      description: Určuje, zda a jak jsou chladicí nádoba nebo chladič izolované,
        což ovlivňuje schopnost uchovávat led a omezovat kondenzaci.
    intended_beverage_type:
      name: Zamýšlený typ nápoje
      description: Udává hlavní nápoj, pro který je karafa určená nebo se kterým se
