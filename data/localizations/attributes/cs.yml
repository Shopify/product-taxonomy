    ruler_edge_type:
      name: Typ hrany pravítka
      description: Identifikuje profil hrany / funkce použité pro měření nebo značení
        (např. rovná hrana, zkosená hrana, obruba).
    ruler_marking_style:
      name: Styl značení pravítka
      description: Popisuje uspořádání značení/vodítek vytištěných na pravítku nad
