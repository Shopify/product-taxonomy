    salt_level:
      name: Hladina soli
      description: Udává množství soli nebo sodíku přidaného do ořechů nebo semen.
    sand_cup_features:
      name: Vlastnosti pískového hrnku
      description: Funkční/fyzikální vlastnosti báboviček na písek, které mají vliv
