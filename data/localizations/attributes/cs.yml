      description: Identifikuje systém rozvržení/mechanismus saxofonu použitý na nástroji.
    saxophone_key_touch_material:
      name: Materiál pro dotyk kláves saxofonu
      description: Určuje materiál použitý pro úchyty klapek saxofonu (např. perleťové
