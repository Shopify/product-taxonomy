    iron_cleaner_purpose:
      name: Účel čističe žehličky
      description: Určuje hlavní zamýšlené použití čističe.
    ironing_board_form_factor:
      name: Tvar žehlicího prkna
      description: Uvádí celkový styl / způsob instalace prkna, aby nakupující mohli
        najít ten správný typ.
    ironing_board_pad_shape:
      name: Tvar podložky na žehlicí prkno
      description: Udává celkový tvar/profil podložky, aby bylo možné zjistit, na
