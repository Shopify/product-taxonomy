    album_type:
      name: Typ alba
      description: Popisuje styl vazby alba, např. spirálová vazba, scrapbook
    alcohol/solvent_content:
      name: Obsah alkoholu/rozpouštědel
      description: Klasifikuje produkt na základě obsahu alkoholu nebo rozpouštědla
        pro účely přepravy a regulace (např. alkohol ≤ 24 %, alkohol > 24 %, rozpouštědlo
        v malé nádobě)
    alcohol_content:
      name: Obsah alkoholu
      description: Udává, zda je tonikum bez alkoholu nebo, pokud je přítomen, přibližně
        kolik alkoholu složení obsahuje
    alert_type:
      name: Typ upozornění
      description: Určuje druh výstrahy, kterou produkt poskytuje, jako jsou zvukové
        alarmy nebo upozornění v chytrého telefonu
    allergen_information:
      name: Informace o alergenech
      description: Označuje potenciální alergeny přítomné v potravinách nebo nápojích,
        jako je pšenice nebo arašídy
    allergen_test_type:
      name: Typ testu na alergeny
      description: Určuje typ alergenu, pro který je testovací sada navržena, jako
