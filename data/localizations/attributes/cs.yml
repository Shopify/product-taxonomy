    runner_configuration:
      name: Konfigurace lyžiny
      description: Popisuje počet a uspořádání běžců na saních.
    runner_material:
      name: Materiál skluznice
      description: Určuje materiál použitý pro kluzné lišty nebo kluzné lišty saní.
    saddle_cover_style:
      name: Styl krytu sedla
      description: Klasifikuje celkový design nebo styl použití produktu (např. kryt
