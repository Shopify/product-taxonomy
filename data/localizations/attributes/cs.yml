        a preferencím při práci.
    kitchen_linen_items_included:
      name: Obsažené kusy kuchyňského textilu
      description: Uvádí konkrétní kusy kuchyňského textilu obsažené v sadě, aby nakupující
        přesně věděli, co kupují.
    label_content_type:
      name: Obsah štítku
      description: Popisuje, zda je štítek prázdný, opatřený předtištěnou šablonou
