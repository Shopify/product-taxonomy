    organizer_application:
      name: Použití organizéru
      description: Určuje primární typ položek, pro který je organizér určený.
    ornament_hook_style:
      name: Styl háčku na ozdoby
      description: Uvádí typ nebo tvar háčku na ozdoby, který se používá k zavěšení
