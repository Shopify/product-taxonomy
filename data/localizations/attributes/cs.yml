      description: Určuje zakřivení odrazné plochy, které ovlivňuje úhel pohledu a zkreslení.
    mirror_type:
      name: Typ zrcadla
      description: Klasifikuje obecný typ nebo funkční kategorii zrcadla.
    mist_output_mode:
