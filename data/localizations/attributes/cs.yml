        vybrat si mezi různými tréninkovými modalitami.
    sandbox_bottom_type:
      name: Typ dna pískoviště
      description: Typ konstrukce základny/dna použité pod pískem.
    sandbox_drainage_type:
      name: Typ odvodnění pískoviště
      description: Jak pískoviště odvádí vodu (pokud je to relevantní), například
        odtokové otvory nebo odnímatelná zátka.
    sandbox_seating_type:
      name: Typ sezení v pískovišti
      description: Zda pískoviště obsahuje integrované sezení a jaké
    sapodillo_variety:
      name: Odrůda Sapodillo
      description: Identifikuje konkrétní kultivar nebo odrůdu sapodillo/chikoo (např.
        „Alano“, „Prolific“), což umožňuje nadšencům vybrat si preferované chuťové
        profily a vlastnosti.Identifikuje konkrétní kultivar nebo odrůdu sapodillo/chikoo
        (např. „Alano“, „Prolific“), což umožňuje nadšencům vybrat si preferované
        chuťové profily a vlastnosti.
    sapote_variety:
      name: Odrůda zapoty
      description: Specifikuje konkrétní druh/typ nabízené sapote (např. černá, bílá,
