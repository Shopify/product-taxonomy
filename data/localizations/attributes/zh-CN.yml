      description: 描述锁扣/接收器如何安装到车辆、座椅或安全带扣柱上（例如，螺栓固定式、卡扣式）。
    seat_belt_buckle_release_button_color:
      name: 安全带锁扣释放按钮颜色
      description: 指定锁扣释放按钮的颜色。
    seat_belt_cover_placement:
      name: 安全带盖板位置
      description: 指定安全带套在安全带上的使用位置。
    seat_belt_integration:
      name: 安全带配置
      description: 指定座椅是否包含一体式安全带和/或锁扣接收器，或者是否需要拆用车辆的原始 OEM 锁扣接收器进行安装。
    seat_belt_provision:
      name: 安全带配置情况
      description: 指示后排座椅总成是否包含安全带和/或相关安全带硬件（例如，锁扣），或者必须从原座椅拆用。
    seat_belt_strap_installation_location:
      name: 安全带织带安装位置
      description: 指示织带在安全带系统内的安装位置。
    seat_cover_placement:
      name: 座套摆放位置
      description: 指示该座套适用于车内的哪个/哪些座位位置。
    seat_cover_securement_method:
      name: 座套固定方式
      description: 指示座套固定到座椅上的主要方式。如果使用多种方法，请选择主要方法。
    seat_cover_set_contents:
      name: 座套套装包含的产品
      description: 描述包装内含哪些产品（例如，仅座垫与全套座椅加头枕）。
    seat_fabric:
      name: 座椅面料
      description: 座椅和靠背吊带所用的主要面料。
    seat_height_category:
      name: 座椅高度类别
      description: 按典型座椅高度范围对凳子进行分类（例如，台面高度或吧台高度），以简化选择过程。
    seat_material:
      name: 座椅材料
      description: 指明长椅座面的主要材料。
    seat_mounting_type:
      name: 座椅安装类型
      description: 用于将座椅固定到车辆地板上的安装/滑轨配置。
    seating_surface_material:
      name: 座椅表面材质
      description: 指定人员躺靠区域的材料（例如，特斯林网布、吊带面料、藤条、软垫装饰面料）。
    seatpost_clamp_mechanism:
      name: 座管夹紧机构
      description: 固定座管的夹紧/锁紧系统类型。
    section_orientation_compatibility:
      name: 模块朝向适配性
      description: 指示配件适用于左臂朝向、右臂朝向还是通用朝向的模块。
    sectional_configuration:
      name: 组合模块配置
      description: 定义组合式家具单元的具体模块或朝向（例如，转角位、左臂端、躺椅位），方便购物者拼装出想要的布局。
    sectional_shape:
      name: 组合形状
      description: 明确组合沙发的整体几何配置/布局。
    secured_components:
      name: 固定组件
      description: 列出防盗快拆杆或防盗螺母所保护的特定自行车部件（例如，前轮、后轮、座管）。
    seed_content:
      name: 籽含量
      description: 指示柑橘类水果是无籽、少籽还是多籽。
    seed_size_classification:
      name: 种子大小分类
      description: 指示荔枝内部不可食用的果核的相对大小，这会影响可食用果肉的多少。
    self_adhesive_backing_format:
      name: 自粘背胶形式
      description: 烛芯底座所附背胶的物理形式（预贴胶垫与单独贴片等）。
    self_adhesive_hook_loop_backing_type:
      name: 自粘勾毛搭扣背胶类型
      description: 指定自粘侧背胶/离型纸的结构和背胶体系。
    self_adhesive_hook_loop_fastener_shape:
      name: 自粘钩扣形式
      description: 指定所供应的魔术贴片材的裁切/形状。
    self_hardening_clay_finish:
      name: 自硬粘土成品表面效果
      description: 描述完全固化后的表面外观/光泽度（有助于在自然哑光、缎面等效果之间进行选择）。
    self_hardening_clay_water_resistance_after_curing:
      name: 自硬粘土固化后的耐水性
      description: 指示完全固化后（无需额外密封剂）对水浸的抵抗能力。
    sensor_functions:
      name: 传感器功能
      description: 指示传感器测量哪些骑行指标。
    sensor_measurement_mode:
      name: 传感器测量模式
      description: 指示传感器可以捕捉哪些指标（例如：仅踏频、仅速度、速度与踏频双模）。
    sensor_mounting_position:
      name: 传感器安装位置
      description: 指明传感器安装在自行车或骑行者身上的位置，例如曲柄臂、轮毂或鞋子上。这会影响与不同自行车设置的兼容性。
    sensor_mounting_type:
      name: 传感器安装类型
      description: 指明进气压力传感器如何安装到进气歧管/发动机上（例如：螺栓固定式法兰与推入式橡胶圈）。
    sensor_or_gauge_mounting_location:
      name: 传感器或仪表安装位置
      description: 指明传感器或仪表打算安装在车辆的哪个位置（系统/位置层级，而非左/右）。
    sensory_modality:
      name: 感官模态
      description: 玩具设计旨在提供的主要感官体验（可以是多感官的）。
    sensory_toy_fidget_mechanism:
      name: 感官玩具解压机制
      description: 用于解压和自我调节的主要互动方式/机制。
    sensory_toy_light_features:
      name: 感官玩具灯光特性
      description: 玩具提供的灯光行为/效果。
    sensory_toy_texture_type:
      name: 感官玩具纹理类型
      description: 用于触觉刺激的主要表面触感/纹理元素。
    sequin_application_method:
      name: 亮片应用方法
      description: 亮片的预期使用/粘贴方式（缝制、胶粘与热固定型等）。
    sequin_finish:
      name: 亮片表面效果
      description: 描述贴片上所用亮片的表面/视觉效果和反光效果（例如：哑光、金属、全息），而非贴片的背衬或粘贴方式。
    serger_stitch_functions:
      name: 包缝机线迹功能
      description: 包缝机支持的线迹功能（包缝/绷缝变体及特殊包缝机线迹）。
    serger_thread_count:
      name: 包缝机穿线数量
      description: 包缝机可用于缝纫的线的数量（例如：2/3/4/5 线能力）。
    service_interval:
      name: 保养间隔
      description: 建议的由经批准的维修站进行必要检查/保养的最长时间间隔。
    serving_temperature:
      name: 食用温度
      description: 指示产品在食用时的预期温度或状态。
    sesame_seed_hull_status:
      name: 芝麻去壳状态
      description: 指明芝麻酱是由带壳芝麻还是去壳芝麻制成的，这会影响颜色、口味和营养价值。
    sesame_seed_roast_level:
      name: 芝麻烘烤程度
      description: 指明芝麻在研磨前的烘焙程度，帮助购物者选择偏好的风味强度。
    sesame_seed_variety:
      name: 芝麻品种
      description: 指明用于榨油的芝麻的颜色或品种。
    set_classification:
      name: 套装分类
      description: 指明槌球套装的预期比赛级别或风格（例如：锦标赛级、休闲级、旅行级）。
    set_components:
      name: 套装组成产品
      description: 指明产品包含哪些物品（例如：仅中心杆与全套）。
    set_items_included:
      name: 包括套装物品
      description: 指明套装中包含的服装或配饰，例如纱丽布料、杜帕塔披巾或腰带。
    setup_mechanism:
      name: 展开方式
      description: 描述帐篷的主要展开方法（例如：弹开式、充气式/气梁式、车顶帐篷贝壳式）。
    setup_type:
      name: 组装类型
      description: 游戏帐篷/隧道的组装或展开方式。
    sew_in_interfacing_elasticity:
      name: 缝入式衬布弹性
      description: 指明缝入式衬布是否有弹性（以及如果有，是哪个方向的弹性），以选择适合针织或梭织面料的衬布。
    sew_in_label_placement:
      name: 缝入式标签位置
      description: 表示成品上的预期缝入位置。
    sew_on_edge_finish:
      name: 缝制边缘处理
      description: 指明勾毛搭扣的边缘是毛边/裁切边，还是经过处理以防起毛。
    sew_on_rhinestone_hole_orientation:
      name: 缝制水钻开孔方向
      description: 孔相对于水钻的排列/方向（例如：并排、相对、交叉），以支持不同的缝制方式。
    sewing_kit_components_included:
      name: 包括缝纫套件组件
      description: 列出缝纫工具包中包含的缝纫配件/工具，以便购物者比较每个套件里的物品。
    sewing_machine_bobbin_class:
      name: 缝纫机梭芯类别
      description: 指定与缝纫机适配的梭芯类别/系统（用于梭芯和梭芯套）。
    sewing_machine_buttonhole_type:
      name: 缝纫机锁眼类型
      description: 机器支持的锁眼制作方式。
    sewing_machine_display_type:
      name: 缝纫机显示屏类型
      description: 缝纫机上的控制/显示界面类型。
    sewing_machine_needle_point_type:
      name: 缝纫机机针针尖类型
      description: 定义针尖的几何形状/针尖系列，决定其如何穿透不同面料（例如：尖头、圆头与楔形头）。
    sewing_machine_needle_system:
      name: 缝纫机针系统
      description: 决定机器适配性的标准化机针系统/型号编号（通常写为 130/705 H、HAx1、DBx1、15x1 等）。
    sewing_machine_needle_type:
      name: 缝纫机针类型
      description: 指明机针的预期用途/类型（例如：通用、圆头、牛仔布），这会影响线迹质量和面料适用性。
    sewing_machine_shank_type:
      name: 缝纫机机柄类型
      description: 指明为压脚设计的压脚柄/压脚踝接口标准，以确保与缝纫机的适配性（例如：低柄、高柄、斜柄）。
    sewing_pattern_accessory_type:
      name: 缝纫图纸配件类型
      description: 指明根据缝纫图纸制作的配件。
    sewing_pattern_notions_required:
      name: 缝纫图纸所需辅料
      description: 列出完成项目所需的重要辅料/五金件（面料和缝纫线以外的材料）。
    sewing_pattern_recommended_fabric:
      name: 缝纫图纸推荐面料
      description: 列出缝纫图纸推荐的面料类型/克重（由图纸设计师提供）。
    sewing_pattern_size_range:
      name: 缝纫图纸尺码范围
      description: 指定纸样所涵盖的预期尺寸范围（例如，婴儿至成人、大码等）。
    sewing_thread_size_system:
      name: 缝纫线规格系统
      description: 用于表示缝纫线粗细的规格标准（例如，Tex、Denier、Ticket、号数、V 尺寸）。
    shaft_curvature:
      name: 杆身弧度
      description: 描述杆身的整体形状，这会影响攀登时的避障间隙、挥镐发力和人体工程学。
    shaft_kick_point:
      name: 杆身折点
      description: 标识杆身在挥动过程中弯曲幅度最大的位置，从而影响球的飞行轨迹。
    shaft_length_type:
      name: 轴长度类型
      description: 当未提供精确的毫米测量值时，用于飞镖杆的行业标准尺寸分类名称（例如，短、中）。
    shaft_shape:
      name: 棍身形状
      description: 定义棍身的横截面轮廓（例如，圆形、方形、八角形）。
    shaker_fill_material:
      name: 沙锤填充材质
      description: 指定用于产生沙锤声效的主要内部填充物（如适用），例如珠粒、种子或金属弹丸。
    shaker_shell_material:
      name: 沙锤外壳材质
      description: 指定蛋形沙锤主体/外壳（即外部壳体）的主要材质。
    shallot_variety:
      name: 红葱头品种
      description: 标识该红葱头产品的具体栽培品种、市场类型或品类。
    shank_style:
      name: 衔铁柄款式
      description: 描述马衔铁杠杆柄的整体形状/配置（例如，直柄、弯柄、草地柄）。
    shapewear_enhancement_feature:
      name: 塑身衣功能强化特性
      description: 突出该服装提供的主要功能性强化效果（例如，收腹、提臀、防漏内衬）。
    sheath_type:
      name: 刀鞘类型
      description: 收藏级刀具随附的刀鞘/剑鞘类型。
    sheet_music_clip_padding_material:
      name: 乐谱夹保护垫材质
      description: 与乐谱纸张或谱架边缘接触的夹口/抓握处保护垫材质，用以防止纸张撕裂和打滑。
    sheet_music_clip_spring_tension_level:
      name: 乐谱夹弹簧张力级别
      description: 夹子弹簧的相对强度/夹紧力。
    sheet_music_clip_use_environment:
      name: 乐谱夹适用环境
      description: 该夹子设计用于发挥最佳效果的主要使用环境。
    shell_construction:
      name: 鼓腔结构
      description: 指定低音鼓鼓腔的构造方式，这会显著影响音色和重量。
    shell_finish:
      name: 鼓腔表面处理
      description: Doumbek 达布鼓腔外部的表面处理工艺。
    shell_hull_status:
      name: 带壳/去壳状态
      description: 指定坚果或种子是带壳/带皮出售，还是去壳/去皮出售。
    shift_boot_attachment_method:
      name: 换挡杆防尘罩安装方式
      description: 指定换挡杆防尘罩如何固定到车辆中控台/换挡杆饰板上（例如，卡扣式装饰框、固定环、粘合剂）。
    shift_boot_installation_hardware_included:
      name: 随附换挡杆防尘罩安装硬件
      description: 列出换挡杆防尘罩随附的安装硬件和组件。
    shift_knob_illumination:
      name: 换挡旋钮照明
      description: 指定换挡旋钮是否包含照明以及其照明方式/类型（例如，光致发光、LED、光纤、背光图案）。
    shift_knob_installation_method:
      name: 换挡旋钮安装方式
      description: 指定换挡旋钮如何安装到换挡杆/操纵杆上。
    shift_knob_shape:
      name: 换挡旋钮形状
      description: 描述换挡旋钮的整体人体工程学外形。
    shift_pattern_type:
      name: 挡位图样式
      description: 指定换挡旋钮上的挡位标识样式（如有）。
    shifter_compatibility:
      name: 变速器兼容性
      description: 指示车把延长件是否兼容电子变速器、机械变速器、两者均兼容，或不兼容任何变速器。
    shifter_mounting_interface:
      name: 变速器安装接口
      description: 描述变速器如何安装到自行车上（例如，独立夹环尺寸、I-Spec、MatchMaker、车把末端、下管式、无线式）。
    shifting_actuation_type:
      name: 换挡驱动类型
      description: 标识套件中用于换挡的驱动机制（机械式、电子有线式、电子无线式、液压式）。
    shifting_mechanism:
      name: 换挡机构
      description: 标识变速器是机械式还是电子式，以及采用定位式还是摩擦式换挡。
    shim_purpose:
      name: 垫片用途
      description: 定义产品的功能类型（例如，垫片、楔形垫片、间隔垫片），以便骑行者可以快速找到合适的调整方案，而无需在单独的子类别中查找。
    shin_guard_attachment_method:
      name: 护胫固定方式
      description: 对护胫的整体设计形式进行分类，包括是否集成护踝或采用袜套式结构。
    shirt_cuff_style:
      name: 衬衫袖口样式
      description: 标识袖口的结构设计，这会影响服装的正式程度、与袖扣的搭配以及佩戴舒适度。
    shochu_base_ingredient:
      name: 烧酒基料
      description: 标识用于酿造烧酒的主要淀粉或糖类来源。
    shochu_soju_variety:
      name: 日本烧酒和韩国烧酒品种
      description: 按公认风格或酿造类型对产品进行分类。
    shock_absorber_bushing_material:
      name: 减震器衬套材质
      description: 减震器随附或内置的安装衬套/隔振垫的材料。
    shock_absorber_charge_type:
      name: 减震器冲压类型
      description: 指定减震器的充压/阻尼技术（例如，液压/油压、充气、空气阻尼）以及相关筒体设计（如适用）。
    shock_absorber_mount_type_lower:
      name: 减震器下支座安装类型
      description: 减震器的底部安装接口样式，用于适配性测量与匹配。
    shock_absorber_mount_type_upper:
      name: 减震器安装类型（上部）
      description: 指定汽车减震器的上部（顶部）安装接口样式，以便进行适配/兼容性匹配。
    shock_absorber_position:
      name: 减震器安装位置
      description: 指定减震器是用于车辆的前部、后部、左侧还是右侧位置（比仅精确到车轴位置更细致）。
    shock_absorption_system:
      name: 减震系统
      description: 定义用于减少回弹振动和噪音的机制。
    shoe_collar_height:
      name: 鞋帮高度
      description: 按鞋帮高度（低帮、中帮、高帮）对鞋类进行分类，以体现对脚踝的包覆性和支撑性。
    shoe_cover_height:
      name: 鞋套高度
      description: 指明自行车鞋套的覆盖程度，区分脚趾套和全高帮鞋套。
    shoe_sizing_system:
      name: 鞋码系统
      description: 说明所标示鞋码采用的尺码标准（US、UK、EU、JP、Mondopoint 等）。
    shoelace_aglet_material:
      name: 鞋带头材质
      description: 说明鞋带末端鞋带头所使用的材质，这会影响耐用性和外观风格。
    shooting_rest_design:
      name: 射击支架设计
      description: 对射击支架的结构类型进行分类（例如，沙袋式、雪橇式、三脚架式、枪夹式等）。
    shooting_stick_yoke_design:
      name: 射击支架托架设计
      description: 指定与枪械或光学瞄具连接的托架样式。
