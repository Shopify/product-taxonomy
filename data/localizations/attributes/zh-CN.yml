    worn_on_finger:
      name: 佩戴手指
      description: 指明顶针应该佩戴在哪根手指上。
    wrap_style:
      name: 缠绕风格
      description: 表示腰带需要在腰部缠绕多少圈。
    wrapping_occasion:
      name: 包装场合
      description: 包装纸用于的主要送礼/庆祝场合。
    wrapping_paper_features:
      name: 包装纸特点
      description: 包装纸的功能性和可持续性相关特性，例如抗撕裂性、再生材料含量或预切纸张格式。
    wrestling_dummy_design:
      name: 摔跤假人设计
      description: 假人的整体身形或姿势，如站立人形或投掷袋，这决定了适用的训练练习。
    wrestling_mat_safety_certifications:
      name: 摔跤垫安全认证
      description: 列出垫子符合的任何行业或体育机构安全认证或标准。
    wrist_strap_style:
      name: 腕带样式
      description: 描述影响支撑性和贴合度的腕带样式（或无腕带）。
    wrist_support_style:
      name: 手腕支撑样式
      description: 标识手腕支撑的结构或样式，例如支架、手套、腕带或护腕，以帮助用户进行偏好设置和性能选择。
    xylophone_range_octaves:
      name: 木琴音域（八度）
      description: 木琴的总音域以八度表示（例如，2.5 个八度，3 个八度，4 个八度）。
    xylophone_resonator_type:
      name: 木琴共鸣器类型
      description: 用于放大音调的共鸣器系统类型（如有）。
    yam_variety:
      name: 山药/芋品种
      description: 指明所售山药的栽培品种或常见品种（例如，紫色、黄色、象脚）。
    yarn_cutter_physical_style:
      name: 切线器物理样式
      description: 标识切线器的物理样式（例如，吊坠式、环形、剪刀式），以支持在此类别中浏览和筛选。
    yarn_finish_or_effect:
      name: 纱线整理或效果
      description: 重点说明应用于纱线的特殊视觉或功能处理，例如荧光或金属闪光。
    yarn_guide_style:
      name: 导纱器样式
      description: 导纱器组件的物理样式。
    yarn_swift_adjustability:
      name: 纱线框调节
      description: 表明是否以及如何调节纱线框（可扩展、可折叠），这会影响存储和它可处理的绞纱尺寸范围。
    yarn_swift_bearing_type:
      name: 纱线框轴承类型
      description: 描述影响平滑度和卷绕速度的旋转支撑机构（例如，滚珠轴承）。
    yeast_application:
      name: 酵母用途
      description: 表明酵母产品的主要预期用途是烹饪还是发酵。
    yo_yo_accessory_part_type:
      name: 悠悠球配件/零件类型
      description: 标识产品是哪种悠悠球替换零件或配件（例如，球绳、轴承、响应垫）。
    yo_yo_axle_system_type:
      name: 悠悠球轴系统类型
      description: 悠悠球轴的构造方法（例如，固定轴与变轴），这会影响游戏感和维护。
    yo_yo_bearing_size_class:
      name: 悠悠球轴承尺寸等级
      description: 溜溜球使用的标准轴承尺寸等级（如适用）。
    yo_yo_bearing_type:
      name: 溜溜球轴承类型
      description: 影响响应性和旋转特性的轴承配置。
    yo_yo_play_style:
      name: 悠悠球玩法
      description: 悠悠球的主要预期玩法，反映了产品设计用于的技巧/花式玩法。
    yo_yo_response_system:
      name: 溜溜球响应系统
      description: 指明此零件设计用于的溜溜球响应机制（兼容性）。
    yo_yo_responsiveness:
      name: 溜溜球响应
      description: 溜溜球是轻轻一拉就能回到手中（响应式），还是需要用力拉扯才能回到手中（非响应式）。
    yo_yo_string_material:
      name: 溜溜球球绳材料
      description: 悠悠球球绳的材料成分。
    yogurt_base_ingredient:
      name: 酸奶基底原料
      description: 标识用于制作酸奶的主要牛奶或植物来源，这对于饮食偏好设置和过敏原考虑至关重要。
    yoke_type:
      name: 轭架类型
      description: 标识将枪支支撑在单脚架上的支架或轭架的样式。
    zill_playing_style:
      name: 指钹演奏风格
      description: 预期演奏背景/风格（通常为肚皮舞与管弦乐/文化变体）。
    zill_strap_material:
      name: 指钹绑带材质
      description: 用于固定指钹的指带/弹性材料（如有），这会影响舒适性、耐用性和抓握性。
    zills_strap_adjustability:
      name: 指钹指带调节
      description: 随附指带/松紧带是否可以调节以适应尺寸，以及如何调节。
    zipper_application:
      name: 拉链用途
      description: 指明拉链设计用于的预期项目或应用。
    zipper_chain_type:
      name: 拉链类型
      description: 指明拉链/链齿的结构/类型。
    zipper_end_type:
      name: 拉链末端类型
      description: 表明拉链的终止方式，以及它是分离式（开口）还是闭口（不可分离），包括工艺拉链中使用的常见分离端硬件。
    zipper_gauge:
      name: 拉链规格
      description: '表明拉链的规格/尺寸，通常用带 # 的数字表示（例如，#3 或 #5），与链齿/线圈宽度和预期用途相关。'
    zipper_opening_length:
      name: 拉链开口长度
      description: 定义正面开口有多少拉链，区分全拉链和半拉链或四分之一拉链风格。
    zipper_pull_material:
      name: 拉链头材料
      description: 指明拉链头或拉片（您握住的部分）的材质，与拉链齿/链条和拉链带不同。
    zipper_pull_side:
      name: 拉链拉片侧
      description: 指明可以从拉链的哪一侧（或哪一侧）拉动拉片。
    zipper_pull_strap_cord_tab_material:
      name: 拉链拉带/拉绳/拉片材料
      description: 拉链头上所附的拉带/拉绳/拉片/流苏组件的材料（如有），不包括主拉链头五金件/主体。
    zipper_reversibility_mechanism:
      name: 拉链可逆机制
      description: 指明拉链如何实现正反两用（例如，双面拉片与专为可翻面服装设计的翻转/自动锁定拉片）。
    zipper_separating_type:
      name: 拉链分离类型
      description: 表明拉链是底部/顶部分开还是闭口，以便与夹克、睡袋、背包等搭配使用。
    zipper_side:
      name: 拉链侧
      description: 指明睡袋正面朝上放置时，主拉链所在的一侧。
    zipper_slider_material:
      name: 拉链滑块材料
      description: 指明拉链滑块（移动机构）的材料，这会影响强度和耐腐蚀性。
    zipper_slider_pull_configuration:
      name: 拉链滑块/拉片配置
      description: 表明拉链是只有一个拉头还是两个拉头，以及拉头是在拉头的一侧还是两侧。
    zipper_style:
      name: 拉链样式
      description: 表明服装上的拉链长度或有无（例如，无拉链、四分之一拉链、半拉链、全拉链）。
    zipper_tape_material:
      name: 拉链带材质
      description: 指明缝入产品中的拉链带（布料侧边）的主要材料。
    zipper_teeth_type:
      name: 拉链齿类型
      description: 指明拉链/链齿的结构样式（例如，线圈、模制塑料、金属、隐形），这会影响其灵活性、强度和典型应用。
    assembly_required:
      name: 需要组装
      description: 指示产品在使用前是否需要组装
    organic_certification:
      name: 有机认证
      description: 标识产品获得了哪种有机认证或可持续发展认证
