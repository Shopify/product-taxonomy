      name: Acessórios de impressora incluídos
      description: Detalha os componentes suplementares incluídos em uma impressora,
        copiadora ou fax; por exemplo, bandeja de papel, fusor
    printer_color_capability:
      name: Capacidade de cor da impressora
      description: Especifica se o dispositivo produz apenas em modo monocromático
        ou suporta impressão e cópia a cores
    printer_connection_interface:
      name: Interface de conexão da impressora
      description: Define o tipo de porta que o servidor de impressão utiliza para
        se ligar à própria impressora
    printer_form_factor:
      name: Formato da impressora
      description: Classifica o estilo físico ou portabilidade do dispositivo
    printer_functions:
      name: Funções da impressora
      description: Define os recursos de impressoras, copiadoras e aparelhos de fax;
        por exemplo, digitalização, impressão de fotos
    printing_color:
      name: Impressão a cores
      description: Define a saída de cores dos cartuchos de toner e jato de tinta,
        por exemplo, preto, ciano
    printing_method:
      name: Método de impressão
      description: Especifica o processo de impressão, como impressão offset ou gravação
    privacy_filtering_direction:
      name: Direção do filtro de privacidade
      description: Indica a partir de que direções de visualização o filtro bloqueia
        a visibilidade (p. ex., bidirecional horizontal, quadridirecional)
    processor_cores:
      name: Núcleos do processador
      description: Indica o número de núcleos no processador de um computador, por
        exemplo, dual
    processor_family:
      name: Família do processador
      description: Identifica a série ou marca da CPU do dispositivo eletrónico, por
        exemplo, Intel Core i7
    processor_socket:
      name: Tomada do processador
      description: Especifica o tipo de soquete de processador compatível em eletrônicos,
        como LGA 1151 (soquete H4) ou Soquete AM4
    processor_technology:
      name: Tecnologia do processador
      description: Define tecnologia de processador, normalmente para equipamentos
        de áudio; por exemplo, baseado em software, tubo/válvula
    product_benefits:
      name: Benefícios do produto
      description: Descreve os benefícios que um produto oferece, normalmente para
        a saúde e a beleza; por exemplo, alisamento, firmeza
    product_certifications_standards:
      name: Certificações e normas do produto
      description: Indica as certificações ou normas que um produto deve cumprir,
        como orgânico ou livre de crueldade
    product_classification:
      name: Classificação do produto
      description: Categoriza o tipo de material precioso, moeda ou item valioso (p.
        ex., moeda, metais preciosos, pedras preciosas, cartão de oferta, NFT).
    product_form:
      name: Forma do produto
      description: Define o formato ou apresentação de um produto, normalmente de
        saúde e beleza; por exemplo, loção, sérum
    product_format:
      name: Formato do produto
      description: Indica se o item é entregue como produto físico ou download digital
    product_formulation:
      name: Formulação de produto
      description: Identifica a composição dos consumíveis de construção, por exemplo,
        substância base, mistura pronta
    product_manual_area:
      name: Área de manual de produto
      description: Especifica o tópico de um manual de produto, por exemplo, câmara
        e ótica, material de escritório
    product_sterility:
      name: Esterilidade do produto
      description: Indica se um produto é estéril para saúde e segurança
    product_use:
      name: Utilização do produto
      description: Identifica a utilização ou finalidade principal pretendida para
        materiais preciosos ou colecionáveis (p. ex., moeda/moeda corrente, colecionáveis,
        joias, cartões de oferta).
    program_format:
      name: Formato do programa
      description: Descreve o layout dos programas do evento, como folheto ou folha
        avulsa
    projection_design:
      name: Design de projeção
      description: Descreve o padrão ou imagem projetada por um filtro de iluminação
        ou gobo, como texto ou logótipo
    projector_light_source:
      name: Fonte de luz do projetor
      description: Identifica o tipo de fonte de luz num projetor, como LED ou laser
    prop_theme:
      name: Tema de adereço
      description: Identifica o estilo ou género de adereços de cinema e televisão,
        como históricos ou de ficção científica
    propane_application:
      name: Aplicação de propano
      description: Especifica a finalidade do propano, como aquecimento ou grelha
    propeller_blade_design:
      name: Design da pá da hélice
      description: Descreve a configuração das pás numa hélice de embarcação, como
        3 pás ou 4 pás
    prophy_cup_design:
      name: Design de copo de profilaxia
      description: Descreve o design dos copos profiláticos usados em odontologia,
        como escova ou nervuras
    propulsion_type:
      name: Tipo de propulsão
      description: Especifica o método de movimento para equipamentos externos, por
        exemplo, empurrar, rebocar
    protected_component:
      name: Componente protegido
      description: Identifica a parte da máquina de pinball que a cobertura protege
    protection_type:
      name: Tipo de proteção
      description: Identifica o nível de proteção oferecido pelos equipamentos de
        segurança, como Tipo I ou Tipo II
    protective_gear_features:
      name: Recursos de equipamento de proteção
      description: Identifica as características únicas dos equipamentos de proteção,
        como à prova de choque ou antinevoeiro
    protective_mask_design:
      name: Design de máscaras de proteção
      description: Especifica o design de máscaras de proteção, como máscara facial
        inteira ou meia máscara
    protective_mask_features:
      name: Características de máscaras de proteção
      description: Detalha as características exclusivas das máscaras de proteção,
        como alça ajustável ou válvula
    protein_processing_type:
      name: Tipo de processamento de proteína
      description: Especifica como a proteína é refinada ou processada (p. ex., isolada
        vs. concentrada), afetando a pureza, taxa de digestão e a preferência do consumidor
    protein_source:
      name: Fonte de proteína
      description: Identifica a origem primária da proteína utilizada no suplemento
    pstn_connectivity_options:
      name: Opções de conetividade PSTN
      description: Especifica as interfaces de rede telefónica pública comutada (PSTN)
        que um produto suporta, por exemplo, FXO, POTS
    publication_frequency:
      name: Frequência de publicação
      description: Indica a frequência com que uma revista ou jornal é publicado,
        como diária ou mensalmente
    publication_type:
      name: Tipo de publicação
      description: Identifica o tipo de publicação académica ou de pesquisa, como
        um artigo de periódico ou tese
    pull_up_bar:
      name: Barra de elevações
      description: Especifica o tipo de aderência em equipamentos de ginástica, como
        padrão ou bruto
    pump_accessories:
      name: Acessórios para bombas
      description: Identifica itens incluídos nas bombas tira leite, como estojo de
        transporte ou mamadeiras
    pump_speed_settings:
      name: Definições de velocidade da bomba
      description: Especifica os recursos de controle de velocidade, normalmente para
        bombas tira leite; por exemplo, velocidade ajustável
    punching/training_bag_material:
      name: Material do saco de box/treino
      description: Identifica o principal material usado numa bolsa ou estojo, como
        couro ou lona
    puppet_theme:
      name: Tema de fantoche
      description: Categoriza fantoches com base no tema do design, como humano ou
        fantástico
    puppet_type:
      name: Tipo de fantoche
      description: Identifica o estilo do fantoche, como fantoche de mão ou marionete
    push_button_terminal_type:
      name: Tipo de terminal do botão de pressão
      description: Especifica o estilo de ligação elétrica no botão, garantindo compatibilidade
        com chicotes de cabos e abas de ligação rápida durante a instalação
    puzzle_theme:
      name: Tema de puzzle
      description: Descreve o assunto principal ou motivo de um quebra-cabeça, como
        animais ou espaço
    puzzle_type:
      name: Tipo de quebra-cabeças
      description: Identifica o tipo específico de puzzle, como o 3D ou o quebra-cabeças
    quiver_style:
      name: Estilo de aljava
      description: Especifica o estilo da aljava no tiro com arco, por exemplo, quadril,
        costas
    rack_design:
      name: Design de prateleira
      description: Descreve o layout ou estrutura de um rack de vidro, como aberto
        ou compartimento
    rack_format:
      name: Formato de rack
      description: Define o padrão de habitação ou tamanho físico do canal strip para
        colocação em rack ou desktop
    rack_mounting_style:
      name: Estilo de montagem em rack
      description: Descreve o estilo estrutural da montagem em rack (p. ex., prateleira
        fixa, prateleira deslizante, trilhos, painel em branco)
    rack_type:
      name: Tipo de suporte
      description: Identifica o estilo do rack de armazenamento de um veículo, como
        porta-malas ou tejadilho
    rack_width_standard:
      name: Padrão de largura do rack
      description: Define o padrão da indústria de largura de montagem horizontal
        que o produto segue
    racket_balance:
      name: Equilíbrio da raquete
      description: Indica a distribuição de peso de uma raquete, por exemplo, cabeça
        pesada, equilíbrio uniforme
    racket_gauge:
      name: Calibre de raquete
      description: Especifica a espessura das cordas da raquete de ténis, por exemplo,
        16
    racket_head_shape:
      name: Forma da cabeça da raquete
      description: Define a forma da cabeça da raquete, por exemplo, oval, isométrica
    racket_material:
      name: Material da raquete
      description: Especifica o tipo de material de que é feita ou raquete desportiva,
        como madeira ou fibra de carbono
    racket_string_design:
      name: Design das cordas da raquete
      description: Identifica a construção das cordas em raquetes de ténis, como monofilamento
        e multifilamento
    racket_string_material:
      name: Material das cordas da raquete
      description: Especifica a composição das cordas da raquete de ténis, como Kevlar
        ou Poliuretano (PU)
    radar_bands:
      name: Bandas de radar
      description: Especifica as bandas de frequência que um dispositivo de radar
        pode detetar, por exemplo, X, K
    radar_technology:
      name: Tecnologia de radar
      description: Especifica a tecnologia de radar usada em um produto, por exemplo,
        impulso, estado sólido
    radio_case_design:
      name: Design da caixa do rádio
      description: Define o estilo ou a funcionalidade dos estojos de transporte de
        rádio, como fixos ou giratórios
    radio_features:
      name: Funcionalidades de rádio
      description: Especifica os recursos exclusivos de um rádio, como suporte a GPS
        ou reprodução de MP3
    radio_form_factor:
      name: Formato do rádio
      description: Identifica a classe física do transcetor amador, influenciando
        as opções de montagem, os requisitos de energia e os cenários de uso típicos
    radio_scanner_form_factor:
      name: Formato do scanner de rádio
      description: Indica a configuração física ou estilo de montagem do scanner de
        rádio (p. ex., portátil, base, desktop, montado em veículo)
    radiology_compatibility:
      name: Compatibilidade radiológica
      description: Indica se a ortótese pode permanecer no paciente durante procedimentos
        de imagem (p. ex., RM, TC, raio-X)
    raid_levels_supported:
      name: Níveis RAID suportados
      description: Lista todas as configurações RAID que a matriz de discos rígidos
        pode criar ou gerir
    ramp_type:
      name: Tipo de rampa
      description: Especifica o design ou estilo das rampas de skate, como half-pipe
        ou fun box
    range_type:
      name: Tipo de alcance
      description: Define a área de cobertura de dispositivos como monitores para
        bebés, como os de longo alcance
    rarity:
      name: Raridade
      description: Especifica a exclusividade dos produtos, normalmente para artigos
        colecionáveis; por exemplo, edição limitada, ultra rara
    razor_flexibility:
      name: Flexibilidade da lâmina
      description: Indica a flexibilidade de lâminas e aparadores, por exemplo, flexíveis
        ou fixos
    razor_head_design:
      name: Design da cabeça da lâmina
      description: Define o número de lâminas de uma máquina de barbear, por exemplo,
        simples, tripla
    razor_type:
      name: Tipo de lâmina de barbear
      description: 'Especifica o design da lâmina de barbear, por exemplo, reta ou
        sintética '
    read/write_speed:
      name: Velocidade de leitura/escrita
      description: Indica taxa ou velocidade de transferência de dados, normalmente
        para duplicadores de disco; por exemplo, 4x, 52x
    reading_toy_type:
      name: Tipo de brinquedo de leitura
      description: Especifica o tipo de brinquedo educativo de leitura, por exemplo,
        jogo de ortografia, tablet de leitura
    receipt_paper_features:
      name: Características do papel de recibo
      description: Identifica recursos exclusivos do papel de recibo, como indicador
        de fim de rolo ou logótipo pré-impresso
    reclining_function:
      name: Função reclinável
      description: Descreve recursos reclináveis específicos, como reclinação total
        ou gravidade zero
    recommended_age_group:
      name: Faixa etária recomendada
      description: Identifica a faixa etária adequada para um produto, normalmente
        brinquedos e jogos; por exemplo, bebés, adolescentes
    recommended_skill_level:
      name: Nível de capacidade recomendado
      description: Especifica o nível de habilidade, por exemplo, iniciante, especialista
    recommended_use:
      name: Uso recomendado
      description: Identifica o uso ou domínio principal para o qual um produto de
        hardware foi projetado, por exemplo, industrial, residencial
    record_cleaning_components_included:
      name: Componentes de limpeza de discos incluídos
      description: Lista os itens específicos fornecidos no kit para que os clientes
        possam comparar pacotes rapidamente (p. ex., escova, fluido, pano)
    recorder_fingering_system:
      name: Sistema de posições de dedos de flauta de bisel
      description: Especifica o tipo de sistema de dedilhado da flauta doce, por exemplo,
        alemão, barroco
    recorder_specialized_features:
      name: Características especializadas de gravador
      description: Identifica recursos avançados em gravadores de vídeo, por exemplo,
        suporte inteligente e Dolby Atmos
    recording_accessories_included:
      name: Acessórios de gravação incluídos
      description: Detalha os componentes extras incluídos nos pacotes de gravação,
        como fones de ouvido ou microfone
    recording_capability_type:
      name: Tipo de capacidade de gravação
      description: Indica se o recetor pode gravar conteúdo de TV e o método utilizado
        (p. ex., USB PVR, HDD interno, nuvem)
    recording_functionality:
      name: Funcionalidade de gravação
      description: Indica se e como o recetor pode gravar conteúdo de TV (p. ex.,
        DVR para HDD interno, USB externo)
    recording_mode:
      name: Modo de gravação
      description: Lista os modos operacionais que o gravador suporta (p. ex., contínuo,
        gravação cronometrada)
    recording_quality:
      name: Qualidade de gravação
      description: Descreve a clareza de áudio de transcritores e sistemas de ditado,
        como baixa ou alta
    recording_speed_modes_supported:
      name: Modos de velocidade de gravação suportados
      description: Lista os modos de velocidade de fita que o videogravador pode gravar
        ou reproduzir, afetando o tempo de gravação e a qualidade da imagem
    recreational_vehicle_type:
      name: Tipo de veículo recreativo
      description: Identifica a categoria de um veículo recreativo, como Classe A
        ou trailer de viagem
    reed_strength:
      name: Resistência da palheta
      description: Indica a flexibilidade das palhetas de sopro, como suave, média
        ou dura
    reel_capacity:
      name: Capacidade da bobina
      description: Especifica a capacidade de uma bobina num tanque em desenvolvimento,
        como simples ou quádruplo
    reflector_design:
      name: Design de refletor
      description: Descreve o design de um refletor de flash, como um favo de mel
        ou um guarda-chuva
    regenerative_braking_features:
      name: Recursos de frenagem regenerativa
      description: Descreve os recursos dos módulos de frenagem regenerativa EV, por
        exemplo, resistência às intempéries, fácil de instalar
    region:
      name: Região
      description: Identifica o local específico de origem do produto, normalmente
        para vinhos e bebidas espirituosas; por exemplo, Califórnia, Bordeaux
    region_code:
      name: Código de região
      description: Especifica a região onde um software de videojogos está licenciado
        para uso, como Ásia (AS) ou Global (GL)
    release_mechanism:
      name: Mecanismo de libertação
      description: Indica a tecnologia de entrega ou absorção da vitamina (p. ex.,
        libertação sustentada, lipossomal, mastigável)
    release_schedule:
      name: Agenda de lançamento
      description: Especifica a frequência com que novos episódios ou atualizações
        são lançados, por exemplo, semanalmente, quinzenalmente
    remote_control_functions:
      name: Funções de controlo remoto
      description: Lista as ações específicas que o obturador remoto pode acionar
        para além de tirar fotografias
    remote_shutter_form_factor:
      name: Fator de forma do obturador remoto
      description: Identifica o estilo físico ou a estrutura do obturador remoto,
        como chaveiro/botão, controlador de anel ou bastão de selfie com obturador
        integrado
    remote_technology:
      name: Tecnologia remota
      description: Identifica a tecnologia usada nos controlos remotos da câmara,
        como Bluetooth ou Tethered
    removable_storage_formats_supported:
      name: Formatos de armazenamento removíveis suportados
      description: Define os formatos de armazenamento removíveis com os quais um
        dispositivo é compatível, por exemplo, SD, microUSB
    removal_target:
      name: Alvo de remoção
      description: Especifica quais os produtos de unhas o removedor foi concebido
        para dissolver (p. ex., verniz em gel, unhas acrílicas, pó de imersão)
    replacement_lamp_type:
      name: Tipo de lâmpada de substituição
      description: Classifica o estilo da peça de reposição fornecida (p. ex., módulo
        de lâmpada e habitação, tira de retroiluminação LED, montagem CCFL)
    reptile/amphibian_food_form:
      name: Comida para répteis e anfíbios
      description: Especifica a forma de alimento para répteis/anfíbios, por exemplo,
        liofilizado ou pellets
    reptile/amphibian_habitat_supply_type:
      name: Tipo de fornecimento de habitat para répteis e anfíbios
      description: Identifica o tipo de aquecimento ou fornecimento de iluminação
        para habitats de répteis/anfíbios, como uma lâmpada de calor ou lâmpada UVB
    research_focus:
      name: Foco de pesquisa
      description: Identifica a principal área de estudo em trabalhos académicos,
        como biologia ou economia
    research_methodology:
      name: Metodologia de pesquisa
      description: Identifica o tipo de métodos de pesquisa utilizados em trabalhos
        académicos, como pesquisa ou qualitativo
    resistance_level:
      name: Nível de resistência
      description: Indica o nível de resistência do produto, normalmente para faixas
        elásticas; por exemplo, muito pesado
    resistance_system:
      name: Sistema de resistência
      description: Define o mecanismo usado para criar resistência em equipamentos
        de ginástica, por exemplo, água, ar
    resistance_tolerance:
      name: Tolerância de resistência
      description: Define o desvio permitido da resistência real do seu valor nominal,
        expresso em percentagem (p. ex., ±1%)
    restrictor_gate_shape:
      name: Formato do portão limitador
      description: Define a forma geométrica do portão limitador incluído com ou requerido
        pelo joystick
    result_display:
      name: Apresentação de resultado
      description: Especifica o formato do teste de gravidez, por exemplo, baseado
        em linha, digital
    retail/sale_sign_design:
      name: Design de sinal de retalho/venda
      description: Indica o tipo de mensagem nos sinais de venda a retalho ou de venda,
        por exemplo, venda, oferta especial
    reticle_plane:
      name: Plano retículo
      description: Especifica o plano focal do retículo em miras telescópicas e miras
        de armas, por exemplo, primeiro ou segundo
    reticle_type:
      name: Tipo de retículo
      description: Identifica o tipo de retículo em miras de armas, como Duplex ou
        Mildot
    rewinder_operation_mode:
      name: Modo de operação do rebobinador
      description: Define os modos funcionais que o rebobinador suporta (p. ex., apenas
        rebobinar, rebobinar e avanço rápido)
    rf_output_standard:
      name: Padrão de saída RF
      description: Especifica o padrão de transmissão de televisão ou rádio que o
        modulador produz
    rfid_frequency:
      name: Frequência RFID
      description: Especifica a frequência operacional de produtos RFID, por exemplo,
        baixa, ultra-alta
    riding_style:
      name: Estilo de deslize
      description: Especifica o uso pretendido ou estilo de pilotagem para equipamentos
        de desportos de inverno, por exemplo, slalom, estilo livre
    riding_toy_propulsion_type:
      name: Tipo de propulsão de brinquedo de cavalgar
      description: Identifica como um brinquedo de montaria é impulsionado, como elétrico
        ou a pedal
    rim/wheel_design:
      name: Design do aro/roda
      description: Descreve o estilo ou construção de aros/rodas de veículos, como
        liga leve ou raiadas
    ring_design:
      name: Desenho de anel
      description: Descreve o estilo de um anel, como banda ou solitário
    ring_size:
      name: Tamanho do anel
      description: Especifica o tamanho de um anel, como L ou 6,5
    rinse_requirement:
      name: Necessidade de enxaguar
      description: Esclarece se o produto de limpeza requer enxaguamento, se pode
        ser deixado a atuar ou se não requer remoção ex., água micelar)
    rise_height_class:
      name: Classe de altura de elevação
      description: Categoriza quanto de altura adicional a empunhadura adiciona em
        relação ao analógico padrão (p. ex., baixa elevação, média elevação, alta
        elevação)
    riser_color:
      name: Cor do riser
      description: Identifica a cor do riser nos arcos de tiro com arco, por exemplo,
        preto ou azul
    riser_material:
      name: Material do apoio
      description: Especifica o material de um arco ou arco de besta, como fibra de
        carbono ou madeira
    riser_pattern:
      name: Padrão do riser
      description: Descreve o desenho ou motivo no riser de arcos e bestas, como camuflagem
        ou textura
    rivet_form:
      name: Forma de rebite
      description: Descreve a forma dos rebites de ferragem, por exemplo, sólidos,
        divididos
    road_sign_design:
      name: Design de sinal de estrada
      description: Identifica o tipo de informação exibida num sinal de trânsito,
        por exemplo, stop, limite de velocidade
    robe_style:
      name: Estilo de roupão
      description: Especifica o tipo de design geral ou estilo de construção do roupão,
        como roupão de spa ou cruzado
    rock_composition:
      name: Composição rochosa
      description: Especifica a composição geológica de uma rocha, como mármore ou
        calcário
    rock_formation:
      name: Formação rochosa
      description: Especifica a classificação geológica de rochas, como ígneas ou
        sedimentares
    rocker_type:
      name: Tipo de balancim
      description: Especifica o estilo de curvatura de pranchas de snowboard ou esquis,
        por exemplo, plano, rocker
    rod_color:
      name: Cor da haste
      description: Identifica a cor de uma cana de pesca, por exemplo, preta ou azul
    rod_material:
      name: Material da cana
      description: Identifica o material utilizado nos artigos desportivos à base
        de canas, como a grafite ou a fibra de vidro
    rod_pattern:
      name: Padrão da haste
      description: Descreve o desenho ou estampa numa cana de pesca, como camuflagem
        ou listrada
    rod_shape:
      name: Forma do varão
      description: Define a forma ou configuração das hastes de chuveiro, por exemplo,
        retas, em forma de U
    roller_head:
      name: Cabeça do rolo
      description: Define o número de cabeças nos rolos, normalmente para ferramentas
        de cuidados com a pele; por exemplo, simples, duplo
    roller_material:
      name: Material do rolo
      description: Especifica o material usado num rolo, normalmente para ferramentas
        de cuidados com a pele; por exemplo, jade, silicone
    roller_type:
      name: Tipo de rolo
      description: Identifica o tipo de rolo, normalmente para ferramentas de cuidados
        com a pele; por exemplo, gelo, microagulha
    roof_decor_shape:
      name: Formato da decoração de telhado
      description: Define o design ou forma das decorações do telhado, como cavalo
        ou veleiro
    room_correction_technology:
      name: Tecnologia de correção de sala
      description: Especifica o sistema de calibração acústica ou correção de sala
        automática integrado no recetor
    rosin_form:
      name: Forma da resina
      description: Descreve o formato da resina de arco para instrumentos de corda,
        como bloco ou bolo
    rosin_grade:
      name: Grau de resina
      description: Especifica o tipo de resina usada para instrumentos de corda, por
        exemplo, escura, média
    rotating_direction:
      name: Direção de rotação
      description: Especifica a direção de giro das brocas e chaves de fenda, como
        esquerda ou direita
    rotation_direction:
      name: Direção de rotação
      description: Indica se a lixa elétrica suporta rotação para a frente, rotação
        inversa ou ambas
    rotator_control_technology:
      name: Tecnologia de controlo do rotor
      description: Define o mecanismo de controlo dos rotadores de antena, como manual
        ou motorizado
    route_of_administration:
      name: Via de administração
      description: Identifica como o produto é aplicado ou consumido, influenciando
        eficácia e segurança (p. ex., oral, tópica, adesivo transdérmico, sublingual,
        injeção intramuscular)
    rug/mat_features:
      name: Características do tapete
      description: Descreve as características especiais de carpetes/tapetes, como
        base antiderrapante ou secagem rápida
    rug/mat_material:
      name: Material do tapete
      description: Especifica o tipo de material utilizado em carpetes ou tapetes,
        como borracha ou microfibra
    rug/mat_shape:
      name: Formato do tapete
      description: Especifica o formato de esteiras e tapetes, por exemplo, corredor,
        quadrado
    rug_features:
      name: Características do tapete
      description: Descreve características específicas de tapetes, como base antiderrapante
        ou cores resistentes a UV
    rug_material:
      name: Material do tapete
      description: Identifica o principal material usado no fabrico de um tapete,
        como lã ou juta
    rug_shape:
      name: Formato do tapete
      description: Identifica o desenho geométrico dos tapetes, como quadrado ou corredor
    rum_grade:
      name: Grau de rum
      description: Classifica o rum com base em características ou qualidade, por
        exemplo, premium, condimentado
    saddle_base_color:
      name: Cor da base do selim
      description: Identifica a cor primária da base do selim de uma bicicleta, como
        preto ou azul
    saddle_base_material:
      name: Material da base do selim
      description: Identifica o material utilizado na base do selim da bicicleta,
        como aço ou fibra de carbono
    saddle_base_pattern:
      name: Padrão da base do selim
      description: Descreve o design ou estampa numa base base de selim de bicicleta,
        como um abstrato ou logótipo
    saddle_material:
      name: Material do selim
      description: Especifica o material usado em selins de bicicleta, como borracha
        ou couro
    saddle_seat_color:
      name: Cor do assento do selim
      description: Especifica a cor do assento do selim da bicicleta, como prateado
        ou vermelho
    saddle_seat_material:
      name: Material do assento do selim
      description: Identifica o material utilizado na construção do selim de bicicleta,
        como couro ou nylon
    saddle_seat_pattern:
      name: Padrão do assento do selim
      description: Descreve o design ou estampa numa base base de selim de bicicleta,
        como floral ou geométrico
    safety_certifications:
      name: Certificações de segurança
      description: Indica a conformidade do produto com os padrões de segurança, normalmente
        para produtos para bebés; por exemplo, sem BPA
    safety_device_installation:
      name: Instalação de dispositivo de segurança
      description: Define como os produtos de segurança são montados ou fixados, por
        exemplo, adesivos, montados com parafusos
    safety_equipment_material:
      name: Material do equipamento de segurança
      description: Especifica o tipo de material nos artigos de segurança do veículo,
        como nylon ou fibra de vidro
    safety_rail_installation:
      name: Instalação de calha de segurança
      description: Define como os trilhos de segurança são instalados, como ajustáveis
        ou permanentes
    sailboat_type:
      name: Tipo de barco à vela
      description: Identifica a conceção ou o modelo específico de um veleiro, como
        o sloop ou o cutter
    sandal_style:
      name: Estilo de sandália
      description: Especifica o estilo das sandálias, como tira no tornozelo ou fitas
        de laços
    sandblaster_application:
      name: Aplicação Sandblaster
      description: Define a função pretendida das ferramentas de decapagem, como polir
        ou lixar
    sander_type:
      name: Tipo de lixadeira
      description: Classifica o tipo de ferramenta de lixadeira, por exemplo, correia,
        orbital aleatório
    sanding_application:
      name: Aplicação de lixamento
      description: Especifica a finalidade dos acessórios de lixamento, como acabamento
        ou remoção de tinta
    satellite_coverage_area:
      name: Área de cobertura por satélite
      description: Define as regiões geográficas que um telefone via satélite pode
        acessar, como Austrália ou África
    satellite_messaging_capability:
      name: Capacidade de mensagem via satélite
      description: Indica se o produto suporta mensagens via satélite unidirecional
        (apenas saída) ou bidirecional (enviar e receber)
    satellite_navigation_systems_supported:
      name: Sistemas de navegação por satélite suportados
      description: Especifica quais os sistemas globais de navegação por satélite
        (GNSS) que o telefone pode receber para posicionamento e rastreamento
    satellite_network_type:
      name: Tipo de rede de satélite
      description: Identifica o provedor de serviços para telefones via satélite,
        por exemplo, Inmarsat, Iridium
    sauna_accessories_included:
      name: Acessórios de sauna incluídos
      description: Identifica os itens adicionais incluídos na sauna, como uma concha
        ou pedras de sauna
    scaffolding_mounting_type:
      name: Tipo de montagem de andaime
      description: Especifica o estilo de configuração do andaime, por exemplo, estrutura,
        móvel
    scale_material:
      name: Material de escala
      description: Identifica o material utilizado numa balança, tipicamente um compasso
        de calibre; por exemplo, aço inoxidável, plástico
    scale_model_accessory_type:
      name: Tipo de acessório de modelo à escala
      description: Identifica o tipo de acessório para maquetes, como edifícios ou
        figuras
    scale_model_kit_type:
      name: Tipo de kit de modelo de balança
      description: Especifica a categoria do kit de modelo à escala, como um tanque
        ou uma nave espacial
    scale_model_material:
      name: Material do modelo de balança
      description: Identifica o principal material utilizado em maquetes, como madeira
        ou cartolina
    scale_model_theme:
      name: Tema de modelo à escala
      description: Identifica o tema de um modelo em escala, como fantasia ou história
    scalp_concern:
      name: Preocupação com o couro cabeludo
      description: Especifica o problema principal do couro cabeludo ou do cabelo
        que o tratamento é formulado para tratar
    scalpel_blade_material:
      name: Material da lâmina do bisturi
      description: Identifica a composição de lâminas de bisturi, como aço inoxidável
        ou titânio
    scalpel_blade_number:
      name: Número da lâmina do bisturi
      description: Identifica o número ou tipo específico de lâmina de bisturi, como
        10 ou 15A
    scalpel_blade_shape:
      name: Forma da lâmina do bisturi
      description: Descreve o formato da lâmina do bisturi, como curva ou reta
    scalpel_handle_number:
      name: Número do cabo do bisturi
      description: Identifica o número do cabo específico para bisturis, como 4 ou
        3L
    scan_converter_features:
      name: Características do conversor do leitor
      description: Destaca as características únicas de um conversor de digitalização,
        como a calibração automática de imagens ou o controlo remoto
    scanner_features:
      name: Características do leitor
      description: Destaca as funções especiais de um scanner, como o alimentado por
        IA ou a digitalização para a nuvem
    scanner_grip_compatibility:
      name: Compatibilidade de empunhadura do scanner
      description: Indica se o estojo se ajusta a scanners com alça de pistola/gatilho,
        formato portátil padrão ou ambos
    scanner_maintenance_kit_type:
      name: Tipo de kit de manutenção do scanner
      description: Classifica a natureza do produto para que os compradores possam
        distinguir rapidamente entre cartões de limpeza, kits completos, kits de calibração,
        conjuntos de rolos, lenços e soluções
    scanner_sensor_type:
      name: Tipo de sensor do leitor
      description: Especifica o tipo de sensor em scanners, como gerador de imagens
        2D ou laser
    scarf/shawl_style:
      name: Modelo de lenço/xaile
      description: Identifica o estilo de lenços e xailes, por exemplo, cobertor,
        manta
    scene_modes:
      name: Modos de cena
      description: Define o modo da câmara para capturar diferentes cenários, como
        noturno ou subaquático
    scent:
      name: Aroma
      description: Especifica a fragrância ou aroma de um produto, como baunilha ou
        frutas cítricas
    scissor_blade_type:
      name: Tipo de lâmina de tesoura
      description: Descreve o formato e o estilo das lâminas da tesoura, como curvas
        ou em forma de vieira
    scooter_brake_type:
      name: Tipo de travões de scooter
      description: Especifica o mecanismo e design dos travões de scooters, como disco
        ou tambor
    scope/sight_design:
      name: Design de mira telescópica
      description: Descreve o tipo de design para miras ou miras de armas, por exemplo,
        visão noturna, laser
    scope/sight_features:
      name: Características de âmbito/visão
      description: Descreve as características especiais de miras telescópicas ou
        miras de armas, como retículo iluminado ou gravação de som
    scope_design:
      name: Design do âmbito
      description: Identifica o tipo de conceção das óticas, tais como angulares ou
        retas
    scope_lens_type:
      name: Tipo de lentes de alcance
      description: Identifica o tipo de lente usada em osciloscópios, como HD ou grande
        angular
    scoreboard_features:
      name: Características do painel de avaliação
      description: Descreve as características especiais de um placar, como portátil
        ou resistente às intempéries
    scrapbook_paper_type:
      name: Tipo de papel de álbum de recortes
      description: Identifica o estilo ou o design do papel para álbuns de recortes,
        por exemplo, especial ou com padrões
    screen/display_design:
      name: Design do ecrã/visor
      description: Especifica as características de conceção do ecrã de um produto,
        normalmente para câmaras; por exemplo, visor
    screen_assembly_components_included:
      name: Componentes do conjunto de ecrã incluídos
      description: Esclarece quais peças vêm pré-montadas com o ecrã
    screen_curvature_rating:
      name: Classificação de curvatura do ecrã
      description: Especifica o raio de curvatura de monitores curvos (p. ex., 1000R),
        indicando quão acentuada é a curva
    screen_material:
      name: Material de filtragem
      description: Define o tipo de material utilizado na tela de um produto, por
        exemplo, vidro, policarbonato
    screen_operation_type:
      name: Tipo de operação do ecrã
      description: Descreve o estilo estrutural ou de implantação do ecrã (p. ex.,
        moldura fixa, manual, motorizado, tripé, insuflável)
    screen_protection_features:
      name: Funcionalidades de proteção de ecrã
      description: Detalha como a capa protege o ecrã do telefone além da cobertura
        básica
    screen_protector_adhesion_type:
      name: Tipo de adesão do protetor de ecrã
      description: Especifica o método adesivo ou de fixação utilizado para fixar
        o protetor ao ecrã do telefone
    screen_protector_coverage_style:
      name: Estilo de cobertura do protetor de ecrã
      description: Define o design da cobertura ou formato do protetor relativo ao
        ecrã do dispositivo
    screen_protector_features:
      name: Funcionalidades do protetor de ecrã
      description: Destaca características especiais oferecidas pelo protetor para
        além da prevenção básica de riscos
    screen_protector_finish:
      name: Acabamento do protetor de ecrã
      description: Identifica o acabamento ótico da superfície do protetor (p. ex.,
        brilhante, fosco, privacidade, antirreflexo)
    screen_specialized_features:
      name: Características especializadas de ecrã
      description: Identifica as capacidades únicas de um ecrã de computador, como
        o antirreflexo ou o ecrã tátil
    screen_surface_finish:
      name: Acabamento da superfície do ecrã
      description: Descreve o acabamento da superfície do vidro do ecrã, que influencia
        o reflexo e o toque
    seafood_type:
      name: Tipo de peixe/marisco
      description: Classifica produtos de frutos do mar por espécie, como atum ou
        lagosta
    seal_stamp_design:
      name: Design de carimbo de selo
      description: Especifica o estilo de um carimbo, por exemplo, monograma ou caligrafia
    season:
      name: Estação do ano
      description: Indica a estação para a qual o produto é mais adequado, como verão
        ou outono
    seat_color:
      name: Cor do assento
      description: Especifica a cor da área de assento de um produto, como preto ou
        verde
    seat_cushioning:
      name: Almofadamento de assento
      description: Descreve o tipo de amortecimento em produtos de assento, como acolchoados
        ou não acolchoados
    seat_pattern:
      name: Padrão do assento
      description: Especifica o motivo visual em produtos de assento, como estrelas
        ou pontos
    seat_reservation:
      name: Reserva de assento
      description: Especifica se o bilhete inclui atribuição de assento ou requer
        reserva antecipada
    seat_rotation:
      name: Rotação do assento
      description: Indica se o assento gira e as posições de bloqueio disponíveis
    seat_shape:
      name: Formato de assento
      description: Descreve a forma da área de assento de um produto, como redonda
        ou retangular
    seat_structure:
      name: Estrutura do assento
      description: Define a construção de um assento, por exemplo, vime, sólido
    seat_swivel_mechanism:
      name: Mecanismo giratório do assento
      description: Indica se e como o assento pode girar nos patamares para transferências
        mais seguras
    seat_type:
      name: Tipo de assento
      description: 'Descreve o design de uma cadeira ou banco corrido, como acolchoado
        ou balde '
    seat_upholstery_color:
      name: Cor do tecido dos estofos
      description: Identifica a cor do estofo do assento de um móvel, por exemplo,
        bege ou azul
    seat_upholstery_material:
      name: Material de estofo do assento
      description: Define o tecido ou material utilizado para revestimentos de sofás,
        como microfibra ou couro sintético
    seat_upholstery_pattern:
      name: Padrão do tecido dos estofos
      description: Identifica o desenho ou motivo no tecido de um sofá, como paisley
        ou redemoinho
    security_algorithms:
      name: Algoritmos de segurança
      description: 'Especifica os métodos de criptografia usados pela eletrónica,
        por exemplo, AES '
    security_level:
      name: Nível de segurança
      description: Especifica o padrão de segurança de itens como fechaduras e trincos,
        por exemplo, baixo, médio, alto
    selfie_stick_functionality_type:
      name: Tipo de funcionalidade do bastão de selfie
      description: Define a funcionalidade principal do produto (p.ex., bastão, combinação
        bastão-tripé, com estabilizador)
    semiconductor_material:
      name: Material semicondutor
      description: Identifica o material do substrato semicondutor base usado no componente,
        afetando a velocidade de comutação, tensão de rutura e comportamento térmico
    sensation_effect:
      name: Efeito de sensação
      description: Descreve qualquer efeito sensorial adicional que o lubrificante
        fornece (p. ex., aquecimento, dormência)
    sensor/measuring_tool_features:
      name: Características da ferramenta do sensor/ medição
      description: Descreve as características únicas de um sensor ou ferramenta de
        medição, como portátil ou inteligente
    sensor_features:
      name: Características do sensor
      description: Descreve os recursos específicos do sensor de um produto, como
        iluminação de fundo ou câmara integrada
    sensor_type:
      name: Tipo de sensor
      description: Identifica o tipo de sensor usado em dispositivos de segurança
        ou proteção, por exemplo, infravermelho, ultrassónico
    sensory_effect:
      name: Efeito sensorial
      description: Indica a sensação física imediata que o produto proporciona ao
        ser aplicado
    sequin/glitter_shape:
      name: Formato lantejoulas/glitter
      description: Descreve a forma das lantejoulas ou brilhos, como redondas ou quadradas
    sequin_shape:
      name: Formato de lantejoulas
      description: Define o formato das lantejoulas, como redondas ou flor
    serum_target_areas:
      name: Áreas alvo do soro
      description: Especifica as áreas de aplicação pretendidas para um soro, como
        olhos ou rosto
    service_type:
      name: Tipo de serviço
      description: Identifica a categoria de serviços em nuvem, como Plataforma como
        um serviço (PaaS) ou Software como um serviço (SaaS)
    sewing_foot_type:
      name: Tipo de pé de costura
      description: Especifica o estilo de costura, como bordado ou bainha cega
    sewing_machine_part_category:
      name: Categoria de peça de máquina de costura
      description: Classifica o tipo de componente da máquina de costura, como correia
        do motor ou calcador
    sfx_control_technology:
      name: Tecnologia de controlo SFX
      description: Identifica como os dispositivos de efeitos especiais são operados,
        como DMX ou ativados por som
    shaft_color:
      name: Cor de eixo
      description: Especifica a tonalidade da haste em artigos como êmbolos, por exemplo,
        prata ou vermelho
    shaft_flex:
      name: Flexibilidade da haste
      description: Indica o nível de flexibilidade dos eixos dos tacos de golfe, por
        exemplo, rígidos, femininos
    shaft_material:
      name: Material de eixo
      description: Identifica o material utilizado no eixo das ferramentas, como madeira
        ou metal
    shaft_orientation:
      name: Orientação do eixo
      description: Identifica a direção do eixo em motores pequenos, por exemplo,
        horizontal ou vertical
    shaft_pattern:
      name: Padrão de luz
      description: Indica o motivo visual na haste dos itens, normalmente êmbolos;
        por exemplo, folhas, pássaros
    shampoo/conditioner_effect:
      name: Efeito Shampoo/Condicionador
      description: Descreve o resultado pretendido do uso do shampoo ou condicionador,
        como anticaspa ou hidratante
    shampoo/conditioner_items_included:
      name: Artigos shampoo/condicionador incluídos
      description: Identifica o tipo de artigos num conjunto de champô e amaciador,
        por exemplo, champô 2 em 1
    shampoo_type:
      name: Tipo de champô
      description: Classifica os shampoos com base na sua formulação, como pó ou 2
        em 1
    shape:
      name: Forma
      description: Descreve a forma geométrica ou formato de um produto, como redondo
        ou em coração
    shapewear_support_level:
      name: Nível de suporte de vestuário modelador
      description: Indica o nível de compressão dos itens modeladores, por exemplo,
        nível 1
    shaving_cream_formulation:
      name: Formulação do creme de barbear
      description: Especifica a textura dos cremes de barbear, como gel ou espuma
    shaving_kit_components:
      name: Componentes do kit de barbear
      description: Especifica os artigos incluídos num kit de barbear, como lâmina
        de barbear ou pincel
    sheen/gloss_level:
      name: Nível de lustro/brilho
      description: Especifica o nível de brilho de produtos de tinta ou verniz, como
        semibrilhante ou acetinado
    sheet_color:
      name: Cor da folha
      description: Identifica a cor dos produtos de papel, por exemplo, branco, azul
    sheet_mask_material:
      name: Material da máscara de tecido
      description: Especifica o principal material ou substrato de máscaras de tecido
        ou hidrogel
    sheet_pattern:
      name: Padrão de folha
      description: 'Descreve o design ou impressão em produtos de papel, como xadrez
        ou arco-íris '
    shelf_color:
      name: Cor da prateleira
      description: Descreve a cor da prateleira de um produto, como bege ou preto
    shelf_material:
      name: Material de prateleira
      description: Identifica o tipo de material utilizado na construção das prateleiras,
        como madeira ou metal
    shelf_pattern:
      name: Padrão da prateleira
      description: Descreve o design ou motivo em prateleiras industriais, como abstrato
        ou Chevron
    shell/frame_color:
      name: Cor da prateleira/estrutura
      description: Especifica a cor da carcaça ou da armação em itens como patins
        ou capacetes, por exemplo, preto, azul
    shell/frame_material:
      name: Material da prateleira/estrutura
      description: Especifica a composição da carcaça ou estrutura de um produto,
        normalmente para patins ou patins em linha; por exemplo, borracha, compósito
    shell/frame_pattern:
      name: Padrão da prateleira/estrutura
      description: Descreve o design ou a impressão no revestimento ou na estrutura
        de um produto, normalmente patins em linha
    shingle/tile_material:
      name: Material de telha/ladrilho
      description: Identifica a composição de telhas ou ladrilhos, como cimento ou
        borracha
    shoe_binding_type:
      name: Tipo de fixador de sapatos
      description: Define o mecanismo usado para fixar as sapatas ao equipamento,
        como entrada ou entrada rápida
    shoe_features:
      name: Características do calçado
      description: Identifica as características especiais do calçado, como impermeáveis
        ou leves
    shoe_fit:
      name: Encaixe de calçado
      description: Define a largura do calçado, como estreito ou largo
    shoe_size:
      name: Tamanho de calçado
      description: Usado para definir o tamanho do calçado, por exemplo, Extra grande
        (XL), 9,5
    shooting_modes:
      name: Modos de disparo
      description: Especifica as configurações operacionais da câmara, como modo de
        cena ou filme
    shopping_bag_material:
      name: Material de saco das compras
      description: Especifica o tipo de material utilizado em sacos de compras, por
        exemplo, papel, materiais biodegradáveis
    shower_base_design:
      name: Design de base de chuveiro
      description: Especifica o design de bases de chuveiro, como angular ou quadrante
    shower_cap_lining_material:
      name: Material do forro da touca de banho
