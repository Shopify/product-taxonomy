      name: Tipo de absorvente para incontinência
      description: Define o estilo ou forma específica do absorvente (p. ex., protetor,
        guarda, absorvente auxiliar)
    inductance_tolerance:
      name: Tolerância de indutância
      description: Define o desvio percentual permitido do valor nominal de indutância
    industry_focus:
      name: Foco da indústria
      description: Destaca os setores a que se destina um produto, como educação ou
        manufatura
    infant_age_group:
      name: Grupo etário dos bebés
      description: Classifica produtos adequados para faixas etárias específicas de
        bebés, por exemplo, recém-nascidos, 0-6 meses
    inflation_method:
      name: Método de inflação
      description: Identifica como um produto é insuflado, como automático ou hidrostático
    ingredient_category:
      name: Categoria dos ingredientes
      description: Classifica o tipo de ingredientes em vitaminas e suplementos, por
        exemplo, fibras, ervas
    ingredient_origin:
      name: Origem do ingrediente
      description: Especifica a origem dos ingredientes do produto, por exemplo, natural,
        sintético
    ingredient_pathway:
      name: Origem dos ingredientes
      description: Indica se os ingredientes usados na perfumaria foram extraídos
        de ingredientes naturais e sem alteração química, ou sintetizados por outros
        métodos
    ingredients:
      name: Ingredientes
      description: Especifica os componentes utilizados na formulação de um produto,
        por exemplo, óxido de zinco, aloé vera
    ingress_protection_ip_rating:
      name: Classificação de proteção de entrada (IP)
      description: Fornece a classificação oficial IP de resistência à água/poeira
        com a qual a caixa está em conformidade (por exemplo, IP68)
    ink_application_technique:
      name: Técnica de aplicação de tinta
      description: Descreve o método usado para aplicar tinta em artes e ofícios,
        como serigrafia
    ink_color:
      name: Cor da tinta
      description: Identifica a cor da tinta, normalmente para material de escritório;
        por exemplo, preto, prata
    ink_form:
      name: Forma de tinta
      description: Descreve a embalagem ou o método de entrega da tinta artística,
        como caneta ou frasco
    ink_pattern:
      name: Padrão de tinta
      description: Identifica o tema visual de canetas ou carimbos, por exemplo, geométrico,
        natalício
    ink_type:
      name: Tipo de tinta
      description: Identifica o tipo de tinta usada num produto, como à base de solvente
        ou corante
    inline_skating_style:
      name: Estilo patins em linha
      description: Define o estilo específico de patinagem em linha para o qual o
        produto foi projetado, como patinagem em linha recreativa ou de velocidade
    input/output_ports:
      name: Portas de entrada/saída
      description: Identifica os tipos de portas disponíveis num dispositivo, como
        USB ou conector de saída
    input_connection:
      name: Ligação de entrada
      description: Especifica o tipo de conexão de entrada para cabos de áudio, como
        3,5 mm ou RCA
    input_connection_type:
      name: Tipo de ligação de entrada
      description: Especifica o conector ou padrão de interface aceite no lado da
        entrada do conversor
    input_signal_interface:
      name: Interface do sinal de entrada
      description: Especifica o(s) tipo(s) de liagação(ões) de entrada que o conversor
        de áudio aceita
    input_video_interface:
      name: Interface de vídeo de entrada
      description: Especifica o(s) tipo(s) de conector de vídeo aceite(s) como entrada
        pelo conversor de scan
    insole_length_type:
      name: Tipo de comprimento da palmilha
      description: Define a cobertura ou estilo de comprimento da palmilha
    installation_accessories_included:
      name: Acessórios de instalação incluídos
      description: Identifica quaisquer ferramentas ou materiais instrucionais incluídos
        com a bateria para auxiliar na instalação
    installation_tools_included:
      name: Ferramentas de instalação incluídas
      description: Lista quaisquer ferramentas ou consumíveis incluídos com a peça
        para auxiliar na instalação
    instruction_set_architecture:
      name: Arquitetura do conjunto de instruções
      description: Define a arquitetura do computador que um processador pode entender,
        por exemplo, 32 bits
    instrument/accessory_finish:
      name: Acabamento do instrumento/acessório
      description: Descreve o tratamento superficial ou a cor de um instrumento musical
        ou acessório, como folheado a ouro ou lacado
    instrument_accessory_material:
      name: Material acessório do instrumento
      description: Identifica o material usado em acessórios de instrumentos musicais,
        como madeira ou latão
    instrument_bow_material:
      name: Material do arco do instrumento
      description: Identifica o material utilizado na construção do arco de um instrumento
        musical, como fibra de carbono ou pau-brasil
    instrument_color:
      name: Cor do instrumento
      description: Identifica a cor de um instrumento musical, como preto ou prateado
    instrument_controller_type:
      name: Tipo de controlador de instrumento
      description: Identifica o instrumento musical simulado por um controlador de
        jogo, como guitarra ou microfone
    instrument_material:
      name: Material do instrumento
      description: Identifica o material utilizado na construção de um instrumento
        musical, como madeira de ácer ou latão
    instrument_part_material:
      name: Material da peça do instrumento
      description: Especifica o tipo de material usado nas peças do instrumento, como
        madeira de ébano ou folheado a ouro
    instrument_pattern:
      name: Padrão do instrumento
      description: Descreve o design visual ou motivo de um instrumento musical, como
        sólido ou textura
    instrument_string_color:
      name: Cor das cordas do instrumento
      description: Identifica a cor das cordas de instrumentos musicais, como dourado
        ou prateado
    instrument_string_material:
      name: Material das cordas do instrumento
      description: Especifica a composição das cordas de instrumentos musicais, como
        bronze ou fluorocarbono
    instrument_string_pattern:
      name: Padrão das cordas do instrumento
      description: Indica o padrão nas cordas da guitarra, como sólido ou geométrico
    instrument_support_type:
      name: Tipo de suporte do instrumento
      description: Identifica o tipo de suporte usado para um instrumento musical,
        como uma alça para pescoço ou suporte para partitura
    insulation_material:
      name: Material isolante
      description: Especifica a composição do isolamento, como lã mineral ou poliuretano
        (PU)
    integrated_led_lighting:
      name: Iluminação LED integrada
      description: Indica se o altifalante incorpora iluminação LED ou RGB integrada
        e o seu tipo
    integrated_power/charging_options:
      name: Opções integradas de energia/carregamento
      description: Especifica se o suporte inclui tomadas elétricas embutidas e/ou
        portas de carregamento USB, aumentando a utilidade para dispositivos ligados
    integrated_stand_type:
      name: Tipo de suporte integrado
      description: Descreve o estilo do suporte integrado ou mecanismo de suporte
        na caixa
    intended_application:
      name: Aplicação pretendida
      description: Identifica o uso específico de tintas e corantes, por exemplo,
        portas, terraços e vedações
    intended_effect:
      name: Efeito pretendido
      description: Descreve o principal benefício de bem-estar que o suplemento de
        CBD é comercializado para proporcionar
    intended_jewelry_type:
      name: Tipo de joia pretendida
      description: Indica quais tipos de joias o suporte é projetado para segurar
        ou exibir
    intended_surface:
      name: Superfície pretendida
      description: Identifica a superfície principal que o absorvente é projetado
        para proteger
    intercom_communication_type:
      name: Tipo de comunicação do intercomunicador
      description: Classifica o formato fundamental de comunicação suportado pela
        unidade
    intercom_wiring_type:
      name: Tipo de fiação do intercomunicador
      description: Especifica o esquema de cablagem ou comunicação para o qual a unidade
        de altifalante do intercomunicador foi concebida
    interface_type:
      name: Tipo de interface
      description: Identifica o tipo de ligação que um produto utiliza, como Bluetooth
        ou USB
    interior_lining_material:
      name: Material do forro interno
      description: Identifica o material primário que reveste o interior da caixa
        de joias, protegendo joias de riscos e desgaste
    interior_texture:
      name: Textura interior
      description: Define o padrão da superfície interna que ajuda a criar espuma
        dentro da tigela ou caneca
    internal_drive_form_factor_supported:
      name: Fator de forma de disco interno suportado
      description: Indica os tamanhos de disco rígido compatíveis para um dispositivo,
        por exemplo, 2,5 polegadas
    internet_radio_form_factor:
      name: Formato do rádio de internet
      description: Define o estilo físico ou orientação de montagem do rádio de internet
    intimate_apparel_features:
      name: Características de roupas íntimas
      description: Descreve as características especiais de roupas íntimas, como design
        respirável ou ajuste confortável
    inverter_type:
      name: Tipo de inversor
      description: Identifica o tipo de inversor de energia em peças EV, como onda
        senoidal pura ou onda quadrada
    invitation_personalization_design:
      name: Design de personalização de convite
      description: Define as características de design de um convite, por exemplo,
        RSVP incluído, personalizável
    ironing_features:
      name: Características de engomar
      description: Especifica as características especiais de um ferro ou sistema
        de passar roupa, por exemplo, desligamento automático, jato de vapor
    item_condition:
      name: Estado do item
      description: Indica a qualidade de um produto, normalmente veículos ou peças
        de veículos; por exemplo, usado certificado, reformado
    item_material:
      name: Material do item
      description: Especifica a substância primária de um produto, normalmente para
        peças e acessórios de veículos; por exemplo, cobre, fibra de vidro
    item_style:
      name: Estilo do item
      description: Descreve o tema estético ou de design de um produto, como moderno
        ou rústico
    j_cup_type:
      name: Tipo de J-Cup
      description: Define o estilo dos J-cups em equipamentos de levantamento de peso,
        por exemplo, planos, sanduíche
    jaw_advancement_adjustability:
      name: Ajustabilidade do avanço mandibular
      description: Indica se e como a posição da mandíbula inferior fornecida pelo
        dispositivo pode ser ajustada pelo utilizador
    jaw_material:
      name: Material da mandíbula
      description: Identifica o material utilizado na mandíbula de uma ferramenta,
        como aço ou titânio
    jewelry_cleaning_accessories_included:
      name: Acessórios de limpeza de joias incluídos
      description: Lista quaisquer ferramentas ou acessórios extras fornecidos com
        o produto de limpeza(p. ex., escovas, bandejas, panos de polimento)
    jewelry_cleaning_purpose:
      name: Propósito de limpeza de joias
      description: Indica a função principal pretendida do produto (p. ex., remoção
        de oxidação, polimento, revestimento protetor)
    jewelry_finding_type:
      name: Acessórios de joalharia
      description: Identifica o componente específico usado no fabrico de joias, como
        uma tampa de conta ou um anel de salto
    jewelry_material:
      name: Material das joias
      description: Identifica o material principal utilizado em joias, como ouro ou
        esmalte
    jewelry_project_type:
      name: Tipo de projeto de joalharia
      description: Especifica o tipo de projeto de joalharia, como confeção de colar
        ou arame
    jewelry_set_type:
      name: Tipo de conjunto de joalharia
      description: Identifica o tipo de joia num kit de confeção de joias, como anel
        ou colar
    jewelry_steam_cleaner_features:
      name: Características do aparelho de limpeza a vapor de joias
      description: Lista características ou funções de segurança notáveis incorporadas
        que diferenciam modelos
    jewelry_type:
      name: Tipo de joalharia
      description: Distingue entre tipos de joias, como joias finas ou imitações
    joint_connection:
      name: Conexão conjunta
      description: Especifica a ligação da junta em tacos de bilhar, por exemplo,
        composto, sem junta
    joint_face_type:
      name: Tipo de rosto articular
      description: Especifica o tipo de face da junta em eixos de bilhar, como completo
        ou pilotado
    joint_style:
      name: Estilo de junta
      description: Define o tipo de junta usada nos tacos de bilhar, como uni-loc
        ou radial
    journey_type:
      name: Tipo de viagem
      description: Especifica o tipo de viagem coberta pelo bilhete baseado na contagem
        de viagens e direção do trajeto
    joystick_mounting_style:
      name: Estilo de montagem do joystick
      description: Indica como o conjunto do joystick é fixado a um painel de controlo
        ou gabinete
    joystick_sensor_technology:
      name: Tecnologia do sensor do joystick
      description: Identifica a principal tecnologia de deteção utilizada para detetar
        movimento ou posição
    jump_rope_design:
      name: Design de corda de soltar
      description: Descreve o tipo de corda de saltar, como normal ou inteligente
    jumping_surface_color:
      name: Cor da superfície de salto
      description: Identifica a cor da superfície de salto do trampolim, como azul
        ou preto
    jumping_surface_material:
      name: Material de superfície de salto
      description: Especifica o tecido da área de salto do trampolim, por exemplo,
        sintético, polipropileno
    jumping_surface_pattern:
      name: Padrão da superfície de salto
      description: Identifica o desenho ou impressão na superfície de salto de um
        trampolim, como estrelas ou riscas
    karaoke_modes:
      name: Modos de karaoke
      description: Especifica o tipo de apresentação de karaoke, como single ou dueto
    kerosene_application:
      name: Aplicação de querosene
      description: Identifica o uso específico de querosene, como para aquecedores
        ou combustível de aviação
    key_purpose:
      name: Finalidade principal
      description: Especifica onde uma chave ou chave matriz deve ser usada, por exemplo,
        porta, cadeado
    keyboard_action:
      name: Ação do teclado
      description: Especifica a sensação das teclas do piano, como ação de martelo
        ou teclas ponderadas
    keyboard_assembly_type:
      name: Tipo de montagem do teclado
      description: Define a montagem física fornecida (p. ex., teclado autónomo, apoio
        de pulso com teclado, conjunto de teclas individuais)
    keyboard_backlight_type:
      name: Tipo de retroiluminação do teclado
      description: Detalha a tecnologia ou estilo de iluminação utilizado para as
        teclas ou caixa do teclado
    keyboard_format:
      name: Formato do teclado
      description: Define o tamanho e o layout de um teclado, como tamanho normal
        ou compacto
    keyboard_key_type:
      name: Tipo de tecla do teclado
      description: Descreve a resposta ou sensação das teclas em teclados musicais,
        como ponderados ou semipesados
    keyboard_language:
      name: Idioma do teclado
      description: Especifica o layout do idioma de um teclado, como ENG (Inglês)
        ou DEU (Alemão)
    keyboard_layout:
      name: Esquema do teclado
      description: Especifica a disposição das teclas de um teclado, por exemplo,
        QWERTY, Workman
    keyboard_mounting_style:
      name: Estilo de montagem do teclado
      description: Define o método de montagem da placa interna que afeta o som e
        a sensação dos teclados mecânicos
    keyboard_port_type:
      name: Tipo de porta de teclado
      description: Especifica o tipo de porta para conectividade do teclado, como
        USB tipo C
    keyboard_specialized_features:
      name: Características especializadas do teclado
      description: Identifica as características exclusivas de um teclado, como ângulo
        ajustável ou iluminação de fundo
    keyboard_switch_type:
      name: Tipo de interruptor de teclado
      description: Especifica o estilo de feedback do teclado, como tátil ou clicável
    keyboard_type:
      name: Tipo de teclado
      description: Especifica o design e a funcionalidade de um teclado, por exemplo,
        padrão, retroiluminado
    keycap_legend_printing_method:
      name: Método de impressão da legenda da tecla
      description: Descreve como as legendas são aplicadas às teclas, impactando a
        longevidade e a aparência
    keycap_material:
      name: Material das teclas
      description: Indica o principal material ou processo de fabrico das teclas que
        afeta a durabilidade, a textura e as legendas
    keycap_profile:
      name: Perfil da tecla
      description: Especifica a família de escultura ou forma do conjunto de teclas,
        afetando a sensação de escrita e a estética
    keypad_style:
      name: Estilo de teclado
      description: Define o método de entrada para teclados, como digital ou alfanumérico
    keystone_correction_type:
      name: Tipo de correção keystone
      description: Descreve o tipo de correção keystone ou geométrica que o projetor
        suporta para eliminar distorção trapezoidal (p. ex., vertical manual, automático
        de quatro pontos)
    kiln_features:
      name: Características do forno
      description: Especifica as capacidades funcionais e características de design
        do forno
    kiln_loading_style:
      name: Estilo de carregamento do forno
      description: Especifica o método pelo qual os itens são colocados e removidos
        da câmara do forno
    kit_construction_type:
      name: Tipo de construção de kit
      description: Especifica o tecido da área de salto do trampolim, por exemplo,
        sintético, polipropileno
    kitchen/dining_furniture_items_included:
      name: Artigos de mobiliário de cozinha e sala de jantar incluídos
      description: Identifica as peças de mobiliário específicas incluídas num conjunto,
        como cadeiras de jantar ou ilha de cozinha
    kitchen_utensil_items_included:
      name: Itens de utensílios de cozinha incluídos
      description: Identifica as ferramentas incluídas num conjunto de utensílios
        de cozinha, como batedor ou pinça
    kitesurfing_style:
      name: Estilo kitesurf
      description: Define o estilo específico de kitesurf para o qual o produto foi
        projetado, como surfar nas ondas
    knee_brace_style:
      name: Estilo de joelheira
      description: Define o design estrutural da ortótese, refletindo como é utilizada
        e o nível de suporte que fornece
    kneeboard_features:
      name: Características de joelheira
      description: Descreve as características específicas de uma joelheira, como
        alça ajustável ou antiderrapante
    knife_type:
      name: Tipo de faca
      description: Classifica facas com base no uso ou design pretendido, como multiferramenta
        ou EDC
    knitting/padding_project_type:
      name: Tipo de projeto de tricô/enchimento
      description: Identifica o uso pretendido para materiais de tricô ou de enchimento,
        como mantas de retalhos ou fabrico de travesseiros
    knitting_project_type:
      name: Tipo de projeto de tricô
      description: Especifica o tipo de projeto de tricô, como confeção de travesseiros
        ou brinquedos de pelúcia
    knob/handle_design:
      name: Design do punho/pega
      description: Descreve o estilo das ferragens do armário, como um puxador redondo
        ou um puxador de barra
    knob_function:
      name: Função do botão
      description: Especifica a função dos botões do amplificador, como ganho ou presença
    knob_style:
      name: Estilo do botão
      description: Descreve o design de botões em amplificadores de instrumentos musicais,
        como padrão ou retro/vintage
    knot_shape:
      name: Formato do nó
      description: Especifica a forma ou perfil geral do nó ou cabeça da escova
    labeling_project_type:
      name: Tipo de projeto de rotulagem
      description: Especifica o objetivo da criação de etiquetas para coser, como
        a criação de têxteis para o lar ou a criação de presentes personalizados
    laboratory_freezer_design:
      name: Design de frigorífico de laboratório
      description: Descreve a configuração de um congelador de laboratório, como vertical
        ou arca
    lacrosse_equipment_included:
      name: Equipamento de lacrosse incluído
      description: Especifica os artigos num conjunto de equipamentos de lacrosse,
        como taco de lacrosse ou ombreiras
    ladder_type:
      name: Tipo de escada
      description: Identifica o estilo de escada para barco, como fixo ou telescópica
    lamination_mode:
      name: Modo de laminagem
      description: Identifica o tipo de processo de laminagem utilizado, como laminagem
        o a frio ou laminação a quente
    lamination_type:
      name: Tipo de laminação
      description: Identifica se a superfície do gráfico ou modelo é laminada e, se
        sim, se é de face única ou dupla
    lamp_assembly_type:
      name: Tipo de montagem da lâmpada
      description: Especifica se o produto é uma lâmpada, uma lâmpada com caixa, um
        conjunto duplo ou outra configuração de montagem
    lamp_quality_grade:
      name: Grau de qualidade da lâmpada
      description: Indica se a lâmpada é OEM original, utiliza uma lâmpada OEM numa
        caixa compatível, ou se é totalmente compatível
    lamp_type:
      name: Tipo de lanterna
      description: Especifica a fonte de luz em ampliadores fotográficos, por exemplo,
        luz fria, dicróica
    lancet_mechanism_type:
      name: Tipo de mecanismo de lanceta
      description: Define o mecanismo operacional ou design de segurança das lancetas
        (p. ex., retrátil de segurança, ativado por pressão)
    language:
      name: Idioma
      description: Especifica o idioma usado ou idioma compatível, por exemplo, inglês,
        multilingue
    language_version:
      name: Versão do idioma
      description: Especifica a versão do idioma de um produto de conteúdo multimédia,
        como ENG-US ou ARA-Árabe
    laptop_cable_type:
      name: Tipo de cabo do portátil
      description: Identifica o propósito funcional do cabo dentro do portátil
    laptop_housing_part_type:
      name: Tipo de peça da carcaça do portátil
      description: Especifica que componente exterior é fornecido (p. ex., base inferior,
        apoio de pulso, moldura)
    laser_color:
      name: Cor do laser
      description: Identifica a cor de um ponteiro laser, como vermelho ou verde
    laser_light_source:
      name: Fonte de luz laser
      description: Especifica a tecnologia de luz usada em ponteiros laser, como LED
    laser_pattern:
      name: Padrão de laser
      description: Identifica o desenho ou motivo produzido por um laser, como estrelas
        ou animais
    lathe_application:
      name: Aplicação de torno
      description: Especifica o tipo de trabalho para o qual um torno foi projetado,
        como fiação de acrílico ou trabalho em vidro
    laundry_detergent_features:
      name: Características do detergente para a roupa
      description: Descreve as características especiais do sabão em pó, como proteção
        de cor ou remoção de manchas
    lead_grade:
      name: Grau de chumbo
      description: Especifica o grau de chumbo em instrumentos de escrita, por exemplo,
        H, 9B
    leash_design:
      name: Design de trela
      description: Descreve a funcionalidade das coleiras para animais de estimação,
        como coleiras removíveis ou retráteis
    leather/vinyl_texture:
      name: Textura de couro/vinil
      description: Descreve a sensação superficial de produtos de couro ou vinil,
        como liso ou granulado
    leather_type:
      name: Tipo de couro
      description: Especifica a origem animal ou o tipo de couro utilizado no produto
        (p. ex., couro bovino, couro de bezerro, crocodilo, píton, sintético).
    lectern_mounting_type:
      name: Tipo de montagem de Lectern
      description: Especifica o estilo de configuração de um púlpito, como mesa ou
        chão
    led_light_mode:
      name: Modo de luz LED
      description: Lista os modos operacionais selecionáveis que combinam diferentes
        espetros ou intensidades (p. ex., azul, vermelho, azul e vermelho)
    leg_color:
      name: Cor da perna
      description: Define a tonalidade das pernas de um produto, por exemplo, branco,
        marrom
    leg_lock_type:
      name: Tipo de bloqueio de perna
      description: Identifica o tipo de bloqueio de perna utilizado em acessórios
        eletrónicos, normalmente bastões de selfie; por exemplo, bloqueio de torção
    leg_material:
      name: Material da perna
      description: Especifica o material usado na camada interna de um produto, como
        espuma, granito ou gel
    leg_pattern:
      name: Padrão da perna
      description: 'Define o desenho ou estampa nas pernas do produto, como animais
        ou geométricos '
    leg_sections:
      name: Secções da perna
      description: Indica o número de secções de pernas em acessórios eletrónicos,
        normalmente bastões de selfie; por exemplo, 5+
    legend_type:
      name: Tipo de legenda
      description: Indica se o marcador está em branco ou pré-impresso com números,
        letras, símbolos ou outras marcações
    length_adjustability:
      name: Ajustabilidade do comprimento
      description: Indica se o comprimento da alça ou corrente pode ser alterado pelo
        utilizador ou é fixo
    lens/slide_material:
      name: Material da lente/slide
      description: Especifica o material utilizado na fabricação de lentes ou slides,
        como plástico ou vidro
    lens_cap_compatible_device:
      name: Dispositivo compatível com tampa da lente
      description: Especifica o equipamento compatível com tampas de lentes, como
        monocular ou câmara digital
    lens_case_accessories_included:
      name: Acessórios do estojo de lentes incluídos
      description: Lista itens adicionais embalados com o estojo (p. ex., pinças,
        frasco de solução)
    lens_characteristic:
      name: Característica da lente
      description: Lista características funcionais especiais aplicadas às lentes
        (p. ex., bloqueio de luz azul, UV400)
    lens_coating:
      name: Revestimento de lentes
      description: Especifica o tipo de revestimento nas lentes dos óculos, por exemplo,
        anti-reflexo, resistente a riscos
    lens_color:
      name: Cor da lente
      description: Especifica a cor das lentes dos óculos, como amarelo ou preto
    lens_color_combination:
      name: Combinação de cores das lentes
      description: Especifica o emparelhamento de cores das lentes usado para óculos
        3D anáglifos
    lens_configuration:
      name: Configuração de lente
      description: Especifica a configuração da lente em artigos como ampliadores,
        como simples ou múltiplos
    lens_filter_category:
      name: Categoria de filtro de lente
      description: Especifica a categoria de filtro padrão europeia (0–4) que classifica
        as lentes pela sua densidade de coloração e as condições de iluminação para
        as quais são adequadas
    lens_filter_effects:
      name: Efeitos do filtro de lente
      description: Descreve os efeitos específicos que um filtro de lente fornece,
        como correção de cores ou macro
    lens_filter_type:
      name: Tipo de filtro de lente
      description: Especifica a categoria de filtro para lentes de câmara, por exemplo,
        gradiente, densidade neutra
    lens_kit_accessories_included:
      name: Acessórios do kit de lentes incluídos
      description: Lista os itens suplementares fornecidos com a lente ou o kit de
        filtros para telemóveis, para que os compradores saibam exatamente o que estão
        a adquirir e possam comparar os pacotes.
    lens_material:
      name: Material da lente
      description: Identifica o material principal utilizado nos elementos óticos
        ou na estrutura da lente, como vidro ótico, plástico ou liga de alumínio.
    lens_pattern:
      name: Padrão da lente
      description: Descreve o design ou a aparência visual das lentes dos óculos,
        como sólidas ou texturizadas
    lens_polarization:
      name: Polarização de lentes
      description: Indica o tipo de polarização da lente em óculos, por exemplo, fotopolarizada
    lens_protector_coverage_style:
      name: Estilo de cobertura do protetor de lente
      description: Define o formato ou o design de cobertura de um protetor de lente
        de câmara de telemóvel
    lens_protector_features:
      name: Caraterísticas do protetor de lente
      description: Lista as funcionalidades especiais oferecidas pelo protetor
    lens_refractive_index:
      name: Índice de refração da lente
      description: Especifica o índice de refração numérico (p. ex., 1.50, 1.60, 1.67)
        que se correlaciona diretamente com a espessura e o peso da lente
    lens_storage_type:
      name: Tipo de armazenamento de lentes
      description: Descreve o tipo de armazenamento para lentes de câmara, como estojo
        ou bolsa para lentes
    lens_tint_type:
      name: Tipo de coloração da lente
      description: Descreve a coloração aplicada à lente para visibilidade de manuseio
        ou propósitos cosméticos
    lens_type:
      name: Tipo de lentes
      description: Especifica o tipo de lente em produtos de óculos, como polarizados
        ou progressivos
    license_type:
      name: Tipo de licença
      description: Especifica o tipo de licença de software, como código aberto ou
        compra única
    lid_material:
      name: Material da tampa
      description: Identifica o principal material utilizado em tampas de produtos,
        como vidro ou aço inoxidável
    lid_type:
      name: Tipo de tampa
      description: Especifica o tipo de tampa usada, como flip-top ou snap-on
    life_jacket_features:
      name: Características do colete salva-vidas
      description: Destaca as características únicas dos coletes salva-vidas, como
        reflexivos ou flutuantes
    light_attachment_type:
      name: Tipo de fixação de luz
      description: Descreve como uma luz do livro é fixada, como flexível ou fixa
    light_color:
      name: Cor clara
      description: Define a cor ou matiz da luz, como branco ou multicolorido
    light_control:
      name: Controlo da luz
      description: Define o nível de bloqueio de luz por tratamentos de janela, por
        exemplo, escurecimento, transparência
    light_design:
      name: Design da luz
      description: Descreve o tipo de design de luz em acessórios de câmara, como
        LED ou anel
    light_exposure_modes:
      name: Modos de exposição à luz
      description: Especifica as opções de ajuste da luz nas câmaras, como a prioridade
        do obturador AE ou a prioridade da abertura AE
    light_filtering:
      name: Filtragem de luz
      description: Especifica as capacidades de filtragem de luz de um produto, como
        difusão ou blackout
    light_options:
      name: Opções de luz
      description: Especifica os recursos de iluminação de um produto, como brilho
        suave ou mudança de cor
    light_pattern:
      name: Padrão de luz
      description: Define o tema visual dos produtos de iluminação, por exemplo, geométrico
        ou arco-íris
    light_rejection_type:
      name: Tipo de rejeição de luz
      description: Indica se e como a ecrã rejeita luz ambiente ou do teto, melhorando
        o contraste da imagem em ambientes claros
    light_source:
      name: Fonte de luz
      description: Identifica o tipo de lâmpada usada num produto, como LED ou fluorescente
    light_spectrum:
      name: Espectro de luz
      description: Define a faixa de comprimentos de onda de luz que um produto pode
        produzir, por exemplo, luz azul, luz infravermelha
    light_temperature:
      name: Temperatura da luz
      description: Define as características de cor das fontes de luz, como branco
        quente ou luz do dia
    light_therapy_device_form_factor:
      name: Formato do dispositivo de fototerapia
      description: Descreve o estilo físico ou configuração do dispositivo (p. ex.,
        painel, máscara, portátil)
    light_type:
      name: Tipo de luz
      description: Identifica o tipo específico de luz usada em embarcações, por exemplo,
        navegação, subaquática
    lighting_features:
      name: Características de iluminação
      description: Descreve as características especiais de iluminação, como brilho
        ajustável ou iluminação LED
    lighting_options:
      name: Opções de iluminação
      description: Especifica o tipo de iluminação para sinalética, como iluminada
        ou não iluminada
    lighting_type:
      name: Tipo de iluminação
      description: Descreve quaisquer recursos de iluminação integrados do headset
    line/rope_type:
      name: Tipo de linha/corda
      description: Identifica o estilo de construção de linhas de ancoragem ou cordas,
        como três fios ou trança dupla
    line_spacing_options:
      name: Opções de espaçamento entre linhas
      description: Identifica opções de espaçamento entre linhas, normalmente para
        máquinas de escrever; por exemplo, duplo, ajustável
    liner_features:
      name: Características do forro
      description: Descreve as características especiais dos revestimentos, tais como
        estanques ou biodegradáveis
    lip_balm_tint_level:
      name: Nível de coloração do protetor labial
      description: Classifica o nível de coloração ou intensidade de cor que o protetor
        proporciona
    lip_gloss_applicator_type:
      name: Tipo de aplicador de gloss labial
      description: Identifica o estilo de aplicador incluído com o gloss labial, que
        afeta a facilidade de aplicação e preferência do utilizador
    lip_gloss_effect:
      name: Efeito de gloss de lábios
      description: Descreve o efeito ou o acabamento que um brilho labial proporciona,
        por exemplo, suavização, preenchimento
    lip_gloss_formulation:
      name: Formulação do gloss labial
      description: Define a textura ou formato principal do gloss labial
    lip_liner_design:
      name: Design de delineador labial
      description: Identifica o tipo de delineador labial, como retrátil ou fixo
    lip_makeup_opacity:
      name: Opacidade da maquilhagem labial
      description: Indica o nível de cobertura ou opacidade do produto uma vez aplicado
    lip_plate_material:
      name: Material da placa de lábio
      description: Identifica o material usado para o lábio de uma flauta, como prata
        ou madeira
    lipstick_coverage:
      name: Cobertura do batom
      description: Descreve o nível de opacidade da cor fornecida pelo batom (p. ex.,
        transparente, média, completa)
    lipstick_effect:
      name: Efeito de batom
      description: Descreve o efeito ou o acabamento que um brilho labial proporciona,
        por exemplo, suavização, preenchimento
    liqueur_variety:
      name: Variedade de licores
      description: Classifica licores pelos seus perfis de sabor primários, por exemplo,
        nozes, creme
    livestock_food_ingredients:
      name: Ingredientes de ração animal
      description: Especifica os ingredientes primários na alimentação animal, como
        cevada ou farelo de soja
    lnb_output:
      name: Saída LNB
      description: Especifica o número de conexões de recetor de satélite, como simples
        ou quádruplas
    lnb_technology:
      name: Tecnologia LNB
      description: Classifica o tipo de tecnologia em LNB de satélite, como universal
        ou de baixo ruído
    load_capacity:
      name: Capacidade de carga
      description: Especifica o limite de peso que um produto pode suportar, como
        serviços leves ou pesados
    loading_ramp_type:
      name: Tipo de rampa de carregamento
      description: Identifica o estilo da rampa de carregamento para veículos, como
        simples ou tripla
    loading_type:
      name: Tipo de carregamento
      description: Especifica como as máquinas de lavar roupa são carregadas, como
        frontal ou superior
    lock_placement:
      name: Posicionamento de bloqueio
      description: Identifica onde a trava está posicionada nas peças do motor da
        embarcação, como motor de popa ou interior
    lock_type:
      name: Tipo de bloqueio
      description: Especifica o mecanismo de bloqueio usado por um produto, como chave
        ou código
    locking_mechanism:
      name: Mecanismo de bloqueio
      description: Especifica o tipo de fechadura utilizada, normalmente para produtos
        de segurança; por exemplo, fechamento automático, deslizamento
    logic_family:
      name: Família lógica
      description: Identifica a família lógica de semicondutores ou tecnologia do
        C
    lovibond:
      name: Lovibond
      description: Indica a intensidade da cor dos grãos e maltes cervejeiros, como
        claro ou escuro
    lubricant_application:
      name: Aplicação do lubrificante
      description: Define as áreas de aplicação adequadas para lubrificante pessoal,
        como massagem ou vaginal
    lubricant_composition:
      name: Composição do lubrificante
      description: Define o ingrediente base de lubrificantes pessoais, como à base
        de água ou à base de silicone
    lubricant_dispenser_type:
      name: Tipo de dispensador de lubrificante
      description: Identifica a embalagem ou o tipo de recipiente para lubrificantes,
        como um tambor ou uma garrafa
    lubricant_effect:
      name: Efeito do lubrificante
      description: Indica qualquer efeito funcional ou estilo fornecido pela lubrificação
        do preservativo
    lubricant_form:
      name: Forma de lubrificante
      description: Descreve a consistência de um lubrificante, como gel ou pasta
    luggage/bag_closure:
      name: Fecho de bagagem/saco
      description: Identifica o tipo de fecho utilizado na bagagem ou nos sacos, por
        exemplo, fecho de correr ou de pressão
    lumber/wood_type:
      name: Tipo de madeira
      description: Identifica o tipo específico de madeira ou madeira serrada utilizada
        num produto, como carvalho ou pinho
    lyre/flip_folder_attachment_type:
      name: Tipo de fixação de mola lira/viragem de página
      description: Especifica o tipo de fixação para liras musicais e pastas articuladas,
        como alça ou braçadeira de lira
    m_2_drive_length_supported:
      name: Comprimento de unidade M.2 suportado
      description: Especifica quais os comprimentos de cartão M.2 o gabinete ou adaptador
        aceita
    magnet_type:
      name: Tipo magnético
      description: Identifica o tipo de íman usado num produto, por exemplo, cerâmica,
        titânio
    magnification:
      name: Ampliação
      description: Especifica o poder de ampliação de um produto, como 1x ou 100x
    magsafe_compatibility:
      name: Compatibilidade MagSafe
      description: Indica se o acessório é compatível com o sistema de fixação magnética
        ou carregamento MagSafe da Apple.
    makeup_brush_application:
      name: Aplicação do pincel de maquilhagem
      description: Especifica o principal uso cosmético ou área para a qual o pincel
        é concebido (p. ex., base, sombra, contorno)
    makeup_features:
      name: Características da maquilhagem
      description: Destaca as principais características dos cosméticos, como alta
        pigmentação ou ausência de fragrância
    makeup_shade:
      name: Base de Maquilhagem
      description: Descreve a tonalidade dos cosméticos, como rosa médio ou castanho
        profundo
    mallet_material:
      name: Material do macete
      description: Identifica o tipo de material usado em marretas de percussão, como
        latão ou borracha
    management_type:
      name: Tipo de gestão
      description: Descreve o nível de capacidade de gestão do dispositivo (p. ex.,
        totalmente gerido, gestão inteligente, não gerido), para que os compradores
        possam combinar as capacidades do produto com os requisitos de rede
    mandibular_device_fitting_method:
      name: Método de ajuste do dispositivo mandibular
      description: Descreve como o dispositivo é ajustado ou moldado aos dentes do
        utilizador
    mandolin_back_shape:
      name: Modelo do bandolim
      description: Especifica a curvatura e design do fundo do bandolim, como plano
        ou de fundo arqueado
    manufacturer_type:
      name: Tipo de fabricante
      description: Especifica a origem das peças ou acessórios do veículo, como originais
        ou de terceiros
    map_update_policy:
      name: Política de atualização de mapas
      description: Declara como as atualizações de mapas são fornecidas ou orçamentadas
        para o dispositivo
    marine_navigator_features:
      name: Características do navegador marítimo
      description: Especifica as capacidades das ferramentas de navegação marítima,
        como ecrã tátil ou impermeável
    marker_format:
      name: Formato do marcador
      description: Define o estilo físico ou construção do marcador
    marker_text_color:
      name: Cor do texto do marcador
      description: Especifica a cor da legenda impressa ou texto na superfície do
        marcador (distinta da cor do corpo do marcador)
    marker_tip_design:
      name: Design de ponta de marcador
      description: Descreve o formato da ponta de um marcador, como uma bala ou cinzel
    marquee_substrate:
      name: Substrato do letreiro
      description: Especifica o meio físico em que a arte é impressa ou fornecida
        (p. ex., filme translúcido, acrílico com impressão reversa, adesivo de vinil)
    mascara_brush_shape:
      name: Formato da escova de máscara de pestanas
      description: Especifica a forma ou design da varinha ou escova do primer incorporada,
        que influencia fortemente a aplicação e os resultados
    mascara_effect:
      name: Efeito da máscara
      description: Descreve o resultado pretendido ou a característica da máscara,
        por exemplo, curvatura, alongamento
    mascara_formulation:
      name: Formulação do máscara de pestanas
      description: Indica a composição base do produto ou tecnologia especial (p.
        ex., líquida, infundida com fibras, tubo) que afeta a textura, a utilização
        e a remoção.
    mask_cushion_material:
      name: Material da almofada da máscara
      description: Detalha o material específico usado para a almofada ou vedação
        da máscara
    mask_size:
      name: Tamanho da máscara
      description: Especifica a designação de tamanho fornecida pelo fabricante
    mask_type:
      name: Tipo de máscara
      description: Especifica o design de máscaras, normalmente para cuidados respiratórios;
        por exemplo, oral, nasal
    masonry_material:
      name: Material de alvenaria
      description: Especifica a composição de itens de alvenaria, como cimento ou
        calcário
    masonry_product_form:
      name: Forma de produto de alvenaria
      description: Especifica a forma dos produtos de alvenaria, como pasta ou pó
    massage_area:
      name: Área de massagem
      description: Especifica a parte do corpo para a qual o produto foi projetado,
        por exemplo, rosto, linha do biquíni
    massage_mechanism_dimensionality:
      name: Dimensionalidade do mecanismo de massagem
      description: Especifica o número de eixos de movimento em que os rolos de massagem
        operam (p. ex., 2D, 3D, 4D, 5D)
    massage_stone_texture:
      name: Textura de pedra de massagem
      description: Descreve a sensação superficial das pedras de massagem, como lisa
        ou áspera
    massage_technique:
      name: Técnica de massagem
      description: Define os métodos de massagem oferecidos por um produto, por exemplo,
        percussão, tecidos profundos
    mat/rug_shape:
      name: Formato de tapete
      description: Descreve a forma das esteiras ou tapetes, por exemplo, redonda
        ou quadrada
    mat_base_material:
      name: Material da base do tapete
      description: Especifica o tipo de material utilizado na base dos tapetes, ou
        seja, cortiça, material viscoelástico
    mat_features:
      name: Características do tapete
      description: Descreve características específicas de tapetes para casa ou escritório,
        como base antiderrapante ou impermeável
    material:
      name: Material
      description: Define o material primário de um produto, como algodão ou lã
    material_firmness:
      name: Firmeza do material
      description: Descreve a dureza ou suavidade de um produto, por exemplo, rígido,
        flexível
    material_hardness:
      name: Dureza do material
      description: Define a firmeza do produto, normalmente para equipamentos desportivos
        ou fitness; por exemplo, extra macio, alta resistência
    material_origin:
      name: Origem do material
      description: Indica a forma ou o estado em que os materiais preciosos são fornecidos
        (p. ex., soltos/sem montagem, joias acabadas, cartão de oferta impresso/digital).
    material_treatment:
      name: Tratamento de materiais
      description: Especifica os tratamentos químicos ou físicos aplicados aos materiais
        para fins de preservação ou segurança (p. ex., tratamento térmico, fumigação,
        tratamento químico).
    maternity_clothing_features:
      name: Características de roupa de maternidade
      description: Descreve as características únicas de roupas de maternidade, por
        exemplo, espaço para crescimento da barriga, copas de apoio
    maternity_sleepwear_style:
      name: Características de pijamas de maternidade
      description: Especifica o estilo dos artigos de vestuário para dormir para grávidas,
        como um macacão ou uma camisa de dormir
    mattress_features:
      name: Características de colchão
      description: Destaca características especiais de um colchão, como função hipoalergénica
        ou de resfriamento
    maximum_bit_depth:
      name: Profundidade máxima de bits
      description: Define o comprimento máximo da palavra digital (em bits) que o
        conversor suporta, afetando a faixa dinâmica e a resolução
    maximum_magnification:
      name: Ampliação máxima
      description: Indica o maior fator de ampliação que um microscópio pode atingir,
        como 10x ou 100x
    maximum_reel_diameter_supported:
      name: Diâmetro máximo de bobina suportado
      description: Especifica o maior diâmetro de bobina que o deck pode acomodar
    measured_parameters:
      name: Parâmetros medidos
      description: Lista as métricas elétricas ou de bateria que o dispositivo pode
        medir ou exibir
    measuring_method:
      name: Método de medição
      description: Define a técnica usada para quantificar a gordura corporal, por
        exemplo, ótica, calibradores
    measuring_tool_features:
      name: Características da ferramenta de medição
      description: Descreve as características especiais de ferramentas de medição,
        como uma câmara embutida ou portátil
    measuring_type:
      name: Tipo de medição
      description: Especifica o método de medição para dispositivos de saúde, por
        exemplo, testa, dedo
    meat_cut:
      name: Corte de carne
      description: Ajuda a identificar o corte ou estilo específico de carne, por
        exemplo, hambúrguer, asas
    meat_type:
      name: Tipo de carne
      description: Identifica a origem dos itens de carne, por exemplo, de origem
        vegetal, frango
    media_access:
      name: Acesso multimédia
      description: Define a forma como os clientes podem aceder aos meios de comunicação
        social, por exemplo, subscrição digital, impressão e online
    media_content_type:
      name: Tipo de conteúdo multimédia
      description: Identifica o género ou categoria de conteúdo multimédia, como reality
        shows ou comédia stand-up
    media_format:
      name: Formato de conteúdo multimédia
      description: Define os formatos de conteúdo multimédia compatíveis para um dispositivo,
        como vinil ou VHS
    media_physical_size:
      name: Tamanho físico do meio multimédia
      description: Especifica o tamanho físico padronizado ou fator de forma do meio
        multimédia virgem
    media_player_form_factor:
      name: Formato do reprodutor de multimédia
      description: Descreve o estilo físico do dispositivo, ajudando os compradores
        a escolher entre sticks compactos e caixas set-top maiores
    media_section:
      name: Secção de conteúdo multimédia
      description: Identifica a categoria específica de um jornal ou revista, como
        desporto ou política
    media_theme:
      name: Tema multimédia
      description: Categoriza o conteúdo multimédia pelo seu foco principal, como
        viagens ou jogos
    medical_alarm_features:
      name: Características de alarme médico
      description: Descreve os recursos de um sistema de alarme médico, como bateria
        de longa duração ou comunicação bidirecional
    medical_device_certification:
      name: Certificação de dispositivo médico
      description: Lista as aprovações regulamentares ou padrões com que o monitor
        biométrico está em conformidade (p. ex., CE, FDA 510(k))
