      description: Especifica itens incluídos num kit de fraldas, como lenços humedecidos
        ou trocador de fraldas
    diaper_organizer_features:
      name: Características do organizador da bolsa de fraldas
      description: Destaca características exclusivas dos organizadores de fraldas,
        como vários compartimentos ou forro impermeável
    diaper_size:
      name: Tamanho da fralda
      description: Especifica o tamanho das fraldas, como bebé ou criança pequena
    diaper_type:
      name: Tipo de fralda
      description: Distingue entre auxiliares de incontinência, como absorventes,
        pull-ups ou fraldas
    dice_shape:
      name: Formato de dado
      description: Descreve a forma geométrica de um dado, como cubo (6 lados) ou
        Icosaedro (20 lados)
    dielectric_type:
      name: Tipo dielétrico
      description: Especifica o material dielétrico ou isolante usado em condensadores,
        como cerâmica ou eletrolítico
    dietary_preferences:
      name: Preferências alimentares
      description: Ajuda a identificar produtos adequados para dietas específicas,
        por exemplo, veganas, sem nozes
    dietary_supplements:
      name: Suplementos dietéticos
      description: Identifica os nutrientes adicionados a um produto, como cálcio
        ou probióticos
    dietary_use:
      name: Uso dietético
      description: Classifica os produtos com base nos benefícios dietéticos, por
        exemplo, construção muscular, baixo teor de carboidratos
    difficulty_level:
      name: Nível de dificuldade
      description: Indica a complexidade ou o nível de desafio de um quebra-cabeça
        ou jogo, como fácil ou avançado
    diffuser_design:
      name: Design de difusor
      description: Descreve a estrutura de um difusor de flash, como anel ou cúpula
    digestive_supplement_type:
      name: Tipo de suplemento digestivo
      description: Classifica o tipo específico de suplemento digestivo (p. ex., probiótico,
        enzima, fibra)
    digital_sound_processing:
      name: Processamento de som digital
      description: Especifica as técnicas de modificação de som em componentes de
        áudio, como delay ou reverb
    digitizer_surface_finish:
      name: Acabamento da superfície do digitalizador
      description: Descreve o revestimento ou acabamento da superfície do vidro do
        digitalizador
    din_size:
      name: Tamanho DIN
      description: Especifica o tamanho padronizado de abertura do painel em que o
        recetor se encaixa (p. ex., DIN simples, DIN duplo)
    dinnerware_pieces_included:
      name: Peças de louça incluídas
      description: Define os componentes de um serviço de jantar, como pratos ou tigela
        de servir
    direct_box_type:
      name: Tipo de direct box
      description: Especifica a configuração do circuito da direct box (DI), que afeta
        os requisitos de energia, o caráter sonoro e a aplicação pretendida
    direction_detection_capability:
      name: Capacidade de deteção de direção
      description: Declara se o radar pode relatar a direção do objeto (p. ex., aproximando-se,
        afastando-se ou ambos)
    dirt_separating_method:
      name: Método de separação de sujidade
      description: Descreve a técnica que um aspirador utiliza para separação de sujidade,
        por exemplo, ciclónica, filtragem
    discharge_type:
      name: Tipo de descarga
      description: Especifica o tipo de descarga em camiões basculantes, como despejo
        lateral ou transferência
    disk_format_type:
      name: Tipo de formato do disco
      description: Identifica o tipo de formato de disco para produtos de software,
        como Blu-ray ou CD
    dispenser_type:
      name: Tipo de dispensador
      description: Especifica o formato de distribuição do produto, normalmente no
        setor da saúde e da beleza; por exemplo, bastão, frasco
    dispensing_operation_type:
      name: Modo de dispensação
      description: Descreve se a pasta de dentes é dispensada manualmente, semiautomaticamente,
        ou automaticamente
    display_board_features:
      name: Características da placa de circuito
      description: Descreve recursos exclusivos de placas de exibição, como suporte
        autoadesivo ou resistente
    display_color_mode:
      name: Modo de cor de exibição
      description: Especifica a cor de exibição do produto, por exemplo, colorido,
        preto e branco
    display_features:
      name: Características de exibição
      description: Descreve o tipo de exibição num produto, como ecrã tátil ou comandos
        por botões
    display_interface:
      name: Interface de ecrã
      description: Especifica a interface de vídeo ou dados utilizada pelo módulo
        de ecrã
    display_mode:
      name: Modo de visualização
      description: Descreve o método de exibição de um produto, como digital ou analógico
    display_recommended_use:
      name: Utilização recomendada do ecrã
      description: Sugere o uso ideal para exibições para feiras com base no formato
        e design, como comercial ou educacional
    display_resolution:
      name: Resolução do ecrã
      description: Define a resolução de um ecrã digital, por exemplo, 1280 x 1024,
        full HD
    display_sign_design:
      name: Design de sinalização de exibição
      description: Identifica o tipo de informação que uma placa transmite, como casa
        de banho, venda ou saída
    display_technology:
      name: Tecnologia do ecrã
      description: Define o tipo de tecnologia de tela usada num produto, por exemplo,
        LED, e-ink
    disposable/reusable_bag_features:
      name: Características da bolsa descartável/reutilizável
      description: Descreve as principais características de sacos para resíduos de
        animais de estimação, como biodegradáveis ou à prova de fuga
    disposable/reusable_item_material:
      name: Material de item descartável/reutilizável
      description: Identifica se o material de um produto é descartável ou reutilizável,
        ou seja, materiais biodegradáveis, papel
    disposable_bag_features:
      name: Características da bolsa descartável
      description: Destaca recursos exclusivos de recargas de baldes de fraldas, como
        controlo de odor ou perfumado
    disposable_bag_material:
      name: Material da bolsa descartável
      description: Especifica a composição de sacos descartáveis, por exemplo, plástico,
        materiais biodegradáveis
    disposable_glove_features:
      name: Características das luvas descartáveis
      description: Identifica características especiais de luvas descartáveis, como
        punho longo ou sem pó
    disposable_tableware_material:
      name: Material de louça de mesa descartável
      description: Identifica o material utilizado em louça de mesa descartável, como
        plástico ou papel
    dive_computer_items_included:
      name: Itens de computador de mergulho incluídos
      description: Especifica os itens incluídos num computador de mergulho, como
        um transmissor ou uma correia
    diving/snorkeling_equipment_included:
      name: Equipamento de mergulho/snorkeling incluído
      description: Especifica os acessórios de mergulho/snorkeling incluídos, como
        fato de mergulho ou snorkel
    diving_regulator_style:
      name: Estilo regulador de mergulho
      description: Especifica o estilo do regulador de mergulho, como o pistão desequilibrado
        ou o diafragma
    dj_equipment_features:
      name: Características de equipamento de DJ
      description: Especifica as características exclusivas do equipamento de DJ,
        como controlo MIDI ou operação autónoma
    dj_software_compatibility:
      name: Compatibilidade do software de DJ
      description: Identifica o software de DJ com o qual o produto é compatível,
        por exemplo, Rekordbox, Serato DJ
    docking_compatibility:
      name: Compatibilidade de docking
      description: Indica se a consola pode ser ligada à base ou carregado sem remover
        a capa
    docsis_standard:
      name: Padrão DOCSIS
      description: Especifica a versão DOCSIS suportada por modems a cabo
    dog_age_group:
      name: Grupo etário dos cães
      description: Ajuda a classificar os suprimentos para cães de acordo com o estágio
        de vida do cão, por exemplo, cachorrinho, sénior
    dog_diaper_size:
      name: Tamanho de fralda para cão
      description: Especifica o tamanho das fraldas para cães, por exemplo, Extra
        grande (XL), Pequeno (S)
    dog_diaper_type:
      name: Tipo de fralda para cão
      description: Identifica o tipo específico de fralda para cães, por exemplo,
        fêmea adulta, cachorro
    dog_house_features:
      name: Características de casota para cão
      description: Descreve as características especiais de uma casota para cachorro,
        como dimensões ajustáveis ou proteção UV
    dog_kennel/run_features:
      name: Características de canil/corrida para cão
      description: Destaca as características únicas de um canil/pista de corrida,
        por exemplo, resistente às intempéries, portátil
    dog_kennel_features:
      name: Características de canil para cão
      description: Descreve as características específicas de um canil, como trancável
        ou dobrável
    dog_pen_features:
      name: Características de cerca para cães
      description: Descreve as características especiais das cercas para cães, como
        proteção UV ou resistência às intempéries
    dog_toy_type:
      name: Tipo de brinquedo para cão
      description: Classifica o tipo de brinquedo para cães, por exemplo, de peluche
        ou com guincho
    doll/playset_features:
      name: Características de boneca/playset
      description: Descreve as características especiais de bonecas ou jogos, como
        juntas articuladas ou detalhes realistas
    doll_features:
      name: Características de boneca
      description: Descreve as características especiais de bonecas, como juntas articuladas
        ou detalhes realistas
    doll_type:
      name: Tipo de boneca
      description: Identifica a categoria de uma boneca, como bebé ou colecionável
    door/frame_application:
      name: Aplicação de porta/moldura
      description: Identifica onde a moldura da porta irá ser usada, por exemplo,
        interna, externa
    door_application:
      name: Aplicação de porta
      description: Especifica a aplicação de portas ou dobradiças, como internas ou
        externas
    door_closer_application:
      name: Aplicação de mola de porta
      description: Especifica a aplicação de fechos de portas, como internas ou externas
    door_closer_design:
      name: Design de mola de porta
      description: Identifica o estilo de design dos fechos de portas, como piso ou
        teto oculto
    door_color:
      name: Cor da porta
      description: Especifica a cor da caixa de um produto, como transparente ou branco
    door_frame_finish:
      name: Acabamento da moldura de porta
      description: Especifica o acabamento superficial de uma moldura de porta, como
        pré-acabamento ou pronto para acabamento
    door_glass_finish:
      name: Acabamento em vidro de porta
      description: Especifica o tipo de acabamento de vidro nas portas, como chumbo
        ou padrão
    door_insulation:
      name: Isolamento de porta
      description: Especifica o estado de isolamento das portas, por exemplo, isoladas,
        não isoladas
    door_knob_function:
      name: Função da pega da porta
      description: Especifica a função dos puxadores e maçanetas das portas, como
        passagem ou privacidade
    door_mat_base_color:
      name: Cor base do tapete da porta
      description: Identifica a cor primária da base de um tapete de porta, como bege
        ou preto
    door_mat_base_material:
      name: Material de base do tapete da porta
      description: Especifica o material na parte inferior de um tapete de porta,
        como juta ou látex
    door_mat_base_pattern:
      name: Padrão da base do tapete da porta
      description: Descreve o desenho ou motivo na base de um tapete de porta, por
        exemplo, floral ou geométrico
    door_mat_surface_material:
      name: Material da superfície do tapete da porta
      description: Especifica o material na superfície de um tapete de porta, como
        ervas marinhas ou borracha
    door_material:
      name: Material da porta
      description: Especifica o material de construção de uma porta, como o vidro
        temperado ou o painel de fibras de média densidade (MDF)
    door_pattern:
      name: Padrão da porta
      description: Descreve o desenho ou motivo de uma porta, normalmente para buffets
        e aparadores
    door_stop_placement:
      name: Colocação de batente de porta
      description: Identifica onde um batente de porta está instalado, como no chão
        ou na parede
    door_stopper_design:
      name: Design do batente da porta
      description: Especifica o estilo de um batente de porta, como em forma de gancho
        ou em forma de cunha
    door_suitable_location:
      name: Localização adequada de porta
      description: Identifica o posicionamento ideal para uma porta, como frontal
        ou pátio
    door_surface_finish:
      name: Acabamento de superfície de porta
      description: Especifica o acabamento da superfície em portas residenciais, como
        envidraçadas ou não envidraçadas
    door_type:
      name: Tipo de porta
      description: Especifica o mecanismo de abertura de portas, por exemplo, articuladas,
        deslizantes
    double_stroller_configuration:
      name: Configuração do carrinho duplo
      description: Define a disposição dos assentos em carrinhos duplos, como tandem
        ou lado a lado
    download_format:
      name: Formato de transferência
      description: Especifica o formato de arquivo para downloads de música digital,
        como MP3 ou WAV
    downstream_port_types:
      name: Tipos de portas downstream
      description: Lista os tipos de portas de saída que o hub oferece para ligar
        periféricos (p. ex., USB-A, USB-C, HDMI, Ethernet)
    drain_location:
      name: Localização da drenagem
      description: Especifica a colocação do dreno em banheiras ou chuveiros, como
        central ou esquerda
    drainage_feature:
      name: Funcionalidade de drenagem
      description: Especifica qualquer design que permita a drenagem de líquido ou
        secagem dentro da caixa
    drawing/painting_kit_items_included:
      name: Itens de kit de desenho/pintura incluídos
      description: Identifica objetos num kit de arte ou artesanato, por exemplo,
        bloco de colorir, copo de tinta
    dress_form_features:
      name: Características da forma do vestido
      description: Destaca as principais características de uma forma de vestir, tais
        como uma superfície fixável ou uma base rotativa
    dress_occasion:
      name: Vestido para ocasião
      description: Especifica a ocasião pretendida para um vestido, por exemplo, feriado,
        todos os dias
    dress_style:
      name: Modelo de vestido
      description: Identifica o desenho de um vestido, com cintura alta ou cinta império
    drill_features:
      name: Características de perfuração
      description: Identifica características especiais de uma perfuradora, como velocidade
        ajustável ou iluminação embutida
    drilling_method:
      name: Método de perfuração
      description: Identifica a técnica utilizada em máquinas de perfuração, como
        rotativa ou de percussão
    drilling_rig_orientation:
      name: Orientação da plataforma de perfuração
      description: Identifica a direção de perfuração por uma sonda, como horizontal
        ou vertical
    drinkware_material:
      name: Material de copos e similares
      description: Especifica a composição de copos, como vidro ou plástico
    drinkware_pieces_included:
      name: Peças para recipientes de bebidas incluídas
      description: Identifica a variedade de componentes de copos incluídos num conjunto,
        como jarro ou copos de vinho
    drinkware_shape:
      name: Formato de copos e similares
      description: Define o contorno ou a silhueta de um copo ou similar, por exemplo,
        curvo ou cónico
    drive_form_factor:
      name: Formato da unidade
      description: Especifica a altura ou classe de tamanho do mecanismo da unidade
        (p. ex., altura total, meia altura, fino)
    drive_size:
      name: Tamanho da caixa
      description: Descreve o tamanho da unidade de chaves de soquete e dinamométricas,
        por exemplo, 1 polegada
    drive_type:
      name: Tipo de tração
      description: Identifica o tipo de sistema de tração em veículos ou máquinas
        pesadas, como 2WD ou 4WD
    driver_configuration:
      name: Configuração do driver
      description: Especifica o número de vias discretas do driver no sistema de altifalantes
        (p. ex., 2 vias, 3 vias).
    driver_technology:
      name: Tecnologia de driver
      description: Especifica o tipo de transdutor usado para produzir som (p. ex.,
        dinâmico, armadura balanceada, magnético planar, híbrido)
    drone_board_function:
      name: Função da placa do drone
      description: Descreve o objetivo principal da placa de circuito no sistema do
        drone
    drone_features:
      name: Características do drone
      description: Especifica as várias características funcionais e de design disponíveis
        num drone, como navegação por GPS ou prevenção de obstáculos
    drum_configuration:
      name: Configuração do tambor
      description: Usado para indicar a configuração de um kit de bateria, como 7
        peças ou shell pack
    drum_hardware_adjustability:
      name: Ajustabilidade do hardware da bateria
      description: Detalha os recursos ajustáveis dos acessórios de bateria e percussão,
        por exemplo, ângulo ajustável do batedor
    drum_hardware_material:
      name: Material de hardware da bateria
      description: Identifica o material usado nas ferragens do tambor, como aço ou
        alumínio
    dry/wet_cleaning:
      name: Limpeza a seco/húmida
      description: Especifica se os produtos são adequados para limpeza húmida ou
        a seco
    dry_bean_variety:
      name: Variedade de feijões secos
      description: Identifica a variedade de feijão seco utilizado, por exemplo, grão
        de bico, feijão preto
    dryer_features:
      name: Características da máquina de secar
      description: Especifica características exclusivas de uma máquina de secar roupa,
        como autolimpeza ou tecnologia de inversor
    dryer_technology:
      name: Tecnologia do secador
      description: Especifica a tecnologia de secagem em sistemas HVAC, por exemplo,
        dessecante, refrigerado
    drying_method:
      name: Método de secagem
      description: Especifica como o dispositivo seca as escovas de dentes após a
        esterilização, se aplicável
    drying_speed:
      name: Velocidade de secagem
      description: Define a taxa na qual um produto seca ou endurece, como secagem
        rápida ou regular
    dsl_standard_compatibility:
      name: Compatibilidade com o padrão DSL
      description: Identifica que padrões DSL um filtro ou acessório suporta para
        garantir a supressão adequada de ruído e a qualidade da ligação
    duct_design:
      name: Design da conduta
      description: Identifica a forma das condutas de ar nos sistemas AVAC, por exemplo,
        sólidas, flexíveis
    duct_shape:
      name: Forma de conduta
      description: Descreve a forma das condutas de ar em sistemas HVAC, como redondas
        ou planas
    duplex_component_type:
      name: Tipo de componente duplex
      description: Define a forma específica da peça duplex fornecida (p. ex., montagem,
        bandeja, engrenagem)
    duplexer_installation_type:
      name: Tipo de instalação do duplexador
      description: Esclarece como o duplexador se fixa à impressora (p. ex., slot
        interno, fixação externa traseira)
    duplexing_technology:
      name: Tecnologia de duplexação
      description: Especifica se uma impressora suporta impressão frente e verso,
        por exemplo, não suportada, duplexação automática
    duplication_operation_mode:
      name: Modo de operação de duplicação
      description: Indica se o duplicador funciona independentemente, requer ligação
        a um computador, ou suporta ambos os modos
    durability_features:
      name: Características de durabilidade
      description: Destaca a capacidade de um produto resistir a diversas condições,
        por exemplo, à prova de ferrugem, à prova de choque
    dust_container_type:
      name: Tipo de recipiente para o pó
      description: Especifica o tipo de sistema de recolha de pó em aspiradores e
        aparelhos, por exemplo, sem saco, saco de pó
    dust_mask_type:
      name: Tipo de máscara antipó
      description: Especifica o formato das máscaras protetoras contra poeira, como
        copo ou dobra plana
    dvi_connection_type:
      name: Tipo de ligação DVI
      description: Identifica o conetor DVI específico e formato de link suportado
        (p. ex., DVI-D single-link, DVI-I dual-link, Mini-DVI)
    dye_form:
      name: Forma de coloração
      description: Descreve o estado físico dos corantes artesanais, como gel ou pó
    dynamic_level:
      name: Nível dinâmico
      description: Categoriza bolas de raquetebol e squash com base na velocidade
        e no salto, por exemplo, ponto verde, ponto vermelho
    dynamics_processing_function:
      name: Função de processamento de dinâmica
      description: Identifica as principais tarefas dinâmicas que a unidade executa
        (p. ex., compressor, limitador, noise gate, de-esser)
    e_book_formats_supported:
      name: Formatos de e-book suportados
      description: Identifica a variedade de formatos de e-books compatíveis com o
        dispositivo, como PDF ou EPUB
    e_book_reader_part_location:
      name: Localização da peça do leitor de e-books
      description: Especifica onde a peça é instalada ou localizada no dispositivo
    e_cigarette/vaporizer_style:
      name: Estilo de cigarro eletrónico/vaporizador
      description: Classifica os cigarros eletrónicos e vaporizadores pelo seu formato,
        p. ex., descartáveis, caneta
    e_liquid_flavor:
      name: Sabor de líquidos para cigarros eletrónicos
      description: Especifica o sabor dos e-líquidos para vaporizadores e cigarros
        eletrónicos, por exemplo, café, morango
    e_liquid_variety:
      name: Variedade de líquidos para cigarros eletrónicos
      description: Distingue entre diferentes opções de e-líquido, por exemplo, enchimento
        curto, dose de nicotina
    e_reader_display_technology:
      name: Tecnologia do visor da leitor eletrónico
      description: Identifica o tipo de tecnologia de ecrã usada em leitores eletrónicos,
        como LCD ou e-ink
    ear_care_application_method:
      name: Método de aplicação aparelhos auditivos
      description: Especifica o método de aplicação de objetos para cuidados com os
        ouvidos, como bico ou conta-gotas
    ear_dryer_technology:
      name: Tecnologia do secador de ouvido
      description: Identifica o principal mecanismo de secagem utilizado pelo produto
    ear_orientation:
      name: Orientação auricular
      description: Especifica se o auricular é concebido para o ouvido esquerdo, ouvido
        direito ou pode ser usado em qualquer um
    ear_pick_tip_style:
      name: Estilo da ponta do removedor de cera
      description: Define a forma ou o design da ponta de trabalho que remove a cera
        do ouvido.
    ear_side:
      name: Orientação do aparelho
      description: Especifica se o aparelho se destina à orelha esquerda, orelha direita,
        ou a uso como par bilateral
    ear_tip_size:
      name: Tamanho da ponta auricular
      description: Fornece o rótulo de tamanho genérico comumente usado para pontas
        intra-auriculares quando tamanhos exatos em milímetros não são fornecidos
    ear_tip_style:
      name: Estilo da ponta auricular
      description: Define a forma geométrica da ponta auricular que influencia o ajuste
        e a vedação acústica
    earphone_features:
      name: Características do auricular
      description: Destaca características exclusivas em auriculares, como microfone
        integrado ou controlo de volume
    earplug_cord_style:
      name: Estilo do cordão do tampão para ouvido
      description: Indica se os tampões de ouvido estão ligados com um cordão, o que
        ajuda a prevenir perdas e facilita a remoção
    earplug_shape:
      name: Formato do tampão para ouvido
      description: Descreve o formato do tampão para ouvido, que afeta o conforto
        e o ajuste dentro de diferentes canais auditivos
    earplug_type:
      name: Tipo de tampão para ouvido
      description: Classifica o estilo de construção dos tampões dispensados (p. ex.,
