    compatible_gardening_tool:
      name: Ferramenta de jardinagem compatível
      description: Especifica com que ferramentas de jardinagem um produto pode ser
        usado, como um ancinho ou uma pá
    compatible_hair_color:
      name: Coloração do cabelo compatível
      description: Combina produtos com cores de cabelo específicas, por exemplo,
        prateado, loiro
    compatible_hammock_design:
      name: Design de cama de rede compatível
      description: Especifica o tipo de rede com a qual um produto é compatível, por
        exemplo, suspensa, moldura
    compatible_harmonica_type:
      name: Tipo de harmónica compatível
      description: Identifica o tipo de harmónica para a qual o produto foi concebido,
        como diatónica ou cromática
    compatible_hdcp:
      name: HDCP compatível
      description: Especifica a compatibilidade HDCP de dispositivos eletrónicos,
        como HDCP 2.2 ou não compatível
    compatible_instrument:
      name: Instrumento compatível
      description: Identifica o instrumento musical para o qual o produto foi projetado,
        como guitarra ou piano
    compatible_keyboard_configuration:
      name: Configuração de teclado compatível
      description: Identifica o layout do teclado compatível com um produto, como
        61 teclas ou 76 teclas
    compatible_lock_type:
      name: Tipo de fechadura compatível
      description: Identifica os tipos de fechadura com os quais um produto pode funcionar,
        como fechadura combinada ou eletrónica
    compatible_makeup:
      name: Maquilhagem compatível
      description: Especifica produtos de maquilhagem compatíveis, por exemplo, batom,
        sombra
    compatible_mattress_size:
      name: Tamanho de colchão compatível
      description: Especifica o tamanho do colchão adequado ao produto; ou seja, rei,
        gémeo
    compatible_memory_cards:
      name: Cartões de memória compatíveis
      description: Identifica os tipos de cartões de memória que um produto pode usar,
        normalmente para câmaras; por exemplo, SD, microSDHC
    compatible_microphone_thread:
      name: Fio de microfone compatível
      description: Especifica o tamanho de rosca compatível para produtos de microfone,
        por exemplo, 5/8"-27
    compatible_motherboard_form_factor:
      name: Fator de forma da placa-mãe compatível
      description: Especifica os tamanhos de placa-mãe que o produto pode suportar,
        como ATX
    compatible_oboe_type:
      name: Tipo de oboé compatível
      description: Identifica o tipo de oboé para o qual um produto foi projetado,
        como trompa universal ou inglesa
    compatible_operating_system:
      name: Sistema operativo compatível
      description: Define a compatibilidade de software de um produto, por exemplo,
        Windows, macOS
    compatible_orchestral_string_instrument:
      name: Instrumento de cordas para orquestra compatível
      description: Identifica o instrumento de cordas de orquestra específico para
        o qual o produto foi concebido, como o violino ou o violoncelo
    compatible_paper_size:
      name: Tamanho do papel compatível
      description: Especifica os tamanhos de papel que um dispositivo pode acomodar,
        normalmente para impressoras; por exemplo, A4, cartão postal
    compatible_patient_profile:
      name: Perfil de paciente compatível
      description: Identifica o grupo de pacientes adequado para um produto médico,
        como pediátrico ou geriátrico
    compatible_percussion_instrument:
      name: Instrumento de percussão compatível
      description: Identifica com que instrumentos de percussão um produto pode ser
        usado, como uma bateria ou um bongô
    compatible_pinball_machine_edition:
      name: Edição compatível da máquina de pinball
      description: Especifica a qual edição ou nível de acabamento da máquina de pinball
        o acessório se ajusta (p. ex., Pro, Premium, LE)
    compatible_play_vehicle_type:
      name: Tipo de veículo de jogo compatível
      description: Identifica o tipo de veículo de brincar para o qual o produto é
        adequado, como carro ou barco
    compatible_player:
      name: Leitor compatível
      description: Identifica os dispositivos que podem ser usados com um adaptador
        de cassete, por exemplo, iPad, laptop
    compatible_polish_thinner_type:
      name: Tipo de diluente de verniz compatível
      description: Indica os tipos de verniz de unhas com que o diluente é projetado
        para funcionar
    compatible_power_supply_form_factor:
      name: Formato de fonte de alimentação compatível
      description: Especifica o tamanho ou padrão da unidade de fonte de alimentação
        (PSU) que a caixa acomoda
    compatible_printer:
      name: Impressora compatível
      description: Identifica o tipo de impressora com que um produto é compatível,
        como laser ou jato de tinta
    compatible_processor_series:
      name: Série de processadores compatíveis
      description: Especifica a série de processadores com a qual o produto é compatível,
        como AMD Ryzen ou Intel Core Solo
    compatible_programming_languages:
      name: Linguagens de programação compatíveis
      description: Identifica as linguagens de programação com as quais um produto
        de software pode trabalhar, como Python ou Java
    compatible_recipes:
      name: Receitas compatíveis
      description: Especifica as receitas adequadas ao produto, normalmente para sorveteiras;
        por exemplo, sorvete, gelado
    compatible_resin_type:
      name: Tipo de resina compatível
      description: Especifica as categorias de resina UV que uma impressora SLA/MSLA
        pode usar
    compatible_resolution:
      name: Resolução compatível
      description: Define a resolução de exibição suportada, por exemplo, 1080p, full
        HD
    compatible_satellite_radio_service:
      name: Serviço de rádio via satélite compatível
      description: Identifica o(s) serviço(s) de rádio via satélite com que o recetor
        é projetado para funcionar, garantindo compatibilidade com subscrições existentes
        ou pretendidas
    compatible_seat_type:
      name: Tipo de assento compatível
      description: Especifica o tipo de assento infantil para carro no qual o produto
        se adapta, como assento elevatório ou infantil
    compatible_shoe_size:
      name: Tamanho de calçado compatível
      description: Combina produtos com tamanhos de calçado específicos, por exemplo,
        12, 42
    compatible_software_platform:
      name: Plataforma de software compatível
      description: Identifica as plataformas de software com as quais um produto é
        compatível, como Adobe Creative ou Canva
    compatible_special_effects_device:
      name: Dispositivo de efeitos especiais compatível
      description: Identifica os dispositivos de efeitos especiais com os quais um
        produto pode funcionar, como luzes LED ou máquinas de neblina
    compatible_stove_top_type:
      name: Tipo de placa de fogão compatível
      description: Identifica o tipo de fogão com o qual o produto pode ser utilizado,
        como a gás ou indução
    compatible_string_instrument:
      name: Instrumento de cordas compatível
      description: Identifica para que instrumento de cordas o produto foi projetado,
        como um ukulele ou baixo
    compatible_stroller_type:
      name: Tipo de carrinho compatível
      description: Especifica o tipo de carrinho em que o produto se adapta, como
        guarda-chuva ou jogging
    compatible_vacuum_type:
      name: Tipo de vapor compatível
      description: Especifica o tipo de aspirador com o qual o produto é compatível,
        como portátil ou a vapor
    compatible_vehicle:
      name: Veículo compatível
      description: Especifica o tipo de veículo para o qual um produto foi projetado,
        como carro ou SUV
    compatible_voice_assistant:
      name: Assistente de voz compatível
      description: Identifica as plataformas de controlo por voz que podem operar
        o recetor
    compatible_walking_aid_equipment:
      name: Equipamento de auxílio à marcha compatível
      description: Especifica para quais auxiliares de locomoção o produto foi projetado,
        por exemplo, muletas, andadores
    compatible_wax_container_size:
      name: Tamanho do recipiente de cera compatível
      description: Lista os tamanhos padrão de cartuchos, latas ou potes que podem
        ser colocados diretamente no aquecedor sem decantação
    compatible_wax_form:
      name: Forma de cera compatível
      description: Especifica as formas de cera depilatória que o aquecedor foi projetado
        para derreter
    compatible_weight_lifting_accessory:
      name: Acessório de elevação de peso compatível
      description: Especifica o equipamento de levantamento de peso com o qual o produto
        é compatível, como barra ou haltere
    compliance_certifications:
      name: Certificações de conformidade
      description: Especifica as declarações de conformidade de um produto, como HIPAA
        ou FedRAMP
    component_mounting_style:
      name: Estilo de montagem do componente
      description: Define o método principal pelo qual um componente eletrónico ou
        placa é fixado a uma placa de circuito, painel, chassi ou calha
    component_output_type:
      name: Tipo de saída do componente
      description: Especifica o tipo de sinal de saída de componentes eletrônicos,
        como UART ou analógico
    component_package_type:
      name: Tipo de embalagem do componente
      description: Define o formato ou embalagem de componentes eletrónicos, por exemplo,
        SDM (Surface Mount Device), DIP (Dual In-line Package)
    component_size_code:
      name: Código de tamanho do componente
      description: Especifica a designação de tamanho padronizada SMD ou through-hole
        (p. ex., 0603, 0805) utilizada para o pacote do capacitor
    component_tolerance:
      name: Tolerância do componente
      description: Define o desvio permitido do valor nominal (resistência, capacitância,
        indutância, frequência, etc.) expresso em percentagem
    components_included:
      name: Componentes incluídos
      description: Lista as peças de hardware fornecidas no kit inicial
    compression_circuit_type:
      name: Tipo de circuito de compressão
      description: Descreve a tecnologia subjacente de redução de ganho (p. ex., VCA,
        FET, ótico) que molda o som e a resposta do processador
    compression_format:
      name: Formato de compressão
      description: Define o tipo de compactação de arquivo de vídeo usado, por exemplo,
        MPEG-4, AVI
    compression_level:
      name: Nível de compressão
      description: Indica a intensidade da pressão em produtos de compressão, por
        exemplo, leves, firmes
    computer_accessories_included:
      name: Acessórios de computador incluídos
      description: Identifica os acessórios complementares de computador fornecidos,
        como mouse ou bolsa para laptop
    computer_form:
      name: Formulário para computador
      description: Define o design físico ou layout de um computador, como multifuncional
        ou notebook
    computer_server_features:
      name: Características do servidor de computador
      description: Descreve as características especiais de um servidor, como a fonte
        de alimentação redundante ou o suporte de virtualização
    computer_specialized_features:
      name: Características especializadas de computador
      description: Destaca recursos específicos do computador, como sistema de refrigeração
        líquida ou iluminação RGB
    concertina_button_configuration:
      name: Configuração de botão de concertina
      description: Especifica o número e a disposição dos botões numa concertina,
        como a sanfona anglo de 20 botões
    condition:
      name: Estado
      description: Descreve o estado ou a qualidade de um produto, por exemplo, menta
        (M), deficiente (P)
    conditioner_effect:
      name: Efeito do condicionador
      description: Define os benefícios de um condicionador de cabelo, como alisante
        ou anticaspa
    condom_compatibility:
      name: Compatibilidade com preservativo
      description: Especifica com que materiais de preservativo o lubrificante é de
        utilização segura
    condom_fit_type:
      name: Tipo de ajuste do preservativo
      description: Descreve o dimensionamento geral ou contorno anatómico concebido
        para melhorar conforto e sensação
    condom_type:
      name: Tipo de preservativo
      description: Diferencia se um preservativo é destinado a homens ou mulheres
    conductivity_gel_application:
      name: Aplicação de gel de condutividade
      description: Especifica o procedimento médico ou de diagnóstico a que o gel
        ou loção de condutividade se destina
    conductor_core_type:
      name: Tipo de núcleo do condutor
      description: Indica se o condutor interno é trançado ou núcleo sólido
    connecting_thread:
      name: Fio condutor
      description: Especifica o tipo de rosca para unir peças de canalização, por
        exemplo, IPS de 1/2 polegada
    connection_method:
      name: Método de ligação
      description: Especifica o tipo de conexão que um produto usa, como sem fios
        ou com fios
    connection_type:
      name: Tipo de ligação
      description: Especifica o tipo de conexão usada pelos eletrónicos, como com
        fio ou Bluetooth
    connectivity_technology:
      name: Tecnologia de conectividade
      description: Define o método de transferência de dados num produto, por exemplo,
        Bluetooth, USB
    connectivity_type:
      name: Tipo de conectividade
      description: Esclarece se a placa é sem solda (estilo protoboard) ou projetada
        para soldagem
    connector_1_type:
      name: Tipo de conector 1
      description: Especifica o conector ou a interface presente na primeira extremidade
        do adaptador ou acoplador
    connector_2_type:
      name: Tipo de conector 2
      description: Especifica o conector ou a interface presente na segunda extremidade
        do adaptador ou acoplador
    connector_contact_plating:
      name: Revestimento dos contactos do conector
      description: Especifica o revestimento ou cobertura de superfície aplicada aos
        contactos elétricos para melhorar a condutividade e resistência à corrosão
    connector_design:
      name: Design de conector
      description: Identifica a conceção dos conectores ou elos da corrente, tais
        como extremidade aberta ou de encaixe
    connector_gender:
      name: Género do conector
      description: Especifica o género das extremidades do conector na eletrónica,
        por exemplo, macho, macho para fêmea
    connector_mounting_style:
      name: Estilo de montagem do conector
      description: Indica como o conector é mecanicamente montado ou integrado numa
        montagem (p. ex., PCB, painel, chassi, cabo, acoplador)
    connector_orientation:
      name: Orientação do conector
      description: Descreve a orientação física da interface de acoplamento relativa
        à superfície de montagem ou cabo (p. ex., reto, ângulo reto, vertical)
    connector_position:
      name: Posição do conector
      description: Descreve a localização do conector de vídeo quando o ecrã é visto
        de frente (p. ex., inferior direito, superior esquerdo)
    connector_type:
      name: Tipo de conector
      description: Especifica o estilo ou padrão de conector presente nas extremidades
        do fio jumper
    console_accessories_included:
      name: Acessórios da consola incluídos
      description: Lista os principais acessórios ou componentes embalados com a consola
        (p. ex., comandos, cabos, base, jogos)
    console_system:
      name: Sistema de consola
      description: Define a marca específica de uma consola de videogame, como Atari
        2600 ou Playstation
    console_type:
      name: Tipo de consola
      description: Classifica o formato e o ambiente de utilização pretendido da consola
    constitutive_ingredients:
      name: Ingredientes constitutivos
      description: Especifica os componentes utilizados na formulação de um produto,
        por exemplo, óxido de zinco, aloé vera
    construction:
      name: Construção
      description: Indica o método ou técnica de metalurgia utilizada na fabricação
        de joias (p. ex., banhado, vermeil, preenchido, sólido)
    construction_set_theme:
      name: Tema de conjunto de construção
      description: Identifica o tema de um conjunto de construção, como piratas ou
        animais
    contact_lens_case_accessories_included:
      name: Acessórios do estojo de lentes de contacto incluídos
      description: Lista os itens suplementares embalados com o estojo de lentes de
        contacto
    contact_lens_case_features:
      name: Características do estojo de lentes de contacto
      description: Destaca funcionalidades ou inclusões assinaláveis do estojo
    contact_lens_material:
      name: Material da lente de contacto
      description: Especifica a formulação do polímero ou família de materiais (p.
        ex., hidrogel, hidrogel de silicone) de que é feita a lente
    contact_material:
      name: Material dos contactos
      description: Identifica o metal ou revestimento usado para os contactos da bateria
        dentro do suporte
    contrast:
      name: Contraste
      description: Usado para especificar o nível de contraste no filme da câmara,
        por exemplo, normal ou alto
    contrast_ratio_typical:
      name: Taxa de contraste (típica)
      description: Indica a taxa de contraste da tela, por exemplo, 3000:1
