    pad_thickness:
      name: Espessura do absorvente
      description: Classifica o perfil geral de espessura do absorvente (p. ex., ultrafino,
        maxi)
    pad_type:
      name: Tipo de discos
      description: Especifica o tipo de almofada do produto, por exemplo, lavável
        na máquina, substituível
    pad_wing_style:
      name: Estilo de aba do absorvente
      description: Indica se o absorvente menstrual inclui abas laterais para fixação
        e proteção contra fugas
    paddle/oar_material:
      name: Material do paddle/remo
      description: Identifica o material utilizado na construção das pás ou dos remos,
        como o alumínio ou a madeira
    paddle_equipment_included:
      name: Equipamento de paddle/remo incluído
      description: Especifica os equipamentos suplementares em conjuntos de remo,
