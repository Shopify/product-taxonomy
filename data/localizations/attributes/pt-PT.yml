    parking_sign_design:
      name: Design de sinal de estacionamento
      description: Identifica a finalidade de um sinal de estacionamento, por exemplo,
        zona de carga, estacionamento reservado
    pass_duration:
      name: Duração do passe
      description: Especifica o período de validade ou vida útil do passe ou bilhete
        de viagem
    passband:
      name: Banda de passagem
      description: Especifica a banda de frequência que um filtro eletrónico deixa
        passar, por exemplo, passa-alto
    pasta_shape_type:
      name: Tipo de forma da massa
      description: Classifica produtos de massa com base no seu formato, por exemplo,
        esparguete, tortellini
    pasta_type:
      name: Tipo de massa
      description: Classifica produtos de massa por seu formato ou formato específico,
        por exemplo, macarrão, penne
    patch_shape:
      name: Formato do remendo
      description: Descreve a forma ou o desenho de um remendo, como um animal ou
        geométrico
    patella_opening_design:
      name: Design da abertura patelar
      description: Especifica se a ortótese tem área patelar aberta ou fechada ou
        um anel estabilizador
    pattern:
      name: Padrão
      description: Excluir? Já tem?
    pattern_distribution_format:
      name: Formato de distribuição de padrão
      description: Identifica como um padrão é entregue, como PDF ou tutoriais online
    payment_mechanism_type:
      name: Tipo de mecanismo de pagamento
      description: Identifica como os jogadores ativam a máquina (p. ex., operado
        por moeda, passar cartão)
    pbx_system_type:
      name: Tipo de sistema PBX
      description: Define a arquitetura geral do produto PBX
    pcb_surface_finish:
      name: Acabamento de superfície da PCB
      description: Especifica o revestimento protetor aplicado às almofadas de cobre
        expostas
    pcb_type:
      name: Tipo PCB
      description: Identifica o tipo de placa de circuito impresso (PCB), como rígida
        ou flexível
    pcie_lane_configuration:
      name: Configuração de lanes PCIe
      description: Especifica a largura física de lanes que o riser suporta (p. ex.,
        x1, x4, x8, x16), indicando tamanho do slot e largura de banda elétrica
    pedal_polarity:
      name: Polaridade do pedal
      description: Especifica como o mecanismo de comutação do pedal do teclado funciona
        num estado padrão não pressionado; por exemplo, NC (normalmente fechado)
    pegi_rating:
      name: Classificação PEGI
      description: Especifica a classificação Pan European Game Information (PEGI)
        para videojogos, por exemplo, 3, 12
    pen/felt_tip_design:
      name: Design do bico de caneta/caneta de feltro
      description: Descreve a espessura e o estilo da ponta de uma caneta, como negrito
        ou fino
    pen/pencil_features:
      name: Características da caneta e do lápis
      description: Identifica as características especiais de instrumentos de escrita,
        como borracha ou recarregáveis
    pen_color:
      name: Cor da caneta
      description: Identifica a cor da tinta da caneta, por exemplo, vermelho, azul
    pen_features:
      name: Características da caneta
      description: Descreve as características únicas de canetas, como canetas retráteis
        ou perfumadas
    pen_pattern:
      name: Padrão da caneta
      description: Identifica o tema visual nas canetas, como camuflagem ou xadrez
    pen_tip_design:
      name: Design de ponta de caneta
      description: Descreve o estilo da ponta de uma caneta, como média ou fina
    pen_type:
      name: Tipo de caneta
      description: Identifica o tipo de caneta ou instrumento de escrita, como gel
        ou de tinta permanente
    pencil_features:
      name: Características do lápis
      description: Identifica as características específicas dos lápis, como borracha
        ou retrátil
    pencil_sharpener_design:
      name: Desenho do afia-lápis
      description: Especifica as características de design de uma afiadora de lápis,
        por exemplo, com recipiente para aparas, simples
    pencil_type:
      name: Tipo de lápis
      description: Especifica o tipo de lápis, como mecânico ou de madeira
