        edição
    color_saturation:
      name: Saturação de cor
      description: Indica a intensidade da cor no filme da câmara, por exemplo, alta,
        baixa
    comb/brush_size:
      name: Tamanho de pente/escova
      description: Classifica o tamanho geral da escova ou pente
    comb_features:
      name: Características do pente
      description: Lista características assinaláveis de desempenho ou design do pente
    comb_tooth_spacing:
      name: Espaçamento dos dentes do pente
      description: Descreve o espaçamento ou densidade dos dentes do pente
    comic_edition:
      name: Edições de banda desenhada
      description: Indica a versão de lançamento ou a edição específica de uma banda
        desenhada, o que pode influenciar a sua raridade e valor de coleção, p. ex.,
        primeira edição, capa variante
    comic_tradition:
      name: Tradição de banda desenhada
      description: Indica a tradição cultural ou regional de onde a banda desenhada
        é originária, p.ex., banda desenhada chinesa ou manga
    commode_opening_type:
      name: Tipo de abertura do assento sanitário
      description: Identifica a presença e estilo de qualquer recorte ou compatibilidade
        com balde no assento sanitário
    communication_device_features:
      name: Características do dispositivo de comunicação
      description: Identifica recursos exclusivos em dispositivos de comunicação,
        como tela sensível ao toque ou controlo de voz
    communication_protocols:
      name: Protocolos de comunicação
      description: Especifica o protocolo de rede usado, como Modbus ou Profibus
    compass_style:
      name: Estilo de bússola
      description: Especifica o estilo das bússolas de navegação, como bússola de
        mergulho ou bússola giroscópica
    compatible_accessibility_equipment_type:
      name: Tipo de equipamento de acessibilidade compatível
      description: Especifica o tipo de equipamento de acessibilidade ou mobilidade
        com que o acessório é projetado para funcionar
    compatible_aircraft_type:
      name: Tipo de aeronave compatível
      description: Identifica o tipo de aeronave para a qual o produto é adequado,
        como avião ou helicóptero
    compatible_amplifier:
      name: Amplificador compatível
      description: Identifica o tipo de amplificador com o qual um produto é compatível,
        como baixo ou teclado
    compatible_aquarium:
      name: Aquário compatível
      description: Especifica para quais tipos de aquário um produto é adequado, por
        exemplo, todos os aquários, água salgada
    compatible_baby_bottle_design:
      name: Desenho de biberão compatível
      description: Indica os estilos de mamadeira com os quais o produto é compatível,
        como gargalo largo
    compatible_baby_carrier_type:
      name: Tipo de porta-bebés compatível
      description: Especifica o tipo de porta-bebés com o qual o produto é compatível,
        como porta-bebés ou mochila
    compatible_baby_chair_type:
      name: Tipo de cadeira de bebé compatível
      description: Especifica o tipo de cadeira de bebé adequada ao produto, como
        carrinho de compras ou restaurante
    compatible_baby_transport_type:
      name: Tipo de transporte de bebé compatível
      description: Identifica itens de transporte de bebé compatíveis, como carrinho
        de bebé ou cadeirinha de carro
    compatible_ball_type:
      name: Tipo de bola compatível
      description: Identifica os tipos de bola adequados para uso com o produto, por
        exemplo, ténis, wiffle
    compatible_battery_size:
      name: Tamanho da bateria compatível
      description: Identifica os tamanhos de bateria com os quais um produto é compatível,
        por exemplo, AAA, CR2032
    compatible_battery_technology:
      name: Tecnologia de bateria compatível
      description: Especifica o tipo de tecnologia de bateria com a qual um produto
        é compatível, como íon de lítio ou alcalina
    compatible_bench_positions:
      name: Posições de banco compatíveis
      description: Especifica a gama de posições, normalmente para um banco de treino;
        por exemplo, estável ou inclinado
    compatible_bike_type:
      name: Tipo de bicicleta compatível
      description: Especifica o tipo de bicicleta para a qual o produto foi projetado,
        como elétrica ou rodoviária
    compatible_brass_instrument:
      name: Instrumento de latão compatível
      description: Especifica o instrumento de sopro com o qual o produto pode ser
        usado, como trompete ou tuba
    compatible_cable_tie_material:
      name: Material de abraçadeira compatível
      description: Identifica o tipo de abraçadeira (p. ex., aço inoxidável, náilon)
        que a pistola é projetada para instalar ou remover
    compatible_chemical_treatment_strength_level:
      name: Nível de intensidade do tratamento químico compatível
      description: Indica a intensidade recomendada pelo fabricante (p. ex., suave,
        regular, super) do tratamento químico
    compatible_clarinet_type:
      name: Tipo de clarinete compatível
      description: Identifica o tipo de clarinete com o qual um produto é compatível,
        como clarinete A ou universal
    compatible_contact_lens_type:
      name: Tipo de lente de contacto compatível
      description: Identifica quais as categorias de lentes de contacto que podem
        ser armazenadas ou limpas no estojo
    compatible_contact_lenses:
      name: Lentes de contacto compatíveis
      description: Indica os tipos ou materiais das lentes de contacto com os quais
        a solução pode ser utilizada com segurança.
    compatible_cosmetic_tools:
      name: Ferramentas cosméticas compatíveis
      description: Especifica com quais ferramentas de beleza o produto pode ser usado,
        por exemplo, esponjas, pinças
    compatible_device:
      name: Dispositivo compatível
      description: Especifica que dispositivos funcionam com dispositivos eletrónicos,
        como smartwatch ou fone de ouvido sem fio
    compatible_drum_configuration:
      name: Configuração de tambor compatível
      description: Identifica a configuração de bateria para a qual o produto foi
        projetado, como contrabaixo ou hi-hat
    compatible_electric/acoustic_instrument:
      name: Instrumento elétrico/acústico compatível
      description: Identifica o instrumento elétrico ou acústico para o qual o produto
        foi projetado, como guitarra elétrica ou sintetizador
    compatible_electronic_card_type:
      name: Tipo de cartão eletrónico compatível
      description: Especifica os tipos de cartões eletrónicos com que o produto pode
        interagir, tais como banda magnética ou biblioteca
    compatible_equipment_type:
      name: Tipo de equipamento compatível
      description: Especifica a categoria de equipamento de piscina ou spa para que
        a placa de circuito é projetada (p. ex., aquecedor, bomba, doseador de cloro)
    compatible_exercise_machine_type:
      name: Tipo de equipamento de exercício compatível
      description: Identifica o tipo de equipamento de exercício para o qual a placa
        é destinada (p. ex., passadeira rolante, bicicleta elíptica)
    compatible_exercises:
      name: Exercícios compatíveis
      description: Especifica os exercícios que podem ser realizados com o produto,
        como barras fixas ou descidas
    compatible_eyewear_type:
      name: Tipo de óculos compatível
      description: Identifica o tipo de óculos com o qual o acessório foi projetado
        para se ajustar ou funcionar
    compatible_filament:
      name: Filamento compatível
      description: Especifica os tipos de filamento que uma impressora 3D pode usar,
        como ácido polilático (PLA) ou Nylon
    compatible_film_type:
      name: Tipo de película compatível
      description: Identifica o tipo de filme que uma câmara pode usar, como filme
        negativo ou filme colorido
    compatible_flute_type:
      name: Tipo de flauta compatível
      description: Identifica o tipo de flauta com que um produto é compatível, por
        exemplo, universal, flautim
    compatible_game_format:
      name: Formato de jogo compatível
      description: Especifica o tipo de formato de jogo compatível, como somente download
