    neutral_density_rating:
      name: Classificação de densidade neutra
      description: Define a densidade ótica ou força de um filtro ND, expressa por
        fatores ND comuns ou reduções de paragens
    nightgown_style:
      name: Estilo de camisa de noite
      description: Especifica o estilo da camisa de noite, por exemplo, babydoll,
        chemise
    nipple_material:
      name: Material da tetina
      description: Especifica o material utilizado para o bico da mamadeira, por exemplo,
        látex, borracha
    nipple_shape:
      name: Formato da tetina
      description: Define o formato dos bicos da mamadeira, como planos ou angulares
    nipple_type:
      name: Tipo de tetina
      description: Especifica o tipo de bico nas mamadeiras, como gargalo largo ou
        padrão
    nock_material:
      name: Material do pino
      description: Especifica o tipo de material usado para encaixes de flecha, como
        alumínio ou plástico
    noise_cancellation_technology:
      name: Tecnologia de cancelamento de ruído
      description: Especifica o tipo de sistema de redução de ruído usado nos auscultadores,
        ajudando os compradores a identificar modelos com controlo de ruído ativo,
        passivo ou adaptativo
    noise_intensity:
      name: Intensidade de ruído
      description: Descreve o nível de som produzido por um produto, normalmente fogos
        de artifício; por exemplo, baixo, alto
    noise_reduction_system:
      name: Sistema de redução de ruído
      description: Especifica o(s) padrão(ões) de redução de ruído analógico integrado(s)
        suportado(s) pelo deck
    notepad_cover_type:
      name: Tipo de capa de bloco de notas
      description: Identifica o tipo de capa de um bloco de notas, como capa dura
        ou capa mole
    notepad_design:
      name: Desenho do bloco de notas
      description: Descreve a encadernação ou a disposição de um bloco de notas, por
        exemplo, encadernação em espiral ou em disco
    nozzle_coating:
      name: Revestimento do bico
      description: Especifica qualquer tratamento de superfície aplicado ao bico para
        melhorar a resistência ao desgaste ou reduzir a adesão do filamento
    nozzle_thread_type:
      name: Tipo de rosca do bico
      description: Define a rosca mecânica ou padrão de montagem utilizado para fixar
        o bico (p. ex., M6, MK8, E3D V6, Volcano)
    nozzle_type:
      name: Tipos de bocal
      description: Especifica o tipo de bico para jatos de água odontológicos, por
        exemplo, ortodônticos, limpadores de língua
    nursery_theme:
      name: Tema do berçário
      description: Define o design ou motivo de produtos relacionados ao berçário,
        como selva ou dinossauro
    nursing_cover_coverage:
      name: Cobertura para amamentação
      description: Define a cobertura fornecida por uma cobertura de enfermagem, como
        total ou parcial
    nursing_pad_design:
      name: Design da almofada de amamentação
      description: Descreve as características físicas dos absorventes de amamentação,
        como grossos ou redondos
    nursing_pillow_shape:
      name: Forma de almofada de amamentação
      description: Identifica o contorno das copas de amamentação, como em forma de
        C ou em U
    nut/seed_type:
      name: Tipo de noz/semente
      description: Identifica o tipo específico de caroço ou semente num produto,
        como amêndoas ou sementes de chia
    nut_butter_variety:
      name: Variedade de manteiga de frutos secos
      description: Identifica a variedade de nozes em pastas à base de nozes, por
        exemplo, amendoim, amêndoa
    nut_form:
      name: Forma de porca
      description: Descreve a forma das porcas de ferragem, por exemplo, quadradas,
        com abas
    nut_processing_method:
      name: Método de processamento de nozes
      description: Define como as nozes ou sementes são preparadas, por exemplo, cristalizadas,
        cruas
    nutrient_content:
      name: Teor de nutrientes
      description: Especifica os elementos nutricionais presentes, normalmente para
        fertilizantes; por exemplo, nitrogénio, fósforo
    oboe_key_system:
      name: Sistema de chaves de oboé
      description: Identifica o sistema principal de um oboé, como francês ou conservatório
    ocarina_style:
      name: Estilo de ocarina
      description: Descreve o estilo das ocarinas, por exemplo, transversal ou pendente
    occasion:
      name: Ocasião
      description: Especifica o evento ou ambiente adequado para um produto, por exemplo,
        casual, formal
    occasion_style:
      name: Estilo de ocasião especial
      description: Ajuda a categorizar produtos com base na ocasião, por exemplo,
        casual, vestido
    odor_remover_application_area:
      name: Área de aplicação do removedor de odores
      description: Especifica onde o produto se destina a ser aplicado para remoção
        de odores
    office_cart_features:
      name: Características do carrinho de escritório
      description: Descreve as características específicas de um carrinho de escritório,
        como prateleiras ajustáveis ou rodas com travão
    office_instrument_material:
      name: Material de instrumento de escritório
      description: Especifica a composição de ferramentas de escritório, por exemplo,
        madeira ou acrílico
    office_supply_material:
      name: Material de escritório
      description: Identifica o principal material do material de escritório, como
        couro ou papelão
    oil_extraction_method:
      name: Método de extração do óleo
      description: Especifica como o óleo principal foi processado ou extraído (p.
        ex., prensado a frio, refinado)
    oil_type:
      name: Tipo de óleo
      description: Especifica o tipo de óleo utilizado num produto, por exemplo, parafina,
        querosene
    olfactory_family:
      name: Família olfativa
      description: Define a categoria olfativa geral a que pertence uma fragrância,
        como aldeídica ou animálica
    one_piece_style:
      name: Estilo de peça única
      description: Identifica o estilo específico de uma peça de roupa, como um macacão
        ou macacão de suspensórios
    open/closed_sign_design:
      name: Design de sinal de Aberto/Fechado
      description: Especifica o estilo de um sinal aberto/fechado, por exemplo, horário
        de funcionamento, personalizado
    opening_direction:
      name: Direção de abertura
      description: Especifica a direção na qual um produto abre, normalmente para
        portões; por exemplo, balanço unilateral
    opening_mechanism:
      name: Mecanismo de abertura
      description: Especifica como um produto é aberto, normalmente para portões de
        bebés ou animais de estimação; por exemplo, alavanca, pedal
    operating_mode:
      name: Modo de funcionamento
      description: Define o método de operação, normalmente para equipamentos médicos;
        por exemplo, semiautomático
    operating_system:
      name: Sistema operativo
      description: Define o software do sistema que um dispositivo usa, como iOS ou
        ChromeOS
    operating_system_compatibility:
      name: Compatibilidade do sistema operativo
      description: Identifica os sistemas operativos que o obturador remoto suporta
        de fábrica
    operation_mechanism:
      name: Mecanismo de operação
      description: Descreve como a ferramenta aplica tensão e corta a abraçadeira
        (p. ex., manual, pneumática, automática)
    operation_method:
      name: Método de funcionamento
      description: Define como um produto é operado, normalmente para sistemas de
        abertura de portas de garagem; por exemplo, acionamento por correia, hidráulico
    optical_disc_recordability:
      name: Capacidade de gravação de disco ótico
      description: Define se um disco ótico é de gravação única ou regravável e se
        é de camada única ou dupla
    optical_drive_form_factor:
      name: Fator de forma da unidade ótica
      description: Define o tamanho físico e estilo de instalação da unidade
    optical_drive_loading_mechanism:
      name: Mecanismo de carregamento da unidade ótica
      description: Indica como os discos são inseridos na unidade (p. ex., carregamento
        por bandeja, carregamento por slot, carregamento superior)
    optical_drive_type:
      name: Tipo de unidade ótica
      description: Identifica os formatos de conteúdo multimédia que a unidade ótica
        de um dispositivo pode ler e gravar, por exemplo, CD-ROM, DVD-ROM
    optical_frame_design:
      name: Design da armação ótica
      description: Define se os óculos possuem armação ou não, por exemplo, sem aro,
        full frame
    optical_zoom:
      name: Zoom ótico
      description: Indica a capacidade de zoom de uma câmara, por exemplo, sem zoom,
        mais de 30x
    oral_care_function:
      name: Função de cuidados orais
      description: Destaca o principal benefício de saúde dental ou oral que o produto
        aborda (p. ex., branqueamento, alívio de sensibilidade, saúde gengival)
    oral_care_items_included:
      name: Itens de cuidados orais incluídos
      description: Lista os tipos de produtos de cuidados orais incluídos no conjunto
    organizer_type:
      name: Tipo de organizador
      description: Especifica a categoria de armazenamento do veículo, como porta-copos
        ou porta-luvas
    orientation:
      name: Orientação
      description: Especifica o posicionamento pretendido do produto, por exemplo,
        horizontal, vertical
    orthotic_coverage_length:
      name: Comprimento de cobertura ortótica
      description: Define a área da palmilha que o suporte de arco cobre (p. ex.,
        comprimento total, 3/4 do comprimento, calcanhar)
    outdoor_equipment_features:
      name: Características de equipamento de exterior
      description: Identifica as características únicas de equipamentos para atividades
        ao ar livre, como resistência às intempéries ou portátil
    outdoor_furniture_items_included:
      name: Artigos de mobiliário de exterior incluídos
      description: Identifica os artigos específicos incluídos num conjunto de mobiliário
        de exterior, como cadeiras ou mesa
    outdoor_power_accessories_included:
      name: Acessórios de alimentação exterior incluídos
      description: Especifica itens adicionais fornecidos com equipamentos elétricos
        externos, por exemplo, motosserra, protetores de ouvido
    outdoor_walking_activity:
      name: Atividade de caminhada ao ar livre
      description: Classifica os produtos com base na atividade pretendida de caminhada
        ao ar livre, por exemplo, trekking, corrida em trilha
    outerwear_clothing_features:
      name: Características de roupas desportivas de exterior
      description: Identifica características especiais de vestuário exterior, como
        isolado ou impermeável
    outlet_type:
      name: Tipo de saída elétrica
      description: Especifica o tipo de plug para dispositivos eletrónicos, por exemplo,
        tipo A, tipo L
    output_connection:
      name: Ligação de saída
      description: Especifica o tipo de conexão de entrada para cabos de áudio, como
        3,5 mm ou RCA
    output_connection_type:
      name: Tipo de ligação de saída
      description: Especifica o conector ou padrão de interface fornecido pelo conversor
        no seu lado de saída
    output_level:
      name: Nível de saída
      description: Descreve o nível de saída de acessórios de instrumentos musicais,
        como baixo ou alto
    output_signal_interface:
      name: Interface do sinal de saída
      description: Especifica o(s) tipo(s) de ligação(ões) de saída fornecida(s) pelo
        conversor
    output_video_interface:
      name: Interface de vídeo de saída
      description: Especifica o(s) tipo(s) de conector de vídeo fornecido(s) como
        saída pelo conversor de scan
    output_waveform:
      name: Forma de onda de saída
      description: Especifica o tipo de sinal que um oscilador eletrónico gera, como
        dente de serra ou sinusoidal.
    oven_accessories_included:
      name: Acessórios de forno incluídos
      description: Detalha os componentes extras do forno incluídos, como assadeira
        ou grade
    overclock_profile_support:
      name: Suporte a perfil de overclock
      description: Identifica perfis de overclocking padronizados armazenados no módulo
        (p. ex., Intel XMP, AMD EXPO)
    oxygen_cylinder_outlet_standard:
