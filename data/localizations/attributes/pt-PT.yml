    tack/pushpin_head_design:
      name: Design de cabeça de tacha/pino
      description: Descreve a forma da cabeça de um taco ou alfinete, como redonda
        ou decorativa
    tag_fastening:
      name: Fixação de etiqueta
      description: Descreve o método usado para prender uma etiqueta na bagagem, como
        fivelas ou presilhas
    talc_content:
      name: Conteúdo de talco
      description: Declara se a formulação contém talco, é livre de talco ou usa níveis
        reduzidos de talco
    tampon_absorbency_level:
      name: Nível de absorção do tampão
      description: Identifica a capacidade de absorção dos tampões, como pouco ou
        muito fluxo
    tampon_features:
      name: Características do tampão
      description: Descreve as características específicas dos tampões, como design
        confortável ou estanque
    tan_type:
      name: Tipo de bronze
      description: Define a intensidade da cor e o processo de aplicação de artigos
        de bronzeamento, por exemplo, escuro, instantâneo
    tank_color:
      name: Cor do depósito
      description: Identifica a cor de um produto, normalmente caixas sanitárias;
        por exemplo, preto, branco
    tank_material:
      name: Material do reservatório
      description: Especifica o material do tanque de um produto, normalmente para
        ferramentas de jardinagem; por exemplo, metal, plástico
    tank_pattern:
      name: Padrão do tanque
      description: Identifica o motivo visual em sanitas, como sólido ou abstrato
    tape_cartridge_format:
      name: Formato do cartucho de fita
      description: Especifica as tecnologias de cartucho de fita (p. ex., LTO, DAT,
        DLT) que a unidade pode ler ou gravar
    tape_cartridge_generation:
      name: Geração do cartucho de fita
      description: Indica a geração ou versão específica dentro de uma família de
        tecnologia de fita (mais comumente gerações LTO) que a unidade suporta
    tape_material:
      name: Material de fita
      description: Especifica o tipo de material usado em produtos de fita, como vinil
        ou plástico
    tape_speed_supported:
      name: Velocidade de fita suportada
      description: Lista as velocidades de reprodução e gravação de fita (polegadas
        por segundo) nas quais a unidade bobina a bobina pode operar
    target_audience:
      name: Público-alvo
      description: Especifica para quem um produto é adequado, como crianças ou todas
        as idades
    target_facial_zone:
      name: Zona facial alvo
      description: Especifica a zona facial que a fita de poros é concebida para tratar
        (p. ex., nariz, queixo, zona T)
    target_gender:
      name: Género alvo
      description: Identifica o gênero pretendido para um produto, como feminino,
        masculino ou unissexo
    targeted_pests:
      name: Eliminação de pragas específicas
      description: Identifica o tipo de pragas contra as quais um produto é eficaz,
        por exemplo, mofo, algas
    targeted_skin_concern:
      name: Preocupação de pele alvo
      description: Indica a lesão específica ou condição de pele que o produto é formulado
        para tratar
    targeted_stains:
      name: Eliminação de nódoas específicas
      description: Identifica os tipos de nódoas que um produto foi projetado para
        tratar, como comida ou lama
    tea_input_type:
      name: Tipo de preparação de chá
      description: Especifica o estilo de preparação do chá, por exemplo, saquinhos,
        xícaras K
    technology_level:
      name: Nível de tecnologia
      description: Indica a complexidade da tecnologia de um produto, por exemplo,
        básica, avançada
    teeth_material:
      name: Material dos dentes
      description: Identifica o material utilizado nos dentes, geralmente para ferramentas
        de jardinagem; por exemplo, plástico, metal
    telephone_cable_interface:
      name: Interface do cabo telefónico
      description: Define o tipo de plug usado em cabos telefónicos, como RJ-10
    telephone_cable_second_interface:
      name: Segunda interface do cabo telefónico
      description: Define o tipo de conector na extremidade oposta do cabo quando
        difere da interface primária (p. ex., RJ45 para RJ11)
    telephone_cord_style:
      name: Estilo de cabo telefónico
      description: Especifica a forma física do cabo do telefone, auxiliando os clientes
        que precisam de um cabo reto, espiralado ou especial para aparelhos de substituição
        e suportes de parede
    telephone_style:
      name: Estilo de telefone
      description: Define o design ou a estética de um telefone, por exemplo, vintage,
        novidade
    telescope_level:
      name: Nível do telescópio
      description: Indica a complexidade ou o nível de competência exigido para um
        telescópio, por exemplo, principiante ou avançado
    telescope_tracking_system:
      name: Sistema de rastreamento do telescópico
      description: Identifica o tipo de sistema de rastreamento em telescópios, por
        exemplo, manual, motorizado
    television_circuit_board_type:
      name: Tipo de placa de circuito da televisão
      description: Identifica a função funcional da placa de circuito dentro de um
        aparelho de televisão (p. ex., placa principal, placa de fonte de alimentação,
        placa T-Con)
    television_shape:
      name: Formato de televisão
      description: Define o contorno físico da tela da televisão, como curvo ou plano
    television_speaker_position:
      name: Posição do altifalante da televisão
      description: Identifica a localização física ou função do altifalante dentro
        da montagem da TV (p. ex., esquerda, direita, centro, subwoofer)
    television_specialized_features:
      name: Características especializadas de televisão
      description: Identifica as capacidades únicas de um televisor, como o controlo
        por voz ou a barra de som incorporada
    temperature:
      name: Temperatura
      description: Especifica as configurações de calor para dispositivos como pistolas
        de cola, por exemplo, dupla, alta
    temperature_control:
      name: Controlo da temperatura
      description: 'Define a possibilidade de ajuste de temperatura do produto, geralmente
        para aquecedores de mamadeira; por exemplo, ajustável, predefinido '
    temperature_measurement:
      name: Medição de temperatura
      description: Indica se o produto mede em Fahrenheit ou Celsius
    template_type:
      name: Tipo de modelo
      description: Especifica a categoria dos modelos de documentos, por exemplo,
        cartão de visita, folheto
    temple_color:
      name: Cor das hastes
      description: Especifica a cor do braço ou da têmpora dos óculos, como vermelho
        ou transparente
    temple_pattern:
      name: Padrão do templo
      description: Descreve o desenho ou motivo da haste dos óculos, como logótipo
        ou xadrez
    tension:
      name: Tensão
      description: Descreve o nível de tensão das cordas para instrumentos musicais,
        por exemplo, extrapesados
    tensioning_system:
      name: Sistema de tensionamento
      description: Detalha o mecanismo usado para manter a superfície da ecrã plana
        e sem rugas
    tent_setup_style:
      name: Estilo de montagem da tenda
      description: Indica como a tenda é implantada ou montada
    tequila_variety:
      name: Variedade de tequila
      description: Especifica o tipo de tequila, por exemplo, ouro, envelhecido
    terminal_operation:
      name: Operação do terminal
      description: Especifica o tipo de operação das caixas registadoras, como manual
        ou eletrónica
    termination_method:
      name: Método de terminação
      description: Especifica a técnica usada para fixar condutores aos contactos
        do conector (p. ex., cravação, solda, IDC)
    terrain:
      name: Terreno
      description: Especifica o tipo de solo para o qual um produto foi projetado,
        normalmente para equipamentos externos; por exemplo, montanha, rolamento
    test_format:
      name: Formato de teste
      description: Define o tipo de teste para produtos de saúde e beleza, por exemplo,
        digital, tira de teste
    test_method:
      name: Método de teste
      description: Define o procedimento para a realização de um exame médico, por
        exemplo, teste em casa, análise laboratorial
    test_sample:
      name: Amostra de teste
      description: Especifica o tipo de amostra necessária para exames médicos e de
        saúde, por exemplo, cotonete, saliva
    tetherball_equipment_included:
      name: Equipamento de Tetherball incluído
      description: Indica a inclusão de itens essenciais num conjunto de Tetherball,
        como corda ou Tetherball
    tethering_policy:
      name: Política de partilha de internet
      description: Esclarece se o ponto de acesso móvel ou a partilha de internet
        é permitida nos termos do plano eSIM
    text_plate_material:
      name: Material da placa de texto
      description: Identifica o material da placa de texto em carimbos de escritório,
        como metal ou borracha
    textile_craft_machine_features:
      name: Máquinas para trabalhos manuais têxteis
      description: Descreve as características especiais de máquinas têxteis artesanais,
        como tensão ajustável ou portátil
    textile_craft_project_type:
      name: Tipo de projeto de artesanato têxtil
      description: Identifica o tipo de projeto de artesanato têxtil, como tricô ou
        acolchoamento
    texture:
      name: Textura
      description: Define a sensação ou consistência de um produto, como cremoso,
        fosco ou absorvente
    texture_level:
      name: Nível de textura
      description: Indica a suavidade ou aspereza de um produto, normalmente para
        purés de alimentos nutritivos; por exemplo, Nível 1 (puré), Nível 2 (picado)
    theme:
      name: Tema
      description: Descreve o tema ou motivo principal do produto, como desporto,
        espaço ou feriados
    therapeutic_features:
      name: Características terapêuticas
      description: Lista modalidades terapêuticas adicionais integradas à ortótese
        cervical
    therapeutic_swing_accessories_included:
      name: Acessórios de balanço terapêutico incluídos
      description: Lista hardware ou acessórios adicionais fornecidos com o balanço
    therapy_mode_supported:
      name: Algoritmos de terapia suportados
      description: Lista os algoritmos de terapia respiratória em que o dispositivo
        pode operar, para além do APAP padrão
    therapy_temperature_type:
      name: Tipo de temperatura de terapia
      description: Indica se o produto fornece terapia de calor, terapia de frio,
        ou ambas
    thermal_detector_type:
      name: Tipo de detetor térmico
      description: Especifica a tecnologia usada para deteção térmica em dispositivos,
        como detetor de silício amorfo (a Si).
    thermal_sensation:
      name: Sensação térmica
      description: Descreve o efeito de temperatura sentido na pele após a aplicação
    thermocouple_type:
      name: Tipo de termopar
      description: Especifica a categoria do termopar em sensores, por exemplo, Tipo
        J, Tipo S
    thickness_type:
      name: Tipo de espessura
      description: Indica o nível de espessura de produtos, como fino, médio ou grosso
    thinner_application:
      name: Aplicação de diluente
      description: Descreve o tipo de substância para a qual um diluente é usado,
        como tinta ou epóxi
    thread_direction:
      name: Direção da rosca
      description: Identifica a direção da rosca em ferramentas, como lado esquerdo
        ou direito
    threaded_rod_size:
      name: Tamanho de haste roscada
      description: Especifica o diâmetro de uma haste roscada, por exemplo, M10, M20
    throw_pillow_shape:
      name: Formato de travesseiro
      description: Identifica o formato das almofadas decorativas, como bolsa ou retangular
    thumb_grip_profile:
      name: Perfil da empunhadura
      description: Descreve o estilo de superfície ou forma do topo da empunhadura
        (p. ex., côncavo, abaulado), que afeta a aderência e a sensação de controlo
    ticket_additional_features:
      name: Funcionalidades adicionais do bilhete
      description: Destaca benefícios extras oferecidos com bilhetes, como meet &
        greet ou atividades pós-evento
    ticket_class:
      name: Classe do bilhete
      description: Especifica o nível de serviço ou classe de assento fornecida com
        o bilhete
    ticket_type:
      name: Tipo de bilhete
      description: Identifica a categoria dos bilhetes do evento, como admissão geral
        ou assentos reservados
    tile_design:
      name: Design de ladrilho
      description: Descreve o padrão ou estilo de um ladrilho, como geométrico ou
        espinha de peixe
    tile_game_type:
      name: Tipo de jogo de peças
      description: Identifica o tipo específico de jogo de tabuleiro, como dominó
        ou Mahjong
    tile_installation_method:
      name: Método de instalação de ladrilhos
      description: Descreve como um produto é instalado, normalmente ladrilhos de
        teto ou parede; por exemplo, instalação por colocação
    tile_look:
      name: Aspeto de ladrilho
      description: Descreve a aparência ou estilo de um ladrilho, como mármore ou
        3D
    tile_material:
      name: Material do ladrilho
      description: Identifica a composição de ladrilhos, como cerâmica ou pedra
    tile_texture:
      name: Textura de ladrilho
      description: Descreve a sensação superficial de um ladrilho, como granulação
        lisa ou média
    time_period:
      name: Período
      description: Especifica o período relacionado a trabalhos ou estudos académicos,
        como a revolução medieval ou industrial
    time_signatures:
      name: Tempo rítmico
      description: Define a estrutura da batida, normalmente para metrónomos; por
        exemplo, 4/4, 3/4
    time_weighting:
      name: Ponderação de tempo
      description: Usado para especificar a rapidez com que um medidor de som responde
        às flutuações do som, por exemplo, lento, rápido
    timepiece_features:
      name: Características do relógio
      description: Identifica as características especiais de um relógio, como duração
        ajustável ou iluminação
    timer_design:
      name: Design do temporizador
      description: Descreve o tipo de temporizador usado em equipamentos de câmara
        escura, como digital ou analógico
    timer_features:
      name: Recursos de temporizador
      description: Descreve as funções especiais de um temporizador, como duração
        ajustável ou display integrado
    timer_type:
      name: Tipo de temporizador
      description: Especifica a configuração de frequência para temporizadores, por
        exemplo, diariamente, semanalmente
    tingle_intensity:
      name: Intensidade da dormência
      description: Descreve o nível de sensação de calor ou dormência produzido pelo
        produto quando aplicado
    tip_design:
      name: Design de ponta
      description: Especifica o tipo de ponta em agulhas e seringas médicas, como
        luer lock ou slip tip
    tip_material:
      name: Material da ponta
      description: Especifica o material utilizado no cabo do produto, como bambu
        ou plástico
    tip_opening:
      name: Abertura de ponta
      description: Descreve a largura da abertura do bocal em instrumentos de sopro,
        como médio ou grande
    tip_style:
      name: Estilo de ponta
      description: Descreve o design da ponta do produto, por exemplo, angular, curva
    tip_type:
      name: Tipo de ponta
      description: Define o tipo de ponta das lanças de pesca, como cinzel ou espiga
        dupla
    tire_bead_type:
      name: Tipo de talão de pneu
      description: Especifica o tipo de talão em pneus de bicicleta, como dobrável
        ou rígido
    tobacco_type:
      name: Tipo de tabaco
      description: Especifica a variedade de tabaco, por exemplo, Turco, Virgínia
    toddler_bed_features:
      name: Características para cama infantil
      description: Descreve as características especiais de camas infantis, como altura
        ajustável ou luz noturna embutida
    toe_spacer_design:
      name: Design do espaçador do dedo do pé
      description: Descreve o design dos separadores de dedos usados no cuidado dos
        pés, por exemplo, contornos, design de laço
    toe_strap_type:
      name: Tipo de fixação nos dedos dos pés
      description: Especifica o design da biqueira, normalmente para fixações de snowboard
        ou raquetes de neve; por exemplo, biqueira ou tradicional
    toe_style:
      name: Estilo de ponta do calçado
      description: Define o formato ou desenho da biqueira de um sapato, como aberta
        ou pontiaguda
    toilet/bidet_mounting_type:
      name: Tipo de montagem de sanita/bidé
      description: Identifica o modo de instalação de uma sanita ou bidé, com montagem
        no chão ou na parede
    toilet_cover_design:
      name: Design de tampa de retrete
      description: Descreve o formato das tampas de sanitas, como redondo ou alongado
    toilet_cover_features:
      name: Características de tampas de sanita
      description: Descreve as características especiais de uma tampa de sanita, como
        libertação rápida ou fecho suave
    toilet_mounting_type:
      name: Tipo de montagem de retrete
      description: Especifica o método de instalação da sanita, por exemplo, montagem
        na parede, no chão
    toilet_shape:
      name: Formato da retrete
      description: Descreve a forma de uma sanita, como redonda ou retangular
    tom_tom_design:
      name: Design de timbalão
      description: Descreve o tipo de estante de partitura, como piso ou parede
    tonearm_type:
      name: Tipo de braço
      description: Descreve a geometria do braço, que afeta o desempenho de rastreamento
        e a usabilidade para DJ
    tool/utensil_material:
      name: Material de ferramenta/utensílio
      description: Identifica o material principal utilizado numa ferramenta ou utensílio,
        como aço inoxidável ou madeira de teca
    tool_key_tip:
      name: Ponta de chave de ferramenta
      description: Especifica o tipo de ponta da chave da ferramenta, como Phillips
        ou chave inglesa
    tool_mobility:
      name: Mobilidade de ferramentas
      description: Descreve se uma ferramenta é com ou sem fios, normalmente para
        produtos dentários
    tool_operation:
      name: Operação de ferramenta
      description: Descreve como se trabalha com uma ferramenta, como manual ou elétrica
    toothbrush_head_size:
      name: Tamanho da cabeça da escova de dentes
      description: Define o tamanho relativo da cabeça da escova para se adequar a
        diferentes tamanhos de boca e necessidades de limpeza
    toothbrush_head_type:
      name: Tipo de cabeça da escova de dentes
      description: Classifica o estilo funcional da cabeça (p. ex., branqueamento,
        cuidado gengival, infantil)
    toothpaste_type:
      name: Tipo de pasta de dentes
      description: Define a função específica do creme dental, como anticárie ou clareador
    toothpick_design:
      name: Design do palito
      description: Especifica o formato dos palitos, como redondo ou plano
    top_color:
      name: Cor da parte superior
      description: Especifica a cor primária da capa de um produto, por exemplo, transparente,
        azul-marinho
    top_length_type:
      name: Tipo de comprimento superior
      description: Define o comprimento de tops ou camisas, como top curto ou longo
    top_material:
      name: Material da parte superior
      description: Define o material da superfície superior de um produto, por exemplo,
        madeira, vidro
    top_pattern:
      name: Padrão do tampo de mesa
      description: Descreve o desenho ou impressão na superfície de um produto, como
        floral ou às riscas
    top_surface_material:
      name: Material da superfície superior
      description: Especifica o material utilizado na superfície superior do produto,
        como aço inoxidável ou vidro cerâmico
    top_up_method:
      name: Método de carregamento
      description: Especifica as maneiras como os clientes podem adicionar crédito
        adicional ou renovar o plano no cartão pré-pago ou SIM
    tote_handle_type:
      name: Tipo de pega de bolsa
      description: Identifica o estilo das alças de uma mala totebag, como curta ou
        longa
    totem_design:
      name: Design de totem
      description: Especifica o design dos totens para feiras, como uma face ou duas
        faces
    touch_capabilities:
      name: Capacidades do tátil
      description: Indica o tipo de interação de toque que um dispositivo eletrónico
        suporta, como simples ou duplo
    touchpad_form_factor:
      name: Fator de forma do touchpad
      description: Define o estilo de instalação ou utilização pretendida para o touchpad
    touchscreen_technology:
      name: Tecnologia de ecrã tátil
      description: Identifica a tecnologia de ecrã tátil para dispositivos interativos,
        como capacitivos ou resistivos
    touchscreen_wire_configuration:
      name: Configuração de fios do ecrã tátil
      description: Indica o número de fios ou linhas utilizados pelos digitalizadores
        resistivos, afetando a compatibilidade com controladores
    toy/game_material:
      name: Material do brinquedo/jogo
      description: Identifica o principal material utilizado num brinquedo ou jogo,
        como o plástico ou a madeira
    toy_figure_features:
      name: Características de figuras de brinquedo
      description: Descreve as características especiais de bonecos, como juntas articuladas
        ou detalhes realistas
    toy_figure_theme:
      name: Tema de figuras de brinquedo
      description: Identifica o tema ou a categoria de uma figura de brinquedo, por
        exemplo, animal ou desporto
    toy_tool_type:
      name: Tipo de ferramenta de brincar
      description: Identifica o tipo de ferramenta de brinquedo num jogo de faz-de-conta,
        como um berbequim ou um martelo
    track_configuration:
      name: Configuração de faixas
      description: Indica o formato de faixa de fita e canais que a máquina pode gravar
        ou reproduzir (p. ex., estéreo vs mono, número de faixas)
    tracker_form_factor:
      name: Fator de forma do rastreador
      description: Define o estilo físico e forma do hardware do rastreador
    tracking_metrics:
      name: Métricas de rastreamento
      description: Especifica os dados de saúde e condicionamento físico monitorados
        pelo produto, por exemplo, sono, passos
    tracking_purpose:
      name: Finalidade de rastreamento
      description: Especifica o uso pretendido de dispositivos de rastreamento GPS,
        como rastreamento de ativos ou rastreamento de animais de estimação
    tractor_accessories_included:
      name: Acessórios de trator incluídos
      description: Especifica as características adicionais fornecidas com o trator,
        tais como um kit de palha húmida ou uma lâmina de neve
    trade_show_display_features:
      name: Recursos de exibição de feiras comerciais
      description: Identifica as características especiais de expositores para feiras,
        como ecrã tátil ou iluminado
    trading_card_packaging:
      name: Embalagem de cartas colecionáveis
      description: Identifica a forma como os cartões comerciais são embaladas, como
        blisters ou boosters
    traffic_control_device_features:
      name: Recursos do dispositivo de controlo de tráfego
      description: Identifica as características únicas dos artigos de controlo de
        tráfego, tais como uma base empilhável ou ponderada
    trail_camera_design:
      name: Design de câmara de trail
      description: Descreve o tipo de câmara de trilha, como padrão ou celular
    trailer_type:
      name: Tipo de atrelado
      description: Identifica o design ou estilo de um reboque de veículo motorizado,
        como aberto ou fechado
    training_data_requirements:
      name: Requisitos de dados de formação
      description: Identifica o tipo e a qualidade dos dados necessários para uma
        formação eficaz de software de IA ou de aprendizagem automática, por exemplo,
        dados rotulados
    trampoline_design:
      name: Design de trampolim
      description: Descreve a construção do trampolim, como mola livre ou mola helicoidal
    transceiver_form_factor:
      name: Fator de forma do transcetor
      description: Define o padrão físico do módulo do transcetor de rede (p. ex.,
        SFP, QSFP28)
    transcriber/dictation_system_features:
      name: Recursos do sistema transcritor/ditado
      description: Identifica as características especiais dos transcritores ou sistemas
        de ditado, como os alimentados por IA ou a redução de ruído
    transfer_aid_type:
      name: Tipo de auxílio de transferência
      description: Classifica o estilo do auxílio, distinguindo pranchas rígidas dos
        lençóis flexíveis e dos tapete assistidos por ar
    transfer_board_shape:
      name: Formato da prancha de transferência
      description: Define o perfil geométrico da prancha ou lençol, que influencia
        o caminho de transferência e a compatibilidade com diferentes alturas de assento
        ou cama
    transfer_boards_surface_type:
      name: Tipo de superfície de tábuas de transferência
      description: Especifica a textura da superfície das placas de transferência
        de mobilidade, por exemplo, acolchoadas, lisas
    transfer_paper_technique:
      name: Técnica de transferência de papel
      description: Identifica o método utilizado com o papel de transferência, como
        o jato de tinta ou o ferro de engomar
    transmission_type:
      name: Tipo de transmissão
      description: Identifica o tipo de transmissão em veículos ou peças, como manual
        ou automática
    transmitter_form_factor:
      name: Formato do transmissor
      description: Classifica o estilo físico ou habitação da unidade transmissora
        para ajudar os compradores a encontrar rapidamente a forma que se adequa à
        sua aplicação
    transport_type:
      name: Tipo de transporte
      description: Especifica o modo de transporte público para o qual o bilhete ou
        passe é válido
    trash_can_features:
      name: Recursos da latas do lixo
      description: Descreve as características especiais de latas de lixo, como controlo
        de odor ou pedal
    travel_pillow_features:
      name: Características da almofada de viagem
      description: Lista características funcionais especiais, acessórios ou melhorias
        de design da almofada de viagem
    travel_pillow_shape:
      name: Formato da almofada de viagem
      description: 'Descreve o contorno físico das almofadas de viagem, como em forma
        de J '
    tray_compatibility:
      name: Compatibilidade da moldeira
      description: Identifica o estilo da moldeira de branqueamento ou protetor bucal
        que a caixa acomoda
    treatment_area:
      name: Área de tratamento
      description: Especifica a parte do corpo alvo de um produto, normalmente para
        itens de massagem; por exemplo, costas, pescoço
    treatment_method:
      name: Método de tratamento
      description: Descreve o mecanismo ou tecnologia de administração que o produto
        utiliza para eliminar a lesão (p. ex., crioterapia, ácido químico, adesivo
        de microagulhas)
    treatment_modes:
      name: Modos de tratamento
      description: Lista os modos funcionais que o dispositivo suporta (p. ex., HR,
        SHR, SR)
    treatment_objective:
      name: Objetivo do tratamento
      description: Define o problema que o produto aborda, normalmente para itens
        de higiene pessoal; por exemplo, ronco, febre
    treatment_target_area:
      name: Área alvo do tratamento
      description: Indica se o produto é formulado para as pestanas, sobrancelhas,
        ou ambas
    treatment_texture:
      name: Textura de tratamento
      description: Define a consistência dos produtos de tratamento, como creme para
        assaduras; por exemplo, grosso, em pó
    treatment_type:
      name: Tipo de tratamento
      description: Especifica o método de tratamento, normalmente para tratamentos
        de queda de cabelo; por exemplo, laser, tópico
    tree_stand_material:
      name: Material de suporte de árvore
      description: Especifica do que é feito um suporte de árvore, como plástico ou
        metal
    trellis_design:
      name: Design Trellis
      description: Identifica o desenho da treliça em cercas ou barreiras, por exemplo,
        quadrada, diamante
    tricycle_design:
      name: Design de triciclo
      description: Descreve o estilo de um triciclo, como vertical ou reclinado
    tricycle_propulsion_type:
      name: Tipo de propulsão de triciclo
      description: Especifica a forma como um triciclo é conduzido, como por exemplo,
        empurrar ou tração dianteira
    trip_type:
      name: Tipo de disparador
      description: Especifica o tipo de disparo em um disjuntor, por exemplo, não
        intercambiável
    tripod/monopod_attachment_type:
      name: Tipo de acessório de tripé/monopé
      description: Especifica o tipo de união para acessórios de tripé ou monopé,
        como 3/8 ou universal
    tripod/monopod_head_type:
      name: Tipo de cabeça de tripé/monopé
      description: Especifica o mecanismo das cabeças de tripé/monopé, como engrenagem
        ou gimbal
    tripod_handle_type:
      name: Tipo de punho do tripé
      description: Especifica a funcionalidade das alças do tripé, por exemplo, multifuncional,
        punho de pistola
    trophy_design:
      name: Design de troféu
      description: Descreve o estilo ou a forma específica de um troféu, como uma
        taça ou uma estrela
    truck_type:
      name: Tipo de camião
      description: Classifica o tipo de camião, como camião basculante ou camião-plataforma
    tube_component:
      name: Componente de tubo
      description: Especifica o tipo de válvula em amplificadores de música, por exemplo,
        caixa, suporte
    tube_configuration:
      name: Configuração do tubo
      description: Descreve a disposição dos tubos num amplificador de instrumento
        musical, como tubo único ou par combinado
    tuner_design:
      name: Design da faixa
      description: Descreve o estilo de sintonizadores eletrónicos para instrumentos
        musicais, como clip-on ou pedal
    tuner_type:
      name: Tipo de sintonizador
      description: Define o tipo de frequência de rádio recebida, como AM/FM ou rádio
        via satélite
    tuning_fork_design:
      name: Design de diapasão
      description: Descreve o design específico de um diapasão, como ponderado ou
        não ponderado
    tuning_fork_frequency:
      name: Frequência de diapasão
      description: Especifica a frequência de um diapasão, como 128 Hz ou 256 Hz
    tuning_modes:
      name: Modos de afinação
      description: Identifica as configurações específicas do instrumento para afinadores
        eletrónicos, como guitarra ou violino
    tuning_pitch:
      name: Tom de afinação
      description: Especifica a afinação de um instrumento, como C# ou Ab
    tuning_range:
      name: Intervalo de afinação
      description: Especifica a gama de opções de afinação disponíveis, como padrão
        ou aberto
    tv_broadcast_standards_supported:
      name: Padrões de transmissão de TV suportados
      description: Lista os padrões específicos de transmissão de televisão ou cabo/satélite
        que a placa ou adaptador pode descodificar ou receber
    uc_platform_certification:
      name: Certificação da plataforma UC
      description: Identifica as plataformas de comunicações unificadas ou de reuniões
        para as quais o dispositivo está oficialmente certificado
    ultrasound_probe_type:
      name: Tipo de sonda de ultrassom
      description: Identifica as características de design da sonda fornecida com
        o monitor (p. ex., à prova de água, interna)
    undershirt_style:
      name: Estilo de camiseta
      description: Descreve o design ou corte de uma camiseta, como gola redonda ou
        decote em V
    underwear_style:
      name: Estilo de roupa interior
      description: Define o design e o corte da roupa íntima, como biquíni ou cueca
        controle
    units_of_measurement:
      name: Unidades de medida
      description: Especifica o sistema de medição usado para o produto, por exemplo,
        milímetros (mm), Fahrenheit (°F)
    update_frequency:
      name: Frequência de atualização
      description: Indica a regularidade das atualizações de software ou dados, por
        exemplo, em tempo real, anualmente
    upholstery_color:
      name: Cor de estofos
      description: Identifica a cor dos estofos de um produto, como o vermelho ou
        o bege
    upholstery_material:
      name: Material do tecido dos estofos
      description: Identifica o tecido utilizado para estofos, como pele ou veludo
    upholstery_pattern:
      name: Padrão do tecido dos estofos
      description: Descreve o design visual do tecido em móveis, por exemplo, riscas
        ou xadrez
    uplink_port_type:
      name: Tipo de porta de uplink
      description: Define o conector de uplink de velocidade mais alta presente no
        switch (p. ex., SFP+, QSFP28, 10GBase-T)
    ups_topology:
      name: Topologia da UPS
      description: Indica a abordagem de design interno que uma UPS usa para condicionar
        e fornecer energia (p. ex., standby, line-interactive, online)
    urinal_mounting_type:
      name: Tipo de montagem de urinol
      description: Especifica como é instalado um urinol, como montado na parede ou
        no chão
    usage_conditions:
      name: Condições de utilização
      description: Especifica se o produto é adequado para uso em condições secas
        ou húmidas, normalmente para aparelhos de barbear
    usage_environment:
      name: Ambiente de utilização
      description: Especifica onde o produto de bronzeamento pretende ser utilizado
    usage_frequency:
      name: Frequência de utilização
      description: Especifica a frequência recomendada de uso do produto, como diária
        ou semanal
    usage_type:
      name: Tipo de utilização
      description: Especifica o ciclo de uso pretendido do produto, por exemplo, reutilizável,
        recarregável
    usb_connector_type:
      name: Tipo de conector USB
      description: Identifica os conectores USB fornecidos no dispositivo para dados
        e/ou alimentação
    usb_standard:
      name: Padrão USB
      description: Especifica a versão USB para dispositivos eletrónicos, como USB
        2.0 ou USB 3.1 Gen 1
    user_type:
      name: Tipo de utilizador
      description: Identifica o utilizador previsto de um produto de software, como
        um indivíduo ou uma pequena empresa
    utility/maintenance_task_type:
      name: Tipo de tarefa de serviço/manutenção
      description: Categoriza a tarefa executada por um software, como limpeza de
        disco ou otimizador de sistema
    uv_blocking_class:
      name: Classe de bloqueio UV
      description: Indica o nível de proteção UV da lente de contacto conforme definido
        pelos padrões ISO
    uv_protection:
      name: Proteção UV
      description: Especifica a capacidade do produto de bloquear os raios UV, normalmente
        para óculos de sol; por exemplo, UV400
    uva_protection_grade:
      name: Grau de proteção UVA
      description: Indica a classificação de proteção UVA do produto, comumente expressa
        como graus PA
    vacuum_air_filtering_technology:
      name: Tecnologia de filtragem de ar a vácuo
      description: Especifica o tipo de filtragem de ar usado em aspiradores de pó,
        como HEPA ou pet
    valve_type:
      name: Tipo de válvula
      description: Especifica o tipo de válvula em peças de bicicletas, por exemplo,
        Presta, Schrader
    van_type:
      name: Tipo de carrinha
      description: Distingue entre diferentes tipos de carrinhas, como de passageiros
        ou de conversão
    vaping_style:
      name: Estilo de vaporização
      description: 'Especifica a técnica de vaporização para cigarros eletrónicos,
        por exemplo, direto ao pulmão, boca a pulmão '
    varnish/finish_application:
      name: Aplicação de verniz/acabamento
      description: Especifica as áreas de aplicação adequadas para um verniz ou acabamento,
        como paredes ou portas
    vase_shape:
      name: Formato do jarro
      description: Descreve a forma geométrica ou orgânica de um vaso, como redondo
        ou garrafa
    vcr_configuration:
      name: Configuração do videogravador
      description: Identifica se a unidade é um videogravador independente ou um dispositivo
        combo com leitores ou sintonizadores adicionais
    vdi_protocol_support:
      name: Assistência ao protocolo VDI
      description: Especifica os protocolos de infraestrutura de desktop virtual (VDI)
        suportados, por exemplo, PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Características do alarme/bloqueio do veículo
      description: Especifica as características exclusivas dos sistemas de segurança
        do veículo, por exemplo, arranque remoto ou resistência às intempéries
    vehicle_application_area:
      name: Área de aplicação de veículo
      description: Especifica a parte de um veículo à qual o produto se aplica, como
        estofos ou exterior
    vehicle_audio_system_features:
      name: Características do sistema de áudio do veículo
      description: Identifica as características especiais do sistema de áudio de
        um veículo, como o reforço de graves ou o ecrã LED
    vehicle_braking_features:
      name: Características da travagem do veículo
      description: Descreve as características específicas das peças de travões do
        veículo, como resistentes à corrosão ou perfuradas
    vehicle_cleaning_item_features:
      name: Características do item de limpeza de veículos
      description: Destaca os benefícios dos produtos de limpeza de veículos, como
        maior eficiência de combustível ou alto brilho
    vehicle_decor_features:
      name: Recursos de decoração de veículos
      description: Descreve as características dos produtos de decoração do veículo,
        como resistente a UV ou à prova de água
    vehicle_drive/handling_features:
      name: Recursos de direção/manuseio do veículo
      description: Descreve as características das peças de veículos a motor, normalmente
        nos sistemas de transmissão, transmissão de força, reboque e rodas; por exemplo,
        alto desempenho, resistente ao calor
    vehicle_engine/part_features:
      name: Peças de motor/peças para veículos motorizados
      description: Indica as características exclusivas das peças do motor de veículos
        motorizados, como economia de combustível ou atualização de desempenho
    vehicle_engine_features:
      name: Características para veículos motorizados
      description: Descreve características específicas do motor de um veículo, como
        alto desempenho ou economia de combustível
    vehicle_exhaust_type:
      name: Tipo de escape para veículos
      description: Identifica o tipo de sistema de escape de um veículo, como o axle-back
        ou o turbo-back
    vehicle_features:
      name: Características do veículo
      description: Descreve as características ou equipamentos especiais de um veículo,
        como bancos aquecidos ou sistema de navegação
    vehicle_floor_configuration:
      name: Configuração do piso do veículo
      description: Especifica o design e a disposição do pavimento de um veículo de
        transporte público, como piso rebaixado ou semi-rebaixado
    vehicle_fluid_features:
      name: Recursos do fluido do veículo
      description: Descreve as propriedades especiais dos fluidos para veículos, como
        os anticongelantes ou os biodegradáveis
    vehicle_fluid_type:
      name: Tipo de fluidos para veículos
      description: Identifica o tipo de fluido utilizado na manutenção do veículo,
        como concentrado ou pré-diluído
    vehicle_frame/body_features:
      name: Características de carroçaria para veículos
      description: Descreve características especiais de peças da carroçaria do veículo,
        como acabamento pintado ou cromado
    vehicle_mirror_design:
      name: Espelho para veículo
      description: Especifica as características de design dos espelhos retrovisores
        de veículos motorizados, como extensíveis ou dobráveis
    vehicle_mirror_features:
      name: Funcionalidades do espelho para veículo
      description: Descreve as características especiais dos espelhos do veículo,
        como os de escurecimento automático ou os aquecidos
    vehicle_mirror_type:
      name: Tipo de espelho para veículo
      description: Identifica o tipo específico de espelho num veículo, como o retrovisor
        ou o retrovisor lateral
    vehicle_mounting_location:
      name: Localização de montagem no veículo
      description: Especifica a área no veículo onde o suporte deve ser instalado
    vehicle_oil_features:
      name: Características do óleo para veículo
      description: Descreve propriedades exclusivas do óleo de motor, como proteção
        contra desgaste ou alta eficiência de filtragem
    vehicle_paint_type:
      name: Tinta para veículos
      description: Especifica a categoria da pintura do veículo, como o kit de pintura
        ou a pintura da carroçaria do veículo
    vehicle_placement:
      name: Posicionamento do veículo
      description: Especifica onde o produto pode ser colocado na bicicleta, por exemplo,
        quadro, frente
    vehicle_seating_features:
      name: Características dos assentos do veículo
      description: Descreve as características especiais dos assentos de um veículo,
        como aquecimento ou reclinação
    vehicle_suspension_features:
      name: Características da suspensão do veículo
      description: Especifica os recursos exclusivos das peças da suspensão do veículo,
        como ajustável ou hidráulica
    vehicle_tire_type:
      name: Tipo de pneu do veículo
      description: Especifica a adequação sazonal ou ao terreno dos pneus dos veículos,
        como inverno ou todo-o-terreno
    vehicle_type:
      name: Tipo de veículo
      description: Classifica o tipo de veículo, por exemplo, SUV ou veleiro
    ventilation_type:
      name: Tipo de ventilação
      description: Descreve o estilo principal de ventilação ou recursos de fluxo
        de ar da estrutura que gerem a temperatura interna
    verification_technology:
      name: Tecnologia de verificação
      description: Identifica a tecnologia utilizada nos verificadores de notas de
        banco, como magnética ou infravermelha
    vesa_mounting_pattern:
      name: Padrão de montagem VESA
      description: Define o espaçamento dos furos VESA na parte traseira do monitor
        para compatibilidade com suportes, braços e bases
    vg/pg_ratio:
      name: Relação VG/PG
      description: Indica a proporção de glicerina vegetal para propilenoglicol em
        e-líquidos, por exemplo, 30:70
    video_codecs/formats_supported:
      name: Codecs/formatos de vídeo suportados
      description: Define os codecs e formatos de vídeo que um dispositivo suporta,
        como MP4 ou H.264
    video_game_content_features:
      name: Características do conteúdo do videojogo
      description: Identifica características especiais do software de jogos de vídeo,
        por exemplo, conteúdos descarregáveis (DLC), acesso antecipado
    video_game_format:
      name: Formato do videojogo
      description: 'Especifica o tipo de entrega e o tipo de suporte para videojogos:
        digital ou físico'
    video_game_genre:
      name: Género de videojogo
      description: Classifica o tipo de videojogo, como familiar ou sobrevivência
    video_game_platform:
      name: Plataforma de videojogo
      description: Especifica a plataforma com a qual um videogame é compatível, como
        PC ou PlayStation 5
    video_game_sub_genre:
      name: Subgénero de videojogo
      description: Identifica a subcategoria específica de um videojogo, como MMORPG
        ou Battle Royale
    video_port_type:
      name: Tipo de porta de vídeo
      description: Especifica o tipo de porta de vídeo que um produto suporta, por
        exemplo, HDMI, porta de vídeo
    video_recorder_type:
      name: Tipo de gravador de vídeo
      description: Especifica a tecnologia de gravação fundamental do dispositivo
        (p. ex., DVR, NVR, XVR)
    video_region_code:
      name: Código de região de vídeo
      description: Define a compatibilidade regional de reprodutores de DVD e Blu-ray,
        como região livre ou região 1
    video_resolution_supported:
      name: Resolução de vídeo suportada
      description: Define a clareza ou qualidade de vídeo compatível com um dispositivo,
        como 1080p ou ultra HD
    video_signal_standard:
      name: Padrão de sinal de vídeo
      description: Especifica o(s) padrão(ões) de transmissão de vídeo analógico suportado(s)
        pelo dispositivo (p. ex., NTSC, PAL, SECAM)
    viewing_area_height:
      name: Altura da área de visualização
      description: Especifica a altura da área de visualização em produtos como capacetes
        de soldadura, por exemplo, média, grande
    viewing_area_width:
      name: Largura da área de visualização
      description: Especifica a largura da área de visualização em produtos como capacetes
        de soldadura, por exemplo, média, grande
    vinegar_drink_variety:
      name: Variedade de bebida de vinagre
      description: Especifica o tipo de bebida à base de vinagre, por exemplo, kombuchá,
        arbusto
    vinegar_variety:
      name: Variedade de vinagre
      description: Distingue entre diferentes tipos de vinagre, por exemplo, fruta,
        balsâmico
    viscosity:
      name: Viscosidade
      description: Especifica a resistência ao fluxo de óleos de motor, como 10W-40
        ou 15W-50
    vision_correction_type:
      name: Tipo de correção da visão
      description: Indica o design ótico destinado a corrigir condições específicas
        de visão
    visual_effect:
      name: Efeito visual
      description: Define as características visuais de um produto, normalmente para
        esmaltes artísticos; por exemplo, salpicado, texturizado
    voice_recorder_form_factor:
      name: Formato do gravador de voz
      description: Descreve o estilo físico ou disfarce do gravador para que os compradores
        possam escolher o design que se adapta à sua utilização
    voip_protocol_support:
      name: Assistência ao protocolo VoIP
      description: Especifica os protocolos Voice Over Internet Protocol (VoIP) que
        um dispositivo pode suportar, como SIP ou IAX
    wader_type:
      name: Tipo de fato de pesca
      description: Define o estilo específico de fatos de pesca ou de caça, como de
        anca ou cintura
    waist_rise:
      name: Altura da cintura
      description: Indica em que ponto da cintura assenta uma peça de vestuário, como
        baixo, médio ou alto
    walker_brake_type:
      name: Tipo de travagem do andarilho
      description: Descreve o mecanismo de travagem incorporado no andarilho
    walker_seat_type:
      name: Tipo de assento do andarilho
      description: Identifica se o andarilho inclui um assento e o estilo desse assento
    walker_type:
      name: Tipo de andarilho
      description: Classifica o estilo estrutural e utilização pretendida do andarilho
    walking_aid_tip_type:
      name: Tipo de ponta do auxiliar de marcha
      description: Especifica o estilo ou tecnologia da ponta de contacto com o solo
        da bengala
    wall_material:
      name: Material da parede
      description: Identifica o material utilizado na parede do produto, normalmente
        em saunas; por exemplo, cedro
    wall_patching_application:
      name: Aplicação de remendo de parede
      description: Identifica a superfície adequada para um composto de remendo, como
        madeira ou gesso
    wall_plate_style:
      name: Estilo de placa de parede
      description: Descreve a conceção de placas ou tampas de parede, como convencionais
        ou sem parafusos
    wallet_features:
      name: Características da carteira
      description: Descreve características especiais de carteiras, como proteção
        RFID ou design compacto
    wallpaper_application_method:
      name: Método de aplicação de papel de parede
      description: Define o método de aplicação do papel de parede, por exemplo, descascar
        e colar ou requer colar
    wallpaper_theme:
      name: Tema do papel de parede
      description: Identifica o tema ou estilo principal de um papel de parede, como
        natureza ou abstrato
    wan_interface_type:
      name: Tipo de interface WAN
      description: Especifica o tipo de conexão física utilizada para o uplink WAN/Internet
        do roteador (p. ex., Ethernet, fibra, DSL, telemóvel)
    warning_category:
      name: Categoria de aviso
      description: Classifica a categoria de sinais de segurança, por exemplo, proibição,
        aviso
    washer/dryer_features:
      name: Características da máquina de lavar/secar
      description: Destaca as características únicas dos eletrodomésticos para a roupa,
        ou seja, bloqueio infantil e autolimpeza
    washer_form:
      name: Forma de arruela
      description: Descreve o tipo específico de arruela em acessórios de ferramentas,
        como plana ou de mola
    washing_machine_features:
