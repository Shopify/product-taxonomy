        para que o comprador saiba exatamente o que está a adquirir e possa comparar
        os pacotes.
    carbonation_level_adjustment:
      name: Ajuste do nível de carbonatação
      description: Indica se a máquina de gaseificação oferece um nível de carbonatação
        fixo ou ajustável.
    catalytic_combustor_type:
      name: Tipo de combustor catalítico
      description: Indica se o fogão utiliza um sistema de combustão catalítico, não
        catalítico ou híbrido, com impacto na eficiência e emissões.
    ceiling_light_fixture_style:
      name: Estilo da luminária de teto
      description: Define o estilo/configuração estrutural principal da luminária
        de teto.
    center_hole_shape:
      name: Forma do furo central
      description: Descreve a forma geométrica do furo de montagem/central da lâmina,
        o que determina a compatibilidade com eixos específicos de corta-relva.
    chainsaw_bar_mount_type:
      name: Tipo de montagem da barra para motosserra
      description: Especifica o padrão de montagem ou o estilo de ranhura da barra
        para motosserra para garantir que esta se adapta à unidade motora da serra.
    chainsaw_bar_nose_type:
      name: Tipo de ponta da barra para motosserra
      description: Identifica o estilo da ponta da barra, afetando o desempenho de
        corte e a manutenção.
    chainsaw_bar_type:
      name: Tipo de barra para motosserra
      description: Classifica a construção ou finalidade da barra.
    chainsaw_cutter_type:
      name: Tipo de lâmina de corte da motosserra
      description: Identifica o perfil/design da lâmina de corte da corrente, que
        afeta a velocidade de corte, a durabilidade e as características de contragolpe.
    champagne_glass_type:
      name: Tipo de copo de champanhe
      description: Especifica o design particular de um copo de champanhe, permitindo
        ao comprador distinguir entre formas otimizadas para diferentes experiências
        de degustação.
    chandelier_shape:
      name: Forma do lustre
      description: Define a forma estrutural geral do lustre.
    charcoal_chimney_features:
      name: Características da chaminé de carvão
      description: Enumera as principais características funcionais da chaminé de
        carvão.
    charcoal_ignition_type:
      name: Tipo de ignição por carvão
      description: Indica se o carvão foi tratado ou concebido para facilitar o acendimento
        ou proporcionar uma queima mais limpa.
    chopstick_style:
      name: Estilo pauzinho
      description: Especifica o estilo regional ou cultural dos pauzinhos, o que pode
        afetar o seu comprimento, forma e decoração.
    chopstick_trainer_design:
      name: Design do auxiliar de pauzinhos
      description: Descreve o design mecânico ou o método de assistência utilizado
        pelo auxiliar de pauzinhos.
    cigar_cutter_type:
      name: Tipo de cortador de charuto
      description: Especifica o mecanismo ou estilo de corte utilizado para remover
        a cobertura do charuto.
    cigar_punch_type:
      name: Tipo de furador de charuto
      description: Identifica o mecanismo ou estilo do furador de charutos.
    clay_pot_material:
      name: Material do vaso de barro
      description: Identifica a composição ou o estilo do barro utilizado no vaso,
        como o faiança ou o grés.
    cleaner_concentration:
      name: Concentração do produto de limpeza
      description: Indica se o produto de limpeza é vendido pronto a usar ou como
        um concentrado que deve ser diluído antes da utilização.
    cleaning_cloth_features:
      name: Características do pano de limpeza
      description: Destaca as características especiais de desempenho dos panos.
    cleaning_solution_concentration:
      name: Concentração da solução de limpeza
      description: Indica se o produto é vendido pronto a usar, concentrado ou noutros
        formatos de diluição.
    clock_chime_melody:
      name: Melodia do carrilhão do relógio
      description: Especifica a melodia ou o padrão de batimentos reproduzido pelo
        relógio na hora ou quarto de hora.
    clock_display_type:
      name: Tipo de mostrador do relógio
      description: Especifica a forma como a hora é apresentada, útil para os clientes
        que preferem formatos digitais, analógicos, flip, etc.
    clock_hand_mounting_type:
      name: Tipo de montagem do ponteiro do relógio
      description: Define o estilo de interface utilizado para ligar os ponteiros
        do relógio ao movimento.
    clock_hand_style:
      name: Estilo de ponteiro de relógio
      description: Especifica o design visual dos ponteiros, permitindo ao comprador
        encontrar ponteiros que combinem com a estética do seu relógio.
    clock_movement_type:
      name: Tipo de movimento do relógio
      description: Identifica o mecanismo interno de medição do tempo do relógio.
    clothespin_type:
      name: Tipo de mola para a roupa
      description: Identifica o design/estilo estrutural da mola para a roupa.
    co2_cylinder_compatibility:
      name: Compatibilidade com cilindros de CO2
      description: Define o tipo ou tamanho do cilindro de CO2 que a máquina de gaseificação
        aceita, garantindo que o comprador pode encontrar cartuchos de recarga compatíveis.
    co2_supplementation_requirement:
      name: Requisito de suplementação de CO2
      description: Indica o nível de suplementação de dióxido de carbono necessário
        para uma saúde ótima das plantas em aquários.
    coaster_features:
      name: Características dos suportes para copos
      description: Identifica características únicas dos suportes para copos, como
        uma base absorvente ou antiderrapante.
    cocktail_strainer_type:
      name: Tipo de coador de cocktail
      description: Especifica o design do coador de cocktail, o que afeta a compatibilidade
        com os shakers e o estilo de utilização.
    code_technology:
      name: Tecnologia de código
      description: Identifica o código ou a tecnologia de segurança que o comando
        à distância utiliza para comunicar com o dispositivos de abertura de portões
        de garagem.
    coffee_decanter_warmer_features:
      name: Características do aquecedor do decantador de café
      description: Destaca as características funcionais ou de segurança relevantes
        específicas dos aquecedores de decantadores de café.
    coffee_filter_basket_size:
      name: Tamanho do cesto do filtro de café
      description: Especifica a designação de tamanho normalizada que o cesto suporta,
        garantindo a compatibilidade com filtros e máquinas.
    coffee_filter_shape:
      name: Forma do filtro de café
      description: Especifica a forma geométrica do filtro de café para garantir a
        compatibilidade com diferentes máquinas de café.
    coffee_filter_type:
      name: Tipo de filtro de café
      description: Especifica o tipo de filtro que uma máquina de café de filtro aceita
        ou inclui, o que pode afetar o sabor e os custos contínuos com consumíveis..
    coffee_grinder_accessory_type:
      name: Tipo de acessório para moinho de café
      description: Classifica o tipo específico de acessório para auxiliar na filtragem
        e na pesquisa.
    colander_style:
      name: Estilo de escorredor
      description: Classifica o design estrutural do escorredor, como por exemplo,
        com base ou para colocar sobre o lava-loiça.
    compatible_air_conditioner_type:
      name: Tipo de ar condicionado compatível
      description: Identifica o modelo de ar condicionado com o qual o acessório foi
        concebido para funcionar.
    compatible_awning_rail_type:
      name: Tipo de carril de toldo compatível
      description: Especifica o carril ou o sistema de tubagem do toldo para o qual
        o clipe de fixação foi concebido.
    compatible_beverage_type:
      name: Tipo de bebida compatível
      description: Especifica o tipo de bebida que a rolha ou o protetor foi concebido
        para conservar.
    compatible_can_size:
      name: Tamanho de lata compatível
      description: Indica Lista os tamanhos de latas de bebidas que o triturador pode
        acomodar.
    compatible_cigarette_size:
      name: Tamanho de cigarro compatível
      description: Lista os comprimentos ou formatos padrão de cigarros que se cabem
        no suporte.
    compatible_coffee_capsule_system:
      name: Sistema de cápsulas de café compatível
      description: Especifica o sistema de cápsulas ou pastilhas para o qual o adaptador
        foi concebido, garantindo que o comprador escolhe um adaptador adequado ao
        seu formato de café preferido.
    compatible_coffee_maker_type:
      name: Tipo de máquina de café compatível
      description: Indica o estilo de máquina de café ou máquina de café expresso
        para o qual o acessório foi concebido.
    compatible_cooking_thermometer_type:
      name: Tipo de termómetro de cozinha compatível
      description: Especifica os tipos de termómetros de cozinha que esta ferramenta
        de calibração foi concebida para ajustar ou verificar.
    compatible_coupler_size:
      name: Tamanho de conector compatível
      description: Especifica o tamanho do conector que permite que o saco de pasteleiro
        se encaixe sem ter de ser cortado.
    compatible_dehumidifier_technology:
      name: Tecnologia de desumidificador compatível
      description: Indica a tecnologia de desumidificação com a qual o filtro é compatível,
        como o compressor ou o dessecante.
    compatible_feeder_type:
      name: Tipo de comedouro compatível
      description: Identifica os tipos de comedouros para os quais o tabuleiro foi
        concebido.
    compatible_footwear_material:
      name: Material de calçado compatível
      description: Lista os tipos de materiais de calçado para os quais a graxa ou
        a cera é adequada.
    compatible_fuel_type:
      name: Tipo de combustível compatível
      description: Especifica o tipo de combustível para o qual o acessório foi concebido
        para ser compatível, garantindo a compatibilidade adequada com aquecedores
        de pátio a propano, gás natural, elétricos ou outros combustíveis.
    compatible_garment_steamer_design:
      name: Design de vaporizador de roupa compatível
      description: Especifica os modelos de vaporizadores de roupa com os quais o
        suporte do cabo foi concebido para funcionar.
    compatible_grill_type:
      name: Tipo de grelha compatível
      description: Especifica os tipos de grelhas com os quais o acessório foi concebido
        para funcionar.
    compatible_hazardous_waste_type:
      name: Tipo de resíduo perigoso compatível
      description: Especifica o tipo de resíduo perigoso que o recipiente foi concebido
        para armazenar.
    compatible_ironing_board_type:
      name: Tipo de tábua de engomar compatível
      description: Indica o modelo de tábua de engomar para o qual a peça é adequada,
        ajudando o comprador a determinar a compatibilidade.
    compatible_lawn_mower_type:
      name: Tipo de corta-relva compatível
      description: Indica o modelo de corta-relva para o qual o kit de riscas foi
        concebido.
    compatible_leaf_blower_style:
      name: Estilo de soprador de folhas compatível
      description: Especifica o formato do soprador de folhas com o qual o acessório
        é compatível.
    compatible_mailbox_size:
      name: Tamanho de caixa de correio compatível
      description: Indica o(s) tamanho(s) de caixa de correio para o(s) qual(is) o
        acessório foi concebido, seguindo as classificações comuns do USPS/setor.
    compatible_mailbox_type:
      name: Tipo de caixa de correio compatível
      description: Especifica o estilo de caixa de correio que se encaixa no interior
        ou com o compartimento, ajudando o comprador a confirmar o encaixe correto.
    compatible_napkin_size:
      name: Tamanho de guardanapo compatível
      description: Especifica a dimensão ou o formato do guardanapo para o qual o
        suporte/dispensador foi concebido.
    compatible_outdoor_grill_style:
      name: Estilo de churrasqueira exterior compatível
      description: Especifica o estilo ou a configuração da churrasqueira exterior
        para a qual a cobertura foi concebida.
    compatible_radiator_style:
      name: Estilo de radiador compatível
      description: Lista os estilos de radiador para os quais o acessório foi concebido,
        como o radiador de painel, o radiador de coluna, o radiador de toalhas ou
        o radiador de rodapé.
    compatible_refrigerator_compartment:
      name: Compartimento de frigorífico compatível
      description: Especifica em que parte do frigorífico o acessório deve ser utilizado.
    compatible_stove_fuel_type:
      name: Tipo de combustível para fogão compatível
      description: Identifica os tipos de combustível com os quais um acessório para
        fogão portátil é compatível, ajudando os clientes a encontrar o item adequado
        para o seu fogão (por exemplo, gás de cartucho ou álcool).
    compatible_stove_type:
      name: Tipo de fogão compatível
      description: Identifica os tipos de fogões portáteis com os quais esta base
        foi concebida para ser compatível.
    compatible_tissue_box_type:
      name: Tipo de caixa de lenços de papel compatível
      description: Identifica o modelo/tamanho da caixa de lenços de papel para a
        qual o suporte foi concebido.
    compatible_tractor_type:
      name: Tipo de trator compatível
      description: Especifica a categoria de trator para a qual a peça/acessório foi
        concebida.
    compatible_umbrella_type:
      name: Tipo de guarda-sol compatível
      description: Especifica o estilo de guarda-sol para o qual a capa foi concebida.
    compatible_washing_machine_type:
      name: Tipo de máquina de lavar roupa compatível
      description: Especifica para que modelos de máquinas de lavar roupa o produto
        de limpeza é adequado (por exemplo, máquinas de lavar roupa com carregamento
        frontal, máquinas de lavar roupa com carregamento superior, máquinas de lavar
        roupa de alta eficiência).
    compatible_waste_container_type:
      name: Tipo de contentor de resíduos compatível
      description: Especifica o tipo de contentor de resíduos para o qual o acessório
        foi projetado para encaixar e funcionar.
    compatible_water_cooler_type:
      name: Tipo de arrefecedor de água compatível
      description: Indica com que modelos de arrefecedores de água o acessório é compatível,
        ajudando os clientes a escolher as peças corretas para o seu aparelho.
    compatible_water_heater_type:
      name: Tipo de esquentador compatível
      description: Especifica o tipo de esquentador com o qual o produto é compatível.
    compatible_wrap_material:
      name: Tipo de película plástica compatível
      description: Lista os tipos de película plástica para alimentos que o dispensador
        foi concebido para armazenar.
    compost_aerator_design:
      name: Design do arejador de compostagem
      description: Identifica o design mecânico ou estilo do arejador, descrevendo
        como agita o composto.
    compost_form:
      name: Forma de compostagem
      description: Descreve a apresentação física ou o estilo de embalagem do produto
        de compostagem.
    compost_source_material:
      name: Material de origem do produto de compostagem
      description: Identifica a(s) principal(is) matéria(s) orgânica(s) a partir da(s)
        qual(is) o composto é derivado.
    compression_method:
      name: Método de compressão
      description: Indica a técnica utilizada para expelir o ar ou libertar espaço
        no saco.
    cooking_gel_fuel_base:
      name: Base de combustível em gel para cozinhar
      description: Identifica a base química primária do combustível em gel, permitindo
        aos utilizadores escolher entre formulações à base de etanol, metanol, glicol
        e outras que diferem em odor, produção de calor e adequação para uso interno/externo.
    cooking_surface_texture:
      name: Textura da superfície de cozedura
      description: Especifica a textura da superfície de cozedura, como plana, com
        ranhuras ou de dupla função.
    cooking_thermometer_design:
      name: Design de termómetro de cozinha
      description: Identifica o estilo de funcionamento de um termómetro de cozinha,
        por exemplo, analógico ou digital.
    cookware_coating_material:
      name: Material de revestimento de utensílios de cozinha
      description: Identifica o tipo de revestimento interior ou exterior aplicado
        ao item de cozinha, fornecendo informações sobre o desempenho antiaderente,
        a durabilidade e os requisitos de cuidado.
    cookware_coating_type:
      name: Tipo de revestimento dos utensílios de cozinha
      description: Especifica o revestimento interior ou superficial dos utensílios
        de cozinha.
    cookware_lid_style:
      name: Estilo de tampa de panela
      description: Descreve o estilo geral ou a construção funcional da tampa.
    cooler_style:
      name: Estilo do refrigerador
      description: Identifica o design estrutural do refrigerador portátil para alimentos/bebidas,
        ajudando o comprador a escolher entre caixas rígidas, bolsas flexíveis, mochilas,
        etc.
    corkscrew_accessories_included:
      name: Acessórios para saca-rolhas incluídos
      description: Especifica os componentes adicionais incluídos na embalagem do
        saca-rolhas.
    corkscrew_hinge_type:
      name: Tipo de dobradiça do saca-rolhas
      description: Especifica se o saca-rolhas utiliza um mecanismo de alavanca com
        dobradiça simples ou com dobradiça dupla.
    corkscrew_tools_included:
      name: Ferramentas para saca-rolhas incluídas
      description: 'Lista as ferramentas e acessórios incluídos com o saca-rolhas
        (ex.: cortador de folha de alumínio, abre-cápsulas, lâmina de faca) para que
        o comprador possa ver o que está incluído.'
    crushing_method:
      name: Método de esmagamento
      description: Descreve o mecanismo utilizado para comprimir a lata.
    crust_browning_level:
      name: Nível de tostagem da crosta
      description: Identifica as opções de cor/intensidade da crosta que a máquina
        de fazer pão oferece.
    cultivar_type:
      name: Tipo de cultivar
      description: Especifica o tipo de reprodução da cultivar, indicando se é tradicional,
        híbrida, de polinização aberta ou geneticamente modificada.
    cultivator_type:
      name: Tipo de cultivador
      description: Classifica o design estrutural do cultivador, como por exemplo,
        com dentes frontais ou com dentes traseiros.
    cup_warmer_features:
      name: Características do aquecedor de chávenas
      description: Destaca as características especiais de design ou a praticidade
        específicas dos aquecedores de chávenas.
    curtain_heading_style:
      name: Estilo de cabeçal de cortina
      description: Especifica o estilo da borda superior/cabeçal usado para pendurar
        a cortina ou o cortinado, o que determina o tipo de ferragens necessárias
        e o aspecto geral.
    curtain_lining_type:
      name: Tipo de forro de cortina
      description: Indica se a cortina tem forro e o tipo de forro utilizado, o que
        afeta o isolamento, a privacidade e o caimento.
    curtain_rod_type:
      name: Tipo de varão de cortina
      description: Classifica o estilo estrutural do varão, ajudando o comprador a
        localizar rapidamente varões adequados às suas necessidades de instalação.
    cutting_disc_function:
      name: Função do disco de corte
      description: Define a ação específica de processamento de alimentos que o disco
        executa.
    cutting_head_type:
      name: Tipo de cabeça de corte
      description: Especifica o tipo de elemento de corte utilizado pelo acessório.
    cutting_mechanism_type:
      name: Tipo de mecanismo de corte
      description: Descreve o tipo de cortador integrado no dispensador.
    cylinder_connector_type:
      name: Tipo de conector cilíndrico
      description: Especifica a interface de ligação ou rosca do cilindro, determinando
        a compatibilidade com modelos específicos de máquina de gaseificação.
    decorating_bag_features:
      name: Características do saco de pasteleiro
      description: Destaca as características especiais de design ou funcionais do
        saco de pasteleiro.
    dehumidifier_refill_form:
      name: Formato de recarga do desumidificador
      description: Define o formato físico da recarga para que os clientes possam
        selecionar os estilos compatíveis.
    desiccant_material:
      name: Material dessecante
      description: Especifica a substância absorvente de humidade utilizada, importante
        para o desempenho, a reutilização e as considerações de segurança.
    dial_finish:
      name: Acabamento do mostrador
      description: Descreve o acabamento da superfície do mostrador, influenciando
        o brilho e o estilo.
    dinnerware_features:
      name: Características do conjunto de jantar
      description: Destaca as características funcionais especiais do item do conjunto
        de jantar.
    dish_detergent_features:
      name: Características do detergente para a louça
      description: Lista propriedades ecológicas ou formulações relevantes que ajudam
        o consumidor a filtrar e comparar produtos.
    dishwasher_accessory_type:
      name: Tipo de acessório para máquina de lavar louça
      description: Classifica o tipo específico de acessório, permitindo ao comprador
        filtrar rapidamente.
    dishwasher_wash_programs:
      name: Programas de lavagem da máquina de lavar louça
      description: Lista os ciclos de lavagem predefinidos disponíveis na máquina
        de lavar louça, permitindo aos clientes filtrar por versatilidade do programa.
    dispensing_mechanism:
      name: Mecanismo de distribuição
      description: Descreve como a bebida é servida a partir da garrafa térmica, influenciando
        a usabilidade em diferentes situações.
    dispensing_temperature_options:
      name: Opções de temperatura de distribuição
      description: Indica as opções de temperatura que o arrefecedor de água pode
        fornecer.
    displayed_character:
      name: Caracter exibido
      description: Identifica o caracter alfanumérico representado por cada peça individual.
    diving_board_surface_texture:
      name: Textura da prancha de mergulho
      description: Descreve a textura da superfície superior da prancha, que afeta
        a aderência e a resistência ao deslizamento.
    door_configuration:
      name: Configuração da porta
      description: Indica quantas portas de acesso possui a armadilha
    door_hinge_orientation:
      name: Orientação da dobradiça da porta
      description: Especifica a posição da dobradiça ou o sentido de abertura da porta
        ou da tampa do congelador.
    door_hinge_position:
      name: Posição da dobradiça da porta
      description: Especifica o lado da porta onde se encontra a dobradiça ou, se
        for reversível, impactando a instalação e o planeamento do espaço.
    draft_gas_type:
      name: Tipo de gás de extração
      description: Especifica o tipo de sistema de gás utilizado para a distribuição,
        importante para a carbonatação e o tipo de bebida.
    drainage_design:
      name: Design da drenagem
      description: Indica como a saboneteira controla o escoamento da água para manter
        o sabonete seco.
    drainage_method:
      name: Método de drenagem
      description: Descreve como a água recolhida é expelida, indicando se é necessário
        esvaziá-la manualmente.
    drawer_organizer_features:
      name: Características do organizador de gavetas
      description: Destaca as principais características funcionais de um organizador
        de gavetas.
    drinkware_crystal_composition:
      name: Composição do cristal dos copos
      description: Identifica a formulação específica do vidro/cristal utilizado,
        destacando o teor de chumbo e as características de transparência.
    drinkware_holder_style:
      name: Estilo do suporte para copos
      description: Classifica o design ou a configuração geral de um suporte para
        copos.
    drinkware_insulation:
      name: Isolamento dos recipientes para bebidas
      description: Identifica a construção do isolamento dos recipientes para bebidas,
        afetando a retenção da temperatura.
    dripper_design:
      name: Design de gotejador
      description: Especifica a forma geral do gotejador ou o estilo de drenagem,
        afetando as características da infusão.
    drum_grating_styles_included:
      name: Estilos de raladores incluídos
      description: Enumera os diferentes estilos de raladores ou cortadores fornecidos
        no conjunto para que os utilizadores possam ver rapidamente as funções oferecidas.
    dryer_drum_material:
