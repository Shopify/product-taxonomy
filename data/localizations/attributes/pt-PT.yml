        trabalho.
    kitchen_linen_items_included:
      name: Atoalhados de cozinha incluídos
      description: Lista os componentes específicos de atoalhados de cozinha incluídos
        no conjunto, ajudando o comprador a compreender exatamente o artigo que está
        a adquirir.
    label_content_type:
      name: Tipo de conteúdo da etiqueta
      description: Descreve se a superfície da etiqueta está em branco, pré-impressa
        com modelos ou formatada de outra forma.
    lamp_arm_style:
      name: Estilo do braço do candeeiro
      description: Descreve o design do braço/pescoço da lâmpada, que afeta a ajustabilidade
        e o posicionamento (por exemplo, pescoço de ganso vs. braço oscilante).
    lamp_post_base_mounting_type:
      name: Tipo de montagem da base do poste de iluminação
      description: Especifica como a base é instalada ou fixada ao solo ou à superfície.
    lamp_shade_fitter_type:
      name: Tipo de encaixe do abajur
      description: Define o mecanismo de fixação entre o abajur e a lâmpada, garantindo
        a compatibilidade sem necessidade de adivinhação.
    lamp_shade_shape:
      name: Forma do abajur
      description: Especifica a forma geométrica do abajur, permitindo que os clientes
        localizem rapidamente os modelos desejados.
    lamp_shade_translucency:
      name: Tranparência do abajur
      description: Descreve a quantidade de luz que atravessa o abajur, ajudando os
        utilizadores a escolher o ambiente desejado.
    lampshade_shape:
      name: Forma do abajur
      description: Descreve a forma geométrica ou o formato do abajur.
    laundry_ball_texture:
      name: Textura de bola de lavar roupa
      description: Descreve o estilo da superfície da bola, que influencia a agitação
        do tecido e a remoção de pelos.
    laundry_wash_accessory_type:
      name: Tipo de acessório para lavagem de roupa
      description: Identifica o tipo específico de saco ou estrutura para lavagem
        de roupa.
    lawn_aerator_type:
      name: Tipo de arejador de relva
      description: Classifica os arejadores de relva de acordo com o seu design operacional
        principal ou formato.
    lawn_mower_belt_type:
      name: Tipo de cinta para corta-relva
      description: Classifica o desenho estrutural ou o perfil da cinta.
    lawn_mower_blade_type:
      name: Tipo de lâmina de corta-relva
      description: Especifica o design de corte ou elevação e a utilização prevista
        da lâmina do corta-relva.
    lawn_spreader_type:
      name: Tipo de espalhador de relva
      description: Especifica o estilo mecânico ou de configuração de um espalhador
        de relva/jardim, como por exemplo, espalhador ou queda
    lawn_tractor_tread_type:
      name: Tipo de banda de rodagem do trator corta-relva
      description: Descreve o padrão da banda de rodagem destinado a superfícies específicas
        ou necessidades de tração.
    lid_features:
      name: Características da tampa
      description: Destaca quaisquer elementos funcionais especiais da tampa que facilitem
        a preparação ou a limpeza.
    lid_vent_type:
      name: Tipo de ventilação da tampa
      description: Indica se a tampa permite a saída do vapor e, em caso afirmativo,
        como.
    lift_mechanism:
      name: Mecanismo de elevação
      description: Indica o mecanismo de acionamento utilizado para elevar, baixar
        ou inclinar o estore ou cortina.
    light_exposure_requirement:
      name: Requisito de exposição à luz
      description: Especifica o nível de luz que a ecosfera necessita para se manter
        saudável, sem sobreaquecer ou stressar os organismos.
    liner_installation_method:
      name: Método de instalação do revestimento
      description: Descreve como o revestimento permanece no lugar à superfície.
    lint_roller_type:
      name: Tipo de rolo para remover pelo
      description: Classifica o mecanismo ou design de limpeza do rolo adesivo para
        remover pelos.
    live_trap_design:
      name: Design da gaiola armadilha
      description: Classifica o estilo estrutural geral da armadilha
    lock_keying_option:
      name: Opção de fechadura com chave
      description: Especifica como a fechadura é operada, auxiliando o comprador que
        precisa de várias fechaduras operadas por uma única chave ou chaves exclusivas
        para cada fechadura.
    lubricant_requirement:
      name: Requisito de lubrificante
      description: Especifica o tipo de lubrificante recomendado ou necessário durante
        a afiação.
    lunch_set_items_included:
      name: Artigo incluído na lancheira
      description: Lista os componentes individual fornecidos na lancheira.
    machete_blade_style:
      name: Estilo de lâmina da machete
      description: Especifica o estilo tradicional regional ou funcional da lâmina
        da machete.
    map_style:
      name: Estilo de mapa
      description: Define o estilo cartográfico ou o foco temático apresentado no
        globo.
    masher_head_design:
      name: Desig da cabeça do esmagador
      description: Classifica o desenho da superfície de esmagamento, que afeta a
        textura e o esforço necessário.
    mattress_protector_features:
      name: Características do protetor de colchão
      description: Destaca características funcionais ou protetoras específicas dos
        protetores de colchão, permitindo ao comprador filtrar por qualidades como
        a impermeabilização ou materiais hipoalergénicos.
    measuring_spoon_features:
      name: Características da colher de medida
      description: Destaca as características especiais de design ou as características
        funcionais da(s) colher(es) de medida.
    meat_tenderizer_face_type:
      name: Tipo de face do amaciador de carne
      description: Descreve a textura da superfície de trabalho da cabeça do amaciador
        de carne.
    meat_tenderizer_mechanism:
      name: Mecanismo do amaciador de carne
      description: Classifica o principal mecanismo de funcionamento do amaciador
        de carne.
    medical_specialty:
      name: Especialidade médica
      description: Especifica a especialidade médica ou área da saúde para a qual
        o equipamento foi concebido
    merv_rating:
      name: Classificação MERV
      description: Define o Valor Mínimo de Eficiência Relatado (MERV) que indica
        a capacidade do filtro de reter partículas de vários tamanhos.
    microwave_compatibility:
      name: Compatibilidade com micro-ondas
      description: Especifica se o item pode ser utilizado com segurança num forno
        micro-ondas.
    microwave_oven_functions:
      name: Funções do forno micro-ondas
      description: Lista os modos de cozedura predefinidos ou avançados disponíveis,
        permitindo ao cliente encontrar modelos com convecção, grelha, cozedura por
        sensor, etc.
    milk_frother_type:
      name: Tipo de espumador de leite
      description: Classifica o produto pelo seu mecanismo de formação de espuma ou
        formato.
    milk_frothing_method:
      name: Método de espumar leite
      description: Especifica a tecnologia ou o mecanismo utilizado para espumar o
        leite.
    milk_frothing_system:
      name: Sistema de espuma de leite
      description: Especifica o tipo de mecanismo de espuma ou vaporização de leite
        fornecido pela máquina.
    mirror_curvature:
      name: Curvatura do espelho
      description: Especifica a curvatura da superfície refletora, afetanto o ângulo
        de visão e a distorção.
    mirror_type:
      name: Tipo de espelho
      description: Classifica o estilo geral ou a categoria funcional do espelho.
    mist_output_mode:
      name: Modo de saída de névoa
      description: Indica os padrões de névoa ou intensidade selecionáveis disponíveis
        no difusor.
    mixing_bowl_features:
      name: Características da taça de mistura
      description: Destaca as características funcionais especiais da taça que influenciam
        a usabilidade e a manutenção.
    mixing_mechanism:
      name: Mecanismo de mistura
      description: Descreve o mecanismo interno utilizado para misturar os ingredientes
        do molho.
    mochi_maker_functions:
      name: Funções da máquina para mochi
      description: Lista os modos de funcionamento integrados ou os programas que
        o aparelho suporta.
    mode_of_action:
      name: Modo de ação
      description: Indica o funcionamento do fungicida, diferenciando os fungicidas
        de contacto dos fungicidas sistémicos ou translaminares.
    moisture_absorber_form:
      name: Forma do absorvedor de humidade
      description: Descreve o formato físico do produto, permitindo ao comprador selecionar
        sacos, recipientes, embalagens, etc.
    money_retrieval_method:
      name: Método de recuperação de dinheiro
      description: Descreve como o dinheiro guardado é retirado do mealheiro.
    mop_head_type:
      name: Tipo de cabeça de esfregona
      description: Indica o design estrutural da esfregona ou da recarga, ajudando
        o comprador a encontrar o modelo correto para as suas necessidades de limpeza.
    mop_wringing_mechanism:
      name: Mecanismo de torção da esfregona
      description: Indica como o excesso de líquido é removido da esfregona, ajudando
        o comprador a escolher o estilo de torção preferido.
    mounting_bolt_pattern:
      name: Padrão de furação de montagem
      description: Especifica o número e o esquema dos furos de montagem dos parafusos
        na caixa do veio (por exemplo, triangular com 3 parafusos, quadrado com 4
        parafusos).
    mouthpiece_shape:
      name: Forma do bocal
      description: Especifica a forma da extremidade do bocal da boquilha para cigarros.
    mower_deck_material:
      name: Material da plataforma de corte
      description: Indica o material de construção da plataforma de corte, que influencia
        a durabilidade e o peso.
    mulch_form:
      name: Forma da cobertura morta
      description: Descreve a forma física ou a consistência da cobertura morta.
    nap_mat_items_included:
      name: Itens incluídos no colchão de chão
      description: Informação sobre os componentes ou acessórios específicos que acompanham
        o colchão de chão.
    napkin_edge_finish:
      name: Acabamento da borda do guardanapo
      description: Especifica a costura ou o acabamento decorativo ao longo da borda
        ou da bainha do guardanapo.
    noodle_core_design:
      name: Design do núcleo do noodle
      description: Descreve se o noodle tem um núcleo sólido ou oco.
    nozzle_adjustability:
      name: Ajustabilidade do bocal
      description: Indica se o bocal pode ser ajustado para alterar o padrão de pulverização
        ou a taxa de fluxo.
    nozzle_material:
      name: Material do bocal
      description: Especifica o material dos bocais de pulverização, tendo em conta
        a durabilidade e a resistência ao entupimento.
    nozzle_style:
      name: Estilo do bocal
      description: Especifica a forma ou estilo funcional da extremidade do bocal
        do tubo.
    nozzle_types_included:
      name: Tipos de bocal incluídos
      description: Lista as formas/estilos dos bocais fornecidos com a pistola de
        injeção, ajudando os compradores a saber quais formas de produto podem criar.
    number_of_compartments:
      name: Número de compartimentos
      description: Indica quantas secções separadas tem o contentor de lixo para a
        separação de resíduos ou materiais recicláveis.
    numeral_style:
      name: Estilo dos numerais
      description: Define o estilo visual ou a presença de numerais no mostrador do
        relógio.
    oil_dispenser_spout_design:
      name: Design do bocal do dispensador de óleo
      description: Descreve o estilo do bocal ou da saída de água, que afeta o controlo
        do fluzo e a prevenção de gotejamento.
    organizer_application:
      name: Aplicação do organizador
      description: Especifica o tipo principal de itens que a inserção foi concebida
        para armazenar.
    ornament_hook_style:
      name: Estilo de gancho ornamental
      description: Identifica o estilo ou formato do gancho utilizado para pendurar
        decorações.
    oscillation_mode:
      name: Modo de oscilação
      description: Descreve se e como o ventilador oscila para distribuir o ar.
    oscillation_type:
      name: Tipo de oscilação
      description: Especifica se e como o ventilador oscila, auxiliando o comprador
        que necessita de uma ampla circulação de ar.
    outdoor_grill_rack_type:
      name: Tipo de grelha para exterior
      description: Especifica o estilo funcional da grelha para esclarecer a sua finalidade
        culinária prevista.
    oxygen_indicator_type:
      name: Tipo de indicador de oxigénio
      description: Especifica se é incluído um indicador visual para mostrar se o
        pacote absorvente ainda está ativo e qual a forma que este assume.
    pad_cleaning_action:
      name: Ação de limpeza da esponja
      description: Descreve a função principal de limpeza da esponja ou o resultado
        final.
    pan_bottom_type:
      name: Tipo fundo da panela
      description: Indica se a panela tem fundo amovível ou fundo fixo e sólido.
    pan_perforation_type:
      name: Tipo de perfuração da panela
      description: Indica se o fundo/laterais da panela são sólidos ou perfurados
        para permitir a drenagem de líquidos.
    parasol_opening_mechanism:
      name: Mecanismo de abertura do guarda-sol
      description: Descreve como a cobertura do guarda-sol é aberta/fechada.
    parchment_paper_coating:
      name: Revestimento do papel vegetal
      description: Identifica o tratamento de superfície aplicado ao papel vegetal
        para proporcionar propriedades antiaderentes.
    particle_size_grade:
      name: Grau de tamanho das partículas
      description: Descreve a classificação do tamanho dos grânulos da vermiculite,
        afetando as características de arejamento e retenção de água.
    patio_heater_safety_features:
      name: Características de segurança para aquecedores de pátio
      description: Destaca os mecanismos de segurança integrados, concebidos para
        prevenir acidentes e garantir uma operação segura.
    pattern_match_type:
      name: Tipo de correspondência de padrão
      description: Especifica como o padrão deve ser alinhado entre as tiras durante
        a instalação.
    pendulum_compatibility:
      name: Compatibilidade com pêndulo
      description: Indica se o movimento pode acionar um pêndulo e se está incluído
        um pêndulo.
    perch_design:
      name: Design do poleiro
      description: Descreve o estilo estrutural ou a forma do poleiro.
    perch_surface_texture:
      name: Textura da superfície do poleiro
      description: Define a textura/acabamento da superfície do poleiro que afeta
        aderência e o desgaste das unhas.
    pet_safety:
      name: Segurança para animais de estimação
      description: Indica se a planta é tóxica ou não para animais de estimação comuns.
    pet_toxicity:
      name: Toxicidade para animais de estimação
      description: Indica se a planta é tóxica para animais domésticos comuns, garantindo
        a segurança dos clientes que possuem animais de estimação.
    ph_adjustment_direction:
      name: Direção do ajuste do pH
      description: Indica se o produto foi formulado para aumentar (pH Up) ou diminuir
        (pH Down) o nível de pH da solução.
    pie_pan_edge_style:
      name: Estilo da borda da forma para tortas
      description: Descreve o desenho da borda, que afeta o aspeto da crosta e a facilidade
        com que se solta.
    pin_shape:
      name: Forma do alfinete
      description: Descreve a forma geral do alfinete que prende o tecido.
    pipe_connection_method:
      name: Método de ligação de tubos
      description: Especifica o tipo de ligação nas extremidades da curva do tubo
        (por exemplo, macho, fêmea, encaixe rápido, rosca) para garantir a compatibilidade
        da instalação.
    piping_tip_shape:
      name: Forma da ponta de confeitar
      description: Define a forma ou o design de uma ponta de confeitar/decorar.
    pitcher_spout_style:
      name: Estilo do bico do jarro
      description: Define o design do bico, que afeta a precisão da arte do latte
        e o controlo do fluxo.
    pizza_cutter_design:
      name: Design do cortador de pizza
      description: Identifica o estilo estrutural do cortador de pizza, ajudando os
        clientes a escolher entre diferentes mecanismos de corte.
    pizza_pan_style:
      name: Estilo da forma de pizza
      description: Identifica o estilo de construção/design da forma de pizza, indicando
        como coze a massa e o tipo de pizza para o qual é indicada.
    plant_care_difficulty:
      name: Dificuldade no cuidado das plantas
      description: Indica o nível de cuidado necessário para manter a planta, ajudando
        os principiantes e os especialistas a escolherem adequadamente.
    plant_container_type:
      name: Tipo de recipiente para plantas
      description: Identifica o tipo de recipiente incluído com o arbusto artificial,
        se presente.
    plant_life_cycle:
      name: Ciclo de vida das plantas
      description: Indica se a planta é anual, bienal ou perene.
    planter_material:
      name: Material da floreira
      description: Indica o material do vaso/floreira incluído, se fornecido.
    plate_coupling_pattern:
      name: Padrão de acoplamento de placas
      description: Especifica a configuração do cubo inferior que se ajusta ao acoplador
        do motor do prato rotativo do micro-ondas, garantindo a rotação correta.
    plate_purpose:
      name: Finalidade da placa
      description: Define a função da placa dentro do sistema de corte da relva.
    plate_style:
      name: Estilo de prato
      description: Identifica o estilo específico ou o uso pretendido do prato de
        jantar.
    pole_construction_type:
      name: Tpo de construção de poste
      description: Define o estilo estrutural do poste, afetando a configuração e
        a portabilidade.
    pool_chemical_type:
      name: Tipo de produto químico para piscina
      description: Categoriza as principais funções ou química do produto de teste
        da piscina.
    pool_filter_type:
      name: Tipo de filtro de piscina
      description: Identifica a tecnologia de filtragem ou o estilo de construção
        utilizado pelo filtro da piscina ou spa.
    pool_game_type:
      name: Tipo de jogo de piscina
      description: Identifica o tipo específico de jogo ou desporto que o produto
        permite praticar na piscina.
    pool_ladder_design:
      name: Design da escada para piscina
      description: Classifica o design estrutural global da escada da piscina.
    pool_liner_installation_style:
      name: Estilo de instalação do revestimento da piscina
      description: Identifica o método de fixação utilizado para fixar o revestimento
        à parede da piscina.
    pool_lounge_style:
      name: Estilo de espreguiçadeira de piscina
      description: Classifica o estilo estrutural da área de descanso da piscina para
        uma filtragem visual ou funcional.
    pool_lounger_features:
      name: Características da espreguiçadeira de piscina
      description: Destaca as funcionalidades especiais que acrescentam praticidade
        ou conforto à espreguiçadeira.
    pool_skimmer_type:
      name: Tipo de skimmer de piscina
      description: Classifica o design do skimmer, ajudando o comprador a comparar
        redes de mão com skimmers automáticos ou flutuantes.
    pool_toy_features:
      name: Características do brinquedo de piscina
      description: Destaca as características funcionais ou de design notáveis específicas
        dos brinquedos de piscina.
    pool_type:
      name: Tipo de piscina
      description: Classifica o estilo estrutural da piscina.
    pool_vacuum_type:
      name: Tipo de aspirador de piscina
      description: Indica o estilo de funcionamento ou mecanismo de acionamento de
        um aspirador de piscina.
    popcorn_kernel_variety:
      name: Variedade de milho para pipocas
      description: Especifica a variedade natural ou a forma do milho de pipoca.
    portafilter_type:
      name: Tipo de porta-filtro
      description: Identifica o estilo estrutural do porta-filtro, que afeta o método
        de extração e o fluxo de trabalho.
    post_installation_method:
      name: Método de instalação do poste
      description: Define a forma como o poste da caixa de correio é instalado ou
        fixado no lugar.
    pour_spout_design:
      name: Design do bico de despejo
      description: Especifica características especiais ou o estilo do bico de despejo
        que influencia o controlo do fluxo.
    pour_spout_style:
      name: Estilo de bico de despejo
      description: Descreve o design do bico de despejo do dispensador, que afeta
        o controlo do fluxo e a resistência ao gotejamento.
    power_equipment_hitch_type:
      name: Tipo de engate do equipamento motorizado
      description: Identifica a interface de conexão que o acessório utiliza para
        ser montado em tratores ou unidades motorizadas.
    predator_guard_style:
      name: Estilo de proteção contra predadores
      description: Categoriza o design estrutural da proteção, ajudando os compradores
        a encontrar rapidamente soluções em forma de cone, disco, gaiola ou placa
        perfurada.
    preferred_soil_type:
      name: Tipo de solo preferido
      description: Indica a composição do solo em que a planta prospera.
    preparation_type:
      name: Tipo de preparação
      description: Descreve o método necessário para preparar o alimento para consumo.
    preservation_method:
      name: Método de conservação
      description: Descrever a técnica utilizada para secar ou conservar as flores.
    pressure_cooker_handle_type:
      name: Tipo de pega da panela de pressão
      description: Indica o estilo ou a localização da pega da panela de pressão que
        está a ser substituída.
    pressure_cooker_safety_features:
      name: Características de segurança da panela de pressão
      description: Lista os mecanismos de segurança integrados que previnem acidentes,
        como tampas com fecho ou válvulas de alívio de pressão.
    pressure_settings:
      name: Definições de pressão
      description: Especifica quantos níveis de pressão distintos a panela de pressão
        oferece ao utilizador.
    pressure_washer_outlet_connector_type:
      name: Tipo de conector de saída para lavadora de alta pressão
      description: Identifica a especificação do conector na parte frontal da cabeça
        da pistola, utilizado para ligar lanças ou bocais.
    pressure_washer_spray_pattern:
      name: Padrão de pulverização da lavadora de alta pressão
      description: Especifica o ângulo ou padrão de pulverização produzido pelo bocal
        da lavadora de alta pressão.
    print_edition_type:
      name: Tipo de edição impressa
      description: Classifica o tipo de edição da impressão, indicando a sua raridade
        e valor.
    printed_sides:
      name: Laterais impressas
      description: Indica se o produto é impresso num dos lados ou em ambos os lados.
    procedure:
      name: Procedimento
      description: Especifica o procedimento médico ou o tipo de formação para o qual
        o equipamento foi concebido
    protected_item_type:
      name: Tipo de item protegido
      description: Especifica o tipo de documento ou objeto que a capa RFID foi concebida
        para proteger.
    pulley_groove_profile:
      name: Perfil da ranhura da polia
      description: Define o estilo da interface da correia da polia tensora.
    pulp_ejection_type:
      name: Tipo de ejeção de polpa
      description: Indica a forma como a polpa é expelida da máquina.
    pump_type:
      name: Tipo de bomba
      description: Especifica o design do mecanismo da bomba da lavadora de alta pressão.
    punch_bowl_components_included:
      name: Componentes da taça de ponche incluídos
      description: Enumera os artigos complementares que acompanham a taça de ponche,
        permitindo ao comprador compreender rapidamente o conteúdo do conjunto.
    quilt_construction_type:
      name: Tipo de construção do edredão
      description: Descreve o método de costura interna ou reforço utilizado num edredão,
        que afeta a distribuição do calor e a durabilidade.
    radiator_design_type:
      name: Tipo de design do radiador
      description: Identifica o estilo estrutural do radiador.
    rain_barrel_design:
      name: Design do barril de recolha de água da chuva
      description: Classifica o estilo estrutural do barril para recolha de chuva.
    rain_chain_style:
      name: Estilo da corrente de chuva
      description: Especifica o design estrutural da corrente de chuva para que os
        clientes possam filtrar por preferência visual e desempenho do fluxo de água.
    range_hood_filter_type:
      name: Tipo de filtro de exaustor
      description: Classifica o tipo de filtro de substituição para garantir o ajuste
        e o desempenho corretos.
    range_installation_type:
      name: Tipo de instalação do fogão
      description: Descreve a configuração de como o fogão é instalado na cozinha.
    recorder_type:
      name: Tipo de gravador
      description: 'Identifica a tecnologia de gravação utilizada (ex.: DVR, NVR)
        para ajudar na comparação entre soluções analógicas e IP.'
    refrigerator_configuration:
      name: Configuração do frigorífico
      description: Identifica o estilo geral da porta e do compartimento do frigorífico.
    release_type:
      name: Tipo de libertação
      description: Indica a rapidez com que os nutrientes são libertados do fertilizante.
    relief_style:
      name: Estilo de relevo
      description: Indica se as cotas da superfície são altas, rebaixadas ou planas
        no globo.
    repellent_mechanism:
      name: Mecanismo repelente
      description: Especifica o principal mecanismo de dissuasão empregue pelo produto,
        como o aroma químico, o som ultrassónico ou a luz intermitente.
    replaceable_brush_head:
      name: Cabeça de escova substituível
      description: Especifica se a cabeça da escova pode ser destacada e substituída
        quando estiver gasta.
    rib_material:
      name: Material das varetas
      description: Especifica o material utilizado para as varetas ou raios do guarda-chuva,
        como fibra de vidro ou alumínio.
    rice_cooker_functions:
      name: Funções da arrozeira
      description: Lista os programas de cozedura predefinidos ou modos disponíveis
        na arrozeira, permitindo ao comprador comparar a versatilidade.
    roaster_oven_functions:
      name: Funções do forno assador
      description: Lista as funções de cozedura predefinidas ou suportadas disponíveis
        num forno assador.
    roasting_rack_shape:
      name: Forma da grelha
      description: Especifica a forma estrutural ou o design da grelha, que afeta
        o ajuste e o desempenho de cozedura.
    rockwool_form:
      name: Forma de lã de rocha
      description: Especifica a forma física ou configuração do produto de lã de rocha.
    roof_style:
      name: Estilo de telhado
      description: Define o estilo arquitetónico ou forma do telhado.
    rose_attachment:
      name: Acessório difusor
      description: Indica se a lata inclui um difusor/cabeça de pulverização destacável,
        se é fixa ou se não tem difusor.
    safety_mirror_features:
      name: Características do espelho de segurança
      description: Destaca as características especiais de desempenho que melhoram
        a durabilidade ou a visibilidade.
    salad_spinner_mechanism:
      name: Mecanismo da centrifugadora de saladas
      description: Especifica o mecanismo de centrifugação utilizado para secar verduras,
        ajudando os compradores a escolher o seu estilo de operação preferido.
    sand_color:
      name: Cor da areia
      description: Indica a cor da areia ou do enchimento granular dentro da ampulheta,
        independentemente da cor da estrutura externa.
    sand_type:
      name: Tipo de areia
      description: Especifica o tipo de areia com base na sua composição ou aplicação
        comum.
    saucer_functionality:
      name: Funcionalidade do prato
      description: Especifica o estilo funcional do prato ou bandeja, como designs
        com auto-irrigação ou reservatório.
    sauna_form_factor:
      name: Fator de forma da sauna
      description: Define o estilo estrutural geral da unidade de sauna.
    sauna_heater_type:
      name: Tipo de aquecedor de sauna
      description: Indica o tipo de aquecedor incluído ou compatível com o kit de
        sauna.
    scoop_release_mechanism:
      name: Mecanismo de libertação da colher
      description: Descreve o tipo de mecanismo de libertação do produto integrado
        na colher.
    scoop_surface_design:
      name: Design da superfície da colher
      description: Descreve se a superfície da colher é sólida ou perfurada para permitir
        a drenagem do óleo.
    scoop_wall_design:
      name: Design da parede da colher
      description: Descreve se a superfície da colher é sólida ou perfurada/ranhurada
        para permitir a passagem de pequenos pedaços ou de óleo.
    scrubber_head_type:
      name: Tipo de cabeça de lavagem
      description: Descreve a ação mecânica ou o design da cabeça de lavagem.
    scrubbing_strength:
      name: Força de esfregamento
      description: Indica o nível relativo de esfregamento/abrasividade proporcionado
        pelo produto.
    seafood_utensil_items_included:
      name: Itens de utensílios para marisco incluídos
      description: Lista ferramentas adicionais para marisco incluídas com o quebra-marisco,
        permitindo aos compradores comparar quebra-mariscos individuais com kits completos.
    sealing_modes:
      name: Modos de selagem
      description: Lista os programas de selagem disponíveis no aparelho.
    security_sensor_subtype:
      name: Subtipo de sensor de segurança
      description: Define a função/tipo específico do sensor de segurança.
    seed_treatment:
      name: Tratamento das sementes
      description: Especifica qualquer processamento especial aplicado às sementes.
    self_cleaning_method:
      name: Método de autolimpeza
      description: Especifica o tipo de tecnologia de autolimpeza que o forno utiliza.
    serveware_pieces_included:
      name: Peças de loiça para servir incluídas
      description: Lista os diferentes componentes da loiça para servir incluídos
        num conjunto de várias peças.
    shaker_set_pieces_included:
      name: Peças de conjuntos de frascos para especiarias incluídas
      description: Lista os componentes individuais que acompanham o conjunto, para
        além dos saleiros e pimenteiros básicos.
    sheath_material:
      name: Material da bainha
      description: Material da bainha da sonda do termopar, que afeta a resistência
        à corrosão e a temperatura máxima de serviço.
    shelf_location_in_appliance:
      name: Localização da prateleira no aparelho
      description: Indica o local onde a prateleira deve ser instalada no interior
        do aparelho.
    shoe_brush_type:
      name: Tipo de escova para calçado
      description: Classifica o estilo funcional da escova para calçado, permitindo
        ao comprador localizar escovas concebidas para tarefas específicas.
    shoe_dryer_technology:
      name: Tecnologia do secador de calçado
      description: Especifica a principal tecnologia de secagem utilizada pelo secador
        de calçado.
    shoe_organizer_design:
      name: Design do organizador para calçado
      description: Identifica o estilo ou formato geral do organizador para calçado
        para ajudar o comprador a filtrar o artigo.
    shoe_polish_form:
      name: Forma de graxa para calçado
      description: Identifica a forma física ou o método de entrega do produto de
        graxa para calçado.
    shoe_treatment_purpose:
      name: Finalidade do tratamento para calçado
      description: Identifica a principal função ou benefício do produto de tratamento
        para calçado.
    shoe_tree_design:
      name: Design da forma para calçado
      description: Identifica o estilo estrutural ou mecanismo da forma para calçado,
        afetando a capacidade de ajuste, o tipo de calçado pretendido e a usabilidade.
    shot_glass_style:
      name: Estilo de copo de shot
      description: Classifica o estilo ou formato específico do copo de shot.
    shovel_handle_grip_type:
      name: Tipo de punho do cabo da pá
      description: Especifica o estilo do punho na extremidade do cabo.
    shovel_head_type:
      name: Tipo de cabeça da pá
      description: Classifica a forma/estilo funcional da cabeça da pá ou da enxada.
    shower_curtain_ring_type:
      name: Tipo de argola para cortina de duche
      description: Identifica o estilo funcional do anel da cortina de duche.
    shrub_shape:
      name: Forma do arbusto
      description: Descreve a forma geral esculpida/topiária do arbusto artificial.
    signature_presence:
      name: Presença de assinatura
      description: Especifica se e como a pintura está assinada pelo artista.
    sink_caddy_features:
      name: Características do organizador para pia
      description: Destaca elementos funcionais especiais de um organizador para pia.
    size_adjustability:
      name: Ajustabilidade de tamanho
      description: Indica se o comprimento/largura do produto pode ser ajustado para
        se adequar a vários tamanhos de calçado.
    skewer_tip_type:
      name: Tipo de ponta de espeto
      description: Define o tipo de ponta de um espeto, que afeta a facilidade de
        perfuração do alimento e a apresentação geral.
    sleeping_position_suitability:
      name: Adequação da posição para dormir
      description: Indica para que posições de dormir a almofada foi concebida.
    sleeve_insulation:
      name: Isolamento da manga
      description: Indica se a manga oferece isolamento térmico para manter as bebidas
        frias ou quentes.
    slice_style:
      name: Estilo de fatia
      description: Especifica o estilo de corte principal produzido pela máquina de
        corte de cozinha, como juliana ou waffle.
    slipcover_stretch_type:
      name: Tipo de elasticidade da capa
      description: Especifica o grau e a direção da elasticidade do tecido utilizado
        na capa.
    smoker_type:
      name: Tipo de defumador
      description: Classifica o defumador de acordo com o seu design estrutural ou
        método de defumação.
    smoking_chip_size:
      name: Tamanho das lascas para defumar
      description: Indica o corte/tamanho físico das lascas de madeira para defumar,
        o que afeta a velocidade de combustão e a adequação para diferentes grelhadores
        ou defumadores.
    snow_blower_stage_type:
      name: Tipo de estágio do soprador de neve
      description: Indica o número de estágios do sem-fim/impulsor utilizados para
        mover e descarregar a neve, uma especificação primária utilizada para diferenciar
        máquinas de um, dois e três estágios.
    soap_dispenser_operation_type:
      name: Tipo de funcionamento do dispensador de sabão
      description: Especifica o mecanismo de ativação utilizado para dispensar o sabão
        ou a loção.
    soil_texture:
      name: Textura do solo
      description: Descreve o tamanho/composição predominante das partículas do solo
        que afetam a drenagem e o arejamento.
    spa_installation_type:
      name: Tipo de instalação do spa
      description: Classifica o spa com base na forma como é instalado ou configurado
        no local.
    space_heater_safety_features:
      name: Características de segurança do aquecedor
      description: Destaca os mecanismos de segurança integrados que protegem os utilizadores
        e o património.
    spice_organizer_features:
      name: Características do organizador de especiarias
      description: Destaca as características de funcionamento especiais dos organizadores
        de especiarias.
    spray_pattern:
      name: Padrão de pulverização
      description: Define o tipo de dispersão de óleo produzida pelo bico pulverizador.
    sprayer_operation_mechanism:
      name: Mecanismo de funcionamento do pulverizador
      description: Especifica como é gerada a pressão para dispensar o óleo do pulverizador.
    spring_type:
      name: Tipo de mola
      description: Identifica o tipo de mola utilizada no mecanismo da aparadora de
        bordas.
    sprinkle_opening_style:
      name: Estilo de abertura para polvilhar
      description: Define a grossura ou o estilo das perfurações/malha usada para
        dispensar o cacau (malha fina vs. orifícios grandes, etc.).
    sprinkler_orientation:
      name: Orientação do aspersor
      description: Indica a orientação e o estilo de instalação do bocal do aspersor
        de incêndio.
    sprinkler_response_type:
      name: Tipo de resposta do aspersor
      description: Especifica a característica de resposta térmica do aspersor.
    sprinkler_type:
      name: Tipo de aspersor
      description: Classifica a ação mecânica ou o estilo de distribuição do aspersor
        para facilitar a comparação e a filtragem.
    sprinkler_valve_type:
      name: Tipo de válvula do aspersor
      description: Define o tipo funcional ou de acionamento da válvula do aspersor.
    squirrel_feed_type:
      name: Tipo de ração para esquilos
      description: Identifica os tipos de ração que o comedouro foi concebido para
        dispensar, garantindo a compatibilidade com os alimentos preferidos dos esquilos.
    squirrel_resistance:
      name: Resistência a esquilos
      description: Indica se a gaiola de sebo incorpora características concebidas
        para impedir que os esquilos acedam ao sebo.
    stackability:
      name: Empilhabilidade
      description: Indica se várias unidades podem ser empilhadas com segurança para
        um armazenamento eficiente em termos de espaço.
    stackable_design:
      name: Design empilhável
      description: Indica se o recipiente foi concebido para ser empilhado em segurança,
        quer esteja cheio ou vazio.
    stacking_capability:
      name: Capacidade de empilhamento
      description: Especifica se o recipiente pode ser empilhado, encaixado, fechado
        ou não pode ser empilhado com outros recipientes.
    stainless_steel_cleaner_features:
      name: Características do limpador de aço inoxidável
      description: Especifica características de desempenho especiais do produto que
        são exclusivas ou especialmente relevantes para o cuidado do aço inoxidável.
    staple/pin_shape:
      name: Formato do clipe/pino
      description: Define a forma geral do fixador, ajudando os clientes a escolher
        entre clipes em forma de U, pinos com ponta arredondada, etc.
    staple_coating:
      name: Revestimento do clipe
      description: Descreve qualquer revestimento protetor aplicado no clipe ou no
        pino para evitar a ferrugem ou aumentar a sua durabilidade.
    steam_nozzle_type:
      name: Tipo de bocal para dispositivo de vapor
      description: Identifica o estilo funcional do bocal de encaixe do dispositivo
        de limpeza a vapor.
    steam_table_pan_cover_features:
      name: Características da tampa da panela da mesa a vapor
      description: Destaca as características funcionais especiais das tampas para
        panelas de mesa a vapor que auxiliam as operações de serviço de alimentação.
    steam_table_pan_size:
      name: Tamanho da panela da mesa a vapor
      description: Indica a fração padronizada Gastronorm/tabuleiro de hotel (por
        exemplo, inteiro, 1/2, 1/3) para a qual o tabuleiro ou tampa foi concebido.
    steam_table_pan_size_compatibility:
      name: Compatibilidade de tamanho das panelas de mesa a vapor
      description: Indica o tamanho padrão ou Gastronorm das panelas que a unidade
        pode acomodar.
    steam_table_pan_type:
      name: Tipo de panela de mesa a vapor
      description: Especifica o estilo de construção da panela, afetando o desempenho
        de drenagem e aquecimento.
    stemware_design:
      name: Design do pé
      description: Especifica se o copo tem um pé tradicional ou se é sem pé.
    stick_tip_style:
      name: Estilo da ponta do palito
      description: Define o design da extremidade do palito, afetando a forma como
        ele perfura ou sustenta os alimentos.
    stocking_toe_orientation:
      name: Orientação da biqueira da meia
      description: Especifica a direção para a qual a biqueira da meia aponta quando
        pendurada, afetando a simetria visual ao exibir várias meias.
    stopper_type:
      name: Tipo de tampa
      description: Especifica o tipo de tampa que acompanha o decantador, caso incluída.
    strainer_style:
      name: Estilo de coador
      description: Classifica o design do coador ou escorredor.
    strainer_type:
      name: Tipo de coador
      description: Especifica o estilo ou design do coador, indicando o seu uso culinário
        pretendido e a construção da malha.
    strap_end_fitting_type:
      name: Tipo de encaixe da extremidade da correia
      description: Especifica o equipamento ou encaixe localizado na extremidade da
        correia de tração que facilita a conexão, fixação ou ajuste.
    straw_dispensing_mechanism:
      name: Mecanismo de distribuição de palhinhas
      description: Descreve o método de distribuição de palhinhas, auxiliando o consumidor
        que procura características específicas de higiene ou conveniência.
    sugar_dispenser_mechanism:
      name: Mecanismo de distribuição de açúcar
      description: Descreve como o açúcar é dispensado do recipiente, ajudando o comprador
        a selecionar o seu estilo preferido de servir.
    suitable_for_pool_shape:
      name: Adequado para o formato da piscina
      description: Indica com quais formatos de piscina o acessório pode ser usado,
        ajudando os utilizadores a garantir o encaixe adequado.
    suitable_pool_surface_type:
      name: Tipo de superfície de piscina adequado
      description: Identifica os materiais da superfície da piscina para os quais
        a escova/vassoura foi concebida, evitando danos na superfície e garantindo
        uma limpeza ideal.
    suitable_spread_material:
      name: Material adequado para espalhar
      description: Identifica os tipos de materiais que o espalhador foi concebido
        para distribuir.
    sundial_type:
      name: Tipo de relógio de sol
      description: Identifica o estilo de design ou a configuração científica do relógio
        de sol.
    supplement_function:
      name: Função do suplemento
      description: Classifica os suplementos de acordo com a sua finalidade principal,
        ajudando os produtores a escolher o aditivo certo para as necessidades específicas
        das plantas.
    surface_reflectivity:
      name: Refletividade da superfície
      description: Indica se a superfície da placa foi concebida para refletir a luz,
        melhorando a visibilidade noturna.
    sweetener_type:
      name: Tipo de adoçante
      description: Identifica o principal agente adoçante utilizado no xarope.
    table_skirt_pleat_style:
      name: Estilo de plissado da saia da mesa
      description: Define o estilo de pregas ou franzidos decorativos da saia, auxiliando
        o comprador na combinação estética dos temas.
    tablecloth_clip_design:
      name: Design de fixador de toalha de mesa
      description: Descreve o mecanismo ou estilo do fixador de toalha de mesa.
    tablecloth_features:
      name: Características da toalha de mesa
      description: Destaca características especiais de desempenho ou design da toalha
        de mesa.
    tamper_evident_feature:
      name: Característica de inviolabilidade
      description: Indica a presença e o estilo da funcionalidade de inviolabilidade
        incorporada na tampa.
    tang_type:
      name: Tipo de espiga
      description: Indica o desenho da espiga de uma faca, especificando até que ponto
        o metal da lâmina se estende para o interior do cabo.
    teapot_spout_style:
      name: Estilo do bico da chaleira
      description: Descreve o design do bico da chaleira, que afeta o controlo do
        fluxo e a estética.
    temperature_zones:
      name: Zonas de temperatura
      description: Identifica quantas zonas de temperatura controláveis independentemente
        o frigorífico de vinhos oferece.
    thermocouple_junction_type:
      name: Tipo de junção do termopar
      description: Indica a construção da junção sensora, afetando o tempo de resposta
        e o isolamento elétrico.
    thermometer_design:
      name: Design do termómetro
      description: Especifica o estilo de funcionamento ou a tecnologia fundamental
        do termómetro doméstico.
    thermos_handle_type:
      name: Tipo de pega da garrafa térmica
      description: Descreve o estilo da pega ou do suporte de transporte integrado
        na garrafa térmica.
    thread_standard:
      name: Padrão de rosca
      description: Identifica a especificação da rosca utilizada nas ligações do acessório
        para garantir a compatibilidade cruzada com componentes de canalização.
    tilt_mechanism:
      name: Mecanismo de inclinação
      description: Especifica o mecanismo que permite que o toldo se incline para
        um posicionamento ideal da sombra.
    time_format:
      name: Formato de tempo
      description: Indica se o relógio pode apresentar a hora no formato de 12 horas,
        24 horas ou em ambos os formatos.
    timer_mechanism:
      name: Mecanismo do temporizador
      description: Identifica o mecanismo subjacente utilizado para medir o tempo.
    tine_position:
      name: Posição dos dentes
      description: Descreve a configuração dos dentes em relação às rodas/motor, o
        que afeta a manobrabilidade e a penetração no solo.
    tire_construction:
      name: Construção do pneu
      description: Identifica o método de construção interna da estrutura do pneu.
    tire_construction_type:
      name: Tipo de construção do pneu
      description: Identifica se o pneu é de construção diagonal ou radial, o que
        afeta a flexibilidade, a capacidade de carga e a qualidade de condução.
    tire_tread_pattern:
      name: Padrão do piso do pneu
      description: Descreve o estilo do piso do pneu, indicando a adequação para diferentes
        condições de relva e necessidades de tração.
    tissue_lotion_content:
      name: Teor de loção nos lenços
      description: Indica se os lenços são impregnados com loção ou outros aditivos
        calmantes.
    toaster_features:
      name: Características da torradeira
      description: Lista as funções especiais e os elementos de design disponíveis
        na torradeira.
    tong_type:
      name: Tipo de pinça
      description: Especifica o estilo principal ou a utilização prevista da pinça.
    toothbrush_holder_features:
      name: Características so suporte para escova de dentes
      description: Destaca funções especiais ou os elementos de design que diferenciam
        o suporte.
    toothpick_dispensing_mechanism:
      name: Mecanismo dispensador de palitos
      description: Identifica o mecanismo pelo qual os palitos são dispensados.
    topographical_relief:
      name: Relevo topográfico
      description: Indica se a superfície do globo apresenta uma topografia elevada.
    towel_holder_design:
      name: Design do suporte para toalhas
      description: Descreve o estilo estrutural de um suporte para toalhas, como por
        exemplo, em barra ou em anel.
    towel_weave:
      name: Tecido da toalha
      description: Descreve a construção ou o estilo de tecelagem do tecido da toalha,
        que afeta a textura, a absorção e o tempo de secagem.
    track_lighting_rail_type:
      name: Tipo de calha de iluminação
      description: Define o padrão mecânico/elétrico da calha, determinando quais
        os acessórios e conectores compatíveis.
    track_lighting_system_compatibility:
      name: Compatibilidade do sistema de calha de iluminação
      description: Especifica o padrão elétrico e mecânico do dispositivo ou acessório
        para o qual o dispositivo foi concebido.
    track_rail_circuit_configuration:
      name: Configuração do circuito da calha
      description: Indica o número ou o tipo de circuitos elétricos que a calha suporta,
        afetando o controlo independente dos grupos de luminárias.
    track_system_standard:
      name: Padrão do sistema de calhas
      description: Identifica o padrão físico da calha ao qual a fonte de alimentação
        se adapta, permitindo que os compradores combinem os componentes com a sua
        calha (por exemplo, calha em H, J ou L).
    tractor_tire_application:
      name: Aplicação do pneu para trator
      description: Indica a aplicação ou ambiente principal para o qual o pneu foi
        concebido.
    tractor_tire_tread_classification:
      name: Classificação do piso dos pneus de trator
      description: Classifica o padrão do piso dos pneus de trator de acordo com as
        normas agrícolas e industriais.
    tree_shape:
      name: Forma da árvore
      description: Descreve a silhueta ou o perfil geral de uma árvore artificial.
    trigger_type:
      name: Tipo de pneu
      description: Especifica o mecanismo de acionamento utilizado para controlar
        o fluxo de água no bocal.
    trimmer_line_feed_system:
      name: Sistema de alimentação de fio de corte
      description: Identifica como o fio de corte é avançado a partir da cabeça durante
        a operação.
    trimmer_line_shape:
      name: Formato da linha de corte
      description: Descreve o formato da secção transversal do fio de corte, que influencia
        o desempenho de corte e o ruído.
    turntable_type:
      name: Tipo de base giratória
      description: Identifica o estilo da superfície de cozedura, distinguindo entre
        bases giratórias tradicionais de vidro e designs planos ou não giratórios.
    ultrasonic_cleaner_accessories_included:
      name: Acessórios para limpeza ultrassónica incluídos
      description: Lista os componentes adicionais fornecidos com o dispositivo de
        limpeza, para que o comprador saiba exatamente o que está na caixa.
    umbrella_base_type:
      name: Tipo de base de guarda-chuva
      description: Define o estilo estrutural ou o projeto de montagem da base.
    umbrella_opening_mechanism:
      name: Mecanismo de abertura do guarda-chuva
      description: Define como a cobertura do guarda-chuva é aberta e fechada.
    umbrella_type:
      name: Tipo de guarda-chuva
      description: Especifica o design geral ou o formato do guarda-chuva.
    upf_rating:
      name: Classificação UPF
      description: Indica o fator de proteção ultravioleta (UPF) da lona do guarda-sol,
        quantificando a sua eficácia no bloqueio dos raios UV prejudiciais.
    utensil_flexibility:
      name: Flexibilidade do utensílio
      description: Indica o grau de rigidez ou flexibilidade do corpo do raspador,
        afetando a adequação para taças curvas ou massas firmes.
    utensil_holder_features:
      name: Características do suporte para utensílios
      description: Descreve características funcionais especiais de um suporte para
        utensílios de cozinha.
    utensil_tray_features:
      name: Características da bandeja para utensílios
      description: Destaca as características especiais que melhoram a funcionalidade
        da bandeja.
    vacuum_hose_connection_type:
      name: Tipo de conexão da mangueira de aspiração
      description: Descreve o tipo de conector nas extremidades da mangueira, garantindo
        o correto encaixe mecânico com aspiradores ou acessórios.
    valance_style:
      name: Estilo de sanefa
      description: Identifica o desenho decorativo da sanefa, ajudando os clientes
        a escolher um estilo que combine com a sua decoração.
    valet_organizer_features:
      name: Características do organizador de valet
      description: Destaca as funcionalidades organizacionais específicas integradas
        no valet de carregamento.
    valve_configuration:
      name: Configuração da válvula
      description: Define o estilo funcional da válvula da mangueira de jardim, ajudando
        o comprador a selecionar rapidamente a solução correta para a sua configuração
        de rega.
    valve_stem_angle:
      name: Ângulo da haste da válvula
      description: Especifica a orientação/ângulo da haste da válvula em relação à
        câmara de ar, afetando a facilidade de inserção e o encaixe no aro.
    vase_filler_type:
      name: Tipo de enchimento para vasos
      description: Classifica o produto de acordo com o tipo específico de material
        de enchimento ou forma.
    vent_pipe_type:
      name: Tipo de tubo de ventilação
      description: Classifica o estilo de construção da chaminé ou do tubo de ventilação.
    vent_style:
      name: Estilo de ventilação
      description: Classifica o estilo estrutural ou a finalidade do componente de
        ventilação.
    waffle_style:
      name: Estilo waffle
      description: Identifica a grelha ou padrão waffle produzido pelas placas.
    wallpaper_removal_type:
      name: Tipo de remoção do papel de parede
      description: Indica a facilidade de remoção ao redecorar.
    wallpaper_washability_rating:
      name: Classificação de resistência à lavagem do papel de parede
      description: Define como a superfície do papel de parede pode ser limpa após
        a instalação.
    warmer_type:
      name: Tipo de aquecedor
      description: Especifica o mecanismo de aquecimento principal ou a utilização
        pretendida do aquecedor de vela ou óleo.
    warmth_level:
      name: Nível de calor
      description: Classifica o nível geral de calor ou adequação sazonal da colcha
        ou edredão.
    warmth_rating:
      name: Classificação de calor
      description: Indica o nível de isolamento térmico de um cobertor, semelhante
        à classificação TOG na roupa de cama.
    waste_container_lid_features:
      name: Características da tampa do contentor de resíduos
      description: Destaca as funcionalidades especiais ou melhorias incorporadas
        na tampa.
    waste_container_sign_message:
      name: Mensagem do sinal do contentor de resíduos
      description: Define o fluxo específico de resíduos ou o texto de aviso impresso
        na etiqueta ou sinal.
    water_filtration_technology:
      name: Tecnologia de filtragem de água
      description: Descreve a tecnologia ou o mecanismo principal utilizado para purificar
        a água.
    water_heater_element_connection_type:
      name: Tipo de ligação do elemento de aquecimento e água
      description: Identifica o estilo de montagem do elemento, diferenciando entre
        os estilos de rosca e os vários estilos de flange.
    water_sensor_design:
      name: Design do sensor de água
      description: Especifica o estilo físico do elemento sensor de água.
    water_supply_type:
      name: Tipo de abastecimento de água
      description: Identifica a forma como o aparelho recebe água, distinguindo entre
        reservatórios de enchimento manual e tubagens de água canalizada.
    watering_needs:
      name: Necessidades de rega
      description: Descreve as necessidades hídricas típicas da planta.
    wax_paper_form:
      name: Forma do papel vegetal
      description: Especifica se o papel vegetal é vendido em rolo contínuo ou em
        folhas pré-cortadas.
    weather_guard_mounting_method:
      name: Método de montagem da proteção contra intempéries
      description: Especifica a forma como a proteção se fixa ao alimentador ou à
        estrutura de suporte.
    wheel_bearing_type:
      name: Tipo de rolamento da roda
      description: Identifica a construção interna do rolamento ou bucha da roda,
        afetando a suavidade do rolamento e os requisitos de manutenção.
    wheel_tread_style:
      name: Estilo do piso da roda
      description: Especifica o desenho do piso da roda, que afeta a tração, o nível
        de ruído e a possibilidade de deixar marcas no piso.
    whistling:
      name: Apito
      description: Especifica se a chaleira emite um som de apito quando a água atinge
        o ponto de ebulição.
    wick_material:
      name: Material do pavio
      description: 'Identifica a composição do pavio utilizado (ex.: algodão, fibra
        de vidro).'
    window_film_installation_surface:
      name: Superfície de instalação de película para vidros
      description: Especifica se a película foi concebida para utilização no interior,
        no exterior ou em superfícies duplas.
    window_film_type:
      name: Tipo de película para vidros
      description: 'Classifica o estilo funcional da película (ex.: privacidade versus
        segurança).'
    window_rod_type:
      name: Tipo de varão para janela
      description: Classifica o estilo funcional do varão da janela.
    window_screen_type:
      name: Tipo de tela da janela
      description: Define o estilo estrutural ou o modo de funcionamento da tela.
    window_treatment_lining_type:
      name: Tipo de forro do tratamento da janela
      description: Indica se a sanefa ou cornija tem forro e que tipo de forro é utilizado.
    wine_aerator_type:
      name: Tipo de arejador de vinho
      description: Especifica o formato ou estilo de funcionamento do arejador de
        vinho.
    wine_glass_style:
      name: Estilo de copo de vinho
      description: Especifica o tipo de vinho ou o formato do copo a utilizar para
        otimizar o aroma e o sabor.
    wok_bottom_type:
      name: Tipo de base do wok
      description: Define a forma da base do wok, determinando a compatibilidade com
        diferentes tipos de fogão e suportes para wok.
    wood_grain_orientation:
      name: Orientação dos veios da madeira
      description: Especifica a orientação dos veios da madeira no produto, tais como
        veio de topo, veio de bordo ou veio de face. A orientação dos veios da madeira
        influenciam a durabilidade e a facilidade de corte.
    wood_seasoning_method:
      name: Método de secagem da madeira
      description: Indica como a lenha foi seca ou curada, influenciando o teor de
        humidade e a qualidade da combustão.
    wrap_format:
      name: Formato do invólucro
      description: Especifica o formato físico em que o invólucro alimentar é fornecido,
        como rolos ou folhas pré-cortadas.
    abacus_bead_material:
      name: Materiais das contas do ábaco
      description: Material principal das contas do ábaco.
    abec_rating:
      name: Classificação ABEC
      description: Especifica o grau de precisão dos rolamentos com base nas classificações
        ABEC, indicando os níveis de suavidade e tolerância.
    abrasive_level:
      name: Nível de abrasividade
      description: Força de corte relativa de um produto de polimento/composto em
        acabamentos automóveis.
    absinthe_accessories_included:
      name: Acessórios para absinto incluídos
      description: Detalhes de quaisquer acessórios incluídos com o produto, tais
        como colheres, copos ou cubos de açúcar.
    ac_compressor_mounting_style:
      name: Estilo de montagem do compressor do ar condicionado
      description: Descreve o estilo de montagem/fixação mecânica ou a interface do
        suporte do compressor ao motor/sistema de acionamento de acessórios.
    ac_compressor_oil_type:
      name: Tipo de óleo do compressor de ar condicionado
      description: Especifica a composição química do óleo lubrificante necessário/utilizado
        pelo compressor de ar condicionado (os tipos mais comuns incluem PAG e POE).
    accent_modes:
      name: Modos de acentuação
      description: Especifica de que forma o metrónomo pode acentuar os tempos dentro
        de um compasso (para além do clique básico).
    access_mechanism:
      name: Mecanismo de acesso
      description: Descreve como o utilizador acede à plataforma de dormir, Loft.
    accessibility_features:
      name: Caraterísticas de acessibilidade
      description: Especifica os equipamentos e as configurações relacionados com
        acessibilidade presentes no miniautocarro.
    accessories_included:
      name: Acessórios incluídos
      description: Lista os itens suplementares incluídos com a cadeira (por exemplo,
        apoio para os pés, almofada lombar), proporcionando aos compradores uma visão
        transparente do valor acrescentado.
    accessory_pieces_included:
      name: Componentes acessórios incluídos
      description: Lista os acessórios incluídos num conjunto ou pacote de acessórios
        de vestuário com várias peças.
    acoustic_amplifier_feedback_control_features:
      name: Funcionalidades de controlo de feedback acústico do amplificador
      description: Indica as ferramentas integradas anti-feedback para instrumentos
        acústicos (por exemplo, filtro notch, interruptor de fase, supressão automática
        de feedback).
    acoustic_drum_kit_components_included:
      name: Componentes incluídos no kit de bateria acústica
      description: Indica os principais componentes incluídos no kit (apenas pacote
        de cascos ou kit completo; pratos/equipamento incluídos).
    acoustic_guitar_body_shape:
      name: Formato do corpo da guitarra acústica
      description: Descreve o formato/contorno do corpo da guitarra acústica, que
        influencia o timbre, o conforto e a utilização típica.
    acoustic_guitar_string_core_design:
      name: Estrutura do núcleo das cordas da guitarra acústica
      description: A construção do núcleo das cordas da guitarra acústica.
    acoustic_piano_key_material:
      name: Material das teclas do piano acústico
      description: Especifica o material principal utilizado no revestimento das teclas
        do piano/marfim.
    acoustic_piano_lid_type:
      name: Tipo de tampa do piano acústico
      description: Especifica o estilo do mecanismo da tampa/cobertura utilizado no
        piano acústico (por exemplo, diferenças entre piano de cauda, vertical, tampa
        do teclado ou tampa superior).
    acoustic_piano_plate_frame_material:
      name: Material da placa/estrutura do piano acústico
      description: Especifica o principal material da placa/estrutura (harpa) do piano,
        normalmente ferro fundido.
    acoustic_piano_soundboard_material:
      name: Material da tábua harmónica do piano acústico
      description: Especifica o principal material utilizado na tábua harmónica do
        piano.
    action_figure_scale:
      name: Escala da figura de ação
      description: Indica a proporção de escala de coleção (por exemplo, 1:12) para
        a qual o acessório foi concebido.
    action_type:
      name: Tipo de ação
      description: Descreve o mecanismo de disparo ou de armar da arma (por exemplo,
        ação por ferrolho, cano basculante, ação por alavanca).
    actuation_mechanism:
      name: Mecanismo de acionamento
      description: 'Indica como a alavanca aciona o sistema de travagem: cabo puramente
        mecânico, totalmente hidráulico, hidráulico acionado por cabo ou eletrónico/sem
        fios.'
    actuation_method:
      name: Método de acionamento
      description: Forma de ativação ou descarga do sistema de supressão.
    adapter_orientation:
      name: Orientação do adaptador
      description: Especifica o ângulo ou a configuração de um adaptador de válvula
        para pneu de bicicleta, afetando a acessibilidade da bomba (por exemplo, reto,
        90°).
    additive_application_stage:
      name: Fase de aplicação do aditivo
      description: Indica a fase do processo em que o produto se destina a ser utilizado.
    adhesive_backing:
      name: Base adesiva
      description: Indica se a seda imprimível possui uma base adesiva para aplicação
        autocolante.
    adhesive_formulation:
      name: Formulação do adesivo
      description: Indica a base química ou a formulação do adesivo, como cianoacrilato
        ou epóxi.
    adhesive_sides:
      name: Lados adesivos
      description: Indica se o adesivo fundível está presente num só lado ou em ambos
        os lados da fita/malha.
    adjunct_grain_processing_form:
      name: Forma de processamento do cereal adjunto
      description: Indica a forma física/de processamento do cereal adjunto tal como
        vendido para produção de cerveja (por exemplo, em flocos, torrificado, maltado,
        cru).
    adjustability_type:
      name: Tipo de ajustabilidade
      description: Especifica que tipo de ajuste o amortecedor suporta, se aplicável.
    adjustable_cup_mutes:
      name: Surdinas de copo ajustáveis
      description: Indica se a surdina de copo é ajustável/removível e o tipo de ajuste.
    adjustable_zones:
      name: Zonas ajustáveis
      description: Identifica as secções da base que podem ser ajustadas de forma
        independente.
    adjustment_type:
      name: Tipo de ajuste
      description: Indica se o regulador é ajustável e de que forma o ajuste é efetuado.
    administration_method:
      name: Método de administração
      description: Indica a forma como o desparasitante é administrado ao cavalo (por
        exemplo, por via oral ou por injeção), ajudando os compradores a cumprir as
        orientações veterinárias e a escolher um método de aplicação adequado.
    advice_card_prompt_type:
      name: Tipo de prompt no cartão de aconselhamento
      description: Tipo de prompt impressa no cartão (ou ausência de prompt).
    aeration_method:
      name: Método de arejamento
      description: Descreve o tipo de aeração fornecido ou suportado pelo recipiente,
        garantindo oxigenação adequada para isco vivo.
    aero_package_components:
      name: Componentes do pacote aerodinâmico
      description: Indica os principais componentes aerodinâmicos instalados no veículo
        (selecionar todos os aplicáveis).
    aerodynamic_elements_included:
      name: Elementos aerodinâmicos incluídos
      description: Especifica os componentes aerodinâmicos incluídos no carro de fórmula
        (selecionar todos os aplicáveis, se suportado).
    aftertouch_support:
      name: Suporte de aftertouch
      description: Indica se o controlador suporta aftertouch (canal ou polifónico)
        nas teclas/pads.
    agave_content_classification:
      name: Classificação do conteúdo de agave
      description: Especifica se a tequila é produzida com 100% de agave azul (Blue
        Weber) ou se é uma tequila mista, contendo pelo menos 51% de açúcares provenientes
        do agave.
    aida_cloth_count:
      name: Contagem do tecido Aida
      description: Especifica a contagem do tecido Aida (número de quadrados/pontos
        por polegada), o que determina o tamanho do ponto e a escala do desenho.
    aida_cloth_pre_cut_format:
      name: Formato do tecido Aida pré-cortado
      description: Indica se o tecido Aida é vendido em peça pré-cortada, em corte
        contínuo a partir do rolo, ou em rolo.
    air_bag_material:
      name: Material do airbag
      description: Especifica o material do saco de ar/reservatório utilizado na gaita
        de foles irlandesa.
    air_bed_internal_construction:
      name: Construção interna do colchão insuflável
      description: Descreve a estrutura interna de suporte ou a tecnologia utilizada
        no interior do colchão insuflável para conforto e estabilidade.
    air_dry_clay_color_form:
      name: Forma de cor da argila de secagem ao ar
      description: Indica se a argila é vendida pré-colorida, branca/neutra para pintura,
        ou como mistura/sortido.
    air_hockey_items_included:
      name: Itens incluídos no air hockey
      description: Lista os acessórios específicos incluídos no conjunto, para que
        os clientes saibam exatamente o que recebem (por exemplo, 2 empurradores,
        4 discos, 2 almofadas de feltro).
    air_intake_temperature_sensor_mounting_style:
      name: Tipo de montagem do sensor de temperatura do ar de admissão
      description: O tipo físico de montagem do sensor IAT no sistema de admissão.
    air_integration_capability:
      name: Capacidade de integração de ar
      description: Indica se e como o computador de mergulho suporta transmissores
        sem fios de pressão do tanque.
    air_mattress_valve_type:
      name: Tipo de válvula do colchão insuflável
      description: Especifica o tipo de válvula com que um acessório é compatível
        ou que inclui, garantindo compatibilidade entre bombas, válvulas e peças de
        reparação.
    air_water_rocket_kit_items_included:
      name: Itens incluídos no kit de foguete de ar e água
      description: Componentes principais incluídos no conjunto do foguete (lançador,
        bomba, aletas, peças de recarga).
    air_water_rocket_launch_method:
      name: Método de lançamento do foguete de ar e água
      description: Forma como o foguete é pressurizado/lançado (interação do utilizador
        e tipo de equipamento utilizado).
    airbag_position:
      name: Posição do airbag
      description: Especifica a posição ou zona de retenção para a qual a peça de
        airbag foi concebida.
    aircraft_ads_b_capability:
      name: Capacidade ADS-B da aeronave
      description: Indica se a aeronave está equipada para conformidade com ADS-B
        Out.
    aircraft_airframe_material:
      name: Material da estrutura da aeronave
      description: Principais materiais utilizados na construção da estrutura (fuselagem)
        da aeronave.
    aircraft_cabin_configuration:
      name: Configuração da cabine da aeronave
      description: Especifica o esquema da cabine da aeronave (por exemplo, zona de
        conferência, divã, cabine dividida em quatro zonas).
    aircraft_documentation_included:
      name: Documentação da aeronave incluída
      description: Lista os documentos fornecidos com a peça (por exemplo, 8130-3).
    aircraft_galley_configuration:
      name: Configuração da copa da aeronave
      description: Presença e tipo de instalações de cozinha/serviços de alimentação
        na cabine.
    aircraft_installation_location:
      name: Local de instalação na aeronave
      description: Indica o local, na aeronave, onde se deve instalar ou utilizar
        a peça ou o acessório.
    aircraft_internet_connection:
      name: Ligação à Internet da aeronave
      description: Indica a presença e o tipo de ligação à Internet a bordo.
    aircraft_landing_gear_type:
      name: Tipo de trem de aterragem da aeronave
      description: Especifica a configuração do trem de aterragem do autogiro.
    aircraft_lavatory_configuration:
      name: Configuração da casa de banho da aeronave
      description: O tipo de configuração da casa de banho a bordo.
    aircraft_maintenance_program_enrollment:
      name: Inscrição no programa de manutenção da aeronave
      description: Indica se a aeronave está inscrita num programa de manutenção de
        motores e/ou da estrutura, e qual o tipo de cobertura aplicável (motor, estrutura
        ou ambos).
    aircraft_operational_certification:
      name: Certificação operacional da aeronave
      description: Especifica a base de certificação regulamentar ou operacional sob
        a qual a aeronave é operada (dependente da jurisdição, por exemplo FAA Part
        91/135/121, AOC EASA).
    aircraft_protective_gear_certification:
      name: Certificação do equipamento de proteção da aeronave
      description: Especifica a norma aeronáutica, regulamentar ou industrial que
        certifica o equipamento de proteção.
    aircraft_system_application:
      name: Aplicação do sistema da aeronave
      description: Identifica a que sistema ou área da aeronave a peça/acessório pertence
        (utilizado para navegação e filtragem de diferentes peças aeronáuticas).
    airflow_resistance_level:
      name: Nível de resistência ao fluxo de ar
      description: Indica o grau de restrição que a surdina proporciona em termos
        de contrapressão/resistência ao fluxo de ar.
    airship_envelope_material:
      name: Material da envolvente do dirigível
      description: Material principal da envolvente (pele) do dirigível.
    airsoft_part_type:
      name: Tipo de peça de airsoft
      description: Identifica o tipo funcional de componente ou acessório para réplicas
        de airsoft (por exemplo, carregador, cano, guarda-mãos).
    airworthiness_approval_basis:
      name: Base de aprovação de aeronavegabilidade
      description: Especifica a base de certificação/aprovação aplicável à peça, quando
        relevante (por exemplo, PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Ajustabilidade do volume do alarme
      description: Indica se e como o volume do alarme pode ser ajustado pelo utilizador.
    alcohol_ink_finish_effect:
      name: Efeito do acabamento com tinta de álcool
      description: Descreve o efeito visual/acabamento produzido pela formulação de
        tinta de álcool (para além da cor), como metálico ou perolado.
    alignment_aid_style:
      name: Tipo de guia de alinhamento
      description: Descreve o tipo de guias de alinhamento impressas ou incorporadas
        na superfície do tapete (por exemplo, linhas retas, marcadores de distância).
    alternator_cooling_type:
      name: Tipo de arrefecimento do alternador
      description: Descreve como o alternador é arrefecido e ventilado.
    alternator_marine_ignition_protection_rating:
      name: Classificação de proteção de ignição marinha do alternador
      description: Indica se o alternador é protegido contra ignição em compartimentos
        de motores marítimos (por exemplo, de acordo com a norma SAE J1171/ISO 8846).
    alternator_mounting_configuration:
      name: Configuração de montagem do alternador
      description: Especifica a configuração física de montagem utilizada para fixar
        o alternador ao suporte do motor.
    alternator_pulley_type:
      name: Tipo de polia do alternador
      description: Especifica o design da polia/embraiagem no alternador (ou indica
        que a polia não está incluída).
    alternator_regulator_type:
      name: Tipo de regulador do alternador
      description: Indica se o regulador de tensão é interno ou externo ao alternador,
        e se é controlado pelo fabricante (OEM) ou pela unidade de controlo do motor
        (PCM).
    alternator_terminal_connection_type:
      name: Tipo de ligação dos terminais do alternador
      description: Estilo principal de ligação elétrica dos terminais de saída/excitação
        do alternador, para garantir compatibilidade com o chicote elétrico.
    altitude_suitability:
      name: Adequação à altitude
      description: Indica se a bola foi concebida para condições específicas de altitude,
        que afetam a velocidade e o ressalto.
    ambulance_stretcher_mount_type:
      name: Tipo de suporte da maca da ambulância
      description: Especifica o tipo de sistema de carregamento/montagem da maca suportado
        pela ambulância.
    american_football_safety_certification:
      name: Certificação de segurança do futebol americano
      description: Indica as certificações ou normas de segurança específicas do futebol
        americano que o produto cumpre.
    amplifier_tube_function:
      name: Função da válvula do amplificador
      description: Especifica a função da válvula no circuito de um amplificador de
        instrumento (por exemplo, pré-amplificação ou potência).
    analog_synthesizer_cv_gate_i_o:
      name: Sintetizador analógico CT/Gate Entrada/Saída
      description: Indica os tipos de ligações de controlo de tensão (CT) e gate suportados
        para integração com equipamento modular/analógico.
    analog_synthesizer_keybed_configuration:
      name: Configuração do teclado do sintetizador analógico
      description: Descreve se o sintetizador inclui um teclado integrado e, se sim,
        o número de teclas.
    anchor_configuration:
      name: Configuração do ponto de ancoragem
      description: Indica se o sistema de suspensão utiliza um ponto de ancoragem
        central único ou múltiplos pontos independentes, afetando a variedade de exercícios
        e a complexidade da montagem.
    animal_raising_method:
      name: Método de criação do animal
      description: Descreve as práticas de criação ou maneio utilizadas para o animal
        de origem.
    animal_species:
      name: Espécie do animal
      description: Especifica o animal ou criatura representada pelo peluche (por
        exemplo, urso, coelho, dinossauro).
    animal_trap_jaw_style:
      name: Tipo de maxilas da armadilha para animais
      description: Configuração das maxilas da armadilha, que influenciam a força
        de retenção e o bem-estar do animal.
    animal_trap_type:
      name: Tipo de armadilha para animais
      description: Classifica o estilo/mecanismo da armadilha, permitindo aos compradores
        identificar rapidamente o método de captura ou a conformidade com regulamentos.
    ankle_collar_style:
      name: Estilo do cano do tornozelo
      description: Descreve o estilo ou construção do cano no tornozelo do calçado,
        como corte baixo, médio, alto, cano tipo meia ou sem atacadores, que influencia
        o suporte, o ajuste e a estética.
    ankle_guard_protection_level:
      name: Nível de proteção do suporte de tornozelo
      description: Avalia o grau global de proteção contra impactos que o suporte
        de tornozelo proporciona.
    ankle_strap_padding_type:
      name: Tipo de preenchimento da correia do tornozelo
      description: Descreve o material de amortecimento ou o tipo de preenchimento
        utilizado no interior da correia, que influencia o conforto.
    ankle_strap_type:
      name: Tipo de correia de tornozelo
      description: Classifica a construção ou o design da correia de tornozelo de
        uma fixação de snowboard.
    ant_farm_habitat_medium_type:
      name: Tipo de meio do habitat do formigueiro
      description: Especifica o meio principal de escavação/observação fornecido ou
        necessário para o formigueiro.
    ant_farm_kit_contents:
      name: Conteúdo do kit de formigueiro
      description: Identifica os componentes incluídos no kit de formigueiro (por
        exemplo, recipiente do habitat, areia/gel, voucher de formigas, ferramentas
        de alimentação).
    ant_farm_lighting_type:
      name: Tipo de iluminação do formigueiro
      description: Especifica o tipo de iluminação integrada (se existente) utilizada
        para observação.
    antenna_fit_type:
      name: Tipo de encaixe da antena
      description: Indica o formato de antena ao qual a bola de antena se destina.
    anti_caking_agent:
      name: Agente antiaglomerante
      description: Especifica o tipo de agente antiaglomerante adicionado para evitar
        a formação de grumos, informação relevante para alergias e precisão de receitas.
    anti_g_suit_bladder_material:
      name: Material da(s) bolsa(s) do fato anti-G
      description: Material utilizado na(s) bolsa(s) insuflável(is) interna(s) do
        fato anti-G; incluir todos os materiais aplicáveis, caso exista mais do que
        um.
    anti_g_suit_connector_type:
      name: Tipo de conector do fato anti-G
      description: Especifica o tipo/padrão de conector da mangueira de ar/pressão
        utilizado para ligação à aeronave ou ao regulador.
    anti_g_suit_inflation_method:
      name: Método de insuflação do fato anti-G
      description: Indica como as bolsas do fato são pressurizadas para fornecer proteção
        contra forças G.
    anti_g_suit_size_system:
      name: Sistema de tamanhos do fato anti-G
      description: Sistema de dimensionamento utilizado para definir o tamanho/ajuste
        do fato.
    anti_reverse_type:
      name: Tipo de mecanismo anti-inversão
      description: Especifica o tipo de mecanismo anti-inversão utilizado, o que influencia
        a fixação do anzol e a inversão do carreto.
    anti_theft_feature:
      name: Funcionalidade antirroubo
      description: Indica se o suporte de montagem possui medidas de prevenção de
        roubo, como fixações com bloqueio ou design resistente a adulterações.
    antique_gun_ignition_system:
      name: Sistema de ignição de arma antiga
      description: Especifica o sistema histórico de disparo/ignição utilizado na
        arma de fogo antiga.
    apple_variety:
      name: Variedade de maçã
      description: Especifica a cultivar ou variedade da maçã (por exemplo, Gala,
        Fuji, Granny Smith), ajudando os clientes a escolher com base no sabor, na
        textura e no uso culinário.
    applique_edge_finish:
      name: Acabamento do rebordo do debrum
      description: Descreve como os rebordos são acabados, influenciando o aspeto
        e a resistência ao desfiado.
    arbor_type:
      name: Tipo de carreto
      description: Classifica o molinete de acordo com o design do eixo do carretel,
        que afeta a velocidade de recolha da linha, a capacidade da linha de apoio
        e a memória da linha.
    archery_accessory_type:
      name: Tipo de acessório de tiro com arco
      description: Especifica o tipo de acessório destinado a equipamentos de tiro
        com arco, permitindo uma filtragem rápida dos produtos pelos compradores.
    archery_part_type:
      name: Tipo de peça para tiro com arco
      description: Identifica o equipamento específico ou a peça de substituição em
        questão (por exemplo, elevador, lâminas, corda do arco), permitindo uma filtragem
        precisa sem expandir excessivamente a árvore de categorias.
    archery_range_accessory_type:
      name: Tipo de acessório para campo de tiro com arco
      description: Classifica o tipo específico de acessório utilizado num campo de
        tiro com arco, permitindo aos compradores filtrar rapidamente o item exato
        de que necessitam.
    archery_target_features:
      name: Características do alvo de tiro com arco
      description: Lista funcionalidades de desempenho ou conveniência especializadas
        não abrangidas por outros atributos (por exemplo, espuma autorregenerativa,
        pega de transporte).
    archery_tool_type:
      name: Tipo de ferramenta de tiro com arco
      description: Classifica o tipo específico de ferramenta ou equipamento de tiro
        com arco.
    armband_features:
      name: Características da braçadeira
      description: Lista características funcionais ou visuais especiais que melhoram
        a braçadeira.
    armguard_style:
      name: Estilo do protetor de braço
      description: Define o estilo de construção ou formato do protetor de braço,
        fornecendo informação sobre a cobertura do design e o aspeto tradicional ou
        moderno.
    armor_protection_type:
      name: Tipo de proteção da blindagem
      description: Tipo de proteção fornecida pelo sistema de blindagem do veículo.
    armrest_adjustability:
      name: Ajustabilidade dos apoios de braços
      description: Define a ajustabilidade dimensional e a configuração dos apoios
        de braços da cadeira (por exemplo, fixos, 2D, 3D, rebatíveis).
    armrest_type:
      name: Tipo de apoio de braços
      description: Descreve a presença e a ajustabilidade dos apoios de braços na
        cadeira (por exemplo, sem apoios de braços, fixos, ajustáveis, removíveis).
    arrow_bolt_point_type:
      name: Tipo de ponta de flecha/dardo
      description: Define o estilo da ponta ou extremidade instalada numa flecha ou
        virote.
    arrow_component_type:
      name: Tipo de componente de seta
      description: Classifica a peça ou o acessório específico para uma flecha (inserto,
        revestimento, bucha, cola, etc.) para que os clientes possam filtrar os itens
        sem necessitar de dezenas de subcategorias adicionais.
    arrow_containment_level:
      name: Nível de contenção da flecha
      description: Descreve se o descanso contém totalmente, contém parcialmente ou
        não contém a seta.
    arrow_fletching_orientation:
      name: Orientação da emplumagem da flecha
      description: Especifica a orientação da asa ou do deslocamento da emplumagem
        (por exemplo, asa esquerda, asa direita, helicoidal) que determina a direção
        de rotação da flecha.
    arrow_nock_groove_size:
      name: Tamanho da ranhura da ponta da flecha
      description: Especifica a classificação de tamanho da ranhura/garganta da corda
        do arco, determinando a compatibilidade com diferentes diâmetros de corda.
    arrow_nock_type:
      name: Tipo de encaixe da flecha
      description: Design/estilo da ranhura da flecha que se encaixa na corda do arco.
    arrow_rest_style:
      name: Estilo de descanso da flecha
      description: Especifica o estilo/mecanismo funcional do descanso da flecha (por
        exemplo, drop-away, blade, whisker biscuit). O estilo determina a forma como
        o descanso suporta, contém e liberta a flecha e é uma das principais formas
        de os compradores diferenciarem os produtos.
    arrow_shaft_compatibility:
      name: Compatibilidade da haste da flecha
      description: 'Indica o padrão da haste/bucha da flecha em que a ponta iluminada
        se encaixa (por ex.: X, H, S, GT).'
    art_crafting_tool_tip_style:
      name: Estilo de ponta de ferramenta para artes e manualidades
      description: Descreve a forma/perfil da ponta de trabalho (por exemplo, ponta
        fina versus esfera arredondada) para indicar o tipo de marcas de relevo que
        produz.
    art_ink_lightfastness_rating:
      name: Classificação de resistência à luz da tinta artística
      description: Indica a resistência da tinta ao desvanecimento quando exposta
        à luz, normalmente expressa através de classificações normalizadas.
    art_ink_opacity:
      name: Opacidade da tinta artística
      description: Especifica o nível de cobertura da tinta após a aplicação.
    art_security_rating:
      name: Classificação de segurança ART
      description: Especifica a classificação por estrelas ART holandesas (de 1 a
        5 estrelas) atribuída à fechadura.
    artichoke_cut:
      name: Corte de alcachofra
      description: Indica a parte ou a preparação da alcachofra que é disponibilizada
        (por exemplo, inteira, coração, base), para que os clientes compreendam o
        rendimento e o uso culinário pretendido.
    artichoke_variety:
      name: Variedade de alcachofra
      description: Especifica a cultivar ou variedade botânica da alcachofra para
        ajudar o comprador a distinguir entre tamanho, cores, sabores e usos culinários.
    articulation_features:
      name: Características de articulação
      description: Indica se o modelo de dinossauro tem peças móveis (mandíbula, membros
        e cauda articuláveis) e se permite ser posicionado de diversas formas.
    artificial_bait_form:
      name: Forma do isco artificial
      description: Indica a forma física ou o estilo de apresentação do isco ou do
        chamariz de pesca.
    asa_mounting_type:
      name: Tipo de montagem do ASA
      description: Indica o estilo da interface do Adaptador de Fonte de Ar (ASA)
        ou padrão de montagem que o adaptador drop forward utiliza (por exemplo, encaixe
        em cauda de andorinha, calha, montagem direta).
    ascender_descender_type:
      name: Tipo ascendente/descendente
      description: Classifica o estilo do ascensor ou descensor de escalada para uma
        filtragem mais precisa.
    aspiration_type:
      name: Tipo de aspiração
      description: Indica a forma como o motor é aspirado/potenciado.
    assembly_state:
      name: Estado de montagem
      description: Indica se o armário é enviado pronto a montar, pré-montado ou noutro
        formato.
    assistance_mechanism:
      name: Mecanismo de assistência
      description: Especifica qualquer sistema de assistência ou resistência integrado
        que a torre de exercício possa incluir para flexões na barra fixa, paralelas
        ou outros exercícios.
    atemoya_cultivar:
      name: Cultivar Atemoya
      description: Especifica a cultivar/variedade nomeada do fruto atemoya, permitindo
        aos compradores escolher frutos com o sabor, tamanho ou características da
        semente que preferir.
    athletic_cup_size:
      name: Tamanho da coquilha para desporto
      description: Indica o tamanho da coquilha designado pelo fabricante para garantir
        o ajuste adequado ao atleta.
    attachment_position:
      name: Posição de fixação
      description: Especifica em que parte da sela ou do cavaleiro deve ser fixada
        a bolsa.
    attractant_scent_profile:
      name: Perfil de aroma atrativo
      description: Descreve o odor ou sabor específico utilizado para atrair animais
        selvagens ou mascarar o cheiro humano.
    atv_utv_intended_use:
      name: Utilização prevista de ATV/UTV
      description: Utilização/estilo principal pretendido para o ATV/UTV.
    audio_channel_configuration:
      name: Configuração do canal de áudio
      description: O número de canais de áudio discretos que o equalizador/DSP suporta
        (por exemplo, estéreo de 2 canais, frontal/traseiro de 4 canais, 6 canais).
    audio_inputs:
      name: Entradas de áudio
      description: Especifica os tipos de entrada de áudio disponíveis para amostragem/gravação
        (por exemplo, 1/4" em linha, XLR, 3,5 mm, pré-amplificador de microfone, phono).
    audio_output:
      name: Saída de áudio
      description: Indica se o brinquedo emite som e como o áudio é reproduzido.
    audio_outputs:
      name: Saídas de áudio
      description: Especifica a ligação de saída de áudio disponível, incluindo as
        saídas principais e quaisquer saídas atribuíveis/auxiliares.
    audio_playback_source:
      name: Fonte de reprodução de áudio
      description: Fontes de conteúdo multimédia principais a partir das quais o aparelho
        de karaoke pode reproduzir música.
    autograph_authentication:
      name: Autenticação por autógrafo
      description: Indica o tipo/estado de autenticação de um autógrafo no cartão.
    autograph_format:
      name: Formato de autógrafo
      description: Descreve se a assinatura é um autógrafo original feito à mão, um
        fac-símile carimbado/impresso ou uma inscrição/suplemento.
    autogyro_cockpit_enclosure:
      name: Estrutura do cockpit do girocóptero
      description: Especifica se o cockpit é aberto ou fechado.
    available_firing_modes:
      name: Modos de disparo disponíveis
      description: Lista os Modos de disparo selecionáveis e o assistente de marcação
        que já vêm instalados de fábrica.
    avocado_variety:
      name: Variedade de abacate
      description: Especifica a cultivar ou variedade do abacate, ajudando o comprador
        a distinguir as diferenças de sabor, textura, tamanho e teor de óleo.
    award_customization_included:
      name: Personalização do prémio incluída
      description: Indica a personalização/personalização incluída na compra do prémio.
    award_material:
      name: Material para prémios
      description: Identifica o(s) material(is) principal(is) do item de prémio (troféu,
        placa, medalha, pregadeira, fita, etc.).
    award_mounting_display_type:
      name: Tipo de montagem/exibição do prémio
      description: Especifica como o prémio deve ser exibido ou montado (na parede,
        num computador ou num dispositivo utilizável).
    award_plaque_plate_material:
      name: Material da placa de prémio
      description: Especifica o material da placa de características/gravação fixada
        à placa (que não seja o material de suporte).
    award_ribbon_attachment_type:
      name: Tipo de fixação da fita de prémio
      description: Especifica como a fita deve ser fixada ou utilizada.
    award_ribbon_imprint_method:
      name: Método de impressão da fita de prémio
      description: Especifica a forma como o texto/gráficos são aplicados à fita.
    award_ribbon_material:
      name: Material da fita de prémio
      description: 'Material principal do tecido da fita (p. ex.: cetim, poliéster).'
    award_ribbon_placement_title:
      name: Classificação/título da fita de prémio
      description: 'A classificação ou o título representado na fita (p. ex.: 1.º
        lugar, participante).'
    axle_compatibility:
      name: Compatibilidade do eixo
      description: Indica o padrão do eixo que a roda utiliza, garantindo a compatibilidade
        com o quadro e o garfo da bicicleta.
    back_beam_type:
      name: Tipo de viga traseira
      description: 'Tipo/ajustabilidade da viga traseira (p. ex.: lisa ou com altura
        regulável).'
    back_design:
      name: Design das costas
      description: Especifica as construções traseiras assinaláveis nas peças de vestuário
        que afetam o estilo e o suporte.
    back_panel_type:
      name: Tipo de painel traseiro
      description: Especifica o estilo ou material do painel traseiro do armário,
        o que afeta a visibilidade do ecrã e a combinação com a decoração.
    back_sides_material:
      name: Material das costas e laterais
      description: Especifica o material utilizado para o fundo e as laterais do corpo
        da guitarra clássica.
    backing_type:
      name: Tipo de fixação
      description: Descreve o tipo de fixação/suporte da peça de strass que está a
        ser vendida (para produtos autocolantes).
    backup_camera_mounting_location:
      name: Localização de montagem da câmara de marcha-atrás
      description: Indica o local de instalação previsto no veículo para a câmara
        de marcha-atrás.
    backup_camera_video_interface:
      name: Interface de vídeo da câmara de marcha-atrás
      description: Especifica a saída/interface/conector de vídeo utilizado pela câmara
        de marcha-atrás para se ligar a um monitor, DVR ou unidade principal (por
        exemplo, RCA composto, LVDS OEM, IP sobre Ethernet).
    badminton_set_components_included:
      name: Componentes do conjunto de badminton incluídos
      description: Lista os itens individuais fornecidos com um conjunto de badminton.
    bag_attachment_method:
      name: Método de fixação da bolsa
      description: Indica o método principal utilizado para fixar a bolsa/suporte
        de hidratação a outros equipamentos (por exemplo, sistema MOLLE, presilha
        para cinto, mosquetão).
    bag_case_carrying_style:
      name: Estilo de transporte da bolsa/estojo
      description: Especifica o formato geral principal de transporte do estojo/bolsa
        (tal como foi concebida para ser transportada).
    bag_cover_material:
      name: Material da cobertura da bolsa
      description: Especifica o material da cobertura da bolsa (revestimento exterior),
        que influencia a durabilidade, a aderência e a aparência.
    bag_embellishment:
      name: Enfeite de saco
      description: Descreve elementos decorativos proeminentes aplicados no exterior
        do saco, como borlas, tachas ou acolchoamento.
    bag_fill_medium:
      name: Enchimento médio de saco
      description: 'Identifica a substância utilizada para encher ou pressurizar o
        saco (p. ex.: ar, água, areia).'
    bag_material:
      name: Material da bolsa
      description: Material da bolsa/câmara de ar.
    bag_padding_level:
      name: Nível de preenchimento do saco
      description: Especifica o grau ou estilo de preenchimento incorporado na bolsa
        ou capa.
    bag_size_descriptor:
      name: Descritor do tamanho do saco
      description: 'Classe de tamanho de marketing para a mala bucket (p. ex.: mini,
        grande) que complementa as dimensões exatas.'
    bagel_size:
      name: Tamanho do bagel
      description: Especifica o tamanho geral do bagel, p. ex., Shop Mini, fino, standard,
        grande, extra grande ou jumbo.
    bagpipe_accessories_included:
      name: Acessórios para gaita de foles incluídos
      description: Lista os principais componentes/acessórios incluídos com a gaita
        de foles (para além dos tubos principais), por exemplo, caixa, palheta de
        treino, capa, cordas, controlo de humidade.
    bagpipes_playing_mode:
      name: Modo de utilização da gaita de foles
      description: Como o instrumento recebe ar durante a execução.
    bait_compatibility:
      name: Compatibilidade do isco
      description: Lista os tipos de isco com os quais o acessório para pellets foi
        concebido, ajudando os pescadores a garantir que a ferramenta escolhida é
        compatível com o seu isco preferido.
    bait_species:
      name: Espécies de isco
      description: Identifica o principal organismo oferecido como isco, ajudando
        os pescadores a garantir a legalidade e a eficácia na captura da espécie-alvo.
    baking_chip_form:
      name: Formato das pepitas de pastelaria
      description: Descreve o tamanho físico ou a forma das pepitas de pastelaria,
        que influencia o comportamento de derretimento e o aspeto da receita.
    balance_board_style:
      name: Estilo da tábua de equilíbrio
      description: Classifica as tábuas de equilíbrio de acordo com o seu mecanismo
        ou estilo de construção, para indicar como a prancha se move e qual o desafio
        de treino que proporciona.
    balance_cushion_accessories_included:
      name: Acessórios de almofada de equilíbrio incluídos
      description: Lista todos os acessórios incluídos com a almofada, permitindo
        ao comprador comparar o valor do pacote.
    balance_type:
      name: Tipo de equilíbrio
      description: 'Indica o estado/classificação do equilíbrio do veio de transmissão
        tal como vendido (p. ex.: equilíbrio de fábrica, equilíbrio para alta velocidade,
        desequilibrado).'
    ball_bladder_material:
      name: Material da câmara de ar da bola
      description: Identifica o material utilizado na câmara de ar interna da bola
        de andebol, que afeta a retenção de ar, o ressalto e a durabilidade geral.
    ball_certification:
      name: Certificação da bola
      description: Indica as certificações oficiais de desempenho ou aprovação que
        a bola recebeu.
    ball_construction:
      name: Construção da bola
      description: Indica o método de fabrico utilizado para unir os painéis da bola,
        o que afeta a durabilidade, o toque, a absorção de água e o preço.
    ball_core_construction:
      name: Construção do núcleo da bola
      description: Informação sobre a estrutura interna da bola, que influenciam o
        ressalto e a sensação ao toque.
    ball_core_type:
      name: Tipo de núcleo da bola
      description: Indica a construção interna da bola, que afeta o ressalto e a distribuição
        do peso.
    ball_cup_game_included_pieces:
      name: Jogo de bola e copo com peças incluídas
      description: Identifica os componentes incluídos na embalagem do produto de
        um jogo de bola e copo.
    ball_drilling_state:
      name: Estado de perfuração da bola
      description: Indica se a bola tem orifícios para os dedos e, em caso afirmativo,
        em que medida.
    ball_holder_type:
      name: Tipo de suporte para bolas
      description: Identifica o estilo estrutural ou formato do suporte para bolas.
    ball_pit_ball_surface_finish:
      name: Acabamento da superfície das bolas da piscina de bolas
      description: Descreve o acabamento tátil/visual da superfície da bola, que afeta
        a aderência, a sensação de jogo e a limpeza.
    ball_pit_safety_features:
      name: Características de segurança da piscina de bolas
      description: Características de design relacionadas com a segurança relevantes
        para piscinas de bolas.
    ball_pump_accessory_type:
      name: Tipo de acessório de bomba para bolas
      description: Define o tipo específico de acessório para a bomba para bolas,
        permitindo ao comerciante etiquetar manómetros, mangueiras, lubrificantes
        e outros acessórios numa única categoria principal.
    ball_return_mechanism:
      name: Mecanismo de retorno da bola
      description: Especifica o tipo de sistema de retorno de bola incorporado no
        tapete, se existir.
    ball_return_type:
      name: Tipo de retorno da bola
      description: Tipo de sistema de bolsa/retorno que recolhe as bolas durante o
        jogo.
    ball_speed_rating:
      name: Classificação da velocidade da bola
      description: Categoria de velocidade designada pelo fabricante, indicando a
        rapidez com que a bola se move em condições normais de jogo.
    ball_surface_texture:
      name: Textura da superfície da bola
      description: Descreve a textura exterior ou o padrão de estrias das bolas, que
        pode afetar a aderência e a estética.
    ball_surface_type:
      name: Tipo de superfície da bola
      description: Descreve o acabamento exterior ou amortecimento da bola para indicar
        a sensação de impacto e a aderência.
    ballonet_configuration:
      name: Configuração do balonete
      description: Tipo/configuração do sistema de balonetes utilizado para o ajuste
        e controlo da pressão (em dirigíveis não rígidos/semirrígidos).
    balloon_closure_valve_type:
      name: Tipo de fecho/válvula de balão
      description: 'Identifica a forma como o balão é selado após a insuflação (p.
        ex.: amarração, válvula autovedante).'
    balloon_kit_finish:
      name: Acabamento do kit de balões
      description: Descreve o acabamento superficial/visual dos balões incluídos no
        kit.
    balloon_kit_material:
      name: Material do kit de balões
      description: Especifica o material principal dos balões incluídos no kit.
    banana_variety:
      name: Variedade de banana
      description: Especifica a cultivar ou o tipo de banana disponibilizado.
    banjo_head_type:
      name: Tipo de cabeça de banjo
      description: Tipo/material da cabeça do banjo, que influencia o brilho, o volume
        e a sensação ao tocar.
    banjo_neck_material:
      name: Material do braço do banjo
      description: Material do braço do instrumento, que afeta a sensação ao tocar,
        a estabilidade e o timbre.
    banjo_pickup_configuration:
      name: Configuração do pickup do banjo
      description: Se o Banjo inclui um pickup de admissão e qual a tecnologia de
        pickup geral que utiliza.
    banjo_rim_material:
      name: Material do aro banjo
      description: O material da orla/pote (o corpo circular) que influencia fortemente
        o timbre e o peso.
    banjo_tone_ring_type:
      name: Tipo de anel de tom do banjo
      description: Especifica o design/família de materiais do anel de ressonância
        do banjo que dá forma ao timbre e ao volume.
    banjo_tuning_machine_type:
      name: Tipo de máquina de afinar banjos
      description: Tipos de afinadores utilizados no banjo.
    banknote_authentication_grading:
      name: Autenticação/classificação de notas bancárias
      description: Serviço de terceiros (se existir) que autenticou/classificou a
        nota.
    banknote_grade:
      name: Grau das notas bancárias
      description: Classificação padronizada de notas bancárias numa escala de colecionáveis.
    banknote_holder_type:
      name: Tipo de porta-notas
      description: Indica o contexto de estado físico da nota (por exemplo, solta
        versus em estojo classificado).
    banknote_material:
      name: Material da nota bancária
      description: Substrato/material principal da nota bancária.
    banknote_security_features:
      name: Elementos de segurança das notas
      description: Características de segurança/design relevantes presentes na nota.
    banknote_serial_number_type:
      name: Tipo de número de série da nota
      description: Indica se o número de série está presente e/ou se tem características
        especiais de colecionabilidade (não o número em si).
    banner_display_location:
      name: Localização da apresentação do banner
      description: Especifica o contexto pretendido de posicionamento do banner (por
        exemplo, porta, parede, fundo da mesa).
    banner_hanging_hardware_type:
      name: Tipo de equipamento para pendurar banner
      description: 'Especifica o equipamento principal de suspensão/fixação integrado
        ou incluído com o banner (p. ex.: ilhós, manga para mastro, corda).'
    banner_message_type:
      name: Tipo de mensagem do banner
      description: Indica se a mensagem de texto do banner é pré-impressa (fixa) ou
        em branco/personalizável.
    banner_shape:
      name: Forma do banner
      description: Especifica a forma geral/corte do banner para os fãs de desporto.
    banquette_configuration:
      name: Configuração da banqueta
      description: Forma geral ou orientação da banqueta.
    bar_coating:
      name: Revestimento de barra
      description: Identifica o revestimento exterior comestível aplicado na barra,
        caso exista.
    bar_pad_style:
      name: Estilo de almofada de bar
      description: Estilo de design da construção da almofada e da cobertura do bar.
    bar_texture:
      name: Textura de barra
      description: Descreve a textura geral ou a consistência da barra.
    barb_type:
      name: Tipo de farpa
      description: Indica se o anzol tem farpa e qual o seu estilo.
    barbell_finish:
      name: Acabamento da barra de musculação
      description: Informação sobre a configuração de teste/revestimento de superfície
        protetor ou estético aplicado à barra e/ou às mangas, que afeta a resistência
        à corrosão, a sensação de aderência e o preço.
    barbell_knurling_pattern:
      name: Padrão de serrilha da barra de musculação
      description: Informação sobre o estilo e a agressividade da secção serrilhada
        da pega numa barra de musculação, incluindo marcações específicas para levantamento
        de pesos ou halterofilismo.
    barista_suitability:
      name: Aptidão para barista
      description: Indica se o produto é formulado para a preparação e a formação
        de espuma de café.
    barre_rail_configuration:
      name: Configuração da barra de ballet
      description: Indica o número de barras horizontais fornecidas com a barra de
        ballet.
    barrel_or_cask_type:
      name: Tipo de barril ou tonel
      description: Especifica o tipo de barril ou tonel utilizado para envelhecer
        ou finalizar a tequila (por exemplo, carvalho americano, ex-bourbon, barril
        de xerez).
    barrel_profile:
      name: Perfil do barril
      description: Descreve a forma geral ou o equilíbrio do corpo do dardo.
    barrel_thread_standard:
      name: Padrão de rosca do cano
      description: Identifica a rosca do cano utilizada no marcador para compatibilidade
        com os canos de substituição.
    base_anchoring_method:
      name: Método de ancoragem da base
      description: Identifica a forma como a base está fixada ao solo, indicando a
        sua adequação às diferentes superfícies e condições de jogo.
    base_ballast_method:
      name: Método de lastro de base
      description: Indica como (ou se) a base do treinador é ponderada para estabilidade
        (por exemplo, enchimento com água, enchimento com areia).
    base_configuration:
      name: Configuração da base
      description: Indica a configuração estrutural da base do painel.
    base_fill_material:
      name: Material de enchimento da base
      description: Especifica a substância utilizada para encher ou dar peso à base
        do manequim de basquetebol, afetando a estabilidade e o esforço de configuração.
    base_ingredient:
      name: Ingrediente base
      description: Identifica o principal ingrediente agrícola a partir do qual o
        shochu ou soju é destilado.
    base_oil_type:
      name: Tipo de óleo base
      description: Especifica a formulação do óleo base do fluido de transmissão (por
        exemplo, totalmente sintético, semissintético ou convencional).
    base_storage_type:
      name: Tipo de armazenamento da base
      description: Especifica se a base inclui armazenamento integrado e o mecanismo
        utilizado.
    baseball_glove_type:
      name: Tipo de luva de basebol
      description: Classifica a luva de acordo com a posição do jogador ou com a sua
        finalidade funcional.
    baseball_softball_league_certification:
      name: Certificação para ligas de basebol e softebol
      description: Especifica as normas que o produto cumpre, seja através do órgão
        regulador ou da liga.
    baseball_softball_usage_role:
      name: Função de utilização de basebol/softebol
      description: Especifica a função em campo ou o tipo de participante a que a
        caneleira se destina (por exemplo, apanhador, batedor, árbitro, jogador de
        campo).
    baseball_toy_set_components_included:
      name: Componentes incluídos no conjunto de brinquedos de basebol
      description: Especifica os componentes para jogar basebol incluídos no produto
        (por exemplo, taco, bola, suporte, bases).
    baseplate_construction:
      name: Construção da placa de base
      description: Indica o método de fabrico da placa de base do camião, que influencia
        a resistência e o peso.
    basketball_hoop_accessory_type:
      name: Tipo de acessório para cesto de basquetebol
      description: Classifica o tipo específico de peça ou acessório para aro de basquetebol,
        para efeitos de filtragem e comparação.
    basketball_padding_location:
      name: Localização de proteção para basquetebol
      description: Identifica a parte do sistema de basquetebol que a proteção deve
        cobrir.
    basketball_rim_type:
      name: Tipo de aro de basquetebol
      description: Especifica o estilo estrutural ou de desempenho do aro de basquetebol
        para que os compradores possam escolher o design que melhor se adapta ao seu
        nível de jogo e às suas necessidades de instalação.
    basketball_toy_features:
      name: Características do brinquedo de basquetebol
      description: Destaca as principais características lúdicas/funcionais dos brinquedos
        de basquetebol, para além das dimensões básicas.
    bass_clarinet_body_material:
      name: Material do corpo do clarinete baixo
      description: Material principal do corpo do clarinete baixo (excluindo chaves,
        postes e outros componentes metálicos).
    bass_clarinet_lowest_written_note:
      name: Nota mais grave escrita do clarinete baixo
      description: A nota mais grave que o clarinete baixo consegue tocar (frequentemente
        descrita pelos músicos como Mi bemol grave, Ré grave, Dó grave ou extensão
        de Si grave).
    bass_drum_beater_head_shape:
      name: Forma da cabeça da maceta de bombo
      description: Descreve a forma geométrica perfil da superfície de impacto da
        pele da maceta do bombo (a face que entra em contacto com a pele do tambor).
    bass_drum_beater_shaft_material:
      name: Material da haste da maceta de bombo
      description: Especifica o material da haste/veio da maceta (não da maceta).
    bass_drum_head_built_in_muffling:
      name: Pele de bombo com abafador incorporado
      description: Tipo de amortecimento/abafamento integrado incluído no design da
        cabeça.
    bass_drum_head_configuration:
      name: Configuração da pele do bombo
      description: Descreve as peles incluídas/instaladas no bombo no momento da compra.
    bass_drum_head_surface_finish:
      name: Acabamento da superfície da pele do bombo
      description: Textura/acabamento da superfície da pele do bombo.
    bass_drum_head_type:
      name: Tipo de pele do bombo
      description: Tipo de design ou construção especial da pele do bombo.
    bass_drum_hoop_material:
      name: Material para aro de bombo
      description: Identifica o material dos aros do bombo (contra-aros), o que afeta
        a durabilidade, a estética e o peso.
    bass_drum_mounting_style:
      name: Estilo de montagem do bombo
      description: Indica como o bombo deve ser apoiado/utilizado (kit de esporas,
        berço/suporte, transportadora de marcha, etc.).
    bass_harmonica_comb_material:
      name: Material do pente da harmónica de graves
      description: Material do corpo/pente (bloco da câmara de ar) da harmónica baixo.
    bass_harmonica_mouthpiece_style:
      name: Estilo de bocal para harmónica baixo
      description: Indica a configuração do bocal da harmónica baixo.
    bass_harmonica_reed_material:
      name: Material de palheta para harmónica baixo
      description: Material das palhetas utilizadas na harmónica baixo.
    bass_harmonica_tuning_system:
      name: Sistema de afinação da harmónica baixo
      description: Especifica o sistema de afinação/temperamento utilizado para a
        harmónica baixo.
    bass_recorder_bocal_type:
      name: Tipo de bocal para flauta de bisel baixo
      description: Especifica o tipo de bocal/canal de ar utilizado para alcançar
        o bocal numa flauta de bisel baixo.
    bass_recorder_included_accessories:
      name: Flauta de bisel de baixo com acessórios incluídos
      description: Lista os acessórios incluídos no pacote da flauta de bisel baixo.
    bass_recorder_keywork_material:
      name: Material para teclado de flauta de bisel baixo
      description: Especifica o material da tecla de gravação (se existir).
    bass_trombone_slide_material:
      name: Material da vara deslizante de trombone baixo
      description: Especifica o material/revestimento principal dos tubos exteriores
        da vara deslizante (e/ou do conjunto da vara deslizante) do trombone baixo.
    bass_trombone_valve_wrap_style:
      name: Estilo de enrolamento da válvula do trombone baixo
      description: Especifica o desenho do revestimento da válvula utilizado no instrumento.
    bass_ukulele_string_type:
      name: Tipo de corda de ukulele baixo
      description: Indica o tipo geral de corda utilizada no ukulele baixo.
    bassinet_cradle_accessory_features:
      name: Características dos acessórios para berços e alcofas
      description: Destaca as características funcionais ou qualidades notáveis dos
        acessórios para berço e alcofa (por exemplo, impermeáveis, com certificação
        biológica, hipoalergénicos).
    bassoon_bell_material:
      name: Material da campânula do fagote
      description: Especifica o material da campânula do fagote.
    bassoon_bocal_system:
      name: Sistema de bocal de fagote
      description: A variante/tipo de bocal utilizada para diferentes sistemas de
        fagote e casos de utilização.
    bassoon_case_shell_type:
      name: Tipo de revestimento da caixa de fagote
      description: Indica a estrutura de proteção da caixa (macia, rígida ou híbrida).
    bassoon_keywork_material:
      name: Material das chaves do fagote
      description: Material e/ou revestimento utilizado para o mecanismo de chaves
        do fagote (chaves e equipamento mecânico).
    bassoon_model_level:
      name: Nível do modelo de fagote
      description: Indica o nível de dificuldade recomendado para o fagote.
    bassoon_performance_level:
      name: Nível de desempenho do fagote
      description: Indica o nível de dificuldade pretendido para o modelo de fagote.
    bassoon_reed_scrape_style:
      name: Estilo de raspagem da palheta do fagote
      description: Indica o estilo de raspagem/perfil da palheta do fagote.
    bassoon_reed_thread_color:
      name: Cor da rosca da palheta de fagote
      description: Cor da rosca de fixação utilizada na palheta.
    bassoon_reed_type:
      name: Tipo de palheta de fagote
      description: Especifica o subtipo de palheta de fagote para o qual o produto
        é adequado (quando aplicável).
    bassoon_system:
      name: Sistema de fagote
      description: Identifica o sistema de chaves/tradição de design do fagote utilizado
        pelo instrumento.
    bat_construction:
      name: Construção do taco
      description: Indica a quantidade de peças distintas ou secções unidas que compõem
        o corpo do taco (por exemplo, peça única, duas peças, híbrido), afetando a
        flexibilidade, o controlo da vibração e o desempenho global.
    bat_handle_size_compatibility:
      name: Compatibilidade de tamanho do punho do taco
      description: Indica o(s) tamanho(s) do identificador do taco de críquete para
        o qual o punho foi concebido.
    bath_book_interactive_features:
      name: Recursos interativos do livro de banho
      description: Funcionalidades de brincadeira/aprendizagem integradas no livro
        de banho.
    bath_bubble_machine_features:
      name: Características da máquina de bolhas de banho
      description: Principais funcionalidades da máquina de bolhas de banho, para
        além da básica produção de bolhas.
    bath_crayon_features:
      name: Características do lápis de banho
      description: Principais características funcionais/de segurança dos lápis de
        banho.
    bath_squirter_spray_pattern:
      name: Padrão de jato de banheira
      description: Descreve como o esguicho de banheira liberta água (o padrão de
        saída) quando pressionado ou ativado.
    bath_toy_molded_drain_design:
      name: Brinquedo de banho com design de ralo moldado
      description: Indica se o brinquedo foi concebido para drenar/secar de forma
        a reduzir a retenção de água.
    bath_toy_water_play_function:
      name: Função do brinquedo de banho para brincar na água
      description: Identifica o principal mecanismo de interação/brincadeira com água
        do brinquedo.
    baton_size_standard:
      name: Tamanho padrão do bastão
      description: Classificação do tamanho do bastão de estafeta na competição (júnior
        ou sénior).
    battery_case_certification_standard:
      name: Certificação/norma da caixa de bateria
      description: Lista as certificações ou normas de ensaio de transporte/segurança
        relevantes que a caixa cumpre para o transporte/armazenamento de baterias.
    battery_case_interior_padding_material:
      name: Material de preenchimento interno da caixa para bateria
      description: Especifica o principal material de amortecimento/revestimento utilizado
        no interior da caixa (se aplicável).
    battery_configuration:
      name: Configuração da bateria
      description: Indica o esquema/forma física da embalagem (fator de forma) para
        que os utilizadores possam adaptar a bateria ao espaço limitado do compartimento
        em réplicas específicas de Airsoft.
    battery_group_size:
      name: Tamanho do grupo de baterias
      description: Caixa de bateria de tamanho normalizada (por exemplo, BCI grupo
        24F, H6) utilizada para instalação em muitos veículos.
    battery_polarity:
      name: Polaridade da bateria
      description: Especifica a polaridade/orientação do terminal (posição do terminal
        positivo), que é uma restrição fundamental de encaixe para muitas baterias
        automóveis e de veículos de desporto motorizado.
    battery_standards_supported:
      name: Normas de bateria suportados
      description: Especifica os padrões de classificação da bateria que o dispositivo
        de teste suporta ao testar o desempenho ou a saúde da bateria durante o arranque.
    battery_voltage_class:
      name: Classe de tensão da bateria
      description: 'Classe de tensão comum para o conjunto de baterias de veículos
        elétricos, utilizada para filtragem rápida (p. p. ex.: sistemas de 400 V versus
        sistemas de 800 V).'
    batting_cage_components_included:
      name: Componentes da gaiola de rebatidas incluídos
      description: Lista as peças individuais fornecidas com o produto para que os
        compradores possam confirmar se está incluído um sistema completo ou peças
        de substituição específicas.
    batting_helmet_accessories_included:
      name: Acessórios para capacete de batedor incluídos
      description: Lista os acessórios de proteção ou cosméticos incluídos no pacote
        do capacete de batedor.
    batting_stuffing_form_factor:
      name: Fator de forma de rebatida e recheio
      description: Identifica se o produto é vendido como enchimento solto, folhas,
        rolos, peças pré-cortadas ou formatos predefinidos.
    batting_stuffing_loft_level:
      name: Rebatida e enchimento ao nível do loft
      description: Indica o loft/altura do enchimento (volume/altura relativa), normalmente
        utilizado para acolchoamento e seleção do preenchimento.
    batting_stuffing_thermal_insulation_level:
      name: Rebatida e enchimento ao nível de isolamento térmico
      description: Desempenho relativo de aquecimento/isolamento do enchimento utilizado
        em colchas, casacos e mantas.
    batting_tee_base_design:
      name: Design da base do tee para batimento
      description: Descreve o estilo ou a construção da base do tee, que influencia
        a estabilidade e os tipos de superfícies de jogo para as quais é adequado.
    battle_top_arena_stadium_compatibility:
      name: Compatibilidade com arenas/estádios de batalha de alto nível
      description: Indica com que sistema de arena/estádio o produto foi concebido
        para ser utilizado (especialmente para conjuntos ou formas especiais de arena).
    battle_top_items_included:
      name: Itens do pião de batalha incluídos
      description: 'Especifica os artigos do pião de batalha que estão incluídos no
        pacote (p. ex.: pião, lançador, estádio/arena, corda de lançamento, peças
        de substituição).'
    battle_top_performance_type:
      name: Tipo de desempenho do pião de batalha
      description: Descreve o estilo geral de desempenho do pião de batalha, refletindo
        normalmente o seu comportamento na arena (agressivo versus focado na resistência,
        etc.).
    bayan_included_accessories:
      name: Acessórios incluídos com o bayan
      description: Acessórios incluídos com o bayan (na caixa).
    bayan_tuning_system_type:
      name: Tipo de sistema de ajuste do bayan
      description: Como o bayan é tensionado/afinado (estilo de construção), o que
        influencia a portabilidade e facilidade de afinação.
    bb_gun_action_type:
      name: Tipo de ação de arma de pressão
      description: 'Indica o mecanismo mecânico de carga ou ciclo da arma de pressão
        (p. ex.: ação por alavanca, bombagem, basculante).'
    bb_gun_caliber:
      name: Calibre da arma de pressão
      description: Define o diâmetro das esferas de aço que a arma foi concebida para
        disparar, garantindo a compatibilidade da munição.
    bb_gun_part_type:
      name: Tipo de peça para arma de pressão
      description: 'Classifica o componente ou acessório específico concebido para
        armas de pressão, permitindo aos compradores localizar rapidamente a peça
        exata de substituição, atualização ou suplemento (p. ex.: cano, vedante do
        pistão, carregador rápido).'
    beach_ball_features:
      name: Características da bola de praia
      description: Características funcionais assinaláveis específicas das bolas de
        praia.
    beach_bucket_features:
      name: Características do balde de praia
      description: Características funcionais do balde de praia que afetam a utilização,
        a durabilidade e a praticidade.
    beach_sand_toy_items_included:
      name: Itens do brinquedo de praia e areia incluídos
      description: Peças adicionais para brincar na praia/areia incluídas com o balde
        (se vendido como um conjunto).
    bead_breaker_type:
      name: Tipo quebra-contas
      description: Tipo/design do mecanismo de quebra de contas.
    bead_hole_style:
      name: Estilo de orifício de conta
      description: Especifica o estilo ou a configuração do orifício/ranhura na conta,
        o que afeta a forma como esta se ajusta ao gancho ou à linha.
    bead_type:
      name: Tipo de conta
      description: Tipo(s) principal(is) de contas exigido(s) pelo padrão.
    bead_type_patch_embellishment:
      name: Tipo de conta (enfeite de aplique)
      description: Tipo principal de contas utilizadas na superfície do aplique.
    beaded_accessory_project_type:
      name: Tipo de projeto de acessório com contas
      description: O acessório criado pelo padrão.
    beading_needle_flexibility:
      name: Flexibilidade da agulha de contas
      description: Flexibilidade relativa da haste da agulha para passar por caminhos
        estreitos em trabalhos com contas.
    beading_pattern_bead_size:
      name: Tamanho da conta do padrão de missangas
      description: Tamanho(s) de missangas recomendado(s) especificado(s) no padrão
        (normalmente tamanhos de missangas pequenas, por exemplo, 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formato de gráfico de padrões de missangas
      description: Como o padrão é representado visualmente (por exemplo, gráfico
        versus fotos passo a passo).
    beading_pattern_stitch_technique:
      name: Ponto/técnica do padrão de missangas
      description: Ponto ou técnica principal de tecelagem de missangas utilizada
        no padrão.
    beading_technique_stitch:
      name: Técnica de bordado com missangas/ponto
      description: 'Identifica a principal técnica de bordado ou ponto utilizado no
        padrão (p. ex.: ponto peyote, ponto tijolo).'
    beading_thread_fiber_type:
      name: Tipo de fibra do fio de missangas
      description: Especifica o subtipo de fibra/material do fio de missangas (mais
        específico do que o material genérico) relevante para o desempenho.
    beading_thread_size:
      name: Tamanho do fio para trabalhos com miçangas
      description: Indica a etiqueta de tamanho do fabricante/indústria utilizada
        para fio de missangas (marca/linha específica), como por exemplo tamanho D
        ou 00.
    beading_thread_use_case:
      name: Caso de utilização do fio de missangas
      description: Identifica a principal utilização recomendada para o fio de missangas,
        ajudando os compradores a escolher o produto certo para o seu projeto.
    beading_wire_coating_material:
      name: Material de revestimento de arame para missangas
      description: Especifica o material de revestimento exterior do fio de missangas
        (se existir), que afeta o toque, a durabilidade e a resistência às dobras.
    beading_wire_strand_count:
      name: Contagem de fios do arame para missangas
      description: Indica o número de fios num arame de missangas multifilamento (por
        exemplo, 7 fios, 19 fios, 49 fios), o que afeta a flexibilidade e o caimento.
    beadlock_type:
      name: Tipo Beadlock
      description: Indica se a roda é do tipo beadlock e qual o estilo (útil para
        compradores de veículos todo-o-terreno/UTV).
    beam_material:
      name: Material da viga
      description: Material principal da viga/haste (frequentemente diferente das
        cabeças/acessórios).
    beam_pattern:
      name: Padrão de feixe
      description: Padrão de distribuição da luz emitida para iluminação de condução/fora
        de estrada.
    bean_bag_fabric_material:
      name: Material do tecido do pufe
      description: Identifica o tecido exterior utilizado nos pufes fornecidos com
        o conjunto.
    bean_paste_variety:
      name: Variedade de pasta de feijão
      description: Classifica o tipo específico de pasta de feijão com base no método
        de produção ou no ingrediente principal.
    bean_preparation:
      name: Preparação de feijão
      description: Indica como os grãos são preparados ou processados antes da venda
        (por exemplo, vagens inteiras, descascados, picados, germinados).
    bean_variety:
      name: Variedade de feijão
      description: 'Especifica a variedade botânica ou de mercado dos feijões (p.
        ex.: feijão verde, edamame, feijão-de-metro).'
    beanie_style:
      name: Estilo de gorro
      description: Especifica o design geral, a construção ou a silhueta do gorro
        para que os compradores possam escolher rapidamente entre as variações mais
        comuns.
    bearing_clearance:
      name: Folga do rolamento
      description: Indica a classe de folga radial interna do rolamento (quantidade
        de folga interna); a classe C0 é também conhecida por CN ou folga normal.
    bearing_construction_type:
      name: Tipo de construção do rolamento
      description: Identifica o tipo de design ou estilo de construção do rolamento
        utilizado no cubo (por exemplo, cartucho, esferas soltas).
    bearing_edge_type:
      name: Tipo de extremidade do rolamento
      description: Tipo/perfil da aresta de contacto do casco, que influencia o ataque
        e a sustentação.
    bearing_lubrication:
      name: Lubrificação de rolamentos
      description: Indica o tipo de lubrificante aplicado no rolamento durante o fabrico,
        como por exemplo, massa lubrificante ou óleo.
    bearing_material:
      name: Material do rolamento
      description: Identifica o material de construção do rolamento (p. ex., aço,
        híbrido de cerâmica), ajudando os ciclistas a escolher entre opções de durabilidade,
        custo e desempenho.
    bearing_rating:
      name: Classificação do rolamento
      description: Especifica a tolerância do rolamento ou a classe de desempenho
        utilizada nos patins (por exemplo, ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Código do vedante do rolamento
      description: Indica o tipo de vedante utilizado no rolamento, que afeta a durabilidade
        e a resistência ao rolamento.
    bearing_seal_type:
      name: Tipo de vedante do rolamento
      description: Especifica o design de vedação ou blindagem que protege os componentes
        internos do rolamento contra contaminantes e afeta o arrasto (por exemplo,
        2RS, ZZ, LLU, aberto).
    bearing_shield_type:
      name: Tipo de proteção do rolamento
      description: Tipo de blindagem ou vedante que protege os componentes internos
        do rolamento.
    bearing_size_code:
      name: Código de tamanho do rolamento
      description: 'Designação normalizada de rolamentos (p. ex.: 608, 688) que combina
        o diâmetro interior, o diâmetro exterior e a largura.'
    bearing_type:
      name: Tipo de rolamento
      description: Especifica o estilo de construção dos rolamentos utilizados no
        conjunto de direção.
    beater_head_material:
      name: Material da cabeça do beater
      description: Especifica o material de contacto/cabeça de um batedor de bombo
        (por exemplo, feltro, madeira, borracha).
    beaters_included:
      name: Batedores incluídos
      description: Especifica os batedores incluídos/instalados com o pedal de bateria
        (por exemplo, batedor simples ou duplo), ou se não está incluído nenhum batedor.
    bed_base_type:
      name: Tipo de base da cama
      description: 'Define o estilo estrutural da base da cama ou do divã (p. ex.:
        estrado, ripas flexíveis, ajustável).'
    bed_storage_type:
      name: Tipo de arrumação da cama
      description: Define o mecanismo de armazenamento integrado da estrutura da cama.
    bedroom_furniture_items_included:
      name: Móveis de quarto incluídos
      description: 'Especifica as peças individual de mobiliário que compõem o conjunto
        de quarto (p. ex.: cama, cómoda, mesas de cabeceira), permitindo aos compradores
        ver rapidamente o que está incluído sem ter de ler descrições longas.'
    bedroom_vanity_items_included:
      name: Itens de toucador de quarto incluídos
      description: 'A lista de artigos individual fornecidos com um conjunto de toucador
        para quarto permite aos clientes saber exatamente o que vai ser entregue (p.
        ex.: espelho, banqueta, kit de iluminação).'
    beer_based_cocktail_variety:
      name: Variedade de cocktail à base de cerveja
      description: Classifica os cocktails à base de cerveja pela sua variedade específica,
        por exemplo, Radler, Shandy, Michelada.
    beet_variety:
      name: Variedade de beterraba
      description: 'Especifica a cultivar ou variedade de beterraba, ajudando os compradores
        a identificar o sabor, a cor e as utilizações culinárias (p. ex.: vermelha,
        dourada, Chioggia).'
    bell_actuation_mechanism:
      name: Mecanismo de acionamento da campainha
      description: Especifica a ação do utilizador necessária para tocar a campainha,
        ajudando os compradores a escolher a ergonomia preferida.
    bell_guard_coverage_area:
      name: Área de cobertura da proteção de sino
      description: Indica a parte do sino que a proteção foi concebida para proteger.
    bell_material:
      name: Material da campainha
      description: Material do componente da campânula (se especificado separadamente
        do material geral do instrumento).
    bellhousing_bolt_pattern:
      name: Padrão de parafusos da carcaça da embraiagem
      description: Especifica a norma ou família de normas de parafusos da carcaça
        da embraiagem/lado do motor que a caixa interior da transmissão utiliza.
    bellows_material:
      name: Material do fole
      description: Material do corpo/revestimento do fole (se incluído).
    bellows_orientation:
      name: Orientação do fole
      description: Indica a configuração do fole utilizada para fornecer ar aos tubos.
    belly_panel_style:
      name: Estilo de painel abdominal
      description: Descreve a construção do cós ou painel abdominal que acomoda uma
        barriga em crescimento.
    belt_buckle_type:
      name: Tipo de fivela de cinto
      description: Descreve o mecanismo ou design específico da fivela utilizada no
        cinto.
    beret_style:
      name: Estilo de boina
      description: Identifica o modelo específico da boina ou a sua variante cultural.
    berry_species:
      name: Espécies de bagas
      description: Indica a espécie de baga contida no produto para que os compradores
        possam filtrar rapidamente a baga pretendida.
    beta_casein_variant:
      name: Variante beta-caseína
      description: Especifica a variante da proteína beta-caseína (por exemplo, A2)
        que está presente no leite para os consumidores com preocupações relativas
        à digestibilidade.
    beverage_sweetness_level:
      name: Nível de doçura da bebida
      description: Classifica a bebida de acordo com o grau de doçura ou açúcar adicionado.
    bezel_graduation_units:
      name: Unidades de graduação do aro
      description: Especifica as marcações das unidades no aro rotativo (graus, mils
        ou escala dupla).
    bicycle_brake_set_components_included:
      name: Conjunto de componentes de travão de bicicleta incluído
      description: A lista inclui as peças individual fornecidas no kit para que os
        compradores saibam exatamente o que está incluído e possam comparar diferentes
        configurações de pacotes.
    bicycle_cage_mounting_position:
      name: Posição de montagem do suporte de garrafas para bicicleta
      description: Especifica em que parte da bicicleta o suporte para garrafas foi
        concebido para ser instalado.
    bicycle_computer_mount_placement:
      name: Posicionamento do suporte para computador de bicicleta
      description: Identifica o local de instalação do suporte do ciclocomputador
        na bicicleta, como por exemplo, na parte frontal do guiador ou na tampa superior
        da mesa.
    bicycle_folding_mechanism:
      name: Mecanismo de dobragem da bicicleta
      description: 'Especifica o sistema de dobragem mecânica utilizado no quadro
        da bicicleta (p. ex.: dobragem ao meio, dobragem vertical).'
    bicycle_frame_design:
      name: Design do quadro de bicicleta
      description: Especifica o estilo geral do quadro de uma bicicleta, afetando
        a acessibilidade, a capacidade de carga e o armazenamento.
    bicycle_frame_style:
      name: Estilo de quadro de bicicleta
      description: Descreve o estilo estrutural do quadro da bicicleta (step-through,
        lowrider, chopper stretch, etc.), que afeta a postura do ciclista e a estética.
    bicycle_handlebar_type:
      name: Tipo de guiador da bicicleta
      description: Identifica o estilo ou a geometria específica do guiador, ajudando
        os ciclistas a selecionar guiadores adequados à sua posição de condução e
        modalidade.
    bicycle_headset_configuration:
      name: Configuração da direção de bicicleta
      description: 'Indica o estilo estrutural ou padrão do conjunto de direção da
        bicicleta de acordo com a disposição das suas caixas de direção (p. ex.: External
        Cup, ZeroStack, Integrated, Threaded).'
    bicycle_hub_type:
      name: Tipo de cubo da bicicleta
      description: Descreve o mecanismo de cubo fornecido com a roda, que afeta a
        compatibilidade com a transmissão e o estilo de condução.
    bicycle_lock_security_certification:
      name: Certificação de segurança de cadeado para bicicleta
      description: 'Certificação de terceiros independente que valida o desempenho
        anti-roubo (p. ex.: Sold Secure, ART, Varefakta).'
    bicycle_pedal_type:
      name: Tipo de pedal de bicicleta
      description: Especifica o estilo ou design geral de funcionamento do pedal,
        como plataforma, encaixe ou híbrido, ajudando os ciclistas a escolher a interface
        certa para o seu estilo de pedalada.
    bicycle_propulsion_type:
      name: Tipo de propulsão da bicleta
      description: Especifica a forma como a bicicleta é propulsionada, como por exemplo,
        por pedalada manual, assistência elétrica ou motor de combustão interna.
    bicycle_pump_type:
      name: Tipo de bomba da bicicleta
      description: Identifica o estilo estrutural da bomba, ajudando os compradores
        a escolher o modelo mais adequado às suas necessidades de pedalada, armazenamento
        ou emergência.
    bicycle_rack_mounting_type:
      name: Tipo de montagem de suporte para bicicleta
      description: Descreve o método principal ou localização utilizado para fixar
        o suporte à bicicleta, auxiliando os utilizadores na confirmação da compatibilidade
        com o seu Frame e equipamento.
    bicycle_suspension_type:
      name: Tipo de suspensão da bicicleta
      description: Identifica a presença e a configuração da suspensão na bicicleta.
    bicycle_tire_tread_pattern:
      name: Padrão de piso de pneu de bicicleta
      description: Especifica o estilo do piso do pneu, que influencia a tração e
        a resistência ao rolamento em diferentes superfícies.
    bidirectional_charging_capability:
      name: Capacidade de carregamento bidirecional
      description: Indica se o veículo elétrico suporta modos de carregamento bidirecionais
        como V2G e/ou V2H.
    bike_rack_mounting_style:
      name: Tipo de montagem do suporte para bicicletas
      description: Como a bicicleta é apoiada/fixada pelo suporte.
    bike_rack_tilt_function:
      name: Função de inclinação do suporte para bicicletas
      description: Se existe alguma função de inclinação que permita o acesso à zona
        de carga traseira com o suporte instalado.
    bikini_top_style:
      name: Estilo da parte de cima do biquíni
      description: Especifica o design ou corte da parte superior do biquíni, ajudando
        os compradores a encontrar os modelos e silhuetas preferidos.
    billiard_brush_type:
      name: Tipo de escova de bilhar
      description: 'Define o tipo específico de ferramenta de limpeza de mesas de
        bilhar (p. ex.: escova de mesa, escova de bordo, bloco de polimento).'
    billiard_glove_finger_coverage:
      name: Cobertura dos dedos da luva de bilhar
      description: Identifica os dedos que estão cobertos pelo design da luva, proporcionando
        uma filtragem precisa para estilos de luvas específicos para bilhar.
    billiard_pocket_style:
      name: Estilo de bolso de bilhar
      description: Especifica o estilo estrutural ou estético do bolso, que influencia
        a compatibilidade e a decoração da mesa.
    billiard_rack_style:
      name: Estilo estante de bilhar
      description: 'Descreve o estilo físico ou mecanismo da estante (p. ex.: estrutura
        tradicional, modelo de folha, dobrável).'
    billiard_table_type:
      name: Tipo de mesa de bilhar
      description: Especifica a modalidade de jogo de bilhar ou o estilo de utilização
        para o qual a mesa foi concebida (por exemplo, bilhar, snooker, carambola).
    billiards_discipline:
      name: Disciplina de bilhar
      description: Indica a variação específica do jogo de bilhar (tipo de jogo) para
        a qual o produto foi concebido ou com a qual é compatível.
    binding_compatibility_standard:
      name: Norma de compatibilidade de encadernação
      description: Identifica a interface de fixação (norma da sola) para a qual a
        bota de esqui está certificada, garantindo um emparelhamento seguro e correto
        com as fixações de esqui.
    binding_inclusion:
      name: Inclusão vinculativa
      description: Especifica se os esquis são vendidos desmontados, com sistema integrado
        ou com fixações separadas incluídas.
    binding_interface:
      name: Interface de ligação
      description: Indica o padrão da placa de fixação ou interface com a qual os
        esquis vêm pré-montados ou com a qual são compatíveis, garantindo a compatibilidade
        entre bota e fixação.
    binding_liner_type:
      name: Tipo de revestimento de fixação
      description: Descreve o tipo de forro interior utilizado na fixação/bota (por
        exemplo, amovível, transitável a pé, termomoldável).
    binding_mounting_system:
      name: Sistema de montagem de fixação
      description: Identifica a interface utilizada para fixar a fixação ao esqui
        (montagem plana, calha/encaixe, placa, etc.).
    binding_position:
      name: Posição da fixação
      description: 'Indica a posição ou configuração de montagem pretendida para a
        fixação (p. ex.: bota dianteira, bota traseira, ARTP).'
    binding_strap_position:
      name: Posição da pega de fixação
      description: Especifica o local na fixação onde a correia deve ser instalada.
    bingo_components_included:
      name: Componentes do bingo incluídos
      description: Lista os componentes incluídos no conjunto de bingo, como bolas
        de bingo, cartão e marcadores.
    bingo_number_range:
      name: Intervalo de números do bingo
      description: Identifica o intervalo/variante de números de bingo suportado pelo
        conjunto.
    bingo_set_features:
      name: Características do conjunto de bingo
      description: Identifica o formato principal do produto do conjunto de bingo
        (físico/manual ou eletrónico/interativo).
    bipod_mounting_interface:
      name: Interface de montagem do bipé
      description: Especifica a interface de fixação utilizada para ligar o bipé à
        arma de fogo ou ao sistema de calhas.
    bit_attachment_type:
      name: Tipo de fixação do freio
      description: Especifica a forma como a cabeçada se liga ao travão (por exemplo,
        terminais de amarração, terminais de fivela, terminais de parafuso Chicago).
    bit_mouthpiece_design:
      name: Design do bocal de bit
      description: Identifica o estilo estrutural ou a configuração articular do bocal,
        que determina a distribuição da pressão, a inclinação do palato e a severidade
        geral.
    bit_ring_style:
      name: Estilo de anel de bit
      description: Define o estilo da argola ou da haste do freio que se fixa à cabeçada,
        que influencia a ação, a orientação lateral e a sensibilidade das rédeas.
    bladder_material:
      name: Material da câmara de ar
      description: Identifica o material utilizado na câmara de ar interior.
    blade_attachment_type:
      name: Tipo de fixação da lâmina
      description: Identifica se o patim utiliza um mecanismo de encaixe (articulado)
        ou uma montagem de lâmina fixa.
    blade_finish_coating:
      name: Acabamento/revestimento da lâmina
      description: Tratamento da superfície aplicado na lâmina para estética ou proteção
        contra a corrosão.
    blade_hosel_type:
      name: Tipo de encaixe da lâmina
      description: Especifica o estilo de encaixe da lâmina no cabo, afetando a compatibilidade
        (por exemplo, standard ou cónico).
    blade_length_type:
      name: Tipo de comprimento da lâmina
      description: Classifica o comprimento da lâmina da barbatana como curto, médio
        ou longo, que influencia a cadência da pernada e os objetivos do treino.
    blade_lie:
      name: Base da lâmina
      description: Especifica o número de base da lâmina do taco de hóquei, indicando
        como a lâmina se posiciona no gelo em relação ao cabo.
    blade_sharpness:
      name: Afiação da lâmina
      description: Indica se a lâmina da arma está afiada ou romba para fins de treino.
    blade_size_category:
      name: Categoria de tamanho da lâmina
      description: Código de tamanho da lâmina de sabre internacional padronizado
        (0–5) utilizado para distinguir lâminas para jovens e adultos.
    blade_size_class:
      name: Classe de tamanho da lâmina
      description: Classifica a lâmina de acordo com as convenções de tamanho do jogador,
        combinando tamanhos de cabo como Juvenil, Júnior, Intermédio ou Sénior.
    blade_size_number:
      name: Número de tamanho da lâmina
      description: Código de tamanho numérico padrão (0–5) definido pelos regulamentos
        de esgrima que determina o comprimento da lâmina e a elegibilidade do grupo
        etário.
    blaster_mechanism:
      name: Mecanismo de disparo
      description: 'Define o mecanismo de funcionamento interno do lançador de gel
        (p. ex.: GBB, AEG, mola).'
    block_edge_style:
      name: Estilo de borda em bloco
      description: Descreve como as bordas/cantos dos blocos de madeira são acabados
        para proporcionar uma sensação agradável ao toque e maior segurança.
    blocking_mat_features:
      name: Características dos tapetes de bloqueio
      description: Características funcionais específicas dos tapetes de bloqueio
        (armazenamento, portabilidade, usabilidade).
    blocking_mat_grid_unit:
      name: Unidade de grelha do tapete de bloqueio
      description: O sistema de unidades utilizado na grelha impressa ajuda os utilizadores
        a combinar padrões e medidas.
    blocking_mat_surface_markings:
      name: Marcações na superfície do tapete de bloqueio
      description: Tipo de marcações de medição/guia impressas ou moldadas na superfície
        do tapete.
    blocking_wire_coating:
      name: Revestimento do fio de bloqueio
      description: Configuração da superfície de teste/revestimento no fio de bloqueio
        que afeta a resistência à corrosão, a suavidade e o risco de enroscamento.
    blocking_wire_end_cap_type:
      name: Tipo de tampa de extremidade de fio de bloqueio
      description: Especifica o tipo de proteção/acabamento utilizado nas extremidades
        dos fios de bloqueio para segurança e proteção do tecido.
    blocking_wire_set_includes:
      name: O conjunto de fios de bloqueio inclui
      description: 'Especifica os componentes incluídos no produto de bloqueio de
        fios (p. ex.: pinos T-marcado, tubo de armazenamento).'
    blocking_wire_usage:
      name: Utilização do fio de bloqueio
      description: Caso de utilização principal para o qual o fio de bloqueio foi
        concebido.
    bloom_stage:
      name: Fase de floração
      description: Indica o grau de abertura das margaridas no momento da entrega/envio.
    blower_motor_bearing_type:
      name: Tipo de rolamento do motor do ventilador
      description: Especifica o design do rolamento utilizado no motor do ventilador.
    blower_motor_mounting_position:
      name: Posição de montagem do motor do ventilador
      description: 'Localização do motor do ventilador no módulo AVAC/veículo (p.
        ex.: dianteiro, traseiro).'
    blowpipe_valve_type:
      name: Tipo de válvula de sopro
      description: Especifica o tipo de válvula de sopro incluída (se existir).
    bo_staff_style:
      name: Estilo de bastão de Bō
      description: Define o estilo estrutural ou a construção do bastão (por exemplo,
        reto, afunilado, acolchoado com espuma, dobrável).
    board_game_theme:
      name: Tema do jogo de tabuleiro
      description: Tema da narrativa/definições do jogo de tabuleiro (utilizado para
        descoberta e exploração).
    board_rail_shape:
      name: Forma do rebordo da prancha
      description: Especifica o contorno das extremidades da prancha (por exemplo,
        macias, rígidas, 50/50) que influencia a aderência e a condução na onda.
    board_size_classification:
      name: Classificação do tamanho da placa
      description: Classifica o tabuleiro ou o conjunto de cornhole em tamanhos normalizados
        comuns.
    board_type_compatibility:
      name: Compatibilidade do tipo de placa
      description: Especifica o tipo de prancha para a qual a guia foi concebida.
    boat_construction_type:
      name: Tipo de construção do barco
      description: 'Descreve o estilo ou formato estrutural do barco a remos (p. ex.:
        insuflável, rígido).'
    boat_hook_flotation:
      name: Flutuação do gancho do barco
      description: Indica se o gancho para barcos foi concebido para flutuar caso
        caia na água.
    boat_ladder_stowage_style:
      name: Estilo de armazenamento da escada do barco
      description: Descreve como a escada pode ser guardada quando não está a ser
        utilizada (por exemplo, dobrável, retrátil, amovível).
    boat_trailer_construction_type:
      name: Tipo de construção de reboque para barco
      description: Indica se o reboque auxilia o barco com postos de amarração, roletes
        ou um sistema híbrido.
    boat_weaving_shuttle_weft_exit_type:
      name: Tipo de saída de trama da lançadeira para tecelagem tipo barco
      description: Como o fio da trama sai da lançadeira durante a tecelagem.
    bobbin_loading_type:
      name: Tipo de carregamento da bobina
      description: Especifica a forma como a bobina é inserida/carregada na máquina
        de costura.
    bobbin_system:
      name: Sistema de bobina
      description: Sistema/tipo de carregamento da bobina utilizado pela máquina de
        costura.
    bobbin_type:
      name: Tipo de bobina
      description: Especifica o formato do transportador de fios que a lançadeira
        foi concebida para utilizar (ou inclui), o que determina a compatibilidade
        e a utilização típica (por exemplo, as lançadeiras tipo barco utilizam frequentemente
        bobinas; as lançadeiras de retalhos podem ser abertas para suportar tiras).
    bobbin_winder_winding_direction:
      name: Direção de enrolamento do enrolador de bobina
      description: Especifica o sentido de enrolamento/rotação suportado pelo enrolador
        de bobina.
    bobble_mechanism:
      name: Mecanismo de oscilação
      description: Especifica o estilo do mecanismo de oscilação, que influencia o
        movimento e a durabilidade.
    bocal_material:
      name: Material do bocal
      description: Especifica o material do(s) bocal(is) incluído(s).
    bodhr_n_head_material:
      name: Material da cabeça do bodhrán
      description: O material da pele de reprodução (membrana), que influencia fortemente
        o timbre e os requisitos de manutenção.
    bodhr_n_tuning_system_type:
      name: Tipo de sistema de afinação do bodhrán
      description: O tipo de mecanismo de afinação integrado utilizado para ajustar
        a tensão da pele (se for ajustável).
    body_armor_coverage_area:
      name: Área de cobertura da armadura corporal
      description: Indica as zonas do corpo que o produto protege.
    body_armor_intended_use:
      name: Uso pretendido da armadura corporal
      description: Especifica o principal cenário de condução ou utilização para o
        qual a armadura corporal para ATV/UTV foi concebida.
    body_cord_connector_style:
      name: Estilo do conector do cabo do corpo
      description: Descreve a configuração do conector nas extremidades do cabo (por
        exemplo, número de pinos ou estilo baioneta) que determina a compatibilidade
        com armas e caixas de pontuação.
    body_panel_finish_state:
      name: Estado de acabamento do painel da carroçaria
      description: Descreve o estado de preparação/acabamento da superfície do painel
        lateral, tal como vendido, para pintura/instalação.
    body_shape:
      name: Forma do corpo
      description: Especifica a forma/estilo geral do corpo da guitarra elétrica.
    bodysuit_bottom_coverage:
      name: Cobertura da parte inferior do body
      description: Define o corte e a cobertura da parte inferior do body, o que influencia
        o conforto e a compatibilidade com o conjunto.
    boilie_shape:
      name: Forma dos boilies
      description: Identifica a forma dos boilies produzidas pela mesa de rolamento,
        permitindo aos pescadores escolher entre diferentes perfis de isco.
    boilie_stop_buoyancy:
      name: Flutuabilidade do bloqueio de boilie
      description: Especifica se o bloqueio boilie foi concebido para flutuar, afundar
        ou permanecer com flutuabilidade neutra, afetando a apresentação do isco na
        coluna de água.
    bok_choy_variety:
      name: Variedade de pak choy
      description: Especifica o cultivar, o nome de mercado ou a variedade de pak
        choy (por exemplo, Baby, Shanghai, Nai Bai, Tatsoi, roxo Lady), permitindo
        aos compradores selecionar o sabor, o tamanho e o aspeto desejados.
    bolt_drive_style:
      name: Estilo de encaixe do parafuso
      description: Especifica o tipo de encaixe dos parafusos de montagem do skate,
        distinguindo entre os tipos comuns de cabeça/chave, como Allen ou Phillips.
    bone_content:
      name: Conteúdo ósseo
      description: Especifica se a carne contém ossos.
    bongo_center_block_material:
      name: Material do bloco central do bongo
      description: Material do bloco central que liga as duas conchas do bongo (se
        aplicável).
    bongo_shell_material:
      name: Material da concha do bongo
      description: Material das conchas dos bongos (corpos dos tambores), excluindo
        as peles e acessórios.
    bongo_tuning_system:
      name: Sistema de afinação do bongo
      description: 'Como os bongos são afinados/construídos para afinação (p. ex.:
        afinação tradicional com parafusos de afinação versus afinação com corda),
        o que influencia a manutenção e a autenticidade.'
    boning_type:
      name: Tipo de varas
      description: Identifica o sistema de suporte estrutural dentro da cinta modeladora,
        que combina o material e o estilo/forma das barbatanas utilizadas, que influencia
        diretamente o nível de suporte, a flexibilidade e a durabilidade.
    boot_liner_type:
      name: Tipo de forro da bota
      description: Descreve a capacidade de construção ou personalização do forro
        interior da bota de snowboard (por exemplo, moldável a quente, removível).
    boot_sole_compatibility:
      name: Compatibilidade da sola da bota
      description: Lista as normas da sola da bota ou os sistemas de interface que
        a fixação aceita.
    boot_support_level:
      name: Nível de suporte da bota
      description: Descreve a classificação geral de rigidez/suporte do tornozelo
        ou da bota proporcionada pelo patim.
    boot_width_code:
      name: Código de largura da bota
      description: 'Designação de largura baseada em letras, utilizada pelo fabricante,
        especificamente para o dimensionamento de patins de patinagem artística (p.
        ex.: AAA, AA, B, C, D).'
    booth_configuration:
      name: Configuração do stand
      description: Identifica a configuração geral dos assentos da cabine (por exemplo,
        de um lado só, de canto, modular).
    bootie_toe_design:
      name: Design da biqueira da bota
      description: Identifica o estilo de construção da biqueira das botas de surf
        e das botas de recife.
    border_type:
      name: Tipo de rebordo
      description: Acabamento do rebordo/estilo da moldura do aplique bordado (afeta
        a aparência, a resistência ao desgaste e a qualidade percebida).
    bore_cleaner_format:
      name: Formato do limpador de canos
      description: Indica o formato físico do produto de limpeza de canos (ferramenta
        ou consumível).
    bore_cleaner_safe_for_finish:
      name: Limpador de canos seguro para acabamento
      description: Indica com que acabamentos comuns de instrumentos de metal o produto
        de limpeza de canos pode ser utilizado com segurança.
    bottle_cage_loading_direction:
      name: Direção de carregamento do suporte para garrafas
      description: Descreve a direção a partir da qual uma garrafa é inserida ou retirada
        da gaiola.
    bottle_neck_finish_closure_size:
      name: Acabamento/tamanho de abertura do gargalo da garrafa
      description: O tamanho normalizado do acabamento/abertura do gargalo da garrafa
        garante a compatibilidade com tampas, rolhas e arrolhadores (por exemplo,
        acabamento de coroa de 26 mm).
    bottle_style:
      name: Estilo de garrafa
      description: Formatos comuns de garrafas utilizadas no fabrico caseiro de cerveja
        e vinho.
    bottom_bracket_interface:
      name: Interface do eixo pedaleiro
      description: Identifica o padrão do eixo/movimento central para o qual o pedaleiro
        foi concebido, garantindo a compatibilidade com o quadro e o eixo pedaleiro.
    bottom_bracket_standard:
      name: Padrão do eixo pedaleiro
      description: A caixa/interface do eixo pedaleiro é suportada pelo quadro, determinando
        a compatibilidade do pedaleiro.
    bottom_type_suitability:
      name: Adequação do tipo de fundo
      description: Especifica as condições do leito marinho para as quais a âncora
        foi concebida, para uma melhor fixação.
    bounce_level:
      name: Nível de ressalto
      description: Indica o quanto a bola ressalta à queda ou ao lance, ajudando os
        utilizadores a escolher a bola correta para exercícios como lançamentos na
        parede ou slams.
    bouncy_ball_surface_finish:
      name: Acabamento da superfície da bola saltitante
      description: Especifica o acabamento tátil e/ou visual da superfície de uma
        bola saltitante (por exemplo, lisa, áspera, com brilhantes).
    boundary_marker_type:
      name: Tipo de marcador de limite
      description: 'Define a forma física do marcador ou produto de marcação do limite
        do campo ou do campo (p. ex.: cone, fita, tinta, stencil, máquina).'
    bouquet_size_tier:
      name: Nível de tamanho do bouquet
      description: Tamanho normalizado para o bouquet/ramo, independentemente do número
        de hastes (útil quando se utilizam hastes mistas).
    bow_and_yo_yo_edge_finish:
      name: Acabamento com laço e rebordo em ioiô
      description: Descreve o acabamento/recorte utilizado no laço/ioiô (especialmente
        para laços feitos com fita).
    bow_case_shell_type:
      name: Tipo de estrutura do estojo do arco
      description: 'Descreve a construção estrutural da caixa exterior do arco (p.
        ex.: casco rígido versus caixa interior flexível).'
    bow_compatibility:
      name: Compatibilidade do arco
      description: Especifica o tipo de arco para o qual a ponta de flecha está destinada
        ou classificada.
    bow_hair_color:
      name: Cor do cabelo do laço
      description: 'Identifica a cor/aparência do pelo utilizado no arco de um instrumento
        de cordas orquestral (p. ex.: branco/descolorado, branco natural, preto).'
    bow_stick_material:
      name: Material da haste do arco
      description: Identifica o material utilizado na vareta do arco (a haste principal),
        que influencia fortemente o peso, a sensação de toque e o preço.
    bow_type:
      name: Tipo de arco
      description: Especifica o design estrutural do arco juvenil (por exemplo, composto,
        recurvo, arco longo), que influencia fortemente o estilo de tiro, os acessórios
        necessários e os programas de treino.
    bow_winding_material:
      name: Material para enrolamento de arco
      description: Especifica o material utilizado para o enrolamento/envolvimento
        do arco, que influencia a pega e o equilíbrio.
    bow_yo_yo_embellishment_style:
      name: Estilo de enfeite de laço/iô-iô
      description: Identifica o estilo de construção do enfeite (laço ou estrutura
        em ioiô de tecido).
    bowling_ball_core_type:
      name: Tipo de núcleo da bola de bowling
      description: Identifica o design interno do núcleo ou a simetria da bola de
        bowling, que influencia o movimento da bola e o seu potencial de curva.
    bowling_ball_coverstock_type:
      name: Tipo de revestimento da bola de bowling
      description: Especifica o material ou a tecnologia da camada exterior da bola
        de bowling, que determina a tração e o potencial de curva.
    bowling_set_style:
      name: Estilo de conjunto de bowling
      description: Define o estilo geral ou a utilização da caixa interior do conjunto
        de bowling.
    box_lid_type:
      name: Tipo de tampa de caixa
      description: Tipo de tampa/mecanismo de abertura utilizado pela caixa ou lata
        para presente.
    box_spring_profile:
      name: Perfil do estrado de molas
      description: Classifica a altura total do estrado em categorias de perfil fáceis
        de utilizar para os compradores (por exemplo, perfil baixo, padrão, perfil
        alto), para que os clientes possam filtrar rapidamente sem terem de saber
        as medidas exatas.
    box_spring_requirement:
      name: Requisitos do estrado de molas
      description: Indica se é necessário um estrado ou uma base adicional para o
        colchão.
    boxing_ring_style:
      name: Estilo de ringue de boxe
      description: Classifica o estilo geral de construção ou o cenário de utilização
        pretendida do ringue (por exemplo, competição versus treino, elevado versus
        no solo).
    bra_length_type:
      name: Tipo de comprimento do sutiã
      description: Define a classificação do comprimento dos soutiens com base na
        cobertura vertical, como padrão, comprido, midi ou cropped.
    bra_padding_type:
      name: Tipo de preenchimento do soutien
      description: Descreve o nível ou presença de preenchimento nas copas.
    braces_compatibility:
      name: Compatibilidade do aparelho ortodôntico
      description: Especifica se o protetor bucal pode ser utilizado com aparelho
        ortodôntico e em que medida.
    brake_band_form:
      name: Forma da cinta de travão
      description: Indica se a cinta de travão é fornecida como um laço contínuo (sem
        fim) ou como um comprimento cortado que deve ser fixado.
    brake_band_material_type:
      name: Tipo de material da cinta de travão
      description: Especifica o material funcional da cinta de travão (por exemplo,
        corda de algodão, linha de nylon ou aço mola), que influencia a durabilidade,
        a aderência, a elasticidade e o ruído.
    brake_band_style:
      name: Estilo da cinta de travão
      description: Especifica o sistema/estilo de tensão da cinta de travão utilizado
        numa roda de fiar para aplicar tensão no volante/bobine.
    brake_bleeding_method:
      name: Método de purga de travões
      description: Abordagem de purga suportada pelo kit.
    brake_booster_assist_type:
      name: Tipo de assistência do servofreio
      description: Indica o mecanismo de assistência utilizado pelo servofreio.
    brake_booster_diaphragm_configuration:
      name: Configuração do diafragma do servofreio
      description: Indica o número/tipo de diafragmas utilizados no servofreio.
    brake_caliper_bleeder_screw_position:
      name: Posição do parafuso de purga da pinça de travão
      description: Especifica a posição do parafuso de purga na pinça de travão quando
        instalado (utilizado para verificar se o parafuso de purga está orientado
        no ponto mais alto para uma purga adequada).
    brake_caliper_finish:
      name: Acabamento da pinça de travão
      description: Especifica o acabamento superficial ou o revestimento protetor
        aplicado no corpo da pinça de travão (por exemplo, pintura, galvanização,
        anodização).
    brake_caliper_included_hardware:
      name: Acessórios incluídos na pinça de travão
      description: Especifica o que está incluído no conjunto da pinça de travão.
    brake_caliper_mount_type:
      name: Tipo de montagem da pinça de travão
      description: Tipo de interface de montagem utilizada para fixar a pinça ao pivô/suporte.
    brake_caliper_paint_base_chemistry:
      name: Química da base da tinta para pinças de travão
      description: O sistema de tinta/resina ou família química utilizada.
    brake_caliper_paint_kit_contents:
      name: Conteúdo do kit de pintura para pinças de travão
      description: Indica o que está incluído na embalagem, para além da própria tinta.
    brake_circuit_type:
      name: Tipo de circuito de travagem
      description: Configuração do circuito hidráulico suportada pelo cilindro principal.
    brake_clutch_fluid_base_chemistry:
      name: Composição química do fluido de travões/embraiagem
      description: Base química primária do líquido hidráulico dos travões/embraiagem,
        que afeta a compatibilidade e a miscibilidade.
    brake_clutch_fluid_dot_specification:
      name: Especificação DOT do fluido dos travões/embraiagem
      description: 'Classificação de desempenho DOT para fluidos hidráulicos de travões/embraiagem
        (p. ex.: DOT 3, DOT 4).'
    brake_drum_finish_coating:
      name: Acabamento/revestimento do tambor de travão
      description: 'Acabamento superficial ou revestimento protetor aplicado no tambor
        de travão (p. ex.: eletroforese, pintura, revestimento de zinco).'
    brake_drum_type:
      name: Tipo de tambor de travão
      description: Tipo de design do tambor de travão (com ou sem cubo/rolamento integrado).
    brake_fluid_base:
      name: Base do líquido de travões
      description: Especifica a formulação do fluido dos travões hidráulicos necessário
        ou incluído.
    brake_fluid_base_chemistry:
      name: Química básica do fluido dos travões
      description: Define a base química do fluido dos travões, que determina a compatibilidade
        e as regras de mistura.
    brake_fluid_dot_specification:
      name: Especificação DOT do líquido dos travões
      description: 'Indica a classificação/especificação DOT do fluido dos travões
        (p. ex.: DOT 3, DOT 4) para produtos relacionados com fluidos de travões.'
    brake_fluid_standards_compliance:
      name: Conformidade com as normas de fluido dos travões
      description: Normas da indústria que o fluido dos travões alega cumprir (para
        além da classificação DOT).
    brake_fluid_type:
      name: Tipo de fluido dos travões
      description: Especifica o fluido dos travões necessário para as pinças de travão
        hidráulicas de bicicletas.
    brake_hose_end_fitting_type:
      name: Tipo de ligação final da mangueira de travão
      description: 'Estilo de ligação em cada extremidade da mangueira de travão (p.
        ex.: banjo, alargado, rosca fêmea/macho), utilizada para garantir a compatibilidade
        com as pinças/tubagens.'
    brake_lever_pull_type:
      name: Tipo de alavanca de travão
      description: Define a relação de tração do cabo/mecânica para a qual a alavanca
        foi concebida, garantindo a compatibilidade com pinças de travão específicas
        (por exemplo, travões de disco de tração curta versus travões V-brake de tração
        longa).
    brake_light_switch_actuation_type:
      name: Tipo de acionamento do interruptor da luz de travão
      description: Identifica os eventos físicos que acionam o interruptor (pedal/êmbolo
        versus pressão hidráulica, etc.).
    brake_light_switch_connector_type:
      name: Tipo de conector do interruptor da luz de travão
      description: Especifica o estilo/formato do conector elétrico utilizado pelo
        interruptor da luz de travagem para se ligar ao chicote do veículo.
    brake_light_switch_contact_type:
      name: Tipo de contacto do interruptor da luz de travão
      description: Configuração/comportamento do contacto elétrico do interruptor
        da luz de travagem (por exemplo, normalmente aberto/fechado, reversível ou
        multicircuito).
    brake_light_switch_mounting_style:
      name: Estilo de montagem do interruptor da luz de travagem
      description: Como o interruptor da luz de travagem está montado/instalado no
        veículo ou no sistema de travagem (por exemplo, rosca, encaixe, suporte, parafuso
        banjo).
    brake_master_cylinder_mounting_type:
      name: Tipo de montagem do cilindro principal do travão
      description: Como o cilindro principal está montado no veículo/servofreio (padrão
        de parafusos/estilo de flange).
    brake_master_cylinder_reservoir_type:
      name: Tipo de reservatório do cilindro mestre do travão
      description: Tipo/configuração do reservatório do fluido dos travões fornecido
        ou exigido pelo cilindro principal.
    brake_mount_type:
      name: Tipo de suporte do travão
      description: Identifica a interface de travagem integrada no garfo para que
        os ciclistas possam confirmar a compatibilidade do sistema de travagem.
    brake_mounting_flange_bolt_pattern:
      name: Padrão de furação do flange de montagem do travão
      description: 'Especifica o padrão de furos/parafusos do flange de montagem utilizado
        para fixar a placa de apoio do travão ou o suporte da pinça ao eixo do reboque
        (p. ex.: 4 parafusos).'
    brake_pad_backing_plate_material:
      name: Material da placa de suporte da pastilha de travão
      description: Especifica o material da placa de suporte da pastilha de travão,
        que afeta a dissipação de calor e o peso.
    brake_pad_compatible_rotor_type:
      name: Tipo de rotor compatível com pastilha de travão
      description: Especifica o tipo de superfície do rotor/disco para o qual a pastilha
        foi concebida.
    brake_pad_compound:
      name: Composto da pastilha de travão
      description: Identifica a fórmula do material de fricção de uma pastilha de
        travão.
    brake_pad_form_factor:
      name: Fator de forma da pastilha de travão
      description: Especifica o sistema de travagem/formato para o qual a pastilha
        foi concebida (por exemplo, disco, tambor, travão de estacionamento).
    brake_pad_material:
      name: Material da pastilha de travão
      description: Especifica a família de compostos/materiais de fricção utilizados
        no revestimento das pastilhas de travão.
    brake_pad_shim_included:
      name: Calço para pastilha de travão incluído
      description: Indica se as placas de redução de ruído estão incluídas ou pré-instaladas.
    brake_pad_wear_indicator_type:
      name: Tipo de indicador de desgaste da pastilha de travão
      description: Indica o tipo de indicador de desgaste incluído com as pastilhas
        de travão (por exemplo, separador mecânico de ruído ou sensor eletrónico).
    brake_position:
      name: Posição de travagem
      description: Indica o local no veículo onde deve ser instalado o componente
        de travagem.
    brake_rotor_mount_type:
      name: Tipo de suporte do disco do travão
      description: Define a interface utilizada para fixar um rotor de travão ao cubo
        (se aplicável).
    brake_service_kit_components_included:
      name: Componentes do kit de manutenção dos travões incluídos
      description: Lista das ferramentas/adaptadores/consumíveis incluídos no kit
        de manutenção dos travões.
    brake_shoe_friction_material:
      name: Material de fricção da sapata de travão
      description: O composto de fricção/revestimento utilizado na sapata de travão
        (o material que entra em contacto com o tambor).
    brake_shoe_set_contents:
      name: Conteúdo do conjunto de sapatas de travão
      description: 'O que está incluído no pacote (p. ex.: apenas calçado vs. calçado
        e equipamento/molas).'
    brake_system_type:
      name: Tipo de sistema de travagem
      description: Especifica a tecnologia do mecanismo de travagem utilizada para
        controlar a rotação do carreto durante o lançamento.
    brake_type:
      name: Tipo de travão
      description: Tipo de mecanismo de travagem/tensionamento do feixe de teia.
    brandy_age_classification:
      name: Classificação do brandy por idade
      description: Classifica o brandy utilizando designações de qualidade/idade padrão
        da indústria (por exemplo, VS, VSOP, XO) que refletem os requisitos mínimos
        de envelhecimento.
    brass_cleaning_tool_type:
      name: Tipo de ferramenta de limpeza de latão
      description: Especifica o tipo de ferramenta utilizada para limpar ou fazer
        a manutenção de instrumentos de sopro de latão.
    brass_instrument_application_area:
      name: Área de aplicações para instrumentos de sopro
      description: A(s) parte(s) do instrumento metálico em que o spray desinfetante
        deve ser utilizado.
    brass_instrument_care_kit_purpose:
      name: Finalidade do kit de cuidados para instrumentos de sopro
      description: Descreve o cenário de utilização pretendido para o kit (manutenção
        de rotina, limpeza profunda, viagens/emergências, kit inicial para estudantes,
        etc.).
    brass_instrument_case_shell_material:
      name: Material de concha interna da caixa de instrumentos de latão
      description: Material principal da estrutura rígida/quadro (quando aplicável),
        separado do material geral da bolsa/caixa.
    brass_instrument_lubricant_additives_features:
      name: Aditivos/características dos lubrificantes para instrumentos de sopro
        de metal
      description: Características funcionais principais da formulação do lubrificante.
    brass_instrument_lubricant_base_composition:
      name: Composição base do lubrificante para instrumentos de sopro de metal
      description: Base/composição química primária de lubrificantes utilizada em
        instrumentos de sopro de metal.
    brass_instrument_lubricant_viscosity_grade:
      name: Grau de viscosidade do lubrificante para instrumentos de latão
      description: Espessura relativa/fluxo do lubrificante destinado aos instrumentos
        de sopro de metal.
    brass_instrument_replacement_part_type:
      name: Tipo de peça de substituição para instrumentos de sopro
      description: Especifica o tipo de peça de substituição para instrumentos de
        sopro de metal (componentes de válvulas/deslizadores/chaves de água, cortiças/feltros,
        protetores, etc.).
    brass_instrument_valve_configuration:
      name: Configuração de válvula do instrumento de latão
      description: Como o instrumento altera a afinação (mecanismo de válvulas/deslizante).
    brass_lubricant_application_area:
      name: Área de aplicação do lubrificante para instrumentos de sopro
      description: O lubrificante destina-se ao mecanismo do instrumento de latão.
    brass_mouthpiece_backbore:
      name: Bocal backbore de latão
      description: Perfil/categoria do backbore do bocal (forma/tamanho do backbore),
        que influencia o timbre e a entoação.
    brass_mouthpiece_cup_depth:
      name: Profundidade da cúpula do bocal em latão
      description: Classificação da profundidade da cúpula do bocal (quão profunda
        é a cúpula), que afeta o timbre e a resposta.
    brass_polishing_cloth_abrasiveness_level:
      name: Nível de abrasividade do pano de polimento em latão
      description: Indica o quão agressivo é o pano na remoção de manchas em comparação
        com a suavidade do brilho.
    bread_crumb_base_ingredient:
      name: Ingrediente base de pão ralado
      description: Indica o ingrediente principal a partir do qual são feitas as migalhas,
        como o trigo, o arroz, a pele de porco ou a amêndoa.
    bread_variety:
      name: Variedade de pão
      description: 'Especifica o estilo ou variedade de pão ou pãezinhos, ajudando
        os compradores a localizar tipos específicos (p. ex.: brioche, baguete, naan).'
    breadstick_style:
      name: Estilo de palito de pão
      description: Identifica o estilo ou formato tradicional específico do palito
        de pão.
    bridge_head_material:
      name: Material da cabeça da ponte
      description: Material utilizado exclusivamente no suporte para cabeças de taco,
        que influencia o peso, a sensação e a durabilidade.
    bridge_head_type:
      name: Tipo de suporte para cabeças de taco
      description: Identifica o estilo de suporte para cabeças de taco, ajudando os
        compradores a escolher a forma de apoio da sua preferência.
    bridle_part_type:
      name: Tipo de peça do bridão
      description: Identifica o componente específico do bridão que o item de substituição
        representa, ajudando os clientes a encontrar a peça exata de que necessitam.
    bridle_style:
      name: Estilo de bridão
      description: Classifica o estilo geral ou a construção do bridão para que os
        cavaleiros possam localizar rapidamente o equipamento adequado às suas necessidades
        ou disciplina.
    broadhead_field_point_attachment_style:
      name: Estilo de fixação da ponta larga/de campo
      description: Especifica a forma como a ponta larga ou ponta de campo se fixa
        à haste da flecha.
    broadhead_thread_size:
      name: Tamanho do fio para ponta larga
      description: Lista as especificações do fio utilizado para fixar a ponta larga
        ou a ponta de campo à haste ou ao inserto da flecha.
    broadhead_tip_type:
      name: Tipo de ponta de flecha
      description: Define o estilo da ponta/férrula da ponta larga que inicia a penetração,
        que influencia o desempenho nas diferentes modalidades de caça.
    broccoli_cut:
      name: Corte dos brócolos
      description: Especifica como o brócolo foi cortado ou preparado antes da embalagem
        (por exemplo, cabeça inteira, floretes, picado).
    broccoli_variety:
      name: Variedade de brócolo
      description: 'Identifica a cultivar específica ou variedade de mercado do brócolo
        (p. ex.: Tenderstem, Romanesco).'
    broom_head_material:
      name: Material da cabeça da vassoura
      description: Especifica a composição do material da cabeça da vassoura, que
        influencia a durabilidade e as características de jogo.
    brush_format:
      name: Formato da escova
      description: Indica o formato físico de uma escova para esqui ou snowboard,
        distinguindo entre blocos manuais e formatos rotativos acionados por berbequim,
        como cilindros de lã ou feltro rotativos.
    brush_shape:
      name: Forma da escova
      description: Especifica a forma física ou o perfil do corpo ou da cabeça da
        escova, que influencia a área de contacto e o manuseio.
    brussel_sprout_preparation:
      name: Preparação de couve de Bruxelas
      description: Descreve a preparação física ou o estilo de corte das couves de
        Bruxelas fornecidas.
    brussels_sprout_variety:
      name: Variedade da couve de Bruxelas
      description: Especifica a cultivar ou variedade da couve de Bruxelas, abrangendo
        as variedades atuais e futuras.
    bubble_blower_features:
      name: Características do soprador de bolas de sabão
      description: Enumera as características funcionais comuns dos sopradores de
        bolas de sabão.
    bubble_gun_bubble_output_modes:
      name: Modos de saída de bolas da pistola de bolas de sabão
      description: Especifica os modos de funcionamento da pistola de bolas de sabão,
        como bola simples, contínua ou definições de múltiplas velocidades.
    bubble_machine_features:
      name: Características da máquina de bolas de sabão
      description: Destaca as funcionalidades comuns das máquinas de bolas de sabão,
        para além do funcionamento básico.
    bubble_machine_items_included:
      name: Itens incluídos da máquina de bolas de sabão
      description: 'Lista os principais itens incluídos na caixa (p. ex.: solução
        para bolas de sabão, varinhas extra, pega de transporte, comando).'
    bubble_output_rate:
      name: Taxa de produção de bolas
      description: Indica a taxa aproximada/qualitativa de produção de bolas para
        um soprador de bolas de sabão (por exemplo, baixa/média/alta), incluindo se
        a produção é variável.
    bubble_solution_container_type:
      name: Tipo de recipiente para solução de bolas de sabão
      description: Especifica a forma como a solução para bolhas de sabão é fornecida/utilizada
        com a pistola de bolhas (por exemplo, reservatório interno, frasco acoplado,
        tabuleiro/recipiente separado).
    bubble_toy_included_accessories:
      name: Brinquedo de bolas de sabão com acessórios incluídos
      description: 'Lista os itens comuns incluídos com o brinquedo de bolhas de sabão
        (p. ex.: frasco de solução, tabuleiro, varetas de substituição).'
    buckwheat_processing_method:
      name: Método de processamento do trigo sarraceno
      description: Descreve o processamento aplicado ao trigo sarraceno antes da venda
        (por exemplo, torrado, germinado, expandido).
    buckwheat_product_form:
      name: Forma do produto de trigo sarraceno
      description: 'Apresentação física específica do trigo sarraceno, abrangendo
        formas não abrangidas pela lista genérica (p. ex.: flocos, tufos, saquetas
        instantâneas).'
    bug_collecting_kit_items_included:
      name: Itens incluídos no kit de recolha de insetos
      description: Ferramentas e materiais educativos incluídos num kit de recolha
        de insetos.
    built_in_storage_type:
      name: Tipo de armazenamento integrado
      description: Identifica os tipos de armazenamento incorporados na estrutura
        do beliche (por exemplo, gavetas, prateleiras, arrumação na escada).
    bumper_finish:
      name: Acabamento de para-choques
      description: Especifica o revestimento ou acabamento superficial aplicado no
        para-choques.
    bumper_sensor_cutouts:
      name: Recortes para sensores de para-choques
      description: Indica as aberturas/recortes de assistência OEM que o para-choques
        inclui ou suporta.
    bunk_bed_configuration:
      name: Configuração de beliche
      description: Indica a combinação do esquema estrutural e do tamanho do colchão
        do beliche.
    buoyancy:
      name: Flutuabilidade
      description: Indica o comportamento de flutuabilidade do isco ou do chamariz
        na coluna de água, como flutuar, afundar ou ficar em suspensão.
    burkini_pieces_included:
      name: Peças de burkini incluídas
      description: A lista de componentes da peça de roupa fornecida no conjunto burkini
        permite que os clientes saibam exatamente o que estão a comprar.
    burn_rate:
      name: Taxa de queima
      description: Descreve a rapidez com que o papel de enrolar queima depois de
        aceso.
    bus_model_type:
      name: Tipo de modelo de autocarro
      description: Identifica a configuração/tipo de autocarro real representado pelo
        modelo de expansão (classe de carroçaria/utilização).
    bust_design:
      name: Design de busto
      description: Descreve a configuração da zona do busto e a cobertura do decote
        do body (por exemplo, busto aberto, soutien embutido, decote profundo).
    butter_variety:
      name: Variedade de manteiga
      description: Especifica o estilo de produção ou o tipo distintivo da manteiga,
        como a manteiga de cultura, a manteiga de creme doce, a manteiga de estilo
        europeu, a manteiga clarificada (ghee) ou a manteiga de soro de leite.
    buttermilk_variety:
      name: Variedade de leitelho
      description: Identifica o estilo ou formato específico do leitelho que está
        a ser vendido (por exemplo, cultivado, tradicional, em pó).
    button_application:
      name: Aplicação do botão
      description: 'Indica a aplicação ou tipo de projeto pretendido para o botão
        (p. ex.: vestuário, estofos).'
    button_attachment_type:
      name: Tipo de fixação do botão
      description: Especifica a construção do botão para o fixar ao tecido (por exemplo,
        orifícios para costura versus haste), e não o estilo de fecho.
    button_finish:
      name: Acabamento do botão
      description: 'Descreve o acabamento/aspeto da superfície do botão (p. ex.: mate
        ou brilhante).'
    buttonhole_elastic_application:
      name: Aplicação elástica para casa de botão
      description: Utilização/aplicação principal pretendida para o elástico decorativo
        dobrável.
    cab_type:
      name: Tipo de cabina
      description: Especifica a configuração da cabine do camião.
    cabasa_construction_type:
      name: Tipo de construção cabasa
      description: Especifica a construção física/estilo do corpo da cabasa e do conjunto
        corrente/contas.
    cabbage_variety:
      name: Variedade de repolho
      description: 'Identifica a cultivar ou tipo de couve (p. ex.: verde, napa, savoy)
        para que os compradores possam filtrar por sabor, textura e uso culinário.'
    cabinet_door_style:
      name: Estilo de porta de armário
      description: Identifica o design visual do painel da porta do armário, como
        o estilo Shaker ou o painel em relevo, para ajudar a combinar com a estética
        da cozinha.
    cabinet_overlay_type:
      name: Tipo de sobreposição de armário
      description: Especifica a forma como as portas se sobrepõem ou se posicionam
        em relação à estrutura do armário.
    cable_end_type:
      name: Tipo de extremidade do cabo
      description: Descreve o forma ou estilo do terminal ou encaixe do cabo que se
        liga às alavancas de travão ou de mudanças.
    cable_housing_construction:
      name: Construção de alojamento de cabos
      description: Descreve o design estrutural do alojamento — como enrolamento em
        espiral, sem compressão ou ligação segmentada — que influencia a resistência
        à compressão, a flexibilidade e a sensação de avanço.
    cable_housing_liner_type:
      name: Tipo de revestimento do alojamento de cabos
      description: Indica se o alojamento inclui um revestimento interior e/ou sistema
        de lubrificação, bem como o material ou tecnologia utilizada, que afeta a
        redução do atrito e a resistência às intempéries.
    cable_management_type:
      name: Tipo de organização de cabos
      description: Especifica o tipo de características integradas de gestão de cabos
        ou de energia que a mesa de conferência proporciona.
    cable_surface_treatment:
      name: Tratamento da superfície do cabo
      description: Identifica qualquer revestimento ou acabamento especial aplicado
        no cabo para reduzir o atrito ou protegê-lo da corrosão.
    cabochon_back_type:
      name: Tipo de verso do cabochão
      description: Indica o perfil/acabamento da parte traseira do cabochão, o que
        afeta as definições/métodos de colagem e a compatibilidade.
    cacao_bean_variety:
      name: Variedade de grãos de cacau
      description: Especifica a variedade botânica ou cultivar do grão de cacau utilizado.
    cacao_roast_level:
      name: Nível de torrefação do cacau
      description: Descreve o grau de torrefação do cacau antes da moagem.
    cage_package_type:
      name: Tipo de embalagem da jaula
      description: 'Define os componentes incluídos na compra (p. ex.: apenas a rede,
        kit de estrutura, pacote completo).'
    cajon_body_shell_material:
      name: Material do corpo/concha do cajon
      description: Identifica o material do corpo/revestimento do cajon (excluindo
        a tapa).
    cajon_corner_control_system:
      name: Sistema de controlo de canto do cajon
      description: Especifica se o ajuste sonoro do canto de assistência do cajon
        (por exemplo, parafusos de canto) altera a resposta do tapa.
    cajon_corner_edge_design:
      name: Design de canto/rebordo do cajon
      description: Descreve a construção dos cantos/rebordas que afeta o conforto
        e a reprodução.
    cajon_feet_type:
      name: Tipo de pés do cajon
      description: Especifica o tipo de pés do cajon, que influenciam a estabilidade
        e a ressonância.
    cajon_snare_adjustability:
      name: Ajuste da caixa do cajon
      description: Indica se e como o efeito de captura pode ser ajustado (tensão,
        engate ou ambos).
    cajon_snare_system_type:
      name: Tipo de sistema de caixa do cajon
      description: Especifica o mecanismo de caixa interno utilizado para criar o
        efeito de caixa.
    cake_shape:
      name: Forma do bolo
      description: Descreve a forma física como o bolo de café é cozido.
    cake_topping:
      name: Cobertura do bolo
      description: Identifica a cobertura ou acabamento principal aplicado no bolo
        de café.
    cake_type:
      name: Tipo de bolo
      description: 'Descreve o estilo ou tipo de bolo (p. ex.: bolo inglês, pão de
        ló, cheesecake).'
    caliper_mount_type:
      name: Tipo de montagem da pinça
      description: Define o padrão de interface da estrutura ou do garfo que a pinça
        de travão utiliza (por exemplo, Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Padrão de montagem da pinça
      description: Especifica a interface/padrão de montagem (por exemplo, Flat Mount,
        Post Mount, IS, etc.) utilizada para fixar a pinça de travão ao quadro ou
        ao garfo da bicicleta.
    camera_mounting_location_vehicle_exterior:
      name: Localização de montagem da câmara (exterior do veículo)
      description: 'Local onde a(s) câmara(s) será(ão) instalada(s) no veículo (p.
        ex.: grelha frontal, traseira, espelhos retrovisores laterais).'
    camouflage_environment_type:
      name: Tipo de ambiente de camuflagem
      description: Indica o ambiente principal para o qual o padrão de camuflagem
        foi concebido, como a floresta, o deserto ou o pântano.
    camping_oil_application:
      name: Aplicação do óleo para campismo
      description: Especifica a utilização principal prevista do óleo no contexto
        de acampamento (por exemplo, combustível para lanterna versus combustível
        para fogão).
    camshaft_construction:
      name: Construção da árvore de cames
      description: Estilo de fabrico/em branco da árvore de cames.
    camshaft_material:
      name: Material da árvore de cames
      description: Material principal do núcleo/eixo da árvore de cames (material
        base).
    camshaft_position:
      name: Posição da árvore de cames
      description: Especifica a localização/tipo pretendido da árvore de cames dentro
        do motor (por exemplo, admissão ou escape, ou um banco/posição específica
        do motor).
    candle_container_type_included:
      name: Tipo de recipiente para vela incluído
      description: Especifica o tipo de recipiente(s) para a(s) vela(s) incluído(s)
        no kit, se existir(em).
    candle_dye_form:
      name: Forma de corante de vela
      description: Especifica a forma física do corante/ingrediente para velas utilizado
        no fabrico de velas.
    candle_fragrance_form:
      name: Fragrância de vela
      description: Especifica o tipo/forma do ingrediente de fragrância destinado
        ao fabrico de velas.
    candle_making_tool_type:
      name: Tipo de ferramenta para fabrico de velas
      description: 'Identifica o tipo de utensílio para fabrico de velas do produto
        (p. ex.: panela para verter cera, ferramenta para centralizar o pavio, termómetro).'
    candy_texture:
      name: Textura do doce
      description: Descreve a sensação na boca ou a consistência do doce, independentemente
        do sabor ou da forma.
    candying_method:
      name: Método de cristalização
      description: Descreve como a fruta foi cristalizada ou conservada com açúcar
        (por exemplo, cristalizada, glaceada, em calda).
    canned_meat_form:
      name: Forma da carne enlatada
      description: Classifica a forma processada ou a apresentação da carne no interior
        da embalagem.
    canoe_construction_type:
      name: Tipo de construção da canoa
      description: Diferencia os estilos de construção de cascos de canoas, como o
        casco rígido, insuflável e dobrável.
    canoe_hull_shape:
      name: Formas de casco de canoa
      description: Define a secção transversal principal do casco ou o perfil do fundo,
        que afeta a estabilidade e o manuseio.
    canoe_stern_design:
      name: Desenho da popa da canoa
      description: Define o estilo da popa do casco, o que afeta a compatibilidade
        e o manuseio do motor.
    canopy_type:
      name: Tipo de tenda para jardim
      description: Descreve o estilo do toldo ou cobertura incluída com a cama tipo
        cabana.
    canvas_compatible_media:
      name: Meio compatível com a tela
      description: Indica com que meio de artes e manualidades a tela se destina a
        ser utilizada.
    canvas_format:
      name: Formato de ecrã
      description: Indica se a tela imprimível é vendida em folhas, rolos ou painéis
        pré-cortados.
    canvas_mounting_format:
      name: Montagem/formato da tela
      description: Formato físico/estilo de montagem da tela de pintura.
    canvas_stretcher_assembly_type:
      name: Tipo de montagem do esticador de tela
      description: Se o esticador é vendido montada como uma moldura ou em barras/kit
        que requerem montagem.
    canvas_stretcher_corner_joint_type:
      name: Tipo de junta de canto do esticador de tela
      description: Como os cantos do esticador são unidos/construídos (por exemplo,
        encaixe de espiga e rasgo, junta de dedo, agrafados, com chaveta).
    canvas_surface_tone:
      name: Tom da superfície do ecrã
      description: 'Tom/cor base da superfície da tela preparada (base), e não qualquer
        desenho ou padrão impresso (p. ex.: branco, preto, tonalizado).'
    canvas_weave_type:
      name: Tipo de trama da tela
      description: Descreve a estrutura da trama da superfície da tela, que afeta
        a textura e o manuseio da tinta.
    cap_attachment_style:
      name: Tipo de fixação da tampa
      description: Especifica o estilo de construção/fixação da tampa do bocal de
        um saxofone, o que pode afetar a proteção e o encaixe na caixa.
    cap_construction:
      name: Confeção da touca
      description: Especifica a forma como a touca da peruca é construída (por exemplo,
        com frente de renda, renda completa, atada à mão), o que afeta o realismo,
        o conforto e a versatilidade dos penteados.
    cap_crown_structure:
      name: Estrutura da coroa da tampa
      description: Indica se a coroa do boné é estruturada (rígida) ou não estruturada
        (macia).
    cap_fit_type:
      name: Tipo de ajuste da touca
      description: 'Define a forma como o boné assenta ou se ajusta à cabeça do utilizador
        (p. ex.: ajustado versus regulável).'
    cap_seal_type:
      name: Tipo de vedação da tampa
      description: Especifica o componente de vedação utilizado para evitar fugas
        de óleo e escape de vapor (por exemplo, anel de vedação, junta).
    cap_size:
      name: Tamanho do boné
      description: Etiquetas de tamanho padrão que indicam o tamanho total da cabeça
        para o qual a touca da peruca é adequada.
    cap_type:
      name: Tipo de tampa
      description: Tipo de interface de tampa/fecho utilizada no tanque de transbordo.
    caper_size_grade:
      name: Grau de tamanho da alcaparra
      description: Classifica as alcaparras de acordo com os nomes de qualidade padrão
        da indústria que correspondem ao diâmetro do botão.
    capo_clamping_mechanism:
      name: Mecanismo de fixação do capo
      description: Especifica o tipo de mecanismo de fixação/acionamento utilizado
        para aplicar pressão nas cordas (como o capo é operado).
    capo_finish:
      name: Acabamento capo
      description: 'Acabamento da superfície do corpo do capo (visual/tátil), independentemente
        da cor (p. ex.: mate ou brilhante).'
    capo_fit_type:
      name: Tipo de ajuste do capo
      description: Especifica o perfil do braço do instrumento para o qual o capo
        foi concebido (incluindo raio/planura), o que afeta a fixação sem ruídos e
        a afinação.
    capo_pad_material:
      name: Material da almofada do capotraste
      description: Especifica o material da almofada de contacto que toca nas cordas/braço
        (afeta a aderência, a estabilidade da afinação e as possíveis marcas no acabamento).
    capo_tension_mechanism:
      name: Mecanismo de tensão do capo
      description: Especifica como a pressão/tensão é aplicada e ajustada nas cordas
        para o capo deslizante.
    capture_method:
      name: Método de captura
      description: Indica se a armadilha se destina à captura de animais vivos ou
        ao abate letal.
    car_ev_conversion_kit_motor_type:
      name: Tipo de motor do kit de conversão para veículos elétricos
      description: Especifica a tecnologia do motor de tração incluída ou exigida
        pelo kit de conversão (por exemplo, indução CA versus íman permanente).
    car_playset_items_included:
      name: Itens incluídos no conjunto de carrinhos de brinquedos
      description: 'Enumera os principais componentes incluídos no conjunto de carrinhos,
        para além da estrutura básica (p. ex.: carrinhos, figuras, placas).'
    car_shampoo_application_method:
      name: Método da aplicação de champô para automóveis
      description: Modo de utilização do champô durante a lavagem.
    car_wash_solution_form:
      name: Forma da solução de lavagem de automóveis
      description: 'Especifica a forma física da solução de lavagem de automóveis
        (p. ex.: líquida, espuma, toalhitas).'
    car_wash_solution_scent:
      name: Fragrância de solução para lavagem de automóveis
      description: Especifica a fragrância/aroma da solução de lavagem de automóveis
        (se existir fragrância).
    carbonated_water_variety:
      name: Variedade de água com gás
      description: Classifica a água gaseificada com base nas variedades e formulações
        comuns no mercado (por exemplo, tónica, água com gás, água com gás funcional).
    carbonation:
      name: Carbonatação
      description: Descreve o nível ou estilo de carbonatação da bebida (por exemplo,
        sem gás, ligeiramente gaseificada, gaseificada, nitro).
    carburetor_barrel_count:
      name: Contagem de cilindros do carburador
      description: Indica o número de furos/cilindros de desaceleração no carburador.
    carburetor_choke_type:
      name: Tipo de afogador do carburador
      description: Indica o tipo de acionamento do afogador utilizado pelo carburador.
    carburetor_mounting_flange_type:
      name: Tipo de flange de montagem do carburador
      description: Especifica o estilo da interface de montagem do carburador para
        garantir a compatibilidade com o coletor de admissão (por exemplo, encaixe
        tipo espigão versus flange/padrões de parafusos).
    card_binder_page_type:
      name: Tipo de página do dossier para cartas
      description: 'Para dossiers/portfólios: o estilo de páginas utilizado para armazenar
        cartas.'
    card_box_holder_type:
      name: Tipo de caixa/suporte para cartas
      description: Especifica o formato funcional do produto para recolher ou guardar
        cartas num evento (por exemplo, caixa, caixa tipo caixa de correio, cesto,
        suporte).
    card_game_accessory_features:
      name: Características de acessórios de jogos de cartas
      description: Características funcionais notáveis dos acessórios para jogos de
        cartas.
    card_lot_type:
      name: Tipo de lote de cartas
      description: Indica se o produto é um cartão único ou um lote/sortido de várias
        cartas.
    card_sleeve_size_format_compatibility:
      name: Tamanho do protetor de cartas/compatibilidade de formato
      description: Especifica o(s) tamanho(s) da(s) carta(s) para os quais as mangas/páginas/caixas
        de deck foram concebidas.
    carding_surface_pin_material:
      name: Material de pino da superfície de cardagem
      description: Material do pino/dentes marcados utilizados para desfiar e abrir
        a fibra.
    care_durability:
      name: Durabilidade do cuidado
      description: Indica as expetativas de durabilidade da etiqueta em relação à
        lavagem/calor após a aplicação.
    care_label_attachment_type:
      name: Tipo de fixação da etiqueta de cuidados
      description: 'Como deve ser aplicada a etiqueta de cuidados ao item (p. ex.:
        cosida, termocolante, adesiva).'
    care_label_format:
      name: Formato da etiqueta de cuidados
      description: O formato físico/impresso da etiqueta de cuidados do produto.
    care_label_symbol_system:
      name: Sistema de símbolos da etiqueta de cuidados
      description: 'O conjunto de normas/símbolos utilizado no etiqueta (p. ex.: símbolos
        de cuidado ISO, símbolos ASTM/EUA).'
    cargo_area_configuration:
      name: Configuração da área de carga
      description: Especifica o estilo estrutural ou a localização da área de carga
        numa bicicleta de carga (por exemplo, longtail, front loader, triciclo).
    cargo_net_adjustability:
      name: Ajuste da rede de carga
      description: Indica se e como a rede de carga pode ser ajustada em termos de
        tensão/encaixe.
    cargo_net_position:
      name: Posição da rede de carga
      description: Onde a rede deve ser montada no porta-bagagens/área de carga ou
        Functions.
    cargo_net_stretch_type:
      name: Tipo de elástico da rede de carga
      description: Se a rede de carga da bagageira é elástica/extensível ou fixa/não
        elástica.
    cargo_net_style:
      name: Estilo de rede de carga
      description: Especifica o estilo de construção ou o formato da rede de carga
        (por exemplo, corda elástica, fita, barreira, rede).
    cargo_rack_finish:
      name: Acabamento da estante de carga
      description: Acabamento/revestimento da superfície exterior do compartimento
        de carga.
    carpet_cleaner_application_method:
      name: Método da aplicação de limpeza de carpetes
      description: Especifica a forma pretendida de aplicação e integração do produto
        no tapete (para além da forma geral).
    carrier_style:
      name: Estilo de transportadora
      description: Mecanismo/tipo de transporte utilizado para auxiliar o barco a
        subir para o veículo.
    carrot_size:
      name: Tamanho da cenoura
      description: Classifica o tamanho geral do produto de cenoura.
    carrot_variety:
      name: Variedade de cenoura
      description: Identifica a variedade ou cultivar específica da cenoura.
    carrying_capacity_pairs_boards:
      name: Capacidade de carga (pares/pranchas)
      description: 'Indica quantos esquis (pares) ou pranchas de snowboard um acessório
        permite ou se destina a auxiliar quando utilizado com a estante (p. ex.: kits
        de extensão).'
    cartridge_thread_compatibility:
      name: Compatibilidade da rosca do cartucho
      description: Indica o padrão de rosca de um vaporizador ou assistência de bateria,
        garantindo que os cartuchos e as baterias são fisicamente compatíveis.
    case_capacity_butts_shafts:
      name: Capacidade da caixa (pontas × eixos)
      description: 'Define quantas bases e eixos de tacos a caixa interior pode acomodar,
        expressos no formato base por eixo (p. ex.: 2x4 = 2 bases e 4 eixos).'
    case_features:
      name: Características do estojo
      description: Destaca as características funcionais da caixa para pratos/bateria
        relacionadas com a proteção e o transporte.
    case_humidifier_refill_type:
      name: Tipo de recarga do humidificador de caixa
      description: Indica se o humidificador utiliza conteúdo multimédia reutilizável
        (reumedecível/regenerável) ou recargas descartáveis substituíveis.
    case_lining_material:
      name: Material do forro do estojo
      description: Identifica o material principal que reveste o interior de uma caixa
        ou bolsa, que entra em contacto com o instrumento ou conteúdo e o protege.
    case_material:
      name: Material da caixa
      description: Identifica o material principal da caixa do relógio, que influencia
        a durabilidade, o peso e a estética.
    case_mounting_method:
      name: Método de montagem da caixa
      description: Como o humidificador deve ser posicionado ou fixado dentro da caixa
        do instrumento.
    case_structure:
      name: Estrutura da caixa
      description: Indica a rigidez da construção da caixa.
    case_style_cymbal_drum:
      name: Estilo da caixa (pratos/bateria)
      description: Especifica se o produto é uma bolsa macia, uma caixa interior rígida
        ou um modelo híbrido para transportar pratos ou baterias.
    casing_material:
      name: Material da carcaça
      description: Identifica o tecido principal utilizado na carcaça do pneu, que
        influencia o peso, a sensação de deslocamento e a proteção contra furos.
    casino_set_chip_material:
      name: Material das fichas do conjunto de casino
      description: Material principal das fichas incluídas (se aplicável).
    casino_set_layout_included:
      name: Esquema do conjunto de casino incluído
      description: Especifica o tipo de superfície/esquema de jogo incluído no conjunto.
    cask_finish:
      name: Acabamento do casco
      description: Especifica o barril ou tonel utilizado para o acabamento ou maturação
        da bebida, como por exemplo um barril de bourbon ou um barril de xerez.
    cassava_variety:
      name: Variedade de mandioca
      description: Identifica a cultivar ou variedade específica de mandioca oferecida,
        que afeta o sabor, a textura e as propriedades culinárias.
    cassette_body_type:
      name: Tipo de corpo da cassete
      description: 'Padrão de freehub ou driver que o cubo ou a roda traseira aceitam
        (p. ex.: HG 11, XDR, Microspline).'
    cassette_deck_feature_set:
      name: Conjunto de recursos do leitor de cassetes
      description: Indica as funcionalidades de transporte e reprodução de cassetes
        comuns aos leitores de cassetes para o painel de um automóvel.
    cassette_speed_compatibility:
      name: Compatibilidade de velocidade da cassete
      description: 'Indica o número de velocidades (p. ex.: 7 velocidades, 12 velocidades)
        para as quais a cassete ou roda livre foi concebida, garantindo a compatibilidade
        com a corrente, o desviador e o desviador.'
    castanet_shell_size_class:
      name: Classe de tamanho da concha da castanhola
      description: Classificação de tamanho padronizada para conchas de castanholas,
        normalmente utilizada por músicos/professores para selecionar o ajuste e o
        timbre.
    castanets_included_pieces:
      name: Peças incluídas nas castanholas
      description: Indica o que está incluído na oferta do produto (par vs. único,
        mais extras).
    castanets_pitch:
      name: Tom das castanholas
      description: Indica a etiqueta de afinação/tamanho comum utilizada pelo fabricante
        para descrever o intervalo sonoro.
    castanets_type:
      name: Tipo de castanholas
      description: Especifica o estilo das castanholas ou a categoria de utilização
        pretendida.
    caster_type:
      name: Tipo de rodízio
      description: Identifica o tipo de rodízios ou rodas instalados no carrinho (por
        exemplo, giratórios, com bloqueio), informando sobre a manobrabilidade e a
        estabilidade.
    castle_playset_included_items:
      name: Itens incluídos no conjunto de castelo
      description: 'Capta os principais componentes incluídos no conjunto do castelo
        para que os compradores possam comparar os conjuntos (p. ex.: figuras, mobiliário,
        veículos, acessórios).'
    catcher_equipment_included:
      name: Equipamento de receptor incluído
      description: Especifica os componentes incluídos num conjunto de equipamento
        para o recetor, como um capacete ou um protetor de peito.
    catcher_helmet_style:
      name: Estilo de capacete de recetor
      description: Indica o estilo geral do design do capacete de proteção do recetor.
    cattle_breed:
      name: Raça bovina
      description: 'Identifica a raça bovina a partir da qual a carne foi obtida (p.
        ex.: Angus, Wagyu, Hereford).'
    cauliflower_variety:
      name: Variedade de couve-flor
      description: Identifica a cultivar, a cor ou a variedade especial da couve-flor
        que está a ser vendida.
    celery_form:
      name: Forma de aipo
      description: Especifica a forma física ou o estilo de corte em que o aipo é
        vendido.
    celery_variety:
      name: Variedade de aipo
      description: Regista a cultivar ou variedade específica de aipo, permitindo
        aos compradores selecionar por perfil de sabor, cor ou uso culinário.
    cereal_bar_texture:
      name: Textura da barra de cereais
      description: 'Descreve a sensação na boca e a consistência da barra de cereais
        (p. ex.: macia, crocante).'
    cereal_type:
      name: Tipo de cereal
      description: Classifica a forma ou o formato de cereais ou granola (flocos,
        tufos, aglomerados de granola, muesli, etc.) para ajudar os compradores a
        encontrar a textura ou o método de preparação preferido.
    certificate_border_style:
      name: Estilo de rebordo do certificado
      description: Descreve o tratamento do rebordo decorativo utilizada no certificado.
    certificate_personalization_type:
      name: Tipo de personalização do certificado
      description: Especifica como o certificado pode ser personalizado (em branco
        para escrita à mão, modelo imprimível, pré-impresso com campos variáveis,
        etc.).
    certification_service:
      name: Serviço de certificação
      description: Empresa externa de classificação/certificação (se aplicável).
    certification_standard:
      name: Norma de certificação
      description: Especifica a certificação de segurança e resistência ao fogo ou
        a norma de conformidade que a balaclava deve cumprir.
    chain_coating_finish:
      name: Revestimento/acabamento da corrente
      description: Especifica qualquer configuração de superfície ou acabamento aplicado
        à corrente para melhorar a durabilidade, reduzir o atrito, prevenir a corrosão
        ou alterar a aparência (por exemplo, nitrato de titânio, DLC, níquel, EPT
        anticorrosão).
    chain_connection_type:
      name: Tipo de ligação da corrente
      description: Especifica o método de fecho fornecido ou necessário para unir
        as extremidades da corrente.
    chain_tier_configuration:
      name: Configuração dos níveis da corrente
      description: Especifica o número/disposição de camadas da corrente no conjunto
        de captação (camada simples, dupla ou tripla).
    chain_tool_type:
      name: Tipo de ferramenta de corrente
      description: Classifica o tipo específico de ferramenta para a corrente de bicicleta
        para que os compradores possam encontrar rapidamente o dispositivo correto.
    chainring_shape:
      name: Forma dos pratos de pedaleira
      description: Indica a forma dos pratos de pedaleira, como redonda ou oval/elíptica.
    chair_accessories_included:
      name: Acessórios de cadeira incluídos
      description: Lista os acessórios integrados ou incluídos que melhoram a funcionalidade
        de uma cadeira.
    chair_sash_care_instructions:
      name: Instruções de cuidado com a faixa da cadeira
      description: Descreve o método de limpeza/manutenção recomendado para a faixa
        da cadeira.
    chair_sash_finish:
      name: Acabamento da faixa da cadeira
      description: Descreve o brilho/acabamento da superfície do tecido da faixa.
    chair_storage_design:
      name: Design de armazenamento de cadeira
      description: Indica como a cadeira de baloiço deve ser armazenada (por exemplo,
        dobrável, empilhável, não retrátil) para ajudar os clientes a avaliar o armazenamento
        e a portabilidade.
    chaise_or_sectional_orientation:
      name: Chaise ou orientação seccional
      description: Especifica o lado em que se encontra uma chaise integrada ou uma
        secção extensível quando se está de frente para o sofá.
    chamber_size:
      name: Tamanho da câmara
      description: Indica o tamanho/volume da câmara do bocal, o que afeta a resistência
        e a cor tonal.
    chanter_finger_spacing:
      name: Espaçamento dos dedos do chanter
      description: Indica o espaçamento/tamanho dos dedos do chanter (geralmente descrito
        como padrão, para mãos pequenas ou para mãos grandes).
    chanter_type:
      name: Tipo de chanter
      description: O estilo/configuração do chanter incluído com o instrumento (ou
        utilizado pelo instrumento), como por exemplo, aberto, fechado, de prática
        ou com chaves.
    chard_variety:
      name: Variedade de acelga
      description: Identifica a cultivar específica ou a variedade de cor da acelga
        que está a ser vendida.
    charging_port_location:
      name: Localização da porta de carregamento
      description: Localização física da entrada externa principal de carregamento
        do veículo (porta de carregamento).
    chassis_construction_type:
      name: Tipo de construção do chassis
      description: Descreve o principal método de construção do chassis utilizado
        no veículo.
    checkbook_loading_orientation:
      name: Orientação de carregamento do livro de cheques
      description: Indica se a capa do livro de cheques é compatível com os formatos
        de carregamento superior, carregamento lateral ou universal.
    cheekpiece_style:
      name: Estilo de peça para as bochechas
      description: Define o tipo de configuração de argola/bocal no freio bridão,
        que determina a ação das rédeas e a estabilidade lateral.
    cheese_alternative_form:
      name: Forma alternativa de queijo
      description: Especifica a forma física ou o corte em que a alternativa ao queijo
        é vendida.
    cheese_form:
      name: Forma de queijo
      description: 'Descreve a apresentação física do produto de queijo (p. ex.: roda,
        bloco, fatiado, ralado).'
    cheese_texture:
      name: Textura do queijo
      description: Classifica o queijo pela sua textura ou firmeza geral.
    cheese_variety:
      name: Variedade de queijos
      description: Identifica o tipo de queijo utilizado como principal aromatizante
        no snack.
    cherimoya_variety:
      name: Variedade de cherimóia
      description: 'Identifica a cultivar/variedade específica de cherimóia (p. ex.:
        Fino de Jete, El Bumpo).'
    cherry_variety:
      name: Variedade de cereja
      description: Especifica a cultivar ou variedade das cerejas, ajudando os compradores
        a escolher tipos específicos conhecidos pelo seu sabor, cor, tamanho ou utilização
        culinária pretendida.
    chest_pocket_style:
      name: Estilo de bolso no peito
      description: Especifica a presença e a configuração dos bolsos no peito da camisa.
    chewing_tobacco_form:
      name: Forma do tabaco de mascar
      description: Identifica a forma física, o tipo de corte ou o tamanho da embalagem
        do produto de tabaco para mascar (por exemplo, folhas soltas, corte longo,
        embalagem fina).
    chicory_variety:
      name: Variedade de chicória
      description: 'Identifica a variedade ou cultivar específica de chicória que
        está a ser comercializada (p. ex.: Radicchio, Endívia Belga, Escarola).'
    chiffon_recommended_use:
      name: Uso recomendado de chiffon
      description: Aplicações de costura/manualidades mais recomendadas para o tecido
        chiffon.
    child_seat_accessory_type:
      name: Tipo de acessório para cadeira de criança
      description: Define o tipo específico de acessório ou peça de substituição para
        cadeira de criança (por exemplo, almofada do assento, apoio para os pés, adaptador
        de montagem), permitindo ao comprador encontrar rapidamente o item de que
        necessita sem criar muitas microcategorias.
    child_seat_mounting_type:
      name: Tipo de montagem da cadeira infantil
      description: Especifica como a cadeira de criança para bicicleta é fixada ao
        quadro, ao suporte ou à área do cockpit da bicicleta.
    chime_sound_character:
      name: Característica do som de sino
      description: Descreve o timbre/característica sonora pretendida para os sinos.
    chin_cup_type:
      name: Tipo de queixeira
      description: Especifica o estilo ou a construção da queixeira, o que afeta o
        conforto e a proteção contra impactos.
    chin_strap_type:
      name: Tipo de correia de queixo
      description: Especifica o tipo de tira de queixo de um chapéu — nenhuma, fixa,
        ajustável ou removível — para ajudar os compradores a escolher estilos que
        se mantenham seguros em dias de vento ou durante atividades físicas.
    china_cymbal_edge_shape:
      name: Forma da borda do prato chinês
      description: Descreve o perfil da borda/flange típico dos pratos chineses (o
        quão curvada é a borda), o que afeta a sensação ao tocar e o som.
    china_cymbal_sound_character:
      name: Característica sonora do prato chinês
      description: 'Descritores do timbre/característica tonal principal de um prato
        chinês, utilizado para descoberta e filtragem (p. ex.: áspero, escuro, brilhante).
        Vários valores podem aplicar-se.'
    chinstrap_type:
      name: Tipo de correia de queixo
      description: Modelo da correia de queixo fornecida com o capacete.
    chip_cut_style:
      name: Estilo de corte de batatas fritas
      description: Especifica o tipo de corte físico ou textura das batatas fritas
        (por exemplo, onduladas, fritas em panela, estouradas).
    chip_denomination:
      name: Denominação do chip
      description: As denominações (valores) do chip incluídas no conjunto (impressas
        ou atribuídas).
    chocolate_form:
      name: Forma de chocolate
      description: Descreve a forma física como o chocolate para culinária é vendido.
    choy_sum_variety:
      name: Variedade de Choy sum
      description: Identifica o mercado específico ou a variedade botânica do choy
        sum que está a ser vendida.
    cigar_wrapper_color:
      name: Cor do invólucro do charuto
      description: Classificação padrão de cor da folha de invólucro do charuto.
    cigarette_filter_type:
      name: Tipo de filtro de cigarro
      description: Especifica se o cigarro possui um filtro e, em caso afirmativo,
        a construção ou característica especial desse filtro.
    cigarette_size:
      name: Tamanho de cigarro
      description: Classifica os cigarros de acordo com a terminologia padrão da indústria
        em termos de comprimento ou formato (por exemplo, tamanho king, 100s, slim).
    cigarette_strength_descriptor:
      name: Descritor de intensidade do cigarro
      description: 'Etiqueta de marketing de força tradicionalmente utilizada pela
        marca para indicar a intensidade do alcatrão/nicotina (p. ex.: Light, Bold,
        Silver).'
    cinch_liner_material:
      name: Material do forro da cilha
      description: Identifica o material utilizado no forro ou preenchimento que está
        em contacto com o corpo do cavalo.
    circular_knitting_needle_cable_type:
      name: Tipo de cabo da agulha de tricot circular
      description: 'Material/comportamento e construção do cabo (p. ex.: aço revestido,
        nylon) que influencia a memória/torção e o comportamento rotativo.'
    circular_knitting_needles_tip_material:
      name: Material da ponta das agulhas de tricot circulares
      description: Material das duas pontas da agulha (diferente do material do cabo).
    circumference_adjustment_mechanism:
      name: Mecanismo de ajuste da circunferência
      description: Mecanismo utilizado para ajustar ou bloquear a circunferência do
        novelo.
    clamp_design:
      name: Design da braçadeira
      description: Descreve o estilo estrutural ou mecanismo da braçadeira.
    clamp_sheet_music_clip_features:
      name: Características do clip de partitura
      description: 'Características funcionais e de proteção dos fixadores de partituras
        (p. ex.: preenchimento, antiderrapante, giratório).'
    clamping_closure_type:
      name: Tipo de fixação/fecho
      description: Especifica o mecanismo utilizado para apertar ou fixar o bastidor
        de bordar à volta do tecido.
    clarinet_bell_acoustic_design:
      name: Projeto acústico da campana do clarinete
      description: Descreve o design sonoro/ventilação do sino, concebido para influenciar
        a resposta e a entoação.
    clarinet_bell_adjustment_mechanism:
      name: Mecanismo de ajuste da campânula do clarinete
      description: Descreve como é ajustado o comprimento/geometria da campânula.
    clarinet_bell_ring_material:
      name: Material do anel da campana do clarinete
      description: Especifica o material do anel/faixa de proteção na borda da campânula
        do clarinete, se existir.
    clarinet_bell_tuning_effect:
      name: Efeito de afinação da campana do clarinete
      description: Indica como o sino foi concebido para afetar a afinação/entoação
        (especialmente os tons da garganta e o registo grave) em comparação com um
        sino padrão.
    clarinet_body_type:
      name: Tipo de corpo do clarinete
      description: Indica o tipo principal de construção do corpo do clarinete em
        Lá.
    clarinet_bore_type:
      name: Tipo de orifício de clarinete
      description: Descreve o desenho do tubo do clarinete alto.
    clarinet_cap_style:
      name: Estilo de tampa de clarinete
      description: 'Estilo de design da tampa incluída com a braçadeira e/ou a tampa
        do bocal do clarinete (p. ex.: invertida ou ventilada).'
    clarinet_care_kit_intended_use:
      name: Kit de cuidados para clarinete - utilização prevista
      description: 'Contexto de utilização principal para o qual o kit foi concebido
        (p. ex.: secagem rápida diária versus limpeza/manutenção profunda).'
    clarinet_included_accessories:
      name: Acessórios incluídos com o clarinete
      description: Identifica o conteúdo da caixa que acompanha o clarinete em Si
        bemol.
    clarinet_keywork_material:
      name: Material para chave de clarinete
      description: Especifica o material do mecanismo de chaves do clarinete (por
        exemplo, latão, níquel-prata, banhado a prata).
    clarinet_keywork_plating:
      name: Revestimento das chaves do clarinete
      description: Especifica o acabamento/material do mecanismo de chaves do clarinete.
    clarinet_mouthpiece_baffle_profile:
      name: Perfil do defletor do bocal do clarinete
      description: Descreve o perfil interno do defletor/teto do bocal do clarinete
        que influencia o brilho e a projeção.
    clarinet_mouthpiece_beak_shape:
      name: Forma do bico do bocal do clarinete
      description: Especifica o perfil/ângulo exterior do bico para conforto do músico
        e sensação da embocadura.
    clarinet_mouthpiece_chamber_size:
      name: Tamanho da câmara da boquilha do clarinete
      description: Descreve o tamanho relativo da câmara de um bocal de clarinete
        (conforme especificado pelo fabricante), que pode influenciar a qualidade
        do som e a resistência ao toque.
    clarinet_mouthpiece_intended_tone:
      name: Boquilha de clarinete - timbre pretendido
      description: Descreve o objetivo tonal global do mercado para o bocal.
    clarinet_mouthpiece_player_level:
      name: Nível de tocador de boquilha de clarinete
      description: Indica o nível de utilizador típico a que se destina o bocal.
    clarinet_reed_cut:
      name: Corte de palheta de clarinete
      description: Especifica o corte/perfil da palheta (por exemplo, limada ou não
        limada e outros estilos de corte de mercado), que influenciam a resposta e
        o timbre.
    clarinet_reed_material_type:
      name: Tipo de material da palheta do clarinete
      description: Indica o material de que é feita a palheta (cana, sintética ou
        subtipos sintéticos comuns).
    clarinet_thumb_rest_type:
      name: Tipo de suporte de polegar para clarinete
      description: Tipo/característica do suporte de polegar da mão direita.
    classical_guitar_string_3rd_string_type:
      name: Corda de guitarra clássica tipo da 3.ª corda
      description: Se a corda de Sol (3.ª) é lisa (monofilamento) ou enrolada.
    classical_guitar_string_bass_winding_material:
      name: Material de enrolamento de baixo das cordas de guitarra clássica
      description: O material de enrolamento/revestimento utilizado na corda de baixo
        (normalmente, cordas 4 a 6).
    classical_guitar_string_set_configuration:
      name: Configuração do conjunto de cordas de guitarra clássica
      description: Especifica se o produto é um conjunto completo ou uma cordas específicas
        (normalmente o lado agudo ou o lado grave) para guitarra clássica.
    clay_modeling_dough_base_material:
      name: Material base de argila e massa de modelar
      description: Formulação primária/tipo base do material de modelação.
    clay_modeling_dough_curing_method:
      name: Método de cura de argila e massa de modelar
      description: Como o material endurece (ou permanece reutilizável), o que determina
        as ferramentas necessárias e a utilização típica da caixa interior.
    clay_paintability:
      name: Capacidade de pintura da argila
      description: Indica se a superfície de argila curada pode ser pintada e os tipos
        de tinta recomendados.
    clay_primary_composition:
      name: Composição primária da argila
      description: 'Material base/aglutinante primário da argila de secagem ao ar
        (p. ex.: à base de papel, à base de minerais).'
    clay_shooting_discipline:
      name: Disciplina de tiro aos pratos
      description: Identifica a modalidade ou os eventos de tiro aos pratos a que
        o produto se destina.
    cleaner_format:
      name: Formato mais limpo
      description: As embalagens/formato do produto de limpeza de lâminas.
    cleaner_sanitizer_intended_area:
      name: Área de aplicação do produto de limpeza/desinfetante
      description: A principal parte do instrumento de sopro que o produto se destina
        a limpar/desinfetar.
    cleaning_formula:
      name: Fórmula de limpeza
      description: Especifica a família química primária de limpeza/desinfeção do
        produto (não a marca) para auxiliar na segurança, compatibilidade e filtragem
        de utilização.
    cleaning_task_focus:
      name: Foco da tarefa de limpeza
      description: Identifica os principais problemas de limpeza que a limpeza a seco
        visa resolver.
    cleanup_method:
      name: Método de limpeza
      description: Especifica como a cola deve ser limpa (enquanto ainda está húmida)
        das mãos/ferramentas/superfícies.
    clear_glue_application_method:
      name: Método de aplicação de cola transparente
      description: Especifica o tipo de dispensador/aplicador incluído nas embalagens
        de cola transparente.
    clear_glue_finish_after_drying:
      name: Acabamento com cola transparente (após secagem)
      description: 'Descreve o aspeto da cola depois de seca/curada (p. ex.: transparente
        cristalina vs. translúcida, brilhante vs. mate).'
    cleat_bolt_pattern:
      name: Padrão de pernos de fixação
      description: Especifica a configuração dos pernos da sapatilha utilizados para
        fixar o fecho, o que determina a compatibilidade entre o pedal e a sapatilha
        (por exemplo, BTT com 2 parafusos versus estrada com 3 parafusos).
    cleat_compatibility:
      name: Compatibilidade com travessas
      description: Especifica com que sistemas de pedal ou de encaixe a capa de sapato
        é compatível.
    cleat_finish:
      name: Acabamento do cunho
      description: Especifica o acabamento/revestimento superficial do cunho para
        doca, afetando a resistência à corrosão e o aspeto.
    cleat_receptacle_system:
      name: Sistema de recetáculo de cunhos
      description: Identifica a interface de encaixe de cravos/pitões compatível utilizada
        em sapatos de golfe com cravos.
    cleat_release_mechanism:
      name: Mecanismo de libertação da travessa
      description: Especifica a forma como o bloqueio da sapatilha de bicicleta se
        desengata do pedal (por exemplo, libertação única ou libertação multidirecional).
    cleat_stud_type:
      name: Tipo de pitões e cravos
      description: Especifica o estilo de construção ou fixação dos pitões/cravos
        na sola das chuteiras de futebol americano.
    climate_control_module_function:
      name: Função do módulo de controlo climático
      description: Especifica a função principal dos módulos no sistema AVAC do veículo.
    climbing_hold_mounting_type:
      name: Tipo de montagem de apoio para escalada
      description: Especifica como o apoio é fixado à parede ou à prancha de treino.
    climbing_hold_type:
      name: Tipo de presa de escalada
      description: Classifica a forma ou o estilo da pega que define a forma como
        é realizada.
    climbing_protection_device_type:
      name: Tipo de dispositivo de segurança para escalada
      description: Especifica o tipo de dispositivo de proteção (por exemplo, came,
        porca, pitão), ajudando os escaladores a identificar rapidamente o equipamento
        correto para uma determinada formação rochosa ou estilo de escalada.
    climbing_rope_middle_marking:
      name: Marcação central da corda de escalada
      description: Descreve como o ponto médio (e/ou as extremidades) da corda são
        identificados para auxiliar na descida e rapel seguros.
    climbing_rope_treatment:
      name: Tratamento da corda de escalada
      description: Indica qualquer acabamento repelente à água, seco ou protetor aplicado
        na bainha e/ou no núcleo da corda.
    climbing_rope_type:
      name: Tipo de corda de escalada
      description: 'Classifica a corda pela certificação UIAA e utilização prevista
        (p. ex.: corda simples dinâmica, corda dupla, corda gémea, corda estática,
        corda acessória), permitindo aos compradores localizar rapidamente a corda
        correta para a sua atividade.'
    climbing_safety_certifications:
      name: Certificações de segurança em escalada
      description: Lista as normas de segurança para a escalada e segurança industrial
        cumpridas pelo dispositivo.
    clip_color:
      name: Cor do clipe
      description: Cor primária do clipe de partitura da braçadeira.
    clip_mechanism_type:
      name: Tipo de mecanismo de clipe
      description: Define o mecanismo de fecho utilizado por um clipe de dinheiro
        ou carteira com clipe de dinheiro, ajudando os compradores a escolher entre
        fechos magnéticos, de mola, de alavanca e outros estilos.
    clip_style:
      name: Estilo de clipe
      description: Identifica o mecanismo de encaixe específico utilizado para fixar
        o suporte, fornecendo informações de compatibilidade (por exemplo, clipe tipo
        jacaré, mosquetão).
    clipper_motor_technology:
      name: Tecnologia de motor do aparador de cabelo
      description: Identifica o design do motor utilizado no aparador de cabelo, que
        influencia a potência, o nível de ruído, a durabilidade e a necessidade de
        manutenção.
    closet_configuration:
      name: Configuração do roupeiro
      description: Define a forma geral ou esquema do sistema de closet (por exemplo,
        em forma de L, em forma de U, ilha).
    closing_mechanism:
      name: Mecanismo de fecho
      description: Especifica a ação de fecho da gaveta, como o fecho padrão, fecho
        suave, fecho automático ou abertura por pressão.
    cloth_construction:
      name: Composição do tecido
      description: 'Indica o tipo de trama ou acabamento do tecido, que afeta a rapidez
        e a durabilidade (p. ex.: lã penteada vs. lã cardada).'
    cloth_thickness:
      name: Espessura do tecido
      description: Indica a classe de espessura/peso do pano de polimento.
    club_head_material:
      name: Material da cabeça do taco
      description: Especifica o principal material utilizado na construção da cabeça
        do taco.
    clutch_hydraulic_system_type:
      name: Tipo de sistema hidráulico de embraiagem
      description: 'Indica a compatibilidade do sistema de acionamento da embraiagem/sistema
        hidráulico (p. ex.: embraiagem hidráulica versus aplicação de conversão por
        cabo).'
    clutch_line_connection_type:
      name: Tipo de ligação da linha da embraiagem
      description: Especifica a interface de ligação/encaixe final utilizada pela
        linha da embraiagem (importante para a compatibilidade com cilindros principal/secundário
        e tubagens rígidas).
    clutch_pressure_plate_actuation_type:
      name: Tipo de acionamento da placa de pressão da embraiagem
      description: Indica se a embraiagem é libertada por um mecanismo de libertação
        do tipo empurrar ou do tipo puxar (acionamento por mola de diafragma).
    clutch_pressure_plate_release_mechanism_type:
      name: Tipo de mecanismo de libertação da placa de pressão da embraiagem
      description: O tipo de interface de libertação/acionamento utilizado pela placa
        de pressão.
    clutch_pressure_plate_surface_type:
      name: Tipo de superfície da placa de pressão da embraiagem
      description: Tipo de superfície de contacto por fricção da placa de pressão.
    clutch_slave_cylinder_connection_type:
      name: Tipo de ligação do cilindro escravo da embraiagem
      description: Interface de ligação da linha hidráulica no cilindro secundário
        (porta roscada, ligação rápida, banjo, etc.).
    clutch_slave_cylinder_mounting_type:
      name: Tipo de montagem do cilindro secundário da embraiagem
      description: 'Como o cilindro auxiliar está montado na transmissão/carcaça da
        embraiagem (p. ex.: aparafusado, encaixado por pressão, concêntrico integrado).'
    coating_type:
      name: Tipo de revestimento
      description: Identifica qualquer revestimento exterior, cobertura ou glacé aplicado
        na barra de cereais (por exemplo, chocolate, iogurte).
    cocking_mechanism:
      name: Mecanismo de armar
      description: Especifica o método ou dispositivo principal utilizado para armar
        ou desarmar a corrente da besta.
    cocktail_garnish_form:
      name: Forma de guarnição de cocktail
      description: 'Descreve a forma como a guarnição é apresentada/preparada para
        utilização (p. ex.: fresca ou desidratada).'
    cocktail_mix_variety:
      name: variedade de misturas para cocktails
      description: 'Indica o cocktail específico que a mistura se destina a criar
        (p. ex.: Margarita, Mojito, Piña Colada).'
    cocktail_napkin_features:
      name: Características guardanapo de cocktail
      description: Destaca as características funcionais, práticas e ecológicas dos
        guardanapos de cocktail.
    cocktail_pick_tip_style:
      name: Estilo da ponta do palito de cocktail
      description: Descreve a forma/características da ponta utilizadas para perfurar
        ou segurar guarnições.
    cocktail_pick_top_handle_style:
      name: Estilo do topo/pega dos palitos de cocktail
      description: Descreve a parte superior decorativa ou a forma de identificação
        utilizada para segurar ou apresentar o produto.
    cocktail_type:
      name: Tipo de cocktail
      description: 'Indica a receita ou o estilo específico do cocktail representado
        pelo produto pré-misturado (p. ex.: Margarita, Negroni, Piña Colada).<'
    cocktail_umbrella_handle_pick_material:
      name: Identificador/material de palito de guarda-chuva de cocktail
      description: Material da haste/ponta (excluindo o toldo) do guarda-chuva de
        cocktail.
    cocoa_processing_method:
      name: Método de processamento do cacau
      description: 'Especifica a forma como o cacau em pó foi processado (p. ex.:
        natural, processado com álcali, cacau preto).'
    cocoa_product_form:
      name: Forma do produto de cacau
      description: Define a forma física em que o produto de cacau é vendido.
    coconut_husk_status:
      name: Estado da casca de coco
      description: Indica o grau de remoção da casca exterior do coco, afetando a
        facilidade de utilização, armazenamento e eliminação.
    coconut_maturity_stage:
      name: Estádio de maturação do coco
      description: Identifica o estado de desenvolvimento do coco no momento da colheita,
        o que influencia fortemente o sabor, o teor de água e a utilização culinária
        (por exemplo, para beber ou cozinhar).
    coconut_oil_refinement_type:
      name: Tipo de refinação do óleo de coco
      description: Especifica o grau de refinação ou a qualidade do óleo de coco,
        por exemplo. virgem, refinado, TCM, fracionado.
    coconut_preparation_form:
      name: Forma de preparação do coco
      description: Especifica a forma como o coco é fisicamente preparado ou cortado
        (inteiro, fatiado, ralado, em puré, etc.), ajudando os compradores a encontrar
        rapidamente o formato necessário para receitas ou para consumo como snack.
    coffee_bean_species:
      name: Espécies de grãos de café
      description: Especifica a espécie de grãos de café utilizados no produto.
    coffee_beverage_variety:
      name: Variedade de bebidas de café
      description: Classifica as bebidas de café prontas a consumir ou por estilo
        de mistura.
    coffee_processing_method:
      name: Método de processamento do café
      description: Indica a técnica de processamento pós-colheita utilizada nos grãos
        de café.
    coil_material:
      name: Material da bobina
      description: Especifica o material principal ou o tipo de malha utilizado na
        bobina de aquecimento, que influencia o sabor, a durabilidade e a compatibilidade
        com o controlo da temperatura.
    coil_spring_design:
      name: Design de mola helicoidal
      description: Especifica a taxa/forma do design da mola helicoidal que afeta
        as características de deslocação.
    coil_spring_finish_coating:
      name: Acabamento/revestimento da mola helicoidal
      description: Acabamento superficial ou revestimento aplicado para proteção contra
        a corrosão.
    coil_spring_material:
      name: Material da mola helicoidal
      description: Material/composição principal da mola helicoidal.
    coil_system_type:
      name: Tipo de sistema de bobina
      description: Informação sobre o sistema específico de molas ou bobinas utilizado
        nos colchões aplicáveis, tais como molas ensacadas ou molas Bonnell.
    coil_type:
      name: Tipo de bobina
      description: Descreve a construção ou tecnologia da bobina utilizada, que influencia
        a produção de vapor e o sabor.
    coin_grade_numismatic:
      name: Grau de qualidade da moeda (numismática)
      description: 'Classificação normalizada da moeda (p. ex.: classificação de Sheldon
        ou classificação adjetiva).'
    coin_strike_or_finish:
      name: Cunhagem ou acabamento da moeda
      description: 'O tipo de cunhagem ou acabamento da moeda (p. ex.: cunhagem comercial,
        cunhagem proof).'
    coin_strike_type:
      name: Tipo de cunhagem
      description: 'Descreve o tipo de cunhagem/acabamento da moeda (p. ex.: prova,
        cunhagem comercial).'
    collar_style:
      name: Estilo de gola
      description: Define o desenho da gola ou do decote da peça de vestuário.
    collectible_gun_accessories_included:
      name: Acessórios colecionáveis para armas incluídos
      description: 'Lista os acessórios e a documentação incluídos com a arma de coleção
        (p. ex.: coldre, caixa interior, baioneta, documentação).'
    collectible_gun_firing_mechanism:
      name: Mecanismo de disparo de arma colecionável
      description: Especifica o tipo de mecanismo de disparo/ignição da arma para
        armas de fogo de coleção (especialmente peças antigas e históricas).
    collectible_knife_blade_finish:
      name: Acabamento da lâmina da faca colecionável
      description: Descreve o acabamento/configuração de teste da superfície da lâmina
        quanto à aparência (e, por vezes, à resistência à corrosão).
    color_code_system:
      name: Sistema de código de cor
      description: Identifica o sistema de código de cor utilizado para a referência
        numérica de cor do fio (por exemplo, DMC, Anchor), se aplicável.
    color_coding_standard:
      name: Norma de codificação de cor
      description: Indica se a placa segue um código de cor internacional (por exemplo,
        IWF ou IPF) ou outro esquema.
    color_effect:
      name: Efeito de cor
      description: Especifica técnicas ou efeitos especiais aplicados às extensões
        de cabelo.
    color_family:
      name: Família de cor
      description: Família de cores de alto nível para tinta sumi (útil quando o cor
        é muito granular, por exemplo, preto quente versus azul-preto).
    color_finish:
      name: Acabamento da cor
      description: Especifica o acabamento dos componentes visíveis do protetor de
        mãos (por exemplo, mate ou brilhante) quando a cor por si só não é suficiente.
    coloring_finish:
      name: Acabamento de coloração
      description: Especifica o acabamento visual ou efeito especial produzido pela
        coloração, como metálico ou néon.
    comb_material:
      name: Material do pente
      description: Material do pente da harmónica (o corpo que forma as câmaras de
        ar).
    comb_type:
      name: Tipo de pente
      description: Classifica os pentes para escovagem de cavalos de acordo com a
        sua principal função (por exemplo, pente de borracha, pente de crina, pente
        de puxar), ajudando os compradores a localizar rapidamente a ferramenta certa
        para as necessidades específicas de escovagem.
    combat_shorts_cut_style:
      name: Estilo de corte de calções de combate
      description: 'Indica o corte ou estilo de ajuste específico para calções de
        desportos de combate (p. ex.: corte alto, corte retro, compressão).'
    comic_creator_role:
      name: Função de criador de banda desenhada
      description: 'Especifica a função de criador creditado relevante para a listagem
        (p. ex.: escritor, artista).'
    commemorative_coin_finish:
      name: Acabamento da moeda comemorativa
      description: Descreve o tipo de cunhagem/acabamento de uma moeda comemorativa.
    commemorative_coin_mint_mark:
      name: Marca da cunhagem da moeda comemorativa
      description: Indica a marca de cunhagem (ou a ausência dela) na moeda.
    commemorative_subject:
      name: Entidade comemorativa
      description: Entidade comemorativa primária (evento, pessoa, lugar, aniversário,
        organização, etc.).
    commercial_vehicle_class:
      name: Classe de veículo comercial
      description: A classificação regulamentar/industrial baseada no GVWR (Peso Bruto
        Total do Veículo) é utilizada para descrever a classe de peso de um veículo
        comercial para efeitos de navegação e filtragem.
    compass_damping_medium:
      name: Meio de amortecimento da bússola
      description: Especifica o meio utilizado para estabilizar o movimento da agulha
        no interior da cápsula da bússola.
    compass_illumination_type:
      name: Tipo de iluminação da bússola
      description: Especifica como as marcações da bússola se tornam visíveis em condições
        de baixa luminosidade (por exemplo, tinta luminescente, trítio, retroiluminação
        LED).
    compass_mounting_style:
      name: Tipo de montagem da bússola
      description: Descreve como a bússola é transportada, utilizada ou instalada.
    compass_scale_units:
      name: Unidades de escala da bússola
      description: Identifica as unidades de medida (graus, mils ou ambos) assinaladas
        na caixa da bússola.
    compatible_abs_system:
      name: Sistema de ABS compatível
      description: Indica se o cilindro mestre se destina a veículos equipados com
        ABS.
    compatible_adapter_brand:
      name: Marca do adaptador compatível
      description: Identifica a marca da cabeça do taco de golfe para a qual o adaptador
        da haste já vem pré-configurado.
    compatible_airbag_system_type:
      name: Tipo de sistema de airbag compatível
      description: Indica a geração/conjunto de características do sistema de airbag
        com as quais a peça é compatível (por exemplo, estágio único versus estágio
        duplo).
    compatible_amplifier_fit_method:
      name: Método de encaixe do amplificador compatível
      description: Indica como a compatibilidade é definida para a capa/caixa (encaixe
        universal vs. específico do modelo vs. por encaixe).
    compatible_apparatus:
      name: Aparelho compatível
      description: Especifica o aparelho ou atividade de ginástica para a qual as
        pegas foram concebidas.
    compatible_archery_tool:
      name: Ferramenta de tiro com arco compatível
      description: Indica a principal ferramenta ou equipamento de tiro com arco com
        o qual o acessório foi concebido para funcionar.
    compatible_axle_size:
      name: Tamanho de eixo compatível
      description: Especifica o diâmetro do cubo/eixo ou o padrão de rosca para o
        qual o apoio de pé foi concebido (por exemplo, 10 mm/3⁄8 pol., 14 mm, 3/8
        pol. 26 TPI).
    compatible_axle_type:
      name: Tipo de eixo compatível
      description: Identifica o(s) padrão(ões) de fixação do eixo traseiro que o treinador
        suporta, como a libertação rápida ou os tamanhos do eixo passante.
    compatible_axle_weight_rating:
      name: Classificação de peso por eixo compatível
      description: Especifica a capacidade de carga por eixo do reboque (capacidade
        por eixo) para a qual o conjunto de travagem do reboque foi concebido.
    compatible_bait_type:
      name: Tipo de isco compatível
      description: Identifica os tipos de isco de pesca com os quais o furador de
        isco é compatível, para que os pescadores possam escolher uma ferramenta que
        corresponda ao seu isco preferido.
    compatible_bass_scale_length:
      name: Comprimento de expansão de graves compatível
      description: Indica o(s) comprimento(s) de escala do baixo para o(s) qual(is)
        o conjunto de cordas foi concebido (importante para o comprimento de enrolamento
        e ajuste corretos).
    compatible_battle_top_system:
      name: Sistema de Battle Top compatível
      description: Identifica o ecossistema ou a série de produtos Battle Top para
        a qual o produto foi concebido (utilizado para garantir a compatibilidade
        de peças e arenas).
    compatible_bb_size:
      name: Tamanho de BB compatível
      description: Indica o diâmetro dos pellets de airsoft que o produto suporta.
    compatible_bed_frame_style:
      name: Estilo de estrutura de cama compatível
      description: Especifica o estilo de cama ou estrutura para a qual o acessório
        foi concebido.
    compatible_bicycle_tire_type:
      name: Tipo de pneu de bicicleta compatível
      description: Especifica que tipos de pneus de bicicleta o produto pode reparar
        ou selar.
    compatible_bike_component:
      name: Componente de bicicleta compatível
      description: Especifica qual o componente da bicicleta que a ferramenta ou produto
        foi concebido para reparar.
    compatible_billiard_game:
      name: Jogo de bilhar compatível
      description: Identifica o(s) formato(s) de jogo de bilhar para o(s) qual(is)
        a mesa foi concebida, garantindo que os clientes selecionam uma mesa que corresponda
        ao seu jogo.
    compatible_billiard_table_size:
      name: Tamanho de mesa de bilhar compatível
      description: Especifica o(s) comprimento(s) padrão da mesa para o(s) qual(is)
        a capa foi concebida, garantindo que os compradores escolhem uma capa do tamanho
        adequado para a sua mesa de bilhar.
    compatible_bit_type:
      name: Tipo de ponta compatível
      description: Tipos de brocas com as quais a proteção pode ser utilizada.
    compatible_blade_hosel:
      name: Hosel da lâmina compatível
      description: Indica o tipo de encaixe/conicidade da lâmina que o veio aceita,
        garantindo que o veio e a lâmina encaixam corretamente.
    compatible_blade_system:
      name: Sistema de lâmina compatível
      description: 'Indica o sistema/formato de lâmina de substituição que a faca
        aceita (p. ex.: lâmina standard para hobby n.º 11, lâminas de segmentos destacáveis).'
    compatible_boat_weaving_shuttle_loom:
      name: Lançadeira de tear em forma de barco compatível
      description: Os tipos de tear para os quais foi concebido o tear em forma de
        barco.
    compatible_bobbin_type:
      name: Tipo de bobina compatível
      description: Indica o tipo de bobina/carrinho para o qual a lançadeira do tear
        em forma de barco foi concebida.
    compatible_bottle_mouth:
      name: Gargalo de garrafa compatível
      description: Tipo ou diâmetro de gargalo de garrafa para a qual a palhinha ou
        a tampa foram concebidas.
    compatible_bow_attachment_system:
      name: Sistema de fixação do arco compatível
      description: 'Indica a interface do membro ou acessório para o qual a peça foi
        concebida (p. ex.: ILF, encaixe por parafuso, desengate rápido).'
    compatible_bow_crossbow_type:
      name: Tipo de arco/besta compatível
      description: Indica o estilo de arco ou besta para o qual o acessório foi concebido.
    compatible_brake_fluid:
      name: Fluido de travões compatível
      description: Especificação(ões) DOT do líquido dos travões para as quais os
        vedantes/materiais do cilindro principal foram concebidos.
    compatible_brake_pad:
      name: Pastilha de travão compatível
      description: Indica para que compostos de pastilhas de travão o rotor está aprovado,
        garantindo a segurança e o desgaste ideal.
    compatible_brake_service_system:
      name: Sistema de serviço de travagem compatível
      description: Especifica se a peça se destina a travões de disco, travões de
        tambor ou ambos.
    compatible_brake_system:
      name: Sistema de travagem compatível
      description: Especifica as principais observações sobre a compatibilidade do
        sistema para a utilização de líquido dos travões.
    compatible_brake_type:
      name: Tipo de travão compatível
      description: Especifica o tipo de travão com o qual a grelha é compatível, como
        o travão de disco ou o travão de jante.
    compatible_brass_instrument_finish:
      name: Acabamento compatível com instrumentos de sopro
      description: Especifica em que acabamentos de instrumentos metálicos o produto
        de limpeza pode ser utilizado em segurança sem danificar o acabamento.
    compatible_building_toy_system:
      name: Sistema de brinquedo de construção compatível
      description: Indica com que sistema/padrão de construção o brinquedo é compatível
        (ou tamanho equivalente), como por exemplo compatível com LEGO ou proprietário.
    compatible_capo_fretboard_radius:
      name: raio da escala compatível com capo
      description: Especifica o raio/perfil da escala para a qual o capo foi concebido,
        visando o contacto ideal e a estabilidade de afinação.
    compatible_capo_number_of_strings:
      name: Número capo compatível da cadeia
      description: Indica quantas cadeias o capo foi concebido para prender (útil
        para capos de 6, 7, 8 e 12 cadeias, e instrumentos especiais).
    compatible_cardio_machine_type:
      name: Tipo de equipamento de cardio compatível
      description: Identifica o tipo de aparelho cardiovascular com o qual o acessório
        ou peça foi concebido para funcionar.
    compatible_chain_link_type:
      name: Tipo de elo de corrente compatível
      description: Identifica o tipo de elo da corrente que a ferramenta utiliza (padrão,
        meio elo, elo rápido, etc.).
    compatible_chain_size:
      name: Tamanho de corrente compatível
      description: Especifica a largura da corrente ou os padrões de passo (por exemplo,
        1/8 de polegada, 3/32 de polegada) que a ferramenta suporta.
    compatible_chain_width:
      name: Largura da corrente compatível
      description: Indica o tamanho da corrente para o qual a roda livre foi concebida.
    compatible_chip_denomination:
      name: Denominação de chip compatível
      description: Indica as denominações de chip para os quais a bandeja/caixa inclui
        etiquetas ou posições dedicadas (ou que se destina a organizar).
    compatible_clarinet_mouthpiece_ligature:
      name: Braçadeira compatível para boquilha de clarinete
      description: Identifica o padrão de ajuste da braçadeira ou as notas de compatibilidade
        para o bocal.
    compatible_classical_guitar_string_scale_length:
      name: Comprimento de escala da corda de guitarra clássica compatível
      description: O comprimento de escala da guitarra pretendido/compatibilidade
        de comprimento da corda para o conjunto.
    compatible_clay_target_size:
      name: Tamanho de alvo de argila compatível
      description: Lista os tamanhos ou forma de alvos de barro que o lançador pode
        aceitar para um encaixe e desempenho adequados.
    compatible_cleat_system:
      name: Sistema de travessas compatível
      description: Especifica a interface do fecho ou o padrão de parafusos do sistema
        de assistência do pedal, para que os ciclistas possam combinar os seus sapatos
        com o sistema correto.
    compatible_clipless_pedal_system:
      name: Sistema de pedais de encaixe compatível
      description: Identifica o padrão específico de pedal/pitão de encaixe para o
        qual o produto foi concebido.
    compatible_clutch_type:
      name: Tipo de embraiagem compatível
      description: Compatibilidade da interface da embraiagem com o volante do motor
        (quando aplicável).
    compatible_coffee_pod_system:
      name: Sistema compatível com cápsulas de café
      description: Especifica a máquina de café ou o sistema de preparação para o
        qual as cápsulas ou saquetas são concebidas.
    compatible_construction_set_system:
      name: Sistema de conjunto de construção compatível
      description: Indica com que sistema de construção/ecossistema de marca o conjunto
        é compatível (por exemplo, compatível com LEGO, compatível com DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Suporte/cravelha compatível para clarinete contrabaixo
      description: Indica o tipo de suporte/pino ou estilo de suporte necessário.
    compatible_coolant_chemistry:
      name: Química do líquido de refrigeração compatível
      description: Especifica com que famílias de química de líquidos de refrigeração
        o aditivo deve ser compatível.
    compatible_cooling_system_material:
      name: Material compatível com o sistema de refrigeração
      description: Especifica para que sistemas/materiais de refrigeração a limpeza
        do radiador é segura (por exemplo, radiadores de alumínio, sistemas com metais
        mistos).
    compatible_crib_format:
      name: Formato de berço compatível
      description: Define o tamanho geral ou a categoria de forma do colchão ou lençol
        para o qual o acessório foi concebido.
    compatible_cross_stitch_fabric_count:
      name: Contagem de tecido compatível para ponto cruz
      description: Contagem de grama(s) de tecido recomendada(s) para bordar o desenho.
    compatible_cross_stitch_frame:
      name: Moldura de ponto cruz compatível
      description: Indica para que é que a moldura foi concebida (uso manual, suporte
        de mesa, suporte de chão ou universal).
    compatible_crossbar:
      name: Barra transversal compatível
      description: Compatibilidade da estrutura com as barras transversais do tejadilho
        do veículo (se montadas no tejadilho), incluindo forma/padrões de perfil das
        barras transversais.
    compatible_cycling_cleat:
      name: Taco de ciclismo compatível
      description: Especifica o sistema de encaixe ou pedal para o qual as sapatilhas
        de ciclismo foram concebidas.
    compatible_cymbal_size:
      name: Tamanho de prato compatível
      description: Especifica o diâmetro de prato pretendido (ou máximo) para o qual
        a caixa foi concebida; trata-se da compatibilidade com o tamanho do prato,
        e não com o diâmetro exterior da caixa.
    compatible_device_type:
      name: Tipo de dispositivo compatível
      description: 'Indica o tipo de dispositivo que o suporte se destina a suportar
        (p. ex.: monitor/TV, tablet, smartphone, leitor de DVD portátil).'
    compatible_dock_structure_type:
      name: Tipo de estrutura de doca compatível
      description: A estrutura de doca em que os degraus foram concebidos para assentar.
    compatible_dough_type:
      name: Tipo de massa compatível
      description: Especifica os tipos/marcas de massa com os quais as ferramentas
        foram concebidas para funcionar (por exemplo, massa de modelar padrão, argila
        de modelar).
    compatible_drawing_ink_surface:
      name: Superfície compatível com tinta de desenho
      description: Indica as superfícies/substratos recomendados para um melhor desempenho.
    compatible_drivetrain_brand:
      name: Marca de transmissão compatível
      description: Lista a marca do sistema de transmissão ou de travagem com o qual
        o cabo foi concebido para funcionar.
    compatible_drivetrain_speeds:
      name: Velocidades de transmissão compatíveis
      description: Especifica o número de velocidades da transmissão (por exemplo,
        10 velocidades) que o pedaleiro ou a coroa oferecem.
    compatible_equipment:
      name: Equipamento compatível
      description: Especifica o tipo de equipamento de desportos de inverno para o
        qual o torno foi concebido.
    compatible_evap_system:
      name: Sistema EVAP compatível
      description: Indica se a tampa do depósito de combustível foi concebida para
        cumprir os requisitos do sistema EVAP (por exemplo, vedação conforme as especificações
        do fabricante) e reduzir o acendimento da luz de aviso do motor.
    compatible_exercise_bike_style:
      name: Estilo de bicicleta de exercício compatível
      description: Indica para que modelos de bicicletas estáticas o acessório ou
        peça de substituição foi concebido.
    compatible_fencing_weapon:
      name: Arma de esgrima compatível
      description: Especifica a que arma ou disciplina de esgrima se destina o casaco
        ou lamé.
    compatible_fiber_type:
      name: Tipo de fibra compatível
      description: Tipos primários de fibra que a cardadora de tambor foi concebida
        para processar eficientemente.
    compatible_fin_box_system:
      name: Sistema de encaixe de quilhas compatível
      description: 'Identifica o encaixe ou sistema de montagem da quilha para o qual
        a quilha foi concebida, ajudando os surfistas a comprar quilhas compatíveis
        com a sua prancha (p. ex.: FCS II, Futures, US Box).'
    compatible_fingerboard_radius:
      name: Raio da escala compatível
      description: Especifica o raio da escala (plano, curvo ou composto) para o qual
        o capo foi concebido, garantindo uma pressão uniforme e reduzindo o ruído.
    compatible_finish_type:
      name: Tipo de acabamento compatível
      description: Indica para que tipos de acabamento de instrumentos o spray é considerado
        seguro.
    compatible_fishing_reel_type:
      name: Tipo de carreto de pesca compatível
      description: Especifica o tipo de carreto de pesca para o qual o acessório foi
        concebido (por exemplo, carreto de pesca com isco artificial, carreto de pesca
        com isco artificial, carreto de pesca com mosca).
    compatible_fly_line_weight:
      name: Peso da linha de pesca compatível
      description: Indica o peso máximo da linha de pesca com mosca AFTMA que o carreto
        foi concebido para suportar.
    compatible_flywheel_type:
      name: Tipo de volante compatível
      description: Especifica o tipo de volante do motor com o qual a placa de pressão
        da embraiagem deve ser utilizada.
    compatible_football_kick_type:
      name: Tipo de remate de futebol compatível
      description: Identifica as situações de remate que o produto foi concebido para
        auxiliar (por exemplo, pontapé de saída, baliza de campo), ajudando os atletas
        a localizar rapidamente o equipamento apropriado.
    compatible_fuel_system_type:
      name: Tipo de sistema de combustível compatível
      description: Especifica o sistema de distribuição de combustível para o qual
        o limpa-vidros foi concebido.
    compatible_gas_type:
      name: Tipo de gás compatível
      description: Identifica o tipo de gás comprimido para o qual o cilindro de ar
        comprimido de paintball foi concebido.
    compatible_gel_wax_additives:
      name: Aditivos compatíveis para cera em gel
      description: 'Especifica que tipos de aditivos são compatíveis com esta cera
        em gel (p. ex.: tipo de corante, incorporados).'
    compatible_glaze_layering:
      name: Camadas de esmalte compatíveis
      description: Indica se o esmalte se destina a ser sobreposto com outros esmaltes
        para criar efeitos.
    compatible_golf_bag_type:
      name: Tipo de saco de golfe compatível
      description: Indica a que formatos de saco de golfe se adapta a capa ou caixa.
    compatible_ground_polarity:
      name: Polaridade de ligação à terra compatível
      description: Indica se o regulador de tensão se destina a sistemas elétricos
        de veículos com ligação à terra negativa ou positiva (ou se não é sensível
        à polaridade).
    compatible_guitar_body_shape:
      name: Forma de corpo de guitarra compatível
      description: Indica para que forma de corpo de guitarra a caixa foi concebida.
    compatible_guitar_case:
      name: Caixa de guitarra compatível
      description: Especifica em que estilos de caixa de guitarra o humidificador
        foi concebido para se ajustar e funcionar corretamente.
    compatible_guitar_scale_length:
      name: Comprimento do braço da guitarra compatível
      description: Indica para que comprimento(s) de escala de guitarra foi concebido
        o conjunto de cordas (com base no comprimento da espiral/comprimento total).
    compatible_gun_platform:
      name: Plataforma de armas compatível
      description: Especifica a plataforma operacional ou a fonte de alimentação com
        a qual o produto é compatível (por exemplo, AEG, GBB, HPA).
    compatible_hair_length:
      name: Comprimento de cabelo compatível
      description: Especifica o comprimento ou volume máximo de cabelo que o acessório
        acomoda confortavelmente.
    compatible_head_and_neck_restraint_system:
      name: Sistema de retenção de cabeça e pescoço compatível
      description: 'Indica se o capacete inclui pontos de ancoragem e/ou é compatível
        com sistemas de proteção para a cabeça e pescoço (p. ex.: HANS), incluindo
        o estado de inclusão/instalação dos pinos de ancoragem.'
    compatible_helmet_certification_standard:
      name: Norma de certificação de capacete compatível
      description: Indica qualquer contexto de norma ou certificação de segurança
        de capacetes que o acessório foi concebido para suportar (por exemplo, as
        películas descartáveis para utilização em corridas fazem geralmente referência
        a regras específicas de homologação).
    compatible_helmet_shell_size:
      name: Tamanho de casco de capacete compatível
      description: Indica para que tamanho(s) de casco de capacete serve uma peça
        interna de substituição (o tamanho do casco corresponde, geralmente, a gamas
        de tamanho como XS–S, M, L–XL).
    compatible_helmet_size:
      name: Tamanho de capacete compatível
      description: Indica o tamanho do capacete com o qual a máscara facial é compatível.
    compatible_helmet_type:
      name: Tipo de capacete compatível
      description: O capacete com sistema de assistência ao pescoço foi concebido
        para funcionar em conjunto com outros modelos.
    compatible_hitch_receiver_size:
      name: Tamanho do recetor de engate compatível
      description: O tamanho da abertura do recetor de engate para o qual o acessório
        foi concebido (para acessórios montados no engate).
    compatible_hook_size:
      name: Tamanho de agulha compatível
      description: Tamanho do(s) sistema(s) de agulha de croché e/ou gama de tamanhos
        para que o organizador foi concebido (por exemplo, tamanho de letra/número
        dos EUA, gama métrica mm).
    compatible_horse_coat_type:
      name: Tipo de pelagem de cavalo compatível
      description: Especifica as características da pelagem do cavalo para as quais
        o removedor de pelos mortos é mais adequado (por exemplo, pelagem espessa
        de inverno ou pelagem sensível).
    compatible_host_platform:
      name: Plataforma anfitriã compatível
      description: Especifica com que plataforma hospedada ou tipo de dispositivo
        o controlador de tablet é compatível (por exemplo, Windows, macOS, iOS, Android)
        ou se pode operar de forma independente, sem um computador.
    compatible_inflation_gas:
      name: Gás de insuflação compatível
      description: Especifica com que dispositivo o balão deve ser insuflado (ar,
        hélio ou ambos).
    compatible_injection_type:
      name: Tipo de injeção compatível
      description: Indica o sistema de injeção de combustível que o produto foi concebido
        para limpar.
    compatible_instrument_surface_material:
      name: Superfície/material do instrumento compatível
      description: Indica em que superfícies/materiais de instrumentos deve ser utilizado
        o polidor.
    compatible_intercom_system:
      name: Sistema de intercomunicação compatível
      description: Indica se o capacete está preparado/compatível para a montagem
        ou instalação de um sistema de intercomunicação/comunicação.
    compatible_interior_material:
      name: Material interior compatível
      description: 'Indica para que materiais do interior do veículo o removedor de
        nódoas é seguro/eficaz (p. ex.: alcatifa, estofos em tecido, pele, vinil).'
    compatible_kayak_type:
      name: Tipo de caiaque compatível
      description: Lista os estilos gerais de caiaque nos quais o kit de vela foi
        concebido para ser montado.
    compatible_license_plate_hole_pattern:
      name: Padrão de furos da matrícula compatível
      description: Especifica a configuração dos orifícios de montagem suportados
        pelo suporte (lado do veículo e/ou lado da placa de matrícula).
    compatible_license_plate_size:
      name: Tamanho de matrícula compatível
      description: Indica o tamanho regional ou dimensional da(s) matrícula(s) para
        a(s) qual(ais) o suporte/revestimento foi concebido.
    compatible_loom:
      name: Tear compatível
      description: Especifica o(s) tipo(s) de tear com que deve ser utilizado o batedor
        de tecelagem plana.
    compatible_loom_type:
      name: Tipo de tear compatível
      description: Indica a configuração de tecelagem com a qual o batedor deve ser
        utilizado (por exemplo, teares de pente rígido versus teares de tapeçaria).
    compatible_machine_type:
      name: Tipo de máquina compatível
      description: Indica o tipo de configuração de acolchoamento com que a estrutura
        foi concebida para funcionar (apenas acolchoamento à mão, máquina de costura
        doméstica, máquina de acolchoamento de braço longo).
    compatible_mast_type:
      name: Tipo de mastro compatível
      description: 'Especifica para que diâmetros de mastro a vela foi concebida:
        diâmetro reduzido (RDM), diâmetro standard (SDM) ou ambos.'
    compatible_model_system_train_scale:
      name: Sistema de modelo compatível (escala de comboio)
      description: 'Especifica a escala/sistema de modelismo ferroviário a que o acessório
        se adapta, quando aplicável (p. ex.: HO, N, O).'
    compatible_mounting_surface:
      name: Superfície de montagem compatível
      description: A superfície ou objeto para o qual o clipe foi concebido para se
        fixar.
    compatible_mouthpiece_patch:
      name: adesivo de bocal compatível
      description: Indica se o bocal foi concebido para utilização com almofadas/remendos
        para o bocal e a gama de espessuras sugerida para o remendo.
    compatible_mouthpiece_type:
      name: Tipo de bocal compatível
      description: Indica o tipo/encaixe do bocal para o qual o melofone foi concebido
        (normalmente, bocais de trompa ou trompete, dependendo do modelo).
    compatible_neck_profile_width:
      name: Perfil/largura de pescoço compatível
      description: Indica o perfil/largura do braço da guitarra para o qual o capo
        foi concebido (por exemplo, braço estreito de guitarra elétrica versus braço
        largo de guitarra clássica).
    compatible_needle_size:
      name: Tamanho de agulha compatível
      description: Indica os tamanhos/tipos de agulha que a caixa deve acomodar (por
        exemplo, bordado, tapeçaria, comprimentos de agulhas de costura manual).
    compatible_needle_system:
      name: Sistema de agulhas compatível
      description: 'Sistema(s) de agulha com o(s) qual(is) a máquina é compatível
        (p. ex.: 130/705H).'
    compatible_parking_brake_mechanism:
      name: Mecanismo de travão de estacionamento compatível
      description: Indica se a pinça de travão foi concebida para funcionar com um
        mecanismo de travão de estacionamento integrado.
    compatible_pedal_instrument_type:
      name: Tipo de instrumento de pedal compatível
      description: Especifica com que o pedal deve ser utilizado (por exemplo, piano
        digital, teclado/sintetizador, controlador MIDI).
    compatible_pedal_type:
      name: Tipo de pedal compatível
      description: 'Indica o estilo ou sistema de pedal para o qual a correia ou o
        clipe foi concebido (p. ex.: plataforma, SPD, Look Keo).'
    compatible_pin_type:
      name: Tipo de pino compatível
      description: O tipo de pinos com que o tapete foi concebido para utilizar (ou
        se é compatível com marcação de pinos).
    compatible_pipe_filter_size:
      name: Tamanho de filtro de tubo compatível
      description: Indica o tamanho ou o estilo do filtro que o tubo foi concebido
        para aceitar (ou que não é necessário qualquer filtro).
    compatible_plate_size:
      name: Tamanho de placa compatível
      description: Dimensão da placa balística ou tamanho normalizado que o colete
        pode acomodar.
    compatible_play_vehicle_scale:
      name: Escala do veículo de brincar compatível
      description: 'Indica a escala do brinquedo para a qual o acessório foi concebido
        (p. ex.: 1:64), melhorando o encaixe/compatibilidade para colecionadores e
        sistemas de carris.'
    compatible_playing_surface:
      name: Superfície de jogo compatível
      description: Indica o tipo de campo ou superfície para a qual as chuteiras de
        futebol americano foram concebidas.
    compatible_pole_dimensions:
      name: Dimensões do poste compatível
      description: Especifica o tamanho da secção transversal do poste para o qual
        o acessório se adapta.
    compatible_pole_shape:
      name: Forma de poste compatível
      description: Especifica a forma da secção transversal do poste ou coluna para
        a qual o equipamento foi concebido.
    compatible_power_steering_system:
      name: Sistema de direção assistida compatível
      description: Indica o(s) tipo(s) de sistema de direção a que se destina o fluido.
    compatible_powerplant_type:
      name: Tipo de central compatível
      description: 'Indica o sistema de propulsão da arma de pressão a que a peça
        se destina (p. ex.: mola-êmbolo, CO2, PCP).'
    compatible_presser_foot:
      name: Pé calcador compatível
      description: Especifica o sistema de montagem/compatibilidade do calcador suportado
        pela máquina de costura (por exemplo, encaixe por pressão versus encaixe por
        rosca; haste baixa/alta/inclinada). Utilize "Universal/Múltiplo" se forem
        suportados vários sistemas ou se estiverem incluídos adaptadores.
    compatible_protective_gear:
      name: Equipamento de proteção compatível
      description: Especifica com que outros equipamentos de proteção o protetor de
        pescoço foi concebido para funcionar.
    compatible_protective_gear_integration:
      name: Integração de equipamentos de proteção compatíveis
      description: Descreve como o protetor deve ser utilizado ou integrado noutros
        equipamentos (por exemplo, bolso interior, fixação independente por correia).
    compatible_punching_bag_type:
      name: Tipo de saco de boxe compatível
      description: Especifica com que estilos de sacos de boxe ou de treino o produto
        é compatível.
    compatible_racing_discipline:
      name: Modalidade de corrida compatível
      description: A(s) modalidade(s) de automobilismo para a(s) qual(is) o capacete
        foi concebido/certificado.
    compatible_rc_scale:
      name: Escala de RC compatível
      description: 'Indica a relação de escala RC (p. ex.: 1:10) para a qual o acessório
        ou a peça foi concebido.'
    compatible_recorder_size:
      name: Tamanho de gravador compatível
      description: Especifica o(s) tamanho(s) de gravador que a caixa foi concebida
        para acomodar.
    compatible_recorder_type:
      name: Tipo de gravador compatível
      description: 'Especifica o tipo de flauta de bisel (família/tamanho) com o qual
        o acessório é compatível (p. ex.: soprano, contralto).'
    compatible_reed_cut:
      name: Corte de palheta compatível
      description: Especifica com que estilo de corte da palheta a ligadura deve ser
        compatível (por exemplo, corte francês/figurino versus corte americano/sem
        lixa).
    compatible_reed_type:
      name: Tipo de palheta compatível
      description: Especifica o corte/tipo de palheta para o qual o bocal foi concebido.
    compatible_reel_type:
      name: Tipo de carreto compatível
      description: Especifica o estilo de carreto de pesca para o qual a bolsa, caixa
        ou capa foi concebida.
    compatible_refrigerant_type:
      name: Tipo de refrigerante compatível
      description: Indica qual o fluido refrigerante para o qual o evaporador do ar
        condicionado foi concebido.
    compatible_ride_equipment:
      name: Equipamento de deslizamento compatível
      description: Tipos de equipamento desportivo com rodas para os quais a rampa
        foi concebida.
    compatible_roof_height:
      name: Altura do telhado compatível
      description: Indica para que perfil de telhado foi concebida a cobertura (padrão
        ou telhado estendido/alto).
    compatible_roof_rail_type:
      name: Tipo de calha de teto compatível
      description: Especifica a configuração de telhado à qual o sistema base Estante
        foi concebido para ser fixado.
    compatible_rope_count:
      name: Número de cordas compatíveis
      description: Especifica a configuração das cordas do ringue de boxe para a qual
        a peça foi concebida, como por exemplo, ringues de 3 cordas, ringues de 4
        cordas ou encaixe universal.
    compatible_rope_type:
      name: Tipo de corda compatível
      description: Especifica que tipos de corda podem ser utilizados com o dispositivo.
    compatible_saddle_type:
      name: Tipo de sela compatível
      description: Especifica o estilo de sela ou a modalidade de equitação para a
        qual o acessório foi concebido, garantindo a correta compatibilidade com as
        selas inglesas, western e outras.
    compatible_saxophone_size:
      name: Tamanho de saxofone compatível
      description: 'Indica com que tamanho de saxofone o produto é compatível (p.
        ex.: soprano, alto, tenor).'
    compatible_saxophone_type:
      name: Tipo de saxofone compatível
      description: Especifica para que saxofone a braçadeira/tampa foi concebida.
    compatible_scale_length:
      name: Comprimento de escala compatível
      description: Identifica a gama de comprimento de escala da guitarra a que a
        cadeia se destina (por exemplo, escala curta, standard, barítono).
    compatible_seat_airbag:
      name: Airbag de assento compatível
      description: Indica se o sistema de assistência do banco/contém airbags laterais
        ou se é compatível com veículos equipados com airbags integrados nos bancos.
    compatible_seating_capacity:
      name: Capacidade de assentos compatível
      description: Especifica o número de bancos ou a configuração para a qual o acessório
        foi concebido.
    compatible_sensor_port_type:
      name: Tipo de porta de sensor compatível
      description: Especifica se o sistema inclui assistência ao nível do óleo e/ou
        sensores de temperatura do óleo, bem como o tipo de porta, se aplicável.
    compatible_shifter_type:
      name: Tipo de manete compatível
      description: Identifica o tipo ou configuração da alavanca de velocidades para
        a qual a coifa da alavanca foi concebida.
    compatible_shis:
      name: SHIS compatível
      description: 'Lista os códigos do Sistema de Identificação de Auscultadores
        Normalizado (SHIS) aos quais a peça se adapta (p. ex.: IS42, EC34, ZS44/28.6).'
    compatible_skating_discipline:
      name: Disciplina de patinagem compatível
      description: Indica a(s) modalidade(s) de patinagem para a(s) qual(is) a peça
        ou acessório foi concebido.
    compatible_snowshoe_deck_type:
      name: Tipo de plataforma para raquete de neve compatível
      description: Especifica o tipo de estrutura ou plataforma da raquete de neve
        com a qual a fixação é compatível.
    compatible_special_effects_lighting_features:
      name: Características de iluminação de efeitos especiais compatíveis
      description: Destaca as características comuns que influenciam as decisões de
        compra de luzes de efeito (para além da cor/padrão), como a interligação de
        unidades ou a resposta ao áudio.
    compatible_spinning_wheel_drive_system:
      name: Sistema de acionamento da roda de fiar compatível
      description: Especifica o(s) sistema(s) de acionamento da roda giratória que
        o acessório suporta.
    compatible_spoke_gauge:
      name: Calibre de raios compatível
      description: Indica o(s) calibre(s) do fio do raio e o encaixe da rosca do bocal,
        permitindo ao comprador combinar raios e bocais corretamente.
    compatible_steering_wheel_airbag:
      name: Airbag do volante compatível
      description: Indica se a assistência do volante mantém os módulos originais
        dos airbags (ou se se destina a aplicações sem airbag).
    compatible_steering_wheel_control_button:
      name: Botão de controlo do volante compatível
      description: Indica a compatibilidade com os comandos de fábrica montados no
        volante (áudio/piloto automático/telefone) e a cablagem relacionada.
    compatible_stencil_material:
      name: Material compatível para stencil
      description: 'Materiais que a máquina pode utilizar para criar stencils ou processar
        (p. ex.: Paper, filme plástico, mylar).'
    compatible_stencil_media_format:
      name: Formato de meio compatível com stencil
      description: 'Indica os fatores de forma de meios de stencil que a máquina suporta:
        folhas, rolos ou ambos.'
    compatible_strap_retractor:
      name: Afastador de pega compatível
      description: Indica se a correia é compatível com sistemas retráteis ou se foi
        concebida para cintos não retráteis (estáticos).
    compatible_string_instrument_finish:
      name: Acabamento compatível para instrumentos de cordas
      description: Especifica em que tipos de acabamento de instrumentos o polidor
        pode ser utilizado com segurança.
    compatible_substrate_material:
      name: Material de substrato compatível
      description: O(s) material(is) de superfície ao(s) qual(is) a tinta foi formulada
        para aderir.
    compatible_surface:
      name: Superfície compatível
      description: Especifica a superfície/material ao qual o adesivo de velcro deve
        aderir.
    compatible_surface_material:
      name: Material de superfície compatível
      description: Materiais da superfície do veículo nos quais o produto foi concebido
        para ser utilizado.
    compatible_tear_off_system:
      name: Sistema destacável compatível
      description: Indica se os óculos são compatíveis com películas descartáveis
        e/ou amovíveis, incluindo se possuem pinos de fixação para películas descartáveis.
    compatible_thermostat_type:
      name: Tipo de termóstato compatível
      description: Se o bocal de água/alojamento foi concebido para aceitar um termóstato
        e, em caso afirmativo, qual o tipo/tamanho.
    compatible_thread:
      name: Fio compatível
      description: Indica os tipos de linha/fio que o passador de linha foi concebido
        para identificar (por espessura/tipo).
    compatible_thread_spool_format:
      name: Formato de fio/bobine compatível
      description: Indica os formatos de fio a caixa foi concebida para armazenar
        (bobines, carretos, bobinas/cartões de fio dentário, cones, etc.).
    compatible_thread_yarn_tool:
      name: Ferramenta de fio e linha compatível
      description: 'Compatibilidade de máquina/sistema para ferramentas que são montadas
        ou utilizadas com outros equipamentos (p. ex.: máquina de costura, overlock,
        tear, roda de fiar).'
    compatible_tire_application:
      name: Aplicação de pneus compatível
      description: Indica o segmento de aplicação para o qual o desmantelador de pneus/jantes
        foi concebido (com base no pneu/jante que está a ser reparado, e não no modelo
        do veículo).
    compatible_tom_pad_mounting:
      name: Suporte compatível para tone pad
      description: Especifica o tipo de fixação do tom-tom eletrónico (por exemplo,
        fixação por grampo/haste, haste em L, suporte), o que influencia a compatibilidade
        com os sistemas de prateleira existentes.
    compatible_toy_vehicle_scale:
      name: Escala do veículo de brinquedo compatível
      description: Indica a escala do veículo de brinquedo ou o tamanho aproximado
        do veículo com o qual o conjunto é compatível.
    compatible_tpms_sensor_type:
      name: Tipo de sensor TPMS compatível
      description: Especifica se estão incluídos sensores TPMS de assistência à roda
        e/ou qualquer tipo de válvula/sensor necessário.
    compatible_training_equipment:
      name: Equipamento de treino compatível
      description: Lista os tipos de equipamento de treino ou fitness que podem ser
        fixados ao suporte.
    compatible_treadmill_design:
      name: Design de passadeira compatível
      description: Especifica o modelo de passadeira com o qual o acessório é compatível,
        como modelos dobráveis ou não dobráveis.
    compatible_tube:
      name: Câmara de ar compatível
      description: Indica o tipo de câmara de ar ou construção do pneu para o qual
        o remendo foi concebido, como butil, látex, TPU ou tubeless.
    compatible_valve_type:
      name: Tipo de válvula compatível
      description: Especifica com que tipo de válvula de latão o lubrificante é compatível.
    compatible_vaporizing_material:
      name: Material de vaporização compatível
      description: Indica os tipos de materiais que o dispositivo foi concebido para
        vaporizar.
    compatible_vehicle_windshield_fluid:
      name: Fluido do pára-brisas compatível com o veículo
      description: Alegações de compatibilidade relacionadas com o equipamento do
        veículo ou com o tratamento do vidro (por exemplo, seguro para revestimentos
        repelentes de chuva, seguro para lavadores de faróis).
    compatible_visor_system:
      name: Sistema de viseira compatível
      description: Indica com que tipos de viseira/sistema de inserção o capacete
        de moto é compatível.
    compatible_water_board_type:
      name: Tipo de prancha para desporto aquático compatível
      description: Que pranchas de desportos aquáticos o suporte foi concebido para
        transportar.
    compatible_water_sport_board_type:
      name: Tipo de prancha compatível para desportos aquáticos
      description: Lista os tipos de pranchas que o suporte foi concebido para transportar.
    compatible_watercraft_communication_standard:
      name: Norma de comunicação compatível com embarcações
      description: Especifica os padrões de comunicação/rede marítima ou protocolos
        de integração suportados para interoperabilidade com inclusão eletrónica.
    compatible_watercraft_engine_type:
      name: Tipo de motor de embarcação compatível
      description: Indica a configuração de motorização para a qual a peça é adequada
        (motor fora de bordo/motor central/sterndrive/motor a jato).
    compatible_weight_plate_diameter:
      name: Diâmetro da anilha compatível
      description: Especifica os diâmetros de anilhas que a máquina aceita.
    compatible_wheel_finish:
      name: Acabamento de roda compatível
      description: Especifica os acabamentos/materiais das rodas nos quais o produto
        de limpeza pode ser utilizado em segurança (conforme indicado pelo fabricante).
    compatible_whorl_drive_band_type:
      name: Tipo de banda de acionamento helicoidal compatível
      description: Especifica com que estilo de correia de transmissão a engrenagem
        helicoidal deve funcionar.
    compatible_wick_series:
      name: Série de pavios compatíveis
      description: Indica as séries/tipos comuns de pavio para os quais o separador
        foi concebido (nomenclatura da indústria), se especificado pelo vendedor.
    compatible_winder_head_bit:
      name: Cabeçote/broca de enrolamento compatível
      description: Especifica o estilo da interface da chave/cabeça do afinador e
        do sistema de enrolamento (por exemplo, cabeça com fenda, pontas intercambiáveis,
        cabeça universal).
    compatible_windlass_rode:
      name: Cabo de guincho compatível
      description: Especifica o tipo de cabo de âncora para o qual o guincho foi concebido.
    compatible_windshield_type:
      name: Tipo de para-brisas compatível
      description: Especifica com que configuração de para-brisas o compartimento
        foi concebido para funcionar.
    compatible_wood:
      name: Madeira compatível
      description: Especifica para que tipos de madeira de escama o polimento é recomendado/seguro.
    compatible_writing_surface:
      name: Superfície de escrita compatível
      description: Especifica as superfícies/papéis com que a tinta deve funcionar
        melhor.
    compatible_zipper_size:
      name: Tamanho de fecho compatível
      description: 'Indica o tamanho do fecho para o qual o puxador foi concebido
        (geralmente expresso como #3, #5, #8, #10), melhorando a filtragem de compatibilidade.'
    compliance_certification:
      name: Certificação de conformidade
      description: A barra de luz cumpre as normas de conformidade/aprovação para
        utilização em vias públicas e a compatibilidade eletromagnética.
    component_position:
      name: Posição do componente
      description: Especifica a posição relativa da peça dentro do conjunto de distribuição
        do motor (por exemplo, tampa dianteira versus traseira, superior versus inferior).
        Não é o ponto de apresentação dianteiro/traseiro do veículo.
    concentration_level:
      name: Nível de concentração
      description: Indicação qualitativa da concentração do concentrado de tomate
        (simples, dupla, tripla), útil para satisfazer os requisitos da receita.
    concentration_type:
      name: Tipo de concentração
      description: Indica se o produto está pronto a utilizar ou se é concentrado
        e (se for concentrado) fornece orientações típicas de diluição.
    concert_bass_drum_mounting_stand_type:
      name: Suporte de montagem para bombo de concerto
      description: Como o bombo de concerto é apoiado ou montado para a atuação.
    concert_pitch_standard:
      name: Padrão de afinação de concerto
      description: Especifica a afinação de referência (A4) para a qual o piano está
        afinado no momento da venda (por exemplo, A440, A442, A444).
    condiment_form:
      name: Forma de condimento
      description: 'Indica a forma física ou consistência do produto de rábano (p.
        ex.: pasta, pó, creme).'
    condiment_texture:
      name: Textura do condimento
      description: Descreve a consistência física do molho ou chutney (por exemplo,
        com pedaços, suave).
    confetti_format:
      name: Formato de confete
      description: Especifica o formato do produto confete com base na forma como
        o confete é embalado ou lançado (por exemplo, dispersão solta versus lançadores/canhões).
    conga_head_tensioning_system:
      name: Sistema de tensionamento da cabeça do conga
      description: 'Tipo de equipamento utilizado para tensionar/afinar a pele do
        conga (p. ex.: afinação tradicional por parafusos de afinação versus mecanismos
        modernos de afinação rápida).'
    conga_set_included_drum_types:
      name: Tipos de tambores incluídos no conjunto do conga
      description: Que tipos de conga estão incluídos num conjunto de conga (por exemplo,
        quinto + conga + tumba).
    connector_case_style:
      name: Estilo da caixa do conector
      description: Classifica o estilo geral de construção do conector da caixa (por
        exemplo, revestimento rígido versus bolsa macia) para refletir o nível de
        proteção e portabilidade.
    console_cover_installation_method:
      name: Método de instalação da tampa da consola
      description: Especifica a forma como a cobertura da consola se fixa à consola/apoio
        de braço (por exemplo, encaixe, tiras elásticas, velcro, adesivo, encaixe
        por pressão).
    console_display_type:
      name: Tipo de visualização da consola
      description: Identifica o tipo de visor do utilizador fornecido na máquina (por
        exemplo, LCD, LED, ecrã táctil).
    construction_design:
      name: Conceção da estrutura
      description: 'Indica quantas peças articuladas constituem a almofada, o que
        afeta a mobilidade (p. ex.: 1 peça vs. 3 peças).'
    contact_angle:
      name: Ângulo de contacto
      description: Especifica o ângulo de contacto das pistas do rolamento, expresso
        como um único ângulo ou um conjunto de ângulos (por exemplo, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Tipo de enchimento de bola de malabarismo de contacto
      description: Identifica se a bola é maciça ou preenchida (e, se for preenchida,
        qual o tipo de enchimento), o que afeta a distribuição do peso e a durabilidade.
    contact_juggling_ball_transparency:
      name: Transparência da bola de malabarismo de contacto
      description: Especifica a transparência/aparência ótica da bola.
    contact_surface_material:
      name: Material da superfície de contacto
      description: 'Identifica o material utilizado nos pontos de contacto que tocam
        o instrumento (p. ex.: cortiça/borracha) para evitar riscos e melhorar a aderência.'
    container_material:
      name: Material do recipiente
      description: 'Especifica o material principal da embalagem de retalho do produto
        (p. ex.: vidro, plástico PET, alumínio).'
    contaminant_removal:
      name: Remoção de contaminantes
      description: Lista as classes de contaminantes que o produto está certificado
        para remover ou reduzir.
    contra_alto_clarinet_body_configuration:
      name: Configuração do corpo do clarinete contra-alto
      description: Descreve o formato físico da construção do clarinete contra-alto
        (por exemplo, desenhos retos versus dobrados).
    contra_alto_clarinet_lowest_note_extension:
      name: Extensão da nota mais grave do clarinete contra-alto
      description: Especifica a extensão da nota mais grave que o instrumento pode
        tocar (a nota mais grave que o mecanismo permite), normalmente utilizada para
        distinguir modelos com Mi bemol grave, Ré grave e Dó grave.
    contra_bass_clarinet_bell_type:
      name: Tipo de sino do clarinete contrabaixo
      description: Configuração da campânula utilizada no clarinete contrabaixo.
    contra_bass_clarinet_bore_type:
      name: Tipo de diâmetro interno do clarinete contrabaixo
      description: Desenho do orifício do instrumento.
    contra_bass_clarinet_lowest_written_note:
      name: Nota mais grave escrita para o clarinete contrabaixo
      description: A nota escrita mais grave que o instrumento consegue tocar (depende
        geralmente da extensão do Dó grave em comparação com a extensão do Mi bemol
        grave).
    control_arm_bushing_material:
      name: Material da bucha do braço de controlo
      description: Especifica o material das buchas incluídas/instaladas, se existirem.
    control_arm_bushings_included:
      name: Casquilhos do braço de controlo incluídos
      description: Indica se o braço de suspensão é fornecido com casquilhos já instalados.
    control_arm_finish:
      name: Acabamento do braço de controlo
      description: Especifica o acabamento protetor aplicado ao braço de controlo
        (proteção contra a corrosão e aparência).
    control_arm_grease_fitting_type:
      name: Tipo de encaixe de lubrificação do braço de controlo
      description: Especifica se o conjunto do braço de controlo/junta esférica inclui
        um bico de lubrificação (zerk) e se este pode ser reparado.
    control_arm_material:
      name: Material do braço de controlo
      description: Especifica o material principal e o processo de fabrico do corpo
        do braço de controlo.
    control_arm_position:
      name: Posição do braço de controlo
      description: Especifica a posição da suspensão para a qual o braço de controlo
        foi concebido dentro do contexto do canto/lado do eixo (por exemplo, superior/inferior,
        dianteiro/traseiro, esquerdo/direito).
    control_arm_style:
      name: Estilo do braço de controlo
      description: Identifica o estilo geométrico/de design do braço de controlo utilizado
        no esquema de suspensão.
    control_cable_connector_type:
      name: Tipo de conector do cabo de controlo
      description: Especifica o tipo de extremidade/conector utilizado pelo(s) cabo(s)
        de comando para a ligação com o sistema de comando e o motor (por exemplo,
        terminais específicos do fabricante original).
    control_voltage_or_gate_connectivity:
      name: Tensão de controlo ou conectividade da porta
      description: Especifica o suporte à ligação de tensão de controlo/porta para
        integração com equipamento modular/analógico.
    controller_function:
      name: Função do controlador
      description: Define a função principal da placa de controlo da passadeira, como
        o controlo do motor, a fonte de alimentação ou o variador de frequência.
    controller_type:
      name: Tipo de controlador
      description: Especifica o controlador/sistema de controlo do motor incluído
        no kit de conversão para veículos elétricos da scooter (ou necessário para
        utilização), com foco nas características do controlador relevantes para a
        compatibilidade e desempenho.
    conversion_kit_cooling_method:
      name: Método de arrefecimento do kit de conversão
      description: Abordagem primária de gestão térmica utilizada para a integração
        do motor/inversor/bateria.
    conversion_kit_installation_complexity:
      name: Complexidade de instalação do kit de conversão
      description: Nível de esforço de instalação previsto com base na capacidade/ferramentas
        típicas necessárias do cliente.
    converted_bed_size:
      name: Tamanho da cama convertida
      description: Indica o tamanho ou a configuração da cama em que o berço será
        convertido quando este kit for instalado.
    convertible_configuration:
      name: Configuração convertível
      description: 'Indica quantas configurações de cama diferentes o produto pode
        assumir (p. ex.: berço 3 em 1 → cama de criança → sofá-cama).'
    convertible_high_chair_modes:
      name: Modos de conversão da cadeira alta
      description: Especifica as definições de assento em que a cadeira pode ser convertida.
    cookie_decorating_kit_items_included:
      name: Itens incluídos no kit para decoração de bolachas
      description: A caixa lista os componentes de decoração individuais fornecidos
        para que os clientes saibam exatamente o que está incluído (por exemplo, tubos
        de glacé, confeitos, cortadores de bolachas).
    cookie_variety:
      name: Variedade de bolachas
      description: Identifica o estilo ou variedade específica de biscoitos, ajudando
        os compradores a encontrar rapidamente o tipo da sua preferência.
    cooking_state:
      name: Estado de cozedura
      description: Indica o nível de preparação do produto de frango no momento da
        venda (cru, totalmente cozinhado, marinado, etc.).
    coolant_additive_purpose:
      name: Finalidade do aditivo para líquido de refrigeração
      description: Principais funções pretendidas do aditivo para líquido de refrigeração
        (não se trata de um produto de limpeza para radiadores ou selante específico).
    coolant_base_fluid:
      name: Fluido base do líquido de refrigeração
      description: Identifica a base glicólica primária utilizada na formulação do
        anticongelante/líquido de refrigeração.
    coolant_outlet_connection_style:
      name: Estilo de ligação da saída do líquido de refrigeração
      description: Tipo de interface de ligação de saída utilizada para ligar uma
        mangueira do radiador ou um tubo de líquido de refrigeração.
    coolant_outlet_neck_angle:
      name: Ângulo do pescoço de saída do líquido de refrigeração
      description: O ângulo/orientação da saída do bocal de água em relação à flange
        de montagem/motor (útil para o direcionamento da mangueira superior do radiador).
    coolant_technology:
      name: Tecnologia do líquido de refrigeração
      description: Especifica a família química/tecnológica do líquido de refrigeração
        utilizada pelo anticongelante/líquido de refrigeração (conforme normalmente
        indicado na embalagem).
    coolant_temperature_sensor_port:
      name: Orifício do sensor de temperatura do líquido de refrigeração
      description: Se o bocal de refrigeração inclui uma porta para um sensor ou interruptor
        de temperatura do líquido de refrigeração e qual a interface que utiliza.
    coolant_temperature_sensor_seal_type:
      name: Tipo de vedação do sensor de temperatura do líquido de refrigeração
      description: Tipo de método de vedação utilizado entre o sensor e o motor/passagem
        do líquido de refrigeração.
    cooling_system_component_included:
      name: Componente do sistema de refrigeração incluído
      description: Lista os componentes adicionais do sistema de refrigeração incluídos
        com a bomba de água.
    cooling_system_flush_application_step:
      name: Etapa da aplicação de limpeza do sistema de arrefecimento
      description: 'Indica onde o produto se enquadra no processo de assistência (p.
        ex.: produto de limpeza de pré-lavagem versus enxaguamento/neutralizador final).'
    cooling_system_type:
      name: Tipo de sistema de refrigeração
      description: Especifica a configuração do sistema de refrigeração utilizado
        por um motor marítimo de centro (por exemplo, água bruta/circuito aberto,
        circuito fechado/água doce com permutador de calor, refrigeração por quilha).
    cord_material:
      name: Material do cordão
      description: Especifica o material do cordão/cadeia utilizado para puxar a escova
        através do saxofone.
    core_type_bass_strings:
      name: Tipo de núcleo (cadeia de baixo)
      description: Especifica a forma principais da cadeia, que influencia a sensação
        e a flexibilidade.
    cork_grease_base_material:
      name: Material base do lubrificante de cortiça
      description: 'Base primária da formulação do lubrificante de cortiça (p. ex.:
        à base de lanolina).'
    cork_grease_form:
      name: Forma de lubrificante de cortiça
      description: O formato físico do produto de lubrificante de cortiça.
    corn_presentation:
      name: Apresentação do milho
      description: Especifica a apresentação física ou a forma do produto de milho
        (por exemplo, inteiro com casca, grãos, pó).
    corn_syrup_variety:
      name: Variedade de xarope de milho
      description: Especifica o estilo ou variante de processamento particular do
        xarope.
    corn_variety:
      name: Variedade de milho
      description: Identifica a variedade botânica ou de mercado específica do milho
        que está a ser vendido, permitindo ao comprador distinguir entre tipos que
        diferem em sabor, textura, cor e utilização culinária.
    corner_compatibility:
      name: Compatibilidade com os cantos
      description: Especifica o forma dos cantos da mesa (quadrado ou redondo) para
        os quais a capa foi concebida.
    corner_flag_features:
      name: Características das bandeirinhas de canto
      description: Destaca as características funcionais especiais ou as melhorias
        da bandeira de canto (por exemplo, mastro rebatível, material refletor).
    cornet_mouthpiece_shank_type:
      name: Tipo de haste do bocal do cornetim
      description: Especifica o padrão de encaixe/haste do bocal compatível com o
        cornetim.
    cornhole_league_certification:
      name: Certificação da liga Cornhole
      description: Indica as certificações oficiais ou aprovação da liga que o produto
        cumpre.
    corrosion_resistance:
      name: Resistência à corrosão
      description: Especifica a definição de teste ou a classificação de resistência
        à corrosão do suporte/fixador para exposição no exterior.
    corrosion_resistance_level:
      name: Nível de resistência à corrosão
      description: Indica uma proteção contra a corrosão adequada para ambientes de
        água doce/salgada.
    costume_components_included:
      name: Componentes do fato incluídos
      description: Enumera as peças de vestuário e acessórios incluídos no traje,
        esclarecendo o que faz parte do conjunto.
    cotton_weave_type:
      name: Tipo de tecido de algodão
      description: Descreve a construção da trama/malha da superfície de algodão imprimível
        que afeta a textura e a nitidez da impressão.
    counter_type:
      name: Tipo de contraponto
      description: Indica a presença e o estilo de repetição integrada ou de seguimento
        de força.
    counterweight_fill_material:
      name: Material de enchimento do contrapeso
      description: Indica a substância que pode ser utilizada para adicionar lastro
        ou pré-encher o contrapeso.
    counterweight_type:
      name: Tipo de contrapeso
      description: Especifica o estilo de design ou construção do contrapeso, como
        saco de areia ou placa de aço, para auxiliar na compatibilidade e instalação.
    coupler_system:
      name: Sistema de acoplamento
      description: Tipo/sistema de engate instalado na locomotiva modelo para compatibilidade
        com o material circulante.
    court_surface_suitability:
      name: Adequação da superfície da quadra
      description: Indica o tipo de superfície do campo de basquetebol para o qual
        a sola do ténis foi concebida, ajudando os compradores a escolher a tração
        e a durabilidade adequadas para campos de madeira interiores, asfalto/betão
        exteriores ou ambos.
    cover_fit_style:
      name: Estilo de ajuste da capa
      description: Descreve como a capa se ajusta à mesa, afetando a aparência e o
        nível de proteção.
    cover_fit_type:
      name: Tipo de ajuste da capa
      description: Indica se a capa é feita à medida (personalizada/semipersonalizada)
        ou universal, e se se destina à amarração à água ou ao armazenamento/utilização
        em reboque.
    cowbell_beater_type:
      name: Tipo de batedor de sino de vaca
      description: Tipo de instrumento de percussão recomendado para o som/acabamento
        do sino de vaca (se especificado pelo produto).
    cowbell_mounting_method:
      name: Método de montagem do chocalho
      description: Como o sino de vaca deve ser montado/usado (manual ou montado em
        equipamento).
    cowbell_sound_character:
      name: Sonoridade do chocalho
      description: Caráter tonal geral utilizado na listagem (assistência descoberta
        para além do tamanho).
    cradle_capacity:
      name: Capacidade do berço
      description: Indica se o berço foi concebido para acomodar um único bebé ou
        gémeos.
    craft_cutter_embosser_machine_operation:
      name: Funcionamento da máquina de corte/relevo para manualidades
      description: Especifica como a máquina de corte/gravadora opera a partir da
        perspetiva do fluxo de trabalho do utilizador (por exemplo, manivela manual,
        botão elétrico, controlado app ).
    craft_decoration_maker_accessories_included:
      name: Acessórios da máquina de criação de decorações incluídos
      description: Lista os principais acessórios incluídos com a máquina de criação
        de decorações (por exemplo, fita/película inicial, recargas de autocolantes,
        cartuchos de purpurinas, ferramentas de limpeza).
    craft_foil_application_method:
      name: Método de aplicação de lâmina decorativa
      description: Identifica a forma como a folha Craft deve ser aplicada/ativada
        (adesivo, calor, toner/reativo, etc.).
    craft_foil_format:
      name: Formato de folha Craft
      description: 'Indica o formato físico da folha Craft tal como é vendida (p.
        ex.: rolo ou folhas).'
    craft_glue_finish:
      name: Acabamento com cola Craft
      description: 'Descreve o aspeto da cola após a secagem (p. ex.: transparente,
        branco/opaco, translúcido, brilhante/mate).'
    craft_magnet_application:
      name: Aplicação de ímanes em manualidades
      description: Utilização principal prevista em manualidades ou superfície de
        montagem para o íman do produto.
    craft_magnet_holding_strength_level:
      name: Nível de força de retenção do íman Craft
      description: Categoria de força relativa dos ímanes Craft para ajudar os compradores
        a escolher a força de fixação adequada para o seu projeto.
    craft_organizer_storage_features:
      name: Recursos de armazenamento do organizador Craft
      description: Descreve as características de organização e os elementos de armazenamento
        interno dos organizadores Craft (por exemplo, divisórias ajustáveis, gavetas,
        bolsos transparentes).
    craft_scoring_board_included_accessories:
      name: Prancheta de pontuação Craft com acessórios incluídos
      description: 'Acessórios incluídos com a prancheta de marcação (p. ex.: caneta
        de marcação/dobrador de lombadas, triângulo, ferramenta para envelopes).'
    craft_scoring_board_measurement_system:
      name: Sistema de medição de placa de pontuação Craft
      description: Especifica o sistema de medidas marcado na régua de pontuação (imperial,
        métrico, duplo ou sem marcação).
    craft_wire_finish_coating:
      name: Acabamento/revestimento de arame Craft
      description: Especifica o acabamento superficial ou revestimento aplicado ao
        fio para fins de cor, resistência à oxidação ou proteção.
    craft_wood_surface_preparation:
      name: Preparação da superfície da madeira Craft
      description: 'Indica se a superfície da madeira está pronta para acabamento/pintura
        ou se necessita de preparação (p. ex.: lixagem/aplicação de primário).'
    crank_spindle_interface:
      name: Interface do veio da cambota
      description: Especifica o sistema de eixo do pedaleiro e o sistema de assistência
        do eixo pedaleiro (por exemplo, SRAM DUB, Square Taper), garantindo a compatibilidade
        entre o pedaleiro e o eixo pedaleiro.
    crankshaft_balance_type:
      name: Tipo de equilíbrio da cambota
      description: Indica se a cambota está internamente equilibrada (neutro) ou externamente
        equilibrada (requer equilibrador harmónico/contrapesos no volante do motor).
    crankshaft_bolt_pattern:
      name: Padrão de parafusos da cambota
      description: Padrão de furação na flange traseira para fixação do volante/placa
        flexível.
    crankshaft_sensor_reluctor_type:
      name: Sensor da cambota tipo relutor
      description: Configuração do sensor de posição da cambota/roda relutora utilizada
        (quando aplicável).
    craps_accessories_included:
      name: Acessórios de jogo de dados incluídos
      description: Identifica os acessórios adicionais específicos do jogo de craps,
        para além dos dados, fichas e tabuleiro.
    crash_cymbal_profile:
      name: Perfil do prato de ataque
      description: Curvatura/perfil geral do prato (quão pronunciada é a curvatura),
        que influencia o tom e a resposta.
    crash_cymbal_sound_character:
      name: Sonoridade do prato crash
      description: Descritores tonal primário para o som do prato de ataque.
    crash_pad_size_class:
      name: Classe de tamanho de colchão de impacto
      description: Indica a categoria geral de tamanho de um colchão de escalada,
        dando ao comprador uma sensação rápida da área coberta sem a necessidade de
        dimensões exatas.
    crate_engine_assembly_level:
      name: Nível de montagem do motor em caixa
      description: Em que medida o motor em caixa é completo na sua forma de envio
        (quais os principais componentes incluídos).
    cream_base_ingredient:
      name: Ingrediente base do creme
      description: Identifica a principal fonte do creme, abrangendo tanto os produtos
        lácteos como as alternativas de origem vegetal.
    cream_cheese_base:
      name: Base de queijo cremoso
      description: Identifica a principal fonte láctea ou vegetal utilizada no fabrico
        do queijo creme, auxiliando o comprador em considerações dietéticas, de alergias
        e Taste .
    cream_cheese_form:
      name: Forma do queijo creme
      description: Descreve a forma física ou a textura do queijo creme (por exemplo,
        em bloco, batido, para molho), o que influencia a sua capacidade de ser espalhado
        e a sua utilização pretendida.
    cream_variety:
      name: Variedade de creme
      description: 'Identifica o tipo específico de creme com base no teor de gordura,
        método de processamento ou utilização culinária prevista (ex.: creme meio-gordo,
        creme duplo, creme para cozinhar).'
    crib_accessory_features:
      name: Características dos acessórios para berços
      description: Lista características funcionais ou orientadas para o conforto
        específicas dos acessórios para berços e camas de criança, como a respirabilidade
        ou as bordas elásticas.
    crib_bumper_features:
      name: Características do protetor de berço
      description: Destaca as características funcionais específicas de um protetor
        de berço.
    crib_conversion_kit_components:
      name: Componentes do kit de conversão para berço
      description: Lista as principais peças incluídas no kit para que o comprador
        possa verificar se tem tudo o que é necessário para a instalação.
    cricket_ball_grade:
      name: Qualidade da bola de críquete
      description: Especifica o nível de qualidade ou o padrão de jogo pretendido
        para a bola.
    cricket_ball_piece_construction:
      name: Construção de peças de bola de críquete
      description: Indica o número de peças exteriores ou secções moldadas utilizadas
        para construir a casca da bola, um indicador chave de qualidade e preço.
    cricket_ball_type:
      name: Tipo de bola de críquete
      description: Especifica o tipo de bola de críquete fornecido com o produto ou
        indica se não está incluída nenhuma bola.
    cricket_bat_accessory_type:
      name: Tipo de acessório para taco de críquete
      description: Especifica o tipo de acessório ou item de manutenção para o taco
        de críquete, para que o comprador possa filtrar rapidamente o produto de que
        necessita.
    cricket_bat_size:
      name: tamanho do taco de críquete
      description: Indica a classificação padronizada do tamanho do taco de críquete
        (0–6, Harrow, SH, LH), normalmente escolhida com base na idade e altura do
        jogador.
    cricket_bat_size_compatibility:
      name: Compatibilidade de tamanho de taco de críquete
      description: Indica o tamanho do bastão para o qual o acessório foi concebido,
        garantindo uma compatibilidade adequada.
    cricket_helmet_role:
      name: função do capacete de críquete
      description: Indica a função para a qual o capacete foi concebido, como batedor
        ou guarda-redes.
    cricket_leg_guard_type:
      name: Tipo de caneleira de grilo
      description: Indica o estilo específico de proteção para as pernas utilizado
        no críquete.
    cricket_player_role:
      name: função do jogador de críquete
      description: Especifica a função principal para a qual o calçado foi concebido.
    cricket_protection_grade:
      name: Grau de proteção para o críquete
      description: Especifica a classificação do grau de proteção atribuída pelo fabricante
        do equipamento de críquete.
    cricket_stump_base_type:
      name: Tipo de base dos postes de críquete
      description: Indica o estilo ou material base fornecido com os cepos, afetando
        a estabilidade e a adequação da superfície de jogo.
    cricket_stump_target_features:
      name: Características do alvo do cepo de grilo
      description: Highlight as características funcionais distintas que melhoram
        a usabilidade, a visibilidade, a durabilidade ou a estabilidade do treino.
    cricket_stump_type:
      name: Tipo de toco de grilo
      description: Classifica o estilo ou a construção dos stumps para ajudar o comprador
        a escolher entre os stumps tradicionais para partidas, variantes de treino
        ou modelos modernos iluminados.
    cricket_training_focus:
      name: Objetivo do treino de críquete
      description: O auxílio foi concebido para melhorar a capacidade ou disciplina
        primária do críquete.
    croquet_set_components_included:
      name: Componentes incluídos no conjunto de críquete
      description: 'Lista todos os componentes principais fornecidos com o conjunto
        (p. ex.: wickets, estacas, bolsa de transporte) para que os clientes entendam
        exatamente o que estão a comprar.'
    cross_country_binding_system:
      name: Sistema de encadernação Cross-país
      description: Especifica a norma de fixação de esqui de fundo para a qual o produto
        foi perfurado ou com a qual é compatível.
    cross_stitch_chart_symbol_type:
      name: Tipo de símbolo do gráfico de ponto cruz
      description: Como o gráfico é representado (símbolos, Colors ou ambos).
    cross_stitch_finishing_type:
      name: Tipo de acabamento em ponto cruz
      description: Tipo de acabamento/exposição pretendido para o projeto bordado.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mecanismo de fixação do tecido à moldura de ponto cruz
      description: Indica como o tecido é fixado/tensionado à moldura (por exemplo,
        clipes, grampos, tachas), o que Impact na facilidade de utilização e na compatibilidade
        do tecido.
    cross_stitch_frame_included_components:
      name: Componentes incluídos na moldura de ponto cruz
      description: 'Lista o que vem na caixa (p. ex.: apenas estrutura vs. estrutura
        + grampos + suporte), reduzindo ambiguidades e devoluções.'
    cross_stitch_frame_type:
      name: Tipo de moldura para ponto de cruz
      description: Especifica a construção/tipo da moldura de ponto cruz (como o tecido
        é segurado), afetando a usabilidade e a compatibilidade do projeto.
    cross_stitch_pattern_technique:
      name: técnica de ponto cruz
      description: A técnica/estilo de ponto cruz exigido pelo gráfico.
    crossbar_shape_profile:
      name: Forma/perfil da barra transversal
      description: Especifica a forma aerodinâmica/de perfil da barra transversal.
    crossbar_style:
      name: Estilo da barra transversal
      description: Identifica o estilo de construção da barra transversal, distinguindo
        as barras rígidas de competição das barras flexíveis ou híbridas de treino.
    crossbow_type:
      name: Tipo de besta
      description: Identifica o estilo de design fundamental da besta, como composta,
        recurva ou pistola. O estilo de construção impulsiona o desempenho, o tamanho
        e a utilização da caixa interior, pelo que os compradores filtram frequentemente
        através dele.
    crossover_component_type:
      name: Tipo de componente de cruzamento
      description: Identifica a topologia do componente principal utilizada na rede
        de cruzamento passivo.
    crossover_configuration:
      name: Configuração do crossover
      description: Indica se o cruzamento utiliza um único ponto de cruzamento ou
        múltiplos pontos (por exemplo, projetos de 2 vias versus projetos de 3 vias).
    crossover_type:
      name: Tipo rede de cruzamento
      description: Tipo de rede de cruzamento incluída no conjunto de componentes.
    crown_profile:
      name: Perfil da coroa
      description: Especifica a altura/perfil da coroa do boné acima da pala.
    crown_style:
      name: Estilo coroa
      description: Define a silhueta ou o perfil geral da copa de um chapéu de coco.
    crust_taste_profile:
      name: Perfil de sabor da crosta
      description: Indica se o sabor inerente da crosta é doce, salgado ou neutro.
    crystal_finish:
      name: Acabamento cristalino
      description: Descreve o acabamento superficial, o revestimento ou o estado de
        processamento do cristal solto (por exemplo, em bruto, polido, rolado, facetado,
        fosco, revestido com aura, tingido, tratado termicamente).
    crystal_material:
      name: Material cristalino
      description: Especifica o material utilizado no vidro do relógio que protege
        o mostrador.
    crystalline_finish_style:
      name: Estilo com acabamento cristalino
      description: O aspeto cristalino/em forma de penas característico produzido
        pela cera de palma em velas acabadas.
    cucumber_variety:
      name: Variedade de pepino
      description: 'Especifica a cultivar ou variedade de mercado do pepino (ex.:
        inglês, persa, Kirby).'
    cue_compatibility:
      name: Compatibilidade com tacos
      description: Indica a configuração da junta do taco que a caixa interior foi
        concebida para acomodar, como tacos de uma só peça ou tacos com junta de 3/4.
    cue_construction:
      name: Construção do taco
      description: Indica como o taco é construído — número de peças ou se é um componente
        parcial, como apenas a base ou apenas a haste — afetando a portabilidade e
        a compatibilidade.
    cue_head_material:
      name: Material da ponta do taco
      description: Identifica o material da cabeça do taco (a parte que entra em contacto
        com o disco), o que afeta a durabilidade e a proteção da superfície.
    cue_sport_compatibility:
      name: Compatibilidade com o desporto de bilhar
      description: Identifica para que modalidade de bilhar o acessório foi concebido.
    cue_thread_size:
      name: Tamanho thread sinalização
      description: Especifica a thread utilizada nas extensões, protetores de juntas,
        parafusos de peso e outros acessórios de tacos de bilhar para garantir o encaixe
        correto.
    cue_tip_hardness:
      name: dureza da ponta do taco
      description: Avalia a firmeza da ponta do taco, que influencia o controlo e
        feedback da bola branca.
    cuff_height:
      name: Altura do punho
      description: Indica a altura do cano da bota (baixo, médio, alto, amovível/ajustável),
        que influencia o suporte e a flexibilidade.
    cuff_position:
      name: Posição do punho
      description: Indica em que parte do corpo do cavaleiro deve ser fixada a algema
        da guia.
    cultivation_method:
      name: Método de cultivo
      description: Especifica a forma como os verdes eram cultivados, abrangendo as
        técnicas de cultivo e as práticas agrícolas.
    cup_type:
      name: Tipo de chávena
      description: Indica o perfil da superfície da lantejoula (plana ou côncava)
        e a profundidade da cavidade, o que pode afetar o brilho, a textura e a forma
        como se posiciona quando cosida ou colada.
    cupcake_size:
      name: Tamanho do queque
      description: 'Especifica a categoria de tamanho físico dos cupcakes vendidos
        (ex.: Shop Mini, standard, jumbo).'
    curd_size:
      name: Tamanho da coalhada
      description: Especifica o tamanho ou a textura dos grãos de queijo cottage.
    cure_method:
      name: Método de cura
      description: Descreve o processo necessário para que o adesivo endureça ou cure
        (por exemplo, luz UV, humidade do ar, calor).
    curing_or_preparation_method:
      name: Método de cura ou preparação
      description: Especifica a forma como as azeitonas foram curadas ou preparadas
        de outra forma (por exemplo, curadas em salmoura, curadas em azeite, grelhadas).
    curling_broom_head_material:
      name: Material para cabeça de vassoura de ondulação
      description: Identifica a composição principal do material da cabeça ou almofada
        da vassoura.
    curling_broom_head_type:
      name: Tipo de cabeça de vassoura encaracolada
      description: Especifica o estilo ou a construção da cabeça/almofada de varrimento.
    curling_shoe_slider_material:
      name: Material para deslizador de sapatos de curling
      description: Identifica o material principal da sola deslizante utilizada nos
        sapatos de curling.
    curling_training_aid_type:
      name: Tipo de auxílio para treino de curling
      description: Identifica o tipo de acessório de treino de curling.
    curry_variety:
      name: Variedade de caril
      description: Classifica os molhos de caril Produtos de acordo com o estilo ou
        receita específica de caril que se destinam a criar, como Tikka Masala, Massaman
        ou Thai Verde, para permitir uma filtragem precisa por sabor/estilo.
    cushion_rubber_profile:
      name: Perfil de borracha de amortecimento
      description: Código de forma ou perfil das peças de borracha de amortecimento
        dos carris.
    cushioning_level:
      name: Nível de amortecimento
      description: Indica a quantidade de material sob os pés que a meia oferece para
        proteção contra impactos e conforto.
    custom_label_content_type:
      name: Tipo de conteúdo de etiqueta personalizada
      description: Especifica que informações serão personalizadas na etiqueta cosida
        (por exemplo, nome, logótipo, mensagem, tamanho, símbolos de cuidado, informações
        de contacto).
    customization_type:
      name: Tipo de personalização
      description: Especifica se a camisola é lisa, fornecida ao jogador ou personalizada
        com um nome/número personalizado.
    cut_or_preparation_style:
      name: Corte ou estilo de preparação
      description: Especifica a forma como os pedaços de legumes são cortados ou preparados
        dentro da lata ou do frasco (por exemplo, inteiros, em cubos, em tiras).
    cut_resistance_rating:
      name: Classificação da resistência ao corte
      description: Especifica o nível de resistência ao corte do item, testado formalmente.
    cut_type:
      name: Tipo de corte
      description: Indica se o tecido é vendido por jarda/metro, pré-cortado ou em
        rolo.
    cutting_application:
      name: Aplicação de corte
      description: Utilização principal prevista para o corte - caixa interna para
        a tesoura.
    cutting_mat_grid_style:
      name: Tapete de corte em formato Grid
      description: O guia impresso está posicionado na superfície do tapete.
    cutting_mat_intended_use:
      name: Utilização prevista da base de corte
      description: A principal utilização da superfície de trabalho/manualidade para
        a caixa interior, para a qual foi concebida a base de corte.
    cv_boot_clamp_type:
      name: Tipo de braçadeira para junta homocinética
      description: Especifica o tipo de braçadeira/fita utilizada para fixar a junta
        homocinética.
    cv_boot_kit_contents:
      name: Conteúdo do kit de exaustor da junta homocinética
      description: 'Lista o que está incluído com a coifa da junta homocinética (ex.:
        abraçadeiras, saqueta de massa lubrificante, anéis de retenção).'
    cv_boot_material:
      name: material da coifa da junta homocinética
      description: Especifica o material de construção principal da hotte da junta
        homocinética.
    cv_boot_position:
      name: Posição da coifa da junta homocinética
      description: Especifica se a coifa da junta homocinética se ajusta à posição
        interna (de dentro) ou externa (de fora) da junta homocinética no veio.
    cycling_apparel_fit:
      name: Ajuste de vestuário de ciclismo
      description: 'Descreve o corte da peça, indicando o nível de ajuste e a aerodinâmica
        pretendidos (ex.: Race, Relaxed).'
    cylinder_head_assembly:
      name: Conjunto da cabeça do cilindro
      description: Especifica o nível de completude da cabeça do cilindro tal como
        vendido (por exemplo, totalmente montado com componentes da distribuição instalados
        versus peça fundida nua/desmontada).
    cylinder_head_material_grade:
      name: Grau do material da cabeça do cilindro
      description: Especifica o material e a classe utilizados na fundição da cabeça
        do cilindro.
    cylinder_head_position:
      name: Posição da cabeça do cilindro
      description: Identifica em que bancada/lado ou orientação a cabeça do cilindro
        se adapta a motores com múltiplos bancos de cilindros (por exemplo, lado esquerdo/direito
        ou bancada 1/banco 2).
    cymbal_alloy:
      name: Liga de pratos
      description: Liga/composição do(s) prato(s) do kit.
    cymbal_application:
      name: Aplicação do prato
      description: Aplicação principal para a qual o prato foi concebido/mercado.
    cymbal_arm_mounting_interface:
      name: Interface de montagem do braço do prato
      description: 'Especifica a forma como o braço do prato se fixa ao resto do equipamento
        de bateria (ex.: braçadeira, suporte, encaixe do pedestal).'
    cymbal_arm_rotation_positioning_features:
      name: Características de rotação/posicionamento do braço do prato
      description: Especifica as características de posicionamento que afetam a forma
        como o braço pode ser angulado/rodado e bloqueado.
    cymbal_arm_style:
      name: Estilo de braço do prato
      description: Especifica se o braço do prato é direito ou articulado, para alcance
        e posicionamento. Preferências.
    cymbal_drum_case_wheel_configuration:
      name: Configuração da roda interna da caixa de pratos e tambores
      description: Indica se a caixa interior possui rodas e (se aplicável) a configuração
        das rodas para o transporte sobre rodas.
    cymbal_hammering_style:
      name: Estilo de martelagem de pratos
      description: Processo de martelagem/aparência que afeta a complexidade e o toque.
    cymbal_kit_components_included:
      name: Componentes do conjunto de pratos incluídos
      description: Especifica quais os tipos de pratos incluídos no conjunto/pacote
        de pratos ride (para além do próprio prato ride).
    cymbal_kit_items_included:
      name: Itens incluídos no conjunto de pratos
      description: Identifica os pratos incluídos no kit/pacote (por tipo de prato).
    cymbal_lathing:
      name: torneamento de pratos
      description: Especifica se/quanto da superfície do prato é torneada (ranhurada)
        em comparação com a superfície não torneada/bruta.
    cymbal_playing_style_genre:
      name: estilo/género de execução de pratos
      description: Identifica o contexto típico de desempenho para o qual os címbalos
        são concebidos (por exemplo, címbalos para dança do ventre versus címbalos
        manuais para marcha/orquestra).
    cymbal_set_configuration:
      name: Configuração do conjunto de pratos
      description: Indica se o produto é vendido como prato único, par combinado ou
        conjunto multi-emparelhar (por exemplo, para instrução em grupo).
    cymbal_sound_character:
      name: Sonoridade do prato
      description: 'Descreve o perfil tonal/timbre geral do prato utilizado para a
        descoberta (ex.: brilhante versus escuro).'
    cymbal_sustain:
      name: Sustentação do prato
      description: Quanto tempo ressoa o prato após ser tocado.
    cymbal_type:
      name: Tipo de prato
      description: Especifica a função de prato que o pad de prato eletrónico pretende
        emular.
    cymbal_volume_level:
      name: Nível de volume dos pratos
      description: Categoria de volume/saída sonora percebida do prato.
    cymbal_weight_class:
      name: classe de peso do prato
      description: Indica a classe de peso do prato, que afeta o timbre, o volume
        e a resposta.
    dairy_heat_treatment:
      name: Tratamento diário com calor.
      description: Identifica o nível de processamento ou pasteurização aplicado ao
        creme (por exemplo, cru, pasteurizado, UHT), o que afeta o tempo de conservação,
        o sabor e o desempenho ao bater.
    damage_type:
      name: Tipo de dano
      description: Especifica os tipos de danos no para-brisas que o kit se destina
        a reparar.
    damper_pedal_style:
      name: Estilo de pedal amortecedor
      description: Descreve o estilo físico do pedal de sustentação utilizado nos
        teclados/pianos digitais.
    damping_adjustability:
      name: Ajuste de amortecimento
      description: Indica quais os parâmetros de amortecimento e/ou altura de condução
        que são ajustáveis no amortecedor.
    damping_level:
      name: Nível de amortecimento
      description: Indica a quantidade relativa de redução de volume e de sustentação
        que o silenciador proporciona.
    dance_occasion:
      name: Ocasião de dança
      description: Indica o uso pretendido da peça de vestuário no contexto da prática
        ou apresentação de dança.
    darbuka_accessories_included:
      name: Acessórios para darbuka incluídos
      description: Enumera os acessórios comuns que acompanham o darbuka.
    darbuka_body_finish_type:
      name: Tipo de acabamento do corpo Darbuka
      description: Descreve o acabamento exterior, o revestimento ou o tratamento
        decorativo do corpo da darbuka.
    darbuka_head_material:
      name: Material da cabeça do darbuka
      description: Especifica o material da membrana da pele de um darbuka.
    dart_barrel_material:
      name: Material do corpo do dardo
      description: Especifica o material principal do corpo do dardo, afetando a distribuição
        do peso, a durabilidade e o preço.
    dart_shaft_design:
      name: design da haste do dardo
      description: Classifica o design mecânico do veio, como por exemplo, se é fixo,
        rotativo, telescópico ou se integra na hélice, o que afeta o desempenho e
        o preço.
    dart_shaft_thread_type:
      name: Tipo thread da haste do dardo
      description: Indica o tamanho/tipo thread utilizada para aparafusar a haste
        ao corpo do dardo, garantindo a compatibilidade entre hastes e corpos.
    dart_thread_size:
      name: Tamanho da rosca do dardo
      description: Especifica o tamanho/padrão thread com que a peça é compatível,
        garantindo o encaixe entre eixos, pontas e cilindros.
    dart_tip_compatibility:
      name: Compatibilidade com pontas de dardos
      description: Indica se a parte do dardo se destina a dardos com ponta de aço,
        ponta macia ou ambos os tipos.
    dart_tip_connection_type:
      name: Tipo de ligação da ponta do dardo
      description: Descreve a especificação thread ou o sistema de montagem que a
        ponta utiliza para se fixar ao corpo ou à haste do dardo, garantindo a compatibilidade.
    dartboard_tournament_approval:
      name: Aprovação do torneio de dardos
      description: Indica se o alvo de dardos é oficialmente aprovado por federações
        ou ligas de dardos específicas.
    dartboard_type:
      name: Tipo de alvo de dardos
      description: Classifica o alvo de dardos de acordo com a tecnologia de construção
        e a compatibilidade com os dardos (por exemplo, de cerdas, eletrónicos, magnéticos).
    dash_cover_construction_type:
      name: Tipo de construção da cobertura do painel
      description: Descreve como a cobertura do painel é formada/estruturada (por
        exemplo, moldada versus costurada), o que influencia a precisão do encaixe
        e a aparência.
    dash_cover_cutout_configuration:
      name: configuração do recorte da cobertura do painel
      description: Indica para que aberturas/sensores dashboard do fabricante original
        (OEM) a cobertura foi pré-cortada ou moldada.
    dashboard_accessory_position:
      name: Posição do acessório do painel
      description: Especifica onde, no dashboard ou em redor deste, o acessório deve
        ser colocado ou montado.
    date_variety:
      name: Variedade de tâmaras
      description: 'Especifica a cultivar/variedade das tâmaras (ex.: Medjool, Deglet
        Noor, Ajwa). A variedade influencia fortemente o sabor, o tamanho e a textura,
        sendo destacada na maioria dos títulos e descrições de produtos. Portanto,
        capturá-la melhora a filtragem e a descoberta.'
    dayan_head_material:
      name: Material da cabeça do Dayan
      description: Material da superfície de jogo (pudi), como o tipo ocultar natural
        ou sintético.
    dayan_strap_material:
      name: Material da alça do Dayan
      description: Material das correias de tensão (baddhi) utilizadas para amarrar
        o dayan.
    dayan_syahi_type:
      name: Tipo Dayan syahi
      description: Tipo de aplicação de syahi (pasta de afinação preta) na cabeça
        do dayan.
    decaffeination_method:
      name: Método de descafeinização
      description: Identifica o processo utilizado para remover a cafeína do café
        descafeinado.
    decal_installation_method:
      name: Método de instalação de decalques
      description: 'Como o decalque é aplicado na superfície do veículo (ex.: aplicação
        a seco, aplicação com água). As informações sobre as ferramentas/requisitos
        (por exemplo, fita Transferências ou pistola de ar quente) devem ser incluídas
        nas instruções ou nos atributos da ferramenta, quando aplicável.'
    decal_orientation:
      name: Orientação do decalque
      description: Se o decalque se destina à aplicação em vidro interior ou em superfície
        exterior.
    decal_placement_type:
      name: Decalque ponto de apresentação tipo
      description: 'Indica o local no veículo onde o decalque deve ser aplicado (ex.:
        painel da carroçaria, para-choques, capô).'
    decal_visibility_property:
      name: Propriedade de visibilidade do decalque
      description: Propriedades ópticas/de visibilidade de um decalque destinado a
        melhorar a visibilidade ou a resposta à luz (por exemplo, características
        reflectoras, fluorescentes, luminescentes ou de transparência).
    deck_concave_level:
      name: Nível côncavo do convés
      description: 'Indica a profundidade ou intensidade da concavidade do deck (ex.:
        suave, média, profunda).'
    deck_flex_rating:
      name: Classificação da flexibilidade do deck
      description: Avaliação qualitativa da flexibilidade/rigidez do deck.
    deck_material:
      name: Material da tábua
      description: Identifica o principal material de construção do shape de skate.
    decoder_interface_socket_type:
      name: Interface do descodificador/tipo de tomada
      description: Tipo de interface do descodificador digital ou configuração de
        inclusão do descodificador para o modelo da locomotiva.
    decoration_technique:
      name: Técnica de decoração
      description: Identifica o método principal utilizado para aplicar gráficos ou
        ornamentos à t-shirt.
    decorative_stamp_form_factor:
      name: fator de forma do carimbo decorativo
      description: Identifica o formato físico do carimbo e a forma como imprime um
        desenho (carimbo único, conjunto, rolo, fundo, etc.).
    decorative_tape_application:
      name: aplicação de fita decorativa
      description: O principal caso de utilização para o qual a fita decorativa foi
        concebida ou comercializada.
    decorative_tape_format:
      name: Formato de fita decorativa
      description: Especifica como a fita decorativa é fornecida/embalada para utilização.
    decoy_buoyancy:
      name: Flutuabilidade de isco
      description: Descreve como o isco se comporta na coluna de água (flutuante,
        suspensa ou afundando).
    decoy_joint_type:
      name: Tipo de junta de isco
      description: Indica se o corpo da amostra é sólido ou articulado, afetando o
        movimento de natação.
    decoy_motion_mechanism:
      name: Mecanismo Motion do isco
      description: Descreve como, e se, o isco produz movimento ou perturbação na
        água para atrair a caça.
    decoy_posture:
      name: postura de isco
      description: Indica a postura ou atividade representada pelo animal modelado
        pelo isco (por exemplo, alimentação, repouso, alerta).
    decoy_size_class:
      name: Classe de tamanho de isco
      description: Classifica o tamanho relativo da réplica em comparação com o animal
        real (por exemplo, Padrão, Magnum, Grande).
    decoy_style:
      name: Estilo de isco
      description: Define o formato físico ou a classe de design do isco para ajudar
        os caçadores a escolher a configuração correta.
    deli_meat_variety:
      name: Variedade de frios
      description: 'Classifica o tipo específico de carnes frias (ex.: salame, mortadela,
        fiambre, carne assada).'
    delivery_form:
      name: Forma de entrega
      description: Forma de entrega física do limpa injetores.
    denim_composition:
      name: Composição do denim
      description: Composição das fibras primárias do denim (fibras base, excluindo
        corantes/acabamentos).
    denim_finish:
      name: Acabamento em ganga
      description: Acabamento de superfície/processamento aplicado ao tecido de ganga.
    denim_intended_use:
      name: Uso pretendido do denim
      description: Design/utilização típica para a qual os jeans são comercializados.
    denim_stretch_type:
      name: tipo elástico de ganga
      description: Se o tecido de ganga possui elasticidade mecânica, elastano/spandex
        adicionado ou nenhuma elasticidade.
    denim_wash:
      name: Lavagem de jeans
      description: 'Indica a tonalidade ou tratamento de lavagem aplicado ao tecido
        de ganga (ex.: claro, escuro, cru, ácido).'
    derailleur_cage_length:
      name: Comprimento da gaiola do câmbio
      description: Indica o comprimento da gaiola do desviador, que determina a capacidade
        da corrente (principalmente para desviadores traseiros).
    derailleur_mounting_style:
      name: Estilo de montagem do câmbio
      description: Especifica a forma como o desviador é fixado ao Frame ou gancho
        da bicicleta (por exemplo, braçadeira, fixação direta, UDH).
    derailleur_type:
      name: Tipo de câmbio
      description: Indica se o produto é um desviador dianteiro ou traseiro.
    deshedder_tool_type:
      name: Tipo de ferramenta de remoção de pelos
      description: Classifica o estilo estrutural do removedor de pelos para que o
        comprador possa escolher o método de escovagem da sua preferência (por exemplo,
        lâmina, bloco, escova rotativa ou luva).
    diabolo_axle_system:
      name: Sistema de eixos Diabolo
      description: Especifica o sistema/configuração do eixo do diabolo que afeta
        as manobras, a estabilidade e o desgaste da corrente.
    diagnostic_functions_supported:
      name: Funções de diagnóstico suportadas
      description: Especifica as funções de diagnóstico/manutenção que o leitor pode
        executar.
    diagnostic_interface_type:
      name: Tipo de interface de diagnóstico
      description: 'Ligação/interface utilizada para comunicação com o veículo ou
        dispositivo (ex.: OBD-II, Bluetooth, Wi-Fi, USB).'
    diamond_color_grade:
      name: Classificação de cor diamante
      description: Indica a classificação de cor dos diamantes, de D (incolor) a Z
        (cor clara), ou denota diamantes de cor extravagante.
    diaper_cover_style:
      name: estilo de capa de fralda
      description: Define a silhueta do design ou o estilo decorativo da capa da fralda
        para auxiliar a navegação e a filtragem com base no estilo.
    diastatic_power_unit:
      name: Unidade de potência diastática
      description: 'Especifica o sistema de unidades utilizado para reportar o valor
        do poder diastático de um produto (ex.: °Lintner vs Windisch-Kolbach).'
    diatonic_harmonica_tuning_system:
      name: Sistema de afinação da harmónica diatónica
      description: Especifica o esquema de notas/sistema de afinação utilizado pela
        harmónica diatónica.
    dice_sides:
      name: Faces do dado
      description: 'Número de lados (faces) por dado para os dados incluídos no produto
        (ex.: d6, d20). Para conjuntos mistos, utilize o valor predominante ou liste-os
        como valores múltiplos quando houver suporte para tal.'
    didgeridoo_construction_type:
      name: Tipo de construção do didgeridoo
      description: Como se constrói ou forma o didgeridoo (abordagem de construção
        tradicional ou moderna).
    dietary_formulation_claim:
      name: Alegação de formulação dietética
      description: 'Destaca os principais atributos ou exclusões da formulação relevantes
        para a nutrição equina (ex.: Sem cereais, Baixo teor de amido, Biológico).'
    dinosaur_playset_scale_figure_size_class:
      name: Dinossauro playset expansão/figura classe tamanho
      description: Descreve a expansão geral dos dinossauros/figuras incluídos para
        facilitar a compatibilidade com outros conjuntos.
    dinosaur_species_included:
      name: Espécies de dinossauros incluídas
      description: Identifica as espécies de dinossauros que estão representadas no
        conjunto (figuras ou dinossauros moldados).
    dipsy_diver_size_designation:
      name: Designação de tamanho do mergulhador Dipsy
      description: Indica o código de tamanho do dipsey de pesca definido pelo fabricante,
        que se correlaciona com o peso e a profundidade de mergulho.
    disc_brake_rotor_mount_type:
      name: Tipo de fixação do rotor de travão de disco
      description: 'Identifica como um rotor de travão de disco se fixa ao cubo (ex.:
        6 parafusos, Center Lock).'
    disc_lock_accessories_included:
      name: Acessórios para bloqueio de disco incluídos
      description: Especifica o artigo adicional incluído na embalagem de um fecho
        de disco para bicicleta, como um cabo de lembrete, uma bolsa de transporte,
        um suporte de montagem ou baterias.
    disco_ball_mirror_tile_material:
      name: Material do mosaico refletor na bola de espelhos
      description: O material do mosaico refletor na bola de discoteca (se aplicável).
    disco_ball_mirror_tile_size:
      name: Espelho bola de discoteca tamanho mosaico
      description: Tamanho aproximado de mosaico/quadrados de espelho individual na
        bola de discoteca.
    display_backlight_color:
      name: cor de luz de fundo do visor
      description: Luz de fundo/iluminação do visor/mostrador do medidor.
    disposable_compostable_claim:
      name: Declaração descartável/compostável
      description: Indica se o produto é compostável, biodegradável, reciclável ou
        nenhum dos dois (quando aplicável).
    distillation_method:
      name: Método de destilação
      description: Identifica o método de destilação ou o tipo de alambique utilizado
        para produzir a bebida.
    distilled_water_intended_use:
      name: Utilização prevista da água destilada
      description: 'Define a aplicação principal para a água destilada (ex.: beber,
        aparelho CPAP, humidificador, ferro a vapor).'
    distress_transmission_frequency:
      name: Frequência de transmissão de emergência
      description: Frequência/frequências rádio primárias utilizadas para alerta de
        emergência.
    distressing_level:
      name: Nível de angústia
      description: Especifica a quantidade de desgaste intencional, rasgões ou desfiados
        aplicados no tecido.
    distressing_style:
      name: Estilo perturbador
      description: Indica o tipo ou nível de desgaste nas calças de ganga, como rasgões
        ou bigodes.
    distributor_advance_mechanism:
      name: Mecanismo de adiantamento do distribuidor
      description: Especifica o tipo de mecanismo de avanço da ignição utilizado pelo
        distribuidor.
    distributor_cap_terminal_type:
      name: Tipo de terminal da tampa do distribuidor
      description: Especifica o estilo do terminal da tampa do distribuidor.
    distributor_gear_material:
      name: Material da engrenagem do distribuidor
      description: Especifica o material da engrenagem motriz do distribuidor.
    distributor_ignition_type:
      name: Tipo de ignição por distribuidor
      description: Especifica se o distribuidor foi concebido para sistemas de ignição
        por platinado, ignição eletrónica ou sistema HEI.
    distributor_kit_contents:
      name: Conteúdo do kit do distribuidor
      description: 'Indica quais os componentes incluídos com o distribuidor (ex.:
        tampa, rotor, Modules de ignição, junta/anel de vedação, engrenagem motriz,
        cablagem/conector).'
    dive_computer_form_factor:
      name: Fator de forma do computador de mergulho
      description: Especifica o design físico ou o método de montagem do computador
        de mergulho, como por exemplo, montagem em consola ou estilo relógio.
    diving_mask_design:
      name: design de máscara de mergulho
      description: Define o estilo estrutural geral da máscara de mergulho, Influence
        o ajuste, o campo de visão e a utilização prevista.
    divot_tool_prong_configuration:
      name: Configuração dos dentes da ferramenta de rebitagem
      description: Especifica o número e a disposição das pontas da ferramenta de
        reparação de marcas de relvado que são utilizadas para reparar danos na relva.
    divot_tool_style:
      name: estilo de ferramenta de recortar marcas
      description: Define o estilo estrutural ou de implantação geral da ferramenta
        para reparar marcas de tacos, como fixa, dobrável/tipo canivete, multifuncional
        ou acessórios que se fixam a um boné ou taco.
    djembe_shell_construction:
      name: Construção da concha do djembê
      description: Descreve o método de construção da estrutura/corpo do djembê.
    djembe_tuning_system:
      name: Sistema de afinação do djembê
      description: Especifica como o djembê é tensionado/afinado.
    dmx_output_connector_type:
      name: Tipo de conector de saída DMX
      description: Formato físico do conector utilizado para a(s) porta(s) de saída
        DMX do controlador.
    doctor_playset_items_included:
      name: Itens incluídos no conjunto de brinquedos de médico
      description: Especifica os instrumentos médicos de brinquedo e os acessórios
        para brincadeiras de faz de conta incluídos no conjunto de médico (por exemplo,
        estetoscópio, seringa, martelo de reflexos).
    doctor_playset_role_play_setting:
      name: Doctor playset função-play Definições
      description: Identifica o contexto lúdico principal que o conjunto de brinquedo
        de médico representa.
    doctor_playset_wearable_items_included:
      name: Artigos de vestuário incluídos no conjunto de brinquedos de médico
      description: Indica componentes de fantasia vestíveis incluídos no conjunto.
    doll_accessory_type:
      name: Tipo de acessório para boneca
      description: Define o tipo de acessório para boneca ou figura de ação do produto
        (por exemplo, roupa, calçado, mobiliário, expositores), permitindo ao comprador
        navegar e filtrar dentro desta categoria de acessórios.
    doll_eye_type:
      name: Tipo de olho de boneca
      description: Especifica o estilo de construção dos olhos da boneca (por exemplo,
        acrílico embutido, pintado, com iluminação LED).
    doll_hair_fiber_type:
      name: tipo de fibra capilar boneca
      description: Tipo de cabelo/fibra utilizado na boneca (ou nenhum), afetando
        o realismo, o penteado e os cuidados.
    doll_making_kit_components_included:
      name: Componentes incluídos no kit de fabrico de bonecas
      description: Lista os principais materiais e ferramentas incluídos no kit para
        o fabrico de bonecas, para que o comprador possa comparar os artigos e saber
        o que precisa para a tarefa.
    dollhouse_installation_placement_type:
      name: Instalação de casa de bonecas/tipo ponto de apresentação
      description: Como deve ser utilizada ou posicionada a casa de bonecas (por exemplo,
        sobre a mesa, no chão ou fixada à parede).
    dollhouse_items_included:
      name: Artigo para casa de bonecas incluído
      description: Identifica o conteúdo da caixa da casa de bonecas (mobiliário,
        bonecas, acessórios).
    dollhouse_lighting_type:
      name: tipo de iluminação para casa de bonecas
      description: Tipo de iluminação incluída ou suportada pela casa de bonecas.
    dollhouse_room_type:
      name: tipo de quarto de casa de bonecas
      description: Especifica a divisão/área dentro de uma casa de bonecas onde o
        acessório é normalmente utilizado.
    dollhouse_scale:
      name: Expansão da casa de bonecas
      description: A escala de uma casa de bonecas ou dos seus acessórios (por exemplo,
        1:12) é utilizada para garantir a compatibilidade entre casas, móveis e figuras.
    dollhouse_style_theme:
      name: Estilo/tema de casa de bonecas
      description: 'Estilo geral ou tema da casa de bonecas para visualização e apresentação
        (ex.: moderno versus vitoriano).'
    donnos_playing_technique:
      name: Técnica de jogo de Donnos
      description: Como o Donnos é jogado/acionado (apenas com as mãos ou com um bastão/batedor),
        para corresponder às expectativas do comprador e aos acessórios incluídos.
    donnos_tuning_system:
      name: Sistema de afinação Donnos
      description: 'Método principal utilizado para afinar ou alterar a afinação (ex.:
        cordas de tensão/mecanismo de compressão).'
    door_assembly_type:
      name: Tipo de montagem da porta
      description: 'Indica o que está incluído: apenas a estrutura da porta, o revestimento
        da porta ou o conjunto completo da porta.'
    door_closure_mechanism:
      name: Mecanismo de fecho da porta
      description: 'Define o mecanismo que controla o fecho da porta (ex.: fecho suave,
        fecho magnético).'
    door_handle_components_included:
      name: Componentes do identificador de porta incluídos
      description: 'Indica quais as peças principais incluídas com o identificador
        de porta (ex.: cilindro da fechadura, junta/vedação, tampa de acabamento,
        equipamento de montagem, chicote de fios, trinco/atuador).'
    door_handle_operation:
      name: Operação do identificador de porta
      description: Especifica o estilo principal de acionamento/operação do conjunto
        do identificador da porta do veículo (por exemplo, ligação mecânica, cilindro
        da chave, botão/chave sem chave, abertura automática).
    door_lock_knob_attachment_method:
      name: Método de fixação do manípulo da fechadura da porta
      description: Especifica a forma como o manípulo da fechadura da porta se fixa
        à haste da fechadura (por exemplo, rosca, encaixe por pressão).
    door_lock_position:
      name: Posição do fecho da porta
      description: Especifica em que posição da porta/abertura a fechadura ou o componente
        da fechadura foi concebido para se adaptar a um veículo.
    door_seal_feature_set:
      name: Conjunto de vedação da porta
      description: Características funcionais da vedação da porta.
    door_seal_material_type:
      name: tipo de material de vedação da porta
      description: Principal família de elastómeros/materiais utilizada para a vedação
        da porta (para além dos materiais genéricos).
    door_seal_product_form:
      name: Formato do produto de vedação da porta
      description: Indica o formato de venda/embalamento do vedante da porta.
    door_window_operation:
      name: Funcionamento da janela da porta
      description: Especifica se o sistema de janelas da porta se destina a uma operação
        manual ou motorizada, ou se a porta não possui janela.
    double_decker_bus_deck_configuration:
      name: Configuração de piso de autocarro de dois andares
      description: Especifica a configuração de acesso ao convés/teto de um autocarro
        de dois andares.
    double_drum_pedal_linkage_medium:
      name: Ligação de pedal de tambor duplo médio
      description: Especifica o meio utilizado para ligar o pedal secundário ao pedal
        primário (por exemplo, veio de transmissão, corrente, correia).
    double_end_bag_core_type:
      name: tipo de núcleo de saco de extremidade dupla
      description: Identifica a estrutura interna do núcleo de impacto, que determina
        a velocidade de ressalto, a sensação e os requisitos de manutenção.
    double_pointed_needle_point_style:
      name: Estilo de ponta de agulha dupla
      description: Descreve a afiação da ponta/forma adequados para diferentes fios
        e estilos de malha.
    dough_extruder_accessories_included:
      name: Acessórios para extrusora de massa incluídos
      description: Componentes adicionais incluídos com a extrusora de massa.
    dough_extruder_operation_type:
      name: Tipo de operação da extrusora de massa
      description: Como a massa é empurrada através da extrusora para criação de formas.
    dough_extruder_shape_disc_included:
      name: Extrusora de massa com disco de forma incluída
      description: Formas que a extrusora pode produzir através dos discos/bicos incluídos.
    dough_format:
      name: Formato da massa
      description: 'Identifica a apresentação física/forma da massa dentro da embalagem
        (ex.: bola, folha, disco, fios desfiados).'
    doumbek_accessories_included:
      name: Acessórios para o doumbek incluídos
      description: 'Acessórios incluídos com o doumbek (ex: chave de afinação, caixa
        interior).'
    doumbek_head_material:
      name: Material da pele do doumbek
      description: Material da pele do tambor (membrana) do doumbek.
    doumbek_head_type:
      name: Tipo de cabeça Doumbek
      description: Construção/tipo da cabeça do doumbek (como a membrana é feita ou
        montada).
    doumbek_playing_style_technique:
      name: Estilo/técnica de execução de Doumbek
      description: Contexto/estilo de execução pretendido, geralmente associado ao
        doumbek.
    doumbek_tuning_system:
      name: Sistema de afinação do doumbek
      description: Como o doumbek é tensionado/afinado (ou se não é afinável).
    dowel_end_style:
      name: Estilo de extremidade de cavilha
      description: Descreve o corte/forma das extremidades dos pinos, que afetam a
        facilidade de inserção, a segurança e o uso pretendido em manualidades.
    dowel_surface_texture:
      name: Textura da superfície do perno
      description: Descreve o estado da superfície do perno, como lisa ou canelada,
        o que afeta o aspeto e a aderência da cola.
    drafting_compass_adjustment_mechanism:
      name: Mecanismo de ajuste do compasso de desenho
      description: Mecanismo primário de ajuste fino utilizado para definir o raio
        com precisão.
    drafting_compass_fine_adjustment_mechanism:
      name: Mecanismo de ajuste fino do compasso de desenho
      description: Tipo de ajuste fino utilizado para definir o raio com precisão
        (se existir).
    drafting_compass_lead_holder_type:
      name: Elaboração de bússola oportunidade potencial titular tipo
      description: Tipo de suporte/inserção para desenho incluído ou suportado pelo
        compasso.
    drag_system_material:
      name: Material do sistema de arrasto
      description: Identifica o material ou a tecnologia utilizada na chaminé de arrasto,
        Influence a resistência ao calor e a suavidade.
    drag_system_type:
      name: Tipo de mecanismo de trava
      description: Identifica o tipo de mecanismo de arrasto utilizado no molinete,
        como por exemplo, arrasto frontal, traseiro, de alavanca, em estrela, magnético
        ou de disco.
    drag_type:
      name: Tipo de arrastar
      description: Especifica o tipo de mecanismo de arrasto utilizado pelo molinete
        (local ou método de acionamento).
    drawer_features:
      name: Características da gaveta
      description: 'Informação sobre elementos ou funcionalidades especiais de construção
        de gavetas (ex.: fecho suave, forro de feltro).'
    drawer_slide_type:
      name: Tipo de corrediça de gaveta
      description: Especifica o estilo de montagem e extensão das corrediças da gaveta
        (por exemplo, montagem inferior, extensão total).
    drawing_ink_compatible_tools:
      name: ferramentas compatíveis com tinta de desenho
      description: Especifica as ferramentas da aplicação a que a tinta se destina
        (por exemplo, caneta de aparo ou pincel).
    drawing_ink_permanence:
      name: permanência da tinta de desenho
      description: Indica características de permanência importantes para a obra de
        arte final e a sua reprodução.
    dress_embellishment:
      name: enfeite de vestido
      description: Destaca os elementos decorativos proeminentes incorporados no design
        do vestido.
    dress_train_type:
      name: Tipo de cauda de vestido
      description: Indica a presença e o comprimento/estilo da cauda do vestido, informando
        sobre o nível de formalidade e a adequação Venue .
    dried_surface_finish:
      name: Acabamento da superfície seca
      description: Descreve o aspeto típico da superfície após a secagem (brilho/textura).
    drink_tube_insulation:
      name: Isolamento do tubo de bebida
      description: Indica se o tubo para bebidas inclui isolamento ou uma cobertura
        térmica para evitar que os líquidos aqueçam ou congelem.
    drive_band_cross_section_shape:
      name: Forma da secção transversal da banda de transmissão
      description: Forma dos perfis da banda de transmissão (redondo, plano, etc.).
    drive_band_join_type:
      name: tipo de junção da banda de transmissão
      description: Como a correia de transmissão é unida/construída (sem fim ou com
        necessidade de amarração, etc.).
    drive_band_material_type:
      name: Tipo de material da correia de transmissão
      description: Especifica o material/tipo da correia de transmissão utilizada
        nas rodas de fiar.
    drive_location:
      name: Localização do acionamento
      description: Identifica a posição do volante/mecanismo de acionamento na elíptica,
        Influence a área de contacto e a sensação Motion .
    drive_mechanism:
      name: Mecanismo de acionamento
      description: Identifica o tipo de transmissão utilizada para transferir a potência
        dos pedais para o volante de inércia.
    drive_shaft_material:
      name: Material do veio de transmissão
      description: Especifica o principal material de construção do tubo do veio de
        transmissão ou do conjunto completo.
    drive_system:
      name: Sistema de acionamento
      description: Especifica o mecanismo que transfere a força do pedal para o sistema
        de resistência.
    drivetrain_configuration:
      name: Configuração do grupo motopropulsor
      description: Especifica a configuração da transmissão da bicicleta, indicando
        se o cubo traseiro é fixo, de roda livre de velocidade única ou flip-flop.
    drivetrain_speed_compatibility:
      name: compatibilidade da velocidade da transmissão
      description: Indica as velocidades da cassete para as quais a coroa foi concebida,
        garantindo perfis e espaçamentos adequados dos dentes.
    drone_positioning_system:
      name: Sistema de posicionamento de drones
      description: inclusão de tecnologia de posicionamento/fixação suportada pelo
        drone para navegação e pairar estável.
    drone_transmission_type:
      name: tipo de transmissão por drone
      description: Método principal utilizado para o controlo e/ou ligação de vídeo
        entre o drone e o controlador/dispositivo.
    drop_spindle_whorl_position:
      name: posição do fuso Drop
      description: Localização do volute no eixo.
    drum_carder_accessories_included:
      name: Acessórios para cardadoras de tambor incluídos
      description: Itens geralmente incluídos num kit de cardadora de tambor.
    drum_clamp_locking_mechanism:
      name: Mecanismo de bloqueio da braçadeira do tambor
      description: 'Especifica a forma como a braçadeira bloqueia/aperta no tubo/jante
        (ex.: parafuso borboleta, parafuso com chave de tambor, engate rápido).'
    drum_clamp_mount_interface:
      name: Interface de montagem com grampo de tambor
      description: 'Especifica o que a abraçadeira oferece para a fixação de acessórios
        (ex.: recetor de haste em L, rótula, inclinador de pratos).'
    drum_clamp_type:
      name: Tipo de braçadeira de tambor
      description: Especifica o tipo de fixação funcional utilizado em equipamentos
        de montagem de kit (por exemplo, fixação de aros versus fixação de tubos).
    drum_head_application_batter_resonant:
      name: Aplicação para pele de bateria (bateria/ressonância)
      description: Especifica para que lado/função a pele foi concebida num tambor
        (superfície de toque superior versus lado de ressonância/caixa inferior).
    drum_head_collar_type:
      name: tipo de colar de pele de tambor
      description: Especifica se a cabeça possui um colar padrão, um colar baixo ou
        um perfil de colar especial para combinar com determinadas arestas/carcaças
        de rolamento.
    drum_head_damping_control:
      name: Controlo de amortecimento da pele do tambor
      description: Características de controlo de harmónicos integrados ou estilo
        de amortecimento incluídos no design da cabeça.
    drum_head_film_material:
      name: material de filme para pele de tambor
      description: Material principal do filme da cabeça (geralmente polietileno tereftalato/Mylar,
        mas pode incluir materiais especiais).
    drum_head_hoop_collar_type:
      name: Tipo de aro/borda da pele do tambor
      description: Identifica a construção do aro e da borda da pele do tambor (por
        exemplo, perfil da borda e material do aro), que pode afetar o encaixe e a
        estabilidade da afinação em determinados cascos e aros.
    drum_head_hoop_rim_material:
      name: Material do aro/aro da pele do tambor
      description: O material do aro/aro (o aro incorporado no interior da cabeça
        do instrumento) pode afetar a durabilidade e a estabilidade da afinação.
    drum_head_included:
      name: Pele de tambor incluída
      description: Indica se a pele de ataque e/ou a pele de ressonância estão incluídas
        com o tambor.
    drum_head_muffling_feature:
      name: Funcionalidade de abafamento da pele do tambor
      description: Recursos de controlo de harmónicos integrados na pele do tambor.
    drum_head_muffling_type:
      name: tipo de abafador de pele de tambor
      description: Indica se a pele do tambor inclui elementos de controlo/abafamento
        de harmónicos integrados.
    drum_head_ply_count:
      name: contagem de camadas da pele do tambor
      description: 'Número de camadas/folhas de filme utilizadas na construção da
        pele do tambor (ex.: 1 camada, 2 camadas).'
    drum_head_position:
      name: posição da pele do tambor
      description: Indica se a pele do tambor se destina a ser utilizada como pele
        de ataque (superior/de impacto), pele de ressonância (inferior), pele de caixa
        (inferior) ou se pode ser utilizada de ambas as formas.
    drum_head_reinforcement_type:
      name: tipo de reforço da pele do tambor
      description: Especifica se a pele da caixa inclui características de reforço,
        como um ponto central ou um anel de controlo, para aumentar a durabilidade
        e focar o timbre.
    drum_head_surface_finish:
      name: Acabamento da superfície da pele do tambor
      description: A textura/acabamento da superfície da cabeça da escova Influence
        o ataque e a resposta da escova.
    drum_head_type:
      name: tipo de pele de tambor
      description: Especifica a construção/tipo de pele utilizada no tambor (principalmente
        para peles de ataque/ressonância, conforme fornecidas).
    drum_key_design_type:
      name: Tipo de design da chave de tambor
      description: Descreve o design funcional do interruptor de tensão do tambor
        (por exemplo, standard, com roquete, identificador em T).
    drum_key_drive_type:
      name: tipo de acionamento da chave do tambor
      description: Especifica o tipo de acionamento/interface do interruptor do tambor
        utilizado para engatar a haste de tensão ou o equipamento de montagem.
    drum_key_handle_style:
      name: estilo de identificador de chave de bateria
      description: Descreve o estilo identificador/ergonómico do interruptor de afinação
        da bateria, afetando o conforto e a alavancagem durante a afinação.
    drum_kit_included_items:
      name: Itens incluídos no kit de bateria
      description: 'Enumera os principais itens incluídos no kit bateria, para além
        dos cascos/pads (ex.: instrumentos, pratos, banco).'
    drum_kit_portability:
      name: portabilidade do kit de bateria
      description: Indica se o kit foi concebido para armazenamento/transporte compacto
        (por exemplo, para viagem/compacto/dobrável).
    drum_kit_shell_construction_features:
      name: Características da construção do kit da bateria
      description: A forma como os cascos são construídos (número/tipo de camadas)
        influencia o timbre e a durabilidade.
    drum_mount_clamp_type:
      name: Tipo de braçadeira para montagem de tambor
      description: Descreve o formato da braçadeira utilizada nos equipamentos de
        montagem de bidons.
    drum_multi_clamp_clamp_type:
      name: tipo de braçadeira multi-clamp para tambor
      description: O estilo/configuração funcional da abraçadeira múltipla (como fixa
        e o que liga).
    drum_mute_material:
      name: material para abafar o som da bateria
      description: Especifica o material principal do abafador de som da bateria que
        entra em contacto com a pele do tambor e/ou amortece a vibração.
    drum_pad_triggering_zones:
      name: zonas de fãs de tambores pads
      description: Indica o número/tipo de zonas de acionamento suportadas pelo pad
        de tom (por exemplo, apenas pele vs. pele + aro), o que afeta a expressividade
        e a compatibilidade Modules .
    drum_pedal_accessories_included:
      name: Acessórios para o pedal da bateria incluídos
      description: Lista os principais acessórios e componentes incluídos com o pedal
        de bateria.
    drum_pedal_baseplate_type:
      name: tipo de placa de base do pedal da bateria
      description: Indica se o pedal utiliza uma base fixa ou um design flutuante/sem
        moldura.
    drum_pedal_bearing_type:
      name: tipo de rolamento do pedal do tambor
      description: Especifica o mecanismo de rolamento utilizado nos pontos de articulação
        primários (por exemplo, balancim, calcanhar, came).
    drum_pedal_cam_type:
      name: Tipo de came do pedal da bateria
      description: Especifica a forma/geometria da came de um pedal de bateria que
        influencia a sensação e a resposta (por exemplo, linear versus acelerador).
    drum_pedal_chain_configuration:
      name: Configuração da corrente do pedal da bateria
      description: Especifica o tipo de corrente utilizada por um pedal de bateria
        com acionamento por corrente (por exemplo, corrente simples, corrente dupla
        ou corrente deslocada).
    drum_pedal_chain_type:
      name: Tipo de corrente do pedal da bateria
      description: Indica o tipo de corrente utilizada na transmissão (por exemplo,
        corrente de rolos versus corrente de bicicleta), o que pode afetar a suavidade
        e a durabilidade.
    drum_pedal_clamp_type:
      name: tipo braçadeira de pedal de bateria
      description: Especifica a forma como o pedal se fixa ao aro do bombo.
    drum_pedal_intended_use:
      name: Utilização prevista do pedal de bateria
      description: Indica o contexto principal de execução para o qual o pedal de
        acionamento por correia foi concebido/mercado.
    drum_pedal_spring_adjustment_method:
      name: método de ajuste da mola do pedal da bateria
      description: Indica como a tensão da mola é ajustada no pedal.
    drum_pedal_spring_type:
      name: Tipo de mola do pedal da bateria
      description: Especifica o mecanismo de mola utilizado para o retorno do pedal.
    drum_shell_material:
      name: Material do corpo do tambor
      description: Especifica o principal material de construção do casco para baterias
        acústicas (por exemplo, bordo, bétula, acrílico).
    drum_shell_wood_species:
      name: Espécies de madeira para casco de tambor
      description: Identifica a espécie de madeira utilizada no casco do tambor, Influence
        o timbre e a ressonância.
    drumhead_type:
      name: Tipo de pele de tambor
      description: Configuração/tipo de cabeça utilizada no Octoban.
    drumstick_model:
      name: Modelo de baqueta
      description: 'Designação padronizada do modelo/tamanho da baqueta utilizada
        por muitas marcas (ex.: 5A, 7A).'
    drumstick_taper:
      name: Afunilamento de baqueta
      description: Descreve o perfil cónico da haste até à ponta, que afeta o ressalto
        e o equilíbrio.
    drysuit_footwear_style:
      name: estilo de calçado para fato seco
      description: Descreve o acabamento integrado da parte inferior da perna do fato
        seco (por exemplo, botas embutidas, meias de neoprene, meias sem fecho ou
        vedação nos tornozelos).
    dumbbell_style:
      name: Estilo haltere
      description: Identifica o design fundamental do haltere — seja uma unidade fixa,
        um sistema ajustável ou um estilo carregável — que Influence fortemente as
        decisões de compra e a utilização no treino.
    dundun_playing_position:
      name: Posição de jogo em Dundun
      description: Posição pretendida para tocar/transportar o tambor.
    dye_status:
      name: Estado do corante
      description: Indica se a manta é tingida, não tingida/natural ou inclui várias
        Colors/misturas.
    dye_style:
      name: Estilo de tingimento
      description: Especifica se o núcleo thread é sólido, fundido ou tingido de alguma
        outra forma especial.
    dye_technique:
      name: Técnica de tingimento
      description: 'Método utilizado para tingir a fibra (ex.: tingimento manual,
        tingimento em caldeirão, tingimento espacial).'
    dye_type_needlecraft_fabric:
      name: Tipo de tingimento (tecido para bordar)
      description: Indica se o tecido de linho é liso, tingido à mão ou tingido de
        forma especial.
    dyeing_color_processing:
      name: Tingimento/processamento de cor
      description: Descreve se e como a fibra foi colorida (por exemplo, sem tingimento,
        branqueada/branca ou técnicas específicas de tingimento).
    e_bike_certification_class:
      name: Curso de certificação para bicicletas elétricas
      description: Especifica a classificação oficial de velocidade do pneu para bicicletas
        elétricas (por exemplo, E-25, E-50).
    e_bike_speed_rating:
      name: Classificação de velocidade da bicicleta elétrica
      description: Indica o nível oficial de certificação do pneu para bicicletas
        elétricas (por exemplo, E25 para ≤25 km/h, E50 para ≤50 km/h).
    e_scooter_connector_type:
      name: Tipo de conector para trotinete elétrica
      description: Identifica o tipo de conector ou ficha elétrica utilizado pelo
        componente para alimentação ou ligação de sinal.
    e_scooter_throttle_type:
      name: Tipo de acelerador da trotineta elétrica
      description: Especifica o tipo de acelerador utilizado para controlar a aceleração
        numa trotineta elétrica.
    ear_coverage:
      name: Cobertura para orelha
      description: Especifica se o capacete inclui proteção auricular e se esta é
        removível.
    ear_coverage_style:
      name: Tipo de cobertura das orelhas
      description: Descreve como, ou se, as orelhas são cobertas pela máscara anti-moscas.
    ear_coverage_type:
      name: Tipo de cobertura da orelha
      description: Especifica a forma como o chapéu cobre ou protege as orelhas, incluindo
        a presença e o estilo das abas de proteção para as orelhas.
    ear_guard_type:
      name: tipo protetor auricular
      description: Descreve o estilo de proteção auricular integrada no boné, como
        protetores de plástico rígido, acolchoados ou amovíveis.
    earmuff_style:
      name: Protetor auricular estilo
      description: Identifica a forma como o protetor auricular é utilizado ou o seu
        estilo de design estrutural (por exemplo, sobre a cabeça ou envolvendo a parte
        de trás da cabeça).
    earring_closure_type:
      name: Tipo de fecho do brinco
      description: Especifica o mecanismo utilizado para fixar o brinco à orelha (por
        exemplo, fecho de encaixe, fecho de alavanca, fecho de encaixe).
    easel_art_desk_features:
      name: Características do cavalete e do estirador
      description: Destaca as características funcionais comuns incluídas no cavalete
        ou na mesa de arte.
    easel_art_desk_surface_type:
      name: Tipo de superfície de cavalete e mesa de arte
      description: 'Identifica a(s) superfície(s) utilizável(eis) para desenho/escrita
        (ex.: quadro-negro, quadro branco, rolo Paper , quadro magnético).'
    eb_clarinet_body_type:
      name: Tipo de corpo do clarinete em Mi bemol
      description: Especifica se o clarinete em Mi bemol é uma variante soprano ou
        alto.
    eco_material_type:
      name: Tipo de material ecológico
      description: Destaca a tecnologia de espuma ou material amigo do ambiente utilizado
        na almofada.
    edge_construction:
      name: Construção do rebordo
      description: Indica se o esqui possui rebordo metálico em nenhuma, parte ou
        em toda a sua extensão.
    edge_tuner_type:
      name: Tipo de sintonizador Edge
      description: Classifica o estilo do afiador de arestas de esqui ou snowboard,
        como um guia de fita ou uma máquina elétrica.
    edible_plant_part:
      name: Parte comestível da planta
      description: Indica qual a parte da planta que está a ser vendida para consumo.
    educational_guide_included:
      name: Guia educativo incluído
      description: Indica quais os materiais de aprendizagem incluídos no modelo.
    educational_topic:
      name: Tema educativo
      description: Tema principal de aprendizagem suportado pelo conteúdo educativo
        do formigueiro.
    egg_component:
      name: Componente do ovo
      description: Identifica qual a parte do ovo que o produto contém, como ovo inteiro,
        apenas a clara, gemas ou misturas/substitutos.
    egg_component_replaced:
      name: Componente do ovo substituído
      description: 'Indica qual a parte do ovo que o produto se destina a substituir
        (ex.: ovo inteiro, clara de ovo).'
    egg_enrichment:
      name: Enriquecimento de ovos
      description: Indica qualquer fortificação nutricional adicionada aos ovos, como
        enriquecimento com ómega-3 ou vitamina D.
    egg_farming_method:
      name: método de criação de galinhas poedeiras
      description: 'Indica o método de produção ou de criação utilizado para os ovos
        (ex.: sem gaiolas, de capoeira, biológico).'
    egg_grade:
      name: Grau do ovo
      description: Indica o nível de qualidade atribuído pelas entidades reguladoras
        ou da indústria.
    egg_processing_state:
      name: Estado de processamento de ovos
      description: 'Indica qualquer processamento aplicado aos ovos antes da venda
        (ex.: ovos Fresh, salgados, séc.).'
    egg_production_method:
      name: Método de produção de ovos
      description: Especifica o sistema de criação ou alojamento utilizado para produzir
        os ovos (por exemplo, sem gaiolas, criados em pastagem, biológicos).
    egg_replacer_main_ingredient:
      name: Ingrediente principal do substituto do ovo
      description: Indica o ingrediente base principal a partir do qual é feito o
        substituto do ovo, auxiliando os utilizadores com necessidades dietéticas
        ou propriedades desejadas na preparação dos alimentos.
    egg_size:
      name: tamanho do ovo
      description: Classifica os ovos pelas designações de tamanho padrão do mercado.
    egg_source_animal:
      name: O animal que fornece os ovos
      description: Identifica a espécie animal que produziu os ovos.
    egg_white_processing_method:
      name: método de processamento de ovo branco
      description: 'Indica como a clara de ovo foi processada após a recolha (ex:
        pasteurizada, atomizada), afetando a segurança alimentar, a vida útil da prateleira
        e a utilização caixa interior.'
    eggplant_variety:
      name: Variedade de beringela
      description: Especifica a cultivar ou variedade de beringela, permitindo ao
        comprador escolher tipos que diferem em tamanho, sabor, textura e utilização
        culinária.
    eggshell_color:
      name: casca de ovo
      description: Especifica a cor predominante da casca dos ovos.
    elastic_edge_finish_type:
      name: Acabamento/tipo de rebordo elástico
      description: Especifica a construção da borda do elástico tecido que afeta o
        conforto e a praticidade.
    elastic_intended_use:
      name: Uso pretendido elástico
      description: A aplicação principal para a qual o Elasticsearch foi concebido
        (auxilia na descoberta e reduz as incompatibilidades).
    elastic_recovery_performance:
      name: desempenho de recuperação elástica
      description: Descreve a capacidade do elástico tecido voltar ao seu comprimento
        original após ser esticado.
    elastic_recovery_quality:
      name: Qualidade de recuperação elástica
      description: Indica a capacidade de recuperação do elástico — a forma como este
        regressa ao seu comprimento original após ser esticado.
    elastic_stretch_level:
      name: nível de elasticidade
      description: O quanto o elástico se pode estender sob tensão (geralmente expresso
        em níveis relativos quando a percentagem exata não é fornecida).
    elastic_structure:
      name: Estrutura elástica
      description: Especifica a construção estrutural do elástico para casas de botão
        (por exemplo, tricotado, tecido, entrançado), que pode afetar a elasticidade,
        a recuperação e o desempenho da costura.
    elastic_type:
      name: Tipo de elástico
      description: Especifica o tipo de construção do elástico (por exemplo, elástico
        dobrável (FOE), entrançado, tricotado, tecido).
    electric_assist_type:
      name: tipo de assistência elétrica
      description: Indica se a bicicleta possui assistência motorizada e o tipo de
        assistência prestada.
    electric_bicycle_motor_position:
      name: posição do motor da bicicleta elétrica
      description: Localização do motor de acionamento na bicicleta elétrica, como
        o motor central, o motor de cubo dianteiro, o motor de cubo traseiro ou o
        motor de cubo duplo.
    electric_bike_class:
      name: aula de bicicleta elétrica
      description: Classifica as bicicletas elétricas de acordo com as classes regulamentares
        que definem os limites de velocidade e o nível de assistência ao pedal.
    electric_guitar_bridge_type:
      name: Ponte para guitarra elétrica
      description: Especifica o tipo de sistema de ponte/vibrato na guitarra elétrica.
    electric_instrument_output_connection_type:
      name: Tipo de ligação de saída do instrumento elétrico
      description: Especifica a(s) ligação(ões) física(s) de saída de áudio fornecida(s)
        no violoncelo elétrico.
    electric_riding_vehicle_control_options:
      name: opções de controlo de veículos elétricos de condução
      description: 'Opções de controlo/operação disponíveis para o condutor/responsável
        (ex.: pedal, volante, comando à distância).'
    electric_spinning_wheel_speed_control_type:
      name: tipo de controlo de velocidade da roda de fiar elétrica
      description: Descreve como o utilizador ajusta a velocidade de rotação na roda
        elétrica.
    electric_ukulele_output_jack_type:
      name: Tipo de conector de saída para cavaquinho elétrico
      description: Especifica o conector de saída física utilizado pelo cavaquinho
        elétrico.
    electric_van_body_length_class:
      name: Classe de comprimento da carroçaria das carrinhas elétricas
      description: Classe de dimensionamento de carrinhas comum, baseada na distância
        entre eixos e no comprimento, utilizada na Listagem.
    electric_van_roof_height_class:
      name: classe de altura do tejadilho da carrinha elétrica
      description: Classificação comum de altura do tejadilho utilizada para carrinhas
        (especialmente carrinhas de carga).
    electric_vehicle_drivetrain_layout:
      name: Esquema de transmissão de veículos elétricos
      description: Configuração motor/eixo que descreve quantos motores existem e
        onde se encontram (para além da simples tração às quatro rodas/tração dianteira/tração
        traseira).
    electric_winder_accessories_included:
      name: Acessórios para enrolador elétrico incluídos
      description: 'Lista os acessórios incluídos com a bobinadeira elétrica (ex.:
        grampos, adaptadores).'
    electrical_connector_type:
      name: Tipo de conector elétrico
      description: Especifica o tipo de conector utilizado pela fechadura/sistema
        de fecho da porta para integração elétrica (se aplicável).
    electrical_system_voltage:
      name: Tensão do sistema elétrico
      description: Indica a tensão nominal do sistema elétrico do veículo para a qual
        o regulador foi concebido.
    electronic_cymbal_trigger_zones:
      name: Zonas de acionador de pratos eletrónicos
      description: Especifica quantas zonas de acionamento independentes o pad de
        prato oferece (por exemplo, corpo/borda/cúpula).
    electronic_drum_module_audio_interface_functionality:
      name: Funcionalidade de interface de áudio Modules de bateria eletrónica
      description: Indica se os Modules podem funcionar como interface de áudio USB
        para gravação/reprodução (para além de MIDI).
    electronic_drum_module_metronome_features:
      name: Modules de bateria eletrónica com metrónomo integrado.
      description: Especifica a capacidade integrada de prática/metrónomo.
    electronic_drum_module_power_source:
      name: Fonte de alimentação Modules de bateria eletrónica
      description: Especifica a fonte de alimentação necessária ou suportada para
        os Modules de controlo.
    electronic_drum_module_sample_import_support:
      name: Modules de bateria eletrónica amostra importação assistência
      description: Indica se os Modules podem importar amostras de utilizadores e
        por que método.
    electronic_drum_pad_playing_surface_type:
      name: tipo de superfície de toque do pad de bateria eletrónica
      description: Descreve a construção da superfície de toque do pad do tom (por
        exemplo, pele de malha versus borracha), afetando o ressalto, o ruído e a
        sensação ao tocar.
    electronic_features:
      name: Características eletrónicas
      description: Indica as funcionalidades eletrónicas/interativas incluídas no
        item de jogo bancário (caso existam).
    electronic_lights_and_sound:
      name: Luzes e sons eletrónicos
      description: Indica se a casa de bonecas inclui luzes eletrónicas e/ou recursos
        sonoros (por exemplo, luzes, campainha, música, efeitos sonoros).
    electronics_power_source:
      name: Fonte de alimentação eletrónica
      description: Especifica como os componentes eletrónicos ativos são alimentados
        (quando aplicável).
    eligible_race_series:
      name: Séries de corridas elegíveis
      description: Série de corridas ou entidade reguladora na qual o automóvel está
        apto a competir.
    elliptical_trainer_part_type:
      name: Tipo de peça para aparelho elíptico
      description: Classifica o tipo específico de acessório ou peça de substituição
        para um aparelho elíptico (por exemplo, correia, consola, pedal), permitindo
        ao comprador encontrar rapidamente o item desejado sem ter de navegar por
        várias microcategorias.
    embellishment_technique:
      name: Técnica de embelezamento
      description: 'Informação: o trabalho decorativo ou de superfície principal aplicado
        à peça de vestuário, como bordados, estampas ou aplicações de missangas.'
    embellishment_type:
      name: Tipo de enfeite
      description: Identifica o tipo de elemento decorativo aplicado à liga, como
        renda, laços ou pérolas.
    embossing_pen_ink_color:
      name: tinta de caneta de relevo cor
      description: Especifica a cor da tinta depositada pela caneta de relevo (pode
        ser transparente/pegajosa ou pigmentada). Diferente da cor da caneta/corpo.
    embossing_stylus_tip_shape:
      name: Forma da ponta de caneta para relevo
      description: Descreve a geometria da ponta de relevo utilizada para criar diferentes
        efeitos (por exemplo, esférica versus pontiaguda).
    embroidered_coverage_level:
      name: Nível de cobertura bordado
      description: Quantidade aproximada de thread bordados na face do patch.
    embroidered_patch_backing_type:
      name: Tipo de suporte para patch bordado
      description: A camada de suporte/reforço no verso do patch bordado afeta a durabilidade
        e a forma como pode ser aplicado.
    embroidery_hoop_type:
      name: Tipo de bastidor de bordar
      description: Identifica o estilo de construção do bastidor de bordar e o seu
        principal mecanismo de tensionamento.
    embroidery_machine_bobbin_type:
      name: Tipo de bobine para máquina de bordar
      description: Tipo/estilo de carregamento do sistema de bobinas.
    emergency_lighting_configuration:
      name: Configuração de iluminação de emergência
      description: Especifica a configuração principal da iluminação de aviso de emergência
        instalada no veículo (por exemplo, barra de luz no tejadilho, luzes na grelha).
    emergency_lighting_package:
      name: Pacote de iluminação de emergência
      description: Especifica os tipos de luzes de aviso de emergência instaladas.
    emissions_compliance_standard:
      name: Norma de conformidade de emissões
      description: Indica a certificação/conformidade de emissões do motor, quando
        aplicável.
    emissions_standard:
      name: Padrão de emissões
      description: Norma de conformidade de emissões para o veículo (varia consoante
        a região e o ano).
    enclosure_panel_configuration:
      name: Configuração do painel do armário
      description: Especifica quais os painéis ou laterais da estrutura que estão
        incluídos (configuração da cobertura), como estrutura completa, apenas cortinas
        laterais ou estrutura de 3 lados (frente/traseira aberta).
    enclosure_window_material:
      name: Material da janela do recinto
      description: Identifica o material utilizado nos painéis transparentes das janelas
        da estrutura.
    end_fitting_type:
      name: Tipo de encaixe final
      description: O tipo de conector utilizado em cada extremidade da haste (lado
        do veículo e lado da tampa) determina a compatibilidade da montagem.
    end_type:
      name: Tipo final
      description: Especifica o estilo de fixação/ancoragem nas extremidades da cinta
        de reboque para ligação aos pontos de ancoragem.
    ends_style_blocking_wires:
      name: Estilo de extremidades (bloqueio de fios)
      description: Como as extremidades do fio de bloqueio são acabadas para segurança
        e facilidade de passagem pelas bordas da renda.
    enduro_bike_suspension_adjustability:
      name: Ajuste da suspensão da moto Enduro
      description: Indica quais os ajustes da suspensão disponíveis (normalmente para
        a forquilha dianteira e o amortecedor traseiro).
    engine_bay_mounting_location:
      name: Ponto de fixação no compartimento do motor
      description: Localização aproximada onde será montado o reservatório de expansão
        no compartimento do motor (posição relativa).
    engine_bearing_coating:
      name: Revestimento dos rolamentos do motor
      description: Especifica qualquer revestimento superficial no rolamento (para
        resistência ao desgaste, incorporação, redução do atrito).
    engine_bearing_position:
      name: Posição do rolamento do motor
      description: Especifica a localização/funções locais do rolamento dentro do
        motor.
    engine_bearing_size:
      name: Rolamento do motor
      description: Especifica se o rolamento é de tamanho padrão ou uma variante subdimensionada/sobredimensionada
        (comumente relacionada com a retificação e expansão da cambota).
    engine_configuration:
      name: Configuração do motor
      description: 'Descreve o esquema/configuração dos cilindros do motor (ex.: em
        linha, em V, boxer).'
    engine_cooling_type:
      name: tipo de refrigeração do motor
      description: Especifica o método de arrefecimento do motor.
    engine_degreaser_form:
      name: desengordurante de motor
      description: Formato físico/forma de administração do desengordurante de motores.
    engine_degreaser_rinse_requirement:
      name: Requisito de enxaguamento com desengordurante de motor
      description: Se o desengordurante deve ser enxaguado com água após a aplicação.
    engine_mount_type:
      name: Tipo de suporte do motor
      description: Especifica o design funcional do suporte do motor (por exemplo,
        hidráulico, rígido, com amortecedor de binário).
    engine_oil_formulation:
      name: formulação de óleo de motor
      description: Indica o foco da formulação do óleo de motor, como a utilização
        padrão, o condicionamento para alta quilometragem, os intervalos de mudança
        alargados ou a aplicação para frotas/cargas pesadas.
    engine_oil_specification:
      name: Especificação do óleo do motor
      description: 'A especificação/norma que o óleo cumpre (ex.: API SP, API SN Plus,
        API CK-4, ACEA C3, ILSAC GF-6A).'
    engine_rebuild_kit_contents:
      name: Conteúdo do kit de reconstrução do motor
      description: Identifica os componentes principais que estão incluídos no kit
        de reconstrução do motor.
    engine_rotation_direction:
      name: sentido de rotação do motor
      description: Especifica o sentido de rotação do motor utilizado em aplicações
        marítimas.
    engine_timing_system_drive_type:
      name: tipo de acionamento do sistema de sincronização do motor
      description: Indica se o sistema de distribuição do motor é acionado por correia,
        corrente ou engrenagem, para efeitos de compatibilidade.
    engine_valve_coating:
      name: Revestimento das válvulas do motor
      description: Identifica qualquer configuração de superfície de teste ou revestimento
        aplicado à válvula quanto à resistência ao desgaste/calor.
    engine_valve_position:
      name: Posição da válvula do motor
      description: Especifica se a válvula do motor se destina ao lado de admissão
        ou ao lado de escape do motor.
    engine_valve_stem_tip_type:
      name: tipo de ponta da haste da válvula do motor
      description: Especifica o estilo ou a construção da ponta da haste da válvula
        no ponto de contacto com o balancim ou o ajustador.
    engine_valvetrain_type:
      name: Tipo de distribuição do motor
      description: Configuração do comando de válvulas/eixo de comando.
    enhancement_level:
      name: Nível de melhoria
      description: 'Aumento aproximado de volume fornecido pela bula, expresso em
        tamanho de copo: Subtil (até 1 copo), Moderado (1–2 copos), Significativo
        (2+ copos).'
    entry_zipper_location:
      name: Localização de entrada do fecho de correr
      description: Especifica onde se encontra o fecho ou a abertura principal do
        fato (por exemplo, frente, costas, ombro, diagonal).
    epee_point_type:
      name: Tipo de ponta de espada
      description: Especifica a marca ou o padrão da ponta instalada na lâmina, o
        que afeta a compatibilidade e a manutenção.
    equestrian_discipline:
      name: Disciplina equestre
      description: Especifica a modalidade de equitação para a qual a espora se destina
        ou mais adequada.
    equestrian_helmet_safety_certification:
      name: Certificação de segurança para capacetes de equitação
      description: Especifica a(s) norma(s) de segurança ou certificações com as quais
        o capacete está em conformidade.
    equine_application_area:
      name: Área de aplicação em equinos
      description: Especifica a região do corpo ou o material a que o produto se destina
        (por exemplo, casco, crina, arreios).
    equipment_contact_material_brew_wine:
      name: Material em contacto com o equipamento (cerveja/vinho)
      description: 'Material principal do item que entra em contacto com o líquido
        (ex.: vidro, aço inoxidável, plástico).'
    eu_children_clothing_size:
      name: Tamanho da roupa infantil da UE
      description: Especifica o tamanho da roupa infantil da UE por altura, como 104
        ou 140
    eu_clothing_size:
      name: EU roupa tamanho
      description: Especifica o tamanho de roupa na UE, como 38 ou 46
    eu_cup_size:
      name: UE aprecie a taça
      description: Especifica o tamanho do soutien da UE, como C ou E
    eu_ring_size:
      name: tamanho do anel da UE
      description: Especifica o tamanho do anel na UE pela circunferência, como por
        exemplo 52 ou 63.
    eu_shoe_size:
      name: Eu gosto do sapato
      description: Especifica o tamanho do sapato da UE, como 42 ou 42 Wide
    euphonium_included_accessories:
      name: Eufónio com acessórios incluídos
      description: 'A lista inclui itens geralmente embalados com um eufónio (p. ex.:
        bocal, caixa interior).'
    euphonium_valve_configuration:
      name: Configuração da válvula do eufónio
      description: Especifica o número de válvulas e se a quarta válvula é operada
        manualmente ou por um mecanismo de acionamento lateral.
    european_sword_historical_period:
      name: período histórico da espada europeia
      description: Período histórico principal em que se baseia o modelo/réplica da
        espada (ou a era da original).
    european_sword_pattern_type:
      name: Padrão/tipo de espada europeia
      description: Padrão/tipo (tipologia) específico de espada europeia representado
        pela espada colecionável.
    ev_connector_adapter_direction:
      name: Direção do conector/adaptador EV
      description: Especifica a FROM e TO do adaptador (lado da entrada do veículo
        versus lado do carregador/cabo), permitindo uma filtragem de compatibilidade
        precisa.
    ev_conversion_kit_completeness_level:
      name: Nível de completude do kit de conversão para veículos elétricos
      description: Indica se o produto é um kit de conversão completo ou um kit/pacote
        parcial (por exemplo, apenas motor + controlador).
    ev_conversion_kit_drivetrain_configuration:
      name: configuração do grupo motopropulsor do kit de conversão para veículos
        elétricos
      description: Especifica a arquitetura do sistema de transmissão de um kit de
        conversão EV, incluindo o motor ponto de apresentação/drive esquema e se mantém
        a transmissão existente.
    ev_conversion_kit_voltage_class:
      name: Classe de voltagem do kit de conversão EV
      description: Classe de tensão nominal do sistema (categoria) em torno da qual
        foi concebido o kit de conversão para veículos elétricos. Utilize esta opção
        para filtrar por classes de tensão de sistema comuns, para além da medição
        exata da tensão.
    evaporator_core_type:
      name: Tipo de núcleo do evaporador
      description: Especifica o projeto de construção do núcleo do evaporador de um
        sistema de ar condicionado automóvel.
    evenweave_fabric_finish_treatment:
      name: Acabamento/tratamento do tecido de trama uniforme
      description: Indica qualquer pré-acabamento ou tratamento aplicado ao tecido
        que afete a sua aparência.
    evenweave_fabric_package_format:
      name: Formato da embalagem do tecido Evenweave
      description: Como é vendido o tecido (pedaço cortado ou peça contínua por metro/jarda).
    exercise_bike_accessory_part_type:
      name: Tipo de acessório/peça para bicicleta de exercício
      description: 'Descreve as funções principais ou o tipo de componente do item
        (ex.: pedal, correia de transmissão, suporte para garrafa, tampa do ecrã,
        braço da manivela).'
    exercise_bike_cushion_component:
      name: Componente de almofada para bicicleta de exercício
      description: Especifica o fornecimento de componentes relacionados com o assento,
        como a almofada, o selim ou a capa do assento.
    exercise_bike_metrics_tracked:
      name: Métrica de bicicleta ergométrica rastreada
      description: Lista os campos de dados do treino que o computador pode medir
        e apresentar em tempo real.
    exercise_mat_accessories_included:
      name: Acessórios para tapete de exercício incluídos
      description: Lista os componentes adicionais fornecidos com o tapete, como correias
        ou joelheiras.
    exhaust_cooling_type:
      name: Tipo de arrefecimento por exaustão
      description: Indica se o componente de escape se destina a sistemas de escape
        húmido (refrigerados a água/com injeção de água) ou a sistemas de escape seco.
    exhaust_installation_position:
      name: Posição de instalação do escape
      description: Indica em que parte do veículo a peça está instalada.
    exhaust_outlet_configuration:
      name: Configuração da saída de exaustão
      description: Especifica o esquema da saída de escape na parte traseira do veículo.
    expansion_tank_cap_connection_type:
      name: Tipo de ligação da tampa do depósito de expansão
      description: O tipo de ligação mecânica é utilizado para fixar e vedar a tampa
        ao gargalo do reservatório de expansão.
    expansion_tank_cap_pressure_relief_feature:
      name: Recurso de alívio de pressão da tampa do tanque de expansão
      description: Se e como a tampa proporciona alívio de pressão/vácuo.
    expansion_tank_cap_seal_material:
      name: Material de vedação da tampa do reservatório de expansão
      description: Material da junta/vedação que entra em contacto com o gargalo do
        reservatório de expansão.
    extension_attachment_method:
      name: Método de fixação da extensão
      description: Indica como a extensão se fixa ao cockpit/guiador da bicicleta,
        ajudando os ciclistas a confirmar a compatibilidade com a sua configuração
        atual.
    extension_bend_type:
      name: tipo de dobra de extensão
      description: Descreve o estilo geométrico ou a curvatura da extensão do guiador,
        que afeta a ergonomia e a aerodinâmica do ciclista.
    extension_mechanism:
      name: Mecanismo de extensão
      description: Descreve o método que uma mesa utiliza para expandir o seu comprimento
        ou área de superfície, se aplicável.
    extension_table_features:
      name: Características da mesa extensível
      description: Destaca as características funcionais específicas das mesas extensoras
        para máquinas de costura.
    eyelet_grommet_installation_method:
      name: Método de instalação de ilhós e anilhas
      description: Especifica a forma como o ilhó/grommet é instalado/fixado no material.
    eyewear_lens_shape:
      name: Forma das lentes para óculos
      description: Indica as formas geométricas da lente, como cilíndrica ou esférica,
        que afetam o campo de visão, a distorção e o estilo.
    eyewear_strap_material:
      name: Material da correia dos óculos
      description: Especifica o material da correia ajustável que fixa os óculos de
        proteção ou os óculos graduados à cabeça do utilizador.
    fabric_backing_type:
      name: Tipo de suporte de tecido
      description: Especifica se o algodão imprimível inclui um suporte Paper estabilizador
        (e qual o tipo), o que determina se pode ser alimentado em impressoras standard.
    fabric_cut_format:
      name: Formato de corte de tecido
      description: Especifica o corte/formato da tela para bordado.
    fabric_end_use:
      name: Utilização final do tecido
      description: Identifica a principal aplicação pretendida do tecido (para que
        é mais indicado).
    fabric_finish:
      name: Acabamento em tecido
      description: Acabamento superficial/tratamento aplicado ao tecido de seda afetando
        o brilho, o toque e o desempenho.
    fabric_intended_use:
      name: Utilização prevista do tecido
      description: Principais aplicações/projetos recomendados para o tecido de linho.
    fabric_opacity_level:
      name: Nível de opacidade do tecido
      description: Indica o grau de transparência do tecido, afetando as necessidades
        de sobreposição de camadas e forro.
    fabric_patch_shape:
      name: Forma de retalhos de tecido
      description: Descreve as formas dos retalhos incluídos no kit.
    fabric_repair_kit_application_method:
      name: método da aplicação kit de reparação de tecido
      description: Especifica a forma como o reparo é aplicado ao tecido (por exemplo,
        com ferro de engomar, costurado ou adesivo).
    fabric_repair_kit_components_included:
      name: Componentes do kit de reparação de tecidos incluídos
      description: 'Lista os componentes específicos fornecidos no kit (ex.: remendos,
        thread, agulha, adesivo).'
    fabric_repair_kit_intended_use:
      name: kit de reparação de tecidos - uso pretendido
      description: Especifica a tarefa de reparação comum para a qual o kit foi concebido
        (por exemplo, rasgos, furos, bainhas).
    fabric_selling_format:
      name: Formato de venda de tecido
      description: Especifica a forma como o tecido é vendido (comprimento contínuo,
        peça pré-cortada, rolo/bobine ou amostra).
    fabric_stretch_level:
      name: Nível de elasticidade do tecido
      description: Descreve o grau de elasticidade do tecido, auxiliando o comprador
        na escolha de tecidos adequados para peças de vestuário ajustadas ou projetos
        estruturados.
    fabric_stretch_type:
      name: Tipo de elasticidade do tecido
      description: Indica o desempenho elástico do tecido do calção de banho, importante
        para a mobilidade ao surfar ou nadar.
    fabric_texture:
      name: Textura do tecido
      description: Descreve a textura ou a estrutura da malha do tecido utilizado
        na blusa de roupa de descanso.
    fabric_use_case:
      name: Utilização de tecido caixa interna
      description: Utilização principal prevista para o pedaço/rolo de tecido de cetim.
    fabric_weight_class:
      name: classe de peso do tecido
      description: Classifica a flanela por gamas de peso de utilização típica para
        ajudar o comprador a filtrar sem saber a gramagem exacta em GSM/oz.
    face_mask_material:
      name: Material da viseira
      description: Composição do material da máscara facial incluída com o capacete
        ou compatível com o mesmo.
    face_mask_style:
      name: Tipo de viseira
      description: Define a forma geral ou o estilo de construção da máscara facial,
        ajudando o comprador a encontrar o ajuste e a estética que prefere.
    face_mask_style_code:
      name: código de estilo da máscara facial
      description: Define o estilo de barra estrutural ou a família de código da indústria
        da máscara facial (por exemplo, ROPO, OPO, RJOP).
    face_protection_type:
      name: Tipo de proteção facial
      description: Indica o tipo de proteção facial fornecida com o capacete ou integrada
        no mesmo, como grades ou viseiras.
    faceplate_security_features:
      name: Características de segurança da placa frontal
      description: Capta as características de segurança e controlo de acesso relacionadas
        com a placa frontal, para além do design básico.
    facing_length:
      name: Comprimento frontal
      description: Especifica o comprimento da abertura (comprimento da curva) do
        bocal, afetando a resposta e a escolha da palheta.
    fan_shroud_type:
      name: Tipo de proteção do ventilador
      description: Especifica o estilo de cobertura/geometria da proteção do ventilador
        (por exemplo, completa, parcial ou em anel).
    farming_method:
      name: Método de criação
      description: Destaca as práticas de bem-estar animal ou de criação utilizadas
        para criar os animais, como a criação ao ar livre ou biológica.
    farming_practice:
      name: Prática agrícola
      description: 'Identifica o principal método de cultivo utilizado para o produto
        (ex.: convencional, biológico, hidropónico).'
    fascinator_style:
      name: Estilo fascinator
      description: Descreve o design estrutural ou a forma do toucado para que o comprador
        possa filtrar rapidamente por estilos populares de chapelaria.
    fastener_grade:
      name: Grau de fixação
      description: Indica a classe/grau de resistência do parafuso, como por exemplo
        Grau 8 ou Classe 10.9, que determina a capacidade de carga.
    fat_rendering_state:
      name: Estado de renderização de gordura
      description: Especifica se a gordura está derretida, não derretida (crua) ou
        parcialmente derretida, afetando o tempo de conservação e a utilização culinária.
    fat_source:
      name: Fonte de gordura
      description: Identifica a principal fonte de gordura utilizada na produção de
        manteiga, ghee ou margarina (animal ou vegetal), ajudando na identificação
        de alergias e na filtragem alimentar.
    faucet_hole_configuration:
      name: Configuração do furo da torneira
      description: Indica a quantidade e o ponto de apresentação dos orifícios pré-perfurados
        para torneira no tampo do lavatório.
    feather_application:
      name: Aplicação da pena
      description: Utilização ou aplicação principal pretendida das penas de peru
        para manualidades ou fabrico.
    feather_attachment_format:
      name: Fixação/formato de penas
      description: Como as penas sintéticas são preparadas/vendidas para utilização
        (soltas, em corrente, em fita, etc.).
    feather_coloration_style:
      name: Estilo de coloração de penas
      description: 'Descreve a forma como a cor é aplicada/aparece na(s) pena(s) (ex.:
        sólida, com a ponta tingida, em degradé), independentemente do valor base
        da cor.'
    feather_component:
      name: Componente de pena
      description: 'Especifica qual a parte/estilo de pena de pavão que está a ser
        vendida (ex.: pena do olho versus pena da plumagem).'
    feather_curvature:
      name: curvatura da pena
      description: Forma geral/perfil de curvatura da pena.
    feather_finish:
      name: Acabamento em penas
      description: Indica se as penas de avestruz são naturais ou se foram processadas
        (por exemplo, tingidas ou branqueadas) para uso decorativo.
    feather_form:
      name: forma de pena
      description: Especifica a forma física das peças de penas de ganso que estão
        a ser vendidas.
    feather_grade:
      name: Grau de pena
      description: Classificação geral de qualidade/seleção da pena para uso Craft
        versus uso decorativo.
    feather_part:
      name: Parte da pena
      description: A parte/estrutura da pena de peru que está à venda (comum em anúncios
        de artigos de artesanato e de material para montagem de moscas).
    feather_processing_type:
      name: Tipo de processamento das penas
      description: 'Como as penas foram processadas/tratadas para uso Craft (ex.:
        tingidas, branqueadas, naturais/sem tingimento).'
    feather_product_form:
      name: Forma do produto de penas
      description: 'O formato físico/corte do produto de penas tal como é vendido
        (ex.: penas soltas vs. estolas vs. franjas).'
    feather_quantity_unit:
      name: Unidade de quantidade de penas
      description: Define a forma como o produto é vendido (por exemplo, por unidade,
        por peso, por maço) para auxiliar na comparação precisa entre anúncios.
    feather_source:
      name: Fonte de penas
      description: Especifica a origem animal das penas utilizadas nas petecas de
        penas.
    feather_stiffness:
      name: Rigidez da pena
      description: Rigidez relativa das barbas/estrutura das penas.
    feed_mechanism:
      name: Mecanismo de alimentação
      description: Indica como as bolas são alimentadas na máquina de lançamento.
    feed_purpose:
      name: Objetivo da alimentação
      description: Descreve o principal objetivo nutricional ou funcional do alimento
        ou suplemento.
    feeder_mechanism_type:
      name: Tipo de mecanismo de alimentação
      description: Identifica o mecanismo de distribuição que o alimentador utiliza
        para libertar a ração.
    feijoa_cultivar:
      name: cultivar de feijoa
      description: Identifica a cultivar ou variedade específica de feijoa, uma vez
        que diferentes cultivares oferecem sabores, tamanhos e épocas de colheita
        distintos.
    felt_duty:
      name: Feltro
      description: 'Especifica a classificação de feltro da bola de ténis (ex: extra
        pesada, pesada regular), que influencia a durabilidade em diferentes superfícies.'
    felting_mold_intended_use:
      name: Finalidade do molde para feltragem
      description: Para que serve o molde ou qual é a sua finalidade em projetos de
        feltragem.
    felting_pad_surface_material:
      name: Material da superfície da almofada de feltro
      description: Material utilizado na superfície de trabalho da almofada/tapete
        de feltragem que entra em contacto com a fibra/agulha.
    fencing_certification:
      name: Certificação em esgrima
      description: Lista as aprovações oficiais do organismo regulador que a arma
        de vedação cumpre (por exemplo, FIE, USFA), indicando a legalidade da competição
        e os padrões de qualidade.
    fencing_connector_type:
      name: Tipo de conector de vedação
      description: Especifica a configuração do conector utilizada para fixar cordas,
        chaves de caixa ou bobinas de vedação (por exemplo, 2 pinos comuns, 3 pinos
        comuns, baioneta), garantindo a compatibilidade dos componentes.
    fencing_discipline:
      name: disciplina de esgrima
      description: Especifica a arma ou disciplina de vedação para a qual o produto
        foi concebido ou com a qual é compatível.
    fencing_weapon_type:
      name: Tipo de arma de esgrima
      description: Especifica o estilo de arma de esgrima ou de treino com o qual
        o acessório de treino é compatível ou que representa, ajudando os utilizadores
        a encontrar o equipamento adequado.
    fender_finish_state:
      name: Estado de acabamento da Fender
      description: Indica o estado da superfície/acabamento do para-choques, para
        que esteja pronto para a pintura e a instalação.
    fender_pieces_included:
      name: Peças do pára-choques incluídas
      description: A lista de componentes fornecidos com o produto esclarece se se
        trata de um guarda-lamas individual ou de um conjunto completo com acessórios.
    fender_type:
      name: Tipo Fender
      description: Classifica o design ou estilo geral do guarda-lamas.
    fennel_trimming:
      name: poda de funcho
      description: Indica quais as partes da planta que estão incluídas com o bolbo
        de funcho (por exemplo, com as folhas, a parte superior aparada e a raiz).
    fennel_variety:
      name: variedade de funcho
      description: Especifica a cultivar ou variedade de mercado dos bolbos de funcho
        que estão a ser vendidos.
    fermentation_application:
      name: Aplicação de fermentação
      description: 'Identifica o principal alimento ou bebida que a cultura foi concebida
        para fermentar (ex.: queijo, iogurte, kefir de leite, levedura natural).'
    fermentation_method:
      name: Método de fermentação
      description: Especifica como o molho de soja foi produzido ou fermentado (por
        exemplo, fermentado naturalmente, hidrolisado quimicamente).
    fermentation_vessel_material:
      name: Material do recipiente de fermentação
      description: Material principal do recipiente de fermentação incluído no kit
        (se existir).
    ferrule_material:
      name: Material da ponteira
      description: 'Especifica o material utilizado na ponteira do cabo (ex.: Juma,
        fenólico, policarbonato, XTC ou nenhum), que afeta a durabilidade e a sensação
        ao bater na bola.'
    fia_homologation_certification:
      name: Homologação/certificação FIA
      description: Indica se o automóvel (ou célula de segurança) é certificado/homologado
        e segundo que norma.
    fiber_animal_source_type:
      name: Tipo de animal/fonte de fibra
      description: A fibra é de origem animal ou primária (ou sintética), como a lã
        merina, a alpaca ou as fibras vegetais.
    fiber_luster_level:
      name: Nível de brilho da fibra
      description: Brilho visual da fibra, variando de mate a alto brilho.
    fiber_preparation_processing_stage:
      name: Etapa de preparação/processamento da fibra
      description: 'Indica como a madeixa foi preparada/processada para utilização
        (ex.: cartão vs. penteada, misturada, superlavada).'
    fiber_preparation_type:
      name: tipo de preparação de fibras
      description: 'Identifica a forma como a fibra foi preparada para Craft (ex.:
        cartão batt, drum-card, prefelt sheet).'
    field_hockey_ball_playing_surface:
      name: Superfície de jogo da bola de hóquei em campo
      description: Identifica a superfície ou o ambiente de jogo para o qual a bola
        foi concebida.
    field_hockey_ball_type:
      name: tipo de bola de hóquei em campo
      description: Classifica a bola de hóquei em campo de acordo com a sua utilização
        prevista ou característica especial.
    field_hockey_goal_size_standard:
      name: Baliza de hóquei em campo tamanho padrão
      description: Classifica a baliza de acordo com os padrões comuns do hóquei em
        campo ou o tamanho do treino (por exemplo, regulamento FIH para jogos ao ar
        livre, juvenil, Shop Mini).
    field_hockey_training_objective:
      name: Objectivo do treino de hóquei em campo
      description: Define a capacidade principal ou a área de foco que o auxiliar
        de treino visa melhorar.
    field_point_attachment_method:
      name: Método de fixação do ponto de campo
      description: 'Indica como a ponta de treino está fixa à haste ou ao inserto
        da flecha (ex.: roscada, colada).'
    field_point_tip_style:
      name: estilo de ponta de campo
      description: Define o estilo geométrico ou perfil funcional da ponta da arma
        de fogo, afetando a penetração, o esforço de remoção e a legalidade.
    fielding_glove_position:
      name: posição da luva de campo
      description: Identifica a posição defensiva ou o uso para o qual a luva foi
        concebida no basebol ou no softebol.
    fielding_training_focus:
      name: foco do treino de campo
      description: Especifica a principal área de competência que o auxílio visa durante
        a sessão de prática.
    fig_variety:
      name: Variedade de figo
      description: Identifica a cultivar ou variedade específica de figo que está
        a ser vendida.
    figure_8_device_design:
      name: Figura 8 - Projeto do dispositivo
      description: Identifica a configuração específica do dispositivo em forma de
        oito, que afeta as características de manuseio e a utilização pretendida.
    figure_finish_type:
      name: Tipo de acabamento da figura
      description: Indica o acabamento da superfície/pintura da figura do modelo do
        cavalo (tal como se apresenta/é considerada como artigo de coleção).
    figurine_scale:
      name: Expansão de estatuetas
      description: alargamento/relação da estatueta em relação à entidade real (quando
        aplicável), ex., 1:6.
    fill_status:
      name: Preencher estado
      description: Indica se o boneco de treino de luta é vendido pré-enchido, vazio
        ou parcialmente preenchido, determinando o custo de envio e o esforço do comprador.
    filling_consistency:
      name: consistência de enchimento
      description: 'Descreve a textura ou viscosidade do recheio conforme fornecido
        (ex.: creme liso, pedaços de fruta, pasta).'
    filling_type:
      name: Tipo de enchimento
      description: Especifica o recheio principal ou creme no interior dos biscoitos,
        se existir.
    filtration_and_mother_status:
      name: Filtração e estado da mãe
      description: Indica se o vinagre é filtrado, não filtrado, cru ou contém a "mãe",
        atendendo aos consumidores que procuram opções probióticas ou cruas.
    filtration_method:
      name: Método de filtragem
      description: Material ou técnica utilizada para filtrar e purificar a vodka
        após destilação.
    fin_box_system:
      name: Sistema de caixa de alhetas
      description: Especifica a caixa de alhetas ou a interface de montagem que a
        prancha utiliza, determinando a compatibilidade com as alhetas de substituição.
    fin_buoyancy:
      name: Flutuabilidade das barbatanas
      description: Indica se a barbatana tem flutuabilidade positiva, neutra ou negativa
        na água, Impact o trim do mergulhador e o equilíbrio do equipamento.
    fin_flex_rating:
      name: Índice de flexibilidade da quilha
      description: Indica a rigidez relativa ou o nível de flexibilidade da quilha,
        o que afeta o desempenho global.
    fin_mounting_system:
      name: Sistema de fixação da quilha
      description: Define a entretela ou padrão de fixação utilizado para fixar a
        quilha à prancha de kitesurf (por exemplo, FCS II, rosca, 4 furos), garantindo
        a compatibilidade entre as quilhas e as pranchas.
    fin_position:
      name: Posição da barbatana
      description: Especifica a posição de montagem pretendida da quilha na prancha.
    fin_strap_type:
      name: Tipo de cinta da quilha
      description: Especifica o estilo de tira ou sistema de retenção de clientes
        utilizado para fixar a barbatana ao calcanhar/pé.
    fin_template:
      name: Modelo Fin
      description: Classifica o modelo hidrodinâmico ou o formato da quilha da prancha
        de surf, Influence o estilo de curva, a velocidade e a sensação geral na prancha.
    finger_count:
      name: Contagem de dedos
      description: Indica o número de dedos que a luva, separador ou identificador
        de libertação foi concebido para auxiliar.
    finger_coverage:
      name: Cobertura dos dedos
      description: Indica a zona dos dedos que está coberta.
    finger_grip_adjustability:
      name: Ajuste da aderência dos dedos
      description: Indica como o apoio para os dedos se fixa ou ajusta para se adaptar
        a diferentes tamanhos de mão.
    finger_hole_configuration:
      name: Configuração dos orifícios para os dedos
      description: Especifica a orientação da mão em relação aos orifícios para os
        dedos (destro, canhoto ou ambidestro).
    finger_hole_count:
      name: contagem de orifícios para os dedos
      description: Indica o número de orifícios para os dedos no couro da pega, uma
        diferença fundamental entre os modelos sem dedos, com 2, 3 e 4 orifícios.
    finger_pick_band_style:
      name: estilo de banda fingerpick
      description: O estilo da faixa/laço que se fixa ao dedo influencia o conforto
        e o ajuste.
    finger_pick_blade_length:
      name: comprimento da lâmina da palheta de dedo
      description: Comprimento da lâmina de palheta a partir da banda.
    finger_pick_blade_shape:
      name: Forma da lâmina da palheta
      description: Forma/perfil da superfície de recolha (lâmina) que entra em contacto
        com a corrente.
    finger_pick_size:
      name: tamanho da palheta
      description: Dimensionamento da banda/laço da palheta para se ajustar a diferentes
        circunferências de dedos ou polegares (não ao tamanho do instrumento).
    finger_pick_wear_location:
      name: Local de desgaste da palheta
      description: Indica em que dedo deve ser utilizada a palheta, ou se o produto
        é um conjunto para polegar e indicador.
    finger_protection:
      name: Proteção de dedos
      description: Indica se a luva inclui proteção para os espinhos dos dedos e se
        estes espinhos são removíveis.
    fingerboard_bearing_type:
      name: tipo de rolamento para fingerboard
      description: Especifica o tipo de rolamento utilizado nas rodas do fingerboard.
    fingerboard_grip_type:
      name: Tipo de revestimento do fingerboard
      description: Especifica o material/tipo da superfície de aderência utilizada
        no deck do fingerboard.
    fining_agent_active_ingredient:
      name: ingrediente ativo do agente clarificante
      description: Agente clarificante primário utilizado no produto.
    fining_agent_type:
      name: tipo de agente de clarificação
      description: Especifica a composição química ou o material do agente clarificante/clarificante
        para Produtos que clarificam o vinho vermelho.
    finish_after_baking:
      name: Finalize após assar
      description: Descreve o aspeto típico da superfície após a cura/cozedura.
    finish_effect:
      name: Efeito final
      description: Descreve efeitos especiais de superfície/ópticos aplicados ao strass.
    finish_type:
      name: Tipo de acabamento
      description: Acabamento superficial aplicado no corpo do ukulele.
    finished_product_format:
      name: Formato do produto final
      description: Especifica o tipo de produto de fragrância que o kit se destina
        a fabricar.
    fire_pit_accessories_included:
      name: Acessórios para lareira exterior incluídos
      description: A lista inclui acessórios importantes fornecidos com a lareira
        exterior, como telas de proteção Spark ou pedras vulcânicas, esclarecendo
        o conteúdo da caixa.
    firework_assortment_launch_type:
      name: Variedade de fogo de artifício Tipo Launch
      description: Descreve como os fogos de artifício incluídos são normalmente acesos/Launch.
    firework_assortment_types_included:
      name: tipos de variedade de fogos de artifício incluídos
      description: 'Identifica os principais tipos de fogo de artifício incluídos
        no sortido para ajudar o comprador a comparar o conteúdo da embalagem (ex.:
        fontes, velas romanas, petardos).'
    firework_effect_types:
      name: tipos de efeitos de fogo de artifício
      description: Principais famílias de efeitos visuais e/ou sensoriais produzidos
        pelo sortido (selecionar todas as que se aplicam).
    firework_ignition_method:
      name: método de ignição de fogos de artifício
      description: Especifica a forma como o fogo de artifício é aceso ou iniciado
        (por exemplo, pavio ou fósforo elétrico).
    firework_visual_intensity_level:
      name: nível de intensidade visual do fogo de artifício
      description: Intensidade/volume visual geral do Spark para o efeito de fonte.
    firing_mode:
      name: Modede disparo
      description: Lista os Mode de disparo selecionáveis ou primários da pistola
        de airsoft.
    first_day_cover_cachet_type:
      name: Tipo de carimbo do envelope de primeiro dia
      description: 'Tipo de carimbo no envelope do primeiro dia (ex.: impresso, pintado
        à mão).'
    first_day_cover_cancellation_type:
      name: Tipo de cancelamento da capa do primeiro dia
      description: 'Tipo/estilo de cancelamento postal aplicado no envelope de primeiro
        dia (ex.: cancelamento mecânico, cancelamento manual).'
    first_day_cover_set_type:
      name: Tipo de conjunto de envelope de primeiro dia
      description: Indica se a capa representa uma única edição, uma coleção completa
        ou uma seleção/combinação de edições.
    fishing_hook_size:
      name: tamanho do anzol
      description: Especifica a designação normalizada do tamanho do anzol (por exemplo,
        nº 4, 1/0, 10/0), ajudando os pescadores a corresponder a dimensão do anzol
        com a espécie-alvo e o isco.
    fishing_hook_style:
      name: Estilo de anzol
      description: Identifica o design específico ou o padrão de curvatura do gancho
        individual, o que afeta a apresentação, a eficiência do encaixe e a aplicação
        pretendida.
    fishing_hook_type:
      name: Tipo de anzol
      description: Descreve a configuração do anzol fornecido com a colher de pesca
        (se existir).
    fishing_line_application:
      name: Aplicação de linha de pesca
      description: 'Identifica o uso pretendido da linha de pesca ou do material do
        líder (ex.: líder, linha principal, tippet).'
    fishing_line_buoyancy_type:
      name: Tipo de flutuabilidade da linha de pesca
      description: Classifica o comportamento da linha na coluna de água (por exemplo,
        flutuante, intermédia, afundante), ajudando os pescadores a escolher a profundidade
        de apresentação adequada.
    fishing_needle_purpose:
      name: Finalidade da agulha de pesca
      description: Identifica a principal aplicação da agulha em tarefas de montagem
        de equipamento de pesca.
    fishing_needle_types_included:
      name: Tipos de agulhas de pesca incluídos
      description: Enumera os modelos específicos de agulhas ou ferramentas de montagem
        incluídos no conjunto, para que os clientes possam ver rapidamente o conteúdo
        do kit.
    fit_profile:
      name: Perfil de ajuste
      description: Descreve o corte e a silhueta geral da almofada, que afetam a mobilidade
        e a cobertura.
    fit_volume_classification:
      name: Classificação do volume de ajuste
      description: 'Classifica o volume interno total da bota por mercado e marca
        (ex.: LV para baixo volume).'
    fitting_angle:
      name: Ângulo de encaixe
      description: Especifica o ângulo de curvatura do corpo da ligação (por exemplo,
        reto, 45°, 90°). Utilize “Ajustável/giratório” para ligações com ângulo variável
        e “Outro” para ângulos invulgares.
    flag_base_type:
      name: Tipo base da bandeira
      description: Define o tipo de ancoragem ou base utilizada para fixar a bandeira
        de canto em diferentes superfícies de jogo.
    flag_design_theme:
      name: Tema de desenho de bandeira
      description: Descreve o tema principal do design representado na bandeira (por
        exemplo, país/nacionalidade, equipa desportiva, feriado), auxiliando na descoberta
        e filtragem para compras baseadas na intenção.
    flag_mounting_method:
      name: Método de fixação da bandeira
      description: Especifica a forma como a bandeira é fixada ao veículo (por exemplo,
        suporte de antena, suporte de engate, magnético).
    flag_type:
      name: Tipo de bandeira
      description: Classifica o propósito ou estilo específico da bandeira de golfe,
        como por exemplo, bandeira marcada com um pino, bandeira carrinho ou bandeira
        de treino.
    flame_resistance_standard:
      name: Padrão de resistência à chama
      description: Indica a norma/certificação específica de resistência à chama ou
        ao arco elétrico que a peça de vestuário cumpre.
    flamenco_cajon_snare_system:
      name: sistema de caixa de cajón flamenco
      description: Especifica o mecanismo interno da caixa utilizado para criar o
        zumbido característico do flamenco (ou nenhum).
    flammability_compliance:
      name: Conformidade com os requisitos de inflamabilidade
      description: Especifica a(s) norma(s) de inflamabilidade aplicável(eis) que
        o tecido serve para os interiores dos veículos.
    flannel_brushing_finish:
      name: Acabamento escovado com flanela
      description: Indica se a flanela é escovada e em que lado(s), o que afeta a
        suavidade, o calor e o aspeto.
    flannel_use_type:
      name: Tipo de utilização de flanela
      description: Aplicação principal pretendida para o corte/rolo de flanela.
    flap_configuration:
      name: Configuração da aba
      description: Especifica o estilo da aba da sela, como aba simples ou aba dupla.
    flare_color:
      name: Flare cor
      description: cor da luz/chama emitida (ou cor da lente para os flares LED).
    flash_card_included_features:
      name: Características incluídas no cartão de memória
      description: Destaca as características funcionais de aprendizagem/utilização
        incluídas no cartão flash.
    flavor_intensity:
      name: Intensidade do sabor
      description: Indica a concentração do produto aromatizante, ajudando os utilizadores
        a determinar a dosagem adequada (por exemplo, concentração padrão, concentração
        extra).
    flavor_solvent_base:
      name: Base de solvente de sabor
      description: 'Identifica o transportador ou solvente primário utilizado no aromatizante
        (ex.: álcool, propilenoglicol, glicerina).'
    fleece_fiber_animal_type:
      name: Tipo de fibra animal de lã
      description: A espécie animal que fornece a fibra da lã.
    fleece_finish_surface:
      name: Acabamento/superfície em lã
      description: Descreve a superfície/acabamento do tecido de lã (por exemplo,
        antiborboto, escovado), que afeta a formação de borboto, suavidade e aparência.
    fleece_preparation_method:
      name: Método de preparação da lã
      description: Como a lã é preparada/processada para Craft e fiação (estado da
        fibra).
    flesh_color:
      name: Carne cor
      description: Especifica a cor da polpa interna do melão.
    fletching_orientation:
      name: orientação de flechamento
      description: Especifica a forma como as penas são fixadas na haste (por exemplo,
        retas, deslocadas, helicoidais), afetando a rotação e o voo da flecha.
    fletching_profile:
      name: Perfil de flechamento
      description: Define as formas geométricas ou o corte das penas, o que afeta
        o arrasto, a rapidez, o ruído e as características gerais de voo da flecha.
    flight_system_type:
      name: Tipo de sistema de voo
      description: Identifica o estilo de construção da asa, distinguindo entre sistemas
        dobráveis, moldados e integrados de asa e eixo.
    float_attachment_method:
      name: Método de fixação da boia
      description: Descreve como a bóia é fixada à linha (por exemplo, deslizante
        ou fixa), permitindo aos pescadores filtrar por estilo de montagem.
    float_design:
      name: design flutuante
      description: Classifica o estilo ou tipo geral da bóia de pesca (por exemplo,
        bóia de lançamento, bóia waggler, bóia tipo lápis) para que os pescadores
        possam escolher rapidamente um modelo adequado à sua técnica e condição física.
    float_raft_use_environment:
      name: Ambiente de utilização de jangada/balsa
      description: Definições principais para o tipo de água pretendida para o insuflável
        (piscina vs. águas calmas em mar aberto vs. ondas), refletindo as expectativas
        de durabilidade e design.
    floatation:
      name: Flutuação
      description: Se o farol foi concebido para flutuar na água.
    floor_construction_type:
      name: Tipo de construção do piso
      description: Especifica o design do piso da jangada (por exemplo, auto-vazante,
        Drop-stitch), que afeta a drenagem, a rigidez e o desempenho.
    floor_design:
      name: Projeto de pavimento
      description: Tipo de cobertura do solo fornecido com a estrutura.
    floor_inclusion:
      name: Inclusão de piso
      description: Indica se o vestíbulo inclui um pavimento e se esse pavimento é
        amovível.
    floor_mat_cleaning_method:
      name: Método de limpeza de tapetes
      description: Indica o método de limpeza principal recomendado pelo fabricante
        para o tapete.
    floor_mat_edge_style:
      name: estilo de borda do tapete
      description: Descreve se o tapete tem bordas elevadas/abas para conter derrames
        e detritos.
    floor_mat_format:
      name: Formato de tapete de chão
      description: 'Define o formato físico ou estilo do produto de proteção do pavimento
        (ex.: tapete único, mosaico de encaixe, rolo).'
    floor_mat_retention_system:
      name: Sistema de retenção de clientes para tapetes
      description: Especifica o método utilizado para manter o tapete fixo no lugar.
    floor_mat_set_configuration:
      name: Configuração do conjunto de tapetes de chão
      description: 'Indica quais as posições incluídas no pacote (ex.: apenas para
        a frente, conjunto completo).'
    floss_sugar_granulation_grade:
      name: Grau de granulação do açúcar para o fio dentário
      description: Descreve o tamanho dos cristais da mistura de açúcar (fino, médio,
        grosso), o que pode afetar o desempenho da máquina e a textura final.
    floss_sugar_product_form:
      name: Forma de produto de açúcar fio dental
      description: Indica se o açúcar para algodão-doce está pronto a usar, se é um
        concentrado de sabor que deve ser misturado com açúcar base ou se é um açúcar
        base incolor.
    flour_grind_texture:
      name: Textura da moagem da farinha
      description: Indica o tamanho da moagem ou a textura da farinha, como superfina,
        média, grossa ou moída em pedra, o que pode afetar o desempenho da receita.
    flour_processing_method:
      name: Método de processamento da farinha
      description: Capta métodos notáveis de processamento ou tratamento aplicados
        à farinha (por exemplo, moída em pedra, branqueada, germinada, enriquecida)
        que Influence o sabor, a cor ou a nutrição.
    flower_care_instructions:
      name: Instruções de cuidado com as flores
      description: 'Fornece instruções de cuidado específicas para flores Fresh cortadas
        (ex.: aparar os caules, alterar a frequência da rega).'
    flugelhorn_leadpipe_material:
      name: material do tubo de entrada do fliscorne
      description: Material do componente do tubo de sopro (se especificado separadamente
        do material geral do instrumento).
    flugelhorn_trigger_type:
      name: tipo fliscorne
      description: Indica se o fliscorne inclui um afinador e qual a válvula/tubo
        que aciona.
    fluorescence_grade:
      name: Grau de fluorescência
      description: Indica a intensidade da fluorescência do diamante quando exposto
        à luz ultravioleta.
    fluorescence_under_uv:
      name: Fluorescência sob luz UV
      description: Indica se a amostra apresenta fluorescência e qual o seu tipo sob
        luz ultravioleta.
    fluorocarbon_content:
      name: Conteúdo de fluorocarbono
      description: Indica se a cera contém aditivos de fluorocarbonetos e a que nível.
    flute_case_capacity:
      name: Flauta de caixa interna capacidade
      description: 'Indica o que a caixa interior foi concebida para conter, para
        além do corpo principal da flauta (ex.: flauta + piccolo, bocal extra).'
    flute_cleaning_rod_tip_type:
      name: Tipo de ponta da vareta de limpeza da flauta
      description: 'Descreve o desenho da extremidade da haste que segura o pano/cotonete
        ou entra em contacto com o instrumento (ex.: ranhurada, roscada, com ilhós).'
    flute_footjoint_type:
      name: Tipo de pé de flauta
      description: Especifica a configuração do pé da flauta.
    flute_headjoint_cork_type:
      name: tipo de cortiça para a cabeça da flauta
      description: Especifica o material e o tipo do conjunto de rolha/tampão fornecido
        com a cabeça do instrumento.
    flute_key_system:
      name: Sistema de chaves da flauta
      description: 'Identifica o sistema mecânico/de chaves utilizado pela flauta
        (ex.: sistema Boehm), quando aplicável.'
    flute_keywork_material:
      name: Material para chave de flauta
      description: Material e/ou revestimento das teclas (mecanismo de teclas), quando
        especificados separadamente do material do corpo.
    flute_offset_g:
      name: Flauta deslocada G
      description: Especifica se a flauta possui um esquema de chave G deslocada.
    flute_wall_thickness:
      name: Espessura da parede da flauta
      description: Categoria de espessura da parede do tubo canelado (parede fina,
        standard, parede grossa).
    fly_pattern_type:
      name: Tipo de padrão de mosca
      description: Classifica a mosca artificial de acordo com o seu estilo de pesca
        ou imitação de insetos/forragem para ajudar os pescadores a filtrar rapidamente
        o estilo de mosca correto.
    fly_rod_style:
      name: estilo de cana de pesca com mosca
      description: 'Classifica a cana de acordo com a disciplina ou aplicação de lançamento
        para a qual foi concebida (ex.: Single-hand, Switch, Spey).'
    fly_style:
      name: Tipo de braguilha
      description: Especifica o tipo de abertura frontal ou de braguilha na parte
        inferior da calça térmica.
    fly_tying_tools_included:
      name: Ferramentas para confeção de moscas incluídas
      description: Lista as ferramentas específicas para a confeção de moscas artificiais
        fornecidas no conjunto, para que o comprador saiba exatamente o que está incluído
        e possa comparar os pacotes.
    fly_type:
      name: Tipo de mosca
      description: Especifica se a parte de baixo do fato-macaco inclui uma sobreposição
        funcional e o estilo dessa sobreposição.
    flyer_hook_mounting_method:
      name: Método de montagem do gancho do folheto
      description: A forma como o gancho se fixa ao folheto (por exemplo, por rosca
        ou encaixe por pressão) afeta a facilidade de instalação e a compatibilidade.
    flyer_hook_orientation:
      name: orientação do gancho do folheto
      description: Se o gancho se destina ao lado esquerdo ou direito do flyer, ou
        se é reversível/universal.
    flyer_kit_finish_coating:
      name: kit de folhetos com acabamento/revestimento
      description: Acabamento superficial aplicado aos componentes do kit de folhetos.
    flyer_kit_included_components:
      name: O kit de folhetos incluía componentes.
      description: Identifica as peças incluídas no kit.
    flyer_orifice_type:
      name: Tipo de orifício do folheto
      description: Especifica o tipo de orifício utilizado no folheto.
    flying_disc_feature_set:
      name: Conjunto de recursos de disco voador
      description: Características funcionais notáveis do disco voador.
    flysheet_material:
      name: Material da folha de proteção
      description: Identifica o tecido principal utilizado na cobertura/sobreteto
        da tenda, que afeta o peso, a durabilidade e a resistência às intempéries.
    flywheel_balance_type:
      name: Tipo de equilíbrio do volante
      description: Indica se o volante está neutro ou utiliza um contrapeso exterior.
    foam_blocks_size_class:
      name: Classe de tamanho dos blocos de espuma
      description: Indica a classe geral de tamanho dos blocos no conjunto.
    foam_blocks_surface_texture:
      name: textura da superfície dos blocos de espuma
      description: Descreve a textura/acabamento da superfície exterior dos blocos
        de espuma.
    foam_surface_effect:
      name: Efeito de superfície de espuma
      description: Descreve efeitos decorativos comuns aplicados à espuma Craft ou
        ao esferovite, como acabamentos com glitter, metálicos ou holográficos.
    foil_color:
      name: folha cor
      description: Especifica a cor de destaque da folha metálica utilizada no certificado
        (se aplicável).
    foil_curtain_mounting_method:
      name: Método de montagem de cortina de folha
      description: 'Como deve ser instalada ou pendurada a cortina de alumínio (ex.:
        fita adesiva, ilhós).'
    foil_discipline:
      name: disciplina de florete
      description: Identifica o estilo ou disciplina principal de pilotagem para a
        qual o foil foi concebido.
    foil_mast_board_mounting_type:
      name: Tipo de montagem da prancha do mastro do foil
      description: Define a interface no topo do mastro que se liga à prancha ou ao
        foil.
    foil_mast_fuselage_connection_type:
      name: Tipo de ligação da fuselagem do mastro da folha
      description: Especifica a forma como o mastro se liga à fuselagem ou ao conjunto
        da asa dianteira.
    foil_mounting_interface:
      name: Interface de montagem do foil
      description: Identifica o padrão de ligação que o componente utiliza para se
        fixar à placa ou a outros componentes de folha metálica.
    foil_mounting_system:
      name: Sistema de montagem do foil
      description: Especifica a interface de montagem para foils ou quilhas na prancha,
        garantindo a compatibilidade com o equipamento existente do praticante.
    foil_mounting_type:
      name: Tipo de montagem do foil
      description: Identifica o sistema de interface utilizado para fixar a película
        à placa, garantindo a compatibilidade entre os componentes.
    fold_over_elastic_application:
      name: aplicativo elástico dobrável
      description: Utilização/aplicação principal pretendida para o elástico de casa
        de botão.
    foldability:
      name: Dobrável
      description: Descreve se e como o divisor se dobra ou fecha para armazenamento
        ou reconfiguração.
    foldability_stow:
      name: Dobrável (acondicionamento)
      description: Se a estrutura dobrável/condicionamento se dobra quando não está
        a ser utilizada (por exemplo, se dobra contra o veículo).
    folding_style:
      name: Estilo dobrável
      description: Indica como o colchão de impacto se dobra para transporte e armazenamento,
        afetando a uniformidade da superfície de aterragem e a facilidade de compactação.
    food_basket_items_included:
      name: Cesta de alimentos incluída
      description: Lista os principais tipos de artigos alimentares incluídos no cabaz
        para ajudar o comprador a escolher cabazes que correspondam ao sabor ou às
        necessidades alimentares dos destinatários.
    food_coloring_form:
      name: corante alimentar
      description: 'Especifica a forma física ou o formato de administração em que
        o corante alimentar é fornecido (ex.: gel, líquido, pó, spray).'
    food_contact_material:
      name: Material para contacto com alimentos
      description: Material principal dos equipamentos de vinificação (fermentadores,
        sifões, funil) utilizados com mosto/vinho.
    food_packing_medium:
      name: Meio de embalagem de alimentos
      description: Especifica o meio em que as frutas ou legumes são embalados (por
        exemplo, água, salmoura, xarope, óleo).
    foosball_rod_type:
      name: tipo de haste de matraquilhos
      description: Indica a configuração mecânica da haste que afeta a sensação de
        jogo e a segurança.
    foot_arch_type_compatibility:
      name: Compatibilidade com o tipo de arco do pé
      description: Identifica o perfil do arco do pé para o qual a palmilha foi concebida.
    foot_arch_type_suitability:
      name: Adequação ao tipo de arco plantar
      description: Identifica qual o perfil de arco plantar que a palmilha visa auxiliar.
    foot_coverage:
      name: Cobertura para os pés
      description: Indica se a bota tem pé, não tem pé, tem estribo ou calcanhar aberto.
    foot_guard_type:
      name: tipo protetor de pés
      description: Indica se a caneleira inclui proteção para os dedos/pé e especifica
        se a proteção é fixa ou amovível.
    foot_support_level:
      name: Nível de suporte do pé
      description: Indica o nível de suporte estrutural ou firmeza que uma palmilha
        proporciona, como por exemplo, baixo, médio, alto ou extra alto.
    footbag_play_style:
      name: Estilo de jogo de Footbag
      description: Principal estilo de jogo pretendido para o footbag.
    football_ball_type:
      name: tipo de bola de futebol
      description: Especifica o uso principal pretendido ou contexto para a bola de
        futebol, como jogo, treino ou exposição como item de coleção.
    football_dummy_type:
      name: boneco de futebol
      description: Classifica o estilo ou design funcional do boneco para refletir
        o seu propósito específico de treino.
    football_glove_certification:
      name: Certificação de luvas de futebol americano
      description: Indica a certificação ou o cumprimento das normas exigidas para
        a prática competitiva (por exemplo, SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Tipo de fixação do estribo
      description: Especifica a forma como a peseira se fixa à Frame da cama ou ao
        chão, auxiliando o comprador na seleção de equipamentos e métodos de instalação
        compatíveis.
    footboard_style:
      name: Estilo de estribo
      description: Define o estilo de design estrutural ou estético da peseira da
        cama.
    footrest_adjustability:
      name: Adaptabilidade do apoio para os pés
      description: Especifica se e como os apoios para os pés podem ser ajustados
        para acomodar diferentes comprimentos de perna da criança.
    footrest_type:
      name: Tipo de apoio para os pés
      description: Identifica a presença e o design de um apoio para os pés no banco.
    footstrap_configuration:
      name: Configuração da pega para os pés
      description: Especifica o padrão de inserção da pega de pé na plataforma da
        prancha.
    footswitch_action_style:
      name: Estilo de ação do pedal
      description: Indica se a ação do interruptor é momentânea ou de bloqueio, e
        se suporta ambas.
    footswitch_power_source:
      name: Fonte de alimentação do pedal
      description: Especifica a forma como o pedal é alimentado, se aplicável (passivamente
        através da entrada do amplificador, bateria, adaptador externo, USB, etc.).
    footwear_construction_method:
      name: Método de construção de calçado
      description: Define a técnica utilizada para fixar a parte superior à sola,
        Influence a durabilidade, as possibilidades de ressolagem e o preço.
    footwear_cut:
      name: Corte de calçado
      description: Indica a altura da gola do tornozelo (corte baixo, corte médio,
        corte alto), mobilidade do equilíbrio e assistência.
    footwear_size_system:
      name: Sistema de calçado
      description: 'Identifica o padrão de tamanho regional utilizado para o tamanho
        de calçado indicado (ex.: EUA, UE, Reino Unido).'
    footwear_support_type:
      name: Tipo de assistência para calçado
      description: 'Especifica o nível de assistência biomecânica ou controlo de pronação
        que o calçado proporciona (ex.: Neutro, Estabilidade, Controlo Motion ).'
    fork_material:
      name: Material do garfo
      description: Especifica o material utilizado na suspensão dianteira de uma bicicleta,
        Influence a rigidez, o peso e a qualidade Ride .
    form_factor:
      name: Fator de forma
      description: Fator de forma do equipamento primário do controlador DMX.
    formula_car_series_class:
      name: Série/classe de automóveis de Fórmula
      description: Especifica a série ou classe de corrida na qual o carro de fórmula
        foi construído para competir.
    formulation_style:
      name: Estilo de formulação
      description: 'Destaca as formulações especializadas, concebidas para utilizações
        ou preferências específicas (ex.: Barista, Extra Cremoso).'
    formulation_type:
      name: Tipo de formulação
      description: O estilo de formulação do spray desinfetante.
    fossil_preparation_level:
      name: Nível de preparação dos fósseis
      description: 'Grau de preparação/limpeza realizado na amostra (ex.: não preparada
        na matriz vs. totalmente preparada).'
    fossil_preservation_type:
      name: Tipo de preservação dos fósseis
      description: 'Tipo de preservação do fóssil (ex.: permineralizado, molde, impressão).'
    fossil_restoration_status:
      name: Estado de restauração de fósseis
      description: Indicar se e como o espécime foi reparado/restaurado (por exemplo,
        colado, reconstruído, composto).
    foundation_configuration:
      name: Configuração Foundations
      description: Especifica se a Foundations é fabricada numa só peça ou num conjunto
        Splitduas peças para colchões de maiores dimensões.
    foundation_profile:
      name: Perfil Foundations
      description: Classifica a categoria de altura geral das Foundations— por exemplo,
        ultrabaixa, baixa, padrão ou alta — para que o comprador possa combinar rapidamente
        a altura do colchão com as preferências e o tamanho do lençol.
    frame_adjustability:
      name: Adaptabilidade da estrutura
      description: Indica se e como a Frame pode ser ajustada (por exemplo, ajuste
        de largura/altura, rotação/inclinação), o que afeta a ergonomia e a adequação
        ao projeto.
    frame_drum_jingle_configuration:
      name: Configuração de jingle de tambor Frame
      description: Se o tambor Frame inclui guizos e, em caso afirmativo, qual a sua
        configuração geral.
    frame_drum_tuning_system:
      name: sistema de afinação do tambor Frame
      description: Como o tambor Frame é afinado ou se é afinável.
    frame_finish:
      name: Acabamento Frame
      description: Especifica o revestimento protetor ou acabamento do material aplicado
        à Frame, Influence a durabilidade e a estética.
    frame_mounting_standard:
      name: Norma de montagem do quadro
      description: Define a especificação da interface de arranque paraFrame (por
        exemplo, 195 mm 2 pontos, Trinity 3 pontos), fundamental para a compatibilidade
        Frame .
    frame_steel_gauge:
      name: Calibre do aço Frame
      description: Identifica a espessura (bitola) dos tubos de aço utilizados nas
        colunas da estante, um indicador crucial de resistência e estabilidade.
    frame_suspension_type:
      name: Tipo de suspensão Frame
      description: Indica o tipo de suspensão do Frame da bicicleta, como rígido,
        hardtail ou suspensão total, para ajudar o comprador a escolher Frame que
        melhor se adapta à sua configuração desejada.
    free_reed_instrument_orientation:
      name: Orientação de instrumentos de palheta livre
      description: Especifica a forma como o instrumento é segurado/tocado (manualmente
        com fole, com alça de ombro, etc.) para fins de ergonomia e utilização - filtragem
        interna.
    free_weight_rack_type:
      name: Tipo de estante de peso livre
      description: 'Classifica o estilo estrutural ou funções da estante (ex.: estante
        de barra, estante de kettlebell, árvore de anilhas).'
    freehub_body_type:
      name: Tipo de corpo Freehub
      description: Especifica o padrão do corpo do freehub ou da cassete compatível
        com o cubo traseiro da bicicleta.
    freehub_driver_standard:
      name: Padrão de driver Freehub
      description: 'Identifica a interface cassete/driver que o componente do cubo
        suporta (ex.: Shimano HG, SRAM XD).'
    freewheel_thread_standard:
      name: thread padrão de roda livre
      description: Especifica a norma ou o tamanho thread do cubo com o qual a roda
        livre é compatível.
    french_horn_bell_construction:
      name: construção da campana da trompa
      description: Especifica como o sino é construído e se pode ser removido para
        transporte/manutenção.
    french_horn_bell_material:
      name: material da campana da trompa
      description: Especifica o material/liga da campana (e frequentemente da abertura
        da campana) utilizada na trompa.
    french_horn_bell_type:
      name: tipo de sino de trompa francesa
      description: Estilo de construção do sino.
    french_horn_finish:
      name: acabamento de trompa
      description: Acabamento/revestimento exterior do instrumento.
    french_horn_included_accessories:
      name: Acessórios incluídos para trompa
      description: Acessórios incluídos com a trompa (caixa interior, bocal, etc.).
    french_horn_leadpipe_material:
      name: Material do tubo de entrada da trompa francesa
      description: Especifica o material/liga do tubo de chumbo.
    french_horn_wrap_type:
      name: Tipo de enrolamento da trompa francesa
      description: Configuração geral de ajuste/forma da trompa.
    fretboard_radius_fit:
      name: Ajuste do raio da escala
      description: Indica se a curvatura da almofada do capo foi concebida para escalas
        planas ou curvas, ou se é ajustável para acomodar vários raios de escala.
    friction_surface_included:
      name: Superfície de fricção incluída
      description: Se o volante incluir uma superfície de fricção substituível/instalada
        (por exemplo, inserto, anel) ou se for uma superfície de fricção de peça única.
    fringe_curtain_finish:
      name: Acabamento de cortinados com franjas
      description: Descreve o acabamento visual da superfície da franja (brilho/textura).
    fringe_curtain_material:
      name: Material para cortina com franjas
      description: Especifica o material principal das faixas da cortina (por exemplo,
        película de polietileno tereftalato, plástico, Paper, tecido).
    fringe_curtain_use_location:
      name: Local de utilização da cortina com franjas
      description: Indica se a cortina de franjas se destina a uso interior, exterior
        ou ambos.
    fringe_trim_style:
      name: Estilo de franja
      description: Especifica a construção/estilo da franja (como os fios ou laços
        são formados e apresentados).
    front_axle_standard:
      name: Eixo dianteiro standard
      description: Indica o diâmetro e o espaçamento do veio que o garfo foi concebido
        para aceitar (por exemplo, Boost 15 x 110 mm), garantindo a compatibilidade
        com o cubo.
    front_button_configuration:
      name: Configuração de botão da frente
      description: Indica o estilo dos botões frontais de um casaco, especificando
        se é de abotoamento simples ou duplo e o número de botões frontais.
    front_closure_style:
      name: Estilo de fecho frontal
      description: Indica o estilo da construção frontal do sobretudo, como por exemplo,
        abotoamento simples ou duplo, aberto, trespassado ou CP.
    front_decoration_type:
      name: Tipo de decoração frontal
      description: 'Identifica o tipo de enfeite ou aplique presente na parte frontal
        do chapéu (ex.: aplique bordado, aplique em pele).'
    front_point_configuration:
      name: Configuração das pontas frontais
      description: Especifica o design das pontas frontais (Mono , ponto duplo, Modular,
        substituível), Influence a precisão da penetração em gelo e terrenos mistos.
    front_seat_position:
      name: posição do banco dianteiro
      description: De que lado/posição na primeira fila foi concebido o assento?
    front_style:
      name: Estilo frontal
      description: Descreve a construção da parte frontal das calças chino, indicando
        se as calças têm a frente lisa, pregas ou outros detalhes.
    frosting_or_icing_type:
      name: Tipo de cobertura ou glacé
      description: Especifica o tipo de cobertura ou glacé aplicado no bolo ou na
        sobremesa.
    fruit_cultivar_or_variety:
      name: cultivar ou variedade de fruta
      description: Especifica o nome da cultivar ou variedade específica do fruto
        (por exemplo, Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: estilo de corte de fruta
      description: Descreve como a fruta é preparada ou cortada (por exemplo, inteira,
        fatiada, em cubos).
    fruit_mix_variety:
      name: Variedade de mistura de frutas
      description: 'Nomeia a mistura Temas ou a variedade geral da mistura de frutas
        (ex.: Mistura Tropical, Mix de Frutos Vermelhos).'
    fruit_piece_form:
      name: formato de peça de fruta
      description: Descreve o corte físico ou a apresentação de pedaços de frutos
        secos, por exemplo, inteiros, fatiados ou em pó.
    fruit_snack_form:
      name: Formato de snack de fruta
      description: Classifica a forma física ou o estilo em que o snack de fruta é
        apresentado.
    fruit_topping_format:
      name: Formato de cobertura de fruta
      description: Descreve a forma física, a textura ou o estilo da cobertura para
        que o comprador possa escolher entre molhos, caldas, pedaços de fruta, pérolas
        de tapioca, etc.
    fruit_variety:
      name: Variedade de fruta
      description: Identifica a fruta principal utilizada numa receita, kit ou conjunto
        de produtos para vinho de fruta (por exemplo, maçã, cereja, amora).
    fuel_cap_gasket_seal_material:
      name: Material da junta/vedante da tampa do combustível
      description: Especifica o material utilizado para a junta de vedação/anel O
        da tampa do depósito de combustível.
    fuel_cap_locking_mechanism:
      name: Mecanismo de bloqueio da tampa do depósito de combustível
      description: Indica o método de bloqueio utilizado por uma tampa de combustível
        com fecho.
    fuel_cap_type:
      name: Tipo de tampa do depósito de combustível
      description: Especifica o tipo/design funcional da tampa de combustível utilizada
        no bocal de enchimento de combustível de um veículo.
    fuel_cap_venting:
      name: Ventilação da tampa do combustível
      description: Indica se a tampa do depósito de combustível possui um respiro
        e, se aplicável, o tipo de respiro.
    fuel_filter_features:
      name: Características do filtro de combustível
      description: Lista as principais características funcionais do filtro de combustível
        (separação de água, válvula de drenagem, porta do sensor, etc.).
    fuel_filter_media_material:
      name: Filtro de combustível conteúdo multimédia material
      description: Especifica o conteúdo multimédia de filtragem primária utilizado
        dentro do elemento filtrante de combustível.
    fuel_filter_mounting_connection_type:
      name: Tipo de montagem/ligação do filtro de combustível
      description: Especifica a forma como o filtro de combustível se liga/instala
        (rosca/encaixe por pressão, ligação rápida, espigão para mangueira, Banjo,
        etc.).
    fuel_injection_cleaning_method:
      name: método de limpeza do sistema de injeção de combustível
      description: Indica como o kit é utilizado para limpar o sistema de injeção
        de combustível.
    fuel_injector_electrical_connector_type:
      name: Tipo de conector elétrico do injetor de combustível
      description: Especifica o padrão/forma do conector elétrico do injetor.
    fuel_injector_seat_type:
      name: Tipo de sede do injetor de combustível
      description: Especifica o estilo da interface ponta/sede do injetor utilizada
        para a vedação no coletor de admissão/carril de combustível.
    fuel_injector_spray_pattern:
      name: padrão de pulverização do injetor de combustível
      description: Identifica o padrão de pulverização/distribuição de combustível
        do injetor utilizando a terminologia do fabricante ou da indústria (por exemplo,
        cone, leque, jato concentrado, múltiplos orifícios).
    fuel_level_sensor_mounting_type:
      name: tipo de montagem do sensor de nível de combustível
      description: Especifica a interface de montagem física utilizada para fixar
        o sensor/transmissor do nível de combustível ao depósito de combustível ou
        Modules da bomba.
    fuel_level_sensor_sensing_mechanism:
      name: mecanismo de deteção do sensor de nível de combustível
      description: Especifica o mecanismo/tecnologia de deteção utilizado para medir
        o nível de combustível num sensor de nível de combustível ou unidade transmissora.
    fuel_line_compliance_standard:
      name: Norma de conformidade da linha de combustível
      description: Identifica a norma regulamentar ou do setor que a linha de combustível
        serve (comum em aplicações marítimas).
    fuel_line_connector_interface_type:
      name: Tipo de interface do conector da linha de combustível
      description: Especifica o tipo de ligação/interface na(s) extremidade(s) da
        linha de combustível ou da ligação.
    fuel_pressure_regulator_body_material:
      name: Material do corpo do regulador de pressão de combustível
      description: Especifica o material da caixa/corpo do regulador em termos de
        durabilidade e resistência à corrosão.
    fuel_pressure_regulator_mounting_type:
      name: Tipo de montagem do regulador de pressão de combustível
      description: Especifica a forma como o regulador de pressão de combustível é
        montado ou instalado, afetando a montagem e a compatibilidade.
    fuel_pump_inlet_type:
      name: Tipo de entrada da bomba de combustível
      description: Tipo de ligação na entrada da bomba.
    fuel_pump_mounting_location:
      name: Local de montagem da bomba de combustível
      description: Localização da bomba de combustível no sistema de combustível do
        veículo.
    fuel_pump_outlet_connection_type:
      name: Tipo de ligação da saída da bomba de combustível
      description: Especifica o tipo de ligação física na saída da bomba de combustível
        para compatibilidade de encaixe/instalação.
    fuel_system_application:
      name: Aplicação do sistema de combustível
      description: Arquitetura do sistema de entrega de combustível a bomba de combustível
        é projetada para assistência (ex., carburada, EFI, GDI, diesel lift/Transferências).
    fuel_system_connection_type:
      name: Tipo de ligação do sistema de combustível
      description: Especifica a(s) norma(s) de ligação do sistema de combustível ou
        a(s) interface(s) do adaptador suportadas pelo kit.
    fuel_system_type:
      name: Tipo de sistema de combustível
      description: Especifica o sistema de alimentação de combustível do motor (por
        exemplo, arquitetura do carburador ou injeção de combustível).
    fuel_tank_installation_position:
      name: posição de instalação do depósito de combustível
      description: Especifica a posição típica de instalação do depósito de combustível
        no veículo.
    fuel_tank_orientation:
      name: Orientação do depósito de combustível
      description: Especifica se o depósito de combustível deve ser instalado na horizontal
        ou na vertical.
    fuel_tank_shape:
      name: Forma de depósitos de combustível
      description: Descreve o formato geral/forma do depósito de combustível para
        auxiliar na instalação física e na compatibilidade de substituição.
    fur_type:
      name: Tipo de pelo
      description: Identifica a espécie ou o material sintético de qualquer pele presente
        no exterior da carteira ou bolsa.
    furniture_finish:
      name: Acabamento de mobiliário
      description: Descreve a configuração de superfície ou acabamento aplicado ao
        item, que afeta a sua aparência e requisitos de manutenção.
    fuse_form_factor:
      name: Formato do fusível
      description: Especifica o estilo/formato físico do fusível para garantir que
        se adapta ao porta-fusíveis ou bloco de fusíveis pretendido (por exemplo,
        lâmina versus cartucho).
    fuse_terminal_or_mount_style:
      name: Estilo de terminal ou montagem do fusível
      description: Especifica a forma como o fusível se liga mecanicamente/eletricamente
        (plug-in , fixação por parafusos ou ligação em linha).
    fusible_application_method:
      name: Método de aplicação do adesivo fusível
      description: Especifica a forma como um adesivo termocolante é ativado/aplicado
        (por exemplo, calor com ferro de engomar, prensa, reforço com costura).
    fusible_hem_tape_application_method:
      name: Método de aplicação de fita adesiva termocolante para bainhas
      description: 'Descreve a forma como a fita é ativada/aplicada (ex.: ferro de
        engomar, prensa térmica).'
    fusible_seam_tape_activation_method:
      name: Método de ativação da fita de costura termofusível
      description: Indica a forma como o adesivo é ativado durante a aplicação.
    fusible_seam_tape_application:
      name: aplicação de fita adesiva termocolante
      description: Especifica a utilização principal prevista da fita termocolante
        para costuras (caixa interior).
    fusible_seam_tape_material:
      name: Material de fita adesiva termocolante
      description: Material ou composição da fita/tela/transportadora (não o tecido
        ao qual se liga).
    fusible_seam_tape_washability:
      name: Lavabilidade da fita de costura termocolante
      description: Indica se a costura termocolante permanece intacta após a lavagem
        ou limpeza.
    fusible_seam_tape_waterproof_rating:
      name: Classificação de impermeabilidade da fita de costura termocolante
      description: Indica se a fita de vedação se destina a criar uma costura impermeável
        ou resistente à água após a aplicação.
    fusible_tape_backing_type:
      name: Tipo de suporte de fita termocolante
      description: Especifica se a fita possui um papel de proteção/revestimento e
        qual é a sua forma, o que influencia o manuseio e a aplicação.
    futon_frame_conversion_mechanism:
      name: Mecanismo de conversão Futon Frame
      description: Define o mecanismo ou estilo estrutural utilizado para converter
        a Frame entre as posições de sofá, chaise longue e cama.
    gaiter_height_type:
      name: tipo de altura da polaina
      description: Classifica as polainas de acordo com a altura da cobertura que
        oferecem na perna, como o tornozelo, o meio da barriga da perna, o joelho
        ou a coxa.
    game_variation:
      name: Variação do jogo
      description: Especifica o estilo de jogo para o qual o conjunto foi concebido
        (por exemplo, tetherball clássico, ténis em tether, speedball).
    garlic_preparation_style:
      name: Estilo de preparação do alho
      description: Especifica a forma como o alho é preparado ou processado antes
        da venda (por exemplo, inteiro, picado, em pó).
    garlic_variety:
      name: Variedade de alho
      description: Identifica a variedade botânica ou comercial do alho oferecido.
    garment_back_style:
      name: estilo das costas da peça
      description: 'Identifica o desenho ou a construção da parte de trás da peça
        de vestuário (ex.: costas abertas, costas nadador, costas cruzadas).'
    garment_pattern_type:
      name: Tipo de molde de vestuário
      description: Especifica o tipo de item de vestuário que o molde de costura se
        destina a produzir.
    garnish_type:
      name: Tipo de guarnição
      description: Identifica qual é a guarnição (ingrediente ou estilo de guarnição)
        utilizada para finalizar um cocktail.
    gas_lift_class:
      name: classe de elevação a gás
      description: Especifica a classificação de segurança e resistência do cilindro
        a gás utilizado para o ajuste da altura do assento.
    gas_propellant_type:
      name: tipo de propelente gasoso
      description: Especifica o tipo de propelente gasoso recomendado ou compatível
        quando o lançador é alimentado a gás.
    gatta_tabla_tuning_block_material:
      name: Material Gatta (bloco de afinação de tabla)
      description: Material dos blocos de afinação (gatta) utilizados entre a correia
        de afinação e o casco.
    gauge_mounting_type:
      name: Tipo de montagem do medidor
      description: Como o medidor de combustível está montado/instalado na embarcação.
    gauge_style:
      name: Estilo de medidor
      description: Especifica o tipo de manómetro que a bomba utiliza, como por exemplo
        um manómetro analógico, um visor digital ou nenhum.
    gear_oil_api_classification:
      name: Classificação API do óleo de engrenagem
      description: Classificação API GL para óleos de engrenagem usados em diferenciais/transmissões
        manuais.
    gel_wax_density_grade:
      name: grau de densidade da cera em gel
      description: Indica o grau de densidade da cera em gel, que afeta a transparência,
        a carga de fragrância e a adequação para incorporação.
    gel_wax_transparency_level:
      name: nível de transparência da cera em gel
      description: Descreve a transparência/opacidade da cera em gel quando utilizada
        de acordo com as instruções.
    gelatin_form:
      name: Forma de gelatina
      description: Informação sobre a apresentação física da gelatina para que os
        utilizadores possam escolher o formato correto para receitas e aplicações
        industriais.
    gelatin_or_gelling_agent_source:
      name: Fonte de gelatina ou agente gelificante
      description: Indica a Origin ou o tipo de agente gelificante utilizado no produto,
        informação importante para considerações dietéticas e religiosas.
    gelatin_source:
      name: Fonte de gelatina
      description: Indica a Origin animal, vegetal ou sintética da gelatina para que
        o comprador possa verificar a compatibilidade com requisitos dietéticos, éticos
        ou religiosos.
    gelling_agent:
      name: Agente gelificante
      description: Identifica a principal substância utilizada para conferir consistência
        ou espessamento à sobremesa, importante para a adequação dietética e para
        a textura.
    gemstone_clarity_grade:
      name: grau de pureza da gema
      description: Grau de pureza da gema (quando classificada).
    gemstone_creation_method:
      name: Método de criação de gemas
      description: Indica se a gema é natural, criada em laboratório ou uma imitação/simulante.
    gemstone_cut_style:
      name: estilo de corte de gema
      description: Descreve o estilo de lapidação/acabamento da gema.
    gemstone_treatment_status:
      name: Estado de tratamento da gema
      description: Indica se e como a gema foi tratada/melhorada.
    geological_period:
      name: Período geológico
      description: 'Período geológico (e, opcionalmente, época) do fóssil, quando
        conhecido (ex.: Jurássico, Cretácico, Eocénico).'
    gift_box_tin_insert_type:
      name: Tipo de inserção para caixas de presente/latas
      description: Configuração do interior para organizar/proteger os objetos dentro
        da caixa/lata.
    gift_box_tin_sustainability_features:
      name: Características de sustentabilidade das caixas/latas de presente
      description: Características relacionadas com a sustentabilidade da caixa de
        presentes/número de identificação fiscal das embalagens.
    gift_box_tin_window_type:
      name: Tipo caixa/lata de presentes com janela
      description: Se a caixa de presentes tem uma janela de visualização e qual o
        seu estilo.
    gift_message_option:
      name: opção de mensagem presente
      description: Especifica se uma mensagem/nota de presente pode ser incluída e
        como (nenhuma, incluída, personalizável).
    ginger_maturity:
      name: Maturidade do gengibre
      description: Indica a fase de colheita do gengibre, como jovem ou maduro, o
        que afeta a intensidade do sabor e o uso culinário preferido.
    ginger_variety:
      name: Variedade de gengibre
      description: Especifica a cultivar, o tipo ou o rizoma relacionado dentro da
        família do gengibre para diferenciar os perfis de sabor e os usos culinários.
    glass_kiln_controller_type:
      name: Tipo de controlador de forno de vidro
      description: Tipo de controlador de temperatura/queima incluído com o forno.
    glass_kiln_firing_application:
      name: aplicação de queima de vidro em forno
      description: Aplicação(ões) principal(ais) de trabalho com vidro para a(s) qual(is)
        o forno foi concebido.
    glass_stone_application_method:
      name: Método da aplicação de pedra de vidro
      description: Especifica como as pedras de vidro devem ser fixadas/aplicadas
        nos projetos (por exemplo, coladas, termocolantes ou costuradas).
    glass_tint:
      name: Película para vidro
      description: A película de vidro/plástico utilizada na garrafa para controlar
        a exposição à luz (comum no fabrico de cerveja/vinho).
    glaze_firing_atmosphere:
      name: atmosfera de queima do esmalte
      description: A atmosfera de cozedura para a qual o esmalte foi concebido.
    glaze_opacity:
      name: Opacidade do esmalte
      description: Quão transparente se apresenta o esmalte após a cozedura.
    glaze_product_form:
      name: Forma do produto para esmalte
      description: 'Forma física em que o produto de esmalte é fornecido (ex.: líquido,
        pó seco, concentrado, spray).'
    glider_avionics_package:
      name: Pacote de aviónica para planador
      description: Indica o nível geral de instrumentação de navegação e de voo instalada
        no planador.
    glider_certification_rating:
      name: Classificação de certificação do planador
      description: 'Classificação oficial de certificação que indica o nível de segurança
        e desempenho do parapente (ex.: EN-A, EN-B).'
    glider_landing_gear_configuration:
      name: Configuração do trem de aterragem do planador
      description: Especifica a configuração do trem de aterragem utilizada pelo planador.
    glider_launch_method:
      name: Método Launch de planador
      description: Especifica como o planador é normalmente Launch ouLaunch.
    glider_performance_class:
      name: Classe de desempenho de planador
      description: Classe ou categoria de competição/desempenho normalmente utilizada
        para planadores.
    glitter_application_method:
      name: Método de aplicação da purpurina
      description: 'Indica a técnica pretendida para aplicar/utilizar o glitter Craft
        (ex.: polvilhar/agitar, misturar, esfregar, aplicar sobre adesivo, pincelar,
        pulverizar, fixar com calor/relevo).'
    glitter_eco_friendly_claim:
      name: Alegação ecológica da Glitter
      description: Alegações ambientais/ecológicas específicas para formulações de
        glitter solto.
    glitter_effect_type:
      name: Tipo de efeito brilhante
      description: 'Descreve o efeito visual do brilho/lantejoulas para além da base
        (ex.: holográfico, iridescente).'
    glitter_glue_base_solvent_type:
      name: base de cola com glitter/tipo solvente
      description: Descreve a base principal da cola com glitter (preocupação comum
        dos compradores em relação à limpeza e à compatibilidade do material).
    glitter_opacity_coverage:
      name: Opacidade/cobertura do glitter
      description: Indica o grau de opacidade do efeito de glitter quando aplicado.
    glitter_use_suitability:
      name: Adequação do uso de glitter
      description: Indica o principal contexto pretendido ou aprovado do pó com glitter
        (por exemplo, apenas para uso Craft , grau cosmético/seguro para o corpo ou
        seguro para contacto com alimentos).
    glove_armor_placement:
      name: Luva armadura ponto de apresentação
      description: Identifica a localização da armadura de proteção na luva.
    glove_cuff_length:
      name: comprimento do punho da luva
      description: Indica o comprimento da cobertura do punho/luva de uma luva de
        corrida no pulso/antebraço.
    glove_finger_coverage:
      name: cobertura dos dedos da luva
      description: Descreve o nível de cobertura dos dedos oferecido pela luva, variando
        entre modelos com dedos completos e modelos sem dedos.
    glove_finger_design:
      name: design de dedo de luva
      description: Especifica a configuração dos dedos da luva, como por exemplo,
        luva de cinco dedos ou luva tipo mitene.
    glove_fit_profile:
      name: perfil de ajuste da luva
      description: Descreve a forma interna e a silhueta geral da luva para que os
        jogadores possam escolher a sensação que preferem.
    glove_insulation:
      name: Isolamento de luva
      description: Especifica o isolamento/construção térmica ou o aquecimento da
        manga (por exemplo, nível de isolamento, tecnologia de forro/isolamento ou
        tipo de aquecimento).
    glove_palm_material:
      name: material da palma da luva
      description: Especifica o material principal utilizado na palma da luva (a principal
        superfície de contacto/aderência), que pode ser diferente do dorso da luva.
    glove_size:
      name: Luva
      description: Indica o tamanho geral da mão para o qual as luvas de boxe foram
        concebidas, geralmente expresso com códigos de tamanho semelhantes aos de
        vestuário ou tamanhos de criança.
    glove_webbing_style:
      name: estilo de teia de luva
      description: Define o design da teia ou do bolso da luva, o que afeta o controlo
        da bola, a adequação à posição e as preferências do jogador.
    glow_effect:
      name: Efeito de brilho
      description: Indica se as bolas de gel possuem propriedades que brilham no escuro
        ou que emitem um marcador para jogos em condições de pouca luz.
    glow_plug_connector_type:
      name: tipo de conector da vela de incandescência
      description: Tipo de terminal/conector elétrico na vela de incandescência utilizado
        para ligar ao chicote de cablagem do veículo.
    glow_plug_heating_element_type:
      name: tipo de elemento de aquecimento da vela de incandescência
      description: Tipo/tecnologia do elemento de aquecimento utilizado pela vela
        de incandescência.
    glue_application_format:
      name: Formato da aplicação Glue
      description: Especifica o formato do aplicador/dispensador utilizado para aplicar
        cola escolar.
    glue_applicator_type:
      name: tipo aplicador de cola
      description: Especifica o tipo de aplicador/ponta dispensadora integrada utilizada
        para aplicar a cola líquida.
    glue_base_formulation:
      name: formulação de base de cola
      description: Identifica a formulação química/base principal da cola líquida
        Craft (para desempenho, segurança e expectativas de limpeza).
    glue_gun_nozzle_style:
      name: estilo do bico da pistola de cola
      description: Especifica o estilo físico da ponta do bico de uma pistola de cola
        quente, o que afeta a precisão da aplicação e a cobertura da cola.
    glue_safety_standard:
      name: Norma de segurança para colas
      description: Indica se a cola é não tóxica/segura para crianças, de acordo com
        a etiqueta e as normas comuns.
    goal_frame_material:
      name: Material Frame do gol
      description: Identifica o material das traves/Frame, que afeta o peso, a portabilidade
        e a resistência à intempérie.
    goal_size:
      name: Objetivo
      description: Classifica um golo de futebol em regulamento comum ou tamanho de
        grupo de treino para uma seleção mais rápida do que apenas a dimensão bruta.
    goal_size_classification:
      name: Classificação do tamanho da baliza
      description: Indica a classe de tamanho normalizada da baliza (por exemplo,
        tamanho standard, juvenil, Shop Mini), para que os utilizadores possam selecionar
        rapidamente o equipamento adequado ao seu nível de jogo.
    goal_size_standard:
      name: Padrão de tamanho da meta
      description: 'Indica qual o padrão oficial ou de grupo etário que a meta cumpre
        (ex.: Regulamento Mundial de Desportos Aquáticos, 12U).'
    goalie_configuration:
      name: Configuração dos defesas
      description: Indica o número de guarda-redes por equipa configurados na mesa
        (estilo americano com 3 guarda-redes vs. estilo europeu com 1 guarda-redes).
    goalie_playing_surface:
      name: Superfície de jogo do guarda-redes
      description: Especifica a superfície ou ambiente de jogo principal para o qual
        o conjunto de equipamento de guarda-redes de hóquei foi concebido.
    goalkeeper_glove_cut:
      name: Corte na luva do guarda-redes
      description: Indica o estilo de construção (corte) da palma/dedos das luvas
        de guarda-redes, que Influence o ajuste, a sensibilidade à bola e o controlo.
    goalkeeper_training_aid_type:
      name: Tipo de equipamento de treino para guarda-redes
      description: Identifica o estilo do acessório de treino para guarda-redes, permitindo
        uma filtragem precisa.
    goblet_drum_playing_style:
      name: estilo de tocar tambor de cálice
      description: Se o instrumento foi concebido principalmente para ser tocado com
        as mãos ou para utilização com baquetas/machos.
    gobo_format:
      name: Formato Gobo
      description: Especifica o tamanho/padrão do gobo que o projetor aceita (diâmetro
        e família de espessura), garantindo a compatibilidade com os gobos de substituição/personalizados.
    gobo_root_variety:
      name: Variedade de raiz Gobo
      description: Identifica a cultivar ou variedade específica da raiz de bardana
        (gobo).
    gobo_rotation:
      name: Rotação do Gobo
      description: Especifica se o gobo pode rodar e qual a direção suportada.
    goggle_accessory_type:
      name: Tipo de acessório para óculos de proteção
      description: 'Classifica o tipo de acessório (ex.: capa, caixa interior, pega)
        para que o comprador possa filtrar o conjunto diversificado de produtos dentro
        desta categoria abrangente.'
    goggle_features:
      name: Recursos do Goggle
      description: Lista as características funcionais ou de design especiais oferecidas
        pelos óculos de proteção.
    goggle_fit_design:
      name: design de ajuste de óculos
      description: Descreve como os óculos de proteção devem ser ajustados ou usados,
        incluindo a compatibilidade com óculos graduados (OTG - over the glass).
    goggle_gasket_material:
      name: Material da junta dos óculos
      description: Material da vedação que está em contacto com o rosto, que influencia
        conforto, prevenção de alergias e de fugas.
    goggle_integration:
      name: Integração com o Google
      description: Se o capacete foi concebido para ser utilizado com óculos de proteção
        e/ou inclui características integradas para a retenção de óculos de proteção.
    goggle_lens_shape:
      name: Forma da lente dos óculos
      description: Define o perfil de curvatura da lente de substituição, que afeta
        a distorção e o campo de visão (por exemplo, cilíndrico, esférico, tórico).
    goggle_lens_tint:
      name: Lentes dos óculos de proteção
      description: Define a tonalidade ou acabamento da lente, que afeta a transmissão
        da luz, a perceção das cores e o aspeto estético.
    goggle_strap_material:
      name: Material da correia dos óculos
      description: Material principal utilizado na fita para a cabeça, Influence a
        durabilidade e o conforto.
    golf_accessory_set_purpose:
      name: Finalidade do conjunto de acessórios de golfe
      description: Identifica a utilização principal ou o tema pretendido do conjunto
        de acessórios de golfe.
    golf_bag_style:
      name: estilo de saco de golfe
      description: Indica o design principal ou o estilo da aplicação do saco de golfe
        (por exemplo, suporte, carrinho, Staff).
    golf_ball_alignment_design:
      name: projeto de alinhamento da bola de golfe
      description: Especifica qualquer auxiliar visual de alinhamento integrado, impresso
        ou moldado na superfície da bola.
    golf_ball_construction:
      name: construção de uma bola de golfe
      description: Especifica o número de camadas/peças utilizadas na construção da
        bola de golfe, o que afeta o spin, a sensação e a distância.
    golf_ball_cover_material:
      name: material para cobertura de bolas de golfe
      description: Identifica o material da cobertura exterior da bola de golfe, que
        afeta o spin, a durabilidade e a sensação ao toque.
    golf_cart_cover_climate_use:
      name: Capa para carrinho de golfe para utilização em diferentes climas
      description: Indica o principal estado climático/estação do ano que a cobertura
        de armazenamento foi concebida para suportar.
    golf_cart_enclosure_fit_type:
      name: tipo de encaixe da cabine do carrinho de golfe
      description: Especifica se a estrutura foi concebida para uma quantidade específica
        de bancos/formato ou se oferece um encaixe universal/ajustável.
    golf_cart_intended_use:
      name: Utilização prevista do carrinho de golfe
      description: Utilização principal pretendida - caixa interior para a qual o
        carrinho de golfe foi concebido ou configurado.
    golf_club_number:
      name: Número do taco de golfe
      description: 'Identifica o número específico ou a designação do wedge impressa
        no taco (ex.: 5, PW, GW).'
    golf_club_part_type:
      name: tipo de peça de taco de golfe
      description: Classifica os acessórios ou componentes dos tacos de golfe em subtipos
        comuns (por exemplo, casquilho adaptador, ponteira, peso).
    golf_grip_size:
      name: tamanho do grip de golfe
      description: Especifica a categoria geral de tamanho exterior da pega de golfe,
        indicando a espessura que a pega parece ter na mão.
    golf_shoe_spike_type:
      name: tipo de cravo para sapato de golfe
      description: Identifica o tipo de sistema de tração utilizado na sola dos sapatos
        de golfe (por exemplo, com ou sem pitões).
    golf_tee_style:
      name: Estilo de tee de golfe
      description: Descreve o estilo/design estrutural ou funcional do tee de golfe,
        que afeta a altura da bola, a durabilidade ou a redução do spin.
    golf_training_focus:
      name: Treino de golfe com foco no golfe
      description: Classifica a principal capacidade ou aspeto que o produto se destina
        a melhorar.
    golf_training_objective:
      name: Objectivo do treino de golfe
      description: Identifica a principal competência ou aspeto do golfe que o equipamento
        de treino se destina a melhorar.
    gong_profile_type:
      name: Tipo de perfil de gongo
      description: Descreve o perfil físico do gongo de ópera (por exemplo, centro
        plano versus centro elevado), que afeta fortemente o timbre e o estilo de
        execução.
    grading_scale:
      name: Expansão de classificação
      description: A escala de classificação utilizada numa moeda de ouro ou prata
        classificada (por exemplo, Sheldon 1–70).
    grading_service:
      name: Serviço de classificação
      description: 'terceiro serviço de classificação/certificação para a moeda ou
        nota (ex: PCGS, NGC).'
    graduation_increment:
      name: Aumento salarial para os licenciados
      description: Especifica a menor divisão impressa/gravada na escala de costura
        (a resolução das marcações).
    grain_processing_method:
      name: Método de processamento dos cereais
      description: Identifica o principal método de processamento aplicado ao grão
        (por exemplo, parboilizado, laminado, germinado), que afeta o tempo de cozedura,
        a textura e os valores nutricionais.
    grand_piano_soundboard_material:
      name: Material da caixa de ressonância do piano de cauda
      description: Material principal utilizado na tábua harmónica do piano (a placa
        de ressonância), que afeta o timbre e a durabilidade.
    grappling_dummy_pose:
      name: pose de boneco de luta
      description: Descreve a posição/postura corporal padrão do boneco, determinando
        quais os exercícios e técnicas que auxilia.
    grease_application:
      name: Aplicativo Grease
      description: Especifica o componente principal do veículo ou a utilização a
        que a massa lubrificante se destina.
    grease_consistency_grade_nlgi:
      name: Grau de consistência da massa lubrificante (NLGI)
      description: Especifica o número de consistência NLGI que indica a firmeza da
        massa lubrificante (por exemplo, o NLGI 2 é comum para utilização múltipla).
    grease_thickener_type:
      name: Tipo de espessante de gordura
      description: Identifica o sistema espessante/sabão utilizado na formulação da
        massa lubrificante.
    great_highland_bagpipes_blowpipe_valve_type:
      name: válvula de sopro da gaita de foles Great Highland
      description: Especifica o sistema de válvula de retenção utilizado no soprador.
    great_highland_bagpipes_drone_configuration:
      name: Configuração de drone da gaita de foles das Terras Altas
      description: Especifica os tipos de drones incluídos no conjunto.
    great_highland_bagpipes_mounting_material:
      name: Material de montagem para gaitas de foles Great Highland
      description: Especifica o material dos ornamentos decorativos da gaita de foles
        (por exemplo, níquel prateado, imitação de marfim).
    greens_maturity_stage:
      name: estádio de maturação verde
      description: Indica o estado de desenvolvimento do feijão verde no momento da
        colheita.
    greens_preparation_state:
      name: estado de preparação verde
      description: Descreve como as folhas verdes são processadas ou embaladas (por
        exemplo, pré-lavadas, picadas, prontas a consumir).
    grenade_effect_type:
      name: Tipo de efeito granada
      description: 'Indica o principal efeito funcional produzido pela granada de
        paintball após ser ativada (ex.: fumo, tinta, efeito luminoso).'
    grid_unit:
      name: Unidade Grid
      description: O sistema de medição principal impresso no tapete (caso exista
        uma Grid/expansão).
    grille_emblem_provision:
      name: Fornecimento de emblema da grelha
      description: Especifica se a grelha auxiliar é um emblema/insígnia OEM e como.
    grille_mounting_method:
      name: Método de montagem da grelha
      description: Especifica a forma como a grelha é instalada no veículo (por exemplo,
        substituição direta versus encaixe/sobreposição; fixação por parafusos versus
        encaixe por pressão; necessidade de furação versus não necessidade de furação).
    grille_style:
      name: Estilo da grelha
      description: Especifica o estilo visual/de design da grelha do veículo.
    grip_chalk_form:
      name: Forma de giz para aderência
      description: Identifica a forma física do giz fornecido ou utilizado com o saco.
    grip_coverage:
      name: Cobertura de aderência
      description: Identifica a presença e a localização de elementos de aderência
        de silicone ou borracha na meia.
    grip_design:
      name: Design de aderência
      description: Especifica o identificador ou a configuração dos orifícios da placa
        para facilitar o transporte e a versatilidade nos exercícios.
    grip_enhancer_effect:
      name: Efeito de reforço da aderência
      description: Descreve a principal característica de desempenho que o produto
        oferece (por exemplo, absorção de humidade ou acabamento pegajoso em resina).
    grip_enhancer_form:
      name: Formato do produto para melhorar a aderência
      description: Identifica a forma física ou o formato do produto para melhorar
        a aderência, para que os atletas possam selecionar o método de aplicação adequado.
    grip_features:
      name: Características de aderência
      description: Indica características de aderência/identificação integradas, destinadas
        a melhorar a firmeza, o conforto ou o controlo durante o jogo.
    grip_material:
      name: Material de aderência
      description: Identifica o material utilizado na superfície aderente das calças.
    grip_shape:
      name: Forma de pegada
      description: Descreve a forma ou o estilo da secção transversal da pega, especialmente
        relevante para as pegas de putter.
    grip_surface_type:
      name: Tipo de superfície de aderência
      description: Descreve o desenho da superfície de tração/ranhura da face do pedal
        que afeta a aderência e a sensação ao toque.
    grip_tackiness_level:
      name: Nível de aderência
      description: Avalia o quão aderente ou pegajosa é a superfície da pega, ajudando
        os jogadores a escolher entre uma sensação seca e um controlo extremamente
        aderente.
    grip_tape_form:
      name: Formato da fita de aderência
      description: 'Indica a forma de entrega do produto de fita antiderrapante (ex.:
        folha, rolo, kit de aplicação por spray).'
    grip_wax_form:
      name: Forma de cera de aderência
      description: Classifica a forma física em que a cera para aderência é comercializada.
    gripper_coverage:
      name: Cobertura da garra
      description: Especifica o tipo de garra na sapata antiderrapante, indicando
        a área de cobertura e a possibilidade de remoção.
    grommet_application_material:
      name: Material da aplicação Grommet
      description: 'Material(is) principal(ais) no qual os ilhós devem ser instalados
        (ex.: tecido, pele, vinil, lona/tela).'
    grommet_duty_rating:
      name: Classificação de ilhós
      description: Indica a classe de resistência/utilização pretendida para o ilhó.
    grommet_style:
      name: Estilo ilhós
      description: Estilo de construção do conjunto de ilhós (tal como é montado/utilizado).
    grooming_glove_texture_type:
      name: Tipo de textura da luva de higiene
      description: Identifica a textura principal da superfície utilizada para o cuidado
        pessoal, indicando a finalidade pretendida, como esfregar, polir ou lavar.
    groove_orientation:
      name: Orientação do sulco
      description: Descreve a direção/esquema dos sulcos ou saliências no instrumento.
    groove_sampler_onboard_effects:
      name: Efeitos de inclusão do sampler Groove
      description: Indica as categorias de processamento de efeitos integrados disponíveis
        no groove sampler (insert/master), como reverb, delay, compressão, distorção,
        equalização e filtragem.
    groove_sampler_storage_expansion_type:
      name: Tipo de expansão de armazenamento do amostrador de sulcos
      description: Especifica as opções de armazenamento amovíveis/expansíveis suportadas
        pelo amostrador de ranhuras.
    ground_attachment_method:
      name: Método de fixação ao solo
      description: Descreve como o arco de passe é fixado à superfície de jogo, afetando
        a estabilidade e a compatibilidade com a superfície.
    groupset_components_included:
      name: Componentes do conjunto incluídos
      description: Lista os componentes específicos da transmissão incluídos no conjunto
        para que os clientes compreendam o conteúdo do pacote.
    gt_racing_class:
      name: classe de corrida GT
      description: Especifica a categoria/classe GT para a qual o automóvel foi fabricado
        ou homologado.
    guard_construction_type:
      name: Tipo de construção da proteção
      description: Quer a proteção seja um protetor rígido, uma placa de proteção
        flexível ou um modelo tipo manga/tira.
    guard_size_measurement_basis:
      name: Base de medição do tamanho da proteção
      description: 'Em que medida se baseia o tamanho (ex.: perímetro do cotovelo,
        perímetro do pulso, perímetro do antebraço)?'
    guard_style:
      name: Estilo de guarda
      description: Classifica a construção ou o tipo de protetor de lâmina de patins
        para ajudar o comprador a diferenciar rapidamente entre protetores rígidos
        para caminhada, protetores macios para absorção de impacto, protetores com
        mola e outros modelos.
    guava_flesh_color:
      name: cor da polpa da goiaba
      description: Indica a cor da polpa interna da goiaba.
    guava_variety:
      name: Variedade de goiaba
      description: 'Identifica a cultivar específica ou variedade de goiaba comercializada
        (ex.: goiaba maçã, creme mexicana, tailandesa, rosa, sem sementes, branca).'
    guide_material:
      name: Material dos passadores
      description: Material utilizado para os passadores ou inserções da linha da
        cana.
    guide_type:
      name: Tipo de guia
      description: Especifica o estilo de passadores instalados numa cana de pesca,
        tais como passadores de um só pé, passadores de roletes ou passadores tipo
        cobra.
    guideline_markings:
      name: Marcações de orientação
      description: Tipo de marcações visuais de alinhamento impressas ou embutidas
        na superfície do tapete de lançamento para auxiliar nos exercícios de lançamento.
    guiro_scraper_material:
      name: Material do raspador Guiro
      description: Material do raspador/golpe incluído ou recomendado para utilização
        com o guiro.
    guiro_surface_style:
      name: Estilo de superfície Guiro
      description: Descreve o padrão/geometria da superfície de jogo que é raspada
        para produzir som.
    guitar_body_finish_type:
      name: tipo de acabamento do corpo da guitarra
      description: Especifica o acabamento utilizado no corpo da guitarra.
    guitar_bridge_system_type:
      name: Tipo de sistema de ponte para guitarra
      description: Família de sistemas Bridge/cordeão concebidos para compatibilidade
        e navegação.
    guitar_case_style:
      name: Guitarra caixa interna estilo
      description: Especifica o estilo geral de proteção/estrutura da caixa interior
        ou da capa para guitarra.
    guitar_humidifier_placement:
      name: Humidificador de guitarra ponto de apresentação
      description: Especifica onde o humidificador deve ser utilizado/posicionado
        em relação ao instrumento ou ambiente.
    guitar_pedal_i_o_configuration:
      name: Configuração de E/S de pedais de guitarra
      description: Indica se a assistência do pedal está configurada para encaminhamento
        de entrada/saída Mono ou estéreo.
    guitar_pedal_output_connector_type:
      name: Tipo de conector de saída para pedal de guitarra
      description: Especifica o tipo de conector de saída de áudio utilizado pelo
        pedal.
    guitar_slide_finish:
      name: Acabamento de slide de guitarra
      description: Acabamento superficial da corrediça que afeta a sensação e a fricção
        com a corrente.
    guitar_slide_style:
      name: Estilo de slide de guitarra
      description: Especifica o formato do slide ou da barra de tom da guitarra e
        como é usado/vestido.
    guitar_stand_type:
      name: suporte para guitarra tipo
      description: Especifica o formato primário do suporte de guitarra (como é a
        assistência/loja da guitarra).
    guitar_strap_attachment_type:
      name: tipo de fixação da correia da guitarra
      description: Especifica a forma como a correia se fixa à guitarra (ou ao pino
        da correia), incluindo se utiliza terminais tradicionais ou sistemas de aperto
        rápido.
    guitar_strap_end_material:
      name: Material da extremidade da correia da guitarra
      description: Material utilizado nas extremidades da correia/separador (as partes
        que se fixam ao botão da correia ou aos sistemas de fecho da correia).
    guitar_strap_features:
      name: Características da alça para guitarra
      description: Características funcionais notáveis da correia de guitarra para
        além do tamanho/material (seleção múltipla).
    guitar_string_coating:
      name: Revestimento de guitarra cadeia
      description: Indica se a corrente possui um revestimento protetor e, se aplicável,
        o tipo de revestimento.
    guitar_string_gauge_type:
      name: Tipo de calibre de guitarra cadeia
      description: 'A categoria de calibre do conjunto de cordas de um violão acústico
        (ex: extra leve, leve, médio). É geralmente aproximada pela espessura da cadeia
        de alto E; as gamas de calibre exatas podem variar de acordo com o fabricante.'
    guitar_string_set_gauge_category:
      name: Categoria de calibre do conjunto de cadeia de guitarra
      description: Famílias de calibres comuns de marketing para um conjunto de cordas
        de guitarra (normalmente derivadas da corda Mi aguda/1ª cadeia).
    guitar_string_winding_type:
      name: Tipo de enrolamento de corrente de guitarra
      description: Especifica o estilo de enrolamento exterior da corrente enrolada
        no conjunto.
    guitar_tuning_peg_button_shape:
      name: Forma do botão do cravelho da guitarra
      description: A forma/estilo da chave/botão de afinação.
    guitar_tuning_peg_configuration:
      name: Configuração das cravelhas de afinação da guitarra
      description: O esquema de regulação das tarraxas para o cabeçote.
    guitar_tuning_peg_mounting_style:
      name: Tipo de fixação das cravelhas da guitarra
      description: Como é montada uma tarraxa na cabeça (tipo de casquilho e método
        antirrotação).
    guitar_tuning_peg_shaft_type:
      name: tipo de eixo da tarraxa de afinação da guitarra
      description: Se o poste da corrente é sólido ou Split, e como a corrente é fixada.
    guitar_tuning_peg_style:
      name: Estilo das cravelhas da guitarra
      description: O estilo físico da tarraxa/cravelha e o formato de montagem utilizados
        na cabeça de um instrumento (por exemplo, engrenagem selada versus engrenagem
        aberta, com bloqueio, pino Split ).
    gum_condition:
      name: Estado da goma
      description: 'Condição/estado da goma do selo no verso (ex.: nunca foi usado
        com charneira, com charneira, sem goma).'
    gun_action_type:
      name: Tipo de mecanismo da arma
      description: 'Tipo de ação mecânica utilizada para carregar/disparar (ex.: ação
        por ferrolho, ação por alavanca).'
    gun_operational_status:
      name: estado operacional da arma
      description: Indica se a arma colecionável está desativada/não dispara (e como
        é apresentada).
    gun_type:
      name: Tipo de arma
      description: Identifica o formato geral da arma de fogo antiga.
    gusset_material:
      name: Material do reforço
      description: Especifica o material utilizado no forro/reforço da virilha, que
        afeta a respirabilidade, a higiene e o conforto.
    gymnastics_discipline:
      name: Disciplina de ginástica
      description: 'Especifica a modalidade de ginástica a que o produto se destina
        (ex.: Artística, Rítmica, Acrobática).'
    hair_extension_texture:
      name: textura de extensão de cabelo
      description: Descreve o padrão de curvatura, ondulação ou textura das madeixas
        de extensão.
    hair_net_style:
      name: estilo de rede de cabelo
      description: 'Identifica o estilo de design ou construção da rede para o cabelo
        (ex.: touca bufante, rede para coque, cobertura para coque).'
    hair_quality_grade:
      name: Grau de qualidade do cabelo
      description: Indica a qualidade industrial/designaçãoOrigin do cabelo.
    halter_style:
      name: Estilo halter
      description: Identifica o estilo funcional ou de design da cabeçada (por exemplo,
        de corda, de segurança, de apresentação), ajudando o comprador a escolher
        uma cabeçada adequada ao uso pretendido.
    hammock_style:
      name: Estilo rede
      description: Descreve o estilo estrutural ou a construção da rede.
    hand_and_foot_coverage:
      name: Cobertura para mãos e pés
      description: Descreve luvas e botinhas integradas ou amovíveis que cobrem as
        mãos e/ou os pés.
    hand_cymbal_set_configuration:
      name: Configuração do conjunto de pratos de mão
      description: Indica se o produto é vendido como um par combinado, um prato individual
        ou um conjunto maior.
    hand_drum_head_material:
      name: material da pele do tambor de mão
      description: Material da pele (membrana) utilizada no tambor de cálice.
    hand_exerciser_style:
      name: estilo exercitador de mãos
      description: Classifica o estilo ou mecanismo geral do exercitador de mãos.
    hand_guard_backbone_material:
      name: material da espinha dorsal do protetor de mão
      description: Material da coluna vertebral/coluna vertebral estrutural (se presente),
        que determina a resistência e a proteção.
    hand_guard_coverage_style:
      name: estilo de cobertura do protetor de mãos
      description: Descreve a cobertura/perfil do protetor de mãos, afetando a proteção
        contra o vento/impactos.
    hand_guard_mounting_type:
      name: tipo de montagem do protetor de mãos
      description: Especifica a forma como os protetores de mãos são fixados ao motociclo
        (por exemplo, na extremidade do guiador com braçadeira interior ou apenas
        com braçadeira).
    hand_guard_set_configuration:
      name: Configuração do conjunto de proteções para as mãos
      description: Se o produto é vendido como um par esquerdo/direito ou apenas um
        lado.
    hand_guard_style:
      name: estilo de protetor de mãos
      description: 'Descreve o desenho ou estilo de cobertura da grelha (ex.: Fechada,
        Aberta, Total, Leve, Standard).'
    hand_guard_weather_protection:
      name: Protetor de mãos contra intempéries
      description: Indica a proteção contra as intempéries que os protetores de mãos
        oferecem.
    hand_paddle_strap_type:
      name: tipo de pega de remo de mão
      description: Especifica o tipo de pega, ou a ausência de pega, utilizada para
        fixar a pá manual à mão do utilizador.
    hand_percussion_mount_attachment_mechanism:
      name: Mecanismo de fixação do suporte de percussão manual
      description: Especifica a forma como o suporte se fixa a um pedestal, estante
        ou outro equipamento (por exemplo, fixação por grampo versus fixação por haste).
    hand_percussion_mounting_handling:
      name: montagem/manuseamento de percussão manual
      description: Independentemente de o instrumento ser utilizado na mão, no corpo,
        montado ou colocado sobre uma mesa/chão durante a utilização típica.
    hand_percussion_pitch_type:
      name: tipo de tom de percussão manual
      description: Indica se o instrumento produz um tom definido (afinável/notas)
        ou um tom indefinido.
    hand_percussion_playing_method:
      name: método de execução de percussão manual
      description: 'Forma como o instrumento é normalmente tocado para produzir som
        (ex.: agitado versus raspado).'
    hand_percussion_set_configuration:
      name: Configuração do conjunto de percussão manual
      description: Quer o produto seja um instrumento individual, um conjunto combinado
        ou um conjunto de várias peças.
    hand_percussion_size_class:
      name: classe de tamanho de percussão manual
      description: Categoria geral de tamanho do instrumento quando não é fornecida
        uma medição precisa ou para facilitar a filtragem.
    hand_sewing_needle_point_type:
      name: Tipo de agulha para costura manual
      description: 'Forma /estilos da ponta da agulha de costura manual utilizada
        para penetrar diferentes materiais (ex.: tecido plano, malha, couro) ou fios.'
    hand_support_level:
      name: Nível de apoio para as mãos
      description: Especifica o grau de assistência ou fixação proporcionado pela
        luva, ligadura ou tira.
    hand_support_size:
      name: Tamanho do apoio para as mãos
      description: Tamanho da luva, bracelete ou envoltório declarado pelo fabricante
        (XS-XXL ou um tamanho).
    handball_ball_type:
      name: Tipo de bola de andebol
      description: Indica a categoria de utilização pretendida da bola de andebol,
        como jogo, treino ou praia.
    handball_playing_surface:
      name: Superfície de jogo de andebol
      description: Indica a(s) superfície(s) de jogo para as quais a bola de andebol
        está otimizada.
    handball_target_type:
      name: tipo de alvo de andebol
      description: Especifica o estilo ou design do alvo de tiro destinado à prática
        de andebol em equipa.
    handbrake_actuation_type:
      name: Tipo de acionamento do travão de mão
      description: Especifica como o travão de estacionamento é acionado.
    handbrake_orientation:
      name: Orientação do travão de mão
      description: Especifica se o travão de mão foi concebido para veículos com volante
        à esquerda, à direita ou se é universal.
    handgun_grip_material:
      name: material da pega da pistola
      description: Material principal dos punhos/painéis das pistolas.
    handle_configuration:
      name: Configuração da alça
      description: Descreve o estilo estrutural da prancha de wakeboard (por exemplo,
        simples, dupla, Deep-V, T-wrap) para que o comprador possa encontrar a prancha
        adequada à sua capacidade, manobras ou tipo.
    handle_ergonomics:
      name: ergonomia do identificador
      description: Descreve as características ergonómicas do identificador destinadas
        a melhorar o conforto e o controlo.
    handle_grip_material:
      name: Material do punho da alça
      description: Especifica o material utilizado na superfície de aderência do identificador,
        que afeta o conforto e a tração, principalmente quando molhado.
    handle_grip_type:
      name: Tipo de punho da alça
      description: Especifica o revestimento/material ou estilo da superfície da pega
        do identificador, concebido para melhorar o conforto e o controlo.
    handle_shape:
      name: Forma da pega
      description: Forma transversal ou perfil do identificador.
    handlebar_design:
      name: Design do guiador
      description: Especifica o tipo de guiador no simulador de escadas, como nenhum,
        fixo, altura ajustável, dobrável ou com indicador de gama de resistência.
    handlebar_type:
      name: Tipo de guiador
      description: Identifica o estilo do guiador instalado na bicicleta, Influence
        a postura ao pedalar, o controlo e o conforto.
    handslide_bore_type:
      name: tipo de furo deslizante
      description: Especifica se o trombone baixo utiliza uma vara de calibre simples
        ou de calibre duplo.
    handwear_cuff_style:
      name: estilo de punho
      description: Descreve o estilo de construção do punho ou do pulso das luvas
        ou mitenes, que afeta a cobertura e o ajuste.
    handwear_insulation_material:
      name: material isolante para as mãos
      description: Identifica o material isolante ou de forro utilizado no interior
        de luvas ou mitenes.
    handwear_size:
      name: Tamanho das luvas
      description: Especifica o tamanho das luvas ou outros acessórios para as mãos
        para garantir o ajuste adequado.
    hang_glider_design:
      name: design de asa delta
      description: 'Classifica o estilo estrutural do planador (ex.: asa flexível,
        asa rígida, motorizado).'
    hanger_thread_size:
      name: Tamanho thread do cabide
      description: Indica o tamanho/padrão thread utilizada para montar o suporte
        em canas de pesca ou alarmes de mordida, garantindo a compatibilidade.
    hanging_suspension_method:
      name: método de suspensão suspensa
      description: 'Define o equipamento ou sistema principal utilizado para suspender
        o baloiço (ex.: corda, corrente, Frame de suporte).'
    hardtop_finish_type:
      name: Tipo de acabamento Hardtop
      description: Especifica o estado do acabamento exterior da capota rígida (por
        exemplo, com primário ou pintada), o que afeta a prontidão da instalação e
        o aspeto.
    hardtop_shell_material:
      name: Material da cobertura rígida
      description: Especifica o material principal da estrutura rígida do tejadilho
        rígido de um veículo (não o tecido de cobertura), como a fibra de vidro ou
        o alumínio.
    hardtop_window_configuration:
      name: Configuração de janela do tejadilho rígido
      description: Descreve quais as janelas incluídas com o tejadilho rígido e a
        sua configuração.
    harmonica_comb_material:
      name: Material do pente da harmónica
      description: Material utilizado para o pente da gaita (corpo da câmara de ar).
    harmonica_cover_plate_finish:
      name: acabamento da placa de cobertura da harmónica
      description: Especifica o acabamento ou revestimento das placas de cobertura
        da harmónica.
    harmonica_cover_plate_material:
      name: Material da placa de cobertura da harmónica
      description: Material utilizado para as placas de cobertura exteriores.
    harmonica_finish:
      name: Acabamento de gaita
      description: Acabamento da superfície das placas de cobertura/corpo da harmónica.
    harmonica_included_accessories:
      name: Acessórios incluídos com a harmónica
      description: Indica quais os acessórios incluídos com a harmónica.
    harmonica_note_range:
      name: extensão das notas da gaita
      description: 'Classificação da extensão instrumental utilizada no contexto orquestral
        (ex.: baixo, barítono, tenor).'
    harmonica_reed_plate_material:
      name: material da placa de palhetas da gaita
      description: 'Material utilizado para as placas de palhetas (ex.: latão, aço
        inoxidável, alumínio).'
    harmonica_system_type:
      name: Sistema/tipo de harmónica
      description: 'Identifica o sistema ou formato da harmónica orquestral (ex.:
        Chord, baixo, barítono, polifonia).'
    harmonica_tuning_system:
      name: Sistema de afinação da harmónica
      description: 'Especifica o sistema/esquema de afinação utilizado pela harmónica
        (ex.: Richter, Solo, afinação de orquestra).'
    harness_shell_type:
      name: Tipo de concha do arnês
      description: 'Descreve a rigidez da estrutura exterior do arnês (ex.: Softshell,
        Hardshell, Híbrido).'
    harness_style:
      name: Estilo de arnês
      description: Define o estilo/design estrutural do arnês, por exemplo, cintura,
        assento, peito/colete, cinto de asa, calção de banho ou híbrido.
    harness_type:
      name: Tipo de arnês
      description: Classifica o estilo estrutural do arnês de escalada, como por exemplo,
        de assento, de corpo inteiro ou de peito.
    harp_action_type:
      name: Tipo de mecanismo da harpa
      description: Mecanismo principal utilizado para alterar a altura/acidentes na
        harpa.
    harp_finish:
      name: Acabamento em harpa
      description: 'Acabamento da superfície do corpo da harpa (ex.: natural, tingido,
        pintado, lacado).'
    harp_included_accessories:
      name: Acessórios incluídos com a harpa
      description: Lista os acessórios incluídos na compra da harpa de pedal.
    harvest_method:
      name: Método de colheita
      description: Indica se o marisco foi pescado na natureza, criado em cativeiro
        ou obtido por outro método.
    harvest_stage:
      name: Fase de colheita
      description: Especifica o estado de crescimento em que a rúcula foi colhida,
        como microverde, folha jovem ou molho maduro.
    hat_style:
      name: Estilo do chapéu
      description: 'A construção/estilo do chapéu de festa (ex.: chapéu de cone, coroa,
        cartola, viseira) deve refletir o aspeto fundamental do item .'
    hazard_signal_mode:
      name: Modede sinal de perigo
      description: Padrões de iluminação/Mode selecionáveis para sinalizadores LED/eletrónicos
        rodoviários.
    head_configuration:
      name: Configuração da cabeça
      description: Especifica se a cabeça do machado possui uma enxó, um martelo,
        ambos ou nenhum, afetando diretamente a funcionalidade no gelo e em terrenos
        mistos.
    head_material:
      name: Material da cabeça
      description: Material da cabeça de reprodução fornecido com o quinto.
    head_movement_type:
      name: Tipo de movimento da cabeça
      description: 'Capacidade de movimento direcional do bipé ou da cabeça do bastão
        (ex.: panorâmica, inclinação, rotação).'
    head_side:
      name: Lado da cabeça
      description: Especifica se a pele do tambor se destina ao lado de ataque (baqueta),
        ao lado de ressonância (frontal) ou a ambos.
    head_weight_style:
      name: estilo de peso na cabeça
      description: Identifica a configuração do peso na cabeça da mosca, que afeta
        a taxa de afundamento e a apresentação.
    headband_embellishment:
      name: enfeite de tiara
      description: 'Identifica os elementos decorativos presos à tiara (ex.: laços,
        pérolas, cristais, orelhas de animais).'
    headboard_style:
      name: Estilo de cabeceira
      description: Descreve o design ou estilo de construção da cabeceira fornecida
        com a cama.
    headgear_strap_configuration:
      name: Configuração da correia do capacete
      description: Indica o número de tiras utilizadas para fixar o protetor de cabeça
        de luta livre.
    headjoint_crown_style:
      name: estilo de coroa da junta da cabeça
      description: Especifica o estilo ou design da coroa (tampa) da cabeça da flauta,
        o que pode afetar a estética e o peso/som.
    headjoint_pitch_standard:
      name: Padrão de inclinação da junta da cabeça
      description: 'Indica o padrão de afinação da cabeça (ex.: A=440 vs A=442).'
    headliner_product_form:
      name: Formato do produto do forro de tejadilho
      description: Especifica se o produto é um conjunto completo de forro de tejadilho
        moldado, um tecido de substituição ou um componente de reparação/acabamento.
    headrest_mount_attachment_method:
      name: Método de fixação do suporte ao encosto de cabeça
      description: Especifica a forma como o suporte se fixa ao encosto de cabeça/poste
        do assento.
    headrest_provision:
      name: Apoio de cabeça
      description: Indica se os encostos de cabeça estão incluídos e/ou se existem
        pontos de fixação para os encostos de cabeça.
    headset_standard:
      name: Padrão de auricular
      description: Tipo de interface tubo de direção/caixa de direção utilizada pelo
        Frame.
    headstall_style:
      name: Estilo de cabeçada
      description: Classifica o desenho estrutural ou a configuração da orelha/sobrancelha
        da cabeçada.
    headwear_intended_use:
      name: Utilização prevista do acessório de cabeça
      description: 'Indica o principal propósito ou contexto para o uso do turbante
        (ex.: queda de cabelo devido à quimioterapia, natação, religioso).'
    hearing_enhancer_style:
      name: estilo amplificador de audição
      description: Descreve o formato físico do dispositivo para que os utilizadores
        possam escolher entre auscultadores supra-auriculares, intra-auriculares,
        retroauriculares e outros designs.
    heart_rate_monitoring_method:
      name: Método de monitorização da frequência cardíaca
      description: Identifica a forma como o aparelho capta os dados da frequência
        cardíaca durante os exercícios.
    heart_rate_sensing_technology:
      name: Tecnologia de sensor de frequência cardíaca
      description: Especifica o método de medição fisiológica que o monitor utiliza
        para detetar a frequência cardíaca (por exemplo, ECG elétrico versus PPG ótico).
    heart_rate_sensor_placement:
      name: Sensor de frequência cardíaca ponto de apresentação
      description: Indica onde o sensor está a ser utilizado ou posicionado (no corpo
        ou na bicicleta), afetando o conforto e a precisão da medição.
    heat_retention_technology:
      name: Tecnologia de retenção de calor de clientes
      description: Descreve qualquer tecnologia, revestimento ou material que aumente
        a transpiração ou a atividade térmica nas cintas de modelação orientadas para
        o exercício físico (por exemplo, o efeito sauna do neoprene).
    heated_glass_feature:
      name: Recurso de vidro aquecido
      description: Indica se o vidro da janela inclui elementos elétricos integrados,
        como uma Grid de desembaciamento traseiro e/ou uma antena incorporada no vidro.
    heater_control_actuation_method:
      name: Método de acionamento do controlo do aquecedor
      description: Especifica a forma como o controlo do aquecedor/AVAC aciona a caixa
        AVAC do veículo (por exemplo, acionamento por cabo, acionamento a vácuo ou
        sinalização eletrónica).
    heater_control_electrical_connector_type:
      name: Tipo de conector elétrico para controlo do aquecedor
      description: Especifica o tipo/interface do conector elétrico utilizado pelo
        conjunto de controlo do aquecedor (por exemplo, cabo com rabicho versus conector
        macho).
    heating_technology:
      name: Tecnologia de aquecimento
      description: Identifica o principal mecanismo de aquecimento que o vaporizador
        utiliza para converter o material em vapor.
    heel_shape:
      name: Forma de salto
      description: 'Especifica o estilo geométrico ou a silhueta do próprio salto,
        ajudando o comprador a filtrar por aparência estrutural e preferências de
        estabilidade (ex.: stiletto vs. salto em bloco).'
    helicopter_mission_type:
      name: Tipo de missão do helicóptero
      description: Utilização/função principal pretendida para o helicóptero.
    helicopter_rotor_configuration:
      name: Configuração do rotor do helicóptero
      description: Especifica o esquema do sistema de rotores do helicóptero (disposição
        do rotor principal/rotor de cauda), como rotor principal único + rotor de
        cauda, coaxial, em tandem ou interligado.
    helmet_accessory_type:
      name: Tipo de acessório para capacete
      description: Identifica o tipo específico de peça ou acessório para capacete
        de bicicleta, para que o comprador possa localizar imediatamente o item correto.
    helmet_audio_connector_type:
      name: Tipo de conector de áudio para capacete
      description: Especifica o tipo de conector de áudio da aeronave utilizado pelas
        comunicações do capacete, se existir.
    helmet_communication_system_readiness:
      name: Sistema de comunicação do capacete pronto a usar
      description: Se o capacete foi concebido para aceitar um sistema de comunicação
        por intercomunicador/Bluetooth.
    helmet_construction_type:
      name: Tipo de construção do capacete
      description: Descreve o estilo de construção da carcaça e do forro do capacete
        (por exemplo, espuma, casco rígido, híbrido).
    helmet_fit_head_shape:
      name: Ajuste do capacete (forma da cabeça)
      description: Perfil de ajuste interno concebido para diferentes formas de cabeça.
    helmet_interior_liner_type:
      name: Tipo de forro interior do capacete
      description: Tipo de forro de conforto e se é amovível/lavável.
    helmet_liner_material:
      name: Material do forro do capacete
      description: Especifica o material do forro interior ou preenchimento, que proporciona
        conforto e absorção de impactos.
    helmet_retention_closure_type:
      name: Tipo de fecho do capacete de retenção de clientes
      description: 'Especifica o mecanismo de fecho/retenção de clientes da correia
        de queixo do capacete (ex.: anel duplo em D, roquete micrométrico).'
    helmet_safety_certification:
      name: Certificação de segurança do capacete
      description: Enumera as normas ou certificações de segurança que o capacete
        cumpre.
    helmet_safety_certification_standard:
      name: Norma de certificação de segurança do capacete
      description: Normas de segurança/homologação que o capacete de motociclo está
        certificado para cumprir.
    helmet_shell_material:
      name: Material da parte externa do capacete
      description: Material ou construção principal da camada exterior do capacete.
    helmet_size_system:
      name: Tamanho do sistema de capacete
      description: Sistema de numeração utilizado para indicar o tamanho do capacete.
    helmet_sun_visor_type:
      name: tipo de viseira solar para capacete
      description: Especifica se o capacete inclui uma viseira solar interior, uma
        viseira exterior fumado, ambas ou nenhuma.
    helmet_vehicle_fit:
      name: Ajuste do capacete ao veículo
      description: Tipo de veículo/utilização de pilotagem para o qual o capacete
        foi concebido.
    helmet_ventilation_adjustability:
      name: Ajuste da ventilação do capacete
      description: Especifica como a ventilação do capacete pode ser controlada pelo
        motociclista.
    helmet_ventilation_configuration:
      name: Configuração da ventilação do capacete
      description: Descreve o esquema de ventilação e os ajustes do capacete (por
        exemplo, ventilação no queixo, entradas de ar na testa/entrada de ar, aberturas
        de ventilação que podem ser fechadas).
    helmet_visor_peak_adjustability:
      name: Ajuste da viseira/pala do capacete
      description: Se a pala/viseira todo-o-terreno do capacete é ajustável e/ou amovível.
    helmet_visor_shield_optical_features:
      name: Características óticas da viseira (escudo) do capacete
      description: Características óticas e de compatibilidade da viseira/protetor
        facial principal.
    helmet_visor_shield_type:
      name: Tipo de viseira/escudo do capacete
      description: A configuração principal da viseira/protetor facial está incluída
        com o capacete.
    hem_style:
      name: Estilo de bainha
      description: Identifica o estilo de acabamento da abertura da perna — como limpo,
        enrolado ou sem acabamento — que Influence fortemente o aspeto da peça.
    hemisphere_compatibility:
      name: Compatibilidade hemisférica
      description: Especifica para que hemisfério foi concebido o mapa estelar, com
        base nas constelações visíveis.
    hemline_style:
      name: Estilo da bainha
      description: Define o corte ou o desenho da borda inferior do vestido.
    herbal_infusion_function:
      name: Função da infusão de ervas
      description: Indica o principal benefício funcional ou de bem-estar a que se
        destina a infusão.
    hex_size:
      name: Tamanho da chave sextavada
      description: Chave sextavada de tamanho específico necessária para instalar/remover
        a vela de ignição.
    hi_hat_pair_type:
      name: Tipo de hi-hat parar
      description: Indica se a listagem se refere a um conjunto combinado de prato
        superior e inferior ou a um componente individual de prato.
    hi_hat_sound_character:
      name: Sonoridade do chimbal
      description: Descreve o perfil tonal geral para ajudar o comprador a filtrar
        pelo som que pretende.
    high_visibility_class:
      name: Classe de alta visibilidade
      description: Especifica o nível de classificação de visibilidade ANSI/ISEA 107
        da peça de vestuário.
    highback_style:
      name: Estilo Highback
      description: Descreve o estilo/design estrutural do encosto alto que Influence
        as características Ride .
    hitch_ball_diameter:
      name: diâmetro da bola de engate
      description: 'Diâmetro da cabeça da bola de engate (esfera) que encaixa num
        acoplador de reboque (ex.: 1 7/8 pol, 2 pol, 2 5/16 pol, 50 mm).'
    hitch_ball_mounting_style:
      name: Estilo de montagem da bola de engate
      description: Se a bola de engate for do tipo standard com porca de fixação,
        do tipo fixo/prensado para cabeças de engate específicas ou incluir equipamento
        integrado.
    hobby_horse_handle_type:
      name: Tipo de identificador de cavalo de hobby
      description: Especifica a construção do cabo/identificador utilizado para segurar
        ou direcionar o cavalinho de pau.
    hobby_horse_sound_features:
      name: Características sonoras do cavalo de pau
      description: Indica se o cavalinho de pau inclui efeitos sonoros e de que tipo.
    hockey_goal_type:
      name: Tipo de golo de hóquei
      description: Especifica o estilo ou utilização prevista da caixa interna da
        baliza de hóquei (por exemplo, gelo regulamentar, rua, Shop Mini).
    hockey_size_category:
      name: Classificação do tamanho no hóquei
      description: Indica o tamanho do equipamento normalizado. Segmentos a que a
        peça se destina (Juvenil, Júnior, Intermédio, Sénior).
    hockey_size_segment:
      name: Hóquei 4 Segmentos
      description: Especifica o tamanho normalizado dos segmentos de equipamento de
        hóquei que determina a dimensão global e o ajuste da proteção.
    hold_surface_texture:
      name: Textura da superfície de apoio
      description: Descreve a rugosidade ou o acabamento tátil da superfície de aderência
        do objeto.
    home_decor_sewing_pattern_project_type:
      name: Tipo de projeto de padrão de costura de decoração inicial
      description: 'Identifica o tipo de item de decoração Início que o molde de costura
        permite criar (ex.: capa de almofada, cortina, caminho de mesa).'
    homologation_rule_set:
      name: Homologação / conjunto de regras
      description: Especifica o organismo regulador ou o conjunto de regras que o
        automóvel cumpre (quando aplicável).
    honey_form:
      name: Forma Honey
      description: Especifica a forma física ou apresentação do produto Honey .
    honey_processing_method:
      name: Método de processamento do mel
      description: Indica como o mel foi tratado ou processado antes do acondicionamento.
    honey_variety:
      name: Variedade Honey
      description: Identifica a origem botânica ou floral do Honey— seja monofloral
        ou polifloral — o que afeta diretamente o sabor, a cor e o preço.
    hood_configuration:
      name: Configuração do capuz
      description: Descreve o design do capô e as suas características de ajuste.
    hood_design:
      name: Design do capuz
      description: Identifica a presença e o estilo do capuz na peça de vestuário.
    hood_style:
      name: Estilo do capuz
      description: Indica a presença e o estilo de um capuz na peça de vestuário.
    hood_type:
      name: Tipo de capô
      description: Indica características especiais de design da parte do capuz da
        peça de vestuário.
    hook_and_eye_size_hook_number:
      name: Tamanho do anzol e da argola (número do anzol)
      description: Tamanhos/numeração normalizados dos colchetes (quando aplicável)
        utilizados nas embalagens para indicar o tamanho geral do colchete.
    hook_and_loop_fastener_duty_rating:
      name: Fecho de velcro classificação
      description: Indica o nível de resistência/carga pretendido do fecho de velcro.
    hook_and_loop_fastener_format:
      name: Formato de fecho de velcro
      description: Especifica a forma física ou o formato de embalagem do produto
        com fecho de velcro (por exemplo, rolo/fita, pontos, tiras).
    hook_and_loop_fastener_side:
      name: Lado com gancho e laço
      description: Especifica se o produto inclui apenas o lado com gancho, apenas
        o lado com laço ou um conjunto que contenha ambos os lados.
    hook_coating_finish:
      name: Revestimento/acabamento do gancho
      description: Configuração da superfície de teste ou revestimento aplicado ao
        gancho quanto à resistência à corrosão, furtividade ou cor (por exemplo, preto
        níquel, número de identificação fiscal brilhante).
    hook_configuration:
      name: Configuração do gancho
      description: Descreve a presença e o estilo dos anzóis fornecidos com o isco.
    hook_eye_style:
      name: Estilo do olhal do anzol
      description: Especifica a forma ou a orientação do olho do anzol, o que afeta
        a forma como o anzol é amarrado ou fixado.
    hook_eye_type:
      name: Tipo de olhal do anzol
      description: Especifica o desenho do olhal do anzol, influenciando a escolha
        do nó e a montagem da linha.
    hook_loop_format:
      name: Formato de velcro
      description: Especifica o formato físico do fecho de velcro para costura.
    hook_loop_side:
      name: Lado com gancho e laço
      description: Especifica se o produto tem o lado com ganchos, o lado com laços
        ou se é um conjunto de fecho de gancho e laço.
    hook_material:
      name: Material do gancho
      description: Identifica o material utilizado especificamente para o gancho/cabeça
        do arpão, um fator chave para a resistência e a durabilidade em condições
        de utilização em água salgada.
    hook_organizer_style:
      name: organizador de gancho estilo
      description: O estilo físico ou formato do organizador de ganchos (por exemplo,
        caixa interior, rolo ou bolsa), utilizado para auxiliar na navegação e filtragem
        por tipo de organizador.
    hook_point_configuration:
      name: Configuração da ponta do anzol
      description: Indica se o anzol tem duas pontas (duplo) ou três pontas (triplo).
    hook_point_type:
      name: Tipo de ponta de gancho
      description: Descreve a forma ou o fio da ponta de um anzol de pesca, que afeta
        a penetração e a capacidade de retenção.
    hook_shank_length:
      name: comprimento da haste do anzol
      description: Indica a classificação do comprimento relativo da haste do anzol
        (por exemplo, curta, longa) para uma rápida comparação visual e funcional.
    hooks_eyes_attachment_method:
      name: Método de fixação com ganchos e olhais
      description: Como os colchetes são fixados na peça de roupa ou no projeto.
    hop_up_type:
      name: Tipo Hop-up
      description: Define o sistema hop-up utilizado para imprimir rotação inversa
        nas BBs, aumentando o alcance e a precisão.
    horse_blanket_type:
      name: tipo de manta para cavalo
      description: Especifica o estilo principal ou a utilização pretendida da manta
        ou cobertor para cavalos.
    horse_brush_type:
      name: Tipo de escova para cavalos
      description: Classifica a escova de acordo com o seu estilo de cuidado específico
        ou finalidade, permitindo aos clientes filtrar sem fragmentar a hierarquia
        de categorias.
    horse_care_purpose:
      name: Objectivo do cuidado com os cavalos
      description: A principal função do produto está relacionada com o cuidado dos
        cavalos, abrangendo as necessidades de saúde, higiene e maneio.
    horse_feed_stage:
      name: Fase de alimentação do cavalo
      description: Indica a fase da vida ou o estado fisiológico do cavalo para o
        qual a ração foi formulada.
    horse_groomer_type:
      name: tipo de tratador de cavalos
      description: Classifica o estilo do aparador para que o comprador possa localizar
        rapidamente a ferramenta específica de que necessita.
    horse_leg_protection_type:
      name: tipo de proteção para as patas do cavalo
      description: Classifica o estilo específico ou funções da bota, ligadura ou
        faixa para equinos.
    horse_model_breed:
      name: Raça modelo de cavalo
      description: Especifica a raça de cavalos representada pelo modelo expandido
        (se aplicável).
    hosiery_toe_style:
      name: estilo de ponta de meia
      description: Define a construção da zona dos dedos da meia, importante para
        a durabilidade e compatibilidade com calçado de bico aberto.
    hot_air_balloon_basket_type:
      name: tipo cesto de balão de ar quente
      description: Especifica a configuração/estilo principal do cesto (por exemplo,
        desportivo standard, comercial de alta capacidade, com divisórias, acessível/com
        porta) utilizado para o embarque e operação pretendida.
    hot_air_balloon_burner_type:
      name: Tipo de queimador para balões de ar quente
      description: Tipo/configuração do sistema de queimadores instalado no balão.
    hot_air_balloon_envelope_material:
      name: material do envelope do balão de ar quente
      description: Tecido/material principal utilizado para o envelope do balão (Canopy).
    hotfix_application_tool:
      name: Ferramenta de aplicação Hotfix
      description: Ferramenta ou fonte de calor recomendada para aplicar strass termocolante.
    hub_axle_type:
      name: Tipo de eixo do cubo
      description: Identifica o sistema de interface/retenção de clientes do eixo
        para o qual o cubo foi concebido (libertação rápida, eixo passante, etc.).
    hub_motor_type:
      name: tipo de motor de cubo
      description: Descreve o estilo de construção do motor do cubo (com engrenagens,
        acionamento direto, com escovas, sem escovas) para informar o comprador sobre
        as características de binário, peso e eficiência.
    hula_hoop_construction_type:
      name: tipo de construção do hula hoop
      description: Descreve como o aro é construído/montado.
    hula_hoop_features:
      name: Características do hula hoop
      description: Destaca as características funcionais ou de design mais notáveis
        do hula hoop.
    hull_design:
      name: Projeto do casco
      description: Descreve a forma do casco que influencia o desempenho e as características
        integradas.
    hull_type:
      name: Tipo de casco
      description: Descreve o formato do casco que afeta o desempenho e a estabilidade.
    humidifier_refill_medium_type:
      name: Recarga para humidificador tipo médio
      description: Identifica o meio de retenção/reabastecimento de humidade utilizado
        pelo humidificador caixa interior (o que é humedecido ou substituído).
    humidifier_refill_method:
      name: Método de recarga do humidificador
      description: Descreve como o humidificador é recarregado com humidade ou substituído.
    humidifying_medium:
      name: Meio humidificador
      description: Identifica o elemento/meio humidificador utilizado pelo produto
        (o que é humedecido/ativado).
    hummus_base_ingredient:
      name: Ingrediente base do hummus
      description: Identifica a principal leguminosa ou vegetal utilizada como base
        para a confeção do hummus.
    hunting_call_type:
      name: Tipo de chamada de caça
      description: Classifica o estilo ou mecanismo principal de operação do apito
        (por exemplo, soprado pela boca, eletrónico, caixa) para que os caçadores
        possam escolher rapidamente o formato que melhor se adapta às suas necessidades
        e nível de habilidade.
    hunting_dog_collar_function:
      name: Funções da coleira para cães de caça
      description: Classifica o estilo ou o propósito funcional principal da coleira,
        ajudando o comprador a filtrar os produtos por funções como o rastreio, treino,
        visibilidade ou utilização padrão.
    hvac_control_functions:
      name: Funções de controlo de AVAC
      description: Indica quais as funções de climatização/descongelação/fluxo de
        ar que são controladas pela unidade (mecânica ou eletrónica).
    hybrid_drivetrain_configuration:
      name: Configuração de transmissão híbrida
      description: Indica a arquitetura do sistema PHEV, descrevendo como o(s) motor(es)
        elétrico(s) e o motor de combustão interna fornecem propulsão.
    hybrid_system_type:
      name: Tipo de sistema híbrido
      description: Classifica a arquitetura de hibridização utilizada pelo veículo.
    hybrid_truck_cab_type:
      name: Tipo de cabine de camião híbrido
      description: Especifica a configuração da cabine do camião, que afeta a capacidade
        de bancos e o espaço interior.
    hydration_bag_features:
      name: A bolsa de hidratação apresenta
      description: Destaca as características de design ou funcionalidades notáveis
        específicas das bolsas de hidratação.
    hydration_belt_features:
      name: Características do cinto de hidratação
      description: Lista as funcionalidades notáveis incorporadas que melhoram a utilização,
        a segurança ou a comodidade do cinto de hidratação.
    hydration_bladder_compatibility:
      name: Compatibilidade com reservatório de hidratação
      description: Indica se o colete inclui ou suporta um sistema de reservatório
        de hidratação.
    hydration_mouthpiece_style:
      name: Estilo de bocal de hidratação
      description: Especifica o design ou estilo funcional do bocal ou válvula de
        um sistema de hidratação, ajudando o comprador a escolher a sua interface
        de consumo preferida e garantindo a compatibilidade.
    hydration_pack_style:
      name: Pacote de hidratação estilo
      description: Especifica o estilo estrutural do sistema de hidratação, como mochila
        ou colete, para auxiliar no ajuste e utilização - caixa de filtragem interior.
    hydration_system_insulation:
      name: Isolamento do sistema de hidratação
      description: Indica se o reservatório e/ou o tubo de hidratação estão isolados
        para ajudar a manter a temperatura do líquido em condições quentes ou frias.
    hydration_valve_type:
      name: Tipo de válvula de hidratação
      description: Identifica o tipo de válvula de beber ou bocal fornecido com o
        sistema ou a garrafa, abrangendo os modelos comuns de válvula de mordida e
        bocal de alto fluxo.
    hydraulic_fluid_type:
      name: Tipo de fluido hidráulico
      description: Especifica o tipo de líquido dos travões que uma manete de travão
        hidráulica de bicicleta foi concebida para utilizar. Esta informação é fundamental
        para a manutenção e segurança.
    hydrogenation_level:
      name: Nível de hidrogenação
      description: Indica se a gordura é não hidrogenada, parcialmente hidrogenada
        ou totalmente hidrogenada, o que afeta o teor de gordura trans e o desempenho
        na preparação dos alimentos.
    hydrophobicity_level:
      name: Nível de hidrofobicidade
      description: Indica o grau de desempenho de perolização/folha de água mercado
        pelo produto.
    ice_cream_format:
      name: Formato de gelado
      description: 'Descreve a forma física ou apresentação do produto gelado (ex.:
        pote, barra, mochi).'
    ice_skate_sharpener_type:
      name: tipo de afiador de patins de gelo
      description: Classifica o design ou formato geral do afiador (pedra manual,
        máquina elétrica, gabarito, etc.).
    ice_temperature_suitability:
      name: temperatura adequada do gelo
      description: Indica a gama de temperatura do gelo para a qual a cera para tacos
        de hóquei foi formulada, afetando o desempenho e as propriedades repelentes
        de neve.
    icing_sugar_variety:
      name: Variedade de açúcar de confeiteiro
      description: Classifica a formulação ou o tipo funcional do açúcar em pó (por
        exemplo, fondant, açúcar em pó que não derrete, colorido, aromatizado).
    ignition_coil_configuration:
      name: Configuração da bobina de ignição
      description: Especifica o formato da bobina de ignição (bobina simples/bobina
        sobre vela, conjunto de bobinas com múltiplas torres por número de cilindros,
        bobina em calha/cassete ou estilo distribuidor).
    ignition_lead_compliance_standard:
      name: Oportunidade de ignição potencial conformidade com a norma
      description: Norma ou certificação formal da indústria que a(s) potencial(is)
        oportunidade(s) de ignição satisfazem, conforme indicado pelo fabricante (por
        exemplo, SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Material de isolamento potencial de oportunidade de ignição
      description: Material de isolamento/revestimento primário utilizado no potencial
        de ignição (isolamento exterior do cabo).
    ignition_lead_set_type:
      name: Tipo de conjunto de potencial de oportunidade de ignição
      description: Se o produto é uma potencial oportunidade de ignição individual
        ou um conjunto completo, e para que se destina o conjunto.
    ignition_lead_terminal_type:
      name: Oportunidade de ignição potencial tipo terminal
      description: 'Tipo de terminal/conector utilizado nas extremidades do circuito
        de ignição (ex.: terminal da vela Spark e terminal da bobina/distribuidor).'
    illumination_type:
      name: Tipo de iluminação
      description: Especifica se e como a bola é iluminada para atividade noturna
        (por exemplo, brilho fosforescente, LED ativado por impacto).
    immobilizer_installation_type:
      name: Tipo de instalação do imobilizador
      description: Indica como o imobilizador está instalado ou ligado ao veículo.
    immobilizer_unlock_method:
      name: método de desbloqueio do imobilizador
      description: Especifica como o imobilizador é armado/desarmado ou desbloqueado.
    impact_protection_certifications:
      name: Certificações de proteção contra impactos
      description: Especifica as normas de segurança que a almofada de proteção cumpre
        ou excede.
    impact_protection_level:
      name: Nível de proteção contra impactos
      description: Especifica o nível ou a tecnologia de proteção contra impactos
        oferecida pela coquilha desportiva.
    impact_protection_rating:
      name: Classificação de proteção contra impactos
      description: Especifica o nível de proteção contra impactos certificado de acordo
        com as normas (por exemplo, EN 1621-1 Nível 1, EN 14120 Nível 2), ajudando
        os motociclistas a escolher uma proteção de nível superior.
    impact_surface_material:
      name: Material da superfície de impacto
      description: 'Descreve o principal material da superfície de impacto/golpe para
        segurança e sensibilidade (ex.: espuma, plástico).'
    incense_base_material:
      name: Material base para incenso
      description: Material base/aglutinante primário utilizado para fazer o incenso
        (base em pó) do kit.
    incense_making_method:
      name: Método de fabrico de incenso
      description: O processo Craft pretendido é suportado pelo kit.
    incense_tool_type:
      name: Tipo de ferramenta para incenso
      description: Especifica o tipo de utensílio para fabrico de incenso que este
        produto é (usado para formar, medir, prensar, misturar ou secar incenso).
    incline_adjustment_type:
      name: Tipo de ajuste de inclinação
      description: Descreve como (ou se) a inclinação pode ser alterada durante os
        treinos.
    included_accessories:
      name: Acessórios incluídos
      description: As listas incluíam acessórios como cabeças/brocas sobressalentes,
        caixa de armazenamento interna, cabo Charge ou adaptador CA.
    included_case_type:
      name: Tipo de estojo incluído
      description: Tipo de estojo interno para transporte/armazenamento incluído com
        o saxofone baixo (se existir).
    included_components:
      name: Componentes incluídos
      description: Lista o que está incluído no pacote (útil para conjuntos de ferramentas
        e pacotes).
    included_fastener_components:
      name: Componentes de fixação incluídos
      description: Especifica se o produto é um conjunto de colchetes, apenas colchetes,
        apenas colchetes ou uma variante de fecho de vestuário relacionada.
    included_hydration_vessel_type:
      name: Tipo de recipiente de hidratação incluído
      description: Identifica o tipo de reservatório de hidratação, fornecido ou suportado
        pelo cinto.
    included_items_woodwind_instrument:
      name: Itens incluídos (instrumento de sopro em madeira)
      description: Lista dos itens que normalmente acompanham o pacote do saxofone
        baixo.
    included_materials:
      name: Materiais incluídos
      description: Indica quais os componentes incluídos na compra do molde (apenas
        o molde ou molde + materiais).
    included_mounting_accessories:
      name: Acessórios de montagem incluídos
      description: Lista os acessórios de montagem/fixação incluídos com o altifalante.
    included_pump_type:
      name: Tipo de bomba incluído
      description: Identifica o tipo de bomba fornecida ou integrada com o colchão
        de ar.
    included_scraper_implement_type:
      name: Tipo de alfaia raspador incluído
      description: 'Indica quais os instrumentos de execução que estão incluídos com
        o raspador musical (ex.: bastão/haste raspadora, escova de arame).'
    indicator_design:
      name: Design de indicadores
      description: Classifica a forma física ou o estilo do indicador de picada de
        pesca.
    indicator_functions_tracked:
      name: Funções indicadoras rastreadas
      description: Lista o indicador Métrica específico do jogo, como bolas, strikes,
        eliminações, entradas, contagem de lançamentos, overs, wickets, pontuação
        ou downs.
    indoor_outdoor_use:
      name: Uso interno/externo
      description: Indica se o brinquedo de bowling se destina a ser utilizado no
        interior, no exterior ou em ambos os locais.
    inflatable_decoration_items_included:
      name: Artigo de decoração insuflável incluído
      description: 'Enumera os principais acessórios incluídos com a decoração insuflável
        (ex.: ventilador, estacas, cordas de fixação).'
    inflatable_decoration_type:
      name: Tipo de decoração insuflável
      description: Especifica o tipo de decoração insuflável para festas (forma/fator
        de forma) para auxiliar na pesquisa e filtragem.
    inflatable_raft_float_features:
      name: Características da jangada/boia insuflável
      description: Características funcionais presentes na jangada/boia insuflável.
    inflation_method_included:
      name: Método de inflação incluído
      description: Especifica o tipo de solução para pneus incluída no kit de reparação,
        se existir.
    infused_scent:
      name: Aroma infundido
      description: Identifica aditivos de aroma ou sabor impregnados no material do
        isco.
    ingredient_base_type:
      name: Tipo de base de ingredientes
      description: 'Identifica a base principal utilizada na fermentação (ex.: concentrado
        de sumo de uva, sumo Fresh ou concentrado de fruta).'
    ingredient_physical_form:
      name: Forma física do ingrediente
      description: Especifica a forma física em que o ingrediente da fragrância é
        fornecida (utilizada para manuseamento, medição e formulação).
    ingredient_processing_method:
      name: Método de processamento dos ingredientes
      description: Especifica a principal técnica de processamento aplicada ao ingrediente
        (por exemplo, liofilizado, torrado, fermentado).
    ink_colors_included:
      name: Colors de tinta incluídas
      description: Especifica as Colors de tinta incluídas na(s) almofada(s) de carimbo
        do conjunto.
    ink_pad_application_method:
      name: Método da aplicação de almofada de tinta
      description: Como a tinta é dispensada/utilizada da almofada (almofada de carimbo
        tradicional vs. almofada com ponta de pincel).
    ink_pad_permanence:
      name: Durabilidade da almofada de tinta
      description: Se a tinta utilizada no carimbo é permanente e/ou de arquivo (resistente
        ao desbotamento e à água depois de seca).
    ink_pad_size:
      name: almofada de tinta
      description: Tamanho/fator de forma normalizado da superfície da almofada de
        tinta/caixa interior.
    ink_pad_special_effects:
      name: Efeitos especiais da almofada de tinta
      description: 'Efeitos visuais/funcionais especiais da tinta quando carimbada
        (ex.: metálico, com glitter).'
    ink_permanence:
      name: permanência da tinta
      description: Indica se a tinta sumi seca se destina a ser permanente/de arquivo
        ou lavável/não permanente.
    ink_preparation_required:
      name: Preparação da tinta necessária
      description: Indica se a tinta sumi está pronta a usar ou se necessita de ser
        diluída com água ou moída antes da utilização.
    inline_skate_brake_type:
      name: Tipo de travão para patins em linha
      description: Especifica a configuração de travagem incluída nos patins em linha,
        como um travão de calcanhar amovível ou nenhum travão.
    inner_tent_configuration:
      name: Configuração da tenda interior
      description: Especifica a configuração ou o estilo da tenda interior, por exemplo,
        com cobertura total, com tela ou com forro térmico.
    innerspring_coil_type:
      name: Tipo de mola interna
      description: Especifica o estilo de construção do sistema de molas internas
        do colchão, o que afeta o suporte, o isolamento Motion e o preço.
    input_connector_type:
      name: Tipo de conector de entrada
      description: Especifica o tipo de conector de entrada de áudio utilizado pelo
        pedal (normalmente TS de 1/4 de polegada).
    input_valve_type:
      name: Tipo de válvula de entrada
      description: Indica o padrão da válvula presente na câmara de ar/roda da bicicleta
        à qual o adaptador se FROM.
    insecticide_treatment:
      name: Tratamento de inseticida
      description: Indica se a tela foi tratada com inseticida em fábrica e, em caso
        afirmativo, o tipo de tratamento utilizado para proteção adicional.
    insert_coverage_area:
      name: Inserir área de cobertura
      description: Especifica qual a parte do pé que a palmilha foi concebida para
        cobrir (por exemplo, comprimento total, apenas o calcanhar).
    insert_length_type:
      name: Tipo de comprimento da palmilha
      description: Indica a área da palmilha coberta pelo suporte do arco plantar.
    inside_message_type:
      name: Tipo de mensagem interna
      description: Indica se o cartão inclui uma mensagem pré-impressa no interior
        e se é personalizável.
    insole_attachment_method:
      name: Método de fixação da palmilha
      description: Especifica como a palmilha de suporte do arco plantar permanece
        no lugar dentro do sapato ( Dropsolto, adesivo na parte traseira, velcro,
        etc.).
    insole_material:
      name: Material da palmilha
      description: Descreve o material da palmilha ou da base onde o pé pousa, o amortecimento
        de impactos e o suporte.
    installation_fabrication_level:
      name: Nível de fabrico da instalação
      description: Indica a quantidade típica de fabrico ou modificação personalizada
        necessária para instalar o kit.
    installation_location:
      name: Localização de instalação
      description: Especifica o ponto de instalação típico para o sensor de pressão
        de óleo no sistema de lubrificação do motor (por exemplo, porta da galeria
        de óleo do bloco, caixa do filtro, placa sanduíche ou montagem remota da linha).
    installation_method:
      name: Método de instalação
      description: Especifica a forma como o tapete ou mosaico é fixado ou instalado
        no chão.
    instant_coffee_form:
      name: forma de café instantâneo
      description: Descreve a forma física em que o café instantâneo é fornecido,
        afetando o método de preparação e o prazo de validade.
    instep_coverage:
      name: Cobertura do peito do pé
      description: Especifica se o produto protege apenas a canela ou a canela e o
        peito do pé.
    instruction_format:
      name: Formato de instruções
      description: Formato das instruções incluídas no kit.
    instrument_cleaning_swab_form_factor:
      name: fator de forma do cotonete de limpeza de instrumentos
      description: Especifica o estilo físico do cotonete (por exemplo, pano deslizante
        versus sistema de haste/escova) para corresponder às preferências do músico
        e às limitações do instrumento.
    instrument_dimensions_unit_context:
      name: Contexto da unidade de medida do instrumento
      description: Esclarece a que se referem as medidas de altura/largura/comprimento
        fornecidas (por exemplo, instrumento completo, comprimento de um único tubo,
        altura do suporte).
    instrument_electronics_type:
      name: tipo de eletrónica de instrumentos
      description: Indica se o sistema de captação/pré-amplificação do instrumento
        é ativo ou passivo.
    instrument_key:
      name: Tonalidade do instrumento
      description: Especifica a designação da tonalidade do instrumento da flauta
        de bisel utilizada nos Catálogos (normalmente Dó ou Fá para flautas de bisel
        de maiores dimensões).
    instrument_level:
      name: Nível do instrumento
      description: Nível de habilidade do músico para o qual o instrumento é oferecido.
    instrument_part_mounting_method:
      name: método de montagem das peças do instrumento
      description: Especifica a forma como a peça é fixada ou instalada (por exemplo,
        através de um grampo, adesivo ou parafuso).
    instrument_parts_included:
      name: Peças do instrumento incluídas
      description: Lista os principais componentes/peças incluídos na caixa de um
        clarinete em Lá.
    instrument_playing_technique:
      name: técnica de execução de instrumentos
      description: Forma como o instrumento é normalmente tocado/acionado (por exemplo,
        agitado, percutido, batido).
    instrument_size_class:
      name: classe de tamanho do instrumento
      description: Tamanho geral do instrumento expresso como uma classe favorável
        ao comprador, em vez de dimensão exata.
    insulation_fill_material:
      name: Material de enchimento isolante
      description: Identifica o principal material utilizado para isolar o blusão
        ou o colete.
    integrated_bottom_type:
      name: Tipo de fundo integrado
      description: Indica se a peça inclui blusa, calções, collant ou camadas interiores
        semelhantes para cobertura durante o movimento.
    integrated_charging_options:
      name: Opções de carregamento integradas
      description: Lista as entradas de alimentação ou interfaces Charge integradas
        disponíveis na mesa de cabeceira.
    integrated_furniture_function:
      name: Funções de mobiliário integrado
      description: 'Identifica elementos adicionais de mobiliário embutido incluídos
        com a cama de parede ou Frame (ex.: secretária, sofá, prateleiras).'
    integrated_locking:
      name: Fechadura integrada
      description: Se a estante inclui uma fechadura integrada para a fixação da estante
        ao veículo e/ou da bicicleta à estante.
    integrated_power_options:
      name: Opções de alimentação integradas
      description: Indica o tipo de alimentação integrada ou as funcionalidades Charge
        que o aparelho oferece.
    integrated_storage_features:
      name: Recursos de armazenamento integrados
      description: Identifica características adicionais de armazenamento ou acessórios
        que o suporte para tacos de bilhar inclui para além dos encaixes para tacos.
    integrated_tool_functions:
      name: Funções da ferramenta integrada
      description: 'Funcionalidades adicionais integradas na alavanca (ex.: gancho
        para raios, extrator de núcleo de válvula, extrator de talões).'
    intended_board_type:
      name: Tipo de placa pretendido
      description: Especifica o estilo de prancha de kitesurf para o qual a quilha
        foi concebida (por exemplo, twin tip, surf direcional, hydrofoil).
    intended_consumption:
      name: Consumo pretendido
      description: Especifica a forma como o produto deve ser consumido, indicando
        se é seguro consumi-lo cru, se necessita de ser assado ou se já está parcialmente
        assado.
    intended_craft:
      name: Craftpretendido
      description: Contexto principal de manualidades para o qual o guia de fios foi
        desenvolvido.
    intended_culinary_use:
      name: Uso culinário pretendido
      description: Indica a principal aplicação culinária do molho, como mergulhar,
        cozinhar ou glacear.
    intended_handlebar_style:
      name: Estilo de guiador pretendido
      description: 'Descreve o estilo de guiador ou utilização pretendida da manete
        (ex.: guiador direito, guiador Drop , aerodinâmico). Isto restringe rapidamente
        a compatibilidade sem forçar subcategorias adicionais.'
    intended_player_role:
      name: Função do jogador pretendido
      description: Especifica a função em campo a que o capacete se destina (por exemplo,
        apanhador, árbitro).
    intended_playing_surface:
      name: Superfície de jogo pretendida
      description: A superfície para a qual o disco, a bola ou o anel foi concebido,
        como o gelo, o asfalto, os pavimentos de ginásio ou o gelo sintético.
    intended_repair_location:
      name: Local previsto para a reparação
      description: Em que parte do pneu o kit se destina a reparação.
    intended_seating_position:
      name: Posição de assento pretendida
      description: Especifica a posição do banco do veículo na qual a correia do cinto
        de segurança deve ser instalada ou utilizada.
    intended_sewing_application:
      name: Aplicativo de costura pretendido
      description: 'Aplicação de costura para a qual a thread foi concebida (ex.:
        costura de vestuário em geral, acolchoamento, estofos).'
    intended_technique:
      name: Técnica pretendida
      description: A principal técnica de feltragem para a qual a almofada/tapete
        foi concebida.
    intended_use:
      name: Uso pretendido
      description: Contexto de utilização principal do instrumento.
    intended_use_fleece_fabric:
      name: Utilização prevista (tecido polar)
      description: Projeto/aplicação principal para o qual o tecido polar é comercializado.
    intended_user:
      name: Utilizador pretendido
      description: Indica para quem o equipamento de proteção da aeronave foi concebido
        para ser utilizado.
    intended_yarn_form:
      name: Forma de fio pretendida
      description: Especifica a apresentação do fio mais adequada para o recipiente
        de fio.
    interaction_mode:
      name: Modede interação
      description: Método de interação primário utilizado para ouvir sons ou realizar
        atividades.
    interactive_effects:
      name: Efeitos interativos
      description: Identifica os efeitos eletrónicos ou mecânicos interativos incluídos
        num conjunto de cozinha de brinquedo.
    interfacing_application_area:
      name: Área de interface da aplicação
      description: Identifica as áreas comuns de costura/Craft em que a entretela
        se destina a ser aplicada.
    interfacing_color_family:
      name: Gama de cores da entretela
      description: Indica a cor de base típica da entretela utilizada para tecidos
        claros ou escuros.
    interfacing_selling_format:
      name: Formato de venda da entretela
      description: Descreve o formato de venda da entretela (por exemplo, em fita
        vendida por metro, em peças pré-cortadas, em rolos ou em paletas)
    interfacing_stiffness_level:
      name: Nível de rigidez da entretela
      description: Descreve o grau de rigidez/firmeza proporcionado pela entretela.
    interior_padding_type:
      name: Tipo de preenchimento interior
      description: Tipo de preenchimento interior ou sistema de inserção utilizado
        no interior da caixa interna para proteger e organizar o conteúdo.
    interior_stall_configuration:
      name: Configuração interna da cabine
      description: Especifica o esquema interior ou a configuração para o transporte
        de animais (orientação da cabine e estilo dos compartimentos).
    invitation_printing_coverage:
      name: Cobertura de impressão de convites
      description: Em que lados do convite é apresentada a impressão (apenas frente
        ou frente e verso)?
    iodization:
      name: Iodização
      description: Indica se e em que medida foi adicionado iodo ao sal.
    iridescence_level:
      name: Nível de iridescência
      description: Descreve a intensidade do brilho iridescente natural/tratado típico
        das penas de pavão.
    irish_warpipe_set_configuration:
      name: Configuração do conjunto de gaitas de guerra irlandesas
      description: Indica qual a configuração que está a ser vendida (instrumento
        completo ou peças/conjunto parcial), especificamente para as gaitas de guerra
        irlandesas.
    iron_on_applique_application_method:
      name: Método de aplicação de aplique para colar com o ferro de engomar
      description: Especifica como o aplique para colar com o ferro de engomar deve
        ser aplicado ao substrato.
    ironing_center_features:
      name: Características do centro de engomar
      description: Lista as características especiais dos centros de engomar que melhoram
        a usabilidade e a comodidade.
    jacket_breast_style:
      name: Estilo dos botões do casaco
      description: Especifica se o casaco do fato é de botões simples ou de botões
        duplos.
    jacket_vent_style:
      name: Estilo da abertura do casaco
      description: Indica o tipo de abertura na parte de trás do casaco.
    jam_and_jelly_consistency:
      name: Consistência de geleia e compota
      description: Descreve a textura da pasta, indicando a presença de pedaços de
        fruta ou sementes.
    jaw_shape:
      name: Forma da mandíbula
      description: A geometria das mandíbulas ou da ponta (por exemplo, reta, curvada,
        de bico longo) afeta a precisão e o alcance.
    jerky_form:
      name: Forma da carne seca
      description: Descreve a forma física ou o corte dos pedaços de carne seca (por
        exemplo, tiras, palitos, pedaços).
    jersey_style:
      name: Estilo da camisola
      description: Especifica o formato ou estilo de utilização das camisolas de adepto.
    jew_harp_accessories_included:
      name: Acessórios do berimbau incluídos
      description: A lista inclui itens que acompanham o berimbau (p. ex., estojo,
        bolsa, instruções).
    jew_s_harp_frame_style:
      name: Estilo de estrutura do berimbau
      description: Descreve o estilo de construção da estrutura/corpo do berimbau,
        que influencia o toque, a durabilidade e a ergonomia da execução.
    jew_s_harp_tongue_profile:
      name: Perfil da palheta do berimbau
      description: Descreve o perfil/geometria da palheta do berimbau, que afeta a
        resposta e o timbre.
    jewelry_pieces_included:
      name: Peças de joalharia incluídas
      description: Lista as peças de joalharia específicas incluídas no conjunto para
        que o comprador saiba exatamente que peças está a adquirir.
    jigsaw_puzzle_piece_shape:
      name: Forma da peça de puzzle
      description: O estilo geral de corte/forma das peças e o perfil das arestas.
    jockstrap_design_features:
      name: Características do design da coquilha
      description: Capta elementos de design especiais exclusivos das coquilhas que
        influenciam a funcionalidade ou a estética.
    juggling_club_construction_type:
      name: Tipo de construção da clave de malabarismo
      description: Especifica o tipo geral de construção de uma clave de malabarismo
        (por exemplo, moldada numa única peça ou montada em várias peças), o que pode
        afetar a durabilidade, a sensação ao manuseá-la e a manutenção.
    juggling_club_core_material:
      name: Material principal da clave de malabarismo
      description: O principal material do interior da clave (distinto do revestimento
        exterior/fita).
    juggling_prop_set_size:
      name: Tamanho do conjunto de acessórios de malabarismo
      description: Número de acessórios principais incluídos no conjunto (por exemplo,
        conjunto de 3 bolas, conjunto de poi).
    juggling_ring_edge_style:
      name: Estilo de rebordos da argola de malabarismo
      description: O perfil dos rebordos da argola influencia o conforto e a pega.
    juice_form:
      name: Forma do sumo
      description: Especifica a forma física ou a fase de processamento do produto
        (por exemplo, líquido de concentração única, concentrado, pó).
    juice_processing_method:
      name: Método de processamento do sumo
      description: Especifica a principal técnica de processamento aplicada ao sumo
        ou bebida, o que impacta o sabor, a retenção de nutrientes e o prazo de validade.
    jump_rope_style:
      name: Estilo da corda de saltar
      description: Classifica o estilo de construção da corda/cabo (por exemplo, com
        contas, revestido em tecido, cabo de alta velocidade), o que afeta fortemente
        a utilização e o desempenho pretendidos.
    kale_variety:
      name: Variedade de couve
      description: Identifica a cultivar ou variedade específica de couve (por exemplo,
        couve-frisada, toscana, couve-vermelha russa). Isto ajuda o comprador a escolher
        com base no sabor, na textura e no uso culinário.
    kaleidoscope_viewing_type:
      name: Tipo de visualização do caleidoscópio
      description: Identifica o formato de visualização ou o estilo de funcionamento
        do caleidoscópio (por exemplo, tubo ocular clássico, com lentes de teleidoscópio,
        operado por roda, projeção).
    kayak_construction_type:
      name: Tipo de construção do caiaque
      description: Especifica o tipo de construção principal do caiaque, como, por
        exemplo, de casco rígido ou insuflável.
    kayak_design_type:
      name: Tipo de design do caiaque
      description: Classifica a principal finalidade do design do caiaque (por exemplo,
        surfski, caiaque de lazer, caiaque de passeio).
    kayak_hull_design:
      name: Design do casco do caiaque
      description: Identifica a forma principal do casco, que influencia características
        de manuseio, tais como a estabilidade e a manobrabilidade em condições de
        ondulação.
    kayak_storage_bag_type:
      name: Tipo de saco de armazenamento para caiaques
      description: Identifica o estilo ou formato de um saco de armazenamento para
        caiaques, como, por exemplo, um saco à prova de água ou um saco para remos.
    kayak_style:
      name: Estilo do caiaque
      description: Especifica o design principal ou o estilo de utilização do caiaque
        (por exemplo, recreativo, de passeio, insuflável).
    keel_type:
      name: Tipo de quilha
      description: Identifica a configuração da quilha do veleiro.
    kettlebell_style:
      name: Estilo do kettlebell
      description: Identifica a variante de construção ou estilo do kettlebell (por
        exemplo, competição, ajustável, macio), ajudando o comprador a escolher o
        kettlebell certo para as suas necessidades de treino.
    key_attachment_mechanism:
      name: Mecanismo de fixação da chave
      description: Especifica o equipamento utilizado para fixar as chaves no interior
        da caixa interna, como argolas, grampos ou parafusos.
    key_retention_when_unlocked:
      name: Retenção da chave quando destrancada
      description: Indica se a chave pode ser retirada da fechadura quando esta se
        encontra na posição destravada.
    keyboard_amplifier_inputs:
      name: Entradas do amplificador de teclado
      description: Lista as ligações de entrada suportadas pelo amplificador de teclado
        (por exemplo, TRS de 1/4 de polegada, entrada MIDI, Bluetooth).
    keyboard_amplifier_output_types:
      name: Tipos de saída do amplificador de teclado
      description: Especifica os tipos de conectores de saída principais suportados
        pelo amplificador de teclado para o encaminhamento de áudio para outros sistemas.
    keyboard_case_handle_type:
      name: Tipo de pega do estojo para teclado
      description: Sistema de pega primária utilizado para movimentar/transportar
        o estojo do teclado (para além das alças).
    keyboard_case_interior_padding_type:
      name: Tipo de preenchimento interior do estojo para teclado
      description: Método principal de acolchoamento/revestimento interior utilizado
        no interior do estojo rígido.
    keyboard_case_protection_level:
      name: Nível de proteção do estojo para teclado
      description: Classe geral de proteção/rigidez do estojo rígido, que distingue
        os estojos rígidos moldados dos estojos de alta resistência para transporte
        aéreo/tipo ATA.
    keyboard_case_wheel_type:
      name: Tipo de mala com rodas para teclado
      description: Configuração de rodas para estojos rígidos que incluem rodas.
    keyboard_pedal_connector_type:
      name: Tipo de conector do pedal do teclado
      description: Especifica o tipo de conector/ficha utilizado para ligar o pedal
        de sustain a um teclado ou piano digital.
    keyboard_power_supply_type:
      name: Tipo de fonte de alimentação do teclado
      description: Método de alimentação principal do teclado (bateria, adaptador
        CA, alimentação por USB).
    keyboard_stand_tier_type:
      name: Tipo de suporte para teclado
      description: Indica se o suporte é vendido apenas como suporte de base ou se
        inclui/adiciona um acessório de segundo nível.
    keyboard_stand_tiers:
      name: Níveis do suporte para teclado
      description: Número de níveis de execução suportados pelo suporte tipo Z (por
        exemplo, um nível ou dois níveis).
    keychain_attachment_type:
      name: Tipo de fixação para porta-chaves
      description: Especifica o material de fixação principal utilizado para prender
        o porta-chaves a chaves, bolsas ou cintos.
    keychain_style:
      name: Estilo do porta-chaves
      description: Descreve o formato geral do porta-chaves (como é fisicamente).
    keywork_finish:
      name: Acabamento das teclas
      description: Descreve o acabamento/revestimento especificamente das teclas,
        independentemente do acabamento do corpo do instrumento.
    kick_point:
      name: Ponto de flexão
      description: Especifica a localização do ponto de flexão no cabo de um taco
        de hóquei, o que afeta a velocidade de lançamento e a sensação ao lançar.
    kick_zone_grip_system:
      name: Sistema de aderência da zona de impulso
      description: Identifica a tecnologia utilizada na zona de impulso do esqui para
        proporcionar tração.
    kickboard_features:
      name: Características da prancha de natação
      description: Destaca as características especiais da prancha de natação que
        melhoram o treino ou o conforto, incluindo a textura da superfície e as opções
        de punhos.
    kickboard_handle_style:
      name: Estilo de pega da prancha de natação
      description: Indica se e de que forma a prancha de natação dispõe de pegas ou
        de acabamentos na superfície que influenciam o manuseamento e o conforto.
    kickstand_mounting_position:
      name: Posição de montagem do descanso
      description: Identifica o local do quadro da bicicleta onde o descanso se fixa
        (por exemplo, fixação central, fixação na escora da corrente, fixação no eixo
        traseiro).
    kickstand_type:
      name: Tipo de descanso
      description: Descreve o estilo estrutural ou o mecanismo do descanso (por exemplo,
        descanso lateral de uma perna, descanso central de duas pernas, telescópico).
    kidney_belt_support_level:
      name: Nível de apoio do cinto lombar
      description: Nível de apoio global indicado pelo fabricante, proporcionado por
        um cinto lombar para a estabilização da região lombar e abdominal.
    kiln_firing_atmosphere:
      name: Atmosfera de cozedura do forno
      description: Especifica as atmosferas de cozedura que o forno é capaz de suportar
        durante o funcionamento (por exemplo, oxidação ou redução).
    kiln_heating_element_type:
      name: Tipo de elemento de aquecimento do forno
      description: Tipo/material dos elementos de aquecimento utilizados no forno.
    kingpin_design:
      name: Design do eixo de rotação
      description: Descreve o estilo de construção do próprio conjunto do eixo de
        rotação, o que influencia o peso e a folga para manobras.
    kingpin_orientation:
      name: Orientação do eixo de rotação
      description: Identifica a orientação do eixo de rotação do camião, o que influencia
        as características de condução e a compatibilidade da plataforma.
    kit_components_included:
      name: Componentes incluídos no kit
      description: Lista as peças de hardware individuais fornecidas no kit (por exemplo,
        estacas de fixação, parafusos, fitas, ferramenta de instalação) para que os
        compradores saibam exatamente o que estão a adquirir.
    kit_format:
      name: Formato do kit
      description: Especifica a forma como o kit é empacotado e transportado (por
        exemplo, bolsa, estojo, caixa).
    kit_items_included:
      name: Itens incluídos no kit
      description: Lista os principais equipamentos e materiais incluídos no kit de
        produção de vinho, para que os compradores possam distinguir os kits iniciais
        das recargas que contêm apenas ingredientes.
    kit_pouch_case_type:
      name: Tipo de bolsa/estojo do kit
      description: Especifica o tipo de solução de armazenamento incluída no kit de
        cuidados (se existir).
    kit_tools_included:
      name: Ferramentas incluídas no kit
      description: Lista as principais ferramentas fornecidas no kit (se existirem)
        para concluir o projeto.
    kite_inflation_system:
      name: Sistema de enchimento do kite
      description: Indica como a borda de ataque e as hastes do kite são insufladas.
    kite_line_configuration:
      name: Configuração das linhas do kite
      description: Indica o número de linhas de voo/controlo para as quais a vela
        do kite foi concebida, uma especificação comum para combinar corretamente
        as barras e as linhas.
    kite_type:
      name: Tipo de kite
      description: Define a categoria de design estrutural do kite (forma e estilo
        das amarras).
    kiteboard_bag_style:
      name: Mala para pranchas de kitesurf
      description: Tipo específico ou subtipo de mala para pranchas de kitesurf (por
        exemplo, mala para pranchas, mala de golfe, mala de viagem, mala para capas).
    kiwifruit_variety:
      name: Variedade de kiwi
      description: Identifica a cultivar específica ou a variedade de cor do kiwi
        (verde, dourado, vermelho, etc.).
    knee_pad_pocket_type:
      name: Tipo de bolso para joelheiras
      description: Indica se e como a peça de vestuário permite a utilização de joelheiras
        de proteção.
    knee_pad_style:
      name: Estilo de joelheira
      description: Descreve o estilo de construção ou o formato da proteção para o
        joelho (por exemplo, manga, cinta, protetor).
    knee_protection_design:
      name: Design da proteção para os joelhos
      description: Indica o número de secções articuladas para os joelhos integradas
        na proteção de pernas.
    kneeboard_construction:
      name: Construção de kneeboard
      description: Identifica a principal técnica de construção ou composição da prancha
        (por exemplo, plástico rotomoldado, moldado por compressão, fibra de carbono).
    kneeboard_strap_type:
      name: Tipo de correia para kneeboard
      description: Descreve o tipo de sistema de correias para os joelhos utilizado
        para segurar o praticante à prancha.
    knife_lock_mechanism:
      name: Mecanismo de bloqueio da lâmina
      description: Especifica o mecanismo utilizado para segurar a lâmina de uma faca
        dobrável na posição aberta, ou indica modelos sem bloqueio.
    knife_locking_mechanism:
      name: Mecanismo de bloqueio da lâmina
      description: Especifica o tipo de mecanismo que mantém a lâmina fixa na posição
        aberta, determinando diretamente a segurança, a resistência e a facilidade
        de utilização das facas com lâmina bloqueável.
    knife_opening_mechanism:
      name: Mecanismo de abertura da lâmina
      description: Descreve a forma como a lâmina é acionada a partir do cabo, distinguindo
        os tipos de abertura manual, assistida, automática e especial.
    knife_system:
      name: Sistema de lâmina
      description: Se e como a lâmina de corte funciona na máquina de costura.
    knit_elastic_application:
      name: Aplicação de elástico de malha
      description: Especifica a finalidade de utilização prevista para a fita elástica
        de malha em trabalhos de costura ou artesanato.
    knit_pattern:
      name: Padrão da malha
      description: Identifica o ponto ou a textura principal utilizado no tecido do
        casaco, como tranças, canelado ou waffle, permitindo aos clientes encontrar
        texturas e propriedades térmicas específicas.
    knit_style:
      name: Estilo da malha
      description: Especifica a malha principal, a textura ou o padrão decorativo
        presente no tecido da camisola.
    knitting_marker_counter_type:
      name: Tipo de marcador/contador de malha
      description: Especifica o tipo de produto funcional no âmbito dos marcadores
        e contadores de malhas.
    knitting_needle_tip_style:
      name: Tipo de ponta da agulha de tricô
      description: Acuidade/forma da ponta otimizada para diferentes fios e técnicas.
    knock_sensor_technology:
      name: Tecnologia do sensor de detonação
      description: A tecnologia de deteção utilizada no sensor de deteção de batidas.
    knurl_aggressiveness:
      name: Intensidade da serrilha
      description: Descreve a acuidade ou textura do padrão serrilhado na haste da
        barra, o que influencia o conforto e a segurança da pega.
    knurl_marking_standard:
      name: Padrão de marcação por serrilha
      description: Especifica a posição dos aros de referência serrilhados utilizados
        para o posicionamento das mãos (por exemplo, marcações IPF ou IWF).
    kohlrabi_variety:
      name: Variedade de couve-rábano
      description: Especifica a cultivar ou variedade comercial do bulbo da couve-rábano,
        permitindo que os clientes escolham entre diferentes perfis de sabor, tamanhos
        e cores.
    koji_mold_type:
      name: Tipo de fungo Koji
      description: Indica o tipo ou a estirpe de fungo koji utilizada durante a fermentação,
        o que influencia o aroma e o sabor.
    kumquat_variety:
      name: Variedade de kumquat
      description: Identifica a cultivar ou variedade de kumquats disponíveis, permitindo
        ao comprador escolher a fruta com base no perfil de sabor, tamanho ou utilização
        culinária.
    label_edge_type:
      name: Tipo de borda da etiqueta
      description: Especifica o tipo de acabamento das bordas utilizado para evitar
        que estas se desfiem e para definir a estética.
    label_finish:
      name: Acabamento da etiqueta
      description: Especifica o acabamento da superfície, a textura ou o revestimento/tratamento
        protetor aplicado à etiqueta.
    label_finish_edge_style:
      name: Acabamento da etiqueta/estilo da borda
      description: A forma como as bordas são acabadas, o que afeta o conforto e a
        durabilidade (por exemplo, borda tecida ou corte a laser).
    label_fold_type:
      name: Tipo de dobra da etiqueta
      description: Especifica a forma como a etiqueta costurada é concebida para ser
        cosida numa peça (por exemplo, com dobra lateral ou dobra central), o que
        influencia a forma como é aplicada e a sua localização.
    label_text_type:
      name: Tipo de texto da etiqueta
      description: Indica se a etiqueta está em branco, pré-impressa ou se se destina
        a ser personalizada.
    lace_area_size:
      name: Tamanho da área da renda
      description: Define o tamanho ou a configuração da secção de renda (por exemplo,
        fecho 4×4, frontal 13×6), o que determina o espaço disponível entre as partes.
    lace_tightener_style:
      name: Estilo do apertador de renda
      description: Identifica o design mecânico ou o formato do dispositivo de aperto
        da renda.
    lace_type:
      name: Tipo de renda
      description: Descreve o material ou acabamento da renda na linha do cabelo/coroa,
        o que influencia o realismo e a correspondência com o tom da pele.
    lacrosse_ball_certification:
      name: Certificação da bola de lacrosse
      description: Especifica as aprovações ou normas das entidades reguladoras do
        desporto que a bola de lacrosse cumpre.
    lacrosse_goal_regulation_certification:
      name: Certificação das normas relativas às balizas de lacrosse
      description: Indica se a baliza ou a rede de lacrosse cumpre as especificações
        de uma entidade reguladora específica (por exemplo, a NCAA ou a NFHS).
    lacrosse_pocket_type:
      name: Tipo do bolso de lacrosse
      description: Identifica o estilo geral do bolso ou da rede fixada na cabeça,
        influenciando o controlo da bola e o lançamento.
    lacrosse_string_type:
      name: Tipo de corda de lacrosse
      description: Classifica a forma exata ou a finalidade do artigo de malha ou
        cordão, para que os clientes possam distinguir entre peças de malha, kits
        e rolos específicos de cordão dentro de um bolso.
    ladder_position:
      name: Posição da escada
      description: Indica onde se encontra a escada ou o acesso à cama alta para crianças
        pequenas.
    lanyard_attachment_hardware:
      name: Equipamento de fixação para cordões
      description: Indica o tipo de equipamento metálico na extremidade do cordão
        que se prende a chaves, crachás, telemóveis ou outros acessórios.
    lanyard_style:
      name: Estilo cordão
      description: Especifica a forma como o cordão é usado ou transportado.
    lanyard_type:
      name: Tipo de cordão
      description: Descreve o tipo de cordão fornecido com o apito ou compatível com
        este.
    lap_hand_loom_accessories_included:
      name: Acessórios para teares de colo incluídos
      description: Acessórios incluídos no pacote do tear de colo.
    lapel_style:
      name: Estilo da lapela
      description: Especifica o estilo da lapela do casaco (por exemplo, lapela em
        V, lapela em ponta, lapela em xale).
    laser_safety_class:
      name: Classificação de segurança laser
      description: Classificação de segurança laser do produto (por exemplo, Classe
        2, 3R, 3B, 4), conforme indicado na documentação/etiqueta do dispositivo.
    latex_processing_method:
      name: Método de processamento do látex
      description: Especifica o processo de fabrico utilizado para produzir a espuma
        de látex, normalmente Dunlop ou Talalay, o que influencia o toque, a capacidade
        de resposta e o preço.
    latex_type:
      name: Tipo do látex
      description: Indica a origem e a composição do látex utilizado no colchão (natural,
        biológico, sintético ou misto), informando o comprador sobre a durabilidade,
        a sustentabilidade e os potenciais alérgenos.
    launch_profile:
      name: Perfil de lançamento
      description: Indica a trajetória de lançamento típica (baixa, média, alta) para
        a qual a haste de um taco de golfe foi concebida.
    launcher_mounting_configuration:
      name: Configuração de montagem do lançador
      description: Explica a forma como o lançador é montado ou configurado para utilização,
        ajudando os compradores que procuram opções autónomas, de montagem sob o cano
        ou em trilhos.
    layer_construction:
      name: Estrutura em camadas
      description: Especifica a confeção do tecido laminado (por exemplo, 2 camadas,
        2,5 camadas, 3 camadas), que influencia o peso, a facilidade de arrumação
        e a durabilidade.
    layer_design:
      name: Design das camadas
      description: Descreve a estrutura da rede de cabelo em termos de camadas ou
        reversibilidade.
    lazy_kate_tension_control_type:
      name: Tipo de controlo de tensão Lazy Kate
      description: Como o Lazy Kate aplica resistência/tensão às bobinas durante a
        torção ou o enrolamento.
    lead_hardware_type:
      name: Tipo de equipamento da trela
      description: Define o tipo de fixação ou fecho na extremidade da trela (mola,
        mosquetão, laço, corrente, etc.), o que influencia a facilidade de utilização,
        a segurança e a adequação à disciplina.
    leaf_gelatin_grade:
      name: Grau da gelatina em folha
      description: Especifica o grau de resistência normalizado utilizado para as
        folhas de gelatina.
    leaf_preparation:
      name: Preparação das folhas
      description: Descreve como as folhas são preparadas antes da embalagem, por
        exemplo, picadas, raladas ou cortadas em juliana.
    leaf_spring_material:
      name: Material das molas de lâmina
      description: Material de construção principal do pacote de mola de lâmina.
    leak_protection_layer:
      name: Camada de proteção contra fugas
      description: Indica se o sistema de fralda integrado no calção de natação utiliza
        um design de camada única ou dupla para proteção contra fugas.
    leash_clip_type:
      name: Tipo de mosquetão da trela
      description: Especifica o tipo de mosquetão ou equipamento utilizado para prender
        a trela a uma coleira ou arnês (por exemplo, mosquetão de rosca, mosquetão
        de segurança, mosquetão giratório).
    leash_style:
      name: Estilo da coleira
      description: Descreve a configuração do cordão ou o tipo de enrolamento da trela.
    leash_type:
      name: Tipo de trela
      description: Classifica o estilo geral ou a configuração específica da trela,
        para permitir uma filtragem rápida de acordo com a utilização pretendida.
    leavening_action_type:
      name: Tipo de ação levedante
      description: Identifica a composição química ou o tipo de fermentação do fermento
        em pó (por exemplo, de ação simples, de ação dupla, sem alumínio). Isto afeta
        diretamente o desempenho na preparação de bolos e a adequação das receitas.
    leavening_agent:
      name: Agente levedante
      description: Especifica o principal mecanismo de fermentação utilizado na massa.
    led_color_options:
      name: Opções de cores de LED
      description: Lista as cores de LED selecionáveis disponíveis no alarme para
        indicação visual de mordida.
    led_indicator_color:
      name: Cor do indicador LED
      description: Identifica a cor do indicador LED do produto, ajudando os pescadores
        a combinar vários alarmes ou a adaptar-se às suas preferências pessoais.
    led_light_color:
      name: Cor da luz LED
      description: Especifica a cor de qualquer iluminação LED integrada.
    leek_variety:
      name: Variedade de alho-francês
      description: Especifica a cultivar ou variedade do alho-francês, permitindo
        a diferenciação por sabor, tamanho e época de cultivo.
    leg_coverage:
      name: Cobertura das pernas
      description: Especifica a extensão da perna que a peça do fato de mergulho cobre
        (por exemplo, calções, comprimento total).
    leg_cuff_style:
      name: Estilo de bainha na perna
      description: Especifica o tipo de acabamento na abertura do tornozelo das calças.
    leg_cut_height:
      name: Altura do corte da perna
      description: Indica a altura a que a abertura da perna é cortada na parte de
        baixo do biquíni.
    leg_cut_style:
      name: Estilo de corte da perna
      description: Descreve o formato da abertura da perna, que influencia a aparência,
        o conforto e as marcas do bronzeado.
    leg_length:
      name: Comprimento da perna
      description: Classifica os boxers de acordo com o comprimento relativo das pernas
        (curtos, médios, longos) para permitir que o comprador escolha a cobertura
        que preferir sem dividir a categoria.
    leg_loop_type:
      name: Tipo de perneira
      description: Descreve o design das perneiras.
    leg_opening_style:
      name: Estilo da abertura da perna
      description: Especifica o tipo de acabamento das aberturas nas pernas das calças
        de treino, como punhos elásticos, bainhas com fecho de correr ou bainhas abertas.
    leg_style:
      name: Estilo de perna
      description: Define o estilo de design ou construção das pernas ou da base do
        banco.
    legging_foot_design:
      name: Design do pé das leggings
      description: Especifica se as leggings são sem pé, com pé ou se são conversíveis
        entre os dois estilos.
    leggings_waistband_style:
      name: Estilo da cintura das leggings
      description: Especifica o design estrutural da cintura das leggings, influenciando
        o conforto, o apoio e a estética.
    lei_closure_style:
      name: Estilo de fecho da grinalda
      description: Indica se a grinalda é um círculo contínuo ou se tem extremidades
        abertas que se atam ou se prendem com uma fita.
    lemon_variety:
      name: Variedade de limão
      description: Identifica a cultivar ou variedade específica dos limões (por exemplo,
        Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Método de ajuste do comprimento
      description: Indica se e como o comprimento da corda de saltar pode ser ajustado
        para se adequar ao utilizador.
    lens_color_tint:
      name: Cor/tonalidade da lente
      description: Cor ou tonalidade das lentes dos óculos de proteção fornecidos
        com o produto.
    lens_construction:
      name: Construção da lente
      description: Especifica a construção estrutural da lente (por exemplo, monofacética,
        térmica de dupla camada) para indicar a resistência ao embaciamento e o desempenho
        ótico.
    lens_tint_category:
      name: Categoria de tonalidade das lentes
      description: Classifica a tonalidade das lentes com base nas categorias internacionais
        de tonalidade, ajudando os clientes a escolher as lentes adequadas para diferentes
        condições de luminosidade.
    lettuce_variety:
      name: Variedade de alface
      description: Identifica a variedade hortícola específica de alface (por exemplo,
        iceberg, romana, lisa), permitindo uma filtragem e comparação precisas.
    level_of_play:
      name: Nível de jogo
      description: Nível de desempenho indicado pelo fabricante, que se adapta à competitividade
        e ao orçamento do jogador.
    lever_configuration:
      name: Configuração da alavanca
      description: Indica a configuração da alavanca/manípulo do comando do motor
        da embarcação (por exemplo, alavanca única ou alavanca dupla).
    lever_type:
      name: Tipo de alavanca
      description: Tipo/mecanismo das alavancas de afinação instaladas nas cordas
        da harpa.
    license_plate_cover_style:
      name: Estilo da capa da matrícula
      description: Especifica o tipo de construção da cobertura da matrícula (por
        exemplo, cobertura total ou tampas de rosca).
    license_plate_personalization_type:
      name: Tipo de personalização da matrícula
      description: Especifica se a matrícula está em branco, pré-impressa ou se permite
        a personalização pelo comprador (texto e/ou imagens).
    license_usage_terms:
      name: Termos de licença/utilização
      description: Direitos de utilização do padrão (por exemplo, apenas para uso
        pessoal ou uso comercial limitado).
    licensed_sports_property:
      name: Propriedade desportiva licenciada
      description: Indica se o produto é oficialmente licenciado por uma liga/equipa/organização.
    lid_hinge_mechanism:
      name: Mecanismo de dobradiça da tampa
      description: Especifica o mecanismo de dobradiça utilizado na tampa, o que tem
        impacto na segurança e na facilidade de utilização.
    lid_support_positions:
      name: Posições de apoio da tampa
      description: Especifica as posições suportadas pela tampa do piano de cauda
        (até que ponto a tampa pode ser aberta).
    lie_angle_color_code:
      name: Código de cores do ângulo de inclinação
      description: Denota o sistema de ângulo de inclinação codificado por cores do
        fabricante, utilizado em alguns tacos (por exemplo, ponto preto, ponto verde).
    life_jacket_certification_standard:
      name: Norma de certificação do coletes salva-vidas
      description: Classificação ou norma de segurança oficial a que o produto cumpre,
        como o Tipo USCG ou os níveis ISO/AS.
    life_raft_certification_standard:
      name: Norma de certificação do botes salva-vidas
      description: A norma de segurança/certificação a que o bote foi concebido e
        cujos requisitos cumpre.
    life_raft_container_type:
      name: Tipo de contentor para bote salva-vidas
      description: Como o bote salva-vidas é empacotado para armazenamento e utilização.
    life_vest_approval_standard:
      name: Norma de aprovação do colete salva-vidas
      description: Especifica a norma de certificação/aprovação com que o colete salva-vidas
        está em conformidade.
    life_vest_intended_user:
      name: Utilizador a quem se destina o colete salva-vidas
      description: Indica a categoria de utilizadores a que se destina, para efeitos
        de ajuste e fornecimento.
    lifebuoy_approval_standard:
      name: Norma de aprovação da boia salva-vidas
      description: Certificação ou norma de segurança com que a boia salva-vidas está
        em conformidade (por exemplo, USCG/SOLAS).
    lifebuoy_features:
      name: Características da boia salva-vidas
      description: Segurança funcional, montagem/manuseamento e características dos
        acessórios incluídos para boias salva-vidas.
    lift_mechanism_type:
      name: Tipo de mecanismo de elevação
      description: Especifica o mecanismo que auxilia na subida/descida ou na abertura/fecho
        da cama de parede.
    lift_stand_support_point:
      name: Ponto de apoio para levantar/ficar em pé
      description: No ponto em que o elevador entra em contacto com o veículo ou o
        apoia.
    lifting_gas_type:
      name: Tipo de gás de elevação
      description: Especifica o gás de elevação principal ou o meio de flutuação utilizado
        pelo dirigível.
    lifting_support_type:
      name: Tipo de apoio de elevação
      description: Indica se o elevador é colocado em funcionamento através de calhas
        ou se é levantado por braços/almofadas que entram em contacto com a estrutura/pontos
        de elevação.
    ligature_and_cap_component_type:
      name: Tipo de abraçadeira e de componente da tampa
      description: Indica se o produto é uma abraçadeira, uma tampa ou um conjunto
        que inclui ambos.
    ligature_material:
      name: Material da abraçadeira
      description: Material principal do corpo da abraçadeira que entra em contacto
        com a palheta e a fixa (por exemplo, metal, couro, tecido).
    ligature_plating_or_finish:
      name: Revestimento ou acabamento da abraçadeira
      description: Especifica o revestimento e/ou acabamento superficial aplicado
        a uma abraçadeira e/ou tampa de metal de clarinete.
    ligature_reed_contact_style:
      name: Tipo de contacto da palheta com a abraçadeira
      description: Especifica a forma como a abraçadeira entra em contacto com a palheta
        (por exemplo, contacto mínimo, multiponto, envolvente).
    ligature_screw_position_relative_to_reed:
      name: Posição do parafuso da abraçadeira (em relação à palheta)
      description: Indica a posição dos parafusos de aperto da abraçadeira em relação
        à palheta/ao lado voltado para o músico quando instalado no bocal.
    ligature_tension_adjustment_mechanism:
      name: Mecanismo de ajuste da tensão da abraçadeira
      description: Descreve a forma como a abraçadeira exerce/ajusta a pressão sobre
        a palheta (design de fixação).
    ligature_tightening_mechanism_type:
      name: Tipo de mecanismo de aperto da abraçadeira
      description: Especifica o mecanismo através do qual a abraçadeira se aperta
        à volta do bocal e da palheta (por exemplo, parafuso único, parafuso duplo,
        alavanca/libertação rápida).
    light_bar_housing_material:
      name: Material da caixa da barra de luz
      description: Material principal da estrutura/carcaça da barra de luz, com impacto
        na durabilidade e na dissipação de calor.
    light_bar_lens_material:
      name: Material da lente da barra de luz
      description: Material principal da lente/tampa da barra de luz, o que pode afetar
        a resistência ao impacto e a transparência ótica.
    light_bar_mounting_location:
      name: Local de montagem da barra de luz
      description: Posição de montagem prevista no veículo.
    light_stand_style:
      name: Estilo do suporte de luz
      description: Especifica o estilo estrutural ou o formato do suporte utilizado
        para sustentar luzes de efeitos especiais (por exemplo, tripé, barra em T,
        suporte articulado), e não a superfície de instalação (parede/teto), que é
        definida pelo tipo de montagem.
    light_switch_function:
      name: Função do interruptor
      description: Indica quais os circuitos de iluminação ou funções que o interruptor
        controla.
    lighting_control_protocols_supported:
      name: Protocolos de controlo de iluminação suportados
      description: Protocolos de controlo/rede que o controlador suporta, para além
        do DMX512 ou em vez deste.
    lighting_effects:
      name: Efeitos de iluminação
      description: Especifica quaisquer funcionalidades de iluminação integradas que
        melhorem a jogabilidade ou a estética.
    lighting_mode:
      name: Modo de iluminação
      description: Enumera os padrões de iluminação disponíveis, tais como luz contínua,
        intermitente, estroboscópica ou SOS.
    lily_variety:
      name: Variedade de lírio
      description: Especifica a variedade comercial/botânica do lírio vendido como
        flor cortada fresca (por exemplo, asiático, oriental).
    limb_articulation:
      name: Articulação dos membros
      description: Indica o grau de flexibilidade dos membros ou de articulação do
        manequim (nenhuma, fixa, semiflexível, totalmente articulada).
    limb_material:
      name: Material dos braços
      description: Material principal utilizado nos braços de um arco ou de uma besta,
        que influencia o peso, a durabilidade, a vibração e o desempenho geral.
    lime_variety:
      name: Variedade de lima
      description: Identifica a variedade botânica ou comercial específica da lima
        que está a ser vendida.
    line_buoyancy:
      name: Flutuabilidade da linha
      description: Indica se a trança flutua ou afunda naturalmente e a que velocidade,
        o que afeta a apresentação da isca e o manuseamento da linha.
    line_purpose:
      name: Finalidade da linha
      description: Define a função prevista da linha no sistema do kite (por exemplo,
        linha de voo dianteira, linha de redução de potência, linha de bridão).
    linen_finish_treatment:
      name: Acabamento/tratamento do linho
      description: Qualquer processo de acabamento aplicado ao tecido de linho que
        altere o toque, o aspeto ou o desempenho.
    linen_weave_type:
      name: Tipo de tecido de linho
      description: Especifica a estrutura de tecelagem do tecido de linho, que influencia
        a textura, a respirabilidade e o caimento.
    liner_padding_type:
      name: Tipo de preenchimento do forro
      description: Indica o tipo de construção ou acolchoamento do forro (por exemplo,
        em malha, ligeiramente acolchoado, acolchoado).
    liner_shape:
      name: Forma do forro
      description: Descreve a forma geral do forro do saco-cama para que os clientes
        possam combiná-lo com o seu saco-cama e com as suas preferências de conforto.
    liner_type:
      name: Tipo de forro
      description: Indica se os calções incluem um forro interno e, se incluírem,
        de que tipo é.
    lining:
      name: Forro
      description: Indica se os calções de banho têm forro e de que forma, incluindo
        a extensão da cobertura do forro no interior da peça.
    lining_material:
      name: Material do forro
      description: Especifica o material utilizado no forro interior do sapato, influenciando
        o conforto, a respirabilidade e a retenção de calor.
    lining_type:
      name: Tipo de forro
      description: Especifica se o fato de banho tem forro e em que medida.
    link_connection_style:
      name: Estilo de ligação
      description: Classifica a forma como o elo se encaixa na corrente (por exemplo,
        elo rápido, pino de ligação), permitindo aos ciclistas escolher o método de
        instalação correto ou a peça de substituição adequada.
    live_bait_form:
      name: Estado do isco vivo
      description: Especifica a forma física ou o estado de conservação da isca, por
        exemplo, viva, congelada ou seca.
    living_room_furniture_items_included:
      name: Mobiliário de sala de estar incluído
      description: Especifica as peças de mobiliário individuais que fazem parte do
        conjunto de sala de estar, ajudando o comprador a perceber rapidamente quais
        os componentes (por exemplo, sofá, sofá de dois lugares, mesa de centro) que
        estão incluídos.
    load_mechanism:
      name: Mecanismo de carga
      description: Especifica o método principal através do qual a resistência é gerada
        ou adicionada ao aparelho (por exemplo, pilha de pesos com seletor, com pesos
        de disco, com elásticos).
    lock_cylinder_type:
      name: Tipo de cilindro da fechadura
      description: Especifica o tipo de cilindro/núcleo da fechadura utilizado (relevante
        para a resistência ao arrombamento e para as chaves de substituição).
    lock_security_level:
      name: Nível de segurança da fechadura
      description: Descreve as características de resistência de segurança da fechadura/cilindro
        contra a abertura ilegal e a perfuração.
    lock_system:
      name: Sistema de fechadura
      description: Tipo de sistema de bloqueio de segurança utilizado para manter
        o elevador em altura.
    locker_bench_configuration:
      name: Configuração do banco com cacifos
      description: Descreve a orientação ou a configuração estrutural do banco com
        cacifos (por exemplo, de um só lado, em ilha de dois lados, fixado à parede).
    locomotive_prototype_power_type:
      name: Tipo de potência do protótipo de locomotiva
      description: Especifica o tipo de propulsão da locomotiva real representada
        pelo modelo.
    locomotive_wheel_arrangement_whyte_notation:
      name: Disposição das rodas da locomotiva (notação de Whyte)
      description: Disposição das rodas do protótipo da locomotiva (por exemplo, 4-6-2
        Pacific).
    loft_bed_height_classification:
      name: Classificação da altura da cama alta
      description: Indica o estilo de altura total da cama alta (baixa, média, alta,
        extra-alta), ajudando o comprador a adequar a altura do teto e os requisitos
        de espaço sob a cama.
    logo_application_method:
      name: Método de aplicação do logótipo
      description: Descreve a forma como o emblema ou logótipo da escola é aplicado
        na peça de vestuário (por exemplo, bordado ou impresso).
    logo_label_compatible_fabric_weight:
      name: Peso do tecido compatível com a etiqueta com logótipo
      description: Categoria de peso de tecido recomendada para a colocação da etiqueta
        sem distorções nem volume excessivo.
    logo_label_edge_finish:
      name: Acabamento da borda da etiqueta com logótipo
      description: Especifica a construção/acabamento das bordas da etiqueta, o que
        influencia a resistência ao desgaste e o conforto em contacto com a pele.
    logo_label_print_production_method:
      name: Método de impressão/produção da etiqueta com logótipo
      description: A forma como o logótipo é aplicado/formado na superfície da etiqueta.
    long_block_completeness:
      name: Integralidade do bloco longo
      description: Especifica quais são os principais componentes incluídos no conjunto
        do bloco longo.
    long_john_pieces_included:
      name: Partes de ceroulas incluídas
      description: Esclarece se o produto inclui apenas a parte de baixo, apenas a
        parte de cima ou ambas as partes do conjunto de ceroulas.
    longan_variety:
      name: Variedade de longan
      description: Especifica a cultivar ou variedade comercial do longan (por exemplo,
        Kohala, Biew Kiew), ajudando o comprador a identificar as características
        de sabor, tamanho e doçura que procuram.
    loom_accessories_included:
      name: Acessórios para tear incluídos
      description: Acessórios principais incluídos com o tear na caixa/embalagem.
    loom_finish:
      name: Acabamento do tear
      description: O acabamento da superfície do tear (principalmente no caso dos
        teares de madeira).
    loom_folding_portability_design_type:
      name: Tipo de design dobrável/portátil do tear
      description: Se e como o tear se dobra ou se desmonta para transporte ou armazenamento
        compacto.
    loom_frame_folding_design:
      name: Design dobrável da estrutura do tear
      description: Especifica se e como a estrutura do tear de mesa se dobra, se retrai
        ou se desmonta para armazenamento ou transporte.
    loom_tension_adjustment_method:
      name: Método de ajuste da tensão do tear
      description: Método principal utilizado para ajustar a tensão da distorção no
        tear.
    loom_tie_up_system:
      name: Sistema de amarração do tear
      description: Tipo de sistema de amarração/ligação utilizado entre pedais/lâminas/eixos
        (por exemplo, Texsolv ou corrente metálica).
    loquat_variety:
      name: Variedade de nêspera
      description: Especifica a cultivar ou variedade da nêspera, refletindo as diferenças
        de tamanho, sabor, época de maturação e aspeto.
    lubricant_features:
      name: Características do lubrificante
      description: Destaca características de desempenho especiais, aditivos ou vantagens
        do lubrificante.
    lubrication_requirement:
      name: Requisito de lubrificação
      description: Indica se a esteira da passadeira é pré-tratada/não requer manutenção
        ou se necessita de lubrificação ou enceramento regulares.
    lubrication_type:
      name: Tipo de lubrificação
      description: Especifica a capacidade de lubrificação/graxagem da bucha e se
        esta foi concebida para ser lubrificada com massa lubrificante (por exemplo,
        ranhuras ou um bocal de lubrificação).
    lug_nut_seat_profile:
      name: Perfil da base da porca da roda
      description: Especifica o perfil da base da porca de fixação exigido pela jante
        para garantir a compatibilidade correta das porcas de fixação e uma instalação
        segura.
    lumbar_support_type:
      name: Tipo de apoio lombar
      description: Descreve o tipo de apoio lombar incluído na cadeira (por exemplo,
        almofada removível, mecanismo ajustável, função de massagem).
    lunge_trainer_style:
      name: Estilo de treino de lunges
      description: Define o projeto estrutural de um aparelho de lunges.
    lure_buoyancy:
      name: Flutuabilidade da isca
      description: Especifica a forma como a isca se comporta na coluna de água quando
        está parada ou durante a recuperação (por exemplo, flutuando à superfície,
        suspensa a meio da coluna de água ou afundando-se).
    luster:
      name: Brilho
      description: Descreve a forma como a luz interage com a superfície da amostra
        (por exemplo, vítrea, metálica).
    lychee_cultivar:
      name: Cultivar de lichia
      description: Identifica a variedade ou cultivar específica de lichia, como Brewster,
        Hak Ip ou Mauritius, que pode variar em sabor, tamanho da semente, época de
        colheita e preço.
    lyre_flip_folder_mounting_location:
      name: Ponto de fixação de mola lira/viragem de página
      description: Onde a mola lira/viragem de página se destina a ser fixada no instrumento
        ou num acessório (por exemplo, campânula, tubo de entrada, suporte).
    lyrics_display_type:
      name: Tipo de apresentação de letras
      description: A forma como as letras são apresentadas (se possível) durante o
        karaoke.
    magazine_compatibility:
      name: Compatibilidade com carregadores
      description: Identifica os calibres ou tipos de carregadores principais que
        os bolsos integrados do colete foram concebidos para acomodar.
    magnet_requirement:
      name: Requisito de íman
      description: Indica se o sensor precisa de um íman externo para funcionar.
    magnet_toy_storage_included:
      name: Organizador de brinquedos magnético incluído
      description: Tipo de arrumação/caixa incluída no brinquedo magnético para organização
        de secretária e viagens.
    malanga_variety:
      name: Variedade de malanga
      description: Identifica a variedade específica de malanga/taro à venda, para
        ajudar os clientes a escolher o sabor, a cor ou a utilização culinária desejados.
    malt_color_rating_system:
      name: Sistema de classificação da cor do malte
      description: Especifica a que escala de cores se refere a cor indicada (Lovibond,
        SRM ou EBC).
    malt_crush:
      name: Esmagamento do malte
      description: Indica se o malte base é vendido inteiro/não moído ou pré-moído
        e, nesse caso, o tipo de moagem.
    malt_form:
      name: Forma do malte
      description: Indica se o produto é vendido em grãos inteiros ou se é transformado
        para trituração (por exemplo, triturado).
    malt_intended_use:
      name: Finalidade do malte
      description: Utilização principal prevista para o malte (fabrico de cerveja,
        destilação ou dupla finalidade).
    malt_treatment:
      name: Tratamento do malte
      description: Descreve como o grão/malte foi processado para além da secagem
        padrão (processos especializados comuns).
    malt_usage_purpose:
      name: Finalidade da utilização do malte
      description: Descreve a principal contribuição funcional de um malte especial
        para uma receita de cerveja.
    man_overboard_system_type:
      name: Tipo de sistema de homem ao mar
      description: Especifica a categoria principal de soluções para homem ao mar
        (MOB) oferecida pelo produto.
    mandolin_back_sides_wood:
      name: Madeira do fundo e dos lados do bandolim
      description: Especifica as espécies de madeira utilizadas no fundo e nas laterais
        do bandolim.
    mandolin_body_top_wood:
      name: Madeira do tampo do corpo do bandolim
      description: Madeira/material principal utilizado na placa de ressonância (tampa)
        do bandolim.
    mandolin_bridge_type:
      name: Tipo de ponte do bandolim
      description: Especifica o tipo de ponte utilizada no bandolim.
    mandolin_pickup_configuration:
      name: Configuração do captador do bandolim
      description: Indica se o bandolim possui componentes eletrónicos e que tipo
        de sistema de captadores está instalado.
    mandolin_string_configuration:
      name: Configuração das cordas do bandolim
      description: Especifica a configuração das cordas do bandolim em termos de número
        total de cordas e número de pares (por exemplo, 8 cordas/4 pares).
    mangosteen_variety:
      name: Variedade de mangostão
      description: Identifica a espécie ou cultivar específica do mangostão ou de
        frutos de Garcinia a ele intimamente relacionados que estão a ser vendidos.
    mannequin_style:
      name: Estilo do manequim
      description: Descreve o projeto estrutural ou o estilo de construção do manequim
        de treino.
    manufacturing_process:
      name: Processo de fabrico
      description: Método de produção primária do corpo do carreto ou da bobina (por
        exemplo, maquinado por CNC, fundido sob pressão).
    map_coverage_sky_planet_body:
      name: Cobertura do mapa (céu/corpo celeste)
      description: 'Indica o que o mapa representa: o céu noturno (constelações) ou
        um corpo celeste específico.'
    map_format:
      name: Formato do mapa
      description: Define a apresentação física ou digital de mapas e guias de caça.
    map_sensor_output_signal_type:
      name: Tipo de sinal de saída do sensor MAP
      description: Especifica o tipo de sinal de saída que o sensor MAP transmite
        à unidade de controlo do motor (ECU).
    map_size_sheet:
      name: Tamanho do mapa (folha)
      description: Especifica o tamanho final da folha de mapa/cartaz/planisfero para
        facilitar a exposição e garantir a compatibilidade (tamanho da moldura, espaço
        na parede).
    marabou_feather_form:
      name: Forma de pena de marabu
      description: O formato do produto de penas de marabu tal como é vendido.
    marabou_feather_treatment:
      name: Tratamento da pena de marabu
      description: Como a pena de marabu foi processada ou acabada para ser utilizada
        em trabalhos manuais.
    marble_track_set_feature_modules:
      name: Conjunto de pistas de mármore com módulos
      description: Destaca os módulos funcionais especiais incluídos no conjunto (por
        exemplo, elevador, lançador, interruptores).
    marine_flare_certification_standard:
      name: Certificação/norma para foguetes de sinalização marítimos
      description: Indica quais as certificações ou normas de segurança marítima que
        o sinalizador de emergência alega cumprir.
    marine_safety_standard_compliance:
      name: Conformidade com as normas de segurança marítima
      description: Indica quais as normas ou certificações oficiais de segurança aquática
        que o acessório cumpre.
    marine_transmission_type:
      name: Tipo de transmissão marítima
      description: Especifica o tipo de transmissão marítima associada ao motor interior
        (por exemplo, transmissão direta ou transmissão em V).
    marker_action_type:
      name: Tipo de ação do marcador
      description: Descreve o mecanismo fundamental de disparo/funcionamento do marcador.
    marker_caliber:
      name: Calibre do marcador
      description: Especifica o diâmetro das bolas de tinta para as quais o marcador
        foi concebido.
    marking_durability:
      name: Durabilidade da marcação
      description: Indica durante quanto tempo se prevê que a linha pintada permaneça
        visível em condições normais, por exemplo, temporária (até 3 semanas), semipermanente
        (até 6 meses) ou permanente (mais de 6 meses).
    marking_tip_type:
      name: Tipo de ponta de marcação
      description: Tipo de marcação que o compasso utiliza para desenhar (por exemplo,
        porta-minas, tinta ou ponta de traçar).
    marshmallow_processing_method:
      name: Método de processamento de marshmallows
      description: Descreve qualquer processo especial aplicado aos marshmallows que
        afete a textura, o prazo de validade ou o sabor.
    marshmallow_size:
      name: Tamanho do marshmallow
      description: Classifica o tamanho relativo de cada pedaço de marshmallow.
    martial_arts_belt_rank:
      name: Cinturão de artes marciais
      description: Indica o nível de habilidade ou grau representado pela cor do cinturão
        ou pela combinação especial de cores.
    mask_bib_type:
      name: Tipo de babete na máscara
      description: Especifica o tipo de babete de uma máscara de esgrima, como tecido
        padrão, condutor, removível ou sem protetor.
    mask_cage_material:
      name: Material da estrutura da máscara
      description: Material utilizado especificamente para a estrutura da máscara
        ou da proteção facial.
    mask_goggle_design:
      name: Design da máscara ou dos óculos
      description: Define o desenho estrutural geral ou o estilo de cobertura do equipamento
        de proteção.
    mask_skirt_material:
      name: Material da saia da máscara
      description: Identifica o material da saia flexível que proporciona a vedação
        estanque entre a máscara e o rosto.
    mask_strap_material:
      name: Material da tira da máscara
      description: Especifica o material da tira que fixa a máscara à cabeça.
    mass_air_flow_sensor_measurement_type:
      name: Tipo de medição do sensor de fluxo de massa de ar
      description: Especifica a tecnologia de deteção/tipo de saída utilizada pelo
        sensor MAF.
    mass_air_flow_sensor_mounting_type:
      name: Tipo de montagem do sensor de fluxo de massa de ar
      description: A forma como o sensor MAF ou o conjunto do sensor é montado/instalado
        no sistema de admissão.
    massage_feature:
      name: Função de massagem
      description: Indica se a base ajustável inclui uma função de massagem integrada
        e, se incluir, quantas zonas de massagem oferece.
    mast_attachment_interface:
      name: Interface de fixação do mastro
      description: Especifica o padrão de ligação entre a fuselagem e o mastro, ajudando
        o comprador a garantir a compatibilidade dos componentes.
    mast_base_type:
      name: Tipo de base do mastro
      description: Identifica a interface de montagem que liga o mastro à placa ou
        ao adaptador.
    mast_bend_curve:
      name: Curva de flexão do mastro
      description: O padrão de flexibilidade do mastro que determina a compatibilidade
        das velas e a manobrabilidade.
    mast_diameter_type:
      name: Tipo de diâmetro do mastro
      description: Classificação padronizada do diâmetro do mastro de windsurf (por
        exemplo, RDM, SDM, MDM) utilizada para verificações de compatibilidade.
    mat_backing_type:
      name: Tipo de revestimento do tapete
      description: Especifica o tipo de revestimento na parte inferior do tapete que
        ajuda a mantê-lo no lugar em várias superfícies.
    mat_installation_method:
      name: Método de instalação do tapete
      description: Indica a forma como o tapete é instalado ou fixado no lugar.
    mat_style:
      name: Estilo do tapete
      description: Define o estilo estrutural ou o formato do tapete (por exemplo,
        tapete dobrável, ladrilhos interligáveis, colchão de proteção).
    maternity_panel_type:
      name: Tipo de painel de maternidade
      description: Indica o tipo de painel elástico ou cintura concebido para acompanhar
        o crescimento durante a gravidez.
    maternity_waistband_style:
      name: Estilo de cintura para grávidas
      description: Indica o design e a localização da cintura ou do painel abdominal
        específico das calças de maternidade, descrevendo a forma como a peça apoia
        a barriga em crescimento.
    mattress_top_type:
      name: Tipo de superfície do colchão
      description: Especifica o estilo da camada superior do colchão ou a estrutura
        da superfície, como pillow top ou tight top.
    maturation_vessel_material:
      name: Material do recipiente de maturação
      description: Especifica o material principal do recipiente ou barril utilizado
        para o envelhecimento do shochu.
    maximum_quilt_size_supported:
      name: Tamanho máximo de colcha suportado
      description: O tamanho máximo da colcha ou do projeto que a estrutura pode acomodar
        (geralmente indicado pelos tamanhos de cama ou pela largura máxima).
    meal_course:
      name: Refeição
      description: Identifica a ocasião típica de consumo do produto.
    meal_preparation_state:
      name: Estado da preparação da refeição
      description: Indica o grau de preparação necessário antes do consumo (por exemplo,
        pronto a comer, kit de refeição).
    meat_processing_state:
      name: Estado de processamento da carne
      description: Indica o grau de cozedura ou cura aplicado ao produto à base de
        carne antes da venda.
    meat_quality_grade:
      name: Grau de qualidade da carne
      description: Indica o grau de qualidade ou a classificação atribuída à carne
        por uma entidade de classificação reconhecida (por exemplo, USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Declaração relativa à criação de gado
      description: Destaca as alegações comuns relativas ao bem-estar animal ou às
        práticas agrícolas associadas à carne (por exemplo, alimentado com pastagem,
        criado ao ar livre).
    mechanical_loom_assembly_status:
      name: Estado da montagem do tear mecânico
      description: A forma como o tear é enviado ou entregue, tendo em conta a montagem
        necessária.
    mechanical_loom_weaving_type:
      name: Tipo de tecelagem em tear mecânico
      description: Mecanismo/tipo de tecelagem principal suportado pelo tear.
    mechanical_puzzle_primary_mechanism:
      name: Mecanismo principal do puzzle mecânico
      description: Interação/mecanismo principal utilizado para resolver o puzzle
        mecânico.
    mechanical_puzzle_solution_format:
      name: Formato da solução de um puzzle mecânico
      description: Formato em que as dicas/soluções são apresentadas, quando incluídas.
    medal_attachment_style:
      name: Estilo de fixação da medalha
      description: Especifica como a medalha deve ser usada ou exposta (por exemplo,
        com fita para o pescoço, com alfinete).
    medal_award_level:
      name: Nível de prémio da medalha
      description: Especifica o nível de prémio representado pela medalha (por exemplo,
        1º lugar, participante).
    medal_finish:
      name: Acabamento da medalha
      description: Especifica o acabamento da superfície da medalha (brilho/textura
        visual), independentemente do material.
    medal_packaging:
      name: Embalagem da medalha
      description: Indica o tipo de embalagem de apresentação incluída com a medalha.
    melodica_accessory_set_included:
      name: Conjunto de acessórios para melódica incluído
      description: Que acessórios comuns estão incluídos no pacote da melódica?
    melodica_air_chamber_material:
      name: Material da câmara de ar da melódica
      description: O material da câmara de ar/corpo da melódica (acrilonitrilo butadieno
        estireno, madeira, etc.) é utilizado pelos vendedores para o distinguir de
        outras partes.
    melodica_included_accessories:
      name: Acessórios incluídos com a melódica
      description: Acessórios incluídos na embalagem da melódica.
    melodica_key_color_scheme:
      name: esquema de cores das teclas da melódica
      description: esquema de cores das teclas (não do corpo do texto), o que afeta
        a legibilidade (especialmente para crianças/principiantes).
    melodica_mouthpiece_configuration:
      name: Configuração do bocal da melódica
      description: Indica quais as interfaces de sopro que estão incluídas/utilizadas
        para tocar a melódica.
    melodica_mouthpiece_type:
      name: tipo de bocal de melódica
      description: Interface de sopro incluída com a melódica (bocal e/ou tubo flexível).
    melodica_reed_plate_material:
      name: Material da placa de palhetas da melódica
      description: O material da placa de palhetas (diferente do material do corpo
        do instrumento em geral) pode afetar a durabilidade e o timbre.
    melodica_size_class:
      name: classe de tamanho Melodica
      description: Classificação geral de tamanho/portabilidade para uma melódica,
        normalmente baseada no número de teclas agrupadas e no formato (por exemplo,
        modelos Shop Mini/estudantis versus modelos standard versus modelos de alcance
        alargado).
    melon_variety:
      name: Variedade de melão
      description: Especifica o tipo específico de melão no produto para ajudar o
        comprador a identificar rapidamente a variedade da sua preferência.
    memory_foam_infusion_material:
      name: Material de infusão de espuma viscoelástica
      description: Identifica substâncias especiais incorporadas na espuma viscoelástica
        para fins de arrefecimento, controlo de odores ou ação antimicrobiana.
    memory_wire_gauge:
      name: Calibre do fio de memória
      description: Especifica o tamanho do fio de memória em American Wire Gauge (AWG).
    memory_wire_project_size:
      name: tamanho do projeto com fio de memória
      description: Especifica o formato/tamanho da bobina da joia para a qual o fio
        de memória foi moldado (por exemplo, pulseira, colar, anel).
    metal_purity:
      name: Pureza do metal
      description: Indica a finura ou o grau de pureza do metal utilizado na jóia,
        normalmente expresso em quilates (K) ou partes por mil.
    metrics_counted:
      name: Métrica contada
      description: Lista as estatísticas ou Events individual que o contador foi concebido
        para acompanhar.
    metronome_display_style:
      name: Estilo de exibição do metrónomo
      description: Especifica a forma como o andamento é apresentado/indicado ao utilizador
        (agulha/pêndulo vs. LED/LCD numérico vs. luz intermitente).
    metronome_output_method:
      name: Método de saída do metrónomo
      description: Especifica os métodos de saída disponíveis para o sinal de som/batida
        do metrónomo.
    microphone_toy_feature_set:
      name: Conjunto de brinquedos com microfone
      description: Funcionalidade essencial para microfones de brinquedo focada na
        brincadeira (efeitos de voz, amplificação, gravação, etc.).
    midi_output_type:
      name: tipo de saída MIDI
      description: Especifica o(s) tipo(s) de saída MIDI fornecidos pelos Modules
        de disparo.
    military_branch:
      name: filial militar
      description: Identifica o ramo militar para o qual o uniforme foi emitido ou
        que o inspirou.
    milk_base_type:
      name: Tipo de base láctea
      description: Especifica o leite ou a alternativa láctea principal utilizada
        na bebida, caso exista.
    milk_feeding_method:
      name: Método de alimentação do animal produtor de leite
      description: Indica como os animais de origem foram alimentados (por exemplo,
        alimentados com pasto ou com grãos), o que pode Influence o sabor e o perfil
        nutricional.
    milk_processing_method:
      name: Método de processamento do leite
      description: Especifica o tratamento ou técnica de processamento a que o leite
        foi submetido, o que afeta a segurança, a vida útil da prateleira e as propriedades
        nutricionais.
    milk_source_animal:
      name: Animal produtor do leite
      description: Identifica o animal de onde foi obtido o leite, ajudando os consumidores
        a escolher produtos lácteos de vaca, cabra, búfala ou de outra origem animal.
    millet_processing_method:
      name: Método de processamento do milho-miúdo
      description: Indica o método de processamento primário ou o estado do grão de
        milheto (por exemplo, não polido, descascado, germinado).
    millet_variety:
      name: Variedade de painço
      description: 'Identifica o tipo específico de grão de milho-miúdo contido no
        produto (ex.: pérola, rabo-de-raposa, dedo).'
    milling_process:
      name: Processo de moagem
      description: Indica o método de produção utilizado para moer a farinha, o que
        pode Influence o sabor, a exposição ao calor e o perfil nutricional.
    mint_mark:
      name: Marca da casa da moeda
      description: Marca da casa da moeda tal como consta na moeda (se aplicável).
    mirror_configuration:
      name: Configuração do espelho
      description: Especifica o estilo ou a estrutura do espelho incluído no conjunto
        de toucador.
    mirror_coverage:
      name: Cobertura espelhada
      description: Descreve a extensão dos painéis espelhados nas portas de correr.
    mirror_curvature_type:
      name: tipo de curvatura espelhada
      description: Especifica se a superfície do espelho é convexa, plana ou côncava,
        Impact o campo de visão.
    mirror_mounting_location:
      name: Local de montagem do espelho
      description: Especifica onde o espelho deve ser montado na bicicleta ou no ciclista.
    mirror_shape:
      name: Forma de espelho
      description: Indica a forma geométrica ou o estilo do espelho principal incluído
        no conjunto de toucador.
    mix_ratio:
      name: Proporção da mistura
      description: Especifica a proporção recomendada de diluição de líquido refrigerante
        para água (para concentrados) ou confirma a proporção fixa de pré-mistura
        para produtos pré-diluídos.
    mma_glove_type:
      name: Tipo de luva de MMA
      description: Indica o uso principal ou o estilo pretendido da luva no treino
        ou competição de MMA.
    mobility_features:
      name: Recursos de mobilidade
      description: Indica elementos de movimento ou portabilidade integrados, como
        rodízios ou pernas rebatíveis.
    model_aircraft_assembly_level:
      name: Nível de montagem de aeromodelos
      description: Indica a quantidade de construção necessária antes de a aeronave
        poder ser utilizada.
    model_making_kit_items_included:
      name: Itens incluídos no kit de modelismo
      description: 'Lista o que está incluído num kit ou pacote para modelismo (ex.:
        tinta, cola, pincel).'
    model_making_product_type:
      name: tipo de produto para modelação
      description: Identifica a natureza fundamental do artigo no âmbito da construção
        de modelos (kit, acessório, ferramenta ou material) para melhorar a navegação
        e a filtragem entre os diferentes tipos de produtos na secção de Construção
        de Modelos.
    model_rocket_kit_contents:
      name: Conteúdo do kit de modelo de foguete
      description: Indica se o produto é um kit completo de foguete modelo multiestágio
        ou um kit suplementos/Modules/peças (por exemplo, componentes do estágio de
        reforço ou de sustentação).
    model_rocket_kit_format:
      name: Formato do kit de foguete modelo
      description: Especifica se o foguete é vendido como kit e o nível de prontidão
        para a montagem.
    model_rocket_motor_impulse_class:
      name: Motor de foguete modelo classe Impulse
      description: 'Indica a classe Impulse total normalizada do motor de foguete
        modelo (ex.: A, B, C...).'
    model_rocket_motor_mount_size:
      name: tamanho do suporte do motor de foguete modelo
      description: Especifica o diâmetro da carcaça do motor que o suporte do motor
        do foguete foi concebido para aceitar.
    model_rocket_power_source_required:
      name: É necessária uma fonte de energia para os foguetões de modelismo.
      description: Indica se o produto requer baterias/alimentação externa e qual
        o tipo.
    model_rocket_propellant_type:
      name: tipo de propelente para foguetes modelo
      description: Identifica o sistema de propelente/motor utilizado para a propulsão
        em foguetões de modelismo.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Dimensões recomendadas para a haste ou trilho de lançamento de foguetes
        modelo
      description: Especifica o diâmetro da haste Launch ou o tamanho do carril para
        o qual o foguetão foi concebido (por exemplo, haste de 1/8 de polegada, carril
        Launch 1010).
    model_rocket_recovery_method:
      name: método de recuperação de foguete modelo
      description: Sistema de recuperação principal utilizado para fazer regressar
        o foguete em segurança após o voo.
    model_rocket_recovery_system_type:
      name: tipo de sistema de recuperação de foguetes modelo
      description: Especifica o método de recuperação principal utilizado para devolver
        o foguete em segurança após o voo.
    model_rocket_staging:
      name: estágios de foguete modelo
      description: Indica quantos estágios motorizados o modelo de foguete foi concebido
        para ter.
    model_train_accessory_electrical_connection_type:
      name: Tipo de ligação elétrica para acessórios de comboios em miniatura
      description: Especifica o tipo de conector ou terminal utilizado para ligar
        acessórios elétricos de comboios em miniatura a um esquema (quando aplicável).
    model_train_coupler_type:
      name: Tipo de engate para comboios em miniatura
      description: Especifica o padrão de engate instalado nos vagões ou na locomotiva
        do comboio em miniatura.
    model_train_gauge:
      name: Bitola do modelo de comboio
      description: Especifica o sistema de bitola da ferrovia em miniatura a que o
        acessório se destina (quando aplicável), ajudando a garantir a compatibilidade
        física com o traçado e o esquema do utilizador.
    model_train_lighting_features:
      name: Características de iluminação do modelo de comboio
      description: Especifica a funcionalidade de iluminação incluída no modelo de
        comboio/locomotiva.
    model_train_power_pickup_method:
      name: Método de captura de energia para comboios em miniatura
      description: Especifica a forma como o modelo recebe energia para funcionar
        (energia elétrica, bateria, etc.).
    model_train_scale:
      name: Escala do modelo de comboio
      description: Especifica a escala ou o tamanho padrão do modelo de comboio (relação
        entre o modelo e o comboio real).
    model_train_sound_features:
      name: recursos sonoros de comboios em miniatura
      description: Indica se o modelo inclui efeitos sonoros de inclusão e qual o
        tipo de oferta sonora disponível.
    model_train_track_gauge:
      name: Bitola das vias de comboios em miniatura
      description: Especifica o padrão do sistema de bitola/rastreio para o qual o
        modelo foi concebido (por exemplo, bitola padrão, variante de bitola estreita
        ou bitolas específicas da marca/sistema, quando aplicável).
    modeling_dough_base_material:
      name: Massa de modelar como base
      description: 'Base/composição principal da massa de modelação (ex.: à base de
        trigo/farinha versus à base de polímeros).'
    modeling_dough_features:
      name: Características da massa de modelar
      description: Principais características funcionais da massa de modelar que o
        comprador geralmente filtra.
    modification_level:
      name: Nível de modificação
      description: Indica o grau de modificação do malte (quão completamente o endosperma/proteínas
        da cevada são decompostos), frequentemente resumido como submodificado/modificado/sobremodificado.
    molasses_base_ingredient:
      name: Ingrediente base de melaço
      description: Identifica a principal planta ou fruto de onde é produzido o melaço.
    molasses_grade:
      name: Grau de melaço
      description: Classifica o melaço de acordo com a fase de extração/refinação,
        o que afeta diretamente a intensidade do sabor, a cor e o perfil nutricional.
    mold_material:
      name: Material do molde
      description: 'Composição do material principal do próprio molde (ex.: silicone,
        plástico, metal).'
    molle_compatibility:
      name: Compatibilidade com MOLLE
      description: Indica se o colete possui um sistema MOLLE/PALS para fixação de
        bolsas e acessórios Modular .
    motor_belt_type:
      name: tipo de correia do motor
      description: Define o desenho/perfil da correia utilizada no sistema de acionamento
        da passadeira.
    motor_configuration:
      name: Configuração do motor
      description: Indica quantos motores de acionamento independentes a scooter utiliza.
    motor_mounting_configuration:
      name: Configuração de montagem do motor
      description: Descreve como o motor é montado/implementado no kit de conversão
        para scooters.
    motor_mounting_position:
      name: Posição de montagem do motor
      description: Indica em que parte da scooter elétrica está montado o motor, como
        por exemplo no cubo da roda dianteira, no cubo da roda traseira, no cubo de
        roda dupla ou no motor central (MID-drive).
    motor_position:
      name: Posição do motor
      description: Indica a localização do motor na bicicleta elétrica, que influencia
        o manuseamento e a manutenção.
    motor_vehicle_a_v_integration_features:
      name: Recursos de integração de áudio e vídeo em veículos automóveis
      description: 'Funcionalidades de integração com smartphones e sistemas veiculares
        suportadas pela unidade principal (ex.: Apple CarPlay, Android Auto, MirrorLink).'
    motor_vehicle_bulb_application_position:
      name: aplicação/posição da lâmpada do veículo motorizado
      description: Especifica a posição de iluminação pretendida do veículo ou funções
        para as quais a lâmpada foi concebida (por exemplo, luzes de cruzamento, luz
        de travagem).
    motor_vehicle_bulb_approval_standard:
      name: Norma de aprovação de lâmpadas para veículos automóveis
      description: Indica a marcação de conformidade/aprovação regulamentar para utilização
        na via pública no mercado-alvo.
    motor_vehicle_oxygen_sensor_bank:
      name: Banco do sensor de oxigénio do veículo motorizado
      description: 'Indica em que bancada de cilindros do motor está instalado o sensor
        de oxigénio (ex.: Bancada 1 ou Bancada 2) para motores em V/boxer; não aplicável
        para motores em linha.'
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: número de fios do sensor de oxigénio do veículo motorizado
      description: Número de fios no chicote do sensor de oxigénio.
    motor_vehicle_oxygen_sensor_position:
      name: posição do sensor de oxigénio do veículo motorizado
      description: Especifica onde o sensor de oxigénio (O2) está instalado no sistema
        de escape em relação ao catalisador.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: número do sensor de oxigénio do veículo motorizado
      description: Indica o número do sensor (por exemplo, Sensor 1 ou Sensor 2) dentro
        de uma determinada designação de banco/posição.
    motor_vehicle_oxygen_sensor_type:
      name: Tipo de sensor de oxigénio do veículo motorizado
      description: Especifica o design/tecnologia do sensor de oxigénio.
    motor_vehicle_paint_application_method:
      name: Método de aplicação de tinta para veículos motorizados
      description: Modo de aplicação da tinta na superfície do veículo.
    motor_vehicle_paint_system_step:
      name: Sistema de pintura de veículos automóveis - etapa
      description: Indica a etapa ou componente de um sistema de pintura automóvel
        a que o produto se destina (por exemplo, primário, tinta base, verniz).
    motor_vehicle_speaker_mounting_type:
      name: tipo de montagem de altifalante para veículos automóveis
      description: Descrição de como o altifalante deve ser instalado no veículo (formato
        de montagem).
    motor_vehicle_subwoofer_size:
      name: Tamanho do subwoofer do veículo motorizado
      description: 'Diâmetro nominal do driver do subwoofer (ex.: 8 pol., 10 pol.,
        12 pol.), utilizado para adequar o espaço do veículo e a compatibilidade com
        a coluna de som.'
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Configuração da bobina de voz do subwoofer de veículo automóvel
      description: A quantidade/configuração da bobina de voz é utilizada para adequar
        as opções de cablagem do amplificador (por exemplo, SVC vs DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedância da bobina de voz do subwoofer de um veículo automóvel (por
        bobina)
      description: Classificação de impedância de cada bobina de voz (não da cablagem
        final), utilizada para cálculos de cablagem.
    motor_vehicle_voltage_regulator_type:
      name: tipo regulador de tensão para veículos motorizados
      description: Indica a tecnologia/formato do regulador utilizado nos veículos
        motorizados.
    motorcycle_armor_certification_standard:
      name: Norma de certificação de proteções para motociclistas
      description: Indica a(s) norma(s) formal(ais) de segurança que o protetor está
        certificado a cumprir (por exemplo, EN 1621-2 para protetores de costas, EN
        1621-3 para protetores de tórax).
    motorcycle_cover_size_class:
      name: classe de tamanho de capa para motociclo
      description: Balde de tamanho normalizado para capas de armazenamento de motociclos,
        baseado na categoria/gama de comprimento típica da moto a que se destina.
    motorcycle_glove_certification_standard:
      name: norma de certificação de luvas para motociclistas
      description: Especifica a certificação/norma de proteção que as luvas cumprem
        (por exemplo, níveis da norma EN 13594).
    motorcycle_glove_waterproof_construction:
      name: construção impermeável para luvas de motociclismo
      description: Especifica o tipo de método de impermeabilização utilizado na luva
        (se existir).
    motorcycle_guard_coverage_area:
      name: área de cobertura do guarda de motociclos
      description: Área de cobertura principal oferecida pelo produto (cotovelo, pulso,
        antebraço, combinação).
    motorcycle_kidney_belt_construction_type:
      name: tipo de construção do cinto de proteção renal para motociclo
      description: O estilo de construção da cinta lombar influencia a rigidez, a
        ventilação e a proteção.
    motorcycle_kidney_belt_purpose:
      name: Finalidade do cinto de proteção lombar para motociclistas
      description: Identifica o estilo de condução principal ou o cenário para o qual
        o cinto de proteção lombar para motociclistas foi concebido.
    motorcycle_luggage_capacity_class:
      name: classe de capacidade de bagagem do motociclo
      description: Indica a capacidade volumétrica da bagagem do motociclo, expressa
        em litros.
    motorcycle_luggage_mounting_system:
      name: Sistema de montagem de bagagem para motociclos
      description: 'Sistema de fixação/montagem utilizado para fixar a bolsa/alforje
        à moto (ex.: correias de fixação, sistema de aperto rápido com montagem em
        suporte).'
    motorcycle_luggage_side:
      name: lateral da bagagem da moto
      description: Para alforges/bolsas laterais, indique se o item é para o lado
        esquerdo, lado direito ou um par/conjunto.
    motorcycle_protective_gear_size_system:
      name: Sistema de tamanho de equipamento de proteção para motociclos
      description: 'Indica o sistema de numeração utilizado no produto (ex.: numeração
        alfabética, numérica, tamanho único).'
    motorcycle_rack_carrier_style:
      name: Moto estante transportadora estilo
      description: Descreve o estilo funcional de transportadora para o transporte
        de uma moto ou scooter (plataforma vs. carril vs. elevador, etc.).
    motorcycle_riding_discipline:
      name: disciplina de condução de motociclos
      description: Identifica a principal disciplina de condução/utilização para a
        qual o colar cervical foi concebido.
    motorcycle_tire_speed_rating:
      name: classificação de velocidade dos pneus de motociclos
      description: Identifica a velocidade máxima sustentada para a qual o pneu foi
        concebido, utilizando o código de letras padrão (por exemplo, H, V, W).
    motorsport_window_net_certification:
      name: Certificação de redes de proteção para janelas em automobilismo
      description: Certificação ou homologação de segurança para competição que a
        rede da janela serve (por exemplo, SFI ou FIA), incluindo o número da especificação,
        quando aplicável.
    mound_usage_type:
      name: Tipo de utilização do monte
      description: Identifica o ambiente de aplicação pretendido para o montículo,
        como por exemplo Treino, Jogo, Bullpen ou Multiusos.
    mount_attachment_method:
      name: Método de fixação do suporte
      description: Especifica a forma como o suporte se fixa à superfície/estrutura
        do veículo.
    mountainboard_truck_type:
      name: tipo de camião Mountainboard
      description: Classifica o estilo dos eixos incluídos com o skate, afetando a
        resposta em curva e a durabilidade.
    mounting_attachment_method:
      name: Método de montagem/fixação
      description: Como o suporte/bolsa foi concebido para ser fixado a um tambor,
        pedestal, cinto ou outra superfície.
    mounting_attachment_type:
      name: Tipo de montagem/fixação
      description: Como o acessório de relação se liga ou interage com a roda de fiar.
    mounting_hardware_included_for_installation:
      name: Equipamento de montagem incluído (para instalação)
      description: Indica se o equipamento de montagem necessário para instalar o
        banco traseiro (por exemplo, suportes, parafusos, calhas) está incluído com
        o produto.
    mounting_location:
      name: Localização de montagem
      description: 'Especifica a área de ponto de apresentação pretendida no equipamento
        ou corpo para a luz/refletor (ex.: forqueta dianteira, capacete, raios da
        roda).'
    mounting_method:
      name: Método de montagem
      description: A forma como um suporte para bastão/pincel é montado ou fixado
        (por exemplo, com um grampo, uma tira ou um adesivo).
    mounting_position:
      name: Posição de montagem
      description: Especifica o local onde o comando do travão de mão deve ser montado/instalado
        no habitáculo do veículo.
    mounting_rail_type:
      name: Tipo de calha de montagem
      description: Especifica o padrão de calha ou interface ao qual o acessório se
        liga, como o Picatinny ou o M-LOK.
    mounting_receiver_size:
      name: tamanho do receptor de montagem
      description: Tamanho do engate de reboque necessário para o suporte de carga
        montado no engate.
    mounting_storage_type:
      name: Tipo de montagem/armazenamento
      description: Como o dispositivo deve ser montado ou condicionado na embarcação/pessoa.
    mouth_grip_type:
      name: Tipo de encaixe bucal
      description: Descreve o tipo de apoio bucal ou protetor presente no apito, visando
        o conforto e a higiene.
    mouthguard_mold_type:
      name: tipo de molde de protetor bucal
      description: Descreve como o protetor bucal é ajustado aos dentes do atleta
        (por exemplo, moldagem por fervura e mordida, ajuste dentário personalizado).
    mouthpiece_facing_length:
      name: comprimento de abertura do bocal
      description: Indica a categoria de comprimento da curva de inclinação (lay)
        do bocal (e não o comprimento total do bocal), o que afeta a resposta, a resistência
        e a compatibilidade da palheta.
    mouthpiece_material:
      name: Material do bocal
      description: Especifica o material da parte do bocal/ponta que entra em contacto
        com a boca de um soprador (soprador de partido), que pode ser diferente do
        material do corpo principal.
    mouthpiece_shank_receiver_size:
      name: tamanho da haste/receptor do bocal
      description: Especifica o padrão de encaixe/haste do bocal compatível com o
        fliscorne.
    mouthpiece_shank_size:
      name: tamanho da haste do bocal
      description: Especifica o padrão de encaixe da haste/recetor do bocal para garantir
        a compatibilidade com o instrumento de sopro de metal pretendido.
    mouthpiece_shank_type:
      name: Tipo de haste do bocal
      description: Especifica o padrão de encaixe/haste do bocal para compatibilidade
        (quando aplicável).
    mouthpiece_style:
      name: Estilo de bocal
      description: Classifica o design/forma da parte da embocadura do freio, que
        influencia os pontos de pressão, a severidade e as preferências do cavalo.
    mouthpiece_type:
      name: Tipo de bocal
      description: Tipo de bocal na extremidade de sopro (embutido, amovível ou suplementar).
    movement_mechanism:
      name: Mecanismo de movimento
      description: Define a forma como o banco se move durante a utilização (balançando,
        deslizando, oscilando, etc.).
    muffin_size:
      name: Muffins
      description: Classifica o formato físico do muffin de acordo Shop Mini, standard,
        jumbo).
    mushroom_variety:
      name: Variedade de cogumelos
      description: 'Identifica a espécie ou variedade específica de cogumelo ou trufa
        contida no produto (ex.: Shiitake, Cogumelo Ostra, Trufa Preta).'
    music_stand_desk_tilt_adjustment:
      name: ajuste da inclinação da mesa do suporte de partituras
      description: Indica se e como o ângulo da mesa pode ser ajustado.
    music_stand_intended_use:
      name: Utilização prevista do suporte de partitura
      description: Indica as principais Definições/utilização-caixa interior pretendidas
        para o stand.
    musical_block_pitch_type:
      name: tipo de altura de bloco musical
      description: Descreve se o bloco musical produz um tom definido (afinado) ou
        um tom indefinido.
    musical_box_mechanism_type:
      name: tipo de mecanismo de caixa de música
      description: 'Como a caixa de música produz/reproduz som (ex.: mecanismo de
        corda versus reprodução eletrónica).'
    musical_keyboard_case_fit_type:
      name: Teclado musical caixa interior tipo fit
      description: Descreve como a caixa interior é dimensionada para o instrumento
        (por exemplo, gama de tamanhos universal/genérica versus ajuste específico
        para o modelo/personalizado).
    musical_ratchet_sound_character:
      name: som de roquete musical característico
      description: Descrição geral das características de timbre/volume do som da
        catraca.
    musical_scraper_groove_surface_material:
      name: Material da superfície da ranhura do raspador musical
      description: Especifica o material da superfície raspadora com ranhuras/ranhuras
        (pode ser diferente do material do corpo).
    musical_scraper_type:
      name: tipo raspador musical
      description: 'Especifica o estilo/design do instrumento musical raspador (ex.:
        guiro vs. reco-reco), o que afeta o som e a técnica de execução.'
    mute_attachment_method:
      name: Método de fixação do silenciador
      description: Especifica a forma como um abafador de pratos é fixado ou mantido
        no lugar no prato (por exemplo, gel, aderência estática, íman, clipe).
    mute_attenuation_level:
      name: Nível de atenuação do som silenciado
      description: Indica o quanto o silenciador reduz o volume percebido, sendo especialmente
        relevante para os silenciadores de treino.
    mute_cork_padding_material:
      name: Material de cortiça/enchimento mudo
      description: Especifica o material do enchimento de contacto da surdina (por
        exemplo, tira/almofadas de cortiça) utilizado para a aderência/encaixe e proteção
        da campânula.
    mute_coverage_type:
      name: Tipo de cobertura do silenciador
      description: Indica o estilo/cobertura da surdina na superfície de execução,
        desde pequenos abafadores pontuais até surdinas de prática que cobrem toda
        a superfície.
    mute_finish:
      name: Acabamento silencioso
      description: O acabamento da superfície do surdina pode afetar a durabilidade
        e a estética (por exemplo, polido versus acetinado).
    name_label_text_template:
      name: Nome Label texto modelo
      description: Especifica o texto predefinido ou o modelo impresso na Label de
        identificação (por exemplo, 'Pertence a', 'Fabricado por').
    napkin_ply:
      name: Camada de guardanapo
      description: Indica a espessura do guardanapo de cocktail pelo número de camadas
        (folhas).
    neck_brace_fit_system:
      name: sistema de ajuste do protetor cervical
      description: Indica o método principal utilizado para ajustar e fixar o protetor
        de pescoço ao motociclista.
    neck_brace_size_basis:
      name: colar cervical tamanho base
      description: Indica a base de critérios utilizada para escolher o tamanho correto
        do protetor cervical.
    neck_configuration:
      name: Configuração do pescoço
      description: Especifica o estilo/configuração do tudel Supply com o saxofone,
        o que afeta a ergonomia e a tocabilidade.
    neck_coverage_type:
      name: Tipo de cobertura do pescoço
      description: Especifica o estilo de proteção para o pescoço. Supply com a manta.
    neck_support_size_system:
      name: Sistema de assistência ao tamanho do pescoço
      description: 'Indica o sistema de tamanhos utilizado para o protetor/protetor
        de pescoço para corrida (ex.: adulto, juvenil ou tamanho único).'
    necklace_length_type:
      name: Tipo de comprimento do colar
      description: Especifica a categoria de comprimento convencional de colar, como
        gargantilha ou ópera, para auxiliar nas compras com base no estilo.
    needle_balance_zone:
      name: Zona de saldo de agulhas
      description: Indica a zona ou hemisfério de equilíbrio magnético para o qual
        a agulha da bússola está sintonizada, garantindo leituras precisas em todo
        o mundo.
    needle_case_format:
      name: Formato de caixa interna de agulha
      description: Formato geral do organizador da caixa interior da agulha.
    needle_damping_type:
      name: Tipo de amortecimento da agulha
      description: Descreve como a agulha da bússola é estabilizada (por exemplo,
        cheia de líquido, seca ou estabilizada eletronicamente), afetando o tempo
        de estabilização e a durabilidade.
    needle_felting_needle_profile:
      name: perfil da agulha de feltragem com agulha
      description: Secção transversal/perfil de uma agulha de feltragem que influencia
        a forma como as fibras são movimentadas e o acabamento produzido.
    needle_holder_features:
      name: Características do porta-agulhas
      description: Características funcionais notáveis do porta-agulhas.
    needle_holder_mounting_attachment_method:
      name: Método de montagem/fixação do porta-agulhas
      description: 'Como o porta-agulhas deve ser fixado ou utilizado durante o armazenamento
        (ex.: magnético, clipe, pega).'
    needle_holder_style:
      name: Estilo do porta-agulhas
      description: O estilo/design físico de arrumação ou transporte do porta-agulhas.
    needle_pushing_surface_type:
      name: tipo de superfície de empurrar agulha
      description: 'O tipo/design da superfície de pressão da agulha na palma da mão
        de costura (ex.: saliência metálica, forma de moeda ou reforço).'
    needle_requirement_beading_pattern:
      name: Requisitos da agulha (padrão de missangas)
      description: Tipo/tamanho de agulha recomendado pela receita.
    needle_size_system:
      name: sistema de agulha de elevação
      description: Padrão de dimensionamento utilizado para a Label de tamanho da
        agulha.
    needle_threader_compatible_needle_type:
      name: tipo de agulha compatível com passador de linha
      description: Especifica com que tipos de agulha o passador de linha foi concebido
        para funcionar (por categoria/utilização da agulha).
    needle_threader_mechanism_type:
      name: Tipo de mecanismo do enfiador de linha
      description: Descreve como o passador de linha captura/puxa thread através do
        orifício da agulha.
    needle_threader_packaging_type:
      name: tipo passador de linha na agulha
      description: Como o produto é vendido/embalado (single vs packs vs set).
    needlecraft_fabric_color_family:
      name: família de tecidos para bordado
      description: Família cor normalizada para tecido de trama uniforme (usada juntamente
        com cor para facetas).
    needlecraft_fabric_composition:
      name: composição de tecido para bordado
      description: 'Especifica a composição/mistura de fibras do tecido para bordado
        (ex.: 100% algodão, mistura de linho e algodão).'
    needlecraft_fabric_weave_type:
      name: tipo de trama do tecido para bordado
      description: Especifica a trama/construção do linho para bordado (por exemplo,
        trama uniforme versus linho tradicional), afetando o comportamento e a aparência
        dos pontos.
    needlecraft_kit_items_included:
      name: kit de bordado incluído
      description: Lista os principais componentes incluídos no kit de bordado (ferramentas
        e consumíveis).
    needlecraft_kit_project_type:
      name: tipo de projeto de kit de artesanato com agulha
      description: Identifica qual item final que o kit permite produzir (o resultado
        do projeto).
    needlecraft_stitching_coverage:
      name: cobertura de costura de artesanato
      description: Indica se o tecido é cosido sobre 1 threadpor quadrado ou sobre
        2 fios (comum em tecidos de trama uniforme e linho).
    needlepoint_canvas_mesh_count:
      name: contagem de malha da tela de bordado
      description: A malha/contagem de fios (número de fios por polegada) da tela
        para a qual o desenho foi elaborado (vulgarmente designada por contagem de
        fios da tela).
    needlepoint_frame_canvas_attachment_method:
      name: Método de fixação da tela na moldura de bordado
      description: Descreve como a tela de bordado é fixada à moldura de bordado.
    needlepoint_frame_compatible_stand_type:
      name: Suporte compatível com moldura de bordado
      description: Se a moldura for concebida para ser montada num suporte, especifique
        o(s) tipo(s) de suporte com os quais é compatível.
    needlepoint_frame_contents:
      name: Conteúdo da moldura de bordado
      description: 'Especifica quais os componentes e acessórios incluídos com a moldura
        de bordado (p. ex.: moldura, barras/hastes extra, tachas/pinos, tiras de fixação,
        bolsa de transporte).'
    needlepoint_frame_tension_adjustment_type:
      name: Tipo de ajuste da tensão da moldura para bordado
      description: Indica como (ou se) a tensão da moldura pode ser ajustada durante
        a utilização.
    needlepoint_pattern_chart_format:
      name: Formato do gráfico do padrão de bordado
      description: Como é representado o desenho do bordado para a realização do ponto
        (gráfico versus guia impresso/pintado).
    needlepoint_project_type:
      name: tipo de projeto de bordado
      description: O itemfinal pretendido/categoria a que se destina o desenho de
        bordado.
    net_design:
      name: Design de rede
      description: Identifica o estilo de construção da rede, indicando se pode ser
        recolhida ou dobrada para facilitar o transporte.
    net_mesh_pattern:
      name: Padrão de malha de rede
      description: Especifica a forma geométrica das aberturas da rede, que podem
        influenciar a visibilidade e a resistência.
    net_twine_gauge:
      name: bitola da corda da rede
      description: 'Indica a espessura ou resistência do fio da rede, tradicionalmente
        expressa por um número de calibre (ex.: 18, 36).'
    nicotine_source:
      name: Fonte de nicotina
      description: Indica se a nicotina do produto é derivada do tabaco, sintética
        ou se o produto não contém nicotina.
    nipple_drive_interface:
      name: Interface de acionamento do bico
      description: Identifica o estilo/padrão da interface de acionamento ou da cabeça
        do nipple (externa ou interna), determinando a ferramenta necessária e o método
        de montagem da roda.
    nock_activation_method:
      name: Método de ativação da nock
      description: Especifica o mecanismo pelo qual o LED da ponta de flecha iluminada
        é ligado ou desligado (por exemplo, pressão da corda do arco, sensor Motion
        , interruptor manual).
    nock_fitment_code:
      name: Código de encaixe da nock
      description: Código do fabricante ou da indústria que identifica a família/série
        da nock a que pertence.
    nock_throat_size:
      name: Garganta Nock tamanho
      description: Especifica o tamanho da ranhura (ranhura) que se ajusta à corda
        do arco.
    nock_transparency_level:
      name: Nível de transparência da ponta
      description: Descreve o grau de transparência do material da ponta da flecha
        — transparente, translúcido, opaco ou que brilha no escuro — afetando a visibilidade
        e a estética.
    nock_type:
      name: Tipo de nock
      description: Especifica o desenho da ranhura utilizada numa flecha ou virote,
        como um pino marcado, meia-lua ou iluminado.
    noise_reduction_type:
      name: Tipo de redução de ruído
      description: Especifica a tecnologia de redução de ruído utilizada (ou não utilizada)
        no auricular integrado do capacete, se aplicável.
    noise_suppression_technology:
      name: Tecnologia de supressão de ruído
      description: Especifica se o produto utiliza amortecimento passivo ou circuitos
        eletrónicos ativos que atenuam os sons altos e/ou amplificam o som ambiente.
    non_slip_base_features:
      name: Características da base antiderrapante
      description: Indica as características antiderrapantes incluídas para evitar
        que o pedal se mova durante a execução do exercício.
    nose_bridge_type:
      name: Tipo de ponte nasal
      description: Indica o design da ponte nasal, que afeta o ajuste em diferentes
        tamanhos de rosto.
    nose_clip_accessories_included:
      name: Acessórios para clipe nasal incluídos
      description: 'Lista quaisquer acessórios adicionais Supply com o clipe nasal
        para natação (ex.: tampões para os ouvidos, caixa de armazenamento interior).'
    nose_clip_features:
      name: Características do clipe nasal
      description: Destaca as características gerais de funcionalidade ou conforto
        do clipe nasal.
    nose_coverage_style:
      name: Tipo de cobertura do nariz
      description: Indica a presença e o tipo de painel de proteção nasal ou focinho
        na máscara anti-moscas.
    noseband_type:
      name: Tipo de açaime
      description: Especifica o desenho da focinheira (se existir). Supply com a cabeçada.
    number_of_canvas_meshes:
      name: Número de malhas de tela
      description: O tamanho da malha da tela plástica, expresso em orifícios por
        polegada (HPI) ou contagem, determina o tamanho do ponto e a informação do
        projeto.
    number_of_chainrings:
      name: Número de coroas
      description: Indica quantas coroas o pedaleiro foi concebido para suportar ou
        com quantas coroas é Supply .
    number_of_control_stations:
      name: Número de estações de controlo
      description: Indica o número de postos de comando/controlo suportados pelo conjunto
        de controlo (estação única vs. estação dupla, etc.).
    number_of_digits:
      name: Número de dígitos
      description: 'Quantos dígitos apresenta o contador (ex.: 1 dígito, 2 dígitos,
        3 dígitos).'
    number_of_guitar_slots:
      name: Número de vagas para guitarra
      description: Indica quantas guitarras a caixa interior/bag foi concebida para
        acomodar.
    number_of_needlecraft_fabrics:
      name: Número de tecidos para bordado
      description: 'Especifica a contagem de fios para tela/tecido de bordado, normalmente
        expressa em quadrados/fios por polegada (ex.: 14 fios por polegada).'
    number_of_plastic_canvas_meshes:
      name: Número de malhas de tela plástica
      description: Especifica a contagem de malha da tela plástica (orifícios por
        polegada), que determina o tamanho do ponto e o nível de informação do projeto.
    number_of_quilting_frame_rails:
      name: Número de travessas da estrutura de acolchoamento
      description: 'Número de carris/rolos incluídos na estrutura de acolchoamento
        (ex.: sistemas de 2 travessas versus sistemas de 3 travessas).'
    number_of_rope_slots:
      name: Número de ranhuras para corda
      description: Indica se o dispositivo de segurança foi concebido para utilização
        com corda simples ou corda dupla.
    number_of_switch_poles:
      name: Número de polos do interruptor
      description: 'O número de circuitos separados (polos) controlados pelo interruptor
        (ex.: SPST, DPST).'
    number_of_switch_throws:
      name: Número de acionamentos do interruptor
      description: 'O número de caminhos de saída (número de contactos) por pólo (ex.:
        SPDT).'
    number_of_timing_chain_rows:
      name: Número de filas da corrente de distribuição
      description: Indica se a corrente de distribuição é de uma só fila ou de várias
        filas.
    number_of_trailer_axles:
      name: Número de eixos do reboque
      description: Número de eixos do reboque.
    number_of_wheel_pieces:
      name: Número de peças da roda
      description: Especifica se a roda é de construção de 1, 2 ou 3 peças.
    numbering_style:
      name: Estilo de numeração
      description: Indica se e como os coletes são pré-numerados para identificação
        da equipa (por exemplo, sem numeração, de 1 a 10, personalizados).
    nunchuck_connector_type:
      name: Conector tipo Nunchuck
      description: 'Tipo de ligação entre os dois identificadores do nunchuck (ex.:
        corda, corrente, corrente rotativa).'
    nursing_access:
      name: Acesso à enfermagem
      description: Identifica o método de acesso para amamentação integrado no vestido
        de banho, se aplicável.
    nursing_access_type:
      name: Tipo de acesso de enfermagem
      description: Especifica a forma como a peça de vestuário proporciona o acesso
        aos seios para amamentação ou extração de leite.
    nut_butter_texture:
      name: textura da manteiga de frutos secos
      description: Descreve a consistência física da manteiga de nozes para que o
        comprador possa escolher facilmente entre cremosa, crocante, etc.
    nutrient_fortification:
      name: Fortificação de nutrientes
      description: Identifica os principais nutrientes com os quais a bebida ou o
        produto alimentar é enriquecido.
    oak_product_form:
      name: Forma do produto de carvalho
      description: Identifica a forma física do carvalho utilizada para o envelhecimento/aromatização
        de produtos.
    oak_toast_level:
      name: nível de tostagem de carvalho
      description: Especifica o nível de tostagem dos produtos de carvalho.
    oboe_case_capacity:
      name: Capacidade da mala do oboé
      description: Indica quais os instrumentos e componentes principais que a caixa
        interior foi concebida para transportar.
    oboe_case_carry_configuration:
      name: Configuração de transporte interno da caixa oboé
      description: Indica a configuração de transporte principal proporcionada pela
        caixa/bolsa.
    oboe_case_design:
      name: Oboé caixa interior design
      description: Classifica a construção/rigidez de uma caixa interior ou capa para
        oboé (por exemplo, rígida, semirrígida, macia) para indicar o nível de proteção.
    oboe_case_internal_fit_type:
      name: Tipo de ajuste interno do estojo para oboé
      description: Indica se o interior é moldado para uma configuração específica
        de instrumentos ou se utiliza compartimentos ajustáveis.
    oboe_keywork_plating:
      name: Revestimento das chaves do oboé
      description: Especifica o revestimento/acabamento das chaves de oboé, separadamente
        do material do corpo.
    oboe_strap_padding:
      name: Almofada da correia de oboé
      description: 'Descreve a presença/tipo de enchimento na zona de contacto da
        pega/dispositivo de assistência para maior conforto (ex.: zona almofadada
        nos ombros/pescoço).'
    oboe_swab_style:
      name: Estilo de escova de oboé
      description: Especifica o estilo/construção funcional de uma escova de limpeza
        para oboé (por exemplo, de passagem, de seda com peso).
    observation_window_material:
      name: Material da janela de observação
      description: Especifica o material dos painéis/janela de visualização (geralmente
        com elevada resistência Impact e durabilidade).
    ocarina_accessories_included:
      name: Acessórios para a ocarina incluídos
      description: Acessórios incluídos com a ocarina, como a caixa interior, a correia
        para o pescoço ou a tabela de dedilhado.
    ocarina_chamber_count:
      name: Contagem de câmaras da ocarina
      description: Indica quantas câmaras tem a ocarina em linha, o que afeta a extensão
        e complexidade da execução (simples/dupla/tripla, etc.).
    ocarina_fingering_system:
      name: Sistema de dedilhado da ocarina
      description: Especifica o sistema/padrão de dedilhado que a ocarina pendente
        segue (se aplicável).
    ocarina_finish_type:
      name: Tipo de acabamento Ocarina
      description: Acabamento da superfície do corpo da ocarina que afeta a sensação
        ao tocar e a estética.
    occupant_classification_sensor_support:
      name: Sensor de classificação de ocupantes assistência
      description: Indica se o banco inclui um sensor de classificação/peso do ocupante
        ou se possui um sistema para transferir/instalar o sensor original (geralmente
        para bancos de passageiros dianteiros).
    octave_harmonica_cover_plate_material:
      name: Material da placa de cobertura da harmónica de oitava
      description: Material das placas de cobertura externas da harmónica de oitava.
    octave_harmonica_tuning_system:
      name: Sistema de afinação da harmónica de oitava
      description: A afinação/temperamento utilizado para a gaita de oitavas.
    octoban_mounting_system_type:
      name: Sistema de montagem tipo Octoban
      description: Como o octoban é montado/posicionado durante o jogo (configuração
        do suporte/braçadeira/base).
    odor_control_features:
      name: Recursos de controlo de odores
      description: Indica se o produto oferece a funcionalidade de neutralização/desodorização
        de odores e através de que meio.
    office_furniture_items_included:
      name: Artigos de mobiliário de escritório incluídos
      description: Identifica o item específico de mobiliário de escritório incluído
        no conjunto, como uma secretária ou um arquivo.
    oil_cooler_core_type:
      name: tipo de núcleo do refrigerador de óleo
      description: Especifica a construção do núcleo interno do refrigerador de óleo,
        afetando a eficiência de arrefecimento, Drop de pressão e a durabilidade.
    oil_cooler_mounting_style:
      name: Estilo de montagem do refrigerador de óleo
      description: Descreve como o refrigerador de óleo deve ser montado/instalado
        no veículo.
    oil_dipstick_component_type:
      name: tipo de componente da vareta de medição de óleo
      description: Especifica qual o componente de medição do nível de óleo que está
        a ser vendido (por exemplo, apenas a lâmina/haste da vareta de medição, apenas
        o identificador, o conjunto completo, o tubo da vareta de medição, etc.).
    oil_dipstick_measurement_markings:
      name: marcações de medição da vareta do óleo
      description: Especifica quais as marcações/expansão presentes na vareta de medição
        para a leitura do nível de óleo.
    oil_dipstick_tube_mounting_type:
      name: tipo de montagem do tubo da vareta de medição de óleo
      description: Especifica a forma como o tubo da vareta de medição de óleo é fixado
        ou montado no motor ou no bloco do motor.
    oil_drain_plug_head_drive_type:
      name: tipo de acionamento da cabeça do bujão de drenagem de óleo
      description: Especifica a interface de encaixe da ferramenta na cabeça do bujão
        de drenagem de óleo utilizada para a instalação e remoção.
    oil_drain_plug_magnet_type:
      name: bujão de drenagem de óleo tipo magnético
      description: Especifica se o bujão de drenagem é magnético e, em caso afirmativo,
        qual o modelo.
    oil_fill_cap_type:
      name: tipo de tampa de enchimento de óleo
      description: Tipo/estilo da interface da tampa de enchimento de óleo utilizada
        pela tampa das válvulas (se aplicável).
    oil_filler_cap_attachment_type:
      name: tipo de fixação da tampa de enchimento de óleo
      description: Especifica a forma como a tampa de enchimento de óleo é fixada
        ao motor/bocal de enchimento de óleo (por exemplo, rosca, encaixe tipo baioneta/trimestre,
        encaixe por pressão).
    oil_filler_cap_installation_position:
      name: posição de instalação da tampa de enchimento de óleo
      description: Especifica onde a tampa deve ser utilizada quando existem vários
        pontos de abastecimento de óleo (por exemplo, tampa de válvulas, tubo de abastecimento
        remoto).
    oil_filler_cap_locking_type:
      name: Tipo de bloqueio da tampa do bocal enchimento de óleo
      description: Especifica se a tampa do bocal de enchimento de óleo não tem fecho
        ou utiliza um método de bloqueio/remoção seguro (por exemplo, com chave ou
        que requer ferramenta) para ajudar a evitar adulteração/roubo ou abertura
        acidental.
    oil_filler_cap_tether_type:
      name: Tipo de cabo de retenção da tampa do bocal de enchimento de óleo
      description: Especifica se a tampa do bocal de enchimento de óleo está presa/retida
        para evitar perdas e qual o tipo de fixação utilizado.
    oil_filler_cap_venting_type:
      name: tipo de ventilação da tampa de enchimento de óleo
      description: Especifica se a tampa possui um respiro e o mecanismo de ventilação
        (se aplicável).
    oil_filter_style:
      name: estilo de filtro de óleo
      description: Especifica o formato do filtro de óleo e o estilo de montagem/instalação
        para compatibilidade com o suporte do filtro do motor.
    oil_pan_baffle_windage_features:
      name: Características do deflector/proteção contra turbulência do cárter de
        óleo
      description: Indica as características internas de controlo de óleo incluídas
        no cárter.
    oil_pan_finish_coating:
      name: Acabamento/revestimento do cárter
      description: Descreve o acabamento ou revestimento da superfície do cárter de
        óleo (pintado, revestido a pó, cromado, em bruto, etc.).
    oil_pressure_sensor_function_type:
      name: Tipo de função do sensor de pressão do óleo
      description: Indica se a peça é um sensor de pressão de óleo de saída variável
        para um medidor/ECU, ou um interruptor de pressão de óleo Ativado/Desativado
        que aciona uma luz de aviso.
    oil_pressure_sensor_signal_output_type:
      name: tipo de saída de sinal do sensor de pressão de óleo
      description: Especifica o tipo de saída/sinal elétrico produzido pelo sensor/transmissor
        de pressão de óleo.
    oil_processing_method:
      name: Método de processamento do azeite
      description: Especifica a forma como o óleo foi produzido ou refinado (por exemplo,
        prensado a frio, virgem, refinado), o que Influence o sabor, os nutrientes
        e as aplicações culinárias adequadas.
    oil_pump_drive_method:
      name: método de acionamento da bomba de óleo
      description: Indica o que aciona a bomba de óleo no interior do motor.
    oil_pump_mounting_style:
      name: Tipo de montagem da bomba de óleo
      description: Especifica onde e como a bomba de óleo é montada no motor (por
        exemplo, interna versus externa/remota, montagem na tampa, montagem no cárter
        de óleo).
    oil_system_connection_thread_standard:
      name: Padrão thread de ligação do sistema de óleo
      description: 'Especifica o padrão thread/ligação utilizado pela interface do
        sistema de óleo da peça para instalação/compatibilidade (ex.: M12x1,5, 1/8-27
        NPT, BSPP).'
    oil_viscosity_grade:
      name: Grau de viscosidade do óleo
      description: Descreve a viscosidade relativa do óleo de cablagem para equipamentos
        Craft (não para as especificações SAE da indústria automóvel).
    okra_variety:
      name: Variedade de quiabo
      description: Identifica a cultivar específica ou variedade de quiabo oferecida
        no mercado, como o Clemson Spineless, o Vermelho Burgundy ou o Baby Okra.
    olfactory_arts_material_form:
      name: Formato do material das artes olfativas
      description: Especifica a forma física do material tal como é vendido.
    olfactory_arts_tool_kit_content:
      name: Conteúdo do kit de ferramentas de artes olfativas
      description: Lista os componentes incluídos quando o produto é vendido como
        um kit ou conjunto para o fabrico de velas/incensos/perfumes.
    olive_variety:
      name: Variedade de azeitona
      description: Especifica a variedade de azeitona utilizada, que influencia Taste,
        a textura, a polpa e a autenticidade regional.
    onion_variety:
      name: Variedade de cebola
      description: Especifica o tipo específico de cebola para que o comprador possa
        localizar rapidamente a cor, o sabor e os perfis de utilização preferidos,
        permitindo ao comerciante listar os produtos com precisão.
    opacity_level:
      name: Nível de opacidade
      description: Indica o grau de transparência ou opacidade do tecido.
    operating_modes:
      name: Modos de funcionamento
      description: Efeito primário integrado/ Mode Motion suportado pela luz laser.
    operating_voltage:
      name: Tensão de funcionamento
      description: Especifica a tensão nominal do sistema para a qual o injetor foi
        concebido.
    optical_toy_features:
      name: Características do brinquedo óptico
      description: Destaca o principal efeito visual/ótico produzido pelo brinquedo.
    orchestral_string_core_material:
      name: Material central da cadeia orquestral
      description: Especifica o material de construção do núcleo da corrente (core),
        que afeta fortemente a sensação, a resposta e o timbre.
    orchestral_string_end_type:
      name: tipo final de cadeia orquestral
      description: Especifica o estilo de fixação na extremidade da corrente que se
        liga ao cabo.
    orchestral_string_included_strings:
      name: Cordas incluídas para instrumentos de cordas de orquestra
      description: Lista quais as cadeias específicas que estão incluídas no pacote
        (varia consoante o instrumento).
    orchestral_string_instrument_fitting_part_type:
      name: Tipo de encaixe/peça de instrumento de cadeia orquestral
      description: 'Especifica que tipo de encaixe/peça é o produto (ex.: ponte, estandarte,
        queixeira).'
    orchestral_string_instrument_mute_type:
      name: Tipo de surdina para instrumentos de cordas de orquestra
      description: Especifica o tipo funcional da surdina para instrumentos de cadeia
        orquestral (por exemplo, prática/hotel vs. apresentação/concerto) e/ou o estilo
        de design comum.
    orchestral_string_instrument_part_position:
      name: Posição da parte do instrumento da cadeia orquestral
      description: Indica a posição da peça no instrumento (útil quando as peças vêm
        em variantes superior/inferior ou esquerda/direita).
    orchestral_string_winding_material:
      name: Material de revestimento das cordas de instrumentos de cordas de orquestra
      description: Especifica o material de enrolamento/envoltório externo utilizado
        na corrente.
    organza_finish_sheen:
      name: Acabamento/brilho em organza
      description: Descreve o aspeto da superfície da organza (efeito mate versus
        brilhante/iridescente).
    organza_ribbon_transparency_level:
      name: Nível de transparência da fita de organza
      description: Descreve o grau de transparência da fita de organza.
    organza_transparency_level:
      name: Nível de transparência da organza
      description: Descreve a transparência do tecido de organza quando utilizado
        em camadas.
    origami_paper_shape:
      name: Forma do papel de origami
      description: Especifica a forma da folha utilizada para dobragem.
    origami_paper_sidedness:
      name: lado Paper de origami
      description: Indica se o Paper de origami tem o mesmo padrão em ambos os lados
        ou lados contrastantes.
    ostrich_feather_part:
      name: Parte da pena de avestruz
      description: 'Identifica o estilo/parte da pena de avestruz utilizada (ex.:
        pluma vs. pena comum), o que Impact a suavidade, a densidade e a aplicação
        típica Craft .'
    outboard_motor_shaft_type:
      name: Tipo de eixo do motor fora de borda
      description: Classe de comprimento de eixo padrão utilizada em motores fora
        de bordo (Formato Label utilizado na indústria náutica).
    outboard_motor_steering_type:
      name: Tipo de direção do motor fora de bordo
      description: Especifica a interface/mecanismo de direção utilizado pelo motor
        fora de bordo (por exemplo, manche ou sistema de direção remota).
    outdoor_table_functionality:
      name: Funcionalidade de mesa para exterior
      description: 'Identifica funções integradas especializadas que vão para além
        de uma simples superfície de mesa (ex.: compartimento térmico, prateleira
        de arrumação, tampa para botija de gás, base para guarda-sol, conector para
        cadeira, design dobrável, cofre para utilização na piscina, altura regulável,
        rodas integradas, iluminação LED).'
    outerwear_length_type:
      name: Tipo de comprimento de fato de treino
      description: Classifica o comprimento total de uma peça de vestuário exterior
        em intervalos descritivos padrão.
    outerwear_pieces_included:
      name: Peças de vestuário exterior incluídas
      description: Lista as peças de vestuário fornecidas quando o produto é vendido
        em conjunto.
    outfit_attachment_mechanism:
      name: Mecanismo de fixação do vestuário
      description: Especifica a forma como as peças de roupa ou acessórios se fixam
        à boneca (por exemplo, separador, adesivo, ímanes).
    outfit_items_included:
      name: Itens de vestuário incluídos
      description: 'Lista as peças de roupa específicas incluídas no conjunto (ex.:
        body, calções, fita para o cabelo).'
    outlet_thread_type:
      name: Tipo thread de saída
      description: 'Padrão de rosca utilizado nas portas de saída da linha de travagem
        do cilindro principal (ex.: flange de bolha métrica versus flange invertida
        SAE).'
    output_jack_type_instrument:
      name: Tipo de conector de saída (instrumento)
      description: Especifica o tipo de conector de saída de áudio no bandolim elétrico.
    output_signal_type:
      name: Tipo de sinal de saída
      description: 'Comportamento/tipo de saída elétrica produzida pelo sensor (ex.:
        resistência analógica de um termistor NTC).'
    outsole_marking_type:
      name: Tipo de marcação da sola
      description: Indica se a sola do calçado deixa marcas nas superfícies do campo,
        um fator crucial para os desportos de raquete em campos cobertos.
    outsole_material:
      name: Material da sola
      description: Indica o material da sola do calçado que entra em contacto com
        o solo, afetando a aderência, a flexibilidade e a durabilidade.
    outsole_stud_type:
      name: Tipo de bloqueio da sola
      description: Descreve a configuração da sola/fechos (por exemplo, fechos moldados,
        saliências de borracha, pinos para relva sintética) que proporciona tração
        na superfície de jogo escolhida.
    oven_bake_clay_formulation:
      name: Fórmula de barro para cozedura em forno
      description: Identifica a família de formulação da argila de cura em forno (por
        exemplo, argila polimérica versus argila resinosa), que Impact o manuseamento,
        o comportamento de cura e as propriedades do produto final.
    oven_housing_configuration:
      name: Configuração da carcaça do forno
      description: Define o esquema de eletrodomésticos pretendido para o armário
        (por exemplo, forno simples, forno duplo ou combinação de forno e micro-ondas).
    overhead_mount_installation_method:
      name: Método de instalação de montagem suspensa
      description: Como o suporte superior está fixo ao veículo (estilo de equipamento/fixação).
    oversize_or_undersize_grade:
      name: Grau de tamanho grande ou pequeno
      description: Especifica a classificação de tamanho do kit (pistões/anéis de
        tamanho superior e/ou rolamentos de tamanho inferior) em relação ao tamanho
        padrão do fabricante original.
    p_tex_application_method:
      name: Método de aplicação do P-Tex
      description: Descreve como o material P-Tex é aplicado na base do esqui ou da
        prancha de snowboard.
    p_tex_form:
      name: Formulário P-Tex
      description: Identifica a forma física em que o material de reparação é Supply.
    packability:
      name: Capacidade de compactação
      description: Indica se e como o colete pode ser dobrado ou acondicionado quando
        não está a ser utilizado.
    packaging_format:
      name: formato
      description: Como as cadeias são embaladas/vendidas (envelopes individual ,
        a granel, etc.).
    packaging_material:
      name: material
      description: Especifica o material principal da garrafa ou recipiente que contém
        a água.
    packaging_type:
      name: Tipo de embalagem
      description: Descreve como o boneco de cabeça oscilante é embalado para Retail/exposição/armazenamento
        para colecionadores.
    packing_medium:
      name: Meio de embalagem
      description: Indica o líquido ou meio (como água, vários xaropes, sumo ou salmoura)
        utilizado para conservar a fruta dentro do recipiente.
    pad_components_included:
      name: Componentes do conjunto de proteções incluídos
      description: Especifica quais as peças incluídas quando o produto é vendido
        em conjunto (por exemplo, joelheiras e cotoveleiras, apenas protetores de
        pulso).
    pad_controller_additional_control:
      name: Controlo adicional do controlador de pad
      description: Tipos de controlos físicos adicionais Beyond dos pads (knobs, faders,
        botões) presentes na unidade.
    pad_controller_performance_features:
      name: Características de desempenho do controlador de pad
      description: Principais funcionalidades dos pads relacionadas com a performance,
        para tocar e controlar a expressividade.
    pad_coverage_area:
      name: Área de cobertura da almofada
      description: Especifica as zonas do corpo que as almofadas integradas da correia
        protegem.
    pad_material_or_technology:
      name: Material ou tecnologia da almofada
      description: Especifica a propriedade - tecnologia de absorção Impactou material
        de marca utilizado na almofada.
    pad_mounting_or_holding_style:
      name: estilo de montagem ou fixação da almofada
      description: Indica como a almofada deve ser segurada, utilizada ou instalada
        durante a utilização.
    pad_saver_style:
      name: protetor de almofada estilo
      description: Indica o estilo/design físico do protetor de pastilhas utilizado
        para secar as pastilhas e o cano.
    pad_shape:
      name: Forma da almofada
      description: Define a forma geométrica ou curvatura da superfície de impacto
        ou do corpo geral da almofada (por exemplo, redonda, curva, retangular, plana),
        ajudando os utilizadores a escolher almofadas adequadas aos objetivos de treino
        e aos tipos de golpe.
    pad_shell_type:
      name: Tipo de concha da almofada
      description: 'Classifica o estilo de construção da superfície exterior da almofada
        (ex.: casco rígido, casco macio, inserção interior).'
    pad_style:
      name: Estilo de almofada
      description: Especifica o tipo ou design da almofada. Supply com o trenó.
    padding_layers:
      name: camadas
      description: Indica o número de camadas de espuma utilizadas para a absorção
        Impact .
    padding_level:
      name: nível
      description: Indica a quantidade de conforto integrada nas zonas de contacto
        da pega/auxílio (pescoço/ombro/costas).
    padding_material:
      name: material
      description: Especifica o material de enchimento interior ou substância que
        absorve Impact no interior de bolsas, escudos, luvas e bonecos de treino.
    paddle_ball_attachment_type:
      name: Tipo de encaixe para raquete de voleibol
      description: Especifica a forma como a bola está ligada à raquete (ou se não
        está presa por um cabo).
    paddle_leash_style:
      name: estilo de leash de remo
      description: Identifica o estilo ou design da corda de segurança do remo.
    paddle_shape:
      name: Forma da raquete
      description: Define a silhueta geral da cabeça/corpo do remo (por exemplo, padrão,
        alongado, corpo largo), que Impact no alcance, no tamanho ideal e na manobrabilidade.
    paddleboard_intended_use:
      name: Utilização prevista da prancha de stand up paddle
      description: 'Classifica a finalidade principal do projeto ou a atividade para
        a qual a prancha foi construída (ex.: Turismo, Ioga, Corrida).'
    paint_application_method:
      name: Método de aplicação da tinta
      description: Principal forma de aplicação do produto na pinça de travão.
    paint_by_number_surface_type:
      name: Tipo de superfície para pintura por números
      description: 'A superfície onde é impresso o desenho numerado (ex.: tela, Paper,
        painel de madeira).'
    paint_medium_application_method:
      name: Método de aplicação de tinta média
      description: Indica a forma recomendada de aplicação do produto.
    paint_medium_intended_effect:
      name: Ênfase pretendida na pintura
      description: Capta o resultado principal que o meio se propõe criar (textura,
        brilho, efeito velado, Flow, etc.).
    paint_safe_bristles:
      name: Cerdas que não danificam a pintura
      description: Indica se as cerdas da escova são consideradas seguras para utilização
        em pintura automóvel/verniz transparente (sem riscos).
    paintable_surface:
      name: Superfície pintável
      description: Indica se as formas de papel maché estão prontas a pintar (por
        exemplo, com primário/selante) ou se necessitam de preparação.
    paintball_caliber:
      name: Calibre de paintball
      description: Especifica o diâmetro/calibre das bolas de paintball ou de equipamento
        compatível.
    paintball_feed_system:
      name: Sistema de alimentação de paintball
      description: Define a forma como as bolas de tinta são alimentadas no marcador.
    paintball_fill_color:
      name: Paintball fill cor
      description: Indica a espessura do enchimento da marcação interna, que pode
        diferir da camada externa e determina a espessura restante no impacto.
    paintball_fill_type:
      name: Tipo de enchimento das bolas de paintball
      description: Descreve qualquer formulação ou propriedade especial do enchimento
        (por ex. lavável, brilha no escuro, em pó).
    paintball_grade:
      name: Nível de paintball
      description: 'Descreve a classe de desempenho ou o nível de utilização pretendido
        (ex.: principiante, campo, competição, inverno).'
    paintball_mask_coverage_level:
      name: Nível de cobertura da máscara de paintball
      description: Indica quais as partes do rosto ou da cabeça que os óculos ou a
        máscara de paintball protegem (apenas os óculos, meio rosto, rosto inteiro
        ou cabeça inteira).
    paintball_tank_valve_type:
      name: tipo de válvula para cilindro de paintball
      description: Descreve a interface da válvula ou do regulador presente no depósito.
    painting_surface_priming_type:
      name: tipo de preparação da superfície de pintura
      description: Especifica a preparação/revestimento da superfície a pintar (Beyond
        simplesmente preparado/sem preparador), o que afecta a aderência da tinta
        e a compatibilidade da técnica.
    palette_knife_blade_edge_profile:
      name: perfil da borda da lâmina da espátula
      description: Descreve o perfil da aresta de trabalho da lâmina de uma espátula
        (não a afiação), que afeta a criação de marcas e a mistura de cores.
    palette_knife_flexibility:
      name: Flexibilidade da espátula
      description: Descreve a rigidez/flexibilidade da lâmina da espátula.
    palette_surface_finish:
      name: Acabamento da superfície da paleta
      description: Descreve o acabamento/revestimento superficial da mistura que afeta
        a resistência às manchas e a facilidade de limpeza.
    palm_padding_level:
      name: Nível de acolchoamento da palma da mão
      description: Descreve a quantidade de amortecimento na zona da palma da luva
        ou na almofada de aderência.
    palm_padding_type:
      name: Tipo de acolchoamento da palma da mão
      description: 'Indica o material ou a construção utilizada para o amortecimento
        da palma da mão (ex.: gel, espuma, dupla camada).'
    palm_wax_blend_readiness:
      name: Preparação da mistura de cera de palma
      description: Quer o produto seja cera de palma pura ou uma formulação pré-misturada
        destinada a características de desempenho específicas.
    palm_wax_form:
      name: forma de cera de palma
      description: A forma física da cera de palma tal como é vendida influencia a
        facilidade de medição, a velocidade de derretimento e o manuseamento.
    pan_flute_tuning_standard:
      name: Padrão de afinação da flauta de pã
      description: 'Frequência de referência utilizada para a afinação (ex.: A4=440
        Hz), importante para tocar com outros instrumentos.'
    pannier_configuration:
      name: Configuração do alforge
      description: Indica se o produto é vendido como uma bolsa individual, uma bolsa
        dupla conectada ou um conjunto de alforges parapar/triplos.
    pannier_mounting_system:
      name: Sistema de fixação do alforge
      description: Define o mecanismo utilizado para fixar o alforge ao suporte ou
        quadro da bicicleta, garantindo a compatibilidade com diferentes configurações.
    pant_cuff_style:
      name: Estilo de bainha da calça
      description: 'Indica o acabamento ou ajuste no tornozelo das calças (ex.: punhos
        elásticos, bainha articulada no tornozelo, bainha aberta).'
    pant_leg_conversion_type:
      name: Tipo de conversão de perna de calça
      description: Indica se e como as pernas das calças podem ser convertidas ou
        ajustadas para diferentes comprimentos.
    pantyhose_crotch_style:
      name: estilo de virilha de collants
      description: Define o design da zona da virilha, distinguindo entre as versões
        standard com virilha fechada, sem virilha ou com reforço na virilha.
    papaya_variety:
      name: Variedade de papaia
      description: 'Especifica a cultivar ou variedade de mercado de um mamão (ex.:
        Solo, Maradol).'
    paper_and_magnetic_doll_format:
      name: Formato de boneca Paper e magnética
      description: Especifica se o produto é um conjunto de bonecas Paper tradicional,
        um conjunto de bonecas magnéticas ou um formato híbrido.
    paper_color_family:
      name: Família Paper cor
      description: Especifica se a embalagem é de uma só cor, Colors sortidas ou misturas
        especiais (útil quando a cor é poritem , mas a embalagem contém cores variadas).
    paper_magnetic_doll_set_contents:
      name: Conjunto de bonecos Paper e magnéticos Conteúdo
      description: Indica quais os componentes principais que estão incluídos no conjunto.
    paper_opacity:
      name: Opacidade Paper
      description: Indica o grau de transparência do Paper , desde muito transparente
        a opaco (útil para decalque).
    paraglider_certification_rating:
      name: Categoria de certificação de parapente
      description: Indica a classificação oficial de aptidão para voo atribuída a
        uma asa de parapente (por exemplo, classes EN ou LTF).
    parasite_types_controlled:
      name: Tipos de parasitas controlados
      description: Lista os parasitas internos contra os quais o produto é eficaz,
        para que o comprador possa Tailor os programas de desparasitação a infestações
        específicas.
    parking_camera_mounting_location:
      name: Local de montagem da câmara de estacionamento
      description: 'Local de instalação da câmara no veículo (ex.: área da placa de
        matrícula, montagem na superfície traseira, montagem embutida).'
    parking_camera_night_vision_technology:
      name: Tecnologia Vision noturna para câmaras de estacionamento
      description: Método de assistência em condições de baixa luminosidade utilizado
        pela câmara.
    parking_camera_orientation:
      name: Orientação da câmara de estacionamento
      description: Se a câmara foi concebida para visualização traseira (cópia de
        segurança), visualização frontal ou utilização selecionável/espelhada.
    parking_sensor_finish:
      name: Sensor de estacionamento finalizado
      description: Indica o acabamento da superfície da face/tampa do sensor de estacionamento
        (por exemplo, pintável/com primário, mate, brilhante) para combinar com a
        estética do pára-choques.
    parking_sensor_type:
      name: Tipo de sensor de estacionamento
      description: Especifica a tecnologia de deteção utilizada pelo sensor de estacionamento
        (por exemplo, ultrassónica, eletromagnética, radar, ótica).
    parsley_root_variety:
      name: variedade de raiz de salsa
      description: Especifica a cultivar ou variedade da raiz de salsa, quando fornecida
        pelo fornecedor.
    parsnip_variety:
      name: Variedade de pastinaca
      description: Identifica a variedade ou cultivar específica de cherovia, como
        Hollow Crown ou Branco Gem, permitindo ao comprador selecionar com base no
        sabor, doçura ou diferenças de tamanho.
    part_condition:
      name: Estado da parte
      description: Indica se a peça é nova, usada, recondicionada, etc.
    part_placement:
      name: Parte ponto de apresentação
      description: Indica em que parte da máquina (por exemplo, simulador de escadas
        ou stepper) a peça está instalada, como por exemplo, esquerda, direita, frente
        ou traseira.
    partial_capo_covered_strings:
      name: Cadeia parcialmente coberta por capo
      description: Especifica a extensão da corda que o capo parcial cobre, utilizando
        a numeração padrão de guitarra de 6 cadências (1 = Mi agudo, 6 = Mi grave).
    parting_style:
      name: Estilo de separação
      description: Indica como a peruca é ou pode ser repartida (por exemplo, ao centro,
        de lado, com risca livre), afetando a flexibilidade de penteado.
    party_favor_type:
      name: tipo de lembrança de festa
      description: Especifica o tipo de item de festa (por exemplo, autocolantes,
        brinquedos Shop Mini , bolas de sabão) para permitir a navegação/filtragem
        dentro da secção Lembranças de Festa.
    party_game_format:
      name: Formato de jogo de festa
      description: Formato físico principal do jogo de festa.
    party_horn_mouthpiece_type:
      name: tipo de bocal de corneta de festa
      description: Especifica a construção do bocal, que afeta a higiene e o conforto.
    party_horn_style:
      name: estilo buzina de festa
      description: Descreve o estilo de construção/funcionamento da corneta de festa
        (como se propaga ou produz som).
    passenger_car_type:
      name: tipo de automóvel de passageiros
      description: Identifica o tipo específico de material circulante de passageiros
        (vagão de passageiros) para o modelo (por exemplo, vagão de passageiros convencional,
        vagão-cama), utilizado para a navegação e montagem de conjuntos.
    passion_fruit_variety:
      name: Variedade de maracujá
      description: 'Identifica/especifica a variedade botânica ou comercial do maracujá
        oferecido (ex.: roxo, amarelo, granadilha).'
    pasta_sauce_texture:
      name: textura do molho de massa
      description: 'Descreve a consistência do molho (ex.: suave, com pedaços, cremoso)
        para corresponder à sensação na boca do consumidor.'
    pasta_sauce_variety:
      name: variedade de molho para massa
      description: Classifica os molhos para massa por receita ou estilo, para que
        o comprador possa encontrar rapidamente clássicos como o molho marinara ou
        molhos especiais como o molho vodka ou o pesto.
    pastry_crust_state:
      name: Estado da crosta da massa
      description: Descreve o estado de preparação ou cozedura da massa no momento
        da compra.
    pastry_crust_style:
      name: Tipo de massa da base
      description: Identifica o estilo específico de massa ou o tipo de massa da crosta.
    pastry_filling_type:
      name: Tipo de recheio de pastelaria
      description: Especifica o recheio principal do pastel ou do pão doce.
    patch_adhesion_method:
      name: Método de adesão de remendos
      description: Especifica a forma como o remendo adere à câmara de ar ou ao pneu
        (por exemplo, autocolante, vulcanizado com cimento ou ativado pelo calor).
    patch_backing_material:
      name: Material de suporte do aplique
      description: 'Material utilizado na parte de trás/base do aplique (ex.: feltro,
        sarja) que entra em contacto com o item que está a ser decorado.'
    patch_backing_type:
      name: Tipo de suporte do aplique
      description: 'O tipo de suporte utilizado no patch (ex.: termocolante/adesivo
        para passar a ferro, adesivo amovível, velcro, nenhum).'
    patch_base_material:
      name: Material da base do aplique
      description: Material têxtil principal de base/suporte do aplique com o motivo
        (não os ornamentos decorativos).
    patch_border_edge_finish:
      name: Acabamento de bordo/borda em patch
      description: O método de acabamento das bordas do patch (por exemplo, borda
        merrow/overlock, borda cortada a laser) afeta a durabilidade e a aparência.
    patch_placement_area:
      name: Área de patch ponto de apresentação
      description: Área de ponto de apresentação comum destinada ao patch de vestuário/acessórios.
    pathogen_removal_capability:
      name: capacidade de remoção de agentes patogénicos
      description: Especifica quais as classes de microrganismos (bactérias, protozoários,
        vírus) que a bomba está certificada para remover.
    pattern_sizing_system:
      name: Sistema de dimensionamento de moldes
      description: Especifica o sistema ou o padrão de tamanhos regional utilizado
        para a tabela de tamanhos do molde (por exemplo, EUA, Reino Unido, UE).
    peak_style:
      name: Estilo da pala
      description: Especifica o estilo da viseira ou pala do capacete, afetando a
        cobertura, a estética e as regras da modalidade.
    pear_variety:
      name: Variedade de pera
      description: 'Identifica a cultivar ou variedade de peras (ex.: Bartlett, Bosc,
        Conference), permitindo ao comprador escolher o sabor, a textura e o uso culinário
        da sua preferência.'
    pearl_luster_grade:
      name: Grau de brilho nacarado
      description: Grau de brilho/lustre qualitativo da superfície da pérola.
    pearl_matching_level:
      name: Nível de correspondência de pérolas
      description: Indica o grau de homogeneidade das pérolas dentro de um lote ou
        fio (por exemplo, em termos de cor, tamanho e brilho).
    pearl_shape:
      name: Forma de pérola
      description: A categoria geral de forma da pérola.
    pearl_surface_condition:
      name: Estado da superfície da pérola
      description: Indica o estado visível da superfície de uma pérola, com base na
        presença e gravidade de imperfeições ou manchas.
    pearl_treatment:
      name: Tratamento da pérola
      description: Divulga qualquer tratamento aplicado à pérola que afete a cor/aparência.
    pearl_type:
      name: Tipo pérola
      description: 'Especifica a variedade/Origin da pérola (ex.: água doce, Akoya,
        Tahiti, Mares do Sul) para as pérolas soltas.'
    peat_level:
      name: Nível de turfa
      description: Descreve a intensidade da Influence do fumo de turfa no whisky,
        desde o não turfado ao fortemente turfado.
    pedal_and_cleat_system_compatibility:
      name: Compatibilidade com pedais e sistemas de encaixe
      description: Especifica com que padrões de pedal ou taco o calço ou cunha foi
        concebido para funcionar, garantindo que o comprador escolhe um produto que
        se ajusta aos seus pedais e sapatos.
    pedal_configuration:
      name: Configuração dos pedais
      description: Indica se a cadeira possui um único pedal, pedais Split/independentes
        ou um design convertível.
    pedal_mounting_style:
      name: Estilo de montagem do pedal
      description: Especifica a forma como o pedal ou a cobertura/almofada do pedal
        se fixa ao veículo (método de instalação/fixação).
    pedal_set_components:
      name: Componentes do conjunto de pedais
      description: Especifica quais os pedais incluídos no conjunto.
    pedal_spindle_material:
      name: Material do eixo do pedal
      description: Material utilizado para o eixo/fuso do pedal, Influence a resistência,
        o peso e a resistência à corrosão.
    pedal_spindle_thread_size:
      name: Tamanho thread do eixo do pedal
      description: Especifica o padrão de rosca do eixo do pedal que se ajusta ao
        braço da manivela.
    pedal_type:
      name: Tipo de pedal
      description: Descreve o estilo dos pedais Supply com a bicicleta, indicando
        a compatibilidade com os sapatos e o estilo de pedalar.
    pellet_accessory_type:
      name: Tipo de acessório para chumbadas
      description: Identifica o tipo específico de acessório para pellets, permitindo
        aos pescadores localizar rapidamente brocas, anéis ou limitadores de acordo
        com as suas necessidades de montagem de equipamento.
    pellet_grade:
      name: Pellets
      description: Indica a precisão de fabrico ou o nível de desempenho das munições
        de airsoft.
    pen_ink_color:
      name: tinta de caneta cor
      description: Indica a cor real da tinta dispensada pela caneta, que pode ser
        diferente da cor exterior do corpo da caneta.
    penalty_card_accessories_included:
      name: Acessórios para cartão de penalização incluídos
      description: Lista os acessórios adicionais para arbitragem incluídos no cartão
        de penalizações, como a carteira digital, o bloco de pontuação, o lápis, a
        moeda, o apito ou o estojo.
    penalty_card_colors_included:
      name: Cores dos cartões de penalidade incluídas
      description: Lista as Colors do cartão de penalização contido no conjunto do
        produto.
    penalty_flag_throw_distance:
      name: Distância de lançamento da bandeira de penalização
      description: Classificação do projeto indicando o alcance de lançamento pretendido
        da bandeira.
    pendant_cutter_safety_features:
      name: características de segurança do cortador de pingentes
      description: Identifica elementos de segurança integrados que reduzem os cortes
        acidentais durante o transporte/utilização.
    pendant_cutter_wear_method:
      name: método de desgaste do cortador de pingente
      description: Especifica como o cortador de pendentes deve ser transportado ou
        utilizado.
    pepper_variety:
      name: Variedade de pimenta
      description: Especifica a variedade ou espécie de pimento utilizada no produto,
        permitindo ao comprador distinguir entre diferentes perfis de sabor e níveis
        de picante.
    percussion_case_style:
      name: Caixa interna de percussão estilo
      description: Classifica o estilo/construção geral da caixa interior (bolsa macia
        vs caixa interior rígida vs híbrida).
    percussion_instruments_included:
      name: Instrumentos de percussão incluídos
      description: Lista os tipos de instrumentos de percussão incluídos quando o
        produto é um conjunto de brinquedo com vários instrumentos.
    percussion_mallet_handle_grip_style:
      name: Identificador de baqueta de percussão estilo de pega
      description: Identifica o tipo de configuração de pega de teste no identificador
        (Beyond texture), como madeira nua, lacada, pega emborrachada ou revestida.
    percussion_mallet_head_construction:
      name: Construção da cabeça do martelo de percussão
      description: Descreve o estilo de construção da cabeça do martelo (por exemplo,
        fio enrolado, feltro, borracha, madeira em bruto), que Impact o som e a durabilidade.
    perfumery_base_carrier_type:
      name: Base de perfumaria tipo transportador
      description: Especifica o sistema transportador/solvente de uma base de perfumaria
        (que compõe a base principalmente para a diluição e desempenho).
    perfumery_base_intended_application:
      name: Aplicação básica de perfumaria
      description: Indica o formato de utilização final para o qual a base foi concebida
        (por exemplo, spray de fragrância fina versus roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Ingrediente de perfumaria transportador/solvente
      description: 'Identifica o transportador/solvente em que o ingrediente é Supply
        , caso esteja diluído (ex.: etanol, DPG, óleo de jojoba).'
    perfumery_ingredient_form:
      name: Forma do ingrediente de perfumaria
      description: Especifica a forma/estado físico do ingrediente de perfumaria como
        Supply.
    perfumery_ingredient_type:
      name: Tipo de ingrediente de perfumaria
      description: 'Classifica o ingrediente de perfumaria de acordo com a sua função
        na prática da perfumaria (ex.: óleo essencial, substância aromática).'
    perfumery_ingredient_usage_note:
      name: Nota sobre a utilização de ingredientes em perfumaria
      description: Indica a função típica na estrutura de uma fragrância (topo, coração/direito,
        fundo), reconhecendo que os materiais podem abranger várias notas.
    perfumery_ingredients:
      name: Ingredientes de perfumaria
      description: Lista os tipos de materiais de fragrância consumíveis incluídos
        no kit (por exemplo, óleos essenciais, óleos de fragrância, base alcoólica).
    perfumery_note_position:
      name: posição da nota de perfumaria
      description: Indica a função típica do ingrediente na estrutura de uma fragrância
        (notas de topo/coração/base).
    persimmon_variety:
      name: Variedade de dióspiro
      description: Identifica a cultivar ou variedade do dióspiro, pois as diferentes
        variedades, como a Fuyu ou a Hachiya, diferem na textura, sabor, adstringência
        e uso culinário.
    personalization_type:
      name: Tipo de personalização
      description: Especifica se e como o produto pode ser personalizado para um Events
        (por exemplo, monograma, nome/data, inserção de fotografia).
    phonics_focus:
      name: Foco na fonética
      description: Especifica qual a capacidade de fonética e leitura de palavras
        que o brinquedo de leitura visa desenvolver.
    physalis_variety:
      name: Variedade de Physalis
      description: Identifica a espécie botânica específica, cultivar ou variedade
        comum de fisális que está a ser vendida.
    pi_ata_filler_type_included:
      name: Tipo de enchimento para pinhata incluído
      description: Caso exista conteúdo de preenchimento, especifique o tipo de conteúdo
        fornecido.
    pi_ata_hanging_method:
      name: método de pendurar pinhatas
      description: Como a pinhata é concebida para ser pendurada ou apoiada (incluindo
        laço, gancho, corrente, etc.).
    pi_ata_opening_type:
      name: tipo de abertura de pinhata
      description: Como o orifício de enchimento é acedido/fechado (aba, velcro, fecho,
        pré-selado, etc.).
    piccolo_key_system:
      name: Sistema de chaves Piccolo
      description: Identifica o sistema/design de chaves utilizado no piccolo (normalmente
        o sistema Boehm para os piccolos modernos).
    piccolo_keywork_features:
      name: Características principais do Piccolo
      description: Especifica os mecanismos e as opções de teclas notáveis no piccolo.
    pick_grip_aid:
      name: Auxílio para apanhar patas
      description: Indica a principal característica de auxílio à aderência integrada
        na palheta, Beyond da sensação/textura geral da superfície (por exemplo, orifícios
        de aderência, logótipo em relevo, incrustação de borracha).
    pickleball_construction_type:
      name: Tipo de fabrico da bola de pickleball
      description: A construção da bola, como por exemplo, uma peça única sem costuras
        ou duas peças soldadas, proporciona durabilidade Impact e consistência de
        voo.
    pickling_method:
      name: Método de conservação em vinagre
      description: Especifica o meio ou a técnica de conservação utilizada para a
        fermentação em salmoura, como por exemplo, salmoura de vinagre ou lactofermentação.
    pickup_and_preamp_configuration:
      name: recolha e configuração do pré-amplificador
      description: Indica se a Viola inclui uma inclusão e/ou pré-amplificador ativo
        para desempenho ou gravação amplificada.
    pickup_configuration:
      name: Configuração dos captadores
      description: 'Descreve o esquema geral de captação de uma guitarra eléctrica
        utilizando abreviaturas comuns (ex.: SSS, HSS, HH).'
    pickup_cover_material:
      name: Material da capa do captador
      description: Especifica o material principal da tampa de recolha (se existir),
        incluindo os acabamentos galvanizados comuns quando assim especificado pelo
        fabricante.
    pickup_cover_type:
      name: Tipo de tampa de recolha
      description: 'Especifica se uma guitarra elétrica tem capa e o material/estilo
        da capa (ex.: metal ou plástico).'
    pickup_string_spacing:
      name: espaçamento da cadeia
      description: O padrão de espaçamento entre pólos/cadências para o qual o captador
        foi fabricado (por exemplo, Fender/espaçamento F vs Gibson/padrão) afeta o
        alinhamento em guitarras equipadas com tremolo.
    pie_crust_type:
      name: tipo de massa de tarte
      description: Especifica o estilo ou tipo de massa utilizada para a tarte ou
        tarte, como massa folhada, massa de bolachas graham ou massa sem glúten.
    piece_configuration:
      name: Configuração da peça
      description: Indica quantas peças separadas compõem o taco, a haste ou a ponte,
        afetando a portabilidade e o estilo de jogo.
    pillow_form_size:
      name: Formato de almofada
      description: 'Designação normalizada do tamanho final para enchimentos/fronhas
        (ex.: 45,7 cm x 45,7 cm).'
    pilot_helmet_communications_integration:
      name: Integração de comunicações em capacetes de piloto
      description: Indica se o capacete inclui componentes de comunicação aeronáutica
        ou se já vem pré-configurado para os mesmos.
    pilot_helmet_visor_configuration:
      name: Configuração da viseira do capacete de piloto
      description: Especifica a configuração da viseira/protetor facial incluída no
        capacete de piloto.
    pin_attachment_type:
      name: Tipo de fixação do alfinete
      description: Especifica o mecanismo de fixação/bloqueio do alfinete marcado
        utilizado para prender o alfinete marcado à peça de vestuário ou a uma superfície
        (por exemplo, fecho borboleta, fecho magnético).
    pin_backing_type:
      name: Tipo de fecho do alfinete
      description: Especifica o mecanismo de fixação/reforço utilizado para prender
        o alfinete de dama marcado à roupa ou aos acessórios.
    pin_cushion_attachment_style:
      name: marcado com um estilo de fixação de almofada de alfinetes
      description: Como o alfineteiro marcado é utilizado, fixado ou posicionado durante
        a utilização.
    pin_cushion_features:
      name: marcado com um recurso de almofada de alfinetes
      description: Características funcionais que vão além da simples fixação de pinos.
    pin_face_customization_method:
      name: marcado com um pin face método personalizado
      description: Especifica a forma como o design frontal é produzido (por exemplo,
        esmalte duro, esmalte macio, impresso).
    pin_type:
      name: marcado com um tipo de pino
      description: Especifica o estilo ou formato marcado com um pin produto usado
        para colecionáveis de fãs de desporto.
    ping_pong_certification:
      name: certificação de ténis de Ping
      description: Declara o padrão oficial ou o nível de aprovação do organismo regulador
        do produto.
    ping_pong_competition_certification:
      name: certificação de competição de Ping
      description: Indica o estado de certificação oficial da bola de pingue-pongue
        para jogos sancionados (por exemplo, aprovada pela ITTF).
    ping_pong_paddle_handle_style:
      name: Estilo de identificação de raquete Ping -pongue
      description: Define a forma/estilo do identificador da raquete, que Influence
        o conforto da pega e a técnica de jogo.
    ping_pong_robot_accessory_type:
      name: tipo de acessório para robô Ping -pongue
      description: Identifica o subtipo funcional do acessório para que o comprador
        possa restringir rapidamente os resultados (por exemplo, redes versus adaptadores
        de alimentação).
    ping_pong_rubber_surface_type:
      name: Tipo de superfície de borracha Ping -pongue
      description: Identifica o estilo/textura da superfície de borracha aplicada
        na raquete, afetando as características de rotação e velocidade.
    ping_pong_rubber_type:
      name: tipo de borracha Ping -pongue
      description: Especifica o estilo de construção da superfície de uma borracha
        de ténis de mesa, que influencia as características de jogo.
    ping_pong_table_type:
      name: Tipo de mesa de pingue-pongue
      description: 'Classifica o estilo ou formato geral da tabela para facilitar
        a comparação (ex.: concorrência, conversão de topo, Shop Mini).'
    pipe_instrument_voicing_sound_production_method:
      name: Método de sonorização/produção sonora de instrumentos de sopro
      description: Especifica a forma como o instrumento produz som (mecanismo de
        fluxo de ar), ajudando a distinguir as flautas de pã, os tubos de palheta
        e as famílias de tubos de órgão nos filtros.
    piston_application_type:
      name: Tipo de aplicação Piston
      description: Cargas/utilização prevista caixa interna do pistão (reposição vs
        desempenho/corrida vs pesados-encargos).
    piston_crown_dish_style:
      name: Estilo de coroa/prato do pistão
      description: 'Forma da cabeça do pistão que Influence o volume e a compressão
        da câmara de combustão (ex.: topo plano, cúpula, prato).'
    piston_pin_retention_type:
      name: Pistão marcado com um pino de retenção do tipo cliente
      description: Especifica a forma como o pino do pistão (marcado com "com") é
        retido no conjunto pistão/biela.
    pit_configuration:
      name: Configuração do fosso
      description: Define o formato estrutural da zona de desembarque (peça única
        versus múltiplosModules) e, por extensão, o número de secções ou Modules Supply.
    pit_cover_type:
      name: Tipo de cobertura do fosso
      description: Especifica a superfície ou folha protetora Supply com a vala, afetando
        a resistência aos pregos, a proteção contra as intempéries e as preferências
        do atleta.
    pitahaya_flesh_color:
      name: Pitahaya carne cor
      description: Especifica a cor da polpa interna da pitaya (fruta do dragão) (por
        exemplo, branca, vermelha, magenta), um diferencial fundamental que afeta
        o sabor, a aparência e a perceção nutricional.
    pitch_mat_coverage_length:
      name: comprimento da cobertura do tapete de campo
      description: Classifica o tapete do campo de críquete pela porção do postigo
        que cobre (por exemplo, campo inteiro ou meio campo).
    pitch_range:
      name: amplitude de lançamento
      description: Descreve a extensão/brilho percebido do som do chocalho.
    pitch_standard:
      name: Padrão de inclinação
      description: Especifica o padrão de afinação (afinação de referência) para o
        qual a flauta de bisel foi construída (por exemplo, A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Designação do tamanho da borracha de lançamento
      description: Indica a classificação padrão do tamanho do campo para a borracha
        de lançamento, simplificando a seleção sem exigir que o comprador saiba as
        medidas exatas.
    pitching_screen_style:
      name: Estilo de tela de arremesso
      description: Define o design estrutural da tela para que o comprador possa selecionar
        rapidamente o esquema de proteção correto para o seu cenário de treino.
    pitching_target_design:
      name: projeto de alvo de arremesso
      description: Classifica o estilo ou a configuração geral do alvo de lançamento.
    pitching_wheel_count:
      name: contagem de rodas de inclinação
      description: Indica o número de rodas de propulsão que uma máquina de lançamento
        utiliza.
    pivot_adjustability:
      name: Ajuste do pivô
      description: Indica se a tesoura possui um parafuso de pivot ajustável para
        regular a tensão de corte.
    pivot_piece_type:
      name: Tipo de peça pivotante
      description: Distingue entre diferentes interfaces de pivot disponibilizadas,
        como os tradicionais copos ou tubos.
    place_card_holder_closure_mechanism:
      name: Coloque o mecanismo de fecho do porta-cartões
      description: Especifica como o suporte segura ou fixa o cartão.
    place_card_orientation:
      name: Orientação do cartão de lugar
      description: Especifica a orientação do cartão de lugar quando utilizado/exibido.
    place_card_printing_status:
      name: Estado da impressão do cartão de lugar
      description: Indica se o cartão de lugar está em branco para escrita à mão/impressão,
        pré-impresso (nomes não personalizados) ou personalizado/impresso por encomenda.
    placket_type:
      name: Tipo de carcela
      description: Especifica o estilo da abertura frontal da camisa polo, incluindo
        a quantidade de botões ou fechos alternativos.
    planetarium_content_theme:
      name: Planetário Conteúdo tema
      description: Conteúdo principal apresentado pelo projetor do planetário.
    planetarium_projection_content_format:
      name: Projeção planetária Formato Conteúdo
      description: Especifica o mecanismo de projeção Conteúdo utilizado pelo planetário
        (discos/diapositivos físicos versus efeito digital/LED).
    plant_fiber_type:
      name: Tipo de fibra vegetal
      description: Tipo específico de fibraOrigin vegetal quando a fonte de fibra
        descontínua é vegetal.
    plaster_gauze_finish:
      name: Acabamento em gaze de gesso
      description: Tendência do acabamento superficial resultante após aplicação e
        alisamento.
    plaster_gauze_grade:
      name: Grau de gaze de gesso
      description: 'Grau de utilização pretendido da gaze gessada (ex.: Craft/estudantis
        vs. profissionais).'
    plaster_gauze_weave_density:
      name: Densidade da trama da gaze de gesso
      description: A abertura/fecho relativo da trama da gaze afeta a resistência
        e a capacidade de absorção do gesso.
    plastic_canvas_finish:
      name: Acabamento em tela plástica
      description: Tratamento de superfície/acabamento do rolo de lona plástica.
    plastic_canvas_sheet_finish:
      name: Acabamento da folha de tela plástica
      description: Tratamento da superfície/bordas da folha de tela plástica.
    plastic_canvas_transparency:
      name: Transparência da tela plástica
      description: Quão transparente/opaco é o tecido plástico?
    plate_bottom_design:
      name: design de fundo de prato
      description: Descreve a construção da parte inferior da placa, que afeta a tração,
        a estabilidade e a segurança em diferentes superfícies de jogo.
    plate_compatibility_standard:
      name: Norma de compatibilidade com discos
      description: 'Indica o padrão de anilhas para o qual a barra foi concebida (ex.:
        Olímpica 50 mm, Padrão 25 mm).'
    plate_installation_type:
      name: Tipo de instalação da placa
      description: Especifica a forma como a placa é fixada ou posicionada no campo
        (por exemplo, enterrada, com estacas, lançada para o solo), permitindo ao
        comprador escolher entre opções permanentes e portáteis.
    plate_size_category:
      name: Categoria de tamanho das plataformas
      description: Classifica o equipamento por nível de jogo ou padrão regulamentar,
        para que o comprador possa localizar rapidamente o equipamento compatível
        com a liga.
    play_dough_putty_kit_contents:
      name: Conteúdo do kit de plasticina e massa de modelar
      description: 'Identifica os principais componentes incluídos para além do próprio
        composto (ex.: ferramentas, moldes, extrusora, armazenamento).'
    play_dough_tool_set_items_included:
      name: Conjunto de ferramentas para modelar massa de modelar (artigo incluído)
      description: Identifica os tipos de ferramentas e acessórios incluídos num conjunto
        de ferramentas para massa de modelar (por exemplo, rolos, cortadores, moldes).
    play_environment_suitability:
      name: Adequação do ambiente de jogo
      description: 'Identifica o ambiente de jogo pretendido para o conjunto (ex.:
        interior, exterior, água).'
    play_food_features:
      name: Recursos de comida de brinquedo
      description: Características funcionais ou de realismo especiais do brinquedo
        alimentar.
    play_food_items_included:
      name: Artigo de comida de brinquedo incluído
      description: Indica os tipos de alimentos de brincar incluídos no conjunto de
        cozinha.
    play_food_size_scale:
      name: Comida de brincar expansão
      description: Indica a expansão aproximada do tamanho das peças de comida de
        brinquedo para compatibilidade com cozinhas de brinquedo, bonecas e conjuntos
        de brinquedos.
    play_money_set_components_included:
      name: Componentes incluídos no conjunto de dinheiro fictício
      description: Especifica que tipos de componentes estão incluídos no conjunto
        Dinheiro/bancário da peça.
    play_pattern:
      name: Forma de brincar
      description: A principal forma de utilização do brinquedo (por exemplo, para
        aliviar o stress/manipulação da inquietação, como escultura/arte para mesa,
        para construção ou como puzzle).
    play_sprinkler_mounting_type:
      name: Tipo de montagem do aspersor Play
      description: Como o aspersor de brinquedo é posicionado/fixado durante a utilização.
    play_vehicle_lights_and_sounds:
      name: Reproduza luzes e sons de veículos
      description: Indica se o veículo de brinquedo inclui efeitos eletrónicos, como
        luzes e/ou sons.
    play_vehicle_scale:
      name: Expansão de veículos de jogo
      description: Indica a taxa de expansão do veículo de brinquedo (comumente utilizada
        para veículos de brinquedo de metal fundido e modelos em miniatura).
    player_size_category:
      name: Categoria de tamanho do atleta
      description: Define a faixa etária/tamanho do jogador para a qual o conjunto
        de equipamento de recetor é adequado (por exemplo, Tee Ball, Juvenil, Intermédio,
        Adulto).
    player_size_range:
      name: Intervalo de tamanho do jogador
      description: Especifica a gama de tamanhos a que a pega/dispositivo de assistência
        se destina (por exemplo, criança, adulto, universal).
    playing_environment:
      name: Ambiente de jogo
      description: Especifica a superfície de jogo principal ou contexto para o qual
        a bola de hóquei foi concebida.
    playing_method:
      name: Método de jogo
      description: Principal forma de tocar/ativar o instrumento.
    playing_surface_material:
      name: Material da superfície de percussão
      description: Identifica o material da superfície frontal de execução do cajon
        (tapa), que afeta fortemente o timbre e a sensação ao tocar.
    playing_surface_type:
      name: Tipo de superfície de jogo
      description: Descreve a construção/sensação da superfície de jogo do tapete
        de treino.
    playset_activities_included:
      name: Atividades do conjunto de brinquedos incluídas
      description: Identifica as principais atividades/componentes lúdicos incluídos
        no baloiço/parque infantil para ajudar o comprador a filtrar pelo que as crianças
        conseguem fazer na estrutura.
    playset_installation_type:
      name: Tipo de instalação do conjunto de recreação
      description: Especifica como o baloiço/parque infantil é instalado ou fixado.
    playset_items_included:
      name: Itens incluídos no conjunto de brinquedos
      description: Identifica os tipos de artigos de faz-de-conta incluídos no conjunto
        de piquenique (comida, utensílios de mesa, manta, cesto, etc.).
    pliers_jaw_style:
      name: estilo de mandíbula de alicate
      description: Descreve a configuração principal das maxilas ou o estilo funcional
        do alicate.
    plum_variety:
      name: Variedade de ameixa
      description: Identifica a cultivar ou variedade específica de ameixa, permitindo
        ao comprador escolher com base no sabor, na textura e na utilização culinária
        pretendida.
    plumcot_variety:
      name: Variedade de ameixa
      description: 'Identifica a cultivar específica ou variedade comercial do ameixa-damasco
        (ex.: Flavor King, Dapple Dandy), que pode Influence o sabor, a cor e a sazonalidade.'
    plunger_mute_handle_type:
      name: Tipo de identificador de silenciador de desentupidor
      description: Especifica o identificador ou estilo de pegada utilizado para segurar
        e manipular um abafador de êmbolo para efeitos wah-wah.
    pocket_closure_type:
      name: Tipo de fecho do bolso
      description: Define a forma como cada bolso é fixado, ajudando os utilizadores
        a encontrar calças com armazenamento seguro durante a atividade.
    pocket_knife_opening_mechanism:
      name: mecanismo de abertura do canivete
      description: Como a lâmina é acionada/aberta (entalhe manual para unha, pino
        de abertura, aleta, assistida, automática, etc.).
    pocket_style:
      name: Estilo de bolso
      description: Especifica a construção do bolso principal presente nas calças.
    pocket_type:
      name: Tipo de bolso
      description: Identifica o estilo ou a presença de bolsos na peça de roupa.
    pod_retention_system:
      name: Sistema de retenção de clientes
      description: Descreve como os cartuchos de paintball são mantidos no lugar e
        libertados do arnês ou do pacote.
    pogo_stick_footrest_type:
      name: apoio para os pés tipo pula-pula
      description: Descreve o design da plataforma/apoio para os pés utilizado para
        estar de pé no pula-pula.
    pogo_stick_suspension_type:
      name: tipo de suspensão pogo stick
      description: Especifica o mecanismo de retorno do trampolim, incluindo a sensação
        Impact , a durabilidade e a manutenção.
    poi_handle_type:
      name: Tipo de cabo do poi
      description: Especifica o estilo de identificador/pegada/acessório utilizado
        para segurar o poi.
    poi_light_source:
      name: Fonte de luz Poi
      description: Para poi iluminados, especifique a tecnologia de iluminação.
    poi_tether_type:
      name: Tipo de tether Poi
      description: 'Indica o tipo de cabo que liga a cabeça do poi ao identificador,
        botão ou correia de pulso (ex.: corda, fio, corrente).'
    poi_type:
      name: Tipo Poi
      description: 'Especifica o tipo principal de construção/utilização do poi (ex.:
        prática, LED, fogo).'
    point_type:
      name: Tipo de ponto
      description: Forma/estilo da ponta utilizada na agulha de bordar.
    pointe_shoe_shank_length:
      name: Comprimento da palmilha das sapatilhas de ponta
      description: Parte do comprimento do sapato que a haste auxilia, como o comprimento
        total ou 3/4.
    pointe_shoe_shank_strength:
      name: resistência da haste da sapatilha de pontas
      description: Nível de rigidez da haste da sapatilha de pontas, que afeta a assistência
        e o tempo de adaptação.
    poker_accessory_storage_included:
      name: Arrumação para acessórios de poker incluído
      description: Indica para que item adicional de póquer o acessório oferece armazenamento
        dedicado.
    poker_chip_tray_rack_configuration:
      name: Configuração de tabuleiro/estante chip de poker
      description: Descreve o estilo de organização interna de um tabuleiro/estante
        chip (fileiras e capacidade por fila).
    pole_anchoring_method:
      name: Método de fixação do poste
      description: Define a forma como o poste está fixo ao solo ou à superfície de
        jogo.
    pole_basket_type:
      name: Tipo de ponta do bastão
      description: Classifica o estilo ou tamanho do cesto instalado perto da ponta
        do bastão de esqui, indicando as condições da neve pretendidas.
    pole_connection_system:
      name: Sistema de ligação de postes
      description: Identifica o mecanismo que une as secções da haste, como os sistemas
        de cordão elástico, rosca ou cubo, ajudando os utilizadores a avaliar a velocidade
        e a compatibilidade da configuração.
    pole_system_type:
      name: Tipo de sistema de varetas
      description: Descreve o sistema de assistência estrutural ou o estilo de montagem
        utilizado pela tenda (por exemplo, varetas de alumínio, tubos de ar insufláveis,
        montagem com bastões de caminhada).
    police_equipment_fitment:
      name: Equipamento policial
      description: Especifica a que equipamento policial o veículo está configurado
        ou pré-cablado para prestar assistência.
    police_vehicle_equipment_package:
      name: Pacote de equipamento para viaturas policiais
      description: Indica os equipamentos/acessórios específicos para uso policial
        incluídos no veículo tal como foi vendido.
    police_vehicle_light_siren_equipment:
      name: Equipamento de luzes/sirene para viaturas policiais
      description: Especifica quais os dispositivos de alerta de emergência que estão
        instalados na viatura policial.
    police_vehicle_upfit_level:
      name: Nível de adaptação das viaturas policiais
      description: Descreve que equipamentos/adaptações específicos da polícia estão
        instalados no camião.
    polish_formulation:
      name: Fórmula polaca
      description: Indica a base/química da formulação do polidor de escamas (não
        o método de aplicação).
    polish_purpose:
      name: objetivo polaco
      description: Resultado principal pretendido do polimento na superfície do instrumento.
    pollen_level:
      name: Nível de pólen
      description: Indica a quantidade/probabilidade de manchas de pólen da variedade
        de lírio.
    polymer_clay_firmness_level:
      name: Nível de firmeza da argila polimérica
      description: Firmeza/maciez relativa da massa de modelar antes da cozedura (trabalhabilidade).
    polymer_clay_translucency:
      name: Translucidez da argila polimérica
      description: Opacidade/transparência visual da argila polimérica após cura.
    pom_pom_handle_style:
      name: Estilo da pega do pompom
      description: Descreve o estilo ou a construção do identificador/pinça utilizado
        para segurar o pompom.
    pom_pom_trim_backing_tape_material:
      name: Material para forro/fita com acabamento em pompons
      description: Identifica o material da fita ou trança cosida à qual os pompons
        estão presos (a base da guarnição).
    pom_pom_type:
      name: Tipo de pompom
      description: Indica a presença e o tipo específico de pompom ou pompom no chapéu.
    pomegranate_product_form:
      name: Formato do produto de romã
      description: Descreve o formato físico em que é comercializado (fruto inteiro,
        sementes descascadas, sementes, sementes congeladas).
    pomegranate_variety:
      name: Variedade de romã
      description: Identifica a cultivar ou variedade específica da romã (por exemplo,
        Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Estilo de elástico de rabo de cavalo
      description: Descreve a construção específica ou o formato do elástico de cabelo
        para que o comprador possa escolher o estilo da sua preferência.
    popcorn_form:
      name: Formato de pipoca
      description: Indica o formato físico ou de preparação do produto de pipocas,
        como pronto a consumir, grão, pacote para micro-ondas, kit de temperos ou
        lata de presente.
    pork_rind_form:
      name: Formato dos torresmos
      description: Classifica o formato físico ou estilo dos snacks de torresmos (por
        exemplo, torresmos, torresmos estaladiços, torrados, em grânulos, etc.).
    portability_features:
      name: Características de portabilidade
      description: Enumera os elementos integrados que facilitam a deslocação, o transporte
        ou o armazenamento da espreguiçadeira.
    portability_frame_type:
      name: Portabilidade/Tipo de estrutura
      description: Se os sinos de orquestra são portáteis (tipo estrutura de campo)
        ou fixos (tipo estrutura de concerto).
    portable_electronic_game_features:
      name: Funcionalidades de jogos eletrónicos portáteis
      description: Principais funcionalidades de jogabilidade/equipamento suportadas
        pelo dispositivo.
    post_surgery_stage_suitability:
      name: Adequação à fase pós-cirúrgica
      description: Indica para que fase de recuperação (se existir) o fato foi concebido,
        informação importante para os compradores de modeladores corporais médicos.
    postage_stamp_format:
      name: Formato do selo postal
      description: Como o selo definitivo é oferecido/embalado (individual, par, tira,
        bloco, folha, caderneta, bobina, etc.).
    postmark_type:
      name: Tipo de carimbo postal
      description: Tipo de cancelamento/carimbo postal presente nos selos definitivos
        usados.
    potato_cut_style:
      name: Tipo de corte da batata
      description: Indica o tipo de corte ou preparação das batatas quando estas não
        são vendidas inteiras.
    potato_intended_use:
      name: Utilização prevista da batata
      description: Distingue as batatas destinadas ao consumo imediato das que se
        destinam a servir de batata-semente ou a produtos transformados congelados.
    potato_variety:
      name: Variedade da batata
      description: Especifica a cultivar/variedade das batatas, permitindo ao comprador
        encontrar tipos específicos como “Yukon Gold”, “Maris Piper” ou “Purple Majesty”.
    pottery_clay_firing_required:
      name: É necessária a cozedura da argila cerâmica
      description: Indica se o material requer cozedura em forno para atingir a dureza/acabamento
        final pretendido.
    pottery_slip_application_method:
      name: Método de aplicação do esmalte cerâmico
      description: Especifica a técnica de aplicação pretendida para o esmalte.
    pottery_slip_compatible_clay_body:
      name: Argila compatível com o esmalte cerâmico
      description: Indica o(s) tipo(s) de argila com o(s) qual(is) o esmalte foi concebido
        para combinar ou ser utilizado.
    pottery_slip_form:
      name: Forma do esmalte cerâmico
      description: Indica se o esmalte é vendido como um líquido pronto a usar ou
        como uma mistura seca/pó que requer mistura.
    pouch_design:
      name: Design da bolsa
      description: Descreve as características de construção ou melhorias da área
        da bolsa frontal.
    pouch_style:
      name: Estilo da bolsa
      description: Especifica o design da área da bolsa frontal, abordando o conforto,
        o apoio e as preferências estéticas.
    powdered_beverage_variety:
      name: Variedade de bebidas em pó
      description: Classifica o produto pelo tipo de bebida que prepara (por exemplo,
        limonada, bebida desportiva, batido de proteína).
    power_rack_style:
      name: Estilo de suporte de potência
      description: Especifica o design/configuração geral do suporte, ajudando os
        compradores a distinguir entre suportes completos, suportes parciais e variantes
        economizadoras de espaço.
    power_steering_fluid_formulation:
      name: Formulação do fluido de direção assistida
      description: A família geral de formulações do fluido (à base de ATF vs. hidráulico
        específico/CHF vs. universal), utilizada para filtragem de compatibilidade
        de alto nível.
    practice_mute_audio_output:
      name: Saída de áudio do silenciador de prática
      description: Especifica o tipo de ligação de saída de áudio disponível no silenciador
        de prática para monitorização e/ou gravação (comum em silenciadores de prática
        silenciosos/eletrónicos).
    practice_mute_intonation_impact:
      name: Impacto do silenciador de prática na afinação
      description: Descreve o efeito esperado na afinação ao utilizar o silenciador
        de prática.
    practice_mute_venting_valve_type:
      name: Tipo de ventilação/válvula do silenciador de prática
      description: Especifica se e como o silenciador de prática é ventilado ou se
        inclui uma válvula ajustável para alterar a resistência/volume.
    practice_pad_features:
      name: Características do pad de treino
      description: Destaca as características funcionais do silenciador de prática
        para além do tamanho/material.
    practice_pad_mounting_style:
      name: Tipo de montagem do pad de treino
      description: Indica como o pad de treino deve ser posicionado ou fixado durante
        a utilização.
    practice_pad_rebound_level:
      name: Nível de rebote do pad de treino
      description: Indica o rebote/resposta relativa do pad de treino em comparação
        com peles de bateria típicas.
    practice_pad_surface_configuration:
      name: Configuração da superfície do pad de treino
      description: Descreve se o pad possui uma ou várias superfícies de execução
        e se estas diferem em termos de sensação.
    pregnancy_stage_suitability:
      name: Adequação para a fase da gravidez
      description: Indica para que fase(s) da gravidez ou do pós-parto a peça foi
        concebida.
    preparation_state:
      name: Estado de preparação
      description: Indica o nível de preparação ou confeção necessário antes do consumo.
    preparation_style:
      name: Estilo de preparação
      description: Define o estado de corte ou de transformação das castanhas d'água
        no momento da venda (por exemplo, inteiras, fatiadas, assadas, congeladas).
    preservation_medium:
      name: Meio de conservação
      description: Especifica o líquido ou meio principal em que as azeitonas ou as
        alcaparras são conservadas (por exemplo, salmoura, azeite, vinagre).
    presser_foot_attachment_method:
      name: Método de fixação do calcador
      description: Indica como o calcador da máquina de costura se fixa ao suporte/haste
        do calcador (por exemplo, encaixe por pressão ou rosca), o que afeta a compatibilidade.
    pressure_gauge_type:
      name: Tipo de manómetro
      description: Indica o tipo de manómetro incluído na bomba de bicicleta, se existir.
    pressure_measurement_unit:
      name: Unidade de medição de pressão
      description: Indica a unidade utilizada para a leitura ou calibração do sensor
        de pressão, útil para comparar produtos e garantir a compatibilidade do manómetro/ECU.
    pressure_plate_balance_type:
      name: Tipo de equilíbrio da placa de pressão
      description: Indica se a placa de pressão é equilibrada internamente ou se requer/pressupõe
        um equilíbrio externo correspondente à configuração do motor/volante.
    pressure_plate_components_included:
      name: Componentes da placa de pressão incluídos
      description: O que está incluído na lista da placa de pressão?
    pressure_sensor_application:
      name: Aplicação do sensor de pressão
      description: Identifica o sistema do veículo/ponto de medição para o qual o
        sensor de pressão foi concebido.
    pressure_sensor_port_thread_standard:
      name: Norma da porta/rosca do sensor de pressão
      description: Especifica a norma mecânica da porta/rosca utilizada para instalar
        o sensor no sistema do veículo.
    pressurization_method:
      name: Método de pressurização
      description: Identifica a forma como a pressão é gerada ou mantida dentro do
        dispositivo.
    pretend_housekeeping_set_items_included:
      name: Itens incluídos no conjunto de brinquedos de limpeza
      description: Enumera os acessórios de limpeza incluídos no conjunto (por exemplo,
        esfregona, vassoura, pá do lixo, frasco pulverizador).
    pretend_play_electronic_features:
      name: Funcionalidades eletrónicas do brinquedo de faz-de-conta
      description: Funcionalidades eletrónicas/interativas incluídas no brinquedo
        de faz-de-conta.
    pretend_play_set_pieces_included:
      name: Peças incluídas no conjunto do brinquedo de faz-de-conta
      description: Adereços/componentes principais incluídos no conjunto do brinquedo
        de faz-de-conta (por exemplo, caixa registadora, comida de brincar, ferramentas).
    pretend_play_set_theme:
      name: Tema do conjunto do brinquedo de faz-de-conta
      description: Cenário/tema principal do brinquedo de faz-de-conta representado
        pelo produto (útil para a descoberta transversal em todas as crianças que
        brincam ao faz-de-conta).
    pretzel_coating:
      name: Cobertura do pretzel
      description: Identifica qualquer tempero ou cobertura exterior aplicado ao pretzel,
        abrangendo tanto as opções salgadas (com sal, temperadas) como as doces (chocolate,
        iogurte, caramelo).
    pretzel_shape:
      name: Forma do pretzel
      description: Especifica a forma física do pretzel (por exemplo, torcido, em
        forma de pau, em pedaços), um fator diferenciador fundamental que os clientes
        utilizam ao pesquisar ou filtrar.
    primary_component_material:
      name: Material principal
      description: Material principal do bloco do motor.
    primary_dish_application:
      name: Aplicação principal do prato
      description: Identifica o prato principal ou a preparação a que a massa se destina.
    primary_plant_base:
      name: Base vegetal principal
      description: Base vegetal principal. Indica o(s) principal(is) ingrediente(s)
        vegetal(is) utilizado(s) para criar a alternativa ao queijo.
    primary_plant_protein_source:
      name: Fonte principal de proteína vegetal
      description: Identifica o principal ingrediente vegetal que fornece proteína
        ao produto.
    primary_sweetener_source:
      name: Fonte principal de adoçante
      description: Identifica a planta ou matéria-prima da qual o xarope é derivado.
    print_placement:
      name: Posicionamento da impressão
      description: Indica onde o desenho/logótipo principal é posicionado na t-shirt.
    print_technique:
      name: Técnica de impressão
      description: Especifica o método de decoração/impressão utilizado no desenho
        da t-shirt.
    printable_canvas_intended_use:
      name: Utilização prevista da tela imprimível
      description: Aplicação principal para a qual a tela imprimível está otimizada.
    printable_fabric_format:
      name: Formato do tecido imprimível
      description: Especifica como o tecido de algodão imprimível é fornecido (folhas
        individuais ou rolo contínuo), o que afeta a alimentação da impressora e o
        fluxo de trabalho do projeto.
    prism_material:
      name: Material do prisma
      description: Especifica o material do próprio elemento ótico (o prisma), que
        afeta a clareza, a durabilidade e a resistência a riscos.
    prisoner_transport_configuration:
      name: Configuração para o transporte de detidos
      description: Especifica se e como a carrinha está configurada para o transporte
        de detidos.
    prisoner_transport_partition_type:
      name: Tipo de divisória para transporte de detidos
      description: Tipo de divisória/gaiola interior que separa os compartimentos
        dianteiro e traseiro.
    privacy_or_acoustic_feature:
      name: Características acústicas ou de privacidade
      description: Especifica elementos acústicos ou de privacidade integrados, como
        painéis divisórios, ecrãs acústicos ou compartimentos fechados.
    processing_state:
      name: Estado de processamento
      description: Se as penas foram esterilizadas/lavadas ou preparadas de outra
        forma para utilização em artesanato.
    produce_grade:
      name: Qualidade do produto
      description: Classifica o grau de qualidade atribuído ao kiwi com base no tamanho,
        na aparência e no estado.
    produce_growth_stage:
      name: Fase de crescimento do produto
      description: Especifica a fase de crescimento em que o produto é vendido (por
        exemplo, microverduras, folhas jovens, folhas maduras, planta viva, sementes).
    produce_washing_state:
      name: Estado de lavagem do produto
      description: Estado de lavagem do produto. Indica se as verduras foram lavadas
        e estão prontas a consumir.
    profile_shape:
      name: Perfil/forma
      description: Curvatura/perfil geral do prato (a inclinação com que se eleva
        da borda até à campânula).
    projectile_ammunition_type:
      name: Tipo de projétil/munição
      description: Especifica o tipo de projéteis ou consumíveis utilizados pela arma
        de brincar, se aplicável.
    projectile_finish:
      name: Acabamento do projétil
      description: Especifica qualquer revestimento de superfície aplicado ao BB,
        que contribua para a resistência à corrosão ou para a visibilidade (por exemplo,
        revestido a cobre, zincado, pintado).
    projectile_type:
      name: Tipo de projétil
      description: Identifica o tipo de projétil que o produto utiliza ou para o qual
        foi concebido.
    pronation_support:
      name: Suporte à pronação
      description: Indica o tipo de marcha ou padrão de pronação para o qual o ténis
        foi concebido.
    propellant_type:
      name: Tipo de propulsor
      description: Especifica o propulsor para o qual a peça ou o acessório foi concebido.
    propeller_blade_cup:
      name: Curvatura da lâmina da hélice
      description: Indica o grau de curvatura (curvatura da borda traseira) das lâminas.
    propeller_hub_type:
      name: Tipo de cubo da hélice
      description: Especifica o sistema de cubo/bucha utilizado pela hélice (kits
        de cubos substituíveis vs. encaixados a pressão).
    propeller_rotation:
      name: Rotação da hélice
      description: Especifica o sentido de rotação de uma hélice.
    protectant_formula_base:
      name: Base da fórmula do protetor
      description: Especifica a formulação de base do protetor, que influencia o brilho,
        o toque e a facilidade de limpeza (por exemplo, à base de água vs. à base
        de solvente).
    protection_coverage_area:
      name: Área de cobertura da proteção
      description: Identifica quais as partes do relógio que o acessório de proteção
        cobre.
    protection_level:
      name: Nível de proteção
      description: Indica o nível de proteção pretendido pela caixa interior para
        o transporte e armazenamento do relógio.
    protective_case_interior_protection_type:
      name: Tipo de proteção interior da caixa de proteção
      description: Descreve o principal método de proteção interior utilizado para
        fixar e amortecer o conteúdo.
    protective_case_shell_type:
      name: Tipo de estrutura exterior da caixa de proteção
      description: Identifica o estilo geral de construção do exterior da caixa (rigidez)
        que afeta a proteção contra esmagamento e a portabilidade.
    protective_contact_padding_material:
      name: Material de acolchoamento de contacto protetor
      description: Material utilizado nos pontos de contacto do instrumento (inserto
        do garfo/campânula) para evitar riscos (por exemplo, feltro, borracha).
    protective_cup_configuration:
      name: Configuração do copo protetor
      description: Especifica se um copo protetor está incluído, se é removível ou
        se a peça de vestuário apenas possui um bolso para guardar um copo.
    protective_eyewear_standard_compliance:
      name: Conformidade com as normas para óculos de proteção
      description: Especifica as normas ou certificações de segurança ou resistência
        ao impacto que os óculos cumprem ou excedem para utilização desportiva.
    protective_gear_certification_standard:
      name: Norma de certificação do equipamento de proteção
      description: 'Indica a norma de segurança/certificação que o equipamento cumpre
        (varia consoante o tipo item: normas para capacetes, normas para fatos de
        treino, normas para proteções contra impactos).'
    protective_gear_items_included:
      name: Itens de equipamento de proteção incluídos
      description: Enumera as peças individuais contidas num conjunto de equipamento
        de proteção composto por várias peças.
    protective_gear_padding_type:
      name: Tipo de acolchoamento do equipamento de proteção
      description: Especifica o tipo de acolchoamento utilizado no equipamento de
        proteção para proteção contra impactos.
    protective_gear_safety_certifications:
      name: Certificações de segurança do equipamento de proteção
      description: Enumera as normas de segurança ou desempenho específicas para o
        desporto reconhecidas que o produto cumpre, tais como as normas NOCSAE ou
        ASTM para capacetes de hóquei em campo.
    protective_pad_components_included:
      name: Componentes de almofadas de proteção incluídos
      description: Especifica quais os itens de proteção específicos incluídos num
        conjunto de várias peças, para que os compradores saibam exatamente quais
        as partes do corpo que estão protegidas.
    protective_shorts_intended_use:
      name: Utilização prevista dos calções de proteção
      description: Modalidade principal de ciclismo/competição para a qual os calções
        de proteção foram concebidos.
    protective_shorts_padding_type:
      name: Tipo de acolchoamento dos calções de proteção
      description: Especifica a construção/formato dos elementos de proteção utilizados
        nos calções.
    protective_shorts_padding_zones:
      name: Zonas de acolchoamento dos calções de proteção
      description: Identifica as áreas do corpo que possuem acolchoamento/proteção
        integrada nos calções de proteção.
    protective_treatment:
      name: Tratamento de proteção
      description: Especifica qualquer acabamento ou tratamento de proteção aplicado
        para resistência a manchas, água ou raios UV (por exemplo, Teflon).
    protector_coverage_area:
      name: Área de cobertura do protetor
      description: Especifica quais as áreas do tronco que o protetor foi concebido
        para cobrir (por exemplo, peito, costas, laterais).
    puck_bottom_style:
      name: Estilo da base do disco
      description: Descreve o perfil da parte inferior do disco, que influencia a
        velocidade e o controlo em diferentes superfícies de shuffleboard.
    puck_type:
      name: Tipo de disco
      description: Classifica o estilo funcional ou a utilização pretendida do disco
        de hóquei, desde jogos oficiais a artigos de coleção.
    pull_buoy_style:
      name: Estilo da bóia de treino
      description: Indica o estilo funcional ou a configuração da bóia de treino,
        como padrão, de tornozelo ou combinação pull-kick.
    pull_through_weight_material:
      name: Material de peso de passagem
      description: Para escoadores pull-through, identifica o material do peso utilizado
        para guiar o escoador através do instrumento.
    pulp_content:
      name: Teor de polpa
      description: Indica a quantidade de polpa de fruta ou vegetal presente na bebida.
    pump_accessories_included:
      name: Acessórios da bomba incluídos
      description: Enumera itens adicionais fornecidos com a bomba de leite para que
        os compradores possam compreender o conteúdo do pacote.
    pumping_compatibility:
      name: Compatibilidade com a extração de leite
      description: Indica se o sutiã de amamentação foi concebido para a extração
        de leite sem mãos, bem como para a amamentação.
    punch_pad_type:
      name: Tipo de saco de treino
      description: Especifica o design ou estilo de uma saco de treino para que os
        compradores possam escolher o saco adequada às suas necessidades de treino.
    punching_training_bag_shape:
      name: Forma do saco de treino
      description: Especifica a forma geométrica do saco de treino, ajudando os compradores
        a escolher modelos adequados a exercícios de golpe específicos (por exemplo,
        uppercuts, golpes no corpo).
    puncture_protection_technology:
      name: Tecnologia de proteção contra furos
      description: Enumera quaisquer camadas anti-furo exclusivas ou genéricas ou
        tecnologias de reforço das paredes laterais/carcaça incorporadas no pneu (por
        exemplo, EXO, SnakeSkin, cinto de Kevlar).
    puppet_features:
      name: Características do boneco
      description: Destaca as características funcionais ou de desempenho do boneco
        (por exemplo, boca móvel, efeitos sonoros, reversível).
    puppet_puppet_theater_accessory_type:
      name: Tipo de marioneta e acessório para teatro de marionetas
      description: Especifica que tipo de acessório é o produto (por exemplo, adereço
        de palco, fato de boneco, barra de controlo, corda de substituição).
    purity_unit:
      name: Unidade de pureza
      description: Como a pureza é expressa para a moeda (fineness vs. quilates).
    push_up_bar_design:
      name: Design de barra de flexões
      description: Indica o estilo funcional das barras de flexões (por exemplo, fixas,
        giratórias, paralelas).
    pushrod_end_type:
      name: Tipo de extremidade da haste de impulso
      description: Especifica o tipo de extremidade/fixação da haste de impulso utilizada
        na interface do pedal ou do cilindro mestre.
    putty_glow_activation_method:
      name: Método de ativação do brilho da massa modelável
      description: Como a massa modelável é carregada/ativada para brilhar (por exemplo,
        luz solar, luz UV/luz negra).
    putty_glow_color:
      name: Cor do brilho da massa modelável
      description: Identifica a cor que a massa emite quando brilha no escuro.
    putty_inclusions:
      name: Inclusões na massa
      description: Ingredientes notáveis incluídos na mistura da massa (por exemplo,
        purpurina, confetes, esferas de espuma).
    putty_texture:
      name: Textura da massa
      description: Comportamento principal ao manusear a massa (por exemplo, elástica,
        maleável, semelhante a um líquido).
    puzzle_accessory_features:
      name: Características dos acessórios para puzzles
      description: Características funcionais e elementos de design de acessórios
        para quebra-cabeças (varia de acordo com o tipo de acessório).
    pyrometric_cone_range:
      name: Intervalo de cones pirométricos
      description: O(s) cone(s) pirométrico(s) recomendado(s) para o qual o esmalte
        foi formulado para ser cozido (por exemplo, Cone 06–04, Cone 5–6).
    quarter_panel_coverage_type:
      name: Tipo de cobertura do painel lateral
      description: Especifica a área do painel lateral que o produto substitui/repara.
    quarter_panel_set_contents:
      name: Conteúdo do conjunto do painel lateral
      description: Especifica a configuração do pacote de painéis laterais incluída
        na lista (um único painel, um par ou com secções de reparação adicionais).
    quilting_ruler_markings:
      name: Marcações da régua de acolchoado
      description: Especifica os tipos de marcações impressas na régua de acolchoado
        utilizada para cortar/alinhar.
    quilting_ruler_non_slip_feature:
      name: Característica antiderrapante da régua de acolchoado
      description: Indica se a régua inclui um revestimento antiderrapante ou um tratamento
        de superfície para reduzir o deslizamento sobre o tecido.
    quilting_ruler_transparency:
      name: Transparência da régua de acolchoado
      description: Indica a transparência/visibilidade do material da régua para ver
        o tecido e as marcações por baixo.
    quilting_thread_usage:
      name: Utilização da linha de acolchoar
      description: Indica a aplicação de acolchoado prevista para a linha (como se
        destina a ser utilizada).
    quilting_thread_weight_system:
      name: Sistema de classificação do peso da linha de acolchoar
      description: Especifica o sistema de classificação do tamanho/peso da linha
        utilizado para expressar a espessura da linha (por exemplo, wt, Tex, Denier),
        para que o tamanho numérico possa ser interpretado corretamente.
    quince_variety:
      name: Variedade de marmelo
      description: Identifica a cultivar ou variedade específica de marmelo, uma vez
        que o sabor, o aroma e a adequação culinária podem variar consoante a variedade.
    quinoa_variety:
      name: Variedade da quinoa
      description: Identifica a cor ou variedade específica da quinoa, uma vez que
        as diferentes variedades têm sabores, texturas e tempos de cozedura distintos.
    quinto_tuning_system:
      name: Sistema de afinação do quinto
      description: Como o quinto é ajustado/tensionado.
    race_car_class:
      name: Classe do carro de corrida
      description: Classe/categoria de competição para a qual o carro foi construído
        (conjunto de regras/grupo de homologação).
    racing_balaclava_face_opening_style:
      name: Estilo da abertura facial da balaclava de corrida
      description: A configuração da abertura facial da balaclava, que afeta o ajuste
        do capacete, a vedação e o conforto.
    racing_balaclava_neck_coverage_length:
      name: Comprimento da cobertura do pescoço da balaclava de corrida
      description: O comprimento da cobertura da saia/drapeado do pescoço, concebido
        para ser enfiado no fato/sistema de retenção do pescoço para vedação e proteção.
    racing_balaclava_ventilation_zones:
      name: Zonas de ventilação da balaclava de corrida
      description: Localização de zonas designadas como respiráveis/em malha ou ventiladas
        para melhorar o fluxo de ar sob o capacete.
    racing_chest_guard_intended_use:
      name: Utilização prevista do protetor de peito de corrida
      description: Modalidade ou contexto principal do desporto motorizado para o
        qual o protetor de peito foi concebido.
    racing_chest_guard_size_type:
      name: Tipo de tamanho do protetor de peito de corrida
      description: Indica se o produto é dimensionado para jovens, adultos ou se é
        universal/ajustável.
    racing_glove_certification_standard:
      name: Norma de certificação das luvas de corrida
      description: Especifica a certificação/norma de segurança a que as luvas de
        corrida cumprem (por exemplo, FIA, SFI, CE) e, opcionalmente, a classificação/nível,
        quando aplicável.
    racing_goggles_lens_system:
      name: Sistema de lentes dos óculos de corrida
      description: Especifica o sistema de substituição de lentes/lentes destacáveis
        compatível com os óculos.
    racing_helmet_certification_standard:
      name: Norma de certificação dos capacetes de corrida
      description: As certificações de segurança que o capacete de corrida cumpre.
    racing_kart_brake_type:
      name: Tipo de travão do kart de corrida
      description: Tipo de sistema de travagem principal instalado no kart.
    racing_kart_class:
      name: Classe do kart de corrida
      description: Classe de competição ou regulamento ao qual o kart foi concebido
        para cumprir.
    racing_kart_frame_material:
      name: Material do quadro do kart de corrida
      description: Material principal do quadro/chassis do kart.
    racing_kart_seat_size:
      name: Tamanho do assento do kart de corrida
      description: Designação do tamanho do assento do kart utilizada para o ajuste.
    racing_neck_support_style:
      name: Estilo de apoio para o pescoço de corrida
      description: Estilo estrutural do apoio/suspensório para o pescoço de corrida
        e a forma como este interage com o tronco/capacete do piloto.
    racing_suit_certification_standard:
      name: Norma de certificação dos fatos de corrida
      description: Especifica a certificação/homologação de segurança de competição
        que o fato cumpre (por exemplo, normas FIA ou SFI).
    racing_suit_cuff_design:
      name: Design dos punhos do fato de corrida
      description: Tipo de punho de tornozelo/pulso utilizado para interagir com as
        luvas/botas e melhorar a vedação/conforto.
    racing_suit_size_system:
      name: Sistema de tamanhos dos fatos de corrida
      description: Sistema de tamanhos utilizado para o fato (por exemplo, Alpha S-XXL,
        numérico UE/EUA, Júnior).
    racing_truck_discipline:
      name: Modalidade de corridas de camiões
      description: Especifica a principal modalidade/formato de corrida em que o camião
        foi concebido para competir.
    rack_side_configuration:
      name: Configuração lateral do suporte
      description: Indica se o suporte armazena tapetes num dos lados ou em ambos
        os lados, o que afeta a eficiência do espaço e o acesso.
    rack_system_configuration:
      name: Configuração do sistema de suporte
      description: Descreve o esquema/forma geral do sistema de suporte para tambores.
    racket_dampener_type:
      name: Tipo de amortecedor de raquete
      description: Especifica o mecanismo de instalação ou o estilo funcional do amortecedor
        de vibrações da raquete.
    racket_grip_size:
      name: Tamanho do punho da raquete
      description: Especifica a classificação de tamanho do punho da raquete com base
        na circunferência (por exemplo, G1–G6) para garantir um ajuste adequado à
        mão e conforto.
    racket_sport_shoe_court_surface:
      name: Superfície do campo para calçado de ténis
      description: Especifica a superfície do campo de ténis para a qual o calçado
        foi concebido ou otimizado, ajudando os jogadores a selecionar calçado com
        o padrão de sola e o composto de borracha adequados para a sua superfície
        de jogo habitual.
    racket_string_pattern:
      name: Padrão de cordas da raquete
      description: Especifica o número de cordas verticais e horizontais no encordoamento
        (por exemplo, 16 x 18), o que influencia o controlo, o efeito e a durabilidade.
    racket_stringing_status:
      name: Estado do encordoamento da raquete
      description: Indica se a raquete é vendida encordoada, sem cordas ou pré-encordoada.
    racket_weight_class:
      name: Classe de peso da raquete
      description: Apresenta as categorias de peso padrão "U" do badminton, permitindo
        aos jogadores selecionar raquetes dentro do seu intervalo de peso preferido.
    racquet_toy_set_equipment_included:
      name: Conjunto de raquetes de brincar com todo o equipamento incluído
      description: Enumera os itens incluídos no brinquedo ou conjunto (por exemplo,
        rede, bolas, raquetes).
    racquetball_squash_training_aid_type:
      name: Tipo de equipamento de treino para racquetball e squash
      description: Classifica o tipo específico de equipamento de treino ou acessório
        para que os compradores possam localizar rapidamente o item de que necessitam.
    radiator_cap_gasket_material:
      name: Material da junta da tampa do radiador
      description: Material da(s) junta(s) de vedação utilizada(s) na tampa do radiador.
    radiator_cap_pressure_relief_style:
      name: Tipo de alívio de pressão da tampa do radiador
      description: Especifica o tipo de alívio de pressão/ventilação/acionamento da
        tampa do radiador, o que pode afetar o manuseamento, a segurança e a aplicação
        pretendida.
    radiator_expansion_tank_cap_application:
      name: Aplicação da tampa do radiador/depósito de expansão
      description: Identifica se a tampa se destina a um bocal de enchimento do radiador
        ou a um depósito de expansão/transbordamento do líquido de arrefecimento.
    radiator_fan_control_type:
      name: Tipo de controlo do ventilador do radiador
      description: Especifica como o ventilador do radiador é controlado/acionado.
    radiator_fan_mounting_pattern:
      name: Padrão de montagem do ventilador do radiador
      description: Especifica o estilo/padrão de montagem utilizado para fixar o ventilador
        ou o conjunto do ventilador.
    radiator_fan_type:
      name: Tipo de ventilador do radiador
      description: Especifica o tipo funcional/configuração do conjunto do ventilador
        do radiador.
    radiator_hose_end_type:
      name: Tipo de extremidade da mangueira do radiador
      description: Especifica o estilo de ligação/vedação principal utilizado nas
        extremidades da(s) mangueira(s) do radiador para fazer a ligação com as portas
        do radiador/motor.
    radiator_hose_position:
      name: Posição da mangueira do radiador
      description: Posição funcional/tipo da mangueira do radiador no interior do
        sistema de refrigeração.
    radiator_hose_shape:
      name: Forma da mangueira do radiador
      description: Geometria geral da mangueira/fator de forma utilizado para o traçado
        e montagem da instalação.
    radiator_overflow_tank_level_sensor_provision:
      name: Previsão para o sensor de nível do reservatório de compensação do radiador
      description: Indica se o reservatório inclui ou suporta um sensor de nível do
        líquido de refrigeração.
    radiator_overflow_tank_shape:
      name: Forma do reservatório de expansão do radiador
      description: Fator de forma geral do corpo do reservatório de transbordamento.
    radish_variety:
      name: Variedade do rabanete
      description: Especifica a variedade ou o tipo de rabanete, para que os clientes
        possam escolher características específicas de sabor, cor ou tamanho (por
        exemplo, daikon, melancia, french breakfast).
    radius_of_hollow:
      name: Raio do recuo
      description: Especifica o perfil de recuo da lâmina produzido pelo afiador,
        expresso em tamanhos discretos comuns ou como plano.
    rail_coverage_configuration:
      name: Configuração da cobertura dos trilhos
      description: Indica que parte(s) da estrutura o conjunto de cobertura protege,
        esclarecendo se a compra é um único painel frontal ou um conjunto perimetral
        composto por várias peças.
    rail_mount_standard:
      name: Norma de montagem em trilhos
      description: Identifica o padrão do trilho ou da interface de montagem usado
        para fixar um acessório (por exemplo, mira, lanterna) a uma arma de BB.
    rail_side:
      name: Lado do trilho
      description: Indica se o trilho de substituição é para o lado esquerdo, lado
        direito ou vendido em par.
    rail_style:
      name: Estilo do trilho
      description: Categoriza o design geral ou a configuração do trilho (por exemplo,
        em A, arco-íris, dobrado), o que determina as possibilidades de manobras e
        o espaço necessário.
    rail_system:
      name: Sistema de trilhos
      description: Identifica a interface de montagem de acessórios presente na arma
        (por exemplo, Picatinny, M-LOK).
    rain_sensor_technology:
      name: Tecnologia do sensor de chuva
      description: O princípio de deteção utilizado para detetar água no para-brisas.
    rain_suit_configuration:
      name: Configuração do fato impermeável
      description: Identifica se o produto é um fato de uma peça, um conjunto de várias
        peças ou outra configuração.
    rainstick_construction_type:
      name: Tipo de construção do bastão de chuva
      description: Descreve como o bastão de chuva é construído (tubo tradicional
        de cacto/madeira vs. alternativas modernas).
    rainstick_fill_material:
      name: Material de enchimento do bastão de chuva
      description: Especifica o enchimento interno utilizado para criar o som em cascata
        (por exemplo, sementes, contas).
    rainstick_playing_technique:
      name: Técnica de execução do bastão de chuva
      description: Indica a(s) técnica(s) de execução recomendada(s) ou o estilo de
        manuseamento utilizado para produzir o efeito pretendido num bastão de chuva.
    rainstick_sound_character:
      name: Característica sonora do bastão de chuva
      description: Descreve a característica sonora global produzida pelo bastão de
        chuva.
    raising_method:
      name: Método de criação
      description: Descreve como os animais foram criados e engordados antes do abate
        (por exemplo, alimentados com pastagem, criados em pastagens, engordados com
        cereais).
    rally_competition_class:
      name: Categoria da competição de rali
      description: Organismo regulador ou regulamento ao qual o carro de rali está
        sujeito (quando conhecido).
    rally_surface_setup:
      name: Configuração da superfície do rali
      description: Superfície/terreno principal para o qual a configuração ou construção
        do carro de rali se destina.
    ramp_surface_texture:
      name: Textura da superfície da rampa
      description: Descreve o acabamento ou o nível de aderência da superfície de
        rolamento da rampa.
    ratchet_mounting_style:
      name: Tipo de montagem da catraca
      description: A forma como a catraca musical é segurada ou montada durante a
        utilização ou a montagem.
    rattle_element_material:
      name: Material do elemento sonoro
      description: Material dos elementos sonoros (por exemplo, dentes/sinos/contas)
        que produzem o zumbido ou chocalho característico.
    rattle_type:
      name: Tipo de catraca
      description: Indica se a isca contém uma catraca interna ou uma câmara sonora
        e, em caso afirmativo, o tipo de catraca utilizada.
    rc_airship_lifting_gas_type:
      name: Tipo de gás de sustentação do dirigível de controlo remoto
      description: Indica com que gás se destina a ser enchida a envoltura do dirigível/balão
        (se aplicável).
    rc_helicopter_control_frequency:
      name: Frequência de controlo do helicóptero de controlo remoto
      description: A banda de frequência de rádio utilizada entre o controlador e
        o helicóptero, que afeta a resistência à interferência e a compatibilidade
        (por exemplo, 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Funcionalidades de estabilização do helicóptero de controlo remoto
      description: Enumera as funcionalidades de assistência à estabilidade/controlo
        que facilitam o voo ou aumentam a capacidade.
    rc_motorcycle_controller_type:
      name: Tipo de comando para motos radiocontroladas
      description: Formato do controlador incluído.
    rc_plane_takeoff_launch_method:
      name: Método de descolagem/lançamento do avião de controlo remoto
      description: Como o avião é normalmente lançado/descolado, o que influencia
        onde e como pode ser utilizado.
    rc_vehicle_controller_type:
      name: Tipo de controlador do veículo de controlo remoto
      description: Especifica o formato do controlador utilizado para operar o veículo
        RC.
    rc_vehicle_scale:
      name: Escala do veículo radiocontrolado
      description: Especifica a escala (classe de tamanho) do carro/camião de controlo
        remoto (por exemplo, 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Tipo de terreno do veículo de controlo remoto
      description: Indica o terreno principal para o qual o carro/camião de controlo
        remoto foi concebido.
    reach_adjustment_type:
      name: Tipo de ajuste do alcance
      description: Indica se a distância entre a alavanca e o guiador pode ser ajustada
        e, caso seja ajustável, se o ajuste é feito sem ferramentas ou requer o uso
        de uma ferramenta.
    rear_axle_spacing:
      name: Distância entre eixos traseiros
      description: Tamanho do encaixe/eixo que a parte traseira do quadro está concebida
        para aceitar, o que afeta a compatibilidade das rodas.
    rear_axle_standard:
      name: Norma do eixo traseiro
      description: Define a interface/formato do eixo utilizado pela roda traseira
        (por exemplo, fecho rápido, vários tamanhos de eixo passante).
    rear_axle_type:
      name: Tipo de eixo traseiro
      description: Especifica o sistema de fixação e o diâmetro do eixo utilizados
        para fixar a roda traseira ao quadro.
    rear_coverage:
      name: Cobertura traseira
      description: Especifica a área das nádegas que o biquíni cobre (por exemplo,
        cheeky, completa).
    rear_opening_type:
      name: Tipo de abertura traseira
      description: Descreve o estilo de acesso traseiro ou a característica da "aba
        traseira" para uma utilização conveniente na casa de banho, como assento rebatível
        ou fecho de correr traseiro completo.
    rear_seat_configuration:
      name: Configuração do assento traseiro
      description: Especifica a configuração do conjunto do assento traseiro para
        apoiar a montagem e a seleção do esquema interior.
    rear_view_mirror_ornament_attachment_type:
      name: Tipo de fixação do ornamento do espelho retrovisor
      description: Especifica como o ornamento se fixa à haste ou à caixa do espelho
        retrovisor (por exemplo, laço de cordão, clipe, gancho).
    rearview_mirror_mount_attachment_type:
      name: Tipo de fixação do suporte do espelho retrovisor
      description: Define como o suporte se fixa fisicamente ao conjunto do espelho
        retrovisor (corpo ou haste do espelho), como braçadeira, clipe, cinta, almofada
        adesiva ou suporte aparafusado.
    rebound_board_face_type:
      name: Tipo de superfície de rebote
      description: Descreve a configuração da superfície que determina o comportamento
        de rebote, como designs planos, inclinados ou multifacetados.
    rebound_level:
      name: Nível de rebote
      description: Indica a intensidade com que a bola de parede ricocheteia após
        o impacto, ajudando os utilizadores a escolher entre designs sem rebote e
        com rebote moderado.
    rebound_surface_configuration:
      name: Configuração da superfície de rebote
      description: Especifica o esquema das superfícies de rebote e a previsibilidade
        dos rebotes (de um, dois ou vários lados; previsível vs. imprevisível).
    rebounder_design:
      name: Design do rebatedor
      description: Define o estilo estrutural ou a configuração da superfície de ressalto
        do produto.
    rebounder_design_type:
      name: Tipo de design do rebatedor
      description: Especifica o mecanismo de ressalto principal ou o estilo de construção
        do aparelho de treino (por exemplo, base com corda elástica, rede com estrutura,
        alvo pop-up).
    rebounder_sides:
      name: Lados do rebatedor
      description: Indica se o rebatedor pode devolver bolas de um lado ou de ambos
        os lados.
    rebounding_mechanism_type:
      name: Tipo de mecanismo de ressalto
      description: Especifica a tecnologia utilizada para devolver o disco ou a bola
        (por exemplo, amortecedor de borracha, corda elástica).
    recipient_relationship:
      name: Relação com o destinatário
      description: Relação pretendida com o destinatário (por exemplo, mãe, pai, amigo)
        do cartão de felicitações.
    recliner_control_type:
      name: Tipo de comando da poltrona reclinável
      description: Especifica como o mecanismo de reclinação é acionado (por exemplo,
        alavanca manual, painel de botões elétricos, comando à distância).
    recliner_motion_type:
      name: Tipo de movimento da poltrona reclinável
      description: Define a principal capacidade de movimento da poltrona reclinável
        (por exemplo, balancim, deslizante, giratória, encostada à parede, elevatória).
    reclining_mechanism:
      name: Mecanismo de reclinação
      description: Especifica o mecanismo utilizado para acionar a função de reclinação
        do sofá.
    recommended_candle_format:
      name: Formato de vela recomendado
      description: Indica o(s) formato(s) de vela recomendado(s) para o(s) qual(is)
        estas etiquetas autoadesivas para pavios se destinam.
    recommended_container_type:
      name: Tipo de recipiente recomendado
      description: Materiais de recipiente recomendados/seguros para velas de cera
        em gel.
    recommended_fabric_type:
      name: Tipo de tecido recomendado
      description: Tecido(s) recomendado(s) para obter os melhores resultados com
        o molde de costura.
    recommended_fabric_weight:
      name: Gramagem recomendada do tecido
      description: Indica a categoria de gramagem recomendada do tecido para o molde.
    recommended_food_pairing:
      name: Harmonização alimentar recomendada
      description: Identifica as principais proteínas ou pratos para os quais o molho
        se destina (por exemplo, frango, porco, vaca, peixe, legumes).
    recommended_lane_condition:
      name: Condições recomendadas da pista
      description: Indica o padrão de óleo ou as condições da pista para as quais
        a bola foi concebida.
    recommended_motor_impulse_class:
      name: Classe de impulso do motor recomendada
      description: Especifica a classe de impulso total recomendada para o motor do
        foguetão modelo, para um voo seguro/ótimo.
    recommended_reading_level:
      name: Nível de leitura recomendado
      description: Indica o nível de leitura/capacidade recomendado para o produto,
        para ajudar os compradores a adequá-lo ao desenvolvimento atual da leitura
        da criança.
    recommended_sleep_position:
      name: Posição recomendada para dormir
      description: Indica as posições em que o colchão foi concebido para proporcionar
        um descanso confortável (por exemplo, para quem dorme de lado ou de costas).
    recommended_storage:
      name: Armazenamento recomendado
      description: Indica como o produto deve ser armazenado para manter a frescura.
    recommended_surfaces:
      name: Superfícies recomendadas
      description: Especifica as superfícies de colagem/categorias de materiais pretendidas
        para a cola, para além da compatibilidade geral com trabalhos manuais (por
        exemplo, apenas papel vs. múltiplas superfícies).
    recommended_use_case:
      name: Utilização recomendada
      description: Cenário de utilização principal pretendido para o selante (reparação
        temporária/de emergência vs. reparação a longo prazo).
    recommended_use_location:
      name: Local de utilização recomendado
      description: Ambiente previsto para o baloiço (quintal doméstico vs. parque
        infantil comercial, etc.).
    recommended_vehicle_surfaces:
      name: Superfícies de veículos recomendadas
      description: Especifica as superfícies/acabamentos de veículos para os quais
        o pincel foi concebido para ser seguro (por exemplo, pintura com verniz transparente,
        pintura mate/acetinada, revestimento de vinil/PPF, vidro, jantes).
    recorder_accessories_included:
      name: Acessórios da flauta de bísel incluídos
      description: Enumera os acessórios incluídos na embalagem do ótimo gravador
        de baixo.
    recorder_bore_design:
      name: Design do diâmetro interno da flauta
      description: O perfil do diâmetro interno do corpo da flauta.
    recorder_bore_type:
      name: Tipo de diâmetro interno da flauta de bísel
      description: Especifica o tipo de diâmetro da flauta.
    recorder_case_shell_type:
      name: Tipo de estrutura do corpo da flauta
      description: Descreve a rigidez estrutural do corpo.
    recorder_finish:
      name: Acabamento da flauta
      description: Acabamento/tratamento da superfície do corpo da flauta (especialmente
        relevante para flautas altistas de madeira).
    recorder_hole_type:
      name: Tipo de orifícios da flauta
      description: Se os orifícios de afinação são simples (sem orifícios duplos)
        ou incluem orifícios duplos para melhorar as dedilhaduras cromáticas.
    recorder_joint_configuration:
      name: Configuração das juntas da flauta
      description: Descreve quantas secções o corpo da flauta possui, o que afeta
        a portabilidade, a limpeza e a substituição de peças.
    recorder_joint_style:
      name: Estilo das juntas da flauta
      description: O estilo de junção/ligação entre as secções da flauta, se aplicável.
    recorder_keywork:
      name: Mecanismo de chaves da flauta
      description: Indica se a flauta inclui chaves (mecanismos de metal/plástico)
        para notas graves, típicas em flautas tenor/baixo/grandes.
    recorder_mouthpiece_type:
      name: Tipo de boquilha da flauta de bísel
      description: Descreve se o bocal/ponta da flauta é integrado (de uma só peça)
        ou removível/intercambiável.
    recorder_pitch_standard_a4:
      name: Norma de afinação da flauta (A4)
      description: Indica a referência de afinação para a qual a flauta foi construída
        (por exemplo, afinação moderna A=440 Hz vs. afinação barroca A=415 Hz).
    recorder_thumb_hole_type:
      name: Tipo de orifício para o polegar da flauta de bísel
      description: Especifica se a flauta tem um único orifício para o polegar ou
        um design com dois orifícios para o polegar.
    recreational_vehicle_holding_tank_type:
      name: Tipo de reservatório de resíduos do veículo recreativo
      description: Indica quais os reservatórios de resíduos de que o veículo recreativo
        dispõe.
    recreational_vehicle_leveling_system:
      name: Sistema de nivelamento do veículo recreativo
      description: Tipo de sistema de nivelamento/estabilização instalado.
    recycled_material_content:
      name: Conteúdo de material reciclado
      description: Indica a proporção da peça de vestuário fabricada a partir de fibras
        ou fios reciclados.
    reed_dent_material:
      name: Material dos dentes do pente
      description: Material dos dentes do pente (os elementos que separam as fios
        da urdidura), o que afeta a durabilidade e a abrasão do fio.
    reed_type:
      name: Tipo de palheta
      description: Especifica o tipo de construção da palheta utilizada pelo chanter
        e pelos drones da gaita de foles.
    reeds_included:
      name: Palhetas incluídas
      description: Especifica quais as palhetas incluídas no conjunto de gaitas de
        foles das Highlands (chanter e/ou drone) e se são de cana ou sintéticas.
    reefing_method:
      name: Método de recolhimento
      description: Indica o mecanismo (se houver) para reduzir ou recolher a vela
        enquanto se está na água.
    reel_profile:
      name: Perfil do carreto
      description: Classifica o estilo/perfil estrutural do corpo do carreto de lançamento.
    reel_seat_material:
      name: Material do suporte do carreto
      description: Especifica o material de construção do assento do carreto, afetando
        o peso, a sensibilidade e a resistência à corrosão.
    reel_seat_type:
      name: Tipo de assento do carreto
      description: Especifica o estilo do mecanismo de bloqueio que fixa o carreto
        de pesca com mosca à cana.
    reel_size_class:
      name: Classe de tamanho do carreto
      description: Classificação de tamanho designada pelo fabricante (por exemplo,
        1000, 3000, 5000) que indica a capacidade do carretel e a construção geral
        do carreto.
    referee_wallet_accessories_included:
      name: Acessórios incluídos na carteira de árbitro
      description: Enumera os itens adicionais incluídos na carteira de árbitro, tais
        como cartões vermelhos/amarelos, folhas de pontuação ou material de escrita,
        para que os compradores saibam se a carteira é vendida como um kit completo.
    refinement_level:
      name: Nível de refinação
      description: Indica o grau de refinação a que o azeite foi submetido, o que
        afeta o sabor, a cor, o valor nutricional e o ponto de fumo.
    reflective_finish:
      name: Acabamento refletor
      description: Especifica o tratamento da superfície refletora de uma bola de
        discoteca (por exemplo, azulejo espelhado vs. efeitos holográficos/iridescentes).
    reflective_or_glow_effect:
      name: Efeito refletor ou brilhante
      description: Indica se a bola de antena possui efeitos de visibilidade, tais
        como material refletor, brilho no escuro ou elementos luminosos/LED.
    reflective_tape_pattern:
      name: Padrão da fita refletora
      description: Descreve a configuração da fita refletora na peça de vestuário
        utilizada para cumprir os requisitos de visibilidade.
    regulation_standard:
      name: Norma regulamentar
      description: Especifica a norma oficial ou as dimensões/certificação do organismo
        regulador que a rede cumpre.
    regulator_diaphragm_material:
      name: Material do diafragma do regulador
      description: Especifica o material do diafragma, que influencia a compatibilidade
        com combustível/etanol (por exemplo, E85) e a durabilidade.
    regulator_port_thread_standard:
      name: Norma de rosca das portas do regulador
      description: Especifica a norma de rosca/ligação utilizada no corpo do regulador
        para as portas de entrada, saída e retorno.
    rein_features:
      name: Características das rédeas
      description: Destaca características funcionais ou de segurança especiais presentes
        nas rédeas.
    rein_style:
      name: Tipo de rédea
      description: Identifica o design estrutural ou a configuração das rédeas, permitindo
        aos cavaleiros escolher o tipo correto para a sua disciplina e preferência
        pessoal.
    reinforced_areas:
      name: Áreas reforçadas
      description: Identifica quais as partes do vestuário que são reforçadas para
        maior durabilidade contra a abrasão.
    reinforcement_type:
      name: Tipo de reforço
      description: Reforço de construção utilizado na mangueira do radiador para conferir
        força e resistência à temperatura/pressão.
    release_activation_method:
      name: Método de ativação do disparador
      description: Especifica como um auxiliar de disparo de arco é acionado pelo
        arqueiro.
    release_bearing_material:
      name: Material do rolamento do disparador
      description: Material principal dos componentes do rolamento/face (quando especificado
        pelo fabricante).
    release_jaw_style:
      name: Estilo da garra do disparador
      description: Descreve o design das garras ou do gancho da cabeça do disparador.
    release_strap_type:
      name: Tipo de correia do disparador
      description: Identifica a correia ou o sistema de fixação fornecido com o dispositivo
        de lançamento para tiro com arco.
    remote_control_airship_envelope_material:
      name: Material do invólucro do dirigível de controlo remoto
      description: Especifica o material principal do invólucro do dirigível (bolsa
        de gás), distinto do material geral do brinquedo.
    remote_control_motorcycle_scale:
      name: Escala das motas com controlo remoto
      description: Escala da mota de controlo remoto em relação a uma mota real (se
        for um modelo à escala).
    remote_control_motorcycle_terrain_suitability:
      name: Adequação da mota de controlo remoto ao terreno
      description: Terreno principal para o qual a mota de controlo remoto foi concebida
        para funcionar.
    remote_control_motorcycle_water_resistance:
      name: Resistência à água da mota de controlo remoto
      description: Nível de proteção contra a água para os componentes eletrónicos
        da mota de controlo remoto.
    remote_control_plane_kit_completion_level:
      name: Nível de completude do kit do avião de controlo remoto
      description: Indica o que está incluído e o quão completo é o conjunto (por
        exemplo, pronto a voar vs. requer transmissor/recetor/bateria separados).
    remote_control_plane_landing_gear_type:
      name: Tipo de trem de aterragem do avião de controlo remoto
      description: Indica a configuração do trem de aterragem, afetando a durabilidade
        e as superfícies de descolagem/aterragem.
    remote_control_plane_power_type:
      name: Tipo de propulsão do avião de controlo remoto
      description: Especifica como o avião é alimentado/propulsionado (elétrico vs.
        combustão/gás/nitro), o que afeta a manutenção, o ruído e onde pode ser pilotado.
    remote_control_watercraft_features:
      name: Características da embarcação de controlo remoto
      description: Destaca as principais características específicas das embarcações
        de controlo remoto que afetam a usabilidade e a durabilidade.
    remote_control_watercraft_propulsion_drive_type:
      name: Tipo de propulsão/acionamento da embarcação de controlo remoto
      description: Especifica como a embarcação de controlo remoto é acionada na água.
    remote_control_watercraft_water_environment:
      name: Ambiente aquático da embarcação de controlo remoto
      description: Indica as condições aquáticas pretendidas onde a embarcação de
        controlo remoto tem o melhor desempenho.
    remote_keyless_system_programming_method:
      name: Método de programação do sistema de chave remota
      description: Como o comando remoto/sistema é programado ou emparelhado com o
        veículo (por exemplo, procedimento integrado no veículo vs. ferramenta profissional).
    repair_compound_type:
      name: Tipo de composto de reparação
      description: Tipo/formulação do material de reparação consumível incluído (por
        exemplo, tipo de massa de enchimento, tipo de resina para pára-brisas, tipo
        de cimento/selante para remendar pneus).
    repair_kit_components:
      name: Componentes do kit de reparação
      description: Enumera os itens específicos incluídos no kit de reparação, permitindo
        aos compradores compreender o conteúdo e comparar pacotes.
    repair_method:
      name: Método de reparação
      description: Especifica a abordagem de reparação principal utilizada pelo kit,
        tal como remendos adesivos de descascar e colar ou substituição da válvula.
    replacement_part_purpose:
      name: Finalidade da peça de substituição
      description: Indica se o item é uma peça de substituição OEM, uma peça de atualização/desempenho
        ou um acessório adicional.
    replacement_part_type:
      name: Tipo de peça de substituição
      description: Identifica a categoria funcional da peça da elíptica, permitindo
        aos compradores filtrar a pesquisa pelo componente de que necessitam.
    replacement_parts_availability:
      name: Disponibilidade de peças de substituição
      description: Indica se existem peças consumíveis/substituíveis disponíveis para
        o aparelho (por exemplo, ganchos/cabos de substituição).
    replica_gun_action_type:
      name: Tipo de ação da réplica de arma
      description: Especifica o tipo de funcionamento/ação da réplica de arma de fogo
        (conforme representado), tal como ação de ferrolho ou ação de alavanca.
    replica_gun_firing_mechanism:
      name: Mecanismo de disparo da réplica de arma
      description: Indica se e como a réplica simula o disparo/funcionamento (não
        letal), tal como disparo com cápsula ou sem disparo.
    replica_gun_moving_parts:
      name: Peças móveis da réplica de arma
      description: Indica quais as peças que são funcionais/móveis na réplica.
    reservoir_orientation:
      name: Orientação do reservatório
      description: Especifica a orientação ou o perfil pretendido da bexiga no interior
        do pacote.
    reservoir_type:
      name: Tipo de reservatório
      description: Tipo de configuração do reservatório para o cilindro mestre da
        embraiagem.
    resin_suitability:
      name: Compatibilidade com resina
      description: Especifica se a bola de mão foi concebida para utilização com resina
        (cola) ou se é isenta de resina.
    resistance_adjustability:
      name: Ajustabilidade da resistência
      description: Especifica se a resistência respiratória pode ser alterada pelo
        utilizador.
    resistance_band_design:
      name: Design da faixa de resistência
      description: Descreve a forma física ou o estilo de uma faixa de resistência
        (por exemplo, laço, tubo com alças, figura 8), ajudando os compradores a escolher
        o design certo para a sua rotina de exercícios.
    resistance_loading_type:
      name: Tipo de carga de resistência
      description: Indica como a resistência/peso é fornecida ou carregada na máquina
        Smith (por exemplo, com placas de peso ou pilha de pesos seletora).
    response_fields_included:
      name: Campos de resposta incluídos
      description: Especifica quais os campos/opções de resposta padrão que constam
        no cartão de resposta (por exemplo, aceitar/recusar, escolha de refeição).
    restoration_status:
      name: Estado da restauração
      description: Indica se a carrinha está no estado original, restaurada, em estilo
        restomod ou em estado de projeto.
    rhinestone_base_color_family:
      name: Família de cores da base do strass
      description: Identifica a família de cores da base do strass (por exemplo, transparente/cristal,
        dourado/amarelo, azul).
    rhinestone_facet_style:
      name: Estilo de faceta do strass
      description: O padrão da face/faceta do strass que afeta o brilho e a aparência
        (por exemplo, Xilion rose, corte brilhante, facetado vs. liso).
    rhinestone_hole_reinforcement_material:
      name: Material de reforço dos orifícios do strass
      description: Material à volta/nos orifícios (por exemplo, ilhós de metal, plástico
        moldado) que influencia a durabilidade durante a costura.
    rhinestone_setting_type:
      name: Tipo de cravação do strass
      description: Forma como a pedra é fixada/contornada para costura (por exemplo,
        cravação com garras, cravação com moldura, cravação com aro).
    rhubarb_product_cut_type:
      name: Tipo de corte do produto de ruibarbo
      description: Descreve a preparação física ou o corte do produto de ruibarbo.
    ribbon_construction:
      name: Construção da fita
      description: Descreve as principais características de construção da fita de
        gorgorão, tais como o facto de ser reforçada com arame ou elástica, o que
        determina a sua utilização (por exemplo, para laços ou para costura).
    ribbon_packaging_type:
      name: Tipo de embalagem da fita
      description: Indica a forma como a fita é fornecida/vendida.
    ribbon_pattern_style:
      name: Estilo do padrão da fita
      description: Classifica o método de aplicação do padrão comumente utilizado
        na fita de gorgorão.
    ribbon_sheen_level:
      name: Nível de brilho da fita
      description: Indica o brilho visual da superfície da fita de cetim.
    ribbon_style:
      name: Estilo da fita
      description: Especifica o padrão/estilo visual da fita (por exemplo, lisa, às
        riscas, tricolor).
    ribbon_trim_backing_type:
      name: Tipo de revestimento da fita/enfeite
      description: Indica se a fita/enfeite tem um revestimento e de que tipo (para
        facilitar a aplicação).
    ribbon_trim_edge_finish:
      name: Acabamento da borda da fita/enfeite
      description: Descreve a construção/acabamento da borda da fita/enfeite (útil
        para avaliar o comportamento de desgaste e a utilização pretendida).
    ric_rac_wave_size:
      name: Tamanho das ondulações do ric-rac
      description: Descreve a amplitude/escala das ondulações do ric-rac (o tamanho
        das ondulações em ziguezague).
    rice_grain_length:
      name: Comprimento do grão de arroz
      description: Classifica os produtos de arroz pelo comprimento do grão, como
        de grão curto, médio ou longo, o que influencia as características de cozedura
        e a utilização culinária.
    rice_processing_method:
      name: Método de processamento do arroz
      description: Descreve como o arroz foi processado ou preparado (por exemplo,
        pré-cozido, germinado, em flocos), afetando o tempo de cozedura, o valor nutricional
        e a utilização.
    rice_variety:
      name: Variedade de arroz
      description: Especifica a variedade ou cultivar específica de arroz, permitindo
        aos compradores escolher grãos com o sabor, aroma, textura e tipo de cozinha
        pretendidos.
    riding_toy_features:
      name: Características do brinquedo de montar
      description: Destaca características funcionais/de segurança comuns específicas
        dos brinquedos de montar.
    rifle_action_type:
      name: Tipo de mecanismo de ação da espingarda
      description: O mecanismo de funcionamento da espingarda (como carrega/dispara/ejetar),
        importante para identificação e interesse dos colecionadores.
    rifle_finish:
      name: Acabamento da espingarda
      description: Acabamento/revestimento externo principal da estrutura metálica.
    rifle_magazine_type:
      name: Tipo de carregador da espingarda
      description: Tipo de sistema de alimentação da espingarda.
    rifle_stock_material:
      name: Material da coronha da espingarda
      description: Material principal utilizado na coronha/acabamentos da espingarda
        (por exemplo, nogueira, polímero).
    rim_clamping_method:
      name: Método de fixação do aro
      description: Como a máquina fixa a roda/aro durante a montagem e desmontagem.
    rim_strip_type:
      name: Tipo de fita para aro.
      description: Classifica a fita/faixa de acordo com o seu estilo, construção
        ou aplicação específica (por exemplo, fita para aro sem câmara vs. fita protetora
        de borracha).
    rim_tubeless_compatibility:
      name: Compatibilidade do aro com pneus sem câmara
      description: Indica se o aro, a fita ou a roda foram concebidos para configurações
        com pneus sem câmara.
    ripeness_stage:
      name: Estágio de maturação
      description: Indica o nível de maturação da fruta no momento da venda (por exemplo,
        verde, madura, pronta a consumir).
    riser_pad_type:
      name: Tipo de almofada de elevação
      description: Classifica o estilo funcional da almofada (por exemplo, espaçador
        padrão, amortecedor, cunha angular).
    roasted_malt_processing_type:
      name: Tipo de processamento do malte torrado
      description: A abordagem ou variante de processamento específica utilizada para
        criar o malte torrado ou o grão torrado (por exemplo, cevada torrada não maltada,
        malte preto, variantes sem amargor ou descascadas).
    robotic_toy_interaction_mode:
      name: Modo de interação do brinquedo robótico
      description: Descreve a principal forma como o robô interage ou se move durante
        a brincadeira.
    robotic_toy_light_features:
      name: Características das luzes do brinquedo robótico
      description: Indica se e como o brinquedo utiliza luzes como parte da brincadeira
        (por exemplo, LEDs, projeção).
    robotic_toy_programming_supported:
      name: Programação do brinquedo robótico suportada
      description: Especifica que abordagem de programação, se houver, o brinquedo
        suporta.
    robotic_toy_skill_level:
      name: Nível de dificuldade do brinquedo robótico
      description: Indica o nível de complexidade de operação/programação esperado
        do utilizador.
    robotic_toy_sound_features:
      name: Funcionalidades de som do brinquedo robótico
      description: Indica as capacidades de som do brinquedo robótico.
    rod_butt_style:
      name: Estilo da extremidade da cana
      description: Define a configuração da extremidade da cana utilizada em aplicações
        de pesca à corrida.
    rod_construction_type:
      name: Tipo de construção da cana
      description: Indica o estilo geral de construção da cana em termos de peças
        e capacidade de desmontagem.
    rod_guide_material:
      name: Material das anilhas da cana
      description: Especifica o material utilizado nas anilhas ou inserções da cana
        de pesca, afetando a durabilidade, o peso e o atrito da linha.
    rod_guide_type:
      name: Tipo de anilhas da cana
      description: Especifica o estilo principal das anilhas instaladas na cana.
    rod_handle_type:
      name: Tipo de punho da cana
      description: Especifica a configuração do punho de uma cana de pesca, contribuindo
        para o conforto e a seleção da técnica.
    roll_cage_tubing_material:
      name: Material da tubagem da gaiola de proteção
      description: Especifica o material/liga da tubagem utilizada para a gaiola/barra
        de proteção (por exemplo, aço DOM vs. cromoly 4130).
    roller_skate_brake_shape:
      name: Forma do travão dos patins
      description: Descreve a forma geométrica/perfil da cabeça do travão para fins
        de desempenho ou preferência estética.
    roller_skate_brake_type:
      name: Tipo de travão dos patins
      description: Especifica o sistema de travagem utilizado nos patins.
    roller_ski_technique:
      name: Técnica de esqui em patins
      description: Identifica a técnica de esqui de fundo para a qual os esquis em
        patins foram concebidos.
    roller_technology:
      name: Tecnologia de rolamento
      description: Indica tecnologia integrada que melhora o desempenho da massagem,
        como vibração ou calor.
    rolling_case_wheel_configuration:
      name: Configuração das rodas da mala com rodas
      description: Especifica a configuração das rodas utilizada nas malas com rodas
        para teclados musicais.
    rolling_paper_format:
      name: Formato do papel de enrolar
      description: Identifica a apresentação física do produto (por exemplo, folhas
        planas, cones pré-enrolados, invólucros).
    rolling_paper_gum_type:
      name: Tipo de cola do papel de enrolar
      description: Especifica o adesivo (cola) utilizado na borda do papel para selagem,
        o que pode afetar o sabor e o desempenho.
    rolling_paper_size:
      name: Tamanho do papel de enrolar
      description: Indica a classificação de tamanho padrão do papel de enrolar ou
        do cone, permitindo que os compradores selecionem rapidamente a largura/comprimento
        corretos para as suas necessidades.
    rolling_stock_type:
      name: Tipo de material circulante
      description: Especifica que tipo de comboio/veículo ferroviário é o modelo (locomotiva
        vs. carruagens de passageiros/mercadorias e subtipos comuns de carruagens).
    roof_cargo_net_hook_fastener_style:
      name: Tipo de gancho/fecho da rede de carga do tejadilho
      description: Especifica o tipo de acessório utilizado nas extremidades para
        fixar a rede aos pontos de fixação (por exemplo, gancho em S, mosquetão, gancho
        em J).
    roof_height_class:
      name: Classe de altura do tejadilho
      description: Classifica a altura do tejadilho habitualmente utilizada em carrinhas
        (especialmente relevante para conversões/construções de autocaravanas).
    roof_type:
      name: Tipo de teto
      description: Configuração da secção do tejadilho ou teto da estrutura.
    root_variety:
      name: Variedade de raízes
      description: Identifica a variedade ou o tipo comum da raiz (por exemplo, variedades
        de rábano versus variedades de wasabi verdadeiro).
    rope_buoyancy:
      name: Flutuabilidade da corda
      description: Indica se a corda foi concebida para flutuar na superfície da água,
        ajudando os praticantes a evitar o emaranhamento e simplificando a recuperação.
    rope_construction:
      name: Construção da corda
      description: Especifica detalhes da construção da fibra para além do estilo
        de trança, tais como núcleo/revestimento torcido versus trançado e se a corda
        é do tipo kernmantle.
    rope_material:
      name: Material da corda
      description: Identifica o material da corda de segurança.
    rope_strand_compatibility:
      name: Compatibilidade com os tipos de corda
      description: Indica quais as configurações de corda que o dispositivo de segurança
        suporta (corda simples, meia/dupla, dupla ou combinações).
    rope_stretch_type:
      name: Tipo de elasticidade da corda
      description: Descreve as características de elasticidade da corda, distinguindo
        entre os tipos sem elasticidade, de baixa elasticidade, padrão ou elástico.
    rose_bloom_stage:
      name: Fase de floração da rosa
      description: Indica o grau de abertura das flores de rosa no momento da entrega/chegada
        (de botão a totalmente aberta).
    rose_grade:
      name: Categoria da rosa
      description: Categoria de qualidade comercial das rosas de corte.
    rosette_center_type:
      name: Tipo de centro da roseta
      description: Especifica o tipo de detalhe ou inserção no centro da parte frontal
        da roseta.
    rosin_dust_level:
      name: Nível de pó da resina
      description: Indica a quantidade prevista de pó de resina produzida durante
        a utilização normal.
    rosin_formula_additives:
      name: Fórmula da resina/aditivos
      description: Identifica características notáveis da fórmula, tais como misturas
        hipoalergénicas, de baixo teor de pó ou com infusão de metais.
    rosin_hardness:
      name: Dureza da resina
      description: Indica a dureza/suavidade relativa da resina para arco, que pode
        afetar a aderência e a formação de pó em diferentes climas e estilos de execução.
    rotation_mechanism_type:
      name: Tipo de mecanismo de rotação
      description: Especifica o mecanismo que permite a rotação da corda, influenciando
        a suavidade e a velocidade alcançável (por exemplo, rolamentos de esferas
        vs. buchas).
    rotation_motion_features:
      name: Características de rotação/movimento
      description: Indica se os planetas/órbitas rodam ou se movem e de que forma.
    rotor_configuration_type:
      name: Tipo de configuração do rotor
      description: Identifica a configuração do rotor do helicóptero de controlo remoto
        e o estilo de controlo (por exemplo, coaxial, rotor único de passo fixo vs.
        passo coletivo, multirotor), o que afeta significativamente as características
        de voo e a adequação a diferentes níveis de habilidade.
    rotor_construction_type:
      name: Tipo de construção do rotor
      description: Especifica o estilo de construção do rotor, que influencia o peso,
        a rigidez e a gestão do calor.
    rotor_mounting_interface:
      name: Interface de montagem do rotor
      description: Define a norma de interface do cubo utilizada para fixar o rotor
        à roda.
    rotor_mounting_standard:
      name: Norma de montagem do rotor
      description: Especifica a norma de interface utilizada para fixar o rotor ao
        cubo (por exemplo, 6 parafusos ou Center Lock).
    roulette_set_components_included:
      name: Componentes do conjunto de roleta incluídos
      description: Principais componentes relacionados com a roleta incluídos na roda/conjunto.
    roulette_wheel_ball_track_type:
      name: Tipo de pista da bola da roleta
      description: Descreve o estilo da pista da bola utilizada na roda, o que influencia
        o realismo e a sensação de jogo.
    roulette_wheel_numbering_system:
      name: Sistema de numeração da roleta
      description: Indica a numeração da roleta e a configuração do zero para compatibilidade
        com a jogabilidade e as probabilidades.
    rounders_equipment_included:
      name: Equipamento de rounders incluído
      description: Enumera os itens ou acessórios específicos de roleta fornecidos
        com o conjunto ou pacote de apoio ao treino, para que os compradores saibam
        exatamente o que está na caixa.
    rounders_governing_body_approval:
      name: Aprovação da entidade reguladora do rounders
      description: Indica a certificação ou aprovação por parte de uma entidade reguladora
        oficial do rounders ou de outros desportos.
    row_counter_format:
      name: Formato do contador de carreiras
      description: Especifica o formato/estilo de um contador de carreiras de tricô
        (por exemplo, anel, corrente, contador de cliques, digital).
    row_counter_mechanism:
      name: Mecanismo do contador de carreiras
      description: Especifica como a contagem de carreiras é avançada/registada na
        ferramenta.
    row_counter_mounting_method:
      name: Método de fixação do contador de carreiras
      description: Como o contador/marcador se fixa durante a utilização (à agulha,
        ao dedo, ao projeto, etc.).
    rowel_type:
      name: Tipo de roda dentada
      description: Descreve a forma ou o perfil da borda da roda dentada de acordo
        com a preferência do cavaleiro e a sensibilidade do cavalo.
    rowing_machine_part_type:
      name: Tipo de peça da máquina de remo
      description: Identifica o componente específico que o produto se destina a substituir
        numa máquina de remo, para que os compradores possam encontrar rapidamente
        a peça exata de que necessitam, sem criar uma profusão de microcategorias.
    rubber_ducky_character_theme:
      name: Personagem/tema do patinho de borracha
      description: Estilo temático ou da personagem do patinho de borracha (útil para
        patinhos originais/de coleção).
    rubber_ducky_features:
      name: Características do patinho de borracha
      description: Características funcionais/de design específicas dos brinquedos
        de banho em forma de patinho de borracha.
    rubber_ducky_size_class:
      name: Classe de tamanho do patinho de borracha
      description: Um agrupamento de tamanhos de patinhos de borracha fácil de entender
        para o comprador, com base na utilização típica (brinquedo de banho vs. enfeite
        de bolo vs. jumbo).
    ruffle_style:
      name: Estilo de folho
      description: Descreve a construção ou o estilo visual do folho na faixa de uma
        cadeira.
    rugby_headgear_safety_certification:
      name: Certificação de segurança do equipamento de proteção para a cabeça no
        râguebi
      description: Indica se o equipamento de proteção para a cabeça cumpre as normas
        oficiais de segurança do râguebi ou as normas gerais de segurança desportiva.
    rugby_size:
      name: Tamanho para râguebi
      description: Classifica o equipamento de acordo com as designações de tamanho
        específicas do râguebi, habitualmente utilizadas nos títulos dos produtos.
    rugby_variant:
      name: Variante de râguebi
      description: Especifica a variante de râguebi (código ou formato) a que o produto
        se destina.
    ruler_edge_type:
      name: Tipo de borda da régua
      description: Identifica o perfil/função da borda utilizada para medir ou marcar
        (por exemplo, borda reta, biselada, saliente).
    ruler_marking_style:
      name: Estilo de marcação da régua
      description: Descreve o esquema de marcação/guia impresso na régua para além
        das marcas básicas.
    runner_configuration:
      name: Configuração dos patins
      description: Descreve o número e a disposição dos patins no trenó.
    runner_material:
      name: Material dos patins
      description: Especifica o material utilizado nos patins ou nas tiras deslizantes
        do trenó.
    saddle_cover_style:
      name: Tipo de capa para selim
      description: Classifica o design geral ou o tipo de utilização do produto (por
        exemplo, capa para arrumação, capa para transporte, saco de transporte).
    saddle_design:
      name: Design do selim
      description: Classifica o design ou estilo ergonómico geral ou de alívio do
        selim (por exemplo, com recorte, sem ponta, com ponta dividida, com molas).
    saddle_discipline:
      name: Modalidade do selim
      description: Especifica a principal modalidade de equitação ou a utilização/estilo
        pretendidos para o selim.
    saddle_mounting_type:
      name: Tipo de montagem da sela
      description: Especifica a interface entre o selim e o espigão do selim para
        fins de compatibilidade (por exemplo, com trilhos, pivotante, I-Beam).
    saddle_pad_shape:
      name: Forma da almofada do selim
      description: Descreve o corte/contorno físico da almofada, que afeta a compatibilidade
        do selim e a preferência estética.
    saddle_pad_style:
      name: Tipo de almofada de sela
      description: Identifica o estilo funcional da almofada ou a disciplina a que
        se destina, permitindo aos ciclistas escolher o design certo para a sua atividade
        ou tipo de selim.
    saddle_padding_material:
      name: Material de acolchoamento do selim
      description: Indica o principal material ou tecnologia de amortecimento no interior
        do selim que influencia o conforto e a sensação de condução.
    saddle_rail_material:
      name: Material da guia do selim
      description: Especifica o material utilizado nos trilhos por baixo de um selim
        de bicicleta, o que afeta a resistência, o conforto, o peso e o preço.
    saddle_tree_material:
      name: Material da armação da sela
      description: Especifica o material utilizado na armação do selim, a estrutura
        interna do selim.
    saddle_tree_width:
      name: Largura da armação do selim
      description: Descreve a classificação da largura da armação do selim, determinando
        o ajuste na cernelha do cavalo.
    safety_documentation_available:
      name: Documentação de segurança disponível
      description: Indica quais os documentos de conformidade/segurança fornecidos
        para o ingrediente (por exemplo, ficha de dados de segurança, certificado/declaração
        IFRA, declaração de alergénios).
    safety_equipment_included:
      name: Equipamento de segurança incluído
      description: Itens de segurança/proteção incluídos no kit.
    safety_features:
      name: Funcionalidades de segurança
      description: Indica as características de segurança integradas destinadas a
        reduzir cortes acidentais ou a proteger a lâmina durante o armazenamento.
    safety_harness_type:
      name: Tipo de arnês de segurança
      description: Indica o estilo e a configuração do arnês de retenção infantil
        fornecido com o assento.
    safety_mechanism_type:
      name: Tipo de mecanismo de segurança
      description: Descreve o estilo do sistema de segurança integrado utilizado para
        apanhar a barra durante levantamentos falhados.
    safety_restraint_type:
      name: Tipo de sistema de retenção de segurança
      description: Tipo de sistema de retenção infantil integrado no assento do baloiço,
        se houver.
    safety_warning:
      name: Aviso de segurança
      description: Indica se o produto apresenta avisos de segurança comuns para brinquedos
        relevantes para bolinhas de gude (por exemplo, risco de asfixia).
    sail_shape:
      name: Forma da vela
      description: Descreve o estilo geométrico da vela do caiaque, que influencia
        a eficiência, a manobrabilidade e a montagem.
    salad_dressing_type:
      name: Tipo de molho para salada
      description: Identifica o estilo ou textura fundamental do molho (por exemplo,
        cremoso, vinagrete, à base de iogurte), ajudando os compradores a distinguir
        entre diferentes bases e consistências.
    salad_topping_base_ingredient:
      name: Ingrediente base do acompanhamento para salada
      description: Especifica o grupo de ingredientes principal que compõe o acompanhamento,
        ajudando os clientes a filtrar por preferências nutricionais, preocupações
        com alergénios ou textura desejada.
    salt_level:
      name: Teor de sal
      description: Indica a quantidade de sal ou sódio adicionada aos frutos secos
        ou sementes.
    sand_cup_features:
      name: Características do balde de areia
      description: Características funcionais/físicas do(s) balde(s) de areia que
        influenciam a brincadeira e a utilização.
    sand_shovel_handle_style:
      name: Tipo de cabo da pá de areia
      description: Descreve a forma do cabo/pega na extremidade do cabo da pá.
    sand_toy_set_pieces_included:
      name: Peças do conjunto de brinquedos para a areia incluídas
      description: Enumera os tipos de componentes dos brinquedos de areia incluídos
        no conjunto (por exemplo, balde, pá, moldes), para ajudar os compradores a
        comparar os kits com base no seu conteúdo.
    sand_water_mill_items_included:
      name: Iten do conjunto de areia e água incluídos
      description: Enumera os principais acessórios incluídos com o brinquedo (baldes,
        conchas, moldes, etc.).
    sandbag_style:
      name: Estilo do saco de areia
      description: Identifica o design específico e a finalidade de treino do saco
        de areia (por exemplo, búlgaro, strongman, power), ajudando os compradores
        a escolher entre diferentes modalidades de treino.
    sandbox_bottom_type:
      name: Tipo de base do saco de areia
      description: O tipo de construção da base utilizada por baixo da areia.
    sandbox_drainage_type:
      name: Tipo de drenagem do saco de areia
      description: Como o saco de areia drena a água (se aplicável), por exemplo,
        através de orifícios de drenagem ou de um tampão removível.
    sandbox_seating_type:
      name: Tipo de assento da caixa de areia
      description: Se o saco de areia inclui assentos integrados e de que tipo.
    sapodillo_variety:
      name: Variedade de sapote
      description: Identifica a cultivar ou variedade específica de sapote/chikoo
        (por exemplo, "Alano", "Prolific"), permitindo aos apreciadores selecionar
        os perfis de sabor e características preferidos.
    sapote_variety:
      name: Variedade de sapote
      description: Especifica a espécie ou tipo específico de sapote oferecido (por
        exemplo, preto, branco, mamey), permitindo aos compradores distinguir entre
        os diferentes tipos.
    satin_ribbon_face_type:
      name: Tipo de fita de cetim
      description: Especifica se a fita tem um acabamento acetinado num dos lados
        ou em ambos os lados.
    sauce_consistency:
      name: Consistência do molho
      description: Descreve a textura ou a consistência do molho de pizza.
    sauce_product_form:
      name: Forma do produto molho
      description: Indica a forma física do produto, como líquido, óleo, pasta, pó,
        flocos ou xarope.
    sauce_variety:
      name: Variedade do molho
      description: Identifica o estilo específico ou a família de receitas do molho
        branco ou cremoso (por exemplo, alfredo, bechamel, holandês).
    saxophone_body_finish:
      name: Acabamento do corpo do saxofone
      description: Descreve o acabamento/revestimento principal do corpo do saxofone
        (excluindo o mecanismo de chaves).
    saxophone_body_type:
      name: Tipo de corpo do saxofone
      description: Descreve a configuração física geral do corpo do saxofone baixo
        e a orientação da campânula.
    saxophone_construction_style:
      name: Estilo de construção do saxofone
      description: Indica características comuns de construção do saxofone que afetam
        a durabilidade, a ressonância e a manutenção.
    saxophone_included_accessories:
      name: Acessórios incluídos com o saxofone
      description: Enumera os acessórios que normalmente acompanham um pacote de saxofone
        alto.
    saxophone_key_system:
      name: Sistema de chaves do saxofone
      description: Identifica o sistema de chaves do saxofone (disposição/padrão do
        mecanismo) utilizado no instrumento.
    saxophone_key_touch_material:
      name: Material das teclas do saxofone
      description: Especifica o material utilizado nas teclas do saxofone (por exemplo,
        teclas em madrepérola).
    saxophone_mouthpiece_baffle_type:
      name: Tipo de defletor do bocal do saxofone
      description: Descreve o design do defletor que molda o fluxo de ar e o brilho
        do som.
    saxophone_neck_type:
      name: Tipo de pescoço do saxofone
      description: Especifica a configuração do pescoço fornecida com o saxofone baixo.
    saxophone_package_contents:
      name: Conteúdo da embalagem do saxofone
      description: Enumera quais os acessórios incluídos com o saxofone (por exemplo,
        estojo, bocal, ligadura, alça de pescoço, kit de limpeza).
    saxophone_reed_cut:
      name: Corte da palheta do saxofone
      description: Especifica o corte/estilo da palheta do saxofone, que influencia
        a resposta, o tom e a sensação.
    saxophone_reed_material_type:
      name: Tipo de material da palheta do saxofone
      description: Especifica a categoria do material da palheta (por exemplo, cana
        vs. sintético).
    saxophone_reed_strength_scale:
      name: Escala de resistência da palheta do saxofone
      description: Especifica o sistema de numeração/escala de resistência utilizado
        para a palheta (frequentemente dependente da marca), permitindo uma comparação
        mais clara entre as listagens.
    saxophone_small_part_thread_size:
      name: Tamanho da rosca das peças pequenas do saxofone
      description: Especifica o tamanho/padrão da rosca das peças pequenas roscadas
        do saxofone (principalmente parafusos), permitindo a seleção do encaixe correto.
    saxophone_swab_application_area:
      name: Área de aplicação do pano de limpeza do saxofone
      description: Indica que parte do saxofone o pano de limpeza se destina a limpar/secar.
    scabbard_material:
      name: Material da caixa
      description: Especifica o material principal da bainha incluída (se presente)
    scale_model_assembly_status:
      name: Estado de montagem do modelo em escala
      description: Indica se o modelo em escala está pronto a expor ou se requer montagem/pintura.
    scale_model_car_features:
      name: Características do modelo em escala do automóvel
      description: Características notáveis do modelo em escala do automóvel, tais
        como portas/capô que se abrem, rodas direcionáveis, suspensão, etc.
    scale_model_kit_assembly_requirements:
      name: Requisitos de montagem do kit do modelo em escala
      description: Especifica quais os passos de montagem/materiais adicionais que
        são normalmente necessários para além da montagem básica por encaixe.
    scale_model_kit_components_included:
      name: Componentes incluídos no kit do modelo em escala
      description: Enumera o que está incluído no modelo/kit em escala do tanque (por
        exemplo, decalques, figuras, peças fotogravadas).
    scale_model_paint_status:
      name: Estado da pintura do modelo em escala
      description: Indica se o modelo de helicóptero está pré-pintado/acabado ou requer
        pintura.
    scale_model_pose:
      name: Pose do modelo à escala
      description: Especifica a pose representada do modelo de cavalo para correspondência
        com exposições/dioramas.
    scale_model_rotor_configuration:
      name: Configuração do rotor do modelo em escala
      description: Especifica a configuração do rotor do helicóptero representada
        pelo modelo.
    scale_model_truck_era:
      name: Época do camião do modelo em escala
      description: Indica a época/período do camião real que o modelo representa (útil
        para colecionadores que procuram camiões antigos em vez de modernos).
    scale_model_truck_propulsion_type:
      name: Tipo de propulsão do camião do modelo em escala
      description: Especifica se o camião representado é a diesel, a gasolina, elétrico,
        híbrido ou outro tipo de propulsão (conforme representado/comercializado pelo
        modelo).
    scale_units:
      name: Unidades de escala
      description: As unidades de medida impressas/gravadas na viga para definir o
        raio/diâmetro.
    scent_function:
      name: Função do aroma
      description: Define a função principal de um produto aromático para que os caçadores
        possam identificar rapidamente a ferramenta certa (por exemplo, atrativo vs.
        eliminador de odores).
    scent_source:
      name: Fonte do aroma
      description: Enumera a principal fonte biológica ou aromática utilizada na formulação
        do produto, abrangendo tipos de urina, aromas à base de alimentos, aromas
        vegetais, etc.
    school_bus_body_type:
      name: Tipo de carroçaria do autocarro escolar
      description: Classifica um autocarro escolar de acordo com os formatos de carroçaria/classes
        mais comuns utilizados no mercado (por exemplo, Tipo A–D).
    school_bus_safety_feature:
      name: Características de segurança do autocarro escolar
      description: Equipamento de segurança relevante instalado no autocarro escolar.
    school_glue_washability:
      name: Facilidade de limpeza da cola escolar
      description: Indica a facilidade com que a cola seca/húmida pode ser removida
        da pele/roupa/superfícies.
    scissors_application:
      name: Aplicação das tesouras
      description: Aplicação/material de corte principal para as tesouras.
    scooter_brake_pad_material:
      name: Material das pastilhas de travão da scooter
      description: Especifica o composto utilizado nas pastilhas de travão, que afeta
        o desempenho, o ruído e a vida útil.
    scoring_method:
      name: Método de pontuação
      description: Especifica como as pontuações são registadas na mesa de matraquilhos,
        por exemplo, através de contadores manuais de bolas ou de painéis de pontuação
        eletrónicos.
    scoring_pattern:
      name: Padrão de pontuação
      description: Esquema das zonas de pontuação impresso no tabuleiro de jogo.
    scoring_system_type:
      name: Tipo de sistema de pontuação
      description: Descreve o tipo de mecanismo de pontuação incluído na mesa, como
        controles deslizantes manuais ou vários visores eletrónicos.
    scottish_smallpipes_bag_material:
      name: Material do saco das gaitas de foles escocesas
      description: Especifica o material do saco (reservatório de ar) fornecido com
        as gaitas de foles.
    scottish_smallpipes_drone_tuning_configuration:
      name: Configuração de afinação dos drones das gaitas de foles escocesas
      description: Especifica a configuração de afinação dos drones fornecida com
        o instrumento (as alturas/funções dos drones em relação à tónica).
    scottish_smallpipes_reed_type:
      name: Tipo de palheta das gaitas de foles escocesas
      description: Identifica o tipo de palheta utilizada na gaita de foles (e/ou
        se as palhetas são sintéticas ou de cana).
    scraping_surface_type:
      name: Tipo de superfície de raspagem
      description: Especifica a construção/geometria da superfície de fricção que
        produz o som (por exemplo, ranhurada, em forma de pente/dentes, ondulada).
    screw_drive_type:
      name: Tipo de chave para parafusos
      description: Especifica o tipo de encaixe na cabeça do parafuso ou perno, indicando
        a ferramenta necessária para o apertar ou desapertar (por exemplo, sextavado/Allen,
        Torx).
    screw_thread_size:
      name: Tamanho da rosca do parafuso
      description: Especifica a norma de tamanho da rosca dos parafusos incluídos
        ou compatíveis (por exemplo, M4, M5, M6).
    sculpting_clay_base_type:
      name: Tipo de base da argila de modelar
      description: Descreve a formulação/base subjacente da argila de modelar.
    seafood_cut:
      name: Corte do marisco
      description: Descreve o corte físico ou a apresentação do produto de marisco
        (por exemplo, inteiro, filete, bife).
    seafood_processing_method:
      name: Método de processamento dos produtos do mar
      description: Especifica a principal técnica de conservação ou processamento
        aplicada ao marisco, como a fumagem, a salga ou a liofilização.
    seafood_source:
      name: Origem do marisco
      description: Indica se o marisco é capturado no estado selvagem, criado em cativeiro,
        de origem vegetal ou de outra fonte, ajudando os compradores a avaliar a sustentabilidade
        e a qualidade.
    seal_material:
      name: Material de vedação
      description: Material utilizado nas vedações do pescoço, pulsos e tornozelos,
        ou nas juntas que mantêm o fato estanque.
    seal_type:
      name: Tipo de vedação
      description: Especifica o método de vedação utilizado na junta para impedir
        fugas de líquido de arrefecimento.
    sealant_formulation:
      name: Formulação do selante
      description: Indica a principal composição química ou tecnologia de aditivos
        do selante para pneus de bicicleta (por exemplo, à base de látex, reforçado
        com fibras, acrílico).
    seals_leak_type:
      name: Tipo de fuga de vedação
      description: Tipo/localização da fuga no sistema de arrefecimento que o produto
        se destina a vedar.
    seam_construction:
      name: Construção da costura
      description: Descreve como a costura da bola é criada, afetando o balanço, a
        durabilidade e o toque.
    seam_design:
      name: Design da costura
      description: Especifica a construção da costura ou os detalhes decorativos da
        costura da malha.
    seam_gauge_scale_type:
      name: Tipo de escala do medidor de costura
      description: Indica quais as escalas/marcações incluídas no medidor de costura
        para além da escala da régua de base.
    seam_gauge_slider_material:
      name: Material do cursor do medidor de costura
      description: Identifica o material do componente deslizante/ponteiro ajustável,
        quando presente.
    seam_ripper_tip_style:
      name: Tipo de ponta do descosedor
      description: Descreve o design funcional da ponta utilizada para deslizar por
        baixo dos pontos e cortar o fio com segurança.
    seam_sealing_type:
      name: Tipo de vedação de costura
      description: Descreve o método utilizado para impedir a entrada de água nas
        costuras do fato de chuva (por exemplo, totalmente selado, soldado).
    seam_type:
      name: Tipo de costura
      description: Descreve o estilo de costura da bola de basebol, que afeta a aderência,
        a aerodinâmica e o nível de jogo pretendido.
    season_condition_protection:
      name: Proteção contra condições meteorológicas
      description: Indica as principais condições meteorológicas contra as quais a
        capa de proteção contra o vento se destina a proteger.
    season_rating:
      name: Classificação sazonal
      description: Especifica a classificação sazonal da tenda, indicando a sua adequação
        a diferentes condições meteorológicas (por exemplo, 3 estações, 4 estações,
        5 estações/expedição).
    seasoning_variety:
      name: Variedade de temperos
      description: Classifica os temperos de acordo com o seu método de preparação
        ou uso culinário tradicional.
    seat_adjustment_power_type:
      name: Tipo de ajuste elétrico do assento
      description: Especifica a forma como os mecanismos de ajuste do assento são
        acionados (alavancas manuais ou motores elétricos), o que pode afetar a cablagem/compatibilidade.
    seat_belt_attachment_type:
      name: Tipo de fixação do cinto de segurança
      description: Especifica a forma como a fita se fixa ao veículo/sistema do cinto.
    seat_belt_buckle_electrical_connector_type:
      name: Tipo de conector elétrico da fivela do cinto de segurança
      description: Especifica o conector/interface utilizado para a cablagem do interruptor
        da fivela/pré-tensor, quando aplicável.
    seat_belt_buckle_mounting_type:
      name: Tipo de montagem da fivela do cinto de segurança
      description: Descreve como a fivela/recetor se fixa ao veículo, ao assento ou
        à haste do cinto (por exemplo, aparafusada, encaixada).
    seat_belt_buckle_release_button_color:
      name: Cor do botão de libertação da fivela do cinto de segurança
      description: Especifica a cor do botão de libertação da fivela.
    seat_belt_cover_placement:
      name: Colocação da capa do cinto de segurança
      description: Especifica em que parte do cinto de segurança deve ser utilizada
        a capa.
    seat_belt_integration:
      name: Integração do cinto de segurança
      description: Especifica se o assento inclui um cinto de segurança integrado
        e/ou um encaixe para a fivela, ou se o encaixe para a fivela original do veículo
        deve ser transferido para a instalação.
    seat_belt_provision:
      name: Equipamento do cinto de segurança
      description: Indica se os cintos de segurança e/ou o equipamento relacionado
        (por exemplo, fivelas) estão incluídos no conjunto do banco traseiro ou se
        devem ser transferidos do banco original.
    seat_belt_strap_installation_location:
      name: Local de instalação da fita do cinto de segurança
      description: Indica onde a fita está instalada no sistema do cinto.
    seat_cover_placement:
      name: Colocação da capa do assento
      description: Indica para que posição(ões) do banco do veículo se destina a capa.
    seat_cover_securement_method:
      name: Método de fixação da capa do assento
      description: Indica a principal forma como a capa do assento é fixada ao assento.
        Se forem utilizados vários métodos, selecione o principal/primário.
    seat_cover_set_contents:
      name: Conteúdo do conjunto de capas para o assento
      description: Descreve quais as peças incluídas na embalagem (por exemplo, apenas
        a base do assento ou o assento completo com encostos de cabeça).
    seat_fabric:
      name: Tecido do assento
      description: Tecido principal utilizado no assento e no encosto da cadeira.
    seat_height_category:
      name: Categoria de altura do assento
      description: Classifica o banco de acordo com a gama de altura típica do assento
        (por exemplo, altura de balcão ou de bar) para simplificar a seleção.
    seat_material:
      name: Material do assento
      description: Identifica o material principal da superfície do assento do banco.
    seat_mounting_type:
      name: Tipo de fixação do assento
      description: Configuração de montagem/fixação utilizada para fixar o assento
        ao piso do veículo.
    seating_surface_material:
      name: Material da superfície do assento
      description: Especifica o material da área onde a pessoa se reclina (por exemplo,
        malha Textilene, tecido de sling, vime, estofamento almofadado).
    seatpost_clamp_mechanism:
      name: Mecanismo de fixação do espigão do assento
      description: Tipo de sistema de fixação/fecho que fixa o espigão do assento.
    section_orientation_compatibility:
      name: Compatibilidade de orientação da secção
      description: Indica se o acessório se adapta a uma secção com orientação para
        o braço esquerdo, para o braço direito ou universal.
    sectional_configuration:
      name: Configuração seccional
      description: Define o módulo específico ou a orientação da unidade seccional
        (por exemplo, canto, extremidade do braço esquerdo, chaise) para que o comprador
        possa montar o esquema desejado.
    sectional_shape:
      name: Forma seccional
      description: Define a configuração geométrica geral/esquema do sofá seccional.
    secured_components:
      name: Componentes protegidos
      description: Lista as peças específicas da bicicleta que o eixo de bloqueio
        ou as porcas de segurança protegem (por exemplo, roda dianteira, roda traseira,
        espigão do assento).
    seed_content:
      name: Conteúdo da semente
      description: Indica se a fruta cítrica não tem sementes, tem poucas sementes
        ou tem sementes em abundância.
    seed_size_classification:
      name: Classificação do tamanho das sementes
      description: Indica o tamanho relativo da semente não comestível dentro da lichia,
        o que afeta a quantidade de polpa comestível.
    self_adhesive_backing_format:
      name: Formato com suporte autoadesivo
      description: Formato físico do suporte adesivo fornecido com a aba do pavio
        (almofada pré-aplicada vs autocolantes separados, etc.).
    self_adhesive_hook_loop_backing_type:
      name: Tipo de velcro com suporte autoadesivo
      description: Especifica a construção do suporte/revestimento e o sistema adesivo
        utilizado no lado autoadesivo.
    self_adhesive_hook_loop_fastener_shape:
      name: Formato do fecho autoadesivo de gancho e laço
      description: Especifica o corte/forma das peças de fixação fornecidas.
    self_hardening_clay_finish:
      name: Acabamento em argila autoendurecível
      description: Descreve o aspeto/brilho da superfície após a cura completa (útil
        para escolher entre acabamento mate natural, acetinado, etc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Argila autoendurecível resistente à água após a cura
      description: Indica resistência à exposição à água após a cura completa (sem
        necessidade de selante adicional).
    sensor_functions:
      name: Funções do sensor
      description: Indica qual a métrica de ciclismo que o sensor está a medir.
    sensor_measurement_mode:
      name: Modo de medição do sensor
      description: Indica qual a métrica que o sensor pode captar (por exemplo, apenas
        cadência, apenas velocidade, velocidade e cadência em simultâneo).
    sensor_mounting_position:
      name: Posição de montagem do sensor
      description: Especifica o local na bicicleta ou no ciclista onde o sensor está
        instalado, como o braço da manivela, o cubo da roda ou o sapato. Isto afeta
        a compatibilidade com diferentes configurações de bicicletas.
    sensor_mounting_type:
      name: Tipo de montagem do sensor
      description: Especifica a forma como o sensor MAP está montado no coletor de
        admissão/motor (por exemplo, flange aparafusada vs casquilho de encaixe).
    sensor_or_gauge_mounting_location:
      name: Local de montagem do sensor ou do indicador
      description: Especifica em que parte do veículo se pretende instalar o sensor
        ou o indicador (ao nível do sistema/localização, não à esquerda/direita).
    sensory_modality:
      name: Modalidade sensorial
      description: Experiência(s) sensorial(is) primária(s) que o brinquedo foi concebido
        para proporcionar (pode ser multissensorial).
    sensory_toy_fidget_mechanism:
      name: Mecanismo de agitação do brinquedo sensorial
      description: Interação/mecanismo primário utilizado para a inquietação e autorregulação.
    sensory_toy_light_features:
      name: Características de iluminação do brinquedo sensorial
      description: Comportamentos/efeitos de iluminação proporcionados pelo brinquedo.
    sensory_toy_texture_type:
      name: Tipo de textura do brinquedo sensorial
      description: Elementos dominantes de toque/textura da superfície utilizados
        para estimulação tátil.
    sequin_application_method:
      name: Método de aplicação das lantejoulas
      description: Como se pretende aplicar/utilizar a lantejoula (costurada, colada,
        fixada a quente, etc.).
    sequin_finish:
      name: Acabamento em lantejoulas
      description: Descreve o acabamento visual e de superfície, bem como o efeito
        refletor das lantejoulas utilizadas no emblema (por exemplo, mate, metálico,
        holográfico), e não o suporte do emblema ou o método de fixação.
    serger_stitch_functions:
      name: Funções de ponto da máquina de costura overloque
      description: As funções de ponto suportadas pela máquina de costura overloque
        (variações de overloque/borda e pontos especiais).
    serger_thread_count:
      name: Número de fios da máquina de costura overloque
      description: Número de fios que a máquina de costura overloque pode utilizar
        para costurar (por exemplo, capacidade para 2/3/4/5 fios).
    service_interval:
      name: Intervalo de manutenção
      description: Intervalo máximo recomendado entre as inspeções/manutenções obrigatórias
        a realizar numa oficina autorizada.
    serving_temperature:
      name: Temperatura de consumo
      description: Indica a temperatura de consumo recomendada ou o estado do produto
        no momento da ingestão.
    sesame_seed_hull_status:
      name: Estado das sementes de sésamo
      description: Especifica se o tahini é produzido a partir de sementes de sésamo
        descascadas ou com casca, o que influencia a cor, o sabor e o valor nutricional.
    sesame_seed_roast_level:
      name: Grau de torrefação das sementes de sésamo
      description: Indica o grau de torrefação das sementes de sésamo antes da moagem,
        ajudando os consumidores a escolher a intensidade de sabor que preferem.
    sesame_seed_variety:
      name: Variedade das sementes de sésamo
      description: Identifica a cor ou a variedade das sementes de sésamo utilizadas
        para produzir o óleo.
    set_classification:
      name: Classificação do conjunto
      description: Define o nível ou estilo de jogo pretendido para o conjunto de
        croquet (por exemplo, torneio, recreativo, de viagem).
    set_components:
      name: Componentes do conjunto
      description: Indica quais os itens incluídos no produto (por exemplo, apenas
        a haste central ou o conjunto completo).
    set_items_included:
      name: Itens incluídos no conjunto
      description: Especifica as peças de vestuário ou acessórios incluídos no conjunto,
        como tecido sari, dupatta ou cinto.
    setup_mechanism:
      name: Mecanismo de configuração
      description: 'Descreve o principal método de montagem da tenda (ex.: tenda pop-up
        para lojas, tenda insuflável/com viga de ar, tenda de cobertura tipo concha).'
    setup_type:
      name: Tipo de configuração
      description: Como a tenda/túnel de brincar é montada ou instalada.
    sew_in_interfacing_elasticity:
      name: Elasticidade da entretela para costura
      description: Indica se a entretela para costura é elástica e, em caso afirmativo,
        em que direção(ões), para se adequar a projetos em malha ou tecido.
    sew_in_label_placement:
      name: Localização da etiqueta para costura
      description: Indica o local de colocação pretendido no item acabado.
    sew_on_edge_finish:
      name: Acabamento das bordas do velcro para costura
      description: Indica se as bordas do velcro estão em bruto/cortadas ou acabadas
        para evitar o desfiamento.
    sew_on_rhinestone_hole_orientation:
      name: Orientação dos orifícios para strass do velcro para costura
      description: Disposição/orientação dos orifícios em relação à pedra (por exemplo,
        lado a lado, opostos, cruzados) para permitir diferentes estilos de costura.
    sewing_kit_components_included:
      name: Componentes do kit de costura incluídos
      description: Lista os acessórios/ferramentas de costura incluídos num kit de
        costura para que os compradores possam comparar o que cada kit contém.
    sewing_machine_bobbin_class:
      name: Classe de bobina de máquina de costura
      description: Especifica a classe/sistema de bobina compatível com a máquina
        de costura para bobinas e caixas de bobina.
    sewing_machine_buttonhole_type:
      name: Tipo de casa de botão da máquina de costura
      description: Método de criação de casas de botão suportado pela máquina.
    sewing_machine_display_type:
      name: Tipo de ecrã da máquina de costura
      description: Tipo de interface de controlo/ecrã na máquina de costura.
    sewing_machine_needle_point_type:
      name: Tipo de ponta da agulha da máquina de costura
      description: Define a geometria/família de pontas da agulha que determina a
        forma como esta penetra em diferentes tecidos (por exemplo, ponta afiada,
        ponta esférica ou ponta em cunha).
    sewing_machine_needle_system:
      name: Sistema de agulhas da máquinas de costura
      description: O sistema/número de modelo de agulha normalizado que determina
        a compatibilidade com a máquina (normalmente escrito como 130/705 H, HAx1,
        DBx1, 15x1, etc.).
    sewing_machine_needle_type:
      name: Tipo de agulha para máquina de costura
      description: Especifica a aplicação/estilo pretendido da agulha (por exemplo,
        universal, ponta esférica, ganga/denim), o que afeta a qualidade da costura
        e a adequação do tecido.
    sewing_machine_shank_type:
      name: Tipo de haste da máquina de costura
      description: Especifica a norma de interface da haste/articulação do calcador
        para a qual o calcador foi concebido, garantindo a compatibilidade com a máquina
        de costura (por exemplo, haste baixa, haste alta, haste inclinada).
    sewing_pattern_accessory_type:
      name: Tipo de acessório do molde de costura
      description: Especifica qual o acessório que o molde de costura produz.
    sewing_pattern_notions_required:
      name: Materiais necessários para o molde de costura
      description: Enumera os materiais/acessórios adicionais necessários para concluir
        o projeto (para além do tecido e da linha).
    sewing_pattern_recommended_fabric:
      name: Tecido recomendado para o molde de costura
      description: Enumera os tipos/gramagens de tecido recomendados para o molde
        de costura (conforme indicado pelo criador do molde).
    sewing_pattern_size_range:
      name: Gama de tamanhos do molde de costura
      description: Especifica a gama de tamanhos abrangida pelo molde (por exemplo,
        desde bebé até adulto, incluindo tamanhos grandes).
    sewing_thread_size_system:
      name: Sistema de classificação do tamanho da linha de costura
      description: A norma de classificação utilizada para indicar o tamanho da linha
        (por exemplo, Tex, Denier, Ticket, número de peso, tamanho V).
    shaft_curvature:
      name: Curvatura da haste
      description: Descreve a forma geral da haste, que influencia a folga, o swing
        e a ergonomia.
    shaft_kick_point:
      name: Ponto de flexão da haste
      description: Identifica a posição ao longo da haste onde esta se dobra mais
        durante um swing, influenciando a trajetória de voo da bola.
    shaft_length_type:
      name: Tipo de comprimento da haste
      description: Designação de tamanho categórica padrão da indústria para hastes
        de dardos (por exemplo, Curta, Média), utilizada quando não são fornecidas
        medidas exatas em milímetros.
    shaft_shape:
      name: Forma da haste
      description: Define o perfil da secção transversal da haste da tonfa (por exemplo,
        redonda, quadrada, octogonal).
    shaker_fill_material:
      name: Material de enchimento do shaker
      description: Especifica o material de enchimento interno principal utilizado
        para criar o som do agitador (quando aplicável), como contas, sementes ou
        esferas.
    shaker_shell_material:
      name: Material do invólucro do shaker
      description: Especifica o material principal do corpo/invólucro do shaker em
        forma de ovo (a estrutura exterior).
    shallot_variety:
      name: Variedade de chalota
      description: Identifica a cultivar específica, o tipo de mercado ou a variedade
        do produto de chalota.
    shank_style:
      name: Estilo de haste
      description: Descreve a forma/configuração geral das hastes do freio de borda
        (por exemplo, reta, curva, de roçar).
    shapewear_enhancement_feature:
      name: Característica de modelagem
      description: Destaca a principal funcionalidade oferecida pela peça de vestuário
        (por exemplo, controlo da barriga, elevação dos glúteos, forro à prova de
        fugas).
    sheath_type:
      name: Tipo de bainha
      description: Tipo de bainha/bainha de proteção incluída com a faca de coleção.
    sheet_music_clip_padding_material:
      name: Material de acolchoamento do grampo para partituras
      description: Material de qualquer acolchoamento das mandíbulas/pinças que entre
        em contacto com o papel ou com a borda do suporte para evitar rasgos e deslizamentos.
    sheet_music_clip_spring_tension_level:
      name: Nível de tensão da mola do grampo para partituras
      description: Força relativa da mola do grampo/força de fixação.
    sheet_music_clip_use_environment:
      name: Ambiente de utilização do grampo para partituras
      description: Ambiente principal para o qual o grampo foi concebido para funcionar
        da melhor forma.
    shell_construction:
      name: Construção do casco
      description: Especifica a forma como o casco do tambor baixo é construído, o
        que influencia significativamente o timbre e o peso.
    shell_finish:
      name: Acabamento do casco
      description: Tratamento de acabamento exterior do casco do doumbek.
    shell_hull_status:
      name: Estado do casco/casca
      description: Especifica se as nozes ou sementes são vendidas com o casco ou
        a casca intactos ou removidos.
    shift_boot_attachment_method:
      name: Método de fixação da bota da alavanca de mudanças
      description: Especifica a forma como a bota da alavanca de mudanças se fixa
        ao painel do veículo ou ao acabamento da alavanca (por exemplo, aro de acabamento
        com encaixe, anel de retenção, adesivo).
    shift_boot_installation_hardware_included:
      name: Equipamento de instalação da bota da alavanca de mudanças incluído
      description: Enumera o equipamento e componentes de instalação incluídos com
        a bota da alavanca de mudanças.
    shift_knob_illumination:
      name: Iluminação do botão da alavanca de mudanças
      description: Especifica se o botão da alavanca de mudanças inclui iluminação
        e o método/tipo de iluminação (por exemplo, fotoluminescente, LED, fibra ótica,
        padrão retroiluminado).
    shift_knob_installation_method:
      name: Método de instalação do botão de mudanças
      description: Especifica a forma como o botão de mudanças se fixa ao seletor/alavanca.
    shift_knob_shape:
      name: Forma do botão de mudanças
      description: Descreve o formato ergonómico geral do botão de mudanças.
    shift_pattern_type:
      name: Tipo de padrão de mudanças
      description: Especifica o estilo da marcação das mudanças no botão de mudanças
        (se existir).
    shifter_compatibility:
      name: Compatibilidade com manípulos de mudanças
      description: Indica se a extensão do guiador é compatível com manípulos de mudanças
        eletrónicos, manípulos de mudanças mecânicos, ambos ou se não é compatível
        com manípulos de mudanças.
    shifter_mounting_interface:
      name: Interface de montagem do manípulo de mudanças
      description: Descreve como o manípulo de mudanças se fixa à bicicleta (por exemplo,
        tamanho de braçadeira discreta, I-Spec, MatchMaker, extremidade do guiador,
        tubo inferior, sem fios).
    shifting_actuation_type:
      name: Tipo de acionamento das mudanças
      description: Identifica o mecanismo utilizado para mudar de mudança no grupo
        (mecânico, eletrónico com fios, eletrónico sem fios, hidráulico).
    shifting_mechanism:
      name: Mecanismo de mudança
      description: Identifica se o manípulo de mudanças funciona de forma mecânica
        ou eletrónica e se é indexado ou baseado em fricção.
    shim_purpose:
      name: Finalidade da caneleira
      description: Define o tipo funcional do produto (por exemplo, calço, cunha,
        espaçador) para que os ciclistas possam encontrar rapidamente a solução de
        ajuste certa sem necessidade de subcategorias separadas.
    shin_guard_attachment_method:
      name: Método de fixação da caneleira
      description: Classifica o formato geral do design da caneleira, incluindo a
        integração com a proteção do tornozelo ou a construção em forma de meia.
    shirt_cuff_style:
      name: Estilo do punho da camisa
      description: Identifica a construção do punho da manga, o que afeta a formalidade,
        a combinação com botões de punho e o conforto.
    shochu_base_ingredient:
      name: Ingrediente base do shochu
      description: Identifica a principal fonte de amido ou açúcar utilizada na produção
        do shochu.
    shochu_soju_variety:
      name: Variedade de shochu e soju
      description: Classifica o produto de acordo com o seu estilo ou tipo de produção
        reconhecido.
    shock_absorber_bushing_material:
      name: Material da bucha do amortecedor
      description: Material das buchas de montagem/isoladores fornecidos com o amortecedor
        ou integrados no mesmo.
    shock_absorber_charge_type:
      name: Tipo de carga do amortecedor
      description: Especifica a tecnologia de carga/amortecimento do amortecedor (por
        exemplo, hidráulico/óleo, a gás, a ar) e/ou o desenho do tubo relacionado,
        quando aplicável.
    shock_absorber_mount_type_lower:
      name: Tipo de fixação do amortecedor (inferior)
      description: Tipo de interface de montagem inferior do amortecedor para compatibilidade
        de instalação.
    shock_absorber_mount_type_upper:
      name: Tipo de montagem do amortecedor (superior)
      description: Especifica o estilo da interface de montagem superior de um amortecedor
        de veículo motorizado para correspondência de montagem/compatibilidade.
    shock_absorber_position:
      name: Posição do amortecedor
      description: Especifica se o amortecedor se destina à posição dianteira, traseira,
        esquerda ou direita no veículo (mais detalhado do que a colocação apenas no
        eixo).
    shock_absorption_system:
      name: Sistema de amortecimento
      description: Define o mecanismo utilizado para reduzir a vibração e o ruído
        no rebote.
    shoe_collar_height:
      name: Altura da gola do sapato
      description: Classifica os sapatos de acordo com a altura da gola/corte (baixo,
        médio, alto) para indicar a cobertura do tornozelo e o apoio.
    shoe_cover_height:
      name: Altura da capa para sapatos
      description: Especifica o nível de cobertura da capa para sapatos de ciclismo,
        distinguindo as capas para a ponta dos pés das capas completas de corte alto.
    shoe_sizing_system:
      name: Sistema de tamanhos de calçado
      description: Identifica o padrão de tamanhos (EUA, Reino Unido, UE, Japão, Mondopoint,
        etc.) utilizado para o tamanho de calçado indicado.
    shoelace_aglet_material:
      name: Material das pontas dos atacadores
      description: Identifica o material utilizado nas pontas dos atacadores, o que
        influencia a durabilidade e o estilo.
    shooting_rest_design:
      name: Design do suporte de tiro
      description: Classifica o estilo estrutural do suporte (suporte tipo bolsa,
        trenó, tripé, grampo para arma, etc.).
    shooting_stick_yoke_design:
      name: Design do garfo do bastão de tiro
      description: Especifica o estilo do suporte ou garfo que se encaixa na arma
        de fogo ou na ótica.
    shooting_target_style:
      name: Tipo de alvo de tiro
      description: Classifica o estilo ou design dos alvos de tiro para patinagem
        artística e hóquei, para que os clientes possam selecionar o foco de treino
        de que necessitam.
    shooting_target_type:
      name: Tipo de alvo de tiro
      description: Classifica os alvos de tiro por estilo estrutural, material ou
        design (por exemplo, gongo, silhueta, alvo de papel, alvo giratório), permitindo
        aos atiradores localizar rapidamente o alvo correto para a sua disciplina
        e tipo de arma de fogo.
    short_block_assembly_balance_type:
      name: Tipo de equilíbrio do conjunto do bloco curto
      description: Indica se o conjunto rotativo é equilibrado internamente ou externamente.
    short_block_intended_use:
      name: Utilização prevista do bloco curto
      description: Principal caso de utilização previsto para o bloco curto.
    short_block_rotating_assembly_included:
      name: Conjunto rotativo do bloco curto incluído
      description: Especifica quais os principais componentes do conjunto rotativo
        que estão incluídos no bloco curto.
    shot_size:
      name: Tamanho do chumbo
      description: Especifica a designação do tamanho do chumbo para chumbo solto
        ou componentes de munições.
    shotgun_action_type:
      name: Tipo de ação de espingarda
      description: Especifica o mecanismo de funcionamento/ação da espingarda.
    shotgun_choke_type:
      name: Tipo de estrangulamento da espingarda
      description: Especifica a configuração do estrangulamento do(s) cano(s) da espingarda.
    shotgun_gauge:
      name: Calibre da espingarda
      description: Especifica o calibre do cano de uma espingarda (e calibre .410,
        quando aplicável) para identificação e filtragem em listagens de artigos de
        coleção.
    shotgun_stock_material:
      name: Material da coronha da espingarda
      description: Especifica o material principal da coronha/guarda-mão (acabamentos).
    shuffleboard_speed_rating:
      name: Classificação de velocidade do shuffleboard
      description: Indica a velocidade de deslizamento relativa que o pó para shuffleboard
        ou outro produto de manutenção proporciona na mesa, permitindo aos jogadores
        escolher a velocidade adequada ao seu nível de habilidade e ao comprimento
        da mesa.
    shuffleboard_table_length_compatibility:
      name: Compatibilidade com o comprimento da mesa de shuffleboard
      description: Comprimento padrão da mesa de shuffleboard para o qual um produto
        foi concebido para se adequar ou complementar.
    shuttlecock_base_material:
      name: Material da base do volante
      description: Identifica o material utilizado no bico/base do volante, o que
        afeta a durabilidade, o toque e o rebote.
    shuttlecock_feather_material:
      name: Material das penas do volante
      description: Identifica a principal origem das penas ou o tipo de construção
        utilizado na saia do shuttlecock, influenciando a durabilidade, a consistência
        e o preço.
    shuttlecock_grade:
      name: Classificação do shuttlecock
      description: Especifica o nível de jogo pretendido ou a classificação de qualidade
        (por exemplo, treino, clube, competição).
    shuttlecock_speed_rating:
      name: Classificação de velocidade do volante
      description: Especifica a velocidade ou classificação do shuttlecock designada
        pelo fabricante, permitindo aos jogadores selecionar a velocidade de voo correta
        para as suas condições de jogo, temperatura e altitude.
    side_panel_installation_state:
      name: Estado de instalação do painel lateral
      description: Especifica se o painel lateral é fornecido em bruto, com primário,
        pintado ou com outro tipo de revestimento/preparação para instalação.
    side_wall_mechanism:
      name: Mecanismo da parede lateral
      description: Descreve como a parede lateral do berço se abre ou desce para permitir
        o acesso ao bebé.
    signal_source:
      name: Fonte do sinal
      description: Indica como o odómetro recebe/calcula as informações de distância
        ou tempo.
    silk_fiber_type:
      name: Tipo de fibra de seda
      description: Tipo/origem da fibra de seda utilizada para fabricar o tecido (por
        exemplo, amoreira ou tussah), com impacto na textura, uniformidade e preço.
    simulated_game_species:
      name: Espécie de caça simulada
      description: Indica a ave ou animal de caça específico que o manequim reproduz
        para um treino realista.
    singlet_cut_style:
      name: Estilo de corte do singlet
      description: Especifica o corte/estilo do singlet de luta livre, tendo em conta
        a altura das alças, o estilo das costas e as variações de género/idade.
    sink_material:
      name: Material do lavatório
      description: Especifica o material da(s) pia(s) integrada(s) incluída(s) no
        lavatório.
    sinker_attachment_style:
      name: Tipo de fixação do chumbo
      description: Descreve o mecanismo previsto no chumbo de margem para a sua fixação
        à linha de pesca ou ao equipamento.
    sinker_finish:
      name: Acabamento do chumbo
      description: Especifica o revestimento exterior ou o tratamento de superfície
        do chumbo.
    sinker_shape:
      name: Forma do chumbo
      description: Define a forma geométrica do chumbo (por exemplo, bala, cilindro,
        lágrima), para que os pescadores possam escolher a apresentação ideal e a
        resistência a encravamentos.
    siren_system_included:
      name: Sistema de sirene incluído
      description: Indica se está instalado um sistema de sirene/PA e de que tipo.
    siren_system_type:
      name: Tipo de sistema de sirene
      description: Especifica a configuração da sirene/PA instalada na viatura policial.
    size_designation:
      name: Designação do tamanho
      description: Etiqueta de tamanho padronizada para o instrumento triangular.
    size_system:
      name: Sistema de tamanhos
      description: Especifica o sistema de tamanhos ou a norma regional a que a etiqueta
        de tamanho corresponde (por exemplo, EUA, Reino Unido, UE, tamanho internacional).
    sizzle_mechanism:
      name: Mecanismo de sizzle
      description: Especifica como o prato produz o efeito de sizzle (por exemplo,
        rebites instalados no prato, corrente/sizzler acoplável ou sem acessórios
        incluídos).
    skate_blade_discipline:
      name: Modalidade da lâmina de patins
      description: Identifica a modalidade ou aplicação para a qual a lâmina foi concebida,
        como hóquei ou patinagem artística, permitindo aos compradores filtrar as
        lâminas relevantes.
    skate_brake_type:
      name: Tipo de travão dos patins
      description: Identifica o tipo de mecanismo de travagem incluído nos patins.
    skateboard_nut_thread_size:
      name: Tamanho da rosca da porca do skate
      description: Especifica o tamanho da rosca (diâmetro e passo) da porca para
        garantir a compatibilidade com eixos, pinos centrais ou acessórios de montagem
        do skate.
    skein_winder_bearing_bushing_type:
      name: Tipo de rolamento/bucha do enrolador de novelos
      description: Especifica o tipo de rolamento ou bucha utilizado no conjunto rotativo
        do enrolador de novelos.
    skein_winder_drive_type:
      name: Tipo de acionamento do enrolador de novelos
      description: Como o enrolador de novelos é acionado/girado durante a utilização.
    ski_binding_mechanism:
      name: Mecanismo de fixação de esquis
      description: Define o design mecânico fundamental ou a disciplina da fixação
        (por exemplo, alpino, técnico/pino, telemark).
    ski_binding_part_type:
      name: Tipo de peça da fixação de esquis
      description: Identifica o componente ou acessório específico para fixações de
        esqui, permitindo uma filtragem rápida entre muitos tipos de peças.
    ski_boot_sole_standard:
      name: Norma da sola da bota de esqui
      description: Identifica a norma da sola ou a norma de compatibilidade com a
        fixação para a qual a bota de esqui está certificada.
    skill_focus:
      name: Foco na habilidade
      description: Identifica a principal habilidade de basquetebol que o equipamento
        de treino se destina a desenvolver.
    skimboard_construction:
      name: Construção da prancha de skimboard
      description: Descreve a estrutura principal do tabela, com destaque para o núcleo
        e a técnica de lançamento (por exemplo, núcleo de espuma, núcleo de madeira).
    skin_presence:
      name: Presença de pele
      description: Especifica se o frango é vendido com a pele, sem pele ou parcialmente
        sem pele.
    slapstick_handle_type:
      name: Tipo de pega do slapstick
      description: Descreve o estilo de pega/pega integrada no slapstick, afetando
        a ergonomia e o conforto de jogo.
    slapstick_playing_surface_material:
      name: Material da superfície de jogo do slapstick
      description: Especifica o material dos elementos de batida/palmadinha que entram
        em contacto uns com os outros para produzir o som.
    sled_brake_type:
      name: Tipo de travão do trenó
      description: Especifica o mecanismo de travagem incluído no trenó, se houver.
    sled_towing_method:
      name: Método de reboque do trenó
      description: Indica a forma principal como o trenó é puxado ou rebocado.
    sleep_position_suitability:
      name: Adequação à posição de dormir
      description: Indica para que posição(ões) de dormir o colchão foi concebido
        para oferecer o melhor apoio.
    sleeping_bag_shape:
      name: Forma do saco-cama
      description: Corte geral do saco de dormir, que afeta o calor, o peso e o espaço
        interior.
    sleeping_pad_type:
      name: Tipo de colchão de dormir
      description: Identifica o estilo de construção do colchão — como espuma de célula
        fechada ou ar insuflável — que afeta diretamente o conforto, o peso e o isolamento.
    sleepwear_set_pieces_included:
      name: Peças do conjunto de dormir incluídas
      description: Enumera os componentes individuais fornecidos num conjunto de roupa
        de dormir ou de estar em casa composto por várias peças.
    sleeve_bearing_type:
      name: Tipo de rolamento da manga
      description: Identifica a tecnologia que permite a rotação da manga, afetando
        a qualidade da rotação nos levantamentos olímpicos.
    sleeve_style:
      name: Estilo de manga
      description: Especifica o estilo da manga para além do comprimento (por exemplo,
        raglan).
    slide_board_accessories_included:
      name: Acessórios da corrediça incluídos
      description: Enumera os itens adicionais incluídos na embalagem da corrediça,
        para que os compradores saibam exatamente o que está incluído e possam comparar
        os pacotes.
    slide_installation_type:
      name: Tipo de instalação do escorrega
      description: Como a corrediça deve ser instalada ou montada (de forma independente,
        fixada a um conjunto de brinquedos, etc.).
    slide_intended_finger:
      name: Dedo para o qual a corrediça se destina
      description: Indica em que dedo a corrediça deve ser usada, ou se isso não se
        aplica (por exemplo, uma barra de afinação).
    slide_safety_features:
      name: Características de segurança da corrediça
      description: Elementos de design relacionados com a segurança incluídos na corrediça.
    slide_type:
      name: Tipo de corrediça
      description: Especifica o(s) tipo(s) de mecanismo de corrediça de latão que
        o produto se destina a limpar.
    slide_water_use_capability:
      name: Capacidade de utilização com água da corrediça
      description: Se a corrediça foi concebida para ser utilizada com água (por exemplo,
        ligação a uma mangueira) e de que forma.
    slime_putty_kit_components_included:
      name: Componentes do kit de slime e massa incluídos
      description: Enumera as ferramentas e os acessórios incluídos no produto de
        slime/massa (especialmente no caso de kits/pacotes).
    sling_material:
      name: Material da cinta
      description: Especifica a fibra/tecido utilizado na correia do quickdraw (dog-bone).
    smith_machine_bar_path:
      name: Trajetória da barra da máquina Smith
      description: Descreve a trajetória fixa do movimento da barra, informando os
        utilizadores sobre a biomecânica e os requisitos de espaço.
    smoke_color:
      name: Cor do fumo
      description: Cor do fumo produzido pelo sinalizador/fogo de sinalização (distinta
        da cor do corpo do produto).
    smoked_malt_smoking_material:
      name: Material de fumagem do malte fumado
      description: Para maltes fumados, identifica o material utilizado durante a
        fumagem (por exemplo, espécies específicas de madeira ou turfa).
    snack_mix_variety:
      name: Variedade de misturas de snacks
      description: Classifica o produto de acordo com o tipo de mistura (por exemplo,
        mistura de frutos secos, mistura de nozes, namkeen, sev).
    snack_processing_method:
      name: Método de processamento do snack
      description: Indica a principal técnica de processamento ou conservação utilizada
        na confeção do snack (por exemplo, liofilizado, cozido no forno, torrado).
    snack_texture:
      name: Textura do snack
      description: Indica a textura física ou a sensação na boca dos palitos de sésamo.
    snap_installation_method:
      name: Método de instalação do fecho de mola
      description: Como a mola é instalada/fixada ao material do projeto.
    snare_drum_bearing_edge_profile:
      name: Perfil da borda de apoio do tambor de tarola
      description: Corte/perfil da borda de apoio do corpo do tambor de tarola.
    snare_drum_finish_type:
      name: Tipo de acabamento do tambor de tarola
      description: Tipo/construção de acabamento de alto nível utilizado no corpo
        da tarola.
    snare_drum_hoop_type:
      name: Tipo de aro do tambor de tarola
      description: Tipo de aros/bordas utilizados no tambor de tarola.
    snare_drum_mounting_type:
      name: Tipo de montagem do tambor de tarola
      description: Como se pretende montar/utilizar a tarola.
    snare_drum_shell_material:
      name: Material do corpo do tambor de tarola
      description: Especifica o metal/liga utilizada no corpo da tarola (o corpo principal),
        o que afeta fortemente o tom, o peso e a durabilidade.
    snare_drum_strainer_mechanism:
      name: Mecanismo de tensão do tambor de tarola
      description: Tipo de mecanismo de tensão/desengate da tarola utilizado para
        ativar/desativar as cordas da tarola.
    snare_drum_strainer_type:
      name: Tipo de tensão do tambor de tarola
      description: Tipo de mecanismo de tensão/desengate da tarola utilizado para
        ativar/desativar as cordas da tarola.
    snare_hoop_type:
      name: Tipo de aro da tarola
      description: Tipo de aros/bordas do tambor de tarola.
    snare_throw_off_type:
      name: Tipo de desengate da tarola
      description: Tipo de mecanismo de tensão/desengate utilizado para ativar/desativar
        as cordas da tarola.
    snip_cutter_spring_mechanism:
      name: Mecanismo de mola do cortador
      description: Indica se o cortador utiliza um mecanismo de mola/retorno e o seu
        tipo.
    snorkel_mount_position:
      name: Posição de montagem do tubo respiratório
      description: Descreve a localização do tubo respiratório na cabeça do utilizador
        durante a utilização.
    snorkel_top_type:
      name: Tipo de tampa do tubo de respiração
      description: Descreve o tipo de proteção contra a entrada de água na parte superior
        do tubo de respiração incluído no conjunto.
    snow_condition_suitability:
      name: Adequação às condições da neve
      description: Descreve as principais condições de neve para as quais a cera foi
        concebida.
    snow_sports_helmet_safety_certification:
      name: Certificação de segurança do capacete para desportos de neve
      description: Identifica a(s) norma(s) de segurança que o capacete cumpre para
        a prática de esqui e snowboard.
    snowboard_base_material:
      name: Material da base da prancha de snowboard
      description: Identifica a composição ou o acabamento da base (extrudida, sinterizada,
        fórmulas exclusivas) que influencia a velocidade, a durabilidade e a manutenção.
    snowboard_width_class:
      name: Classe de largura da prancha de snowboard
      description: Classifica a largura total da prancha em relação ao tamanho da
        bota (por exemplo, regular, larga).
    soccer_ball_compartment_type:
      name: Tipo de compartimento para bola de futebol
      description: Especifica como (ou se) a mochila acomoda uma bola de futebol.
    soccer_ball_type:
      name: Tipo de bola de futebol
      description: Especifica a utilização prevista ou o tipo de bola de futebol (por
        exemplo, de jogo, de treino, de futsal), para que os compradores possam encontrar
        rapidamente a variante certa sem precisarem de recorrer a muitas subcategorias.
    soccer_dummy_base_type:
      name: Tipo de base do manequim de futebol
      description: Descreve o tipo de base ou mecanismo de fixação utilizado pelo
        manequim.
    soccer_dummy_design:
      name: Design do manequim de futebol
      description: Especifica o estilo de construção de um alvo de baliza de futebol,
        como rígido ou insuflável.
    soccer_goal_target_style:
      name: Estilo do alvo de baliza de futebol
      description: Define o formato físico ou o design do alvo de treino para que
        os compradores possam escolher o estilo que melhor se adapta aos seus exercícios.
    soccer_goal_type:
      name: Tipo de baliza de futebol
      description: Indica o estilo estrutural ou a utilização pretendida da baliza
        (por exemplo, pop-up, reboteador, de rua).
    sock_cushioning:
      name: Amortecimento da meia
      description: Indica a quantidade e o tipo de amortecimento ou acolchoamento
        incorporado na sola da meia.
    sock_cushioning_level:
      name: Nível de amortecimento da meia
      description: Especifica a quantidade de amortecimento integrado na sola da meia.
    sock_grip_type:
      name: Tipo de aderência da meia
      description: Descreve quaisquer características de tração ou antiderrapantes
        aplicadas à sola da meia.
    sock_toe_style:
      name: Estilo da ponta da meia
      description: Descreve o estilo de construção da zona da ponta da meia.
    soft_bait_style:
      name: Tipo de isca de plástico macio
      description: Classifica o design ou perfil do corpo da isca de plástico macio
        (por exemplo, minhoca, swimbait, larva).
    soft_top_attachment_type:
      name: Tipo de fixação da capota
      description: Identifica a forma como a capota se fixa ao veículo (canais, molas,
        velcro, etc.).
    soft_top_includes_frame_hardware:
      name: A capota inclui estrutura/ferragens
      description: Indica se o produto inclui a estrutura/arcos da capota e/ou ferragens
        de montagem.
    soft_top_installation_type:
      name: Tipo de instalação da capota
      description: Especifica como a capota do veículo é instalada/fixada, indicando
        o método de instalação previsto e o esforço necessário.
    soft_top_window_configuration:
      name: Configuração das janelas da capota
      description: Indica quantas janelas a capota possui e quais as posições disponíveis.
    softball_certification:
      name: Certificação da bola de softbol
      description: Enumera os carimbos ou aprovações das entidades reguladoras impressos
        na bola que determinam a elegibilidade para a liga/jogo.
    softness_level:
      name: Nível de suavidade
      description: Indica o grau de suavidade/baixo perfil do lado felpudo, relevante
        para o conforto em contacto com a pele e para aplicações que exigem pouco
        volume.
    solar_system_model_included_bodies:
      name: Corpos celestes incluídos no modelo do sistema solar
      description: Indica quais os corpos celestes representados no conjunto do modelo.
    solar_system_model_scaling:
      name: Escala do modelo do sistema solar
      description: Indica se o modelo do sistema solar está à escala no que diz respeito
        ao tamanho dos planetas, às distâncias/órbitas, a ambos, ou se se trata de
        uma representação esquemática/não à escala.
    sold_secure_certification_level:
      name: Nível de certificação Sold Secure
      description: Indica a classificação Sold Secure atribuída à fechadura pelo organismo
        de testes independente do Reino Unido (bronze, prata, ouro, diamante).
    sold_secure_rating:
      name: Classificação Sold Secure
      description: Indica o nível de certificação Sold Secure atribuído à fechadura.
    sole_construction:
      name: Construção da sola
      description: Indica como a sola da sapatilha é construída (inteira, dividida,
        de duas peças, etc.), afetando diretamente a flexibilidade, o contacto com
        o chão e a adequação a técnicas de dança específicas.
    sole_type:
      name: Tipo de sola
      description: Descreve o estilo estrutural da sola, indicando a flexibilidade
        e a utilização pretendida.
    soprano_saxophone_body_style:
      name: Estilo do corpo do saxofone soprano
      description: Descreve a configuração física do corpo do saxofone soprano.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Tipo de defletor da boquilha do saxofone soprano
      description: Descreve o desenho do defletor/teto do bocal (o contorno atrás
        da ponta), que afeta o brilho, a projeção e a resposta.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Tamanho da câmara da boquilha do saxofone soprano
      description: Descreve o tamanho da câmara interna do bocal do saxofone soprano,
        que influencia a resistência e a cor tonal.
    soprano_saxophone_mouthpiece_finish:
      name: Acabamento da boquilha do saxofone soprano
      description: Acabamento da superfície/revestimento aplicado ao bocal (se aplicável).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Acessórios incluídos com o bocal de saxofone soprano
      description: Identifica quais os acessórios incluídos com o bocal.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Característica tonal do bocal de saxofone soprano
      description: Perfil tonal de alto nível comumente associado ao design do bocal.
    sound_character:
      name: Característica sonora
      description: Descreve o timbre geral produzido pelo slapstick.
    sound_expansion_method:
      name: Método de expansão sonora
      description: Especifica como o módulo pode adicionar ou expandir a sua biblioteca
        de sons interna para além dos sons de fábrica (por exemplo, pacotes de conteúdo,
        importação de amostras, placas de expansão).
    sound_module_sound_library_focus:
      name: Foco da biblioteca de sons do módulo de som
      description: Ênfase principal do conjunto de sons de fábrica para ajudar os
        compradores a encontrar o módulo certo para o seu estilo/caso de utilização.
    sound_port_type:
      name: Tipo de abertura de som
      description: Descreve o design do orifício/porta de som na parte traseira do
        cajon que influencia a projeção e a resposta de graves.
    sound_sensitivity_control:
      name: Controlo de sensibilidade de som
      description: Indica se e como a sensibilidade de som pode ser ajustada.
    sound_synthesizer_patch_memory:
      name: Memória de patches do sintetizador de som
      description: Indica se o sintetizador pode armazenar e recuperar predefinições
        (patches).
    sound_type:
      name: Tipo de som
      description: Tipo(s) de som principal(is) ou saídas de áudio que o tapete produz
        (por exemplo, instrumentos, músicas, mensagens de voz) para orientar a reprodução.
    soundboard_material:
      name: Material da placa de ressonância
      description: Material utilizado na placa de ressonância (tampo) da harpa, responsável
        pela ressonância e pelo timbre.
    soup_or_broth_variety:
      name: Variedade de sopa ou caldo
      description: Especifica o estilo, a receita ou a preparação culinária da sopa
        ou do caldo, para que os compradores possam localizar rapidamente o seu tipo
        preferido.
    sour_cream_variety:
      name: Variedade de natas ácidas
      description: Classifica os produtos de natas ácidas pela sua variedade específica
        ou estilo cultural, como crème fraîche ou crema mexicana.
    soy_sauce_variety:
      name: Variedade de molho de soja
      description: Identifica o estilo ou a formulação específica do molho de soja
        (por exemplo, claro, escuro, tamari, ponzu), permitindo aos compradores filtrar
        rapidamente por perfil de sabor e utilização culinária.
    spark_plug_electrode_material:
      name: Material do elétrodo da vela de ignição
      description: Material/tecnologia da(s) ponta(s) do elétrodo de ignição da vela
        (central e/ou de massa), tal como comercializada (por exemplo, cobre, platina,
        irídio).
    spark_plug_seat_type:
      name: Tipo de sede da vela de ignição
      description: Tipo de vedação/sede utilizado pela vela de ignição na interface
        com a cabeça do cilindro.
    spark_plug_terminal_type:
      name: Tipo de terminal da vela de ignição
      description: Tipo de terminal superior utilizado para ligar o cabo de ignição/ponta
        isolante.
    sparkler_shape:
      name: Forma da vela de ignição
      description: Forma geral e design inovadores da vela de ignição.
    speaker_cone_material:
      name: Material do cone do altifalante
      description: Material principal do cone do altifalante (cone do woofer/médios).
    speaker_size:
      name: Tamanho do altifalante
      description: Tamanho nominal do driver/tamanho de montagem para o altifalante
        componente (por exemplo, 6,5 pol., 6x9 pol.), utilizado para corresponder
        às localizações de fábrica e aos adaptadores de altifalantes.
    special_effects_output_interface:
      name: Interface de saída de efeitos especiais
      description: Especifica o conector/interface de saída utilizado para controlar
        dispositivos de efeitos especiais.
    special_effects_stand_stability_features:
      name: Características de estabilidade do suporte de efeitos especiais
      description: Especifica as características de estabilidade e segurança integradas
        destinadas a impedir que o suporte tombe ou escorregue durante eventos.
    specialty_malt_name_type:
      name: Nome/tipo de malte especial
      description: Identifica o tipo específico de malte especial com nome (frequentemente
        utilizado como nome comercial do estilo).
    specimen_presentation:
      name: Apresentação do espécime
      description: Indica como o espécime colecionável é preparado ou apresentado
        (por exemplo, em bruto/não preparado, polido, cortado ou montado).
    speed_bag_accessories_included:
      name: Acessórios incluídos com o saco de velocidade
      description: Enumera itens adicionais fornecidos com o saco de velocidade, tais
        como luvas, bombas de ar, giratórios, correntes ou suportes.
    speed_rating:
      name: Classificação de velocidade
      description: Indica a velocidade da superfície de jogo proporcionada pelo pano
        da mesa de bilhar (por exemplo, lenta, média ou rápida).
    speedometer_backlight_type:
      name: Tipo de retroiluminação do velocímetro
      description: Especifica se o velocímetro possui retroiluminação e de que forma,
        para garantir a visibilidade noturna.
    speedometer_display_type:
      name: Tipo de visor do velocímetro
      description: 'Indica o estilo de leitura da velocidade no velocímetro: ponteiro/mostrador
        analógico, leitura numérica digital ou uma combinação de elementos analógicos
        e digitais.'
    speedometer_unit_of_measure:
      name: Unidade de medida do velocímetro
      description: Especifica as unidades de velocidade apresentadas no mostrador/visor.
    spike_replaceability:
      name: Substituibilidade dos pitões
      description: Indica se os pitões da sapatilha são substituíveis, fixos ou se
        a sapatilha não tem pitões.
    spike_shape:
      name: Forma do pitão
      description: Identifica a forma geométrica da ponta do pitão, o que influencia
        a aderência e a adequação a diferentes superfícies.
    spike_thread_size:
      name: Tamanho da rosca dos pitões
      description: Especifica o tamanho ou o padrão da base roscada que enrosca na
        sapatilha (por exemplo, 1/4-20).
    spin_classification:
      name: Classificação de rotação
      description: Indica o perfil de rotação para o qual o disco foi concebido (rotação
        baixa, média, alta ou hiperrotação).
    spin_profile:
      name: Perfil de rotação
      description: Especifica as características relativas de rotação promovidas pelo
        eixo.
    spin_types_supported:
      name: Tipos de rotação suportados
      description: Enumera os tipos de rotação que a máquina consegue aplicar às bolas,
        permitindo aos jogadores treinar contra diferentes estilos de tacada.
    spinach_preparation_style:
      name: Modo de preparação dos espinafres
      description: Descreve a preparação física das folhas de espinafre ou o formato
        do produto (por exemplo, folha inteira, picada, em cubos).
    spinach_variety:
      name: Variedade de espinafre
      description: Identifica a variedade botânica ou comercial do espinafre (por
        exemplo, baby, crespo, espinafre-de-água, vermelho), permitindo aos compradores
        selecionar exatamente o tipo pretendido.
    spindle_bearing_surface_material:
      name: Material da superfície de apoio do fuso
      description: Material da ponta/superfície de apoio utilizado em fusos de suporte
        (topo/base), afetando a suavidade do movimento e o desgaste.
    spindle_bearing_type:
      name: Tipo de rolamento do eixo
      description: Tipo de interface entre a ponta/apoio do fuso e a taça/copo de
        suporte que reduz o atrito.
    spindle_finish:
      name: Acabamento do fuso
      description: Acabamento ou revestimento da superfície do fuso que afeta o toque,
        a durabilidade e a estética.
    spindle_hook_type:
      name: Tipo de gancho do fuso
      description: O mecanismo de retenção do fio localizado na parte superior do
        fuso, utilizado para prender o fio inicial/fibra.
    spindle_support_method:
      name: Método de suporte do fuso
      description: Forma como o fuso deve ser apoiado durante a fiação.
    spindle_tip_style:
      name: Estilo da ponta do fuso
      description: Forma/design da ponta que assenta na taça/copo (superfície de apoio),
        afetando o atrito e a suavidade da rotação.
    spindle_whorl_position:
      name: Posição do peso do fuso
      description: Onde o disco se encontra localizado no eixo do fuso.
    spinner_blade_shape:
      name: Forma da lâmina do spinner
      description: Identifica a forma principal da lâmina utilizada no spinner, influenciando
        a vibração, o brilho/reflexo e a profundidade de funcionamento.
    spinner_control_card_design_type:
      name: Tipo/design do cartão de controlo do spinner
      description: Descreve o tipo de cartão de controlo do spinner em termos da forma
        como apresenta as informações de controlo (por exemplo, referência de relação,
        referência de tensão, tabela de conversão).
    spinner_subtype:
      name: Subtipo de spinner
      description: Classifica o design geral ou a família do spinner (por exemplo,
        spinner em linha, spinnerbait).
    spinning_oil_application_area:
      name: Área de aplicação do óleo para roda giratória
      description: Especifica o(s) ponto(s) de aplicação da roda giratória onde o
        óleo deve ser aplicado.
    spinning_oil_application_tool:
      name: Ferramenta de aplicação de óleo para rodas giratórias
      description: Indica o tipo de ponta/aplicador da embalagem utilizado para aplicar
        óleo nas peças da roda giratória de forma controlada.
    spinning_oil_features:
      name: Características do óleo para roda giratória
      description: Destaca propriedades funcionais relevantes dos óleos para rodas
        giratórias (resíduos, manchas, oxidação e facilidade de lavagem).
    spinning_top_features:
      name: Características do pião
      description: Funcionalidades especiais de brincadeira incluídas no pião além
        da rotação básica.
    spinning_top_launch_mechanism:
      name: Mecanismo de lançamento do pião
      description: Forma como o pião é iniciado/impulsionado para girar.
    spinning_wheel_brake_tension_system_type:
      name: Tipo de sistema de travão/tensão da roda giratória
      description: Especifica o sistema de travagem/tensão de recolha utilizado para
        controlar a recolha do fio.
    spinning_wheel_drive_system:
      name: Sistema de acionamento da roda giratória
      description: Indica o sistema de acionamento para o qual a bobina foi concebida.
    spinning_wheel_hook_system:
      name: Sistema de gancho da roda giratória
      description: Especifica como o fio é guiado ao longo dos braços do fuso.
    spinning_wheel_part_application:
      name: Aplicação de componentes da roda giratória
      description: Especifica a que componentes da roda giratória o óleo se destina.
    spinning_wheel_portability_foldability:
      name: Portabilidade/capacidade de dobragem da roda giratória
      description: Indica se a roda giratória pode ser transportada facilmente ou
        dobrada para arrumação.
    spinning_wheel_tension_adjustment_type:
      name: Tipo de ajuste da tensão da roda giratória
      description: Como a tensão é ajustada na roda para controlo da recolha do fio.
    splice_termination_type:
      name: Tipo de terminação/emenda
      description: Especifica o tipo de terminação final fornecida na linha de ancoragem
        (por exemplo, olhal emendado, dedal, gancho de corrente).
    split_shot_cut_type:
      name: Tipo de corte/abertura do slip shot
      description: Especifica o formato da ranhura ou abertura que permite a fixação
        à linha.
    split_shot_shape:
      name: Forma do chumbo split-shot
      description: Descreve a forma física do slip shot, afetando a hidrodinâmica
        e a resistência a emaranhamentos.
    split_shot_size:
      name: Tamanho do slip shot
      description: Código alfanumérico padronizado de tamanho (por exemplo, SSG, AAA,
        BB, 1) utilizado por fabricantes e pescadores para classificar chumbadas de
        pressão (split shot). Complementa as medições exatas de peso.
    spoiler_adjustability:
      name: Ajustabilidade do spoiler
      description: Indica se o ângulo/altura do spoiler é ajustável.
    spoke_accessory_function:
      name: Função do acessório do raio
      description: Classifica a função principal do acessório na roda, como decorativa,
        refletora ou luminosa.
    spoke_butting_profile:
      name: Perfil de espessamento do raio
      description: Descreve como o diâmetro do raio varia ao longo do seu comprimento
        (liso, com espessamento numa extremidade, duplo, triplo ou quádruplo), afetando
        o peso e a resistência.
    spoke_gauge:
      name: Calibre dos raios
      description: Especifica o calibre (espessura nominal do fio) dos raios com os
        quais o nipple é compatível.
    spoke_interface_type:
      name: Tipo de interface dos raios
      description: Indica o tipo de cabeça do raio para o qual o cubo foi concebido
        (curvatura em J, tração reta, cabeça em T).
    spoke_shape:
      name: Forma do raio
      description: Especifica a secção transversal externa do fio do raio, influenciando
        a aerodinâmica e a estética.
    spool_form_factor:
      name: Formato do carretel
      description: Estilo físico do corpo da bobina e forma como o fio/linha é retido
        (por exemplo, flangeado ou cónico).
    spoon_style:
      name: Estilo da colher
      description: Indica o subtipo funcional ou o estilo da colher, como lançamento,
        flutter ou pesca à corrica.
    sports_bra_padding_type:
      name: Tipo de enchimento do soutien desportivo
      description: Especifica o tipo de enchimento do soutien desportivo.
    sports_cap_style:
      name: Estilo do boné desportivo
      description: Identifica o estilo geral de construção do boné (por exemplo, boné
        de basebol, boné ajustável), independentemente da marca ou equipa.
    sports_governing_body_certification:
      name: Certificação do organismo regulador desportivo
      description: Indica as certificações ou aprovações oficiais emitidas por organismos
        reguladores do desporto reconhecidos, confirmando que o produto cumpre as
        normas de competição.
    sports_surface_compatibility:
      name: Compatibilidade com superfícies desportivas
      description: Enumera os tipos de superfícies de jogo em que a tinta pode ser
        aplicada com segurança.
    sports_toy_set_contents:
      name: Conteúdo do conjunto de brinquedos desportivos
      description: Identifica os componentes incluídos no conjunto de brinquedos desportivos
        (por exemplo, bola, taco, rede, alvos).
    spray_string_cleanup_method:
      name: Método de limpeza do fio de spray
      description: Forma recomendada para remover/limpar resíduos do fio de spray.
    spray_string_finish_effect:
      name: Acabamento/efeito do fio de spray
      description: Efeito visual do fio de spray após a aplicação (brilho/refletividade
        e efeitos especiais).
    spray_string_formulation_type:
      name: Tipo de formulação do fio de spray
      description: Como o produto se comporta durante e após a pulverização (por exemplo,
        lavável vs. de efeito permanente).
    spray_string_recommended_surface:
      name: Superfícies recomendadas para o fio de spray
      description: Tipos de superfícies nas quais o fio de spray se destina a ser
        utilizado (e das quais é provável que se remova).
    spray_string_scent:
      name: Aroma do fio de spray
      description: Perfil de fragrância ou odor, se houver, do fio de spray.
    spray_string_suitable_age_group:
      name: Grupo etário adequado para o fio de spray
      description: Idade mínima recomendada do utilizador/grupo etário para uma utilização
        segura.
    spread_consistency:
      name: Consistência da pasta
      description: Descreve a textura/consistência do molho ou da pasta, a fim de
        definir as expectativas quanto à sensação na boca e à forma de utilização
        (por exemplo, suave, com pedaços, batida).
    spread_variety:
      name: Variedade da pasta
      description: Classifica o tipo específico de pasta de fruta (por exemplo, compota,
        geleia, marmelada, coalhada) para que os compradores possam distinguir entre
        diferentes estilos de preparação e texturas.
    spreader_bar_type:
      name: Tipo de barra espaçadora
      description: Indica o tipo de barra espaçadora ou sistema de ganchos fornecido
        ou compatível com o arnês.
    sprint_canoe_class:
      name: Classe de canoagem de velocidade
      description: Especifica a designação oficial da classe de canoagem de velocidade.
    sprout_presentation:
      name: Apresentação dos rebentos
      description: Identifica a apresentação física do produto (por exemplo, rebentos
        frescos, microverdes, vaso de cultivo vivo, pó).
    squash_and_gourd_variety:
      name: Variedade de abóbora e cabaça
      description: Identifica a cultivar específica ou variedade comercial da abóbora
        ou cabaça, ajudando os compradores a encontrar rapidamente o tipo pretendido.
    stability_class:
      name: Classe de estabilidade
      description: Classificação geral de estabilidade derivada das classificações
        de voo ou de alegações de marketing.
    stabilizer_thread_size:
      name: Tamanho da rosca do estabilizador
      description: Especificação da rosca utilizada para fixar um estabilizador ou
        acessório a um arco ou besta.
    stabilizer_type:
      name: Tipo de estabilizador
      description: Identifica o estilo ou a classificação posicional do estabilizador
        para arco ou besta.
    stages_supported:
      name: Número de estágios suportados
      description: Indica com quantos estágios um foguetão ou kit foi concebido para
        voar.
    stain_remover_format:
      name: Formato do removedor de manchas
      description: Especifica o formato/aplicação do produto utilizado para tratar
        manchas em veículos (frasco pulverizador, aerossol, espuma, gel, pó, toalhitas,
        caneta/marcador).
    stake_shape:
      name: Forma da estaca
      description: Define a secção transversal ou o estilo de conceção de uma estaca
        de tenda, o que influencia a capacidade de fixação em diferentes tipos de
        solo.
    stamp_block_features:
      name: Características do bloco para carimbos
      description: Destaca características funcionais dos blocos para carimbos, como
        grelhas de medição, pegas ou superfícies antiderrapantes.
    stamp_block_type:
      name: Tipo de bloco para carimbos
      description: Especifica a construção/o estilo do bloco para carimbos utilizado
        para montar carimbos (por exemplo, bloco acrílico transparente, bloco com
        base de madeira ou bloco de posicionamento).
    stamp_set_pieces_included:
      name: Peças incluídas no conjunto de carimbos
      description: Indica quais os componentes incluídos no conjunto de carimbos e
        almofada de tinta (por exemplo, carimbos, almofadas de tinta, marcadores).
    stand_padding_material:
      name: Material de acolchoamento do suporte
      description: Material utilizado nos pontos de contacto para proteger o acabamento
        do instrumento (por exemplo, espuma, borracha, silicone).
    staple_fiber_animal_fiber_type:
      name: Tipo de fibra animal descontínua
      description: Tipo específico de fibra de origem animal quando o tipo de origem
        da fibra curta é "Animal".
    staple_fiber_crimp_level:
      name: Nível de ondulação da fibra descontínua
      description: Grau de ondulação natural da fibra.
    staple_fiber_preparation_type:
      name: Tipo de preparação da fibra descontínua
      description: Estado de preparação/processamento da fibra tal como é vendida
        (modo de alinhamento e tratamento), o que influencia fortemente o método de
        fiação, a facilidade de trabalho da fibra e o resultado final.
    staple_fiber_source_type:
      name: Tipo de origem da fibra descontínua
      description: Categoria geral de origem do conteúdo da fibra.
    starch_processing_type:
      name: Tipo de processamento do amido
      description: Indica se o amido é nativo ou se foi modificado física ou quimicamente
        (por exemplo, instantâneo, pré-gelatinizado) para proporcionar propriedades
        funcionais específicas, como rapidez de espessamento ou tolerância à temperatura.
    starch_source:
      name: Origem do amido
      description: Especifica a origem botânica da qual o amido culinário ou espessante
        é derivado (por exemplo, milho, batata, tapioca). A origem é o principal fator
        diferenciador dos amidos culinários e influencia diretamente a adequação às
        receitas, as considerações relativas a alergénios e o comportamento de pesquisa
        dos consumidores.
    starfruit_variety:
      name: Variedade de carambola
      description: Identifica a cultivar específica ou variedade de carambola (por
        exemplo, Arkin, Fwang Tung).
    starter_drive_type:
      name: Tipo de acionamento do motor de arranque
      description: O tipo de mecanismo de acionamento/engate do motor de arranque
        utilizado para engatar o pinhão na coroa dentada.
    starter_pistol_action_type:
      name: Tipo de ação da pistola de partida
      description: Identifica o mecanismo de disparo/funcionamento da pistola de partida
        (por exemplo, ação simples, ação dupla, semiautomática).
    starter_pistol_caliber:
      name: Calibre da pistola de partida
      description: Especifica o calibre da munição de salva ou do cartucho para o
        qual a pistola de partida está preparada.
    starter_terminal_type:
      name: Tipo de terminal do motor de arranque
      description: Especifica o tipo de terminal/conector utilizado nas ligações elétricas
        do motor de arranque ou do solenóide de arranque (por exemplo, terminal de
        perno, terminal de lâmina, conector de ficha).
    starting_block_anchoring_method:
      name: Método de fixação dos blocos de partida
      description: Descreve a forma como os blocos se fixam à superfície da pista
        (por exemplo, espigões, ventosas, bases de borracha).
    steerer_tube_design:
      name: Design do tubo da coluna de direção
      description: Descreve o design estrutural do tubo da coluna de direção (reto,
        cónico, roscado, etc.), que determina a compatibilidade com a caixa de direção
        e o quadro.
    steering_cable_end_fitting_type:
      name: Tipo de encaixe da extremidade do cabo de direção
      description: Identifica o tipo de encaixe/fixação nas extremidades de um cabo
        de direção para embarcação (extremidade do leme e extremidade do motor/manete),
        de forma a garantir a compatibilidade com o sistema de direção e os pontos
        de ligação do motor. Utilize a designação padrão ou a designação do fabricante,
        quando aplicável.
    steering_column_adjustability_features:
      name: Características de ajuste da coluna de direção
      description: Indica quais as funções de ajuste incorporadas na coluna de direção.
    steering_column_ignition_provision:
      name: Provisionamento de ignição na coluna de direção
      description: Indica se a coluna de direção foi concebida para aceitar um cilindro
        de fechadura/interruptor de ignição e/ou bloqueio da direção.
    steering_column_shaft_end_interface_type:
      name: Tipo de interface da extremidade do eixo da coluna de direção
      description: Identifica o tipo de interface da extremidade do eixo da coluna
        de direção (por exemplo, estriada, dupla D, com chaveta).
    steering_column_shift_type:
      name: Tipo de alavanca de mudanças na coluna de direção
      description: Especifica se a coluna de direção inclui um mecanismo de mudanças
        montado na coluna e o seu tipo de transmissão.
    steering_component_drive_type:
      name: Tipo de acionamento do componente de direção
      description: Especifica o mecanismo de acionamento/assistência relevante para
        os componentes da direção (particularmente bombas e sistemas de direção assistida
        elétrica).
    steering_position:
      name: Posição de direção
      description: Especifica se a viatura tem condução à esquerda ou condução à direita.
    steering_pump_pulley_type:
      name: Tipo de polia da bomba de direção
      description: Especifica o tipo de acionamento/interface da polia utilizada com
        a bomba da direção.
    steering_rack_finish_coating:
      name: Acabamento/revestimento da cremalheira de direção
      description: Especifica o acabamento/revestimento exterior para proteção contra
        corrosão.
    steering_rack_position:
      name: Posição da cremalheira de direção
      description: Especifica onde a cremalheira é montada/utilizada no sistema de
        direção do veículo.
    steering_wheel_cover_installation_type:
      name: Tipo de instalação da cobertura do volante
      description: Como a cobertura do volante é instalada/fixada no volante.
    steering_wheel_grip_material:
      name: Material de aderência do volante
      description: Especifica o material do aro/superfície de aderência do volante
        (onde as mãos entram em contacto), que pode diferir do núcleo/raios do volante.
    steering_wheel_mounting_pattern:
      name: Padrão de montagem do volante
      description: Especifica o padrão de parafusos/orifícios utilizado para fixar
        o volante a um cubo ou adaptador (por exemplo, 3 parafusos, 5 parafusos).
    steering_wheel_rim_material_grip_surface:
      name: Material do aro do volante (superfície de aderência)
      description: Especifica o principal material de revestimento da superfície de
        aderência do aro (distinto do material de construção geral).
    stem_material:
      name: Material da haste
      description: Especifica o material utilizado especificamente na haste do tubo
        ou na boquilha (por exemplo, acrílico, ebonite, lucite).
    stencil_machine_consumable_type:
      name: Tipo de consumível da máquina de stencil
      description: Especifica os consumíveis necessários para o funcionamento (se
        aplicável).
    step_surface_texture:
      name: Textura da superfície do degrau
      description: Especifica o tipo de degrau ou o design/material da superfície
        destinado a melhorar a aderência e o conforto quando molhado.
    stepper_motion_type:
      name: Tipo de movimento de passo
      description: Define o movimento de passo principal oferecido pela máquina.
    stick_bow_profile:
      name: Perfil de curvatura do taco
      description: Especifica o perfil de curvatura (ou "tipo de curvatura") do cabo
        do taco de hóquei em campo, um fator crítico que influencia o controlo da
        bola, o desempenho no drag-flick e o estilo de jogo.
    stick_construction:
      name: Construção do stick
      description: Especifica o estilo de construção do taco de hóquei, como compósito
        de uma peça, compósito de duas peças ou madeira.
    stick_curvature_type:
      name: Tipo de curvatura do taco
      description: Descreve o perfil de curvatura do taco de lançamento, que afeta
        a distância e a precisão do lançamento.
    stick_head_shape:
      name: Forma da cabeça do taco
      description: Define a forma da cabeça do taco, afetando a receção, o estilo
        de remate e o controlo da bola de perto.
    stick_size_compatibility:
      name: Compatibilidade do tamanho do stick
      description: Identifica o grupo de tamanhos de tacos de hóquei com o qual o
        produto é compatível (por exemplo, Juvenil, Júnior, Intermédio, Sénior, Guarda-redes,
        Universal).
    sticker_decal_features:
      name: Características de autocolantes/decais
      description: Captura características de aplicação e desempenho específicas de
        autocolantes/decais (por exemplo, aplicação sem bolhas, reposicionáveis).
    sticker_finish:
      name: Acabamento do autocolante
      description: Descreve o acabamento da superfície/efeito visual dos autocolantes.
    sticker_format:
      name: Formato dos autocolantes
      description: Especifica o formato de venda dos autocolantes decorativos (por
        exemplo, folha, rolo, individual, livro).
    sticker_material_type:
      name: Tipo de material dos autocolantes
      description: Especifica o material principal do substrato dos autocolantes decorativos
        (não os elementos decorativos ou acabamentos).
    stilt_foot_attachment_type:
      name: Tipo de fixação do pé às pernas de pau
      description: Especifica como o pé do utilizador é fixado às pernas de pau (por
        exemplo, fivela, fecho de gancho e argola, atacadores).
    stirrup_style:
      name: Estilo do estribo
      description: Classifica o estilo específico do design ou da disciplina dos estribos,
        incluindo variações de segurança, disciplina e construção.
    stirrup_tread_material:
      name: Material da plataforma do estribo
      description: Especifica o material utilizado na zona de apoio do pé (plataforma/piso
        do estribo), que influencia a aderência, o conforto e a resistência ao desgaste.
    stitch_marker_and_counter_style:
      name: Estilo de marcadores e contadores de pontos
      description: Especifica o estilo ou formato dos marcadores de pontos ou contadores
        de malhas/carreiras (por exemplo, marcador de fecho, marcador de anel aberto,
        contador em anel, contador digital).
    stitch_types:
      name: Tipos de pontos
      description: Tipos de pontos (funcionais e decorativos) que a máquina pode produzir.
    stitching_method:
      name: Método de costura
      description: Indica como os painéis da bola são unidos entre si.
    stitching_state:
      name: Estado de costura
      description: Indica se as peças da peça de vestuário são fornecidas por costurar,
        semi-costuradas, costuradas ou prontas a vestir.
    stock_car_race_series:
      name: Série de corridas de stock car
      description: Especifica a entidade reguladora ou a série/classe de corridas
        para a qual o stock car foi construído para competir.
    stone_adhesion:
      name: Aderência do caroço
      description: Indica se o caroço do pêssego ou da nectarina é solto, aderente
        ou semi-solto.
    stone_creation_method:
      name: Método de produção da pedra
      description: Especifica se o caroço é natural, cultivado em laboratório, simulado
        ou reciclado.
    stone_cut_grade:
      name: Grau de lapidação da pedra
      description: Indica a avaliação geral da qualidade da lapidação da pedra.
    stone_cut_style:
      name: Estilo de lapidação da pedra
      description: Descreve o estilo de corte ou facetas da pedra de vidro (por exemplo,
        facetada ou cabochão).
    stone_fruit_cultivar:
      name: Cultivar de fruto de caroço
      description: Identifica a cultivar específica/variedade do pêssego ou da nectarina.
    stone_fruit_variety:
      name: Variedade de fruto de caroço
      description: Distingue o subtipo dentro da categoria (por exemplo, pêssego,
        nectarina ou pêssego achatado).
    stone_setting_type:
      name: Tipo de cravação da pedra
      description: Especifica como a pedra é fixada na peça (por exemplo, aro, garras,
        pavé, etc.).
    stone_transparency:
      name: Transparência da pedra
      description: Transparência/opacidade ótica da pedra de vidro.
    storage_case_type:
      name: Tipo de caixa de armazenamento
      description: Indica o tipo de recipiente em que o conjunto é fornecido para
        armazenamento e transporte (por exemplo, caixa, estojo, saco).
    storage_compartment_type:
      name: Tipo de compartimento de arrumação
      description: Especifica o tipo de compartimento de arrumação que a boia de natação
        disponibiliza para pertences pessoais.
    storage_media_and_transfer_methods_supported:
      name: Meios de armazenamento e métodos de transferência suportados
      description: Indica os meios ou métodos de ligação suportados para importar/exportar
        amostras e guardar/carregar projetos.
    storage_requirements:
      name: Requisitos de armazenamento
      description: Especifica como o produto deve ser armazenado antes e/ou depois
        de aberto para manter a qualidade e a segurança.
    stove_jack_compatibility:
      name: Compatibilidade com saída para tubo de fogão
      description: Indica se a tenda inclui uma abertura resistente ao fogo para a
        passagem de um tubo de fogão.
    straight_pin_application:
      name: Aplicação de alfinetes retos
      description: Especifica o caso de utilização previsto para alfinetes retos.
    straight_pin_finish:
      name: Acabamento do alfinete reto
      description: Descreve o acabamento da superfície ou o revestimento do alfinete
        (por exemplo, niquelado), que influencia a resistência à corrosão e o deslizamento.
    straight_pin_head_material:
      name: Material da cabeça do alfinete reto
      description: Especifica o material da cabeça do alfinete (quando existente),
        como plástico ou vidro.
    straight_pin_head_shape:
      name: Forma da cabeça do alfinete reto
      description: Descreve a forma/estilo da cabeça do alfinete, para facilitar a
        utilização e a visibilidade.
    strand_configuration:
      name: Configuração das voltas
      description: Indica quantas filas ou fios separados compõem a corrente de carteira
        (simples, dupla, tripla).
    strand_material:
      name: Material dos fios
      description: Especifica o material utilizado nos fios ou fitas individuais.
    strap_attachment_hardware:
      name: Acessórios para fixação da correia
      description: Especifica o tipo/design da ferragem utilizada para prender a correia
        ao instrumento ou ponto de suporte.
    strap_configuration:
      name: Configuração da correia
      description: Indica o número de pontos de fixação do capacete na correia (por
        exemplo, 2 pontos, 4 pontos), o que é importante para o ajuste, segurança
        e requisitos de federação.
    strap_functionality:
      name: Funcionalidade da correia
      description: Especifica a utilização principal ou o design da correia para tapete
        de ioga.
    strap_padding:
      name: Preenchimento da correia
      description: Indica o nível de preenchimento da correia, concebido para aumentar
        o conforto e distribuir melhor o peso.
    strap_side:
      name: Lado da correia
      description: Indica se a correia é concebida para a fixação esquerda, direita
        ou se é vendida em par.
    strap_width:
      name: Largura da correia
      description: Indica a largura relativa das correias de ombro (fina, média, larga),
        para orientar a escolha conforme a cobertura ou suporte pretendido.
    strength_classification:
      name: Classificação da intensidade
      description: Indica a designação de intensidade usada pelas marcas (por exemplo,
        leve, forte, extra forte).
    strength_grade:
      name: Grau de resistência
      description: Descreve a capacidade de resistência/força de fixação prevista
        do fecho de gancho e laço (velcro).
    stretch_level:
      name: Nível de elasticidade
      description: Indica o grau de elasticidade do tecido durante a utilização.
    stretch_type:
      name: Tipo de elasticidade
      description: Indica se o tecido possui elasticidade mecânica ou elástica e em
        que direções (por exemplo, unidirecional ou bidirecional).
    stretcher_bar_material:
      name: Material das barras do estrado da tela
      description: Material utilizado nas barras do estrado/estrutura da tela (por
        exemplo, pinho, abeto, choupo, bétula ou MDF/madeira industrializada).
    strike_shield_shape:
      name: Forma do escudo de impacto
      description: Especifica o formato geral da superfície de impacto de um escudo
        de treino.
    string_core_shape:
      name: Forma do núcleo da corda
      description: Especifica a forma do núcleo metálico utilizado em cordas enroladas,
        influenciando o toque e a estabilidade.
    string_coverage:
      name: Cobertura de cordas
      description: Especifica quais cordas o capotraste parcial foi concebido para
        pressionar/cobrir (por número ou conjunto comum).
    string_end_type:
      name: Tipo de terminal da corda
      description: Especifica como a corda termina no cavalete/cordal para garantir
        compatibilidade (especialmente importante em instrumentos acústicos, elétricos
        e alguns baixos).
    string_set_type:
      name: Tipo de conjunto de cordas
      description: Especifica se o produto é um conjunto completo ou cordas de substituição
        individuais.
    strung_status:
      name: Estado de encordoamento
      description: Indica se a cabeça de lacrosse é fornecida já encordoada com a
        rede ou se é vendida sem encordoamento.
    strut_placement:
      name: Localização do amortecedor
      description: Especifica a posição prevista de instalação no veículo (frente/traseira
        e esquerda/direita) para o amortecedor.
    stud_attachment_type:
      name: Tipo de fixação dos pitões
      description: Especifica como os pitões/cravos são fixados ou configurados na
        sola, influenciando a tração, a manutenção e a conformidade com regulamentos
        da modalidade.
    stud_configuration:
      name: Configuração dos pitões
      description: Define a forma e a disposição dos pitões/cravos na sola, influenciando
        a tração e o desempenho em diferentes superfícies.
    stud_material:
      name: Material dos pitões
      description: Identifica o material principal dos pitões/cravos, influenciando
        a durabilidade, o peso e a conformidade com regulamentos de segurança.
    stuffed_animal_features:
      name: Características do peluche
      description: Destaca as funcionalidades integradas de brincadeira e conforto
        do peluche.
    stump_base_type:
      name: Tipo de base do cepo
      description: Define o estilo da base ou sistema de montagem do cepo de críquete
        (por exemplo, espigão, retorno por mola, borracha com peso, etc.).
    stump_mechanism:
      name: Mecanismo dos postes
      description: Especifica o mecanismo de fixação ou de retorno dos cepos de críquete
        (por exemplo, retorno por mola ou fixo).
    stump_size:
      name: Tamanho dos cepos
      description: Categoria de tamanho dos cepos de críquete, indicando a altura
        típica e o grupo etário adequado para utilização.
    subwoofer_installation_type:
      name: Tipo de instalação do subwoofer
      description: Indica como o subwoofer se destina a ser instalado num sistema
        de áudio automóvel.
    sugar_cane_variety:
      name: Variedade de cana-de-açúcar
      description: Identifica a cultivar específica ou variedade comercial da cana-de-açúcar,
        que pode influenciar a cor, a doçura e o teor de fibra.
    sugar_content_level:
      name: Teor de açúcar
      description: Classifica o nível geral de açúcar ou a formulação do concentrado
        da bebida, permitindo aos consumidores encontrar rapidamente opções normais,
        reduzidas ou sem açúcar.
    sugar_refinement_level:
      name: Nível de refinação do açúcar
      description: Indica o grau ou tipo de refinação (cor, teor de melaço ou nível
        de processamento).
    sugar_source:
      name: Origem do açúcar
      description: Identifica a origem botânica ou material a partir da qual o açúcar
        é obtido.
    suit_fit:
      name: Ajuste do fato
      description: Indica o ajuste geral do fato, ou seja, o quão ajustado fica ao
        corpo.
    suit_pieces:
      name: Peças do fato
      description: Especifica quantas peças coordenadas estão incluídas no conjunto
        do fato (por exemplo, 2 peças, 3 peças, 4 peças).
    suitable_for_anchoring_use:
      name: Adequado para utilização como ancoragem
      description: Indica o caso de utilização de ancoragem a que a corda/linha se
        destina.
    suitable_for_craft_type:
      name: Tipo adequado para trabalhos manuais
      description: Especifica a aplicação de artes manuais para a qual o fio de bloqueio
        é destinado.
    suitable_for_paint_type:
      name: Tipo adequado de tinta
      description: Indica os tipos de tinta com os quais a tela é compatível ou segura
        para utilização.
    suitable_for_swim_stroke:
      name: Estilo de nado adequado
      description: Indica qual ou quais estilos de nado para os quais a pá de mão
        foi concebida ou otimizada.
    suitable_mounting_surface_material:
      name: Material adequado da superfície de montagem
      description: Especifica o tipo de superfície ou material de montagem para o
        qual o verso adesivo foi concebido para aderir.
    suitable_play_location:
      name: Local adequado para brincar
      description: Ambientes de utilização principais para os quais o brinquedo moinho
        de areia e água foi concebido.
    suitable_riding_conditions:
      name: Condições de utilização adequadas
      description: Indica as condições de utilização (por exemplo, seco, húmido, inverno)
        para as quais o lubrificante ou produto de limpeza para bicicleta foi formulado.
    suitable_snow_conditions:
      name: Condições de neve adequadas
      description: Indica as principais condições de neve para as quais a cera de
        aderência foi formulada.
    suitable_surface_type:
      name: Tipo de superfície adequado
      description: Especifica as superfícies de caminhada para as quais o punho foi
        concebido.
    suitable_table_size:
      name: Tamanho de mesa adequado
      description: Indica os comprimentos de mesa de bilhar/snooker para os quais
        a luz foi concebida para iluminar.
    sun_protection_rating_upf:
      name: Classificação de proteção solar (UPF)
      description: Indica o nível certificado de proteção solar UPF das peças de vestuário.
    sun_shade_attachment_method:
      name: Método de fixação do para-sol
      description: Especifica como o para-sol é fixado à janela ou ao para-brisas.
    sun_shade_style:
      name: Estilo do para-sol
      description: Indica o formato/construção do produto e a forma como o para-sol
        é utilizado e armazenado.
    sunchoke_variety:
      name: Variedade de tupinambo
      description: Indica a cultivar ou variedade específica de tupinambo (alcachofra-de-Jerusalém),
        fornecendo informação detalhada para jardineiros, cozinheiros e compradores
        exigentes.
    sunflower_oil_variety:
      name: Variedade de óleo de girassol
      description: Classifica o perfil de ácidos gordos ou a cultivar do óleo de girassol
        (por exemplo, alto teor de ácido oleico, médio teor de ácido oleico ou linoleico).
    sunflower_variety:
      name: Variedade de girassol
      description: Cultivar/variedade de girassol (variedades comerciais comuns para
        utilização como flor de corte).
    support_brace_features:
      name: Características da tala de suporte
      description: Lista as características funcionais relevantes da tala de suporte
        do pulso, como tecido respirável, tala removível ou placa metálica ajustável.
    support_leg_count:
      name: Número de pernas de apoio
      description: Indica o número de pontos de contacto com o solo quando o bastão
        de tiro está em utilização (por exemplo, monopé, bipé ou tripé).
    support_padding:
      name: Preenchimento do suporte
      description: Indica se a correia/o suporte inclui preenchimento integrado nos
        pontos de contacto (pescoço, ombro, polegar).
    support_structure_type:
      name: Tipo de estrutura de suporte
      description: Indica o método de construção utilizado para manter o corta-vento
        em posição vertical.
    supported_bowling_delivery_types:
      name: Tipos de lançamentos de bowling suportados
      description: Especifica as variações de lançamento de críquete que a máquina
        consegue simular, como lançamentos para dentro, para fora e diferentes tipos
        de rotação.
    supported_dive_modes:
      name: Modos de mergulho suportados
      description: Especifica os modos de funcionamento de mergulho suportados pelo
        computador de mergulho, como Ar, Nitrox ou Medidor.
    supported_equipment_type:
      name: Tipo de equipamento suportado
      description: Identifica o equipamento de desportos de inverno para o qual o
        suporte foi concebido (por exemplo, esquis, pranchas de snowboard, bastões
        de esqui).
    supported_spin_types:
      name: Tipos de rotação suportados
      description: Especifica as variações de rotação da bola que o lançador pode
        aplicar.
    supported_spool_bobbin_types:
      name: Tipos de bobinas/carretéis suportados
      description: Especifica quais os formatos de bobinas ou carretéis que o enrolador
        elétrico foi concebido para aceitar.
    surf_wax_temperature_rating:
      name: Classificação de temperatura da cera de surf
      description: Especifica o intervalo de temperatura da água para o qual a cera
        foi formulada, garantindo aderência ideal em diferentes climas.
    surface_coating_or_finish:
      name: Revestimento ou acabamento da superfície
      description: Especifica qualquer tratamento de superfície protetor ou de melhoria
        de desempenho aplicado às alicates.
    surface_coating_or_wrap:
      name: Revestimento ou cobertura da superfície
      description: Tratamento da superfície exterior utilizado para melhorar a aderência
        e o controlo no bastão central (e, por vezes, nos bastões de mão).
    surface_finish:
      name: Acabamento da superfície
      description: Descreve a textura e o toque da superfície da bola, que influenciam
        a aderência e o movimento durante a manipulação de contacto.
    surface_finish_prep:
      name: Acabamento/preparação da superfície
      description: Indica o estado da superfície de fricção (por exemplo, reacabada,
        maquinada, fundida) no momento da venda.
    surface_types_included:
      name: Tipos de superfície incluídos
      description: Especifica que tipo de superfície o kit inclui para desenho/pintura
        (se aplicável), como tela, bloco de papel, painéis de madeira ou nenhuma.
    surfboard_construction:
      name: Construção da prancha de surf
      description: Especifica a tecnologia principal de construção ou o processo de
        laminação da prancha de surf.
    surfboard_tail_shape:
      name: Forma da cauda da prancha de surf
      description: Define o contorno da cauda da prancha, que influencia a manobrabilidade
        e a estabilidade na onda.
    suspension_bushing_type:
      name: Tipo de casquilho da suspensão
      description: Especifica o tipo funcional ou o estilo de instalação do casquilho
        da suspensão.
    suspension_configuration:
      name: Configuração da suspensão
      description: Descreve se o triciclo possui suspensão e onde esta está localizada.
    suspension_material:
      name: Material da suspensão
      description: Especifica o material das correntes, cordas ou cabos utilizados
        para pendurar o baloiço.
    suspension_trainer_accessories_included:
      name: Acessórios incluídos no treinador de suspensão
      description: Lista os itens adicionais fornecidos com o kit do treinador (por
        exemplo, ancoragem para porta, extensão de correia, saco de transporte), ajudando
        o comprador a compreender o conteúdo da embalagem e a comparar o valor do
        conjunto.
    suspension_trainer_anchor_type:
      name: Tipo de ancoragem do treinador de suspensão
      description: Define o estilo de montagem ou ponto de ancoragem para o qual as
        correias foram concebidas (por exemplo, porta, teto, árvore), indicando compatibilidade
        com o ambiente do utilizador.
    suspension_type:
      name: Tipo de suspensão
      description: Especifica se o garfo é rígido ou se utiliza um sistema de suspensão
        específico (ar, mola, híbrido, elastómero, etc.), ajudando o ciclista a adequar
        o componente ao seu estilo de condução.
    sustain_pedal_form_factor:
      name: Formato do pedal de sustain
      description: Descreve o estilo físico do pedal de sustain (por exemplo, pedal
        de piano vs. pedal compacto), influenciando a sensação e a utilização pretendida.
    sustain_pedal_switch_type:
      name: Tipo de interruptor do pedal de sustain
      description: Indica se o pedal envia um sinal momentâneo (sustain enquanto pressionado)
        ou de alternância (liga/desliga).
    sustainability_certification:
      name: Certificação de sustentabilidade
      description: Certificação ambiental ou de origem sustentável do material de
        madeira.
    swab_intended_bassoon_section:
      name: Secção do fagote a que o pano de limpeza se destina
      description: Identifica a parte do fagote que o pano de limpeza foi concebido
        para limpar (diferentes secções exigem formas e tamanhos distintos de pano).
    swab_style:
      name: Estilo do pano de limpeza
      description: Descreve o design ou formato físico do pano de limpeza utilizado
        para alcançar e limpar áreas do saxofone.
    swab_weight_material:
      name: Material do peso do pano de limpeza
      description: Material do peso ou guia de passagem do pano de limpeza (quando
        presente), que influencia o risco de riscos e a durabilidade.
    swab_weight_style:
      name: Tipo de peso da escova
      description: Especifica como o pano de limpeza é contrabalançado/pesado para
        atravessar o interior do fagote.
    sway_bar_adjustability:
      name: Ajustabilidade da barra estabilizadora
      description: Indica se e como a rigidez da barra estabilizadora é ajustável
        (tipicamente através de vários pontos de fixação das rótulas/elos terminais).
    sway_bar_coating:
      name: Revestimento da barra estabilizadora
      description: Tratamento da superfície ou revestimento aplicado à barra estabilizadora
        para resistência à corrosão e melhoria do aspeto.
    sway_bar_fitment_front_rear_kit:
      name: Compatibilidade da barra estabilizadora (frente/traseira/kit)
      description: Indica se a barra estabilizadora se destina ao eixo dianteiro,
        ao eixo traseiro ou se é vendida como kit dianteiro e traseiro.
    sweatshirt_pocket_type:
      name: Tipo de bolsos da sweatshirt
      description: Descreve o estilo de bolsos presentes na sweatshirt.
    sweet_potato_variety:
      name: Variedade de batata-doce
      description: Identifica a cultivar ou variedade comercial específica da batata-doce.
    sweet_spot_position:
      name: Posição do ponto ideal de batida
      description: Identifica a localização do ponto ideal de batida ao longo da lâmina
        do taco, influenciando o estilo de jogo e as condições de lançamento.
    sweetener_presence:
      name: Presença de adoçantes
      description: Especifica se existem adoçantes adicionados na manteiga de frutos
        secos e em que nível.
    sweetening_type:
      name: Tipo de adoçante
      description: Descreve como o produto é adoçado ou o seu nível de doçura.
    swim_armband_construction_type:
      name: Tipo de construção das braçadeiras de natação
      description: Define o estilo estrutural ou o mecanismo de flutuação das braçadeiras
        (insufláveis, espuma sólida, híbrido, etc.).
    swim_belt_purpose:
      name: Finalidade do cinto de natação
      description: Classificação funcional do cinto de natação (por exemplo, apoio
        de flutuação, corrida em água, treino de resistência, amarração estática,
        paraquedas de resistência, lastro, segurança em águas pouco profundas).
    swim_board_features:
      name: Características do flutuador de natação
      description: Destaca características especiais ou melhorias do flutuador de
        natação que aumentam a usabilidade ou a segurança.
    swim_bottom_length:
      name: Comprimento da parte inferior do fato de banho
      description: Classifica a cobertura total das pernas dos calções de natação
        (por exemplo, calções curtos vs comprimento até ao joelho).
    swim_buoy_features:
      name: Características da boia de natação
      description: Descreve características adicionais relevantes ou acessórios que
        melhoram a visibilidade, segurança ou funcionalidade de uma boia de natação.
    swim_cap_style:
      name: Estilo da touca de natação
      description: Define o tipo de construção ou design da touca de natação (por
        exemplo, para cabelo comprido, formato de competição/domo, tipo turbante/bolha).
    swim_diaper_feature:
      name: Características da fralda de banho
      description: Indica se os calções de natação incluem uma proteção anti-vazamento
        integrada tipo fralda ou se requerem/dispensam uma fralda de natação separada.
    swim_trainer_features:
      name: Características do treinador de natação
      description: Destaca funcionalidades adicionais ou características de conforto
        do treinador de natação.
    swim_trainer_type:
      name: Tipo de acessório de treino de natação
      description: Define o estilo estrutural ou formato do treinador de natação,
        facilitando a filtragem por design e finalidade de treino.
    swim_training_focus:
      name: Objetivo de treino de natação
      description: Identifica o objetivo principal de treino a que a pá se destina
        (por exemplo, técnica, força ou isolamento muscular).
    swim_weight_style:
      name: Estilo do peso de natação
      description: Classifica o formato do peso de natação, ajudando os compradores
        a distinguir entre diferentes tipos de produto dentro da mesma categoria.
    swimbait_buoyancy:
      name: Flutuabilidade da isca de pesca
      description: Indica o comportamento da isca na coluna de água (flutuante, suspensa,
        afundante, etc.), permitindo escolher a isca adequada para a profundidade
        e estilo de recuperação.
    swimbait_style:
      name: Estilo da isca de pesca
      description: Classifica o design de construção ou o tipo de ação da isca, como
        cauda tipo "paddle" ou isca de deslize.
    swimwear_pieces_included:
      name: Peças de roupa de banho incluídas
      description: Lista as peças de vestuário individuais incluídas no conjunto de
        burkini, para que o comprador saiba exatamente o que está incluído no pacote.
    swimwear_set_pieces_included:
      name: Peças do conjunto de roupa de banho incluídas
      description: Lista as peças de vestuário fornecidas no conjunto de burkini,
        permitindo ao comprador saber exatamente o que irá receber (por exemplo, parte
        superior, leggings, hijab/touca).
    swing_attachment_connection_type:
      name: Tipo de fixação/ligação do baloiço
      description: Especifica o tipo de ligação utilizado para pendurar o baloiço
        no suporte (por exemplo, corda, corrente, correias).
    swing_trainer_type:
      name: Tipo de equipamento de treino de tacada
      description: Classifica o estilo ou mecanismo do treinador de baloiço, permitindo
        aos compradores encontrar rapidamente equipamentos adequados aos seus objetivos
        de treino.
    swing_training_objective:
      name: Objetivo de treino de tacada
      description: Classifica o foco principal de treino, mecanismo ou objetivo do
        treinador do baloiço (por exemplo, ritmo, velocidade, pega).
    switch_electrical_positions:
      name: Posições elétricas do interruptor
      description: Especifica o número e o comportamento das posições elétricas do
        interruptor (por exemplo, 3 posições, momentâneo ligado).
    swivel_type:
      name: Tipo de giratório
      description: Especifica a configuração do giratório utilizada para reduzir o
        enrolamento da trela.
    sword_scabbard_material:
      name: Material da bainha da espada
      description: Especifica o material principal da bainha incluída (se presente)
    synthesizer_form_factor:
      name: Formato do sintetizador
      description: Descreve o formato físico ou a interface de utilização do sintetizador.
    synthetic_feather_style:
      name: Estilo de pena sintética
      description: Estilo/corte da pena sintética utilizado para diferentes efeitos
        visuais e técnicas de artesanato.
    synthetic_formulation_type:
      name: Tipo de formulação sintética
      description: Especifica o tipo de base ou formulação sintética (por exemplo,
        PAO, éster ou Grupo III hidrocracado).
    syrup_base_ingredient:
      name: Ingrediente base do xarope
      description: Identifica a principal planta ou fonte de açúcar a partir da qual
        o xarope ou néctar é obtido (por exemplo, ácer, agave, cana-de-açúcar).
    syrup_variety:
      name: Variedade de xarope
      description: Define o estilo geral ou a categoria de xarope com base na sua
        formulação ou utilização tradicional (por exemplo, ácer, aromatizante de café,
        fruta ou medicinal).
    t_shirt_fit:
      name: Ajuste da t-shirt
      description: Descreve o ajuste geral pretendido da t-shirt.
    tabla_included_components:
      name: Componentes incluídos na tabla
      description: Indica os itens principais incluídos na ficha da tabla (por exemplo,
        tambor único ou conjunto, coberturas/capas, chave de afinação, etc.).
    tabla_set_pieces_included:
      name: Peças incluídas no conjunto de tabla
      description: Indica quais os componentes incluídos no conjunto de tabla (por
        exemplo, dayan, bayan, aros, coberturas, ferramentas de afinação, saco).
    tabla_tonal_pitch_range_bayan:
      name: Intervalo tonal da tabla (bayan)
      description: Descreve o intervalo típico de altura tonal do tambor bayan (grave),
        com base no tamanho e na construção.
    table_base_material:
      name: Material da base da mesa
      description: Identifica o material principal da base ou pedestal da mesa (distinto
        das pernas ou do tampo), permitindo filtragem por material específico.
    table_base_type:
      name: Tipo de base da mesa
      description: Identifica o design estrutural que suporta o tampo da mesa (por
        exemplo, pedestal, cavalete, base em X).
    table_coverage_position:
      name: Posição de cobertura da mesa
      description: 'Indica para que posição da mesa de ténis de mesa a cobertura foi
        concebida: posição fechada, posição de jogo ou ambas.'
    table_hockey_part_type:
      name: Tipo de peça de hóquei de mesa
      description: Identifica o tipo específico de componente dentro de sistemas de
        hóquei de mesa/de ar/de varões/de cúpula.
    table_leg_design:
      name: Design das pernas da mesa
      description: Identifica o estilo estrutural ou a geometria das pernas, permitindo
        aos compradores escolherem estéticas e necessidades de suporte específicas.
    table_size:
      name: Tamanho da mesa
      description: Tamanho comercial da mesa de bilhar (em pés), permitindo aos compradores
        escolher rapidamente opções comuns como mesas de 7 pés (bar) ou 9 pés (torneio).
    table_size_category:
      name: Categoria de tamanho da mesa
      description: Classifica a mesa de matraquilhos de acordo com a sua dimensão
        total, ajudando os compradores a adequar o produto ao espaço disponível sem
        necessidade de cálculos de medidas.
    table_tennis_certification:
      name: Certificação de ténis de mesa
      description: Lista normas oficiais ou aprovações de entidades reguladoras que
        o produto cumpre (por exemplo, ITTF, classes EN 14468-2).
    tabletop_tilt_function:
      name: Função de inclinação do tampo da mesa
      description: Especifica se o tampo da mesa pode inclinar, virar ou rodar para
        diferentes ângulos.
    tackle_components_included:
      name: Componentes do equipamento de pesca incluídos
      description: Lista os componentes específicos de pesca incluídos no kit, permitindo
        ao comprador saber exatamente o que é fornecido.
    talking_drum_accessories_included:
      name: Acessórios incluídos no tambor falante
      description: Lista os acessórios incluídos com o tambor falante (na embalagem).
    talking_drum_cord_material:
      name: Material dos cordões do tambor falante
      description: Material utilizado nos cordões/cabos de tensão que ligam as peles
        do tambor.
    talking_drum_tuning_mechanism:
      name: Mecanismo de afinação do tambor falante
      description: Forma como a altura do som é alterada através da tensão aplicada
        durante a execução (ou na afinação do instrumento).
    tam_tam_construction_style:
      name: Estilo de construção do tam-tam
      description: Estilo de construção/forjamento do tam-tam.
    tam_tam_items_included:
      name: Itens incluídos com o tam-tam
      description: Acessórios incluídos com o tam-tam (por exemplo, maço, suporte,
        cobertura).
    tamarillo_variety:
      name: Variedade de tamarilho
      description: Identifica a cultivar específica ou variante de cor do tamarilho.
    tamarind_variety:
      name: Variedade de tamarindo
      description: Especifica a variedade botânica ou comercial do tamarindo, que
        pode influenciar o sabor, a textura e a utilização culinária.
    tambourine_frame_style:
      name: Estilo do aro da pandeireta
      description: Descreve a configuração física do aro manual utilizado para segurar
        e tocar a pandeireta.
    tambourine_head_material:
      name: Material da membrana da pandeireta
      description: Especifica o material da pele (membrana) das pandeiretas com pele.
    tambourine_jingle_configuration:
      name: Configuração das soalhas da pandeireta
      description: Indica como as soalhas estão dispostas ou construídas na pandeireta.
    tambourine_jingle_material:
      name: Material das soalhas da pandeireta
      description: Especifica o material das soalhas da pandeireta (os discos metálicos),
        influenciando o timbre e a durabilidade.
    tambourine_mounting_type:
      name: Tipo de montagem da pandeireta
      description: Indica como a pandeireta deve ser segurada ou montada durante a
        execução.
    tambourine_tuning_mechanism:
      name: Mecanismo de afinação da pandeireta
      description: Especifica o sistema de afinação utilizado em pandeiretas manuais
        afináveis (quando aplicável).
    tank_model_scale:
      name: Escala do modelo de tanque
      description: Especifica a proporção de escala do modelo de tanque (por exemplo,
        1:35, 1:72).
    tank_top_back_style:
      name: Estilo das costas da camisola de alças
      description: Especifica o formato ou corte da parte traseira da camisola de
        alças, influenciando o suporte, a mobilidade e a estética.
    tape_application_area:
      name: Área de aplicação da fita
      description: Especifica a parte do equipamento ou do corpo do jogador onde a
        fita deve ser aplicada, ajudando o comprador a escolher o tipo adequado.
    tape_finish:
      name: Acabamento da fita
      description: Acabamento visual ou da superfície da fita (brilho ou textura).
    tape_purpose:
      name: Finalidade da fita
      description: Especifica a principal função da fita na manutenção ou personalização
        de raquetes.
    tape_type:
      name: Tipo de fita
      description: Classifica o estilo funcional ou a construção da fita de hóquei,
        como tecido, polietileno transparente, aderente, elástica coesiva, proteção
        de caneleira ou camurça.
    tapenade_main_ingredients:
      name: Ingredientes principais da tapenade
      description: Especifica o ingrediente base que define a tapenade (por exemplo,
        azeitona, tomate, beringela, pimento), útil para compradores com preferências
        ou restrições alimentares.
    tapestry_loom_loom_format:
      name: Formato do tear de tapeçaria
      description: Formato ou configuração estrutural do tear manual de tapeçaria
        (tipo de suporte/estrutura).
    tapestry_loom_shedding_method:
      name: Método de formação da cala no tear de tapeçaria
      description: Descreve como o tear cria a "cala" (separação dos fios de urdidura)
        para a passagem da trama.
    tapestry_loom_tensioning_system:
      name: Sistema de tensão do tear de tapeçaria
      description: Especifica o método utilizado para tensionar e fixar a urdidura
        no tear de tapeçaria.
    tar_head_material:
      name: Material da pele do tar
      description: Identifica o material da membrana (pele) do tar, que influencia
        fortemente o toque, a durabilidade e o timbre.
    tar_playing_style:
      name: Estilo de execução do tar
      description: Especifica a posição ou técnica principal de execução para a qual
        o tar foi concebido.
    tar_tuning_system:
      name: Sistema de afinação do tar
      description: Especifica como o tar é afinado (como a tensão da pele é ajustada).
    target_components:
      name: Componentes visados
      description: Especifica quais componentes do sistema de admissão de ar/combustível
        o produto se destina a limpar.
    target_relative_humidity_rh:
      name: Humidade relativa alvo (HR)
      description: Indica o nível de humidade relativa pretendido que o produto foi
        concebido para manter no interior do instrumento/estojo.
    target_resetting_mechanism:
      name: Mecanismo de reposição do alvo
      description: Descreve como, ou se, o alvo regressa à sua posição original após
        ser atingido.
    target_trainer_type:
      name: Tipo de alvo de treino
      description: Classifica o estilo ou formato geral do treinador de alvo para
        raquetebol ou squash.
    targeted_contaminants:
      name: Contaminantes específicos
      description: Tipos de microrganismos ou parasitas que o produto é certificado
        para eliminar.
    targeted_muscle_group:
      name: Grupo muscular específico
      description: Grupo muscular principal que o acessório foi concebido para treinar
        ou apoiar.
    taro_variety:
      name: Variedade de taro
      description: Especifica a cultivar, espécie ou nome comercial do taro (por exemplo,
        taro roxo, eddoe, dasheen).
    tassel_trim_header_type:
      name: Tipo de cabeçalho da fita de borlas
      description: Especifica a construção da parte superior usada para fixar a fita
        de borlas a uma superfície (por exemplo, fita, entrançado, cordão).
    tassel_trim_use_case:
      name: Caso de utilização da fita de borlas
      description: Indica a principal área de aplicação pretendida para a fita de
        borlas.
    taste_profile:
      name: Perfil de sabor
      description: Descreve as características dominantes de sabor da variedade de
        maçã.
    tea_variety:
      name: Variedade de chá
      description: Classifica o tipo ou estilo específico de chá ou infusão (por exemplo,
        preto, verde, matcha, rooibos), permitindo ao consumidor filtrar conforme
        a preferência.
    teasing_tool_style:
      name: Estilo da ferramenta de abertura de fibras
      description: Descreve o formato físico da ferramenta utilizada para abrir e
        misturar fibras (por exemplo, escova, ancinho, pente).
    tee_base_style:
      name: Estilo da base do tee de râguebi
      description: Identifica o design estrutural da base do tee de râguebi que suporta
        a bola.
    temper_hardness:
      name: Têmpera/dureza
      description: Indica o quão macio ou rígido é o fio (e a sua capacidade de manter
        a forma).
    temperature_control_type:
      name: Tipo de controlo de temperatura
      description: Especifica como a temperatura da ferramenta é controlada ou ajustada.
    tenkara_action_ratio:
      name: Proporção de ação do Tenkara
      description: Indica a proporção tradicional de flexão da vara de Tenkara, que
        descreve onde a vara se curva sob carga (por exemplo, 6:4).
    tennis_ball_court_surface:
      name: Superfície de jogo da bola de ténis
      description: Especifica a(s) superfície(s) de campo para a qual a bola foi concebida,
        garantindo desempenho e durabilidade ideais.
    tennis_ball_pressure_type:
      name: Tipo de pressão da bola de ténis
      description: Identifica a pressão interna ou tipo de construção da bola (pressurizada,
        sem pressão, baixa compressão, espuma), que influencia o ressalto e a durabilidade.
    tennis_racket_grip_size:
      name: Tamanho do punho da raquete de ténis
      description: Especifica a circunferência padronizada do cabo da raquete (L0–L5
        ou equivalente em polegadas), garantindo ajuste correto da mão e conforto.
    tenor_flutophone_fingering_system:
      name: Sistema de digitação do flutofone tenor
      description: Especifica o sistema de digitação utilizado pelo flutofone tenor
        (convenção curricular/notação musical).
    tenor_recorder_joint_type:
      name: Tipo de juntas da flauta doce tenor
      description: Especifica o tipo de encaixe/ligação entre as secções da flauta
        doce tenor.
    tenor_saxophone_key_system:
      name: Sistema de chave do saxofone tenor
      description: Especifica o sistema de mecânica de chaves utilizado (normalmente
        associado ao sistema francês/Boehm nos saxofones).
    tenor_saxophone_pad_material:
      name: Material das sapatilhas do saxofone tenor
      description: Especifica o material principal utilizado nas almofadas do instrumento.
    tenor_trombone_slide_type:
      name: Tipo de vara do trombone tenor
      description: Especifica o tipo de vara utilizada no trombone tenor (por exemplo,
        padrão/linear vs. com acionador/fluxo axial).
    tenor_trombone_valve_configuration:
      name: Configuração de válvulas do trombone tenor
      description: Indica se o trombone tenor possui válvulas/rotor adicionais e qual
        a sua configuração.
    tension_control_type:
      name: Tipo de controlo da tensão
      description: Indica como (ou se) a lançadeira permite ajustar a resistência/tensão
        durante a alimentação da bobina/canela.
    tension_mechanism:
      name: Mecanismo de tensão
      description: O método de tensão utilizado para controlar a alimentação da trama
        a partir da bobina durante a tecelagem.
    tension_pitch_modulation_system:
      name: Sistema de modulação de tensão/altura do som
      description: Descreve como o tambor falante altera a altura do som durante a
        execução (por exemplo, através da compressão dos cordões de tensão).
    tension_system:
      name: Sistema de tensão
      description: Especifica o sistema de recolha e tensão da roda giratória para
        o qual o kit de fuso foi concebido.
    tent_fabric_material:
      name: Material do tecido da tenda
      description: Identifica o tecido principal utilizado no sobreteto ou corpo da
        tenda, afetando o peso, respirabilidade e resistência às condições meteorológicas.
    tent_season_rating:
      name: Classificação sazonal da tenda
      description: Classifica a tenda pelo número de estações ou condições meteorológicas
        para as quais foi concebida (por exemplo, 3 estações, 4 estações, expedição).
    tent_setup_type:
      name: Tipo de montagem da tenda
      description: Indica o estilo estrutural de montagem da tenda, como autoportante,
        semi-autoportante, não autoportante, estrutura insuflável (airframe) ou pop-up.
    tent_style:
      name: Estilo da tenda
      description: Descreve o design estrutural da tenda (por exemplo, cúpula, túnel,
        estrutura em A).
    test_result_output_method:
      name: Método de apresentação dos resultados de teste
      description: Especifica a forma como o testador de baterias do veículo apresenta
        ou fornece os resultados ao utilizador (por exemplo, indicador, ecrã, impressão,
        aplicação ou relatório de software).
    tether_strap_system:
      name: Sistema de fixação por correia/tether
      description: Tipo de sistema de correia ou ligação utilizado para conectar o
        apoio de pescoço ao capacete/arnês (quando aplicável).
    text_color:
      name: Cor do texto
      description: Cor do texto impresso ou bordado na etiqueta, distinta da cor de
        fundo da etiqueta.
    textile_craft_machine_operation_type:
      name: Tipo de operação da máquina têxtil
      description: Indica como a máquina é operada (manual vs. acionada por pedal
        vs. motorizada/elétrica).
    textile_finish_treatment:
      name: Acabamento/tratamento têxtil
      description: Especifica os principais tratamentos de superfície aplicados ao
        material têxtil.
    texture_inclusions:
      name: Inclusões de textura
      description: Especifica componentes adicionados para textura, como polpa de
        aloé, sementes de manjericão, nata de coco, pérolas explosivas ou pedaços
        de fruta.
    therapeutic_technology:
      name: Tecnologia terapêutica
      description: Especifica qualquer função terapêutica integrada, como gel de arrefecimento,
        bandas magnéticas ou cerâmica de infravermelhos.
    thermal_set_components:
      name: Componentes do conjunto térmico
      description: Indica se o produto inclui apenas a parte de baixo, apenas a parte
        de cima ou ambas as peças como um conjunto.
    thermal_weight:
      name: Grau térmico
      description: Indica a categoria de aquecimento do tecido da balaclava.
    thermostat_type:
      name: Tipo de termóstato
      description: Descreve o design funcional ou o estilo de controlo do termóstato
        do sistema de arrefecimento de um veículo motorizado.
    thimble_guide_size:
      name: Tamanho do guia de dedal
      description: Designação do tamanho do guia de dedal (ajuste/cobertura), normalmente
        indicado como pequeno/médio/grande em vez de medidas exatas.
    thread_connection_size:
      name: Tamanho da rosca de ligação
      description: Define a especificação da rosca que liga eixos, pontas e adaptadores
        (por exemplo, 6 mm, 5/16"-24).
    thread_construction:
      name: Construção do fio
      description: Descreve como o fio é construído ou tratado (por exemplo, fio de
        bordar torcido vs. fio revestido/agregado).
    thread_cord_type_beading_pattern:
      name: Tipo de fio/cabo (padrão de missangas)
      description: Tipo de fio ou cordão recomendado para completar o padrão.
    thread_cutter_form_factor:
      name: Formato do cortador de fios
      description: Identifica o estilo físico do cortador de fios, como tesoura de
        mão, tipo pendente ou tipo anel.
    thread_cutter_mechanism:
      name: Mecanismo do cortador de fios
      description: Descreve o tipo de ação ou mecanismo de corte utilizado pelo cortador
        de fios.
    thread_cutter_safety_features:
      name: Características de segurança do cortador de fios
      description: Indica características de segurança integradas que reduzem o risco
        de cortes acidentais ou protegem as lâminas durante o armazenamento.
    thread_cutter_usage_application:
      name: Utilização/aplicação do cortador de fios
      description: Indica a principal utilização artesanal prevista para o cortador
        de fios.
    thread_finish_treatment:
      name: Acabamento/tratamento da rosca
      description: Acabamento ou tratamento aplicado ao fio que afeta o manuseamento
        e o desempenho (por exemplo, encerado, colado, mercerizado).
    thread_material:
      name: Material do fio
      description: Fibra/material principal que compõe a linha/fio (não tecido).
    thread_material_fiber:
      name: Material do fio (fibra)
      description: Especifica a fibra/o material principal do próprio fio (não tecido).
    thread_package_format:
      name: Formato da embalagem do fio
      description: Formato em que a linha de costura é embalada (por exemplo, bobina,
        cone ou canela).
    thread_rack_compatible_spool_type:
      name: Tipo de bobina compatível com o suporte de linhas
      description: Tipo de embalagem de linha que o suporte foi concebido para acomodar
        (bobinas vs. cones, etc.).
    thread_standard_size:
      name: Tamanho padrão do fio
      description: Identifica a norma de tamanho/espessura da linha utilizada no rótulo
        do produto (por exemplo, wt, Tex ou denier).
    thread_type:
      name: Tipo de fio
      description: Especifica a construção/o tipo da linha ou fio para ponto cruz.
    thread_weight_system:
      name: Sistema de peso da linha
      description: A norma utilizada para expressar a espessura/peso da linha.
    thread_yarn_guide_mounting_attachment_style:
      name: Estilo de montagem/fixação do guia de linha e fio
      description: Descreve como o guia é usado ou montado durante a utilização.
    thread_yarn_guide_tension_control:
      name: Controlo de tensão do guia de linha e fio
      description: Indica se e como o guia fornece tensão/arrasto ajustável na linha
        ou no fio.
    thread_yarn_organizer_features:
      name: Características do organizador de linhas e fios
      description: Destaca as funcionalidades de organização e portabilidade específicas
        para armazenamento de linhas/fios.
    threader_intended_use:
      name: Finalidade do enfiador
      description: Indica o principal contexto de trabalhos manuais para o qual o
        enfiador manual de agulhas foi concebido.
    threading_system:
      name: Sistema de roscas
      description: Indica o método e os auxiliares utilizados para enfiar a máquina
        de costura overlock (por exemplo, manual, codificado por cores, guiado ou
        por ar).
    threading_type:
      name: Tipo de rosca
      description: Indica se a joia utiliza rosca interna, rosca externa, é sem rosca
        ou se não se aplica.
    throttle_type_scooter_conversion:
      name: Tipo de acelerador (conversão de scooter)
      description: Especifica o formato ou interface do acelerador incluído ou necessário
        no kit de conversão.
    throw_rope_end_attachment:
      name: Fixação da extremidade da corda de lançamento
      description: O tipo de terminal, acessório de fixação ou laço existente na(s)
        extremidade(s) funcional(is) da corda de lançamento.
    throw_rope_storage_packaging_type:
      name: Tipo de armazenamento/embalagem da corda de lançamento
      description: Indica como a corda de lançamento é armazenada ou apresentada (por
        exemplo, saco ou bobina).
    throw_rope_visibility_features:
      name: Características de visibilidade da corda de lançamento
      description: Características de visibilidade e identificação destinadas a tornar
        a corda mais fácil de ver na água ou em condições de pouca luz.
    thrower_operation_type:
      name: Tipo de funcionamento do lançador
      description: Classifica o tipo de funcionamento/mecanismo do lançador, permitindo
        distinguir rapidamente entre sistemas manuais e automáticos.
    thumb_design:
      name: Design do polegar
      description: Descreve como o polegar é integrado na luva, afetando a proteção
        e a aderência.
    tiara_design:
      name: Design da tiara
      description: Especifica o estilo estrutural geral ou a silhueta da tiara.
    tie_down_points_straps_included:
      name: Pontos de fixação/cintas incluídos
      description: Especifica se o suporte inclui pontos de fixação integrados e/ou
        cintas incluídas para prender a mota/scooter.
    tiling_format:
      name: Formato de paginação
      description: Especifica o estilo de esquema do PDF para montagem de páginas
        impressas.
    time_current_characteristic:
      name: Característica tempo-corrente
      description: Indica o comportamento tempo-corrente do fusível (por exemplo,
        ação rápida ou retardada), influenciando a adequação a circuitos com corrente
        de arranque.
    timer_count_mode:
      name: Modo de contagem do temporizador
      description: Especifica o modo de contagem do temporizador, como contagem decrescente,
        contagem crescente (cronómetro), ambos ou modo intervalado/repetitivo.
    timer_display_type:
      name: Tipo de ecrã do temporizador
      description: Indica como o temporizador de jogo apresenta o tempo restante (por
        exemplo, ecrã digital, mostrador analógico, ampulheta ou ausência de indicação
        visual).
    timer_operating_modes:
      name: Modos de funcionamento do temporizador
      description: Comportamentos de temporização suportados para ativação de efeitos
    timing_belt_construction_material_rubber_compound:
      name: Material da correia de distribuição (composto de borracha)
      description: Composto de borracha principal utilizado na correia de distribuição
        (por exemplo, HNBR), que influencia a resistência ao calor/óleo e a durabilidade.
    timing_belt_profile:
      name: Perfil da correia de distribuição
      description: Define o perfil/forma dos dentes da correia de distribuição (por
        exemplo, trapezoidal ou curvilíneo).
    timing_belt_reinforcement_cord_material:
      name: Material do cordão de reforço da correia de distribuição
      description: Especifica o material do cordão interno de reforço da correia de
        distribuição (por exemplo, fibra de vidro, aramida), influenciando a resistência
        e a elasticidade.
    timing_component_material:
      name: Material do componente de sincronização
      description: Material principal do componente de sincronização (composto da
        correia, metal de corrente/engrenagem ou material da tampa).
    tin_whistle_body_material:
      name: Material do corpo da flauta irlandesa
      description: Captura os materiais mais comuns do corpo da flauta irlandesa,
        de forma mais específica do que a lista geral de materiais de instrumentos.
    tin_whistle_bore_type:
      name: Tipo de furo da flauta irlandesa
      description: Especifica o design interno do canal acústico da flauta irlandesa.
    tin_whistle_included_accessories:
      name: Acessórios incluídos da flauta irlandesa
      description: Lista os acessórios fornecidos com a flauta irlandesa (por exemplo,
        estojo, vareta de limpeza).
    tip_finish_coating:
      name: Acabamento/revestimento da ponta
      description: Especifica o tratamento superficial na extremidade funcional (por
        exemplo, cromado, pintura em pó), influenciando a resistência à corrosão e
        o desgaste das bordas.
    tip_shape:
      name: Forma da ponta da palheta
      description: Descreve o formato ou grau de afiação da ponta da palheta de guitarra,
        que afeta a articulação e a sensação ao tocar.
    tippet_rating:
      name: Classificação do tippet
      description: Indica a resistência máxima recomendada do tippet em designações
        "X" da pesca com mosca (por exemplo, 4X).
    tire_changer_operation_type:
      name: Tipo de operação da máquina de troca de pneus
      description: Especifica como a máquina de troca de pneus é acionada/operada
        (por exemplo, manual, pneumática ou hidráulica). Distinto do atributo geral
        "fonte de energia"; usar quando se descreve o método de atuação/acionamento
        da máquina.
    tire_changer_type:
      name: Tipo de máquina de troca de pneus
      description: Estilo geral de funcionamento, design ou nível de automatização
        da máquina de troca de pneus.
    tire_compound_type:
      name: Tipo de composto do pneu
      description: Especifica a classificação do composto de borracha utilizado nos
        pneus (por exemplo, macio, chuva, slick), influenciando a aderência e a durabilidade
        em diferentes condições.
    tire_load_range:
      name: Índice de carga dos pneus
      description: Indica a classificação de lonas/faixa de carga dos pneus (comum
        em pneus LT), refletindo a sua capacidade de carga.
    tire_position:
      name: Posição dos pneus
      description: Posição de montagem recomendada no veículo.
    tire_repair_kit_components:
      name: Componentes do kit de reparação de pneus
      description: Especifica os itens incluídos no kit, permitindo ao cliente comparar
        a completude do pacote.
    tire_sidewall_type:
      name: Tipo de flanco do pneu
      description: Especifica as características de estilo ou construção do flanco.
    tire_speed_rating:
      name: Classe de velocidade do pneu
      description: Letra que indica a velocidade máxima sustentada do pneu (por exemplo,
        H, V, W).
    tire_spoon_type:
      name: Tipo de espátula para pneus
      description: Categoriza a espátula para pneus com base no formato da extremidade
        e na utilização prevista.
    tire_system_compatibility:
      name: Compatibilidade com o sistema de pneus
      description: Indica se o selante foi concebido para configurações sem tubos,
        pneus com câmara de ar ou ambos.
    tire_temperature_rating_utqg:
      name: Classificação de temperatura dos pneus (UTQG)
      description: Grau de resistência à temperatura segundo o sistema UTQG para pneus
        automóveis (por exemplo, A, B, C).
    tire_traction_rating_utqg:
      name: Classificação de aderência dos pneus (UTQG)
      description: Grau de aderência UTQG dos pneus, relacionado com o desempenho
        de travagem em piso molhado.
    tire_tread_style:
      name: Padrão do piso do pneu
      description: Descreve o padrão geral do piso do pneu tubular, refletindo o terreno
        pretendido e as características de tração.
    tire_tube_type:
      name: Tipo de câmara de ar do pneu
      description: Indica se o pneu foi concebido para utilização sem tubos ou com
        câmara de ar.
    title_status:
      name: Estado do título de propriedade
      description: Indica o estado legal ou do título de registo do veículo.
    tobacco_application:
      name: Aplicação do tabaco
      description: Indica o método de consumo ou dispositivo de fumo para o qual o
        tabaco solto foi concebido.
    tobacco_cut_type:
      name: Tipo de corte do tabaco
      description: Especifica o corte ou forma de preparação do tabaco solto, influenciando
        a velocidade de combustão, método de enchimento e experiência de fumo.
    tobacco_strength:
      name: Intensidade do tabaco
      description: Indica a sensação de corpo ou impacto de nicotina do tabaco quando
        consumido, ajudando os compradores a escolher uma intensidade adequada à sua
        preferência.
    toe_construction:
      name: Conceção da ponta do pé
      description: Especifica a configuração da zona dos dedos das botas de neoprene,
        influenciando o equilíbrio, a sensibilidade à prancha e o isolamento térmico.
    toe_coverage:
      name: Cobertura dos dedos dos pés
      description: Indica o tipo de cobertura dos dedos fornecida pela meia.
    toe_pick_style:
      name: Estilo dos dentes da ponta
      description: Descreve o design dos dentes da ponta nas lâminas dos patins artísticos.
    toe_protection_type:
      name: Tipo de proteção dos dedos dos pés
      description: Indica se e como a zona da biqueira é reforçada para segurança
        (por exemplo, biqueira em aço, biqueira macia).
    toe_reinforcement_type:
      name: Tipo de reforço na biqueira
      description: Detalha a construção da zona dos dedos, influenciando a durabilidade
        e a compatibilidade com o calçado.
    toe_stop_stem_thread_size:
      name: Tamanho da rosca da haste do travão dianteiro
      description: Especifica o tamanho da rosca da haste do travão de biqueira, garantindo
        compatibilidade com a placa.
    tofu_preparation_style:
      name: Estilo de preparação do tofu
      description: Classifica o estilo ou subcategoria tradicional do tofu para além
        da firmeza (por exemplo, sedoso, bloco, frito, pele, nó, fermentado).
    tom_mount_adjustment_features:
      name: Funcionalidades de ajuste do suporte de tom
      description: Especifica quais os ajustes que o suporte de tom permite para posicionamento
        do tambor (por exemplo, inclinação, rotação, altura).
    tom_mount_components_included:
      name: Componentes do suporte para timbalões incluídos
      description: Especifica as peças incluídas com o suporte de tom (suporte, braço,
        esfera, grampos, bloqueios de memória, etc.).
    tom_mount_mounting_position:
      name: Posição de montagem do suporte de tom
      description: Especifica onde o suporte de tom deve ser fixado (por exemplo,
        bombo, suporte de prato, estante).
    tonneau_cover_mounting_style:
      name: Tipo de montagem da capa para caixa de carga
      description: Indica como a cobertura da caixa de carga se instala/fixa às calhas
        da caixa da recolha.
    tool_case_form_factor:
      name: Formato da mala de ferramentas
      description: Identifica o estilo físico da mala de ferramentas, influenciando
        a portabilidade e o armazenamento (por exemplo, tipo pasta, rígida ou de estrutura
        moldada).
    tool_functions_included:
      name: Funções incluídas na ferramenta
      description: Lista as funções específicas de reparação ou manutenção que uma
        ferramenta multifunções ou conjunto de ferramentas pode realizar.
    top_bunk_access_method:
      name: Método de acesso ao beliche superior
      description: Indica como os ocupantes acedem ao beliche superior da cama, tendo
        em conta a segurança e o aproveitamento do espaço.
    top_fit:
      name: Ajuste da parte de cima
      description: Especifica a silhueta geral ou o ajuste da peça superior ao corpo
        (por exemplo, justo ou largo).
    top_hat_style:
      name: Estilo da cartola
      description: Identifica a variação específica do estilo de uma cartola.
    top_soundboard_material:
      name: Material do tampo (caixa de ressonância)
      description: Especifica o material do tampo/caixa de ressonância da guitarra
        (a principal superfície responsável pela produção do som).
    topping_form:
      name: Formato da cobertura
      description: Define a forma física ou a consistência da cobertura da sobremesa,
        ajudando os compradores a identificar rapidamente a aplicação pretendida.
    topping_type:
      name: Tipo de cobertura
      description: Indica a principal cobertura exterior ou revestimento aplicado
        ao donut.
    tow_hook_type:
      name: Tipo de gancho de reboque
      description: Indica se a prancha de joelhos inclui um gancho de reboque integrado
        e especifica o tipo de mecanismo.
    tow_point_configuration:
      name: Configuração do ponto de reboque
      description: Especifica a configuração do ponto de reboque (simples, duplo,
        múltiplo) oferecida pelo insuflável rebocável para diferentes posições de
        utilização.
    tow_strap_protective_features:
      name: Características de proteção da corda de reboque
      description: Características relevantes de segurança e durabilidade incorporadas
        na corda de reboque.
    tow_strap_type:
      name: Tipo de cinta de reboque
      description: Indica a construção funcional da corda de reboque, como corda estática
        vs. corda cinética de recuperação.
    towable_tube_style:
      name: Estilo do insuflável rebocável
      description: Identifica o design geral ou o formato do insuflável rebocável,
        que determina a posição do utilizador e a experiência de utilização.
    towed_water_sport_discipline:
      name: Modalidade de desporto aquático rebocado
      description: Especifica a principal atividade aquática rebocada para a qual
        a luva foi concebida.
    towel_features:
      name: Características da toalha
      description: Lista características especiais ou extras incluídos com a toalha.
    towel_style:
      name: Estilo da toalha
      description: Classifica o design funcional ou o formato da toalha de golfe.
    toy_airplane_control_type:
      name: Tipo de controlo do avião de brinquedo
      description: Especifica como o avião de brinquedo é controlado pelo utilizador.
    toy_airplane_features:
      name: Características do avião de brinquedo
      description: Destaca as principais funcionalidades de brincadeira presentes
        no avião de brinquedo.
    toy_airplane_flight_capability:
      name: Capacidade de voo do avião de brinquedo
      description: Indica se o avião de brinquedo foi concebido para voar/planar efetivamente
        ou se é principalmente destinado a brincadeira no chão/exposição.
    toy_audio_features:
      name: Características de áudio do brinquedo
      description: Lista as capacidades de áudio e os efeitos sonoros incorporados
        no brinquedo.
    toy_boat_play_features:
      name: Características de brincadeira do barco de brinquedo
      description: Destaca as principais funcionalidades interativas dos barcos de
        brinquedo para descoberta e filtragem.
    toy_boat_recommended_play_environment:
      name: Ambiente de utilização recomendado para o barco de brinquedo
      description: Especifica o ambiente de brincadeira previsto para o barco de brinquedo,
        de forma a corresponder às expectativas do comprador e aos requisitos de segurança
        (por exemplo, banheira vs. água aberta).
    toy_bowling_equipment_included:
      name: Equipamento de bowling de brinquedo incluído
      description: Especifica quais os componentes de bowling incluídos no conjunto
        de bowling de brinquedo (por exemplo, pinos, bola, pista/tapete, saco de transporte).
    toy_car_features:
      name: Características do carro de brinquedo
      description: Destaca as funcionalidades de brincadeira integradas no carro de
        brinquedo (separadas da propulsão), como luzes, sons ou partes móveis.
    toy_drawing_tablet_accessories_included:
      name: Acessórios incluídos com o tablet de desenho de brincar
      description: Acessórios adicionais incluídos além do próprio tablet (por exemplo,
        caneta extra, carimbos).
    toy_drawing_tablet_erase_method:
      name: Método de apagamento do tablet de desenho de brinquedo
      description: Como a superfície de desenho é limpa/apagada.
    toy_drawing_tablet_screen_type:
      name: Tipo de ecrã do tablet de desenho de brinquedo
      description: Especifica o tipo de superfície de desenho/visualização utilizada
        (por exemplo, tablet de escrita LCD vs. superfície magnética).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Instrumento de escrita/desenho do tablet de desenho de brinquedo
      description: Ferramenta principal utilizada para desenhar no tablet (tipo de
        caneta/stylus).
    toy_figure_sound_feature:
      name: Funcionalidade sonora da figura de brinquedo
      description: Indica se a figura de animal produz sons e que tipo de sons emite
        (por exemplo, rugido, som realista de animal).
    toy_game_features:
      name: Características do brinquedo/jogo
      description: Destaca as principais funcionalidades de brincadeira ou construção
        para brinquedos de praia e areia.
    toy_gift_basket_items_included:
      name: Artigos incluídos no conjunto de brinquedos de oferta
      description: Lista os principais tipos de brinquedos incluídos no cabaz presente
        (por exemplo, peluche, conjunto de construção, puzzle).
    toy_glider_launch_method:
      name: Método de lançamento do planador de brincar
      description: Especifica a forma como o planador de brinquedo é lançado, o que
        influencia o estilo de brincadeira e as expectativas do comprador.
    toy_helicopter_control_type:
      name: Tipo de controlo do helicóptero de brinquedo
      description: Como o helicóptero de brinquedo é controlado/operado (independentemente
        da propulsão), por exemplo através de comando remoto portátil, aplicação móvel
        ou sem controlo (voo livre).
    toy_helicopter_features:
      name: Características do helicóptero de brinquedo
      description: As principais funcionalidades de um helicóptero de brinquedo (especialmente
        modelos RC) que influenciam a usabilidade e o valor lúdico.
    toy_jacks_set_items_included:
      name: Itens incluídos no conjunto de jogo jacks/pedrinhas
      description: Especifica quais os itens principais incluídos no conjunto, por
        exemplo, pedrinhas, bola ou saco.
    toy_keyboard_learning_mode:
      name: Modo de aprendizagem do teclado de brinquedo
      description: Indica a abordagem educativa/de aprendizagem suportada pelo teclado
        de brinquedo (por exemplo, teclas iluminadas, músicas para acompanhar, lições
        guiadas, aprendizagem assistida por aplicação).
    toy_keyboard_sound_theme:
      name: Tema sonoro do teclado de brinquedo
      description: Tipos de vozes de instrumentos/temas sonoros integrados disponíveis
        (para além do som de piano).
    toy_kitchen_appliances_included:
      name: Eletrodomésticos de cozinha de brinquedo incluídos
      description: Especifica quais os eletrodomésticos de cozinha representados no
        conjunto de brincadeira, quando o produto é um conjunto centrado em aparelhos
        de cozinha.
    toy_kitchen_assembly_requirement:
      name: Requisitos de montagem da cozinha de brinquedo
      description: Indica se é necessária montagem e o nível aproximado de complexidade
        da montagem.
    toy_kitchen_interactive_features:
      name: Características interativas da cozinha de brinquedo
      description: Destaca os elementos interativos normalmente presentes em cozinhas
        de brinquedo e acessórios relacionados.
    toy_motorcycle_feature_set:
      name: Conjunto de funcionalidades da motocicleta de brinquedo
      description: Principais funcionalidades de brincadeira da motocicleta de brinquedo
        (selecionar todas as aplicáveis).
    toy_motorcycle_scale:
      name: Escala da motocicleta de brinquedo
      description: Proporção de escala para motocicletas de brinquedo/colecionáveis
        (por exemplo, 1:12).
    toy_parachute_launch_method:
      name: Método de lançamento do paraquedas de brinquedo
      description: Como o brinquedo foi concebido para ser lançado/desdobrado para
        voo.
    toy_piano_and_keyboard_accessories_included:
      name: Acessórios incluídos para piano e teclado de brinquedo
      description: Acessórios incluídos com o piano ou teclado de brinquedo.
    toy_playset_assembly_required:
      name: Montagem necessária para o conjunto de brinquedo
      description: Indica se é necessária montagem por um adulto antes da utilização
        (para além de simples encaixes).
    toy_playset_items_included:
      name: 'Itens incluídos no conjunto de '
      description: Lista os principais componentes incluídos no conjunto (conteúdo
        da caixa).
    toy_safety_certification:
      name: Certificação de segurança do brinquedo
      description: Normas e marcações de segurança e conformidade aplicáveis aos brinquedos
        no mercado do comprador (por exemplo, EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Características da nave espacial de brinquedo
      description: Indica as funcionalidades comuns interativas/de brincadeira incorporadas
        na nave espacial de brinquedo.
    toy_spaceship_size_class:
      name: Classe de tamanho da nave espacial de brinquedo
      description: Indica uma classe de tamanho aproximada para a nave espacial de
        brinquedo, permitindo filtragem rápida, distinta das dimensões exatas (comprimento/largura/altura)
        e não correspondendo a uma escala numérica de modelo (por exemplo, 1:72).
    toy_tableware_pieces_included:
      name: Peças de louça de brincar incluídas
      description: Especifica quais os itens de loiça de brinquedo incluídos (pratos,
        copos, talheres, peças de servir).
    toy_tool_electronic_features:
      name: Características eletrónicas das ferramentas de brinquedo
      description: Descreve as funções interativas/eletrónicas da ferramenta de brinquedo
        (luzes, sons, ação rotativa, etc.).
    toy_tool_set_components_included:
      name: Componentes do conjunto de ferramentas de brincar incluídos
      description: Lista os itens de ferramentas de faz-de-conta específicos incluídos
        na embalagem (especialmente para conjuntos de ferramentas).
    toy_train_scale:
      name: Escala do comboio de brincar
      description: Especifica o padrão de escala de comboios de brinquedo/miniatura
        (ou tamanho do sistema de carris) para garantir compatibilidade com comboios
        e carris existentes.
    toy_train_track_layout_type:
      name: Tipo de esquema de carris de comboio de brinquedo
      description: Descreve o esquema/forma dos carris incluídos num conjunto de comboio
        ou pacote de expansão de carris.
    toy_weapon_gadget_features:
      name: Características de armas e aparelhos de brinquedo
      description: Destaca as características interativas e funcionais comuns, específicas
        de armas de brinquedo e aparelhos de espião.
    tpms_sensor_frequency_band:
      name: Banda de frequência do sensor TPMS
      description: Banda de radiofrequência suportada por acessórios relacionados
        com o TPMS (quando aplicável).
    track_and_field_discipline:
      name: Disciplina de atletismo
      description: Identifica a prova ou disciplina específica de atletismo a que
        o produto se destina (por exemplo, lançamento do peso, salto com vara, corridas
        de velocidade).
    track_event_specialization:
      name: Especialização em prova de pista
      description: Indica o tipo de prova para o qual as sapatilhas de corrida foram
        otimizadas.
    track_field_event_suitability:
      name: Adequação para eventos de atletismo
      description: Identifica a(s) prova(s) específica(s) de atletismo a que o equipamento
        de treino se destina.
    track_set_special_features:
      name: Características especiais do conjunto de pista
      description: Destaca as principais funcionalidades de jogo incluídas no conjunto
        de pista, para além da pista e dos carros básicos.
    track_surface_compatibility:
      name: Compatibilidade com o piso da pista
      description: Indica a(s) superfície(s) de corrida para as quais as sapatilhas
        foram concebidas.
    tracking_aid_type:
      name: Tipo de auxílio de direção
      description: Indica se o caiaque inclui dispositivos que melhoram a manutenção
        da trajetória em linha reta.
    traction_pattern_type:
      name: Tipo de padrão de tração
      description: Descreve o principal padrão de ranhuras ou relevo da superfície
        que proporciona aderência na almofada.
    trading_card_league:
      name: Liga do cartão colecionável
      description: Identifica a liga desportiva associada ao conjunto de cartões ou
        ao tema representado (quando aplicável).
    trailer_construction:
      name: Construção do reboque
      description: Identifica a construção principal do chassis/carroçaria do reboque
        (por exemplo, alumínio, aço ou construção mista).
    trailer_coupler_size:
      name: Tamanho do engate do reboque
      description: Especifica o tamanho da esfera de engate necessário para rebocar
        o reboque.
    trailer_hitch_mounting_location_method:
      name: Local/método de montagem do engate de reboque
      description: Especifica onde e como o engate de reboque é montado no veículo
        (por exemplo, recetor traseiro, recetor dianteiro, montado no chassis, montado
        no para-choques, montado na caixa de carga).
    trailer_light_function:
      name: Função da luz do reboque
      description: Função/posição principal da luz do reboque.
    trailer_suspension_type:
      name: Tipo de suspensão do reboque
      description: Especifica o tipo de sistema de suspensão utilizado no atrelado
        para bicicleta, como mola helicoidal ou mola de lâminas, para melhorar o conforto
        da condução e a proteção da carga.
    trailer_wiring_circuit:
      name: Circuito da cablagem do reboque
      description: Lista os circuitos/sinais de iluminação, travagem e auxiliares
        transportados pela cablagem do reboque (ou seja, quais as linhas de alimentação,
        massa e sinal presentes).
    trailer_wiring_connector_type:
      name: Tipo de conector da cablagem do reboque
      description: Especifica a norma de ficha do lado do reboque/veículo utilizada
        em chicotes e adaptadores de cablagem de reboque.
    train_whistle_intended_use:
      name: Utilização prevista da buzina de comboio
      description: Contexto principal de utilização previsto para a buzina.
    train_whistle_sound_character:
      name: Característica sonora da buzina de comboio
      description: Descreve a característica tonal percebida do som da buzina (timbre).
    trainer_mounting_type:
      name: Tipo de fixação do rolo de treino para bicicleta
      description: Descreve a forma como a bicicleta se liga ao rolo de treino (por
        exemplo, com contacto na roda ou transmissão direta).
    training_dummy_shape:
      name: Forma do boneco de treino
      description: Especifica o design geral ou a silhueta do boneco, o que influencia
        a pega do cão e o realismo do treino.
    training_focus:
      name: Foco do treino
      description: Descreve a principal área de competências que o equipamento pretende
        desenvolver (por exemplo, reflexos, jogo de pés, coordenação mão-olho).
    training_focus_area:
      name: Área de foco do treino
      description: Especifica a principal competência de lacrosse que o equipamento
        foi concebido para desenvolver.
    training_objective:
      name: Objetivo do treino
      description: Especifica a principal competência ou técnica que o produto foi
        concebido para melhorar.
    training_surface_suitability:
      name: Adequação da superfície de treino
      description: Especifica em que superfícies o equipamento de treino pode ser
        utilizado.
    training_surface_usage:
      name: Utilização da superfície de treino
      description: Especifica as principais atividades suportadas pela superfície
        de treino, distinguindo painéis de gelo sintético patinável de tapetes para
        treino em seco ou multidesportivos.
    training_usage_type:
      name: Tipo de utilização para treino
      description: Especifica o principal período ou contexto de utilização pretendido
        para as calças de treino, como uso diurno ou noturno.
    trampoline_enclosure_type:
      name: Tipo de rede de proteção do trampolim
      description: Especifica a configuração da rede de proteção utilizada no trampolim,
        incluindo a forma e o local onde a rede é montada.
    trampoline_safety_certifications:
      name: Certificações de segurança para trampolins
      description: Indica as normas/certificações de segurança relevantes para trampolins
        com as quais o produto afirma estar em conformidade.
    transfer_application_method:
      name: Método de aplicação da transferência
      description: Especifica como a transferência é aplicada ao tecido (por exemplo,
        aplicação a ferro vs. prensagem térmica).
    transfer_method:
      name: Método de transferência
      description: Especifica como o design deve ser transferido para o tecido.
    transfer_peel_temperature:
      name: Temperatura de remoção da película de transferência
      description: Especifica o estado de temperatura recomendado (quente, morno ou
        frio) em que a película de suporte deve ser removida após a prensagem.
    transmission_cooler_construction:
      name: Construção do sistema de arrefecimento da transmissão
      description: Especifica o design de construção do núcleo do sistema de arrefecimento
        da transmissão.
    transmission_fluid_specification:
      name: Especificação do fluido de transmissão
      description: Norma OEM/especificação cumprida pelo fluido da transmissão (por
        exemplo, famílias Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Material do casquilho do suporte da transmissão
      description: Especifica o material elastomérico ou isolador utilizado no casquilho/isolador
        do suporte (o elemento de amortecimento de vibrações).
    transmission_mount_type:
      name: Tipo de suporte da transmissão
      description: Especifica a construção/design de um suporte da transmissão (por
        exemplo, hidráulico vs. sólido) para ajudar a determinar compatibilidade,
        características NVH e utilização prevista.
    transparency_level:
      name: Nível de transparência
      description: Descreve o grau de transparência das paredes da caixa, ajudando
        os compradores a escolher entre visibilidade clara ou armazenamento oculto.
    transport_case_type:
      name: Tipo de caixa de transporte
      description: Classifica o estilo estrutural/rigidez da solução de transporte,
        refletindo o nível de proteção e o método de acondicionamento.
    transposition_modes:
      name: Modos de transposição
      description: Especifica os modos de transposição/afinação de concerto suportados
        pelo afinador (por exemplo, afinação de concerto e tonalidades transpositoras
        como Si♭ ou Mi♭).
    trap_design:
      name: Conceção da armadilha
      description: Identifica o estilo estrutural ou mecanismo da armadilha, que determina
        o método de acionamento e as espécies ou ambientes para os quais é mais adequada.
    trap_spring_configuration:
      name: Configuração das molas da armadilha
      description: Indica o número ou disposição das molas que acionam a armadilha,
        o que afeta a força e a legalidade.
    travel_bassinet_accessories_included:
      name: Acessórios incluídos no berço de viagem
      description: Lista os itens suplementares fornecidos com o berço de viagem.
    travel_spinning_wheel_assembly_required:
      name: Montagem necessária da roda giratória móvel
      description: Indica se a roda requer montagem/configuração adicional além da
        simples abertura (por exemplo, fixação do volante, tensão ou pedais) antes
        da utilização.
    travel_spinning_wheel_portability_features:
      name: Características de portabilidade da roda giratória móvel
      description: Elementos de design relacionados com a portabilidade das rodas
        giratórias móveis, como construção dobrável e soluções de transporte incluídas.
    travel_trailer_appliances_fuel_type:
      name: Tipo de combustível dos aparelhos da caravana de viagem
      description: Combustível principal utilizado nos aparelhos/aquecimento/cozinha
        a bordo (não inclui o veículo rebocador).
    travel_trailer_holding_tank_type:
      name: Tipo de depósito de retenção da caravana de viagem
      description: Indica quais os depósitos de retenção presentes na caravana de
        viagem (selecione todos os aplicáveis).
    travel_trailer_power_hookup_shore_power:
      name: Ligação elétrica da caravana de viagem (ligação à rede elétrica externa)
      description: Normas de ligação elétrica suportadas para ligações à rede elétrica
        externa.
    tread_pattern_type:
      name: Tipo de padrão do piso
      description: Classifica o desenho geral do piso do pneu, como liso, semi-liso
        ou cardado, o que afeta a tração, a resistência ao rolamento e a superfície
        de utilização prevista.
    treadmill_key_type:
      name: Tipo de chave de segurança da passadeira
      description: Descreve o estilo físico ou o mecanismo de funcionamento/ligação
        da chave de segurança (por exemplo, magnética redonda, inserção plástica,
        com clipe).
    treadmill_part_type:
      name: Tipo de peça para passadeira
      description: Identifica o componente específico da passadeira que o produto
        se destina a substituir, para que os compradores possam confirmar rapidamente
        a compatibilidade (por exemplo, correia vs. motor).
    treadmill_position:
      name: Posição na passadeira
      description: Indica a posição de instalação da peça na passadeira (frontal,
        traseira, superior, inferior, central).
    triangle_striker_material:
      name: Material da baqueta do triângulo
      description: Material da baqueta/percutor incluído.
    trigger_input_connector:
      name: Conector de entrada para acionador
      description: Especifica o padrão de conector físico utilizado para entradas
        para trigger.
    trigger_input_connector_type:
      name: Tipo de conector de entrada para trigger
      description: Especifica o tipo de conector físico utilizado para entradas para
        acionador.
    trigger_input_zone_support:
      name: Suporte de zonas de entrada para acionador
      description: Indica se as entradas para acionador suportam acionadores de zona
        única e/ou dupla zona (por exemplo, pele/aro) e implementações semelhantes
        de múltiplas zonas.
    trim_application_method:
      name: Método de aplicação da guarnição
      description: Indica como o acabamento deve ser aplicado ao projeto (por exemplo,
        cosido, aplicado a ferro, adesivo).
    trim_detail:
      name: Detalhes do acabamento
      description: Identifica rebordos ou acabamentos decorativos proeminentes na
        peça de roupa (por exemplo, acabamento com borlas, franjas, renda).
    trim_elasticity:
      name: Elasticidade do acabamento
      description: Indica se o acabamento ric-rac possui elasticidade para utilização
        em aplicações de malha/roupa desportiva.
    trim_finish:
      name: Acabamento de superfície do acabamento
      description: Tratamento de superfície aplicado ao acabamento (por exemplo, metálico,
        com glitter, refletor).
    trim_tilt_type:
      name: Tipo de acabamento e inclinação
      description: Indica se e como o motor suporta ajuste de acabamento/inclinação.
    trolleybus_power_supply_type:
      name: Tipo de fonte de alimentação do trólei elétrico
      description: Especifica como o trólei elétrico recebe energia de tração da rede
        elétrica.
    truck_bed_body_type:
      name: Tipo de caixa/carroçaria do camião
      description: Configuração da caixa de carga ou carroçaria atrás da cabine.
    truck_bed_length_class:
      name: Classe de comprimento da carroçaria do camião
      description: Indica a classe de comprimento da carroçaria do camião para a qual
        a rede de carga foi concebida (normalmente designada como carroçaria curta,
        padrão ou longa).
    truck_mounting_hole_pattern:
      name: Padrão de orifícios de montagem dos eixos
      description: Especifica o esquema dos orifícios utilizado para montar os eixos
        na prancha (por exemplo, old school, new school ou universal).
    truck_mounting_style:
      name: Tipo de montagem dos eixos
      description: Indica como os eixos são fixados à prancha (montagem superior,
        montagem passante, etc.), influenciando a altura ao solo e a estabilidade.
    truck_profile:
      name: Perfil dos eixos
      description: Indica a classificação da altura de condução dos eixos de skate
        em relação à prancha, afetando a folga das rodas e a sensação de utilização.
    trumpet_bell_material:
      name: Material da campânula do trompete
      description: Material utilizado na secção da campânula (por vezes diferente
        do restante instrumento).
    trumpet_leadpipe_material:
      name: Material do tubo de entrada do trompete
      description: Material ou tratamento utilizado no tubo de entrada (tubo principal
        entre o bocal e as válvulas).
    trundle_mechanism:
      name: Mecanismo da cama auxiliar deslizante
      description: Descreve como o componente secundário da cama é retirado da estrutura
        principal.
    trunk_part_type:
      name: Tipo de componente da bagageira
      description: Especifica qual o componente relacionado com a bagageira que está
        a ser vendido (por exemplo, tampa da bagageira, dobradiça, fecho).
    tuba_leadpipe_material:
      name: Material do tubo de entrada da tuba
      description: Identifica o material utilizado na secção do tubo de entrada (bocal)
        da tuba.
    tube_base_type:
      name: Tipo de base da válvula
      description: Especifica a família de base/casquilho da válvula utilizada para
        compatibilidade física/elétrica (por exemplo, Octal, Noval/9 pinos).
    tube_matching_grade:
      name: Grau de correspondência dos tubos
      description: Indica se os tubos são testados/emparelhados em conjunto e o tipo
        de emparelhamento fornecido.
    tube_weight_category:
      name: Categoria de peso das câmaras de ar
      description: Classifica a câmara de ar pela construção/peso (por exemplo, ultraleve,
        padrão, pesada) para comparação rápida entre durabilidade e desempenho.
    tubeless_compatible:
      name: Compatível com pneus sem tubos
      description: Indica se a roda foi concebida para ser utilizada sem câmara de
        ar quando combinada com pneus sem tubos.
    tubing_shape:
      name: Forma da tubagem
      description: Especifica a forma da secção transversal da tubagem de suporte
        do suporte.
    tubular_construction_type:
      name: Tipo de construção tubular
      description: Especifica o estilo de construção dos pneus tubulares de bicicleta,
        distinguindo entre tubulares tradicionais colados e variantes mais recentes.
    tulip_type_flower_form:
      name: Tipo de tulipa (forma da flor)
      description: Especifica o tipo hortícola/forma da flor das tulipas no ramo (por
        exemplo, simples, dupla, papagaio).
    tuner_input_method:
      name: Método de entrada do afinador
      description: Especifica como o afinador deteta a afinação (microfone, sensor
        de vibração/clipe, entrada por cabo de instrumento, captador de contacto).
    tuning_mechanism:
      name: Mecanismo de afinação
      description: Forma como as peles dos bongós são tensionadas/afinadas.
    tuning_system:
      name: Sistema de afinação
      description: A forma como o timbale é afinado ou se é afinável.
    turn_signal_lens_color:
      name: Cor da lente do pisca
      description: Cor da lente/cobertura visível no alojamento do pisca (não a cor
        da luz emitida).
    turn_signal_lighting_style:
      name: Estilo de iluminação do pisca
      description: O estilo visual/sinalização animada fornecido pelo pisca.
    turnip_and_rutabaga_variety:
      name: Variedade de nabo e rutabaga
      description: Identifica a cultivar ou variedade específica do nabo ou da rutabaga.
    tweeter_crossover_type:
      name: Tipo de crossover do tweeter
      description: Indica o tipo de crossover passa-alto e/ou componente de proteção
        incluído com o tweeter, quando aplicável.
    tweeter_material:
      name: Material do tweeter
      description: Material principal do diafragma/cúpula do tweeter.
    tweeter_mount_type:
      name: Tipo de montagem do tweeter
      description: Especifica como o tweeter deve ser instalado no veículo (método/hardware
        de montagem).
    twill_direction:
      name: Direção da sarja
      description: Indica a orientação da linha de sarja num tecido de ganga.
    twist_direction:
      name: Sentido da torção
      description: Direção da torção utilizada no fio/linha (torção S ou torção Z).
    u_joint_series_size:
      name: Série/tamanho da junta universal
      description: Especifica a série ou norma de tamanho da junta universal (por
        exemplo, série 1310).
    uilleann_pipes_bag_material:
      name: Material do saco da gaita de foles irlandesa
      description: Material do saco de ar (quando incluído), que influencia o toque,
        a durabilidade e a manutenção.
    uilleann_pipes_handedness:
      name: Configuração para destro/canhoto da gaita de foles irlandesa
      description: Indica se o conjunto está configurado para uma disposição de execução
        para destros ou canhotos.
    uilleann_pipes_set_configuration:
      name: Configuração do conjunto da gaita de foles irlandesa
      description: Especifica a configuração da gaita de foles irlandesa incluída,
        com base na presença de reguladores e drones.
    uk_childrens_shoe_size:
      name: Tamanho de calçado infantil do Reino Unido
      description: Especifica o tamanho de calçado infantil do Reino Unido, como 4
        ou 4 Largo.
    uk_clothing_size:
      name: Tamanho de roupa do Reino Unido
      description: Especifica o tamanho de roupa do Reino Unido, como 12 ou 18
    uk_cup_size:
      name: Tamanho de copa do Reino Unido
      description: Especifica o tamanho de copa de sutiã do Reino Unido, como C ou
        FF
    uk_mens_shoe_size:
      name: Tamanho de calçado masculino do Reino Unido
      description: Especifica o tamanho de calçado masculino do Reino Unido, como
        9 ou 9 Largo
    uk_womens_shoe_size:
      name: Tamanho de calçado feminino do Reino Unido
      description: Especifica o tamanho de calçado feminino do Reino Unido, como 6
        ou 6 Largo
    ukulele_back_and_sides_wood:
      name: Madeira do fundo e faixas laterais do ukulele
      description: Identifica a madeira/material utilizado no fundo e nas faixas laterais
        do ukulele.
    ukulele_body_cutaway:
      name: Cutaway do corpo do ukulele
      description: Indica se o corpo do ukulele de concerto possui cutaway para facilitar
        o acesso aos trastes superiores.
    ukulele_body_shape:
      name: Forma do corpo do ukulele
      description: Estilo/forma geral do corpo utilizada no ukulele.
    ukulele_bridge_material:
      name: Material da ponte do ukulele
      description: Especifica o material utilizado na ponte do ukulele.
    ukulele_construction_type:
      name: Tipo de construção do ukulele
      description: Indica como o instrumento é construído (tampo, fundo e faixas laterais
        em madeira maciça ou laminada).
    ukulele_electronics_configuration:
      name: Configuração eletrónica do ukulele
      description: Indica se o ukulele é acústico ou se inclui eletrónica incorporada
        (captador e/ou pré-amplificador) para amplificação.
    ukulele_string_re_entrant_tuning:
      name: Afinação reentrante do ukulele
      description: Indica se o ukulele está configurado com afinação reentrante (Sol
        agudo) versus linear (Sol grave), influenciando o timbre.
    ukulele_top_wood:
      name: Madeira do tampo do ukulele
      description: Identifica a madeira/material utilizado no tampo/tábua harmónica
        do ukulele.
    ukulele_tuner_mechanism:
      name: Mecanismo de afinação do ukulele
      description: Especifica o estilo/mecanismo de afinação utilizados no ukulele.
    ukulele_tuner_type:
      name: Tipo de afinação do ukulele
      description: Estilo do mecanismo de afinação utilizado na cabeça do ukulele.
    ukulele_tuning:
      name: Afinação do ukulele
      description: Especifica a afinação padrão prevista para o ukulele de bolso.
    ultralight_aircraft_wing_configuration:
      name: Configuração da asa de aeronave ultraleve
      description: Posicionamento e configuração da asa principal em relação à fuselagem/estrutura.
    under_bed_features:
      name: Características do espaço sob a cama
      description: Identifica o elemento funcional principal localizado sob a plataforma
        da cama.
    underfoot_strap_type:
      name: Tipo de correia sob o pé
      description: Identifica o material ou design da correia que passa por baixo
        do calçado.
    underwear_fit:
      name: Ajuste de roupa interior
      description: Indica o perfil geral do ajuste das cuecas boxer (por exemplo,
        slim, largo, compressivo).
    underwear_pieces_included:
      name: Peças de roupa interior incluídas
      description: Identifica quais peças de vestuário são fornecidas (parte superior,
        inferior, conjunto completo ou fato inteiro), clarificando se se trata de
        um conjunto completo ou de um item individual.
    uniform_pieces_included:
      name: Peças do uniforme incluídas
      description: Identifica quais componentes do vestuário são fornecidos (por exemplo,
        camisa, calças, colete), clarificando o conteúdo do conjunto.
    uniform_role:
      name: Função do uniforme
      description: Especifica a função profissional ou entidade a que o uniforme se
        destina (por exemplo, polícia, bombeiros, serviços de emergência médica).
    update_method:
      name: Método de atualização
      description: Forma como as atualizações de firmware/software são disponibilizadas
        para o leitor.
    upholstery_fabric_backing_type:
      name: Tipo de revestimento do tecido de estofo
      description: Especifica o revestimento/laminação do tecido de estofo, que afeta
        a instalação e a sensação ao toque.
    upholstery_fabric_water_resistance:
      name: Resistência à água do tecido de estofo
      description: Indica a resistência à água e a derrames na superfície do tecido
        de estofo.
    upper_material:
      name: Material superior
      description: Especifica o material principal utilizado na parte superior do
        ténis, que afeta a respirabilidade, durabilidade e estética.
    upright_bass_pickup_system:
      name: Sistema de captação do contrabaixo vertical
      description: Indica se o contrabaixo vertical inclui um sistema de captação/pré-amplificação
        instalado, destinado à amplificação.
    upright_piano_power_source:
      name: Fonte de alimentação do piano vertical
      description: Indica como o piano vertical é alimentado, aplicável a pianos verticais
        acústicos sem alimentação elétrica, bem como a pianos verticais com sistemas
        silenciosos/híbridos que requerem eletricidade.
    urination_device_features:
      name: Características do dispositivo de urinóis
      description: Destaca as características especiais de design que melhoram a funcionalidade
        ou a conveniência.
    us_childrens_shoe_size:
      name: Tamanho de calçado infantil dos EUA
      description: Especifica o tamanho de calçado infantil dos EUA, como 5 ou 5 Largo
    us_clothing_size:
      name: Tamanho de roupa dos EUA
      description: Especifica o tamanho de roupa dos EUA, como 8 ou 14
    us_cup_size:
      name: Tamanho de copa dos EUA
      description: Especifica o tamanho de copa de sutiã dos EUA, como C ou DDD
    us_mens_shoe_size:
      name: Tamanho de calçado masculino dos EUA
      description: Especifica o tamanho de calçado masculino dos EUA, como 10 ou 10
        Largo.
    us_ring_size:
      name: Tamanho de anel nos EUA
      description: Indica o tamanho de anel nos EUA, como 7 ou 9,5
    us_womens_shoe_size:
      name: Tamanho de calçado feminino dos EUA
      description: Especifica o tamanho de calçado feminino dos EUA, como 8 ou 8 Largo.
    usage:
      name: Utilização
      description: Descreve a utilização prevista/configuração da árvore de cames.
    usda_honey_grade:
      name: Classificação USDA do mel
      description: Indica a classificação oficial atribuída ao mel pelo Departamento
        de Agricultura dos EUA (USDA).
    user_control_method:
      name: Método de controlo do utilizador
      description: Indica como o utilizador interage com a máquina, por exemplo, painel
        de controlo integrado, comando, aplicação ou voz, informando considerações
        de facilidade de utilização.
    vacuum_boost_reference_port:
      name: Porta de referência de vácuo/boost
      description: Indica se o regulador inclui uma porta de referência do coletor
        para vácuo/boost e qual o respetivo estilo.
    valve_base_shape:
      name: Forma da base da válvula
      description: Identifica a geometria da interface entre a base da válvula e a
        jante, como redonda, cónica, porta lateral, em T, etc., o que afeta a vedação
        e a compatibilidade com inserções de espuma.
    valve_core_type:
      name: Tipo de núcleo da válvula
      description: Indica se o núcleo da válvula é removível, fixo ou sem núcleo,
        informação que afeta os procedimentos de manutenção e a compatibilidade com
        ferramentas de injeção de selante.
    valve_cover_gasket_material:
      name: Material da junta da tampa da válvula
      description: Especifica o material da junta da tampa da válvula incluída com
        a tampa da válvula, ou o material recomendado para a junta quando vendida
        sem junta (se aplicável).
    valve_cover_material:
      name: Material da tampa da válvula
      description: Material principal de construção da tampa da válvula
    valve_design:
      name: Design da válvula
      description: Identifica a construção/o design da válvula do motor.
    valve_guard_coverage_area:
      name: Área de cobertura da proteção da válvula
      description: Indica quais as partes da secção da válvula que a proteção protege.
    valvetrain_configuration:
      name: Configuração do comando de válvulas
      description: Especifica o esquema do sistema de cames/válvulas.
    varnish_formulation_base:
      name: Base da formulação do verniz
      description: Especifica a formulação/química principal do verniz para instrumentos
        de cordas, que afeta a aparência, a reversibilidade e a compatibilidade com
        acabamentos existentes.
    varnish_transparency_tint:
      name: Transparência/tonalidade do verniz
      description: Descreve se o verniz é transparente ou tingido e, se for tingido,
        a família geral da tonalidade.
    vegetable_matter_vm_content:
      name: Teor de matéria vegetal (VM)
      description: Quantidade de resíduos/impurezas vegetais presentes na fibra.
    vegetable_preparation_style:
      name: Estilo de preparação dos vegetais
      description: Descreve como os vegetais são apresentados, cortados ou preparados
        de outra forma antes da venda, por exemplo inteiro, em cubos ou em floretes.
    vehicle_audio_dsp_form_factor:
      name: Formato do DSP de áudio para veículo
      description: Especifica o formato físico/de instalação da unidade DSP.
    vehicle_battery_charger_features:
      name: Características do carregador de bateria para veículo
      description: Lista os modos de funcionamento e as funcionalidades incorporadas
        do carregador de bateria para veículo, por exemplo modo flutuação ou dessulfatação.
    vehicle_body_filler_form:
      name: Forma do betume de carroçaria automóvel
      description: Formato físico/estilo de embalagem do produto de enchimento para
        carroçaria.
    vehicle_coaxial_speaker_nominal_size:
      name: Tamanho nominal do altifalante coaxial para veículo
      description: Tamanho nominal do altifalante utilizado na instalação (por exemplo
        6,5 polegadas ou 6×9 polegadas).
    vehicle_cover_size_class:
      name: Classe de tamanho da cobertura para veículo
      description: Grupo geral de tamanho que indica o tamanho de veículo para o qual
        a cobertura foi concebida.
    vehicle_decor_set_items_included:
      name: Itens incluídos no conjunto decorativo para veículo
      description: Lista os tipos de itens decorativos incluídos no conjunto de acessórios
        (com visibilidade ao nível dos componentes para os compradores).
    vehicle_door_lock_actuation_method:
      name: Método de acionamento do fecho da porta do veículo
      description: Indica como o fecho da porta do veículo é acionado ou controlado.
    vehicle_door_lock_actuator_kit_contents:
      name: Conteúdo do kit do atuador do fecho da porta do veículo
      description: Indica o que está incluído com o atuador, por exemplo apenas o
        atuador vs. ferragens/hastes/suportes/cablagem.
    vehicle_door_lock_actuator_wiring_configuration:
      name: Configuração da cablagem do atuador do fecho da porta do veículo
      description: Especifica o tipo de cablagem necessário para a instalação (número
        de fios e a respetiva função).
    vehicle_door_lock_included_components:
      name: Componentes incluídos no fecho da porta do veículo
      description: Lista os componentes incluídos na embalagem (útil para kits/conjuntos).
    vehicle_electrical_connector_type:
      name: Tipo de conector elétrico do veículo
      description: Especifica o tipo de conector elétrico ou ficha do regulador/campo
        do alternador, excluindo o terminal principal de saída B+.
    vehicle_equipment_fit_out_level:
      name: Nível de equipamento/adaptação do veículo
      description: Indica o nível de adaptação policial incluído na carrinha.
    vehicle_glass_cleaner_form:
      name: Formato do limpa-vidros para veículo
      description: Formato físico do produto limpa-vidros para veículo (por exemplo
        spray, espuma, toalhitas, gel ou concentrado).
    vehicle_hitch_cover_illumination_type:
      name: Tipo de iluminação da cobertura do engate do veículo
      description: Especifica se a cobertura do engate tem iluminação e de que tipo.
    vehicle_hitch_cover_mounting_type:
      name: Tipo de montagem da cobertura do engate do veículo
      description: Indica o método utilizado para prender/fixar a cobertura do engate
        no recetor do engate.
    vehicle_license_plate_finish:
      name: Acabamento da matrícula do veículo
      description: Acabamento da superfície da matrícula.
    vehicle_license_plate_frame_anti_theft_design:
      name: Design antirroubo da placa de matrícula do veículo
      description: Elementos de design relacionados com segurança, destinados a impedir
        a remoção ou adulteração.
    vehicle_license_plate_frame_plate_standard:
      name: Norma da placa de matrícula do veículo
      description: Norma/região da matrícula para a qual a placa está dimensionada.
    vehicle_license_plate_frame_profile:
      name: Perfil da placa de matrícula do veículo
      description: Indica como a placa contorna a matrícula, em termos de cobertura/formato,
        o que afeta a legibilidade e a conformidade.
    vehicle_license_plate_mounting_hole_count:
      name: Número de orifícios de fixação da placa de matrícula do veículo
      description: Número de orifícios de montagem na matrícula.
    vehicle_license_plate_mounting_hole_pattern:
      name: Disposição dos orifícios de fixação da placa de matrícula do veículo
      description: Padrão de posicionamento dos orifícios de montagem na matrícula.
    vehicle_license_plate_reflectivity:
      name: Refletividade da matrícula do veículo
      description: Indica se e como a superfície da matrícula reflete a luz (importante
        para a visibilidade e conformidade em algumas matrículas decorativas).
    vehicle_license_plate_size_standard:
      name: Norma relativa ao tamanho da placa de matrícula do veículo
      description: Indica a norma regional/do veículo para a qual a placa está dimensionada
        (espaçamento dos furos de montagem e as dimensões gerais).
    vehicle_license_plate_text_style:
      name: Estilo do texto da placa de matrícula do veículo
      description: Estilo dos caracteres da matrícula, se aplicável, incluindo em
        relevo vs. impressos.
    vehicle_license_plate_theme:
      name: Tema da placa de matrícula do veículo
      description: Tema geral do design gráfico da matrícula.
    vehicle_lift_actuation_method:
      name: Método de acionamento do elevador de veículos
      description: Como o elevador/macaco é alimentado/acionado para levantar o veículo.
    vehicle_lift_mounting_type:
      name: Tipo de montagem do elevador para veículo
      description: Indica como o elevador é instalado ou fixado no espaço de trabalho.
    vehicle_lift_type:
      name: Tipo de elevador de veículos
      description: Especifica o estilo estrutural do elevador para veículo utilizado
        para manutenção ou armazenamento, por exemplo, de 2 colunas, 4 colunas ou
        tesoura.
    vehicle_magnet_attachment_type:
      name: Tipo de fixação do íman para veículos
      description: Especifica o principal método de fixação/montagem para produtos
        vendidos como ímanes para veículos, por exemplo, apenas magnético vs. magnético
        com suporte adesivo.
    vehicle_magnet_intended_use:
      name: Utilização prevista do íman para veículos
      description: Indica o principal caso de utilização previsto para o íman para
        veículos.
    vehicle_mirror_adjustment_type:
      name: Tipo de ajuste do espelho do veículo
      description: Especifica como o espelho é ajustado/controlado.
    vehicle_mirror_glass_type:
      name: Tipo de vidro dos espelhos do veículo
      description: Especifica o tipo óptico/formato da superfície de vidro do espelho.
    vehicle_organizer_features:
      name: Características do organizador para veículos
      description: Principais características funcionais dos organizadores para veículos,
        como dobrável, revestimento impermeável, bolsos isolados ou base antiderrapante.
    vehicle_paint_chemistry_base:
      name: Química/base de tinta para veículos
      description: Indica a formulação/química da tinta utilizada em tintas para veículos.
    vehicle_polish_application_method:
      name: Método de aplicação de polimento de veículos
      description: Especifica o método ou a ferramenta recomendada para a aplicação
        de polimento para veículos.
    vehicle_pursuit_package:
      name: Pacote Pursuit para veículos
      description: Indica se o veículo está equipado com um pacote de performance
        para serviço Pursuit, destinado a uso policial, por exemplo, refrigeração,
        travões, suspensão e calibração melhorados.
    vehicle_safety_equipment_position:
      name: Posição do equipamento de segurança do veículo
      description: Especifica onde, no veículo ou dentro dele, o equipamento de segurança
        se destina a ser utilizado ou instalado.
    vehicle_safety_equipment_visibility_features:
      name: Características de visibilidade do equipamento de segurança do veículo
      description: Indica características de melhoria da visibilidade concebidas para
        aumentar a conspicuidade.
    vehicle_seat_row:
      name: Fila do banco do veículo
      description: Indica a fila traseira para a qual o banco se destina (segunda
        fila vs. terceira fila), incluindo aplicações de banco auxiliar traseiro.
    vehicle_steering_assist_type:
      name: Tipo de assistência à condução do veículo
      description: Especifica o sistema de assistência à condução para o qual o componente
        foi concebido.
    vehicle_steering_wheel_lock_form_factor:
      name: Formato do bloqueio do volante do veículo
      description: Descreve o estilo físico do bloqueio e a forma como interage com
        o volante e, opcionalmente, com outros controlos.
    vehicle_wax_polish_product_form:
      name: Formato do produto de cera/polimento para veículos
      description: O formato físico/de dispensação da cera, polidor, protetor ou selante.
    vehicle_wheel_valve_stem_type:
      name: Tipo de válvula da roda do veículo
      description: Especifica o tipo de válvula suportado ou incluído.
    vehicle_windshield_fluid_formula:
      name: Fórmula do líquido limpa-para-brisas
      description: Principal foco de limpeza/remoção da formulação do líquido limpa-para-brisas.
    veil_length_type:
      name: Tipo de comprimento do véu
      description: Classifica o véu usando terminologia padrão de comprimento, em
        vez de medição numérica.
    vellum_opacity_level:
      name: Nível de opacidade do véu
      description: Indica o quão translúcida ou opaca é a folha de véu.
    ventilation_configuration:
      name: Configuração da ventilação
      description: Configuração principal de ventilação/entrada e saída de ar do capacete.
    ventilation_control_type:
      name: Tipo de controlo da ventilação
      description: Especifica o estilo de gestão do fluxo de ar incorporado no capacete.
    ventilation_level:
      name: Nível de ventilação
      description: Indica o design relativo de fluxo de ar/ventilação da armadura.
    venting_design:
      name: Design de ventilação
      description: Especifica se e como a capa é ventilada para reduzir a condensação
        e o bolor durante o armazenamento.
    vestibule_type:
      name: Tipo de vestíbulo
      description: Classifica o esquema do vestíbulo em relação à tenda.
    vibraphone_bar_material:
      name: Material das barras do vibrafone
      description: Material das barras/teclas tonais do vibrafone, ou seja, as barras
        que produzem som.
    vibraphone_motor_type:
      name: Tipo de motor do vibrafone
      description: Tipo de motor usado para acionar as ventoinhas rotativas dos ressonadores
        para o vibrato, se equipado.
    vibraphone_range_octaves:
      name: Alcance do vibrafone (em oitavas)
      description: O alcance tonal do vibrafone expressa em oitavas, por exemplo,
        3 oitavas ou 3,5 oitavas.
    vibraphone_resonator_tube_material:
      name: Material dos tubos ressonadores do vibrafone
      description: Material dos tubos ressonadores do vibrafone situados por baixo
        das barras.
    vibraphone_tuning_standard:
      name: Padrão de afinação do vibrafone
      description: Altura de referência usada para a afinação, por exemplo, A=440
        Hz.
    viewing_sides:
      name: Faces de visualização
      description: Especifica quantas faces do marcador apresentam informação, por
        exemplo, uma face, duas faces, quatro faces, etc.
    vintage_advertisement_decade:
      name: Década do anúncio vintage
      description: Especifica a década em que o anúncio foi originalmente impresso
        ou produzido (aproximadamente se o ano exato for desconhecido).
    vintage_advertisement_format:
      name: Formato do anúncio publicitário vintage
      description: Especifica o formato físico ou suporte do anúncio vintage colecionável.
    vintage_advertisement_subject_category:
      name: Categoria do tema do anúncio vintage
      description: Identifica a categoria do produto/serviço anunciado, ou seja, sobre
        o que é o anúncio.
    vintage_classic_truck_cab_type:
      name: Tipo de cabina de camião vintage e clássico
      description: Configuração da cabina/estilo de carroçaria do compartimento de
        passageiros do camião.
    virginia_tech_helmet_star_rating:
      name: Classificação por estrelas do capacete Virginia Tech
      description: Classificação de segurança atribuída pelo Virginia Tech Helmet
        Lab, de 0 a 5 estrelas.
    virtual_analog_synthesizer_form_factor:
      name: Formato do sintetizador analógico virtual
      description: Especifica o formato físico do chassis do sintetizador (teclado
        vs. módulo/estante).
    viscosity_thickness:
      name: Viscosidade/espessura
      description: Descreve a espessura ou fluidez da barbotina, tal como é vendida
        ou na consistência de trabalho recomendada.
    vise_configuration:
      name: Configuração do mandril
      description: Especifica o esquema estrutural ou o número de peças do conjunto
        do torno, o que afeta a portabilidade e a complexidade de montagem.
    visibility_features:
      name: Características de visibilidade
      description: Destaca os elementos de design que melhoram a visibilidade do condutor
        no trânsito.
    visor_brim_type:
      name: Tipo de visor/viseira
      description: Indica a presença e o estilo de uma viseira ou aba no capacete.
    visor_configuration:
      name: Configuração da viseira
      description: Descreve a presença e o estilo de qualquer pala ou proteção facial
        incorporada.
    visor_lens_finish:
      name: Acabamento da lente da viseira
      description: Especifica a tonalidade, o acabamento ótico ou o estilo gráfico
        aplicado à lente da viseira.
    visor_style:
      name: Estilo da viseira
      description: Indica se o capuz inclui uma pala/viseira e a respetiva configuração.
    voc_compliance_standard:
      name: Padrão de conformidade VOC
      description: Alegação de conformidade regulamentar VOC do produto (quando aplicável).
    voc_regulatory_class:
      name: Classe regulamentar VOC
      description: Classe regulamentar/de conformidade VOC declarada para o produto,
        usada para restrições regionais regulamentares e ambientais, conforme o rótulo/SDS.
    vodka_base_ingredient:
      name: Ingrediente base da vodka
      description: Ingrediente agrícola principal a partir do qual a vodka é destilada
        (por exemplo, trigo, batata ou milho).
    voice_coil_configuration:
      name: Configuração da bobina de voz
      description: Número/disposição das bobinas de voz para opções de cablagem, flexibilidade
        e impedância.
    voice_effects:
      name: Efeitos de voz
      description: Tipos de efeitos vocais integrados suportados pelo conjunto de
        karaoke.
    voltage_rating_type:
      name: Tipo de classificação de tensão
      description: Especifica se a classificação de tensão do fusível se aplica a
        AC, DC ou ambos.
    voltage_regulator_connector_type:
      name: Tipo de conector do regulador de tensão
      description: Especifica o estilo de ligação/terminal utilizado para ligar o
        regulador à cablagem do veículo/alternador/gerador.
    wader_foot_type:
      name: Tipo de pé das calças impermeáveis
      description: Especifica se as calças de vadeação têm botas integradas ou pés
        em meia separados.
    wader_sole_type:
      name: Tipo de sola das calças de vadeação
      description: Especifica o material da sola exterior ou o tipo de tração usado
        em botas de vadeação ou calças de vadeação sem bota.
    waistband_style:
      name: Estilo do cós
      description: Descreve a construção do cós e como é apertado ou ajustado para
        conforto e bom ajuste.
    wakeboard_binding_mounting_pattern:
      name: Padrão de montagem das fixações de wakeboard
      description: Especifica o padrão dos encaixes/placa no wakeboard com o qual
        as fixações são compatíveis.
    wakeboard_riding_style:
      name: Estilo de utilização do wakeboard
      description: Classifica o ambiente ou estilo de utilização previsto para o wakeboard.
    wall_decal_style:
      name: Estilo do autocolante de parede
      description: Especifica como o autocolante é produzido/aplicado (por exemplo,
        recortado, transferível ou folha de autocolantes).
    wallyball_equipment_included:
      name: Equipamento de wallyball incluído
      description: Lista as peças específicas incluídas no conjunto de wallball, para
        que os compradores saibam exatamente o que estão a comprar e possam comparar
        conjuntos.
    warp_beam_type:
      name: Tipo de eixo de urdidura
      description: Especifica a configuração do rolo de urdidura incluído ou instalado
        no tear (configuração do rolo fornecida com o tear).
    washability:
      name: Lavabilidade
      description: Indica se a cola pode ser limpa com água e/ou se é lavável após
        a aplicação.
    watch_band_design:
      name: Design da bracelete do relógio
      description: Descreve o estilo de construção ou padrão de design da bracelete
        do relógio (por exemplo, NATO, Milanese ou elos).
    watch_movement:
      name: Movimento do relógio
      description: Especifica o mecanismo que alimenta o relógio, um fator importante
        para os compradores distinguirem modelos.
    water_activation:
      name: Ativação por água
      description: Indica se o sinalizador pode ser ativado automaticamente quando
        imerso em água (comum em EPIRBs de categoria I/II).
    water_chamber_configuration:
      name: Configuração das câmaras de água
      description: Descreve o esquema interno das câmaras do colchão, como câmara
        única ou dupla, o que afeta o suporte, o controlo de temperatura e a perturbação
        do parceiro.
    water_dispensing_mechanism:
      name: Mecanismo de distribuição de água
      description: Define como a água é libertada da unidade, por exemplo, por bicas,
        bicos de pulverização ou descarga por gravidade.
    water_exposure_protection_level:
      name: Nível de proteção contra exposição à água
      description: Indica o nível de proteção do produto quando exposto à água, por
        exemplo, salpicos vs. imersão temporária. Utilize a classificação de proteção
        contra entrada de água/poeiras (IP) quando existe um código IP oficial disponível.
    water_fed_design:
      name: Design com alimentação de água
      description: Indica se a escova foi concebida para ser utilizada com água corrente
        através de um cabo com passagem de água ou ligação a mangueira.
    water_gun_features:
      name: Características da pistola de água
      description: Características funcionais notáveis e capacidades incluídas da
        pistola de água.
    water_gun_operating_mechanism:
      name: Mecanismo de funcionamento da pistola de água
      description: Como a pistola de água pressuriza e expele a água durante a utilização.
    water_gun_spray_pattern:
      name: Padrão de pulverização da pistola de água
      description: O tipo de jato de água produzido pelo bico durante o disparo.
    water_heating_method:
      name: Método de aquecimento da água
      description: Descreve como, ou se, a água é aquecida antes da utilização, por
        exemplo, absorção solar, queimadores a propano, elementos elétricos, aquecimento
        a bateria, isolamento retentor de calor ou sem aquecimento.
    water_mattress_construction:
      name: Construção do colchão de água
      description: Especifica o estilo de construção do colchão de água (por exemplo,
        rígido ou flexível), o que determina a compatibilidade com a estrutura e a
        sensação geral.
    water_play_features:
      name: Atividades aquáticas lúdicas
      description: Componentes de atividade aquática incluídos no parque aquático/escorrega.
    water_polo_competition_approval:
      name: Aprovação para competição de polo aquático
      description: Identifica o organismo regulador ou nível de competição para o
        qual a bola está oficialmente aprovada ou certificada.
    water_polo_goal_type:
      name: Tipo de baliza de polo aquático
      description: Classifica a configuração estrutural ou de montagem da baliza (por
        exemplo, flutuante, fixa ao cais ou portátil).
    water_pump_drive_type:
      name: Tipo de acionamento da bomba de água
      description: Especifica como a bomba de água é acionada/operada no sistema de
        arrefecimento do veículo.
    water_pump_housing_material:
      name: Material da carcaça da bomba de água
      description: Material da carcaça/corpo da bomba de água.
    water_pump_impeller_material:
      name: Material do impulsor da bomba de água
      description: Especifica o material do impulsor da bomba de água (o rotor/pá
        interna que move o líquido de arrefecimento).
    water_pump_mounting_type:
      name: Tipo de montagem da bomba de água
      description: Especifica o estilo de montagem/formato da bomba de água para encaixe
        no motor (por exemplo, carcaça aparafusada vs. cartucho/inserto).
    water_purification_method:
      name: Método de purificação da água
      description: Identifica o principal mecanismo através do qual o produto torna
        a água segura para beber em ambiente exterior, por exemplo, bomba, alimentação
        por gravidade ou luz UV.
    water_resistance:
      name: Resistência à água
      description: Comunica o grau de proteção contra intempéries fornecido, como
        impermeável ou resistente à água.
    water_resistance_level:
      name: Nível de resistência à água
      description: Indica se o tecido repele a água e em que nível.
    water_resistance_rating_case_protection_level:
      name: Classificação de resistência à água da caixa
      description: Indica o nível de resistência/proteção contra água fornecido pela
        caixa de transporte (em termos de marketing, não como vedação IP de eletrónica),
        por exemplo, resistente à água vs. impermeável.
    water_rocket_kit_items_included:
      name: Itens incluídos no kit de foguetão aquático
      description: Principais componentes incluídos na embalagem do produto.
    water_rocket_propulsion_type:
      name: Tipo de propulsão do foguetão aquático
      description: Fonte principal de propulsão/energia utilizada para lançar o foguetão.
    water_rocket_recovery_system:
      name: Sistema de recuperação do foguetão aquático
      description: Método utilizado para recuperar o foguetão após o lançamento.
    water_ski_base_design:
      name: Design da base do esqui aquático
      description: Especifica o perfil inferior/casco dos esquis aquáticos, que influencia
        as características de manuseamento.
    water_ski_fin_type:
      name: Tipo de quilha do esqui aquático
      description: Especifica a configuração da quilha do esqui aquático, que afeta
        o alinhamento e a manobrabilidade.
    water_source:
      name: Origem da água
      description: Identifica a origem da água antes da carbonatação.
    water_sports_safety_standard:
      name: Norma de segurança para desportos aquáticos
      description: Lista as normas formais de segurança ou flutuabilidade que o produto
        cumpre, por exemplo, CE EN 1385 para capacetes, ISO 12402-5 para auxiliares
        de flutuação, USCG Type III.
    water_table_feature_set:
      name: Conjunto de funcionalidades da mesa de água
      description: Destaca funcionalidades de brincadeira integradas na mesa de água,
        como cascatas, pulverizadores, bombas ou bacias em vários níveis.
    water_table_items_included:
      name: Itens incluídos na mesa de água
      description: Especifica os acessórios incluídos no conjunto da mesa de água
        (por exemplo, barcos, copos, funis ou figuras).
    water_table_water_source_type:
      name: Tipo de fonte de água da mesa de água
      description: Especifica como a mesa de água é enchida ou abastecida com água.
    waterbed_stabilization_level:
      name: Nível de estabilização do colchão de água
      description: Indica o grau de redução de ondas ou controlo de movimento proporcionado
        pelo colchão de água.
    watercolor_ink_water_resistance_after_drying:
      name: Resistência à água da tinta de aguarela (após secagem)
      description: Indica se a tinta de aguarela se torna resistente à água/impermeável
        após secar (de acordo com a alegação do fabricante).
    watercraft_care_application_area:
      name: Área de aplicação do cuidado para embarcações
      description: Indica a principal área ou componente da embarcação onde o produto
        se destina a ser utilizado.
    watercraft_drive_mechanism:
      name: Mecanismo de propulsão da embarcação
      description: Descreve o mecanismo específico de propulsão a bordo instalado
        ou suportado.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Padrão da unidade emissora do depósito de combustível da embarcação
      description: Especifica o padrão de montagem das unidades emissoras do depósito
        de combustível e dos indicadores compatíveis, por exemplo, padrões comuns
        de furação marítima.
    watercraft_fuel_tank_shape:
      name: Forma do depósito de combustível da embarcação
      description: Descreve o formato físico geral do depósito de combustível, para
        ajudar no planeamento de espaço e encaixe.
    watercraft_hull_material:
      name: Material do casco da embarcação
      description: Especifica o material principal da construção do casco.
    watercraft_ignition_part_voltage:
      name: Tensão da peça de ignição da embarcação
      description: Classificação/requisito de tensão nominal da peça de ignição (quando
        aplicável), por exemplo, sistemas de 12 V.
    watercraft_impeller_material_grade:
      name: Grau do material do impulsor da embarcação
      description: Especifica o material do impulsor da embarcação (por exemplo, borracha
        de neopreno, nitrilo ou bronze).
    watercraft_lighting_certification_compliance:
      name: Certificação/conformidade da iluminação da embarcação
      description: Indica as normas regulamentares com as quais a luz está certificada
        para uso marítimo, por exemplo, conformidade com USCG/ABYC/COLREGs.
    watercraft_motor_mount_adjustment_features:
      name: Funcionalidades de ajuste do suporte do motor da embarcação
      description: Capacidades de ajuste do suporte (por exemplo, inclinação, elevação
        ou deslizamento), que afetam a usabilidade e o encaixe.
    watercraft_piston_part_type:
      name: Tipo de peça do pistão da embarcação
      description: Identifica o componente relacionado com o pistão representado na
        listagem.
    watercraft_propeller_blade_rake:
      name: Inclinação da pá da hélice da embarcação
      description: Especifica a inclinação da pá (o ângulo da pá em relação ao cubo),
        que afeta a elevação da proa e o desempenho.
    watercraft_propeller_rotation_direction:
      name: Sentido de rotação da hélice da embarcação
      description: Indica o sentido de rotação/"mão" da hélice necessário para compatibilidade
        com o sistema de transmissão (por exemplo, direita/padrão vs. esquerda/contrarrotativa).
    watercraft_pump_stage_impeller_role:
      name: Função do impulsor/estágio da bomba da embarcação
      description: Identifica se o impulsor se destina a uma função específica da
        bomba (por exemplo, bomba de água bruta/do mar, circulação de líquido de arrefecimento
        ou bomba de jato).
    watercraft_registration_status:
      name: Estado de registo da embarcação
      description: Indica se o veleiro inclui título de propriedade e/ou documentação
        de registo.
    watercraft_safety_equipment_activation_type:
      name: Tipo de ativação do equipamento de segurança da embarcação
      description: Método principal de ativação do dispositivo de segurança (para
        sinalizadores, alarmes MOB ou PLBs), distinto da insuflação.
    watercraft_steering_cable_core_material:
      name: Material do núcleo do cabo de direção da embarcação
      description: Especifica o material do cabo/núcleo interno que transmite a força.
    watercraft_steering_cable_hardware_included:
      name: Ferragens incluídas no cabo de direção da embarcação
      description: Especifica as ferragens e acessórios de instalação incluídos com
        o cabo de direção.
    watercraft_steering_cable_system_type:
      name: Tipo de sistema do cabo de direção da embarcação
      description: Especifica a arquitetura do sistema de direção para o qual o cabo
        foi concebido (por exemplo, rotativo ou cremalheira).
    watercraft_steering_wheel_hub_bore_type:
      name: Tipo de cubo/furo do volante da embarcação
      description: Especifica o estilo da interface de montagem central/furo (por
        exemplo, cónico ou estriado), onde o volante encaixa no cubo ou adaptador.
    watercress_variety:
      name: Variedade de agrião
      description: Identifica a variedade ou tipo específico de agrião vendido.
    waterproof_level:
      name: Nível de impermeabilidade
      description: Indica o nível de proteção contra água do calçado, incluindo quaisquer
        garantias ou alegações de impermeabilidade.
    wax_blend_composition:
      name: Composição da mistura de cera
      description: Lista os materiais de cera misturados no produto e/ou o tipo de
        mistura comercializado.
    wax_coat_type:
      name: Tipo de camada de cera
      description: Indica se a cera se destina a ser utilizada como camada de base,
        camada superior ou fórmula multiusos/de camada única.
    wax_hardness:
      name: Dureza da cera
      description: Indica a dureza relativa da cera, afetando a durabilidade e o deslize
        em diferentes tipos de neve.
    wax_physical_form:
      name: Forma física da cera
      description: Indica a forma física/formato em que a cera para velas é fornecida.
    wax_recommended_candle_application:
      name: Aplicação recomendada da cera para velas
      description: Indica o(s) estilo(s) principal(is) de vela para os quais a cera
        foi formulada.
    wax_tackiness_level:
      name: Nível de viscosidade da cera
      description: Descreve o nível de aderência/tração que a cera proporciona na
        lâmina.
    weapon_system_integration:
      name: Integração de sistemas de armamento
      description: Indica se o veículo inclui sistemas de armas ou suportes integrados.
    weather_suitability:
      name: Adequação às condições meteorológicas
      description: Indica as condições ambientais para as quais as luvas foram concebidas,
        como tempo frio ou utilização em tempo húmido.
    weave_finish:
      name: Trama/acabamento
      description: Descreve a trama principal do tecido ou o acabamento da superfície
        que afeta a textura e o brilho da gravata.
    weave_style:
      name: Estilo de tecelagem
      description: Especifica o padrão de tecelagem tradicional utilizado no fabrico
        do chapéu Panama, que influencia a respirabilidade, flexibilidade, aparência
        e preço.
    weave_type:
      name: Tipo de trama
      description: Identifica o estilo de trama/construção do tecido (nome comercial
        da trama), que influencia a textura, o brilho e o caimento.
    weaving_beater_edge_type:
      name: Tipo de borda do batedor de tecelagem
      description: Descreve o perfil da borda funcional do batedor plano que entra
        em contacto com a trama (por exemplo, reta ou serrilhada).
    weaving_beater_style:
      name: Estilo do batedor de tecelagem
      description: Identifica o estilo/formato funcional do batedor plano de tecelagem.
    weaving_shuttle_tip_style:
      name: Estilo da ponta da lançadeira de tecelagem
      description: Especifica o design da ponta/frente da lançadeira, que afeta a
        forma como passa pela cala e a probabilidade de prender nos fios da urdidura.
    weaving_shuttle_use_case:
      name: Utilização prevista da lançadeira de tecelagem
      description: Especifica a aplicação de tecelagem para a qual a lançadeira foi
        concebida ou otimizada.
    webbing_construction_type:
      name: Tipo de construção da cinta
      description: Descreve a trama física ou o estilo de trançado da fita, que afeta
        o manuseamento, a resistência e a utilização prevista.
    webbing_design:
      name: Design da fita
      description: Descreve o estilo da fita entre os dedos, que afeta a resistência
        ao treino e a propulsão.
    weight_adjustability:
      name: Capacidade de ajuste do peso
      description: Descreve se a resistência do produto pode ser alterada pelo utilizador
        (por exemplo, com sistema seletorizado ou carregável) ou fixo num único peso.
    weight_integration_system:
      name: Sistema de integração de pesos
      description: Descreve se, e de que forma, os pesos de lastro são integrados
        no colete compensador (por exemplo, bolsos de peso amovíveis, nenhum ou acessório
        opcional).
    weight_plate_compatibility:
      name: Compatibilidade com discos de peso
      description: Define que diâmetro de discos de peso a máquina aceita (olímpico,
        padrão ou ambos).
    weight_plate_style:
      name: Estilo do disco de peso
      description: Classifica o design/tipo do disco de peso (por exemplo, olímpico,
        bumper ou seletorizado), para filtragem rápida de compatibilidade.
    weightlifting_belt_style:
      name: Estilo do cinto de levantamento de peso
      description: Categoriza o design geral ou a configuração do cinto de acordo
        com a sua finalidade (por exemplo, cinto de alavanca, cinto de lastro ou cinto
        afunilado).
    weightlifting_federation_certification:
      name: Certificação por federação de levantamento de peso
      description: Aprovação oficial ou conformidade do produto por federações de
        desportos de força, como IPF ou IWF.
    wetsuit_boot_height:
      name: Altura da bota de fato de neoprene
      description: Classifica a altura/corte da bota na perna, influenciando a cobertura,
        mobilidade e entrada de água.
    wetsuit_entry_system:
      name: Sistema de entrada do fato de neopreno
      description: Descreve o tipo e a localização da abertura/fecho usado para vestir
        o fato de neopreno.
    wetsuit_seam_construction:
      name: Construção das costuras do fato de neopreno
      description: Especifica como as costuras são feitas e seladas, afetando o calor,
        a flexibilidade e a durabilidade.
    wheat_product_form:
      name: Formato do produto de trigo
      description: Especifica a forma física ou processada do produto de trigo.
    wheel_arrangement:
      name: Disposição das rodas
      description: Especifica a disposição das rodas da locomotiva a vapor, notação
        Whyte, que é uma característica definidora e um termo comum de filtragem/pesquisa.
    wheel_brake_type:
      name: Tipo de travão de roda
      description: Detalha a configuração de travagem presente nas rodas ou rodízios
        do carrinho.
    wheel_chock_grip_features:
      name: Características de aderência do calço de roda
      description: Características de design de tração e aderência que melhoram a
        capacidade de fixação em superfícies e contra pneus.
    wheel_cleaner_acidity_ph_category:
      name: Categoria de acidez/pH do limpa-rodas
      description: Indica se o limpa-rodas é ácido, neutro ou alcalino, e opcionalmente
        se é comercializado como pH equilibrado.
    wheel_cleaner_formula_type:
      name: Tipo de fórmula do limpa-rodas
      description: Para limpa-rodas e soluções de lavagem relacionadas, indica a categoria
        principal da fórmula do produto (por exemplo, à base de ácido, não ácido,
        pH neutro/equilibrado ou reativo ao ferro).
    wheel_construction_type:
      name: Tipo de construção da roda
      description: Especifica o método de fabrico/construção da roda.
    wheel_contaminant_target:
      name: Contaminante-alvo da roda
      description: Especifica os principais tipos de contaminação que o produto de
        limpeza foi concebido para remover.
    wheel_core_type:
      name: Tipo de núcleo da roda
      description: Descreve o estilo de construção do núcleo da roda, que influencia
        o peso, a rigidez e a transferência de energia.
    wheel_cylinder_inlet_port_thread_standard:
      name: Norma da rosca da porta de entrada do cilindro de roda
      description: Especifica a norma da rosca da porta de entrada da linha de travão
        no cilindro de roda (por exemplo, flare bolha métrico vs. flare invertido
        SAE).
    wheel_fastener_seat_type:
      name: Tipo de assento do fixador da roda
      description: Especifica o tipo de assento da porca/parafuso da roda que encaixa
        na roda (por exemplo, cónico/afunilado, esférico/raio, plano ou mag/shank).
    wheel_illumination:
      name: Iluminação da roda
      description: Indica se a roda tem iluminação integrada ou funcionalidades de
        brilho.
    wheel_material:
      name: Material da roda
      description: Identifica a composição principal das rodas, que afeta a durabilidade,
        a aderência e o amortecimento de vibrações.
    wheel_profile:
      name: Perfil da roda
      description: Descreve a forma da secção transversal da roda, que afeta a velocidade,
        a aderência e a agilidade.
    wheel_setup_type:
      name: Tipo de configuração da roda
      description: Define o estilo de configuração das rodas utilizado nos patins.
    wheel_system_finish:
      name: Acabamento do sistema da roda
      description: Acabamento/revestimento da superfície das jantes/rodas e de certas
        peças/acessórios da roda.
    whip_style:
      name: Estilo de chicote
      description: Classifica o produto pelo estilo específico de chicote ou crop
        equestre, ou pela disciplina a que se destina.
    whipped_cream_base:
      name: Base do chantilly
      description: Identifica o ingrediente principal utilizado para fazer o chantilly,
        como natas ou coco.
    whipped_cream_form:
      name: Forma do chantilly
      description: Indica o formato físico em que o chantilly é vendido.
    whistle_head_material:
      name: Material da cabeça dã flauta celta
      description: Especifica o material da cabeça/bocal do apito (bloco/cabeça do
        canal de sopro).
    whistle_light_features:
      name: Funcionalidades luminosas do apito
      description: Indica se o apito inclui efeitos de luz integrados para festas
        (por exemplo, LED).
    whistle_purpose:
      name: Finalidade do apito
      description: Identifica a principal aplicação prevista do apito (treino desportivo,
        segurança marítima, treino de cães, etc.).
    whistle_sound_style:
      name: Estilo de som do apito
      description: Descreve o estilo/caráter do som produzido pelo apito (por exemplo,
        tom único ou vários tons).
    white_glue_finish_appearance_when_dry:
      name: Acabamento/aparência da cola branca depois de seca
      description: Especifica o aspeto da cola depois de secar para uso em trabalhos
        manuais/escritório (por exemplo, transparente ou opaca).
    white_glue_washability:
      name: Facilidade de limpeza da cola branca
      description: Indica se a cola seca pode ser removida/lavada de tecidos ou da
        pele.
    whitewater_kayak_style:
      name: Estilo de caiaque de águas bravas
      description: Identifica o objetivo principal de design dentro do segmento de
        águas bravas (por exemplo, creekboat, river runner ou playboat).
    whitewater_rating_class:
      name: Classificação de águas bravas
      description: Classe mais elevada da Escala Internacional de Dificuldade de Rios
        para a qual a embarcação está classificada.
    whorl_mounting_interface:
      name: Interface de montagem do disco de fiar
      description: Indica como o verticilo se fixa à roda giratória (por exemplo,
        pelo tipo de eixo/ligação).
    wick_construction_type:
      name: Tipo de construção do pavio
      description: A construção/estilo do pavio (entrançado, plano, entrançado quadrado,
        com núcleo, de madeira, etc.).
    wick_core_type:
      name: Tipo de núcleo do pavio
      description: Indica se o pavio não tem núcleo ou inclui um material de núcleo
        (por exemplo, núcleo de papel ou de zinco), afetando a rigidez e as características
        de combustão.
    wick_tab_crimp_type:
      name: Tipo de cravação da base do pavio
      description: Indica como a base do pavio fixa o pavio (por exemplo, pelo estilo
        de construção/cravação).
    wick_tab_material:
      name: Material da aba do pavio
      description: Material da base/suporte fixado ao pavio (geralmente folha-de-flandres),
        relevante para resistência à corrosão e preferências regulamentares (por exemplo,
        evitar chumbo).
    wick_tab_shape:
      name: Formato da base do pavio
      description: Forma/formato da placa da base do pavio.
    wick_type_included:
      name: Tipo de pavio incluído
      description: Especifica o material/tipo de pavio incluído no kit.
    wig_fiber_material:
      name: Material da fibra da peruca
      description: Identifica a fibra principal utilizada no cabelo da peruca, para
        que os compradores possam escolher facilmente entre cabelo humano, opções
        sintéticas e outras variantes com diferentes características de modelação
        e durabilidade.
    wildlife_attractant_scent:
      name: Aroma atrativo para animais selvagens
      description: Identifica o aroma principal utilizado para atrair animais selvagens,
        incluindo aromas naturais de alimentos e aromas semelhantes a feromonas.
    willow_grade:
      name: Categoria do salgueiro
      description: Especifica a categoria de qualidade do salgueiro utilizado, indicando
        a estrutura do veio e o nível geral de desempenho
    willow_type:
      name: Tipo de salgueiro
      description: Identifica o tipo de salgueiro ou material alternativo utilizado
        na lâmina do taco, que afeta significativamente o desempenho, a durabilidade
        e o preço.
    wind_up_mechanism_type:
      name: Tipo de mecanismo de corda
      description: Especifica como o brinquedo é carregado ou ativado.
    wind_up_toy_movement_pattern:
      name: Padrão de movimento do brinquedo de corda
      description: Descreve o movimento principal produzido quando o brinquedo é ativado.
    windbreak_purpose:
      name: Finalidade do corta-vento
      description: Define a principal utilização prevista do corta-vento.
    windfoil_board_mounting_system:
      name: Sistema de montagem da prancha de windfoil
      description: Especifica a caixa do foil ou a interface de montagem integrada
        na prancha de windfoil.
    windfoil_sail_style:
      name: Estilo de vela de windfoil
      description: Classifica a vela de acordo com o estilo de navegação ou disciplina
        a que se destina.
    winding_direction:
      name: Direção de enrolamento
      description: Indica o padrão de rotação suportado pelo enrolador de relógios,
        no sentido dos ponteiros do relógio, no sentido contrário ou bidirecional.
    winding_method:
      name: Método de enrolamento
      description: Indica como a trama se destina a ser enrolada/carregada para utilização
        na lançadeira.
    winding_speed_control_type:
      name: Tipo de controlo da velocidade de enrolamento
      description: Indica o método utilizado para controlar a velocidade de enrolamento
        durante a utilização.
    winding_type:
      name: Tipo de enrolamento
      description: Especifica a construção do enrolamento das cordas de baixo (o perfil
        do revestimento exterior).
    windlass_control_station_type:
      name: Tipo de estação de controlo do molinete
      description: Tipo de interface de controlo incluída ou suportada para operar
        o molinete.
    windlass_mount_type:
      name: Tipo de montagem do molinete
      description: Indica onde/como o molinete se destina a ser montado no barco.
    window_component_location:
      name: Localização do componente do vidro
      description: Especifica a janela/abertura do veículo a que a peça se aplica
        (por exemplo, para-brisas, vidro da porta, vidro traseiro ou vidro lateral
        traseiro).
    window_configuration:
      name: Configuração da janela
      description: Indica a presença e o tamanho relativo das janelas transparentes
        de visibilidade na asa de wingfoil.
    window_glass_construction:
      name: Construção do vidro da janela
      description: Especifica a construção de segurança/laminação do vidro da janela.
    window_glass_features:
      name: Funcionalidades do vidro da janela
      description: Indica se o vidro suporta tecnologias integradas do veículo, por
        exemplo, base para sensor de chuva ou suporte de câmara.
    window_glass_finish:
      name: Acabamento do vidro da janela
      description: Especifica o acabamento, tonalidade ou tratamento de privacidade
        do vidro da janela.
    window_glass_tint_color:
      name: Cor do vidro da janela
      description: Especifica a cor/matiz da tonalidade presente no vidro (não a cor
        geral do produto).
    window_glass_tint_level:
      name: Nível do vidro da janela
      description: Indica o nível aproximado de escurecimento de fábrica/privacidade
        do vidro (não da película aplicada posteriormente.) Utilize níveis descritivos
        quando o VLT exato não é conhecido.
    window_net_latch_mechanism:
      name: Mecanismo de fecho da rede de janela
      description: Especifica o mecanismo de fecho/libertação utilizado na rede de
        janela (por exemplo, botão de pressão, alavanca ou fecho tipo cinto de segurança).
    window_net_mounting_hardware:
      name: Hardware de montagem da rede de janela
      description: Identifica o tipo de ferragens de montagem ou método de fixação
        usado para instalar a rede de janela (por exemplo, clip de fixação, parafusos,
        estilo gancho/haste, ou se as ferragens estão incluídas).
    window_net_opening_direction:
      name: Direção de abertura da rede de janela
      description: Especifica como a rede de janela abre/liberta em relação ao ocupante,
        para cumprir requisitos de saída e regulamentos.
    window_regulator_operation:
      name: Funcionamento do regulador de vidro
      description: Especifica como o regulador do vidro é acionado (por manivela manual
        ou sistema elétrico).
    windshield_coverage_area:
      name: Área de cobertura do protetor de para-brisas
      description: Especifica que partes da frente exterior do veículo o protetor
        de para-brisas foi concebido para proteger (por exemplo, apenas o para-brisas
        ou incluindo escovas, espelhos, vidros laterais ou extremidade do capô).
    windshield_mount_attachment_method:
      name: Método de fixação do suporte no para-brisas
      description: Especifica como o suporte adere ou se prende à superfície do para-brisas.
    windshield_washer_fluid_seasonality:
      name: Sazonalidade do líquido limpa-para-brisas
      description: Indica a estação/clima ou utilização principal da fórmula do líquido
        limpa-para-brisas (por exemplo, descongelante de inverno, removedor de insetos
        de verão ou todas as estações).
    windsurf_fin_style:
      name: Estilo da quilha de windsurf
      description: Classifica a quilha de acordo com a disciplina de navegação ou
        estilo de utilização previsto (por exemplo, wave, slalom ou anti-algas).
    windsurfing_connection_standard:
      name: Norma de ligação de windsurf
      description: Interface mecânica ou tipo de caixa utilizado para fixar a peça
        à prancha ou ao conjunto de vela/mastro.
    windsurfing_sail_style:
      name: Estilo de vela de windsurf
      description: Classifica a vela de acordo com a disciplina ou utilização prevista,
        como wave, freeride ou foil.
    wine_additive_type:
      name: Tipo de aditivo para vinho
      description: Especifica o tipo de produto para produção de vinho tinto (ingrediente,
        aditivo, levedura, agente clarificante ou kit).
    wine_body:
      name: Corpo de vinho
      description: Descreve o peso e a sensação de boca percebidos no vinho.
    wine_carbonation:
      name: Carbonatação do vinho
      description: Indica se o vinho é tranquilo, semi-espumante ou espumante e, quando
        relevante, a intensidade da efervescência.
    wine_making_ingredient_type:
      name: Tipo de ingrediente para vinificação
      description: Especifica a categoria funcional do ingrediente para aditivos e
        ingredientes consumíveis usados na vinificação.
    wine_making_stage:
      name: Fase de vinificação
      description: Identifica a etapa do processo de vinificação a que o produto se
        destina.
    wine_style:
      name: Estilo de vinho
      description: Classifica o estilo geral de produção do vinho para além da cor,
        como tranquilo, espumante ou fortificado.
    winemaking_process_stage:
      name: Etapa do processo de vinificação
      description: Indica a fase principal do processo de vinificação a que o produto
        se destina.
    wing_count:
      name: Número de asas
      description: Número de asas/braços no bumerangue.
    wing_handle_type:
      name: Tipo de pega da asa
      description: Especifica o estilo do sistema de pega na asa de wingfoil.
    wing_part_type:
      name: Tipo de peça da asa
      description: Identifica o componente específico ou peça de substituição para
        uma asa de wingfoil.
    wingfoiling_style:
      name: Estilo de wingfoil
      description: Indica a disciplina específica de wingfoiling ou estilo de navegação
        a que o produto se destina.
    wiper_arm_finish:
      name: Acabamento do braço da escova limpa-vidros
      description: Acabamento da superfície ou revestimento protetor aplicado ao braço
        da escova, afetando a resistência à corrosão e a aparência.
    wiper_arm_pivot_mount_type:
      name: Tipo de montagem do pivô do braço da escova limpa-vidros
      description: Especifica como o braço da escova monta na ligação ou pivô do limpa-vidros
        do veículo.
    wiper_blade_attachment_type:
      name: Tipo de fixação da escova limpa-vidros
      description: Especifica o tipo de conector/fixação utilizado para montar a escova
        no braço do limpa-vidros.
    wiper_blade_rubber_material:
      name: Material da borracha da escova limpa-vidros
      description: Material do elemento de limpeza, inserto/recarga, que entra em
        contacto com o vidro.
    wiper_system_position:
      name: Posição do sistema limpa-vidros
      description: Indica a posição de montagem no veículo para o sistema limpa-vidros.
    wire_coating_material:
      name: Material de revestimento do fio
      description: Especifica o material do revestimento exterior aplicado ao fio,
        não o material do núcleo, que pode afetar a resistência à abrasão e a suavidade
        com que passa pelos furos das missangas.
    wire_coating_type:
      name: Tipo de revestimento do fio
      description: Especifica se, e de que forma, o fio é revestido/coberto (para
        cor, proteção e textura).
    wire_construction_type:
      name: Tipo de construção do fio
      description: Especifica a construção física do fio para enfiamento de missangas,
        por exemplo, multifilar vs. sólido, e se é revestido.
    wire_finish:
      name: Acabamento do fio
      description: Especifica o acabamento de superfície, revestimento ou banho aplicado
        ao fio (por exemplo, polido, esmaltado, galvanizado ou banhado), que afeta
        a aparência e a resistência ao escurecimento/corrosão.
    wire_gauge_awg:
      name: Calibre do fio (AWG)
      description: Tamanho American Wire Gauge (AWG) dos condutores utilizados no
        chicote elétrico.
    wire_insulation_material:
      name: Material de isolamento do fio
      description: Material do isolamento ou capa do fio utilizado no chicote (que
        afeta a resistência à temperatura e a produtos químicos).
    wire_packaging_type:
      name: Tipo de embalagem do fio
      description: Especifica a forma como o fio é vendido/embalado.
    wire_shape_profile:
      name: Formato/perfil do fio
      description: Descreve a forma da secção transversal do fio.
    wiring_configuration:
      name: Configuração da cablagem
      description: Indica se a espada de esgrima é fornecida pré-cablada para pontuação
        elétrica, sem cablagem, sem fios ou destinada a prática não elétrica.
    wobbler_style:
      name: Estilo do wobbler
      description: Define o design específico ou estilo de ação do wobbler, como crankbait
        ou jerkbait.
    wood_block_surface_preparation:
      name: Preparação da superfície do bloco de madeira
      description: Indica o estado da superfície pronta a utilizar do bloco de madeira
        para acabamento e trabalhos manuais.
    wood_grain_direction:
      name: Direção do veio da madeira
      description: Direção do veio da madeira em relação à dimensão mais longa do
        produto (importante para a resistência, comportamento de corte e aparência).
    wood_slice_edge_style:
      name: Estilo da borda da rodela de madeira
      description: Condição da borda da rodela, como borda com casca natural ou borda
        lisa/lixada.
    wooden_block_special_features:
      name: Características especiais do bloco de madeira
      description: Características funcionais relevantes incluídas no conjunto de
        blocos de madeira.
    woodwind_body_construction:
      name: Construção do corpo do instrumento de sopro de madeira
      description: Indica se o instrumento é feito numa só peça ou em várias secções
        (por exemplo, 2 ou 3 peças), afetando a limpeza, arrumação e portabilidade.
    woodwind_polishing_cloth_intended_use:
      name: Utilização prevista do pano de polimento para sopros de madeira
      description: Especifica aquilo que o pano foi principalmente concebido para
        limpar/polir num instrumento de sopro de madeira.
    woodwind_small_part_type:
      name: Tipo de peça pequena para sopros de madeira
      description: Especifica o tipo de pequena peça de substituição para clarinete
        (por exemplo, mecanismo das chaves, sapatilhas/cortiças/feltros ou anéis).
    woofer_mounting_type:
      name: Tipo de montagem do woofer
      description: Indica como o woofer se destina a ser montado/utilizado (por exemplo,
        em ar livre ou em caixa), e formatos comuns de montagem automóvel.
    woofer_surround_material:
      name: Material da suspensão exterior do woofer
      description: Material usado na suspensão exterior do woofer (anel de suspensão
        exterior).
    worn_on_finger:
      name: Dedo de utilização
      description: Especifica em que dedo o guia de dedal se destina a ser utilizado.
    wrap_style:
      name: Estilo de envolvimento
      description: Indica quantas vezes o cinto foi concebido para envolver a cintura.
    wrapping_occasion:
      name: Ocasião do papel de embrulho
      description: Ocasião principal de oferta/celebração a que o papel de embrulho
        se destina.
    wrapping_paper_features:
      name: Características do papel de embrulho
      description: Propriedades funcionais e relacionadas com sustentabilidade do
        papel de embrulho, como resistência ao rasgo, conteúdo reciclado ou formatos
        em folhas pré-cortadas.
    wrestling_dummy_design:
      name: Design do boneco de wrestling
      description: Formato geral do corpo ou postura do boneco, como forma humana
        em pé ou saco de arremesso, que determina os exercícios de treino aplicáveis.
    wrestling_mat_safety_certifications:
      name: Certificações de segurança do tapete de wrestling
      description: Lista certificações ou normas de segurança da indústria ou de entidades
        desportivas que o tapete cumpre.
    wrist_strap_style:
      name: Tipo de tira para o pulso
      description: Descreve o estilo da correia de pulso (ou a ausência dela), que
        afeta o suporte e o ajuste.
    wrist_support_style:
      name: Estilo de suporte de pulso
      description: Identifica a construção ou o estilo do suporte de pulso, como ortótese,
        luva, tape ou faixa de pulso, para ajudar o utilizador a escolher consoante
        a sua preferência e desempenho.
    xylophone_range_octaves:
      name: Alcance do xilofone (oitavas)
      description: A extensão total do xilofone expressa em oitavas (por exemplo,
        2,5 oitavas, 3 oitavas ou 4 oitavas).
    xylophone_resonator_type:
      name: Tipo de ressonador do xilofone
      description: Tipo de sistema de ressonância utilizado para amplificar o som,
        se aplicável.
    yam_variety:
      name: Variedade de inhame
      description: Especifica a cultivar ou variedade comum de inhame vendido, por
        exemplo, roxo, amarelo ou inhame-pé-de-elefante.
    yarn_cutter_physical_style:
      name: Estilo físico do cortador de fios
      description: Identifica o estilo físico do cortador de fios (por exemplo, pendente,
        anel ou tesoura pequena), para ajudar na navegação e filtragem dentro da categoria.
    yarn_finish_or_effect:
      name: Acabamento ou efeito do fio
      description: Destaca tratamentos visuais ou funcionais especiais aplicados ao
        fio, como fluorescência ou brilho metálico.
    yarn_guide_style:
      name: Estilo da guia de fio
      description: O estilo físico do componente que guia o fio.
    yarn_swift_adjustability:
      name: Ajustabilidade da dobadoura
      description: Indica se, e de que forma, a dobadoura pode ser ajustada (expansível
        ou desmontável/dobrável), afetando a arrumação e o intervalo de tamanhos de
        meadas que consegue suportar.
    yarn_swift_bearing_type:
      name: Tipo de rolamento da dobadoura
      description: Descreve o mecanismo de apoio à rotação (por exemplo, rolamento
        de esferas), que afeta a suavidade e a velocidade de enrolamento.
    yeast_application:
      name: Aplicação de fermento
      description: Indica a principal utilização culinária ou de fermentação prevista
        para o produto de levedura.
    yo_yo_accessory_part_type:
      name: Tipo de acessório/peça de ioiô
      description: Identifica o tipo de peça de substituição ou acessório de ioiô
        (por exemplo, corda, rolamento ou almofadas de resposta).
    yo_yo_axle_system_type:
      name: Tipo de sistema de eixo do ioiô
      description: Abordagem de construção do eixo do ioiô (por exemplo, eixo fixo
        ou transaxle), afetando a sensação de jogo e a manutenção.
    yo_yo_bearing_size_class:
      name: Classe de tamanho do rolamento do ioiô
      description: Classe de tamanho de rolamento normalizada utilizada pelo ioiô,
        quando aplicável.
    yo_yo_bearing_type:
      name: Tipo de rolamento do ioiô
      description: Configuração do rolamento que influencia a resposta e as características
        de rotação.
    yo_yo_play_style:
      name: Estilo de jogo do ioiô
      description: Estilo principal de jogo previsto para o ioiô, refletindo a disciplina
        de corda/truques para a qual o produto foi concebido.
    yo_yo_response_system:
      name: Sistema de resposta do ioiô
      description: Especifica o mecanismo de resposta do ioiô para o qual esta peça
        foi concebida, para efeitos de compatibilidade.
    yo_yo_responsiveness:
      name: Resposta do ioiô
      description: Indica se o ioiô regressa à mão com um puxão, responsivo, ou se
        requer um bind, não responsivo.
    yo_yo_string_material:
      name: Material da corda do ioiô
      description: Composição do material da corda do ioiô.
    yogurt_base_ingredient:
      name: Ingrediente base do iogurte
      description: Identifica a principal fonte láctea ou vegetal usada para fazer
        o iogurte, importante para preferências alimentares e alergénios.
    yoke_type:
      name: Tipo de berço/suporte
      description: Identifica o estilo de berço ou suporte que apoia a arma de fogo
        no monopé.
    zill_playing_style:
      name: Estilo de toque do zill
      description: Contexto ou estilo musical previsto (normalmente dança do ventre
        vs. orquestral/cultural).
    zill_strap_material:
      name: Material da alça do zill
      description: Material da correia/elástico de dedo utilizado para segurar os
        pratos de dedo (se incluído), afetando o conforto, a durabilidade e a aderência.
    zills_strap_adjustability:
      name: Ajustabilidade da correia dos pratos de dedo
      description: Indica se, e de que forma, a correia/elástico incluído pode ser
        ajustado para melhor encaixe.
    zipper_application:
      name: Aplicação do fecho de correr
      description: Especifica o projeto ou aplicação para que o fecho de correr foi
        concebido.
    zipper_chain_type:
      name: Tipo de corrente do fecho de correr
      description: Especifica a construção/tipo da corrente/dentes do fecho de correr.
    zipper_end_type:
      name: Tipo de extremidade do fecho de correr
      description: Indica como o fecho de correr termina e se separa, aberto/separável
        ou fechado/não separável, incluindo ferragens comuns de extremidade separável
        utilizadas em fechos para trabalhos manuais.
    zipper_gauge:
      name: Calibre do fecho de correr
      description: 'Indica a designação do tamanho/calibre da corrente do fecho normalmente
        expressa como número com # (por exemplo, #3 ou #5), correspondente à largura
        dos dentes/espiral e à utilização prevista.'
    zipper_opening_length:
      name: Comprimento de abertura do fecho de correr
      description: Define que parte da abertura frontal tem fecho, distinguindo estilos
        de fecho completo, meio fecho ou um quarto de fecho.
    zipper_pull_material:
      name: Material do puxador do fecho de correr
      description: Especifica o material do puxador ou patilha do fecho (a parte que
        se agarra), distinto dos dentes/corrente e da fita do fecho.
    zipper_pull_side:
      name: Lado do cursor do fecho
      description: Especifica de que lado(s) a patilha do puxador é acessível.
    zipper_pull_strap_cord_tab_material:
      name: Material da fita/cordão/patilha do puxador do fecho de correr
      description: Material da fita/cordão(patilha/pendente preso ao puxador do fecho
        (se existir), excluindo o corpo/hardware principais do puxador.
    zipper_reversibility_mechanism:
      name: Mecanismo de reversibilidade do fecho de correr
      description: Especifica como o fecho de correr é reversível (por exemplo, cursor
        de dupla face vs. cursor basculante/auto-bloqueio para peças reversíveis).
    zipper_separating_type:
      name: Tipo de separação do fecho de correr
      description: Indica se o fecho se separa em baixo/no topo ou se é fechado, para
        ajuste a casacos, sacos-cama, malas, etc.
    zipper_side:
      name: Lado do fecho de correr
      description: Especifica em que lado se encontra o fecho principal quando o saco-cama
        está estendido com a face virada para cima.
    zipper_slider_material:
      name: Material do cursor do fecho
      description: Especifica o material do cursor (mecanismo móvel do fecho), que
        pode influenciar a resistência e a resistência à corrosão.
    zipper_slider_pull_configuration:
      name: Configuração do cursor/puxador do fecho
      description: Indica se o fecho tem um ou dois cursores/puxadores e se estes
        estão presentes num ou em ambos os lados do cursor.
    zipper_style:
      name: Estilo do fecho de correr
      description: Indica o comprimento do fecho ou a sua presença na peça (por exemplo,
        sem fecho, 1/4 de fecho, meio fecho, fecho completo).
    zipper_tape_material:
      name: Material da fita do fecho de correr
      description: Especifica o material da fita têxtil do fecho (partes laterais
        costuradas no produto).
    zipper_teeth_type:
      name: Tipo de dentes do fecho de correr
      description: Especifica o tipo de construção dos dentes/corrente do fecho (por
        exemplo, espiral, plástico moldado, metal ou invisível), influenciando flexibilidade,
        resistência e aplicação típica.
