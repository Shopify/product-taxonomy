    paddleboard_features:
      name: Características do paddle
      description: Descreve as características específicas de uma prancha de stand
        up paddle, como insuflável ou com topo rígido
    page_layout:
      name: Esquema de página
      description: Define o layout das páginas, normalmente em catálogos de endereços;
        por exemplo, em branco, com guias
    page_size:
      name: Tamanho da página
      description: Determina as dimensões de um produto, como 11" x 17" ou A4
    pager_application:
      name: Aplicação do pager
      description: Identifica a principal utilização ou ambiente a que o pager se
        destina
    pain_reduction_technology:
      name: Tecnologia de redução de dor
      description: Identifica quaisquer recursos orientados para conforto que reduzem
        o desconforto durante a depilação (p. ex., resfriamento, rolos de massagem)
    paint/dye_form:
      name: Forma de tinta/tintura
      description: Descreve a consistência ou tipo de tinta ou tintura, como gel ou
        spray
    paint_brush_design:
      name: Design de pincel/trincha de pintura
      description: Descreve a forma ou estilo de um pincel, como redondo ou plano
    paint_finish:
      name: Acabamento para pintura
      description: Indica o tipo de acabamento da pintura, normalmente para veículos;
        por exemplo, metálico, brilhante
    paint_form:
      name: Forma de pintura
      description: Identifica a forma da tinta artesanal, por exemplo, gel ou pó
    paint_medium_type:
      name: Tipo de produto de pintura
      description: Especifica o tipo de tinta em produtos artesanais, como verniz
        ou aguarela
    paint_type:
      name: Tipo de tinta para pintura
      description: Especifica a variedade de tintas em artigos de artes e ofícios,
        como esmalte ou aguarela
    paintball/airsoft_equipment_included:
      name: Equipamento de paintball/airsoft incluído
      description: Especifica o equipamento de paintball ou airsoft incluído, como
        óculos de proteção ou colete tático
    paintball_equipment_included:
      name: Equipamento de paintball incluído
      description: Especifica os artigos adicionais incluídos num produto de paintball,
        como baterias ou carregador
    painting_canvas_material:
      name: Material de lona para pintar
      description: Identifica o tipo de tecido usado na confeção da tela, como algodão
        ou linho
    painting_medium:
      name: Técnica de pintura
      description: Indica o material principal a técnica utilizada numa pintura, p.ex.,
        acrílico, óleo
    pairing_method:
      name: Método de emparelhamento
      description: 'Define como o produto se conecta ou se conecta a outros dispositivos,
        por exemplo, Bluetooth, Wi-Fi '
    palette_design:
      name: Design de paleta
      description: Descreve o layout ou estilo da paleta de um artista, como dobrável
        ou com abertura para polegar
    palette_knife_shape:
      name: Formato de faca de paleta
      description: Descreve o formato de uma espátula usada em artes e ofícios, como
        reta ou redonda
    panel_specification:
      name: Especificação do painel
      description: Define o tipo de painel de ligação para gestão de cabos, como fibra
        ótica ou Cat6
    panel_termination:
      name: Acabamento do painel
      description: Define o método de terminação para os painéis de ligação, por exemplo,
        RJ-45 ou 110 punch down
    panel_transparency:
      name: Transparência dos painéis
      description: Descreve se a tenda inclui painéis ou janelas transparentes no
        teto ou nas laterais para permitir a entrada de luz durante o bronzeamento
    pants_length_type:
      name: Tipo de comprimento das calças
      description: Utilizado para definir o comprimento da calça, como cropped ou
        longa
    panty_liner_style:
      name: Estilo do protetor diário
      description: Define a forma ou estilo do protetor diário (p. ex., fio dental,
        curvo, longo)
    pantyhose_style:
      name: Tipo de meia-calça
      description: Descreve o design ou funcionalidade da meia-calça, por exemplo,
        sem pés, maternidade
    paper_finish:
      name: Acabamento de papel
      description: Descreve a textura ou o brilho dos produtos de papel, como acetinado
        ou mate
    paper_format:
      name: Formato do papel
      description: Identifica o tipo de formato de papel para artes e ofícios, como
        blocos ou folhas soltas
    paper_size:
      name: Tamanho do papel
      description: Especifica as dimensões de um produto de papel, como A4 ou carta
    paper_texture:
      name: Textura do papel
      description: Descreve a sensação e o acabamento do papel artístico, como liso
        ou áspero
    paper_type:
      name: Tipo de papel
      description: Especifica o estilo do material de escritório em papel, como grelha
        ou flipchart
    paperweight_design:
      name: Design de peso de papel
      description: Descreve a estética ou estilo de um peso de papel, como decorativo
        ou simples
    papier_mache_shape:
      name: Forma de papel maché
      description: Especifica o design de produtos de papel machê, como caixa ou estatueta
    parachuting_activity:
      name: Atividade de paraquedismo
      description: Define a disciplina de paraquedismo para a qual o produto foi projetado,
        como paraquedismo ou parapente
    parallel_processing_technology_support:
      name: Assistência à tecnologia de processamento paralelo
      description: Especifica as capacidades de processamento paralelo das placas-mãe,
        por exemplo, multi-GPU, multi-core
    parking_camera_features:
      name: Características da câmara de estacionamento
      description: Descreve as características da câmara de estacionamento de um veículo,
