---
pt-PT:
  attributes:
    3d_glasses_fit_design:
      name: Design de ajuste dos óculos 3D
      description: Indica como os óculos são usados ou fixados (p. ex., clip-on, envolvente,
        sobreposição)
    3d_glasses_material:
      name: Material de óculos 3D
      description: Especifica o material usado para óculos 3D, como bambu ou aço inoxidável
    3d_glasses_technology:
      name: Tecnologia de óculos 3D
      description: Especifica a tecnologia de imagem/sincronização 3D para a qual
        os óculos são projetados, determinando a compatibilidade com ecrãs ou projetores
        específicos
    3d_printer_case_style:
      name: Estilo de caixa para impressora 3D
      description: Classifica o tipo geral de produto para que os compradores possam
        distinguir entre bolsas de transporte macias, estojos rígidos, gabinetes estacionários
        e capas simples contra poeira
    3d_printer_cleaning_kit_components_included:
      name: Componentes incluídos no kit de limpeza para impressora 3D
      description: Lista as ferramentas individuais e consumíveis fornecidos no kit
        para que os compradores saibam exatamente o que estão a comprar
    3d_printing_resin_type:
      name: Tipo de resina para impressão 3D
      description: Especifica a formulação ou aplicação pretendida da resina, ajudando
        os compradores a identificar rapidamente se a resina é padrão, de grau de
        engenharia, fundível ou outros tipos especializados
    80_plus_efficiency_rating:
      name: Classificação de eficiência 80 Plus
      description: Indica o nível oficial de certificação de eficiência energética
        80 Plus que a PSU alcançou
    abrasive_material:
      name: Material abrasivo
      description: Identifica o tipo de abrasivo usado em ferramentas de lixamento,
        como diamante ou carboneto de silício
    absinthe_style:
      name: Estilo de absinto
      description: Define o estilo do absinto, por exemplo, misto, destilado
    absinthe_variety:
      name: Variedade de absinto
      description: Diferencia produtos de absinto pelas suas variedades únicas, por
        exemplo, rouge, verte
    absorbency_level:
      name: Nível de absorção
      description: Define a capacidade de absorção, normalmente para itens de higiene
        pessoal; por exemplo, durante a noite, leve
    absorbent_hygiene_product_features:
      name: Características do produto de higiene absorvente
      description: Identifica as características especiais dos produtos de higiene,
        como à prova de fugas ou hipoalergénicos
    academic_level:
      name: Nível académico
      description: Especifica o nível académico do conteúdo multimédia, como graduação
        ou doutoramento
    accessibility_design_features:
      name: Caraterísticas de design de acessibilidade
      description: Lista elementos de design especiais que auxiliam os utilizadores
        com dificuldades auditivas, visuais ou de destreza
    accessory_material:
      name: Material dos acessórios
      description: Especifica o tipo de material nos acessórios, normalmente para
        materiais de envio, ou seja, plástico, cartão
    accessory_size:
      name: Tamanho dos acessórios
      description: Define o tamanho de um produto acessório, como tamanho único ou
        compacto
    accordion_tuning:
      name: Afinação de acordeão
      description: Especifica o tipo de afinação utilizado num acordeão, como a afinação
        seca ou a afinação de concerto
    activation_mechanism:
      name: Mecanismo de ativação
      description: Especifica o método principal que ativa o alarme
    activation_method:
      name: Método de ativação
      description: Descreve como o crédito pré-pago ou SIM é ativado pelo utilizador
    active_ingredient:
      name: Ingrediente ativo
      description: Identifica substâncias primárias em artigos de higiene pessoal,
        por exemplo, vitamina A, retinol
    activewear_clothing_features:
      name: Características de roupas desportivas
      description: Identifica características únicas de roupas desportivas, como elasticidade
        em quatro direções ou design respirável
    activity:
      name: Atividade
      description: Especifica o desporto ou a atividade para o qual o produto foi
        projetado, como ténis ou pilates
    activity_tracker_design:
      name: Design do monitor de atividade
      description: Especifica como o monitor de atividade é usado, por exemplo, clipe,
        braçadeira
    acupuncture_model_format:
      name: Formato de modelo de acupuntura
      description: Define o tamanho e a escala dos modelos de acupuntura, por exemplo,
        tamanho real, miniatura
    acupuncture_model_type:
      name: Tipo de modelo de acupuntura
      description: 'Especifica a parte do corpo ou espécie que o modelo de acupuntura
        representa, por exemplo, cabeça, mão, animal '
    adapter_directionality:
      name: Direcionalidade do adaptador
      description: Indica se o adaptador suporta fluxo de sinal em ambas as direções
        ou apenas na direção especificada
    adapter_operating_modes:
      name: Modos de operação do adaptador
      description: Especifica se o adaptador funciona como recetor Bluetooth, transmissor
        ou ambos
    adaptive_sync_technology:
      name: Tecnologia de sincronização adaptativa
      description: Especifica a tecnologia de taxa de atualização variável (VRR) suportada
        pelo monitor para evitar screen tearing
    adc_resolution:
      name: Resolução ADC
      description: Especifica a resolução (em bits) do conversor analógico-digital
        integrado, definindo a precisão da medição
    additional_animation_software_features:
      name: Características adicionais de software de animação
      description: Especifica os recursos exclusivos em software de edição de animação,
        como animação de personagens ou efeitos visuais
    additional_cleaning_technology:
      name: Tecnologia de limpeza adicional
      description: Lista quaisquer tecnologias de limpeza incluídas além do vapor
        (p. ex., ultrassónica, UV, ozono)
    additional_design_software_type:
      name: Tipo de software de design adicional
      description: Especifica os recursos adicionais de software de design, como tour
        virtual ou projeto paisagístico
    additional_financial_software_features:
      name: Características adicionais de software financeiro
      description: Identifica as capacidades adicionais do software financeiro, como
        a gestão de ativos ou a auditoria e conformidade
    additional_graphic_software_features:
      name: Características adicionais de software gráfico
      description: Destaca os recursos adicionais de software gráfico, como ilustração
        digital ou design de layout
    additional_publishing_software_features:
      name: Características adicionais de software de edição
      description: Destaca as funcionalidades adicionais do software de edição, como
        a conceção da impressão ou a edição digital
    additional_security_software_features:
      name: Características adicionais de software de segurança
      description: Identifica os recursos adicionais de software de segurança, por
        exemplo, encriptação de discos, deteção de intrusões
    adhesive_application_type:
      name: Tipo de aplicação do adesivo
      description: Define o serviço de pestanas pretendido ou a utilização pretendida
        para o adesivo
    adhesive_features:
      name: Características adesivas
      description: Destaca propriedades especiais do adesivo utilizado em patches
        ou fitas
    adhesive_format:
      name: Formato do adesivo
      description: Indica a forma física em que o adesivo é fornecido para retoques
    adhesive_strength:
      name: Aderência da tira nasal
      description: Especifica o nível de aderência ou fixação da fita nasal (p. ex.,
        original, extra forte)
    adhesive_type:
      name: Tipo de adesivo
      description: Identifica o tipo de adesivo utilizado num produto, como removível
        ou permanente
    aftershave_product_form:
      name: Formulário de produto aftershave
      description: Identifica a consistência de um produto aftershave, como bálsamo
        ou creme
    age_group:
      name: Grupo etário
      description: Define a faixa etária a que se destina um produto, como adultos
        ou crianças
    age_restrictions:
      name: Restrições de idade
      description: Indica o requisito de idade mínima para um produto ou evento, como
        18 anos ou mais
    ai_application:
      name: Aplicação de IA
      description: Especifica a função da IA em software, como análise preditiva ou
        reconhecimento da fala
    air_freshener_form:
      name: Forma de ambientador
      description: Define o tipo de ambientadores para carro, por exemplo, óleo, clipe
        de ventilação
    air_fryer_functions:
      name: Funções da Air fryer
      description: Apresenta os vários modos de cozedura disponíveis numa Air fryer
        ou aparelho semelhante, por exemplo, fritar ou assar
    air_mattress_features:
      name: Características de colchão de ar
      description: Descreve as características únicas de um colchão de ar, como fácil
        de insuflar ou resistente a perfurações
    air_tube_configuration:
      name: Configuração do tubo de ar
      description: Indica o número ou estilo de tubos de inflação de ar integrados
        com o manguito
    airbrush_feed_type:
      name: Tipo de alimentação do aerógrafo
      description: Identifica o método de distribuição de tinta em aerógrafos, como
        gravidade ou sifão
    airbrush_operation_method:
      name: Método de funcionamento do aerógrafo
      description: Especifica o estilo de funcionamento dos aerógrafos, por exemplo,
        ação dupla ou ação única
    aircraft_engine_configuration:
      name: Configuração dos motores da aeronave
      description: Especifica o número de motores envolvidos na propulsão da aeronave,
        como monomotor ou bimotor
    aircraft_engine_type:
      name: Tipo de motor da aeronave
      description: Especifica o tipo de motor da aeronave, como jato ou turboélice
    airflow_opening_design:
      name: Design da abertura de fluxo de ar
      description: Descreve a configuração de respiração ou ventilação incorporada
        ao protetor bucal
    airsoft_equipment_included:
      name: Equipamento de airsoft incluído
      description: Especifica equipamento extra fornecido com produtos de airsoft,
        como óculos de proteção ou colete tático
    album_type:
      name: Tipo de álbum
      description: Descreve o estilo de encadernação dos kits de álbuns de recortes
        ou de carimbos, por exemplo, encadernação em espiral, álbum de recortes
    alcohol/solvent_content:
      name: Teor de álcool/solvente
      description: Classifica o produto com base no teor de álcool ou solvente para
        fins de transporte e regulamentação (por exemplo, álcool ≤24%, álcool >24%,
        solvente em recipiente pequeno)
    alcohol_content:
      name: Teor de álcool
      description: Indica se o tónico não contém álcool ou, se presente, aproximadamente
        quanto álcool a fórmula contém
    alert_type:
      name: Tipo de alerta
      description: Especifica o tipo de alerta que um produto fornece, como alarmes
        sonoros ou notificações de smartphone
    allergen_information:
      name: Informações sobre alergénios
      description: Indica possíveis alérgenos presentes em alimentos ou bebidas, como
        trigo ou amendoim
    allergen_test_type:
      name: Tipo de teste de alergénios
      description: Especifica o tipo de alérgeno que o kit de teste foi projetado
        para detetar, como alimentos ou ambientais
    allergens:
      name: Alergénios
      description: Indica possíveis alérgenos em produtos de saúde e beleza, por exemplo,
        linalol ou limoneno
    allergy_friendly_features:
      name: Características antialérgicas
      description: Identifica se um produto possui propriedades anti-alérgicas, como
        livre de látex ou resistente a mofo
    amino_acid_subtype:
      name: Subtipo de aminoácido
      description: Especifica o tipo ou perfil primário de aminoácidos do suplemento
    amplifier/booster_suitable_location:
      name: Localização adequada do amplificador/booster
      description: Especifica os melhores locais para amplificador ou repetidor de
        sinal, como veículos ou locais de grandes dimensões
    amplifier_class:
      name: Classe de amplificador
      description: Define o tipo de amplificador, como AB ou D
    amplifier_configuration:
      name: Configuração de amplificador
      description: Especifica a configuração de amplificadores de veículos motorizados,
        como amplificadores de dois ou quatro canais
    amputation_level:
      name: Nível de amputação
      description: Indica o nível de amputação para o qual o encolhedor é projetado
    analyte_measured:
      name: Analito medido
      description: Identifica o(s) biomarcador(es) para os quais a solução de controlo
        fornece calibração
    anamorphic_squeeze_ratio:
      name: Relação de compressão anamórfica
      description: Indica o fator de compressão horizontal de uma lente anamórfica,
        permitindo aos utilizadores combinar as lentes com a saída de compressão pretendida
    anatomical_detail_displayed:
      name: Detalhe anatómico exibido
      description: Indica quais características anatómicas ou meridianas são destacadas
        no modelo
    anchor_type:
      name: Tipo de âncora
      description: Define a âncora usada em equipamentos rebocados de desportos aquáticos,
        como cana ou arado
    anemometer_application:
      name: Aplicação de anemómetro
      description: Identifica o uso pretendido de um anemómetro, como industrial ou
        meteorológico
    angles_supported:
      name: Ângulos suportados
      description: Especifica a faixa de ângulos que um produto pode acomodar, normalmente
        para produtos eletrónicos; por exemplo, ajustável, 0° a 180°
    angling_style:
      name: Estilo de pesca com anzol
      description: Define a técnica de pesca para a qual o produto foi projetado,
        como surfcasting ou pesca com mosca
    animal_feed_form:
      name: Forma de alimentação animal
      description: Especifica a forma de ração animal, como líquida ou granulada
    animal_type:
      name: Tipo de animal
      description: Especifica o tipo de animal ao qual um produto se destina, como
        patos, veados ou cães
    answering_machine_type:
      name: Tipo de atendedor de chamadas
      description: Especifica a presença e tecnologia de um atendedor de chamadas
        integrado
    antenna_connector_type:
      name: Tipo de conector de antena
      description: Especifica o conector RF usado para fixar antenas externas
    antenna_rf_connector_type:
      name: Tipo de conector RF da antena
      description: Identifica o conector RF usado pela antena
    antenna_type:
      name: Tipo de antena
      description: Especifica o tipo de antena para dispositivos eletrónicos, por
        exemplo, omnidirecional, rede
    anti_agin_skin_care_type:
      name: Tipo de cuidados com a pele anti-envelhecimento
      description: Classifica o tipo de item antienvelhecimento para a pele, por exemplo,
        máscara, toner
    anti_perspirant_strength_level:
      name: Nível de eficácia do antitranspirante
      description: Indica a classificação de eficácia do antitranspirante (p. ex.,
        proteção máxima, proteção para atividades desportivas)
    antibody_class_tested:
      name: Classe de anticorpo testada
      description: Especifica a imunoglobulina ou biomarcador que o kit deteta (p.
        ex., IgE, IgG4)
    antifreeze_type:
      name: Tipo de anticongelante
      description: Especifica o tipo de anticongelante para manutenção do veículo,
        por exemplo, concentrado, pré-diluído
    antique_car_design:
      name: Design de carros antigos
      description: Descreve as principais características de design de um carro antigo,
        como t-bucket ou grand-tourer
    antique_vehicle_era:
      name: Era dos veículos antigos
      description: Descreve o período histórico de um veículo antigo, como Veteranos
        ou Vintage
    appliance_board_function:
      name: Função da placa do aparelho
      description: Especifica a função funcional da placa dentro do aparelho
    appliance_unit_location:
      name: Localização da unidade do aparelho
      description: Indica a seção física do aparelho a que a placa se destina (p.
        ex., unidade interna ou externa)
    application_area:
      name: Área de aplicação
      description: Especifica a parte do corpo ou área onde o produto é aplicado,
        por exemplo, lábios, corpo inteiro
    application_method:
      name: Método de aplicação
      description: Define como um produto é aplicado ou usado, por exemplo, gel, líquido,
        spray
    application_type:
      name: Modo de emprego
      description: Indica se o tratamento requer ou não enxaguamento após a aplicação
        ou qualquer outro modo de emprego
    applicator_format:
      name: Formato do aplicador
      description: Descreve a forma física ou estilo do aplicador de loção ou protetor
        solar
    applicator_material:
      name: Material do aplicador
      description: Especifica o material utilizado no aplicador, normalmente para
        tampões; por exemplo, plástico, papelão
    applicator_type:
      name: Tipo de aplicador
      description: Identifica o tipo de aplicador incluído nos tampões, por exemplo,
        aplicador, não aplicador
    applique/patch_shape:
      name: Formato de aplique/remendo
      description: Descreve a forma de objetos de aplicação ou remendos, como animais
        ou geométricos
    applique_shape:
      name: Formato do aplique
      description: Descreve a forma de objetos de aplicação, tais como florais ou
        animais
    aquarium_filter_features:
      name: Características de filtro de aquário
      description: Descreve recursos especiais de filtros de aquário, por exemplo,
        troca rápida de cartucho, filtragem em vários estágios
    aquarium_light_spectrum:
      name: Espetro de luz para aquário
      description: Especifica o tipo de espectro de luz para iluminação do aquário,
        por exemplo, azul, luz do dia
    aquarium_overflow_box_design:
      name: Projeto de caixa de transbordamento de aquário
      description: Descreve o estilo de instalação de uma caixa de transbordo de aquário,
        como externa ou suspensa
    archery_activity:
      name: Atividade de tiro com arco
      description: Especifica o tipo de atividade de tiro com arco, por exemplo, caça
        ao ar livre, prática de tiro ao alvo
    archery_equipment_included:
      name: Equipamento de tiro com arco incluído
      description: Especifica os acessórios de tiro com arco incluídos, por exemplo,
        suporte estabilizador, flechas com vidro de segurança
    archery_style:
      name: Estilo de tiro com arco
      description: Define o tipo específico de tiro com arco para o qual o produto
        foi projetado, por exemplo, tiro com arco 3D, caça com arco
    archery_target_type:
      name: Tipo de alvos para tiro com arco
      description: Especifica o tipo de alvo destinado a diferentes práticas de tiro,
        por exemplo, alvo 3D, saco de tiro
    aromatherapy:
      name: Aromaterapia
      description: Especifica o perfume ou óleo essencial usado, por exemplo, eucalipto,
        lavanda
    arrangement:
      name: Arranjo
      description: Especifica como as flores são dispostas ou apresentadas, por exemplo,
        jarra, cesta
    arrow/bolt_material:
      name: Material de seta/parafuso
      description: Identifica o material de construção de flechas ou virotes, como
        alumínio ou bambu
    arrow_fletching_material:
      name: Material para flechas
      description: Identifica o material usado nas penas das flechas, como sintético
        ou plástico
    arrow_material:
      name: Material da flecha
      description: Identifica a composição das flechas, como bambu ou fibra de vidro
    art/crafting_tool_material:
      name: Materiais para artes e trabalhos manuais
      description: Identifica o principal material das ferramentas de arte ou artesanato,
        como madeira ou metal
    art_fixative_application_method:
      name: Método de aplicação de fixação de arte
      description: Descreve como um fixador artístico é aplicado, como aerossol ou
        pincel
    art_movement:
      name: Movimento artístico
      description: Define a abordagem estilística ou movimento artístico de um quadro,
        por exemplo, impressionismo, expressionismo
    art_style:
      name: Estilo de arte
      description: Descreve o estilo estético de um produto, como arte nova ou tipografia
    artwork_authenticity:
      name: Autenticidade de um trabalho artístico
      description: Indica a autenticidade de um trabalho artístico, especificando
        se se trata de uma criação original ou de uma reprodução
    artwork_frame_material:
      name: Material da moldura da arte
      description: Identifica o material usado em molduras artísticas, como madeira
        ou folheado a ouro
    artwork_type:
      name: Tipo de trabalhos artísticos
      description: Especifica o estilo da arte digital, como tipografia ou pintura
        digital
    assisted_braking_technology:
      name: Tecnologia de travagem assistida
      description: Indica o tipo de travagem assistida nos dispositivos de retenção,
        por exemplo, ativa, passiva
    attachment_method:
      name: Método de fixação
      description: Define o método usado para anexar ou fixar o produto, por exemplo,
        velcro, clip-on
    attachment_options:
      name: Opções de fixação
      description: Especifica os métodos de fixação ou segurança de um produto, por
        exemplo, cordão de segurança
    attachment_type:
      name: Tipo de encaixe
      description: Define o método de fixação ou conexão do produto, como encaixe
        ou gancho e laço
    atv/off_road_tire_type:
      name: Tipo de pneu para quadriciclo/todo-o-terreno
      description: Identifica o uso específico de pneus para quadriciclos ou todo-o-terreno,
        como areia ou lama
    audio/scan_converter_features:
      name: Características do conversor de áudio/scan
      description: Descreve as capacidades de um conversor áudio/digitalização, como
        a conversão automática ou o controlo remoto
    audio/video_cable_connector_type_end_a:
      name: Tipo de conector de cabo áudio/vídeo (extremidade A)
      description: Especifica o conector ou interface presente na primeira extremidade
        (extremidade A) do cabo
    audio/video_cable_connector_type_end_b:
      name: Tipo de conector de cabo áudio/vídeo (extremidade B)
      description: Especifica o conector ou interface presente na segunda extremidade
        (extremidade B) do cabo
    audio_bypass_type:
      name: Tipo de bypass de áudio
      description: Especifica como o sinal de áudio é roteado quando o efeito está
        desativado (p. ex., true bypass, buffer, relé)
    audio_cassette_tape_type:
      name: Tipo de fita cassete de áudio
      description: Especifica a formulação de fita IEC (bias) para cassetes de áudio
    audio_codecs/formats_supported:
      name: Codecs/formatos de áudio suportados
      description: Especifica os tipos de arquivos de áudio que um produto pode reproduzir,
        como WAVE ou MP3
    audio_component_form_factor:
      name: Formato do componente de áudio
      description: Define o estilo ou formato de instalação do componente
    audio_connectivity:
      name: Conectividade de áudio
      description: Define os tipos de conexão de áudio que um produto suporta, como
        HDMI ou USB
    audio_conversion_direction:
      name: Direção da conversão de áudio
      description: Especifica o fluxo de sinal que o conversor suporta (p. ex., analógico
        para digital, digital para analógico, bidirecional)
    audio_converter_features:
      name: Características do conversor de áudio
      description: Descreve as principais características de um conversor de áudio,
        tais como suporte analógico ou alimentado por IA
    audio_d/a_converter_dac:
      name: Conversor de áudio D/A (DAC)
      description: Especifica o tipo de conversor digital para analógico (DAC) em
        dispositivos de áudio, por exemplo, USB, ótico
    audio_duplex_capability:
      name: Capacidade duplex de áudio
      description: Especifica se o dispositivo suporta comunicação de áudio full-duplex
        (bidirecional simultânea) ou half-duplex
    audio_mixer_type:
      name: Tipo de misturador de áudio
      description: Identifica o tipo de misturador de áudio, como analógico ou de
        fluxo contínuo
    audio_output_channel:
      name: Canal de saída de áudio
      description: Indica o número de canais ou configuração de alto-falantes para
        os quais um sistema de som pode emitir, como 2 ou 5.1
    audio_output_format:
      name: Formato de saída de áudio
      description: Define a qualidade e o tipo de som produzido pelo dispositivo de
        áudio, como digital ou analógico
