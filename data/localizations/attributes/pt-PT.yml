      description: Especifica o padrão de ligação de saída CGA da válvula do cilindro
    oxygen_tank_valve_type:
      name: Tipo de válvula do tanque de oxigénio
      description: Especifica a válvula usada em tanques de oxigénio, por exemplo,
        alternância, pós-válvula
    pa_rating:
      name: Classificação PA
      description: Especifica o grau de proteção UVA do protetor solar (p. ex., PA+,
        PA+++, PA++++) baseado no método de Escurecimento Pigmentar Persistente (PPD)
    pacifier/teether_design:
      name: Design de chupeta/mordedor
      description: Descreve o design de chupetas e mordedores para bebés, por exemplo,
