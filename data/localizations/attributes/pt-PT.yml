      description: Especifica o tipo de ingredientes na ração para pássaros, como
        minhocas ou sementes de girassol
    bird_treat_type:
      name: Tipo de guloseimas para pássaros
      description: Identifica a categoria de guloseimas para pássaros, como biscoitos
        ou frutas
    birthday_candle_design:
      name: Design de vela de aniversário
      description: Descreve o tema visual das velas de aniversário, como formato de
        animal ou personagem de desenho animado
    birthday_candle_type:
      name: Tipo de vela de aniversário
      description: Identifica as características únicas das velas de aniversário,
        por exemplo, perfumadas, com faísca
    bitter_variety:
      name: Variedade amarga
      description: Classifica os bitters com base nos seus perfis de sabor, por exemplo,
        floral, picante
    blade_coating:
      name: Revestimento da lâmina
      description: Especifica qualquer revestimento de desempenho aplicado à lâmina
        para fio ou deslize (p. ex., platina, PTFE, titânio)
    blade_curve:
      name: Curva da lâmina
      description: Especifica a curva da lâmina num taco de hóquei, por exemplo, aberto,
        dedo do pé
    blade_design:
      name: Design de lâmina
      description: Especifica o estilo da lâmina em facas utilitárias, a lâmina de
        barbear ou a de encaixe
    blade_edge_configuration:
      name: Configuração da borda da lâmina
      description: Especifica o formato da borda de uma lâmina individual (p. ex.,
        borda simples, borda dupla, sistema de cartucho, meia lâmina)
    blade_material:
      name: Material da lâmina
      description: Especifica o material usado na construção da lâmina, como aço ou
        alumínio
    blade_type:
      name: Tipo de lâmina
      description: Define o formato e o estilo da lâmina de um produto, como reta
        ou punhal
    blanket_color:
      name: Cor do cobertor
      description: Identifica a cor primária de uma manta, como azul-marinho ou multicolor
    blanket_pattern:
      name: Padrão do cobertor
      description: Descreve o desenho ou motivo num cobertor, como floral ou geométrico
    blending_type:
      name: Tipo de misturador
      description: Identifica o método de mistura utilizado em equipamentos de laboratório,
        como contínuo ou em lote
    blind/shade_style:
      name: Tipo de cortina/sombra
      description: Identifica a conceção ou o tipo de estores ou persianas, como estores
        de enrolar ou estores verticais
    blocked_signal_types:
      name: Tipos de sinal bloqueados
      description: Especifica as categorias de sinais sem fios que o bloqueador pode
        bloquear
    blood_group_systems_detected:
      name: Sistemas de grupos sanguíneos detetados
      description: Identifica quais os sistemas de grupos sanguíneos que o kit pode
        determinar
    blood_test_kit_components:
      name: Componentes do kit de teste de sangue
      description: Especifica os artigos incluídos num kit de análise de sangue, por
        exemplo, compressa de gaze, ligaduras adesivas
    bluetooth_functionality:
      name: Funcionalidade Bluetooth
      description: Indica se o dispositivo atua como transmissor, recetor ou ambos
        (transcetor)
    board_concave_shape:
      name: Formato côncavo da prancha
      description: Define a curva côncava das pranchas de surf ou paddle; por exemplo,
        V-côncavo, plano
    board_game_features:
      name: Características do jogo de tabuleiro
      description: Destaca aspetos únicos de um jogo de tabuleiro, por exemplo, configuração
        rápida, expansão disponível
    board_game_mechanics:
      name: Mecânica de jogo de tabuleiro
      description: Descreve a estrutura de jogo de um jogo de tabuleiro, como estratégia
        ou cooperativo
    board_material:
      name: Material de placa
      description: Especifica o tipo de material dos painéis de apresentação, como
        acrílico ou porcelana
    board_mounting_type:
      name: Tipo de montagem de quadro
      description: Especifica o estilo de configuração dos quadros de apresentação,
        como portáteis ou com suporte de cavalete
    board_profile:
      name: Perfil do painel
      description: Define o perfil de uma prancha de surf, por exemplo, plana, rocker
    board_surface:
      name: Superfície do quadro
      description: Descreve o tipo de superfície num painel de exibição, como tecido
        ou cortiça
    board_type:
      name: Tipo de prancha
      description: Classifica os skates com base no seu design e finalidade, como
        clássico ou cruiser
    boat_type:
      name: Tipo de barco
      description: Identifica o projeto ou modelo específico de uma embarcação, como
        de pontão ou barco com convés
    body/facial_hair_type:
      name: Tipo de pelo corporal/facial
      description: Ajuda a combinar produtos de higiene com tipos de pelo, como fino
        ou forte, normalmente para descoloração de pelos
    body_area:
      name: Área do corpo
      description: Especifica a parte do corpo para a qual o produto foi projetado,
        por exemplo, rosto, linha do biquíni
    body_color:
      name: Cor do corpo
      description: Especifica a cor primária dos veículos ou peças, por exemplo, branco
        ou prateado
    body_jewelry_type:
      name: Tipo de joalharia para o corpo
      description: Identifica o tipo específico de joias para o corpo, por exemplo,
        piercing no ventre, brinco de orelha
    body_material:
      name: Material do corpo
      description: Especifica o material primário de um produto, normalmente varas
        de pesca; por exemplo, compósito, alumínio
    body_paint/foundation_type:
      name: Pintura corporal/tipo de base
      description: Especifica a categoria do produto de maquilhagem corporal, como
        a base ou o sangue falso
    body_paint_formula_base:
      name: Base da fórmula de tinta corporal
      description: Identifica a base de formulação principal, que afeta a durabilidade,
        o acabamento e o método de remoção
    body_pattern:
      name: Padrão corporal
      description: Descreve o design visual ou motivo na superfície primária de um
        produto, por exemplo, floral, geométrico
    body_side:
      name: Lado do corpo
      description: Define se o produto é projetado para o lado esquerdo, lado direito,
        ou é adequado para uso bilateral
    bodyboard_features:
      name: Características do bodyboard
      description: Descreve aspetos únicos de um bodyboard, como capota rígida ou
        insuflável
    boiler_system:
      name: Sistema de caldeira
      description: Especifica o sistema de caldeira para aparelhos de aquecimento,
        por exemplo, combi, solo
    bolt_form:
      name: Forma de parafuso
      description: Descreve a forma dos parafusos de hardware, por exemplo, sextavados,
        de máquina
    bolt_material:
      name: Material do parafuso
      description: Identifica a composição dos parafusos do tiro com arco, como bambu
        ou fibra de vidro
    bone_anchored_interface_type:
      name: Tipo de interface ancorada no osso
      description: Define como o processador se liga ao implante, distinguindo entre
        pilar percutâneo e sistemas magnéticos transcutâneos
    book/file_cover_material:
      name: Material da capa de livro/arquivo
      description: Identifica o material utilizado nas capas de livros ou pastas,
        como cartão ou couro
    book_cover_material:
      name: Material da capa do livro
      description: Identifica o material usado nas capas dos livros, como couro ou
        papel
    book_cover_type:
      name: Tipo de capa para livro
      description: Identifica o tipo de capa de um livro, como capa dura ou capa mole
    bookmark_design:
      name: Design de marcador
      description: Descreve o estilo ou tipo de marcador, como magnético ou de clipe
    bookmark_shape:
      name: Formato do marcador
      description: Descreve a forma ou o contorno de um marcado, como redondo ou quadrado
    boombox_lighting_effects:
      name: Efeitos de iluminação do boombox
      description: Descreve a presença e efeitos de iluminação LED ou RGB integrados
        no altifalante
    boot_style:
      name: Estilo de botas
      description: Especifica o estilo das botas, por exemplo, botins
    boot_type:
      name: Tipo de botas
      description: Classifica o estilo de inicialização, por exemplo, bota macia,
        bota dura
    borescope_design:
      name: Design de boroscópio
      description: Descreve o tipo de boroscópio, como flexível, rígido ou fibroscópio
    bottle/container_closure:
      name: Fecho de garrafa/recipiente
      description: Identifica o tipo de vedante em garrafas ou recipientes, como bomba
        ou tampa articulada
    bottle_closure_type:
      name: Tipo de fecho de frasco
      description: Identifica o tipo de vedante utilizado numa garrafa, como a rolha
        de cortiça ou a tampa de coroa
    bottle_design:
      name: Design do biberão
      description: Descreve as características de uma mamadeira, normalmente para
        produtos para bebés; por exemplo, fácil de segurar
    bottle_material:
      name: Material do biberão
      description: Identifica a substância utilizada no fabrico de uma garrafa, como
        vidro ou plástico
    bottle_sterilizer_features:
      name: Características do esterilizador do biberão
      description: Destaca funções específicas de esterilizadores de biberões, como
        desligamento automático ou função de descongelamento
    bottle_type:
      name: Tipo de frasco
      description: Especifica o tipo de fecho de uma garrafa, como squeeze ou spray
    bottle_warmer/sterilizer_features:
      name: Características do aquecedor/esterilizador do biberão
      description: Destaca as características especiais de aquecedores ou esterilizadores
        de biberão, como desligar automático ou temporizador
    bottle_warmer_features:
      name: Características do aquecedor do biberão
      description: Destaca características exclusivas de aquecedores de biberões,
        como display LCD ou temporizador
    bottom_surface_material:
      name: Material da superfície superior
      description: Identifica o material da superfície inferior do produto, como metal
        ou vidro
    bow/crossbow_features:
      name: Características do arco/besta
      description: Descreve as características especiais de arcos/bestas, como tração
        ajustável ou mira iluminada
    bow_features:
      name: Características do arco
      description: Identifica características únicas dos arcos de tiro com arco, por
        exemplo, tração ajustável, mira iluminada
    bow_hair_material:
      name: Material do laço para o cabelo
      description: Especifica a composição do cabelo do arco em instrumentos de corda,
        por exemplo, sintético, crina de cavalo
    bow_material:
      name: Material do arco
      description: Especifica o tipo de material utilizado nos arcos de tiro com arco,
        ou seja, alumínio, fibra de vidro
    box_type:
      name: Tipo de caixa
      description: Identifica o estilo de caixas de armazenamento ou organizadores
        para veículos, como baú ou crossover
    bra_closure_type:
      name: Tipo de fecho do sutiã
      description: Identifica como os sutiãs são fechados ou abertos, por exemplo,
        frontal, pull-on (sem fecho)
    bra_coverage:
      name: Cobertura do sutiã
      description: Especifica o nível de cobertura fornecido por um sutiã, como completo
        ou meio
    bra_features:
      name: Características do soutien
      description: Detalha as características exclusivas dos soutiens, por exemplo,
        acolchoamento removível e tecido que absorve o suor
    bra_strap_type:
      name: Tipo de alça
      description: Especifica o estilo e a funcionalidade das alças do sutiã, como
        racerback
    bra_style:
      name: Modelo de soutien
      description: Identifica o design ou estilo de um sutiã, como push-up ou sem
        alças
    bra_support_level:
      name: Nível de suporte do sutiã
      description: Indica o nível de suporte fornecido por um sutiã, por exemplo,
        baixo, médio, alto
    brace_support_level:
      name: Nível de suporte da ortótese
      description: Indica o nível geral de suporte ou proteção designado pelo fabricante
        oferecido pela ortótese
    bracelet_design:
      name: Design da pulseira
      description: Especifica o design de uma uma bracelete, como um pingente ou um
        punho
    bracket/brace_design:
      name: Design de suporte
      description: Descreve o estilo dos suportes ou braçadeiras, por exemplo, cantoneira,
        braçadeira de canto
    bracket_profile:
      name: Perfil do suporte
      description: Indica o estilo físico do suporte fornecido com a placa, determinando
        a compatibilidade com o chassi
    brandy_variety:
      name: Variedade de brandy
      description: Distingue entre diferentes estilos de brandy, por exemplo, conhaque,
        grappa
    breadboard_type:
      name: Tipo de placa de ensaio
      description: Classifica a placa de ensaio consoante o estilo de construção ou
        o tamanho
    breath_spray_benefit:
      name: Benefícios do spray para hálito
      description: Identifica o principal benefício para o cuidado oral que o spray
        para hálito afirma proporcionar
    breath_sprays_certifications:
      name: Certificações de sprays para o hálito
      description: Especifica os padrões que um spray respiratório atende, como comércio
        justo ou sem glúten
    bridge/router_advanced_features:
      name: Características avançadas de ponte/roteador
      description: Destaca funcionalidades avançadas de pontes/roteadores, como suporte
        a VPN ou alimentado por IA
    brightness_levels:
      name: Níveis de brilho
      description: Especifica a faixa de saída de luz para produtos, como médio ou
        alto
    bristle_grade:
      name: Grau das cerdas
      description: Identifica a qualidade ou classificação do pelo animal ou sintético
        utilizado (p. ex., texugo ponta de prata, fibra sintética ponta de prata)
    bristle_hardness:
      name: Dureza das cerdas
      description: Indica a firmeza das cerdas da escova de dentes
    bristle_material:
      name: Material das cerdas
      description: Identifica a composição das cerdas da escova, como Nylon ou crina
        de cavalo
    bristle_shape:
      name: Formato das cerdas
      description: Define a forma das cerdas da escova, por exemplo, planas, angulares
    broadcast_video_standard:
      name: Padrão de vídeo de transmissão
      description: Indica a(s) norma(s) de transmissão analógica com que o videogravador
        é compatível
    broadcasting_standard_supported:
      name: Padrão de transmissão suportado
      description: Especifica os padrões de transmissão de televisão ou modulação
        (satélite, cabo, terrestre) que o produto pode descodificar ou processar
    broadhead/field_point_material:
      name: Material de ponta larga/campo
      description: Identifica o material usado em pontas largas de tiro com arco ou
        pontos de campo, como aço inoxidável ou aço carbono
    broadhead_design:
      name: Tipo de pontas de caça
      description: Indica o tipo de design das pontas de caça utilizadas no tiro com
        arco, p. ex., lâmina fixa, mecânica
    brush_application:
      name: Aplicação de pincel
      description: Descreve o uso pretendido de pincéis artísticos, como acrílico
        ou aguarela
    brush_end_type:
      name: Tipo de ponta do pincel
      description: Descreve o formato estrutural das pontas do pincel (p. ex., ponta
        única, ponta dupla, retrátil)
    brush_head_shape:
      name: Formato da cabeça da escova
      description: Define o formato geral da cabeça da escova, que afeta o alcance
        e adequação para diferentes utilizadores
    brush_head_usage:
      name: Utilização da cabeça da escova
      description: Especifica o uso pretendido das cabeças de escova, normalmente
        para cosméticos; por exemplo, limpeza profunda, esfoliação
    brush_material:
      name: Material da escova
      description: Especifica o tipo de material usado na construção de pincéis, como
        silicone ou plástico
    brush_size:
      name: Tamanho do pincel
      description: Especifica o tamanho de um pincel artístico, por exemplo, 0, 12
    brush_type:
      name: Tipo de escova
      description: Especifica o material usado em um pincel de barbear, como pelo
        sintético ou de texugo
    brushing_mode:
      name: Modo de escovagem
      description: Lista os programas de limpeza predefinidos pelos quais a escova
        de dentes pode alternar (p. ex., limpeza, sensível, branqueamento)
    bug_type:
      name: Tipo de inseto
      description: Especifica as espécies de insetos que o produto visa, como formigas
        ou vespas
    building_board_material:
      name: Material da placa de construção
      description: Especifica o tipo de material usado nos painéis de construção,
        como o contraplacado ou o cimento
    building_consumable_form:
      name: Forma de consumível de construção
      description: Especifica a forma dos compostos de remendo de parede, como líquido
        ou pó
    building_toy_type:
      name: Tipo de brinquedo de construção
      description: Especifica a categoria do brinquedo de construção, por exemplo,
        conjuntos de construção STEM, peças magnéticas
    bulb_cap_type:
      name: Tipo de casquilho da lâmpada
      description: Especifica o tipo de tampa ou base que uma lâmpada ou acessório
        possui, por exemplo, E12, GU10
    bulb_shape:
      name: Formato da lâmpada
      description: Descreve o formato dos produtos de iluminação, por exemplo, tubo,
        espiral
    bulb_size:
      name: Tamanho da lâmpada
      description: Especifica o tamanho das lâmpadas, por exemplo, A19, C7
    bulb_type:
      name: Tipo de lâmpada
      description: Especifica o tipo de lâmpada usada em produtos de iluminação, por
        exemplo, LED, halogéneo
    bulldozer_blade_type:
      name: Tipo de pá da escavadora
      description: Identifica o estilo da lâmina numa escavadora, como angular ou
        reta (lâmina S)
    bullet_protection_level:
      name: Nível de proteção à prova de balas
      description: Indica o nível de proteção contra balas em coletes, por exemplo,
        IIA, IV
    bullhorn_features:
      name: Características do megafone
      description: Destaca as funcionalidades exclusivas de um megafone, como gravação
        de voz ou função de sirene
    bullion_form:
      name: Forma das barras de metais valiosos
      description: Especifica o tipo de barras de metal precioso, por exemplo, redondas
        ou em barra
    bungee_arm_mechanism:
      name: Mecanismo do braço bungee
      description: Define a tecnologia usada para suspender e guiar o cabo do rato
        (p. ex., braço de mola, cordão elástico, suspensão magnética)
    burner_material:
      name: Material do queimador
      description: Identifica o material utilizado na construção de um fogão ou grelhador,
        como ferro fundido ou aço inoxidável
    butt_cap_color:
      name: Cor da tampa da extremidade
      description: Especifica a cor da tampa da extremidade das canas de pesca, por
        exemplo, preto ou azul
    butt_cap_material:
      name: Material da capa de extremidade
      description: Define a composição da extremidade inferior do cabo em artigos
        desportivos, por exemplo, EVA (Etileno Vinil Acetato), cortiça
    butt_cap_pattern:
      name: Padrão da tampa da extremidade
      description: Descreve o desenho ou motivo na tampa de uma cana de pesca, como
        camuflagem ou floral
    button/snap_closure_type:
      name: Tipo de fecho de botão/mola
      description: Descreve o estilo do mecanismo de fixação, como magnético ou invisível
    button_surface_profile:
      name: Perfil da superfície do botão
      description: Descreve o contorno físico da superfície do êmbolo do botão, afetando
        a ergonomia e o estilo visual
    cabinet_type:
      name: Tipo de máquina
      description: Especifica o design e o formato dos jogos de arcade, como bartop
        ou mini arcade
    cable_form_factor:
      name: Fator de forma do cabo
      description: Descreve o estilo de design físico ou forma do cabo
    cable_housing_material:
      name: Material da carcaça do cabo
      description: Identifica o material usado para o invólucro do cabo, como nylon
        ou PVC
    cable_jacket_rating:
      name: Classificação do revestimento do cabo
      description: Especifica a classificação ambiental ou de segurança do revestimento
        do cabo (p. ex., plenum, enterramento direto, resistente a UV)
    cable_shielding:
      name: Proteção do cabo
      description: Especifica o tipo de proteção usada em cabos, por exemplo, trançado
        (STP), folha (FTP)
    cable_style:
      name: Estilo do cabo
      description: Descreve o design físico do cabo (p. ex., trançado, plano, enrolado,
        retrátil)
    cable_tie_type:
      name: Tipo de abraçadeira
      description: Especifica o estilo de construção ou mecanismo de fixação da abraçadeira
    cable_tray_style:
      name: Estilo de bandeja de cabos
      description: Descreve o estilo estrutural da seção da bandeja de cabos que determina
        a ventilação e o método de suporte de cabos
    cable_type:
      name: Tipo de cabo
      description: Classifica a variedade de cabos, normalmente em equipamentos de
        ciclismo; por exemplo, freio, engrenagem
    cache_level:
      name: Nível de cache
      description: Indica a posição de hierarquia do cache (p. ex., L1, L2, L3), que
        afeta o tamanho,a latência e a proximidade aos núcleos do processador
    caffeine_content:
      name: Teor de cafeína
      description: Indica o teor de cafeína presente num produto, p. ex., descafeinado,
        baixo teor de cafeína
    cage_type:
      name: Tipo de gaiola
      description: Identifica o estilo da gaiola de segurança em veículos, como gaiola
        completa ou meia gaiola
    calculator_accessory_type:
      name: Tipo de acessórios para calculadora
      description: Especifica o tipo de acessório da calculadora, como rolo de papel
        ou adaptador de impressora
    calculator_features:
      name: Características da calculadora
      description: Descreve as funções que uma calculadora pode executar, como cálculo
        de empréstimos ou análise estatística
    calendar/organizer_features:
      name: Características de calendário/organizador
      description: Descreve as características especiais de calendários ou organizadores,
        como espaços para compromissos ou feriados marcados
    calendar_format:
      name: Formato de calendário
      description: Especifica o período de tempo de um produto de calendário, como
        diário ou mensal
    calibration_sensor_type:
      name: Tipo de sensor de calibração
      description: Especifica a tecnologia de hardware subjacente ou formato do calibrador
    call_blocking_method:
      name: Método de bloqueio de chamadas
      description: Especifica como o dispositivo identifica e bloqueia chamadas indesejadas
    caller_id_compatibility:
      name: Compatibilidade com identificador de chamadas
      description: Declara se o telefone suporta serviços de identificação de chamadas
        fornecidos pela rede telefónica
    caller_id_standard_compatibility:
      name: Compatibilidade com padrão de identificador de chamadas
      description: Indica quais os formatos de sinalização de identificador de chamadas
        que o dispositivo pode descodificar
    cam_system:
      name: Sistema de câmara
      description: Especifica o sistema de cames usado em equipamentos de tiro com
        arco, por exemplo, híbrido, simples
    camera_attachment:
      name: Acessório da câmara
      description: Especifica a peça ou acessório da câmara, como um visor angular
        ou adaptador de ocular
    camera_button/knob_type:
      name: Tipo de botão/seletor da câmara
      description: Identifica o botão numa câmara, por exemplo, botão de disparo do
        obturador, botão de seleção de modo
    camera_control_type:
      name: Tipo de controlo da câmara
      description: Especifica o tipo de controlo remoto da câmara, por exemplo, interruptor
        remoto, disparo do obturador
