    seed_content:
      name: Sėklų kiekis
      description: Nurodo, ar citrusinis vaisius yra be sėklų, turi mažai sėklų ar
        yra pilnai su sėklomis.
    seed_size_classification:
      name: Sėklų dydžio klasifikacija
      description: Nurodo santykinį nevalgomos ličio vaisiaus sėklos dydį, kuris daro
        įtaką valgomo minkštimo kiekiui.
    self_adhesive_backing_format:
      name: Lipnaus pagrindo formatas
