    electronics_power_source:
      name: Elektronikos maitinimo šaltinis
      description: Nurodo, kaip maitinama aktyvi elektronika (kai taikoma).
    eligible_race_series:
      name: Tinkamos lenktynių serijos
      description: Lenktynių serija arba sankcionuojanti organizacija, kurioje automobilis
