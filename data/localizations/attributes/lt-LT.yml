    seat_height_category:
      name: Sėdynės aukščio kategorija
      description: Klasifikuoja taburetę pagal įprastą sėdynės aukščio diapazoną (pvz.,
        stalviršio arba baro aukštis), kad būtų lengviau pasirinkti.
    seat_material:
      name: Sėdynės medžiaga
      description: Identifikuoja pagrindinę suolo sėdimosios dalies medžiagą.
    seat_mounting_type:
      name: Sėdynės montavimo tipas
      description: Tvirtinimo / bėgelių konfigūracija, naudojama sėdynei pritvirtinti
