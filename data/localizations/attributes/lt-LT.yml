    oven_bake_clay_formulation:
      name: Orkaitėje kepamo molio formulė
      description: Nurodo orkaitėje kepamo molio formulės šeimą (pvz., polimerinis
        molis arba dervinis molis), kuri turi įtakos naudojimui, kietėjimo savybėms
        ir galutinėms charakteristikoms.
    oven_housing_configuration:
      name: Orkaitės korpuso konfigūracija
      description: Nurodo numatytą prietaisų išdėstymą, kuriam pritaikytas korpusas
        (pvz., viena orkaitė, dviguba orkaitė arba orkaitės ir mikrobangų krosnelės
        derinys).
    overhead_mount_installation_method:
      name: Viršutinio laikiklio montavimo metodas
      description: Kaip viršutinis laikiklis tvirtinamas prie transporto priemonės
        (tvirtinimo elementų / jungties tipas).
    oversize_or_undersize_grade:
      name: Padidinto arba sumažinto dydžio klasė
      description: Nurodo rinkinio dydžio klasę (padidinti stūmokliai / žiedai ir
        / arba sumažinti guoliai), lyginant su OEM standartiniu dydžiu.
    p_tex_application_method:
      name: "„P-Tex“ naudojimo būdas"
      description: Aprašoma, kaip P-Tex medžiaga užtepama ant slidžių ar snieglenčių
        pagrindo.
    p_tex_form:
      name: P-Tex forma
      description: Nurodo fizinę formą, kuria pateikiama remonto medžiaga.
    packability:
      name: Supakuojamumas
      description: Nurodo, ar ir kaip liemenę galima supakuoti arba laikyti, kai ji
        nenaudojama.
    packaging_format:
      name: Pakuotės formatas
      description: Kaip stygos supakuotos / parduodamos (atskiri vokeliai, biri pakuotė
        ir kt.).
    packaging_material:
      name: Pakuotės medžiaga
      description: Nurodo pagrindinę butelio arba talpyklos, kurioje laikomas vanduo,
        medžiagą.
    packaging_type:
      name: Įpakavimo tipas
      description: Apibūdina, kaip bobblehead figūrėlė supakuota mažmeninei prekybai,
        eksponavimui arba kolekciniam laikymui.
    packing_medium:
      name: Pakavimo terpė
      description: Nurodo skystį arba terpę (pvz., vandenį, įvairius sirupus, sultis
        ar sūrymą), naudojamą vaisiams išsaugoti talpykloje.
    pad_components_included:
      name: Į rinkinį apsaugų komponentai
      description: Nurodo, kurios dalys įtrauktos, kai produktas parduodamas kaip
        rinkinys (pvz., kelių ir alkūnių apsaugos, tik riešų apsaugos).
    pad_controller_additional_control:
      name: Pad valdiklio papildomi valdikliai
      description: Įrenginyje esančių papildomų fizinių valdiklių tipai, be padų (rankenėlės,
        slankikliai, mygtukai).
    pad_controller_performance_features:
      name: Pad valdiklio atlikimo funkcijos
      description: Pagrindinės su atlikimu susijusios pad funkcijos grojimui ir išraiškingam
        valdymui.
    pad_coverage_area:
      name: Apsaugos padengimo sritis
      description: Nurodo kūno zonas, kurias saugo šortuose integruotos apsaugos.
    pad_material_or_technology:
      name: Apsaugos medžiaga arba technologija
      description: Nurodo patentuotą smūgius sugeriančią technologiją arba firminę
        medžiagą, naudojamą apsaugoje.
    pad_mounting_or_holding_style:
      name: Apsaugos tvirtinimo arba laikymo būdas
      description: Nurodo, kaip apsauga laikoma, dėvima arba montuojama naudojimo
        metu.
    pad_saver_style:
      name: Pad saver tipas
      description: Nurodo pad saver fizinį tipą / dizainą, naudojamą pagalvėlėms ir
        kanalui džiovinti.
    pad_shape:
      name: Bloko forma
      description: Nurodo pagalvėlės smūgio paviršiaus arba bendro korpuso geometrinę
        formą arba išlinkimą (pvz., apvali, lenkta, stačiakampė, plokščia), padedant
        naudotojams pritaikyti pagalvėles pagal treniruočių tikslus ir smūgių tipus.
    pad_shell_type:
      name: Apsaugos išorinio sluoksnio tipas
      description: Klasifikuoja apsaugos išorinio paviršiaus konstrukcijos tipą (pvz.,
        kietas korpusas, minkštas korpusas, vidinis įdėklas).
    pad_style:
      name: Apsaugos tipas
      description: Nurodo su rogėmis pateikiamos apsaugos tipą arba dizainą.
    padding_layers:
      name: Paminkštinimo sluoksnių skaičius
      description: Nurodo putų sluoksnių skaičių, naudojamą smūgių sugėrimui.
    padding_level:
      name: Paminkštinimo lygis
      description: Nurodo paminkštinimo kiekį, integruotą diržo / atramos kontakto
        zonose (kaklo, pečių, nugaros).
    padding_material:
      name: Paminkštinimo medžiaga
      description: Nurodo vidinę užpildo arba paminkštinimo medžiagą, sugeriančią
        smūgius krepšiuose, skyduose, pirštinėse ir manekenuose.
    paddle_ball_attachment_type:
      name: Paddle ball kamuoliuko tvirtinimo tipas
      description: Nurodo, kaip kamuoliukas pritvirtintas prie raketės (arba ar jis
        nėra pritvirtintas).
    paddle_leash_style:
      name: Irklentės pavadėlio tipas
      description: Nurodo irklentės pavadėlio virvės tipą arba dizainą.
    paddle_shape:
      name: Raketės forma
      description: Nurodo bendrą irklo galvutės / korpuso siluetą (pvz., standartinis,
        pailgas, platus korpusas), kuris turi įtakos pasiekiamumui, sweet-spot dydžiui
        ir manevringumui.
    paddleboard_intended_use:
      name: Irklentės paskirtis
      description: Klasifikuoja pagrindinę lentos paskirtį arba veiklą, kuriai ji
        sukurta (pvz., Touring, Yoga, Racing).
    paint_application_method:
      name: Dažų naudojimo būdas
      description: Pagrindinis būdas, kuriuo produktas skirtas tepti ant stabdžių
        apkabos.
    paint_by_number_surface_type:
      name: Tapybos pagal numerius paviršiaus tipas
      description: Paviršius, ant kurio atspausdintas numeruotas dizainas (pvz., drobė,
        popierius, medinė plokštė).
    paint_medium_application_method:
      name: Tapybos terpės naudojimo metodas
      description: Nurodo rekomenduojamą terpės naudojimo būdą.
    paint_medium_intended_effect:
      name: Tapybos terpės numatytas efektas
      description: Nurodo pagrindinį rezultatą, kurį terpė skirta sukurti (tekstūra,
        blizgesys, glazūravimas, takumas ir kt.).
    paint_safe_bristles:
      name: Dažams saugūs šeriai
      description: Nurodo, ar šepetėlio šeriai reklamuojami kaip saugūs naudoti ant
        automobilio dažų / lako dangos (nebraižantys).
    paintable_surface:
      name: Dažomasis paviršius
      description: Nurodo, ar papjė mašė forma yra paruošta dažymui iš karto (pvz.,
        gruntuota / užsandarinta), ar reikalingas paruošimas.
    paintball_caliber:
      name: Dažasvydžio kalibras
      description: Nurodo dažasvydžio kamuoliukų arba suderinamos įrangos skersmenį
        / kalibrą.
    paintball_feed_system:
      name: Dažasvydžio padavimo sistema
      description: Nurodo, kaip dažasvydžio kamuoliukai paduodami į markerį.
    paintball_fill_color:
      name: Dažasvydžio užpildo spalva
      description: Nurodo vidinio žyminčio užpildo spalvą, kuri gali skirtis nuo išorinio
        apvalkalo ir lemia spalvą po smūgio.
    paintball_fill_type:
      name: Dažasvydžio užpildo tipas
      description: Apibūdina bet kokią specialią užpildo formulę arba savybę (pvz.,
        nuplaunamas, švytintis tamsoje, miltelinis).
    paintball_grade:
      name: Dažasvydžio lygis
      description: Apibūdina našumo klasę arba numatytą naudojimo lygį (pvz., pradedančiųjų,
        aikštės, varžybų, žiemos).
    paintball_mask_coverage_level:
      name: Dažasvydžio kaukės apsaugos lygis
      description: Nurodo, kurias veido arba galvos dalis saugo dažasvydžio akiniai
        arba kaukė (tik akiniai, pusė veido, visas veidas arba visa galva).
    paintball_tank_valve_type:
      name: Dažasvydžio baliono vožtuvo tipas
      description: Apibūdina balione esantį vožtuvo arba reguliatoriaus sąsajos tipą.
    painting_surface_priming_type:
      name: Tapybos paviršiaus gruntavimo tipas
      description: Nurodo gruntą / dangą ant tapymo paviršiaus (ne tik gruntuotas
        / negruntuotas), kuris turi įtakos dažų sukibimui ir technikos suderinamumui.
    palette_knife_blade_edge_profile:
      name: Paletės peilio ašmenų krašto profilis
      description: Apibūdina paletės peilio ašmenų darbinio krašto profilį (ne aštrumą),
        kuris turi įtakos potėpiams ir maišymui.
    palette_knife_flexibility:
      name: Paletės peilio lankstumas
      description: Apibūdina paletės peilio ašmenų standumą / lankstumą.
    palette_surface_finish:
      name: Paletės paviršiaus apdaila
      description: Apibūdina maišymo paviršiaus apdailą / dangą, kuri turi įtakos
        atsparumui dėmėms ir valymo paprastumui.
    palm_padding_level:
      name: Delno paminkštinimo lygis
      description: Apibūdina paminkštinimo kiekį pirštinės arba sukibimo pagalvėlės
        delno srityje.
    palm_padding_type:
      name: Delno paminkštinimo tipas
      description: Nurodo medžiagą arba konstrukciją, naudojamą delno paminkštinimui
        (pvz., gelis, putos, dvigubas sluoksnis).
    palm_wax_blend_readiness:
      name: Palmių vaško mišinio paruoštumo tipas
      description: Nurodo, ar produktas yra grynas palmių vaškas, ar iš anksto sumaišyta
        formulė, skirta konkrečioms savybėms užtikrinti.
    palm_wax_form:
      name: Palmių vaško forma
      description: Fizinis palmių vaško pavidalas pardavimo metu, turintis įtakos
        matavimo paprastumui, lydymosi greičiui ir naudojimui.
    pan_flute_tuning_standard:
      name: Pano fleitos derinimo standartas
      description: Etaloninis dažnis, naudojamas derinimui (pvz., A4=440 Hz), svarbus
        grojant su kitais instrumentais.
    pannier_configuration:
      name: Krepšių komplektacija
      description: Nurodo, ar produktas parduodamas kaip vienas krepšys, sujungtas
        dvigubas krepšys ar poros / trigubas šoninių krepšių rinkinys.
    pannier_mounting_system:
      name: Krepšių tvirtinimo sistema
      description: Nurodo mechanizmą, naudojamą šoniniam krepšiui pritvirtinti prie
        dviračio bagažinės arba rėmo, užtikrinant suderinamumą su skirtingomis sistemomis.
    pant_cuff_style:
      name: Kelnių klešnių apačios tipas
      description: Nurodo kelnių apačios užbaigimą arba reguliavimą ties kulkšnimi
        (pvz., elastiniai rankogaliai, užtrauktukai ties kulkšnimi, atviras kraštas).
    pant_leg_conversion_type:
      name: Kelnių klešnių transformavimo tipas
      description: Nurodo, ar ir kaip kelnių klešnės gali būti transformuojamos arba
        reguliuojamos skirtingiems ilgiams.
    pantyhose_crotch_style:
      name: Pėdkelnių klyno tipas
      description: Nurodo klyno srities dizainą, atskiriant standartinį uždarą klyną,
        atvirą klyną arba sustiprinto įsiuvo versijas.
    papaya_variety:
      name: Papajos veislė
      description: Nurodo papajos veislę arba komercinį tipą (pvz., Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Popierinių ir magnetinių lėlių formatas
      description: Nurodo, ar produktas yra tradicinis popierinių lėlių rinkinys,
        magnetinių lėlių rinkinys ar hibridinis formatas.
    paper_color_family:
      name: Popieriaus spalvų grupė
      description: Nurodo, ar pakuotė yra vienos spalvos, įvairių spalvų ar specialių
        mišinių (naudinga, kai spalva priskiriama vienetui, tačiau pakuotės yra mišrios).
    paper_magnetic_doll_set_contents:
      name: Popierinių ir magnetinių lėlių rinkinio turinys
      description: Nurodo, kurie pagrindiniai komponentai įtraukti į rinkinį.
    paper_opacity:
      name: Popieriaus nepermatomumas
      description: Nurodo, kiek popierius yra permatomas – nuo labai skaidraus iki
        nepermatomo (naudinga perpiešimui).
    paraglider_certification_rating:
      name: Parasparnio sertifikavimo klasė
      description: Nurodo oficialią skraidymo tinkamumo klasę, priskirtą parasparnio
        sparnui (pvz., EN arba LTF klasės).
    parasite_types_controlled:
      name: Kontroliuojamų parazitų tipai
      description: Išvardija vidinius parazitus, prieš kuriuos produktas yra veiksmingas,
        kad pirkėjai galėtų pritaikyti dehelmintizacijos programas konkretiems užkrėtimams.
    parking_camera_mounting_location:
      name: Automobilių statymo kameros montavimo vieta
      description: Nurodo, kur transporto priemonėje kamera skirta montuoti (pvz.,
        numerio ženklo zonoje, ant galinės dalies paviršiaus, įleidžiamai).
    parking_camera_night_vision_technology:
      name: Parkavimo kameros naktinio matymo technologija
      description: Kameros naudojamas pagalbos silpname apšvietime metodas.
    parking_camera_orientation:
      name: Parkavimo kameros orientacija
      description: Nurodo, ar kamera skirta galiniam (atbulinės eigos), priekiniam
        vaizdui ar pasirenkamam / veidrodiniam naudojimui.
    parking_sensor_finish:
      name: Parkavimo jutiklio apdaila
      description: Nurodo parkavimo jutiklio paviršiaus / dangtelio apdailą (pvz.,
        dažomas / gruntuotas, matinis, blizgus), kad atitiktų bamperio estetiką.
    parking_sensor_type:
      name: Parkavimo jutiklio tipas
      description: Nurodo parkavimo jutiklio naudojamą aptikimo technologiją (pvz.,
        ultragarsinę, elektromagnetinę, radarą, optinę).
    parsley_root_variety:
      name: Petražolių šaknų veislė
      description: Nurodo petražolių šaknų veislę arba kultivarą, kai ją pateikia
        tiekėjas.
    parsnip_variety:
      name: Pastarnoko veislė
      description: Nurodo konkrečią pastarnoko veislę arba kultivarą, pvz., Hollow
        Crown arba White Gem, leidžiant pirkėjams pasirinkti pagal skonį, saldumą
        arba dydžio skirtumus.
    part_condition:
      name: Dalies būklė
      description: Nurodo, ar dalis yra nauja, naudota, restauruota ir pan.
    part_placement:
      name: Dalies vieta
      description: Nurodo, kur įrenginyje (pvz., laiptų treniruoklyje ar steperyje)
        montuojama dalis, pvz., kairėje, dešinėje, priekyje ar gale.
    partial_capo_covered_strings:
      name: Dalinio kapodastro dengiamos stygos
      description: Nurodo stygų diapazoną, kurį dengia dalinis kapodastras, naudojant
        standartinį 6 stygų gitaros numeravimą (1 = aukštoji E, 6 = žemoji E).
    parting_style:
      name: Sklastymo tipas
      description: Nurodo, kaip perukas yra arba gali būti skirstomas (pvz., per vidurį,
        šone, laisvas sklastymas), turint įtakos formavimo lankstumui.
    party_favor_type:
      name: Šventinės dovanėlės tipas
      description: Nurodo, kokio tipo šventinė dovanėlė tai yra (pvz., lipdukai, mini
        žaislai, muilo burbulai), kad būtų galima naršyti / filtruoti šventinių dovanėlių
        kategorijoje.
    party_game_format:
      name: Vakarėlio žaidimo formatas
      description: Pagrindinis fizinis vakarėlio žaidimo formatas.
    party_horn_mouthpiece_type:
      name: Šventinio trimito kandiklio tipas
      description: Nurodo kandiklio konstrukciją, kuri turi įtakos higienai ir patogumui.
    party_horn_style:
      name: Šventinio trimito tipas
      description: Apibūdina šventinio trimito konstrukcijos / veikimo tipą (kaip
        jis išsitiesia arba skleidžia garsą).
    passenger_car_type:
      name: Keleivinio vagono tipas
      description: Nurodo konkretų modelio keleivinio vagono tipą (pvz., keleivinis,
        miegamasis), naudojamą naršymui ir rinkinių formavimui.
    passion_fruit_variety:
      name: Pasiflorų veislė
      description: Nurodo siūlomos pasifloros botaninę arba komercinę veislę (pvz.,
        Purple, Yellow, Granadilla).
    pasta_sauce_texture:
      name: Makaronų padažo tekstūra
      description: Apibūdina padažo konsistenciją (pvz., glotni, su gabalėliais, kreminė),
        kad atitiktų vartotojų skonio ir pojūčio pageidavimus.
    pasta_sauce_variety:
      name: Makaronų padažo rūšis
      description: Klasifikuoja makaronų padažus pagal receptą arba stilių, kad pirkėjai
        galėtų greitai rasti klasikinius, pvz., marinara, arba specialius padažus,
        pvz., vodka ar pesto.
    pastry_crust_state:
      name: Kepinio pagrindo būsena
      description: Apibūdina pagrindo paruošimo arba iškepimo būseną pirkimo metu.
    pastry_crust_style:
      name: Kepinio pagrindo stilius
      description: Nurodo konkretų kepinio stilių arba pagrindo tešlos tipą.
    pastry_filling_type:
      name: Kepinio įdaro tipas
      description: Nurodo pagrindinį kepinio arba bandelės vidinį įdarą.
    patch_adhesion_method:
      name: Lopelio tvirtinimo metodas
      description: Nurodo, kaip lopelis tvirtinamas prie kameros arba padangos (pvz.,
        lipnus, vulkanizuojamas klijais arba aktyvuojamas karščiu).
    patch_backing_material:
      name: Lopo pagrindo medžiaga
      description: Medžiaga, naudojama lopelio gale / pagrinde (pvz., veltinis, ruoželinis
        audinys), kuri liečiasi su dekoruojamu daiktu.
    patch_backing_type:
      name: Lopo pagrindo tipas
      description: Lopelio pagrindas (pvz., termiškai klijuojamas / lyginamas, nulupamas
        ir klijuojamas, kabliuko ir kilpos sistema arba be pagrindo).
    patch_base_material:
      name: Lopo pagrindo medžiaga
      description: Pagrindinė motyvinio lopelio pagrindo / nugarėlės tekstilės medžiaga
        (ne dekoratyviniai elementai).
    patch_border_edge_finish:
      name: Lopelio krašto apdaila
      description: Lopo krašto apdailos būdas (pvz., sujungtas/užlenktas kraštas,
        lazeriu pjautas kraštas), turintis įtakos patvarumui ir išvaizdai.
    patch_placement_area:
      name: Lopelio tvirtinimo vieta
      description: Įprasta numatyta lopelio tvirtinimo vieta ant drabužių / aksesuarų.
    pathogen_removal_capability:
      name: Patogenų pašalinimo galimybės
      description: Nurodo, kokių klasių mikroorganizmus (bakterijas, pirmuonis, virusus)
        siurblys yra sertifikuotas pašalinti.
    pattern_sizing_system:
      name: Iškarpų dydžių sistema
      description: Nurodo regioninę dydžių sistemą arba standartą, naudojamą iškarpos
        dydžių lentelėje (pvz., US, UK, EU).
    peak_style:
      name: Snapelio stilius
      description: Nurodo šalmo skydelio arba snapelio tipą, turintį įtakos apsaugai,
        estetikai ir disciplinos taisyklėms.
    pear_variety:
      name: Kriaušių veislė
      description: Nurodo kriaušių kultivarą arba veislę (pvz., Bartlett, Bosc, Conference),
        leidžiant pirkėjams pasirinkti pageidaujamą skonį, tekstūrą ir kulinarinį
        panaudojimą.
    pearl_luster_grade:
      name: Perlų blizgesio klasė
      description: Kokybinė perlo paviršiaus blizgesio klasė.
    pearl_matching_level:
      name: Perlų suderinamumo lygis
      description: Nurodo, kaip gerai perlai dera partijoje arba vėrinyje (pvz., pagal
        spalvą, dydį ir blizgesį).
    pearl_shape:
      name: Perlo forma
      description: Bendra perlo formos kategorija.
    pearl_surface_condition:
      name: Perlo paviršiaus būklė
      description: Nurodo matomą perlo paviršiaus būklę pagal dėmelių arba defektų
        buvimą ir ryškumą.
    pearl_treatment:
      name: Perlo apdorojimas
      description: Nurodo bet kokį perlui taikytą apdorojimą, turintį įtakos spalvai
        arba išvaizdai.
    pearl_type:
      name: Perlo tipas
      description: Nurodo birių perlų rūšį / kilmę (pvz., gėlavandeniai, Akoya, Taičio,
        Pietų jūros).
    peat_level:
      name: Dūmingumo lygis
      description: Apibūdina durpių dūmų įtakos intensyvumą viskyje – nuo be durpių
        iki stipriai durpinio.
    pedal_and_cleat_system_compatibility:
      name: Pedalų ir klipsų sistemos suderinamumas
      description: Nurodo, su kokiais pedalų arba klipsų standartais suderinamas tarpiklis
        arba pleištas, užtikrinant, kad pirkėjai pasirinktų jų pedalams ir batams
        tinkantį produktą.
    pedal_configuration:
      name: Pedalų konfigūracija
      description: Nurodo, ar kėdė turi vieną pedalą, atskirus / nepriklausomus pedalus
