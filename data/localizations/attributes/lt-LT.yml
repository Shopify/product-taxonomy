    needle_felting_needle_profile:
      name: Vėlimo adatos profilis
      description: Vėlimo adatos skerspjūvis / profilis, kuris turi įtakos pluošto
        judėjimui ir galutiniam rezultatui.
    needle_holder_features:
      name: Adatų laikiklio funkcijos
      description: Išskirtinės adatos laikiklio funkcinės savybės.
    needle_holder_mounting_attachment_method:
      name: Adatų laikiklio montavimo / tvirtinimo metodas
      description: Kaip adatų laikiklis skirtas tvirtinti arba naudoti laikymo metu
        (pvz., magnetinis, su spaustuku, dirželiu).
    needle_holder_style:
      name: Adatos laikiklio stilius
      description: Fizinis adatų laikiklio laikymo arba nešiojimo stilius / dizainas.
    needle_pushing_surface_type:
      name: Adatos stūmimo paviršiaus tipas
      description: Adatos stūmimo paviršiaus tipas / dizainas ant siuvimo delninuko
        (pvz., metalinė įduba, monetos formos detalė arba sustiprintas lopas).
    needle_requirement_beading_pattern:
      name: Reikalaujama adata (karoliukų raštui)
      description: Pagal raštą rekomenduojamas adatos tipas / dydis.
    needle_size_system:
      name: Adatų dydžių sistema
      description: Dydžių standartas, naudojamas adatų dydžių žymėjimui.
    needle_threader_compatible_needle_type:
      name: Adatos įvėriklio suderinamas adatos tipas
      description: Nurodo, su kokių tipų adatomis skirtas veikti įvėriklis (pagal
        adatų kategoriją / paskirtį).
    needle_threader_mechanism_type:
      name: Adatos įvėriklio mechanizmo tipas
      description: Apibūdina, kaip įvėriklis pagauna / pertraukia siūlą per adatos
