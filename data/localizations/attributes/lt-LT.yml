    seat_cover_set_contents:
      name: Sėdynės užvalkalų rinkinio turinys
      description: Apibūdina, kokios dalys įtrauktos į pakuotę (pvz., tik sėdynių
        apačios arba pilnas komplektas su galvos atramomis).
    seat_fabric:
      name: Sėdynės audinys
      description: Pagrindinis audinys, naudojamas kėdės sėdimajai daliai ir atlošo
