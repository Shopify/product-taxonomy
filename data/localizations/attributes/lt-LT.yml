    electric_bicycle_motor_position:
      name: Elektrinio dviračio variklio padėtis
      description: Elektrinio dviračio pavaros variklio vieta, pvz., vidurinė pavara,
        priekinė stebulė, galinė stebulė arba dviguba stebulė.
    electric_bike_class:
      name: Elektrinio dviračio klasė
      description: Klasifikuoja elektrinį dviratį pagal reguliavimo klases, kurios
        apibrėžia greičio ribas ir akceleratoriaus pagalbą.
    electric_guitar_bridge_type:
      name: Elektrinės gitaros tiltelio tipas
      description: Nurodo elektrinės gitaros tiltelio / vibrato sistemos tipą.
    electric_instrument_output_connection_type:
      name: Elektrinio instrumento išvesties jungties tipas
      description: Nurodo fizinę garso išvesties jungtį (-is), esančią elektrinėje
