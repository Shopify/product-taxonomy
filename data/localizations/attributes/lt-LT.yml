      name: Varžto sriegio dydis
      description: Nurodo pateiktų arba suderinamų varžtų sriegio dydžio standartą
        (pvz., M4, M5, M6).
    sculpting_clay_base_type:
      name: Lipdymo molio pagrindo tipas
      description: Apibūdina pagrindinę lipdymo molio sudėtį / pagrindą.
    seafood_cut:
      name: Jūros gėrybių pjaustymo tipas
      description: Apibūdina fizinį jūros gėrybių produkto pjaustymą arba pateikimą
        (pvz., visa žuvis, filė, kepsnys).
    seafood_processing_method:
