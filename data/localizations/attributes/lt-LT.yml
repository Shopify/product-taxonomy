      description: Nurodo, ar jūros gėrybės yra laukinės kilmės, užaugintos ūkyje,
        augalinės kilmės ar iš kito šaltinio, padedant pirkėjams įvertinti tvarumą
        ir kokybę.
    seal_material:
      name: Sandarinimo medžiaga
      description: Medžiaga, naudojama kaklo, riešų ir kulkšnių sandarikliams arba
