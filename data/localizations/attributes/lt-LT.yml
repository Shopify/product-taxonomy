    steering_position:
      name: Vairo padėtis
      description: Nurodo, ar furgonas yra su kairėje, ar dešinėje pusėje esančiu
        vairu.
    steering_pump_pulley_type:
      name: Vairo siurblio skriemulio tipas
      description: Nurodo skriemulio pavaros tipą / sąsają, naudojamą su vairo siurbliu.
    steering_rack_finish_coating:
      name: Vairo mechanizmo apdaila / danga
      description: Nurodo išorinę apdailą / dangą apsaugai nuo korozijos.
    steering_rack_position:
      name: Vairo mechanizmo padėtis
      description: Nurodo, kur vairo mechanizmas montuojamas / naudojamas transporto
        priemonės vairo sistemoje.
    steering_wheel_cover_installation_type:
      name: Vairo dangčio montavimo tipas
      description: Nurodo, kaip vairo dangtis montuojamas / pritvirtinamas ant vairo.
    steering_wheel_grip_material:
