      name: Apšvietimo režimas
      description: Nurodo galimus šviesos veikimo režimus, pvz., nuolatinį švietimą,
        mirksėjimą, stroboskopą arba SOS signalą.
    lily_variety:
      name: Lelijų veislė
      description: Nurodo komercinę / botaninę lelijos rūšį, parduodamą kaip skintą
        gėlę (pvz., Azijinė, Rytinė).
    limb_articulation:
      name: Galūnių lankstumas
      description: Nurodo manekeno galūnių lankstumo arba judrumo lygį (nėra, fiksuotas,
        pusiau lankstus, pilnai lankstus).
    limb_material:
      name: Galūnių medžiaga
      description: Pagrindinė medžiaga, naudojama lanko arba arbaleto pečiams, daranti
