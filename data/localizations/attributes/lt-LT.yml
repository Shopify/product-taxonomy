    needle_threader_packaging_type:
      name: Adatos įvėriklio pakuotės tipas
      description: Kaip produktas parduodamas / supakuotas (vienetinis, daugiapakuotė
        arba rinkinys).
    needlecraft_fabric_color_family:
      name: Rankdarbių audinio spalvų šeima
      description: Standartizuota evenweave audinio spalvų šeima (naudojama kartu
        su spalva filtravimui).
    needlecraft_fabric_composition:
      name: Rankdarbių audinio sudėtis
      description: Nurodo rankdarbių audinio pluošto sudėtį / mišinį (pvz., 100 %
        medvilnė, lino / medvilnės mišinys).
    needlecraft_fabric_weave_type:
      name: Rankdarbių audinio pynimo tipas
      description: Nurodo rankdarbių lino pynimą / konstrukciją (pvz., evenweave arba
        tradicinis linas), turinčią įtakos dygsnių elgsenai ir išvaizdai.
    needlecraft_kit_items_included:
      name: Įtraukti rankdarbių rinkinio elementai
      description: Išvardija pagrindinius komponentus, įtrauktus į rankdarbių rinkinį
        (įrankius ir sunaudojamas medžiagas).
    needlecraft_kit_project_type:
      name: Rankdarbių rinkinio projekto tipas
      description: Nurodo, kokį galutinį gaminį galima pagaminti naudojant rinkinį
        (projekto rezultatas).
    needlecraft_stitching_coverage:
      name: Rankdarbių siuvinėjimo padengimas
      description: Nurodo, ar audinys siuvinėjamas per 1 siūlą / langelį ar per 2
        siūlus (įprasta evenweave ir lino audiniams).
    needlepoint_canvas_mesh_count:
      name: Gobeleno drobės akių tankis
      description: Numatytas drobės akių tankis / skaičius (siūlai colyje), kuriam
        sukurtas dizainas (dažnai vadinamas drobės tankiu).
    needlepoint_frame_canvas_attachment_method:
      name: Gobeleno rėmo drobės tvirtinimo metodas
      description: Apibūdina, kaip gobeleno drobė pritvirtinama prie gobeleno rėmo.
    needlepoint_frame_compatible_stand_type:
      name: Gobeleno rėmo suderinamo stovo tipas
      description: Jei rėmas skirtas montuoti ant stovo, nurodo stovo tipą (-us),
        su kuriuo jis suderinamas.
    needlepoint_frame_contents:
      name: Gobeleno rėmo komplektacija
      description: Nurodo, kurie komponentai ir priedai yra įtraukti su gobeleno rėmu
        (pvz., rėmas, papildomi strypai / lazdelės, smeigtukai / vinutės, sukibimo
        juostos, nešiojimo krepšys).
    needlepoint_frame_tension_adjustment_type:
      name: Gobeleno rėmo įtempimo reguliavimo tipas
      description: Nurodo, kaip (arba ar) naudojimo metu galima reguliuoti rėmo įtempimą.
    needlepoint_pattern_chart_format:
      name: Siuvinėjimo schemos formatas
      description: Kaip gobeleno dizainas pateikiamas siuvinėjimui (schema arba spausdintas
        / pieštas gidas).
    needlepoint_project_type:
      name: Gobeleno projekto tipas
      description: Numatytas galutinis gaminys / kategorija, kuriam skirtas gobeleno
        dizainas.
    net_design:
      name: Tinklo dizainas
      description: Nurodo tinklo konstrukcijos stilių, parodant, ar jis gali susitraukti
        arba susilankstyti patogesniam transportavimui.
    net_mesh_pattern:
      name: Tinklo akių raštas
      description: Nurodo geometrinę tinklo akių formą, kuri gali turėti įtakos matomumui
        ir tvirtumui.
    net_twine_gauge:
      name: Tinklo virvutės storis
      description: Nurodo tinklo virvutės storį arba stiprumą, tradiciškai išreiškiamą
        numeriu (pvz., 18, 36).
    nicotine_source:
      name: Nikotino šaltinis
      description: Nurodo, ar produkte esantis nikotinas yra išgautas iš tabako, sintetinis,
        ar produktas visai neturi nikotino.
    nipple_drive_interface:
      name: Nipelio pavaros sąsaja
      description: Nurodo nipelio pavaros sąsajos arba galvutės stilių / standartą
        (išorinė arba vidinė), lemiantį reikalingą įrankį ir rato surinkimo metodą.
    nock_activation_method:
      name: Strėlės antgalio aktyvavimo metodas
      description: Nurodo mechanizmą, kuriuo įjungiamas arba išjungiamas šviečiančio
        strėlės antgalio LED (pvz., lankątempio spaudimas, judesio jutiklis, rankinis
        jungiklis).
    nock_fitment_code:
      name: Strėlės antgalio suderinamumo kodas
      description: Gamintojo arba pramonės kodas, nurodantis, kuriai strėlės antgalio
        šeimai / serijai jis priklauso.
    nock_throat_size:
      name: Strėlės antgalio griovelio dydis
      description: Nurodo strėlės antgalio griovelio dydį, kuris užsifiksuoja ant
        lanko stygos.
    nock_transparency_level:
      name: Galiuko skaidrumo lygis
      description: Apibūdina, kiek permatoma yra strėlės antgalio medžiaga – skaidri,
        pusiau permatoma, nepermatoma ar švytinti tamsoje – tai turi įtakos matomumui
        ir estetikai.
    nock_type:
      name: Strėlės antgalio tipas
      description: Nurodo strėlėje arba arbaleto strėlėje naudojamą antgalio dizainą,
        pvz., pin, half-moon arba šviečiantis.
    noise_reduction_type:
      name: Triukšmo mažinimo tipas
      description: Nurodo triukšmo mažinimo technologiją, naudojamą (arba nenaudojamą)
        šalmo integruotoje ausinėje, jei taikoma.
    noise_suppression_technology:
      name: Triukšmo slopinimo technologija
      description: Nurodo, ar produktas naudoja pasyvų slopinimą, ar aktyvią elektroninę
        grandinę, kuri suspaudžia garsius garsus ir (arba) sustiprina aplinkos garsą.
    non_slip_base_features:
      name: Neslystančio pagrindo savybės
      description: Nurodo neslystančias savybes, skirtas išlaikyti pedalą vietoje
        naudojimo metu.
    nose_bridge_type:
      name: Nosies tiltelio tipas
      description: Nurodo nosies tiltelio dizainą, turintį įtakos pritaikymui skirtingiems
        veido dydžiams.
    nose_clip_accessories_included:
      name: Įtraukti nosies spaustuko priedai
      description: Išvardija papildomus priedus, pateikiamus su plaukimo nosies spaustuku
        (pvz., ausų kamštukai, laikymo dėklas).
    nose_clip_features:
      name: Nosies spaustuko savybės
      description: Pabrėžia bendras nosies spaustuko funkcines arba komforto savybes.
    nose_coverage_style:
      name: Nosies uždengimo stilius
      description: Nurodo nosies arba snukio apsaugos panelės buvimą ir tipą ant apsauginės
        kaukės nuo vabzdžių.
    noseband_type:
      name: Nosies dirželio tipas
      description: Nurodo nosies dirželio dizainą (jei yra), pateikiamą su kamanomis.
