      description: Nurodo etiketės kraštų konstrukciją / apdailą, darančią įtaką atsparumui
        irimui ir komfortui prie odos.
    logo_label_print_production_method:
      name: Logotipo etiketės spausdinimo / gamybos metodas
      description: Kaip logotipas pritaikomas / suformuojamas ant etiketės paviršiaus.
    long_block_completeness:
      name: Ilgojo variklio bloko komplektiškumas
      description: Nurodo, kokie pagrindiniai komponentai yra įtraukti į ilgojo variklio
