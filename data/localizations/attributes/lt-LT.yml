    protective_shorts_padding_type:
      name: Apsauginių šortų paminkštinimo tipas
      description: Nurodo šortuose naudojamų apsauginių elementų konstrukciją / formatą.
    protective_shorts_padding_zones:
      name: Apsauginių šortų paminkštinimo vietos
      description: Identifikuoja, kurios kūno sritys turi integruotą paminkštinimą
        / apsaugą apsauginiuose šortuose.
    protective_treatment:
      name: Apsauginis apdorojimas
      description: Nurodo bet kokią apsauginę apdailą arba apdorojimą, pritaikytą
        atsparumui dėmėms, vandeniui arba UV spinduliams (pvz., Teflon).
    protector_coverage_area:
      name: Apsaugos zonos plotas
      description: Nurodo, kurią liemens sritį (-is) apsauga yra skirta dengti (pvz.,
        krūtinę, nugarą, šonus).
    puck_bottom_style:
      name: Ritulio apačios stilius
      description: Apibūdina ritulio apatinės dalies profilį, kuris daro įtaką greičiui
        ir kontrolei ant skirtingų shuffleboard paviršių.
    puck_type:
      name: Ritulio tipas
      description: Klasifikuoja ledo ritulio ritulio funkcinį stilių arba numatytą
        naudojimą – nuo oficialaus žaidimo iki kolekcinių suvenyrų.
    pull_buoy_style:
      name: Pull buoy stilius
      description: Nurodo pull buoy funkcinį stilių arba konfigūraciją, pvz., standartinis,
        kulkšninis arba pullkick kombinacija.
    pull_through_weight_material:
      name: Pertraukiamo svarelio medžiaga
      description: Pertraukiamų valymo šluostelių atveju identifikuoja svarelio, naudojamo
        šluostelei pravesti per instrumentą, medžiagą.
    pulp_content:
      name: Tirščių kiekis
      description: Nurodo vaisių arba daržovių minkštimo kiekį gėrime.
    pump_accessories_included:
      name: Į komplektą įeinantys pompos priedai
      description: Nurodo papildomus daiktus, pateikiamus kartu su kamuolių pompa,
        kad pirkėjas suprastų rinkinio pasiūlymo turinį.
    pumping_compatibility:
      name: Suderinamumas su pieno nutraukimu
      description: Nurodo, ar maitinimo liemenėlė yra skirta pieno nutraukimui laisvomis
        rankomis bei maitinimui.
    punch_pad_type:
      name: Smūgių pagalvės tipas
      description: Nurodo smūgių / treniruočių pagalvės dizainą arba stilių, kad pirkėjas
        galėtų pasirinkti tinkamą pagalvę savo treniruočių poreikiams.
    punching_training_bag_shape:
      name: Smūgių / treniruočių maišo forma
      description: Nurodo bokso maišo geometrinį stilių, padedant pirkėjui pasirinkti
        modelius, tinkamus konkretiems smūgių pratimams (pvz., smūgiams iš apačios,
        smūgiams į korpusą).
    puncture_protection_technology:
      name: Pradūrimo apsaugos technologija
      description: Nurodo visas patentuotas arba bendrines apsaugos nuo pradūrimo
        sluoksnių ar šoninių sienelių / karkaso sutvirtinimo technologijas, integruotas
        į padangą (pvz., EXO, SnakeSkin, Kevlar belt).
    puppet_features:
      name: Lėlės savybės
      description: Išryškina funkcines arba veikimo savybes, būdingas lėlei (pvz.,
        judanti burna, garso efektai, apverčiama).
    puppet_puppet_theater_accessory_type:
      name: Lėlių ir lėlių teatrų priedų tipas
      description: Nurodo, kokio tipo aksesuaras yra produktas (pvz., scenos rekvizitas,
        lėlės kostiumas, valdymo juosta, pakaitinė virvelė).
    purity_unit:
      name: Grynumo vienetas
      description: Nurodo, kaip monetos grynumas yra išreiškiamas (praba arba karatai).
    push_up_bar_design:
