        milteliai, servetėlės, pieštukas / markeris).
    stake_shape:
      name: Kuoliuko forma
      description: Apibrėžia palapinės kuolo skerspjūvį arba konstrukcijos stilių,
        kuris turi įtakos laikomajai galiai skirtinguose grunto tipuose.
    stamp_block_features:
      name: Antspaudų blokelio savybės
      description: Išskiria funkcines antspaudų blokelių savybes, tokias kaip matavimo
        tinkleliai, rankenos ar neslystantys paviršiai.
    stamp_block_type:
      name: Antspaudų blokelio tipas
      description: Nurodo antspaudų blokelio konstrukciją / tipą, naudojamą antspaudams
        tvirtinti (pvz., skaidrus akrilinis blokelis, medinis blokelis arba pozicionavimo
        blokelis).
    stamp_set_pieces_included:
      name: Į antspaudų rinkinį įeinančios dalys
      description: Nurodo, kokie komponentai įtraukti į antspaudų ir antspaudų pagalvėlių
        rinkinį (pvz., antspaudai, rašalo pagalvėlės, markeriai).
    stand_padding_material:
      name: Stovo paminkštinimo medžiaga
      description: Medžiaga, naudojama kontaktiniuose taškuose instrumento apdailai
        apsaugoti (pvz., putplastis, guma, silikonas).
    staple_fiber_animal_fiber_type:
      name: Kuokštinio pluošto gyvūninio pluošto tipas
      description: Konkretus gyvūninės kilmės pluošto tipas, kai pagrindinio pluošto
        šaltinio tipas yra gyvūninis.
    staple_fiber_crimp_level:
      name: Štapelio pluošto gofravimo lygis
      description: Natūralaus pluošto banguotumo / garbanotumo laipsnis.
    staple_fiber_preparation_type:
      name: Kuokštinio pluošto paruošimo tipas
      description: Parduodamo pluošto paruošimo / apdorojimo būsena (kaip jis išlygintas
