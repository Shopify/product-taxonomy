      description: Pagrindinė vėlimo technika, kuriai skirtas padėklas / kilimėlis.
    intended_use:
      name: Numatyta paskirtis
      description: Pagrindinis instrumento naudojimo kontekstas.
    intended_use_fleece_fabric:
      name: Numatyta fliso audinio paskirtis
      description: Pagrindinis projektas / paskirtis, kuriam reklamuojamas fliso audinys.
