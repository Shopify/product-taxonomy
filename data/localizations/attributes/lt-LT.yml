    racing_balaclava_ventilation_zones:
      name: Lenktyninės balaklavos ventiliacijos zonos
      description: Kvėpuojančių / tinklinių arba ventiliuojamų zonų išdėstymas, skirtas
        pagerinti oro srautą po šalmu.
    racing_chest_guard_intended_use:
      name: Lenktyninės krūtinės apsaugos numatyta paskirtis
      description: Pagrindinė automobilių sporto disciplina arba kontekstas, kuriam
