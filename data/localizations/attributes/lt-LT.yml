    rack_system_configuration:
      name: Stovo sistemos konfigūracija
      description: Apibūdina bendrą būgnų stovo sistemos išdėstymą / formą.
    racket_dampener_type:
      name: Raketės vibracijos slopintuvo tipas
      description: Nurodo raketės vibracijos slopintuvo montavimo mechanizmą arba
