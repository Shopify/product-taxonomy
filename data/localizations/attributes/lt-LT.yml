        skaitmeninis skaitiklis).
    stitch_types:
      name: Dygsnių tipai
      description: Dygsnių tipai (funkciniai ir dekoratyviniai), kuriuos gali atlikti
        įrenginys.
    stitching_method:
      name: Susiuvimo būdas
      description: Nurodo, kaip tarpusavyje sujungiamos kamuolio dalys.
    stitching_state:
      name: Susiuvimo būsena
      description: Nurodo, ar drabužio dalys pateikiamos nesusiūtos, iš dalies susiūtos,
        susiūtos ar paruoštos dėvėti.
    stock_car_race_series:
      name: Stock car lenktynių serija
      description: Nurodo organizaciją arba lenktynių seriją / klasę, kuriai skirtas
        stock car automobilis.
    stone_adhesion:
      name: Kauliuko atsiskyrimas
      description: Nurodo, ar persiko arba nektarino kauliukas yra lengvai atsiskiriantis,
        prilipęs ar iš dalies atsiskiriantis.
    stone_creation_method:
      name: Akmens sukūrimo būdas
      description: Nurodo, ar akmuo yra natūralus, išaugintas laboratorijoje, imituotas
        ar perdirbtas.
    stone_cut_grade:
      name: Akmens pjūvio kokybė
      description: Nurodo bendrą akmens pjūvio kokybės įvertinimą.
    stone_cut_style:
      name: Akmens pjovimo stilius
      description: Stiklinio akmens pjūvio / facetavimo stilius (pvz., facetuotas
        arba kabošonas).
    stone_fruit_cultivar:
      name: Kaulavaisių veislė
      description: Nurodo konkrečią persiko arba nektarino veislę.
    stone_fruit_variety:
      name: Kaulavaisių rūšis
      description: Atskiria kategorijos porūšius (pvz., persikas, nektarinas, plokščiasis
        persikas).
    stone_setting_type:
      name: Akmens tvirtinimo tipas
      description: Nurodo, kaip akmuo yra pritvirtintas dirbinyje (apvadas, kojelės,
        pavé ir kt.).
    stone_transparency:
      name: Akmens skaidrumas
      description: Stiklinio akmens optinis skaidrumas arba neskaidrumas.
    storage_case_type:
      name: Laikymo dėklo tipas
      description: Nurodo talpyklos tipą, kuriame rinkinys pateikiamas laikymui ir
        transportavimui (pvz., dėžė, dėklas, krepšys).
    storage_compartment_type:
      name: Laikymo skyriaus tipas
      description: Nurodo asmeniniams daiktams skirtą laikymo skyriaus tipą, esantį
        plaukimo plūde.
    storage_media_and_transfer_methods_supported:
      name: Palaikomos laikmenos ir duomenų perdavimo būdai
      description: Palaikomos laikmenos arba prijungimo būdai, skirti pavyzdžių importui
        / eksportui ir projektų išsaugojimui / įkėlimui.
    storage_requirements:
      name: Laikymo reikalavimai
      description: Nurodo, kaip produktas turi būti laikomas prieš atidarymą ir (arba)
        po jo, siekiant išlaikyti kokybę ir saugumą.
    stove_jack_compatibility:
      name: Suderinamumas su krosnelės anga
      description: Nurodo, ar palapinėje yra ugniai atspari anga krosnelės dūmtraukiui.
    straight_pin_application:
      name: Tiesių smeigtukų paskirtis
      description: Nurodo numatytą tiesių smeigtukų naudojimo paskirtį.
    straight_pin_finish:
      name: Tiesių smeigtukų apdaila
      description: Apibūdina smeigtuko paviršiaus apdailą arba dangą (pvz., nikeliuotą),
        turinčią įtakos atsparumui korozijai ir slydimui.
    straight_pin_head_material:
      name: Tiesių smeigtukų galvutės medžiaga
      description: Nurodo smeigtuko galvutės medžiagą (jei yra), pvz., plastiką ar
        stiklą.
    straight_pin_head_shape:
      name: Tiesių smeigtukų galvutės forma
      description: Apibūdina smeigtuko galvutės formą / stilių, turintį įtakos naudojimo
        patogumui ir matomumui.
    strand_configuration:
      name: Gijų išdėstymas
      description: Nurodo, iš kiek atskirų eilių arba grandinių sudaryta piniginės
        grandinėlė (vienguba, dviguba, triguba).
    strand_material:
      name: Gijų medžiaga
      description: Nurodo medžiagą, naudojamą atskiroms gijoms / juostelėms.
    strap_attachment_hardware:
      name: Dirželio tvirtinimo detalės
      description: Nurodo tvirtinimo įrangos tipą / konstrukciją, naudojamą diržui
        pritvirtinti prie instrumento arba atramos taško.
    strap_configuration:
      name: Diržo konfigūracija
      description: Nurodo šalmo tvirtinimo taškų skaičių ant diržo (pvz., 2 taškų,
        4 taškų), kuris yra svarbus prigludimui, saugumui ir lygos reikalavimams.
    strap_functionality:
      name: Diržo funkcionalumas
      description: Nurodo pagrindinę jogos kilimėlio diržo paskirtį arba konstrukciją.
    strap_padding:
      name: Diržo paminkštinimas
      description: Nurodo diržo paminkštinimo lygį, skirtą pagerinti komfortą ir paskirstyti
        svorį.
    strap_side:
      name: Diržo pusė
      description: Nurodo, ar diržas skirtas kairiajam apkaustui, dešiniajam apkaustui,
        ar parduodamas poromis.
    strap_width:
      name: Diržo plotis
      description: Nurodo santykinį petnešų plotį (siauros, vidutinės, plačios), kad
        pirkėjas galėtų pasirinkti pageidaujamą atramą ar padengimą.
    strength_classification:
      name: Stiprumo klasifikacija
      description: Rinkodarinis stiprumo žymėjimas, dažniausiai naudojamas prekių
        ženklų (pvz., Light, Strong, Extra Strong).
    strength_grade:
      name: Stiprumo klasė
      description: Apibūdina numatytą kabliuko ir kilpelės tvirtinimo sistemos laikomąją
        galią arba apkrovos lygį.
    stretch_level:
      name: Tamprumo lygis
      description: Nurodo, kiek tekstilė išsitempia naudojimo metu.
    stretch_type:
      name: Tamprumo tipas
      description: Nurodo, ar audinys pasižymi mechaniniu ar elastiniu tamprumu ir
        kokiomis kryptimis.
    stretcher_bar_material:
      name: Porėmio medžiaga
      description: Medžiaga, naudojama porėmiui / rėmui gaminti (pvz., pušis, eglė,
        tuopa, beržas, MDF ar inžinerinė mediena).
    strike_shield_shape:
      name: Smūgių skydo forma
      description: Nurodo bendrą smūgių skydo smūgiavimo paviršiaus formą.
    string_core_shape:
      name: Stygos šerdies forma
      description: Nurodo apvyniotose stygose naudojamos šerdies vielos formą, kuri
        turi įtakos pojūčiui ir stabilumui.
    string_coverage:
      name: Stygų aprėptis
      description: Nurodo, kurioms stygoms dalinis kapodasteris skirtas prispausti
        / uždengti (pagal skaičių arba įprastą derinį).
    string_end_type:
      name: Stygos galo tipas
      description: Nurodo stygos galo tipą ties tiltu / stygų laikikliu, siekiant
        užtikrinti suderinamumą (ypač svarbu akustinėms, elektrinėms ir kai kurioms
        bosinėms gitaroms).
    string_set_type:
      name: Stygų komplekto tipas
      description: Nurodo, ar produktas yra pilnas stygų rinkinys, ar atskiros keičiamos
        stygos.
    strung_status:
      name: Suvėrimo būsena
      description: Nurodo, ar lakroso lazdos galvutė pateikiama jau su įtemptu tinkleliu,
        ar parduodama be jo.
    strut_placement:
      name: Atramų išdėstymas
      description: Nurodo statramsčio montavimo vietą transporto priemonėje (priekinė
        / galinė ir kairė / dešinė pusė).
    stud_attachment_type:
      name: Smaigų tvirtinimo tipas
      description: Nurodo, kaip dygliai yra pritvirtinti arba išdėstyti ant pado,
        turint įtakos sukibimui, priežiūrai ir atitikčiai lygos reikalavimams.
    stud_configuration:
      name: Smaigų konfigūracija
      description: Apibrėžia dyglių formą ir išdėstymą ant pado, kurie turi įtakos
        sukibimui ir veikimui ant įvairių paviršių.
    stud_material:
      name: Smaigų medžiaga
      description: Nurodo pagrindinę dyglių medžiagą, kuri lemia patvarumą, svorį
        ir atitiktį saugos reikalavimams.
    stuffed_animal_features:
      name: Minkšto žaislo ypatybės
      description: Apibūdina integruotas minkšto žaislo žaidimo ir komforto savybes.
    stump_base_type:
      name: Kriketo vartelių pagrindo tipas
      description: Apibrėžia kriketo vartelių naudojamo pagrindo arba tvirtinimo sistemos
        tipą (smaigas, spyruoklinis grįžimas, pasunkinta guma ir pan.).
    stump_mechanism:
      name: Stulpelių mechanizmas
      description: Nurodo kriketo vartelių grįžimo arba tvirtinimo mechanizmą (pvz.,
        spyruoklinį grįžimą, fiksuotą tvirtinimą).
    stump_size:
      name: Kriketo vartelių dydis
      description: Kategorinis dydžio žymėjimas, naudojamas kriketo varteliams, nurodantis
        įprastą aukštį ir tinkamą žaidėjo amžiaus grupę.
    subwoofer_installation_type:
      name: Žemųjų dažnių garsiakalbio montavimo tipas
      description: Nurodo, kaip žemųjų dažnių garsiakalbis turi būti montuojamas transporto
        priemonės garso sistemoje.
    sugar_cane_variety:
      name: Cukranendrių veislė
      description: Nurodo konkrečią cukranendrių veislę arba rinkos tipą, kuris gali
        turėti įtakos spalvai, saldumui ir skaidulų kiekiui.
    sugar_content_level:
      name: Cukraus kiekio lygis
      description: Klasifikuoja bendrą gėrimų koncentrato cukraus kiekį arba sudėtį,
        kad pirkėjas galėtų greitai rasti įprastus, sumažinto cukraus kiekio arba
        becukrius variantas.
    sugar_refinement_level:
      name: Cukraus rafinavimo lygis
      description: Nurodo rafinavimo laipsnį arba tipą (spalvą, melasos turinį arba
        apdorojimo lygį).
    sugar_source:
      name: Cukraus šaltinis
      description: Nurodo botaninę arba žaliavos kilmę, iš kurios gaunamas cukrus.
    suit_fit:
      name: Kostiumo kirpimas
      description: Bendras kostiumo kirpimas, nurodantis, kaip glaudžiai jis priglunda
        prie kūno.
    suit_pieces:
      name: Kostiumo dalių skaičius
      description: Nurodo, kiek suderintų drabužių yra įtraukta į kostiumo rinkinį
        (pvz., 2 dalių, 3 dalių, 4 dalių).
    suitable_for_anchoring_use:
      name: Tinkamas inkaravimui
      description: Nurodo numatytą valo arba virvės naudojimo paskirtį, susijusią
        su inkaravimu.
    suitable_for_craft_type:
      name: Tinka rankdarbių tipui
      description: Pagrindinė rankdarbių paskirtis, kuriai skirta formavimo viela.
    suitable_for_paint_type:
      name: Tinka dažų tipui
      description: Nurodo, kokio tipo dažams drobė yra skirta arba saugi naudoti.
    suitable_for_swim_stroke:
      name: Tinkama plaukimo stiliui
      description: Nurodo, kuriam (-iems) plaukimo stiliui (-iams) rankų mentelė yra
        sukurta arba optimizuota.
    suitable_mounting_surface_material:
      name: Tinkamos montavimo paviršiaus medžiagos
      description: Nurodo montavimo paviršių arba medžiagą, prie kurios skirta prikibti
        lipni produkto pusė.
    suitable_play_location:
      name: Tinkama žaidimo vieta
      description: Pagrindinė smėlio ir vandens malūnėlio žaislo žaidimo aplinka.
    suitable_riding_conditions:
      name: Tinkamos važinėjimo sąlygos
      description: Nurodo važiavimo sąlygas (pvz., sausas, drėgnas, žiemos), kurioms
        skirtas dviračių tepalas arba valiklis.
    suitable_snow_conditions:
      name: Tinkamos sniego sąlygos
      description: Nurodo pagrindines sniego sąlygas, kurioms skirtas sukibimo vaškas.
    suitable_surface_type:
      name: Tinkamas paviršiaus tipas
      description: Nurodo vaikščiojimo paviršius, kuriems sukurtas sukibimo elementas.
    suitable_table_size:
      name: Tinkamas stalo dydis
      description: Nurodo biliardo arba snukerio stalo ilgį (-ius), kuriems apšviesti
        skirtas šviestuvas.
    sun_protection_rating_upf:
      name: Apsaugos nuo saulės įvertinimas (UPF)
      description: Nurodo sertifikuotą drabužio apsaugos nuo saulės lygį pagal UPF
        standartą.
    sun_shade_attachment_method:
      name: Uždangalo nuo saulės tvirtinimo būdas
      description: Nurodo, kaip apsauga nuo saulės tvirtinama prie lango arba priekinio
        stiklo.
    sun_shade_style:
      name: Apsaugos nuo saulės tipas
      description: Produkto konstrukcija arba formatas, skirtas apsaugai nuo saulės
        išskleisti ir laikyti.
    sunchoke_variety:
      name: Topinambų veislė
      description: Nurodo konkrečią topinambų (Jeruzalės artišokų) veislę, suteikdama
        išsamią informaciją sodininkams, virėjams ir išrankiems pirkėjas.
    sunflower_oil_variety:
      name: Saulėgrąžų aliejaus rūšis
      description: Klasifikuoja saulėgrąžų aliejaus riebalų rūgščių profilį arba veislę
        (pvz., didelio oleino kiekio, vidutinio oleino kiekio, linolinis).
    sunflower_variety:
      name: Saulėgrąžų veislė
      description: Saulėgrąžų veislė (įprastos rinkoje naudojamos skintų gėlių veislės).
    support_brace_features:
      name: Įtvaro ypatybės
      description: Išvardija svarbias riešo įtvaro funkcines savybes, pvz., kvėpuojantį
        audinį, nuimamą įtvarą arba reguliuojamą metalinę plokštelę.
    support_leg_count:
      name: Atraminių kojų skaičius
      description: Kojų, besiliečiančių su žeme naudojant šaudymo atramą, skaičius
        (pvz., monopodas, bipodas, trikojis).
    support_padding:
      name: Atramos paminkštinimas
      description: Nurodo, ar diržas / atrama turi integruotą paminkštinimą kontakto
        vietose (kaklo, peties ar nykščio srityje).
    support_structure_type:
      name: Atraminės konstrukcijos tipas
      description: Nurodo konstrukcijos būdą, naudojamą užtvarai nuo vėjo išlaikyti
        vertikalioje padėtyje.
    supported_bowling_delivery_types:
      name: Palaikomi metimo tipai
      description: Nurodo kriketo metimų variantus, kuriuos gali imituoti įrenginys,
        pvz., inswing, outswing ir įvairius sukimo tipus.
    supported_dive_modes:
      name: Palaikomi nardymo režimai
      description: Nurodo nardymo režimus, kuriuos palaiko nardymo kompiuteris, pvz.,
        Air, Nitrox arba Gauge.
    supported_equipment_type:
      name: Palaikomas įrangos tipas
      description: Nurodo žiemos sporto įrangą, kuriai laikyti skirtas stovas (pvz.,
        slidėms, snieglentėms, slidžių lazdoms).
    supported_spin_types:
      name: Palaikomi sukimo tipai
      description: Nurodo kamuolio sukimo variantus, kuriuos gali suteikti paleidimo
        įrenginys.
    supported_spool_bobbin_types:
      name: Palaikomi ričių / špulių tipai
      description: Nurodo, kokių formatų rites / špules gali priimti elektrinis vyniotuvas.
    surf_wax_temperature_rating:
      name: Banglenčių vaško temperatūros diapazonas
      description: Nurodo vandens temperatūros diapazoną, kuriam sukurtas vaškas,
        užtikrinant optimalų sukibimą skirtingomis klimato sąlygomis.
    surface_coating_or_finish:
      name: Paviršiaus danga arba apdaila
      description: Nurodo bet kokį apsauginį arba veikimą gerinantį paviršiaus apdorojimą,
        taikomą replėms.
    surface_coating_or_wrap:
      name: Paviršiaus danga arba apvija
      description: Išorinis paviršiaus padengimas, naudojamas centrinei lazdelei (o
        kartais ir rankinėms lazdelėms) geresniam sukibimui ir valdymui užtikrinti.
    surface_finish:
      name: Paviršiaus apdaila
      description: Apibūdina kamuolio paviršiaus pojūtį / tekstūrą, kuri turi įtakos
        sukibimui ir judėjimui kontaktinio žongliravimo metu.
    surface_finish_prep:
      name: Paviršiaus apdaila / paruošimas
      description: Nurodo trinties paviršiaus būklę pardavimo metu (pvz., atnaujintas,
        mechaniškai apdirbtas, liejimo būklės).
    surface_types_included:
      name: Įtraukti paviršių tipai
      description: Nurodo, kokį piešimo ar tapybos paviršių apima rinkinys (jei apima),
        pvz., drobę, popieriaus bloknotą, medines plokštes arba jokio.
    surfboard_construction:
      name: Banglentės konstrukcija
      description: Nurodo pagrindinę banglentės konstrukcijos technologiją arba sluoksniavimo
        būdą.
    surfboard_tail_shape:
      name: Banglentės uodegos forma
      description: Apibrėžia banglentės uodegos kontūrą, kuris turi įtakos manevringumui
        ir stabilumui.
    suspension_bushing_type:
      name: Pakabos įvorės tipas
      description: Nurodo pakabos įvorės funkcinį arba montavimo tipą.
    suspension_configuration:
      name: Pakabos konfigūracija
      description: Apibūdina, ar triratis turi pakabą ir kur ji yra įrengta.
    suspension_material:
      name: Pakabinimo elementų medžiaga
      description: Nurodo grandinių, virvių arba trosų, naudojamų sūpynėms pakabinti,
        medžiagą.
    suspension_trainer_accessories_included:
      name: Įtraukti pakabinamo treniruoklio priedai
      description: Išvardija papildomus daiktas, tiekiamus kartu su treniruoklio rinkiniu
        (pvz., durų tvirtinimą, prailginimo diržą, laikymo krepšį), padėdamas pirkėjas
        suprasti, kas yra komplekte, ir palyginti rinkinio pasiūlymas vertę.
    suspension_trainer_anchor_type:
      name: Pakabinamo treniruoklio tvirtinimo tipas
      description: Apibrėžia tvirtinimo būdą arba tvirtinimo tašką, kuriam skirti
        diržai (pvz., durims, luboms, medžiui), nurodydamas suderinamumą su naudotojo
        aplinka.
    suspension_type:
      name: Pakabos tipas
      description: Nurodo, ar šakė yra standi, ar naudoja tam tikrą pakabos sistemą
        (orinę, spyruoklinę, hibridinę, elastomerinę ir kt.), padėdama dviratininkui
        pritaikyti ją savo važiavimo stiliui.
    sustain_pedal_form_factor:
      name: Sostenuto pedalo forma
      description: Apibūdina fizinį sostenuto pedalo tipą (pvz., pianino tipo kojinį
        pedalą arba kompaktišką kojinį jungiklį), kuris turi įtakos naudojimo pojūčiui
        ir paskirčiai.
    sustain_pedal_switch_type:
      name: Sostenuto pedalo jungiklio tipas
      description: Nurodo, ar pedalas siunčia momentinį (veikia laikant nuspaustą),
        ar fiksuojamą (perjungiamą) signalą.
    sustainability_certification:
      name: Tvarumo sertifikavimas
      description: Medienos medžiagos aplinkosauginis arba atsakingo tiekimo sertifikavimas.
    swab_intended_bassoon_section:
      name: Valymo šluotelės paskirtis fagoto daliai
      description: Nurodo, kuriai fagoto daliai valyti skirta šluotelė (skirtingiems
        kanalams ir dalims reikalingos skirtingų formų ir dydžių šluotelės).
    swab_style:
      name: Valymo šluotelės tipas
      description: Apibūdina valymo šluotelės konstrukciją arba formą, skirtą praeiti
        per saksofono vidų arba pasiekti tam tikras jo vietas.
    swab_weight_material:
      name: Valymo šluotelės svarelio medžiaga
      description: Pratraukiamo svarelio arba vediklio medžiaga (jei yra), turinti
        įtakos įbrėžimų rizikai ir patvarumui.
    swab_weight_style:
      name: Valymo šluotelės svarelio stilius
      description: Nurodo, kaip šluotelė pasunkinta, kad galėtų būti pratraukta per
        fagoto kanalą.
    sway_bar_adjustability:
      name: Stabilizatoriaus reguliuojamumas
      description: Nurodo, ar ir kaip galima reguliuoti stabilizatoriaus standumą
        (dažniausiai naudojant kelias traukės tvirtinimo angas).
    sway_bar_coating:
      name: Stabilizatoriaus danga
      description: Stabilizatoriaus paviršiaus apdorojimas arba danga, skirta atsparumui
        korozijai ir išvaizdai pagerinti.
    sway_bar_fitment_front_rear_kit:
      name: Stabilizatoriaus montavimo vieta (priekis / galas / rinkinys)
      description: Nurodo, ar stabilizatorius skirtas priekinei ašiai, galinei ašiai,
        ar parduodamas kaip priekinės ir galinės ašies rinkinys.
    sweatshirt_pocket_type:
      name: Džemperio kišenių tipas
      description: Apibūdina džemperyje esančių kišenių tipą.
    sweet_potato_variety:
      name: Batatų veislė
      description: Nurodo konkrečią batatų veislę arba rinkos tipą.
    sweet_spot_position:
      name: Smūgio taško padėtis
      description: Nurodo, kurioje lazdos dalyje yra optimalus smūgio taškas, turintis
        įtakos žaidimo stiliui ir aikštės sąlygoms.
    sweetener_presence:
      name: Saldiklių buvimas
      description: Nurodo, ar riešutų svieste yra pridėtinių saldiklių ir koks jų
        kiekis.
    sweetening_type:
      name: Saldinimo tipas
      description: Apibūdina, kaip produktas yra saldinamas arba koks yra jo saldumo
        lygis.
    swim_armband_construction_type:
      name: Plaukimo rankovių konstrukcijos tipas
      description: Apibrėžia rankovių konstrukcijos tipą arba plūdrumo mechanizmą
        (pripučiamos, iš vientiso putplasčio, hibridinės ir pan.).
    swim_belt_purpose:
      name: Plaukimo diržo paskirtis
      description: Funkcinė plaukimo diržo klasifikacija (pvz., plūdrumo palaikymas,
        vandens bėgimas, pasipriešinimo treniruotės, stacionarus tvirtinimas, pasipriešinimo
        parašiuto tvirtinimas, svorio balastas, saugus brendimas).
    swim_board_features:
      name: Plaukimo lentos ypatybės
      description: Apibūdina specialias plaukimo lentos savybes arba patobulinimus,
        kurie gerina naudojimą ar saugumą.
    swim_bottom_length:
      name: Maudymosi šortų ilgis
      description: Klasifikuoja bendrą kojų dengimo ilgį maudymosi šortuose (pvz.,
        trumpi šortai arba iki kelių).
    swim_buoy_features:
      name: Plaukimo plūduro ypatybės
      description: Apibūdina papildomas svarbias savybes arba priedus, didinančius
        plūduriuojančio plūduro matomumą, saugumą ar funkcionalumą.
    swim_cap_style:
      name: Plaukimo kepuraitės tipas
      description: Apibrėžia plaukimo kepuraitės konstrukciją arba dizaino tipą (pvz.,
        ilgiems plaukams, lenktyninė kupolo formos, burbulinė, turbano tipo).
    swim_diaper_feature:
      name: Maudymosi sauskelnių ypatybė
      description: Nurodo, ar maudymosi kelnaitės turi integruotą nepralaidžią sauskelnių
        funkciją, ar reikalauja / nenumato atskirų maudymosi sauskelnių.
    swim_trainer_features:
      name: Plaukimo treniruoklio ypatybės
      description: Apibūdina papildomas plaukimo treniruoklio funkcines arba komforto
        savybes.
    swim_trainer_type:
      name: Plaukimo treniruoklio tipas
      description: Apibrėžia plaukimo treniruoklio konstrukcijos tipą arba formatą,
        padedantį filtruoti pagal dizainą ir treniruočių paskirtį.
    swim_training_focus:
      name: Plaukimo treniruočių fokusas
      description: Nurodo pagrindinį treniruočių tikslą, kuriam skirta mentelė (pvz.,
        technika, jėga, raumenų izoliavima).
    swim_weight_style:
      name: Plaukimo svorių stilius
      description: Klasifikuoja plaukimo svorio formos tipą, padedantį pirkėjas atskirti
        iš esmės skirtingus produktų tipus toje pačioje kategorijoje.
    swimbait_buoyancy:
      name: Plaukiančio masalo plūdrumas
      description: Nurodo, kaip plaukiantis masalas elgiasi vandens sluoksnyje (plūduriuoja,
        kabo, skęsta ir pan.), kad žvejys galėtų pasirinkti tinkamą masalą pagal norimą
        gylį ir traukimo būdą.
    swimbait_style:
      name: Plaukiančio masalo tipas
      description: Klasifikuoja plaukiančio masalo konstrukciją arba veikimo dizainą,
        pvz., mentės uodegos ar slystantį masalą.
    swimwear_pieces_included:
      name: Į komplektą įeinančios maudymosi drabužių dalys
      description: Išvardija atskirus drabužių komponentas, įtrauktus į burkinio rinkinį,
        kad pirkėjas tiksliai žinotų, kas yra pakuotėje.
    swimwear_set_pieces_included:
      name: Komplekte esančios maudymosi drabužių komplekto dalys
      description: Išvardija drabužių komponentas, pateikiamus burkinio rinkinyje,
        kad pirkėjas tiksliai žinotų, ką gaus (pvz., viršutinę dalį, tamprias kelnes,
        hidžabą / kepuraitę).
    swing_attachment_connection_type:
      name: Sūpynių tvirtinimo / prijungimo tipas
      description: Tvirtinimo tipas, naudojamas sūpynėms pakabinti prie atramos (pvz.,
