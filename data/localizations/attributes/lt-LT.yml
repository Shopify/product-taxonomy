        Kai taikoma, naudokite standartinį arba gamintojo žymėjimą.
    steering_column_adjustability_features:
      name: Vairo kolonėlės reguliavimo funkcijos
      description: Nurodo, kokios reguliavimo funkcijos integruotos į vairo kolonėlę.
    steering_column_ignition_provision:
      name: Vairo kolonėlės uždegimo sistemos pritaikymas
      description: Nurodo, ar vairo kolonėlė pritaikyta uždegimo spynelės cilindrui
