      description: Nurodo atsparumą vandens poveikiui po pilno sukietėjimo (be papildomo
        sandariklio).
    sensor_functions:
      name: Jutiklio funkcijos
      description: Nurodo, kokius dviračių sporto rodiklius matuoja jutiklis.
    sensor_measurement_mode:
      name: Jutiklio matavimo režimas
      description: Nurodo, kokius rodiklius gali fiksuoti jutiklis (pvz., tik kadenciją,
        tik greitį, greitį ir kadenciją kartu).
    sensor_mounting_position:
      name: Jutiklių tvirtinimo padėtis
      description: Nurodo vietą ant dviračio arba dviratininko, kur montuojamas jutiklis,
        pvz., švaistiklis, rato stebulė arba batas. Tai turi įtakos suderinamumui
        su skirtingomis dviračių konfigūracijomis. Tai turi įtakos suderinamumui su
        skirtingomis dviračių konfigūracijomis.
    sensor_mounting_type:
      name: Jutiklių tvirtinimo tipas
      description: Nurodo, kaip MAP jutiklis tvirtinamas prie įsiurbimo kolektoriaus
