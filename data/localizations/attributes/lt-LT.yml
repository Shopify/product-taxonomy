    spread_variety:
      name: Užtepėlės rūšis
      description: Klasifikuoja konkretų vaisinės užtepėlės tipą (pvz., džemas, želė,
        marmeladas, kremas), kad pirkėjai galėtų atskirti skirtingus paruošimo būdus
        ir tekstūras.
    spreader_bar_type:
      name: Trikojo stovo tipas
      description: Nurodo su diržais pateikiamą arba suderinamą skersinio ar kablių
        sistemos tipą.
    sprint_canoe_class:
      name: Sprinto kanojų klasė
      description: Nurodo oficialų sprinto kanojų varžybų klasės žymėjimą.
    sprout_presentation:
      name: Daigų pateikimo forma
      description: Nurodo fizinę produkto pateikimo formą (pvz., švieži daigai, mikrožalumynai,
        gyvas auginimo vazonėlis, milteliai).
    squash_and_gourd_variety:
      name: Moliūgų ir cukinijų veislė
      description: Nurodo konkrečią moliūgų ar cukinijų veislę arba prekybinį tipą,
        padedant pirkėjams greitai rasti norimą variantą.
    stability_class:
      name: Stabilumo klasė
      description: Bendroji stabilumo kategorija, nustatyta pagal skrydžio reitingus
        arba rinkodaros teiginius.
    stabilizer_thread_size:
      name: Stabilizatoriaus sriegio dydis
      description: Sriegio specifikacija, naudojama stabilizatoriui arba priedui pritvirtinti
        prie lanko ar arbaleto.
    stabilizer_type:
      name: Stabilizatoriaus tipas
      description: Nurodo lanko arba arbaleto stabilizatoriaus tipą arba padėties
        klasifikaciją.
    stages_supported:
      name: Palaikomi etapai
      description: Nurodo, kiek pakopų raketa arba rinkinys yra skirtas turėti skrydžio
        metu.
    stain_remover_format:
      name: Dėmių valiklio formatas
      description: Nurodo produkto pateikimo / naudojimo formatą, skirtą transporto
