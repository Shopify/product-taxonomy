    knee_pad_pocket_type:
      name: Antkelių kišenės tipas
      description: Nurodo, ar ir kaip drabužis pritaikytas apsauginiams antkeliams.
    knee_pad_style:
      name: Antkelių tipas
      description: Apibūdina kelio apsaugos konstrukcijos stilių arba formą (pvz.,
        mova, įtvaras, apsauga).
    knee_protection_design:
      name: Kelio apsaugos dizainas
      description: Nurodo lankstinių kelio sekcijų skaičių, integruotą į kojų apsaugą.
