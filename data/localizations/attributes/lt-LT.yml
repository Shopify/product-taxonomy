        ir gumos mišiniu jų įprastam žaidimo paviršiui.
    racket_string_pattern:
      name: Raketės stygų raštas
      description: Nurodo pagrindinių ir skersinių stygų skaičių stygų tinkle (pvz.,
        16 × 18), kuris daro įtaką kontrolei, sukimui ir patvarumui.
    racket_stringing_status:
      name: Raketės įtempimo būsena
      description: Nurodo, ar raketė parduodama įtempta, neįtempta ar iš anksto įtempta.
    racket_weight_class:
      name: Raketės svorio klasė
      description: Pateikia standartines badmintono „U“ svorio kategorijas, leidžiančias
