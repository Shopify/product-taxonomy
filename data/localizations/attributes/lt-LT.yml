    steering_column_shaft_end_interface_type:
      name: Vairo kolonėlės veleno galo jungties tipas
      description: Nurodo vairo kolonėlės veleno galo jungties tipą (pvz., šlicinė,
        double D, su grioveliu).
    steering_column_shift_type:
      name: Vairo kolonėlės pavarų perjungimo tipas
      description: Nurodo, ar vairo kolonėlėje yra integruotas pavarų perjungimo mechanizmas
