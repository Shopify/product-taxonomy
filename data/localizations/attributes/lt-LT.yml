    section_orientation_compatibility:
      name: Sekcijos orientacijos suderinamumas
      description: Nurodo, ar priedas tinka kairinės, dešininės ar universalios orientacijos
        sekcijai.
    sectional_configuration:
      name: Modulinės sofos konfigūracija
      description: Apibrėžia konkretų modulinės sofos elementą arba orientaciją (pvz.,
