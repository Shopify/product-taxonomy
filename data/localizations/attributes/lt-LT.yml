    kit_items_included:
      name: Į rinkinį įeinantys elementai
      description: Išvardija pagrindinę įrangą ir reikmenis, įtrauktus į vyno gamybos
        rinkinį, kad pirkėjai galėtų atskirti pradinius rinkinius nuo tik ingredientų
        papildymų.
    kit_pouch_case_type:
      name: Rinkinio maišelio / dėklo tipas
      description: Nurodo įtraukto priežiūros rinkinio laikymo sprendimo tipą (jei
