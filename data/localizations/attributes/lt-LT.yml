    shaft_length_type:
      name: Kotelio ilgio tipas
      description: Pramonėje naudojamas standartinis smiginio kotelių dydžių žymėjimas
        (pvz., Short, Medium), kai nepateikiami tikslūs milimetriniai matmenys.
    shaft_shape:
      name: Veleno forma
      description: Apibrėžia tonfos veleno skerspjūvio profilį (pvz., apvalus, kvadratinis,
