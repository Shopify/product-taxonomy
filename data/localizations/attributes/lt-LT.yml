        rezultatą.
    staple_fiber_source_type:
      name: Kuokštinio pluošto kilmės tipas
      description: Bendroji pluošto kilmės kategorija.
    starch_processing_type:
      name: Krakmolo apdorojimo tipas
      description: Nurodo, ar krakmolas yra natūralus, ar fiziškai / chemiškai modifikuotas
