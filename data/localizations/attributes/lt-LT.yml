    racket_grip_size:
      name: Raketės rankenos dydis
      description: Nurodo raketės rankenos dydžio klasifikaciją pagal apimtį (pvz.,
        G1–G6), siekiant užtikrinti tinkamą pritaikymą rankai ir komfortą.
    racket_sport_shoe_court_surface:
      name: Raketės sporto batelių aikštelės paviršius
      description: Nurodo teniso aikštelės paviršių, kuriam batas yra sukurtas arba
