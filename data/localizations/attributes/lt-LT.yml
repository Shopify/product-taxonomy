        ir kt. – kuri lemia suderinamumą su vairo kolonėle ir rėmu.
    steering_cable_end_fitting_type:
      name: Vairo troselio galinės jungties tipas
      description: Nurodo vandens transporto priemonės vairo troselio galinių jungčių
