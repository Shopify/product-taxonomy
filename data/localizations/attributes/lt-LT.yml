        (kai taikoma), pvz., karoliukus, sėklas arba granules.
    shaker_shell_material:
      name: Barškučio korpuso medžiaga
      description: Nurodo pagrindinę „egg shaker“ korpuso / apvalkalo (išorinio korpuso)
        medžiagą.
    shallot_variety:
      name: Šalotinių svogūnų rūšis
      description: Identifikuoja konkrečią šalotinių svogūnų veislę, rinkos tipą arba
        rūšį.
    shank_style:
      name: Kojelės stilius
      description: Apibūdina bendrą kandiklio kojelių formą / konfigūraciją (pvz.,
        tiesios, lenktos, „grazing“ tipo).
    shapewear_enhancement_feature:
      name: Formuojančio apatinio trikotažo papildoma funkcija
      description: Pabrėžia pagrindinę funkcinę drabužio savybę (pvz., pilvo formavimas,
        sėdmenų pakėlimas, nepralaidus pamušalas).
    sheath_type:
      name: Makšties tipas
      description: Su kolekciniu peiliu pateikiamos makšties / dėklo tipas.
    sheet_music_clip_padding_material:
      name: Natų spaustuko paminkštinimo medžiaga
      description: Bet kokio spaustuko žandikaulių / laikymo paminkštinimo medžiaga,
