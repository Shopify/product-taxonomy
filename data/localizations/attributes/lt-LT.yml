      description: Nurodo augalą arba žaliavą, iš kurios gaunamas sirupas.
    print_placement:
      name: Spaudos vieta
      description: Nurodo, kur ant marškinėlių yra pagrindinis grafikos elementas
        / logotipas.
    print_technique:
      name: Spausdinimo technika
      description: Nurodo dekoravimo / spausdinimo metodą, naudojamą marškinėlių grafikai.
    printable_canvas_intended_use:
      name: Spausdinamos drobės paskirtis
      description: Pagrindinė paskirtis, kuriai optimizuota spausdinama drobė
    printable_fabric_format:
      name: Spausdinamo audinio formatas
      description: Nurodo, kaip pateikiama spausdinama medvilnė (atskiri lapai ar
        ištisinis ritinys), kas turi įtakos spausdintuvo padavimui ir darbo eigai.
    prism_material:
      name: Prizmės medžiaga
      description: Nurodo paties optinio elemento (prizmės) medžiagą, kuri Impact
        aiškumu, patvarumu ir atsparumu įbrėžimams.
    prisoner_transport_configuration:
      name: Kalinių transportavimo konfigūracija
      description: Nurodo, ar ir kaip furgonas pritaikytas sulaikytųjų / kalinių transportavimui.
    prisoner_transport_partition_type:
      name: Kalinių transportavimo pertvaros tipas
      description: Vidinės pertvaros / grotų tipo, skiriančio priekinį ir galinį skyrius,
        tipas.
    privacy_or_acoustic_feature:
      name: Privatumo arba akustinė funkcija
      description: Nurodo integruotus privatumo arba akustinius elementus, tokius
        kaip pertvarų panelės, akustinės sienelės arba pilni uždari moduliai.
    processing_state:
      name: Apdorojimo būsena
      description: Nurodo, ar plunksnos sterilizuotos / išplautos arba kitaip paruoštos
        rankdarbiams.
    produce_grade:
      name: Produkcijos klasė
      description: Klasifikuoja kivių kokybės klasę pagal dydį, išvaizdą ir būklę.
    produce_growth_stage:
      name: Produkcijos augimo stadija
      description: Nurodo augimo stadiją, kurioje produktas parduodamas (pvz., mikrožalumynai,
        jauni lapai, subrendę lapai, gyvas augalas, sėklos).
    produce_washing_state:
      name: Produkcijos plovimo būsena
      description: Nurodo, ar žalumynai yra nuplauti ir paruošti vartoti.
    profile_shape:
      name: Profilis / forma
      description: Bendras cimbolo išlinkimas / profilis (kaip staigiai jis kyla nuo
        krašto iki kupolo).
    projectile_ammunition_type:
      name: Sviedinio / amunicijos tipas
      description: Nurodo žaislinio ginklo naudojamų sviedinių arba eksploatacinių
        medžiagų tipą, jei taikoma.
    projectile_finish:
      name: Sviedinio paviršiaus apdaila
      description: Nurodo bet kokią BB šratui taikomą paviršiaus dangą, padedančią
        atsparumui korozijai arba matomumui (pvz., dengtas variu, cinkuotas, dažytas).
    projectile_type:
      name: Sviedinio tipas
      description: Nurodo, kokio tipo sviedinius produktas naudoja arba kam yra skirtas.
    pronation_support:
      name: Pronacijos palaikymas
      description: Nurodo eisenos arba pronacijos tipą, kuriam sportbačiai yra pritaikyti.
    propellant_type:
      name: Propelento tipas
      description: Nurodo propelentą, kuriam detalė arba priedas yra skirtas naudoti.
    propeller_blade_cup:
      name: Propelerio mentės užlenkimas
      description: Nurodo mentės užlenkimo (galinio krašto išlinkimo) dydį.
    propeller_hub_type:
      name: Propelerio stebulės tipas
      description: Nurodo propelerio naudojamą stebulės / įvorės sistemą (keičiami
        stebulės rinkiniai arba įpresuota sistema).
    propeller_rotation:
      name: Propelerio sukimosi kryptis
      description: Nurodo propelerio sukimosi kryptį.
    protectant_formula_base:
      name: Apsauginės priemonės formulės pagrindas
      description: Nurodo apsauginės priemonės formulės pagrindą, kuris turi įtakos
        blizgesiui, pojūčiui ir valymui (pvz., vandens pagrindo arba tirpiklio pagrindo).
    protection_coverage_area:
      name: Apsaugos dengimo sritis
      description: Nurodo, kurias laikrodžio dalis dengia apsauginis priedas.
    protection_level:
      name: Apsaugos lygis
      description: Nurodo dėklo numatytą apsaugos lygį instrumento transportavimui
        ir laikymui.
    protective_case_interior_protection_type:
      name: Apsauginės dėžės vidaus apsaugos tipas
      description: Apibūdina pagrindinį vidinės apsaugos metodą, naudojamą turiniui
        pritvirtinti ir amortizuoti.
    protective_case_shell_type:
      name: Apsauginio dėklo korpuso tipas
      description: Nurodo bendrą dėklo išorinės konstrukcijos tipą (standumą), turintį
