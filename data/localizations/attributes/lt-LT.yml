    intended_repair_location:
      name: Numatyta remonto vieta
      description: Nurodo, kurią padangos vietą skirtas remontuoti rinkinys.
    intended_seating_position:
      name: Numatyta sėdėjimo vieta
      description: Nurodo transporto priemonės sėdėjimo vietą, kurioje saugos diržo
