    protective_gear_padding_type:
      name: Apsauginės įrangos paminkštinimo tipas
      description: Nurodo apsauginėje įrangoje naudojamo paminkštinimo tipą apsaugai
        nuo smūgių.
    protective_gear_safety_certifications:
      name: Apsauginės įrangos saugos sertifikatai
      description: Nurodo pripažintus sporto šakai skirtus saugos arba veikimo standartus,
        kuriuos atitinka produktas, pvz., NOCSAE arba ASTM žolės riedulio šalmo standartus.
    protective_pad_components_included:
      name: Įtraukti apsauginio paminkštinimo komponentai
      description: Nurodo, kurie konkretūs apsauginiai daiktai yra įtraukti į kelių
        dalių rinkinį, kad pirkėjas tiksliai žinotų, kurios kūno dalys yra apsaugotos.
    protective_shorts_intended_use:
      name: Apsauginių šortų numatyta paskirtis
      description: Pagrindinė važiavimo / lenktynių disciplina, kuriai apsauginiai
