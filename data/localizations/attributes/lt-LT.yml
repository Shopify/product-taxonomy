      description: Nurodo mechanizmą, naudojamą sulankstomo peilio ašmenims užfiksuoti
        atviroje padėtyje, arba pažymi neužrakinamus dizainus.
    knife_locking_mechanism:
      name: Peilio užfiksavimo mechanizmas
      description: Nurodo mechanizmo tipą, kuris fiksuoja ašmenis atviroje padėtyje,
        tiesiogiai apibrėžiant saugumą, tvirtumą ir naudojimo paprastumą fiksuojamiems
        peiliams.
    knife_opening_mechanism:
      name: Peilio atidarymo mechanizmas
      description: Apibūdina, kaip ašmenys išskleidžiami iš rankenos, išskiriant rankinį,
        asistuojamą, automatinį ir specializuotą atidarymo stilių.
    knife_system:
