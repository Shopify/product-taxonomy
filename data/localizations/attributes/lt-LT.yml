    mouthpiece_facing_length:
      name: Kandiklio facing ilgis
      description: Nurodo kandiklio facing (lay) kreivės ilgio kategoriją (ne bendrą
        kandiklio ilgį), kuri turi įtakos atsakui, pasipriešinimui ir liežuvėlio suderinamumui.
    mouthpiece_material:
      name: Kandiklio medžiaga
      description: Nurodo blowout (šventinio švilpuko) kandiklio / antgalio, kuris
        liečiasi su burna, medžiagą, kuri gali skirtis nuo pagrindinio korpuso medžiagos.
    mouthpiece_shank_receiver_size:
      name: Kandiklio koto / lizdo dydis
      description: Nurodo kandiklio lizdo / koto standartą, suderinamą su fliugelhornu.
    mouthpiece_shank_size:
      name: Kandiklio koto dydis
      description: Nurodo kandiklio koto / lizdo suderinamumo standartą, siekiant
        užtikrinti suderinamumą su numatytu variniu pučiamuoju instrumentu.
    mouthpiece_shank_type:
      name: Kandiklio koto tipas
      description: Nurodo kandiklio lizdo / koto standartą suderinamumui užtikrinti
        (jei taikoma).
    mouthpiece_style:
      name: Kandiklio stilius
      description: Klasifikuoja kandiklio dalies dizainą / formą curb tipo kandiklyje,
        kuris turi įtakos spaudimo taškams, griežtumui ir žirgo pasirinkimui.
    mouthpiece_type:
      name: Kandiklio tipas
      description: Kandiklio tipas pūtimo gale (integruotas, nuimamas arba papildomai
        tvirtinamas).
    movement_mechanism:
      name: Judėjimo mechanizmas
      description: Nurodo, kaip suolas juda naudojimo metu (supasi, slysta, linguoja
        ir kt.).
    muffin_size:
      name: Keksiuko dydis
      description: Klasifikuoja fizinį keksiuko dydžio formatą (pvz., mini, standartinis,
        jumbo).
    mushroom_variety:
      name: Grybų veislė
      description: Nurodo konkrečią produkte esančių grybų arba triufelių rūšį ar
        veislę (pvz., Shiitake, King Oyster, Black Truffle).
    music_stand_desk_tilt_adjustment:
      name: Natų stovo plokštės pasvirimo reguliavimas
      description: Nurodo, ar ir kaip galima reguliuoti plokštės kampą.
    music_stand_intended_use:
      name: Natų stovo paskirtis
      description: Nurodo pagrindinę numatytą stovo naudojimo aplinką / paskirtį.
    musical_block_pitch_type:
      name: Muzikinio bloko tono tipas
      description: Apibūdina, ar muzikinis blokas skleidžia apibrėžtą toną (suderintą),
        ar neapibrėžtą toną.
    musical_box_mechanism_type:
      name: Muzikinės dėžutės mechanizmo tipas
      description: Kaip muzikinė dėžutė sukuria / atkuria garsą (pvz., prisukamas
        mechanizmas arba elektroninis atkūrimas).
    musical_keyboard_case_fit_type:
      name: Klavišinio instrumento dėklo pritaikymo tipas
      description: Apibūdina, kaip dėklas pritaikytas instrumentui (pvz., universalus
        / bendras dydžių diapazonas arba konkrečiam modeliui skirtas / individualus
        pritaikymas).
    musical_ratchet_sound_character:
      name: Muzikinės terkšlės garso charakteristika
      description: Bendras terkšlės tembro / garsumo charakteristikos aprašymas.
    musical_scraper_groove_surface_material:
      name: Muzikinio gremžtuko griovelių paviršiaus medžiaga
      description: Nurodo briaunoto / grioveliuoto gremžimo paviršiaus medžiagą (gali
        skirtis nuo korpuso medžiagos).
    musical_scraper_type:
      name: Muzikinio gremžtuko tipas
      description: Nurodo muzikinio gremžtuko instrumento stilių / dizainą (pvz.,
        guiro arba reco-reco), kuris turi įtakos garsui ir grojimo technikai.
    mute_attachment_method:
      name: Surdinos tvirtinimo būdas
      description: Nurodo, kaip lėkštės slopintuvas tvirtinamas arba laikosi ant lėkštės
        (pvz., gelis, statinis sukibimas, magnetas, spaustukas).
    mute_attenuation_level:
      name: Slopintuvo slopinimo lygis
      description: Nurodo, kiek slopintuvas sumažina suvokiamą garsumą, ypač aktualu
        praktiniams slopintuvams.
    mute_cork_padding_material:
      name: Slopintuvo kamščio / paminkštinimo medžiaga
      description: Nurodo slopintuvo kontaktinio paminkštinimo medžiagą (pvz., kamščio
        juostelės / pagalvėlės), naudojamą sukibimui, pritaikymui ir instrumento varpo
        apsaugai.
    mute_coverage_type:
      name: Surdinos uždengimo tipas
      description: Nurodo slopintuvo stilių / padengimą grojimo paviršiuje – nuo mažų
        taškinių slopintuvų iki visą paviršių dengiančių praktinių slopintuvų.
    mute_finish:
      name: Slopintuvo apdaila
      description: Slopintuvo paviršiaus apdaila, kuri gali turėti įtakos patvarumui
        ir estetikai (pvz., poliruota arba matinė).
    name_label_text_template:
      name: Vardo etiketės teksto šablonas
      description: Nurodo iš anksto nustatytą tekstą arba šabloną, atspausdintą ant
        vardo etiketės (pvz., „Priklauso“, „Pagamino“).
    napkin_ply:
      name: Servetėlės sluoksnių skaičius
      description: Nurodo kokteilinės servetėlės storį pagal sluoksnių skaičių.
    neck_brace_fit_system:
      name: Kaklo įtvaro pritaikymo sistema
      description: Nurodo pagrindinį metodą, naudojamą kaklo įtvaro reguliavimui ir
