    sewing_machine_needle_type:
      name: Siuvimo mašinos adatų tipas
      description: Nurodo adatos paskirtį / tipą (pvz., universali, rutulinė, džinsui),
        darantį įtaką siūlės kokybei ir audinio tinkamumui.
    sewing_machine_shank_type:
      name: Siuvimo mašinos kotelio tipas
      description: Nurodo prispaudimo pėdelės kotelio / laikiklio sąsajos standartą,
        kuriam pėdelė skirta, užtikrinant suderinamumą su siuvimo mašina (pvz., žemas
        kotelis, aukštas kotelis, pasviręs kotelis).
    sewing_pattern_accessory_type:
      name: Siuvimo modelio aksesuaro tipas
      description: Nurodo, kokį aksesuarą galima pasiūti pagal siuvimo modelį.
    sewing_pattern_notions_required:
      name: Reikalingi siuvimo modelio priedai
      description: Nurodo svarbias papildomas medžiagas / furnitūrą, reikalingą projektui
        užbaigti (be audinio ir siūlų).
    sewing_pattern_recommended_fabric:
      name: Siuvimo modelio rekomenduojamas audinys
      description: Nurodo rekomenduojamus audinių tipus / svorius siuvimo modeliui
