    protective_contact_padding_material:
      name: Apsauginės kontaktinės paminkštinimo medžiaga
      description: Medžiaga, naudojama instrumento kontaktiniuose taškuose (laikiklyje
        / varpo įdėkle), siekiant išvengti įbrėžimų (pvz., veltinis, guma).
    protective_cup_configuration:
      name: Apsauginės kaušelio konfigūracija
      description: Nurodo, ar apsauginis kaušelis yra įtrauktas, nuimamas, ar drabužis
