    racing_kart_frame_material:
      name: Lenktyninio kartingo rėmo medžiaga
      description: Pagrindinė kartingo rėmo / važiuoklės medžiaga.
    racing_kart_seat_size:
      name: Lenktyninio kartingo sėdynės dydis
      description: Kartingo sėdynės dydžio žymėjimas, naudojamas pritaikymui.
    racing_neck_support_style:
      name: Lenktyninės kaklo apsaugos stilius
      description: Lenktyninės kaklo apsaugos / įtvaro konstrukcinis stilius ir kaip
