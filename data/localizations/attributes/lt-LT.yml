        savybes.
    egg_size:
      name: Kiaušinių dydis
      description: Klasifikuoja kiaušinius pagal standartinius rinkos dydžių žymėjimus.
    egg_source_animal:
      name: Kiaušinių kilmės gyvūnas
      description: Identifikuoja gyvūno rūšį, kuri padėjo kiaušinius.
    egg_white_processing_method:
      name: Kiaušinio baltymo apdorojimo metodas
      description: Nurodo, kaip kiaušinių baltymai buvo apdoroti po surinkimo (pvz.,
        pasterizuoti, džiovinti purškiant), darant įtaką maisto saugai, galiojimo
        laikui ir naudojimo atvejams.
    eggplant_variety:
      name: Baklažanų veislė
      description: Nurodo baklažanų kultivarą arba rinkos rūšį, leidžiančią pirkėjui
