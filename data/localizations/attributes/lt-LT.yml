      description: Nurodo sagties atleidimo mygtuko spalvą.
    seat_belt_cover_placement:
      name: Saugos diržo uždangalo vieta
      description: Nurodo, kurioje saugos diržo vietoje numatyta naudoti apvalkalą.
    seat_belt_integration:
      name: Saugos diržo integravimas
      description: Nurodo, ar sėdynė turi integruotą saugos diržą ir / arba sagties
