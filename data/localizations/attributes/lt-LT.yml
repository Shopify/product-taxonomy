      name: Vidutinio tipo drėkintuvo papildymas
      description: Nurodo drėkintuvo „dėžė“ naudojamą drėgmę palaikančią / papildymo
        terpę (kas sudrėksta arba pakeičiama).
    humidifier_refill_method:
      name: Drėkintuvo papildymo metodas
      description: Aprašoma, kaip drėkintuvas įkraunamas drėgme arba keičiamas.
    humidifying_medium:
      name: Drėkinamoji terpė
      description: Nurodo produkto naudojamą drėkinimo elementą / terpę (kas sudrėkinamas
        / aktyvuojamas).
    hummus_base_ingredient:
      name: Humuso bazinis ingredientas
      description: Nurodo pagrindinį ankštinių arba daržovių pagrindą, naudojamą humusui
        gaminti.
    hunting_call_type:
      name: Medžioklės šauksmo tipas
      description: Klasifikuoja pagrindinį vilbynės veikimo stilių arba mechanizmą
        (pvz., pučiama burna, elektroninė, dėžutės tipo), kad medžiotojai galėtų greitai
        pasirinkti jų poreikius ir įgūdžių lygį geriausiai atitinkantį formatą.
    hunting_dog_collar_function:
      name: Medžioklinio šuns antkaklio Functions
      description: Klasifikuoja pagrindinį antkaklio funkcinį stilių arba paskirtį,
        padedant pirkėjams filtruoti produktus pagal funkcijas, tokias kaip sekimas,
        treniruotės, matomumas ar standartinis naudojimas.
    hvac_control_functions:
      name: HVAC valdymo funkcijos
      description: Nurodo, kurias ŠVOK / atitirpinimo / oro srauto Functions valdo
        įrenginys (mechanines arba elektronines).
    hybrid_drivetrain_configuration:
      name: Hibridinės pavaros konfigūracija
      description: Nurodo PHEV sistemos architektūrą, apibūdinančią, kaip elektros
        variklis (-iai) ir vidaus degimo variklis užtikrina varymą.
    hybrid_system_type:
      name: Hibridinės sistemos tipas
      description: Klasifikuoja transporto priemonės naudojamą hibridizacijos architektūrą.
    hybrid_truck_cab_type:
      name: Hibridinio sunkvežimio kabinos tipas
      description: Nurodo sunkvežimio kabinos konfigūraciją, kuri turi įtakos sėdimų
        vietų skaičiui ir vidaus erdvei.
    hydration_bag_features:
      name: Hidratacijos krepšio savybės
      description: Highlight pastebimą dizainą arba funkcines savybes, būdingas hidratacijos
        krepšiams.
    hydration_belt_features:
      name: Hidracijos diržo ypatybės
      description: Išvardijamos svarbios diegta funkcijos, kurios pagerina hidratacijos
        diržo naudojimą, saugumą ar patogumą.
    hydration_bladder_compatibility:
      name: Hidratacijos šlapimo pūslės suderinamumas
      description: Nurodo, ar liemenė turi arba palaiko hidratacijos pūslės sistemą.
    hydration_mouthpiece_style:
      name: Hidratacijos kandiklio stilius
      description: Nurodo hidratacijos sistemos kandiklio arba vožtuvo dizainą arba
        funkcinį stilių, padedant pirkėjams pasirinkti pageidaujamą gėrimo sąsają
        ir užtikrinti suderinamumą.
    hydration_pack_style:
      name: Hidratacijos kuprinės stilius
      description: Nurodo hidratacijos kuprinės konstrukcinį stilių, pvz., kuprinę
        arba liemenę, padedant filtruoti pagal pritaikymą ir naudojimo paskirtį.
    hydration_system_insulation:
      name: Hidratacijos sistemos izoliacija
      description: Nurodo, ar rezervuaras ir / arba gertuvės vamzdelis yra izoliuoti,
        kad padėtų palaikyti skysčio temperatūrą karštomis arba šaltomis sąlygomis.
    hydration_valve_type:
      name: Hidratacijos vožtuvo tipas
      description: Nurodo gėrimo vožtuvo arba kandiklio stilių, pateikiamą su sistema
        arba buteliu, apimant įprastus bite-valve ir didelio srauto antgalių dizainus.
    hydraulic_fluid_type:
      name: Hidraulinio skysčio tipas
      description: Nurodo stabdžių skysčio tipą, kuriam skirtas hidraulinis dviračio
        stabdžių svirtis. Ši informacija yra itin svarbi priežiūrai ir saugumui.
    hydrogenation_level:
      name: Hidrinimo lygis
      description: Nurodo, ar riebalai yra nehidrogenizuoti, dalinai hidrogenizuoti
        ar visiškai hidrogenizuoti, kas turi įtakos transriebalų kiekiui ir kepimo
        savybėms.
    hydrophobicity_level:
      name: Hidrofobiškumo lygis
      description: Nurodo produkto reklamuojamą vandens lašelių formavimo / nubėgimo
        efektyvumo lygį.
    ice_cream_format:
      name: Ledų formatas
      description: Apibūdina fizinę ledų produkto formą arba pateikimą (pvz., pinta,
        batonėlis, mochi).
    ice_skate_sharpener_type:
      name: Ledo pačiūžų galąstuvo tipas
      description: Klasifikuoja bendrą galąstuvo dizainą arba formatą (rankinis akmuo,
        elektrinis įrenginys, laikiklis ir kt.).
    ice_temperature_suitability:
      name: Tinkamumas ledo temperatūrai
      description: Nurodo ledo temperatūros diapazoną, kuriam sukurta ledo ritulio
        lazdos vaško formulė, darančią įtaką veikimui ir sniego atstūmimo savybėms.
    icing_sugar_variety:
      name: Cukraus pudros rūšis
      description: Klasifikuoja cukraus pudros formulę arba funkcinį tipą (pvz., fondantas,
        netirpstantys sniego milteliai, spalvota, aromatizuota).
    ignition_coil_configuration:
      name: Uždegimo ritės konfigūracija
      description: Nurodo uždegimo ritės formos faktorių (viena ritė / coil-on-plug,
        kelių išėjimų ritės blokas pagal cilindrų skaičių, ritės juosta / kasetė arba
        paskirstytuvo tipo).
    ignition_lead_compliance_standard:
      name: Uždegimo laido atitikties standartas
      description: Oficialus pramonės standartas arba sertifikavimas, kurį atitinka
        uždegimo laidas (-ai), kaip nurodo gamintojas (pvz., SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Uždegimo laido izoliacijos medžiaga
      description: Pagrindinė izoliacijos / apvalkalo medžiaga, naudojama uždegimo
        laidui (išorinė kabelio izoliacija).
    ignition_lead_set_type:
      name: Uždegimo laidų rinkinio tipas
      description: Nurodo, ar produktas yra vienas uždegimo laidas, ar pilnas rinkinys,
        ir kam tas rinkinys skirtas.
    ignition_lead_terminal_type:
      name: Uždegimo laido gnybto tipas
      description: Gnybto / jungties stilius, naudojamas uždegimo laido galuose (pvz.,
        uždegimo žvakės gnybtas ir ritės / paskirstytojo gnybto stilius).
    illumination_type:
      name: Apšvietimo tipas
      description: Nurodo, ar ir kokiu būdu kamuolys yra apšviečiamas žaidimui tamsoje
        arba naktį (pvz., fosforinis švytėjimas arba nuo smūgio aktyvuojami LED šviestukai).
    immobilizer_installation_type:
      name: Imobilizatoriaus įrengimo tipas
      description: Nurodo, kaip imobilizatorius yra įdiegtas arba prijungtas prie
        transporto priemonės.
    immobilizer_unlock_method:
      name: Imobilizatoriaus atrakinimo metodas
      description: Nurodo, kaip imobilizatorius įjungiamas / išjungiamas arba atrakinamas.
    impact_protection_certifications:
      name: Smūgio apsaugos sertifikatai
      description: Nurodo konkrečius saugos standartus, kuriuos apsauginė priemonė
        atitinka arba viršija.
    impact_protection_level:
      name: Apsaugos nuo smūgių lygis
      description: Nurodo apsauginės kriauklės smūgio apsaugos lygį arba technologiją.
    impact_protection_rating:
      name: Smūgio apsaugos įvertinimas
      description: Nurodo sertifikuotą smūgio apsaugos lygį pagal standartus (pvz.,
        EN 1621-1 Level 1, EN 14120 Level 2), padedant motociklininkams filtruoti
        aukštesnio lygio apsaugą.
    impact_surface_material:
      name: Kontaktinio paviršiaus medžiaga
      description: Apibūdina pagrindinę smūgio / kontakto paviršiaus medžiagą saugumui
        ir pojūčiui užtikrinti (pvz., putos, plastikas).
    incense_base_material:
      name: Smilkalų pagrindo medžiaga
      description: Pagrindinė bazinė / rišamoji medžiaga, naudojama smilkalams gaminti
        rinkinyje (miltelių pagrindas).
    incense_making_method:
      name: Smilkalų gaminimo metodas
      description: Numatyta kūrimo procedūra, palaikoma rinkinio.
    incense_tool_type:
      name: Smilkalų įrankio tipas
      description: Nurodo, kokio tipo smilkalų gaminimo įrankis yra šis produktas
        (naudojamas formuoti, matuoti, spausti, maišyti arba džiovinti smilkalus).
    incline_adjustment_type:
      name: Pasvirimo reguliavimo tipas
      description: Apibūdina, kaip (arba ar) pasvirimas gali būti keičiamas treniruotės
        metu.
    included_accessories:
      name: Pridedami priedai
      description: Nurodo įtrauktus priedus, pvz., atsargines galvutes / antgalius,
        laikymo dėklą, įkrovimo kabelį arba AC adapterį.
    included_case_type:
      name: Pridedamo dėklo tipas
      description: Nešiojimo / laikymo dėklo tipas, įtrauktas kartu su bosiniu saksofonu
        (jei yra).
    included_components:
      name: Įtraukti komponentai
      description: Nurodo, kas yra įtraukta į pakuotę (naudinga įrankių rinkiniams
        ir rinkinio pasiūlymams).
    included_fastener_components:
      name: Įtraukti tvirtinimo komponentai
      description: Nurodo, ar produktas yra kabliukų ir kilpelių rinkinys, tik kabliukai,
        tik kilpelės arba susijęs drabužių užsegimo variantas.
    included_hydration_vessel_type:
      name: Įtraukto hidratacijos indo tipas
      description: Identifikuoja hidratacijos indo stilių, pateikiamą arba palaikomą
        diržo.
    included_items_woodwind_instrument:
      name: Įtraukti daiktai (medinis pučiamasis instrumentas)
      description: Nurodo, kurie dažniausiai rinkinyje pateikiami daiktai yra įtraukti
        į bosinio saksofono pakuotę.
    included_materials:
      name: Įtrauktos medžiagos
      description: Nurodo, kokie komponentai yra įtraukti į iškarpos pirkimą (tik
        iškarpa arba iškarpa + medžiagos).
    included_mounting_accessories:
      name: Įtraukti montavimo priedai
      description: Nurodo, kurie montavimo / tvirtinimo priedai yra įtraukti kartu
        su garsiakalbiu.
    included_pump_type:
      name: Įtraukto siurblio tipas
      description: Identifikuoja siurblio tipą, pateikiamą arba integruotą į pripučiamą
        čiužinį.
    included_scraper_implement_type:
      name: Įtraukto grandiklio įrankio tipas
      description: Nurodo, kurie grojimo įrankiai yra įtraukti kartu su muzikiniu
        grandikliu (pvz., grandiklio lazdelė / strypas, vielinis šepetys).
    indicator_design:
      name: Indikatoriaus dizainas
      description: Klasifikuoja fizinę žvejybos kibimo indikatoriaus formą arba stilių.
    indicator_functions_tracked:
      name: Sekamos indikatoriaus funkcijos
      description: Nurodo konkrečius žaidimo rodiklius, kuriuos seka indikatorius,
        pvz., metimus, strike, out, kėlinius, metimų skaičių, over, wicket, rezultatą
        arba down.
    indoor_outdoor_use:
      name: Naudojimas viduje / lauke
      description: Nurodo, ar boulingo žaislas skirtas naudoti viduje, lauke ar abiejose
        vietose.
    inflatable_decoration_items_included:
      name: Įtraukti pripučiamos dekoracijos daiktai
      description: Nurodo pagrindinius aksesuarus, įtrauktus kartu su pripučiama dekoracija
        (pvz., pūstuvą, kuoliukus, tvirtinimo virves).
    inflatable_decoration_type:
      name: Pripučiamos dekoracijos tipas
      description: Nurodo pripučiamos vakarėlio dekoracijos tipą (formą / konstrukciją),
        kad būtų lengviau naršyti ir filtruoti.
    inflatable_raft_float_features:
      name: Pripučiamos valties / plūdės savybės
      description: Funkcinės savybės, esančios pripučiamoje valtyje / plūdėje.
    inflation_method_included:
      name: Įtrauktas pripūtimo metodas
      description: Nurodo padangų pripūtimo sprendimo tipą, įtrauktą į remonto rinkinį,
        jei toks yra.
    infused_scent:
      name: Įterptas kvapas
      description: Identifikuoja kvapo arba skonio priedus, įterptus į masalo medžiagą.
    ingredient_base_type:
      name: Ingrediento pagrindo tipas
      description: Identifikuoja pagrindinį fermentacijai skirtą pagrindą (pvz., vynuogių
        sulčių koncentratas, šviežios sultys arba vaisių koncentratas).
    ingredient_physical_form:
      name: Ingrediento fizinė forma
      description: Nurodo fizinę kvapiosios medžiagos formą, kuria ji pateikiama (naudojama
        tvarkymui, matavimui ir formulavimui).
    ingredient_processing_method:
      name: Ingredientų apdorojimo būdas
      description: Nurodo pagrindinį ingredientui taikomą apdorojimo metodą (pvz.,
        liofilizuotas, skrudintas, fermentuotas).
    ink_colors_included:
      name: Įtrauktos rašalo spalvos
      description: Nurodo rašalo spalvas, įtrauktas į rinkinio antspaudų pagalvėles.
    ink_pad_application_method:
      name: Rašalo pagalvėlės naudojimo metodas
      description: Kaip rašalas pateikiamas / naudojamas iš pagalvėlės (tradicinė
        antspaudų pagalvėlė, aplikatorius arba teptuko tipo pagalvėlė).
    ink_pad_permanence:
      name: Rašalo pagalvėlės ilgalaikiškumas
      description: Nurodo, ar antspauduotas rašalas yra ilgalaikis ir / arba archyvinis
        (atsparus blukimui ir vandeniui išdžiūvus).
    ink_pad_size:
      name: Rašalo pagalvėlės dydis
      description: Standartizuotas rašalo pagalvėlės paviršiaus / dėklo dydis arba
        forma.
    ink_pad_special_effects:
      name: Specialūs rašalo pagalvėlės efektai
      description: Specialūs vizualiniai / funkciniai rašalo efektai antspauduojant
        (pvz., metalinis efektas, blizgučiai).
    ink_permanence:
      name: Rašalo ilgalaikiškumas
      description: Nurodo, ar išdžiūvęs sumi rašalas skirtas ilgalaikiam / archyviniam
        naudojimui, ar yra plaunamas / nelaikinas.
    ink_preparation_required:
      name: Reikalingas rašalo paruošimas
      description: Nurodo, ar sumi rašalas yra paruoštas naudoti, ar prieš naudojimą
        reikia skiesti vandeniu arba trinti.
    inline_skate_brake_type:
      name: Riedučių stabdžio tipas
      description: Nurodo stabdžių konfigūraciją, įtrauktą į riedučius, pvz., nuimamą
        kulno stabdį arba stabdžių nebuvimą.
    inner_tent_configuration:
      name: Vidinės palapinės konfigūracija
      description: Nurodo vidinės palapinės konfigūraciją arba stilių, pvz., pilną
        vidinį įdėklą, tinklinį įdėklą arba šiluminį pamušalą.
    innerspring_coil_type:
      name: Spyruoklinio čiužinio spiralių tipas
      description: Nurodo čiužinio viduje esančios spyruoklių sistemos konstrukcijos
        stilių, kuris daro įtaką atramai, judesių izoliacijai ir kainai.
    input_connector_type:
      name: Įvesties jungties tipas
      description: Nurodo garso įvesties jungties tipą, naudojamą pedale (paprastai
        1/4 colio TS).
    input_valve_type:
      name: Įvesties vožtuvo tipas
      description: Nurodo vožtuvo standartą, esantį dviračio kameroje / rate, prie
        kurio adapteris jungiasi.
    insecticide_treatment:
      name: Insekticidinis apdorojimas
      description: Nurodo, ar tinklas buvo gamykliškai apdorotas insekticidu ir, jei
        taip, koks apdorojimo tipas naudotas papildomai apsaugai.
    insert_coverage_area:
      name: Įdėklo dengimo sritis
      description: Nurodo, kurią pėdos dalį įdėklas skirtas dengti (pvz., pilno ilgio,
        tik kulną).
    insert_length_type:
      name: Įdėklo ilgio tipas
      description: Nurodo, kokią pėdos atramos dalį dengia arkos atrama.
    inside_message_type:
      name: Vidinės žinutės tipas
      description: Nurodo, ar kortelės viduje yra iš anksto atspausdinta žinutė ir
        ar ją galima pritaikyti.
    insole_attachment_method:
      name: Vidpadžio tvirtinimo būdas
      description: Nurodo, kaip arkos atrama laikosi bato viduje (laisvai įdedama,
        su lipniu pagrindu, kabliuko ir kilpelės tvirtinimu ir kt.).
    insole_material:
      name: Vidpadžio medžiaga
      description: Apibūdina pėdos pagrindo arba vidpadžio medžiagą, ant kurios remiasi
        pėda, darančią įtaką amortizacijai ir atramai.
    installation_fabrication_level:
      name: Montavimo pritaikymo lygis
      description: Nurodo įprastą individualaus pritaikymo arba modifikavimo kiekį,
        reikalingą rinkiniui sumontuoti.
    installation_location:
      name: Montavimo vieta
      description: Nurodo tipinę alyvos slėgio jutiklio montavimo vietą variklio alyvos
        sistemoje (pvz., variklio bloko alyvos kanalo jungtis, filtro korpusas, sandwich
        plokštė arba nuotolinės linijos tvirtinimas).
    installation_method:
      name: Tvirtinimo būdas
      description: Nurodo, kaip kilimėlis arba plytelė pritvirtinama arba montuojama
        ant grindų.
    instant_coffee_form:
      name: Tirpios kavos forma
      description: Apibūdina fizinę tirpios kavos formą, darančią įtaką paruošimo
        būdui ir galiojimo laikui.
    instep_coverage:
      name: Kelties dengimas
      description: Nurodo, ar produktas apsaugo tik blauzdą, ar ir blauzdą bei pėdos
        keltį / pėdą.
    instruction_format:
      name: Instrukcijos formatas
      description: Į rinkinį įtrauktų instrukcijų formatas.
    instrument_cleaning_swab_form_factor:
      name: Instrumento valymo tampono forma
      description: Nurodo fizinį valymo šluostės stilių (pvz., pertraukiama šluostė
        arba strypo / šepečio sistema), kad atitiktų muzikanto pageidavimus ir instrumento
        apribojimus.
    instrument_dimensions_unit_context:
      name: Instrumento matmenų vieneto kontekstas
      description: Paaiškina, ką reiškia pateikti aukščio / pločio / ilgio matmenys
        (pvz., visas instrumentas, vieno vamzdžio ilgis, stovo aukštis).
    instrument_electronics_type:
      name: Instrumento elektronikos tipas
      description: Nurodo, ar instrumento pikapo / priešstiprintuvo sistema yra aktyvi
        ar pasyvi.
    instrument_key:
      name: Instrumento raktas
      description: Nurodo fleitos instrumento tonaciją, naudojamą kataloguose (dažniausiai
        C arba F didesnėms fleitoms).
    instrument_level:
      name: Instrumento lygis
      description: Tikslinis grojimo lygis, kuriam skirtas instrumentas.
    instrument_part_mounting_method:
      name: Instrumento dalies montavimo metodas
      description: Nurodo, kaip dalis pritvirtinama arba montuojama (pvz., spaustuku,
        klijais arba varžtais).
    instrument_parts_included:
      name: Įtrauktos instrumento dalys
      description: Nurodo pagrindinius komponentus / dalis, įtrauktas į A klarneto
        pakuotę.
    instrument_playing_technique:
      name: Grojimo instrumentu technika
      description: Kaip instrumentu paprastai grojama / jis aktyvuojamas (pvz., kratomas,
        mušamas, kalenamas).
    instrument_size_class:
      name: Instrumento dydžio klasė
      description: Bendras instrumento dydis, išreikštas pirkėjui suprantama klase,
        o ne tiksliais matmenimis.
    insulation_fill_material:
      name: Izoliacinio užpildo medžiaga
      description: Identifikuoja pagrindinę medžiagą, naudojamą striukės arba liemenės
        izoliacijai.
    integrated_bottom_type:
      name: Integruotos apačios tipas
      description: Nurodo, ar drabužis turi integruotas kelnaites, šortus, triko arba
        panašius apatinius sluoksnius papildomam uždengimui judant.
    integrated_charging_options:
      name: Integruotos įkrovimo parinktys
      description: Nurodo integruotas maitinimo arba įkrovimo jungtis, esančias naktiniame
        staliuke.
    integrated_furniture_function:
      name: Integruota baldo funkcija
      description: Identifikuoja papildomus integruotus baldų elementus, įtrauktus
        į sieninę lovą arba rėmą (pvz., stalą, sofą, lentynas).
    integrated_locking:
      name: Integruotas užraktas
      description: Nurodo, ar laikiklis turi integruotą užraktą laikikliui pritvirtinti
        prie transporto priemonės ir / arba dviračiui pritvirtinti prie laikiklio.
    integrated_power_options:
      name: Integruotos maitinimo parinktys
      description: Nurodo, kokio tipo integruotas maitinimo arba įkrovimo funkcijas
        suteikia kosmetinis staliukas.
    integrated_storage_features:
      name: Integruotos laikymo savybės
      description: Identifikuoja papildomas laikymo arba aksesuarų savybes, kurias
        biliardo lazdų stovas turi be lazdų lizdų.
    integrated_tool_functions:
      name: Integruotos įrankio funkcijos
