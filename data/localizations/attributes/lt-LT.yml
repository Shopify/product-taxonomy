    sticker_finish:
      name: Lipduko paviršius
      description: Apibūdina lipdukų paviršiaus apdailą arba vizualinį efektą.
    sticker_format:
      name: Lipdukų formatas
      description: Nurodo dekoratyvinių lipdukų mažmeninės prekybos formatą (pvz.,
