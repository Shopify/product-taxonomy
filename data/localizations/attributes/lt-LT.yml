    racquet_toy_set_equipment_included:
      name: Įtrauktos raketės žaislų rinkinio įrangos dalys
      description: Nurodo, kokie daiktai yra įtraukti į žaislą arba rinkinį (pvz.,
        tinklas, kamuoliukai, lazdelės / raketės).
    racquetball_squash_training_aid_type:
      name: Raketbolo ir skvošo treniruočių pagalbinių priemonių tipas
      description: Klasifikuoja konkretų treniruočių priemonės arba aksesuaro tipą,
        kad pirkėjas galėtų greitai rasti reikalingą daiktą.
    radiator_cap_gasket_material:
      name: Radiatoriaus dangtelio tarpinės medžiaga
      description: Radiatoriaus dangtelio sandarinimo tarpiklio (-ių) medžiaga.
    radiator_cap_pressure_relief_style:
      name: Radiatoriaus dangtelio slėgio išleidimo stilius
