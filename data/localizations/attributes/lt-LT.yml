      description: Nurodo įvorės tepimo savybes ir ar ji sukurta tepimui tepalu (pvz.,
        turi griovelius arba tepimo antgalį).
    lug_nut_seat_profile:
      name: Ratų veržlės sėdynės profilis
      description: Nurodo ratų veržlės sėdynės profilį, reikalingą ratlankiui, kad
        būtų užtikrintas suderinamumas ir saugus montavimas.
    lumbar_support_type:
      name: Juosmens atramos tipas
