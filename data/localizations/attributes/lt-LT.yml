      name: Siūlų apdaila / apdorojimas
      description: Paviršiaus apdaila arba apdorojimas, taikomas siūlui ir turintis
        įtakos jo naudojimo savybėms bei veikimui (pvz., vaškuotas, surištas, merserizuotas).
    thread_material:
      name: Siūlo medžiaga
      description: Pagrindinis siūlo arba siuvinėjimo siūlo pluoštas / medžiaga (ne
        audinys).
    thread_material_fiber:
      name: Siūlo medžiaga (pluoštas)
      description: Nurodo pagrindinį paties siūlo pluoštą / medžiagą (ne audinį).
    thread_package_format:
      name: Siūlų pakuotės formatas
      description: Siuvimo siūlų pakuotės tipas (pvz., ritė, kūgis, špulė).
    thread_rack_compatible_spool_type:
      name: Su siūlų stovu suderinamas ritės tipas
      description: Siūlų pakuotės tipas, kuriam skirtas stovas (ritės, kūgiai ir pan.).
    thread_standard_size:
      name: Siūlų standartinis dydis
      description: Nurodo siūlų dydžio / storio standartą, naudojamą produkto etiketėje
        (pvz., wt, Tex, denjė).
    thread_type:
      name: Siūlo tipas
      description: Nurodo kryželiu siuvinėjimo siūlo konstrukciją arba tipą.
    thread_weight_system:
      name: Siūlų storio žymėjimo sistema
      description: Standartas, naudojamas siūlų storiui arba svoriui išreikšti.
    thread_yarn_guide_mounting_attachment_style:
      name: Siūlų ir verpalų kreiptuvo tvirtinimo tipas
      description: Apibūdina, kaip kreiptuvas dėvimas arba tvirtinamas naudojimo metu.
    thread_yarn_guide_tension_control:
      name: Siūlų ir verpalų kreiptuvo įtempimo valdymas
      description: Nurodo, ar ir kaip kreiptuvas suteikia reguliuojamą siūlo arba
        verpalo įtempimą / pasipriešinimą.
    thread_yarn_organizer_features:
      name: Siūlų ir verpalų laikiklio ypatybės
      description: Apibūdina funkcines organizavimo ir pernešimo savybes, skirtas
        siūlų ir verpalų laikymui.
    threader_intended_use:
      name: Įvėriklio numatytoji paskirtis
      description: Nurodo pagrindinę rankinio adatos įvėrėjo naudojimo sritį rankdarbiuose.
    threading_system:
      name: Įvėrimo sistema
      description: Nurodo metodą ir pagalbines priemones, naudojamas overloko siūlams
        įverti (pvz., rankinis, spalvomis pažymėtas, nukreipiamasis, pneumatinis įvėrimas).
    threading_type:
      name: Įvėrimo tipas
      description: Nurodo, ar papuošale naudojamas vidinis sriegis, išorinis sriegis,
        besriegė sistema, ar tai netaikoma.
    throttle_type_scooter_conversion:
      name: Akceleratoriaus tipas (paspirtuko konversija)
      description: Nurodo akceleratoriaus tipą arba sąsają, kuri yra įtraukta į konversijos
        rinkinį arba jam reikalinga.
    throw_rope_end_attachment:
      name: Metamosios virvės galo tvirtinimas
      description: Tvirtinimo detalė arba kilpa, esanti darbiniame metamosios virvės
        gale (-uose).
    throw_rope_storage_packaging_type:
      name: Metamosios virvės laikymo / pakuotės tipas
      description: Nurodo, kaip metamoji virvė laikoma arba naudojama (pvz., maiše
        arba ritėje).
    throw_rope_visibility_features:
      name: Metamosios virvės matomumo ypatybės
      description: Matomumo ir atpažinimo savybės, skirtos padaryti virvę lengviau
        pastebimą vandenyje arba esant silpnam apšvietimui.
    thrower_operation_type:
      name: Svaidyklės veikimo tipas
      description: Klasifikuoja metimo įrenginio mechaninį arba veikimo tipą, leidžiant
        greitai atskirti rankinius ir automatinius mechanizmus.
    thumb_design:
      name: Nykščio konstrukcija
      description: Apibūdina, kaip nykštys integruotas į pirštinę, turint įtakos saugumui
        ir sukibimui.
    tiara_design:
      name: Tiaros dizainas
      description: Nurodo bendrą tiaros konstrukcijos tipą arba siluetą.
    tie_down_points_straps_included:
      name: Įtraukti tvirtinimo taškai / diržai
      description: Nurodo, ar stovas turi integruotus tvirtinimo taškus ir (arba)
        komplekte esančius diržus motociklui arba paspirtukui pritvirtinti.
    tiling_format:
      name: Išdėstymo formatas
      description: Nurodo PDF išdėstymo tipą, skirtą spausdintų lapų sujungimui.
    time_current_characteristic:
      name: Laiko ir srovės charakteristika
      description: Nurodo saugiklio laiko ir srovės veikimo charakteristiką (pvz.,
        greito veikimo arba uždelsto veikimo), kuri turi įtakos tinkamumui grandinėms
        su paleidimo srovėmis.
    timer_count_mode:
      name: Laikmačio skaičiavimo režimas
      description: Nurodo laikmačio skaičiavimo režimą, pvz., atgalinį skaičiavimą,
        didėjantį skaičiavimą (chronometrą), abu režimus arba intervalinį / pasikartojantį
        režimą.
    timer_display_type:
      name: Laikmačio rodymo tipas
      description: Nurodo, kaip žaidimo laikmatis pateikia likusį laiką (pvz., skaitmeniniame
        ekrane, analoginiame ciferblate, smėlio laikrodyje arba be vizualaus rodymo).
    timer_operating_modes:
      name: Laikmačio veikimo režimai
      description: Laikmačio veikimo režimai, palaikomi efektams aktyvuoti.
    timing_belt_construction_material_rubber_compound:
      name: Paskirstymo diržo konstrukcijos medžiaga (gumos mišinys)
      description: Pagrindinis dirže naudojamas gumos mišinys (pvz., HNBR), turintis
        įtakos atsparumui karščiui, alyvai ir ilgaamžiškumui.
    timing_belt_profile:
      name: Paskirstymo diržo profilis
      description: Paskirstymo diržo dantukų profilio arba formos standartas (pvz.,
        trapecinis arba kreivinis).
    timing_belt_reinforcement_cord_material:
      name: Paskirstymo diržo armavimo kordų medžiaga
      description: Nurodo paskirstymo diržo vidinių armavimo kordų medžiagą (pvz.,
        stiklo pluoštą, aramidą), turinčią įtakos tvirtumui ir tamprumui.
    timing_component_material:
      name: Paskirstymo sistemos komponento medžiaga
      description: Pagrindinė paskirstymo sistemos komponento medžiaga (diržo mišinys,
        grandinės / krumpliaračio metalas, dangos medžiaga).
    tin_whistle_body_material:
      name: Airiškos fleitos korpuso medžiaga
      description: Prireikus tiksliau apibūdina įprastas airiškos fleitos korpuso
        medžiagas nei bendras instrumento medžiagų sąrašas.
    tin_whistle_bore_type:
      name: Airiškos fleitos kanalo tipas
      description: Nurodo airiškos fleitos vidinio kanalo konstrukciją.
    tin_whistle_included_accessories:
      name: Įtraukti airiškos fleitos priedai
      description: Priedai, įtraukti kartu su airiška fleita (pvz., dėklas, valymo
        strypas).
    tip_finish_coating:
      name: Galiuko apdaila / danga
      description: Nurodo darbinės dalies paviršiaus apdorojimą (pvz., chromuotą,
        milteliniu būdu dažytą), kuris turi įtakos atsparumui korozijai ir ratlankio
        pažeidimams.
    tip_shape:
      name: Antgalio forma
      description: Apibūdina gitaros mediatoriaus antgalio formą arba smailumą, kurie
        turi įtakos garso artikuliacijai ir grojimo pojūčiui.
    tippet_rating:
      name: Pavadėlio stiprumo klasė
      description: Didžiausias rekomenduojamas muselinės žūklės pavadėlio stiprumas,
        išreiškiamas X žymėjimu (pvz., 4X).
    tire_changer_operation_type:
      name: Padangų montavimo staklių veikimo tipas
      description: Nurodo, kaip valdomos padangų montavimo staklės (pvz., rankiniu,
        pneumatiniu ar hidrauliniu būdu). Skiriasi nuo bendro atributo „Maitinimo
        šaltinis“; naudojamas apibūdinti įrenginio veikimo arba valdymo būdą.
    tire_changer_type:
      name: Padangų montavimo staklių tipas
      description: Bendras padangų montavimo staklių veikimo tipas, konstrukcija arba
        automatizavimo lygis.
    tire_compound_type:
      name: Padangų mišinio tipas
      description: Nurodo padangose naudojamo gumos mišinio klasifikaciją (pvz., minkštas,
        lietaus, slick), kuri turi įtakos sukibimui ir patvarumui skirtingomis sąlygomis.
    tire_load_range:
      name: Padangos apkrovos diapazonas
      description: Nurodo padangos sluoksnių skaičiaus / apkrovos diapazono žymėjimą
        (dažniausiai LT padangoms), atspindintį jos apkrovos laikomąją galią.
    tire_position:
      name: Padangos pozicija
      description: Rekomenduojama montavimo vieta transporto priemonėje.
    tire_repair_kit_components:
      name: Padangų remonto rinkinio komponentai
      description: Nurodo į rinkinio pasiūlymą įtrauktus daiktas, leidžiančius klientas
        palyginti rinkinių komplektiškumą.
    tire_sidewall_type:
      name: Padangos šoninės sienelės tipas
      description: Nurodo šoninės sienelės dizaino arba konstrukcines savybes.
    tire_speed_rating:
      name: Padangų greičio klasė
      description: Padangos greičio indekso raidė (pvz., H, V, W), nurodanti didžiausią
        leistiną nuolatinį važiavimo greitį.
    tire_spoon_type:
      name: Padangų montavimo svirties tipas
      description: Klasifikuoja padangų montavimo svirtį pagal galo formą ir paskirtį.
    tire_system_compatibility:
      name: Suderinamumas su padangų sistema
      description: Nurodo, ar sandariklis skirtas bekamerėms padangoms, padangoms
        su kamera, ar abiem tipams.
    tire_temperature_rating_utqg:
      name: Padangos temperatūros įvertinimas (UTQG)
      description: UTQG temperatūrinio atsparumo klasė automobilių padangoms (pvz.,
        A, B, C).
    tire_traction_rating_utqg:
      name: Padangos sukibimo įvertinimas (UTQG)
      description: UTQG sukibimo klasė, apibūdinanti stabdymo efektyvumą ant šlapios
        dangos.
    tire_tread_style:
      name: Padangų protektoriaus stilius
      description: Apibūdina bendrą vamzdinės padangos protektoriaus raštą, atspindintį
        numatytą paviršių ir sukibimo savybes.
    tire_tube_type:
      name: Padangos tipas pagal kamerą
      description: Nurodo, ar padanga skirta naudoti be kameros, ar su kamera.
    title_status:
      name: Transporto priemonė nuosavybės statusas
      description: Transporto priemonės nuosavybės dokumentų / registracijos statusas.
    tobacco_application:
      name: Tabako paskirtis
      description: Nurodo vartojimo būdą arba rūkymo priemonę, kuriai skirtas birus
        tabakas.
    tobacco_cut_type:
      name: Tabako smulkinimo tipas
      description: Nurodo biraus tabako pjaustymo arba paruošimo tipą, turintį įtakos
        degimo greičiui, kimšimo būdui ir bendrai rūkymo patirčiai.
    tobacco_strength:
      name: Tabako stiprumas
      description: Nurodo jaučiamą tabako stiprumą arba nikotino poveikį vartojant,
        padedant pirkėjas pasirinkti pageidaujamą intensyvumą.
    toe_construction:
      name: Kojos pirštų konstrukcija
      description: Nurodo hidrokostiumo batų pirštų srities konstrukciją, kuri turi
        įtakos pusiausvyrai, lentos pojūčiui ir šilumai.
    toe_coverage:
      name: Kojos pirštų padengimas
      description: Nurodo kojinės pirštų srities dengimo tipą.
    toe_pick_style:
      name: Pirštų dantukų tipas
      description: Apibūdina dailiojo čiuožimo pačiūžų geležtės pirštų dantukų konstrukciją.
    toe_protection_type:
      name: Kojos pirštų apsaugos tipas
      description: Nurodo, ar ir kaip pirštų sritis yra sustiprinta saugumo tikslais
