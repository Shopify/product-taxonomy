    wire_coating_type:
      name: Vielos dangos tipas
      description: Nurodo, ar ir kaip viela yra dengta / padengta (spalvai, apsaugai
        ir tekstūrai).
    wire_construction_type:
      name: Vielos konstrukcijos tipas
      description: Nurodo karoliukų vėrimo vielos fizinę konstrukciją, pvz., daugiagijė
        ar vientisa, ir ar ji yra dengta.
    wire_finish:
      name: Laido apdaila
      description: Nurodo laido paviršiaus apdailą, dangą ar padengimą (pvz., poliruotas,
        emaliuotas, cinkuotas, dengtas), kuris turi įtakos išvaizdai ir atsparumui
        dėmėms / korozijai.
    wire_gauge_awg:
      name: Laido storis (AWG)
      description: Laidų pynėje naudojamų laidininkų American Wire Gauge (AWG) dydis.
    wire_insulation_material:
      name: Vielos izoliacinė medžiaga
      description: Laidų pynių izoliacijos / apvalkalo medžiaga (poveikio temperatūra
        / cheminis atsparumas).
    wire_packaging_type:
      name: Vielos įpakavimo tipas
      description: Nurodo, kaip laidas parduodamas / supakuotas.
    wire_shape_profile:
      name: Vielos forma / profilis
      description: Apibūdina laido skerspjūvio formas.
    wiring_configuration:
      name: Laidų konfigūracija
      description: Nurodo, ar kardas tiekiamas su įmontuotais laidais elektriniam
        taškų skaičiavimui, be įmontuotų laidų, su belaidžiu ryšiu, ar skirtas naudoti
        be elektros.
    wobbler_style:
      name: Voblerio tipas
      description: Apibrėžia konkretų voblerio dizainą / veiksmo stilių, pvz., „krenkas“
        arba „džerkas“
    wood_block_surface_preparation:
      name: Medinio bloko paviršiaus paruošimas
      description: Nurodo paruoštą naudoti medinio bloko paviršiaus būseną apdailai
        ir rankdarbiams.
    wood_grain_direction:
      name: Medienos pluošto kryptis
      description: Medienos plaušo kryptis produkto ilgiausios dimensijos atžvilgiu
        (svarbu tvirtumui, pjovimo savybėms ir išvaizdai).
    wood_slice_edge_style:
      name: Medžio griežinėlio krašto stilius
      description: Pjūvio krašto sąlyga, pavyzdžiui, natūralios žievės kraštas, palyginti
        su lygiu /šlifuotu kraštu.
    wooden_block_special_features:
      name: Medinių blokelių ypatybės
      description: Išskirtinės funkcinės savybės, įtrauktos į medinių kaladėlių rinkinį.
    woodwind_body_construction:
      name: Medinių pučiamųjų instrumentų korpuso konstrukcija
      description: Nurodo, ar instrumentas pagamintas iš vienos dalies ar kelių sekcijų
        (pvz., 2 dalių / 3 dalių), kas daro įtaką valymui, laikymui ir nešiojamumui.
    woodwind_polishing_cloth_intended_use:
      name: Medinių pučiamųjų poliravimo šluostės paskirtis
      description: Nurodo, kam pirmiausia skirta šluostė valyti / poliruoti medinius
        pučiamuosius instrumentus.
    woodwind_small_part_type:
      name: Medinių pučiamųjų instrumentų mažų dalių tipas
      description: Nurodo, kokia klarneto maža atsarginė detale d (pvz., rakto techninė
        įranga, pagalvėlės / kamščiai / veltiniai, žiedai).
    woofer_mounting_type:
      name: Žemųjų dažnių garsiakalbių tvirtinimo tipas
      description: Nurodo, kaip žemų dažnių garsiakalbis yra skirtas montuoti / naudoti
        (free-air ar korpuse) ir įprastas automobilių montavimo formas.
    woofer_surround_material:
      name: Žemų dažnių garsiakalbio pakabos medžiaga
      description: Medžiaga, naudojama žemų dažnių garsiakalbio pakabai (išoriniam
        amortizuojančiam žiedui).
    worn_on_finger:
      name: Nešiojamas ant piršto
      description: Nurodo, ant kurio piršto reikia dėvėti antpirštį.
    wrap_style:
      name: Apvyniojimo stilius
      description: Nurodo, kiek kartų diržas skirtas apjuosti liemenį.
    wrapping_occasion:
      name: Vyniojamojo popieriaus paskirtis
      description: Pagrindinė dovanojimo ar šventinė proga, kuriai skirtas wrapping
        paper.
    wrapping_paper_features:
      name: Vyniojamojo popieriaus savybės
      description: Funkcinės ir su tvarumu susijusios vyniojamojo popieriaus savybės,
        tokios kaip atsparumas plyšimui, perdirbtas turinys arba iš anksto supjaustyti
        lapų formatai.
    wrestling_dummy_design:
      name: Imtynių manekeno dizainas
      description: Bendros manekeno kūno formos arba laikysena, pavyzdžiui, stovinčio
        žmogaus formos arba metamo maišo formos, kurios lemia taikomus treniruočių
        pratimus.
    wrestling_mat_safety_certifications:
      name: Imtynių kilimėlio saugos sertifikatai
      description: Išvardija visus pramonės ar sporto organizacijų saugos sertifikatus
        arba standartus, kuriuos atitinka kilimėlis.
    wrist_strap_style:
      name: Riešo dirželio stilius
      description: Apibūdina riešo dirželio tipą (arba jo nebuvimą), kuris turi įtakos
        atramai ir prigludimui.
    wrist_support_style:
      name: Riešo atramos tipas
      description: Nurodo riešo atramos konstrukciją arba tipą, pvz., įtvarą, pirštinę,
        juostą ar apviją, kad būtų lengviau pasirinkti pagal poreikius ir naudojimo
        paskirtį.
    xylophone_range_octaves:
      name: Ksilofono diapazonas (oktavos)
      description: Ksilofono bendras diapazonas, išreikštas oktavomis (pvz., 2,5 oktavos,
        3 oktavos, 4 oktavos).
    xylophone_resonator_type:
      name: Ksilofono rezonatoriaus tipas
      description: Tonui sustiprinti naudojamos rezonatoriaus sistemos tipas (jei
        yra).
    yam_variety:
      name: Jamsų veislė
      description: Nurodo parduodamos batatų veislę arba įprastą atmainą (pvz., violetinė,
        geltona, dramblio pėdos).
    yarn_cutter_physical_style:
      name: Verpalų pjaustytuvo fizinis tipas
      description: Nurodo fizinį siūlų pjaustyklės tipą (pvz., pakabukas, žiedas,
        žirklutės), kad būtų lengviau naršyti ir filtruoti šioje kategorijoje.
    yarn_finish_or_effect:
      name: Verpalų apdaila arba efektas
      description: Išskiria specialius verpalams pritaikytus vizualinius ar funkcinius
        efektus, tokius kaip fluorescencija ar metalinis blizgesys.
    yarn_guide_style:
      name: Verpalų kreipiklio tipas
      description: Verpalų kreipiamojo komponento fizinis tipas.
    yarn_swift_adjustability:
      name: Greitas siūlų reguliavimas
      description: Nurodo, ar ir kaip sruogų laikiklis gali būti reguliuojamas (išplečiamas,
        sulankstomas), kas turi įtakos laikymui ir sruogų dydžių diapazonui, kurį
        jis gali apdoroti.
    yarn_swift_bearing_type:
      name: Verpalų greitojo guolio tipas
      description: Aprašomas sukimosi pagalba mechanizmas (pvz., rutulinis guolis),
        kuris turi įtakos sklandumui ir vyniojimo greičiui.
    yeast_application:
      name: Mielių panaudojimas
      description: Nurodo pagrindinę mielių produkto kulinarinę arba fermentacijos
        paskirtį.
    yo_yo_accessory_part_type:
      name: Jo-jo priedo / dalies tipas
      description: Nurodo, kokios rūšies jo-jo pakaitinė dalis ar priedas yra produktas
        (pvz., eilutė, guolis, atsakomosios pagalvėlės).
    yo_yo_axle_system_type:
      name: Jo-jo ašies sistemos tipas
      description: Jo-jo ašies konstrukcijos metodas (pvz., fiksuota ašis, palyginti
        su transmisijos ašimi), turinti įtakos laisvumo pojūčiui ir priežiūrai.
    yo_yo_bearing_size_class:
      name: Jo-jo guolio dydžio klasė
      description: Standartizuota jo-jo guolio dydžio klasė, jei taikoma.
    yo_yo_bearing_type:
      name: Jo-jo guolio tipas
      description: Guolių konfigūracija, turinti įtakos reagavimui ir sukimosi charakteristikoms.
    yo_yo_play_style:
      name: Jojo žaidimo stilius
      description: Pagrindinis numatytas jo-jo žaidimo stilius, atspindintis triukų
        rūšį, kuriai skirtas šis produktas.
    yo_yo_response_system:
      name: Jojo grįžimo sistema
      description: Nurodo jojo grįžimo mechanizmą, kuriam ši dalis yra skirta (suderinamumui).
    yo_yo_responsiveness:
      name: Jojo reakcijos lygis
      description: Ar jo-jo grįžta į ranką truktelėjus (reaguojantis), ar reikalauja
        pririšimo (nereaguojantis).
    yo_yo_string_material:
      name: Jojo virvelės medžiaga
      description: Jo-jo eilutės medžiagos sudėtis.
    yogurt_base_ingredient:
      name: Jogurto pagrindo ingredientas
      description: Nurodo pagrindinį pieno arba augalinės kilmės šaltinį, naudojamą
        jogurtui gaminti, kuris yra labai svarbus atsižvelgiant į mitybos preferencijas
        ir alergijas.
    yoke_type:
      name: Jungo tipas
      description: Nurodo laikiklio arba jungo, kuris padeda šaunamąjį ginklą ant
        monopodo, stilių.
    zill_playing_style:
      name: Sagatų grojimo stilius
      description: Numatytas naudojimo kontekstas arba stilius (dažniausiai pilvo
        šokiai arba orkestriniai / kultūriniai variantai).
    zill_strap_material:
      name: Sagatų dirželių medžiaga
      description: Pirštų dirželio / elastinės juostos, naudojamos virvelėms laikyti
        (jei yra), medžiaga, turintis įtakos komfortui, patvarumui ir sukibimui.
    zills_strap_adjustability:
      name: Zilų dirželio reguliuojamumas
      description: Nurodo, ar ir kaip pridedamas dirželis arba elastinė juosta gali
        būti reguliuojama pritaikymui.
    zipper_application:
      name: Užtrauktuko paskirtis
      description: Nurodo projektą arba paskirtį, kuriai užtrauktukas yra skirtas.
    zipper_chain_type:
      name: Užtrauktuko grandinėlės tipas
      description: Nurodo užtrauktuko grandinėlės / dantukų konstrukciją / tipą.
    zipper_end_type:
      name: Užtrauktuko galo tipas
      description: Nurodo, kaip užtrauktukas baigiasi ir ar jis atsiskiria (atviras
        galas), ar yra uždaras (neatsiskiriantis), įskaitant įprastus amatų užtrauktukuose
        naudojamus galinius tvirtinimo elementus.
    zipper_gauge:
      name: Užtrauktuko plotis
      description: 'Nurodo užtrauktuko grandinėlės plotį / dydį žymėjimą, paprastai
        išreiškiamą skaičiumi su # (pavyzdžiui, #3 arba #5), kuris koreliuoja su dantuko
        / ritės pločiu ir numatytu panaudojimu.'
    zipper_opening_length:
      name: Užtrauktuko ilgis
      description: Nurodo, kokia audinio dalis yra atidaroma užtrauktuku, atskiriant
        pilno užtrauktuko modelius nuo pusės užtrauktuko arba ketvirčio užtrauktuko
        modelių.
    zipper_pull_material:
      name: Užtrauktuko slankiklio rankenėlės medžiaga
      description: Nurodo užtrauktuko rankenėlės arba trauktuko medžiagą (dalį, už
        kurios traukiama), atskirai nuo užtrauktuko dantukų, grandinėlės ir juostos.
    zipper_pull_side:
      name: Užtrauktuko galvutės šonas
      description: Nurodo, iš kurios užtrauktuko pusės (-ių) galima pasiekti užtrauktuko
        skirtuką.
    zipper_pull_strap_cord_tab_material:
      name: Užtrauktuko trauktuko dirželio / virvelės / kilpelės medžiaga
      description: Prie užtrauktuko rankenėlės (jei yra) pritvirtintos juostelės /
        virvelės / skirtuko / kuto detalės medžiaga, išskyrus pagrindinę užtrauktuko
        rankenėlę.
    zipper_reversibility_mechanism:
      name: Užtrauktuko apvertimo mechanizmas
      description: Nurodo, kaip užtrauktukas yra dvipusis (pvz., dvipusis slankiklis,
        o ne atverčiamas/automatiškai užsifiksuojantis slankiklis, skirtas dvipusiams
        drabužiams).
    zipper_separating_type:
      name: Užtrauktuko atsiskyrimo tipas
      description: Nurodo, ar užtrauktukas atsiskiria apačioje / viršuje, ar yra uždaras,
        kad tiktų striukėms, miegmaišiams, krepšiams ir pan.
    zipper_side:
      name: Užtrauktuko pusė
      description: Nurodo pusę, kurioje yra pagrindinis užtrauktukas, kai miegmaišis
        paguldytas veidu į viršų.
    zipper_slider_material:
      name: Užtrauktuko slankiklio medžiaga
      description: Nurodo užtrauktuko slankiklio (judančio mechanizmo) medžiagą, kuri
        gali būti Impact smūgiams ir korozijai.
    zipper_slider_pull_configuration:
      name: Užtrauktuko slankiklio / trauktuko konfigūracija
      description: Nurodo, ar užtrauktukas turi vieną, ar du slankiklius / trauktukus,
        ir ar trauktukai yra vienoje, ar abiejose slankiklio pusėse.
    zipper_style:
      name: Užtrauktuko stilius
      description: Nurodo užtrauktuko ilgį arba jo buvimą drabužyje (pvz., be užtrauktuko,
        ketvirčio ilgio, pusės ilgio, pilno ilgio užtrauktukas).
    zipper_tape_material:
      name: Užtrauktuko juostos medžiaga
      description: Nurodo pagrindinę užtrauktuko juostos (audinio pusių), kuri yra
        įsiūta į projektą, medžiagą.
    zipper_teeth_type:
      name: Užtrauktuko dantukų tipas
      description: Nurodo užtrauktuko grandinėlės / dantukų konstrukcijos tipą (pvz.,
        spiralinis, lieto plastiko, metalinis, nematomas), kuris turi įtakos lankstumui,
        stiprumui ir tipiniam taikymui.
    assembly_required:
      name: Reikalingas surinkimas
      description: Nurodo, ar produktą reikia surinkti prieš naudojant
    organic_certification:
      name: Ekologinis sertifikavimas
      description: Nurodo, kokį ekologiškumo ar tvarumo sertifikatą turi produktas
