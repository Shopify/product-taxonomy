    sticker_material_type:
      name: Lipdukų medžiagos tipas
      description: Nurodo pagrindinę dekoratyvinio lipduko pagrindo medžiagą (ne dekoratyvinius
        elementus).
    stilt_foot_attachment_type:
      name: Kojūkų pėdos tvirtinimo tipas
      description: Nurodo, kaip naudotojo pėda tvirtinama prie kojūko (pvz., sagties
        dirželiu, kabliuko ir kilpelės sistema, raišteliais).
    stirrup_style:
      name: Balnakilpių stilius
      description: Klasifikuoja balnakilpių stilių pagal dizainą arba jojimo discipliną,
        apimant saugos, disciplinos ir konstrukcijos skirtumus.
    stirrup_tread_material:
      name: Balnakilpių pakojos medžiaga
      description: Nurodo balnakilpio pakojos arba pėdos atramos medžiagą, kuri turi
        įtakos sukibimui, komfortui ir nusidėvėjimui.
    stitch_marker_and_counter_style:
      name: Akių žymeklio ir eilių skaitiklio tipas
      description: Nurodo akių žymeklio arba akių / eilių skaitiklio tipą ar formą
