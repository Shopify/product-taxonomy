    quilting_ruler_non_slip_feature:
      name: Skiautinių liniuotės neslystanti savybė
      description: Nurodo, ar liniuotė turi neslystantį pagrindą / paviršiaus apdorojimą,
        mažinantį slydimą ant audinio.
    quilting_ruler_transparency:
      name: Skiautinių liniuotės skaidrumas
      description: Nurodo liniuotės medžiagos skaidrumą / matomumą, leidžiantį matyti
