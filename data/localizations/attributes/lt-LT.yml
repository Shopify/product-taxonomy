    racing_suit_size_system:
      name: Lenktynių kostiumų dydžių sistema
      description: Kostiumui naudojama dydžių sistema (pvz., Alpha S-XXL, skaitinė
        EU/US, jaunimo).
    racing_truck_discipline:
      name: Lenktyninio sunkvežimio disciplina
      description: Nurodo pagrindinę lenktynių discipliną / formatą, kuriame sunkvežimis
