      description: Apibūdina standumo / tvirtumo lygį, kurį suteikia paklijavimo medžiaga.
    interior_padding_type:
      name: Vidinio paminkštinimo tipas
      description: Vidinio paminkštinimo arba įdėklų sistemos tipas, naudojamas dėklo
