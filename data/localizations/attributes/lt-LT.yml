    seam_design:
      name: Siūlių dizainas
      description: Nurodo kojinių siūlių konstrukciją arba dekoratyvines siūlių savybes.
    seam_gauge_scale_type:
      name: Siūlių matuoklio skalės tipas
      description: Nurodo, kokios skalės / žymėjimai yra ant siūlių matuoklio be pagrindinės
        liniuotės skalės.
    seam_gauge_slider_material:
      name: Siūlių matuoklio slankiklio medžiaga
      description: Identifikuoja reguliuojamo slankiklio / rodyklės komponento medžiagą,
