    fencing_weapon_type:
      name: Fechtavimo ginklo tipas
      description: Nurodo fechtavimo arba treniruočių ginklo stilių, su kuriuo treniruočių
        priemonė yra suderinama arba kurį atitinka, padedant naudotojams rasti tinkamą
        įrangą.
    fender_finish_state:
      name: Sparno apdailos būsena
      description: Nurodo pateikto sparno paviršiaus / apdailos būseną dažymui ir
        paruošimą montavimui.
    fender_pieces_included:
      name: Į komplektą įeinančios purvasaugių dalys
      description: Nurodo komponentus, pateikiamus kartu su produktu, kad būtų aišku,
        ar tai vienas sparnas, ar pilnas rinkinys su aksesuarais.
    fender_type:
      name: Sparno tipas
      description: Klasifikuoja bendrą sparno dizainą arba stilių.
    fennel_trimming:
      name: Pankolio apdorojimas
      description: Nurodo, kurios augalo dalys yra įtrauktos kartu su pankolio svogūnėliu
        (pvz., su lapais, nupjauta viršūne ir šaknimi).
    fennel_variety:
      name: Pankolio rūšis
      description: Nurodo parduodamų pankolio svogūnėlių kultivarą arba rinkos rūšį.
    fermentation_application:
      name: Fermentavimo paskirtis
      description: Identifikuoja pagrindinį maistą arba gėrimą, kurį kultūra skirta
        fermentuoti (pvz., sūrį, jogurtą, pieno kefyrą, raugą).
    fermentation_method:
      name: Fermentavimo metodas
      description: Nurodo, kaip sojų padažas buvo pagamintas arba fermentuotas (pvz.,
        natūraliai brandintas, chemiškai hidrolizuotas).
    fermentation_vessel_material:
      name: Fermentavimo indo medžiaga
      description: Pagrindinė fermentavimo indo medžiaga, įtraukta į rinkinį (jei
        yra).
    ferrule_material:
      name: Antgalio medžiaga
      description: Nurodo medžiagą, naudojamą koto antgaliui (pvz., Juma, Phenolic,
        Polycarbonate, XTC arba be antgalio), darančią įtaką patvarumui ir smūgio
        pojūčiui.
    fia_homologation_certification:
      name: FIA homologacija / sertifikavimas
      description: Nurodo, ar automobilis (arba saugos kapsulė) yra sertifikuotas
        / homologuotas ir pagal kokį standartą.
    fiber_animal_source_type:
      name: Pluošto gyvūno / šaltinio tipas
      description: Gyvūnas arba pagrindinis šaltinis, iš kurio gaunamas pluoštas (arba
        sintetinis), pvz., merino vilna, alpakų vilna ar augaliniai pluoštai.
    fiber_luster_level:
      name: Pluošto blizgesio lygis
      description: Vizualinis pluošto blizgesys – nuo matinio iki labai blizgaus.
    fiber_preparation_processing_stage:
      name: Pluošto paruošimo / apdorojimo etapas
      description: Nurodo, kaip pluošto juosta buvo paruošta / apdorota naudojimui
        (pvz., karšta ar šukuota, maišyta, superwash).
    fiber_preparation_type:
      name: Pluošto paruošimo tipas
      description: Identifikuoja, kaip pluoštas buvo paruoštas rankdarbiams (pvz.,
        karštas sluoksnis, būgniniu karštuvu apdorotas pluoštas, prefelt lakštas).
    field_hockey_ball_playing_surface:
      name: Žolės riedulio kamuoliuko žaidimo paviršius
      description: Identifikuoja žaidimo paviršių arba aplinką, kuriai kamuoliukas
        yra skirtas.
    field_hockey_ball_type:
      name: Žolės riedulio kamuoliuko tipas
      description: Klasifikuoja žolės riedulio kamuoliuką pagal jo paskirtį arba specialią
        savybę.
    field_hockey_goal_size_standard:
      name: Žolės riedulio vartų dydžio standartas
      description: Klasifikuoja vartus pagal įprastus žolės riedulio standartus arba
        treniruočių dydžius (pvz., FIH lauko standartas, jaunimo, mini).
    field_hockey_training_objective:
      name: Žolės riedulio treniruočių tikslas
      description: Apibrėžia pagrindinį įgūdį arba dėmesio sritį, kurią treniruočių
        priemonė skirta tobulinti.
    field_point_attachment_method:
      name: Lauko antgalio tvirtinimo metodas
      description: Nurodo, kaip lauko antgalis tvirtinamas prie strėlės koto arba
        įvorės (pvz., įsukamas, klijuojamas).
    field_point_tip_style:
      name: Lauko antgalio galiuko stilius
      description: Apibrėžia lauko antgalio galiuko geometrinį stilių arba funkcinį
        profilį, darančius įtaką prasiskverbimui, ištraukimui reikalingoms pastangoms
        ir teisėtumui.
    fielding_glove_position:
      name: Gaudymo pirštinės pozicija
      description: Identifikuoja gynybinę poziciją arba naudojimą, kuriam pirštinė
        yra skirta beisbolo arba softbolo žaidime.
    fielding_training_focus:
      name: Gaudymo treniruočių fokusas
      description: Nurodo pagrindinę įgūdžių sritį, į kurią orientuota treniruočių
        priemonė.
    fig_variety:
      name: Figų veislė
      description: Identifikuoja konkrečią parduodamų figų rūšį arba veislę.
    figure_8_device_design:
      name: Aštuoniukės įrenginio dizainas
      description: Identifikuoja konkrečią aštuoniukės įrenginio konfigūraciją, darančią
        įtaką valdymo savybėms ir numatytam naudojimui.
    figure_finish_type:
      name: Figūrėlės apdailos tipas
      description: Nurodo arklio modelio figūrėlės paviršiaus / dažų apdailą (kaip
        ji atrodo / jaučiasi kaip kolekcinis daiktas).
    figurine_scale:
      name: Figūrėlės mastelis
      description: Figūrėlės mastelis / santykis su tikru objektu (kai taikoma), pvz.,
        1:6.
    fill_status:
      name: Užpildymo būsena
      description: Nurodo, ar imtynių manekenas parduodamas užpildytas, neužpildytas
        ar iš dalies užpildytas, kas lemia siuntimo kainą ir pirkėjo pastangas.
    filling_consistency:
      name: Įdaro konsistencija
      description: Apibūdina pateikto įdaro tekstūrą arba klampumą (pvz., glotnus
        kremas, vaisių gabalėliai, pasta).
    filling_type:
      name: Įdaro tipas
      description: Nurodo pagrindinį sausainio įdarą arba kremą, jei toks yra.
    filtration_and_mother_status:
      name: Filtravimo ir „mother“ būsena
      description: Nurodo, ar actas yra filtruotas, nefiltruotas, žalias arba turi
        „mother“, skirtą pirkėjams, ieškantiems probiotinių arba žalių variantų.
    filtration_method:
      name: Filtravimo būdas
      description: Medžiaga arba metodas, naudojami degtinei filtruoti ir valyti po
        distiliavimo.
    fin_box_system:
      name: Peleko dėžutės sistema
      description: Nurodo peleko dėžutę arba tvirtinimo sąsają, kurią naudoja lenta,
        nustatant papildomų pelekų suderinamumą.
    fin_buoyancy:
      name: Peleko plūdrumas
      description: Nurodo, ar pelekas vandenyje yra teigiamo, neutralaus ar neigiamo
        plūdrumo, darančio įtaką naro balansui ir įrangos pusiausvyrai.
    fin_flex_rating:
      name: Peleko lankstumo įvertinimas
      description: Nurodo santykinį peleko standumo arba lankstumo lygį, kuris daro
        įtaką bendram veikimui.
    fin_mounting_system:
      name: Peleko montavimo sistema
      description: Apibrėžia tvirtinimo sąsają arba standartą, naudojamą pelekui pritvirtinti
        prie kaitlentės (pvz., FCS II, prisukamas, 4 skylių), užtikrinant suderinamumą
        tarp pelekų ir lentų.
    fin_position:
      name: Peleko padėtis
      description: Nurodo numatytą peleko montavimo padėtį ant lentos.
    fin_strap_type:
      name: Peleko dirželio tipas
      description: Nurodo dirželio arba tvirtinimo sistemos stilių, naudojamą pelekui
        pritvirtinti prie kulno / pėdos.
    fin_template:
      name: Peleko šablonas
      description: Klasifikuoja banglentės peleko hidrodinaminį šabloną arba kontūrą,
        darančius įtaką posūkių stiliui, greičiui ir bendram lentos pojūčiui.
    finger_count:
      name: Pirštų skaičius
      description: Nurodo pirštų skaičių, kuriam pirštinė, skirtukas arba paleidimo
        rankena yra pritaikyta.
    finger_coverage:
      name: Pirštų uždengimas
      description: Nurodo, kokia pirštų dalis yra uždengta.
    finger_grip_adjustability:
      name: Pirštų rankenos reguliuojamumas
      description: Nurodo, kaip pirštų rankena tvirtinama arba reguliuojama, kad tiktų
        skirtingiems rankų dydžiams.
    finger_hole_configuration:
      name: Pirštų angų konfigūracija
      description: Nurodo pirštų angų orientaciją pagal ranką (dešiniarankiams, kairiarankiams
        arba abiem rankoms).
    finger_hole_count:
      name: Pirštų angų skaičius
      description: Nurodo pirštų angų skaičių rankenos odoje – pagrindinį stiliaus
        skirtumą tarp modelių be pirštų, su 2, 3 arba 4 angomis.
    finger_pick_band_style:
      name: Pirštinio mediatoriaus juostelės stilius
      description: Juostelės / kilpelės, tvirtinamos prie piršto, stilius, darantis
        įtaką komfortui ir reguliuojamumui.
    finger_pick_blade_length:
      name: Pirštinio mediatoriaus mentelės ilgis
      description: Grojimo mentelės ilgis, išsikišantis iš juostelės.
    finger_pick_blade_shape:
      name: Pirštinio mediatoriaus mentelės forma
      description: Stygas liečiančio grojimo paviršiaus (mentelės) forma / profilis.
    finger_pick_size:
      name: Pirštinio mediatoriaus dydis
      description: Pirštinio mediatoriaus juostelės / kilpelės dydis, pritaikytas
        skirtingoms pirštų arba nykščio apimtims (ne instrumento dydžiui).
    finger_pick_wear_location:
      name: Pirštinio mediatoriaus dėvėjimo vieta
      description: Nurodo, ant kurio piršto skirtas dėvėti pirštinis mediatorius arba
        ar produktas yra nykščio ir pirštų rinkinys.
    finger_protection:
      name: Pirštų apsauga
      description: Nurodo, ar pirštinė turi pirštų nugarėlės apsaugą ir ar apsaugos
        yra nuimamos.
    fingerboard_bearing_type:
      name: Fingerboard guolio tipas
      description: Nurodo fingerboard ratukuose naudojamą guolio tipą.
    fingerboard_grip_type:
      name: Žaislinės riedlentės sukibimo tipas
      description: Nurodo sukibimo paviršiaus medžiagą / tipą, naudojamą fingerboard
        lentoje.
    fining_agent_active_ingredient:
      name: Skaidrinimo priemonės aktyvus ingredientas
      description: Pagrindinė skaidrinimo arba valymo priemonė, naudojama produkte.
    fining_agent_type:
      name: Skaidrinimo priemonės tipas
      description: Nurodo skaidrinimo / valymo priemonės cheminę sudėtį arba medžiagą
        produktams, skirtiems raudonam vynui skaidrinti.
    finish_after_baking:
      name: Apdaila po kepimo
      description: Apibūdina tipinę paviršiaus išvaizdą po sukietėjimo / kepimo.
    finish_effect:
      name: Apdailos efektas
      description: Apibūdina specialius paviršiaus / optinius efektus, pritaikytus
        akutėms.
    finish_type:
      name: Apdailos tipas
      description: Ukulelės korpusui pritaikyta paviršiaus apdaila.
    finished_product_format:
      name: Galutinio produkto formatas
      description: Nurodo, kokio tipo kvapų produktą rinkinys skirtas sukurti.
    fire_pit_accessories_included:
      name: Į komplektą įeinantys ugniakuro priedai
      description: Nurodo svarbius aksesuarus, pateikiamus kartu su laužaviete, pvz.,
        kibirkščių apsaugas arba lavos akmenis, aiškiai parodant, kas yra dėžėje.
    firework_assortment_launch_type:
      name: Fejerverkų rinkinio paleidimo tipas
      description: Apibūdina, kaip įtraukti fejerverkai paprastai uždegami / paleidžiami.
    firework_assortment_types_included:
      name: Įtraukti fejerverkų rinkinio tipai
      description: Nurodo pagrindinius į rinkinį įtrauktus fejerverkų tipus, kad pirkėjai
        galėtų palyginti rinkinio turinį (pvz., fontanai, romėniškos žvakės, petardos).
    firework_effect_types:
      name: Fejerverkų efektų tipai
      description: Pagrindinės rinkinio sukuriamų vizualinių ir (arba) sensorinių
        efektų grupės (pasirinkite visus tinkamus variantus).
    firework_ignition_method:
      name: Fejerverkų uždegimo būdas
      description: Nurodo, kaip fejerverkas uždegamas arba inicijuojamas (pvz., dagtis
        arba elektrinis degiklis).
    firework_visual_intensity_level:
      name: Fejerverkų vizualinio intensyvumo lygis
      description: Bendras fontano efekto kibirkščių vizualinis intensyvumas / kiekis.
    firing_mode:
      name: Šaudymo režimas
      description: Išvardija pasirenkamus arba pagrindinius šaudymo režimus, kuriuos
        palaiko airsoft ginklas.
    first_day_cover_cachet_type:
      name: Pirmosios dienos voko kašeto tipas
      description: Pirmosios dienos voko kašeto tipas (pvz., spausdintas, ranka tapytas).
    first_day_cover_cancellation_type:
      name: Pirmosios dienos voko antspaudavimo tipas
      description: Pašto antspaudo, naudojamo ant pirmosios dienos voko, tipas / stilius
        (pvz., mechaninis antspaudas, rankinis antspaudas).
    first_day_cover_set_type:
      name: Pirmosios dienos voko rinkinio tipas
      description: Nurodo, ar vokas atspindi vieną leidimą, pilną rinkinį arba dalinį
        rinkinį / kombinaciją.
    fishing_hook_size:
      name: Žvejybos kabliuko dydis
      description: 'Nurodo standartizuotą žvejybos kabliuko dydžio žymėjimą (pvz.,
        #4, 1/0, 10/0), padedantį žvejams pritaikyti kabliuko matmenis pagal tikslinę
        žuvų rūšį ir masalą.'
    fishing_hook_style:
      name: Žvejybos kabliuko stilius
      description: Nurodo konkretų viengubo kabliuko dizainą arba lenkimo modelį,
        kuris turi įtakos pateikimui, užkabinimo efektyvumui ir numatytam naudojimui.
    fishing_hook_type:
      name: Žvejybos kabliuko tipas
      description: Apibūdina su blizge pateikiamą kabliuko konfigūraciją (jei taikoma).
    fishing_line_application:
      name: Žvejybos valo paskirtis
      description: Nurodo numatytą žvejybos valo arba pavadėlio medžiagos naudojimą
        (pvz., pavadėlis, pagrindinis valas, tippetas).
    fishing_line_buoyancy_type:
      name: Žvejybos valo plūdrumo tipas
      description: Klasifikuoja, kaip valas elgiasi vandens sluoksnyje (pvz., plūduriuojantis,
        tarpinis, skęstantis), padedant žvejams pasirinkti tinkamą pateikimo gylį.
    fishing_needle_purpose:
      name: Žvejybos adatos paskirtis
      description: Nurodo pagrindinį adatos naudojimą žvejybos sistemėlių paruošimo
        darbuose.
    fishing_needle_types_included:
      name: Įtraukti žvejybos adatų tipai
      description: Išvardija konkrečius rinkinyje pateikiamus adatų arba sistemėlių
        įrankių stilius, kad klientai galėtų greitai matyti rinkinio turinį.
    fit_profile:
      name: Pritaikymo profilis
      description: Apibūdina bendrą apsaugos formą ir siluetą, kurie turi įtakos judrumui
        ir padengimui.
    fit_volume_classification:
      name: Pritaikymo tūrio klasifikacija
      description: Klasifikuoja bendrą vidinį bato tūrį, kaip nurodo gamintojai (pvz.,
        LV – mažas tūris).
    fitting_angle:
      name: Jungties kampas
      description: Nurodo jungties korpuso lenkimo kampą (pvz., tiesus, 45°, 90°).
        Naudokite „Reguliuojamas / pasukamas“ jungtims su kintamu kampu ir „Kita“
        neįprastiems kampams.
    flag_base_type:
      name: Vėliavos pagrindo tipas
      description: Nurodo tvirtinimo arba pagrindo stilių, naudojamą kampinei vėliavėlei
        pritvirtinti ant skirtingų žaidimo paviršių.
    flag_design_theme:
      name: Vėliavos dizaino tema
      description: Apibūdina pagrindinę ant vėliavos vaizduojamą dizaino temą (pvz.,
        šalis / nacionalinė, sporto komanda, šventė), padedančią paieškai ir filtravimui
        pagal pirkimo tikslą.
    flag_mounting_method:
      name: Vėliavos tvirtinimo būdas
      description: Nurodo, kaip vėliava tvirtinama prie transporto priemonės (pvz.,
        antenos tvirtinimas, kablio tvirtinimas, magnetinis).
    flag_type:
      name: Vėliavos tipas
      description: Klasifikuoja konkretų golfo vėliavos naudojimo tikslą arba stilių,
        pvz., duobutės vėliava, vežimėlio vėliava arba treniruočių vėliava.
    flame_resistance_standard:
      name: Atsparumo liepsnai standartas
      description: Nurodo konkretų atsparumo liepsnai arba elektros lanko poveikio
        standartą / sertifikatą, kurį atitinka drabužis.
    flamenco_cajon_snare_system:
      name: Flamenko kajono būgnelio sistema
      description: Nurodo vidinį būgnelio mechanizmą, naudojamą būdingam flamenko
        skambesiui sukurti (arba jo nebuvimą).
    flammability_compliance:
      name: Degumo atitiktis
      description: Nurodo taikomą (-us) degumo standartą (-us), kuriuos atitinka transporto
        priemonių salonų audinys.
    flannel_brushing_finish:
      name: Flanelinis šukuotas paviršius
      description: Nurodo, ar flanelė yra šukuota ir kurioje pusėje (-ėse), kas turi
        įtakos minkštumui, šilumai ir išvaizdai.
    flannel_use_type:
      name: Flanelės naudojimo tipas
      description: Pagrindinė numatyta flanelės atraižos / rulono paskirtis.
    flap_configuration:
      name: Skverno konfigūracija
      description: Nurodo balno skverno stilių, pvz., viengubas skvernas arba dvigubas
        skvernas.
    flare_color:
      name: Signalinės raketos spalva
      description: Skleidžiamos šviesos / liepsnos spalva (arba LED signalinių raketų
        lęšio spalva).
    flash_card_included_features:
      name: Įtrauktos mokomųjų kortelių funkcijos
      description: Išskiria funkcines mokymosi / naudojimo funkcijas, įtrauktas į
        mokomąsias korteles.
    flavor_intensity:
      name: Skonio intensyvumas
      description: Nurodo, kiek koncentruotas yra kvapioji medžiaga, padedant naudotojams
        nustatyti tinkamą dozavimą (pvz., standartinio stiprumo, itin stiprus).
    flavor_solvent_base:
      name: Skonio tirpiklio bazė
      description: Nurodo pagrindinį nešiklį arba tirpiklį, naudojamą kvapiojoje medžiagoje
        (pvz., alkoholis, propilenglikolis, glicerinas).
    fleece_fiber_animal_type:
      name: Fliso pluošto gyvūno tipas
      description: Fliso pluošto gyvūninės kilmės šaltinis (rūšis).
    fleece_finish_surface:
      name: Fliso apdaila / paviršius
      description: Apibūdina fliso paviršių / apdailą (pvz., nuo pūkavimosi, šukuotas),
        kurie turi įtakos pūkavimosi savybėms, minkštumui ir išvaizdai.
    fleece_preparation_method:
      name: Fliso paruošimo metodas
      description: Kaip flisas yra paruošiamas / apdorojamas rankdarbiams ir verpimui
        (pluošto būsena).
    flesh_color:
      name: Minkštimo spalva
      description: Nurodo meliono vidinio minkštimo spalvą.
    fletching_orientation:
      name: Plunksnelių orientacija
      description: Nurodo, kaip plunksnelės yra išdėstytos ant strėlės koto (pvz.,
        tiesiai, paslinktai, spiraliniu būdu), kas turi įtakos strėlės sukimui ir
        skrydžiui.
    fletching_profile:
      name: Plunksnelių profilis
      description: Nurodo plunksnelių geometrinę formą arba iškirpimą, kurie turi
        įtakos pasipriešinimui, tarpui, triukšmui ir bendroms strėlės skrydžio savybėms.
    flight_system_type:
      name: Skrydžio sistemos tipas
      description: Nurodo skrydžio sistemos konstrukcijos stilių, atskiriant sulankstomas,
        formuotas ir integruotas plunksnelių ir koto sistemas.
    float_attachment_method:
      name: Plūdės tvirtinimo būdas
      description: Apibūdina, kaip plūdė tvirtinama prie valo (pvz., slankiojanti
        arba fiksuota), leidžiant žvejams filtruoti pagal sistemėlės tipą.
    float_design:
      name: Plūdės dizainas
      description: Klasifikuoja bendrą žvejybos plūdės stilių arba tipą (pvz., bobberis,
        wagleris, pieštukinė), kad žvejai galėtų greitai pasirinkti jų technikai ir
        sąlygoms tinkamą modelį.
    float_raft_use_environment:
      name: Plūdės / plausto naudojimo aplinka
      description: Pagrindinė numatyta pripučiamos priemonės vandens aplinka (baseinas,
        ramus atviras vanduo arba bangavimas), atspindinti patvarumo ir dizaino lūkesčius.
    floatation:
      name: Plūdrumas
      description: Ar švyturys sukurtas plūduriuoti vandenyje.
    floor_construction_type:
      name: Grindų konstrukcijos tipas
      description: Nurodo plausto dugno konstrukciją (pvz., savaime išleidžiantis
        vandenį, „drop-stitch“), kuri turi įtakos vandens nutekėjimui, standumui ir
        veikimui.
    floor_design:
      name: Grindų dizainas
      description: Su aptvaru pateikiamos grindų dangos stilius.
    floor_inclusion:
      name: Grindų įtraukimas
      description: Nurodo, ar prieangyje yra grindys ir ar tos grindys yra nuimamos.
    floor_mat_cleaning_method:
      name: Grindų kilimėlio valymo būdas
      description: Nurodo gamintojo rekomenduojamą pagrindinį grindų kilimėlio valymo
        būdą.
    floor_mat_edge_style:
      name: Grindų kilimėlio kraštų stilius
      description: Apibūdina, ar kilimėlis turi pakeltus kraštus / bortelius skysčiams
        ir nešvarumams sulaikyti.
    floor_mat_format:
      name: Grindų kilimėlio formatas
      description: Nurodo fizinį grindų apsaugos produkto formatą arba stilių (pvz.,
        vienas kilimėlis, sujungiama plytelė, rulonas).
    floor_mat_retention_system:
      name: Grindų kilimėlio tvirtinimo sistema
      description: Nurodo metodą, naudojamą kilimėliui išlaikyti pritvirtintą vietoje.
    floor_mat_set_configuration:
      name: Grindų kilimėlio rinkinio konfigūracija
      description: Nurodo, kurios pozicijos yra įtrauktos į pakuotę (pvz., tik priekinė
        pora, pilnas rinkinys).
    floss_sugar_granulation_grade:
      name: Cukraus vatai skirto cukraus granuliacijos lygis
      description: Apibūdina cukraus mišinio kristalų dydį (smulkus, vidutinis, stambus),
        kuris gali turėti įtakos įrenginio veikimui ir galutinei tekstūrai.
    floss_sugar_product_form:
      name: Cukraus vatai skirto cukraus produkto forma
      description: Nurodo, ar cukrus cukraus vatai yra paruoštas naudoti, ar tai skonio
        koncentratas, kurį reikia maišyti su baziniu cukrumi, ar bespalvis bazinis
        cukrus.
    flour_grind_texture:
      name: Miltų malimo tekstūra
      description: Nurodo miltų malimo dydį arba tekstūrą, pvz., itin smulkūs, vidutiniai,
        stambūs arba malti akmeninėmis girnomis, kas gali turėti įtakos recepto rezultatui.
    flour_processing_method:
      name: Miltų apdorojimo būdas
      description: Nurodo svarbius miltams taikomus apdorojimo arba paruošimo metodus
        (pvz., malti akmeninėmis girnomis, balinti, daiginti, praturtinti), kurie
        turi įtakos skoniui, spalvai arba maistingumui.
    flower_care_instructions:
      name: Gėlių priežiūros instrukcijos
      description: Pateikia rekomenduojamus priežiūros veiksmus, skirtus šviežiai
        skintoms gėlėms (pvz., patrumpinti stiebus, keisti vandenį tam tikru dažnumu).
    flugelhorn_leadpipe_material:
      name: Fliugelhornio kandiklio vamzdžio medžiaga
      description: Kandiklio vamzdžio komponento medžiaga (jei nurodoma atskirai nuo
        bendros instrumento medžiagos).
    flugelhorn_trigger_type:
      name: Fliugelhornio trigerio tipas
      description: Nurodo, ar fliugelhornis turi derinimo trigerį ir kokį stumdomą
        vamzdį / vožtuvą jis valdo.
    fluorescence_grade:
      name: Fluorescencijos lygis
      description: Nurodo deimanto fluorescencijos intensyvumą veikiant UV šviesai.
    fluorescence_under_uv:
      name: Fluorescencija UV šviesoje
      description: Nurodo, ar ir kokio tipo fluorescenciją mėginys rodo ultravioletinėje
        šviesoje.
    fluorocarbon_content:
      name: Fluorokarbono kiekis
      description: Nurodo, ar vaškas turi fluorokarbono priedų ir kokiu lygiu.
    flute_case_capacity:
      name: Fleitos dėklo talpa
      description: Nurodo, ką dėklas skirtas laikyti be pagrindinio fleitos korpuso
        (pvz., fleitą ir pikolą, papildomą galvutę).
    flute_cleaning_rod_tip_type:
      name: Fleitos valymo strypelio antgalio tipas
      description: Apibūdina strypelio galo konstrukciją, kuri laiko šluostę / tamponėlį
        arba liečiasi su instrumentu (pvz., su plyšiu, srieginis, su kilpele).
    flute_footjoint_type:
      name: Fleitos apatinės dalies tipas
      description: Nurodo fleitos apatinės dalies konfigūraciją.
    flute_headjoint_cork_type:
      name: Fleitos galvutės kamščio tipas
      description: Nurodo galvutės kamščio / stabdiklio mazgo medžiagą / tipą, pateikiamą
        su galvute.
    flute_key_system:
      name: Fleitos klavišų sistema
      description: Nurodo fleitoje naudojamą mechaninę / klavišų sistemą (pvz., Boehmo
        sistemą), jei taikoma.
    flute_keywork_material:
      name: Fleitos klavišų mechanizmo medžiaga
      description: Klavišų (mechanikos) medžiaga ir (arba) padengimas, kai jie nurodomi
        atskirai nuo korpuso medžiagos.
    flute_offset_g:
      name: Fleitos paslinktas G
      description: Nurodo, ar fleita turi paslinkto G klavišo išdėstymą.
    flute_wall_thickness:
      name: Fleitos sienelės storis
      description: Fleitos vamzdžio sienelės storio kategorija (plonasienė, standartinė,
        storasienė).
    fly_pattern_type:
      name: Muselės rašto tipas
      description: Klasifikuoja dirbtinę muselę pagal žvejybos stilių arba vabzdžių
        / masalo imitaciją, kad žvejai galėtų greitai filtruoti tinkamą muselės stilių.
    fly_rod_style:
      name: Muselinės meškerės stilius
      description: Klasifikuoja meškerę pagal numatytą metimo discipliną arba paskirtį
        (pvz., vienarankė, switch, spey).
    fly_style:
      name: Muselės stilius
      description: Nurodo ilgųjų apatinių drabužių priekinio atvarto arba angos tipą.
    fly_tying_tools_included:
      name: Įtraukti muselių rišimo įrankiai
      description: Išvardija konkrečius rinkinyje pateikiamus muselių rišimo įrankius,
        kad pirkėjai tiksliai žinotų, kas įtraukta, ir galėtų palyginti rinkinius.
    fly_type:
      name: Atvarto tipas
      description: Nurodo, ar ilgieji apatiniai drabužiai turi funkcinį atvartą ir
        jo stilių.
    flyer_hook_mounting_method:
      name: Skrajutės kablio tvirtinimo būdas
      description: Nurodo, kaip kablis tvirtinamas prie skrajutės (pvz., įsukamas
        arba įspaudžiamas), kas turi įtakos montavimui ir suderinamumui.
    flyer_hook_orientation:
      name: Skrajutės kablio orientacija
      description: Nurodo, ar kablis skirtas kairei ar dešinei skrajutės pusei, ar
        yra apverčiamas / universalus.
    flyer_kit_finish_coating:
      name: Skrajutės rinkinio apdaila / danga
      description: Paviršiaus apdaila, taikoma skrajutės rinkinio komponentams.
    flyer_kit_included_components:
      name: Įtraukti skrajutės rinkinio komponentai
      description: Nurodo, kokios dalys yra įtrauktos į rinkinį.
    flyer_orifice_type:
      name: Skrajutės angos tipas
      description: Nurodo skrajutėje naudojamos angos stilių.
    flying_disc_feature_set:
      name: Skraidančio disko funkcijų rinkinys
      description: Išskirtinės skraidančio disko funkcinės savybės.
    flysheet_material:
      name: Tento medžiaga
      description: Nurodo pagrindinį audinį, naudojamą išorinei palapinės dangai /
        tentui, kuris turi įtakos svoriui, patvarumui ir atsparumui oro sąlygoms.
    flywheel_balance_type:
      name: Smagračio balansavimo tipas
      description: Nurodo, ar smagratis yra neutraliai subalansuotas, ar naudoja išorinį
        disbalanso svorį.
    foam_blocks_size_class:
      name: Putplasčio blokų dydžio klasė
      description: Nurodo bendrą rinkinyje esančių blokų dydžio klasę.
    foam_blocks_surface_texture:
      name: Putplasčio blokų paviršiaus tekstūra
      description: Apibūdina putplasčio blokų išorinio paviršiaus pojūtį / apdailą.
    foam_surface_effect:
      name: Putplasčio paviršiaus efektas
      description: Apibūdina įprastus dekoratyvinius paviršiaus efektus, taikomus
        rankdarbių putplasčiui arba polistirenui, pvz., blizgučių, metalizuotą arba
        holografinę apdailą.
    foil_color:
      name: Folijos spalva
      description: Nurodo sertifikate naudojamą folijos akcento spalvą (jei taikoma).
    foil_curtain_mounting_method:
      name: Folijos užuolaidos tvirtinimo būdas
      description: Nurodo, kaip folijos užuolaida skirta montuoti arba kabinti (pvz.,
        lipni juosta, žiedeliai).
    foil_discipline:
      name: Foilo disciplina
      description: Nurodo pagrindinį važiavimo stilių arba discipliną, kuriai foilas
        yra skirtas.
    foil_mast_board_mounting_type:
      name: Foilo stiebo tvirtinimo prie lentos tipas
      description: Apibrėžia sąsają stiebo viršuje, kuri tvirtinama prie lentos arba
        foilo bėgelio.
    foil_mast_fuselage_connection_type:
      name: Foilo stiebo ir fiuzeliažo jungties tipas
      description: Nurodo, kaip stiebas jungiasi prie fiuzeliažo arba priekinio sparno
        mazgo.
    foil_mounting_interface:
      name: Sparno montavimo sąsaja
      description: Nurodo jungties standartą, kurį dalis naudoja tvirtinimui prie
        lentos arba kitų foilo komponentų.
    foil_mounting_system:
      name: Sparno montavimo sistema
      description: Nurodo foilų arba pelekų tvirtinimo sąsają ant lentos, užtikrinančią
        suderinamumą su turima naudotojo įranga.
    foil_mounting_type:
      name: Sparno montavimo tipas
      description: Nurodo sąsajos sistemą, naudojamą foilui pritvirtinti prie lentos,
        užtikrinančią komponentų suderinamumą.
    fold_over_elastic_application:
      name: Užlenkiamos elastinės juostos paskirtis
      description: Pagrindinė numatyta sagų skylių elastinės juostos naudojimo paskirtis.
    foldability:
      name: Sulankstomumas
      description: Apibūdina, ar ir kaip pertvara susilanksto arba susiskleidžia laikymui
        ar perkonfigūravimui.
    foldability_stow:
      name: Sulankstomumas (laikymas)
      description: Nurodo, ar laikiklis susilanksto / susideda, kai nėra naudojamas
        (pvz., susilanksto prie transporto priemonės).
    folding_style:
      name: Sulankstymo stilius
      description: Nurodo, kaip „crash pad“ susilanksto transportavimui ir laikymui,
        kas turi įtakos nusileidimo paviršiaus vientisumui ir supakavimui.
    food_basket_items_included:
      name: Įtraukti maisto krepšelio elementai
      description: Išvardija pagrindinius į krepšelį įtrauktų maisto produktų tipus,
        kad pirkėjai galėtų pasirinkti krepšelius pagal gavėjų skonį ar mitybos poreikius.
    food_coloring_form:
      name: Maistinių dažų forma
      description: Nurodo fizinę formą arba pateikimo formatą, kuriuo pateikiami maistiniai
        dažai (pvz., gelis, skystis, milteliai, purškalas).
    food_contact_material:
      name: Su maistu besiliečianti medžiaga
      description: Pagrindinė vyndarystės įrangos elementų (fermentatorių, sifonų,
        piltuvų), naudojamų su misa / vynu, medžiaga.
    food_packing_medium:
      name: Maisto pakavimo
      description: Nurodo terpę, kurioje supakuoti vaisiai arba daržovės (pvz., vanduo,
        sūrymas, sirupas, aliejus).
    foosball_rod_type:
      name: Stalo futbolo strypo tipas
      description: Nurodo strypo mechaninę konfigūraciją, kuri turi įtakos žaidimo
        pojūčiui ir saugumui.
    foot_arch_type_compatibility:
      name: Suderinamumas su pėdos skliauto tipu
      description: Nurodo pėdos skliauto profilį, kuriam skirtas įdėklas.
    foot_arch_type_suitability:
      name: Tinkamumas pėdos skliauto tipui
      description: Nurodo, kurį pėdos skliauto profilį įdėklas skirtas palaikyti.
    foot_coverage:
      name: Pėdos padengimas
      description: Nurodo, ar kojų drabužis yra su pėdomis, be pėdų, su kilpa ar atviru
        kulnu.
    foot_guard_type:
      name: Pėdos apsaugos tipas
      description: Nurodo, ar kojos apsauga turi pirštų / pėdos apsaugą ir ar ši apsauga
        yra fiksuota ar nuimama.
    foot_support_level:
      name: Pėdos prilaikymo lygis
      description: Nurodo bato įdėklo suteikiamo struktūrinio palaikymo arba standumo
        lygį, pvz., žemą, vidutinį, aukštą arba itin aukštą.
    footbag_play_style:
      name: Footbag žaidimo stilius
      description: Pagrindinis numatytas footbag žaidimo stilius.
    football_ball_type:
      name: Futbolo kamuolio tipas
      description: Nurodo pagrindinį numatytą futbolo kamuolio naudojimą arba paskirtį,
        pvz., žaidimui, treniruotėms ar kolekciniam eksponavimui.
    football_dummy_type:
      name: Futbolo manekeno tipas
      description: Klasifikuoja manekeno stilių arba funkcinį dizainą pagal jo konkrečią
        treniruočių paskirtį.
    football_glove_certification:
      name: Futbolo pirštinių sertifikavimas
      description: Nurodo sertifikavimą arba standartų atitiktį, reikalingą varžybiniam
        žaidimui (pvz., SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Lovos kojūgalio tvirtinimo tipas
      description: Nurodo, kaip kojūgalis tvirtinamas prie lovos rėmo arba grindų,
        padedant pirkėjams pasirinkti suderinamą įrangą ir montavimo būdus.
    footboard_style:
      name: Kojūgalio stilius
      description: Nurodo kojūgalio konstrukcinį arba estetinį dizaino stilių.
    footrest_adjustability:
      name: Pakojo reguliavimas
      description: Nurodo, ar ir kaip pakojai gali būti reguliuojami, kad tiktų skirtingam
        vaikų kojų ilgiui.
    footrest_type:
      name: Pakojo tipas
      description: Nurodo pakojo buvimą ir dizainą ant taburetės.
    footstrap_configuration:
      name: Pėdos dirželių konfigūracija
      description: Nurodo pėdos dirželių įdėklų išdėstymą ant lentos paviršiaus.
    footswitch_action_style:
      name: Kojinio jungiklio veikimo stilius
      description: Nurodo, ar jungiklio veikimas yra momentinis ar fiksuojamas, ir
        ar palaikomi abu variantai.
    footswitch_power_source:
      name: Kojinio jungiklio maitinimo šaltinis
      description: Nurodo, kaip maitinamas kojinis jungiklis, jei taikoma (pasyviai
        per stiprintuvo lizdą, baterija, išorinis adapteris, USB ir kt.).
    footwear_construction_method:
      name: Avalynės gamybos būdas
      description: Nurodo technologiją, naudojamą viršutinei daliai pritvirtinti prie
        pado, kuri turi įtakos patvarumui, persiuvimo galimybėms ir kainai.
    footwear_cut:
      name: Avalynės aukštis
      description: Nurodo kulkšnies apykaklės aukštį (žema, vidutinė, aukšta), derinant
        judrumą ir palaikymą.
    footwear_size_system:
      name: Avalynės dydžių sistema
      description: Nurodo regioninį dydžių standartą, naudojamą nurodytam batų dydžiui
        (pvz., US, EU, UK).
    footwear_support_type:
      name: Avalynės palaikymo tipas
      description: Nurodo biomechaninio palaikymo arba pronacijos kontrolės lygį,
        kurį suteikia avalynė (pvz., neutrali, stabilumo, judesio kontrolė).
    fork_material:
      name: Šakės medžiaga
      description: Nurodo medžiagą, naudojamą dviračio priekinei šakei, kuri turi
        įtakos standumui, svoriui ir važiavimo kokybei.
    form_factor:
      name: Formos faktorius
      description: Pagrindinis DMX valdiklio aparatinės įrangos formos faktorius.
    formula_car_series_class:
      name: Formulės automobilio serija / klasė
      description: Nurodo lenktynių seriją arba klasę, kurioje formulės automobilis
        sukurtas varžytis.
    formulation_style:
      name: Formulės stilius
      description: Išskiria specializuotas formules, sukurtas konkrečiam naudojimui
        arba pageidavimams (pvz., Barista, Extra Creamy).
    formulation_type:
      name: Formulės tipas
      description: Dezinfekcinio purškalo formulės tipas.
    fossil_preparation_level:
      name: Fosilijos paruošimo lygis
      description: Mėginio paruošimo / valymo lygis (pvz., neparuoštas matricoje arba
        visiškai paruoštas).
    fossil_preservation_type:
      name: Fosilijos išsilaikymo tipas
      description: Fosilijos išsilaikymo tipas (pvz., permineralizuota, liejinys,
        forma, atspaudas).
    fossil_restoration_status:
      name: Fosilijos restauravimo būsena
      description: Nurodo, ar ir kaip mėginys buvo taisytas / restauruotas (pvz.,
        klijuotas, rekonstruotas, sudėtinis).
    foundation_configuration:
      name: Pagrindo konfigūracija
      description: Nurodo, ar pagrindas pagamintas kaip vientisa dalis, ar kaip padalintas
        / dviejų dalių rinkinys didesniems čiužinių dydžiams.
    foundation_profile:
      name: Pagrindo profilis
      description: Klasifikuoja bendrą pagrindo aukščio kategoriją, pvz., itin žemas,
        žemas, standartinis arba aukštas profilis, kad pirkėjai galėtų greitai suderinti
        čiužinio aukščio pageidavimus ir paklodės tinkamumą.
    frame_adjustability:
      name: Rėmo reguliavimas
      description: Nurodo, ar ir kaip rėmas gali būti reguliuojamas (pvz., pločio
        / aukščio reguliavimas, pasukimas / pakreipimas), kas turi įtakos ergonomikai
        ir projekto tinkamumui.
    frame_drum_jingle_configuration:
      name: Rėminio būgno žvangučių konfigūracija
      description: Nurodo, ar rėminis būgnas turi žvangutes ir, jei taip, bendrą jų
        konfigūraciją.
    frame_drum_tuning_system:
      name: Rėminio būgno derinimo sistema
      description: Nurodo, kaip rėminis būgnas derinamas arba ar jis gali būti derinamas.
    frame_finish:
      name: Rėmo apdaila
      description: Nurodo apsauginę dangą arba medžiagos apdailą, taikomą rėmui, kuri
        turi įtakos patvarumui ir estetikai.
    frame_mounting_standard:
      name: Rėmo montavimo standartas
      description: Nurodo bato ir rėmo sąsajos specifikaciją (pvz., 195 mm 2 taškų,
        Trinity 3 taškų), svarbią rėmo suderinamumui.
    frame_steel_gauge:
      name: Rėmo plieno storis
      description: Nurodo plieninių vamzdžių, naudojamų stovo statramsčiuose, storį,
        kuris yra svarbus tvirtumo ir stabilumo rodiklis.
    frame_suspension_type:
      name: Rėmo pakabos tipas
      description: Nurodo dviračio rėmo pakabos konstrukciją, pvz., standi, hardtail
        arba pilna pakaba, kad pirkėjai galėtų pasirinkti jų planuojamai komplektacijai
        tinkamą rėmą.
    free_reed_instrument_orientation:
      name: Laisvaliežuvio instrumento orientacija
      description: Nurodo, kaip instrumentas laikomas / grojamas (rankoje su dumplėmis,
        su diržu ant peties ir kt.), ergonomikos ir naudojimo filtravimo tikslais.
    free_weight_rack_type:
      name: Laisvųjų svorių stovo tipas
      description: Klasifikuoja stovo konstrukcinį stilių arba funkciją (pvz., štangos
        stovas, giros stovas, diskų stovas).
    freehub_body_type:
      name: Laisvosios stebulės korpuso tipas
      description: Nurodo laisvosios stebulės korpuso arba kasetės laikiklio standartą,
        palaikomą galinės dviračio stebulės.
    freehub_driver_standard:
      name: Laisvosios stebulės laikiklio standartas
      description: Nurodo kasetės / laikiklio sąsają, kurią palaiko stebulės dalis
        (pvz., Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Laisvosios eigos sriegio standartas
      description: Nurodo stebulės sriegio standartą arba dydį, su kuriuo suderinama
        laisvoji eiga.
    french_horn_bell_construction:
      name: Valtorno gaubto konstrukcija
      description: Nurodo, kaip gaubtas yra sukonstruotas ir ar jis gali būti nuimamas
        transportavimui / aptarnavimui.
    french_horn_bell_material:
      name: Valtornos gaubto medžiaga
      description: Nurodo valtornos gaubto (ir dažnai gaubto išplatėjimo) medžiagą
        / lydinį.
    french_horn_bell_type:
      name: Valtornos gaubto tipas
      description: Gaubto konstrukcijos stilius.
