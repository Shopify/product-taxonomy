    electronic_drum_module_power_source:
      name: Elektroninio būgnų modulio maitinimo šaltinis
      description: Nurodo valdymo moduliui reikalingą arba palaikomą maitinimo šaltinį.
    electronic_drum_module_sample_import_support:
      name: Elektroninių būgnų modulio semplų importo palaikymas
