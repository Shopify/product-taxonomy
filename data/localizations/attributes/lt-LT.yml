        originalios sėdynės.
    seat_belt_strap_installation_location:
      name: Saugos diržo juostos montavimo vieta
      description: Nurodo, kur diržo sistemoje montuojama juosta.
    seat_cover_placement:
      name: Sėdynės uždangalo vieta
      description: Nurodo, kuriai (-ioms) sėdėjimo vietai (-oms) transporto priemonėje
        skirtas užvalkalas.
    seat_cover_securement_method:
      name: Sėdynės užvalkalo tvirtinimo būdas
      description: Nurodo pagrindinį būdą, kuriuo užvalkalas pritvirtinamas prie sėdynės.
