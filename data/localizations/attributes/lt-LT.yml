      name: Į komplektą įeinantys krepso priedai
      description: Nurodo papildomus craps žaidimui skirtus aksesuarų daiktus, įtrauktus
        be kauliukų / žetonų / išdėstymo.
    crash_cymbal_profile:
      name: Crash lėkštės profilis
      description: Bendras lėkštės išlinkimas / profilis (kiek ryškus išgaubimas),
        darantis įtaką tonui ir reakcijai.
    crash_cymbal_sound_character:
      name: "„Crash“ būgnų lėkščių garso charakteris"
      description: Pagrindiniai crash lėkštės garso toninio charakterio apibūdinimai.
    crash_pad_size_class:
      name: Kritimo kilimėlio dydžio klasė
      description: Nurodo bendrą laipiojimo kritimo kilimėlio dydžio kategoriją, suteikiant
        pirkėjui greitą supratimą apie dengiamą plotą be tikslių matmenų.
    crate_engine_assembly_level:
      name: Crate variklio surinkimo lygis
      description: Nurodo, kiek pilnai sukomplektuotas crate variklis yra pristatymo
        metu (kokie pagrindiniai komponentai yra įtraukti).
    cream_base_ingredient:
      name: Grietinėlės pagrindinis ingredientas
      description: Identifikuoja pagrindinį grietinėlės šaltinį, apimantį tiek pieno
        kilmės rūšis, tiek augalines alternatyvas.
    cream_cheese_base:
      name: Kreminio sūrio pagrindas
      description: Nurodo pagrindinį pieno arba augalinės kilmės šaltinį, naudojamą
        kreminiam sūriui gaminti, padedant pirkėjui atsižvelgti į mitybos, alergenų
        ir skonio aspektus.
    cream_cheese_form:
      name: Tepamojo sūrio forma
      description: Apibūdina kreminio sūrio fizinę formą arba tekstūros stilių (pvz.,
        blokas, plakta, užtepėlė), darančią įtaką tepamumui ir numatytam naudojimui.
    cream_variety:
      name: Grietinėlės rūšis
      description: Identifikuoja konkretų grietinėlės stilių pagal riebalų kiekį,
        apdorojimo stilių arba numatytą kulinarinį naudojimą (pvz., Half & Half, Double
        cream, Cooking cream).
    crib_accessory_features:
      name: Lovytės priedų ypatybės
      description: Nurodo funkcines arba komforto savybes, būdingas kūdikių lovytės
        ir mažų vaikų lovos aksesuarų daiktams, pvz., laidumą orui arba elastinius
        kraštus.
    crib_bumper_features:
      name: Lovytės apsaugos savybės
      description: Pabrėžia ypatingas funkcines lovytės apsaugos savybes
    crib_conversion_kit_components:
      name: Lovytės konversijos rinkinio komponentai
      description: Nurodo pagrindines į rinkinį įtrauktas dalis, kad pirkėjas galėtų
        patikrinti, ar turi viską, ko reikia montavimui.
    cricket_ball_grade:
      name: Kriketo kamuolio klasė
      description: Nurodo kamuolio kokybės lygį arba numatytą žaidimo standartą.
    cricket_ball_piece_construction:
      name: Kriketo kamuolio dalių konstrukcija
      description: Nurodo išorinių dalių arba formuotų sekcijų skaičių, naudojamą
        kamuolio apvalkalui sukurti, kuris yra svarbus kokybės ir kainos rodiklis.
    cricket_ball_type:
      name: Kriketo kamuoliuko tipas
      description: Nurodo su produktu pateikiamo kriketo kamuolio tipą arba nurodo,
        jei kamuolys nėra įtrauktas.
    cricket_bat_accessory_type:
      name: Kriketo lazdos aksesuaro tipas
      description: Nurodo kriketo lazdos aksesuaro arba priežiūros priemonės tipą,
        kad pirkėjas galėtų greitai filtruoti reikiamą produktą.
    cricket_bat_size:
      name: Kriketo lazdos dydis
      description: Nurodo standartizuotą kriketo lazdos dydžio klasifikaciją (0-6,
        Harrow, SH, LH), paprastai pasirenkamą pagal žaidėjo amžių ir ūgį.
    cricket_bat_size_compatibility:
      name: Suderinamumas su kriketo lazdos dydžiu
      description: Nurodo lazdos dydžius, kuriems aksesuaras yra skirtas, užtikrinant
        tinkamą suderinamumą.
    cricket_helmet_role:
      name: Kriketo šalmo paskirtis
      description: Nurodo žaidimo vaidmenį, kuriam šalmas yra skirtas, pvz., mušimui
        arba wicket-keeping.
    cricket_leg_guard_type:
      name: Kriketo kojų apsaugos tipas
      description: Nurodo konkretų kriketo kojų apsaugos tipą.
    cricket_player_role:
      name: Kriketo žaidėjo vaidmuo
      description: Nurodo pagrindinį žaidimo vaidmenį, kuriam batas yra skirtas.
    cricket_protection_grade:
      name: Kriketo apsaugos klasė
      description: Nurodo apsaugos klasės klasifikaciją, priskirtą kriketo įrangos
        gamintojų.
    cricket_stump_base_type:
      name: Kriketo stulpelių pagrindo tipas
      description: Nurodo pagrindo stilių arba medžiagą, pateikiamą kartu su stulpeliais,
        darančią įtaką stabilumui ir tinkamumui žaidimo paviršiui.
    cricket_stump_target_features:
      name: Kriketo stulpelių taikinio savybės
      description: Nurodo išskirtines funkcines savybes, gerinančias treniruočių naudojimą,
        matomumą, patvarumą arba stabilumą.
    cricket_stump_type:
      name: Kriketo stulpelių tipas
      description: Klasifikuoja vartelių tipą arba konstrukciją, padedant pirkėjui
        pasirinkti tarp tradicinių rungtynių vartelių, treniruočių variantų arba modernių
        apšviečiamų modelių.
    cricket_training_focus:
      name: Kriketo treniruočių fokusas
      description: Pagrindinis kriketo įgūdis arba disciplina, kurią priemonė yra
        skirta tobulinti.
    croquet_set_components_included:
      name: Į komplektą įeinantys kroketo rinkinio komponentai
      description: Nurodo visus pagrindinius komponentus, įtrauktus į rinkinį (pvz.,
        vartelius, kuoliukus, nešiojimo krepšį), kad klientas tiksliai suprastų, ką
        perka.
    cross_country_binding_system:
      name: Slidinėjimo kroso tvirtinimo sistema
      description: Nurodo slidinėjimo apkaustų standartą, kuriam produktas yra išgręžtas
        arba suderinamas.
    cross_stitch_chart_symbol_type:
      name: Kryžminio siuvinėjimo schemos simbolių tipas
      description: Nurodo, kaip schema yra pateikiama (simboliais, spalvomis arba
        abiem).
    cross_stitch_finishing_type:
      name: Kryžminio siuvinėjimo užbaigimo tipas
      description: Numatyta susiūto projekto užbaigimo / eksponavimo forma.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Kryžminio siuvinėjimo rėmo audinio laikymo mechanizmas
      description: Nurodo, kaip audinys yra pritvirtinamas / įtempiamas rėme (pvz.,
        segtukais, spaustukais, smeigtukais), kas daro įtaką naudojimo patogumui ir
        audinio suderinamumui.
    cross_stitch_frame_included_components:
      name: Įtraukti kryžminio siuvinėjimo rėmo komponentai
      description: Nurodo, kas įtraukta į pakuotę (pvz., tik rėmas arba rėmas + spaustukai
        + stovas), sumažinant neaiškumus ir grąžinimus.
    cross_stitch_frame_type:
      name: Kryžminio siuvinėjimo rėmo tipas
      description: Nurodo kryžminio dygsnio rėmo konstrukciją / tipą (kaip laikomas
        audinys), darančią įtaką naudojimui ir projekto suderinamumui.
    cross_stitch_pattern_technique:
      name: Kryžminio siuvinėjimo rašto technika
      description: Kryžminio siuvinėjimo technika / stilius, reikalingas schemai.
    crossbar_shape_profile:
      name: Skersinio forma / profilis
      description: Nurodo skersinio aerodinaminę / profilio formą.
    crossbar_style:
      name: Skersinio tipas
      description: Identifikuoja skersinio konstrukcijos stilių, atskiriant standžius
        varžybinius skersinius nuo lanksčių arba hibridinių treniruočių skersinių.
    crossbow_type:
      name: Arbaleto tipas
      description: Nurodo pagrindinį arbaleto konstrukcijos tipą, pvz., compound,
        recurve arba pistol. Konstrukcijos tipas lemia veikimą, dydį ir naudojimo
        atvejus, todėl pirkėjas dažnai filtruoja pagal jį.
    crossover_component_type:
      name: Krosoverio komponento tipas
      description: Identifikuoja pagrindinę komponentų topologiją, naudojamą pasyviame
        krosoverio tinkle.
    crossover_configuration:
      name: Krosoverio konfigūracija
      description: Nurodo, ar krosoveris naudoja vieną perskyrimo tašką ar kelis taškus
        (pvz., 2 juostų arba 3 juostų konstrukcijos).
    crossover_type:
      name: Krosoverio tipas
      description: Krosoverio tinklo tipas, įtrauktas į komponentų rinkinį.
    crown_profile:
      name: Karūnos profilis
      description: Nurodo kepurės viršaus aukštį / profilį virš snapelio.
    crown_style:
      name: Karūnos stilius
      description: Apibrėžia bendrą katiliuko kepurės viršaus siluetą arba profilį.
    crust_taste_profile:
      name: Plutos skonio profilis
      description: Nurodo, ar plutos pagrindinis skonio pobūdis yra saldus, sūrus
        ar neutralus.
    crystal_finish:
      name: Krištolinė apdaila
      description: Nurodo biraus kristalo paviršiaus apdailą, dangą arba apdorojimo
        būseną (pvz., neapdorotas, poliruotas, gludintas, briaunuotas, matinis, aura
        danga padengtas, dažytas, termiškai apdorotas).
    crystal_material:
      name: Kristalo medžiaga
      description: Nurodo medžiagą, naudojamą laikrodžio stikliukui, apsaugančiam
        ciferblatą.
    crystalline_finish_style:
      name: Kristalinės apdailos tipas
      description: Būdinga kristalinė / plunksniška išvaizda, kurią palmių vaškas
        sukuria užbaigtose žvakėse.
    cucumber_variety:
      name: Agurkų rūšis
      description: Nurodo agurko kultivarą arba rinkos rūšį (pvz., English, Persian,
        Kirby).
    cue_compatibility:
      name: Lazdų suderinamumas
      description: Nurodo lazdos jungties konfigūraciją, kuriai dėklas yra skirtas,
        pvz., vientisoms arba 3/4 jungties lazdoms.
    cue_construction:
      name: Lazdų konstrukcija
      description: Nurodo, kaip lazda yra sukonstruota – dalių skaičių arba ar tai
        dalinis komponentas, pvz., tik rankena arba tik kotas, kas daro įtaką nešiojamumui
        ir suderinamumui.
    cue_head_material:
      name: Lazdos galvučių medžiaga
      description: Identifikuoja lazdos galvutės (dalies, kuri liečiasi su rituliu)
        medžiagą, darančią įtaką patvarumui ir paviršiaus apsaugai.
    cue_sport_compatibility:
      name: Suderinamumas su lazdų sportu
      description: Identifikuoja, kuriam lazdų sportui aksesuaras yra skirtas.
    cue_thread_size:
      name: Lazdos sriegio dydis
      description: Nurodo sriegio specifikaciją, naudojamą prailginimams, jungčių
        apsaugoms, svorio varžtams ir kitiems lazdos aksesuarams, kad būtų užtikrintas
        tinkamas pritaikymas.
    cue_tip_hardness:
      name: Lazdos antgalio kietumas
      description: Nurodo lazdos antgalio kietumą, kuris daro įtaką kamuolio kontrolei
        ir pojūčiui.
    cuff_height:
      name: Aulo aukštis
      description: Nurodo bato aulo aukštį (žemas, vidutinis, aukštas, nuimamas /
        reguliuojamas), darantį įtaką atramai ir lankstumui.
    cuff_position:
      name: Rankogalio padėtis
      description: Nurodo, kurioje raitelio kūno vietoje pavadėlio manžetė yra skirta
        tvirtinti.
    cultivation_method:
      name: Auginimo metodas
      description: Nurodo, kaip žalumynai buvo auginti, apimant auginimo technikas
        ir ūkininkavimo praktikas.
    cup_type:
      name: Kaušelio tipas
      description: Nurodo blizgučio paviršiaus profilį (plokščias ar įgaubtas) ir
        įgaubimo gylį, kuris gali paveikti blizgesį, tekstūrą ir tai, kaip jis laikosi
        prisiūtas ar priklijuotas.
    cupcake_size:
      name: Keksiuko dydis
      description: Nurodo parduodamų keksiukų fizinio dydžio kategoriją (pvz., mini,
        standartiniai, labai dideli).
    curd_size:
      name: Varškės grūdelių dydis
      description: Nurodo varškės grūdelių dydį arba tekstūrą.
    cure_method:
      name: Brandinimo būdas
      description: Apibūdina procesą, reikalingą klijams sukietėti arba išdžiūti (pvz.,
        UV šviesa, oro drėgmė, karštis).
    curing_or_preparation_method:
      name: Brandinimo arba paruošimo metodas
      description: Nurodo, kaip alyvuogės buvo sūdytos arba kitaip paruoštos (pvz.,
        sūdytos sūryme, sūdytos aliejuje, keptos ant grotelių).
    curling_broom_head_material:
      name: Kerlingo šepečio galvutės medžiaga
      description: Identifikuoja pagrindinę šepečio galvutės arba pado medžiagos sudėtį.
    curling_broom_head_type:
      name: Kerlingo šepečio galvutės tipas
      description: Nurodo šlavimo galvutės / pado stilių arba konstrukciją.
    curling_shoe_slider_material:
      name: Kerlingo bato slydimo pado medžiaga
      description: Nurodo pagrindinę slystančio pado medžiagą, naudojamą akmenslydžio
        batuose.
    curling_training_aid_type:
      name: Akmenslydžio treniruočių priemonės tipas
      description: Identifikuoja kerlingo treniruočių priemonės tipą.
    curry_variety:
      name: Kario tipas
      description: Klasifikuoja kario padažo produktus pagal konkretų kario stilių
        arba receptą, kuriam jie skirti sukurti, pvz., Tikka Masala, Massaman arba
        Tailando žaliasis karis, kad būtų galima tiksliai filtruoti pagal skonį /
        stilių.
    cushion_rubber_profile:
      name: Pagalvėlės gumos profilis
      description: Biliardo borto gumos dalių formos arba profilio kodas.
    cushioning_level:
      name: Paminkštinimo lygis
      description: Nurodo kojinės suteikiamo paminkštinimo po pėda lygį, skirtą apsaugai
        nuo smūgių ir komfortui.
    custom_label_content_type:
      name: Individualios etiketės turinio tipas
      description: Nurodo, kokia informacija yra individualizuojama įsiuvamoje etiketėje
        (pvz., vardas, logotipas, žinutė, dydis, priežiūros simboliai, kontaktinė
        informacija).
    customization_type:
      name: Individualizavimo tipas
      description: Nurodo, ar marškinėliai yra be užrašų, išduoti žaidėjui ar individualizuoti
        su vardu / numeriu.
    cut_or_preparation_style:
      name: Pjaustymo arba paruošimo stilius
      description: Nurodo, kaip daržovių gabalėliai supjaustyti arba paruošti skardinėje
        ar stiklainyje (pvz., sveiki, kubeliais, juostelėmis).
    cut_resistance_rating:
      name: Atsparumo pjovimui įvertinimas
      description: Nurodo oficialiai išbandytą daikto atsparumo pjovimui lygį.
    cut_type:
      name: Pjovimo tipas
      description: Nurodo, ar audinys parduodamas metrais, kaip iš anksto atkirptas
        gabalas, ar kaip ritinys.
    cutting_application:
      name: Kirpimo paskirtis
      description: Pagrindinė numatyta žirklių pjovimo paskirtis.
    cutting_mat_grid_style:
      name: Pjovimo kilimėlio tinklelio tipas
      description: Ant kilimėlio paviršiaus atspausdinto kreipiklio stilius.
    cutting_mat_intended_use:
      name: Pjovimo kilimėlio paskirtis
      description: Pagrindinė rankdarbių / darbo paviršiaus naudojimo paskirtis, kuriai
        pjovimo kilimėlis yra skirtas.
    cv_boot_clamp_type:
      name: CV manžetės spaustuko tipas
      description: Nurodo spaustuko / juostos tipą, naudojamą CV manžetei pritvirtinti.
    cv_boot_kit_contents:
      name: CV manžetės rinkinio turinys
      description: Nurodo, kas yra įtraukta kartu su CV manžete (pvz., spaustukai,
        tepalo paketas, tvirtinimo juostos).
    cv_boot_material:
      name: CV manžetės medžiaga
      description: Nurodo pagrindinę CV manžetės medžiagos konstrukciją.
    cv_boot_position:
      name: CV manžetės padėtis
      description: Nurodo, ar CV manžetė tinka vidinei ar išorinei CV jungties padėčiai
        ant ašies.
    cycling_apparel_fit:
      name: Dviračių aprangos kirpimas
      description: Apibūdina drabužio kirpimą, nurodant numatytą prigludimą ir aerodinamiką
        (pvz., Race, Relaxed).
    cylinder_head_assembly:
      name: Cilindro galvutės surinkimas
      description: Nurodo cilindro galvutės komplektiškumo lygį pardavimo metu (pvz.,
        visiškai surinkta su vožtuvų mechanizmo komponentais arba neapdorotas / nesurinktas
        liejinys).
    cylinder_head_material_grade:
      name: Cilindro galvutės medžiagos klasė
      description: Nurodo medžiagą ir klasę, naudojamą cilindro galvutės liejiniui.
    cylinder_head_position:
      name: Cilindro galvutės padėtis
      description: Identifikuoja, kuriai eilei / pusei arba orientacijai cilindro
        galvutė tinka kelių eilių varikliuose (pvz., kairė / dešinė pusė arba 1 eilė
        / 2 eilė).
    cymbal_alloy:
      name: Lėkštės lydinys
      description: Rinkinyje esančių lėkščių lydinys / sudėtis.
    cymbal_application:
      name: Lėkštės paskirtis
      description: Pagrindinė grojimo paskirtis, kuriai lėkštė yra sukurta / reklamuojama.
    cymbal_arm_mounting_interface:
      name: Lėkštės laikiklio montavimo sąsaja
      description: Nurodo, kaip lėkštės laikiklis tvirtinamas prie kitos būgnų įrangos
        (pvz., spaustuku, stovu, stovo lizdu).
    cymbal_arm_rotation_positioning_features:
      name: Lėkštės laikiklio sukimo / pozicionavimo funkcijos
      description: Nurodo padėties nustatymo savybes, darančias įtaką tam, kaip svirtis
        gali būti pakreipta / pasukta ir užfiksuota.
    cymbal_arm_style:
      name: Lėkštės laikiklio stilius
      description: Nurodo, ar lėkštės laikiklis yra tiesus ar boom tipo, pagal pasiekiamumo
        ir pozicionavimo poreikius.
    cymbal_drum_case_wheel_configuration:
      name: Lėkščių ir būgnų dėklo ratukų konfigūracija
      description: Nurodo, ar dėklas turi ratukus ir (jei taikoma) ratukų konfigūraciją
        transportavimui ridenant.
    cymbal_hammering_style:
      name: Lėkštės kalimo stilius
      description: Kalimo procesas / išvaizda, darantys įtaką sudėtingumui ir pojūčiui.
    cymbal_kit_components_included:
      name: Į būgnų lėkščių rinkinį įeinantys komponentai
      description: Nurodo, kokie lėkščių tipai yra įtraukti į ride lėkštės rinkinį
        / pakuotę (be pačios ride lėkštės).
    cymbal_kit_items_included:
      name: Į būgnų lėkščių rinkinį įeinantys elementai
      description: Identifikuoja, kurios lėkštės yra įtrauktos į rinkinį / pakuotę
        (pagal lėkštės tipą).
    cymbal_lathing:
      name: Lėkštės tekinimas
      description: Nurodo, ar ir kiek lėkštės paviršiaus yra tekintas (su grioveliais),
        palyginti su netekintu / neapdorotu paviršiumi.
    cymbal_playing_style_genre:
      name: Lėkštės grojimo stilius / žanras
      description: Identifikuoja tipinį atlikimo kontekstą, kuriam lėkštės yra skirtos
        (pvz., pilvo šokių zills arba maršų / orkestrinės rankinės lėkštės).
    cymbal_set_configuration:
      name: Lėkščių rinkinio konfigūracija
      description: Nurodo, ar produktas parduodamas kaip viena lėkštė, suderinta pora
        ar kelių porų rinkinys (pvz., grupiniam mokymui).
    cymbal_sound_character:
      name: Būgnų lėkščių garso charakteris
      description: Nurodo bendrą lėkštės toninį profilį / skambesį, naudojamą paieškai
        (pvz., ryškus arba tamsus).
    cymbal_sustain:
      name: Lėkštės skambėjimo trukmė
      description: Kiek laiko lėkštė skamba po smūgio.
    cymbal_type:
      name: Lėkštės tipas
      description: Nurodo funkcinį lėkštės vaidmenį, kurį elektroninis lėkštės padas
        yra skirtas imituoti.
    cymbal_volume_level:
      name: Lėkštės garsumo lygis
      description: Suvokiamo lėkštės garsumo / išvesties kategorija.
    cymbal_weight_class:
      name: Lėkštės svorio klasė
