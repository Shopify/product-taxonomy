    quilting_thread_usage:
      name: Skiautinių siūlo naudojimas
      description: Nurodo numatytą skiautinių siūlo paskirtį (kaip jis skirtas naudoti).
    quilting_thread_weight_system:
      name: Skiautinių siūlo storio sistema
      description: Nurodo siūlo dydžio / storio vertinimo sistemą, naudojamą siūlo
