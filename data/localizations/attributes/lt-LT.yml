    racing_goggles_lens_system:
      name: Lenktyninių akinių lęšių sistema
      description: Nurodo lęšių keitimo / tear-off sistemos palaikymą akiniuose.
    racing_helmet_certification_standard:
      name: Lenktynių šalmų sertifikavimo standartas
      description: Saugos sertifikatas (-ai), kuriuos atitinka lenktyninis šalmas.
    racing_kart_brake_type:
      name: Lenktyninio kartingo stabdžių tipas
      description: Pagrindinis kartinge sumontuotos stabdžių sistemos tipas.
    racing_kart_class:
      name: Lenktyninio kartingo klasė
      description: Varžybų klasė arba taisyklių rinkinys, kuriam kartingas yra sukurtas
