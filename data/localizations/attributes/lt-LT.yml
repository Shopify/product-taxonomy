        (iš anksto priklijuotas pagrindas ar atskiri lipdukai ir kt.).
    self_adhesive_hook_loop_backing_type:
      name: Lipnaus kabliukų ir kilpelių tvirtinimo pagrindo tipas
      description: Nurodo pagrindo / pamušalo konstrukciją ir klijų sistemą, naudojamą
        lipniojoje pusėje.
    self_adhesive_hook_loop_fastener_shape:
      name: Lipnaus kabliukų ir kilpelių užsegimo forma
      description: Nurodo pateiktų tvirtinimo dalių pjūvį / formą.
