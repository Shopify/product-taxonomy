    eggshell_color:
      name: Kiaušinio lukšto spalva
      description: Nurodo vyraujančią kiaušinių lukšto spalvą.
    elastic_edge_finish_type:
      name: Elastinio krašto apdaila / tipas
      description: Nurodo austos elastinės juostos kraštų konstrukciją, darančią įtaką
        komfortui ir naudojimui.
    elastic_intended_use:
      name: Elastinės juostos numatyta paskirtis
      description: Pagrindinė paskirtis, kuriai elastinė medžiaga yra skirta (padeda
        paieškai ir sumažina neatitikimus).
    elastic_recovery_performance:
      name: Elastinės juostos atsistatymo veikimas
      description: Apibūdina, kaip gerai austa elastinė juosta grįžta į pradinį ilgį
        po ištempimo.
    elastic_recovery_quality:
      name: Elastinės juostos atsistatymo kokybė
      description: Nurodo elastinės juostos atsistatymą po tempimo – kaip gerai ji
        grįžta į pradinį ilgį po ištempimo.
    elastic_stretch_level:
      name: Elastinės juostos tamprumo lygis
      description: Nurodo, kiek elastinė juosta gali išsitempti veikiama įtempimo
        (dažnai išreiškiama santykiniais lygiais, kai tikslus % nepateikiamas).
    elastic_structure:
      name: Elastinės juostos struktūra
      description: Nurodo sagų skylučių elastinės juostos struktūrinę konstrukciją
        (pvz., megzta, austa, pinta), kuri gali paveikti tamprumą, atsistatymą ir
        siuvimo veikimą.
    elastic_type:
      name: Elastinės juostos tipas
      description: Nurodo elastinės juostos konstrukcijos tipą (pvz., užlenkiama elastinė
        juosta (FOE), pinta, megzta, austa).
    electric_assist_type:
      name: Elektrinės pagalbos tipas
      description: Nurodo, ar dviratis turi variklio pagalbą ir kokio tipo pagalba
