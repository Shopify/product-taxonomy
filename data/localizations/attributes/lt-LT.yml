    neck_brace_size_basis:
      name: Kaklo įtvaro dydžio nustatymo pagrindas
      description: Nurodo dydžio nustatymo pagrindą, naudojamą tinkamam kaklo įtvaro
        dydžiui pasirinkti.
    neck_configuration:
      name: Kaklelio konfigūracija
      description: Nurodo su saksofonu pateikiamą kaklelio stilių / konfigūraciją,
        kuris turi įtakos ergonomikai ir grojimo patogumui.
    neck_coverage_type:
      name: Kaklelio uždengimo tipas
      description: Nurodo su antklode pateikiamą kaklo uždengimo stilių.
    neck_support_size_system:
      name: Kaklo atramos dydžių sistema
      description: Nurodo dydžių sistemą, naudojamą lenktynių kaklo atramai / įtvarui
