    lining_type:
      name: Pamušalo tipas
      description: Nurodo, ar maudymosi drabužis turi pamušalą ir kokia apimtimi.
    link_connection_style:
      name: Jungties sujungimo stilius
      description: Klasifikuoja, kaip jungtis sujungia grandinę (pvz., greitoji jungtis,
