      name: Klūpimosios banglentės konstrukcija
      description: Nurodo pagrindinę lentos konstrukcijos techniką arba kompozitinę
        sandarą (pvz., roto-molded plastikas, compression molded, anglies pluoštas).
    kneeboard_strap_type:
      name: Kneeboard diržo tipas
      description: Apibūdina kelių diržų sistemos stilių, naudojamą sportininkui pritvirtinti
