    toe_reinforcement_type:
      name: Kojos pirštų sutvirtinimo tipas
      description: Apibūdina pirštų srities konstrukciją, turinčią įtakos patvarumui
        ir suderinamumui su avalyne.
    toe_stop_stem_thread_size:
      name: Pirštų stabdžio koto sriegio dydis
      description: Nurodo pirštų stabdžio koto sriegio dydį, užtikrinantį suderinamumą
        su plokštele.
    tofu_preparation_style:
      name: Tofu paruošimo būdas
      description: Klasifikuoja tradicinį tofu stilių arba potipį pagal daugiau kriterijų
        nei tik kietumas (pvz., šilkinis, blokinis, pūstas, tofu oda, mazgeliai, fermentuotas).
    tom_mount_adjustment_features:
      name: Tomo laikiklio reguliavimo ypatybės
      description: Nurodo, kokias reguliavimo galimybes suteikia tomo laikiklis būgno
        padėčiai nustatyti (pvz., pakreipimą, pasukimą, aukštį).
    tom_mount_components_included:
      name: Pridedami tomtomų laikiklių komponentai
      description: Nurodo, kurios dalys yra įtrauktos į tomo laikiklį (lizdas, laikiklio
        svirtis, rutulinė jungtis, spaustuvai, atminties fiksatoriai ir kt.).
    tom_mount_mounting_position:
      name: Tomo laikiklio montavimo vieta
      description: Nurodo, kur skirtas tvirtinti tomo laikiklis (pvz., prie bosinio
        būgno, lėkščių stovo ar stovo sistemos).
    tonneau_cover_mounting_style:
      name: Atviro kėbulo uždangalų tvirtinimo būdas
      description: Nurodo, kaip krovinio skyriaus uždangalas montuojamas arba tvirtinamas
        prie pikapo kėbulo bėgelių.
    tool_case_form_factor:
      name: Įrankių dėklo tipas
      description: Nurodo fizinį įrankių dėklo tipą, turintį įtakos transportavimui
        ir laikymui (pvz., portfelis, kietas dėklas).
    tool_functions_included:
      name: Įtrauktos įrankio funkcijos
      description: Išvardija konkrečias remonto ar priežiūros funkcijas, kurias gali
        atlikti daugiafunkcis įrankis arba įrankių rinkinys.
    top_bunk_access_method:
      name: Patekimo į viršutinį gultą būdas
      description: Nurodo, kaip pasiekiamas viršutinis lovos gultas, atsižvelgiant
        į saugumą ir erdvės panaudojimą.
    top_fit:
      name: Viršutinės dalies kirpimas
      description: Nurodo bendrą viršutinės drabužio dalies siluetą arba prigludimą
        prie kūno (pvz., siauras arba laisvas).
    top_hat_style:
      name: Cilindro tipas
      description: Nurodo konkretų cilindro stiliaus variantą.
    top_soundboard_material:
      name: Viršutinės rezonansinės plokštės medžiaga
      description: Nurodo gitaros viršutinės rezonansinės plokštės medžiagą (pagrindinės
        garsą formuojančios plokštės).
    topping_form:
      name: Užpilo forma
      description: Apibrėžia deserto užpilo fizinę formą arba konsistenciją, kad pirkėjas
        galėtų greičiau rasti pageidaujamą variantą.
    topping_type:
      name: Užpilo tipas
      description: Nurodo pagrindinį išorinį spurgos užpilą arba padengimą.
    tow_hook_type:
      name: Vilkimo kablio tipas
      description: Nurodo, ar kneeboard lenta turi integruotą vilkimo kablį, ir apibrėžia
        jo mechanizmo tipą.
    tow_point_configuration:
      name: Vilkimo taško konfigūracija
      description: Nurodo velkamo pripučiamo rato vilkimo taškų konfigūraciją (viengubą,
        dvigubą ar daugialypę), skirtą skirtingoms važiavimo pozicijoms.
    tow_strap_protective_features:
      name: Vilkimo diržo apsauginės ypatybės
      description: Svarbios saugumo ir patvarumo konstrukcinės savybės, integruotos
        į vilkimo diržą.
    tow_strap_type:
      name: Vilkimo diržo tipas
      description: Nurodo funkcinę vilkimo diržo konstrukciją, pvz., statinį vilkimo
        diržą arba kinetinį ištraukimo diržą.
    towable_tube_style:
      name: Velkamo pripučiamo rato tipas
      description: Nurodo bendrą velkamo pripučiamo rato konstrukciją arba formą,
        kuri lemia važiavimo padėtį ir patirtį.
    towed_water_sport_discipline:
      name: Tempiamo vandens sporto disciplina
      description: Nurodo pagrindinę velkamo vandens sporto veiklą, kuriai skirtos
        pirštinės.
    towel_features:
      name: Rankšluosčio ypatybės
      description: Išvardija specialias rankšluosčio savybes arba papildomas funkcijas.
    towel_style:
      name: Rankšluosčio tipas
      description: Klasifikuoja golfo rankšluosčio funkcinį dizainą arba formatą.
    toy_airplane_control_type:
      name: Žaislinio lėktuvo valdymo tipas
      description: Nurodo, kaip naudotojas valdo žaislinį lėktuvą.
    toy_airplane_features:
      name: Žaislinio lėktuvo savybės
      description: Išskiria svarbias žaidimo funkcijas, esančias žaisliniame lėktuve.
    toy_airplane_flight_capability:
      name: Žaislinio lėktuvo skrydžio galimybės
      description: Nurodo, ar žaislinis lėktuvas sukurtas iš tikrųjų skristi / sklęsti,
        ar daugiausia skirtas žaidimui ant žemės arba eksponavimui.
    toy_audio_features:
      name: Žaislo garso funkcijos
      description: Išvardija žaisle integruotas garso funkcijas ir garso efektus.
    toy_boat_play_features:
      name: Žaislinio laivelio žaidimo funkcijos
      description: Išskiria svarbias interaktyvias žaislinių laivelių funkcijas, padedančias
        paieškai ir filtravimui.
    toy_boat_recommended_play_environment:
      name: Rekomenduojama žaislinio laivelio žaidimo aplinka
      description: Nurodo numatytą žaislinio laivelio naudojimo aplinką, kad atitiktų
        pirkėjų lūkesčius ir saugumo reikalavimus (pvz., vonia ar atviras vanduo).
    toy_bowling_equipment_included:
      name: Įtraukta žaislinio boulingo įranga
      description: Nurodo, kurie boulingo komponentai įtraukti į žaislinio boulingo
        rinkinį (pvz., kėgliai, kamuolys, takelis / kilimėlis, nešiojimo krepšys).
    toy_car_features:
      name: Žaislinio automobilio savybės
      description: Išskiria į žaislinį automobilį integruotas žaidimo funkcijas (nesusijusias
        su pavara), tokias kaip šviesos, garsai ar atsidarančios detalės.
    toy_drawing_tablet_accessories_included:
      name: Pridedami žaislinių piešimo planšečių priedai
      description: Papildomi priedai, įtraukti be paties planšetinio kompiuterio (pvz.,
        papildomas rašiklis, antspaudai).
    toy_drawing_tablet_erase_method:
      name: Žaislinės piešimo planšetės trynimo būdas
      description: Nurodo, kaip išvalomas arba ištrinamas piešimo paviršius.
    toy_drawing_tablet_screen_type:
      name: Žaislinės piešimo planšetės ekrano tipas
      description: Naudojamo piešimo / vaizdavimo paviršiaus tipas (pvz., LCD rašymo
        planšetė ar magnetinė planšetė).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Žaislinės piešimo planšetės rašymo / piešimo priemonė
      description: Pagrindinė priemonė, naudojama piešti planšetėje (rašiklio / stiluso
        tipas).
    toy_figure_sound_feature:
      name: Žaislinės figūrėlės garso funkcija
      description: Nurodo, ar gyvūno figūrėlė skleidžia garsus ir kokio tipo jie yra
        (pvz., riaumojimas, tikroviški gyvūnų garsai).
    toy_game_features:
      name: Žaislo / žaidimo ypatybės
      description: Išskiria svarbias žaidimo ar konstrukcines savybes, aktualias paplūdimio
        ir smėlio žaislams.
    toy_gift_basket_items_included:
      name: Pridedami žaislinio dovanų krepšelio elementai
      description: Išvardija pagrindinius žaislų tipus, įtrauktus į dovanų krepšelį
        (pvz., minkštas žaislas, konstruktorius, dėlionė).
    toy_glider_launch_method:
      name: Žaislinio sklandytuvo paleidimo metodas
      description: Nurodo, kaip paleidžiamas žaislinis sklandytuvas, kas turi įtakos
        žaidimo stiliui ir pirkėjų lūkesčiams.
    toy_helicopter_control_type:
      name: Žaislinio sraigtasparnio valdymo tipas
      description: Nurodo, kaip valdomas žaislinis sraigtasparnis (nepriklausomai
        nuo pavaros), pvz., rankiniu pulteliu, programėle arba be valdymo (laisvas
        skrydis).
    toy_helicopter_features:
      name: Žaislinio sraigtasparnio savybės
      description: Pagrindinės žaislinio sraigtasparnio (ypač RC modelių) funkcijos,
        turinčios įtakos naudojimui ir žaidimo vertei.
    toy_jacks_set_items_included:
      name: Įtraukti žaidimo „Jacks“ rinkinio elementai
      description: Nurodo, kurie pagrindiniai elementai įtraukti į žaidimo „Jacks“
