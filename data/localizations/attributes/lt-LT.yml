        arba suaugusiųjų).
    battery_case_certification_standard:
      name: Akumuliatoriaus dėklo sertifikavimas / standartas
      description: Išvardijami atitinkami transportavimo ir saugos sertifikatai arba
        bandymų standartai, kurių reikalavimus atitinka šis dėklas, skirtas baterijų
        transportavimui ir laikymui.
    battery_case_interior_padding_material:
      name: Akumuliatoriaus dėklo vidinė paminkštinimo medžiaga
      description: Nurodo pagrindinę korpuso viduje naudojamą paminkštinimo / pamušalo
        medžiagą (jei taikoma).
    battery_configuration:
      name: Baterijos konfigūracija
      description: Nurodo fizinį baterijos pakuotės išdėstymą / formą (formos faktorių),
        kad naudotojai galėtų pritaikyti bateriją ribotai vietai konkrečiose Airsoft
        replikose.
    battery_group_size:
      name: Akumuliatoriaus grupės dydis
      description: Standartinio dydžio akumuliatoriaus dėklas (pvz., BCI Group 24F,
        H6), skirtas montuoti daugelyje transporto priemonių.
    battery_polarity:
      name: Akumuliatoriaus poliškumas
      description: Nurodo gnybto poliškumą ir orientaciją (teigiamo gnybto padėtį),
        o tai yra pagrindinis montavimo reikalavimas daugeliui automobilių ir sportinių
        transporto priemonių akumuliatorių.
    battery_standards_supported:
      name: Palaikomi akumuliatorių standartai
      description: Nurodo akumuliatoriaus vertinimo standartus, kuriuos matuoklis
        palaiko tikrindamas paleidimo charakteristikas arba būklę.
    battery_voltage_class:
      name: Baterijos įtampos klasė
      description: Dažniausiai naudojama EV baterijų paketo įtampos sistemos klasė,
        skirta greitam filtravimui (pvz., 400 V arba 800 V sistemos).
    batting_cage_components_included:
      name: Į komplektą įeinantys apsaugotos beisbolo treniruočių aikštelės komponentai
      description: Pateikiamas su produktu tiekiamų atskirų dalių sąrašas, kad pirkėjai
        galėtų patikrinti, ar komplekte yra visa sistema, ar tik tam tikros atsarginės
        dalys.
    batting_helmet_accessories_included:
      name: Įtraukti mušimo šalmo aksesuarų daiktai
      description: Pateikiamas su beisbolo šalmu komplektuojamų apsauginių ar kosmetinių
        priedų sąrašas.
    batting_stuffing_form_factor:
      name: Kamšalo ir užpildo formos pavidalas
      description: Nurodo, ar produktas parduodamas kaip birus užpildas, lakštais,
        ritiniais, iš anksto supjaustytais gabalais ar formuotais gaminiais.
    batting_stuffing_loft_level:
      name: Kamšalo ir užpildo purumo lygis
      description: Nurodo kamšalo arba užpildo purumą (santykinį pūstumą / aukštį),
        dažniausiai naudojamą dygsniavimo ir paminkštinimo pasirinkimui.
    batting_stuffing_thermal_insulation_level:
      name: Kamšalo ir užpildo šilumos izoliacijos lygis
      description: Antklodėse, striukėse ir antklodėse naudojamo kamšalo santykinis
        šilumos išlaikymo / izoliacinis efektyvumas.
    batting_tee_base_design:
      name: Smūgiavimo stovo pagrindo konstrukcija
      description: Aprašomas marškinėlių apačios stilius arba konstrukcija, kuri daro
        įtaką stabilumui ir žaidimo paviršių tipams, kuriems jie tinka.
    battle_top_arena_stadium_compatibility:
      name: Kovinių suktukų arenos / stadiono suderinamumas
      description: Nurodo, kuriai arenos / stadiono sistemai produktas yra skirtas
        naudoti (ypač rinkiniams arba specialių formų arenoms).
    battle_top_items_included:
      name: Įtraukti kovinių suktukų daiktai
      description: Nurodo, kurie kovinių suktukų elementai yra įtraukti į rinkinį
        (pvz., suktukas, paleidiklis, arena/stadionas, virvelė, atsarginės dalys).
    battle_top_performance_type:
      name: Kovinio suktuko veikimo tipas
      description: Apibūdina bendrą kovos figūrėlės žaidimo stilių, kuris paprastai
        atspindi jos elgesį arenoje (agresyvus ar orientuotas į ištvermę ir pan.).
    bayan_included_accessories:
      name: Įtraukti bajano aksesuarų daiktai
      description: Aksesuarų daiktai, įtraukti kartu su bajanu (dėžėje).
    bayan_tuning_system_type:
      name: Bajano derinimo sistemos tipas
      description: Nurodo, kaip bajanas yra įtempiamas / derinamas (konstrukcijos
        tipas), darant įtaką pernešamumui ir derinimo paprastumui.
    bb_gun_action_type:
      name: Pneumatinio šautuvo veikimo tipas
      description: Nurodo pneumatinio šautuvo mechaninį užtaisymo arba šaudymo ciklą
        (pvz., svirtinis, pompinis, atverčiamas vamzdis).
    bb_gun_caliber:
      name: BB ginklo kalibras
      description: Nurodo BB šovinių skersmenį, kuriam ginklas yra skirtas, užtikrinant
        šaudmenų suderinamumą.
    bb_gun_part_type:
      name: BB šautuvo dalies tipas
      description: Klasifikuoja konkretų BB ginklams skirtą komponentą arba aksesuarų
        daiktą, leidžiant pirkėjui greitai rasti tikslią atsarginę dalį, patobulinimą
        arba papildomą dalį (pvz., vamzdis, stūmoklio sandariklis, greitas užtaisytojas).
    beach_ball_features:
      name: Paplūdimio kamuolio savybės
      description: Svarbios funkcinės savybės, būdingos paplūdimio kamuoliams.
    beach_bucket_features:
      name: Paplūdimio kibirėlio ypatybės
      description: Funkcinės paplūdimio kibirėlio savybės, darančios įtaką naudojimui,
        patvarumui ir patogumui.
    beach_sand_toy_items_included:
      name: Į komplektą įeina paplūdimio ir smėlio žaislai
      description: Prie kibirėlio pridedami papildomi žaislai, skirti žaidimams paplūdimyje
        ar smėlyje (jei parduodama kaip rinkinys).
    bead_breaker_type:
      name: Padangos briaunos atskyrimo įrankio tipas
      description: Padangų borto atskyriklio tipas/konstrukcija.
    bead_hole_style:
      name: Karoliuko skylės tipas
      description: Nurodo karoliuko skylės ar įpjovos formą ar konfigūraciją, kuri
        lemia, kaip jis laikosi ant kabliuko ar valo.
    bead_type:
      name: Karoliukų tipas
      description: Pagal modelį reikalingas(-i) pagrindinis(-iai) karoliukų tipas(-ai).
    bead_type_patch_embellishment:
      name: Karoliukų tipas (lopų dekoravimas)
      description: Pagrindinis lopo paviršiuje naudojamų karoliukų tipas.
    beaded_accessory_project_type:
      name: Karoliukais puoštų aksesuarų projektų tipas
      description: Kokį aksesuarą sukuria raštas.
    beading_needle_flexibility:
      name: Karoliukų vėrimo adatos lankstumas
      description: Adatos akutės santykinis lankstumas, leidžiantis manevruoti siaurais
        siuvinėjimo takeliais.
    beading_pattern_bead_size:
      name: Karoliukų raštas ir dydis
      description: Nurodo rašte rekomenduojamą karoliukų dydį (-žius) (dažniausiai
        smulkių karoliukų dydžiai, pvz., 11/0, 8/0).
    beading_pattern_chart_format:
      name: Karoliukų vėrimo rašto schemos formatas
      description: Kaip šis modelis pateikiamas vizualiai (pvz., grafiku ar nuotraukomis,
        iliustruojančiomis kiekvieną žingsnį).
    beading_pattern_stitch_technique:
      name: Karoliukų vėrimo dygsnio / technikos tipas
      description: Pagrindinis šio modelio pynimo dygsnis arba technika.
    beading_technique_stitch:
      name: Karoliukų siuvimo technika / dygsnis
      description: Nurodo pagrindinį raštui naudojamą karoliukų vėrimo būdą arba dygsnio
        tipą (pvz., peyote dygsnis, plytelių dygsnis).
    beading_thread_fiber_type:
      name: Siūlų, skirtų karoliukų vėrimui, pluošto tipas
      description: Nurodo karoliukų siūlo pluošto / medžiagos potipį (konkretesnį
        nei bendras „Medžiaga“), svarbų veikimui.
    beading_thread_size:
      name: Karoliukų siūlo dydis
      description: Nurodo gamintojo / pramonės dydžio žymėjimą, naudojamą karoliukų
        vėrimo siūlui (specifinį prekės ženklui / linijai), pvz., dydis D arba 00.
    beading_thread_use_case:
      name: Karoliukų siūlo naudojimo paskirtis
      description: Nurodo pagrindinę siūlomo siuvimo siūlo paskirtį, padėdamas pirkėjams
        pasirinkti tinkamą produktą jų projektui.
    beading_wire_coating_material:
      name: Vielos, skirtos karoliukų vėrimui, danga
      description: Nurodo karoliukų vielos išorinės dangos medžiagą (jei ji yra),
        kuri lemia pojūtį, patvarumą ir atsparumą susisukimams.
    beading_wire_strand_count:
      name: Karoliukų vėrimo vielos gijų skaičius
      description: Nurodo daugiasluoksnės vielos, skirtos karoliukams vėrti, gijų
        skaičių (pvz., 7 gijų, 19 gijų, 49 gijų), kuris turi įtakos lankstumui ir
        kritimui.
    beadlock_type:
      name: Karoliukų tipo
      description: Nurodo, ar ratlankis yra su „beadlock“ sistema ir koks jos tipas
        (tai naudinga visureigių ir UTV pirkėjams).
    beam_material:
      name: Skersinio medžiaga
      description: Pagrindinė sijos / strypo medžiaga (dažnai besiskirianti nuo galvučių
        / priedų).
    beam_pattern:
      name: Šviesos pluošto raštas
      description: Vairavimo ir važiavimo bekelėje apšvietimui naudojamo šviesos srauto
        pasiskirstymo schema.
    bean_bag_fabric_material:
      name: Sėdmaišio audinio medžiaga
      description: Nurodo išorinę medžiagą, iš kurios pagaminti komplekte esantys
        sėdmaišiai.
    bean_paste_variety:
      name: Pupelių pastos rūšis
      description: Klasifikuoja konkrečią pupelių pastos rūšį pagal gamybos būdą arba
        pagrindinę sudedamąją dalį.
    bean_preparation:
      name: Pupelių paruošimas
      description: Nurodo, kaip pupelės yra paruoštos arba apdorotos prieš pardavimą
        (pvz., sveikos ankštys, išlukštentos, smulkintos, daigintos).
    bean_variety:
      name: Pupelių veislė
      description: Nurodo pupelių botaninę arba prekybinę veislę (pvz., žaliosios
        pupelės, edamame, ilgosios pupelės).
    beanie_style:
      name: Kepurės stilius
      description: Nurodo bendrą kepurės dizainą, konstrukciją arba siluetą, kad pirkėjas
        galėtų greitai pasirinkti iš įprastų variantų.
    bearing_clearance:
      name: Guolio laisvumas
      description: Nurodo guolio vidinio radialinio tarpo klasę (vidinio laisvumo
        kiekį); CO klasė taip pat vadinama CN arba standartiniu tarpu.
    bearing_construction_type:
      name: Guolio konstrukcijos tipas
      description: Nurodo stebulėje naudojamą guolio konstrukciją arba tipą (pvz.,
        kasetinį, su laisvais rutuliais).
    bearing_edge_type:
      name: Guolio briaunos tipas
      description: Korpuso guolio briaunos tipas / profilis, kuris daro įtaką garsų
        pradžiai ir trukmei.
    bearing_lubrication:
      name: Guolių tepimas
      description: Nurodo gamybos metu ant guolio užteptą tepalą, pavyzdžiui, tepalą
        arba alyvą.
    bearing_material:
      name: Guolio medžiaga
      description: Nurodo guolio konstrukcijos medžiagą (pvz., plienas, keramikos
        ir plieno mišinys), padėdama dviratininkams pasirinkti tarp ilgaamžiškumo,
        kainos ir eksploatacinių savybių variantų.
    bearing_rating:
      name: Guolių įvertinimas
      description: Nurodo riedučiuose naudojamą guolių tikslumo klasę arba eksploatacinių
        savybių klasę (pvz., ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Guolio sandariklio kodas
      description: Nurodo guolyje naudojamą sandarinimo tipą, kuris turi įtakos ilgaamžiškumui
        ir riedėjimo pasipriešinimui.
    bearing_seal_type:
      name: Guolio sandariklio tipas
      description: Nurodo sandariklio arba apsaugos konstrukciją, kuri apsaugo guolio
        vidų nuo nešvarumų ir daro įtaką trinčiai (pvz., 2RS, ZZ, LLU, atviras).
    bearing_shield_type:
      name: Guolio apsauginio gaubto tipas
      description: Apsaugos arba sandarinimo būdas, skirtas apsaugoti guolio vidines
        dalis.
    bearing_size_code:
      name: Guolio dydžio kodas
      description: Standartizuotas guolio žymėjimas (pvz., 608, 688), apimantis vidinį
        ir išorinį skersmenis bei plotį.
    bearing_type:
      name: Guolio tipas
      description: Nurodo ausinių naudojamų guolių konstrukcijos tipą.
    beater_head_material:
      name: Būgno lazdelės galvutės medžiaga
      description: Nurodo didžiojo būgno plaktuko kontaktinę medžiagą (pvz., veltinį,
        medį, gumą).
    beaters_included:
      name: Į komplektą įtraukti mušikliai
      description: Nurodo, kiek mušiklių yra pridedama prie būgno pedalo (pvz., vienas
        ar du mušikliai) arba ar mušiklis nėra pridedamas.
    bed_base_type:
      name: Lovos pagrindo tipas
      description: Apibūdina lovos arba divano pagrindo konstrukcijos tipą (pvz.,
        plokščias pagrindas, spyruoklinis grotelių pagrindas, reguliuojamas).
    bed_storage_type:
      name: Lovos daiktų laikymo dėžės tipas
      description: Apibūdina lovos rėmo integruotą laikymo mechanizmą.
    bedroom_furniture_items_included:
      name: Į komplektą įeinantys miegamojo baldų elementai
      description: Nurodo atskirus baldų daiktus, įtrauktus į miegamojo rinkinį (pvz.,
        lova, komoda, naktiniai staliukai), leidžiant pirkėjui greitai matyti, kas
        yra įtraukta, neskaitant ilgų aprašymų.
    bedroom_vanity_items_included:
      name: Į komplektą įtraukti miegamojo kosmetinio staliuko elementai
      description: Pateikiamas miegamojo kosmetinio staliuko komplektą sudarančių
        atskirų elementų sąrašas, kad klientai tiksliai žinotų, kas bus pristatyta
        (pvz., veidrodis, krėslas, apšvietimo komplektas).
    beer_based_cocktail_variety:
      name: Alaus kokteilių asortimentas
      description: Klasifikuoja alaus pagrindu pagamintus kokteilius pagal jų konkrečią
        rūšį, pvz., Radler, Shandy, Michelada.
    beet_variety:
      name: Burokėlių veislė
      description: Nurodo burokėlių kultivarą arba veislę, padedant pirkėjui nustatyti
        skonį, spalvą ir kulinarinį panaudojimą (pvz., Red, Golden, Chioggia).
    bell_actuation_mechanism:
      name: Skambučio paleidimo mechanizmas
      description: Nurodo, ką vartotojas turi padaryti, kad skambėtų varpelis, taip
        padėdamas pirkėjams pasirinkti jiems patogiausią variantą.
    bell_guard_coverage_area:
      name: Varpo apsaugos aprėpties zona
      description: Nurodo, kurią varpo dalį apsauga skirta apsaugoti.
    bell_material:
      name: Skambučio medžiaga
      description: Varpo komponento medžiaga (jei nurodyta atskirai nuo bendros instrumento
        medžiagos).
    bellhousing_bolt_pattern:
      name: Varpo korpuso varžtų išdėstymas
      description: Nurodo transmisijos korpuse naudojamą sankabos gaubto / variklio
        pusės varžtų išdėstymo standartą arba tipų grupę.
    bellows_material:
      name: Silfonų medžiaga
      description: Silfono korpuso / dangos medžiaga (jei yra).
    bellows_orientation:
      name: Silfonų išdėstymas
      description: Nurodo silfonų konfigūraciją, naudojamą oro tiekimui į vamzdžius.
    belly_panel_style:
      name: Pilvo panelės tipas
      description: Nurodo juosmens juostos arba pilvo dalies konstrukciją, pritaikytą
        augančiam pilvui.
    belt_buckle_type:
      name: Diržo sagties tipas
      description: Aprašomas konkretaus diržo sagties mechanizmas arba konstrukcija.
    beret_style:
      name: Beretės tipas
      description: Nurodo konkretų beretės dizainą arba kultūrinius variantus.
    berry_species:
      name: Uogų rūšys
      description: Nurodo produkte esančių uogų rūšį, kad pirkėjas galėtų greitai
        filtruoti norimas uogas.
    beta_casein_variant:
      name: Beta-kazeino variantas
      description: Nurodo, kokio tipo beta-kazeino baltymas (pvz., A2) yra piene,
        skirtame vartotojams, kuriems kyla virškinimo problemų.
    beverage_sweetness_level:
      name: Gėrimo saldumo lygis
      description: Gėrimas klasifikuojamas pagal pridėtinio saldiklio ar cukraus kiekį.
    bezel_graduation_units:
      name: Žiedo matavimo padalos
      description: Nurodo sukamojo žiedo matavimo vienetų žymes (laipsniai, miliai
        arba dviguba skalė).
    bicycle_brake_set_components_included:
      name: Į komplektą įeinantys dviračio stabdžių rinkinio komponentai
      description: Pateikiamas komplekte esančių atskirų dalių sąrašas, kad pirkėjai
        tiksliai žinotų, kas įeina į komplektą, ir galėtų palyginti skirtingas komplektų
        sudėtis.
    bicycle_cage_mounting_position:
      name: Dviračio laikiklio tvirtinimo vieta
      description: Nurodo, kurioje dviračio vietoje laikiklis yra skirtas montuoti.
    bicycle_computer_mount_placement:
      name: Dviračio kompiuterio laikiklio montavimo vieta
      description: Nurodo, kurioje dviračio vietoje montuojamas kompiuterio laikiklis,
        pvz., priekyje ant vairo arba ant vairo iškyšos dangtelio.
    bicycle_folding_mechanism:
      name: Dviračio sulankstymo mechanizmas
      description: Nurodo dviračio rėmo mechaninę sulankstymo sistemą (pvz., sulankstomas
        per pusę, sulankstomas vertikaliai).
    bicycle_frame_design:
      name: Dviračio rėmo konstrukcija
      description: Apibūdina bendrą dviračio rėmo stilių, kuris turi įtakos patogumui,
        krovumo galimybėms ir laikymo sąlygoms.
    bicycle_frame_style:
      name: Dviračio rėmo stilius
      description: Nurodo dviračio rėmo konstrukcijos tipą (step-through, lowrider,
        chopper stretch ir kt.), kuris daro įtaką vairuotojo laikysenai ir estetikai.
    bicycle_handlebar_type:
      name: Dviračio vairo tipas
      description: Nurodo konkretų vairo modelį ar geometriją, padėdamas dviratininkams
        pasirinkti vairo modelį, tinkantį jų važiavimo pozicijai ir sporto šakai.
    bicycle_headset_configuration:
      name: Dviračio vairo galvutės konfigūracija
      description: Nurodo dviračio vairo galvutės konstrukcijos tipą arba standartą
        pagal jos įvorės išdėstymą (pvz., „External Cup“, „ZeroStack“, „Integrated“,
        „Threaded“).
    bicycle_hub_type:
      name: Dviračių stebulės tipas
      description: Aprašomas su ratu tiekiamas stebulės mechanizmas, kuris turi įtakos
        transmisijos suderinamumui ir važiavimo stiliui.
    bicycle_lock_security_certification:
      name: Dviračio spynos saugumo sertifikavimas
      description: Nepriklausoma trečiosios šalies sertifikacija, patvirtinanti apsaugos
        nuo vagystės savybes (pvz., „Sold Secure“, „ART“, „Varefakta“).
    bicycle_pedal_type:
      name: Dviračio pedalo tipas
      description: Apibūdina bendrą pedalo veikimo principą ar konstrukciją, pavyzdžiui,
        platforminius, be spaustukų ar hibridinius modelius, padėdamas dviratininkams
        pasirinkti jų važiavimo stiliui tinkamą variantą.
    bicycle_propulsion_type:
      name: Dviračio varomosios jėgos tipas
      description: Nurodo, kaip dviratis varomas, pvz., rankiniu būdu minant pedalus,
        naudojant elektrinę pavarą arba naudojant vidaus degimo variklį.
    bicycle_pump_type:
      name: Dviračių pompos tipas
      description: Nustato siurblio konstrukcinį stilių, padėdamas pirkėjams pasirinkti
        geriausiai jų važiavimo, laikymo ar avariniams poreikiams tinkamą dizainą.
    bicycle_rack_mounting_type:
      name: Dviračio stovo tvirtinimo tipas
      description: Nurodo pagrindinį bagažinės tvirtinimo prie dviračio metodą arba
        vietą, padedant naudotojams patvirtinti suderinamumą su jų rėmu ir technine
        įranga.
    bicycle_suspension_type:
      name: Dviračių pakabos tipas
      description: Nurodo dviračio amortizacijos buvimą ir konfigūraciją.
    bicycle_tire_tread_pattern:
      name: Dviračio padangos protektoriaus raštas
      description: Nurodo padangos protektoriaus tipą, kuris daro įtaką sukibimui
