      name: Stipino priedo funkcija
      description: Klasifikuoja pagrindinę priedo funkciją ant rato, pvz., dekoratyvinę,
        atspindinčią ar apšviečiamą.
    spoke_butting_profile:
      name: Stipino storinimo profilis
      description: Apibūdina, kaip stipino skersmuo keičiasi per jo ilgį (vientisas,
        viengubai, dvigubai, trigubai arba keturgubai storintas), turint įtakos svoriui
        ir tvirtumui.
    spoke_gauge:
      name: Stipino storis
      description: Nurodo stipinų storį (vielos storio klasę), su kuriuo nipelis yra
        suderinamas.
    spoke_interface_type:
      name: Stipino sąsajos tipas
      description: Nurodo stipino galvutės tipą, kuriam stebulė yra pritaikyta (J-bend,
        straight-pull, T-head).
    spoke_shape:
      name: Stipino forma
      description: Nurodo išorinį stipino vielos skerspjūvį, turintį įtakos aerodinamikai
        ir estetikai.
    spool_form_factor:
      name: Ritės formos tipas
      description: Fizinis ritės korpuso tipas ir tai, kaip laikomas siūlas / verpalai
        (pvz., su flanšu arba kūginė).
    spoon_style:
      name: Blizgės tipas
      description: Nurodo funkcinį blizgės potipį arba tipą, pvz., casting, flutter
        arba trolling.
    sports_bra_padding_type:
      name: Sportinės liemenėlės paminkštinimo tipas
      description: Nurodo sportinėje liemenėlėje naudojamo paminkštinimo tipą.
    sports_cap_style:
      name: Sportinės kepurės tipas
      description: Nurodo bendrą kepurės konstrukciją / tipą (pvz., бейсболinė kepurė,
        snapback), nepriklausomai nuo komandos atributikos.
    sports_governing_body_certification:
      name: Sporto valdymo institucijos sertifikavimas
      description: Nurodo oficialius pripažintų sporto valdymo institucijų sertifikatus
        arba patvirtinimus, patvirtinančius, kad produktas atitinka varžybų standartus.
    sports_surface_compatibility:
      name: Sportinės dangos suderinamumas
      description: Išvardija žaidimo arba paviršiaus tipus, ant kurių dažus galima
        saugiai naudoti.
    sports_toy_set_contents:
      name: Sportinio žaislų rinkinio turinys
      description: Nurodo, kokie komponentai įtraukti į sportinio žaislų rinkinio
        komplektą (pvz., kamuolys, lazda, tinklas, taikiniai).
    spray_string_cleanup_method:
      name: Purškiamų siūlų valymo metodas
      description: Rekomenduojamas būdas pašalinti / nuvalyti purškiamų siūlų likučius.
    spray_string_finish_effect:
      name: Purškiamų siūlų efektas / apdaila
      description: Vizualinis purškiamų siūlų efektas po panaudojimo (blizgesys /
        atspindėjimas ir specialieji efektai).
    spray_string_formulation_type:
      name: Purškiamų siūlų formulės tipas
      description: Nurodo, kaip produktas veikia purškimo metu ir po jo (pvz., nuplaunamas
        ar ilgalaikis).
    spray_string_recommended_surface:
      name: Rekomenduojamas purškiamų siūlų paviršius
      description: Paviršių tipai, ant kurių purškiami siūlai skirti naudoti (ir nuo
        kurių tikėtina lengvai nusivalys).
    spray_string_scent:
      name: Purškiamų siūlų kvapas
      description: Purškiamų siūlų kvapo arba aromato profilis, jei toks yra.
    spray_string_suitable_age_group:
      name: Purškiamų siūlų tinkama amžiaus grupė
      description: Rekomenduojamas minimalus naudotojo amžius / amžiaus grupė saugiam
        naudojimui.
    spread_consistency:
      name: Užtepėlės konsistencija
      description: Apibūdina padažo ar užtepėlės tekstūrą / konsistenciją, kad būtų
