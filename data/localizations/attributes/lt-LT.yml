      description: Žaislo suteikiami apšvietimo efektai / veikimo režimai.
    sensory_toy_texture_type:
      name: Sensorinio žaislo tekstūros tipas
      description: Vyraujantys paviršiaus pojūčio / tekstūros elementai, naudojami
