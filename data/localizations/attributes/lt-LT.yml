        funkcines savybes, tokias kaip tirštėjimo greitis ar atsparumas temperatūrai.
    starch_source:
      name: Krakmolo šaltinis
      description: Nurodo botaninį šaltinį, iš kurio gaunamas maistinis krakmolas
        arba tirštiklis (pvz., kukurūzai, bulvės, tapijoka). Šaltinis yra pagrindinis
        maistinių krakmolų skirtumas ir tiesiogiai veikia receptų tinkamumą, alergenų
        aspektus bei vartotojų paieškos elgseną.
    starfruit_variety:
      name: Karambolos veislė
      description: Nurodo konkrečią karambolos veislę arba kultivarą (pvz., Arkin,
        Fwang Tung).
    starter_drive_type:
      name: Starterio pavaros mechanizmo tipas
      description: Starterio pavaros / įjungimo mechanizmo tipas, naudojamas krumpliaračiui
        sujungti su smagračio vainikiniu dantračiu.
    starter_pistol_action_type:
      name: Startinio pistoleto veikimo tipas
      description: Nurodo startinio pistoleto šaudymo / veikimo mechanizmą (pvz.,
        viengubo veikimo, dvigubo veikimo, pusiau automatinis).
    starter_pistol_caliber:
      name: Startinio pistoleto kalibras
      description: Nurodo tuščių šovinių arba kasečių kalibrą, kuriam pritaikytas
        startinis pistoletas.
    starter_terminal_type:
      name: Starterio terminalo tipas
      description: Nurodo gnybto / jungties tipą, naudojamą elektrinėms jungtims starteryje
        arba starterio solenoide (pvz., sriegis, plokščia jungtis, kištukinė jungtis).
    starting_block_anchoring_method:
      name: Starto kaladėlių tvirtinimo būdas
      description: Apibūdina, kaip kaladėlės tvirtinamos prie takelio paviršiaus (pvz.,
        dygliais, siurbtukais, guminėmis pagalvėlėmis).
