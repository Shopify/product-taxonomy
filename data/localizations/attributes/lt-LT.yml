      description: Standartizuotas būgnų lazdelių modelio / dydžio žymėjimas, naudojamas
        daugelio gamintojų (pvz., 5A, 7A).
    drumstick_taper:
      name: Būgnų lazdelės siaurėjimas
      description: Apibūdina siaurėjimo profilį nuo kotelio iki galiuko, darantį įtaką
        atšokimui ir balansui.
    drysuit_footwear_style:
      name: Sauso kostiumo avalynės tipas
      description: Apibūdina integruotą sauso kostiumo apatinės kojų dalies apdailą
        (pvz., integruoti batai, neopreno kojinės, kojinės tipo galai arba atviri
        kulkšnių sandarikliai).
    dumbbell_style:
      name: Hantelio stilius
      description: Identifikuoja pagrindinę hantelio konstrukciją – ar tai fiksuotas
        vienetas, reguliuojama sistema ar užkraunamos rankenos tipas – kuri stipriai
        daro įtaką pirkimo sprendimams ir treniruočių naudojimo scenarijams.
    dundun_playing_position:
      name: Dundun grojimo padėtis
      description: Nurodo numatytą būgno grojimo / nešiojimo padėtį.
    dye_status:
      name: Dažymo būsena
      description: Nurodo, ar pluošto sluoksnis yra dažytas, nedažytas / natūralus,
        ar turi kelias spalvas / mišinius.
    dye_style:
      name: Dažymo stilius
      description: Nurodo, ar siūlo spalva yra vientisa, marginta ar kitaip specialiai
        dažyta.
    dye_technique:
      name: Dažymo technika
      description: Metodas, naudojamas pluoštui dažyti (pvz., rankomis dažytas, katile
        dažytas, segmentiškai dažytas).
    dye_type_needlecraft_fabric:
      name: Dažymo tipas (rankdarbių audinys)
      description: Nurodo, ar lino audinys yra vienspalvis, rankomis dažytas ar specialiai
        dažytas.
    dyeing_color_processing:
      name: Dažymas / spalvos apdorojimas
      description: Nurodo, ar ir kaip pluoštas buvo dažytas (pvz., nedažytas, balintas
        / baltas arba naudojant konkrečias dažymo technikas).
    e_bike_certification_class:
      name: Elektrinio dviračio sertifikavimo klasė
      description: Nurodo oficialų padangos greičio reitingą elektriniams dviračiams
        (pvz., E-25, E-50).
    e_bike_speed_rating:
      name: Elektrinio dviračio greičio klasė
      description: Nurodo oficialų elektrinio dviračio padangos sertifikavimo lygį
        (pvz., E25 iki ≤25 km/h, E50 iki ≤50 km/h).
    e_scooter_connector_type:
      name: Elektrinio paspirtuko jungties tipas
      description: Nurodo elektrinės jungties arba kištuko tipą, naudojamą komponento
        maitinimo arba signalų jungtims.
    e_scooter_throttle_type:
      name: Elektrinio paspirtuko akceleratoriaus tipas
      description: Nurodo akceleratoriaus tipą, naudojamą elektrinio paspirtuko greičiui
        valdyti.
    ear_coverage:
      name: Ausų uždengimas
      description: Nurodo, ar šalmas turi ausų apsaugą ir ar ji yra nuimama.
    ear_coverage_style:
      name: Ausų uždengimo stilius
      description: Apibūdina, kaip arba ar ausys yra uždengiamos apsaugine kauke nuo
        vabzdžių.
    ear_coverage_type:
      name: Ausų uždengimo tipas
      description: Nurodo, kaip kepurė dengia arba apsaugo ausis, įskaitant ausų atvartų
        buvimą ir stilių.
    ear_guard_type:
      name: Ausų apsaugos tipas
      description: Nurodo į kepurę integruotos ausų apsaugos tipą, pvz., kieto plastiko,
        paminkštinta arba nuimama apsauga.
    earmuff_style:
      name: Ausinių stilius
      description: Nurodo, kaip ausinės yra dėvimos arba jų konstrukcijos tipą (pvz.,
        per galvą arba apjuosiančios už galvos).
    earring_closure_type:
      name: Auskarų užspaudimo tipas
      description: Nurodo mechanizmą, naudojamą auskarui pritvirtinti prie ausies
        (pvz., užspaudžiamas, svirtinis, prisegamas).
    easel_art_desk_features:
      name: Molberto ir piešimo stalo savybės
      description: Išryškina įprastas funkcines savybes, įtrauktas į molbertą arba
        piešimo stalą.
    easel_art_desk_surface_type:
      name: Molberto ir piešimo stalo paviršiaus tipas
      description: Identifikuoja pateiktą naudojamą piešimo / rašymo paviršių (-ius)
        (pvz., kreidinę lentą, baltąją lentą, popieriaus ritinį, magnetinę lentą).
    eb_clarinet_body_type:
      name: Eb klarneto korpuso tipas
      description: Nurodo, ar Eb klarnetas yra soprano ar alto variantas.
    eco_material_type:
      name: Ekologiškos medžiagos tipas
      description: Išryškina aplinkai draugišką putų arba medžiagos technologiją,
        naudojamą pade.
    edge_construction:
      name: Kraštų konstrukcija
      description: Nurodo, ar slidė turi metalinę briauną per visą ilgį, dalį ilgio
        ar jos neturi.
    edge_tuner_type:
      name: Kantų galąstuvo tipas
      description: Klasifikuoja slidžių arba snieglentės kantų galąstuvo tipą, pvz.,
        dildės kreiptuvas arba elektrinė mašina.
    edible_plant_part:
      name: Valgoma augalo dalis
      description: Nurodo, kuri augalo dalis parduodama vartojimui.
    educational_guide_included:
      name: Įtrauktas edukacinis vadovas
      description: Nurodo, kokia mokomoji medžiaga yra įtraukta kartu su modeliu.
    educational_topic:
      name: Mokomoji tema
      description: Pagrindinė mokymosi tema, palaikoma skruzdėlių fermos edukacinio
        turinio.
    egg_component:
      name: Kiaušinio komponentas
      description: Nurodo, kurią kiaušinio dalį produktas turi, pvz., visą kiaušinį,
        tik baltymus, trynius arba mišinius / pakaitalus.
    egg_component_replaced:
      name: Pakeičiamas kiaušinio komponentas
      description: Nurodo, kurią kiaušinio dalį produktas skirtas pakeisti (pvz.,
        visą kiaušinį, kiaušinio baltymą).
    egg_enrichment:
      name: Kiaušinių praturtinimas
      description: Nurodo bet kokį maistinį praturtinimą, pridėtą prie kiaušinių,
        pvz., Omega-3 arba vitamino D papildymą.
    egg_farming_method:
      name: Kiaušinių auginimo metodas
      description: Nurodo kiaušinių gamybos arba vištų laikymo metodą (pvz., laikomos
        be narvų, laisvai laikomos, ekologiškos).
    egg_grade:
      name: Kiaušinių klasė
      description: Nurodo kokybės klasę, priskirtą reguliavimo arba pramonės institucijų.
    egg_processing_state:
      name: Kiaušinių apdorojimo būsena
      description: Nurodo bet kokį kiaušinių apdorojimą prieš pardavimą (pvz., švieži,
        sūdyti, šimtmečio kiaušiniai).
    egg_production_method:
      name: Kiaušinių gamybos metodas
      description: Nurodo ūkininkavimo arba laikymo sistemą, naudojamą kiaušiniams
        gaminti (pvz., be narvų, laisvai laikomos vištos, ekologiška).
    egg_replacer_main_ingredient:
      name: Pagrindinis kiaušinių pakaitalo ingredientas
      description: Nurodo pagrindinį ingredientą, iš kurio pagamintas kiaušinių pakaitalas,
