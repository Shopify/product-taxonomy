    seasoning_variety:
      name: Prieskonių mišinio rūšis
      description: Klasifikuoja prieskonių mišinį pagal jo paruošimo stilių arba tradicinį
        kulinarinį naudojimą.
    seat_adjustment_power_type:
      name: Sėdynės reguliavimo pavaros tipas
