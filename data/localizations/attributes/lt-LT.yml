      name: Apsaugos nuo oro sąlygų montavimo būdas
      description: Nurodo, kaip apsauga tvirtinama prie lesyklos ar atraminės konstrukcijos.
    wheel_bearing_type:
      name: Rato guolio tipas
      description: Nurodo rato vidinę guolio ar įvorės konstrukciją, turinčią įtakos
        riedėjimo sklandumui ir priežiūros poreikiams.
    wheel_tread_style:
      name: Rato protektoriaus tipas
      description: Nurodo rato protektoriaus dizainą, turintį įtakos sukibimui, triukšmo
        lygiui ir galimam grindų žymėjimui.
    whistling:
      name: Švilpimo funkcija
      description: Nurodo, ar virdulys skleidžia švilpimo garsą, kai vanduo užverda.
    wick_material:
      name: Dagčio medžiaga
      description: Nurodo naudojamo dagčio sudėtį (pvz., medvilnė, stiklo pluoštas).
    window_film_installation_surface:
      name: Langų plėvelės montavimo paviršius
      description: Nurodo, ar plėvelė skirta montuoti vidinėje, išorinėje ar abiejose
        stiklo pusėse.
    window_film_type:
      name: Langų plėvelės tipas
      description: Klasifikuoja plėvelės funkcinį tipą (pvz., privatumo ar apsaugos).
    window_rod_type:
      name: Langų karnizo tipas
      description: Klasifikuoja lango karnizo funkcinį tipą.
    window_screen_type:
      name: Langų tinklelio tipas
      description: Apibrėžia langų tinklelio konstrukcinį tipą ar veikimo būdą.
    window_treatment_lining_type:
      name: Langų uždangos pamušalo tipas
      description: Nurodo, ar lambrekenas ar karnizo apdaila turi pamušalą ir koks
        jo tipas.
    wine_aerator_type:
      name: Vyno aeratoriaus tipas
      description: Nurodo vyno aeratoriaus formą ar veikimo tipą.
    wine_glass_style:
      name: Vyno taurės stilius
      description: Nurodo, kokiam vyno tipui ar taurės dizainui produktas skirtas,
        siekiant optimizuoti aromatą ir skonį.
    wok_bottom_type:
      name: Voko dugno tipas
      description: Apibrėžia voko dugno formą, lemiančią suderinamumą su skirtingomis
        viryklėmis ir žiedais.
    wood_grain_orientation:
      name: Medienos plaušo kryptis
      description: Nurodo medienos pluošto kryptį produkte, pvz., galo pluoštas, krašto
        pluoštas arba paviršiaus pluoštas. Pluošto kryptis įtakoja tvarumą ir peilio
        draugiškumą.
    wood_seasoning_method:
      name: Medienos džiovinimo būdas
      description: Nurodo, kaip mediena buvo džiovinta ar brandinta, turint įtakos
        drėgmės kiekiui ir degimo kokybei.
    wrap_format:
      name: Pakuotės formatas
      description: Nurodo fizinę maisto plėvelės pateikimo formą, pvz., ritiniai ar
        iš anksto supjaustyti lakštai.
    abacus_bead_material:
      name: Abako karoliukų medžiaga
      description: Pagrindinė abako karoliukų medžiaga.
    abec_rating:
      name: ABEC įvertinimas
      description: Nurodo guolių tikslumo klasę pagal ABEC klasifikaciją, atspindinčią
        veikimo sklandumą ir leistinojo nuokrypio ribas.
    abrasive_level:
      name: Abrazyvumo lygis
      description: Automobilių dažų dangų poliravimo priemonės ir šlifavimo pastos
        santykinis šlifavimo stiprumas.
    absinthe_accessories_included:
      name: Į komplektą įeinantys absento priedai
      description: Nurodo visus prie produkto pridedamus priedus, pavyzdžiui, šaukštelius,
        stiklines ar cukraus kubelius.
    ac_compressor_mounting_style:
      name: Oro kondicionieriaus kompresoriaus montavimo būdas
      description: Nurodo kompresoriaus mechaninį tvirtinimo būdą arba jo sąsają su
        variklio ar pagalbinių agregatų pavaros sistema.
    ac_compressor_oil_type:
      name: Oro kondicionieriaus kompresoriaus alyvos tipas
      description: 'Nurodo oro kondicionavimo kompresoriui reikalingą arba naudojamą
        tepimo alyvos cheminę sudėtį (dažniausi tipai: PAG ir POE).'
    accent_modes:
      name: Akcento režimai
      description: Nurodo, kaip metronomas gali pabrėžti taktų ritmą (be paprasto
        tiksėjimo).
    access_mechanism:
      name: Prieigos mechanizmas
      description: Nurodo, kaip naudotojui patekti į pakeltą miego platformą.
    accessibility_features:
      name: Pritaikymo neįgaliesiems ypatybės
      description: Nurodo mikroautobuse esančią su pritaikymu neįgaliesiems susijusią
        įrangą ir konfigūracijas.
    accessories_included:
      name: Į komplektą įeinantys priedai
      description: Nurodo papildomus daiktus, įtrauktus į kėdės rinkinio pasiūlymą
        (pvz., pufą, juosmens pagalvę), kad pirkėjas aiškiai matytų papildomą vertę.
    accessory_pieces_included:
      name: Į komplektą įeinančios priedų dalys
      description: Nurodo aksesuarų daiktus, įtrauktus į kelių dalių drabužių aksesuarų
        dovanų rinkinį arba rinkinio pasiūlymą.
    acoustic_amplifier_feedback_control_features:
      name: Akustinio stiprintuvo grįžtamojo ryšio valdymo funkcijos
      description: Nurodo integruotas aido slopinimo priemones akustiniams instrumentams
        (pvz., siaurajuostis filtras, fazės perjungiklis, automatinis aido slopinimas).
    acoustic_drum_kit_components_included:
      name: Į komplektą įeina akustinių būgnų rinkinio komponentai
      description: Nurodo, kurie pagrindiniai komponentai yra įtraukti į rinkinį (tik
        korpusų rinkinys ar pilnas rinkinys; įtrauktos lėkštės / aparatūra).
    acoustic_guitar_body_shape:
      name: Akustinės gitaros korpuso forma
      description: Apibūdina akustinės gitaros korpuso formą / kontūrą, kuris turi
        įtakos skambesio tembrui, grojimo patogumui ir įprastam naudojimui.
    acoustic_guitar_string_core_design:
      name: Akustinės gitaros stygų šerdies konstrukcija
      description: Apvyniotų stygų šerdies konstrukcija.
    acoustic_piano_key_material:
      name: Akustinio pianino klavišų medžiaga
      description: Nurodo pagrindinę medžiagą, iš kurios pagaminti pianino klavišų
        paviršiai / dramblio kaulo imitacijos.
    acoustic_piano_lid_type:
      name: Akustinio pianino dangčio tipas
      description: Nurodo akustinio pianino arba rojalio dangčio mechanizmo tipą (klaviatūros
        dangčio arba viršutinio korpuso dangčio konstrukciją).
    acoustic_piano_plate_frame_material:
      name: Akustinio pianino plokštės / rėmo medžiaga
      description: Nurodo pagrindinę pianino arba rojalio rėmo (arfos) medžiagą, dažniausiai
        – ketų.
    acoustic_piano_soundboard_material:
      name: Akustinio pianino rezonansinės plokštės medžiaga
      description: Nurodo pagrindinę pianino garso plokštės medžiagą.
    action_figure_scale:
      name: Veiksmo figūrėlės mastelis
      description: Nurodo kolekcinį mastelio santykį (pvz., 1:12), kuriam aksesuaras
        yra pritaikytas.
    action_type:
      name: Veiksmo tipas
      description: Apibūdina ginklo uždegimo arba užtaisymo mechanizmą (pvz., skląstį,
        laužiamąjį vamzdį, svirtį).
    actuation_mechanism:
      name: Paleidimo mechanizmas
      description: 'Nurodo, kaip svirtis valdo stabdžių sistemą: grynai mechaninė
        lyninė, visiškai hidraulinė, lynu valdoma hidraulinė arba elektroninė / belaidė.'
    actuation_method:
      name: Paleidimo būdas
      description: Kaip aktyvuojama arba išleidžiama slopinimo sistema.
    adapter_orientation:
      name: Adapterio orientacija
      description: Nurodo dviračio padangos ventilio adapterio kampą arba konfigūraciją,
        turinčią įtakos pompos pasiekiamumui (pvz., tiesus, 90°).
    additive_application_stage:
      name: Priedų naudojimo etapas
      description: Nurodo, kada proceso metu produktas yra skirtas naudoti.
    adhesive_backing:
      name: Lipnus pagrindas
      description: Ar spausdinimui skirtas šilkas turi lipniąją pusę, kad jį būtų
        galima nuimti ir priklijuoti.
    adhesive_formulation:
      name: Klijų formulė
      description: Nurodo klijų cheminę bazę arba formulę, pvz., cianoakrilatą arba
        epoksidinę dervą.
    adhesive_sides:
      name: Lipnios pusės
      description: Nurodo, ar lydieji klijai yra ant vienos juostos / tinklo pusės,
        ar ant abiejų pusių.
    adjunct_grain_processing_form:
      name: Pagalbinių grūdų perdirbimo forma
      description: Nurodo pagalbinių grūdų, parduodamų alaus gamybai, fizinę formą
        ir apdorojimo būdą (pvz., dribsniai, torifikuoti, salykluoti, neapdoroti).
    adjustability_type:
      name: Reguliavimo tipas
      description: Nurodo, kokio tipo reguliavimą atrama palaiko, jei toks yra.
    adjustable_cup_mutes:
      name: Reguliuojami pučiamųjų instrumentų garso slopintuvai
      description: Nurodo, ar puodelis yra reguliuojamas / nuimamas, ir reguliavimo
        būdą.
    adjustable_zones:
      name: Reguliuojamos zonos
      description: Nurodo, kurias pagrindo dalis galima reguliuoti atskirai.
    adjustment_type:
      name: Reguliavimo tipas
      description: Nurodo, ar reguliatorius yra reguliuojamas ir kaip atliekamas reguliavimas.
    administration_method:
      name: Vartojimo būdas
      description: Nurodo, kaip vaistas nuo kirmėlių skiriamas arkliui (pvz., per
        burną arba injekcijomis), taip padedant pirkėjams laikytis veterinarijos gydytojo
        nurodymų ir pasirinkti patogų vartojimo būdą.
    advice_card_prompt_type:
      name: Patarimų kortelės užklausos tipas
      description: Kortelėje atspausdinto užklausos tipo aprašas (arba nurodymo nebuvimas).
    aeration_method:
      name: Aeravimo būdas
      description: Aprašomas konteinerio užtikrinamas arba palaikomas vėdinimo būdas,
        garantuojantis pakankamą deguonies kiekį gyvam masalui.
    aero_package_components:
      name: "„Aero“ paketo komponentai"
      description: Nurodo, kurie pagrindiniai aerodinaminiai komponentai yra sumontuoti
        transporto priemonėje (pasirinkti visus tinkamus variantus).
    aerodynamic_elements_included:
      name: Įtraukti aerodinaminiai elementai
      description: Nurodo, kurie pagrindiniai aerodinaminiai komponentai yra sumontuoti
        formulės bolide (pasirinkti visus tinkamus variantus, jei palaikomi).
    aftertouch_support:
      name: "„Aftertouch“ palaikymas"
      description: Ar valdiklis palaiko klavišų / mygtukų „aftertouch“ funkciją (kanalinę
        arba polifoninę).
    agave_content_classification:
      name: Agavų kiekio klasifikacija
      description: Nurodo, ar tekila pagaminta iš 100 % „Blue Weber“ agavos, ar yra
        mišinys, kuriame yra mažiausiai 51 % agavos cukraus.
    aida_cloth_count:
      name: Aida audinio tankis
      description: Nurodo Aida audinio tankį (kvadratėlių / dygsnių skaičių colyje),
        kuris lemia dygsnio dydį ir dizaino mastelį.
    aida_cloth_pre_cut_format:
      name: Iš anksto sukirptos „Aida“ audinio juostelės
      description: Nurodo, ar „Aida“ audinys parduodamas kaip iš anksto sukarpytas
        gabalas, ištisinis gabalas, iškirptas iš rulono, ar ritinyje.
    air_bag_material:
      name: Oro pagalvių medžiaga
      description: Nurodo oro rezervuaro / maišo, naudojamo su airių dūdmaišiu, medžiagą.
    air_bed_internal_construction:
      name: Pripučiamo čiužinio vidinė konstrukcija
      description: Apibūdina vidinę atraminę konstrukciją arba technologiją, naudojamą
        pripučiamame čiužinyje siekiant užtikrinti patogumą ir stabilumą.
    air_dry_clay_color_form:
      name: Ore džiūvančio molio spalvos forma
      description: Ar molis parduodamas iš anksto nuspalvintas, baltos / neutralios
        spalvos ar skirtingų spalvų.
    air_hockey_items_included:
      name: Pridedami oro ritulio elementai
      description: Išvardija konkrečius komplekte esančius priedus, kad klientai tiksliai
        žinotų, ką gauna (pvz., 2 stūmikliai, 4 rituliai, 2 veltiniai padėkliukai).
    air_intake_temperature_sensor_mounting_style:
      name: Įsiurbiamo oro temperatūros jutiklio tvirtinimo būdas
      description: IAT jutiklio fizinis tvirtinimo būdas įsiurbimo sistemoje.
    air_integration_capability:
      name: Oro integravimo funkcija
      description: Nurodo, ar ir kaip nardymo kompiuteris palaiko belaidžius baliono
        slėgio siųstuvus.
    air_mattress_valve_type:
      name: Pripučiamos čiužinio vožtuvo tipas
      description: Nurodo vožtuvo tipą, kuriam aksesuaras tinka arba kurį turi, užtikrinant
        suderinamumą tarp pompų, vožtuvų ir remonto dalių.
    air_water_rocket_kit_items_included:
      name: Pridedami oro ir vandens raketų rinkinio elementai
      description: Pagrindinės raketos komplekte esančios dalys (paleidimo įrenginys,
        siurblys, stabilizatoriai, atsarginės dalys).
    air_water_rocket_launch_method:
      name: Oro ir vandens raketų paleidimo būdas
      description: Kaip raketa pripildoma slėgiu ir paleidžiama (naudotojo sąveika
        ir įrangos tipas).
    airbag_position:
      name: Oro pagalvės padėtis
      description: Nurodo numatytą saugos diržo tvirtinimo vietą ar zoną, kurią palaiko
        oro pagalvės dalis.
    aircraft_ads_b_capability:
      name: Orlaivio ADS-B funkcija
      description: Nurodo, ar orlaivis turi įrangą, atitinkančią „ADS-B Out“ reikalavimus.
    aircraft_airframe_material:
      name: Orlaivio korpuso medžiaga
      description: Pagrindinė (-ės) medžiaga (-os), naudojama (-os) orlaivio korpuso
        konstrukcijoje.
    aircraft_cabin_configuration:
      name: Orlaivio salono konfigūracija
      description: Nurodo orlaivio salono išdėstymą (pvz., konferencinė zona, sofa,
        keturių zonų salonas).
    aircraft_documentation_included:
      name: Pridedami orlaivio dokumentai
      description: Išvardija, kurie dokumentai pateikiami kartu su dalimi (pvz., 8130-3).
    aircraft_galley_configuration:
      name: Orlaivio virtuvės konfigūracija
      description: Salone esančių virtuvės / maitinimo įstaigų buvimas ir tipas.
    aircraft_installation_location:
      name: Orlaivio įrengimo vieta
      description: Kur orlaivyje sumontuota arba naudojama dalis ar priedas.
    aircraft_internet_connection:
      name: Interneto ryšys orlaivyje
      description: Nurodo interneto ryšio buvimą / tipą orlaivio salone.
    aircraft_landing_gear_type:
      name: Orlaivio važiuoklės tipas
      description: Nurodo autogiro važiuoklės konfigūraciją.
    aircraft_lavatory_configuration:
      name: Orlaivio tualeto konfigūracija
      description: Orlaivio tualetų išdėstymo tipas.
    aircraft_maintenance_program_enrollment:
      name: Orlaivio techninės priežiūros programos registracija
      description: Nurodo, ar orlaivis yra įtrauktas į variklio ir (arba) orlaivio
        korpuso techninės priežiūros programą, o jei taip, kokio tipo paslaugos taikomos
        (variklio, orlaivio korpuso ar abiejų).
    aircraft_operational_certification:
      name: Orlaivių eksploatavimo sertifikavimas
      description: Nurodo reguliavimo ar eksploatavimo sertifikavimo pagrindą, pagal
        kurį eksploatuojamas orlaivis (priklauso nuo jurisdikcijos, pvz., FAA 91/135/121
        dalis, EASA AOC).
    aircraft_protective_gear_certification:
      name: Orlaivių apsaugos įrangos sertifikavimas
      description: Nurodo aviacijos, reguliavimo arba pramonės standartą, kurį apsauginė
        įranga yra sertifikuota atitikti.
    aircraft_system_application:
      name: Orlaivių sistemų paskirtis
      description: Nurodo, kuriai orlaivio sistemai ar sričiai priklauso detalė ar
        priedas (naudojama naršant ir filtruojant įvairias orlaivio detales).
    airflow_resistance_level:
      name: Oro srauto pasipriešinimo lygis
      description: Nurodo, kiek ribojantis yra garso slopintuvas pagal priešslėgį
        / oro pasipriešinimą.
    airship_envelope_material:
      name: Dirižablio apvalkalo medžiaga
      description: Pagrindinė dirižablio apvalkalo medžiaga.
    airsoft_part_type:
      name: "„Airsoft“ dalies tipas"
      description: Nurodo funkcinį komponentą arba „airsoft“ ginklų priedo tipą (pvz.,
        dėtuvė, vamzdis, apsauginė rankena).
    airworthiness_approval_basis:
      name: Tinkamumo skraidyti patvirtinimo pagrindas
      description: Nurodo dalies patvirtinimo / sertifikavimo pagrindą, jei taikoma
        (pvz., PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Signalo garsumo reguliavimas
      description: Nurodo, ar ir kaip naudotojas gali reguliuoti signalo garsumą.
    alcohol_ink_finish_effect:
      name: Alkoholinio rašalo apdailos efektas
      description: Apibūdina alkoholinio rašalo sudėties sukuriamą vizualinį efektą
        ar paviršių (ne tik spalvą), pavyzdžiui, metalo žvilgesio ar perlamutrinį.
    alignment_aid_style:
      name: Lygiavimo pagalbos tipas
      description: Apibūdina ant kilimėlio paviršiaus atspausdintų arba įterptų orientavimo
        gairių rūšis (pvz., tiesios linijos, atstumo žymekliai).
    alternator_cooling_type:
      name: Alternatoriaus aušinimo tipas
      description: Nurodo, kaip alternatorius aušinamas ir ventiliuojamas.
    alternator_marine_ignition_protection_rating:
      name: Alternatoriaus jūrinės uždegimo apsaugos įvertinimas
      description: Nurodo, ar generatorius yra apsaugotas nuo užsidegimo, kai naudojamas
        laivų variklių skyriuose (pvz., atitinka SAE J1171 / ISO 8846 standartus).
    alternator_mounting_configuration:
      name: Alternatoriaus tvirtinimo konfigūracija
      description: Nurodo fizinę tvirtinimo konfigūraciją, naudojamą alternatoriui
        pritvirtinti prie variklio laikiklio.
    alternator_pulley_type:
      name: Alternatoriaus skriemulio tipas
      description: Nurodo generatoriaus skriemulio / sankabos konstrukciją (arba nurodo,
        kad skriemulys neįtrauktas).
    alternator_regulator_type:
      name: Alternatoriaus reguliatoriaus tipas
      description: Nurodo, ar įtampos reguliatorius yra alternatoriaus viduje, ar
        išorėje, ir ar jį valdo originalios įrangos gamintojas (valdomas kompiuteriu
        / PCM).
    alternator_terminal_connection_type:
      name: Alternatoriaus gnybtų jungimo tipas
      description: Pagrindinis alternatoriaus išėjimo / žadinimo gnybtų elektros jungties
        tipas, padedantis užtikrinti laidų pynės suderinamumą.
    altitude_suitability:
      name: Tinkamumas naudoti tam tikrame aukštyje
      description: Nurodo, ar kamuolys yra pritaikytas konkrečioms aukščio sąlygoms,
        kurios turi įtakos greičiui ir atšokimui.
    ambulance_stretcher_mount_type:
      name: Greitosios pagalbos neštuvų tvirtinimo tipas
      description: Nurodo greitosios pagalbos automobilio palaikomą neštuvų pakrovimo
        / tvirtinimo sistemos tipą.
    american_football_safety_certification:
      name: Amerikietiškojo futbolo saugumo sertifikatas
      description: Nurodo, kokius amerikietiškojo futbolo saugos sertifikatus arba
        standartus atitinka produktas.
    amplifier_tube_function:
      name: Stiprintuvo lempos funkcija
      description: Nurodo vamzdelio funkcinę paskirtį muzikos instrumento stiprintuvo
        grandinėje (pvz., priešstiprintuvis ar galios stiprintuvas).
    analog_synthesizer_cv_gate_i_o:
      name: Analoginis sintezatorius CV / įvesties / išvesties vartai
      description: Nurodo valdymo įtampos ir vartų jungčių tipus, palaikomus integravimui
        su moduliniais / analoginiais įrenginiais.
    analog_synthesizer_keybed_configuration:
      name: Analoginio sintezatoriaus klaviatūros konfigūracija
      description: Nurodo, ar sintezatorius turi integruotą klaviatūrą ir, jei taip,
        klavišų skaičių.
    anchor_configuration:
      name: Inkaro konfigūracija
      description: Nurodo, ar pakabos sistemoje naudojamas vienas centralizuotas tvirtinimo
        taškas, ar keli nepriklausomi tvirtinimo taškai, o tai turi įtakos pratimų
        įvairovei ir sąrankos sudėtingumui.
    animal_raising_method:
      name: Gyvulių auginimo būdas
      description: Aprašomos gyvulininkystės ar auginimo praktikos, taikomos šiam
        gyvuliui.
    animal_species:
      name: Gyvūnų veislės
      description: Nurodo gyvūną ar padarą, kurį vaizduoja pliušinis žaislas (pvz.,
        meška, zuikis, dinozauras).
    animal_trap_jaw_style:
      name: Gyvūnų spąstų stilius
      description: Spąstų žandikaulių konfigūracija, daranti įtaką laikymo stiprumui
        ir gyvūnų gerovei.
    animal_trap_type:
      name: Gyvūnų spąstų tipas
      description: Klasifikuoja mechaninį spąstų tipą / konstrukciją, leidžiant pirkėjui
        greitai rasti reikalingą arba reglamentais leidžiamą gaudymo būdą.
    ankle_collar_style:
      name: Kulkšnies apykaklės stilius
      description: Apibūdina batelių kulkšnių apykaklių stilių ar konstrukciją, pavyzdžiui,
        žemą, vidutinio aukščio, aukštą, kojinės tipo ar be raištelių, o tai turi
        įtakos batų tvirtumui, prigludimui ir išvaizdai.
    ankle_guard_protection_level:
      name: Kulkšnies apsaugos lygis
      description: Vertina bendrą apsaugą nuo smūgių, kurią užtikrina kulkšnių apsaugai.
    ankle_strap_padding_type:
      name: Kulkšnies dirželio paminkštinimo tipas
      description: Nurodo amortizuojančią medžiagą arba paminkštinimo metodą, naudojamą
        dirželio viduje, kuris daro įtaką komfortui.
    ankle_strap_type:
      name: Kulkšnies dirželių tipas
      description: Apibūdina snieglentės tvirtinamojo kulkšnies diržo konstrukciją
        arba dizainą.
    ant_farm_habitat_medium_type:
      name: Skruzdžių ūkio auginimo terpės tipas
      description: Nurodo pagrindinę tuneliavimo / stebėjimo terpę, kurią teikia arba
        kuri reikalinga skruzdžių ūkiui.
    ant_farm_kit_contents:
      name: Skruzdžių ūkio rinkinio turinys
      description: Nurodo, kurie komponentai yra įtraukti į skruzdėlių fermos rinkinį
        (pvz., buveinės talpykla, smėlis / gelis, skruzdėlių kuponas, maitinimo įrankiai).
    ant_farm_lighting_type:
      name: Skruzdžių ūkio apšvietimo tipas
      description: Nurodo stebėjimui naudojamą integruotą apšvietimą / apšvietimo
        tipą (jei yra).
    antenna_fit_type:
      name: Antenos montavimo tipas
      description: Nurodo, kokiam antenos formos tipui skirtas antenos kamuoliukas.
    anti_caking_agent:
      name: Lipnumą reguliuojanti medžiaga
      description: Nurodo, kokios rūšies lipnumą reguliuojančios medžiagos buvo įdėta,
        kad produktas nesuliptų. Ši informacija svarbi atsižvelgiant į alergijas ir
        siekiant užtikrinti recepto tikslumą.
    anti_g_suit_bladder_material:
      name: "„Anti-G“ kostiumo kameros medžiaga"
      description: Medžiaga, naudojama vidinėms pripučiamoms kameroms anti-G kostiume;
        nurodykite visas taikomas, jei naudojamos kelios medžiagos.
    anti_g_suit_connector_type:
      name: Anti-G kostiumo jungties tipas
      description: Nurodo oro / slėgio žarnos jungties tipą / standartą, naudojamą
        prijungimui prie orlaivio arba reguliatoriaus.
    anti_g_suit_inflation_method:
      name: Anti-G kostiumo pripūtimo metodas
      description: Nurodo, kaip kostiumo kameros yra pripildomos slėgio siekiant užtikrinti
        G apsaugą.
    anti_g_suit_size_system:
      name: Anti-G kostiumo dydžių sistema
      description: Dydžių standartas, naudojamas apibūdinti kostiumo dydžių / modelių
        sistemą.
    anti_reverse_type:
      name: Apsaugos nuo atbulinio sukimosi tipas
      description: Nurodo įrengto atbulinio sukimosi stabdymo mechanizmo tipą, kuris
        turi įtakos kabliuko įsikibimui ir atbuliniam sukimuisi.
    anti_theft_feature:
      name: Apsaugos nuo vagystės funkcija
      description: Nurodo, ar tvirtinimo elementas / laikiklis turi apsaugos nuo vagystės
        funkcijas, pavyzdžiui, užrakinamas tvirtinimo detales ar apsaugą nuo priverstinio
        atidarymo.
    antique_gun_ignition_system:
      name: Antikvarinių ginklų uždegimo sistema
      description: Nurodo istorinę šaudymo / uždegimo sistemą, naudojamą antikvariniame
        šaunamajame ginkle.
    apple_variety:
      name: Obuolių veislė
      description: Nurodo obuolių kultivarą arba veislę (pvz., Gala, Fuji, Granny
        Smith), padedant klientui pasirinkti pagal skonį, tekstūrą ir kulinarinį panaudojimą.
    applique_edge_finish:
      name: Aplikacijos krašto apdaila
      description: Aprašoma, kaip apdirbti kraštai, ir kaip tai veikia išvaizdą ir
        atsparumą irimui.
    arbor_type:
      name: Grotelių tipas
      description: Klasifikuoja ritę pagal būgno šerdies konstrukciją, kuri daro įtaką
        valo suvyniojimo greičiui, pagrindo talpai ir valo atminčiai.
    archery_accessory_type:
      name: Lankininkystės priedų tipas
      description: Nurodo, kokio tipo priedai skirti lankininkystės reikmėms, kad
        pirkėjai galėtų greitai filtruoti prekes.
    archery_part_type:
      name: Lankininkystės dalies tipas
      description: Nurodo konkrečią parduodamą įrangą ar atsarginę dalį (pvz., strėlės
        kotą, lanko petį, lanko virvę), leidžiant tiksliai filtruoti duomenis neišplečiant
        kategorijų medžio.
    archery_range_accessory_type:
      name: Lankininkystės šaudyklų priedų tipas
      description: Klasifikuoja konkrečią šaudykloje naudojamų reikmenų rūšį, leidžiant
        pirkėjams greitai atsirinkti būtent tą prekę, kurios jiems reikia.
    archery_target_features:
      name: Lankininkystės taikinio ypatybės
      description: Nurodo specialias veikimo arba patogumo savybes, kurios nėra apimtos
        kitų atributų (pvz., savaime atsistatanti puta, nešiojimo rankena).
    archery_tool_type:
      name: Lankininkystės įrankių tipas
      description: Klasifikuoja konkretų šaudymo iš lanko įrankio arba įrangos daikto
        tipą.
    armband_features:
      name: Apyrankės funkcijos
      description: Išvardija specialias funkcines ar vizualines savybės, kurios pagerina
        apyrankės funkcionalumą.
    armguard_style:
      name: Rankos apsaugos tipas
      description: Nurodo rankos apsaugos konstrukcijos tipą arba formos faktorių,
        suteikiant informacijos apie apsaugos padengimą bei tradicinę ar modernią
        išvaizdą.
    armor_protection_type:
      name: Šarvų apsaugos tipas
      description: Transporto priemonės šarvų sistemos teikiamos apsaugos tipas.
    armrest_adjustability:
      name: Porankio reguliavimas
      description: Apibrėžia kėdės porankių reguliavimo galimybes ir konfigūraciją
        (pvz., fiksuoti, 2D, 3D, atlenkiami).
    armrest_type:
      name: Porankio tipas
      description: Aprašo, ar kėdė turi porankius ir ar juos galima reguliuoti (pvz.,
        be porankių, fiksuoti, reguliuojami, nuimami).
    arrow_bolt_point_type:
      name: Lankų / arbaletų strėlės smaigalio tipas
      description: Apibrėžia ant lanko ar arbaleto strėlės uždėto antgalio ar smaigalio
        stilių.
    arrow_component_type:
      name: Strėlės komponento tipas
      description: Klasifikuoja konkrečią strėlės dalį ar priedą (įdėklą, apvyniojimą,
        įvorę, klijus ir pan.), kad klientai galėtų filtruoti prekes be daugybės papildomų
        pakategorių.
    arrow_containment_level:
      name: Strėlių fiksavimo lygis
      description: Nurodo, ar atrama visiškai apima, iš dalies apima ar neapima strėlės.
    arrow_fletching_orientation:
      name: Strėlės plunksnelių orientacija
      description: Nurodo plunksnelių išdėstymo kryptį (pvz., į kairę, į dešinę, spiralės
        formos), kuri lemia strėlės sukimosi kryptį.
    arrow_nock_groove_size:
      name: Strėlės įpjovos griovelio dydis
      description: Nurodo strėlės įpjovos stygos griovelio / angos dydžio klasifikaciją,
        lemiančią suderinamumą su skirtingais lanko stygos skersmenimis.
    arrow_nock_type:
      name: Strėlės įpjovos tipas
      description: Strėlės įpjovos, kuri jungiasi su lanku, dizainas / stilius.
    arrow_rest_style:
      name: Strėlės atramos stilius
      description: Nurodo strėlės atramos veikimo principą (pvz., atlenkiamąją, plokščiąją,
        „whisker biscuit“). Stilius lemia, kaip atrama palaiko, apgaubia ir atleidžia
        strėlę, ir yra pagrindinis veiksnys, pagal kurį pirkėjai atskiria produktus.
    arrow_shaft_compatibility:
      name: Suderinamumas su strėlės kotu
      description: Nurodo strėlės koto / įvorės standartą, kuriam tinka apšviečiamasis
        strėlės galiukas (pvz., X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Meno / rankdarbių įrankio antgalio tipas
      description: Apibūdina darbinio antgalio formą ar profilį (pvz., smailus ar
        apvalus rutuliukas), siekiant nurodyti, kokio tipo įspaudimo žymes jis palieka.
    art_ink_lightfastness_rating:
      name: Meno rašalo atsparumo šviesai įvertinimas
      description: Nurodo rašalo atsparumą blukimui veikiant šviesai, paprastai išreiškiamą
        standartiniais įvertinimais.
    art_ink_opacity:
      name: Meninio rašalo nepermatomumas
      description: Nurodo dažų padengimo lygį juos užtepus.
    art_security_rating:
      name: ART saugumo įvertinimas
      description: Nurodo olandų ART žvaigždučių įvertinimą (1–5 žvaigždutės), kuris
        suteiktas spynai.
    artichoke_cut:
      name: Artišoko supjaustymo būdas
      description: Nurodo, kuri artišoko dalis ar paruoštas produktas siūlomas (pvz.,
        visas, šerdis, apačia), kad pirkėjai žinotų, kokį kiekį gaus, ir kokiems kulinariniams
        tikslams produktas skirtas.
    artichoke_variety:
      name: Artišokų veislė
      description: Nurodo artišoko veislę arba botaninę rūšį, kad pirkėjams būtų lengviau
        atskirti skirtingus dydžius, spalvas, skonius ir kulinarinio panaudojimo būdus.
    articulation_features:
      name: Judėjimo ypatybės
      description: Nurodo, ar dinozauro modelis turi judančių dalių (lankstomą žandikaulį,
        galūnes, uodegą) ir ar jį apskritai galima lankstyti.
    artificial_bait_form:
      name: Dirbtinė masalo forma
      description: Nurodo fizinę žvejybos masalo arba jauko formą arba pateikimo tipą.
    asa_mounting_type:
      name: ASA tvirtinimo tipas
      description: Nurodo oro šaltinio adapterio (ASA) sąsajos stilių arba tvirtinimo
        standartą, kurį naudoja perkėlimo į priekį sistema (pvz., „dovetail“, bėgelis,
        tiesioginis tvirtinimas).
    ascender_descender_type:
      name: Kilimo / nusileidimo įrenginių tipas
      description: Klasifikuoja laipiojimo kiliklio arba nusileidimo įrenginio tipą
        tikslesniam filtravimui.
    aspiration_type:
      name: Aspiratorių tipas
      description: Nurodo, kaip variklis yra įsiurbiamas / sustiprinamas.
    assembly_state:
      name: Surinkimo būsena
      description: Nurodo, ar spintelė išsiunčiama paruošta surinkti, iš anksto surinkta
        ar kita forma.
    assistance_mechanism:
      name: Pagalbinis mechanizmas
      description: Nurodo bet kokią įmontuotą pagalbinę arba pasipriešinimo sistemą,
        kurią vertikalus kombinuotas treniruoklis teikia atliekant prisitraukimus,
        atsispaudimus ar kitus pratimus.
    atemoya_cultivar:
      name: Sodinių anonų veislė
      description: Nurodo konkrečią sodinių anonų veislę, leidžiant pirkėjams išsirinkti
        vaisius, kurių skonis, dydis ar sėklų savybės jiems labiausiai patinka.
    athletic_cup_size:
      name: Apsauginio kaušelio dydis
      description: Nurodo gamintojo nustatytą apsauginio kaušelio dydį, kad jis tiktų
        sportininkui.
    attachment_position:
      name: Tvirtinimo padėtis
      description: Nurodo, kur ant balno arba raitelio krepšys yra skirtas tvirtinti.
    attractant_scent_profile:
      name: Atraktanto kvapo profilis
      description: Apibūdina specifinį kvapą ar skonį, naudojamą laukiniams gyvūnams
        pritraukti arba žmogaus kvapui užmaskuoti.
    atv_utv_intended_use:
      name: ATV/UTV numatytoji paskirtis
      description: Pagrindinė ATV/UTV paskirtis / stilius.
    audio_channel_configuration:
      name: Garso kanalo konfigūracija
      description: Glodintuvo / DSP palaikomų atskirų garso kanalų skaičius (pvz.,
        2 kanalų stereo, 4 kanalų priekiniai / galiniai, 6 kanalų).
    audio_inputs:
      name: Garso įvestys
      description: Nurodo garso įvesties jungčių tipus, kuriuos galima naudoti įrašymui
        (pvz., 1/4 col. linijinė, XLR, 3,5 mm, mikrofono priešstiprintuvis, „phono“).
    audio_output:
      name: Garso išvestis
      description: Nurodo, ar žaislas skleidžia garsą ir kaip garsas skleidžiamas.
    audio_outputs:
      name: Garso išvestys
      description: Nurodo galimą garso išvestį, įskaitant pagrindines išvestis ir
        visas priskiriamas / pagalbines išvestis.
    audio_playback_source:
      name: Garso atkūrimo šaltinis
      description: Pagrindiniai medijos šaltiniai, iš kurių gali groti karaokės rinkinys.
    autograph_authentication:
      name: Autografo autentifikavimas
      description: Nurodo kortelėje esančio autografo autentifikavimo būseną / tipą.
    autograph_format:
      name: Autografo formatas
      description: Nurodo, ar parašas yra originalus ranka pasirašytas autografas,
        antspauduotas / atspausdintas faksimilė ar įrašas / papildymas.
    autogyro_cockpit_enclosure:
      name: Autogiro kabinos gaubtas
      description: Nurodo, ar kabina yra atvira, ar uždara.
    available_firing_modes:
      name: Galimi šaudymo režimai
      description: Nurodo pasirenkamus šaudymo režimus, kuriuos žymeklis palaiko iš
        karto po įsigijimo.
    avocado_variety:
      name: Avokadų veislė
      description: Nurodo avokadų veislę ar rūšį, padėdamas pirkėjams atskirti skonio,
        tekstūros, dydžio ir aliejaus kiekio skirtumus.
    award_customization_included:
      name: Įtrauktas apdovanojimų pritaikymas
      description: Nurodo, kokios individualizavimo ar pritaikymo paslaugos yra įtrauktos
        į perkamo apdovanojimo kainą.
    award_material:
      name: Apdovanojimo medžiaga
      description: Nurodo apdovanojimo objekto (taurės, plokštelės, medžio, ženkliuko,
        kaspino ar kitokio aksesuaro) pagrindinę (-es) medžiagą (-as).
    award_mounting_display_type:
      name: Apdovanojimų tvirtinimo / demonstravimo tipas
      description: Nurodo, kaip apdovanojimas bus eksponuojamas arba tvirtinamas (ant
        sienos, stalo, dėvimas).
    award_plaque_plate_material:
      name: Apdovanojimo lentelės medžiaga
      description: Nurodo prie plokštelės pritvirtintos vardinės / graviravimo plokštelės
        medžiagą (skiriasi nuo pagrindo medžiagos).
    award_ribbon_attachment_type:
      name: Apdovanojimo kaspino tvirtinimo tipas
      description: Nurodo, kaip kaspinas turi būti pritvirtintas arba nešiojamas.
    award_ribbon_imprint_method:
      name: Apdovanojimo juostelės spaudos metodas
      description: Nurodo, kaip tekstas / grafika uždedami ant kaspino.
    award_ribbon_material:
      name: Apdovanojimų juostelės medžiaga
      description: Pagrindinė juostelės audinio medžiaga (pvz., satinas, poliesteris).
    award_ribbon_placement_title:
      name: Apdovanojimų juostelės rodymo vieta/titulas
      description: Standartinė rodymo vieta arba titulas, perteikiamas juostele (pvz.,
        1 vieta, dalyvis).
    axle_compatibility:
      name: Ašių suderinamumas
      description: Nurodo ašies standartą, kurį ratas palaiko, užtikrinant suderinamumą
        su dviračio rėmu ir šake.
    back_beam_type:
      name: Galinės sijos tipas
      description: Galinės sijos tipas / reguliavimas (pvz., paprasta arba reguliuojamo
        aukščio).
    back_design:
      name: Nugaros dizainas
      description: Nurodo pastebimas drabužių nugaros konstrukcijas, kurios turi įtakos
        stiliui ir pagalbai.
    back_panel_type:
      name: Galinės panelės tipas
      description: Nurodo spintelės galinės panelės stilių arba medžiagą, kuri turi
        įtakos ekrano matomumui ir derėjimui su interjeru.
    back_sides_material:
      name: Nugaros ir šonų medžiaga
      description: Nurodo klasikinės gitaros korpuso nugarėlės ir šonų medžiagą.
    backing_type:
      name: Pagrindo tipas
      description: Nurodo parduodamo dekoratyvinio akmens tvirtinimo / pagrindo tipą
        (lipniems produktams).
    backup_camera_mounting_location:
      name: Atsarginės kameros montavimo vieta
      description: Nurodo numatomą atsarginės kameros įrengimo vietą transporto priemonėje.
    backup_camera_video_interface:
      name: Atsarginės kameros vaizdo sąsaja
      description: Nurodo vaizdo išvestį / sąsają / jungtį, kurią naudoja atsarginė
        kamera, norėdama prisijungti prie monitoriaus, vaizdo registratoriaus arba
        galvos įrenginio (pvz., kompozicinė RCA, LVDS OEM, IP per Ethernet).
    badminton_set_components_included:
      name: Į badmintono rinkinį įeinančios sudedamosios dalys
      description: Nurodo atskirus badmintono komplekto elementus.
    bag_attachment_method:
      name: Krepšio tvirtinimo būdas
      description: Nurodo pagrindinį būdą, naudojamą hidratacijos krepšiui / laikikliui
        pritvirtinti prie kitos įrangos (pvz., MOLLE diržai, diržo kilpa, karabinas).
    bag_case_carrying_style:
      name: Krepšio / dėklo nešiojimo būdas
      description: Nurodo pagrindinį bendrą dėklo / krepšio nešiojimo formą (kaip
        jis sukonstruotas nešiojimui).
    bag_cover_material:
      name: Krepšio uždangalo medžiaga
      description: Nurodo krepšio dangalo (išorinio dangalo) medžiagą, kuri daro įtaką
        patvarumui, sukibimui ir išvaizdai.
    bag_embellishment:
      name: Krepšio dekoratyviniai elementai
      description: Nurodo pagrindinius dekoratyvinius elementus, esančius krepšio
        išorėje, pvz., kutus, kniedes ar dygsniavimą.
    bag_fill_medium:
      name: Maišo užpildymo priemonė
      description: Nurodo medžiagą, naudojamą maišui užpildyti arba slėgiui padidinti
        (pvz., oras, vanduo, smėlis).
    bag_material:
      name: Krepšio medžiaga
      description: Oro pagalvės / pūslės medžiaga.
    bag_padding_level:
      name: Krepšio užpildymo lygis
      description: Nurodo paminkštinimo lygį arba tipą, integruotą į krepšį arba uždangalą.
    bag_size_descriptor:
      name: Krepšio dydžio apibūdinimas
      description: Kibiro formos krepšio rinkodarinė dydžio klasė (pvz., mini, didelis),
        papildanti tikslius matmenis.
    bagel_size:
      name: Riestainio dydis
      description: Nurodo bendrą riestainio dydį, pvz., mažas, plonas, standartinis,
        didelis, labai didelis arba milžiniškas.
    bagpipe_accessories_included:
      name: Į komplektą įeinantys dūdmaišio priedai
      description: Išvardijami pagrindiniai dūdmaišių komplektą sudarantys komponentai
        ir priedai (be pagrindinių vamzdžių), pavyzdžiui, dėklas, treniruočių dūdelė,
        dangtelis, dirželiai, drėgmės reguliatorius.
    bagpipes_playing_mode:
      name: Dūdmaišio grojimo režimas
      description: Kaip instrumentas aprūpinamas oru grojimo metu.
    bait_compatibility:
      name: Jauko suderinamumas
      description: Nurodo masalo tipus, su kuriais granulių aksesuarų daiktas yra
        skirtas naudoti, padedant žvejams užtikrinti, kad pasirinktas įrankis atitiktų
        pageidaujamą masalą.
    bait_species:
      name: Masalo rūšys
      description: Nurodo pagrindinį organizmą, naudojamą kaip masalą, padedant žvejams
        užtikrinti teisėtumą ir veiksmingumą tikslinėms žuvų rūšims.
    baking_chip_form:
      name: Konditerijos šokolado gabalėlių forma
      description: Nurodo kepimo gabalėlių fizinį dydį arba formą, kurie daro įtaką
        tirpimo savybėms ir recepto išvaizdai.
    balance_board_style:
      name: Pusiausvyros treniravimo lentos stilius
      description: Klasifikuoja pusiausvyros treniravimo lentas pagal jų mechanizmą
        arba konstrukcijos stilių, nurodant, kaip lenta juda ir koks yra treniruočių
        iššūkis.
    balance_cushion_accessories_included:
