      description: Nurodo apsauginį sertifikavimą / standartą, kurį atitinka pirštinės
        (pvz., EN 13594 lygiai).
    motorcycle_glove_waterproof_construction:
      name: Motociklo pirštinių vandeniui atspari konstrukcija
      description: Nurodo pirštinėje naudojamą vandeniui atsparumo metodą (jei taikoma).
    motorcycle_guard_coverage_area:
      name: Motociklo apsaugos padengimo sritis
      description: Pagrindinė produkto suteikiama padengimo sritis (alkūnė, riešas,
        dilbis, derinys).
    motorcycle_kidney_belt_construction_type:
      name: Motociklo inkstų diržo konstrukcijos tipas
      description: Inkstų diržo konstrukcijos stilius, turintis įtakos standumui,
        oro srautui ir apsaugai.
    motorcycle_kidney_belt_purpose:
      name: Motociklo inkstų diržo paskirtis
      description: Nurodo pagrindinį važiavimo stilių arba scenarijų, kuriam skirtas
        motociklo inkstų diržas.
    motorcycle_luggage_capacity_class:
      name: Motociklo bagažo talpos klasė
      description: Nurodo motociklo bagažo tūrio talpą, išreikštą litrų diapazonu.
    motorcycle_luggage_mounting_system:
      name: Motociklo bagažo tvirtinimo sistema
      description: Tvirtinimo / montavimo sistema, naudojama krepšiui / šoniniam krepšiui
        pritvirtinti prie motociklo (pvz., permetami diržai, prie bagažinės tvirtinamas
        greito atleidimo mechanizmas).
    motorcycle_luggage_side:
      name: Motociklo bagažo pusė
      description: Šoniniams krepšiams nurodo, ar gaminys skirtas kairei pusei, dešinei
        pusei, ar porai / rinkiniui.
    motorcycle_protective_gear_size_system:
      name: Motociklo apsauginės įrangos dydžių sistema
      description: Nurodo produkte naudojamą dydžių sistemą (pvz., raidinė dydžių
        sistema, skaitinė, vienas dydis).
    motorcycle_rack_carrier_style:
      name: Motociklo laikiklio stilius
      description: Apibūdina funkcinį laikiklio stilių motociklo arba motorolerio
        transportavimui (platforminis, bėginis, su pakėlimo pagalba ir kt.).
    motorcycle_riding_discipline:
      name: Motociklo važiavimo disciplina
      description: Nurodo pagrindinį važiavimo stilių arba naudojimo discipliną, kuriai
        skirtas kaklo įtvaras.
    motorcycle_tire_speed_rating:
      name: Motociklo padangos greičio indeksas
      description: Nurodo maksimalų nuolatinį greitį, kuriam padanga yra sertifikuota,
        naudojant standartinį raidinį kodą (pvz., H, V, W).
    motorsport_window_net_certification:
      name: Automobilių sporto lango tinklo sertifikavimas
      description: Lenktynių saugos sertifikavimas arba homologacija, kurią atitinka
        lango tinklas (pvz., SFI arba FIA), įskaitant specifikacijos numerį, jei taikoma.
    mound_usage_type:
      name: Metiko kalnelio naudojimo tipas
      description: Nurodo numatytą metiko kalnelio naudojimo aplinką, pvz., treniruotėms,
        rungtynėms, bullpen arba universaliam naudojimui.
    mount_attachment_method:
      name: Laikiklio montavimo būdas
      description: Nurodo, kaip laikiklis tvirtinamas prie transporto priemonės paviršiaus
        / konstrukcijos.
    mountainboard_truck_type:
      name: Mountainboard važiuoklės tipas
      description: Klasifikuoja su lenta pateikiamų važiuoklių stilių, kuris turi
        įtakos manevringumui ir patvarumui.
    mounting_attachment_method:
      name: Montavimo / tvirtinimo metodas
      description: Kaip laikiklis / krepšys skirtas tvirtinti prie būgno, stovo, diržo
        ar kito paviršiaus.
    mounting_attachment_type:
      name: Montavimo / tvirtinimo tipas
      description: Kaip santykio priedas tvirtinamas arba jungiamas prie verpimo ratelio.
    mounting_hardware_included_for_installation:
      name: Įtraukti montavimo elementai (montavimui)
      description: Nurodo, ar su produktu pateikiami montavimo elementai, reikalingi
        galinės sėdynės montavimui (pvz., laikikliai, varžtai, bėgeliai).
    mounting_location:
      name: Montavimo vieta
      description: Nurodo numatytą šviesos / atšvaito montavimo vietą ant įrangos
        arba kūno (pvz., priekinė šakė, šalmas, rato stipinai).
    mounting_method:
      name: Montavimo metodas
      description: Kaip lazdelės / šepetėlio laikiklis montuojamas arba tvirtinamas
        (pvz., su spaustuku, dirželiu, klijais).
    mounting_position:
      name: Montavimo padėtis
      description: Nurodo, kur transporto priemonės salone skirtas montuoti / įrengti
        rankinio stabdžio valdiklis.
    mounting_rail_type:
      name: Montavimo bėgelio tipas
      description: Nurodo bėgelio arba sąsajos standartą, prie kurio tvirtinamas priedas,
        pvz., Picatinny arba M-LOK.
    mounting_receiver_size:
      name: Montavimo imtuvo dydis
      description: Imtuvo kablio dydis, reikalingas prie kablio montuojamiems bagažo
        laikikliams.
    mounting_storage_type:
      name: Montavimo / laikymo tipas
      description: Kaip įrenginys skirtas montuoti arba laikyti ant transporto priemonės
        / asmens.
    mouth_grip_type:
      name: Burnos laikiklio tipas
      description: Apibūdina švilpuko burnos laikiklio arba apsaugos tipą komfortui
        ir higienai užtikrinti.
    mouthguard_mold_type:
      name: Burnos apsaugos formavimo tipas
      description: Apibūdina, kaip burnos apsauga pritaikoma sportininko dantims (pvz.,
