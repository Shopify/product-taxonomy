    embossing_stylus_tip_shape:
      name: Reljefinio įrankio antgalio forma
      description: Apibūdina reljefinio antgalio geometriją, naudojamą skirtingiems
        efektams kurti (pvz., rutulinis arba smailus).
    embroidered_coverage_level:
      name: Siuvinėjimo padengimo lygis
      description: Apytikslis siuvinėto siūlo padengimo kiekis ant emblemos paviršiaus.
    embroidered_patch_backing_type:
      name: Siuvinėtos emblemos pagrindo tipas
      description: Pagrindo / atraminis sluoksnis siuvinėtos aplikacijos galinėje
        pusėje, kuris daro įtaką patvarumui ir pritaikymo būdui.
    embroidery_hoop_type:
      name: Siuvinėjimo lankelio tipas
      description: Identifikuoja siuvinėjimo lankelio konstrukcijos stilių ir pagrindinį
        įtempimo mechanizmą.
    embroidery_machine_bobbin_type:
      name: Siuvinėjimo mašinos ritės tipas
      description: Ritės sistemos tipas / įdėjimo būdas.
    emergency_lighting_configuration:
      name: Avarinio apšvietimo konfigūracija
      description: Nurodo pagrindinę transporto priemonėje įrengtą avarinio įspėjamojo
        apšvietimo konfigūraciją (pvz., stogo šviesos juosta, grotelių žibintai).
    emergency_lighting_package:
      name: Avarinio apšvietimo paketas
      description: Nurodo įrengtų avarinių įspėjamųjų žibintų tipus.
    emissions_compliance_standard:
      name: Išmetamųjų teršalų atitikties standartas
      description: Nurodo variklio emisijų sertifikavimą / atitiktį, jei taikoma.
    emissions_standard:
      name: Emisijų standartas
      description: Transporto priemonės išmetamųjų teršalų atitikties standartas (skiriasi
        pagal regioną ir metus).
    enclosure_panel_configuration:
      name: Korpuso panelės konfigūracija
      description: Nurodo, kurie gaubto skydai arba šonai yra įtraukti (uždengimo
        konfigūracija), pvz., pilnas gaubtas, tik šoninės užuolaidos arba 3 pusių
        (atviras priekis / galas).
    enclosure_window_material:
      name: Gaubto lango medžiaga
      description: Identifikuoja medžiagą, naudojamą skaidriems gaubto langų skydams.
    end_fitting_type:
      name: Galinės jungties tipas
      description: Jungties stilius, naudojamas kiekviename statramsčio gale (transporto
        priemonės ir dangčio pusėje), nustatantis montavimo suderinamumą.
    end_type:
      name: Galo tipas
      description: Nurodo vilkimo diržo galų užbaigimo / tvirtinimo tipą, skirtą prijungti
        prie traukimo taškų.
    ends_style_blocking_wires:
      name: Galų stilius (blokavimo vielos)
      description: Nurodo, kaip apdoroti blokavimo vielos galai saugumui ir lengvesniam
        pervėrimui per nėrinių kraštus.
    enduro_bike_suspension_adjustability:
      name: Enduro dviračio pakabos reguliuojamumas
      description: Nurodo, kokie pakabos reguliavimai yra prieinami (paprastai priekinei
        šakei ir galiniam amortizatoriui).
    engine_bay_mounting_location:
      name: Variklio skyriaus montavimo vieta
      description: Nurodo, kur variklio skyriuje turi būti montuojamas išsiplėtimo
        bakelis (santykinė padėtis).
    engine_bearing_coating:
      name: Variklio guolių danga
      description: Nurodo bet kokią guolio paviršiaus dangą (atsparumui dilimui, įsidirbimui,
        sumažintai trinčiai).
    engine_bearing_position:
      name: Variklio guolio padėtis
      description: Nurodo guolio vietą / funkciją variklyje.
    engine_bearing_size:
      name: Variklio guolio dydis
      description: Nurodo, ar guolis yra standartinio dydžio, ar sumažinto / padidinto
        dydžio variantas (dažnai susijęs su alkūninio veleno šlifavimu ir tarpu).
    engine_configuration:
      name: Variklio konfigūracija
      description: Nurodo variklio cilindrų išdėstymą / konfigūraciją (pvz., eilinis,
        V formos, plokščias / boxer).
    engine_cooling_type:
      name: Variklio aušinimo tipas
      description: Nurodo variklio aušinimo metodą.
    engine_degreaser_form:
      name: Variklio riebalų šalinimo priemonės forma
      description: Fizinė variklio riebalų šalinimo priemonės forma / pateikimo tipas.
    engine_degreaser_rinse_requirement:
      name: Variklio riebalų šalinimo priemonės nuplovimo reikalavimas
      description: Nurodo, ar riebalų šalinimo priemonę po naudojimo reikia nuplauti
        vandeniu.
    engine_mount_type:
      name: Variklio laikiklio tipas
      description: Nurodo funkcinę variklio laikiklio konstrukciją (pvz., hidraulinis,
        standus, sukimo momento strypas).
    engine_oil_formulation:
