      description: Nurodo eksploatacines medžiagas, reikalingas naudojimui (jei taikoma).
    step_surface_texture:
      name: Laiptelių paviršiaus tekstūra
      description: Nurodo pakopos protektoriaus arba paviršiaus dizainą / medžiagą,
        skirtą pagerinti sukibimą ir komfortą esant drėgnoms sąlygoms.
    stepper_motion_type:
      name: Stepperio judesio tipas
      description: Apibrėžia pagrindinį žingsniavimo judesį, kurį atlieka treniruoklis.
    stick_bow_profile:
      name: Ledo ritulio lazdos išlinkio profilis
      description: Nurodo žolės riedulio lazdos koto išlinkio profilį (arba „išlinkio
