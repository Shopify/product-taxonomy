    stick_size_compatibility:
      name: Lazdos dydžio suderinamumas
      description: Nurodo ledo ritulio lazdų dydžių grupę, su kuria produktas yra
        suderinamas (pvz., Youth, Junior, Intermediate, Senior, Goalie, Universal).
    sticker_decal_features:
      name: Lipdukų savybės
      description: Apibūdina lipdukams būdingas naudojimo ir veikimo savybes (pvz.,
