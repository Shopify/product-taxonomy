    seam_ripper_tip_style:
      name: Ardytuvo galiuko stilius
      description: Apibūdina funkcinį galiuko dizainą, skirtą saugiai pakišti po siūlėmis
        ir nukirpti siūlą.
    seam_sealing_type:
      name: Siūlių sandarinimo tipas
      description: Apibūdina metodą, naudojamą apsaugoti nuo vandens patekimo per
        lietaus kostiumo siūles (pvz., pilnai užklijuotos, suvirintos).
    seam_type:
      name: Siūlės tipas
      description: Apibūdina beisbolo kamuolio siuvimo stilių, darantį įtaką sukibimui,
        aerodinamikai ir numatytam žaidimo lygiui.
    season_condition_protection:
      name: Apsauga pagal sezoną / sąlygas
      description: Nurodo pagrindines oro sąlygas / poveikį, nuo kurių skirtas apsaugoti
