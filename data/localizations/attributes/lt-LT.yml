        svirtimis ar elektriniais varikliais), kas gali turėti įtakos laidų sistemai
        ir suderinamumui.
    seat_belt_attachment_type:
      name: Saugos diržo tvirtinimo tipas
      description: Nurodo, kaip diržas tvirtinamas prie transporto priemonės arba
        diržo furnitūros.
    seat_belt_buckle_electrical_connector_type:
      name: Saugos diržo sagties elektros jungties tipas
      description: Nurodo jungtį / sąsają, naudojamą sagties jungiklio arba įtempiklio
