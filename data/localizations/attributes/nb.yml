---
nb:
  attributes:
    3d_glasses_fit_design:
      name: 3D-briller passformdesign
      description: Indikerer hvordan brillene bæres eller festes (f.eks. klips-på,
        omsluttende, passer over).
    3d_glasses_material:
      name: 3D-brillemateriale
      description: Angir hvilket materiale som brukes i 3D-briller, f.eks. bambus
        eller rustfritt stål.
    3d_glasses_technology:
      name: 3D-briller teknologi
      description: Spesifiserer 3D-bilde/synkroniseringsteknologien brillene er designet
        for, som bestemmer kompatibilitet med spesifikke skjermer eller projektorer.
    3d_printer_case_style:
      name: 3D-skriverveske-stil
      description: Klassifiserer den overordnede produkttypen slik at kunder kan skille
        mellom myke bærevesker, hardskalldeksler, stasjonære innkapslinger og enkle
        støvdeksler.
    3d_printer_cleaning_kit_components_included:
      name: 3D-skriver rengjøringssett komponenter inkludert
      description: Lister opp de individuelle verktøyene og forbruksvarene som følger
        med i settet, slik at kunder vet nøyaktig hva de kjøper.
    3d_printing_resin_type:
      name: Type 3D-utskriftsharpiks
      description: Spesifiserer formuleringen eller tiltenkt anvendelse av harpiksen,
        og hjelper kunder med raskt å identifisere om harpiksen er standard, ingeniørkvalitet,
        støpbar eller andre spesialiserte typer.
    80_plus_efficiency_rating:
      name: 80 Plus-effektivitetsvurdering
      description: Angir det offisielle 80 Plus energieffektivitetssertifiseringsnivået
        PSU-en har oppnådd.
    abrasive_material:
      name: Klebende materiale
      description: Angir hvilken type slipemiddel som brukes i slipeverktøy, f.eks.
        diamant eller silisiumkarbid.
    absinthe_style:
      name: Absintstil
      description: Angir stilen til absint, f.eks. blandet eller destillert.
    absinthe_variety:
      name: Absintvariant
      description: Skiller blant absintprodukter basert på unike varianter, f.eks.
        rouge eller verte.
    absorbency_level:
      name: Absorberingsnivå
      description: Angir absorpsjonsevne, vanligvis for produkter til personlig pleie,
        f.eks. over natten eller lys.
    absorbent_hygiene_product_features:
      name: Absorberende hygieneproduktegenskaper
      description: Beskriver spesielle egenskaper ved hygieneprodukter, for eksempel
        lekkasjesikre eller hypoallergene.
    academic_level:
      name: Akademisk nivå
      description: Angir det akademiske nivået til medieinnhold, for eksempel mastergrad
        eller doktorgrad.
    accessibility_design_features:
      name: Tilgjengelighetsdesignfunksjoner
      description: Viser spesielle designelementer som hjelper brukere med hørsels-,
        syns- eller fingerferdighetsutfordringer.
    accessory_material:
      name: Tilbehørsmateriale
      description: Beskriver typen materiale i tilbehør, vanligvis for forsendelsesrekvisita;
        f.eks. plast eller papp.
    accessory_size:
      name: Tilbehørsstørrelse
      description: Angir størrelsen til et tilbehørsprodukt, for eksempel universalstørrelse
        eller kompakt.
    accordion_tuning:
      name: Stemming av trekkspill
      description: Angir hvilken type stemming som brukes i et trekkspill, for eksempel
        tørr eller konserttone.
    activation_mechanism:
      name: Aktiveringsmekanisme
      description: Angir hovedmetoden som utløser alarmen.
    activation_method:
      name: Aktiveringsmetode
      description: Beskriver hvordan forhåndsbetalt kreditt eller SIM-kort aktiveres
        av brukeren.
    active_ingredient:
      name: Aktiv ingrediens
      description: Identifiserer viktige ingredienser i produkter til personlig pleie,
        f.eks. vitamin A eller retinol.
    activewear_clothing_features:
      name: Klesfunksjoner for aktive plagg
      description: Angir hvilke unike egenskaper aktivitetstøy har, for eksempel fireveis
        stretch eller pustende design.
    activity:
      name: Aktivitet
      description: Angir hvilken sport eller aktivitet produktet er designet for,
        for eksempel tennis eller pilates.
    activity_tracker_design:
      name: Design på aktivitetssporer
      description: Angir hvordan aktivitetsmåleren bæres, f.eks. klips eller armbånd.
    acupuncture_model_format:
      name: Format på akupunkturmodell
      description: Angir størrelsen og skalaen til akupunkturmodeller, f.eks. naturlig
        størrelse eller miniatyr.
    acupuncture_model_type:
      name: Type akupunkturmodell
      description: 'Angir hvilken kroppsdel eller art akupunkturmodellen representerer,
        f.eks. hode, hånd eller dyr. '
    adapter_directionality:
      name: Adapterretning
      description: Indikerer om adapteren støtter signalflyt i begge retninger eller
        bare i én spesifisert retning.
    adapter_operating_modes:
      name: Adapter-driftsmodus
      description: Spesifiserer om adapteren fungerer som en Bluetooth-mottaker, -sender
        eller begge deler.
    adaptive_sync_technology:
      name: Adaptiv synkroniseringsteknologi
      description: Spesifiserer hvilken teknologi for variabel oppdateringsfrekvens
        (VRR) som skjermen støtter, for revnefri visning.
    adc_resolution:
      name: ADC-oppløsning
      description: Spesifiserer oppløsningen (i bits) til den integrerte Analog-til-Digital-konverteren,
        som definerer målepresisjon.
    additional_animation_software_features:
      name: Tilleggsfunksjoner for animasjonsprogramvare
      description: Spesifiserer unike funksjoner i animasjonsredigeringsprogramvare,
        for eksempel karakteranimasjon eller visuelle effekter
    additional_cleaning_technology:
      name: Ekstra renseteknologi
      description: Lister opp eventuelle renseteknologier inkludert utover damp (f.eks.
        ultralyd, UV, ozon).
    additional_design_software_type:
      name: Ekstra designprogramvaretype
      description: Spesifiserer tilleggsfunksjoner for designprogramvare, for eksempel
        virtuell omvisning eller landskapsdesign
    additional_financial_software_features:
      name: Tilleggsfunksjoner for økonomiprogramvare
      description: Identifiserer ekstra muligheter i finansiell programvare, som kapitalforvaltning
        eller revisjon og overholdelse
    additional_graphic_software_features:
      name: Tilleggsfunksjoner for grafikkprogramvare
      description: Fremhever ekstra muligheter til grafisk programvare, som digital
        illustrasjon eller layoutdesign
    additional_publishing_software_features:
      name: Tilleggsfunksjoner for publiseringsprogramvare
      description: Fremhever ekstra funksjonalitet i publiseringsprogramvare, som
        trykkdesign eller digital publisering
    additional_security_software_features:
      name: Tilleggsfunksjoner for sikkerhetsprogramvare
      description: Identifiserer ekstra muligheter i sikkerhetsprogramvare, f.eks.
        diskkryptering, inntrengningsdeteksjon
    adhesive_application_type:
      name: Limpåføringstype
      description: Definerer den tiltenkte vippebehandlingen eller brukstilfellet
        for limet.
    adhesive_features:
      name: Klebefunksjoner
      description: Fremhever spesielle egenskaper til klebestoffet som brukes på plaster
        eller tape.
    adhesive_format:
      name: Limformat
      description: Indikerer den fysiske formen som limet leveres i for reparasjonsbruk.
    adhesive_strength:
      name: Klebestyrke
      description: Spesifiserer bindings- eller løftestyrkenivået til nesestripens
        klebemiddel (f.eks. original, ekstra styrke).
    adhesive_type:
      name: Type klebemiddel
      description: Angir hvilken type lim som brukes i et produkt, for eksempel fjenrbart
        eller permanent.
    aftershave_product_form:
      name: Produktform for aftershave
      description: Identifiserer konsistensen til et aftershave-produkt, for eksempel
        balsam eller krem
    age_group:
      name: Aldersgruppe
      description: Angir alderen til produktets tiltenkte brukere, for eksempel voksne
        eller barn.
    age_restrictions:
      name: Aldersbegrensninger
      description: Angir minimumsalderen for et produkt eller arrangement, for eksempel
        18 år eller eldre.
    ai_application:
      name: AI-applikasjon
      description: Angir funksjonen til KI i programvare, f.eks. prediktiv analyse
        eller talegjenkjenning.
    air_freshener_form:
      name: Luftfriskerform
      description: Angir typen luftfriskere til bil, f.eks. olje eller ventilasjonsklype.
    air_fryer_functions:
      name: Airfryerens funksjoner
      description: Viser de forskjellige tilberedningsmodusene som er tilgjengelige
        i en airfryer eller lignende apparat, som luftsteking eller steking
    air_mattress_features:
      name: Luftmadrassfunksjoner
      description: Angir unike egenskaper for en luftmadrass, f.eks. lett å blåse
        opp eller punkteringsbestandig.
    air_tube_configuration:
      name: Luftslangekonfigurasjon
      description: Indikerer antall eller stil på luftoppblåsingsslanger integrert
        med mansjetten.
    airbrush_feed_type:
      name: Airbrushfôrtype
      description: Beskriver metoden for levering av maling i airbrush, som tyngdekraft
        eller sifong.
    airbrush_operation_method:
      name: Airbrushdriftsmetode
      description: Spesifiserer driftsstilen til airbrush, for eksempel dobbeltvirkende
        eller enkeltvirkende
    aircraft_engine_configuration:
      name: Konfigurasjon av flymotorer
      description: Angir antall motorer som driver flyet, for eksempel en eller to
        motorer
    aircraft_engine_type:
      name: Type flymotor
      description: Angir motortypen som flyet er utstyrt med, som jetmotor eller turboprop
    airflow_opening_design:
      name: Design for luftstrømåpning
      description: Beskriver puste- eller ventilasjonskonfigurasjonen innebygd i munnstykket.
    airsoft_equipment_included:
      name: Airsoft-utstyr inkludert
      description: Angir hvilket ekstra utstyr som følger med airsoft-produkter, for
        eksempel vernebriller eller taktisk vest.
    album_type:
      name: Albumtype
      description: Angir innbindingsstilen til scrapbooking- eller stempelsett, f.eks.
        spiralbundet eller utklippsbok.
    alcohol/solvent_content:
      name: Innhold av alkohol/løsemidler
      description: Klassifiserer produktet basert på alkohol- eller løsemiddelinnholdet
        for frakt- og regulatoriske formål (f.eks. alkohol ≤ 24 %, alkohol > 24 %,
        liten beholder med løsemiddel)
    alcohol_content:
      name: Alkoholinnhold
      description: Indikerer om toneren er alkoholfri eller, hvis tilstede, omtrent
        hvor mye alkohol formelen inneholder.
    alert_type:
      name: Varslingstype
      description: Angir hva slags varsling et produkt gir, for eksempel lydalarmer
        eller smarttelefonvarsler.
    allergen_information:
      name: Allergeninformasjon
      description: Angir hvilke potensielle allergener som finnes i mat eller drikke,
        for eksempel hvete eller peanøtter.
    allergen_test_type:
      name: Allergentesttype
      description: Angir hvilken type allergen testsettet er designet for å oppdage,
        for eksempel mat eller miljø.
    allergens:
      name: Allergener
      description: Angir potensielle allergener i helse- og skjønnhetsprodukter, f.eks.
        linalool eller limonen.
    allergy_friendly_features:
      name: Allergivennlige funksjoner
      description: Angir om et produkt har allergivennlige egenskaper, f.eks. lateksfri
        eller muggbestandig.
    amino_acid_subtype:
      name: Aminosyre subtype
      description: Angir den primære typen eller profilen av aminosyrer som finnes
        i kosttilskuddet.
    amplifier/booster_suitable_location:
      name: Egnet plassering for forsterker/booster
      description: Angir de beste plasseringene for forsterkeren eller signalforsterkeren,
        for eksempel kjøretøy eller store konsertsteder.
    amplifier_class:
      name: Forsterkerklasse
      description: Angir hvilken type forsterker det er, for eksempel AB eller D.
    amplifier_configuration:
      name: Høyttalerkonfigurasjon
      description: Angir hvilket oppsett forsterkere til motorkjøretøy har, for eksempel
        to- eller firekanalers.
    amputation_level:
      name: Amputasjonsnivå
      description: Angir amputasjonsnivået strømpen er designet for.
    analyte_measured:
      name: Analytt målt
      description: Identifiserer biomarkøren(e) som kontrollløsningen gir kalibrering
        for.
    anamorphic_squeeze_ratio:
      name: Anamorfisk klemmeforhold
      description: Indikerer den horisontale kompresjonsfaktoren til et anamorfisk
        objektiv, slik at brukerne kan matche objektiver med ønsket desqueeze-utgang.
    anatomical_detail_displayed:
      name: Anatomisk detalj vist
      description: Indikerer hvilke anatomiske eller meridianfunksjoner som er fremhevet
        på modellen.
    anchor_type:
      name: Ankertype
      description: Angir hvilket feste som brukes i vannsportutstyr som taues, for
        eksempel fluke eller plog.
    anemometer_application:
      name: Bruk av anemometer
      description: Angir den tiltenkte bruken av en vindmåler, for eksempel industriell
        eller meteorologisk.
    angles_supported:
      name: Støttede vinkler
      description: Angir hvilke vinkler et produkt fungerer med, vanligvis for elektronikk,
        f.eks. justerbar eller 0° til 180°.
    angling_style:
      name: Fiskestil
      description: Angir hvilken fisketeknikk produktet er designet for, for eksempel
        brenninger eller fluefiske.
    animal_feed_form:
      name: Form for dyrefôr
      description: Angir hvilken form dyrefôr har, for eksempel flytende eller granulat.
    animal_type:
      name: Dyretype
      description: Angir hvilken type dyr et produkt er beregnet på, for eksempel
        ender, hjort eller hunder.
    answering_machine_type:
      name: Telefonsvarer type
      description: Spesifiserer tilstedeværelsen og teknologien til en integrert telefonsvarer.
    antenna_connector_type:
      name: Antennekontakt type
      description: Spesifiserer RF-kontakten som brukes til å koble til eksterne antenner.
    antenna_rf_connector_type:
      name: Antenne RF-kontakttype
      description: Identifiserer RF-kontakten som brukes av antennen.
    antenna_type:
      name: Antennetype
      description: Angir antennetypen for elektroniske enheter, f.eks. rundstrålende
        eller rutenett.
    anti_agin_skin_care_type:
      name: Anti-aldrende hudpleietype
      description: Klassifiserer hva slags antialdrende hudpleiprodukt det gjelder,
        f.eks. maske, toner
    anti_perspirant_strength_level:
      name: Antiperspirantstyrkenivå
      description: Angir antiperspirantens effektivitetsklassifisering (f.eks. klinisk
        styrke, sportstyrke).
    antibody_class_tested:
      name: Antistoffklasse testet
      description: Angir immunglobulinet eller biomarkøren settet påviser (f.eks.
        IgE, IgG4).
    antifreeze_type:
      name: Type frostvæske
      description: Angir typen frostvæske for kjøretøyvedlikehold, f.eks. konsentrat
        eller forhåndsfortynnet.
    antique_car_design:
      name: Antikk bildesign
      description: Beskriver den primære designstilen til en antikk bil, som T-bucket eller
        grand tourer
    antique_vehicle_era:
      name: Antikk bilæra
      description: Beskriver den historiske perioden til et antikt kjøretøy, som Brass
        Era eller Vintage Era
    appliance_board_function:
      name: Apparat kort funksjon
      description: Spesifiserer den funksjonelle rollen til kortet i apparatet.
    appliance_unit_location:
      name: Apparat enhetsplassering
      description: Indikerer den fysiske delen av apparatet som kortet er beregnet
        for (f.eks. innendørs eller utendørs enhet).
    application_area:
      name: Bruksområde
      description: Angir hvilken kroppsdel eller hvilket område produktet skal påføres,
        f.eks. lepper eller hele kroppen.
    application_method:
      name: Bruksmetode
      description: Angir hvordan et produkt påføres eller brukes, f.eks. gel, væske
        eller spray.
    application_type:
      name: Anvendelsestype
      description: Indikerer om behandlingen blir liggende eller skylles ut og eventuelle
        spesielle bruksmodi.
    applicator_format:
      name: Påførerformat
      description: Beskriver den fysiske formen eller stilen til lotion- eller solkrempåføreren.
    applicator_material:
      name: Applikatormateriale
      description: Angir hvilket materiale som brukes i applikatoren, vanligvis for
        tamponger, f.eks plast eller papp.
    applicator_type:
      name: Applikatortype
      description: Identifiserer typen applikator som følger med tamponger, f.eks.
        applikator, uten applikator
    applique/patch_shape:
      name: Form på applikasjon/lapping
      description: Angir formen til lapper og andre produkter til applikering, f.eks.
        dyr eller geometrisk.
    applique_shape:
      name: Applikasjonsform
      description: Angir formen til produkter til applikasjon (sying), for eksempel
        blomst eller dyr.
    aquarium_filter_features:
      name: Akvariumsfilterfunksjoner
      description: Angir spesielle egenskaper ved akvariefiltre, f.eks. hurtig patronbytte
        eller flertrinnsfiltrering.
    aquarium_light_spectrum:
      name: Lysspektrum for akvarie
      description: Angir typen lysspektrum for akvariebelysning, f.eks. blått eller
        dagslys.
    aquarium_overflow_box_design:
      name: Overvannsboksdesign til akvarier
      description: Beskriver oppsettstilen til en overløpsboks for akvariet, for eksempel
        ekstern eller hengende
    archery_activity:
      name: Bueskytingsaktivitet
      description: Angir typen bueskyting, f.eks. utendørsjakt eller måltrening.
    archery_equipment_included:
      name: Bueskytingsutstyr inkludert
      description: Angir hvilket bueskytingstilbehør som er inkludert, f.eks. stabilisatorfeste
        eller sikkerhetsglasspiler.
    archery_style:
      name: Bueskytingstil
      description: Angir hvilken type bueskyting produktet er designet for, f.eks.
        3D-bueskyting eller buejakt.
    archery_target_type:
      name: Type bueskyttermål
      description: Spesifiserer typen bueskytingsmål for forskjellige skytepraksiser,
        som 3D-mål, sekkemål
    aromatherapy:
      name: Aromaterapi
      description: Angir hvilken duft eller eteriske olje som brukes, f.eks. eukalyptus
        eller lavendel.
    arrangement:
      name: Ordning
      description: Angir hvordan blomster arrangeres eller presenteres, f.eks. vase
        eller kurv.
    arrow/bolt_material:
      name: Pil-/boltmateriale
      description: Beskriver konstruksjonsmaterialet til piler eller bolter, for eksempel
        aluminium eller bambus.
    arrow_fletching_material:
      name: Pilflettende materiale
      description: Angir hvilket materiale som brukes i pilfjær, for eksempel syntetisk
        eller plast.
    arrow_material:
      name: Pilmateriale
      description: Angir hva piler består av, for eksempel bambus eller glassfiber.
    art/crafting_tool_material:
      name: Kunst- og håndverksmateriale
      description: Angir hovedmaterialet i kunst eller håndverksverktøy, for eksempel
        tre eller metall.
    art_fixative_application_method:
      name: Kunstfiksativ påføringsmetode
      description: Angir hvordan et festemiddel til kunstbruk påføres, for eksempel
        spray eller pensel.
    art_movement:
      name: Kunstbevegelse
      description: Angir stilen eller kunstbevegelsen til et maleri, som impresjonisme
        eller ekspresjonisme
    art_style:
      name: Kunststil
      description: Angir den estetiske stilen til et produkt, for eksempel art nouveau
        eller typografi.
    artwork_authenticity:
      name: Kunstverkets autentisitet
      description: Angir hvor ekte kunstverket er og spesifiserer om det er et originalt
        verk eller en reproduksjon
    artwork_frame_material:
      name: Kunstrammemateriale
      description: Angir hvilket materiale som brukes i kunstrammer, for eksempel
        tre eller gullbelagt.
    artwork_type:
      name: Kunsttype
      description: Angir stilen til digitale kunstverk, for eksempel typografi eller
        digitalt maleri.
    assisted_braking_technology:
      name: Assistert bremseteknologi
      description: Indikerer typen assistert bremsing i sikringsenheter, f.eks. aktiv,
        passiv
    attachment_method:
      name: Festemetode
      description: Angir metoden som brukes for å feste produktet, f.eks. borrelås
        eller klips.
    attachment_options:
      name: Festealternativer
      description: Spesifiserer metodene for å feste eller sikre et produkt, f.eks.
        snor.
    attachment_type:
      name: Festetype
      description: Angir metoden for festing eller tilkobling av produktet, for eksempel
        snap-on eller krok og løkke.
    atv/off_road_tire_type:
      name: Dekktype for ATV/firehjuling
      description: Angir den spesifikke bruken for ATV- eller terrengdekk, for eksempel
        sand eller gjørme.
    audio/scan_converter_features:
      name: Lyd-/skannekonverteringsfunksjoner
      description: Beskriver egenskapene til en audio/scan-konverteringsenhet, for
        eksempel automatisk konvertering eller fjernkontroll.
    audio/video_cable_connector_type_end_a:
      name: Lyd/video-kabelkontakttype (ende A)
      description: Spesifiserer den eksakte kontakten eller grensesnittet som finnes
        på den første enden (Ende A) av kabelen.
    audio/video_cable_connector_type_end_b:
      name: Lyd/video-kabelkontakttype (ende B)
      description: Spesifiserer den eksakte kontakten eller grensesnittet som finnes
        på den andre enden (Ende B) av kabelen.
    audio_bypass_type:
      name: Lyd bypass type
      description: Spesifiserer hvordan lydsignalet rutes når effekten er deaktivert
        (f.eks. true bypass, bufret, relé).
    audio_cassette_tape_type:
      name: Lydkassettbåndtype
      description: Spesifiserer IEC-båndformuleringen (bias) for lydkassetter.
    audio_codecs/formats_supported:
      name: Støttede Lydkodeker/formater
      description: Angir hvilke lydfiltyper et produkt kan spille av, for eksempel
        WAVE eller MP3.
    audio_component_form_factor:
      name: Lydkomponent formfaktor
      description: Definerer den fysiske stilen eller installasjonsformatet til komponenten.
    audio_connectivity:
      name: Lydtilkobling
      description: Angir hvilke typer lydtilkobling et produkt støtter, for eksempel
        HDMI eller USB.
    audio_conversion_direction:
      name: Retning for audiokonvertering
      description: Spesifiserer signalstrømmen konverteren støtter (f.eks. analog-til-digital,
        digital-til-analog, toveis).
    audio_converter_features:
      name: Lydkonverteringsfunksjoner
      description: Angir hovedfunksjonene til en lydomformer, for eksempel KI-drevet
        eller analog støtte.
    audio_d/a_converter_dac:
      name: D/A-konverter til lyd (Dac)
      description: Angir typen digital til analog (DAC)-omformer i lydenheter, f.eks.
        USB eller optisk.
    audio_duplex_capability:
