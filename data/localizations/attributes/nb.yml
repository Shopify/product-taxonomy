    sleeve_bearing_type:
      name: Hylselagertype
      description: Identifiserer teknologien som tillater ermerotasjon, noe som påvirker
        spinnkvaliteten for olympiske løft.
    sleeve_style:
      name: Ermestil
      description: Angir ermetypen utover lengden (f.eks. raglan).
    slide_board_accessories_included:
      name: Tilbehør til glidebrett inkludert
      description: Lister opp tilleggsvarer som følger med glidebrettet, slik at kundene
        vet nøyaktig hva som er inkludert og kan sammenligne pakker.
    slide_installation_type:
      name: Installasjonstype for sklie
      description: Hvordan sklien er ment å installeres eller monteres (frittstående,
        festet til et lekesett osv.).
    slide_intended_finger:
      name: Skyv den tiltenkte fingeren
      description: Angir hvilken finger sliden er ment å brukes på, eller om det ikke
        er aktuelt (for eksempel en tonebar).
    slide_safety_features:
      name: Sikkerhetsfunksjoner for sklie
      description: Sikkerhetsrelaterte designelementer inkludert på sklien.
    slide_type:
      name: Sleidetype
      description: Angir hvilke typer messing-glidemekanismer produktet er ment å
        rengjøre.
    slide_water_use_capability:
      name: Bruksfunksjonalitet i vannsklie
      description: Om sklien er designet for bruk med vann (f.eks. slangeforbindelse)
        og hvordan.
    slime_putty_kit_components_included:
      name: Slim- og kittkomponenter inkludert
      description: Viser en liste over verktøyene og tilleggene som følger med slim-/kittproduktet
        (spesielt for sett/pakker).
    sling_material:
      name: Materiale i slynge
      description: Angir fiberen/tekstilet som brukes i ekpressslyngen (hundebein).
    smith_machine_bar_path:
      name: Smith-maskinens stangbane
      description: Beskriver stangens faste bevegelsesbane, og informerer brukerne
