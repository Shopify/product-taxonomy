    pearl_luster_grade:
      name: Perleglans-grad
      description: Beskriver perleoverflatens glansgrad (kvalitativ vurdering).
    pearl_matching_level:
      name: Perlematchingsnivå
      description: Beskriver graden av match mellom perler i et parti basert på farge,
        størrelse og glans.
    pearl_shape:
      name: Perleform
      description: Den generelle formen på perlen.
    pearl_surface_condition:
      name: Overflatekvalitet på perle
      description: Beskriver overflatekvaliteten på perlen, basert på grad av flekker
        og ujevnheter.
    pearl_treatment:
      name: Perlebehandling
      description: Beskriver eventuell behandling som er utført på perlen for å endre
        farge eller utseende.
    pearl_type:
      name: Perletype
      description: Spesifiserer perletypen/opprinnelsen (f.eks. ferskvann, Akoya,
        Tahiti, Sørhavsperler) for løse perler.
    peat_level:
      name: Torvnivå
      description: Angir hvor sterk torvrøykpreget er i whiskyen (fra ikke-torvet
        til kraftig torvet).
    pedal_and_cleat_system_compatibility:
      name: Kompatibilitet med pedal- og klossystem
      description: Angir hvilke pedal- eller klosstandarder skimmet eller kilen er
        laget for å passe med, slik at kundene velger et produkt som passer til pedalene
        og skoene deres.
    pedal_configuration:
      name: Pedalkonfigurasjon
      description: Angir om stolen har én pedal, delte/uavhengige pedaler eller et
        konvertibelt design.
    pedal_mounting_style:
      name: Monteringsstil for pedal
      description: Beskriver hvordan pedalen eller pedaldekselet/-puten festes til
        kjøretøyet (installasjons-/festemetode).
    pedal_set_components:
      name: Pedalsettkomponenter
      description: Angir hvilke pedaler som er inkludert i settet.
    pedal_spindle_material:
      name: Pedalspindelmateriale
      description: Materialet i pedalaksel/spindel, som påvirker styrke, vekt og rustmotstand.
    pedal_spindle_thread_size:
      name: Pedalspindeltråd-størrelse
      description: Spesifiserer gjengestandarden på pedalspindelen som skrus inn i
        krankarmen.
    pedal_type:
      name: Pedaltype
      description: Beskriver typen pedaler som følger med sykkelen, og indikerer skokompatibilitet
        og kjørestil.
    pellet_accessory_type:
      name: Type pelletstilbehør
      description: Beskriver hvilken type pelletstilbehør det er, for raskt valg av
        bor, bandere eller stoppere til riggoppsett.
    pellet_grade:
      name: Kulekvalitet
      description: Indikerer produksjonspresisjonen eller ytelsesgraden til airsoft-kulene.
    pen_ink_color:
      name: Blekkfarge for penn
      description: Angir den faktiske blekkfargen som pennen skriver med, som kan
        avvike fra pennens ytre farge.
    penalty_card_accessories_included:
      name: Straffekort-tilbehør inkludert
      description: Angir hvilket ekstra dommerutstyr som er inkludert med kortsettet
        (f.eks. lommebok, poengkort, fløyte, mynt, etui).
    penalty_card_colors_included:
      name: Inkluderte farger på straffekort
      description: Beskriver hvilke farger straffekortene i settet har.
    penalty_flag_throw_distance:
      name: Kasteavstand for straffeflagg
      description: Designklassifisering som angir beregnet kasteavstand for flagget.
    pendant_cutter_safety_features:
      name: Sikkerhetsfunksjoner for anhengsskjærer
      description: Identifiserer innebygde sikkerhetsfunksjoner som reduserer risiko
        for utilsiktede kutt ved bæring eller bruk.
    pendant_cutter_wear_method:
      name: Slitasjemetode for anhengskjærer
      description: Angir hvordan anhengsskjæreren er ment å brukes.
    pepper_variety:
      name: Paprikavariant
      description: Spesifiserer hvilken peppertype eller art som brukes i produktet,
        slik at kunder kan skille mellom ulike smaksprofiler og styrkenivåer.
    percussion_case_style:
      name: Slagverksetui-stil
      description: Klassifiserer den overordnede stilen/konstruksjonen på etuiet (myk
        bag, hardt etui eller hybrid).
    percussion_instruments_included:
      name: Inkluderte rytmeinstrumenter
      description: Beskriver hvilke typer slagverksinstrumenter som er inkludert når
        produktet er et leketøyssett.
    percussion_mallet_handle_grip_style:
      name: Grepstil på håndtak for slagverkskølle
      description: Identifiserer typen grepbehandling på håndtaket (utover tekstur),
        som bart tre, lakkert, gummiert grep eller viklet grep.
    percussion_mallet_head_construction:
      name: Konstruksjon av kølleholdet for slagverk
      description: Beskriver klubbehodets konstruksjonsstil (f.eks. innpakket garn,
        filtinnpakket, gummi, råtreverk), som påvirker lyd og holdbarhet.
    perfumery_base_carrier_type:
      name: Beholdertype for parfymebase
      description: Spesifiserer beholder-/løsemiddelsystemet til en parfymebase (hva
        basen primært er laget av for fortynning og ytelse).
    perfumery_base_intended_application:
      name: Parfymebase – tiltenkt bruk
      description: Beskriver hvilket bruksformat basen er utviklet for, som spray
        eller roll-on.
    perfumery_ingredient_carrier_solvent:
      name: Bærestoff/løsemiddel for parfymeingrediens
      description: Angir hvilket løsnings- eller bæremiddel ingrediensen er oppløst
        i (f.eks. etanol, DPG, jojobaolje).
    perfumery_ingredient_form:
      name: Format på parfymeingrediens
      description: Beskriver den fysiske tilstanden til parfymeingrediensen slik den
        leveres.
    perfumery_ingredient_type:
      name: Type parfymeingrediens
      description: Beskriver kategori for parfymingrediens i parfymering (f.eks. eterisk
        olje, aromakjemikalie).
    perfumery_ingredient_usage_note:
      name: Bruksmerknad for parfymeingrediens
      description: Indikerer typisk rolle i en duftstruktur (toppen, midten/hjertet,
        basen), og erkjenner at materialer kan spenne over noter.
    perfumery_ingredients:
      name: Parfymeingredienser
      description: Viser hvilke typer forbruksbare parfymematerialer som er inkludert
        i settet (f.eks. eteriske oljer, duftoljer, alkoholbase).
    perfumery_note_position:
      name: Plassering i duftpyramiden
      description: Beskriver ingrediensens funksjon i duftpyramiden (topp, hjerte
        eller base).
    persimmon_variety:
      name: Kakiplomme-variant
      description: Beskriver kultivaren eller varianten av kaki, som kan påvirke konsistens,
        smak og bruk i matlaging.
    personalization_type:
      name: Tilpasningstype
      description: Angir om og hvordan produktet kan tilpasses for en hendelse (f.eks.
        monogram, navn/dato, fotoinnlegg).
    phonics_focus:
      name: Fokus på fonikk
      description: Angir hvilken fonikk- og ordlesingsferdighet leseleken er rettet
        mot.
    physalis_variety:
      name: Physalis-variant
      description: Beskriver hvilken botanisk art, kultivar eller vanlig physalisvariant
        som selges.
    pi_ata_filler_type_included:
      name: Piñata-fyllstofftype inkludert
      description: Spesifiserer hvilket fyll som er inkludert i produktet, dersom
        aktuelt.
    pi_ata_hanging_method:
      name: Hvordan piñataen henges opp
      description: Hvordan piñataen er designet for å henges opp eller støttes (løkke,
        krok, snor inkludert, osv.).
    pi_ata_opening_type:
      name: Piñata-åpningstype
      description: Hvordan fyllåpningen nås/lukkes (klaff, borrelås, glidelås, forhåndsforseglet
        osv.).
    piccolo_key_system:
      name: Klaffesystem for piccolofløyte
      description: Identifiserer klaffesystemet/-designet som brukes på pikkoloen
        (vanligvis Boehm-systemet for moderne pikkoloer).
    piccolo_keywork_features:
      name: Klaffefunksjoner for pikkolo
      description: Spesifiserer klaffemekanikk og eventuelle ekstra funksjoner på
        piccolofløyten.
    pick_grip_aid:
      name: Forbedret plektergrep
      description: Beskriver hvilken innebygd grepstruktur plekteret har (hull, preging
        eller gummiinnlegg).
    pickleball_construction_type:
      name: Konstruksjonstype for pickleball
      description: Produksjonskonstruksjonen av ballen, for eksempel sømløs ett stykke
        eller sveiset todelt, noe som påvirker holdbarhet og flyvekonsistens.
    pickling_method:
      name: Syltemetode
      description: Spesifiserer hvilket konserveringsmedium eller hvilken metode som
        brukes ved sylting, som eddiklake eller melkesyregjæring.
    pickup_and_preamp_configuration:
      name: Konfigurasjon for pickup og forforsterker
      description: Angir om bratsjen har innebygd pickup og/eller aktiv forforsterker
        for forsterket fremføring eller opptak.
    pickup_configuration:
      name: Konfigurasjon for pickup
      description: Beskriver det generelle pickup-layoutet til en elektrisk gitar
        ved hjelp av vanlige forkortelser (f.eks. SSS, HSS, HH).
    pickup_cover_material:
      name: Dekselmateriale for pickup
      description: Spesifiserer hovedmaterialet i pickupdekselet (hvis det finnes),
        inkludert vanlige metallbelegg dersom dette er spesifisert av produsenten.
    pickup_cover_type:
      name: Type pickupdeksel
      description: Spesifiserer om en elektrisk gitar-pickup har deksel, og hvilket
        materiale eller stil dekselet har (f.eks. metall eller plast).
    pickup_string_spacing:
      name: Strengeavstand på pickup
      description: Spesifiserer standarden for pol-/strengavstand som pickupen er
        laget for (f.eks. Fender/F-spaced vs Gibson/standard), som påvirker innretting
        på gitarer med tremolo.
    pie_crust_type:
      name: Type paideig
      description: Angir bunnstilen eller -typen som brukes til paien eller terten,
        for eksempel sprø butterdeig, grahamkjeks eller glutenfri bunn.
    piece_configuration:
      name: Deloppsett
      description: Angir hvor mange separate deler køen, skaftet eller broen består
        av, noe som påvirker bærbarhet og spillestil.
    pillow_form_size:
      name: Puteformstørrelse
      description: Standardisert ferdig størrelsesbetegnelse for puteformer/-innlegg
