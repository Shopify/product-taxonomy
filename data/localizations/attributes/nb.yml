    abacus_bead_material:
      name: Materiale i kuler i kuleramme
      description: Hovedmaterialet i kuleramme-kulene.
    abec_rating:
      name: ABEC-vurdering
      description: Angir presisjonsgraden til lagrene basert på ABEC-klassifiseringer,
