      name: Shapespå akustiske gitarer
      description: Beskriver Shapes/omrisset på den akustiske gitaren, som påvirker
        tone, komfort og typisk bruk.
    acoustic_guitar_string_core_design:
      name: Kjernedesign for akustisk gitarstreng
      description: Kjernekonstruksjonen av sårets styrke.
    acoustic_piano_key_material:
      name: Nøkkelmateriale for akustisk piano
      description: Angir hvilket hovedmateriale som er brukt i pianoets tangentoverflater.
    acoustic_piano_lid_type:
      name: Lokk av akustisk piano
      description: Angir stilen på lokk-/dekselmekanismen som brukes på det akustiske
        pianoet (for forskjeller mellom flygel/oppreist fallbrett/topplokk).
    acoustic_piano_plate_frame_material:
      name: Akustisk pianoplate/Frame
      description: Angir hovedmaterialet til pianoplaten/Frame (harpe), vanligvis
        støpejern.
    acoustic_piano_soundboard_material:
      name: Materiale for lydplate til akustisk piano
      description: Angir hovedmaterialet som brukes til pianoets klangbunn.
    action_figure_scale:
      name: Actionfigur skala
      description: Angir kollektorens skalaforhold (f.eks. 1:12) som tilbehøret er
