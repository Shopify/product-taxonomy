      description: Viktige funksjonelle/sikkerhetsmessige egenskaper ved badefargestifter.
    bath_squirter_spray_pattern:
      name: Badesprayer spraymønster
      description: Beskriver hvordan badekarspruten dispenserer vann (utgangsmønsteret)
        når den klemmes eller aktiveres.
    bath_toy_molded_drain_design:
      name: Badeleke med støpt avløpsdesign
      description: Angir om leketøyet er designet for å dreneres/tørke for å redusere
        vannforbruk.
    bath_toy_water_play_function:
      name: Funksjonsfor badeleke med vannlek
      description: Identifiserer leketøyets primære mekanisme for vanninteraksjon/leke.
    baton_size_standard:
      name: Batongstørrelse standard
      description: Konkurransestørrelsesklassifisering av stafettpinnen (junior eller
        senior).
    battery_case_certification_standard:
      name: Batteri eske-sertifisering/standard
      description: Lister opp relevante transport-/sikkerhetssertifiseringer eller
        teststandarder som eske overholder for batteritransport/-lagring.
    battery_case_interior_padding_material:
      name: Batterieske indre utfyllingsmateriale
      description: Spesifiserer det primære polstrings-/fôrmaterialet som brukes på
        innsiden av esken (hvis aktuelt).
    battery_configuration:
      name: Batterikonfigurasjon
      description: Indikerer den fysiske layouten/formen (formfaktor) slik at brukerne
        kan matche batteriet til den begrensede plassen i spesifikke Airsoft-replikaer.
    battery_group_size:
      name: Batterigruppestørrelse
      description: Standardisert batterieskestørrelse (f.eks. BCI gruppe 24F, H6)
        som brukes til montering i mange kjøretøy.
    battery_polarity:
      name: Batteripolaritet
      description: Angir polariteten/retningen terminal (positiv terminal ), som er
        en viktig begrensning for montering av mange bil- og motorsportbatterier.
    battery_standards_supported:
      name: Støttede batteristandarder
      description: Angir batteriklassifiseringsstandardene testeren støtter ved testing
        av startytelse eller helse.
    battery_voltage_class:
      name: Batterispenningsklasse
      description: Vanlig spenningssystemklasse for elbilbatterier, brukt for rask
        filtrering (f.eks. 400V vs. 800V-systemer).
    batting_cage_components_included:
      name: Inkluderte deler i sikkerhetsbur til baseballslag
      description: Lister opp de enkelte delene som følger med produktet, slik at
        kjøperen kan bekrefte om et komplett system eller spesifikke reservedeler
        er inkludert.
    batting_helmet_accessories_included:
      name: Tilbehør til slaghjelm inkludert
      description: Viser opp beskyttelses- eller kosmetisk tilbehørspakke som følger
        med slaghjelmen.
    batting_stuffing_form_factor:
      name: Formfaktor for vatt og fylling
      description: Identifiserer om produktet selges som løst fyll, ark, ruller, forhåndskuttede
        biter eller formede former.
    batting_stuffing_loft_level:
      name: Batting og fylling loftsnivå
      description: Angir loften/tykkelsen på vatt eller fyll (relativ luftighet/høyde),
        vanligvis brukt ved valg av quilting og polstring.
    batting_stuffing_thermal_insulation_level:
      name: Varmeisolasjonsnivå for vatt og fylling
      description: Relativ varme/isolasjon i motsetning til vatt brukt i dyner, jakker
        og tepper.
    batting_tee_base_design:
      name: Design på basen til slagstativet
      description: Beskriver stilen eller konstruksjonen til tee-basen, som påvirker
        stabiliteten og hvilke typer spilleflater den passer til.
    battle_top_arena_stadium_compatibility:
      name: Kompatibilitet mellom arenaer/stadioner på toppnivå
      description: Angir hvilket arena-/stadionsystem produktet er designet for bruk
        med (spesielt for kulisser eller spesielle former).
    battle_top_items_included:
      name: Kamptopp inkludert
      description: Angir hvilke deler til kamptopp som er inkludert i pakken (f.eks.
        topp, utskyter, stadion/arena, utløsersnor, reservedeler).
    battle_top_performance_type:
      name: Ytelsestype for kamp-snurretopp
      description: Beskriver den generelle ytelsesstilen til kamptoppen, som vanligvis
        gjenspeiler hvordan den oppfører seg i arenaen (aggressiv vs. utholdenhetsfokusert,
        osv.).
    bayan_included_accessories:
      name: Inkludert tilbehør fra Bayan
      description: Tilbehør følger med bayanen (i esken).
    bayan_tuning_system_type:
      name: Bayan-tuningssystemtype
      description: Hvordan bayanen er strammet/innstilt (konstruksjonsstil), som påvirker
        bærbarhet og enkel justering.
    bb_gun_action_type:
      name: BB-våpenaksjonstype
      description: Indikerer den mekaniske ladningen eller syklingsmekanismen til
        luftgeværet (f.eks. spakmekanisme, pumpe, bryteløp).
    bb_gun_caliber:
      name: BB-pistolens kaliber
      description: Definerer diameteren på kulene som våpenet er designet for å skyte,
        og sikrer ammunisjonskompatibilitet.
    bb_gun_part_type:
      name: Type BB-pistoldel
      description: Klassifiserer den spesifikke komponenten eller tilbehøret som er
        designet for luftgevær, slik at kunden raskt kan finne den nøyaktige erstatnings-,
        oppgrader- eller tilleggsprogramdelen (f.eks. løp, stempeltetning, speedloader).
    beach_ball_features:
      name: Funksjoner på strandball
      description: Merkbare funksjonelle funksjoner som er spesifikke for strandballer.
    beach_bucket_features:
      name: Funksjoner i strandbøtte
      description: Funksjonelle egenskaper ved strandbøttehatten som påvirker bruk,
        holdbarhet og bekvemmelighet.
    beach_sand_toy_items_included:
      name: Strand- og sandleker inkludert
      description: Ekstra strand-/sandlekedeler følger med bøtta (hvis solgt som et
        sett).
    bead_breaker_type:
      name: Perlebrytertype
      description: Type/utforming av perlebrytermekanismen.
    bead_hole_style:
      name: Perlehullstil
      description: Angir stilen eller konfigurasjonen til hullet/sporet i perlen,
        som påvirker hvordan den sitter på kroken eller snøret.
    bead_type:
      name: Perletype
      description: Primær perletype(r) som kreves av mønsteret.
    bead_type_patch_embellishment:
      name: Perletype (lapputsmykning)
      description: Primærtype perler som brukes på lappeoverflaten.
    beaded_accessory_project_type:
      name: Prosjekttype for perletilbehør
      description: Hvilket tilbehør mønsteret lager.
    beading_needle_flexibility:
      name: Fleksibilitet i perlenålen
      description: Nåleskaftets relative fleksibilitet for å navigere i trange perlebroderier.
    beading_pattern_bead_size:
      name: Perlemønster perlestørrelse
      description: Anbefalt(e) perlestørrelse(r) spesifisert av mønsteret (vanligvis
        størrelse på rokkeperler, f.eks. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Format for diagram for perlemønster
      description: Hvordan mønsteret er representert visuelt (f.eks. grafisk kontra
        trinnvise bilder).
    beading_pattern_stitch_technique:
      name: Perlemønstersting/-teknikk
      description: Primær perlevevingssøm eller -teknikk som brukes i mønsteret.
    beading_technique_stitch:
      name: Perleteknikk/søm
      description: Identifiserer den primære perleteknikken eller -stingen som brukes
        i mønsteret (f.eks. peyotesting, mursteinsting).
    beading_thread_fiber_type:
      name: Perletråd fibertype
      description: Spesifiserer fiber-/materialundertypen av perletråd (mer spesifikt
        enn generisk materiale) som er relevant for ytelse.
    beading_thread_size:
      name: Gjengestørrelse for perler
      description: Indikerer produsent-/industristørrelse-merking som brukes for perle-tråd
        (merkevare/linjespesifikk), for eksempel størrelse D eller 00.
    beading_thread_use_case:
      name: Perletråd brukseske
      description: Identifiserer den primære anbefalte bruken av perletråden, og hjelper
        kundene med å velge riktig produkt til prosjektet sitt.
    beading_wire_coating_material:
      name: Beleggmateriale for perletråd
      description: Spesifiserer det ytre beleggmaterialet på perletråden (hvis aktuelt),
        som påvirker følelse, holdbarhet og knekkmotstand.
    beading_wire_strand_count:
      name: Antall tråder i perletråd
      description: Angir antall tråder i flertrådet perletråd (f.eks. 7-trådet, 19-trådet,
        49-trådet), som påvirker fleksibilitet og drapering.
    beadlock_type:
      name: Beadlock-type
      description: Angir om hjulet er beadlock og hvilken stil (hjelper med offroad-/UTV-kjøpere).
    beam_material:
      name: Materiale i bjelke
      description: Primærmaterialet til bjelken/stangen (ofte forskjellig fra hodene/festene).
    beam_pattern:
      name: Strålemønster
      description: Fordelingsmønster for lysutbyttet som brukes til kjøre-/terrengbelysning.
    bean_bag_fabric_material:
      name: Stoffmateriale for bønneposer
      description: Identifiserer ytterstoffet som brukes til saccosekkene. Leveres
        med settet.
    bean_paste_variety:
      name: Bønnepasta-variant
      description: Klassifiserer den spesifikke bønnepastatypen basert på produksjonsstil
        eller hovedingrediens.
    bean_preparation:
      name: Bønnetilberedning
      description: Angir hvordan bønnene tilberedes eller bearbeides før salg (f.eks.
        hele belger, skallet, hakket, spiret).
    bean_variety:
      name: Bønnevariant
      description: Angir den botaniske eller merkede varianten av bønnene (f.eks.
        grønne bønner, edamamebønner, yardlange bønner).
    beanie_style:
      name: Lue-stil
      description: Spesifiserer luens overordnede design, konstruksjon eller silhuett,
        slik at kunden raskt kan velge mellom vanlige varianter.
    bearing_clearance:
      name: Lageropphørssalg
      description: Angir lagerets indre radielle ophørsalg-klasse (mengde indre slakk);
        klasse C0 kalles også CN eller normal ophørsalg.
    bearing_construction_type:
      name: Konstruksjonstype for kulelager
      description: Identifiserer lagerdesignet eller konstruksjonsstilen som brukes
        i navet (f.eks. kassett, løs kule).
    bearing_edge_type:
      name: Lagerkanttype
      description: Type/profil av skallbærekanten, som påvirker angrep og opprettholdelse.
    bearing_lubrication:
      name: Lagersmøring
      description: Angir hvilken type smøremiddel som ble brukt på lageret under produksjonen,
        for eksempel fett eller olje.
    bearing_material:
      name: Materiale i kulelager
      description: Identifiserer lagerkonstruksjonsmaterialet (f.eks. stål, keramisk
        hybrid), og hjelper syklister med å velge mellom holdbarhet, kostnad og ytelse.
    bearing_rating:
      name: Lagerklassifisering
      description: Angir lagertoleransen eller ytelsesklassen som brukes i skøytene
        (f.eks. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Forseglingskode for kulelager
      description: Angir tetningstypen som brukes på lageret, noe som påvirker holdbarhet
        og rullemotstand.
    bearing_seal_type:
      name: Forseglingstype for kulelager
      description: Spesifiserer tetnings- eller skjermingsdesignet som beskytter lagerets
        indre deler mot forurensninger og påvirker luftmotstanden (f.eks. 2RS, ZZ,
        LLU, åpen).
    bearing_shield_type:
      name: Lagerskjoldtype
      description: Stil av skjerming eller tetting som beskytter lagerets indre deler.
    bearing_size_code:
      name: Lagerstørrelseskode
      description: Standardisert lagerbetegnelse (f.eks. 608, 688) som kombinerer
        indre, ytre diameter og bredde.
    bearing_type:
      name: Lagertype
      description: Angir konstruksjonsstilen til lagrene som brukes i styrelageret.
    beater_head_material:
      name: Materiale i vispehode
      description: Spesifiserer kontakt-/skinnmaterialet til en basstrommebeater (f.eks.
        filt, tre, gummi).
    beaters_included:
      name: Visper inkludert
      description: Angir hvor mange visper som er inkludert/installert med trommepedalen
        (f.eks. enkelt- eller dobbeltvisp), eller om ingen visp er inkludert.
    bed_base_type:
      name: Type sengebase
      description: Definerer den strukturelle stilen til sengen eller divanbunnen
        (f.eks. plattformtopp, fjærende lameller, justerbar).
    bed_storage_type:
      name: Lagringstype for seng
      description: Definerer den integrerte oppbevaringsmekanismen til rammen.
    bedroom_furniture_items_included:
      name: Inkluderte soveromsmøbler
      description: Spesifiserer enkeltmøblene som følger med i soveromssettet (f.eks.
        seng, kommode, nattbord), slik at kunden raskt kan se hva som er inkludert
        uten å lese lange beskrivelser.
    bedroom_vanity_items_included:
      name: Soveromsservant inkludert
      description: Lister opp enkeltpersonvare. Leveres med et servantskap til soverommet,
        slik at kundene vet nøyaktig hva som leveres (f.eks. speil, krakk, belysningssett).
    beer_based_cocktail_variety:
      name: Ølbasert cocktailvariant
      description: Klassifiserer ølbaserte cocktailer etter deres spesifikke variant,
        f.eks. Radler, Shandy, Michelada.
    beet_variety:
      name: Betevariant
      description: Spesifiserer kultivar eller variant av rødbeter, noe som hjelper
        kunden med å identifisere smak, farge og kulinariske bruksområder (f.eks.
        rød, golden, chioggia).
    bell_actuation_mechanism:
      name: Bjellemekanisme
      description: Angir brukerhandlingen som kreves for å ringe på klokken, og hjelper
        kunden med å velge foretrukket ergonomi.
    bell_guard_coverage_area:
      name: Dekningsområde for klokkevakt
      description: Angir hvilken del av klokken beskyttelsen er designet for å beskytte.
    bell_material:
      name: Bjellemateriale
      description: Materiale i klokkekomponenten (hvis spesifisert separat fra det
        totale instrumentmaterialet).
    bellhousing_bolt_pattern:
      name: Boltmønster for klokkehus
      description: Angir standarden eller mønsterfamilien for boltmønster på klokkehuset/motorsiden
        som girkassen bruker.
    bellows_material:
      name: Belgmateriale
      description: Materiale i belgkropp/-deksel (hvis inkludert).
    bellows_orientation:
      name: Belgorientering
      description: Angir belgkonfigurasjonen som brukes til levering av luft til rørene.
    belly_panel_style:
      name: Magepanelstil
      description: Beskriver konstruksjonen av linningen eller magepanelet som gir
        plass til en voksende mage.
    belt_buckle_type:
      name: Beltespennetype
      description: Beskriver den spesifikke spennemekanismen eller designet som brukes
        på beltet.
    beret_style:
      name: Beret-stil
      description: Identifiserer det spesifikke beretdesignet eller den kulturelle
        variant.
    berry_species:
      name: Bærarter
      description: Angir hvilken bærart produktet inneholder, slik at kunden raskt
        kan filtrere etter ønsket bær.
    beta_casein_variant:
      name: Beta-kaseinvariant
      description: Spesifiserer hvilken beta- variant (f.eks. A2) som finnes i melken
        for forbrukere med bekymringer om fordøyelighet.
    beverage_sweetness_level:
      name: Drikkevares søthetsnivå
      description: Klassifiserer drikken etter grad av tilsatt søthet eller sukker.
    bezel_graduation_units:
      name: Bezel-graderingsenheter
      description: Angir enhetsmarkeringene på den roterende rammen (grader, mil eller
        dobbel skala).
    bicycle_brake_set_components_included:
      name: Komponenter for sykkelbremsesett inkludert
      description: Lister opp de enkelte delene som leveres i settet, slik at kundene
        vet nøyaktig hva som er inkludert og kan sammenligne forskjellige pakkekonfigurasjoner.
    bicycle_cage_mounting_position:
      name: Monteringsposisjon for sykkelbur
      description: Angir hvor på sykkelen buret er designet for å bli installert.
    bicycle_computer_mount_placement:
      name: Sykkelcomputer festeplassering
      description: Identifiserer hvor på sykkelen datamaskinfestet monteres, for eksempel
        foran på styret eller på toppdekselet på styrestemmet.
    bicycle_folding_mechanism:
      name: Sykkelens foldemekanisme
      description: Angir det mekaniske foldesystemet som brukes på rammen (f.eks.
        halv folding, vertikal folding).
    bicycle_frame_design:
      name: Sykkelens rammedesign
      description: Spesifiserer den totale stilen til en sykkelramme, som påvirker
        tilgjengelighet, lastekapasitet og lagring.
    bicycle_frame_style:
      name: Sykkelens rammestil
      description: Beskriver den strukturelle stilen på rammen (step-through, lowrider,
        chopper stretch osv.) som påvirker førerens holdning og estetikk.
    bicycle_handlebar_type:
      name: Type håndtak på sykkelstyre
      description: Identifiserer den spesifikke styrestilen eller geometrien, og hjelper
        syklister med å velge et styre som passer deres kjørestilling og disiplin.
    bicycle_headset_configuration:
      name: Konfigurasjon av sykkelstyrehodesett
      description: Angir den strukturelle stilen eller standarden til sykkelstyreenheten
        i henhold til kopparrangementet (f.eks. ekstern kopp, ZeroStack, integrert,
        tråd).
    bicycle_hub_type:
      name: Type sykkelnav
      description: Beskriver navmekanismen som leveres med hjulet, og som påvirker
        drivverkets kompatibilitet og kjørestil.
    bicycle_lock_security_certification:
      name: Sikkerhetssertifisering for sykkellåser
      description: Uavhengig tredjepartssertifisering som validerer tyverisikring
        (f.eks. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Sykkelpedaltype
      description: Spesifiserer den generelle driftsstilen eller designet til pedalen,
        for eksempel plattform, klikkløs variant eller hybrider, og hjelper syklister
        med å velge riktig grensesnitt for sin kjørestil.
    bicycle_propulsion_type:
      name: Fremdriftstype for sykkel
      description: Angir hvordan sykkelen drives, for eksempel manuell tråkking, elektrisk
        assistanse eller forbrenningskraft.
    bicycle_pump_type:
      name: Type sykkelpumpe
      description: Identifiserer pumpens strukturelle stil, og hjelper kundene med
        å velge designet som passer best til deres behov for kjøring, oppbevaring
        eller nødstilfeller.
    bicycle_rack_mounting_type:
      name: Monteringstype for sykkelsnelle
      description: Beskriver den primære metoden eller lokaliseringen som brukes for
        å feste hjulet til sykkelen, og hjelper brukere med å bekrefte kompatibilitet
        med rammen og maskinvaren.
    bicycle_suspension_type:
      name: Type sykkelfjæring
      description: Identifiserer tilstedeværelsen og konfigurasjonen av fjæring på
        sykkelen.
    bicycle_tire_tread_pattern:
      name: Sykkeldekkmønster
      description: Angir dekkets slitebanestil, Influence veigrep og rullemotstand
        på forskjellige underlag.
    bidirectional_charging_capability:
      name: Toveis Charge funksjonalitet
      description: Angir om elbilen støtter toveis Charge Mode for eksempel V2G og/eller
        V2H.
    bike_rack_mounting_style:
      name: Monteringsstil for sykkelstativ
      description: Hvordan sykkelen støttes/sikres av reolen.
    bike_rack_tilt_function:
      name: Vippefunksjon for sykkelstativ
      description: Om/hvilke Functions finnes for å få tilgang til bakre bagasjerom
        mens spolen er installert.
    bikini_top_style:
      name: Bikini-topp-stil
      description: Spesifiserer designet eller snittet på bikinitoppdelen, og hjelper
        kunden med å finne foretrukne passformer og silhuetter.
    billiard_brush_type:
      name: Biljardbørstetype
      description: Definerer den spesifikke stilen til rengjøringsverktøyet for biljardbord
        (f.eks. bordbørste, skinnebørste, nappingskloss).
    billiard_glove_finger_coverage:
      name: Biljardhanske fingerbeskyttelse
      description: Identifiserer hvilke fingre som dekkes av hanskedesignet, og gir
        presis filtrering for biljardspesifikke hanskestiler.
    billiard_pocket_style:
      name: Lommestil for biljard
      description: Angir den strukturelle eller estetiske stilen til lommen, som Impact
        kompatibilitet og borddekor.
    billiard_rack_style:
      name: Biljard-reol-stil
      description: Beskriver den fysiske stilen eller mekanismen til rullen (f.eks.
        tradisjonell Frame, vanlig ark, sammenleggbar).
    billiard_table_type:
      name: Biljardbordtype
      description: Angir hvilken biljardsportdisiplin eller bruksstil bordet er designet
        for (f.eks. biljard, snooker, carom).
    billiards_discipline:
      name: Biljarddisiplin
      description: Angir den spesifikke bilsportvarianten (spilltypen) som produktet
        er beregnet for eller kompatibelt med.
    binding_compatibility_standard:
      name: Standard for bindingskompatibilitet
      description: Identifiserer bindingsgrensesnittet (eneste norm) skistøvelen er
        sertifisert for, og sikrer sikker og korrekt paring med skibindinger.
    binding_inclusion:
      name: Bindende inkludering
      description: Angir om skiene selges flate, med et integrert system eller med
        separate bindinger inkludert.
    binding_interface:
      name: Bindende grensesnitt
      description: Angir bindingsplaten eller grensesnittstandarden skiene er forhåndsmontert
        med eller kompatible med, noe som sikrer kompatibilitet mellom støvel/binding.
    binding_liner_type:
      name: Innbindingslinertype
      description: Beskriver typen innerfôr som brukes i bindingen/støvelen (f.eks.
        avtakbar, gangbar, varmestøpbar).
    binding_mounting_system:
      name: Bindende monteringssystem
      description: Identifiserer grensesnittet som brukes til å feste bindingen til
        skien (flat mount, rail/spor, plate osv.).
    binding_position:
      name: Bindeposisjon
      description: Angir den tiltenkte monteringsposisjonen eller konfigurasjonen
        for bindingen (f.eks. forstøvel, bakstøvel, ARTP).
    binding_strap_position:
      name: Plassering av bindestropp
      description: Angir hvor på bindingen stroppen skal monteres.
    bingo_components_included:
      name: Inklduerte bingodeler
      description: Viser komponentene som følger med bingosettet, for eksempel bingokuler,
        kort og tusjer.
    bingo_number_range:
      name: Bingo-nummerrekkevidde
      description: Identifiserer bingotallområdet/variant som støttes av settet.
    bingo_set_features:
      name: Funksjoner i bingosettet
      description: Identifiserer det primære produktformatet til bingosettet (fysisk/manuell
        vs. elektronisk/interaktiv).
    bipod_mounting_interface:
      name: Grensesnitt for montering av tofot
      description: Angir festegrensesnittet som brukes til å koble tofoten til skytevåpenet
        eller skinnesystemet.
    bit_attachment_type:
      name: Festetype for bits
      description: Angir hvordan hodestativet kobles til bittet (f.eks. bindeender,
        spenneender, Chicago-skrueender).
    bit_mouthpiece_design:
      name: Utforming av bitmunnstykke
      description: Identifiserer munnstykkets strukturelle stil eller leddkonfigurasjon,
        som styrer trykkfordeling, ganeåpning og generell alvorlighetsgrad.
    bit_ring_style:
      name: Bitringstil
      description: Definerer stilen på bittets kinn eller ring som festes til hodelaget,
        påvirker sideveis føring og tøylefølelse.
    bladder_material:
      name: Blæremateriale
      description: Identifiserer materialet som brukes til den indre blæren som holder
        luft.
    blade_attachment_type:
      name: Festetype for blad
      description: Identifiserer om skøyten bruker en klappmekanisme (hengslet) eller
        et fast bladfeste.
    blade_finish_coating:
      name: Bladfinish/belegg
      description: Overflatebehandling påføres bladet for estetikk eller korrosjonsbeskyttelse.
    blade_hosel_type:
      name: Blad slangetype
      description: Angir forbindelsesstilen til bladets slange som passer inn i skaftet,
        noe som påvirker kompatibiliteten (f.eks. standard eller konisk).
    blade_length_type:
      name: Type bladlengde
      description: Klassifiserer finnens bladlengde som kort, middels eller lang,
        som påvirker sparkekadens og treningsmål.
    blade_lie:
      name: Bladløgn
      description: Angir liggenummeret til hockeykøllebladet, som indikerer hvordan
        bladet sitter på isen i forhold til skaftet.
    blade_sharpness:
      name: Bladskarphet
      description: Angir om våpenets egg er skjerpet eller sløv for trening.
    blade_size_category:
      name: Kategori for bladstørrelse
      description: Standardisert internasjonal kode for sabelbladstørrelse (0–5) som
        brukes til å skille mellom ungdoms- og voksenblad.
    blade_size_class:
      name: Bladstørrelsesklasse
      description: Klassifiserer bladet etter spillerstørrelseskonvensjon, og matcher
        skaftstørrelse som Ungdom, Junior, Intermediate eller Senior.
    blade_size_number:
      name: Bladstørrelsesnummer
      description: Standard numerisk størrelseskode (0–5) definert av gjerdeforskrifter
        som bestemmer bladlengde og kvalifisering for aldersgruppe.
    blaster_mechanism:
      name: Blastermekanisme
      description: Definerer den interne driftsmekanismen til gelblasteren (f.eks.
        GBB, AEG, fjær).
    block_edge_style:
      name: Blokkkantstil
      description: Beskriver hvordan kantene/hjørnene på treklossene er ferdigbehandlet
        for følelse og sikkerhet.
    blocking_mat_features:
      name: Funksjoner i blokkeringsmatte
      description: Funksjonelle funksjoner spesifikke for blokkeringsmatter (oppbevaring,
        bærbarhet, brukervennlighet).
    blocking_mat_grid_unit:
      name: Blokkerende matteenhet
      description: Enhetssystemet som brukes på det utskrevne kant, som hjelper brukere
        med å matche mønstre og mål.
    blocking_mat_surface_markings:
      name: Blokkerende markeringer på matteoverflaten
      description: Type måle-/veiledningsmarkeringer trykt eller støpt inn i matteoverflaten.
    blocking_wire_coating:
      name: Blokkerende ledningsbelegg
      description: Overflatebehandling/belegg på blokkeringstråden som påvirker rustmotstand,
        glatthet og risiko for at den setter seg fast.
    blocking_wire_end_cap_type:
      name: Endehette for blokkeringstråd
      description: Spesifiserer typen endebeskyttelse/finish som brukes på blokkerende
        trådender for sikkerhet og stoffbeskyttelse.
    blocking_wire_set_includes:
      name: Sett med blokkeringstråd inkluderer
      description: Spesifiserer hvilke komponenter som er inkludert i blokkeringstrådproduktet
        (f.eks. T-pinne, oppbevaringsrør).
    blocking_wire_usage:
      name: Blokkering av ledningsbruk
      description: Primærbruk eske den fleksible blokkeringstråden er designet for.
    bloom_stage:
      name: Blomstringsstadiet
      description: Angir hvor åpne tusenfrydblomstene er ved levering/forsendelse.
    blower_motor_bearing_type:
      name: Lagertype for viftemotor
      description: Spesifiserer lagerkonstruksjonen som brukes i viftemotoren.
    blower_motor_mounting_position:
      name: Monteringsposisjon for viftemotor
      description: Der viftemotoren er installert i HVAC- Modules/kjøretøyet (f.eks.
        foran, bak).
    blowpipe_valve_type:
      name: Blåserørsventiltype
      description: Angir hvilken type blåserørsventil som er inkludert (hvis noen).
    bo_staff_style:
      name: Bostaff-stil
      description: Definerer staffens strukturelle stil eller konstruksjon (f.eks.
        rett, konisk, skumpolstret, sammenleggbar).
    board_game_theme:
      name: Brettspilltema
      description: Narrative/innstillende tema for brettspillet (brukes til å oppdage
        og bla gjennom).
    board_rail_shape:
      name: Former på brettskinne
      description: Angir konturen til brettets skinner (f.eks. myk, hard, 50/50) som
        påvirker hold og drive på en bølge.
    board_size_classification:
      name: Klassifisering av brettstørrelse
      description: Klassifiserer cornhole-platen eller settet i vanlig standardisert
        størrelse.
    board_type_compatibility:
      name: Kompatibilitet med korttyper
      description: Angir hvilken type brett båndet er designet for.
    boat_construction_type:
      name: Konstruksjonstype for båt
      description: Beskriver den strukturelle stilen eller formatet til robåten (f.eks.
        oppblåsbar, stiv).
    boat_hook_flotation:
      name: Båtkrok flytekraft
      description: Angir om båtkroken er konstruert for å flyte hvis den mistes i
        vann.
    boat_ladder_stowage_style:
      name: Oppbevaringsstil for båtstige
      description: Beskriver hvordan stigen fungerer når den ikke er i bruk (f.eks.
        sammenleggbar, uttrekkbar, avtakbar).
    boat_trailer_construction_type:
      name: Konstruksjonstype for båthenger
      description: Angir om tilhengeren støtter båten med køyer, ruller eller et hybridsystem.
    boat_weaving_shuttle_weft_exit_type:
      name: Båtveving skyttelvev utgangstype
      description: Hvordan veftgarnet kommer ut av skyttelen under veving.
    bobbin_loading_type:
      name: Spoleinnlastingstype
      description: Angir hvordan spolen settes inn/lastes inn i symaskinen.
    bobbin_system:
      name: Spolesystem
      description: Spoleinnlastingssystemet/typen som brukes av symaskinen.
    bobbin_type:
      name: Spoletype
      description: Angir garntransportørformatet som skyttelbussen er designet for
        å bruke (eller inkluderer), som bestemmer kompatibilitet og typisk bruk (f.eks.
        bruker båtskyttelbusser ofte spoler; filleskyttelbusser kan være åpne for
        strimler).
    bobbin_winder_winding_direction:
      name: Spoleretning for spolevikler
      description: Angir viklings-/rotasjonsretningen som støttes av spolevikleren.
    bobble_mechanism:
      name: Bobble-mekanisme
      description: Spesifiserer bobblemekanismens stil, som påvirker bevegelse og
        holdbarhet.
    bocal_material:
      name: Materiale i krok
      description: Spesifiserer materialet i inkluderte bok(ler).
    bodhr_n_head_material:
      name: Materiale for bodhránhode
      description: Materialet i spillehodet (membranen), som i stor grad påvirker
        tone og vedlikeholdskrav.
    bodhr_n_tuning_system_type:
      name: Type tuningsystem for bodhrán
      description: Stilen til innebygd tuningmekanisme som brukes til å justere hodespenningen
        (hvis justerbar).
    body_armor_coverage_area:
      name: Dekningsområde for kroppspansring
      description: Angir hvilke kroppssoner produktet beskytter.
    body_armor_intended_use:
      name: Tiltenkt bruk av kroppspansring
      description: Angir det primære kjøre- eller bruksscenarioet som ATV/UTV-kroppspanseringen
        er designet for.
    body_cord_connector_style:
      name: Kroppsledning kobling stil
      description: Beskriver koblingskonfigurasjonen ved snorendene (f.eks. antall
        pigger eller bajonettstil) som avgjør kompatibilitet med våpen og poengbokser.
    body_panel_finish_state:
      name: Karosseripanelets ferdige tilstand
      description: Beskriver kvartalpanelets tilstand av overflateforberedelse/finish
        for maling/installasjon ved salg.
    body_shape:
      name: Kroppsform
      description: Angir den generelle formen/stilen til den elektriske gitaren.
    bodysuit_bottom_coverage:
      name: Bodysuit-bunndekning
      description: Definerer snitt og dekning av bodyens nederste del, komfort og
        påvirkning.
    boilie_shape:
      name: Boilie-former
      description: Identifiserer former på boilies produsert av rullebordet, slik
        at sportsfiskere kan velge mellom forskjellige agnprofiler.
    boilie_stop_buoyancy:
      name: Boilie-stopp oppdrift
      description: Angir om boilie-stoppen er designet for å flyte, synke eller forbli
        nøytralt oppdriftsdyktig, noe som påvirker agnets presentasjon i vannkolonnen.
    bok_choy_variety:
      name: Bok choy-variant
      description: Angir kultivar, merket navn eller variant av bok choy (f.eks. Baby,
        Shanghai, Nai Bai, Tatsoi, lilla Lady), slik at kunden kan velge ønsket smak,
        størrelse og utseende.
    bolt_drive_style:
      name: Boltdriftsstil
      description: Spesifiserer drivstilen til skateboardmonteringsbolter, og skiller
        mellom vanlige hode-/drivertyper som Allen- eller Phillips-skruer.
    bone_content:
      name: Beinmateriale
      description: Angir om kjøttet inneholder bein.
    bongo_center_block_material:
      name: Bongo senterblokkmateriale
      description: Materialet i midtblokken som forbinder de to bongoskallene (hvis
        aktuelt).
    bongo_shell_material:
      name: Bongo-skallmateriale
      description: Materiale i bongoskallene (trommekroppene), unntatt skinn og maskinvare.
    bongo_tuning_system:
      name: Bongo-stemmingssystem
      description: Hvordan bongoene stemmes/konstrueres for stemming (f.eks. tradisjonell
        lug-stemming kontra taustemming), vedlikeholdspåvirkning og autentisitet.
    boning_type:
      name: Type avstivning
      description: Identifiserer det strukturelle støttesystemet inne i cincheren.
        Kombinerer både materialet og stilen/former på utbeiningen som brukes, som
        direkte påvirker støttenivået, fleksibiliteten og holdbarheten.
    boot_liner_type:
      name: Bagasjeromsinnleggstype
      description: Beskriver konstruksjonen eller justere (personlig) funksjonaliteten
        til innerforet inne i snowboardstøvelen (f.eks. varmeformbar, avtagbar).
    boot_sole_compatibility:
      name: Kompatibilitet for støvelsåle
      description: Viser opp boot sole-normene eller grensesnittsystemene som bindingen
        godtar.
    boot_support_level:
      name: Støttenivå for støvel
      description: Beskriver den generelle stivheten/støtten i ankelen eller støvelen
        som skøyten gir.
    boot_width_code:
      name: Kode for støvelbredde
      description: Produsent bokstavbasert breddebetegnelse som brukes spesifikt i
        størrelser på kunstløpskøyter (f.eks. AAA, AA, B, C, D).
    booth_configuration:
      name: Konfigurasjon for bås
      description: Identifiserer den generelle sittekonfigurasjonen til båsen (f.eks.
        ensidig, hjørne, modulær).
    bootie_toe_design:
      name: Tådesign med støvletter
      description: Identifiserer tåkonstruksjonen til surfestøvler og revstøvler.
    border_type:
      name: Kanttype
      description: Kantfinish/kantstil på den broderte lappen (påvirker utseende,
        raknemotstand og opplevd kvalitet).
    bore_cleaner_format:
      name: Borrenserformat
      description: Angir den fysiske formfaktoren til borrengjøringsproduktet (verktøy
        vs. forbruksvare).
    bore_cleaner_safe_for_finish:
      name: Borrenser trygg for overflatebehandling
      description: Angir hvilke vanlige overflater for messinginstrumenter som borerenseren
        er trygg å bruke med.
    bottle_cage_loading_direction:
      name: Lasteretning for flaskeholder
      description: Beskriver retningen en flaske settes inn i eller tas ut av buret
        fra.
    bottle_neck_finish_closure_size:
      name: Størrelse på flaskehals/lukkemekanisme
      description: Standardisert størrelse på flaskeåpning/-finish for å sikre kompatibilitet
        med korker, korker og korker (f.eks. 26 mm kronefinish).
    bottle_style:
      name: Flaskestil
      description: Vanlige formfaktorer for tappingsflasker som brukes i hjemmebrygging
        og vinproduksjon.
    bottom_bracket_interface:
      name: Kranklagergrensesnitt
      description: Identifiserer spindel-/brakettstandarden kranken er konstruert
        for, og sikrer kompatibilitet mellom ramme og braketter.
    bottom_bracket_standard:
      name: Brakett standard
      description: Brakettskall/grensesnitt støttet av rammen, som bestemmer kranksettets
        kompatibilitet.
    bottom_type_suitability:
      name: Egnethet for bunntype
      description: Angir havbunnsvinkelen som ankeret er designet for å holde best
        i.
    bounce_level:
      name: Sprettnivå
      description: Angir hvor mye ballen returer når den mistes eller kastes, noe
        som hjelper brukerne med å velge riktig ball for øvelser som veggkast eller
        smell.
    bouncy_ball_surface_finish:
      name: Overflatefinish på sprettball
      description: Angir den taktile og/eller visuelle overflatefinishen til en sprettball
        (f.eks. glatt, piggete, glitter).
    boundary_marker_type:
      name: Grensemarkørtype
      description: Definerer den fysiske formen til bane- eller banegrensemarkøren
        eller markeringsproduktet (f.eks. kjegle, tape, maling, sjablong, maskin).
    bouquet_size_tier:
      name: Bukett størrelsesnivå
      description: Standardisert størrelsesnivå for buketten/bunten uavhengig av stilketall
        (nyttig ved blandede stilker).
    bow_and_yo_yo_edge_finish:
      name: Sløyfe- og jojokantfinish
      description: Beskriver kantlisten/trimfinishen som brukes på sløyfen/jojoen
        (spesielt for båndbaserte sløyfer).
    bow_case_shell_type:
      name: Skalltype for bueetui
      description: Beskriver den strukturelle konstruksjonen av baug-eskeens ytre
        (f.eks. hardt skall vs. myk eske).
    bow_compatibility:
      name: Buekompatibilitet
      description: Angir hvilken type bue bredspissen er beregnet for eller klassifisert
        til å referere til.
    bow_hair_color:
      name: Farget sløyfehår
      description: Identifiserer fargen/utseendet til håret som brukes på en orkestersterk
        instrumentbue (f.eks. hvit/bleket, naturlig hvit, svart).
    bow_stick_material:
      name: Materiale i buepinne
      description: Identifiserer materialet som brukes til buekøllen (hovedskaftet),
        som har sterk Influence vekt, følelse og pris.
    bow_type:
      name: Buetype
      description: Spesifiserer den strukturelle utformingen av ungdomsbuen (f.eks.
        compoundbue, recurvebue, langbue), som sterkt påvirker skytestil, nødvendig
        tilbehør og treningsprogrammer.
    bow_winding_material:
      name: Materiale for buevikling
      description: Spesifiserer materialet som brukes til buevikling/-innpakning,
        påvirkning og balanse.
    bow_yo_yo_embellishment_style:
      name: Sløyfe-/jojo-utsmykningsstil
      description: Identifiserer den konstruerte stilen til utsmykningen (sløyfe-
        eller stoff-jo-konstruksjon).
    bowling_ball_core_type:
      name: Kjernetype i bowlingkule
      description: Identifiserer den interne kjernedesignen eller symmetrien til bowlingkulen,
        som påvirker kulens bevegelse og krokpotensial.
    bowling_ball_coverstock_type:
      name: Type deksel for bowlingkuler
      description: Spesifiserer det ytre dekselmaterialet eller teknologien til bowlingkulen,
        som dikterer trekkraft og krokpotensial.
    bowling_set_style:
      name: Bowlingsett-stil
      description: Definerer den generelle stilen eller bruken av bowlingsettet.
    box_lid_type:
      name: Type bokslokk
      description: Type lokk/åpningsmekanisme brukt av gaveutdelingsboksen eller organisasjonsnummer.
    box_spring_profile:
      name: Profil for boksmadrass
      description: Klassifiserer den totale høyden på rammemadrassen i kundevennlige
        profilkategorier (f.eks. lavprofil, standard, høyprofil) slik at Kunder raskt
        kan filtrere uten å vite nøyaktige mål.
    box_spring_requirement:
      name: Krav til boksmadrass
      description: Angir om det er behov for en ekstra rammemadrass eller grunnlag
        til madrassen.
    boxing_ring_style:
      name: Stil for boksering
      description: Klassifiserer den generelle konstruksjonsstilen eller det tiltenkte
        bruksscenarioet for ringen (f.eks. konkurranse kontra trening, hevet kontra
        gulv).
    bra_length_type:
      name: Type BH-lengde
      description: Definerer lengdeklassifiseringen av BH-er basert på vertikal dekning,
        for eksempel standard, longline, midi eller cropped.
    bra_padding_type:
      name: BH-utfyllingstype
      description: Beskriver nivået eller tilstedeværelsen av utfylling i koppene.
    braces_compatibility:
      name: Kompatibilitet for regulering
      description: Spesifiserer om tannbeskytteren kan brukes med kjeveortopedisk
        tannregulering og i hvilken grad.
    brake_band_form:
      name: Bremsebåndform
      description: Angir om bremsebåndet er forsynt som en kontinuerlig løkke (endeløs)
        eller som en avkuttet lengde som må festes.
    brake_band_material_type:
      name: Bremsebåndmaterialetype
      description: Spesifiserer det funksjonelle materialet i bremsebåndet (f.eks.
        bomullssnor vs. nylonline vs. fjærstål), som påvirker holdbarhet, grep, strekk
        og støy.
    brake_band_style:
      name: Bremsebåndstil
      description: Angir bremsebåndstrammingssystemet/-stilen som brukes på et spinnehjul
        for å påføre spolespenning.
    brake_bleeding_method:
      name: Metode for lufting av bremser
      description: Blødningsmetode støttes av settet.
    brake_booster_assist_type:
      name: Bremseforsterkerassistent type
      description: Angir hjelpemekanismen som brukes av bremseforsterkeren.
    brake_booster_diaphragm_configuration:
      name: Konfigurasjon av bremseforsterkermembran
      description: Angir antall/type membraner som brukes i boosteren.
    brake_caliper_bleeder_screw_position:
      name: Plassering av bremsekaliperens lufteskrue
      description: Angir lufteskruens posisjon på kaliperen når den er montert (brukes
        til å bekrefte at lufteskruen er orientert på det høyeste punktet for riktig
        lufting).
    brake_caliper_finish:
      name: Bremsekaliperfinish
      description: Angir overflatebehandlingen eller det beskyttende belegget som
        er påført bremsekaliperhuset (f.eks. maling, plating, anodisering).
    brake_caliper_included_hardware:
      name: Bremsekaliper inkludert maskinvare
      description: Spesifiserer hva som er inkludert i kaliperenheten.
    brake_caliper_mount_type:
      name: Bremsekaliperfestetype
      description: Monteringsgrensesnittstil som brukes til å feste bremseklaven til
        knoken/braketten.
    brake_caliper_paint_base_chemistry:
      name: Kjemi for bremsekalipermaling
      description: Malings-/harpikssystemet eller kjemisk familie som brukes.
    brake_caliper_paint_kit_contents:
      name: Bremsecaliper malingssett innhold
      description: Angir hva som er inkludert i pakken utover selve malingen.
    brake_circuit_type:
      name: Bremsekretstype
      description: Konfigurasjon av hydraulisk krets støttes av hovedsylinderen.
    brake_clutch_fluid_base_chemistry:
      name: Kjemisk informasjon om bremsevæske/klutsjvæske
      description: Primær kjemisk base for bremse-/clutchhydraulikkvæsken, som påvirker
        kompatibilitet og blandbarhet.
    brake_clutch_fluid_dot_specification:
      name: Bremse-/clutchvæske DOT-spesifikasjon
      description: DOT-klassifisering for hydrauliske bremse-/clutchvæsker (f.eks.
        DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Bremsetrommelens overflate/belegg
      description: Overflatebehandling eller beskyttende belegg påført bremsetrommelen
        (f.eks. e-coat, lakkert, sinkbelagt).
    brake_drum_type:
      name: Type bremsetrommel
      description: Bremsetrommelens konstruksjonstype (med eller uten integrert nav/lager).
    brake_fluid_base:
      name: Base for bremsevæske
      description: Spesifiserer formuleringen av hydraulisk bremsevæske som kreves
        eller er inkludert.
    brake_fluid_base_chemistry:
      name: Kjemi for bremsevæskebasis
      description: Definerer den kjemiske basen til bremsevæsken, som bestemmer kompatibilitet
        og blandingsregler.
    brake_fluid_dot_specification:
      name: DOT-spesifikasjon for bremsevæske
      description: Indikerer DOT-bremsevæskeklassifisering/spesifikasjon (f.eks. DOT
        3, DOT 4) for bremsevæskeprodukter.
    brake_fluid_standards_compliance:
      name: Samsvar med standarder for bremsevæske
      description: Bransjestandarder som bremsevæsken hevder å oppfylle (utover DOT-vurdering).
    brake_fluid_type:
      name: Bremsevæsketype
      description: Spesifiserer bremsevæsken som kreves for hydrauliske sykkelbremsekalipere.
    brake_hose_end_fitting_type:
      name: Endekoblingstype for bremseslange
      description: Forbindelsestype i hver ende av bremseslangen (f.eks. banjo, flare,
        hunn-/hanntråd), brukes for å sikre kompatibilitet med bremsekalipere/-slanger.
    brake_lever_pull_type:
      name: Bremsehåndtakstrekktype
      description: Definerer vaiertrekkforholdet/mekanikken som spaken er designet
        for, og sikrer kompatibilitet med spesifikke bremsekalipere (f.eks. korttrekksfelgbremser
        kontra langttrekks-V-bremser).
    brake_light_switch_actuation_type:
      name: Aktueringstype for bremselysbryter
      description: Identifiserer hvilke fysiskehendelser som aktiverer bryteren (pedal/stempel
        vs. hydraulisk trykk osv.).
    brake_light_switch_connector_type:
