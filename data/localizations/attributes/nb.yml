    pilot_helmet_communications_integration:
      name: Pilothjelmens kommunikasjonsintegrasjon
      description: Angir om hjelmen inkluderer eller er klargjort for kommunikasjonsutstyr
        for luftfart.
    pilot_helmet_visor_configuration:
      name: Type visir for pilothjelm
      description: Beskriver hvilken type visir eller ansiktsskjerm pilothjelmen leveres
        med.
    pin_attachment_type:
      name: Festetype for nål
      description: Beskriver hvilken festemekanisme (bakside) som brukes til å feste
        nålen til klær eller overflater (f.eks. sommerfugl-lås, magnetfeste).
    pin_backing_type:
      name: Bakgrunnsmateriale for nål
      description: Beskriver hvilken festemekanisme/bakside som brukes til å feste
        nålen til klær eller tilbehør.
    pin_cushion_attachment_style:
      name: Festestil for nålepute
      description: Beskriver plassering og festemetode for nåleputen under bruk.
    pin_cushion_features:
      name: Funksjoner for nålepute
      description: Funksjoner utover grunnleggende nåleholding.
    pin_face_customization_method:
      name: Metode for personalisering av pinnens front
      description: Angir hvordan frontdesignet er produsert (f.eks. hard emalje, myk
        emalje, trykt).
    pin_type:
      name: Type nål
      description: Angir stilen eller formatet for pinsproduktet som brukes for samleobjekter
        innen sport.
    ping_pong_certification:
      name: Bordtennissertifisering
      description: Beskriver produktets samsvar med offisielle standarder eller godkjenningsorganer.
    ping_pong_competition_certification:
      name: Konkurransesertifisering for bordtennis
      description: Angir den offisielle sertifiseringsstatusen for bordtennisballen
        for godkjent konkurransespill (f.eks. ITTF-godkjent).
    ping_pong_paddle_handle_style:
      name: Bordtennisrakett håndtaksstil
      description: Beskriver utformingen av padlehåndtaket, som kan påvirke komfort
        og spillteknikk.
    ping_pong_robot_accessory_type:
      name: Tilbehørstype for pingpongrobot
      description: Identifiserer den funksjonelle undertypen til tilbehøret slik at
        kunden raskt kan snevre inn resultatene (f.eks. nett vs. strømadaptere).
    ping_pong_rubber_surface_type:
      name: Gummioverflatetype for bordtennis
      description: Identifiserer stilen/teksturen på gummioverflaten som påføres racketen,
        noe som påvirker spinn- og hastighetsegenskaper.
    ping_pong_rubber_type:
      name: Gummitype for bordtennis
      description: Spesifiserer overflatekonstruksjonsstilen til et bordtennis-gummiark,
        som påvirker spilleegenskapene.
    ping_pong_table_type:
      name: Type bordtennisbord
      description: Klassifiserer den generelle stilen eller formatet til tabellen
        for enklere sammenligning (f.eks. konkurranse, konverteringstopp, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Stemmesetting / lydproduksjonsmetode for pipeinstrument
      description: Angir hvordan instrumentet produserer lyd (luftstrømsmekanisme),
        og hjelper til med å skille mellom familiene panfløyter, rørfløyter og orgelpiper
        i filtre.
    piston_application_type:
      name: Brukstype for stempel
      description: Tiltenkt bruksformål for stempelet (erstatning vs ytelse/racing
        vs tung bruk).
    piston_crown_dish_style:
      name: Stempelkrone-/-skålstil
      description: Formen til stempelkronen som påvirker forbrenningskammerets volum
        og kompresjon (f.eks. flat topp, kuppel, skål).
    piston_pin_retention_type:
      name: Festetype for stempelbolt
      description: Angir hvordan stempelbolten (wrist pin) holdes på plass i stempel-/veivstangenheten.
    pit_configuration:
      name: Konfigurasjon for grop
      description: Definerer det strukturelle formatet til landingsområdet (ett stykke
        vs. flere moduler) og indirekte også antallet seksjoner eller moduler som
        følger med.
    pit_cover_type:
      name: Dekseltype for grop
      description: Angir den beskyttende overflaten eller arket som følger med nedslagsgropen,
        som påvirker piggmotstand, værbeskyttelse og utøverens preferanser.
    pitahaya_flesh_color:
      name: Pitahaya-fruktkjøttfarge
      description: Spesifiserer den indre fruktkjøttfargen til pitahayaen (dragefrukt)
        (f.eks. hvit, rød, magenta), en viktig forskjell som påvirker smak, utseende
        og opplevd ernæring.
    pitch_mat_coverage_length:
      name: Lengde på dekningsområdet for banematten
      description: Klassifiserer cricketbanematten etter den delen av wicketen den
        dekker (f.eks. full eller halv bane).
    pitch_range:
      name: Tonehøydeområde
      description: Beskriver det opplevde tonehøydeområdet/-lysheten i shakerlyden.
    pitch_standard:
      name: Standard tonehøyde
      description: Angir tonehøydestandarden (referansestemming) som opptakeren er
        bygget for (f.eks. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Størrelsesbetegnelse for kasterplate
      description: Indikerer standard feltstørrelsesklassifisering for kastergummien,
        noe som forenkler valget uten at kunden trenger å vite nøyaktige mål.
    pitching_screen_style:
      name: Kasterskjermstil
      description: Definerer skjermens strukturelle design slik at kundene raskt kan
        velge riktig layout for treningsscenarioet sitt.
    pitching_target_design:
      name: Design for kastemål
      description: Klassifiserer den generelle stilen eller konfigurasjonen til kastemålet.
    pitching_wheel_count:
      name: Antall kastehjul
      description: Angir antall fremdriftshjul en kastemaskin bruker.
    pivot_adjustability:
      name: Dreiejustering
      description: Angir om saksen har en justerbar svingskrue for å justere klippespenningen.
    pivot_piece_type:
      name: Dreiestykketype
      description: Skiller mellom forskjellige medfølgende dreiegrensesnittformer,
        for eksempel tradisjonelle kopper eller rørstil.
    place_card_holder_closure_mechanism:
      name: Lukkemekanisme for kortholder
      description: Angir hvordan holderen griper eller sikrer kortet.
    place_card_orientation:
      name: Orientering av bordkort
      description: Angir retningen til bordkortet når det brukes/vises.
    place_card_printing_status:
      name: Utskriftsstatus for bordkort
      description: Angir om bordkortet er blankt for håndskrift/utskrift, forhåndstrykt
        (navn ikke tilpasset) eller personlig/egendefinert trykt.
    placket_type:
      name: Splitt-type
      description: Angir stilen på frontåpningen på polotrøya, inkludert knappeantall
        eller alternative lukninger.
    planetarium_content_theme:
      name: Planetarium – innholdstema
      description: Primærinnhold vist av planetariumprojektoren.
    planetarium_projection_content_format:
      name: Planetariumprojeksjon – innholdsformat
      description: Angir projeksjonsinnhold-mekanismen som planetariet bruker (fysiske
        plater/lysbilder vs. digital/LED-effekt).
    plant_fiber_type:
      name: Type plantefiber
      description: Spesifikk fibertype for planteopphav når fast fiberkilden er Plante.
    plaster_gauze_finish:
      name: Gipsgasfinish
      description: Tendens for resulterende overflatefinish etter påføring og utjevning.
    plaster_gauze_grade:
      name: Gipsgaskvalitet
      description: Tiltenkt bruksgrad for gipsgasen (f.eks. håndarbeid/student vs.
        profesjonell).
    plaster_gauze_weave_density:
      name: Tetthet for gipsgasvev
      description: Relativ åpenhet/tetthet i gasvevingen, som påvirker styrke og gipsopptak.
    plastic_canvas_finish:
      name: Finish for plastlerret
      description: Overflate-/finishbehandling av plastlerretrullen.
    plastic_canvas_sheet_finish:
      name: Overflatebehandling for plastpresenning
      description: Overflate- og kantbehandlingen for plastpresenningen.
    plastic_canvas_transparency:
      name: Gjennomsiktighet av plastlerret
      description: Hvor gjennomsiktig/ugjennomsiktig plastlerretet er.
    plate_bottom_design:
      name: Utforming av bunnplate
      description: Beskriver konstruksjonen av undersiden av platen, som påvirker
        grep, stabilitet og sikkerhet på forskjellige spilleoverflater.
    plate_compatibility_standard:
      name: Kompatibilitetsstandard for plate
      description: Angir vektskivestandarden stangen er designet for (f.eks. olympisk
        50 mm, standard 25 mm).
    plate_installation_type:
      name: Plateinstallasjonstype
      description: Angir hvordan platen er festet eller plassert på banen (f.eks.
        nedgravd, med pigger, nedkastbar), slik at kjøperen kan velge mellom permanente
        og bærbare alternativer.
    plate_size_category:
      name: Størrelseskategori for plate
      description: Klassifiserer platen etter spillnivå eller reguleringsstandard
        slik at kjøpere raskt kan finne ligakompatibelt utstyr.
    play_dough_putty_kit_contents:
      name: Play dough- og kittsettinnhold
      description: Identifiserer de viktigste inkluderte komponentene etter selve
        forbindelsen (f.eks. verktøy, former, ekstruder, lagring).
    play_dough_tool_set_items_included:
      name: Play dough-verktøysettgjenstander inkludert
      description: Identifiserer hvilke typer verktøy og tilbehør som inngår i et
        play dough- verktøysett (f.eks. ruller, utstikkere, former).
    play_environment_suitability:
      name: Egnethet for lekemiljø
      description: Identifiserer det tiltenkte lekemiljøet for settet (f.eks. innendørs,
        utendørs, vann).
    play_food_features:
      name: Lekemat-funksjoner
      description: Spesielle funksjonelle eller realistiske funksjoner til lekematen.
    play_food_items_included:
      name: Lekematgjenstander inkludert
      description: Angir hvilke typer lekemat som følger med kjøkkenlekesettet.
    play_food_size_scale:
      name: Størrelsesskala for lekemat
      description: Indikerer den omtrentlige størrelsesskalaen til de simulerte matdelene
        for kompatibilitet med lekekjøkken, dukker og lekesett.
    play_money_set_components_included:
      name: Inkluderte komponenter i lekepengesett
      description: Angir hvilke komponenttyper som er inkludert i lekepenger-/banksettet.
    play_pattern:
      name: Lekemønster
      description: Den primære måten leken er ment å brukes på (f.eks. fidget/stressavlastning,
        skrivebordsskulptur/kunst, konstruksjon/bygging eller puslespill).
    play_sprinkler_mounting_type:
      name: Monteringstype for lekesprinkler
      description: Hvordan lekesprinkleren er plassert/festet under bruk.
    play_vehicle_lights_and_sounds:
      name: Spill av billys og -lyder
      description: Angir om lekekjøretøyet har elektroniske lekeeffekter som lys og/eller
        lyder.
    play_vehicle_scale:
      name: Lekebilskala
      description: Angir skalaforholdet til lekekjøretøyet (vanligvis brukt for støpte
        og modellignende lekekjøretøy).
    player_size_category:
      name: Størrelseskategori for spiller
      description: Definerer den tiltenkte spillerstørrelsen/aldersgruppen som mottakertutstyret
        passer til (f.eks. tee ball, ungdom, middels, voksen).
    player_size_range:
      name: Spillerens størrelsesområde
      description: Angir det tiltenkte brukerstørrelsesområdet for stroppen/støtten
        (f.eks. barn, voksen, universal).
    playing_environment:
      name: Spillmiljø
      description: Angir den primære spilleflaten eller konteksten som hockeyballen
        er designet for.
    playing_method:
      name: Spillemetode
      description: Primær måte instrumentet er ment å bli spilt/aktivert på.
    playing_surface_material:
      name: Overflatemateriale for spill
      description: Identifiserer materialet i cajonens fremre spilleflate (tapa),
        som sterkt påvirker tone og følelse.
    playing_surface_type:
      name: Type spilleflate
      description: Beskriver spilleoverflatens konstruksjon/følelse på øvingsmatten.
    playset_activities_included:
      name: Lekesettaktiviteter inkludert
      description: Identifiserer de viktigste lekeaktivitetene/komponentene som er
        innebygd i husken/lekesettet for å hjelpe kundene med å filtrere etter hva
        barna kan gjøre på strukturen.
    playset_installation_type:
      name: Installasjonstype for lekesett
      description: Angir hvordan huskestativet/lekesettet er installert eller festet.
    playset_items_included:
      name: Inkluderte elementer i lekesett
      description: Identifiserer hvilke typer «late som»-lekeutstyr som er inkludert
        i piknik-lekesettet (mat, servise, teppe, kurv osv.).
    pliers_jaw_style:
      name: Kjevestil på tang
      description: Beskriver tangens primære kjevekonfigurasjon eller funksjonelle
        stil.
    plum_variety:
      name: Plommevariant
      description: Identifiserer den spesifikke kultivaren eller varianten av plomme,
        slik at kunden kan velge basert på smak, farge og tiltenkt kulinarisk bruk.
    plumcot_variety:
      name: Plumcot-variant
      description: Identifiserer den spesifikke kultivaren eller kommersielle varianten
        av plumcot (f.eks. Flavor King, Dapple Dandy), som kan påvirke smak, farge
        og sesongvariasjon.
    plunger_mute_handle_type:
      name: Håndtaksstil på plungerdemper
      description: Angir referansen eller grepsstilen som brukes til å holde og manipulere
        en stempeldemper for wa-wa-effekter.
    pocket_closure_type:
      name: Lommelukkingstype
      description: Definerer hvordan hver lomme er sikret, noe som hjelper brukere
        med å finne bukser med sikker oppbevaring under aktivitet.
    pocket_knife_opening_mechanism:
      name: Åpningsmekanisme for lommekniv
      description: Hvordan kniven kommer ut / åpnes (manuelt naglehakk, tommelskrue,
        flipper, assistert, automatisk osv.).
    pocket_style:
      name: Lommestil
      description: Angir hovedlommekonstruksjonen på buksene.
    pocket_type:
      name: Lommetype
      description: Identifiserer stilen eller tilstedeværelsen av lommer på plagget.
    pod_retention_system:
      name: Oppbevaringssystem for kapsler
      description: Beskriver hvordan paintballkapsler holdes på plass og løsnes fra
        selen eller bunten.
    pogo_stick_footrest_type:
      name: Fotstøttetype på pogostav
      description: Beskriver fotplattformen/pinnedesignet som brukes til å stå på
        pogo-pinnen.
    pogo_stick_suspension_type:
      name: Pogo-pinne – opphengstype
      description: Spesifiserer pogo-pinnens rebound-mekanisme, som påvirker følelse,
        holdbarhet og vedlikehold.
    poi_handle_type:
      name: Type håndtak for poi
      description: Angir typen håndtak/grep/feste som brukes til å holde poien.
    poi_light_source:
      name: Poi-lyskilde
      description: For opplyst poi, spesifiserer lysteknologien.
    poi_tether_type:
      name: Tjoretype for poi
      description: Angir typen snor som kobler poi-hodet til håndtaket, knotten eller
        håndleddsløkken (f.eks. snor, tau, kjetting).
    poi_type:
      name: Poi-type
      description: Angir den primære poi-konstruksjonen/-brukstypen (f.eks. øvelse,
        LED, brann).
    point_type:
      name: Punkttype
      description: Form/stil på spissen som brukes på broderinålen.
    pointe_shoe_shank_length:
      name: Lengde på støttesåle for dansesko
      description: Den delen av skolengden som skaftet støtter, for eksempel full
        eller 3/4 lengde.
    pointe_shoe_shank_strength:
      name: Styrke på tåspisskoens skaft
      description: Stivhetsnivået til tåspisskoens skaft, som påvirker støtte og inngåingstid.
    poker_accessory_storage_included:
      name: Oppbevaring av pokertilbehør inkludert
      description: Angir hvilken ekstra pokergjenstander tilbehøret har dedikert lagringsplass
        for.
    poker_chip_tray_rack_configuration:
      name: Brett-/reolkonfigurasjon for pokersjetonger
      description: Beskriver den interne organiseringsstilen til et sjetongbrett/-reol
        (rader og kapasitet per rad).
    pole_anchoring_method:
      name: Forankringsmetode for stav
      description: Definerer hvordan stangen er festet til bakken eller spilleflaten.
    pole_basket_type:
      name: Trinsetype for stav
      description: Klassifiserer stilen eller størrelsen på kurven som er montert
        nær tuppen av skistaven, og indikerer tiltenkte snøforhold.
    pole_connection_system:
      name: Polforbindelsessystem
      description: Identifiserer mekanismen som forbinder stangseksjoner, for eksempel
        støtsnor-, gjenge- eller navsystemer, noe som hjelper brukere med å vurdere
        oppsetthastighet og kompatibilitet.
    pole_system_type:
      name: Type stavsystem
      description: Beskriver bæresystemet eller oppsettsstilen telt bruker (f.eks.
        aluminiumsstenger, oppblåsbare luftrør, oppsett med turstaver).
    police_equipment_fitment:
      name: Montering av politiutstyr
      description: Angir hvilket politiutstyr kjøretøyet er konfigurert eller forhåndskablet
        til å støtte.
    police_vehicle_equipment_package:
      name: Utstyrspakke for politibiler
      description: Angir det politispesifikke utstyrsutstyret som følger med kjøretøyet
        slik det ble solgt.
    police_vehicle_light_siren_equipment:
      name: Lys-/sireneutstyr for politibiler
      description: Angir hvilke nødvarslingsenheter som er installert på politibilen.
    police_vehicle_upfit_level:
      name: Oppgraderingsnivå for politibiler
      description: Beskriver hvilket politispesifikt utstyr/oppgradering som er installert
        på lastebilen.
    polish_formulation:
      name: Poleringsformel
      description: Indikerer formelbasen/-kjemien til gripebrettpoleringen (ikke bruksmetoden).
    polish_purpose:
      name: Poleringsformål
      description: Primært tiltenkt resultat av poleringen på instrumentoverflaten.
    pollen_level:
      name: Pollennivå
      description: Indikerer mengden/sannsynligheten for pollenmisfarging fra liljevarianten.
    polymer_clay_firmness_level:
      name: Polymerleire – fasthetsnivå
      description: Polymerleirens relative fasthet/mykhet før brenning (bearbeidbarhet).
    polymer_clay_translucency:
      name: Gjennomskinnelighet av polymerleire
      description: Visuell opasitet/gjennomsiktighet av polymerleiren når den er herdet.
    pom_pom_handle_style:
      name: Stil for pompong-håndtak
      description: Beskriver stilen eller konstruksjonen til referansen/grepet som
        brukes til å holde pompomen.
    pom_pom_trim_backing_tape_material:
      name: Pyntemateriale/tapemateriale for pompom
      description: Identifiserer materialet i det sydde båndet eller fletten som pompomen
        er festet til (trimbasen).
    pom_pom_type:
      name: Pompom-type
      description: Indikerer tilstedeværelsen og den spesifikke typen pompom eller
        boble på hatten.
    pomegranate_product_form:
      name: Produktform for granateple
      description: Beskriver den fysiske formen som tilbys (hel frukt, skrelte frøkapper,
        kjerner, frosne frøkapper).
    pomegranate_variety:
      name: Granateplevariant
      description: Identifiserer den spesifikke kultivaren eller varianten av granateplefrukten
        (f.eks. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Hestehale-holderstil
      description: Beskriver den spesifikke konstruksjonen eller formfaktoren til
        hestehaleholderen, slik at kundene kan velge sin foretrukne stil.
    popcorn_form:
      name: Popkornform
      description: Angir den fysiske eller tilberedte formen til popkornproduktet,
        for eksempel klar til å spise, kjerner, mikrobølgepakke, kryddersett eller
        gaveboks.
    pork_rind_form:
      name: Svinesvorform
      description: Kategoriserer den fysiske formen eller stilen til svinesvorsnacks
        (f.eks. svor, knitrende, puff, kuler osv.).
    portability_features:
      name: Bærbarhetsfunksjoner
      description: Viser innebygde elementer som gjør det lettere å flytte, bære eller
        lagre solsengen.
    portability_frame_type:
      name: Bærbarhet/rammetype
      description: Om orkesterklokkespillet er av bærbar/feltrammetype eller fast/konsertrammetype.
    portable_electronic_game_features:
      name: Funksjoner for bærbart elektronisk spill
      description: Viktige spill-/maskinvarefunksjoner støttet av enheten.
    post_surgery_stage_suitability:
      name: Faseegnethet etter operasjon
      description: Angir hvilken restitusjonsfase (hvis noe) bodyen er designet for,
        viktig for kunder som søker medisinsk formtøy.
    postage_stamp_format:
      name: Frimerkeformat
      description: Hvordan det definitive frimerket tilbys/pakkes (enkelt, par, strimmel,
        blokk, ark, hefte, spole osv.).
    postmark_type:
      name: Poststempeltype
      description: Type avstempling/poststempel som finnes på brukte definitive frimerker.
    potato_cut_style:
      name: Kuttestil for potet
      description: Angir den fysiske kutt- eller tilberedningsmåten for poteter når
        de ikke selges hele.
    potato_intended_use:
      name: Tiltenkt bruk for potet
      description: Skiller poteter ment for umiddelbart forbruk fra de som er ment
        som settepoteter eller frosne bearbeidede produkter.
    potato_variety:
      name: Potetsort
      description: Spesifiserer potetkultivaren/-sorten, slik at kunden kan finne
        spesifikke typer som «Yukon Gold», «Maris Piper» eller «Purple Majesty».
    pottery_clay_firing_required:
      name: Krever brenning av keramikkleire
      description: Om materialet krever ovnbrenning for å oppnå sin tiltenkte endelige
        hardhet/finish.
    pottery_slip_application_method:
      name: Bruksmetode for keramikkslikker
      description: Angir den tiltenkte påføringsteknikken for slikkeren.
    pottery_slip_compatible_clay_body:
      name: Leirekropp kompatibel med keramikkbelegg
      description: Angir leirtypen(e) som slikkeren er designet for å matche eller
        fungere med.
    pottery_slip_form:
      name: Keramikkslikker – form
      description: Angir om slikkeren selges som en bruksklar væske eller som en tørrblanding/pulver
        som krever blanding.
    pouch_design:
      name: Lommedesign
      description: Informasjon om konstruksjons- eller forbedringsfunksjonene til
        frontlommeområdet.
    pouch_style:
      name: Lommestil
      description: Spesifiserer utformingen av det fremre lommeområdet, med hensyn
        til komfort, støtte og estetiske preferanser.
    powdered_beverage_variety:
      name: Variant av pulverbasert drikkevare
      description: Klassifiserer produktet etter typen drikk det tilbereder (f.eks.
        limonade, sportsdrikk, proteinshake).
    power_rack_style:
      name: Stil på styrkestativ
      description: Spesifiserer det overordnede stativdesignet/-konfigurasjonen, og
        hjelper kunden med å skille mellom hele bur, halve stativ og plassbesparende
        varianter.
    power_steering_fluid_formulation:
      name: Formulering av servostyringsvæske
      description: Den generelle formelfamilien til væsken (ATF-basert vs. dedikert
        hydraulisk/CHF vs. universal), brukt til filtrering av høyt kompatibilitetnivå.
    practice_mute_audio_output:
      name: Lydutgang for øvingsdemper
      description: Angir typen lydutgangsforbindelse som er tilgjengelig på øvingsdemperen
        for overvåking og/eller opptak (vanlig i lydløse/elektroniske øvingsdempere).
    practice_mute_intonation_impact:
      name: Intonasjonspåvirkning for øvingsdemper
      description: Beskriver den forventede stemmings-/intonasjonseffekten når du
        bruker øvingsdemperen.
    practice_mute_venting_valve_type:
      name: Ventilasjons-/ventiltype for øvingsdemper
      description: Angir om og hvordan øvingsdemperen ventileres eller inkluderer
        en justerbar ventil for å endre motstand/volum.
    practice_pad_features:
      name: Funksjoner for øvelsespute
      description: Fremhever funksjonelle egenskaper til øvingspadden hinsides størrelse/materiale.
    practice_pad_mounting_style:
      name: Monteringsstil for øvingspad
      description: Angir hvordan øvingspadden er ment å plasseres eller festes under
        bruk.
    practice_pad_rebound_level:
      name: Rebound-nivå for øvingspad
      description: Indikerer den relative rebounden/responsen til øvingspad sammenlignet
        med typiske trommeskinn.
    practice_pad_surface_configuration:
      name: Konfigurasjon av overflaten på øvingspad
      description: Beskriver om padden har én eller flere spilleflater, og om de har
        ulik følelse.
    pregnancy_stage_suitability:
      name: Egnethet for svangerskapsstadier
      description: Angir hvilke graviditets- eller postpartumfaser plagget er designet
        for.
    preparation_state:
      name: Forberedelsesstatus
      description: Angir nivået av forberedelse eller koking som er nødvendig før
        forbruk.
    preparation_style:
      name: Forberedelsesstil
      description: Definerer kuttet eller bearbeidet tilstand av vannkastanjene når
        de selges (f.eks. hele, skivede, ristede, frosne).
    preservation_medium:
      name: Konserveringsmedium
      description: Angir den primære væsken eller mediet som olivenene eller kapersene
        konserveres i (f.eks. saltlake, olivenolje, eddik).
    presser_foot_attachment_method:
      name: Metode for festing av trykkfot
      description: Angir hvordan symaskinens trykkfot festes til trykkfotholderen/-skaftet
        (f.eks. klikk-på vs. skru-på), noe som påvirker kompatibiliteten.
    pressure_gauge_type:
      name: Trykkmålertype
      description: Angir hvilken type trykkmåler som følger med sykkelpumpen, hvis
        noen.
    pressure_measurement_unit:
      name: Trykkmåleenhet
      description: Angir enheten som brukes for trykksensorens avlesning eller kalibrering.
        Dette er nyttig for å sammenligne produkter og sikre trykkmåler/ECU-kompatibilitet
    pressure_plate_balance_type:
      name: Trykkplate – balansetype
      description: Angir om trykkplaten er internt balansert eller krever/forutsetter
        ekstern balanse som matcher motor-/svinghjulsopsettet.
    pressure_plate_components_included:
      name: Trykkplatekomponenter inkludert
      description: Hva er inkludert i trykkplatens oppføring?
    pressure_sensor_application:
      name: Bruk av trykksensor
      description: Identifiserer kjøretøysystemet/målepunktet som trykksensoren er
        designet for.
    pressure_sensor_port_thread_standard:
      name: Trykksensor – port-/gjengestandard
      description: Angir den mekaniske port-/gjengestandarden som brukes til å installere
        sensoren i kjøretøysystemet.
    pressurization_method:
      name: Trykksettingsmetode
      description: Identifiserer hvordan trykk genereres eller opprettholdes inne
        i enheten.
    pretend_housekeeping_set_items_included:
      name: Rollelek-rengjøringssett inkludert
      description: Viser hvilke rengjøringstilbehør som er inkludert i settet (f.eks.
        mopp, kost, feiebrett, sprayflaske).
    pretend_play_electronic_features:
      name: Elektroniske rollelekefunksjoner
      description: Elektroniske/interaktive funksjoner inkludert i rollelekeproduktet.
    pretend_play_set_pieces_included:
      name: Sett med rollelekedeler inkludert
      description: Viktige rekvisitter/komponenter som er inkludert i rollelekesettet
        (f.eks. kasseapparat, lekemat, verktøy).
    pretend_play_set_theme:
      name: Rollelekesett-tema
      description: Primært lekescenario/-tema representert av produktet (nyttig for
        tverrgående oppdagelse på tvers av alle rolleleker for barn).
    pretzel_coating:
      name: Saltkringlebelegg
      description: Identifiserer eventuelle ytre krydder eller belegg som er påført
        saltkringlen, og dekker både salte (saltet, krydret) og søte (sjokolade, yoghurt,
        karamell) alternativer.
    pretzel_shape:
      name: Saltkringleform
      description: Angir den fysiske formen til saltkringlen (f.eks. vri, pinne, tugge),
        en viktig differensieringsfaktor som kunder bruker når de søker eller filtrerer.
    primary_component_material:
      name: Primær komponentmateriale
      description: Primærmaterialet i motorblokken.
    primary_dish_application:
      name: Rett for primærbruk
      description: Identifiserer hovedretten eller tilberedningen deigen er beregnet
        på.
    primary_plant_base:
      name: Primær plantebase
      description: Angir den/de viktigste ikke-melkeingrediensen(e) som brukes til
        å lage ostealternativet.
    primary_plant_protein_source:
      name: Primær planteproteinkilde
      description: Identifiserer den viktigste planteingrediensen som gir protein
        i produktet.
    primary_sweetener_source:
      name: Primær søtningsmiddelkilde
      description: Identifiserer planten eller råmaterialet som sirupen er utvunnet
        fra.
    print_placement:
      name: Plassering av trykk
      description: Angir hvor hovedgrafikken/logoen er plassert på T-skjorten.
    print_technique:
      name: Trykkteknikk
      description: Angir dekorasjons-/trykkmetoden som brukes på T-skjortegrafikken.
    printable_canvas_intended_use:
      name: Tiltenkt bruk av trykkbart lerret
      description: Primærbruk som det trykkbare lerretet er optimalisert for.
    printable_fabric_format:
      name: Trykkbart stofformat
      description: Angir hvordan den trykkbare bomullen leveres (enkeltark vs. kontinuerlig
        rull), noe som påvirker skrivermating og prosjektets arbeidsflyt.
    prism_material:
      name: Prismemateriale
      description: Spesifiserer materialet i selve det optiske elementet (prismet),
        som påvirker klarhet, holdbarhet og ripebestandighet.
    prisoner_transport_configuration:
      name: Konfigurasjon av fangetransport
      description: Angir om og hvordan varebilen er konfigurert for transport av varetektsfengslede/fanger.
    prisoner_transport_partition_type:
      name: Type skillevegg for fangetransport
      description: Type innvendig skillevegg/bur som skiller fremre og bakre rom.
    privacy_or_acoustic_feature:
      name: Personvern eller akustisk funksjon
      description: Spesifiserer innebygde elementer for personvern eller akustiske
        elementer som skillepaneler, akustiske skjermer eller komplette innkapslinger.
    processing_state:
      name: Behandlingstilstand
      description: Om fjærene er sterilisert/vasket eller på annen måte forberedt
        for håndverk.
    produce_grade:
      name: Produksjonsgrad
      description: Klassifiserer kvalitetsgraden som tildeles kiwien basert på størrelse,
        utseende og tilstand.
    produce_growth_stage:
      name: Grønnsaks vekstfase
      description: Angir vekstfasen som produktene selges i (f.eks. mikrogrønt, babyblad,
        modent blad, levende plante, frø).
    produce_washing_state:
      name: Grønnsaks vasketilstand
      description: Angir om salaten er vasket og klar til å spises.
    profile_shape:
      name: Profil/form
      description: Cymbalens generelle krumning/profil (hvor bratt den stiger fra
        kant til klokke).
    projectile_ammunition_type:
      name: Prosjektil-/ammunisjonstype
      description: Spesifiserer typen prosjektiler eller forbruksvarer som brukes
        av lekevåpenet, hvis aktuelt.
    projectile_finish:
      name: Prosjektilfinish
      description: Spesifiserer ethvert overflatebelegg som påføres BB-en, for å forbedre
        korrosjonsmotstanden eller synligheten (f.eks. kobberbelagt, sinkbelagt, malt).
    projectile_type:
      name: Prosjektiltype
      description: Identifiserer hvilken type prosjektil produktet bruker eller er
        beregnet for.
    pronation_support:
      name: Pronasjonsstøtte
      description: Angir hvilken type gangart eller pronasjonsmønster joggeskoen er
        designet for å imøtekomme.
    propellant_type:
      name: Drivstofftype
      description: Angir drivstoffet som delen eller tilbehøret er designet for å
        bruke.
    propeller_blade_cup:
      name: Kopp på propellerblad
      description: Angir mengden cup (krumning på bakkanten) på bladene.
    propeller_hub_type:
      name: Propellnavtype
      description: Angir nav-/bøssingsystemet som brukes av propellen (utskiftbart
        navsett vs. innpresset).
    propeller_rotation:
      name: Propellrotasjon
      description: Angir rotasjonsretningen til en propell.
    protectant_formula_base:
      name: Base for beskyttelsesformel
      description: Spesifiserer baseformelen til beskyttelsesmiddelet, som påvirker
        glans, følelse og rengjøring (f.eks. vannbasert vs. løsemiddelbasert).
    protection_coverage_area:
      name: Dekningsområde for beskyttelse
      description: Identifiserer hvilke deler av klokken som det beskyttende tilbehøret
        dekker.
    protection_level:
      name: Beskyttelsesnivå
      description: Indikerer etuiets tiltenkte beskyttelsesnivå for transport og lagring
        av instrumentet.
    protective_case_interior_protection_type:
      name: Beskyttende etui – innvendig beskyttelsestype
      description: Beskriver den viktigste metoden for innvendig beskyttelse som brukes
        for å sikre og polstre innholdet.
    protective_case_shell_type:
      name: Beskyttende etui – skalltype
      description: Identifiserer den overordnede konstruksjonsstilen til etuieksteriøret
        (stivhet) som påvirker klembeskyttelse og bærbarhet.
    protective_contact_padding_material:
      name: Beskyttende kontaktpolstringsmateriale
      description: Materiale som brukes på instrumentets kontaktpunkter (åk/klokkeinnlegg)
        for å forhindre riper (f.eks. filt, gummi).
    protective_cup_configuration:
      name: Beskyttende koppkonfigurasjon
      description: Angir om en beskyttelseskopp er inkludert, avtakbar, eller om plagget
        kun har en lomme til å holde en kopp.
    protective_eyewear_standard_compliance:
      name: Samsvar med standarder for vernebriller
      description: Spesifiserer sikkerhets- eller slagmotstandstandarder eller -sertifiseringene
        som brillene oppfyller eller overgår for sportsbruk.
    protective_gear_certification_standard:
      name: Sertifiseringsstandard for beskyttelsesutstyr
      description: 'Angir sikkerhets-/sertifiseringsstandarden utstyret overholder
        (varierer etter varetype: hjelmstandarder, draktstandarder, slagbeskyttelsesstandarder).'
    protective_gear_items_included:
      name: Beskyttelsesutstyr inkludert
      description: Viser enkeltdelene som finnes i et beskyttelsesutstyrsett med flere
        deler.
    protective_gear_padding_type:
      name: Beskyttelsesutstyr – polstringstype
      description: Spesifiserer polstringstypen som brukes i slagbeskyttelsesutstyr.
    protective_gear_safety_certifications:
      name: Sikkerhetssertifiseringer for beskyttelsesutstyr
      description: Lister opp anerkjente sportsspesifikke sikkerhets- eller ytelsesstandarder
        som produktet oppfyller, for eksempel NOCSAE- eller ASTM-standarder for landhockeyhjelmer.
    protective_pad_components_included:
      name: Beskyttende putekomponenter inkludert
      description: Spesifiserer hvilke spesifikke beskyttelsesartikler som er inkludert
        i et sett med flere deler, slik at kundene vet nøyaktig hvilke kroppsdeler
        som dekkes.
    protective_shorts_intended_use:
      name: Beskyttende shorts – tiltenkt bruk
      description: Primær ridnings-/løpsdisiplin som beskyttelsesshortsen er designet
        for.
    protective_shorts_padding_type:
      name: Polstringstype i beskyttelsesshorts
      description: Spesifiserer konstruksjonen/formatet til beskyttelseselementene
        som brukes i shortsen.
    protective_shorts_padding_zones:
      name: Polstrede soner for beskyttelsesshorts
      description: Identifiserer hvilke kroppsområder som har integrert polstring/beskyttelse
        i beskyttelsesshortsen.
    protective_treatment:
      name: Beskyttende behandling
      description: Spesifiserer enhver beskyttende overflate eller behandling som
        brukes for flekk-, vann- eller UV-bestandighet (f.eks. Teflon).
    protector_coverage_area:
      name: Dekningsområde for beskyttelse
      description: Angir hvilket/hvilke overkroppsområder beskytteren er designet
        for å dekke (f.eks. bryst, rygg, sider).
    puck_bottom_style:
      name: Puckbunnstil
      description: Beskriver undersiden av pucken, som påvirker fart og kontroll på
        forskjellige shuffleboard-underlag.
    puck_type:
      name: Pucktype
      description: Klassifiserer den funksjonelle stilen eller den tiltenkte bruken
        av hockeypucken, fra offisielt spill til samlesuvenirer.
    pull_buoy_style:
      name: Trekkbøye-stil
      description: Indikerer den funksjonelle stilen eller konfigurasjonen til trekkbøyen,
        for eksempel standard, ankel eller pullkick-kombinasjon.
    pull_through_weight_material:
      name: Gjennomtrekks-vektmateriale
      description: For gjennomtrekkspinner, identifiserer materialet i vekten som
        brukes til å føre vattpinnen gjennom instrumentet.
    pulp_content:
      name: Innhold av fruktkjøtt
      description: Angir mengden frukt- eller grønnsakskjøtt som finnes i drikken.
    pump_accessories_included:
      name: Inkludert pumpetilbehør
      description: Lister opp ekstra varer som følger med ballpumpen slik at kunden
        kan forstå pakkeinnholdet.
    pumping_compatibility:
      name: Pumpekompatibilitet
      description: Angir om amme-BH-en er designet for håndfri pumping samt amming.
    punch_pad_type:
      name: Type stempelpute
      description: Spesifiserer design eller stil på en bokse-/treningsmatte slik
        at kunder kan velge riktig matte for sine treningsbehov.
    punching_training_bag_shape:
      name: Form på bokse-/treningssekk
      description: Spesifiserer den geometriske stilen til den tunge bagen, som hjelper
        kunder med å velge modeller som passer til bestemte slagøvelser (f.eks. uppercuts,
        bodyshots).
    puncture_protection_technology:
      name: Teknologi for punkteringsbeskyttelse
      description: Lister opp eventuelle private eller generiske punkteringsbeskyttelseslag
        eller forsterkningsteknologier for sidevegg/karm som er innlemmet i dekket
        (f.eks. EXO, SnakeSkin, Kevlar-belte).
    puppet_features:
      name: Dukkefunksjoner
      description: Fremhever funksjonelle eller prestasjonsbaserte trekk ved dukken
        (f.eks. bevegelig munn, lydeffekter, vendbar).
    puppet_puppet_theater_accessory_type:
      name: Tilbehørstype for dukke og dukketeater
      description: Spesifiserer hva slags tilbehør produktet er (f.eks. scenerekvisitt,
        dukkekostyme, kontrollstang, reservestreng).
    purity_unit:
      name: Renhetsenhet
      description: Hvordan renhet uttrykkes for mynten (finhet vs. karat).
    push_up_bar_design:
      name: Armheving-stangdesign
      description: Indikerer den funksjonelle designstilen til armheving-stenger (f.eks.
        faste, roterende, parallelle).
    pushrod_end_type:
      name: Endetype for ventilstøterstang
      description: Angir stilen på ventilstøterstangenden/-festet som brukes ved pedal-
        eller hovedsylindergrensesnittet.
    putty_glow_activation_method:
      name: Metode for aktivering av kittglød
      description: Hvordan kittet lades/aktiveres til å gløde (f.eks. sollys, UV /
        svart lys).
    putty_glow_color:
      name: Kittglødfarge
      description: Identifiserer fargen kittet avgir når det lyser i mørket.
    putty_inclusions:
      name: Inni kittet
      description: Spesielle ting inni kittet (f.eks. glitter, konfetti, skumperler).
    putty_texture:
      name: Kitt-tekstur
      description: Primær håndteringsatferd til kittet (f.eks. sprettende, elastisk,
        væskelignende).
    puzzle_accessory_features:
      name: Funksjoner for puslespilltilbehør
      description: Funksjonelle funksjoner og designelementer i puslespilltilbehør
        (varierer etter tilbehørstype).
    pyrometric_cone_range:
      name: Pyrometrisk kjegleområde
      description: Den anbefalte pyrometriske kjeglene som glasuren er formulert for
        brennes med (f.eks. kjegle 06–04, kjegle 5–6).
    quarter_panel_coverage_type:
      name: Dekningstype for kvartpanel
      description: Angir hvor mye av kvartpanelområdet produktet erstatter/reparerer.
    quarter_panel_set_contents:
      name: Innhold i kvartpanelsett
      description: Spesifiserer konfigurasjonen av kvartpanelpakken som er inkludert
        i oppføringen (enkeltsidet, par eller med ekstra reparasjonsseksjoner).
    quilting_ruler_markings:
      name: Linjalmarkeringer for stikksøm
      description: Angir typene trykte markeringer på stikksømlinjalen som brukes
        til skjæring/justering.
    quilting_ruler_non_slip_feature:
      name: Sklisikker funksjon for stikksømlinjal
      description: Angir om linjalen har en sklisikker bakside/overflatebehandling
        for å redusere forskyvning på stoffet.
    quilting_ruler_transparency:
      name: Gjennomsiktighet for stikksømlinjal
      description: Angir hvor gjennomsiktig/synlig linjalmaterialet er for å se stoff
        og markeringer under.
    quilting_thread_usage:
      name: Bruk av stikksømtråd
      description: Indikerer den tiltenkte stikksømbruken for tråden (hvordan den
        er ment å brukes).
    quilting_thread_weight_system:
      name: Vektsystem for stikksømtråd
      description: Angir trådstørrelsen/vektklassifiseringssystemet som brukes til
        å uttrykke trådtykkelse (f.eks. wt, Tex, Denier), slik at den numeriske størrelsen
        kan tolkes riktig.
    quince_variety:
      name: Kvedevariant
      description: Identifiserer den spesifikke kultivaren eller varianten av kvede,
        ettersom smak, aroma og kulinarisk egnethet kan variere fra variant til variant.
    quinoa_variety:
      name: Quinoa-variant
      description: Identifiserer den spesifikke fargen eller varianten av quinoa,
        ettersom forskjellige varianter har forskjellige smaker, teksturer og koketider.
    quinto_tuning_system:
      name: Quinto-stemmesystem
      description: Hvordan quintoen er stemt/spent.
    race_car_class:
      name: Racerbilklasse
      description: Konkurranseklasse/-kategori som bilen er bygget for (regelsett/homologeringsgruppering).
    racing_balaclava_face_opening_style:
      name: Stil for racingbalaklava med ansiktsåpning
      description: Ansiktsåpningen til balaklavaen, som påvirker hjelmens passform,
        forsegling og komfort.
    racing_balaclava_neck_coverage_length:
      name: Lengde på halsdekning for racingbalaklava
      description: Dekningslengden på halsskjørtet/-draperingen som er utformet for
        å legges inn i drakten/nakkefestet for forsegling og beskyttelse.
    racing_balaclava_ventilation_zones:
      name: Ventilasjonssoner for racingbalaklava
      description: Dedikerte pustende/nett eller ventilerte soner for å forbedre luftstrømmen
        under hjelmen.
    racing_chest_guard_intended_use:
      name: Tiltenkt bruk av brystbeskytter for racing
      description: Primær motorsportdisiplin eller kontekst som brystbeskytteren er
        designet for.
    racing_chest_guard_size_type:
      name: Størrelsestype for brystbeskyttelse for racing
      description: Angir om produktet har en størrelse for ungdom, voksen eller er
        universell/justerbar.
    racing_glove_certification_standard:
      name: Sertifiseringsstandard for racinghanske
      description: Spesifiserer sikkerhetssertifiseringen/standarden som racinghanskene
        overholder (f.eks. FIA, SFI, CE) og eventuelt vurdering/nivå når det er aktuelt.
    racing_goggles_lens_system:
      name: Linsesystem for racingbriller
      description: Angir systemet for linsebytte/avrivning som støttes av brillene.
    racing_helmet_certification_standard:
      name: Sertifiseringsstandard for racinghjelm
      description: Sikkerhetssertifiseringen(e) som racinghjelmen oppfyller.
    racing_kart_brake_type:
      name: Bremsetype for racerkart
      description: Primær bremsesystemtype montert på karten.
    racing_kart_class:
      name: Racingkart-klasse
      description: Konkurranseklasse eller regelsett som karten er bygget for å overholde.
    racing_kart_frame_material:
      name: Rammemateriale for racerkart
      description: Primær ramme-/chassismateriale for karten.
    racing_kart_seat_size:
      name: Størrelse på racingkartsete
      description: Kartsetestørrelsesbetegnelse brukt for montering.
    racing_neck_support_style:
      name: Stil for racing-nakkestøtte
      description: Strukturell stil på racingnakkestøtten/-armaturet og hvordan den
        samhandler med førerens overkropp/hjelm.
    racing_suit_certification_standard:
      name: Sertifiseringsstandard for racingdrakt
      description: Spesifiserer sikkerhetssertifiseringen/homologeringen for racing
        som drakten oppfyller (f.eks. FIA- eller SFI-standarder).
    racing_suit_cuff_design:
      name: Mansjettdesign for racingdress
      description: Type ankel-/håndleddsmansjett som brukes til å kobles til hansker/støvler
        og forbedre forsegling/komfort.
    racing_suit_size_system:
      name: Størrelsessystem for racingdrakt
      description: Størrelsessystem brukt for drakten (f.eks. Alpha S-XXL, Numeric
        EU/US, Youth).
    racing_truck_discipline:
      name: Disiplin for racinglastebiler
      description: Angir den primære racingdisiplinen/-formatet lastebilen er bygget
        for å konkurrere i.
    rack_side_configuration:
      name: Sidekonfigurasjon for stativ
      description: Indikerer om stativet oppbevarer matter på én eller begge sider,
        noe som påvirker plasseffektiviteten og tilgangen.
    rack_system_configuration:
      name: Hyllesystemkonfigurasjon
      description: Beskriver det generelle stativlayoutet/-formen på trommestativsystemet.
    racket_dampener_type:
      name: Racketdempertype
      description: Spesifiserer installasjonsmekanismen eller funksjonsstilen til
        racketvibrasjonsdemperen.
    racket_grip_size:
      name: Størrelse på racketgrep
      description: Spesifiserer den omkretsbaserte størrelsesklassifiseringen av rackethåndtaket
        (f.eks. G1–G6) for å sikre riktig håndtilpasning og komfort.
    racket_sport_shoe_court_surface:
      name: Baneoverflate for racket-sportssko
      description: Angir tennisbaneoverflaten som skoen er designet eller optimalisert
        for, og hjelper spillere med å velge fottøy med riktig yttersålemønster og
        gummiblanding for deres typiske spilleoverflate.
    racket_string_pattern:
      name: Strengmønster for racket
      description: Angir antall hovedstrenger x tverrstrenger (f.eks. 16 x 18) i strengmønsteret
        i racketen, noe som påvirker kontroll, spinn og holdbarhet.
    racket_stringing_status:
      name: Status for racketstrenging
      description: Angir om racketen leveres ferdig strenget, ustrenget eller fabrikkstrenget.
    racket_weight_class:
      name: Vektklasse for racket
      description: Tilbyr standard «U»-vektkategorier for badminton, slik at spillerne
        kan velge racketer innenfor sitt foretrukne vektområde.
    racquet_toy_set_equipment_included:
      name: Racketlekesett inkludert
      description: Lister opp hvilke varer som er inkludert i leken eller settet (f.eks.
        nett, baller, padler/racketer).
    racquetball_squash_training_aid_type:
      name: Type treningshjelpemiddel for racquetball og squash
      description: Klassifiserer den spesifikke typen treningshjelpemiddel eller -tilbehør,
        slik at kundene raskt kan finne det de trenger.
    radiator_cap_gasket_material:
      name: Pakningsmateriale i radiatorhette
      description: Materiale i tetningspakningen(e) som brukes på radiatorlokket.
    radiator_cap_pressure_relief_style:
      name: Trykkavlastende radiatorlokk
      description: Angir radiatorlokkets trykkavlastnings-/ventilerings-/aktiveringsstil,
        noe som kan påvirke utslipp, sikkerhet og tiltenkt bruk.
    radiator_expansion_tank_cap_application:
      name: Bruk for radiator-/ekspansjonstanklokk
      description: Identifiserer om lokket er beregnet for radiatorens påfyllingshals
        eller for en kjølevæskes ekspansjons-/overløpstank.
    radiator_fan_control_type:
      name: Kontrolltype for radiatorvifte
      description: Angir hvordan radiatorviften styres/utløses.
    radiator_fan_mounting_pattern:
      name: Monteringsmønster for radiatorvifte
      description: Angir monteringsstilen/-mønsteret som brukes til å feste viften
        eller vifteenheten.
    radiator_fan_type:
      name: Type radiatorvifte
      description: Angir funksjonstypen/konfigurasjonen til radiatorvifteenheten.
    radiator_hose_end_type:
      name: Endetype for radiatorslange
      description: Spesifiserer den primære forbindelsen/tetningstypen som brukes
        ved radiatorslangens ende(r) for å koble til radiator-/motorportene.
    radiator_hose_position:
      name: Plassering av radiatorslangen
      description: Funksjonell plassering/type av radiatorslange i kjølesystemet.
    radiator_hose_shape:
      name: Form for radiatorslange
      description: Generell slangegeometri/formfaktor brukt for installasjonsruting
        og montering.
    radiator_overflow_tank_level_sensor_provision:
      name: Nivåsensor for overløpstank i radiator
      description: Angir om tanken har eller støtter en kjølevæskenivåsensor.
    radiator_overflow_tank_shape:
      name: Form på overløpstank for radiator
      description: Generell formfaktor for overløpstanken.
    radish_variety:
      name: Reddikvariant
      description: Angir kultivar eller type reddik slik at kunden kan velge spesifikk
        smak, farge eller størrelseskarakteristikk (f.eks. daikon, Watermelon, French
        Breakfast).
    radius_of_hollow:
      name: Radius av hulrom
      description: Angir bladets hulprofil produsert av sliperen, uttrykt som vanlige
        diskret størrelser eller flat.
    rail_coverage_configuration:
      name: Konfigurasjon av sprinkeldekning
      description: Angir hvilke deler av sprinkelsengen trekksettet beskytter, og
        avklarer om kjøpet er et enkelt frontpanel eller et perimetersett med flere
        deler.
    rail_mount_standard:
      name: Standard skinnemontering
      description: Identifiserer skinne- eller monteringsgrensesnittstandarden som
        brukes til å feste et tilbehør (f.eks. sikte, lommelykt) til en luftpistol.
    rail_side:
      name: Skinnesiden
      description: Angir om erstatningsskinnen er til venstre side, høyre side eller
        selges som par.
    rail_style:
      name: Skinnestil
      description: Kategoriserer den overordnede utformingen eller konfigurasjonen
        av skinnen (f.eks. A-Frame, regnbuefarget, knekt), som bestemmer triksmuligheter
        og nødvendig plass.
    rail_system:
      name: Skinnesystem
      description: Identifiserer monteringsgrensesnittet for tilbehør som finnes på
        pistolen (f.eks. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Teknologi for regnsensor
      description: Følerprinsippet som brukes til å oppdage vann på frontruten.
    rain_suit_configuration:
      name: Regndraktkonfigurasjon
      description: Identifiserer om produktet er en onepiece-dress eller et sett med
        flere deler eller en annen konfigurasjon.
    rainstick_construction_type:
      name: Konstruksjonstype for regnstav
      description: Beskriver hvordan regnstaven er konstruert (tradisjonell kaktus/trerør
        vs. moderne alternativer).
    rainstick_fill_material:
      name: Fyllmateriale for regnstav
      description: Angir den interne fyllingen som brukes til å justere serielyd (f.eks.
        frø, perler).
    rainstick_playing_technique:
      name: Teknikk for spilling av regnstav
      description: Indikerer anbefalte spilleteknikkker eller håndteringsstil som
        brukes for å produsere den tiltenkte effekten på en regnstav.
    rainstick_sound_character:
      name: Lydkarakter for regnstav
      description: Beskriver den overordnede lydkarakteren produsert av regnstaven.
    raising_method:
      name: Oppdrettsmetode
      description: Beskriver hvordan dyrene ble oppdratt og ferdigbehandlet før bearbeiding
        (f.eks. gressfôret, beiteoppdrett, korn)
    rally_competition_class:
      name: Rallykonkurranseklasse
      description: Sanksjonsorgan eller regelsettklasse som rallybilen er bygget for
        (der det er kjent).
    rally_surface_setup:
      name: Rally – overflateoppsett
      description: Primær overflate/terreng for oppsett av rallybilen eller byggemål.
    ramp_surface_texture:
      name: Overflatetekstur på rampe
      description: Beskriver overflaten eller grepsnivået på rampens kjøreflate.
    ratchet_mounting_style:
      name: Monteringsstil for skralle
      description: Hvordan den musikalske skrallen holdes eller monteres under spilling
        eller oppsett.
    rattle_element_material:
      name: Materiale for rangleelement
      description: Materialet i raslende elementene (f.eks. tenner/klirring/perler)
        som danner den karakteristiske summingen/ranglingen.
    rattle_type:
      name: Rasletype
      description: Angir om agnet inneholder en intern rasle eller et lydkammer, og
        i så fall hvilken type rasle som brukes.
    rc_airship_lifting_gas_type:
      name: Radiostyrt luftskip – løftegasstype
      description: Angir hvilken gass luftskipets/blimpen konvolutten er ment å fylles
        med (hvis aktuelt).
    rc_helicopter_control_frequency:
      name: Kontrollfrekvens for radiostyrt helikopter
      description: Radiofrekvensbåndet som brukes mellom kontrollern og helikopteret,
        som påvirker interferensmotstand og kompatibilitet (f.eks. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Stabiliseringsfunksjoner for radiostyrt helikopter
      description: Viser stabilitets-/kontrollassistansefunksjoner som gjør flygingen
        enklere eller legger til funksjonalitet.
    rc_motorcycle_controller_type:
      name: Kontrollertype for radiostyrt motorsykkel
      description: Formfaktor for den inkluderte kontrolleren.
    rc_plane_takeoff_launch_method:
      name: Metode for avgang/lansering av radiostyrt fly
      description: Hvordan flyet vanligvis lanseres / tar av, påvirker hvor og hvordan
        det kan brukes.
    rc_vehicle_controller_type:
      name: Radiostyrt kjøretøys kontrollertype
      description: Angir kontrollerens formfaktor som brukes til å betjene RC-kjøretøyet.
    rc_vehicle_scale:
      name: Skala for radiostyrt kjøretøy
      description: Angir skalaforholdet (størrelsesklassen) til den fjernstyrte bilen/lastebilen
        (f.eks. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Terrengtype for fjernstyrt kjøretøy
      description: Angir det primære terrenget den fjernstyrte bilen/lastebilen er
        konstruert for.
    reach_adjustment_type:
      name: Rekkeviddes justeringstype
      description: Angir om avstanden mellom spakbladet og rattet kan justeres, og
        hvis justerbart, om justeringen er verktøyfri eller krever verktøy.
    rear_axle_spacing:
      name: Bakaksels avstand
      description: Gaffelenden/akselstørrelsen som baksiden av rammen er designet
        for å godta, noe som påvirker hjulkompatibiliteten.
    rear_axle_standard:
      name: Bakaksel-standard
      description: Definerer akselgrensesnittet/formatet som brukes av bakhjulet (f.eks.
        hurtigkobling, ulike gjennomgående akselstørrelser).
    rear_axle_type:
      name: Bakakseltype
      description: Angir festesystemet og akseldiameteren som brukes for å feste bakhjulet
        til rammen.
    rear_coverage:
      name: Bakdekning
      description: Angir hvor mye av rumpa bikinitrusen dekker (f.eks. litt, fyldig).
    rear_opening_type:
      name: Bakre åpningstype
      description: Beskriver stilen på bakre tilgang eller «rumpeklaff»-funksjonen
        for praktisk bruk på badet, for eksempel droppsete eller full glidelås bak.
    rear_seat_configuration:
      name: Baksetekonfigurasjon
      description: Angir konfigurasjonen av bakseteenheten for støttemontering og
        valg av indre layout.
    rear_view_mirror_ornament_attachment_type:
      name: Type feste for bakspeilpynt
      description: Angir hvordan pynten festes til bakspeilets stamme eller kropp
        (f.eks. løkke, klips, krok).
    rearview_mirror_mount_attachment_type:
      name: Festetype for feste til bakspeil
      description: Definerer hvordan festet fysisk festes til bakspeilet (speilhus
        eller -stamme), for eksempel klemme, klips, stropp, selvklebende pute eller
        boltbrakett.
    rebound_board_face_type:
      name: Returbrettets ansiktstype
      description: Beskriver overflatekonfigurasjonen som bestemmer returoppførselen,
        for eksempel flate eller vinklede design, eller design med flere ansikt.
    rebound_level:
      name: Returnivå
      description: Angir hvor mye veggballen spretter tilbake etter treff, noe som
        hjelper brukerne med å velge mellom design uten og med moderat sprett.
    rebound_surface_configuration:
      name: Konfigurasjon av returoverflaten
      description: Spesifiserer layout av returflater og forutsigbarheten til returer
        (enkelt-, to- eller flersidig; forutsigbar vs. uforutsigbar).
    rebounder_design:
      name: Design på ballreturnerer
      description: Definerer produktets strukturelle stil eller konfigurasjon av den
        returnerende overflaten.
    rebounder_design_type:
      name: Rebounder-type
      description: Angir den primære returmekanismen eller konstruksjonsstilen til
        treningsapparatet (f.eks. elastisk snorbase, innrammet nett, popup-mål).
    rebounder_sides:
      name: Rebounder-sider
      description: Angir om rebounderen kan returnere baller fra én eller begge sider.
    rebounding_mechanism_type:
      name: Type returneringsmekanisme
      description: Spesifiserer teknologien som brukes til å returnere pucken eller
        ballen (f.eks. gummifanger, strikksnor).
    recipient_relationship:
      name: Mottakerforhold
      description: Tiltenkt mottakerrelasjon (f.eks. mamma, pappa, venn) for hilsenen.
    recliner_control_type:
      name: Kontrolltype for liggestol
      description: Angir hvordan tilbakeleningsmekanismen betjenes (f.eks. manuell
        spak, elektrisk knappepanel, fjernkontroll).
    recliner_motion_type:
      name: Bevegelsestype for lenestol
      description: Definerer den primære bevegelsesfunksjonaliteten til liggestolen
        (f.eks. gyngestol, glider, svivel, veggfester, heis).
    reclining_mechanism:
      name: Liggemekanisme
      description: Angir mekanismen som brukes til å betjene sofaens tilbakeleningsfunksjon.
    recommended_candle_format:
      name: Anbefalt stearinlysformat
      description: Indikerer anbefalte stearinlysformater for selvklebende vekeviftene
        er beregnet for.
    recommended_container_type:
      name: Anbefalt beholdertype
      description: Beholdermaterialer som er anbefalte/trygge for gelvokslys.
    recommended_fabric_type:
      name: Anbefalt stofftype
      description: Anbefalte stoffer for best resultat med symønsteret.
    recommended_fabric_weight:
      name: Anbefalt stoffvekt
      description: Angir anbefalt stoffvektkategori for mønsteret.
    recommended_food_pairing:
      name: Anbefalt matparing
      description: Identifiserer de primære proteinene eller rettene sausen er beregnet
        på (f.eks. kylling, svinekjøtt, storfekjøtt, fisk, grønnsaker).
    recommended_lane_condition:
      name: Anbefalt banetilstand
      description: Indikerer oljemønsteret eller banetilstanden som ballen er designet
        for.
    recommended_motor_impulse_class:
      name: Anbefalt motorisk impulsklasse
      description: Angir anbefalt total impuls-klasse for modellrakettmotor for sikker/optimal
        flyging.
    recommended_reading_level:
      name: Anbefalt leseferdighetsnivå
      description: Angir anbefalt lesetrinn/-evne for produktet, for å hjelpe kunden
        med å matche det med et barns nåværende leseutvikling.
    recommended_sleep_position:
      name: Anbefalt sovestilling
      description: Identifiserer hvilke sovestillinger madrassen er designet for å
        støtte komfortabelt (f.eks. side- eller ryggsovere).
    recommended_storage:
      name: Anbefalt oppbevaring
      description: Angir hvordan produktet burde oppbevares for å bevare ferskheten.
    recommended_surfaces:
      name: Anbefalte overflater
      description: Spesifiserer de tiltenkte limoverflatene/materialkategoriene for
        limet, hinsides generell brukskompatibilitet (f.eks. kun papir vs. flere overflater).
    recommended_use_case:
      name: Anbefalt brukstilfelle
      description: Primært tiltenkt bruksscenario for tetningsmidlet (midlertidig/nødreparasjon
        vs. langsiktig reparasjon).
    recommended_use_location:
      name: Anbefalt brukssted
      description: Tiltenkt bruksmiljø for vippen (privat hage kontra lekeplass med
        kommersiell standard, osv.).
    recommended_vehicle_surfaces:
      name: Anbefalte kjøretøyoverflater
      description: Spesifiserer kjøretøyoverflatene/-finishene børsten er ment å være
        trygg for (f.eks. gjennomsiktig lakk, matt/satenglakk, vinylfolie/PPF, glass,
        felger).
    recorder_accessories_included:
      name: Inkludert opptakertilbehør
      description: Lister opp tilbehøret som følger med stor bassblokkfløyte.
    recorder_bore_design:
      name: Bordesign for blokkfløyte
      description: Den interne boreprofilutformingen av blokkfløytekroppen.
    recorder_bore_type:
      name: Hulltype for blokkføyte
      description: Angir boretypen til blokkfløyten.
    recorder_case_shell_type:
      name: Skalltype for opptakereske
      description: Beskriver kassens strukturelle stivhet.
    recorder_finish:
      name: Blokkfløyte-finish
      description: Overflatebehandling/-finish av blokkfløytekroppen (spesielt relevant
        for altoblokkfløyter av tre).
    recorder_hole_type:
      name: Hulltype for blokkfløyte
      description: Om tonehullene er enkle (ingen doble hull) eller inkluderer doble
        hull for forbedret kromatisk fingersetting.
    recorder_joint_configuration:
      name: Konfigurasjon av blokkfløyteledd
      description: Beskriver hvor mange kroppsseksjoner blokkfløyten har, noe som
        påvirker bærbarhet, rengjøring og utskifting av deler.
    recorder_joint_style:
      name: Skjøtestil for blokkfløyte
      description: Ledd-/forbindelsestypen mellom blokkfløyteseksjonene, hvis aktuelt.
    recorder_keywork:
      name: Blokkfløyte-mekanikk
      description: Angir om blokkfløyten har klaviatur(er) (metall-/plastmekanismer)
        for lave toner, typisk på tenor-/bass-/store blokkfløyter.
    recorder_mouthpiece_type:
      name: Munnstykketype for blokkfløyte
      description: Beskriver om blokkfløytens munnstykke/hodestykke er integrert (i
        ett stykke) eller avtakbart/utskiftbart.
    recorder_pitch_standard_a4:
      name: Standard blokkfløytetone (A4)
      description: Angir tonehøydereferansen blokkfløyten er bygget for (f.eks. A=440
        Hz moderne tonehøyde vs. A=415 Hz barokktonehøyde).
    recorder_thumb_hole_type:
      name: Tommehulltype for blokkfløyte
      description: Angir om blokkfløyten har et enkelt tommelhull eller et dobbelt
        tommelhull.
    recreational_vehicle_holding_tank_type:
      name: Type septiktank for fritidskjøretøy
      description: Angir hvilke septiktanker bobilen har.
    recreational_vehicle_leveling_system:
      name: Nivelleringssystem for fritidskjøretøy
      description: Type nivellerings-/stabiliseringssystem installert.
    recycled_material_content:
      name: Innhold av resirkulert materiale
      description: Angir andelen av plagget som er laget av resirkulerte fibre eller
        garn.
    reed_dent_material:
      name: Materiale i skjeens lameller
      description: Materiale i tennene/lamellene i skjeen (elementene som skiller
        renningstrådene), som påvirker slitestyrke og slitasje på garnet.
    reed_type:
      name: Rørbladtype
      description: Angir rørbladkonstruksjonstypen som brukes av sekkepipen og droner.
    reeds_included:
      name: Rørblad inkludert
      description: Angir hvilke rørblad som følger med settet med Great Highland-sekkepipe
        (for chanter og/eller drone) og om de er av spanskrør eller syntetiske materialer.
    reefing_method:
      name: Metode for reving
      description: Indikerer mekanismen (hvis noen) for å redusere eller oppbevare
        seilet mens på vann.
    reel_profile:
      name: Snelleprofil
      description: Klassifiserer den strukturelle stilen/profilen til agnkasting-snellekroppen.
    reel_seat_material:
      name: Materiale for snellefeste
      description: Spesifiserer konstruksjonsmaterialet til snellefestet, som påvirker
        vekt, følsomhet og korrosjonsmotstand.
    reel_seat_type:
      name: Snellefestetype
      description: Angir låsemekanismen som fester fluesnellen til stangen.
    reel_size_class:
      name: Størrelsesklasse for snelle
      description: Produsentutpekt størrelsesvurdering (f.eks. 1000, 3000, 5000) som
        indikerer spolekapasitet og helhetlig snellekonstruksjon.
    referee_wallet_accessories_included:
      name: Tilbehør til digital lommebok for dommere inkludert
      description: Viser de ekstra varene som følger med en dommer-lommebok, som rødt/gult
        kort, poengark eller skriveverktøy, slik at kjøper vet om den lommeboken selges
        som et komplett sett.
    refinement_level:
      name: Raffineringsnivå
      description: Angir raffineringsgraden oljen har gjennomgått, noe som påvirker
        smak, farge, næringsinnhold og røkpunkt.
    reflective_finish:
      name: Reflekterende overflate
      description: Spesifiserer den reflekterende overflatebehandlingen til en diskokule
        (f.eks. speilfliser kontra holografiske/iriserende effekter).
    reflective_or_glow_effect:
      name: Reflekterende eller glødende effekt
      description: Angir om antennekulen har synlighetseffekter som reflekterende
        materiale, selvlysende elementer eller lysende/LED-elementer.
    reflective_tape_pattern:
      name: Reflekterende tapemønster
      description: Beskriver konfigurasjonen av refleksbånd på plagget som brukes
        for å oppfylle synlighetskrav.
    regulation_standard:
      name: Reguleringsstandard
      description: Angir den offisielle standarden eller dimensjonen/sertifiseringen
        fra det styrende organet som nettet oppfyller.
    regulator_diaphragm_material:
      name: Materiale for regulatormembran
      description: Spesifiserer membranmaterialet, som påvirker kompatibilitet mellom
        drivstoff/etanol (f.eks. E85) og holdbarhet.
    regulator_port_thread_standard:
      name: Gjengestandard for regulatorport
      description: Spesifiserer portgjenge-/forbindelsesstandarden som brukes på regulatorhuset
        for innløps-/utløps-/returporter.
    rein_features:
      name: Funksjoner for tøyle
      description: Fremhever spesielle funksjonelle eller sikkerhetsmessige funksjoner
        som finnes på tøylene.
    rein_style:
      name: Tøylestil
      description: Identifiserer tøylenes strukturelle design eller konfigurasjon,
        slik at rytterne kan velge riktig type for sin disiplin og personlige preferanser.
    reinforced_areas:
      name: Forsterkede områder
      description: Identifiserer hvilke deler av plagget som er forsterket for holdbarhet
        mot slitasje.
    reinforcement_type:
      name: Armeringstype
      description: Konstruksjonsarmering brukt i radiatorslangen for styrke og temperatur-/trykkmotstand.
    release_activation_method:
      name: Metode for aktivering av frigivelse
      description: Spesifiserer hvordan en utløserhjelp for bueskyting utløses av
        bueskytteren.
    release_bearing_material:
      name: Materiale i utløserlager
      description: Primærmateriale i lager-/anleggsdelene (der dette er oppgitt av
        produsenten).
    release_jaw_style:
      name: Utløserkjevestil
      description: Beskriver utformingen av utløserhodets kjever eller krok.
    release_strap_type:
      name: Utløserstropptype
      description: Identifiserer stroppen eller forbindelsessystemet som følger med
        utløserhjelpemiddel for bueskyting.
    remote_control_airship_envelope_material:
      name: Konvoluttmateriale for fjernstyrt luftskip
      description: Spesifiserer hovedmaterialet i luftskipets/blimpens konvolutt (gasspose),
        som skiller seg fra det generelle leketøysmaterialet.
    remote_control_motorcycle_scale:
      name: Skala for fjernstyrt motorsykkel
      description: Skalaen til den fjernstyrte motorsykkelen i forhold til en ekte
        motorsykkel (hvis den er modellert som et skalakjøretøy).
    remote_control_motorcycle_terrain_suitability:
      name: Terrengegnethet for fjernstyrt motorsykkel
      description: Primærterrenget som fjernstyrte motorsykkelen er designet for å
        kjøre i.
    remote_control_motorcycle_water_resistance:
      name: Vannmotstand for fjernstyrt motorsykkel
      description: Vannbeskyttelsesnivå for den elektroniske radiostyrste motorsykkelen.
    remote_control_plane_kit_completion_level:
      name: Fullføringsnivå for fjernstyrt flysett
      description: Angir hva som er inkludert og hvor komplett settet er (f.eks. klar
        til å fly vs. krever separat sender/mottaker/batteri).
    remote_control_plane_landing_gear_type:
      name: Type landingsutstyr for fjernstyr fly
      description: Indikerer konfigurasjonen av landingsunderstellet, som påvirker
        holdbarhet og start-/landingsflater.
    remote_control_plane_power_type:
      name: Strømtype for fjernstyrt fly
      description: Spesifiserer hvordan flyet drives/propelleres (elektrisk vs. glød/gass/nitro),
        noe som påvirker vedlikehold, støy og hvor det kan flys.
    remote_control_watercraft_features:
      name: Funksjoner for fjernstyrte farkost
      description: Fremhever viktige funksjoner spesifikt for radiostyrt farkost som
        påvirker brukervennlighet og holdbarhet.
    remote_control_watercraft_propulsion_drive_type:
      name: Type propulsjon/fremdrift for fjernstyrt farkost
      description: Angir hvordan det fjernstyrste farkostet kjøres i vannet.
    remote_control_watercraft_water_environment:
      name: Fjernstyrt farkost i vannmiljø
      description: Indikerer den tiltenkte vannstanden der det fjernstyrte fartøyet
        yter best.
    remote_keyless_system_programming_method:
      name: Programmeringsmetode for fjernstyrt nøkkelfritt system
      description: Hvordan fjernkontrollen/systemet er programmert eller paret med
        kjøretøyet (f.eks. introduksjonsprosedyre kontra profesjonelt verktøy).
    repair_compound_type:
      name: Reparasjonsblandingstype
      description: Type/formulering av det inkluderte forbruksmaterialet for reparasjon
        (f.eks. type karosserifyllstoff, type frontruteharpiks, type dekkpluggsement/tetningsmiddel).
    repair_kit_components:
      name: Komponenter i reparasjonssett
      description: Lister opp de spesifikke varene som er inkludert i reparasjonssettet,
        slik at kunden kan forstå innholdet og sammenligne pakker.
    repair_method:
      name: Reparasjonsmetode
      description: Spesifiserer den primære reparasjonsmetoden settet bruker, for
        eksempel selvklebende lapper eller ventilutskifting.
    replacement_part_purpose:
      name: Formål med reservedel
      description: Angir om varen er en OEM-erstatningsdel, en oppgraderings-/ytelsedel
        eller et ekstratillegg.
    replacement_part_type:
      name: Type reservedel
      description: Identifiserer den funksjonelle kategorien til ellipsemaskindelen,
        slik at kundene kan filtrere etter komponenten de trenger.
    replacement_parts_availability:
      name: Tilgjengelighet for reservedeler
      description: Angir om forbruksdeler / utskiftbare deler støttes for gjengeskjæreren
        (f.eks. erstatningskroker/-vaiere).
    replica_gun_action_type:
      name: Handlingstype for replikapistol
      description: Angir drifts-/handlingstypen til replikavåpenet (som representert),
        for eksempel boltmekanisme eller spakemekanisme.
    replica_gun_firing_mechanism:
      name: Avfyringsmekanisme for replikavåpen
      description: Indikerer om og hvordan kopien simulerer avfyring/funksjon (ikke-dødelig),
        for eksempel som løspatronpistol eller uten avfyringsfunksjon.
    replica_gun_moving_parts:
      name: Bevegelige deler på replikavåpen
      description: Angir hvilke deler som er funksjonelle/bevegelige på replikaen.
    reservoir_orientation:
      name: Reservoarorientering
      description: Angir den tiltenkte retningen eller profilen til blæren i pakken.
    reservoir_type:
      name: Reservoartype
      description: Type beholderkonfigurasjon for clutch-hovedsylinderen.
    resin_suitability:
      name: Harpiks-egnethet
      description: Angir om håndballen er designet for bruk med harpiks (lim) eller
        om den er harpiksfri.
    resistance_adjustability:
      name: Motstandsjustering
      description: Angir om pustemotstanden kan endres av brukeren.
    resistance_band_design:
      name: Motstandsbånddesign
      description: Beskriver den fysiske formen eller stilen til et motstandsbånd
        (f.eks. løkke, rør med håndtak, 8-figur), som hjelper kunder med å velge riktig
        design for treningsrutinen sin.
    resistance_loading_type:
      name: Type motstandsbelastning
      description: Angir hvordan motstand/vekt tilføres eller lastes på Smith-maskinen
        (f.eks. plater eller utvalgt vektstabel).
    response_fields_included:
      name: Svarfelt inkludert
      description: Angir hvilke standard svarfelt/alternativer som finnes på svarkortet
        (f.eks. godta/avslå, måltidsvalg).
    restoration_status:
      name: Restorasjonsstatus
      description: Angir om varebilen er original, restaurert, ombygd eller trenger
        arbeid.
    rhinestone_base_color_family:
      name: Fargefamilie for rhinsteinbase
      description: Identifiserer fargefamilien til rhinsteinbasen (f.eks. gjennomsiktig/krystall,
        gull/gul, blå).
    rhinestone_facet_style:
      name: Rhinsteinfasettstil
      description: Rhinsteinens forside-/fasettmønster som påvirker gnisten og utseendet
        (f.eks. Xilion-rosa, briljantslipt, fasetter vs. glatt).
    rhinestone_hole_reinforcement_material:
      name: Forsterkningsmateriale for hull i rhinstein
      description: Materiale rundt/ved hullene (f.eks. metallmalje, støpt plast) som
        påvirker holdbarheten under sying.
    rhinestone_setting_type:
      name: Innfatningstype for rhinstein
      description: Hvordan steinen monteres/kantes for sying (f.eks. tindinnfatning,
        kroneinnfatning, kantinnfatning)
    rhubarb_product_cut_type:
      name: Kuttet type for rabarbraprodukt
      description: Beskriver den fysiske tilberedningen eller kuttingen av rabarbraproduktet.
    ribbon_construction:
      name: Båndkonstruksjon
      description: Beskriver viktige konstruksjonstrekk ved grosgrain-bånd, som for
        eksempel at det er kablet eller elastisk, noe som endrer bruken (f.eks. sløyfer
        kontra sying).
    ribbon_packaging_type:
      name: Båndemballasjetype
      description: Angir hvordan båndet medføler/selges.
    ribbon_pattern_style:
      name: Båndmønsterstil
      description: Klassifiserer mønsterapplikasjonsmetoden som vanligvis brukes på
        grosgrain-bånd.
    ribbon_sheen_level:
      name: Båndets glansnivå
      description: Indikerer den visuelle glansen på satengbåndets overflate.
    ribbon_style:
      name: Båndstil
      description: Angir det visuelle mønsteret/stilen til båndet (f.eks. ensfarget,
        stripete, trefarget).
    ribbon_trim_backing_type:
      name: Baksidetype for bånd-/kant
      description: Angir om båndet/kanten har bakside og hvilken type (for enkel påføring).
    ribbon_trim_edge_finish:
      name: Kantfinish for bånd/trim
      description: Beskriver kantkonstruksjonen/-finishen på båndet/trimmen (nyttig
        for frynseegenskaper og tiltenkt bruk).
    ric_rac_wave_size:
      name: Ric-rac-bølgestørrelse
      description: Beskriver bølgeomfanget/-skalaen til ric-racen (hvor store sikksakk-bølgene
        er).
    rice_grain_length:
      name: Riskornlengde
      description: Klassifiserer risprodukter etter kjernelengde, for eksempel kortkornet,
        medium kornet eller langkornet, som påvirker kokeegenskaper og kulinarisk
        bruk.
    rice_processing_method:
      name: Behandlingsmetode for ris
      description: Beskriver hvordan risen har blitt bearbeidet eller tilberedt (f.eks.
        forkokt, spiret, flaket), som påvirker koketid, næringsinnhold og bruk.
    rice_variety:
      name: Risvariant
      description: Spesifiserer den spesifikke varianten eller kultivaren av ris,
        slik at kunder kan velge korn med foretrukket smak, aroma, tekstur og tiltenkt
        matlaging.
    riding_toy_features:
      name: Funksjoner for rideleken
      description: Fremhever vanlige funksjonelle/sikkerhetsmessige funksjoner som
        er spesifikke for rideleker.
    rifle_action_type:
      name: Mekanismetype for gevær
      description: Geværets betjeningsmekanisme (hvordan det lades/avfyres/utløses),
        viktig for identifisering og samlerinteresse.
    rifle_finish:
      name: Geværfinish
      description: Primær utvendig finish/belegg av metallarbeidet.
    rifle_magazine_type:
      name: Type geværmagasin
      description: Type matingssystem for geværet.
    rifle_stock_material:
      name: Materiale for geværkolbe
      description: Primærmateriale brukt til geværkolbe/-stokk (f.eks. valnøtt, polymer).
    rim_clamping_method:
      name: Felgklemmemetode
      description: Hvordan maskinen fester hjulet/felgen under montering og demontering.
    rim_strip_type:
      name: Type felgbånd
      description: Klassifiserer felgbånd/felgtape etter utforming, konstruksjon eller
        spesifikk bruksområde (f.eks. felgtape for slangeløst oppsett vs. beskyttende
        gummibånd).
    rim_tubeless_compatibility:
      name: Kompatibilitet med slangeløs felg
      description: Angir om felgen, tapen eller hjulet er konstruert for slangeløs
        edekkoppsett.
    ripeness_stage:
      name: Modenhetsstadium
      description: Angir modenhetsnivået til frukten på salgstidspunktet (f.eks. umoden,
        moden, klar til å spises).
    riser_pad_type:
      name: Type forhøyningspute
      description: Klassifiserer putens funksjonelle stil (f.eks. standard avstandsstykke,
        støtdempende, vinklet kile).
    roasted_malt_processing_type:
      name: Behandlingstype for ristet malt
      description: Den spesifikke bearbeidingsmetoden eller -varianten som brukes
        for å lage ristet malt eller ristet korn (f.eks. umaltet ristet bygg, svartmalt,
        variant uten skall).
    robotic_toy_interaction_mode:
      name: Samhandlingsmodus for robotleke
      description: Beskriver den primære måten roboten samhandler eller beveger seg
        på under lek.
    robotic_toy_light_features:
      name: Lysfunksjoner for robotleke
      description: Angir om og hvordan leken bruker lys som en del av leken (f.eks.
        LED-lys, projeksjon).
    robotic_toy_programming_supported:
      name: Støtter programmering av robotleker
      description: Spesifiserer hvilken programmeringsmetode, om noen, leken støtter.
    robotic_toy_skill_level:
      name: Ferdighetsnivå for robotleketøy
      description: Angir kompleksitetsnivået for drift/programmering som forventes
        av brukeren.
    robotic_toy_sound_features:
      name: Lydfunksjoner for robotleketøy
      description: Indikerer lydfunksjonaliteten til robotleken.
    rod_butt_style:
      name: Utforming av stangbutt
      description: Definerer konfigurasjonen av stangens bakende som brukes til dorging.
    rod_construction_type:
      name: Konstruksjonstype for stang
      description: Indikerer den generelle byggestilen til stangen når det gjelder
        deler og sammenleggbarhet.
    rod_guide_material:
      name: Materiale for stangføring
      description: Angir materialet som brukes til fiskestangens snøreføringer eller
        innlegg, noe som påvirker holdbarhet, vekt og snørefriksjon.
    rod_guide_type:
      name: Stangføringstype
      description: Angir den primære typen lineførere som er installert på stangen.
    rod_handle_type:
      name: Håndtakstype for stang
      description: Spesifiserer grepkonfigurasjonen til en fiskestang, noe som bidrar
        til komfort og valg av teknikk.
    roll_cage_tubing_material:
      name: Materiale i veltebøyle-rør
      description: Spesifiserer rørmaterialet/legeringen som brukes til velteburet/veltebøylen
        (f.eks. DOM-stål vs. 4130 krommolybdenstål).
    roller_skate_brake_shape:
      name: Bremseform for rulleskøyte
      description: Beskriver de geometriske formene/profilen til bremsehodet for ytelse
        eller estetiske preferanser.
    roller_skate_brake_type:
      name: Bremsetype for rulleskøyte
      description: Spesifiserer bremsesystemet som brukes på rulleskøyter.
    roller_ski_technique:
      name: Rulleskiteknikk
      description: Identifiserer langrennsteknikken rulleskiene er designet for.
    roller_technology:
      name: Rullteknologi
      description: Indikerer integrert teknologi som forbedrer massasjeytelser, for
        eksempel vibrasjon eller varme.
    rolling_case_wheel_configuration:
      name: Hjulkonfigurasjon for trillekoffert
      description: Angir hjuloppsettet som brukes på trillekofferter for elektriske
        keyboard.
    rolling_paper_format:
      name: Format for rullepapir
      description: Identifiserer den fysiske presentasjonen av produktet (f.eks. flate
        ark, forhåndsrullede kjegler, ruller).
    rolling_paper_gum_type:
      name: Gummitype på rullepapir
      description: Angir hvilket lim (gummi) som brukes på papirkanten til forsegling,
        noe som kan påvirke smak og yteevne.
    rolling_paper_size:
      name: Størrelse på rullepapir
      description: Angir standard størrelsesklassifisering for rullepapiret eller
        -kjeglen, slik at kunden raskt kan velge riktig bredde/lengde for sine behov.
    rolling_stock_type:
      name: Type togmateriell
      description: Angir hva slags tog/skinnekjøretøy modellen er (lokomotiv kontra
        person-/godsvogner og vanlige vognundertyper).
    roof_cargo_net_hook_fastener_style:
      name: Krok/feste for lastenett i taket
      description: Angir typen endemaskinvare som brukes til å koble nettet til forankringspunkter
        (f.eks. S-krok, karabinkrok, J-krok).
    roof_height_class:
      name: Høydeklasse for tak
      description: Kategoriserer takhøyde som vanligvis brukes for varebiler (spesielt
        relevant for konvertering/veksling/bygging av campingvogner).
    roof_type:
      name: Taktype
      description: Konfigurasjon av skapets takseksjon.
    root_variety:
      name: Rotvariant
      description: Identifiserer rotvarianten eller den vanlige rottypen (f.eks. pepperrot
        kontra ekte wasabi-varianter).
    rope_buoyancy:
      name: Oppdrift for tau
      description: Angir om tauet er designet for å flyte på vannoverflaten, noe som
        hjelper rytterne med å unngå å vikle seg inn og forenkler henting.
    rope_construction:
      name: Taukonstruksjon
      description: Angir fiberoppbygging utover flettetype, for eksempel tvunnet kontra
        flettet kjerne/kappe, og om tauet er av kernmantel‑type.
    rope_material:
      name: Taumateriale
      description: Identifiserer materialet i stemmetauet/-snoren.
    rope_strand_compatibility:
      name: Kompatibilitet med tautråder
      description: Angir hvilke tau- og strengkonfigurasjoner sikringsenheten kan
        referere til (enkel, halv/dobbel, tvilling eller kombinasjoner).
    rope_stretch_type:
      name: Strekktype for tau
      description: Beskriver tauets strekkegenskaper, og skiller mellom stilene ikke-elastiske,
        lav-elastiske, standard eller svært elastisk tau.
    rose_bloom_stage:
      name: Roseblomstringsfase
      description: Angir hvor åpne roseblomstene er ved levering/ankomst (fra knopp
        til helt åpne).
    rose_grade:
      name: Rosegrad
      description: Kommersiell kvalitetsgrad av snittroser.
    rosette_center_type:
      name: Rosett-sentertype
      description: Angir type senterinformasjon eller innlegg foran på rosetten.
    rosin_dust_level:
      name: Nivå av harpiksstøv
      description: Angir forventet mengde harpiksstøv som produseres ved normal bruk.
    rosin_formula_additives:
      name: Harpiksformel/-tilsetningsstoffer
      description: Identifiserer viktige formuleringsegenskaper som hypoallergenisk,
        støvfattig eller metallinfuserte blandinger.
    rosin_hardness:
      name: Harpikshardhet
      description: Indikerer den relative hardheten/mykheten til bueharpiks, noe som
        kan påvirke grep og støvdannelse i ulike klimaer og spillestiler.
    rotation_mechanism_type:
      name: Type rotasjonsmekanisme
      description: Spesifiserer mekanismen som lar tauet rotere, som påvirker smidighet
        og oppnåelig hastighet (f.eks. kulelager kontra lagerhylser).
    rotation_motion_features:
      name: Rotasjons-/bevegelsesfunksjoner
      description: Angir om planeter/baner roterer eller beveger seg, og hvordan.
    rotor_configuration_type:
      name: Konfigurasjonstype for rotor
      description: Angir rotoroppsett og styringsprinsipp for det radiostyrte helikopteret
        (for eksempel koaksial, énrotors fast stigning kontra kollektiv stigning,
        multirotor), noe som har stor betydning for flygeegenskaper og egnethet for
        ulike ferdighetsnivåer.
    rotor_construction_type:
      name: Konstruksjonstype for rotor
      description: Spesifiserer rotorens byggestil, som påvirker vekt, stivhet og
        varmehåndtering.
    rotor_mounting_interface:
      name: Monteringsgrensesnitt for rotor
      description: Definerer navgrensesnittstandarden som brukes til å feste rotoren
        til hjulet.
    rotor_mounting_standard:
      name: Monteringsstandard for rotor
      description: Angir grensesnittstandarden som brukes for å feste rotoren til
        navet (f.eks. 6-bolts eller senterlås).
    roulette_set_components_included:
      name: Inkluderte komponenter i rulettsett
      description: Viktige rulettrelaterte komponenter følger med hjulet/settet.
    roulette_wheel_ball_track_type:
      name: Ballsporingstype for ruletthjul
      description: Beskriver stilen til ballspor som brukes på hjulet, noe som påvirker
        realismen og spillefølelsen.
    roulette_wheel_numbering_system:
      name: Nummereringssystem for ruletthjul
      description: Indikerer nummereringen og nullkonfigurasjonen på ruletthjulet
        for kompatibilitet mellom spilling/odds.
    rounders_equipment_included:
      name: Inkludert rounders-utstyr
      description: Lister de spesifikke runders-elementene eller tilbehørene som følger
        med treningssettet, slik at kjøperne vet nøyaktig hva som er i esken.
    rounders_governing_body_approval:
      name: Godkjenning fra roundersforbund
      description: Angir sertifisering eller godkjenning fra et offisielt rounders‑
        eller annet idrettsforbund.
    row_counter_format:
      name: Radtellerformat
      description: Angir formatet/typen strikkeradteller (for eksempel ring, kjede,
        «klikker», digital).
    row_counter_mechanism:
      name: Radtellermekanisme
      description: Angir hvordan radtallet føres videre / registreres på verktøyet.
    row_counter_mounting_method:
      name: Monteringsmetode for radteller
      description: Hvordan telleren/markøren festes under bruk (til nålen, fingeren,
        utstikkeren osv.).
    rowel_type:
      name: Sporehjulstype
      description: Beskriver formen eller kantprofilen til sporehjulet for rytterens
        preferanser og hestens følsomhet.
    rowing_machine_part_type:
      name: Deltype romaskin
      description: Identifiserer den spesifikke komponenten produktet er ment å erstatte
        på en romaskin, slik at kunder raskt kan finne nøyaktig den delen de trenger
        uten å måtte opprette en eksplosjon av mikrokategorier.
    rubber_ducky_character_theme:
      name: Karakter/tema for gummiand
      description: Tema eller karakterstyling av gummianden (nyttig for moro-/samleender).
    rubber_ducky_features:
      name: Funksjoner for gummiand
      description: Funksjonelle/designmessige funksjoner spesifikke for gummiand-badeleker.
    rubber_ducky_size_class:
      name: Størrelsesklasse for gummiand
      description: En kundevennlig størrelsesgruppering for gummiender basert på typisk
        bruk (badekarleke vs. kaketopper vs. jumbo).
    ruffle_style:
      name: Rysjestil
      description: Beskriver utforming eller visuelt preg på volangen på stoltrekket.
    rugby_headgear_safety_certification:
      name: Sikkerhetssertifisering for rugbyhodetøy
      description: Angir om hodeutstyret oppfyller offisielle sikkerhetsstandarder
        for rugby eller generelle idrettssikkerhetsstandarder.
    rugby_size:
      name: Rugbystørrelse
      description: Kategoriserer utstyr etter vanlige rugbyspesifikke størrelsesetiketter
        som brukes i produkttittelen.
    rugby_variant:
      name: Rugbyvariant
      description: Angir rugbyvarianten (kode eller format) som produktet er beregnet
        for.
    ruler_edge_type:
      name: Linjalkanttype
      description: Identifiserer kantprofilen/funksjonen som brukes til måling eller
        merking (f.eks. rett kant, skråkant, leppe).
    ruler_marking_style:
      name: Linjalmerkingsstil
      description: Beskriver markerings-/føringslayout som er trykt på linjalen i
        tillegg til grunnleggende avmerkinger.
    runner_configuration:
      name: Meiekonfigurasjon
      description: Beskriver antall og plassering av meier på sleden.
    runner_material:
      name: Meiemateriale
      description: Angir materialet som brukes til sledens meier eller glidelister.
    saddle_cover_style:
      name: Stil på saltrekket
      description: Klassifiserer produktets overordnede utforming eller bruksmåte
        (for eksempel oppbevaringstrekk, ridetrekk, bæreveske).
    saddle_design:
      name: Saldesign
      description: Klassifiserer salens overordnede ergonomiske/avlastende utforming
        (for eksempel utsparing, neseløs, delt nese, fjæret).
    saddle_discipline:
      name: Saldisiplin
      description: Angir den primære ridedisiplinen eller tiltenkte bruken/stilen
        til salen.
    saddle_mounting_type:
      name: Monteringstype for sete
      description: Angir grensesnittet mellom setet og setepinnen for kompatibilitet
        (f.eks. skinne, svingbar, I-bjelke).
    saddle_pad_shape:
      name: Form på salunderlag
      description: Beskriver det fysiske snittet/omrisset på puten, som påvirker salkompatibilitet
        og estetisk preferanse.
    saddle_pad_style:
      name: Polstringstype for sete
      description: Identifiserer putens funksjonelle stil eller tiltenkte disiplin,
        slik at ryttere kan velge riktig design for sin aktivitet eller saltype.
    saddle_padding_material:
      name: Polstringsmateriale for sal
      description: Indikerer det primære dempematerialet eller -teknologien i salen
        som påvirker komfort og ridefølelse.
    saddle_rail_material:
      name: Skinnemateriale for sete
      description: Angir materialet som brukes til skinnene under et sykkelsete, noe
        som påvirker styrke, komfort, vekt og pris.
    saddle_tree_material:
      name: Materiale for saltre
      description: Angir materialet som brukes til salbommen, den indre rammen til
        salen.
    saddle_tree_width:
      name: Bomvidde på salen
      description: Beskriver breddeklassifiseringen av salbommen, som bestemmer passformen
        på hestens manke.
    safety_documentation_available:
      name: Sikkerhetsdokumentasjon tilgjengelig
      description: Angir hvilke samsvars-/sikkerhetsdokumenter som er gitt for ingrediensen
        (f.eks. sikkerhetsdatablad, IFRA-sertifikat/-erklæring, allergenerklæring).
    safety_equipment_included:
      name: Inkludert sikkerhetsutstyr
      description: Sikkerhets-/beskyttelsesutstyr inkludert i settet.
    safety_features:
      name: Sikkerhetsfunksjoner
      description: Indikerer innebygde sikkerhetsfunksjoner som er ment å redusere
        utilsiktede kutt eller beskytte kniven under lagring.
    safety_harness_type:
      name: Type sikkerhetssele
      description: Indikerer stil og konfigurasjon for barneselen som følger med setet.
    safety_mechanism_type:
      name: Type sikkerhetsmekanisme
      description: Beskriver stilen til det innebygde sikkerhetssystemet som brukes
        til å fange vektstangen under mislykkede løft.
    safety_restraint_type:
      name: Type sikkerhetsbelte
      description: Type innebygd barnesete på husken, hvis noen.
    safety_warning:
      name: Sikkerhetsadvarsel
      description: Angir om produktet har vanlige sikkerhetsadvarsler for leker som
        er relevante for klinkekuler (f.eks. kvelningsfare).
    sail_shape:
      name: Seilform
      description: Beskriver den geometriske stilen til kajakkseilet, som påvirker
        effektivitet, håndteringog montering.
    salad_dressing_type:
      name: Type salatdressing
      description: Identifiserer dressingens grunnleggende stil eller tekstur (f.eks.
        kremete, vinaigrette, yoghurtbasert), som hjelper kundene med å skille mellom
        ulike baser og konsistenser.
    salad_topping_base_ingredient:
      name: Baseingrediens i salattopping
      description: Angir den primære ingrediensgruppen som utgjør toppingen, som hjelper
        kundene med å filtrere etter ernæringsmessige preferanser, allergenbekymringer
        eller ønsket tekstur.
    salt_level:
      name: Saltnivå
      description: Angir mengden salt eller natrium som er tilsatt nøttene eller frøene.
    sand_cup_features:
      name: Sandkoppfunksjoner
      description: Funksjonelle/fysiske egenskaper til sandkoppen(e) som påvirker
        lek og bruk.
    sand_shovel_handle_style:
      name: Håndtaksstil for sandspade
      description: Beskriver håndtaksformen på enden av spade-/spadehåndtaket.
    sand_toy_set_pieces_included:
      name: Inkluderte deler i sandlekesett
      description: Lister opp typene sandleketøykomponenter som er inkludert i settet
        (f.eks. bøtte, spade, former), for å hjelpe kunder med å sammenligne sett
        etter hva de inneholder.
    sand_water_mill_items_included:
      name: Sand- og vannmøllegjenstander inkludert
      description: Viser en liste over de viktigste tilbehørskomponentene som følger
        med mølleleken (bøtter, øser, former osv.).
    sandbag_style:
      name: Sandsekkstil
      description: Identifiserer den spesifikke utformingen og den tiltenkte treningsbruken
        til sandsekken (f.eks. bulgarsk, strongman, power), og hjelper kunden med
        å velge mellom ulike treningsmetoder.
    sandbox_bottom_type:
      name: Sandkassebunntype
      description: Type base-/bunnkonstruksjon som brukes under sanden.
    sandbox_drainage_type:
      name: Dreneringstype for sandkasse
      description: Hvordan sandkassen drenerer vann (hvis aktuelt), for eksempel dreneringshull
        eller en avtakbar plugg.
    sandbox_seating_type:
      name: Setetype for sandkasse
      description: Om sandkassen har integrerte sitteplasser og hva slags.
    sapodillo_variety:
      name: Sapodillo-variant
      description: Identifiserer den spesifikke kultivaren eller varianten av sapodillo/chikoo
        (f.eks. «Alano», «Prolific»), slik at entusiaster kan velge foretrukne smaksprofiler
        og egenskaper.
    sapote_variety:
      name: Sapote-variant
      description: Spesifiserer den spesifikke arten/typen sapote som tilbys (f.eks.
        svart, hvit, mamey), slik at kunden kan skille mellom forskjellige slag.
    satin_ribbon_face_type:
      name: Ansiktstype for satengbånd
      description: Angir om båndet har en satengfinish på én side eller begge sider.
    sauce_consistency:
      name: Sauskonsistens
      description: Beskriver teksturen eller tykkelsen på pizzasausen.
    sauce_product_form:
      name: Produktformat for saus
      description: Angir den fysiske formen til sausproduktet, for eksempel væske,
        olje, pasta, pulver, flak eller sirup.
    sauce_variety:
      name: Sausvariant
      description: Identifiserer den spesifikke stilen eller oppskriftsfamilien til
        hvit saus eller fløtesaus (f.eks. alfredo, béchamel, hollandaise).
    saxophone_body_finish:
      name: Saksofonkropps-finish
      description: Beskriver den primære overflaten/belegget på saksofonkroppen (separat
        fra klaviaturet).
    saxophone_body_type:
      name: Type kropp på saksofon
      description: Beskriver den generelle fysiske konfigurasjonen av bass-saksofonens
        kropp og klokkeorientering.
    saxophone_construction_style:
      name: Saksofonkonstruksjons-stil
      description: Indikerer vanlige konstruksjonsfunksjoner for saksofon som påvirker
        holdbarhet, resonans og pleie.
    saxophone_included_accessories:
      name: Saksofon inkludert tilbehør
      description: Lister inkluderte tilbehør som vanligvis følger med en alto-saksofonpakke.
    saxophone_key_system:
      name: Saksofonnøkkelsystem
      description: Identifiserer saksofonens klaviatursystem (standard layout/mekanisme)
        som brukes på instrumentet.
    saxophone_key_touch_material:
      name: Materiale i saksofonens kileputer
      description: Angir materialet som brukes i saksofonens tangenter (for eksempel
        perlemorknapper).
    saxophone_mouthpiece_baffle_type:
      name: Baffeltype for saksofonmunnstykke
      description: Beskriver baffelutformingen som påvirker luftstrøm og lysstyrke.
    saxophone_neck_type:
      name: Saksofonhalstype
      description: Angir halskonfigurasjonen som følger med bass-saksofonen.
    saxophone_package_contents:
      name: Saksofon-pakkeinnhold
      description: Viser hvilket hovedtilbehør som følger med saksofonen (f.eks. eske,
        munnstykke, ligatur, nakkereim, rengjøringssett).
    saxophone_reed_cut:
      name: Saksofonrørbladssnitt
      description: Angir snittet/stilen på saksofonrørbladet, som påvirker respons,
        tone og følelse.
    saxophone_reed_material_type:
      name: Materiale for saksofonrørblad
      description: Angir kategorien for rørbladmateriale (f.eks. stokk vs. syntetisk).
    saxophone_reed_strength_scale:
      name: Styrkeskala for saksofonrørbladsnitt
      description: Spesifiserer styrkenummereringssystemet/-skalaen som brukes for
        rørbladet (ofte merkevareavhengig), noe som muliggjør tydeligere sammenligning
        på tvers av oppføringer.
    saxophone_small_part_thread_size:
      name: Saksofon liten del gjengestørrelse
      description: Spesifiserer gjengestørrelse/standard for små gjengede saksofondeler
        (primært skruer), som muliggjør riktig passformvalg.
    saxophone_swab_application_area:
      name: Bruksområde for saksofonpinne
      description: Angir hvilken del av saksofonen vattpinnen er ment å rengjøre/tørke.
    scabbard_material:
      name: Sliremateriale
      description: Angir hovedmaterialet i den medfølgende sliren/skjeden (hvis aktuelt).
    scale_model_assembly_status:
      name: Monteringsstatus for skalamodell
      description: Angir om skalamodellen er klar til visning eller krever montering/lakkering.
    scale_model_car_features:
      name: Funksjoner til skala-modellbil
      description: Merkbare funksjoner ved skalamodellbilen, som dører/panser som
        kan åpnes, styrbare hjul, fjæring osv.
    scale_model_kit_assembly_requirements:
      name: Krav til montering av skalamodellsett
      description: Spesifiserer hvilke ekstra monteringstrinn/forsyninger som vanligvis
        kreves i tillegg til grunnleggende snapfit-montering.
    scale_model_kit_components_included:
      name: Modellsettkomponenter i skala inkludert
      description: Viser hva som følger med tankskalamodellen/settet (f.eks. dekaler,
        figurer, fotograverte deler).
    scale_model_paint_status:
      name: Malestatus for skalamodell
      description: Angir om helikoptermodellen er forhåndsmalt/ferdig eller trenger
        lakkering.
    scale_model_pose:
      name: Positur for skalamodell
      description: Angir den avbildede posituren til hestemodellen for visning/diorama-samsvar.
    scale_model_rotor_configuration:
      name: Rotorkonfigurasjon for skalamodell
      description: Angir helikopterrotorkonfigurasjonen som er avbildet av modellen.
    scale_model_truck_era:
      name: Skalamodell for lastebilæra
      description: Angir epoken/tidsperioden til den virkelige lastebilen som modellen
        representerer (nyttig for samlere som ønsker å sammenligne vintage kontra
        moderne lastebiler).
    scale_model_truck_propulsion_type:
      name: Fremdriftstype for skalamodell-lastebil
      description: Angir om den avbildede lastebilen er diesel, bensin, elektrisk,
        hybrid eller har en annen fremdriftstype (som representert/markedsført av
        modellen).
    scale_units:
      name: Skalaenheter
      description: Måleenhetene som er trykt/gravert på bjelken for å angi radius/diameter.
    scent_function:
      name: Duftfunksjon
      description: Definerer de primære funksjonene til et duftprodukt, slik at jegere
        raskt kan finne riktig verktøy (f.eks. lokkemiddel kontra luktfjerner).
    scent_source:
      name: Duftkilde
      description: Lister opp den primære biologiske eller aromatiske kilden som brukes
        i produktformuleringen, inkludert urintyper, matbaserte dufter, plantearomaer
        osv.
    school_bus_body_type:
      name: Skolebuss-karosseritype
      description: Klassifiserer en skolebuss etter vanlige karosseri-/klasseformater
        som brukes i markedet (f.eks. type A–D).
    school_bus_safety_feature:
      name: Sikkerhetsfunksjon for skolebuss
      description: Merkbart sikkerhetsutstyr installert på skolebussen.
    school_glue_washability:
      name: Vaskbarhet av skolelim
      description: Angir hvor lett det tørkede/våte limet kan rengjøres fra hud/klær/overflater.
    scissors_application:
      name: Saksbruk
      description: Primært tiltenkt skjæringsbruk/-materiale for saksen.
    scooter_brake_pad_material:
      name: Materiale for bremseklosser på scooter
      description: Spesifiserer blandingen som brukes i bremseklosser, og som påvirker
        ytelse, støy og levetid.
    scoring_method:
      name: Poengmetode
      description: Angir hvordan poeng spores på bordfotballbordet, for eksempel manuelle
        kuletellere eller elektroniske resultattavler.
    scoring_pattern:
      name: Poengmønster
      description: Oppsett av scoringssoner trykt på spillebanen.
    scoring_system_type:
      name: Type poengsystem
      description: Beskriver typen poengføringsmekanisme som følger med bordet, for
        eksempel manuelle glidebrytere eller forskjellige elektroniske skjermer.
    scottish_smallpipes_bag_material:
      name: Skotsk sekkepipe – sekkemateriale
      description: Spesifiserer materialet til posen (luftbeholderen) som følger med
        sekkepipen.
    scottish_smallpipes_drone_tuning_configuration:
      name: Drone-stemmekonfigurasjon for skotske sekkepiper
      description: Angir dronestemmingsoppsettet som følger med instrumentet (dronenes
        tonehøyde/roller i forhold til tonikaen).
    scottish_smallpipes_reed_type:
      name: Rørbladtype for skotske sekkepiper
      description: Identifiserer rørbladtypen som brukes til pipen (og/eller om rørbladene
        er syntetiske kontra spanskrør).
    scraping_surface_type:
      name: Type skrapeoverflate
      description: Spesifiserer konstruksjonen/geometrien til skrapeflaten som produserer
        lyd (f.eks. rillet, kam/tenner, korrugert).
    screw_drive_type:
      name: Skrutrekkerprofil
      description: Angir typen fordypning på skruen eller bolthodet, og indikerer
        verktøyet som kreves for å stramme eller fjerne den (f.eks. sekskant/unbrako,
        Torx).
    screw_thread_size:
      name: Gjengestørrelse for skrue
      description: Angir gjengestørrelsesstandarden for de medfølgende eller kompatible
        skruene (f.eks. M4, M5, M6).
    sculpting_clay_base_type:
      name: Basetype for leireforming
      description: Beskriver den underliggende formuleringen/basen til skulpturleiren.
    seafood_cut:
      name: Sjømatkutt
      description: Beskriver det fysiske snittet eller presentasjonen av sjømatproduktet
        (f.eks. hel, filet, biff).
    seafood_processing_method:
      name: Behandlingsmetode for sjømat
      description: Angir den primære konserverings- eller bearbeidingsteknikken som
        brukes på sjømaten, for eksempel røkt, saltet eller frysetørket.
    seafood_source:
      name: Sjømatkilde
      description: Angir om sjømaten er viltfanget, fra oppdrett, plantebasert eller
        fra en annen kilde, noe som hjelper kundene med å evaluere bærekraft og kvalitet.
    seal_material:
      name: Tetningsmateriale
      description: Materiale som brukes til tetninger eller pakninger rundt hals,
        håndledd og ankel som holder drakten vanntett.
    seal_type:
      name: Tetningstype
      description: Spesifiserer tetningsmetoden som brukes av monteringen for å forhindre
        kjølevæskelekkasje.
    sealant_formulation:
      name: Tetningsmiddelformulering
      description: Angir den primære kjemiske formuleringen eller additivteknologien
        til sykkeldekkforseglingen (f.eks. lateksbasert, fiberforsterket, akryl).
    seals_leak_type:
      name: Lekkasjetype for tetninger
      description: Type/sted for kjølesystemlekkasje produktet er ment å tette.
    seam_construction:
      name: Sømkonstruksjon
      description: Beskriver hvordan sømmen på ballen lages, noe som påvirker sving,
        holdbarhet og følelse.
    seam_design:
      name: Sømdesign
      description: Angir sømkonstruksjonen eller dekorative sømegenskaper på strømpebuksene.
    seam_gauge_scale_type:
      name: Skalatype for sømmåler
      description: Angir hvilke skalaer/markeringer som er inkludert på sømmåleren
        i tillegg til den grunnleggende linjalskalaen.
    seam_gauge_slider_material:
      name: Glidemateriale for sømmåler
      description: Identifiserer materialet i den justerbare glidebryteren/pekerkomponenten
        når den er tilstede.
    seam_ripper_tip_style:
      name: Spretteknivspiss – utforming
      description: Beskriver den funksjonelle spissdesignen som brukes til å skyves
        under sting og klippe tråder trygt.
    seam_sealing_type:
      name: Sømforseglingstype
      description: Beskriver metoden som brukes for å forhindre vanninntrengning i
        sømmene på regndressen (f.eks. helteipet, sveiset).
    seam_type:
      name: Sømtype
      description: Beskriver sømstilen på baseballen, som påvirker grep, aerodynamikk
        og tiltenkt spillnivå.
    season_condition_protection:
      name: Sesong-/tilstandsbeskyttelse
      description: Angir det primære været/forholdene frontrutetrekket er ment å beskytte
        mot.
    season_rating:
      name: Sesongvurdering
      description: Angir teltets sesongklassifisering, som indikerer om det er egnet
        for ulike værforhold (f.eks. 3-sesong, 4-sesong, 5-sesong/ekspedisjon).
    seasoning_variety:
      name: Kryddervariant
      description: Klassifiserer krydderet etter tilberedningsstil eller tradisjonell
        kulinarisk bruk.
    seat_adjustment_power_type:
      name: Strømtype for setejustering
      description: Spesifiserer hvordan setejusteringsmekanismene aktiveres (manuelle
        spaker kontra elektriske motorer), noe som kan påvirke kabling/kompatibilitet.
    seat_belt_attachment_type:
      name: Type feste for sikkerhetsbelte
      description: Angir hvordan stroppen festes til kjøretøyet/beltemaskinen.
    seat_belt_buckle_electrical_connector_type:
      name: Elektrisk tilkoblingstype for sikkerhetsbeltespenne
      description: Spesifiserer koblingen/grensesnittet som brukes for kabling av
        spennebryter/forstrammer, når det er aktuelt.
    seat_belt_buckle_mounting_type:
      name: Monteringstype for sikkerhetsbeltespenne
      description: Beskriver hvordan spennen/mottakeren festes til bilen, setet eller
        beltfestet (for eksempel boltinnfesting eller innklikkbar løsning).
    seat_belt_buckle_release_button_color:
      name: Farge på utløserknapp for sikkerhetsbeltespenne
      description: Angir fargen på spenneutløserknappen.
    seat_belt_cover_placement:
      name: Plassering av sikkerhetsbeltetrekk
      description: Angir hvor på sikkerhetsbeltet trekket skal brukes.
    seat_belt_integration:
      name: Integrering av setebelte
      description: Angir om setet har en integrert kontakt for sikkerhetsbelte og/eller
        spenne, eller om kjøretøyets originale spennekontakt må overføres for installasjon.
    seat_belt_provision:
      name: Setebelteopplegg
      description: Angir om sikkerhetsbelter og/eller tilhørende belteutstyr (for
        eksempel spenner) følger med bakseteenheten eller må overføres fra originalsetet.
    seat_belt_strap_installation_location:
      name: Monteringssted for setebelte
      description: Angir hvor stroppen er installert i beltesystemet.
    seat_cover_placement:
      name: Plassering av setedeksel
      description: Angir hvilke sitteposisjoner trekket er beregnet for på kjøretøyet.
    seat_cover_securement_method:
      name: Festemetode for setetrekk
      description: Angir den primære måten setetrekket festes til setet på. Hvis flere
        metoder brukes, velg hoved-/primærmetoden.
    seat_cover_set_contents:
      name: Innhold i setetrekksett
      description: Beskriver hvilke deler som er inkludert i pakken (f.eks. kun setebunner
        vs. heldekkende sete + nakkestøtter).
    seat_fabric:
      name: Setestoff
      description: Primærstoffet som brukes til sete- og ryggstøtten på stolen.
    seat_height_category:
      name: Setehøydekategori
      description: Klassifiserer krakken etter typisk setehøyde (f.eks. benke- eller
        barhøyde) for å forenkle valget.
    seat_material:
      name: Setemateriale
      description: Identifiserer hovedmaterialet til benkens sitteflate.
    seat_mounting_type:
      name: Monteringstype for sete
      description: Monterings-/sporkonfigurasjon som brukes til å feste setet til
        bilgulvet.
    seating_surface_material:
      name: Overflatemateriale for sete
      description: Angir materialet i området en person sitter på (f.eks. Textilene-nett,
        slyngestoff, rotting, polstret møbeltrekk).
    seatpost_clamp_mechanism:
      name: Klemmemekanisme for setepinne
      description: Type klemme-/lukkesystem som sikrer setepinnen.
    section_orientation_compatibility:
      name: Kompatibilitet med seksjonsorientering
      description: Angir om tilbehøret passer til en venstrevendt, høyrevendt eller
        universell orienteringsseksjon.
    sectional_configuration:
      name: Seksjonskonfigurasjon
      description: Definerer de spesifikke modulene eller orienteringen til seksjonsenheten
        (f.eks. hjørne, venstre armlene, sjeselong) slik at kundene kan sette sammen
        ønsket oppsett.
    sectional_shape:
      name: Seksjonsform
      description: Definerer den overordnede geometriske konfigurasjonen/layout til
        seksjonssofaen.
    secured_components:
      name: Sikrede komponenter
      description: Lister hvilke sykkeldeler låseakselen eller sikkerhetsmutterne
        beskytter (for eksempel forhjul, bakhjul, setepinne).
    seed_content:
      name: Frømateriale
      description: Angir om sitrusfrukten er steinfri, har få frø eller har normalt
        med frø.
    seed_size_classification:
      name: Størrelsesklassifisering for frø
      description: Indikerer den relative størrelsen på de uspiselige frøet i litchien,
        noe som påvirker mengden spiselig fruktkjøtt.
    self_adhesive_backing_format:
      name: Format for selvklebende bakside
      description: Fysisk format på den selvklebende baksiden som følger med vekeviften
        (forhåndspåført pute kontra separate klistremerker osv.).
    self_adhesive_hook_loop_backing_type:
      name: Selvklebende krok- og løkkefestetype
      description: Spesifiserer bakside-/fôrkonstruksjonen og limsystemet som brukes
        på den selvklebende siden.
    self_adhesive_hook_loop_fastener_shape:
      name: Form på selvklebende feste for glidelås
      description: Spesifiserer snittet/formen på de medfølgende festedelene.
    self_hardening_clay_finish:
      name: Selvherdende leirebelegg
      description: Beskriver overflatens utseende/glans når den er fullstendig herdet
        (nyttig for å velge mellom naturlig matt, sateng osv.).
    self_hardening_clay_water_resistance_after_curing:
      name: Selvherdende leire, vannbestandig etter herding
      description: Indikerer motstand mot vannpåvirkning etter full herding (uten
        ekstra fugemasse).
    sensor_functions:
      name: Sensorfunksjoner
      description: Angir hvilket sykkelmålinger sensoren måler.
    sensor_measurement_mode:
      name: Målemodus for sensor
      description: Angir hvilket målinger sensoren kan registrere (f.eks. kun tempo,
        kun hastighet, dobbel hastighet og tempo).
    sensor_mounting_position:
      name: Monteringsposisjon for sensor
      description: Angir posisjonen på sykkelen eller syklisten der sensoren er installert,
        for eksempel veivarm, hjulnav eller sko. Dette påvirker kompatibiliteten med
        forskjellige sykkeloppsett.
    sensor_mounting_type:
      name: Monteringstype for sensor
      description: Angir hvordan MAP-sensoren monteres på innsugsmanifolden/motoren
        (f.eks. flens som festes med skruer kontra innstikksmalje).
    sensor_or_gauge_mounting_location:
      name: Monteringssted for sensor eller måler
      description: Angir hvor på kjøretøyet sensoren eller måleren er ment å installeres
        (system/posisjonsnivå, ikke venstre/høyre).
    sensory_modality:
      name: Sensorisk modalitet
      description: Primær sensorisk opplevelse leketøyet er designet for å gi (kan
        være multisensorisk).
    sensory_toy_fidget_mechanism:
      name: Fidgetmekanisme for sensorisk leketøy
      description: Primær interaksjon/mekanisme brukt for fidgeting og selvregulering.
    sensory_toy_light_features:
      name: Funksjoner i sensoriske leketøylys
      description: Lysatferd/-effekter levert av leketøyet.
    sensory_toy_texture_type:
      name: Teksturtype for sensorisk leketøy
      description: Dominerende overflatefølelse/teksturelementer brukt til taktil
        stimulering.
    sequin_application_method:
      name: Applikasjonsmetode for paljetter
      description: Hvordan paljetten er ment å påføres/brukes (sy på vs. lim på vs.
        varmefiksering osv.).
    sequin_finish:
      name: Paljettfinish
      description: Beskriver overflaten / den visuelle finishen og den reflekterende
        effekten av paljettene som brukes på lappen (f.eks. matt, metallisk, holografisk),
        ikke lappens bakside eller festemetode.
    serger_stitch_functions:
      name: Serger-stingfunksjoner
      description: Sømfunksjonen som sergeren støtter (overlock-/overedge-varianter
        og spesielle serger-sømmer).
    serger_thread_count:
      name: Serger-trådantall
      description: Antall tråder sergeren kan bruke til søm (f.eks. 2-/3-/4-/5-tråd
        funksjonalitet).
    service_interval:
      name: Serviceintervall
      description: Anbefalt maksimal tid mellom nødvendig inspeksjon/service hos et
        godkjent verksted.
    serving_temperature:
      name: Serveringstemperatur
      description: Angir den tiltenkte serveringstemperaturen eller produktets tilstand
        når det fortæres.
    sesame_seed_hull_status:
      name: Status for sesamfrøskall
      description: Angir om tahinien er laget av avskallede eller hele sesamfrø, noe
        som påvirker farge, smak og næringsinnhold.
    sesame_seed_roast_level:
      name: Ristenivå for sesamfrø
      description: Angir hvor mye sesamfrøene ble ristet før de ble malt, noe som
        hjelper kundene med å velge sin foretrukne smaksintensitet.
    sesame_seed_variety:
      name: Sesamfrøvariant
      description: Identifiserer fargen eller varianten av sesamfrø som brukes til
        å lage oljen.
    set_classification:
      name: Settklassifisering
      description: Definerer det tiltenkte spillenivået eller stilen for krokketsettet
        (f.eks. turnering, moro, reise).
    set_components:
      name: Settkomponenter
      description: Angir hvilke varer som er inkludert i produktet (f.eks. kun midtstikke
        vs. komplett sett).
    set_items_included:
      name: Inkluderte elementer i sett
      description: Spesifiserer plaggene eller tilbehøret som er inkludert i settet,
        for eksempel saristoff, dupatta eller belte.
    setup_mechanism:
      name: Oppsettmekanisme
      description: Beskriver hovedmetoden for å slå opp teltet (for eksempel pop‑up,
        oppblåsbart/luftstativ, takmontert klafftelt).
    setup_type:
      name: Oppsettstype
      description: Hvordan leketeltet/tunnelen monteres eller brukes.
    sew_in_interfacing_elasticity:
      name: Elastisitet i innstrykningsmellomstoff
      description: Angir om det innsydde mellomlegget er elastisk, og i så fall i
        hvilke retninger, for å passe til strikkede eller vevde prosjekter.
    sew_in_label_placement:
      name: Plassering for innsydd etikett
      description: Angir tiltenkt plassering på den ferdige varen.
    sew_on_edge_finish:
      name: Påsydd kantfinish
      description: Angir om krok- og løkkekantene er rå/kuttede eller ferdigbehandlede
        for å motstå tæring.
    sew_on_rhinestone_hole_orientation:
      name: Hullorientering for påsydde rhinsteiner
      description: Plassering/orientering av hull i forhold til steinen (f.eks. side
        om side, motsatt, kryss) for å støtte ulike stingstiler.
    sewing_kit_components_included:
      name: Inkluderte komponenter i sysett
      description: Lister opp syutstyret/-verktøyene som er inkludert i sysettet,
        slik at kundene kan sammenligne hva som følger med i hvert sett.
    sewing_machine_bobbin_class:
      name: Spoleklasse for symaskin
      description: Angir spoleklassen/-systemet som er kompatibelt med symaskinen
        for spoler og spoleesker.
    sewing_machine_buttonhole_type:
      name: Knapphullstype for symaskin
      description: Metode for knapphullsproduksjon støttes av maskinen.
    sewing_machine_display_type:
      name: Symaskinens skjermtype
      description: Type kontroll-/skjermgrensesnitt på symaskinen.
    sewing_machine_needle_point_type:
      name: Nålespisstype for symaskin
      description: Definerer spissgeometrien/spissfamilien til nålen som bestemmer
        hvordan den trenger inn i forskjellige stoffer (f.eks. skarp vs. kulespiss
        vs. kile).
    sewing_machine_needle_system:
      name: Nålesystem for symaskin
      description: Det standardiserte nålesystemet/modellnummeret som bestemmer maskinkompatibilitet
        (ofte skrevet som 130/705 H, HAx1, DBx1, 15x1 osv.).
    sewing_machine_needle_type:
      name: Nåletype for symaskin
      description: Angir nålens tiltenkte bruk/stil (f.eks. universal, kulepenn, jeans/denim),
        som påvirker stingkvaliteten og stoffets egnethet.
    sewing_machine_shank_type:
      name: Skafttype for symaskin
      description: Angir standarden for grensesnitt mellom trykkfotskaft og -ankel
        som foten er designet for, og sikrer kompatibilitet med symaskinen (f.eks.
        lav skaft, høy skaft, skrå skaft).
    sewing_pattern_accessory_type:
      name: Type tilbehør til symønster
      description: Angir hvilket tilbehør symønsteret lager.
    sewing_pattern_notions_required:
      name: Nødvendige sytilbehør for mønster
      description: Lister opp viktige tilleggsmaterialer/maskindeler som kreves for
        å fullføre prosjektet (i tillegg til stoff og tråd).
    sewing_pattern_recommended_fabric:
      name: Anbefalt stoff for symønster
      description: Viser anbefalte stofftyper/-vekter for symønsteret (som oppgitt
        av mønsterdesigneren).
    sewing_pattern_size_range:
      name: Størrelsesområde for symønster
      description: Angir det tiltenkte størrelsesområdet som dekkes av mønsteret (f.eks.
        baby til voksen, store størrelser).
    sewing_thread_size_system:
      name: Størrelsessystem for sytråd
      description: Størrelsesstandarden som brukes til å uttrykke trådstørrelsen (f.eks.
        Tex, Denier, Ticket, vektnummer, V-størrelse).
    shaft_curvature:
      name: Akselkrumning
      description: Beskriver den generelle formen på skaftet, som påvirker klaring,
        sving og ergonomi.
    shaft_kick_point:
      name: Skaftets kick point
      description: Identifiserer posisjonen langs skaftet der det bøyer seg mest under
        en sving, påvirker ballens bane.
    shaft_length_type:
      name: Type skaftlengde
      description: Bransjestandard for kategorisk størrelsesbetegnelse for dartskaft
        (f.eks. kort, medium) som brukes når nøyaktige millimetermål ikke er oppgitt.
    shaft_shape:
      name: Skafteform
      description: Definerer tverrsnittsprofilen til tonfa-skaftet (f.eks. rund, firkantet,
        åttekantet).
    shaker_fill_material:
      name: Fyllmateriale i risteinstrument
      description: Angir den primære interne fyllingen som brukes til å lage shaker-lyden
        (når aktuelt), for eksempel perler, frø eller hagl.
    shaker_shell_material:
      name: Skallmateriale i risteinstrument
      description: Angir hovedmaterialet i eggeshakerens kropp/skall (det ytre huset).
    shallot_variety:
      name: Sjalottløk-variant
      description: Identifiserer den spesifikke kultivaren, markedstypen eller varianten
        av sjalottløkproduktet.
    shank_style:
      name: Skaftstil
      description: Beskriver den generelle formen/utformingen på stengene på stangbittet
        (for eksempel rette, buede, «grazing»-stenger).
    shapewear_enhancement_feature:
      name: Forbedringsfunksjon for formtøy
      description: Fremhever den primære funksjonelle forbedringen plagget tilbyr
        (f.eks. magekontroll, rumpeløft, lekkasjesikker fôring).
    sheath_type:
      name: Sliretype
      description: Type slire som følger med samlerkniven.
    sheet_music_clip_padding_material:
      name: Polstringsmateriale i noteklemme
      description: Materiale i eventuell kjeft-/greppolstring som ligger mot papiret
        eller kanten på notestativet for å hindre at det rives eller sklir.
    sheet_music_clip_spring_tension_level:
      name: Fjærspenning i noteklemmen
      description: Relativ styrke til klipsfjæren/klemkraften.
    sheet_music_clip_use_environment:
      name: Bruksmiljø for noteklype
      description: Primært tiltenkt bruk der klippet er designet for å yte best mulig.
    shell_construction:
      name: Skallkonstruksjon
      description: Angir hvordan basstrommeskallet er konstruert, noe som betydelig
        påvirker tone og vekt.
    shell_finish:
      name: Skallfinish
      description: Utvendig overflatebehandling av doumbek-skallet.
    shell_hull_status:
      name: Status for skall/skrog
      description: Angir om nøttene eller frøene selges med skall intakt eller fjernet.
    shift_boot_attachment_method:
      name: Festemetode for girmansjett
      description: Angir hvordan girspakmansjetten festes til bilens midtkonsoll/girdeksel
        (for eksempel innklikkbar ramme, låsering, lim).
    shift_boot_installation_hardware_included:
      name: Monteringsutstyr for girspakmansjett inkludert
      description: Viser installasjonsmaskinvare og komponenter som følger med girmansjetten.
    shift_knob_illumination:
      name: Belysning av girspaken
      description: Angir om girknappen har belysning og belysningsmetode/-type (f.eks.
        fotoluminescerende, LED, fiberoptisk, bakgrunnsbelyst mønster).
    shift_knob_installation_method:
      name: Monteringsmetode for girspaken
      description: Angir hvordan girknotten festes til girspaken/spaken.
    shift_knob_shape:
      name: Girspakeform
      description: Beskriver den generelle ergonomiske formfaktoren til girspaken.
    shift_pattern_type:
      name: Girmønstertype
      description: Angir stilen på girmerkingen på girknappen (hvis noen).
    shifter_compatibility:
      name: Kompatibilitet for girspak
      description: Angir om styreforlengelsen er kompatibel med elektroniske girspaker,
        mekaniske girspaker, begge deler, eller ikke er kompatibel med girspaker.
    shifter_mounting_interface:
      name: Monteringsgrensesnitt for girspak
      description: Beskriver hvordan girspaken festes til sykkelen (f.eks. diskret
        klemmestørrelse, I-Spec, MatchMaker, styreende, underrør, trådløs).
    shifting_actuation_type:
      name: Aktiveringstype for giring
      description: Identifiserer mekanismen som brukes til å gire i gruppesettet (mekanisk,
        elektronisk kablet, elektronisk trådløs, hydraulisk).
    shifting_mechanism:
      name: Girmekanisme
      description: Identifiserer om girspaken fungerer mekanisk eller elektronisk,
        og om den er indeksert eller friksjonsbasert.
    shim_purpose:
      name: Mellomleggets formål
      description: Definerer produktets funksjonelle type (f.eks. shim, kile, avstandsstykke)
        slik at syklister raskt kan finne riktig justeringsløsning uten behov for
        separate underkategorier.
    shin_guard_attachment_method:
      name: Festemetode for leggbeskyttere
      description: Klassifiserer det overordnede designformatet til leggbeskytteren,
        inkludert integrering av ankelbeskytter eller sokkekonstruksjon.
    shirt_cuff_style:
      name: Ermestil på skjorte
      description: Identifiserer konstruksjonen av ermemansjetten, som påvirker formalitet,
        sammenkobling med mansjettknapper og komfort.
    shochu_base_ingredient:
      name: Shochu-baseingrediens
      description: Identifiserer den primære stivelses- eller sukkerkilden som brukes
        til å produsere shochuen.
    shochu_soju_variety:
      name: Shochu- og sojuvariant
      description: Klassifiserer produktet etter dets anerkjente stil eller produksjonstype.
    shock_absorber_bushing_material:
      name: Materiale for støtdemperbøssing
      description: Materiale i monteringsbøssinger/-isolatorer som følger med eller
        er bygd inn i støtdemperen.
    shock_absorber_charge_type:
      name: Belastningstype for støtdemper
      description: Spesifiserer støtdemperens belastnings-/dempingteknologi (f.eks.
        hydraulisk/olje, gassfylt, luft) og/eller relaterte rørdesign der det er aktuelt.
    shock_absorber_mount_type_lower:
      name: Monteringstype for støtdemper (lavere)
      description: Bunnmonterings-grensesnittstil på støtdemperen for matchende tilpasning.
    shock_absorber_mount_type_upper:
      name: Støtdemperfestetype (øvre)
      description: Spesifiserer øvre (øverste) monteringsgrensesnittstil for en støtdemper
        i et motorkjøretøy for samsvar med tilpasning/kompatibilitet.
    shock_absorber_position:
      name: Støtdemperposisjon
      description: Angir om støtdemperen er beregnet for plassering foran, bak, venstre
        eller høyre på kjøretøyet (mer detaljert enn kun akselplassering).
    shock_absorption_system:
      name: Støtdempingssystem
      description: Definerer mekanismen som brukes for å redusere vibrasjon og støy
        ved retur.
    shoe_collar_height:
      name: Høyde på skokragen
      description: Klassifiserer sko etter skaftehøyde (low-top, mid-top, high-top)
        for å angi ankeldekning og -støtte.
    shoe_cover_height:
      name: Høyde på skodeksel
      description: Angir dekningsnivået til sykkelskoovertrekket, og skiller tåbeskyttere
        fra heldekkende høye overtrekkssko.
    shoe_sizing_system:
      name: Skostørrelsessystem
      description: Identifiserer størrelsesstandarden (US, UK, EU, JP, Mondopoint,
        osv.) som brukes for den oppgitte skostørrelsen.
    shoelace_aglet_material:
      name: Materiale i skolissetupp
      description: Identifiserer materialet som brukes til tuppene (egietter) på endene
        av skolissene, som påvirker holdbarhet og stil.
    shooting_rest_design:
      name: Skytestøttedesign
      description: Klassifiserer den strukturelle stilen til hvile (posehvile, slede,
        tripodhvile, pistolskrustikke, osv.).
    shooting_stick_yoke_design:
      name: Design av åk for skytestang
      description: Angir hvilken type vugge eller gaffel som griper rundt våpenet
        eller optikken.
    shooting_target_style:
      name: Stil for blinkskyting
      description: Klassifiserer stilen eller designet for kunstløp og skytemål for
        hockey, slik at kunder kan velge treningsfokuset de trenger.
    shooting_target_type:
      name: Type blink til skyting
      description: Klassifiserer skytemål etter strukturell stil, materiale eller
        design (f.eks. gong, silhuett, papirblink, spinner), slik at skyttere raskt
        kan finne riktig mål for sin disiplin og våpentype.
    short_block_assembly_balance_type:
      name: Typ monteringsbalanse for kort veivaksel
      description: Angir om den roterende enheten er internt eller eksternt balansert.
    short_block_intended_use:
      name: Tiltenkt bruk av kort veivaksel
      description: Primær tiltenkt brukstilfelle for den korte blokken.
    short_block_rotating_assembly_included:
      name: Roterende enhet til kort veivaksel inkludert
      description: Angir hvilke viktige roterende monteringskomponenter som er inkludert
        i den korte veivakselen.
    shot_size:
      name: Hagltørrelse
      description: Angir betegnelsen på skuddstørrelse for løse hagl- eller ammunisjonskomponenter.
    shotgun_action_type:
      name: Mekanismetype for hagle
      description: Angir driftsmekanismen/handlingen til haglen.
    shotgun_choke_type:
      name: Choketype for hagle
      description: Angir choke-konfigurasjonen til hagleløpene.
    shotgun_gauge:
      name: Haglgeværkaliber
      description: Angir en hagles boremål (og .410 boring der det er aktuelt) for
        identifisering og filtrering i oppføring av samleobjekter.
    shotgun_stock_material:
      name: Materiale for haglekolbe
      description: Angir hovedmaterialet i kolbe/forskjefte (våpendel).
    shuffleboard_speed_rating:
      name: Hastighetsvurdering for shuffleboard
      description: Indikerer den relative glidehastigheten som shuffleboard-pulver
        eller andre vedlikeholdsprodukter gir på bordet, slik at spillerne kan velge
        passende hastighet for sitt ferdighetsnivå og bordlengde.
    shuffleboard_table_length_compatibility:
      name: Kompatibilitet med shuffleboard-bordets lengde
      description: Standard shuffleboard-bordlengde som et produkt er designet for
        å passe til eller komplementere.
    shuttlecock_base_material:
      name: Hovedmateriale i badmintonball
      description: Identifiserer materialet som brukes til fjærballens nese/base,
        noe som påvirker holdbarhet, følelse og retur.
    shuttlecock_feather_material:
      name: Fjærmateriale i fjærball
      description: Identifiserer den primære fjærkilden eller konstruksjonstypen som
        brukes på fjærballskjørtet, som påvirker holdbarhet, konsistens og pris.
    shuttlecock_grade:
      name: Fjærballkvalitet
      description: Angir det tiltenkte spillnivået eller kvalitetsklassifiseringen
        (f.eks. trening, klubb, konkurranse).
    shuttlecock_speed_rating:
      name: Hastighetsrangering for badmintonball
      description: Angir produsentens angitte hastighet eller klassifisering av fjærballen,
        slik at spillerne kan velge riktig flyhastighet for spillestil, temperatur
        og høyde.
    side_panel_installation_state:
      name: Installasjonsstatus for sidepanel
      description: Angir om sidepanelet er bart, grunnet, malt eller på annen måte
        belagt/klargjort for montering.
    side_wall_mechanism:
      name: Sideveggmekanisme
      description: Beskriver hvordan babykurvens sengevegg åpnes eller senkes for
        å få tilgang til babyen.
    signal_source:
      name: Signalkilde
      description: Angir hvordan kilometertelleren mottar/utleder informasjon om avstand
        eller tid.
    silk_fiber_type:
      name: Silkefibertype
      description: Type/kilde for silkefiber som brukes til å lage stoffet (f.eks.
        morbær eller tussah), som påvirker tekstur, enhetlighet og pris.
    simulated_game_species:
      name: Simulerte spillarter
      description: Angir den spesifikke viltfuglen eller dyret som dukken gjenskaper
        for realistisk trening.
    singlet_cut_style:
      name: Singlet-snittstil
      description: Spesifiserer snitt/stil på brytetrøyen, med tanke på stroppehøyde,
        ryggstil og kjønns-/ungdomsvariasjoner.
    sink_material:
      name: Materiale for vask
      description: Angir materialet til de integrerte vaskene som følger med servantskapet.
    sinker_attachment_style:
      name: Festestil for søkke
      description: Beskriver mekanismen som er utstyrt med banksøkket for å feste
        det til fiskesnøret eller riggen.
    sinker_finish:
      name: Søkkefinish
      description: Spesifiserer det utvendige belegget eller overflatebehandlingen
        av søkket.
    sinker_shape:
      name: Form på lodd
      description: Definerer den geometriske formen til søkket (f.eks. kule, sylinder,
        tåre) slik at sportsfiskere kan velge optimal presentasjon og trekkemotstand.
    siren_system_included:
      name: Sirenesystem inkludert
      description: Angir om det er installert et sirene-/PA-system og hvilken type.
    siren_system_type:
      name: Type sirenesystem
      description: Angir den installerte sirene-/PA-konfigurasjonen på politibilen.
    size_designation:
      name: Størrelsesbetegnelse
      description: Standardisert størrelsesetikett for triangelinstrumentet.
    size_system:
      name: Størrelsessystem
      description: Angir størrelsessystemet eller den regionale standarden som etiketten
        tilsvarer (f.eks. USA, Storbritannia, EU, international letter).
    sizzle_mechanism:
      name: Sizzle-mekanisme
      description: Angir hvordan cymbalen produserer sizzle-effekten (f.eks. nagler
        installert i cymbalen, festbar kjede/sizzler eller ingen maskinvare inkludert).
    skate_blade_discipline:
      name: Skøytebladdisiplin
      description: Identifiserer skøytedisiplinen eller bruken bladet er designet
        for, for eksempel hockey eller kunstløp, slik at kunden kan filtrere til relevante
        blader.
    skate_brake_type:
      name: Type skøytebrems
      description: Identifiserer typen stoppemekanisme som følger med skøytene.
    skateboard_nut_thread_size:
      name: Gjengestørrelse for skateboardbolt
      description: Spesifiserer gjengestørrelsen (diameter og stigning) på mutteren
        for å sikre kompatibilitet med skateboardaksler, kingpins eller monteringsmaskinvare.
    skein_winder_bearing_bushing_type:
      name: Type lager eller foring i hespemaskinen
      description: Angir type lager eller foring i den roterende enheten på hespemaskinen.
    skein_winder_drive_type:
      name: Type drift på hespetre
      description: Hvordan nøsteveveren drives/snus under bruk.
    ski_binding_mechanism:
      name: Skibindingsmekanisme
      description: Definerer den grunnleggende mekaniske utformingen eller disiplinen
        til bindingen (f.eks. alpin, tech/pin, telemark).
    ski_binding_part_type:
      name: Deletype for skibinding
      description: Identifiserer den spesifikke komponenten eller tilbehøret for skibindinger,
        noe som muliggjør rask filtrering på tvers av mange deltyper.
    ski_boot_sole_standard:
      name: Standard skiskosåle
      description: Identifiserer den eneste normen eller bindingskompatibilitetsstandarden
        som skiskoen er sertifisert for.
    skill_focus:
      name: Ferdighetsfokus
      description: Identifiserer den primære basketballferdigheten treningshjelpemidlet
        er ment å utvikle.
    skimboard_construction:
      name: Konstruksjon av skimboard
      description: Beskriver den primære konstruksjonen av brettet, med fokus på kjerne
        og lay-up-teknikk (f.eks. skumkjerne, trekjerne).
    skin_presence:
      name: Tilstedeværelse av hud
      description: Angir om kyllingen selges med skinn på, fjernet eller delvis fjernet.
    slapstick_handle_type:
      name: Slapstick-håndtakstype
      description: Beskriver greps-/håndtaksstilen som er integrert i slapsticken,
        som påvirker ergonomi og spillekomfort.
    slapstick_playing_surface_material:
      name: Materiale for slapstick-spilleoverflate
      description: Angir materialet i slagelementene som er i kontakt med hverandre
        for å produsere lyden.
    sled_brake_type:
      name: Type sledebrems
      description: Angir bremsemekanismen som er inkludert på sleden, hvis noen.
    sled_towing_method:
      name: Sledeslepemetode
      description: Angir den primære måten sleden trekkes eller taues på.
    sleep_position_suitability:
      name: Egnethet for sovestilling
      description: Angir hvilke sovestillinger madrassen er utformet for å støtte
        mest effektivt.
    sleeping_bag_shape:
      name: Soveposeform
      description: Helhetssnittet på soveposen, som påvirker varme, vekt og romslighet.
    sleeping_pad_type:
      name: Type soveunderlag
      description: Identifiserer konstruksjonsstilen til puten – for eksempel lukket
        celleskum eller oppblåsbar luft – som direkte påvirker komfort, vekt og isolasjon.
    sleepwear_set_pieces_included:
      name: Inkluderte plagg i sovetøysett
      description: Viser de individuelle komponentene som følger med i et nattøy-
