    snare_drum_strainer_mechanism:
      name: Strammemekanisme for skarptrommesnare
      description: Hvilken type festemekanisme som er brukt for å feste/løsne vaierne.
    snare_drum_strainer_type:
      name: Type strammer for skarptromme
      description: Hvilken type festemekanisme som er brukt for å feste/løsne vaierne.
    snare_hoop_type:
      name: Type kant på skarptromme
      description: Type bøyler/kanter på skarptrommen.
    snare_throw_off_type:
      name: Type seideavkaster
      description: Type sil-/avkastmekanisme som brukes til å koble inn/fra skarptrommene.
    snip_cutter_spring_mechanism:
      name: Fjærmekanisme for avklipper
      description: Angir om avklipperen bruker en fjær-/returmekanisme og hvilken
        type den har.
    snorkel_mount_position:
      name: Snorkelmonteringsposisjon
      description: Beskriver hvor snorkelen er plassert på brukerens hode under bruk.
    snorkel_top_type:
      name: Snorkel-topptype
      description: Beskriver typen vanninntrengningsbeskyttelse på toppen av snorkelen
        som er inkludert i settet.
    snow_condition_suitability:
      name: Egnethet for snøvilkår
      description: Beskriver de primære snøforholdene som voksen er beregnet for.
    snow_sports_helmet_safety_certification:
      name: Sikkerhetssertifisering for vintersportshjelmer
      description: Identifiserer sikkerhetsstandarden(e) hjelmen oppfyller for bruk
        på ski og snowboard.
    snowboard_base_material:
      name: Snowboard-basemateriale
      description: Identifiserer basesammensetningen eller finishen (ekstruderte,
        sintrede kvaliteter, egne formler) som påvirker hastighet, holdbarhet og vedlikehold.
    snowboard_width_class:
      name: Snowboard-breddeklasse
      description: Kategoriserer total brettbredde i forhold til oppstartsstørrelse
        (f.eks. vanlig, bred).
    soccer_ball_compartment_type:
      name: Type fotballrom
      description: Angir hvordan (eller om) sekken har plass til en fotball.
    soccer_ball_type:
      name: Type fotball
      description: Spesifiserer den tiltenkte bruken eller stilen til fotballen (f.eks.
        kamp, trening, futsal) slik at kundene raskt kan finne riktig variant uten
        å trenge mange underkategorier.
    soccer_dummy_base_type:
      name: Basetype for fotballdukke
      description: Beskriver typen base eller forankringsmekanisme som dukken bruker.
    soccer_dummy_design:
      name: Fotballdukkedesign
      description: Spesifiserer konstruksjonsstilen til en fotballmåldukke, for eksempel
        stiv eller oppblåsbar.
    soccer_goal_target_style:
      name: Målstil for fotballmål
      description: Definerer den fysiske formfaktoren eller designet til treningsmålet,
        slik at kunden kan velge stilen som passer best til øvelsene deres.
    soccer_goal_type:
      name: Type fotballmål
      description: Indikerer målets strukturelle stil eller tiltenkte bruk (f.eks.
        popup-butikk, rebounder, gate).
    sock_cushioning:
      name: Sokkedemping
      description: Angir mengden og typen demping eller polstring under foten som
        er innlemmet i sokken.
    sock_cushioning_level:
      name: Sokkedempingsnivå
      description: Angir mengden demping under foten som er integrert i sokken.
    sock_grip_type:
      name: Sokkegrepstype
      description: Beskriver eventuelle grepsfunksjoner eller sklisikre funksjoner
        som er brukt på sokkens såle.
    sock_toe_style:
      name: Sokketå-stil
      description: Beskriver konstruksjonsstilen til sokkens tåområde.
    soft_bait_style:
      name: Myk agnstil
      description: Klassifiserer kroppsdesignet eller profilen til det myke plastagnet
        (f.eks. mark, swimbait, grub).
    soft_top_attachment_type:
      name: Festetype for bilpresenning
      description: Identifiserer hvordan taket festes til kjøretøyet (kanal, trykknapper,
        borrelås osv.).
    soft_top_includes_frame_hardware:
      name: Kalesje inkluderer ramme/maskinvare
      description: Angir om produktet inkluderer kalesjeramme/-bøyler og/eller monteringsmaskinvare.
    soft_top_installation_type:
      name: Kalesjemontering
      description: Angir hvordan bilens kalesje monteres/festes, som indikerer forventet
        monteringsmetode og nødvendig innsats.
    soft_top_window_configuration:
      name: Vinduskonfigurasjon for bilpresenning
      description: Angir hvor mange vinduer kalesjen har og hvilke posisjoner som
        er tilstede.
    softball_certification:
      name: Softball-sertifisering
      description: Viser en liste over stemplene fra det styrende organet, eller godkjenningen,
        som er trykt på ballen og som avgjør kvalifisering for liga/kamp.
    softness_level:
      name: Mykhetsnivå
      description: Indikerer hvor myk/lavprofilert løkkesiden er, relevant for komfort
        mot huden og bruk i små mengder.
    solar_system_model_included_bodies:
      name: Inkluderte legemer i solsystemmodell
      description: Angir hvilke himmellegemer som er representert i modellsettet.
    solar_system_model_scaling:
      name: Skalering av solsystemmodell
      description: Angir om solsystemmodellen er på skala for planetstørrelse, avstander/baner,
        begge deler, eller er en skjematisk/ikke-etter-skala-representasjon.
    sold_secure_certification_level:
      name: Sold Secure-sertifiseringsnivå
      description: Angir Sold Secure-vurderingen som er tildelt låsen av det uavhengige
        britiske testorganet (bronse, sølv, gull, diamant).
    sold_secure_rating:
      name: Sold Secure-vurdering
      description: Angir Sold Secure-sertifiseringsnivået som er tildelt låsen.
    sole_construction:
      name: Sålekonstruksjon
      description: Indikerer hvordan skoens såle er bygget (hel, delt, todelt osv.),
        som direkte påvirker fleksibilitet, gulvkontakt og egnethet for spesifikke
        danseteknikker.
    sole_type:
      name: Såletype
      description: Beskriver sålens strukturelle stil, og indikerer fleksibilitet
        og tiltenkt bruk.
    soprano_saxophone_body_style:
      name: Kroppsstil for sopransaksofon
      description: Beskriver den fysiske konfigurasjonen av sopransaksofon-kroppen.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Type demper for munnstykke til sopransaksofon
      description: Beskriver utformingen av munnstykket (konturen bak tuppen) og taket
        som påvirker lysstyrke, projeksjon og respons.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Kammerstørrelse for munnstykke til sopransaksofon
      description: Beskriver den indre kammerstørrelsen til sopransaksofon-munnstykket,
        som påvirker motstand og tonalfarge.
    soprano_saxophone_mouthpiece_finish:
      name: Overflatebehandling for munnstykke til sopransaksofon
      description: Overflatebehandling/plettering påført munnstykket (hvis aktuelt).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Sopransaksofonmunnstykke inkludert tilbehør
      description: Identifiserer hvilket tilbehør som følger med munnstykket.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Sopransaksofonmunnstykkets tonale karakter
      description: Høy tonalprofil som ofte forbindes med munnstykkedesignet.
    sound_character:
      name: Lydkarakter
      description: Beskriver den generelle klangfargen som slapstick-instrumentet
        gir.
    sound_expansion_method:
      name: Lydutvidelsesmetode
      description: Angir hvordan moduler kan legges til eller utvide sitt interne
        lydbibliotek i tillegg til fabrikklydene (f.eks. innholdspakker, sampleimport,
        utvidelseskort).
    sound_module_sound_library_focus:
      name: Fokus på lydbibliotek i lydmodul
      description: Hovedvekt på fabrikkens lydsett for å hjelpe kunder med å finne
        de riktige modulene for deres stil/bruk.
    sound_port_type:
      name: Type lydport
      description: Beskriver lydhullet/portdesignet på baksiden av kassen som påvirker
        projeksjon og bassrespons.
    sound_sensitivity_control:
      name: Kontroll av lydfølsomhet
      description: Angir om og hvordan lydfølsomheten kan justeres.
    sound_synthesizer_patch_memory:
      name: Lydsynthesizer-patchminne
      description: Angir om synthesizeren kan lagre og hente forhåndsinnstillinger
        (patcher).
    sound_type:
      name: Lydtype
      description: Primære lydtyper eller lydutganger som matten produserer (f.eks.
        instrumenter, sanger, stemmekommandoer) for å veilede spilling.
    soundboard_material:
      name: Materiale for lydplate
      description: Materiale brukt i harpens lydplate (topp) som gir resonans og klang.
    soup_or_broth_variety:
      name: Suppe- eller buljongvariant
      description: Spesifiserer stilen, oppskriften eller den kulinariske tilberedningen
        av suppen eller kraften, slik at kundene raskt kan finne sin foretrukne type.
    sour_cream_variety:
      name: Rømmevariant
      description: Klassifiserer rømmeprodukter etter deres spesifikke variant eller
        kulturelle stil, for eksempel crème fraîche eller meksikansk crema.
    soy_sauce_variety:
      name: Soyasausvariant
      description: Identifiserer den spesifikke stilen eller formuleringen av soyasaus
        (f.eks. lys, mørk, tamari, ponzu), slik at kunder raskt kan filtrere etter
        smaksprofil og kulinarisk bruk.
    spark_plug_electrode_material:
      name: Materiale i tennpluggens elektrode
      description: Materiale/teknologi i tennpluggens elektrodestift(er) i tennenden
        (senter og/eller jord), slik det markedsføres (for eksempel kobber, platina,
        iridium).
    spark_plug_seat_type:
      name: Tetningstype for tennplugg
      description: Tetnings-/setetype som tennpluggen bruker mot topplokket.
    spark_plug_terminal_type:
      name: Terminaltype for tennplugg
      description: Type toppkontakt på tennpluggen for tilkobling av tennkabel/tennplugghette.
    sparkler_shape:
      name: Stjerneskuddform
      description: Generell formfaktor for stjerneskuddet.
    speaker_cone_material:
      name: Høyttalerkjegle-materiale
      description: Primærmateriale i høyttalermembranen (woofer/mellommembran).
    speaker_size:
      name: Høyttalerstørrelse
      description: Nominell driverstørrelse/tilpasningsstørrelse for komponenthøyttaleren
        (f.eks. 6,5 tommer, 6x9 tommer), brukes til å matche fabrikkhøyttalere og
        høyttaleradaptere.
    special_effects_output_interface:
      name: Utgangsgrensesnitt for spesialeffekter
      description: Angir utgangstilkoblingen/grensesnittet som brukes til å kontrollere
        spesialeffektenheter.
    special_effects_stand_stability_features:
      name: Stabilitetsfunksjoner for spesialeffektstativ
      description: Spesifiserer innebygde stabilitets- og sikkerhetsfunksjoner som
        er ment å forhindre velting eller skliing under hendelser.
    specialty_malt_name_type:
      name: Spesialmaltnavn/-type
      description: Identifiserer den spesifikke, navngitte spesialmalttypen (ofte
        brukt som kommersielt stilnavn).
    specimen_presentation:
      name: Prøvepresentasjon
      description: Angir hvordan samlerobjektet er forberedt eller presentert (f.eks.
        rått/ubearbeidet, polert, kuttet eller montert).
    speed_bag_accessories_included:
      name: Tilbehør til speedbag inkludert
      description: Viser ytterligere gjenstander som følger med fartsbagen, for eksempel
        hansker, luftpumper, svivler, kjettinger eller stativ.
    speed_rating:
      name: Hastighetsvurdering
      description: Angir hastigheten på spilleoverflaten som biljardduken gir (f.eks.
        langsom, middels eller rask).
    speedometer_backlight_type:
      name: Bakgrunnsbelysningstype for speedometer
      description: Angir om og hvordan speedometeret er bakgrunnsbelyst for synlighet
        om natten.
    speedometer_display_type:
      name: Speedometervisningstype
      description: 'Angir hastighetsavlesningsstilen til speedometeret: analog nål/skive,
        digital numerisk avlesning eller en kombinasjon av analoge og digitale elementer.'
    speedometer_unit_of_measure:
      name: Speedometers måleenhet
      description: Angir hastighetsenhetene som vises på skiven/skjermen.
    spike_replaceability:
      name: Utskiftbarhet for pigger
      description: Angir om piggene på skoen er utskiftbare, faste eller om skoen
        er piggløs.
    spike_shape:
      name: Piggform
      description: Angir geometrisk form på piggspissen, som påvirker feste og egnethet
        på ulike underlag.
    spike_thread_size:
      name: Gjengestørrelse for pigg
      description: Angir størrelsen eller standarden på gjengebasen som skrus inn
        i skoen (f.eks. 1/4-20).
    spin_classification:
      name: Spinn-klassifisering
      description: Angir spinnprofilen diskosen er designet for (lav, middels, høy,
        hyperspinn).
    spin_profile:
      name: Spinn-profil
      description: Spesifiserer de relative spinnegenskapene som skaftet fremmer.
    spin_types_supported:
      name: Støttede spinntyper
      description: Viser hvilke typer spinn maskinen kan gi ballene, slik at spillerne
        kan øve mot forskjellige slagstiler.
    spinach_preparation_style:
      name: Forberedelsesstil for spinat
      description: Beskriver den fysiske tilberedningen av spinatbladene eller produktformatet
        (f.eks. hele blader, hakket, terninger).
    spinach_variety:
      name: Spinatvariant
      description: Identifiserer den botaniske varianten eller markedsvarianten av
        spinat (f.eks. baby, savoy, vann, rød), slik at kundene kan velge nøyaktig
        den typen de ønsker.
    spindle_bearing_surface_material:
      name: Spindellagerets overflatemateriale
      description: Materiale i spissen/bæreflaten på støttespindler (tupp/bunn), som
        påvirker jevnhet og slitasje.
    spindle_bearing_type:
      name: Type lager for håndtein
      description: Materiale i spiss- eller lagerflaten på støttespindelen (tupp/bunn),
        som påvirker jevnhet og slitasje.
    spindle_finish:
      name: Spindelfinish
      description: Overflatebehandling/-belegg på spindelen som påvirker følelse,
        holdbarhet og estetikk.
    spindle_hook_type:
      name: Spindelkroktype
      description: Garnfangermekanismen øverst på spindelen som brukes til å feste
        ledegarn/garn.
    spindle_support_method:
      name: Spindelstøttemetode
      description: Hvordan spindelen er ment å støttes under spinning.
    spindle_tip_style:
      name: Spindelspiss-stil
      description: Formen/utformingen til punktet som hviler i toppen/bunnen (lagerflaten),
        som påvirker friksjon og jevn rotasjon.
    spindle_whorl_position:
      name: Posisjon for spinnehjul på håndtein
      description: Der kransen sitter på spindelakselen.
    spinner_blade_shape:
      name: Spinnerbladform
      description: Angir hovedformen på spinnerbladet, noe som påvirker vibrasjon,
        lysrefleks og gangdybde.
    spinner_control_card_design_type:
      name: Hjulkontrollkort – design/type
      description: Beskriver typen spinner-kontrollkort ut fra hvordan det viser styringsinformasjon
        (for eksempel forholdsreferanse, spenningsreferanse, omregningstabell).
    spinner_subtype:
      name: Undetype av spinner
      description: Klassifiserer den generelle hjuldesignen eller -familien (f.eks.
        inline-hjul, spinnerbait).
    spinning_oil_application_area:
      name: Bruksområde for tekstilolje
      description: Angir de tiltenkte påføringspunktene på et spinnhjul for oljen.
    spinning_oil_application_tool:
      name: Applikasjonsverktøy for olje til spinning
      description: Indikerer applikator-/emballasjespisstypen som brukes til å påføre
        olje på deler av spinnehjulet for kontrollert dosering.
    spinning_oil_features:
      name: Funksjoner for tekstilolje
      description: Fremhever funksjonelle egenskaper som er relevante for spinnehjuloljer
        (rester, flekker, oksidasjon og vaskbarhet).
    spinning_top_features:
      name: Funksjoner for snurrebass
      description: Spesielle spillfunksjoner inkludert i snurretoppen i tillegg til
        grunnleggende spinning.
    spinning_top_launch_mechanism:
      name: Oppskytingsmekanisme for snurrebass
      description: Hvordan snurretoppen startes/fremdrives for spinning.
    spinning_wheel_brake_tension_system_type:
      name: Bremse-/spenningssystemtype for spinnhjul
      description: Spesifiserer bremse-/opptaksspenningssystemet som brukes til å
        kontrollere garnopptaket.
    spinning_wheel_drive_system:
      name: Drivsystem for rokkhjul
      description: Angir drivsystemet spolen er beregnet for.
    spinning_wheel_hook_system:
      name: Kroksystem for spinnehjul
      description: Angir hvordan garnet ledes langs armene på fløyen.
    spinning_wheel_part_application:
      name: Bruk for spinnhjuldel
      description: Angir hvilke spinnhjulkomponenter oljen er beregnet for.
    spinning_wheel_portability_foldability:
      name: Bærbarhet/sammenleggbarhet for spinnhjul
      description: Angir om hjulet er konstruert for å foldes sammen/lukkes for transport.
    spinning_wheel_tension_adjustment_type:
      name: Justeringstype for spinnhjulspenning
      description: Hvordan spenningen justeres på hjulet for opptakskontroll.
    splice_termination_type:
      name: Skjøte-/avslutningstype
      description: Angir endeavslutningen som er gitt på ankerlinen (f.eks. skjøtet
        øye, fingerbøsse, kjettingkrok).
    split_shot_cut_type:
      name: Delt skudd-kuttype
      description: Angir sporet eller åpningsstilen som tillater feste til linjen.
    split_shot_shape:
      name: Form på splittlodd
      description: Beskriver splitthaglens fysiske form, som påvirker hydrodynamikk
        og risiko for å sette seg fast.
    split_shot_size:
      name: Størrelse på delt skudd
      description: Standardisert alfanumerisk størrelseskode (f.eks SSG, AAA, BB,
        1) brukt av produsenter og sportsfiskere for å klassifisere splitthagl-søkker.
        Utfyller nøyaktige vektmålinger.
    spoiler_adjustability:
      name: Justerbarhet av spoiler
      description: Angir om spoilervinkelen/-høyden er justerbar.
    spoke_accessory_function:
      name: Tilbehørsfunksjon for eiker
      description: Klassifiserer tilbehørets primærfunksjon på hjulet, for eksempel
        dekorativ, reflekterende eller belysende.
    spoke_butting_profile:
      name: Eikestøtteprofil
      description: Beskriver hvordan eikediameteren endres langs lengden (vanlig,
        enkel, dobbel, trippel eller firkantet), noe som påvirker vekt og styrke.
    spoke_gauge:
      name: Eiketykkelse
      description: Angir hvilken eiketykkelse (trådtykkelse) nipplen er beregnet for.
    spoke_interface_type:
      name: Type grensesnitt for eike
      description: Angir hvilken eikehodestil navet er designet for (J-bøyning, rett
        trekk, T-hode).
    spoke_shape:
      name: Eikeform
      description: Angir det ytre tverrsnittet av eiketråden, som påvirker aerodynamikk
        og estetikk.
    spool_form_factor:
      name: Formfaktor for spole
      description: Den fysiske stilen til spolekroppen og hvordan tråden/garnet beholdes
        (f.eks. flenset vs. konisk).
    spoon_style:
      name: Skjestil
      description: Angir funksjonell undertype eller stil for fiskeskjeen, for eksempel
        til kasting, flaksende gange eller dorging.
    sports_bra_padding_type:
      name: Sports-BH-polstringstype
      description: Angir hva slags polstring som er i sports-BH-en.
    sports_cap_style:
      name: Sportskaps-stil
      description: Identifiserer den overordnede kapskonstruksjonen/stilen (f.eks.
        baseballkaps, snapback), uavhengig av lagets merkevarebygging.
    sports_governing_body_certification:
      name: Sertifisering fra idrettsstyrende organer
      description: Indikerer offisielle sertifiseringer eller godkjenning fra anerkjente
        idrettsorganer, som bekrefter at produktet oppfyller konkurransestandarder.
    sports_surface_compatibility:
      name: Overflatekompatibilitet for sport
      description: Viser en liste over spille- eller overflatetyper malingen trygt
        kan påføres.
    sports_toy_set_contents:
      name: Innhold i sportslekesett
      description: Identifiserer hvilke komponenter som er inkludert i sportslekesettet
        (f.eks. ball, kølle, nett, blinker).
    spray_string_cleanup_method:
      name: Rengjøringsmetode med spraystrenger
      description: Anbefalt måte å fjerne/rengjøre rester etter spraystrenger på.
    spray_string_finish_effect:
      name: Spraystyrkes finish/effekt
      description: Visuell effekt av spraystrengen etter påføring (glans/refleksjon
        og spesialeffekter).
    spray_string_formulation_type:
      name: Formuleringstype for spraystreng
      description: Hvordan produktet oppfører seg under og etter spraying (f.eks.
        vaskbar kontra permanent).
    spray_string_recommended_surface:
      name: Anbefalt underlag for spraysnorer
      description: Overflatetyper som spraystrengene er ment å brukes på (og sannsynligvis
        vil kunne vaskes av).
    spray_string_scent:
      name: Duft i spraytråd
      description: Duft- eller luktprofil, hvis noen, av spraystrengen.
    spray_string_suitable_age_group:
      name: Egnet aldersgruppe for spraytråd
      description: Anbefalt minimumsalder for bruker/aldersgruppe for sikker bruk.
    spread_consistency:
      name: Smørekonsistens
      description: Beskriver teksturen/konsistensen til dippen eller smørepålegget
        for å sette forventninger til munnfølelse og bruk (f.eks. smidig, klumpete,
        pisket).
    spread_variety:
      name: Spredningsvariant
      description: Klassifiserer den spesifikke typen fruktpålegg (f.eks. syltetøy,
        gelé, marmelade, ostemasse) slik at kundene kan skille mellom ulike tilberedningsstiler
        og teksturer.
    spreader_bar_type:
      name: Type sprederstang
      description: Angir typen løftebøyle eller kroksystem som følger med eller er
        kompatibelt med selen.
    sprint_canoe_class:
      name: Sprintkano-klasse
      description: Angir den offisielle betegnelsen på sprintkanoklassen.
    sprout_presentation:
      name: Spirepresentasjon
      description: Identifiserer den fysiske presentasjonen av produktet (f.eks. ferske
        spirer, mikrogrønt, levende vekstpotte, pulver).
    squash_and_gourd_variety:
      name: Squash- og kalebassvariant
      description: Identifiserer den spesifikke kultivaren eller merkede varianten
        av squashen eller kalebassen, noe som hjelper kundene med raskt å finne ønsket
        type.
    stability_class:
      name: Stabilitetsklasse
      description: Generell stabilitetskategorisering utledet fra flyvurderinger eller
        markedsføringspåstander.
    stabilizer_thread_size:
      name: Gjengestørrelse for stabilisator
      description: Gjentespesifikasjon brukt til å feste en stabilisator eller tilbehør
        til en bue eller armbrøst.
    stabilizer_type:
      name: Stabilisatortype
      description: Identifiserer stilen eller posisjonsklassifiseringen til bue- eller
        armbrøststabilisatoren.
    stages_supported:
      name: Støttede stadier
      description: Angir hvor mange trinn en rakett eller et sett er designet for
        å fly med.
    stain_remover_format:
      name: Flekkfjernerformat
      description: Spesifiserer produktlevering/-format som brukes til å behandle
        bilflekker (sprayflaske, aerosol, skum, gel, pudder, våtservietter, penn/tusj).
    stake_shape:
      name: Stakeform
      description: Definerer tverrsnittet eller designstilen til en teltpinne, som
        påvirker holdekraften i forskjellige bakketyper.
    stamp_block_features:
      name: Funksjoner for stempelblokk
      description: Fremhever funksjonelle egenskaper ved stempelblokker, som målenett,
        håndtak eller sklisikre overflater.
    stamp_block_type:
      name: Stempelblokktype
      description: Angir konstruksjonen/stilen til stempelblokken som brukes til å
        montere stempler for stempling (f.eks. gjennomsiktig akrylblokk, tremontert
        blokk eller posisjoneringsblokk).
    stamp_set_pieces_included:
      name: Inkluderte stempelsettdeler
      description: Angir hvilke komponenter som er inkludert i stempel- og stempelputesettet
        (f.eks. stempler, stempelputer, tusjer).
    stand_padding_material:
      name: Polstringsmateriale for stativ
      description: Materiale som brukes på kontaktpunkter for å beskytte instrumentets
        overflate (f.eks. skum, gummi, silikon).
    staple_fiber_animal_fiber_type:
      name: Fibertype for animalsk stapelfiber
      description: Spesifikt dyr som er kilde til animalsk fiber når kildetypen er
        Animalsk.
    staple_fiber_crimp_level:
      name: Krølletasjegrad for stapelfiber
      description: Grad av naturlig krølling/bølgethet i fiberen.
    staple_fiber_preparation_type:
      name: Type stapelfiberforberedelse
      description: Forberedelses-/behandlingstilstanden til fiberen slik den selges
        (hvordan den er justert/håndtert), som betydelig påvirker spinnemetoden, hvor
        enkelt det er å trekke og sluttresultatet.
    staple_fiber_source_type:
      name: Kildetype for stapelfiber
      description: Bred opphavskategori for fiberinnholdet.
    starch_processing_type:
      name: Behandlingstype for stivelse
      description: Angir om stivelsen er naturlig eller har blitt fysisk eller kjemisk
        modifisert (f.eks. umiddelbart, pregelatinisert) for å gi spesifikke funksjonelle
        egenskaper som fortykningshastighet eller temperaturtoleranse.
    starch_source:
      name: Stivelseskilde
      description: Angir den botaniske kilden som kokestivelsen eller fortykningsmiddelet
        er avledet fra (f.eks. mais, potet, tapioka). Kilde er den primære differensieringsfaktoren
        for matlaging av stivelse og har direkte påvirkning på oppskrifters egnethet,
        allergenhensyn og forbrukernes søkeatferd.
    starfruit_variety:
      name: Stjernefruktvariant
      description: Identifiserer den spesifikke kultivaren eller varianten av stjernefrukt
        (f.eks. Arkin, Fwang Tung).
    starter_drive_type:
      name: Type drev i startmotor
      description: Startdriv-/innkoblingsmekanismen som brukes til å koble tannhjulet
        til ringgiret.
    starter_pistol_action_type:
      name: Mekanismetype for startpistol
      description: Identifiserer avfyrings-/handlingsmekanismen til startpistolen
        (f.eks. enkeltvirkende, dobbeltvirkende, halvautomatisk).
    starter_pistol_caliber:
      name: Kaliber for startpistol
      description: Angir kaliberet for løsammunisjon eller patronkaliber som startpistolen
        har kammer for.
    starter_terminal_type:
      name: Terminaltype i startmotor
      description: Angir terminal/koblingsstilen som brukes for elektrisk tilkobling
        på starteren eller startsolenoiden (f.eks. bolt-, spade-, pluggkobling).
    starting_block_anchoring_method:
      name: Forankringsmetode for startblokk
      description: Beskriver hvordan blokkene festes til sporoverflaten (f.eks. pigger,
        sugekopper, gummiputer).
    steerer_tube_design:
      name: Utforming av styrelagerrør
      description: Beskriver den konstruktive utformingen av styrelagerrøret – rett,
        konet, gjenget osv. – som avgjør hvilke hodesett og rammer det passer til.
    steering_cable_end_fitting_type:
      name: Styrekabelens endekoblingstype
      description: Identifiserer avslutnings-/festetypen på endene av en styrekabel
        på fartøyet (rorenden og motor-/styrepinneenden) for å sikre kompatibilitet
        med styrerorets og motorens forbindelsespunkter. Bruk standard- eller produsentbetegnelsen
        der det er aktuelt.
    steering_column_adjustability_features:
      name: Justeringsfunksjoner for styringskolonnen
      description: Angir hvilke funksjoner som er innebygd i styringskolonnen.
    steering_column_ignition_provision:
      name: Tilrettelegging for tenningslås på rattstammen
      description: Angir om rattkolonnen er konstruert for å akseptere en tenningslåssylinder/-bryter
        og/eller rattlås.
    steering_column_shaft_end_interface_type:
      name: Grensesnittstype for enden av rattstammeakselen
      description: Identifiserer styringens kolonnaksel-endegrensesnittsstil (f.eks.
        delt, dobbel D, kile).
    steering_column_shift_type:
      name: Type rattstammegir
      description: Angir om styringskolonnen inkluderer en kolonnemontert girmekanisme
        og dens girkassetype.
    steering_component_drive_type:
      name: Drivtype for styrekomponent
      description: Spesifiserer driv-/hjelpemekanismen som er relevant for styrekomponenter
        (spesielt pumper og EPS-systemer).
    steering_position:
      name: Styreposisjon
      description: Angir om varebilen har ratt på høyre eller venstre side.
    steering_pump_pulley_type:
      name: Type remskive på servostyringspumpe
      description: Angir remskivedriftstypen/grensesnittet som brukes med styringspumpen.
    steering_rack_finish_coating:
      name: Overflatebehandling/belegg på styresnekke
      description: Spesifiserer utvendig overflate/belegg for korrosjonsbeskyttelse.
    steering_rack_position:
      name: Posisjon for rattstamme
      description: Angir hvor tannstangen er montert/brukt i kjøretøyets styresystem.
    steering_wheel_cover_installation_type:
      name: Installasjonstype for rattdeksel
      description: Hvordan rattdekselet er montert/festet på rattet.
    steering_wheel_grip_material:
      name: Materiale for rattgrep
      description: Angir materialet på felgen/grepet (der hendene er i kontakt), som
        kan avvike fra felgens kjerne/eiker.
    steering_wheel_mounting_pattern:
      name: Monteringsmønster for ratt
      description: Angir monteringsmønsteret for bolter/hull som brukes til å feste
        rattet til et nav eller en adapter (f.eks. 3-bolts, 5-bolts).
    steering_wheel_rim_material_grip_surface:
      name: Materiale i rattkransen (gripeflate)
      description: Spesifiserer det primære grep-/felgebeleggmaterialet (forskjellig
        fra det generelle konstruksjonsmaterialet).
    stem_material:
      name: Stilkmateriale
      description: Angir materialet som brukes spesifikt til pipestammen eller munnstykket
        (f.eks. akryl, ebonitt, lucitt).
    stencil_machine_consumable_type:
      name: Forbrukstype for sjablongmaskin
      description: Spesifiserer forbruksvarene som kreves for drift (hvis noen).
    step_surface_texture:
      name: Overflatetekstur på trinn
      description: Angir trinnets eller overflatens design/materiale som er ment å
        forbedre grep og komfort når det er vått.
    stepper_motion_type:
      name: Steppermotorbevegelsestype
      description: Definerer den primære steppebevegelsen som maskinen tilbyr.
    stick_bow_profile:
      name: Profil for pinnebue
      description: Spesifiserer krumningsprofilen (eller «buetypen») til skaftet til
        landhockeykøllen, en kritisk faktor som påvirker ballkontroll, «drag-flick»-ytelse
        og spillestil.
    stick_construction:
      name: Konstruksjon i kølle
      description: Angir konstruksjonsstilen til hockeykøllen, for eksempel kompositt
        i én del, kompositt i to deler, eller tre.
    stick_curvature_type:
      name: Type pinnekrumning
      description: Beskriver krumningsprofilen til kastekøllen, som påvirker kasteavstand
        og nøyaktighet.
    stick_head_shape:
      name: Køllebladform
      description: Definerer formen på køllehodet, som påvirker fangst, slagstil og
        nærkontroll av ballen.
    stick_size_compatibility:
      name: Kompatibilitet for køllestørrelse
      description: Identifiserer størrelsesgruppen for hockeykøller som produktet
        er kompatibelt med (f.eks. ungdom, junior, mellomnivå, senior, keeper, universal).
    sticker_decal_features:
      name: Klistremerke-/dekalfunksjoner
      description: Fanger opp bruks- og ytelseskarakteristikker som er spesifikke
        for klistremerker/dekaler (f.eks. boblefri, flyttbar).
    sticker_finish:
      name: Overflatebehandling for klistremerke
      description: Beskriver overflatefinishen / den visuelle effekten til klistremerkene.
    sticker_format:
      name: Klistremerkeformat
      description: Angir butikkformfaktoren for de dekorative klistremerkene (f.eks.
        ark, rull, individuell, bok).
    sticker_material_type:
      name: Materialetype for klistremerke
      description: Angir det primære underlaget/materialet til det dekorative klistremerket
        (ikke utsmykningene).
    stilt_foot_attachment_type:
      name: Festetype for styltefot
      description: Angir hvordan brukerens fot festes til stylten (f.eks. spenne,
        borrelås, snøring).
    stirrup_style:
      name: Stigbøylestil
      description: Klassifiserer den design- eller disiplinspesifikke stilen til stigbøyler,
        som omfatter sikkerhets-, disiplin- og konstruksjonsvariasjoner.
    stirrup_tread_material:
      name: Materiale i stigbøyletråkk
      description: Angir materialet som brukes til fotplaten eller tråkket på stigbøylen,
        som påvirker grep, komfort og slitasje.
    stitch_marker_and_counter_style:
      name: Maskemarkør og tellerstil
      description: Angir stilen eller formfaktoren til en stingmarkør eller sting-/radteller
        (f.eks. låsemarkør, delt ringmarkør, ringteller, digital teller).
    stitch_types:
      name: Stingtyper
      description: Typer sting (funksjonelle og dekorative) som maskinen kan produsere.
    stitching_method:
      name: Stikkmetode
      description: Indikerer hvordan kulepanelene er satt sammen.
    stitching_state:
      name: Sytilstand
      description: Angir om klesplaggene leveres usydde, delvis sydde, sydde eller
        klare til bruk.
    stock_car_race_series:
      name: Stock car-raceserie
      description: Angir sanksjonsorganet eller løpsserien/-klassen som standardbilen
        er bygget for å konkurrere i.
    stone_adhesion:
      name: Steinklebing
      description: Angir om fersken- eller nektarinkjernen er uten stein, stein som
        sitter fast i kjøttet eller halvveis uten stein.
    stone_creation_method:
      name: TIlvirkningsmetode for stein
      description: Angir om steinen er naturlig, laboratoriedyrket, simulert eller
        resirkulert.
    stone_cut_grade:
      name: Steinskjæringsgrad
      description: Indikerer den generelle vurderingen av steinens slipekvalitet.
    stone_cut_style:
      name: Kuttstill for stein
      description: Skjærings-/fasettstil av glassteinen (f.eks. fasetter vs cabochon).
    stone_fruit_cultivar:
      name: Steinfruktkultivar
      description: Identifiserer den spesifikke kultivaren/varianten av ferskenen
        eller nektarinen.
    stone_fruit_variety:
      name: Steinfruktvariant
      description: Skiller mellom undertypen innenfor kategorien (f.eks. fersken,
        nektarin, donut/flatfersken).
    stone_setting_type:
      name: Type steininnfatning
      description: Angir hvordan en stein festes i stykket (fasett, spiss, pavé osv.).
    stone_transparency:
      name: Steingjennomsiktighet
      description: Optisk gjennomsiktighet/opasitet av glassteinen.
    storage_case_type:
      name: Type oppbevaringseske
      description: Angir hvilken type beholder settet leveres i for oppbevaring og
        transport (f.eks. eske, etui, pose).
    storage_compartment_type:
      name: Type oppbevaringsrom
      description: Angir typen oppbevaringsrom som svømmebøyen har for personlige
        eiendeler.
    storage_media_and_transfer_methods_supported:
      name: Støttede lagringsmedier og overføringsmetoder
      description: Støttede medie- eller forbindelsesmetoder for import/eksport av
        prøver og lagring/lasting av prosjekter.
    storage_requirements:
      name: Krav til lagring
      description: Spesifiserer hvordan produktet skal oppbevares før og/eller etter
        åpning for å opprettholde kvalitet og sikkerhet.
    stove_jack_compatibility:
      name: Kompatibilitet med komfyrkontakt
      description: Angir om teltet har en brannsikker åpning for komfyrrør.
    straight_pin_application:
      name: Bruk av rett nål
      description: Spesifiserer det tiltenkte bruksområdet for rette pinner.
    straight_pin_finish:
      name: Overflatebehandling for rett nål
      description: Beskriver overflatefinishen eller belegget på nålen (f.eks. forniklet)
        som påvirker korrosjonsmotstand og glidning.
    straight_pin_head_material:
      name: Nålhodemateriale
      description: Angir materialet til nålehodet (hvis det finnes), for eksempel
        plast eller glass.
    straight_pin_head_shape:
      name: Hodeform på rett nål
      description: Beskriver formen/stilen på nålhodet for brukervennlighet og synlighet.
    strand_configuration:
      name: Linekonfigurasjon
      description: Angir hvor mange separate rader eller tråder som utgjør den digitale
        lommebokkjeden (enkel, dobbel, trippel).
    strand_material:
      name: Trådmateriale
      description: Spesifiserer materialet som brukes til de individuelle strengene/streamerne.
    strap_attachment_hardware:
      name: Maskinvare for festing av stropp
      description: Angir typen/utformingen av maskinvare som brukes til å feste stroppen
        til instrumentet/støttepunktet.
    strap_configuration:
      name: Stroppekonfigurasjon
      description: Angir antall hjelmfestepunkter på stroppen (f.eks. 2-punkts, 4-punkts),
        som er kritisk for passform, sikkerhet og ligakrav.
    strap_functionality:
      name: Stroppfunksjonalitet
      description: Angir den primære tiltenkte bruken eller utformingen av yogamattestroppen.
    strap_padding:
      name: Stropp-polstring
      description: Indikerer graden av polstret konstruksjon i stroppen som er ment
        å forbedre komforten og fordele vekten.
    strap_side:
      name: Stroppeside
      description: Angir om stroppen er designet for venstre binding, høyre binding
        eller selges som par.
    strap_width:
      name: Stroppbredde
      description: Indikerer den relative bredden på skulderstroppene (tynn, medium,
        bred) for å veilede kunder som søker spesifikk dekning eller støtte.
    strength_classification:
      name: Styrkeklassifisering
      description: Styrkeetikett for markedsføring som vanligvis brukes av merkevarer
        (f.eks. Light, Strong, Extra Strong).
    strength_grade:
      name: Styrkegrad
      description: Beskriver hvilken tiltenkt holdestyrke/belastningsklasse borrelåsfestet
        har.
    stretch_level:
      name: Strekknivå
      description: Angir hvor mye tekstilet strekker seg under bruk.
    stretch_type:
      name: Strekktype
      description: Angir om stoffet har mekanisk eller elastisk strekk og i hvilke
        retninger.
    stretcher_bar_material:
      name: Materiale for båre
      description: Materiale brukt til bårestengene/-rammen (f.eks. furu, gran, poppel,
        bjørk, MDF/konstruert tre).
    strike_shield_shape:
      name: Form på slagskjold
      description: Angir den generelle formfaktoren til et slagskjolds treff-flate.
    string_core_shape:
      name: Form på strengens kjerne
      description: Spesifiserer kjernetrådformen som brukes i viklede tråder, som
        påvirker følelse og stabilitet.
    string_coverage:
      name: Strengdekning
      description: Angir hvilke strenger den delvise capoen er laget for å gripe over
        (etter antall eller vanlig kombinasjon).
    string_end_type:
      name: Strengendetype
      description: Angir hvordan styrken avsluttes ved broen/haledelen for kompatibilitet
        (spesielt viktig for akustisk/elektrisk og noen bass).
    string_set_type:
      name: Type strengesett
      description: Angir om produktet er et komplett sett eller individuelle erstatningsstrenger.
    strung_status:
      name: Strengstatus
      description: Angir om lacrossehodet leveres ferdigspent med lomme eller selges
        uten strenger.
    strut_placement:
      name: Plassering av stag
      description: Angir den tiltenkte monteringsposisjonen på kjøretøyet (foran/bak
        og venstre/høyre) for fjærbeina.
    stud_attachment_type:
      name: Festetype for knott
      description: Spesifiserer hvordan knottene/klossene er festet eller konfigurert
        på yttersålen, som påvirker grep, vedlikehold og samsvar med ligaens regler.
    stud_configuration:
      name: Knottekonfigurasjon
      description: Definerer formen og plasseringen av knotter/klosser på yttersålen,
        noe som påvirker grep og ytelse på ulike underlag.
    stud_material:
      name: Materiale i knott
      description: Identifiserer hovedmaterialet til knottene/klossene, og informerer
        om holdbarhet, vekt og samsvar med sikkerhetsforskrifter.
    stuffed_animal_features:
      name: Funksjoner for kosedyr
      description: Fremhever innebygde leke- og komfortfunksjoner på kosedyret.
    stump_base_type:
      name: Stubbebasetype
      description: Definerer stilen på basen eller monteringssystemet som cricketstumpen
        bruker (pigg, fjærretur, vektet gummi osv.).
    stump_mechanism:
      name: Mekanisme for stumps
      description: Angir retur- eller festemekanismen for cricket-stolpene (for eksempel
        fjærbelastet retur, fastmontert).
    stump_size:
      name: Stumpstørrelse
      description: Kategorisk størrelsesetikett brukt for cricketstumper, som indikerer
        typisk høyde og passende spilleraldersgruppe.
    subwoofer_installation_type:
      name: Subwoofer-installasjonstype
      description: Hvordan subwooferen er ment å installeres i et bilstereoanlegg.
    sugar_cane_variety:
      name: Sukkerrørvariant
      description: Identifiserer den spesifikke kultivaren eller markedsvarianten
        av sukkerrør, som kan påvirke farge, sødme og fiberinnhold.
    sugar_content_level:
      name: Innholdsnivå av sukker
      description: Klassifiserer det totale sukkernivået eller formuleringen av drikkekonsentratet,
        slik at kundene raskt kan finne vanlige, reduserte eller sukkerfrie alternativer.
    sugar_refinement_level:
      name: Sukkerraffineringsnivå
      description: Angir raffineringsgrad eller -stil (farge, melassestoff eller prosesseringsnivå).
    sugar_source:
      name: Sukkerkilde
      description: Identifiserer det botaniske eller materielle opphavet som sukkeret
        er avledet fra.
    suit_fit:
      name: Passform
      description: Helhetssnittet på drakten, som indikerer hvor tett den sitter inntil
        kroppen.
    suit_pieces:
      name: Dressdeler
      description: Angir hvor mange koordinerte plagg som er inkludert i draktsettet
        (f.eks. 2 deler, 3 deler, 4 deler).
    suitable_for_anchoring_use:
      name: Egnet for forankringsbruk
      description: Indikerer det tiltenkte forankringsrelaterte brukstilfellet for
        linen/tauet.
    suitable_for_craft_type:
      name: Egnet for fartøystype
      description: Primær bruk av nålarbeid som blokkeringstråden er beregnet for.
    suitable_for_paint_type:
      name: Egnet for malingstype
      description: Angir hvilke malingstyper lerretet er beregnet/trygt å bruke med.
    suitable_for_swim_stroke:
      name: Egnet for svømmetak
      description: Angir hvilke svømmetak håndpadlen er designet eller optimalisert
        for.
    suitable_mounting_surface_material:
      name: Egnet monteringsoverflatemateriale
      description: Angir den tiltenkte monteringsoverflaten/-materialet som den selvklebende
        baksiden er utformet for å feste seg til.
    suitable_play_location:
      name: Passende lekested
      description: Primært tiltenkte lekemiljøer for sand- og vannmølleleken.
    suitable_riding_conditions:
      name: Passende rideforhold
      description: Angir kjøreforholdene (f.eks. tørr, våt, vinter) sykkelsmøremiddelet
        eller -rensen er formulert for.
    suitable_snow_conditions:
      name: Egnede snøforhold
      description: Angir de primære snøunderlagene som grepsvoksen er formulert for.
    suitable_surface_type:
      name: Egnet overflatetype
      description: Angir gangflatene grepet er designet for.
    suitable_table_size:
      name: Egnet bordstørrelse
      description: Angir lengden(e) på biljard-/snookerbordet som lyset er designet
        for å lyse opp.
    sun_protection_rating_upf:
      name: Solbeskyttelsesklassifisering (UPF)
      description: Gir plaggets sertifiserte UPF-solbeskyttelsesnivå.
    sun_shade_attachment_method:
      name: Festemetode for solskjerming
      description: Hvordan solskjermen er festet til vinduet/frontruten.
    sun_shade_style:
      name: Solskjermstil
      description: Produktets konstruksjon/format for å bruke og lagre solskjermen.
    sunchoke_variety:
      name: Jordskokksort
      description: Angir den spesifikke kultivaren eller varianten av jordskokk (jerusalem-jordskokk),
        og gir detaljert informasjon for gartnere, kokker og kresne kunder.
    sunflower_oil_variety:
      name: Solsikkeoljevariant
      description: Klassifiserer fettsyreprofilen eller kultivaren til solsikkeoljen
        (f.eks. høy oljesyre, middels oljesyre, linoljesyre).
    sunflower_variety:
      name: Solsikkevariant
      description: Kultivar/variant av solsikke (vanlige markedsvarianter for bruk
        som snittblomster).
    support_brace_features:
      name: Funksjoner for håndleddstøtte
      description: Lister opp viktige funksjonelle egenskaper ved håndleddsstøtten,
        som pustende stoff, avtakbar skinne eller justerbar metallplate.
    support_leg_count:
      name: Antall støtteben
      description: Antall ben som har bakkekontakt når slagkøllen er i bruk (f.eks.
        enbensstativ, tobensstativ, trebensstativ).
    support_padding:
      name: Støttepolstring
      description: Angir om stroppen/støtten har integrert polstring ved kontaktpunkter
        (nakke/skulder/tommel).
    support_structure_type:
      name: Støttestrukturtype
      description: Angir byggemetoden som brukes for å holde vindskjermen oppreist.
    supported_bowling_delivery_types:
      name: Støttede bowlingleveringstyper
      description: Angir variasjonene i cricketbowling som maskinen kan simulere,
        for eksempel innsving, utsving og spinntyper.
    supported_dive_modes:
      name: Støttede dykkemoduser
      description: Angir operasjonelle dykkemoduser som dykkecomputeren støtter, for
        eksempel luft, nitrox eller måler.
    supported_equipment_type:
      name: Støttet utstyrstype
      description: Identifiserer vintersportsutstyret som stativet er designet for
        å holde (f.eks. ski, snowboard, skistaver).
    supported_spin_types:
      name: Støttede spinntyper
      description: Angir variasjonene i ballspinn som utskyteren kan bruke.
    supported_spool_bobbin_types:
      name: Støttede spole-/bobbintyper
      description: Angir hvilke spole-/spolehusformater den elektriske opprulleren
        er laget for å ta imot.
    surf_wax_temperature_rating:
      name: Temperaturvurdering for surfevoks
      description: Angir vanntemperaturområdet som voksen er formulert for, noe som
        sikrer optimalt grep i forskjellige klimaer.
    surface_coating_or_finish:
      name: Overflatebehandling eller finish
      description: Spesifiserer eventuell beskyttende eller ytelsesforsterkende overflatebehandling
        som er brukt på tangen.
    surface_coating_or_wrap:
      name: Overflatebelegg eller -innpakning
      description: Den ytre overflatehåndteringen som brukes til grep/kontroll på
        midtkøllen (og noen ganger håndkøller).
    surface_finish:
      name: Overflatebehandling
      description: Beskriver følelsen/teksturen på balloverflaten som påvirker grep
        og bevegelse under kontaktsjonglering.
    surface_finish_prep:
      name: Overflatebehandling/-forberedelse
      description: Angir friksjonsoverflatens tilstand (f.eks. nylig bearbeidet, maskinert,
        som støpt) ved salg.
    surface_types_included:
      name: Overflatetyper inkludert
      description: Angir hvilken overflate settet inkluderer for tegning/maling (hvis
        noen), for eksempel lerret, papir, trepaneler eller ingen.
    surfboard_construction:
      name: Konstruksjon i surfebrett
      description: Spesifiserer den primære konstruksjonsteknologien eller oppsettet
        til surfebrettet.
    surfboard_tail_shape:
      name: Form på surfebretthale
      description: Definerer omrisset av brettets hale, som påvirker manøvrerbarhet
        og grep.
    suspension_bushing_type:
      name: Type fjæringsbøssing
      description: Angir den funksjonelle/installasjonsmessige stilen til fjæringsbøssingen.
    suspension_configuration:
      name: Suspensjonskonfigurasjon
      description: Beskriver om trehjulssykkelen har fjæring og hvor den er plassert.
    suspension_material:
      name: Fjæringsmateriale
      description: Angir materialet til kjettingene, tauene eller kablene som brukes
        til å henge opp husken.
    suspension_trainer_accessories_included:
      name: Tilbehør til dempertrener inkludert
      description: Viser ytterligere gjenstander som følger med treningssettet (f.eks.
        døranker, forlengelsesstropp, oppbevaringspose), slik at kundene kan forstå
        hva som er i esken og sammenligne pakkeverdien.
    suspension_trainer_anchor_type:
      name: Forankringstype for suspensjonstrener
      description: Definerer monteringsstilen eller forankringspunktet stroppene er
        utformet for (f.eks. dør, tak, tre), som informerer om kompatibilitet med
        brukerens miljø.
    suspension_type:
      name: Type fjæring
      description: Angir om gaffelen er rigid eller bruker et bestemt fjæringssystem
        (luft, spiral, hybrid, elastomer osv.), noe som hjelper syklistene med å tilpasse
        gaffelen til kjørestilen sin.
    sustain_pedal_form_factor:
      name: Formfaktor for fortepedal
      description: Beskriver den fysiske stilen til sustainpedalen (f.eks. pianopedal
        kontra kompakt fotbryter), som påvirker følelsen og tiltenkt bruk.
    sustain_pedal_switch_type:
      name: Type bryter i sustainpedal
      description: Angir om pedalen sender et kortvarig (så lenge den trykkes ned)
        eller et låst (vekslende) signal.
    sustainability_certification:
      name: Bærekraftsertifisering
      description: Miljø- eller innkjøpssertifisering for trematerialet.
    swab_intended_bassoon_section:
      name: Vattpinne beregnet for fagottseksjon
      description: Identifiserer hvilken del av en fagott vattpinnen er laget for
        å rengjøre (forskjellige boringer/deler krever forskjellige former og størrelser).
    swab_style:
      name: Vattpinnestil
      description: Beskriver den fysiske utformingen/formatet til vattpinnen som brukes
        til å føres gjennom eller nå områder av saksofonen.
    swab_weight_material:
      name: Vattpinnemateriale
      description: Materiale i eventuelle gjennomtrekkslodd/leder (hvis til stede),
        som påvirker risiko for riper og slitestyrke.
    swab_weight_style:
      name: Vektstil for klut
      description: Angir hvordan vattpinnen vektes for å passere gjennom fagottboringen.
    sway_bar_adjustability:
      name: Justerbarhet av dreiestabilisator
      description: Om og hvordan dreiestabilisatorstivheten er justerbar (vanligvis
        via flere monteringshull i endeleddet).
    sway_bar_coating:
      name: Belegg på dreiestabilisator
      description: Overflatebehandling eller belegg på dreiestabilisator for korrosjonsbestandighet
        og utseende.
    sway_bar_fitment_front_rear_kit:
      name: Montering av dreiestabilisator (foran/bak/sett)
      description: Angir om dreiestabilisatoren er beregnet for forakselen, bakakselen
        eller selges som et sett for foran og bak.
    sweatshirt_pocket_type:
      name: Lommetype for genser
      description: Beskriver lommestilen på genseren.
    sweet_potato_variety:
      name: Søtpotetvariant
      description: Identifiserer den spesifikke kultivaren eller markedsvarianten
        av søtpoteten.
    sweet_spot_position:
      name: Sweet spot-posisjon
      description: Identifiserer hvor balltreets perfekte punkt er plassert langs
        bladet, noe som påvirker spillestil og kasteforhold.
    sweetener_presence:
      name: Tilstedeværelse av søtningsmiddel
      description: Angir om det finnes tilsatte søtningsmidler i nøttesmøret og hvilket
        nivå.
    sweetening_type:
      name: Søtningstype
      description: Beskriver hvordan produktet er søtet, eller søthetsnivået.
    swim_armband_construction_type:
      name: Konstruksjonstype for svømmearmbånd
      description: Definerer den strukturelle stilen eller flytemekanismen til armbåndene
        (oppblåsbare vs. solid skum, hybrid, osv.).
    swim_belt_purpose:
      name: Formålet med svømmebelte
      description: Funksjonell klassifisering av svømmebeltet (f.eks. flytestøtte,
        vannjogging, styrketrening, statisk snor, fallskjermfeste, vektballast, sikkerhetsvading).
    swim_board_features:
      name: Funksjoner for svømmebrett
      description: Fremhever spesielle egenskaper eller forbedringer ved svømmebrettet
        som forbedrer brukervennlighet eller sikkerhet.
    swim_bottom_length:
      name: Lengde på badebuksen
      description: Klassifiserer den totale bendekningen til svømmeboksere (f.eks.
        korte boksere vs. knelange).
    swim_buoy_features:
      name: Funksjoner i svømmebøyen
      description: Fanger opp ytterligere bemerkelsesverdige egenskaper eller tillegg
        som forbedrer en svømmebøyes synlighet, sikkerhet eller nytteverdi.
    swim_cap_style:
      name: Badehettestil
      description: Definerer konstruksjonen eller designstilen til badehetten (f.eks.
        langhåret, kuppel-/racinghette, boblehette/turban).
    swim_diaper_feature:
      name: Funksjon for svømmebleie
      description: Angir om svømmebuksen har en integrert lekkasjesikker bleiefunksjon
        eller krever/utelater en separat svømmebleie.
    swim_trainer_features:
      name: Funksjoner for svømmetrener
      description: Fremhever svømmetrenerens ytterligere funksjonelle eller komfortable
        funksjoner.
    swim_trainer_type:
      name: Type svømmetrener
      description: Definerer den strukturelle stilen eller formatet til svømmetreneren
        for å gjøre det lettere å filtrere etter design og treningsformål.
    swim_training_focus:
      name: Fokus for svømmetrening
      description: Identifiserer det primære treningsmålet padlen sikter mot (f.eks.
        teknikk, styrke, muskelisolasjon).
    swim_weight_style:
      name: Stil for svømmevekt
      description: Klassifiserer formfaktoren til svømmevekten, noe som hjelper kunden
        med å skille mellom fundamentalt forskjellige produkttyper samtidig som de
        forblir i samme kategori.
    swimbait_buoyancy:
      name: Oppdrift for swimbait
      description: Indikerer hvordan swimbaiten oppfører seg i vannsøylen (flytende,
        hengende, synkende osv.), slik at sportsfiskere kan velge riktig agn for måldybden
        og fiskestilen.
    swimbait_style:
      name: Swimbait-stil
      description: Klassifiserer konstruksjonen eller handlingsdesignet til swimbaitet,
        for eksempel paddle-tail eller glide-agn.
    swimwear_pieces_included:
      name: Inkluderte svømmeplagg
      description: Lister opp de individuelle plaggkomponentene som følger med i burkinisettet,
        slik at kundene vet nøyaktig hva som følger med i pakken.
    swimwear_set_pieces_included:
      name: Inkluderte deler i svømmesett
      description: Lister opp kleskomponentene som følger med i burkinisettet, slik
        at kundene vet nøyaktig hva de får (f.eks. topp, leggings, hijab/lue).
    swing_attachment_connection_type:
      name: Huskefeste/forbindelsestype
      description: Typen forbindelse som brukes til å henge husken fra støtten (f.eks.
        tau, kjetting, stropper).
    swing_trainer_type:
      name: Type svingtrener
      description: Klassifiserer stilen eller mekanismen til svingtreneren, slik at
        kundene raskt kan finne enheter som samsvarer med treningsmålene deres.
    swing_training_objective:
      name: Mål med svingtrening
      description: Klassifiserer det primære treningsfokuset, mekanismen eller målet
        til svingtreneren (f.eks. tempo, hastighet, grep).
    switch_electrical_positions:
      name: Bytt elektriske posisjoner
      description: Angir antall og atferd for elektriske posisjoner på bryteren (f.eks.
        3-posisjon, momentant på).
    swivel_type:
      name: Sviveltype
      description: Angir svivelkonfigurasjonen som brukes for å redusere floker i
        båndet.
    sword_scabbard_material:
      name: Materiale for sverdslire
      description: Angir hovedmaterialet i den medfølgende sliren/skjeden (hvis aktuelt).
    synthesizer_form_factor:
      name: Synthesizer-formfaktor
      description: Beskriver synthesizeren grensesnittformat for fysisk/spilling.
    synthetic_feather_style:
      name: Syntetisk fjærstil
      description: Stil/snitt for den syntetiske fjæren som brukes til forskjellige
        stiler og skapelsesteknikker.
    synthetic_formulation_type:
      name: Syntetisk formuleringstype
      description: Spesifiserer det syntetiske basematerialet/formuleringstypen (f.eks.
        PAO, ester, hydrokrakket gruppe III).
    syrup_base_ingredient:
      name: Basisingrediens i sirup
      description: Identifiserer den primære planten eller sukkerkilden som sirupen
        eller nektaren er utvunnet fra (f.eks. lønnetre, agave, rørsukker).
    syrup_variety:
      name: Sirupvariant
      description: Definerer den generelle stilen eller kategorien av sirup basert
        på dens formulering eller tradisjonelle bruk (f.eks. lønnetre, kaffesmak,
        frukt, medisinsk).
    t_shirt_fit:
      name: T-skjorte-passform
      description: Beskriver den tiltenkte generelle passformen/snittet på T-skjorten.
    tabla_included_components:
      name: Inkluderte komponenter med tabla
      description: Angir hvilke tonearter som er inkludert i tabla-produktoppføringen
        (enkelttromme vs. sett, etui/eske, stemmehammer osv.).
    tabla_set_pieces_included:
      name: Inkluderte deler i tabla-sett
      description: Angir hvilke komponenter som er inkludert i tabla-settet (f.eks.
        dayan, bayan, ringer, dekke, stemmeverktøy, veske).
    tabla_tonal_pitch_range_bayan:
      name: Tablas tone-/tonehøydeområde (bayan)
      description: Beskriver den typiske tonehøyden/tonale rekkeviddekategorien for
        bayan-trommer (bass) basert på størrelse og konstruksjon.
    table_base_material:
      name: Materiale i bordbase
      description: Identifiserer hovedmaterialet til bordets base eller pidestall
        (forskjellig fra ben eller bordplate), noe som bidrar til materialspesifikk
        filtrering.
    table_base_type:
      name: Bordbasetype
      description: Identifiserer den strukturelle utformingen som støtter bordplaten
        (f.eks. pidestall, bukk, X-sokkel).
    table_coverage_position:
      name: Borddekningsposisjon
      description: 'Angir hvilke bordtennis-bordposisjoner trekket er designet for
        å passe til: sammenslått, spiller eller begge deler.'
    table_hockey_part_type:
      name: Deltype for bordhockey
      description: Identifiserer den spesifikke komponenttypen i bord-/luft-/stang-/boblehockeysystemer.
    table_leg_design:
      name: Bordbendesign
      description: Identifiserer benets strukturelle stil eller geometri, slik at
        kunden kan matche spesifikke estetikk- og støttebehov.
    table_size:
      name: Bordstørrelse
      description: Kommersielt oppgitt totalstørrelse for biljardbord (i fot), slik
        at kundene raskt kan velge vanlige alternativer som 7 fots barbord eller 9
        fots turneringsbord.
    table_size_category:
      name: Størrelseskategori for bord
      description: Kategoriserer bordfotballbordet etter totalt fotavtrykk for å hjelpe
        kunder med å matche tilgjengelig plass uten å beregne mål.
    table_tennis_certification:
      name: Bordtennissertifisering
      description: Viser offisielle standarder eller styringsorganers godkjenning
        som produktet oppfyller (f.eks. ITTF, EN 14468-2 klasser).
    tabletop_tilt_function:
      name: Function for bordvipping
      description: Angir om bordplaten kan vippes, vendes eller dreies i forskjellige
        vinkler.
    tackle_components_included:
      name: Inkluderte komponenter til fiske
      description: Lister opp de spesifikke fiskeutstyrskomponentene som er inkludert
        i settet, slik at kundene vet nøyaktig hva som følger med.
    talking_drum_accessories_included:
      name: Inkludert tilbehør til klemtromme
      description: Viser tilbehøret som følger med klemtrommen (i esken).
    talking_drum_cord_material:
      name: Snormateriale for klemtromme
      description: Materiale som brukes til spennsnorene/tauene som forbinder trommeskinnene.
    talking_drum_tuning_mechanism:
      name: Stemmingsmekanisme for klemtromme
      description: Hvordan trommens tonehøyde endres/spenning påføres under spilling
        (eller under oppsett).
    tam_tam_construction_style:
      name: Tam-tam-konstruksjonsstil
      description: Konstruksjon/hamringstil for tam-tam.
    tam_tam_items_included:
      name: Tam-tam-varer inkludert
      description: Tilbehør følger med tam-tam-en (f.eks. klubbe, stativ, deksel).
    tamarillo_variety:
      name: Tamarillovariant
      description: Identifiserer den spesifikke kultivaren eller varianten av tamarillo-frukten.
    tamarind_variety:
      name: Tamarind-variant
      description: Spesifiserer den botaniske eller kommersielle varianten av tamarind,
        som kan påvirke smak, tekstur og kulinarisk bruk.
    tambourine_frame_style:
      name: Rammestil for tamburin
      description: Beskriver den fysiske håndholdte rammekonfigurasjonen som brukes
        til å holde/spille tamburinen.
    tambourine_head_material:
      name: Materiale i tamburinhode
      description: Angir materialet i spillehodet (membranen) på tamburiner med hode.
    tambourine_jingle_configuration:
      name: Konfigurasjon av tamburinjingel
      description: Hvordan jinglene er arrangert eller konstruert på tamburinen.
    tambourine_jingle_material:
      name: Tamburin-jinglemateriale
      description: Angir materialet i tamburinens metallskiver (jingler), noe som
        påvirker tone og holdbarhet.
    tambourine_mounting_type:
      name: Monteringstype for tamburin
      description: Hvordan tamburinen er ment å holdes eller monteres under spilling.
    tambourine_tuning_mechanism:
      name: Stemmemekanisme for tamburin
      description: Spesifiserer stemmesystemet som brukes på stembare håndholdte tamburiner
        (hvis aktuelt).
    tank_model_scale:
      name: Tankmodellskala
      description: Angir skalaforholdet til tankens skalamodell (f.eks. 1:35, 1:72).
    tank_top_back_style:
      name: Singlet-ryggstil
      description: Spesifiserer formen eller snittet på baksiden av singleten, som
        påvirker støtte, mobilitet og estetikk.
    tape_application_area:
      name: Bruksområde for teip
      description: Angir hvilken del av utstyret eller spilleren der tapen skal brukes,
        noe som hjelper kundene med å velge riktig stil.
    tape_finish:
      name: Tapefinish
      description: Overflate / visuell finish (glans eller tekstur) på tapen.
    tape_purpose:
      name: Formål med teip
      description: Spesifiserer den primære funksjonelle bruken av teipen innen racketvedlikehold
        eller -tilpasning.
    tape_type:
      name: Båndtype
      description: Klassifiserer den funksjonelle stilen eller konstruksjonen til
        hockeytapen, for eksempel stoff, gjennomsiktig polyetylen, grep, elastisk
        kohesiv, leggbeskytter eller semskinn.
    tapenade_main_ingredients:
      name: Hovedingredienser i tapenade
      description: Angir den primære basisingrediensen som definerer tapenaden (oliven,
        tomat, aubergine, paprika osv.), nyttig for kunder med ingrediensbaserte preferanser
        eller restriksjoner.
    tapestry_loom_loom_format:
      name: Vevstolformat for billedvev
      description: Overordnet formfaktor / stativstil for billedvevvevstol.
    tapestry_loom_shedding_method:
      name: Skillemetode for billedvevstol
      description: Hvordan vevstolen lager skillegang (skiller renningstråder) for
        innslagstråden.
    tapestry_loom_tensioning_system:
      name: Strammesystem for vevestol
      description: Metoden som brukes til å stramme og feste renningen på billedvevstolen.
    tar_head_material:
      name: Målkomponenter
      description: Identifiserer materialet i tarens trommeskinn (membran), som i
        stor grad påvirker følelse, holdbarhet og klang.
    tar_playing_style:
      name: Spillestil for tar
      description: Angir primær spilleposisjon/teknikk rammetrommen er designet for.
    tar_tuning_system:
      name: Tjærejusteringssystem
      description: Angir hvordan taren er innstilt (hvordan hodespenningen er justert).
    target_components:
      name: Målkomponenter
      description: Spesifiserer hvilke drivstoff-/luftinntakskomponenter produktet
        er ment å rengjøre.
    target_relative_humidity_rh:
      name: Mål for relativ fuktighet (RH)
      description: Den tiltenkte relative fuktigheten som produktet er designet for
        å opprettholde inne i instrument-/boksmiljøet.
    target_resetting_mechanism:
      name: Mål for tilbakestillmekanisme
      description: Beskriver hvordan, eller om, en blink går tilbake til sin opprinnelige
        posisjon etter å ha blitt truffet.
    target_trainer_type:
      name: Type måltrener
      description: Klassifiserer den generelle stilen eller formatet til racquetball-
        eller squash-måltreneren.
    targeted_contaminants:
      name: Målrettede forurensninger
      description: Typer mikrober eller parasitter som produktet er sertifisert for
        å eliminere.
    targeted_muscle_group:
      name: Målrettet muskelgruppe
      description: Primær muskelgruppe som tilbehøret er ment å trene eller støtte.
    taro_variety:
      name: Tarovariant
      description: Angir kultivar, art eller markedsnavn på taroroten (f.eks. lilla
        taro, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Type toppkant på duskkant
      description: Angir konstruksjonen av den øverste monteringsdelen som brukes
        til å feste duskkant til en overflate (f.eks. tape, flette, snor).
    tassel_trim_use_case:
      name: Brukstilfelle for duskkant
      description: Primært tiltenkt bruksområde for duskens kant.
    taste_profile:
      name: Smaksprofil
      description: Beskriver de dominerende smakskarakteristikken til eplesorten.
    tea_variety:
      name: Tevariant
      description: Klassifiserer den spesifikke typen eller stilen av te (f.eks. svart,
        grønn, matcha, rooibos) slik at kundene kan filtrere etter sine foretrukne
        varianter.
    teasing_tool_style:
      name: Stil på tuperingsverktøy
      description: Den fysiske utformingen av opptufteverktøyet som brukes til å åpne
        og blande fibre (for eksempel børste, rive, kam).
    tee_base_style:
      name: T-skjorte-basestil
      description: Identifiserer den strukturelle utformingen av basen til en rugby-T-skjorte
        som støtter ballen.
    temper_hardness:
      name: Herding/hardhet
      description: Angir hvor myk eller hard tråden er (hvor godt den holder former).
    temperature_control_type:
      name: Type temperaturkontroll
      description: Hvordan verktøyets temperatur kontrolleres/justeres.
    tenkara_action_ratio:
      name: Tenkara-aksjonsforhold
      description: Indikerer det tradisjonelle Tenkara-fleksforholdet som beskriver
        hvor stangen bøyer seg under belastning (f.eks. 6:4).
    tennis_ball_court_surface:
      name: Tennisball-baneoverflate
      description: Angir baneoverflaten(e) ballen er designet for, for å sikre optimal
        ytelse og holdbarhet.
    tennis_ball_pressure_type:
      name: Trykktype for tennisball
      description: Identifiserer ballens indre trykk eller konstruksjon (trykksatt,
        trykkløs, lavkompresjon, skum) som påvirker sprett og holdbarhet.
    tennis_racket_grip_size:
      name: Størrelse på tennisrackethåndtak
      description: Angir den standardiserte omkretsen til rackethåndtaket (L0–L5 eller
        tilsvarende i tommer) for å sikre riktig håndtilpasning og komfort.
    tenor_flutophone_fingering_system:
      name: Tenorflutofon-fingersystem
      description: Angir fingersettingssystemet som brukes av tenorflutofonen (undervisningsopplegg/notasjonskonvensjon).
    tenor_recorder_joint_type:
      name: Tenorblokkfløyte-leddtype
      description: Angir ledd-/forbindelsestypen mellom seksjonene på tenorblokkfløyten.
    tenor_saxophone_key_system:
      name: Tenorsaksofonens tangentur
      description: Angir klaviatursystemet/standarden som brukes (ofte referert til
        som fransk/Boehm-stil for saksofoner).
    tenor_saxophone_pad_material:
      name: Tenorsaksofon-polstringsmateriale
      description: Angir primærmaterialet som er brukt i instrumentputene.
    tenor_trombone_slide_type:
      name: Type tenorbasun-slide
      description: Type slide brukt på tenorbasun (f.eks. standard/rett eller med
        trigger/axial-ventil).
    tenor_trombone_valve_configuration:
      name: Ventilkonfigurasjon for tenortrombone
      description: Angir om tenortrombonen har et ventil-/rotorfeste og hvilken konfigurasjon
        den bruker.
    tension_control_type:
      name: Kontrolltype for spenning
      description: Angir om, og i så fall hvordan, skyttelen gir justerbar brems/spenning
        på spolen/pinnen under mating.
    tension_mechanism:
      name: Spenningsmekanisme
      description: Strammeteknikken som brukes til å kontrollere veftmatingen fra
        spolen/pirnen under veving.
    tension_pitch_modulation_system:
      name: Modulasjonssystem for spenning/tonehøyde
      description: Hvordan klemtrommen endrer tonehøyde/spenning under spilling (for
        eksempel ved å klemme på spennsnorer).
    tension_system:
      name: Spenningssystem
      description: Spinnehjulets opptrekks-/spenningssystem som fløysettet er beregnet
        for.
    tent_fabric_material:
      name: Materiale i teltstoff
      description: Identifiserer det primære stoffet som brukes i teltfluen eller
        -kroppen, noe som påvirker vekt, pusteevne og værbestandighet.
    tent_season_rating:
      name: Teltsesongvurdering
      description: Klassifiserer teltet etter antall sesonger eller værforholdene
        det er konstruert for (f.eks. 3 sesonger, 4 sesonger, ekspedisjon).
    tent_setup_type:
      name: Oppsettype for telt
      description: Angir teltets strukturelle oppstillingsstil, for eksempel frittstående,
        delvis frittstående, ikke-frittstående, oppblåsbart/flyskrog eller popup.
    tent_style:
      name: Teltstil
      description: Beskriver teltets strukturelle utforming (f.eks. kuppel, tunnel,
        A-ramme).
    test_result_output_method:
      name: Metode for utdata av testresultater
      description: Angir hvordan kjøretøyets batteritester presenterer eller leverer
        testresultater til brukeren (f.eks. indikator, skjerm, utskrift, app eller
        programrapport).
    tether_strap_system:
      name: Feste-/stroppesystem
      description: Type feste- eller stroppesystem som brukes til å feste nakkestøtten
        til hjelmen/selen (hvis aktuelt).
    text_color:
      name: Tekstfarge
      description: Fargen på den trykte eller broderte teksten på etiketten, forskjellig
        fra bakgrunnsfargen på etiketten.
    textile_craft_machine_operation_type:
      name: Driftstype for tekstilhåndverksmaskin
      description: Hvordan maskinen betjenes (hånddrevet vs. fotdrevet vs. motorisert/elektrisk).
    textile_finish_treatment:
      name: Tekstilbelegg/-behandling
      description: Spesifiserer merkbar overflatebehandling som er brukt på tekstilmaterialet.
    texture_inclusions:
      name: Teksturinneslutninger
      description: Spesifiserer tilsatte teksturkomponenter, som aloe vera-masse,
        basilikumfrø, nata de coco, poppende bobakuler eller fruktbiter.
    therapeutic_technology:
      name: Terapeutisk teknologi
      description: Spesifiserer eventuelle integrerte terapeutiske funksjoner, som
        kjølegel, magnetstrimler eller infrarød keramikk.
    thermal_set_components:
      name: Komponenter i termisk sett
      description: Angir om produktet inneholder kun underdel, kun overdel eller begge
        deler i et sett.
    thermal_weight:
      name: Termisk vekt
      description: Angir varmekategorien til balaklava-stoffet.
    thermostat_type:
      name: Termostattype
      description: Den funksjonelle utformingen eller kontrollstilen til en termostat
        i et kjølesystem for motorkjøretøy.
    thimble_guide_size:
      name: Størrelse på fingerbølguide
      description: Størrelsesbetegnelse på fingerbølguiden (passform/dekningsstørrelse),
        selges vanligvis som liten/middels/stor i stedet for målt dimensjon.
    thread_connection_size:
      name: Størrelse på gjengeforbindelse
      description: Definerer gjengespesifikasjonen som forbinder aksler, tupper og
        adaptere (f.eks. 6 mm, 5/16"–24).
    thread_construction:
      name: Trådkonstruksjon
      description: Hvordan tråden er bygd opp eller behandlet (for eksempel flertrådet
        brodergarn kontra limt/bondet tråd).
    thread_cord_type_beading_pattern:
      name: Tråd-/snortype (perlemønster)
      description: Anbefalt tråd- eller snortype som brukes til å fullføre mønsteret.
    thread_cutter_form_factor:
      name: Trådkutters formfaktor
      description: Identifiserer den fysiske stilen til trådkutteren, for eksempel
        håndholdte sakser, anhengssaks eller ringsaks.
    thread_cutter_mechanism:
      name: Trådkuttermekanisme
      description: Beskriver skjærehandlingen eller mekanismen som brukes av gjengeskjæreren.
    thread_cutter_safety_features:
      name: Sikkerhetsfunksjoner for trådkutter
      description: Beskriver innebygde sikkerhetsfunksjoner som reduserer risikoen
        for utisliktede kutt eller beskytter bladene under lagring.
    thread_cutter_usage_application:
      name: Trådkutterbruk
      description: Indikerer den primære tiltenkte håndverksbruken av trådkutteren.
    thread_finish_treatment:
      name: Overflatebehandling/finish for tråd
      description: Overflatefinish eller behandling påført tråden som påvirker ekspedering
        og ytelse (f.eks. vokset, bundet, mercerisert).
    thread_material:
      name: Trådmateriale
      description: Primærfiber/materialinnhold i tråden/broderigarnet (ikke tekstil).
    thread_material_fiber:
      name: Trådmateriale (fiber)
      description: Angir primærfiberen/materialet i selve tråden (ikke stoffet).
    thread_package_format:
      name: Trådpakkeformat
      description: Emballasjeformfaktor for sytråden (f.eks. spole, kjegle, snelle).
    thread_rack_compatible_spool_type:
      name: Trådstativ – kompatibel spoltype
      description: Type trådpakke stativet er designet for å romme (spoler kontra
        kjegler, osv.).
    thread_standard_size:
      name: Standardstørrelse for gjenger
      description: Identifiserer gjengestørrelse/vektstandarden som brukes på produktetiketten
        (f.eks. wt, Tex, denier).
    thread_type:
      name: Gjengetype
      description: Spesifiserer konstruksjonen/typen av korsstingtråd/-broderigarn.
    thread_weight_system:
      name: Trådvektsystem
      description: Standarden som brukes til å uttrykke trådtykkelse/-vekt.
    thread_yarn_guide_mounting_attachment_style:
      name: Montering-/festestil for tråd- og garnføring
      description: Beskriver hvordan føringen bæres eller monteres under bruk.
    thread_yarn_guide_tension_control:
      name: Spenningskontroll for tråd- og garnføring
      description: Angir om og hvordan føringen gir justerbar spenning/motstand på
        tråden eller garnet.
    thread_yarn_organizer_features:
      name: Funksjoner for tråd- og garnorganisering
      description: Fremhever funksjonelle organisasjons- og portabilitetsfunksjoner
        som er spesifikke for tråd-/garnlagring.
    threader_intended_use:
      name: Tiltenkt bruk for nåleitreder
      description: Indikerer den primære skapelseskonteksten som den håndholdte nåltrederen
        er designet for.
    threading_system:
      name: Gjengesystem
      description: Angir metoden og hjelpemidlene som brukes til å træ sergeren (f.eks.
        manuell, fargekodet, guidet, luftføring).
    threading_type:
      name: Type gjenge
      description: Angir om smykket bruker interne tråder, eksterne tråder, er trådløs
        eller ikke gjeldende.
    throttle_type_scooter_conversion:
      name: Type gasshåndtak (scooterkonvertering)
      description: Angir hvilken type gasshåndtak/grensesnitt konverteringssettet
        leveres med eller krever.
    throw_rope_end_attachment:
      name: Feste for enden av kastetauet
      description: Avslutningen/festemaskinvaren eller løkken som er plassert i kastetauets
        arbeidsende(r).
    throw_rope_storage_packaging_type:
      name: Oppbevaring/emballasjetype for kastetau
      description: Hvordan kastetauet lagres eller brukes (f.eks. bag eller snelle).
    throw_rope_visibility_features:
      name: Synlighetsfunksjoner for kastetau
      description: Synlighets- og identifikasjonsfunksjoner som skal gjøre tauet lettere
        å se i vann / dårlig belysning.
    thrower_operation_type:
      name: Brukstype for utkaster
      description: Klassifiserer kasterens mekaniske stil / driftsstil for rask filtrering
        av manuelle kontra automatiske mekanismer.
    thumb_design:
      name: Tommeldesign
      description: Beskriver hvordan tommelen er integrert i hansken, noe som påvirker
        sikkerhet og grep.
    tiara_design:
      name: Tiaradesign
      description: Angir den overordnede strukturelle stilen eller silhuetten til
        tiaraen.
    tie_down_points_straps_included:
      name: Festepunkter/stropper inkludert
      description: Angir om stativet har integrerte festepunkter og/eller inkluderte
        stropper for å sikre motorsykkelen/scooteren.
    tiling_format:
      name: Fliseformat
      description: Angir PDF-layout for å sette sammen trykte sider.
    time_current_characteristic:
      name: Tid-strøm-karakteristikk
      description: Angir sikringens tids‑/strømkarakteristikk (for eksempel hurtigvirkende
        eller treg), noe som påvirker egnethet i kretser med innkoblingsstrøm.
    timer_count_mode:
      name: Tidtakermodus
      description: Angir tidtakerens tellemodus, for eksempel nedtelling, opptelling
        (stoppeklokke), begge deler eller intervall/repetisjon.
    timer_display_type:
      name: Tidtakervisningstype
      description: Angir hvordan spilltimeren viser gjenværende tid (f.eks. digital
        skjerm, analog skive, sandtimeglass eller ingen visuell visning).
    timer_operating_modes:
      name: Bruksmoduser for tidtaker
      description: Timer-atferd støttes for å utløse effekter.
    timing_belt_construction_material_rubber_compound:
      name: Konstruksjonsmateriale i tannreim (gummisammensetning)
      description: Primær gummiblanding for reim som brukes (f.eks. HNBR), som påvirker
        varme-/oljemotstand og levetid.
    timing_belt_profile:
      name: Profil på tannreim
      description: Standard tannprofil/-form i tannreim (f.eks. trapesformet vs. kurvelinjet).
    timing_belt_reinforcement_cord_material:
      name: Materiale i forsterkningen i tannreimen
      description: Spesifiserer det interne forsterkningssnormaterialet inne i registerreimen
        (f.eks. glassfiber, aramid), som påvirker styrke og strekk.
    timing_component_material:
      name: Materiale i timerkomponent
      description: Primærmateriale i tannkomponenten (reimblanding, kjede-/girmetall,
        dekselmateriale).
    tin_whistle_body_material:
      name: Kroppsmateriale for blikkfløyte
      description: Fanger opp vanlige kroppsmaterialer for tinnfløyte mer spesifikt
        enn den brede listen over instrumentmaterialer når det er nødvendig.
    tin_whistle_bore_type:
      name: Boretype for blikkfløyte
      description: Spesifiserer boringsutformingen til blikkfløyten.
    tin_whistle_included_accessories:
      name: Blikkfløyte inkludert tilbehør
      description: Tilbehør som følger med blikkfløyten (f.eks. eske, rensestang).
    tip_finish_coating:
      name: Overflatebehandling/belegg på spiss
      description: Spesifiserer overflatebehandlingen på arbeidsenden (f.eks. forkrommet,
        pulverlakkert) som påvirker korrosjonsmotstanden og felgskader.
    tip_shape:
      name: Spissform
      description: Beskriver formen eller skarpheten på gitarplektertuppen, som påvirker
        artikulasjonen og plekterfølelsen.
    tippet_rating:
      name: Tippet-vurdering
      description: Maksimalt anbefalt fortomstyrke angitt i fluefiske‑X‑betegnelser
        (for eksempel 4X).
    tire_changer_operation_type:
      name: Operasjonstype for dekkskifte
      description: Spesifiserer hvordan en dekkskiftermaskin aktiveres/betjenes (f.eks.
        manuell, pneumatisk, hydraulisk). Forskjellig fra det generelle «strømkilde»-attributtet,
        brukes når man beskriver maskinens driftsaktiveringsmetode.
    tire_changer_type:
      name: Dekkskiftertype
      description: Den generelle driftsstilen, designet eller automasjonsnivået til
        en dekkskiftermaskin.
    tire_compound_type:
      name: Type dekkmateriale
      description: Spesifiserer klassifiseringen av gummiblandingen som brukes i dekkene
        (f.eks. myk, regn, glatt), som påvirker veigrep og holdbarhet under ulike
        fører.
    tire_load_range:
      name: Dekkets belastningsklasse
      description: Angir dekkets lagvurdering / betegnet belastningsområdeofte for
        LT-dekk), som viser hvor stor last de kan bære.
    tire_position:
      name: Dekkposisjon
      description: Anbefalt monteringsposisjon på kjøretøyet.
    tire_repair_kit_components:
      name: Komponenter i dekkreparasjonssett
      description: Angir varen som er inkludert i settet, slik at kunder kan sammenligne
        pakkens fullstendighet.
    tire_sidewall_type:
      name: Dekksideveggtype
      description: Spesifiserer sideveggens styling eller konstruksjonsfunksjoner.
    tire_speed_rating:
      name: Hastighetsrangering for dekk
      description: Dekkets hastighetsklassifiseringsbokstav (f.eks. H, V, W) som angir
        maksimal vedvarende hastighetsfunksjonalitet.
    tire_spoon_type:
      name: Type dekkspak
      description: Kategoriserer dekkskjeen etter endeform og tiltenkt bruk.
    tire_system_compatibility:
      name: Kompatibilitet med dekksystemer
      description: Angir om tetningsmidlet er beregnet for slangeløse oppsett, slangedekk
        eller begge deler.
    tire_temperature_rating_utqg:
      name: Dekktemperaturklassifisering (UTQG)
      description: UTQG-temperaturbestandighetsgrad for bildekk (f.eks. A, B, C).
    tire_traction_rating_utqg:
      name: Dekkgrepsvurdering (UTQG)
      description: UTQG-trekkraftsgrad for våtbremsing.
    tire_tread_style:
      name: Mønsterstil for dekk
      description: Beskriver det generelle slitebanemønsteret til det rørformede dekket,
        som gjenspeiler tiltenkt terreng og veigrepsegenskaper.
    tire_tube_type:
      name: Dekkslangetype
      description: Om dekket er designet for bruk med eller uten slange.
    title_status:
      name: Status for eierskap
      description: Kjøretøyets juridiske status / registreringstittelstatus.
    tobacco_application:
      name: Tobakksbruk
      description: Angir den tiltenkte forbruksmetoden eller røykeapparatet som løstobakken
        er beregnet for.
    tobacco_cut_type:
      name: Type snitt for tobakk
      description: Spesifiserer den fysiske kutt- eller tilberedningsstilen til løstobakken,
        som påvirker brennhastighet, pakkemetode og generell røykeopplevelse.
    tobacco_strength:
      name: Tobakksstyrke
      description: Indikerer den opplevde kropps- eller nikotineffekten av tobakken
        når den konsumeres, noe som hjelper kunden med å velge en intensitet som samsvarer
        med deres preferanser.
    toe_construction:
      name: Tåkonstruksjon
      description: Angir konfigurasjonen av tåområdet på våtdraktsko, som påvirker
        balanse, brettfølelse og varme.
    toe_coverage:
      name: Tådekning
      description: Angir hvilken type tådekning sokken gir.
    toe_pick_style:
      name: Tåpiggstil
      description: Beskriver utformingen av tåtaggene på kunstløpskøytebladene.
    toe_protection_type:
      name: Beskyttelsestype for tå
      description: Angir om og hvordan tåområdet er forsterket av sikkerhetsmessige
        årsaker (f.eks. ståltå, myk tå).
    toe_reinforcement_type:
      name: Forsterkningstype for tå
      description: Informasjon om konstruksjonen av tåområdet, som påvirker holdbarhet
        og skokompatibilitet.
    toe_stop_stem_thread_size:
      name: Gjengestørrelse på tåstoppstamme
      description: Angir gjengestørrelsen på tåstoppstammer for å sikre at de passer
        til platen.
    tofu_preparation_style:
      name: Forberedelsesstil for tofu
      description: Kategoriserer den tradisjonelle stilen eller undertypen av tofu
        beyond-fasthet (f.eks. silkeaktig, blokk, puff, skinn, knute, fermentert).
    tom_mount_adjustment_features:
      name: Justeringsfunksjoner for tomfeste
      description: Angir hvilke justeringsmuligheter tomfestet gir for plassering
        av trommen (f.eks. vinkel, rotasjon, høyde).
    tom_mount_components_included:
      name: Inkluderte komponenter i tomstativ
      description: Angir hvilke deler som følger med tomfestet (f.eks. mottaker, arm,
        kuleledd, klemmer, minnelåser osv.).
    tom_mount_mounting_position:
      name: Monteringsposisjon for tomfeste
      description: Angir hvor tomfestet er ment å monteres (f.eks. på basstromme,
        cymbalstativ eller stativ).
    tonneau_cover_mounting_style:
      name: Monteringsstil for tonneau-deksel
      description: Angir hvordan lasteplantrekket monteres/festes til lasteplanets
        rekkverk.
    tool_case_form_factor:
      name: Formfaktor for verktøykasse
      description: Identifiserer verktøykassens fysiske stil, som påvirker bærbarhet
        og oppbevaring (f.eks. koffert, hardt skall).
    tool_functions_included:
      name: Verktøysfunksjoner inkludert
      description: Viser de spesifikke reparasjons- eller vedlikeholdsfunksjonene
        som et multiverktøy eller verktøysett kan utføre.
    top_bunk_access_method:
      name: Tilgangsmetode for øverste køyeseng
      description: Indikerer hvordan brukerne når den øverste køyesengen, noe som
        bidrar til sikkerhet og plasshensyn.
    top_fit:
      name: Topp-passform
      description: Angir den generelle silhuetten eller passformen til toppen på kroppen
        (f.eks. slank eller overdimensjonert).
    top_hat_style:
      name: Topphatt-stil
      description: Identifiserer den spesifikke stilvariasjonen til en flosshatt.
    top_soundboard_material:
      name: Toppmateriale (lydplate)
      description: Angir materialet i gitarens topp/lydbrett (den primære toneproduserende
        platen).
    topping_form:
      name: Toppingform
      description: Definerer den fysiske formen eller konsistensen på desserttoppingen
        for å hjelpe kunden med raskt å avgrense til ønsket bruk.
    topping_type:
      name: Toppingtype
      description: Indikerer den primære ytre toppingen eller belegget som er påført
        smultringen.
    tow_hook_type:
      name: Type slepekrok
      description: Angir om knebrettet har en integrert slepekrok og spesifiserer
        mekanismens stil.
    tow_point_configuration:
      name: Konfigurasjon av slepepunkt
      description: Angir konfigurasjonen av slepepunkt (enkelt, dobbelt, flere) som
        tilbys av sleperøret for ulike kjøreposisjoner.
    tow_strap_protective_features:
      name: Beskyttende funksjoner for slepestropp
      description: Bemerkelsesverdige konstruksjonsfunksjoner for sikkerhet og holdbarhet
        innebygd i slepestroppen.
    tow_strap_type:
      name: Type slepetau
      description: Indikerer den funksjonelle slepestroppkonstruksjonen, for eksempel
        statisk slepestropp vs. kinetisk gjenvinningsstropp.
    towable_tube_style:
      name: Slepbart rør-stil
      description: Angir grunnleggende utforming på sleperingen, som bestemmer kroppsstilling
        og opplevelse for brukeren.
    towed_water_sport_discipline:
      name: Trukket vannsportsdisiplin
      description: Angir den primære slepevannsaktiviteten hansken er designet for.
    towel_features:
      name: Håndklefunksjoner
      description: Viser spesielle egenskaper eller tillegg som følger med et håndkle.
    towel_style:
      name: Håndklestil
      description: Klassifiserer den funksjonelle designen eller formatet til golfhåndkleet.
    toy_airplane_control_type:
      name: Kontrolltype for lekefly
      description: Angir hvordan lekeflyet styres av brukeren.
    toy_airplane_features:
      name: Lekefly-funksjoner
      description: Fremhever viktige lekefunksjoner for lekeflyet.
    toy_airplane_flight_capability:
      name: Flyfunksjonalitet for lekefly
      description: Angir om lekeflyet er designet for faktisk å fly/gli, eller om
        det primært er for lek/fremvisning på bakken.
    toy_audio_features:
      name: Funksjoner for lekelyd
      description: Viser lydfunksjonaliteten og lydeffektene som er innebygd i leketøyet.
    toy_boat_play_features:
      name: Funksjoner for lekebåt
      description: Fremhever spesielle interaktive funksjoner for lekebåter for oppdagelse
        og filtrering.
    toy_boat_recommended_play_environment:
      name: Anbefalt lekemiljø for lekebåter
      description: Spesifiserer de tiltenkte lekeinnstillingene for lekebåten for
        å støtte kundeforventninger og sikkerhet (f.eks. badekar kontra åpent vann).
    toy_bowling_equipment_included:
      name: Lekebowlingutstyr inkludert
      description: Angir hvilke bowlingkomponenter som er inkludert i bowlingsettet
        (f.eks. kule, ball, bane/matte, bæreveske).
    toy_car_features:
      name: Funksjoner til lekebil
      description: Fremhever lekefunksjoner som er integrert i lekebilen (separat
        fra fremdriften), som lys, lyder eller deler som kan åpnes.
    toy_drawing_tablet_accessories_included:
      name: Inkludert tilbehør i tegnebrett til lek
      description: Ekstra inkludert tilbehør i tillegg til selve nettbrettet (f.eks.
        ekstra pekepenn, stempler).
    toy_drawing_tablet_erase_method:
      name: Slettemetode for leketegnebrett
      description: Hvordan tegneflaten tømmes / viskes ut.
    toy_drawing_tablet_screen_type:
      name: Skjermtype for leketegnebrett
      description: Typen tegne-/visningsflate som brukes (f.eks. LCD-skrivebrett kontra
        magnetisk).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Leketegnebrett – skrive-/tegneinstrument
      description: Primærverktøyet som brukes til å tegne på nettbrettet (pennetype).
    toy_figure_sound_feature:
      name: Lydfunksjon for lekefigur
      description: Angir om dyrefiguren lager lyder og hva slags lyder (f.eks. brøl,
        realistisk dyrelyd).
    toy_game_features:
      name: Funksjoner i leke/spill
      description: Fremhever viktige leke- eller konstruksjonsfunksjoner som er relevante
        for strand- og sandleker.
    toy_gift_basket_items_included:
      name: Inkluderte elementer i lekegavekurv
      description: Viser hovedtypene av leketøy som er inkludert i gavekurven (f.eks.
        plysjleke, byggesett, puslespill).
    toy_glider_launch_method:
      name: Utsendingsmetode for lekefly
      description: Angir hvordan lekeglideren startes, noe som påvirker spillestil
        og kundeforventninger.
    toy_helicopter_control_type:
      name: Kontrolltype for lekehelikopter
      description: Hvordan lekehelikopteret styres/betjenes (uavhengig av fremdrift),
        for eksempel håndholdt fjernkontroll, appkontroll eller ingen kontroll (fri
        flyging).
    toy_helicopter_features:
      name: Funksjoner til lekehelikopter
      description: Viktige funksjonelle egenskaper ved et lekehelikopter (spesielt
        fjernstyrte modeller) som påvirker brukervennlighet og lekeverdi.
    toy_jacks_set_items_included:
      name: Sett med lekejacks inkludert
      description: Angir hvilke kjernevarer som er inkludert i leke-jacksettet (f.eks.
        jack, ball, veske).
    toy_keyboard_learning_mode:
      name: Læringsmodus for lekekeyboard
      description: Indikerer den pedagogiske tilnærmingen / læringstilnærmingen som
        støttes av lekekeyboardet (f.eks. lysende taster, sanger som følger med, veiledede
        leksjoner, applæring).
    toy_keyboard_sound_theme:
      name: Lydtema for lekekeyboard
      description: Typer innebygde instrumentstemmer/lydtemaer som tilbys (utover
        vanlig piano).
    toy_kitchen_appliances_included:
      name: Lekekjøkkenapparater inkludert
      description: Angir kjøkkenapparatene som er representert i lekesettet når produktet
        er et apparat eller et apparatfokusert sett.
    toy_kitchen_assembly_requirement:
      name: Krav til montering av lekekjøkken
      description: Angir om montering er nødvendig og den omtrentlige monteringskompleksiteten.
    toy_kitchen_interactive_features:
      name: Interaktive funksjoner for lekekjøkken
      description: Fremhever interaktive elementer som ofte finnes i lekekjøkken og
        relatert tilbehør.
    toy_motorcycle_feature_set:
      name: Funksjonssett for lekemotorsykkel
      description: Viktige lekefunksjoner på lekemotorsykkelen (velg alle som gjelder).
    toy_motorcycle_scale:
      name: Skala for lekemotorsykkel
      description: Skalaforhold for leke-/samlemotorsykler (f.eks. 1:12).
    toy_parachute_launch_method:
      name: Lanseringsmetode for lekefallskjerm
      description: Hvordan leketøyet er ment å startes for flyging.
    toy_piano_and_keyboard_accessories_included:
      name: Tilbehør til lekepiano og keyboard inkludert
      description: Tilbehør som følger med lekepianoet eller lekekeyboardet.
    toy_playset_assembly_required:
      name: Krever montering av lekesett
      description: Indikerer om montering av voksne er nødvendig før lek (utover enkel
        sammenklikking).
    toy_playset_items_included:
      name: Inkluderte deler i lekesett
      description: Viser en liste over de viktigste komponentene som følger med i
        lekesettet (hva som følger med i esken).
    toy_safety_certification:
      name: Sikkerhetssertifisering for leke
      description: Sikkerhets- og samsvarsstandarder/-merker som gjelder for leker
        i kundens marked (f.eks. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Funksjoner for leketøysromskip
      description: Indikerer vanlige interaktive funksjoner / lekefunksjoner som er
        innebygd i lekeromskipet.
    toy_spaceship_size_class:
      name: Størrelsesklasse for lekeromskip
      description: Indikerer en grov størrelsesklasse for lekeromskipet for å støtte
        rask filtrering, atskilt fra eksakte dimensjoner (lengde/bredde/høyde) og
        ikke et numerisk modellskalaforhold (f.eks. 1:72).
    toy_tableware_pieces_included:
      name: Inkluderte deler i lekeservise
      description: Spesifiserer hvilke lekeservisegjenstander som er inkludert (tallerkener,
        kopper, bestikk, serveringsdeler).
    toy_tool_electronic_features:
      name: Elektroniske funksjoner for lekeverktøy
      description: Beskriver interaktive/elektroniske funksjoner for lekeverktøyet
        (lys, lyder, roterende bevegelse osv.).
    toy_tool_set_components_included:
      name: Inkluderte deler i lekeverktøysett
      description: Viser de spesifikke rollelek-verktøyene som er inkludert i pakken
        (spesielt for verktøysett).
    toy_train_scale:
      name: Skala for leketog
      description: Spesifiserer skalastandarden (eller sporsystemstørrelsen) for leke-/modelltog
        for å sikre kompatibilitet med eksisterende tog og spor.
    toy_train_track_layout_type:
      name: Layouttype for leketogspor
      description: Beskriver det inkluderte skinnelayoutet/-formen for et togsett
        eller en utvidelsesskinne-pakke.
    toy_weapon_gadget_features:
      name: Lekevåpen og dingsfunksjoner
      description: Fremhever vanlige interaktive og funksjonelle funksjoner som er
        spesifikke for lekevåpen og spiondingser.
    tpms_sensor_frequency_band:
      name: TPMS-sensorens frekvensbånd
      description: Radiofrekvensbånd støttet av TPMS-relatert tilbehør (hvis aktuelt).
    track_and_field_discipline:
      name: Bane- og feltdisiplin
      description: Identifiserer den spesifikke idrettshendelsen eller -disiplinen
        produktet er beregnet for (f.eks. kulestøt, stavsprang, sprint).
    track_event_specialization:
      name: Spesialisering i baneøvelse
      description: Angir hendelsestypen som piggskoen er optimalisert for.
    track_field_event_suitability:
      name: Egnethet for friidrett
      description: Identifiserer de spesifikke friidrettshendelsene hjelpemiddelet
        er ment for.
    track_set_special_features:
      name: Spesielle funksjoner for sporsett
      description: Fremhever viktige spillfunksjoner som er inkludert i sporsettet
        i tillegg til grunnleggende spor og biler.
    track_surface_compatibility:
      name: Overflatekompatibilitet for bane
      description: Angir løpeunderlagene som piggene eller skoen eer designet for.
    tracking_aid_type:
      name: Type sporingshjelp
      description: Angir om kajakken har enheter som forbedrer sporing i rett linje.
    traction_pattern_type:
      name: Trekkmønstertype
      description: Beskriver det primære overflatesporet eller slitebanemønsteret
        som gir grep på belegget.
    trading_card_league:
      name: Samlekortliga
      description: Identifiserer sportsligaen som er knyttet til kortsettet eller
        emnet (der det er aktuelt).
    trailer_construction:
      name: Tilhengerkonstruksjon
      description: Identifiserer tilhengerens primære konstruksjon for rammen/karosseriet
        (f.eks. aluminium, stål eller blandet konstruksjon).
    trailer_coupler_size:
      name: Størrelse på tilhengerkobling
      description: Spesifiserer tilhengerkoblingens kulestørrelse som kreves for tauing.
    trailer_hitch_mounting_location_method:
      name: Monteringssted/-metode for tilhengerfeste
      description: Angir hvor og hvordan tilhengerfestet er montert på kjøretøyet
        (f.eks. bakre mottaker, fremre mottaker, ramme, støtfangermontert, lasteplanmontert).
    trailer_light_function:
      name: Tilhengerlys-funksjon
      description: Primærfunksjon/-posisjon for tilhengerlyset.
    trailer_suspension_type:
      name: Fjæringstype for tilhenger
      description: Angir typen fjæringssystem som brukes i sykkelvognen, for eksempel
        spiralfjær eller bladfjær, for å forbedre kjørekomfort og lastbeskyttelse.
    trailer_wiring_circuit:
      name: Tilhengers ledningskrets
      description: Viser en liste over lys, bremser og hjelpekretser/-signaler som
        går via tilhengerens kablinger (dvs. hvilke strøm-/jord- og signalledninger
        som finnes).
    trailer_wiring_connector_type:
      name: Ledningstilkoblingstype for tilhenger
      description: Angir hvilken pluggstandard som brukes på tilhenger‑ og kjøretøysiden
        i ledningsnettet og adaptere.
    train_whistle_intended_use:
      name: Tiltenkt bruk av togfløyte
      description: Primær tiltenkt brukskontekst for fløyten.
    train_whistle_sound_character:
      name: Lydkarakter for togfløyte
      description: Beskriver den oppfattede tonale karakteren til fløytens lyd (klangfarge).
    trainer_mounting_type:
      name: Monteringstype for treningsprodukt
      description: Beskriver hvordan sykkelen samhandler med trenere (f.eks. hjul-på
        eller direktedrift).
    training_dummy_shape:
      name: Treningsdukkeform
      description: Angir dukkens overordnede design eller silhuett, som påvirker hundens
        grep og realisme i treningen.
    training_focus:
      name: Treningsfokus
      description: Beskriver det primære ferdighetsområdet hjelpemiddelet er rettet
        mot (f.eks. reflekser, fotarbeid, hånd-øye-koordinasjon).
    training_focus_area:
      name: Fokusområde for opplæring
      description: Spesifiserer den primære lacrosseferdigheten hjelpemidlet er utformet
        for å utvikle.
    training_objective:
      name: Treningsmål
      description: Spesifiserer den primære ferdigheten eller teknikken produktet
        er designet for å forbedre.
    training_surface_suitability:
      name: Egnethet for treningsoverflate
      description: Angir hvilke underlag treneren kan brukes på.
    training_surface_usage:
      name: Bruk av treningsflate
      description: Spesifiserer de primære aktivitetene treningsunderlaget støtter,
        og skiller skøytebare syntetiske ispaneler fra tørrbane- eller multisportmatter.
    training_usage_type:
      name: Treningsbrukstype
      description: Angir den primære tiltenkte bruksperioden eller konteksten for
        treningsbuksene, for eksempel trening på dagtid eller nattetid.
    trampoline_enclosure_type:
      name: Trampolineinnhegningstype
      description: Spesifiserer innhegningskonfigurasjonen som brukes på trampolinen,
        inkludert hvordan/hvor nettet er montert.
    trampoline_safety_certifications:
      name: Sikkerhetssertifiseringer for trampoline
      description: Angir hvilke trampolinerelevante sikkerhetsstandarder/sertifiseringer
        produktet hevder å overholde.
    transfer_application_method:
      name: Applikasjonsmetode for overførbar design
      description: Angir hvordan overføringen påføres stoffet (f.eks. strykes på vs.
        varmepresse).
    transfer_method:
      name: Overføringsmetode
      description: Angir hvordan designet er ment å overføres til stoff.
    transfer_peel_temperature:
      name: Temperatur for avtrekking ved overføring
      description: Angir anbefalt temperaturtilstand (varm, lun eller kald) der transportørarket
        skal fjernes etter pressing.
    transmission_cooler_construction:
      name: Konstruksjon av girkjøler
      description: Spesifiserer konstruksjonsdesignet til en girkassens kjølekjerne.
    transmission_fluid_specification:
      name: Spesifikasjon for girolje
      description: OEM-/spesifikasjonsstandarden som giroljen oppfyller (f.eks. Dexron/Mercon-familier,
        ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Børstemateriale for girkassefeste
      description: Spesifiserer elastomer- eller isolatormaterialet som brukes i monteringsbøssingen/-isolatoren
        (vibrasjonsdempende element).
    transmission_mount_type:
      name: Festetype for girkasse
      description: Spesifiserer konstruksjonen/designen av et girkassefeste (f.eks.
        hydraulisk vs. solid) for å bestemme passform, NVH-egenskaper og tiltenkt
        bruk.
    transparency_level:
      name: Gjennomsiktighetsnivå
      description: Beskriver hvor gjennomsiktige beholderveggene er, noe som hjelper
        kunden med å velge mellom gjennomsiktig innsyn og skjult oppbevaring.
    transport_case_type:
      name: Transportkassetype
      description: Klassifiserer transportløsningens strukturelle stil/stivhet, som
        gjenspeiler beskyttelsesnivå og pakkemetode.
    transposition_modes:
      name: Transposisjonsmoduser
      description: Angir transponerings-/konserttonemodusen som stemmeren støtter
        (f.eks. konserttone og transponerende tonearter som B♭ eller E♭).
    trap_design:
      name: Felledesign
      description: Identifiserer fellens strukturelle stil eller mekanisme, som bestemmer
        utplasseringsmetoden og artene eller miljøene den er best egnet for.
    trap_spring_configuration:
      name: Konfigurasjon av fellefjær
      description: Angir antall eller arrangement av fjærer som driver fellen, noe
        som påvirker styrke og lovlighet.
    travel_bassinet_accessories_included:
      name: Reisesengtilbehør inkludert
      description: Lister opp ekstra gjenstander som følger med reisesengen.
    travel_spinning_wheel_assembly_required:
      name: Reisehjulmontering kreves
      description: Om hjulet krever montering/oppsett utover utfolding (f.eks. feste
        av flyer, spenning, pedaler) før bruk.
    travel_spinning_wheel_portability_features:
      name: Portabilitetsegenskaper for reisespinnehjul
      description: Bærbarhetsrelaterte designelementer for reisespinnehjul, som sammenleggbar
        konstruksjon og medfølgende transportløsninger.
    travel_trailer_appliances_fuel_type:
      name: Drivstofftype for apparater til campingvogn
      description: Primært drivstoff brukt til apparater/oppvarming/matlaging om bord
        (ikke kjøretøy for tauing).
    travel_trailer_holding_tank_type:
      name: Type oppsamlingstank for campingvogn
      description: Angir hvilke septiktanker som finnes i campingvognen (velg alle
        som gjelder).
    travel_trailer_power_hookup_shore_power:
      name: Strømtilkobling for campingvogn (landstrøm)
      description: Standard(er) for elektrisk tilkobling som støttes for landstrømforbindelse.
    tread_pattern_type:
      name: Type mønster
      description: Klassifiserer dekkets generelle slitebanedesign, for eksempel glatt,
        halvglatt eller knottete, noe som påvirker veigrep, rullemotstand og tiltenkt
        overflate.
    treadmill_key_type:
      name: Tredemølle-nøkkeltype
      description: Beskriver den fysiske stilen eller betjenings-/forbindelsesmekanismen
        til sikkerhetsnøkkelen (f.eks. magnetisk rund, plastinnsats, klipsnøkkel).
    treadmill_part_type:
      name: Type tredemølledel
      description: Identifiserer den spesifikke tredemøllekomponenten som produktet
        er ment å erstatte, slik at kunden raskt kan bekrefte passform (f.eks. belte
        kontra motor).
    treadmill_position:
      name: Tredemølleposisjon
      description: Angir monteringsposisjonen til delen på tredemøllen (foran, bak,
        oppe, nede, midten).
    triangle_striker_material:
      name: Materiale i triangelstikker
      description: Materiale i den medfølgende strikeren/slageren.
    trigger_input_connector:
      name: Inngangskobling for utløser
      description: Angir den fysiske kontaktstandarden som brukes til trigger-inputer.
    trigger_input_connector_type:
      name: Type input-kontakt for trigger
      description: Angir den fysiske tilkoblingstypen som brukes for utløserinnganger.
    trigger_input_zone_support:
      name: Støtte for utløserinngangssone
      description: Angir om utløser-innganger støtter utløsere for enkeltsone og/eller
        to-sone (f.eks. hode/kant) og lignende implementeringer i flere soner.
    trim_application_method:
      name: Applikasjonsmetode for listverk
      description: Angir hvordan pynten er ment å festes til et prosjekt (f.eks. sy
        på, stryke på, lime).
    trim_detail:
      name: Triminformasjon
      description: Identifiserer fremtredende dekorative kanter eller overflater på
        plagget (f.eks. duskkant, frynser, blondekant).
    trim_elasticity:
      name: Trim-elastisitet
      description: Angir om ricrac-båndet har stretch og dermed egner seg til bruk
        på strikkede stoffer / treningstøy.
    trim_finish:
      name: Trimfinish
      description: Overflatebehandling brukt på båndet (for eksempel metallisk, glitter,
        reflekterende).
    trim_tilt_type:
      name: Trim- og tilttype
      description: Om og hvordan motoren støtter trim-/tiltjustering.
    trolleybus_power_supply_type:
      name: Strømforsyningstype for trolleybuss
      description: Angir hvordan trolleybussen mottar trekkraft fra det elektriske
        nettet.
    truck_bed_body_type:
      name: Lastebilplan/karosseritype
      description: Konfigurasjon av lasteplanklasse eller skroget bak førerhuset.
    truck_bed_length_class:
      name: Lengdeklasse for lasteplan
      description: Angir hvilken lasteplanklasse cargonettet er beregnet for (ofte
        angitt som kort, standard eller lang lasteplan).
    truck_mounting_hole_pattern:
      name: Hullmønster for lastebilmontering
      description: Angir hull-layout som brukes til å montere lastebiler på dekket
        (f.eks. Old School, New School, Universal).
    truck_mounting_style:
      name: Monteringsstil for truck
      description: Hvordan lastebilene festes til dekket (toppmontering, dropmontering
        osv.), som påvirker kjørehøyde og stabilitet.
    truck_profile:
      name: Lastebilprofil
      description: Indikerer kjørehøydeklassifisering for skateboardtrucken i forhold
        til dekket, som påvirker hjulklaring og brettfølelse.
    trumpet_bell_material:
      name: Materiale til trompetklokke
      description: Materiale brukt til klokkedelen (avviker noen ganger fra resten
        av instrumentet).
    trumpet_leadpipe_material:
      name: Materiale i trompetens munnrør
      description: Materiale eller behandling brukt til blyrøret (hovedrøret fra munnstykket
        til ventilene).
    trundle_mechanism:
      name: Trinnsengmekanisme
      description: Beskriver hvordan den sekundære sengekomponenten brukes fra hovedrammen.
    trunk_part_type:
      name: Bagasjeromsdeltype
      description: Angir hvilken bagasjeromsrelatert karosserikomponent som selges
        (f.eks. bagasjelokk, hengsel, lås).
    tuba_leadpipe_material:
      name: Materiale i tubaens munnrør
      description: Identifiserer materialet brukt i munnrørsdelen (leadpipe) på tubaen.
    tube_base_type:
      name: Basetype for rør
      description: Spesifiserer rørets base-/sokkelfamilie som brukes for fysisk/elektrisk
        tilpasning (f.eks. oktal, noval/9-pinnet).
    tube_matching_grade:
      name: Rørmatching-grad
      description: Angir om rørene er testet/matchet som et sett og hvilken type matching
        som tilbys.
    tube_weight_category:
      name: Vektkategori for slange
      description: Klassifiserer røret etter konstruksjon/vekt (f.eks. ultralett,
        standard, tungvekt) for rask sammenligning av holdbarhet kontra ytelse.
    tubeless_compatible:
      name: Kompatibel med slangeløs
      description: Angir om hjulet er konstruert for bruk uten slange når det brukes
        med slangeløse dekk.
    tubing_shape:
      name: Rørform
      description: Spesifiserer den krysseksjonelle formen til stativets støtterør.
    tubular_construction_type:
      name: Rørformet konstruksjonstype
      description: Spesifiserer konstruksjonsstilen til rørformede sykkeldekk, og
        skiller mellom tradisjonelle limte rørformede dekk og nyere varianter.
    tulip_type_flower_form:
      name: Tulipantype (blomsterform)
      description: Angir hagebrukstypen/blomsterformen til tulipanene i buketten (f.eks.
        enkle, doble, papegøye).
    tuner_input_method:
      name: Inndatametode for stemmer
      description: Angir hvordan tuneren registrerer tonehøyde (mikrofon, vibrasjons-/klippsensor,
        instrumentkabelinngang, kontakt-pickup).
    tuning_mechanism:
      name: Stemmemekanisme
      description: Hvordan bongoskinnene er strammet/stemt.
    tuning_system:
      name: Stemmesystem
      description: Hvordan trommen justeres eller hvorvidt den kan justeres.
    turn_signal_lens_color:
      name: Farge på blinklysglass
      description: Fargen på det synlige objektivet/dekselet på blinklyshuset (ikke
        utsendt lysfarge).
    turn_signal_lighting_style:
      name: Stil for blinklys
      description: Den visuelle signaliseringsstilen/animasjonen til blinklyset.
    turnip_and_rutabaga_variety:
      name: Kålrotvarianter
      description: Identifiserer den spesifikke kultivaren eller varianten av kålrot.
    tweeter_crossover_type:
      name: Type delefilter for diskant
      description: Angir hvilken type høypassfilter og/eller beskyttelseskomponent
        som følger med diskanten, hvis aktuelt.
    tweeter_material:
      name: Diskantmateriale
      description: Diskantens primære membran-/kuppelmateriale.
    tweeter_mount_type:
      name: Diskantmonteringstype
      description: Angir hvordan diskanthøyttaleren er ment å installeres i kjøretøyet
        (monteringsmetode/maskinvare).
    twill_direction:
      name: Twill-retning
      description: Indikerer twill-linjens retning i denimvev.
    twist_direction:
      name: Vriretning
      description: Retningen på finértvinningen som brukes i garnet/tråden (S-tvinn
        eller Z-tvinn).
    u_joint_series_size:
      name: U-ledd – serie/størrelse
      description: Angir U-leddets serie- eller størrelsesstandard som brukes (f.eks.
        1310-serien).
    uilleann_pipes_bag_material:
      name: Posemateriale for uilleann-pipe
      description: Materialet i kollisjonsputekomponenten (hvis inkludert), som påvirker
        holdbarhet og vedlikehold.
    uilleann_pipes_handedness:
      name: Venstre-/høyrehendthet for uilleann-sekkepipe
      description: Angir om settet er konfigurert for høyrehendt eller venstrehendt
        oppsett.
    uilleann_pipes_set_configuration:
      name: Konfigurasjon av uilleann-pipesett
      description: Angir hvilken konfigurasjon av uilleann-rør som er inkludert, basert
        på tilstedeværelsen av regulatorer og droner.
    uk_childrens_shoe_size:
      name: Britiske skostørrelser for barn
      description: Angir britisk størrelse for barnesko, f.eks. 4 eller 4 Wide
    uk_clothing_size:
      name: Britisk klesstørrelse
      description: Angir britisk klesstørrelse, f.eks. 12 eller 8
    uk_cup_size:
      name: Britisk koppstørrelse
      description: Angir britisk størrelse for BH-kopp, f.eks. C eller FF
    uk_mens_shoe_size:
      name: Britisk størrelse for herresko
      description: Angir britisk størrelse for herresko, f.eks. 9 eller 9 Wide
    uk_womens_shoe_size:
      name: Britisk skostørrelse for kvinner
      description: Spesifiserer den britiske kvinneskostørrelsen, for eksempel 6 eller
        6 Wide
    ukulele_back_and_sides_wood:
      name: Ukulelebunn og -sider av tre
      description: Identifiserer treverket/materialet som brukes til ukuleleens bakdel
        og sider.
    ukulele_body_cutaway:
      name: Utskjæring i ukulelekropp
      description: Indikerer om konsert-ukulelekroppen har en utskjæring for enklere
        tilgang til øvre bånd.
    ukulele_body_shape:
      name: Ukulele-kroppsformer
      description: Generell kroppsstil/-form brukt for ukulelen.
    ukulele_bridge_material:
      name: Ukulele-bromateriale
      description: Spesifiserer materialet som brukes til ukulelebroen.
    ukulele_construction_type:
      name: Konstruksjonstype for ukulele
      description: Hvordan instrumentets topp/bakdel/sider er konstruert (solid vs.
        laminat).
    ukulele_electronics_configuration:
      name: Elektronisk ukulele-konfigurasjon
      description: Angir om ukulelen kun er akustisk eller inkluderer elektronisk
        introduksjon (pickup og/eller forforsterker) for forsterkning.
    ukulele_string_re_entrant_tuning:
      name: Ukulele-streng re-entrant-stemming
      description: Om ukulelen er satt opp med re-entrant stemming (høy G) i stedet
        for lineær/lav G. Dette er en vanlig kjøperpreferanse og påvirker klangen.
    ukulele_top_wood:
      name: Ukuleletopp av tre
      description: Identifiserer treverket/materialet som brukes til ukulele-toppen/-lydplaten.
    ukulele_tuner_mechanism:
      name: Ukulele-stemmermekanisme
      description: Angir stemmestilen/mekanismen som brukes på ukulelen.
    ukulele_tuner_type:
      name: Ukulele-stemmertype
      description: Stil for stemmemaskin brukt på ukulelehodet.
    ukulele_tuning:
      name: Ukulele-stemming
      description: Angir den tiltenkte standardstemmingen for lommeukulelen.
    ultralight_aircraft_wing_configuration:
      name: Ultralett flyvingekonfigurasjon
      description: Plassering og konfigurasjon av primærvingen i forhold til skroget/strukturen.
    under_bed_features:
      name: Funksjoner for underseng
      description: Identifiserer det primære funksjonelle elementet som er plassert
        under sengeplattformen.
    underfoot_strap_type:
      name: Stropptype under føttene
      description: Identifiserer materialet eller designet som brukes til stroppen
        som går under fottøyet.
    underwear_fit:
      name: Passform på undertøy
      description: Angir den generelle passformprofilen til boksershortsen (f.eks.
        smal, løs, kompresjon).
    underwear_pieces_included:
      name: Inkluderte undertøyselementer
      description: Identifiserer hvilke klesplagg som leveres (topp, bunn, begge deler
        eller unionsdrakt i én del), slik at kundene vet om de kjøper et komplett
        sett eller en individuell vare.
    uniform_pieces_included:
      name: Uniformdeler inkludert
      description: Identifiserer hvilke plaggkomponenter som følger med (f.eks. skjorte,
        bukser, vest), klargjørende pakkeinnhold for parti- eller settkjøp.
    uniform_role:
      name: Uniformrolle
      description: Angir hvilken profesjonell rolle eller etat uniformen er beregnet
        for (f.eks. politi, sheriff, ambulansepersonell).
    update_method:
      name: Oppdateringsmetode
      description: Hvordan fastvare-/programvareoppdateringer leveres til skanneren.
    upholstery_fabric_backing_type:
      name: Bakside av møbeltrekk
      description: Angir baksiden/lamineringen på møbelstoffet som påvirker installasjon
        og følelse.
    upholstery_fabric_water_resistance:
      name: Vannmotstand i møbeltrekk
      description: Indikerer motstand mot vann og søl for møbelstoffoverflaten.
    upper_material:
      name: Overmateriale
      description: Angir hovedmaterialet som brukes på den øvre delen av joggeskoen,
        noe som påvirker pusteevne, holdbarhet og estetikk.
    upright_bass_pickup_system:
      name: Kontrabass-pickupsystem
      description: Angir om kontrabassen inkluderer et installert pickup-/forforsterkersystem
        beregnet på forsterkning.
    upright_piano_power_source:
      name: Strømkilde for oppreist piano
      description: Hvordan det oppreiste pianoet drives, gjeldende for akustiske oppreiste
        pianoer uten strøm samt oppreiste pianoer med stille-/hybridsystemer som krever
        strøm.
    urination_device_features:
      name: Funksjoner ved vannlatingsenhet
      description: Fremhever spesielle designegenskaper som forbedrer funksjonalitet
        eller bekvemmelighet.
    us_childrens_shoe_size:
      name: Amerikansk størrelse for barnesko
      description: Angir amerikansk størrelse for barnesko, f.eks. 4 eller 4 Wide
    us_clothing_size:
      name: Amerikansk klesstørrelse
      description: Angir amerikansk klesstørrelse, f.eks. 8 eller 14
    us_cup_size:
      name: Amerikansk koppstørrelse
      description: Angir amerikansk størrelse for BH-kopp, f.eks. C eller DDD
    us_mens_shoe_size:
      name: Amerikansk størrelse for herresko
      description: Angir amerikansk størrelse for herresko, f.eks. 10 eller 10 Wide
    us_ring_size:
      name: Amerikansk ringstørrelse
      description: Angir amerikansk ringstørrelse, f.eks. 7 eller 9,5
    us_womens_shoe_size:
      name: Amerikansk skostørrelse for kvinner
      description: Angir amerikansk størrelse for damesko, f.eks. 8 eller 8 Wide
    usage:
      name: Bruk
      description: Beskriver den tiltenkte bruken/stemmingen av kamakselen.
    usda_honey_grade:
      name: USDA-honningskvalitet
      description: Angir den offisielle karakteren som er tildelt honningen fra det
        amerikanske landbruksdepartementet (USDA).
    user_control_method:
      name: Kontrollmetode for bruker
      description: Angir hvordan brukeren samhandler med maskinen (f.eks. innebygd
        kontrollpanel, fjernkontroll, app, stemme), og informerer om hensyn til brukervennlighet.
    vacuum_boost_reference_port:
      name: Vakuum-/ladetrykksreferanseport
      description: Angir om regulatoren har en manifoldreferanseport for vakuum/ladetrykk,
        og hvilken type den er.
    valve_base_shape:
      name: Ventilbaseform
      description: Identifiserer grensesnittgeometrien mellom ventilbasen og kanten
        (rund, konisk, sideport, T-formet osv.) som påvirker tetning og kompatibilitet
        mellom skum og innlegg.
    valve_core_type:
      name: Kjernetype for ventil
      description: Angir om ventilens kjerne er avtakbar, fast eller kjerneløs, informasjon
        som påvirker vedlikeholdsprosedyrer og kompatibilitet med verktøy for injeksjon
        av tetningsmiddel.
    valve_cover_gasket_material:
      name: Pakningsmateriale for ventildeksel
      description: Angir materialet i ventildekselpakningen som følger med ventildekselet,
        eller anbefalt pakningsmateriale når den selges uten pakning (hvis aktuelt).
    valve_cover_material:
      name: Dekselmateriale for ventil
      description: Primært konstruksjonsmateriale for ventildekselet.
    valve_design:
      name: Ventildesign
      description: Identifiserer konstruksjonen/designet til motorventilen.
    valve_guard_coverage_area:
      name: Dekningsområde for ventilvern
      description: Angir hvilke deler av ventilseksjonen beskyttelsen beskytter.
    valvetrain_configuration:
      name: Ventiltogkonfigurasjon
      description: Speifisirer layout for kam-/ventiltog.
    varnish_formulation_base:
      name: Lakkformuleringsbase
      description: Spesifiserer den primære formuleringen/kjemien til strenginstrumentlakken,
        som påvirker utseende, reversibilitet og kompatibilitet med eksisterende overflater.
    varnish_transparency_tint:
      name: Lakktransparens/fargetone
      description: Beskriver om lakken er gjennomsiktig eller farget, og hvis farget,
        den generelle fargefamilien.
    vegetable_matter_vm_content:
      name: Innhold i vegetabilsk materiale (VM)
      description: Mengde planteavfall/urenheter som finnes i fiberen.
    vegetable_preparation_style:
      name: Type grønnsakstilberedning
      description: Beskriver hvordan grønnsaken presenteres, kuttes eller på annen
        måte tilberedes før salg (f.eks. hel, i terninger, i buketter).
    vehicle_audio_dsp_form_factor:
      name: DSP-formfaktor for billyd
      description: Angir det fysiske formatet / installasjonsformatet til DSP-enheten.
    vehicle_battery_charger_features:
      name: Funksjoner for bilbatterilader
      description: Angir driftsmoduser og innebygde funksjoner på kjøretøybatteriladeren
        (for eksempel vedlikeholdslading, avsulfatering).
    vehicle_body_filler_form:
      name: Form på bilsparkel
      description: Den fysiske formen/emballasjestilen til karosserifyllproduktet.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominell størrelse på koaksialhøyttaler i kjøretøy
      description: Nominell høyttalerstørrelse brukt i monteringen (f.eks. 6,5 tommer,
        6x9 tommer).
    vehicle_cover_size_class:
      name: Størrelsesklasse for kjøretøysdekke
      description: Generell størrelsesgruppering som indikerer hvilken kjøretøystørrelse
        dekselet er designet for å passe.
    vehicle_decor_set_items_included:
      name: Bil-dekorsett inkludert
      description: Viser en liste over dekorgjenstandene som er inkludert i tilbehørssettet
        (synlighet på komponentnivå for kunder).
    vehicle_door_lock_actuation_method:
      name: Metode for aktivering av dørlåsen til kjøretøyet
      description: Angir hvordan bildørlåsen aktiveres eller styres.
    vehicle_door_lock_actuator_kit_contents:
      name: Settinnhold for bildørlåsaktuator
      description: Angir hva som følger med aktuatoren (kun aktuator vs. maskinvare/stenger/braketter/sele).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfigurasjon av aktuatorledninger for dørlås i kjøretøy
      description: Angir ledningstypen som kreves for installasjon (antall ledninger
        og rolle).
    vehicle_door_lock_included_components:
      name: Komponenter inkludert i bilens dørlås
      description: Viser hvilke komponenter som er inkludert i pakken (nyttig for
        sett/sammenstillinger).
    vehicle_electrical_connector_type:
      name: Type elektrisk tilkobling for kjøretøy
      description: Angir dynamoens regulator/feltelektriske kobling eller pluggtype
        (unntatt B+-hovedutgangsbolten).
    vehicle_equipment_fit_out_level:
      name: Innredningsnivå for kjøretøyutstyr
      description: Angir nivået av politiutstyr som er inkludert i varebilen.
    vehicle_glass_cleaner_form:
      name: Form for glassrens for kjøretøy
      description: Fysisk produktformat for bilglassrens (f.eks. spray, skum, våtservietter,
        gel, konsentrat).
    vehicle_hitch_cover_illumination_type:
      name: Belysningstype for kjøretøyets tilhengerfeste
      description: Angir om tilhengerfestet har belysning og hvilken type.
    vehicle_hitch_cover_mounting_type:
      name: Monteringstype for deksel til tilhengerfeste
      description: Angir hvordan hengerfestedekselet holdes fast/festes i hengerfestet.
    vehicle_license_plate_finish:
      name: Finish for kjøretøys nummerskilt
      description: Overflatebehandling av platen.
    vehicle_license_plate_frame_anti_theft_design:
      name: Tyverisikringsdesign for nummerskiltramme
      description: Sikkerhetsrelaterte designelementer som er ment å avskrekke fjerning
        eller manipulering.
    vehicle_license_plate_frame_plate_standard:
      name: Rammeplatestandard for kjøretøysnummerskilt
      description: Nummerskilt standard/område som rammen er dimensjonert for å passe.
    vehicle_license_plate_frame_profile:
      name: Rammeprofil for kjøretøysnummerskilt
      description: Hvordan rammen avgrenser skiltet (dekning/form) som påvirker lesbarhet
        og samsvar.
    vehicle_license_plate_mounting_hole_count:
      name: Antall monteringshull for nummerskilt for kjøretøy
      description: Antall monteringshull på skiltet.
    vehicle_license_plate_mounting_hole_pattern:
      name: Monterinshullmønster for nummerskilt til kjøretøy
      description: Plasseringsmønster for monteringshull på skiltet.
    vehicle_license_plate_reflectivity:
      name: Reflektivitet for kjøretøys nummerskilt
      description: Om og hvordan skiltets overflate reflekterer lys (viktig for synlighet
        og etterlevelse i noen tilpassede skilt).
    vehicle_license_plate_size_standard:
      name: Størrelsesstandard for nummerskilt på kjøretøy
      description: Angir den regionale standarden / kjøretøystandarden som skiltet
        er dimensjonert for å passe til (avstand mellom monteringshull og totale dimensjoner).
    vehicle_license_plate_text_style:
      name: Tekststil for nummerskilt på kjøretøy
      description: Stilen på skilttegnene (hvis noen), inkludert hevet vs. trykt.
    vehicle_license_plate_theme:
      name: Tema for nummerskilt for kjøretøy
      description: Designtema på høyt nivå for skiltets kunstverk.
    vehicle_lift_actuation_method:
      name: Aktueringsmetode for kjøretøylift/jekk
      description: Hvordan løftebukken/jekken drives/aktiveres for å heve kjøretøyet.
    vehicle_lift_mounting_type:
      name: Monteringstype for kjøretøyslift
      description: Angir hvordan heisen er installert eller forankret i arbeidsområdet.
    vehicle_lift_type:
      name: Type løftesystem for kjøretøy
      description: Spesifiserer den strukturelle typen billift som brukes til service
        eller lagring (f.eks. 2 søyler, 4 søyler, saks).
    vehicle_magnet_attachment_type:
      name: Festetype for kjøretøysmagnet
      description: Angir den primære feste-/monteringsmetoden for produkter som selges
        som kjøretøymagneter (for eksempel kun magnetisk vs. magnetisk med lim).
    vehicle_magnet_intended_use:
      name: Tiltenkt bruk av kjøretøymagnet
      description: Indikerer den primære tiltenkte bruken av kjøretøymagneten.
    vehicle_mirror_adjustment_type:
      name: Justeringstype for kjøretøysspeil
      description: Angir hvordan speilet justeres/kontrolleres.
    vehicle_mirror_glass_type:
      name: Glassype i kjøretøyspeil
      description: Angir den optiske typen / formtypen til speilglassoverflaten.
    vehicle_organizer_features:
      name: Organiseringsfunksjoner i kjøretøy
      description: Viktige funksjonelle egenskaper for bilorganisatorer, som sammenleggbarhet,
        vanntett fôr, isolerte lommer eller sklisikker bunn.
    vehicle_paint_chemistry_base:
      name: Kjemi/base for billakk
      description: Indikerer malingsformuleringen/-kjemien som brukes i billakk.
    vehicle_polish_application_method:
      name: Bruksmetode for bilpolering
      description: Angir anbefalt metode eller verktøy for påføring av billakk.
    vehicle_pursuit_package:
      name: Utstyrspakke for utrykningskjøretøy
      description: Angir om kjøretøyet er utstyrt med en utryknings-ytelsespakke beregnet
        for politi, for eksempel med oppgradert kjøling, bremser, fjæring og kalibrering.
    vehicle_safety_equipment_position:
      name: Plassering av kjøretøyets sikkerhetsutstyr
      description: Angir hvor på eller i kjøretøyet sikkerhetsutstyret er ment å brukes
        eller installeres.
    vehicle_safety_equipment_visibility_features:
      name: Synlighetsfunksjoner for kjøretøysikkerhetsutstyr
      description: Indikerer synlighetsforbedrende funksjoner som er utformet for
        å øke synligheten.
    vehicle_seat_row:
      name: Bilseterekke
      description: Angir hvilken seterad setet er beregnet for bak i bilen (andre
        rad eller tredje rad), inkludert bakvendte klappseter.
    vehicle_steering_assist_type:
      name: Type styringsassistent for kjøretøy
      description: Angir hvilket styreassistansesystem komponenten er konstruert for.
    vehicle_steering_wheel_lock_form_factor:
      name: Formfaktor for rattlås i kjøretøy
      description: Beskriver låsens fysiske stil og hvordan den samhandler med rattet
        (og eventuelt andre kontroller).
    vehicle_wax_polish_product_form:
      name: Produktform for bilvoks/-polering
      description: Den fysiske formen/dispenseringsformatet til voksen, poleringsmiddelet,
        beskyttelsesmiddelet eller forseglingsmiddelet.
    vehicle_wheel_valve_stem_type:
      name: Ventilstammetype for kjøretøyhjul
      description: Angir hvilken ventilstammetype som støttes eller er inkludert.
    vehicle_windshield_fluid_formula:
      name: Formel for spylervæske
      description: Primært fokus på rengjøring/fjerning av spylevæskeformulering.
    veil_length_type:
      name: Type slørlengde
      description: Klassifiserer et slør ved hjelp av standard lengdeterminologi i
        stedet for numerisk måling.
    vellum_opacity_level:
      name: Pergamentets opasitetsnivå
      description: Angir hvor gjennomskinnelig eller ugjennomsiktig pergamentet er.
    ventilation_configuration:
      name: Ventilasjonskonfigurasjon
      description: Primær ventilasjon/luftinntak og utblåsningskonfigurasjon på hjelmen.
    ventilation_control_type:
      name: Kontrolltype for ventilasjon
      description: Angir stilen til luftstrømstyringen som er innebygd i hjelmen.
    ventilation_level:
      name: Ventilasjonsnivå
      description: Angir hvor åpent eller ventilerende beskyttelsespansringen er utformet.
    venting_design:
      name: Ventilasjonsdesign
      description: Angir om og hvordan dekselet er ventilert for å redusere kondens
        og mugg under lagring.
    vestibule_type:
      name: Vestibyletype
      description: Klassifiserer vestibulens layout i forhold til teltet.
    vibraphone_bar_material:
      name: Materiale for vibrafonstang
      description: Materiale i klangstavene/tangentene på vibrafonen (de lydgivende
        stavene).
    vibraphone_motor_type:
      name: Vibrafonmotortype
      description: Motortype som brukes til å drive de roterende resonatorviftene
        for vibrato (hvis utstyrt).
    vibraphone_range_octaves:
      name: Vibrafonregister (oktaver)
      description: Vibrafonens tonehøydeområde uttrykt i oktaver (f.eks. 3 oktaver,
        3,5 oktaver).
    vibraphone_resonator_tube_material:
      name: Materiale for vibrafonresonatorrør
      description: Materiale i vibrafonresonatorrørene under stengene.
    vibraphone_tuning_standard:
      name: Standard for stemming av vibrafon
      description: Referansetonehøyde brukt for stemming (A=440 Hz osv.).
    viewing_sides:
      name: Visningssider
      description: Angir hvor mange sider av resultattavlen som viser informasjon
        (en side, to sider, fire sider osv.).
    vintage_advertisement_decade:
      name: Tiår for eldre reklame
      description: Angir hvilket tiår annonsen opprinnelig ble trykket eller produsert
        i (omtrentlig hvis nøyaktig år er ukjent).
    vintage_advertisement_format:
      name: Format for vintage reklame
      description: Angir det fysiske formatet eller mediet til det eldre reklamesamleobjektet.
    vintage_advertisement_subject_category:
      name: Emnekategori for eldre reklame
      description: Identifiserer hvilken produkt- eller tjenestekategori som annonseres
        (hva annonsen er for).
    vintage_classic_truck_cab_type:
      name: Gammeldags og klassisk førerhus i lastebil
      description: Førerhuskonfigurasjon eller karosseristil på lastebilens passasjerrom.
    virginia_tech_helmet_star_rating:
      name: Virginia Tech Helmet-stjernevurdering
      description: Sikkerhetsvurdering tildelt av Virginia Tech Helmet Lab (0 til
        5 stjerner).
    virtual_analog_synthesizer_form_factor:
      name: Formfaktor for virtuell analog synthesizer
      description: Angir det fysiske formatet til synthesizer-chassiset (keyboard
        vs. modul eller reol).
    viscosity_thickness:
      name: Viskositet/tykkelse
      description: Beskriver hvor tykk eller flytende leirvellingen er slik den selges
        eller ved anbefalt arbeidskonsistens.
    vise_configuration:
      name: Tvingekonfigurasjon
      description: Angir den strukturelle utformingen eller antall deler i skrustikkesettet,
        noe som påvirker bærbarheten og hvor komplisert det er å sette det opp.
    visibility_features:
      name: Synlighetsfunksjoner
      description: Fremhever designelementer som gjør syklisten mer synlig i trafikken.
    visor_brim_type:
      name: Visir- eller bremtype
      description: Angir hvorvidt det finnes et visir eller en brem på hjelmen, og
        hvilken stil det er.
    visor_configuration:
      name: Visirkonfigurasjon
      description: Angir om det finnes et innebygd visir eller ansiktsskjerm samt
        hvordan det er utformet.
    visor_lens_finish:
      name: Overflatebehandling på visirglasset
      description: Angir fargetonen, den optiske finishen eller den grafiske stilen
        som er brukt på visirlinsen.
    visor_style:
      name: Visirstil
      description: Angir om hetten har en brem eller et visir og hvordan den er utformet.
    voc_compliance_standard:
      name: VOC-samsvarsstandard
      description: Samsvarserklæring om flyktige organiske forbindelser (VOC) for
        produktet (der det er aktuelt).
    voc_regulatory_class:
      name: VOC-reguleringsklasse
      description: Angitt VOC-klasse for regelverks- og samsvarsformål for produktet
        (i henhold til etikett eller sikkerhetsdatablad) som brukes i forbindelse
        med regionale lovkrav og miljøbegrensninger.
    vodka_base_ingredient:
      name: Basisingrediens i vodka
      description: Primær landbruksingrediens som vodkaen destilleres fra (f.eks.
        hvete, potet, mais).
    voice_coil_configuration:
      name: Konfigurasjon av talespole
      description: Antall eller arrangement av talespoler for fleksibilitet i kablingen
        og impedansalternativer.
    voice_effects:
      name: Stemmeeffekter
      description: Innebygde vokaleffekttyper som er støttet av karaokesettet.
    voltage_rating_type:
      name: Spenningsklassifiseringstype
      description: Angir om sikringens spenningsklassifisering gjelder for AC, DC
        eller begge deler.
    voltage_regulator_connector_type:
      name: Tilkoblingstype for spenningsregulator
      description: Angir hva slags tilkobling eller terminal som brukes for å koble
        regulatoren til bilens ledningsnett/dynamo/generator.
    wader_foot_type:
      name: Type fot på vadebukse
      description: Angir om vadebuksene har integrerte støvler eller separate strømpeføtter.
    wader_sole_type:
      name: Vadesåletype
      description: Angir hvilket materiale yttersålen er laget av, eller hvilken type
        grep som brukes på vadestøvler eller vadebukser med innebygd støvel.
    waistband_style:
      name: Linningsstil
      description: Beskriver konstruksjonen av linningen og hvordan den festes eller
        justeres for passform og komfort.
    wakeboard_binding_mounting_pattern:
      name: Monteringsmønster for wakeboard-binding
      description: Angir innleggs- eller platemønsteret på wakeboardet som bindingene
        kan brukes sammen med.
    wakeboard_riding_style:
      name: Wakeboard-kjørestil
      description: Klassifiserer wakeboardets tiltenkte miljø eller bruksstil.
    wall_decal_style:
      name: Stil på veggdekal
      description: Angir hvordan dekalen er produsert eller påført (f.eks. stanset,
        overføringsdekal, ark med klistremerker).
    wallyball_equipment_included:
      name: Inkludert wallyball-utstyr
      description: Angir hvilke deler som inngår i wallyball-settet, slik at kundene
        vet nøyaktig hva de kjøper og kan sammenligne ulike pakker.
    warp_beam_type:
      name: Type warp-bjelke
      description: Angir konfigurasjonen på vevstolens medfølgende eller monterte
        varpbjelke (bjelkeoppsettet som følger med vevstolen).
    washability:
      name: Vaskbarhet
      description: Angir om limet kan rengjøres med vann eller er vaskbart etter påføring.
    watch_band_design:
      name: Klokkereimdesign
      description: Beskriver konstruksjonsstilen eller designmønsteret til en klokkereim
        (f.eks. NATO, Milanese, Link).
    watch_movement:
      name: Klokkebevegelse
      description: Angir hvilken mekanisme som driver klokken, et viktig kriterium
        som kunder bruker for å skille mellom ulike modeller.
    water_activation:
      name: Vannaktivering
      description: Om nødsenderen kan aktiveres automatisk ved nedsenking i vann (vanlig
        for EPIRB-er i kategori I og II).
    water_chamber_configuration:
      name: Konfigurasjon av vannkammer
      description: Beskriver madrassens innvendige oppbygging, for eksempel om den
        har ett eller to kammer, noe som påvirker støtten, temperaturreguleringen
        og forstyrrelsen av partner.
    water_dispensing_mechanism:
      name: Vannutløpsmekanisme
      description: Angir hvordan vann slippes ut fra enheten, for eksempel gjennom
        kraner, sprøytedyser eller ved hjelp av tyngdekraften.
    water_exposure_protection_level:
      name: Beskyttelsesnivå for vanneksponering
      description: Angir produktets beskyttelsesnivå ved kontakt med vann (f.eks.
        sprut kontra kortvarig nedsenking). Bruk IP-klassifisering (Ingress Protection)
        når en offisiell IP-kode er tilgjengelig.
    water_fed_design:
      name: Vannforsynt utforming
      description: Angir om børsten er beregnet på bruk med rennende vann gjennom
        et gjennomstrømningshåndtak eller en slangetilkobling.
    water_gun_features:
      name: Funksjoner i vannpistol
      description: Viktige funksjoner og innebygde egenskaper for vannpistolen.
    water_gun_operating_mechanism:
      name: Vannpistolens driftsmekanisme
      description: Hvordan vannpistolen bygger opp trykk og presser ut vann under
        bruk.
    water_gun_spray_pattern:
      name: Vannpistolens spraymønster
      description: Type vannstråle som produseres av dysen under avfyring.
    water_heating_method:
      name: Metode for oppvarming av vann
      description: Beskriver hvordan, eller om, vannet varmes opp før bruk – for eksempel
        ved hjelp av solvarme, propanbrennere, elektriske varmeelementer, batteridrevet
        oppvarming, varmeisolerende isolasjon eller uten oppvarming.
    water_mattress_construction:
      name: Konstruksjon av vannmadrass
      description: Angir vannmadrassens konstruksjonsstil (f.eks. hard eller myk side),
        noe som avgjør hvilken ramme den passer til og den generelle liggekomforten.
    water_play_features:
      name: Funksjoner for vannlek
      description: Vannaktivitetskomponenter som er inkludert i badelandet eller vannsklien.
    water_polo_competition_approval:
      name: Godkjenning av vannpoloturnering
      description: Angir hvilket styringsorgan eller hvilket konkurransenivå som ballen
        offisielt er godkjent eller sertifisert for.
    water_polo_goal_type:
      name: Type vannpolomål
      description: Angir målets struktur- eller monteringskonfigurasjon (f.eks. flytende,
        dekkmontert, flyttbart).
    water_pump_drive_type:
      name: Type vannpumpedrift
      description: Angir hvordan vannpumpen drives eller aktiveres i kjøretøyets kjølesystem.
    water_pump_housing_material:
      name: Materiale i vannpumpehuset
      description: Materiale i vannpumpehuset.
    water_pump_impeller_material:
      name: Materiale i vannpumpens løpehjul
      description: Angir materialet i vannpumpens løpehjul (den indre rotoren eller
        skovlen som beveger kjølevæsken).
    water_pump_mounting_type:
      name: Monteringstype for vannpumpe
      description: Angir vannpumpens monterings- eller formfaktorstil for montering
        i motoren (f.eks. boltet hus kontra patron eller innsats).
    water_purification_method:
      name: Rensemetode for vann
      description: Angir den primære mekanismen som produktet bruker for å gjøre det
        trygt å drikke vannet i felten (f.eks. pumpe versus tyngdekraft versus UV-lys).
    water_resistance:
      name: Vannbestandighet
      description: Angir graden av værbeskyttelse, for eksempel vanntett eller vannavstøtende.
    water_resistance_level:
      name: Vannbestandighetsgrad
      description: Angir om tekstilet er vannavstøtende og i hvilken grad.
    water_resistance_rating_case_protection_level:
      name: Vannmotstandsgrad (beskyttelsesgrad for kabinettet)
      description: Angir graden av vannmotstand eller beskyttelse som det rullende
        kabinettet gir (på markedsføringsnivå, ikke elektronikkens IP-klassifisering),
        f.eks. vannavstøtende kontra vanntett.
    water_rocket_kit_items_included:
      name: Innhold i vannrakettsettet
      description: De viktigste komponentene som følger med i produktpakken.
    water_rocket_propulsion_type:
      name: Fremdriftstype for vannrakett
      description: Primær fremdrifts- eller energikilde som brukes til å skyte opp
        raketten.
    water_rocket_recovery_system:
      name: Gjenvinningssystem for vannraketter
      description: Metode som brukes til å hente raketten etter oppskyting.
    water_ski_base_design:
      name: Utforming av vannskibase
      description: Angir vannskienes bunnskrogsprofil, noe som påvirker kjøreegenskapene.
    water_ski_fin_type:
      name: Type vannskifinne
      description: Angir vannskiens finnekonfigurasjon, noe som påvirker sporing og
        manøvrerbarhet.
    water_source:
      name: Vannkilde
      description: Angir hvor vannet kommer fra før karboniseringen.
    water_sports_safety_standard:
      name: Sikkerhetsstandard for vannsport
      description: Angir hvilke offisielle sikkerhets- eller oppdriftsstandarder produktet
        oppfyller (f.eks. CE EN 1385 for hjelmer, ISO 12402-5 for flytevester, USCG
        Type III).
    water_table_feature_set:
      name: Egenskaper for vannbord
      description: Fremhever de innebygde lekefunksjonene i vannbordet, som fossefall,
        sprøyter, pumper eller bassenger i flere nivåer.
    water_table_items_included:
      name: Inkluderte elementer i vannbord
      description: Angir hva slags tilbehør som følger med vannbordssettet (f.eks.
        båter, kopper, trakter, figurer).
    water_table_water_source_type:
      name: Vannkildetype for vannbord
      description: Angir hvordan vannbordet tilføres eller fylles med vann.
    waterbed_stabilization_level:
      name: Stabiliseringsnivå for vannseng
      description: Angir i hvilken grad vannmadrassen demper bølger eller bevegelser.
    watercolor_ink_water_resistance_after_drying:
      name: Vannfasthet for akvarellfarge (etter tørking)
      description: Angir om akvarellfargen blir vannavstøtende eller vanntett etter
        tørking (ifølge produsentens opplysninger).
    watercraft_care_application_area:
      name: Anvendelsesområde for båtpleie
      description: Angir hovedområdet eller -komponenten på en båt som produktet er
        beregnet på.
    watercraft_drive_mechanism:
      name: Drivmekanisme for båt
      description: Beskriver den spesifikke fremdriftsmekanismen som er montert eller
        støttet om bord.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Mønster for nivåføleren i båtens drivstofftank
      description: Angir monteringsmønsteret eller -standarden for nivåføleren i drivstofftanken
        og kompatible målere (f.eks. vanlige boltmønstre for båtutstyr).
    watercraft_fuel_tank_shape:
      name: Formen på båtens drivstofftank
      description: Beskriver drivstofftankens generelle fysiske form for å legge til
        rette for planlegging av plass og innpassing.
    watercraft_hull_material:
      name: Båtens skrogmateriale
      description: Angir hovedmaterialet i skrogkonstruksjonen.
    watercraft_ignition_part_voltage:
      name: Spenning i båtens tenningsdel
      description: Nominell spenningsklassifisering eller -krav til tenningsdelen
        (hvis aktuelt), for eksempel i 12 V-systemer.
    watercraft_impeller_material_grade:
      name: Materialkvalitet for impeller i båt
      description: Angir hvilket materiale impelleren i båten består av (f.eks. neoprengummi,
        nitril, bronse).
    watercraft_lighting_certification_compliance:
      name: Sertifisering og samsvar av båtens belysning
      description: Angir hvilke forskrifter og standarder lyset er sertifisert for
        i henhold til for bruk til sjøs (f.eks. i samsvar med USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Funksjoner for justering av båtens motorfeste
      description: Stativets justeringsmuligheter (f.eks. vinkling, høydejustering,
        sideforskyvning) som påvirker brukervennligheten og passformen.
    watercraft_piston_part_type:
      name: Båtens stempeltype
      description: Angir hvilken stempelrelatert komponent oppføringen gjelder for.
    watercraft_propeller_blade_rake:
      name: Vinkel på båtens propellblad
      description: Angir bladvinkelen i forhold til navet, noe som påvirker baugløftet
        og ytelsen.
    watercraft_propeller_rotation_direction:
      name: Propellens rotasjonsretning på båten
      description: Angir hvilken rotasjonsretning eller dreining propellen må ha for
        å passe med drivverket (f.eks. høyrevendt/standard kontra venstrevridd / motsatt
        roterende).
    watercraft_pump_stage_impeller_role:
      name: Pumpetrinn / impelleroppgave for båt
      description: Angir om impelleren er beregnet på en bestemt pumpeoppgave (f.eks.
        råvanns-/sjøvannspumpe, kjølevæskesirkulasjon, jetpumpe).
    watercraft_registration_status:
      name: Båtens registreringsstatus
      description: Angir om seilbåten leveres med eierbevis eller registreringspapirer.
    watercraft_safety_equipment_activation_type:
      name: Aktiveringstype for sikkerhetsutstyr på båt
      description: Primær metode for aktivering av sikkerhetsanordningen (for nødsendere/MOB-alarmer/PLB-er),
        som skiller seg fra oppblåsing.
    watercraft_steering_cable_core_material:
      name: Kjernemateriale i båtens styrekabel
      description: Angir materialet i den indre kabelen/kjernen som overfører kraft.
    watercraft_steering_cable_hardware_included:
      name: Monteringsutstyr for båtens styrekabel inkludert
      description: Angir hvilket monteringsutstyr og tilbehør som følger med styrekabelen.
    watercraft_steering_cable_system_type:
      name: Type styrekabelsystem for båt
      description: Angir hvilken styresystemarkitektur kabelen er beregnet på (f.eks.
        roterende, tannstang).
    watercraft_steering_wheel_hub_bore_type:
      name: Hulltype for ratt til vannfartøy
      description: Angir utformingen av grensesnittet mellom senterfeste og hull (f.eks.
        konisk, riflet) der hjulet kobles til navet eller adapteren.
    watercress_variety:
      name: Engelskkarse-variant
      description: Angir hvilken spesifikk sort eller type karse som selges.
    waterproof_level:
      name: Vanntetthetsgrad
      description: Angir fottøyets vanntetthetsgrad, inkludert eventuelle utsagn om
        vanntetthet som er dekket av garanti.
    wax_blend_composition:
      name: Sammensetning av voksblanding
      description: Angir hvilke voksmaterialer som inngår i produktet, eller hvilken
        blandingstype som markedsføres.
    wax_coat_type:
      name: Voksbeleggstype
      description: Angir om voksen er beregnet som grunning, topplag, til allsidig
        bruk eller enkeltstrøk.
    wax_hardness:
      name: Voksens hardhet
      description: Angir voksens relative hardhet, noe som påvirker holdbarhet og
        glid på forskjellige snøtyper.
    wax_physical_form:
      name: Voksens fysisk form
      description: Angir hvilken fysisk form det rå stearinet leveres i.
    wax_recommended_candle_application:
      name: Voks anbefalt for påføring av stearinlys
      description: Angir hvilke primære stearinlystyper voksblandingen er beregnet
        på.
    wax_tackiness_level:
      name: Klebrighetsnivå for voks
      description: Angir hvor mye friksjon eller grep voksen gir på bladet.
    weapon_system_integration:
      name: Integrasjon av våpensystem
      description: Angir om kjøretøyet er utstyrt med integrerte våpensystemer eller
        våpenfester.
    weather_suitability:
      name: Værforhold
      description: Angir hvilke værforhold hanskene passer for, som bruk i kaldt eller
        vått vær.
    weave_finish:
      name: Veving/overflatebehandling
      description: Beskriver stoffets primære veving eller overflatebehandling, som
        påvirker slipsets tekstur og glans.
    weave_style:
      name: Type veving
      description: Angir det tradisjonelle vevemønsteret som brukes ved fremstillingen
        av panamahatten, og som bestemmer pusteevnen, fleksibiliteten, utseendet og
        prisen.
    weave_type:
      name: Vevetype
      description: Angir stoffets veving eller konstruksjonsstil (bransjeterm for
        veving), som bestemmer tekstur, glans og fall.
    weaving_beater_edge_type:
      name: Veving med slagkant
      description: Beskriver profilen på den aktive kanten av den flate slageren som
        kommer i kontakt med veften (f.eks. rett eller takket).
    weaving_beater_style:
      name: Stil for vevskje
      description: Angir den funksjonelle utformingen eller formen på den flate vevslageren.
    weaving_shuttle_tip_style:
      name: Vevingsskyttelens spissform
      description: Angir utformingen av den fremre spissen på skyttelen, noe som påvirker
        hvordan den beveger seg gjennom vevskåret og sannsynligheten for at den fanger
        opp renningstråder.
    weaving_shuttle_use_case:
      name: Bruksområde for vevskyttelen
      description: Angir hvilken vevingsoppgave skyttelen er konstruert eller optimalisert
        for.
    webbing_construction_type:
      name: Konstruksjonstype for webbing
      description: Beskriver båndets fysiske vevings- eller flettemønster, noe som
        påvirker håndteringen, styrken og den tiltenkte bruken.
    webbing_design:
      name: Bånddesign
      description: Beskriver hvordan vevstrukturen er mellom fingrene, noe som påvirker
        styrketrening og fremdrift.
    weight_adjustability:
      name: Justerbarhet for vekt
      description: Angir om produktets motstand kan justeres av brukeren (f.eks. med
        vektvalg eller påleggbare vekter) eller om den er fastsatt til en bestemt
        vekt.
    weight_integration_system:
      name: Vektintegrasjonssystem
      description: Beskriver om og hvordan ballastvekter er integrert i BCD-en (som
        f.eks. avtakbare vektlommer, ingen, valgfritt tilleggsutstyr).
    weight_plate_compatibility:
      name: Kompatibilitet med vektskiver
      description: Angir hvilken diameter på vektskivene maskinen kan brukes med (olympiske,
        standard eller begge deler).
    weight_plate_style:
      name: Vektskivestil
      description: Angir vekstskivens design eller type (som f.eks. olympisk, frivekter,
        vektvalg) for rask filtrering etter kompatibilitet.
    weightlifting_belt_style:
      name: Vektløftingsbeltestil
      description: Kategoriserer beltets generelle utforming eller formålsbestemte
        konfigurasjonen (f.eks. spakbelte, dyppbelte, konisk belte).
    weightlifting_federation_certification:
      name: Sertifisering av vektløfterforbundet
      description: Offisiell godkjenning eller samsvar med styrkesportforbunds produktkrav,
        som IPF eller IWF.
    wetsuit_boot_height:
      name: Høyde på våtdraktens støvel
      description: Angir støvelens høyde eller snitt på leggen, noe som påvirker dekning,
        bevegelighet og vanninntrengning.
    wetsuit_entry_system:
      name: System for å ta på våtdrakt
      description: Beskriver typen og plasseringen av åpningen eller glidelåssystemet
        som brukes for å ta på seg våtdrakten.
    wetsuit_seam_construction:
      name: Konstruksjon av sømmer på våtdrakten
      description: Angir hvordan sømmene er konstruert og forseglet, noe som påvirker
        varmeisolasjonen, fleksibiliteten og holdbarheten.
    wheat_product_form:
      name: Produktformat for hvete
      description: Angir hveteproduktets fysiske eller bearbeidede form.
    wheel_arrangement:
      name: Hjularrangement
      description: Angir damplokomotivets hjularrangement (Whyte-notasjon), som er
        et karakteristisk trekk og et vanlig samler- og søkeord.
    wheel_brake_type:
      name: Bremsetype for hjul
      description: Beskriver bremsekonfigurasjonen på vognens hjul eller svinghjul.
    wheel_chock_grip_features:
      name: Stoppklossens gripeegenskaper
      description: Designegenskaper for veigrep og grep som gir bedre grep mot underlaget
        og mot dekkene.
    wheel_cleaner_acidity_ph_category:
      name: Syre- og pH-kategori for felgrensemidler
      description: Angir om felgrensemiddelet er surt, nøytralt eller alkalisk (og
        eventuelt om det markedsføres som pH-balansert).
    wheel_cleaner_formula_type:
      name: Type felgrens
      description: For felgrensemidler og tilhørende vaskemidler angir dette produktets
        primære sammensetningskategori (som syrebasert, syrefritt, pH-nøytralt eller
        -balansert eller jernreaktivt).
    wheel_construction_type:
      name: Konstruksjonstype for hjul
      description: Spesifiserer felgens produksjons- eller konstruksjonsmetode.
    wheel_contaminant_target:
      name: Mål for forurensning av felg
      description: Angir de viktigste forurensningstypene som rengjøringsmiddelet
        er utviklet for å fjerne.
    wheel_core_type:
      name: Kjernetype for hjul
      description: Beskriver hjulkjernens konstruksjonsform, som påvirker vekt, stivhet
        og kraftoverføring.
    wheel_cylinder_inlet_port_thread_standard:
      name: Gjengestandard for hjulsylinderens inngangsåpning
      description: Angir gjengestandarden for inngangsåpningen til bremseledningen
        på hjulbremsesylinderen (f.eks. metrisk bobleflens kontra SAE-omvendt flens).
    wheel_fastener_seat_type:
      name: Festetype for hjul
      description: Angir hva slags type mutter- eller boltfeste som passer til hjulet
        (f.eks. konisk/avsmalnende, kuleformet/radiusformet, flatt, mag/skaft).
    wheel_illumination:
      name: Hjulbelysning
      description: Angir om hjulet har innebygd belysning eller glødefunksjoner.
    wheel_material:
      name: Hjulmateriale
      description: Angir hjulenes primære sammensetning, som påvirker holdbarhet,
        veigrep og vibrasjonsdemping.
    wheel_profile:
      name: Hjulprofil
      description: Beskriver formen på hjulets tverrsnitt, som påvirker hastighet,
        veigrep og smidighet.
    wheel_setup_type:
      name: Type oppsett for hjul
      description: Angir hvilken hjulkonfigurasjon som brukes på rulleskøytene.
    wheel_system_finish:
      name: Overflatebehandling av hjulsystemet
      description: Overflatebehandling/belegg på felger eller hjul og visse hjuldeler
        og tilbehør.
    whip_style:
      name: Piskestil
      description: Sorterer produktet etter den spesifikke stilen på ridepisken eller
        den tiltenkte disiplinen.
    whipped_cream_base:
      name: Basismateriale i pisket krem
      description: Angir den viktigste basisingrediensen som brukes til å lage pisket
        krem, for eksempel kremfløte eller kokosmelk.
    whipped_cream_form:
      name: Form for pisket krem
      description: Angir det fysiske formatet som den piskede kremen selges i.
    whistle_head_material:
      name: Materiale i fløytehode
      description: Angir hvilket materiale fløytehodet eller munnstykket er laget
        av.
    whistle_light_features:
      name: Funksjoner til fløytelyset
      description: Angir om fløyten har innebygde lyseffekter for fester (f.eks. LED).
    whistle_purpose:
      name: Formålet med fløyten
      description: Angir hovedformålet med fløyten (sportstrening, sjøsikkerhet, hundetrening
        osv.).
    whistle_sound_style:
      name: Stilen til fløytelyden
      description: Beskriver fløytelydens stil eller karakter (som entone kontra flertone).
    white_glue_finish_appearance_when_dry:
      name: Utseende på hvitlim når det har tørket
      description: Angir hvordan limet ser ut etter tørking ved bruk til håndverk
        eller kontor (f.eks. gjennomsiktig eller ugjennomsiktig).
    white_glue_washability:
      name: Vaskbarhet for hvitt lim
      description: Angir om tørket lim kan vaskes bort eller rengjøres fra tekstiler
        eller hud.
    whitewater_kayak_style:
      name: Kajakkstil ved elvepadling
      description: Hoveddesign innenfor elvepadlingssegmentet (f.eks. Creekboat, River
        Runner, Playboat).
    whitewater_rating_class:
      name: Elvepadlingsrangering (klasse)
      description: Den høyeste internasjonale vanskelighetsgraden for elver som flåten
        er klassifisert for å takle.
    whorl_mounting_interface:
      name: Monteringsgrensesnitt for spinnehjul
      description: Hvordan kransen festes til spinnehjulet (akseltype/tilkobling).
    wick_construction_type:
      name: Konstruksjonstype for veke
      description: Vekens utforming eller type (flettet, flat, firkantflettet, med
        kjerne, av tre osv.).
    wick_core_type:
      name: Type vekekjerne
      description: Om veken er uten kjerne eller har et kjernemateriale (f.eks. med
        papir- eller sinkkjerne), noe som påvirker stivheten og brennegenskapene.
    wick_tab_crimp_type:
      name: Vekeholderens krympetype
      description: Hvordan veken er festet til vekeholderen (konstruksjon/krympestil).
    wick_tab_material:
      name: Materiale i vekebase
      description: Materialet i festebraketten/støttebraketten (vanligvis blikk),
        som er relevant for korrosjonsbestandighet og juridiske krav (f.eks. for å
        unngå bly).
    wick_tab_shape:
      name: Formen på vekeholderen
      description: Formen på vekeholderplaten.
    wick_type_included:
      name: Type veke som er inkludert
      description: Angir hva slags vekemateriale eller veketype som følger med i settet.
    wig_fiber_material:
      name: Parykkfibermateriale
      description: Angir hva slags fiber som hovedsakelig er brukt i parykken, slik
        at kundene enkelt kan velge mellom varianter av ekte hår og syntetiske alternativer
        med forskjellige egenskaper når det gjelder styling og holdbarhet.
    wildlife_attractant_scent:
      name: Lokkeduft for vilt
      description: Angir primærduften som brukes til å lokke til seg vilt, blant annet
        duft fra naturlig mat og feromonlignende dufter.
    willow_grade:
      name: Kvalitet på piletre
      description: Angir kvalitetsgraden på det anvendte piletreet, med henvisning
        til fiberstruktur og generelt ytelsesnivå.
    willow_type:
      name: Type piletre
      description: Angir hva slags type pil eller annet materiale som er brukt til
        bladet på balltreet, noe som har stor innvirkning på ytelse, holdbarhet og
        pris.
    wind_up_mechanism_type:
      name: Type trekkoppmekanisme
      description: Angir hvordan leketøyet trekkes opp eller aktiveres.
    wind_up_toy_movement_pattern:
      name: Bevegelsesmønster for opptrekkbare leker
      description: Beskriver lekens hovedbevegelse når det er trukket opp.
    windbreak_purpose:
      name: Formålet med vindskjermen
      description: Definerer den primære tiltenkte bruken av vindskjermen.
    windfoil_board_mounting_system:
      name: Monteringssystem for windfoilbrett
      description: Angir hva slags foilboks eller monteringsfeste som windfoilbrettet
        er utstyrt med.
    windfoil_sail_style:
      name: Type windfoilseil
      description: Kategoriserer seilet etter tiltenkt seilestil eller -disiplin.
    winding_direction:
      name: Viklingsretning
      description: Angir hvilket rotasjonsmønster snellen støtter (med klokken, mot
        klokken eller i begge retninger).
    winding_method:
      name: Viklingsmetode
      description: Hvordan vefttråden skal vikles eller legges inn for bruk i skyttelen.
    winding_speed_control_type:
      name: Reguleringstype for viklingshastighet
      description: Indikerer hvordan viklingshastigheten reguleres under bruk.
    winding_type:
      name: Viklingstype
      description: Angir viklingskonstruksjonen til basstrengene (ytre viklingsprofil).
    windlass_control_station_type:
      name: Type ankerspillkontrollstasjon
      description: Hvilken reguleringstype som følger med eller støttes for betjening
        av ankerspillet.
    windlass_mount_type:
      name: Type ankerspilfeste
      description: Hvor og hvordan ankerspillet skal monteres på båten.
    window_component_location:
      name: Plassering av vinduskomponent
      description: Angir hvilket vindu eller hvilken åpning delen gjelder for i kjøretøyet
        (som frontrute, dørvindu, bakrute eller sidevindu).
    window_configuration:
      name: Vinduskonfigurasjon
      description: Angir tilstedeværelsen og den relative størrelsen på de gjennomsiktige
        vinduene på wingfoilvingen.
    window_glass_construction:
      name: Konstruksjon av vindusglass
      description: Angir sikkerhets- og lamineringskonstruksjonen til vinduene i kjøretøyet.
    window_glass_features:
      name: Vindusglassets egenskaper
      description: Angir om glasset støtter integrert kjøretøyutstyr (som regnsensor,
        kamerabrakett).
    window_glass_finish:
      name: Overflatebehandling av vindusglasset
      description: Angir overflatebehandling, fargetone og solfilm for vindusglass
        i motorkjøretøy.
    window_glass_tint_color:
      name: Farge på vindusglass
      description: Angir fargetonen i glasset (ikke produktets generelle farge).
    window_glass_tint_level:
      name: Vindusglasset toningsgrad
      description: Angir den omtrentlige mørkhetsgraden på vindusglasset slik det
        er fra fabrikken eller med standard solbeskyttelse (ikke ettermontert film).
        Bruk beskrivende nivåer når den nøyaktige VLT-verdien ikke er kjent.
    window_net_latch_mechanism:
      name: Låsemekanisme for vindusnett
      description: Angir hvilken låse- eller utløsermekanisme som brukes til vindusnettet
        (f.eks. trykknapp, spak, sikkerhetsbeltespenne).
    window_net_mounting_hardware:
      name: Monteringsutstyr for vindusnett
      description: Angir hva slags monteringsutstyr eller -metode som brukes til monteringen
        av vindusnettet (f.eks. klips, skruer, krok eller stang), eller om monteringsutstyret
        følger med.
    window_net_opening_direction:
      name: Vindusnettets åpningsretning
      description: Angir hvordan vindusnettet åpnes eller løses i forhold til brukeren
        for utstigning og for å oppfylle regelverket.
    window_regulator_operation:
      name: Betjening av vindusheis
      description: Angir hvordan vindusheisen betjenes (manuell sveiv eller elektrisk).
    windshield_coverage_area:
      name: Dekningsområde for frontrute
      description: Angir hvilke ytre deler av fronten på kjøretøyet som frontrutetrekket
        er ment å beskytte (f.eks. bare frontruten kontra også vindusviskere, speil,
        sidevinduer eller kanten av panseret).
    windshield_mount_attachment_method:
      name: Festemetode for frontrutemontering
      description: Angir hvordan festet festes til eller griper tak i frontruten.
    windshield_washer_fluid_seasonality:
      name: Årstidsinformasjon for spylervæsken
      description: Angir hvilken årstid, hvilket klima eller hvilket hovedbruksområde
        spylervæsken er beregnet på (f.eks. isfjerner, sommervask, helårsbruk).
    windsurf_fin_style:
      name: Finnestil for windsurfing
      description: Klassifiserer finnen etter den tiltenkte seilingsdisiplinen eller
        bruksmåten (f.eks. bølgesurfing, slalåm, tang).
    windsurfing_connection_standard:
      name: Standard for tilkobling til windsurfing
      description: Mekanisk utstyr eller bokstype som brukes til å feste delen til
        brettet eller riggen.
    windsurfing_sail_style:
      name: Stil for vindsurfing-seil
      description: Angir seilets tiltenkte disiplin eller bruksområde, for eksempel
        bølgesurfing, freeride eller foil.
    wine_additive_type:
      name: Type vintilsetningsstoff
      description: Angir hva slags produkt for rødvinsproduksjon dette er (ingrediens,
        tilsetningsstoff, gjær, klaringsmiddel, settemiddel osv.).
    wine_body:
      name: Vinfylde
      description: Beskriver vinens opplevde vekt og følelse i munnen.
    wine_carbonation:
      name: Vinkarbonering
      description: Angir om vinen er stille, lett musserende eller musserende, og,
        der det er relevant, hvor sterkt perlende den er.
    wine_making_ingredient_type:
      name: Type ingrediens i vinproduksjon
      description: Angir kategorien for funksjonelle ingredienser for tilsetningsstoffer
        og ingredienser til vinproduksjon som er beregnet på konsum.
    wine_making_stage:
      name: Vinproduksjonsfase
      description: Angir hvilket trinn i vinproduksjonsprosessen produktet er beregnet
        på.
    wine_style:
      name: Vinstil
      description: Kategoriserer vinens generelle produksjonsstil utover fargen, for
        eksempel stille vin, musserende vin eller hetvin.
    winemaking_process_stage:
      name: Vinproduksjonsfase
      description: Angir hvilket hovedtrinn i vinproduksjonen produktet er beregnet
        på.
    wing_count:
      name: Antall vinger
      description: Antall vinger eller armer på boomerangen.
    wing_handle_type:
      name: Type vingehåndtak
      description: Angir utformingen av håndtakssystemet på wingfoil-vingen.
    wing_part_type:
      name: Type vingedel
      description: Angir den spesifikke komponenten eller reservedelen til en wingfoil-vinge.
    wingfoiling_style:
      name: Wingfoiling-stil
      description: Angir hvilken spesifikk wingfoiling-disiplin eller kjørestil produktet
        er beregnet på.
    wiper_arm_finish:
      name: Overflatebehandling av vindusviskerarmen
      description: Overflatebehandling eller beskyttelseslag på vindusviskerarmen,
        som påvirker korrosjonsbestandigheten og utseendet.
    wiper_arm_pivot_mount_type:
      name: Viskerarmens festetype
      description: Angir hvordan viskerarmen festes til kjøretøyets viskerarm eller
        dreiepunkt.
    wiper_blade_attachment_type:
      name: Type feste for viskerbladet
      description: Angir hva slags festemekanisme som brukes til å montere viskerbladet
        på viskerarmen.
    wiper_blade_rubber_material:
      name: Gummimateriale i vindusviskerblad
      description: Materialet i viskerelementet (innsats/påfyll) som kommer i kontakt
        med glasset.
    wiper_system_position:
      name: Vindusviskersystemets posisjon
      description: Angir monteringsstedet for vindusviskersystemet på kjøretøyet.
    wire_coating_material:
      name: Trådbeleggsmateriale
      description: Angir materialet i det ytre belegget eller mantelen som er påført
        metalltråden (ikke kjernematerialet). Dette kan påvirke slitestyrken og hvor
        lett den glir gjennom perlehullene.
    wire_coating_type:
      name: Type trådbelegg
      description: Angir om og hvordan metalltråden er belagt eller dekket (for farge,
        beskyttelse og tekstur).
    wire_construction_type:
      name: Konstruksjonstype for vaier
      description: Angir den fysiske utformingen av perletråden, for eksempel om den
        er flertrådet eller solid, og om den er belagt.
    wire_finish:
      name: Trådens overflatebehadling
      description: Angir overflatebehandlingen, belegget eller plettering som er påført
        tråden (f.eks. polert, emaljert, galvanisert, plettert), noe som påvirker
        utseendet og motstandsdyktigheten mot anløp og korrosjon.
    wire_gauge_awg:
      name: Trådtykkelse (AWG)
      description: AWG-størrelsen (American Wire Gauge) på lederne som brukes i ledningsnettet.
    wire_insulation_material:
      name: Isolasjonsmateriale for vaier
      description: Materialet i ledningsisolasjonen eller kappen som brukes i ledningsnettet
        (påvirker temperatur- og kjemikaliebestandigheten).
    wire_packaging_type:
      name: Emballasjetype for vaier
      description: Angir hvordan ledningen selges eller pakkes.
    wire_shape_profile:
      name: Trådform eller -profil
      description: Beskriver formen på ledningens tverrsnitt.
    wiring_configuration:
      name: Kablingskonfigurasjon
      description: Angir om kården leveres med elektrisk poengberegning, ukablet,
        trådløs eller er beregnet på trening uten elektronisk poengberegning.
    wobbler_style:
      name: Stil for wobbler
      description: Angir den spesifikke wobblerens utforming eller hvordan den beveger
        seg, for eksempel crankbait eller jerkbait.
    wood_block_surface_preparation:
      name: Forbehandling av overflaten til treblokker
      description: Angir om treblokkens overflate er klar for overflatebehandling
        og bearbeiding.
    wood_grain_direction:
      name: Retning på trefibre
      description: Retningen på trefibrene i forhold til produktets lengste dimensjon
        (viktig for styrke, skjæreegenskaper og utseende).
    wood_slice_edge_style:
      name: Treskivens kantutforming
      description: Skivens kanttilstand, for eksempel naturlig barkkant kontra glatt
        eller slipt kant.
    wooden_block_special_features:
      name: Spesielle egenskaper ved treklossene
      description: Viktige egenskaper som følger med settet av treklosser.
    woodwind_body_construction:
      name: Konstruksjon til treblåseinstrumentenes hovedstykke
      description: Angir om instrumentet består av ett stykke eller flere deler (f.eks.
        todelt eller tredelt), noe som påvirker rengjøring, oppbevaring og bærbarhet.
    woodwind_polishing_cloth_intended_use:
      name: Tiltenkt bruk av poleringsklut for treblåsere
      description: Angir hva kluten primært er beregnet på å rengjøre eller polere
        på et treblåseinstrument.
    woodwind_small_part_type:
      name: Type smådeler til treblåseinstrumenter
      description: Angir hva slags liten reservedel til klarinett artikkelen dreier
        seg om (f.eks. mekanikkdeler, polstre, kork eller filt, ringer).
    woofer_mounting_type:
      name: Monteringstype for woofer
      description: Hvordan basshøyttalerne skal monteres eller brukes (i friluft eller
        i kabinett) og vanlige monteringsmåter i biler.
    woofer_surround_material:
      name: Materiale for rammen på basshøyttaleren
      description: Materiale brukt til rammen på basshøyttaleren (ytre opphengsring).
    worn_on_finger:
      name: Brukes på hvilken finger
      description: Angir hvilken finger hylseføringen skal brukes på.
    wrap_style:
      name: Viklingsstil
      description: Angir hvor mange ganger beltet er ment å vikles rundt midjen.
    wrapping_occasion:
      name: Innpakningsanledning
      description: Primær gave- eller feiringsanledning som innpakningspapiret er
        ment for.
    wrapping_paper_features:
      name: Innpakningspapirets egenskaper
      description: Innpakningspapirets funksjonelle og bærekraftsrelaterte egenskaper,
        som for eksempel rivemotstand, andel resirkulert materiale eller ark i ferdigskåret
        format.
    wrestling_dummy_design:
      name: Utforming av brytedukke
      description: Dukkens generelle kroppsform eller holdning, for eksempel en stående
        menneskefigur eller en kaste- og grappling-sekk, som avgjør hvilke treningsøvelser
        som kan brukes.
    wrestling_mat_safety_certifications:
      name: Sikkerhetssertifiseringer for brytematter
      description: Oppgir eventuelle sikkerhetssertifiseringer eller standarder fra
        bransje- eller idrettsorganisasjoner som matten oppfyller.
    wrist_strap_style:
      name: Stil for håndleddsstropp
      description: Beskriver utformingen av håndleddsstroppen (eller fraværet av en
        sådan) som påvirker støtten og passformen.
    wrist_support_style:
      name: Type håndleddsstøtte
      description: Angir håndleddstøttens utforming eller type, for eksempel støtte,
        hanske, tape eller bandasje, for å hjelpe brukeren med å velge ut fra egne
        preferanser og behov.
    xylophone_range_octaves:
      name: Område for xylophone range (oktaver)
      description: Xylofonens totale register uttrykt i oktaver (f.eks. 2,5 oktaver,
        3 oktaver, 4 oktaver).
    xylophone_resonator_type:
      name: Xylofonens resonatortype
      description: Type resonatorsystem som brukes til å forsterke tonen (hvis noen).
    yam_variety:
      name: Søtpotetvariant
      description: Angir kulturplanten eller den vanlige varianten av yam som selges
        (f.eks. lilla, gul, elefantfot).
    yarn_cutter_physical_style:
      name: Garnklipperens utforming
      description: Angir den fysiske utformingen til en garnklipper (f.eks. hengende,
        ringformet, saks) for å gjøre det enklere å bla gjennom og filtrere i denne
        kategorien.
    yarn_finish_or_effect:
      name: Garnets overflate eller effekt
      description: Fremhever spesielle visuelle eller funksjonelle effekter som er
        påført garnet, for eksempel fluorescens eller metallisk glans.
    yarn_guide_style:
      name: Type garnfører
      description: Den fysiske utformingen av garnføringsdelen.
    yarn_swift_adjustability:
      name: Justerbarhet på garnspolen
      description: Angir om og hvordan spolen kan justeres (kan trekkes ut, kan trekkes
        sammen / foldes sammen), noe som har betydning for oppbevaringen og hvilke
        nøstestørrelser den kan håndtere.
    yarn_swift_bearing_type:
      name: Garnspolens lagertype
      description: Beskriver rotasjonens støttemekanismen (f.eks. kulelager) som påvirker
        jevnheten og opprullingshastigheten.
    yeast_application:
      name: Bruk av gjær
      description: Angir den primære tiltenkte bruken av gjærproduktet, enten til
        matlaging eller gjæring.
    yo_yo_accessory_part_type:
      name: Type tilbehør eller del til jojo
      description: Angir hva slags type reservedel eller tilbehør til jojo produktet
        er (f.eks. snor, kulelager, responsputer).
    yo_yo_axle_system_type:
      name: Type jojo-akselsystem
      description: Konstruksjonsvalg for jojo-akselen (f.eks. fast aksel kontra transaksling),
        som påvirker spillopplevelsen og vedlikeholdet.
    yo_yo_bearing_size_class:
      name: Størrelsesklasse for jojo-lager
      description: Standardisert størrelsesklasse for kulelager som brukes i jojoen,
        der dette er relevant.
    yo_yo_bearing_type:
      name: Type jojo-lager
      description: Lagerkonfigurasjon som påvirker responsen og spinnkarakteristikken.
    yo_yo_play_style:
      name: Jojo-spillestil
      description: Den primære spillestilen for jojoen, som gjenspeiler snor- og triksdisiplinen
        jojoen er beregnet på.
    yo_yo_response_system:
      name: Jojo-responssystem
      description: Angir hvilken jojo-responsmekanisme denne delen er beregnet på
        (kompatibilitet).
    yo_yo_responsiveness:
      name: Jojo-respons
      description: Om jojoen kommer tilbake til hånden ved et rykk (responsiv) eller
        må snurres rundt (ikke-responsiv).
    yo_yo_string_material:
      name: Jojo-snorens materiale
      description: Sammensetningen av materialer i jojo-snoren.
    yogurt_base_ingredient:
      name: Basisingrediens for yoghurt
      description: Angir hvilken melkeingrediens eller plantebasert ingrediens som
        er brukt til å lage yoghurten, noe som er avgjørende med tanke på kostholdsvaner
        og allergi.
    yoke_type:
      name: Type rifleholder
      description: Angir hva slags bøyle eller holder som holder våpenet på ettbensstativet.
    zill_playing_style:
      name: Spillestil for zill
      description: Tiltenkt spillsammenheng eller -stil (vanligvis magedans kontra
        orkestrale eller kulturelle varianter).
    zill_strap_material:
      name: Stroppmateriale for zill
      description: Materialet i fingerstroppen eller elastikken som brukes til å holde
        zillene på plass (hvis de er inkludert), noe som påvirker komfort, holdbarhet
        og grep.
    zills_strap_adjustability:
      name: Zill-stroppenes justerbarhet
      description: Om og hvordan den medfølgende stroppen eller elastikken kan justeres
        så zillen passer bedre.
    zipper_application:
      name: Bruksområde for glidelåsen
      description: Angir det tiltenkte plagget eller bruksområdet som glidelåsen er
        beregnet på.
    zipper_chain_type:
      name: Glidelåsens kjedetype
      description: Angir hva slags utforming eller type kjedet eller tennene på glidelåsen
        har.
    zipper_end_type:
      name: Type glidelåsende
      description: Angir hvordan glidelåsen avsluttes og om den kan skilles fra hverandre
        (åpen ende) eller er lukket (ikke-delbar), inkludert vanlige beslag for delbare
        glidelåser som brukes i glidelåser for håndarbeid.
    zipper_gauge:
      name: Glidelåsmåler
      description: 'Angir størrelsen på glidelåsens kjede, vanligvis angitt med firkanttegnet
        # etterfulgt av et tall (for eksempel #3 eller #5), som samsvarer med tann-
        eller spiralbredden og den tiltenkte bruken.'
    zipper_opening_length:
      name: Lengde på glidelåsåpningen
      description: Angir hvor stor del av frontåpningen som har glidelås, hvor man
        skiller mellom modeller med hel glidelås, halv glidelås og kvart glidelås.
    zipper_pull_material:
      name: Materiale i glidetrekkeren
      description: Angir materialet i glidetrekkeren eller glidenøkkelen (delen du
        griper tak i), i motsetning til glidelåsens tenner eller kjede og stoff.
    zipper_pull_side:
      name: Trekkside for glidelås
      description: Angir hvilke sider av glidelåsen som glidenøkkelen er tilgjengelig
        fra.
    zipper_pull_strap_cord_tab_material:
      name: Materialet i glidelåsens stropp, snor eller glidenøkkel
      description: Materialet i stroppen, snoren, glidenøkkelen eller dusken som er
        festet til glidetrekkeren (hvis til stedet), ikke medregnet selve glidetrekkeren.
    zipper_reversibility_mechanism:
      name: Mekanisme for vendbar glidelås
      description: Angir hvordan glidelåsen er vendbar (f.eks. dobbeltsidig glider
        kontra glider med vippemekanisme eller automatisk lås, som er beregnet på
        vendbare plagg).
    zipper_separating_type:
      name: Deletype for glidelås
      description: Angir om glidelåsen deles nederst eller øverst eller er lukket
        i enden, slik at den passer sammen med jakker, soveposer, sekker osv.
    zipper_side:
      name: Glidelåsside
      description: Angir på hvilken side hoveddelen av glidelåsen befinner seg når
        soveposen ligger med forsiden opp.
    zipper_slider_material:
      name: Materiale i glidenøkkelen
      description: Angir materialet i glidenøkkelen(den bevegelige delen), noe som
        kan påvirke styrken og korrosjonsbestandigheten.
    zipper_slider_pull_configuration:
      name: Konfigurasjon av glidenøkkel eller glidetrekker
      description: Angir om glidelåsen har en eller to glidenøkler eller -trekkere,
        og om det er glidetrekkere er på en eller begge sider av glidenøkkelen.
    zipper_style:
      name: Glidelåsstil
      description: Angir glidelåsens lengde eller om plagget har glidelås (f.eks.
        uten glidelås, kvart glidelås, halv glidelås, hel glidelås).
    zipper_tape_material:
      name: Materiale i glidelåstape
      description: Angir hovedmaterialet i glidelåsbåndet (stoffsidene) som er sydd
        inn i plagget.
    zipper_teeth_type:
      name: Tanntype i glidelås
      description: Angir hvordan glidelåskjedet eller tennene er utformet (f.eks.
        spiral, støpt plast, metall, usynlig), noe som påvirker fleksibilitet, styrke
        og typiske bruksområder.
