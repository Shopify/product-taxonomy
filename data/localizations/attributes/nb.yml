      description: Angir svovelkonsentrasjonen i fyringsolje til boliger, f.eks. ultralav
        eller høy.
    sunlight:
      name: Sollys
      description: Angir hvor mye sollys planter trenger, for eksempel skygge eller
        full sol.
    sunscreen_filter_type:
      name: Solkremfiltertype
      description: Identifiserer typen UV-filtre brukt i formelen (kjemisk, mineralsk
        eller hybrid).
    supplement_health_focus:
      name: Kosttilskudd helsefokus
      description: Definerer det primære velværeområdet kosttilskuddet er beregnet
        på å støtte.
    support/brace_material:
      name: Støttemateriale
      description: Identifiserer materialet som brukes i støtter eller seler, som
        neopren eller skum.
    support_cushion_features:
      name: Støttepute funksjoner
      description: Fremhever spesielle funksjonelle ekstra eller forbedringer tilbudt
        av puten.
    support_level:
      name: Støttenivå
      description: Oppgir den overordnede stabilitets- eller støttevurderingen som
        tilbys av ortosen for forskjellige skadealvorligheter eller aktivitetsnivåer.
    support_rigidity_level:
      name: Støttestivhetsnivå
      description: Beskriver den generelle fastheten eller strukturelle støtten gitt
        av innleggsålen, fra myk demping til stiv ortopedisk støtte.
    supported_audio_sources:
      name: Støttede lydkilder
      description: Lister opp avspillings- eller inngangskildene enheten kan håndtere.
    supported_countries:
      name: Støttede land
      description: Viser de spesifikke landene eller områdene der SIM-kortet/eSIM-kortet
        eller det forhåndsbetalte abonnementet tilbyr tjenesten.
    supported_display_technologies:
      name: Støttede skjermteknologier
      description: Lister opp typene skjermer eller skjermteknologier kalibratoren
        kan profilere eller måle.
    supported_dvi_link_type:
      name: Støttet DVI-koblingstype
      description: Oppgir om enheten håndterer enkeltkobling, dobbeltkobling eller
        begge DVI-signalstandarder.
    supported_erase_modes:
      name: Støttede slettemoduser
      description: Lister sikkerhetsslettstandardene en dupliserer kan utføre på mål-
        stasjoner.
    supported_input_types:
      name: Støttede innganger typer
      description: Lister opp typene lydinnganger kanalstripen aksepterer (f.eks.
        Mic, Line, Instrument Hi-Z).
    supported_language:
      name: Støttet språk
      description: Angir språkene et programvareprodukt støtter, for eksempel engelsk
        eller spansk.
    supported_media_sources:
      name: Støttede mediekilder
      description: Definerer de fysiske eller digitale medieinngangene som enheten
        kan spille musikk fra.
    supported_raid_levels:
      name: Støttede RAID-nivåer
      description: Lister diskarraykonfigurasjonene den integrerte lagringskontrolleren
        kan utnytte.
    supported_scan_media_type:
      name: Støttet skannemedietype
      description: Lister opp typene originaler skanneren kan håndtere (f.eks. ulike
        filmtyper, reflekterende utskrifter).
    supported_sdi_standards:
      name: Støttede SDI-standarder
      description: Indikerer SDI-datahastigheter/standarder (SD-SDI, HD-SDI, 3G-SDI,
        etc.) enheten støtter for signaloverføring.
    supported_usb_device_types:
      name: Støttede USB-enhetstyper
      description: Spesifiserer typene USB-lagringsenheter duplisereren kan håndtere.
    surface_sides:
      name: Overflatesider
      description: Indikerer om utskriftsplaten kan brukes på én eller begge sider.
    surface_texture:
      name: Overflatetekstur
      description: Beskriver følelsen eller mønsteret til et produkts overflate, vanligvis
        for kondomer, f.eks glatt eller ribbet.
    surfboard_features:
      name: Surfebrettfunksjoner
      description: Spesifiserer unike egenskaper ved et surfebrett, som oppblåsbar
        eller hard topp.
    surveillance_camera_design:
      name: Overvåkningskamera-design
      description: Identifiserer designtypen for sikkerhetskameraer, for eksempel
        termisk eller panoramisk.
    surveillance_camera_mounting_type:
      name: Festetype for overvåkingskamera
      description: Identifiserer hvordan et overvåkingskamera kan installeres, f.eks.
        vegg eller tak.
    surverying_accessories_included:
      name: Kartleggingstilbehør inkludert
      description: Spesifiserer ekstra komponenter pakket med oppmålingsverktøy, for
        eksempel en klemme eller utjevningsstang
    suspender_style:
      name: Bukseselestil
      description: 'Angir stilen til bukseseler, f.eks. X-rygg eller Y-rygg. '
    sustainability:
      name: Bærekraft
      description: Fremhever produkter som støtter bærekraftige praksiser, f.eks.
        fairtrade eller ansvarlige råvarekilder.
    swab_end_configuration:
      name: Vattpinnekonfigurasjon
      description: Indikerer om vattpinnen har én brukbar ende eller to, og om endene
        er forskjellige.
    swab_material:
      name: Vattpinnemateriale
      description: Beskriver stoffet i en renseserviett for musikkinstrumenter, f.eks.
        silke eller filt.
    swimwear_features:
      name: Badetøyfunksjoner
      description: Identifiserer spesielle egenskaper ved badetøy, som hurtigtørkende
        eller UPF solbeskyttelse.
    swing_style:
      name: Svingstil
      description: Klassifiserer basert på svingteknikk, vanligvis for tennisracketer,
        f.eks. lange slag.
    swing_weighting:
      name: Svingvekting
      description: Angir vektfordelingen til et baseball- eller softballballtre, f.eks.
        balansert eller endevektet.
    switch_control_type:
      name: Bryterkontrolltype
      description: Beskriver hvordan en lysbryter styres, for eksempel knapp eller
        sensor.
    switch_management_type:
      name: Svitsjeadministrasjonstype
      description: Klassifiserer nivået eller stilen av administrasjon og konfigurasjon
        svitsjen støtter (f.eks. uadministrert, smart, webadministrert, fullt administrert).
    switch_mechanism:
      name: Brytermekanisme
      description: Identifiserer den interne aktiveringsteknologien til knappen (f.eks.
        mikrobryter, optisk), som påvirker følelse, levetid og respons.
    switch_stem_compatibility:
      name: Bryterstammkompatibilitet
      description: Identifiserer de mekaniske eller andre bryterstammstilene som tastehetten
        eller tastesettet passer til.
    switching_layer:
      name: Svitsjingslag
      description: Indikerer det høyeste OSI-laget der svitsjen naturlig opererer
        (f.eks. lag 2, lag 3, hybrider).
    switching_method:
      name: Byttemetode
      description: Angir metoden som brukes for å bytte mellom ulike innganger i elektroniske
        produkter, f.eks. fjernkontroll.
    synthesis_method:
      name: Syntesemetode
      description: Spesifiserer metoden for lydsyntese i elektroniske instrumenter,
        for eksempel virtuell analog eller modulær.
    system/power_cable_connector_type_end_a:
      name: System/strøm-kabelkontakttype (ende A)
      description: Identifiserer den eksakte kontaktstandarden som finnes på den første
        enden av kabelen (f.eks. IEC C14, NEMA 5-15P, USB-C).
    system/power_cable_connector_type_end_b:
      name: System/strøm-kabelkontakttype (ende B)
      description: Identifiserer den eksakte kontaktstandarden som finnes på den andre
        enden av kabelen (f.eks. IEC C13, DC 5,5 × 2,1 mm, bananplugg).
    system_components_included:
      name: Systemkomponenter inkludert
      description: Lister opp nøkkelmaskinvaredelene som leveres med systemet, slik
        at kunder forstår hva som er eller ikke er del av pakken.
    system_of_measurement:
      name: Målesystem
      description: Identifiserer måleenheten som brukes i et produkt, for eksempel
        imperial eller metrisk.
    system_range:
      name: Systemområde
      description: Angir operasjonsområdet til medisinske alarmsystemer, f.eks. boligbasert
        eller GPS.
    systems_supported:
      name: Støttede systemer
      description: Angir hvilke spillplattformer et produkt er kompatibelt med, f.eks
        Xbox eller Nintendo Switch.
    tab_style:
      name: Fanestil
      description: Angir stilen til merking for permtilbehør, f.eks. forhåndstrykt
        eller nummerert.
    tablet_case_functional_features:
      name: Funksjonelle egenskaper for nettbrettveske
      description: Fremhever viktige funksjonelle tillegg inkludert med nettbrettvesken.
    tabletop_color:
      name: Bordplatefarge
      description: Angir fargen til bordoverflaten, for eksempel svart eller hvit.
    tabletop_material:
      name: Bordplatemateriale
      description: Identifiserer sammensetningen til bordplaten, f.eks. kryssfiner
        eller betong.
    tabletop_pattern:
      name: Bordplatemønster
      description: Angir designet eller trykket på en bordplate, for eksempel jul
        eller helfarget.
    tabletop_shape:
      name: Bordplateform
      description: Beskriver den geometriske formen til en bordplate, f.eks. kvadratisk
        eller nyreformet.
    tableware_material:
      name: Borddekningsmateriale
      description: Angir hva servise består av, for eksempel porselen eller keramikk.
    tack/pushpin_head_design:
      name: Hodeutforming for tegnestift/festeknapp
      description: Beskriver formen til hodet til en tegnestift, som rund eller dekorativ.
    tag_fastening:
      name: Tagfesting
      description: Beskriver metoden som brukes for å feste en merkelapp til bagasjen,
        for eksempel spenner eller løkker.
    talc_content:
      name: Talkinnhold
      description: Oppgir om formuleringen inneholder talk, er talkfri eller bruker
        reduserte talknivåer.
    tampon_absorbency_level:
      name: Tampongabsorberingsnivå
      description: Identifiserer absorberingsevnen til tamponger, for eksempel lette
        eller tunge
    tampon_features:
      name: Tampongfunksjoner
      description: Beskriver de spesifikke egenskapene til tamponger, for eksempel
        komfortabel design eller lekkasjesikker.
    tan_type:
      name: Garvetype
      description: Angir fargeintensiteten og påføringsprosessen for solbruningsprodukter,
        f.eks. mørk eller øyeblikkelig.
    tank_color:
      name: Farge på tank
      description: Identifiserer fargen til et produkt, vanligvis toalettsisterner,
        f.eks svart eller hvit.
    tank_material:
      name: Tankmateriale
      description: Angir hvilket materiale tanken til et produkt består av, vanligvis
        for hageverktøy, f.eks metall eller plast.
    tank_pattern:
      name: Tankmønster
      description: Identifiserer det visuelle motivet på toaletttanker, for eksempel
        solid eller abstrakt
    tape_cartridge_format:
      name: Båndkassettformat
      description: Spesifiserer båndkassettteknologiene (f.eks. LTO, DAT, DLT) som
        stasjonen kan lese eller skrive.
    tape_cartridge_generation:
      name: Båndkassettgenerasjon
      description: Indikerer den spesifikke generasjonen eller versjonen innenfor
        en båndteknologi- familie (oftest LTO-generasjoner) som stasjonen støtter.
    tape_material:
      name: Tapemateriale
      description: Spesifiserer typen materiale som brukes i tapeprodukter, som vinyl
        eller plast.
    tape_speed_supported:
      name: Bånd hastighet støttet
      description: Lister opp avspillings- og opptaksbåndhastigheter (tommer per sekund)
        som spole-til-spole-enheten kan operere med.
    target_audience:
      name: Målgruppe
      description: Angir hvem et produkt passer for, for eksempel barn eller alle
        aldre.
    target_facial_zone:
      name: Målrettet ansiktssone
      description: Spesifiserer ansiktssonen porestripen er designet for å behandle
        (f.eks. nese, hake, T-sone).
    target_gender:
      name: Målkjønn
      description: Angir hvilket kjønn et produkt er beregnet på, for eksempel kvinne,
        mann eller unisex.
    targeted_pests:
      name: Målrettede skadedyr
      description: Angir hvilken type skadedyr et produkt er effektivt mot, f.eks.
        mugg eller alger.
    targeted_skin_concern:
      name: Målrettet hudbekymring
      description: Indikerer den spesifikke lesjonen eller hudtilstanden produktet
        er formulert for å behandle.
    targeted_stains:
      name: Målrettede flekker
      description: Angir hvilke typer flekker et produkt er designet for å behandle,
        for eksempel mat eller gjørme.
    tea_input_type:
      name: Teinngangstype
      description: Angir tilberedningsstilen for te, f.eks. poser eller K-kopper.
    technology_level:
      name: Teknologinivå
      description: Angir hvor komplisert teknologien i et produkt er, f.eks. grunnleggende
        eller avansert.
    teeth_material:
      name: Tannmateriale
      description: Angir hvilket materiale som brukes i tenner, vanligvis for hageverktøy,
        f.eks plast eller metall.
    telephone_cable_interface:
      name: Grensesnitt for telefonledning
      description: Angir hvilken type plugg som brukes i telefonkabler, for eksempel
        RJ-10.
    telephone_cable_second_interface:
      name: Telefonkabelens andre grensesnitt
      description: Definerer kontakttypen på den motsatte enden av kabelen når den
        er forskjellig fra det primære grensesnittet (f.eks. RJ45 til RJ11).
    telephone_cord_style:
      name: Telefonledningstype
      description: Spesifiserer den fysiske formen på telefonledningen, og hjelper
        kunder som trenger en rett, spiralformet eller spesialkabel for erstatningshåndsett
        og veggfester.
    telephone_style:
      name: Telefonstil
      description: Angir designen eller estetikken til en telefon, f.eks. vintage
        eller humor.
    telescope_level:
      name: Teleskopnivå
      description: Indikerer kompleksiteten eller ferdighetsnivået som kreves for
        et teleskop, for eksempel nybegynner eller avansert
    telescope_tracking_system:
      name: Teleskopsporingssystem
      description: Identifiserer type sporingssystem i teleskoper, f.eks. manuelt,
        motorisert
    television_circuit_board_type:
      name: TV-kretskort type
      description: Identifiserer den funksjonelle rollen til kretskortet i et TV-apparat
        (f.eks. hovedkort, strømforsyningskort, T-Con-kort).
    television_shape:
      name: TV-form
      description: Angir den fysiske konturen til TV-skjermen, for eksempel buet eller
        flat.
    television_speaker_position:
      name: TV-høyttalerposisjon
      description: Identifiserer den fysiske plasseringen eller rollen til høyttaleren
        i TV-enheten (f.eks. venstre, høyre, senter, subwoofer).
    television_specialized_features:
      name: TV-spesialiserte funksjoner
      description: Identifiserer unike funksjoner i en TV, som stemmekontroll eller
        innebygd lydplanke.
    temperature:
      name: Temperatur
      description: Spesifiserer varmeinnstillingene for enheter som limpistoler, f.eks.
        dobbel eller høy.
    temperature_control:
      name: Temperaturkontroll
      description: 'Angir om det er mulig å justere produktets temperatur, vanligvis
        for flaskevarmere, f.eks. justerbar eller forhåndsinnstilt. '
    temperature_measurement:
      name: Temperaturmåling
      description: Angir om produktet måler i Fahrenheit eller Celsius.
    template_type:
      name: Maltype
      description: Angir kategorien for dokumentmaler, f.eks. visittkort eller brosjyre.
    temple_color:
      name: Tempelfarge
      description: Angir fargen til stangen eller sideflaten til briller, for eksempel
        rød eller gjennomsiktig.
    temple_pattern:
      name: Tempelmønster
      description: Beskriver utformingen eller motivet på brillestangen, som logo
        eller rutete
    tension:
      name: Spenning
      description: Beskriver spenningsnivået til strenger for musikkinstrumenter,
        f.eks. ekstra sterk.
    tensioning_system:
      name: Strammesystem
      description: Beskriver mekanismen som brukes for å holde skjermoverflaten flat
        og rynkefri.
    tent_setup_style:
      name: Teltoppsettstil
      description: Indikerer hvordan teltet settes opp eller monteres.
    tequila_variety:
      name: Tequila-variant
      description: Angir hvillen type tequila det er, f.eks. gull eller modnet.
    terminal_operation:
      name: Terminaldrift
      description: Spesifiserer driftstypen for kasseapparater, for eksempel manuell
        eller elektronisk.
    termination_method:
      name: Termineringsmetode
      description: Spesifiserer teknikken som brukes for å feste ledere til kontaktens
        kontakter (f.eks. krimping, lodding, IDC).
    terrain:
      name: Terreng
      description: Angir hvilken type underlag et produkt er designet for, vanligvis
        for utendørsutstyr, f.eks. fjell eller åser.
    test_format:
      name: Testformat
      description: Angir typen test for helse- og skjønnhetsprodukter, f.eks. digital
        eller teststrimmel.
    test_method:
      name: Testmetode
      description: Angir prosedyren for å utføre en medisinsk test, f.eks. hjemmetest
        eller laboratorieanalyse.
    test_sample:
      name: Testprøve
      description: Angir hvilken type prøve som kreves for helse- og medisinske tester,
        f.eks. vattpinne eller spytt.
    tetherball_equipment_included:
      name: Smashballustyr inkludert
      description: Angir hvilke viktige gjenstander som er inkludert i et tetherball-sett,
        for eksempel tau eller tetherball.
    tethering_policy:
      name: Retningslinjer for tethering
      description: Klargjør om mobil hotspot eller tethering er tillatt under eSIM-planens
        vilkår.
    text_plate_material:
      name: Tekstplatemateriale
      description: Identifiserer materialet til tekstplaten på stempler, for eksempel
        metall eller gummi.
    textile_craft_machine_features:
      name: Maskinfunksjoner for tekstilkunst
      description: Beskriver spesielle egenskaper ved tekstilhåndverksmaskiner, som
        justerbar spenning eller bærbar.
    textile_craft_project_type:
      name: Prosjekttype for tekstilhåndverk
      description: Identifiserer typen tekstilhåndverksprosjekt, som strikking eller
        quilting.
    texture:
      name: Tekstur
      description: Angir følelsen eller konsistensen til et produkt, for eksempel
        kremaktig, matt eller absorberende.
    texture_level:
      name: Teksturnivå
      description: Indikerer glattheten eller grovheten til et produkt, vanligvis
        for næringsrike matpuréer, f.eks Nivå 1 (pure) eller Nivå 2 (finhakket).
    theme:
      name: Tema
      description: Angir hva som er produktets hovedtema eller -motiv, for eksempel
        sport, romfart eller ferier.
    therapeutic_features:
      name: Terapeutiske funksjoner
      description: Lister opp ekstra terapeutiske modaliteter integrert i nakkeortosen.
    therapeutic_swing_accessories_included:
      name: Terapeutiske huske tilbehør inkludert
      description: Lister opp ekstra maskinvare eller tilbehør levert med husken.
    therapy_mode_supported:
      name: Terapimodus støttet
      description: Lister pusteterapialgoritmene enheten kan operere i, utover standard
        APAP.
    therapy_temperature_type:
      name: Terapitemperaturtype
      description: Indikerer om produktet gir varmeterapi, kuldeterapi, eller begge
        deler.
    thermal_detector_type:
      name: Termisk detektortype
      description: Spesifiserer teknologien som brukes for termisk deteksjon i enheter,
        for eksempel amorft silisium (en Si)-detektor.
    thermal_sensation:
      name: Termisk følelse
      description: Beskriver den oppfattede temperatureffekten på huden etter påføring.
    thermocouple_type:
      name: Type termoelement
      description: Spesifiserer termoelementkategorien i sensorer, f.eks. Type J eller
        Type S.
    thickness_type:
      name: Tykkelsestype
      description: Indikerer tykkelsesnivået til elementer, for eksempel tynn, middels
        eller tykk.
    thinner_application:
      name: Påføring av fortynner
      description: Beskriver typen stoff en tynner brukes til, som maling eller epoksy.
    thread_direction:
      name: Gjengeretning
      description: Beskriver gjengingen til verktøy og lignende, f.eks. venstregjenget
        eller høyregjenget.
    threaded_rod_size:
      name: Gjengestenger
      description: Angir diameteren til en gjenget stang, f.eks. M10 eller M20.
    throw_pillow_shape:
      name: Form på kastepute
      description: Identifiserer formen til dekorative puter, for eksempel rør eller
        rektangulær.
    thumb_grip_profile:
      name: Tommelgrepsprofil
      description: Beskriver overflate- eller formstilen til tommelgrepets topp (f.eks.
        konkav, kuppelformet), som påvirker grep- og kontrollfølelse.
    ticket_additional_features:
      name: Tilleggsfunksjoner for billett
      description: Fremhever ekstra fordeler som tilbys med billetter, for eksempel
        møte og hilse eller aktiviteter etter arrangementet.
    ticket_class:
      name: Billettklasse
      description: Angir tjenestenivået eller seteklassen som følger med billetten.
    ticket_type:
      name: Billetttype
      description: Identifiserer kategorien for arrangementsbilletter, som generell
        adgang eller reserverte sitteplasser.
    tile_design:
      name: Flisdesign
      description: Beskriver mønsteret eller stilen til en flis, for eksempel geometrisk
        eller fiskebein.
    tile_game_type:
      name: Feltspilltype
      description: Identifiserer den spesifikke typen brikkespill, for eksempel dominobrikker
        eller mahjong
    tile_installation_method:
      name: Fliseinstallasjonsmetode
      description: Beskriver hvordan et produkt er installert, vanligvis for tak-
        eller veggfliser, f.eks innlagt montering.
    tile_look:
      name: Flisutseende
      description: Beskriver utseendet eller stilen til en flis, for eksempel marmorert
        eller 3D.
    tile_material:
      name: Flismateriale
      description: Identifiserer sammensetningen til fliser, for eksempel keramikk
        eller stein.
    tile_texture:
      name: Flistekstur
      description: Beskriver overflatefølelsen til en flis, for eksempel glatt eller
        teksturert.
    time_period:
      name: Tidsperiode
      description: Spesifiserer tidsrperioden for akademiske artikler eller studier,
        for eksempel middelalderen eller den industrielle revolusjon.
    time_signatures:
      name: Tidssignaturer
      description: Definerer taktstrukturen, vanligvis for metronomer, f.eks 4/4 eller
        3/4.
    time_weighting:
      name: Tidsvekting
      description: Brukes til å angi hvor raskt en lydmåler reagerer på lydsvingninger,
        f.eks. sakte eller raskt.
    timepiece_features:
      name: Urfunksjoner
      description: Beskriver spesielle egenskaper ved et ur, som justerbar varighet
        eller opplyst.
    timer_design:
      name: Tidtakerdesign
      description: Beskriver typen tidtaker som brukes i mørkeromsutstyr, for eksempel
        digital eller analog.
    timer_features:
