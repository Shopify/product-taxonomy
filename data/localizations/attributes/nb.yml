    action_type:
      name: Handlingstype
      description: Beskriver våpenets avfyrings- eller spenningsmekanisme (f.eks.
        sluttstykke, bruddstykke, hevarmmekanisme).
    actuation_mechanism:
      name: Aktiveringsmekanisme
      description: 'Angir hvordan spaken aktiverer bremsesystemet: rent mekanisk kabeldrevet,
        helhydraulisk, kabeldrevet hydraulisk eller elektronisk/trådløs.'
    actuation_method:
      name: Aktueringsmetode
      description: Hvordan slukningssystemet aktiveres eller utlades.
    adapter_orientation:
      name: Adapterretning
      description: Angir vinkelen eller konfigurasjonen til en sykkelventiladapter,
        som påvirker pumpens tilgjengelighet (f.eks. rett, 90°).
    additive_application_stage:
      name: Additiv app-fase
      description: Angir når i prosessen produktet er ment å bli brukt.
    adhesive_backing:
      name: Selvklebende bakside
      description: Om den utskrivbare silken har en selvklebende bakside for avrivbar
        applikasjon.
    adhesive_formulation:
      name: Limformulering
      description: Angir den kjemiske basen eller formuleringen av limet, for eksempel
        cyanoakrylat eller epoksy.
    adhesive_sides:
      name: Selvklebende sider
      description: Angir om det smeltende limet er på én side eller begge sider av
        tapen.
    adjunct_grain_processing_form:
      name: Tilleggsform for kornforedling
      description: Angir den fysiske/bearbeidede formen til det tilsatte kornet slik
        det selges til brygging (f.eks. flaket, torrifisert, maltet, rå).
    adjustability_type:
      name: Justeringstype
      description: Spesifiserer hva slags justering støtdemperen støtter, om noen.
    adjustable_cup_mutes:
      name: Justerbare koppdempere
      description: Angir om koppen er justerbar/avtagbar og justeringsstilen.
    adjustable_zones:
      name: Justerbare soner
      description: Identifiserer hvilke deler av basen som kan justeres uavhengig.
    adjustment_type:
      name: Justeringstype
      description: Angir om regulatoren er justerbar og hvordan justeringen utføres.
    administration_method:
      name: Administrasjonsmetode
      description: Angir hvordan ormekuren leveres til hesten (f.eks. oralt eller
        ved injeksjon), noe som hjelper kunden med å følge veterinærens anvisninger
        og velge en håndterbar applikasjonsmetode.
    advice_card_prompt_type:
      name: Råd kort kommandotype
      description: Type kommando trykt på kortet (eller mangel på kommando).
    aeration_method:
      name: Luftemetode
      description: Beskriver typen lufting som gis eller støttes av beholderen, og
        som sikrer tilstrekkelig oksygen for levende agn.
    aero_package_components:
      name: Aero-pakkekomponenter
      description: Angir hvilke viktige aerodynamiske komponenter som er installert
        på kjøretøyet (velg alle som gjelder).
    aerodynamic_elements_included:
      name: Aerodynamiske elementer inkludert
      description: Angir hvilke aerodynamiske komponenter som er inkludert i formelbilen
        (velg alle som gjelder, hvis det støttes).
    aftertouch_support:
      name: Aftertouch-støtte
      description: Om kontrollør/behandlingsansvarlig støtte aftertouch (kanal eller
        polyfon) på taster/pads.
    agave_content_classification:
      name: Agave Stoff-klassifisering
      description: Angir om tequilaen er produsert av 100 % blå Weber-agave eller
        om det er en blanding som inneholder minimum 51 % agavesukker.
    aida_cloth_count:
      name: Aida-stofftelling
      description: Angir stoffantall i Aida-stoff (antall ruter/sting per tomme),
        som bestemmer stingstørrelsen og designskalaen.
    aida_cloth_pre_cut_format:
      name: Aida-stoff forhåndskåret format
      description: Angir om Aida-duken selges som et forhåndskuttet stykke, et kontinuerlig
        kuttet fra bolt eller på rull.
    air_bag_material:
      name: Airbag-materiale
      description: Spesifiserer materialet i kollisjonsputen/reservoaren som brukes
        med den irske krigrøret.
    air_bed_internal_construction:
      name: Innvendig konstruksjon av luftmadrass
      description: Beskriver den interne støttestrukturen eller teknologien som brukes
        inne i luftmadrassen for komfort og stabilitet.
    air_dry_clay_color_form:
      name: Lufttørk leirefargeform
      description: Om leiren selges ferdigfarget, hvit/nøytral for maling, eller som
        en blanding/assortering.
    air_hockey_items_included:
      name: Airhockeyutstyr inkludert
      description: Lister opp de spesifikke tilbehørsdelene som finnes i et sett,
        slik at Kunden vet nøyaktig hva de mottar (f.eks. 2 puffere, 4 pucker, 2 filtputer).
    air_intake_temperature_sensor_mounting_style:
      name: Monteringsstil for luftinntakstemperatursensor
      description: Den fysiske monteringsstilen til IAT-sensoren i inntakssystemet.
    air_integration_capability:
      name: Luftintegrasjon funksjonalitet
      description: Angir om og hvordan dykkecomputeren støtter trådløse tanktrykksendere.
    air_mattress_valve_type:
      name: Luftmadrassventiltype
      description: Spesifiserer ventiltypen som et tilbehør passer til eller inneholder,
        og sikrer kompatibilitet mellom pumper, ventiler og reservedeler.
    air_water_rocket_kit_items_included:
      name: Luft- og vannrakettsett inkludert
      description: Viktige komponenter følger med rakettsettet (utskyter, pumpe, finner,
        påfyllingsdeler).
    air_water_rocket_launch_method:
      name: Launch for luft- og vannrakett
      description: Hvordan raketten trykksettes/Launch (brukerinteraksjon og utstyrsstil).
    airbag_position:
      name: Kollisjonsputeposisjon
      description: Angir den tiltenkte sikringsposisjonen/sonen der airbagdelen støttes.
    aircraft_ads_b_capability:
      name: Aircraft annonse-B funksjonalitet
      description: Angir om luftfartøyet er utstyrt for samsvar med annonse-B Out.
    aircraft_airframe_material:
      name: Flyskrogsmateriale
      description: Primærmateriale(r) som brukes i konstruksjonen av flyskroget.
    aircraft_cabin_configuration:
      name: Konfigurasjon av flykabin
      description: Angir flyets layout (f.eks. konferansegruppe, divan, firesonekabin).
    aircraft_documentation_included:
      name: Flydokumentasjon inkludert
      description: Viser hvilke dokumenter som følger med delen (f.eks. 8130-3).
    aircraft_galley_configuration:
      name: Konfigurasjon av flykjøkken
      description: Tilstedeværelse og type bysse/cateringfasiliteter i lugaren.
    aircraft_installation_location:
      name: Flyinstallasjon lokalisasjon | sted
      description: Hvor på flyet delen eller tilbehøret er installert eller brukt.
    aircraft_internet_connection:
      name: Internettforbindelse for fly
      description: Indikerer tilstedeværelse/type internettforbindelse i kabinen.
    aircraft_landing_gear_type:
      name: Type landingsunderstell for fly
      description: Angir konfigurasjonen av landingsunderstellet til autogyroen.
    aircraft_lavatory_configuration:
      name: Konfigurasjon av flytoaletter
      description: Type introduksjon toalettkonfigurasjon.
    aircraft_maintenance_program_enrollment:
      name: Påmelding til flyvedlikeholdsprogram
      description: Angir om luftfartøyet er registrert i et vedlikeholdsprogram for
        motor og/eller flyskrog, og i så fall hvilken dekningstype som gjelder (motor,
        flyskrog eller begge deler).
    aircraft_operational_certification:
      name: Operasjonell sertifisering av fly
      description: Spesifiserer det regulatoriske eller operative sertifiseringsgrunnlaget
        som luftfartøyet opereres under (jurisdiksjonsavhengig, f.eks. FAA del 91/135/121,
        EASA AOC).
    aircraft_protective_gear_certification:
      name: Sertifisering av beskyttelsesutstyr for fly
      description: Spesifiserer luftfarts-/regulatoriske eller industristandarder
        som beskyttelsesutstyret er sertifisert for å oppfylle.
    aircraft_system_application:
      name: Flysystemapp
      description: Identifiserer hvilket flysystem eller område delen/tilbehøret tilhører
        (brukes til å bla gjennom og filtrere på tvers av ulike flydeler).
    airflow_resistance_level:
      name: Luftstrømsmotstandsnivå
      description: Angir hvor begrensende demperen føles med tanke på mottrykk/luftmotstand.
    airship_envelope_material:
      name: Luftskipets konvoluttmateriale
      description: Primærmaterialet i luftskipets skall (hud).
    airsoft_part_type:
      name: Airsoft-deltype
      description: Identifiserer den funksjonelle komponenten eller tilbehørstypen
        for luftpistoler (f.eks. magasin, løp, håndbeskytter).
    airworthiness_approval_basis:
      name: Grunnlag for godkjenning av luftdyktighet
      description: Spesifiserer godkjennings-/sertifiseringsgrunnlaget for delen der
        det er aktuelt (f.eks. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Justerbart alarmvolum
      description: Angir om og hvordan alarmens lydstyrke kan justeres av brukeren.
    alcohol_ink_finish_effect:
      name: Alkoholblekk-finisheffekt
      description: Beskriver den visuelle effekten/finishen som produseres av alkoholblekkformuleringen
        (mer enn bare farge), for eksempel metallisk eller perlemorsaktig.
    alignment_aid_style:
      name: Stil for justeringshjelpemiddel
      description: Beskriver typen justeringsguider som er trykt eller integrert på
        matteoverflaten (f.eks. rettlinjede, avstandsmarkører).
    alternator_cooling_type:
      name: Generatorkjølingstype
      description: Beskriver hvordan dynamoen kjøles ned og ventileres.
    alternator_marine_ignition_protection_rating:
      name: Beskyttelsesgrad for marine tenningsgeneratorer
      description: Angir om dynamoen er tenningsbeskyttet for marine motorrom (f.eks.
        i samsvar med SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Konfigurasjon av dynamomontering
      description: Angir den fysiske monteringskonfigurasjonen som brukes til å feste
        dynamoen til en motorbrakett.
    alternator_pulley_type:
      name: Generatorhjultype
      description: Angir remskive-/clutch-designet på dynamoen (eller indikerer at
        det ikke er noen remskive inkludert).
    alternator_regulator_type:
      name: Dynamoregulatortype
      description: Angir om spenningsregulatoren er intern i dynamoen eller ekstern,
        og om den er OEM-styrt (datamaskin-/PCM-styrt).
    alternator_terminal_connection_type:
      name: Terminal forbindelsestype
      description: Primær elektrisk tilkoblingstype for dynamoutgang/exciterterminal
        for å sikre kompatibilitet med ledningsnettet.
    altitude_suitability:
      name: Høydeegnethet
      description: Indikerer om ballen er konstruert for spesifikk høyde, som påvirker
        hastighet og sprett.
    ambulance_stretcher_mount_type:
      name: Bårefeste for ambulanse
      description: Angir typen bårelasting/monteringssystem som støttes av ambulansen.
    american_football_safety_certification:
      name: Sikkerhetssertifisering for amerikansk fotball
      description: Angir de sikkerhetssertifiseringene eller standardene som er spesifikke
        for amerikansk fotball og som produktet oppfyller.
    amplifier_tube_function:
      name: Forsterkerrørets funksjon
      description: Spesifiserer rørets funksjonelle rolle i en instrumentforsterkerkrets
        (f.eks. forforsterker kontra effekt).
    analog_synthesizer_cv_gate_i_o:
      name: Analog synthesizer CV/Gate I/O
      description: Angir hvilke typer styrespenning og gateforbindelse som støttes
        for integrering med Modular/analogt utstyr.
    analog_synthesizer_keybed_configuration:
      name: Konfigurasjon av analog synthesizer-tastbord
      description: Beskriver om synthen har en innebygd tangentseng, og i så fall
        antall tangenter.
    anchor_configuration:
      name: Ankerkonfigurasjon
      description: Angir om opphengssystemet bruker et enkelt sentralisert forankringspunkt
        eller flere uavhengige forankringspunkter, noe som påvirker øvelsesvariasjonen
        og motsetningens kompleksitet.
    animal_raising_method:
      name: Dyreholdsmetode
      description: Beskriver jordbruks- eller dyreholdspraksis som brukes for kildedyret.
    animal_species:
      name: Dyrearter
      description: Angir dyret eller skapningen som er representert av kosedyret (f.eks.
        bjørn, kanin, dinosaur).
    animal_trap_jaw_style:
      name: Dyrefelle kjevestil
      description: Konfigurasjon av fellekjeftene, påvirkende holdekraft og dyrevelferd.
    animal_trap_type:
      name: Type dyrefelle
      description: Klassifiserer fellens mekaniske stil/design, slik at kundene raskt
        kan finne nøyaktig den fangstmetoden de trenger eller som forskriftene tillater.
    ankle_collar_style:
      name: Ankelkrage-stil
      description: Beskriver stilen eller konstruksjonen av en skos ankelkrage, for
        eksempel lavt snitt, mellomstort snitt, høyt snitt, sokkekrage eller lisseløs,
        som påvirker støtte, passform og estetikk.
    ankle_guard_protection_level:
      name: Beskyttelsesnivå for ankelbeskyttere
      description: Vurderer den totale mengden påvirkning som ankelbeskytteren gir.
    ankle_strap_padding_type:
      name: Ankelstropp utfyllingstype
      description: Beskriver støtdempingsmaterialet eller fyllingsmetoden som brukes
        inni stroppen som påvirker komforten.
    ankle_strap_type:
      name: Type ankelstropp
      description: Klassifiserer konstruksjonen eller designet til en ankelstropp
        for snowboardbinding.
    ant_farm_habitat_medium_type:
      name: Maurfarm Habitat medium type
      description: Angir det primære tunnelerings-/observasjonsmediet som leveres
        eller kreves av maurfarmen.
    ant_farm_kit_contents:
      name: Maurfarmsett innhold
      description: Identifiserer hvilke komponenter som er inkludert i maurfarmsettet
        (f.eks. habitatbeholder , sand/gel, maurkupong, fôringsverktøy).
    ant_farm_lighting_type:
      name: Belysningstype for maurfarm
      description: Angir den innebygde belysnings-/belysningstypen (hvis noen) som
        brukes til observasjon.
    antenna_fit_type:
      name: Type antennepassform
      description: Hvilken antenneformfaktor antennekulen er ment å passe til.
    anti_caking_agent:
      name: Antiklumpemiddel
      description: Angir typen antiklumpemiddel som er tilsatt for å forhindre klumping,
        informasjon som er viktig for allergihensyn og oppskriftspresisjon.
    anti_g_suit_bladder_material:
      name: Anti-G-draktblæremateriale
      description: Materiale brukt til den/de indre oppblåsbare blæren(e) inne i anti-G-drakten;
        oppgi alle som gjelder hvis flere materialer brukes.
    anti_g_suit_connector_type:
      name: Anti-G-drakt med koblingstype
      description: Spesifiserer stilen/standarden på luft-/trykkslangekoblingen som
        brukes til å koble til flyet eller regulatoren.
    anti_g_suit_inflation_method:
      name: Anti-G-drakt inflasjonsmetode
      description: Indikerer hvordan draktens blærer er trykksatt for å gi G-beskyttelse.
    anti_g_suit_size_system:
      name: Anti-G-drakt størrelsessystem
      description: Størrelsesstandard som brukes til å spesifisere draktens størrelse/passformsystem.
    anti_reverse_type:
      name: Anti-revers type
      description: Angir typen anti-revers-mekanisme som brukes, som påvirkningskrok-innstillinger
        og bakspill.
    anti_theft_feature:
      name: Tyverisikringsfunksjon
      description: Angir om festet/holderen har tyverisikring, for eksempel låsbare
        fester eller en barnesikret design.
    antique_gun_ignition_system:
      name: Tenningssystem for antikke våpen
      description: Angir det historiske avfyrings-/tenningssystemet som brukes av
        det antikke skytevåpenet.
    apple_variety:
      name: Eplesort
      description: Angir kultivar eller variant av eple (f.eks. Gala, Fuji, Granny
        Smith), og hjelper kunder med å velge basert på smak, tekstur og kulinarisk
        bruk.
    applique_edge_finish:
      name: Applikasjonskantfinish
      description: Beskriver hvordan kantene er ferdigbehandlet, påvirkning og motstand
        mot rakning.
    arbor_type:
      name: Arbortype
      description: Klassifiserer snellen etter spolehusdesign, som påvirker snørets
        innhentingshastighet, bakkapasitet og snøreminne.
    archery_accessory_type:
      name: Type bueskytingstilbehør
      description: Angir typen tilbehør beregnet for bueskyteverktøy slik at kunden
        raskt kan filtrere produkter.
    archery_part_type:
      name: Type del til bueskyting
      description: Identifiserer den spesifikke maskinvaren eller reservedelen som
        selges (f.eks. stag, lem, buestreng), noe som muliggjør presis filtrering
        uten å eksplodere kategoritreet.
    archery_range_accessory_type:
      name: Type tilbehør til bueskytebane
      description: Klassifiserer den spesifikke typen tilbehør som brukes på en bueskytebane,
        slik at kunder raskt kan filtrere etter nøyaktig det utvalget de trenger.
    archery_target_features:
      name: Funksjoner for bueskytingsmål
      description: Viser spesialiserte ytelses- eller bekvemmelighetsfunksjoner som
        ikke dekkes av andre kjennemerker (f.eks. selvreparerende skum, bærereferanse).
    archery_tool_type:
      name: Type bueskytingsverktøy
      description: Klassifiserer den spesifikke typen bueskyteverktøy eller utstyr.
    armband_features:
      name: Armbåndets funksjoner
      description: Lister opp spesielle funksjonelle eller visuelle funksjoner som
        forbedrer armbåndet.
    armguard_style:
      name: Armbeskytterstil
      description: Definerer konstruksjonsstilen eller formfaktoren til armbeskytteren,
        og gir innsikt i designdekning og tradisjonelt kontra moderne utseende.
    armor_protection_type:
      name: Type rustningsbeskyttelse
      description: Type beskyttelse gitt av kjøretøyets pansersystem.
    armrest_adjustability:
      name: Justerbarhet av armlenet
      description: Definerer dimensjonsjusterbarheten og konfigurasjonen av stolens
        armlener (f.eks. fast, 2D, 3D, oppfellbar).
    armrest_type:
      name: Armlentype
      description: Beskriver tilstedeværelsen og justerbarheten av armlener på stolen
        (f.eks. ingen armlener, faste, justerbare, avtakbare).
    arrow_bolt_point_type:
      name: Pil-/boltspisstype
      description: Definerer stilen på spissen eller spissen som er installert på
        en pil eller bolt.
    arrow_component_type:
      name: Pilkomponenttype
      description: Klassifiserer den spesifikke delen eller tilbehøret for en pil
        (innsats, vikling, foring, lim osv.) slik at kunder kan filtrere vare uten
        å trenge dusinvis av ekstra underkategorier.
    arrow_containment_level:
      name: Pilinneslutningsnivå
      description: Beskriver om REST inneholder pilen helt, delvis inneholder den
        eller ikke inneholder den.
    arrow_fletching_orientation:
      name: Pilfletching-orientering
      description: Angir vinge- eller forskyvningsorienteringen til fletchingen (f.eks.
        venstrevinge, høyrevinge, spiralformet) som bestemmer pilens rotasjonsretning.
    arrow_nock_groove_size:
      name: Størrelse på pilnockspor
      description: Spesifiserer størrelsesklassifiseringen av nockens styrkespor/hals,
        og bestemmer kompatibilitet med forskjellige buestrengdiametre.
    arrow_nock_type:
      name: Pilnakketype
      description: Design/stil på pilnappen som er i kontakt med buestrengen.
    arrow_rest_style:
      name: Pil REST stil
      description: Angir den funksjonelle stilen/mekanismen til pilen REST (f.eks.
        Drop-away, blad, whisker-kjeks). Stil bestemmer hvordan REST støtter, inneholder
        og slipper pilen, og er en primær måte kunder differensierer produkter på.
    arrow_shaft_compatibility:
      name: Kompatibilitet med pilskaft
      description: Indikerer pilskaftet/-bøssingen som den opplyste hakken passer
        til (f.eks. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Kunst-/Craft tuppstil
      description: Beskriver formen/profilen til arbeidsspissen (f.eks. spiss vs.
        avrundet kule) for å indikere hva slags pregemerker den produserer.
    art_ink_lightfastness_rating:
      name: Lysfasthetsvurdering for kunstblekk
      description: Indikerer blekkets motstand mot falming når det utsettes for lys,
        vanligvis uttrykt via standardvurderinger.
    art_ink_opacity:
      name: Kunstblekkopasitet
      description: Angir dekningsnivået til blekket etter påføring.
    art_security_rating:
      name: ART-sikkerhetsvurdering
      description: Angir den nederlandske ART-stjernevurderingen (1–5 stjerner) som
        låsen mottar.
    artichoke_cut:
      name: Artisjokkskåret
      description: Angir hvilken del eller preparat av artisjokken som tilbys (f.eks.
        hel, hjerte, bunn), slik at kunder forstår utbytte og tiltenkt kulinarisk
        anvendelse.
    artichoke_variety:
      name: Artisjokkvariant
      description: Spesifiserer kultivaren eller botaniske varianten av artisjokken
        for å hjelpe kunden med å skille mellom størrelse, farger, smaker og kulinariske
        bruksområder.
    articulation_features:
      name: Artikulasjonsfunksjoner
      description: Angir om dinosaurmodellen har bevegelige deler (bevegelig kjeve,
        lemmer, hale) og generell bevegelighet.
    artificial_bait_form:
      name: Kunstig agnform
      description: Indikerer den fysiske formen eller presentasjonsstilen til agnet
        eller åtet.
    asa_mounting_type:
      name: ASA-monteringstype
      description: Indikerer typen ASA-grensesnitt (luftkildeadapter) eller monteringsstandarden
        som Drop forward bruker (f.eks. svalehale, skinne, direktemontering).
    ascender_descender_type:
      name: Oppstigende/nedstigende type
      description: Klassifiserer klatrestilen oppover eller nedover for mer presis
        filtrering.
    aspiration_type:
      name: Aspirasjonstype
      description: Angir hvordan motoren aspireres/boostes.
    assembly_state:
      name: Forsamlingstilstand
      description: Angir om skapet sendes ferdigmontert, forhåndsmontert eller i en
        annen form.
    assistance_mechanism:
      name: Bistandsmekanisme
      description: Spesifiserer eventuelle innebygde assistanse- eller motstandssystemer
        som krafttårnet tilbyr for pull-ups, dips eller andre øvelser.
    atemoya_cultivar:
      name: Atemoya-kultivar
      description: Spesifiserer den navngitte kultivaren/varianten av atemoya-frukten,
        slik at kunden kan velge frukt med den smaken, størrelsen eller frøegenskapene
        de foretrekker.
    athletic_cup_size:
      name: Atletisk koppstørrelse
      description: Indikerer produsentens angitte størrelse på beskyttelseskoppen
        for å sikre riktig passform for utøveren.
    attachment_position:
      name: Festeposisjon
      description: Angir hvor på salen eller rytteren vesken er designet for å festes.
    attractant_scent_profile:
      name: Tiltrekkende duftprofil
      description: Beskriver den spesifikke lukten eller smaken som brukes for å tiltrekke
        seg dyreliv eller maskere menneskelig duft.
    atv_utv_intended_use:
      name: Tiltenkt bruk av ATV/UTV
      description: Primær tiltenkt bruk/stil for ATV/UTV.
    audio_channel_configuration:
      name: Lydkanalkonfigurasjon
      description: Antall diskrete lydkanaler som equalizer/DSP støtter (f.eks. 2-kanals
        stereo, 4-kanals foran/bak, 6-kanals).
    audio_inputs:
      name: Lyd-inputer
      description: Angir hvilke typer lydinngangsforbindelse som er tilgjengelige
        for sampling/opptak (f.eks. 1/4 in line, XLR, 3,5 mm, mikrofonforforsterker,
        phono).
    audio_output:
      name: Lyd-output
      description: Angir om leken avgir lyd og hvordan lyd leveres.
    audio_outputs:
      name: Lyd-outputer
      description: Angir tilgjengelig lydutgangsforbindelse, inkludert hovedutganger
        og eventuelle tilordnelige/aux-utganger.
    audio_playback_source:
      name: Kilde for lydavspilling
      description: Primære mediekilder karaokesettet kan spille musikk fra.
    autograph_authentication:
      name: Autografgodkjenning
      description: Angir autentiseringsstatus/-type for en autograf på kortet.
    autograph_format:
      name: Autograf-format
      description: Beskriver om signaturen er en original håndsignert autograf, stemplet/trykt
        faksimile eller en inskripsjon/tilleggsprogram.
    autogyro_cockpit_enclosure:
      name: Autogyro cockpitkabinett
      description: Angir om cockpiten er åpen eller lukket.
    available_firing_modes:
      name: Tilgjengelig modus
      description: Viser den valgbare modus som markøren støtter rett ut av esken.
    avocado_variety:
      name: Avokado-variant
      description: Spesifiserer kultivaren eller varianten av avokadoen, noe som hjelper
        kunden med å skille mellom forskjeller i smak, tekstur, størrelse og olje.
    award_customization_included:
      name: Award justere (personlig) inkludert
      description: Angir hvilken personlig tilpasning/justere (personlig) som følger
        med prisen kjøp.
    award_material:
      name: Prismateriale
      description: Identifiserer hovedmaterialet(ene) i utmerkelsesgodset (trofé,
        plakett, medalje, nål, båndmaskevare).
    award_mounting_display_type:
      name: Prismontering/-visningstype
      description: Spesifiserer hvordan prisen er ment å vises eller monteres (vegg
