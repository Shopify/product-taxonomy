    access_mechanism:
      name: Tilgangsmekanisme
      description: Beskriver hvordan brukeren når soveplattformen Loft .
    accessibility_features:
      name: Tilgjengelighetsfunksjoner
      description: Spesifiserer tilgjengelighetsrelatert utstyr og konfigurasjoner
