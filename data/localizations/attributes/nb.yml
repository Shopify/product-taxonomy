    canvas_mounting_format:
      name: Montering/format på lerret
      description: Fysisk format/monteringsstil på lerretsproduktet.
    canvas_stretcher_assembly_type:
      name: Monteringstype for lerretsbåre
      description: Om båren selges samlet som ramme eller som stenger/sett som krever
        montering.
    canvas_stretcher_corner_joint_type:
      name: Hjørnefugetype for lerretsbåre
      description: Hvordan hjørnene på bårene er skjøtet/konstruert (f.eks. tapp-
        og mutterforbindelse, fingerskjøt, stiftet, kilefestet).
    canvas_surface_tone:
      name: Tone på lerretsoverflaten
      description: Grunntone/farge på den grunnede lerretsoverflaten (bakken), ikke
        noe trykt design eller mønster (f.eks. hvit, svart, tonet).
    canvas_weave_type:
      name: Vevetype for lerret
      description: Beskriver vevekonstruksjonen på lerretsoverflaten, som påvirker
        tekstur og malingsekspedering.
    cap_attachment_style:
      name: Stil for hettefesting
      description: Spesifiserer konstruksjonen/festestilen til en saksofonmunnstykkehette,
        noe som kan påvirke beskyttelse og eske-tilpasning.
    cap_construction:
      name: Konstruksjon av hette
      description: Spesifiserer hvordan parykkhetten er konstruert (f.eks. blondefront,
        helblonde, håndknyttet), noe som påvirker realisme, komfort og stylingsallsidighet.
    cap_crown_structure:
      name: Kronestrukturen til hetten
      description: Angir om hattens krone er strukturert (avstivnet) eller ustrukturert
        (myk).
    cap_fit_type:
      name: Passform-type for hette
      description: Definerer hvordan luen passer eller justeres på brukerens hode
        (f.eks. tilpasset kontra justerbar).
    cap_seal_type:
      name: Type lokkforsegling
      description: Spesifiserer tetningskomponenten som brukes for å forhindre oljelekkasje
        og damputslipp (f.eks. O-ring, pakning).
    cap_size:
      name: Lokkstørrelse
      description: Standardstørrelse på etiketter som angir total hodestørrelse som
        passer til parykkhetten.
    cap_type:
      name: Hettetype
      description: Type lokk/lukkegrensesnitt som brukes på overløpstanken.
    caper_size_grade:
      name: Caper størrelsesgrad
      description: Klassifiserer kapers etter bransjestandardnavn som tilsvarer knoppdiameter.
    capo_clamping_mechanism:
      name: Klem- og låsemekanisme for capo
      description: Angir klemme-/aktiveringsstilen som brukes til å påføre trykk på
        styrken (hvordan capoen betjenes).
    capo_finish:
      name: Capo-finish
      description: Overflatefinish på capokroppen (visuelt/følelsesmessig), uavhengig
        av farge (f.eks. matt kontra blank).
    capo_fit_type:
      name: Capo-tilpasningstype
      description: Angir halsprofilen capoen er designet for å passe til (inkludert
        radius/flathet), noe som påvirker summingsfri klemming og intonasjon.
    capo_pad_material:
      name: Materiale for capo-pute
      description: Angir materialet til kontaktputen som berører styrken/gripebrettet
        (påvirker grep, stemmingsstabilitet og potensiell finish-markering).
    capo_tension_mechanism:
      name: Capo-spenningsmekanisme
      description: Angir hvordan trykk/spenning påføres og justeres på styrken for
        den glidende capoen.
    capture_method:
      name: Opptaksmetode
      description: Angir om fellen er ment for levende fangst eller dødelig avliving.
    car_ev_conversion_kit_motor_type:
      name: Bil EV veksling/veksling sett motor type
      description: Spesifiserer trekkmotorteknologien som er inkludert eller kreves
        av konverterings-/vekslingssettet (f.eks. AC-induksjon vs. permanentmagnet).
    car_playset_items_included:
      name: Bilsett inkludert
      description: Viser hovedkomponentene som følger med bilsettet utover basisstrukturen
        (f.eks. biler, figurer, skilt).
    car_shampoo_application_method:
      name: Metode for bilsjampo-app
      description: Hvordan sjampoen er ment å påføres under vask.
    car_wash_solution_form:
      name: Format for bilvask-løsning
      description: Angir den fysiske formen til bilvaskløsningen (f.eks. væske, skum,
        våtservietter).
    car_wash_solution_scent:
      name: Duft av bilvaskløsning
      description: Angir duften/duften til bilvaskløsningen (hvis parfymert).
    carbonated_water_variety:
      name: Kullsyreholdig vannvariant
      description: Klassifiserer kullsyreholdig vann basert på vanlige merkede varianter
        og formulering (f.eks. tonic, selters, funksjonelt kullsyrevann).
    carbonation:
      name: Kullsyre
      description: Beskriver nivået eller typen av kullsyre i drikken (f.eks. uten
        kullsyre, lett kullsyre, kullsyre, nitro).
    carburetor_barrel_count:
      name: Antall forgasserfat
      description: Angir antall gassboringer/-sylindere i forgasseren.
    carburetor_choke_type:
      name: Forgasserdrosseltype
      description: Indikerer hvilken choke-aktiveringsstil som brukes av forgasseren.
    carburetor_mounting_flange_type:
      name: Forgassermonteringsflenstype
      description: Spesifiserer forgassers monteringsgrensesnitt for å sikre passform
        med innsug/manifold (f.eks. tapp kontra flens-/boltmønstre).
    card_binder_page_type:
      name: Sidetype for kortperm
      description: 'For permer/porteføljer: stilen til Sider pleide å butikk kort.'
    card_box_holder_type:
      name: Kortboks/holdertype
      description: Angir produktets funksjonelle formfaktor for innsamling eller oppbevaring
        av kort på hendelser (f.eks. eske, postkasseeske, kurv, stativ).
    card_game_accessory_features:
      name: Funksjoner i kortspilltilbehør
      description: Merkbare funksjonelle egenskaper ved kortspilltilbehør.
    card_lot_type:
      name: Kortlottype
      description: Angir om produktet er et enkeltkort eller et parti/sortiment med
        flere kort.
    card_sleeve_size_format_compatibility:
      name: Kortsleevestørrelse/formatkompatibilitet
      description: Spesifiserer kortstørrelsen(e) som ermene/sidene/dekkboksene er
        designet for å passe til.
    carding_surface_pin_material:
      name: Karde overflate pinnet materiale
      description: Materialet i pinnen/tennene som brukes til å erte og åpne fiberen.
    care_durability:
      name: Pleiens holdbarhet
      description: Indikerer forventet holdbarhet for etikett ved vask/varme etter
        ca.
    care_label_attachment_type:
      name: Type etikett vedleggstype
      description: Hvordan etikett er utformet for å brukes på varen (f.eks. sy i,
        stryke på/overføringer med varme, lim).
    care_label_format:
      name: Format for etikett
      description: Det fysiske/trykte formatet til etikett.
    care_label_symbol_system:
      name: Symbolsystem for etikett
      description: Standardene/symbolsettet som brukes på etiketten (f.eks. ISO-pleiesymboler,
        ASTM/US-symboler).
    cargo_area_configuration:
      name: Konfigurasjon av bagasjerom
      description: Angir den strukturelle stilen eller lokaliseringen av lasterommet
        på en godssykkel (f.eks. longtail-sykkel, frontlastersykkel, trehjulssykkel).
    cargo_net_adjustability:
      name: Justerbar lastenett
      description: Angir om og hvordan lastenettet kan justeres for spenning/tilpasning.
    cargo_net_position:
      name: Lastnettposisjon
      description: Hvor i bagasjerommet/lasterommet nettet er ment å monteres eller
        Functions.
    cargo_net_stretch_type:
      name: Lastenett stretchtype
      description: Om bagasjenettet er elastisk/elastisk eller fast/ikke-elastisk.
    cargo_net_style:
      name: Lastenettstil
      description: Angir lastenettets konstruksjonsstil eller formfaktor (f.eks. strikksnor,
        webbing, barriere, hengekøye).
    cargo_rack_finish:
      name: Lastehjulsfinish
      description: Utvendig overflatebehandling/belegg på lasterullen.
    carpet_cleaner_application_method:
      name: Metode for tepperenserapp
      description: Spesifiserer den tiltenkte måten produktet påføres og bearbeides
        inn i teppet (utover generell form).
    carrier_style:
      name: Transportørstil
      description: Bæremekanismen/-stilen som brukes til å støtte båten på kjøretøyet.
    carrot_size:
      name: Gulrotstørrelse
      description: Klassifiserer den generelle størrelsen til gulrotproduktet.
    carrot_variety:
      name: Gulrotvariant
      description: Identifiserer den spesifikke sorten eller kultivaren av gulrot.
    carrying_capacity_pairs_boards:
      name: Bæreevne (sammenkoblede/brett)
      description: Angir hvor mange ski (sammenkoblede) eller snowboard et tilbehør
        muliggjør eller er ment å støtte når det brukes med spolen (f.eks. forlengelsessett).
    cartridge_thread_compatibility:
      name: Kompatibilitet med patrontråd
      description: Indikerer trådstandarden for en fordamper eller batteristøtte,
        som sikrer at patroner og batterier er fysisk kompatible.
    case_capacity_butts_shafts:
      name: Eske-kapasitet (kolber × sjakter)
      description: Definerer hvor mange køkolber og skaft esken kan romme, uttrykt
        i format kolbe for skaft (f.eks. 2x4 = 2 kolber og 4 skaft).
    case_features:
      name: Funksjoner i etui
      description: Fremhever funksjonelle egenskaper ved cymbalen/trommesettet knyttet
        til beskyttelse og transport.
    case_humidifier_refill_type:
      name: Eske luftfukterpåfyllingstype
      description: Angir om luftfukteren bruker gjenbrukbare (gjenfuktbare/regenererbare)
        medier eller utskiftbare engangspåfyll.
    case_lining_material:
      name: Materiale i fôr i etui
      description: Identifiserer det primære materialet som er foret med innsiden
        av en eske eller gigbag som er i kontakt med og beskytter instrumentet eller
        stoffet.
    case_material:
      name: Materiale i etui
      description: Identifiserer urets primære materiale, påvirker holdbarhet, vekt
        og estetikk.
    case_mounting_method:
      name: Eske monteringsmetode
      description: Hvordan luftfukteren er ment å plasseres eller festes inne i instrumentkassen.
    case_structure:
      name: Eske-struktur
      description: Indikerer stivheten til eske-konstruksjonen.
    case_style_cymbal_drum:
      name: Eske-stil (cymbal/tromme)
      description: Angir om produktet er en myk veske, en hard eske eller en hybriddesign
        for transport av cymbaler eller trommesett.
    casing_material:
      name: Materiale i innfatning
      description: Identifiserer det primære stoffet som brukes i dekkets stamme,
        påvirkning, drift og punkteringsbeskyttelse.
    casino_set_chip_material:
      name: Casinosett-chip
      description: Primærmaterialet til de inkluderte brikkene (hvis aktuelt).
    casino_set_layout_included:
      name: Casinosett-layout inkludert
      description: Angir hva slags spilleflate/layout som er inkludert i settet.
    cask_finish:
      name: Overflatebehandling på tønne
      description: Angir fatet eller tønnen som brukes til å ferdigstille eller modne
        brennevinet, for eksempel et bourbonfat eller et sherryfat.
    cassava_variety:
      name: Kassava-variant
      description: Identifiserer den spesifikke kultivaren eller varianten av yuca/kassava
        som tilbys, noe som påvirker smak, farge og tilberedningsegenskaper.
    cassette_body_type:
      name: Kassettkroppstype
      description: Frinav- eller driverstandard som baknavet eller hjulet aksepterer
        (f.eks. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Kassettspillerfunksjoner
      description: Indikerer kassetttransport- og avspillingsfunksjoner som er vanlige
        for kassettspillere i dashbordet.
    cassette_speed_compatibility:
      name: Kompatibilitet med kassetthastighet
      description: Angir antall gir (f.eks. 7-gir, 12-gir) kassetten eller frihjulet
        er designet for å fungere med, noe som sikrer kompatibilitet med kjede, girspak
        og girskifter.
    castanet_shell_size_class:
      name: Castanet skallstørrelseklasse
      description: Standardisert størrelsesklasse for kastanettskall, ofte brukt av
        spillere/lærere for å velge passform og tone.
    castanets_included_pieces:
      name: Kastanjetter inkluderte brikker
      description: Angir hva som er inkludert i produkttilbudet (sammenkoblet vs.
        enkelt pluss ekstraer).
    castanets_pitch:
      name: Kastanjetter tonehøyde
      description: Indikerer den vanlige tonehøyden/størrelsen. Etiketten som brukes
        av skapere for å beskrive lydrekkevidde.
    castanets_type:
      name: Kastanjett-type
      description: Angir kastanjetters stil eller tiltenkte brukskategori.
    caster_type:
      name: Hjultype
      description: Identifiserer typen hjul som er montert på håndtaket (f.eks. svingbart,
        låsbart), og informerer om manøvrerbarhet og stabilitet.
    castle_playset_included_items:
      name: Slottsett inkludert
      description: Registrerer hovedkomponentene som følger med slottet, slik at kundene
        kan sammenligne sett (f.eks. figurer, møbler, kjøretøy, tilbehør).
    catcher_equipment_included:
      name: Inkludert fangstutstyr
      description: Spesifiserer komponentene som er inkludert i et catcher-utstyrssett,
        for eksempel en catcher-hjelm eller brystbeskytter.
    catcher_helmet_style:
      name: Catcher-hjelmstil
      description: Indikerer den overordnede designstilen til fangerens beskyttende
        hodeplagg.
    cattle_breed:
      name: Storferase
      description: Identifiserer storferasen som storfekjøttet kommer fra (f.eks.
        Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Blomkålvariant
      description: Identifiserer kultivaren, fargen eller spesialvarianten av blomkålen
        som selges.
    celery_form:
      name: Selleriform
      description: Angir den fysiske formen eller kuttestilen selleri selges i.
    celery_variety:
      name: Selerivariant
      description: Registrerer den spesifikke kultivaren eller varianten av selleri,
        slik at kunden kan velge etter smaksprofil, farge eller kulinarisk bruk.
    cereal_bar_texture:
      name: Tekstur av frokostblandingbar
      description: Beskriver munnfølelsen og konsistensen til frokostblandingbaren
        (f.eks. seig, sprø).
    cereal_type:
      name: Frokostblandingstype
      description: Klassifiserer former eller formatene til frokostblanding eller
        granola (flak, puffs, granolaklynger, müsli osv.) for å hjelpe kunder med
        å finne en foretrukket tekstur eller tilberedningsmetode.
    certificate_border_style:
      name: Stil for sertifikatkant
      description: Beskriver den dekorative kantbehandlingen som brukes på sertifikatet.
    certificate_personalization_type:
      name: Sertifikat personlig tilpasningstype
      description: Angir hvordan sertifikatet kan tilpasses (blankt for håndskrift,
        utskrivbar mal, forhåndstrykt med variable felt osv.).
    certification_service:
      name: Sertifiseringstjeneste
      description: Annen gradering/sertifiseringsbedrift (hvis aktuelt).
    certification_standard:
      name: Sertifiseringsstandard
      description: Angir sikkerhets- og brannmotstandssertifiseringen eller samsvarsstandarden
        som balaklavaen er vurdert til å oppfylle.
    chain_coating_finish:
      name: Kjedebelegg/-finish
      description: Spesifiserer all overflatebehandling eller finish som påføres kjedet
        for å forbedre holdbarhet, redusere friksjon, forhindre korrosjon eller endre
        utseende (f.eks. Ti-nitrid, DLC, nikkel, rustfri EPT).
    chain_connection_type:
      name: Kjedeforbindelsestype
      description: Angir lukkemetoden som er gitt eller nødvendig for å koble sammen
        endene av kjeden.
    chain_tier_configuration:
      name: Kjedenivåkonfigurasjon
      description: Angir antall/arrangement av kjettinglag i fangstenheten (enkelt,
        dobbelt eller trippelt lag).
    chain_tool_type:
      name: Kjedeverktøytype
      description: Klassifiserer den spesifikke typen sykkelkjedeverktøy slik at kunden
        raskt kan finne riktig enhet.
    chainring_shape:
      name: Kjederingform
      description: Indikerer former på krankdrevet, for eksempel rund eller oval/elliptisk.
    chair_accessories_included:
      name: Inkludert stoltilbehør
      description: Viser innebygd eller inkludert tilbehør som forbedrer stolens funksjonalitet.
    chair_sash_care_instructions:
      name: Instruksjoner for stell av stolramme
      description: Beskriver anbefalt rengjørings-/vedlikeholdsmetode for stolrammen.
    chair_sash_finish:
      name: Stolrammefinish
      description: Beskriver overflateglansen/finishen på rammestoffet.
    chair_storage_design:
      name: Design av stoloppbevaring
      description: Indikerer hvordan slyngestolen er ment å være butikk (f.eks. sammenleggbar,
        stabelbar, ikke-sammenleggbar) for å hjelpe kunder med å vurdere oppbevaring
        og bærbarhet.
    chaise_or_sectional_orientation:
      name: Sjeselong- eller seksjonsorientering
      description: Angir siden en integrert sjeselong eller forlenget seksjon er plassert
        på når den er vendt mot sofaen.
    chamber_size:
      name: Kammerets størrelse
      description: Indikerer kammerstørrelsen/volumet til munnstykket, som påvirker
        motstand og tonal farge.
    chanter_finger_spacing:
      name: Avstand mellom sangfinger
      description: Indikerer fingeravstanden/størrelsesprofilen til pekefingeren (ofte
        beskrevet som standard, små hender eller store hender).
    chanter_type:
      name: Type munnstykke
      description: Pedestolpestilen/konfigurasjonen som følger med instrumentet (eller
        brukes av instrumentet), for eksempel åpen, lukket, øving eller tangentbasert.
    chard_variety:
      name: Chard-variant
      description: Identifiserer den spesifikke kultivaren eller fargevarianten av
        mangold som selges.
    charging_port_location:
      name: Lading portsted
      description: Fysisk lokalisering av stedet for kjøretøyets primære eksterne
        lading (ladeport).
    chassis_construction_type:
      name: Konstruksjonstype i chassis
      description: Beskriver den primære chassiskonstruksjonsmetoden som brukes for
        kjøretøyet.
    checkbook_loading_orientation:
      name: Retning for innlasting av sjekkhefte
      description: Angir om sjekkhefteomslaget er kompatibelt med sjekkformatene topplast,
        sidelast eller universelle sjekkformater.
    cheekpiece_style:
      name: Kinnstykke-stil
      description: Definerer typen kinn-/ringkonfigurasjon på trinsebittet, som bestemmer
        tøylevirkning og sidestabilitet.
    cheese_alternative_form:
      name: Alternativ form for ost
      description: Angir den fysiske formen eller kuttet som ostealternativet selges
        i.
    cheese_form:
      name: Osteform
      description: Beskriver den fysiske presentasjonen av osteproduktet (f.eks. hjul,
        blokk, skivet, revet).
    cheese_texture:
      name: Ostetekstur
      description: Klassifiserer osten etter dens generelle tekstur eller fasthet.
    cheese_variety:
      name: Ostevariant
      description: Identifiserer hvilken type ost som brukes som primært smakstilsetning
        i snacksen.
    cherimoya_variety:
      name: Cherimoya-varianten
      description: Identifiserer den spesifikke kultivaren/varianten av cherimoya
        (f.eks. Fino de Jete, El Bumpo).
    cherry_variety:
      name: Kirsebærvariant
      description: Spesifiserer kultivaren eller varianten av kirsebærene, noe som
        hjelper kundene med å velge spesifikke typer kjent for sin smak, farge, størrelse
        eller tiltenkte kulinariske bruk.
    chest_pocket_style:
      name: Brystlommestil
      description: Angir tilstedeværelsen og konfigurasjonen av brystlommer på skjorten.
    chewing_tobacco_form:
      name: Tyggetobakkform
      description: Identifiserer den fysiske formen, kuttestilen eller posestørrelsen
        til tyggetobakksproduktet (f.eks. løsbladet pose, lang pose, tynn pose).
    chicory_variety:
      name: Sikorivariant
      description: Identifiserer den spesifikke varianten eller kultivaren av sikori
        som selges (f.eks. radicchio, belgisk endive, escarole).
    chiffon_recommended_use:
      name: Anbefalt bruk av chiffon
      description: Primært anbefalt sy-/håndverk for chiffongstoff.
    child_seat_accessory_type:
      name: Type barnesetetilbehør
      description: Definerer den spesifikke typen barnesetetilbehør eller reservedel
        (f.eks. setepute, fotstøtte, monteringsadapter), slik at kunder raskt kan
        snevre inn til det de trenger uten å måtte oppgi mange mikrokategorier.
    child_seat_mounting_type:
      name: Monteringstype for barnesete
      description: Angir hvordan sykkelbarnesetet festes til rammen, hjulet eller
        cockpitområdet.
    chime_sound_character:
      name: Klokklydkarakter
      description: Beskriver den tiltenkte lydkarakteren/klangfargen til klokkespillet.
    chin_cup_type:
      name: Hakekopptype
      description: Angir stilen eller konstruksjonen på hakekoppen, som påvirker komfort
        og påvirkning.
    chin_strap_type:
      name: Type hakestropp
      description: Angir typen hakestropp på en hatt – ingen, fast, justerbar eller
        avtakbar – for å hjelpe kunder med å velge stiler som holder seg sikre i vindfulle
        eller aktive omgivelser.
    china_cymbal_edge_shape:
      name: Former på kinesiske cymbalkanter
      description: Beskriver kant-/flensprofilen som er typisk for kinesiske cymbaler
        (hvor oppoverbøyd kanten er), noe som påvirker følelse og lyd.
    china_cymbal_sound_character:
      name: Kinesisk cymballydkarakter
      description: Beskrivelse av primær lyd/tonal karakter for en kinesisk cymbal
        brukt til oppdaging og filtrering (f.eks. trashy, mørk, lys). Flere verdier
        kan gjelde.
    chinstrap_type:
      name: Hakestropptype
      description: Stil på hakereim som følger med hjelmen.
    chip_cut_style:
      name: Chip cut-stil
      description: Angir det fysiske snittet eller teksturstilen til chipsen (f.eks.
        riflet, vannkokt, poppet).
    chip_denomination:
      name: Chip-valør
      description: Hvilke chip (verdier) som er inkludert i settet (trykt eller tildelt).
    chocolate_form:
      name: Sjokoladeform
      description: Beskriver den fysiske formen som bakesjokoladen selges i.
    choy_sum_variety:
      name: Choy sum-variant
      description: Identifiserer den spesifikke merkede eller botaniske varianten
        av choy sum som selges.
    cigar_wrapper_color:
      name: Fargede sigarpapir
      description: Standard fargeklassifisering av sigarens omslagsblad.
    cigarette_filter_type:
      name: Sigarettfiltertype
      description: Angir om sigaretten har et filter, og i så fall filterets konstruksjon
        eller spesielle funksjon.
    cigarette_size:
      name: Sigarettstørrelse
      description: Klassifiserer sigaretter etter bransjestandard lengde- eller formatterminologi
        (f.eks. king størrelse, 100s, slim).
    cigarette_strength_descriptor:
      name: Beskrivelse av sigarettstyrke
      description: Markedsføringrelatert styrkemerking som tradisjonelt brukes av
        merkevare for å indikere tjære/nikotinintensitet (f.eks. Light, Bold, sølv).
    cinch_liner_material:
      name: Cinch-fôrmateriale
      description: Identifiserer materialet som brukes til fôret eller fyllet som
        sitter mot hesten.
    circular_knitting_needle_cable_type:
      name: Rundpinne-kabeltype
      description: Kabelmateriale/-oppførsel og konstruksjon (f.eks. belagt stål,
        nylon) Impact /knekking og svingegenskaper.
    circular_knitting_needles_tip_material:
      name: Materiale for rundpinnespissen
      description: Materialet i de to nålespissene (i motsetning til kabelmaterialet).
    circumference_adjustment_mechanism:
      name: Mekanisme for justering av omkrets
      description: Mekanisme som brukes til å justere eller låse nøstets omkrets.
    clamp_design:
      name: Klemmedesign
      description: Beskriver den strukturelle stilen eller mekanismen til spennen.
    clamp_sheet_music_clip_features:
      name: Funksjoner for noterklipp med klemme
      description: Funksjonelle og beskyttende egenskaper ved klemme for noter (f.eks.
        utfylling, sklisikker, svingbar).
    clamping_closure_type:
      name: Klemme-/lukketype
      description: Angir mekanismen som brukes til å stramme eller feste broderiringen
        rundt stoffet.
    clarinet_bell_acoustic_design:
      name: Akustisk design for klarinettklokke
      description: Beskriver klokkens lyd-/ventilasjonsdesign som er ment å påvirke
        respons og intonasjon.
    clarinet_bell_adjustment_mechanism:
      name: Justeringsmekanisme for klarinettklokke
      description: Beskriver hvordan klokkens lengde/geometri justeres.
    clarinet_bell_ring_material:
      name: Materiale for klarinettklokkering
      description: Angir materialet til beskyttelsesringen/båndet på klarinettklokkekanten,
        hvis den finnes.
    clarinet_bell_tuning_effect:
      name: Klarinettklokkestemmingseffekt
      description: Indikerer hvordan klokken er utformet for å påvirke stemming/intonasjon
        (spesielt halstoner og lavt register) sammenlignet med en standardklokke.
    clarinet_body_type:
      name: Type hoveddel for klarinett
      description: Indikerer den primære kroppskonstruksjonstypen for A-klarinetten.
    clarinet_bore_type:
      name: Klarinettboringstype
      description: Beskriver boringsdesignet til altklarinetten.
    clarinet_cap_style:
      name: Klarinetthette-stil
      description: Designstilen til hetten som følger med et klarinettligatur- og/eller
        munnstykkehetteprodukt (f.eks. invertert eller ventilert).
    clarinet_care_kit_intended_use:
      name: Tiltenkt bruk av klarinettpleiesett
      description: Primær brukskontekst som settet er designet for (f.eks. rask daglig
        tørking kontra dyp rengjøring / vedlikehold).
    clarinet_included_accessories:
      name: Inkludert tilbehør for klarinett
      description: Identifiserer hva som følger med i esken til Bb-klarinetten.
    clarinet_keywork_material:
      name: Klarinettklavermateriale
      description: Angir materialet i klarinettens klaviaturmekanisme (f.eks. messing,
        nikkelbelagt, sølvbelagt).
    clarinet_keywork_plating:
      name: Plater på knapper på klarinett
      description: Angir plating/materialfinish på klarinettklaviaturene (klaverene).
    clarinet_mouthpiece_baffle_profile:
      name: Munnstykkeprofil for klarinett
      description: Beskriver den interne baffel-/takprofilen til klarinettmunnstykket
        som påvirker lysstyrke og projeksjon.
    clarinet_mouthpiece_beak_shape:
      name: Klarinettmunnstykkes spissform
      description: Spesifiserer den ytre nebbprofilen/vinkelen for spillerkomfort
        og embouchure-følelse.
    clarinet_mouthpiece_chamber_size:
      name: Kammerstørrelse for klarinettmunnstykke
      description: Beskriver den relative kammerstørrelsen til et klarinettmunnstykke
        (som spesifisert av produsenten), som kan påvirke tonefarge og spillemotstand.
    clarinet_mouthpiece_intended_tone:
      name: Klarinettmunnstykkets beregnede tone
      description: Beskriver det generelle tonale målet som er markert for munnstykket.
    clarinet_mouthpiece_player_level:
      name: Klarinettmunnstykke-spillernivå
      description: Indikerer det typiske målbrukernivået for munnstykket.
    clarinet_reed_cut:
      name: Klarinettrørskutt
      description: Spesifiserer rørbladsskjæringen/profilen (f.eks. fil eller ufilet
        og andre markerte kuttestiler), som påvirker respons og tone.
    clarinet_reed_material_type:
      name: Materiale for klarinettrør
      description: Angir hva sivet er laget av (stokk vs. syntetisk og vanlige syntetiske
        undertyper).
    clarinet_thumb_rest_type:
      name: Klarinett REST type
      description: Type/funksjon ved høyre REST.
    classical_guitar_string_3rd_string_type:
      name: Klassisk gitarstyrke 3. styrke type
      description: Om G-strengen (3. streng) er enkel (monofilament) eller viklet.
    classical_guitar_string_bass_winding_material:
      name: Klassisk gitarstyrke bassviklingsmateriale
      description: Viklings-/viklingsmaterialet som brukes på bassstyrke (vanligvis
        styrke 4–6).
    classical_guitar_string_set_configuration:
      name: Konfigurasjon av styrkesett for klassisk gitar
      description: Angir om produktet er et komplett sett eller en spesifikk styrke
        (vanligvis diskant- eller bassside) for en klassisk gitar.
    clay_modeling_dough_base_material:
      name: Leire og modelleringsdeig som basismateriale
      description: Primær formulering/basetype for modelleringsmaterialet.
    clay_modeling_dough_curing_method:
      name: Leire- og modelleringsdeigherdingsmetode
      description: Hvordan materialet herder (eller forblir gjenbrukbart), som bestemmer
        nødvendige verktøy og typisk bruk.
    clay_paintability:
      name: Leiremalbarhet
      description: Angir om den herdede leireoverflaten kan males og anbefalte malingstyper.
    clay_primary_composition:
      name: Leires primære sammensetning
      description: Primært basismateriale/bindemiddel i den lufttørkede leiren (f.eks.
        papirbasert, mineralbasert).
    clay_shooting_discipline:
      name: Leirskytingsdisiplin
      description: Identifiserer leirskytedisiplinen eller hendelser produktet er
        beregnet på.
    cleaner_format:
      name: Renere format
      description: Emballasjen/formatet til rengjøringsprodukt.
    cleaner_sanitizer_intended_area:
      name: Rengjørings-/desinfeksjonsmiddel tiltenkt område
      description: Hoveddelen av messinginstrumentet er produktet ment å rengjøre/desinfisere.
    cleaning_formula:
      name: Rengjøringsformel
      description: Spesifiserer den primære rengjørings-/desinfeksjonskjemikaliefamilien
        til produktet (ikke merkevare) for å støtte sikkerhet, kompatibilitet og bruksfiltrering.
    cleaning_task_focus:
      name: Fokus på rengjøringsoppgave
      description: Identifiserer de primære rengjøringsproblemene som den vannfrie
        vasken er ment å løse.
    cleanup_method:
      name: Oppryddingsmetoden
      description: Spesifiserer hvordan limet skal rengjøres (mens det er vått) fra
        hender/verktøy/overflater.
    clear_glue_application_method:
      name: Gjennomsiktig limappmetode
      description: Spesifiserer dispenserings-/påføringsstilen som følger med gjennomsiktig
        limemballasje.
    clear_glue_finish_after_drying:
      name: Gjennomsiktig limfinish (etter tørking)
      description: Beskriver limets utseende når det har tørket/herdet (f.eks. krystallinsk
        gjennomsiktig vs. gjennomskinnelig, blank vs. matt).
    cleat_bolt_pattern:
      name: Boltmønster for klosser
      description: Angir skoboltkonfigurasjonen som brukes til å feste klossen, som
        avgjør kompatibiliteten mellom pedal og sko (f.eks. terrengsykkel med 2 bolter
        vs. landeveissykkel med 3 bolter).
    cleat_compatibility:
      name: Kompatibilitet for klosser
      description: Angir hvilke pedal- eller klossesystemer skotrekket passer til.
    cleat_finish:
      name: Klokkefinish
      description: Spesifiserer overflatefinishen/belegget på dock , som påvirker
        korrosjonsmotstanden og utseendet.
    cleat_receptacle_system:
      name: Klemmebeslagssystem
      description: Identifiserer det kompatible pigg-/klosselfestegrensesnittet som
        brukes på golfsko med pigger.
    cleat_release_mechanism:
      name: Løsnemekanisme for klosser
      description: Angir hvordan en sykkelklosse løsner fra pedalen (f.eks. enkeltutløsning
        eller flerveisutløsning).
    cleat_stud_type:
      name: Klossetype
      description: Angir konstruksjonen eller festestilen til knottene/klossene på
        yttersålen til amerikanske fotballsko.
    climate_control_module_function:
      name: Klimakontroll modulfunksjon
      description: Angir den primære rollen til moduler i kjøretøyets HVAC-system.
    climbing_hold_mounting_type:
      name: Monteringstype for klatregrep
      description: Angir hvordan festet er festet til veggen eller treningsbrettet.
    climbing_hold_type:
      name: Type klatrehold
      description: Kategoriserer formen eller stilen på grepet som definerer hvordan
        det gripes.
    climbing_protection_device_type:
      name: Type klatrebeskyttelsesenhet
      description: Spesifiserer typen beskyttelsesenhet (f.eks. kam, mutter, piton),
        som hjelper klatrere med å raskt finne riktig utstyr for en gitt fjellformasjon
        eller klatrestil.
    climbing_rope_middle_marking:
      name: Midtmarkering av klatretau
      description: Beskriver hvordan tauets midtpunkt (og/eller ender) er identifisert
        for å hjelpe til med sikker rappellering og nedfiring.
    climbing_rope_treatment:
      name: Håndtering av klatretau
      description: Indikerer enhver vannavvisende, tørr eller beskyttende overflate
        som er påført tauets kappe og/eller kjerne.
    climbing_rope_type:
      name: Klatretautype
      description: Klassifiserer tauet etter UIAA-sertifisering og tiltenkt bruk (f.eks.
        dynamisk enkelt, halvt, tvilling, statisk, tilbehørssnor), slik at kundene
        raskt kan finne riktig tau for aktiviteten sin.
    climbing_safety_certifications:
      name: Sikkerhetssertifiseringer for klatring
      description: Lister opp standardene for klatre- og industrisikkerhet som enheten
        oppfyller.
    clip_color:
      name: Klippfarge
      description: Primærfarge på notene til clamp-klippet.
    clip_mechanism_type:
      name: Klipsmekanismetype
      description: Definerer festemekanismen som brukes av en Penger-klips eller Penger-klips
        digital lommebok, og hjelper kundene med å velge mellom magnetisk, fjærstang,
        spak og andre stiler.
    clip_style:
      name: Klippstil
      description: Identifiserer den spesifikke klipsmekanismen som brukes til å feste
        holderen, og gir kompatibilitetsinformasjon (f.eks. alligatorklemme, karabinkrok).
    clipper_motor_technology:
      name: Clipper-motorteknologi
      description: Identifiserer motordesignet som brukes i klipperen, påvirkning,
        støy, holdbarhet og vedlikehold.
    closet_configuration:
      name: Skapkonfigurasjon
      description: Definerer de overordnede former eller layout til walk-in-closet-systemet
        (f.eks. L-formet, U-formet, øy).
    closing_mechanism:
      name: Lukkemekanisme
      description: Angir skuffens lukkemekanisme, for eksempel standard, myklukking,
        selvlukking eller trykk-for-åpne.
    cloth_construction:
      name: Tøykonstruksjon
      description: Indikerer vevingen eller finishen på stoffet som påvirker hastighet
        og holdbarhet (f.eks. kamgarn vs. ull).
    cloth_thickness:
      name: Tykkelsen på tøyet
      description: Angir tykkelsen/vektklassen til poleringskluten.
    club_head_material:
      name: Materiale for køllehodet
      description: Spesifiserer hovedmaterialet som brukes i konstruksjonen av køllehodet.
    clutch_hydraulic_system_type:
      name: Hydraulisk clutchsystemtype
      description: Indikerer kompatibiliteten mellom clutchaktivering/hydraulisk system
        (f.eks. hydraulisk clutch vs. kabelkonvertering/vekslingsapp).
    clutch_line_connection_type:
      name: Clutchledningsforbindelsestype
      description: Angir endeforbindelsen/fitting-grensesnittet som brukes av clutchledningen
        (viktig for kompatibilitet med master-/slavesylindere og harde ledninger).
    clutch_pressure_plate_actuation_type:
      name: Aktueringstype for clutch-trykkplate
      description: Angir om clutchen utløses av en skyv- eller trekkmekanisme (membranfjæraktivering).
    clutch_pressure_plate_release_mechanism_type:
      name: Type utløsermekanisme for clutchtrykkplate
      description: Stilen på utløser-/aktiveringsgrensesnittet som brukes av trykkplaten.
    clutch_pressure_plate_surface_type:
      name: Overflatetype for clutchtrykkplate
      description: Friksjonskontaktflatestil på trykkplaten.
    clutch_slave_cylinder_connection_type:
      name: Tilkoblingstype for clutch-slavesylinder
      description: Hydraulisk linjeforbindelse på slavesylinderen (trådport, hurtigkobling,
        banjo, etc.).
    clutch_slave_cylinder_mounting_type:
      name: Monteringstype for clutch-slavesylinder
      description: Hvordan slavesylinderen monteres på girkassen/klokkehuset (f.eks.
        påbolting, klipsmontering, integrert konsentrisk).
    coating_type:
      name: Beleggstype
      description: Identifiserer eventuelle utvendige belegg, drypp eller glasur som
        er påført frokostblandingen (f.eks. sjokolade, yoghurt).
    cocking_mechanism:
      name: Oppspenningsmekanisme
      description: Angir den primære metoden eller enheten som brukes til å spenne
        eller avspenne armbrøststyrken.
    cocktail_garnish_form:
      name: Skjema for cocktailgarnityr
      description: Beskriver hvordan pynten presenteres/behandles for bruk (f.eks.
        fersk vs. tørket).
    cocktail_mix_variety:
      name: Cocktailmiks-utvalg
      description: Angir den spesifikke cocktailen som blandingen er ment å brukes
        til (f.eks. Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Funksjoner på cocktailservietter
      description: Fremhever funksjonelle, praktiske og miljøvennlige egenskaper ved
        cocktailservietter.
    cocktail_pick_tip_style:
      name: Stil med tips for cocktailplukking
      description: Beskriver spissens former/funksjoner som brukes til å stikke hull
        på eller holde pynt.
    cocktail_pick_top_handle_style:
      name: Cocktailpick top/referanse-stil
      description: Beskriver den dekorative toppen eller referanseformen som brukes
        til griping eller presentasjon.
    cocktail_type:
      name: Cocktailtype
      description: Angir den spesifikke cocktailoppskriften eller -stilen som representeres
        av det ferdigblandede produktet (f.eks. Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Cocktailparaply referanse/plukkmateriale
      description: Materiale i pinne-/hakkedelen (unntatt Canopy) av cocktailparaplyen.
    cocoa_processing_method:
      name: Behandlingsmetode for kakao
      description: Angir hvordan kakaopulveret ble bearbeidet (f.eks. naturlig, nederlandsk
        bearbeidet, svart kakao).
    cocoa_product_form:
      name: Format for kakaoprodukt
      description: Definerer den fysiske formen kakaoproduktet selges i.
    coconut_husk_status:
      name: Status for kokosnøttskall
      description: Angir i hvilken grad kokosnøttens ytre skall er fjernet, noe som
        påvirker brukervennlighet, lagring og avfall.
    coconut_maturity_stage:
      name: Kokosnøttmodningsstadium
      description: Identifiserer utviklingsstadiet til kokosnøtten når den høstes,
        noe som sterkt påvirker smak, vanninnhold og matlaging (f.eks. drikking kontra
        matlaging).
    coconut_oil_refinement_type:
      name: Type raffinering av kokosolje
      description: Angir raffineringen eller graden av kokosoljen, f.eks. jomfru,
        raffinert, MCT, fraksjonert.
    coconut_preparation_form:
      name: Kokosnøttprepareringsskjema
      description: Spesifiserer hvordan kokosnøtten fysisk tilberedes eller kuttes
        (hel, skivet, revet, purert osv.), noe som hjelper kundene med å raskt finne
        formatet som trengs for oppskrifter eller snacks.
    coffee_bean_species:
      name: Kaffebønnearter
      description: Angir hvilke kaffebønner som brukes i produktet.
    coffee_beverage_variety:
      name: Utvalg av kaffedrikker
      description: Klassifiserer konsumklare eller blandede kaffedrikker etter stil.
    coffee_processing_method:
      name: Kaffebehandlingsmetode
      description: Indikerer hvilken bearbeidingsteknikk som brukes på kaffebønnene
        etter innhøsting.
    coil_material:
      name: Materiale i coil
      description: Angir det primære materialet eller netttypen som brukes i varmespolen,
        påvirker smak, levetid og kompatibilitet med temperaturkontroll.
    coil_spring_design:
      name: Spiralfjærdesign
      description: Angir hastigheten/former på spiralfjærens design som påvirker drift.
    coil_spring_finish_coating:
      name: Spiralfjærfinish/belegg
      description: Overflatebehandling eller belegg påført for korrosjonsbeskyttelse.
    coil_spring_material:
      name: Spiralfjærmateriale
      description: Primærmateriale/-sammensetning av spiralfjæren.
    coil_system_type:
      name: Spolesystemtype
      description: Informasjon om det spesifikke spiral- eller fjærsystemet som brukes
        i aktuelle madrasser, for eksempel pocket-spiraler eller Bonnell-spiraler.
    coil_type:
      name: Spoletype
      description: Beskriver spolekonstruksjonen eller teknologien som brukes, produksjon
        av påvirkning og smak.
    coin_grade_numismatic:
      name: Myntkvalitet (numismatisk)
      description: Standardisert grad av mynten (f.eks. Sheldon-skala eller adjektivgrad).
    coin_strike_or_finish:
      name: Myntslag eller -avslutning
      description: Myntens slagtype eller finish (f.eks. forretningsslag, bevis).
    coin_strike_type:
      name: Myntslagstype
      description: Beskriver myntens strike-/finish-type (f.eks. proof, business strike).
    collar_style:
      name: Kragestil
      description: Definerer designet på kragen eller utringningen på plagget.
    collectible_gun_accessories_included:
      name: Samlevåpentilbehør inkludert
      description: Viser en liste over tilbehør og dokumentasjon som følger med samlervåpenet
        (f.eks. hylster, eske, bajonett, papirer).
    collectible_gun_firing_mechanism:
      name: Samlemekanisme for våpenavfyring
      description: Angir våpenets type avfyrings-/tenningsmekanisme for samlevåpen
        (spesielt antikke og historiske gjenstander).
    collectible_knife_blade_finish:
      name: Samlebart knivbladfinish
      description: Beskriver bladets overflatebehandling/håndtering med tanke på utseende
        (og noen ganger korrosjonsbestandighet).
    color_code_system:
      name: Fargekodesystem
      description: Identifiserer fargekodesystemet som brukes for trådens numeriske
        fargereferanse (f.eks. DMC, Anchor), hvis aktuelt.
    color_coding_standard:
      name: Fargekodingsstandard
      description: Angir om skiltplaten følger en internasjonal fargekode (f.eks.
        IWF eller IPF) eller en annen ordning.
    color_effect:
      name: Fargeeffekt
      description: Spesifiserer spesielle fargeteknikker eller -effekter som brukes
        på hårextensions.
    color_family:
      name: Fargefamilie
      description: Høynivå fargefamilie for sumi-blekk (nyttig når fargen er for granulær,
        f.eks. varm svart vs blå-svart).
    color_finish:
      name: Fargefinish
      description: Angir finishen på de synlige håndbeskyttelseskomponentene (f.eks.
        matt vs. blank) når farge alene ikke er tilstrekkelig.
    coloring_finish:
      name: Fargeleggingsfinish
      description: Angir den visuelle finishen eller spesialeffekten som produseres
        av fargen, for eksempel metallisk eller neon.
    comb_material:
      name: Materiale i kam
      description: Materialet i munnspillkammen (kroppen som danner luftkamrene).
    comb_type:
      name: Type kam
      description: Klassifiserer hestekammer etter deres primære funksjonelle stil
        (f.eks. karrikam, mankam, trekkam), noe som hjelper kunder med raskt å finne
        riktig verktøy for spesifikke stellebehov.
    combat_shorts_cut_style:
      name: Kampshorts i stil med shorts
      description: Angir snittet eller passformen som er spesifikk for kampsportshorts
        (f.eks. høyt snitt, retrosnitt, kompresjonssnitt).
    comic_creator_role:
      name: Tegneserieskaperens rolle
      description: Angir den krediterte skaperen som er relevant for oppføringen (f.eks.
        forfatter, kunstner).
    commemorative_coin_finish:
      name: Overflatebehandling på minnemynt
      description: Beskriver prege-/finishtypen til en minnemynt.
    commemorative_coin_mint_mark:
      name: Minnemynt myntmerke
      description: Indikerer myntmerket (eller ikke myntmerket) på mynten.
    commemorative_subject:
      name: Minneemne
      description: Primært minnet emne (hendelser, person, sted, merkedag, organisasjon,
        etc.).
    commercial_vehicle_class:
      name: Kommersiell kjøretøyklasse
      description: GVWR-basert regulatorisk/bransjeklasse som brukes til å beskrive
        et nyttekjøretøys vektklasse for bla gjennom og filtrering.
    compass_damping_medium:
      name: Kompass dampemedium
      description: Angir mediet som brukes til å stabilisere nålens bevegelse inne
        i kompasskapselen.
    compass_illumination_type:
      name: Illuminasjonstype for kompass
      description: Angir hvordan kompassmarkeringene gjøres synlige i svakt lys (f.eks.
        selvlysende maling, tritium, LED-bakgrunnsbelysning).
    compass_mounting_style:
      name: Monteringsstil for kompass
      description: Beskriver hvordan kompasset bæres, brukes eller monteres.
    compass_scale_units:
      name: Kompass skala-enheter
      description: Identifiserer måleenhetene (grader, mil eller begge deler) som
        er merket på kompasshuset.
    compatible_abs_system:
      name: Kompatibelt akrylnitril-butadien-styren-system
      description: Angir om hovedsylinderen er beregnet for kjøretøy utstyrt med akrylnitril-butadien-styren.
    compatible_adapter_brand:
      name: Kompatibel adapter merkevare
      description: Identifiserer golfkøllehodets merkevare hvis adapter skaftet er
        forhåndskonfigurert til å passe.
    compatible_airbag_system_type:
      name: Kompatibel airbagsystemtype
      description: Angir generasjonen/funksjonssettet for kollisjonsputesystemet delen
        er kompatibel med (f.eks. en-trinns vs. totrinns).
    compatible_amplifier_fit_method:
      name: Kompatibel forsterkertilpasningsmetode
      description: Angir hvordan kompatibilitet er definert for trekket/esken (universell
        passform vs. modellspesifikk vs. etter dimensjon).
    compatible_apparatus:
      name: Kompatibelt apparat
      description: Angir hvilket gymnastikkapparat eller -aktivitet grepene er designet
        for.
    compatible_archery_tool:
      name: Kompatibelt bueskyteverktøy
      description: Angir det primære bueskyteverktøyet eller utstyret som tilbehøret
        er designet for å fungere med.
    compatible_axle_size:
      name: Kompatibel akselstørrelse
      description: Angir nav-/akseldiameteren eller trådstandarden som fotpinnen er
        designet for å passe til (f.eks. 10 mm/3⁄8 tomme, 14 mm, 3/8 tomme 26 TPI).
    compatible_axle_type:
      name: Kompatibel akseltype
      description: Identifiserer standard(er) for bakakselfeste på trenerstøtten,
        for eksempel hurtigkobling eller gjennomgående akselstørrelse.
    compatible_axle_weight_rating:
      name: Kompatibel akselvektklassifisering
      description: Angir tilhengerakselens vektklassifisering (kapasitet per aksel)
        som tilhengerbremseenheten er konstruert for å passe.
    compatible_bait_type:
      name: Kompatibel agntype
      description: Identifiserer hvilke typer agn agndrillen er kompatibel med, slik
        at sportsfiskere kan velge et verktøy som matcher deres foretrukne agn.
    compatible_bass_scale_length:
      name: Kompatibel bassskalalengde
      description: Angir bassskalalengden(e) styrkesettet er beregnet for (viktig
        for riktig viklingslengde og passform).
    compatible_battle_top_system:
      name: Kompatibelt kampsystem
      description: Identifiserer økosystemet eller serien til Battle Top-produktet
        som toppen er designet for (brukes for å sikre kompatibilitet mellom deler
        og arenaer).
    compatible_bb_size:
      name: Kompatibel kulestørrelse
      description: Indikerer diameteren på airsoft pellets produktet støtter.
    compatible_bed_frame_style:
      name: Kompatibel ramme
      description: Angir sengen eller ramme tilbehøret er designet for å passe.
    compatible_bicycle_tire_type:
      name: Kompatibel sykkeldekktype
      description: Spesifiserer hvilke sykkeldekktyper produktet kan reparere eller
        forsegle.
    compatible_bike_component:
      name: Kompatibel sykkelkomponent
      description: Angir hvilken komponent av sykkelen verktøyet eller produktet er
        laget for å utføre service på.
    compatible_billiard_game:
      name: Kompatibelt biljardspill
      description: Identifiserer biljardformatet(ene) banen er designet for, og sikrer
        at kunden velger en bane som matcher spillet deres.
    compatible_billiard_table_size:
      name: Kompatibel biljardbordstørrelse
      description: Angir standard bordlengde(r) som trekket er designet for å passe,
        slik at kunden velger et trekk i riktig størrelse til biljardbordet sitt.
    compatible_bit_type:
      name: Kompatibel bitstype
      description: Typer av bits som beskyttelsen kan brukes med.
    compatible_blade_hosel:
      name: Kompatibelt hoselblad
      description: Indikerer bladets hosel/kon-stil som skaftet aksepterer, og sikrer
        at skaftet og bladet passer ordentlig sammen.
    compatible_blade_system:
      name: Kompatibelt bladsystem
      description: 'Angir hvilket erstatningsbladsystem/-format kniven godtar (f.eks.
        standard hobby #11, avbruttbare Grupper-blader).'
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibel båtvevingstransportvevstol
      description: Hvilke vevstoltyper båtskyttelen er ment å brukes med.
    compatible_bobbin_type:
      name: Kompatibel spoletype
      description: Angir hvilken type spole/spole båtskyttelen er konstruert for å
        bruke.
    compatible_bottle_mouth:
      name: Kompatibel flaskemunn
      description: Flaskeåpningstype eller diameter som sugerøret eller korken er
        designet for å passe.
    compatible_bow_attachment_system:
      name: Kompatibelt buefestesystem
      description: Angir lem- eller tilbehørsgrensesnittet delen er designet for (f.eks.
        ILF, skrutilpasning, hurtigavkobling).
    compatible_bow_crossbow_type:
      name: Kompatibel bue/armbrøsttype
      description: Angir hvilken stil på buen eller armbrøsten tilbehøret er designet
        for å passe.
    compatible_brake_fluid:
      name: Kompatibel bremsevæske
      description: Bremsevæske DOT-spesifikasjon(er) som hovedsylinderpakningene/materialene
        er utformet for å være kompatible med.
    compatible_brake_pad:
      name: Kompatible bremseklosser
      description: Angir hvilke bremseklosser som er godkjent for bremseskiven, noe
        som sikrer sikkerhet og optimal slitasje.
    compatible_brake_service_system:
      name: Kompatibelt bremsesystem
      description: Angir om delen er beregnet for skivebremser, trommelbremser eller
        begge deler.
    compatible_brake_system:
      name: Kompatibelt bremsesystem
      description: Spesifiserer viktige merknader om systemkompatibilitet for bruk
        av bremsevæske.
    compatible_brake_type:
      name: Kompatibel bremsetype
      description: Angir bremsetypen som reolen er kompatibel med, for eksempel skivebrems
        eller felg.
    compatible_brass_instrument_finish:
      name: Kompatibel overflatebehandling for messinginstrument
      description: Angir hvilke overflater på messinginstrumenter rengjøringsmiddelet
        er trygt å bruke på uten å skade overflaten.
    compatible_building_toy_system:
      name: Kompatibelt byggelekesystem
      description: Angir hvilket byggesystem/standard leketøyet er kompatibelt med
        (eller tilsvarende størrelse), for eksempel LEGO-kompatibelt eller privateid.
    compatible_capo_fretboard_radius:
      name: Kompatibel capo-gripebrettets radius
      description: Angir gripebrettets radius/profil som capoen er utformet for å
        passe til for optimal kontakt og stemmingsstabilitet.
    compatible_capo_number_of_strings:
      name: Kompatibelt capo-nummer for styrke
      description: Angir hvor mange styrker capoen er designet for å klemme (nyttig
        for 6-, 7-, 8-, 12-styrke og spesialinstrumenter).
    compatible_cardio_machine_type:
      name: Kompatibel kardiomaskin-type
      description: Identifiserer typen kondisjonsmaskin som tilbehøret eller delen
        er designet for å fungere med.
    compatible_chain_link_type:
      name: Kompatibel kjettinglenketype
      description: Identifiserer kjettinglenketypen som verktøystøtten har (standard,
        halvlenke, hurtiglenke osv.).
    compatible_chain_size:
      name: Kompatibel kjedestørrelse
      description: Angir kjedebredden eller stigningsstandardene (f.eks. 1/8 tomme,
        3/32 tomme) for verktøystøtten.
    compatible_chain_width:
      name: Kompatibel kjedebredde
      description: Angir hvilken kjedestørrelse frihjulet er konstruert for å fungere
        med.
    compatible_chip_denomination:
      name: Kompatibel chip
      description: Angir hvilke chip valører brettet/esken inneholder. Label eller
        dedikerte posisjoner for (eller er ment å organisere).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatibel ligatur for klarinettmunnstykke
      description: Identifiserer standarden for ligaturtilpasning eller kompatibilitetsmerknader
        for munnstykket.
    compatible_classical_guitar_string_scale_length:
      name: Kompatibel styrkeskalalengde for klassisk gitar
      description: Den tiltenkte kompatibiliteten mellom gitarskalalengde/strenglengde
        for settet.
    compatible_clay_target_size:
      name: Kompatibel leiremålstørrelse
      description: Viser størrelsen på leirmålet eller former som kasteren kan akseptere
        for riktig passform og ytelse.
    compatible_cleat_system:
      name: Kompatibelt klossesystem
      description: Spesifiserer klossenes grensesnitt eller boltmønsteret på pedalstøtten,
        slik at syklister kan matche skoene sine til riktig system.
    compatible_clipless_pedal_system:
      name: Kompatibelt klikkfritt pedalsystem
      description: Identifiserer den spesifikke standarden for klikkløs pedal/klosser
        som produktet er designet for å samhandle med.
    compatible_clutch_type:
      name: Kompatibel clutchtype
      description: Kompatibilitet med clutchgrensesnitt for svinghjulet (der det er
        aktuelt).
    compatible_coffee_pod_system:
      name: Kompatibelt kaffepodsystem
      description: Angir kaffemaskinen eller bryggesystemet som podene eller kapslene
        er utviklet for.
    compatible_construction_set_system:
      name: Kompatibelt byggesettsystem
      description: Angir hvilket byggesystem/merkevareøkosystem settet er kompatibelt
        med (f.eks. LEGO-kompatibelt, DUPLO-kompatibelt).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibelt stativ/pinne for kontrabassklarinett
      description: Indikerer ønsket stativ-/knagggrensesnitt eller støttetype.
    compatible_coolant_chemistry:
      name: Kompatibel kjølevæskekjemi
      description: Angir hvilke kjølemiddelfamilier tilsetningsstoffet er formulert
        for å være kompatibelt med.
    compatible_cooling_system_material:
      name: Kompatibelt kjølesystemmateriale
      description: Spesifiserer hvilke kjølesystemer/materialer radiatorspylingen
        er trygg for (f.eks. aluminiumsradiatorer, systemer med blandet metall).
    compatible_crib_format:
      name: Kompatibel krybbeformat
      description: Definerer den generelle størrelses- eller formen til madrassen
        eller lakenet som tilbehøret er designet for å passe.
    compatible_cross_stitch_fabric_count:
      name: Kompatibelt antall korsstingsstoffer
      description: Anbefalt stofftall for å sy designet.
    compatible_cross_stitch_frame:
      name: Kompatibel ramme
      description: Angir hva rammen er beregnet for bruk med (håndholdt bruk, bordstativ,
        gulvstativ eller universalstativ).
    compatible_crossbar:
      name: Kompatibel tverrstang
      description: Kompatibilitet mellom spolen og kjøretøyets takstolpers tverrstenger
        (hvis takmontert), inkludert tverrstengers former/profilstandarder.
    compatible_cycling_cleat:
      name: Kompatibel sykkelsko
      description: Angir klossene eller pedalsystemet sykkelskoene er designet for
        å fungere med.
    compatible_cymbal_size:
      name: Kompatibel symbalstørrelse
      description: Angir den tiltenkte (eller maksimale) cymbaldiameteren som esken
        er designet for å passe til; dette er kompatibilitet for cymbalstørrelse,
        ikke eskens ytre diameter.
    compatible_device_type:
      name: Kompatibel enhetstype
      description: Angir hva slags enhet festet er ment å holde (f.eks. skjerm/TV,
        nettbrett, smarttelefon, bærbar DVD-spiller).
    compatible_dock_structure_type:
      name: Kompatibel dock
      description: Dock som trinnene er konstruert for å monteres på.
    compatible_dough_type:
      name: Kompatibel deigtype
      description: Spesifiserer hvilke typer/merkevare deig verktøyene er designet
        for å fungere med (f.eks. standard leire, modell-leire).
    compatible_drawing_ink_surface:
      name: Kompatibel tegneblekkoverflate
      description: Indikerer anbefalte overflater/underlag for best ytelse.
    compatible_drivetrain_brand:
      name: Kompatibelt drivverk-merke
      description: Lister opp drivverket eller bremsesystemet som kabelen er designet
        for å fungere med.
    compatible_drivetrain_speeds:
      name: Kompatible drivverkhastigheter
      description: Angir antall drivverkgir (f.eks. 10-gir) som kranken eller krankdrevet
        støtter.
    compatible_equipment:
      name: Kompatibelt utstyr
      description: Angir hvilken type vintersportsutstyr skrustikken er designet for
        å holde.
    compatible_evap_system:
      name: Kompatibelt EVAP-system
      description: Angir om tannlokket er konstruert for å oppfylle kravene til EVAP-systemet
        (f.eks. OEM-spesifikasjonsforsegling) og redusere antall motorlamper.
    compatible_exercise_bike_style:
      name: Kompatibel ergometersykkelstil
      description: Angir hvilke typer ergometersykler tilbehøret eller reservedelen
        er designet for å passe.
    compatible_fencing_weapon:
      name: Kompatibelt fektevåpen
      description: Angir hvilket fektevåpen eller hvilken disiplin jakken eller laméen
        er beregnet på.
    compatible_fiber_type:
      name: Kompatibel fibertype
      description: Primærfibertyper trommelkarderen er ment å behandle effektivt.
    compatible_fin_box_system:
      name: Kompatibelt finnekassesystem
      description: Identifiserer finneboksen eller monteringssystemet finnen er designet
        for å passe til, slik at surfere kan kjøpe finner som er kompatible med surfebrettet
        deres (f.eks. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Kompatibel fingerbrettradius
      description: Angir gripebrettradiusen (flat, buet eller sammensatt) capoen er
        designet for å matche for jevnt trykk og redusert summing.
    compatible_finish_type:
      name: Kompatibel overflatebehandlingstype
      description: Angir hvilke instrumentoverflatetyper sprayen er oppgitt å være
        trygg for.
    compatible_fishing_reel_type:
      name: Kompatibel fiskesnelletype
      description: Angir typen fiskesnelle tilbehøret er designet for å passe til
        eller fungere med (f.eks. spinning, agnkasting, flue).
    compatible_fly_line_weight:
      name: Kompatibel fluesnørevekt
      description: Indikerer AFTMA fluesnørevektene som spolen er designet for å holde.
    compatible_flywheel_type:
      name: Kompatibel flyhjul-type
      description: Angir svinghjulstypen som clutchtrykkplaten er ment å brukes med.
    compatible_football_kick_type:
      name: Kompatibel fotballsparktype
      description: Identifiserer sparkesituasjonene produktet er designet for å støtte
        (f.eks. avspark, mål), slik at utøvere raskt finner passende utstyr.
    compatible_fuel_system_type:
      name: Kompatibel drivstoffsystem-type
      description: Angir drivstoffleveringssystemet som rengjøringsmiddelet er konstruert
        for.
    compatible_gas_type:
      name: Kompatibel gasstype
      description: Identifiserer typen komprimert gass som paintball-lufttanken er
        designet for.
    compatible_gel_wax_additives:
      name: Kompatible gelvokstilsetningsstoffer
      description: Angir hvilke tilsetningsstoffer som er kompatible med denne gelvoksen
        (f.eks. fargestofftype, integrert).
    compatible_glaze_layering:
      name: Kompatibel glasurlagdeling
      description: Om glasuren er ment å legges lagvis med andre glasurer for å skape
        effekter.
    compatible_golf_bag_type:
      name: Kompatibel golfvesketype
      description: Angir hvilke golfbagformater trekket eller esken passer til.
    compatible_ground_polarity:
      name: Kompatibel jordpolaritet
      description: Angir om spenningsregulatoren er beregnet for kjøretøyets elektriske
        systemer med negativ eller positiv jord (eller ikke er polaritetsfølsom).
    compatible_guitar_body_shape:
      name: Kompatible gitarformer
      description: Angir hvilken gitarkropp/form esken er designet for å passe til.
    compatible_guitar_case:
      name: Kompatibel gitar-eske
      description: Angir hvilke gitar-eske-stiler luftfukteren er designet for å passe
        og fungere ordentlig i.
    compatible_guitar_scale_length:
      name: Kompatibel gitarskalalengde
      description: Angir hvilken(e) gitarskalalengde(r) styrkesettet er ment å passe
        til (basert på viklingslengde/total lengde).
    compatible_gun_platform:
      name: Kompatibel våpenplattform
      description: Angir driftsplattformen eller strømkilden som produktet er kompatibelt
        med (f.eks. AEG, GBB, HPA).
    compatible_hair_length:
      name: Kompatibel hårlengde
      description: Angir maksimal hårlengde eller -volum som hodeplagget komfortabelt
        tåler.
    compatible_head_and_neck_restraint_system:
      name: Kompatibelt hode- og nakkestøttesystem
      description: Angir om hjelmen har forankringspunkter og/eller er kompatibel
        med hode- og nakkestøttesystemer (f.eks. HANS), inkludert status for inkludert/montering
        av forankringsstolper.
    compatible_helmet_certification_standard:
      name: Standard for kompatibel hjelmsertifisering
      description: Indikerer eventuelle sikkerhetsstandarder eller sertifiseringer
        for hjelmtilbehøret er designet for å støtte (f.eks. refererer ofte tear-offs
        til konkurransebruk til spesifikke sanksjonsregler).
    compatible_helmet_shell_size:
      name: Kompatibel hjelmskallstørrelse
      description: Angir hvilken(e) hjelmskallstørrelse(r) en erstatningsinnvendig
        del passer til (skallstørrelse tilordnes ofte størrelsesområder som XS–S,
        M, L–XL).
    compatible_helmet_size:
      name: Kompatibel hjelmstørrelse
      description: Angir hjelmstørrelsen som ansiktsmasken er kompatibel med.
    compatible_helmet_type:
      name: Kompatibel hjelmtype
      description: Hjelmkategorien nakkestøtten er designet for å fungere med.
    compatible_hitch_receiver_size:
      name: Kompatibel størrelse på tilhengerfestet
      description: Åpningsstørrelsen på tilhengerfestet som tilbehøret er designet
        for å passe (for tilhengerfestemontert Reol-tilbehør).
    compatible_hook_size:
      name: Kompatibel krokstørrelse
      description: Heklet krokstørrelsessystem(er) og/eller størrelsesserie arrangøren
        er designet for å passe (f.eks. US bokstav-/nummerstørrelse, målestokk mm-område).
    compatible_horse_coat_type:
      name: Kompatibel hestepelstype
      description: Angir hvilke pelsegenskaper hesten fjerner hårfjerningsmiddelet
        er best egnet for (f.eks. tykk vinterpels eller sensitiv pels).
    compatible_host_platform:
      name: Kompatibel vertsplattform
      description: Angir hvilke driftsplattformer eller enhetstyper tastaturkontrolløren/behandlingsansvarlig
        er kompatibel med (f.eks. Windows, macOS, iOS, Android), eller om den kan
        fungere frittstående uten datamaskin.
    compatible_inflation_gas:
      name: Kompatibel inflasjongass
      description: Angir hva ballongen er ment å bli oppblåst med (luft, helium eller
        begge deler).
    compatible_injection_type:
      name: Kompatibel injeksjonstype
      description: Angir hvilket drivstoffinnsprøytningssystem produktet er konstruert
        for å rengjøre.
    compatible_instrument_surface_material:
      name: Kompatibel instrumentoverflate/-materiale
      description: Angir hvilke instrumentoverflater/materialer poleringen er ment
        å brukes på.
    compatible_intercom_system:
      name: Kompatibelt intercom-system
      description: Indikerer hjelmens klargjøring/kompatibilitet for montering eller
        installasjon av hjelminterkom-/kommunikasjonssystem.
    compatible_interior_material:
      name: Kompatibel interiørmateriale
      description: Angir hvilke materialer i kjøretøyets interiør flekkfjerneren er
        trygg/effektiv for (f.eks. teppe, stoffmøbeltrekk, skinn, vinyl).
    compatible_kayak_type:
      name: Kompatibel kayaktype
      description: Viser de generelle kajakktypene seilsettet er designet for montering
        på.
    compatible_license_plate_hole_pattern:
      name: Kompatibelt hullmønster for nummerskilt
      description: Angir monteringshullkonfigurasjonen som støttes av festet/holderen
        (kjøretøyside og/eller plateside).
    compatible_license_plate_size:
      name: Kompatibel nummerskiltstørrelse
      description: Angir den regionale eller dimensjonale nummerskiltstørrelsen(e)
        som festet/holderen er designet for å passe.
    compatible_loom:
      name: Kompatibel vevstol
      description: Angir vevstoltypen(e) som flatvevemaskinen er ment å brukes med.
    compatible_loom_type:
      name: Kompatibel vevtype
      description: Angir hvilken veveoppsett slåen er beregnet for å brukes med (f.eks.
        stive kamvever vs. billedvever).
    compatible_machine_type:
      name: Kompatibel maskintype
      description: Angir hvilken type quilteoppsett rammen er designet for å fungere
        med (kun håndquilting, hjemmebasert symaskin, langarmsquiltemaskin).
    compatible_mast_type:
      name: Kompatibel masttype
      description: 'Angir hvilke mastediametre seilet er designet for: redusert diameter
        (RDM), standard diameter (SDM), eller begge deler.'
    compatible_model_system_train_scale:
      name: Kompatibelt modellsystem (togskala)
      description: Angir modelltogskalaen/systemet som tilbehøret passer til når det
        er aktuelt (f.eks. HO, N, O).
    compatible_mounting_surface:
      name: Kompatibel monteringsoverflate
      description: Den tiltenkte overflaten eller gjenstanden klipsen er designet
        for å festes til.
    compatible_mouthpiece_patch:
      name: Kompatibel munnstykkelapp
      description: Angir om munnstykket er designet for bruk med munnstykkeputer/plaster
        og anbefalt tykkelsesområde for plasteret.
    compatible_mouthpiece_type:
      name: Kompatibel munnstykketype
      description: Angir hvilken type munnstykke/skaft melofonen er designet for å
        bruke (vanligvis valthorn- eller trompetmottakere avhengig av modell).
    compatible_neck_profile_width:
      name: Kompatibel halsprofil/bredde
      description: Angir gitarhalsprofilen/breddeklassen som capoen er designet for
        å passe til (f.eks. smal elektrisk vs. bred klassisk).
    compatible_needle_size:
      name: Kompatibel nålstørrelse
      description: Angir nålstørrelsen/typene esken er ment å passe til (f.eks. broderi,
        billedvev, håndsyningsnållengder).
    compatible_needle_system:
      name: Kompatibelt nålsystem
      description: Nålesystem(er) maskinen er kompatibel med (f.eks. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibel parkeringsbremsemekanisme
      description: Angir om bremsekaliperen er konstruert for å fungere med en integrert
        parkeringsbremsemekanisme.
    compatible_pedal_instrument_type:
      name: Kompatibel pedalinstrumenttype
      description: Angir hva pedalen er ment å brukes med (f.eks. digitalt piano,
        keyboard/synth, MIDI-kontrollør/behandlingsansvarlig).
    compatible_pedal_type:
      name: Kompatibel pedaltype
      description: Angir pedaltypen eller -systemet stroppen eller klipsen er designet
        for å passe (f.eks. plattform, SPD, Look Keo).
    compatible_pin_type:
      name: Kompatibel nåltype
      description: Hvilken type pinnet matten er designet for bruk med (eller om den
        er pinnet-egnet).
    compatible_pipe_filter_size:
      name: Kompatibel rørfilterstørrelse
      description: Indikerer filterstørrelsen eller -typen røret er konstruert for
        å akseptere (eller at det ikke kreves noe filter).
    compatible_plate_size:
      name: Kompatibel platestørrelse
      description: Ballistisk platedimensjon eller standardisert størrelse som vesten
        kan akseptere.
    compatible_play_vehicle_scale:
      name: Kompatibel lekekjøretøy-skala
      description: Angir leketøyskalaen tilbehøret er designet for å passe til (f.eks.
        1:64), noe som forbedrer passform/kompatibilitet for samlere og sporsystemer.
    compatible_playing_surface:
      name: Kompatibel lekeoverflate
      description: Angir hvilken type spillebane eller underlag de amerikanske fotballskoene
        er designet for.
    compatible_pole_dimensions:
      name: Kompatible poldimensjoner
      description: Angir størrelsen på stolpetverrsnittet som tilbehøret passer til.
    compatible_pole_shape:
      name: Kompatible stolpeformer
      description: Angir former til stolpen eller kolonnen som utfyllingen er utformet
        for å passe til.
    compatible_power_steering_system:
      name: Kompatibelt servostyringssystem
      description: Angir hvilken(e) styresystemtype(r) væsken er beregnet for.
    compatible_powerplant_type:
      name: Kompatibel kraftverkstype
      description: Angir fremdriftssystemet til luftgeværet delen er beregnet for
        (f.eks. fjærstempel, CO2, PCP).
    compatible_presser_foot:
      name: Kompatibel trykkfot
      description: Angir trykkfotmonterings-/kompatibilitetssystemet som støttes av
        symaskinen (f.eks. klikk-på vs. skru-på; lav/høy/skrå skaft). Bruk «Universal/Multiple»
        hvis flere systemer støttes eller adaptere er inkludert.
    compatible_protective_gear:
      name: Kompatibelt verneutstyr
      description: Spesifiserer hvilket annet verneutstyr nakkestøtten er konstruert
        for å fungere med.
    compatible_protective_gear_integration:
      name: Kompatibel integrering av verneutstyr
      description: Beskriver hvordan beskytteren er ment å brukes eller integreres
        med annet utstyr (f.eks. innstikkslomme, frittstående strap-on).
    compatible_punching_bag_type:
      name: Kompatibel boksesekktype
      description: Angir hvilke boksesekk- eller treningssekktyper produktet er kompatibelt
        med.
    compatible_racing_discipline:
      name: Kompatibel racingdisiplin
      description: Motorsportdisiplinen(e) hjelmen er beregnet/sertifisert for.
    compatible_rc_scale:
      name: Kompatibel RC-skala
      description: Angir RC-skalaforholdet (f.eks. 1:10) som tilbehøret eller delen
        er designet for å passe.
    compatible_recorder_size:
      name: Kompatibel opptakerstørrelse
      description: Angir hvilken(e) opptakerstørrelse(r) esken er designet for å passe
        til.
    compatible_recorder_type:
      name: Kompatibel opptakertype
      description: Angir blokkfløytetypen (familie/størrelse) tilbehøret er kompatibelt
        med (f.eks. sopran, alt).
    compatible_reed_cut:
      name: Kompatibelt rørblad-format
      description: Angir hvilken rørsnittstil ligaturen er ment å være kompatibel
        med (f.eks. fil/fransk snitt vs. ufilet/amerikansk snitt).
    compatible_reed_type:
      name: Kompatibel rørblad-type
      description: Angir rørsnittet/typen munnstykket er designet for.
    compatible_reel_type:
      name: Kompatibel spoletype
      description: Angir hvilken type fiskesnelle vesken, esken eller trekket er designet
        for å passe til.
    compatible_refrigerant_type:
      name: Kompatibel kjølemiddeltype
      description: Angir hvilket kjølemiddel AC-fordamperen er beregnet for bruk med.
    compatible_ride_equipment:
      name: Kompatibelt rideutstyr
      description: Typer hjulbasert sportsutstyr rampen er beregnet for.
    compatible_roof_height:
      name: Kompatibel takhøyde
      description: Angir hvilken takprofil taket er beregnet for (standard vs. forlenget/høyt
        tak).
    compatible_roof_rail_type:
      name: Kompatibel takrelingstype
      description: Angir hvilken takkonfigurasjon basisreolsystemet er utformet for
        å festes til.
    compatible_rope_count:
      name: Kompatibelt tauantall
      description: Angir bokseringstaukonfigurasjonen som delen er designet for, for
        eksempel 3-tauringer, 4-tauringer eller universal passform.
    compatible_rope_type:
      name: Kompatibel tautype
      description: Spesifiserer hvilke taukonstruksjoner som kan brukes med enheten.
    compatible_saddle_type:
      name: Kompatibel saltype
      description: Angir setestilen eller ridedisiplinen tilbehøret er designet for
        å passe, og sikrer korrekt kompatibilitet på tvers av engelske, vestlige og
        andre saler.
    compatible_saxophone_size:
      name: Kompatibel saksofonstørrelse
      description: Angir hvilken saksofonstørrelse produktet er kompatibelt med (f.eks.
        sopran, alt, tenor).
    compatible_saxophone_type:
      name: Kompatibel saksofontype
      description: Angir hvilken saksofon ligaturen/hetten er designet for å passe.
    compatible_scale_length:
      name: Kompatibel skalalengde
      description: Identifiserer lengdeområdet for gitarskalaen som styrken er ment
        for (f.eks. kort skala, standard, baryton).
    compatible_seat_airbag:
      name: Kompatibel setekollisjonspute
      description: Angir om setet har sidekollisjonsputer eller er kompatibelt med
        kjøretøy utstyrt med setemonterte kollisjonsputer.
    compatible_seating_capacity:
      name: Kompatibel sittekapasitet
      description: Angir antall seter eller konfigurasjonen tilbehøret er utformet
        for å passe.
    compatible_sensor_port_type:
      name: Kompatibel sensorporttype
      description: Angir om oljepannen støtter oljenivå og/eller oljetemperatursensorer
        og portstil hvis aktuelt.
    compatible_shifter_type:
      name: Kompatibel skiftertype
      description: Identifiserer girspaktypen eller -konfigurasjonen som girmansjetten
        er designet for å passe.
    compatible_shis:
      name: Kompatibel SHIS
      description: Viser SHIS-koden(e) for standardisert headsetidentifikasjonssystem
        (f.eks. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Kompatibel skatedisiplin
      description: Angir hvilken(e) skøytedisiplin(er) delen eller tilbehøret er designet
        for å passe til.
    compatible_snowshoe_deck_type:
      name: Kompatibel type trugedekk
      description: Angir ramme eller dekktypen som bindingen er kompatibel med.
    compatible_special_effects_lighting_features:
      name: Kompatible spesialeffektbelysningsfunksjoner
      description: Highlight vanlige funksjonalitetsflagg som styrer kjøpsbeslutninger
        for effektlys (utover farge/mønster), for eksempel å koble sammen enheter
        eller reagere på lyd.
    compatible_spinning_wheel_drive_system:
      name: Kompatibelt spinnhjulsdriftssystem
      description: Angir hvilket/hvilke spinnhjulsdriftssystem(er) tilbehøret støtter.
    compatible_spoke_gauge:
      name: Kompatibel eikemåler
      description: Indikerer eiketrådens størrelse(r) og nippeltrådens passform, slik
        at kjøperen kan matche eiker og nipler riktig.
    compatible_steering_wheel_airbag:
      name: Kompatibel rattkollisjonspute
      description: Angir om rattet støtter en original airbagmodul (eller er beregnet
        for bruk uten airbag).
    compatible_steering_wheel_control_button:
      name: Kompatibel rattkontrollknapp
      description: Indikerer kompatibilitet med fabrikkmonterte rattkontroller (lyd/cruise/telefon)
        og tilhørende ledninger.
    compatible_stencil_material:
      name: Kompatibelt stensilmateriale
      description: Materialer maskinen kan lage sjablonger fra eller bearbeide (f.eks.
        papir, plastfilm, mylar).
    compatible_stencil_media_format:
      name: Kompatibelt sjablongmedieformat
      description: 'Angir hvilke sjablongmedier som formfaktorer maskinen støtter:
        ark, ruller eller begge deler.'
    compatible_strap_retractor:
      name: Kompatibel stropptrekker
      description: Angir om stroppen er kompatibel med uttrekkbare systemer eller
        er designet for ikke-uttrekkbare (statiske) belter.
    compatible_string_instrument_finish:
      name: Kompatibel overflatebehandling på strengeinstrument-
      description: Angir hvilke instrumentfinishtyper poleringen er trygg å bruke
        på.
    compatible_substrate_material:
      name: Kompatibelt substratmateriale
      description: Overflatematerialet(ene) malingen er formulert for å feste seg
        til.
    compatible_surface:
      name: Kompatibel overflate
      description: Angir overflaten/materialet som borrelåslimet er ment å feste seg
        til.
    compatible_surface_material:
      name: Kompatibel overflatemateriale
      description: Kjøretøyoverflatematerialer som produktet er designet for bruk
        på.
    compatible_tear_off_system:
      name: Kompatibelt avrivningssystem
      description: Angir om brillene har tear-offs og/eller roll-offs, inkludert om
        de har monteringsstolper for tear-offs.
    compatible_thermostat_type:
      name: Kompatibel termostattype
      description: Om vannhalsen/-huset er konstruert for å motta en termostat, og
        i så fall hvilken type/størrelse.
    compatible_thread:
      name: Kompatibel tråd
      description: Angir hvilke typer tråd/garn trådføreren er beregnet for (etter
        tykkelse/type).
    compatible_thread_spool_format:
      name: Kompatibelt tråd-/spoleformat
      description: Angir hvilke trådformater esken er designet for butikk (sneller,
        spoler, tanntrådspoler/kort, kjegler osv.).
    compatible_thread_yarn_tool:
      name: Kompatibelt tråd- og garnverktøy
      description: Maskin-/systemkompatibilitet for verktøy som monteres på eller
        brukes med annet utstyr (f.eks. symaskin, overlockmaskin/overlocker, vevstol,
        spinnehjul).
    compatible_tire_application:
      name: Kompatibel dekkapp
      description: Angir dekk-/felggruppen som kantbryteren er beregnet for (basert
        på dekket/felgen som skal vedlikeholdes, ikke kjøretøymodellen).
    compatible_tom_pad_mounting:
      name: Kompatibel montering av tammepad
      description: Angir hva den elektroniske tammen monteres på (f.eks. klemme-/stangfeste,
        L-stang, stativfeste), noe som påvirker om den passer til eksisterende reol-systemer.
    compatible_toy_vehicle_scale:
      name: Kompatibel lekekjøretøyskala
      description: Angir lekekjøretøyets skala eller omtrentlige kjøretøystørrelse
        som lekesettet er kompatibelt med.
    compatible_tpms_sensor_type:
      name: Kompatibel TPMS-sensortype
      description: Angir om hjulet støtter TPMS-sensorer og/eller en hvilken som helst
        nødvendig ventil-/sensortype.
    compatible_training_equipment:
      name: Kompatibelt treningsutstyr
      description: Angir hvilke typer trenings- eller fitnessapparater som kan festes
        til festet.
    compatible_treadmill_design:
      name: Kompatibel tredemølledesign
      description: Angir tredemølledesignet tilbehøret er kompatibelt med, for eksempel
        sammenleggbare eller ikke-sammenleggbare modeller.
    compatible_tube:
      name: Kompatibelt rør
      description: Angir hvilken slange- eller dekkkonstruksjon lappen er designet
        for, for eksempel butyl, lateks, TPU eller slangeløs.
    compatible_valve_type:
      name: Kompatibel ventiltype
      description: Angir hvilken messingventiltype smøremiddelet er kompatibelt med.
    compatible_vaporizing_material:
      name: Kompatibelt fordampningsmateriale
      description: Angir materialtypene enheten er designet for å fordampe.
    compatible_vehicle_windshield_fluid:
      name: Kompatibel frontrutevæske
      description: Kompatibilitetspåstander knyttet til kjøretøyutstyr eller glasshåndtering
        (f.eks. trygt for regnavvisende belegg, trygt for lyktespylere).
    compatible_visor_system:
      name: Kompatibel visirsystem
      description: Angir hvilke visir-/innsatssystemer motorsykkelhjelmen er kompatibel
        med.
    compatible_water_board_type:
      name: Kompatibel vannbrettype
      description: Hvilke vannsportbrett realen er ment å ha med seg.
    compatible_water_sport_board_type:
      name: Kompatibel type vannsportbrett
      description: Viser hvilke typer brett som realen er designet for å transportere.
    compatible_watercraft_communication_standard:
      name: Kompatibel kommunikasjonsstandard for vannscootere
      description: Spesifiserer støttede marin kommunikasjons/nettverkstandarder eller
        integrasjonsprotokoller for interoperabilitet med tilstedeværende elektronikk.
    compatible_watercraft_engine_type:
      name: Kompatibel vannscootermotortype
      description: Angir målkonfigurasjonen av drivverket som delen passer til (påhengsmotor/innenbordsmotor/hekkaggregat/jetmotor).
    compatible_weight_plate_diameter:
      name: Kompatibel vektplatediameter
      description: Angir hvilke vektplatediametre maskinen aksepterer.
    compatible_wheel_finish:
      name: Kompatibel felgfinish
      description: Spesifiserer hjuloverflatene/materialene som rengjøringsmiddelet
        er trygt å bruke på (som hevdet av produsenten).
    compatible_whorl_drive_band_type:
      name: Kompatibel type virveldrev
      description: Angir hvilken drivbåndstil virvelen er ment å fungere med.
    compatible_wick_series:
      name: Kompatible vekeserier
      description: Indikerer vanlige vekeserier/-typer som viften er designet for
        å passe til (bransjenavn), hvis spesifisert av selgeren.
    compatible_winder_head_bit:
      name: Kompatibelt viklerhode/-bit
      description: Angir grensesnittstypen for tunernøkkel/hode på oppviklingsstøtten
        (f.eks. sporhode, utskiftbare bits, universalhode).
    compatible_windlass_rode:
      name: Kompatibel vinsjstang
      description: Angir hvilken type ankerfeste vinsjen er designet for å referere
        til.
    compatible_windshield_type:
      name: Kompatibel frontrutetype
      description: Angir hvilken frontruteoppsett kabinettet er konstruert for å fungere
        med.
    compatible_wood:
      name: Kompatibelt treverk
      description: Angir hvilke tresorter for gripebrett poleringen anbefales/er trygg
        for.
    compatible_writing_surface:
      name: Kompatibel skriveoverflate
      description: Angir overflater/papir som blekket er ment å fungere best på.
    compatible_zipper_size:
      name: Kompatibel glidelåsstørrelse
      description: 'Angir glidelåsstørrelsen som håndtaket er ment å passe til (ofte
        uttrykt som #3, #5, #8, #10), noe som forbedrer kompatibilitetsfiltreringen.'
    compliance_certification:
      name: Samsvarssertifisering
      description: Samsvars-/godkjenningsstandarder oppfylt av lysbjelken for bruk
        på vei og elektromagnetisk kompatibilitet.
    component_position:
      name: Komponentposisjon
      description: Angir delens relative posisjon i motorens registeringsenhet (f.eks.
        foran vs. bakdeksel, øvre vs. nedre). Ikke kjøretøyets plassering foran/bak.
    concentration_level:
      name: Konsentrasjonsnivå
      description: Kvalitativ indikasjon på hvor konsentrert tomatpuréen er (enkel,
        dobbel, trippel), nyttig for å matche oppskriftskrav.
    concentration_type:
      name: Konsentrasjonstype
      description: Angir om produktet er bruksklart eller konsentrat, og (hvis konsentrat)
        typiske fortynningsanvisninger.
    concert_bass_drum_mounting_stand_type:
      name: Stativ for montering av konsertbasstromme
      description: Hvordan konsertbasstrommen støttes eller monteres for ytelse.
    concert_pitch_standard:
      name: Standard for konserttone
      description: Angir konserttonereferansen (A4) som pianoet er stemt til ved salgstidspunktet
        (f.eks. A440, A442, A444).
    condiment_form:
      name: Krydderform
      description: Angir den fysiske formen eller konsistensen til pepperrotproduktet
        (f.eks. pasta, pulver, krem).
    condiment_texture:
      name: Kryddertekstur
      description: Beskriver den fysiske konsistensen til relish eller chutney (f.eks.
        klumpete, glatt).
    confetti_format:
      name: Konfettiformat
      description: Angir konfettiproduktformatet basert på hvordan konfettien er pakket
        eller lansert (f.eks. løse spredningselementer kontra poppere/kanoner).
    conga_head_tensioning_system:
      name: Conga-hodestrammingssystem
      description: Type maskinvare som brukes til å stramme/stemme kongahodet (f.eks.
        tradisjonell lug-justering kontra moderne hurtigjusteringsmekanismer).
    conga_set_included_drum_types:
      name: Conga-sett inkludert trommetyper
      description: Hvilke congatyper er inkludert i et congasett (f.eks. quinto +
        conga + tumba).
    connector_case_style:
      name: Kobling i eske-stil
      description: Klassifiserer den generelle konstruksjonsstilen til koblingsesken
        (f.eks. hardt skall vs. myk veske) for å gjenspeile beskyttelsesnivå og bærbarhet.
    console_cover_installation_method:
      name: Monteringsmetode for konsolldeksel
      description: Angir hvordan konsolltrekket festes til konsollen/armlenet (f.eks.
        slip-on, elastiske stropper, borrelås, selvklebende, klips).
    console_display_type:
      name: Konsollskjermtype
      description: Identifiserer typen brukerskjerm som finnes på maskinen (f.eks.
        LCD, LED, berøringsskjerm).
    construction_design:
      name: Konstruksjonsdesign
      description: Angir hvor mange leddede deler som utgjør puten, påvirkning (f.eks.
        1-delt vs. 3-delt).
    contact_angle:
      name: Kontaktvinkel
      description: Angir kontaktvinkelen til lagerringene, uttrykt som en enkelt vinkel
        eller et parvis vinkelsett (f.eks. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Kontakt sjongleringsball fylltype
      description: Identifiserer om ballen er solid eller fylt (og hvis fylt, hva
        slags fyll), noe som påvirker vektfordeling og holdbarhet.
    contact_juggling_ball_transparency:
      name: Gjennomsiktighet av kontaktjongleringsball
      description: Angir ballens gjennomsiktighet/optiske utseende.
    contact_surface_material:
      name: Materiale på kontaktoverflate
      description: Identifiserer materialet som brukes på kontaktpunktene som berører
        instrumentet (f.eks. kork/gummi) for å forhindre riper og forbedre grepet.
    container_material:
      name: Beholdermateriale
      description: Spesifiserer hovedmaterialet i produktets beholder (f.eks. glass,
        polyetylen-tereftalatplast, aluminium).
    contaminant_removal:
      name: Fjerning av forurensninger
      description: Lister opp klassene av forurensninger som produktet er sertifisert
        for å fjerne eller redusere.
    contra_alto_clarinet_body_configuration:
      name: Kontra-alt klarinett kroppskonfigurasjon
      description: Beskriver den fysiske konstruksjonsformen til kontraaltklarinetten
        (f.eks. rett vs. foldet design).
    contra_alto_clarinet_lowest_note_extension:
      name: Kontra-alt klarinett laveste noteutvidelse
      description: Angir instrumentets laveste spillbare noteutvidelse (den laveste
        noten klaviaturet tillater), vanligvis brukt for å skille mellom lav E♭ og
        lav D og lav C-modeller.
    contra_bass_clarinet_bell_type:
      name: Kontrabassklarinettklokketype
      description: Klokkekonfigurasjon brukt på kontrabassklarinetten.
    contra_bass_clarinet_bore_type:
      name: Hullype for kontrabass-klarinett
      description: Instrumentets boredesign.
    contra_bass_clarinet_lowest_written_note:
      name: Laveste nominelle note for kontrabass-klarinett
      description: Den laveste skrevne noten instrumentet kan spille (avhenger ofte
        av lav C kontra lav Eb-utvidelse).
    control_arm_bushing_material:
      name: Materiale for kontrollarmforing
      description: Spesifiserer materialet til de inkluderte/installerte foringene,
        hvis de finnes.
    control_arm_bushings_included:
      name: Kontrollarmforinger inkludert
      description: Angir om kontrollarmen sender med installerte foringer.
    control_arm_finish:
      name: Kontrollarmfinish
      description: Angir den beskyttende overflaten som er påført kontrollarmen (korrosjonsbeskyttelse
        og utseende).
    control_arm_grease_fitting_type:
      name: Smørenippeltype for kontrollarm
      description: Angir om kontrollarmen/kuleleddsenheten inkluderer en smørenippel
        (zerk) og om den er brukbar.
    control_arm_material:
      name: Materiale for kontrollarm
      description: Spesifiserer hovedmaterialet og produksjonskonstruksjonen til kontrollarmhuset.
    control_arm_position:
      name: Kontrollarmposisjon
      description: Angir fjæringsposisjonen kontrollarmen er konstruert for innenfor
        akselens hjørne/side (f.eks. øvre/nedre, foran/bak, venstre/høyre).
    control_arm_style:
      name: Kontrollarmstil
      description: Identifiserer den geometriske/designmessige stilen til kontrollarmen
        som brukes i hjulopphengets layout.
    control_cable_connector_type:
      name: Kontrollkabelkoblingstype
      description: Angir ende-/koblingstypen som brukes av kontrollkabelen(e) for
        å koble til kontrollen og motoren (f.eks. OEM-spesifikke endekoblinger).
    control_voltage_or_gate_connectivity:
      name: Kontrollspenning eller gate-tilkobling
      description: Angir kontrollspenningen / portforbindelsesstøtten for integrering
        med modulært/analogt utstyr.
    controller_function:
      name: Kontrollerfunksjon
      description: Definerer den primære rollen på tredemøllens kontrollkort, for
        eksempel motorstyring, strømtilførsel eller inverterdrift.
    controller_type:
      name: Kontrollertype
      description: Spesifiserer motorkontrollør/behandlingsansvarlig/kontrollsystem
        som følger med scooterens EV-veksling/vekslingssett (eller nødvendig for bruk),
        med fokus på kontrollør/behandlingsansvarlig egenskaper som er relevante for
        kompatibilitet og ytelse.
    conversion_kit_cooling_method:
      name: Konvertering/veksling innstilling kjølemetode
      description: Primær termisk styringsmetod som brukes for integrering av motor/inverter/batteri.
    conversion_kit_installation_complexity:
      name: Installasjonskompleksitet for konvertering/veksling
      description: Forventet installasjonsarbeidsnivå basert på typisk kundeferdighet/nødvendig
        verktøy.
    converted_bed_size:
      name: Størrelse på ombygd seng
      description: Angir sengens størrelse eller konfigurasjon som sprinkelsengen
        vil konverteres til når denne innstillingen er installert.
    convertible_configuration:
      name: Konvertibel konfigurasjon
      description: Angir hvor mange forskjellige sengekonfigurasjoner produktet kan
        konverteres til (f.eks. 3-i-1-spring → småbarnsseng → dagseng).
    convertible_high_chair_modes:
      name: Konvertible moduser for barnestol
      description: Angir setekonfigurasjonene stolen kan konverteres til.
    cookie_decorating_kit_items_included:
      name: Inkludert settgjenstander for kjeksdekorasjon
      description: Lister opp de enkelte dekorasjonskomponentene som følger med, slik
        at kundene vet nøyaktig hva som leveres er i esken (f.eks. glasurrør, strøssel,
        informasjonsutstikkere).
    cookie_variety:
      name: Kjeksvariasjon
      description: Identifiserer den spesifikke stilen eller varianten av kjeks, noe
        som hjelper kunder med raskt å finne sin foretrukne type.
    cooking_state:
      name: Koketilstand
      description: Angir beredskapsnivået til kyllingproduktet når det selges (rå,
        ferdigkokt, marinert osv.).
    coolant_additive_purpose:
      name: Formål med kjølevæsketilsetning
      description: Kjølevæskeadditivets primære tiltenkte funksjoner (ikke radiatorspyling
        eller dedikert tetningsmiddel).
    coolant_base_fluid:
      name: Kjølevæske-basevæske
      description: Identifiserer den primære glykolbasen som brukes i frostvæske-/kjølevæskeformuleringen.
    coolant_outlet_connection_style:
      name: Kjølevæskeutløp forbindelsesstil
      description: Utløpsforbindelsesgrensesnitttypen som brukes til å feste en radiatorslange
        eller kjølevæskeledning.
    coolant_outlet_neck_angle:
      name: Kjølevæskeutløpshalsvinkel
      description: Vinkelen/retningen på vannhalsutløpet i forhold til monteringsflensen/motoren
        (nyttig for føring av den øvre radiatorslangen).
    coolant_technology:
      name: Kjølevæsketeknologi
      description: Angir kjølevæskekjemien/-teknologifamilien som brukes av frostvæsken/kjølevæsken
        (som vanligvis er merket på emballasjen).
    coolant_temperature_sensor_port:
      name: Sensorport for kjølevæsketemperatur
      description: Om vannhalsen har en port for en kjølevæsketemperatursensor eller
        -bryter, og hvilket grensesnitt den bruker.
    coolant_temperature_sensor_seal_type:
      name: Forseglingstype for kjølevæsketemperatursensor
      description: Type tettingsmetode som brukes mellom sensoren og motor-/kjølevæskekanalen.
    cooling_system_component_included:
      name: Kjølesystemkomponent inkludert
      description: Viser en liste over ekstra kjølesystemkomponenter som følger med
        vannpumpen.
    cooling_system_flush_application_step:
      name: Trinn for spyling av kjølesystemapp
      description: Angir hvor produktet passer inn i serviceprosessen (f.eks. forskyllingsrengjøringsmiddel
        kontra sluttskylling/nøytralisator).
    cooling_system_type:
      name: Type kjølesystem
      description: Angir kjølesystemkonfigurasjonen som brukes av en innenbords marinemotor
        (f.eks. råvann/åpen sløyfe, lukket sløyfe/ferskvann med varmeveksler, kjølkjølt).
    cord_material:
      name: Materiale i snor
      description: Angir materialet i snoren/snoren som brukes til å trekke vattpinnen
        gjennom saksofonen.
    core_type_bass_strings:
      name: Kjernetype (bassstyrke)
      description: Spesifiserer formen til strengen, som påvirker følelse og fleksibilitet.
    cork_grease_base_material:
      name: Korkfettbasert materiale
      description: Primærbase i korkfettformuleringen (f.eks. lanolinbasert).
    cork_grease_form:
      name: Korkfettform
      description: Den fysiske formfaktoren til korkfettproduktet.
    corn_presentation:
      name: Maispresentasjon
      description: Angir den fysiske presentasjonen eller formen til maisproduktet
        (f.eks. hele i skall, kjerner, pulver).
    corn_syrup_variety:
      name: Maissirup-variant
      description: Angir den spesifikke stilen eller variant av sirupen.
    corn_variety:
      name: Maisvariant
      description: Identifiserer den spesifikke botaniske eller merkede varianten
        av mais som selges, slik at kunden kan skille mellom typer som er forskjellige
        i smak, tekstur, farge og kulinarisk bruk.
    corner_compatibility:
      name: Hjørnekompatibilitet
      description: Angir former (firkantede eller runde) som dekselet er designet
        for.
    corner_flag_features:
      name: Funksjoner på hjørneflagg
      description: Fremhever spesielle funksjonelle egenskaper eller forbedringer
        av hjørneflagget (f.eks. sammenleggbar stang, reflekterende materiale).
    cornet_mouthpiece_shank_type:
      name: Kornettmunnstykkes skafttype
      description: Spesifiserer munnstykkemottaker/skaftstandarden som støttes av
        kornetten for kompatibilitet.
    cornhole_league_certification:
      name: Cornhole-ligasertifisering
      description: Indikerer offisielle sertifiseringer eller ligagodkjenning som
        produktet oppfyller.
    corrosion_resistance:
      name: Korrosjonsmotstand
      description: Angir korrosjonsbestandigheten eller klassifiseringen av festet/holderen
        for utendørs eksponering.
    corrosion_resistance_level:
      name: Korrosjonsmotstandsnivå
      description: Indikerer korrosjonsbeskyttelse egnet for ferskvanns-/saltvannsmiljøer.
    costume_components_included:
      name: Kostymekomponenter inkludert
      description: Lister opp klesplagg og tilbehør som følger med kostymet, og tydeliggjør
        hva som er en del av settet.
    cotton_weave_type:
      name: Bomullsvevtype
      description: Beskriver vevings-/strikkekonstruksjonen til den trykkbare bomullsoverflaten
        som påvirker tekstur og trykkskarphet.
    counter_type:
      name: Benketype
      description: Indikerer tilstedeværelsen og stilen til innebygd repetisjon eller
        kraftsporing.
    counterweight_fill_material:
      name: Motvektsfyllmateriale
      description: Angir stoffet som kan brukes til å legge til ballast til eller
        forhåndsfylle motvekten.
    counterweight_type:
      name: Motvektstype
      description: Spesifiserer design- eller konstruksjonsstilen til motvekten, for
        eksempel sandsekk eller stålplate, for å lette kompatibilitet og installasjon.
    coupler_system:
      name: Koblingssystem
      description: Koblingstype/-system montert på modelllokomotivet for kompatibilitet
        med rullende materiell.
    court_surface_suitability:
      name: Egnethet for baneoverflaten
      description: Angir hvilken basketballbaneoverflate skoens yttersåle er designet
        for, og hjelper kundene med å velge riktig grep og holdbarhet for innendørs
        trebaner, utendørs asfalt/betong eller begge deler.
    cover_fit_style:
      name: Passform-stil for deksel
      description: Beskriver hvordan trekket passer over bordet, noe som påvirker
        utseende og beskyttelsesnivå.
    cover_fit_type:
      name: Dekseltilpasningstype
      description: Angir om trekket er skreddersydd (spesialtilpasset/delvis spesialtilpasset)
        eller universelt, og om det er beregnet for fortøyning i vann eller lagring/tilhengerbruk.
    cowbell_beater_type:
      name: Kuklokkeslagertype
      description: Anbefalt slagredskapstype for kubjellelyd/-finish (hvis spesifisert
        av produktet).
    cowbell_mounting_method:
      name: Monteringsmetode for kubjelle
      description: Hvordan kubjellen er ment å monteres/brukes (håndholdt vs. montert
        på maskinvare).
    cowbell_sound_character:
      name: Lydkarakter for kubjelle
      description: Generell tonal karakter brukt i oppføring (støtter oppdagelse utover
        størrelse).
    cradle_capacity:
      name: Vuggekapasitet
      description: Angir om vuggen er designet for å holde et enkelt spedbarn eller
        tvillinger.
    craft_cutter_embosser_machine_operation:
      name: Bruk av håndverk/pregemaskin
      description: Angir hvordan kutteren/pregemaskinen fungerer fra et brukerperspektiv
        (f.eks. manuell sveiv, elektrisk trykknapp, app-styrt).
    craft_decoration_maker_accessories_included:
      name: Håndarbeidslagertilbehør inkludert
      description: Viser viktig tilbehør som følger med håndarbeidslager (f.eks. starterteip/film,
        klistremerkerefill, glitterpatroner, rengjøringsverktøy).
    craft_foil_application_method:
      name: Bruksmetode for produkt
      description: Identifiserer hvordan produktet er ment å påføres/aktiveres (klebemiddel,
        varme, toner/reaktiv osv.).
    craft_foil_format:
      name: Håndverk
      description: Angir det fysiske formatet til håndverk slik den selges (f.eks.
        rull kontra ark).
    craft_glue_finish:
      name: Hobbylim-finish
      description: Beskriver utseendet til limet etter tørking (f.eks. gjennomsiktig,
        hvit/ugjennomsiktig, gjennomskinnelig, blank/matt).
    craft_magnet_application:
      name: Bruk av håndverksmagneter
      description: Primær tiltenkt bruk av håndverk - eske eller monteringsflate for
        magnetproduktet.
    craft_magnet_holding_strength_level:
      name: Holdestyrkenivå produkt
      description: Relativ styrkekategori for produkt for å hjelpe kunder med å velge
        passende holdekraft for prosjektet sitt.
    craft_organizer_storage_features:
      name: Oppbevaringsfunksjoner for produkt
      description: Beskriver organisasjonsfunksjoner og interne oppbevaringselementer
        til produktarrangører (f.eks. justerbare skillevegger, skuffer, gjennomsiktige
        lommer).
    craft_scoring_board_included_accessories:
      name: Håndverkspoengbrett inkludert tilbehør
      description: Tilbehør inkludert med poengtavlen (f.eks. poengpenn/beinmappe,
        trekant, konvoluttverktøy).
    craft_scoring_board_measurement_system:
      name: Målesystem for poengtavler
      description: Angir målesystemet som er merket på poengtavlen (imperial, målestokk,
        dobbel eller umerket).
    craft_wire_finish_coating:
      name: Finish/belegg av produkt
      description: Angir overflatebehandlingen eller belegget som påføres ledningen
        for farge, anløpingsbestandighet eller beskyttelse.
    craft_wood_surface_preparation:
      name: Forberedelse av overflaten på produkt
      description: Angir om treflaten er klar for etterbehandling/maling eller krever
        forberedelse (f.eks. sliping/grunning).
    crank_spindle_interface:
      name: Veivspindelgrensesnitt
      description: Angir hvilken krankspindelstandard krankhuset er beregnet for (f.eks.
        SRAM DUB, firkanttaper), for å sikre kompatibilitet mellom kranksett og krankhus.
    crankshaft_balance_type:
      name: Veivaksel balansetype
      description: Angir om veivakselen er intern balanse (nøytral) eller ekstern
        balanse (krever harmonisk balansering/svinghjulvekter).
    crankshaft_bolt_pattern:
      name: Veivakselboltmønster
      description: Boltmønster på bakre flens for feste av svinghjul/flexplate.
    crankshaft_sensor_reluctor_type:
      name: Veivakselsensor reluktortype
      description: Veivakselposisjonssensorens utløser/reluktorhjulkonfigurasjon brukt
        (der det er aktuelt).
    craps_accessories_included:
      name: Inkludert terningtilbehør
      description: Identifiserer ytterligere craps-spesifikt tilbehør som er inkludert
        utover terninger/sjetonger/layout.
    crash_cymbal_profile:
      name: Profil for krasjcymbal
      description: Cymbalens generelle krumning/profil (hvor uttalt buen er), påvirkning
        og respons.
    crash_cymbal_sound_character:
      name: Lydkarakter for crash-symbal
      description: Primær tonekarakterbeskrivelse for crash-symballyden.
    crash_pad_size_class:
      name: Størrelsesklasse for krasjputer
      description: Indikerer den generelle størrelseskategorien til en klatreunderlag,
        som gir kunden en rask følelse av overflatedekning uten behov for nøyaktige
        dimensjoner.
    crate_engine_assembly_level:
      name: Kassemotor monteringsnivå
      description: Hvor komplett er kassemotoren per send (hvilke hovedkomponenter
        er inkludert).
    cream_base_ingredient:
      name: Ingrediens i krembasen
      description: Identifiserer den primære kilden til kremen, og dekker både meieriprodukter
        og plantebaserte alternativer.
    cream_cheese_base:
      name: Kremostbase
      description: Identifiserer den primære meieri- eller plantebaserte kilden som
        brukes til å lage kremosten, og hjelper kunden med kostholds-, allergen- og
        smak.
    cream_cheese_form:
      name: Format for kremost
      description: Beskriver den fysiske formen eller teksturstilen til kremosten
        (f.eks. blokk, pisket, dipp), som påvirker smørbarhet og tiltenkt bruk.
    cream_variety:
      name: Kremvariant
      description: Identifiserer den spesifikke kremtypen basert på fettinnhold, bearbeidingsstil
        eller tiltenkt kulinarisk bruk (f.eks. halv og halv, dobbel krem, matlagingskrem).
    crib_accessory_features:
      name: Funksjoner for barneseng-tilbehør
      description: Viser funksjonelle eller komfortorienterte funksjoner som er spesifikke
        for tilbehør til sprinkelsenger og småbarnsenger, for eksempel pusteevne eller
        elastiske kanter.
    crib_bumper_features:
      name: Funksjoner på sprinkelsengens støtfanger
      description: Fremhever spesielle funksjonelle egenskaper ved en barnesengpolstring.
    crib_conversion_kit_components:
      name: Komponenter i konverteringssett for barneseng
      description: Lister opp hoveddelene som er inkludert i settet, slik at kunden
        kan bekrefte at de har alt som kreves for installasjon.
    cricket_ball_grade:
      name: Cricketballkvalitet
      description: Angir kvalitetsnivået eller den tiltenkte spillestandarden for
        ballen.
    cricket_ball_piece_construction:
      name: Konstruksjon av cricketballstykke
      description: Angir antall ytre deler eller støpte seksjoner som brukes til å
        bygge ballens skall, en nøkkelindikator på kvalitet og pris.
    cricket_ball_type:
      name: Type cricketball
      description: Angir typen cricketball som leveres med produktet, eller angir
        om det ikke følger med noen ball.
    cricket_bat_accessory_type:
      name: Type cricketkølletilbehør
      description: Spesifiserer typen cricketkølletilbehør eller vedlikeholdsvare
        slik at kundene raskt kan filtrere frem til produktet de trenger.
    cricket_bat_size:
      name: Størrelse på cricketkølle
      description: Indikerer den standardiserte cricketkøllestørrelsesklassifiseringen
        (0–6, Harrow, SH, LH), vanligvis valgt basert på spillerens alder og høyde.
    cricket_bat_size_compatibility:
      name: Kompatibilitet for cricketkøllestørrelse
      description: Viser størrelsen på tilbehøret som er designet for å passe, og
        sikrer riktig kompatibilitet.
    cricket_helmet_role:
      name: Rulle til crickethjelm
      description: Indikerer spillerollen hjelmen er designet for, for eksempel batting
        eller wicketkeeping.
    cricket_leg_guard_type:
      name: Type benbeskytter for cricket
      description: Betegner den spesifikke stilen for cricketbeinbeskyttelse.
    cricket_player_role:
      name: Cricketspillerrolle
      description: Angir den primære spillerullen skoen er designet for.
    cricket_protection_grade:
      name: Cricketbeskyttelsesgrad
      description: Angir beskyttelsesgradklassifiseringen som er tildelt av produsenten
        av cricketutstyr.
    cricket_stump_base_type:
      name: Sokkeltype for cricketstolpe
      description: Indikerer basisstilen eller materialet som leveres med stubbene,
        noe som påvirker stabilitet og egnethet for spilleunderlaget.
    cricket_stump_target_features:
      name: Funksjoner for cricketstubbemål
      description: Fremhev distinkte funksjonelle funksjoner som forbedrer treningens
        brukervennlighet, synlighet, holdbarhet eller stabilitet.
    cricket_stump_type:
      name: Cricketstubbetype
      description: Kategoriserer stilen eller konstruksjonen til stubbene for å hjelpe
        kunder med å velge mellom tradisjonelle kampstubber, treningsvarianter eller
        moderne opplyste modeller.
    cricket_training_focus:
      name: Fokus for crickettrening
      description: Primær cricketferdighet eller disiplin hjelpemiddelet er utformet
        for å forbedre.
    croquet_set_components_included:
      name: Inkluderte komponenter i krokketsett
      description: Lister opp alle viktige komponenter som leveres med settet (f.eks.
        veker, staker, bæreveske) slik at kundene forstår nøyaktig hva de kjøper.
    cross_country_binding_system:
      name: Kryssende bindingssystem
      description: Angir standarden for langrennsskibindinger som produktet er boret
        for eller kompatibelt med.
    cross_stitch_chart_symbol_type:
      name: Symboltype for korsstingdiagram
      description: Hvordan diagrammet er representert (symboler, farger eller begge
        deler).
    cross_stitch_finishing_type:
      name: Type korsstingsbehandling
      description: Tiltenkt etterbehandling/visningstype for det sydde prosjektet.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Stoffholdermekanismens ramme
      description: Angir hvordan stoffet er festet/spent i rammen (f.eks. klips, klemmer,
        stifter), noe som Impact brukervennlighet og stoffkompatibilitet.
    cross_stitch_frame_included_components:
      name: Inkluderte komponenter i rammen
      description: Lister opp hva som følger med i esken (f.eks. kun ramme vs. ramme
        + klemmer + stativ), noe som reduserer tvetydighet og returer.
    cross_stitch_frame_type:
      name: Ramme for korssting
      description: Angir konstruksjonen/typen av ramme (hvordan stoffet holdes), noe
        som påvirker brukervennlighet og prosjektkompatibilitet.
    cross_stitch_pattern_technique:
      name: Teknikk for korsstingmønster
      description: Korsstingteknikken/-stilen som kreves av diagrammet.
    crossbar_shape_profile:
      name: Former/profil
      description: Angir aerodynamiske/former for tverrstangen.
    crossbar_style:
      name: Tverrstangstil
      description: Identifiserer konstruksjonsstilen til tverrstangen, og skiller
        stive konkurransestenger fra fleksible eller hybride treningsstenger.
    crossbow_type:
      name: Armbrøsttype
      description: Identifiserer den grunnleggende designstilen til armbrøsten, for
        eksempel compound, recurve eller pistol. Byggestil driver ytelse, størrelse
        og bruk eske, så kunde filtrerer ofte etter det.
    crossover_component_type:
      name: Delefeltkomponenttype
      description: Identifiserer den primære komponenttopologien som brukes i det
        passive delefilternettverket.
    crossover_configuration:
      name: Overgangskonfigurasjon–
      description: Angir om delefiltret bruker ett enkelt delefilterpunkt eller flere
        punkter (f.eks. 2-veis vs. 3-veis design).
    crossover_type:
      name: Delefiltertype
      description: Type crossover-nettverk inkludert i komponentsettet.
    crown_profile:
      name: Kroneprofil
      description: Angir høyden/profilen til capsens krone over bremmen.
    crown_style:
      name: Kronestil
      description: Definerer den overordnede silhuetten eller profilen til kronen
        på en bowlerhatt.
    crust_taste_profile:
      name: Skorpens smak
      description: Angir om skorpens iboende smaksorientering er søt, salt eller nøytral.
    crystal_finish:
      name: Krystallfinish
      description: Beskriver overflatefinishen, belegget eller prosesseringstilstanden
        til den løse krystallen (f.eks. rå, polert, tromlet, fasettert, frostet, aura-belagt,
        farget, varmebehandlet).
    crystal_material:
      name: Krystallmateriale
      description: Angir materialet som brukes til klokkeglasset som beskytter urskiven.
    crystalline_finish_style:
      name: Krystallinsk finishstil
      description: Det karakteristiske krystallinske/fjæraktige utseendet som produseres
        av palmevoksen i ferdige lys.
    cucumber_variety:
      name: Agurkvariant
      description: Angir kultivaren eller den merkede varianten av agurken (f.eks.
        engelsk, persisk, kirby).
    cue_compatibility:
      name: Kompatibilitet for biljardkø
      description: Indikerer konfigurasjonen av køleddet esken er designet for å tilpasse
        seg, for eksempel køer i ett stykke eller med 3/4-ledd.
    cue_construction:
      name: Konstruksjon i biljardkø
      description: Angir hvordan køen er konstruert – antall deler eller om den er
        en delvis komponent, for eksempel kun kolbe eller kun skaft – som påvirker
        bærbarhet og kompatibilitet.
    cue_head_material:
      name: Materiale i biljardkø-hode
      description: Identifiserer materialet i køhodet (den delen som er i kontakt
        med pucken), noe som påvirker holdbarhet og overflatebeskyttelse.
    cue_sport_compatibility:
      name: Kompatibilitet med køsport
      description: Identifiserer hvilken køsport tilbehøret er designet for.
    cue_thread_size:
      name: Størrelse på tråden
      description: Spesifiserer trådspesifikasjonen som brukes på forlengelser, leddbeskyttere,
        vektbolter og annet køtilbehør for å sikre riktig passform.
    cue_tip_hardness:
      name: Hardhet på køspissen
      description: Vurderer fastheten til køens tupp, noe som påvirker køballkontrollen
        og tilbakemeldinger.
    cuff_height:
      name: Mansjetthøyde
      description: Angir høyden på støvelmansjetten (lav, medium, høy, avtakbar/justerbar),
        påvirkning og fleksibilitet.
    cuff_position:
      name: Mansjettposisjon
      description: Angir hvor på rytterens kropp båndmansjetten er designet for å
        festes.
    cultivation_method:
      name: Dyrkingsmetode
      description: Spesifiserer hvordan de grønne ble dyrket, og dekker dyrkingsteknikker
        og jordbrukspraksis.
    cup_type:
      name: Kopptype
      description: Indikerer paljettens overflateprofil (flat vs. skålformet) og skåldybde,
        som kan påvirke glitter, tekstur og hvordan den sitter når den er sydd eller
        limt.
    cupcake_size:
      name: Cupcake-størrelse
      description: Angir den fysiske størrelseskategorien til cupcakesene som selges
        (f.eks. Shop Mini, standard, jumbo).
    curd_size:
      name: Ostemassestørrelse
      description: Angir størrelsen eller teksturen til cottage cheese-ostemassen.
    cure_method:
      name: Tørkemetode
      description: Beskriver prosessen som kreves for at limet skal herde (f.eks.
        UV-lys, luftfuktighet, varme).
    curing_or_preparation_method:
      name: Herdings- eller tilberedningsmetode
      description: Spesifiserer hvordan olivenene ble herdet eller på annen måte tilberedt
        (f.eks. saltlakeherdet, oljeherdet, grillet).
    curling_broom_head_material:
      name: Materiale til krøllkosthode
      description: Identifiserer den primære materialsammensetningen til kostehodet
        eller -puten.
    curling_broom_head_type:
      name: Krøllekosthodetype
      description: Angir stilen eller konstruksjonen til feiehodet/puten.
    curling_shoe_slider_material:
      name: Materiale for curlingsko
      description: Identifiserer hovedmaterialet i glidesålen som brukes på curlingsko.
    curling_training_aid_type:
      name: Type hjelpemiddel for curlingtrening
      description: Identifiserer typen hjelpemiddel for curlingtrening.
    curry_variety:
      name: Karrivariant
      description: Klassifiserer karrisausprodukter etter den spesifikke karristilen
        eller oppskriften de er ment å lage, for eksempel Tikka Masala, Massaman eller
        Thai grønn, for å muliggjøre presis smak-/stilfiltrering.
    cushion_rubber_profile:
      name: Pute gummiprofil
      description: Former eller profilkode for gummibiter til skinnepute.
    cushioning_level:
      name: Dempingsnivå
      description: Indikerer mengden fylling under foten som sokken gir for påvirkning
        og komfort.
    custom_label_content_type:
      name: Tilpasset etikett innholdstype
      description: Angir hvilken informasjon som skal stå på etiketten (f.eks. navn,
        logo, melding, størrelse, pleiesymboler, kontaktinformasjon).
    customization_type:
      name: Tilpasningstype
      description: Angir om drakten er blank, spillerutstedt eller spesiallaget med
        personlig navn/nummer.
    cut_or_preparation_style:
      name: Kutte- eller tilberedningsstil
      description: Angir hvordan grønnsaksbitene er kuttet eller tilberedt inne i
        boksen eller glasset (f.eks. hele, i terninger, i skiver).
    cut_resistance_rating:
      name: Kuttmotstandsklassifisering
      description: Angir det formelt testede kuttmotstandsnivået for varen.
    cut_type:
      name: Kuttetype
      description: Angir om stoffet selges per meter, som forhåndskuttet eller som
        rull/bolt.
    cutting_application:
      name: Bruksområde for skjæring
      description: Primært tiltenkt klippebruk - eske for saksen.
    cutting_mat_grid_style:
      name: Skjærematteramme
      description: Den trykte guidestilen på matteoverflaten.
    cutting_mat_intended_use:
      name: Tiltenkt bruk av skjærematte
      description: Den primære bruken av håndverk/arbeidsflaten som skjærematten er
        designet for.
    cv_boot_clamp_type:
      name: CV-mansjettklemmetype
      description: Angir klemme-/båndtypen som brukes til å feste CV-mansjetten.
    cv_boot_kit_contents:
      name: CV-mansjettsett innhold
      description: Viser hva som følger med CV-mansjetten (f.eks. klemmer, fettpakke,
        festebånd).
    cv_boot_material:
      name: CV-mansjettmateriale
      description: Spesifiserer den primære materialkonstruksjonen til CV-mansjetten.
    cv_boot_position:
      name: Plassering av CV-mansjett
      description: Angir om CV-mansjetten passer til den indre (innenbords) eller
        ytre (utenbords) CV-leddposisjonen på akselen.
    cycling_apparel_fit:
      name: Sykkelklær passform
      description: Beskriver plaggets snitt, og indikerer tiltenkt tetthet og aerodynamikk
        (f.eks. race, avslappet).
    cylinder_head_assembly:
      name: Sylinderhodeenhet
      description: Angir fullstendighetsnivået til sylinderhodet slik det er solgt
        (f.eks. ferdig montert med installerte ventilstyringskomponenter kontra bart/umontert
        støpegods).
    cylinder_head_material_grade:
      name: Materialkvalitet for sylinderhode
      description: Spesifiserer materialet og kvaliteten som brukes til støping av
        sylinderhodet.
    cylinder_head_position:
      name: Sylinderhodeposisjon
      description: Identifiserer hvilken bank/side eller retning sylinderhodet passer
        på motorer med flere banker (f.eks. venstre/høyre side eller bank 1/bank 2).
    cymbal_alloy:
      name: Cymballegering
      description: Legering/sammensetning av cymbalen(e) i settet.
    cymbal_application:
      name: Cymbal-app
      description: Primær spilling-app som cymbalen er designet/merket for.
    cymbal_arm_mounting_interface:
      name: Monteringsgrensesnitt for cymbalarm
      description: Angir hvordan cymbalarmen festes til REST av trommemaskinen (f.eks.
        klemme, spole, stativmottaker).
    cymbal_arm_rotation_positioning_features:
      name: Funksjoner for rotasjon/posisjonering av cymbalarmen
      description: Angir posisjoneringsfunksjoner som påvirker hvordan armen kan vinkles/roteres
        og låses.
    cymbal_arm_style:
      name: Cymbalarmstil
      description: Angir om en cymbalarm er rett eller bom, for rekkevidde og posisjonering.
    cymbal_drum_case_wheel_configuration:
      name: Cymbal- og trommehjulkonfigurasjon
      description: Angir om eskeen har hjul og (hvis aktuelt) hjulkonfigurasjonen
        for rullende transport.
    cymbal_hammering_style:
      name: Cymbal hamring stil
      description: Hamrende prosess/utseende påvirkning og følelse.
    cymbal_kit_components_included:
      name: Inkluderte komponenter i symbalsett
      description: Angir hvilke cymbaltyper som er inkludert i driftsrelaterte cymbalsettet/-buntet
        (i tillegg til selve driftscymbalen).
    cymbal_kit_items_included:
      name: Inkluderte elementer i symbalsett
      description: Identifiserer hvilke cymbaler som er inkludert i settet/buntet
        (etter cymbaltype).
    cymbal_lathing:
      name: Cymbaldreiebenk
      description: Angir om/hvor mye av cymbaloverflaten er dreiet (rillet) kontra
        udreiet/rå.
    cymbal_playing_style_genre:
      name: Cymbalspillestil/sjanger
      description: Identifiserer den typiske konteksten cymbalene er designet for
        (f.eks. magedans-zills vs. marsjerende/orkesterhåndcymbaler).
    cymbal_set_configuration:
      name: Konfigurasjon av cymbalsett
      description: Angir om produktet selges som en enkelt cymbal, en matchet sammenkobling
        eller et sett med flere sammenkoblinger (f.eks. for gruppeinstruksjon).
    cymbal_sound_character:
      name: Lydkarakter for symbal
      description: Beskriver den overordnede toneprofilen/klangen til cymbalen som
        brukes til oppdagelse (f.eks. lys vs. mørk).
    cymbal_sustain:
      name: Cymbal-sustain
      description: Hvor lenge cymbalen ringer etter at den er slått an.
    cymbal_type:
      name: Cymbaltype
      description: Angir den funksjonelle cymbalrullen den elektroniske cymbalpaden
        er ment å emulere.
    cymbal_volume_level:
      name: Cymbalvolumnivå
      description: Oppfattet lydstyrke/utgangskategori for cymbalen.
    cymbal_weight_class:
      name: Cymbal vektklasse
      description: Angir cymbalens vektklasse, som påvirker tone, volum og respons.
    dairy_heat_treatment:
      name: Varmebehandling av meieriprodukter.
      description: Identifiserer bearbeidings- eller pasteuriseringsnivået som er
        brukt på kremen (f.eks. rå, pasteurisert, UHT), som påvirker holdbarheten,
        smaken og piskeeffekten.
    damage_type:
      name: Skadetype
      description: Angir hvilke typer frontruteskader settet er ment å reparere.
    damper_pedal_style:
      name: Demperpedalstil
      description: Beskriver den fysiske stilen til demperpedalen som brukes med keyboarder/digitale
        pianoer.
    damping_adjustability:
      name: Justerbar dempning
      description: Angir hvilke demping- og/eller ridehøyde som er justerbare på støtdemperen.
    damping_level:
      name: Dempingsnivå
      description: Indikerer den relative mengden volum- og sustainreduksjon som dempingen
        gir.
    dance_occasion:
      name: Dansearrangement
      description: Indikerer den tiltenkte kontekst av plagget innen dansepraksis
        eller ytelse.
    darbuka_accessories_included:
      name: Inkludert darbuka-tilbehør
      description: Viser en liste over vanlig tilbehør som følger med darbukaen.
    darbuka_body_finish_type:
      name: Darbuka karosseritype
      description: Beskriver den ytre finishen, belegget eller dekorbehandlingen på
        darbuka-kroppen.
    darbuka_head_material:
      name: Darbuka-hodemateriale
      description: Spesifiserer materialet i trommeskinnmembranen på en darbuka.
    dart_barrel_material:
      name: Materiale for dartløp
      description: Spesifiserer primærmaterialet til pilløpet, som påvirker vektfordeling,
        holdbarhet og pris.
    dart_shaft_design:
      name: Dartskaftdesign
      description: Klassifiserer den mekaniske utformingen av skaftet, for eksempel
        om det er fast, roterende, teleskopisk eller integrert i flyvningen, noe som
        påvirker ytelse og pris.
    dart_shaft_thread_type:
      name: Dartskaft trådtype
      description: Angir gjengestørrelsen/-typen som brukes til å skru skaftet inn
        i pilløpet, noe som sikrer kompatibilitet mellom skaft og løp.
    dart_thread_size:
      name: Gjengestørrelse for pil
      description: Spesifiserer trådstørrelsen/standarden delen er kompatibel med,
        og sikrer passform mellom aksler, spisser og løp.
    dart_tip_compatibility:
      name: Kompatibilitet med dartspisser
      description: Angir om pildelen er beregnet for ståltupp, myk tupp eller begge
        typer piler.
    dart_tip_connection_type:
      name: Dartspiss forbindelsestype
      description: Beskriver trådspesifikasjonen eller monteringssystemet som spissen
        bruker for å feste til en dartløp eller -skaft, for å sikre kompatibilitet.
    dartboard_tournament_approval:
      name: Dartboard turnering godkjenning
      description: Angir om darttavlen er offisielt godkjent av spesifikke dartforbund
        eller -ligaer.
    dartboard_type:
      name: Dartskivetype
      description: Klassifiserer darttavlen i henhold til konstruksjonsteknologi og
        kompatibilitet med dartpiler (f.eks. børstehår, elektronisk, magnetisk).
    dash_cover_construction_type:
      name: Konstruksjonstype for dashbord-deksel
      description: Beskriver hvordan dashborddekselet er formet/strukturert (f.eks.
        støpt vs. sydd) som påvirker passform, presisjon og utseende.
    dash_cover_cutout_configuration:
      name: Konfigurasjon av utskjæring for dashborddeksel
      description: Angir hvilke OEM-instrumentbrikkeåpninger/sensorer dekselet er
        forhåndskuttet eller formet for.
    dashboard_accessory_position:
      name: Instrumentbord tilbehør posisjon
      description: Angir hvor på/rundt instrumentbrættet tilbehøret er ment å plasseres
        eller monteres.
    date_variety:
      name: Daddelvariant
      description: Angir kultivar/variant av dadlene (f.eks. Medjool, Deglet Noor,
        Ajwa). Variasjon Influence sterkt smak, størrelse og tekstur, og er Highlight
        i de fleste produkttitler og beskrivelser, så å fange den opp forbedrer filtrering
        og oppdagelse.
    dayan_head_material:
      name: Materiale i dayan-hode
      description: Materiale i spilleflaten (pudi), for eksempel naturlig skjul-type
        eller syntetisk.
    dayan_strap_material:
      name: Materiale i dayan-stropp
      description: Materialet i strammestroppene (baddhi) som brukes til å snøre dayanen.
    dayan_syahi_type:
      name: Dayan syahi-type
      description: Type syahi (svart tuning paste)-app på dayanhodet.
    decaffeination_method:
      name: Dekaffineringsmetode
      description: Identifiserer prosessen som brukes for å fjerne koffein fra koffeinfri
        kaffe.
    decal_installation_method:
      name: Metode for montering av dekal
      description: Hvordan dekalen festes til kjøretøyets overflate (f.eks. tørrpåføring,
        våtpåføring). Verktøy/kravinformasjon | opplysning (f.eks. overføringstape
        eller varmepistol) skal fanges opp i instruksjoner eller relatert verktøy
        kjennemerke når det er aktuelt.
    decal_orientation:
      name: Dekalretning
      description: Om dekalen er beregnet for innvendig glass eller utvendig overflate.
    decal_placement_type:
      name: Type plassering av klistremerke
      description: Angir hvor på kjøretøyet klistremerket skal festes (f.eks. karosseripanel,
        støtfanger, panser).
    decal_visibility_property:
      name: Egenskap for klistremerkets synlighet
      description: Optiske/synlighetsegenskaper til et dekal som er ment å forbedre
        synligheten eller lysresponsen (f.eks. reflekterende, fluorescerende, selvlysende
        eller gjennomsiktige egenskaper).
    deck_concave_level:
      name: Dekks konkavnivå
      description: Indikerer dybden eller intensiteten til kortstokkens konkavitet
        (f.eks. mild, medium, dyp).
    deck_flex_rating:
      name: Dekkfleksvurdering
      description: Kvalitativ vurdering av dekkets fleksibilitet/stivhet.
    deck_material:
      name: Dekkmateriale
      description: Identifiserer det primære konstruksjonsmaterialet til skateboarddekket.
    decoder_interface_socket_type:
      name: Dekodergrensesnitt/stikkontakttype
      description: Digital dekodergrensesnitttype eller introduksjonsdekoderkonfigurasjon
        for lokomotivmodellen.
    decoration_technique:
      name: Dekorasjonsteknikk
      description: Identifiserer den primære metoden som brukes for å påføre grafikk
        eller utsmykninger på T-skjorten.
    decorative_stamp_form_factor:
      name: Dekorativt stempelformfaktor
      description: Identifiserer det fysiske stempelformatet og hvordan det trykker
        et design (enkeltstempel, sett, rullestempel, bakgrunn osv.).
    decorative_tape_application:
      name: Dekorativ tape-app
      description: Primært håndverk som dekorativ tape er designet eller merket for.
    decorative_tape_format:
      name: Dekorativt tapeformat
      description: Spesifiserer hvordan den dekorative tapen Supply/pakkes for bruk.
    decoy_buoyancy:
      name: Oppdrift av lokkefugler
      description: Beskriver hvordan lokkefuglen oppfører seg i vannkolonnen (flytende,
        hengende eller synkende).
    decoy_joint_type:
      name: Type lokkeledd
      description: Angir om lokkefuglkroppen er solid eller leddet, noe som påvirker
        svømmefunksjonen.
    decoy_motion_mechanism:
      name: Mekanisme for bevegelse
      description: Beskriver hvordan lokkefuglen, om i det hele tatt, produserer bevegelse
        eller vannforstyrrelser for å tiltrekke seg vilt.
    decoy_posture:
      name: Lokkeholdning
      description: Indikerer den avbildede holdningen eller aktiviteten til dyret
        som er modellert av lokkefuglen (f.eks. spising, hvile, årvåkenhet).
    decoy_size_class:
      name: Lokkefugl størrelsesklasse
      description: Kategoriserer den relative skalaen til lokkefuglen sammenlignet
        med det virkelige dyret (f.eks. Standard, Magnum, Oversize).
    decoy_style:
      name: Lokkefuglstil
      description: Definerer den fysiske formfaktoren eller designklassen til lokkefuglen
        for å hjelpe jegere med å velge riktig oppsett.
    deli_meat_variety:
      name: Utvalg av delikatesseforretninger
      description: Klassifiserer den spesifikke stilen av kjøttpålegg (f.eks. salami,
        bologna, prosciutto, roastbiff).
    delivery_form:
      name: Leveringsformat
      description: Fysisk utløsningsform for injektorrenseren.
    denim_composition:
      name: Denim-komposisjon
      description: Denimens primærfibersammensetning (basisfibre unntatt fargestoffer/overflatebehandlinger).
    denim_finish:
      name: Denim-finish
      description: Overflate-/behandlingsfinish påført denimstoff.
    denim_intended_use:
      name: Tiltenkt bruk av denim
      description: Typisk prosjekt/bruk som denimen er merket for.
    denim_stretch_type:
      name: Denim stretchtype
      description: Om denimen har mekanisk stretch, tilsatt elastan/spandex eller
        ingen stretch.
    denim_wash:
      name: Denimvask
      description: Angir fargen eller vaskebehandlingen som er brukt på denimstoff
        (f.eks. lys, mørk, rå, syre).
    derailleur_cage_length:
      name: Lengde på girkasse
      description: Angir lengden på girburet som bestemmer kjedekapasiteten (primært
        for bakgirer).
    derailleur_mounting_style:
      name: Monteringsstil for girskifter
      description: Angir hvordan girskifteren festes til rammen eller opphenget (f.eks.
        pålodding, klemme, direktemontering, UDH).
    derailleur_type:
      name: Girtype
      description: Angir om produktet er en forgir eller bakgir.
    deshedder_tool_type:
      name: Verktøytype for avskjæring
      description: Klassifiserer den strukturelle stilen til fjerneren slik at kundene
        kan velge sin foretrukne stellmetode (f.eks. blad, blokk, karri eller hanske).
    diabolo_axle_system:
      name: Diabolo akselsystem
      description: Spesifiserer diabolo-akselsystemet/konfigurasjonen som påvirker
        grind, stabilitet og slitasje.
    diagnostic_functions_supported:
      name: Støttede diagnostiske funksjoner
      description: Angir diagnostikk-/funksjonsskanneren kan utføre.
    diagnostic_interface_type:
      name: Diagnostisk grensesnitttype
      description: Forbindelse/grensesnitt som brukes til å kommunisere med kjøretøyet
        eller enheten (f.eks. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Diamantfargegrad
      description: Indikerer fargegraden til diamanter, fra D (fargeløs) til Z (lys
        farge), eller betegner fancy fargediamanter.
    diaper_cover_style:
      name: Bleietrekkstil
      description: Definerer designsilhuetten eller den dekorative stilen til bleietrekket
        for å gjøre det enklere å bla gjennom og filtrere etter stil.
    diastatic_power_unit:
      name: Diastatisk kraftenhet
      description: Angir enhetssystemet som brukes til å rapportere et produkts diastatiske
        effektverdi (f.eks. °Lintner vs. Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Stemmesystem for diatonisk munnspill
      description: Angir layout/stemmingssystemet som brukes av den diatoniske munnspillet.
    dice_sides:
      name: Terningsider
      description: Antall sider (flater) per terning for terningene som er inkludert
        i produktet (f.eks. d6, d20). For blandede sett, bruk den dominerende eller
        listen som flere verdier når det støttes.
    didgeridoo_construction_type:
      name: Didgeridoo-konstruksjonstype
      description: Hvordan didgeridooen er konstruert eller formet (tradisjonell eller
        moderne konstruksjonsmetode).
    dietary_formulation_claim:
      name: Påstand om kostholdsformulering
      description: Highlight viktige formuleringer kjennemerke eller unntak som er
        relevante for hestens ernæring (f.eks. kornfri, lavstivelsesinnhold, økologisk).
    dinosaur_playset_scale_figure_size_class:
      name: Dinosaur lekesett skala/figur størrelse klasse
      description: Beskriver den generelle skalaen til inkluderte dinosaurer/figurer
        for å hjelpe med kompatibilitet med andre sett.
    dinosaur_species_included:
      name: Dinosaurarter inkludert
      description: Identifiserer hvilke dinosaurarter som er representert i lekesettet
        (figurer eller støpte dinosaurer).
    dipsy_diver_size_designation:
      name: Dipsy diver størrelsesbetegnelse
      description: Indikerer den produsentdefinerte størrelseskoden til fiskedipseyen,
        som korrelerer med vekt og dykkedybde.
    disc_brake_rotor_mount_type:
      name: Monteringstype for skivebremsrotor
      description: Identifiserer hvordan en skivebremsrotor festes til navet (f.eks.
        6-bolts, senterlås).
    disc_lock_accessories_included:
      name: Tilbehør til skivelås inkludert
      description: Angir tilleggsutstyret som følger med en sykkelskivelås, for eksempel
        en påminnelseskabel, bæreveske, monteringsbrakett eller batterier.
    disco_ball_mirror_tile_material:
      name: Materiale i fliser i diskokule
      description: Materialet i den reflekterende filten på diskokulen (hvis aktuelt).
    disco_ball_mirror_tile_size:
      name: Discoball speil filtstørrelse
      description: Omtrentlig størrelse på enkeltperson speilfilt/firkanter på discokulen.
    display_backlight_color:
      name: Farge på bakgrunnsbelysningen på skjermen
      description: Bakgrunnsbelysning/belysningsfarge på målerdisplayet/-skiven.
    disposable_compostable_claim:
      name: Krav om engangsbruk/kompostering
      description: Angir om produktet er komposterbart, biologisk nedbrytbart, resirkulerbart
        eller ikke-komposterbart (der det er aktuelt).
    distillation_method:
      name: Destillasjonsmetode
      description: Identifiserer destillasjonsmetoden eller destillasjonstypen som
        brukes til å produsere brennevinet.
    distilled_water_intended_use:
      name: Tiltenkt bruk av destillert vann
      description: Definerer den primære appen for destillert vann (f.eks. drikkevann,
        CPAP-maskin, luftfukter, dampstrykejern).
    distress_transmission_frequency:
      name: Nødoverføringsfrekvens
      description: Primær radiofrekvens(er) som brukes til nødvarsling.
    distressing_level:
      name: Plagsomt nivå
      description: Angir mengden av forsettlig slitasje, rifter eller frynser som
        er påført stoffet.
    distressing_style:
      name: Plagsom stil
      description: Indikerer typen eller nivået av slitasje på jeans, for eksempel
        revne eller skjeggete effekter.
    distributor_advance_mechanism:
      name: Distributørens fremdriftsmekanisme
      description: Angir typen tenningstidspunktfremskyndelsesmekanisme som brukes
        av fordeleren.
    distributor_cap_terminal_type:
      name: Distributørlokk terminaltype
      description: Angir stilen på fordelerlokkterminalen.
    distributor_gear_material:
      name: Materiale for fordelergir
      description: Spesifiserer materialet i fordelerens drivgir.
    distributor_ignition_type:
      name: Distributørens tenningstype
      description: Angir om fordeleren er konstruert for sporveksel, elektronisk tenning
        eller HEI-lignende systemer.
    distributor_kit_contents:
      name: Distributørsett innhold
      description: Angir hvilke komponenter som følger med fordeleren (f.eks. lokk,
        rotor, moduler, pakning/O-ring, drivverk, ledninger/kobling).
    dive_computer_form_factor:
      name: Formfaktor for dykkecomputer
      description: Angir den fysiske utformingen eller monteringsmetoden til dykkecomputeren,
        for eksempel konsollmontert eller klokkeformet.
    diving_mask_design:
      name: Design av dykkermaske
      description: Definerer den overordnede strukturelle stilen til dykkermasken,
        påvirkning , synsfelt og tiltenkt bruk.
    divot_tool_prong_configuration:
      name: Konfigurasjon av Divot-verktøyets spiss
      description: Angir antall og plassering av pigger på divotverktøyet som brukes
        til å reparere skader på gresset.
    divot_tool_style:
      name: Divot-verktøystil
      description: Definerer den generelle strukturen eller utplasseringsstilen til
        divot-verktøyet, for eksempel fast, springkniv/sammenleggbar, multiverktøy
        eller tilbehør som festes til en hatt eller kølle.
    djembe_shell_construction:
      name: Djembe-skallkonstruksjon
      description: Beskriver konstruksjonsmetoden for djembeschallet/kroppen.
    djembe_tuning_system:
      name: Djembe-stemmingssystem
      description: Angir hvordan djemben er spent/stemt.
    dmx_output_connector_type:
      name: DMX-utgang koblingstype
      description: Fysisk tilkoblingsformat som brukes for kontrollør/behandlingsansvarligs
        DMX-utgangsport(er).
    doctor_playset_items_included:
      name: Inkluderte elementer i lege-lekesett
      description: Spesifiserer de medisinske verktøyene og rullelektilbehøret som
        er inkludert i legesettet (f.eks. stetoskop, sprøyte, reflekshammer).
    doctor_playset_role_play_setting:
      name: Lege lekesett rollespillinnstillinger
      description: Identifiserer den primære konteksten som doktorspillsettet representerer.
    doctor_playset_wearable_items_included:
      name: Inkluderte klesplagg-elementer i lege-lekesett
      description: Angir brukbare kostymekomponenter som følger med lekesettet.
    doll_accessory_type:
      name: Dukketilbehørstype
      description: Definerer hva slags dukke- eller actionfigurtilbehør produktet
        er (f.eks. klær, sko, møbler, utstillingsstativer), slik at kunden kan bla
        gjennom og filtrere innenfor denne tilbehørskategorien.
    doll_eye_type:
      name: Dukkeøyetype
      description: Angir konstruksjonsstilen til dukkens øyne (f.eks. innfelt akryl,
        malt, LED-lys).
    doll_hair_fiber_type:
      name: Dukkehårfibertype
      description: Type hår/fiber brukt på dukken (eller ingen), som påvirker realisme,
        styling og stell.
    doll_making_kit_components_included:
      name: Inkluderte komponenter i dukkemakersett
      description: Lister opp de viktigste materialene og verktøyene som er inkludert
        i dukkelagingssettet, slik at kundene kan sammenligne pakker og vite hva de
        trenger å levere selv.
    dollhouse_installation_placement_type:
      name: Dukkehus installasjons-/plasseringstype
      description: Hvordan dukkehuset er ment å brukes eller plasseres (f.eks. bordplate
        vs. gulvstående vs. veggmontert).
    dollhouse_items_included:
      name: Dukkehusutstyr inkludert
      description: Identifiserer hva som følger med i esken til dukkehuset (møbler,
        dukker, tilbehør).
    dollhouse_lighting_type:
      name: Dukkehusbelysningstype
      description: Type belysning som er inkludert i eller støttes av dukkehuset.
    dollhouse_room_type:
      name: Dukkehusromtype
      description: Angir det tiltenkte rommet/området i et dukkehus der tilbehøret
        vanligvis brukes.
    dollhouse_scale:
      name: Dukkehusskala
      description: Skalaforholdet til et dukkehus eller dukkehustilbehør (f.eks. 1:12)
        for å sikre kompatibilitet mellom hus, møbler og figurer.
    dollhouse_style_theme:
      name: Dukkehusstil/tema
      description: Dukkehusets generelle stil eller tema for bla gjennom og gaveutdeling
        (f.eks. moderne vs. viktoriansk).
    donnos_playing_technique:
      name: Donnos spilleteknikk
      description: Hvordan Donnos spilles/aktiveres (kun med hånden vs. med kølle/spiss),
        for å matche kjøperens forventninger og inkludert tilbehør.
    donnos_tuning_system:
      name: Donnos-stemmesystem
      description: Primærmetode som brukes til å stemme eller endre tonehøyde (f.eks.
        spennsnorer/klemmekanisme).
    door_assembly_type:
      name: Dørmonteringstype
      description: 'Angir hva som er inkludert: kun dørskall, dørutvendig eller komplett
        dørenhet.'
    door_closure_mechanism:
      name: Dørlukkemekanisme
      description: Definerer mekanismen som styrer dørens lukkefunksjon (f.eks. myk
        lukking, magnetisk lås).
    door_handle_components_included:
      name: Dørreferansekomponenter inkludert
      description: Angir hvilke nøkkeldeler som er inkludert i dørreferansen (f.eks.
        låsesylinder, pakning/tetning, listdeksel, monteringsmasker, ledningstråd,
        lås/aktuator).
    door_handle_operation:
      name: Dørreferanseoperasjon
      description: Angir den primære aktiverings-/betjeningsstilen til bildørens referanseenhet
        (f.eks. mekanisk kobling, nøkkelsylinder, nøkkelfri berøringsskjerm/knapp,
        elektrisk pop-out).
    door_lock_knob_attachment_method:
      name: Festemetode for dørlåshåndtak
      description: Angir hvordan dørlåsknappen festes til låsestangen (f.eks. tråd,
        push-on).
    door_lock_position:
      name: Dørlåsposisjon
      description: Angir hvilken dør-/åpningsposisjon dørlåsen eller dørlåsdelen er
        designet for å passe på et kjøretøy.
    door_seal_feature_set:
      name: Dørpakningsfunksjoner
      description: Funksjonelle egenskaper ved dørpakningen.
    door_seal_material_type:
      name: Dørpakningsmaterialetype
      description: Primær elastomer/materialfamilie brukt til dørpakningen (utover
        generisk materiale).
    door_seal_product_form:
      name: Dørpakning produktform
      description: Indikerer salgs-/emballasjeformen på dørpakningen.
    door_window_operation:
      name: Bruk av vindu i dør
      description: Angir om dørens vindussystem er beregnet for manuell eller elektrisk
        betjening, eller om døren ikke har noe vindu.
    double_decker_bus_deck_configuration:
      name: Konfigurasjon av dobbeltdekkerbussdekk
      description: Angir konfigurasjonen for dekktilgang/tak på en dobbeltdekkerbuss.
    double_drum_pedal_linkage_medium:
      name: Dobbel trommepedalkobling medium
      description: Angir mediet som brukes til å koble sekundærpedalen til primærpedalen
        (f.eks. drivaksel, kjede, reim).
    double_end_bag_core_type:
      name: Dobbeltsidig posekjernetype
      description: Identifiserer den interne slående kjernekonstruksjonen, som bestemmer
        returhastighet, følelse og vedlikeholdskrav.
    double_pointed_needle_point_style:
      name: Dobbeltspiss nålspissstil
      description: Beskriver spissens skarphet/former beregnet for forskjellige garn
        og strikkestiler.
    dough_extruder_accessories_included:
      name: Tilbehør til deigekstruder inkludert
      description: Ekstra komponenter følger med deigekstruderen.
    dough_extruder_operation_type:
      name: Deigekstruderens operasjonstype
      description: Hvordan deigen presses gjennom ekstruderen for å danne former.
    dough_extruder_shape_disc_included:
      name: Deigekstruder former inkludert
      description: Forme(ne) ekstruderen kan produsere via medfølgende skiver/dyser.
    dough_format:
      name: Deigformat
      description: Identifiserer den fysiske presentasjonen/former på deigen inne
        i pakken (f.eks. ball, ark, skive, strimlede tråder).
    doumbek_accessories_included:
      name: Inkludert doumbek-tilbehør
      description: Tilbehør følger med doumbek (f.eks. stemmenøkkel, eske).
    doumbek_head_material:
      name: Materiale i doumbek-hode
      description: Materialet til trommeskinnet (membranen) på doumbek.
    doumbek_head_type:
      name: Doumbek-hodetype
      description: Konstruksjon/type av doumbek-hodet (hvordan membranen er laget
        eller montert).
    doumbek_playing_style_technique:
      name: Doumbek spillestil/teknikk
      description: Ment spillekontekst/stil som vanligvis forbindes med doumbek.
    doumbek_tuning_system:
      name: Doumbek-stemmesystem
      description: Hvordan doumbeken er strammet/stemt (eller om den ikke er stemmebar).
    dowel_end_style:
      name: Dybelendestil
      description: Beskriver kuttet/former på dybelendene, påvirker hvor enkelt det
        er å sette inn, sikkerhet og tiltenkt bruk av håndverk.
    dowel_surface_texture:
      name: Overflatetekstur på trepinne
      description: Beskriver overflatens stilk, for eksempel glatt eller riflet, noe
        som påvirker utseende og limheft.
    drafting_compass_adjustment_mechanism:
      name: Justeringsmekanisme for kompass
      description: Primær finjusteringsmekanisme som brukes til å stille inn radiusen
        presist.
    drafting_compass_fine_adjustment_mechanism:
      name: Finjusteringsmekanisme for navigasjonskompass
      description: Type finjustering som brukes til å stille inn radius presist (hvis
        tilgjengelig).
    drafting_compass_lead_holder_type:
      name: Drafting kompass kundeemne holder type
      description: Type tegneinnsats/holder som følger med eller støttes av passeren.
    drag_system_material:
      name: Materiale for dragsystem
      description: Identifiserer materialet eller teknologien som brukes i dragstakken,
        påvirker varmebestandighet og glatthet.
    drag_system_type:
      name: Type slepesystem
      description: Identifiserer typen bremsmekanisme som brukes i snella, for eksempel
        foran, bak, spak, stjerne, magnetisk eller skivebrems.
    drag_type:
      name: Dra-type
      description: Angir typen dragmekanisme som brukes av snella (sted eller aktiveringsmetode).
    drawer_features:
      name: Skufffunksjoner
      description: Informasjon om spesialskuffkonstruksjonselementer eller funksjonaliteter
        (f.eks. soft-close, filtforet).
    drawer_slide_type:
      name: Skuffeskinnetype
      description: Angir monterings- og forlengelsesstil for skuffeskinner (f.eks.
        undermontering, full forlengelse).
    drawing_ink_compatible_tools:
      name: Verktøy som er kompatible med tegneblekk
      description: Angir appverktøyene blekket er ment for (f.eks. dyppepenn vs. pensel).
    drawing_ink_permanence:
      name: Tegneblekkpermanens
      description: Angir varighetsegenskaper som er viktige for ferdig kunstverk og
        reproduksjon.
    dress_embellishment:
      name: Kjoleutsmykning
      description: Fremhever fremtredende dekorative elementer som er innlemmet i
        kjoledesignet.
    dress_train_type:
      name: Kjolesleptype
      description: Indikerer tilstedeværelsen og lengden/stilen på kjoleslepet, og
        informerer om formalitet og egnethet for sted.
    dried_surface_finish:
      name: Tørket overflatebehandling
      description: Beskriver det typiske overflateutseendet etter tørking (glans/tekstur).
    drink_tube_insulation:
      name: Isolasjon av drikkerør
      description: Angir om drikkeslangen har isolasjon eller en termisk hylse for
        å hindre at væsker varmes opp eller fryser.
    drive_band_cross_section_shape:
      name: Former av kryssting
      description: Former til drivbåndet (rund, flat osv.).
    drive_band_join_type:
      name: Drivbånd-koblingstype
      description: Hvordan drivbåndet er skjøtet/konstruert (endeløst vs. trenger
        binding, osv.).
    drive_band_material_type:
      name: Type materiale i drivrem
      description: Angir materialet/typen drivbånd som brukes på spinnhjul.
    drive_location:
      name: Drive-lokalisering
      description: Identifiserer hvor svinghjulet/drivmekanismen er plassert på ellipsemaskinen,
        som påvirker fotavtrykk og bevegelsesfølelse.
    drive_mechanism:
      name: Drivmekanisme
      description: Identifiserer typen drivverk som brukes til å overføre kraft fra
        pedalene til svinghjulet.
    drive_shaft_material:
      name: Materiale for drivaksel
      description: Spesifiserer det primære konstruksjonsmaterialet til drivakselrøret
        eller den komplette enheten.
    drive_system:
      name: Drivsystem
      description: Angir mekanismen som overfører pedalkraften til motstandssystemet.
    drivetrain_configuration:
      name: Drivverkskonfigurasjon
      description: Angir drivlinjeoppsettet på sykkelen, og indikerer om baknavet
        er fast, frihjul med én gir eller flip-flop.
    drivetrain_speed_compatibility:
      name: Kompatibilitet med drivverkhastighet
      description: Viser kassetthastighetene krankdrevet er konstruert for å fungere
        med, noe som sikrer riktig tannprofil og avstand.
    drone_positioning_system:
      name: Droneposisjoneringssystem
      description: Tilstedeværende posisjonerings-/holdteknologi støttet av dronen
        for navigasjon og stabil sveving.
    drone_transmission_type:
      name: Droneoverføringstype
      description: Primær metode som brukes for kontroll og/eller videokobling mellom
        dronen og kontrollør/behandlingsansvarlig/enhet.
    drop_spindle_whorl_position:
      name: Plassering av tregarnsnella på håndtein
      description: Lokalisering av virvlen på skaftet.
    drum_carder_accessories_included:
      name: Inkludert tilbehør til kardetrommel
      description: Vanlig inkludert vare med trommelkardesett.
    drum_clamp_locking_mechanism:
      name: Låsemekanisme for trommelklemme
      description: Angir hvordan klemmen låses/strammes til røret/bøylen (f.eks. vingebolt,
        trommelnøkkelbolt, hurtigutløser).
    drum_clamp_mount_interface:
      name: Trommeklammerfestets grensesnitt mot stativ/tromme
      description: Spesifiserer hva klemmen gir for feste av tilbehør (f.eks. L-stangmottaker,
        kuleledd, cymbaltilter).
    drum_clamp_type:
      name: Trommelklemmetype
      description: Angir den funksjonelle klemmetypen som brukes i maskinvare for
        montering av trommesett (f.eks. bøyleklemme vs. spole-/rørklemme).
    drum_head_application_batter_resonant:
      name: Trommeskinn-app (batter/resonant)
      description: Angir hvilken side/rolle skinnet er designet for på en tromme (øverste
        spilleflate vs. bunnresonans-/snareside).
    drum_head_collar_type:
      name: Trommeskinnkragetype
      description: Angir om hodet har en standard krage, lav krage eller en spesialkrageprofil
        for å matche bestemte lagerkanter/-skall.
    drum_head_damping_control:
      name: Dempingskontroll for trommeskinn
      description: Innebygde overtonekontrollfunksjoner eller dempingstil inkludert
        i skinndesignet.
    drum_head_film_material:
      name: Materiale for trommeskinnfilm
      description: Primærmateriale i hodefilmen (vanligvis polyetylen-tereftalat/mylar,
        men kan inkludere spesialmaterialer).
    drum_head_hoop_collar_type:
      name: Type kragefeste til trommehode
      description: Angir trommeskinnets kant- og kragekonstruksjon (f.eks. krageprofil
        og ringmateriale), noe som kan påvirke passform og stemmestabilitet mot visse
        kjeler og ringer.
    drum_head_hoop_rim_material:
      name: Materiale for trommeskinnbøyle/-kant
      description: Materialet i kjøttbøylen/kanten (den integrerte bøylen inni skinnet),
        som kan påvirke holdbarhet og stemmingsstabilitet.
    drum_head_included:
      name: Trommeskinn inkludert
      description: Angir om trommeskinn og/eller resonanshoder er inkludert.
    drum_head_muffling_feature:
      name: Lyddempefunksjon i trommehode
      description: Innebygde overtonekontrollfunksjoner integrert i trommeskinnet.
    drum_head_muffling_type:
      name: Dempingstype for trommeskinn
      description: Angir om trommeskinnet har innebygde overtonekontroll-/dempingelementer.
    drum_head_ply_count:
      name: Antall trommeskinnlag
      description: Antall filmlag/-lag som brukes i trommeskinnets konstruksjon (f.eks.
        1-lags, 2-lags).
    drum_head_position:
      name: Trommelhodeposisjon
      description: Angir om trommeskinnet er ment som et batter- (topp/strike-) skinn,
        resonant- (bunn-) skinn, skarptromme-side- (bunn-) skinn, eller kan brukes
        begge veier.
    drum_head_reinforcement_type:
      name: Type forsterkning av trommeskinn
      description: Angir om skarptrommeskinnet har forsterkningsfunksjoner som en
        senterprikk eller kontrollring for å øke holdbarheten og fokustonen.
    drum_head_surface_finish:
      name: Overflatebehandling på trommehode
      description: Overflatetekstur/finish på hodet som påvirker angrep og børsterespons.
    drum_head_type:
      name: Trommeskinntype
      description: Angir skinnkonstruksjonen/typen som brukes på trommen (primært
        for slag-/resonansskinn som levert).
    drum_key_design_type:
      name: Designtype for trommenøkkel
      description: Beskriver den funksjonelle utformingen av strammetrommelnøkkelen
        (f.eks. standard, skralle, T-referanse).
    drum_key_drive_type:
      name: Drivtype for trommelnøkkel
      description: Angir driv-/grensesnittstilen til trommelnøkkelen som brukes til
        å aktivere spennstangen eller monteringsmaskinen.
    drum_key_handle_style:
      name: Trommelnøkkelreferansestil
      description: Beskriver trommetangentens referanse/ergonomiske stil, som påvirker
        komfort og innflytelse under stemming.
    drum_kit_included_items:
      name: Trommesett inkludert
      description: Lister opp hvilke viktige varer som er inkludert i trommesettpakken
        utover skall/pads (f.eks. maskinvare, cymbaler, trone).
    drum_kit_portability:
      name: Bærbarhet av trommesett
      description: Angir om settet er konstruert for kompakt oppbevaring/transport
        (f.eks. reise/kompakt/sammenleggbar).
    drum_kit_shell_construction_features:
      name: Konstruksjonsfunksjoner for trommesettskall
      description: Hvordan skallene er konstruert (tall/type lag), som påvirker tone
        og holdbarhet.
    drum_mount_clamp_type:
      name: Klemmetype for trommemontering
      description: Beskriver klemmeformfaktoren som brukes i trommelmonteringsmaskinvare.
    drum_multi_clamp_clamp_type:
      name: Trommel multiklemme klemmetype
      description: Den funksjonelle stilen/konfigurasjonen til multiklemmen (hvordan
        den klemmer og hva den kobles sammen).
    drum_mute_material:
      name: Trompedempingsmateriale
      description: Angir hovedmaterialet i trommedemperen som er i kontakt med trommeskinnet
        og/eller demper vibrasjoner.
    drum_pad_triggering_zones:
      name: Trommepad utløsersoner
      description: Angir antall/type utløsersoner som støttes av tammepaden (f.eks.
        kun skinn vs. skinn+kant), noe som påvirker uttrykksevne og moduler.
    drum_pedal_accessories_included:
      name: Inkludert trommepedal-tilbehør
      description: Viser en liste over viktige tilbehør og komponenter som følger
        med trommepedalen.
    drum_pedal_baseplate_type:
      name: Trommepedalens baseplatetype
      description: Angir om pedalen bruker en baseplate eller et flytende/rammeløst
        design.
    drum_pedal_bearing_type:
      name: Trommelpedallagertype
      description: Spesifiserer lagermekanismen som brukes ved primære dreiepunkter
        (f.eks. vippearm, kreng, kam).
    drum_pedal_cam_type:
      name: Stangtype for trommepedal
      description: Spesifiserer former/geometrien til en trommepedal som påvirker
        følelsen og responsen (f.eks. lineær vs. akselerator).
    drum_pedal_chain_configuration:
      name: Konfigurasjon av trommepedalkjede
      description: Angir kjedearrangementet som brukes av en kjededrevet trommepedal
        (f.eks. enkelkjede, dobbelkjede eller offsetkjede).
    drum_pedal_chain_type:
      name: Kjedetype for trommepedal
      description: Indikerer hvilken type kjede som brukes i drivverket (f.eks. rullekjede
        vs. sykkelkjede), noe som kan påvirke jevnhet og holdbarhet.
    drum_pedal_clamp_type:
      name: Trommepedalklemmetype
      description: Angir hvordan pedalen festes til basstrommebøylen.
    drum_pedal_intended_use:
      name: Tiltenkt bruk av trommepedal
      description: Angir den primære kontekst remdriftspedalen er designet/merket
        for.
    drum_pedal_spring_adjustment_method:
      name: Justeringsmetode for trommepedalfjær
      description: Indikerer hvordan fjærspenningen justeres på pedalen.
    drum_pedal_spring_type:
      name: Fjærtype for trommepedal
      description: Angir fjærmekanismen som brukes for pedalretur.
    drum_shell_material:
      name: Materiale i trommekropp
      description: Spesifiserer det primære kjelekonstruksjonsmaterialet for akustiske
        trommer (f.eks. lønn, bjørk, akryl).
    drum_shell_wood_species:
      name: Trommeskalltresorter
      description: Identifiserer treslaget som brukes til trommeskallet, Influence
        og resonans.
    drumhead_type:
      name: Trommeskinntype
      description: Hodekonfigurasjon/-type brukt på Octoban.
    drumstick_model:
      name: Trommestikkmodell
      description: Standardisert trommestikkmodell/størrelsesbetegnelse brukt av mange
        merkevare (f.eks. 5A, 7A).
    drumstick_taper:
      name: Trommestikkkoning
      description: Beskriver konprofilen fra skaft til spiss, påvirkning og balanse.
    drysuit_footwear_style:
      name: Stil av tørrdraktfottøy
      description: Beskriver den integrerte leggfinishen på tørrdrakten (f.eks. innebygde
        støvler, neoprensokker, strømpefot eller bare ankeltettinger).
    dumbbell_style:
      name: Hantelstil
      description: Identifiserer den grunnleggende utformingen av manualen – enten
        det er en fast enhet, et justerbart system eller en belastbar referansestil
        – som sterkt Influence kjøpsbeslutninger og bruk av treningsøkter.
    dundun_playing_position:
      name: Dundun spillerposisjon
      description: Tiltenkt spille-/bæreposisjon for trommen.
    dye_status:
      name: Fargestoffstatus
      description: Angir om vattfyllet er farget, ufarget/naturlig, eller inneholder
        flere farger/blandinger.
    dye_style:
      name: Fargestil
      description: Angir om trådfargen er ensfarget, spraglete eller på annen måte
        spesialfarget.
    dye_technique:
      name: Fargeteknikk
      description: Metode som brukes til å farge fiberen (f.eks. håndfarget, kjelefarget,
        romfarget).
    dye_type_needlecraft_fabric:
      name: Fargestofftype (håndarbeidsstoff)
      description: Angir om linstoffet er ensfarget, håndfarget eller spesialfarget.
    dyeing_color_processing:
      name: Farging/fargebehandling
      description: Beskriver om og hvordan fiberen ble farget (f.eks. ufarget, bleket/hvit
        eller spesifikke fargeteknikker).
    e_bike_certification_class:
      name: Sertifiseringskurs for elsykkel
      description: Angir dekkets offisielle hastighetsklassifisering for elsykler
        (f.eks. E-25, E-50).
    e_bike_speed_rating:
      name: Fartsvurdering for elsykkel
      description: Angir det offisielle elsykkelsertifiseringsnivået for dekket (f.eks.
        E25 for ≤25 km/t, E50 for ≤50 km/t).
    e_scooter_connector_type:
      name: El-sparkesykkel koblingstype
      description: Identifiserer typen elektrisk kobling eller støpsel som brukes
        av komponenten til strøm- eller signalforbindelse.
    e_scooter_throttle_type:
      name: El-sparkesykkel strupet type
      description: Angir typen styreenhet som brukes til å kontrollere akselerasjonen
        på en el-sparkesykkel.
    ear_coverage:
      name: Ørebeskyttelse
      description: Angir om hjelmen inkluderer hørselvern og om det er avtakbart.
    ear_coverage_style:
      name: Øredeksel-stil
      description: Beskriver hvordan, eller om, ørene er dekket av fluemasken.
    ear_coverage_type:
      name: Type øredekning
      description: Spesifiserer hvordan hatten dekker eller beskytter ørene, inkludert
        tilstedeværelsen og stilen på øreklaffer.
    ear_guard_type:
      name: Type ørebeskyttelse
      description: Beskriver typen hørselvern som er integrert i hetten, for eksempel
        hardplast, polstret eller avtakbar beskyttelse.
    earmuff_style:
      name: Øreklokkestil
      description: Identifiserer hvordan øreklokken brukes eller dens strukturelle
        designstil (f.eks. over hodet eller omsluttende bak hodet).
    earring_closure_type:
      name: Lukketype for ørering
      description: Angir mekanismen som brukes for å feste øredobben til øret (f.eks.
        push-back, leverback, clip-on).
    easel_art_desk_features:
      name: Funksjoner på staffeli og kunstpult
      description: Highlight vanlige funksjonelle funksjoner som følger med staffeliet
        eller kunstpulten.
    easel_art_desk_surface_type:
      name: Overflatetype for staffeli og kunstpult
      description: Identifiserer den/de brukbare tegne-/skriveflatene som er tilgjengelige
        (f.eks. tavle, hvit tavle, papir, magnettavle).
    eb_clarinet_body_type:
      name: Type kropp for EB-klarinett
      description: Angir om Eb-klarinetten er en sopran- eller variant.
    eco_material_type:
      name: Øko-materialetype
      description: Fremhever det miljøbevisste skummet eller materialteknologien som
        brukes i puten.
    edge_construction:
      name: Kantkonstruksjon
      description: Angir om skien har en metallkant langs ingen, deler av eller hele
        lengden.
    edge_tuner_type:
      name: Kanttunertype
      description: Klassifiserer stilen til kantjustereren for ski eller snowboard,
        for eksempel en filguide eller elektrisk maskin.
    edible_plant_part:
      name: Spiselig plantedel
      description: Angir hvilken del av planten som selges til konsum.
    educational_guide_included:
      name: Pedagogisk guide inkludert
      description: Angir hvilket læringsmateriell som er inkludert i modellen.
    educational_topic:
      name: Pedagogisk emne
      description: Primært læringsemne støttet av maurfarmens pedagogiske materiale.
    egg_component:
      name: Eggkomponent
      description: Identifiserer hvilken del av egget produktet inneholder, for eksempel
        hele egg, kun hvitt, eggeplommer eller blandinger/erstatninger.
    egg_component_replaced:
      name: Eggkomponenten er byttet ut
      description: Angir hvilken del av egget produktet skal erstatte (f.eks. helt
        egg, hvitt egg).
    egg_enrichment:
      name: Eggberikelse
      description: Angir eventuell næringsberikelse tilsatt eggene, for eksempel omega-3
        eller vitamin D-berikelse.
    egg_farming_method:
      name: Eggoppdrettsmetode
      description: Angir produksjons- eller oppdrettsmetoden som brukes for eggene
        (f.eks. frittgående, økologisk).
    egg_grade:
      name: Eggkvalitet
      description: Angir kvalitetskarakteren som er tildelt av regulerings- eller
        bransjeorganer.
    egg_processing_state:
      name: Eggforedlingsstatus
      description: Angir enhver bearbeiding som er brukt på eggene før salg (f.eks.
        ferske, saltede, andre egg).
    egg_production_method:
      name: Eggproduksjonsmetode
      description: Spesifiserer jordbruks- eller oppstallingssystemet som brukes til
        å produsere eggene (f.eks. burfritt, beiteoppdrettet, økologisk).
    egg_replacer_main_ingredient:
      name: Hovedingrediens i eggerstatning
      description: Angir den primære basisingrediensen som eggerstatningen er laget
        av, noe som hjelper brukere med kostholdsbehov eller ønskede bakeegenskaper.
    egg_size:
      name: Eggstørrelse
      description: Klassifiserer egg etter standard merkede størrelsesbetegnelser.
    egg_source_animal:
      name: Eggkildedyr
      description: Identifiserer dyrearten som produserte eggene.
    egg_white_processing_method:
      name: Metode for bearbeiding av egghvit
      description: Indikerer hvordan eggehvitene ble bearbeidet etter prøvetaking
        (f.eks. pasteurisert, spraytørket), noe som påvirker mattrygghet, holdbarhet
        og bruk.
    eggplant_variety:
      name: Auberginevariant
      description: Spesifiserer kultivaren eller den merkede varianten av aubergine,
        slik at kunden kan velge typer som avviker i størrelse, smak, farge og kulinarisk
        bruk.
    eggshell_color:
      name: Eggeskallfarge
      description: Angir den dominerende skallfargen på eggene.
    elastic_edge_finish_type:
      name: Elastisk kantfinish/type
      description: Spesifiserer kantkonstruksjonen til den vevde elastikken som påvirker
        komforten og bruken.
    elastic_intended_use:
      name: Elastisk tiltenkt bruk
      description: Primærapp elastikken er designet for (hjelper med å oppdage og
        reduserer uoverensstemmelser).
    elastic_recovery_performance:
      name: Elastisk gjenopprettingsytelse
      description: Beskriver hvor godt den vevde strikken går tilbake til sin opprinnelige
        lengde etter strekking.
    elastic_recovery_quality:
      name: Elastisk gjenopprettingskvalitet
      description: Indikerer strikkens strekkgjenoppretting – hvor godt den går tilbake
        til sin opprinnelige lengde etter å ha blitt strukket.
    elastic_stretch_level:
      name: Elastisk strekknivå
      description: Hvor mye strikken kan strekke seg under spenning (ofte uttrykt
        som relative nivåer når nøyaktig % ikke er oppgitt).
    elastic_structure:
      name: Elastisk struktur
      description: Spesifiserer den strukturelle konstruksjonen av knapphullsstrikk
        (f.eks. strikket, vevd, flettet), som kan påvirke strekk, gjenoppretting og
        syytelse.
    elastic_type:
      name: Type elastikk
      description: Angir konstruksjonstypen til strikken (f.eks. brettbar strikk (FOE),
        flettet, strikket, vevd).
    electric_assist_type:
      name: Elektrisk assistansetype
      description: Angir om sykkelen har motorassistanse og hva slags assistanse som
        gis.
    electric_bicycle_motor_position:
      name: Plassering av elektrisk sykkelmotor
      description: Lokalisering av drivmotoren på elsykkelen, for eksempel midthjulsdrift,
        fornav, baknav eller dobbeltnav.
    electric_bike_class:
      name: Elsykkelkurs
      description: Kategoriserer elsykkelen i henhold til forskriftsklasser som definerer
        fartsgrenser og støtdemperassistanse.
    electric_guitar_bridge_type:
      name: Elektrisk gitar brotype
      description: Angir typen bro/vibrato-system på elgitaren.
    electric_instrument_output_connection_type:
      name: Elektrisk instrumentutgangsforbindelsestype
      description: Angir den/de fysiske lydutgangsforbindelsen(e) som er tilgjengelig
        på den elektriske celloen.
    electric_riding_vehicle_control_options:
      name: Kontrollalternativer for elektriske kjøretøy
      description: Kontroll-/betjeningsalternativer tilgjengelig for føreren/forelderen
        (f.eks. pedal, ratt, fjernkontroll).
    electric_spinning_wheel_speed_control_type:
      name: Elektrisk hastighetskontroll av spinnehjul
      description: Beskriver hvordan brukeren justerer sentrifugehastigheten på det
        elektriske hjulet.
    electric_ukulele_output_jack_type:
      name: Elektrisk ukulele utgangsjacktype
      description: Angir den fysiske utgangskoblingen som brukes av den elektriske
        ukulelen.
    electric_van_body_length_class:
      name: Lengdeklasse for elektrisk varebilchassis
      description: Vanlig akselavstands-/lengdebasert varebilstørrelsesklasse brukt
        i oppføring.
    electric_van_roof_height_class:
      name: Høydeklasse for elektrisk varebiltak
      description: Vanlig takhøydeklassifisering brukt for varebiler (spesielt varebiler).
    electric_vehicle_drivetrain_layout:
      name: Layout for elektriske kjøretøy
      description: Motor-/akselkonfigurasjon som beskriver hvor mange motorer og hvor
        de er plassert (utover enkel firehjulsdrift/forhjulsdrift/bakhjulsdrift).
    electric_winder_accessories_included:
      name: Tilbehør til elektrisk opptrekker inkludert
      description: Viser en liste over tilbehør som følger med den elektriske vikleren
        (f.eks. klemmer, adaptere).
    electrical_connector_type:
      name: Elektrisk tilkoblingstype
      description: Angir koblingsstilen som brukes av dørlåsen/låsesystemet for elektrisk
        integrasjon (hvis aktuelt).
    electrical_system_voltage:
      name: Spenning på det elektriske systemet
      description: Angir den nominelle spenningen i kjøretøyets elektriske system
        som regulatoren er konstruert for.
    electronic_cymbal_trigger_zones:
      name: Elektronisk cymbal utløsersoner
      description: Angir hvor mange uavhengige utløsersoner cymbalpaden tilbyr (f.eks.
        bue/kant/klokke).
    electronic_drum_module_audio_interface_functionality:
      name: Funksjonalitet for lydgrensesnitt for elektroniske moduler
      description: Angir om moduler kan fungere som et USB-lydgrensesnitt for opptak/avspilling
        (i tillegg til MIDI).
    electronic_drum_module_metronome_features:
      name: Funksjoner i metronom for elektroniske moduler
      description: Spesifiserer innebygd praksis/metronomfunksjonalitet.
    electronic_drum_module_power_source:
      name: Strømkilde for elektroniske moduler
      description: Angir den nødvendige eller støttede strømkilden for moduler.
    electronic_drum_module_sample_import_support:
      name: Elektronisk trommelmodul prøveimportstøtte
      description: Angir om modulen kan importere brukereksempler og med hvilken metode.
    electronic_drum_pad_playing_surface_type:
      name: Elektronisk trommepad spilleflatetype
      description: Beskriver spilleoverflatekonstruksjonen til tammepaden (f.eks.
        nettingskinn kontra gummi), som påvirker rebound, støy og følelse.
    electronic_features:
      name: Elektroniske funksjoner
      description: Indikerer elektroniske/interaktive funksjoner som er inkludert
        i spillbanktilbudet (hvis noen).
    electronic_lights_and_sound:
      name: Elektronisk lys og lyd
      description: Angir om dukkehussettet inkluderer elektroniske lys og/eller lydfunksjoner
        (f.eks. lys, ringeklokke, musikk, lydeffekter).
    electronics_power_source:
      name: Elektronisk strømkilde
      description: Angir hvordan aktiv elektronikk drives (hvis aktuelt).
    eligible_race_series:
      name: Kvalifiserte løpsserier
      description: Løpsserien eller sanksjonsorganet bilen er kvalifisert til å konkurrere
        i.
    elliptical_trainer_part_type:
      name: Deltype for elliptisk trener
      description: Klassifiserer den spesifikke typen tilbehør eller reservedel for
        en ellipsemaskin (f.eks. belte, konsoll, pedal) slik at kunder raskt kan filtrere
        til det de trenger uten å navigere i mange mikrokategorier.
    embellishment_technique:
      name: Utsmykningsteknikk
      description: Informasjon om det primære dekorative eller overflatearbeidet som
        er påført plagget, for eksempel broderi, trykk eller perlearbeid.
    embellishment_type:
      name: Utsmykningstype
      description: Identifiserer typen dekorativt element som er brukt på strømpebåndet,
        for eksempel blonder, sløyfer eller perler.
    embossing_pen_ink_color:
      name: Pregepennblekk farget
      description: Angir fargen på blekket som avsettes av pregepennen (kan være gjennomsiktig/klebrig
        eller pigmentert). Distinkt fra penn-/tønnefargen.
    embossing_stylus_tip_shape:
      name: Former på pregepennspiss
      description: Beskriver geometrien til pregespissen som brukes til å lage forskjellige
        effekter (f.eks. kuleformet vs. spiss).
    embroidered_coverage_level:
      name: Brodert dekningsnivå
      description: Omtrentlig mengde brodert tråddekning på lappens forside.
    embroidered_patch_backing_type:
      name: Brodert lappbaksidetype
      description: Baksiden/støttelaget på baksiden av den broderte lappen som påvirker
        holdbarheten og hvordan den kan påføres.
    embroidery_hoop_type:
      name: Broderiringtype
      description: Identifiserer konstruksjonsstilen til broderiringen og dens primære
        strammemekanisme.
    embroidery_machine_bobbin_type:
      name: Broderimaskin spoletype
      description: Type/lastestil for spolesystem.
    emergency_lighting_configuration:
      name: Konfigurasjon av nødbelysning
      description: Angir den primære installerte konfigurasjonen av nødvarsellys på
        kjøretøyet (f.eks. taklysbjelke, grilllys).
    emergency_lighting_package:
      name: Nødbelysningspakke
      description: Spesifiserer hvilke typer nødvarsellys som er installert.
    emissions_compliance_standard:
      name: Utslippssamsvarsstandard
      description: Angir utslippssertifisering/samsvar for motoren der det er aktuelt.
    emissions_standard:
      name: Utslippsstandard
      description: Utslippssamsvarsstandard for kjøretøyet (varierer etter område
        og år).
    enclosure_panel_configuration:
      name: Konfigurasjon av kabinettpanel
      description: Angir hvilke kabinettpaneler eller sider som er inkludert (dekningskonfigurasjon),
        for eksempel full kabinett, kun sidegardiner eller 3-sidig (åpen foran/bak).
    enclosure_window_material:
      name: Materiale for innkapslingsvindu
      description: Identifiserer materialet som brukes til de gjennomsiktige vinduspanelene
        i innhegningen.
    end_fitting_type:
      name: Endekoblingstype
      description: Tilkoblingsstilen som brukes i hver ende av staget (kjøretøyside
        og lokkside), som bestemmer monteringskompatibilitet.
    end_type:
      name: Slutttype
      description: Angir avslutning/festestil på endene av slepestroppen for tilkobling
        til gjenopprettingspunkter.
    ends_style_blocking_wires:
      name: Endestil (blokkerende ledninger)
      description: Hvordan endene av blokkeringstråden er ferdigbehandlet for sikkerhet
        og enkel træing gjennom blondekantene.
    enduro_bike_suspension_adjustability:
      name: Justerbar fjæring på endurosykkel
      description: Angir hvilke fjæringsjusteringer som er tilgjengelige (vanligvis
        for forgaffel og bakdemper).
    engine_bay_mounting_location:
      name: Motor fagmonteringssted
      description: Der overløpstanken er ment å monteres i motorens ventil (relativ
        posisjon).
    engine_bearing_coating:
      name: Overflatebehandling for motorlager
      description: Spesifiserer eventuelle overflatebelegg på lageret (for slitestyrke,
        innebyggbarhet, redusert friksjon).
    engine_bearing_position:
      name: Motorlagerposisjon
      description: Spesifiserer lokaliseringen/funksjoner til lageret i motoren.
    engine_bearing_size:
      name: Størrelse på motorlager
      description: Angir om lageret er standard størrelse eller en underdimensjonert/overdimensjonert
        variant (vanligvis knyttet til veivsliping og opphørssalg).
    engine_configuration:
      name: Motorkonfigurasjon
      description: Beskriver motorens layout/konfigurasjon (f.eks. rekkesylinder,
        V-sylinder, flat/boxer-sylinder).
    engine_cooling_type:
      name: Motorkjølingstype
      description: Angir motorens kjølemetode.
    engine_degreaser_form:
      name: Form for motoravfettingsmiddel
      description: Det fysiske formatet/leveringsformen til motoravfettingsmiddelet.
    engine_degreaser_rinse_requirement:
      name: Krav om skylling av motoravfettingsmiddel
      description: Om avfettingsmiddelet er ment å skylles med vann etter påføring.
    engine_mount_type:
      name: Motorfestetype
      description: Spesifiserer den funksjonelle utformingen av motorfestet (f.eks.
        hydraulisk, solid, momentstøtte).
    engine_oil_formulation:
      name: Formulering av motorolje
      description: Indikerer fokuset på motoroljens formulering, for eksempel standard
        bruk, lang kjørelengde, lengre oljeskiftintervaller eller bruk for flåte-/tungtrafikk.
    engine_oil_specification:
      name: Spesifikasjon for motorolje
      description: Spesifikasjonen/standarden oljen oppfyller (f.eks. API SP, API
        SN Shopify Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Motorreparasjonssett innhold
      description: Identifiserer hvilke hovedkomponenter som er inkludert i motorreparasjonssettet.
    engine_rotation_direction:
      name: Motorens rotasjonsretning
      description: Angir motorens rotasjonsretning som brukes i marinappen.
    engine_timing_system_drive_type:
      name: Motorens timingsystems drivtype
      description: Angir om motorens registersystem er remdrevet, kjededrevet eller
        girdrevet for kompatibilitetsmatching.
    engine_valve_coating:
      name: Overflatebehandling for motorventil
      description: Identifiserer eventuell overflatebehandling eller belegg påført
        ventilen for slitasje-/varmebestandighet.
    engine_valve_position:
      name: Motorventilposisjon
      description: Angir om motorventilen er beregnet for inntakssiden eller eksossiden
        av motoren.
    engine_valve_stem_tip_type:
      name: Motorens ventilstammespisstype
      description: Spesifiserer ventilstammespissens stil eller konstruksjon ved kontaktpunktet
        med vippearmen eller justeringen.
    engine_valvetrain_type:
      name: Motorens ventilstyringstype
      description: Ventiltog/kamaksel-arrangement.
    enhancement_level:
      name: Forbedringsnivå
      description: 'Omtrentlig volumøkning gitt av innlegget, uttrykt i koppstørrelse:
        Subtil (opptil 1 kopp), Moderat (1–2 kopper), Signifikant (2+ kopper).'
    entry_zipper_location:
      name: Innstigningsglidelåsens plassering
      description: Angir hvor den primære glidelåsen eller åpningen på drakten er
        plassert (f.eks. foran, bak, på skulderen, diagonalt).
    epee_point_type:
      name: Kårde-punkttype
      description: Angir merke eller standard på punktet som er installert på bladet,
        noe som påvirker kompatibilitet og vedlikehold.
    equestrian_discipline:
      name: Ridesportdisiplin
      description: Angir hvilken ridedisiplin sporen er beregnet på eller mest egnet
        for.
    equestrian_helmet_safety_certification:
      name: Sikkerhetssertifisering for ridehjelmer
      description: Spesifiserer sikkerhetsstandarden(e) eller sertifiseringene som
        hjelmen er i samsvar med.
    equine_application_area:
      name: Bruksområde for hest
      description: Spesifiserer kroppsområdet eller materialet produktet er beregnet
        på (f.eks. hov, mane, tau).
    equipment_contact_material_brew_wine:
      name: Kontaktmateriale for utstyr (brygging/vin)
      description: Primærmaterialet i varen som er i kontakt med væsken (f.eks. glass,
        rustfritt stål, plast).
    eu_children_clothing_size:
      name: EU-barneklestørrelse
      description: Angir EU-barnestørrelse etter høyde, for eksempel 104 eller 140
    eu_clothing_size:
      name: EU-klesstørrelse
      description: Angir EU-størrelsen for klær, f.eks. 38 eller 46
    eu_cup_size:
      name: EU-koppstørrelse
      description: Angir EUs BH-koppstørrelse, for eksempel C eller E
    eu_ring_size:
      name: EU-ringstørrelse
      description: Angir EU-ringstørrelsen etter omkrets, for eksempel 52 eller 63
    eu_shoe_size:
      name: EU-skostørrelse
      description: Angir EU-skostørrelsen, for eksempel 42 eller 42 bred
    euphonium_included_accessories:
      name: Euphonium inkludert tilbehør
      description: Lister som er inkludert, var vanligvis pakket med et euphonium
        (f.eks. munnstykke, eske).
    euphonium_valve_configuration:
      name: Konfigurasjon av euphoniumventilen
      description: Angir antall ventiler og om den fjerde ventilen betjenes manuelt
        eller med en sidemekanisme.
    european_sword_historical_period:
      name: Europeisk sverd historisk periode
      description: Primær historisk periode sverdmønsteret/replikaen er basert på
        (eller originalens æra).
    european_sword_pattern_type:
      name: Europeisk sverdmønster/-type
      description: Spesifikt europeisk sverdmønster/-type (typologi) representert
        av samlesverdet.
    ev_connector_adapter_direction:
      name: EV tilkobling/adapter retning
      description: Angir hva adapterkonvertereren konverterer FROM og TO (kjøretøyets
        inntaksside vs. lader-/kabelside), noe som muliggjør nøyaktig kompatibilitetsfiltrering.
    ev_conversion_kit_completeness_level:
      name: Fullstendighetsnivå for EV-veksling/veksling
      description: Angir om produktet er en full endring/vekslingssett eller en delvis
        sett/pakke (f.eks. kun motor+kontrollør/behandlingsansvarlig).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfigurasjon av drivverket for EV-veksling/veksling
      description: Spesifiserer drivlinjearkitekturen til et elbilkonverterings-/vekselsett,
        inkludert motorplassering/ layout og om den beholder den eksisterende girkassen.
    ev_conversion_kit_voltage_class:
      name: EV-veksling/veksling sett spenningsklasse
      description: Nominell systemspenningsklasse (bøtte) EV-vekslings-/vekslingsinnstillingen
        er designet rundt. Bruk dette til filtrering etter vanlige systemspenningsklasser
        i tillegg til den nøyaktige spenningsmålingen.
    evaporator_core_type:
      name: Fordamperkjernetype
      description: Spesifiserer konstruksjonsdesignet til en fordamperkjerne for klimaanlegg
        i biler.
    evenweave_fabric_finish_treatment:
      name: Evenweave-stoffets finish/overflatebehandling
      description: Angir eventuell forbehandling eller etterbehandling av stoffet
        som påvirker ekspedering eller utseende.
    evenweave_fabric_package_format:
      name: Evenweave-stoffpakkeformat
      description: Hvordan stoffet selges (kuttet stykke kontra kontinuerlig per meter/meter).
    exercise_bike_accessory_part_type:
      name: Tilbehør/deltype for treningssykkel
      description: Beskriver de primære funksjoner eller komponenttypen til varen
        (f.eks. pedal, drivrem, flaskeholder, skjermdeksel, krankarm).
    exercise_bike_cushion_component:
      name: Komponent for pute på treningssykkel
      description: Angir den seterelaterte komponenten som leveres, for eksempel setepute,
        sal eller setetrekk.
    exercise_bike_metrics_tracked:
      name: Treningssykkel målestokk sporet
      description: Viser treningsdatafeltene som datamaskinen kan måle og vise i sanntid.
    exercise_mat_accessories_included:
      name: Tilbehør til treningsmatte inkludert
      description: Lister opp tilleggskomponenter som leveres med matten, for eksempel
        stropper eller knebeskyttere.
    exhaust_cooling_type:
      name: Eksoskjølingstype
      description: Angir om eksoskomponenten er beregnet for våteksossystemer (vannkjølt/vanninnsprøytet)
        eller tørreksos.
    exhaust_installation_position:
      name: Monteringsposisjon for eksosanlegg
      description: Angir hvor på kjøretøyet delen er montert.
    exhaust_outlet_configuration:
      name: Konfigurasjon av eksosutløp
      description: Angir layout for eksosutgangen bak på kjøretøyet.
    expansion_tank_cap_connection_type:
      name: Type ekspansjonstanklokk
      description: Den mekaniske forbindelsestypen som brukes til å feste og forsegle
        hetten til ekspansjonstankens hals.
    expansion_tank_cap_pressure_relief_feature:
      name: Trykkavlastningsfunksjon for ekspansjonstankens lokk
      description: Om og hvordan hetten gir trykk-/vakuumavlastningsfunksjonalitet.
    expansion_tank_cap_seal_material:
      name: Tetningsmateriale for ekspansjonstankens lokk
      description: Materialet i pakningen/tetningen som er i kontakt med ekspansjonstankens
        hals.
    extension_attachment_method:
      name: Forlengelsesfestemetode
      description: Indikerer hvordan forlengelsen festes til sykkelens cockpit/styre,
        noe som hjelper syklister med å bekrefte kompatibilitet med deres eksisterende
        oppsett.
    extension_bend_type:
      name: Forlengelsesbøyningstype
      description: Beskriver den geometriske stilen eller bøyningen på styreforlengelsen,
        som påvirker førerens ergonomi og aerodynamikk.
    extension_mechanism:
      name: Forlengelsesmekanisme
      description: Beskriver metoden et bord bruker for å bestemme lengden eller overflatearealet,
        hvis aktuelt.
    extension_table_features:
      name: Funksjoner for forlengelsesbord
      description: Highlight funksjonelle funksjoner som er spesifikke for forlengelsesbord
        til symaskiner.
    eyelet_grommet_installation_method:
      name: Monteringsmetode for malje og malje
      description: Spesifiserer hvordan maljen/maljen monteres/festes i materialet.
    eyewear_lens_shape:
      name: Former på brilleglass
      description: Indikerer linsens geometriske former, for eksempel sylindrisk eller
        sfærisk, som påvirker synsfelt, forvrengning og stil.
    eyewear_strap_material:
      name: Materiale i stropp til øyeplagg
      description: Angir materialet i den justerbare stroppen som fester vernebriller
        eller briller til brukerens hode.
    fabric_backing_type:
      name: Stoffbaksidetype
      description: Angir om den utskrivbare bomullen har en stabiliserende papir (og
        hvilken type), som avgjør om den kan mates gjennom standardskrivere.
    fabric_cut_format:
      name: Stoffkuttformat
      description: Angir snitt/format på lerretsstykket.
    fabric_end_use:
      name: Sluttbruk av stoff
      description: Identifiserer stoffets primære tiltenkte bruksområde (hva det er
        best brukt til).
    fabric_finish:
      name: Stoffoverflate
      description: Overflatebehandling/-behandling på silkestoffet påvirker glans,
        følelse og ytelse.
    fabric_intended_use:
      name: Tiltenkt bruk av stoff
      description: Primært anbefalte apper/prosjekter for linstoffet.
    fabric_opacity_level:
      name: Stoffets opasitetsnivå
      description: Angir hvor gjennomsiktig stoffet er, noe som påvirker behovet for
        lagdeling og fôr.
    fabric_patch_shape:
      name: Stofform
      description: Beskriver former på lapper som er inkludert i settet.
    fabric_repair_kit_application_method:
      name: Metode for reparasjon av stoffapper
      description: 'Angir hvordan reparasjonen påføres stoffet (f.eks. stryking, påsying,
        liming). '
    fabric_repair_kit_components_included:
      name: Komponenter til reparasjonssett for stoff inkludert
      description: Lister opp de spesifikke komponentene som følger med i settet (f.eks.
        plaster, tråd, nål, lim).
    fabric_repair_kit_intended_use:
      name: Tiltenkt bruk av stoffreparasjonssett
      description: Angir den vanlige reparasjonsoppgaven settet er designet for (f.eks.
        rifter, hull, falding).
    fabric_selling_format:
      name: Format for salg av stoff
      description: Spesifiserer hvordan stoffet selges (kontinuerlig lengde, forhåndskuttet
        stykke, rull/bolt eller prøve).
    fabric_stretch_level:
      name: Strekknivå for stoff
      description: Beskriver graden av elastisitet/stretch i stoffet, og hjelper kunden
        med å velge passende stoffer til tettsittende plagg eller strukturerte prosjekter.
    fabric_stretch_type:
      name: Strekktype for stoff
      description: Indikerer elastisiteten til boardshort-stoffet, noe som er viktig
        for mobilitet under surfing eller svømming.
    fabric_texture:
      name: Stofftekstur
      description: Beskriver overflatefølelsen eller strikkestrukturen til stoffet
        som brukes i loungewear-toppen.
    fabric_use_case:
      name: Tekstilbruk
      description: Primær tiltenkt bruk for satengstoffstykket/bolten.
    fabric_weight_class:
      name: Stoffets vektklasse
      description: Kategoriserer flanell etter typiske bruksvektbånd for å hjelpe
        kunden med å filtrere uten å vite nøyaktig GSM/oz.
    face_mask_material:
      name: Materiale i ansiktsmaske
      description: Materialsammensetningen til ansiktsmasken som følger med eller
        er kompatibel med hjelmen.
    face_mask_style:
      name: Ansiktsmaske-stil
      description: Definerer de overordnede former eller konstruksjonsstilen til den
        motemessige ansiktsmasken, og hjelper kundene med å finne sin foretrukne passform
        og estetikk.
    face_mask_style_code:
      name: Kode for stil av ansiktsmaske
      description: Definerer den strukturelle strekstilen eller bransjekodefamilien
        til ansiktsmasken (f.eks. ROPO, OPO, RJOP).
    face_protection_type:
      name: Type ansiktsbeskyttelse
      description: Angir typen ansiktsbeskyttelse som leveres med eller er innebygd
        i hjelmen, for eksempel bur eller visir.
    faceplate_security_features:
      name: Sikkerhetsfunksjoner i ansiktsplate
      description: Fanger opp tyveriavskrekking og tilgangsfunksjoner relatert til
        frontplaten utover grunnleggende design.
    facing_length:
      name: Lengde på ansiktet
      description: Angir munnstykkets overflatelengde (kurvelengde), som påvirker
        respons og valg av rørblad.
    fan_shroud_type:
      name: Viftedekseltype
      description: Angir deknings-/geometristilen til viftedekselet (f.eks. hel vs.
        halv vs. ring).
    farming_method:
      name: Matproduksjonsmetode
      description: Fremhever dyrevelferd eller dyreholdspraksis som brukes til å oppdrette
        dyrene, for eksempel frittgående eller økologisk.
    farming_practice:
      name: Jordbrukspraksis
      description: Identifiserer den primære dyrkingsmetoden som brukes for produktet
        (f.eks. konvensjonell, økologisk, hydroponisk).
    fascinator_style:
      name: Fascinator-stil
      description: Beskriver den strukturelle utformingen eller former til fascinatoren,
        slik at kundene raskt kan filtrere etter populære hattestiler.
    fastener_grade:
      name: Festekvalitet
      description: Angir boltens styrkegrad/klasse, for eksempel grad 8 eller klasse
        10.9, som bestemmer holdbarheten.
    fat_rendering_state:
      name: Fettgjengivelsestilstand
      description: Angir om fettet er utsmeltet, ikke-utsmeltet (rått) eller delvis
        utsmeltet, noe som påvirker hylleliv og kulinarisk app.
    fat_source:
      name: Fettkilde
      description: Identifiserer den primære fettkilden som brukes til å produsere
        smør, ghee eller margarin (animalsk eller plantebasert), og støtter allergi-
        og kostholdsfiltrering.
    faucet_hole_configuration:
      name: Konfigurasjon av kranhull
      description: Angir antall og plassering av forhåndsborede kranhull på servanttoppen.
    feather_application:
      name: Feather-appen
      description: Primær tiltenkt bruk eller anvendelse av Tūrkiya-fjærene for håndverk
        eller fabrikasjon.
    feather_attachment_format:
      name: Fjærfeste/format
      description: Hvordan de syntetiske fjærene klargjøres/selges for bruk (løse,
        på strekk, på tape osv.).
    feather_coloration_style:
      name: Fjærfargestil
      description: Beskriver hvordan farge påføres/vises på fjæren(e) (f.eks. ensfarget,
        spissfarget, gradient), uavhengig av basisfargeverdien.
    feather_component:
      name: Fjærkomponent
      description: Angir hvilken del/stil av påfuglfjæren som selges (f.eks. øyefjær
        vs. herl).
    feather_curvature:
      name: Fjærkrumning
      description: Fjærens generelle former/krumningsprofil.
    feather_finish:
      name: Fjærfinish
      description: Angir om strutsefjærene er naturlige eller har blitt bearbeidet
        (f.eks. farget eller bleket) for dekorativ bruk.
    feather_form:
      name: Fjærform
      description: Angir den fysiske formen på gåsefjærbitene som selges.
    feather_grade:
      name: Fjærkvalitet
      description: Total kvalitet/utvalgskarakter på fjæren for håndverk kontra utstillingsbruk.
    feather_part:
      name: Fjærdel
      description: Den delen/strukturen av den tyrkiske fjæren som selges (vanlig
        i håndverk og levering).
    feather_processing_type:
      name: Fjærbehandlingstype
      description: Hvordan fjærene har blitt bearbeidet for håndverk (f.eks. farget,
        bleket, naturlige/ufarget).
    feather_product_form:
      name: Fjærproduktform
      description: Den fysiske formen/snittet på fjærproduktet slik det selges (f.eks.
        løse fjær kontra boaer kontra frynser).
    feather_quantity_unit:
      name: Enhet for fjærmengde
      description: Definerer hvordan produktet selges (f.eks. per stykk, etter vekt,
        per bunt) for å støtte nøyaktig sammenligning på tvers av oppføringer.
    feather_source:
      name: Fjærkilde
      description: Angir den animalske opprinnelsen til fjærene som brukes i fjærballer.
    feather_stiffness:
      name: Fjærstivhet
      description: Relativ stivhet/stivhet til fjærmoggene/strukturen.
    feed_mechanism:
      name: Matemekanisme
      description: Indikerer hvordan baller mates inn i kastemaskinen.
    feed_purpose:
      name: Formålet med fôret
      description: Beskriver det primære ernæringsmessige eller funksjonelle målet
        med fôret eller tilskuddet.
    feeder_mechanism_type:
      name: Type foringsmekanisme
      description: Identifiserer dispenseringsmekanismen som materen bruker til å
        frigjøre fôr.
    feijoa_cultivar:
      name: Feijoa-kultivar
      description: Identifiserer den spesifikke kultivaren eller varianten av feijoa,
        ettersom forskjellige kultivarer tilbyr forskjellige smaker, størrelse og
        høstetidspunkter.
    felt_duty:
      name: Filt-tollskilt
      description: Spesifiserer tollplikter-klassifiseringen til tennisballen (f.eks.
        ekstra tollplikter, vanlig tollplikter) som påvirker levetiden på forskjellige
        underlag.
    felting_mold_intended_use:
      name: Tiltenkt bruk for filtform
      description: Hva formen er ment å lage eller brukes til i tovingsprosjekter.
    felting_pad_surface_material:
      name: Overflatemateriale for tovingspute
      description: Materialet som brukes på arbeidsflaten til toveputen/-matten som
        er i kontakt med fiberen/nålen.
    fencing_certification:
      name: Sertifisering av gjerder
      description: Lister opp offisielle styrende organer som godkjenner fektevåpenet
        (f.eks. FIE, USFA), med angivelse av konkurransers lovlighet og kvalitetsstandarder.
    fencing_connector_type:
      name: Gjerdekoblingstype
      description: Angir koblingskonfigurasjonen som brukes til å feste gjerdesnorer,
        stikkontakter eller sneller (f.eks. 2-pinne, 3-pinne, bajonett), og sikrer
        komponentkompatibilitet.
    fencing_discipline:
      name: Fektingdisiplin
      description: Angir fektevåpenet eller -disiplinen som produktet er designet
        for eller kompatibelt med.
    fencing_weapon_type:
      name: Type fektingvåpen
      description: Angir fektings- eller øvingsvåpenstilen treningshjelpemiddelet
        er kompatibelt med eller representerer, og hjelper brukerne med å finne passende
        utstyr.
    fender_finish_state:
      name: Fenderens overflatetilstand
      description: Indikerer at levert overflate/finish er klar til bruk med tanke
        på maling og montering.
    fender_pieces_included:
      name: Inkluderte skjermdeler
      description: Lister opp komponentene som leveres med produktet for å avklare
        om det er en enkelt skjerm eller et komplett sett med tilbehør.
    fender_type:
      name: Skjermtype
      description: Klassifiserer den generelle designen eller stilen til skjermen.
    fennel_trimming:
      name: Fennikelbeskjæring
      description: Angir hvilke plantedeler som følger med fennikelløken (f.eks. med
        blader, trimmet topp og rot).
    fennel_variety:
      name: Fennikelvariant
      description: Angir kultivaren eller den merkede varianten av fennikelløkene
        som selges.
    fermentation_application:
      name: Fermenteringsapp
      description: Identifiserer den primære matvaren eller drikken kulturen er designet
        for å fermentere (f.eks. ost, yoghurt, melkekefir, surdeigsprodukter).
    fermentation_method:
      name: Fermenteringsmetode
      description: Spesifiserer hvordan soyasausen ble produsert eller gjæret (f.eks.
        naturlig brygget, kjemisk hydrolysert).
    fermentation_vessel_material:
      name: Materiale for fermenteringsbeholder
      description: Primærmaterialet i gjæringsbeholderen som er inkludert i settet
        (hvis noen).
    ferrule_material:
      name: Hylsmateriale
      description: Spesifiserer materialet som brukes til akselhylsen (f.eks. Juma,
        fenol, polykarbonat, XTC eller ingen), påvirkning og trefffølelse.
    fia_homologation_certification:
      name: FIA-homologering/sertifisering
      description: Angir om bilen (eller sikkerhetscellen) er sertifisert/homologert
        og i henhold til hvilken standard.
    fiber_animal_source_type:
      name: Fiber av animalsk opprinnelse/type
      description: Dyret eller den primære kilden rovingen kommer fra (eller er syntetisk),
        for eksempel merinoull, alpakka eller plantefibre.
    fiber_luster_level:
      name: Fiberglansnivå
      description: Fiberens visuelle glans, fra matt til høyglans.
    fiber_preparation_processing_stage:
      name: Fiberforberedelse / -behandlingstrinn
      description: Angir hvordan skiven har blitt forberedt/behandlet for bruk (f.eks.
        kort vs. kjemmet, blandet, superwash).
    fiber_preparation_type:
      name: Type fiberpreparering
      description: Identifiserer hvordan fiberen er klargjort for håndarbeid (f.eks.
        kortvatt, trommelkort, forhåndsfiltark).
    field_hockey_ball_playing_surface:
      name: Spilleflate for landhockeyballer
      description: Identifiserer spilleflaten eller miljøet som ballen er designet
        for.
    field_hockey_ball_type:
      name: Type landhockeyball
      description: Kategoriserer landhockeyballen etter dens tiltenkte bruk eller
        spesielle funksjon.
    field_hockey_goal_size_standard:
      name: Standard størrelse på landhockeymål
      description: Klassifiserer målet i henhold til vanlige landhockeystandarder
        eller treningsstørrelse (f.eks. FIHs utendørsreglement, ungdom, Shop Mini).
    field_hockey_training_objective:
      name: Mål for trening i landhockey
      description: Definerer det primære ferdigheten eller fokusområdet treningshjelpemidlet
        er utformet for å forbedre.
    field_point_attachment_method:
      name: Feltpunktfestemetode
      description: Angir hvordan feltpunktet er festet til pilskaftet eller innsatsen
        (f.eks. skruing, liming).
    field_point_tip_style:
      name: Feltspissstil
      description: Definerer den geometriske stilen eller funksjonelle profilen til
        feltpunktspissen, som påvirker penetrasjon, fjerningsinnsats og lovlighet.
    fielding_glove_position:
      name: Fielding hanskeposisjon
      description: Identifiserer den defensive posisjonen eller bruken hansken er
        designet for i baseball- eller softballspill.
    fielding_training_focus:
      name: Fokus på felttrening
      description: Angir det primære ferdighetsområdet hjelpemiddelet er rettet mot
        under øvelsesøkt.
    fig_variety:
      name: Fig-variant
      description: Identifiserer den spesifikke kultivaren eller varianten av en fiken
        som er til salgs.
    figure_8_device_design:
      name: Figur 8 enhetsdesign
      description: Identifiserer den spesifikke konfigurasjonen av åttetallsenheten,
        som påvirker ekspederingsegenskaper og tiltenkt bruk.
    figure_finish_type:
      name: Figurfinishtype
      description: Indikerer overflaten/lakken på hestemodellfiguren (hvordan den
        ser ut/føles som et samleobjekt).
    figurine_scale:
      name: Figurens skala
      description: Skala/forhold mellom figuren og den virkelige emne (når aktuelt),
        f.eks. 1:6.
    fill_status:
      name: Fyllstatus
      description: Angir om gripedukken selges ferdigfylt, ufylt eller delvis fylt,
        noe som bestemmer fraktomkostnader og kjøperinnsats.
    filling_consistency:
      name: Fyllkonsistens
      description: Beskriver fyllets tekstur eller viskositet som leveres (f.eks.
        glatt krem, tykk frukt, pasta).
    filling_type:
      name: Fyllingstype
      description: Angir eventuelt hovedfyll eller creme inne i informasjonsskapsler.
    filtration_and_mother_status:
      name: Filtrering og mors status
      description: Angir om eddiken er filtrert, ufiltrert, rå eller inneholder «moren»,
        og henvender seg til forbrukere som søker probiotiske eller rå alternativer.
    filtration_method:
      name: Filtreringsmetode
      description: Materiale eller teknikk som brukes til å filtrere og rense vodkaen
        etter destillasjon.
    fin_box_system:
      name: Finnebokssystem
      description: Angir finneboksen eller monteringsgrensesnittet som kortet bruker,
        og bestemmer kompatibilitet med ettermarkedfinner.
    fin_buoyancy:
      name: Finneoppdrift
      description: Indikerer om finnen har positiv, nøytral eller negativ oppdrift
        i vann, som påvirker dykkers trim og utstyrsbalanse.
    fin_flex_rating:
      name: Fleksibilitetsrangering for finne
      description: Indikerer den relative stivheten eller fleksnivået til finnen,
        som påvirker den generelle ytelsen.
    fin_mounting_system:
      name: Monteringssystem for finne
      description: Definerer festegrensesnittet eller standarden som brukes for å
        feste finnen til kiteboardet (f.eks. FCS II, skrubar, 4-hulls), som sikrer
        kompatibilitet mellom finner og brett.
    fin_position:
      name: Finneposisjon
      description: Angir den tiltenkte monteringsposisjonen for finnen på brettet.
    fin_strap_type:
      name: Stroppetype for finne
      description: Angir typen stropp eller kundebevaringssystem som brukes for å
        feste finnen til hælen/foten.
    fin_template:
      name: Fin mal
      description: Kategoriserer den hydrodynamiske malen eller omrisset av surfebrettfinnen,
        påvirker svingstil, hastighet og generell brettfølelse.
    finger_count:
      name: Fingertelling
      description: Angir antall fingre som hansken, viften eller utløserreferansen
        er designet for å støtte.
    finger_coverage:
      name: Fingerdekning
      description: Angir hvor mye av fingrene som er dekket.
    finger_grip_adjustability:
      name: Justerbarhet av fingergrep
      description: Indikerer hvordan fingergrepet festes eller justeres for å passe
        til forskjellige håndstørrelser.
    finger_hole_configuration:
      name: Fingerhullkonfigurasjon
      description: Angir håndretningen til fingerhullene (høyrehendt, venstrehendt
        eller ambidextrous).
    finger_hole_count:
      name: Antall fingerhull
      description: Angir antall fingerhull i grepskinnet, en viktig stilforskjell
        mellom fingerløse, 2-hulls, 3-hulls og 4-hulls modeller.
    finger_pick_band_style:
      name: Fingerplekterbåndstil
      description: Stilen på båndet/løkken som festes til fingeren, noe som påvirker
        komfort og justerbarhet.
    finger_pick_blade_length:
      name: Lengde på fingerplukkerblad
      description: Lengden på plukkebladet som strekker seg ut fra båndet.
    finger_pick_blade_shape:
      name: Bladform på fingerplekter
      description: Form/profil på plukkebladet som kontakter strengene.
    finger_pick_size:
      name: Størrelse på fingerplukker
      description: Størrelse på fingerplekterens bånd/løkke for å passe til forskjellige
        finger- eller tommelomkretser (ikke instrumentstørrelse).
    finger_pick_wear_location:
      name: Lokalisasjon av fingerplekter
      description: Angir hvilket finger fingerpekeren er ment å brukes på, eller om
        produktet er et tommel-og-finger-sett.
    finger_protection:
      name: Fingerbeskyttelse
      description: Angir om hansken har beskyttelse av fingerryggen og om piggene
        er avtakbare.
    fingerboard_bearing_type:
      name: Gripebrettlagertype
      description: Angir lagertypen som brukes i gripebretthjul.
    fingerboard_grip_type:
      name: Grepstype på fingerbrett
      description: Angir materialet/typen gripeflate som brukes på gripebrettdekket.
    fining_agent_active_ingredient:
      name: Aktiv ingrediens i klaringsmiddel
      description: Primært klaringsmiddel eller klaringsmiddel som brukes i produktet.
    fining_agent_type:
      name: Type klareringsmiddel
      description: Spesifiserer kjemisk sammensetning eller materiale i klarings-/klaringsmiddelet
        for produkter som klarner rødvin.
    finish_after_baking:
      name: Ferdig etter steking
      description: Beskriver det typiske overflateutseendet etter herding/brenning.
    finish_effect:
      name: Fullfør effekt
      description: Beskriver spesielle overflate-/optiske effekter som er påført strass-steinen.
    finish_type:
      name: Finishtype
      description: Overflatebehandling påført ukulelekroppen.
    finished_product_format:
      name: Format for ferdig produkt
      description: Angir hvilken type duftprodukt settet er ment å lage.
    fire_pit_accessories_included:
      name: Inkludert tilbehør til bålgrop
      description: Lister opp viktig tilbehør som leveres med bålplassen, for eksempel
        glitter- eller lavasteiner, for å gi klarhet i hva som er i esken.
    firework_assortment_launch_type:
      name: Fyrverkeriutvalg-lansering
      description: Beskriver hvordan det inkluderte fyrverkeriet vanligvis tennes/skytes
        opp.
    firework_assortment_types_included:
      name: Fyrverkeriutvalg inkludert
      description: Identifiserer de primære fyrverkeritypene som er inkludert i sortimentet
        for å hjelpe kunder med å sammenligne pakker med stoff (f.eks. fontener, romerske
        lys, fyrverkeri).
    firework_effect_types:
      name: Typer fyrverkerieffekter
      description: Primære visuelle og/eller sensoriske effektfamilier produsert av
        sortimentet (velg alle som gjelder).
    firework_ignition_method:
      name: Metode for tenning av fyrverkeri
      description: Angir hvordan fyrverkeriet tennes eller initieres (f.eks. lunte
        eller elektrisk fyrstikk).
    firework_visual_intensity_level:
      name: Fyrverkeriets visuelle intensitetsnivå
      description: Total visuell intensitet/volum av gnister for fonteneeffekten.
    firing_mode:
      name: Avfyringsmodus
      description: Viser den valgbare eller primære Mode for airsoft-våpenet.
    first_day_cover_cachet_type:
      name: Stempeltype for førstedagsbrev
      description: Type cachet på førstedagsbrevet (f.eks. trykt, håndmalt).
    first_day_cover_cancellation_type:
      name: Type avbestilling av første dagsdekning
      description: Type/stil på poststempel påført første dag-konvolutt (f.eks. maskinstempel,
        håndstempel).
    first_day_cover_set_type:
      name: Første dagdekselsetttype
      description: Angir om omslaget representerer et enkeltnummer, et fullstendig
        sett eller et delsett/en kombinasjon.
    fishing_hook_size:
      name: Fiskekrokstørrelse
      description: 'Angir den standardiserte størrelsesbetegnelsen på fiskekroken
        (f.eks. #4, 1/0, 10/0), noe som hjelper sportsfiskere med å matche krokdimensjon
        til målart og agn.'
    fishing_hook_style:
      name: Fiskekrok-stil
      description: Identifiserer det spesifikke designet eller bøyemønsteret til den
        enkle kroken, som påvirker presentasjon, krokeeffektivitet og tiltenkt bruk.
    fishing_hook_type:
      name: Fiskekrok-type
      description: Beskriver krokkonfigurasjonen. Leveres med fiskeskje (hvis noen).
    fishing_line_application:
      name: Fiskelinebruk
      description: Identifiserer den tiltenkte bruken av fiskesnøret eller fortomsmaterialet
        (f.eks. fortom, hovedline, forse).
    fishing_line_buoyancy_type:
      name: Fiskesnøre oppdriftstype
      description: Klassifiserer hvordan snøret oppfører seg i vannkolonnen (f.eks.
        flytende, middels, synkende), og hjelper sportsfiskere med å velge en passende
        dybdepresentasjon.
    fishing_needle_purpose:
      name: Formål med fiskenålen
      description: Identifiserer nålens primære applikasjon i fiskeriggoppgaver.
    fishing_needle_types_included:
      name: Fiskenåltyper inkludert
      description: Viser de spesifikke nåle- eller riggverktøystilene som leveres
        i settet, slik at kunder raskt kan se settstoff.
    fit_profile:
      name: Passformprofil
      description: Beskriver det generelle snittet og silhuetten til puten, som påvirker
        mobilitet og dekning.
    fit_volume_classification:
      name: Klassifisering av tilpasset volum
      description: Kategoriserer støvelens totale indre volum som markert med merkevare
        (f.eks. LV for lavt volum).
    fitting_angle:
      name: Monteringsvinkel
      description: Angir bøyevinkelen til beslagsdelen (f.eks. rett, 45°, 90°). Bruk
        «Justerbar / svingbar» for beslag med variabel vinkel og «Annet» for uvanlige
        vinkler.
    flag_base_type:
      name: Flaggbasetype
      description: Definerer forankrings- eller basestilen som brukes for å feste
        hjørneflagget på forskjellige spilleflater.
    flag_design_theme:
      name: Flaggdesigntema
      description: Beskriver det primære designtemaet som er representert på flagget
        (f.eks. land/nasjonal, idrettslag, høytid), og støtter oppdagelse og filtrering
        for intensjonsbasert shopping.
    flag_mounting_method:
      name: Monteringsmetode for flagg
      description: Angir hvordan flagget festes til kjøretøyet (f.eks. antennefeste,
        tilhengerfeste, magnetisk).
    flag_type:
      name: Flaggtype
      description: Klassifiserer det spesifikke formålet eller stilen til golfflagget,
        for eksempel pinnetflagg, handlekurvflagg eller øvelsesflagg.
    flame_resistance_standard:
      name: Flammemotstandsstandard
      description: Angir den spesifikke standarden/sertifiseringen for flammehemming
        eller lysbuebeskyttelse som plagget oppfyller.
    flamenco_cajon_snare_system:
      name: Flamenco cajon skarptrommesystem
      description: Angir den interne skarptrommemekanismen som brukes til å fremheve
        den karakteristiske flamenco-summingen (eller ingen).
    flammability_compliance:
      name: Samsvar med brennbarhetskrav
      description: Spesifiserer gjeldende brennbarhetsstandard(er) som tekstilet oppfyller
        for kjøretøyinteriør.
    flannel_brushing_finish:
      name: Flanellbørstet overflate
      description: Angir om flanellen er børstet og på hvilken(e) side(r), samt hvor
        myk påvirker varmen og utseendet.
    flannel_use_type:
      name: Flanellbrukstype
      description: Primær tiltenkt app for flanellssnitt/bolt.
    flap_configuration:
      name: Flappekonfigurasjon
      description: Angir klaffstilen til salen, for eksempel monoflap eller dobbel
        klaff.
    flare_color:
      name: Flarefarge
      description: Fargen på det utsendte lyset/flammen (eller linsefargen for LED-bluss).
    flash_card_included_features:
      name: Funksjoner inkludert i flash-kort
      description: Fremhever funksjonelle lærings-/bruksfunksjoner som er inkludert
        i flashkortet.
    flavor_intensity:
      name: Smakintensitet
      description: Angir hvor konsentrert smakstilsetningsproduktet er, noe som hjelper
        brukerne med å bestemme riktig dosering (f.eks. standard styrke, superstyrke).
    flavor_solvent_base:
      name: Smaksbasert løsningsmiddelbase
      description: Identifiserer det primære transportmidlet eller løsemidlet som
        brukes i smakstilsetningen (f.eks. alkohol, propylenglykol, glyserin).
    fleece_fiber_animal_type:
      name: Fleecefiber dyretype
      description: Den animalske kilden til fleecefiberen (art).
    fleece_finish_surface:
      name: Fleece-overflate
      description: Beskriver overflaten/finishen til fleece (f.eks. anti-pill, børstet)
        som påvirker nuppingens ytelse, mykhet og utseende.
    fleece_preparation_method:
      name: Fleece-forberedelsesmetode
      description: Hvordan ullen forberedes/behandles for håndarbeid og spinning (fiberens
        tilstand).
    flesh_color:
      name: Kjøttfarge
      description: Angir melonens indre fruktkjøttfarge.
    fletching_orientation:
      name: Fletching-orientering
      description: Angir hvordan fletchingene er plassert på skaftet (f.eks. rett,
        forskjøvet, spiralformet), noe som påvirker pilens spinn og flugt.
    fletching_profile:
      name: Fletching-profil
      description: Definerer de geometriske formene eller snittet på fletchingen,
        som påvirker luftmotstand, opphørssalg, støy og generelle pilflyveegenskaper.
    flight_system_type:
      name: Flysystemtype
      description: Identifiserer konstruksjonsstilen til flyet, og skiller mellom
        sammenleggbare, støpte og integrerte fly-og-skaft-systemer.
    float_attachment_method:
      name: Festemetode for flyteelement
      description: Beskriver hvordan duppanordningen er festet til snøret (f.eks.
        slip eller fast), slik at sportsfiskere kan filtrere etter riggstil.
    float_design:
      name: Flytedesign
      description: Klassifiserer den generelle stilen eller typen til fiskeflåten
        (f.eks. bobber, waggler, blyant) slik at sportsfiskere raskt kan velge en
        modell som passer deres teknikk og tåleevne.
    float_raft_use_environment:
      name: Miljø for bruk av flyte-/flåte
      description: Primært tiltenkte vanninnstillinger for oppblåsbare enheter (basseng
        vs. rolig åpent vann vs. surfe), som gjenspeiler holdbarhets- og designforventninger.
    floatation:
      name: Flytasjon
      description: Om fyrtårnet er konstruert for å flyte i vann.
    floor_construction_type:
      name: Konstruksjonstype for gulv
      description: Spesifiserer utformingen av flåtegulvet (f.eks. selvlensende, drop-stitch)
        som påvirker drenering, stivhet og ytelse.
    floor_design:
      name: Gulvdesign
      description: Stil på bakkebelegg som leveres med innhegningen.
    floor_inclusion:
      name: Inkludering av gulv
      description: Angir om vestibulen har et gulv, og om dette gulvet er avtakbart.
    floor_mat_cleaning_method:
      name: Rengjøringsmetode for gulvmatter
      description: Indikerer produsentens anbefalte primære rengjøringsmetode for
        gulvmatten.
    floor_mat_edge_style:
      name: Gulvmatte kantstil
      description: Beskriver om matten har hevede kanter/kanter for å holde på søl
        og rusk.
    floor_mat_format:
      name: Gulvmatteformat
      description: Definerer det fysiske formatet eller stilen til gulvbeskyttelsesproduktet
        (f.eks. enkeltmatte, sammenlåsende filt, rull).
    floor_mat_retention_system:
      name: Gulvmatte kundebevaringssystem
      description: Angir metoden som brukes for å holde matten på plass.
    floor_mat_set_configuration:
      name: Konfigurasjon av gulvmattesett
      description: Angir hvilke posisjoner som er inkludert i pakken (f.eks. kun frontmontering,
        komplett sett).
    floss_sugar_granulation_grade:
      name: Floss sukkergranuleringskvalitet
      description: Beskriver krystallstørrelsen til sukkerblandingen (fin, medium,
        grov), som kan påvirke maskinytelsen og den endelige teksturen.
    floss_sugar_product_form:
      name: Produktform for tanntrådsukker
      description: Angir om flormelisen er klar til bruk, et smakskonsentrat som må
        blandes med basissukker, eller et fargeløst basissukker.
    flour_grind_texture:
      name: Melmalt tekstur
      description: Indikerer malingsstørrelsen eller teksturen til melet, for eksempel
        superfin, middels, grov eller steinmalt, noe som kan påvirke oppskriftens
        ytelse.
    flour_processing_method:
      name: Melbehandlingsmetode
      description: Fanger opp viktige bearbeidings- eller håndteringsmetoder som brukes
        på melet (f.eks. steinmalt, bleket, spiret, beriket) som Influence smak, farge
        eller næringsinnhold.
    flower_care_instructions:
      name: Instruksjoner for blomsterpleie
      description: Gir anbefalte stelltrinn spesifikt for ferske snittblomster (f.eks.
        trimming av stilker, bytte av vanningsfrekvens).
    flugelhorn_leadpipe_material:
      name: Flugelhorn-rørmateriale
      description: Materiale i munnrør-komponent (hvis angitt separat fra materialet
        i instrumentet generelt)
    flugelhorn_trigger_type:
      name: Flygelhorn utløsertype
      description: Angir om flygelhornet har en stemmeskrue og hvilken sleide/ventil
        den betjener.
    fluorescence_grade:
      name: Fluorescensgrad
      description: Indikerer diamantens fluorescensintensitet når den utsettes for
        UV-lys.
    fluorescence_under_uv:
      name: Fluorescens under UV
      description: Angir om/hvilken type fluorescens prøven viser under ultrafiolett
        lys.
    fluorocarbon_content:
      name: Fluorokarbonstoff
      description: Angir om voksen inneholder fluorkarbontilsetningsstoffer og i hvilken
        grad.
    flute_case_capacity:
      name: Fløytekapasitet
      description: Angir hva esken er designet for å holde, utover hovedfløytekroppen
        (f.eks. fløyte + piccolo, ekstra toppledd).
    flute_cleaning_rod_tip_type:
      name: Fløyte rengjøringsstangspiss type
      description: Beskriver utformingen av stangenden som holder kluten/pinnen eller
        er i kontakt med instrumentet (f.eks. med spor, tråd, øye).
    flute_footjoint_type:
      name: Fløytefottype
      description: Angir fotleddskonfigurasjonen til fløyten.
    flute_headjoint_cork_type:
      name: Fløytehodekobling av korktype
      description: Spesifiserer materiale/type for kork/propp for toppskjøt. Leveres
        med med toppskjøten.
    flute_key_system:
      name: Knappesystem for fløyte
      description: Identifiserer det mekaniske/klaviatursystemet som brukes av fløyten
        (f.eks. Boehm-systemet) der det er aktuelt.
    flute_keywork_material:
      name: Materiale i fløyteknapper
      description: Materiale og/eller plating av tastene (nøkkelarbeidet), når det
        er spesifisert separat fra kroppsmaterialet.
    flute_offset_g:
      name: Fløyteforskyvning G
      description: Angir om fløyten har et forskjøvet G- layout.
    flute_wall_thickness:
      name: Fløyteveggtykkelse
      description: Veggtykkelseskategori for fløyterør (tynnvegget, standard, tungvegget).
    fly_pattern_type:
      name: Fluemønstertype
      description: Klassifiserer den kunstige fluen etter fiskestil eller insekt-/fôrimitasjon
        for å hjelpe sportsfiskere raskt med å filtrere etter riktig fluestil.
    fly_rod_style:
      name: Fluestangstil
      description: Klassifiserer stanga etter dens tiltenkte kastedisiplin eller -app
        (f.eks. enhånds, switch, spey).
    fly_style:
      name: Gylf-stil
      description: Angir typen gylf- eller frontåpning på long-john-bunnene.
    fly_tying_tools_included:
      name: Fluebindingsverktøy inkludert
      description: Lister opp de spesifikke fluebindingsverktøyene som følger med
        i settet, slik at kundene vet nøyaktig hva som er inkludert og kan sammenligne
        pakker.
    fly_type:
      name: Fluetype
      description: Angir om long john-bunnene inkluderer en funksjonell flue og stilen
        på flua.
    flyer_hook_mounting_method:
      name: Monteringsmetode for flyerkrok
      description: Hvordan kroken festes til flyeren (f.eks. skruing kontra pressfit),
        noe som påvirker installasjonsmuligheter og kompatibilitet.
    flyer_hook_orientation:
      name: Orientering av flygebladkrok
      description: Om kroken er beregnet på venstre eller høyre side av flyeren, eller
        om den er vendbar/universal.
    flyer_kit_finish_coating:
      name: Flyersett finish/belegg
      description: Overflatebehandling påført flyersettets komponenter.
    flyer_kit_included_components:
      name: Flyersett inkluderte komponenter
      description: Identifiserer hvilke deler som er inkludert i settet.
    flyer_orifice_type:
      name: Flyeråpningstype
      description: Angir åpningstypen som brukes på flygebladet.
    flying_disc_feature_set:
      name: Funksjonssett for flygende disker
      description: Merkbare funksjonelle egenskaper ved den flygende disken.
    flysheet_material:
      name: Overseilmateriale
      description: Identifiserer hovedstoffet som brukes til ytterteltet/yferseilet,
        påvirker holdbarhet og værbestandighet.
    flywheel_balance_type:
      name: Svinghjul balansetype
      description: Angir om svinghjulet er nøytralt i saldo eller bruker en ekstern
        ubalansevekt.
    foam_blocks_size_class:
      name: Skumblokker i størrelsesklasse
      description: Indikerer den generelle størrelsesklassen av blokker i settet.
    foam_blocks_surface_texture:
      name: Skum blokkerer overflatetekstur
      description: Beskriver den utvendige overflatefølelsen/finishen til skumblokkene.
    foam_surface_effect:
      name: Skumoverflateeffekt
      description: Beskriver vanlige dekorative overflateeffekter som brukes på håndarbeid
        eller isopor, for eksempel glitter, metalliske eller holografiske overflater.
    foil_color:
      name: Foliefarge
      description: Angir folieaksentfargen som brukes på sertifikatet (hvis aktuelt).
    foil_curtain_mounting_method:
      name: Monteringsmetode for foliegardiner
      description: Hvordan foliegardinen er ment å installeres eller henges opp (f.eks.
        limstripe, maljer).
    foil_discipline:
      name: Folie-disiplin
      description: Identifiserer den primære kjørestilen eller disiplinen foilen er
        designet for.
    foil_mast_board_mounting_type:
      name: Monteringstype for foliemastbrett
      description: Definerer grensesnittet på toppen av masten som festes til brettet
        eller foilsporen.
    foil_mast_fuselage_connection_type:
      name: Folie mast flykropp forbindelse type
      description: Angir hvordan masten kobles til flykroppen eller forvingen.
    foil_mounting_interface:
      name: Monteringsgrensesnitt for foil
      description: Identifiserer forbindelsesstandarden delen bruker for å feste til
        kortet eller andre foliekomponenter.
    foil_mounting_system:
      name: Monteringssystem for foil
      description: Spesifiserer monteringsgrensesnittet for foiler eller finner på
        brettet, og sikrer kompatibilitet med førerens eksisterende maskinvare.
    foil_mounting_type:
      name: Monteringstype for foil
      description: Identifiserer grensesnittsystemet som brukes til å feste folien
        til kortet, og sikrer kompatibilitet mellom komponentene.
    fold_over_elastic_application:
      name: App med brettbar strikk
      description: Primær tiltenkt bruk/applikasjon for knapphullsstrikk.
    foldability:
      name: Sammenleggbarhet
      description: Beskriver om og hvordan skilleveggen brettes eller lukkes for oppbevaring
        eller omkonfigurering.
    foldability_stow:
      name: Sammenleggbarhet (stuet bort)
      description: Om rullen kan brettes sammen/stenges når den ikke er i bruk (f.eks.
        brettes opp mot kjøretøyet).
    folding_style:
      name: Sammenleggbar stil
      description: Indikerer hvordan kollisjonsputen brettes sammen for transport
        og lagring, noe som påvirker landingsflatens ensartethet og pakkbarhet.
    food_basket_items_included:
      name: Matkurv inkludert
      description: Viser hovedtypene matvarer som er inkludert i kurven, for å hjelpe
        kundene med å velge kurver som samsvarer med mottakerens smaks- eller kostholdsbehov.
    food_coloring_form:
      name: Konditorfargeform
      description: Angir den fysiske formen eller leveringsformatet som konditorfargen
        som leveres i (f.eks. gel, væske, pulver, spray).
    food_contact_material:
      name: Materiale i kontakt med mat
      description: Primærmateriale i vinproduksjonsutstyr (gjæringstanker, sifoner,
        trakt) som brukes med most/vin.
    food_packing_medium:
      name: Matpakkemedium
      description: Angir mediet som frukt eller grønnsaker pakkes i (f.eks. vann,
        saltlake, sirup, olje).
    foosball_rod_type:
      name: Fotballstangtype
      description: Indikerer den mekaniske konfigurasjonen av stangen som påvirker
        spillefølelsen og sikkerheten.
    foot_arch_type_compatibility:
      name: Kompatibilitet med fotbuetyper
      description: Identifiserer fotbueprofilen innlegget er designet for.
    foot_arch_type_suitability:
      name: Egnethet for type fotblad
      description: Identifiserer hvilken fotbueprofil innlegget er ment å støtte.
    foot_coverage:
      name: Fotdekning
      description: Angir om benplagget er med fot, uten fot, stigbøyle eller med åpen
        hæl.
    foot_guard_type:
      name: Fotbeskyttelsestype
      description: Angir om en benbeskytter inkluderer en tå-/fothette og spesifiserer
        om hetten er fast eller avtakbar.
    foot_support_level:
      name: Fotstøttenivå
      description: Angir nivået av strukturell støtte eller fasthet som et skoinnlegg
        gir, for eksempel lav, middels, høy eller ekstra høy.
    footbag_play_style:
      name: Fotsekk-spillestil
      description: Primær tiltenkt spillestil for fotposen.
    football_ball_type:
      name: Type fotballball
      description: Angir den primære tiltenkte bruken eller konteksten for fotballen,
        for eksempel spill, trening eller utstilling av samleobjekter.
    football_dummy_type:
      name: Fotballdummy-type
      description: Klassifiserer stilen eller den funksjonelle utformingen av dukken
        for å gjenspeile dens spesifikke treningsformål.
    football_glove_certification:
      name: Sertifisering av fotballhanske
      description: Angir sertifiseringen eller standardsamsvaret som kreves for konkurransespill
        (f.eks. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Monteringstype for fotbrett
      description: Angir hvordan fotgavlen festes til sengerammen eller gulvet, noe
        som hjelper kjøpere med å velge kompatible maskinvare- og installasjonsmetoder.
    footboard_style:
      name: Fotbrett-stil
      description: Definerer den strukturelle eller estetiske designstilen til fotbrettet.
    footrest_adjustability:
      name: Justerbarhet for fotstøtte
      description: Angir om og hvordan fotstøttene kan justeres for å tilpasse seg
        ulike benlengder på barn.
    footrest_type:
      name: Fotstøttetype
      description: Identifiserer tilstedeværelsen og utformingen av en fotstøtte på
        krakken.
    footstrap_configuration:
      name: Fotstroppkonfigurasjon
      description: Angir fotstroppens innsatsmønster på brettdekket.
    footswitch_action_style:
      name: Fotbryterens handlingsstil
      description: Angir om brytervirkningen er momentan eller låsende, og om den
        støtter begge deler.
    footswitch_power_source:
      name: Fotbryterens strømkilde
      description: Angir hvordan fotbryteren drives, hvis aktuelt (passiv via forsterkerkontakt,
        batteri, ekstern adapter, USB osv.).
    footwear_construction_method:
      name: Konstruksjonsmetode for fottøy
      description: Definerer teknikken som brukes for å feste overdelen til sålen,
        påvirker holdbarhet, muligheter for omsåling og pris.
    footwear_cut:
      name: Fottøyskjæring
      description: Indikerer ankelkragehøyde (low cut, MID cut, high cut), balansemobilitet
        og støtte.
    footwear_size_system:
      name: Fottøy størrelsessystem
      description: Identifiserer den regionale størrelsesstandarden som brukes for
        den oppgitte skostørrelsen (f.eks. USA, EU, Storbritannia).
    footwear_support_type:
      name: Fottøy støttetype
      description: Angir det biomekaniske støttet eller pronasjonskontrollnivået skoen
        gir (f.eks. Nøytral, Stabilitet, Motion).
    fork_material:
      name: Gaffelmateriale
      description: Spesifiserer materialet som brukes til sykkelens forgaffel, påvirker
        stivhet, vekt og drift.
    form_factor:
      name: Formfaktor
      description: Primær maskinvareformfaktor for DMX kontrollør/behandlingsansvarlig.
    formula_car_series_class:
      name: Formelbilserie/klasse
      description: Angir racingserien eller -klassen formelbilen er bygget for å konkurrere
        i.
    formulation_style:
      name: Formuleringsstil
      description: Fremhever spesialiserte formuleringer utviklet for spesielle bruksområder
        eller preferanser (f.eks. Barista, Extra Creamy).
    formulation_type:
      name: Formuleringstype
      description: Formuleringsstilen til desinfeksjonssprayen.
    fossil_preparation_level:
      name: Fossilforberedelsesnivå
      description: Grad av forberedelse/rengjøring utført på prøven (f.eks. ikke forberedt
        i matrise vs. fullstendig forberedt).
    fossil_preservation_type:
      name: Fossil bevaringstype
      description: Type fossilkonservering (f.eks. permineralisert, støpt, form, visning).
    fossil_restoration_status:
      name: Status for fossilrestaurering
      description: Om og hvordan prøven har blitt reparert/restaurert (f.eks. limt,
        rekonstruert, komposittert).
    foundation_configuration:
      name: Grunnlagskonfigurasjon
      description: Angir om grunnlaget er produsert i ett stykke eller som et delt/todelt
        sett for større madrassstørrelser.
    foundation_profile:
      name: Grunnlagsprofil
      description: Klassifiserer den totale høydekategorien til grunnlaget– f.eks.
        ultralav, lav, standard eller høy profil – slik at kunden raskt kan matche
        madrasshøyde, preferanse og lakentilpasning.
    frame_adjustability:
      name: Justerbarhet for ramme
      description: Angir om og hvordan rammen kan justeres (f.eks. bredde-/høydejusterbarhet,
        rotasjon/tilt), noe som påvirker ergonomi og prosjekttilpasning.
    frame_drum_jingle_configuration:
      name: Konfigurasjon av rammejingel
      description: Om rammen inkluderer jingler, og i så fall den generelle konfigurasjonen.
    frame_drum_tuning_system:
      name: Rammens trommetuningsystem
      description: Hvordan rammetrommen er stemt, eller om den er stemmebar.
    frame_finish:
      name: Rammefinish
      description: Spesifiserer det beskyttende belegget eller materialfinishen som
        påføres rammen, påvirker holdbarhet og estetikk.
    frame_mounting_standard:
      name: Monteringsstandard for ramme
      description: Definerer spesifikasjonen for oppstartsgrensesnitt til rammen (f.eks.
        195 mm 2-punkts, Trinity 3-punkts), som er kritisk for rammekompatibilitet.
    frame_steel_gauge:
      name: Ramme stålmåler
      description: Identifiserer tykkelsen (måleren) på stålrøret som brukes i spolens
        oppreister, en kritisk indikator på styrke og stabilitet.
    frame_suspension_type:
      name: Suspensjonstype for ramme
      description: Indikerer fjæringsdesignet til ramme, for eksempel stiv, hardtail
        eller fulldempet, for å hjelpe kjøpere med å velge rammer som passer til den
        tiltenkte konstruksjonen.
    free_reed_instrument_orientation:
      name: Orientering av fritt rørinstrument
      description: Angir hvordan instrumentet holdes/spilles (håndholdt med belg,
        skulderstropper osv.) for ergonomi og bruksvennlig filtrering.
    free_weight_rack_type:
      name: Frivekts stativtype
      description: Klassifiserer spolens strukturelle stil eller funksjoner (f.eks.
        vektstangsnelle, kettlebellsnelle, platetre).
    freehub_body_type:
      name: Frinavkroppstype
      description: Angir frinavhuset eller kassettdriveren som støttes av det bakre
        sykkelnavet.
    freehub_driver_standard:
      name: Standard freehub-driver
      description: Identifiserer kassett-/drivergrensesnittet som navdelen støtter
        (f.eks. Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Friløpstråd standard
      description: Angir navtrådstandarden eller størrelsen som frihjulet er kompatibelt
        med.
    french_horn_bell_construction:
      name: Konstruksjon av fransk hornklokke
      description: Spesifiserer hvordan klokken er konstruert og om den kan fjernes
        for transport/service.
    french_horn_bell_material:
      name: Bjellemateriale i valthorn
      description: Spesifiserer materialet/legeringen til klokken (og ofte klokkeutvidelsen)
        som brukes på det franske hornet.
    french_horn_bell_type:
      name: Valthornklokketype
      description: Klokkens konstruksjonsstil.
    french_horn_finish:
      name: Valthornfinish
      description: Utvendig overflate/plettering av instrumentet.
    french_horn_included_accessories:
      name: Valthorn inkludert tilbehør
      description: Tilbehør følger med valthornet (eske, munnstykke osv.).
    french_horn_leadpipe_material:
      name: Munnrør-materiale i valthorn
      description: Spesifiserer materialet/legeringen til blyrøret.
    french_horn_wrap_type:
      name: Dreiningstype for valthorn
      description: Helhetsinnpakning/formkonfigurasjonen av det franske hornet.
    fretboard_radius_fit:
      name: Tilpasset radius på gripebrettet
      description: Angir om capoens padkrumning er designet for flate eller radiusbaserte
        gripebretter, eller om den er justerbar for å tilpasse seg flere gripebrettets
        radier.
    friction_surface_included:
      name: Friksjonsflate inkludert
      description: Om svinghjulet har en utskiftbar/installert friksjonsflate (f.eks.
        innsats, ring) eller er en friksjonsflate i ett stykke.
    fringe_curtain_finish:
      name: Frynsegardinfinish
      description: Beskriver den visuelle finishen på luggens overflate (glans/tekstur).
    fringe_curtain_material:
      name: Materiale til frynsgardiner
      description: Spesifiserer hovedmaterialet til gardinlistene (f.eks. polyetylen-tereftalatfolie,
        plast, Paper, stoff).
    fringe_curtain_use_location:
      name: Frynsegardinbrukssted
      description: Angir om frynsegardinen er beregnet for innendørs bruk, utendørs
        bruk eller begge deler.
    fringe_trim_style:
      name: Frynsekantstil
      description: Spesifiserer konstruksjonen/stilen på frynsekanten (hvordan trådene
        eller løkkene dannes og presenteres).
    front_axle_standard:
      name: Standard foraksel
      description: Viser akseldiameteren og avstanden som gaffelen er konstruert for
        å akseptere (f.eks. 15 x 110 mm Boost), som sikrer navkompatibilitet.
    front_button_configuration:
      name: Konfigurasjon av frontknapper
      description: Indikerer jakkens knappstil foran, og spesifiserer om den er enkelt-
        eller dobbeltspent og antall knapper foran.
    front_closure_style:
      name: Stil med frontlukking
      description: Indikerer stilen på frontkonstruksjonen på trenchcoaten, for eksempel
        enkelt- eller dobbeltspent, åpen, omslagskjole eller glidelås.
    front_decoration_type:
      name: Type frontdekorasjon
      description: Identifiserer typen utsmykning eller lapp som er vist på forsiden
        av hatten (f.eks. brodert lapp, lærlapp).
    front_point_configuration:
      name: Konfigurasjon av frontpunkt
      description: Spesifiserer utformingen av frontpunktene (monopunkt, dobbeltpunkt,
        modulær, utskiftbar), påvirker penetrasjonspresisjonen på is og blandet terreng.
    front_seat_position:
      name: Forseteposisjon
      description: Hvilken side/posisjon på første rad setet er beregnet for.
    front_style:
      name: Frontstil
      description: Beskriver chinobuksenes konstruksjon foran, og indikerer om buksene
        er flate, plisserte eller har andre detaljer.
    frosting_or_icing_type:
      name: Frosting eller glasurtype
      description: Angir typen frosting eller glasur som er påført kaken eller dessertbaren.
    fruit_cultivar_or_variety:
      name: Fruktkultivar eller -sort
      description: Angir den spesifikke kultivaren eller sortsnavnet på frukten (f.eks.
        Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Fruktskåret stil
      description: Beskriver hvordan frukten tilberedes eller kuttes (f.eks. hel,
        i skiver, i terninger).
    fruit_mix_variety:
      name: Fruktblanding
      description: Navngir temablandingen eller den generelle varianten av fruktmiksen
        (f.eks. Tropical Mix, Berry Medley).
    fruit_piece_form:
      name: Fruktstykkeform
      description: Beskriver den fysiske oppskjæringen eller presentasjonen av tørkede
        fruktbiter, f.eks. hele, skivede, pulveriserte.
    fruit_snack_form:
      name: Format for fruktsnacks
      description: Klassifiserer den fysiske formen eller stilen som fruktsnacksen
        presenteres i.
    fruit_topping_format:
      name: Frukttoppingformat
      description: Beskriver den fysiske formen, teksturen eller stilen på toppingen,
        slik at kunden kan velge mellom sauser, sirup, tykke fruktbiter, poppende
        perler osv.
    fruit_variety:
      name: Fruktvariant
      description: Identifiserer den primære frukten som brukes i en fruktvinoppskrift/-sett/levering
        (f.eks. eple, kirsebær, bjørnebær).
    fuel_cap_gasket_seal_material:
      name: Pakningsmateriale for drivstofflokk
      description: Angir materialet som brukes til tetningspakningen/O-ringen på tanklokket.
    fuel_cap_locking_mechanism:
      name: Låsemekanisme for drivstofflokk
      description: Indikerer låsemetoden som brukes av et låsbart tanklokk.
    fuel_cap_type:
      name: Type drivstofflokk
      description: Angir funksjonstypen/utformingen av tanlokket som brukes til et
        kjøretøys drivstoffpåfyllingshals.
    fuel_cap_venting:
      name: Lufting av drivstofflokk
      description: Angir om tanlokket er luftet, og hvis aktuelt, luftestilen.
    fuel_filter_features:
      name: Funksjoner av drivstoffilteret
      description: Lister opp viktige funksjoner ved drivstoffilteret (vannseparasjon,
        tappeventil, sensorport osv.).
    fuel_filter_media_material:
      name: Materiale for drivstoffiltermedium
      description: Angir det primære filtreringsmediet som brukes inne i drivstoffilterelementet.
    fuel_filter_mounting_connection_type:
      name: Drivstoffiltermontering/forbindelsestype
      description: Spesifiserer hvordan drivstoffilteret kobles til/monteres (tråd/spinn-on,
        hurtigkobling, slangekobling, banjo osv.).
    fuel_injection_cleaning_method:
      name: Rengjøringsmetode for drivstoffinnsprøytning
      description: Indikerer hvordan settet brukes til å rengjøre drivstoffinnsprøytningssystemet.
    fuel_injector_electrical_connector_type:
      name: Drivstoffinjektor elektrisk koblingstype
      description: Spesifiserer injektorens elektriske koblingsstandard/form.
    fuel_injector_seat_type:
      name: Setetype for drivstoffinjektor
      description: Angir grensesnittstypen mellom injektorspiss/sete som brukes til
        tetting ved innsugs-/drivstoffskinnen.
    fuel_injector_spray_pattern:
      name: Sprøytemønster for drivstoffinjektorer
      description: Identifiserer injektorens drivstoffsprøyte-/fordelingsmønster ved
        hjelp av produsent- eller bransjeterminologi (f.eks. kjegle, vifte, blyantstråle,
        flerhulls).
    fuel_level_sensor_mounting_type:
      name: Monteringstype for drivstoffnivåsensor
      description: Angir det fysiske monteringsgrensesnittet som brukes til å feste
        drivstoffnivåsensoren/-senderen til drivstofftank- eller moduler.
    fuel_level_sensor_sensing_mechanism:
      name: Mekanisme for føler for drivstoffnivå
      description: Angir følermekanismen/teknologien som brukes til å måle drivstoffnivået
        i en drivstoffnivåsensor eller senderenhet.
    fuel_line_compliance_standard:
      name: Samsvarsstandard for drivstoffledninger
      description: Identifiserer den regulatoriske eller bransjestandarden som drivstoffledningen
        oppfyller (vanlig i maritime apper).
    fuel_line_connector_interface_type:
      name: Drivstoffledning tilkobling grensesnitttype
      description: Angir forbindelses-/grensesnittstilen på enden(e) av drivstoffledningen
        eller -koblingen.
    fuel_pressure_regulator_body_material:
      name: Materiale for drivstofftrykkregulatorhus
      description: Spesifiserer materialet i regulatorhuset/-huset for holdbarhet
        og korrosjonsbestandighet.
    fuel_pressure_regulator_mounting_type:
      name: Monteringstype for drivstofftrykkregulator
      description: Spesifiserer hvordan drivstofftrykkregulatoren er montert eller
        installert, noe som påvirker montering og kompatibilitet.
    fuel_pump_inlet_type:
      name: Innløpstype for drivstoffpumpe
      description: Forbindelsesstil ved pumpeinnløpet.
    fuel_pump_mounting_location:
      name: Drivstoffpumpe monteringssted
      description: Der drivstoffpumpen er installert på/i kjøretøyets drivstoffsystem.
    fuel_pump_outlet_connection_type:
      name: Type drivstoffpumpeutløp
      description: Angir den fysiske forbindelsestypen ved drivstoffpumpeutløpet for
        kompatibilitet med montering/installasjon.
    fuel_system_application:
      name: Drivstoffsystem-app
      description: Drivstoffleveringssystemarkitektur drivstoffpumpen er designet
        for å støtte (f.eks. forgasser, EFI, GDI, dieselløfter/Overføringer).
    fuel_system_connection_type:
      name: Drivstoffsystemforbindelsestype
      description: Angir drivstoffsystemets forbindelsesstandard(er) eller adaptergrensesnittet(er)
        som støttes av settet.
    fuel_system_type:
      name: Type drivstoffsystem
      description: Spesifiserer motorens drivstoffleveringssystem (f.eks. forgasser
        eller drivstoffinnsprøytningssystem).
    fuel_tank_installation_position:
      name: Monteringsposisjon for drivstofftank
      description: Angir den typiske monteringsposisjonen for drivstofftanken på kjøretøyet.
    fuel_tank_orientation:
      name: Orientering av drivstofftanken
      description: Angir om drivstofftanken er ment å installeres horisontalt eller
        vertikalt.
    fuel_tank_shape:
      name: Form på drivstofftanken
      description: Beskriver den generelle formfaktoren/formen på drivstofftanken
        for å støtte fysisk tilpasning og samsvarende utskiftninger.
    fur_type:
      name: Pelstype
      description: Identifiserer arten eller imitasjonsmaterialet til eventuell pels
        på utsiden av muff-clutchen eller -vesken.
    furniture_finish:
      name: Møbelfinish
      description: Beskriver overflatebehandlingen eller finishen som er påført møbelet,
        og som påvirker utseendet og vedlikeholdskravene.
    fuse_form_factor:
      name: Formfaktor for sikring
      description: Spesifiserer den fysiske sikringstypen/-fotavtrykket for å sikre
        at den passer til den tiltenkte sikringsholderen eller sikringsblokken (f.eks.
        blad vs. patron).
    fuse_terminal_or_mount_style:
      name: Terminal eller monteringsstil
      description: Spesifiserer hvordan sikringen kobles mekanisk/elektrisk (tillegg
        vs. bolt-down vs. in-line).
    fusible_application_method:
      name: Applikasjonsmetode for festemiddel
      description: Angir hvordan et smeltelim aktiveres/påføres (f.eks. strykevarme,
        press, forsterkning ved sying).
    fusible_hem_tape_application_method:
      name: Metode for applikasjon av smeltebånd
      description: Beskriver hvordan tapen aktiveres/påføres (f.eks. stryking, varmepresse).
    fusible_seam_tape_activation_method:
      name: Aktiveringsmetode for festemiddel-sømtape
      description: Indikerer hvordan limet aktiveres under applikasjonen.
    fusible_seam_tape_application:
      name: App for smeltebånd
      description: Angir den primære tiltenkte bruken eske for smeltebåndet.
    fusible_seam_tape_material:
      name: Smeltebåndmateriale for søm
      description: Materialet eller sammensetningen av tapen/banen/transportøren (ikke
        stoffet den festes til).
    fusible_seam_tape_washability:
      name: Vaskbarhet av smeltebånd
      description: Angir om den smeltede sømmen forblir intakt etter vask eller rengjøring.
    fusible_seam_tape_waterproof_rating:
      name: Vanntetthetsklassifisering for smeltebånd
      description: Angir om sømbåndet er ment å lage en vanntett eller vannavstøtende
        søm etter påføring.
    fusible_tape_backing_type:
      name: Smeltebåndsbaksidetype
      description: Angir om tapen har papir/liner og hvilken form den har, noe som
        påvirker ekspedering og påføring.
    futon_frame_conversion_mechanism:
      name: Futon-rammekonvertering/vekslingsmekanisme
      description: Definerer mekanismen eller den strukturelle stilen som brukes til
        å konvertere rammen mellom sofa-, lounge- og sengeposisjoner.
    gaiter_height_type:
      name: Type gamasjehøyde
      description: Klassifiserer gamasjer etter hvor høy dekning de gir på beinet,
        for eksempel ankel, midt på legg, knehøye eller lårhøye.
    game_variation:
      name: Spillvariant
      description: Angir spillestilen settet er designet for (f.eks. klassisk tetherball,
        tethertennis, speedball).
    garlic_preparation_style:
      name: Forberedelsesstil for hvitløk
      description: Spesifiserer hvordan hvitløken tilberedes eller bearbeides før
        salg (f.eks. hel, hakket, pulverisert).
    garlic_variety:
      name: Hvitløksvariant
      description: Identifiserer den botaniske eller kommersielle varianten/kultivaren
        av hvitløk som tilbys.
    garment_back_style:
      name: Plaggets ryggstil
      description: Identifiserer designet eller konstruksjonen av baksiden av plagget
        (f.eks. åpen rygg, bryterygg, kryssrygg).
    garment_pattern_type:
      name: Plaggmønstertype
      description: Angir hvilken type klær symønsteret er ment for.
    garnish_type:
      name: Garnityrtype
      description: Identifiserer hva slags garnityr (ingrediens eller garnityrstil)
        som brukes til å fullføre en cocktail er.
    gas_lift_class:
      name: Gassløftklasse
      description: Angir sikkerhets- og styrkeklassifiseringen til gassløftesylinderen
        som brukes til justering av setehøyde.
    gas_propellant_type:
      name: Gassdrivstofftype
      description: Angir hvilken type gassdrivmiddel som anbefales eller er kompatibelt
        når blasteren er bensindrevet.
    gatta_tabla_tuning_block_material:
      name: Gatta-materiale (tabla-stemmeblokk)
      description: Materialet i stemmeblokkene (gatta) som brukes mellom stemmereimen
        og skallet.
    gauge_mounting_type:
      name: Monterinstype for måler
      description: Hvordan drivstoffmåleren er montert/installert på vannscooteren.
    gauge_style:
      name: Målerstil
      description: Angir hvilken type trykkmåler pumpen bruker, for eksempel en analog
        skive, digital avlesning eller ingen.
    gear_oil_api_classification:
      name: API-klassifisering av girolje
      description: API GL-klassifisering for giroljer som brukes i differensialer/manuelle
        girkasser.
    gel_wax_density_grade:
      name: Gelvoks tetthetsgrad
      description: Indikerer tetthetsgraden til gelvoks, som påvirker klarhet, duftvarighet
        og egnethet for integrering.
    gel_wax_transparency_level:
      name: Gjennomsiktighetsnivå for gelvoks
      description: Beskriver klarheten/opasiteten til gelvoksen når den brukes som
        tiltenkt.
    gelatin_form:
      name: Gelatinform
      description: Informasjon om den fysiske presentasjonen av gelatinen slik at
        brukerne kan velge riktig format for oppskrifter og industrielle applikasjoner.
    gelatin_or_gelling_agent_source:
      name: Gelatin- eller geleringsmiddelkilde
      description: Angir opphav eller typen geleringsmiddel som brukes i produktet,
        viktig av kostholds- og religiøse hensyn.
    gelatin_source:
      name: Gelatinkilde
      description: Angir gelatinens animalske, plantebaserte eller syntetiske opphav,
        slik at kunden kan bekrefte kompatibilitet med kostholds-, etiske eller religiøse
        krav.
    gelling_agent:
      name: Geleringsmiddel
      description: Identifiserer hovedstoffet som brukes til å stivne eller tykne
        desserten, noe som er viktig for kostholdsegnethet og tekstur.
    gemstone_clarity_grade:
      name: Klarhetsgrad for edelstener
      description: Klarhetsgraden til edelstenen (når den er gradert).
    gemstone_creation_method:
      name: Metode for å lage edelstener
      description: Angir om edelstenen er naturlig, laget av laboratoriemateriale
        eller en imitasjon/simulant.
    gemstone_cut_style:
      name: Edelstensslipt stil
      description: Beskriver slipestilen/finishen til edelstensprøven.
    gemstone_treatment_status:
      name: Status for behandling av edelstener
      description: Angir om og hvordan edelstenen har blitt behandlet/forbedret.
    geological_period:
      name: Geologisk periode
      description: Geologisk periode (og eventuelt epoke) for fossilet når det er
        kjent (f.eks. jura, kritt, eocen).
    gift_box_tin_insert_type:
      name: Gaveutdelingsboks/organisasjonsnummer innstikktype
      description: Innvendig innsatskonfigurasjon for organisering/beskyttelse av
        vare inne i boksen/organisasjonsnummer.
    gift_box_tin_sustainability_features:
      name: Gaveutdelingsboks/organisasjonsnummer bærekraftsfunksjoner
      description: Bærekraftsrelaterte egenskaper ved gaveutdelingsboksen/organisasjonsnummer
        emballasje.
    gift_box_tin_window_type:
      name: Type vindu for gaveeske
      description: Om gaveutdelingsboksen har et utstillingsvindu og hvilken stil
        den har.
    gift_message_option:
      name: Alternativ for meldingsutdeling
      description: Angir om en gaveutdelingsmelding/-notat kan inkluderes og hvordan
        (ingen, inkludert, tilpassbar).
    ginger_maturity:
      name: Ingefærmodenhet
      description: Indikerer høststadiet av ingefæren, for eksempel ung eller moden,
        noe som påvirker smaksintensiteten og foretrukket kulinarisk bruk.
    ginger_variety:
      name: Ingefærvariant
      description: Angir kultivar, type eller beslektet rhizom innenfor ingefærfamilien
        for å differensiere smaksprofiler og kulinariske bruksområder.
    glass_kiln_controller_type:
      name: Glassovn kontrollør/behandlingsansvarlig type
      description: Type temperatur/brenningskontrollør/behandlingsansvarlig følger
        med ovnen.
    glass_kiln_firing_application:
      name: App for avfyring av glassovn
      description: Primær(e) glassbearbeidingsapplikasjon(er) ovnen er designet for.
    glass_stone_application_method:
      name: Glassstein-appmetode
      description: Spesifiserer hvordan glasssteinene er ment å festes/påføres i prosjekter
        (f.eks. liming, hurtigfiksering, påsying).
    glass_tint:
      name: Glassfarge
      description: Glass-/plastfargen som brukes til flasken for å håndtere lyseksponering
        (vanlig i brygging/vinproduksjon).
    glaze_firing_atmosphere:
      name: Glasurbrenningsatmosfære
      description: Brennatmosfæren(e) glasuren er designet for.
    glaze_opacity:
      name: Glasuropasitet
      description: Hvor gjennomsiktig glasuren ser ut etter brenning.
    glaze_product_form:
      name: Format for glasurprodukt
      description: Den fysiske formen som glasurproduktet leveres i (f.eks. væske,
        tørt pulver, konsentrat, spray).
    glider_avionics_package:
      name: Avionikkpakke for glidefly
      description: Indikerer det generelle nivået av navigasjons- og flyinstrumenter
        installert i glideflyet.
    glider_certification_rating:
      name: Sertifiseringsvurdering for glidefly
      description: Offisiell sertifiseringsklasse som angir glideflyets sikkerhets-
        og ytelsesnivå (f.eks. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Konfigurasjon av landingsunderstell for glidefly
      description: Angir konfigurasjonen av landingsunderstellet som brukes av glideflyet.
    glider_launch_method:
      name: Lansering av glidefly
      description: Angir hvordan glideflyet vanligvis lanseres eller selvlanseres.
    glider_performance_class:
      name: Glider ytelseklasse
      description: Konkurranse-/ytelseklasse eller -kategori som vanligvis brukes
        for seilfly.
    glitter_application_method:
      name: Applikasjonsmetode for glitter
      description: Indikerer den tiltenkte teknikken for påføring/bruk av håndverk
        (f.eks. strø/shaker, bland inn, gni på, påføre over lim, pensel, spray på,
        varmefikser/preger).
    glitter_eco_friendly_claim:
      name: Glitter miljøvennlig påstand
      description: Miljø-/økopåstander spesifikke for løse glitterformuleringer.
    glitter_effect_type:
      name: Glittereffekttype
      description: Beskriver den visuelle effekten av glitteret/paljettene utover
        basefarge (f.eks. holografisk, iriserende).
    glitter_glue_base_solvent_type:
      name: Glitterlimbase/løsemiddeltype
      description: Beskriver den primære basen til glitterlimet (vanlig kundehensyn
        til rengjøring og materialkompatibilitet).
    glitter_opacity_coverage:
      name: Glittertetthet/dekning
      description: Angir hvor ugjennomsiktig glittereffekten vises når den påføres.
    glitter_use_suitability:
      name: Egnethet for bruk av glitter
      description: Angir den primære tiltenkte eller godkjente konteksten for glitterpulveret
        (f.eks. kun til håndverk, kosmetikkkvalitet/kroppsikker eller matsikker).
    glove_armor_placement:
      name: Hanskebeskyttelse
      description: Identifiserer hvor beskyttelsesrustningen er plassert på hansken.
    glove_cuff_length:
      name: Lengde på hanskemansjett
      description: Indikerer lengden på mansjetten/hansken som dekker en racinghanske
        på håndleddet/underarmen.
    glove_finger_coverage:
      name: Dekning av hanskefinger
      description: Beskriver nivået av fingerdekning som hansken gir, alt fra helfinger
        til fingerløse design.
    glove_finger_design:
      name: Hanskefingerdesign
      description: Angir fingerkonfigurasjonen til hansken, for eksempel femfinger
        eller vott.
    glove_fit_profile:
      name: Hansketilpasningsprofil
      description: Beskriver de indre formene og den generelle silhuetten til hansken,
        slik at spillerne kan velge den følelsen de foretrekker.
    glove_insulation:
      name: Hanskeisolasjon
      description: Spesifiserer hanskens isolasjon/termiske konstruksjon eller oppvarming
        (f.eks. isolasjonsnivå, fôr-/isolasjonsteknologi eller oppvarmet type).
    glove_palm_material:
      name: Materiale i hanskehåndflaten
      description: Spesifiserer hovedmaterialet som brukes på hanskehåndflaten (hovedkontakt-/grepflaten),
        som kan avvike fra bakhånden.
    glove_size:
      name: Hanskestørrelse
      description: Indikerer den generelle håndstørrelsen veskevottene er designet
        for å passe, ofte uttrykt med størrelseskoder i klær-stil eller ungdomsstørrelser.
    glove_webbing_style:
      name: Hanskevevstil
      description: Definerer utformingen av hanskens nett eller lomme, som påvirker
        ballkontroll, posisjonsegnethet og spillerens preferanser.
    glow_effect:
      name: Glødeeffekt
      description: Angir om gelballene har selvlysende egenskaper eller sporstoffegenskaper
        for spilling i svakt lys.
    glow_plug_connector_type:
      name: Glødepluggkoblingstype
      description: Elektrisk terminal/kobling-type på glødepluggen som brukes til
        å koble til kjøretøyets ledningsnett.
    glow_plug_heating_element_type:
      name: Glødeplugg varmeelement type
      description: Type/teknologi for varmeelementet som brukes av glødepluggen.
    glue_application_format:
      name: Lim-appformat
      description: Angir applikator-/dispenseringsformatet som brukes til å påføre
        skolelim.
    glue_applicator_type:
      name: Limapplikatortype
      description: Angir den innebygde applikator-/dispenseringsspisstypen som brukes
        til å påføre flytende lim.
    glue_base_formulation:
      name: Limbaseformulering
      description: Identifiserer den primære kjemiske/baseformuleringen av det flytende
        håndverkslimet (for ytelse, sikkerhet og forventninger til rengjøring).
    glue_gun_nozzle_style:
      name: Limpistoldyse-stil
      description: Angir den fysiske dysespissen på en limpistol, noe som påvirker
        appens presisjon og limdekning.
    glue_safety_standard:
      name: Sikkerhetsstandard for lim
      description: Angir om limet er giftfritt/barnesikkert i henhold til etikett
        og vanlige standarder.
    goal_frame_material:
      name: Materiale for målramme
      description: Identifiserer materialet i målstolpene/rammen, noe som påvirker
        vekt, bærbarhet og værbestandighet.
    goal_size:
      name: Målstørrelse
      description: Klassifiserer et fotballmål i vanlige regulerings- eller treningsstørrelsesgrupper
        for raskere valg enn bare rå dimensjon.
    goal_size_classification:
      name: Klassifisering av målstørrelse
      description: Angir den standardiserte størrelsesklassen til målet (f.eks. full
        størrelsesregulering, ungdom, Shop Mini) slik at brukerne raskt kan velge
        utstyr som passer for deres spillnivå.
    goal_size_standard:
      name: Målstørrelsesstandard
      description: Angir hvilken offisiell standard eller aldersgruppestandard målet
        oppfyller (f.eks. World Aquatics-forskriften, 12U).
    goalie_configuration:
      name: Målvakt-konfigurasjon
      description: Angir antall målvakter per lag som er konfigurert på tabellen (amerikansk
        3-målvakter vs. europeisk 1-målvakt-stil).
    goalie_playing_surface:
      name: Spilleoverflate for målvakt
      description: Angir den primære spilleflaten eller -miljøet som hockeykeeperutstyret
        er designet for.
    goalkeeper_glove_cut:
      name: Hanskesnitt for målvakt
      description: Indikerer håndflate-/fingerkonstruksjonen (snittet) på keeperhanskene,
        som påvirker passform, ballfølelse og kontroll.
    goalkeeper_training_aid_type:
      name: Type treningshjelpemiddel for målvakt
      description: Identifiserer stilen på keepertreningshjelpemidlet, noe som muliggjør
        presis filtrering.
    goblet_drum_playing_style:
      name: Spillestil for trommekopper
      description: Om instrumentet primært er designet for håndspill eller for bruk
        med pinner/klubber.
    gobo_format:
      name: Gobo-format
      description: Angir gobostørrelsen/standarden som projektoren aksepterer (diameter-
        og tykkelsesfamilie), og sikrer kompatibilitet med erstatnings-/tilpassede
        goboer.
    gobo_root_variety:
      name: Gobo-rotvariant
      description: Identifiserer den spesifikke kultivaren eller varianten av gobo
        (borre) rot.
    gobo_rotation:
      name: Gobo-rotasjon
      description: Angir om goboen kan rotere og hvilken retning som støttes.
    goggle_accessory_type:
      name: Type brilletilbehør
      description: Klassifiserer typen tilbehør (f.eks. deksel, eske, stropp) slik
        at kunden kan filtrere det varierte produktsettet innenfor denne paraplykategorien.
    goggle_features:
      name: Goggle-funksjoner
      description: Viser spesielle funksjonelle eller designmessige funksjoner som
        tilbys av beskyttelsesbriller.
    goggle_fit_design:
      name: Design med passende brille
      description: Beskriver hvordan brillene er ment å passe eller brukes, inkludert
        OTG-kompatibilitet (over-the-brilles).
    goggle_gasket_material:
      name: Materiale for beskyttelsesbrillepakning
      description: Materiale i tetningen som sitter mot ansiktet, påvirker allergibekymringer
        og lekkasjeforebygging.
    goggle_integration:
      name: Goggle-integrasjon
      description: Om hjelmen er designet for bruk med beskyttelsesbriller og/eller
        inkluderer integrerte funksjoner for beskyttelse av beskyttelsesbriller.
    goggle_lens_shape:
      name: Form på brilleglass
      description: Definerer krumningsprofilen til erstatningslinsen, som påvirker
        forvrengning og synsfelt (f.eks. sylindrisk, sfærisk, torisk).
    goggle_lens_tint:
      name: Fargetone for brilleglass
      description: Definerer fargetonen eller finishen på linsen, som påvirker lysgjennomgang,
        fargeoppfatning og estetisk utseende.
    goggle_strap_material:
      name: Materiale for brillestropp
      description: Primærmateriale brukt til hodestroppen, påvirker holdbarhet og
        komfort.
    golf_accessory_set_purpose:
      name: Formål med golftilbehørssettet
      description: Identifiserer den primære tiltenkte bruken eller temaet for golftilbehørssettet.
    golf_bag_style:
      name: Golfbag-stil
      description: Indikerer den primære designen eller appstilen til golfbagen (f.eks.
        stativ, håndtakskurv, Staff).
    golf_ball_alignment_design:
      name: Design av golfballjustering
      description: Spesifiserer eventuelle innebygde visuelle justeringshjelpemidler
        trykt eller støpt på balloverflaten.
    golf_ball_construction:
      name: Golfballkonstruksjon
      description: Angir antall lag/deler som brukes i golfballens konstruksjon, noe
        som påvirker spinn, følelse og distanse.
    golf_ball_cover_material:
      name: Materiale for golfballdeksel
      description: Identifiserer det ytre dekselmaterialet på golfballen, som påvirker
        spinn, holdbarhet og følelse.
    golf_cart_cover_climate_use:
      name: Golf handlekurv klimabruk
      description: Angir det primære klimaet/årstiden som oppbevaringstrekket er designet
        for å tåle.
    golf_cart_enclosure_fit_type:
      name: Golf handlekurv kabinett passform type
      description: Angir om kabinettet er designet for et bestemt antall seter / formfaktor
        eller tilbyr en universell/justerbar passform.
    golf_cart_intended_use:
      name: Tiltenkt bruk av golfhåndtak
      description: Primær tiltenkt bruk – eske golfhåndtaket er designet eller konfigurert
        for.
    golf_club_number:
      name: Golfkøllenummer
      description: Identifiserer det spesifikke nummeret eller kilebetegnelsen som
        er trykt på køllen (f.eks. 5, PW, GW).
    golf_club_part_type:
      name: Golfkølledeltype
      description: Kategoriserer golfkølletilbehøret eller -komponenten i vanlige
        undertyper (f.eks. adapterhylse, ferrule, vekt).
    golf_grip_size:
      name: Størrelse på golfgrep
      description: Angir den generelle utvendige størrelseskategorien til golfgrepet,
        som indikerer hvor tykt grepet føles i hånden.
    golf_shoe_spike_type:
      name: Golfsko-pigger
      description: Identifiserer typen grepsystem som brukes på yttersålen til golfsko
        (f.eks. piggete eller piggeløse design).
    golf_tee_style:
      name: Stil for golfpegg
      description: Beskriver den strukturelle eller funksjonelle stilen/designen til
        golf-tee-en, som påvirker ballhøyde, holdbarhet eller spinnreduksjon.
    golf_training_focus:
      name: Fokus på golftrening
      description: Klassifiserer den primære ferdigheten eller aspektet produktet
        er ment å forbedre.
    golf_training_objective:
      name: Mål for golftrening
      description: Identifiserer den primære golfferdigheten eller aspektet som treningshjelpemiddelet
        er laget for å forbedre.
    gong_profile_type:
      name: Gong-profiltype
      description: Beskriver den fysiske profilen til operagongen (f.eks. flat vs.
        hevet sentrum), som sterkt påvirker tone og spillestil.
    grading_scale:
      name: Graderingsskala
      description: Graderingsskalaen som brukes på en gradert bullionmynt (f.eks.
        Sheldon 1–70).
    grading_service:
      name: Karaktereringstjeneste
      description: Tredjepart-graderings-/sertifiseringstjeneste for mynten eller
        seddelen (f.eks. PCGS, NGC).
    graduation_increment:
      name: Gradueringsøkning
      description: Angir den minste trykte/graverte inndelingen på sømmålerskalaen
        (oppløsningen til markeringene).
    grain_processing_method:
      name: Behandlingsmetode for korn
      description: Identifiserer den primære bearbeidingsmetoden som brukes på kornet
        (f.eks. forkokt, valset, spiret), som påvirker koketid, tekstur og næringsinnhold.
    grand_piano_soundboard_material:
      name: Materiale i lydbrett for stort piano
      description: Primærmateriale brukt til pianoets klangbunn (resonantbrettet),
        som påvirker tone og holdbarhet.
    grappling_dummy_pose:
      name: Grappling-dukkepositur
      description: Beskriver standard kroppsstilling/holdning til dukken, og bestemmer
        hvilke øvelser og teknikker den støtter.
    grease_application:
      name: Grease-appen
      description: Angir den primære kjøretøykomponenten eller bruken som fettet er
        beregnet for.
    grease_consistency_grade_nlgi:
      name: Fettkonsistensgrad (NLGI)
      description: Angir NLGI-konsistenstallet som indikerer fettets fasthet (f.eks.
        er NLGI 2 vanlig flerbruks).
    grease_thickener_type:
      name: Type fettfortykningsmiddel
      description: Identifiserer fortykningsmiddel-/såpesystemet som brukes i fettformuleringen.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Great Highland sekkepiper blåserørventiltype
      description: Spesifiserer tilbakeslagsventilsystemet som brukes i blåserøret.
    great_highland_bagpipes_drone_configuration:
      name: Dronekonfigurasjon for sekkepipe fra Great Highland
      description: Angir hvilke typer droner som er inkludert i settet.
    great_highland_bagpipes_mounting_material:
      name: Monteringsmateriell for sekkepipe fra Great Highland
      description: Angir materialet til de dekorative festene på sekkepipene (f.eks.
        nikkelsølv, imitert elfenben).
    greens_maturity_stage:
      name: Greens modenhetsstadie
      description: Angir utviklingsstadiet til den grønne ved høsting.
    greens_preparation_state:
      name: Greens forberedelsestilstand
      description: Beskriver hvordan de bladgrønne plantene bearbeides eller pakkes
        (f.eks. forvasket, hakket, klar til å spises).
    grenade_effect_type:
      name: Granateffekttype
      description: Indikerer den primære funksjonelle effekten produsert av paintballgranaten
        når den er aktivert (f.eks. røyk, maling, flashbang).
    grid_unit:
      name: Gridenhet
      description: Det primære målesystemet som er trykt på matten (hvis et rutenett/skala
        er tilstede).
    grille_emblem_provision:
      name: Tilveiebringelse av grillemblem
      description: Spesifiserer om grillen støtter et OEM-emblem/merke og hvordan.
    grille_mounting_method:
      name: Monteringsmetode for grill
      description: Angir hvordan grillen monteres på kjøretøyet (f.eks. direkte utskifting
        kontra innsetting/overlegg; bolting kontra klips/snepp; boring kreves kontra
        ingen boring kreves).
    grille_style:
      name: Stil for grill
      description: Angir den visuelle/designmessige stilen til kjøretøyets grill.
    grip_chalk_form:
      name: Grep krittform
      description: Identifiserer den fysiske formen til krittet som leveres eller
        brukes med posen.
    grip_coverage:
      name: Grepdekning
      description: Identifiserer tilstedeværelsen og lokaliseringen av silikon- eller
        gummibelagte grepelementer på sokken.
    grip_design:
      name: Grepdesign
      description: Spesifiserer referanse- eller hullkonfigurasjonen til platen for
        enklere bæring og allsidig trening.
    grip_enhancer_effect:
      name: Grepforsterkereffekt
      description: Beskriver den primære ytelsesegenskapen produktet tilbyr (f.eks.
        fuktighetsabsorpsjon eller klebrig harpiksfinish).
    grip_enhancer_form:
      name: Format for grepsforbedrer
      description: Identifiserer den fysiske formen eller formatet til grepforsterkerproduktet,
        slik at idrettsutøvere kan velge riktig applikasjonsmetode.
    grip_features:
      name: Grepfunksjoner
      description: Indikerer innebygde grep-/referansefunksjoner som er ment å forbedre
        grep, komfort eller kontroll under spill.
    grip_material:
      name: Grepmateriale
      description: Identifiserer materialet som brukes til gripeflatet på buksene.
    grip_shape:
      name: Grepform
      description: Beskriver grep eller stilen på grepet, spesielt relevant for puttergrep.
    grip_surface_type:
      name: Overflatetype for grep
      description: Beskriver utformingen av pedalflatens slitebane/grepflate som påvirker
        grep og følelse.
    grip_tackiness_level:
      name: Grepsnivå
      description: Vurderer hvor klebrig eller klissete grepoverflaten er, og hjelper
        spillerne med å velge mellom en tørr følelse og ultra-klebrig kontroll.
    grip_tape_form:
      name: Format for grepstape
      description: Angir greptapeproduktets hefteform (f.eks. ark, rull, spraysett).
    grip_wax_form:
      name: Grepvoksform
      description: Klassifiserer den fysiske formen som grepvoksen selges i.
    gripper_coverage:
      name: Grepsdekke
      description: Angir gripetypen på den sklisikre skoen, som indikerer overflatedekning
        og fjernbarhet.
    grommet_application_material:
      name: Materiale for Grommet-appen
      description: Primærmateriale(r) maljene er ment å monteres i (f.eks. stoff,
        lær, vinyl, presenning/lerret).
    grommet_duty_rating:
      name: Grommet tyngdevurdering
      description: Angir den tiltenkte styrken/bruksklassen til maljen.
    grommet_style:
      name: Maljestil
      description: Konstruksjonsstil for maljesettet (hvordan det er montert/brukt).
    grooming_glove_texture_type:
      name: Teksturtype for pleiehanske
      description: Identifiserer den primære overflateteksturen som brukes til stell,
        og indikerer tiltenkt formål som skrubbing, polering eller vask.
    groove_orientation:
      name: Sporretning
      description: Beskriver retningen/layoutet av spor eller riller på instrumentet.
    groove_sampler_onboard_effects:
      name: Groove sampler tilstedeværende effekter
      description: Angir kategoriene for innebygde effektbehandling som er tilgjengelig
        på groove-sampleren (insert/master), som for eksempel reverb, delay, komprimering,
        distortion, EQ og filtrering.
    groove_sampler_storage_expansion_type:
      name: Utvidelsestype for groove sampler-lagring
      description: Angir flyttbare/utvidbare lagringsalternativer som støttes av groove-sampleren.
    ground_attachment_method:
      name: Festemetode for bakke
      description: Beskriver hvordan pasningsbuen er festet til spilleflaten, noe
        som påvirker stabilitet og overflatekompatibilitet.
    groupset_components_included:
      name: Inkluderte gir- og bremsekomponenter
      description: Lister opp de spesifikke driverkomponentene som er inkludert i
        gruppesettet, slik at kundene forstår pakkeinnholdet.
    gt_racing_class:
      name: GT-racingklasse
      description: Angir GT-kategorien/klassen bilen er bygget eller homologert for.
    guard_construction_type:
      name: Konstruksjonstype for vern
      description: Enten beskyttelsen er en hardskallbeskytter, et mykt rustningsinnlegg
        eller en erme-/stroppdesign.
    guard_size_measurement_basis:
      name: Målegrunnlag for vaktstørrelse
      description: Hvilket mål størrelsen er basert på (f.eks. albueomkrets, håndleddsomkrets,
        underarmsomkrets).
    guard_style:
      name: Vaktstil
      description: Klassifiserer konstruksjonen eller typen skøytebeskytter for å
        hjelpe kunder med raskt å skille mellom harde gangbeskyttere, myke beskyttere,
        fjærbelastede beskyttere og andre design.
    guava_flesh_color:
      name: Guavakjøttfarge
      description: Indikerer den indre fruktkjøttfargen i guavafrukten.
    guava_variety:
      name: Guava-variant
      description: Identifiserer den spesifikke kultivaren eller merkede varianten
        av guava som selges (f.eks. epleguava, meksikansk kremguava, thaiguava, rosaguava,
        frøfriguava, hvitguava).
    guide_material:
      name: Guidemateriale
      description: Materiale som brukes til stangens snøreføringer eller innlegg.
    guide_type:
      name: Guidetype
      description: Angir typen guider som er installert på en fiskestang, for eksempel
        enkeltfot, rulle eller slange.
    guideline_markings:
      name: Retningslinjemarkeringer
      description: Type visuelle justeringsmarkeringer trykt eller innlagt på overflaten
        av kastematten for å hjelpe til med kasteøvelser.
    guiro_scraper_material:
      name: Guiro skrapemateriale
      description: Materialet i den medfølgende eller anbefalte skrapen/slagstykket
        som brukes med guiroen.
    guiro_surface_style:
      name: Guiro overflatestil
      description: Beskriver spilleflatens mønster/geometri som skrapes for å produsere
        lyd.
    guitar_body_finish_type:
      name: Gitarkroppsfinishtype
      description: Angir overflaten som brukes på gitarkroppen.
    guitar_bridge_system_type:
      name: Gitarbrosystemtype
      description: Bro/strengefeste-systemets designfamilie for kompatibilitet og
        filtrering.
    guitar_case_style:
      name: Gitar eske-stil
      description: Angir den generelle beskyttelsen/strukturstilen til gitar-esken
        eller gigbagen.
    guitar_humidifier_placement:
      name: Gitar luftfukterplassering
      description: Angir hvor luftfukteren er ment å brukes/plasseres i forhold til
        instrumentet eller omgivelsene.
    guitar_pedal_i_o_configuration:
      name: Konfigurasjon av gitarpedal I/O
      description: Angir om pedalen støtter mono eller stereoinngangs-/utgangsruting.
    guitar_pedal_output_connector_type:
      name: Gitar pedalutgang tilkoblingstype
      description: Angir lydutgangskoblingstypen som brukes av pedalen.
    guitar_slide_finish:
      name: Gitarslidefinish
      description: Overflatefinish på sklien som påvirker følelse og friksjon mot
        styrke.
    guitar_slide_style:
      name: Slide-stil for gitar
      description: Angir formfaktoren til gitarens slide eller tonebar og hvordan
        den brukes.
    guitar_stand_type:
      name: Gitarstativtype
      description: Angir den primære formfaktoren til gitarstativet (hvordan det støtter/butikker
        gitaren).
    guitar_strap_attachment_type:
      name: Festetype for gitarreim
      description: Angir hvordan stroppen festes til gitaren (eller stroppknappen),
        inkludert om den bruker tradisjonelle ender eller hurtigutløsersystemer.
    guitar_strap_end_material:
      name: Materiale for enden av gitarremmen
      description: Materiale som brukes i stroppendene/fanen (delene som festes til
        stroppknapper eller stropplåsesystemer).
    guitar_strap_features:
      name: Funksjoner i gitarstropp
      description: Merkbare funksjonelle egenskaper ved gitarremmen utover grunnleggende
        størrelse/materiale (multi-velg).
    guitar_string_coating:
      name: Gitarstyrkebelegg
      description: Angir om styrken har et beskyttende belegg og, hvis aktuelt, beleggstilen.
    guitar_string_gauge_type:
      name: Gitarstyrkemålertype
      description: Den merkede målerkategorien for et styrkesett for akustisk gitar
        (f.eks. ekstra lett, lett, medium). Ofte tilnærmet ved tykkelsen med høy E-styrke;
        nøyaktige måleområder kan variere fra produsent til produsent.
    guitar_string_set_gauge_category:
      name: Gitarstyrkemålerkategori
      description: Vanlige markedsførte målefamilier for et gitarstyrkesett (vanligvis
        avledet fra den høye E / 1. styrke).
    guitar_string_winding_type:
      name: Gitarstyrkeviklingstype
      description: Angir den ytre omslagsstilen til sårstyrken i settet.
    guitar_tuning_peg_button_shape:
      name: Gitar stemmeskrueform
      description: Shapes/stilen på stemmenøkkelen/knappen.
    guitar_tuning_peg_configuration:
      name: Konfigurasjon av stemmeskruer for gitar
      description: Tunersettets layout for hodestokken.
    guitar_tuning_peg_mounting_style:
      name: Monteringsstil for gitar-stemmepinne
      description: Hvordan en stemmeskrue monteres på hodestokken (bøssingtype og
        antirotasjonsmetode).
    guitar_tuning_peg_shaft_type:
      name: Gitar stemmeskrue akseltype
      description: Om styrkestolpen er solid eller delt, og hvordan styrkestolpen
        er sikret.
    guitar_tuning_peg_style:
      name: Stil for gitar-stemmepinne
      description: Den fysiske stemmemaskinen/peg-stilen og monteringsformatet som
        brukes på et instrumenthode (f.eks. forseglet gir kontra åpent gir, låsing,
        delestolpe).
    gum_condition:
      name: Tannkjøtttilstand
      description: tilstand/status til stempeltyggegummien på baksiden (f.eks. aldri
        hengslet, hengslet, ingen tyggegummi).
    gun_action_type:
      name: Funksjonsmetode for skytevåpen
      description: Mekanisk virkningstype som brukes til å avfyre/avfyre (f.eks. boltmekanisme,
        vektstangmekanisme).
    gun_operational_status:
      name: Våpenets operative status
      description: Angir om samlervåpenet er deaktivert/ikke-skyter (og hvordan det
        presenteres).
    gun_type:
      name: Pistoltype
      description: Identifiserer den generelle skytevåpenformfaktoren for det antikke
        våpenet.
    gusset_material:
      name: Materiale i kile
      description: Spesifiserer materialet som brukes i skritt-/kilefôret, noe som
        påvirker pusteevne, hygiene og komfort.
    gymnastics_discipline:
      name: Gymnastikkdisiplin
      description: Angir hvilken type gymnastikk produktet er beregnet for (f.eks.
        kunstnerisk, rytmisk, akrobatisk).
    hair_extension_texture:
      name: Tekstur av hårforlengelser
      description: Beskriver krøll-, bølge- eller teksturmønsteret til forlengelseshårene.
    hair_net_style:
      name: Hårnettstil
      description: Identifiserer design- eller konstruksjonsstilen til hårnettet (f.eks.
        bouffant, hårsnor, knutedeksel).
    hair_quality_grade:
      name: Kvalitetsgrad for hår
      description: Angir hårets bransjekvalitet/opphav.
    halter_style:
      name: Halterstil
      description: Identifiserer den funksjonelle eller designmessige stilen til grimen
        (f.eks. tau, breakaway, show), og hjelper kundene med å velge en grime som
        passer til deres tiltenkte bruk.
    hammock_style:
      name: Hengekøyestil
      description: Beskriver den strukturelle stilen eller konstruksjonen av hengekøyen.
    hand_and_foot_coverage:
      name: Hånd- og fotdekning
      description: Beskriver integrerte eller avtakbare votter og støvletter som dekker
        hender og/eller føtter.
    hand_cymbal_set_configuration:
      name: Konfigurasjon for håndsymbal-sett
      description: Angir om produktet selges som en matchet sammenkobling, en enkelt
        cymbal eller et større sett.
    hand_drum_head_material:
      name: Materiale for håndtrommeskinn
      description: Materialet i trommeskinnet (membranen) som brukes på begertrommen.
    hand_exerciser_style:
      name: Håndtreningsstil
      description: Klassifiserer den generelle stilen eller mekanismen til håndtreneren.
    hand_guard_backbone_material:
      name: Håndbeskyttelsesmateriale i ryggraden
      description: Materialet i den strukturelle ryggraden/ryggraden (hvis tilstede),
        som bestemmer styrke og beskyttelse.
    hand_guard_coverage_style:
      name: Håndbeskyttelsesdekningstil
      description: Beskriver dekningen/profilen til håndbeskytteren, som påvirker
        vind/påvirkning.
    hand_guard_mounting_type:
      name: Monteringstype for håndbeskyttelse
      description: Angir hvordan håndbeskytterne festes til motorsykkelen (f.eks.
        styreende med innerklemme kontra kun klemme).
    hand_guard_set_configuration:
      name: Konfigurasjon for håndvern-sett
      description: Om produktet selges som en venstre/høyre sammenkobling eller en
        enkeltsidet.
    hand_guard_style:
      name: Håndbeskyttelsesstil
      description: Beskriver dekningsdesignet eller -stilen til vernet (f.eks. lukket,
        åpen, full, lite, standard).
    hand_guard_weather_protection:
      name: Håndbeskyttelse værbeskyttelse
      description: Indikerer den tiltenkte værbeskyttelsen som håndbeskytterne gir.
    hand_paddle_strap_type:
      name: Håndpadlestropptype
      description: Angir typen stropp, eller fravær av stropp, som brukes til å feste
        håndpadlen til brukerens hånd.
    hand_percussion_mount_attachment_mechanism:
      name: Festemekanisme for håndperkusjonsfeste
      description: Angir hvordan festet festes til et stativ, en snelle eller annet
        maskinvare (f.eks. klemmefeste kontra stangfeste).
    hand_percussion_mounting_handling:
      name: Håndslagverk montering/ekspedering
      description: Om instrumentet er håndholdt, brukt, montert eller plassert på
        bordet/gulvet ved vanlig bruk.
    hand_percussion_pitch_type:
      name: Håndperkusjonstype
      description: Angir om instrumentet produserer en bestemt tonehøyde (stemmbar/toner)
        eller en ubestemt tonehøyde.
    hand_percussion_playing_method:
      name: Håndperkusjon spillemetode
      description: Hvordan instrumentet vanligvis spilles for å produsere lyd (f.eks.
        ristet vs. skrapt).
    hand_percussion_set_configuration:
      name: Konfigurasjon av håndperkusjonssett
      description: Enten produktet er et enkelt instrument, en matchet sammenkobling
        eller et sett med flere deler.
    hand_percussion_size_class:
      name: Håndslagverk størrelsesklasse
      description: Generell størrelseskategori for instrumentet når en presis måling
        ikke er gitt eller for enkel filtrering.
    hand_sewing_needle_point_type:
      name: Håndsying av nålespisstype
      description: Form/stil på håndsyningsnålspissen som brukes til å trenge gjennom
        forskjellige materialer (f.eks. vevd stoff, strikkevarer, lær) eller garn.
    hand_support_level:
      name: Støttenivå for hånd
      description: Angir graden av støtte eller kompresjon som hansken, omslaget eller
        stroppen gir.
    hand_support_size:
      name: Støttestørrelse for hånd
      description: Produsentdeklarert størrelse på hansken, stroppen eller omslaget
        (XS-XXL eller én størrelse).
    handball_ball_type:
      name: Balltype for håndball
      description: Angir den tiltenkte brukskategorien for håndballen, for eksempel
        kamp, trening eller strand.
    handball_playing_surface:
      name: Håndballbane
      description: Angir spilleflaten(e) som håndballen er optimalisert for.
    handball_target_type:
      name: Håndballmåltype
      description: Angir stilen eller utformingen av skyteskiven som er beregnet for
        håndballtrening.
    handbrake_actuation_type:
      name: Håndbremsaktiveringstype
      description: Angir hvordan parkeringsbremsen aktiveres.
    handbrake_orientation:
      name: Håndbremsens orientering
      description: Angir om håndbremsen er konstruert for venstre- eller høyrestyrte
        kjøretøy, eller om den er universell.
    handgun_grip_material:
      name: Materiale for håndvåpengrep
      description: Primærmateriale i pistolgrep/paneler.
    handle_configuration:
      name: Håndtakskonfigurasjon
      description: Beskriver den strukturelle stilen til wakeboard-referansen (f.eks.
        enkel, dobbel, Deep-V, T-wrap) slik at kunden kan matche ferdighet, tricks
        eller bretttype.
    handle_ergonomics:
      name: Håndtaksergonomi
      description: Beskriver ergonomiske funksjoner ved håndtaket som har til hensikt
        å forbedre komfort og kontroll.
    handle_grip_material:
      name: Grepsmateriale for håndtak
      description: Spesifiserer materialet som brukes på håndtaksfotens grepflate,
        noe som påvirker komfort og grep, spesielt når det er vått.
    handle_grip_type:
      name: Grepstype for håndtak
      description: Spesifiserer håndtaksgrepbelegg/-materiale eller overflatestil
        som er ment å forbedre komfort og kontroll.
    handle_shape:
      name: Håndtaksform
      description: Krysseksjonelt form eller profil til håndtaket.
    handlebar_design:
      name: Styredesign
      description: Angir typen håndtak på trappetrinnet, for eksempel ingen, fast,
        justerbar høyde, sammenleggbar eller med motstandsbåndreferanse.
    handlebar_type:
      name: Styretype
      description: Identifiserer stilen på styret som er montert på sykkelen, påvirker
        kjørestilling, kontroll og komfort.
    handslide_bore_type:
      name: Håndsleideboringstype
      description: Angir om basstrombonen bruker en enkelt- eller dobbeltboringssleide.
    handwear_cuff_style:
      name: Håndmansjettstil
      description: Beskriver mansjett- eller håndleddskonstruksjonen til hansker eller
        votter, noe som påvirker dekning og passform.
    handwear_insulation_material:
      name: Håndisolasjonsmateriale
      description: Identifiserer isolasjons- eller fôrmaterialet som brukes inni hansker
        eller votter.
    handwear_size:
      name: Hanskestørrelse
      description: Spesifiserer størrelsen på hansker eller annet håndtøy for å sikre
        riktig passform.
    hang_glider_design:
      name: Hangglider-design
      description: Klassifiserer glideflyets strukturelle stil (f.eks. fleksibel vinge,
        stiv vinge, motordrevet).
    hanger_thread_size:
      name: Hengertrådstørrelse
      description: Indikerer skrutrådstørrelsen/standarden som brukes til å montere
        opphenget på bankpinner eller bittalarmer, for å sikre kompatibilitet.
    hanging_suspension_method:
      name: Hengende opphengsmetode
      description: Definerer den primære maskinvaren eller systemet som brukes til
        å henge opp husken (f.eks. tau, kjetting, stativ eller ramme).
    hardtop_finish_type:
      name: Hardtop-overflatetype
      description: Angir den utvendige overflaten på hardtoppen (f.eks. grunnet vs.
        lakkert), som Impact monteringsberedskap og utseende.
    hardtop_shell_material:
      name: Materiale for hardtop-skall
      description: Angir hovedmaterialet i det stive skallet til et kjøretøys hardtop
        (ikke noe trekkstoff), for eksempel glassfiber eller aluminium.
    hardtop_window_configuration:
      name: Konfigurasjon av hardtop-vinduer
      description: Beskriver hvilke vinduer som følger med hardtoppen og deres konfigurasjon.
    harmonica_comb_material:
      name: Materiale i munnspill-kam
      description: Materiale brukt til munnspillkammen (luftkammerkroppen).
    harmonica_cover_plate_finish:
      name: Munnspilldeksel, finish
      description: Angir finishen eller belegget på munnspillets dekselplater.
    harmonica_cover_plate_material:
      name: Materiale i munnspill-dekkplate
      description: Materiale brukt til de ytre dekselplatene.
    harmonica_finish:
      name: Overflatebehandling for munnspill
      description: Overflatebehandling på munnspillets dekselplater/kropp.
    harmonica_included_accessories:
      name: Inkludert munnspill-tilbehør
      description: Angir hvilket tilbehør som følger med munnspillet.
    harmonica_note_range:
      name: Munnspillets noteområde
      description: Instrumentomfangsklassifisering brukt i kontekst (f.eks. bass,
        baryton, tenor).
    harmonica_reed_plate_material:
      name: Materiale for rørblad til munnspill
      description: Materiale brukt til rørplatene (f.eks. messing, rustfritt stål,
        aluminium).
    harmonica_system_type:
      name: Harmonikasystem/type
      description: Identifiserer orkesterharmonikasystemet eller formfaktoren (f.eks.
        trekkspill, bass, baryton, polyfoni).
    harmonica_tuning_system:
      name: Stemmesystem for munnspill
      description: Angir layout/systemet som brukes av munnspillet (f.eks. Richter-,
        solo-, orkesterstemming).
    harness_shell_type:
      name: Seleskalltype
      description: Beskriver stivheten i skallkonstruksjonen til selen (f.eks. softshell,
        hardshell, hybrid).
    harness_style:
      name: Selestil
      description: Definerer selens strukturelle stil/design, f.eks. midje, sete,
        bryst/vest, vingebelte, boardshorts eller hybrid.
    harness_type:
      name: Seletype
      description: Klassifiserer klatreselens strukturelle stil, for eksempel sitte,
        helkropps eller bryst.
    harp_action_type:
      name: Handlingstype for harpe
      description: Primærmekanisme som brukes til å endre tonehøyde/tilfeldige toner
        på harpen.
    harp_finish:
      name: Harpefinish
      description: Overflatebehandling på harpekroppen (f.eks. naturlig, beiset, malt,
        lakkert).
    harp_included_accessories:
      name: Inkludert harpetilbehør
      description: Viser tilbehør som følger med pedalharpekjøpet.
    harvest_method:
      name: Høstemetode
      description: Angir om sjømaten ble villfanget, oppdrettet eller oppnådd via
        en annen metode.
    harvest_stage:
      name: Innhøstingsfase
      description: Angir vekststadiet der ruccolaen ble høstet, for eksempel mikrogrønn,
        babyblad eller moden bunt.
    hat_style:
      name: Hattestil
      description: Konstruksjonen/stilen på festhatten (f.eks. kjeglehatt, kronehatt,
        flosshatt, visir) for å gjenspeile hvordan varen fundamentalt ser ut.
    hazard_signal_mode:
      name: Mode
      description: Valgbare lysmønstre/moduser for LED/elektroniske veivarsellys.
    head_configuration:
      name: Hodekonfigurasjon
      description: Angir om øksehodet har en øks, hammer, begge deler eller ingen,
        noe som direkte påvirker funksjonaliteten på is og blandet terreng.
    head_material:
      name: Materiale for hodet
      description: Materiale i spillehodet leveres med quintoen.
    head_movement_type:
      name: Type hodebevegelse
      description: Retningsbestemt bevegelsesfunksjonalitet av bipoden eller stokkhodet
        (f.eks. panorering, tilt, skråning).
    head_side:
      name: Hodesiden
      description: Angir om trommeskinnet er beregnet for slagsiden, resonanssiden
        (forsiden) eller begge deler.
    head_weight_style:
      name: Hodevektstil
      description: Identifiserer vektkonfigurasjonen ved fluens hode, som påvirker
        synkehastighet og presentasjon.
    headband_embellishment:
      name: Pannebåndsutsmykning
      description: Identifiserer dekorative elementer festet til pannebåndet (f.eks.
        sløyfer, perler, krystaller, dyreører).
    headboard_style:
      name: Sengegavl-stil
      description: Beskriver design- eller konstruksjonsstilen til hodegavlen som
        følger med sengen.
    headgear_strap_configuration:
      name: Konfigurasjon av hodestroppen
      description: Angir antall stropper som brukes til å feste brytehodeplagget.
    headjoint_crown_style:
      name: Kroneformet hodeledd
      description: Angir stilen eller designet på fløytehodeleddets krone (endehette),
        noe som kan påvirke estetikk og vekt/balanse.
    headjoint_pitch_standard:
      name: Standard for hodeleddsavstand
      description: Indikerer designstandarden for tuning av hodeleddet (f.eks. A=440
        vs. A=442).
    headliner_product_form:
      name: Produktformat for takinteriør
      description: Angir om produktet er en komplett støpt taktrekkenhet, et erstatningsstoff
        eller en reparasjons-/kledningskomponent.
    headrest_mount_attachment_method:
      name: Festemetode for nakkestøtte
      description: Angir hvordan festet festes til nakkestøtten/setestøttene.
    headrest_provision:
      name: Nakkestøttetildeling
      description: Angir om nakkestøtter er inkludert og/eller om det finnes festepunkter
        for nakkestøtter.
    headset_standard:
      name: Standard hodesett
      description: Type grensesnitt mellom styrerør/styrelager som brukes av rammen.
    headstall_style:
      name: Nakkestall-stil
      description: Klassifiserer den strukturelle utformingen eller øre-/pannekonfigurasjonen
        til hodestøtten.
    headwear_intended_use:
      name: Tiltenkt bruk av hodeplagg
      description: Indikerer hovedformålet eller kontekst for bruk av turbanen (f.eks.
        cellegiftbehandling, hårtap, svømming, religiøst).
    hearing_enhancer_style:
      name: Hørselsforsterkerstil
      description: Beskriver enhetens fysiske formfaktor, slik at brukerne kan velge
        mellom over-ear, in-ear, bak-hodet og andre design.
    heart_rate_monitoring_method:
      name: Metode for pulsmåling
      description: Identifiserer hvordan maskinen registrerer pulsdata under treningsøkter.
    heart_rate_sensing_technology:
      name: Teknologi for pulsmåling
      description: Angir den fysiologiske målemetoden monitoren bruker for å registrere
        hjertefrekvens (f.eks. elektrisk EKG vs. optisk PPG).
    heart_rate_sensor_placement:
      name: Pulssensorplassering
      description: Indikerer hvor sensoren er slitt eller plassert (på kroppen eller
        sykkelen), noe som påvirker komfort og målenøyaktighet.
    heat_retention_technology:
      name: Teknologi for varmehåndtering
      description: Beskriver enhver teknologi, belegg eller materiale som forbedrer
        svette eller termisk aktivitet for treningsfokuserte tube-sko (f.eks. neopren-saunaeffekt).
    heated_glass_feature:
      name: Oppvarmet glassfunksjon
      description: Angir om vindusglasset har integrerte elektriske elementer, som
        for eksempel et bakre nett og/eller en antenneintegrert i glasset.
    heater_control_actuation_method:
      name: Metode for aktivering av varmekontroll
      description: Angir hvordan varme-/HVAC-kontrollen aktiverer kjøretøyets HVAC-boks
        (f.eks. kabelaktivert, vakuumaktivert eller elektronisk signalering).
    heater_control_electrical_connector_type:
      name: Varmekontroll elektrisk tilkoblingstype
      description: Angir den elektriske koblingstypen/grensesnittet som brukes av
        varmekontrollenheten (f.eks. pigtail vs. pluggtype).
    heating_technology:
      name: Oppvarmingsteknologi
      description: Identifiserer den primære oppvarmingsmekanismen som fordamperen
        bruker for å omdanne materiale til damp.
    heel_shape:
      name: Hælform
      description: Spesifiserer den geometriske stilen eller silhuetten til selve
        hælen, og hjelper kunden med å filtrere etter strukturelt utseende og stabilitetspreferanser
        (f.eks. stiletto vs. blokk).
    helicopter_mission_type:
      name: Helikopteroppdragstype
      description: Helikopterets primære tiltenkte bruk/rolle.
    helicopter_rotor_configuration:
      name: Konfigurasjon av helikopterrotor
      description: Angir helikopterrotorsystemets layout (hovedrotor/halerotor-arrangement),
        for eksempel enkelt hovedrotor + halerotor, koaksial, tandem eller sammenflettet.
    helmet_accessory_type:
      name: Type hjelmtilbehør
      description: Identifiserer den spesifikke typen sykkelhjelmdel eller tilbehør,
        slik at kunden umiddelbart kan finne riktig vare.
    helmet_audio_connector_type:
      name: Hjelmlydkoblingstype
      description: Angir hvilken flylydkontakt-type hjelmens kommunikasjonskabel bruker,
        hvis den finnes.
    helmet_communication_system_readiness:
      name: Beredskap for hjelmkommunikasjonssystem
      description: Om hjelmen er designet for å akseptere et intercom-/Bluetooth-kommunikasjonssystem.
    helmet_construction_type:
      name: Konstruksjonstype for hjelm
      description: Beskriver byggestilen til hjelmskall og -liner (f.eks. skum, hardskall,
        hybrid).
    helmet_fit_head_shape:
      name: Hjelmtilpasning (hodeform)
      description: Den interne passformprofilen er beregnet for forskjellige hodeformer.
    helmet_interior_liner_type:
      name: Hjelmens innvendige fôrtype
      description: Type komfortfôr og om det er avtakbart/vaskbart.
    helmet_liner_material:
      name: Materiale i hjelmforing
      description: Spesifiserer materialet i det indre fôret eller fyllet som gir
        komfort og påvirker absorpsjon.
    helmet_retention_closure_type:
      name: Hjelmbevaring lukkingstype
      description: Spesifiserer hjelmens hakereimens lukke-/kundebevaringsmekanisme
        (f.eks. dobbel D-ring, mikrometrisk skralle).
    helmet_safety_certification:
      name: Sikkerhetssertifisering for hjelmer
      description: Lister opp sikkerhetsstandardene eller sertifiseringene som hjelmen
        overholder.
    helmet_safety_certification_standard:
      name: Sikkerhetssertifiseringsstandard for hjelm
      description: Sikkerhets-/homologeringsstandarder som motorsykkelhjelmen er sertifisert
        for å oppfylle.
    helmet_shell_material:
      name: Materiale i hjelmskall
      description: Primært ytre skallmateriale eller konstruksjon brukt til hjelmen.
    helmet_size_system:
      name: Hjelmstørrelsessystem
      description: Størrelsesskjemaet som brukes for å uttrykke hjelmstørrelse.
    helmet_sun_visor_type:
      name: Hjelm solvisirtype
      description: Angir om hjelmen inkluderer et internt solvisir, et tonet utvendig
        skjold, begge deler eller ingen av delene.
    helmet_vehicle_fit:
      name: Hjelmtilpasning for kjøretøy
      description: Type kjøretøy/kjørebruk hjelmen er beregnet for.
    helmet_ventilation_adjustability:
      name: Justerbar hjelmventilasjon
      description: Angir hvordan hjelmventilasjonen kan kontrolleres av føreren.
    helmet_ventilation_configuration:
      name: Konfigurasjon av hjelmventilasjon
      description: Beskriver hjelmens layout og justerbarhet (f.eks. hakeventil, panne-/inntaksventiler,
        lukkbare ventiler).
    helmet_visor_peak_adjustability:
      name: Justerbarhet av hjelmvisir/skjerm
      description: Om hjelmens offroad-skjerm/visir er justerbar og/eller avtakbar.
    helmet_visor_shield_optical_features:
      name: Optiske funksjoner for hjelmvisir (skjold)
      description: Optiske og kompatibilitetsfunksjoner for hovedansiktsskjerm/visir.
    helmet_visor_shield_type:
      name: Hjelmvisir/skjoldtype
      description: Primær ansiktsskjerm/visirkonfigurasjon inkludert med hjelmen.
    hem_style:
      name: Faldestil
      description: Identifiserer hvilken stil benåpningen har på seg – for eksempel
        ren, rullet eller rå – som sterkt Influence plaggets utseende.
    hemisphere_compatibility:
      name: Kompatibilitet mellom hemisfære
      description: Angir hvilken halvkule stjernekartet er utformet for, basert på
        synlige konstellasjoner.
    hemline_style:
      name: Faldestil
      description: Definerer snittet eller designet på kjolens nederste kant.
    herbal_infusion_function:
      name: Urteinfusjonsfunksjoner
      description: Angir den primære velvære- eller funksjonsfordelen som infusjonen
        er merket for.
    hex_size:
      name: Heksagonal størrelse
      description: Unbrakonøkkelstørrelse kreves for å montere/fjerne glødepluggen.
    hi_hat_pair_type:
      name: Hi-hat-sammenkoblet type
      description: Angir om oppføringen er for en matchet topp/bunn sammenkoble eller
        en enkeltpersons cymbalkomponent.
    hi_hat_sound_character:
      name: Lydkarakter for hi-hat
      description: Beskriver den overordnede tonale profilen for å hjelpe kunder med
        å filtrere etter lyden de ønsker.
    high_visibility_class:
      name: Synlighetsklasse
      description: Angir ANSI/ISEA 107-nivået for synlighetsklassifisering av plagget.
    highback_style:
      name: Highback-stil
      description: Beskriver den strukturelle stilen/designen til highbacken som påvirker
        ridekarakteristikk.
    hitch_ball_diameter:
      name: Diameter på tilhengerfestekule
      description: Diameteren på kulehodet (kulen) på tilhengerfestet som passer til
        en tilhengerkobling (f.eks. 1 7/8 tommer, 2 tommer, 2 5/16 tommer, 50 mm).
    hitch_ball_mounting_style:
      name: Monteringsstil for tilhengerfestekule
      description: Enten kulen på koblingsfestet er en standard muttermontert kule,
        en fast/presset stil for spesifikke koblingshoder, eller inkluderer integrert
        maskinvare.
    hobby_horse_handle_type:
      name: Referansetype for hobbyhest
      description: Spesifiserer grep-/referansekonstruksjonen som brukes til å holde
        eller styre hobbyhesten.
    hobby_horse_sound_features:
      name: Lydfunksjoner for hobbyhester
      description: Angir om hobbyhesten inkluderer lydeffekter og hva slags.
    hockey_goal_type:
      name: Type hockeymål
      description: Angir stilen eller den tiltenkte bruken av hockeymålet (f.eks.
        ordinær is, gatemål, Shop Mini).
    hockey_size_category:
      name: Størrelseskategori for hockey
      description: Angir den standardiserte utstyrsstørrelsesgruppen som delen passer
        til (ungdom, junior, mellomnivå, senior).
    hockey_size_segment:
      name: Hockey størrelsesgruppe
      description: Spesifiserer det standardiserte hockeyutstyrets størrelsessegment
        som bestemmer den totale dimensjonen og passformen på puten.
    hold_surface_texture:
      name: Overflatetekstur på grep
      description: Beskriver grovheten eller den taktile overflaten på grepets gripeflate.
    home_decor_sewing_pattern_project_type:
      name: Startside dekor symønster prosjekttype
      description: Identifiserer typen dekorelement som symønsteret lager (f.eks.
        putetrekk, gardin, bordløper).
    homologation_rule_set:
      name: Homologering/regelsett
      description: Angir sanksjonsorganet eller regelsettet bilen er i samsvar med
        (der det er aktuelt).
    honey_form:
      name: Honningform
      description: Angir den fysiske formen eller presentasjonen av honningproduktet.
    honey_processing_method:
      name: Behandlingsmetode for honning
      description: Angir hvordan honningen ble behandlet eller bearbeidet før emballasje.
    honey_variety:
      name: Honningvariasjon
      description: Identifiserer den botaniske eller florale kilden til honningen–
        enten monofloral eller polyfloral – som direkte påvirker smak, farge og pris.
    hood_configuration:
      name: Hettekonfigurasjon
      description: Beskriver hettens design og justerbarhetsfunksjoner.
    hood_design:
      name: Hettedesign
      description: Identifiserer om det finnes hettet på plagget, og hvilken stil
        den har.
    hood_style:
      name: Hettestil
      description: Indikerer tilstedeværelsen og stilen til en hette på plagget.
    hood_type:
      name: Hettetype
      description: Angir spesielle designegenskaper ved hettedelen av plagget.
    hook_and_eye_size_hook_number:
      name: Krok og øyestørrelse (kroknummer)
      description: Standardiserte hektestørrelser/nummereringer (der det er aktuelt)
        brukt på emballasje for å indikere generell hekte-/øyestørrelse.
    hook_and_loop_fastener_duty_rating:
      name: Borrelås-tollplitter-vurdering
      description: Indikerer tiltenkt styrke/tollplikternivå for borrelåsen.
    hook_and_loop_fastener_format:
      name: Borrelåsformat
      description: Angir den fysiske formen eller emballasjeformatet til borrelåsproduktet
        (f.eks. rull/teip, prikker, strimler).
    hook_and_loop_fastener_side:
      name: Festeside for borrelås
      description: Angir om produktet kun inkluderer kroksiden, kun løkkesiden eller
        et sett som inneholder begge sider.
    hook_coating_finish:
      name: Overflatebehandling på hette
      description: Overflatebehandling eller plettering påført kroken for korrosjonsbestandighet,
        stealth eller farge (f.eks. svart nikkel, bright organisasjonsnummer).
    hook_configuration:
      name: Krokkonfigurasjon
      description: Beskriver tilstedeværelsen og stilen på kroker Supply med lokkefuglen.
    hook_eye_style:
      name: Øyestil på krok
      description: Angir former eller retningen til krokøyet, som påvirker hvordan
        kroken knytes eller festes.
    hook_eye_type:
      name: Øyetype på krok
      description: Spesifiserer utformingen av krokøyet, som påvirker knutevalg og
        rigging.
    hook_loop_format:
      name: Borrelåsformat
      description: Angir den fysiske formfaktoren til den påsydde borrelåsen.
    hook_loop_side:
      name: Side for borrelås
      description: Angir om produktet er på kroksiden, løkkesiden eller et matchende
        borrelåssett.
    hook_material:
      name: Krokmateriale
      description: Identifiserer materialet som brukes spesifikt til gaffkroken/hodet,
        en nøkkelfaktor for styrke og korrosjonsbestandighet ved bruk i saltvann.
    hook_organizer_style:
      name: Krokorganisatorstil
      description: Den fysiske stilen eller formfaktoren til krokorganisatoren (for
        eksempel eske, rull eller pose), som brukes til å støtte browsing og filtrering
        etter arrangørtype.
    hook_point_configuration:
      name: Konfigurasjon av krokspiss
      description: Angir om kroken har to spisser (dobbel) eller tre spisser (diskant).
    hook_point_type:
      name: Krokpunkttype
      description: Beskriver slipingen eller formen på en fiskekrokspiss, som påvirker
        penetrasjon og holdeevne.
    hook_shank_length:
      name: Krokskaftlengde
      description: Indikerer den relative lengdeklassifiseringen av krokskaftet (f.eks.
        kort, lang) for rask visuell og funksjonell sammenligning.
    hooks_eyes_attachment_method:
      name: Festemetode for kroker og maljer
      description: Hvordan krokene og maljene er festet til plagget eller prosjektet.
    hop_up_type:
      name: Type med oppstivet kant
      description: Definerer systemet med oppstivet kant som brukes til å gi bakspinn
        på BB-er for rekkevidde og nøyaktighet.
    horse_blanket_type:
      name: Hesteteppetype
      description: Angir primærstil eller tiltenkt bruk for hestedekkenet eller -lakenet.
    horse_brush_type:
      name: Hestebørstetype
      description: Klassifiserer børsten etter dens spesifikke stellstil eller tiltenkte
        formål, slik at kunder kan filtrere uten å fragmentere kategorihierarkiet.
    horse_care_purpose:
      name: Formål med hestepleie
      description: Produktets primære funksjonelle formål innen hestepleie, som omfatter
        helse, stell og styringsbehov.
    horse_feed_stage:
      name: Hestefôringsstadium
      description: Angir hestens livsstadium eller fysiologiske status som fôret er
        formulert for.
    horse_groomer_type:
      name: Strigleredskapstype for hest
      description: Klassifiserer typen strigleredskap, slik at kundene raskt kan finne
        det spesifikke verktøyet de trenger.
    horse_leg_protection_type:
      name: Beskyttelsestype for hestens bein
      description: Klassifiserer den spesifikke stilen eller egenskapene til hestestøvler,
        -dekken eller -bandasjer.
    horse_model_breed:
      name: Hestemodellrase
      description: Angir hesterasen som er avbildet av skala-modellen (hvis aktuelt).
    hosiery_toe_style:
      name: Strømpebukse med tåstil
      description: Definerer konstruksjonen av tåområdet på strømpebuksene, viktig
        for holdbarhet og kompatibilitet med fottøy med åpen tå.
    hot_air_balloon_basket_type:
      name: Type kurv for varmluftsballonger
      description: Spesifiserer den primære kurvkonfigurasjonen/-stilen (f.eks. standard
        sport, kommersiell høykapasitets, med partisjoner, tilgjengelig/dør) som brukes
        for ombordstigning og tiltenkt drift.
    hot_air_balloon_burner_type:
      name: Brennertype for varmluftsballong
      description: Type/konfigurasjon av brennersystem installert på ballongen.
    hot_air_balloon_envelope_material:
      name: Materiale for konvolutt med varmluftsballong
      description: Primært stoff/materiale brukt til ballongemballasjen (kaldapin).
    hotfix_application_tool:
      name: Applikasjonsverktøy for hurtigreparasjon
      description: Anbefalt verktøy eller varmekilde som brukes til å feste hotfix-rhinsteiner.
    hub_axle_type:
      name: Navakseltype
      description: Identifiserer akselgrensesnittet/bevaringssystemet som navet er
        konstruert for (hurtigkobling, gjennomgående aksel osv.).
    hub_motor_type:
      name: Navmotortype
      description: Beskriver konstruksjonsstilen til navmotoren (med gir, direktedrift,
        børstemotor, børsteløs) for å informere kunden om dreiemoment, vekt og effektivitetsegenskaper.
    hula_hoop_construction_type:
      name: Konstruksjonstype for rockering
      description: Beskriver hvordan ringen er konstruert/montert.
    hula_hoop_features:
      name: Egenskaper for rockering
      description: Fremhever viktige funksjonelle eller designmessige egenskaper ved
        rockeringen.
    hull_design:
      name: Skrogdesign
      description: Beskriver skrogformen, som påvirker ytelses- og håndteringsegenskaper.
    hull_type:
      name: Skrogtype
      description: Beskriver skrogformen som påvirker ytelse og stabilitet.
    humidifier_refill_medium_type:
      name: Luftfukterpåfylling medium type
      description: Angir hvilket fuktighetsmedium som brukes i etui-luftfukteren (det
        som fuktes eller byttes ut).
    humidifier_refill_method:
      name: Metode for påfylling av luftfukter
      description: Beskriver hvordan luftfukteren fylles på med fuktighet eller byttes
        ut.
    humidifying_medium:
      name: Fuktighetsmedium
      description: Identifiserer fuktighetselementet/-mediet som brukes av produktet
        (hva som blir fuktet/aktivert).
    hummus_base_ingredient:
      name: Ingrediens i hummusbasis
      description: Identifiserer den primære belgfrukt- eller grønnsaksbasen som brukes
        til å lage hummusen.
    hunting_call_type:
      name: Jaktlokkekalltype
      description: Klassifiserer den primære bruksmåten eller mekanismen til lokkekallet
        (f.eks. munnblåst, elektronisk, boks), slik at jegere raskt kan velge formatet
        som passer best til behovene og ferdighetsnivået deres.
    hunting_dog_collar_function:
      name: Funksjon for jaktbånd til hund
      description: Klassifiserer den primære funksjonelle stilen eller formålet til
        halsbåndet, og hjelper kunden med å filtrere produkter etter egenskaper som
        sporing, trening, synlighet eller standard bruk.
    hvac_control_functions:
      name: HVAC-kontrollfunksjoner
      description: Angir hvilke funksjoner for varme/ventilasjon/klima/avriming/luftstrøm
        som styres av enheten (mekaniske eller elektroniske).
    hybrid_drivetrain_configuration:
      name: Hybrid drivverkskonfigurasjon
      description: Indikerer PHEV-systemarkitekturen som beskriver hvordan elmotoren(e)
        og forbrenningsmotoren sørger for fremdrift.
    hybrid_system_type:
      name: Hybrid systemtype
      description: Klassifiserer hybridiseringsarkitekturen som brukes av kjøretøyet.
    hybrid_truck_cab_type:
      name: Hybrid lastebilførerhustype
      description: Angir førerhuskonfigurasjonen til lastebilen, som påvirker setekapasiteten
        og innvendig plass.
    hydration_bag_features:
      name: Funksjoner for drikkesekk
      description: Fremhever bemerkelsesverdige design- eller funksjonsfunksjoner
        som er spesifikke for drikkesekker.
    hydration_belt_features:
      name: Funksjoner i drikkebelte
      description: Lister opp viktige innebygde funksjoner som forbedrer brukervennligheten,
        sikkerheten eller bekvemmeligheten til drikkebeltet.
    hydration_bladder_compatibility:
      name: Kompatibilitet med drikkeblære
      description: Angir om vesten inkluderer eller støtter et drikkeblæresystem.
    hydration_mouthpiece_style:
      name: Stil for drikkemunnstykke
      description: Spesifiserer design eller funksjonell stil til munnstykket eller
        ventilen til et drikkesystem, og hjelper kunder med å velge sitt foretrukne
        drikkegrensesnitt og sikre kompatibilitet.
    hydration_pack_style:
      name: Stil for drikkepakke
      description: Spesifiserer den strukturelle stilen til drikkepakken, for eksempel
        ryggsekk eller vest, for å hjelpe med passform og filtrering av bruksgrense.
    hydration_system_insulation:
      name: Isolasjon av drikkesystemet
      description: Angir om reservoaret og/eller drikkeslangen er isolert for å bidra
        til å opprettholde væsketemperaturen i varmt eller kaldt vann.
    hydration_valve_type:
      name: Type drikkeventil
      description: Identifiserer typen drikkeventil eller munnstykke som følger med
        systemet eller flasken, og dekker vanlige design for biteventiler og dyser
        med høy gjennomstrømning.
    hydraulic_fluid_type:
      name: Type hydraulikkvæske
      description: Angir typen bremsevæske som en hydraulisk sykkelbremsespak er konstruert
        for å bruke. Denne informasjonen er avgjørende for vedlikehold og sikkerhet.
    hydrogenation_level:
      name: Hydrogeneringsnivå
      description: Angir om fettet er uhydrogenert, delvis hydrogenert eller fullstendig
        hydrogenert, noe som påvirker transfett og bakeytelse.
    hydrophobicity_level:
      name: Hydrofobisitetsnivå
      description: Indikerer graden av vannperling/avflaking som er merket av produktet.
    ice_cream_format:
      name: Iskremformat
      description: Beskriver den fysiske formen eller presentasjonen av iskremproduktet
        (f.eks. beger, bar, mochi).
    ice_skate_sharpener_type:
      name: Type skøytesliper
      description: Klassifiserer den overordnede designen eller formatet til sliperen
        (håndholdt stein, elektrisk maskin, jigg osv.).
    ice_temperature_suitability:
      name: Egnethet for istemperatur
      description: Angir istemperaturområdet som hockeykøllevoksen er formulert for,
        noe som påvirker ytelse og snøavvisende egenskaper.
    icing_sugar_variety:
      name: Melisvariant
      description: Klassifiserer formuleringen eller funksjonstypen av melis (f.eks.
        fondant, ikke-smeltende snøpulver, farget, smaksatt).
    ignition_coil_configuration:
      name: Tennspolekonfigurasjon
      description: Angir tenningsspolens formfaktor (enkeltspole/spole-på-plugg, flertårnspolebunt
        etter sylindertall, spoleskinne/kassett eller fordelerstil).
    ignition_lead_compliance_standard:
      name: Samsvarsstandard for tenningskabler
      description: Formell bransjestandard eller sertifisering som tenningskabelen(e)
        oppfyller, som hevdet av produsenten (f.eks. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Isolasjonsmateriale for tenningskabel
      description: Primærisolasjon/kappemateriale brukt på tenningskabelen (ytre kabelisolasjon).
    ignition_lead_set_type:
      name: Type tenningskabelsett
      description: Om produktet er én enkelt tenningskabel eller et komplett sett,
        og hva settet er beregnet på.
    ignition_lead_terminal_type:
      name: Terminaltype for tenningskabel
      description: Terminal-/kontakttype som brukes på endene av tenningskabelen (f.eks.
        tennpluggterminal og spole-/fordelerterminaltype).
    illumination_type:
      name: Belysningstype
      description: Angir om og hvordan ballen lyser for lek i mørket (f.eks. fosforescerende
        glød eller støtaktivert LED).
    immobilizer_installation_type:
      name: Installasjonstype for kjøretøylås
      description: Angir hvordan startsperren er installert eller koblet til kjøretøyet.
    immobilizer_unlock_method:
      name: Metode for opplåsing av startsperre
      description: Angir hvordan startsperren aktiveres/deaktiveres eller låses opp.
    impact_protection_certifications:
      name: Sertifiseringer for støtbeskyttelse
      description: Nevn den/de spesifikke sikkerhetsstandarden(e) som beskyttelsesputen
        oppfyller eller overgår.
    impact_protection_level:
      name: Støtbeskyttelsesnivå
      description: Angir støtbeskyttelsesnivået eller teknologien som tilbys av atletikkkoppen.
    impact_protection_rating:
      name: Støtbeskyttelsesklassifisering
      description: Angir det sertifiserte støtbeskyttelsesnivået i henhold til standarder
        (f.eks. EN 1621-1 nivå 1, EN 14120 nivå 2), noe som hjelper syklister med
        å filtrere etter beskyttelse av høyere kvalitet.
    impact_surface_material:
      name: Materiale for støtoverflate
      description: Beskriver det primære støt-/slagoverflatematerialet for sikkerhet
        og følelse (f.eks. skum, plast).
    incense_base_material:
      name: Røkelsesbasismateriale
      description: Primærbase/bindemiddelmateriale som brukes til å lage røkelsen
        (pulverbase) i settet.
    incense_making_method:
      name: Metode for å lage røkelse
      description: Den tiltenkte håndverksprosessen som støttes av settet.
    incense_tool_type:
      name: Røkelsesverktøytype
      description: Angir hva slags røkelsesverktøy dette produktet er (brukes til
        å forme, måle, presse, blande eller tørke røkelse).
    incline_adjustment_type:
      name: Type justering av helling
      description: Beskriver hvordan (eller om) hellingen kan endres under treningsøkter.
    included_accessories:
      name: Inkludert tilbehør
      description: Listene inkluderte tilleggsutstyr som reservehoder/-bits, oppbevaringsboks,
        ladekabel eller strømadapter.
    included_case_type:
      name: Inkludert etuitype
      description: Type bære-/oppbevaringseske som følger med basssaksofonen (hvis
        noen).
    included_components:
      name: Inkluderte komponenter
      description: Lister opp hva som er inkludert i pakken (nyttig for verktøysett
        og pakker).
    included_fastener_components:
      name: Inkluderte festekomponenter
      description: Angir om produktet er et sett med hekte og malje, kun hekter, kun
        maljer eller en relatert variant av plagglukking.
    included_hydration_vessel_type:
      name: Inkludert hydreringsbeholdertype
      description: Identifiserer typen drikkebeholder som leveres eller støttes av
        beltet.
    included_items_woodwind_instrument:
      name: Inkludert vare (treblåseinstrument)
      description: Lister som vanligvis pakkes vare er inkludert i basssaksofonpakken.
    included_materials:
      name: Inkluderte materialer
      description: Angir hvilke komponenter som er inkludert i mønsterkjøpet (kun
        mønster vs. mønster + materialer).
    included_mounting_accessories:
      name: Inkludert monteringstilbehør
      description: Viser hvilket monterings-/tilbehør som følger med høyttalertelefonen.
    included_pump_type:
      name: Inkludert pumpetype
      description: Identifiserer typen pumpe som følger med eller er integrert med
        luftmadrassen.
    included_scraper_implement_type:
      name: Inkludert skraperedskapstype
      description: Angir hvilket/hvilke spilleredskap(er) som følger med musikskrapen
        (f.eks. skrapepinne/-stang, stålbørste).
    indicator_design:
      name: Indikatordesign
      description: Klassifiserer den fysiske formen eller stilen til fiskebittindikatoren.
    indicator_functions_tracked:
      name: Indikatoregenskaper sporet
      description: Viser de spesifikke spillmålingene indikatoren sporer, for eksempel
        baller, strikes, outs, innings, antall pitches, overs, wickets, score eller
        downs.
    indoor_outdoor_use:
      name: Innendørs/utendørs bruk
      description: Angir hvorvidt bowling-leken er beregnet på innendørs bruk, utendørs
        bruk eller begge.
    inflatable_decoration_items_included:
      name: Oppblåsbar dekorasjon inkludert
      description: Viser en liste over viktige tilbehør som følger med den oppblåsbare
        dekorasjonen (f.eks. vifte, staker, fortøyningstau).
    inflatable_decoration_type:
      name: Oppblåsbar dekorasjonstype
      description: Angir typen oppblåsbar festdekorasjon (form/formfaktor) som støtter
        blaing og filtrering.
    inflatable_raft_float_features:
      name: Oppblåsbare flåte-/flytefunksjoner
      description: Funksjonelle funksjoner som finnes på den oppblåsbare flåten/flyteanordningene.
    inflation_method_included:
      name: inflasjonsmetode inkludert
      description: Angir hvilken type dekkinflasjonsløsning som følger med reparasjonssettet,
        hvis noen.
    infused_scent:
      name: Infundert duft
      description: Identifiserer duft- eller smakstilsetninger impregnert i agnmaterialet.
    ingredient_base_type:
      name: Basetype for ingrediens
      description: Identifiserer den primære basen som brukes for gjæring (f.eks.
        druesaftkonsentrat vs. friskpresset juice vs. fruktkonsentrat).
    ingredient_physical_form:
      name: Ingrediensens fysiske form
      description: Angir den fysiske formen duftingrediensen leveres i (brukes til
        håndtering, måling og formulering).
    ingredient_processing_method:
      name: Behandlingsmetode for ingrediens
      description: Angir den primære prosesseringsteknikken som brukes på ingrediensen
        (f.eks. frysetørket, ristet, fermentert).
    ink_colors_included:
      name: Blekkfarger inkludert
      description: Angir farger som er inkludert i stempelputen(e) i settet.
    ink_pad_application_method:
      name: Metode for påføring av blekkpute
      description: Hvordan blekket dispenseres/brukes fra puten (tradisjonell stempelpute
        vs. dauber vs. penselpute).
    ink_pad_permanence:
      name: Permanenthet for blekkpute
      description: Om det stemplede blekket er permanent og/eller arkivbestandig (motstand
        mot falming og vann når det er tørt).
    ink_pad_size:
      name: Størrelse på blekkpute
      description: Standardisert størrelse/formfaktor på blekkputens overflate/eske.
    ink_pad_special_effects:
      name: Spesialeffekter av blekkputer
      description: Spesielle visuelle/funksjonelle effekter av blekket når det stemples
        (f.eks. metallisk, glitter).
    ink_permanence:
      name: Blekkbestandighet
      description: Angir om det tørkede sumi-blekket er ment å være permanent/arkiveringsbart
        kontra vaskbart/ikke-permanent.
    ink_preparation_required:
      name: Blekkforberedelse kreves
      description: Angir om sumi-blekket er klart til bruk eller må fortynnes med
        vann eller males før bruk.
    inline_skate_brake_type:
      name: Bremsetype for rulleskøyter
      description: Angir bremsekonfigurasjonen som følger med rulleskøyter, for eksempel
        en avtakbar hælbrems eller ingen brems.
    inner_tent_configuration:
      name: Innerteltkonfigurasjon
      description: Angir konfigurasjonen eller stilen til innerteltet, for eksempel
        heldekkende innlegg, nettinginnlegg eller termofôr.
    innerspring_coil_type:
      name: Type innerfjærspiral
      description: Spesifiserer konstruksjonsstilen til fjærsystemet inne i madrassen,
        noe som påvirker støtte, bevegelse og pris.
    input_connector_type:
      name: Koblingstype for input
      description: Angir lydinngangskoblingstypen som brukes av pedalen (vanligvis
        1/4-tommers monokassett).
    input_valve_type:
      name: Inngangsventiltype
      description: Angir ventilstandarden som finnes på sykkelslangen/hjulet som adapteren
        kobles FROM.
    insecticide_treatment:
      name: Insektsmiddelbehandling
      description: Angir om nettet er fabrikkbehandlet med insektmiddel, og i så fall
        hvilken behandlingstype som er brukt for ekstra beskyttelse.
    insert_coverage_area:
      name: Dekningsområde for innlegg
      description: Angir hvilken del av foten innlegget er utformet for å dekke (f.eks.
        full lengde, kun hæl).
    insert_length_type:
      name: Type innsettingslengde
      description: Angir hvor mye av fotsengen buestøtten dekker.
    inside_message_type:
      name: Innvendig meldingstype
      description: Angir om kortet har en forhåndstrykt melding på innsiden, og om
        den kan tilpasses.
    insole_attachment_method:
      name: Festemetode for innersåle
      description: Angir hvordan buestøtten holder seg på plass inne i skoen (løs
        drop-in, med selvklebende bakside, borrelås osv.).
    insole_material:
      name: Innersålemateriale
      description: Beskriver materialet i fotsengen eller innleggssålen som foten
        hvilker på, belastning og støtte.
    installation_fabrication_level:
      name: Fabrikasjonsnivå for montering
      description: Angir den typiske mengden spesialtilpasset fabrikasjon eller modifikasjon
        som kreves for å installere settet.
    installation_location:
      name: Monteringssted
      description: Angir det typiske monteringspunktet for oljetrykksensoren i motorens
        oljesystem (f.eks. blokkoljekanalport, filterhus, sandwichplate eller ekstern
        ledningsmontering).
    installation_method:
      name: Installasjonsmetode
      description: Angir hvordan matten eller filten er festet eller installert på
        gulvet.
    instant_coffee_form:
      name: Form for pulverkaffe
      description: Beskriver den fysiske formen pulverkaffen leveres i, noe som påvirker
        tilberedningsmetode og holdbarhet.
    instep_coverage:
      name: Vristdekning
      description: Angir om produktet kun beskytter leggen eller både leggen og vristen/foten.
    instruction_format:
      name: Instruksjonsformat
      description: Formatet på instruksjonene som følger med settet.
    instrument_cleaning_swab_form_factor:
      name: Formfaktor for rengjøringspinne for instrumenter
      description: Angir den fysiske stilen til vattpinnen (f.eks. gjennomtrekksklut
        kontra stang-/børstesystem) for å samsvare med spillerens preferanser og instrumentets
        begrensninger.
    instrument_dimensions_unit_context:
      name: Enhetskontekst for instrumentdimensjon
      description: Avklarer hva de oppgitte høyde-/bredde-/lengde-målingene refererer
        til (f.eks. totalt instrument, lengde på enkeltrør, stativhøyde).
    instrument_electronics_type:
      name: Elektronikktype for instrument
      description: Angir om instrumentets hente-/forforsterkersystem er aktivt eller
        passivt.
    instrument_key:
      name: Instrumentknapp
      description: Angir opptakerens instrumenttastbetegnelse som brukes i kataloger
        (vanligvis C eller F for større opptakere).
    instrument_level:
      name: Instrumentnivå
      description: Målspillernivå for instrumenttilbudet.
    instrument_part_mounting_method:
      name: Monteringsmetode for instrumentdeler
      description: Spesifiserer hvordan delen festes eller installeres (f.eks. klemme
        på kontra lim kontra skruing).
    instrument_parts_included:
      name: Instrumentdeler inkludert
      description: Viser en liste over de viktigste komponentene/delene som følger
        med i esken til en A-klarinett.
    instrument_playing_technique:
      name: Teknikk for instrumentspilling
      description: Hvordan instrumentet vanligvis spilles/aktiveres (f.eks. ristes,
        slått, klakket).
    instrument_size_class:
      name: instrumentstørrelsesklasse
      description: Generell størrelse på instrumentet uttrykt som en kundevennlig
        klasse i stedet for eksakt dimensjon.
    insulation_fill_material:
      name: Fyllmateriale for isolering
      description: Identifiserer det primære materialet som brukes til å isolere jakken
        eller vesten.
    integrated_bottom_type:
      name: Integrert bunntype
      description: Angir om plagget inkluderer innebygd oversikt, shorts, trikot eller
        lignende underlag for dekning under bevegelse.
    integrated_charging_options:
      name: Integrerte ladealternativer
      description: Viser en liste over innebygde strøm- eller ladegrensesnitt som
        er tilgjengelige på nattbordet.
    integrated_furniture_function:
      name: Integrerte funksjoner
      description: Identifiserer ytterligere innebygde møbelelementer som følger med
        veggsengen eller stammen (f.eks. skrivebord, sofa, hyller).
    integrated_locking:
      name: Integrert låsing
      description: Om festet inkluderes en integrert lås for rack-til-kjøetøy og/eller
        sykkel-til feste.
    integrated_power_options:
      name: Integrerte strømalternativer
      description: Angir hvilken type innebygd strøm- eller ladefunksjoner servantskapet
        tilbyr.
    integrated_storage_features:
      name: Integrerte lagringsfunksjoner
      description: Identifiserer ytterligere oppbevarings- eller tilbehørsfunksjoner
        som biljardkøstativet har utover spor til køer.
    integrated_tool_functions:
      name: Integrerte funksjoner
      description: Ytterligere verktøyfunksjoner integrert i spaken (f.eks. eikekrok,
        ventilkjernefjerner, perledråper).
    intended_board_type:
      name: Tiltenkt brettype
      description: Angir hvilken type kiteboard finnen er designet for (f.eks. twintip,
        surf directional, hydrofoil).
    intended_consumption:
      name: Tiltenkt forbruk
      description: Angir hvordan produktet er ment å bli konsumert, og angir om det
        er trygt å spise rått, krever baking eller er delvis bakt.
    intended_craft:
      name: Tiltenkt håndverk
      description: Primær håndverkskontekst garnguiden er designet for.
    intended_culinary_use:
      name: Tiltenkt kulinarisk bruk
      description: Angir den primære kulinariske bruken av sausen, for eksempel dipping,
        koking eller glasering.
    intended_handlebar_style:
      name: Tiltenkt styrestil
      description: Beskriver den tiltenkte styret eller brukstilen til spaken (f.eks.
        flatt styre, droppstyre, aerodynamisk). Dette begrenser raskt kompatibiliteten
        uten å tvinge frem ytterligere underkategorier.
    intended_player_role:
      name: Tiltenkt spillerrolle
      description: Angir hvilken rolle hodeplagget er ment for på banen (f.eks. catcher,
        dommer).
    intended_playing_surface:
      name: Tiltenkt spilleflate
      description: Underlaget pucken, ballen eller ringen er designet for, for eksempel
        is, asfalt, gymgulv eller syntetisk is.
    intended_repair_location:
      name: Tiltenkt reparasjonssted
      description: Hvor på dekket settet er ment å reparere.
    intended_seating_position:
      name: Tiltenkt sittestilling
      description: Angir kjøretøyets sittestilling som sikkerhetsbeltets stroppen
        er ment å installeres eller brukes i.
    intended_sewing_application:
      name: Tiltenkt bruksområde for sying
      description: Bruksormåde for sying som tråden er beregnet for (f.eks. allsidig
        klessøm, quilting, møbeltrekk).
    intended_technique:
      name: Tiltenkt teknikk
      description: Primær tovingsteknikk puten/matten er designet for.
    intended_use:
      name: Tiltenkt bruk
      description: Primær kontekst for instrumentet.
    intended_use_fleece_fabric:
      name: Tiltenkt bruk (fleecestoff)
      description: Primærprosjektet/bruksområdet fleecestoffet er merket for.
    intended_user:
      name: Tiltenkt bruker
      description: Angir hvem flyets beskyttelsesutstyr er beregnet på å brukes av.
    intended_yarn_form:
      name: Tiltenkt garnform
      description: Angir garnpresentasjonen som best støttes av garnnøstet.
    interaction_mode:
      name: Samhandlingsmodus
      description: Primær interaksjonsmetode som brukes til å løse lyder eller aktiviteter.
    interactive_effects:
      name: Interaktive effekter
      description: Identifiserer de interaktive elektroniske eller mekaniske effektene
        som følger med et kjøkkenlekesett.
    interfacing_application_area:
      name: Bruksommrådet for grensesnittet
      description: Identifiserer de vanlige sy-/håndsverksområdene som grensesnittet
        er ment å støtte.
    interfacing_color_family:
      name: Fargefamilien for grensesnittet
      description: Indikerer den typiske basisfargen for mellomlegg som brukes under
        lyse eller mørke stoffer.
    interfacing_selling_format:
      name: Salgsformat for grensesnitt
      description: Beskriver salgsformatet for grensesnitt (for eksempel kontinuerlig
        kutt i lengde, forhåndskuttede deler, ruller eller produktversjoner).
    interfacing_stiffness_level:
      name: Stivhetsnivå for grensesnitt
      description: Beskriver graden av stivhet/fasthet som gis av grensesnittet.
    interior_padding_type:
      name: Innvendig fôrtype
      description: Type innvendig fylling eller innsatssystem som brukes inne i esken
        for å beskytte og organisere stoff.
    interior_stall_configuration:
      name: Innvendig båskonfigurasjon
      description: Spesifiserer innvendig layout/konfigurasjon for transport av dyr
        (båsretning og romstil).
    invitation_printing_coverage:
      name: Dekning av invitasjonstrykk
      description: Hvilken(e) side(r) av invitasjonen er trykt (kun forsiden vs. dobbeltsidig).
    iodization:
      name: Jodisering
      description: Angir om og i hvilken grad jod er tilsatt saltet.
    iridescence_level:
      name: Iridescensnivå
      description: Beskriver intensiteten til den naturlige/behandlede iriserende
        glansen som er typisk for påfuglfjær.
    irish_warpipe_set_configuration:
      name: Konfigurasjon av irsk krigsrørsett
      description: Angir hvilken konfigurasjon som selges (fullt instrument vs. deler/delvis
        sett) spesielt for irske krigspiper.
    iron_on_applique_application_method:
      name: Stryke-på-påføringsmetode
      description: Angir hvordan strykemerket er ment å påføres underlaget.
    ironing_center_features:
      name: Funksjoner på strykesenteret
      description: Lister opp spesialiserte funksjoner ved strykesentre som forbedrer
        brukervennlighet og bekvemmelighet.
    jacket_breast_style:
      name: Jakkestil i brystet
      description: Angir om dressjakken er enkeltspent eller dobbeltspent.
    jacket_vent_style:
      name: Ventilstil for jakke
      description: Angir typen ventilasjon (åpning) på baksiden av dressjakken.
    jam_and_jelly_consistency:
      name: Konsistens av syltetøy og gelé
      description: Beskriver teksturen på pålegget, og indikerer tilstedeværelse av
        fruktbiter eller frø.
    jaw_shape:
      name: Kjeveform
      description: Geometrien til kjevene eller spissen (f.eks. rett, bøyd, lang nese)
        som påvirker presisjon og rekkevidde.
    jerky_form:
      name: Rykkete form
      description: Beskriver den fysiske formen eller kuttet på de tørkede bitene
        (f.eks. strimler, pinner, biter).
    jersey_style:
      name: Genserstil
      description: Angir draktens formfaktor eller bruksstil for supporterdrøyer.
    jew_harp_accessories_included:
      name: Inkludert tilbehør til munnharpe
      description: Listene inkluderte gjenstander som fulgte med munnharpen (f.eks.
        etui, pose, instruksjoner).
    jew_s_harp_frame_style:
      name: Rammestil for munnharpe
      description: Beskriver konstruksjonsstilen til munnharmens ramme/kropp, som
        påvirker følelse, holdbarhet og spilleergonomi.
    jew_s_harp_tongue_profile:
      name: Tungeprofil for munnharpe
      description: Beskriver munnharpens tunge (rørblad) profil/geometri, som påvirker
        responsivitet og klangfarge.
    jewelry_pieces_included:
      name: Inkluderte smykkeelementer
      description: Lister opp de spesifikke smykkene som inngår i settet, slik at
        kundene vet akkurat hvilke smykker de kjøper.
    jigsaw_puzzle_piece_shape:
      name: Former på puslespillbrikke
      description: Smykkenes generelle form/utforming og kantprofil.
    jockstrap_design_features:
      name: Designfunksjoner for susp
      description: Fanger opp spesielle designelementer som er unike for jockstrapper
        som påvirker funksjon eller estetikk.
    juggling_club_construction_type:
      name: Konstruksjonstype for sjongleringskølle
      description: Spesifiserer den generelle konstruksjonstypen til en sjongleringskølle
        (f.eks. støpt i ett stykke vs. montert i flere deler), noe som kan påvirke
        holdbarhet, følelse og vedlikehold.
    juggling_club_core_material:
      name: Kjernemateriale for sjongleringskølle
      description: Hovedmaterialet i kjernen i køllen (forskjellig fra ytre omslag
        / teip).
    juggling_prop_set_size:
      name: Størrelse på sjongleringssett
      description: Antall hovedrekvisitter som inngår i settet (f.eks. et sett med
        tre baller, par poi).
    juggling_ring_edge_style:
      name: Kantprofil på sjongleringsring
      description: Kantprofilen på ringen, som påvirker komfort og grep.
    juice_form:
      name: Juicens form
      description: Spesifiserer produktets fysiske form eller bearbeidingsgrad (f.eks.
        ferdig væske, konsentrat, pulver).
    juice_processing_method:
      name: Behandlingsmetode for juice
      description: Spesifiserer hovedprosesseringsteknikken for juicen eller drikken
        som påvirker smak, næringsinnhold og holdbarhet.
    jump_rope_style:
      name: Hoppetauets stil
      description: Klassifiserer tauets/kabelens konstruksjonsstil (f.eks. perlet,
        stoff, speed-kabel), som har stor betydning for tiltenkt bruk og ytelse.
    kale_variety:
      name: Grønnkålvariant
      description: Identifiserer grønnkålens spesifikke sort eller kultivar (f.eks.
        krusete, lacinato/dinosaur, rød russisk). Dette hjelper kundene med å velge
        basert på smak, tekstur og kulinarisk bruk.
    kaleidoscope_viewing_type:
      name: Kaleidoskopisk visningstype
      description: Identifiserer visningsformatet eller driftsstilen til kaleidoskopet
        (f.eks. klassisk kikkertrør, teleidoskop med linse, hjulbetjent eller projeksjon).
    kayak_construction_type:
      name: Konstruksjonstype for kayak
      description: Spesifiserer kajakkens hovedkonstruksjonstype, slik som hardt skall
        eller oppblåsbar.
    kayak_design_type:
      name: Kajakkens designtype
      description: Klassifiserer kajakkens hovedformål (f.eks. surfski, playboat,
        turkajakk).
    kayak_hull_design:
      name: Kajakkens skrogdesign
      description: Identifiserer skrogets hovedform, som påvirker egenskaper som stabilitet
        og manøvrerbarhet i bølgeforhold.
    kayak_storage_bag_type:
      name: Type lagringsvæske for kayak
      description: Identifiserer stilen eller formatet til kajakkens oppbevaringsbag,
        slik som tørrbag eller årebag.
    kayak_style:
      name: Kajakkens stil
      description: Spesifiserer kajakkens hoveddesign eller -bruksområde (f.eks. fritidskajakk,
        turkajakk, oppblåsbar).
    keel_type:
      name: Kjølens type
      description: Identifiserer kjølkonfigurasjonen til seilbåten.
    kettlebell_style:
      name: Kettlebell-stil
      description: Identifiserer kettlebellens konstruksjons- eller stilvariant (f.eks.
        konkurranse, justerbar, myk), slik at brukeren kan velge riktig kettlebell
        til treningsbehovene sine.
    key_attachment_mechanism:
      name: Nøkkelens festemekanisme
      description: Spesifiserer festemekanismen som brukes til å sikre nøkler i etuiet,
        slik som ringer, klips eller skrufester.
    key_retention_when_unlocked:
      name: Nøkkelretensjon i ulåst tilstand
      description: Angir om nøkkelen kan fjernes fra låsen når den er ulåst.
    keyboard_amplifier_inputs:
      name: Innganger for keyboardforsterker
      description: Lister opp hvilke inngangstilkoblinger keyboardforsterkeren støtter
        (f.eks. 6,3 mm TRS, MIDI-inngang, Bluetooth).
    keyboard_amplifier_output_types:
      name: Utgangstyper for keyboardforsterker
      description: Spesifiserer hovedtypene for utgangstilkobling som støttes av keyboardforsterkeren
        for ruting av lyd til andre systemer.
    keyboard_case_handle_type:
      name: Håndtakstype for keyboardkoffert
      description: Håndtakssystem for bæring av keyboardkoffert (i tillegg til stropper).
    keyboard_case_interior_padding_type:
      name: Type innvendig polstring i keyboardkoffert
      description: Den innvendige polstringen eller fôret som brukes i kofferten.
    keyboard_case_protection_level:
      name: Beskyttelsesnivå for keyboardkoffert
      description: Beskyttelses- og stivhetsklasse for kofferten, fra støpt, hardt
        skall til robuste flight-/ATA-kofferter.
    keyboard_case_wheel_type:
      name: Type hjul på keyboard-etui
      description: Hjulkonfigurasjon for harde kofferter med hjul.
    keyboard_pedal_connector_type:
      name: Tilkoblingstype for keyboardpedal
      description: Spesifiserer kontakt- eller støpseltypen som brukes til å koble
        sustainpedalen til et keyboard eller digitalt piano.
    keyboard_power_supply_type:
      name: Strømforsyningstype for keyboard
      description: Hovedstrømforsyning for keyboardet (batteri, strømadapter, USB-strøm).
    keyboard_stand_tier_type:
      name: Nivåtype for keyboardstativ
      description: Spesifiserer om stativet selges som basisstativ eller inkluderer/kan
        utvides med et ekstra nivå.
    keyboard_stand_tiers:
      name: Nivåer på keyboard-stativ
      description: Antallet spillenivåer som støttes av Z-stativet (f.eks. ett nivå
        eller to nivåer).
    keychain_attachment_type:
      name: Nøkkelringfestets type
      description: Spesifiserer hovedfestemekanismen som brukes for å feste nøkkelringen
        til nøkler, vesker eller belter.
    keychain_style:
      name: Nøkkelringens stil
      description: Beskriver den overordnede formfaktoren til nøkkelringen (hva den
        fysisk er).
    keywork_finish:
      name: Finish på klaffeverk
      description: Beskriver finishen/belegget på klaffeverket (tastene), adskilt
        fra instrumentets finish.
    kick_point:
      name: Kickpunkt
      description: Spesifiserer plasseringen av kickpunktet for fleks i skaftet på
        en hockeykølle, som påvirker hastighet og følelse.
    kick_zone_grip_system:
      name: Grepssystem for kick zone
      description: Identifiserer teknologien som brukes i skienes kick-sone for feste.
    kickboard_features:
      name: Funksjoner for sparkebrett
      description: Fremhever spesielle egenskaper ved kickbrettet som forbedrer trening
        eller komfort, inkludert overflatetekstur og håndgrepsmuligheter.
    kickboard_handle_style:
      name: Kickbrettets håndtakstype
      description: Identifiserer hvorvidt og hvordan kickbrettet har håndtak eller
        overflatebehandling som påvirker grep og komfort.
    kickstand_mounting_position:
      name: Støttebenets monteringsposisjon
      description: Angir hvor på sykkelrammen støttebenet monteres (f.eks. sentermontering,
        kjedestagmontering eller bakakselmontering).
    kickstand_type:
      name: Støttebenets type
      description: Beskriver støttebenets konstruksjonsstil eller mekanisme (f.eks.
        ettbens sidestøtte, tobens midtstøtte eller teleskopisk).
    kidney_belt_support_level:
      name: Nyrebeltets støttenivå
      description: Produsentens angitte totale støttenivå fra nyrebelte for stabilisering
        av korsrygg og mage.
    kiln_firing_atmosphere:
      name: Atmosfære for ovnfyring
      description: Spesifiserer brennatmosfæren(e) ovnen kan støtte under drift (f.eks.
        oksidasjon eller reduksjon).
    kiln_heating_element_type:
      name: Type varmeelement i ovn (kiln)
      description: Type/materiale på varmeelementene som brukes i ovnen (kiln).
    kingpin_design:
      name: Kingpin-design
      description: Beskriver konstruksjonsstilen til kingpin-beslaget, som påvirker
        vekt og klaring ved grinding.
    kingpin_orientation:
      name: Kingpin-orientering
      description: Angir orienteringen til truckens kingpin, som påvirker kjøreegenskaper
        og kompatibilitet med deck.
    kit_components_included:
      name: Inkluderte komponenter i sett
      description: Lister opp de enkelte delene som følger med i settet (f.eks. jordspyd,
        bolter, stropper, monteringsverktøy), slik at kundene vet akkurat hva de kjøper.
    kit_format:
      name: Settets format
      description: Spesifiserer hvordan settet er pakket og transporteres (f.eks.
        pose, koffert eller eske).
    kit_items_included:
      name: Inkluderte deler i sett
      description: Lister opp hovedutstyret og forsyningene som inngår i vinsettet,
        slik at kunder kan skille mellom startsett og påfyll av ingredienser.
    kit_pouch_case_type:
      name: Settets pose-/kofferttype
      description: Spesifiserer hvilken type oppbevaringsløsning som følger med pleiesettet
        (hvis noen).
    kit_tools_included:
      name: Verktøy inkludert i settet
      description: Lister opp hovedverktøyene som følger med i settet (hvis noen)
        for å fullføre prosjektet.
    kite_inflation_system:
      name: Dragens oppblåsingssystem
      description: Angir hvordan dragens forkant og stivere fylles med luft.
    kite_line_configuration:
      name: Dragelinekonfigurasjon
      description: Angir hvor mange fly-/styringsliner dragens duk er designet for
        å bruke, som er en vanlig spesifikasjon for riktig tilpasning av stenger og
        liner.
    kite_type:
      name: Dragens type
      description: Definerer den strukturelle designkategorien til dragen (form og
        bridle-design).
    kiteboard_bag_style:
      name: Kiteboardbagens stil
      description: Kiteboardbagens spesifikke stil eller undertype (f.eks. boardbag,
        golfbag, reisebag, foilbag).
    kiwifruit_variety:
      name: Kiwisort
      description: Identifiserer den spesifikke kultivaren eller fargevarianten av
        kiwifrukt (grønn, gul, rød osv.).
    knee_pad_pocket_type:
      name: Kneputelommens type
      description: Angir hvorvidt og hvordan plagget har plass til beskyttende kneputer.
    knee_pad_style:
      name: Stil for knepute
      description: Beskriver konstruksjonsstilen eller formfaktoren til knebeskyttelsen
        (f.eks. erme, støttebandasje eller beskyttelsesplate).
    knee_protection_design:
      name: Knebeskyttelsesdesign
      description: Angir antallet hengslede kneledd som er integrert i leggskinnen.
    kneeboard_construction:
      name: Knebrettets konstruksjon
      description: Identifiserer brettets konstruksjonsteknikk eller komposittkonstruksjon
        (f.eks. rotasjonsstøpt plast, komprimeringsstøpt, karbonfiber).
    kneeboard_strap_type:
      name: Knebrettets stropptype
      description: Beskriver typen knestroppesystem som brukes for å feste brukeren
        til brettet.
    knife_lock_mechanism:
      name: Låsemekanisme for kniv
      description: Angir mekanismen som brukes til å sikre et foldeknivblad i åpen
        posisjon, eller indikerer ikke-låsende design.
    knife_locking_mechanism:
      name: Låsemekanisme for kniv
      description: Angir typen mekanisme som sikrer bladet i åpen posisjon, og definerer
        direkte sikkerhet, styrke og brukervennlighet for låsing av bladkniver.
    knife_opening_mechanism:
      name: Åpningsmekanisme for kniv
      description: Beskriver hvordan bladet skilles fra referansen, og skiller mellom
        manuelle, assisterte, automatiske og spesielle åpningsstiler.
    knife_system:
      name: Knivsystem
      description: Hvorvidt og hvordan skjærekniven fungerer på overlock-maskinen.
    knit_elastic_application:
      name: Bruksområde for strikket elastikk
      description: Angir den tiltenkte bruken av den strikkede elastiske kanten til
        sying/håndverk.
    knit_pattern:
      name: Strikkemønster
      description: Identifiserer strikkemasken eller teksturen som brukes i cardiganstoffet,
        slik som flette, ribbestrikk eller vaffelstrikk, slik at kundene kan finne
        spesifikke teksturer og termiske egenskaper.
    knit_style:
      name: Strikkestil
      description: Angir strikkekonstruksjonen, teksturen eller det dekorative mønsteret
        som finnes på genserstoffet.
    knitting_marker_counter_type:
      name: Strikkemarkør/tellertype
      description: Spesifiserer funksjonstypen innenfor strikkemarkører og -tellere.
    knitting_needle_tip_style:
      name: Stil på strikkepinnen
      description: Spissens skarphet/form er optimalisert for forskjellige garn og
        teknikker.
    knock_sensor_technology:
      name: Teknologi for dunkesensor
      description: Sensorteknologien som brukes i bankesensoren.
    knurl_aggressiveness:
      name: Rillemønsterets grovhet
      description: Beskriver hvor grovt eller markert rillemønsteret på stangen er,
        noe som påvirker grep, komfort og kontroll.
    knurl_marking_standard:
      name: Standard for markering av rillemønster
      description: Angir plasseringen av referanseringene som brukes til håndplassering
        (f.eks. IPF- eller IWF-markeringer).
    kohlrabi_variety:
      name: Kålrabisort
      description: Angir sorten eller varianten av kålrabi, slik at kundene kan velge
        mellom ulike smaker, størrelser og farger.
    koji_mold_type:
      name: Type koji-mugg
      description: Angir hvilken type eller stamme av koji-mugg som brukes i fermenteringen,
        noe som påvirker aroma og smak.
    kumquat_variety:
      name: Kumkvatsort
      description: Angir hvilken kumkvatsort som tilbys, slik at kundene kan velge
        frukt ut fra smak, størrelse eller bruksområde.
    label_edge_type:
      name: Kanttype for etikett
      description: Angir kantfinishstilen som brukes for å forhindre frynsing og definere
        estetikk.
    label_finish:
      name: Overflatebehandling for etikett
      description: Angir overflatebehandling, tekstur eller beskyttende belegg på
        etiketten.
    label_finish_edge_style:
      name: Etikettens kantutførelse
      description: Beskriver hvordan kantene er utført, noe som påvirker komfort og
        slitestyrke (f.eks. vevd kant eller laserskåret kant).
    label_fold_type:
      name: Type etikettbrett
      description: Angir hvordan innsyingsetiketten er brettet (f.eks. endebrett eller
        midtbrett), noe som påvirker hvordan den festes og hvor den plasseres.
    label_text_type:
      name: Teksttype for etikett
      description: Angir om etiketten er blank, forhåndstrykt eller ment å være personlig/tilpasset.
    lace_area_size:
      name: Størrelse på blondefelt
      description: Angir størrelsen eller utformingen av blondefeltet (f.eks. 4×4-closure
        eller 13×6-frontal), noe som bestemmer hvor mye skilningsplass som er tilgjengelig.
    lace_tightener_style:
      name: Type snøringstrammer
      description: Angir utforming eller konstruksjon av snøringstrammeren.
    lace_type:
      name: Type blonde
      description: Beskriver blondematerialet eller overflatebehandlingen ved hårfestet
        eller hetten, noe som påvirker hvor naturlig resultatet ser ut og hvor godt
        det matcher hudtonen.
    lacrosse_ball_certification:
      name: Sertifisering av lacrosseball
      description: Angir hvilke godkjenninger eller standarder lacrosseballen oppfyller.
    lacrosse_goal_regulation_certification:
      name: Sertifisering for lacrossemål
      description: Angir om målet eller nettet oppfyller kravene fra et bestemt forbund
        eller regelverk (f.eks. NCAA eller NFHS).
    lacrosse_pocket_type:
      name: Type lomme
      description: Angir hvilken type lomme eller mesh som er montert i hodet, noe
        som påvirker ballkontroll og ballslipp.
    lacrosse_string_type:
      name: Type streng
      description: Angir type og bruksområde for streng- eller meshproduktet, slik
        at kundene kan skille mellom mesh, sett og ulike strenger i lommen.
    ladder_position:
      name: Plassering av stige
      description: Angir hvor stigen eller trappen er plassert på loftsengen.
    lanyard_attachment_hardware:
      name: Maskinvare for festing av nøkkelsnor
      description: Angir hvilken type feste som sitter på enden av nøkkelsnoren for
        å koble til nøkler, adgangskort, telefoner eller annet tilbehør.
    lanyard_style:
      name: Snorstil
      description: Angir hvordan snoren brukes eller bæres.
    lanyard_type:
      name: Type nøkkelsnor
      description: Angir hvilken type nøkkelsnor som følger med eller passer til fløyten.
    lap_hand_loom_accessories_included:
      name: Inkludert tilbehør til håndvev
      description: Tilbehør som følger med håndvevspakken.
    lapel_style:
      name: Slagtype
      description: Angir utformingen av jakkeslaget (f.eks. hakkeslag, spisst slag
        eller sjalslag).
    laser_safety_class:
      name: Lasersikkerhetsklasse
      description: Angir produktets lasersikkerhetsklasse (f.eks. klasse 2, 3R, 3B
        eller 4) slik den er oppgitt i dokumentasjonen eller merkingen.
    latex_processing_method:
      name: Behandlingsmetode for lateks
      description: Angir hvilken produksjonsmetode som er brukt for lateksskummet
        – vanligvis Dunlop eller Talalay – noe som påvirker komfort, spenst og pris.
    latex_type:
      name: Type lateks
      description: Angir opprinnelse og sammensetning for lateksen i madrassen (naturlig,
        økologisk, syntetisk eller blandet), slik at kundene kan vurdere holdbarhet,
        miljøegenskaper og eventuelle allergener.
    launch_profile:
      name: Utskytningsprofil
      description: Angir hvilken ballbane kølleskaftet er utviklet for å gi (lav,
        middels eller høy).
    launcher_mounting_configuration:
      name: Monteringskonfigurasjon for utskyter
      description: Angir hvordan utskyteren monteres eller brukes, for eksempel som
        frittstående enhet, underløpsmodell eller skinnefestet variant.
    layer_construction:
      name: Lagkonstruksjon
      description: Angir hvordan laminatet er bygget opp (f.eks. 2-lags, 2,5-lags
        eller 3-lags), noe som påvirker vekt, pakkbarhet og slitestyrke.
    layer_design:
      name: Lagdesign
      description: Beskriver hårnettets oppbygning med hensyn til lag eller om det
        kan brukes på begge sider.
    lazy_kate_tension_control_type:
      name: Type spenningsjustering for lazy kate
      description: Angir hvordan lazy katen regulerer motstand og spenning på spolene
        under tvinning eller oppspoling.
    lead_hardware_type:
      name: Type feste på kobbel
      description: Angir hvilken type feste som sitter på enden av kobbelet (f.eks.
        krok, klips, løkke eller kjetting), noe som påvirker brukervennlighet, sikkerhet
        og egnet bruksområde.
    leaf_gelatin_grade:
      name: Gelatinkvalitet
      description: Angir styrkegraden for gelatinplatene etter gjeldende standard.
    leaf_preparation:
      name: Forberedelse for blader
      description: Angir hvordan bladene er bearbeidet før pakking, for eksempel hakket,
        strimlet eller skåret i tynne strimler.
    leaf_spring_material:
      name: Materiale i bladfjær
      description: Angir hovedmaterialet i bladfjærpakken.
    leak_protection_layer:
      name: Lekkasjebeskyttelse
      description: Angir om den integrerte bleieløsningen i badebuksen bruker ett
        eller to lag for å beskytte mot lekkasjer.
    leash_clip_type:
      name: Type kobbelfeste
      description: Angir hvilken type feste som brukes for å koble kobbelet til halsbånd
        eller sele (f.eks. pistolkrok, karabinkrok eller svivelkrok).
    leash_style:
      name: Kobbeltype
      description: Angir utforming av kobbelet, for eksempel lineføring eller spiralutførelse.
    leash_type:
      name: Type bånd
      description: Angir kobbelets overordnede type eller bruksområde, slik at det
        er enklere å finne riktig modell.
    leavening_action_type:
      name: Type hevemiddelvirkning
      description: Angir hvilken type bakepulver det er, for eksempel enkeltvirkende,
        dobbeltvirkende eller aluminiumsfritt. Dette påvirker både bakeegenskapene
        og hvilke oppskrifter produktet egner seg til.
    leavening_agent:
      name: Hevemiddel
      description: Angir hvilken hevemekanisme som hovedsakelig brukes i deigen.
    led_color_options:
      name: Tilgjengelige LED-farger
      description: Angir hvilke LED-farger som kan velges på nappvarsleren for visuell
        indikering av napp.
    led_indicator_color:
      name: Farge på LED-indikator
      description: Angir fargen på produktets LED-indikator, slik at fiskeren kan
        skille mellom flere nappvarslere eller velge ønsket farge.
    led_light_color:
      name: Farge på LED-lys
      description: Angir fargen på integrert LED-belysning.
    leek_variety:
      name: Purrevariant
      description: Angir purresorten, slik at ulike varianter kan skilles fra hverandre
        etter smak, størrelse og vekstsesong.
    leg_coverage:
      name: Bendekning
      description: Angir hvor stor del av benet våtdrakten dekker (f.eks. kort modell
        eller full benlengde).
    leg_cuff_style:
      name: Type benavslutning
      description: Angir hvordan buksebenet er avsluttet ved ankelen.
    leg_cut_height:
      name: Høyde på benutskjæring
      description: Angir hvor høyt benåpningen er skåret på bikinibuksen.
    leg_cut_style:
      name: Snittstil for ben
      description: Beskriver formen på benåpningen, noe som påvirker utseende, komfort
        og solbrune linjer.
    leg_length:
      name: Benlengde
      description: Klassifiserer badeshorts etter benlengde (kort, middels eller lang),
        slik at kundene enklere kan velge ønsket dekning.
    leg_loop_type:
      name: Type bensløyfe
      description: Beskriver utformingen av benløkkene.
    leg_opening_style:
      name: Type benåpning
      description: Angir hvordan benåpningene er utformet på joggebuksen, for eksempel
        med strikk, glidelås eller åpen avslutning.
    leg_style:
      name: Type benkunderstell
      description: Angir utforming eller konstruksjon av benkens ben eller understell.
    legging_foot_design:
      name: Fotutforming på leggings
      description: Angir om leggingsen er fotløs, har fotdel eller kan brukes på begge
        måter.
    leggings_waistband_style:
      name: Type linning på leggings
      description: Angir utformingen av leggingsens linning, noe som påvirker komfort,
        støtte og utseende.
    lei_closure_style:
      name: Type lukking på lei
      description: Beskriver om leien er en kontinuerlig løkke eller har åpne ender
        som knytes eller festes med bånd.
    lemon_variety:
      name: Sitronsort
      description: Angir hvilken sitronsort det er snakk om (f.eks. Eureka, Meyer
        eller Amalfi).
    length_adjustment_method:
      name: Metode for lengdejustering
      description: Angir om og hvordan hoppetauets lengde kan justeres for å tilpasses
        brukeren.
    lens_color_tint:
      name: Linsefarge/-toning
      description: Angir fargen eller toningen på linsene som følger med produktet.
    lens_construction:
      name: Linsekonstruksjon
      description: Angir hvordan linsen er bygget opp (f.eks. enkeltlinse, dobbeltlinse
        eller termisk linse), noe som påvirker duggmotstand og optiske egenskaper.
    lens_tint_category:
      name: Lysdempingskategori for linse
      description: Angir linsens mørkhetsgrad basert på internasjonale kategorier
        for toning, slik at kundene kan velge riktig linse til ulike lysforhold.
    lettuce_variety:
      name: Salatsort
      description: Angir hvilken salatsort det er snakk om (f.eks. isbergsalat, romanosalat
        eller hodesalat), slik at produktene kan filtreres og sammenlignes mer presist.
    level_of_play:
      name: Spillenivå
      description: Angir hvilket ferdighetsnivå produktet er beregnet for, basert
        på produsentens klassifisering.
    lever_configuration:
      name: Spakkonfigurasjon
      description: Angir utformingen av motorstyringen, for eksempel om den har én
        eller to kontrollspaker.
    lever_type:
      name: Type spak
      description: Angir type eller mekanisme for stemmespakene som er montert på
        harpestrengene.
    license_plate_cover_style:
      name: Type nummerskiltdeksel
      description: Angir utforming av skiltdekselet (f.eks. heldekkende deksel eller
        deksel for skruefester).
    license_plate_personalization_type:
      name: Type personalisering av nummerskilt
      description: Angir om nummerskiltet er tomt, forhåndstrykt eller kan tilpasses
        med kundens egen tekst og/eller grafikk.
    license_usage_terms:
      name: Lisens- og bruksvilkår
      description: Angir hvilke bruksrettigheter som gjelder for mønsteret (f.eks.
        kun privat bruk eller begrenset kommersiell bruk).
    licensed_sports_property:
      name: Lisensiert sportseiendom
      description: Angir om produktet er offisielt lisensiert av en liga, et lag eller
        en organisasjon.
    lid_hinge_mechanism:
      name: Type hengselmekanisme for lokk
      description: Angir hvilken hengselmekanisme lokket bruker, noe som påvirker
        sikkerhet og brukervennlighet.
    lid_support_positions:
      name: Posisjoner for lokkstøtte
      description: Angir hvilke åpneposisjoner lokkstøtten har på flygelet, altså
        hvor langt lokket kan åpnes.
    lie_angle_color_code:
      name: Fargekode for lie-vinkel
      description: Angir produsentens fargekodede system for lie-vinkler på enkelte
        golfkøller (f.eks. svart prikk eller grønn prikk).
    life_jacket_certification_standard:
      name: Sertifiseringsstandard for livvest
      description: Angir hvilken offisiell sikkerhetsklassifisering eller standard
        produktet oppfyller, for eksempel USCG-type eller ISO-/AS-nivå.
    life_raft_certification_standard:
      name: Sertifiseringsstandard for redningsflåte
      description: Angir hvilken sikkerhetsstandard eller sertifisering flåten er
        konstruert og vedlikeholdt i samsvar med.
    life_raft_container_type:
      name: Type redningsflåtebeholder
      description: Angir hvordan redningsflåten er pakket for oppbevaring og utsetting.
    life_vest_approval_standard:
      name: Godkjenningsstandard for livvest
      description: Angir hvilken sertifisering eller godkjenningsstandard redningsvesten
        oppfyller.
    life_vest_intended_user:
      name: Tiltenkt bruker av redningsvest
      description: Angir hvilken brukergruppe redningsvesten er beregnet for.
    lifebuoy_approval_standard:
      name: Standard for godkjenning av livbøye
      description: Angir hvilken sikkerhetsstandard eller godkjenning livbøyen oppfyller
        (f.eks. USCG eller SOLAS).
    lifebuoy_features:
      name: Egenskaper for livbøye
      description: Angir sikkerhetsfunksjoner, monterings- og håndteringsegenskaper
        samt medfølgende tilbehør for livbøyer.
    lift_mechanism_type:
      name: Type heismekanisme
      description: Angir mekanismen som hjelper til med å heve, senke, åpne eller
        lukke veggsengen.
    lift_stand_support_point:
      name: Støttepunkt for løftestativ
      description: Angir hvor løftestativet kommer i kontakt med eller støtter kjøretøyet.
    lifting_gas_type:
      name: Type løftegass
      description: Angir hvilken gass eller hvilket oppdriftsmedium luftskipet hovedsakelig
        bruker.
    lifting_support_type:
      name: Type løftesystem
      description: Angir om kjøretøyet kjøres opp på løfteplattformen, eller løftes
        ved hjelp av armer eller puter som griper i løftepunktene.
    ligature_and_cap_component_type:
      name: Type ligatur- og hettekomponent
      description: Angir om produktet er en ligatur, en hette eller et sett som inneholder
        begge deler.
    ligature_material:
      name: Materiale i ligatur
      description: Angir hovedmaterialet i ligaturen som holder røret på plass (f.eks.
        metall, lær eller tekstil).
    ligature_plating_or_finish:
      name: Overflatebehandling på ligatur
      description: Angir plating og/eller overflatebehandling på ligatur og/eller
        hette til klarinett.
    ligature_reed_contact_style:
      name: Kontakttype mellom ligatur og rør
      description: Angir hvordan ligaturen kommer i kontakt med røret (f.eks. minimal
        kontakt, flerpunktskontakt eller omsluttende kontakt).
    ligature_screw_position_relative_to_reed:
      name: Plassering av ligaturskrue (i forhold til røret)
      description: Angir hvor ligaturens strammeskrue(r) er plassert i forhold til
        røret eller spillerens side når ligaturen er montert på munnstykket.
    ligature_tension_adjustment_mechanism:
      name: Mekanisme for justering av ligaturspenning
      description: Beskriver hvordan ligaturen er utformet for å påføre og justere
        trykket mot røret.
    ligature_tightening_mechanism_type:
      name: Type strammemekanisme for ligatur
      description: Angir hvilken mekanisme som brukes for å stramme ligaturen rundt
        munnstykket og røret (f.eks. enkel skrue, dobbel skrue eller spak-/hurtigutløsermekanisme).
    light_bar_housing_material:
      name: Lysstanghusets materiale
      description: Hovedmaterialet i lysstangens hus/kropp, som påvirker holdbarhet
        og varmespredning.
    light_bar_lens_material:
      name: Linsemateriale i lysplanke
      description: Hovedmaterialet i lysstanglinsen/-dekselet, som kan påvirke slagmotstanden
        og den optiske klarheten.
    light_bar_mounting_location:
      name: Monteringssted for lysplanke
      description: Tiltenkt monteringsposisjon på kjøretøyet.
    light_stand_style:
      name: Lysstativets stil
      description: Angir stativets strukturelle stil eller formfaktor som brukes til
        å støtte spesialeffektlys (f.eks. stativ, T-stang, sveiv), ikke monteringsoverflaten
        (vegg/tak), som fanges opp av festetypen.
    light_switch_function:
      name: Lysbryterfunksjon
      description: Identifiserer hvilke lyskrets(er) eller -funksjon(er) bryteren
        styrer.
    lighting_control_protocols_supported:
      name: Støttede lyskontrollprotokoller
      description: Kontroll-/nettverksprotokoller som kontrolleren støtter i tillegg
        til eller i stedet for DMX512.
    lighting_effects:
      name: Lyseffekter
      description: Spesifiserer integrerte belysningsfunksjoner som forbedrer spillingen
        eller estetikken.
    lighting_mode:
      name: Lysmodus
      description: Lister opp tilgjengelige driftslysmønstre, for eksempel fast lys,
        blinkende lys, strobelys eller SOS.
    lily_variety:
      name: Liljesort
      description: Spesifiserer den kommersielle/botaniske varianten av lilje som
        selges som friske snittblomster (f.eks. asiatisk, orientalsk).
    limb_articulation:
      name: Lemmets artikulasjon
      description: Angir graden av fleksibilitet eller artikulasjon i lemmet i dukken
        (ingen, fast, semi-fleksibel, fullt artikulert).
    limb_material:
      name: Lemmets materiale
      description: Hovedmaterialet som brukes i lemmene til en bue eller armbrøst,
        og som påvirker vekt, holdbarhet, vibrasjon og generell ytelse.
    lime_variety:
      name: Limevariant
      description: Identifiserer den spesifikke botaniske eller kommersielle sorten
        av lime som selges.
    line_buoyancy:
      name: Oppdrift for snor
      description: Beskriver hvorvidt fletten naturlig flyter eller synker, og med
        hvilken hastighet, noe som påvirker presentasjonen av agn og snørestyring.
    line_purpose:
      name: Formål for snor
      description: Definerer den tiltenkte funksjonen til linen i dragesystemet (f.eks.
        forline, depower-line, brideline).
    linen_finish_treatment:
      name: Linets overflate/behandling
      description: Enhver etterbehandlingsprosess som anvendes på linstoffet som endrer
        følelse, utseende eller ytelse.
    linen_weave_type:
      name: Linets vevtype
      description: Spesifiserer vevekonstruksjonen til linstoffet, som påvirker tekstur,
        pusteevne og fall.
    liner_padding_type:
      name: Fôrets polstringstype
      description: Angir fôrets konstruksjon eller dempingsstil (f.eks. netting, lett
        polstret, quilt).
    liner_shape:
      name: Fôrets form
      description: Beskriver den generelle formen på soveposens fôr slik at kundene
        kan tilpasse det til sine sovepose- og komfortpreferanser.
    liner_type:
      name: Fôrets type
      description: Angir om shortsen har innvendig fôr, og i så fall hvilken modell
        den har.
    lining:
      name: Fôr
      description: Angir hvorvidt og hvordan badetrusen er fôret, inkludert omfanget
        av fôrdekning inne i plagget.
    lining_material:
      name: Foringsmateriale
      description: Spesifiserer materialet som brukes til innerfôret i skoen, noe
        som påvirker komfort, pusteevne og varme.
    lining_type:
      name: Fôrets type
      description: Spesifiserer hvorvidt badeplagget er fôret og i hvilken grad.
    link_connection_style:
      name: Lenkens forbindelsesstil
      description: Klassifiserer hvordan lenken kobles sammen med kjettingen (f.eks.
        hurtiglenke, koblingsbolt), slik at brukere kan velge riktig monteringsmetode
        eller reservedel.
    live_bait_form:
      name: Form til levende agn
      description: Spesifiserer den fysiske formen eller konserveringstilstanden til
        agnet, for eksempel levende, frossent eller tørket.
    living_room_furniture_items_included:
      name: Inkluderte stuemøbler
      description: Spesifiserer de individuelle møblene som er en del av stuemøblene,
        slik at kundene raskt kan forstå nøyaktig hvilke komponenter (f.eks. sofa,
        toseters sofa, salongbord) som inngår.
    load_mechanism:
      name: Lastemekanisme
      description: Spesifiserer hvordan motstand genereres eller legges til maskinen
        (f.eks. selekterisert vektstabel, platebelastet, båndbelastet).
    lock_cylinder_type:
      name: Låsesylinderens type
      description: Spesifiserer typen nøkkelsylinder/kjerne som brukes (relevant for
        åpningsmotstand og erstatningsnøkler).
    lock_security_level:
      name: Låsens sikkerhetsnivå
      description: Beskriver sikkerhetsegenskapene til låsen/sylinderen mot dirking
        og boring.
    lock_system:
      name: Låsesystem
      description: Typen sikkerhetslåsesystem som brukes til å holde heisen oppe.
    locker_bench_configuration:
      name: Konfigurasjon av garderobebenk
      description: Beskriver orienteringen eller den strukturelle konfigurasjonen
        til garderobebenken (f.eks. ensidig, tosidig kjøkkenøy, veggmontert).
    locomotive_prototype_power_type:
      name: Krafttype for lLokomotivprototype
      description: Angir den virkelige lokomotivfremdriftstypen som representeres
        av modellen.
    locomotive_wheel_arrangement_whyte_notation:
      name: Oppsett av lokomotivhjul (Whyte-notasjon)
      description: Hjuloppsett for lokomotivprototypen (f.eks. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Høydeklassifisering av loftseng
      description: Indikerer den totale høyden på loftsengen (lav, middels, høy, ekstra
        høy), slik at kundene kan matche takhøyden og plassbehovet under sengen.
    logo_application_method:
      name: Applikasjonsmetode for logo
      description: Beskriver hvordan skolevåpenskjoldet eller logoen er påført plagget
        (f.eks. brodert eller trykt).
    logo_label_compatible_fabric_weight:
      name: Stoffvekt kompatibel med logoetikett
      description: Anbefalt stoffvektkategori for å feste etiketten uten vridning
        eller volum.
    logo_label_edge_finish:
      name: Logoetikett
      description: Angir etikettens kantkonstruksjon/finish, som påvirker motstanden
        mot rakning og komfort mot huden.
    logo_label_print_production_method:
      name: Trykk-/produksjonsmetode for logoetikett
      description: Hvordan logoen påføres/formes på etikettoverflaten.
    long_block_completeness:
      name: Fullstendighet av lang blokk
      description: Spesifiserer hvilke hovedkomponenter som inngår i den lange blokkenheten.
    long_john_pieces_included:
      name: Long John-deler inkludert
      description: Avklarer hvorvidt produktet kun inkluderer bunnen, kun toppen eller
        begge delene av Long John-settet.
    longan_variety:
      name: Longan-variant
      description: Spesifiserer kultivaren eller den kommersielle varianten av longan-frukten
        (f.eks. Kohala, Biew Kiew), noe som hjelper kunden med å identifisere ønskede
        smaks-, størrelses- og sødmeegenskaper.
    loom_accessories_included:
      name: Inkludert vevtilbehør
      description: Viktig tilbehør som inngår i vevstolen i esken/pakken.
    loom_finish:
      name: Overflatebehandling på vev
      description: Vevstolens overflatebehandling (hovedsakelig for vevstoler av tre).
    loom_folding_portability_design_type:
      name: Designtype for sammenleggbar/bærbar vevstol
      description: Hvorvidt og hvordan vevstolen kan brettes/slås sammen for transport
        eller kompakt oppbevaring.
    loom_frame_folding_design:
      name: Vevstolrammens sammenleggbare utforming
      description: Spesifiserer hvorvidt og hvordan bordvevstolen kan slås sammen,
        kollapses eller demonteres for lagring eller transport.
    loom_tension_adjustment_method:
      name: Justeringsmetode for vevstolspenning
      description: Primærmetode som brukes for å justere renningsspenningen på vevstolen.
    loom_tie_up_system:
      name: System for vevstolbinding
      description: Type bindingssystem/forbindelsessystem som brukes mellom pedaler/lameller/aksler
        (f.eks. Texsolv eller metallkjede).
    loquat_variety:
      name: Loquat-variant
      description: Spesifiserer kultivaren eller varianten av loquat, som gjenspeiler
        forskjeller i størrelse, smak, modningssesong og utseende.
    lubricant_features:
      name: Smøremiddelets egenskaper
      description: Fremhever smøremiddelets spesielle ytelsesegenskaper, tilsetningsstoffer
        eller fordeler.
    lubrication_requirement:
      name: Smørekrav
      description: Angir om tredemøllebeltet er forbehandlet/vedlikeholdsfritt eller
        krever kontinuerlig smøring eller voksing.
    lubrication_type:
      name: Smøremiddeltype
      description: Spesifiserer fôringens smøreevne og om den er konstruert for å
        betjenes med fett (f.eks. riller eller en zerkpluggnippel).
    lug_nut_seat_profile:
      name: Hjulmutter-seteprofil
      description: Spesifiserer hjulmutterseteprofilen som kreves av hjulet for å
        sikre korrekt hjulmutterkompatibilitet og trygg montering.
    lumbar_support_type:
      name: Ryggstøttetype
      description: Beskriver typen korsryggstøtte som følger med stolen (f.eks. avtakbar
        pute, justerbar mekanisme, massasje).
    lunge_trainer_style:
      name: Utfallstrenerens stil
      description: Definerer den konstruksjonsmessige utformingen av en longeringstrener.
    lure_buoyancy:
      name: Oppdrift for sluk
      description: Angir hvordan agnet oppfører seg i vannkolonnen under hvile eller
        henting (f.eks. flyter på overflaten, suspenderer vannet eller synker).
    luster:
      name: Glans
      description: Beskriver måten lys samhandler med prøveoverflaten (f.eks. glasslegem,
        metallisk).
    lychee_cultivar:
      name: Litchi-kultivar
      description: Identifiserer den spesifikke litchi-sorten eller kultivaren (f.eks.
        Brewster, Hak Ip eller Mauritius), som varierer i smak, frøstørrelse, sesong
        og pris.
    lyre_flip_folder_mounting_location:
      name: Lyre-/flipmappens monteringsposisjon
      description: Hvor lyren eller flipmappen er ment å monteres på instrumentet
        eller tilbehøret (f.eks. klokkestykke, munnrør eller stativ).
    lyrics_display_type:
      name: Visningstype for sangtekster
      description: Hvordan sangtekster vises (hvis tilgjengelig) under karaoke.
    magazine_compatibility:
      name: Magasinkompatibilitet
      description: Identifiserer de primære magasinkalibrene eller magasintypene som
        vestens innebygde lommer er designet for å holde.
    magnet_requirement:
      name: Krav til magneter
      description: Angir om sensoren krever en ekstern magnet for å fungere.
    magnet_toy_storage_included:
      name: Oppbevaring for magnetleker inkludert
      description: Typen oppbevaring/etui som følger med magnetleken for organisering
        på skrivebord og reise.
    malanga_variety:
      name: Malanga-sort
      description: Identifiserer den spesifikke sorten av malanga/taro som selges,
        for å hjelpe kunder med å velge ønsket smak, farge eller kulinarisk bruk.
    malt_color_rating_system:
      name: Fargegraderingssystem for malt
      description: Angir hvilken fargeskala den oppgitte fargen refererer til (Lovibond,
        SRM eller EBC).
    malt_crush:
      name: Maltknusing
      description: Angir om basismaltet selges helt/umalt eller forhåndsknust, og
        i så fall hvilken knusegrad.
    malt_form:
      name: Maltform
      description: Angir om produktet selges som hele kjerner eller bearbeides for
        mosing (f.eks. knust).
    malt_intended_use:
      name: Tiltenkt bruk for malt
      description: Beregnet primærbruk for malten (brygging, destillering eller dobbelt
        formål).
    malt_treatment:
      name: Maltprosessering
      description: Beskriver hvordan kornet/maltet er prosessert utover standard kilning
        (vanlige spesialprosesser).
    malt_usage_purpose:
      name: Formål med maltbruk
      description: Beskriver hovedfunksjonen til spesialmalt i en øloppskrift.
    man_overboard_system_type:
      name: Mann-over-bord-systemtype
      description: Spesifiserer hovedkategorien for mann-over-bord-løsningen (MOB)
        som produktet tilbyr.
    mandolin_back_sides_wood:
      name: Mandolin bunn- og sidetreverk
      description: Angir treslagene som brukes til mandolinens bakdel og sider.
    mandolin_body_top_wood:
      name: Toppmateriale i mandolinens kropp
      description: Hovedtreverk/-materiale brukt i mandolinens lokk (soundboard).
    mandolin_bridge_type:
      name: Mandolinens brotype
      description: Angir typen bro som er brukt på mandolinen.
    mandolin_pickup_configuration:
      name: Pickup-konfigurasjon for mandolin
      description: Angir hvorvidt mandolinen har elektronikk, og hvilken type pickup-system
        som er installert.
    mandolin_string_configuration:
      name: Strengekonfigurasjon for mandolin
      description: Angir mandolinens strengoppsett etter totalt antall strenger og
        antall kor (f.eks. 8 strenger / 4 kor).
    mangosteen_variety:
      name: Mangostan-sort
      description: Identifiserer den spesifikke arten eller kultivaren av mangostan
        eller nært beslektet garcinia-frukt som selges.
    mannequin_style:
      name: Mannekengens stil
      description: Beskriver den strukturelle utformingen eller konstruksjonsstilen
        til treningsmannekengen.
    manufacturing_process:
      name: Produksjonsprosess
      description: Produksjonsmetode for snellekroppen eller spolen (f.eks. CNC-maskinert,
        trykkstøpt).
    map_coverage_sky_planet_body:
      name: Kartdekning (himmel-/planetlegeme)
      description: 'Angir hva kartet viser: nattehimmelen (stjernebilder) eller et
        spesifikt planetlegeme.'
    map_format:
      name: Kartformat
      description: Definerer den fysiske eller digitale presentasjonsformen for jaktkart
        og -guider.
    map_sensor_output_signal_type:
      name: Type utgangssignal fra MAP-sensor
      description: Angir typen utgangssignal som MAP-sensoren gir til motorstyringsenheten
        (ECU).
    map_size_sheet:
      name: Kartstørrelse (ark)
      description: Angir den ferdige størrelsen på kartarket/plakaten/planisfæren
        for å hjelpe med visning og kompatibilitet (rammestørrelse, veggplass).
    marabou_feather_form:
      name: Maraboufjærens form
      description: Formfaktoren til maraboufjærproduktet slik det selges.
    marabou_feather_treatment:
      name: Behandling av maraboufjær
      description: Hvordan maraboufjæren er behandlet eller ferdigbehandlet for håndverksbruk.
    marble_track_set_feature_modules:
      name: Kulebanesettets funksjons-/modulkomponenter
      description: Fremhever spesialfunksjoner som følger med settet (f.eks. heis,
        utskyter, brytere).
    marine_flare_certification_standard:
      name: Sertifisering/standard for marinbluss
      description: Angir hvilke maritime sikkerhetssertifiseringer eller standarder
        nødblusset oppgis å oppfylle.
    marine_safety_standard_compliance:
      name: Samsvar med maritime sikkerhetsstandarer
      description: Angir hvilke formelle vannsikkerhetsstandarder eller godkjenninger
        tilbehøret oppfyller.
    marine_transmission_type:
      name: Type marint gir
      description: Angir typen marin girkasse som er paret med innenbordsmotoren (f.eks.
        direktedrift vs. V-drift).
    marker_action_type:
      name: Handlingstype for markør
      description: Beskriver markørens grunnleggende avfyrings-/virkemåte.
    marker_caliber:
      name: Markørkaliber
      description: Angir diameteren på paintballkuler som markøren er designet for
        å avfyre.
    marking_durability:
      name: Markeringens holdbarhet
      description: Angir hvor lenge den malte linjen forventes å forbli synlig under
        normale forhold, som midlertidig (opptil tre uker), semi-permanent (opptil
        seks måneder) eller permanent (mer enn seks måneder).
    marking_tip_type:
      name: Merkespiss-type
      description: Type markeringsinnsats kompasset bruker til tegning (f.eks. blyholder
        kontra blekk kontra rissespiss).
    marshmallow_processing_method:
      name: Marshmallow-behandlingsmetode
      description: Beskriver eventuell spesiell bearbeiding som brukes på marshmallowsene
        som påvirker tekstur, holdbarhet eller smak.
    marshmallow_size:
      name: Marshmallow-størrelse
      description: Klassifiserer den relative størrelsen til enkeltvise marshmallowstykker.
    martial_arts_belt_rank:
      name: Rangering av kampsportbeltet
      description: Angir ferdighets-/gradsnivået representert av beltets farge eller
        spesielle fargekombinasjon.
    mask_bib_type:
      name: Masketype
      description: Angir typen fektemaske, for eksempel standard stoff, ledende, avtakbar
        eller ingen.
    mask_cage_material:
      name: Materiale for maskebur
      description: Materiale som brukes spesielt til ansiktsburet eller maskerammen.
    mask_goggle_design:
      name: Maske-/brilledesign
      description: Definerer beskyttelsesutstyrets strukturelle utforming eller dekningsstil.
    mask_skirt_material:
      name: Materiale i maskeskjørt
      description: Identifiserer materialet i det myke skjørtet som gir den vanntette
        forseglingen mellom maske og ansikt.
    mask_strap_material:
      name: Materiale i maskestropp
      description: Angir materialet til stroppen som fester masken til hodet.
    mass_air_flow_sensor_measurement_type:
      name: Målingstype for massemålingssensor for luftstrøm
      description: Angir sensorteknologien/utgangsstilen som brukes av MAF-sensoren.
    mass_air_flow_sensor_mounting_type:
      name: Monteringstype for luftmassemåler
      description: Hvordan MAF-sensoren eller sensorenheten er montert/installert
        i innsugningssystemet.
    massage_feature:
      name: Massasjefunksjon
      description: Angir om den justerbare basen har integrerte funksjoner, og i så
        fall hvor mange massasjesoner den tilbyr.
    mast_attachment_interface:
      name: Grensesnitt for mastfeste
      description: Spesifiserer tilkoblingsstandarden mellom flykroppen og masten,
        noe som hjelper kundene med å sikre at komponentene passer.
    mast_base_type:
      name: Mastbasetype
      description: Identifiserer monteringsgrensesnittet som kobler masten til kortet
        eller adapteren.
    mast_bend_curve:
      name: Mastbøyningskurve
      description: Mastens fleksmønster, som bestemmer seilets kompatibilitet og styring.
    mast_diameter_type:
      name: Mastens diametertype
      description: Standardisert diameterklassifisering av windsurfingmasten (f.eks.
        RDM, SDM, MDM) til bruk ved kompatibilitetskontroller.
    mat_backing_type:
      name: Type mattebakside
      description: Angir bakdeltype på undersiden av matten som bidrar til å holde
        den på plass på ulike overflater.
    mat_installation_method:
      name: Installasjonsmetode for matte
      description: Angir hvordan matten er montert eller festet på plass.
    mat_style:
      name: Mattestil
      description: Angir mattekonstruksjon eller utforming (f.eks. sammenleggbar matte,
        puslespillmatte eller fallmatte).
    maternity_panel_type:
      name: Type gravidpanel
      description: Angir hvilken type elastisk panel eller linning som er utformet
        for å tilpasses en voksende mage under graviditet.
    maternity_waistband_style:
      name: Mammabåndstil
      description: Angir utforming og plassering av linning eller magepanel på gravidbukser,
        og hvordan plagget støtter magen gjennom svangerskapet.
    mattress_top_type:
      name: Madrassoverdel-type
      description: Angir type topplag eller overflatekonstruksjon på madrassen, for
        eksempel pillow top eller tight top.
    maturation_vessel_material:
      name: Materiale i modningskar
      description: Angir hovedmaterialet til beholderen eller fatet som brukes til
        å modne shochuen.
    maximum_quilt_size_supported:
      name: Maksimal teppestørrelse som støttes
      description: Den maksimale teppe-/prosjektstørrelsen som rammen har plass til
        (vanligvis beskrevet som sengestørrelse eller maksimal bredde).
    meal_course:
      name: Serveringstype
      description: Identifiserer den typiske måltidsanledningen for produktet.
    meal_preparation_state:
      name: Tilberedningstilstand for måltid
      description: Angir hvor mye forberedelse som kreves før det spises (f.eks. klar
        til å spises, måltidssett).
    meat_processing_state:
      name: Behandlingstilstand for kjøtt
      description: Angir graden av koking eller salting kjøttproduktet har gjennomgått
        før salg.
    meat_quality_grade:
      name: Kvalitetsgrad for kjøtt
      description: Angir hvilken kvalitetsgrad eller klassifisering kjøttet har fått
        av en anerkjent klassifiseringsordning (f.eks. USDA, MSA eller Wagyu).
    meat_raising_claim:
      name: Påstand om kjøttoppdrett
      description: Angir dyrevelferds- eller driftsformer knyttet til kjøttet, for
        eksempel gressfôret eller frittgående.
    mechanical_loom_assembly_status:
      name: Monteringsstatus for mekanisk vev
      description: Hvordan vevstolen sendes eller leveres med tanke på nødvendig montering.
    mechanical_loom_weaving_type:
      name: Vevingstype for mekanisk vev
      description: Primær vevemekanisme/-type støttet av vevstolen.
    mechanical_puzzle_primary_mechanism:
      name: Primærmekanisme for mekanisk puslespill
      description: Angir hvilken hovedmekanisme eller interaksjon som brukes for å
        løse det mekaniske puslespillet.
    mechanical_puzzle_solution_format:
      name: Format for løsning av mekanisk puslespill
      description: Angir hvilket format eventuelle hint eller løsninger leveres i.
    medal_attachment_style:
      name: Festestil for medalje
      description: Angir hvordan medaljen er ment å brukes eller vises (f.eks. halsbånd,
        bakside av nål).
    medal_award_level:
      name: Medaljenivå
      description: Angir hvilket nivå eller hvilken plassering medaljen representerer
        (f.eks. 1. plass eller deltaker).
    medal_finish:
      name: Medaljefinish
      description: Angir medaljens overflatefinish (glans eller tekstur), uavhengig
        av materiale.
    medal_packaging:
      name: Medaljeemballasje
      description: Angir hvilken type presentasjonsemballasje som følger med medaljen.
    melodica_accessory_set_included:
      name: Melodika-tilbehørsett inkludert
      description: Hvilket vanlig tilbehør er inkludert i melodikapakken?
    melodica_air_chamber_material:
      name: Melodika-luftkammermateriale
      description: Angir materialet i melodicaens luftkammer eller kropp (f.eks. ABS-plast
        eller tre) når dette oppgis separat fra andre komponenter.
    melodica_included_accessories:
      name: Inkludet melodika-tilbehør
      description: Tilbehøret som følger med melodikaen i esken.
    melodica_key_color_scheme:
      name: Melodika-tonefargeskjema
      description: Angir fargeskjemaet på tangentene (ikke selve instrumentet), noe
        som kan gjøre instrumentet lettere å bruke, særlig for barn og nybegynnere.
    melodica_mouthpiece_configuration:
      name: Melodika-munnstykkekonfigurasjon
      description: Angir hvilke blåseenheter som følger med eller brukes for å spille
        på melodicaen.
    melodica_mouthpiece_type:
      name: Type munnstykke til melodica
      description: Angir hvilken blåseenhet som følger med melodicaen (munnstykke
        og/eller fleksibel slange).
    melodica_reed_plate_material:
      name: Materiale i lydplate til melodika
      description: Angir materialet i stemmeplaten (ikke instrumentkroppen), noe som
        kan påvirke klang og holdbarhet.
    melodica_size_class:
      name: Størrelsesklasse for melodica
      description: Angir melodicaens størrelse- eller portabilitetsklasse, vanligvis
        basert på antall tangenter og modelltype (f.eks. mini-/elevmodell, standardmodell
        eller modell med utvidet register).
    melon_variety:
      name: Melonvariant
      description: Angir hvilken melonsort produktet inneholder, slik at kundene enkelt
        kan finne ønsket variant.
    memory_foam_infusion_material:
      name: Infusjonsmateriale med minneskum
      description: Identifiserer spesielle stoffer som er tilsatt minneskummet for
        kjøling, luktkontroll eller antimikrobielle formål.
    memory_wire_gauge:
      name: Tykkelse på memory wire
      description: Angir tykkelsen på memory wire målt etter AWG-standarden.
    memory_wire_project_size:
      name: Størrelse på memory wire-prosjekt
      description: Angir hvilken smykketype eller spiralstørrelse memory wire er utformet
        for (f.eks. armbånd, halskjede eller ring).
    metal_purity:
      name: Metallrenhet
      description: Angir metallets finhets- eller renhetsgrad, vanligvis uttrykt i
        karat (K) eller tusendeler.
    metrics_counted:
      name: Visning av takt/metrum
      description: Viser individuell statistikk eller hendelser som telleren er designet
        for å spore.
    metronome_display_style:
      name: Metronomvisningsstil
      description: Angir hvordan tempoet vises eller indikeres (f.eks. viser/pendel,
        numerisk LED-/LCD-display eller blinkende lys).
    metronome_output_method:
      name: Metronomutgangsmetode
      description: Angir hvilke utganger som er tilgjengelige for metronomens lyd-
        eller taktsignal.
    microphone_toy_feature_set:
      name: Mikrofonleketøys-funksjonssett
      description: Viktige lekeorienterte mikrofonfunksjoner for lekemikrofoner (stemmeeffekter,
        forsterkning, opptak osv.).
    midi_output_type:
      name: Type MIDI-utgang
      description: Angir hvilke typer MIDI-utganger utløsermodulen har.
    military_branch:
      name: Militæravdeling
      description: Angir hvilken forsvarsgren uniformen er utstedt for eller inspirert
        av.
    milk_base_type:
      name: Type melkebase
      description: Angir hvilken primærmelk eller melkealternativ som brukes i drikken,
        hvis noen.
    milk_feeding_method:
      name: Melkefôringsmetode
      description: Angir hvordan kildedyrene ble fôret (f.eks. gressfôret eller kornfôret),
        noe som kan påvirke smak og næringsprofil.
    milk_processing_method:
      name: Behandlingsmetode for melk
      description: Angir hvilken behandling eller prosessering melken har gjennomgått,
        noe som påvirker matsikkerhet, holdbarhet og næringsinnhold.
    milk_source_animal:
      name: Kildedyr for melk
      description: Identifiserer dyret melken ble hentet fra, og hjelper forbrukerne
        med å velge ku, geit, bøffel eller andre animalske meieriprodukter.
    millet_processing_method:
      name: Behandlingsmetode for hirse
      description: Angir den primære bearbeidingsmetoden eller tilstanden til hirsekornet
        (f.eks. upolert, avskallet, spiret).
    millet_variety:
      name: Hirsevariant
      description: Angir hvilken type hirse produktet inneholder (f.eks. perlehirse,
        revehirse eller fingerhirse).
    milling_process:
      name: Maleprosess
      description: Angir hvilken maleprosess som er brukt, noe som kan påvirke smak,
        varmebelastning og næringsinnhold.
    mint_mark:
      name: Myntmerke
      description: Myntmerke som vist på mynten (hvis aktuelt).
    mirror_configuration:
      name: Speilkonfigurasjon
      description: Angir utforming eller konstruksjon av speilet som følger med sminkebordet.
    mirror_coverage:
      name: Speildekning
      description: Beskriver omfanget av speilpaneler på skyvedørene.
    mirror_curvature_type:
      name: Type speilkrumming
      description: Angir om speiloverflaten er konveks, flat eller konkav, som påvirker
        synsfeltet.
    mirror_mounting_location:
      name: Speilmonteringsplassering
      description: Angir hvor på sykkelen eller syklisten speilet er beregnet montert.
    mirror_shape:
      name: Speilform
      description: Indikerer de geometriske formene eller stilen til hovedspeilet
        som følger med sminkesettet.
    mix_ratio:
      name: Blandingsforhold
      description: Angir anbefalt fortynningsforhold mellom kjølevæske og vann (for
        konsentrater), eller bekrefter et fast forblandingsforhold for forfortynnede
        produkter.
    mma_glove_type:
      name: Type MMA-hanske
      description: Angir hanskens primære bruksområde eller type innen MMA-trening
        eller konkurranse.
    mobility_features:
      name: Mobilitetsfunksjoner
      description: Indikerer innebygde bevegelses- eller bærbarhetselementer som hjul
        eller sammenleggbare ben.
    model_aircraft_assembly_level:
      name: Monteringsgrad for modellfly
      description: Angir hvor mye montering som kreves før modellflyet kan tas i bruk.
    model_making_kit_items_included:
      name: Innhold i modellbyggesett
      description: Angir hva som følger med i modellbyggesettet eller pakken (f.eks.
        maling, lim og pensel).
    model_making_product_type:
      name: Produkttype for modellbygging
      description: Angir hvilken type produkt det er innen modellbygging (sett, tilbehør,
        verktøy eller forbruksmateriell), slik at produktene kan filtreres og kategoriseres
        riktig.
    model_rocket_kit_contents:
      name: Innhold i modellrakettsett
      description: Angir om produktet er et komplett flertrinns modellrakettsett eller
        et sett med tillegg/modul/deler (f.eks. komponenter til booster- eller opprettholdelseskomponenter).
    model_rocket_kit_format:
      name: Format for modellrakettsett
      description: Angir om modellraketten selges som byggesett, og hvor ferdig montert
        den er ved levering.
    model_rocket_motor_impulse_class:
      name: Impulsklasse for modellrakettmotor
      description: Indikerer den standardiserte totale impulsklassen for rakettmotormodellen
        (f.eks. A, B, C …).
    model_rocket_motor_mount_size:
      name: Størrelse på motorfeste for modellrakett
      description: Angir diameteren på motorhuset som rakettens motorfeste er konstruert
        for å akseptere.
    model_rocket_power_source_required:
      name: Nødvendig strømkilde for modellrakett
      description: Angir om produktet krever batterier / ekstern strøm, og hvilken
        type.
    model_rocket_propellant_type:
      name: Type drivstoff for modellrakett
      description: Identifiserer drivmiddel-/motorsystemet som brukes til framdrift
        i modellrakettprodukter.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Anbefalt oppskytingsstang- eller skinnestørrelse for modellrakett
      description: Angir hvilken diameter på utskytningsstang eller størrelse på utskytningsskinne
        raketten er beregnet for (f.eks. 1/8-tommers stang eller utskytningsskinne
        1010).
    model_rocket_recovery_method:
      name: Gjenfinningsmetode for modellrakett
      description: Det primære innhentingssystemet som brukes til å returnere raketten
        trygt etter flyvning.
    model_rocket_recovery_system_type:
      name: Type gjenfinningssystem for modellrakett
      description: Angir den primære gjenipprettingsmetoden som brukes for å returnere
        raketten trygt etter flytur.
    model_rocket_staging:
      name: Modellrakett-trinn
      description: Angir hvor mange motoriserte trinn modellraketten er konstruert
        for å fly med.
    model_train_accessory_electrical_connection_type:
      name: Type elektrisk tilkobling for modelltogtilbehør
      description: Angir koblings- eller terminalstilen som brukes til å koble tilbehør
        til motoriserte modelltog til et oppsett (når aktuelt).
    model_train_coupler_type:
      name: Type kobling for modelltog
      description: Angir koblingsstandarden som er montert på modelljernbanens vogner
        eller lokomotiv.
    model_train_gauge:
      name: Sporbredde for modelltog
      description: Angir hvilket sporviddesystem tilbehøret (når gjeldende) er beregnet
        for, slik at det er fysisk kompatibelt med brukerens skinner og anlegg.
    model_train_lighting_features:
      name: Lysfunksjoner for modelltog
      description: Angir belysningsfunksjonaliteten som er inkludert på modelltoget/-lokomotivet.
    model_train_power_pickup_method:
      name: Metode for strømopptak i modelltog
      description: Angir hvordan modellen mottar strøm for drift (sporstrøm, batteri
        osv.).
    model_train_scale:
      name: Skala for modelltog
      description: Angir modelltogets skala eller størrelsesforhold i forhold til
        det virkelige toget.
    model_train_sound_features:
      name: Lydfunksjoner for modelltog
      description: Angir om modellen har innebygde lydeffekter, og hvilke lydfunksjoner
        den tilbyr.
    model_train_track_gauge:
      name: Sporvidde for modelltog
      description: Angir hvilken sporvidde/sporsystemstandard modellen er konstruert
        for å kjøres på (f.eks. normalspor, smalsporsvarianter eller merke-/systemspesifikke
        sporvidder der det er relevant).
    modeling_dough_base_material:
      name: Basismateriale i modelleringsmasse
      description: Angir hovedsammensetningen i modelleringsmassen (f.eks. hvetebasert
        eller polymerbasert).
    modeling_dough_features:
      name: Egenskaper for modelleringsmasse
      description: Angir viktige egenskaper ved modelleringsmassen som kundene ofte
        bruker ved filtrering.
    modification_level:
      name: Modifikasjonsgrad
      description: Angir graden av maltmodifikasjon, altså hvor langt nedbrytningen
        av byggkjernen og proteinene har kommet. Oppgis ofte som undermodifisert eller
        overmodifisert.
    molasses_base_ingredient:
      name: Melasse-basisingrediens
      description: Angir hvilken plante eller frukt melassen hovedsakelig er fremstilt
        av.
    molasses_grade:
      name: Melassekvalitet
      description: Klassifiserer melassen etter ekstraksjons-/raffineringstrinn, som
        direkte påvirker smaksintensitet, farge og næringsprofil.
    mold_material:
      name: Materiale i form
      description: Angir hvilket materiale formen er laget av (f.eks. silikon, plast
        eller metall).
    molle_compatibility:
      name: MOLLE-kompatibilitet
      description: Angir om vesten har MOLLE-/PALS-fester for montering av modulære
        lommer og tilbehør.
    motor_belt_type:
      name: Motorbeltetype
      description: Angir type eller utforming på remmen som brukes i tredemøllens
        drivsystem.
    motor_configuration:
      name: Motorkonfigurasjon
      description: Angir hvor mange uavhengige drivmotorer sparkesykkelen har.
    motor_mounting_configuration:
      name: Monteringskonfigurasjon for motor
      description: Beskriver hvordan motoren er montert/implementert i konverterings-/vekselsettet
        for en sparkesykkel.
    motor_mounting_position:
      name: Monteringsposisjon for motor
      description: Angir hvor motoren er plassert på den elektriske sparkesykkelen,
        for eksempel i fornavet, baknavet, begge navene eller som sentralmotor.
    motor_position:
      name: Motorposisjon
      description: Indikerer hvor motoren er plassert på elsykkelen, som påvirker
        håndetring og vedlikehold.
    motor_vehicle_a_v_integration_features:
      name: Funksjoner for integrering av A/V i motorkjøretøy
      description: Funksjoner for integrering av smarttelefoner og i kjøretøy i hovedenheten
        støttes (f.eks. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Bruksområde/plassering for kjøretøylampe
      description: Angir hvilken lysfunksjon eller plassering pæren er beregnet for
        (f.eks. nærlys eller bremselys).
    motor_vehicle_bulb_approval_standard:
      name: Godkjenningsstandard for kjøretøylampe
      description: Angir hvilken godkjenning eller merking som kreves for lovlig bruk
        på vei i det aktuelle markedet.
    motor_vehicle_oxygen_sensor_bank:
      name: Oksygensensorbank for motorkjøretøy
      description: Angir hvilken sylinderbank lambdasensoren passer til (f.eks. bank
        1 eller bank 2) på V-motorer og boksermotorer. For rekkemotorer brukes «Ikke
        relevant».
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Motorvognens oksygensensor – antall ledninger
      description: Angir hvor mange ledninger lambdasensorens kabelnett har.
    motor_vehicle_oxygen_sensor_position:
      name: Plassering av lambdasensor
      description: Angir hvor oksygensensoren (O2) er installert i eksosanlegget i
        forhold til katalysatorkonverteringen.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Nummer på oksygensensoren i motorkjøretøy
      description: Angir sensornummeret (f.eks. sensor 1 eller sensor 2) innenfor
        den aktuelle bank- eller posisjonsangivelsen.
    motor_vehicle_oxygen_sensor_type:
      name: Oksygensensortype for motorkjøretøy
      description: Angir type eller teknologi for lambdasensoren.
    motor_vehicle_paint_application_method:
      name: Påføringsmetode for billakk
      description: Angir hvordan lakken er beregnet påført kjøretøyets overflate.
    motor_vehicle_paint_system_step:
      name: Trinn i malingssystem for motorkjøretøy
      description: Angir hvilket trinn i et billakkeringssystem produktet er beregnet
        for (f.eks. grunning, baselakk eller klarlakk).
    motor_vehicle_speaker_mounting_type:
      name: Monteringstype for høyttaler i motorkjøretøy
      description: Hvordan høyttaleren er ment å installeres i kjøretøyet (monteringsformfaktor).
    motor_vehicle_subwoofer_size:
      name: Subwoofer-størrelse for motorkjøretøy
      description: Nominell subwooferdriverdiameter (f.eks. 8", 10", 12") brukes for
        å matche plass i kjøretøyet og kabinettkompatibilitet.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfigurasjon av talespole for subwoofer i motorkjøretøy
      description: Angir antall eller konfigurasjon av talespoler for tilpasning til
        ulike forsterkerkoblinger (f.eks. SVC eller DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedans for talespole for subwoofer i motorkjøretøy (per spole)
      description: Angir impedansen for hver enkelt talespole (ikke den totale belastningen
        etter kobling), brukt ved beregning av koblingsalternativer.
    motor_vehicle_voltage_regulator_type:
      name: Type spenningsregulator for motorkjøretøy
      description: Angir regulatorteknologien/-formen som brukes i motorkjøretøy.
    motorcycle_armor_certification_standard:
      name: Sertifiseringsstandard for pansring for motorkjøretøy
      description: Angir hvilke sikkerhetsstandarder beskyttelsesutstyret er sertifisert
        etter (f.eks. EN 1621-2 for ryggbeskyttere eller EN 1621-3 for brystbeskyttere).
    motorcycle_cover_size_class:
      name: Størrelsesklasse for motorsykkeltrekk
      description: Angir hvilken størrelsesklasse motorsykkeltrekket tilhører, basert
        på hvilke motorsykkeltyper eller lengder det passer til.
    motorcycle_glove_certification_standard:
      name: Sertifiseringsstandard for motorsykkelhanske
      description: Angir hvilken beskyttelsesstandard eller sertifisering hanskene
        oppfyller (f.eks. nivåer i EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Vanntett konstruksjon for motorsykkelhanske
      description: Angir hvilken type vanntetting eller vanntett teknologi hansken
        har, dersom den er vanntett.
    motorcycle_guard_coverage_area:
      name: Motorsykkelbeskytterens dekningsområde
      description: Det primære dekningsområdet som produktet gir (albue, håndledd,
        underarm, kombinasjon).
    motorcycle_kidney_belt_construction_type:
      name: Konstruksjonstype for nyrebelte til motorsykkelbruk
      description: Beskriver konstruksjonen til nyrebeltet, som påvirker stivhet,
        luftstrøm og beskyttelse.
    motorcycle_kidney_belt_purpose:
      name: Formålet med motorsykkelmagetaske
      description: Beskriver hvilken type kjøring motorsykkelens nyrebelte er designet
        for.
    motorcycle_luggage_capacity_class:
      name: Størrelsesklasse for motorsykkelbagasje
      description: Beskriver volumkapasiteten for motorsykkelbagasje, uttrykt i liter.
    motorcycle_luggage_mounting_system:
      name: Monteringssystem for motorsykkelbagasje
      description: Beskriver hvordan vesken eller sidevesken festes til motorsykkelen
        (f.eks. remmer over setet eller hurtigfeste på bagasjebrett).
    motorcycle_luggage_side:
      name: Side for motorsykkelbagasje
      description: For sykkelvesker/salvesker, indikerer om varen er for venstre side,
        høyre side eller et par/sett.
    motorcycle_protective_gear_size_system:
      name: Størrelsessystem for beskyttelsesutstyr for motorsykkel
      description: Angir størrelsessystemet som brukes på produktet (f.eks. alfabetisk
        størrelse, numerisk, én størrelse).
    motorcycle_rack_carrier_style:
      name: Motorsykkelstativets bærestil
      description: Beskriver den funksjonelle transportstilen for transport av motorsykkel
        eller scooter (plattform vs. skinne vs. løftehjelp, osv.).
    motorcycle_riding_discipline:
      name: Motorsykkelkjøringsdisiplin
      description: Angir den primære kjøre- eller bruksdisiplinen som nakkestøtten
        er beregnet på.
    motorcycle_tire_speed_rating:
      name: Hastighetsvurdering for motorsykkeldekk
      description: Identifiserer den maksimale vedvarende hastigheten dekket er klassifisert
        for, ved hjelp av standard bokstavkode (f.eks. H, V, W).
    motorsport_window_net_certification:
      name: Sertifisering for vindusnett til motorsport
      description: Racingsikkerhetssertifisering eller homologering som vindusnettet
        oppfyller (f.eks. SFI eller FIA), inkludert spesifikasjonsnummer der det er
        relevant.
    mound_usage_type:
      name: Brukstype for pitchermound
      description: Identifiserer det tiltenkte bruksområdet for mounden, for eksempel
        trening, kamp, bullpen eller flerbruk.
    mount_attachment_method:
      name: Festemetode for motor
      description: Beskriver hvordan oljekjøleren er ment å monteres/installeres på
        kjøretøyet.
    mountainboard_truck_type:
      name: Type truck for mountainboard
      description: Klassifiserer stilen på lastebilene som følger med brettet, noe
        som påvirker svingrespons og holdbarhet.
    mounting_attachment_method:
      name: Monterings-/festemetode
      description: Beskriver hvordan holderen eller vesken festes til tromme, stativ,
        belte eller annen overflate.
    mounting_attachment_type:
      name: Type montering/feste
      description: Beskriver hvordan forholdstilbehøret kobles til eller brukes sammen
        med spinnerokken.
    mounting_hardware_included_for_installation:
      name: Monteringsutstyr inkludert (for installasjon)
      description: Angir om monteringsutstyret som kreves for å montere baksetet (f.eks.
        braketter, bolter, skinner) er inkludert i produktet.
    mounting_location:
      name: Monteringsplassering
      description: Spesifiserer hvor på utstyr eller kropp lyset/reflektoren er ment
        å monteres (f.eks. forgaffel, hjelm eller hjuleiker).
    mounting_method:
      name: Monteringsmetode
      description: Hvordan en holder for køller/børster monteres eller festes (f.eks.
        klemmefeste, stroppfeste, limfeste).
    mounting_position:
      name: Monteringsposisjon
      description: Angir hvor håndbremskontrollen er ment å monteres/installeres i
        kupeen.
    mounting_rail_type:
      name: Type monteringsskinne
      description: Angir skinnen eller grensesnittstandarden som tilbehøret festes
        til, for eksempel Picatinny eller M-LOK.
    mounting_receiver_size:
      name: Festemottakerens størrelse
      description: Påkrevd størrelse på tilhengerfeste for lasteholdere montert på
        hengerfeste.
    mounting_storage_type:
      name: Type montering/oppbevaring
      description: Hvordan enheten er ment å monteres eller festes på fartøyet/personen.
    mouth_grip_type:
      name: Munngrepstype
      description: Beskriver typen munnstykke eller beskyttelse på fløyten for komfort
        og hygiene.
    mouthguard_mold_type:
      name: Type munnbeskytterform
      description: Beskriver hvordan tannbeskytteren tilpasses utøverens tenner (f.eks.
        kok-og-bit eller individuelt tannavtrykk).
    mouthpiece_facing_length:
      name: Lengde på munnstykkets facing
      description: Angir munnstykkets facing (lay)-kurvelengdekategori (ikke munnstykkets
        totale lengde), noe som påvirker respons, motstand og kompatibilitet med rørbladet.
    mouthpiece_material:
      name: Munnstykkemateriale
      description: Beskriver materialet i munnstykket eller tuppen på festfløyten,
        som kan være forskjellig fra resten av produktet.
    mouthpiece_shank_receiver_size:
      name: Størrelse på munnstykkeskaft/-feste
      description: Angir munnstykkemottakeren/skaftstandarden som er kompatibel med
        flygelhornet.
    mouthpiece_shank_size:
      name: Størrelse på munnstykkeskaft
      description: Beskriver standarden for munnstykkeskaft og mottakerfeste for å
        sikre kompatibilitet med messinginstrumentet.
    mouthpiece_shank_type:
      name: Type munnstykke
      description: Angir standard for munnstykkefeste/-skaft for kompatibilitet (ved
        behov).
    mouthpiece_style:
      name: Stil for munnstykke
      description: Beskriver formen på munnstykket på kandarbittet, som påvirker trykkfordeling,
        alvorlighetsgrad og hestens komfort/preferanse.
    mouthpiece_type:
      name: Type munnstykke
      description: Type munnstykke i blåseenden (innebygd, avtakbart eller påmontert).
    movement_mechanism:
      name: Bevegelsesmekanisme
      description: Definerer hvordan benken beveger seg under bruk (svingende, glidende,
        gyngende osv.).
    muffin_size:
      name: Muffinsstørrelse
      description: Beskriver størrelsesformatet muffinsproduktet selges i (f.eks.
        mini, standard, jumbo).
    mushroom_variety:
      name: Soppvariant
      description: Identifiserer den spesifikke arten eller varianten av sopp eller
        trøffel som produktet inneholder (f.eks. shiitake, kongeøsters, svart trøffel).
    music_stand_desk_tilt_adjustment:
      name: Justering av notestativets platevinkel
      description: Angir om og hvordan skrivebordsvinkelen kan justeres.
    music_stand_intended_use:
      name: Tiltenkt bruk av notestativ
      description: Angir den primære tiltenkte innstillingen/brukstilfellet for stativet.
    musical_block_pitch_type:
      name: Musikalsk blokktonehøyde-type
      description: Beskriver om musikkblokken produserer en bestemt tonehøyde (stemt)
        eller en ubestemt tonehøyde.
    musical_box_mechanism_type:
      name: Mekanismetype for spilledåser
      description: Hvordan spilledåsen produserer/spiller lyd (f.eks. opptrekksbevegelse
        kontra elektronisk avspilling).
    musical_keyboard_case_fit_type:
      name: Passformtype for keyboard-bag
      description: Beskriver hvordan etuiet er tilpasset instrumentet i størrelse
        (f.eks. universell/generell størrelsespassform kontra modellspesifikk/skreddersydd
        passform).
    musical_ratchet_sound_character:
      name: Musikalsk skrallelydkarakter
      description: Generell beskrivelse av skrallens klang-/lydstyrkekarakter.
    musical_scraper_groove_surface_material:
      name: Musikalsk skraperille-overflatemateriale
      description: Beskriver materialet som brukes på den rillede//sporede overflaten,
        som kan være forskjellig fra hovedmaterialet.
    musical_scraper_type:
      name: Type skrapeinstrument
      description: Beskriver stilen/utformingen på skrapeinstrumentet (f.eks. güiro
        eller reco-reco), som påvirker lyd og spilleteknikk.
    mute_attachment_method:
      name: Festemetode for demper
      description: Angir hvordan en cymbaldemper er festet til eller holdt på plass
        på cymbalen (f.eks. gel, statisk adhesjon, magnet, klips).
    mute_attenuation_level:
      name: Nivå for demping av lyd
      description: Angir hvor mye dempingen reduserer opplevd volum, spesielt relevant
        for øvingsdempere.
    mute_cork_padding_material:
      name: Demper kork-/polstringsmateriale
      description: Angir materialet i demperens kontaktpolstring (f.eks. korklist/-puter)
        brukt for grep/tilpasning og beskyttelse av klokken.
    mute_coverage_type:
      name: Dekningstype for demper
      description: Beskriver typen og dekningsområdet til demperen på spilleflaten,
        fra små dempepunkter til heldekkende øvingsdempere.
    mute_finish:
      name: Demperfinish
      description: Overflatebehandling på demperen som kan påvirke holdbarhet og estetikk
        (f.eks. polert vs satin).
    name_label_text_template:
      name: Tekstmal for navneetikett
      description: Angir den forhåndsinnstilte teksten eller malen som er trykt på
        etiketten (f.eks. «Tilhører», «Laget av»).
    napkin_ply:
      name: Serviettlag
      description: Angir tykkelsen på cocktailservietten etter antall lag.
    neck_brace_fit_system:
      name: Passformsystem for nakkebøyle
      description: Indikerer den primære metoden som brukes for å justere og feste
        nakkestøtten til rytteren.
    neck_brace_size_basis:
      name: Størrelsesbasis for nakkestøtte
      description: Angir hvilket størrelsesgrunnlag som brukes for å velge riktig
        størrelse på nakkebøylen.
    neck_configuration:
      name: Halskonfigurasjon
      description: Beskriver typen saksofonhals som følger med instrumentet, og hvordan
        den påvirker komfort og spillbarhet.
    neck_coverage_type:
      name: Dekningstype for hals
      description: Beskriver nakkedekningen som følger med teppet.
    neck_support_size_system:
      name: Størrelsesystem for nakkestøtte
      description: Beskriver størrelseskategorien som brukes for racing-nakkestøtten
        (f.eks. voksen, ungdom eller én størrelse).
    necklace_length_type:
      name: Type halskjedelengde
      description: Angir den konvensjonelle halskjedelengdekategorien, for eksempel
        choker eller opera, for å hjelpe med stilbasert shopping.
    needle_balance_zone:
      name: Nålens balanseområde
      description: Indikerer den magnetiske balansesonen eller halvkulen som kompassnålen
        er innstilt for, noe som sikrer nøyaktige avlesninger over hele verden.
    needle_case_format:
      name: Format på nåleetui
      description: Generell organisatorformfaktor for nåleetuiet.
    needle_damping_type:
      name: Type nåledemping
      description: Beskriver hvordan kompassnålen er stabilisert (f.eks. væskefylt,
        tørr eller elektronisk stabilisert), noe som påvirker stabiliseringstid og
        holdbarhet.
    needle_felting_needle_profile:
      name: Nålefilt-nålsprofil
      description: Tverrsnitt/profil av en tovingål som påvirker hvordan fibrene beveges
        og den ferdige finishen.
    needle_holder_features:
      name: Egenskaper for nåleholder
      description: Viktige egenskaper ved nåleholderen.
    needle_holder_mounting_attachment_method:
      name: Monterings-/festemetode for nåleholder
      description: Hvordan nåleholderen er ment å festes eller brukes under oppbevaring
        (f.eks. magnetisk, klips, stropp).
    needle_holder_style:
      name: Type nåleholder
      description: Den fysiske oppbevarings- eller bærestilen/-utformingen til nåleholderen.
    needle_pushing_surface_type:
      name: Nålens trykkflatetype
      description: Typen/designen av nålens trykkflate på syhansken (f.eks. metallgrop,
        mynt eller forsterket lapp).
    needle_requirement_beading_pattern:
      name: Nålkrav (perlemønster)
      description: Nåltype/-størrelse anbefalt i mønsteret.
    needle_size_system:
      name: Nålstørrelsessystem
      description: Størrelsesstandard brukt for nålstørrelseetikett.
    needle_threader_compatible_needle_type:
      name: Kompatibel nåltype for nålitreder
      description: Angir hvilke nåletyper nålitrederen er konstruert for å fungere
        med (etter nålkategori/bruk).
    needle_threader_mechanism_type:
      name: Type mekanisme for itreding av nål
      description: Beskriver hvordan tråderen fanger opp og trekker tråden gjennom
        nåløyet.
    needle_threader_packaging_type:
      name: Nålitreder emballasjetype
      description: Hvordan produktet selges/pakkes (enkeltpakning, multipakke eller
        sett).
    needlecraft_fabric_color_family:
      name: Fargegruppe for håndarbeidsstoff
      description: Normalisert fargefamilie for jevnvevd stoff (brukes sammen med
        farge for fasetter).
    needlecraft_fabric_composition:
      name: Nålarbeids stoffkomposisjon
      description: Angir fibersammensetningen/blandingen til nålarbeidsstoffet (f.eks.
        100 % bomull, lin/bomullsblanding).
    needlecraft_fabric_weave_type:
      name: Vevtype for håndarbeidsstoff
      description: Angir vevingen/konstruksjonen av nålearbeidlinet (f.eks. jevnveving
        vs. tradisjonelt lin), som påvirker stingenes atferd og utseende.
    needlecraft_kit_items_included:
      name: Håndarbeidssett inkludert
      description: Viser hovedkomponentene som er inkludert i nålearbeidsettet (verktøy
        og forbruksvarer).
    needlecraft_kit_project_type:
      name: Prosjekttype for nålearbeidssettet
      description: Identifiserer hvilket ferdig produkt settet lager (prosjektresultatet).
    needlecraft_stitching_coverage:
      name: Dekningsgrad for håndarbeidssøm
      description: Angir om stoffet er sydd over 1 tråd / kvadratisk eller over 2
        tråder (vanlig for jevnvev og lin).
    needlepoint_canvas_mesh_count:
      name: Nettingtall for nålepunktlerret
      description: Beskriver den tiltenkte masketettheten på kanvasen som designet
        er tilpasset.
    needlepoint_frame_canvas_attachment_method:
      name: Festemetode for nålepunkt-rammelerret
      description: Beskriver hvordan nålepunktlerretet er festet til rammen.
    needlepoint_frame_compatible_stand_type:
      name: Kompatibel stativtype for nålepunktramme
      description: Beskriver hvilke typer stativ rammen kan brukes med, dersom den
        er utviklet for stativmontering.
    needlepoint_frame_contents:
      name: Innhold for nålepunktramme
      description: Spesifiserer hvilke komponenter og tilbehør som følger med nålepunktrammen
        (f.eks. ramme, ekstra stenger/stag, stifter/pinner, gripebånd, bæreveske).
    needlepoint_frame_tension_adjustment_type:
      name: Justeringstype for nålepunkt-rammetensjon
      description: Beskriver hvordan rammens spenning kan justeres under bruk, eller
        om den kan justeres i det hele tatt.
    needlepoint_pattern_chart_format:
      name: Diagramformat for broderimønster
      description: Beskriver hvordan nålepunktdesignet vises for sømarbeidet (diagrambasert
        kontra trykt/malt veiledning).
    needlepoint_project_type:
      name: Prosjekttype for målepunkt
      description: Angir hvilken ferdig produktkategori nålepunktdesignet er ment
        for.
    net_design:
      name: Nettdesign
      description: Identifiserer nettets konstruksjonsstil, og indikerer om det kan
        trekkes tilbake eller brettes for bærbarhet.
    net_mesh_pattern:
      name: Nettmaskemønster
      description: Beskriver formen på nettmaskene, som kan ha innvirkning på synlighet
        og styrke.
    net_twine_gauge:
      name: Tykkelse på nettgarn
      description: Beskriver tykkelsen eller styrken på nettets tråd, oppgitt som
        gauge-nummer (f.eks. 18, 36).
    nicotine_source:
      name: Nikotinkilde
      description: Beskriver om produktet inneholder tobakkavledet nikotin, syntetisk
        nikotin eller ingen nikotin.
    nipple_drive_interface:
      name: Nippeldriftsgrensesnitt
      description: Identifiserer stilen/standarden til nippelens drivgrensesnitt eller
        hode (ekstern eller intern), og bestemmer nødvendig verktøy og hjulbyggingsmetode.
    nock_activation_method:
      name: Aktiveringsmetode for nock
      description: Angir mekanismen som LED-lyset på det opplyste pilhakket slås av
        eller på (f.eks. buestrengtrykk, bevegelsessensor, manuell bryter).
    nock_fitment_code:
      name: Nock-passformkode
      description: Produsent- eller bransjekode som identifiserer hakkfamilien-/serien
        den tilhører.
    nock_throat_size:
      name: Strupestørrelse for hakk
      description: Spesifiserer størrelsen på nocksporet (rillen) som klikker fast
        på buestrengen.
    nock_transparency_level:
      name: Gjennomsiktighetsnivå for pilnock
      description: Beskriver hvor gjennomsiktig nockmaterialet er – klart, transparent,
        ugjennomsiktig eller selvlysende – noe som påvirker synlighet og utseende.
    nock_type:
      name: Nock-type
      description: Angir hakkedesignet som brukes på en pil eller bolt, for eksempel
        pinn, halvmåne eller opplyst.
    noise_reduction_type:
      name: Støyreduksjonstype
      description: Spesifiserer støyreduksjonsteknologien som brukes (eller ikke brukes)
        i hjelmens integrerte headset, hvis aktuelt.
    noise_suppression_technology:
      name: Støydempingsteknologi
      description: Beskriver om produktet bruker passiv demping eller aktiv elektronisk
        kretsløp for å redusere høye lyder og forsterke omgivelseslyder.
    non_slip_base_features:
      name: Sklisikker base – funksjoner
      description: Beskriver hvilke antisklifunksjoner som holder pedalen på plass
        under bruk.
    nose_bridge_type:
      name: Nesebrotype
      description: Beskriver designet på neseryggen, noe som påvirker passform på
        forskjellige ansiktsformer og -størrelser.
    nose_clip_accessories_included:
      name: Neseklypeutstyr inkludert
      description: Lister opp eventuelt ekstra tilbehør som følger med neseklypen
        til svømming (f.eks. ørepropper, oppbevaringsetui).
    nose_clip_features:
      name: Neseklypens funksjoner
      description: Fremhever generelle funksjonelle egenskaper eller komfortegenskaper
        ved neseklypen.
    nose_coverage_style:
      name: Stil for nesedekke
      description: Indikerer tilstedeværelsen og typen av nese- eller munningsbeskyttelsespanel
        på fluemasken.
    noseband_type:
      name: Type nesereim
      description: Beskriver utformingen av nesereimen som følger med hodelaget, dersom
        den er inkludert.
    number_of_canvas_meshes:
      name: Antall lerretsnett
      description: Maskestørrelsen på plastkanvasarket, uttrykt som hull per tomme
        (HPI) eller hulltetthet, som bestemmer stingstørrelse og detaljnivå i prosjektet.
    number_of_chainrings:
      name: Antall kjedekranser
      description: Beskriver antall krankdrev kranksettet støtter eller inkluderer.
    number_of_control_stations:
      name: Antall kontrollstasjoner
      description: Angir antall ror-/kontrollstasjoner som støttes av kontrollsettet
        (enkeltstasjon vs. dobbeltstasjon osv.).
    number_of_digits:
      name: Antall sifre
      description: Hvor mange sifre telleren viser (f.eks. 1-sifret, 2-sifret, 3-sifret).
    number_of_guitar_slots:
      name: Antall gitarspor
      description: Beskriver kapasiteten til kofferten/gigbagen i antall gitarer.
    number_of_needlecraft_fabrics:
      name: Antall nålarbeidsstoffer
      description: Angir stoffantall for nålarbeidslerret/-stoff, vanligvis uttrykt
        som kvadrater/tråder per tomme (f.eks. 14-tall).
    number_of_plastic_canvas_meshes:
      name: Antall plastduksnett
      description: Beskriver antall hull per tomme i plastkanvasen, noe som avgjør
        stingstørrelse og hvor detaljert prosjektet kan være.
    number_of_quilting_frame_rails:
      name: Antall skinner på lappeteknikkramme
      description: Antall skinner/ruller inkludert på rammen for lappeteknikk (f.eks.
        systemer med 2 skinner vs. 3 skinner).
    number_of_rope_slots:
      name: Antall tauspor
      description: Angir om sikringsenheten er designet for bruk med enkelttau eller
        dobbelttau.
    number_of_switch_poles:
      name: Antall bryterpoler
      description: Antall separate kretser (poler) som styres av bryteren (f.eks.
        SPST, DPST).
    number_of_switch_throws:
      name: Antall bryterposisjoner
      description: Antall utgangsbaner (kast) per pol (f.eks. SPDT).
    number_of_timing_chain_rows:
      name: Antall rader i registerkjedet
      description: Angir om registerkjedet er enkeltradet eller flerradet.
    number_of_trailer_axles:
      name: Antall tilhengeraksler
      description: Antall aksler på tilhengeren.
    number_of_wheel_pieces:
      name: Antall hjuldeler
      description: Angir om hjulet er en konstruksjon i 1 del, 2 deler eller 3 deler.
    numbering_style:
      name: Nummereringsstil
      description: Beskriver om vestene leveres med forhåndstrykte nummer for å identifisere
        lag eller spillere (f.eks. unummererte, 1-10, tilpassede).
    nunchuck_connector_type:
      name: Nunchuck-koblingstype
      description: Type forbindelse mellom de to nunchaku-grepene (f.eks. tau, kjede,
        svingbart kjede).
    nursing_access:
      name: Ammetilgang
      description: Identifiserer metoden for ammingstilgang integrert i badetøyet,
        hvis aktuelt.
    nursing_access_type:
      name: Ammetilgangstype
      description: Beskriver hvordan plagget åpnes eller tilpasses for amming/pumping.
    nut_butter_texture:
      name: Konsistens på nøttesmør
      description: Beskriver den fysiske konsistensen til nøttesmøret, slik at kunder
        enkelt kan velge mellom glatt, sprøtt, osv.
    nutrient_fortification:
      name: Næringsberikelse
      description: Identifiserer viktige næringsstoffer som drikkevaren eller matproduktet
        er beriket med.
    oak_product_form:
      name: Format for eikeprodukt
      description: Beskriver formen på eik brukt til modning/smakstilsetting av produkter.
    oak_toast_level:
      name: Eikebrødnivå
      description: Spesifiserer brenningsgraden på eikeprodukter.
    oboe_case_capacity:
      name: Kapasitet for obo-etui
      description: Angir hvilke instrument(er) og hovedkomponenter etuiet er konstruert
        for.
    oboe_case_carry_configuration:
      name: Bærekonfigurasjon for oboetui
      description: Beskriver hovedbæremåten for etuiet/gigbagen.
    oboe_case_design:
      name: Design på oboetui
      description: Beskriver hvor stivt eller beskyttende oboetuiet eller gigbagen
        er (f.eks. hard, halvstiv eller myk) for å angi beskyttelsesnivået.
    oboe_case_internal_fit_type:
      name: Oboetuiets innvendige passform
      description: Beskriver om innsiden er formstøpt for et bestemt instrument eller
        har justerbare rom.
    oboe_keywork_plating:
      name: Obo-klaverplater
      description: Angir belegget/overflatebehandlingen på oboens klaffemekanikk (klaffer),
        separat fra kroppsmaterialet.
    oboe_strap_padding:
      name: Polstring på oboestropp
      description: Beskriver tilstedeværelsen/typen av polstring i stroppens/støttens
        kontaktområde for komfort (f.eks. polstret skulder-/nakkeområde).
    oboe_swab_style:
      name: Type oboepusseklut
      description: Spesifiserer den funksjonelle utformingen/konstruksjonen til obo-svabben
        (f.eks. gjennomtrekkstype, vektet silke).
    observation_window_material:
      name: Materiale i visningsvindu
      description: Beskriver materialet i synspanelene/vinduene og hvordan det påvirker
        sikt og holdbarhet.
    ocarina_accessories_included:
      name: Inkludert okarina-tilbehør
      description: Tilbehør som følger med ocarinaen, for eksempel etui, halsstropp
        eller fingersettingstabell.
    ocarina_chamber_count:
      name: Ocarina-kammerantall
      description: Angir hvor mange kamre den innebygde ocarinaen har, noe som påvirker
        rekkevidde og spillekompleksitet (enkel/dobbel/trippel osv.).
    ocarina_fingering_system:
      name: Fingersystem for okarina
      description: Spesifiserer fingersystemet/standarden som ocarina-pendelen følger
        (hvis aktuelt).
    ocarina_finish_type:
      name: Ocarina-finishtype
      description: Overflatefinishen på ocarina-kroppen som påvirker følelse og stil.
    occupant_classification_sensor_support:
      name: Støtte for sensorer for klassifisering av passasjer
      description: Beskriver om setet har innebygd sensor for passasjerklassifisering/vekt
        eller klargjøring for OEM-sensor (vanligvis for passasjerseter foran).
    octave_harmonica_cover_plate_material:
      name: Materiale i dekkplate for oktavt munnspill
      description: Materiale i de ytre dekselplatene til oktavmunnspillet.
    octave_harmonica_tuning_system:
      name: Stemmesystem for oktavt munnspill
      description: Trimmingen/temperamentet som brukes for oktavmunnspillet.
    octoban_mounting_system_type:
      name: Type Octoban-monteringssystem
      description: Hvordan oktobanen er montert/plassert under spill (montering/brakett/stativoppsett).
    odor_control_features:
      name: Luktkontrollfunksjoner
      description: Angir om produktet har luktnøytraliserende/luktfjerningsfunksjonalitet,
        og hvordan dette oppnås.
    office_furniture_items_included:
      name: Inkluderte kontormøbler
      description: Identifiserer de spesifikke kontormøblene som er inkludert i settet,
        for eksempel et skrivebord eller et arkivskap.
    oil_cooler_core_type:
      name: Kjernetype for oljekjøler
      description: Spesifiserer den interne kjerneutformingen i oljekjøleren, som
        påvirker kjøleeffektivitet, trykkfall og holdbarhet.
    oil_cooler_mounting_style:
      name: Monteringstype for oljekjøler
      description: Beskriver hvordan oljekjøleren er ment å monteres/installeres på
        kjøretøyet.
    oil_dipstick_component_type:
      name: Komponenttype for peilepinne
      description: Spesifiserer hvilken komponent for måling av oljenivå som selges
        (f.eks. peilepinneblad/-stang, kun håndtak, komplett enhet, peilerør osv.).
    oil_dipstick_measurement_markings:
      name: Målemarkeringer for oljepeilepinne
      description: Beskriver markeringene på peilepinnen som brukes til å lese av
        oljenivået.
    oil_dipstick_tube_mounting_type:
      name: Festetype for peilepinnerør
      description: Angir hvordan oljepeilepinnerøret er festet eller montert på motoren
        eller motorblokken.
    oil_drain_plug_head_drive_type:
      name: Type hode på oljetappeplugg
      description: Beskriver typen verktøyinngrep på oljetappepluggen for montering
        og demontering.
    oil_drain_plug_magnet_type:
      name: Type magnet i oljebunnpluggen
      description: Angir om tappepluggen er magnetisk, og i så fall hvilken stil.
    oil_fill_cap_type:
      name: Type oljefilterhette
      description: Spesifiserer typen grensesnitt for oljepåfyllingslokk på ventildekselet
        (hvis aktuelt).
    oil_filler_cap_attachment_type:
      name: Festetype for oljepåfyllingslokk
      description: Angir hvordan oljepåfyllingslokket festes på motoren/påfyllingshalsen
        (f.eks. gjenget, bajonett/kvart-omdreining, presspasning).
    oil_filler_cap_installation_position:
      name: Monteringsposisjon for oljepåfyllingslokk
      description: Angir hvor hetten brukes når det finnes flere oljepåfyllingspunkter
        (f.eks. ventildeksel, eksternt påfyllingsrør).
    oil_filler_cap_locking_type:
      name: Låsetype for oljefilterhette
      description: Spesifiserer om oljepåfyllingslokket er uten lås eller har en låsbar/sikret
        fjerningsmekanisme (f.eks. nøkkel- eller verktøybasert), for å forhindre manipulering/tyveri
        eller utilsiktet åpning.
    oil_filler_cap_tether_type:
      name: Snortype for oljefilterhette
      description: Spesifiserer om oljepåfyllingslokket er festet med en sikkerhetsline
        for å hindre at det mistes, og hvilket type feste som brukes.
    oil_filler_cap_venting_type:
      name: Ventilasjonstype for oljepåfyllingslokk
      description: Beskriver om lokket er ventilert og hvordan ventileringen er utformet
        (hvis aktuelt).
    oil_filter_style:
      name: Oljefiltertype
      description: Beskriver formfaktor og monteringsløsning for oljefilteret i forhold
        til motorens filterfeste.
    oil_pan_baffle_windage_features:
      name: Skvalpeskott-/windage-funksjoner i bunnpanne
      description: Beskriver hvilke interne oljekontrollfunksjoner bunnpannen har.
    oil_pan_finish_coating:
      name: Overflatebehandling/belegg for oljepanne
      description: Beskriver overflatebehandlingen eller belegget på oljepannen (malt,
        pulverlakkert, belagt, rå osv.).
    oil_pressure_sensor_function_type:
      name: Funksjonstype for oljetrykksensor
      description: Angir om delen er en oljetrykksgiver med variabel utgang for en
        måler/ECU, eller en av/på-oljetrykksbryter som utløser en varsellampe.
    oil_pressure_sensor_signal_output_type:
      name: Type signalutgang fra oljetrykksensor
      description: Angir den elektriske utgangen/signaltypen som produseres av oljetrykksensoren/-senderen.
    oil_processing_method:
      name: Behandlingsmetode for olje
      description: Spesifiserer hvordan oljen ble produsert eller raffinert (f.eks.
        kaldpresset, jomfruolje, raffinert), noe som påvirker smak, ernæring og egnet
        bruk for matlaging.
    oil_pump_drive_method:
      name: Drivsystem for oljepumpe
      description: Angir hva som driver oljepumpen i motoren.
    oil_pump_mounting_style:
      name: Monteringsstil for oljepumpe
      description: Angir hvor og hvordan oljepumpen monteres i motoren (f.eks. intern
        vs. ekstern/fjernmontert, dekselmontering, oljepannemontering).
    oil_system_connection_thread_standard:
      name: Standard tilkoblingsgjenge for oljesystem
      description: Spesifiserer gjenge-/tilkoblingsstandarden som brukes i delens
        oljesystemgrensesnitt for installasjon og kompatibilitet (f.eks. M12x1,5,
        1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Oljeviskositetsgrad
      description: Angir viskositeten til spinneolje brukt i håndspinningsutstyr (ikke
        SAE-klassifisering for motorolje).
    okra_variety:
      name: Okravariant
      description: Identifiserer den spesifikke kultivaren eller markedsvarianten
        av okra som tilbys, for eksempel Clemson Spineless, Red Burgundy eller Baby
        Okra.
    olfactory_arts_material_form:
      name: Format for materiale til luktkunst
      description: Beskriver den fysiske formen materialet leveres i.
    olfactory_arts_tool_kit_content:
      name: Innhold i sett for parfymekunst
      description: Lister opp hvilke komponenter som er inkludert når produktet selges
        som et sett for fremstilling av stearinlys/røkelse/parfyme.
    olive_variety:
      name: Olivenvariant
      description: Angir hvilken olivenkultivar som brukes, noe som påvirker smak,
        tekstur, farge og regional autentisitet.
    onion_variety:
      name: Løkvariant
      description: Spesifiserer den spesifikke løktypen slik at kunden raskt kan finne
        foretrukket farge, smak og bruksprofiler, samtidig som forhandleren kan liste
        opp produkter nøyaktig.
    opacity_level:
      name: Opasitetsnivå
      description: Angir hvor gjennomsiktig eller ugjennomsiktig stoffet er.
    operating_modes:
      name: Driftsmoduser
      description: Primære innebygde effekt-/bevegelsesmoduser som støttes av laserlyset.
    operating_voltage:
      name: Driftsspenning
      description: Angir den nominelle systemspenningen injektoren er konstruert for.
    optical_toy_features:
      name: Funksjoner i optisk leketøy
      description: Beskriver hovedeffekten i form av visuelle eller optiske inntrykk
        fra leken.
    orchestral_string_core_material:
      name: Kjernemateriale i orkesterstreng
      description: Spesifiserer kjerne-materialet i strengen, som i stor grad påvirker
        følelse, respons og klang.
    orchestral_string_end_type:
      name: Endetype for orkesterstrenger
      description: Beskriver hvordan det festes ved enden av strengen.
    orchestral_string_included_strings:
      name: Inkluderte strenger til orkesterstrengeinstrumenter
      description: Viser hvilke spesifikke strenger som er inkludert i pakken (varierer
        fra instrument til instrument).
    orchestral_string_instrument_fitting_part_type:
      name: Tilbehør/deltype for orkesterstrengeinstrument
      description: Spesifiserer hva slags tilbehør/del produktet er (f.eks. bro, strengeholder,
        hakestøtte).
    orchestral_string_instrument_mute_type:
      name: Dempetype for orkesterstrengeinstrumenter
      description: Spesifiserer funksjonstype for demper til orkesterstrykeinstrument
        (f.eks. øvings-/hotellbruk eller konsertbruk) og/eller vanlig designstil.
    orchestral_string_instrument_part_position:
      name: Deleposisjon for orkesterstrengeinstrument
      description: Angir hvor delen hører hjemme på instrumentet (nyttig når deler
        finnes i øvre/nedre eller venstre/høyre variant).
    orchestral_string_winding_material:
      name: Tvinnemateriale for orkesterstrengeinstrument
      description: Beskriver materialet i strengens ytre vikling.
    organza_finish_sheen:
      name: Organza-finish/glans
      description: Beskriver overflaten på organzaen (matt, blank eller iriserende
        effekt).
    organza_ribbon_transparency_level:
      name: Gjennomsiktighetsnivå for organzabånd
      description: Beskriver hvor gjennomsiktig organzabåndet er.
    organza_transparency_level:
      name: Gjennomsiktighetsnivå for organza-materiale
      description: Beskriver hvor gjennomsiktig organzastoffet er når det legges ett
        lag.
    origami_paper_shape:
      name: Origami-papirform
      description: Beskriver arkformatet som brukes ved bretting.
    origami_paper_sidedness:
      name: Origami-papirsider
      description: Angir om papiret har samme farge/mønster på begge sider eller kontrasterende
        sider.
    ostrich_feather_part:
      name: Strutsfjærdel
      description: Angir hvilken strutsefjærtype/-del som er brukt (f.eks. plume vs.
        drab), noe som påvirker mykhet, tetthet og typiske bruksområder i håndverk.
    outboard_motor_shaft_type:
      name: Type propellskaft for påhengsmotor
      description: Standard aksellengdeklasse brukt av påhengsmotorer (etikettform
        brukt i maritim industri).
    outboard_motor_steering_type:
      name: Styringstype for påhengsmotor
      description: Angir styregrensesnittet/-mekanismen som brukes av påhengsmotoren
        (f.eks. rorkult eller fjernstyringssystem).
    outdoor_table_functionality:
      name: Funksjonaliteten til utendørsbord
      description: Beskriver innebygde funksjoner i bordet utover bordflaten (f.eks.
        kjølerom, oppbevaringshylle, gassflaskedeksel, parasollfot, stolkobling, sammenleggbar
        design, bruk i basseng, justerbar høyde, integrerte hjul, LED-belysning).
    outerwear_length_type:
      name: Yttertøyets lengdetype
      description: Klassifiserer den totale lengden på et ytterplagg i standard beskrivelsesområder.
    outerwear_pieces_included:
      name: Inkluderte ytterplagg
      description: Viser klesplaggene som følger med når produktet selges som et sett.
    outfit_attachment_mechanism:
      name: Festemekanisme for antrekk
      description: Spesifiserer hvordan antrekk eller tilbehør festes til dukken (f.eks.
        fliker, lim, magneter).
    outfit_items_included:
      name: Inkluderte antrekkselementer
      description: Viser de spesifikke plaggvarene som er inkludert i settet (f.eks.
        body, shorts, pannebånd).
    outlet_thread_type:
      name: Gjengetype for utløp
      description: Gjengestandard brukt i hovedsylinderens bremserørst utløpsporter
        (f.eks. metrisk bobleflens vs. SAE innvendig flens).
    output_jack_type_instrument:
      name: Utgangskontakttype (instrument)
      description: Angir typen lydutgangskontakt på den elektriske mandolinen.
    output_signal_type:
      name: Utgangssignaltype
      description: Elektrisk utgangsoppførsel/-type produsert av sensoren (f.eks.
        analog motstand i NTC-termistor).
    outsole_marking_type:
      name: Type merking på yttersåle
      description: Indikerer om skoens yttersåle etterlater merker på baneoverflaten,
        en viktig faktor for innendørs racketsport.
    outsole_material:
      name: Yttersålemateriale
      description: Beskriver hvilket materiale yttersålen på skoen er laget av, og
        hvordan det påvirker grep, fleksibilitet og holdbarhet.
    outsole_stud_type:
      name: Yttersåles knottype
      description: Beskriver yttersåle-/klosjekonfigurasjonen (f.eks. støpte klosser,
        gummiknotter, gressknotter) som gir grep på den valgte spilleoverflaten.
    oven_bake_clay_formulation:
      name: Leiresammensetning for ovnsbaking
      description: Angir typen formuleringsfamilie for ovnsherdende leire (polymerleire
        vs. resinleire), og hvordan dette påvirker bearbeiding og herding.
    oven_housing_configuration:
      name: Konfigurasjon for ovnskabinett
      description: Definerer den tiltenkte apparatlayoutet som kabinettet skal passe
        til (f.eks. enkel ovn, dobbel ovn eller kombinert ovn og mikrobølgeovn).
    overhead_mount_installation_method:
      name: Monteringsmetode for takfeste
      description: Hvordan en overhengsmontering festes til kjøretøyet (festemateriell/festemetode).
    oversize_or_undersize_grade:
      name: Overdimensjonert eller underdimensjonert klasse
      description: Spesifiserer settets størrelsesklasse (overdimensjonerte stempler/ringer
        og/eller underdimensjonerte lager) i forhold til OEM standardstørrelse.
    p_tex_application_method:
      name: Festemetode for P-tex
      description: Beskriver hvordan P-Tex-materialet påføres ski- eller snowboardbasen.
    p_tex_form:
      name: Form på P-Tex
      description: Identifiserer den fysiske formen som reparasjonsmaterialet forsynes
        med.
    packability:
      name: Pakkbarhet
      description: Beskriver om vesten kan pakkes ned eller stues bort når den ikke
        brukes, og hvordan dette gjøres.
    packaging_format:
      name: Emballasjeformat
      description: Angir pakke- og salgsform for strengene (enkeltpakker, bulk osv.).
    packaging_material:
      name: Emballasjemateriale
      description: Beskriver hovedmaterialet i flasken eller vannbeholderen.
    packaging_type:
      name: Emballasjetype
      description: Beskriver hvordan boblehodet er pakket for butikk/utstilling/samlerlagring.
    packing_medium:
      name: Pakkemedium
      description: Angir hvilken væske eller hvilket medium (f.eks. vann, sirup, juice
        eller saltlake) som brukes til å konservere frukten i beholderen.
    pad_components_included:
      name: Inkluderte putekomponenter
      description: Angir hvilke deler som er inkludert når produktet selges som et
        sett (f.eks. kne- og albuebeskyttere, kun håndleddsbeskyttere).
    pad_controller_additional_control:
      name: Ekstra kontrollfunksjoner på pad-kontroller
      description: Typer ekstra fysiske kontroller utover pads (knapper, dreieknapper
        og fadere) på enheten.
    pad_controller_performance_features:
      name: Ytelsesfunksjoner for putekontroller
      description: Viktige ytelsesrelaterte putefunksjoner for spilling og uttrykksfull
        kontroll.
    pad_coverage_area:
      name: Dekningsområde for puten
      description: Spesifiserer hvilke kroppsområder det formende undertøyets integrerte
        polstring beskytter.
    pad_material_or_technology:
      name: Polstringsmateriale eller -teknologi
      description: Spesifiserer den privateide treffabsorberende teknologien eller
        merkevarematerialet som brukes i puten.
    pad_mounting_or_holding_style:
      name: Putemontering eller holdestil
      description: Indikerer hvordan puten holdes, brukes eller monteres under bruk.
    pad_saver_style:
      name: Beskyttelsesstil
      description: Angir den fysiske utformingen/designet på pad saver som brukes
        til å tørke flatene og boring.
    pad_shape:
      name: Puteform
      description: Definerer den geometriske formen eller krumningen på slagflaten
        eller hele putens utforming (f.eks. rund, buet, rektangulær, flat), som hjelper
        brukeren å tilpasse puten til treningsmål og slagtyper.
    pad_shell_type:
      name: Skallstil på beskyttelse
      description: Klassifiserer konstruksjonsstilen til putens ytre overflate (f.eks.
        hardt skall, mykt skall, innvendig innlegg).
    pad_style:
      name: Putestil
      description: Beskriver typen eller utformingen på puten som er inkludert med
        sleden.
    padding_layers:
      name: Polstringslag
      description: Angir antall skumlag som brukes til å absorbere støt.
    padding_level:
      name: Polstringsnivå
      description: Beskriver hvor mye polstring som er integrert i stroppens kontaktpunkter
        (nakke, skuldre, rygg).
    padding_material:
      name: Polstringsmateriale
      description: Spesifiserer typen polstrings-/fyllmateriale som demper støt i
        utstyr som bager, skjold, hansker og treningsdukker.
    paddle_ball_attachment_type:
      name: Type feste for padleball
      description: Angir hvordan ballen er koblet til padlen (eller om den ikke er
        festet).
    paddle_leash_style:
      name: Kobbeltype
      description: Identifiserer design/stil på sikkerhetssnoren for padleåre.
    paddle_shape:
      name: Padleåreform
      description: Definerer den overordnede silhuetten på padlehodet/-kroppen (f.eks.
        standard, avlang, bred), og hvordan dette påvirker rekkevidde og kontroll.
    paddleboard_intended_use:
      name: Tiltenkt bruk for padlebrett
      description: Klassifiserer hovedformålet eller aktiviteten brettet er designet
        for (f.eks. tur, yoga, racing).
    paint_application_method:
      name: Påføringsmetode for maling
      description: Primær måte produktet er ment å bli påført kaliperen.
    paint_by_number_surface_type:
      name: Overflatetype for maling etter nummer
      description: Overflaten det nummererte designet er trykt på (f.eks. lerret,
        papir, trepanel).
    paint_medium_application_method:
      name: Påføringsmetode for maling
      description: Indikerer anbefalt måte å påføre mediet på.
    paint_medium_intended_effect:
      name: Tiltenkt effekt for malemedium
      description: Beskriver det primære resultatet mediet er ment å skape (tekstur,
        glans, glasur, flyt osv.).
    paint_safe_bristles:
      name: Malingssikre børstehår
      description: Angir om børstehårene er merket som trygge for bruk på billakk
        / gjennomsiktig belegg (ripefritt).
    paintable_surface:
      name: Malbar overflate
      description: Beskriver om papirmachéformen er ferdig grunnet og klar til maling
        (grunnet eller ubehandlet), eller må forberedes.
    paintball_caliber:
      name: Paintballkaliber
      description: Spesifiserer diameteren/kaliberet på paintballs eller kompatibelt
        utstyr.
    paintball_feed_system:
      name: Paintball-matesystem
      description: Beskriver hvordan paintballene mates til markøren.
    paintball_fill_color:
      name: Farge på paintballvæske
      description: Angir fargen på den indre markeringsfyllingen, som kan avvike fra
        det ytre skallet og bestemmer fargen som legges igjen ved treff.
    paintball_fill_type:
      name: Fylltype for paintball
      description: Beskriver eventuelle spesielle formuleringer eller egenskaper ved
        fyllet (f.eks. vaskbart, selvlysende, pulver).
    paintball_grade:
      name: Paintball-gradering
      description: Beskriver ytelsesklasse eller tiltenkt bruksnivå (f.eks. nybegynner,
        feltbruk, konkurranse, vinter).
    paintball_mask_coverage_level:
      name: Dekningsgrad for paintballmaske
      description: Angir hvilke deler av ansiktet eller hodet paintballbrillene eller
        -masken beskytter (kun briller, halvt ansikt, heldekkende ansikt eller heldekkende
        hode).
    paintball_tank_valve_type:
      name: Ventiltype for paintballtank
      description: Beskriver ventil- eller regulatorgrensesnittet som finnes på tanken.
    painting_surface_priming_type:
      name: Grunningstype for maleoverflate
      description: Spesifiserer grunning/overflatebehandling som er påført maleoverflaten
        (utover bare grunnet/ikke grunnet), som påvirker vedheft og teknikkvalg.
    palette_knife_blade_edge_profile:
      name: Kantprofil for palettknivblad
      description: Beskriver arbeidskanten på palettknivbladet (ikke skarpheten),
        og hvordan den påvirker strøk og blanding.
    palette_knife_flexibility:
      name: Palettknivens fleksibilitet
      description: Beskriver stivheten/fleksibiliteten til palettkniven.
    palette_surface_finish:
      name: Overflatebehandling på palett
      description: Spesifiserer overflatebehandlingen på blandeflaten som påvirker
        motstand mot flekker og enkel rengjøring.
    palm_padding_level:
      name: Foringsnivå for håndflate
      description: Beskriver mengden demping i håndflateområdet på hansken eller grepputen.
    palm_padding_type:
      name: Foringstype for håndflate
      description: Beskriver typen materiale eller oppbygging i håndflatepolstringen
        (gel, skum, flere lag).
    palm_wax_blend_readiness:
      name: Palmevoksblandingens bruksklarhet
      description: Om produktet er ren palmevoks eller en ferdigblandet formulering
        beregnet på spesifikke ytelsesegenskaper.
    palm_wax_form:
      name: Palmevoksform
      description: Fysisk form på palmevoksen som selges, som påvirker måling, smeltehastighet
        og håndtering.
    pan_flute_tuning_standard:
      name: Standard stemming av panfløyte
      description: Referansefrekvens brukt for stemming (f.eks. A4 = 440 Hz), viktig
        for å spille med andre instrumenter.
    pannier_configuration:
      name: Konfigurasjon for sykkelveske
      description: Beskriver om produktet leveres som én veske, dobbelveske eller
        et sett med to eller tre sidevesker.
    pannier_mounting_system:
      name: Monteringssystem for sykkelveske
      description: Definerer festemekanismen som brukes for å feste sidevesken til
        sykkelens bagasjebrett eller ramme, og som sikrer kompatibilitet med ulike
        oppsett.
    pant_cuff_style:
      name: Type bukseopplegg
      description: Indikerer overflatebehandling eller justering ved ankelen på buksene
        (f.eks. elastiske mansjetter, glidelås ved ankelen, åpen fald).
    pant_leg_conversion_type:
      name: Konverteringstype for bukseben
      description: Angir om og hvordan bukseben kan konverteres eller justeres for
        forskjellige lengder.
    pantyhose_crotch_style:
      name: Strømpebuksens skrittype
      description: Angir designet på skrittområdet (lukket, åpent eller forsterket).
    papaya_variety:
      name: Papaya-variant
      description: Beskriver sorten eller markedsvarianten for en papaya (f.eks. Solo,
        Maradol).
    paper_and_magnetic_doll_format:
      name: Papir og magnetisk dukkeformat
      description: Angir om produktet er et tradisjonelt papirdukkesett, et magnetisk
        dukkesett eller et hybridformat.
    paper_color_family:
      name: Papirets fargegruppe
      description: Spesifiserer om pakken er ensfarget, inneholder assorterte farger
        eller spesialblandinger (nyttig når farge er per produkt, men pakker er blandet).
    paper_magnetic_doll_set_contents:
      name: Settinnhold for papir- og magnetdukker
      description: Angir hvilke hovedkomponenter som er inkludert i settet.
    paper_opacity:
      name: Papirets opasitet
      description: Angir hvor gjennomsiktig papiret er, fra svært gjennomsiktig til
        ugjennomsiktig (nyttig for kalkering).
    paraglider_certification_rating:
      name: Rangering for paraglider-sertifisering
      description: Angir den offisielle flyvedyktighetsvurderingen som er tildelt
        en paraglidervinge (f.eks. EN- eller LTF-klasser).
    parasite_types_controlled:
      name: Type parasitter som bekjempes
      description: Lister hvilke indre parasitter produktet er effektivt mot, slik
        at brukeren kan tilpasse ormekurer til spesifikke infeksjoner.
    parking_camera_mounting_location:
      name: Monteringssted for parkeringskamera
      description: Hvor på kjøretøyet kameraet er ment å installeres (f.eks. nummerskilt-område,
        overflatemontering bak, innfelt montering).
    parking_camera_night_vision_technology:
      name: Parkeringskameraets nattsynsteknologi
      description: Metoden for assistanse i svakt lys som brukes av kameraet.
    parking_camera_orientation:
      name: Orientering for parkeringskamera
      description: Spesifiserer om kameraet er for bak-, front- eller fleksibel speilvendt
        visning.
    parking_sensor_finish:
      name: Parkeringssensorens finish
      description: Indikerer overflatefinishen på parkeringssensorens ansikt/hette
        (f.eks. malbar/grunnet, matt, blank) for å matche støtfangerens estetikk.
    parking_sensor_type:
      name: Parkeringssensortype
      description: Angir sensorteknologien som brukes av parkeringssensoren (f.eks.
        ultralyd, elektromagnetisk, radar, optisk).
    parsley_root_variety:
      name: Persillerotvariant
      description: Angir hvilken sort eller kultivar persilleroten tilhører, dersom
        oppgitt av leverandør.
    parsnip_variety:
      name: Pastinakkvariant
      description: Spesifiserer hvilken sort eller kultivar av pastinakk som er levert
        (f.eks. Hollow Crown eller White Gem), slik at kjøpere kan velge basert på
        smak, sødme eller størrelse.
    part_condition:
      name: Deletilstand
      description: Angir om delen er ny, brukt, overhalt osv.
    part_placement:
      name: Deleplassering
      description: Angir hvor på maskinen (f.eks. trappemaskin eller stepmaskin) delen
        er installert, for eksempel venstre, høyre, foran eller bak.
    partial_capo_covered_strings:
      name: Strenger dekket av delvis capo
      description: Spesifiserer hvilke strenger et partial capo dekker, basert på
        standard 6-strengers gitar nummerering (1 = høy E, 6 = lav E).
    parting_style:
      name: Avskjedsstil
      description: Angir hvordan parykken er eller kan skilles (f.eks. midt, side
        eller valgfri), og hvor fleksibel den er for styling.
    party_favor_type:
      name: Festgavetype
      description: Angir hva slags festgave det er (f.eks. klistremerker, minileker,
        bobler), for å aktivere, bla gjennom / filtrer i Festgaver.
    party_game_format:
      name: Format for selskapsspill
      description: Angir spillets primære fysiske format
    party_horn_mouthpiece_type:
      name: Munnstykke for festhorn
      description: Spesifiserer munnstykkets konstruksjon, noe som påvirker hygiene
        og komfort.
    party_horn_style:
      name: Type festfløyte
      description: Beskriver konstruksjonen/oppførselsstilen til festhornet (hvordan
        det strekker seg ut eller produserer lyd).
    passenger_car_type:
      name: Type personbil
      description: Identifiserer den spesifikke typen passasjervogn for modellen (f.eks.
        personvogn, sovevogn), brukt til navigering og settbygging.
    passion_fruit_variety:
      name: Pasjonsfruktvariant
      description: Identifiserer/spesifiserer den botaniske eller kommersielle varianten
        av pasjonsfrukt som tilbys (f.eks. lilla, gul, granadilla).
    pasta_sauce_texture:
      name: Konsistens på pastasaus
      description: Angir sausens konsistens, som glatt, kremet eller med biter, for
        å passe ulike smakspreferanser.
    pasta_sauce_variety:
      name: Variasjon av pastasaus
      description: Klassifiserer pastasauser etter oppskrift eller stil, slik at kunder
        raskt kan finne klassikere som marinara eller spesialsauser som vodka- eller
        pestosaus.
    pastry_crust_state:
      name: Tilstand på bakverksskorpe
      description: Beskriver tilberednings- eller baketilstanden til skorpen ved kjøp
    pastry_crust_style:
      name: Stil for skorpe på bakverk
      description: Beskriver bakverksstilen eller deigtypen for skorpen.
    pastry_filling_type:
      name: Fylltype for bakverk
      description: Angir det primære indre fyllet i bollen eller sconesen.
    patch_adhesion_method:
      name: Metode for lappefesting
      description: Spesifiserer hvordan lappen festes til slangen eller dekket (f.eks.
        selvklebende, vulkaniseres med lim eller varmeaktivert).
    patch_backing_material:
      name: Bakmateriale for lapp
      description: Materialet på baksiden/basen av lappen (f.eks. filt, twill) som
        kommer i kontakt med underlaget som dekoreres.
    patch_backing_type:
      name: Bakgrunnstype for lapp
      description: Baksiden som brukes på lappen (f.eks. varmeforsegling/stryking,
        avrivbart lim, borrelås, ingen).
    patch_base_material:
      name: Hovedmateriale for lapp
      description: Primært tekstilmateriale for base/bakside av motivlappen (ikke
        de dekorative utsmykningene).
    patch_border_edge_finish:
      name: Kantbehandling for patch
      description: Kantbehandlingsmetoden på merket (f.eks. merrow-/overlock-kant,
        laserkuttet kant) som påvirker holdbarhet og utseende.
    patch_placement_area:
      name: Område for lappeplassering
      description: Felles tiltenkt plasseringsområde for lappen på klær/tilbehør.
    pathogen_removal_capability:
      name: Funksjonalitet for fjerning av patogener
      description: Spesifiserer hvilke mikroorganismer (bakterier, protozoer, virus)
        pumpen er sertifisert til å fjerne.
    pattern_sizing_system:
      name: Mønsterets størrelsessystem
      description: Beskriver hvilket regionalt størrelsessystem mønsteret følger (f.eks.
        US, UK, EU).
    peak_style:
      name: Stil for topp
      description: Angir stilen på visiret eller skjermen på hjelmen, noe som påvirker
        dekning, estetikk og disiplinregler.
    pear_variety:
      name: Pærevariant
      description: Angir sorten eller varianten av pærer (f.eks. Bartlett, Bosc, Conference),
