      description: Angir brennenivået til kaffeprodukter, f.eks. lys, medium eller
        mørk.
    coil_connection:
      name: Spoletilkobling
      description: Angir om coilen i vapeenheter kan byttes eller ikke, f.eks. fast
        eller byttbar.
    coin_material:
      name: Myntmateriale
      description: Angir hvilket materiale en samlemynt er laget av, f.eks. bronse
        eller kobber.
    collagen_source:
      name: Kollagenkilde
      description: Identifiserer den primære opprinnelsen til kollagenet brukt i kosttilskuddet
        (f.eks. storfe, marin, plantebasert).
    collagen_type:
      name: Kollagentype
      description: Angir kollagen molekylærtypen(e) levert av produktet (f.eks. Type
        I, II, III).
    collar/mount_compatible_device:
      name: Enhet kompatibel med krage/feste
      description: Angir hva en trefotstøtte eller andre fester er kompatible med,
        f.eks. objektiv eller kamera.
    collar/mount_design:
      name: Krage/festedesign
      description: Beskriver utformingen av krager eller fester til trefotstativer,
        for eksempel hurtigutløser eller ring.
    collar_lock_type:
      name: Kragelåstype
      description: Beskriver typen kragelås på vektløftingsutstyr, f.eks. spinlock
        eller fjærklemme.
    color:
      name: Farge
      description: Angir hovedfargen eller -mønsteret, for eksempel blå eller stripet.
    color_accuracy_standards:
      name: Standarder for fargenøyaktighet
      description: Angir fargekalibreringsstandardene, vanligvis for skjermer, f.eks
        sRGB eller Adobe RGB.
    color_depth:
      name: Fargedybde
      description: Indikerer skannerens optiske/utdata bitdybde (antall bits per piksel),
        som bestemmer fargenøyaktighet, gradering og redigeringsbredde.
    color_saturation:
      name: Fargemetning
      description: Angir fargeintensiteten til kamerafilm, f.eks. høy eller lav.
    comb/brush_size:
      name: Kam/børstestørrelse
      description: Klassifiserer den overordnede fysiske størrelsen på børsten eller
        kammen.
    comb_features:
      name: Kamfunksjoner
      description: Lister opp bemerkelsesverdige ytelses- eller designkarakteristikker
        ved kammen.
    comb_tooth_spacing:
      name: Kamtannavstand
      description: Beskriver avstanden eller tettheten mellom kamtennene.
    comic_edition:
      name: Tegneserieutgave
      description: Angir den spesifikke versjonen eller utgaven av en tegneserie,
        som kan påvirke hvor sjelden den er og samleverdi – som førsteutgave eller
        variantutgave
    comic_tradition:
      name: Tegneserietradisjon
      description: Angir den kulturelle eller regionale tradisjonen tegneserien kommer
        fra, som kinesisk tegneserie eller manga
    commode_opening_type:
      name: Toalettstolåpningstype
      description: Identifiserer tilstedeværelsen og stilen på eventuelle toalettstolutskjæringer
        eller bøttekompatibilitet i setet.
    communication_device_features:
      name: Kommunikasjonsenhetsfunksjoner
      description: Identifiserer unike funksjoner i kommunikasjonsenheter, for eksempel
        berøringsskjerm eller stemmestyring.
    communication_protocols:
      name: Kommunikasjonsprotokoller
      description: Angir hvilken nettverksprotokoll som brukes, for eksempel Modbus
        eller Profibus.
    compass_style:
      name: Kompasstil
      description: Beskriver stilen til navigasjonskompass, f.eks. dykkekompass eller
        gyrokompass.
    compatible_accessibility_equipment_type:
      name: Kompatibel tilgjengelighetsutstyrstype
      description: Angir typen tilgjengelighets- eller mobilitetsutstyr tilbehøret
        er designet for å fungere med.
    compatible_aircraft_type:
      name: Kompatibel flytype
      description: Angir hvilken type luftfartøy produktet er egnet for, f.eks. fly
        eller helikopter.
    compatible_amplifier:
      name: Kompatibel forsterker
      description: Angir hvilken type forsterker et produkt er kompatibelt med, f.eks.
        bass eller keyboard.
    compatible_aquarium:
      name: Kompatibelt akvarium
      description: Angir hvilke akvarietyper et produkt er egnet for, f.eks alle akvarier
        eller saltvann.
    compatible_baby_bottle_design:
      name: Kompatibel utforming på babyflaske
      description: Angir hvilke typer tåteflaske produktet er kompatibelt med, for
        eksempel bred åpning.
    compatible_baby_carrier_type:
      name: Kompatibel bærevesketype
      description: Angir hvilken type bæresele produktet er kompatibelt med, f.eks.
        sjal eller bæremeis.
    compatible_baby_chair_type:
      name: Kompatibel babystoltype
      description: Angir hvilken type barnestol produktet passer til, for eksempel
        handlekurv eller restaurant.
    compatible_baby_transport_type:
      name: Kompatibel babytransporttype
      description: Angir kompatible produkter til babytransport, f.eks. barnevogn
        eller bilsete.
    compatible_ball_type:
      name: Kompatibel balltype
      description: Identifiserer balltypene som er egnet for bruk med produktet, f.eks.
        tennis eller squash.
    compatible_battery_size:
      name: Kompatibel batteristørrelse
      description: Angir hvilke batteristørrelser et produkt er kompatibelt med, f.eks.
        AAA eller CR2032.
    compatible_battery_technology:
      name: Kompatibel batteriteknologi
      description: Angir hvilken type batteriteknologi et produkt er kompatibelt med,
        f.eks. litiumion eller alkalisk.
    compatible_bench_positions:
      name: Kompatible benkposisjoner
      description: Angir utvalget av posisjoner, vanligvis for en treningsbenk, f.eks.
        flat eller skrå.
    compatible_bike_type:
      name: Kompatibel sykkeltype
      description: Angir hvilken type sykkel produktet er designet for, for eksempel
        elektrisk eller vei.
    compatible_brass_instrument:
      name: Kompatibelt messinginstrument
      description: Angir hvilket messingblåseinstrument produktet kan brukes med,
        for eksempel trompet eller tuba.
    compatible_cable_tie_material:
      name: Kompatibelt kabelbåndmateriale
      description: Identifiserer typen kabelbånd (f.eks. rustfritt stål, nylon) pistolen
        er designet for å installere eller fjerne.
    compatible_chemical_treatment_strength_level:
      name: Kompatibel kjemisk behandlingsstyrkenivå
      description: Indikerer den produsentanbefalte styrken eller potensen (f.eks.
        mild, vanlig, super) av den kjemiske behandlingen.
    compatible_clarinet_type:
      name: Kompatibel klarinetttype
      description: Angir hvilken type klarinett et produkt er kompatibelt med, for
        eksempel A-klarinett eller universal.
    compatible_contact_lens_type:
      name: Kompatibel kontaktlinsetype
      description: Identifiserer hvilke kategorier av kontaktlinser som kan oppbevares
        eller rengjøres i etuiet.
    compatible_contact_lenses:
      name: Kompatible kontaktlinser
      description: Indikerer typene eller materialene av kontaktlinser som løsningen
        kan brukes trygt med.
    compatible_cosmetic_tools:
      name: Kompatible kosmetiske verktøy
      description: Angir hvilke skjønnhetsverktøy produktet kan brukes med, f.eks.
        svamper eller pinsett.
    compatible_device:
      name: Kompatibel enhet
      description: Angir hvilke enheter som fungerer med en elektronisk enhet, for
        eksempel smartklokke eller trådløs øreplugg.
    compatible_drum_configuration:
      name: Kompatibel trommekonfigurasjon
      description: Angir hvilket trommeoppsett produktet er designet for, f.eks. dobbel
        bass eller hi-hat.
    compatible_electric/acoustic_instrument:
      name: Kompatibelt elektrisk/akustisk instrument
      description: Angir hvilket elektrisk eller akustisk instrument produktet er
        designet for, for eksempel elektrisk gitar eller synthesizer.
    compatible_electronic_card_type:
      name: Kompatibel elektronisk korttype
      description: Angir hvilke typer elektroniske kort produktet kan samhandle med,
        for eksempel magnetstripe eller bibliotek.
    compatible_equipment_type:
      name: Kompatibel utstyrstype
      description: Spesifiserer kategorien av basseng- eller spautstyr kretskortet
        er designet for (f.eks. varmeapparat, pumpe, klorator).
    compatible_exercise_machine_type:
      name: Kompatibel treningsmaskin type
      description: Identifiserer typen treningsmaskin kortet er beregnet for (f.eks.
        tredemølle, elliptisk).
    compatible_exercises:
      name: Kompatible øvelser
      description: Angir hvilke øvelser som kan utføres med produktet, for eksempel
        kroppshevninger eller dips.
    compatible_eyewear_type:
      name: Kompatibel brilletype
      description: Identifiserer typen briller tilbehøret er designet for å passe
        eller fungere med.
    compatible_filament:
      name: Kompatibel filament
      description: Angir hvilke typer filament en 3D-skriver kan bruke, f.eks. polymelkesyre
        (PLA) eller nylon.
    compatible_film_type:
      name: Kompatibel filmtype
      description: Angir hvilken type film et kamera kan bruke, f.eks. negativ eller
        farge.
    compatible_flute_type:
      name: Kompatibel fløytetype
      description: Angir hvilken type fløyte et produkt er kompatibelt med, f.eks.
        universal eller piccolo.
    compatible_game_format:
      name: Kompatibelt spillformat
      description: Angir hvilken type spillformat som støttes, for eksempel kun digital
        nedlasting eller fysisk plate
    compatible_gardening_tool:
      name: Kompatibelt hageverktøy
      description: Angir hvilke hageredskaper et produkt kan brukes med, for eksempel
        en rake eller spade.
    compatible_hair_color:
      name: Kompatibel hårfarge
      description: Matcher produkter til spesifikke hårfarger, f.eks. sølvfarget eller
        blond.
    compatible_hammock_design:
      name: Kompatibel hammockutforming
      description: Angir hvilken type hengekøye et produkt er kompatibelt med, f.eks.
        hengende eller ramme.
    compatible_harmonica_type:
      name: Kompatibel munnspilltype
      description: Angir hvilken type munnspill et produkt er designet for, for eksempel
        diatonisk eller kromatisk.
    compatible_hdcp:
      name: Kompatibel Hdcp
      description: Angir HDCP-kompatibiliteten til elektroniske enheter, for eksempel
        HDCP 2.2 eller ikke kompatibel.
    compatible_instrument:
      name: Kompatibelt instrument
      description: Angir hvilket musikkinstrument produktet er designet for, for eksempel
        gitar eller piano.
    compatible_keyboard_configuration:
      name: Kompatibel tastaturkonfigurasjon
      description: Angir hvilket tastaturoppsett som er kompatibelt med et produkt,
        for eksempel 61- eller 76-taster.
    compatible_lock_type:
      name: Kompatibel låsetype
      description: Angir hvilke typer lås et produkt kan fungere med, for eksempel
        kodelås eller elektronisk.
    compatible_makeup:
      name: Kompatibel sminke
      description: Angir hvilke sminkeprodukter som er kompatible, f.eks. leppestift
        eller øyenskygge.
    compatible_mattress_size:
      name: Kompatibel madrassstørrelse
      description: Angir madrassstørrelsen som passer til produktet, f.eks. 180x200
        eller 90x220.
    compatible_memory_cards:
      name: Kompatible minnekort
      description: Angir hvilke typer minnekort et produkt kan bruke, vanligvis for
        kameraer, f.eks SD eller microSDHC.
    compatible_microphone_thread:
      name: Kompatibel mikrofontråd
      description: Beskriver den kompatible gjengestørrelsen for mikrofonprodukter,
        f.eks. M6.
    compatible_motherboard_form_factor:
      name: Kompatibel hovedkortformfaktor
      description: Angir hvilke hovedkortstørrelser produktet kan støtte, for eksempel
        ATX.
    compatible_oboe_type:
      name: Kompatibel obotype
      description: Angir hvilken type obo et produkt er designet for, for eksempel
        universalhorn eller engelsk horn.
    compatible_operating_system:
      name: Kompatibelt operativsystem
      description: Angir programvarekompatibiliteten til et produkt, f.eks. Windows
        eller macOS.
    compatible_orchestral_string_instrument:
      name: Kompatibelt orkesterstrenginstrumenter
      description: Angir hvilket strengeinstrument produktet er designet for, for
        eksempel fiolin eller cello.
    compatible_paper_size:
      name: Kompatibel papirstørrelse
      description: Angir hvilke papirstørrelser en enhet kan romme, vanligvis for
        skrivere, f.eks A4 eller postkort.
    compatible_patient_profile:
      name: Kompatibel pasientprofil
      description: Angir hvilken pasientgruppe et medisinsk produkt er ment for, for
        eksempel pediatrisk eller geriatrisk.
    compatible_percussion_instrument:
      name: Kompatibelt perkusjonsinstrument
      description: Angir hvilke perkusjonsinstrumenter et produkt kan brukes med,
        f.eks. tromme eller bongo.
    compatible_pinball_machine_edition:
      name: Kompatibel flipperspillutgave
      description: Spesifiserer hvilken utgave eller utstyrsnivå av flipperspillet
        tilbehøret passer (f.eks. Pro, Premium, LE).
    compatible_play_vehicle_type:
      name: Kompatibel type lekekjøretøy
      description: Angir hvilken type lekekjøretøy produktet er egnet for, for eksempel
        bil eller båt.
    compatible_player:
      name: Kompatibel spiller
      description: Angir hvilke enheter som kan brukes med en kassettadapter, f.eks.
        iPad eller bærbar PC.
    compatible_polish_thinner_type:
      name: Kompatibel neglelakkfortynnertype
      description: Indikerer neglebeleggsystemene fortynneren er designet for å fungere
        med.
    compatible_power_supply_form_factor:
      name: Kompatibel strømforsyningsformfaktor
      description: Spesifiserer strømforsyningsenhetens (PSU) størrelse eller standard
        som kabinettet er designet for å romme.
    compatible_printer:
      name: Kompatibel skriver
      description: Angir hvilken type skriver et produkt er kompatibelt med, for eksempel
        laser eller blekk.
    compatible_processor_series:
      name: Kompatibel prosessorserie
      description: Angir hvilken prosessorserie produktet er kompatibelt med, for
        eksempel AMD Ryzen eller Intel core solo.
    compatible_programming_languages:
      name: Kompatible programmeringsspråk
      description: Angir hvilke programmeringsspråk et programvareprodukt kan jobbe
        med, f.eks. Python eller Java.
    compatible_recipes:
      name: Kompatible oppskrifter
      description: Angir hvilke oppskrifter som passer for produktet, vanligvis for
        iskremmaskiner, f.eks. sorbet eller gelato.
    compatible_resin_type:
      name: Kompatibel harpikstype
      description: Spesifiserer kategoriene av UV-harpiks en SLA/MSLA-skriver kan
        bruke.
    compatible_resolution:
      name: Kompatibel oppløsning
      description: Angir hvilken skjermoppløsning som støttes, f.eks. 1080p eller
        full HD.
    compatible_satellite_radio_service:
      name: Kompatibel satellittradio tjeneste
      description: Identifiserer satellittradiotjenesten(e) mottakeren er designet
        for å fungere med, og sikrer kompatibilitet med eksisterende eller tiltenkte
        abonnementer.
    compatible_seat_type:
      name: Kompatibel setetype
      description: Angir hvilken type barnesete til bil produktet passer til, for
        eksempel babystol eller beltestol.
    compatible_shoe_size:
      name: Kompatibel skostørrelse
      description: Matcher produkter til spesifikke skostørrelser, f.eks. 12 eller
        42.
    compatible_software_platform:
      name: Kompatibel programvareplattform
      description: Angir hvilke programvareplattformer et produkt er kompatibelt med,
        for eksempel Adobe Creative eller Canva.
    compatible_special_effects_device:
      name: Kompatibel spesialeffektenhet
      description: Angir hvilke typer enheter for spesialeffekter et produkt kan fungere
        med, f.eks. LED-lys eller tåkemaskiner.
    compatible_stove_top_type:
      name: Kompatibel komfyrtopptype
      description: Angir hvilken type komfyrtopp produktet kan brukes med, for eksempel
        gass eller induksjon.
    compatible_string_instrument:
      name: Kompatibelt strenginstrument
      description: Angir hvilket strengeinstrument produktet er designet for, f.eks.
        ukulele eller bassgitar.
    compatible_stroller_type:
      name: Kompatibel vogntype
      description: Angir hvilken type barnevogn produktet passer til, f.eks. paraply
        eller jogging.
    compatible_vacuum_type:
      name: Kompatibel vakuumtype
      description: Angir hvillen type støvsuger produktet er kompatibelt med, for
        eksempel håndholdt eller damp.
    compatible_vehicle:
      name: Kompatibelt kjøretøy
      description: Angir hvilken type kjøretøy et produkt er designet for, for eksempel
        bil eller SUV.
    compatible_voice_assistant:
      name: Kompatibel stemmeassistent
      description: Identifiserer stemmekontrollplattformer som kan styre mottakeren.
    compatible_walking_aid_equipment:
      name: Kompatibelt utstyr for ganghjelp
      description: Angir hvilke hjelpemidler for gange produktet er designet for,
        f.eks. krykker eller rullatorer.
    compatible_wax_container_size:
      name: Kompatibel voksbeholderstørrelse
      description: Lister opp standardstørrelsene for patron, boks eller krukke som
        kan plasseres direkte i varmeren uten omhelling.
    compatible_wax_form:
      name: Kompatibel voksform
      description: Spesifiserer formene for hårfjerningsvoks som varmeren er designet
        for å smelte.
    compatible_weight_lifting_accessory:
      name: Kompatibelt vektløftingstilbehør
      description: Angir hvilket vektløftingsutstyr produktet er kompatibelt med,
        for eksempel vektstang eller håndmanual.
    compliance_certifications:
      name: Samsvarssertifiseringer
      description: Angir hvilke samsvarssertifiseringer et produkt har, for eksempel
        HIPAA eller FedRAMP.
    component_mounting_style:
      name: Komponent monteringsstil
      description: Definerer den primære metoden som en elektronisk komponent eller
        kort festes til et kretskort, panel, chassis eller skinne.
    component_output_type:
      name: Type komponentutgang
      description: Angir hvilken type output-signal det er i elektroniske komponenter,
        for eksempel UART eller analog.
    component_package_type:
      name: Komponentpakketype
      description: Beskriver formfaktoren eller emballasjen til elektroniske komponenter,
        f.eks. SDM (Surface Mount Device) eller DIP (Dual In-line Package).
    component_size_code:
      name: Komponentstørrelseskode
      description: Spesifiserer den standardiserte SMD eller gjennomhull-størrelsesbetegnelsen
        (f.eks. 0603, 0805) brukt for kondensatorpakken.
    component_tolerance:
      name: Komponent toleranse
      description: Definerer tillatt avvik fra nominell verdi (motstand, kapasitans,
        induktans, frekvens, etc.) uttrykt som en prosentandel.
    components_included:
      name: Komponenter inkludert
      description: Lister maskinvaredelene som leveres i startpakken.
    compression_circuit_type:
      name: Kompresjonskrets type
      description: Beskriver den underliggende forsterkningsreduksjonsteknologien
        (f.eks. VCA, FET, optisk) som former prosessorens lyd og respons.
    compression_format:
      name: Kompresjonsformat
      description: Angir hvilken type videofilkomprimering som brukes, f.eks. MPEG-4
        eller AVI.
    compression_level:
      name: Kompresjonsnivå
      description: Indikerer trykkintensiteten i kompresjonsprodukter, f.eks. lett
        eller fast.
    computer_accessories_included:
      name: Inkludert datamaskintilbehør
      description: Angir hvilket datatilbehør som følger med, for eksempel mus eller
        bæreveske.
    computer_form:
      name: Datamaskinskjema
      description: Angir det fysiske designet eller utformingen til en datamaskin,
        for eksempel alt-i-ett eller bærbar PC.
    computer_server_features:
      name: Dataserverfunksjoner
      description: Beskriver spesielle funksjoner for en server, for eksempel redundant
        strømforsyning eller virtualiseringsstøtte.
    computer_specialized_features:
      name: Dataspesialiserte funksjoner
      description: Fremhever spesifikke datamaskinfunksjoner, f.eks. væskekjølesystem
        eller RGB-belysning.
    concertina_button_configuration:
      name: Konfigurasjon av konsertinaknapp
      description: Angir antallet av og utformingen til knapper på en konsertina,
        for eksempel 20-knappers anglokonsertina.
    condition:
      name: Betingelse
      description: Beskriver tilstanden eller kvaliteten til et produkt, f.eks. som
        ny eller dårlig.
    conditioner_effect:
      name: Balsameffekt
      description: Angir fordelene med en hårbalsam, for eksempel utjevning eller
        anti-flass.
    condom_compatibility:
      name: Kondomkompatibilitet
      description: Angir hvilke kondommaterialer glidemiddelet er trygt å bruke med.
    condom_fit_type:
      name: Kondompassform
      description: Beskriver den overordnede størrelsen eller anatomiske konturen
        designet for å forbedre komfort og følelse.
    condom_type:
      name: Type kondom
      description: Angir om et kondom er beregnet på menn eller kvinner.
    conductivity_gel_application:
      name: Ledningsevne gel anvendelse
      description: Angir den medisinske eller diagnostiske prosedyren ledningsevnegelen
        eller losjonen er beregnet for.
    conductor_core_type:
      name: Leder kjernetype
      description: Indikerer om den interne lederen er tvinnet eller solid kjerne.
    connecting_thread:
      name: Koblingstråd
      description: Angir gjengetypen for sammenføyning av rørleggerdeler, f.eks. 1/2-tommers
        IPS.
    connection_method:
      name: Tilkoblingsmetode
      description: Angir typen tilkobling et produkt bruker, for eksempel trådløs
        eller kablet.
    connection_type:
      name: Tilkoblingstype
      description: Angir hvilken type tilkobling som brukes i elektronikk, for eksempel
        kablet eller Bluetooth.
    connectivity_technology:
      name: Tilkoblingsteknologi
      description: Angir metoden for dataoverføring i et produkt, f.eks. Bluetooth
        eller USB.
    connectivity_type:
      name: Tilkoblingstype
      description: Tydeliggjør om brettet er loddefritt (koblingsbrett-stil) eller
        designet for lodding.
    connector_1_type:
      name: Kontakttype 1
      description: Spesifiserer kontakten eller grensesnittet som finnes på den første
        enden av adapteren eller koblingen.
    connector_2_type:
      name: Kontakttype 2
      description: Spesifiserer kontakten eller grensesnittet som finnes på den andre
        enden av adapteren eller koblingen.
    connector_contact_plating:
      name: Kontaktbelegg på kontakt
      description: Spesifiserer overflatebelegget eller beleggingen som påføres de
        elektriske kontaktene for å forbedre ledningsevne og korrosjonsmotstand.
    connector_design:
      name: Koblingsdesign
      description: Beskriver utformingen til koblinger for kjettinger og kjeder, for
        eksempel åpen ende eller klikk-på.
    connector_gender:
      name: Koblingskjønn
      description: Spesifiserer kjønnet til koblingspunktene i elektronikk, f.eks.
        hann eller hann til hunn.
    connector_mounting_style:
      name: Kontaktmonteringsstil
      description: Indikerer hvordan kontakten mekanisk monteres eller integreres
        i en enhet (f.eks. PCB, panel, chassis, kabel, kobling).
    connector_orientation:
      name: Kontaktorientering
      description: Beskriver den fysiske orienteringen av paringsgrensesnittet i forhold
