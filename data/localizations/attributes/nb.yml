    smoke_color:
      name: Røykfarge
      description: Røykfarge produsert av fakkel-/røyksignalet (forskjellig fra produktkroppens
        farge).
    smoked_malt_smoking_material:
      name: Røykemateriale for røkt malt
      description: For røkt malt, identifiserer dette materialet som brukes under
        røykingen (f.eks. spesifikk tresort eller torv).
    snack_mix_variety:
      name: Snacksblanding-variant
      description: Klassifiserer produktet etter blandingstype (f.eks. plukk selv,
        nøttemiks, namkeen, sev).
    snack_processing_method:
      name: Behandlingsmetode for snacks
      description: Angir den primære prosesserings- eller konserveringsteknikken som
        ble brukt til å lage snacksen (f.eks. frysetørket, bakt, stekt).
    snack_texture:
      name: Snacktekstur
      description: Indikerer det fysiske bittet eller munnfølelsen til sesamstengerne.
    snap_installation_method:
      name: Installasjonsmetode for trykknapp
      description: Hvordan snappen installeres/festes til prosjektmaterialet.
    snare_drum_bearing_edge_profile:
      name: Profil på anleggskant på skarptromme
      description: Kutt/profil på anleggskanten på skarptrommeskallet.
    snare_drum_finish_type:
      name: Type overflatebehandling for skarptromme
      description: Høykvalitets finishkonstruksjon/-type brukt på skarptrommeskallet.
    snare_drum_hoop_type:
      name: Løkketype for skarptromme
      description: Hvilken type løkke/kant som er brukt på skarptrommen.
    snare_drum_mounting_type:
      name: Monteringstype for skarptromme
      description: Hvordan skarptrommen er ment å monteres/brukes.
    snare_drum_shell_material:
      name: Skallmateriale for skarptromme
      description: Angir metallet/legeringen som brukes til skarptrommeskallet (hovedkroppen),
