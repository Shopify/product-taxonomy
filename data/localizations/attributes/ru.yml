    whistle_sound_style:
      name: Тип звука свистка
      description: Характер звучания свистка (однотонный, многотонный и т. п.).
    white_glue_finish_appearance_when_dry:
      name: Внешний вид белого клея после высыхания
      description: Внешний вид клея после высыхания при использовании в рукоделии
        или в офисе (например, прозрачный или непрозрачный).
    white_glue_washability:
      name: Смываемость белого клея
      description: Можно ли удалить высохший клей с ткани или кожи.
    whitewater_kayak_style:
      name: Стиль каяка для бурной воды
      description: Основное предназначение в сегменте бурной воды (например, creekboat,
        river runner, playboat).
    whitewater_rating_class:
