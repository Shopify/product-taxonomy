      description: Цвет подсветки или освещения дисплея или шкалы прибора.
    disposable_compostable_claim:
      name: Информация о биоразлагаемости или компостируемости
      description: Компостируемый, биоразлагаемый, перерабатываемый или ни один из
        этих вариантов (если применимо).
    distillation_method:
      name: Способ дистилляции
      description: Способ дистилляции или тип перегонного аппарата, используемый для
