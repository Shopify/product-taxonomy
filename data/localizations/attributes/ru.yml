    lifebuoy_features:
      name: Особенности спасательного круга
      description: Функции безопасности, особенности крепления и обращения, а также
        входящие аксессуары спасательных кругов.
    lift_mechanism_type:
      name: Тип подъемного механизма
      description: Механизм помощи при подъеме и опускании или открытии и закрытии
        откидной кровати.
    lift_stand_support_point:
      name: Точка опоры подъемника и стойки
      description: Место контакта и поддержки транспортного средства подъемником или
        стойкой.
    lifting_gas_type:
      name: Тип подъемного газа
      description: Основной подъемный газ или среда плавучести, используемые дирижаблем.
    lifting_support_type:
      name: Тип опоры подъемника
      description: Конструкция подъемника с заездными платформами или подъемными рычагами
        и опорами, контактирующими с рамой и точками подъема.
    ligature_and_cap_component_type:
      name: Тип компонентов лигатуры и колпачка
      description: 'Тип изделия: лигатура, колпачок или комплект с обоими компонентами.'
    ligature_material:
      name: Материал лигатуры
      description: Основной материал корпуса лигатуры, контактирующего с тростью и
        фиксирующего ее (например, металл, кожа, ткань).
    ligature_plating_or_finish:
      name: Покрытие или отделка лигатуры
      description: Покрытие и/или отделка поверхности металлической лигатуры и/или
        колпачка для кларнета.
    ligature_reed_contact_style:
      name: Стиль контакта лигатуры с тростью
      description: Способ контакта лигатуры с тростью (например, минимальный контакт,
        многоточечный контакт или охватывающая конструкция).
    ligature_screw_position_relative_to_reed:
      name: Положение винта лигатуры (относительно трости)
      description: Расположение винтов затяжки лигатуры относительно трости и стороны,
        обращенной к музыканту, при установке на мундштук.
    ligature_tension_adjustment_mechanism:
      name: Механизм регулировки натяжения лигатуры
      description: Способ создания и регулировки давления лигатурой на трость (конструкция
        крепления).
    ligature_tightening_mechanism_type:
      name: Тип механизма затяжки лигатуры
      description: Механизм затяжки лигатуры вокруг мундштука и трости (например,
        один винт, два винта, рычаг или быстросъемный механизм).
    light_bar_housing_material:
      name: Материал корпуса световой балки
      description: Основной материал корпуса световой балки. Влияет на долговечность
        и рассеивание тепла.
    light_bar_lens_material:
      name: Материал линзы световой балки
      description: Основной материал линзы и крышки световой балки. Влияет на ударопрочность
        и оптическую прозрачность.
    light_bar_mounting_location:
      name: Место установки световой балки
      description: Основное предполагаемое место установки на транспортном средстве.
    light_stand_style:
      name: Стиль осветительной стойки
      description: Конструкция или формфактор стойки для поддержки световых эффектов
        (например, тренога, T-образная стойка, стойка с подъемным механизмом), а не
        поверхность установки, которая указывается типом крепления.
    light_switch_function:
      name: Функция выключателя света
      description: Осветительные цепи или функции, которыми управляет выключатель.
    lighting_control_protocols_supported:
      name: Поддерживаемые протоколы управления освещением
      description: Протоколы управления и сетевые протоколы, поддерживаемые контроллером
        дополнительно к DMX512 или вместо него.
    lighting_effects:
      name: Световые эффекты
      description: Встроенные световые функции для улучшения игрового процесса или
        внешнего вида.
    lighting_mode:
      name: Режим освещения
      description: Доступные режимы работы освещения, например постоянный свет, мигание,
        стробоскоп или SOS.
    lily_variety:
      name: Сорт лилии
      description: Коммерческий или ботанический сорт лилии, продаваемой как срезанный
        цветок (например, азиатская, восточная).
    limb_articulation:
      name: Подвижность конечностей
      description: Степень гибкости и подвижности конечностей манекена (отсутствует,
        фиксированная, полугибкая, полностью подвижная).
    limb_material:
      name: Материал плеча лука
      description: Основной материал плеч лука или арбалета. Влияет на вес, долговечность,
        вибрацию и общие характеристики.
    lime_variety:
      name: Сорт лайма
      description: Конкретный ботанический или коммерческий сорт лайма.
    line_buoyancy:
      name: Плавучесть лески
      description: Способность плетеной лески плавать или тонуть, а также скорость
        погружения. Влияет на подачу приманки и управление леской.
    line_purpose:
      name: Назначение лески
      description: Назначение линии в системе кайта (например, передняя стропа управления,
        депауэрная стропа или стропа уздечки).
    linen_finish_treatment:
      name: Отделка и обработка льна
      description: Любая отделка или обработка льняной ткани, изменяющая тактильные
        свойства, внешний вид или характеристики.
    linen_weave_type:
      name: Тип переплетения льна
      description: Конструкция переплетения льняной ткани. Влияет на текстуру, воздухопроницаемость
        и драпировку.
    liner_padding_type:
      name: Тип подкладки лайнера
      description: Конструкция или тип амортизации лайнера (например, сетчатая, с
        легкой набивкой или стеганая).
    liner_shape:
      name: Форма лайнера
      description: Общая форма вкладыша для спального мешка. Помогает покупателям
        подобрать его под спальный мешок и предпочтения по комфорту.
    liner_type:
      name: Тип лайнера
      description: Наличие подкладки в шортах и ее стиль.
    lining:
      name: Подкладка
      description: Наличие подкладки в плавках, способ ее выполнения и степень покрытия
        внутренней части изделия.
    lining_material:
      name: Материал подкладки
      description: Материал внутренней подкладки обуви. Влияет на комфорт, воздухопроницаемость
        и теплоизоляцию.
    lining_type:
      name: Тип подкладки
      description: Наличие подкладки в купальном изделии и степень покрытия.
    link_connection_style:
      name: Стиль соединения звеньев
      description: Способ соединения звена с цепью (например, быстроразъемное звено
        или соединительный штифт). Помогает подобрать правильный способ установки
        или запасную деталь.
    live_bait_form:
      name: Форма живой наживки
      description: Физическая форма или состояние сохранности наживки, например живая,
        замороженная или сушеная.
    living_room_furniture_items_included:
      name: Состав набора мебели для гостиной
      description: Отдельные предметы мебели, входящие в комплект для гостиной. Помогает
        покупателям быстро понять, какие именно компоненты (например, диван, двухместный
        диван, журнальный столик) входят в набор.
    load_mechanism:
      name: Механизм загрузки
      description: Основной способ создания или добавления сопротивления в тренажере
        (например, стек грузов с селектором, дисковая нагрузка или нагрузка эспандерами).
    lock_cylinder_type:
      name: Тип цилиндра замка
      description: Тип используемого цилиндра или сердечника замка. Влияет на устойчивость
        к взлому и совместимость сменных ключей.
    lock_security_level:
      name: Уровень безопасности замка
      description: Характеристики устойчивости замка или цилиндра к вскрытию и высверливанию.
    lock_system:
      name: Система блокировки
      description: Тип системы безопасности для фиксации подъемника на высоте.
    locker_bench_configuration:
      name: Конфигурация скамьи для раздевалки
      description: Ориентация или конструкция скамьи для раздевалки (например, односторонняя,
        двухсторонняя островная или настенная).
    locomotive_prototype_power_type:
      name: Тип привода прототипа локомотива
      description: Тип тяги реального локомотива, представленного моделью.
    locomotive_wheel_arrangement_whyte_notation:
      name: Колесная формула локомотива (нотация Уайта)
      description: Колесная формула прототипа локомотива (например, 4-6-2 «Пасифик»).
    loft_bed_height_classification:
      name: Классификация высоты кровати-чердака
      description: Общая категория высоты кровати-чердака (низкая, средняя, высокая,
        сверхвысокая). Помогает покупателям учитывать высоту потолков и пространство
        под кроватью.
    logo_application_method:
      name: Метод нанесения логотипа
      description: Способ нанесения школьного герба или логотипа на одежду (например,
        вышивка или печать).
    logo_label_compatible_fabric_weight:
      name: Совместимая плотность ткани для логотипной этикетки
      description: Рекомендуемая категория плотности ткани для крепления этикетки
        без деформации или излишнего объема.
    logo_label_edge_finish:
      name: Отделка края логотипной этикетки
      description: Конструкция и отделка края этикетки. Влияет на устойчивость к осыпанию
        и комфорт при контакте с кожей.
    logo_label_print_production_method:
      name: Метод печати и производства логотипной этикетки
      description: Способ нанесения и формирования логотипа на поверхности этикетки.
    long_block_completeness:
      name: Комплектность длинного блока
      description: Основные компоненты, входящие в сборку длинного блока.
    long_john_pieces_included:
      name: Входящие элементы long john
      description: Наличие только нижней части, только верхней части или обеих частей
        комплекта long john.
    longan_variety:
      name: Сорт лонгана
      description: Культивар или коммерческий сорт плодов лонгана (например, «Кохала»,
        «Биу Киу»). Помогает покупателям определить желаемые вкусовые характеристики,
        размер и сладость.
    loom_accessories_included:
      name: Аксессуары ткацкого станка
      description: Основные аксессуары, входящие в комплект ткацкого станка.
    loom_finish:
      name: Отделка ткацкого станка
      description: Отделка поверхности ткацкого станка (в основном для деревянных
        станков).
    loom_folding_portability_design_type:
      name: Тип складной или портативной конструкции ткацкого станка
      description: Наличие и способ складывания ткацкого станка для транспортировки
        или компактного хранения.
    loom_frame_folding_design:
      name: Конструкция складывания рамы ткацкого станка
      description: Наличие и способ складывания, разборки или трансформации рамы настольного
        ткацкого станка для хранения или транспортировки.
    loom_tension_adjustment_method:
      name: Способ регулировки натяжения ткацкого станка
      description: Основной способ регулировки натяжения основы на ткацком станке.
    loom_tie_up_system:
      name: Система соединения ткацкого станка
      description: Тип системы соединения между педалями, ламмами и ремизками (например,
        Texsolv или металлическая цепь).
    loquat_variety:
      name: Сорт мушмулы
      description: Культивар или сорт мушмулы. Отражает различия в размере, вкусе,
        сезоне созревания и внешнем виде.
    lubricant_features:
      name: Особенности смазки
      description: Особые эксплуатационные характеристики, присадки или преимущества
        смазки.
    lubrication_requirement:
      name: Требование к смазке
      description: Наличие предварительной обработки и необслуживаемой конструкции
        бегового полотна или необходимость регулярной смазки и обработки воском.
    lubrication_type:
      name: Тип смазки
      description: Возможность смазки втулки и обслуживания консистентной смазкой,
        включая наличие канавок или пресс-масленки.
    lug_nut_seat_profile:
      name: Профиль посадочного места колесной гайки
      description: Профиль посадочного места колесной гайки, необходимый для обеспечения
        совместимости колесной гайки и безопасной установки.
    lumbar_support_type:
      name: Тип поясничной поддержки
      description: Тип поясничной поддержки кресла (например, съемная подушка, регулируемый
        механизм, массаж).
    lunge_trainer_style:
      name: Стиль тренажера для выпадов
      description: Конструктивное исполнение тренажера для выпадов.
    lure_buoyancy:
      name: Плавучесть приманки
      description: Поведение приманки в толще воды в состоянии покоя или при проводке
        (например, плавучесть на поверхности, зависание в толще воды или погружение).
    luster:
      name: Блеск
      description: Характер взаимодействия света с поверхностью образца (например,
        стекловидный, металлический).
    lychee_cultivar:
      name: Сорт личи
      description: Конкретный сорт личи, например «Брюстер», «Хак Ип» или «Маврикий»,
        различающийся по вкусу, размеру косточки, сезону сбора и цене.
    lyre_flip_folder_mounting_location:
      name: Место крепления лиры и флип-папки
      description: Место крепления лиры или флип-папки на инструменте или аксессуаре
        (например, раструб, эска, стойка).
    lyrics_display_type:
      name: Тип отображения текста песен
      description: Способ отображения текста песен во время караоке (при поддержке
        функции).
    magazine_compatibility:
      name: Совместимость с магазинами
      description: Основные калибры или типы магазинов, для которых предназначены
        встроенные подсумки жилета.
    magnet_requirement:
      name: Требование к магниту
      description: Необходимость внешнего магнита для работы датчика.
    magnet_toy_storage_included:
      name: Хранилище для магнитной игрушки в комплекте
      description: Тип контейнера или кейса для хранения, входящего в комплект магнитной
        игрушки для организации рабочего стола и поездок.
    malanga_variety:
      name: Сорт маланги
      description: Конкретный сорт маланги или корня таро. Помогает выбрать нужный
        вкус, цвет или кулинарное применение.
    malt_color_rating_system:
      name: Система оценки цвета солода
      description: Цветовая шкала, к которой относится указанный цвет (Lovibond, SRM
        или EBC).
    malt_crush:
      name: Помол солода
      description: 'Состояние базового солода при продаже: цельный, недробленый или
        предварительно дробленый, а также тип помола.'
    malt_form:
      name: Форма солода
      description: 'Форма продажи продукта: цельные зерна или обработанный для затирания
        солод (например, дробленый).'
    malt_intended_use:
      name: Назначение солода
      description: Основное назначение солода (пивоварение, дистилляция или универсальное
        применение).
    malt_treatment:
      name: Обработка солода
      description: Методы обработки зерна или солода помимо стандартной сушки.
    malt_usage_purpose:
      name: Назначение солода
      description: Основной функциональный вклад специального солода в рецепт пива.
    man_overboard_system_type:
      name: Тип системы «человек за бортом»
      description: Категория решения системы «человек за бортом» (MOB), предоставляемого
        продуктом.
    mandolin_back_sides_wood:
      name: Древесина задней деки и обечаек мандолины
      description: Порода древесины задней деки и обечаек мандолины.
    mandolin_body_top_wood:
      name: Древесина верхней деки мандолины
      description: Основной материал или порода древесины верхней деки мандолины.
    mandolin_bridge_type:
      name: Тип бриджа мандолины
      description: Тип бриджа мандолины.
    mandolin_pickup_configuration:
      name: Конфигурация звукоснимателей мандолины
      description: Наличие электроники и тип установленной системы звукоснимателей.
    mandolin_string_configuration:
      name: Конфигурация струн мандолины
      description: Конфигурация струн мандолины по общему количеству струн и числу
        хоров (например, 8 струн/4 хора).
    mangosteen_variety:
      name: Сорт мангостана
      description: Конкретный вид или сорт мангостана или родственного фрукта гарцинии.
    mannequin_style:
      name: Стиль манекена
      description: Конструктивное исполнение тренировочного манекена.
    manufacturing_process:
      name: Производственный процесс
      description: Основной метод изготовления корпуса катушки или шпули (например,
        обработка на станках с ЧПУ, литье под давлением).
    map_coverage_sky_planet_body:
      name: Охват карты (небо/планеты)
      description: 'Объект отображения карты: ночное небо (созвездия) или конкретное
        небесное тело.'
    map_format:
      name: Формат карты
      description: Формат физического или цифрового представления охотничьих карт
        и путеводителей.
    map_sensor_output_signal_type:
      name: Тип выходного сигнала MAP-датчика
      description: Тип выходного сигнала, передаваемого MAP-датчиком в электронный
        блок управления двигателем (ECU).
    map_size_sheet:
      name: Размер карты (лист)
      description: Итоговый размер листа карты, постера или планисферы для удобства
        размещения и совместимости (размер рамки, пространство на стене).
    marabou_feather_form:
      name: Форма пера марабу
      description: Формфактор пера марабу в продаже.
    marabou_feather_treatment:
      name: Обработка пера марабу
      description: Способ обработки или отделки пера марабу для рукоделия.
    marble_track_set_feature_modules:
      name: Функциональные модули набора мраморной трассы
      description: Специальные функциональные модули, входящие в набор (например,
        подъемник, пусковое устройство, переключатели).
    marine_flare_certification_standard:
      name: Сертификация и стандарты морских сигнальных ракет
      description: Сертификация или стандарты морской безопасности, которым соответствует
        сигнальная ракета.
    marine_safety_standard_compliance:
