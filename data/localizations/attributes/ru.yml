    activity:
      name: Вид активности
      description: Вид спорта или активности, для которого предназначен продукт (например,
        теннис или пилатес)
    activity_tracker_design:
      name: Дизайн трекера активности
      description: Способ ношения трекера активности (например, клипса или браслет
        на руку)
    acupuncture_model_format:
      name: Формат модели для акупунктуры
      description: Размер и масштаб модели для акупунктуры (например, в натуральную
        величину или миниатюрная)
    acupuncture_model_type:
      name: Тип модели для акупунктуры
      description: 'Часть тела или вид живого существа, в форме которого выполнена
        модель для акупунктуры (например, голова, рука или животное) '
    adapter_directionality:
      name: Направленность адаптера
      description: Поддерживает ли адаптер поток сигнала в обоих направлениях или
        только в одном указанном направлении.
    adapter_operating_modes:
      name: Режимы работы адаптера
      description: Функционирует ли адаптер как приемник Bluetooth, передатчик или
        и то и другое.
    adaptive_sync_technology:
      name: Технология адаптивной синхронизации
      description: Технология переменной частоты обновления (VRR), поддерживаемая
        монитором для передачи изображения без разрывов.
    adc_resolution:
      name: Разрешение АЦП
      description: Разрешение (в битах) встроенного аналого-цифрового преобразователя,
        определяющее точность измерений.
    additional_animation_software_features:
      name: Дополнительные функции программного обеспечения для работы с анимацией
      description: Уникальные возможности программного обеспечения для работы с анимацией
