---
ru:
  attributes:
    3d_glasses_fit_design:
      name: Дизайн 3D-очков
      description: Как очки носятся или крепятся (например, клипсы, маска, надеваемые
        поверх).
    3d_glasses_material:
      name: Материал 3D-очков
      description: Материал, из которого изготовлены 3D-очки (например, бамбук или
        нержавеющая сталь)
    3d_glasses_technology:
      name: Технология 3D-очков
      description: Технология 3D-изображения/синхронизации, для которой предназначены
        очки, определяющая совместимость с конкретными дисплеями или проекторами.
    3d_printer_case_style:
      name: Стиль чехла для 3D-принтера
      description: Общий тип продукта, позволяющий покупателям различать мягкие сумки
