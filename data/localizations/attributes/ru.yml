      description: Дополнительные возможности программного обеспечения для редакционно-издательских
        работ (например, полиграфический дизайн или цифровая полиграфия)
    additional_security_software_features:
      name: Дополнительные функции антивирусного программного обеспечения
      description: Дополнительные возможности антивирусного программного обеспечения
        (например, шифрование диска или обнаружение вторжений)
    adhesive_application_type:
      name: Тип применения клея
      description: Услуга по наращиванию ресниц, для которой предназначен клей, или
        вариант его использования.
    adhesive_features:
      name: Характеристики клея
      description: Особые свойства клея, используемого на пластырях или лентах.
    adhesive_format:
      name: Формат клеящего вещества
      description: Физическая форма, в которой поставляется клеящее вещество для ремонта.
    adhesive_strength:
      name: Сила приклеивания
      description: Уровень силы сцепления или отрыва клея назальной полоски (например,
        оригинальная, повышенная прочность).
    adhesive_type:
      name: Тип фиксации на клеящий материал
      description: Тип продукта по характеристикам клеящего материала (например, съемный
