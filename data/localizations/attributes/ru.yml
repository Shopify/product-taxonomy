        требованиям)
    additional_graphic_software_features:
      name: Дополнительные функции программного обеспечения для работы с графикой
      description: Дополнительные возможности программного обеспечения для работы
        с графикой (например, цифровая иллюстрация или разработка макетов)
    additional_publishing_software_features:
      name: Дополнительные функции программного обеспечения для редакционно-издательских
