    cymbal_set_configuration:
      name: Конфигурация набора тарелок
      description: Формат продажи (одна тарелка, подобранная пара или набор из нескольких
        пар).
    cymbal_sound_character:
      description: Общий тональный профиль тарелки. Используется для подбора (например,
        яркий или темный).
    cymbal_sustain:
      name: Длительность звучания тарелки
      description: Время звучания тарелки после удара.
    cymbal_type:
      name: Тип тарелки
      description: Функциональная роль тарелки, которую имитирует электронный пэд.
    cymbal_volume_level:
      name: Уровень громкости тарелки
      description: Воспринимаемая громкость или категория выходного уровня тарелки.
    cymbal_weight_class:
      name: Весовой класс тарелки
      description: Весовой класс тарелки. Влияет на тон, громкость и отклик.
    dairy_heat_treatment:
      name: Термическая обработка молочного продукта.
