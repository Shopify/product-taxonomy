    wheel_brake_type:
      name: Тип тормоза колеса
      description: Конфигурация тормозов на колесах или роликах тележки.
    wheel_chock_grip_features:
      name: Особенности сцепления противооткатного упора
      description: Конструктивные элементы сцепления, повышающие фиксацию на поверхности
