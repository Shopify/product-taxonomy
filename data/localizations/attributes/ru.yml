    watercraft_hull_material:
      name: Материал корпуса водного транспорта
      description: Основной материал конструкции корпуса.
    watercraft_ignition_part_voltage:
      name: Напряжение детали системы зажигания водного транспорта
      description: Номинальное напряжение детали системы зажигания (если применимо),
        например системы 12 В.
    watercraft_impeller_material_grade:
      name: Марка материала импеллера водного транспорта
      description: Материал импеллера (например, неопреновая резина, нитрил, бронза).
    watercraft_lighting_certification_compliance:
      name: Сертификация и соответствие освещения водного транспорта
      description: Соответствие нормативам и стандартам морского освещения (например,
        USCG, ABYC, COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Функции регулировки крепления мотора водного транспорта
      description: Возможности регулировки крепления (наклон, подъем, сдвиг), влияющие
