    oil_filler_cap_attachment_type:
      name: Тип крепления крышки маслозаливной горловины
      description: Способ крепления крышки маслозаливной горловины к двигателю или
        заливной горловине (например, резьбовое, байонетное/четверть оборота, запрессовка).
    oil_filler_cap_installation_position:
      name: Положение установки крышки маслозаливной горловины
      description: Место использования крышки (при наличии) нескольких точек заливки
        масла (например, клапанная крышка, выносная заливная трубка).
    oil_filler_cap_locking_type:
      name: Тип фиксации крышки маслозаливной горловины
      description: 'Тип фиксации крышки маслозаливной горловины: без блокировки или
        с запиранием/защищенным снятием (например, под ключ или инструмент). Помогает
        предотвратить несанкционированное вмешательство, кражу или случайное открытие.'
    oil_filler_cap_tether_type:
      name: Тип страховочного крепления крышки маслозаливной горловины
