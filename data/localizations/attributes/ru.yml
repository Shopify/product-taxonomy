      description: Материал внешних крышек октавной гармоники.
    octave_harmonica_tuning_system:
      name: Система настройки октавной гармоники
      description: Строй или темперация октавной гармоники.
    octoban_mounting_system_type:
      name: Тип системы крепления октобанов
