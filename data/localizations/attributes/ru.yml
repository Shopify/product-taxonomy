    watercraft_piston_part_type:
      name: Тип поршневой детали водного транспорта
      description: Поршневой компонент, к которому относится товар.
    watercraft_propeller_blade_rake:
      name: Угол наклона лопасти гребного винта водного транспорта
      description: Угол наклона лопасти относительно ступицы, влияющий на подъем носа
