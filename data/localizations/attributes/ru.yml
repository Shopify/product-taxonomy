      description: Предметы офисной мебели в комплекте, например стол или картотечный
        шкаф.
    oil_cooler_core_type:
      name: Тип сердцевины масляного радиатора
      description: Конструкция внутренней сердцевины масляного радиатора. Влияет на
        эффективность охлаждения, падение давления и долговечность.
    oil_cooler_mounting_style:
      name: Способ крепления масляного радиатора
      description: Способ установки масляного радиатора на транспортное средство.
    oil_dipstick_component_type:
      name: Тип компонента масляного щупа
      description: Компонент измерения уровня масла в продаже (например, только стержень
        щупа, только рукоятка, полный узел, трубка щупа и т. п.).
    oil_dipstick_measurement_markings:
      name: Измерительные метки масляного щупа
      description: Маркировка или шкала на масляном щупе для определения уровня масла.
    oil_dipstick_tube_mounting_type:
      name: Тип крепления трубки масляного щупа
      description: Способ крепления трубки масляного щупа к двигателю или блоку двигателя.
    oil_drain_plug_head_drive_type:
