    additional_cleaning_technology:
      name: Дополнительная технология очистки
      description: Все применяемые технологии очистки, помимо пара (например, ультразвуковая,
        УФ, озон).
    additional_design_software_type:
      name: Дополнительные функции программного обеспечения для дизайна
      description: Дополнительные возможности программного обеспечения для дизайна
        (например, создание виртуального тура или ландшафтный дизайн)
    additional_financial_software_features:
      name: Дополнительные функции финансового программного обеспечения
      description: Дополнительные возможности финансового программного обеспечения
