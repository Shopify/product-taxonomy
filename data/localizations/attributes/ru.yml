    putty_texture:
      name: Текстура пластилина
      description: Основные тактильные свойства пластилина (например упругий, тянущийся,
        текучий).
    puzzle_accessory_features:
      name: Функции аксессуаров головоломки
      description: Функциональные особенности и конструктивные элементы аксессуаров
        для пазлов (зависит от типа аксессуара).
    pyrometric_cone_range:
      name: Диапазон пирометрических конусов
      description: Рекомендуемые пирометрические конусы обжига глазури (например Cone
        06–04, Cone 5–6).
    quarter_panel_coverage_type:
      name: Тип покрытия четверти кузова
      description: Объем замены или ремонта области бокового крыла.
    quarter_panel_set_contents:
      name: Состав комплекта четверти кузова
      description: Конфигурация комплекта четверти кузова (одна сторона, пара или
        с дополнительными ремонтными секциями).
    quilting_ruler_markings:
      name: Разметка линейки для квилтинга
      description: Типы нанесенной разметки на линейке для квилтинга, используемой
        для резки и выравнивания.
    quilting_ruler_non_slip_feature:
      name: Противоскользящая поверхность линейки для квилтинга
      description: Наличие противоскользящей подложки или обработки поверхности для
        предотвращения смещения по ткани.
    quilting_ruler_transparency:
      name: Прозрачность линейки для квилтинга
      description: Прозрачность материала линейки для видимости ткани и разметки под
        ней.
    quilting_thread_usage:
      name: Назначение нити для квилтинга
      description: Предполагаемое применение нити для квилтинга (то, как ее следует
        использовать).
    quilting_thread_weight_system:
      name: Система измерения толщины нити для квилтинга
      description: Система обозначения размера/номинальной массы нити (wt, Tex, Denier).
        Позволяет правильно интерпретировать числовое обозначение.
    quince_variety:
      name: Сорт айвы
      description: Конкретный сорт или разновидность айвы, так как вкус, аромат и
        кулинарная пригодность различаются по сортам.
    quinoa_variety:
      name: Сорт киноа
      description: Конкретный цвет или сорт киноа. Разные сорта имеют свой вкус, текстуру
        и время приготовления.
    quinto_tuning_system:
      name: Система настройки квинто
      description: Способ настройки или натяжения квинто.
    race_car_class:
      name: Класс гоночного автомобиля
      description: Гоночная категория или класс, для которого создан автомобиль (регламент
        или омологационная группа).
    racing_balaclava_face_opening_style:
      name: Тип лицевого выреза гоночной балаклавы
      description: Конфигурация лицевого выреза балаклавы, влияющая на посадку шлема,
        герметичность и комфорт.
    racing_balaclava_neck_coverage_length:
      name: Длина защиты шеи гоночной балаклавы
      description: Длина шейной части, предназначенной для заправки в комбинезон или
        систему защиты шеи для герметичности и защиты.
    racing_balaclava_ventilation_zones:
      name: Вентиляционные зоны гоночной балаклавы
      description: Расположение дышащих или сетчатых зон для улучшения вентиляции
        под шлемом.
    racing_chest_guard_intended_use:
      name: Назначение нагрудника для автоспорта
      description: Основная дисциплина автоспорта или сценарий применения нагрудника.
    racing_chest_guard_size_type:
      name: Тип размера нагрудника для автоспорта
      description: 'Назначение продукта: для детей, взрослых или является универсальный/регулируемый.'
    racing_glove_certification_standard:
      name: Стандарт сертификации гоночных перчаток
      description: Сертификат безопасности или стандарт, требованиям которого соответствуют
        гоночные перчатки (например FIA, SFI, CE) и (при необходимости) класс или
        уровень защиты.
    racing_goggles_lens_system:
      name: Система линз гоночных очков
      description: Система смены линз или совместимость со срывными пленками очков.
    racing_helmet_certification_standard:
      name: Стандарт сертификации гоночного шлема
      description: Соответствие гоночного шлема стандартам безопасности.
    racing_kart_brake_type:
      name: Тип тормозной системы гоночного карта
      description: Основной тип тормозной системы, установленной на карт.
    racing_kart_class:
      name: Класс гоночного карта
      description: Гоночный класс или регламент, которому соответствует карт.
    racing_kart_frame_material:
      name: Материал рамы гоночного карта
      description: Основной материал рамы или шасси карта.
    racing_kart_seat_size:
      name: Размер сиденья гоночного карта
      description: Размер сиденья карта для подбора посадки.
    racing_neck_support_style:
      name: Тип шейной поддержки для гонок
      description: Конструктивный тип шейной поддержки и способ взаимодействия с телом
        пилота и шлемом.
    racing_suit_certification_standard:
      name: Стандарт сертификации гоночного костюма
      description: Сертификация или омологация гоночного костюма (например, FIA или
        SFI).
    racing_suit_cuff_design:
      name: Конструкция манжет гоночного костюма
      description: Тип манжет на запястьях и лодыжках для сопряжения с перчатками
        и ботинками и улучшения герметичности и комфорта.
    racing_suit_size_system:
      name: Система размеров гоночного костюма
      description: Система размеров костюма (например S-XXL, EU/US, детская).
    racing_truck_discipline:
      name: Дисциплина гоночного грузовика
      description: Основная гоночная дисциплина или формат, для участия в которых
        предназначен грузовик.
    rack_side_configuration:
      name: Конфигурация стороны стойки
      description: 'Хранение ковриков в стеллаже: с одной стороны или с обеих. Влияет
        на эффективность использования пространства и удобство доступа.'
    rack_system_configuration:
      name: Конфигурация системы стойки
      description: Описание общей компоновки или формы системы стойки.
    racket_dampener_type:
      name: Тип демпфера ракетки
      description: Механизм установки или функциональный тип виброгасителя ракетки.
    racket_grip_size:
      name: Размер рукоятки ракетки
      description: Классификация размера рукоятки ракетки по окружности (например
        G1–G6) для правильной посадки и комфорта.
    racket_sport_shoe_court_surface:
      name: Поверхность корта для обуви ракеточного спорта
      description: Тип покрытия теннисного корта, для которого разработана или оптимизирована
        обувь. Помогает выбрать обувь с подходящим рисунком подошвы и составом резины.
    racket_string_pattern:
      name: Струнная схема ракетки
      description: Количество продольных и поперечных струн в струнной сетке (например
        16 x 18). Влияет на контроль, вращение и долговечность.
    racket_stringing_status:
      name: Состояние натяжки ракетки
      description: 'Состояние ракетки при продаже: со струнами, без струн или с предварительно
        натянутыми струнами.'
    racket_weight_class:
      name: Класс веса ракетки
      description: Стандартные весовые категории «U» для бадминтона. Позволяет игрокам
        выбирать ракетки в пределах предпочитаемого ими диапазона массы.
    racquet_toy_set_equipment_included:
      name: Комплектация набора ракеток-игрушек
      description: Перечень предметов, входящих в набор (например сетка, мячи, ракетки).
    racquetball_squash_training_aid_type:
      name: Тип тренажёра для рэкетбола и сквоша
      description: Классификация тренировочного аксессуара для быстрого поиска.
    radiator_cap_gasket_material:
      name: Материал прокладки крышки радиатора
      description: Материал уплотнительных прокладок крышки радиатора.
    radiator_cap_pressure_relief_style:
      name: Тип сброса давления крышки радиатора
      description: Тип сброса давления/вентиляции крышки радиатора. Влияет на эксплуатацию,
        безопасность и область применения.
    radiator_expansion_tank_cap_application:
      name: Применение крышки радиатора или расширительного бачка
      description: 'Назначение крышки: горловина радиатора или расширительный бачок.'
    radiator_fan_control_type:
      name: Тип управления вентилятором радиатора
      description: Способ управления вентилятором радиатора.
    radiator_fan_mounting_pattern:
      name: Монтажная схема вентилятора радиатора
      description: Схема крепления вентилятора или узла вентилятора.
    radiator_fan_type:
      name: Тип вентилятора радиатора
      description: Функциональный тип/конфигурация вентилятора радиатора.
    radiator_hose_end_type:
      name: Тип конца шланга радиатора
      description: Основной тип соединения или уплотнения на конце шланга радиатора
        для подключения к радиатору или двигателю.
    radiator_hose_position:
      name: Положение шланга радиатора
      description: Функциональное положение шланга в системе охлаждения.
    radiator_hose_shape:
      name: Форма шланга радиатора
      description: Общая геометрия или форма шланга для прокладки и установки.
    radiator_overflow_tank_level_sensor_provision:
      name: Предусмотрен датчик уровня расширительного бачка радиатора
      description: Наличие или поддержка датчика уровня охлаждающей жидкости.
    radiator_overflow_tank_shape:
      name: Форма расширительного бачка радиатора
      description: Общий формфактор корпуса расширительного бачка.
    radish_variety:
      name: Разновидность редиса
      description: Сорт или тип редиса. Помогает покупателям выбрать конкретные характеристики
        вкуса, цвета или размера (например, дайкон, «Арбуз», «Французский завтрак»).
    radius_of_hollow:
      name: Радиус желоба
      description: Профиль желоба лезвия, создаваемый точилкой, выраженный в виде
        распространенных фиксированных размеров или плоского профиля.
    rail_coverage_configuration:
      name: Конфигурация покрытия бортиков
      description: 'Части детской кроватки, которые защищает комплект накладок. Формат
        покупки: одна передняя панель или многокомпонентный комплект для всего периметра.'
    rail_mount_standard:
      name: Стандарт крепления на планку
      description: Стандарт планки или монтажного интерфейса, используемый для крепления
        аксессуара (например, прицела, фонаря) к пневматическому оружию.
    rail_side:
      name: Сторона планки
      description: Сторона установки сменной планки. Указывает, предназначена ли она
        для левой стороны, правой стороны или продается парой.
    rail_style:
      name: Стиль рейла
      description: Общая конструкция или конфигурация рейла (например, А-образная,
        радужная, изогнутая). Определяет возможности для трюков и требуемое пространство.
    rail_system:
      name: Система планок
      description: Монтажный интерфейс для аксессуаров, предусмотренный на оружии
        (например, Picatinny, M-LOK).
    rain_sensor_technology:
      name: Технология датчика дождя
      description: Принцип срабатывания датчика, используемый для обнаружения воды
        на лобовом стекле.
    rain_suit_configuration:
      name: Конфигурация дождевого костюма
      description: Конфигурация изделия. Указывает, является ли товар цельным комбинезоном,
        многопредметным комплектом или имеет другую конфигурацию.
    rainstick_construction_type:
      name: Тип конструкции рейнстика
      description: Конструкция рейнстика (традиционная трубка из кактуса/дерева или
        современные альтернативы).
    rainstick_fill_material:
      name: Материал наполнения рейнстика
      description: Внутренний наполнитель, используемый для создания каскадного звучания
        (например, семена, бусины).
    rainstick_playing_technique:
      name: Техника игры на рейнстике
      description: Рекомендуемая техника игры или способ обращения с инструментом.
        Помогает получить задуманный эффект при игре на рейнстике.
    rainstick_sound_character:
      name: Характер звучания рейнстика
      description: Общий характер звучания, создаваемого рейнстиком.
    raising_method:
      name: Способ выращивания
      description: Способ выращивания и откорма животных до переработки (например,
        травяной откорм, пастбищное выращивание, зерновой откорм).
    rally_competition_class:
      name: Класс раллийных соревнований
      description: Класс по регламенту организатора или своду правил, в соответствии
        с которым построен раллийный автомобиль (если известно).
    rally_surface_setup:
      name: Настройка под покрытие ралли
      description: Основное покрытие или тип местности, на который рассчитаны настройка
        или конфигурация раллийного автомобиля.
    ramp_surface_texture:
      name: Текстура поверхности рампы
      description: Отделка поверхности или уровень сцепления поверхности рампы.
    ratchet_mounting_style:
      name: Стиль крепления трещотки
      description: Способ удержания или крепления музыкальной трещотки во время игры
        или установки.
    rattle_element_material:
      name: Материал элементов трещотки
      description: Материал гремящих элементов (например, зубцов, бубенчиков, бусин),
        создающих характерное жужжание или дребезжание.
    rattle_type:
      name: Тип погремушки
      description: Наличие внутренней погремушки или звуковой камеры в приманке, а
        при наличии — используемый тип погремушки.
    rc_airship_lifting_gas_type:
      name: Тип подъемного газа для радиоуправляемого дирижабля
      description: Газ, которым предполагается наполнять оболочку дирижабля или аэростата
        (если применимо).
    rc_helicopter_control_frequency:
      name: Частота управления радиоуправляемым вертолетом
      description: Диапазон радиочастот, используемый между пультом и вертолетом.
        Влияет на устойчивость к помехам и совместимость (например, 2,4 ГГц).
    rc_helicopter_stabilization_features:
      name: Функции стабилизации радиоуправляемого вертолета
      description: Функции стабилизации и помощи в управлении. Облегчают полет или
        расширяют возможности.
    rc_motorcycle_controller_type:
      name: Тип контроллера радиоуправляемого мотоцикла
      description: Формфактор входящего в комплект контроллера.
    rc_plane_takeoff_launch_method:
      name: Способ взлета или запуска радиоуправляемого самолета
      description: Типичный способ запуска или взлета самолета. Влияет на то, где
        и как его можно использовать.
    rc_vehicle_controller_type:
      name: Тип контроллера радиоуправляемого транспортного средства
      description: Формфактор контроллера, используемого для управления радиоуправляемым
        транспортным средством.
    rc_vehicle_scale:
      name: Масштаб радиоуправляемого транспортного средства
      description: Масштаб (класс размера) радиоуправляемого автомобиля или грузовика
        (например, 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Тип местности для радиоуправляемого транспортного средства
      description: Основной тип местности, для которой предназначен радиоуправляемый
        автомобиль или грузовик.
    reach_adjustment_type:
      name: Тип регулировки вылета
      description: 'Возможность регулировки расстояния между рычагом и рулем, а при
        наличии регулировки — ее тип: без инструмента или с использованием инструмента.'
    rear_axle_spacing:
      name: Ширина задней оси
      description: Размер дропаута или оси, который рассчитана принять задняя часть
        рамы. Влияет на совместимость с колесом.
    rear_axle_standard:
      name: Стандарт задней оси
      description: Интерфейс или формат оси, используемый на заднем колесе (например,
        эксцентрик, различные размеры сквозной оси).
    rear_axle_type:
      name: Тип задней оси
      description: Система крепления и диаметр оси, используемые для фиксации заднего
        колеса к раме.
    rear_coverage:
      name: Степень закрытости сзади
      description: Степень покрытия ягодиц плавками бикини (например, частичное, полное).
    rear_opening_type:
      name: Тип заднего отверстия
      description: Конструкция заднего доступа или клапана для удобного посещения
        туалета, например откидная задняя часть или полная задняя молния.
    rear_seat_configuration:
      name: Конфигурация заднего сиденья
      description: Конфигурация заднего сиденья для подбора совместимости и выбора
        компоновки салона.
    rear_view_mirror_ornament_attachment_type:
      name: Тип крепления украшения к зеркалу заднего вида
      description: Способ крепления украшения к ножке или корпусу зеркала заднего
        вида (например, петля из шнурка, клипса, крючок).
    rearview_mirror_mount_attachment_type:
      name: Тип крепления зеркала заднего вида
      description: Способ физического крепления держателя к узлу зеркала заднего вида
        (корпусу зеркала или ножке), например зажим, клипса, ремешок, клейкая площадка
        или кронштейн на болтах.
    rebound_board_face_type:
      name: Тип поверхности доски для отскока
      description: Конфигурация поверхности, определяющая характер отскока, например
        плоская, наклонная или многогранная.
    rebound_level:
      name: Уровень отскока
      description: Степень отскока мяча от стены после удара. Помогает пользователям
        выбирать между моделями без отскока и с умеренным отскоком.
    rebound_surface_configuration:
      name: Конфигурация поверхности отскока
      description: Расположение поверхностей отскока и предсказуемость отскоков (односторонняя,
        двусторонняя или многогранная; предсказуемые или непредсказуемые).
    rebounder_design:
      name: Конструкция тренажера для отскока
      description: Конструктивный стиль или конфигурация поверхности отскока изделия.
    rebounder_design_type:
      name: Тип конструкции ребаундера
      description: Основной механизм отскока или стиль конструкции тренажера (например,
        основание с эластичными шнурами, сетка в раме, всплывающая мишень).
    rebounder_sides:
      name: Стороны ребаундера
      description: Возможность возврата мячей одной или двумя сторонами ребаундера.
    rebounding_mechanism_type:
      name: Тип механизма отскока
      description: Технология возврата шайбы или мяча (например, резиновый бампер,
        эластичный шнур).
    recipient_relationship:
      name: Отношение к получателю
      description: Отношение к предполагаемому получателю (например, мама, папа, друг)
        для поздравительной открытки.
    recliner_control_type:
      name: Тип управления креслом-реклайнером
      description: Способ управления механизмом откидывания (например, ручной рычаг,
        электрическая кнопочная панель, пульт).
    recliner_motion_type:
      name: Тип движения кресла-реклайнера
      description: Основная функция движения кресла-реклайнера (например, качание,
        скольжение, вращение, компактное откидывание у стены, подъем).
    reclining_mechanism:
      name: Механизм откидывания
      description: Механизм, используемый для приведения в действие функции откидывания
        дивана.
    recommended_candle_format:
      name: Рекомендуемый формат свечи
      description: Рекомендуемые форматы свечей, для которых предназначены эти самоклеящиеся
        держатели фитиля.
    recommended_container_type:
      name: Рекомендуемый тип контейнера
      description: Материалы контейнеров, которые рекомендуются или безопасны для
        свечей из гелевого воска.
    recommended_fabric_type:
      name: Рекомендуемый тип ткани
      description: Рекомендуемые ткани для достижения наилучшего результата с этой
        выкройкой.
    recommended_fabric_weight:
      name: Рекомендуемая плотность ткани
      description: Рекомендуемая категория плотности ткани для этой выкройки.
    recommended_food_pairing:
      name: Рекомендуемое сочетание с блюдами
      description: Основные виды белка или блюда, для которых предназначен соус (например,
        курица, свинина, говядина, рыба, овощи).
    recommended_lane_condition:
      name: Рекомендуемое состояние дорожки
      description: Масляный рисунок или состояние дорожки, для которых предназначен
        шар.
    recommended_motor_impulse_class:
      name: Рекомендуемый класс импульса двигателя
      description: Рекомендуемый класс полного импульса двигателя для модели ракеты
        для безопасного или оптимального полета.
    recommended_reading_level:
      name: Рекомендуемый уровень чтения
      description: Рекомендуемый этап или уровень чтения для товара. Помогает покупателям
        подобрать его в соответствии с текущим развитием навыков чтения у ребенка.
    recommended_sleep_position:
      name: Рекомендуемое положение для сна
      description: Положения для сна, которые матрас рассчитан комфортно поддерживать
        (например, сон на боку или на спине).
    recommended_storage:
      name: Рекомендуемые условия хранения
      description: Способ хранения товара для сохранения свежести.
    recommended_surfaces:
      name: Рекомендуемые поверхности
      description: 'Поверхности или категории материалов, для которых предназначен
        клей (помимо общей пригодности для рукоделия): например, только бумага или
        разные поверхности.'
    recommended_use_case:
      name: Рекомендуемый сценарий использования
      description: Основной предполагаемый сценарий использования герметика (временный
        или аварийный либо более долговременный ремонт).
    recommended_use_location:
      name: Рекомендуемое место использования
      description: Предполагаемая среда использования качелей-балансира (домашний
        задний двор, коммерческая игровая площадка и т. п.).
    recommended_vehicle_surfaces:
      name: Рекомендуемые поверхности автомобиля
      description: Поверхности или типы отделка поверхности автомобиля, для которых
        щетка считается безопасной (например, лакокрасочное покрытие с прозрачным
        лаком, матовая или сатиновая краска, виниловая пленка/PPF, стекло, колеса).
    recorder_accessories_included:
      name: Аксессуары блокфлейты
      description: Входящие в комплект аксессуары, поставляемые с большой басовой
        блокфлейтой.
    recorder_bore_design:
      name: Конструкция канала блокфлейты
      description: Конструкция внутреннего профиля канала корпуса блокфлейты.
    recorder_bore_type:
      name: Тип канала блокфлейты
      description: Стиль канала блокфлейты.
    recorder_case_shell_type:
      name: Тип корпуса футляра блокфлейты
      description: Структурная жесткость футляра.
    recorder_finish:
      name: Отделка блокфлейты
      description: Отделка поверхности или обработка корпуса блокфлейты (особенно
        актуально для деревянных альтовых блокфлейт).
    recorder_hole_type:
      name: Тип отверстий блокфлейты
      description: 'Конфигурация игровых отверстий: одинарные (без двойных отверстий)
        или с двойными отверстиями для улучшенной хроматической аппликатуры.'
    recorder_joint_configuration:
      name: Конфигурация секций блокфлейты
      description: Количество секций корпуса блокфлейты. Влияет на портативность,
        очистку и замену частей.
    recorder_joint_style:
      name: Тип соединения секций блокфлейты
      description: Тип соединения между секциями блокфлейты, если применимо.
    recorder_keywork:
      name: Клапанный механизм блокфлейты
      description: Наличие клапанов (металлических или пластиковых механизмов) для
        низких нот, характерных для теноровых, басовых и крупных блокфлейт.
    recorder_mouthpiece_type:
      name: Тип мундштука блокфлейты
      description: 'Конструкция мундштука или головной части блокфлейты: встроенная
        (цельная) или съемная/сменная.'
    recorder_pitch_standard_a4:
      name: Стандарт строя блокфлейты (A4)
      description: Опорная высота строя, под которую изготовлена блокфлейта (например,
        A=440 Гц для современного строя или A=415 Гц для барочного строя).
    recorder_thumb_hole_type:
      name: Тип отверстия для большого пальца блокфлейты
      description: 'Конструкция отверстия для большого пальца: одинарное отверстие
        или двойное отверстие.'
    recreational_vehicle_holding_tank_type:
      name: Тип накопительного бака автодома
      description: Типы накопительных баков для отходов, предусмотренные в автодоме.
    recreational_vehicle_leveling_system:
      name: Система выравнивания автодома
      description: Тип установленной системы выравнивания или стабилизации.
    recycled_material_content:
      name: Содержание переработанных материалов
      description: Доля изделия, изготовленная из переработанных волокон или нитей.
    reed_dent_material:
      name: Материал зубьев берда
      description: Материал зубьев берда (элементов, разделяющих нити основы). Влияет
        на долговечность и истирание пряжи.
    reed_type:
      name: Тип трости
      description: Тип конструкции трости, используемой в чантере и бурдонах волынки.
    reeds_included:
      name: Входящие в комплект трости
      description: 'Трости, входящие в комплект шотландских волынок Great Highland
        (для чантера и/или бурдонов), а также их тип: тростниковые или синтетические.'
    reefing_method:
      name: Метод рифления
      description: Механизм уменьшения площади паруса или его уборки на воде, если
        предусмотрен.
    reel_profile:
      name: Профиль катушки
      description: Конструктивный стиль или профиль корпуса мультипликаторной катушки.
    reel_seat_material:
      name: Материал катушкодержателя
      description: Конструкционный материал катушкодержателя. Влияет на вес, чувствительность
        и устойчивость к коррозии.
    reel_seat_type:
      name: Тип катушкодержателя
      description: Тип фиксирующего механизма, удерживающего нахлыстовую катушку на
        удилище.
    reel_size_class:
      name: Класс размера катушки
      description: Обозначение размера по классификации производителя (например, 1000,
        3000, 5000). Указывает на вместимость шпули и общий класс конструкции катушки.
    referee_wallet_accessories_included:
      name: Входящие в комплект аксессуары кошелька судьи
      description: Дополнительные предметы, входящие в комплект с кошельком судьи,
        например красные и желтые карточки, карточки для записи счета или письменные
        принадлежности. Помогает покупателям понять, продается ли кошелек как полный
        комплект.
    refinement_level:
      name: Степень рафинации
      description: Степень очистки масла. Влияет на вкус, цвет, пищевую ценность и
        точку дымления.
    reflective_finish:
      name: Светоотражающая отделка
      description: Тип светоотражающей отделка поверхности диско-шара (например, зеркальная
        плитка или голографические/перламутровые эффекты).
    reflective_or_glow_effect:
      name: Светоотражающий или светящийся эффект
      description: Наличие у шарика на антенну эффектов видимости, таких как светоотражающий
        материал, свечение в темноте или светящиеся/LED-элементы.
    reflective_tape_pattern:
      name: Схема расположения светоотражающей ленты
      description: Конфигурация светоотражающей ленты на одежде, используемая для
        соответствия требованиям видимости.
    regulation_standard:
      name: Стандарт регламента
      description: Официальный стандарт или размеры/сертификация руководящего органа,
        которым соответствует сетка.
    regulator_diaphragm_material:
      name: Материал мембраны регулятора
      description: Материал мембраны. Влияет на совместимость с топливом или этанолом
        (например, E85) и долговечность.
    regulator_port_thread_standard:
      name: Стандарт резьбы портов регулятора
      description: Стандарт резьбы или соединения входного, выходного и обратного
        портов на корпусе регулятора.
    rein_features:
      name: Характеристики поводьев
      description: Особые функциональные или защитные особенности поводьев.
    rein_style:
      name: Стиль поводьев
      description: Конструктивное исполнение или конфигурация поводьев. Помогает всадникам
        выбрать подходящий тип для своей дисциплины и личных предпочтений.
    reinforced_areas:
      name: Усиленные зоны
      description: Части изделия, усиленные для долговечности и защиты от истирания.
    reinforcement_type:
      name: Тип армирования
      description: Конструкционное армирование, используемое в радиаторном шланге
        для прочности и устойчивости к температуре и давлению.
    release_activation_method:
      name: Способ активации релиза
      description: Способ срабатывания релиза в стрельбе из лука со стороны стрелка.
    release_bearing_material:
      name: Материал опорной части релиза
      description: Основной материал опорных или контактных компонентов (если указан
        производителем).
    release_jaw_style:
      name: Тип губок релиза
      description: Конструкция губок или крюка головки релиза.
    release_strap_type:
      name: Тип ремешка релиза
      description: Ремешок или система крепления, входящие в комплект с релизом для
        стрельбы из лука.
    remote_control_airship_envelope_material:
      name: Материал оболочки радиоуправляемого дирижабля
      description: Основной материал оболочки дирижабля или аэростата (газового баллона),
        отдельно от общего материала игрушки.
    remote_control_motorcycle_scale:
      name: Масштаб радиоуправляемого мотоцикла
      description: Масштаб радиоуправляемого мотоцикла относительно реального мотоцикла
        (если модель выполнена в масштабе).
    remote_control_motorcycle_terrain_suitability:
      name: Пригодность радиоуправляемого мотоцикла для местности
      description: Основной тип местности, для которой предназначен радиоуправляемый
        мотоцикл.
    remote_control_motorcycle_water_resistance:
      name: Водозащита радиоуправляемого мотоцикла
      description: Уровень защиты электроники радиоуправляемого мотоцикла от воды.
    remote_control_plane_kit_completion_level:
      name: Степень комплектности набора радиоуправляемого самолета
      description: Состав комплекта и степень его завершенности (например, готов к
        полетами или вариант, требующий отдельного передатчика, приемника или аккумулятора).
    remote_control_plane_landing_gear_type:
      name: Тип шасси радиоуправляемого самолета
      description: Конфигурация шасси. Влияет на долговечность и поверхности, подходящие
        для взлета и посадки.
    remote_control_plane_power_type:
      name: Тип привода радиоуправляемого самолета
      description: Способ питания или привода самолета (электрический, калильный,
        бензиновый или нитро). Влияет на обслуживание, уровень шума и места эксплуатации.
    remote_control_watercraft_features:
      name: Особенности радиоуправляемого водного транспорта
      description: Ключевые особенности радиоуправляемого водного транспорта. Влияют
        на удобство использования и долговечность.
    remote_control_watercraft_propulsion_drive_type:
      name: Тип привода радиоуправляемого водного транспорта
      description: Способ движения радиоуправляемого водного транспорта по воде.
    remote_control_watercraft_water_environment:
      name: Водная среда для радиоуправляемого водного транспорта
      description: Предполагаемые водные условия, в которых радиоуправляемый водный
        транспорт показывает наилучшие характеристики.
    remote_keyless_system_programming_method:
      name: Способ программирования системы дистанционного бесключевого доступа
      description: Способ программирования или сопряжения пульта/системы с автомобилем
        (например, встроенная процедура или профессиональный инструмент).
    repair_compound_type:
      name: Тип ремонтного состава
      description: Тип или состав входящего в комплект ремонтного материала (например,
        шпаклевки для кузова, смолы для лобового стекла, цемента или герметика для
        жгутов шин).
    repair_kit_components:
      name: Компоненты ремонтного комплекта
      description: Конкретные предметы, входящие в ремонтный комплект. Помогает покупателям
        понять состав и сравнить наборы.
    repair_method:
      name: Метод ремонта
      description: Основной подход к ремонту, используемый комплектом, например самоклеящиеся
        заплатки или замена клапана.
    replacement_part_purpose:
      name: Назначение запасной части
      description: 'Категория изделия: оригинальная сменная деталь OEM, деталь для
        модернизации или повышения производительности либо дополнительный аксессуар.'
    replacement_part_type:
      name: Тип сменной детали
      description: Функциональная категория детали эллиптического тренажера. Позволяет
        покупателям отфильтровать нужный компонент.
    replacement_parts_availability:
      name: Наличие сменных деталей
      description: Наличие поддержки расходных или сменных деталей для нитевдевателя
        (например, сменных крючков или проволок).
    replica_gun_action_type:
      name: Тип механизма реплики оружия
      description: Тип действия или механизма реплики огнестрельного оружия (в представленном
        виде), например продольно-скользящий затвор или рычажный механизм.
    replica_gun_firing_mechanism:
      name: Имитируемый механизм стрельбы реплики оружия
      description: Наличие и способ имитации стрельбы или работы реплики (без поражающего
        действия), например стрельба пистонами или отсутствие функции стрельбы.
    replica_gun_moving_parts:
      name: Подвижные части реплики оружия
      description: Функциональные или подвижные части реплики.
    reservoir_orientation:
      name: Ориентация резервуара
      description: Предусмотренная ориентация или профиль гидратора внутри рюкзака.
    reservoir_type:
      name: Тип резервуара
      description: Тип конфигурации резервуара для главного цилиндра сцепления.
    resin_suitability:
      name: Пригодность для использования смолы
      description: Пригодность гандбольного мяча для использования со смолой (клеем)
        или отсутствие необходимости в смоле.
    resistance_adjustability:
      name: Регулируемость сопротивления
      description: Возможность изменения сопротивления дыханию пользователем.
    resistance_band_design:
      name: Конструкция эспандерной ленты
      description: Физическая форма или стиль эспандерной ленты (например, петля,
        трубка с ручками, в виде цифры 8). Помогает покупателям выбрать подходящую
        конструкцию для своей программы упражнений.
    resistance_loading_type:
      name: Тип нагрузки сопротивления
      description: Способ создания или загрузки сопротивления/веса на тренажере Смита
        (например, дисковая нагрузка или селекторный стек грузов).
    response_fields_included:
      name: Входящие в комплект поля ответа
      description: Стандартные поля или варианты ответа, предусмотренные на карточке
        ответа (например, принять/отклонить, выбор блюда).
    restoration_status:
      name: Статус реставрации
      description: 'Состояние фургона: оригинальное, отреставрированное, реставмод
        или проектное.'
    rhinestone_base_color_family:
      name: Цветовая группа основы страза
      description: Цветовая группа основы страза (например, прозрачная/хрустальная,
        золотая/желтая, синяя).
    rhinestone_facet_style:
      name: Стиль огранки страза
      description: Рисунок лицевой поверхности или граней страза. Влияет на блеск
        и внешний вид (например, Xilion rose, бриллиантовая огранка, граненая или
        гладкая поверхность).
    rhinestone_hole_reinforcement_material:
      name: Материал усиления отверстий страза
      description: Материал вокруг отверстий или в местах отверстий (например, металлический
        люверс, формованный пластик). Влияет на долговечность при пошиве.
    rhinestone_setting_type:
      name: Тип закрепки страза
      description: Способ крепления или окантовки камня для пришивания (например,
        на штифтах, в ободке, в оправе).
    rhubarb_product_cut_type:
      name: Тип нарезки продукта из ревеня
      description: Физическая подготовка или тип нарезки продукта из ревеня.
    ribbon_construction:
      name: Конструкция ленты
      description: Основные конструктивные особенности репсовой ленты, например наличие
        проволоки или эластичности. Определяет варианты использования (например, для
        бантов или для шитья).
    ribbon_packaging_type:
      name: Тип упаковки ленты
      description: Форма поставки или продажи ленты.
    ribbon_pattern_style:
      name: Стиль рисунка ленты
      description: Способ нанесения рисунка, обычно используемый на репсовой ленте.
    ribbon_sheen_level:
      name: Степень блеска ленты
      description: Визуальная степень блеска или глянца поверхности атласной ленты.
    ribbon_style:
      name: Стиль ленты
      description: Визуальный рисунок или стиль ленты (например, однотонная, полосатая,
        трехцветная).
    ribbon_trim_backing_type:
      name: Тип основы ленты или отделки
      description: Наличие основы у ленты или отделки и ее тип. Обеспечивает удобство
        нанесения.
    ribbon_trim_edge_finish:
      name: Отделка края ленты или тесьмы
      description: Конструкция или отделка края ленты или тесьмы. Помогает понять
        склонность к осыпанию и предполагаемое применение.
    ric_rac_wave_size:
      name: Размер волны тесьмы зигзаг
      description: Амплитуда или масштаб волны тесьмы зигзаг (насколько велики зигзаги
        или волны).
    rice_grain_length:
      name: Длина зерна риса
      description: Классификация риса по длине зерна, например короткозерный, среднезерный
        или длиннозерный. Влияет на кулинарные свойства и использование.
    rice_processing_method:
      name: Метод обработки риса
      description: Способ обработки или подготовки риса (например, пропаренный, пророщенный,
        плющеный). Влияет на время приготовления, пищевую ценность и использование.
    rice_variety:
      name: Сорт риса
      description: Конкретный сорт или разновидность риса. Помогает покупателям выбрать
        зерно с предпочтительными вкусом, ароматом, текстурой и подходящей кухней.
    riding_toy_features:
      name: Особенности игрушки для катания
      description: Распространенные функциональные или защитные особенности, характерные
        для игрушек для катания.
    rifle_action_type:
      name: Тип механизма винтовки
      description: Рабочий механизм винтовки (способ заряжания, стрельбы и экстракции).
        Важен для идентификации и коллекционного интереса.
    rifle_finish:
      name: Отделка винтовки
      description: Основная внешняя отделка или покрытие металлических частей.
    rifle_magazine_type:
      name: Тип магазина винтовки
      description: Тип системы подачи патронов у винтовки.
    rifle_stock_material:
      name: Материал ложи винтовки
      description: Основной материал, используемый для ложи или фурнитуры винтовки
        (например, орех, полимер).
    rim_clamping_method:
      name: Способ зажима обода
      description: Способ фиксации колеса или обода станком во время монтажа и демонтажа.
    rim_strip_type:
      name: Тип ободной ленты
      description: Классификация ленты по стилю, конструкции или конкретному назначению
        (например, бескамерная ободная лента или защитная резиновая лента).
    rim_tubeless_compatibility:
      name: Совместимость обода с бескамерной системой
      description: Совместимость обода, ленты или колеса с бескамерными шинами.
    ripeness_stage:
      name: Стадия спелости
      description: Степень зрелости фрукта на момент продажи (например, незрелый,
        спелый, готовый к употреблению).
    riser_pad_type:
      name: Тип проставки райзера
      description: Функциональный тип проставки (например, стандартная прокладка,
        амортизирующая, угловой клин).
    roasted_malt_processing_type:
      name: Тип обработки жареного солода
      description: Конкретный способ обработки или разновидность, используемые для
        получения жареного солода или жареного зерна (например, несоложеный жареный
        ячмень, черный солод, варианты с пониженной горечью или без шелухи).
    robotic_toy_interaction_mode:
      name: Режим взаимодействия роботизированной игрушки
      description: Основной способ взаимодействия или движения робота во время игры.
    robotic_toy_light_features:
      name: Функции подсветки робота-игрушки
      description: Наличие и способ использования света в игрушке как части игрового
        процесса (например, LED-подсветка, проекция).
    robotic_toy_programming_supported:
      name: Поддержка программирования роботизированной игрушки
      description: Поддерживаемый игрушкой способ программирования, если он предусмотрен.
    robotic_toy_skill_level:
      name: Уровень навыков для роботизированной игрушки
      description: Ожидаемый от пользователя уровень сложности управления или программирования.
    robotic_toy_sound_features:
      name: Звуковые функции роботизированной игрушки
      description: Звуковые возможности роботизированной игрушки.
    rod_butt_style:
      name: Стиль комля удилища
      description: Конфигурация комлевой части удилища, используемой при троллинге.
    rod_construction_type:
      name: Тип конструкции удилища
      description: Общий конструктивный стиль удилища по количеству секций и возможности
        складывания.
    rod_guide_material:
      name: Материал колец удилища
      description: Материал колец или вставок рыболовного удилища. Влияет на долговечность,
        вес и трение лески.
    rod_guide_type:
      name: Тип колец удилища
      description: Основной тип колец, установленных на удилище.
    rod_handle_type:
      name: Тип рукоятки удилища
      description: Конфигурация рукоятки рыболовного удилища. Помогает выбрать комфортный
        вариант и подходящую технику ловли.
    roll_cage_tubing_material:
      name: Материал труб каркаса безопасности
      description: Материал или сплав труб, используемых для каркаса безопасности
        или дуги безопасности (например, сталь DOM или хромомолибден 4130).
    roller_skate_brake_shape:
      name: Форма тормоза роликовых коньков
      description: Геометрическая форма или профиль тормозной колодки для эксплуатационных
        или эстетических предпочтений.
    roller_skate_brake_type:
      name: Тип тормоза роликовых коньков
      description: Тормозная система, используемая на роликовых коньках.
    roller_ski_technique:
      name: Техника катания на лыжероллерах
      description: Техника беговых лыж, для которой предназначены лыжероллеры.
    roller_technology:
      name: Технология роллера
      description: Встроенная технология, улучшающая массажное воздействие, например
        вибрация или нагрев.
    rolling_case_wheel_configuration:
      name: Конфигурация колес кейса на колесах
      description: Конфигурация колес, используемая в кейсах для музыкальных клавишных
        инструментов на колесах.
    rolling_paper_format:
      name: Формат бумаги для самокруток
      description: Физическая форма представления товара (например, плоские листы,
        предварительно свернутые конусы, обертки).
    rolling_paper_gum_type:
      name: Тип клеевого слоя бумаги для самокруток
      description: Клейкий состав, используемый на крае бумаги для склеивания. Влияет
        на вкус и эксплуатационные свойства.
    rolling_paper_size:
      name: Размер бумаги для самокруток
      description: Стандартная классификация размера бумаги для самокруток или конуса.
        Позволяет покупателям быстро выбрать нужную ширину и длину.
    rolling_stock_type:
      name: Тип подвижного состава
      description: Вид железнодорожного транспортного средства, представленного моделью
        (локомотив, пассажирский или грузовой вагон, а также распространенные подтипы
        вагонов).
    roof_cargo_net_hook_fastener_style:
      name: Стиль крюков или крепежа сетки для груза на крыше
      description: Тип концевой фурнитуры, используемой для крепления сетки к точкам
        фиксации (например, S-образный крюк, карабин, J-образный крюк).
    roof_height_class:
      name: Класс высоты крыши
      description: Категория высоты крыши, обычно используемая для фургонов (особенно
        актуально для переоборудования и кемперных проектов).
    roof_type:
      name: Тип крыши
      description: Конфигурация крыши или потолочной части корпуса.
    root_variety:
      name: Разновидность корнеплода
      description: Разновидность или распространенный тип корнеплода (например, хрен
        или разновидности настоящего васаби).
    rope_buoyancy:
      name: Плавучесть веревки
      description: Плавучесть веревки на поверхности воды. Помогает райдерам избегать
        запутывания и упрощает извлечение.
    rope_construction:
      name: Конструкция веревки
      description: Особенности конструкции волокон помимо типа плетения, например
        крученый или плетеный сердечник/оболочка, а также принадлежность веревки к
        типу kernmantle.
    rope_material:
      name: Материал веревки
      description: Материал настроечной веревки или шнура.
    rope_strand_compatibility:
      name: Совместимость с типами веревки
      description: Конфигурации веревки, с которыми может работать страховочное устройство
        (одинарная, полудвойная/двойная, сдвоенная или их комбинации).
    rope_stretch_type:
      name: Тип растяжения веревки
      description: Характеристики растяжения веревки с различением нерастяжимой, малорастяжимой,
        стандартной или эластичной конструкции.
    rose_bloom_stage:
      name: Стадия раскрытия розы
      description: Степень раскрытия бутонов роз при доставке или получении (от бутона
        до полностью раскрытого цветка).
    rose_grade:
      name: Сортность роз
      description: Коммерческая категория качества срезанных роз.
    rosette_center_type:
      name: Тип центрального элемента розетки
      description: Тип центральной детали или вставки на лицевой стороне розетки.
    rosin_dust_level:
      name: Уровень пыли от канифоли
      description: Ожидаемое количество пыли от канифоли при обычном использовании.
    rosin_formula_additives:
      name: Формула канифоли/добавки
      description: Характерные особенности состава, такие как гипоаллергенность, низкое
        пылеобразование или смеси с добавлением металлов.
    rosin_hardness:
      name: Твердость канифоли
      description: Относительная твердость или мягкость канифоли для смычка. Влияет
        на сцепление и пылеобразование в разных климатических условиях и стилях игры.
    rotation_mechanism_type:
      name: Тип механизма вращения
      description: Механизм вращения веревки. Влияет на плавность хода и достижимую
        скорость (например, шарикоподшипники или втулки).
    rotation_motion_features:
      name: Функции вращения или движения
      description: Возможность вращения или движения планет или орбит и способ их
        движения.
    rotor_configuration_type:
      name: Тип конфигурации ротора
      description: Конфигурация ротора и стиль управления радиоуправляемого вертолета
        (например, коаксиальный, однороторный с фиксированным шагом, с коллективным
        шагом, мультироторный). Существенно влияет на летные характеристики и пригодность
        для разных уровней навыков.
    rotor_construction_type:
      name: Тип конструкции ротора
      description: Конструкция ротора. Влияет на вес, жесткость и отвод тепла.
    rotor_mounting_interface:
      name: Интерфейс крепления ротора
      description: Стандарт интерфейса ступицы, используемый для крепления ротора
        к колесу.
    rotor_mounting_standard:
      name: Стандарт крепления ротора
      description: Стандарт интерфейса, используемый для крепления ротора к ступице
        (например, 6-болтовое крепление или центральная блокировка).
    roulette_set_components_included:
      name: Состав набора рулетки
      description: Основные компоненты для рулетки, входящие в комплект с колесом
        или набором.
    roulette_wheel_ball_track_type:
      name: Тип дорожки шара на колесе рулетки
      description: Стиль дорожки шара, используемой на колесе. Влияет на реалистичность
        и ощущения от игры.
    roulette_wheel_numbering_system:
      name: Система нумерации колеса рулетки
      description: Система нумерации колеса рулетки и конфигурация нуля для совместимости
        с игровым процессом и вероятностями.
    rounders_equipment_included:
      name: Состав оборудования для раундерса
      description: Конкретные предметы или аксессуары для раундерса, входящие в тренировочный
        набор или комплект. Помогает покупателям точно понять, что находится в коробке.
    rounders_governing_body_approval:
      name: Одобрение руководящего органа по раундерсу
      description: Наличие сертификации или одобрения со стороны официального руководящего
        органа по раундерсу или другого спортивного органа.
    row_counter_format:
      name: Формат счетчика рядов
      description: Формат или стиль счетчика рядов для вязания (например, кольцо,
        цепочка, механический счетчик, цифровой).
    row_counter_mechanism:
      name: Механизм счетчика рядов
      description: Способ увеличения или фиксации количества рядов на инструменте.
    row_counter_mounting_method:
      name: Способ крепления счетчика рядов
      description: Способ крепления счетчика или маркера во время использования (к
        спице, к пальцу, к изделию и т. д.).
    rowel_type:
      name: Тип шпоры
      description: Форма или профиль края колесика шпоры. Влияет на предпочтения всадника
        и чувствительность лошади.
    rowing_machine_part_type:
      name: Тип детали гребного тренажера
      description: Конкретный компонент гребного тренажера, для замены которого предназначено
        изделие. Помогает покупателям быстро найти нужную деталь без чрезмерного дробления
        на микрокатегории.
    rubber_ducky_character_theme:
      name: Персонаж или тема резиновой уточки
      description: Тематика или стилизация персонажа резиновой уточки (полезно для
        необычных или коллекционных уточек).
    rubber_ducky_features:
      name: Особенности резиновой уточки
      description: Функциональные или конструктивные особенности резиновых уточек
        для ванной.
    rubber_ducky_size_class:
      name: Размерный класс резиновой уточки
      description: Удобная для покупателей размерная группа резиновых уточек по типичному
        использованию (игрушка для ванны, украшение для торта, крупногабаритная).
    ruffle_style:
      name: Стиль рюши
      description: Конструкция или визуальный стиль рюши на декоративной ленте для
        стула.
    rugby_headgear_safety_certification:
      name: Сертификация безопасности регбийного шлема
      description: Соответствие головного убора официальным стандартам безопасности
        для регби или общим спортивным стандартам.
    rugby_size:
      name: Размер для регби
      description: Категоризация экипировки по распространенным размерным обозначениям
        для регби, используемым в названиях товаров.
    rugby_variant:
      name: Вариант регби
      description: Вариант регби (код или формат), для которого предназначен товар.
    ruler_edge_type:
      name: Тип края линейки
      description: Профиль или функция края, используемые для измерения или разметки
        (например, прямая или скошенная кромка, бортик).
    ruler_marking_style:
      name: Стиль разметки линейки
      description: Схема разметки или направляющих, нанесенная на линейку помимо базовых
        делений.
    runner_configuration:
      name: Конфигурация полозьев
      description: Количество и расположение полозьев на санях.
    runner_material:
      name: Материал полозьев
      description: Материал, используемый для полозьев или скользящих накладок саней.
    saddle_cover_style:
      name: Стиль чехла для седла
      description: Общий дизайн или стиль использования изделия (например, чехол для
        хранения, защитный чехол для езды, сумка для переноски).
    saddle_design:
      name: Конструкция седла
      description: Общая эргономичная конструкция или стиль разгрузки седла (например,
        с вырезом, без носа, с раздвоенным носом, с пружинами).
    saddle_discipline:
      name: Дисциплина седла
      description: Основная дисциплина верховой езды или предполагаемый стиль использования
        седла.
    saddle_mounting_type:
      name: Тип крепления седла
      description: Интерфейс между седлом и подседельным штырем для совместимости
        (например, на рельсах, шарнирное, I-образное).
    saddle_pad_shape:
      name: Форма вальтрапа
      description: Физический крой или контур вальтрапа. Влияет на совместимость с
        седлом и эстетические предпочтения.
    saddle_pad_style:
      name: Стиль вальтрапа
      description: Функциональный стиль вальтрапа или предполагаемая дисциплина. Помогает
        всадникам выбрать подходящую конструкцию для своей активности или типа седла.
    saddle_padding_material:
      name: Материал набивки седла
      description: Основной амортизирующий материал или технология внутри седла. Влияет
        на комфорт и ощущения при езде.
    saddle_rail_material:
      name: Материал рельсов седла
      description: Материал рельсов под велосипедным седлом. Влияет на прочность,
        комфорт, вес и цену.
    saddle_tree_material:
      name: Материал каркаса седла
