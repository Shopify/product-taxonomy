    cv_boot_material:
      name: Материал пыльника ШРУСа
      description: Основной материал изготовления пыльника ШРУСа.
    cv_boot_position:
      name: Расположение пыльника ШРУСа на полуоси
      description: 'Позиция пыльника ШРУСа на полуоси: внутренняя (со стороны КПП)
