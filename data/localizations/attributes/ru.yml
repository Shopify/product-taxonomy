    wheel_illumination:
      name: Подсветка колес
      description: Наличие встроенной подсветки или светящихся элементов.
    wheel_material:
      name: Материал колеса
      description: Основной материал колеса, влияющий на долговечность и амортизацию.
    wheel_profile:
      name: Профиль колеса
      description: Поперечная форма колеса, влияющая на скорость, сцепление и маневренность.
    wheel_setup_type:
      name: Тип конфигурации колес
      description: Тип конфигурации колес роликовых коньков.
    wheel_system_finish:
      name: Отделка колесной системы
      description: Поверхностная отделка или покрытие колес и их компонентов.
    whip_style:
      name: Тип хлыста
      description: Классификация хлыста по типу или назначению в конном спорте.
    whipped_cream_base:
      name: Основа взбитых сливок
      description: Основной ингредиент взбитых сливок (например, молочные сливки или
