        Cooking cream).
    crib_accessory_features:
      description: Функциональные и комфортные характеристики аксессуаров для детской
        кроватки и кровати малыша, такие как воздухопроницаемость или эластичные края.
    crib_bumper_features:
      name: Характеристики бортика для детской кроватки
    crib_conversion_kit_components:
      description: Основные компоненты, входящие в комплект. Помогает покупателям
