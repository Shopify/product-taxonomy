    drum_pedal_chain_configuration:
      name: Конфигурация цепи барабанной педали
      description: Конфигурация цепи, используемая цепной барабанной педалью (например,
        одинарная, двойная или смещенная цепь).
    drum_pedal_chain_type:
      description: Тип цепи, используемой в приводе (например, роликовая цепь или
        цепь велосипедного типа). Влияет на плавность и долговечность.
    drum_pedal_clamp_type:
      name: Тип крепления барабанной педали
      description: Как педаль крепится к ободу бас-барабана.
    drum_pedal_intended_use:
      name: Предназначение барабанной педали
      description: Основной игровой контекст, для которого ременная педаль предназначена
        или продается.
    drum_pedal_spring_adjustment_method:
      name: Способ регулировки пружины барабанной педали
      description: Как на педали регулируется натяжение пружины.
    drum_pedal_spring_type:
      description: Пружинный механизм, используемый для возврата педали.
    drum_shell_material:
      description: Основной конструкционный материал корпуса акустических барабанов
        (например, клен, береза, акрил).
    drum_shell_wood_species:
      name: Порода древесины корпуса барабана
      description: Порода древесины, используемая для корпуса барабана. Влияет на
        тембр и резонанс.
    drumhead_type:
      name: Тип барабанной кожи
      description: Конфигурация или тип кожи, используемой на октабане.
    drumstick_model:
      name: Модель барабанных палочек
      description: Стандартизированное обозначение модели или размера барабанных палочек,
        используемое многими брендами (например, 5A, 7A).
    drumstick_taper:
      name: Конусность барабанной палочки
      description: Профиль сужения от стержня к наконечнику. Влияет на отскок и баланс.
    drysuit_footwear_style:
      name: Тип обуви сухого гидрокостюма
      description: Интегрированное оформление нижней части сухого гидрокостюма (например,
        встроенные ботинки, неопреновые носки, носочная конструкция или голеностопные
        манжеты).
    dumbbell_style:
      name: Тип гантели
      description: Базовая конструкция гантели — фиксированная, регулируемая система
        или рукоять с возможностью набора веса. Сильно влияет на выбор покупки и сценарии
        тренировок.
    dundun_playing_position:
      name: Положение при игре на дундуне
      description: Предполагаемое положение при игре или переноске барабана.
    dye_status:
      name: Статус окрашивания
      description: Окрашен ли наполнитель, является ли он неокрашенным/натуральным
        или включает несколько цветов/смесей.
    dye_style:
      name: Стиль окрашивания
      description: Цвет нити однотонный, меланжевый или окрашен особым способом.
    dye_technique:
      name: Техника окрашивания
      description: Способ окрашивания волокна (например, ручное, в котле, секционное).
    dye_type_needlecraft_fabric:
      name: Тип окрашивания (ткань для рукоделия)
      description: Льняная ткань однотонная, окрашенная вручную или окрашенная специальным
        способом.
    dyeing_color_processing:
      name: Окрашивание/цветовая обработка
      description: Окрашена ли нить и как именно (например, неокрашенная, отбеленная/белая
        или с использованием конкретных техник окрашивания).
    e_bike_certification_class:
      name: Класс сертификации электровелосипеда
      description: Официальный скоростной рейтинг шины для электровелосипедов (например,
        E-25, E-50).
    e_bike_speed_rating:
      name: Скоростной рейтинг электровелосипеда
      description: Официальный уровень сертификации электровелосипеда для шины (например,
        E25 для ≤25 км/ч, E50 для ≤50 км/ч).
    e_scooter_connector_type:
      name: Тип разъема электросамоката
      description: Тип электрического разъема или штекера, используемого компонентом
        для подключения питания или сигнала.
    e_scooter_throttle_type:
      name: Тип дросселя электросамоката
      description: Тип дросселя для управления разгоном на электросамокате.
    ear_coverage:
      name: Защита ушей
      description: Наличие защиты ушей в шлеме и съемная ли она.
    ear_coverage_style:
      description: Защита ушей маской от мух или ее отсутствие.
    ear_coverage_type:
      name: Тип защиты ушей
      description: Покрытие или защита ушей шапкой, включая наличие и вид ушных клапанов.
    ear_guard_type:
      name: Тип защиты ушей
      description: Стиль защиты ушей, встроенной в кепку, например из жесткого пластика,
        с мягкой подкладкой или съемной.
    earmuff_style:
      name: Стиль наушников
      description: Способ ношения наушников или стиль их конструктивного исполнения
        (например, через голову или с охватом сзади головы).
    earring_closure_type:
      description: Механизм крепления серьги к уху (например, пусет, английская застежка,
        клипса).
    easel_art_desk_features:
      name: Функции мольберта и художественного стола
      description: Общие функциональные особенности, входящие в комплект мольберта
        или художественного стола.
    easel_art_desk_surface_type:
      name: Тип поверхности мольберта и художественного стола
      description: Доступные для использования поверхности для рисования или письма
        (например, классная доска, белая доска, рулон бумаги, магнитная доска).
    eb_clarinet_body_type:
      description: 'Вариант кларнета Eb: сопрано или альт.'
    eco_material_type:
      name: Тип экоматериала
      description: Экологичная пена или технология материала, используемая в подушке.
    edge_construction:
      description: Наличие металлической кромки у лыжи по всей длине, по части длины
        или отсутствие кромки.
    edge_tuner_type:
      name: Тип станка для заточки кромки
      description: Стиль станка для заточки кромки лыж или сноуборда, например направляющая
        для напильника или электрический станок.
    edible_plant_part:
      name: Съедобная часть растения
      description: Часть растения, продаваемая для употребления в пищу.
    educational_guide_included:
      name: Учебное руководство в комплекте
      description: Учебные материалы, входящие в комплект модели.
    educational_topic:
      name: Учебная тема
      description: Основная учебная тема, поддерживаемая образовательным контентом
        муравьиной фермы.
    egg_component:
      name: Компонент яйца
      description: Часть яйца, содержащаяся в продукте, например целое яйцо, только
        белки, желтки или смеси и заменители.
    egg_component_replaced:
      name: Заменяемый компонент яйца
      description: Часть яйца, которую продукт предназначен заменять (например, целое
        яйцо, яичный белок).
    egg_enrichment:
      name: Обогащение яйца
      description: Обогащающие ингредиенты, добавленные к яйцам, например омега-3
        или витамин D.
    egg_farming_method:
      name: Способ содержания кур-несушек
      description: Способ производства или содержания, использованный для яиц (например,
        без клеток, свободный выгул, органические).
    egg_grade:
      name: Категория качества яиц
      description: Категория качества, присвоенная регулирующими органами или отраслевыми
        организациями.
    egg_processing_state:
      name: Состояние обработки яиц
      description: Любая обработка, примененная к яйцам перед продажей (например,
        свежие, соленые, столетние яйца).
    egg_production_method:
      name: Способ производства яиц
      description: Фермерская или содержательная система, используемая для производства
        яиц (например, вне клеток, пастбищное содержание, органические).
    egg_replacer_main_ingredient:
      name: Основной ингредиент заменителя яйца
      description: Основной базовый ингредиент, из которого изготовлен заменитель
        яйца, помогающий с диетическими потребностями или нужными свойствами для выпечки.
    egg_size:
      name: Размер яиц
      description: Стандартное рыночное обозначение размера яиц.
    egg_source_animal:
      name: Животное-источник яиц
      description: Вид животного, которое произвело яйца.
    egg_white_processing_method:
      name: Способ обработки яичного белка
      description: Способ обработки яичных белков после сбора (например, пастеризация,
        распылительная сушка), влияющий на безопасность пищевых продуктов, срок хранения
        и варианты применения.
    eggplant_variety:
      name: Сорт баклажана
      description: Сорт или рыночная разновидность баклажана, позволяющая выбирать
        их по размеру, вкусу, цвету и кулинарному применению.
    eggshell_color:
      name: Цвет скорлупы
      description: Преобладающий цвет скорлупы яиц.
    elastic_edge_finish_type:
      name: Отделка края эластичной ленты
      description: Конструкция края тканой эластичной ленты, влияющая на комфорт и
        применение.
    elastic_intended_use:
      name: Предназначение эластичной ленты
      description: Основное применение, для которого предназначена эластичная лента.
        Помогает поиску и снижает вероятность несоответствий.
    elastic_recovery_performance:
      name: Восстановление эластичной ленты после растяжения
      description: Насколько хорошо тканая эластичная лента возвращается к исходной
        длине после растяжения.
    elastic_recovery_quality:
      name: Качество восстановления эластичной ленты
      description: Способность эластичной ленты восстанавливать длину после растяжения.
    elastic_stretch_level:
      name: Уровень растяжимости эластичной ленты
      description: Степень, до которой эластичная лента может растягиваться под нагрузкой,
        часто выражаемая относительными уровнями, если точный процент не указан.
    elastic_structure:
      name: Структура эластичной ленты
      description: Структурная конструкция петельной эластичной ленты (например, трикотажная,
        тканая, плетеная), влияющая на растяжимость, восстановление и швейные свойства.
    elastic_type:
      description: Тип конструкции эластичной ленты (например, окантовочная резинка,
        плетеная, трикотажная, тканая).
    electric_assist_type:
      name: Тип электроподдержки
      description: Наличие моторной поддержки у велосипеда и вид этой поддержки.
    electric_bicycle_motor_position:
      name: Положение мотора электровелосипеда
      description: Расположение приводного мотора на электровелосипеде, например в
        кареточном узле, передней втулке, задней втулке или двойной втулке.
    electric_bike_class:
      name: Класс электровелосипеда
      description: Категория электровелосипеда по регулирующим классам, определяющим
        ограничения скорости и поддержку дросселя.
    electric_guitar_bridge_type:
      name: Тип бриджа электрогитары
      description: Тип бриджа или вибрато-системы на электрогитаре.
    electric_instrument_output_connection_type:
      name: Тип выходного разъема электрического инструмента
      description: Физические аудиовыходные соединения, предусмотренные на электрической
        виолончели.
    electric_riding_vehicle_control_options:
      name: Варианты управления электрическим транспортным средством
      description: Варианты управления и эксплуатации, доступные водителю или родителю
        (например, педаль, рулевое колесо, дистанционное управление).
    electric_spinning_wheel_speed_control_type:
      name: Тип управления скоростью электрического прялочного колеса
      description: Способ регулировки скорости вращения на электрическом колесе.
    electric_ukulele_output_jack_type:
      name: Тип выходного джека электрической укулеле
      description: Физический выходной разъем, используемый электрической укулеле.
    electric_van_body_length_class:
      description: Распространенный класс размеров фургона по колесной базе и длине,
        используемый в карточках товаров.
    electric_van_roof_height_class:
      name: Класс высоты крыши электрофургона
      description: Распространенная классификация высоты крыши, используемая для фургонов,
        особенно грузовых.
    electric_vehicle_drivetrain_layout:
      name: Компоновка трансмиссии электромобиля
      description: Компоновка моторов и осей, описывающая, сколько моторов установлено
        и где они расположены, помимо простых схем AWD/FWD/RWD.
    electric_winder_accessories_included:
      name: Аксессуары в комплекте с электрической моталки
      description: Аксессуары, входящие в комплект электрической моталки (например,
        зажимы, адаптеры).
    electrical_connector_type:
      description: Тип разъема, используемого системой дверного замка или запирания
        для электрической интеграции, если применимо.
    electrical_system_voltage:
      name: Напряжение электрической системы
      description: Номинальное напряжение электрической системы транспортного средства,
        на которое рассчитан регулятор.
    electronic_cymbal_trigger_zones:
      name: Зоны срабатывания электронного тарелочного пэда
      description: Число независимых зон срабатывания, которые обеспечивает тарелочный
        пэд (например, поверхность, край, купол).
    electronic_drum_module_audio_interface_functionality:
      name: Функция аудиоинтерфейса электронного барабанного модуля
      description: Возможность работы модуля как USB-аудиоинтерфейса для записи и
        воспроизведения, помимо MIDI.
    electronic_drum_module_metronome_features:
      name: Функции метронома электронного барабанного модуля
      description: Встроенные функции для практики и работы с метрономом.
    electronic_drum_module_power_source:
      name: Источник питания электронного барабанного модуля
      description: Необходимый или поддерживаемый источник питания для модуля управления.
    electronic_drum_module_sample_import_support:
      name: Поддержка импорта семплов электронным барабанным модулем
      description: Возможность импорта пользовательских семплов и способ импорта.
    electronic_drum_pad_playing_surface_type:
      name: Тип игровой поверхности электронного барабанного пэда
      description: Конструкция игровой поверхности том-пэда (например, сетчатая мембрана
        или резина), влияющая на отскок, шум и ощущения.
    electronic_features:
      name: Электронные функции
      description: Электронные или интерактивные функции игрового банка, если они
        есть.
    electronic_lights_and_sound:
      name: Электронный свет и звук
      description: Электронный свет и (или) звуковые функции в наборе кукольного домика
        (например, свет, звонок, музыка, звуковые эффекты).
    electronics_power_source:
      name: Источник питания электроники
      description: Способ питания активной электроники, если применимо.
    eligible_race_series:
      name: Допустимая гоночная серия
      description: Гоночная серия или санкционирующий орган, в которой автомобиль
        допускается к участию.
    elliptical_trainer_part_type:
      name: Тип детали эллиптического тренажера
      description: Конкретный вид аксессуара или запасной части для эллиптического
        тренажера (например, ремень, консоль, педаль). Позволяет быстро отфильтровать
        нужный товар без перехода по множеству микрокатегорий.
    embellishment_technique:
      name: Техника декора
      description: Основная декоративная или поверхностная обработка изделия, например
        вышивка, принт или бисероплетение.
    embellishment_type:
      name: Тип декора
      description: Тип декоративного элемента, примененного к подвязке, например кружево,
        банты или жемчуг.
    embossing_pen_ink_color:
      name: Цвет чернил тиснильной ручки
      description: Цвет чернил, наносимых тиснильной ручкой (они могут быть прозрачными/клейкими
        или пигментированными). Отличается от цвета ручки или корпуса.
    embossing_stylus_tip_shape:
      name: Форма наконечника тиснильного стилуса
      description: Геометрия тиснильного наконечника, используемого для создания различных
        эффектов (например, шарообразный или заостренный).
    embroidered_coverage_level:
      name: Степень вышитого покрытия
      description: Примерное количество покрытия лицевой стороны нашивки вышитыми
        нитями.
    embroidered_patch_backing_type:
      name: Тип подложки вышитой нашивки
      description: Подложка или опорный слой на обратной стороне вышитой нашивки.
        Влияет на долговечность и способ применения.
    embroidery_hoop_type:
      name: Тип пялец для вышивания
      description: Стиль конструкции пялец для вышивания и их основной механизм натяжения.
    embroidery_machine_bobbin_type:
      name: Тип шпульки для вышивальной машины
      description: Тип или способ загрузки шпульной системы.
    emergency_lighting_configuration:
      name: Конфигурация аварийного освещения
      description: Основная установленная конфигурация аварийного предупредительного
        освещения на транспортном средстве (например, верхняя световая балка, огни
        в решетке).
    emergency_lighting_package:
      name: Комплект аварийного освещения
      description: Типы установленных аварийных предупредительных огней.
    emissions_compliance_standard:
      name: Стандарт соответствия выбросам
      description: Сертификация или соответствие требованиям по выбросам для двигателя,
        если применимо.
    emissions_standard:
      name: Стандарт выбросов
      description: Стандарт соответствия выбросам для транспортного средства. Варьируется
        по региону и году.
    enclosure_panel_configuration:
      name: Конфигурация панелей ограждения
      description: Какие панели или стороны ограждения входят в комплект (конфигурация
        покрытия), например полное ограждение, только боковые шторы или трехстороннее
        исполнение (открытая передняя или задняя часть).
    enclosure_window_material:
      name: Материал окон ограждения
      description: Материал прозрачных оконных панелей ограждения.
    end_fitting_type:
      name: Тип концевого фитинга
      description: Тип соединителя на каждом конце стойки (со стороны автомобиля и
        со стороны крышки). Определяет совместимость крепления.
    end_type:
      name: Тип концевика
      description: Тип концевика или крепления на концах буксировочного ремня для
        соединения с точками буксировки.
    ends_style_blocking_wires:
      name: Стиль концов (блокировочные провода)
      description: Обработка концов блокировочной проволоки для безопасности и удобства
        продевания через края кружева.
    enduro_bike_suspension_adjustability:
      name: Регулировки подвески эндуро-мотоцикла
      description: Какие регулировки подвески доступны (обычно для передней вилки
        и заднего амортизатора).
    engine_bay_mounting_location:
      name: Место крепления в моторном отсеке
      description: Место в моторном отсеке, для установки в которое предназначен расширительный
        бачок (относительная позиция)
    engine_bearing_coating:
      description: Покрытие поверхности подшипника для обеспечения износостойкости,
        врабатываемости или снижения трения.
    engine_bearing_position:
      name: Положение подшипника двигателя
      description: Расположение или функция подшипника внутри двигателя.
    engine_bearing_size:
      name: Размер подшипника двигателя
      description: Стандартный размер подшипника или вариант с уменьшенным либо увеличенным
        размером, обычно связанный со шлифовкой коленвала и зазорами.
    engine_configuration:
      name: Конфигурация двигателя
