    cricket_stump_target_features:
      name: Функциональные особенности тренировочных стоек для крикета
      description: Отличительные функциональные характеристики. Повышают удобство
        тренировок, видимость, долговечность или устойчивость.
    cricket_stump_type:
      name: Тип стоек для крикета
      description: Стиль или конструкция стоек. Помогает покупателям выбрать между
        традиционными матчевыми стойками, тренировочными вариантами или современными
        световыми моделями.
    cricket_training_focus:
      description: Основной навык или дисциплина крикета, для развития которых предназначен
