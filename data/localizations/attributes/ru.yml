    distributor_advance_mechanism:
      name: Механизм опережения зажигания трамблера
      description: Тип механизма опережения зажигания, используемого трамблером.
    distributor_cap_terminal_type:
      name: Тип клемм крышки трамблера
      description: Стиль клемм крышки трамблера.
    distributor_gear_material:
