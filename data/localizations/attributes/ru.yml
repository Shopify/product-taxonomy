      description: Конфигурация утяжеления головки мушки. Влияет на скорость погружения
        и подачу.
    headband_embellishment:
      name: Декор ободка
      description: Декоративные элементы, прикрепленные к ободку (например, банты,
        жемчуг, кристаллы, ушки животных).
    headboard_style:
      name: Тип изголовья
      description: Конструкция или дизайн изголовья, входящего в комплект кровати.
    headgear_strap_configuration:
      name: Конфигурация ремней шлема
      description: Количество ремней, используемых для фиксации борцовского шлема.
    headjoint_crown_style:
      name: Тип коронки головки флейты
      description: Тип или дизайн коронки головки флейты (торцевой крышки). Влияет
