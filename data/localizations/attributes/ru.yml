      description: Высота и крой ботинка на ноге, влияющие на защиту и подвижность.
    wetsuit_entry_system:
      name: Система входа в гидрокостюм
      description: Тип и расположение застежки или входа в гидрокостюм.
    wetsuit_seam_construction:
      name: Конструкция швов гидрокостюма
      description: Способ изготовления и герметизации швов, влияющий на теплоизоляцию,
