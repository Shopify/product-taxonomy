    wheel_cleaner_acidity_ph_category:
      name: Кислотность/pH категория очистителя дисков
      description: 'Тип средства для очистки дисков: кислотное, нейтральное или щелочное
        (а также, в некоторых случаях, продается ли оно как средство с сбалансированным
        pH).'
    wheel_cleaner_formula_type:
      name: Тип формулы очистителя дисков
      description: Основная категория состава очистителя (например, на кислотной основе,
        бескислотный, с нейтральным/сбалансированным pH или реагирующий с железом).
    wheel_construction_type:
      name: Тип конструкции колеса
      description: Метод изготовления или конструкции колеса.
    wheel_contaminant_target:
      name: Целевые загрязнения колес
      description: Основные типы загрязнений, для удаления которых предназначено средство.
    wheel_core_type:
      name: Тип сердцевины колеса
      description: Конструкция сердечника колеса, влияющая на вес, жесткость и передачу
        энергии.
    wheel_cylinder_inlet_port_thread_standard:
      name: Стандарт резьбы входного порта колесного цилиндра
      description: Стандарт резьбы впускного отверстия тормозной магистрали на колесном
        цилиндре (например, метрическая резьба с раструбом или резьба SAE с обратным
        раструбом).
    wheel_fastener_seat_type:
      name: Тип посадки крепежа колеса
      description: Тип посадки гайки или болта на колесе (коническая, сферическая,
