    allergen_test_type:
      name: Тип аллергенов
      description: Тип аллергенов, которые можно выявить с помощью набора для диагностики
        (например, пищевые или из окружающей среды)
    allergens:
      name: Аллергены
      description: Потенциальные аллергены, которые присутствуют в лечебном или косметическом
        средстве (например, линалоол или лимонен)
    allergy_friendly_features:
      name: Гипоаллергенные свойства
      description: Гипоаллергенные свойства продукта (например, не содержит латекса
        или плеснеустойчивый)
    amino_acid_subtype:
      name: Подтип аминокислоты
      description: Основной тип или профиль аминокислот, содержащихся в добавке.
    amplifier/booster_suitable_location:
      name: Место установки усилителя мощности или сигнала
