    answering_machine_type:
      name: Тип автоответчика
      description: Наличие встроенного автоответчика и его технология.
    antenna_connector_type:
      name: Тип антенного разъема
      description: Тип РЧ-разъема, используемого для подключения внешних антенн.
    antenna_rf_connector_type:
      name: Тип РЧ-разъема антенны
      description: Тип РЧ-разъема, используемого антенной.
    antenna_type:
      name: Тип антенны
      description: Тип антенны для электронных устройств (например, всенаправленная
