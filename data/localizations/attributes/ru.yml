    whorl_mounting_interface:
      name: Интерфейс крепления мутовки
      description: Способ крепления веретена к вращающемуся колесу (тип вала/соединения).
    wick_construction_type:
      name: Тип конструкции фитиля
      description: Конструкция фитиля (плетеный, плоский, квадратное плетение, с сердечником,
        деревянный и т. п.).
    wick_core_type:
      name: Тип сердечника фитиля
      description: Фитиль без сердечника или с сердечником (например, бумажным или
        цинковым), влияющим на жесткость и характеристики горения.
    wick_tab_crimp_type:
      name: Тип обжима крепежной пластины фитиля
      description: Способ фиксации фитиля на крепежной пластине (тип конструкции/обжима).
    wick_tab_material:
      name: Материал язычка фитиля
      description: Материал крепежной пластины/держателя (обычно жесть), значимый
