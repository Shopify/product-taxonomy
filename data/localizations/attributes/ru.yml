    nose_coverage_style:
      name: Стиль покрытия носа
      description: Наличие и тип защитной панели для носа или морды на маске от насекомых.
    noseband_type:
      name: Тип капсюля
      description: Конструкция капсюля в комплекте с уздечкой (при наличии).
    number_of_canvas_meshes:
