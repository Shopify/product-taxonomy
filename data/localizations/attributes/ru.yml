    dried_surface_finish:
      description: Типичный вид поверхности после высыхания (блеск или текстура).
    drink_tube_insulation:
      name: Изоляция питьевой трубки
      description: Наличие у питьевой трубки изоляции или термочехла, чтобы предотвратить
        нагрев или замерзание жидкости.
    drive_band_cross_section_shape:
      name: Форма поперечного сечения приводного ремня
      description: Форма профиля приводного ремня (круглый, плоский и т. д.).
    drive_band_join_type:
      name: Тип соединения приводного ремня
      description: Как соединен или изготовлен приводной ремень (бесконечный, связывается
        и т. д.).
    drive_band_material_type:
      description: Материал или тип приводного ремня, используемого на прялках.
    drive_location:
      name: Расположение привода
      description: Где расположен маховик или приводной механизм на эллиптическом
        тренажере. Влияет на занимаемую площадь и характер движения.
    drive_mechanism:
      name: Механизм привода
      description: Тип привода, передающего усилие от педалей к маховику.
    drive_shaft_material:
      name: Материал приводного вала
      description: Основной конструкционный материал трубы приводного вала или узла
        в сборе.
    drive_system:
      name: Система привода
      description: Механизм, передающий усилие педалей на систему сопротивления.
    drivetrain_configuration:
      name: Конфигурация трансмиссии
      description: Конфигурация трансмиссии велосипеда (фиксированная задняя втулка,
        система с одной передачей со свободным ходом или flip-flop).
    drivetrain_speed_compatibility:
      name: Совместимость по количеству скоростей трансмиссии
      description: Количества скоростей кассеты, с которыми разработана совместимость
        звезды. Обеспечивает правильный профиль зубьев и шаг.
    drone_positioning_system:
      name: Система позиционирования дрона
      description: Бортовая технология позиционирования и удержания, поддерживаемая
        дроном для навигации и стабильного зависания.
    drone_transmission_type:
      name: Тип передачи сигнала дрона
      description: Основной способ передачи управляющего сигнала и/или видеосвязи
        между дроном и пультом или устройством.
    drop_spindle_whorl_position:
      name: Положение шкива на веретене
      description: Расположение шкива на валу.
    drum_carder_accessories_included:
      description: Обычно входящие в комплект элементы набора для кардочесания.
    drum_clamp_locking_mechanism:
      name: Механизм фиксации барабанного зажима
      description: Как зажим фиксируется или затягивается на трубе или ободе (например,
        барашковый болт, болт под барабанный ключ, быстросъем).
    drum_clamp_mount_interface:
      name: Интерфейс крепления барабанного зажима
      description: Что именно зажим предоставляет для крепления аксессуаров (например,
        приемник L-образного стержня, шаровой шарнир, держатель тарелки).
    drum_clamp_type:
      name: Тип барабанного зажима
      description: Функциональный тип зажима, используемый в крепежной фурнитуре ударной
        установки (например, зажим на обод или зажим для рэка/трубы).
    drum_head_application_batter_resonant:
      name: Назначение барабанной кожи (ударная/резонансная)
      description: Для какой стороны или роли предназначена кожа барабана (верхняя
        игровая поверхность или нижняя резонансная/подструнная сторона).
    drum_head_collar_type:
      name: Тип буртика барабанной кожи
      description: Имеет ли кожа стандартный буртик, низкий буртик или специальный
        профиль буртика для соответствия определенным опорным кромкам или корпусам.
    drum_head_damping_control:
      name: Контроль демпфирования барабанной кожи
      description: Встроенные средства контроля обертонов или тип демпфирования, предусмотренные
        конструкцией кожи.
    drum_head_film_material:
      name: Материал пленки барабанной кожи
      description: Основной материал пленки барабанной кожи (обычно PET/Mylar, но
        может включать и специальные материалы).
    drum_head_hoop_collar_type:
      description: Конструкция обода и буртика барабанной кожи (например, профиль
        буртика и материал обода). Может влиять на посадку и стабильность настройки
        на определенных корпусах и ободах.
    drum_head_hoop_rim_material:
      name: Материал обода барабанной кожи
      description: Материал внутреннего обода или кольца (встроенного обруча внутри
        кожи). Влияет на долговечность и стабильность настройки.
    drum_head_included:
      name: Барабанные кожи в комплекте
      description: Входит ли в комплект барабана ударная и/или резонансная кожа.
    drum_head_muffling_feature:
      description: Встроенные средства контроля обертонов, интегрированные в барабанную
        кожу.
    drum_head_muffling_type:
      name: Тип приглушения барабанной кожи
      description: Барабанная кожа включает встроенные элементы контроля обертонов
        или приглушения.
    drum_head_ply_count:
      name: Количество слоев барабанной кожи
      description: Количество пленочных слоев, используемых в конструкции барабанной
        кожи (например, 1 слой, 2 слоя).
    drum_head_position:
      name: Положение барабанной кожи
      description: Предназначена ли барабанная кожа как ударная (верхняя/игровая),
        резонансная (нижняя), подструнная (нижняя) или может использоваться в любом
        положении.
    drum_head_reinforcement_type:
      name: Тип усиления барабанной кожи
      description: Включает ли подструнная кожа усиливающие элементы, такие как центральная
        точка или контрольное кольцо, для повышения долговечности и концентрации тона.
    drum_head_surface_finish:
      description: Текстура или отделка поверхности кожи. Влияет на атаку и отклик
        на щетки.
    drum_head_type:
      name: Тип барабанной кожи
      description: Конструкция или тип кожи, используемой на барабане (в первую очередь
        для поставляемых ударных и резонансных кож).
    drum_key_design_type:
      description: Функциональная конструкция ключа для настройки барабана (например,
        стандартный, с трещоткой, Т-образная рукоятка).
    drum_key_drive_type:
      name: Тип привода барабанного ключа
      description: Тип привода или интерфейса барабанного ключа, используемого для
        взаимодействия с натяжным болтом или крепежной фурнитурой.
    drum_key_handle_style:
      name: Стиль рукоятки барабанного ключа
      description: Форма рукоятки и эргономика барабанного ключа. Влияет на удобство
        и усилие при настройке.
    drum_kit_included_items:
      name: Предметы, входящие в комплект ударной установки
      description: Основные предметы, входящие в комплект ударной установки помимо
        корпусов или пэдов (например, фурнитура, тарелки, стул).
    drum_kit_portability:
      name: Портативность ударной установки
      description: Предназначен ли комплект для компактного хранения и транспортировки
        (например, дорожный, компактный, складной).
    drum_kit_shell_construction_features:
      name: Особенности конструкции корпусов ударной установки
      description: Как сконструированы корпуса (количество и тип слоев). Влияет на
        звук и долговечность.
    drum_mount_clamp_type:
      description: Формфактор зажима, используемого в крепежной фурнитуре для барабанов.
    drum_multi_clamp_clamp_type:
      name: Тип зажима многозажимного держателя
      description: Функциональный тип и конфигурация многозажимного держателя (как
        он зажимает и что соединяет).
    drum_mute_material:
      name: Материал заглушки для барабана
      description: Основной материал заглушки для барабана, контактирующей с барабанной
        кожей и/или гасящей вибрацию.
    drum_pad_triggering_zones:
      name: Зоны срабатывания барабанного пэда
      description: Количество и тип зон срабатывания, поддерживаемых том-пэдом (например,
        только поверхность или поверхность + обод). Влияет на выразительность и совместимость
        с модулем.
    drum_pedal_accessories_included:
      description: Основные аксессуары и компоненты, входящие в комплект барабанной
        педали.
    drum_pedal_baseplate_type:
      name: Тип опорной плиты барабанной педали
      description: Использует ли педаль опорную плиту или плавающую/безрамную конструкцию.
    drum_pedal_bearing_type:
      name: Тип подшипника барабанной педали
      description: Механизм подшипника, используемый в основных точках поворота (например,
        рокер, пятка, кулачок).
    drum_pedal_cam_type:
      description: Форма или геометрия кулачка барабанной педали. Влияет на ощущения
