      name: Посадка перчатки
      description: Описывает внутреннюю форму и силуэт перчатки для выбора предпочтительной
        посадки.
    glove_insulation:
      name: Утепление перчатки
      description: Уровень утепления или термоконструкция перчатки (степень изоляции,
        технология подкладки или изоляции или типа подогрева).
    glove_palm_material:
      name: Материал ладони перчатки
      description: Основной материал ладони перчатки (контактная поверхность).
    glove_size:
      name: Размер перчатки
      description: Указывает общий размер руки, для которого предназначены перчатки
        (часто в формате размерной системы одежды или детских размеров).
    glove_webbing_style:
      name: Тип перепонки перчатки
      description: Определяет конструкцию перепонки перчатки, влияющую на контроль
        мяча, позиционную пригодность и предпочтения игрока.
    glow_effect:
      name: Эффект свечения
      description: Указывает наличие светящихся или трассирующих свойств у гелевых
        шаров для игры при слабом освещении.
    glow_plug_connector_type:
      name: Тип разъема свечи накала
      description: Тип электрического разъема свечи накала для подключения к проводке
        автомобиля.
    glow_plug_heating_element_type:
      name: Тип нагревательного элемента свечи накала
      description: Тип или технология нагревательного элемента свечи накала.
    glue_application_format:
      name: Формат нанесения клея
      description: Указывает формат аппликатора или способ нанесения школьного клея.
    glue_applicator_type:
      name: Тип аппликатора клея
      description: Указывает тип встроенного наконечника для нанесения жидкого клея.
    glue_base_formulation:
      name: Базовая формула клея
      description: Указывает основную химическую формулу клея (для характеристик,
        безопасности и очистки).
    glue_gun_nozzle_style:
      name: Тип сопла клеевого пистолета
      description: Указывает тип наконечника клеевого пистолета, влияющий на точность
        нанесения и расход клея.
    glue_safety_standard:
      name: Стандарт безопасности клея
      description: Указывает, является ли клей нетоксичным и безопасным для детей
        по стандартам.
    goal_frame_material:
      name: Материал каркаса ворот
      description: Указывает материал каркаса ворот, влияющий на вес, мобильность
        и устойчивость к погоде.
    goal_size:
      name: Размер ворот
      description: Классифицирует футбольные ворота по стандартным размерным группам
        для более быстрого выбора.
    goal_size_classification:
      name: Классификация размера ворот
      description: Стандартный размер ворот (например, полноразмерные, юношеские,
        мини), чтобы пользователи могли быстро выбрать оборудование, соответствующее
        их уровню игры.
    goal_size_standard:
      name: Стандарт размера ворот
      description: Указывает, какому официальному или возрастному стандарту соответствуют
        ворота.
    goalie_configuration:
      name: Конфигурация вратаря
      description: Указывает количество вратарей на стороне (американский 3-вратарный
        или европейский 1-вратарный стиль).
    goalie_playing_surface:
      name: Игровая поверхность вратаря
      description: Указывает основную игровую поверхность или среду использования
        комплекта вратаря.
    goalkeeper_glove_cut:
      name: Крой вратарских перчаток
      description: Указывает тип кроя ладони и пальцев вратарских перчаток, влияющий
        на посадку и контроль мяча.
    goalkeeper_training_aid_type:
      name: Тип тренажера для вратаря
      description: Указывает тип тренажера для вратарей для точной фильтрации.
    goblet_drum_playing_style:
      name: Стиль игры на дарбуке
      description: Предназначен ли инструмент в первую очередь для игры руками или
        для игры палочками/молоточками.
    gobo_format:
      name: Формат гобо
      description: Указывает размер и стандарт гобо, поддерживаемые проектором (диаметр
        и серия толщин). Обеспечивает совместимость с запасными и нестандартными гобо.
    gobo_root_variety:
      name: Сорт корня гобо
      description: Указывает конкретный сорт корня лопуха (гобо).
    gobo_rotation:
      name: Вращение гобо
      description: Указывает возможность и направление вращения гобо.
    goggle_accessory_type:
      name: Тип аксессуара для очков
      description: Классифицирует тип аксессуара (чехол, кейс, ремень и т. д.) для
        фильтрации товаров. Позволяет различать товары в этой категории зонтиков.
    goggle_features:
      name: Особенности защитных очков
      description: Перечисляет функциональные и конструктивные особенности очков.
    goggle_fit_design:
      name: Конструкция посадки очков
      description: Описывает способ посадки очков, включая совместимость с очками
        (OTG).
    goggle_gasket_material:
      name: Материал уплотнителя очков
      description: Материал уплотнителя, контактирующего с лицом, влияющий на комфорт
        и герметичность.
    goggle_integration:
      name: Интеграция очков
      description: Указывает совместимость шлема с очками и наличие креплений для
        фиксации.
    goggle_lens_shape:
      name: Форма линзы очков
      description: Определяет кривизну линзы, влияющую на искажения и обзор (цилиндрическая,
        сферическая, торическая).
    goggle_lens_tint:
      name: Тонировка линзы очков
      description: Определяет тонировку линзы, влияющую на светопропускание и восприятие
        цвета.
    goggle_strap_material:
      name: Материал ремня очков
      description: Основной материал ремня для крепления на голову. Влияет на долговечность
        и комфорт.
    golf_accessory_set_purpose:
      name: Назначение набора аксессуаров для гольфа
      description: Указывает основное назначение набора аксессуаров для гольфа.
    golf_bag_style:
      name: Стиль сумки для гольфа
      description: Указывает основной стиль сумки для гольфа (стойка, тележка, персональная
        и т. д.).
    golf_ball_alignment_design:
      name: Дизайн выравнивания мяча для гольфа
      description: Указывает встроенные визуальные элементы выравнивания на поверхности
        мяча.
    golf_ball_construction:
      name: Конструкция мяча для гольфа
      description: Указывает количество слоев мяча, влияющее на вращение, ощущение
        и дальность.
    golf_ball_cover_material:
      name: Материал покрытия мяча для гольфа
      description: Материал внешней оболочки мяча для гольфа. Влияет на вращение,
        прочность и ощущения при ударе.
    golf_cart_cover_climate_use:
      name: Климат для использования чехла для гольф-кара
      description: Основные климатические условия и сезонные нагрузки, на которые
        рассчитан чехол.
    golf_cart_enclosure_fit_type:
      name: Тип гольф-кара по пассажирам
      description: Предназначен ли гольф-кар для определенного количества сидений
        или конкретного формфактора, либо имеет универсальную/регулируемую конструкцию.
    golf_cart_intended_use:
      name: Предполагаемое назначение гольф-кара
      description: Основной сценарий использования, для которого предназначен или
        сконфигурирован гольф-кар.
    golf_club_number:
      name: Номер клюшки для гольфа
      description: Конкретный номер или обозначение веджа, нанесенное на клюшку (например,
        5, PW, GW).
    golf_club_part_type:
      name: Тип детали клюшки для гольфа
      description: Категория аксессуара или компонента клюшки для гольфа по распространенным
        подтипам (например, переходная втулка, феррула, груз).
    golf_grip_size:
      name: Размер грипа для гольфа
      description: Общая категория внешнего размера грипа для гольфа. Определяет,
        насколько толстым ощущается грип в руке.
    golf_shoe_spike_type:
      name: Тип шипов обуви для гольфа
      description: Тип системы сцепления, используемой на подошве обуви для гольфа
        (например, модели с шипами или без шипов).
    golf_tee_style:
      name: Стиль гольф-ти
      description: Конструкция или функциональный дизайн гольф-ти. Влияет на высоту
        мяча, долговечность или снижение вращения.
    golf_training_focus:
      name: Направленность тренировки по гольфу
      description: Основной навык или аспект, для улучшения которого предназначен
        продукт.
    golf_training_objective:
      name: Цель тренировки по гольфу
      description: Основной навык игры в гольф, который улучшает тренажер.
    gong_profile_type:
      name: Тип профиля гонга
      description: Физический профиль оперного гонга (например, плоский или с приподнятым
        центром). Сильно влияет на тембр и стиль игры.
    grading_scale:
      name: Шкала оценки
      description: Шкала оценки, используемая для сертифицированной инвестиционной
        монеты (например, 1–70 по Шелдону).
    grading_service:
      name: Сервис оценки
      description: Сторонний сервис оценки и сертификации монеты или банкноты (например,
        PCGS, NGC).
    graduation_increment:
      name: Шаг делений шкалы
      description: Наименьшее нанесенное или выгравированное деление на шкале шаблона
        для припусков (точность разметки).
    grain_processing_method:
      name: Метод обработки зерна
      description: Основной метод обработки зерна (например, пропаривание, плющение,
        проращивание). Влияет на время приготовления, текстуру и пищевую ценность.
    grand_piano_soundboard_material:
      name: Материал деки рояля
      description: Основной материал деки пианино (резонансной деки). Влияет на звучание
        и долговечность.
    grappling_dummy_pose:
      name: Поза тренировочного манекена для борьбы
      description: Стандартное положение тела или поза манекена. Определяет, какие
        упражнения и техники он поддерживает.
    grease_application:
      name: Назначение смазки
      description: Основной компонент транспортного средства или сценарий использования,
        для которого предназначена смазка.
    grease_consistency_grade_nlgi:
      name: Класс консистенции смазки (NLGI)
      description: Номер консистенции NLGI, указывающий на плотность смазки (например,
        NLGI 2 — распространенный универсальный вариант).
    grease_thickener_type:
      name: Тип загустителя смазки
      description: Система загустителя или мыльной основы, используемая в составе
        смазки.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Тип клапана мундштука волынки Great Highland
      description: Система обратного клапана, используемая в мундштуке.
    great_highland_bagpipes_drone_configuration:
      name: Конфигурация бурдонов волынки Great Highland
      description: Типы бурдонов, входящих в комплект.
    great_highland_bagpipes_mounting_material:
      name: Материал декоративных накладок волынки Great Highland
      description: Материал декоративных накладок на волынке (например, нейзильбер,
        искусственная слоновая кость).
    greens_maturity_stage:
      name: Стадия зрелости зелени
      description: Стадия развития зелени на момент сбора урожая.
    greens_preparation_state:
      name: Состояние подготовки зелени
      description: Способ обработки или упаковки листовой зелени (например, предварительно
        вымытая, нарезанная, готовая к употреблению).
    grenade_effect_type:
      name: Тип эффекта гранаты
      description: Основной функциональный эффект, создаваемый пейнтбольной гранатой
        после активации (например, дым, краска, светошумовой эффект).
    grid_unit:
      name: Единица измерения сетки
      description: Основная система измерения, нанесенная на коврик (если присутствует
        сетка или шкала).
    grille_emblem_provision:
      name: Совместимость решетки радиатора с эмблемой
      description: Наличие поддержки OEM-эмблемы или значка на решетке радиатора и
        способ установки.
    grille_mounting_method:
      name: Способ крепления решетки
      description: Способ установки решетки радиатора на транспортное средство (например,
        полная замена или накладка; крепление болтами или защелками; с необходимостью
        сверления или без нее).
    grille_style:
      name: Стиль решетки
      description: Визуальный стиль или дизайн решетки радиатора транспортного средства.
    grip_chalk_form:
      name: Форма мела для хвата
      description: Физическая форма мела, поставляемого или используемого с мешком.
    grip_coverage:
      name: Зона покрытия противоскользящими элементами
      description: Наличие и расположение силиконовых или прорезиненных противоскользящих
        элементов на носке.
    grip_design:
      name: Конструкция хвата
      description: Конфигурация ручек или отверстий диска. Обеспечивает удобство переноски
        и вариативность упражнений.
    grip_enhancer_effect:
      name: Эффект усилителя хвата
      description: Основная функциональная особенность продукта (например, впитывание
        влаги или липкое смоляное покрытие).
    grip_enhancer_form:
      name: Форма усилителя сцепления
      description: Физическая форма или формат продукта для усиления хвата. Помогает
        спортсменам выбрать подходящий способ нанесения.
    grip_features:
      name: Особенности хвата
      description: Встроенные особенности хвата или ручек. Помогают улучшить удержание,
        комфорт или контроль во время игры.
    grip_material:
      name: Материал зоны хвата
      description: Материал, используемый для поверхности хвата на брюках.
    grip_shape:
      name: Форма грипа
      description: Форма поперечного сечения или стиль грипа, особенно актуальные
        для грипов паттера.
    grip_surface_type:
      name: Тип поверхности сцепления
      description: Дизайн протектора или поверхности сцепления педали. Влияет на сцепление
        и ощущения.
    grip_tackiness_level:
      name: Уровень липкости грипа
      description: Степень липкости поверхности грипа. Помогает игрокам выбрать между
        сухими ощущениями и максимальным сцеплением.
    grip_tape_form:
      name: Форма грип-ленты
      description: Форма поставки тейпа для хвата (например, лист, рулон, набор для
        распыления).
    grip_wax_form:
      name: Форма воска для хвата
      description: Физическая форма, в которой продается воск для хвата.
    gripper_coverage:
      name: Покрытие захвата
      description: Стиль противоскользящего элемента на нескользящей обуви. Определяет
        площадь покрытия поверхности и возможность снятия.
    grommet_application_material:
      name: Материал установки люверсов
      description: Основной материал или материалы, в которые предназначены для установки
        люверсы (например, ткань, кожа, винил, брезент или парусина).
    grommet_duty_rating:
      name: Класс нагрузки люверсов
      description: Предназначенный класс прочности или использования люверса.
    grommet_style:
      name: Тип конструкции люверса
      description: Конструкция комплекта люверсов (способ сборки и использования).
    grooming_glove_texture_type:
      name: Тип текстуры груминговой перчатки
      description: Основная текстура поверхности для груминга. Указывает на назначение,
        например чистка, полировка или мытье.
    groove_orientation:
      name: Направление канавок
      description: Направление или расположение канавок либо ребер на инструменте.
    groove_sampler_onboard_effects:
      name: Встроенные эффекты грув-сэмплера
      description: 'Категории встроенной обработки эффектов на грув-сэмплере (вставка/мастер):
        реверберация, задержка, компрессия, дисторсия, эквалайзер, фильтрация и т.
        п.'
    groove_sampler_storage_expansion_type:
      name: Тип расширения памяти грув-сэмплера
      description: Поддерживаемые варианты съемного или расширяемого хранилища для
        грув-сэмплера.
    ground_attachment_method:
      name: Способ крепления к земле
      description: Способ крепления тренировочной дуги для пасов к игровой поверхности.
        Влияет на устойчивость и совместимость с поверхностью.
    groupset_components_included:
      name: Состав групсета
      description: Конкретные компоненты трансмиссии, входящие в групсет. Помогает
        покупателям понять состав комплекта.
    gt_racing_class:
      name: Класс гонок GT
      description: Категория или класс GT, для которого построен или омологирован
        автомобиль.
    guard_construction_type:
      name: Тип конструкции защиты
      description: 'Тип конструкции защиты: жесткий корпус, мягкая вставка или рукав/ремень.'
    guard_size_measurement_basis:
      name: Основа измерения размера защиты
      description: Измерение, на основе которого определяется размер (например, окружность
        локтя, запястья или предплечья).
    guard_style:
      name: Тип защиты
      description: Конструкция или тип защиты лезвий коньков. Помогает покупателям
        быстро различать жесткие чехлы для ходьбы, мягкие влагопоглотители, подпружиненные
        защиты и другие варианты.
    guava_flesh_color:
      name: Цвет мякоти гуавы
      description: Внутренний цвет мякоти плода гуавы.
    guava_variety:
      name: Сорт гуавы
      description: Конкретный сорт или рыночная разновидность гуавы, поступающей в
        продажу (например, «яблочная» гуава, «мексиканская кремовая», тайская, розовая,
        бескосточковая, белая).
    guide_material:
      name: Материал направляющей
      description: Материал колец или вставок удилища.
    guide_type:
      name: Тип колец
      description: Тип колец, установленных на удилище, например одноопорные, роликовые
        или змеевидные.
    guideline_markings:
      name: Разметка направляющих линий
      description: Тип визуальной разметки для выравнивания, нанесенной или встроенной
        в поверхность тренировочного коврика для подачи. Помогает при тренировках
        подачи.
    guiro_scraper_material:
      name: Материал скребка гуиро
      description: Материал входящего в комплект или рекомендуемого скребка или ударника
        для гуиро.
    guiro_surface_style:
      name: Тип поверхности гуиро
      description: Рисунок или геометрия игровой поверхности, которую скребут для
        извлечения звука.
    guitar_body_finish_type:
      name: Тип отделки корпуса гитары
      description: Тип отделки, используемой на корпусе гитары.
    guitar_bridge_system_type:
      name: Тип бридж-системы гитары
      description: Семейство конструкции бриджа или струнодержателя для совместимости
        и удобства подбора.
    guitar_case_style:
      name: Тип кейса для гитары
      description: Общий тип защиты или конструкции кейса либо чехла для гитары.
    guitar_humidifier_placement:
      name: Место размещения увлажнителя для гитары
      description: Место использования или размещения увлажнителя относительно инструмента
        или окружающей среды.
    guitar_pedal_i_o_configuration:
      name: Конфигурация входов и выходов гитарной педали
      description: Поддержка моно- или стереомаршрутизации входного и выходного сигнала
        педали.
    guitar_pedal_output_connector_type:
      name: Тип выходного разъема гитарной педали
      description: Тип разъема аудиовыхода, используемого в педали.
    guitar_slide_finish:
      name: Отделка слайда для гитары
      description: Отделка поверхности слайда. Влияет на ощущения и трение о струны.
    guitar_slide_style:
      name: Стиль слайда для гитары
      description: Формфактор слайда или тон-бара для гитары, а также способ его ношения
        или использования.
    guitar_stand_type:
      name: Тип стойки для гитары
      description: Основной формфактор стойки для гитары (способ поддержки или хранения
        гитары).
    guitar_strap_attachment_type:
      name: Тип крепления ремня для гитары
      description: Способ крепления ремня к гитаре (или крепежным кнопкам), включая
        использование традиционных концов или систем быстрого снятия.
    guitar_strap_end_material:
      name: Материал концов ремня для гитары
      description: Материал, используемый на концах или язычках ремня (частях, крепящихся
        к кнопкам ремня или системам фиксации ремешка).
    guitar_strap_features:
      name: Характеристики гитарного ремня
      description: Дополнительные функциональные особенности ремня для гитары помимо
        базового размера или материала (множественный выбор).
    guitar_string_coating:
      name: Покрытие гитарных струн
      description: Наличие защитного покрытия на струнах и (при наличии) тип покрытия.
    guitar_string_gauge_type:
      name: Тип калибра гитарных струн
      description: Маркетинговая категория калибра комплекта струн для акустической
        гитары (например, extra light, light, medium). Часто приблизительно определяется
        толщиной первой струны E; точные диапазоны калибра могут различаться в зависимости
        от производителя.
    guitar_string_set_gauge_category:
      name: Категория калибра комплекта гитарных струн
      description: Распространенные маркетинговые категории калибра комплекта гитарных
        струн (обычно определяются по первой струне/высокой E).
    guitar_string_winding_type:
      name: Тип обмотки гитарных струн
      description: Тип внешней обмотки витых струн в комплекте.
    guitar_tuning_peg_button_shape:
      name: Форма кнопки колка гитары
      description: Форма или стиль ключа либо кнопки колка.
    guitar_tuning_peg_configuration:
      name: Конфигурация колков гитары
      description: Схема расположения комплекта колков на головке грифа.
    guitar_tuning_peg_mounting_style:
      name: Стиль крепления колков
      description: Способ крепления колкового механизма к головке грифа (тип втулки
        и метод защиты от проворачивания).
    guitar_tuning_peg_shaft_type:
      name: Тип штока колка гитары
      description: Тип струнного штифта цельный или прорезной, а также способ фиксации
        струны.
    guitar_tuning_peg_style:
      name: Стиль колков
      description: Физический тип колкового механизма или колка и формат крепления
        на головке инструмента (например, закрытый или открытый механизм, с фиксацией,
        с разъемным стержнем).
    gum_condition:
      name: Состояние клея
      description: Состояние клея на обратной стороне марки (например, без наклейки,
        с наклейкой, без клея).
    gun_action_type:
      name: Тип действия оружия
      description: Тип механизма перезарядки и стрельбы (например, продольно-скользящий
        затвор, рычажный механизм).
    gun_operational_status:
      name: Рабочее состояние оружия
      description: Статус деактивации или невозможности стрельбы коллекционного оружия,
        а также способ его представления.
    gun_type:
      name: Тип оружия
      description: Общий формфактор огнестрельного антикварного оружия.
    gusset_material:
      name: Материал вставки
      description: Материал подкладки ластовицы. Влияет на воздухопроницаемость, гигиеничность
        и комфорт.
    gymnastics_discipline:
      name: Гимнастическая дисциплина
      description: Направление гимнастики, для которого предназначен продукт (например,
        спортивная, художественная, акробатическая).
    hair_extension_texture:
      name: Текстура наращенных волос
      description: Тип завитка, волны или текстуры прядей для наращивания.
    hair_net_style:
      name: Тип сетки для волос
      description: Конструкция или дизайн сетки для волос (например, с начесом, сетка-сетка,
        накидка на пучок).
    hair_quality_grade:
      name: Класс качества волос
      description: Обозначение качества или происхождения волос по отраслевым стандартам.
    halter_style:
      name: Тип недоуздка
      description: Функциональный тип или дизайн недоуздка (например, веревочный,
        с разрывным элементом, выставочный). Помогает покупателям выбрать недоуздок
        в соответствии с предполагаемым использованием.
    hammock_style:
      name: Тип гамака
      description: Конструкция или тип исполнения гамака.
    hand_and_foot_coverage:
      name: Покрытие рук и ног
      description: Встроенные или съемные варежки и пинетки, закрывающие руки и/или
        ноги.
    hand_cymbal_set_configuration:
      name: Конфигурация набора ручных тарелок
      description: 'Формат продажи продукта: согласованная пара, отдельная тарелка
        или расширенный комплект.'
    hand_drum_head_material:
      name: Материал мембраны ручного барабана
      description: Материал мембраны дарбуки.
    hand_exerciser_style:
      name: Тип тренажера для кистей
      description: Общий тип или механизм тренажера для кистей.
    hand_guard_backbone_material:
      name: Материал каркаса защиты рук
      description: Материал конструкционного каркаса или основы (при наличии). Определяет
        прочность и уровень защиты.
    hand_guard_coverage_style:
      name: Тип покрытия защиты рук
      description: Профиль или зона покрытия защиты рук. Влияет на защиту от ветра
        и ударов.
    hand_guard_mounting_type:
      name: Тип крепления защиты рук
      description: Способ крепления защиты рук к мотоциклу (например, к торцу руля
        с внутренним зажимом или только зажимом).
    hand_guard_set_configuration:
      name: Конфигурация набора защиты рук
      description: 'Формат продажи продукта: левая и правая сторона в комплекте или
        одна сторона.'
    hand_guard_style:
      name: Тип защиты рук
      description: Дизайн или тип покрытия защиты (например, закрытый, открытый, полный,
        упрощенный, стандартный).
    hand_guard_weather_protection:
      name: Защита рук от погодных условий
      description: Уровень защиты от погодных условий, обеспечиваемый защитой рук.
    hand_paddle_strap_type:
      name: Тип ремня для лопаток
      description: Тип ремня или отсутствие ремня для фиксации лопатки на руке пользователя.
    hand_percussion_mount_attachment_mechanism:
      name: Механизм крепления ручной перкуссии
      description: Способ крепления держателя к стойке, раме или другому оборудованию
        (например, зажимное крепление или крепление на стержень).
    hand_percussion_mounting_handling:
      name: Способ размещения и удержания ручной перкуссии
      description: 'Способ использования инструмента: в руке, на теле, на креплении
        или на столе/полу.'
    hand_percussion_pitch_type:
      name: Тип высоты звучания ручной перкуссии
      description: 'Тип звучания инструмента: определенная высота тона (настраиваемая/нотная)
        или неопределенная.'
    hand_percussion_playing_method:
      name: Способ игры на ручной перкуссии
      description: Типичный способ извлечения звука из инструмента (например, встряхивание
        или скребковая техника).
    hand_percussion_set_configuration:
      name: Конфигурация комплекта ручной перкуссии
      description: 'Формат продукта: отдельный инструмент, согласованная пара или
        многокомпонентный комплект.'
    hand_percussion_size_class:
      name: Размерный класс ручной перкуссии
      description: Общая размерная категория инструмента при отсутствии точных измерений
        или для удобной фильтрации.
    hand_sewing_needle_point_type:
      name: Тип острия иглы для ручного шитья
      description: Форма или тип острия иглы для ручного шитья, используемого для
        прокалывания различных материалов (например, тканых материалов, трикотажа,
        кожи) или пряжи.
    hand_support_level:
      name: Уровень поддержки руки
      description: Степень поддержки или компрессии, обеспечиваемая перчаткой, бинтом
        или ремнем.
    hand_support_size:
      name: Размер поддержки руки
      description: Размер перчатки, ремня или бинта, заявленный производителем (XS-XXL
        или единый размер).
    handball_ball_type:
      name: Тип мяча для гандбола
      description: Категория назначения гандбольного мяча, например матчевый, тренировочный
        или пляжный.
    handball_playing_surface:
      name: Игровая поверхность для гандбола
      description: Игровые поверхности, для которых оптимизирован гандбольный мяч.
    handball_target_type:
      name: Тип мишени для гандбола
      description: Тип или конструкция мишени для бросков, предназначенной для тренировок
        по командному гандболу.
    handbrake_actuation_type:
      name: Тип приведения ручного тормоза
      description: Способ приведения стояночного тормоза в действие.
    handbrake_orientation:
      name: Ориентация ручного тормоза
      description: Совместимость ручного тормоза с леворульными, праворульными или
        универсальными транспортными средствами.
    handgun_grip_material:
      name: Материал рукоятки пистолета
      description: Основной материал накладок или рукоятки пистолета.
    handle_configuration:
      name: Конфигурация ручки
      description: Конструкция рукоятки для вейкборда (например, одинарная, двойная,
        Deep-V, T-wrap). Помогает покупателям подобрать вариант под уровень навыков,
        трюки или тип доски.
    handle_ergonomics:
      name: Эргономика рукоятки
      description: Эргономичные особенности рукоятки. Помогают улучшить комфорт и
        контроль.
    handle_grip_material:
      name: Материал рукоятки
      description: Материал поверхности хвата рукоятки. Влияет на комфорт и сцепление,
        особенно во влажных условиях.
    handle_grip_type:
      name: Тип рукоятки
      description: Покрытие, материал или тип поверхности хвата рукоятки. Помогает
        улучшить комфорт и контроль.
    handle_shape:
      name: Форма рукоятки
      description: Форма поперечного сечения или профиль рукоятки.
    handlebar_design:
      name: Конструкция руля
      description: Тип руля на степпере, например отсутствие руля, фиксированный,
        регулируемый по высоте, складной или с эспандерами.
    handlebar_type:
      name: Тип руля
      description: Тип руля, установленного на велосипеде. Влияет на посадку, управление
        и комфорт.
    handslide_bore_type:
      name: Тип канала кулисы
      description: 'Тип кулисы бас-тромбона: с одним или двумя каналами.'
    handwear_cuff_style:
      name: Тип манжеты перчаток
      description: Конструкция манжеты или запястной части перчаток либо варежек.
        Влияет на покрытие и посадку.
    handwear_insulation_material:
      name: Материал утеплителя перчаток
      description: Утепляющий или подкладочный материал, используемый внутри перчаток
        или варежек.
    handwear_size:
      name: Размер перчаток
      description: Размер перчаток или других изделий для рук. Обеспечивает правильную
        посадку.
    hang_glider_design:
      name: Конструкция дельтаплана
      description: Конструкционный тип дельтаплана (например, гибкое крыло, жесткое
        крыло, моторный).
    hanger_thread_size:
      name: Размер резьбы держателя
      description: Размер или стандарт резьбы, используемой для крепления держателя
        к стойкам или сигнализаторам поклевки. Обеспечивает совместимость.
    hanging_suspension_method:
      name: Способ подвесного крепления
      description: Основное крепление или система подвеса качелей (например, веревка,
        цепь, опорная рама).
    hardtop_finish_type:
      name: Тип отделки хардтопа
      description: Состояние внешней отделки хардтопа (например, грунтованный или
        окрашенный). Влияет на готовность к установке и внешний вид.
    hardtop_shell_material:
      name: Материал корпуса хардтопа
      description: Основной материал жесткого корпуса хардтопа транспортного средства
        (не тканевого покрытия), например стекловолокно или алюминий.
    hardtop_window_configuration:
      name: Конфигурация окон хардтопа
      description: Окна, входящие в комплект хардтопа, и их конфигурация.
    harmonica_comb_material:
      name: Материал гребенки гармоники
      description: Материал корпуса воздушных камер губной гармоники.
    harmonica_cover_plate_finish:
      name: Отделка крышек губной гармоники
      description: Отделка или покрытие крышек губной гармоники.
    harmonica_cover_plate_material:
      name: Материал крышек гармоники
      description: Материал внешних крышек.
    harmonica_finish:
      name: Отделка гармоники
      description: Отделка поверхности крышек или корпуса губной гармоники.
    harmonica_included_accessories:
      name: Аксессуары в комплекте гармоники
      description: Аксессуары, входящие в комплект губной гармоники.
    harmonica_note_range:
      name: Диапазон звучания губной гармоники
      description: Классификация диапазона инструмента, используемая в оркестровом
        контексте (например, бас, баритон, тенор).
    harmonica_reed_plate_material:
      name: Материал язычковых пластин губной гармоники
      description: Материал язычковых пластин (например, латунь, нержавеющая сталь,
        алюминий).
    harmonica_system_type:
      name: Система или тип губной гармоники
      description: Оркестровая система или формфактор губной гармоники (например,
        аккордовая, басовая, баритоновая, полифоническая).
    harmonica_tuning_system:
      name: Система настройки гармоники
      description: Система или схема настройки губной гармоники (например, настройка
        по Рихтеру, соло, оркестровая настройка).
    harness_shell_type:
      name: Тип оболочки страховочной системы
      description: Жесткость конструкции оболочки страховочной системы (например,
        софтшелл, хардшелл, гибрид).
    harness_style:
      name: Тип страховочной системы
      description: Конструкция или дизайн страховочной системы, например поясная,
        сидячая, нагрудная/жилет, крылообразная, шорты-бордшорты или гибридная.
    harness_type:
      name: Тип упряжи
      description: Конструкционный тип альпинистской страховочной системы, например
        поясная, полная или грудная.
    harp_action_type:
      name: Тип механики арфы
      description: Основной механизм изменения высоты звука или альтерации на арфе.
    harp_finish:
      name: Отделка арфы
      description: Отделка поверхности корпуса арфы (например, натуральная, мореная,
        окрашенная, лакированная).
    harp_included_accessories:
      name: Аксессуары арфы
      description: Аксессуары, входящие в комплект педальной арфы.
    harvest_method:
      name: Метод добычи
      description: 'Способ получения морепродуктов: дикий вылов, фермерское выращивание
        или другой метод.'
    harvest_stage:
      name: Стадия сбора урожая
      description: Стадия роста рукколы на момент сбора урожая, например микрозелень,
        молодые листья или зрелый пучок.
    hat_style:
      name: Стиль шляпы
      description: Конструкция или тип праздничной шляпы (например, конус, корона,
        цилиндр, козырек), отражающие базовый внешний вид изделия.
    hazard_signal_mode:
      name: Режим аварийного сигнала
      description: Выбираемые режимы или схемы свечения светодиодных или электронных
        дорожных сигнальных огней.
    head_configuration:
      name: Конфигурация головки
      description: Наличие у головки ледоруба тесла, молотка, обоих элементов или
        их отсутствие. Напрямую влияет на функциональность на льду и смешанном рельефе.
    head_material:
      name: Материал мембраны
      description: Материал игровой мембраны, поставляемой с квинто.
    head_movement_type:
      name: Тип движения головки
      description: Возможности направленного движения головки сошек или опоры (например,
        поворот, наклон, крен).
    head_side:
      name: Сторона мембраны
      description: 'Назначение барабанной мембраны: для ударной, резонаторной стороны
