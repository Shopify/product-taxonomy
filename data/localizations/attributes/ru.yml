    feeder_mechanism_type:
      description: Механизм дозирования, используемый кормушкой для подачи корма.
    feijoa_cultivar:
      name: Сорт фейхоа
      description: Конкретный сорт или разновидность фейхоа. Разные сорта отличаются
        вкусом, размером и сроками сбора урожая.
    felt_duty:
      name: Категория фетра
      description: Категория фетра теннисного мяча (например, extra duty, regular
        duty). Влияет на срок службы на разных покрытиях.
    felting_mold_intended_use:
      description: Назначение формы в проектах по валянию.
    felting_pad_surface_material:
      name: Материал поверхности коврика для валяния
      description: Материал рабочей поверхности коврика/мата для валяния, контактирующей
        с волокном/иглой.
    fencing_certification:
      name: Сертификация для фехтования
      description: Перечень официальных одобрений руководящих организаций, которым
        соответствует фехтовальное оружие (например, FIE, USFA). Указывает на соответствие
        требованиям соревнований и стандартам качества.
    fencing_connector_type:
      name: Тип фехтовального разъема
      description: Конфигурация разъема для подключения фехтовальных проводов, гнезд
        или катушек (например, 2-pin, 3-pin, байонетный). Обеспечивает совместимость
        компонентов.
    fencing_discipline:
      name: Дисциплина фехтования
      description: Вид оружия или дисциплина фехтования, для которых предназначен
        или с которыми совместим товар.
    fencing_weapon_type:
      name: Тип фехтовального оружия
      description: Тип фехтовального или тренировочного оружия, с которым совместимо
        или которое имитирует тренировочное приспособление. Помогает подобрать подходящее
        снаряжение.
    fender_finish_state:
      name: Состояние отделки поверхности крыла
      description: Состояние поверхности/отделки крыла при поставке. Указывает на
        готовность к окраске и установке.
    fender_pieces_included:
      description: Перечень компонентов, входящих в комплект поставки. Указывает,
        является ли товар отдельным крылом или полным комплектом с аксессуарами.
    fender_type:
      name: Тип крыла
      description: Общая конструкция или стиль крыла.
    fennel_trimming:
      name: Обрезка фенхеля
      description: Части растения, входящие в комплект с луковицей фенхеля (например,
        с листьями, с обрезанными верхушкой и корнем).
    fennel_variety:
      name: Сорт фенхеля
      description: Сорт или рыночная разновидность продаваемых луковиц фенхеля.
    fermentation_application:
      name: Назначение ферментации
      description: Основной продукт питания или напиток, для ферментации которого
        предназначена культура (например, сыр, йогурт, молочный кефир, закваска).
    fermentation_method:
      name: Метод ферментации
      description: Способ производства или ферментации соевого соуса (например, натуральное
        брожение, химический гидролиз).
    fermentation_vessel_material:
      name: Материал для бродильной емкости
      description: Основной материал емкости для ферментации, входящей в комплект
        (при наличии).
    ferrule_material:
      name: Материал ферула
      description: Материал ферула шафта (например, Juma, Phenolic, Polycarbonate,
        XTC или отсутствие ферула). Влияет на долговечность и ощущения при ударе.
    fia_homologation_certification:
      name: Омологация/сертификация FIA
      description: Наличие сертификации/омологации автомобиля (или каркаса безопасности)
        и соответствующий стандарт.
    fiber_animal_source_type:
      name: Тип животного/источника волокна
      description: Животное или основной источник ровницы (или синтетическое происхождение),
        например шерсть мериноса, альпака или растительные волокна.
    fiber_luster_level:
      name: Уровень блеска волокна
      description: Визуальный блеск волокна — от матового до сильно блестящего.
    fiber_preparation_processing_stage:
      name: Этап подготовки/обработки волокна
      description: Способ подготовки/обработки ленты для использования (например,
        кардочесанная или гребенная, смешанная, superwash).
    fiber_preparation_type:
      name: Тип подготовки волокна
      description: Способ подготовки волокна для рукоделия (например, кардочесанный
        пласт, барабанное кардочесание, лист префельта).
    field_hockey_ball_playing_surface:
      name: Игровое покрытие для мяча хоккея на траве
      description: Игровое покрытие или условия, для которых предназначен мяч.
    field_hockey_ball_type:
      name: Тип мяча для хоккея на траве
      description: Категория мяча для хоккея на траве по назначению или особой характеристике.
    field_hockey_goal_size_standard:
      name: Стандарт размера ворот для хоккея на траве
      description: Категория ворот по распространенным стандартам хоккея на траве
        или тренировочным размерам (например, FIH outdoor regulation, youth, mini).
    field_hockey_training_objective:
      name: Цель тренировки по хоккею на траве
      description: Основной навык или направление тренировки, для улучшения которого
        предназначено тренировочное приспособление.
    field_point_attachment_method:
      name: Способ крепления полевого наконечника к древку стрелы или вставке (например,
        Screw-in, Glue-in).
      description: Указывает способ крепления наконечника к древку стрелы или вставке
        (например, с помощью винта, клея).
    field_point_tip_style:
      name: Стиль наконечника полевого наконечника
      description: Геометрическая форма или функциональный профиль наконечника полевого
        наконечника. Влияет на проникающую способность, усилие извлечения и соответствие
        правилам.
    fielding_glove_position:
      name: Позиция полевой перчатки
      description: Игровая позиция или вариант применения перчатки в бейсболе или
        софтболе.
    fielding_training_focus:
      name: Направление полевой тренировки
      description: Основной навык, на развитие которого направлено тренировочное приспособление.
    figure_8_device_design:
      name: Конструкция устройства Figure 8
      description: Конкретная конфигурация устройства Figure 8. Влияет на характеристики
        использования и назначение.
    figure_finish_type:
      name: Тип отделки поверхности фигурки
      description: Отделка поверхности/покрытие фигурки модели лошади. Влияет на внешний
        вид и тактильные свойства коллекционного изделия.
    figurine_scale:
      name: Масштаб фигурки
      description: Масштаб/соотношение фигурки относительно реального объекта (при
        наличии), например 1:6.
    fill_status:
      name: Статус наполнения
      description: 'Состояние манекена для борьбы при продаже: наполненный, ненаполненный
        или частично наполненный. Определяет стоимость доставки и объем подготовки
        для покупателя.'
    filling_consistency:
      name: Консистенция начинки
      description: Текстура или вязкость начинки при поставке (например, гладкий крем,
        кусочки фруктов, паста).
    filling_type:
      name: Тип начинки
      description: Основная начинка или крем внутри печенья, при наличии.
    filtration_and_mother_status:
      name: Статус фильтрации и наличия маточной культуры
      description: 'Состояние уксуса: фильтрованный, нефильтрованный, сырой или содержащий
        «маточную культуру». Подходит для потребителей, предпочитающих пробиотические
        или сырые продукты.'
    filtration_method:
      description: Материал или технология фильтрации и очистки водки после дистилляции.
    fin_box_system:
      name: Система финбокса
      description: Тип финбокса или монтажного интерфейса доски. Определяет совместимость
        со сменными плавниками.
    fin_buoyancy:
      name: Плавучесть плавника
      description: 'Плавучесть плавника в воде: положительная, нейтральная или отрицательная.
        Влияет на баланс снаряжения и положение дайвера.'
    fin_flex_rating:
      description: Относительная жесткость или уровень гибкости плавника. Влияет на
        общие эксплуатационные характеристики.
    fin_mounting_system:
      description: Интерфейс или стандарт крепления плавника к кайтборду (например,
        FCS II, screw-on, 4-hole). Обеспечивает совместимость плавников и досок.
    fin_position:
      name: Положение плавника
      description: Предусмотренное положение установки плавника на доске.
    fin_strap_type:
      description: Тип ремешка или системы фиксации для крепления плавника к пятке/стопе.
    fin_template:
      name: Шаблон плавника
      description: Категория гидродинамической формы или контура плавника для серфборда.
        Влияет на стиль поворотов, скорость и общее ощущение доски.
    finger_count:
      name: Количество пальцев
      description: Количество пальцев, для которых предназначены перчатка, накладка
        или рукоятка релиза.
    finger_coverage:
      name: Покрытие пальцев
      description: Степень покрытия пальцев.
    finger_grip_adjustability:
      name: Регулировка захвата для пальцев
      description: Способ крепления или регулировки захвата для пальцев под разные
        размеры руки.
    finger_hole_configuration:
      description: Ориентация отверстий для пальцев по руке (для правшей, левшей или
        универсальная).
    finger_hole_count:
      name: Количество отверстий для пальцев
      description: Количество отверстий для пальцев в кожаной накладке. Является ключевым
        отличием между моделями без пальцев, с 2, 3 и 4 отверстиями.
    finger_pick_band_style:
      name: Стиль кольца медиатора для пальца
      description: Конструкция кольца/петли для крепления к пальцу. Влияет на комфорт
        и регулировку.
    finger_pick_blade_length:
      name: Длина лепестка пальцевого медиатора
      description: Длина лепестка медиатора, выступающего от кольца.
    finger_pick_blade_shape:
      description: Форма/профиль игровой поверхности (лепестка), контактирующей со
        струнами.
    finger_pick_size:
      name: Размер пальцевого медиатора
      description: Размер кольца/петли пальцевого медиатора для разных окружностей
        пальца или большого пальца (не размер инструмента).
    finger_pick_wear_location:
      name: Расположение пальцевого медиатора
      description: Палец, для которого предназначен пальцевый медиатор, или наличие
        комплекта для большого и остальных пальцев.
    finger_protection:
      description: Наличие защиты спины пальцев в перчатке и возможность снятия защитных
        элементов.
    fingerboard_bearing_type:
      name: Тип подшипников фингерборда
      description: Тип подшипников, используемых в колесах фингерборда.
    fingerboard_grip_type:
      description: Материал/тип поверхности с цепким покрытием на деке фингерборда.
    fining_agent_active_ingredient:
      name: Активный ингредиент осветляющего агента
      description: Основной осветляющий или очищающий агент, используемый в продукте.
    fining_agent_type:
      name: Тип осветляющего агента
      description: Химический состав или материал осветляющего/очищающего агента для
        продуктов, используемых для осветления красного вина.
    finish_after_baking:
      name: Внешний вид после выпекания
      description: Типичный внешний вид поверхности после отверждения/выпекания.
    finish_effect:
      name: Эффект отделки поверхности
      description: Специальные поверхностные/оптические эффекты, нанесенные на стразы.
    finish_type:
      name: Тип отделки поверхности
      description: Отделка поверхности, нанесенная на корпус укулеле.
    finished_product_format:
      name: Формат готового продукта
      description: Тип ароматического продукта, для изготовления которого предназначен
        набор.
    fire_pit_accessories_included:
      description: Перечень примечательных аксессуаров, входящих в комплект костровой
        чаши, например искрозащитные экраны или лавовые камни. Уточняет содержимое
        комплекта.
    firework_assortment_launch_type:
      name: Тип запуска набора фейерверков
      description: Способ поджигания/запуска фейерверков, входящих в комплект.
    firework_assortment_types_included:
      name: Типы фейерверков в комплекте
      description: Основные типы фейерверков, входящих в набор, для сравнения содержимого
        комплектов (например, фонтаны, римские свечи, петарды).
    firework_effect_types:
      name: Типы эффектов фейерверков
      description: Основные категории визуальных и/или сенсорных эффектов, создаваемых
        набором (выберите все подходящие варианты).
    firework_ignition_method:
      name: Способ поджигания фейерверка
      description: Способ поджигания или активации фейерверка (например, фитиль или
        электрический воспламенитель).
    firework_visual_intensity_level:
      name: Уровень визуальной интенсивности фейерверка
      description: Общая визуальная интенсивность/объем искр для эффекта фонтана.
    firing_mode:
      name: Режим стрельбы
      description: Тип каше на конверте первого дня (например, печатное, ручная роспись).
    first_day_cover_cachet_type:
      description: Тип штампа на конверте первого дня выпуска (например, печатный,
        расписанный вручную).
    first_day_cover_cancellation_type:
      name: Тип гашения конверта первого дня
      description: Тип/стиль почтового гашения, нанесенного на конверт первого дня
        (например, машинное гашение, ручное гашение).
    first_day_cover_set_type:
      name: Тип набора конвертов первого дня
      description: 'Тип комплекта: отдельный выпуск, полный набор или поднабор/комбинация.'
    fishing_hook_size:
      name: Размер рыболовного крючка
      description: 'Стандартизированное обозначение размера рыболовного крючка (например,
        #4, 1/0, 10/0). Помогает подобрать размеры крючка под целевую рыбу и наживку.'
    fishing_hook_style:
      description: Конкретная конструкция или форма изгиба одинарного крючка. Влияет
        на подачу приманки, эффективность подсечки и варианты применения.
    fishing_hook_type:
      description: Конфигурация крючка, входящего в комплект с блесной (при наличии).
    fishing_line_application:
      name: Назначение рыболовной лески
      description: Назначение рыболовной лески или поводкового материала (например,
        поводок, основная леска, типпет).
    fishing_line_buoyancy_type:
      name: Тип плавучести рыболовной лески
      description: Поведение лески в толще воды (например, плавающая, промежуточная,
        тонущая). Помогает подобрать подходящую глубину подачи.
    fishing_needle_purpose:
      name: Назначение рыболовной иглы
      description: Основное назначение иглы при монтаже рыболовной оснастки.
    fishing_needle_types_included:
      name: Типы рыболовных игл в комплекте
      description: Перечень конкретных типов игл или инструментов для оснастки, входящих
        в комплект. Позволяет быстро ознакомиться с содержимым набора.
    fit_profile:
      name: Профиль посадки
      description: Общий крой и силуэт защиты. Влияют на подвижность и степень покрытия.
    fit_volume_classification:
      name: Классификация объема посадки
      description: Категория внутреннего объема ботинка по классификации брендов (например,
        LV для низкого объема).
    fitting_angle:
      name: Угол фитинга
      description: Угол изгиба корпуса фитинга (например, прямой, 45°, 90°). Используйте
        «Регулируемый / поворотный» для фитингов с изменяемым углом и «Другое» для
        нестандартных углов.
    flag_base_type:
      name: Тип основания флага
      description: Тип основания или крепления для фиксации углового флага на различных
        игровых покрытиях.
    flag_design_theme:
      name: Тематика дизайна флага
      description: Основная тематика дизайна флага (например, страна/национальная
        символика, спортивная команда, праздник). Поддерживает поиск и фильтрацию
        по назначению покупки.
    flag_mounting_method:
      description: Способ крепления флага к транспортному средству (например, крепление
        на антенну, фаркоп, магнитное крепление).
    flag_type:
      description: Назначение или стиль гольф-флага, например флаг лунки, флаг для
        гольф-кара или тренировочный флаг.
    flame_resistance_standard:
      name: Стандарт огнестойкости
      description: Стандарт/сертификация огнестойкости или защиты от электрической
        дуги, которому соответствует изделие.
    flamenco_cajon_snare_system:
      name: Система струн фламенко-кахона
      description: Внутренний механизм струн, создающий характерное звучание фламенко,
        или отсутствие такого механизма.
    flammability_compliance:
      name: Соответствие требованиям воспламеняемости
      description: Стандарты воспламеняемости, которым соответствует ткань для автомобильных
        интерьеров.
    flannel_brushing_finish:
      name: Ворсовая отделка поверхности фланели
      description: Наличие ворсовой обработки фланели и стороны ее нанесения. Влияет
        на мягкость, теплоизоляцию и внешний вид.
    flannel_use_type:
      name: Тип применения фланели
      description: Основное назначение отреза/рулона фланели.
    flap_configuration:
      description: Тип крыла седла, например monoflap или twin flap.
    flare_color:
      name: Цвет сигнального огня
      description: Цвет излучаемого света/пламени (или цвет линзы для светодиодных
        сигнальных огней).
    flash_card_included_features:
      name: Функции карточек в комплекте
      description: Функциональные особенности обучения/использования, предусмотренные
        в карточках.
    flavor_intensity:
      name: Интенсивность вкуса
      description: Степень концентрации ароматизатора. Помогает определить подходящую
        дозировку (например, стандартная концентрация, сверхконцентрированный).
    flavor_solvent_base:
      name: Основа растворителя ароматизатора
      description: Основной носитель или растворитель, используемый в ароматизаторе
        (например, спирт, пропиленгликоль, глицерин).
