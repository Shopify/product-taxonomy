    brass_instrument_application_area:
      name: Область духового инструмента для применения
      description: Части духового инструмента, для которых предназначен дезинфицирующий
        спрей.
    brass_instrument_care_kit_purpose:
      name: Назначение набора для ухода за духовыми инструментами
      description: Предполагаемый сценарий использования набора (плановое техническое
        обслуживание, генеральная уборка, поездки/экстренные ситуации, базовый набор
        для учащихся и т. д.).
    brass_instrument_case_shell_material:
      name: Материал корпуса духового инструмента
      description: Основной материал жесткого корпуса/рамы (если имеется), отличный
        от материала обычной сумки или чехла.
    brass_instrument_lubricant_additives_features:
      name: Присадки/функциональные особенности для смазки духовых инструментов
      description: Основные функциональные особенности состава смазочного материала.
    brass_instrument_lubricant_base_composition:
      name: Базовый состав смазки для духовых инструментов
      description: Основная смазочная основа/химический состав средства, используемого
        в качестве смазки для духовых инструментов.
    brass_instrument_lubricant_viscosity_grade:
      name: Класс вязкости смазки для духовых инструментов
      description: Относительная вязкость смазки для духовых инструментов.
    brass_instrument_replacement_part_type:
      name: Тип запасной части духового инструмента
      description: Тип запасных частей, к которому относится эта деталь для духовых
        инструментов (компоненты клапанов/кулисы/водяных клапанов, пробки/войлока,
        защитные кожухи и т. д.).
    brass_instrument_valve_configuration:
      name: Конфигурация клапанов духового инструмента
      description: Как инструмент изменяет высоту тона (клапанный механизм/кулиса).
    brass_lubricant_application_area:
      name: Область применения смазки
      description: Механизм духового инструмента, для которого предназначена смазка.
    brass_mouthpiece_backbore:
      name: Профиль задней канавки мундштука духового инструмента
      description: Профиль задней части канала мундштука (его форма и размер). Влияет
        на тембр и интонацию.
    brass_mouthpiece_cup_depth:
      name: Глубина чаши мундштука духового инструмента
      description: Классификация глубины чаши мундштука (насколько глубокая чаша),
        влияющая на тембр и отклик инструмента.
    brass_polishing_cloth_abrasiveness_level:
      name: Уровень абразивности полировочной ткани для латуни
      description: 'Степень абразивности ткани: от более агрессивного удаления потемнений
        до мягкой полировки для придания блеска.'
    bread_crumb_base_ingredient:
      name: Основной ингредиент панировочных сухарей
      description: Основной ингредиент, из которого изготовлены панировочные сухари,
        например пшеница, рис, свиная шкура или миндаль.
    bread_variety:
      name: Сорт хлеба
      description: Стиль или разновидность хлеба или булочек. Помогает покупателям
        находить конкретные типы (например, бриошь, багет, наан).
    breadstick_style:
      name: Стиль хлебных палочек
      description: Конкретный традиционный стиль или формат хлебных палочек.
    bridge_head_material:
      name: Материал головки моста
      description: Материал, используемый исключительно для головки мостика, влияющий
        на вес, ощущения и долговечность.
    bridge_head_type:
      name: Тип головки мостика
      description: Тип головки мостика. Помогает покупателям выбрать предпочтительную
        форму опоры для кия.
    bridle_part_type:
      name: Тип детали уздечки
      description: Конкретный элемент уздечки, который представляет запасная деталь.
        Помогает покупателям найти нужную деталь.
    bridle_style:
      name: Стиль уздечки
      description: Общий стиль или конструкция уздечки. Помогает всадникам быстро
        находить снаряжение под свои нужды или дисциплину.
    broadhead_field_point_attachment_style:
      name: Способ крепления охотничьего/полевого наконечника
      description: Способ крепления охотничьего или полевого наконечника к древку
        стрелы.
    broadhead_thread_size:
      name: Размер резьбы охотничьего наконечника
      description: Размер резьбы, используемой для крепления наконечника к вставке
        или древку стрелы.
    broadhead_tip_type:
      name: Тип наконечника охотничьего лезвия
      description: Тип наконечника/феррулы охотничьего лезвия, влияющий на проникновение
        и эффективность для разной дичи.
    broccoli_cut:
      name: Способ нарезки брокколи
      description: Как брокколи нарезана или подготовлена перед упаковкой (например,
        целый кочан, соцветия, “рис”).
    broccoli_variety:
      name: Сорт брокколи
      description: Конкретный сорт или рыночная разновидность брокколи (например,
        брокколини, романеско).
    broom_head_material:
      name: Материал щетки метлы
      description: Материал головки метлы, влияющий на долговечность и игровые характеристики.
    brush_format:
      name: Формат щетки
      description: Физический формат щетки для лыж или сноуборда с различаем ручных
        блоков и роторных насадок для дрели (например, шерсть или фетр).
    brush_shape:
      name: Форма щетки
      description: Физическая форма или профиль корпуса/головки щетки. Влияет на площадь
