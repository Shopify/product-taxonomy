    whipped_cream_form:
      name: Форма взбитых сливок
      description: Физическая форма продажи взбитых сливок.
    whistle_head_material:
      name: Материал головки свистка
      description: Материал головки или мундштука свистка.
    whistle_light_features:
      name: Световые функции свистка
      description: Наличие в свистке встроенной подсветки для вечеринок (например,
        LED).
    whistle_purpose:
      name: Назначение свистка
      description: Основное назначение свистка (спорт, безопасность на воде, дрессировка
