        транспортное средство или большая площадка)
    amplifier_class:
      name: Класс усилителя
      description: Тип усилителя (например, AB или D)
    amplifier_configuration:
      name: Конфигурация усилителя
      description: Тип настройки автомобильного усилителя (например, двухканальный
