    toy_audio_features:
      name: Аудиофункции игрушки
      description: Перечень аудиофункций и звуковых эффектов игрушки.
    toy_boat_play_features:
      name: Игровые функции игрушечной лодки
      description: Интерактивные особенности игрушечных лодок. Помогает при поиске
        и фильтрации.
    toy_boat_recommended_play_environment:
      name: Рекомендуемая среда игры для игрушечной лодки
      description: Рекомендуемая среда использования игрушечной лодки для соответствия
        ожиданиям покупателей и требованиям безопасности (например, ванна или открытая
        вода).
    toy_bowling_equipment_included:
      name: Комплект игрушечного боулинга
      description: Состав набора игрушечного боулинга (например, кегли, шар, дорожка
        или коврик, сумка для переноски).
    toy_car_features:
      name: Особенности игрушечной машины
      description: Игровые функции игрушечной машины, не связанные с движением, например
        подсветка, звуки или открывающиеся элементы.
    toy_drawing_tablet_accessories_included:
      name: Аксессуары планшета для рисования
      description: Дополнительные аксессуары в комплекте помимо самого планшета (например,
        дополнительный стилус, штампы).
    toy_drawing_tablet_erase_method:
      name: Способ стирания игрушечного планшета для рисования
      description: Способ очистки или стирания поверхности для рисования.
    toy_drawing_tablet_screen_type:
      name: Тип экрана игрушечного планшета для рисования
      description: Тип поверхности для рисования или отображения (например, ЖК-планшет
        для письма или магнитная поверхность).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Инструмент для письма и рисования на игрушечном планшете
      description: Основной инструмент для рисования на планшете (тип стилуса).
    toy_figure_sound_feature:
      name: Звуковые функции игрушечной фигурки
      description: Наличие звуков у фигурки животного и их тип (например, рык, реалистичные
        звуки животных).
    toy_game_features:
      name: Функции игрушки/игры
      description: Особенности конструкции или игрового функционала игрушек для пляжа
        и песка.
    toy_gift_basket_items_included:
      name: Состав подарочной корзины игрушек
      description: Основные типы игрушек в подарочной корзине (например, мягкая игрушка,
        конструктор, пазл).
    toy_glider_launch_method:
      name: Способ запуска игрушечного планера
      description: Способ запуска игрушечного планера. Влияет на стиль игры и ожидания
        покупателей.
    toy_helicopter_control_type:
      name: Тип управления игрушечным вертолетом
      description: Способ управления и эксплуатации игрушечного вертолета (независимо
        от привода), например ручной пульт, управление через приложение или отсутствие
        управления (свободный полет).
    toy_helicopter_features:
      name: Особенности игрушечного вертолета
      description: Ключевые функциональные характеристики игрушечного вертолета (особенно
        радиоуправляемых моделей). Влияет на удобство использования и игровую ценность.
    toy_jacks_set_items_included:
      name: Состав набора игры «джекс»
      description: Состав основных предметов набора игры «джекс» (например, джекс,
        мяч, сумка).
    toy_keyboard_learning_mode:
      name: Режим обучения игрушечной клавиатуры
      description: Образовательный или обучающий режим игрушечной клавиатуры (например,
        подсветка клавиш, песни для повторения, пошаговые уроки, обучение через приложение).
    toy_keyboard_sound_theme:
      name: Звуковая тематика игрушечной клавиатуры
      description: Типы встроенных тембров инструментов (помимо стандартного пианино).
    toy_kitchen_appliances_included:
      name: Включенные кухонные приборы игрушечной кухни
      description: Кухонная техника в наборе, если продукт представляет собой бытовую
        технику или набор, ориентированный на бытовую технику.
    toy_kitchen_assembly_requirement:
      name: Требование сборки игрушечной кухни
      description: Наличие необходимости сборки и примерная сложность сборки.
    toy_kitchen_interactive_features:
      name: Интерактивные функции игрушечной кухни
      description: Интерактивные элементы, встречающиеся в игрушечных кухнях и сопутствующих
        аксессуарах.
    toy_motorcycle_feature_set:
      name: Набор функций игрушечного мотоцикла
      description: Основные игровые функции игрушечного мотоцикла (выбор всех применимых
        функций).
    toy_motorcycle_scale:
      name: Масштаб игрушечного мотоцикла
      description: Масштаб игрушечных или коллекционных мотоциклов (например, 1:12).
    toy_parachute_launch_method:
      name: Способ запуска игрушечного парашюта
      description: Способ запуска и развертывания игрушки для полета.
    toy_piano_and_keyboard_accessories_included:
      name: Аксессуары игрушечного пианино и клавиатуры
      description: Аксессуары, входящие в комплект игрушечного пианино или клавиатуры.
    toy_playset_assembly_required:
      name: Требуется сборка игрового набора
      description: Необходимость сборки взрослыми перед началом игры (кроме простого
        защелкивания деталей).
    toy_playset_items_included:
      name: Состав игрового набора
      description: Перечень основных компонентов, входящих в игровой набор (что находится
        в коробке).
    toy_safety_certification:
      name: Сертификация безопасности игрушек
      description: Стандарты и знаки соответствия безопасности игрушек, применимые
        на рынке покупателя (например, EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Особенности игрушечного космического корабля
      description: Интерактивные и игровые функции игрушечного космического корабля.
    toy_spaceship_size_class:
      name: Класс размера игрушечного космического корабля
      description: Классификация размера игрушечного космического корабля для быстрого
        фильтра. Не включает точные габариты и не является масштабом модели.
    toy_tableware_pieces_included:
      name: Состав набора игрушечной посуды
      description: Состав игрушечной посуды (тарелки, чашки, столовые приборы, сервировочные
        элементы).
    toy_tool_electronic_features:
      name: Электронные функции игрушечных инструментов
      description: Интерактивные и электронные функции игрушечного инструмента (свет,
        звук, вращение и т. п.).
    toy_tool_set_components_included:
      name: Состав набора игрушечных инструментов
      description: Перечень конкретных игровых инструментов, входящих в комплект (особенно
        для наборов инструментов).
    toy_train_scale:
      name: Масштаб игрушечного поезда
      description: Стандарт масштаба модели игрушечного поезда или размер системы
        рельсов для обеспечения совместимости с существующими поездами и путями.
    toy_train_track_layout_type:
      name: Тип конфигурации железнодорожного пути игрушечного поезда
      description: Форма или схема железнодорожного пути, входящего в набор или расширение.
    toy_weapon_gadget_features:
      name: Особенности игрушечного оружия и гаджетов
      description: Типичные интерактивные и функциональные особенности игрушечного
        оружия и шпионских гаджетов.
    tpms_sensor_frequency_band:
      name: Частотный диапазон датчика TPMS
      description: Радиочастотный диапазон, поддерживаемый аксессуарами TPMS, если
        применимо.
    track_and_field_discipline:
      name: Легкоатлетическая дисциплина
      description: Конкретная легкоатлетическая дисциплина или вид соревнований, для
        которых предназначен товар (например, толкание ядра, прыжки с шестом, спринт).
    track_event_specialization:
      name: Специализация легкоатлетического вида
      description: Тип легкоатлетической дисциплины, для которой оптимизирована обувь
        с шипами.
    track_field_event_suitability:
      name: Конкретные виды легкой атлетики
      description: Конкретные виды легкой атлетики, для которых предназначено тренировочное
        приспособление.
    track_set_special_features:
      name: Особенности трекового набора
      description: Особенности игрового функционала трекового набора помимо базовой
        трассы и машинок.
    track_surface_compatibility:
      name: Совместимость поверхности трассы
      description: Тип поверхности для бега, для которой предназначены шиповки или
        обувь.
    tracking_aid_type:
      name: Тип системы курсовой устойчивости
      description: Наличие устройств для улучшения прямолинейного движения каяка.
    traction_pattern_type:
      name: Тип рисунка сцепления
      description: Основной рисунок канавок или протектора поверхности, обеспечивающий
        сцепление с платформой.
    trading_card_league:
      name: Лига коллекционных карточек
      description: Спортивная лига, связанная с набором или тематикой карточек (если
        применимо).
    trailer_construction:
      name: Конструкция прицепа
      description: Основной материал или тип конструкции рамы и кузова прицепа (например,
        алюминий, сталь или комбинированная конструкция).
    trailer_coupler_size:
      name: Размер сцепного устройства прицепа
      description: Размер шара сцепного устройства, необходимого для буксировки прицепа.
    trailer_hitch_mounting_location_method:
      name: Место и способ установки фаркопа
      description: Место и способ установки фаркопа на транспортном средстве (например,
        задний ресивер, передний ресивер, крепление к раме, бамперу или кузову).
    trailer_light_function:
      name: Функция фонаря прицепа
      description: Основная функция или расположение фонаря прицепа.
    trailer_suspension_type:
      name: Тип подвески прицепа
      description: Тип подвески велосипедного прицепа, например пружинная или рессорная.
        Обеспечивает комфорт движения и защиту груза.
    trailer_wiring_circuit:
      name: Цепи проводки прицепа
      description: Перечень цепей и сигналов проводки прицепа для освещения, тормозов
        и вспомогательных систем, включая линии питания, заземления и сигнальные линии.
    trailer_wiring_connector_type:
      name: Тип разъема проводки прицепа
      description: Стандарт разъема со стороны прицепа или транспортного средства
        для жгутов проводки и адаптеров прицепа.
    train_whistle_intended_use:
      name: Назначение железнодорожного свистка
      description: Основное назначение железнодорожного свистка.
    train_whistle_sound_character:
      name: Характер звучания железнодорожного свистка
      description: Воспринимаемый тональный характер звука свистка (тембр).
    trainer_mounting_type:
      name: Тип крепления тренажера
      description: Способ подключения велосипеда к тренажеру (например, с помощью
        колеса или прямой передачи).
    training_dummy_shape:
      name: Форма тренировочного манекена
      description: Общая конструкция или силуэт манекена. Влияет на хват собаки и
        реалистичность тренировки.
    training_focus:
      name: Направленность тренировки
      description: Основной навык, на развитие которого направлен аксессуар (например,
        рефлексы, работа ног, зрительно-моторная координация).
    training_focus_area:
      name: Область тренировочной направленности
      description: Основной навык лакросса, для развития которого предназначен аксессуар.
    training_objective:
      name: Цель тренировки
      description: Основной навык или техника, для улучшения которых предназначен
        товар.
    training_surface_suitability:
      name: Совместимость с тренировочными поверхностями
      description: Типы поверхностей, на которых можно использовать тренажер.
    training_surface_usage:
      name: Назначение тренировочной поверхности
      description: Основные виды активности, поддерживаемые тренировочной поверхностью.
        Разделяет синтетический лед для катания и коврики для сухих тренировок или
        мультиспорта.
    training_usage_type:
      name: Тип тренировочного использования
      description: Основной период или сценарий использования тренировочных трусов,
        например дневное или ночное обучение.
    trampoline_enclosure_type:
      name: Тип защитного ограждения батута
      description: Конфигурация защитного ограждения батута, включая место и способ
        крепления сетки.
    trampoline_safety_certifications:
      name: Сертификация безопасности батута
      description: Стандарты и сертификаты безопасности для батутов, которым соответствует
        товар.
    transfer_application_method:
      name: Метод переноса изображения
      description: Способ нанесения трансфера на ткань (например, утюгом или термопрессом).
    transfer_method:
      name: Метод переноса
      description: Способ переноса изображения на ткань.
    transfer_peel_temperature:
      name: Температура снятия подложки трансфера
      description: Рекомендуемое температурное состояние для снятия подложки после
        прессования (горячее, теплое или холодное).
    transmission_cooler_construction:
      name: Конструкция охладителя трансмиссии
      description: Конструкция сердцевины охладителя трансмиссии.
    transmission_fluid_specification:
      name: Спецификация трансмиссионной жидкости
      description: Стандарт OEM или спецификация, которым соответствует трансмиссионная
        жидкость (например, семейства Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Материал втулки опоры трансмиссии
      description: Материал эластомера или изолятора, используемого во втулке опоры
        трансмиссии (вибродемпфирующем элементе).
    transmission_mount_type:
      name: Тип опоры трансмиссии
      description: Конструкция опоры трансмиссии (например, гидравлическая или жесткая).
        Помогает определить совместимость, характеристики NVH и назначение.
    transparency_level:
      name: Уровень прозрачности
      description: Степень прозрачности стенок контейнера. Помогает выбрать между
        видимым содержимым и скрытым хранением.
    transport_case_type:
      name: Тип транспортировочного кейса
      description: Конструктивный стиль или жесткость транспортировочного решения.
        Отражает уровень защиты и способ упаковки.
    transposition_modes:
      name: Режимы транспонирования
      description: Режимы транспонирования и концертного строя, поддерживаемые тюнером
        (например, концертный строй и транспонирующие строи B♭ или E♭).
    trap_design:
      name: Конструкция ловушки
      description: Конструкция или механизм ловушки. Определяет способ установки и
        виды животных или условия использования.
    trap_spring_configuration:
      name: Конфигурация пружин ловушки
      description: Количество или расположение пружин ловушки. Влияет на силу срабатывания
        и соответствие законодательству.
    travel_bassinet_accessories_included:
      name: Комплект аксессуаров дорожной люльки
      description: Дополнительные предметы в комплекте с дорожной люлькой.
    travel_spinning_wheel_assembly_required:
      name: Требование сборки дорожной прялки
      description: Необходимость сборки или настройки прялки помимо раскладывания
        перед использованием (например, установка крыльчатки, натяжения, педалей).
    travel_spinning_wheel_portability_features:
      name: Особенности портативности дорожной прялки
      description: Конструктивные особенности дорожной прялки, связанные с портативностью,
        например складная конструкция и средства транспортировки.
    travel_trailer_appliances_fuel_type:
      name: Тип топлива приборов туристического прицепа
      description: Основной тип топлива для встроенных приборов, отопления или приготовления
        пищи (не включая тягач).
    travel_trailer_holding_tank_type:
      name: Тип накопительных баков туристического прицепа
      description: Типы накопительных баков, установленных в туристическом прицепе
        (выберите все, что применимо).
    travel_trailer_power_hookup_shore_power:
      name: Подключение питания туристического прицепа (береговое электропитание)
      description: Стандарты электрического подключения для внешнего берегового электропитания.
    tread_pattern_type:
      name: Тип рисунка протектора
      description: Общий тип рисунка протектора шины, например гладкий, полугладкий
        или грубый. Влияет на сцепление, сопротивление качению и тип поверхности использования.
    treadmill_key_type:
      name: Тип ключа беговой дорожки
      description: Конструкция или механизм подключения ключа безопасности (например,
        магнитный круглый, пластиковая вставка, клипса).
    treadmill_part_type:
      name: Тип детали беговой дорожки
      description: Конкретный компонент беговой дорожки, для замены которого предназначен
        товар (например, полотно или двигатель). Помогает быстро определить совместимость.
    treadmill_position:
      name: Положение элемента беговой дорожки
      description: Место установки детали на беговой дорожке (переднее, заднее, верхнее,
        нижнее, центральное).
    triangle_striker_material:
      name: Материал ударника треугольника
      description: Материал ударника или палочки в комплекте.
    trigger_input_connector:
      name: Разъем триггерного входа
      description: Стандарт физического разъема для входов триггера.
    trigger_input_connector_type:
      name: Тип разъема входа триггера
      description: Тип физического разъема для триггерного входа.
    trigger_input_zone_support:
      name: Поддержка зон триггерного входа
      description: Поддержка одно- и двухзонных триггерных входов (например, головка/обод)
        и аналогичных многозонных конфигураций.
    trim_application_method:
      name: Метод нанесения отделки
      description: Способ крепления декоративной отделки к изделию (например, пришивание,
