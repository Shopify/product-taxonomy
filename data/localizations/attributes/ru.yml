    dollhouse_items_included:
      name: Предметы в комплекте кукольного домика
      description: Что входит в комплект кукольного домика (мебель, куклы, аксессуары).
    dollhouse_lighting_type:
      name: Тип освещения кукольного домика
      description: Тип освещения, входящего в кукольный домик или поддерживаемого
