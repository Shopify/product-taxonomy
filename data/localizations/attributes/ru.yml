    cricket_ball_grade:
      name: Класс мяча для крикета
      description: Уровень качества или игровой стандарт, для которого предназначен
        мяч.
    cricket_ball_piece_construction:
      name: Конструкция секций мяча для крикета
      description: Количество внешних секций или формованных частей оболочки мяча
