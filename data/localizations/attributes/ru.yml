    weave_style:
      name: Стиль плетения
      description: Традиционный узор плетения панамской шляпы, влияющий на воздухопроницаемость,
        гибкость, внешний вид и стоимость.
    weave_type:
      name: Тип плетения
      description: Тип переплетения ткани или стиль конструкции (торговое название
        переплетения), который влияет на текстуру, блеск и драпировку.
    weaving_beater_edge_type:
      name: Тип кромки берда ткацкого станка
      description: Профиль рабочей кромки берда, контактирующей с утком (например,
        прямой или зубчатый).
    weaving_beater_style:
      name: Стиль ткацкого гребня
      description: Функциональный тип или формат плоского берда ткацкого станка.
    weaving_shuttle_tip_style:
      name: Тип наконечника челнока
      description: Форма переднего наконечника челнока, влияющая на прохождение через
