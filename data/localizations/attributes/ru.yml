      description: Интерфейс или система фиксации оси, для которых предназначена втулка
        (быстросъемная, сквозная ось и т. д.).
    hub_motor_type:
      name: Тип мотор-колеса
      description: Конструкция мотор-колеса (редукторное, с прямым приводом, щеточное,
        бесщеточное). Помогает покупателям оценить крутящий момент, вес и эффективность.
    hula_hoop_construction_type:
      name: Тип конструкции хулахупа
      description: Конструкция или способ сборки хулахупа.
    hula_hoop_features:
      name: Особенности хулахупа
      description: Функциональные или конструктивные особенности хула-хупа.
    hull_design:
      name: Конструкция корпуса
      description: Форма корпуса. Влияет на производительность и характеристики управления.
    hull_type:
      name: Тип корпуса
      description: Форма корпуса. Влияет на производительность и устойчивость.
    humidifier_refill_medium_type:
      name: Тип наполнителя увлажнителя
      description: Материал для удержания влаги или сменный наполнитель в кассетном
        увлажнителе.
    humidifier_refill_method:
      name: Способ заправки увлажнителя
      description: Способ повторного увлажнения или замены увлажнителя.
    humidifying_medium:
      name: Увлажняющий элемент
      description: Увлажняющий элемент или материал, используемый в продукте (то,
        что смачивается или активируется).
    hummus_base_ingredient:
      name: Базовый ингредиент хумуса
      description: Основная бобовая или овощная основа, используемая для приготовления
        хумуса.
    hunting_call_type:
      name: Тип охотничьего манка
      description: Основной тип работы или механизм манка (например, духовой, электронный,
        коробчатый). Помогает охотникам быстро выбрать формат, соответствующий их
        потребностям и уровню навыков.
    hunting_dog_collar_function:
      name: Функция ошейника для охотничьих собак
      description: Основной функциональный тип или назначение ошейника. Помогает покупателям
        фильтровать товары по функциям, таким как отслеживание, дрессировка, видимость
        или стандартное использование.
    hvac_control_functions:
      name: Функции управления HVAC
      description: Функции HVAC, обогрева стекол или управления воздушным потоком,
        контролируемые устройством (механически или электронно).
    hybrid_drivetrain_configuration:
      name: Конфигурация гибридной трансмиссии
      description: Архитектура системы PHEV, описывающая способ совместной работы
        электродвигателей и двигателя внутреннего сгорания для привода.
    hybrid_system_type:
      name: Тип гибридной системы
      description: Архитектура гибридной системы, используемая в транспортном средстве.
    hybrid_truck_cab_type:
      name: Тип кабины гибридного грузовика
      description: Конфигурация кабины грузовика. Влияет на количество мест и внутреннее
        пространство.
    hydration_bag_features:
      name: Особенности сумки для гидратора
      description: Примечательные конструктивные или функциональные особенности сумок
        для гидратора.
    hydration_belt_features:
      name: Функции пояса для питьевой системы
      description: Встроенные особенности, повышающие удобство использования, безопасность
        или комфорт гидрационного пояса.
    hydration_bladder_compatibility:
      name: Совместимость с гидратором
      description: Наличие или поддержка системы гидратора в жилете.
    hydration_mouthpiece_style:
      name: Стиль мундштука гидратора
      description: Конструкция или функциональный стиль мундштука или клапана гидрационной
        системы. Помогает покупателям выбрать предпочтительный вариант питьевого интерфейса
        и обеспечить совместимость.
    hydration_pack_style:
      name: Стиль гидрационного рюкзака
      description: Конструктивный стиль гидрационного рюкзака, например рюкзак или
        жилет. Помогает при подборе посадки и сценария использования.
    hydration_system_insulation:
      name: Теплоизоляция гидрационной системы
      description: Наличие теплоизоляции резервуара и/или питьевой трубки. Помогает
        поддерживать температуру жидкости в жарких или холодных условиях.
    hydration_valve_type:
      name: Тип клапана гидратора
      description: Стиль питьевого клапана или мундштука, поставляемого с системой
        или бутылкой (распространенные клапаны с прикусом и высокопоточные насадки).
    hydraulic_fluid_type:
      name: Тип гидравлической жидкости
      description: Тип тормозной жидкости, для использования с которой предназначена
        гидравлическая велосипедная тормозная ручка. Эта информация критически важна
        для обслуживания и безопасности.
    hydrogenation_level:
      name: Степень гидрогенизации
      description: 'Наличие и степень гидрогенизации жира: негидрогенизированный,
        частично гидрогенизированный или полностью гидрогенизированный. Влияет на
        содержание трансжиров и свойства при выпечке.'
    hydrophobicity_level:
      name: Уровень гидрофобности
      description: Степень образования капель или стекания воды, заявленная для продукта.
    ice_cream_format:
      name: Формат мороженого
      description: Физическая форма или формат подачи мороженого (например, пинта,
        батончик, моти).
    ice_skate_sharpener_type:
      name: Тип точилки для коньков
      description: Конструкция или формат точилки (ручной камень, электрический станок,
        шаблон и т. д.).
    ice_temperature_suitability:
      name: Подходящая температура льда
      description: Диапазон температуры льда, для которого предназначен воск для хоккейной
        клюшки. Влияет на эксплуатационные свойства и отталкивание снежной крошки.
    icing_sugar_variety:
      name: Разновидность сахарной пудры
      description: Состав или функциональный тип сахарной пудры (например, для помадки,
        нетающая, цветная, ароматизированная).
    ignition_coil_configuration:
      name: Конфигурация катушки зажигания
      description: Формфактор катушки зажигания (одиночная катушка и катушка на свече,
        многовыводной блок катушек по числу цилиндров, катушечная рейка/кассета или
        распределительный тип).
    ignition_lead_compliance_standard:
      name: Стандарт соответствия проводов зажигания
      description: Отраслевой стандарт или сертификация, которым, по заявлению производителя,
        соответствуют провода зажигания (например, SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Материал изоляции проводов зажигания
      description: Основной материал изоляции или оболочки проводов зажигания (внешняя
        изоляция кабеля).
    ignition_lead_set_type:
      name: Тип комплекта проводов зажигания
      description: Один провод зажигания или полный комплект, а также назначение комплекта.
    ignition_lead_terminal_type:
      name: Тип клемм проводов зажигания
      description: Тип клемм или разъемов на концах проводов зажигания (например,
        клемма свечи зажигания и клемма катушки/распределителя).
    illumination_type:
      name: Тип подсветки
      description: Наличие и способ подсветки мяча для игры в темноте (например, фосфоресцентное
        свечение, светодиод с активацией от удара).
    immobilizer_installation_type:
      name: Тип установки иммобилайзера
      description: Способ установки или подключения иммобилайзера к транспортному
        средству.
    immobilizer_unlock_method:
      name: Способ разблокировки иммобилайзера
      description: Способ активации, деактивации или разблокировки иммобилайзера.
    impact_protection_certifications:
      name: Сертификации ударозащиты
      description: Конкретные стандарты безопасности, которым соответствует или которые
        превышает защитная накладка.
    impact_protection_level:
      name: Уровень защиты от ударов
      description: Уровень ударозащиты или технология спортивного бандажа.
    impact_protection_rating:
      name: Класс ударозащиты
      description: Сертифицированный уровень ударозащиты в соответствии со стандартами
        (например, EN 1621-1 Level 1, EN 14120 Level 2). Помогает пользователям выбирать
        защиту более высокого класса.
    impact_surface_material:
      name: Материал ударной поверхности
      description: Основной материал ударной поверхности, влияющий на безопасность
        и ощущения при использовании (например, пена, пластик).
    incense_base_material:
      name: Базовый материал благовоний
      description: Основной базовый или связующий материал, используемый для изготовления
        благовоний в наборе (порошковая основа).
    incense_making_method:
      name: Способ изготовления благовоний
      description: Процесс изготовления благовоний, для которого подходит набор.
    incense_tool_type:
      name: Тип инструмента для благовоний
      description: Тип инструмента для изготовления благовоний (для формования, измерения,
        прессования, смешивания или сушки благовоний).
    incline_adjustment_type:
      name: Тип регулировки наклона
      description: Способ регулировки наклона во время тренировки или отсутствие такой
        регулировки.
    included_accessories:
      name: Аксессуары в комплекте
      description: Дополнительные аксессуары в комплекте, например запасные насадки
        и биты, кейс для хранения, зарядный кабель или сетевой адаптер.
    included_case_type:
      name: Тип кейса в комплекте
      description: Тип чехла или кейса для переноски и хранения, входящего в комплект
        бас-саксофона (если применимо).
    included_components:
      name: Комплектующие в комплекте
      description: Содержимое комплекта поставки (полезно для наборов инструментов
        и комплектов).
    included_fastener_components:
      name: Компоненты застежки в комплекте
      description: Комплект крючков и петель, только крючки, только петли или другой
        вариант швейной застежки.
    included_hydration_vessel_type:
      name: Тип емкости для жидкости в комплекте
      description: Тип емкости для жидкости, поставляемой с поясом или поддерживаемой
        им.
    included_items_woodwind_instrument:
      name: Предметы в комплекте (деревянный духовой инструмент)
      description: Предметы, обычно входящие в комплект бас-саксофона.
    included_materials:
      name: Материалы в комплекте
      description: Состав комплекта выкройки (только выкройка или выкройка с материалами).
    included_mounting_accessories:
      name: Монтажные аксессуары в комплекте
      description: Монтажные или крепежные аксессуары, входящие в комплект спикерфона.
    included_pump_type:
      name: Тип насоса в комплекте
      description: Тип насоса, поставляемого надувной кроватью или встроенного в нее.
    included_scraper_implement_type:
      name: Тип скребка в комплекте
      description: Игровые приспособления, входящие в комплект музыкального скребка
        (например, палочка или стержень-скребок, металлическая щетка).
    indicator_design:
      name: Конструкция индикатора
      description: Форма или конструкция индикатора поклевки.
    indicator_functions_tracked:
      name: Отслеживаемые функции индикатора
      description: Игровые показатели, отслеживаемые индикатором, например болы, страйки,
        ауты, иннинги, количество подач, оверы, викеты, счет или дауны.
    indoor_outdoor_use:
      name: Использование в помещении или на улице
      description: 'Предназначение игрушки для боулинга: для дома, улицы или обоих
        вариантов.'
    inflatable_decoration_items_included:
      name: Предметы в комплекте надувного декора
      description: Основные аксессуары, входящие в комплект надувного декора (например,
        вентилятор, колышки, растяжки).
    inflatable_decoration_type:
      name: Тип надувного декора
      description: Вид надувного праздничного декора (форма или формфактор). Помогает
        при поиске и фильтрации.
    inflatable_raft_float_features:
      name: Особенности надувного плота или матраса
      description: Функциональные особенности надувного плота или матраса.
    inflation_method_included:
      name: Способ накачивания в комплекте
      description: Тип средства для накачивания шин, входящего в ремонтный комплект
        (если применимо).
    infused_scent:
      name: Пропитанный аромат
      description: Ароматические или вкусовые добавки, используемые в материале приманки.
    ingredient_base_type:
      name: Тип базового ингредиента
      description: Основная база для ферментации (например, концентрат виноградного
        сока, свежий сок или фруктовый концентрат).
    ingredient_physical_form:
      name: Физическая форма ингредиента
      description: Физическая форма поставки ароматического ингредиента (для работы,
        измерения и составления рецептуры).
    ingredient_processing_method:
      name: Метод обработки ингредиентов
      description: Основной способ обработки ингредиента (например, сублимированная
        сушка, обжарка, ферментация).
    ink_colors_included:
      name: Цвета чернил в комплекте
      description: Цвета чернил, входящие в комплект штемпельных подушек.
    ink_pad_application_method:
      name: Способ нанесения чернил штемпельной подушкой
      description: Способ подачи или использования чернил из подушки (традиционная
        штемпельная подушка, аппликатор или подушка с кистевым наконечником).
    ink_pad_permanence:
      name: Стойкость чернильной подушки
      description: Стойкость и архивное качество отпечатанных чернил после высыхания
        (устойчивость к выцветанию и воде).
    ink_pad_size:
      name: Размер штемпельной подушки
      description: Стандартизированный размер или формфактор поверхности и корпуса
        штемпельной подушки.
    ink_pad_special_effects:
      name: Специальные эффекты штемпельной подушки
      description: Специальные визуальные или функциональные эффекты чернил при штамповке
        (например, металлик, блестки).
    ink_permanence:
      name: Стойкость чернил
      description: Постоянные и архивные либо смываемые и нестойкие свойства высохших
        чернил суми.
    ink_preparation_required:
      name: Необходимость подготовки чернил
      description: Готовность чернил суми к использованию или необходимость разведения
        водой либо растирания перед применением.
    inline_skate_brake_type:
      name: Тип тормоза роликовых коньков
      description: Конфигурация тормоза роликовых коньков, например съемный пяточный
        тормоз или отсутствие тормоза.
    inner_tent_configuration:
      name: Конфигурация внутренней палатки
      description: Конфигурация или стиль внутренней палатки, например полный внутренний
        модуль, сетчатая вставка или термовкладыш.
    innerspring_coil_type:
      name: Тип пружинного блока
      description: Конструкция пружинной системы внутри матраса. Влияет на поддержку,
        изоляцию движений и стоимость.
    input_connector_type:
      name: Тип входного разъема
      description: Тип разъема аудиовхода, используемого педалью (обычно TS 1/4 дюйма).
    input_valve_type:
      name: Тип входного клапана
      description: Стандарт клапана велосипедной камеры или колеса, к которому подключается
        адаптер.
    insecticide_treatment:
      name: Инсектицидная обработка
      description: Заводская обработка сетки инсектицидом и тип обработки для дополнительной
        защиты.
    insert_coverage_area:
      name: Область покрытия вставки
      description: Часть стопы, которую покрывает вставка (например, по всей длине
        или только пятка).
    insert_length_type:
      name: Тип длины вставки
      description: Степень покрытия стельки супинатором.
    inside_message_type:
      name: Тип внутреннего сообщения
      description: Наличие предварительно напечатанного внутреннего текста открытки
        и возможность его персонализации.
    insole_attachment_method:
      name: Метод крепления стельки
      description: Способ фиксации супинатора внутри обуви (свободная вставка, клейкая
        основа, текстильная застежка и т. д.).
    insole_material:
      name: Материал стельки
      description: Материал основания или стельки, на которое опирается стопа. Влияет
        на амортизацию и поддержку.
    installation_fabrication_level:
      name: Уровень доработки при установке
      description: Типичный объем доработки или модификации, необходимый для установки
        комплекта.
    installation_location:
      name: Место установки
      description: Типичное место установки датчика давления масла в масляной системе
        двигателя (например, масляный канал блока, корпус фильтра, проставка или выносная
        магистраль).
    installation_method:
      name: Метод установки
      description: Способ крепления или укладки мата либо плитки на пол.
    instant_coffee_form:
      name: Форма растворимого кофе
      description: Физическая форма поставки растворимого кофе. Влияет на способ приготовления
        и срок хранения.
    instep_coverage:
      name: Покрытие подъема стопы
      description: Защита только голени или одновременно голени и подъема стопы/стопы.
    instruction_format:
      name: Формат инструкций
      description: Формат инструкций в комплекте.
    instrument_cleaning_swab_form_factor:
      name: Формфактор чистящего тампона для инструмента
      description: Физическая конструкция тампона (например, протяжная салфетка или
        система со стержнем и щеткой). Помогает учитывать предпочтения музыканта и
        особенности инструмента.
    instrument_dimensions_unit_context:
      name: Контекст единиц размеров инструмента
      description: К чему относятся указанные размеры высоты, ширины и длины (например,
        весь инструмент, длина одной трубки, высота стойки).
    instrument_electronics_type:
      name: Тип электроники инструмента
      description: Активная или пассивная система звукоснимателя или предусилителя
        инструмента.
    instrument_key:
      name: Тональность инструмента
      description: Тональность блокфлейты, используемая в каталогах (обычно C или
        F для больших блокфлейт).
    instrument_level:
      name: Уровень инструмента
      description: Целевой уровень музыканта для инструмента.
    instrument_part_mounting_method:
