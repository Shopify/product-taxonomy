    decoy_posture:
      name: Поза манка
      description: Изображенная поза или активность животного, моделируемого манком
        (например, кормится, отдыхает, настороже).
    decoy_size_class:
      name: Размерный класс манка
      description: Относительный размер манка по сравнению с реальным животным (например,
        стандартный, магнум, оверсайз).
    decoy_style:
      name: Стиль манка
      description: Физический формфактор или класс конструкции манка, чтобы помочь
        охотникам выбрать подходящую оснастку.
    deli_meat_variety:
      name: Вид деликатесного мясного изделия
      description: Конкретный вид деликатесного мясного изделия (например, салями,
        болонья, прошутто, ростбиф).
    delivery_form:
      name: Форма поставки
      description: Физическая форма поставки очистителя инжектора.
    denim_composition:
      name: Состав джинсовой ткани
      description: Основной волокнистый состав джинсовой ткани (базовые волокна без
        учета красителей и отделок).
    denim_finish:
      name: Отделка джинсовой ткани
      description: Поверхностная или технологическая отделка, примененная к джинсовой
        ткани.
    denim_intended_use:
      name: Предназначение джинсовой ткани
      description: Типичное применение или проект, для которого продается джинсовая
        ткань.
    denim_stretch_type:
      name: Тип растяжимости джинсовой ткани
      description: Имеет ли джинсовая ткань механическую растяжимость, добавленный
        эластан/спандекс или не растягивается.
    denim_wash:
      name: Стирка джинсовой ткани
      description: Оттенок или обработка стиркой, примененная к джинсовой ткани (например,
        светлая, темная, необработанная, кислотная).
    derailleur_cage_length:
      name: Длина лапки переключателя
      description: Длина лапки переключателя, определяющая емкость цепи (в основном
