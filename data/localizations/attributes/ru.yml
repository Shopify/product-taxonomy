    airbrush_feed_type:
      name: Способ подачи краски в аэрографе
      description: Тип аэрографа по способу подачи краски (например, с гравитационной
        подачей или с сифоном)
    airbrush_operation_method:
      name: Способ управления аэрографом
      description: Тип аэрографа по способу управления им (например, двойного действия
