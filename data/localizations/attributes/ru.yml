        быстро найти нужный продукт.
    cricket_bat_size:
      name: Размер биты для крикета
      description: Стандартизированная классификация размеров биты для крикета (0–6,
        Harrow, SH, LH). Как правило, подбирается с учетом возраста и роста игрока.
    cricket_bat_size_compatibility:
      name: Совместимость по размеру биты для крикета
      description: Размеры бит, для которых предназначен аксессуар. Обеспечивает надлежащую
        совместимость.
    cricket_helmet_role:
      name: Назначение шлема для крикета
      description: 'Игровое амплуа, для которого предназначен шлем: отбивание или
