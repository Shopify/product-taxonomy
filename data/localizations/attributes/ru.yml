        свинца).
    wick_tab_shape:
      name: Форма крепежной пластины фитиля
      description: Форма крепежной пластины фитиля.
    wick_type_included:
      name: Тип включенного фитиля
      description: Тип или материал фитиля, входящего в комплект.
    wig_fiber_material:
