    dough_extruder_operation_type:
      name: Тип работы экструдера для теста
      description: Способ проталкивания теста через экструдер для формирования фигур.
    dough_extruder_shape_disc_included:
      name: Форма дисков экструдера для теста
      description: Формы, которые экструдер может создавать с помощью входящих в комплект
