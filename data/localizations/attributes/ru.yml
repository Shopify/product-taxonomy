    age_restrictions:
      name: Возрастные ограничения
      description: Минимальный возраст людей, для которых предназначен продукт или
        мероприятие (например, 18 лет и старше)
    ai_application:
      name: Возможности на базе ИИ
      description: Функции на базе ИИ в программном обеспечении (например, прогностический
