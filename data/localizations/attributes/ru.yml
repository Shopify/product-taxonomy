    cymbal_arm_style:
      name: Тип держателя тарелки
      description: Тип держателя тарелки (прямой или журавль). Определяет вылет и
        варианты позиционирования.
    cymbal_drum_case_wheel_configuration:
      name: Конфигурация колес кейса для тарелок и барабанов
      description: Наличие колес и их конфигурация для транспортировки с перекатыванием.
    cymbal_hammering_style:
      name: Тип ковки тарелки
      description: Процесс и внешний вид ковки. Влияет на сложность звучания и ощущения
        при игре.
    cymbal_kit_components_included:
      description: Типы тарелок в комплекте с ride-тарелкой. Указывает на дополнительные
        тарелки в наборе.
    cymbal_kit_items_included:
      description: Состав тарелок в комплекте (по типам тарелок).
    cymbal_lathing:
      name: Токарная обработка тарелки
      description: Степень и наличие токарной обработки поверхности тарелки (с канавками
