        для предотвращения потери и тип такого крепления.
    oil_filler_cap_venting_type:
      name: Тип вентиляции крышки маслозаливной горловины
      description: Наличие вентиляции крышки и тип вентиляционного механизма (при
        наличии).
    oil_filter_style:
      name: Тип масляного фильтра
      description: Формфактор масляного фильтра и способ установки для совместимости
        с креплением фильтра двигателя.
    oil_pan_baffle_windage_features:
      name: Особенности перегородок и ветрозащиты масляного поддона
      description: Встроенные внутренние элементы управления маслом в поддоне.
    oil_pan_finish_coating:
      name: Покрытие масляного поддона
      description: Отделка поверхности или покрытие масляного поддона (окрашенный,
        порошковое покрытие, гальваническое покрытие, без покрытия и т. п.).
    oil_pressure_sensor_function_type:
      name: Тип функции датчика давления масла
      description: 'Тип компонента: датчик давления масла с переменным выходным сигналом
        для прибора или ЭБУ либо выключатель давления масла с функцией включения предупреждающей
        лампы.'
    oil_pressure_sensor_signal_output_type:
      name: Тип выходного сигнала датчика давления масла
      description: Тип электрического выходного сигнала датчика давления масла.
    oil_processing_method:
      name: Метод обработки масла
      description: Способ производства или рафинирования масла (например, холодный
        отжим, нерафинированное, рафинированное). Влияет на вкус, пищевую ценность
        и подходящие способы приготовления.
    oil_pump_drive_method:
      name: Способ привода масляного насоса
      description: Источник привода масляного насоса в двигателе.
    oil_pump_mounting_style:
      name: Стиль крепления масляного насоса
      description: Место и способ установки масляного насоса в двигателе (например,
        внутренний или внешний/выносной, крепление к крышке, крепление к масляному
        поддону).
    oil_system_connection_thread_standard:
      name: Стандарт резьбы соединения масляной системы
      description: Стандарт резьбы или соединения интерфейса масляной системы детали
        для установки и совместимости (например, M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Класс вязкости масла
      description: Относительная вязкость масла для прядильного оборудования (не автомобильные
        классы SAE).
    okra_variety:
      name: Сорт бамии
      description: Конкретный сорт или рыночная разновидность бамии, например Clemson
        Spineless, Red Burgundy или Baby Okra.
    olfactory_arts_material_form:
      name: Форма материала для ольфакторного искусства
      description: Физическая форма материала в продаже.
    olfactory_arts_tool_kit_content:
      name: Содержимое набора инструментов для ольфакторного искусства
      description: Компоненты в комплекте набора для изготовления свечей, благовоний
        или парфюмерии.
    olive_variety:
      name: Сорт оливок
      description: Сорт используемых оливок. Влияет на вкус, текстуру, цвет и региональную
        аутентичность.
    onion_variety:
      name: Сорт лука
      description: Конкретный тип лука для выбора предпочтительных цвета, вкуса и
        вариантов использования, а также для точного описания товаров продавцами.
    opacity_level:
      name: Уровень непрозрачности
      description: Степень прозрачности или непрозрачности ткани.
    operating_modes:
      name: Режимы работы
      description: Основные встроенные режимы эффектов и движения лазерного светильника.
    operating_voltage:
      name: Рабочее напряжение
      description: Номинальное напряжение системы, для которого предназначена форсунка.
    optical_toy_features:
      name: Особенности оптической игрушки
      description: Основной визуальный или оптический эффект игрушки.
    orchestral_string_core_material:
      name: Материал сердечника оркестровой струны
      description: Материал сердечника струны. Влияет на ощущения при игре, отклик
        и звучание.
    orchestral_string_end_type:
      name: Тип окончания оркестровой струны
      description: Тип крепления на стороне струнодержателя.
    orchestral_string_included_strings:
      name: Струны оркестровых струнных инструментов в комплекте
      description: Конкретные струны в комплекте (зависит от инструмента).
    orchestral_string_instrument_fitting_part_type:
      name: Тип фурнитуры или детали оркестрового струнного инструмента
      description: Тип фурнитуры или детали изделия (например, подставка, струнодержатель,
        подбородник).
    orchestral_string_instrument_mute_type:
      name: Тип сурдины оркестровых струнных инструментов
      description: Функциональный тип сурдины для оркестрового струнного инструмента
        (например, тренировочная/гостиничная или концертная) и/или распространенный
        стиль конструкции.
    orchestral_string_instrument_part_position:
      name: Положение детали оркестрового струнного инструмента
      description: Место установки детали на инструменте. Полезно при наличии верхней/нижней
        или левой/правой частей.
    orchestral_string_winding_material:
      name: Материал обмотки струн оркестровых инструментов
      description: Материал внешней обмотки струны.
    organza_finish_sheen:
      name: Отделка/блеск органзы
      description: Внешний вид поверхности органзы (матовая или блестящая/переливающаяся).
    organza_ribbon_transparency_level:
      name: Уровень прозрачности ленты из органзы
      description: Степень прозрачности ленты из органзы.
    organza_transparency_level:
      name: Уровень прозрачности органзы
      description: Степень прозрачности ткани из органзы в один слой.
    origami_paper_shape:
      name: Форма бумаги для оригами
      description: Форма листа для складывания.
    origami_paper_sidedness:
      name: Оформление сторон бумаги для оригами
      description: Одинаковое или контрастное оформление сторон бумаги для оригами.
    ostrich_feather_part:
      name: Часть страусиного пера
      description: Тип или часть используемого страусиного пера (например, пышное
        или тусклое). Влияет на мягкость, плотность и типичное применение в рукоделии.
    outboard_motor_shaft_type:
      name: Тип вала подвесного мотора
      description: Стандартный класс длины вала подвесного мотора (обозначение, используемое
        в морской отрасли).
    outboard_motor_steering_type:
      name: Тип управления подвесным мотором
      description: Интерфейс или механизм управления подвесным мотором (например,
        румпель или дистанционная система управления).
    outdoor_table_functionality:
      name: Функциональные возможности уличного стола
      description: Встроенные специализированные функции, выходящие за рамки обычной
        столешницы (например, отделение-холодильник, полка для хранения, крышка газового
        баллона, основание для зонта, соединитель стульев, складная конструкция, безопасное
        использование в бассейне, регулируемая высота, встроенные колеса, LED-подсветка).
    outerwear_length_type:
      name: Тип длины верхней одежды
      description: Классификация общей длины верхней одежды по стандартным диапазонам.
    outerwear_pieces_included:
      name: Состав верхней одежды
      description: Предметы одежды в комплекте при продаже набора.
    outfit_attachment_mechanism:
      name: Механизм крепления комплекта одежды
      description: Способ крепления элементов одежды или аксессуаров к кукле (например,
        язычки, клейкая основа, магниты).
    outfit_items_included:
      name: Элементы комплекта одежды
      description: Конкретные предметы одежды в комплекте (например, боди, шорты,
        повязка на голову).
    outlet_thread_type:
      name: Тип резьбы выходного отверстия
      description: Стандарт резьбы выходных портов тормозных магистралей главного
        цилиндра (например, метрическая раструбная резьба по стандарту Bubble Flare
        или перевернутая раструбная резьба по стандарту SAE).
    output_jack_type_instrument:
      name: Тип выходного разъема (инструмент)
      description: Тип аудиовыхода электрической мандолины.
    output_signal_type:
      name: Тип выходного сигнала
      description: Тип или характер электрического выходного сигнала датчика (например,
        аналоговое сопротивление термистора NTC).
    outsole_marking_type:
      name: Тип следов подошвы
      description: Наличие следов от подошвы обуви на покрытии корта. Важно для зальных
        видов спорта с ракеткой.
    outsole_material:
      name: Материал подошвы
      description: Материал подошвы обуви, контактирующей с поверхностью. Влияет на
        сцепление, гибкость и долговечность.
    outsole_stud_type:
      name: Тип шипов подошвы
      description: Конфигурация подошвы или шипов (например, литые шипы, резиновые
        выступы, шипы для искусственного покрытия). Обеспечивает сцепление на выбранной
        игровой поверхности.
    oven_bake_clay_formulation:
      name: Формула запекаемой глины
      description: Тип формулы запекаемой глины (например, полимерная или смоляная).
        Влияет на обработку, процесс отверждения и свойства готового изделия.
    oven_housing_configuration:
      name: Конфигурация корпуса для духовки
      description: Конфигурация размещаемой техники в корпусе (например, одинарная
        духовка, двойная духовка или комбинация духовки и микроволновой печи).
    overhead_mount_installation_method:
      name: Способ установки верхнего крепления
      description: Способ крепежа верхнего крепления к транспортному средству (тип
        крепежа или монтажа).
    oversize_or_undersize_grade:
      name: Размерная категория больше или меньше номинального
      description: Размерная категория комплекта относительно стандартного OEM-размера
        (поршни или кольца больше номинального и/или подшипники меньше номинального).
    p_tex_application_method:
      name: Метод нанесения P-Tex
      description: Способ нанесения материала P-Tex на скользящую поверхность лыж
        или сноуборда.
    p_tex_form:
      name: Форма P-Tex
      description: Физическая форма поставки ремонтного материала.
    packability:
      name: Компактность при хранении
      description: Возможность и способ складывания или хранения жилета в неиспользуемом
        состоянии.
    packaging_format:
      name: Формат упаковки
      description: Способ упаковки или продажи струн (индивидуальные конверты, оптовая
        упаковка и т. п.).
    packaging_material:
      name: Материал упаковки
      description: Основной материал бутылки или контейнера для воды.
    packaging_type:
      name: Тип упаковки
      description: Способ упаковки фигурки с качающейся головой для розничной продажи,
        демонстрации или коллекционного хранения.
    packing_medium:
      name: Среда консервации
      description: Жидкость или среда (например, вода, различные сиропы, сок или рассол),
        используемая для сохранения фруктов в контейнере.
    pad_components_included:
      name: Компоненты подушки/прокладки
      description: Элементы в комплекте при продаже набора (например, наколенники
        и налокотники, только защита запястий).
    pad_controller_additional_control:
      name: Дополнительные элементы управления pad-контроллера
      description: Типы дополнительных физических элементов управления помимо пэдов
        (ручки, фейдеры, кнопки).
    pad_controller_performance_features:
      name: Функции pad-контроллера для исполнения
      description: Основные функции пэдов для исполнения и выразительного управления.
    pad_coverage_area:
      name: Зона покрытия защиты
      description: Зоны тела, защищаемые встроенными вставками шорт-защиты.
    pad_material_or_technology:
      name: Материал или технология защиты
      description: Фирменная технология поглощения ударов или брендированный материал
        защиты.
    pad_mounting_or_holding_style:
      name: Способ крепления или фиксации защиты
      description: Способ фиксации, ношения или установки защиты во время использования.
    pad_saver_style:
      name: Стиль защитной подложки
      description: Конструкция или форма защитной подложки для сушки подушек и канала.
    pad_shape:
      name: Форма подушки/прокладки
      description: Геометрическая форма или кривизна ударной поверхности или корпуса
        пэда (например, круглый, изогнутый, прямоугольный, плоский). Помогает подобрать
        пэд под тренировочные цели и типы ударов.
    pad_shell_type:
      name: Тип внешней оболочки защиты
      description: Тип конструкции внешней поверхности защиты (например, жесткая оболочка,
        мягкая оболочка, внутренняя вставка).
    pad_style:
      name: Стиль защиты
      description: Тип или конструкция защиты в комплекте с санями.
    padding_layers:
      name: Количество слоев набивки
      description: Количество слоев пены для поглощения ударов.
    padding_level:
      name: Уровень набивки
      description: Количество набивки в зонах контакта ремня или опоры (шея, плечи,
        спина).
    padding_material:
      name: Материал набивки
      description: Внутренний наполнитель или материал набивки для поглощения ударов
        в мешках, щитах, лапах и манекенах.
    paddle_ball_attachment_type:
      name: Тип крепления мяча к ракетке
      description: Способ крепления мяча к ракетке или отсутствие крепления.
    paddle_leash_style:
      name: Стиль лиша для весла
      description: Конструкция или стиль страховочного шнура весла.
    paddle_shape:
      name: Форма весла
      description: Общий силуэт головки или корпуса ракетки (например, стандартный,
        удлиненный, широкий). Влияет на р на дальность заброса, размер зоны оптимального
        удара и маневренность.
    paddleboard_intended_use:
      name: Назначение сапборда
      description: Основное назначение или тип активности, для которых предназначена
        доска (например, прогулки, йога, гонки).
    paint_application_method:
      name: Метод нанесения краски
      description: Основной способ нанесения продукта на суппорт.
    paint_by_number_surface_type:
      name: Тип поверхности для рисования по номерам
      description: Поверхность с нанесенным пронумерованным рисунком (например, холст,
        бумага, деревянная панель).
    paint_medium_application_method:
      name: Способ нанесения художественного медиума
      description: Рекомендуемый способ нанесения медиума.
    paint_medium_intended_effect:
      name: Предполагаемый эффект художественного медиума
      description: Основной результат применения медиума (текстура, блеск, лессировка,
        текучесть и т. п.).
    paint_safe_bristles:
      name: Безопасность щетины для лакокрасочного покрытия
      description: Пригодность щетины для использования на автомобильном лакокрасочном
        покрытии или прозрачном слое без царапин.
    paintable_surface:
      name: Поверхность под покраску
      description: Готовность формы из папье-маше к покраске без подготовки (например,
        грунтованная или герметизированная) либо необходимость подготовки.
    paintball_caliber:
      name: Калибр пейнтбольных шаров
      description: Диаметр или калибр пейнтбольных шаров или совместимого оборудования.
    paintball_feed_system:
      name: Система подачи пейнтбольных шаров
      description: Способ подачи пейнтбольных шаров в маркер.
    paintball_fill_color:
      name: Цвет наполнителя пейнтбольных шаров
      description: Цвет внутреннего маркирующего наполнителя, который может отличаться
        от внешней оболочки и определяет цвет следа при попадании.
    paintball_fill_type:
      name: Тип наполнения пейнтбольного шара
      description: Особые характеристики или свойства наполнителя (например, смываемый,
        светящийся в темноте, порошок).
    paintball_grade:
      name: Класс пейнтбольных шаров
      description: Класс производительности или уровень назначения (например, начальный,
        полевой, соревновательный, зимний).
    paintball_mask_coverage_level:
      name: Уровень защиты пейнтбольной маски
      description: Области лица или головы, защищаемые пейнтбольной маской или очками
        (только глаза, половина лица, полное лицо или вся голова).
    paintball_tank_valve_type:
      name: Тип клапана пейнтбольного баллона
      description: Интерфейс клапана или регулятора на баллоне.
    painting_surface_priming_type:
      name: Тип грунтовки художественной поверхности
      description: Тип грунтовки или покрытия художественной поверхности (не только
        грунтованная или негрунтованная). Влияет на адгезию краски и совместимость
        с техниками.
    palette_knife_blade_edge_profile:
      name: Профиль кромки мастихина
      description: Форма рабочей кромки лезвия мастихина (не острота). Влияет на нанесение
        мазков и смешивание.
    palette_knife_flexibility:
      name: Гибкость мастихина
      description: Жесткость или гибкость лезвия мастихина.
    palette_surface_finish:
      name: Отделка поверхности палитры
      description: Отделка или покрытие поверхности для смешивания. Влияет на устойчивость
        к пятнам и легкость очистки.
    palm_padding_level:
      name: Уровень защиты ладони
      description: Степень амортизации в области ладони перчатки или накладки для
        хвата.
    palm_padding_type:
      name: Тип защиты ладони
      description: Материал или конструкция амортизации ладони (например, гель, пена,
        двухслойная конструкция).
    palm_wax_blend_readiness:
      name: Степень готовности смеси пальмового воска
      description: Чистый пальмовый воск или предварительно смешанная формула с определенными
        эксплуатационными характеристиками.
    palm_wax_form:
      name: Форма пальмового воска
      description: Физическая форма пальмового воска в продаже. Влияет на удобство
        дозирования, скорость плавления и обращение.
    pan_flute_tuning_standard:
      name: Стандарт строя флейты Пана
      description: Опорная частота настройки (например, A4=440 Гц). Важна для игры
        с другими инструментами.
    pannier_configuration:
      name: Конфигурация велосумок
      description: 'Конфигурация комплекта велосумок: одиночная, соединенная двойная
        или комплект из двух/трех сумок.'
    pannier_mounting_system:
      name: Система крепления велосумок
