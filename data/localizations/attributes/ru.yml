    modeling_dough_base_material:
      name: Базовый материал массы для лепки
      description: Основной материал или состав массы для лепки (например, на основе
        пшеницы/муки или полимеров).
    modeling_dough_features:
      name: Особенности массы для лепки
      description: Основные функциональные характеристики массы для лепки, часто используемые
        покупателями для фильтрации.
    modification_level:
      name: Степень модификации
      description: Степень модификации солода (уровень расщепления эндосперма и белков
        ячменя), обычно обозначается как слабомодифицированный, модифицированный или
        сверхмодифицированный солод.
    molasses_base_ingredient:
      name: Основной ингредиент патоки
      description: Основной растительный или фруктовый источник, из которого производится
        патока.
    molasses_grade:
      name: Сорт патоки
      description: Классификация патоки по стадии экстракции или очистки. Влияет на
        интенсивность вкуса, цвет и пищевой профиль.
    mold_material:
      name: Материал формы
      description: Основной материал самой формы (например, силикон, пластик, металл).
    molle_compatibility:
      name: Совместимость с MOLLE
      description: Наличие строп MOLLE/PALS для крепления модульных подсумков и аксессуаров.
    motor_belt_type:
      name: Тип приводного ремня двигателя
      description: Конструкция или профиль ремня, используемого в приводной системе
        беговой дорожки.
    motor_configuration:
      name: Конфигурация двигателя
      description: Количество независимых приводных двигателей самоката.
    motor_mounting_configuration:
      name: Конфигурация крепления двигателя
      description: Способ установки или реализации двигателя в комплекте переоборудования
        для самоката.
    motor_mounting_position:
      name: Позиция крепления двигателя
      description: Место установки двигателя на электросамокате, например мотор-колесо
        переднего колеса, мотор-колесо заднего колеса, двойное мотор-колесо или центральный
        привод.
    motor_position:
      name: Расположение двигателя
      description: Место расположения двигателя на электровелосипеде. Влияет на управляемость
        и обслуживание.
    motor_vehicle_a_v_integration_features:
      name: Функции A/V-интеграции транспортного средства
      description: Функции интеграции смартфона и систем автомобиля, поддерживаемые
        головным устройством (например, Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Назначение и расположение автомобильной лампы
      description: Положение или функция автомобильного освещения, для которых предназначена
        лампа (например, ближний свет, стоп-сигнал).
    motor_vehicle_bulb_approval_standard:
      name: Стандарт сертификации автомобильной лампы
      description: Соответствие нормативным требованиям или маркировка допуска для
        дорожного использования на целевом рынке.
    motor_vehicle_oxygen_sensor_bank:
      name: Банк датчика кислорода автомобиля
      description: Ряд цилиндров двигателя, для которого предназначен кислородный
        датчик (например, Bank 1 или Bank 2) для V-образных и оппозитных двигателей;
        для рядных двигателей используется значение «Неприменимо».
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Количество проводов кислородного датчика автомобиля
      description: Количество проводов в жгуте кислородного датчика.
    motor_vehicle_oxygen_sensor_position:
      name: Положение кислородного датчика автомобиля
      description: Место установки кислородного датчика (O2) в выхлопной системе относительно
        каталитического нейтрализатора.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Номер кислородного датчика автомобиля
      description: Номер датчика (например, Sensor 1 или Sensor 2) в пределах указанного
        ряда цилиндров или позиции.
    motor_vehicle_oxygen_sensor_type:
      name: Тип автомобильного кислородного датчика
      description: Конструкция или технология кислородного датчика.
    motor_vehicle_paint_application_method:
      name: Метод нанесения автомобильной краски
      description: Способ нанесения краски на поверхность автомобиля.
    motor_vehicle_paint_system_step:
      name: Этап системы автомобильной окраски
      description: Этап или компонент системы автомобильной окраски, для которых предназначен
        продукт (например, грунт, базовое покрытие, прозрачный лак).
    motor_vehicle_speaker_mounting_type:
      name: Тип крепления автомобильного динамика
      description: Способ установки динамика в автомобиле (монтажный формфактор).
    motor_vehicle_subwoofer_size:
      name: Размер сабвуфера автомобиля
      description: Номинальный диаметр динамика сабвуфера (например, 8 дюймов, 10
        дюймов, 12 дюймов). Используется для подбора по пространству автомобиля и
        совместимости с корпусом.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Конфигурация звуковой катушки автомобильного сабвуфера
      description: Количество или конфигурация звуковых катушек для совместимости
        со схемами подключения усилителя (например, SVC или DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Сопротивление звуковой катушки автомобильного сабвуфера (на катушку)
      description: Значение сопротивления каждой звуковой катушки (не итоговая нагрузка
        после подключения). Используется для расчетов схем подключения.
    motor_vehicle_voltage_regulator_type:
      name: Тип регулятора напряжения автомобиля
      description: Технология или конструкция регулятора, используемого в транспортных
        средствах.
    motorcycle_armor_certification_standard:
      name: Стандарт сертификации мотоэкипировки
      description: Стандарты безопасности, на соответствие которым сертифицирован
        защитный элемент (например, EN 1621-2 для защиты спины, EN 1621-3 для защиты
        груди).
    motorcycle_cover_size_class:
      name: Класс размера чехла для мотоцикла
      description: Стандартизированная категория размера чехла для хранения мотоцикла
        на основе подходящей категории или диапазона длины мотоцикла.
    motorcycle_glove_certification_standard:
      name: Стандарт сертификации мотоциклетных перчаток
      description: Стандарт или сертификация защитных свойств перчаток (например,
        уровни EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Водонепроницаемая конструкция мотоциклетных перчаток
      description: Тип метода водонепроницаемой защиты, используемого в перчатках
        (при наличии).
    motorcycle_guard_coverage_area:
      name: Область защиты мотоциклетной защиты
      description: Основная область защиты изделия (локоть, запястье, предплечье,
        комбинированная защита).
    motorcycle_kidney_belt_construction_type:
      name: Тип конструкции мотоциклетного поясничного пояса
      description: Конструкция поясничного пояса. Влияет на жесткость, вентиляцию
        и уровень защиты.
    motorcycle_kidney_belt_purpose:
      name: Назначение мотоциклетного поясничного пояса
      description: Основной стиль езды или сценарий использования, для которого предназначен
        мотоциклетный поясничный пояс.
    motorcycle_luggage_capacity_class:
      name: Класс вместимости мотоциклетного багажа
      description: Объем мотоциклетного багажа, выраженный в диапазоне литров.
    motorcycle_luggage_mounting_system:
      name: Система крепления мотоциклетного багажа
      description: Система крепления сумки или кофра к мотоциклу (например, перекидные
        ремни, быстросъемное крепление на багажник).
    motorcycle_luggage_side:
      name: Сторона мотоциклетного багажа
      description: 'Сторона установки кофра или боковой сумки: левая, правая или комплект/пара.'
    motorcycle_protective_gear_size_system:
      name: Система размеров мотоциклетной защитной экипировки
      description: Система размеров, используемая для изделия (например, буквенная,
        цифровая, единый размер).
    motorcycle_rack_carrier_style:
      name: Стиль платформы для перевозки мотоцикла
      description: Функциональный тип платформы для перевозки мотоцикла или скутера
        (платформа, рельс, подъемный механизм и т. п.).
    motorcycle_riding_discipline:
      name: Дисциплина мотоезды
      description: Основная дисциплина для использования шейного бандажа.
    motorcycle_tire_speed_rating:
      name: Индекс скорости мотоциклетной шины
      description: Максимальная допустимая постоянная скорость шины, обозначаемая
        стандартным буквенным кодом (например, H, V, W).
    motorsport_window_net_certification:
      name: Сертификация оконной сетки для автоспорта
      description: Сертификация или омологация гоночной безопасности, которой соответствует
        оконная сетка (например, SFI или FIA), включая номер спецификации (при наличии).
    mound_usage_type:
      name: Тип использования питчерской горки
      description: Предназначение питчерской горки, например тренировка, игра, буллпен
        или универсальное использование.
    mount_attachment_method:
      name: Метод крепления
      description: Способ крепления держателя к поверхности или конструкции транспортного
        средства.
    mountainboard_truck_type:
      name: Тип подвески маунтинборда
      description: Тип подвесок, входящих в комплект доски. Влияет на отзывчивость
        поворотов и долговечность.
    mounting_attachment_method:
      name: Способ крепления
      description: Способ крепления держателя или сумки к барабану, стойке, ремню
        или другой поверхности.
    mounting_attachment_type:
      name: Тип крепления
      description: Способ крепления или соединения приспособления для регулировки
        с прялкой.
    mounting_hardware_included_for_installation:
      name: Крепежные элементы в комплекте (для установки)
      description: Наличие в комплекте крепежных элементов, необходимых для установки
        заднего сиденья (например, кронштейны, болты, направляющие).
    mounting_location:
      name: Место крепления
      description: Предназначенное место установки фонаря или отражателя на оборудовании
        или теле (например, передняя вилка, шлем, спицы колеса).
    mounting_method:
      name: Способ крепления
      description: Способ крепления держателя для палочек или щеток (например, зажим,
        ремешок, клейкое крепление).
    mounting_position:
      name: Позиция крепления
      description: Место установки рычага ручного тормоза в салоне автомобиля.
    mounting_rail_type:
      name: Тип монтажной планки
      description: Стандарт монтажной планки или интерфейса, к которому крепится аксессуар,
        например Picatinny или M-LOK.
    mounting_receiver_size:
      name: Размер приемного устройства крепления
      description: Размер приемного фаркопа, необходимый для багажных платформ с креплением
        на фаркоп.
    mounting_storage_type:
      name: Тип крепления и хранения
      description: Способ крепления или размещения устройства на судне или человеке.
    mouth_grip_type:
      name: Тип загубника
      description: Тип загубника или защитной накладки на свистке для комфорта и гигиены.
    mouthguard_mold_type:
      name: Тип формовки капы
      description: Способ подгонки капы под зубы спортсмена (например, термоформуемая,
        индивидуальная стоматологическая подгонка).
    mouthpiece_facing_length:
      name: Длина кривой открытия мундштука
      description: Категория длины кривой открытия мундштука (не общая длина мундштука).
        Влияет на отклик, сопротивление и совместимость с тростью.
    mouthpiece_material:
      name: Материал мундштука
      description: Материал части мундштука или наконечника праздничной дудки, контактирующей
        со ртом, который может отличаться от материала основного корпуса.
    mouthpiece_shank_receiver_size:
      name: Размер ножки и приемника мундштука
      description: Стандарт ножки или приемника мундштука, совместимого с флюгельгорном.
    mouthpiece_shank_size:
      name: Размер ножки мундштука
      description: Стандарт посадки ножки или приемника мундштука для обеспечения
        совместимости с соответствующим медным духовым инструментом.
    mouthpiece_shank_type:
      name: Тип хвостовика мундштука
      description: Стандарт приемника или ножки мундштука для обеспечения совместимости
        (при наличии).
    mouthpiece_style:
      name: Стиль мундштука
      description: Конструкция или форма мундштучной части трензеля. Влияет на точки
        давления, строгость воздействия и предпочтения лошади.
    mouthpiece_type:
      name: Тип мундштука
      description: Тип мундштука на стороне для вдувания воздуха (встроенный, съемный
        или дополнительный).
    movement_mechanism:
      name: Механизм движения
      description: Способ движения скамьи при использовании (качание, скольжение,
        раскачивание и т. п.).
    muffin_size:
      name: Размер маффина
      description: Формат физического размера маффина (например, мини, стандартный,
        большой).
    mushroom_variety:
      name: Сорт грибов
      description: Конкретный вид или сорт грибов или трюфелей, содержащихся в продукте
        (например, шиитаке, королевская вешенка, черный трюфель).
    music_stand_desk_tilt_adjustment:
      name: Регулировка наклона пюпитра
      description: Возможность и порядок регулировки угла наклона стола.
    music_stand_intended_use:
      name: Назначение пюпитра
      description: Основное место или сценарий использования пюпитра.
    musical_block_pitch_type:
      name: Тип высоты тона музыкального блока
      description: 'Тип высоты тона музыкального блока: определенная (настроенная)
        или неопределенная.'
    musical_box_mechanism_type:
      name: Тип механизма музыкальной шкатулки
      description: Способ воспроизведения звука музыкальной шкатулкой (например, заводной
        механизм или электронное воспроизведение).
    musical_keyboard_case_fit_type:
      name: Тип посадки чехла для клавишного инструмента
      description: Тип соответствия чехла инструменту (например, универсальный размерный
        диапазон или модельная/индивидуальная посадка).
    musical_ratchet_sound_character:
      name: Характер звучания музыкальной трещотки
      description: Общее описание тембра и громкости звучания трещотки.
    musical_scraper_groove_surface_material:
      name: Материал рифленой поверхности музыкального скребка
      description: Материал рифленой или желобчатой поверхности для скольжения (может
        отличаться от материала корпуса).
    musical_scraper_type:
      name: Тип музыкального скребка
      description: Тип или конструкция музыкального скребка (например, гуиро или реко-реко).
        Влияет на звучание и технику игры.
    mute_attachment_method:
      name: Метод крепления сурдины
      description: Способ крепления или фиксации глушителя тарелки на тарелке (например,
        гель, статическое сцепление, магнит, зажим).
    mute_attenuation_level:
      name: Уровень приглушения
      description: Степень снижения воспринимаемой громкости, особенно для тренировочных
        сурдин.
    mute_cork_padding_material:
      name: Материал пробки и накладки сурдины
      description: Материал контактной накладки сурдины (например, пробковые полоски
        или накладки), используемой для фиксации и защиты раструба.
    mute_coverage_type:
      name: Тип покрытия сурдины
      description: 'Тип или площадь покрытия сурдины на игровой поверхности: от небольших
        демпферов до полноразмерных тренировочных сурдин.'
    mute_finish:
      name: Отделка сурдины
      description: Тип отделки поверхности сурдины (например, полированная или матированная).
        Влияет на долговечность и внешний вид.
    name_label_text_template:
      name: Шаблон текста именной наклейки
      description: Предустановленный текст или шаблон, напечатанный на именной наклейке
        (например, «Принадлежит», «Сделано»).
    napkin_ply:
      name: Количество слоев салфетки
      description: Толщина коктейльной салфетки по количеству слоев.
    neck_brace_fit_system:
      name: Система фиксации шейного ортеза
      description: Основной способ регулировки и фиксации шейного ортеза на пользователе.
    neck_brace_size_basis:
      name: Основа подбора размера шейного ортеза
      description: Основа определения подходящего размера шейного ортеза.
    neck_configuration:
      name: Конфигурация грифа
      description: Конфигурация или тип грифа, входящего в комплект саксофона. Влияет
        на эргономику и удобство игры.
    neck_coverage_type:
      name: Тип покрытия шеи
      description: Тип покрытия шеи, предусмотренный в одеяле.
    neck_support_size_system:
      name: Система размеров шейной поддержки
      description: Система размеров, используемая для гоночной шейной поддержки или
        ортеза (например, взрослый, детский или единый размер).
    necklace_length_type:
      name: Тип длины ожерелья
      description: Стандартная категория длины ожерелья, например чокер или опера.
        Помогает при подборе по стилю.
    needle_balance_zone:
      name: Зона балансировки стрелки
      description: Магнитная зона балансировки или полушарие, для которых настроена
        стрелка компаса. Обеспечивает точность показаний по всему миру.
    needle_case_format:
      name: Формат футляра для игл
      description: Общий формфактор органайзера для хранения игл.
    needle_damping_type:
      name: Тип демпфирования иглы
      description: Способ стабилизации стрелки компаса (например, жидкостная, сухая
        или электронная стабилизация). Влияет на время успокоения и долговечность.
    needle_felting_needle_profile:
      name: Профиль иглы для сухого валяния
      description: Поперечное сечение или профиль иглы для валяния. Влияет на перемещение
        волокон и итоговую отделку.
    needle_holder_features:
