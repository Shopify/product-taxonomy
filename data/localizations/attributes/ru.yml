      description: Способ крепления держателя к подголовнику или стойкам сиденья.
    headrest_provision:
      name: Комплектация подголовниками
      description: Наличие подголовников и/или точек крепления подголовников.
    headset_standard:
      name: Стандарт рулевой колонки
      description: Тип интерфейса рулевого стакана и рулевой колонки, используемого
