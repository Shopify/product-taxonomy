    door_lock_position:
      name: Положение дверного замка
      description: Дверь или проем, для которой предназначен дверной замок или его
        деталь на автомобиле.
    door_seal_feature_set:
      name: Набор функций дверного уплотнителя
      description: Функциональные особенности дверного уплотнителя.
    door_seal_material_type:
      name: Тип материала дверного уплотнителя
      description: Основной эластомер или семейство материалов, используемое для дверного
