        или пустая/несобранная отливка).
    cylinder_head_material_grade:
      name: Материал и марка головки блока цилиндров
      description: Материал и марка, используемые для отливки головки блока цилиндров.
    cylinder_head_position:
      name: Позиция головки блока цилиндров
      description: Определение стороны/ряда или ориентации установки головки блока
        цилиндров на многорядных двигателях (например, левая/правая сторона или ряд
        1/ряд 2).
    cymbal_alloy:
      name: Сплав тарелок
      description: Сплав/состав тарелок в комплекте.
    cymbal_application:
      name: Назначение тарелки
      description: Основное назначение использования тарелки.
    cymbal_arm_mounting_interface:
      name: Интерфейс крепления держателя тарелки
      description: Способ крепления держателя тарелки к остальной ударной установке
