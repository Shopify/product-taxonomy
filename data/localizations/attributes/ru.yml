      description: Отделка поверхности или покрытие для защиты от коррозии.
    coil_spring_material:
      name: Материал винтовой пружины
      description: Основной материал/состав винтовой пружины.
    coil_system_type:
      name: Тип пружинной системы
      description: Конкретный тип пружинной системы, используемой в матрасах, например
        независимые пружины или пружинный блок Боннель.
    coil_type:
      name: Тип спирали
      description: Конструкция или технология спирали. Влияет на образование пара
        и вкус.
    coin_grade_numismatic:
      name: Нумизматическая степень сохранности монеты
      description: Стандартизированная степень сохранности монеты (например, по шкале
        Шелдона или словесной классификации).
    coin_strike_or_finish:
      name: Тип чеканки или отделки монеты
      description: Тип чеканки или отделки монеты (например, business strike, proof).
    coin_strike_type:
      name: Тип чеканки монеты
      description: Тип чеканки/отделки монеты (например, proof, business strike).
    collar_style:
      name: Стиль воротника
      description: Конструкция воротника или горловины изделия.
    collectible_gun_accessories_included:
      name: Комплектация коллекционного оружия аксессуарами
      description: Аксессуары и документация, входящие в комплект коллекционного оружия
        (например, кобура, кейс, штык, документы).
    collectible_gun_firing_mechanism:
      name: Тип ударно-спускового механизма коллекционного оружия
      description: Тип ударно-спускового/воспламеняющего механизма коллекционного
        оружия (особенно антикварного и исторического).
    collectible_knife_blade_finish:
      name: Отделка клинка коллекционного ножа
      description: Отделка/обработка поверхности клинка для внешнего вида (и иногда
        защиты от коррозии).
    color_code_system:
      name: Система цветовых кодов
      description: Система цветовых кодов, используемая для числового обозначения
        цвета нити (например, DMC, Anchor), при наличии.
    color_coding_standard:
      name: Стандарт цветовой маркировки
      description: Соответствие диска международной системе цветовой маркировки (например,
        IWF или IPF) либо другой схеме.
    color_effect:
      name: Цветовой эффект
      description: Специальные техники окрашивания или эффекты, примененные к наращиваемым
        волосам.
    color_family:
      name: Цветовая гамма
      description: Общая цветовая гамма туши суми (полезно, когда параметр Color слишком
        детализирован, например теплый черный или черно-синий).
    color_finish:
      name: Цветовая отделка
      description: Отделка видимых элементов гарды (например, матовая или глянцевая),
        когда одного цвета недостаточно.
    coloring_finish:
      name: Финиш окрашивания
      description: Визуальный финиш или специальный эффект окрашивания, например с
        металлическим блеском или неоновый.
    comb_material:
      name: Материал гребня
      description: Материал корпуса губной гармошки (части, формирующей воздушные
        камеры).
    comb_type:
      name: Тип гребня
      description: Классификация расчесок для ухода за лошадьми по основному функциональному
        типу (например, скребница, расческа для гривы, тримминговая расческа). Помогает
        быстро подобрать инструмент для конкретных задач ухода.
    combat_shorts_cut_style:
      name: Тип кроя шортов для единоборств
      description: Тип кроя или посадки шортов для единоборств (например, высокая
        посадка, ретро, компрессионные).
    comic_creator_role:
      name: Роль создателя комикса
      description: Роль создателя, указанная в карточке товара (например, сценарист,
        художник).
    commemorative_coin_finish:
      name: Отделка памятной монеты
      description: Тип чеканки/отделки памятной монеты.
    commemorative_coin_mint_mark:
      name: Знак монетного двора памятной монетыЗнак монетного двора на монете (или
        его отсутствие).
      description: Указывает на наличие (или отсутствие) знака монетного двора на
        монете.
    commemorative_subject:
      name: Тема памятной монеты
      description: Основной объект commemorative-тематики (событие, человек, место,
        годовщина, организация и т. д.).
    commercial_vehicle_class:
      name: Класс коммерческого транспортного средства
      description: Нормативный/отраслевой класс по GVWR, используемый для обозначения
        весовой категории коммерческого транспорта при поиске и фильтрации.
    compass_damping_medium:
      name: Демпфирующая среда компаса
      description: Среда, используемая для стабилизации движения стрелки внутри капсулы
        компаса.
    compass_illumination_type:
      name: Тип подсветки компаса
      description: Способ обеспечения видимости маркировки компаса при слабом освещении
        (например, люминесцентная краска, тритий, LED-подсветка).
    compass_mounting_style:
      name: Стиль крепления компаса
      description: Способ ношения, крепления или установки компаса.
    compass_scale_units:
      name: Единицы шкалы компаса
      description: Единицы измерения, указанные на корпусе компаса (градусы, тысячные
        или оба варианта).
    compatible_abs_system:
      name: Совместимая система ABS
      description: Предназначение главного цилиндра для автомобилей с ABS.
    compatible_adapter_brand:
      name: Совместимый бренд адаптера
      description: Бренд головки клюшки для гольфа, с адаптером которого совместим
        шафт.
    compatible_airbag_system_type:
      name: Тип совместимой системы подушек безопасности
      description: Поколение/набор функций системы подушек безопасности, с которыми
        совместима деталь (например, одноступенчатая или двухступенчатая).
    compatible_amplifier_fit_method:
      name: Способ совместимости с усилителем
      description: Способ определения совместимости чехла/кейса (универсальная, для
        конкретной модели или по размерам).
    compatible_apparatus:
      name: Совместимый гимнастический снаряд
      description: Гимнастический снаряд или вид активности, для которых предназначены
        накладки.
    compatible_archery_tool:
      name: Совместимый инструмент для стрельбы из лука
      description: Основной инструмент или оборудование для стрельбы из лука, с которыми
        предназначен использоваться аксессуар.
    compatible_axle_size:
      name: Совместимый размер оси
      description: Диаметр втулки/оси или стандарт резьбы, для которых предназначена
        подножка (например, 10 мм/3⁄8 in, 14 мм, 3/8 дюйма 26 TPI).
    compatible_axle_type:
      name: Совместимый тип оси
      description: Стандарты крепления задней оси, поддерживаемые тренажером, например
        quick-release или размеры сквозных осей.
    compatible_axle_weight_rating:
      name: Совместимая нагрузка на ось
      description: Номинальная нагрузка на ось прицепа (грузоподъемность на одну ось),
        для которой предназначен тормозной узел прицепа.
    compatible_bait_type:
      name: Совместимый тип приманки
      description: Типы рыболовной наживки, с которыми совместимо сверло для наживки.
        Помогает подобрать инструмент под предпочитаемую наживку.
    compatible_bass_scale_length:
      name: Совместимая мензура бас-гитары
      description: Мензура бас-гитары, для которой предназначен комплект струн (важно
        для правильной длины обмотки и посадки).
    compatible_battle_top_system:
      name: Совместимая система battle top
      description: Экосистема или серия battle top, для которых предназначен волчок
        (используется для обеспечения совместимости деталей и арены).
    compatible_bb_size:
      name: Совместимый калибр BB
      description: Диаметр страйкбольных шариков, поддерживаемый изделием.
    compatible_bed_frame_style:
      name: Совместимый тип кроватной рамы
      description: Тип кровати или рамы, для которых предназначен аксессуар.
    compatible_bicycle_tire_type:
      name: Совместимый тип велосипедных шин
      description: Типы велосипедных шин, которые изделие может ремонтировать или
        герметизировать.
    compatible_bike_component:
      name: Совместимый компонент велосипеда
      description: Компонент велосипеда, для обслуживания которого предназначен инструмент
        или изделие.
    compatible_billiard_game:
      name: Совместимая бильярдная игра
      description: Формат бильярдной игры, для которого предназначена треугольная
        рамка. Обеспечивает выбор рамки под нужную игру.
    compatible_billiard_table_size:
      name: Совместимый размер бильярдного стола
      description: Стандартная длина стола, для которой предназначен чехол. Помогает
        выбрать чехол подходящего размера для бильярдного стола.
    compatible_bit_type:
      name: Совместимый тип биты
      description: Типы удил, с которыми можно использовать защиту.
    compatible_blade_hosel:
      name: Совместимая шейка лезвия
      description: Тип хвостовика/конусности лезвия, совместимый с шафтом. Обеспечивает
        правильную посадку шафта и лезвия.
    compatible_blade_system:
      name: Совместимая система лезвий
      description: 'Система/формат сменных лезвий, совместимых с ножом (например,
        стандартные hobby #11, сегментные отламывающиеся лезвия).'
    compatible_boat_weaving_shuttle_loom:
      name: Совместимый ткацкий станок для челнока-лодочки
      description: Типы ткацких станков, с которыми предназначен использоваться челнок-лодочка.
    compatible_bobbin_type:
      name: Совместимый тип шпульки
      description: Тип шпули/катушки, для которого предназначен челнок-лодочка.
    compatible_bottle_mouth:
      name: Совместимое горлышко бутылки
      description: Тип или диаметр горлышка бутылки, для которого предназначены трубочка
        или крышка.
    compatible_bow_attachment_system:
      name: Совместимая система крепления лука
      description: Интерфейс крепления плеч или аксессуаров, для которого предназначена
        деталь (например, ILF, винтовое соединение, быстрое разъединение).
    compatible_bow_crossbow_type:
      name: Совместимый тип лука/арбалета
      description: Тип лука или арбалета, для которого предназначен аксессуар.
    compatible_brake_fluid:
      name: Совместимая тормозная жидкость
      description: Спецификации тормозной жидкости DOT, с которыми совместимы уплотнения/материалы
        главного цилиндра.
    compatible_brake_pad:
      name: Совместимые тормозные колодки
      description: Типы составов тормозных колодок, одобренные для использования с
        ротором. Обеспечивают безопасность и оптимальный износ.
    compatible_brake_service_system:
      name: Совместимая тормозная система
      description: Предназначение детали для дисковых, барабанных или обоих типов
        тормозов.
    compatible_brake_system:
      name: Совместимая тормозная система
      description: Ключевые примечания по совместимости систем при использовании тормозной
        жидкости.
    compatible_brake_type:
      name: Совместимый тип тормоза
      description: Тип тормозов, с которыми совместима стойка, например дисковые или
        ободные.
    compatible_brass_instrument_finish:
      name: Совместимая отделка духового инструмента
      description: Типы отделки медных духовых инструментов, для которых очиститель
        безопасен и не повреждает покрытие.
    compatible_building_toy_system:
      name: Совместимая система строительного конструктора
      description: Система/стандарт конструктора, с которыми совместима игрушка (или
        эквивалентный размер), например совместимость с LEGO или фирменной системой.
    compatible_capo_fretboard_radius:
      name: Совместимый радиус накладки грифа для каподастра
      description: Радиус/профиль накладки грифа, для которых предназначен каподастр.
        Обеспечивает оптимальный контакт и стабильность строя.
    compatible_capo_number_of_strings:
      name: Совместимое количество струн для каподастра
      description: Количество струн, для которых предназначен каподастр (полезно для
        6-, 7-, 8-, 12-струнных и специализированных инструментов).
    compatible_cardio_machine_type:
      name: Совместимый тип кардиотренажера
      description: Тип кардиотренажера, с которым предназначен использоваться аксессуар
        или деталь.
    compatible_chain_link_type:
      name: Совместимый тип звеньев цепи
      description: Тип звеньев цепи, поддерживаемый инструментом (стандартные, половинные,
        быстрое соединение и т. д.).
    compatible_chain_size:
      name: Совместимый размер цепи
      description: Стандарты ширины или шага цепи, поддерживаемые инструментом (например,
        1/8 дюйма, 3/32 дюйма).
    compatible_chain_width:
      name: Совместимая ширина цепи
      description: Размеры цепей, с которыми предназначена работать трещотка.
    compatible_chip_denomination:
      name: Совместимый номинал фишек
      description: Номиналы фишек, для которых в лотке/кейсе предусмотрены подписанные
        или выделенные места (или которые он предназначен организовывать).
    compatible_clarinet_mouthpiece_ligature:
      name: Совместимая лигатура для мундштука кларнета
      description: Стандарт посадки лигатуры или примечания по совместимости для мундштука.
    compatible_classical_guitar_string_scale_length:
      name: Совместимая мензура струн для классической гитары
      description: Совместимость комплекта с мензурой гитары/длиной струн.
    compatible_clay_target_size:
      name: Совместимый размер тарелочек
      description: Размеры или формы тарелочек, которые поддерживает метательная машина
        для правильной посадки и работы.
    compatible_cleat_system:
      name: Совместимая система шипов
      description: Интерфейс шипов или схема расположения болтов, поддерживаемые педалью.
        Позволяют подобрать обувь под нужную систему.
    compatible_clipless_pedal_system:
      name: Совместимая система контактных педалей
      description: Конкретный стандарт контактных педалей/шипов, с которым предназначено
        работать изделие.
    compatible_clutch_type:
      name: Совместимая стойка/штырь для контрабас-кларнета
      description: Совместимая химия охлаждающей жидкости
    compatible_coffee_pod_system:
      name: Совместимая система кофейных капсул
      description: Указывает, для какой кофемашины или системы заваривания предназначены
        капсулы.
    compatible_construction_set_system:
      name: Совместимый материал системы охлаждения
      description: Указывает, с какой системой конструирования/экосистемой бренда
        совместим набор (например, совместим с LEGO, совместим с DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Совместимая подставка/колышек для контрабас-кларнета
      description: Требуемый интерфейс стойки/штыря или тип опоры.
    compatible_coolant_chemistry:
      name: Совместимая химия охлаждающей жидкости
      description: Типы охлаждающих жидкостей, с которыми совместима присадка.
    compatible_cooling_system_material:
      name: Совместимый материал системы охлаждения
      description: Системы охлаждения/материалы, для которых безопасен очиститель
        радиатора (например, алюминиевые радиаторы, смешанные металлические системы).
    compatible_crib_format:
      name: Совместимый формат кроватки
      description: Общая категория размера или формы матраса/простыни, для которых
        предназначен аксессуар.
    compatible_cross_stitch_fabric_count:
      name: Совместимый каунт ткани для вышивки крестом
      description: Рекомендуемый каунт ткани для вышивания дизайна.
    compatible_cross_stitch_frame:
      name: Совместимая рама для вышивки крестом
      description: Тип использования рамы (ручное использование, настольная стойка,
        напольная стойка или универсальное применение).
    compatible_crossbar:
      name: Совместимая поперечина
      description: Совместимость багажника с поперечинами автомобильного багажника
        на крыше (если крепится на крышу), включая стандарты формы/профиля поперечин.
    compatible_cycling_cleat:
      name: Совместимый велосипедный шип
      description: Система шипов или педалей, с которой предназначена использоваться
        велообувь.
    compatible_cymbal_size:
      name: Совместимый размер тарелок
      description: Предназначенный (или максимальный) диаметр тарелок, для которого
        рассчитан кейс. Речь идет о совместимости с размером тарелок, а не о внешнем
        диаметре кейса.
    compatible_device_type:
      name: Совместимый тип устройства
      description: Тип устройства, для которого предназначено крепление (например,
        монитор/TV, планшет, смартфон, портативный DVD-плеер).
    compatible_dock_structure_type:
      name: Совместимый тип конструкции причала
      description: Конструкция причала, для которой предназначены ступени.
    compatible_dough_type:
      name: Совместимый тип теста
      description: Типы/бренды массы для лепки, с которыми предназначены работать
        инструменты (например, стандартная масса для лепки, моделирующая глина).
    compatible_drawing_ink_surface:
      name: Совместимая поверхность для чертежных чернил
      description: Рекомендуемые поверхности/материалы для наилучшего результата.
    compatible_drivetrain_brand:
      name: Совместимый бренд трансмиссии
      description: Бренды трансмиссий или тормозных систем, с которыми предназначен
        использоваться трос.
    compatible_drivetrain_speeds:
      name: Совместимое количество скоростей трансмиссии
      description: Количество скоростей трансмиссии, поддерживаемых шатуном или звездой
        (например, 10 скростей).
    compatible_equipment:
      name: Совместимое оборудование
      description: Тип зимнего спортивного снаряжения, для которого предназначены
        тиски.
    compatible_evap_system:
      name: Совместимая система EVAP
      description: Соответствие крышки топливного бака требованиям системы EVAP (например,
        герметичность по спецификации OEM) и снижение вероятности появления индикатора
        check engine.
    compatible_exercise_bike_style:
      name: Совместимый тип велотренажера
      description: Типы велотренажеров, для которых предназначены аксессуар или сменная
        деталь.
    compatible_fencing_weapon:
      name: Совместимое оружие для фехтования
      description: Вид оружия или дисциплина фехтования, для которых предназначены
        куртка или электрокуртка.
    compatible_fiber_type:
      name: Совместимый тип волокна
      description: Основные типы волокон, для эффективной обработки которых предназначен
        барабанный кардочес.
    compatible_fin_box_system:
      name: Совместимая система крепления плавника
      description: Система fin box или крепления, для которых предназначен плавник.
        Помогает подобрать плавники, совместимые с доской для серфинга (например,
        FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Совместимый радиус накладки грифа
      description: Радиус накладки грифа (плоский, изогнутый или составной), для которого
        предназначен каподастр. Обеспечивает равномерное давление и уменьшение дребезга.
    compatible_finish_type:
      name: Совместимый тип отделки
      description: Типы отделки инструментов, для которых спрей считается безопасным.
    compatible_fishing_reel_type:
      name: Совместимый тип рыболовной катушки
      description: Тип рыболовной катушки, с которой предназначен использоваться аксессуар
        (например, спиннинговая, мультипликаторная, нахлыстовая).
    compatible_fly_line_weight:
      name: Совместимый вес нахлыстового шнура
      description: Весовые классы нахлыстовых шнуров по AFTMA, для которых предназначена
        шпуля.
    compatible_flywheel_type:
      name: Совместимый тип маховика
      description: Тип маховика, с которым предназначен использоваться нажимной диск
        сцепления.
    compatible_football_kick_type:
      name: Совместимый тип удара в американском футболе
      description: Игровые ситуации для удара, для которых предназначено изделие (например,
        кик-офф, филд-гол). Помогает быстро подобрать подходящее снаряжение.
    compatible_fuel_system_type:
      name: Совместимый тип топливной системы
      description: Топливная система, для которой предназначен очиститель.
    compatible_gas_type:
      name: Совместимый тип газа
      description: Тип сжатого газа, для хранения которого предназначен пейнтбольный
        баллон.
    compatible_gel_wax_additives:
      name: Совместимые добавки для гелевого воска
      description: Типы добавок, совместимых с данным гелевым воском (например, красители,
        декоративные включения).
    compatible_glaze_layering:
      name: Совместимость с многослойным нанесением глазури
      description: Возможность нанесения глазури поверх других глазурей для создания
        эффектов.
    compatible_golf_bag_type:
      name: Совместимый тип сумки для гольфа
      description: Типы сумок для гольфа, с которыми совместим чехол или кейс.
    compatible_ground_polarity:
      name: Совместимая полярность массы
      description: Предназначение регулятора напряжения для систем с отрицательной
        или положительной массой (или отсутствие чувствительности к полярности).Совместимая
        форма корпуса гитары
    compatible_guitar_body_shape:
      name: Совместимая форма корпуса гитары
      description: Форма корпуса гитары, для которой предназначен кейс.
    compatible_guitar_case:
      name: Совместимый гитарный кейс
      description: Типы гитарных кейсов, для которых предназначен и корректно работает
        увлажнитель.
    compatible_guitar_scale_length:
      name: Совместимая мензура гитары
      description: Мензура гитары, для которой предназначен комплект струн (на основе
        длины обмотки/общей длины).Совместимая оружейная платформа
    compatible_gun_platform:
      name: Совместимая оружейная платформа
      description: Платформа или источник питания, с которыми совместимо изделие (например,
        AEG, GBB, HPA).
    compatible_hair_length:
      name: Совместимая длина волос
      description: Максимальная длина или объем волос, которые головной убор позволяет
        комфортно разместить.
    compatible_head_and_neck_restraint_system:
      name: Совместимая система фиксации головы и шеи
      description: Наличие точек крепления и/или совместимость шлема с системами фиксации
        головы и шеи (например, HANS), включая наличие/статус установки анкеров.
    compatible_helmet_certification_standard:
      name: Совместимый стандарт сертификации шлема
      description: Стандарты безопасности или сертификации шлемов, для поддержки которых
        предназначен аксессуар (например, отрывные пленки для гонок часто соответствуют
        определенным требованиям регламентов).
    compatible_helmet_shell_size:
      name: Совместимый размер оболочки шлема
      description: Размеры оболочки шлема, для которых подходит сменная внутренняя
        деталь (размеры оболочки часто соответствуют диапазонам XS–S, M, L–XL).
    compatible_helmet_size:
      name: Совместимый размер шлема
      description: Размеры шлемов, с которыми совместима защитная маска.
    compatible_helmet_type:
      name: Совместимый тип шлема
      description: Категория шлемов, с которыми предназначена использоваться шейная
        защита.
    compatible_hitch_receiver_size:
      name: Совместимый размер приемника фаркопа
      description: Размер отверстия приемника фаркопа, для которого предназначен аксессуар
        (для аксессуаров багажников с креплением на фаркоп).
    compatible_hook_size:
      name: Совместимый размер крючка
      description: Системы размеров и/или диапазоны размеров вязальных крючков, для
        которых предназначен органайзер (например, буквенно-числовые размеры US, метрический
        диапазон в мм).
    compatible_horse_coat_type:
      name: Совместимый тип шерсти лошади
      description: Характеристики шерсти лошади, для которых лучше всего подходит
        инструмент для вычесывания (например, густая зимняя шерсть или чувствительная
        шерсть).
    compatible_host_platform:
      name: Совместимая хост-платформа
      description: Платформы или типы устройств, с которыми совместим pad-контроллер
        (например, Windows, macOS, iOS, Android), либо возможность автономной работы
        без компьютера.
    compatible_inflation_gas:
      name: Совместимый газ для надувания
      description: Газ для надувания шара (воздух, гелий или оба варианта).
    compatible_injection_type:
      name: Совместимый тип впрыска
      description: Тип топливной системы впрыска, для очистки которой предназначено
        изделие.
    compatible_instrument_surface_material:
      name: Совместимая поверхность/материал инструмента
      description: Поверхности/материалы инструментов, для которых предназначена полироль.
    compatible_intercom_system:
      name: Совместимая система интеркома
      description: Готовность/совместимость шлема для установки системы связи или
        интеркома.
    compatible_interior_material:
      name: Совместимый материал салона
      description: Материалы салона автомобиля, для которых пятновыводитель безопасен/эффективен
        (например, ковролин, тканевая обивка, кожа, винил).
    compatible_kayak_type:
      name: Совместимый тип каяка
      description: Типы каяков, для которых предназначен комплект паруса.
    compatible_license_plate_hole_pattern:
      name: Совместимая схема отверстий номерного знака
      description: Конфигурация монтажных отверстий, поддерживаемая креплением/держателем
        (со стороны автомобиля и/или номерного знака).
    compatible_license_plate_size:
      name: Совместимый размер номерного знака
      description: Региональные стандарты или размеры номерных знаков, для которых
        предназначен держатель/крепление.
    compatible_loom:
      name: Совместимый ткацкий станок
      description: Типы ткацких станков, с которыми предназначен использоваться плоский
        ткацкий батан.
    compatible_loom_type:
      name: Совместимый тип ткацкого станка
      description: Тип ткацкой установки, для которой предназначен батан (например,
        ткацкие станки с жестким бердом или гобеленовые станки).
    compatible_machine_type:
      name: Совместимый тип машины
      description: Тип стегальной установки, с которой предназначена использоваться
        рама (только ручная стежка, бытовая швейная машина, машина для стежки).
    compatible_mast_type:
      name: Совместимый тип мачты
      description: 'Диаметры мачт, для которых предназначен парус: уменьшенный диаметр
        (RDM), стандартный диаметр (SDM) или оба варианта.'
    compatible_model_system_train_scale:
      name: Совместимая модельная система (масштаб железной дороги)
      description: Масштаб/система железнодорожного моделизма, с которыми совместим
        аксессуар (например, HO, N, O).
    compatible_mounting_surface:
      name: Совместимая монтажная поверхность
      description: Поверхность или объект, на которые рассчитано крепление зажима.
    compatible_mouthpiece_patch:
      name: Совместимая накладка на мундштук
      description: Совместимость мундштука с накладками/подушечками и рекомендуемый
        диапазон толщины накладок.
    compatible_mouthpiece_type:
      name: Совместимый тип мундштука
      description: Тип мундштука/хвостовика, для которого предназначен меллофон (обычно
        приемники под мундштук валторны или трубы в зависимости от модели).
    compatible_neck_profile_width:
      name: Совместимый профиль/ширина грифа
      description: Класс профиля/ширины грифа гитары, для которого предназначено каподастр
        (например, узкий электрогитарный или широкий классический).
    compatible_needle_size:
      name: Совместимый размер иглы
      description: Размеры/типы игл, для которых предназначен футляр (например, иглы
        для вышивания, гобеленовые или швейные иглы различной длины).
    compatible_needle_system:
      name: Совместимая система игл
      description: Системы игл, совместимые с машиной (например, 130/705H).
    compatible_parking_brake_mechanism:
      name: Совместимый механизм стояночного тормоза
      description: Совместимость суппорта со встроенным механизмом стояночного тормоза.
    compatible_pedal_instrument_type:
      name: Совместимый тип педального инструмента
      description: Инструмент, для которого предназначена педаль (например, цифровое
        пианино, клавишный инструмент/синтезатор, MIDI-контроллер).
    compatible_pedal_type:
      name: Совместимый тип педали
      description: Тип или система педалей, для которых предназначен ремень или клипса
        (например, платформенные, SPD, Look Keo).
    compatible_pin_type:
      name: Совместимый тип штифта
      description: Тип штифтов, с которыми предназначен для использования мат (или
        возможность фиксации штифтами).
    compatible_pipe_filter_size:
      name: Совместимый размер фильтра для трубки
      description: Размер или тип фильтра, с которым совместима трубка (или отсутствие
        необходимости в фильтре).
    compatible_plate_size:
      name: Совместимый размер пластины
      description: Размеры или стандартизированные форматы баллистических пластин,
        совместимые с жилетом.
    compatible_play_vehicle_scale:
      name: Совместимый масштаб игрушечного транспортного средства
      description: Масштаб игрушки, для которого предназначен аксессуар (например,
        1:64), для улучшения совместимости с коллекционными и трековыми системами.
    compatible_playing_surface:
      name: Совместимая игровая поверхность
      description: Тип игрового поля или покрытия, для которого предназначена обувь
        для американского футбола.
    compatible_pole_dimensions:
      name: Совместимые размеры стойки
      description: Размер поперечного сечения стойки, с которым совместим аксессуар.
    compatible_pole_shape:
      name: Совместимая форма стойки
      description: Форма поперечного сечения стойки или колонны, для которой предназначена
        накладка.
    compatible_power_steering_system:
      name: Совместимая система гидроусилителя руля
      description: Типы рулевых систем, для которых предназначена жидкость.
    compatible_powerplant_type:
      name: Совместимый тип силовой установки
      description: Тип силовой установки пневматического оружия BB, для которого предназначена
        деталь (например, пружинно-поршневая, CO2, PCP).
    compatible_presser_foot:
      name: Совместимая прижимная лапка
      description: Система крепления/совместимости прижимной лапки, поддерживаемая
        швейной машиной (например, быстросъемная или винтовая; низкий/высокий/наклонный
        хвостовик). Используйте «Универсальная/несколько», если поддерживаются несколько
        систем или в комплект входят адаптеры.
    compatible_protective_gear:
      name: Совместимое защитное снаряжение
      description: Защитное снаряжение, с которым предназначен для использования шейный
        фиксатор.
    compatible_protective_gear_integration:
      name: Совместимая интеграция защитного снаряжения
      description: Способ ношения или интеграции защиты с другим снаряжением (например,
        карман-вставка, отдельное крепление на ремнях).
    compatible_punching_bag_type:
      name: Совместимый тип боксерского мешка
      description: Типы боксерских или тренировочных мешков, с которыми совместим
        продукт.
    compatible_racing_discipline:
      name: Совместимая гоночная дисциплина
      description: Автоспортивные дисциплины, для которых предназначен/сертифицирован
        шлем.
    compatible_rc_scale:
      name: Совместимый масштаб RC
      description: Масштаб RC-модели (например, 1:10), для которого предназначен аксессуар
        или деталь.
    compatible_recorder_size:
      name: Совместимый размер блокфлейты
      description: Размеры блокфлейт, для которых предназначен футляр.
    compatible_recorder_type:
      name: Совместимый тип блокфлейты
      description: Тип блокфлейты (семейство/размер), с которым совместим аксессуар
        (например, сопрано, альт).
    compatible_reed_cut:
      name: Совместимый срез трости
      description: Стиль среза трости, с которым совместима лигатура (например, filed/French
        cut или unfiled/American cut).
    compatible_reed_type:
      name: Совместимый тип трости
      description: Срез/тип трости, для которого предназначен мундштук.
    compatible_reel_type:
      name: Совместимый тип катушки
      description: Тип рыболовной катушки, для которого предназначена сумка, футляр
        или чехол.
    compatible_refrigerant_type:
      name: Совместимый тип хладагента
      description: Тип хладагента, для которого предназначен испаритель кондиционера.
    compatible_ride_equipment:
      name: Совместимое оборудование для катания
      description: Типы колесного спортивного оборудования, для которого предназначен
        трамплин.
    compatible_roof_height:
      name: Совместимая высота крыши
      description: Профиль крыши, для которого предназначен чехол (стандартная или
        удлиненная/высокая крыша).
    compatible_roof_rail_type:
      name: Совместимый тип рейлингов
      description: Конфигурация крыши, для которой предназначена система базовых багажников.
    compatible_rope_count:
      name: Совместимое количество канатов
      description: Конфигурация канатов боксерского ринга, для которой предназначена
        деталь, например ринги с 3 или 4 канатами либо универсальная совместимость.
    compatible_rope_type:
      name: Совместимый тип веревки
      description: Конструкции канатов, которые можно использовать с устройством.
    compatible_saddle_type:
      name: Совместимый тип седла
      description: Тип седла или дисциплина верховой езды, для которых предназначен
        аксессуар, с обеспечением совместимости с английскими, вестерн- и другими
        седлами.
    compatible_saxophone_size:
      name: Совместимый размер саксофона
      description: Размер саксофона, с которым совместим продукт (например, сопрано,
        альт, тенор).
    compatible_saxophone_type:
      name: Совместимый тип саксофона
      description: Саксофон, для которого предназначена лигатура/колпачок.
    compatible_scale_length:
      name: Совместимая мензура
      description: Диапазон мензуры гитары, для которого предназначены струны (например,
        короткая, стандартная, баритон).
    compatible_seat_airbag:
      name: Совместимая подушка безопасности сиденья
      description: Наличие боковых подушек безопасности в сиденье или совместимость
        с автомобилями, оснащенными подушками безопасности в сиденьях.
    compatible_seating_capacity:
      name: Совместимая вместимость сидений
      description: Количество сидений или конфигурация, для которых предназначен аксессуар.
    compatible_sensor_port_type:
      name: Совместимый тип порта датчика
      description: Поддержка датчиков уровня и (или) температуры масла масляным поддоном,
        а также тип порта при наличии.
    compatible_shifter_type:
      name: Совместимый тип переключателя
      description: Тип или конфигурация рычага переключения передач, для которых предназначен
        чехол рычага.
    compatible_shis:
      name: Совместимый SHIS
      description: Коды системы Standardized Headset Identification System (SHIS),
        с которыми совместима деталь (например, IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Совместимая дисциплина катания
      description: Дисциплины катания, для которых предназначена деталь или аксессуар.
    compatible_snowshoe_deck_type:
      name: Совместимый тип платформы снегоступов
      description: Тип рамы или платформы снегоступов, с которым совместимо крепление.
    compatible_special_effects_lighting_features:
      name: Совместимые функции световых спецэффектов
      description: Функциональные особенности световых эффектов, влияющие на выбор
        при покупке (помимо цвета/рисунка), например объединение устройств или реакция
        на звук.
    compatible_spinning_wheel_drive_system:
      name: Совместимая приводная система прялки
      description: Приводные системы прялки, поддерживаемые аксессуаром.
    compatible_spoke_gauge:
      name: Совместимый калибр спиц
      description: Размеры калибра спиц, для которых подходит резьба ниппеля, для
        правильного подбора спиц и ниппелей.
    compatible_steering_wheel_airbag:
      name: Совместимая подушка безопасности рулевого колеса
      description: Возможность сохранения штатного модуля подушки безопасности в рулевом
        колесе (или предназначение для систем без подушки безопасности).
    compatible_steering_wheel_control_button:
      name: Совместимая кнопка управления на рулевом колесе
      description: Совместимость со штатными кнопками управления на рулевом колесе
        (аудио/круиз-контроль/телефон) и соответствующей проводкой.
    compatible_stencil_material:
      name: Совместимый материал трафарета
      description: Материалы, из которых машина может изготавливать трафареты или
        которые может обрабатывать (например, бумага, пластиковая пленка, майлар).
    compatible_stencil_media_format:
      name: Совместимый формат материалов для трафаретов
      description: 'Формат материалов для трафаретов, поддерживаемый машиной: листы,
        рулоны или оба варианта.'
    compatible_strap_retractor:
      name: Совместимый втягивающий механизм ремня
      description: Совместимость ремня со втягивающими системами или предназначение
        для невтягивающихся (статических) ремней.
    compatible_string_instrument_finish:
      name: Совместимая отделка струнного инструмента
      description: Типы отделки инструментов, для которых полироль безопасна.
    compatible_substrate_material:
      name: Совместимый материал основы
      description: Материалы поверхности, для которых предназначена краска.
    compatible_surface:
      name: Совместимая поверхность
      description: Поверхность/материал, для которого предназначен клей на липучке.
    compatible_surface_material:
      name: Совместимый материал поверхности
      description: Материалы поверхностей автомобиля, для которых предназначен продукт.
    compatible_tear_off_system:
      name: Совместимая система отрыва
      description: Поддержка очками tear-off и (или) roll-off систем, включая наличие
        крепежных штифтов для tear-off.
    compatible_thermostat_type:
      name: Совместимый тип термостата
      description: Совместимость корпуса/водяного патрубка с термостатом и его тип/размер.
    compatible_thread:
      name: Совместимая нить
      description: Типы нитей/пряжи, с которыми предназначено работать устройство
        для заправки (по толщине/типу).
    compatible_thread_spool_format:
      name: Совместимый формат нитей/катушек
      description: Форматы нитей, для хранения которых предназначена коробка (катушки,
        шпули, бобины/карточки для мулине, конусы и т. д.).
    compatible_thread_yarn_tool:
      name: Совместимый инструмент для нитей и пряжи
      description: Совместимость с машинами/системами для инструментов, устанавливаемых
        на другое оборудование или используемых с ним (например, швейная машина, оверлок,
        ткацкий станок, прялка).
    compatible_tire_application:
      name: Совместимое применение шин
      description: Сегмент применения шин/колес, для которого предназначен бортолом
        (исходя из обслуживаемых шин/колес, а не модели транспортного средства).
    compatible_tom_pad_mounting:
      name: Совместимое крепление том-пэда
      description: Тип крепления электронного тома (например, зажим/штанга, L-образная
        штанга, стойка), влияющий на совместимость с существующими рэковыми системами.
    compatible_toy_vehicle_scale:
      name: Совместимый масштаб игрушечного транспорта
      description: Масштаб игрушечного транспортного средства или примерный размер
        транспорта, с которым совместим игровой набор.
    compatible_tpms_sensor_type:
      name: Совместимый тип датчика TPMS
      description: Поддержка колесом датчиков TPMS и/или требуемый тип клапана/датчика.
    compatible_training_equipment:
      name: Совместимое тренировочное оборудование
      description: Типы тренировочного или фитнес-оборудования, которое можно установить
        на крепление.
    compatible_treadmill_design:
      name: Совместимая конструкция беговой дорожки
      description: Конструкция беговой дорожки, с которой совместим аксессуар, например
        складные или нескладные модели.
    compatible_tube:
      name: Совместимая камера
      description: Конструкция камеры или шины, для которой предназначена заплатка,
        например бутиловая, латексная, TPU или бескамерная.
    compatible_valve_type:
      name: Совместимый тип клапана
      description: Тип латунного клапана, с которым совместима смазка.
    compatible_vaporizing_material:
      name: Совместимый материал для испарения
      description: Типы материалов, для испарения которых предназначено устройство.
    compatible_vehicle_windshield_fluid:
      name: Совместимая жидкость стеклоомывателя транспортного средства
      description: Заявленная совместимость с оборудованием транспортного средства
        или обработкой стекол (например, безопасность для водоотталкивающих покрытий,
        безопасность для омывателей фар).
    compatible_visor_system:
      name: Совместимая система визора
      description: Типы систем визоров/вставок, с которыми совместим мотоциклетный
        шлем.
    compatible_water_board_type:
      name: Совместимый тип водной доски
      description: Типы досок для водных видов спорта, для перевозки которых предназначено
        крепление.
    compatible_water_sport_board_type:
      name: Совместимый тип доски для водных видов спорта
      description: Типы досок, для перевозки которых предназначено крепление.
    compatible_watercraft_communication_standard:
      name: Совместимый стандарт связи водного транспорта
      description: Поддерживаемые морские стандарты связи/сетевые стандарты или протоколы
        интеграции для совместимости с бортовой электроникой.
    compatible_watercraft_engine_type:
      name: Совместимый тип двигателя водного транспорта
      description: Конфигурация силовой установки, для которой подходит деталь (подвесной,
        стационарный, угловой привод, водомет).
    compatible_weight_plate_diameter:
      name: Совместимый диаметр дисков
      description: Диаметры дисков, с которыми совместимо оборудование.
    compatible_wheel_finish:
      name: Совместимая отделка колеса
      description: Отделка/материалы колес, для которых очиститель безопасен (по заявлению
        производителя).
    compatible_whorl_drive_band_type:
      name: Совместимый тип приводного ремня шкива
      description: Тип приводного ремня, для которого предназначен шкив.
    compatible_wick_series:
      name: Совместимая серия фитилей
      description: Распространенные серии/типы фитилей, для которых предназначен держатель
        (по отраслевой классификации, если указано продавцом).
    compatible_winder_head_bit:
      name: Совместимая головка/бита намотчика
      description: Тип интерфейса ключа/головки колка, поддерживаемый намотчиком (например,
        шлицевая головка, сменные биты, универсальная головка).
    compatible_windlass_rode:
      name: Совместимый якорный трос/цепь лебедки
      description: Тип якорного троса/цепи, для которого предназначена лебедка.
    compatible_windshield_type:
      name: Совместимый тип ветрового стекла
      description: Конфигурация ветрового стекла, с которой предназначен использоваться
        кожух.
    compatible_wood:
      name: Совместимая древесина
      description: Типы древесины накладки грифа, для которых полироль рекомендована/безопасна.
    compatible_writing_surface:
      name: Совместимая поверхность для письма
      description: Поверхности/типы бумаги, для которых предназначены чернила.
    compatible_zipper_size:
      name: Совместимый размер молнии
      description: 'Размер молнии, для которого предназначен пуллер (часто #3, #5,
        #8, #10), улучшающий фильтрацию совместимости.'
    compliance_certification:
      name: Сертификация соответствия
      description: Стандарты соответствия/сертификации световой балки для дорожного
        использования и электромагнитной совместимости.
    component_position:
      name: Положение компонента
      description: Относительное положение детали в узле газораспределительного механизма
        (например, передняя/задняя крышка, верхняя/нижняя часть). Не положение спереди/сзади
        транспортного средства.
    concentration_level:
      name: Уровень концентрации
      description: Степень концентрации томатной пасты (одинарная, двойная, тройная),
        полезная для соответствия требованиям рецептов.
    concentration_type:
      name: Тип концентрации
      description: Готовность продукта к использованию или концентрированная форма,
        а также типичные рекомендации по разведению для концентрата.
    concert_bass_drum_mounting_stand_type:
      name: Тип стойки для крепления концертного бас-барабана
      description: Способ установки или поддержки концертного бас-барабана во время
        исполнения.
    concert_pitch_standard:
      name: Стандарт концертного строя
      description: Опорная частота концертного строя (A4), на которую настроено пианино
        на момент продажи (например, A440, A442, A444).
    condiment_form:
      name: Форма приправы
      description: Физическая форма или консистенция продукта из хрена (например,
        паста, порошок, крем).
    condiment_texture:
      name: Текстура приправы
      description: Консистенция релиша или чатни (например, с кусочками, однородная).
    confetti_format:
      name: Формат конфетти
      description: Формат конфетти в зависимости от способа упаковки или запуска (например,
        россыпью или в хлопушках/пушках).
    conga_head_tensioning_system:
      name: Система натяжения мембраны конги
      description: Тип механизма, используемого для натяжения/настройки мембраны конги
        (например, традиционная настройка лагами или современные механизмы быстрой
        настройки).
    conga_set_included_drum_types:
      name: Типы барабанов в комплекте конг
      description: Типы конг, входящие в комплект (например, quinto + conga + tumba).
    connector_case_style:
      name: Тип корпуса разъема
      description: Тип конструкции корпуса разъема (например, жесткий корпус или мягкий
        чехол), отражающий уровень защиты и портативность.
    console_cover_installation_method:
      name: Способ установки чехла консоли
      description: Способ крепления чехла к консоли/подлокотнику (например, надеваемый,
        эластичные ремни, липучка, клейкое крепление, клипса).
    console_display_type:
      name: Тип дисплея консоли
      description: Тип пользовательского дисплея устройства (например, LCD, LED, сенсорный
        экран).
    construction_design:
      name: Конструкция
      description: Количество подвижных секций в конструкции накладки, влияющее на
        подвижность (например, цельная или из 3 частей).
    contact_angle:
      name: Контактный угол
      description: Контактный угол дорожек подшипника, выраженный одним значением
        или парой углов (например, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Тип наполнения шара для контактного жонглирования
      description: Цельная или заполненная конструкция шара (и тип наполнителя при
        наличии), влияющая на распределение веса и долговечность.
    contact_juggling_ball_transparency:
      name: Прозрачность шара для контактного жонглирования
      description: Прозрачность/оптический вид шара.
    contact_surface_material:
      name: Материал контактной поверхности
      description: Материал контактных точек, соприкасающихся с инструментом (например,
        пробка/резина), предотвращающий появление царапин и улучшающий сцепление.
    container_material:
      name: Материал контейнера
      description: Основной материал потребительской упаковки продукта (например,
        стекло, ПЭТ-пластик, алюминий).
    contaminant_removal:
      name: Удаление загрязняющих веществ
      description: Типы загрязняющих веществ, удаление или снижение которых сертифицировано
        для продукта.
    contra_alto_clarinet_body_configuration:
      name: Конфигурация корпуса контра-альтового кларнета
      description: Конструктивная форма контра-альтового кларнета (например, прямая
        или изогнутая конструкция).
    contra_alto_clarinet_lowest_note_extension:
      name: Расширение нижнего диапазона контра-альтового кларнета
      description: Самая низкая воспроизводимая нота инструмента (самая низкая нота,
        допускаемая механизмом), обычно используемая для различения моделей с низким
        E♭, D или C.
    contra_bass_clarinet_bell_type:
      name: Тип раструба контрабас-кларнета
      description: Конфигурация раструба контрабас-кларнета.
    contra_bass_clarinet_bore_type:
      name: Тип канала контрабас-кларнета
      description: Конструкция канала инструмента.
    contra_bass_clarinet_lowest_written_note:
      name: Самая низкая записанная нота контрабас-кларнета
      description: Самая низкая записанная нота, которую может воспроизводить инструмент
        (часто зависит от расширения до низкого C или низкого E♭).
    control_arm_bushing_material:
      name: Материал втулок рычага подвески
      description: Материал входящих в комплект/установленных втулок, при их наличии.
    control_arm_bushings_included:
      name: Втулки рычага подвески в комплекте
      description: Наличие установленных втулок в комплекте с рычагом подвески.
    control_arm_finish:
      name: Отделка рычага подвески
      description: Защитная отделка рычага подвески (защита от коррозии и внешний
        вид).
    control_arm_grease_fitting_type:
      name: Тип пресс-масленки рычага подвески
      description: Наличие пресс-масленки (zerk) в узле рычага подвески/шарового шарнира
        и возможность обслуживания.
    control_arm_material:
      name: Материал рычага подвески
      description: Основной материал и технология изготовления корпуса рычага подвески.
    control_arm_position:
      name: Положение рычага подвески
      description: Положение рычага подвески в подвеске относительно стороны/угла
        оси (например, верхний/нижний, передний/задний, левый/правый).
    control_arm_style:
      name: Тип рычага подвески
      description: Геометрический/конструктивный тип рычага подвески, используемый
        в конструкции подвески.
    control_cable_connector_type:
      name: Тип разъема троса управления
      description: Тип наконечника/разъема троса управления для подключения к системе
        управления и двигателю (например, фирменные OEM-наконечники).
    control_voltage_or_gate_connectivity:
      name: Управляющее напряжение или подключение затвора
      description: Поддержка соединения CV/Gate для интеграции с модульным/аналоговым
        оборудованием.
    controller_function:
      name: Функция контроллера
      description: Основная функция платы управления беговой дорожки, например управление
        двигателем, питание или инверторный привод.
    controller_type:
      name: Тип контроллера
      description: Контроллер двигателя/система управления, входящая в комплект переоборудования
        электросамоката (или требуемая для использования), с акцентом на характеристики,
        важные для совместимости и производительности.
    conversion_kit_cooling_method:
      name: Способ охлаждения комплекта переоборудования
      description: Основной способ теплоотвода в системе интеграции двигателя/инвертора/аккумулятора.
    conversion_kit_installation_complexity:
      name: Сложность установки комплекта переоборудования
      description: Ожидаемый уровень сложности установки с учетом типичных навыков
        пользователя и необходимых инструментов.
    converted_bed_size:
      name: Размер кровати после трансформации
      description: Размер или конфигурация кровати, в которую трансформируется детская
        кроватка после установки комплекта.
    convertible_configuration:
      name: Конфигурация трансформации
      description: Количество различных конфигураций кровати, в которые трансформируется
        изделие (например, кроватка 3-в-1 → детская кровать → кушетка).
    convertible_high_chair_modes:
      name: Режимы трансформируемого стульчика
      description: Конфигурации сиденья, в которые трансформируется кресло.
    cookie_decorating_kit_items_included:
      name: Комплектация набора для украшения печенья
      description: Отдельные компоненты для украшения, входящие в комплект, чтобы
        покупатели знали точный состав набора (например, тюбики с глазурью, посыпка,
        формочки для печенья).
    cookie_variety:
      name: Вид печенья
      description: Конкретный тип или разновидность печенья, помогающие покупателям
        быстрее найти нужный вариант.
    cooking_state:
      name: Степень готовности
      description: Степень готовности куриного продукта на момент продажи (сырой,
        полностью приготовленный, маринованный и т. д.).
    coolant_additive_purpose:
      name: Назначение присадки к охлаждающей жидкости
      description: Основная функция присадки к охлаждающей жидкости (не промывка радиатора
        и не специализированный герметик).
    coolant_base_fluid:
      name: Базовая жидкость охлаждающей жидкости
      description: Основная гликолевая основа, используемая в составе антифриза/охлаждающей
        жидкости.
    coolant_outlet_connection_style:
      name: Тип соединения выходного патрубка охлаждающей жидкости
      description: Тип интерфейса выходного соединения для подключения радиаторного
        шланга или линии охлаждающей жидкости.
    coolant_outlet_neck_angle:
      name: Угол выходного патрубка охлаждающей жидкости
      description: Угол/ориентация выходного патрубка относительно монтажного фланца/двигателя
        (полезно для прокладки верхнего радиаторного шланга).
    coolant_technology:
      name: Технология охлаждающей жидкости
      description: Тип химической технологии охлаждающей жидкости/антифриза (как обычно
        указывается на упаковке).
    coolant_temperature_sensor_port:
      name: Порт датчика температуры охлаждающей жидкости
      description: Наличие порта для датчика или переключателя температуры охлаждающей
        жидкости и тип используемого интерфейса.
    coolant_temperature_sensor_seal_type:
