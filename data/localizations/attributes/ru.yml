    anchor_type:
      name: Тип якоря
      description: Тип якоря на катере, за которым катаются по воде на тросе (например,
        плугообразный или якорь без штока)
    anemometer_application:
      name: Сфера применения анемометра
      description: Тип анемометра по предполагаемой сфере использования (например,
