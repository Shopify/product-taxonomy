        после высыхания согласно заявлению производителя.
    watercraft_care_application_area:
      name: Область применения средств по уходу за водным транспортом
      description: Основная область или компонент водного транспорта, для которого
        предназначено средство.
    watercraft_drive_mechanism:
      name: Механизм привода водного транспорта
      description: Конкретный установленный или поддерживаемый бортовой механизм движения.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Шаблон датчика топливного бака водного транспорта
      description: Стандарт или схема крепления датчиков топливного бака и совместимых
        приборов (например, типовые морские схемы болтов).
    watercraft_fuel_tank_shape:
      name: Форма топливного бака водного транспорта
      description: Общая физическая форма топливного бака для планирования размещения
