    bayan_tuning_system_type:
      name: Тип системы настройки баяна
      description: Способ натяжения/настройки баяна (тип конструкции), влияющий на
        портативность и простоту настройки.
    bb_gun_action_type:
      name: Тип механизма действия пневматического пистолета
      description: Механизм заряда или циклического действия пневматического пистолета
        (например, рычажный, помповый, с откидным стволом).
    bb_gun_caliber:
      name: Калибр пневматического пистолета
      description: Диаметр шариков, которыми стреляет пистолет. Обеспечивает совместимость
        боеприпасов.
    bb_gun_part_type:
      name: Тип детали пневматического пистолета
      description: Конкретный компонент или аксессуар, предназначенный для пневматических
        пистолетов. Позволяет покупателям быстро найти точную запчасть, деталь для
        модернизации или дополнение (например, ствол, уплотнение поршня, скоростной
        заряжатель).
    beach_ball_features:
      name: Характеристики пляжного мяча
      description: Отличительные функциональные особенности, характерные для пляжных
        мячей.
    beach_bucket_features:
      name: Характеристики пляжного ведра
      description: Функциональные особенности пляжного ведерка, влияющие на его использование,
        долговечность и удобство.
    beach_sand_toy_items_included:
      name: Игрушки для пляжа и песка в комплекте
      description: Дополнительные элементы для игр на пляже и в песке, входящие в
        комплект с ведерком (если продается в комплекте).
    bead_breaker_type:
      name: Тип механизма снятия бусин
      description: Тип/конструкция механизма снятия бисера.
    bead_hole_style:
      name: Тип отверстия в бисере
      description: Стиль или конфигурация отверстия/паза в бисере. Влияет на то, как
        он сидит на крючке или леске.
    bead_type:
      name: Тип бисера
      description: Основной тип бисера, необходимого для схемы.
    bead_type_patch_embellishment:
      name: Тип бисера (украшение в виде нашивки)
      description: Основной тип бисера, используемого на поверхности нашивки.
    beaded_accessory_project_type:
      name: Тип проекта аксессуара из бисера
      description: Какой аксессуар изготавливается по схеме.
    beading_needle_flexibility:
      name: Гибкость иглы для бисероплетения
      description: Относительная гибкость стержня иглы для прохождения узких участков
        бисероплетения.
    beading_pattern_bead_size:
      name: Размер бисера в схеме бисероплетения
      description: Рекомендуемый размер (размеры) бисера, указанный в схеме (обычно
        размер бисера, например 11/0, 8/0).
    beading_pattern_chart_format:
      name: Формат схемы узора для бисероплетения
      description: Способ визуального представления схемы (например, график или пошаговые
        фотографии).
    beading_pattern_stitch_technique:
      name: Техника схемы бисероплетения
      description: Основная техника бисероплетения, используемая в схеме.
    beading_technique_stitch:
      name: Техника бисероплетения
      description: Основная техника или стежка бисероплетения, используемая в схеме
        например, плетение «пейот», «кирпичик»).
    beading_thread_fiber_type:
      name: Тип волокна нити для бисероплетения
      description: Подтип волокна/материала для бисероплетения (более конкретный,
        чем общий термин «Материал»), связанный с характеристиками.
    beading_thread_size:
      name: Размер бисерной нити
      description: Используемая производителем/в отрасли маркировка размера нитей
        для бисероплетения (специфичная для бренда/линейки), например размер D или
        00.
    beading_thread_use_case:
      name: Сфера применения нити для бисероплетения
      description: Основное рекомендуемое применение нити для бисероплетения. Помогает
        покупателям выбрать подходящий товар для своего проекта.
    beading_wire_coating_material:
      name: Материал покрытия проволоки для бисероплетения
      description: Материал внешнего покрытия проволоки для бисероплетения (если имеется),
        который влияет на тактильные ощущения, долговечность и устойчивость к скручиванию.
    beading_wire_strand_count:
      name: Количество жил в проволоке для бисероплетения
      description: Количество жил в многожильной проволоке для бисероплетения (например,
        7-жильная, 19-жильная, 49-жильная). Влияет на гибкость.
    beadlock_type:
      name: Тип бедлока
      description: Используется ли в колесе бедлок и какого типа (помогает покупателям
        внедорожных и вездеходных мотоциклов).
    beam_material:
      name: Материал балки
      description: Основной материал балки/штанги (часто отличается от головок/насадок).
    beam_pattern:
      name: Диаграмма направленности луча
      description: Распределение светового потока, используемого для освещения при
        вождении/во внедорожных условиях.
    bean_bag_fabric_material:
      name: Материал ткани кресла-мешка
      description: Внешняя ткань кресел-мешков в комплекте.
    bean_paste_variety:
      name: Разновидность фасолевой пасты
      description: Конкретный тип фасолевой пасты в зависимости от способа производства
        или основного ингредиента.
    bean_preparation:
      name: Подготовка фасоли
      description: Способ подготовки или обработки фасоли перед проращиванием (например,
        целые стручки, очищенные, измельченные, пророщенные).
    bean_variety:
      name: Сорт фасоли
      description: Указывает ботанический или рыночный сорт фасоли например, зеленая
        фасоль, эдамаме, длинная фасоль
    beanie_style:
      name: Стиль шапки-бини
      description: Общий дизайн, конструкция или силуэт шапки-бини, чтобы покупатели
        могли быстро выбрать из распространенных вариантов.
    bearing_clearance:
      name: Зазор подшипника
      description: Класс внутреннего радиального зазора подшипника (величина внутреннего
        люфта). Класс C0 также называют CN или нормальным зазором.
    bearing_construction_type:
      name: Тип конструкции подшипника
      description: Конструкция подшипника, используемого во втулке (например, картриджный,
        со свободными шариками).
    bearing_edge_type:
      name: Тип кромки подшипника
      description: Тип/профиль кромки обшивки. Виляет на толчки и устойчивость.
    bearing_lubrication:
      name: Смазка подшипника
      description: Тип смазочного материала, нанесенного на подшипник при производстве,
        например смазка или масло.
    bearing_material:
      name: Материал подшипника
      description: Материал, из которого изготовлен подшипник (например, сталь, гибридная
        керамика). Помогает выбрать между долговечностью, стоимостью и производительностью.
    bearing_rating:
      name: Класс подшипника
      description: Допуск подшипника или класс производительности, используемый в
        коньках (например, ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Код уплотнения подшипника
      description: Тип уплотнения, используемого в подшипнике. Влияет на долговечность
        и сопротивление качению.
    bearing_seal_type:
      name: Тип уплотнения подшипника
      description: Конструкция уплотнения или защитного кожуха, предохраняющего внутренние
        детали подшипника от загрязнений и влияющего на сопротивление (например, 2RS,
        ZZ, LLU, открытый).
    bearing_shield_type:
      name: Тип защитного кожуха подшипника
      description: Тип защитного кожуха или уплотнения, предохраняющего внутренние
        детали подшипника.
    bearing_size_code:
      name: Код размера подшипника
      description: Стандартизированное обозначение подшипника (например, 608, 688),
        в котором указаны внутренний и внешний диаметр, а также ширина.
    bearing_type:
      name: Тип подшипника
      description: Конструкция подшипников, используемых в рулевой колонке.
    beater_head_material:
      name: Материал головки колотушки
      description: Материал контактной поверхности/головки бита бас-барабана (например,
        войлок, дерево, резина).
    beaters_included:
      name: Наличие колотушек
      description: Количество битов в комплекте или установленных на педали барабана
        (например, один или два). Также можно указать, что бит не входит в комплект.
    bed_base_type:
      name: Тип основания кровати
      description: Конструкция основания кровати или дивана (например, платформа,
        пружинный реечный, регулируемый).
    bed_storage_type:
      name: Тип хранения в кровати
      description: Встроенный механизм хранения в каркасе кровати.
    bedroom_furniture_items_included:
      name: Состав мебели для спальни
      description: Список предметов мебели, входящих в комплект спальни (например,
        кровать, комод, тумбочки). Позволяя покупателям быстро узнать, что входит
        в комплект, не читая длинных описаний.
    bedroom_vanity_items_included:
      name: Аксессуары для туалетного столика в комплекте
      description: Список предметов, поставляемые в комплекте туалетного столика (например,
        зеркало, табурет, комплект освещения).
    beer_based_cocktail_variety:
      name: Вид коктейля на основе пива
      description: Коктейли на основе пива по их конкретным разновидностям, например,
        Radler, Shandy, Michelada.
    beet_variety:
      name: Сорт свеклы
      description: Сорт или разновидность свеклы. Помогая покупателям определить вкус,
        цвет и кулинарное применение (например, красная, золотистая, свекла Кьоджа).
    bell_actuation_mechanism:
      name: Механизм активации звонка
      description: Что должен сделать пользователь, чтобы позвонить. Помогает покупателям
        выбрать предпочтительную эргономику.
    bell_guard_coverage_area:
      name: Зона охвата защитного кожуха раструба
      description: Для какой части раструба предназначен защитный кожух.
    bell_material:
      name: Материал раструба
      description: Материал детали раструба (если указан отдельно от общего материала
        инструмента).
    bellhousing_bolt_pattern:
      name: Расположение болтов картера раструба
      description: Стандарт или семейство вариантов расположения болтов картера раструба/со
        стороны двигателя, используемый в картере коробки передач.
    bellows_material:
      name: Материал сильфона
      description: Материал корпуса/покрытия сильфона (если указан).
    bellows_orientation:
      name: Ориентация сильфона
      description: Конфигурация сильфона, используемого для подачи воздуха в трубы.
    belly_panel_style:
      name: Тип панели для живота
      description: Конструкция пояса или панели для живота, которая адаптируется к
        растущему животу.
    belt_buckle_type:
      name: Тип пряжки ремня
      description: Конкретный механизм или конструкцию пряжки на ремне.
    beret_style:
      name: Тип берета
      description: Конкретный дизайн или культурный вариант берета.
    berry_species:
      name: Вид ягод
      description: Вид ягод, содержащихся в продукте, чтобы покупатели могли быстро
        отфильтровать нужные ягоды.
    beta_casein_variant:
      name: Вариант бета-казеина
      description: Какой вариант бета-казеинового белка (например, A2) присутствует
        в молоке. Для потребителей, которых беспокоят вопросы усвояемости.
    beverage_sweetness_level:
      name: Уровень сладости напитка
      description: Классификация напитка по степени добавленной сладости или сахара.
    bezel_graduation_units:
      name: Единицы шкалы вращающегося безеля
      description: Единицы измерения на вращающемся безеле (градусы, мил или двойная
        шкала).
    bicycle_brake_set_components_included:
      name: Компоненты комплекта велосипедных тормозов
      description: Список деталей в комплекте, чтобы покупатели точно знали, что в
        него входит, и могли сравнивать различные конфигурации комплектов.
    bicycle_cage_mounting_position:
      name: Положение крепления флягодержателя на велосипеде
      description: Место на велосипеде, в котором предполагается установка флягодержателя.
    bicycle_computer_mount_placement:
      name: Расположение крепления велокомпьютера
      description: Место установки крепления велокомпьютера на велосипеде, например
        спереди на руле или на верхней крышке рулевой колонки.
    bicycle_folding_mechanism:
      name: Механизм складывания велосипеда
      description: Механическая система складывания рамы велосипеда (например, полускладная,
        вертикальная).
    bicycle_frame_design:
      name: Конструкция велосипедной рамы
      description: Общий стиль велосипедной рамы, влияющий на удобство посадки, грузоподъемность
        и возможности хранения.
    bicycle_frame_style:
      name: Стиль велосипедной рамы
      description: Кконструктивный стиль велосипедной рамы (заниженная, лоурайдер,
        чоппер-стретч и т. д.), который влияет на посадку и эстетику.
    bicycle_handlebar_type:
      name: Тип велосипедного руля
      description: Конкретный стиль или геометрия руля. Помогает велосипедистам выбрать
        руль, подходящий для их положения при езде и дисциплины.
    bicycle_headset_configuration:
      name: Конфигурация рулевой колонки велосипеда
      description: Конструктивный стиль или стандарт рулевой колонки велосипеда в
        зависимости от расположения чашек (например, внешняя чашка, ZeroStack, интегрированная,
        резьбовая).
    bicycle_hub_type:
      name: Тип велосипедной втулки
      description: Механизм ступицы, поставляемой с колесом. Влияет на совместимость
        трансмиссии и стиль езды.
    bicycle_lock_security_certification:
      name: Сертификация безопасности велосипедного замка
      description: Независимая сертификация третьей стороной, подтверждающая защиту
        от кражи (например, Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Тип велосипедных педалей
      description: Общий стиль работы или конструкция педалей, например платформенные,
        контактные или гибридные. Помогает велосипедистам выбрать правильный интерфейс
        для своего стиля езды.
    bicycle_propulsion_type:
      name: Тип привода велосипеда
      description: Способ привода велосипеда, например ручное вращение педалей, электропривод
        или двигатель внутреннего сгорания.
    bicycle_pump_type:
      name: Тип велосипедного насоса
      description: Конструкция насоса. Помогает покупателям выбрать модель, наиболее
        подходящую для их стиля езды, хранения использования в экстренных ситуациях.
    bicycle_rack_mounting_type:
      name: Тип крепления велосипедного багажника
      description: Основной метод или место крепления багажника к велосипеду. Помогает
        пользователям убедиться в совместимости с их рамой и крепежом.
    bicycle_suspension_type:
      name: Тип велосипедной подвески
      description: Наличие и конфигурация подвески на велосипеде.
    bicycle_tire_tread_pattern:
      name: Рисунок протектора велосипедной шины
      description: Тип протектора шины. Влияет на сцепление и сопротивление качению
        на различных поверхностях.
    bidirectional_charging_capability:
      name: Возможность двунаправленной зарядки
      description: Поддерживает ли электромобиль режимы двунаправленной зарядки, такие
        как V2G и (или) V2H.
    bike_rack_mounting_style:
      name: Способ крепления велокрепления
      description: Как велосипед удерживается/закрепляется на багажнике.
    bike_rack_tilt_function:
      name: Функция наклона велосипедного багажника
      description: Имеется ли функция наклона для доступа к заднему грузовому отсеку
        при установленном багажнике и какая.
    bikini_top_style:
      name: Стиль верхней части бикини
      description: Дизайн или крой верхней части бикини. Помогает покупателям подобрать
        предпочтительный фасон и силуэт.
    billiard_brush_type:
      name: Тип бильярдной щетки
      description: Конкретный тип инструмента для чистки бильярдного стола (например,
        щетка для стола, щетка для бортов, блок для чистки).
    billiard_glove_finger_coverage:
      name: Покрытие пальцев бильярдной перчатки
      description: Какие пальцы конструктивно закрываются перчаткой. Позволяет точно
        фильтровать по стилям перчаток для бильярда.
    billiard_pocket_style:
      name: Стиль луз бильярдного стола
      description: Конструктивный или эстетический стиль кармана. Влияет на совместимость
        и оформление стола.
    billiard_rack_style:
      name: Стиль бильярдного треугольника
      description: Физическая стиль или механизм треугольника (например, традиционная
        рама, шаблонный, складной).
    billiard_table_type:
      name: Тип бильярдного стола
      description: Дисциплина бильярда или стиль использования, для которого предназначен
        стол (например, пул, снукер, карамболь).
    billiards_discipline:
      name: Дисциплина бильярда
      description: Конкретный вид бильярда (тип игры), для которого предназначен или
        с которым совместим товар.
    binding_compatibility_standard:
      name: Стандарт совместимости креплений
      description: Интерфейс крепления (стандарт подошвы), для которого сертифицированы
        лыжные ботинки, чтобы обеспечить безопасное и правильное соединение с лыжными
        креплениями.
    binding_inclusion:
      name: Включение креплений
      description: Продаются ли лыжи без креплений, со встроенной системой или с отдельными
        креплениями в комплекте.
    binding_interface:
      name: Интерфейс крепления
      description: Стандарт крепежной пластины или интерфейса, предварительно установленных
        на лыжах или совместимых с ними, чтобы обеспечить совместимость ботинок и
        креплений.
    binding_liner_type:
      name: Тип внутреннего вкладыша крепления
      description: Тип внутреннего вкладыша, используемого в креплении/ботинке (например,
        съемный, пригодный для ходьбы, термоформованный).
    binding_mounting_system:
      name: Система крепления
      description: Интерфейс, используемый для установки крепления на лыжу (плоское
        крепление, направляющая, пластина и т. д.).
    binding_position:
      name: Позиция крепления
      description: Предполагаемое положение или конфигурацию крепления (например,
        передний ботинок, задний ботинок, ARTP).
    binding_strap_position:
      name: Положение ремешка крепления
      description: Где именно на креплении предполагается установить ремешок.
    bingo_components_included:
      name: Состав набора для бинго
      description: Список компонентов, входящих в комплект для игры в бинго, таких
        как шары, карточки и маркеры.
    bingo_number_range:
      name: Диапазон номеров для бинго
      description: Диапазон/вариант номеров для бинго, поддерживаемый набором.
    bingo_set_features:
      name: Характеристики набора для бинго
      description: Основной формат набора для бинго (физический/ручной или электронный/интерактивный).
    bipod_mounting_interface:
      name: Интерфейс крепления сошки
      description: Интерфейс крепления, используемый для соединения сошки с оружием
        или рельсовой системой крепления.
    bit_attachment_type:
      name: Тип крепления биты
      description: Способ крепления оголовья к удилу (например, завязки, пряжки, винты
        типа «Чикаго»).
    bit_mouthpiece_design:
      name: Конструкция мундштука удила
      description: Стиль конструкции или конфигурация соединения мундштука, которая
        определяет распределение давления, зазор в небе и общую жесткость.
    bit_ring_style:
      name: Тип кольца удила
      description: Стиль щеки или кольца удила, которые крепятся к уздечке. Влияет
        на действие, боковое направление и ощущение поводов.
    bladder_material:
      name: Материал камеры
      description: Материал, используемый для внутренней камеры, удерживающей воздух.
    blade_attachment_type:
      name: Тип крепления лезвия
      description: Используется ли в коньке механизм с защелкой (на шарнирах) или
        фиксированное крепление лезвия.
    blade_finish_coating:
      name: Отделка/покрытие лезвия
      description: Обработка поверхности лезвия, применяемая для эстетического вида
        или защиты от коррозии.
    blade_hosel_type:
      name: Тип шейки лезвия
      description: Тип соединения шейки лезвия, которая вставляется в рукоятку. Влияет
        на совместимость (например, стандартная или коническая).
    blade_length_type:
      name: Тип длины лезвия
      description: 'Длина лопасти ласты: короткая, средняя или длинная. Влияет на
        частоту гребков и цели тренировки.'
    blade_lie:
      name: Угол наклона лезвия
      description: Значение угла наклона лезвия хоккейной клюшки, определяющее положение
        лезвия на льду относительно рукояти.
    blade_sharpness:
      name: Острота лезвия
      description: Заточено или затуплено лезвие оружия для тренировок.
    blade_size_category:
      name: Категория размера лезвия
      description: Стандартизированный международный код размера клинка сабли (0–5).
        Позволяет различать клинки для юношеского и взрослого возраста.
    blade_size_class:
      name: Класс размера лезвия
      description: Классификация лезвия по стандартам размеров игроков в соответствии
        с размерами рукояток, например для юниоров, игроков среднего и старшего возраста.
    blade_size_number:
      name: Номер размера лезвия
      description: Стандартный числовой код размера (0–5), определенный правилами
        фехтования и определяющий длину лезвия и соответствие возрастной группе.
    blaster_mechanism:
      name: Механизм бластера
      description: Внутренний механизм работы гелевого бластера (например, GBB, AEG,
        пружинный).
    block_edge_style:
      name: Тип обработки краев блоков
      description: Обработка краев/углов деревянных блоков с точки зрения тактильных
        ощущений и безопасности.
    blocking_mat_features:
      name: Характеристики блокировочного коврика
      description: Функциональные особенности, характерные для блокировочных ковриков
        (хранение, портативность, удобство использования).
    blocking_mat_grid_unit:
      name: Единица сетки блокировочного коврика
      description: Система единиц, используемая на напечатанной сетке, которая помогает
        пользователям сопоставлять шаблоны и размеры.
    blocking_mat_surface_markings:
      name: Разметка поверхности блокировочного коврика
      description: Тип разметочных/ориентировочных меток, нанесенных на поверхность
        коврика.
    blocking_wire_coating:
      name: Покрытие блокировочной проволоки
      description: Обработка поверхности/покрытие блокировочной проволоки, влияющие
        на устойчивость к ржавчине, гладкость и риск зацепиться.
    blocking_wire_end_cap_type:
      name: Тип концевой заглушки блокирующей проволоки
      description: Тип защиты/отделки концов блокирующей проволоки, используемой для
        обеспечения безопасности и защиты ткани.
    blocking_wire_set_includes:
      name: Комплект поставки блокирующей проволоки
      description: Компоненты в комплекте поставки блокирующей проволоки (например,
        Т-образный зажим, трубка для хранения).
    blocking_wire_usage:
      name: Использование блокирующей проволоки
      description: Основной вариант использования, для которого предназначена гибкая
        блокирующая проволока.
    bloom_stage:
      name: Стадия цветения
      description: Насколько раскрыты цветки маргаритки при доставке/отправке.
    blower_motor_bearing_type:
      name: Тип подшипника двигателя вентилятора
      description: Конструкция подшипника, используемого в двигателе вентилятора.
    blower_motor_mounting_position:
      name: Положение установки двигателя вентилятора
      description: Место установки двигателя вентилятора в модуле HVAC/транспортном
        средстве (например, спереди, сзади).
    blowpipe_valve_type:
      name: Тип клапана нагнетательного трубопровода
      description: Тип клапана нагнетательного трубопровода (если таковой имеется).
    bo_staff_style:
      name: Тип бо
      description: Конструкция или тип изготовления палки (например, прямая, коническая,
        с пенопластовой набивкой, складная).
    board_game_theme:
      name: Тема настольной игры
      description: Сюжетная тема или среда настольной игры (используется для поиска
        и просмотра).
    board_rail_shape:
      name: Форма кантов доски
      description: Определяет форму кантов доски (например, мягкие, жесткие, 50/50),
        которые влияют на сцепление с волной и обеспечивают движение по ней.
    board_size_classification:
      name: Классификация размеров досок
      description: Классификация досок или наборов для игры в корнхол по стандартизированным
        размерам.
    board_type_compatibility:
      name: Совместимость типов досок
      description: Указывает тип доски, для которой предназначен лиш.
    boat_construction_type:
      name: Тип конструкции лодки
      description: Конструктивный стиль или формат гребной лодки (например, надувная,
        жесткая).
    boat_hook_flotation:
      name: Плавучесть багра
      description: Спроектирован ли багор так, чтобы плавать при падении в воду.
    boat_ladder_stowage_style:
      name: Тип хранения лестницы для лодки
      description: Как хранится лестница, когда она не используется (например, складная,
        выдвижная, съемная).
    boat_trailer_construction_type:
      name: Тип конструкции прицепа для лодки
      description: 'Каким образом прицеп поддерживает лодку: с помощью подставок,
        роликов или гибридной системы.'
    boat_weaving_shuttle_weft_exit_type:
      name: Тип выхода уточной нити из ткацкого челнока
      description: Способ выхода уточной нити из челнока во время ткачества..
    bobbin_loading_type:
      name: Тип загрузки шпульки
      description: Как шпулька вставляется/загружается в швейную машину.
    bobbin_system:
      name: Система шпульки
      description: Система/тип загрузки шпульки, используемые в швейной машине.
    bobbin_type:
      name: Тип шпульки
      description: Формат держателя нити, для использования которого (или с которым)
        спроектирован челнок. Определяет совместимость и типичное применение (например,
        в челноках-лодочках часто используются шпулька, в челноках для лоскутного
        ткачества может быть открытый механизм для полос ткани).
    bobbin_winder_winding_direction:
      name: Направление намотки моталки для шпулек
      description: Поддерживаемое направление намотки/вращения моталки для шпулек.
    bobble_mechanism:
      name: Механизм качания
      description: Тип механизма качания, влияющий на подвижность и долговечность.
    bocal_material:
      name: Материал S-образной трубки
      description: Указывает материал входящих в комплект S-образных трубок.
    bodhr_n_head_material:
      name: Материал мембраны бойрана
      description: Материал игровой мембраны, который существенно влияет на звучание
        и требования к уходу.
    bodhr_n_tuning_system_type:
      name: Тип настройки бойрана
      description: Тип встроенного механизма настройки, используемого для регулировки
        натяжения головки (если она настраивается).
    body_armor_coverage_area:
      name: Зона покрытия брони
      description: Какие зоны тела защищает изделие.
    body_armor_intended_use:
      name: Предполагаемое использование брони
      description: Основной сценарий езды или использования, для которого разработана
        броня для квадроциклов/UTV.
    body_cord_connector_style:
      name: Тип разъема шнура
      description: Конфигурация разъема на концах шнура (например, количество штырьков
        или байонетный тип), определяющая совместимость с оружием и табло для подсчета
        очков.
    body_panel_finish_state:
      name: Состояние отделки панелей кузова
      description: Состояние подготовки/отделки поверхности боковых панелей, в котором
        они продаются, для покраски/установки.
    body_shape:
      name: Форма корпуса
      description: Общая форма/стиль корпуса электрогитары.
    bodysuit_bottom_coverage:
      name: Покрытие нижней части боди
      description: Крой и покрытие нижней части боди, влияющие на комфорт и возможность
        использования с конкретной одеждой.
    boilie_shape:
      name: Форма бойлов
      description: Форма бойлов, производимых на раскаточном столе. Позволяет рыболовам
        выбирать различные профили приманки.
    boilie_stop_buoyancy:
      name: Плавучесть стопора для бойлов
      description: 'Плавучесть стопора для бойлов: плавающий, тонущий или нейтральной
        плавучести. Влияет на расположение приманки в толще воды.'
    bok_choy_variety:
      name: Сорт капусты пак-чой
      description: Сорт, торговое название или разновидность капусты пак-чой (например,
        Бэби, Шанхай, Най Бай, Татсой, Пёрпл Леди). Помогает покупателям выбирать
        нужный вкус, размер и внешний вид.
    bolt_drive_style:
      name: Тип привода болтов
      description: Тип привода болтов крепления скейтборда для различия распространенных
        типов головок/приводов, таких как шестигранник или крестовая головка.
    bone_content:
      name: Содержание костей
      description: Есть ли в мясе кости.
    bongo_center_block_material:
      name: Материал центрального блока бонго
      description: Материал центрального блока, соединяющего два барабана бонго (если
        применимо).
    bongo_shell_material:
      name: Материал барабанов бонго
      description: Материал корпусов бонго (корпусов барабанов), за исключением головок
        и оборудования.
    bongo_tuning_system:
      name: Система настройки бонго
      description: Способ настройки/конструкция бонго (например, традиционная настройка
        с помощью креплений или с помощью веревки). Влияет на обслуживание и аутентичность.
    boning_type:
      name: Тип косточек
      description: Систему структурной поддержки внутри стяжки, сочетание материала
        и стиля/формы используемых ребер жесткости. Напрямую влияет на уровень поддержки,
        гибкость и долговечность.
    boot_liner_type:
      name: Тип вкладыша ботинка
      description: Конструкцию или возможности настройки вкладыша ботинка для сноуборда
        (например, термоформованный, съемный).
    boot_sole_compatibility:
      name: Совместимость подошвы ботинок
      description: Стандарты подошвы ботинка или системы крепления, которые поддерживает
        крепление.
    boot_support_level:
      name: Уровень поддержки ботинка
      description: Общий рейтинг жесткости/поддержки голеностопа или ботинка, обеспечиваемый
        ботинком.
    boot_width_code:
      name: Код ширины ботинка
      description: Буквенное обозначение ширины, используемое производителем специально
        для определения размера ботинок для фигурного катания (например, AAA, AA,
        B, C, D).
    booth_configuration:
      name: Конфигурация кабинки
      description: Общая конфигурация посадки ботинка (например, односторонняя, угловая,
        модульная).
    bootie_toe_design:
      name: Конструкция носка ботинка
      description: Стиль конструкции носка ботинок для серфинга и рифовых ботинок.
    border_type:
      name: Тип окантовки
      description: Тип окантовки/обработка краев вышитой нашивки (влияет на внешний
        вид, устойчивость к износу и восприятие качества).
    bore_cleaner_format:
      name: Формат средства для чистки трубки
      description: Физический формат средства для чистки трубки (инструмент или расходный
        материал).
    bore_cleaner_safe_for_finish:
      name: Безопасность средства для чистки трубок для покрытия
      description: Распространенные виды покрытий духовых инструментов, с которыми
        безопасно использовать средство для чистки трубок.
    bottle_cage_loading_direction:
      name: Направление загрузки флягодержателя
      description: Направление, в котором бутылка вставляется в держатель или извлекается
        из него.
    bottle_neck_finish_closure_size:
      name: Форма горлышка бутылки / размер укупорки
      description: Стандартизированный размер горлышка бутылки, обеспечивающий совместимость
        с крышками, пробками и укупорочными машинами (например, горлышко 26 мм).
    bottle_style:
      name: Тип бутылки
      description: Распространенные формы бутылок, используемых в домашнем пивоварении
        и виноделии.
    bottom_bracket_interface:
      name: Интерфейс каретки
      description: Стандарт оси/каретки, для которого разработана шатунная рукоятка,
        обеспечивая совместимость рамы и каретки.
    bottom_bracket_standard:
      name: Стандарт каретки
      description: Корпус каретки/интерфейс, поддерживаемый рамой, определяющий совместимость
        шатунной рукоятки.
    bottom_type_suitability:
      name: Пригодность к типу дна
      description: Условия морского дна, в которых якорь обеспечивает наилучшее удержание.
    bounce_level:
      name: Уровень отскока
      description: Насколько сильно мяч отскакивает при падении или броске. Помогает
        пользователям выбрать правильный мяч для таких упражнений, как броски в стену
        или удары.
    bouncy_ball_surface_finish:
      name: Отделка поверхности попрыгунчика
      description: Тактильные и (или) визуальные свойства поверхности прыгающего мяча
        (например, гладкая, шипованная, блестящая).
    boundary_marker_type:
      name: Тип маркера ограждения
      description: Физическая форма маркера ограждения поля или корта или продукта
        для разметки (например, конус, лента, краска, трафарет, машина).
    bouquet_size_tier:
      name: Уровень размера букета
      description: Стандартизированный уровень размера букета/пучка, не зависит от
        количества стеблей (полезно, если используются разные стебли).
    bow_and_yo_yo_edge_finish:
      name: Тип обработки края банта / декоративного элемента йо-йо
      description: Отделка краев/окантовка банта или йо-йо элемента (особенно для
        бантов из лент).
    bow_case_shell_type:
      name: Тип корпуса футляра для лука
      description: Конструкция внешней части чехла для лука (например, жесткий корпус
        или мягкий чехол).
    bow_compatibility:
      name: Совместимость лука
      description: Тип лука, для которого предназначен или с которым совместим охотничий
        наконечник.
    bow_hair_color:
      name: Цвет волоса смычка
      description: Цвет/вид волоса, используемого в смычке струнного оркестрового
        инструмента (например, белый/отбеленный, натуральный белый, черный).
    bow_stick_material:
      name: Материал древка лука
      description: Материал трости смычка (основного стержня), который существенно
        влияет на вес, ощущения при игре и цену.
    bow_type:
      name: Тип лука
      description: Конструктивный тип юношеского лука (например, блочный, рекурсивный,
        длинный), который сильно влияет на стиль стрельбы, необходимое снаряжение
        и обучение.
    bow_winding_material:
      name: Материал обмотки рукояти лука
      description: Указывает материал обмотки рукояти лука, влияющий на хват и баланс.
    bow_yo_yo_embellishment_style:
      name: Стиль декоративного элемента (банта/йо-йо)
      description: Конструктивный стиль декоративного элемента (банта или текстильного
        йо-йо).
    bowling_ball_core_type:
      name: Тип ядра шара для боулинга
      description: Конструкция и симметрия внутреннего ядра шара для боулинга, влияющих
        на траекторию движения и потенциал закручивания.
    bowling_ball_coverstock_type:
      name: Тип покрытия шара для боулинга
      description: Материал или технологию внешнего покрытия шара для боулинга. Определяет
        сцепление с поверхностью и потенциал закручивания.
    bowling_set_style:
      name: Стиль набора для боулинга
      description: Общий стиль или область применения набора для боулинга.
    box_lid_type:
      name: Тип крышки коробки
      description: Тип крышки/механизма открывания, используемый в подарочной или
        жестяной коробке.
    box_spring_profile:
      name: Профиль пружинного блока
      description: Классификация общей высоты пружинного блока по удобным для покупателя
        категориям профилей (например, низкопрофильный, стандартный, высокопрофильный).
        Помогает быстро фильтровать товары, не зная точных размеров.
    box_spring_requirement:
      name: Требования для пружинного блока
      description: Требуется ли дополнительный пружинный блок или основание для матраса.
    boxing_ring_style:
      name: Стиль боксерского ринга
      description: Общий стиль конструкции или предполагаемый сценарий использования
        ринга (например, соревнования или тренировки, на возвышении или на полу).
    bra_length_type:
      name: Тип длины бюстгальтера
      description: 'Классификация бюстгальтеров по длине в зависимости от вертикального
        покрытия, например: стандартный, удлиненный, миди или укороченный.'
    bra_padding_type:
      name: Тип наполнителя бюстгальтера
      description: Уровень или наличие наполнителя в чашках.
    braces_compatibility:
      name: Совместимость брекетов
      description: Можно ли носить капу вместе с ортодонтическими брекет-системами
        и в какой степени.
    brake_band_form:
      name: Форма тормозной ленты
      description: 'Форма тормозной ленты: непрерывная петля (бесконечная) или в отрезок,
        который необходимо закрепить.'
    brake_band_material_type:
      name: Тип материала тормозной ленты
      description: Функциональный материал тормозной ленты (например, хлопковый шнур,
        нейлоновая нить или пружинная сталь), который влияет на долговечность, сцепление,
        растяжимость и уровень шума.
    brake_band_style:
      name: Стиль тормозной ленты
      description: Система/стиль натяжения тормозной ленты, используемой на прялке
        для натяжения крыльчатки/шпули.
    brake_bleeding_method:
      name: Способ прокачки тормозной системы
      description: Поддерживаемый набором способ прокачки тормозной системы.
    brake_booster_assist_type:
      name: Тип усилителя тормозов
      description: Тип механизма усиления тормозов.
    brake_booster_diaphragm_configuration:
      name: Конфигурация мембраны усилителя тормозов
      description: Количество и тип мембран, используемых в усилителе.
    brake_caliper_bleeder_screw_position:
      name: Расположение штуцера прокачки суппорта
      description: Положение штуцера прокачки на суппорте после установки (для проверки
        того, что он находится в верхней точке для корректной прокачки).
    brake_caliper_finish:
      name: Покрытие тормозного суппорта
      description: Указывает тип обработки поверхности или защитного покрытия корпуса
        суппорта (например, краска, гальваническое покрытие, анодирование).
    brake_caliper_included_hardware:
      name: Комплектация тормозного суппорта
      description: Комплект поставки тормозного суппорта.
    brake_caliper_mount_type:
      name: Тип крепления тормозного суппорта
      description: Тип крепежного интерфейса для установки суппорта на поворотный
        кулак/кронштейн.
    brake_caliper_paint_base_chemistry:
      name: Химическая основа краски суппорта
      description: Система краски/смолы или химическая основа покрытия.
    brake_caliper_paint_kit_contents:
      name: Содержимое набора для покраски суппорта
      description: Комплект поставки, помимо самой краски.
    brake_circuit_type:
      name: Тип тормозного контура
      description: Конфигурация гидравлического контура, поддерживаемая главным тормозным
        цилиндром.
    brake_clutch_fluid_base_chemistry:
      name: Химическая основа тормозной/сцепной жидкости
      description: Химическая основа тормозной/сцепной гидравлической жидкости, влияющая
        на совместимость и смешиваемость.
    brake_clutch_fluid_dot_specification:
      name: Классификация DOT тормозной/сцепной жидкости
      description: Классификация DOT для гидравлических тормозных/сцепных жидкостей
        (например, DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Отделка/покрытие тормозного барабана
      description: Отделка поверхности или защитное покрытие тормозного барабана (например,
        электростатическое покрытие, окраска, цинкование).
    brake_drum_type:
      name: Тип тормозного барабана
      description: Тип конструкции тормозного барабана (со встроенной втулкой/подшипником
        или без них).
    brake_fluid_base:
      name: Основа тормозной жидкости
      description: Состав требуемой или входящей в комплект гидравлической тормозной
        жидкости.
    brake_fluid_base_chemistry:
      name: Химическая основа тормозной жидкости
      description: Химическая основа тормозной жидкости, которая определяет совместимость
        и правила смешивания.
    brake_fluid_dot_specification:
      name: Спецификация тормозной жидкости по DOT
      description: Рейтинг/спецификация тормозной жидкости по DOT (например, DOT 3,
        DOT 4) для продуктов тормозной жидкости.
    brake_fluid_standards_compliance:
      name: Соответствие стандартам тормозной жидкости
      description: Отраслевые стандарты, которым, как утверждается, соответствует
        тормозная жидкость (помимо рейтинга DOT).
    brake_fluid_type:
      name: Тип тормозной жидкости
      description: Тормозная жидкость, необходимая для гидравлических тормозных суппортов
        велосипедов.
    brake_hose_end_fitting_type:
      name: Тип концевого фитинга тормозного шланга
      description: Тип соединения на каждом конце тормозного шланга (например, банджо,
        раструб, резьба с внутренней/наружной резьбой), используемый для обеспечения
        совместимости с суппортами/шлангами.
    brake_lever_pull_type:
      name: Тип хода тормозного рычага
      description: Передаточное отношение троса/механика, на которую рассчитан рычаг.
        Обеспечивает совместимость с конкретными тормозными суппортами (например,
        ободные тормоза с коротким ходом или V-образные тормоза с длинным ходом).
    brake_light_switch_actuation_type:
      name: Тип срабатывания выключателя стоп-сигнала
      description: Какое физическое событие приводит в действие переключатель (педаль/поршень,
        гидравлическое давление и т. д.).
    brake_light_switch_connector_type:
      name: Тип разъема выключателя стоп-сигнала
      description: Тип/формат электрического разъема, используемого переключателем
        стоп-сигнала для подключения к жгуту проводов транспортного средства.
    brake_light_switch_contact_type:
      name: Тип контакта выключателя стоп-сигнала
      description: Конфигурация/работа электрических контактов переключателя стоп-сигнала
        (например, нормально разомкнутый/замкнутый, переключающий тип или многоконтурная
        схема).
    brake_light_switch_mounting_style:
      name: Тип крепления выключателя стоп-сигнала
      description: Способ крепления/установки выключателя стоп-сигнала на транспортном
        средстве или в тормозной системе (например, резьбовое соединение, защелка,
        кронштейн, болт типа «банджо»).
    brake_master_cylinder_mounting_type:
      name: Тип крепления главного тормозного цилиндра
      description: Способ крепления главного тормозного цилиндра к транспортному средству/усилителю
        тормозов (расположение болтов/тип фланца).
    brake_master_cylinder_reservoir_type:
      name: Тип бачка главного тормозного цилиндра
      description: Тип/конфигурация бачка тормозной жидкости, поставляемого или требуемого
        главным тормозным цилиндром.
    brake_mount_type:
      name: Тип крепления тормоза
      description: Встроенный в вилку интерфейс тормозной системы. Позволяет мотоциклистам
        подтвердить совместимость тормозной системы.
    brake_mounting_flange_bolt_pattern:
      name: Расположение отверстий для болтов монтажного фланца тормоза
      description: Схема расположения крепежных отверстий/болтов на монтажном фланце,
        используемом для крепления опорной пластины тормоза или кронштейна суппорта
        к оси прицепа (например, 4 болта).
    brake_pad_backing_plate_material:
      name: Материал опорной пластины тормозной колодки
      description: Материал опорной пластины тормозной колодки. Влияет на теплоотвод
        и вес.
    brake_pad_compatible_rotor_type:
      name: Тип ротора, совместимый с тормозной колодкой
      description: Тип поверхности ротора/диска, для работы с которым предназначена
        колодка.
    brake_pad_compound:
      name: Состав тормозной колодки
      description: Формула фрикционного материала тормозной колодки.
    brake_pad_form_factor:
      name: Формфактор тормозной колодки
      description: Тормозная система/формфактор, для которых предназначена колодка
        (например, дисковая, барабанная, стояночный тормоз).
    brake_pad_material:
      name: Материал тормозной колодки
      description: Состав фрикционного материала или группу материалов, используемых
        в накладке тормозной колодки.
    brake_pad_shim_included:
      name: Прокладка для тормозной колодки в комплекте
      description: Входят ли в комплект прокладки для снижения шума или они уже установлены.
    brake_pad_wear_indicator_type:
      name: Тип индикатора износа тормозных колодок
      description: Тип индикатора износа входит в комплект тормозных колодок (например,
        механический писк или электронный датчик).
    brake_position:
      name: Расположение тормоза
      description: Место установки тормозного узла на транспортном средстве.
    brake_rotor_mount_type:
      name: Тип крепления тормозного ротора
      description: Интерфейс, используемый для крепления тормозного диска к ступице
        (если применимо).
    brake_service_kit_components_included:
      name: Компоненты комплекта для обслуживания тормозов
      description: Список инструментов/адаптеров/расходных материалов, входящих в
        комплект для обслуживания тормозной системы.
    brake_shoe_friction_material:
      name: Фрикционный материал тормозных колодок
      description: Фрикционный/накладной состав, используемый на тормозной колодке
        (материал, контактирующий с барабаном).
    brake_shoe_set_contents:
      name: Состав комплекта тормозных колодок
      description: Состав комплекта (например, только колодки или колодки и крепеж/пружины).
    brake_system_type:
      name: Тип тормозной системы
      description: Технология тормозного механизма, используемого для управления вращением
        шпули при забросе.
    brake_type:
      name: Тип тормоза
      description: Тип тормозного/натяжного механизма ткацкого навоя.
    brandy_age_classification:
      name: Классификация выдержки бренди
      description: Классификация бренди с использованием стандартных отраслевых обозначений
        качества/выдержки (например, VS, VSOP, XO), отражающих минимальные требования
        к выдержке.
    brass_cleaning_tool_type:
      name: Тип инструмента для чистки латуни
      description: Тип инструмента, используемого для чистки или обслуживания духовых
