    cricket_leg_guard_type:
      name: Тип щитков для ног (крикет)
      description: Конкретный вид защиты ног для крикета.
    cricket_player_role:
      name: Амплуа игрока в крикете
      description: Основное игровое амплуа, для которого предназначена обувь.
    cricket_protection_grade:
      name: Класс защиты снаряжения для крикета
      description: Классификация уровня защиты, присвоенная производителями снаряжения
