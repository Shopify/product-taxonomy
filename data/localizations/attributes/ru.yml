    watercraft_pump_stage_impeller_role:
      name: Роль ступени насоса/импеллера водного транспорта
      description: Назначение импеллера в насосной системе (например, забортная вода,
        охлаждение, водомет).
    watercraft_registration_status:
      name: Статус регистрации водного транспорта
      description: Наличие документов о праве собственности и/или регистрации.
    watercraft_safety_equipment_activation_type:
      name: Тип активации спасательного оборудования водного транспорта
      description: Основной способ активации спасательного устройства (например, маяков
        или PLB) (отдельно от механизма надувания).
    watercraft_steering_cable_core_material:
      name: Материал сердечника рулевого троса водного транспорта
      description: Материал внутреннего троса, передающего усилие.
    watercraft_steering_cable_hardware_included:
      name: Комплект крепежа рулевого троса водного транспорта
      description: Монтажное оборудование и принадлежности в комплекте поставки рулевого
