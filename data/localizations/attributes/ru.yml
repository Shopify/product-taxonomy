    cross_stitch_finishing_type:
      name: Тип оформления вышивки крестиком
      description: Предполагаемый тип оформления/демонстрации готовой вышивки.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Механизм удержания ткани в пяльцах для вышивки крестиком
