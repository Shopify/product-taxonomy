    customization_type:
      name: Тип персонализации
      description: 'Вариант майки: без надписей, игровая или с индивидуальным именем/номером.'
    cut_or_preparation_style:
      name: Стиль нарезки или подготовки
      description: Способ нарезки или подготовки кусочков овощей в банке (например,
