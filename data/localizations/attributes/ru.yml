    compatible_license_plate_hole_pattern:
      name: Совместимая схема отверстий номерного знака
      description: Конфигурация монтажных отверстий, поддерживаемая креплением/держателем
        (со стороны автомобиля и/или номерного знака).
    compatible_license_plate_size:
      name: Совместимый размер номерного знака
      description: Региональные стандарты или размеры номерных знаков, для которых
        предназначен держатель/крепление.
    compatible_loom:
      name: Совместимый ткацкий станок
      description: Типы ткацких станков, с которыми предназначен использоваться плоский
        ткацкий батан.
    compatible_loom_type:
      description: Тип ткацкой установки, для которой предназначен батан (например,
        ткацкие станки с жестким бердом или гобеленовые станки).
    compatible_machine_type:
      description: Тип стегальной установки, с которой предназначена использоваться
        рама (только ручная стежка, бытовая швейная машина, машина для стежки).
    compatible_mast_type:
      description: 'Диаметры мачт, для которых предназначен парус: уменьшенный диаметр
        (RDM), стандартный диаметр (SDM) или оба варианта.'
    compatible_model_system_train_scale:
      name: Совместимая модельная система (масштаб железной дороги)
      description: Масштаб/система железнодорожного моделизма, с которыми совместим
        аксессуар (например, HO, N, O).
    compatible_mounting_surface:
      name: Совместимая монтажная поверхность
      description: Поверхность или объект, на которые рассчитано крепление зажима.
    compatible_mouthpiece_patch:
      name: Совместимая накладка на мундштук
      description: Совместимость мундштука с накладками/подушечками и рекомендуемый
        диапазон толщины накладок.
    compatible_mouthpiece_type:
      description: Тип мундштука/хвостовика, для которого предназначен меллофон (обычно
        приемники под мундштук валторны или трубы в зависимости от модели).
    compatible_neck_profile_width:
      name: Совместимый профиль/ширина грифа
      description: Класс профиля/ширины грифа гитары, для которого предназначено каподастр
        (например, узкий электрогитарный или широкий классический).
    compatible_needle_size:
      description: Размеры/типы игл, для которых предназначен футляр (например, иглы
        для вышивания, гобеленовые или швейные иглы различной длины).
    compatible_needle_system:
      description: Системы игл, совместимые с машиной (например, 130/705H).
    compatible_parking_brake_mechanism:
      name: Совместимый механизм стояночного тормоза
      description: Совместимость суппорта со встроенным механизмом стояночного тормоза.
    compatible_pedal_instrument_type:
      name: Совместимый тип педального инструмента
      description: Инструмент, для которого предназначена педаль (например, цифровое
        пианино, клавишный инструмент/синтезатор, MIDI-контроллер).
    compatible_pedal_type:
      description: Тип или система педалей, для которых предназначен ремень или клипса
        (например, платформенные, SPD, Look Keo).
    compatible_pin_type:
      description: Тип штифтов, с которыми предназначен для использования мат (или
        возможность фиксации штифтами).
    compatible_pipe_filter_size:
      name: Совместимый размер фильтра для трубки
      description: Размер или тип фильтра, с которым совместима трубка (или отсутствие
        необходимости в фильтре).
    compatible_plate_size:
      description: Размеры или стандартизированные форматы баллистических пластин,
        совместимые с жилетом.
    compatible_play_vehicle_scale:
      description: Масштаб игрушки, для которого предназначен аксессуар (например,
        1:64), для улучшения совместимости с коллекционными и трековыми системами.
    compatible_playing_surface:
      description: Тип игрового поля или покрытия, для которого предназначена обувь
        для американского футбола.
    compatible_pole_dimensions:
      name: Совместимые размеры стойки
      description: Размер поперечного сечения стойки, с которым совместим аксессуар.
    compatible_pole_shape:
      name: Совместимая форма стойки
      description: Форма поперечного сечения стойки или колонны, для которой предназначена
        накладка.
    compatible_power_steering_system:
      description: Типы рулевых систем, для которых предназначена жидкость.
    compatible_powerplant_type:
      name: Совместимый тип силовой установки
      description: Тип силовой установки пневматического оружия BB, для которого предназначена
        деталь (например, пружинно-поршневая, CO2, PCP).
    compatible_presser_foot:
      name: Совместимая прижимная лапка
      description: Система крепления/совместимости прижимной лапки, поддерживаемая
        швейной машиной (например, быстросъемная или винтовая; низкий/высокий/наклонный
        хвостовик). Используйте «Универсальная/несколько», если поддерживаются несколько
        систем или в комплект входят адаптеры.
    compatible_protective_gear:
      name: Совместимое защитное снаряжение
      description: Защитное снаряжение, с которым предназначен для использования шейный
        фиксатор.
    compatible_protective_gear_integration:
      name: Совместимая интеграция защитного снаряжения
      description: Способ ношения или интеграции защиты с другим снаряжением (например,
        карман-вставка, отдельное крепление на ремнях).
    compatible_punching_bag_type:
      name: Совместимый тип боксерского мешка
      description: Типы боксерских или тренировочных мешков, с которыми совместим
        продукт.
    compatible_racing_discipline:
      name: Совместимая гоночная дисциплина
      description: Автоспортивные дисциплины, для которых предназначен/сертифицирован
        шлем.
    compatible_rc_scale:
      name: Совместимый масштаб RC
      description: Масштаб RC-модели (например, 1:10), для которого предназначен аксессуар
        или деталь.
    compatible_recorder_size:
      description: Размеры блокфлейт, для которых предназначен футляр.
    compatible_recorder_type:
      description: Тип блокфлейты (семейство/размер), с которым совместим аксессуар
        (например, сопрано, альт).
    compatible_reed_cut:
      description: Стиль среза трости, с которым совместима лигатура (например, filed/French
        cut или unfiled/American cut).
    compatible_reed_type:
      description: Срез/тип трости, для которого предназначен мундштук.
    compatible_reel_type:
      description: Тип рыболовной катушки, для которого предназначена сумка, футляр
        или чехол.
    compatible_refrigerant_type:
      name: Совместимый тип хладагента
      description: Тип хладагента, для которого предназначен испаритель кондиционера.
    compatible_ride_equipment:
      description: Типы колесного спортивного оборудования, для которого предназначен
        трамплин.
    compatible_roof_height:
      name: Совместимая высота крыши
      description: Профиль крыши, для которого предназначен чехол (стандартная или
        удлиненная/высокая крыша).
    compatible_roof_rail_type:
      description: Конфигурация крыши, для которой предназначена система базовых багажников.
    compatible_rope_count:
      name: Совместимое количество канатов
      description: Конфигурация канатов боксерского ринга, для которой предназначена
        деталь, например ринги с 3 или 4 канатами либо универсальная совместимость.
    compatible_rope_type:
      description: Конструкции канатов, которые можно использовать с устройством.
    compatible_saddle_type:
      description: Тип седла или дисциплина верховой езды, для которых предназначен
        аксессуар, с обеспечением совместимости с английскими, вестерн- и другими
        седлами.
    compatible_saxophone_size:
      description: Размер саксофона, с которым совместим продукт (например, сопрано,
        альт, тенор).
    compatible_saxophone_type:
      description: Саксофон, для которого предназначена лигатура/колпачок.
    compatible_scale_length:
      description: Диапазон мензуры гитары, для которого предназначены струны (например,
        короткая, стандартная, баритон).
    compatible_seat_airbag:
      name: Совместимая подушка безопасности сиденья
      description: Наличие боковых подушек безопасности в сиденье или совместимость
        с автомобилями, оснащенными подушками безопасности в сиденьях.
    compatible_seating_capacity:
      name: Совместимая вместимость сидений
      description: Количество сидений или конфигурация, для которых предназначен аксессуар.
    compatible_sensor_port_type:
      name: Совместимый тип порта датчика
      description: Поддержка датчиков уровня и (или) температуры масла масляным поддоном,
        а также тип порта при наличии.
    compatible_shifter_type:
      description: Тип или конфигурация рычага переключения передач, для которых предназначен
        чехол рычага.
    compatible_shis:
      name: Совместимый SHIS
      description: Коды системы Standardized Headset Identification System (SHIS),
        с которыми совместима деталь (например, IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      description: Дисциплины катания, для которых предназначена деталь или аксессуар.
    compatible_snowshoe_deck_type:
      name: Совместимый тип платформы снегоступов
      description: Тип рамы или платформы снегоступов, с которым совместимо крепление.
    compatible_special_effects_lighting_features:
      name: Совместимые функции световых спецэффектов
      description: Функциональные особенности световых эффектов, влияющие на выбор
        при покупке (помимо цвета/рисунка), например объединение устройств или реакция
        на звук.
    compatible_spinning_wheel_drive_system:
      name: Совместимая приводная система прялки
      description: Приводные системы прялки, поддерживаемые аксессуаром.
    compatible_spoke_gauge:
      name: Совместимый калибр спиц
      description: Размеры калибра спиц, для которых подходит резьба ниппеля, для
        правильного подбора спиц и ниппелей.
    compatible_steering_wheel_airbag:
      name: Совместимая подушка безопасности рулевого колеса
      description: Возможность сохранения штатного модуля подушки безопасности в рулевом
        колесе (или предназначение для систем без подушки безопасности).
    compatible_steering_wheel_control_button:
      name: Совместимая кнопка управления на рулевом колесе
      description: Совместимость со штатными кнопками управления на рулевом колесе
        (аудио/круиз-контроль/телефон) и соответствующей проводкой.
    compatible_stencil_material:
      description: Материалы, из которых машина может изготавливать трафареты или
        которые может обрабатывать (например, бумага, пластиковая пленка, майлар).
    compatible_stencil_media_format:
      name: Совместимый формат материалов для трафаретов
      description: 'Формат материалов для трафаретов, поддерживаемый машиной: листы,
        рулоны или оба варианта.'
    compatible_strap_retractor:
      name: Совместимый втягивающий механизм ремня
      description: Совместимость ремня со втягивающими системами или предназначение
        для невтягивающихся (статических) ремней.
    compatible_string_instrument_finish:
      description: Типы отделки инструментов, для которых полироль безопасна.
    compatible_substrate_material:
      description: Материалы поверхности, для которых предназначена краска.
    compatible_surface:
      name: Совместимая поверхность
      description: Поверхность/материал, для которого предназначен клей на липучке.
    compatible_surface_material:
      description: Материалы поверхностей автомобиля, для которых предназначен продукт.
    compatible_tear_off_system:
      description: Поддержка очками tear-off и (или) roll-off систем, включая наличие
        крепежных штифтов для tear-off.
    compatible_thermostat_type:
      name: Совместимый тип термостата
      description: Совместимость корпуса/водяного патрубка с термостатом и его тип/размер.
    compatible_thread:
      name: Совместимая нить
      description: Типы нитей/пряжи, с которыми предназначено работать устройство
        для заправки (по толщине/типу).
    compatible_thread_spool_format:
      name: Совместимый формат нитей/катушек
      description: Форматы нитей, для хранения которых предназначена коробка (катушки,
        шпули, бобины/карточки для мулине, конусы и т. д.).
    compatible_thread_yarn_tool:
      name: Совместимый инструмент для нитей и пряжи
      description: Совместимость с машинами/системами для инструментов, устанавливаемых
        на другое оборудование или используемых с ним (например, швейная машина, оверлок,
        ткацкий станок, прялка).
    compatible_tire_application:
      name: Совместимое применение шин
      description: Сегмент применения шин/колес, для которого предназначен бортолом
        (исходя из обслуживаемых шин/колес, а не модели транспортного средства).
    compatible_tom_pad_mounting:
      name: Совместимое крепление том-пэда
      description: Тип крепления электронного тома (например, зажим/штанга, L-образная
        штанга, стойка), влияющий на совместимость с существующими рэковыми системами.
    compatible_toy_vehicle_scale:
      description: Масштаб игрушечного транспортного средства или примерный размер
        транспорта, с которым совместим игровой набор.
    compatible_tpms_sensor_type:
      name: Совместимый тип датчика TPMS
      description: Поддержка колесом датчиков TPMS и/или требуемый тип клапана/датчика.
    compatible_training_equipment:
      description: Типы тренировочного или фитнес-оборудования, которое можно установить
        на крепление.
    compatible_treadmill_design:
      name: Совместимая конструкция беговой дорожки
      description: Конструкция беговой дорожки, с которой совместим аксессуар, например
        складные или нескладные модели.
    compatible_tube:
      description: Конструкция камеры или шины, для которой предназначена заплатка,
        например бутиловая, латексная, TPU или бескамерная.
    compatible_valve_type:
      description: Тип латунного клапана, с которым совместима смазка.
    compatible_vaporizing_material:
      name: Совместимый материал для испарения
      description: Типы материалов, для испарения которых предназначено устройство.
    compatible_vehicle_windshield_fluid:
      name: Совместимая жидкость стеклоомывателя транспортного средства
      description: Заявленная совместимость с оборудованием транспортного средства
        или обработкой стекол (например, безопасность для водоотталкивающих покрытий,
        безопасность для омывателей фар).
    compatible_visor_system:
      description: Типы систем визоров/вставок, с которыми совместим мотоциклетный
        шлем.
    compatible_water_board_type:
      description: Типы досок для водных видов спорта, для перевозки которых предназначено
        крепление.
    compatible_water_sport_board_type:
      name: Совместимый тип доски для водных видов спорта
      description: Типы досок, для перевозки которых предназначено крепление.
    compatible_watercraft_communication_standard:
      name: Совместимый стандарт связи водного транспорта
      description: Поддерживаемые морские стандарты связи/сетевые стандарты или протоколы
        интеграции для совместимости с бортовой электроникой.
    compatible_watercraft_engine_type:
      name: Совместимый тип двигателя водного транспорта
      description: Конфигурация силовой установки, для которой подходит деталь (подвесной,
        стационарный, угловой привод, водомет).
    compatible_weight_plate_diameter:
      name: Совместимый диаметр дисков
      description: Диаметры дисков, с которыми совместимо оборудование.
    compatible_wheel_finish:
      name: Совместимая отделка колеса
      description: Отделка/материалы колес, для которых очиститель безопасен (по заявлению
        производителя).
    compatible_whorl_drive_band_type:
      name: Совместимый тип приводного ремня шкива
      description: Тип приводного ремня, для которого предназначен шкив.
    compatible_wick_series:
      name: Совместимая серия фитилей
      description: Распространенные серии/типы фитилей, для которых предназначен держатель
        (по отраслевой классификации, если указано продавцом).
    compatible_winder_head_bit:
      name: Совместимая головка/бита намотчика
      description: Тип интерфейса ключа/головки колка, поддерживаемый намотчиком (например,
        шлицевая головка, сменные биты, универсальная головка).
    compatible_windlass_rode:
      name: Совместимый якорный трос/цепь лебедки
      description: Тип якорного троса/цепи, для которого предназначена лебедка.
    compatible_windshield_type:
      name: Совместимый тип ветрового стекла
      description: Конфигурация ветрового стекла, с которой предназначен использоваться
        кожух.
    compatible_wood:
      description: Типы древесины накладки грифа, для которых полироль рекомендована/безопасна.
    compatible_writing_surface:
      description: Поверхности/типы бумаги, для которых предназначены чернила.
    compatible_zipper_size:
      description: 'Размер молнии, для которого предназначен пуллер (часто #3, #5,
        #8, #10), улучшающий фильтрацию совместимости.'
    compliance_certification:
      description: Стандарты соответствия/сертификации световой балки для дорожного
        использования и электромагнитной совместимости.
    component_position:
      name: Положение компонента
      description: Относительное положение детали в узле газораспределительного механизма
        (например, передняя/задняя крышка, верхняя/нижняя часть). Не положение спереди/сзади
        транспортного средства.
    concentration_level:
      name: Уровень концентрации
      description: Степень концентрации томатной пасты (одинарная, двойная, тройная),
        полезная для соответствия требованиям рецептов.
    concentration_type:
      description: Готовность продукта к использованию или концентрированная форма,
        а также типичные рекомендации по разведению для концентрата.
    concert_bass_drum_mounting_stand_type:
      name: Тип стойки для крепления концертного бас-барабана
      description: Способ установки или поддержки концертного бас-барабана во время
        исполнения.
    concert_pitch_standard:
      name: Стандарт концертного строя
      description: Опорная частота концертного строя (A4), на которую настроено пианино
        на момент продажи (например, A440, A442, A444).
    condiment_form:
      name: Форма приправы
      description: Физическая форма или консистенция продукта из хрена (например,
        паста, порошок, крем).
    condiment_texture:
      name: Текстура приправы
      description: Консистенция релиша или чатни (например, с кусочками, однородная).
    confetti_format:
      name: Формат конфетти
      description: Формат конфетти в зависимости от способа упаковки или запуска (например,
        россыпью или в хлопушках/пушках).
    conga_head_tensioning_system:
      name: Система натяжения мембраны конги
      description: Тип механизма, используемого для натяжения/настройки мембраны конги
        (например, традиционная настройка лагами или современные механизмы быстрой
        настройки).
    conga_set_included_drum_types:
      name: Типы барабанов в комплекте конг
      description: Типы конг, входящие в комплект (например, quinto + conga + tumba).
    connector_case_style:
      name: Тип корпуса разъема
      description: Тип конструкции корпуса разъема (например, жесткий корпус или мягкий
        чехол), отражающий уровень защиты и портативность.
    console_cover_installation_method:
      name: Способ установки чехла консоли
      description: Способ крепления чехла к консоли/подлокотнику (например, надеваемый,
        эластичные ремни, липучка, клейкое крепление, клипса).
    console_display_type:
      name: Тип дисплея консоли
      description: Тип пользовательского дисплея устройства (например, LCD, LED, сенсорный
        экран).
    construction_design:
      name: Конструкция
      description: Количество подвижных секций в конструкции накладки, влияющее на
        подвижность (например, цельная или из 3 частей).
    contact_angle:
      name: Контактный угол
      description: Контактный угол дорожек подшипника, выраженный одним значением
        или парой углов (например, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Тип наполнения шара для контактного жонглирования
      description: Цельная или заполненная конструкция шара (и тип наполнителя при
        наличии), влияющая на распределение веса и долговечность.
    contact_juggling_ball_transparency:
      name: Прозрачность шара для контактного жонглирования
      description: Прозрачность/оптический вид шара.
    contact_surface_material:
      description: Материал контактных точек, соприкасающихся с инструментом (например,
        пробка/резина), предотвращающий появление царапин и улучшающий сцепление.
    container_material:
      name: Материал контейнера
      description: Основной материал потребительской упаковки продукта (например,
        стекло, ПЭТ-пластик, алюминий).
    contaminant_removal:
      name: Удаление загрязняющих веществ
      description: Типы загрязняющих веществ, удаление или снижение которых сертифицировано
        для продукта.
    contra_alto_clarinet_body_configuration:
      name: Конфигурация корпуса контра-альтового кларнета
      description: Конструктивная форма контра-альтового кларнета (например, прямая
        или изогнутая конструкция).
    contra_alto_clarinet_lowest_note_extension:
      name: Расширение нижнего диапазона контра-альтового кларнета
      description: Самая низкая воспроизводимая нота инструмента (самая низкая нота,
        допускаемая механизмом), обычно используемая для различения моделей с низким
        E♭, D или C.
    contra_bass_clarinet_bell_type:
      name: Тип раструба контрабас-кларнета
      description: Конфигурация раструба контрабас-кларнета.
    contra_bass_clarinet_bore_type:
      description: Конструкция канала инструмента.
    contra_bass_clarinet_lowest_written_note:
      description: Самая низкая записанная нота, которую может воспроизводить инструмент
        (часто зависит от расширения до низкого C или низкого E♭).
    control_arm_bushing_material:
      name: Материал втулок рычага подвески
      description: Материал входящих в комплект/установленных втулок, при их наличии.
    control_arm_bushings_included:
      name: Втулки рычага подвески в комплекте
      description: Наличие установленных втулок в комплекте с рычагом подвески.
    control_arm_finish:
      name: Отделка рычага подвески
      description: Защитная отделка рычага подвески (защита от коррозии и внешний
        вид).
    control_arm_grease_fitting_type:
      name: Тип пресс-масленки рычага подвески
      description: Наличие пресс-масленки (zerk) в узле рычага подвески/шарового шарнира
        и возможность обслуживания.
    control_arm_material:
      name: Материал рычага подвески
      description: Основной материал и технология изготовления корпуса рычага подвески.
    control_arm_position:
      name: Положение рычага подвески
      description: Положение рычага подвески в подвеске относительно стороны/угла
        оси (например, верхний/нижний, передний/задний, левый/правый).
    control_arm_style:
      name: Тип рычага подвески
      description: Геометрический/конструктивный тип рычага подвески, используемый
        в конструкции подвески.
    control_cable_connector_type:
      name: Тип разъема троса управления
      description: Тип наконечника/разъема троса управления для подключения к системе
        управления и двигателю (например, фирменные OEM-наконечники).
    control_voltage_or_gate_connectivity:
      name: Управляющее напряжение или подключение затвора
    controller_function:
      description: Основная функция платы управления беговой дорожки, например управление
        двигателем, питание или инверторный привод.
    controller_type:
      description: Контроллер двигателя/система управления, входящая в комплект переоборудования
        электросамоката (или требуемая для использования), с акцентом на характеристики,
        важные для совместимости и производительности.
    conversion_kit_cooling_method:
      name: Способ охлаждения комплекта переоборудования
      description: Основной способ теплоотвода в системе интеграции двигателя/инвертора/аккумулятора.
    conversion_kit_installation_complexity:
      name: Сложность установки комплекта переоборудования
      description: Ожидаемый уровень сложности установки с учетом типичных навыков
        пользователя и необходимых инструментов.
    converted_bed_size:
      name: Размер кровати после трансформации
      description: Размер или конфигурация кровати, в которую трансформируется детская
        кроватка после установки комплекта.
    convertible_configuration:
      name: Конфигурация трансформации
      description: Количество различных конфигураций кровати, в которые трансформируется
        изделие (например, кроватка 3-в-1 → детская кровать → кушетка).
    convertible_high_chair_modes:
      description: Конфигурации сиденья, в которые трансформируется кресло.
    cookie_decorating_kit_items_included:
      name: Комплектация набора для украшения печенья
      description: Отдельные компоненты для украшения, входящие в комплект, чтобы
        покупатели знали точный состав набора (например, тюбики с глазурью, посыпка,
        формочки для печенья).
    cookie_variety:
      name: Вид печенья
      description: Конкретный тип или разновидность печенья, помогающие покупателям
        быстрее найти нужный вариант.
    cooking_state:
      name: Степень готовности
      description: Степень готовности куриного продукта на момент продажи (сырой,
        полностью приготовленный, маринованный и т. д.).
    coolant_additive_purpose:
      name: Назначение присадки к охлаждающей жидкости
      description: Основная функция присадки к охлаждающей жидкости (не промывка радиатора
        и не специализированный герметик).
    coolant_base_fluid:
      name: Базовая жидкость охлаждающей жидкости
      description: Основная гликолевая основа, используемая в составе антифриза/охлаждающей
        жидкости.
    coolant_outlet_connection_style:
      name: Тип соединения выходного патрубка охлаждающей жидкости
      description: Тип интерфейса выходного соединения для подключения радиаторного
        шланга или линии охлаждающей жидкости.
    coolant_outlet_neck_angle:
      name: Угол выходного патрубка охлаждающей жидкости
      description: Угол/ориентация выходного патрубка относительно монтажного фланца/двигателя
        (полезно для прокладки верхнего радиаторного шланга).
    coolant_technology:
      name: Технология охлаждающей жидкости
      description: Тип химической технологии охлаждающей жидкости/антифриза (как обычно
        указывается на упаковке).
    coolant_temperature_sensor_port:
      description: Наличие порта для датчика или переключателя температуры охлаждающей
        жидкости и тип используемого интерфейса.
    coolant_temperature_sensor_seal_type:
      description: Тип уплотнения между датчиком и каналом двигателя/охлаждающей жидкости.
    cooling_system_component_included:
      name: Компоненты системы охлаждения в комплекте
      description: Дополнительные компоненты системы охлаждения, входящие в комплект
        с водяным насосом.
    cooling_system_flush_application_step:
      name: Этап применения промывки системы охлаждения
      description: Этап сервисного процесса, на котором используется продукт (например,
        очиститель перед промывкой или финальная промывка/нейтрализатор).
    cooling_system_type:
      description: Конфигурация системы охлаждения стационарного судового двигателя
        (например, забортная вода/открытый контур, закрытый контур/пресная вода с
        теплообменником, килевое охлаждение).
    cord_material:
      description: Материал шнура/нити, используемых для протягивания ершика через
        саксофон.
    core_type_bass_strings:
      name: Тип сердечника (басовые струны)
      description: Форма сердечника струны, влияющая на ощущения при игре и гибкость.
    cork_grease_base_material:
      name: Базовый материал смазки для пробки
      description: Основа состава смазки для пробки (например, на основе ланолина).
    cork_grease_form:
      name: Форма смазки для пробки
      description: Физическая форма продукта смазки для пробки.
    corn_presentation:
      name: Форма кукурузы
      description: Физическая форма кукурузного продукта (например, целиком в початке,
        зерна, порошок).
    corn_syrup_variety:
      name: Вид кукурузного сиропа
      description: Конкретный тип или вариант обработки сиропа.
    corn_variety:
      description: Конкретный ботанический или рыночный сорт кукурузы, позволяющий
        различать виды по вкусу, текстуре, цвету и кулинарному применению.
    corner_compatibility:
      description: Форма углов стола (квадратная или круглая), для которой предназначено
        покрытие.
    corner_flag_features:
      name: Особенности углового флажка
      description: Особые функциональные характеристики или улучшения углового флажка
        (например, складная стойка, светоотражающий материал).
    cornet_mouthpiece_shank_type:
      name: Тип хвостовика мундштука корнета
      description: Стандарт приемника/хвостовика мундштука, поддерживаемый корнетом
        для совместимости.
    cornhole_league_certification:
      name: Сертификация лиги корнхола
      description: Официальные сертификаты или одобрения лиг, которым соответствует
        продукт.
    corrosion_resistance:
      description: Тип или уровень антикоррозионной обработки крепления/держателя
        для использования на открытом воздухе.
    corrosion_resistance_level:
      description: Защита от коррозии, подходящая для пресной или соленой воды.
    costume_components_included:
      name: Комплектация костюма
      description: Перечень элементов одежды и аксессуаров, входящих в костюм, уточняющий
        состав комплекта.
    cotton_weave_type:
      name: Тип переплетения хлопка
      description: Описание типа переплетения или вязки хлопковой поверхности для
        печати, влияющего на текстуру и четкость изображения.
    counter_type:
      description: Наличие и тип встроенного повторения или отслеживания усилия.
    counterweight_fill_material:
      name: Материал заполнения противовеса
      description: Материал для утяжеления или предварительного заполнения противовеса.
    counterweight_type:
      name: Тип противовеса
      description: Тип конструкции противовеса, например мешок с песком или стальная
        пластина, для совместимости и установки.
    coupler_system:
      name: Система сцепки
      description: Тип системы сцепки локомотива для совместимости с подвижным составом.
    court_surface_suitability:
      name: Совместимость с типом покрытия корта
      description: Тип покрытия баскетбольного корта, для которого предназначена подошва
        обуви (зал, улица или универсально), влияющий на сцепление и износостойкость.
    cover_fit_style:
      description: Описание посадки покрытия на стол, влияющее на внешний вид и уровень
        защиты.
    cover_fit_type:
      name: Тип посадки покрытия
      description: Указывает, является ли покрытие индивидуальным (кастомным/полукастомным)
        или универсальным, а также предназначено ли оно для стоянки в воде или хранения/перевозки.
    cowbell_beater_type:
      name: Тип палочки для коровьего колокола
      description: Рекомендуемый тип ударного инструмента для извлечения звука коровьего
        колокола (если указан в товаре).
    cowbell_mounting_method:
      description: Способ крепления/использования коровьего колокольчика (ручной или
        закрепленный на шее).Способ крепления или использования коровьего колокола
        (в руках или на стойке).
    cowbell_sound_character:
      description: Общий тональный характер, используемый в описаниях для поиска.
    cradle_capacity:
      name: Вместимость люльки
      description: Указывает, рассчитана ли люлька на одного ребенка или на двойню.
    craft_cutter_embosser_machine_operation:
      name: Тип работы режущего или тиснильного станка для творчества
      description: Способ работы режущего или тиснильного устройства (ручной, электрический,
        управление через приложение).
    craft_decoration_maker_accessories_included:
      name: Аксессуары в комплекте устройства для создания украшений
      description: Перечень основных аксессуаров, входящих в комплект устройства для
        создания украшений.
    craft_foil_application_method:
      name: Способ нанесения крафт-фольги
      description: Способ нанесения или активации крафт-фольги (клей, нагрев, реакция
        на тонер и т. д.).
    craft_foil_format:
      name: Формат крафт-фольги
      description: Физический формат продажи крафт-фольги (рулон или листы).
    craft_glue_finish:
      name: Финиш клея для творчества
      description: Внешний вид клея после высыхания (прозрачный, белый, матовый, глянцевый
        и т. д.).
    craft_magnet_application:
      name: Применение магнита для рукоделия
      description: Основное назначение или поверхность применения магнита для рукоделия.
    craft_magnet_holding_strength_level:
      name: Уровень удерживающей силы магнита для рукоделия
      description: Относительная категория силы магнитов для рукоделия. Помогает покупателям
        выбрать подходящую удерживающую мощность для их проекта.
    craft_organizer_storage_features:
      name: Функции хранения органайзера для рукоделия
      description: Функции организации и внутренние элементы хранения органайзеров
        для рукоделия (например, регулируемые перегородки, ящики, прозрачные карманы).
    craft_scoring_board_included_accessories:
      name: Аксессуары в комплекте с биговальной доской для рукоделия
      description: Аксессуары в комплекте с биговальной доской (например, стилус для
        биговки/биговальная кость, угольник, инструмент для конвертов).
    craft_scoring_board_measurement_system:
      name: Система измерений биговальной доски для рукоделия
      description: Система измерений, нанесенная на биговальную доску (имперская,
        метрическая, двойная или без разметки).
    craft_wire_finish_coating:
      name: Отделка поверхности/покрытие проволоки для рукоделия
      description: Отделка поверхности или покрытие, нанесенное на проволоку. Обеспечивает
        цвет, защиту от потемнения или дополнительную защиту.
    craft_wood_surface_preparation:
      name: Подготовка поверхности деревянной заготовки для рукоделия
      description: Готовность поверхности деревянной заготовки к нанесению покрытия/окраске
        или необходимость предварительной подготовки (например, шлифовки/грунтовки).
    crank_spindle_interface:
      name: Интерфейс шпинделя шатуна
      description: Система шпинделя шатуна, поддерживаемая кареткой (например, SRAM
        DUB, Square Taper). Обеспечивает совместимость между системой шатуна и кареткой.
    crankshaft_balance_type:
      name: Тип балансировки коленчатого вала
      description: 'Тип балансировки коленчатого вала: внутренняя (нейтральная) или
        внешняя (требует гасителя крутильных колебаний/грузов маховика).'
    crankshaft_bolt_pattern:
      name: Схема болтового соединения коленчатого вала
      description: Схема болтового соединения на заднем фланце для крепления маховика/гибкого
        диска.
    crankshaft_sensor_reluctor_type:
      name: Тип задающего диска датчика положения коленчатого вала
      description: Конфигурация задающего диска/колеса датчика положения коленчатого
        вала (где применимо).
    craps_accessories_included:
      description: Дополнительные аксессуары для игры в крэпс, помимо игральных костей/фишек/сукна.
    crash_cymbal_profile:
      name: Профиль крэш-тарелки
      description: Общая кривизна/профиль тарелки (степень выраженности изгиба). Влияет
        на высоту звука и отклик.
    crash_cymbal_sound_character:
      description: Основные характеристики тонального характера звука крэш-тарелки.
    crash_pad_size_class:
      name: Категория размера страховочного мата
      description: Общая категория размера страховочного мата для скалолазания. Помогает
        покупателям быстро оценить площадь покрытия без необходимости знать точные
        размеры.
    crate_engine_assembly_level:
      name: Уровень сборки контрактного двигателя
      description: Степень комплектности контрактного двигателя при поставке (какие
        основные компоненты включены).
    cream_base_ingredient:
      name: Основной ингредиент сливок
      description: Основной источник сливок, включая виды молочных животных и растительные
        альтернативы.
    cream_cheese_base:
      name: Основа сливочного сыра
      description: Основной молочный или растительный источник для производства сливочного
        сыра. Помогает покупателям с учетом диетических предпочтений, аллергенов и
        вкусовых особенностей.
    cream_cheese_form:
      description: Физическая форма или вид текстуры сливочного сыра (например, блок,
        взбитый, для дипа). Влияет на намазываемость и предполагаемое использование.
    cream_variety:
      name: Разновидность сливок
      description: Конкретный вид сливок по содержанию жира, способу обработки или
