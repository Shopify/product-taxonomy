    drag_system_material:
      name: Материал фрикционной системы
      description: Материал или технология, используемая во фрикционном пакете. Влияет
        на термостойкость и плавность работы.
    drag_system_type:
      name: Тип фрикционной системы
      description: Тип фрикционного механизма, используемого в катушке, например передний,
        задний, рычажный, звездочный, магнитный или дисковый.
    drag_type:
      name: Тип фрикциона
      description: Тип фрикционного механизма, используемого в катушке (по расположению
        или способу управления).
    drawer_features:
      name: Особенности ящика
      description: Особые элементы конструкции или функции ящика (например, плавное
        закрывание, фетровая отделка).
    drawer_slide_type:
      name: Тип направляющих ящика
      description: Тип крепления и выдвижения направляющих ящика (например, нижнее
        крепление, полное выдвижение).
    drawing_ink_compatible_tools:
      name: Инструменты, совместимые с чертежными чернилами
      description: Инструменты нанесения, для которых предназначены чернила (например,
        перьевая ручка или кисть).
    drawing_ink_permanence:
      name: Стойкость чертежных чернил
      description: Свойства стойкости, важные для готовых работ и репродукций.
    dress_embellishment:
      name: Декоративные элементы платья
      description: Декоративные элементы в дизайне платья.
    dress_train_type:
      name: Тип шлейфа платья
      description: Наличие и длина или стиль шлейфа платья. Помогает оценить формальность
        и уместность для площадки.
    dried_surface_finish:
      name: Финиш сухой поверхности
      description: Типичный вид поверхности после высыхания (блеск или текстура).
    drink_tube_insulation:
      name: Изоляция питьевой трубки
      description: Наличие у питьевой трубки изоляции или термочехла, чтобы предотвратить
        нагрев или замерзание жидкости.
    drive_band_cross_section_shape:
      name: Форма поперечного сечения приводного ремня
      description: Форма профиля приводного ремня (круглый, плоский и т. д.).
    drive_band_join_type:
      name: Тип соединения приводного ремня
      description: Как соединен или изготовлен приводной ремень (бесконечный, связывается
        и т. д.).
    drive_band_material_type:
      name: Тип материала приводного ремня
      description: Материал или тип приводного ремня, используемого на прялках.
    drive_location:
      name: Расположение привода
      description: Где расположен маховик или приводной механизм на эллиптическом
        тренажере. Влияет на занимаемую площадь и характер движения.
    drive_mechanism:
      name: Механизм привода
      description: Тип привода, передающего усилие от педалей к маховику.
    drive_shaft_material:
      name: Материал приводного вала
      description: Основной конструкционный материал трубы приводного вала или узла
        в сборе.
    drive_system:
      name: Система привода
      description: Механизм, передающий усилие педалей на систему сопротивления.
    drivetrain_configuration:
      name: Конфигурация трансмиссии
      description: Конфигурация трансмиссии велосипеда (фиксированная задняя втулка,
        система с одной передачей со свободным ходом или flip-flop).
    drivetrain_speed_compatibility:
      name: Совместимость по количеству скоростей трансмиссии
      description: Количества скоростей кассеты, с которыми разработана совместимость
        звезды. Обеспечивает правильный профиль зубьев и шаг.
    drone_positioning_system:
      name: Система позиционирования дрона
      description: Бортовая технология позиционирования и удержания, поддерживаемая
        дроном для навигации и стабильного зависания.
    drone_transmission_type:
      name: Тип передачи сигнала дрона
      description: Основной способ передачи управляющего сигнала и/или видеосвязи
        между дроном и пультом или устройством.
    drop_spindle_whorl_position:
      name: Положение шкива на веретене
      description: Расположение шкива на валу.
    drum_carder_accessories_included:
      name: Аксессуары в комплекте кардочесальной машины
      description: Обычно входящие в комплект элементы набора для кардочесания.
    drum_clamp_locking_mechanism:
      name: Механизм фиксации барабанного зажима
      description: Как зажим фиксируется или затягивается на трубе или ободе (например,
        барашковый болт, болт под барабанный ключ, быстросъем).
    drum_clamp_mount_interface:
      name: Интерфейс крепления барабанного зажима
      description: Что именно зажим предоставляет для крепления аксессуаров (например,
        приемник L-образного стержня, шаровой шарнир, держатель тарелки).
    drum_clamp_type:
      name: Тип барабанного зажима
      description: Функциональный тип зажима, используемый в крепежной фурнитуре ударной
        установки (например, зажим на обод или зажим для рэка/трубы).
    drum_head_application_batter_resonant:
      name: Назначение барабанной кожи (ударная/резонансная)
      description: Для какой стороны или роли предназначена кожа барабана (верхняя
        игровая поверхность или нижняя резонансная/подструнная сторона).
    drum_head_collar_type:
      name: Тип буртика барабанной кожи
      description: Имеет ли кожа стандартный буртик, низкий буртик или специальный
        профиль буртика для соответствия определенным опорным кромкам или корпусам.
    drum_head_damping_control:
      name: Контроль демпфирования барабанной кожи
      description: Встроенные средства контроля обертонов или тип демпфирования, предусмотренные
        конструкцией кожи.
    drum_head_film_material:
      name: Материал пленки барабанной кожи
      description: Основной материал пленки барабанной кожи (обычно PET/Mylar, но
        может включать и специальные материалы).
    drum_head_hoop_collar_type:
      name: Тип обода/кольца барабанной мембраны
      description: Конструкция обода и буртика барабанной кожи (например, профиль
        буртика и материал обода). Может влиять на посадку и стабильность настройки
        на определенных корпусах и ободах.
    drum_head_hoop_rim_material:
      name: Материал обода барабанной кожи
      description: Материал внутреннего обода или кольца (встроенного обруча внутри
        кожи). Влияет на долговечность и стабильность настройки.
    drum_head_included:
      name: Барабанные кожи в комплекте
      description: Входит ли в комплект барабана ударная и/или резонансная кожа.
    drum_head_muffling_feature:
      name: Функция глушения мембраны барабана
      description: Встроенные средства контроля обертонов, интегрированные в барабанную
        кожу.
    drum_head_muffling_type:
      name: Тип приглушения барабанной кожи
      description: Барабанная кожа включает встроенные элементы контроля обертонов
        или приглушения.
    drum_head_ply_count:
      name: Количество слоев барабанной кожи
      description: Количество пленочных слоев, используемых в конструкции барабанной
        кожи (например, 1 слой, 2 слоя).
    drum_head_position:
      name: Положение барабанной кожи
      description: Предназначена ли барабанная кожа как ударная (верхняя/игровая),
        резонансная (нижняя), подструнная (нижняя) или может использоваться в любом
        положении.
    drum_head_reinforcement_type:
      name: Тип усиления барабанной кожи
      description: Включает ли подструнная кожа усиливающие элементы, такие как центральная
        точка или контрольное кольцо, для повышения долговечности и концентрации тона.
    drum_head_surface_finish:
      name: Отделка поверхности мембраны барабана
      description: Текстура или отделка поверхности кожи. Влияет на атаку и отклик
        на щетки.
    drum_head_type:
      name: Тип барабанной кожи
      description: Конструкция или тип кожи, используемой на барабане (в первую очередь
        для поставляемых ударных и резонансных кож).
    drum_key_design_type:
      name: Тип конструкции барабанного ключа
      description: Функциональная конструкция ключа для настройки барабана (например,
        стандартный, с трещоткой, Т-образная рукоятка).
    drum_key_drive_type:
      name: Тип привода барабанного ключа
      description: Тип привода или интерфейса барабанного ключа, используемого для
        взаимодействия с натяжным болтом или крепежной фурнитурой.
    drum_key_handle_style:
      name: Стиль рукоятки барабанного ключа
      description: Форма рукоятки и эргономика барабанного ключа. Влияет на удобство
        и усилие при настройке.
    drum_kit_included_items:
      name: Предметы, входящие в комплект ударной установки
      description: Основные предметы, входящие в комплект ударной установки помимо
        корпусов или пэдов (например, фурнитура, тарелки, стул).
    drum_kit_portability:
      name: Портативность ударной установки
      description: Предназначен ли комплект для компактного хранения и транспортировки
        (например, дорожный, компактный, складной).
    drum_kit_shell_construction_features:
      name: Особенности конструкции корпусов ударной установки
      description: Как сконструированы корпуса (количество и тип слоев). Влияет на
        звук и долговечность.
    drum_mount_clamp_type:
      name: Тип крепления барабана
      description: Формфактор зажима, используемого в крепежной фурнитуре для барабанов.
    drum_multi_clamp_clamp_type:
      name: Тип зажима многозажимного держателя
      description: Функциональный тип и конфигурация многозажимного держателя (как
        он зажимает и что соединяет).
    drum_mute_material:
      name: Материал заглушки для барабана
      description: Основной материал заглушки для барабана, контактирующей с барабанной
        кожей и/или гасящей вибрацию.
    drum_pad_triggering_zones:
      name: Зоны срабатывания барабанного пэда
      description: Количество и тип зон срабатывания, поддерживаемых том-пэдом (например,
        только поверхность или поверхность + обод). Влияет на выразительность и совместимость
        с модулем.
    drum_pedal_accessories_included:
      name: Аксессуары педали барабана
      description: Основные аксессуары и компоненты, входящие в комплект барабанной
        педали.
    drum_pedal_baseplate_type:
      name: Тип опорной плиты барабанной педали
      description: Использует ли педаль опорную плиту или плавающую/безрамную конструкцию.
    drum_pedal_bearing_type:
      name: Тип подшипника барабанной педали
      description: Механизм подшипника, используемый в основных точках поворота (например,
        рокер, пятка, кулачок).
    drum_pedal_cam_type:
      name: Тип кулачка педали барабана
      description: Форма или геометрия кулачка барабанной педали. Влияет на ощущения
        и отклик (например, линейный или accelerator).
    drum_pedal_chain_configuration:
      name: Конфигурация цепи барабанной педали
      description: Конфигурация цепи, используемая цепной барабанной педалью (например,
        одинарная, двойная или смещенная цепь).
    drum_pedal_chain_type:
      name: Тип цепи педали барабана
      description: Тип цепи, используемой в приводе (например, роликовая цепь или
        цепь велосипедного типа). Влияет на плавность и долговечность.
    drum_pedal_clamp_type:
      name: Тип крепления барабанной педали
      description: Как педаль крепится к ободу бас-барабана.
    drum_pedal_intended_use:
      name: Предназначение барабанной педали
      description: Основной игровой контекст, для которого ременная педаль предназначена
        или продается.
    drum_pedal_spring_adjustment_method:
      name: Способ регулировки пружины барабанной педали
      description: Как на педали регулируется натяжение пружины.
    drum_pedal_spring_type:
      name: Тип пружины педали барабана
      description: Пружинный механизм, используемый для возврата педали.
    drum_shell_material:
      name: Материал корпуса барабана
      description: Основной конструкционный материал корпуса акустических барабанов
        (например, клен, береза, акрил).
    drum_shell_wood_species:
      name: Порода древесины корпуса барабана
      description: Порода древесины, используемая для корпуса барабана. Влияет на
        тембр и резонанс.
    drumhead_type:
      name: Тип барабанной кожи
      description: Конфигурация или тип кожи, используемой на октабане.
    drumstick_model:
      name: Модель барабанных палочек
      description: Стандартизированное обозначение модели или размера барабанных палочек,
        используемое многими брендами (например, 5A, 7A).
    drumstick_taper:
      name: Конусность барабанной палочки
      description: Профиль сужения от стержня к наконечнику. Влияет на отскок и баланс.
    drysuit_footwear_style:
      name: Тип обуви сухого гидрокостюма
      description: Интегрированное оформление нижней части сухого гидрокостюма (например,
        встроенные ботинки, неопреновые носки, носочная конструкция или голеностопные
        манжеты).
    dumbbell_style:
      name: Тип гантели
      description: Базовая конструкция гантели — фиксированная, регулируемая система
        или рукоять с возможностью набора веса. Сильно влияет на выбор покупки и сценарии
        тренировок.
    dundun_playing_position:
      name: Положение при игре на дундуне
      description: Предполагаемое положение при игре или переноске барабана.
    dye_status:
      name: Статус окрашивания
      description: Окрашен ли наполнитель, является ли он неокрашенным/натуральным
        или включает несколько цветов/смесей.
    dye_style:
      name: Стиль окрашивания
      description: Цвет нити однотонный, меланжевый или окрашен особым способом.
    dye_technique:
      name: Техника окрашивания
      description: Способ окрашивания волокна (например, ручное, в котле, секционное).
    dye_type_needlecraft_fabric:
      name: Тип окрашивания (ткань для рукоделия)
      description: Льняная ткань однотонная, окрашенная вручную или окрашенная специальным
        способом.
    dyeing_color_processing:
      name: Окрашивание/цветовая обработка
      description: Окрашена ли нить и как именно (например, неокрашенная, отбеленная/белая
        или с использованием конкретных техник окрашивания).
    e_bike_certification_class:
      name: Класс сертификации электровелосипеда
      description: Официальный скоростной рейтинг шины для электровелосипедов (например,
        E-25, E-50).
    e_bike_speed_rating:
      name: Скоростной рейтинг электровелосипеда
      description: Официальный уровень сертификации электровелосипеда для шины (например,
        E25 для ≤25 км/ч, E50 для ≤50 км/ч).
    e_scooter_connector_type:
      name: Тип разъема электросамоката
      description: Тип электрического разъема или штекера, используемого компонентом
        для подключения питания или сигнала.
    e_scooter_throttle_type:
      name: Тип дросселя электросамоката
      description: Тип дросселя для управления разгоном на электросамокате.
    ear_coverage:
      name: Защита ушей
      description: Наличие защиты ушей в шлеме и съемная ли она.
    ear_coverage_style:
      name: Стиль покрытия ушей
      description: Защита ушей маской от мух или ее отсутствие.
    ear_coverage_type:
      name: Тип защиты ушей
      description: Покрытие или защита ушей шапкой, включая наличие и вид ушных клапанов.
    ear_guard_type:
      name: Тип защиты ушей
      description: Стиль защиты ушей, встроенной в кепку, например из жесткого пластика,
        с мягкой подкладкой или съемной.
    earmuff_style:
      name: Стиль наушников
      description: Способ ношения наушников или стиль их конструктивного исполнения
        (например, через голову или с охватом сзади головы).
    earring_closure_type:
      name: Тип застежки серьги
      description: Механизм крепления серьги к уху (например, пусет, английская застежка,
        клипса).
    easel_art_desk_features:
      name: Функции мольберта и художественного стола
      description: Общие функциональные особенности, входящие в комплект мольберта
        или художественного стола.
    easel_art_desk_surface_type:
      name: Тип поверхности мольберта и художественного стола
      description: Доступные для использования поверхности для рисования или письма
        (например, классная доска, белая доска, рулон бумаги, магнитная доска).
    eb_clarinet_body_type:
      name: Тип корпуса кларнета Eb (ми-бемоль)
      description: 'Вариант кларнета Eb: сопрано или альт.'
    eco_material_type:
      name: Тип экоматериала
      description: Экологичная пена или технология материала, используемая в подушке.
    edge_construction:
      name: Конструкция канта
      description: Наличие металлической кромки у лыжи по всей длине, по части длины
        или отсутствие кромки.
    edge_tuner_type:
      name: Тип станка для заточки кромки
      description: Стиль станка для заточки кромки лыж или сноуборда, например направляющая
        для напильника или электрический станок.
    edible_plant_part:
      name: Съедобная часть растения
      description: Часть растения, продаваемая для употребления в пищу.
    educational_guide_included:
      name: Учебное руководство в комплекте
      description: Учебные материалы, входящие в комплект модели.
    educational_topic:
      name: Учебная тема
      description: Основная учебная тема, поддерживаемая образовательным контентом
        муравьиной фермы.
    egg_component:
      name: Компонент яйца
      description: Часть яйца, содержащаяся в продукте, например целое яйцо, только
        белки, желтки или смеси и заменители.
    egg_component_replaced:
      name: Заменяемый компонент яйца
      description: Часть яйца, которую продукт предназначен заменять (например, целое
        яйцо, яичный белок).
    egg_enrichment:
      name: Обогащение яйца
      description: Обогащающие ингредиенты, добавленные к яйцам, например омега-3
        или витамин D.
    egg_farming_method:
      name: Способ содержания кур-несушек
      description: Способ производства или содержания, использованный для яиц (например,
        без клеток, свободный выгул, органические).
    egg_grade:
      name: Категория качества яиц
      description: Категория качества, присвоенная регулирующими органами или отраслевыми
        организациями.
    egg_processing_state:
      name: Состояние обработки яиц
      description: Любая обработка, примененная к яйцам перед продажей (например,
        свежие, соленые, столетние яйца).
    egg_production_method:
      name: Способ производства яиц
      description: Фермерская или содержательная система, используемая для производства
        яиц (например, вне клеток, пастбищное содержание, органические).
    egg_replacer_main_ingredient:
      name: Основной ингредиент заменителя яйца
      description: Основной базовый ингредиент, из которого изготовлен заменитель
        яйца, помогающий с диетическими потребностями или нужными свойствами для выпечки.
    egg_size:
      name: Размер яиц
      description: Стандартное рыночное обозначение размера яиц.
    egg_source_animal:
      name: Животное-источник яиц
      description: Вид животного, которое произвело яйца.
    egg_white_processing_method:
      name: Способ обработки яичного белка
      description: Способ обработки яичных белков после сбора (например, пастеризация,
        распылительная сушка), влияющий на безопасность пищевых продуктов, срок хранения
        и варианты применения.
    eggplant_variety:
      name: Сорт баклажана
      description: Сорт или рыночная разновидность баклажана, позволяющая выбирать
        их по размеру, вкусу, цвету и кулинарному применению.
    eggshell_color:
      name: Цвет скорлупы
      description: Преобладающий цвет скорлупы яиц.
    elastic_edge_finish_type:
      name: Отделка края эластичной ленты
      description: Конструкция края тканой эластичной ленты, влияющая на комфорт и
        применение.
    elastic_intended_use:
      name: Предназначение эластичной ленты
      description: Основное применение, для которого предназначена эластичная лента.
        Помогает поиску и снижает вероятность несоответствий.
    elastic_recovery_performance:
      name: Восстановление эластичной ленты после растяжения
      description: Насколько хорошо тканая эластичная лента возвращается к исходной
        длине после растяжения.
    elastic_recovery_quality:
      name: Качество восстановления эластичной ленты
      description: Способность эластичной ленты восстанавливать длину после растяжения.
    elastic_stretch_level:
      name: Уровень растяжимости эластичной ленты
      description: Степень, до которой эластичная лента может растягиваться под нагрузкой,
        часто выражаемая относительными уровнями, если точный процент не указан.
    elastic_structure:
      name: Структура эластичной ленты
      description: Структурная конструкция петельной эластичной ленты (например, трикотажная,
        тканая, плетеная), влияющая на растяжимость, восстановление и швейные свойства.
    elastic_type:
      name: Тип резинки
      description: Тип конструкции эластичной ленты (например, окантовочная резинка,
        плетеная, трикотажная, тканая).
    electric_assist_type:
      name: Тип электроподдержки
      description: Наличие моторной поддержки у велосипеда и вид этой поддержки.
    electric_bicycle_motor_position:
      name: Положение мотора электровелосипеда
      description: Расположение приводного мотора на электровелосипеде, например в
        кареточном узле, передней втулке, задней втулке или двойной втулке.
    electric_bike_class:
      name: Класс электровелосипеда
      description: Категория электровелосипеда по регулирующим классам, определяющим
        ограничения скорости и поддержку дросселя.
    electric_guitar_bridge_type:
      name: Тип бриджа электрогитары
      description: Тип бриджа или вибрато-системы на электрогитаре.
    electric_instrument_output_connection_type:
      name: Тип выходного разъема электрического инструмента
      description: Физические аудиовыходные соединения, предусмотренные на электрической
        виолончели.
    electric_riding_vehicle_control_options:
      name: Варианты управления электрическим транспортным средством
      description: Варианты управления и эксплуатации, доступные водителю или родителю
        (например, педаль, рулевое колесо, дистанционное управление).
    electric_spinning_wheel_speed_control_type:
      name: Тип управления скоростью электрического прялочного колеса
      description: Способ регулировки скорости вращения на электрическом колесе.
    electric_ukulele_output_jack_type:
      name: Тип выходного джека электрической укулеле
      description: Физический выходной разъем, используемый электрической укулеле.
    electric_van_body_length_class:
      name: Класс длины кузова электрического фургона
      description: Распространенный класс размеров фургона по колесной базе и длине,
        используемый в карточках товаров.
    electric_van_roof_height_class:
      name: Класс высоты крыши электрофургона
      description: Распространенная классификация высоты крыши, используемая для фургонов,
        особенно грузовых.
    electric_vehicle_drivetrain_layout:
      name: Компоновка трансмиссии электромобиля
      description: Компоновка моторов и осей, описывающая, сколько моторов установлено
        и где они расположены, помимо простых схем AWD/FWD/RWD.
    electric_winder_accessories_included:
      name: Аксессуары в комплекте с электрической моталки
      description: Аксессуары, входящие в комплект электрической моталки (например,
        зажимы, адаптеры).
    electrical_connector_type:
      name: Тип электрического разъема
      description: Тип разъема, используемого системой дверного замка или запирания
        для электрической интеграции, если применимо.
    electrical_system_voltage:
      name: Напряжение электрической системы
      description: Номинальное напряжение электрической системы транспортного средства,
        на которое рассчитан регулятор.
    electronic_cymbal_trigger_zones:
      name: Зоны срабатывания электронного тарелочного пэда
      description: Число независимых зон срабатывания, которые обеспечивает тарелочный
        пэд (например, поверхность, край, купол).
    electronic_drum_module_audio_interface_functionality:
      name: Функция аудиоинтерфейса электронного барабанного модуля
      description: Возможность работы модуля как USB-аудиоинтерфейса для записи и
        воспроизведения, помимо MIDI.
    electronic_drum_module_metronome_features:
      name: Функции метронома электронного барабанного модуля
      description: Встроенные функции для практики и работы с метрономом.
    electronic_drum_module_power_source:
      name: Источник питания электронного барабанного модуля
      description: Необходимый или поддерживаемый источник питания для модуля управления.
    electronic_drum_module_sample_import_support:
      name: Поддержка импорта семплов электронным барабанным модулем
      description: Возможность импорта пользовательских семплов и способ импорта.
    electronic_drum_pad_playing_surface_type:
      name: Тип игровой поверхности электронного барабанного пэда
      description: Конструкция игровой поверхности том-пэда (например, сетчатая мембрана
        или резина), влияющая на отскок, шум и ощущения.
    electronic_features:
      name: Электронные функции
      description: Электронные или интерактивные функции игрового банка, если они
        есть.
    electronic_lights_and_sound:
      name: Электронный свет и звук
      description: Электронный свет и (или) звуковые функции в наборе кукольного домика
        (например, свет, звонок, музыка, звуковые эффекты).
    electronics_power_source:
      name: Источник питания электроники
      description: Способ питания активной электроники, если применимо.
    eligible_race_series:
      name: Допустимая гоночная серия
      description: Гоночная серия или санкционирующий орган, в которой автомобиль
        допускается к участию.
    elliptical_trainer_part_type:
      name: Тип детали эллиптического тренажера
      description: Конкретный вид аксессуара или запасной части для эллиптического
        тренажера (например, ремень, консоль, педаль). Позволяет быстро отфильтровать
        нужный товар без перехода по множеству микрокатегорий.
    embellishment_technique:
      name: Техника декора
      description: Основная декоративная или поверхностная обработка изделия, например
        вышивка, принт или бисероплетение.
    embellishment_type:
      name: Тип декора
      description: Тип декоративного элемента, примененного к подвязке, например кружево,
        банты или жемчуг.
    embossing_pen_ink_color:
      name: Цвет чернил тиснильной ручки
      description: Цвет чернил, наносимых тиснильной ручкой (они могут быть прозрачными/клейкими
        или пигментированными). Отличается от цвета ручки или корпуса.
    embossing_stylus_tip_shape:
      name: Форма наконечника тиснильного стилуса
      description: Геометрия тиснильного наконечника, используемого для создания различных
        эффектов (например, шарообразный или заостренный).
    embroidered_coverage_level:
      name: Степень вышитого покрытия
      description: Примерное количество покрытия лицевой стороны нашивки вышитыми
        нитями.
    embroidered_patch_backing_type:
      name: Тип подложки вышитой нашивки
      description: Подложка или опорный слой на обратной стороне вышитой нашивки.
        Влияет на долговечность и способ применения.
    embroidery_hoop_type:
      name: Тип пялец для вышивания
      description: Стиль конструкции пялец для вышивания и их основной механизм натяжения.
    embroidery_machine_bobbin_type:
      name: Тип шпульки для вышивальной машины
      description: Тип или способ загрузки шпульной системы.
    emergency_lighting_configuration:
      name: Конфигурация аварийного освещения
      description: Основная установленная конфигурация аварийного предупредительного
        освещения на транспортном средстве (например, верхняя световая балка, огни
        в решетке).
    emergency_lighting_package:
      name: Комплект аварийного освещения
      description: Типы установленных аварийных предупредительных огней.
    emissions_compliance_standard:
      name: Стандарт соответствия выбросам
      description: Сертификация или соответствие требованиям по выбросам для двигателя,
        если применимо.
    emissions_standard:
      name: Стандарт выбросов
      description: Стандарт соответствия выбросам для транспортного средства. Варьируется
        по региону и году.
    enclosure_panel_configuration:
      name: Конфигурация панелей ограждения
      description: Какие панели или стороны ограждения входят в комплект (конфигурация
        покрытия), например полное ограждение, только боковые шторы или трехстороннее
        исполнение (открытая передняя или задняя часть).
    enclosure_window_material:
      name: Материал окон ограждения
      description: Материал прозрачных оконных панелей ограждения.
    end_fitting_type:
      name: Тип концевого фитинга
      description: Тип соединителя на каждом конце стойки (со стороны автомобиля и
        со стороны крышки). Определяет совместимость крепления.
    end_type:
      name: Тип концевика
      description: Тип концевика или крепления на концах буксировочного ремня для
        соединения с точками буксировки.
    ends_style_blocking_wires:
      name: Стиль концов (блокировочные провода)
      description: Обработка концов блокировочной проволоки для безопасности и удобства
        продевания через края кружева.
    enduro_bike_suspension_adjustability:
      name: Регулировки подвески эндуро-мотоцикла
      description: Какие регулировки подвески доступны (обычно для передней вилки
        и заднего амортизатора).
    engine_bay_mounting_location:
      name: Место крепления в моторном отсеке
      description: Место в моторном отсеке, для установки в которое предназначен расширительный
        бачок (относительная позиция)
    engine_bearing_coating:
      name: Покрытие подшипника двигателя
      description: Покрытие поверхности подшипника для обеспечения износостойкости,
        врабатываемости или снижения трения.
    engine_bearing_position:
      name: Положение подшипника двигателя
      description: Расположение или функция подшипника внутри двигателя.
    engine_bearing_size:
      name: Размер подшипника двигателя
      description: Стандартный размер подшипника или вариант с уменьшенным либо увеличенным
        размером, обычно связанный со шлифовкой коленвала и зазорами.
    engine_configuration:
      name: Конфигурация двигателя
      description: Компоновка или конфигурация цилиндров двигателя (например, рядный,
        V-образный, оппозитный).
    engine_cooling_type:
      name: Тип охлаждения двигателя
      description: Способ охлаждения двигателя.
    engine_degreaser_form:
      name: Форма очистителя двигателя
      description: Физический формат или форма выпуска очистителя двигателя.
    engine_degreaser_rinse_requirement:
      name: Необходимость смывания очистителя двигателя
      description: Нужно ли смывать очиститель водой после нанесения.
    engine_mount_type:
      name: Тип опоры двигателя
      description: Функциональная конструкция опоры двигателя (например, гидравлическая,
        цельная, реактивная тяга).
    engine_oil_formulation:
      name: Тип состава моторного масла
      description: Назначение состава моторного масла, например для обычного использования,
        для автомобилей с большим пробегом, с увеличенным интервалом замены или для
        автопарков и тяжелых условий эксплуатации.
    engine_oil_specification:
      name: Спецификация моторного масла
      description: Спецификация или стандарт, которому соответствует масло (например,
        API SP, API SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Содержимое комплекта для капитального ремонта двигателя
      description: Основные компоненты в комплекте для капитального ремонта двигателя.
    engine_rotation_direction:
      name: Направление вращения двигателя
      description: Направление вращения двигателя для применения в судах.
    engine_timing_system_drive_type:
      name: Тип привода системы ГРМ
      description: Ременной, цепной или шестеренчатый привод системы ГРМ для подбора
        совместимости.
    engine_valve_coating:
      name: Покрытие клапана двигателя
      description: Обработка поверхности или покрытие, нанесенное на клапан для износо-
        или теплостойкости.
    engine_valve_position:
      name: Положение клапана двигателя
      description: 'Сторона двигателя, для которой предназначен клапан: впускная или
        выпускная.'
    engine_valve_stem_tip_type:
      name: Тип наконечника стержня клапана двигателя
      description: Стиль или конструкция наконечника стержня клапана в точке контакта
        с коромыслом или регулировочным элементом.
    engine_valvetrain_type:
      name: Тип газораспределительного механизма
      description: Схема газораспределительного механизма или расположения распределительного
        вала.
    enhancement_level:
      name: Уровень увеличения
      description: 'Примерное увеличение объема, обеспечиваемое вставкой, выраженное
        в размерах чашки: незаметное (до 1 чашки), умеренное (1–2 чашки), значительное
        (2 и более чашек).'
    entry_zipper_location:
      name: Расположение входной молнии
      description: Где расположена основная входная молния или отверстие костюма (например,
        спереди, сзади, на плече, по диагонали).
    epee_point_type:
      name: Тип наконечника шпаги
      description: Тип или стандарт наконечника, установленного на клинке, что влияет
        на совместимость и обслуживание.
    equestrian_discipline:
      name: Конный вид спорта
      description: Дисциплина верховой езды, для которой предназначена или наиболее
        подходит шпора.
    equestrian_helmet_safety_certification:
      name: Сертификация безопасности конного шлема
      description: Стандарты безопасности или сертификации, которым соответствует
        шлем.
    equine_application_area:
      name: Область применения для лошадей
      description: Часть тела или материал, для которых предназначен продукт (например,
        копыто, грива, упряжь).
    equipment_contact_material_brew_wine:
      name: Материал, контактирующий с продуктом (пиво/вино)
      description: Основной материал изделия, контактирующего с жидкостью (например,
        стекло, нержавеющая сталь, пластик).
    eu_children_clothing_size:
      name: Европейский размер детской одежды
      description: Европейский размер детской одежды по росту, например 104 или 140
    eu_clothing_size:
      name: Европейский размер одежды
      description: Размер одежды EU, например 38 или 46
    eu_cup_size:
      name: Европейский размер чашки
      description: Европейский размер чашки бюстгальтера, например C или E
    eu_ring_size:
      name: Европейский размер кольца
      description: Европейский размер кольца по окружности, например 52 или 63
    eu_shoe_size:
      name: Европейский размер обуви
      description: Европейский размер обуви, например 42 или 42 Wide
    euphonium_included_accessories:
      name: Аксессуары в комплекте с эвфониумом
      description: Предметы, обычно входящие в комплект с эвфониумом (например, мундштук,
        футляр).
    euphonium_valve_configuration:
      name: Конфигурация клапанов эвфониума
      description: 'Количество клапанов и способ управления 4-м клапаном: рукой или
        боковым механизмом.'
    european_sword_historical_period:
      name: Исторический период европейского меча
      description: Основной исторический период, на котором основан рисунок или реплика
        меча, либо эпоха оригинала.
    european_sword_pattern_type:
      name: Паттерн или тип европейского меча
      description: Конкретный европейский паттерн или тип меча, к которому относится
        коллекционный меч.
    ev_connector_adapter_direction:
      name: Направление разъема/адаптера для электромобиля
      description: 'Назначение адаптера: преобразование входа со стороны транспортного
        средства или со стороны зарядного устройства или кабеля. Обеспечивает точную
        фильтрацию совместимости.'
    ev_conversion_kit_completeness_level:
      name: Уровень комплектности набора для переоборудования в электромобиль
      description: 'Комплектность набора для переоборудования в электромобиль: полный
        или частичный (например, только мотор и контроллер).'
    ev_conversion_kit_drivetrain_configuration:
      name: Конфигурация трансмиссии набора для переоборудования в электромобиль
      description: Архитектура трансмиссии набора для переоборудования в электромобиль,
        включая расположение мотора и схему привода, а также сохранение существующей
        трансмиссии.
    ev_conversion_kit_voltage_class:
      name: Класс напряжения набора для переоборудования в электромобиль
      description: Номинальный класс системного напряжения, под который разработан
        набор для переоборудования в электромобиль. Используется для фильтрации по
        распространенным классам системного напряжения, помимо точного значения напряжения.
    evaporator_core_type:
      name: Тип испарителя
      description: Конструкция автомобильного испарителя кондиционера.
    evenweave_fabric_finish_treatment:
      name: Отделка или обработка ткани с равномерным переплетением
      description: Любая предварительная отделка или обработка ткани, влияющая на
        обработку или внешний вид.
    evenweave_fabric_package_format:
      name: Формат продажи ткани с равномерным переплетением
      description: Как продается ткань (отрезом или непрерывно ярдами или метрами).
    exercise_bike_accessory_part_type:
      name: Тип аксессуара или детали велотренажера
      description: Основная функция или тип компонента изделия (например, педаль,
        приводной ремень, держатель бутылки, крышка экрана, шатун).
    exercise_bike_cushion_component:
      name: Компонент сиденья велотренажера
      description: Компонент, связанный с сиденьем, например накладка на сиденье,
        седло или чехол сиденья.
    exercise_bike_metrics_tracked:
      name: Показатели, отслеживаемые велотренажером
      description: Данные тренировки, которые компьютер может измерять и отображать
        в реальном времени.
    exercise_mat_accessories_included:
      name: Аксессуары в комплекте с ковриком для упражнений
      description: Дополнительные компоненты, поставляемые с ковриком, например ремни
        или наколенники.
    exhaust_cooling_type:
      name: Тип охлаждения выхлопа
      description: 'Предназначение компонента выхлопа: для мокрой (водяное охлаждение
        или водяной впрыск) или сухой выхлопной системы.'
    exhaust_installation_position:
      name: Место установки выхлопа
      description: Место установки детали на транспортном средстве.
    exhaust_outlet_configuration:
      name: Конфигурация выхлопного выхода
      description: Схема выхода выхлопа в задней части транспортного средства.
    expansion_tank_cap_connection_type:
      name: Тип соединения крышки расширительного бачка
      description: Механический способ соединения, используемый для крепления и герметизации
        крышки на горловине расширительного бачка.
    expansion_tank_cap_pressure_relief_feature:
      name: Функция сброса давления крышки расширительного бачка
      description: Наличие и способ функции сброса давления или вакуума крышкой.
    expansion_tank_cap_seal_material:
      name: Материал уплотнения крышки расширительного бачка
      description: Материал прокладки или уплотнения, контактирующего с горловиной
        расширительного бачка.
    extension_attachment_method:
      name: Способ крепления удлинителя
      description: Способ крепления удлинителя к кокпиту или рулю велосипеда. Помогает
        подтвердить совместимость с существующей конфигурацией.
    extension_bend_type:
      name: Тип изгиба удлинителя
      description: Геометрический стиль или изгиб рулевого удлинителя. Влияет на эргономику
        и аэродинамику ездока.
    extension_mechanism:
      name: Механизм удлинения
      description: Способ увеличения длины или площади поверхности столы, если применимо.
    extension_table_features:
      name: Функции удлинительного стола
      description: Функциональные особенности удлинительных столов швейной машины.
    eyelet_grommet_installation_method:
      name: Способ установки люверса и втулки
      description: Способ установки или закрепления люверса или втулки в материале.
    eyewear_lens_shape:
      name: Форма линзы очков
      description: Геометрическая форма линзы, например цилиндрическая или сферическая.
        Влияет на поле зрения, искажения и внешний вид.
    eyewear_strap_material:
      name: Материал ремешка очков
      description: Материал регулируемого ремешка, который закрепляет очки или защитные
        очки на голове пользователя.
    fabric_backing_type:
      name: Тип подложки ткани
      description: Наличие и тип стабилизирующей бумажной подложки у хлопка для печати.
        Определяет возможность подачи через стандартные принтеры.
    fabric_cut_format:
      name: Формат раскроя ткани
      description: Формат/раскрой отреза канвы для рукоделия.
    fabric_end_use:
      name: Конечное назначение ткани
      description: Отделка поверхности ткани
    fabric_finish:
      name: Отделка ткани
      description: Отделка поверхности/обработка, нанесенная на шелковую ткань. Влияет
        на блеск, тактильные свойства и эксплуатационные характеристики.
    fabric_intended_use:
      name: Назначение ткани
      description: Основные рекомендуемые варианты применения/проекты для льняной
        ткани.
    fabric_opacity_level:
      name: Уровень прозрачности ткани
      description: Степень прозрачности ткани. Влияет на необходимость многослойности
        и подкладки.
    fabric_patch_shape:
      name: Форма тканевых заплаток
      description: Форма заплаток, входящих в комплект.
    fabric_repair_kit_application_method:
      name: Способ применения набора для ремонта ткани
      description: Способ нанесения ремонта на ткань (например, термоклеевой, пришивной,
        клеевой).
    fabric_repair_kit_components_included:
      name: Компоненты набора для ремонта ткани в комплекте
      description: Перечень компонентов, входящих в комплект (например, заплатки,
        нитки, игла, клей).
    fabric_repair_kit_intended_use:
      name: Назначение набора для ремонта ткани
      description: Основная задача ремонта, для которой предназначен комплект (например,
        разрывы, отверстия, подгибка).
    fabric_selling_format:
      name: Формат продажи ткани
      description: Формат продажи ткани (непрерывный отрез, предварительно нарезанный
        отрез, рулон/болт или образец).
    fabric_stretch_level:
      name: Уровень растяжимости ткани
      description: Степень растяжимости/эластичности ткани. Помогает подобрать подходящую
        ткань для облегающей одежды или структурных проектов.
    fabric_stretch_type:
      name: Тип растяжимости ткани
      description: Характеристики растяжимости ткани бордшорт. Влияют на свободу движений
        при серфинге или плавании.
    fabric_texture:
      name: Текстура ткани
      description: Текстура поверхности или структура вязки ткани, используемой в
        домашнем верхе.
    fabric_use_case:
      name: Вариант применения ткани
      description: Основное назначение сатинового отреза/рулона ткани.
    fabric_weight_class:
      name: Класс плотности ткани
      description: Категория плотности фланели по типовым диапазонам применения. Помогает
        подбирать товары без указания точного значения GSM/унций.
    face_mask_material:
      name: Материал маски
      description: Материал лицевой маски, входящей в комплект с шлемом или совместимой
        с ним.
    face_mask_style:
      name: Стиль маски
      description: Общая форма или конструкция модной лицевой маски. Помогает подобрать
        предпочтительную посадку и внешний вид.
    face_mask_style_code:
      name: Код стиля лицевой маски
      description: Тип конструкции перекладин или семейство отраслевых кодов лицевой
        маски (например, ROPO, OPO, RJOP).
    face_protection_type:
      name: Тип защиты лица
      description: Тип защиты лица, входящей в комплект шлема или встроенной в него,
        например решетка или визор.
    faceplate_security_features:
      name: Защитные функции лицевой панели
      description: Функции защиты от кражи и доступа, связанные с лицевой панелью,
        помимо базовой конструкции.
    facing_length:
      name: Длина фейсинга
      description: Длина фейсинга (длина кривой) мундштука. Влияет на отклик и выбор
        трости.
    fan_shroud_type:
      name: Тип кожуха вентилятора
      description: Конструкция/геометрия кожуха вентилятора (например, полный, половинный
        или кольцевой).
    farming_method:
      name: Метод выращивания
      description: Практики содержания и благополучия животных, используемые при выращивании,
        например свободный выгул или органическое выращивание.
    farming_practice:
      name: Практика выращивания
      description: Основной метод выращивания продукта (например, традиционный, органический,
        гидропонный).
    fascinator_style:
      name: Стиль фасцинатора
      description: Конструкция или форма фасцинатора. Помогает быстро подбирать популярные
        стили шляпных украшений.
    fastener_grade:
      name: Класс крепежа
      description: Класс прочности болта, например класс 8 или 10.9. Определяет допустимую
        нагрузку.
    fat_rendering_state:
      name: Состояние вытопки жира
      description: 'Состояние жира: вытопленный, невытопленный (сырой) или частично
        вытопленный. Влияет на срок хранения и кулинарное применение.'
    fat_source:
      name: Источник жира
      description: Основной источник жира, используемого для производства масла, гхи
        или маргарина (животный или растительный). Поддерживает фильтрацию по аллергенам
        и диетическим предпочтениям.
    faucet_hole_configuration:
      name: Конфигурация отверстий под смеситель
      description: Количество и расположение предварительно просверленных отверстий
        под смеситель на столешнице туалетного столика.
    feather_application:
      name: Назначение перьев
      description: Основное назначение или вариант применения индюшиных перьев для
        рукоделия или изготовления изделий.
    feather_attachment_format:
      name: Крепление/формат перьев
      description: Формат подготовки/продажи синтетических перьев для использования
        (россыпью, на нити, на ленте и т. д.).
    feather_coloration_style:
      name: Стиль окраски перьев
      description: Способ нанесения/проявления цвета на перьях (например, сплошной,
        окрашенные кончики, градиент), независимо от основного значения цвета.
    feather_component:
      name: Компонент пера
      description: Часть/тип павлиньего пера, представленная в продаже (например,
        глазковое перо или бородка пера).
    feather_curvature:
      name: Изгиб пера
      description: Общая форма/профиль изгиба пера.
    feather_finish:
      name: Отделка поверхности пера
      description: 'Состояние страусиных перьев: натуральные или обработанные (например,
        окрашенные или отбеленные) для декоративного использования.'
    feather_form:
      name: Форма пера
      description: Физическая форма продаваемых частей гусиного пера.
    feather_grade:
      name: Класс пера
      description: Общий класс качества/отбора пера для рукоделия или декоративного
        использования.
    feather_part:
      name: Часть пера
      description: Часть/структура индюшиного пера, представленная в продаже (распространено
        в товарах для рукоделия и вязания мушек).
    feather_processing_type:
      name: Тип обработки пера
      description: Способ обработки перьев для рукоделия (например, окрашенные, отбеленные,
        натуральные/неокрашенные).
    feather_product_form:
      name: Физическая форма/вид изделия из перьев при продаже (например, отдельные
        перья, боа или бахрома).
      description: Физическая форма/крой перьевого изделия в том виде, в котором оно
        продается (например, отдельные перья, перья для боа или перья с бахромой).
    feather_quantity_unit:
      name: Единица количества перьев
      description: Формат продажи товара (например, поштучно, по весу, пучками). Поддерживает
        корректное сравнение товаров.
    feather_source:
      name: Источник перьев
      description: Животный источник перьев, используемых в воланах.
    feather_stiffness:
      name: Жесткость пера
      description: Относительная жесткость/упругость бородок и структуры пера.
    feed_mechanism:
      name: Механизм подачи
      description: Способ подачи мячей в питчинг-машину.
    feed_purpose:
      name: Назначение корма
      description: Основная питательная или функциональная задача корма или добавки.
    feeder_mechanism_type:
      name: Тип механизма подачи
      description: Механизм дозирования, используемый кормушкой для подачи корма.
    feijoa_cultivar:
      name: Сорт фейхоа
      description: Конкретный сорт или разновидность фейхоа. Разные сорта отличаются
        вкусом, размером и сроками сбора урожая.
    felt_duty:
      name: Категория фетра
      description: Категория фетра теннисного мяча (например, extra duty, regular
        duty). Влияет на срок службы на разных покрытиях.
    felting_mold_intended_use:
      name: Назначение формы для валяния
      description: Назначение формы в проектах по валянию.
    felting_pad_surface_material:
      name: Материал поверхности коврика для валяния
      description: Материал рабочей поверхности коврика/мата для валяния, контактирующей
        с волокном/иглой.
    fencing_certification:
      name: Сертификация для фехтования
      description: Перечень официальных одобрений руководящих организаций, которым
        соответствует фехтовальное оружие (например, FIE, USFA). Указывает на соответствие
        требованиям соревнований и стандартам качества.
    fencing_connector_type:
      name: Тип фехтовального разъема
      description: Конфигурация разъема для подключения фехтовальных проводов, гнезд
        или катушек (например, 2-pin, 3-pin, байонетный). Обеспечивает совместимость
        компонентов.
    fencing_discipline:
      name: Дисциплина фехтования
      description: Вид оружия или дисциплина фехтования, для которых предназначен
        или с которыми совместим товар.
    fencing_weapon_type:
      name: Тип фехтовального оружия
      description: Тип фехтовального или тренировочного оружия, с которым совместимо
        или которое имитирует тренировочное приспособление. Помогает подобрать подходящее
        снаряжение.
    fender_finish_state:
      name: Состояние отделки поверхности крыла
      description: Состояние поверхности/отделки крыла при поставке. Указывает на
        готовность к окраске и установке.
    fender_pieces_included:
      name: Состав крыльев
      description: Перечень компонентов, входящих в комплект поставки. Указывает,
        является ли товар отдельным крылом или полным комплектом с аксессуарами.
    fender_type:
      name: Тип крыла
      description: Общая конструкция или стиль крыла.
    fennel_trimming:
      name: Обрезка фенхеля
      description: Части растения, входящие в комплект с луковицей фенхеля (например,
        с листьями, с обрезанными верхушкой и корнем).
    fennel_variety:
      name: Сорт фенхеля
      description: Сорт или рыночная разновидность продаваемых луковиц фенхеля.
    fermentation_application:
      name: Назначение ферментации
      description: Основной продукт питания или напиток, для ферментации которого
        предназначена культура (например, сыр, йогурт, молочный кефир, закваска).
    fermentation_method:
      name: Метод ферментации
      description: Способ производства или ферментации соевого соуса (например, натуральное
        брожение, химический гидролиз).
    fermentation_vessel_material:
      name: Материал для бродильной емкости
      description: Основной материал емкости для ферментации, входящей в комплект
        (при наличии).
    ferrule_material:
      name: Материал ферула
      description: Материал ферула шафта (например, Juma, Phenolic, Polycarbonate,
        XTC или отсутствие ферула). Влияет на долговечность и ощущения при ударе.
    fia_homologation_certification:
      name: Омологация/сертификация FIA
      description: Наличие сертификации/омологации автомобиля (или каркаса безопасности)
        и соответствующий стандарт.
    fiber_animal_source_type:
      name: Тип животного/источника волокна
      description: Животное или основной источник ровницы (или синтетическое происхождение),
        например шерсть мериноса, альпака или растительные волокна.
    fiber_luster_level:
      name: Уровень блеска волокна
      description: Визуальный блеск волокна — от матового до сильно блестящего.
    fiber_preparation_processing_stage:
      name: Этап подготовки/обработки волокна
      description: Способ подготовки/обработки ленты для использования (например,
        кардочесанная или гребенная, смешанная, superwash).
    fiber_preparation_type:
      name: Тип подготовки волокна
      description: Способ подготовки волокна для рукоделия (например, кардочесанный
        пласт, барабанное кардочесание, лист префельта).
    field_hockey_ball_playing_surface:
      name: Игровое покрытие для мяча хоккея на траве
      description: Игровое покрытие или условия, для которых предназначен мяч.
    field_hockey_ball_type:
      name: Тип мяча для хоккея на траве
      description: Категория мяча для хоккея на траве по назначению или особой характеристике.
    field_hockey_goal_size_standard:
      name: Стандарт размера ворот для хоккея на траве
      description: Категория ворот по распространенным стандартам хоккея на траве
        или тренировочным размерам (например, FIH outdoor regulation, youth, mini).
    field_hockey_training_objective:
      name: Цель тренировки по хоккею на траве
      description: Основной навык или направление тренировки, для улучшения которого
        предназначено тренировочное приспособление.
    field_point_attachment_method:
      name: Способ крепления полевого наконечника к древку стрелы или вставке (например,
        Screw-in, Glue-in).
      description: Указывает способ крепления наконечника к древку стрелы или вставке
        (например, с помощью винта, клея).
    field_point_tip_style:
      name: Стиль наконечника полевого наконечника
      description: Геометрическая форма или функциональный профиль наконечника полевого
        наконечника. Влияет на проникающую способность, усилие извлечения и соответствие
        правилам.
    fielding_glove_position:
      name: Позиция полевой перчатки
      description: Игровая позиция или вариант применения перчатки в бейсболе или
        софтболе.
    fielding_training_focus:
      name: Направление полевой тренировки
      description: Основной навык, на развитие которого направлено тренировочное приспособление.
    fig_variety:
      name: Сорт фиг
      description: Конкретный сорт фиг.
    figure_8_device_design:
      name: Конструкция устройства Figure 8
      description: Конкретная конфигурация устройства Figure 8. Влияет на характеристики
        использования и назначение.
    figure_finish_type:
      name: Тип отделки поверхности фигурки
      description: Отделка поверхности/покрытие фигурки модели лошади. Влияет на внешний
        вид и тактильные свойства коллекционного изделия.
    figurine_scale:
      name: Масштаб фигурки
      description: Масштаб/соотношение фигурки относительно реального объекта (при
        наличии), например 1:6.
    fill_status:
      name: Статус наполнения
      description: 'Состояние манекена для борьбы при продаже: наполненный, ненаполненный
        или частично наполненный. Определяет стоимость доставки и объем подготовки
        для покупателя.'
    filling_consistency:
      name: Консистенция начинки
      description: Текстура или вязкость начинки при поставке (например, гладкий крем,
        кусочки фруктов, паста).
    filling_type:
      name: Тип начинки
      description: Основная начинка или крем внутри печенья, при наличии.
    filtration_and_mother_status:
      name: Статус фильтрации и наличия маточной культуры
      description: 'Состояние уксуса: фильтрованный, нефильтрованный, сырой или содержащий
        «маточную культуру». Подходит для потребителей, предпочитающих пробиотические
        или сырые продукты.'
    filtration_method:
      name: Метод фильтрации
      description: Материал или технология фильтрации и очистки водки после дистилляции.
    fin_box_system:
      name: Система финбокса
      description: Тип финбокса или монтажного интерфейса доски. Определяет совместимость
        со сменными плавниками.
    fin_buoyancy:
      name: Плавучесть плавника
      description: 'Плавучесть плавника в воде: положительная, нейтральная или отрицательная.
        Влияет на баланс снаряжения и положение дайвера.'
    fin_flex_rating:
      name: Рейтинг гибкости плавника
      description: Относительная жесткость или уровень гибкости плавника. Влияет на
        общие эксплуатационные характеристики.
    fin_mounting_system:
      name: Система крепления плавника
      description: Интерфейс или стандарт крепления плавника к кайтборду (например,
        FCS II, screw-on, 4-hole). Обеспечивает совместимость плавников и досок.
    fin_position:
      name: Положение плавника
      description: Предусмотренное положение установки плавника на доске.
    fin_strap_type:
      name: Тип ремня плавника
      description: Тип ремешка или системы фиксации для крепления плавника к пятке/стопе.
    fin_template:
      name: Шаблон плавника
      description: Категория гидродинамической формы или контура плавника для серфборда.
        Влияет на стиль поворотов, скорость и общее ощущение доски.
    finger_count:
      name: Количество пальцев
      description: Количество пальцев, для которых предназначены перчатка, накладка
        или рукоятка релиза.
    finger_coverage:
      name: Покрытие пальцев
      description: Степень покрытия пальцев.
    finger_grip_adjustability:
      name: Регулировка захвата для пальцев
      description: Способ крепления или регулировки захвата для пальцев под разные
        размеры руки.
    finger_hole_configuration:
      name: Конфигурация отверстий под пальцы
      description: Ориентация отверстий для пальцев по руке (для правшей, левшей или
        универсальная).
    finger_hole_count:
      name: Количество отверстий для пальцев
      description: Количество отверстий для пальцев в кожаной накладке. Является ключевым
        отличием между моделями без пальцев, с 2, 3 и 4 отверстиями.
    finger_pick_band_style:
      name: Стиль кольца медиатора для пальца
      description: Конструкция кольца/петли для крепления к пальцу. Влияет на комфорт
        и регулировку.
    finger_pick_blade_length:
      name: Длина лепестка пальцевого медиатора
      description: Длина лепестка медиатора, выступающего от кольца.
    finger_pick_blade_shape:
      name: Форма медиатора для пальцев
      description: Форма/профиль игровой поверхности (лепестка), контактирующей со
        струнами.
    finger_pick_size:
      name: Размер пальцевого медиатора
      description: Размер кольца/петли пальцевого медиатора для разных окружностей
        пальца или большого пальца (не размер инструмента).
    finger_pick_wear_location:
      name: Расположение пальцевого медиатора
      description: Палец, для которого предназначен пальцевый медиатор, или наличие
        комплекта для большого и остальных пальцев.
    finger_protection:
      name: Защита пальцев
      description: Наличие защиты спины пальцев в перчатке и возможность снятия защитных
        элементов.
    fingerboard_bearing_type:
      name: Тип подшипников фингерборда
      description: Тип подшипников, используемых в колесах фингерборда.
    fingerboard_grip_type:
      name: Тип сцепления накладки грифа
      description: Материал/тип поверхности с цепким покрытием на деке фингерборда.
    fining_agent_active_ingredient:
      name: Активный ингредиент осветляющего агента
      description: Основной осветляющий или очищающий агент, используемый в продукте.
    fining_agent_type:
      name: Тип осветляющего агента
      description: Химический состав или материал осветляющего/очищающего агента для
        продуктов, используемых для осветления красного вина.
    finish_after_baking:
      name: Внешний вид после выпекания
      description: Типичный внешний вид поверхности после отверждения/выпекания.
    finish_effect:
      name: Эффект отделки поверхности
      description: Специальные поверхностные/оптические эффекты, нанесенные на стразы.
    finish_type:
      name: Тип отделки поверхности
      description: Отделка поверхности, нанесенная на корпус укулеле.
    finished_product_format:
      name: Формат готового продукта
      description: Тип ароматического продукта, для изготовления которого предназначен
        набор.
    fire_pit_accessories_included:
      name: Аксессуары для костровой чаши
      description: Перечень примечательных аксессуаров, входящих в комплект костровой
        чаши, например искрозащитные экраны или лавовые камни. Уточняет содержимое
        комплекта.
    firework_assortment_launch_type:
      name: Тип запуска набора фейерверков
      description: Способ поджигания/запуска фейерверков, входящих в комплект.
    firework_assortment_types_included:
      name: Типы фейерверков в комплекте
      description: Основные типы фейерверков, входящих в набор, для сравнения содержимого
        комплектов (например, фонтаны, римские свечи, петарды).
    firework_effect_types:
      name: Типы эффектов фейерверков
      description: Основные категории визуальных и/или сенсорных эффектов, создаваемых
        набором (выберите все подходящие варианты).
    firework_ignition_method:
      name: Способ поджигания фейерверка
      description: Способ поджигания или активации фейерверка (например, фитиль или
        электрический воспламенитель).
    firework_visual_intensity_level:
      name: Уровень визуальной интенсивности фейерверка
      description: Общая визуальная интенсивность/объем искр для эффекта фонтана.
    firing_mode:
      name: Режим стрельбы
      description: Тип каше на конверте первого дня (например, печатное, ручная роспись).
    first_day_cover_cachet_type:
      name: Тип кашета конверта первого дня
      description: Тип штампа на конверте первого дня выпуска (например, печатный,
        расписанный вручную).
    first_day_cover_cancellation_type:
      name: Тип гашения конверта первого дня
      description: Тип/стиль почтового гашения, нанесенного на конверт первого дня
        (например, машинное гашение, ручное гашение).
    first_day_cover_set_type:
      name: Тип набора конвертов первого дня
      description: 'Тип комплекта: отдельный выпуск, полный набор или поднабор/комбинация.'
    fishing_hook_size:
      name: Размер рыболовного крючка
      description: 'Стандартизированное обозначение размера рыболовного крючка (например,
        #4, 1/0, 10/0). Помогает подобрать размеры крючка под целевую рыбу и наживку.'
    fishing_hook_style:
      name: Стиль рыболовного крючка
      description: Конкретная конструкция или форма изгиба одинарного крючка. Влияет
        на подачу приманки, эффективность подсечки и варианты применения.
    fishing_hook_type:
      name: Тип рыболовного крючка
      description: Конфигурация крючка, входящего в комплект с блесной (при наличии).
    fishing_line_application:
      name: Назначение рыболовной лески
      description: Назначение рыболовной лески или поводкового материала (например,
        поводок, основная леска, типпет).
    fishing_line_buoyancy_type:
      name: Тип плавучести рыболовной лески
      description: Поведение лески в толще воды (например, плавающая, промежуточная,
        тонущая). Помогает подобрать подходящую глубину подачи.
    fishing_needle_purpose:
      name: Назначение рыболовной иглы
      description: Основное назначение иглы при монтаже рыболовной оснастки.
    fishing_needle_types_included:
      name: Типы рыболовных игл в комплекте
      description: Перечень конкретных типов игл или инструментов для оснастки, входящих
        в комплект. Позволяет быстро ознакомиться с содержимым набора.
    fit_profile:
      name: Профиль посадки
      description: Общий крой и силуэт защиты. Влияют на подвижность и степень покрытия.
    fit_volume_classification:
      name: Классификация объема посадки
      description: Категория внутреннего объема ботинка по классификации брендов (например,
        LV для низкого объема).
    fitting_angle:
      name: Угол фитинга
      description: Угол изгиба корпуса фитинга (например, прямой, 45°, 90°). Используйте
        «Регулируемый / поворотный» для фитингов с изменяемым углом и «Другое» для
        нестандартных углов.
    flag_base_type:
      name: Тип основания флага
      description: Тип основания или крепления для фиксации углового флага на различных
        игровых покрытиях.
    flag_design_theme:
      name: Тематика дизайна флага
      description: Основная тематика дизайна флага (например, страна/национальная
        символика, спортивная команда, праздник). Поддерживает поиск и фильтрацию
        по назначению покупки.
    flag_mounting_method:
      name: Способ крепления флага
      description: Способ крепления флага к транспортному средству (например, крепление
        на антенну, фаркоп, магнитное крепление).
    flag_type:
      name: Тип флага
      description: Назначение или стиль гольф-флага, например флаг лунки, флаг для
        гольф-кара или тренировочный флаг.
    flame_resistance_standard:
      name: Стандарт огнестойкости
      description: Стандарт/сертификация огнестойкости или защиты от электрической
        дуги, которому соответствует изделие.
    flamenco_cajon_snare_system:
      name: Система струн фламенко-кахона
      description: Внутренний механизм струн, создающий характерное звучание фламенко,
        или отсутствие такого механизма.
    flammability_compliance:
      name: Соответствие требованиям воспламеняемости
      description: Стандарты воспламеняемости, которым соответствует ткань для автомобильных
        интерьеров.
    flannel_brushing_finish:
      name: Ворсовая отделка поверхности фланели
      description: Наличие ворсовой обработки фланели и стороны ее нанесения. Влияет
        на мягкость, теплоизоляцию и внешний вид.
    flannel_use_type:
      name: Тип применения фланели
      description: Основное назначение отреза/рулона фланели.
    flap_configuration:
      name: Конфигурация клапанов
      description: Тип крыла седла, например monoflap или twin flap.
    flare_color:
      name: Цвет сигнального огня
      description: Цвет излучаемого света/пламени (или цвет линзы для светодиодных
        сигнальных огней).
    flash_card_included_features:
      name: Функции карточек в комплекте
      description: Функциональные особенности обучения/использования, предусмотренные
        в карточках.
    flavor_intensity:
      name: Интенсивность вкуса
      description: Степень концентрации ароматизатора. Помогает определить подходящую
        дозировку (например, стандартная концентрация, сверхконцентрированный).
    flavor_solvent_base:
      name: Основа растворителя ароматизатора
      description: Основной носитель или растворитель, используемый в ароматизаторе
        (например, спирт, пропиленгликоль, глицерин).
    fleece_fiber_animal_type:
      name: Тип животного для флисового волокна
      description: Животный источник флисового волокна (вид).
    fleece_finish_surface:
      name: Отделка поверхности флиса
      description: Поверхность/отделка флиса (например, антипиллинговая, ворсовая).
        Влияет на образование катышков, мягкость и внешний вид.
    fleece_preparation_method:
      name: Метод подготовки флиса
      description: Способ подготовки/обработки флиса для рукоделия и прядения (состояние
        волокна).
    flesh_color:
      name: Цвет мякоти
      description: Цвет внутренней мякоти дыни.
    fletching_orientation:
      name: Ориентация оперения
      description: Способ установки оперения на древке (например, прямой, смещенный,
        спиральный). Влияет на вращение и полет стрелы.
    fletching_profile:
      name: Профиль оперения
      description: Геометрическая форма или вырез оперения. Влияют на сопротивление
        воздуха, зазор, шум и общие характеристики полета стрелы.
    flight_system_type:
      name: Тип системы оперения
      description: 'Конструкция оперения: складное, литое или интегрированная система
        оперения и шафта.'
    float_attachment_method:
      name: Способ крепления поплавка
      description: Способ крепления поплавка к леске (например, скользящий или фиксированный).
        Позволяет фильтровать товары по типу оснастки.
    float_design:
      name: Конструкция поплавка
      description: Общий стиль или тип рыболовного поплавка (например, боббер, воглер,
        карандаш). Помогает быстро подобрать модель под технику ловли и условия.
    float_raft_use_environment:
      name: Условия использования надувных плотов/плотов
      description: Основные условия использования надувного изделия (бассейн, спокойная
        открытая вода или прибой). Отражают требования к прочности и конструкции.
    floatation:
      name: Плавучесть
      description: Возможность удержания маяка на поверхности воды.
    floor_construction_type:
      name: Тип конструкции пола
      description: Конструкция пола рафта (например, самоотливной, drop-stitch). Влияет
        на дренаж, жесткость и эксплуатационные характеристики.
    floor_design:
      name: Конструкция пола
      description: Тип напольного покрытия, входящего в комплект конструкции.
    floor_inclusion:
      name: Наличие пола
      description: Наличие пола в тамбуре и возможность его снятия.
    floor_mat_cleaning_method:
      name: Способ очистки напольного коврика
      description: Основной способ очистки напольного коврика, рекомендованный производителем.
    floor_mat_edge_style:
      name: Стиль кромки напольного коврика
      description: Наличие приподнятых краев/бортика у коврика для удержания жидкости
        и мусора.
    floor_mat_format:
      name: Формат напольного коврика
      description: Физический формат или тип изделия для защиты пола (например, отдельный
        коврик, соединяемая плитка, рулон).
    floor_mat_retention_system:
      name: Система фиксации напольного коврика
      description: Способ фиксации коврика на месте.
    floor_mat_set_configuration:
      name: Конфигурация комплекта напольных ковриков
      description: Позиции, входящие в комплект (например, только передняя пара, полный
        комплект).
    floss_sugar_granulation_grade:
      name: Степень грануляции сахара для сахарной ваты
      description: Размер кристаллов сахарной смеси (мелкий, средний, крупный). Влияет
        на работу аппарата и итоговую текстуру.
    floss_sugar_product_form:
      name: Форма продукта сахара для сахарной ваты
