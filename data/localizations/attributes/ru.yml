        матовый, с аурным покрытием, окрашенный, термически обработанный).
    crystal_material:
      name: Материал стекла часов
      description: Материал защитного стекла циферблата часов.
    crystalline_finish_style:
      name: Стиль кристаллической отделки
      description: Характерный кристаллический/перистый внешний вид, создаваемый пальмовым
