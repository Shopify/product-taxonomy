      description: Способ введения препарат для дегельминтизации лошади (например,
        перорально или путем инъекции). Помогает соблюдать указания ветеринара и выбирать
        подходящий способ применения.
    advice_card_prompt_type:
      name: Тип подсказки на информационной карточке
      description: Тип подсказки, напечатанной на карточке (или отсутствие подсказки).
    aeration_method:
      name: Способ аэрации
      description: Тип аэрации, обеспечиваемый или поддерживаемый контейнером. Помогает
        обеспечить достаточное количество кислорода для живой приманки.
    aero_package_components:
      name: Компоненты аэродинамического обвеса
      description: Указывает, какие ключевые аэродинамические компоненты установлены
        на транспортном средстве (выберите все подходящие варианты).
    aerodynamic_elements_included:
      name: Аэродинамические элементы в комплекте
      description: Аэродинамические компоненты в комплекте болида (если поддерживается,
        выберите все подходящие).
    aftertouch_support:
      name: Поддержка послекасания
      description: Поддержка контроллером послекасание (канальное или полифоническое)
        на клавишах или пэдах.
    agave_content_classification:
      name: Классификация по содержанию агавы
      description: Изготовлена ли текила из 100% голубой агавы Вебер или представляет
        собой mixto, содержащий не менее 51% сахаров агавы.
    aida_cloth_count:
      name: Плотность ткани Аида
      description: Плотность ткани Аида (количество квадратов/стежков на дюйм), которая
        определяет размер стежка и масштаб рисунка.
    aida_cloth_pre_cut_format:
      name: Формат предварительно нарезанной ткани Аида
      description: Продается ли ткань Аида в виде предварительно нарезанных кусков,
        непрерывного отреза от рулона или в рулоне.
    air_bag_material:
      name: Материал воздушной подушки
      description: Материал воздушной подушки (резервуара), используемого с ирландской
        волынкой.
    air_bed_internal_construction:
      name: Внутренняя конструкция надувного матраса
      description: Внутренняя опорная конструкция или технология, используемая в надувном
        матрасе для обеспечения комфорта и стабильности.
    air_dry_clay_color_form:
      name: Цвет самозатверждающей глины
      description: Продается ли глина в готовом окрашенном виде, белого или нейтрального
        цвета для раскрашивания или в виде смеси (ассортимента).
    air_hockey_items_included:
      name: Включенные в комплект предметы для аэрохоккея
      description: Конкретные аксессуары, входящие в комплект, чтобы клиент точно
        знал, что он получит (например, 2 толкателя, 4 шайбы, 2 войлочные накладки).
    air_intake_temperature_sensor_mounting_style:
      name: Тип крепления датчика температуры воздуха на впуске
      description: Способ физического крепления датчика температуры воздуха на впуске
        в системе впуска.
    air_integration_capability:
      name: Возможность интеграции с воздушной системой
      description: Поддерживает ли дайв-компьютер беспроводные датчики давления в
        баллоне и каким образом.
    air_mattress_valve_type:
      name: Тип клапана надувного матраса
      description: Тип клапана, к которому подходит или который содержит устройство,
        для обеспечения совместимости насосов, клапанов и запасных частей.
    air_water_rocket_kit_items_included:
      name: Комплектация набора для воздушно-водной ракеты
      description: Основные компоненты, входящие в комплект ракеты (пусковая установка,
        насос, стабилизаторы, детали для заправки).
    air_water_rocket_launch_method:
      name: Способ запуска воздушно-водной ракеты
      description: Способ нагнетания давления в ракету и ее запуска (взаимодействие
        с пользователем и тип оборудования).
    airbag_position:
      name: Расположение подушки безопасности
      description: Предполагаемое положение (зона срабатывания) подушки безопасности.
    aircraft_ads_b_capability:
      name: Поддержка ADS-B самолетом
      description: Оснащен ли самолет в соответствии с требованиями ADS-B Out.
    aircraft_airframe_material:
      name: Материал планера самолета
      description: Основной материал (материалы), используемый в конструкции планера
        самолета.
    aircraft_cabin_configuration:
      name: Конфигурация салона самолета
      description: Планировка салона самолета (например, конфигурация для конференций,
        диванная группа, четырехзонный салон).
    aircraft_documentation_included:
      name: Документация на самолет  в комплекте
      description: Документы, поставляемые с деталью (например, 8130-3).
    aircraft_galley_configuration:
      name: Конфигурация бортовой кухни самолета
      description: Наличие и тип бортовой кухни и помещений для питания в салоне.
    aircraft_installation_location:
      name: Место установки в самолете
      description: Где в самолете устанавливается или используется деталь или аксессуар.
    aircraft_internet_connection:
      name: Подключение к интернету в самолете
      description: Наличие и тип подключения к интернету в салоне самолета.
    aircraft_landing_gear_type:
      name: Тип шасси самолета
      description: Конфигурация шасси автожира.
    aircraft_lavatory_configuration:
      name: Конфигурация туалета самолета
      description: Тип конфигурации бортового туалета.
    aircraft_maintenance_program_enrollment:
      name: Участие самолета в программе технического обслуживания
      description: Участвует ли воздушное судно в программе технического обслуживания
        двигателя и (или) планера и применяемый тип покрытия (двигатель, планер или
        и то и другое).
    aircraft_operational_certification:
      name: Сертификация воздушного судна на право эксплуатации
      description: Нормативное или эксплуатационное основание для сертификации, в
        соответствии с которым эксплуатируется воздушное судно (зависит от юрисдикции,
        например, FAA Part 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Сертификация средств защиты самолета
      description: Авиационный, нормативный или отраслевой стандарт, которому соответствует
        сертифицированное защитное снаряжение.
    aircraft_system_application:
      name: Применение в системах воздушного судна
      description: Система или зона воздушного судна, к которой относится деталь или
        аксессуар (используется для просмотра и фильтрации по различным деталям воздушных
        судов).
    airflow_resistance_level:
      name: Уровень сопротивления воздушному потоку
      description: Насколько сильно глушитель ограничивает поток или сопротивление
        воздуха.
    airship_envelope_material:
      name: Материал оболочки дирижабля
      description: Основной материал оболочки (обшивки) дирижабля.
    airsoft_part_type:
      name: Тип компонента для страйкбола
      description: Тип функционального компонента или аксессуара для страйкбольного
        оружия (например, магазин, ствол, цевье).
    airworthiness_approval_basis:
      name: Основание для утверждения летной годности
      description: Основание для одобрения или сертификации детали, если применимо
        (например, PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Регулировка громкости сигнала тревоги
      description: Регулируется ли громкость сигнала тревоги пользователем.
    alcohol_ink_finish_effect:
      name: Эффект отделки спиртовыми чернилами
      description: Визуальный эффект или отделка, создаваемый составом спиртовых чернил
        (помимо простого изменения цвета), например металлический или перламутровый.
    alignment_aid_style:
      name: Тип ориентировочных линий
      description: Тип ориентировочных линий, нанесенных или встроенных в поверхность
        коврика (например, прямая линия, отметки расстояния).
    alternator_cooling_type:
      name: Тип охлаждения генератора
      description: Способ охлаждения и вентиляции генератора.
    alternator_marine_ignition_protection_rating:
      name: Класс защиты генератора от возгорания в морских условиях
      description: Имеет ли генератор защиту от возгорания для моторных отсеков судов
        (например, соответствует стандарту SAE J1171 или ISO 8846).
    alternator_mounting_configuration:
      name: Конфигурация крепления генератора
      description: Физическая конфигурация крепления, используемая для установки генератора
        на кронштейн двигателя.
    alternator_pulley_type:
      name: Тип шкива генератора
      description: Конструкция шкива или муфты генератора (или отсутствие шкива).
    alternator_regulator_type:
      name: Тип регулятора генератора
      description: Является ли регулятор напряжения внутренним или внешним по отношению
        к генератору, а также управляется ли он оборудованием (компьютером или блоком
        управления двигателем).
    alternator_terminal_connection_type:
      name: Тип соединения клемм генератора
      description: Основной тип электрического соединения для выходных/возбуждающих
        клемм генератора, помогающий обеспечить совместимость жгута проводов.
    altitude_suitability:
      name: Пригодность для использования на высоте
      description: Предназначен ли мяч для определенной высоты над уровнем моря, которая
        влияет на скорость и отскок.
    ambulance_stretcher_mount_type:
      name: Тип крепления на носилках скорой помощи
      description: Тип системы загрузки или крепления носилок, поддерживаемый машиной
        скорой помощи.
    american_football_safety_certification:
      name: Сертификация безопасности для американского футбола
      description: На наличие у изделия сертификатов или его соответствия стандартам
        безопасности, специфичным для американского футбола.
    amplifier_tube_function:
      name: Функция лампы усилителя
      description: Функциональная роль лампы в схеме усилителя (например, предусилитель
        или усилитель мощности).
    analog_synthesizer_cv_gate_i_o:
      name: Входы/выходы CV/Gate аналогового синтезатора
      description: Типы разъемов управляющего напряжения и гейта, поддерживаемые для
        интеграции с модульным или аналоговым оборудованием.
    analog_synthesizer_keybed_configuration:
      name: Конфигурация клавиатуры аналогового синтезатора
      description: Имеет ли синтезатор встроенную клавиатуру и сколько на ней клавиш.
    anchor_configuration:
      name: Конфигурация крепления
      description: Использует ли подвесная система одну центральную или несколько
        независимых точек крепления. Это влияет на разнообразие упражнений и сложность
        настройки.
    animal_raising_method:
      name: Метод выращивания животных
      description: Методы ведения сельского хозяйства или животноводства, используемые
        при выращивании/содержании животного.
    animal_species:
      name: Вид животного
      description: Животное или существо, которое изображает плюшевая игрушка (например,
        медведь, кролик, динозавр).
    animal_trap_jaw_style:
      name: Тип челюстей ловушки для животных
      description: Конфигурация челюстей ловушки, влияющая на силу удержания и благополучие
        животных.
    animal_trap_type:
      name: Тип ловушки для животных
      description: Механический тип или конструкция ловушки, позволяющий покупателям
        быстро найти необходимый или разрешенный способ отлова.
    ankle_collar_style:
      name: Тип манжеты
      description: 'Стиль или конструкция манжеты обуви, например: низкая, средняя,
        высокая, в виде носка или без шнурков. Влияет на поддержку, посадку и внешний
        вид.'
    ankle_guard_protection_level:
      name: Уровень защиты голеностопа
      description: Общая степень защиты от ударов, обеспечиваемая защитой голеностопа.
    ankle_strap_padding_type:
      name: Тип набивки ремешка на щиколотке
      description: Амортизирующий материал или способ набивки ремешка. Влияет на комфорт.
    ankle_strap_type:
      name: Тип ремешка для лодыжки
      description: Конструкция или дизайн ремешка для лодыжки сноубордического крепления.
    ant_farm_habitat_medium_type:
      name: Тип среды обитания муравьиной фермы
      description: Основная среда для прокладки туннелей и наблюдения, предоставляемая
        с муравьиной фермой или необходимую для нее.
    ant_farm_kit_contents:
      name: Содержимое набора муравьиной фермы
      description: Компоненты в комплекте муравьиной фермы (например, контейнер для
        среды обитания, песок или гель, ваучер на муравьев, инструменты для кормления).
    ant_farm_lighting_type:
      name: Тип освещения муравьиной фермы
      description: Тип встроенного освещения (если таковое имеется), используемого
        для наблюдения.
    antenna_fit_type:
      name: Тип крепления антенны
      description: Форм-фактор антенны, для которого предназначен антенный шар.
    anti_caking_agent:
      name: Антислеживающий агент
      description: Тип антислеживающего агента, добавляемого для предотвращения образования
        комков. Важен для учета аллергических реакций и точности соблюдения рецепта.
    anti_g_suit_bladder_material:
      name: Материал внутренней камеры антигравитационного костюма
      description: Материал, используемый для внутренней надувной камеры (камер) антигравитационного
        костюма. Если используется несколько материалов, перечислите все подходящие
        варианты.
    anti_g_suit_connector_type:
      name: Тип соединителя для антигравитационного костюма
      description: Тип/стандарт соединителя воздушного/напорного шланга, используемого
        для подключения к летательному аппарату или регулятору.
    anti_g_suit_inflation_method:
      name: Метод надувания антигравитационного костюма
      description: Как камеры костюма наполняются под давлением для обеспечения защиты
        от перегрузок.
    anti_g_suit_size_system:
      name: Система размеров антигравитационных костюмов
      description: Стандарт определения размеров, используемый для обозначения системы
        размеров и посадки костюма.
    anti_reverse_type:
      name: Тип защиты от обратного хода
      description: Тип предусмотренного механизма защиты от обратного хода, который
        влияет на зацепление крючка и обратный ход.
    anti_theft_feature:
      name: Функция защиты от кражи
      description: Указывает, обеспечивает ли крепление или держатель защиту от кражи,
        например за счет запорных элементов или устойчивой к взлому конструкции.
    antique_gun_ignition_system:
      name: Система воспламенения старинного оружия
      description: Историческая система стрельбы или воспламенения, используемая в
        старинном огнестрельном оружии.
    apple_variety:
      name: Сорт яблок
      description: Сорт яблок (например, Гала, Фуджи, Гренни Смит), чтобы клиент мог
        выбирать исходя из вкуса, текстуры и кулинарного применения.
    applique_edge_finish:
      name: Отделка края
      description: Способ обработки кромок. Влияет на внешний вид и сопротивление
        износу.
    arbor_type:
      name: Тип вала
      description: Классификация катушки по конструкции вала. Влияет на скорость втягивания
        лески, емкость подложки и память лески.
    archery_accessory_type:
      name: Тип аксессуара для стрельбы из лука
      description: Тип аксессуара для стрельбы из лука для быстрой фильтрации товаров.
    archery_part_type:
      name: Тип детали для стрельбы из лука
      description: Определяет конкретную деталь или запасную часть, которая продается
        (например, рукоятка, плечо, тетива), что позволяет точно фильтровать без развертывания
        дерева категорий.
    archery_range_accessory_type:
      name: Тип аксессуара для стрельбы из лука
      description: Конкретный вид аксессуара, используемого на стрельбище, помогает
        быстро найти необходимый товар.
    archery_target_features:
      name: Характеристики мишени для стрельбы из лука
      description: Специальные эксплуатационные или удобные функции, не охваченные
        другими атрибутами (например, самовосстанавливающаяся пена, ручка для переноски).
    archery_tool_type:
      name: Тип инструмента для стрельбы из лука
      description: Конкретный вид инструмента или элемента снаряжения для стрельбы
        из лука.
    armband_features:
      name: Характеристики нарукавника
      description: Особые функциональные или визуальные характеристики нарукавника.
    armguard_style:
      name: Стиль нарукавника
      description: 'Стиль конструкции или форм-фактор нарукавника. Дает представление
        о дизайне и соотношении внешнем виде: традиционный и современный.'
    armor_protection_type:
      name: Тип брони
      description: Тип защиты, обеспечиваемый системой брони транспортного средства.
    armrest_adjustability:
      name: Регулировка подлокотников
      description: Возможности регулировки размеров и конфигурацию подлокотников кресла
        (например, фиксированные, двухмерные, трехмерные, откидные).
    armrest_type:
      name: Тип подлокотников
      description: Наличие и возможность регулировки подлокотников на кресле (например,
        без подлокотников, фиксированные, регулируемые, съемные).
    arrow_bolt_point_type:
      name: Тип наконечника стрелы или болта
      description: Тип наконечника, устанавливаемого на стрелу или болт.
    arrow_component_type:
      name: Тип компонента стрелы
      description: Конкретная деталь или аксессуар для стрелы (вставка, обмотка, втулка,
        клей и т. д.), чтобы клиенты могли фильтровать товары, не используя десятки
        дополнительных подкатегорий.
    arrow_containment_level:
      name: Уровень удержания стрелы
      description: 'Как упор удерживает стрелу: полностью, частично или не удерживает.'
    arrow_fletching_orientation:
      name: Ориентация оперения стрелы
      description: Ориентация крыльев или смещение оперения (например, левое крыло,
        правое крыло, спиральное). Определяет направление вращения стрелы.
    arrow_nock_groove_size:
      name: Размер паза для наконечника стрелы
      description: Классификация размера паза/горловины наконечника. Определяет совместимость
        с тетивами различного диаметра.
    arrow_nock_type:
      name: Тип наконечника стрелы
      description: Конструкция/тип наконечника стрелы, соприкасающегося с тетивой.
    arrow_rest_style:
      name: Тип упора для стрелы
      description: Функциональный стиль/механизм упора для стрелы (например, откидной,
        лопаточный, whisker biscuit). Определяет, как упор поддерживает, удерживает
        и отпускает стрелу. Это основной критерий, по которому покупатели различают
        товары.
    arrow_shaft_compatibility:
      name: Совместимость с древком стрелы
      description: Стандарт крепления древка стрелы/втулки, к которому подходит светящийся
        наконечник (например, X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Тип рабочего наконечника для художественных и рукодельных инструментов
      description: Форма/профиль рабочего наконечника (например, заостренный или с
        закругленным наконечником). Определяет вид отпечатков при тиснении.
    art_ink_lightfastness_rating:
      name: Светостойкость художественных чернил
      description: Указывает на устойчивость чернил к выцветанию под воздействием
        света. Обычно выражается в виде стандартных показателей.
    art_ink_opacity:
      name: Непрозрачность художественных чернил
      description: Степень покрытия чернилами после нанесения.
    art_security_rating:
      name: Рейтинг безопасности ART
      description: Голландский рейтинг ART (1–5 звезд), присвоенный замку.
    artichoke_cut:
      name: Нарезка артишока
      description: Какая часть или форма артишока предлагается (например, целиком,
        сердцевина, нижняя часть), чтобы клиенты понимали выход продукта и предполагаемое
        кулинарное применение.
    artichoke_variety:
      name: Сорт артишока
      description: Сорт или ботаническая разновидность артишока. Помогает покупателю
        различать их по размеру, цвету, вкусу и кулинарному применению.
    articulation_features:
      name: Особенности артикуляции
      description: Есть ли у модели динозавра подвижные части (челюсть, конечности,
        хвост) и может ли она менять позу в целом.
    artificial_bait_form:
      name: Форма искусственной приманки
      description: Физическая форма или способ представления рыболовной приманки.
    asa_mounting_type:
      name: Тип крепления ASA
      description: Тип интерфейса адаптера для подключения к источнику сжатого воздуха
        (ASA) или стандарт крепления, используемый в насадке (например, «ласточкин
        хвост», направляющая, прямое крепление).
    ascender_descender_type:
      name: Тип устройства для спуска или подъема
      description: Тип жумара или альпинистского спускового устройства для более точной
        фильтрации.
    aspiration_type:
      name: Тип наддува
      description: Тип наддува или впуска двигателя.
    assembly_state:
      name: Состояние сборки
      description: 'В каком виде поставляется корпус: разобранном, собранном или ином.'
    assistance_mechanism:
      name: Механизм помощи
      description: Наличие в силовом тренажере встроенных систем помощи или сопротивления
        для подтягиваний, отжиманий или других упражнений.
    atemoya_cultivar:
      name: Сорт атемойи
      description: Название сорта или разновидности плода атемойи. Позволяет покупателям
        выбрать плоды с нужным вкусом, размером или характеристиками семян.
    athletic_cup_size:
      name: Размер защитного козырька
      description: Размер защитного козырька, установленный производителем, для обеспечения
        правильной посадки спортсмена.
    attachment_position:
      name: Положение крепления
      description: Указывает, к какой части седла или тела всадника крепится козырек
    attractant_scent_profile:
      name: Профиль запаха приманки
      description: Описание специфического запаха или аромата, используемого для привлечения
        диких животных или маскировки человеческого запаха.
    atv_utv_intended_use:
      name: Предполагаемое использование квадроциклов/UTV
      description: Основное предполагаемое использование или тип квадроциклов/UTV.
    audio_channel_configuration:
      name: Конфигурация аудиоканалов
      description: Количество дискретных аудиоканалов с поддержкой эквалайзера/DSP
        (например, 2 каналf стерео, 4-канала фронт/ты, 6 каналов).
    audio_inputs:
      name: Аудиовходы
      description: Типы аудиовходов, доступных для сэмплирования или записи (например,
        линейный вход 1/4 дюйма, XLR, 3,5 мм, микрофонный предусилитель, фонокорректор).
    audio_output:
      name: Аудиовыход
      description: Издает ли игрушка звук и каким образом он передается.
    audio_outputs:
      name: Аудиовыход
      description: Доступные аудиовыходы, в том числе основные и все назначаемые или
        дополнительные выходы.
    audio_playback_source:
      name: Источник воспроизведения аудио
      description: Основные источники медиафайлов, из которых караоке-система может
        воспроизводить музыку.
    autograph_authentication:
      name: Подлинность автографа
      description: Статус или тип подлинности автографа на карте.
    autograph_format:
      name: Формат автографа
      description: Является ли подпись оригинальным автографом, сделанным от руки,
        штампованным или печатным факсимиле либо надписью или дополнением.
    autogyro_cockpit_enclosure:
      name: Ограждение кабины автожира
      description: 'Тип кабины: открытая или закрытая.'
    available_firing_modes:
      name: является ли кабина открытой или закрытой.
      description: Доступные режимы стрельбы, которые пейнтбольный маркер поддерживает
        изначально.
    avocado_variety:
      name: Сорт авокадо
      description: Сорт или разновидность авокадо. Помогая покупателям различать их
        по вкусу, текстуре, размеру и содержанию масла.
    award_customization_included:
      name: Включенная персонализация награды
      description: Какая персонализация или настройка входит в комплект награды.
    award_material:
      name: Материал награды
      description: Основной материал (материалы), из которого изготовлена награда
        (кубок, табличка, медаль, значок, лента).
    award_mounting_display_type:
      name: Тип крепления/демонстрации награды
      description: Способ размещения или крепления награды (на стене, на рабочем столе
        или на одежде).
    award_plaque_plate_material:
      name: Материал таблички награды
      description: Материал таблички с именем или гравировкой, прикрепленной к плакетке
        (отличается от материала подложки).
    award_ribbon_attachment_type:
      name: Тип крепления наградной ленты
      description: Каким образом необходимо прикреплять или носить ленту.
    award_ribbon_imprint_method:
      name: Метод нанесения надписи на ленту награды
      description: Способ нанесения текста или графики на ленту.
    award_ribbon_material:
      name: Материал наградной ленты
      description: Основной материал ткани ленты (например, атлас, полиэстер).
    award_ribbon_placement_title:
      name: Место или звание на наградной ленте
      description: Стандартное место или звание, обозначаемое лентой (например, 1-е
        место, участник).
    axle_compatibility:
      name: Совместимость с осями
      description: Стандарт оси, с которым совместимо колесо. Обеспечивает совместимость
        с рамой и вилкой велосипеда.
    back_beam_type:
      name: Тип задней перекладины
      description: Тип и регулируемость задней перекладины (например, фиксированная
        или регулируемая по высоте).
    back_design:
      name: Дизайн спинки
      description: Особенности конструкции спинки одежды, влияющие на внешний вид
        и посадку.
    back_panel_type:
      name: Тип задней панели
      description: Стиль или материал задней панели шкафа. Влияет на видимость экспонатов
        и сочетание с интерьером.
    back_sides_material:
      name: Материал задней и боковых частей
      description: Материал, используемый для изготовления задней и боковых частей
        корпуса классической гитары.
    backing_type:
      name: Тип подложки
      description: Способ крепления/подложки продаваемого страза (для самоклеящихся
        товаров).
    backup_camera_mounting_location:
      name: Место установки камеры заднего вида
      description: Указывает предполагаемое место установки камеры заднего вида на
        автомобиле.
    backup_camera_video_interface:
      name: Видеоинтерфейс камеры заднего вида
      description: Видеовыход/интерфейс/разъем для подключения камеры заднего вида
        к монитору, видеорегистратору или головному устройству (например, композитный
        RCA, OEM LVDS, IP через Ethernet).
    badminton_set_components_included:
      name: Компоненты набора для бадминтона
      description: Отдельные предметы, входящие в набор для бадминтона.
    bag_attachment_method:
      name: Способ крепления сумки
      description: Основной способ крепления сумки/держателя для гидратационной системы
        к другому снаряжению (например, система MOLLE, петля для ремня, карабин).
    bag_case_carrying_style:
      name: Тип переноски сумки/чехла
      description: основной формат переноски чехла/сумки (на какой вид переноски он
        рассчитан конструктивно).
    bag_cover_material:
      name: Материал чехла сумки
      description: Материал покрытия сумки (внешнего покрытия), который влияет на
        долговечность, сцепление и внешний вид.
    bag_embellishment:
      name: Декор сумки
      description: Основные декоративные элементы на внешней поверхности сумки, например
        кисточки, заклепки или стеганый узор.
    bag_fill_medium:
      name: Наполнитель подушки
      description: Вещество, используемое для наполнения или создания давления в подушке
        например, воздух, вода, песок).
    bag_material:
      name: Материал подушки
      description: Материал подушки безопасности.
    bag_padding_level:
      name: Уровень набивки подушки
      description: Степень или стиль набивки подушки или чехла.
    bag_size_descriptor:
      name: Описание размера сумки
      description: Маркетинговый класс размера сумки-мешка (например, мини, большая),
        дополняющий точные размеры.
    bagel_size:
      name: Размер бублика
      description: 'Общий размер бублика, например: мини, тонкий, стандартный, большой,
        очень большой или гигантский.'
    bagpipe_accessories_included:
      name: Аксессуары для волынки в комплекте
      description: Список основных компонентов или аксессуаров, входящие в комплект
        волынок (помимо основных труб), например футляр, тренировочный чантер, чехол,
        шнуры, средство контроля влажности.
    bagpipes_playing_mode:
      name: Режим игры на волынке
      description: Способ подачи воздуха в инструмент во время игры.
    bait_compatibility:
      name: Совместимость с приманкой
      description: Типы приманок, на которые рассчитан аксессуар. Помогает рыболовам
        убедиться, что выбранный инструмент подходит для их предпочтительной приманки.
    bait_species:
      name: Виды приманки
      description: Основной объект, используемый в качестве наживки. Помогает рыболовам
        убедиться в законности и эффективности прилова для целевого вида рыбы.
    baking_chip_form:
      name: Форма капель
      description: Физический размер или форма капель. Влияет на поведение при плавлении
        и внешний вид выпечки.
    balance_board_style:
      name: Тип балансборда
      description: Классификация балансборда по механизму или типу конструкции. Позволяет
        понять, как доска движется и какую тренировочную нагрузку она обеспечивает.
    balance_cushion_accessories_included:
      name: Аксессуары для балансировочной подушки в комплекте
      description: Список всех аксессуаров, входящих в комплект подушки. Позволяет
        покупателям сравнить стоимость комплектов.
    balance_type:
      name: Тип балансировки
      description: Состояние/класс балансировки приводного вала на момент продажи
        (например, заводская балансировка, балансировка для высоких скоростей, небалансированный).
    ball_bladder_material:
      name: Материал внутренней камеры мяча
      description: Материал, из которого изготовлена внутренняя камера мяча для гандбола.
        Влияет на удержание воздуха, отскок и общую прочность.
    ball_certification:
      name: Сертификация мяча
      description: Официальные сертификаты или разрешения, которые получил мяч.
    ball_construction:
      name: Конструкция мяча
      description: Метод изготовления, используемый для соединения панелей мяча. Влияет
        на долговечность, ощущение при касании, впитывание воды и цену.
    ball_core_construction:
      name: Конструкция сердцевины мяча
      description: Подробное описание внутренней конструкции мяча, влияющей на отскок
        и ощущения при касании.
    ball_core_type:
      name: Тип сердцевины мяча
      description: Внутренняя конструкция мяча, которая влияет на отскок и распределение
        веса.
    ball_cup_game_included_pieces:
      name: Детали игры с мячом и стаканчиком в комплекте
      description: Компоненты, входящие в комплект для игры с мячом и стаканчиком.
    ball_drilling_state:
      name: Сверление шаров
      description: Просверлены ли в шаре отверстия для пальцев и в какой степеи
    ball_holder_type:
      name: Тип держателя мяча
      description: Конструктивный стиль или форм-фактор держателя мяча.
    ball_pit_ball_surface_finish:
      name: Отделка поверхности шариков для бассейна
      description: Тактильные/визуальные свойства поверхности мяча, влияющие на сцепление,
        ощущения во время игры и чистку.
    ball_pit_safety_features:
      name: Особенности безопасности бассейна с шариками
      description: Конструктивные особенности, обеспечивающие безопасность в бассейнах
        с шариками.
    ball_pump_accessory_type:
      name: Тип аксессуара для накачивания мяча
      description: Конкретный вид аксессуара для накачивания мяча, чтобы продавцы
        могли классифицировать манометры, шланги, смазочные материалы и другие дополнения
        в рамках одной родительской категории.
    ball_return_mechanism:
      name: Механизм возврата мяча
      description: Тип механизма возврата мяча, встроенного в коврик, если таковой
        имеется.
    ball_return_type:
      name: Тип возврата мяча
      description: Тип системы сбора/возврата мячей во время игры.
    ball_speed_rating:
      name: Рейтинг скорости мяча
      description: Категория скорости, определяемая производителем и указывающая,
        насколько быстро мяч движется в стандартных условиях.
    ball_surface_texture:
      name: Текстура поверхности мяча
      description: Описание внешней текстуры или рисунка полос на поверхности мячей,
        который может влиять на сцепление и внешний вид.
    ball_surface_type:
      name: Тип поверхности мяча
      description: Описание внешней отделки или амортизации мяча, что указывает на
        ощущения при ударе и сцепление.
    ballonet_configuration:
      name: Конфигурация баллонета
      description: Тип/конфигурация системы балонетов, используемой для регулировки
        положения и давления (для нежестких и полужестких дирижаблей).
    balloon_closure_valve_type:
      name: Тип застежки/клапана воздушного шара
      description: Тип герметизации воздушного шара после надувания (например, завязка,
        самозакрывающийся клапан).
    balloon_kit_finish:
      name: Отделка набора воздушных шаров
      description: Отдела поверхности/визуальная отделка воздушных шаров, входящих
        в комплект.
    balloon_kit_material:
      name: Материал набора воздушных шаров
      description: Основной материал воздушных шаров, входящих в состав набора.
    banana_variety:
      name: Сорт бананов
      description: Сорт или разновидность предлагаемых бананов.
    banjo_head_type:
      name: Тип мембраны банджо
      description: Тип/материал мембраны банджо, влияющий на яркость звучания, громкость
        и ощущения при игре.
    banjo_neck_material:
      name: Материал грифа банджо
      description: Материал грифа, влияющий на ощущения при игре, стабильность и тембр.
    banjo_pickup_configuration:
      name: Конфигурация звукоснимателя банджо
      description: Указывает, оснащено ли банджо встроенным звукоснимателем и какая
        технология звукоснимателя используется.
    banjo_rim_material:
      name: Материал обода банджо
      description: Материал обода/корпуса (круглой части), который сильно влияет на
        тембр и вес.
    banjo_tone_ring_type:
      name: Тип тонального кольца банджо
      description: Конструкция/семейство материалов тонального кольца банджо, которые
        определяют тембр и громкость.
    banjo_tuning_machine_type:
      name: Тип колковых механизмов банджо
      description: Тип колковых механизмов, используемых на банджо.
    banknote_authentication_grading:
      name: Аутентификация/оценка банкноты
      description: Сторонняя служба (если таковая имеется), которая провела аутентификацию/оценку
        банкноты.
    banknote_grade:
      name: Состояние банкноты
