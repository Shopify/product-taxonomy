      description: Может ли пользователь изменять сопротивление (например, с помощью
        селектора или загрузки) или оно зафиксировано на одном весе.
    weight_integration_system:
      name: Система интеграции грузов
      description: Способ встраивания балластных грузов в компенсатор плавучести (например,
        съемные карманы, отсутствие, дополнение).
    weight_plate_compatibility:
      name: Совместимость с дисками
      description: Диаметр и тип совместимых дисков (олимпийские, стандартные или
        оба варианта).
    weight_plate_style:
      name: Тип дисков
      description: Конструкция/тип диска (например, олимпийский, бамперный, с регулируемым
        весом) для быстрой фильтрации по совместимости.
    weightlifting_belt_style:
      name: Стиль тяжелоатлетического пояса
      description: Тип общей конструкции или назначение пояса (рычажный, для отжиманий,
