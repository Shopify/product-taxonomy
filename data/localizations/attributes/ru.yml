    damping_adjustability:
      name: Регулировка демпфирования
      description: Параметры демпфирования и/или высоты подъема, регулируемые на амортизаторе.
    damping_level:
      name: Уровень демпфирования
      description: Относительный уровень снижения громкости и сустейна, который обеспечивает
        заглушка.
    dance_occasion:
      name: Повод для танца
      description: Предполагаемый контекст использования изделия в танцевальной практике
        или выступлении.
    darbuka_accessories_included:
      description: Обычные аксессуары, входящие в комплект дарбуки.
    darbuka_body_finish_type:
      name: Тип отделки корпуса дарбуки
      description: Внешняя отделка, покрытие или декоративная обработка корпуса дарбуки.
    darbuka_head_material:
      name: Материал мембраны дарбуки
      description: Материал мембраны барабанной кожи дарбуки.
    dart_barrel_material:
      name: Материал барреля дротика
      description: Основной материал барреля дротика. Влияет на распределение веса,
        долговечность и цену.
    dart_shaft_design:
      name: Конструкция хвостовика дротика
      description: Механическая конструкция хвостовика, например фиксированный, вращающийся,
        телескопический или со встроенным оперением. Влияет на игровые характеристики
        и цену.
    dart_shaft_thread_type:
      name: Тип резьбы хвостовика дротика
      description: Размер и тип резьбы, используемые для вкручивания хвостовика в
        баррель дротика. Обеспечивает совместимость хвостовиков и баррелей.
    dart_thread_size:
      description: Размер и стандарт резьбы, с которыми совместима деталь. Обеспечивает
        совместимость между хвостовиками, наконечниками и баррелями.
    dart_tip_compatibility:
      name: Совместимость наконечника дротика
      description: Для дротиков со стальными наконечниками, мягкими наконечниками
        или для обоих типов.
    dart_tip_connection_type:
      name: Тип соединения наконечника дротика
      description: Спецификация резьбы или система крепления, с помощью которых наконечник
        соединяется с баррелем или хвостовиком дротика. Обеспечивает совместимость.
    dartboard_tournament_approval:
      name: Турнирное одобрение мишени для дартса
      description: Официальное одобрение мишени для дартса определенными федерациями
        или лигами дартса.
    dartboard_type:
      name: Тип мишени для дартса
      description: Классификация мишени для дартса по технологии конструкции и совместимости
        с дротиками (например, сизалевая, электронная, магнитная).
    dash_cover_construction_type:
      description: Способ формирования и конструкция накладки панели приборов (например,
        формованная или сшитая). Влияет на точность посадки и внешний вид.
    dash_cover_cutout_configuration:
      name: Конфигурация вырезов накладки панели приборов
      description: Под какие штатные отверстия и датчики панели приборов заранее выполнены
        вырезы или форма накладки.
    dashboard_accessory_position:
      name: Положение аксессуара на панели приборов
      description: Место, где аксессуар предназначен для размещения или установки
        на панели приборов или вокруг нее.
    date_variety:
      description: Сорт фиников (например, меджул, деглет нур, аджва). Сорт сильно
        влияет на вкус, размер и текстуру, а также обычно указывается в названиях
        и описаниях товаров, поэтому его фиксация улучшает фильтрацию и поиск.
    dayan_head_material:
      description: Материал игровой поверхности (пуди), например натуральная кожа
        или синтетика.
    dayan_strap_material:
      description: Материал стяжных ремней (баддхи), используемых для шнуровки даяна.
    dayan_syahi_type:
      name: Тип сьяхи даяна
      description: Тип нанесения сьяхи (черной настроечной пасты) на мембрану даяна.
    decaffeination_method:
      name: Способ декофеинизации
      description: Процесс удаления кофеина из декофеинированного кофе.
    decal_installation_method:
      name: Способ установки декали
      description: Способ нанесения декали на поверхность автомобиля (например, сухое
        или мокрое нанесение). Сведения об инструментах и требованиях (например, монтажная
        лента или тепловой пистолет) следует указывать в инструкциях или связанных
        атрибутах инструмента, если это применимо.
    decal_orientation:
      name: Ориентация декали
      description: Для нанесения на внутреннюю сторону стекла или на внешнюю поверхность.
    decal_placement_type:
      name: Тип размещения декали
      description: На какую часть автомобиля предназначена декаль (например, кузовная
        панель, бампер, капот).
    decal_visibility_property:
      name: Свойство видимости декали
      description: Оптические свойства и свойства видимости декали, предназначенной
        для улучшения заметности или реакции на свет (например, светоотражающая, флуоресцентная,
        светящаяся в темноте или прозрачная).
    deck_concave_level:
      name: Уровень конкейва деки
      description: Глубина или выраженность конкейва деки (например, слабый, средний,
        глубокий).
    deck_flex_rating:
      name: Оценка гибкости деки
      description: Качественная оценка гибкости или жесткости деки.
    deck_material:
      description: Основной конструкционный материал деки скейтборда.
    decoder_interface_socket_type:
      name: Тип интерфейса или разъема декодера
      description: Тип интерфейса цифрового декодера или встроенная конфигурация декодера
        для модели локомотива.
    decoration_technique:
      name: Техника декорирования
      description: Основной способ нанесения графики или декоративных элементов на
        футболку.
    decorative_stamp_form_factor:
      name: Формфактор декоративного штампа
      description: Физический формат штампа и способ нанесения рисунка (одинарный
        штамп, набор, валик, фон и т. д.).
    decorative_tape_application:
      name: Назначение декоративной ленты
      description: Основное рукодельное применение, для которого декоративная лента
        предназначена или продается.
    decorative_tape_format:
      name: Формат декоративной ленты
      description: Способ поставки или упаковки декоративной ленты для использования.
    decoy_buoyancy:
      name: Плавучесть манка
      description: Поведение манка в толще воды (плавающий, зависающий или тонущий).
    decoy_joint_type:
      name: Тип сочленения манка
      description: Корпус манка цельный или шарнирный. Влияет на характер движения
        в воде.
    decoy_motion_mechanism:
      name: Механизм движения манка
      description: Каким образом манок создает движение или возмущение воды для привлечения
        добычи.
    decoy_posture:
      name: Поза манка
      description: Изображенная поза или активность животного, моделируемого манком
        (например, кормится, отдыхает, настороже).
    decoy_size_class:
      name: Размерный класс манка
      description: Относительный размер манка по сравнению с реальным животным (например,
        стандартный, магнум, оверсайз).
    decoy_style:
      name: Стиль манка
      description: Физический формфактор или класс конструкции манка, чтобы помочь
        охотникам выбрать подходящую оснастку.
    deli_meat_variety:
      name: Вид деликатесного мясного изделия
      description: Конкретный вид деликатесного мясного изделия (например, салями,
        болонья, прошутто, ростбиф).
    delivery_form:
      description: Физическая форма поставки очистителя инжектора.
    denim_composition:
      name: Состав джинсовой ткани
      description: Основной волокнистый состав джинсовой ткани (базовые волокна без
        учета красителей и отделок).
    denim_finish:
      name: Отделка джинсовой ткани
      description: Поверхностная или технологическая отделка, примененная к джинсовой
        ткани.
    denim_intended_use:
      name: Предназначение джинсовой ткани
      description: Типичное применение или проект, для которого продается джинсовая
        ткань.
    denim_stretch_type:
      name: Тип растяжимости джинсовой ткани
      description: Имеет ли джинсовая ткань механическую растяжимость, добавленный
        эластан/спандекс или не растягивается.
    denim_wash:
      name: Стирка джинсовой ткани
      description: Оттенок или обработка стиркой, примененная к джинсовой ткани (например,
        светлая, темная, необработанная, кислотная).
    derailleur_cage_length:
      name: Длина лапки переключателя
      description: Длина лапки переключателя, определяющая емкость цепи (в основном
        для задних переключателей).
    derailleur_mounting_style:
      name: Способ крепления переключателя
      description: Как переключатель крепится к раме велосипеда или петуху (например,
        припайка, хомут, прямое крепление, UDH).
    derailleur_type:
      name: Тип переключателя
      description: Передний или задний переключатель.
    deshedder_tool_type:
      name: Тип дешеддера
      description: Конструктивный тип дешеддера, чтобы покупатели могли выбрать предпочитаемый
        способ ухода (например, лезвие, блок, пуходерка или перчатка).
    diabolo_axle_system:
      name: Система оси диаболо
      description: Система или конфигурация оси диаболо. Влияет на скольжения, устойчивость
        и износ шнура.
    diagnostic_functions_supported:
      name: Поддерживаемые диагностические функции
      description: Диагностические и сервисные функции, которые может выполнять сканер.
    diagnostic_interface_type:
      name: Тип диагностического интерфейса
      description: Тип соединения или интерфейса, используемый для связи с автомобилем
        или устройством (например, OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Цветовая оценка алмаза
      description: Цветовая оценка алмазов, от D (бесцветный) до Z (светлый оттенок),
        либо фантазийные цветные алмазы.
    diaper_cover_style:
      name: Стиль чехла для подгузника
      description: Силуэт дизайна или декоративный стиль чехла для подгузника, чтобы
        облегчить поиск и фильтрацию по стилю.
    diastatic_power_unit:
      name: Единица диастатической силы
      description: Система единиц, используемая для обозначения значения диастатической
        силы продукта (например, градус Линтнера или Виндиша-Кольбаха).
    diatonic_harmonica_tuning_system:
      description: Система расположения нот и настройки, используемая для диатонической
        губной гармошки.
    dice_sides:
      name: Количество граней игральной кости
      description: Количество сторон (граней) у каждой кости, входящей в комплект
        (например, d6, d20). Для смешанных наборов используйте преобладающее значение
        или несколько значений, если это поддерживается.
    didgeridoo_construction_type:
      name: Тип конструкции диджериду
      description: Способ изготовления или формирования диджериду (традиционный или
        современный подход к конструкции).
    dietary_formulation_claim:
      name: Информация о составе корма
      description: Ключевые особенности состава или исключения, важные для кормления
        лошадей (например, беззерновой, низкокрахмальный, органический).
    dinosaur_playset_scale_figure_size_class:
      name: Масштаб игрового набора с динозаврами/размер фигурок
      description: Общий масштаб входящих в набор динозавров или фигурок. Помогает
        определить совместимость с другими наборами.
    dinosaur_species_included:
      name: Виды динозавров в наборе
      description: Какие виды динозавров представлены в игровом наборе (фигурки или
        литые динозавры).
    dipsy_diver_size_designation:
      name: Размерное обозначение дипси-дайвера
      description: Размерный код рыболовного дипси, установленный производителем.
        Соотносится с весом и глубиной погружения.
    disc_brake_rotor_mount_type:
      description: Способ крепления тормозного ротора к втулке (например, 6-болтовый,
        центральный замок).
    disc_lock_accessories_included:
      name: Аксессуары в комплекте с дисковым замком
      description: Дополнительные предметы, входящие в комплект дискового велосипедного
        замка, например трос напоминания, чехол для переноски, крепежный кронштейн
        или батарейки.
    disco_ball_mirror_tile_material:
      description: Материал отражающих элементов дискобола (если применимо).
    disco_ball_mirror_tile_size:
      name: Размер зеркальной плитки дискобола
      description: Приблизительный размер отдельных зеркальных плиток или квадратов
        на дискоболе.
    display_backlight_color:
      name: Цвет подсветки дисплея
      description: Цвет подсветки или освещения дисплея или шкалы прибора.
    disposable_compostable_claim:
      name: Информация о биоразлагаемости или компостируемости
      description: Компостируемый, биоразлагаемый, перерабатываемый или ни один из
        этих вариантов (если применимо).
    distillation_method:
      name: Способ дистилляции
      description: Способ дистилляции или тип перегонного аппарата, используемый для
        производства спиртного напитка.
    distilled_water_intended_use:
      name: Предназначение дистиллированной воды
      description: Основное применение дистиллированной воды (например, питье, аппарат
        CPAP, увлажнитель, паровой утюг).
    distress_transmission_frequency:
      name: Частота передачи сигнала бедствия
      description: Основная радиочастота или радиочастоты, используемые для передачи
        сигнала бедствия.
    distressing_level:
      name: Уровень состаривания
      description: Степень намеренного износа, разрывов или потертостей, нанесенных
        на ткань.
    distressing_style:
      name: Стиль состаривания
      description: Тип или уровень состаривания джинсов, например рваный или с эффектом
        потертостей.
    distributor_advance_mechanism:
      name: Механизм опережения зажигания трамблера
      description: Тип механизма опережения зажигания, используемого трамблером.
    distributor_cap_terminal_type:
      name: Тип клемм крышки трамблера
      description: Стиль клемм крышки трамблера.
    distributor_gear_material:
      name: Материал шестерни трамблера
      description: Материал приводной шестерни трамблера.
    distributor_ignition_type:
      name: Тип зажигания трамблера
      description: Трамблер для контактной, электронной системы зажигания или систем
        типа HEI.
    distributor_kit_contents:
      name: Состав комплекта трамблера
      description: Какие компоненты входят в комплект трамблера (например, крышка,
        ротор, модуль зажигания, прокладка/уплотнительное кольцо, приводная шестерня,
        проводка/разъем).
    dive_computer_form_factor:
      name: Формфактор дайв-компьютера
      description: Физическая конструкция или способ крепления дайв-компьютера, например
        консольный или наручный формат.
    diving_mask_design:
      name: Конструкция маски для дайвинга
      description: Общий конструктивный стиль маски для дайвинга. Влияет на посадку,
        поле зрения и назначение.
    divot_tool_prong_configuration:
      name: Конфигурация зубцов инструмента для дивотов
      description: Количество и расположение зубцов на инструменте для ремонта дивотов,
        используемых для восстановления дерна.
    divot_tool_style:
      name: Стиль инструмента для дивотов
      description: Общая конструкция или тип раскрытия инструмента для дивотов, например
        фиксированный, складной, многофункциональный или аксессуар, крепящийся к кепке
        или клюшке.
    djembe_shell_construction:
      name: Конструкция корпуса джембе
      description: Способ изготовления корпуса джембе.
    djembe_tuning_system:
      name: Система настройки джембе
      description: Как натягивается и настраивается джембе.
    dmx_output_connector_type:
      name: Тип выходного разъема DMX
      description: Физический формат разъема, используемый для выходного порта или
        портов DMX контроллера.
    doctor_playset_items_included:
      description: Игрушечные медицинские инструменты и аксессуары для ролевой игры,
        входящие в набор доктора (например, стетоскоп, шприц, неврологический молоточек).
    doctor_playset_role_play_setting:
      name: Набор для игр «Доктор»
      description: Основной ролевой контекст, представляемы набором доктора.
    doctor_playset_wearable_items_included:
      description: Носимые элементы костюма, входящие в набор.
    doll_accessory_type:
      name: Тип аксессуара для куклы
      description: Какой именно это аксессуар для куклы или фигурки (например, одежда,
        обувь, мебель, подставки для демонстрации), чтобы покупатели могли просматривать
        и фильтровать товары в этой категории.
    doll_eye_type:
      name: Тип глаз куклы
      description: Конструктивный тип глаз куклы (например, вставные акриловые, окрашенные,
        со светодиодной подсветкой).
    doll_hair_fiber_type:
      name: Тип волокна волос куклы
      description: Тип волос или волокна, используемого на кукле, либо отсутствие
        волос. Влияет на реалистичность, укладку и уход.
    doll_making_kit_components_included:
      description: Основные материалы и инструменты, входящие в набор для изготовления
        кукол, чтобы покупатели могли сравнивать комплекты и понимать, что нужно докупить
        самостоятельно.
    dollhouse_installation_placement_type:
      name: Тип установки или размещения кукольного домика
      description: Способ использования или размещения кукольного домика (например,
        настольный, напольный или настенный).
    dollhouse_items_included:
      name: Предметы в комплекте кукольного домика
      description: Что входит в комплект кукольного домика (мебель, куклы, аксессуары).
    dollhouse_lighting_type:
      name: Тип освещения кукольного домика
      description: Тип освещения, входящего в кукольный домик или поддерживаемого
        им.
    dollhouse_room_type:
      name: Тип комнаты кукольного домика
      description: Предполагаемая комната или зона внутри кукольного домика, где обычно
        используется аксессуар.
    dollhouse_scale:
      name: Масштаб кукольного домика
      description: Масштаб кукольного домика или аксессуаров к нему (например, 1:12),
        обеспечивающий совместимость домов, мебели и фигурок.
    dollhouse_style_theme:
      name: Стиль или тема кукольного домика
      description: Общий стиль или тема кукольного домика для поиска и выбора подарка
        (например, современный или викторианский).
    donnos_playing_technique:
      name: Техника игры на донносе
      description: Способ игры или извлечения звука на донносе (только руками или
        с палочкой/ударником), чтобы соответствовать ожиданиям покупателя и комплекту
        аксессуаров.
    donnos_tuning_system:
      description: Основной способ настройки или изменения высоты звука (например,
        натяжные шнуры или механизм сжатия).
    door_assembly_type:
      description: 'Что входит в комплект: только каркас двери, дверная панель или
        полный дверной узел.'
    door_closure_mechanism:
      name: Механизм закрывания двери
      description: Механизм, управляющий закрыванием двери (например, плавное закрывание,
        магнитная защелка).
    door_handle_components_included:
      name: Комплектующие дверной ручки
      description: Основные детали в комплекте дверной ручки (например, цилиндр замка,
        прокладка/уплотнитель, декоративная накладка, крепеж, жгут проводов, защелка/привод).
    door_handle_operation:
      name: Способ работы дверной ручки
      description: Основной способ срабатывания дверной ручки автомобиля (например,
        механическая тяга, цилиндр ключа, бесключевое касание/кнопка, выдвижная с
        электроприводом).
    door_lock_knob_attachment_method:
      name: Способ крепления кнопки дверного замка
      description: Крепление кнопки дверного замка к тяге замка (например, резьбовое
        соединение, насадное).
    door_lock_position:
      name: Положение дверного замка
      description: Дверь или проем, для которой предназначен дверной замок или его
        деталь на автомобиле.
    door_seal_feature_set:
      name: Набор функций дверного уплотнителя
      description: Функциональные особенности дверного уплотнителя.
    door_seal_material_type:
      name: Тип материала дверного уплотнителя
      description: Основной эластомер или семейство материалов, используемое для дверного
        уплотнителя, помимо общей категории материала.
    door_seal_product_form:
      name: Форма товара дверного уплотнителя
      description: Форма продажи или упаковки дверного уплотнителя.
    door_window_operation:
      description: Оконная система двери для ручного или электрического управления,
        либо отсутствие окна в двери.
    double_decker_bus_deck_configuration:
      name: Конфигурация этажей двухэтажного автобуса
      description: Конфигурация этажей, доступа и крыши двухэтажного автобуса.
    double_drum_pedal_linkage_medium:
      name: Тип привода двойной бас-бочки
      description: Средство соединения вторичной педали с основной педалью (например,
        карданный вал, цепь, ремень).
    double_end_bag_core_type:
      name: Тип сердечника пневмогруши
      description: Внутренняя конструкция ударного сердечника. Влияет на скорость
        отскока, ощущения при работе и требования к обслуживанию.
    double_pointed_needle_point_style:
      name: Тип острия чулочных спиц
      description: Острота и форма кончика, предназначенные для разных видов пряжи
        и техник вязания.
    dough_extruder_accessories_included:
      name: Аксессуары в комплекте с экструдером для теста
      description: Дополнительные компоненты, входящие в комплект экструдера для теста.
    dough_extruder_operation_type:
      name: Тип работы экструдера для теста
      description: Способ проталкивания теста через экструдер для формирования фигур.
    dough_extruder_shape_disc_included:
      name: Форма дисков экструдера для теста
      description: Формы, которые экструдер может создавать с помощью входящих в комплект
        дисков или насадок.
    dough_format:
      description: Физическая форма теста внутри упаковки (например, шар, лист, диск,
        нарезанные полоски).
    doumbek_accessories_included:
      description: Аксессуары, входящие в комплект думбека (например, ключ для настройки,
        чехол).
    doumbek_head_material:
      description: Материал мембраны барабана думбек.
    doumbek_head_type:
      name: Тип мембраны думбека
      description: Конструкция или тип мембраны думбека (способ изготовления или крепления
        мембраны).
    doumbek_playing_style_technique:
      name: Стиль или техника игры на думбеке
      description: Предполагаемый контекст или стиль игры, обычно связанный с думбеком.
    doumbek_tuning_system:
      description: Как натягивается и настраивается думбек, либо является ли он ненастраиваемым.
    dowel_end_style:
      name: Тип торца шканта
      description: Срез или форма торцов шканта. Влияет на легкость вставки, безопасность
        и предназначение в рукоделии.
    dowel_surface_texture:
      description: Состояние поверхности шканта, например гладкая или рифленая. Влияет
        на внешний вид и сцепление с клеем.
    drafting_compass_adjustment_mechanism:
      name: Механизм регулировки чертежного циркуля
      description: Основной механизм тонкой регулировки, используемый для точной установки
        радиуса.
    drafting_compass_fine_adjustment_mechanism:
      description: Тип тонкой регулировки, используемый для точной установки радиуса
        (если предусмотрен).
    drafting_compass_lead_holder_type:
      name: Тип держателя грифеля чертежного циркуля
      description: Тип пишущего элемента или держателя, входящего в комплект или поддерживаемого
        циркулем.
    drag_system_material:
      name: Материал фрикционной системы
      description: Материал или технология, используемая во фрикционном пакете. Влияет
