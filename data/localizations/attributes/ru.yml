    doumbek_playing_style_technique:
      name: Стиль или техника игры на думбеке
      description: Предполагаемый контекст или стиль игры, обычно связанный с думбеком.
    doumbek_tuning_system:
      name: Система настройки думбека
      description: Как натягивается и настраивается думбек, либо является ли он ненастраиваемым.
    dowel_end_style:
      name: Тип торца шканта
      description: Срез или форма торцов шканта. Влияет на легкость вставки, безопасность
