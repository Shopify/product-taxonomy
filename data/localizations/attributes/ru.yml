      description: Высота/профиль тульи кепки над козырьком.
    crown_style:
      name: Стиль тульи
      description: Общий силуэт или профиль тульи котелка.
    crust_taste_profile:
      name: Вкусовой профиль корочки
      description: 'Вкусовая ориентация корочки: сладкая, соленая или нейтральная.'
