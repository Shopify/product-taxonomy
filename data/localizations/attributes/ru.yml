      description: Встроенные игровые функции водного столика (например, водопады,
        распылители, насосы, многоуровневые чаши).
    water_table_items_included:
      name: Комплект водного столика
      description: Перечень аксессуаров, входящих в комплект набора для игр с водой
        (например, лодки, стаканчики, воронки, фигурки).
    water_table_water_source_type:
      name: Тип подачи воды для водного столика
      description: Способ наполнения или подачи воды в водный столик.
    waterbed_stabilization_level:
      name: Уровень стабилизации водяного матраса
      description: Степень уменьшения волн или контроля движения, обеспечиваемая водяным
        матрасом.
    watercolor_ink_water_resistance_after_drying:
      name: Водостойкость акварельных чернил (после высыхания)
