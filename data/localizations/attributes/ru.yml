    winding_method:
      name: Способ намотки
      description: Способ намотки утка для использования в челноке.
    winding_speed_control_type:
      name: Тип управления скоростью намотки
      description: Метод регулировки скорости намотки во время работы.
    winding_type:
      name: Тип намотки
      description: Конструкция обмотки басовых струн (профиль внешней обмотки).
    windlass_control_station_type:
      name: Тип поста управления лебедкой
      description: Тип интерфейса управления, включенного в комплект поставки или
        поддерживаемого лебедкой.
    windlass_mount_type:
      name: Тип крепления лебедки
      description: Предполагаемое место и способ установки лебедки на судне.
    window_component_location:
      name: Расположение оконного элемента
      description: Окно или отверстие в автомобиле, к которому относится деталь (например,
        лобовое, боковое или заднее стекло).
    window_configuration:
      name: Конфигурация окон
      description: Наличие и относительный размер прозрачных смотровых окон на крыле.
    window_glass_construction:
      name: Конструкция автомобильного стекла
      description: Конструкция защитного/многослойного стекла автомобильного окна.
    window_glass_features:
      name: Функции автомобильного стекла
      description: Интеграция автомобильных технологий (например, датчика дождя, кронштейна
        для камеры) в стеклянную панель.
    window_glass_finish:
      name: Отделка автомобильного стекла
      description: Отделка, тонировка и режим эксплуатации оконных стекол автомобиля.
    window_glass_tint_color:
      name: Цвет тонировки стекла
      description: Оттенок стекла (не общий цвет товара).
    window_glass_tint_level:
      name: Уровень тонировки стекла
      description: Приблизительная степень затемнения стекла, обеспечиваемая заводской/защитной
        тонировкой (а не пленкой, установленной после покупки). Если точный показатель
        VLT неизвестен, используйте описательные уровни.
    window_net_latch_mechanism:
      name: Механизм фиксации оконной сетки
      description: Используемый механизм защелкивания или отстегивания оконной сетки
        (например, кнопка, рычаг, пряжка).
    window_net_mounting_hardware:
      name: Крепеж оконной сетки
      description: Тип крепежных элементов или способ крепления, используемый для
        установки оконной сетки (например, зажимы, винты, крючки/стержни) и входит
        ли крепеж в комплект.
    window_net_opening_direction:
      name: Направление открытия оконной сетки
      description: Открывание оконной сетки относительно человека, находящегося в
        помещении, для обеспечения эвакуации и соблюдения правил.
    window_regulator_operation:
      name: Тип привода стеклоподъемника
      description: Способ управления стеклоподъемником (ручной или электрический).
    windshield_coverage_area:
      name: Зона покрытия защитного чехла лобового стекла
      description: Части передней наружной части автомобиля, для защиты который предназначен
        чехол лобового стекла (например, только лобовое стекло или также стеклоочистители,
        зеркала, боковые окна или край капота).
    windshield_mount_attachment_method:
      name: Метод крепления лобового стекла
      description: Способ прикрепления к поверхности лобового стекла или фиксации
        на ней.
    windshield_washer_fluid_seasonality:
      name: Сезонность стеклоомывающей жидкости
      description: Предполагаемый сезон, климат или основное назначение жидкости для
        омывателя ветрового стекла (например, зимнее средство против обледенения,
        летнее средство от насекомых, всесезонное).
    windsurf_fin_style:
      name: Стиль плавника для виндсерфинга
      description: Классификация плавника по предполагаемой дисциплине парусного спорта
        или стилю использования (например, «волна», «слалом», «вед»).
    windsurfing_connection_standard:
      name: Стандарт крепления виндсерфинга
      description: Механический интерфейс или коробчатый узел, используемый для крепления
        детали к доске или оснастке.
    windsurfing_sail_style:
      name: Стиль паруса виндсерфинга
      description: 'Дисциплина или область применения паруса, например: «волна», «фрирайд»
        или «фойл».'
    wine_additive_type:
      name: Тип винодельческой добавки
      description: Категория винодельческого продукта (ингредиент, добавка, дрожжи,
        осветлитель, набор и т. п.).
    wine_body:
      name: Тело вина
      description: Ощущаемая плотность и текстура вина.
    wine_carbonation:
      name: Газированность вина
      description: Степень газирования вина (тихое, полугазированное или игристое),
        а также интенсивность пузырьков.
    wine_making_ingredient_type:
      name: Тип ингредиента виноделия
      description: Функциональная категория пищевых добавок и ингредиентов, используемых
        в виноделии.
    wine_making_stage:
      name: Стадия виноделия
      description: Этап процесса виноделия, для которого предназначен продукт.
    wine_style:
      name: Стиль вина
      description: 'Общий стиль вина, помимо его цвета, например: тихое, игристое
        или крепленое.'
    winemaking_process_stage:
      name: Стадия винодельческого процесса
      description: Основной этап процесса виноделия, для которого предназначен продукт.
    wing_count:
      name: Количество крыльев
      description: Количество крыльев или плеч у бумеранга.
    wing_handle_type:
      name: Тип ручки крыла
      description: Тип системы хвата на крыле виндфойла.
    wing_part_type:
      name: Тип детали крыла
      description: Конкретный компонент или запасная часть крыла виндфойла.
    wingfoiling_style:
      name: Стиль виндфойлинга
      description: Дисциплина или стиль катания виндфойлинга, на которые ориентирован
        товар.
    wiper_arm_finish:
      name: Отделка рычага дворника
      description: Поверхностное покрытие рычага дворника, влияющее на коррозионную
        стойкость и внешний вид.
    wiper_arm_pivot_mount_type:
      name: Тип крепления шарнира дворника
      description: Способ крепления рычага дворника к механизму или шарниру.
    wiper_blade_attachment_type:
      name: Тип крепления щетки дворника
      description: Тип соединения, используемый для крепления щетки стеклоочистителя
        к кронштейну.
    wiper_blade_rubber_material:
      name: Материал резины щетки дворника
      description: Материал рабочей резиновой части, контактирующей со стеклом.
    wiper_system_position:
      name: Положение системы дворников
      description: Расположение системы дворников на автомобиле.
    wire_coating_material:
      name: Материал покрытия проволоки
      description: Материал внешнего покрытия/оболочки проволоки (не материал сердечника),
        который может влиять на износостойкость и прохождение проволоки через отверстия
        в бусинах.
    wire_coating_type:
      name: Тип покрытия провода
      description: Наличие и тип покрытия провода (цвет, защита, текстура).
    wire_construction_type:
      name: Тип конструкции проволоки
      description: Физическая конструкция провода (многожильный или цельный, с покрытием
        или без).
    wire_finish:
      name: Отделка провода
      description: Отделка поверхности или покрытие проволоки (например, полированная,
        эмалированная, оцинкованная, с гальваническим покрытием). Влияет на внешний
        вид и устойчивость к потускнению и коррозии.
    wire_gauge_awg:
      name: Калибр провода (AWG)
      description: Размер проводника по системе American Wire Gauge (AWG).
    wire_insulation_material:
      name: Материал изоляции провода
      description: Материал изоляции или оболочки провода. Влияет на термостойкость
        и химическую устойчивость.
    wire_packaging_type:
      name: Тип упаковки проволоки
      description: Формат продажи или упаковки провода.
    wire_shape_profile:
      name: Форма или профиль проволоки
      description: Форма поперечного сечения провода.
    wiring_configuration:
      name: Конфигурация проводки
      description: 'Наличие проводки в фехтовальной шпаге: электрическая, беспроводная
        или для неэлектрической практики.'
    wobbler_style:
      name: Стиль воблера
      description: Тип конструкции и поведения воблера (крэнкбейт, джеркбейт и т.
        п.).
    wood_block_surface_preparation:
      name: Подготовка поверхности деревянного блока
      description: Степень готовности поверхности деревянного блока к обработке.
    wood_grain_direction:
      name: Направление волокон древесины
      description: Направление волокон древесины по отношению к самой длинной стороне
        изделия. Влияет на прочность, характеристики при распиловке и внешний вид.
    wood_slice_edge_style:
      name: Тип кромки древесного спила
      description: Состояние кромки спила (натуральная кора или шлифованная кромка).
    wooden_block_special_features:
      name: Особенности деревянных блоков
      description: Функциональные особенности набора деревянных блоков.
    woodwind_body_construction:
      name: Конструкция корпуса духового инструмента
      description: Конструкция корпуса инструмента (цельный или из нескольких частей).
        Влияет на процесс очистки, хранение и удобство транспортировки.
    woodwind_polishing_cloth_intended_use:
      name: Назначение салфетки для духовых инструментов
      description: Назначение салфетки для очистки и полировки духового инструмента.
    woodwind_small_part_type:
      name: Тип мелкой детали духового инструмента
      description: Тип мелкой запасной детали для кларнета (например, механизм клапанов,
        прокладки/пробки/войлок, кольца).
    woofer_mounting_type:
      name: Тип крепления вуфера
      description: Способ установки или использования динамика (на открытом воздухе
        или в корпусе) и типовые варианты монтажа.
    woofer_surround_material:
      name: Материал подвеса динамика
      description: Материал, из которого изготовлена окантовка низкочастотного динамика
        (внешнее подвесное кольцо).
    worn_on_finger:
      name: Палец ношения
      description: Палец, на котором предназначено ношение наперстка.
    wrap_style:
      name: Стиль обмотки
      description: Количество оборотов ремня вокруг талии.
    wrapping_occasion:
      name: Повод для упаковки
      description: Основной повод для подарочной упаковки.
    wrapping_paper_features:
      name: Особенности упаковочной бумаги
      description: Функциональные и экологические свойства упаковочной бумаги (прочность,
        доля вторичного сырья или формат предварительно нарезанных листов).
    wrestling_dummy_design:
      name: Конструкция тренировочного манекена
      description: Форма и поза тренировочного манекена, например фигура человека
        в положении стоя или мешок для бросков. Определяет, какие тренировочные упражнения
        можно выполнять.
    wrestling_mat_safety_certifications:
      name: Сертификации борцовского мата
      description: Перечень стандартов безопасности борцовского мата.
    wrist_strap_style:
      name: Стиль ремешка на запястье
      description: Стиль ремешка на запястье (или его отсутствие). Влияет на фиксацию
        и посадку.
    wrist_support_style:
      name: Стиль поддержки запястья
      description: Конструкция поддержки запястья (бандаж, перчатка, тейп или обмотка).
        Помогает выбрать наиболее подходящий вариант с учетом личных предпочтений
        и целей использования.
    xylophone_range_octaves:
      name: Диапазон ксилофона (в октавах)
      description: Общий диапазон ксилофона в октавах (например, 2,5, 3 или 4 октавы).
    xylophone_resonator_type:
      name: Тип резонатора ксилофона
      description: Тип резонаторной системы для усиления звука (если используется).
    yam_variety:
      name: Сорт ямса
      description: Сорт батата (например, фиолетовый, желтый, «слоновья нога»).
    yarn_cutter_physical_style:
      name: Физический стиль резака для пряжи
      description: Физический тип ножниц для пряжи (например, подвесные, кольцевые,
        кусачки). Облегчает просмотр и фильтрацию товаров в этой категории.
    yarn_finish_or_effect:
      name: Отделка или эффект пряжи
      description: Специальные визуальные или функциональные эффекты пряжи (флуоресценция,
        металлический блеск и т. п.).
    yarn_guide_style:
      name: Стиль направителя пряжи
      description: Физический стиль направителя пряжи.
    yarn_swift_adjustability:
      name: Регулируемость моталки для пряжи
      description: Регулировка размера мотка (развертывание, складывание, раскладывание).
        Влияет на удобство хранения и диапазон размеров мотков, которые можно использовать.
    yarn_swift_bearing_type:
      name: Тип подшипника моталки для пряжи
      description: Тип механизма вращения моталки (например, шариковый подшипник).
    yeast_application:
      name: Применение дрожжей
      description: Основное кулинарное или ферментационное назначение дрожжей.
    yo_yo_accessory_part_type:
      name: Тип аксессуара или детали йо-йо
      description: Тип запасной части или аксессуара йо-йо (например, шнур, подшипник,
        респонс-пады).
    yo_yo_axle_system_type:
      name: Тип оси йо-йо
      description: Конструкция осевой системы йо-йо (фиксированная или трансмиссионная).
        Влияет на ощущения от игры и техническое обслуживание.
    yo_yo_bearing_size_class:
      name: Класс размера подшипника йо-йо
      description: Стандартизированный размер подшипника йо-йо.
    yo_yo_bearing_type:
      name: Тип подшипника йо-йо
      description: Тип подшипника, влияющий на отзывчивость и вращение.
    yo_yo_play_style:
      name: Стиль игры йо-йо
      description: Основной стиль игры йо-йо, отражающий направление трюков, для которого
        предназначен товар.
    yo_yo_response_system:
      name: Система возврата йо-йо
      description: Механизм срабатывания йо-йо, для которого предназначена данная
        деталь (совместимость).
    yo_yo_responsiveness:
      name: Отзывчивость йо-йо
      description: Возвращается ли йо-йо рывком (отзывчивое) или его нужно потянуть
        (неотзывчивое).
    yo_yo_string_material:
      name: Материал нити йо-йо
      description: Состав материала нити йо-йо.
    yogurt_base_ingredient:
      name: Основа йогурта
      description: Основной ингредиент — молоко или растительный ингредиент, используемый
        для приготовления йогурта. Имеет решающее значение с точки зрения диетических
        предпочтений и учета аллергенов.
    yoke_type:
      name: Тип вилки/опоры
      description: Тип вилки или опоры, удерживающей оружие на моноподе.
    zill_playing_style:
      name: Стиль игры на зиллах
      description: Контекст или стиль использования (например, восточный танец или
        оркестровое применение).
    zill_strap_material:
      name: Материал ремня зиллов
      description: Материал пальцевого ремешка или резинки для крепления зиллов (если
        они входят в комплект). Влияет на комфорт, долговечность и надежность удержания.
    zills_strap_adjustability:
      name: Регулируемость ремешка зиллов
      description: Возможность регулировки ремешка или резинки для обеспечения удобной
        посадки.
    zipper_application:
      name: Применение молнии
      description: Назначение застежки-молнии.
    zipper_chain_type:
      name: Тип цепи молнии
      description: Конструкция цепи молнии (спиральная, металлическая, пластиковая
        и т. п.).
    zipper_end_type:
      name: Тип окончания молнии
      description: Тип окончания молнии (разъемная или неразъемная, в том числе типичные
        разъемные застежки, используемые в молниях для рукоделия).
    zipper_gauge:
      name: Калибр молнии
      description: 'Размер зубчатой цепи молнии, который обычно обозначается цифрой
        с символом # (например, #3 или #5) и соответствует ширине зубца/спирали, а
        также назначению изделия.'
    zipper_opening_length:
      name: Длина открытия молнии
      description: Часть переднего отверстия, которая застегивается на молнию. Позволяет
        отличить модели с полной застежкой-молнией от моделей с половинной или четвертной.
    zipper_pull_material:
      name: Материал бегунка молнии
      description: Материал бегунка или язычка молнии (та часть, за которую ее берут)
        (отличается от зубчиков/цепочки и ленты).
    zipper_pull_side:
      name: Сторона язычка молнии
      description: Сторона, с которой доступен бегунок молнии.
    zipper_pull_strap_cord_tab_material:
      name: Материал язычка или шнура молнии
      description: Материал шнура, язычка или кисточки, прикрепленных к бегунку молнии,
        при наличии (за исключением основной металлической части бегунка).
    zipper_reversibility_mechanism:
      name: Механизм реверсивности молнии
      description: Механизм двустороннего использования молнии (например, двухсторонний
        бегунок или бегунок с перекидной конструкцией/автоблокировкой, предназначенный
        для двусторонней одежды).
    zipper_separating_type:
      name: Тип разъемной молнии
      description: 'Тип молнии: расстегивается снизу/сверху или имеет закрытый конец.
        Помогает определить, подходит ли молния к курткам, спальным мешкам, сумкам
        и т. п.'
    zipper_side:
      name: Сторона молнии
      description: Сторона расположения основной молнии, когда спальный мешок лежит
        лицевой стороной вверх.
    zipper_slider_material:
      name: Материал бегунка молнии
      description: Материал бегунка молнии (подвижного механизма). Может влиять на
        прочность и коррозионную стойкость.
    zipper_slider_pull_configuration:
      name: Конфигурация бегунков молнии
      description: Количество бегунков на молнии (один или два), а также расположение
        язычков (с одной или с обеих сторон бегунка).
    zipper_style:
      name: Стиль молнии
      description: Длина или наличие молнии на изделии (например, без молнии, с четвертью
        молнии, с половиной молнии, с полной молнией).
    zipper_tape_material:
      name: Материал тесьмы молнии
      description: Основной материал тесьмы молнии (тканевые части), вшитой в изделие.
    zipper_teeth_type:
      name: Тип зубьев молнии
      description: Конструкция цепочки/зубцов молнии (например, спиральная, из литого
        пластика, металлическая, потайная). Влияет на гибкость, прочность и типичные
        области применения.
