    wax_blend_composition:
      name: Состав восковой смеси
      description: Перечень компонентов восковой смеси или заявленный тип смеси.
    wax_coat_type:
      name: Тип воскового покрытия
      description: 'Назначение воска: базовый слой, финишный слой или универсальный
        вариант.'
    wax_hardness:
      name: Твердость воска
      description: Относительная твердость воска, влияющая на износостойкость и скольжение.
    wax_physical_form:
      name: Физическая форма воска
      description: Физическая форма поставки сырого свечного воска.
    wax_recommended_candle_application:
      name: Рекомендуемое применение воска для свечей
      description: Основные типы свечей, для которых предназначен воск.
    wax_tackiness_level:
      name: Уровень липкости воска
      description: Степень сцепления или липкости воска на лезвии.
    weapon_system_integration:
      name: Интеграция оружейной системы
      description: Наличие встроенных систем вооружения или креплений.
    weather_suitability:
