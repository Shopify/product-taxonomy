    cross_stitch_frame_included_components:
      name: Компоненты в комплекте с пяльцами для вышивки крестиком
      description: Содержимое упаковки (например, только пяльцы или пяльцы + зажимы
        + подставка). Снижает количество вопросов и возвратов.
    cross_stitch_frame_type:
      name: Тип пялец для вышивки крестиком
      description: Конструкция/тип пялец для вышивки крестиком (способ удержания ткани).
        Влияет на удобство использования и совместимость с проектом.
    cross_stitch_pattern_technique:
      name: Техника схемы вышивки крестиком
      description: Техника/стиль вышивки крестиком, необходимые для схемы.
    crossbar_shape_profile:
