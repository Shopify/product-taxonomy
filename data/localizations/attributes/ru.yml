      name: Размещение накладки на ремень безопасности
      description: Расположение чехла на ремне безопасности.
    seat_belt_integration:
      name: Интеграция с ремнем безопасности
      description: Наличие у сиденья встроенного ремня безопасности и/или приемной
        части замка либо необходимость переноса штатной приемной части замка автомобиля
        для установки.
    seat_belt_provision:
      name: Комплектация ремнем безопасности
      description: Наличие ремней безопасности и/или связанной с ними фурнитуры (например,
        замков) в комплекте с задним сиденьем либо необходимость переноса с оригинального
        сиденья.
    seat_belt_strap_installation_location:
      name: Место установки ленты ремня безопасности
      description: Место установки ленты в системе ремня безопасности.
    seat_cover_placement:
      name: Размещение чехла сиденья
      description: Положение сиденья или сидений в автомобиле, для которых предназначен
        чехол.
    seat_cover_securement_method:
      name: Способ крепления чехла сиденья
      description: Основной способ крепления чехла к сиденью. Основной или главный
        способ, если их несколько.
    seat_cover_set_contents:
      name: Содержимое комплекта чехлов сиденья
      description: Элементы, входящие в комплект поставки (например, только нижние
        части сидений или полный комплект сидений с подголовниками).
    seat_fabric:
      name: Ткань сиденья
      description: Основная ткань, используемая для полотна сиденья и спинки стула.
    seat_height_category:
      name: Категория высоты сиденья
      description: Классификация табурета по типичному диапазону высоты сиденья (например,
        высота для стойки или барная высота). Помогает упростить выбор.
    seat_material:
      name: Материал сиденья
      description: Основной материал поверхности сиденья скамьи.
    seat_mounting_type:
      name: Тип крепления сиденья
      description: Конфигурация крепления или направляющих, используемая для установки
        сиденья на пол автомобиля.
    seating_surface_material:
      name: Материал поверхности сиденья
      description: Материал поверхности, на которую опирается человек в полулежачем
        положении (например, сетка Textilene, натяжная ткань, плетение, мягкая обивка).
    seatpost_clamp_mechanism:
      name: Механизм зажима подседельного штыря
      description: Тип зажимной или запирающей системы, фиксирующей подседельный штырь.
    section_orientation_compatibility:
      name: Совместимость с ориентацией секции
      description: Совместимость аксессуара с секцией левой ориентации, правой ориентации
        или универсальной ориентации.
    sectional_configuration:
      name: Конфигурация модульного дивана
      description: Конкретный модуль или ориентация секции модульного дивана (например,
        угловая секция, крайняя секция с левым подлокотником, кушетка). Помогает покупателям
        собирать нужные компоновки.
    sectional_shape:
      name: Форма модульного дивана
      description: Общая геометрическая конфигурация или компоновка модульного дивана.
    secured_components:
      name: Закрепленные компоненты
      description: Конкретные велосипедные детали, которые защищают запирающий эксцентрик
        или защитные гайки (например, переднее колесо, заднее колесо, подседельный
        штырь).
    seed_content:
      name: Содержание семян
      description: 'Наличие семян в цитрусовом фрукте: без семян, с небольшим количеством
        семян или с полным содержанием семян.'
    seed_size_classification:
      name: Классификация размера семян
      description: Относительный размер несъедобной косточки внутри личи. Влияет на
        количество съедобной мякоти.
    self_adhesive_backing_format:
      name: Формат самоклеящейся основы
      description: Физический формат клеевой основы, поставляемой с держателем фитиля
        (предварительно нанесенная подушечка или отдельные наклейки и т. д.).
    self_adhesive_hook_loop_backing_type:
      name: Тип основы самоклеящейся текстильной застежки
      description: Конструкция основы или защитного слоя и клеевая система, используемые
        на самоклеящейся стороне.
    self_adhesive_hook_loop_fastener_shape:
      name: Форма самоклеящейся текстильной застежки
      description: Форма выреза или форма входящих в комплект элементов застежки.
    self_hardening_clay_finish:
      name: Отделка самозатвердевающей глины
      description: Внешний вид или степень блеска поверхности после полного затвердевания
        (полезно для выбора между натуральной матовой, сатиновой и т. д.).
    self_hardening_clay_water_resistance_after_curing:
      name: Водостойкость самозатвердевающей глины после затвердевания
      description: Стойкость к воздействию воды после полного затвердевания (без дополнительного
        герметика).
    sensor_functions:
      name: Функции датчика
      description: Велосипедные показатели, которые измеряет датчик.
    sensor_measurement_mode:
      name: Режим измерения датчика
      description: Показатели, фиксируемые датчиком (например, только каденс, только
        скорость, одновременно скорость и каденс).
    sensor_mounting_position:
      name: Позиция крепления датчика
      description: Место установки датчика на велосипеде или на райдере, например
        шатун, втулка колеса или обувь. Влияет на совместимость с различными конфигурациями
        велосипедов.
    sensor_mounting_type:
      name: Тип крепления датчика
      description: Способ крепления MAP-датчика к впускному коллектору или двигателю
        (например, фланец на болтах или вставка в резиновую втулку).
    sensor_or_gauge_mounting_location:
      name: Место установки датчика или прибора
      description: Место на автомобиле, где предполагается установка датчика или прибора
        (уровень системы или зоны, а не левая или правая сторона).
    sensory_modality:
      name: Сенсорная модальность
      description: Основной сенсорный опыт или сенсорные ощущения, для которых предназначена
        игрушка (возможно сочетание нескольких модальностей).
    sensory_toy_fidget_mechanism:
      name: Механизм антистресса сенсорной игрушки
      description: Основной способ взаимодействия или механизм для антистрессового
        использования и саморегуляции.
    sensory_toy_light_features:
      name: Световые функции сенсорной игрушки
      description: Световые режимы или эффекты, предусмотренные в игрушке.
    sensory_toy_texture_type:
      name: Тип текстуры сенсорной игрушки
      description: Основные тактильные ощущения или элементы текстуры поверхности,
        используемые для тактильной стимуляции.
    sequin_application_method:
      name: Метод нанесения пайеток
      description: Способ применения пайетки (пришивание, приклеивание, термофиксация
        и т. д.).
    sequin_finish:
      name: Отделка пайеток
      description: Отделка поверхности, визуальный эффект и отражающий эффект пайеток,
        используемых на нашивке (например, матовые, металлические, голографические)
        (не основа нашивки и не способ крепления).
    serger_stitch_functions:
      name: Функции строчек оверлока
      description: Функции строчек, поддерживаемые оверлоком (варианты оверлочной
        или краеобметочной строчки и специальные оверлочные строчки).
    serger_thread_count:
      name: Количество нитей оверлока
      description: Количество нитей, которое оверлок может использовать для шитья
        (например, поддержка 2, 3, 4 или 5 нитей).
    service_interval:
      name: Интервал обслуживания
      description: Рекомендуемый максимальный интервал времени между обязательными
        проверками или обслуживанием в авторизованном сервисном центре.
    serving_temperature:
      name: Температура подачи
      description: Предусмотренная температура подачи или состояние продукта при употреблении.
    sesame_seed_hull_status:
      name: Наличие шелухи у кунжутных семян
      description: Наличие или отсутствие шелухи у кунжутных семян, из которых изготовлен
        тахини. Влияет на цвет, вкус и пищевую ценность.
    sesame_seed_roast_level:
      name: Степень обжарки кунжутных семян
      description: Степень обжарки кунжутных семян перед измельчением. Помогает покупателям
        выбрать предпочтительную интенсивность вкуса.
    sesame_seed_variety:
      name: Разновидность кунжутных семян
      description: Цвет или разновидность кунжутных семян, используемых для изготовления
        масла.
    set_classification:
      name: Классификация набора
      description: Предполагаемый уровень игры или стиль набора для крокета (например,
        турнирный, любительский, дорожный).
    set_components:
      name: Компоненты набора
      description: Предметы, входящие в комплект товара (например, только центральная
        палка или полный набор).
    set_items_included:
      name: Элементы набора
      description: Предметы одежды или аксессуары, входящие в комплект, например ткань
        для сари, дупатта или пояс.
    setup_mechanism:
      name: Механизм установки
      description: Основной способ установки палатки (например, самораскрывающаяся,
        надувная/с пневматическими баллонами, складная с крышей).
    setup_type:
      name: Тип установки
      description: Способ сборки или установки игровой палатки или туннеля.
    sew_in_interfacing_elasticity:
      name: Эластичность вшивной прокладки
      description: Растяжимость вшивной прокладки и ее направление (если она предусмотрена).
        Помогает подобрать прокладку для трикотажных или тканых изделий.
    sew_in_label_placement:
      name: Место вшивания ярлыка
      description: Предполагаемое место размещения на готовом изделии.
    sew_on_edge_finish:
      name: Отделка края пришивной застежки
      description: 'Тип краев текстильное застежки: необработанные/обрезанные или
        обработанные для предотвращения расслоения.'
    sew_on_rhinestone_hole_orientation:
      name: Ориентация отверстий пришивного страза
      description: Расположение или ориентация отверстий относительно камня (например,
        рядом, напротив друг друга, крестом). Поддерживает разные стили пришивания.
    sewing_kit_components_included:
      name: Состав швейного набора
      description: Швейные принадлежности или инструменты, входящие в швейный набор.
        Помогает покупателям сравнивать состав разных наборов.
    sewing_machine_bobbin_class:
      name: Класс шпульки швейной машины
      description: Класс или система шпульки, совместимые со швейной машиной для шпулек
        и шпульных колпачков.
    sewing_machine_buttonhole_type:
      name: Тип петли швейной машины
      description: Способ выполнения петли, поддерживаемый машиной.
    sewing_machine_display_type:
      name: Тип дисплея швейной машины
      description: Тип интерфейса управления или отображения на швейной машине.
    sewing_machine_needle_point_type:
      name: Тип острия иглы швейной машины
      description: Геометрия или тип острия иглы, определяющие способ проникновения
        в разные ткани (например, острое, шариковое, клиновидное).
    sewing_machine_needle_system:
      name: Система игл швейной машины
      description: Стандартизированная система иглы или номер модели, определяющие
        совместимость с машиной (часто указывается как 130/705 H, HAx1, DBx1, 15x1
        и т. д.).
    sewing_machine_needle_type:
      name: Тип иглы швейной машины
      description: Назначение или стиль иглы (например, универсальная, шариковая,
        для джинсовой ткани). Влияет на качество строчки и пригодность для разных
        тканей.
    sewing_machine_shank_type:
      name: Тип хвостовика иглы
      description: Стандарт интерфейса хвостовика или держателя прижимной лапки, для
        которого предназначена лапка. Обеспечивает совместимость со швейной машиной
        (например, низкий штифт, высокий штифт, наклонный штифт).
    sewing_pattern_accessory_type:
      name: Тип аксессуара по выкройке
      description: Аксессуар, который изготавливается по выкройке.
    sewing_pattern_notions_required:
      name: Необходимая фурнитура для выкройки
      description: Дополнительные материалы или фурнитура, необходимые для завершения
        проекта (помимо ткани и ниток).
    sewing_pattern_recommended_fabric:
      name: Рекомендуемая ткань для выкройки
      description: Рекомендуемые типы или плотность ткани для этой выкройки (согласно
        указанию автора выкройки).
    sewing_pattern_size_range:
      name: Размерный диапазон выкройки
      description: Размерный диапазон, охватываемый выкройкой (например, от детских
        до взрослых, plus size).
    sewing_thread_size_system:
      name: Система размеров швейной нити
      description: Стандарт обозначения размера нити (например, Tex, Denier, Ticket,
        весовой номер, размер V).
    shaft_curvature:
      name: Кривизна древка
      description: Общая форма древка. Влияет на зазор, замах и эргономику.
    shaft_kick_point:
      name: Точка прогиба древка
      description: Положение на древке, в котором возникает наибольший изгиб во время
        замаха. Влияет на траекторию полета мяча.
    shaft_length_type:
      name: Тип длины вала
      description: Отраслевое стандартное категориальное обозначение размера хвостовиков
        для дротиков (например, Short, Medium), используемое при отсутствии точных
        размеров в миллиметрах.
    shaft_shape:
      name: Форма вала
      description: Профиль поперечного сечения вала тонфы (например, круглый, квадратный,
        восьмигранный).
    shaker_fill_material:
      name: Материал наполнителя шейкера
      description: Основной внутренний наполнитель, используемый для создания звука
        шейкера (если применимо), например бусины, семена или дробь.
    shaker_shell_material:
      name: Материал корпуса шейкера
      description: Основной материал корпуса или оболочки яйцеобразного шейкера (внешней
        части).
    shallot_variety:
      name: Разновидность шалота
      description: Конкретный сорт, рыночный тип или разновидность продукта из шалота.
    shank_style:
      name: Стиль щечек мундштука
      description: Общая форма или конфигурация щечек мундштука (например, прямые,
        изогнутые, скошенные).
    shapewear_enhancement_feature:
      name: Функция корректирующего эффекта
      description: Основной функциональный эффект, обеспечиваемый изделием (например,
        утяжка живота, приподнимание ягодиц, непротекающая подкладка).
    sheath_type:
      name: Тип ножен
      description: Тип ножен, входящих в комплект с коллекционным ножом.
    sheet_music_clip_padding_material:
      name: Материал накладок зажима для нот
      description: Материал накладок на губках или зажимной части, соприкасающихся
        с бумагой или кромкой пюпитра для предотвращения разрывов и соскальзывания.
    sheet_music_clip_spring_tension_level:
      name: Уровень натяжения пружины зажима для нот
      description: Относительная сила пружины зажима или зажимного усилия.
    sheet_music_clip_use_environment:
      name: Среда использования зажима для нот
      description: Основные условия использования, в которых зажим рассчитан работать
        наилучшим образом.
    shell_construction:
      name: Конструкция корпуса
      description: Способ конструкции корпуса бас-барабана. Сильно влияет на звучание
        и вес.
    shell_finish:
      name: Отделка корпуса
      description: Внешняя отделка корпуса думбека.
    shell_hull_status:
      name: Наличие скорлупы или оболочки
      description: Наличие или отсутствие скорлупы или оболочки у орехов или семян
        при продаже.
    shift_boot_attachment_method:
      name: Способ крепления чехла рычага переключения передач
      description: Способ крепления чехла рычага переключения передач к консоли автомобиля
        или отделке селектора (например, декоративная рамка на защелках, фиксирующее
        кольцо, клей).
    shift_boot_installation_hardware_included:
      name: Входящий в комплект крепеж для установки чехла рычага переключения передач
      description: Крепеж и компоненты, входящие в комплект с чехлом рычага переключения
        передач.
    shift_knob_illumination:
      name: Подсветка рукоятки переключения передач
      description: Наличие подсветки у рукоятки переключения передач и ее тип (например,
        фотолюминесцентная, LED, оптоволоконная, узор с подсветкой).
    shift_knob_installation_method:
      name: Способ установки рукоятки переключения передач
      description: Способ крепления рукоятки переключения передач к селектору или
        рычагу.
    shift_knob_shape:
      name: Форма рукоятки переключения передач
      description: Общий эргономичный формфактор рукоятки переключения передач.
    shift_pattern_type:
      name: Тип схемы переключения передач
      description: Стиль обозначения передач на рукоятке переключения передач (если
        предусмотрено).
    shifter_compatibility:
      name: Совместимость переключателя
      description: Совместимость удлинителя руля с электронными переключателями, механическими
        переключателями, обоими вариантами или отсутствие совместимости с переключателями.
    shifter_mounting_interface:
      name: Интерфейс крепления переключателя
      description: Способ крепления переключателя к велосипеду (например, отдельный
        размер хомута, I-Spec, MatchMaker, крепление на руле, на нижней трубе, беспроводное
        соединение).
    shifting_actuation_type:
      name: Тип привода переключения
      description: Механизм, используемый для переключения передач в группе компонентов
        (механический, проводной электронный, беспроводной электронный, гидравлический).
    shifting_mechanism:
      name: Механизм переключения
      description: 'Тип работы переключателя: механический или электронный, а также
        индексный или фрикционный.'
    shim_purpose:
      name: Назначение регулировочной проставки
      description: Функциональный тип изделия (например, прокладка, клиновидная вставка,
        распорка). Помогает велосипедистам быстро найти подходящее решение для регулировки
        без необходимости в отдельных подкатегориях.
    shin_guard_attachment_method:
      name: Способ крепления щитков на голень
      description: Общий формат конструкции щитка на голень, включая интеграцию защиты
        голеностопа или конструкцию в виде носка.
    shirt_cuff_style:
      name: Стиль манжеты рубашки
      description: Конструкция манжеты рукава. Влияет на формальность, совместимость
        с запонками и комфорт.
    shochu_base_ingredient:
      name: Базовый ингредиент сётю
      description: Основной источник крахмала или сахара, используемый для производства
        сётю.
    shochu_soju_variety:
      name: Сорт сётю и соджу
      description: Классификация продукта по признанному стилю или типу производства.
    shock_absorber_bushing_material:
      name: Материал втулок амортизатора
      description: Материал монтажных втулок или изоляторов, входящих в комплект с
        амортизатором или встроенных в него.
    shock_absorber_charge_type:
      name: Тип наполнения амортизатора
      description: Технология наполнения или демпфирования амортизатора (например,
        гидравлическая/масляная, газонаполненная, воздушная) и/или связанная с ней
        конструкция трубки, если применимо.
    shock_absorber_mount_type_lower:
      name: Тип крепления амортизатора (нижнего)
      description: Стиль нижнего монтажного интерфейса амортизатора для подбора совместимости.
    shock_absorber_mount_type_upper:
      name: Тип верхнего крепления амортизатора
      description: Стиль верхнего монтажного интерфейса амортизатора транспортного
        средства для подбора совместимости.
    shock_absorber_position:
      name: Положение амортизатора
      description: 'Предназначенное положение амортизатора на автомобиле: переднее,
        заднее, левое или правое (более детально, чем только по оси).'
    shock_absorption_system:
      name: Система амортизации
      description: Механизм, используемый для снижения вибрации и шума при отскоке.
    shoe_collar_height:
      name: Высота берца обуви
      description: Классификация обуви по высоте берца или выреза (низкая, средняя,
        высокая). Указывает на степень охвата и поддержки голеностопа.
    shoe_cover_height:
      name: Высота чехла для обуви
      description: Степень покрытия велочехла для обуви с различением моделей для
        носка и полноразмерных высоких бахил.
    shoe_sizing_system:
      name: Система размеров обуви
      description: Стандарт размеров (US, UK, EU, JP, Mondopoint и т. д.), используемый
        для указанного размера обуви.
    shoelace_aglet_material:
      name: Материал наконечников шнурков
      description: Материал наконечников шнурков. Влияет на долговечность и стиль.
    shooting_rest_design:
      name: Конструкция упора для стрельбы
      description: Конструктивный стиль упора (мешочный упор, салазки, тренога, тиски
        для оружия и т. д.).
    shooting_stick_yoke_design:
      name: Конструкция вилки стрелковой опоры
      description: Стиль опорной люльки или вилки, контактирующей с огнестрельным
        оружием или оптикой.
    shooting_target_style:
      name: Стиль стрелковой мишени
      description: Стиль или конструкция мишеней для бросков в фигурном катании и
        хоккее. Помогает покупателям выбрать нужный тренировочный акцент.
    shooting_target_type:
      name: Тип стрелковой мишени
      description: Классификация стрелковых мишеней по конструктивному стилю, материалу
        или конструкции (например, гонг, силуэт, бумажная мишень, вращающаяся мишень).
        Помогает стрелкам быстро найти подходящую мишень для своей дисциплины и типа
        оружия.
    short_block_assembly_balance_type:
      name: Тип балансировки шорт-блока
      description: 'Тип балансировки вращающегося узла: внутренняя или внешняя.'
    short_block_intended_use:
      name: Предполагаемое назначение шорт-блока
      description: Основной предполагаемый сценарий использования шорт-блока.
    short_block_rotating_assembly_included:
      name: Входящий в комплект вращающийся узел шорт-блока
      description: Основные компоненты вращающегося узла, входящие в комплект с шорт-блоком.
    shot_size:
      name: Размер дроби
      description: Обозначение размера дроби для рассыпной дроби или компонентов боеприпасов.
    shotgun_action_type:
      name: Тип механизма дробовика
      description: Рабочий механизм или тип действия дробовика.
    shotgun_choke_type:
      name: Тип чока дробовика
      description: Конфигурация чока ствола или стволов дробовика.
    shotgun_gauge:
      name: Калибр дробовика
      description: Калибр ствола дробовика (и отверстие .410, где это применимо).
        Для идентификации и фильтрации предметов коллекционирования.
    shotgun_stock_material:
      name: Материал ложи дробовика
      description: Основной материал приклада/цевья (деталей).
    shuffleboard_speed_rating:
      name: Скоростная категория для шаффлборда
      description: Относительная скорость скольжения, обеспечиваемая порошком для
        шаффлборда или другим средством ухода на поверхности стола. Помогает игрокам
        выбрать подходящую скорость в зависимости от уровня навыков и длины стола.
    shuffleboard_table_length_compatibility:
      name: Совместимость с длиной стола для шаффлборда
      description: Стандартная длина стола для шаффлборда, для которой изделие предназначено
        или с которой сочетается.
    shuttlecock_base_material:
      name: Материал основания волана
      description: Материал головки или основания волана. Влияет на долговечность,
        ощущения и отскок.
    shuttlecock_feather_material:
      name: Материал юбки волана
      description: Основной источник пера или тип конструкции, используемый для юбки
        волана. Влияет на долговечность, стабильность и цену.
    shuttlecock_grade:
      name: Класс волана
      description: Предполагаемый уровень игры или классификация качества (например,
        тренировочный, клубный, соревновательный).
    shuttlecock_speed_rating:
      name: Рейтинг скорости волана
      description: Скорость или рейтинг волана по обозначению производителя. Позволяет
        игрокам выбрать подходящую скорость полета для своих условий игры, температуры
        и высоты над уровнем моря.
    side_panel_installation_state:
      name: Состояние боковой панели для установки
      description: 'Состояние поставки боковой панели: без покрытия, загрунтованная,
        окрашенная или иным образом подготовленная к установке.'
    side_wall_mechanism:
      name: Механизм боковой стенки
      description: Способ открытия или опускания прикроватной стенки люльки для доступа
        к ребенку.
    signal_source:
      name: Источник сигнала
      description: Способ получения или вычисления информации о расстоянии или времени
        одометром.
    silk_fiber_type:
      name: Тип шелкового волокна
      description: Тип или происхождение шелкового волокна, используемого для изготовления
        ткани (например, тутовый или тусса). Влияет на текстуру, однородность и цену.
    simulated_game_species:
      name: Имитируемый вид дичи
      description: Конкретный вид охотничьей птицы или животного, который имитирует
        тренировочный муляж для реалистичной дрессировки.
    singlet_cut_style:
      name: Стиль кроя трико
      description: Крой или стиль борцовского трико с учетом высоты бретелей, стиля
        спины и вариантов для пола или возраста.
    sink_material:
      name: Материал раковины
      description: Материал встроенной раковины или раковин в комплекте тумбы.
    sinker_attachment_style:
      name: Стиль крепления грузила
      description: Механизм, предусмотренный на донном грузиле для крепления к леске
        или оснастке.
    sinker_finish:
      name: Отделка грузила
      description: Внешнее покрытие или обработка поверхности грузила.
    sinker_shape:
      name: Форма грузила
      description: Геометрическая форма грузила (например, «пуля», «цилиндр», «капля»).
        Помогает рыболовам выбрать оптимальную подачу и устойчивость к зацепам.
    siren_system_included:
      name: Входящая в комплект сиренная система
      description: Наличие установленной сирены или системы громкой связи, а также
        ее тип.
    siren_system_type:
      name: Тип сирены
      description: Конфигурация установленной сирены или системы громкой связи на
        полицейском грузовике.
    size_designation:
      name: Обозначение размера
      description: Стандартизированное обозначение размера для музыкального треугольника.
    size_system:
      name: Система размеров
      description: Система размеров или региональный стандарт, которому соответствует
        обозначение размера (например, US, UK, EU, International letter).
    sizzle_mechanism:
      name: Механизм шипения
      description: Способ создания тарелкой эффекта шипения (например, заклепки, установленные
        в тарелке, съемная цепочка и т. п., либо отсутствие дополнительной фурнитуры
        в комплекте).
    skate_blade_discipline:
      name: Дисциплина конькового лезвия
      description: Дисциплина катания или назначение, для которых предназначено лезвие,
        например хоккей или фигурное катание. Помогает покупателям отфильтровать подходящие
        лезвия.
    skate_brake_type:
      name: Тип тормоза роликовых коньков
      description: Стиль тормозного механизма, входящего в комплект с коньками.
    skateboard_nut_thread_size:
      name: Размер резьбы гайки для скейтборда
      description: Размер резьбы гайки (диаметр и шаг), обеспечивающий совместимость
        с осями, шкворнями или монтажной фурнитурой скейтборда.
    skein_winder_bearing_bushing_type:
      name: Тип подшипника или втулки моталки для пасм
      description: Тип подшипника или втулки, используемый во вращающемся узле моталки
        для пасм.
    skein_winder_drive_type:
      name: Тип привода моталки для пасм
      description: Способ приведения в действие или вращения моталки для пасм во время
        использования.
    ski_binding_mechanism:
      name: Механизм лыжного крепления
      description: Базовая механическая конструкция или дисциплина крепления (например,
        горные, технические/со штифтами, телемарк).
    ski_binding_part_type:
      name: Тип детали лыжного крепления
      description: Конкретный компонент или аксессуар для лыжных креплений. Обеспечивает
        быструю фильтрацию по множеству типов деталей.
    ski_boot_sole_standard:
      name: Стандарт подошвы лыжного ботинка
      description: Норматив подошвы или стандарт совместимости с креплениями, по которому
        сертифицирован лыжный ботинок.
    skill_focus:
      name: Фокус навыка
      description: Основной баскетбольный навык, для развития которого предназначен
        тренировочный инвентарь.
    skimboard_construction:
      name: Конструкция скимборда
      description: Основная конструкция доски с акцентом на сердечник и технологию
        слоев (например, сердечник из пены, деревянный сердечник).
    skin_presence:
      name: Наличие кожи
      description: 'Наличие кожи у курицы при продаже: с кожей, без кожи или с частично
        удаленной кожей.'
    slapstick_handle_type:
      name: Тип ручки slapstick
      description: Стиль хвата или ручки, встроенной в slapstick. Влияет на эргономику
        и комфорт игры.
    slapstick_playing_surface_material:
      name: Материал игровой поверхности slapstick
      description: Материал ударных элементов, которые соприкасаются друг с другом
        для создания звука.
    sled_brake_type:
      name: Тип тормоза саней
      description: Тормозной механизм, предусмотренный на санках, если имеется.
    sled_towing_method:
      name: Способ буксировки санок
      description: Основной способ тяги или буксировки санок.
    sleep_position_suitability:
      name: Подходящая поза для сна
      description: Положения сна, наиболее эффективно поддерживаемые матрасом.
    sleeping_bag_shape:
      name: Форма спального мешка
      description: Общий крой спального мешка. Влияет на теплоизоляцию, вес и просторность.
    sleeping_pad_type:
      name: Тип спального коврика
      description: Конструктивный тип коврика, например из пены с закрытыми порами
        или надувной воздушный. Напрямую влияет на комфорт, вес и теплоизоляцию.
    sleepwear_set_pieces_included:
      name: Состав набора домашней одежды
      description: Отдельные элементы, входящие в многокомпонентный комплект одежды
        для сна или домашней одежды.
    sleeve_bearing_type:
      name: Тип подшипников втулки
      description: Технология, обеспечивающая вращение втулки. Влияет на качество
        вращения при олимпийских подъемах.
    sleeve_style:
      name: Стиль рукава
      description: Стиль рукава помимо длины (например, реглан).
    slide_board_accessories_included:
      name: Входящие в комплект аксессуары для слайдборда
      description: Дополнительные предметы, входящие в комплект со слайдбордом. Помогает
        покупателям точно понять состав и сравнить наборы.
    slide_installation_type:
      name: Тип установки горки
      description: Способ установки или монтажа горки (отдельно стоящая, прикрепляемая
        к игровому комплексу и т. д.).
    slide_intended_finger:
      name: Предназначенный палец для слайда
      description: Палец, на котором предполагается ношение слайда, либо неприменимость
        этого параметра (например, для тональной планки).
    slide_safety_features:
      name: Защитные особенности горки
      description: Конструктивные элементы безопасности, предусмотренные на горке.
    slide_type:
      name: Тип слайда
      description: Тип или типы слайдового механизма духового инструмента, для очистки
        которых предназначено изделие.
    slide_water_use_capability:
      name: Возможность использования горки с водой
      description: Возможность использования горки с водой (например, с подключением
        шланга) и соответствующий способ.
    slime_putty_kit_components_included:
      name: Компоненты набора для создания слаймов и пластилина
      description: Инструменты и добавки, входящие в комплект со слаймом или пластичной
        массой (особенно для наборов и комплектов).
    sling_material:
      name: Материал стропы
      description: Волокно или текстиль, используемые в стропе карабина (dog-bone).
    smith_machine_bar_path:
      name: Траектория штанги тренажера Смита
      description: Фиксированная траектория движения штанги. Информирует пользователей
        о биомеханике и требованиях к пространству.
    smoke_color:
      name: Цвет дыма
      description: Цвет дыма, создаваемого фальшфейером или дымовым сигналом (отличается
        от цвета корпуса изделия).
    smoked_malt_smoking_material:
      name: Материал для копчения солода
      description: Материал, используемый при копчении копченого солода (например,
        определенная порода древесины или торф).
    snack_mix_variety:
      name: Разновидность снековой смеси
      description: Классификация продукта по стилю смеси (например, «трейл-микс»,
        ореховая смесь, намкин, сев).
    snack_processing_method:
      name: Метод обработки снека
      description: Основной способ обработки или консервирования, используемый для
        изготовления снека (например, сублимационная сушка, запекание, обжаривание).
    snack_texture:
      name: Текстура снека
      description: Консистенция при укусе или ощущения во рту от кунжутных палочек.
    snap_installation_method:
      name: Метод установки кнопки
      description: Способ установки или крепления кнопки к материалу изделия.
    snare_drum_bearing_edge_profile:
      name: Профиль опорной кромки малого барабана
      description: Срез или профиль опорной кромки корпуса малого барабана.
    snare_drum_finish_type:
      name: Тип отделки малого барабана
      description: Общий тип конструкции или отделки, используемый для корпуса малого
        барабана.
    snare_drum_hoop_type:
      name: Тип обода малого барабана
      description: Тип ободов малого барабана.
    snare_drum_mounting_type:
      name: Тип крепления малого барабана
      description: Способ установки или использования малого барабана.
    snare_drum_shell_material:
      name: Материал корпуса малого барабана
      description: Металл или сплав, используемые для корпуса малого барабана (основной
        части). Сильно влияют на звучание, вес и долговечность.
    snare_drum_strainer_mechanism:
      name: Механизм машинки малого барабана
      description: Тип механизма натяжения/отключения струн малого барабана.
    snare_drum_strainer_type:
      name: Тип машинки малого барабана
      description: Тип механизма натяжения/отключения струн малого барабана.
    snare_hoop_type:
      name: Тип обруча малого барабана
      description: Тип обручей на малом барабане.
    snare_throw_off_type:
      name: Тип сбросного механизма малого барабана
      description: Тип машинки или сбросного механизма, используемого для включения
        или отключения подструнника.
    snip_cutter_spring_mechanism:
      name: Пружинный механизм ножниц-кусачек
      description: Наличие пружинного или возвратного механизма у ножниц-кусачек и
        его тип.
    snorkel_mount_position:
      name: Положение крепления трубки
      description: Положение трубки на голове пользователя во время использования.
    snorkel_top_type:
      name: Тип верхней части трубки
      description: Стиль защиты от попадания воды в верхней части трубки, входящей
        в комплект.
    snow_condition_suitability:
      name: Пригодность для состояния снега
      description: Основные снежные условия, для которых предназначена мазь.
    snow_sports_helmet_safety_certification:
      name: Сертификация безопасности шлема для зимних видов спорта
      description: Стандарты безопасности, которым соответствует шлем для использования
        в лыжном спорте и сноубординге.
    snowboard_base_material:
      name: Материал скользящей поверхности сноуборда
      description: Состав или отделка скользящей поверхности (экструдированные, спеченные
        марки, запатентованные рецептуры). Влияет на скорость, долговечность и уход.
    snowboard_width_class:
      name: Класс ширины сноуборда
      description: Классификация общей ширины доски относительно размера ботинка (например,
        стандартная, широкая).
    soccer_ball_compartment_type:
      name: Тип отделения для футбольного мяча
      description: Способ размещения футбольного мяча в рюкзаке или отсутствие такой
        возможности.
    soccer_ball_type:
      name: Тип футбольного мяча
      description: Предполагаемое назначение или стиль футбольного мяча (например,
        матчей, тренировок, футзала). Помогает покупателям быстро найти подходящий
        вариант без необходимости во множестве подкатегорий.
    soccer_dummy_base_type:
      name: Тип основания футбольного манекена
      description: Стиль основания или анкерного механизма, используемого манекеном.
    soccer_dummy_design:
      name: Конструкция футбольного манекена
      description: Конструктивный стиль футбольного манекена для ворот, например жесткий
        или надувной.
    soccer_goal_target_style:
      name: Стиль мишени для футбольных ворот
      description: Физический формфактор или конструкция тренировочной мишени. Помогает
        покупателям выбрать стиль, который лучше всего подходит для их упражнений.
    soccer_goal_type:
      name: Тип футбольных ворот
      description: Конструктивный стиль или предполагаемое назначение ворот (например,
        для поп-апа, ребаундер, уличные).
    sock_cushioning:
      name: Амортизация носков
      description: Количество и стиль амортизации или подкладки под стопой, предусмотренные
        в носке.
    sock_cushioning_level:
      name: Уровень амортизации носка
      description: Количество амортизации под стопой, встроенной в носок.
    sock_grip_type:
      name: Тип сцепления носка
      description: Элементы сцепления или противоскольжения, нанесенные на подошвенную
        часть носка.
    sock_toe_style:
      name: Стиль носочной части
      description: Конструктивный стиль носочной части носка.
    soft_bait_style:
      name: Стиль мягкой приманки
      description: Классификация конструкции корпуса или профиля мягкой пластиковой
        приманки (например, червя, свимбейта, личинки).
    soft_top_attachment_type:
      name: Тип крепления мягкой крыши
      description: Способ крепления мягкого верха к автомобилю (направляющие, кнопки,
        текстильная застежка и т. д.).
    soft_top_includes_frame_hardware:
      name: Наличие каркаса или фурнитуры у мягкого верха
      description: Наличие каркаса или дуг мягкого верха и/или монтажной фурнитуры
        в комплекте изделия.
    soft_top_installation_type:
      name: Тип установки мягкого верха
      description: Способ установки или крепления мягкого верха автомобиля. Указывает
        на предполагаемый метод монтажа и требуемые усилия.
    soft_top_window_configuration:
      name: Конфигурация окон мягкой крыши
      description: Количество окон у мягкого верха и их расположение.
    softball_certification:
      name: Сертификация софтбола
      description: Штампы или одобрения руководящих органов, нанесенные на мяч. Определяют
        допустимость использования в лиге или игре.
    softness_level:
      name: Уровень мягкости
      description: Степень мягкости или низкопрофильности петлевой стороны. Важна
        для комфорта при контакте с кожей и для малой толщины изделия.
    solar_system_model_included_bodies:
      name: Входящие в модель Солнечной системы небесные тела
      description: Небесные тела, представленные в наборе модели.
    solar_system_model_scaling:
      name: Масштабирование модели Солнечной системы
      description: Масштабность модели Солнечной системы по размерам планет, расстояниям
        или орбитам, по обоим параметрам либо схематичность или отсутствие масштаба.
    sold_secure_certification_level:
      name: Уровень сертификации Sold Secure
      description: Рейтинг Sold Secure, присвоенный замку независимым британским органом
        тестирования (Bronze, Silver, Gold, Diamond).
    sold_secure_rating:
      name: Рейтинг Sold Secure
      description: Уровень сертификации Sold Secure, присвоенный замку.
    sole_construction:
      name: Конструкция подошвы
      description: Конструкция подошвы обуви (полная, раздельная, двухсоставная и
        т. д.). Напрямую влияет на гибкость, контакт с полом и пригодность для определенных
        танцевальных техник.
    sole_type:
      name: Тип подошвы
      description: Конструктивный стиль подошвы. Указывает на гибкость и предполагаемое
        назначение.
    soprano_saxophone_body_style:
      name: Стиль корпуса сопрано-саксофона
      description: Физическая конфигурация корпуса сопрано-саксофона.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Тип перегородки мундштука сопрано саксофона
      description: Конструкция баффла или крыши мундштука (контур за кончиком). Влияет
        на яркость, проекцию и отклик.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Размер камеры мундштука сопрано саксофона
      description: Размер внутренней камеры мундштука сопрано-саксофона. Влияет на
        сопротивление и тембровую окраску.
    soprano_saxophone_mouthpiece_finish:
      name: Отделка мундштука сопрано саксофона
      description: Отделка поверхности или покрытие мундштука (если применимо).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Входящие в комплект аксессуары мундштука сопрано-саксофона
      description: Аксессуары, входящие в комплект с мундштуком.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Тембровый характер мундштука сопрано-саксофона
      description: Общий тембровый профиль, обычно связанный с конструкцией мундштука.
    sound_character:
      name: Характер звучания
      description: Общий тембр, создаваемый хлопушкой.
    sound_expansion_method:
      name: Способ расширения звуков
      description: Способ добавления или расширения внутренней библиотеки звуков модуля
        сверх заводского набора (например, пакеты контента, импорт сэмплов, карты
        расширения).
    sound_module_sound_library_focus:
      name: Направленность библиотеки звуков звукового модуля
      description: Основная направленность заводского набора звуков. Помогает покупателям
        подобрать подходящий модуль под свой стиль или сценарий использования.
    sound_port_type:
      name: Тип звукового отверстия
      description: Конструкция звукового отверстия или порта на задней части кахона.
        Влияет на проекцию звука и отклик низких частот.
    sound_sensitivity_control:
      name: Регулировка чувствительности к звуку
      description: Возможность регулировки чувствительности к звуку и соответствующий
        способ.
    sound_synthesizer_patch_memory:
      name: Память патчей звукового синтезатора
      description: Возможность сохранения и вызова пресетов (патчей) в синтезаторе.
    sound_type:
      name: Тип звука
      description: Основной тип звуков или аудиовыходов, создаваемых ковриком (например,
        инструменты, песни, голосовые подсказки). Помогает ориентироваться в игровом
        процессе.
    soundboard_material:
      name: Материал деки
      description: Материал деки арфы (верхней части), определяющий резонанс и звучание.
    soup_or_broth_variety:
      name: Разновидность супа или бульона
      description: Стиль, рецептура или кулинарное исполнение супа или бульона. Помогает
        покупателям быстро найти предпочитаемый тип.
    sour_cream_variety:
      name: Разновидность сметаны
      description: Классификация продуктов на основе сметаны по конкретной разновидности
        или культурному стилю, например «крем-фреш» или «мексиканский крем».
    soy_sauce_variety:
      name: Сорт соевого соуса
      description: Конкретный стиль или формула соевого соуса (например, светлый,
        темный, тамари, понзу). Помогает покупателям быстро фильтровать товары по
        вкусовому профилю и кулинарному назначению.
    spark_plug_electrode_material:
      name: Материал электрода свечи зажигания
      description: Материал или технология наконечника рабочего электрода свечи зажигания
        (центрального и/или бокового), как указано производителем (например, медь,
        платина, иридий).
    spark_plug_seat_type:
      name: Тип посадочного места свечи зажигания
      description: Стиль уплотнения или посадочного места для свечи зажигания в зоне
        сопряжения с головкой блока цилиндров.
    spark_plug_terminal_type:
      name: Тип клеммы свечи зажигания
      description: Стиль верхнего терминала, используемого для подключения провода
        или колпачка зажигания.
    sparkler_shape:
      name: Форма бенгальского огня
      description: Общая декоративная форма или формфактор бенгальского огня.
    speaker_cone_material:
      name: Материал диффузора динамика
      description: Основной материал диффузора динамика (низко- или среднечастотного).
    speaker_size:
      name: Размер динамика
      description: Номинальный размер динамика или монтажный размер компонентного
        динамика (например, 6,5 дюймов, 6x9 дюймов), используемый для подбора к штатным
        местам установки и адаптерам.
    special_effects_output_interface:
      name: Интерфейс выходного подключения спецэффектов
      description: Выходной разъем или интерфейс, используемый для управления устройствами
        спецэффектов.
    special_effects_stand_stability_features:
      name: Особенности устойчивости стойки для спецэффектов
      description: Встроенные особенности устойчивости и безопасности, предназначенные
        для предотвращения опрокидывания или скольжения во время мероприятий.
    specialty_malt_name_type:
      name: Название или тип специального солода
      description: Конкретное название или тип специального солода (часто используется
        как коммерческое стилевое название).
    specimen_presentation:
      name: Форма представления образца
      description: Способ подготовки или представления коллекционного образца (например,
        необработанный, полированный, распиленный или смонтированный).
    speed_bag_accessories_included:
      name: Аксессуары груши для скорости
      description: Дополнительные предметы, входящие в комплект поставки боксерского
        мешка, такие как перчатки, насосы, вертлюги, цепи или стойки.
    speed_rating:
      name: Скоростная категория
      description: Скорость игровой поверхности, обеспечиваемая бильярдным сукном
        (например, медленная, средняя или быстрая).
    speedometer_backlight_type:
      name: Тип подсветки спидометра
      description: Наличие подсветки спидометра для ночной видимости и способ ее реализации.
    speedometer_display_type:
      name: Тип отображения спидометра
      description: 'Стиль отображения скорости на спидометре: аналоговая стрелка или
        циферблат, цифровое числовое отображение либо комбинация аналоговых и цифровых
        элементов.'
    speedometer_unit_of_measure:
      name: Единица измерения спидометра
      description: Единицы скорости, отображаемые на шкале или дисплее.
    spike_replaceability:
      name: Возможность замены шипов
      description: Возможность замены шипов на обуви, их фиксированное исполнение
        или отсутствие шипов.
    spike_shape:
      name: Форма шипа
      description: Геометрический стиль наконечника шипа. Влияет на сцепление и пригодность
        для разных покрытий дорожки.
    spike_thread_size:
      name: Размер резьбы шипа
      description: Размер или стандарт резьбового основания, вкручиваемого в обувь
        (например, 1/4-20).
    spin_classification:
      name: Классификация вращения
      description: Профиль вращения, под который предназначен диск (средний, высокий,
        гипервращение).
    spin_profile:
      name: Профиль вращения
      description: Относительные характеристики вращения, которым способствует древко.
    spin_types_supported:
      name: Поддерживаемые типы вращения
      description: Типы вращения, которые машина может придавать мячам. Помогает игрокам
        тренироваться против разных стилей ударов.
    spinach_preparation_style:
      name: Стиль подготовки шпината
      description: Физическая подготовка листьев шпината или формат продукта (например,
        целые листья, нарезанный, в кубиках).
    spinach_variety:
      name: Разновидность шпината
      description: Ботаническая или рыночная разновидность шпината (например, молодой,
        савойский, водяной, красный). Помогает покупателям выбрать именно тот тип,
        который им нужен.
    spindle_bearing_surface_material:
      name: Материал опорной поверхности веретена
      description: Материал точки или опорной поверхности, используемой в опорных
        веретенах (наконечник или нижняя часть). Влияет на плавность вращения и износ.
    spindle_bearing_type:
      name: Тип подшипника шпинделя
      description: Тип интерфейса наконечника или опоры веретена, снижающего трение
        о поддерживающую чашу или чашку.
    spindle_finish:
      name: Отделка веретена
      description: Отделка поверхности или покрытие веретена. Влияет на тактильные
        ощущения, долговечность и внешний вид.
    spindle_hook_type:
      name: Тип крючка веретена
      description: Механизм захвата нити в верхней части веретена, используемый для
        фиксации начальной нити или пряжи.
    spindle_support_method:
      name: Способ опоры веретена
      description: Способ опоры веретена во время прядения.
    spindle_tip_style:
      name: Стиль наконечника веретена
      description: Форма или конструкция точки, которая опирается на чашу (опорную
        поверхность). Влияет на трение и плавность вращения.
    spindle_whorl_position:
      name: Позиция мутовки шпинделя
      description: Расположение пряслица на стержне веретена.
    spinner_blade_shape:
      name: Форма лепестка спиннера
      description: Основная форма лепестка, используемого на спиннере. Влияет на вибрацию,
        блеск и глубину проводки.
    spinner_control_card_design_type:
      name: Конструкция или тип карточки управления спиннером
      description: Вид карточки управления спиннером по способу представления контрольной
        информации (например, справка по передаточному отношению, справка по натяжению,
        таблица пересчета).
    spinner_subtype:
      name: Подтип спиннера
      description: Общая конструкция или семейство спиннера (например, инлайн-спиннер,
        спиннербейт).
    spinning_oil_application_area:
      name: Область применения масла для прялки
      description: Точки на прялке, для нанесения на которые предназначено масло.
    spinning_oil_application_tool:
      name: Инструмент нанесения масла при прядении
      description: Стиль аппликатора или наконечника для нанесения масла на части
        прялки с контролируемой дозировкой.
    spinning_oil_features:
      name: Особенности масла для прялки
      description: Функциональные свойства, значимые для масел для прялки (остатки,
        образование пятен, окисление и смываемость).
    spinning_top_features:
      name: Функции волчка
      description: Дополнительные игровые особенности волчка помимо обычного вращения.
    spinning_top_launch_mechanism:
      name: Механизм запуска волчка
      description: Способ запуска или приведения волчка во вращение.
    spinning_wheel_brake_tension_system_type:
      name: Тип тормозной системы или системы натяжения прялки
      description: Тормозная система или система натяжения, используемая для контроля
        намотки пряжи.
    spinning_wheel_drive_system:
      name: Система привода прялки
      description: Приводная система, для которой предназначена шпуля.
    spinning_wheel_hook_system:
      name: Система крючков прялки
      description: Способ направления пряжи вдоль плеч флайера.
    spinning_wheel_part_application:
      name: Назначение детали прялки
      description: Компоненты прялки, для которых предназначено масло.
    spinning_wheel_portability_foldability:
      name: Имеет ли прялка портативную или складную конструкцию
      description: Возможность складывания колеса для транспортировки.
    spinning_wheel_tension_adjustment_type:
      name: Тип регулировки натяжения прялки
      description: Способ регулировки натяжения на колесе для контроля намотки.
    splice_termination_type:
      name: Тип сплесня или оконцевания
      description: Концевое исполнение, предусмотренное на якорной линии (например,
        заплетенная петля, коуш, крюк для цепи).
    split_shot_cut_type:
      name: Тип прорези сплит-шота
      description: Тип канавки или прорези, обеспечивающей крепление к леске.
    split_shot_shape:
      name: Форма разрезной дроби
      description: Физическая форма сплит-шота. Влияет на гидродинамику и устойчивость
        к зацепам.
    split_shot_size:
      name: Размер сплит-шота
      description: Стандартизированный буквенно-цифровой код размера (например, SSG,
        AAA, BB, 1), используемый производителями и рыболовами для классификации грузил
        split shot. Дополняет точные значения веса.
    spoiler_adjustability:
      name: Регулируемость спойлера
      description: Возможность регулировки угла или высоты спойлера.
    spoke_accessory_function:
      name: Функция аксессуара для спиц
      description: Основная функция аксессуара на колесе, например декоративная, светоотражающая
        или световая.
    spoke_butting_profile:
      name: Профиль баттинга спицы
      description: Изменение диаметра спицы по ее длине (плоские, с одно-, двух-,
        трех- или четырехступенчатым сужением). Влияет на вес и прочность.
    spoke_gauge:
      name: Калибр спицы
      description: Калибр спиц (показатель толщины проволоки), с которым совместим
        ниппель.
    spoke_interface_type:
      name: Тип интерфейса спиц
      description: Стиль головки спицы, для которого предназначена втулка (с J-образным
        изгибом, прямые, с T-образной головкой).
    spoke_shape:
      name: Форма спицы
      description: Внешнее поперечное сечение проволоки спицы. Влияет на аэродинамику
        и внешний вид.
    spool_form_factor:
      name: Формфактор шпули
      description: Физический стиль корпуса шпули и способ удержания нити или пряжи
        (например, с фланцами или конус).
    spoon_style:
      name: Стиль блесны spoon
      description: Функциональный подтип или стиль блесны spoon, например кастинг,
        флаттер или троллинг.
    sports_bra_padding_type:
      name: Тип вставок спортивного бюстгальтера
      description: Тип вставок, предусмотренных в спортивном бюстгальтере.
    sports_cap_style:
      name: Стиль спортивной кепки
      description: Общая конструкция или стиль кепки (например, бейсболка, кепка с
        застежкой сзади), независимо от командного брендинга.
    sports_governing_body_certification:
      name: Сертификация спортивного руководящего органа
      description: Официальные сертификаты или одобрения признанных спортивных руководящих
        органов. Подтверждают соответствие товара соревновательным стандартам.
    sports_surface_compatibility:
      name: Совместимость спортивной поверхности
      description: Типы игры или поверхности, на которые краску можно безопасно наносить.
    sports_toy_set_contents:
      name: Содержимое набора спортивных игрушек
      description: Компоненты, входящие в набор спортивных игрушек (например, мяч,
        бита, сетка, мишени).
    spray_string_cleanup_method:
      name: Метод очистки аэрозольной нити
      description: Рекомендуемый способ удаления остатков аэрозольной нити.
    spray_string_finish_effect:
      name: Отделка и эффект аэрозольной нити
      description: Визуальный эффект аэрозольной нити после нанесения (блеск, отражающая
        способность и специальные эффекты).
    spray_string_formulation_type:
      name: Тип состава аэрозольной нити
      description: Поведение продукта во время и после распыления (например, смываемый
        или стойкий).
    spray_string_recommended_surface:
      name: Рекомендуемая поверхность для аэрозольной нити
      description: Типы поверхностей, для которых предназначен аэрозольной нити и
        с которых он предположительно удаляется.
    spray_string_scent:
      name: Аромат spray string
      description: Ароматический профиль или запах аэрозольной нити (при наличии).
    spray_string_suitable_age_group:
      name: Подходящая возрастная группа для аэрозольной нити
      description: Рекомендуемый минимальный возраст или возрастная группа для безопасного
        использования.
    spread_consistency:
      name: Консистенция намазки
      description: Текстура и консистенция дипа или намазки (например, гладкая, с
        кусочками, взбитая). Помогает определить ощущения во рту и особенности использования.
    spread_variety:
      name: Разновидность фруктовой намазки
      description: Конкретный тип фруктовой намазки (например, джем, желе, мармелад,
        курд). Помогает различать способы приготовления и текстуры.
    spreader_bar_type:
      name: Тип распорной планки
      description: Тип траверсы или системы крюков, входящих в комплект или совместимых
        с привязью.
    sprint_canoe_class:
      name: Класс спринтерского каноэ
      description: Официальное обозначение класса спринтерского каноэ.
    sprout_presentation:
      name: Форма представления проростков
      description: Форма представления продукта (например, свежие проростки, микрозелень,
        живой горшок для выращивания, порошок).
    squash_and_gourd_variety:
      name: Сорт тыквы и бахчевых
      description: Конкретный сорт или рыночная разновидность тыквы или бахчевых.
        Помогает покупателям быстрее находить нужный тип.
    stability_class:
      name: Класс стабильности
      description: Общая категория стабильности на основе летных характеристик или
        маркетинговых заявлений.
    stabilizer_thread_size:
      name: Размер резьбы стабилизатора
      description: Спецификация резьбы для крепления стабилизатора или аксессуара
        к луку или арбалету.
    stabilizer_type:
      name: Тип стабилизатора
      description: Стиль или позиционная классификация стабилизатора для лука или
        арбалета.
    stages_supported:
      name: Поддерживаемое количество ступеней
      description: Количество ступеней, для которых предназначена ракета или набор.
    stain_remover_format:
      name: Формат средства для удаления пятен
      description: Формат подачи средства для удаления пятен с транспортных средств
        (флакон-распылитель, аэрозоль, пена, гель, порошок, салфетки, карандаш или
        маркер).
    stake_shape:
      name: Форма колышка
      description: Форма поперечного сечения или конструктивный стиль колышка для
        палатки. Влияет на удерживающую способность в различных типах грунта.
    stamp_block_features:
      name: Особенности блока для штампов
      description: Функциональные особенности блока для штампов, такие как измерительные
        сетки, ручки или нескользящие поверхности.
    stamp_block_type:
      name: Тип блока для штампов
      description: Конструкция или стиль блока для штампов, используемого для крепления
        штампов (например, прозрачный акриловый блок, деревянный блок или позиционирующий
        блок).
    stamp_set_pieces_included:
      name: Состав набора марок
      description: Компоненты, входящие в состав набора штампов и чернильных подушек
        (например, штампы, чернильные подушки, маркеры).
    stand_padding_material:
      name: Материал подкладки стойки
      description: Материал контактных точек для защиты отделки поверхности инструмента
        (например, пена, резина, силикон).
    staple_fiber_animal_fiber_type:
      name: Тип животного волокна комплексной пряжи
      description: Тип волокна животного происхождения.
    staple_fiber_crimp_level:
      name: Степень извитости комплексной пряжи
      description: Степень естественной извитости или волнистости волокна.
    staple_fiber_preparation_type:
      name: Тип подготовки комплексной пряжи
      description: Состояние подготовки или обработки волокна при продаже (способ
        выравнивания и обработки). Сильно влияет на метод прядения, легкость вытягивания
        и конечный результат.
    staple_fiber_source_type:
      name: Тип источника комплексной пряжи
      description: Общая категория происхождения волокна.
    starch_processing_type:
      name: Тип обработки крахмала
      description: 'Тип крахмала: нативный или физически либо химически модифицированный
        (например, быстрого приготовления, прежелатинизированный). Обеспечивает определенные
        функциональные свойства, такие как скорость загущения или устойчивость к температуре.'
    starch_source:
      name: Источник крахмала
      description: Ботанический источник пищевого крахмала или загустителя (например,
        кукуруза, картофель, тапиока). Источник является основным отличительным признаком
        пищевых крахмалов. Влияет на пригодность для рецептов, учет аллергенов и поведение
        покупателей при поиске.
    starfruit_variety:
      name: Сорт карамболы
      description: Конкретный сорт карамболы (например, «Аркин», «Фван Тун»).
    starter_drive_type:
      name: Тип привода стартера
      description: Тип механизма привода и зацепления стартера для соединения шестерни
        с зубчатым венцом.
    starter_pistol_action_type:
      name: Тип действия стартового пистолета
      description: Механизм стрельбы и действия стартового пистолета (например, одинарного
        действия, двойного действия, полуавтоматический).
    starter_pistol_caliber:
      name: Калибр стартового пистолета
      description: Калибр холостых патронов или боеприпасов для стартового пистолета.
    starter_terminal_type:
      name: Тип клеммы стартера
      description: Тип клемм или разъемов для электрических соединений стартера или
        соленоида стартера (например, шпилька, плоский разъем, штекерный разъем).
    starting_block_anchoring_method:
      name: Метод крепления стартовых колодок
      description: Способ крепления колодок к поверхности дорожки (например, шипы,
        присоски, резиновые накладки).
    steerer_tube_design:
      name: Конструкция рулевой трубы
      description: Конструкция рулевой трубы — прямая, коническая, резьбовая и т.
        п. Определяет совместимость с рулевой колонкой и рамой.
    steering_cable_end_fitting_type:
      name: Тип концевого фитинга рулевого троса
      description: Тип окончания или крепления на концах рулевого троса водного транспорта
        (со стороны рулевого механизма и двигателя или румпеля). Обеспечивает совместимость
        с рулевым механизмом и точками подключения двигателя. Используйте стандартное
        обозначение или обозначение производителя (при наличии).
    steering_column_adjustability_features:
      name: Функции регулировки рулевой колонки
      description: Встроенные функции регулировки рулевой колонки.
    steering_column_ignition_provision:
      name: Наличие поддержки замка зажигания в рулевой колонке
      description: Наличие возможности установки цилиндра или переключателя замка
        зажигания и/или блокировки рулевого управления.
    steering_column_shaft_end_interface_type:
      name: Тип интерфейса конца вала рулевой колонки
      description: Тип интерфейса конца вала рулевой колонки (например, шлицевой,
        двойное «D», шпоночный).
    steering_column_shift_type:
      name: Тип переключения передач рулевой колонки
      description: Наличие механизма переключения передач на рулевой колонке и тип
        трансмиссии.
    steering_component_drive_type:
      name: Тип привода рулевого компонента
      description: Тип привода или усилителя для рулевых компонентов (в частности
        насосов и систем EPS).
    steering_position:
      name: Положение рулевого управления
      description: 'Расположение рулевого управления: левостороннее или правостороннее.'
    steering_pump_pulley_type:
      name: Тип шкива рулевого насоса
      description: Тип привода или интерфейса шкива рулевого насоса.
    steering_rack_finish_coating:
      name: Отделка и покрытие рулевой рейки
      description: Тип внешней отделки или покрытия для защиты от коррозии.
    steering_rack_position:
      name: Положение рулевой рейки
      description: Место установки или применения рейки в системе рулевого управления
        транспортного средства.
    steering_wheel_cover_installation_type:
      name: Тип установки чехла рулевого колеса
      description: Способ установки или фиксации чехла на рулевом колесе.
    steering_wheel_grip_material:
      name: Материал хвата рулевого колеса
      description: Материал обода или зоны хвата рулевого колеса, контактирующей с
        руками. Может отличаться от материала основы или спиц.
    steering_wheel_mounting_pattern:
      name: Монтажный шаблон рулевого колеса
      description: Схема расположения болтов или отверстий для крепления рулевого
        колеса к ступице или адаптеру (например, 3 болта, 5 болтов).
    steering_wheel_rim_material_grip_surface:
      name: Материал обода рулевого колеса (поверхность хвата)
      description: Основной материал покрытия обода или зоны хвата (отличается от
        общего материала конструкции).
    stem_material:
      name: Материал мундштука
      description: Материал мундштука или наконечника трубки (например, акрил, эбонит,
        люцит).
    stencil_machine_consumable_type:
      name: Тип расходных материалов для трафаретной машины
      description: Расходные материалы, необходимые для работы (при наличии).
    step_surface_texture:
      name: Текстура поверхности ступени
      description: Конструкция или материал поверхности ступени для улучшения сцепления
        и комфорта во влажных условиях.
    stepper_motion_type:
      name: Тип движения степпера
      description: Основной тип шагового движения тренажера.
    stick_bow_profile:
      name: Профиль изгиба клюшки
      description: Профиль изгиба или тип изгиба шафта клюшки для хоккея на траве.
        Влияет на контроль мяча, эффективность ударов с отскоком и стиль игры.
    stick_construction:
      name: Конструкция палочки
      description: Конструкция хоккейной клюшки, например цельнокомпозитная, двухкомпонентная
        композитная или деревянная.
    stick_curvature_type:
      name: Тип кривизны палки
      description: Профиль кривизны метательной палки. Влияет на дальность и точность
        броска.
    stick_head_shape:
      name: Форма головки клюшки
      description: Форма головки клюшки. Влияет на прием мяча, стиль удара и контроль
        мяча на близкой дистанции.
    stick_size_compatibility:
      name: Совместимость размера палочки
      description: Размерная группа хоккейных клюшек, с которой совместим продукт
        (например, юношеские, юниорские, промежуточные, взрослые, вратарские, универсальные).
    sticker_decal_features:
      name: Особенности наклеек и декалей
      description: Характеристики нанесения и эксплуатации наклеек или декалей (например,
        без пузырей, с возможностью переклеивания).
    sticker_finish:
      name: Отделка наклейки
      description: Тип отделки поверхности или визуальный эффект наклеек.
    sticker_format:
      name: Формат наклеек
      description: Формфактор декоративных наклеек в продаже (например, лист, рулон,
        отдельные наклейки, книга).
    sticker_material_type:
      name: Тип материала наклеек
      description: Основной материал или подложка декоративной наклейки, без учета
        декоративных элементов.
    stilt_foot_attachment_type:
      name: Тип крепления ноги к ходулям
      description: Способ крепления ноги пользователя к ходулям (например, ремень
        с пряжкой, текстильная застежка, шнуровка).
    stirrup_style:
      name: Стиль стремени
      description: Стиль стремени по конструкции или дисциплине, включая варианты
        безопасности, назначения и конструкции.
    stirrup_tread_material:
      name: Материал накладки стремени
      description: Материал подножки или накладки стремени. Влияет на сцепление, комфорт
        и износ.
    stitch_marker_and_counter_style:
      name: Стиль маркера и счетчика петель
      description: Стиль или формфактор маркера петель или счетчика петель и рядов
        (например, фиксирующийся маркер, маркер-кольцо с разрезом, кольцевой счетчик,
        цифровой счетчик).
    stitch_types:
      name: Типы стежков
      description: Типы стежков, которые может выполнять машина (функциональные и
        декоративные).
    stitching_method:
      name: Метод сшивания
      description: Способ соединения панелей мяча.
    stitching_state:
      name: Состояние пошива
      description: 'Степень готовности изделия: не сшитое, частично сшитое, сшитое
        или готовое к носке.'
    stock_car_race_series:
      name: Серия гонок на стоковых автомобилях
      description: Санкционирующая организация, гоночная серия или класс, для которых
        предназначен стоковый автомобиль.
    stone_adhesion:
      name: Тип прилегания косточки
      description: 'Тип прилегания косточки персика или нектарина: свободная, приросшая
        или полусвободная.'
    stone_creation_method:
      name: Метод создания камня
      description: 'Происхождение камня: натуральный, выращенный в лаборатории, имитация
        или переработанный.'
    stone_cut_grade:
      name: Класс огранки камня
      description: Общая оценка качества огранки камня.
    stone_cut_style:
      name: Стиль обработки
      description: Стиль огранки стеклянного камня (например, граненый или кабошон).
    stone_fruit_cultivar:
      name: Сорт косточкового фрукта
      description: Конкретный сорт или разновидность персика или нектарина.
    stone_fruit_variety:
      name: Разновидность косточкового фрукта
      description: Подтип внутри категории (например, персик, нектарин, инжирный или
        плоский персик).
    stone_setting_type:
      name: Тип закрепки камня
      description: Способ закрепления камня в изделии (например, в оправе, на зажимах,
        в паве и т. д.).
    stone_transparency:
      name: Прозрачность камня
      description: Оптическая прозрачность или непрозрачность стеклянного камня.
    storage_case_type:
      name: Тип кейса для хранения
      description: Тип контейнера для хранения и транспортировки набора (например,
        коробка, кейс, сумка).
    storage_compartment_type:
      name: Тип отсека для хранения
      description: Тип отсека для хранения личных вещей в плавучем буе.
    storage_media_and_transfer_methods_supported:
      name: Поддерживаемые носители данных и методы передачи
      description: Поддерживаемые носители данных или методы подключения для импорта
        и экспорта сэмплов, а также сохранения и загрузки проектов.
    storage_requirements:
      name: Требования к хранению
      description: Условия хранения продукта до и/или после вскрытия для сохранения
        качества и безопасности.
    stove_jack_compatibility:
      name: Совместимость с дымоходом
      description: Наличие в палатке огнестойкого отверстия для дымоходной трубы печи.
    straight_pin_application:
      name: Назначение прямых булавок
      description: Предназначение прямых булавок.
    straight_pin_finish:
      name: Отделка прямых булавок
      description: Тип отделки поверхности или покрытия булавки (например, никелирование).
        Влияет на устойчивость к коррозии и скольжение.
    straight_pin_head_material:
      name: Материал головки прямой булавки
      description: Материал головки булавки (при наличии), например пластик или стекло.
    straight_pin_head_shape:
      name: Форма головки прямой булавки
      description: Форма или стиль головки булавки. Влияет на удобство использования
        и заметность.
    strand_configuration:
      name: Конфигурация прядей
      description: Количество отдельных рядов или цепочек в цепочке для кошелька (одинарная,
        двойная, тройная).
    strand_material:
      name: Материал пряди
      description: Материал отдельных прядей или лент.
    strap_attachment_hardware:
      name: Фурнитура крепления ремня
      description: Тип или конструкция фурнитуры для крепления ремня к инструменту
        или точке опоры.
    strap_configuration:
      name: Конфигурация ремня
      description: Количество точек крепления шлема на ремне (например, 2-точечное,
        4-точечное). Влияет на посадку, безопасность и соответствие требованиям лиги.
    strap_functionality:
      name: Функциональность ремня
      description: Основное назначение или конструкция ремня для коврика для йоги.
    strap_padding:
      name: Наличие мягкой подкладки ремня
      description: Степень мягкой подкладки ремня. Обеспечивает комфорт и распределение
        нагрузки.
    strap_side:
      name: Сторона ремня
      description: Предназначение ремня для левого крепления, правого крепления или
        продажа парой.
    strap_width:
      name: Ширина ремня
      description: Относительная ширина плечевых ремней (узкие, средние, широкие).
        Помогает подобрать нужный уровень покрытия или поддержки.
    strength_classification:
      name: Классификация прочности
      description: Маркетинговое обозначение прочности, обычно используемое брендами
        (например, «Легкий», «Крепкий», «Особо крепкий»).
    strength_grade:
      name: Класс прочности
      description: Уровень удерживающей силы или нагрузки текстильной застежки.
    stretch_level:
      name: Степень растяжимости
      description: Степень растяжения текстиля при использовании.
    stretch_type:
      name: Тип растяжимости
      description: 'Тип растяжимости ткани: механическая или эластичная, а также направление
        растяжения.'
    stretcher_bar_material:
      name: Материал подрамника
      description: Материал подрамника или рамы (например, сосна, пихта, тополь, береза,
        MDF или инженерная древесина).
    strike_shield_shape:
      name: Форма ударного щита
      description: Общий формфактор ударной поверхности ударного щита.
    string_core_shape:
      name: Форма сердечника струны
      description: Форма сердечника в обмотанных струнах. Влияет на ощущения при игре
        и стабильность.
    string_coverage:
      name: Охват струн
      description: Струны, которые частичный каподастр предназначен зажимать или перекрывать
        (по количеству или стандартному набору).
    string_end_type:
      name: Тип окончания струны
      description: Тип окончания струны у бриджа или струнодержателя для совместимости,
        особенно для акустических, электрогитар и некоторых бас-гитар.
    string_set_type:
      name: Тип набора струн
      description: 'Комплектность продукта: полный набор или отдельные сменные струны.'
    strung_status:
      name: Состояние натяжки
      description: Наличие предварительной натяжки сетки на голове для лакросса или
        продажа без натяжки.
    strut_placement:
      name: Расположение стойки
      description: Положение установки стойки на транспортном средстве (передняя или
        задняя, левая или правая сторона).
    stud_attachment_type:
      name: Тип крепления шпильки
      description: Способ крепления или конфигурация шипов на подошве. Влияет на сцепление,
        обслуживание и соответствие требованиям лиги.
    stud_configuration:
      name: Конфигурация шпилек
      description: Форма и расположение шипов на подошве. Влияет на сцепление и эффективность
        на различных поверхностях.
    stud_material:
      name: Материал шпильки
      description: Основной материал шипов. Указывает на долговечность, вес и соответствие
        требованиям безопасности.
    stuffed_animal_features:
      name: Особенности мягкой игрушки
      description: Встроенные игровые функции и элементы комфорта мягкой игрушки.
    stump_base_type:
      name: Тип основания калитки
      description: Тип основания или системы крепления калитки для крикета (шип, пружинный
        возврат, утяжеленная резина и т. п.).
    stump_mechanism:
      name: Механизм калитки
      description: Тип возвратного или крепежного механизма калиток для крикета (например,
        пружинный возврат, фиксированное крепление).
    stump_size:
      name: Размер калитки
      description: Категориальное обозначение размера калитки для крикета. Указывает
        типичную высоту и подходящую возрастную группу игроков.
    subwoofer_installation_type:
      name: Тип установки сабвуфера
      description: Способ установки сабвуфера в автомобильную аудиосистему.
    sugar_cane_variety:
      name: Сорт сахарного тростника
      description: Конкретный сорт или рыночная разновидность сахарного тростника.
        Влияет на цвет, сладость и содержание волокон.
    sugar_content_level:
      name: Уровень содержания сахара
      description: Общий уровень содержания сахара или тип рецептуры концентрата напитка.
        Помогает быстро находить обычные варианты, с пониженным содержанием или не
        содержащие сахара.
    sugar_refinement_level:
      name: Степень рафинирования сахара
      description: Степень или тип рафинирования сахара (цвет, содержание мелассы
        или уровень обработки).
    sugar_source:
      name: Источник сахара
      description: Ботаническое или материальное происхождение сахара.
    suit_fit:
      name: Посадка костюма
      description: Общий крой костюма. Указывает степень прилегания к телу.
    suit_pieces:
      name: Элементы костюма
      description: Количество согласованных предметов одежды в комплекте костюма (например,
        2 предмета, 3 предмета, 4 предмета).
    suitable_for_anchoring_use:
      name: Пригодность для якорного применения
      description: Предназначение троса или каната для якорения.
    suitable_for_craft_type:
      name: Подходящие типы рукоделия
      description: Основное назначение блокировочной проволоки в рукоделии.
    suitable_for_paint_type:
      name: Подходящие типы краски
      description: Типы красок, для которых предназначен или безопасен холст.
    suitable_for_swim_stroke:
      name: Подходящий стиль плавания
      description: Стили плавания, для которых предназначена или оптимизирована лопатка
        для плавания.
    suitable_mounting_surface_material:
      name: Подходящий материал монтажной поверхности
      description: Тип монтажной поверхности или материала, для сцепления с которым
        предназначена клеевая основа.
    suitable_play_location:
      name: Подходящее место для игры
      description: Основная игровая среда, для которой предназначены игрушки «песочная
        и водяная мельница».
    suitable_riding_conditions:
      name: Подходящие условия езды
      description: Условия катания, для которых предназначена смазка или очиститель
        для велосипеда (например, сухие, влажные, зимние).
    suitable_snow_conditions:
      name: Подходящие снежные условия
      description: Основные снежные условия, для которых предназначена мазь для сцепления.
    suitable_surface_type:
      name: Подходящий тип поверхности
      description: Типы поверхностей для ходьбы, для которых предназначено покрытие
        с улучшенным сцеплением.
    suitable_table_size:
      name: Подходящий размер стола
      description: Длина бильярдного или снукерного стола, для освещения которого
        предназначен светильник.
    sun_protection_rating_upf:
      name: Рейтинг защиты от солнца (UPF)
      description: Сертифицированный уровень защиты одежды от солнца UPF.
    sun_shade_attachment_method:
      name: Способ крепления солнцезащитного тента
      description: Способ крепления солнцезащитного экрана к окну или лобовому стеклу.
    sun_shade_style:
      name: Стиль солнцезащитного экрана
      description: Конструкция/формат изделия, обеспечивающие развертывание и хранение
        солнцезащитного козырька.
    sunchoke_variety:
      name: Сорт топинамбура
      description: Конкретный сорт или разновидность топинамбура (иерусалимского артишока).
        Предоставляет подробную информацию для садоводов, поваров и требовательных
        покупателей.
    sunflower_oil_variety:
      name: Сорт подсолнечного масла
      description: Профиль жирных кислот или сорт подсолнечного масла (например, с
        высоким или средним содержанием олеиновой кислоты, с содержанием линолевой
        кислоты).
    sunflower_variety:
      name: Сорт подсолнечника
      description: Сорт или разновидность подсолнечника (распространенные рыночные
        сорта для срезанных цветов).
    support_brace_features:
      name: Особенности поддерживающего фиксатора
      description: Функциональные особенности фиксатора запястья, такие как дышащая
        ткань, съемная шина или регулируемая металлическая пластина.
    support_leg_count:
      name: Количество опорных ножек
      description: Количество ножек, соприкасающихся с землей при использовании стрелковой
        опоры (например, монопод, бипод, трипод).
    support_padding:
      name: Мягкая подкладка опоры
      description: Наличие встроенной мягкой подкладки в точках контакта (шея, плечо,
        большой палец).
    support_structure_type:
      name: Тип опорной конструкции
      description: Конструкция для удержания ветрозащиты в вертикальном положении.
    supported_bowling_delivery_types:
      name: Поддерживаемые типы подачи
      description: Варианты подачи в крикете, которые может имитировать машина, например
        подачи с закруткой внутрь, с закруткой наружу и типы вращения.
    supported_dive_modes:
      name: Поддерживаемые режимы дайвинга
      description: Поддерживаемые режимы погружения дайв-компьютера, такие как Air,
        Nitrox или Gauge.
    supported_equipment_type:
      name: Поддерживаемый тип снаряжения
      description: Тип зимнего спортивного снаряжения, для которого предназначено
        крепление (например, лыжи, сноуборды, лыжные палки).
    supported_spin_types:
      name: Поддерживаемые типы вращения
      description: Варианты вращения мяча, которые может задавать пусковое устройство.
    supported_spool_bobbin_types:
      name: Поддерживаемые типы катушек и шпулек
      description: Форматы катушек и шпулек, для которых предназначено электрическое
        намоточное устройство.
    surf_wax_temperature_rating:
      name: Температурный диапазон применения серф-воска
      description: Диапазон температуры воды, для которого предназначен воск. Обеспечивает
        оптимальное сцепление в различных климатических условиях.
    surface_coating_or_finish:
      name: Покрытие или отделка поверхности
      description: Защитная или улучшающая эксплуатационные свойства обработка поверхности
        плоскогубцев.
    surface_coating_or_wrap:
      name: Покрытие или обмотка поверхности
      description: Внешняя обработка поверхности для хвата и контроля центральной
        палочки, а иногда и ручных палочек.
    surface_finish:
      name: Отделка поверхности
      description: Текстура и ощущения поверхности мяча. Влияет на хват и движение
        при контактном жонглировании.
    surface_finish_prep:
      name: Отделка и подготовка поверхности
      description: Состояние фрикционной поверхности на момент продажи (например,
        восстановленная, обработанная, литая).
    surface_types_included:
      name: Входящие типы поверхностей
      description: Поверхности для рисования или живописи, входящие в комплект (при
        наличии), например холст, бумажный блок, деревянные панели или отсутствие
        поверхности.
    surfboard_construction:
      name: Конструкция серфборда
      description: Основная технология конструкции или схема слоев серфборда.
    surfboard_tail_shape:
      name: Форма хвоста серфборда
      description: Контур хвостовой части доски. Влияет на маневренность и удержание.
    suspension_bushing_type:
      name: Тип втулки подвески
      description: Функциональный тип или способ установки втулки подвески.
    suspension_configuration:
      name: Конфигурация подвески
      description: Наличие подвески у трехколесного велосипеда и место ее расположения.
    suspension_material:
      name: Материал подвеса
      description: Материал цепей, канатов или тросов для подвешивания качелей.
    suspension_trainer_accessories_included:
      name: Аксессуары для тренажера с подвесной системой в комплекте
      description: Дополнительные предметы в комплекте тренажера (например, дверной
        анкер, удлинительный ремень, сумка для хранения). Помогает понять состав комплекта
        и сравнить ценность наборов.
    suspension_trainer_anchor_type:
      name: Тип крепления тренажера с подвесной системой
      description: Тип крепления или точка фиксации ремней (например, дверь, потолок,
        дерево). Указывает на совместимость с условиями использования.
    suspension_type:
      name: Тип подвески
      description: 'Тип вилки: жесткая или с определенной системой подвески (воздушная,
        пружинная, гибридная, эластомерная и т. п.). Помогает подобрать вилку под
        стиль катания.'
    sustain_pedal_form_factor:
      name: Формфактор педали сустейна
      description: Физический стиль педали сустейна (например, педаль фортепианного
        типа или компактный ножной переключатель). Влияет на ощущения и назначение.
    sustain_pedal_switch_type:
      name: Тип переключателя педали сустейна
      description: 'Тип сигнала педали: моментальный (сустейн при нажатии) или фиксируемый
        (переключаемый).'
    sustainability_certification:
      name: Сертификация устойчивого происхождения
      description: Экологическая сертификация или сертификация происхождения древесного
        материала.
    swab_intended_bassoon_section:
      name: Предназначенная секция фагота для шомпола
      description: Часть фагота, для очистки которой предназначен шомпол. Разные каналы
        и секции требуют различных форм и размеров шомполов.
    swab_style:
      name: Стиль шомпола
      description: Конструкция или формат шомпола для очистки частей саксофона.
    swab_weight_material:
      name: Материал груза шомпола
      description: Материал протяжного груза или направляющего элемента (при наличии).
        Влияет на риск царапин и долговечность.
    swab_weight_style:
      name: Стиль утяжелителя тампона
      description: Способ утяжеления шомпола для прохождения через канал фагота.
    sway_bar_adjustability:
      name: Регулируемость стабилизатора поперечной устойчивости
      description: Наличие и способ регулировки жесткости стабилизатора поперечной
        устойчивости (обычно через несколько отверстий крепления стоек).
    sway_bar_coating:
      name: Покрытие стабилизатора поперечной устойчивости
      description: Обработка поверхности или покрытие стабилизатора поперечной устойчивости.
        Обеспечивает устойчивость к коррозии и внешний вид.
    sway_bar_fitment_front_rear_kit:
      name: Совместимость стабилизатора поперечной устойчивости (передний/задний/комплект)
      description: Предназначение стабилизатора поперечной устойчивости для передней
        оси, задней оси или продажа комплектом для передней и задней оси.
    sweatshirt_pocket_type:
      name: Тип карманов толстовки
      description: Стиль карманов толстовки.
    sweet_potato_variety:
      name: Сорт батата
      description: Конкретный сорт или рыночная разновидность батата.
    sweet_spot_position:
      name: Расположение «зоны оптимального удара»
      description: Расположение «зоны оптимального удара» на бите. Влияет на стиль
        игры и условия подачи.
    sweetener_presence:
      name: Наличие подсластителей
      description: Наличие добавленных подсластителей в ореховой пасте и уровень их
        содержания.
    sweetening_type:
      name: Тип подслащивания
      description: Способ подслащивания продукта или уровень сладости.
    swim_armband_construction_type:
      name: Тип конструкции нарукавников для плавания
      description: Конструкция или механизм плавучести нарукавников (надувные, из
        цельной пены, гибридные и т. п.).
    swim_belt_purpose:
      name: Назначение пояса для плавания
      description: Функциональная классификация пояса для плавания (например, поддержка
        плавучести, акваджоггинг, тренировка сопротивления, стационарный трос, крепление
        тормозного парашюта, балластный груз, безопасное передвижение по воде).
    swim_board_features:
      name: Функции доски для плавания
      description: Особые характеристики или улучшения доски для плавания. Повышают
        удобство использования или безопасность.
    swim_bottom_length:
      name: Длина нижней части купального костюма
      description: Общая степень покрытия ног плавательными шортами (например, короткие
        плавки или длина до колена).
    swim_buoy_features:
      name: Особенности плавучего буя
