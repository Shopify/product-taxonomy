    analyte_measured:
      name: Измеряемый аналит
      description: Биомаркеры, для которых обеспечивает калибровку контрольный раствор.
    anamorphic_squeeze_ratio:
      name: Коэффициент сжатия анаморфотного объектива
      description: Информация о коэффициенте горизонтального сжатия анаморфотного
