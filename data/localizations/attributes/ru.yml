    watercraft_steering_cable_system_type:
      name: Тип системы рулевого троса водного транспорта
      description: Тип рулевой системы, для которой предназначен трос (например, роторная
        или реечная).
    watercraft_steering_wheel_hub_bore_type:
      name: Тип ступицы рулевого колеса судна
      description: Тип соединительного разъема (например, конический, шлицевой) в
        месте соединения колеса со ступицей или переходником.
    watercress_variety:
      name: Сорт кресс-салата
      description: Конкретный сорт кресс-салата.
    waterproof_level:
