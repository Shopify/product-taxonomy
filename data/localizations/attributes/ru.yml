    weaving_shuttle_use_case:
      name: Область применения челнока
      description: Назначение челнока для конкретных типов ткачества.
    webbing_construction_type:
      name: Тип конструкции стропы
      description: Физический тип плетения стропы, влияющий на прочность, удобство
