        определить совместимость с другими наборами.
    dinosaur_species_included:
      name: Виды динозавров в наборе
      description: Какие виды динозавров представлены в игровом наборе (фигурки или
        литые динозавры).
    dipsy_diver_size_designation:
      name: Размерное обозначение дипси-дайвера
      description: Размерный код рыболовного дипси, установленный производителем.
