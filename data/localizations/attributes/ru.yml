    willow_grade:
      name: Класс ивы
      description: Класс качества ивы, отражающий структуру волокон и уровень характеристик.
    willow_type:
      name: Тип ивы
      description: Тип ивы или альтернативного материала лопасти биты, влияющий на
        характеристики, долговечность и стоимость.
    wind_up_mechanism_type:
      name: Тип заводного механизма
      description: Способ заводки или активации игрушки.
    wind_up_toy_movement_pattern:
      name: Тип движения заводной игрушки
      description: Основное движение, производимое заведенным изделием.
    windbreak_purpose:
      name: Назначение ветрозащиты
      description: Основное назначение ветрозащиты.
    windfoil_board_mounting_system:
      name: Система крепления виндфойл-доски
      description: Тип крепления или интерфейс монтажа, встроенный в виндфойл-доску.
    windfoil_sail_style:
      name: Стиль паруса виндфойла
      description: Классификация паруса в зависимости от предполагаемого стиля или
