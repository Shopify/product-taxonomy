        чехлы.
    3d_printer_cleaning_kit_components_included:
      name: Компоненты набора для чистки 3D-принтера в комплекте
      description: Отдельные инструменты и расходные материалы, входящие в набор,
        чтобы покупатели точно знали, что они приобретают.
    3d_printing_resin_type:
      name: Тип смолы для 3D-печати
      description: 'Формула или предполагаемое применение смолы, позволяющие покупателю
        быстро определить тип смолы: стандартная, инженерная, литьевая или другая
        специализированная.'
    80_plus_efficiency_rating:
      name: Рейтинг эффективности 80 Plus
      description: Официальный уровень сертификации энергоэффективности 80 Plus для
        БП.
    abrasive_material:
      name: Абразивный материал
      description: Тип абразива, который используется в шлифовальном инструменте (например,
        алмаз или карбид кремния)
    absinthe_style:
      name: Способ изготовления абсента
      description: Способ изготовления абсента (например, холодное смешивание или
        дистилляция)
    absinthe_variety:
      name: Тип абсента
      description: Тип абсента по характеристикам напитка (например, красный или зеленый)
    absorbency_level:
      name: Впитываемость
      description: Впитывающая способность, как правило, средства личной гигиены (например,
        слабая или ночная)
    absorbent_hygiene_product_features:
      name: Характеристики впитывающих средств гигиены
      description: Особые характеристики средств гигиены (например, защита от протекания
        или гипоаллергенность)
    academic_level:
      name: Уровень подготовки
      description: Уровень подготовки людей, для которых предназначен медиаконтент
        (например, студенты или доктора наук)
    accessibility_design_features:
      name: Характеристики дизайна доступности
      description: Специальные элементы дизайна, которые помогают пользователям с
        проблемами слуха, зрения или ловкости.
    accessory_material:
      name: Материал аксессуара
      description: Материал, из которого изготовлен аксессуар, как правило, товар
        для упаковки грузов (например, пластик или картон)
    accessory_size:
      name: Размер аксессуара
      description: Размер аксессуара (например, без размера или компактный)
    accordion_tuning:
      name: Тип настройки аккордеона
      description: Тип настройки аккордеона (например, сухое звучание или концертный
        строй)
    activation_mechanism:
      name: Механизм активации
      description: Основной метод, который запускает сигнал тревоги.
    activation_method:
      name: Система активации
      description: Описание активации предоплаченного кредита или SIM-карты пользователем.
    active_ingredient:
      name: Действующее вещество
      description: Основные действующие вещества в составе средства для ухода за собой
