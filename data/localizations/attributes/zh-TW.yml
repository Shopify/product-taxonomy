      description: 根據脂肪含量、加工方式或預定烹调用途識別鮮奶油的特定類型（例如 half-and-half、double cream、烹調用鮮奶油）。
    crib_accessory_features:
      name: 嬰兒床配件功能
      description: 列出嬰兒床與幼兒床配件特有的功能性或舒適性特色，例如透氣性或彈性邊緣。
    crib_bumper_features:
      name: 嬰兒床圍墊特色
      description: 標示嬰兒床防撞圍的特殊功能特色。
    crib_conversion_kit_components:
      name: 嬰兒床改裝套件組件
      description: 列出套件中包含的主要零件，方便購物者確認安裝所需物品是否齊全。
    cricket_ball_grade:
      name: 板球等級
      description: 指定球的品質等級或預定比賽標準。
    cricket_ball_piece_construction:
      name: 板球分片結構
      description: 指出球殼由多少片外層部件或模製區段構成，這是品質與價格的重要指標。
    cricket_ball_type:
      name: 板球用球類型
      description: 指定商品隨附的板球類型，或說明是否未包含板球。
    cricket_bat_accessory_type:
      name: 板球棒配件類型
      description: 指定板球棒配件或保養用品的類型，讓購物者能快速篩選出所需商品。
    cricket_bat_size:
      name: 板球棒尺寸
      description: 表示標準化的板球棒尺寸分類（0–6、Harrow、SH、LH），通常依球員年齡與身高選擇。
    cricket_bat_size_compatibility:
      name: 板球棒尺寸相容性
      description: 列出配件設計適用的球棒尺寸，以確保正確相容。
    cricket_helmet_role:
      name: 板球頭盔用途
      description: 指出頭盔設計適用的比賽角色，例如擊球或守門。
    cricket_leg_guard_type:
      name: 板球護腿類型
      description: 表示板球護腿防護的具體款式。
    cricket_player_role:
      name: 板球球員角色
      description: 指定鞋子設計適用的主要比賽角色。
    cricket_protection_grade:
      name: 板球防護等級
      description: 指定板球裝備製造商所指定的防護等級分類。
    cricket_stump_base_type:
      name: 板球柱門底座類型
      description: 指出球門柱隨附底座的樣式或材質，這會影響穩定性與比賽場地適用性。
    cricket_stump_target_features:
      name: 板球球門柱靶標特色
      description: 重點說明可提升訓練可用性、可見性、耐用性或穩定性的獨特功能特色。
    cricket_stump_type:
      name: 板球球門柱類型
      description: 依球門柱的樣式或結構分類，幫助購物者在傳統比賽球門柱、訓練款或現代發光款之間選擇。
    cricket_training_focus:
      name: 板球訓練重點
      description: 此輔助器材設計用於提升的主要板球技能或項目。
    croquet_set_components_included:
      name: 包含槌球組組件
      description: 列出套組隨附的所有關鍵組件（例如球門、地釘、提袋），讓顧客清楚了解購買內容。
    cross_country_binding_system:
      name: 越野滑雪固定器系統
      description: 指定商品鑽孔所依據或相容的越野滑雪固定器標準。
    cross_stitch_chart_symbol_type:
