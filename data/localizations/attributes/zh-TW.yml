    voltage_regulator_connector_type:
      name: 電壓調節器接頭類型
      description: 指明用於將調節器連接至車輛線材/交流發電機/發電機的連接/端子樣式。
    wader_foot_type:
      name: 涉水褲腳類型
      description: 指明涉水褲腳是否具備一體成型靴或是獨立的襪套設計。
    wader_sole_type:
      name: 涉水褲鞋底型
      description: 指明涉水靴或帶靴涉水褲所使用的外底材質或抓地力類型。
    waistband_style:
      name: 褲頭樣式
      description: 描述褲頭結構，以及其如何固定或調整的方式，以達到貼合與舒適度。
    wakeboard_binding_mounting_pattern:
      name: 滑水板腳套安裝樣式
      description: 指明滑水板相容於腳套的嵌件/板片樣式。
    wakeboard_riding_style:
      name: 滑水板騎乘風格
      description: 將滑水板的預期環境或使用風格進行分類。
    wall_decal_style:
      name: 壁貼樣式
      description: 指明壁貼的製作/黏貼的方式 (例如：模切、轉印、貼紙張)。
    wallyball_equipment_included:
      name: 包含的軟排球裝備
      description: 列出軟排球組中提供的具體件數，讓購物者能清楚知道他們購買的內容並可比較不同的套裝組合。
    warp_beam_type:
      name: 經軸類型
      description: 指明織布機內含或已安裝的經軸配置 (織布機提供的軸筒設定)。
    washability:
      name: 可洗性
      description: 指示黏膠是否可用水清理，和/或在塗抹後是否可清洗。
    watch_band_design:
      name: 錶帶設計
      description: 描述錶帶的結構樣式或設計圖案 (例如：NATO、米蘭帶、鍊帶)。
    watch_movement:
      name: 手錶機芯
      description: 指明為手錶提供動力的機械裝置，這是購物者用來區分不同型號的關鍵因素。
    water_activation:
      name: 遇水啟動
      description: 信標是否能在浸水時自動啟動 (常見於 I/II 類應急指位無線電示標 EPIRB)。
    water_chamber_configuration:
      name: 水室配置
      description: 描述床墊內部的水袋佈局，例如單水室或雙水室，這會影響支撐力、溫度控制與伴侶干擾。
    water_dispensing_mechanism:
      name: 用水配送機制
      description: 定義水從裝置中釋放的方式，例如水龍頭、噴嘴或重力傾倒。
    water_exposure_protection_level:
      name: 防水保護等級
      description: 指示商品接觸水時的保護等級 (例如：防潑水與暫時浸入水中)。當有官方的防護 (IP) 代碼可用時，請使用 IP 等級。
    water_fed_design:
      name: 通水設計
      description: 指示刷子是否設計為可透過通水手柄或水管連接，搭配流動的自來水使用。
    water_gun_features:
      name: 水槍功能
      description: 水槍顯著的功能特色與內含能力。
    water_gun_operating_mechanism:
      name: 水槍操作機制
      description: 水槍在使用時加壓並噴出水的方式。
    water_gun_spray_pattern:
      name: 水槍噴水模式
      description: 擊發期間由噴嘴產生的水流種類。
    water_heating_method:
      name: 水加熱方式
      description: 描述水在使用前是否經過加熱，以及採用何種加熱方式—例如太陽能吸收、丙烷燃燒器、電熱元件、電池供電加熱、保溫隔熱，或不加熱。
    water_mattress_construction:
      name: 水床墊結構
      description: 指明水床墊的結構樣式 (例如：硬邊或軟邊)，這決定了床架相容性與整體觸感。
    water_play_features:
      name: 戲水功能
      description: 水上樂園/滑水道中包含的水上活動組件。
    water_polo_competition_approval:
      name: 水球比賽核准
      description: 識別該球獲得官方核准或認證的管理機構或比賽級別。
    water_polo_goal_type:
      name: 水球球門類型
      description: 將球門的結構或安裝配置進行分類 (例如：漂浮式、甲板安裝式、便攜式)。
    water_pump_drive_type:
      name: 水泵浦驅動類型
      description: 指明車輛冷卻系統中的水泵驅動/致動方式。
    water_pump_housing_material:
      name: 水泵外殼材質
      description: 水泵外殼/本體的材質。
    water_pump_impeller_material:
      name: 水泵葉輪材質
      description: 指明水泵葉輪 (移動冷卻液的內部轉子/葉片) 的材質。
    water_pump_mounting_type:
      name: 水泵安裝類型
      description: 指明水泵用於引擎安裝的安裝/外型規格樣式 (例如：螺栓固定式外殼、筒式/插入式)。
    water_purification_method:
      name: 淨水方式
      description: 識別商品在野外使水變得可安全飲用的主要機制 (例如：幫浦、重力供水、紫外線)。
    water_resistance:
      name: 防水性
      description: 傳達所提供的天氣防護程度，例如防水或防潑水。
    water_resistance_level:
      name: 防水等級
      description: 指示紡織品是否具備抗水性以及其程度。
    water_resistance_rating_case_protection_level:
      name: 防水等級 (樂器箱防護等級)
      description: 指示樂器箱提供的防水/防護等級 (行銷層級，而非電子產品 IP 密封)，例如防潑水與防水。
    water_rocket_kit_items_included:
      name: 包含水火箭套件品項
      description: 商品包裝中的主要包含組件。
    water_rocket_propulsion_type:
      name: 水火箭推進類型
      description: 用於發射火箭的主要推進/能源來源。
    water_rocket_recovery_system:
      name: 水火箭回收系統
      description: 發射後用於回收火箭的方式。
    water_ski_base_design:
      name: 滑水板底部設計
      description: 指明滑水板的底部船體輪廓，這會影響操控特性。
    water_ski_fin_type:
      name: 滑水板鰭片類型
      description: 指明滑水板鰭片配置，這會影響循跡性與機動性。
    water_source:
      name: 水源
      description: 識別碳酸化之前的水源地。
    water_sports_safety_standard:
      name: 水上運動安全標準
      description: 列出商品符合的正式安全或浮力標準 (例如： 適用於頭盔的 CE EN 1385、適用於浮力輔助用具的 ISO 12402-5、美國海岸防衛隊類型
        III ( USCG Type III) 規範)。
    water_table_feature_set:
      name: 水桌功能組
      description: 突顯水桌內建遊戲功能，例如瀑布、噴水器、幫浦或多層水盆。
    water_table_items_included:
      name: 包含水桌品項
      description: 指明水桌組附有哪些配件 (例如：船、杯子、漏斗、人偶)。
    water_table_water_source_type:
      name: 水桌水源類型
      description: 指明水桌的注水或供水的方式。
    waterbed_stabilization_level:
      name: 水床穩定等級
      description: 指示水床墊提供的減少波浪或動作控制的程度。
    watercolor_ink_water_resistance_after_drying:
      name: 水彩墨水防水性 (乾燥後)
      description: 指示水彩墨水在乾燥後是否具備防潑水/防水性 (依據製造商聲明)。
    watercraft_care_application_area:
      name: 船艇保養適用區域
      description: 指示商品預期使用在船艇的主要區域或組件。
    watercraft_drive_mechanism:
      name: 船艇驅動機制
      description: 描述安裝或支援的特定船上推進機制。
    watercraft_fuel_tank_sending_unit_pattern:
      name: 船艇油箱感測器孔距
      description: 指明油箱感測器與相容儀表的安裝孔距/標準 (例如：常見的航海螺栓孔距)。
    watercraft_fuel_tank_shape:
      name: 船艇油箱形狀
      description: 描述油箱的整體實體外型規格，以支援空間/適配規劃。
    watercraft_hull_material:
      name: 船體材質
      description: 指明船體結構的主要材質。
    watercraft_ignition_part_voltage:
      name: 船艇點火零件電壓
      description: 點火零件的標稱額定電壓/要求 (適用時)，例如 12 V 系統。
    watercraft_impeller_material_grade:
      name: 船艇葉輪材質等級
      description: 指明船艇葉輪的材質 (例如：氯丁橡膠、丁腈橡膠、青銅)。
    watercraft_lighting_certification_compliance:
      name: 船艇照明認證 / 合規性
      description: 指示燈具為航海用途所取得的法規/標準合規認證，例如符合美國海岸防衛隊 (USCG)/美國船舶和遊艇協會(ABYC) /海上避碰規則國際公約
        (COLREGs)。
    watercraft_motor_mount_adjustment_features:
      name: 船艇馬達座調整功能
      description: 馬達座的調整能力 (例如傾斜、升降、滑動)，這會影響可用性與安裝貼合度。
    watercraft_piston_part_type:
      name: 船艇活塞零件類型
      description: 識別產品資訊呈現的活塞相關組件。
    watercraft_propeller_blade_rake:
      name: 船艇推進器葉片傾角
      description: 指明葉片傾角 (葉片相對於輪轂的角度)，這會影響船艏抬升與性能。
    watercraft_propeller_rotation_direction:
      name: 船艇推進器旋轉方向
      description: 指示為傳動系統相容性所需的推進器旋轉方向/旋向 (例如右手/標準與左手/反轉)。
    watercraft_pump_stage_impeller_role:
      name: 船艇幫浦級數 / 葉輪作用
      description: 識別葉輪是否用於特定的幫浦作用 (例如原水/海水泵浦、冷卻液循環、噴射泵浦)。
    watercraft_registration_status:
      name: 船舶登記狀態
      description: 指示帆船是否包含所有權狀和/或登記文件。
    watercraft_safety_equipment_activation_type:
      name: 船艇安全設備啟動類型
      description: 啟動安全裝置的主要方式，用於信標/人員落海警報器 (MOB) /個人無線電示標 (PLB)，有別於充氣機制。
    watercraft_steering_cable_core_material:
      name: 船艇轉向纜芯材質
      description: 指定傳遞力的內纜/芯材的材質。
    watercraft_steering_cable_hardware_included:
      name: 包含船艇轉向纜線五金配件
      description: 指明轉向纜線隨附的安裝五金配件與附屬品。
    watercraft_steering_cable_system_type:
      name: 船艇轉向纜線系統類型
      description: 指定纜線設計適用的轉向系統架構 (例如旋轉式、齒條式)。
    watercraft_steering_wheel_hub_bore_type:
      name: 船艇方向盤輪轂/孔徑類型
      description: 指明方向盤與輪轂或轉接座接合處的中心安裝/孔徑介面樣式 (例如錐形、花鍵)。
    watercress_variety:
      name: 西洋菜品種
      description: 識別所售的西洋菜具體品種或類型。
    waterproof_level:
      name: 防水等級
      description: 指示鞋類的防水等級，包含任何有保固擔保的防水聲明。
    wax_blend_composition:
      name: 蠟混合成分
      description: 列出商品中混合的蠟材質和/或市場混合類型。
    wax_coat_type:
      name: 蠟塗層類型
      description: 指示蠟預期是作為底漆、面漆，還是多用途/單層配方。
    wax_hardness:
      name: 蠟硬度
      description: 指示蠟的相對硬度，這會影響在不同雪質上的耐用性與滑動性。
    wax_physical_form:
      name: 蠟實體型態
      description: 指示提供作為蠟燭原料蠟的實體型態/形狀。
    wax_recommended_candle_application:
      name: 蠟建議蠟燭應用
      description: 指示蠟配方主要適用的蠟燭樣式。
    wax_tackiness_level:
      name: 蠟黏性等級
      description: 描述蠟在刀片上所提供的黏度/抓握力等級。
    weapon_system_integration:
      name: 武器系統整合
      description: 指示車輛是否包含整合式武器系統或支架。
    weather_suitability:
      name: 天候適用性
      description: 指示手套設計適用的環境條件，例如寒冷天氣或潮濕天氣遊玩。
    weave_finish:
      name: 編織/表面處理
      description: 描述影響領帶質地與光澤的主要布料編織或表面處理。
    weave_style:
      name: 編織樣式
      description: 指明製作巴拿馬帽時使用的傳統編織圖案，這會影響透氣性、靈活性、外觀與價格。
    weave_type:
      name: 編織類型
      description: 識別影響質地、光澤與垂墜感的布料編織/結構樣式 (業界編織名稱)。
    weaving_beater_edge_type:
      name: 編織梳邊緣類型
      description: 描述接觸緯線的平坦編織梳之工作邊緣輪廓 (例如：直邊與鋸齒狀)。
    weaving_beater_style:
      name: 編織梳類型
      description: 識別平坦編織梳的功能樣式/格式。
    weaving_shuttle_tip_style:
      name: 織梭尖端樣式
      description: 指明梭子的前尖端/鼻部設計，這會影響它穿過梭口的方式以及勾住經線的可能性。
    weaving_shuttle_use_case:
      name: 織梭使用情境)
      description: 指明梭子設計或最佳化所適用的預期編織應用。
    webbing_construction_type:
      name: 織帶結構類型
      description: 描述織帶的實體編織或編結樣式，這會影響手感、強度與預期用途。
    webbing_design:
      name: 蹼帶設計
      description: 描述手指之間的蹼帶樣式，這會影響阻力訓練與推進力。
    weight_adjustability:
      name: 重量可調整性
      description: 描述商品的阻力是否可由使用者改變 (例如：插銷式或可裝載式)，或者是固定在單一重量上。
    weight_integration_system:
      name: 配重整合系統
      description: 描述配重壓艙物是否及如何整合到浮力補償裝置 (BCD) 中 (例如可拆卸式配重袋、無配重、選配附加元件)。
    weight_plate_compatibility:
      name: 槓片相容性
      description: 定義該機器接受哪種直徑的槓片 (奧林匹克、標準或兩者皆可)。
    weight_plate_style:
      name: 槓片樣式
      description: 將槓片的設計/類型進行分類 (例如奧林匹克、包膠摔片、插銷式)，以便快速篩選相容性。
    weightlifting_belt_style:
      name: 舉重腰帶樣式
      description: 將腰帶的整體設計或目的導向配置進行分類 (例如快扣腰帶、負重腰帶、錐形腰帶)。
    weightlifting_federation_certification:
      name: 舉重協會認證
      description: 國際健力聯合會 (IPF) 或國際舉重總會 (IWF) 等力量運動協會授予商品的官方核准或合規性證明。
    wetsuit_boot_height:
      name: 潛水鞋高度
      description: 將靴子在腿上的高度/剪裁進行分類，這會影響包覆性、活動度與進水情況。
    wetsuit_entry_system:
      name: 潛水衣穿脫系統
      description: 描述用於穿入潛水衣的開口/拉鍊系統類型與位置。
    wetsuit_seam_construction:
      name: 潛水衣接縫結構
      description: 指明接縫製作與密封的方式，這會影響保暖性、靈活性與耐用度。
    wheat_product_form:
      name: 小麥商品形式
      description: 指定小麥商品的實體或加工形式。
    wheel_arrangement:
      name: 輪軸配置
      description: 指明蒸汽機車的輪軸配置 (華氏輪式)，這是一個定義特徵，也是常見的收藏家/搜尋詞彙。
    wheel_brake_type:
      name: 車輪煞車類型
      description: 詳述推車輪子或腳輪上提供的煞車配置。
    wheel_chock_grip_features:
      name: 車輪擋抓地力功能
      description: 可改善表面固定力及對抗輪胎的牽引力與抓地力設計功能。
    wheel_cleaner_acidity_ph_category:
      name: 輪圈清潔劑酸度 / pH 值類別
      description: 指示輪圈清潔劑是酸性、中性還是鹼性 (可選擇性指出其是否標示為 pH 值平衡)。
    wheel_cleaner_formula_type:
      name: 輪圈清潔劑配方類型
      description: 針對輪圈清潔劑及相關洗劑，指示商品的主要配方類別 (例如酸性、非酸性、pH 值中性/平衡，或鐵粉反應型)。
    wheel_construction_type:
      name: 車輪結構類型
      description: 指定輪圈的製造/結構方式。
    wheel_contaminant_target:
      name: 輪圈髒污目標
      description: 指明清潔劑設計用於清除的主要髒污類型。
    wheel_core_type:
      name: 車輪核心類型
      description: 描述輪芯的結構樣式，這會影響重量、剛性與能量傳遞。
    wheel_cylinder_inlet_port_thread_standard:
      name: 輪缸進油口螺紋標準
      description: 指明輪缸上煞車油管進油口的螺紋標準 (例如指標氣泡喇叭口與 SAE 倒喇叭口)。
    wheel_fastener_seat_type:
      name: 輪圈緊固件座類型
      description: 指明與輪圈接合的輪帽/螺栓座樣式 (例如：錐形/斜度、球形/半徑、平頭、平底帶套筒)。
    wheel_illumination:
      name: 輪子照明
      description: 指出輪子是否具有內建照明或發光功能。
    wheel_material:
      name: 輪子材質
      description: 識別輪子的主要成分，這會影響耐用度、抓地力與減震效果。
    wheel_profile:
