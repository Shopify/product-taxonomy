      description: 指定躺椅傾斜機構的操作方式（例如手動拉桿、電動按鈕面板、遙控器）。
    recliner_motion_type:
      name: 躺椅動作類型
      description: 定義躺椅的主要活動功能（例如搖椅、滑動椅、旋轉椅、貼牆式、升降椅）。
    reclining_mechanism:
