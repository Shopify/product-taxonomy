      description: 圖表的呈現方式（符號、顏色或兩者兼具）。
    cross_stitch_finishing_type:
      name: 十字繡成品形式
      description: 繡製專案預定的成品/展示形式。
    cross_stitch_frame_fabric_holding_mechanism:
      name: 十字繡框布料固定機制
      description: 指出布料在繡框中如何固定/張緊（例如夾子、夾具、圖釘），這會影響易用性與布料相容性。
    cross_stitch_frame_included_components:
      name: 十字繡框隨附組件
      description: 列出包裝盒內含物（例如僅繡框，或繡框 + 夾具 + 支架），以減少歧義與退貨。
    cross_stitch_frame_type:
      name: 十字繡框類型
      description: 指定十字繡框的結構/類型（布料固定方式），這會影響可用性與專案相容性。
    cross_stitch_pattern_technique:
      name: 十字繡圖案技法
      description: 圖表所需的十字繡技法/樣式。
    crossbar_shape_profile:
      name: 橫桿形狀/輪廓
      description: 指定橫桿的空氣動力學/輪廓形狀。
    crossbar_style:
      name: 橫桿樣式
      description: 識別橫桿的結構樣式，區分剛性比賽橫桿、柔性橫桿或混合式訓練橫桿。
    crossbow_type:
      name: 弩類型
      description: 識別弩的基本設計樣式，例如複合弩、反曲弩或手槍弩。結構樣式會影響性能、尺寸與使用情境，因此購物者常依此篩選。
    crossover_component_type:
      name: 分音器元件類型
      description: 識別被動分音網路中使用的主要元件拓撲。
    crossover_configuration:
      name: 交叉型配置
      description: 指出分音器使用單一分頻點或多個分頻點（例如 2 音路與 3 音路設計）。
    crossover_type:
      name: 分音器類型
      description: 組件套組隨附的分音網路類型。
    crown_profile:
      name: 帽冠輪廓
      description: 指定帽冠高於帽簷的高度/輪廓。
    crown_style:
      name: 帽冠樣式
      description: 定義圓頂禮帽帽冠的整體輪廓或形狀。
    crust_taste_profile:
      name: 餅皮風味特徵
      description: 指出餅皮本身的風味傾向為甜味、鹹味或中性。
    crystal_finish:
      name: 水晶表面處理
      description: 描述散裝水晶的表面處理、塗層或加工狀態 (例如原石、拋光、滾磨、切面、霧面、Aura 鍍膜、染色、熱處理)。
    crystal_material:
      name: 錶鏡材質
      description: 指定用於保護錶盤的錶鏡材質。
    crystalline_finish_style:
