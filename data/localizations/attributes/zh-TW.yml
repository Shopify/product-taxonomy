      name: 汽缸蓋材質等級
      description: 指定汽缸蓋鑄件所用材質及等級。
    cylinder_head_position:
      name: 汽缸蓋位置
      description: 識別汽缸蓋在多缸列引擎上適用的缸列/側邊或安裝方向 (例如左側/右側或第 1 缸列/第 2 缸列)。
    cymbal_alloy:
      name: 鈸合金
      description: 套件中鈸的合金/成分。
    cymbal_application:
      name: 鈸演奏用途
      description: 鈸設計/銷售時主打的主要演奏用途。
    cymbal_arm_mounting_interface:
      name: 鈸臂安裝介面
      description: 指定鈸臂如何連接到其他鼓組硬體 (例如夾具、鼓架、支架接收座)。
    cymbal_arm_rotation_positioning_features:
      name: 鈸臂旋轉/定位功能
      description: 指定會影響鈸臂角度調整/旋轉和鎖定方式的定位功能。
    cymbal_arm_style:
      name: 鈸臂款式
      description: 指定鈸臂為直臂或吊臂，以配合延伸距離和定位偏好。
    cymbal_drum_case_wheel_configuration:
      name: 鈸與鼓箱輪子配置
      description: 表示箱體是否配備輪子，以及 (如適用) 滾動運輸用的輪子配置。
    cymbal_hammering_style:
      name: 鈸錘擊樣式
      description: 會影響複雜度和手感的錘擊工藝/外觀。
    cymbal_kit_components_included:
      name: 包含銅鈸組組件
      description: 指定 Ride 鈸套件/組合包中包含的鈸類型 (除了 Ride 鈸本身之外)。
    cymbal_kit_items_included:
      name: 包含銅鈸組品項
      description: 識別套件/組合包內含的鈸 (依鈸類型)。
    cymbal_lathing:
      name: 鈸車削處理
      description: 指定鈸面是否或有多少部分經過車削 (形成溝槽)，相對於未車削/原始表面。
    cymbal_playing_style_genre:
      name: 鈸演奏風格/類型
      description: 識別鈸設計適用的典型演奏情境 (例如肚皮舞指鈸，或行進/管弦樂手鈸)。
    cymbal_set_configuration:
      name: 鈸組配置
      description: 表示商品是以單片鈸、配對鈸或多對套組販售 (例如用於團體教學)。
    cymbal_sound_character:
      name: 銅鈸聲音特性
      description: 描述用於探索/篩選的鈸整體音色輪廓/發聲特性 (例如明亮或暗沉)。
    cymbal_sustain:
      name: 鈸延音
      description: 鈸敲擊後持續響起的時間。
    cymbal_type:
      name: 鈸類型
      description: 指定電子鈸打擊墊預定模擬的功能性鈸片角色。
    cymbal_volume_level:
      name: 鈸音量等級
      description: 鈸片的感知響度/輸出類別。
    cymbal_weight_class:
      name: 鈸重量等級
      description: 表示鈸片的重量等級，會影響音色、音量與反應。
    dairy_heat_treatment:
      name: 乳品熱處理
      description: 識別鮮奶油所採用的加工或殺菌程度（例如未經殺菌、巴氏殺菌、超高溫滅菌），這會影響保存期限、風味與打發效果。
    damage_type:
      name: 損壞類型
      description: 指定該套件預定修復的擋風玻璃損壞類型。
    damper_pedal_style:
      name: 延音踏板樣式
      description: 描述鍵盤/數位鋼琴所使用延音踏板的實體樣式。
    damping_adjustability:
      name: 阻尼可調性
      description: 指出避震器上哪些阻尼和/或車高參數可調整。
    damping_level:
      name: 弱音程度
      description: 表示弱音器可降低音量與延音的相對程度。
    dance_occasion:
      name: 舞蹈場合
      description: 表示服裝在舞蹈練習或表演中的預定使用情境。
    darbuka_accessories_included:
      name: 包含達布卡鼓配件
      description: 列出達布卡鼓常見的隨附配件。
    darbuka_body_finish_type:
      name: 達布卡鼓鼓身表面處理類型
      description: 描述達布卡鼓鼓身的外部表面處理、塗層或裝飾處理。
    darbuka_head_material:
      name: 達布卡鼓鼓面材質
      description: 指定達布卡鼓鼓面膜所使用的材質。
    dart_barrel_material:
      name: 飛鏢鏢身材質
      description: 指定飛鏢鏢身的主要材質，會影響重量分布、耐用性與價格。
    dart_shaft_design:
      name: 飛鏢鏢桿設計
      description: 依鏢桿的機械設計分類，例如固定式、旋轉式、伸縮式或與尾翼一體成形，這會影響性能與價格。
    dart_shaft_thread_type:
      name: 飛鏢鏢桿螺紋類型
      description: 表示用於將鏢桿旋入鏢身的螺紋尺寸/類型，以確保鏢桿與鏢身相容。
    dart_thread_size:
      name: 飛鏢螺紋尺寸
      description: 指定零件相容的螺紋尺寸/標準，以確保鏢桿、鏢尖與鏢身之間正確適配。
    dart_tip_compatibility:
      name: 飛鏢鏢尖相容性
      description: 指出飛鏢零件適用於鋼尖飛鏢、軟尖飛鏢或兩種款式皆適用。
    dart_tip_connection_type:
      name: 飛鏢鏢尖連接類型
      description: 描述鏢尖連接至鏢身或鏢桿所使用的螺紋規格或安裝系統，以確保相容性。
    dartboard_tournament_approval:
      name: 飛鏢靶賽事認證
      description: 表示飛鏢靶是否獲得特定飛鏢總會或聯盟的官方認可。
    dartboard_type:
