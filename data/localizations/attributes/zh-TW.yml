    compatible_helmet_size:
      name: 相容安全帽尺寸
      description: 指出面罩相容的頭盔尺寸。
    compatible_helmet_type:
      name: 相容安全帽類型
      description: 頸部支撐設計搭配使用的頭盔類別。
    compatible_hitch_receiver_size:
      name: 相容的拖車鉤接收器尺寸
      description: 配件設計適配的拖車鉤接收器開口尺寸（適用於拖車鉤安裝式置物架配件）。
    compatible_hook_size:
      name: 相容魚鉤尺寸
      description: 收納器設計適用的鉤針尺寸系統和/或尺寸範圍（例如美國字母/數字尺寸、毫米公制範圍）。
    compatible_horse_coat_type:
      name: 適用的馬匹毛型
      description: 指定除毛器最適合的馬匹毛髮特性（例如厚冬毛或敏感毛質）。
    compatible_host_platform:
      name: 相容主機平台
      description: 指定打擊板控制器相容的主機平台或裝置類型（例如 Windows、macOS、iOS、Android），或是否可在不連接電腦的情況下獨立運作。
    compatible_inflation_gas:
      name: 適用的充氣氣體
      description: 指定氣球預定填充的氣體（空氣、氦氣或兩者皆可）。
    compatible_injection_type:
      name: 相容的燃油噴射類型
      description: 指出商品設計用於清潔的燃油噴射系統類型。
    compatible_instrument_surface_material:
      name: 相容的樂器表面/材質
      description: 指出拋光劑預定適用的樂器表面/材質。
    compatible_intercom_system:
      name: 相容的對講系統
      description: 表示頭盔是否已準備好或相容，可安裝頭盔對講機/通訊系統。
    compatible_interior_material:
      name: 相容內裝材質
      description: 指出去污劑可安全且有效使用的車輛內裝材質 (例如地毯、布面內裝、皮革、乙烯基)。
    compatible_kayak_type:
      name: 相容皮艇類型
      description: 列出此帆具套件可安裝的常見獨木舟類型。
    compatible_license_plate_hole_pattern:
      name: 相容車牌孔位樣式
      description: 指定固定座/支架支援的安裝孔配置 (車輛側和/或車牌側)。
    compatible_license_plate_size:
      name: 相容車牌尺寸
      description: 表示固定座/支架適用的車牌地區規格或尺寸。
    compatible_loom:
      name: 相容織布機
      description: 指定平織打緯器適用的織布機類型。
    compatible_loom_type:
      name: 相容織布機類型
      description: 表示打緯器適用的織布配置 (例如硬式綜絖織布機或掛毯織布機)。
    compatible_machine_type:
      name: 相容機器類型
      description: 表示框架適用的絎縫配置類型 (僅限手工絎縫、家用縫紉機、長臂絎縫機)。
    compatible_mast_type:
      name: 相容桅杆類型
      description: 指定帆適用的桅杆直徑：縮徑桅杆 (RDM)、標準直徑桅杆 (SDM) 或兩者皆適用。
    compatible_model_system_train_scale:
      name: 相容模型系統 (火車比例)
      description: 指定配件適用的模型火車比例/系統 (例如 HO、N、O)。
    compatible_mounting_surface:
      name: 相容安裝表面
      description: 夾子設計用來夾住的表面或物體。
    compatible_mouthpiece_patch:
      name: 相容吹嘴貼片
      description: 表示吹嘴是否設計為可搭配吹嘴墊/貼片使用，以及建議的貼片厚度範圍。
    compatible_mouthpiece_type:
      name: 相容吹嘴類型
      description: 表示行進圓號設計使用的吹嘴類型/柄徑 (常見為法國號或小號式接收口，視型號而定)。
    compatible_neck_profile_width:
      name: 相容琴頸輪廓/寬度
      description: 表示變調夾適用的吉他琴頸輪廓/寬度類別 (例如窄版電吉他或寬版古典吉他)。
    compatible_needle_size:
      name: 相容針號
      description: 表示針盒適用的針尺寸/類型 (例如刺繡針、掛毯針、手縫針長度)。
    compatible_needle_system:
      name: 相容針系統
      description: 該機器相容的針系統 (例如 130/705H)。
    compatible_parking_brake_mechanism:
      name: 相容駐車煞車機構
      description: 表示卡鉗是否設計為可搭配整合式駐車煞車機構使用。
    compatible_pedal_instrument_type:
      name: 相容踏板樂器類型
      description: 指定踏板適用的樂器或裝置 (例如數位鋼琴、鍵盤/合成器、MIDI 控制器)。
    compatible_pedal_type:
      name: 相容踏板類型
      description: 表示綁帶或夾子適用的踏板款式或系統 (例如平台踏板、SPD 踏板、Look Keo 踏板)。
    compatible_pin_type:
      name: 相容插銷類型
      description: 該墊子適用的別針類型 (或是否可插針固定)。
    compatible_pipe_filter_size:
      name: 相容煙斗濾芯尺寸
      description: 表示煙斗可使用的濾芯尺寸或樣式 (或不需要濾芯)。
    compatible_plate_size:
      name: 相容板面尺寸
      description: 背心可容納的防彈板尺寸或標準尺寸。
    compatible_play_vehicle_scale:
      name: 相容遊戲車輛比例
      description: 表示該配件適用的玩具比例 (例如 1:64)，提升收藏品和軌道系統的組合相容性。
    compatible_playing_surface:
      name: 相容遊玩表面
      description: 表示美式足球鞋適用的比賽場地或場地表面類型。
    compatible_pole_dimensions:
      name: 相容桿件尺寸
      description: 指定配件適用的桿件橫截面尺寸。
    compatible_pole_shape:
      name: 相容桿件形狀
      description: 指定護墊適用的桿件或柱子橫截面形狀。
    compatible_power_steering_system:
      name: 相容動力方向盤系統
      description: 表示該油液適用的轉向系統類型。
    compatible_powerplant_type:
      name: 相容動力系統類型
      description: 表示該零件適用的 BB 槍推進系統 (例如彈簧活塞式、CO2 式、PCP 式)。
    compatible_presser_foot:
      name: 相容壓布腳
      description: 指定縫紉機支援的壓布腳安裝/相容系統 (例如卡扣式與螺絲固定式；低柄、高柄、斜柄)。如果支援多個系統或隨附轉接器，請使用「Universal/Multiple」。
    compatible_protective_gear:
      name: 相容防護裝備
      description: 指定頸托可搭配使用的其他防護裝備。
    compatible_protective_gear_integration:
      name: 相容防護裝備整合方式
      description: 描述防護具預期的穿戴方式，或與其他裝備整合的方式 (例如插入口袋、獨立綁帶式)。
    compatible_punching_bag_type:
      name: 相容拳擊沙袋類型
      description: 指定該商品相容的拳擊沙袋或訓練沙袋款式。
    compatible_racing_discipline:
      name: 相容賽車項目
      description: 此頭盔適用或通過認證的賽車運動項目。
    compatible_rc_scale:
      name: 相容 RC 比例
      description: 表示配件或零件適用的 RC 比例 (例如 1:10)。
    compatible_recorder_size:
      name: 相容直笛尺寸
      description: 指定此收納盒適用的直笛尺寸。
    compatible_recorder_type:
      name: 相容直笛類型
      description: 指定該配件相容的直笛類型 (系列/尺寸，例如高音、中音)。
    compatible_reed_cut:
      name: 相容簧片切割方式
      description: 指定束圈相容的簧片裁切樣式 (例如銼邊/法式裁切與未銼邊/美式裁切)。
    compatible_reed_type:
      name: 相容簧片類型
      description: 指定吹嘴適用的簧片裁切方式/類型。
    compatible_reel_type:
      name: 相容捲線器類型
      description: 指定該包袋、盒或外罩適用的釣線輪款式。
    compatible_refrigerant_type:
      name: 相容冷媒類型
      description: 表示空調蒸發器適用的冷媒類型。
    compatible_ride_equipment:
      name: 相容騎乘設備
      description: 此坡道適用的輪式運動器材類型。
    compatible_roof_height:
      name: 相容車頂高度
      description: 表示車罩適用的車頂輪廓 (標準型或加長/高車頂型)。
    compatible_roof_rail_type:
      name: 相容車頂架類型
      description: 指定基礎車頂架系統可安裝的車頂配置。
    compatible_rope_count:
      name: 相容圍繩數量
      description: 指定該零件適用的拳擊台圍繩配置，例如 3 條圍繩、4 條圍繩或通用型。
    compatible_rope_type:
      name: 相容繩索類型
      description: 指定該裝置可使用的繩索結構。
    compatible_saddle_type:
      name: 相容座墊類型
      description: 指定此配件適用的馬鞍款式或騎乘項目，確保與英式、西部式及其他馬鞍正確相容。
    compatible_saxophone_size:
      name: 相容薩克斯風尺寸
      description: 表示該商品相容的薩克斯風尺寸 (例如高音、中音、次中音)。
    compatible_saxophone_type:
      name: 相容薩克斯風類型
      description: 指定束圈/吹嘴蓋適用的薩克斯風類型。
    compatible_scale_length:
      name: 相容有效弦長
      description: 識別琴弦適用的吉他弦長範圍 (例如短弦長、標準弦長、巴里東)。
    compatible_seat_airbag:
      name: 相容座椅安全氣囊
      description: 表示座椅是否支援/包含側邊安全氣囊，或是否與配備座椅式安全氣囊的車輛相容。
    compatible_seating_capacity:
      name: 相容座位數
      description: 指定該配件適用的座位數或配置。
    compatible_sensor_port_type:
      name: 相容感測器孔位類型
      description: 說明油底殼是否支援機油油位和/或油溫感測器，以及適用的孔位樣式。
    compatible_shifter_type:
      name: 相容變速器類型
      description: 識別排檔桿防塵套適用的排檔桿類型或配置。
    compatible_shis:
      name: 相容 SHIS
      description: 列出此零件適用的標準化頭碗識別系統 (SHIS) 代碼 (例如 IS42、EC34、ZS44/28.6)。
    compatible_skating_discipline:
      name: 相容滑冰項目
      description: 表示該零件或配件適用的滑冰項目。
    compatible_snowshoe_deck_type:
      name: 相容雪鞋板面類型
      description: 指定固定器相容的雪鞋框架或板面樣式。
    compatible_special_effects_lighting_features:
      name: 相容特效燈功能
      description: 標示會影響特效燈購買決策的常見功能標記 (不只是顏色/圖案)，例如裝置串接或音訊反應。
    compatible_spinning_wheel_drive_system:
      name: 相容紡車傳動系統
      description: 指定該配件支援的紡車傳動系統。
    compatible_spoke_gauge:
      name: 相容輻條線徑
      description: 表示輻條帽螺紋適用的輻條線徑尺寸，讓買家能正確搭配輻條和輻條帽。
    compatible_steering_wheel_airbag:
      name: 相容方向盤安全氣囊
      description: 表示方向盤是否支援保留 OEM 安全氣囊模組 (或適用於非安全氣囊用途)。
    compatible_steering_wheel_control_button:
      name: 相容方向盤控制按鈕
      description: 表示與原廠方向盤控制裝置 (音訊/定速巡航/電話) 及相關線路相容。
    compatible_stencil_material:
      name: 相容模板材質
      description: 機器可用來製作模板或加工的材料 (例如紙張、塑膠薄膜、Mylar 薄膜)。
    compatible_stencil_media_format:
      name: 相容模板媒材格式
      description: 表示機器支援的模板媒材型態：片材、捲材或兩者皆支援。
    compatible_strap_retractor:
      name: 相容束帶捲收器
      description: 表示束帶是否相容於可伸縮系統，或設計用於不可伸縮 (固定式) 束帶。
    compatible_string_instrument_finish:
      name: 相容弦樂器表面處理
      description: 指定該拋光劑可安全使用的樂器表面處理類型。
    compatible_substrate_material:
      name: 相容基材材質
      description: 該塗料配方適合附著的表面材質。
    compatible_surface:
      name: 相容表面
      description: 指定鉤環黏膠預定黏著的表面/材質。
    compatible_surface_material:
      name: 相容表面材質
      description: 商品設計適用的車輛表面材質。
    compatible_tear_off_system:
      name: 相容快撕除汙膜系統
      description: 指出護目鏡是否支援撕膜和/或捲膜，包括是否具備撕膜安裝柱。
    compatible_thermostat_type:
      name: 相容的恆溫器類型
      description: 水管接頭/外殼是否設計為可安裝恆溫器；若可安裝，則指出其類型/尺寸。
    compatible_thread:
      name: 相容的線材
      description: 指出穿線器設計可處理的線/紗線種類（依粗細/類型）。
    compatible_thread_spool_format:
      name: 相容的線材/線軸形式
      description: 指出收納盒設計用於存放的線材形式（線軸、梭芯、繡線板/繡線卡、錐形筒等）。
    compatible_thread_yarn_tool:
      name: 相容的線材與紗線工具
      description: 安裝於其他設備或搭配其他設備使用的工具所需機器/系統相容性（例如縫紉機、拷克機/鎖邊機、織布機、紡車）。
    compatible_tire_application:
      name: 相容的輪胎用途
      description: 指出脫圈器設計適用的輪胎/輪圈應用區隔（依維修的輪胎/輪圈，而非車型判定）。
    compatible_tom_pad_mounting:
      name: 相容的嗵鼓打擊墊安裝方式
      description: 指定電子嗵鼓的安裝位置/方式（例如夾具/桿式安裝、L 型桿、支架式安裝），這會影響其是否適用於現有支架系統。
    compatible_toy_vehicle_scale:
      name: 相容玩具車比例
      description: 指出玩具組相容的玩具車比例或約略車身尺寸。
    compatible_tpms_sensor_type:
      name: 相容的 TPMS 感測器類型
      description: 指定車輪是否支援 TPMS 感測器和/或任何所需的氣嘴/感測器類型。
    compatible_training_equipment:
      name: 相容訓練設備
      description: 列出可連接至支架的訓練或健身器材類型。
    compatible_treadmill_design:
      name: 相容的跑步機設計
      description: 指定配件相容的跑步機設計，例如折疊式或非折疊式型號。
    compatible_tube:
      name: 相容管材
      description: 指出補片適用的內胎或輪胎結構，例如丁基橡膠、乳膠、TPU 或無內胎輪胎。
    compatible_valve_type:
      name: 相容閥門類型
      description: 指定潤滑劑相容的銅管樂器閥門類型。
    compatible_vaporizing_material:
      name: 相容的汽化材料
      description: 指出裝置設計可汽化的材料類型。
    compatible_vehicle_windshield_fluid:
      name: 相容的車用擋風玻璃清洗液
      description: 與車輛設備或玻璃處理相關的相容性聲明（例如可安全用於防雨塗層、可安全用於頭燈清洗器）。
    compatible_visor_system:
      name: 相容面罩系統
      description: 指出機車安全帽相容的面罩/內片系統類型。
    compatible_water_board_type:
      name: 相容水上滑板類型
      description: 支架預定承載的水上運動板類型。
    compatible_water_sport_board_type:
      name: 相容的水上運動板類型
      description: 列出支架設計用於運輸的板類型。
    compatible_watercraft_communication_standard:
      name: 相容的船艇通訊標準
      description: 指定支援的船舶通訊/網路標準或整合通訊協定，以便與船上電子設備互通。
    compatible_watercraft_engine_type:
      name: 相容的船艇引擎類型
      description: 指出此零件適用的目標動力系統配置（舷外機/舷內機/舷內外機/噴射推進）。
    compatible_weight_plate_diameter:
      name: 相容的槓鈴片直徑
      description: 指定機器可使用的槓鈴片直徑。
    compatible_wheel_finish:
      name: 相容的輪圈表面處理
      description: 指定清潔劑可安全用於的輪圈表面處理/材質（依製造商聲明）。
    compatible_whorl_drive_band_type:
      name: 相容的紡車皮帶輪傳動帶類型
      description: 指定該紡車皮帶輪適用的傳動帶樣式。
    compatible_wick_series:
      name: 相容的燈芯系列
      description: 指出燈芯固定片設計適配的常見燈芯系列/類型（業界命名，如賣家有指定）。
    compatible_winder_head_bit:
      name: 相容的捲弦器頭/接頭
      description: 指定捲弦器支援的調音旋鈕/頭部介面樣式（例如開槽頭、可替換接頭、通用頭）。
    compatible_windlass_rode:
      name: 相容的錨機錨索
      description: 指定錨機設計可處理的錨索類型。
    compatible_windshield_type:
      name: 相容的擋風玻璃類型
      description: 指定外罩設計搭配的擋風玻璃配置。
    compatible_wood:
      name: 相容木材
      description: 指定拋光劑建議/可安全使用的指板木材類型。
    compatible_writing_surface:
      name: 相容書寫表面
      description: 指定墨水最適用的表面/紙張。
    compatible_zipper_size:
      name: 相容拉鍊尺寸
      description: '指出拉片預定適配的拉鍊尺寸（通常以 #3、#5、#8、#10 表示），以改善相容性篩選。'
    compliance_certification:
      name: 合規認證
      description: 燈條符合的道路使用與電磁相容性合規/核准標準。
    component_position:
      name: 組件位置
      description: 指定零件在引擎正時總成中的相對位置（例如前蓋與後蓋、上部與下部）。並非指車輛本身的前/後位置。
    concentration_level:
      name: 濃度等級
      description: 定性指出番茄糊的濃縮程度（單倍、雙倍、三倍），有助於符合食譜需求。
    concentration_type:
      name: 濃度類型
