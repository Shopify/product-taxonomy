      description: 為了在縫紉樣板上達到最佳效果所建議使用的布料。
    recommended_fabric_weight:
      name: 建議布料重量
      description: 表示該紙樣建議使用的布料重量等級。
    recommended_food_pairing:
      name: 建議食物搭配
      description: 識明該醬料預期搭配的主要蛋白質或菜餚 (例如雞肉、豬肉、牛肉、魚肉、蔬菜)。
    recommended_lane_condition:
      name: 建議球道狀況
      description: 指示該球所設計適用的油路模式或球道狀況。
    recommended_motor_impulse_class:
      name: 建議馬達衝量等級
      description: 指定建議的模型火箭馬達總衝量等級，以實現安全/最佳的飛行。
    recommended_reading_level:
      name: 建議閱讀程度
      description: 表示商品建議適用的閱讀階段/能力，協助買家搭配孩子目前的閱讀發展程度。
    recommended_sleep_position:
      name: 建議睡眠姿勢
      description: 識明床墊設計用於舒適支撐的睡眠姿勢 (例如側睡或仰睡者)。
    recommended_storage:
      name: 建議儲存方式
      description: 指示商品應如何儲保以維持新鮮度。
    recommended_surfaces:
      name: 建議表面
      description: 除一般工藝相容性外，指明膠水預期黏合的表面/材質類別 (例如僅限紙張與多種表面)。
    recommended_use_case:
      name: 建議用例
      description: 密封劑的主要預期使用場景 (臨時/緊急與長期修復)。
    recommended_use_location:
      name: 建議使用地點
      description: 蹺蹺板的預期環境 (家庭後院與商業遊樂場等)。
    recommended_vehicle_surfaces:
      name: 建議車輛表面
      description: 指定刷子可安全用於哪些車輛表面/表面處理（例如透明漆、霧面/緞面漆、車身包膜/PPF、玻璃、輪圈）。
    recorder_accessories_included:
      name: 包含直笛配件
      description: 列出大低音木笛包裝內隨附的配件。
    recorder_bore_design:
      name: 直笛管徑設計
      description: 直笛本體的內部管徑輪廓設計。
    recorder_bore_type:
      name: 直笛內徑類型
      description: 指明直笛的管徑樣式。
    recorder_case_shell_type:
      name: 直笛琴盒外殼類型
      description: 描述保護殼的結構剛性。
    recorder_finish:
      name: 直笛表面處理
      description: 直笛本體的表面處理/處理方式（尤其適用於木製中音直笛）。
    recorder_hole_type:
      name: 直笛音孔類型
      description: 音孔是單孔（無雙孔），還是包含可改善半音指法的雙孔。
    recorder_joint_configuration:
      name: 直笛接合配置
      description: 描述錄音機有多少個機身部分，這會影響便攜性、清潔和零件更換。描述直笛的管身數量，這會影響便攜性、清潔與零件更換。
    recorder_joint_style:
      name: 直笛接合樣式
      description: 直笛各節之間的接合/連接樣式 (若適用)。
    recorder_keywork:
      name: 直笛按鍵系統
      description: 指示直笛是否包含低音按鍵 (金屬/塑膠機械裝置)，這是次中音/低音/大型直笛的常見特徵。
    recorder_mouthpiece_type:
      name: 直笛吹嘴類型
      description: 描述直笛的吹嘴/笛頭是一體成型還是可拆卸/可互換式。
    recorder_pitch_standard_a4:
      name: 直笛音高標準 (A4)
      description: 指示直笛製造所依據的音高參考值 (例如 A=440 Hz 現代音高與 A=415 Hz 巴洛克音高)。
    recorder_thumb_hole_type:
      name: 直笛拇指孔類型
      description: 指明直笛採用單拇指孔還是雙拇指孔設計。
