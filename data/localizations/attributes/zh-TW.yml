      name: 雞蛋飼養方式
      description: 表示雞蛋採用的生產或飼養方式（例如非籠飼、放養、有機）。
    egg_grade:
      name: 雞蛋等級
      description: 表示監管或業界機構評定的品質等級。
    egg_processing_state:
      name: 雞蛋加工狀態
      description: 表示雞蛋在販售前經過的加工方式（例如新鮮、鹹蛋、皮蛋）。
    egg_production_method:
      name: 雞蛋生產方式
