      name: 捲線器尺寸等級
      description: 製造商指定的尺寸等級（例如 1000、3000、5000），表示線軸容量和捲線器整體規格。
    referee_wallet_accessories_included:
      name: 包含裁判錢包配件
      description: 列出裁判卡夾隨附的額外品項，例如紅/黃牌、記分表或書寫工具，讓買家瞭解卡夾是否以完整套組販售。
    refinement_level:
      name: 精製程度
      description: 指示油脂所經歷的精煉程度，這會影響味道、色澤、營養和煙點。
    reflective_finish:
      name: 反光表面處理
