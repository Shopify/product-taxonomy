      name: 溜溜球軸承尺寸等級
      description: 溜溜球所使用的標準化軸承尺寸等級 (若適用)。
    yo_yo_bearing_type:
      name: 溜溜球軸承類型
      description: 影響回收反應與空轉特性的軸承配置。
    yo_yo_play_style:
      name: 溜溜球玩法風格
      description: 溜溜球的主要預期玩法風格，反映出商品設計適用的編繩/花式項目。
    yo_yo_response_system:
      name: 溜溜球球回收系統
      description: 指明零件設計適用的溜溜球回收機制 (相容性)。
    yo_yo_responsiveness:
      name: 溜溜球回彈性
      description: 溜溜球是輕拉就能回到手上 (具回彈性)，還是需要做收球動作 (無回彈性)。
    yo_yo_string_material:
      name: 溜溜球繩材質
      description: 溜溜球繩的材質成分。
    yogurt_base_ingredient:
      name: 優格基底成分
      description: 識別用於製作優格的主要牛奶或植物性來源，這對飲食偏好與過敏原考量至關重要。
    yoke_type:
      name: 托架類型
      description: 識別在單腳架上支撐槍械的底座或托架樣式。
    zill_playing_style:
      name: 手指響鈸演奏方式
      description: 預期的演奏情境/風格 (通常是肚皮舞與管弦樂/文化變體)。
    zill_strap_material:
      name: 手指響鈸綁帶材質
      description: 用於固定指鈸的手指綁帶/鬆緊帶材質 (若包含)，這會影響舒適度、耐用度與抓握力。
    zills_strap_adjustability:
      name: 指鈸綁帶可調整性)
      description: 隨附的綁帶/鬆緊帶是否及如何進行調整以達到貼合度。
    zipper_application:
      name: 拉鍊應用
      description: 指明拉鍊設計適用的預期作品或應用。
    zipper_chain_type:
      name: 拉鍊鏈帶類型
      description: 指明拉鍊鏈帶/拉鍊齒的結構/類型。
    zipper_end_type:
      name: 拉鍊末端類型
      description: 指示拉鍊的末端樣式，以及是否為可分離式 (開口) 或不可分離式 (閉口)，包含工藝拉鍊中常見的開尾五金配件。
    zipper_gauge:
      name: 拉鍊規格
      description: '指示拉鍊鏈帶的規格/尺寸代號，通常表示為帶有 # 的數字 (例如 #3 或 #5)，這與拉鍊齒/線圈的寬度及預期用途相關。'
    zipper_opening_length:
      name: 拉鍊開口長度
      description: 定義前方開口由拉鍊覆蓋的長度，用以區分全拉鍊、半拉鍊或 1/4 拉鍊樣式。
    zipper_pull_material:
      name: 拉鍊頭材質
      description: 指明拉鍊頭或拉片 (您抓握的部分) 的材質，有別於拉鍊齒/鏈帶與布帶。
    zipper_pull_side:
      name: 拉鍊頭側邊
      description: 指明可從拉鍊的哪一側 (或兩側) 觸摸/拉動拉片。
    zipper_pull_strap_cord_tab_material:
      name: 拉鍊頭拉帶/繩/片材質
      description: 固定到拉鍊頭上的帶子/繩子/拉片/流蘇組件的材質 (若有)，不包含主要的拉鍊頭五金配件/主體。
    zipper_reversibility_mechanism:
      name: 拉鍊雙面機制
      description: 指明拉鍊實現雙面的方式 (例如雙面拉頭與專為雙面服裝設計的翻轉/自動鎖定拉頭)。
    zipper_separating_type:
      name: 拉鍊分離類型
      description: 指示拉鍊是否在底部/頂端分離或閉口，以便與夾克、睡袋、包包等搭配使用。
    zipper_side:
      name: 拉鍊側
      description: 指明當睡袋正面朝上平放時，主拉鍊所在的一側。
    zipper_slider_material:
      name: 拉鍊頭材質
      description: 指定拉鍊頭 (移動機制) 的材質，這會影響強度與耐腐蝕性。
    zipper_slider_pull_configuration:
      name: 拉鍊頭/拉片配置
      description: 指示拉鍊具有一個或兩個拉鍊頭/拉片，以及拉片位於拉鍊頭的一側或兩側。
    zipper_style:
      name: 拉鍊樣式
      description: 指示服裝上的拉鍊長度或有無 (例如無拉鍊、1/4 拉鍊、半拉鍊、全拉鍊)。
    zipper_tape_material:
      name: 拉鍊帶材質
      description: 指明縫入作品/商品中的拉鍊布 (布料側) 的主要材質。
    zipper_teeth_type:
      name: 拉鍊齒類型
      description: 指明拉鍊鏈帶/拉鍊齒的結構樣式 (例如線圈、模製塑膠、金屬、隱形)，這會影響靈活性、強度與典型的應用。
