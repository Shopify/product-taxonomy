      description: 指定罐裝或瓶裝蔬菜塊的切割或處理方式 (例如整顆、切丁、長條)。
    cut_resistance_rating:
      name: 抗切割等級
      description: 指定商品經正式測試的抗切割等級。
    cut_type:
      name: 裁售類型
      description: 表示布料是按碼/公尺販售、預裁，還是以捲/匹販售。
