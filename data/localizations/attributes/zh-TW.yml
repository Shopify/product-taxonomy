      description: 指定蘇格蘭高地風笛套組包含哪些簧片（旋律管和/或低音管），以及簧片為蘆葦或合成材質。
    reefing_method:
      name: 束帆方式
      description: 指示在水上縮帆或收帆的機制 (若有)。
    reel_profile:
      name: 捲線器輪廓
      description: 將拋餌捲線器本體的結構樣式/輪廓進行分類。
    reel_seat_material:
      name: 捲線器座材質
      description: 指明捲線器座的結構材質，這會影響重量、靈敏度與抗腐蝕性。
