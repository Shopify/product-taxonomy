      description: 成品蠟燭中棕櫚蠟形成的特有結晶/羽狀外觀。
    cucumber_variety:
      name: 小黃瓜品種
      description: 指定小黃瓜的栽培品種或市售品種 (例如英式小黃瓜、波斯小黃瓜、Kirby 小黃瓜)。
    cue_compatibility:
      name: 球桿相容性
      description: 表示球桿盒可容納的球桿接頭配置，例如一體式球桿或 3/4 接頭球桿。
    cue_construction:
      name: 球桿結構
      description: 表示球桿的構造方式，包括段數，或是否為部分組件 (例如僅桿尾或僅桿身)，這會影響可攜性和相容性。
    cue_head_material:
      name: 球桿頭材質
      description: 識別球桿頭 (與推盤接觸的部分) 的材質，這會影響耐用性和表面保護。
    cue_sport_compatibility:
      name: 撞球運動相容性
      description: 識別此配件適用的撞球運動類型。
    cue_thread_size:
      name: 球桿螺紋尺寸
      description: 指定延長桿、接頭保護器、配重螺栓和其他球桿配件使用的螺紋規格，以確保正確安裝。
    cue_tip_hardness:
      name: 球桿皮頭硬度
      description: 評定球桿皮頭的硬度，這會影響母球控制和擊球回饋。
    cuff_height:
      name: 靴口高度
      description: 說明靴口高度 (低、中、高、可拆式/可調式)，會影響支撐性和靈活度。
    cuff_position:
      name: 繫繩束帶位置
      description: 表示繫繩束帶設計連接在使用者身上的位置。
    cultivation_method:
      name: 栽培方式
      description: 指定葉菜類的栽培方式，涵蓋種植技術和農耕做法。
    cup_type:
      name: 亮片杯型
      description: 表示亮片的表面輪廓 (平面或杯狀) 和杯深，這會影響亮度、質地以及縫合或黏合時的貼合方式。
    cupcake_size:
      name: 杯子蛋糕尺寸
      description: 指定所售杯子蛋糕的實際尺寸類別 (例如迷你、標準、特大)。
    curd_size:
      name: 凝乳尺寸
      description: 指定茅屋起司凝乳顆粒的大小或質地。
    cure_method:
      name: 固化方式
      description: 描述黏著劑凝固或固化所需的流程 (例如 UV 光、空氣濕度、加熱)。
    curing_or_preparation_method:
      name: 醃製或處理方式
      description: 指定橄欖的醃製或處理方式 (例如鹽水醃製、油漬、烤製)。
    curling_broom_head_material:
      name: 冰壺刷頭材質
      description: 識別刷頭或刷墊的主要材質組成。
    curling_broom_head_type:
      name: 冰壺刷頭類型
      description: 指定刷頭/刷墊的樣式或結構。
    curling_shoe_slider_material:
      name: 冰壺鞋滑片材質
      description: 識別冰壺鞋滑行鞋底使用的主要材質。
    curling_training_aid_type:
      name: 冰壺訓練輔助器材類型
      description: 識別冰壺訓練輔助器材的類型。
    curry_variety:
      name: 咖哩種類
      description: 依咖哩醬產品要做出的特定咖哩風格或配方分類，例如 Tikka Masala、Massaman 或泰式綠咖哩，以便精準篩選口味/風格。
    cushion_rubber_profile:
      name: 緩衝橡膠條輪廓
      description: 球桌邊框緩衝橡膠條的形狀或輪廓代碼。
    cushioning_level:
      name: 緩衝等級
      description: 表示襪子提供的足底緩衝量，用於吸收衝擊和提升舒適度。
    custom_label_content_type:
      name: 自訂標籤內容類型
      description: 指定縫入式標籤上的自訂資訊 (例如名稱、標誌、訊息、尺寸、洗滌保養符號、聯絡資訊)。
    customization_type:
      name: 客製化類型
      description: 指定球衣為空白款、球員版，或含個人化姓名/號碼的客製款。
    cut_or_preparation_style:
