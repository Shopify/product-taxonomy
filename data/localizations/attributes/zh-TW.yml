      description: 描述服裝剪裁，表示預期貼身程度和空氣力學表現 (例如競賽型、休閒型)。
    cylinder_head_assembly:
      name: 汽缸蓋總成
      description: 說明出售時汽缸蓋的完整程度 (例如已完整組裝並安裝氣門機構零件，或為裸件/未組裝鑄件)。
