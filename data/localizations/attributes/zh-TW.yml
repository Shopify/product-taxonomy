      name: 切割應用
      description: 剪刀的主要預期裁剪用途。
    cutting_mat_grid_style:
      name: 切割墊格線樣式
      description: 墊面印刷導引線的樣式。
    cutting_mat_intended_use:
      name: 切割墊預期用途
      description: 切割墊設計適用的主要手作/工作表面用途。
    cv_boot_clamp_type:
      name: CV 防塵套夾箍類型
      description: 指定用於固定 CV 防塵套的夾箍/束帶樣式。
    cv_boot_kit_contents:
      name: CV 防塵套套件內容
      description: 列出 CV 防塵套隨附的物品 (例如夾箍、潤滑脂包、固定束帶)。
    cv_boot_material:
      name: CV 防塵套材質
      description: 指定 CV 防塵套的主要材質結構。
    cv_boot_position:
