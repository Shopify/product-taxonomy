    goalie_playing_surface:
      name: Površina za igru vratara
      description: Određuje primarnu površinu za igru ili okruženje za koje je dizajniran
        komplet opreme za hokejaške golmane.
    goalkeeper_glove_cut:
      name: Izrez vratarske rukavice
      description: Označava stil konstrukcije dlana/prstiju (kroj) vratarskih rukavica,
        koji utječe na pristajanje, osjećaj lopte i kontrolu.
    goalkeeper_training_aid_type:
      name: Vrsta pomagala za trening vratara
      description: Identificira stil pomagala za trening vratara, omogućujući precizno
        filtriranje.
    goblet_drum_playing_style:
      name: Stil sviranja peharnog bubnja
      description: Je li instrument prvenstveno namijenjen za sviranje rukama ili
        za korištenje s palicama/čekićima.
    gobo_format:
      name: Gobo format
      description: Određuje veličinu/standard goboa koji projektor prihvaća (obitelj
        promjera i debljine), osiguravajući kompatibilnost sa zamjenskim/prilagođenim
        goboima.
    gobo_root_variety:
      name: Sorta korijena Gobo
      description: Identificira specifičan kultivar ili sortu korijena goboa (čička).
    gobo_rotation:
      name: Rotacija goboa
      description: Određuje može li se gobo rotirati i koja je usmjerenost podržana.
    goggle_accessory_type:
      name: Vrsta dodatka za naočale
      description: Klasificira vrstu pribora (npr. navlaka, kutija, remen) kako bi
        kupci mogli filtrirati raznoliki skup proizvoda unutar ove krovne kategorije.
    goggle_features:
      name: Značajke Googlea
      description: Navodi posebne funkcionalne ili dizajnerske značajke koje nude
        naočale.
    goggle_fit_design:
      name: Dizajn koji odgovara naočalama
      description: Opisuje kako se naočale trebaju prilagođavati ili nositi, uključujući
        kompatibilnost s OTG-om (preko naočala).
    goggle_gasket_material:
      name: Materijal za brtvu za naočale
      description: Materijal brtve koja prianja uz lice koji utječe na udobnost, probleme
        s alergijama i sprječavanje curenja.
    goggle_integration:
      name: Integracija s Googleom
      description: Je li kaciga dizajnirana za korištenje s naočalama i/ili uključuje
        integrirane značajke za zadržavanje naočala.
    goggle_lens_shape:
      name: Oblik leća za naočale
      description: Definira profil zakrivljenosti zamjenske leće, utječući na izobličenje
        i vidno polje (npr. cilindrično, sferno, torično).
    goggle_lens_tint:
      name: Zatamnjivanje leća za naočale
      description: Definira nijansu ili završnu obradu leće, što utječe na prijenos
        svjetlosti, percepciju boja i estetski izgled.
    goggle_strap_material:
      name: Materijal remena za naočale
      description: Primarni materijal korišten za remen za glavu utječe na trajnost
        i udobnost.
    golf_accessory_set_purpose:
      name: Namjena seta golf pribora
      description: Označava primarnu namjenu ili temu kompleta golf pribora.
    golf_bag_style:
      name: Stil torbe za golf
      description: Označava primarni dizajn ili stil aplikacije torbe za golf (primjerice
        stalak, košarica, štap).
    golf_ball_alignment_design:
      name: Dizajn poravnanja loptice za golf
      description: Određuje bilo koje ugrađeno vizualno pomagalo za poravnanje otisnuto
        ili oblikovano na površini kugle.
    golf_ball_construction:
      name: Konstrukcija loptice za golf
      description: Određuje broj slojeva/dijelova korištenih u konstrukciji loptice
        za golf, što utječe na spin, osjećaj i udaljenost.
    golf_ball_cover_material:
      name: Materijal za navlaku loptice za golf
      description: Označava vanjski materijal omotača loptice za golf, koji utječe
        na vrtnju, izdržljivost i osjećaj.
    golf_cart_cover_climate_use:
      name: Poklopac za golf košarica klima korištenje
      description: Označava primarnu klimu/sezonu koju pokrov za pohranu može izdržati.
    golf_cart_enclosure_fit_type:
      name: Vrsta kućišta za golf košaricu
      description: Određuje je li kućište dizajnirano za određeni broj sjedala/faktor
        oblika ili nudi li univerzalno/podesivo pristajanje.
    golf_cart_intended_use:
      name: Namjena golf košarice
      description: Primarna namjena - kutija za koju je golf košarica dizajnirana
        ili konfigurirana.
    golf_club_number:
      name: Broj golf palice
      description: Označava određeni broj ili oznaku klina otisnutu na palici (npr.
        5, PW, GW).
    golf_club_part_type:
      name: Vrsta dijela za golf palicu
      description: Kategorizira pribor ili komponentu golf palice u uobičajene podvrste
        (primjerice prilagodnik, prsten, uteg).
    golf_grip_size:
      name: Veličina hvata za golf
      description: Određuje ukupnu vanjsku kategoriju veličine hvata za golf, pokazujući
        koliko je hvat debeo u ruci.
    golf_shoe_spike_type:
      name: Vrsta šiljaka za golf cipele
      description: Označava vrstu sustava trakcije koji se koristi na potplatu golf
        cipela (npr. dizajn s bodljama ili bez bodlji).
    golf_tee_style:
      name: Stil golf-teeja
      description: Opisuje strukturni ili funkcionalni stil/dizajn golf tee-a, koji
        utječe na visinu loptice, izdržljivost ili smanjenje rotacije.
    golf_training_focus:
      name: Fokus na treningu golfa
      description: Klasificira primarnu vještinu ili aspekt koji proizvod treba poboljšati.
    golf_training_objective:
      name: Cilj treninga golfa
      description: Označava primarnu golf vještinu ili aspekt koji pomagala za trening
        poboljšava.
    gong_profile_type:
      name: Vrsta profila gonga
      description: Opisuje fizički profil opernog gonga (primjerice ravan naspram
        podignutog središta), koji snažno utječe na ton i stil sviranja.
    grading_scale:
      name: Ljestvica ocjenjivanja
      description: Ljestvica ocjenjivanja koja se koristi na ocjenjivanom novčiću
        od poluga (primjerice Sheldon 1–70).
    grading_service:
      name: Usluga ocjenjivanja
      description: Usluga ocjenjivanja/certificiranja treće strane za kovanicu ili
        novčanicu (primjerice PCGS, NGC).
    graduation_increment:
      name: Povećanje diplome
      description: Određuje najmanju tiskanu/ugraviranu podjelu na ljestvici mjerača
        šava (rezolucija oznaka).
    grain_processing_method:
      name: Metoda obrade žitarica
      description: Identificira primarnu metodu obrade primijenjenu na zrno (primjerice
        parboiled, valjano, proklijalo), koja utječe na vrijeme kuhanja, teksturu
        i nutritivne vrijednosti.
    grand_piano_soundboard_material:
      name: Materijal rezonantne ploče koncertnog klavira
      description: Primarni materijal koji se koristi za zvučnu ploču klavira (rezonantna
        ploča), koja utječe na ton i trajnost.
    grappling_dummy_pose:
      name: Poza lutke za hrvanje
      description: Opisuje zadani položaj tijela/držanje lutke, određujući koje vježbe
        i tehnike podržava.
    grease_application:
      name: Aplikacija masti
      description: Označava primarnu komponentu vozila ili slučaj uporabe za koju
        je mast namijenjena.
    grease_consistency_grade_nlgi:
      name: Stupanj konzistencije masti (NLGI)
      description: Određuje NLGI broj konzistencije koji označava čvrstoću masti (primjerice
        NLGI 2 je uobičajena višenamjenska).
    grease_thickener_type:
      name: Vrsta zgušnjivača masti
      description: Identificira sustav zgušnjivača/sapuna koji se koristi u formulaciji
        masti.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Gajde Great Highland tipa ventila za puhanje
      description: Određuje sustav nepovratnih ventila koji se koristi u puhalu.
    great_highland_bagpipes_drone_configuration:
      name: Konfiguracija dronova za gajde Great Highland
      description: Određuje vrste dronova uključenih u komplet.
    great_highland_bagpipes_mounting_material:
      name: Materijal za montažu gajdi Great Highland
      description: Određuje materijal ukrasnih nosača na gajdama (primjerice nikl
        srebro, imitacija slonovače).
    greens_maturity_stage:
      name: Faza zrelosti zelenila
      description: Označava razvojni stadij zelene biljke prigodom branja.
    greens_preparation_state:
      name: Stanje pripreme zelenih površina
      description: Opisuje kako se lisnato povrće obrađuje ili pakira (primjerice
        prethodno oprano, sjeckano, spremno za jelo).
    grenade_effect_type:
      name: Vrsta efekta granate
      description: Označava primarni funkcionalni učinak koji proizvodi paintball
        granata nakon aktiviranja (primjerice dim, boja, bljesak).
    grid_unit:
      name: Jedinica mreže
      description: Primarni mjerni sustav otisnut na podlozi (ako je prisutna mreža/skala).
    grille_emblem_provision:
      name: Odredba o amblemu rešetke
      description: Navodi podržava li rešetka OEM amblem/značku i kako.
    grille_mounting_method:
      name: Način montaže rešetke
      description: Određuje kako se rešetka postavlja na vozilo (npr. izravna zamjena
        u odnosu na umetanje/prekrivni element; pričvršćivanje vijcima u odnosu na
        kopču/klik; potrebno bušenje u odnosu na ono bez bušenja).
    grille_style:
      name: Stil rešetke
      description: Određuje vizualni/dizajnerski stil rešetke vozila.
    grip_chalk_form:
      name: Grip kreda za oblikovanje
      description: Označava fizički oblik krede koja je dostavljena ili se koristi
        s vrećicom.
    grip_coverage:
      name: Pokrivenost hvata
      description: Identificira nazočnost i lokaciju silikonskih ili gumenih elemenata
        za hvatanje na čarapi.
    grip_design:
      name: Dizajn drške
      description: Određuje korisničko ime ili konfiguraciju rupa na ploči za lakše
        nošenje i svestranost vježbanja.
    grip_enhancer_effect:
      name: Učinak pojačanja prianjanja
      description: Opisuje značajku primarne učinkovitosti koju proizvod pruža (npr.
        upijanje vlage ili ljepljivi sloj smole).
    grip_enhancer_form:
      name: Oblik sredstva za poboljšanje hvata
      description: Identificira fizički oblik ili format proizvoda za poboljšanje
        hvata kako bi sportaši mogli odabrati odgovarajuću metodu primjene.
    grip_features:
      name: Značajke hvata
      description: Označava ugrađene značajke hvata/ručice namijenjene poboljšanju
        držanja, udobnosti ili kontrole tijekom igre.
    grip_material:
      name: Materijal za hvatanje
      description: Označava materijal koji se koristi za površinu hvata hlača.
    grip_shape:
      name: Oblik hvata
      description: Opisuje oblike ili stil presjeka hvata, posebno relevantno za gripove
        za puttere.
    grip_surface_type:
      name: Vrsta površine drške
      description: Opisuje dizajn gazne površine/površine za prianjanje pedale koji
        utječe na prianjanje i osjećaj.
    grip_tackiness_level:
      name: Razina ljepljivosti pri prianjanju
      description: Ocjenjuje koliko je površina hvata ljepljiva, pomažući igračima
        da odaberu između suhog osjećaja i ultra ljepljive kontrole.
    grip_tape_form:
      name: Oblik grip trake
      description: Označava oblik isporuke trake za prianjanje (primjerice list, rola,
        komplet za prskanje).
    grip_wax_form:
      name: Oblik voska za hvatanje
      description: Klasificira fizički oblik u kojem se vosak za hvatanje prodaje.
    gripper_coverage:
      name: Pokrivenost hvatača
      description: Određuje stil hvataljke na neklizajućoj papučici, čime ukazuje
        na pokrivenost površine i mogućnost uklanjanja.
    grommet_application_material:
      name: Materijal za primjenu ušica
      description: Primarni materijal(i) u koji se ušice trebaju ugraditi (primjerice
        tkanina, koža, vinil, cerada/platno).
    grommet_duty_rating:
      name: Ocjena rada prstena
      description: Označava predviđenu klasu čvrstoće/uporabe ušice.
    grommet_style:
      name: Stil s ušicama
      description: Stil konstrukcije kompleta ušica (kako su sastavljene/korištene).
    grooming_glove_texture_type:
      name: Vrsta teksture rukavice za njegu
      description: Označava primarnu teksturu površine koja se koristi za njegu, navodeći
        namjenu kao što je ribanje, poliranje ili pranje.
    groove_orientation:
      name: Orijentacija žljeba
      description: Opisuje smjer/izgled žljebova ili grebena na instrumentu.
    groove_sampler_onboard_effects:
      name: Groove sampler uvođenje u organizaciju efekata
      description: Označava kategorije ugrađenih efekata obrade raspoloživih na groove
        sampleru (insert/master), kao što su reverb, delay, sažimanje, distorzija,
        EQ, filtriranje.
    groove_sampler_storage_expansion_type:
      name: Vrsta proširenja pohrane Groove samplera
      description: Određuje opcije izmjenjive/proširive pohrane koje podržava groove
        sampler.
    ground_attachment_method:
      name: Način pričvršćivanja na tlo
      description: Opisuje kako je luk za dodavanje pričvršćen za površinu za igru,
        što utječe na stabilnost i kompatibilnost s površinom.
    groupset_components_included:
      name: Uključene komponente groupseta
      description: Navodi specifične komponente pogonskog sklopa uključene u komplet
        skupine kako bi kupci razumjeli sadržaj paketa.
    gt_racing_class:
      name: GT trkaća klasa
      description: Označava GT kategoriju/klasu za koju je automobil izgrađen ili
        homologiran.
    guard_construction_type:
      name: Vrsta konstrukcije zaštite
      description: Bilo da je štitnik s tvrdom školjkom, mekani oklopni uložak ili
        dizajn u stilu rukava/remena.
    guard_size_measurement_basis:
      name: Osnova mjerenja veličine straže
      description: Na kojoj se mjeri određuje veličina (primjerice opseg lakta, opseg
        ručnog zgloba, opseg podlaktice).
    guard_style:
      name: Stil straže
      description: Klasificira konstrukciju ili vrstu štitnika za oštrice klizaljki
        kako bi se kupcima pomoglo da brzo razlikuju tvrde štitnike za hodanje, mekane
        štitnike za mokro nošenje, štitnike s oprugom i druge dizajne.
    guava_flesh_color:
      name: Boja mesa guave
      description: Označava unutarnju mesnatu boju ploda guave.
    guava_variety:
      name: Sorta guave
      description: Označava određeni kultivar ili tržište guave koja se prodaje (primjerice
        jabučna guava, meksička krema, tajlandska, ružičasta, bez sjemenki, bijela).
    guide_material:
      name: Materijal vodilice
      description: Materijal koji se koristi za vodič ili umetke za najlon štapa.
    guide_type:
      name: Tip vodiča
      description: Određuje vrstu vodiča postavljenog na štap za pecanje, kao što
        je single foot, roller ili snake.
    guideline_markings:
      name: Oznake smjernica
      description: Vrsta vizualnih oznaka za poravnanje otisnutih ili ugrađenih na
        površinu podloge za bacanje kako bi se pomoglo u vježbama bacanja.
    guiro_scraper_material:
      name: Guiro materijal za struganje
      description: Materijal priloženog ili preporučanog strugača/udarnika koji se
        koristi s guirom.
    guiro_surface_style:
      name: Stil površine Guiro
      description: Opisuje uzorak/geometriju površine za igru koja se struže kako
        bi se proizveo zvuk.
    guitar_body_finish_type:
      name: Vrsta završne obrade tijela gitare
      description: Određuje završnu obradu korištenu na tijelu gitare.
    guitar_bridge_system_type:
      name: Vrsta sustava mosta za gitaru
      description: Obitelj dizajna sustava mosta/žičnjaka za kompatibilnost i pregledavanje.
    guitar_case_style:
      name: Gitara u kutija stilu
      description: Određuje cjelokupni stil zaštite/strukture kućišta za gitaru ili
        torbe za koncert.
    guitar_humidifier_placement:
      name: Položaj ovlaživača zraka za gitaru
      description: Određuje gdje se ovlaživač zraka namjerava koristiti/postaviti
        u odnosu na instrument ili okolinu.
    guitar_pedal_i_o_configuration:
      name: Konfiguracija ulazno/izlaznih elemenata gitarske pedale
      description: Označava podržava li pedala Mono ili stereo ulazno/izlazno usmjeravanje.
    guitar_pedal_output_connector_type:
      name: Izlazni mehanizam pedale gitare tipa sinkronizacije
      description: Određuje vrstu konektora audio izlaza koji pedala koristi.
    guitar_slide_finish:
      name: Završetak slajda za gitaru
      description: Površinska obrada klizača koja utječe na osjećaj i trenje o nož.
    guitar_slide_style:
      name: Stil gitarskog slajda
      description: Određuje oblik slajda ili tonske trake gitare i kako se nosi/koristi.
    guitar_stand_type:
      name: Vrsta stalka za gitaru
      description: Određuje primarni oblik stalka za gitaru (kako podržava/pohranjuje
        gitaru).
    guitar_strap_attachment_type:
      name: Vrsta pričvršćivanja remena za gitaru
      description: Određuje kako se remen pričvršćuje na gitaru (ili gumb za remen),
        uključujući koristi li tradicionalne krajeve ili sustave za brzo otpuštanje.
    guitar_strap_end_material:
      name: Materijal za završni dio remena gitare
      description: Materijal korišten na krajevima remena/kartici (dijelovi koji se
        pričvršćuju na gumb remena ili sustave zaključavanja remena).
    guitar_strap_features:
      name: Značajke remena za gitaru
      description: Značajne funkcionalne značajke remena za gitaru izvan osnovnih
        Shopify veličina/materijal (višestruko odabrano).
    guitar_string_coating:
      name: Premaz za gitaru
      description: Označava ima li niz zaštitni premaz i, ako je primjenjivo, vrstu
        premaza.
    guitar_string_gauge_type:
      name: Vrsta mjerača niza za gitaru
      description: Kategorija mjerila tržišta niz seta akustične gitare (primjerice
        ekstra lagana, lagana, srednja). Često aproksimirano visokom debljinom E niz;
        točni rasponi mjera mogu varirati ovisno o proizvođaču.
    guitar_string_set_gauge_category:
      name: Kategorija kalibracije žica za gitaru
      description: Uobičajene marketinške obitelji mjerača za set gitara-niz (obično
        izvedeno iz visokog E / 1. niz).
    guitar_string_winding_type:
      name: Tip namotavanja gitare niz
      description: Određuje stil vanjskog omota namotanog žica u kompletu.
    guitar_tuning_peg_button_shape:
      name: Oblik gumba za podešavanje gitare
      description: Shapes/stil tipke/gumba za podešavanje.
    guitar_tuning_peg_configuration:
      name: Konfiguracija klinova za ugađanje gitare
      description: Izgled kompleta za ugađanje glave gitare.
    guitar_tuning_peg_mounting_style:
      name: Stil montaže gitarskih ključeva za ugađanje
      description: Kako se stroj za ugađanje montira na glavu gitare (vrsta čahure
        i metoda sprječavanja rotacije).
    guitar_tuning_peg_shaft_type:
      name: Vrsta osovine klina za ugađanje gitare
      description: Je li stup niza čvrsti ili podijeljeni i kako je niz osiguran.
    guitar_tuning_peg_style:
      name: Stil mehanike gitarskih ključeva
      description: Fizički stil stroja za ugađanje/klinčića i format montaže koji
        se koriste na glavi instrumenta (primjerice zatvoreni zupčanik u odnosu na
        otvoreni zupčanik, zaključavanje, split-post).
    gum_condition:
      name: Uvjet gume
      description: Uvjet/status gumice marke na poleđini (primjerice nikad nije pričvršćena
        na šarke, pričvršćena na šarke, nema gumice).
    gun_action_type:
      name: Vrsta mehanizma oružja
      description: Vrsta mehaničke radnje koja se koristi za učitavanje/paljenje (npr.
        djelovanje s vijkom, djelovanje s polugom).
    gun_operational_status:
      name: Operativno stanje oružja
      description: Označava je li kolekcionarski pištolj deaktiviran/ne puca (i kako
        je predstavljen).
    gun_type:
      name: Vrsta pištolja
      description: Identificira opći čimbenik oblika vatrenog oružja za antiknu pušku.
    gusset_material:
      name: Materijal umetka
      description: Određuje materijal korišten u podstavi međunožja/umetka, koji utječe
        na prozračnost, higijenu i udobnost.
    gymnastics_discipline:
      name: Gimnastička disciplina
      description: Određuje gimnastičku granu za koju je proizvod namijenjen (primjerice
        umjetnička, ritmička, akrobatska).
    hair_extension_texture:
      name: Tekstura ekstenzije za kosu
      description: Opisuje kovrčavi, valoviti ili teksturni uzorak pramenova ekstenzije.
    hair_net_style:
      name: Stil s mrežicom za kosu
      description: Označava stil dizajna ili izrade mrežice za kosu (primjerice bujna,
        široka čarapa, pokrivalo za punđu).
    hair_quality_grade:
      name: Ocjena kvalitete kose
      description: Označava industrijsku kvalitetu/oznake podrijetla kose.
    halter_style:
      name: Stil haltera
      description: Identificira funkcionalni ili dizajnerski stil ogrlice (primjerice
        uže, odvojiva, za pokazivanje), pomažući kupcu da odabere ogrlicu prikladnu
        za njihovu namjeravanu uporabu.
    hammock_style:
      name: Stil viseće mreže
      description: Opisuje strukturni stil ili konstrukciju viseće mreže.
    hand_and_foot_coverage:
      name: Pokrivanje ruku i stopala
      description: Opisuje integrirane ili odvojive rukavice i navlake za cipele koje
        pokrivaju ruke i/ili stopala.
    hand_cymbal_set_configuration:
      name: Konfiguracija kompleta ručnih činela
      description: Označava prodaje li se proizvod kao par, jedna činela ili veći
        set.
    hand_drum_head_material:
      name: Materijal membrane za ručni bubanj
      description: Materijal glave bubnja (membrana) koja se koristi na tarabuku.
    hand_exerciser_style:
      name: Stil sprave za vježbanje ruku
      description: Klasificira cjelokupni stil ili mehanizam sprave za vježbanje ruku.
    hand_guard_backbone_material:
      name: Materijal za okosnicu štitnika za ruke
      description: Materijal strukturne kralježnice/oslonca (ako postoji), koji određuje
        čvrstoću i zaštitu.
    hand_guard_coverage_style:
      name: Stil pokrivanja štitnika za ruke
      description: Opisuje pokrivenost/profil štitnika za ruku, što utječe na zaštitu
        od vjetra/udaraca.
    hand_guard_mounting_type:
      name: Vrsta montaže štitnika za ruku
      description: Određuje kako se štitnici za ruke pričvršćuju na motocikl (npr.
        kraj upravljača s unutarnjom stezaljkom u odnosu samo na stezaljku).
    hand_guard_set_configuration:
      name: Konfiguracija seta štitnika za ruke
      description: Bez obzira prodaje li se proizvod kao lijevi/desni par ili kao
        jedna strana.
    hand_guard_style:
      name: Stil štitnika za ruke
      description: Opisuje dizajn ili stil pokrivenosti štitnika (npr. zatvoreni,
        otvoreni, potpuni, lagani, standardni).
    hand_guard_weather_protection:
      name: Zaštita za ruke, zaštita od vremenskih uvjeta
      description: Označava predviđenu zaštitu od vremenskih uvjeta koju pružaju štitnici
        za ruke.
    hand_paddle_strap_type:
      name: Vrsta trake za ručno veslo
      description: Određuje vrstu remena, ili odsutnost remena, koji se koristi za
        pričvršćivanje ručne lopatice za ruku korisnika.
    hand_percussion_mount_attachment_mechanism:
      name: Mehanizam za pričvršćivanje nosača za ručne udaraljke
      description: Određuje kako se nosač pričvršćuje na stalak, stalak ili drugu
        opremu (primjerice stezaljka u odnosu na nosač na šipku).
    hand_percussion_mounting_handling:
      name: Montaža/obrada za ručne udaraljke
      description: Bez obzira je li instrument ručni, nošen, montiran ili postavljen
        na stol/pod tijekom tipične uporabe.
    hand_percussion_pitch_type:
      name: Vrsta tona zvuka za udaranje rukom
      description: Označava proizvodi li instrument određeni ton (podesivi/note) ili
        neodređeni ton.
    hand_percussion_playing_method:
      name: Metoda sviranja ručnih udaraljki
      description: Kako se instrument obično svira da bi se proizveo zvuk (primjerice
        trese se u odnosu na struganje).
    hand_percussion_set_configuration:
      name: Konfiguracija seta za ručne udaraljke
      description: Bilo da se radi o jednom instrumentu, paru ili setu od više dijelova.
    hand_percussion_size_class:
      name: Klasa veličine ručnih udaraljki
      description: Opća veličina kategorije instrumenta kada nije osigurano precizno
        mjerenje ili za jednostavno filtriranje.
    hand_sewing_needle_point_type:
      name: Vrsta vrha igle za ručno šivanje
      description: Oblik/stil vrha igle za ručno šivanje koji se koristi za prodiranje
        u različite materijale (npr. tkanine, pletiva, kožu) ili pređe.
    hand_support_level:
      name: Razina potpore za ruku
      description: Određuje stupanj podrške ili sažimanja koji pruža rukavica, omotač
        ili remen.
    hand_support_size:
      name: Veličina potpore za ruku
      description: Deklarirana veličina rukavice, remena ili omota (XS-XXL ili jedna
        veličina).
    handball_ball_type:
      name: Vrsta lopte za rukomet
      description: Označava namjeravanu kategoriju upotrebe rukometne lopte, kao što
        je utakmica, trening ili plaža.
    handball_playing_surface:
      name: Površina za igranje rukometa
      description: Označava površinu(e) za igru za koju je rukomet optimiziran.
    handball_target_type:
      name: Vrsta mete za rukomet
      description: Određuje stil ili dizajn mete za gađanje namijenjene za trening
        timskog rukometa.
    handbrake_actuation_type:
      name: Vrsta aktiviranja ručne kočnice
      description: Određuje kako se aktivira parkirna kočnica.
    handbrake_orientation:
      name: Orijentacija ručne kočnice
      description: Određuje je li ručna kočnica namijenjena za vozila s volanom na
        lijevoj ili desnoj strani ili je univerzalna.
    handgun_grip_material:
      name: Materijal drške pištolja
      description: Primarni materijal drški/ploča pištolja.
    handle_configuration:
      name: Konfiguracija drške
      description: Opisuje strukturni stil korisničkog imena wakeboarda (primjerice
        jednostruki, dvostruki, Deep-V, T-wrap) tako da kupac može odgovarati vještini,
        trikovima ili vrsti daske.
    handle_ergonomics:
      name: ergonomija korisničkog imena
      description: Opisuje ergonomske značajke korisničkog imena namijenjene poboljšanju
        udobnosti i kontrole.
    handle_grip_material:
      name: Materijal ručke
      description: Određuje materijal korišten na površini prianjanja korisničkog
        imena, što utječe na udobnost i prianjanje, posebno kada je mokro.
    handle_grip_type:
      name: Vrsta drške
      description: Određuje vrstu obloge/materijal ili stil površine rukohvata namijenjen
        poboljšanju udobnosti i kontrole.
    handle_shape:
      name: Oblik ručke
      description: Oblik poprečnog presjeka ili profil ručke.
    handlebar_design:
      name: Dizajn upravljača
      description: Određuje vrstu ručki na steperu, kao što je ona bez ručki, fiksna,
        sa podesivom visinom, sklopiva ili s trakom otpora.
    handlebar_type:
      name: Vrsta ručke
      description: Identificira stil upravljača postavljenog na bicikl, što utječe
        držanje pri vožnji, kontrolu i udobnost.
    handslide_bore_type:
      name: Tip otvora za klizač za ruke
      description: Određuje koristi li bas trombon klizač s jednim ili dva otvora.
    handwear_cuff_style:
      name: Stil manžete za ručne odjevne predmete
      description: Opisuje stil konstrukcije manžete ili zapešća rukavica ili prstiju,
        što utječe na pokrivenost i pristajanje.
    handwear_insulation_material:
      name: Materijal za izolaciju ruku
      description: Označava izolacijski ili podstavni materijal koji se koristi unutar
        rukavica ili palčeva.
    handwear_size:
      name: Veličina rukavica
      description: Određuje veličinu rukavica ili druge odjeće za ruke kako bi se
        osiguralo pravilno pristajanje.
    hang_glider_design:
      name: Dizajn zmaja
      description: Klasificira strukturni stil jedrilice (primjerice fleksibilno krilo,
        kruto krilo, motorno krilo).
    hanger_thread_size:
      name: Vješalica niz poruka veličina
      description: Označava vijak niz poruka veličina/standard koji se koristi za
        pričvršćivanje vješalice na štapove za pecanje ili alarme za ugriz, osiguravajući
        kompatibilnost.
    hanging_suspension_method:
      name: Metoda vješanja
      description: Definira primarni hardver ili sustav koji se koristi za ovješenje
        ljuljačke (primjerice uže, lanac, okvir postolja).
    hardtop_finish_type:
      name: Vrsta završne obrade tvrdog krova
      description: Određuje stanje vanjske završne obrade tvrdog krova (primjerice
        premazan temeljnom bojom ili obojan), što Impact spremnost za ugradnju i izgled.
    hardtop_shell_material:
      name: Materijal školjke tvrdog krova
      description: Određuje primarni materijal krute školjke tvrdog krova vozila (ne
        bilo koju pokrovnu tkaninu), kao što su stakloplastika ili aluminij.
    hardtop_window_configuration:
      name: Konfiguracija prozora s tvrdim krovom
      description: Opisuje koji su prozori uključeni u tvrdi krov i njihovu konfiguraciju.
    harmonica_comb_material:
      name: Materijal češlja harmonike
      description: Materijal korišten za češalj harmonike (tijelo zračne komore).
    harmonica_cover_plate_finish:
      name: Završna obrada pokrovne ploče harmonike
      description: Određuje završnu obradu ili premaz na pokrovnim pločama harmonike.
    harmonica_cover_plate_material:
      name: Materijal pokrovne ploče harmonike
      description: Materijal koji se koristi za vanjske pokrovne ploče.
    harmonica_finish:
      name: Završna obrada harmonike
      description: Površinska obrada pokrovnih ploča/tijela harmonike.
    harmonica_included_accessories:
      name: Uključeni pribor za harmoniku
      description: Označava koji pribor dolazi s harmonikom.
    harmonica_note_range:
      name: Raspon nota harmonike
      description: Klasifikacija raspona instrumenata korištena u orkestralnom kontekstu
        (primjerice bas, bariton, tenor).
    harmonica_reed_plate_material:
      name: Materijal ploče jezička za harmoniku
      description: Materijal koji se koristi za ploče s trskom (primjerice mesing,
        nehrđajući čelik, aluminij).
    harmonica_system_type:
      name: Sustav/vrsta harmonike
      description: Označava sustav ili oblik orkestralne harmonike (primjerice Chord,
        bas, bariton, polifonija).
    harmonica_tuning_system:
      name: Sustav ugađanja harmonike
      description: Određuje izgled/sustav ugađanja koji koristi harmonika (npr. Richter,
        solo, orkestralno ugađanje).
    harness_shell_type:
      name: Vrsta školjke pojasa
      description: Opisuje krutost konstrukcije školjke pojasa (npr. mekana školjka,
        tvrda školjka, hibrid).
    harness_style:
      name: Stil pojasa
      description: Definira strukturni stil/dizajn pojasa, primjerice struk, sjedalo,
        prsa/prsluk, pojas s krilima, boardshort ili hibrid.
    harness_type:
      name: Vrsta pojasa
      description: Klasificira strukturni stil penjačkog pojasa, kao što je sjedeći,
        pojas za cijelo tijelo ili pojas za prsa.
    harp_action_type:
      name: Vrsta mehanizma harfe
      description: Primarni mehanizam koji se koristi za promjenu visine tona/akcidentala
        na harfi.
    harp_finish:
      name: Završna obrada harfe
      description: Površinska obrada tijela harfe (npr. prirodna, bojena, obojena,
        lakirana).
    harp_included_accessories:
      name: Uključeni pribor za harfu
      description: Navodi pribor koji dolazi s kupnjom pedalne harfe.
    harvest_method:
      name: Metoda žetve
      description: Označava je li morski plodovi ulovljeni u divljini, uzgojeni na
        farmi ili dobiveni nekom drugom metodom.
    harvest_stage:
      name: Faza žetve
      description: Označava fazu rasta u kojoj je rikula ubrana, kao što je mikrozelenje,
        mladi list ili zreli grozd.
    hat_style:
      name: Stil šešira
      description: Konstrukcija/stil šešira za zabavu (primjerice konusni šešir, kruna,
        cilindar, vizir) koji odražava kako stavka u osnovi izgleda.
    hazard_signal_mode:
      name: Modesignala opasnosti
      description: Mogućnost odabira uzoraka osvjetljenja/Mode za LED/elektroničke
        cestovne signalne lampe.
    head_configuration:
      name: Konfiguracija glave
      description: Označava ima li glava sjekire oštricu, čekić, oboje ili ništa,
        što izravno utječe na funkcionalnost na ledu i mješovitom terenu.
    head_material:
      name: Materijal glave
      description: Materijal glave za sviranje koji je dat s kvintom.
    head_movement_type:
      name: Vrsta pokreta glave
      description: Mogućnost usmjerenog kretanja dvonožca ili glave palice (npr. panoramsko
        pomjeranje, košenje, naginjanje).
    head_side:
      name: Strana glave
      description: Određuje je li membrana bubnja namijenjena za stranu udarača (battera),
        rezonantnu (prednju) stranu ili bilo koju od njih.
    head_weight_style:
      name: Stil težine glave
      description: Identificira konfiguraciju težine na glavi muhe, što utječe na
        brzinu propadanja i prezentaciju.
    headband_embellishment:
      name: Ukras za glavu
      description: Identificira ukrasne elemente pričvršćene na traku za glavu (npr.
        mašne, bisere, kristale, životinjske uši).
    headboard_style:
      name: Stil uzglavlja
      description: Opisuje dizajn ili stil konstrukcije uzglavlja dostavljenog s krevetom.
    headgear_strap_configuration:
      name: Konfiguracija remena za pokrivalo za glavu
      description: Označava broj remena koji se koriste za pričvršćivanje hrvačke
        pokrivala za glavu.
    headjoint_crown_style:
      name: Stil krune glavnog zgloba
      description: Određuje stil ili dizajn krune glave flaute (završne kapice), što
        može utjecati na estetiku i težinu/saldo.
    headjoint_pitch_standard:
      name: Standardni nagib glave
      description: Označava standard ugađanja dizajna glavnog zgloba (npr. A=440 u
        odnosu na A=442).
    headliner_product_form:
      name: Oblik proizvoda za oblogu krova (headliner)
      description: Određuje je li proizvod kompletan sklop oblikovane obloge krova,
        zamjenska tkanina ili komponenta za popravak/ukras.
    headrest_mount_attachment_method:
      name: Način pričvršćivanja nosača za naslon za glavu
      description: Određuje kako se nosač pričvršćuje na naslon za glavu/tubove sjedala.
    headrest_provision:
      name: Osiguravanje naslona za glavu
      description: Označava jesu li uključeni nasloni za glavu i postoje li točke
        za pričvršćivanje naslona za glavu.
    headset_standard:
      name: Standard slušalica
      description: Vrsta sučelja za glavu bicikla/glavnu cijev koju koristi okvir.
    headstall_style:
      name: Stil uzglavlja
      description: Klasificira strukturni dizajn ili konfiguraciju ušiju/obrva uzglavlja.
    headwear_intended_use:
      name: Namjena pokrivala za glavu
      description: Označava primarnu svrhu ili kontekst nošenja turbana (primjerice
        kemoterapija, gubitak kose, plivanje, religija).
    hearing_enhancer_style:
      name: Stil pojačivača sluha
      description: Opisuje fizički oblik uređaja kako bi korisnici mogli birati između
        dizajna preko uha, unutar uha, iza glave i drugih dizajna.
    heart_rate_monitoring_method:
      name: Metoda praćenja otkucaja srca
      description: Označava kako uređaj bilježi podatke o otkucajima srca tijekom
        vježbanja.
    heart_rate_sensing_technology:
      name: Tehnologija mjerenja otkucaja srca
      description: Određuje fiziološku metodu mjerenja koju monitor koristi za detekciju
        otkucaja srca (primjerice električni EKG u odnosu na optički PPG).
    heart_rate_sensor_placement:
      name: Položaj senzora otkucaja srca
      description: Označava gdje se osjetnik nosi ili gdje se nalazi (na tijelu ili
        biciklu), što utječe na udobnost i točnost mjerenja.
    heat_retention_technology:
      name: 'Tehnologija zadržavanja topline '
      description: Opisuje bilo koju tehnologiju, premaz ili materijal koji pojačava
        znojenje ili toplinsku aktivnost za steznike usmjerene na vježbanje (primjerice
        neoprenski efekt saune).
    heated_glass_feature:
      name: Funkcija grijanog stakla
      description: Označava uključuje li prozorsko staklo integrirane električne elemente
        poput stražnje mreže za odmrzavanje i/ili antene ugrađene u staklo.
    heater_control_actuation_method:
      name: Metoda aktiviranja grijača
      description: Određuje kako upravljački sklop grijača/HVAC sustava aktivira kutiju
        HVAC sustava vozila (primjerice aktiviranje kabelom, aktiviranje vakuumom
        ili elektronička signalizacija).
    heater_control_electrical_connector_type:
      name: Električni mehanizam upravljanja grijačem tipa sinkronizacije
      description: Određuje stil/sučelje električnog mehanizma sinhronizacije koje
        koristi sklop za upravljanje grijačem (primjerice vrsta s pigtailom u odnosu
        na utikač).
    heating_technology:
      name: Tehnologija grijanja
      description: Identificira primarni mehanizam zagrijavanja koji isparivač koristi
        za pretvaranje materijala u paru.
    heel_shape:
      name: Oblik pete
      description: Određuje geometrijski stil ili siluetu same pete, pomažući kupcima
        filtrirati prema preferencijama strukturnog izgleda i stabilnosti (primjerice
        stiletto vs. blok).
    helicopter_mission_type:
      name: Vrsta misije helikopterom
      description: Primarna namjeravana uporaba/uloga helikoptera.
    helicopter_rotor_configuration:
      name: Konfiguracija rotora helikoptera
      description: Određuje izgled sustava rotora helikoptera (raspored glavnog rotora/repnog
        rotora), kao što je jedan glavni + repni, koaksijalni, tandem ili međusobno
        povezani.
    helmet_accessory_type:
      name: Vrsta dodatka za kacigu
      description: Identificira specifičnu vrstu dijela ili pribora za biciklističku
        kacigu kako bi kupci mogli odmah pronaći pravu stavku.
    helmet_audio_connector_type:
      name: Kaciga audio mehanizam sinkronizacije tipa
      description: Određuje vrstu audio konektora zrakoplova koji koristi komunikacijski
        vod kacige, ako postoji.
    helmet_communication_system_readiness:
      name: Spremnost komunikacijskog sustava kacige
      description: Je li kaciga dizajnirana za prihvat interfona/Bluetooth komunikacijskog
        sustava.
    helmet_construction_type:
      name: Konstrukcija kacige
      description: Opisuje stil izrade školjke i obloge kacige (npr. pjena, tvrda
        školjka, hibrid).
    helmet_fit_head_shape:
      name: Prilagođenost kacige (oblik glave)
      description: Unutarnji profil pristajanja namijenjen je različitim oblicima
        glave.
    helmet_interior_liner_type:
      name: Vrsta unutarnje obloge kacige
      description: Vrsta udobne podstave i je li uklonjiva/periva.
    helmet_liner_material:
      name: Materijal unutarnje obloge kacige
      description: Određuje materijal unutarnje obloge ili razmaka u podnožju koji
        pruža udobnost i apsorpciju udaraca.
    helmet_retention_closure_type:
      name: Vrsta sustava za pričvršćivanje kacige
      description: Određuje mehanizam zatvaranja/zadržavanja kupaca remena za bradu
        kacige (primjerice dvostruki D-prsten, mikrometrijska čegrtaljka).
    helmet_safety_certification:
      name: Certifikat o sigurnosti kacige
      description: Navodi sigurnosne standarde ili certifikate kojima kaciga odgovara.
    helmet_safety_certification_standard:
      name: Standard certificiranja zaštitne kacige
      description: Sigurnosni/homologacijski standardi koje kaciga za motocikl certificirano
        zadovoljava.
    helmet_shell_material:
      name: Materijal školjke kacige
      description: Primarni materijal ili konstrukcija vanjske ljuske korištena za
        kacigu.
    helmet_size_system:
      name: Sustav veličina kacige
      description: Shema veličina koja se koristi za izražavanje veličine kacige.
    helmet_sun_visor_type:
      name: Vrsta štitnika za sunce za kacigu
      description: Određuje uključuje li kaciga unutarnji štitnik za sunce, zatamnjeni
        vanjski štitnik, oboje ili nijedno.
    helmet_vehicle_fit:
      name: Prilagođavanje kacige vozilu
      description: Vrsta vozila/upotreba za koju je kaciga namijenjena.
    helmet_ventilation_adjustability:
      name: Podesivost ventilacije kacige
      description: Određuje kako vozač može kontrolirati ventilaciju kacige.
    helmet_ventilation_configuration:
      name: Konfiguracija ventilacije kacige
      description: Opisuje izgled i mogućnost podešavanja ventilacije kacige (primjerice
        otvori za bradu, otvori za usis zraka/čelo, otvori za zatvaranje).
    helmet_visor_peak_adjustability:
      name: Podesivost vizira/šila kacige
      description: Je li vizir/štitnik kacige za terensku vožnju podesiv i/ili uklonjiv.
    helmet_visor_shield_optical_features:
      name: Optičke značajke vizira (štita) kacige
      description: Optičke i kompatibilne značajke glavnog štitnika za lice/vizira.
    helmet_visor_shield_type:
      name: Vrsta vizira/štita za kacigu
      description: Primarni štitnik za lice/vizir uključen je zajedno s kacigom.
    hem_style:
      name: Stil poruba
      description: Označava stil završne obrade otvora za noge - poput čistog, zaobljenog
        ili neobrađenog - koji snažno utječe na izgled odjevnog predmeta.
    hemisphere_compatibility:
      name: Kompatibilnost hemisfera
      description: Određuje za koju je hemisferu zvjezdana karta dizajnirana, na temelju
        vidljivih zviježđa.
    hemline_style:
      name: Stil ruba
      description: Definira kroj ili dizajn donjeg ruba haljine.
    herbal_infusion_function:
      name: Funkcija biljnog infuza
      description: Označava primarnu dobrobit ili funkcionalnu korist zbog koje se
        infuzija koristi.
    hex_size:
      name: Heksadecimalna veličina
      description: Za ugradnju/uklanjanje grijalice potreban je šesterokutni ključ.
    hi_hat_pair_type:
      name: Vrsta para hi-hat
      description: Označava je li oglas za usklađeni gornji/donji par ili za pojedinačnu
        komponentu činele.
    hi_hat_sound_character:
      name: Karakter zvuka hi-hata
      description: Opisuje cjelokupni tonski profil kako bi kupci lakše filtrirali
        zvukove koje žele.
    high_visibility_class:
      name: Klasa vidljivosti
      description: Određuje razinu klasifikacije vidljivosti odjevnog predmeta prema
        ANSI/ISEA 107.
    highback_style:
      name: Stil s visokim naslonom
      description: Opisuje strukturni stil/dizajn visokog naslona koji utječe na karakteristike
        vožnje.
    hitch_ball_diameter:
      name: Promjer kugle za vuču
      description: Promjer kuglaste glave (sfere) koja se spaja s priključnom spojnicom
        prikolice (npr. 1 7/8 inča, 2 inča, 2 5/16 inča, 50 mm).
    hitch_ball_mounting_style:
      name: Način montaže kuke za vuču
      description: Je li kugla za vuču standardna kugla s maticom, fiksna/prešana
        za specifične glave vučne kuke ili uključuje integrirani hardver.
    hobby_horse_handle_type:
      name: Hobby horse korisničko ime tipa
      description: Određuje konstrukciju hvatišta/korisničkog imena koja se koristi
        za držanje ili upravljanje konjićem.
    hobby_horse_sound_features:
      name: Zvučne značajke hobi konja
      description: Označava uključuje li konjić zvučne efekte i kakve.
    hockey_goal_type:
      name: Vrsta hokejaškog gola
      description: Određuje stil ili namjenu kutija hokejaškog gola (primjerice regularni
        led, ulica, Shop Mini).
    hockey_size_category:
      name: Kategorija veličine hokeja
      description: Označava segment standardizirane veličine opreme kojoj dio odgovara
        (mladi, juniori, srednji, seniori).
    hockey_size_segment:
      name: Segment veličine hokeja
      description: Određuje segment standardizirane veličine hokejaške opreme koji
        određuje ukupne dimenzije i pristajanje jastučića.
    hold_surface_texture:
      name: Tekstura površine držanja
      description: Opisuje hrapavost ili taktilnu završnu obradu površine za hvatanje.
    home_decor_sewing_pattern_project_type:
      name: Vrsta projekta kroja za šivanje početnih ukrasa
      description: Označava vrstu ukrasa koju kroj za šivanje izrađuje (primjerice
        navlaka za jastuk, zavjesa, nadstolnjak).
    homologation_rule_set:
      name: Homologacija / skup pravila
      description: Navodi tijelo za sankcioniranje ili skup pravila s kojima se automobil
        pridržava (gdje je primjenjivo).
    honey_form:
      name: Oblik meda
      description: Određuje fizički oblik ili prezentaciju proizvoda od meda.
    honey_processing_method:
      name: Metoda obrade meda
      description: Označava kako je med tretiran ili prerađen prije pakiranja.
    honey_variety:
      name: Sorta meda
      description: Identificira botanički ili cvjetni izvor meda- monoflornog ili
        poliflornog - što izravno utječe na okus, boju i cijenu.
    hood_configuration:
      name: Konfiguracija nape
      description: Opisuje dizajn kapuljače i značajke podešavanja.
    hood_design:
      name: Dizajn kapuljače
      description: Određuje primarni materijal jastučića instrumenta.
    hood_style:
      name: Stil kapuljače
      description: Označava nazočnost i stil kapuljače na odjevnom predmetu.
    hood_type:
      name: Vrsta kapuljače
      description: Označava posebne dizajnerske karakteristike dijela kapuljače odjevnog
        predmeta.
    hook_and_eye_size_hook_number:
      name: Veličina udice i ušice (broj udice)
      description: Standardizirano dimenzioniranje/numeriranje kuka i omotača (gdje
        je primjenjivo) koje se koristi pri pakiranju za označavanje ukupne veličine
        kuka/omotača.
    hook_and_loop_fastener_duty_rating:
      name: Nazivna nosivost čičak zatvarača
      description: Označava namjeravanu razinu čvrstoće/carine i povezane pristojbe
        čičak trake.
    hook_and_loop_fastener_format:
      name: Format čičak trake
      description: Određuje fizički oblik ili format pakiranja čičak trake (npr. rola/traka,
        točkice, trake).
    hook_and_loop_fastener_side:
      name: Strana čičak zatvarača
      description: Određuje uključuje li proizvod samo stranu s kukom, samo stranu
        s petljom ili set koji sadrži obje strane.
    hook_coating_finish:
      name: Premaz/završna obrada kuke
      description: Površinski tretman ili premaz primijenjeni na udicu u svrhu otpornosti
        na koroziju, nevidljivost ili boju (npr. crni nikl, svijetli kositar).
    hook_configuration:
      name: Konfiguracija kuke
      description: Opisuje nazočnost i stil udica koje se isporučuju s mamcem.
    hook_eye_style:
      name: Stil ušice kuke
      description: Određuje oblik ili orijentaciju ušice udice, što utječe na način
        na koji je udica vezana ili pričvršćena.
    hook_eye_type:
      name: Vrsta ušice kuke
      description: Određuje dizajn ušice udice, utječući na izbor čvora i opremu.
    hook_loop_format:
      name: Format s čičak trakom
      description: Određuje fizički oblik čičak trake koja se prišiva.
    hook_loop_side:
      name: Strana čička
      description: Određuje je li proizvod strana s čičkom, strana s petljom ili usklađeni
        komplet s čičkom i petljom.
    hook_material:
      name: Materijal kuke
      description: Označava materijal koji se posebice koristi za kuku/glavu gafa,
        ključni faktor za čvrstoću i otpornost na koroziju pri korištenju u slanoj
        vodi.
    hook_organizer_style:
      name: Stil organizatora kuka
      description: Fizički stil ili oblik organizatora s kukom (primjerice, kutija,
        rola ili vrećica), koji se koristi za podršku pregledavanja i filtriranja
        prema vrsti organizatora.
    hook_point_configuration:
      name: Konfiguracija vrha kuke
      description: Označava ima li udica dva vrha (dvostruki) ili tri vrha (trostruki).
    hook_point_type:
      name: Vrsta kuke
      description: Opisuje brušenje ili oblik vrha udice za ribolov, koji utječe prodiranje
        i sposobnost držanja.
    hook_shank_length:
      name: Duljina drške udice
      description: Označava relativnu klasifikaciju duljine drške udice (primjerice
        kratka, duga) za brzu vizualnu i funkcionalnu usporedbu.
    hooks_eyes_attachment_method:
      name: Metoda pričvršćivanja kukicama i ušicama
      description: Kako su kuke i ušice pričvršćene na odjeću ili projekt.
    hop_up_type:
      name: Vrsta hop-up sustava
      description: Definira hop-up sustav koji se koristi za davanje povratnog okretanja
        kuglicama za domet i preciznost.
    horse_blanket_type:
      name: Vrsta deke za konje
      description: Određuje primarni stil ili namjeravanu upotrebu deke ili čaršafa
        za konje.
    horse_brush_type:
      name: Vrsta četke za konje
      description: Klasificira četku prema njenom specifičnom stilu njege ili namjeni,
        omogućujući korisnicima filtriranje bez fragmentiranja hijerarhije kategorija.
    horse_care_purpose:
      name: Svrha njege konja
      description: Primarna funkcionalna namjena proizvoda je briga o konjima, koja
        obuhvaća potrebe zdravlja, njege i upravljanja.
    horse_feed_stage:
      name: Stadij hranjenja konja
      description: Označava životnu fazu ili fiziološki status konja za koji je hrana
        formulirana.
    horse_groomer_type:
      name: Vrsta timaritelja konja
      description: Klasificira stil timaritelja kako bi kupci mogli brzo pronaći određeni
        alat koji im je potreban.
    horse_leg_protection_type:
      name: Vrsta zaštite za konjske noge
      description: Klasificira specifičan stil ili funkcije konjske čizme, omotača
        ili zavoja.
    horse_model_breed:
      name: Modelna pasmina konja
      description: Označava pasminu konja prikazanu maketom (ako je primjenjivo).
    hosiery_toe_style:
      name: Stil čarapa s prstima
      description: Definira konstrukciju područja prstiju čarape, važnog za trajnost
        i kompatibilnost s obućom otvorenih prstiju.
    hot_air_balloon_basket_type:
      name: Vrsta košare za balon na vrući zrak
      description: Određuje primarnu konfiguraciju/stil košare (npr. standardna sportska,
        komercijalna velikog kapaciteta, pregrađena, pristupačna/s vratima) koja se
        koristi za ukrcaj i namjeravani rad.
    hot_air_balloon_burner_type:
      name: Vrsta plamenika balona na vrući zrak
      description: Vrsta/konfiguracija sustava plamenika ugrađenog na balon.
    hot_air_balloon_envelope_material:
      name: Materijal za ovojnicu balona na vrući zrak
      description: Primarna tkanina/materijal korišten za omotač balona (nadstrešnica).
    hotfix_application_tool:
      name: Alat za hitne popravke aplikacija
      description: Preporučeni alat ili izvor topline koji se koristi za nanošenje
        glačajućih cirkona.
    hub_axle_type:
      name: Vrsta osovine glavčine
      description: Označava sustav sučelja osovine/zadržavanja kupaca za koji je glavčina
        dizajnirana (brzootpuštanje, osovina s prolazom itd.).
    hub_motor_type:
      name: Vrsta motora glavčine
      description: Opisuje stil konstrukcije motora glavčine (s reduktorom, izravnim
        pogonom, s četkicama, bez četkica) kako bi se kupci informirali o karakteristikama
        okretnog momenta, težine i učinkovitosti.
    hula_hoop_construction_type:
      name: Vrsta konstrukcije hula hoop-a
      description: Opisuje kako je obruč konstruiran/sastavljen.
    hula_hoop_features:
      name: Značajke hula hoop-a
      description: Ističe značajke funkcionalnog ili dizajnerskog karaktera hula hoop
        obruča.
    hull_design:
      name: Dizajn trupa
      description: Opisuje oblik trupa koji utječe na karakteristike učinkovitosti
        i obrade.
    hull_type:
      name: Vrsta trupa
      description: Opisuje oblik trupa koji utječe na učinkovitost i stabilnost.
    humidifier_refill_medium_type:
      name: Srednje punjenje ovlaživača zraka
      description: Označava medij za zadržavanje/dopunjavanje vlage koji koristi kutija
        ovlaživač zraka (što se smoči ili zamijeni).
    humidifier_refill_method:
      name: Metoda punjenja ovlaživača zraka
      description: Opisuje kako se ovlaživač zraka puni vlagom ili zamjenjuje.
    humidifying_medium:
      name: Ovlažujući medij
      description: Identificira element/medij za ovlaživanje koji proizvod koristi
        (što se vlaži/aktivira).
    hummus_base_ingredient:
      name: Sastojak za bazu humusa
      description: Označava primarnu mahunarku ili biljnu bazu koja se koristi za
        izradu humusa.
    hunting_call_type:
      name: Vrsta lovačkog poziva
      description: Klasificira primarni način rada ili mehanizam poziva (primjerice
        puhanje ustima, elektronički, kutija) kako bi lovci mogli brzo odabrati format
        koji najbolje odgovara njihovim potrebama i razini vještine.
    hunting_dog_collar_function:
      name: Funkcija ogrlice za lovačke pse
      description: Klasificira primarni funkcionalni stil ili namjenu ogrlice, pomažući
        kupcu filtrirati proizvode za funkcije kao što su praćenje, trening, vidljivost
        ili standardna uporaba.
    hvac_control_functions:
      name: Funkcije upravljanja HVAC sustavom
      description: Označava koje značajke HVAC-a/odmrzavanja/protoka zraka kontrolira
        jedinica (mehaničke ili elektroničke).
    hybrid_drivetrain_configuration:
      name: Konfiguracija hibridnog pogonskog sklopa
      description: Označava arhitekturu PHEV sustava koja opisuje kako elektromotor(i)
        i motor s unutarnjim izgaranjem osiguravaju pogon.
    hybrid_system_type:
      name: Vrsta hibridnog sustava
      description: Klasificira hibridizacijsku arhitekturu koju koristi vozilo.
    hybrid_truck_cab_type:
      name: Tip kabine hibridnog kamiona
      description: Određuje konfiguraciju kabine kamiona, što utječe na kapacitet
        sjedenja i unutarnji prostor.
    hydration_bag_features:
      name: Karakteristike hidratacijske torbe
      description: Ističe značajne dizajnerske ili funkcionalne značajke specifične
        za hidratacijske torbe.
    hydration_belt_features:
      name: Značajke hidratacijskog pojasa
      description: Navodi značajne ugrađene značajke koje poboljšavaju upotrebljivost,
        sigurnost ili praktičnost hidratacijskog pojasa.
    hydration_bladder_compatibility:
      name: Kompatibilnost hidratacijskog mjehura
      description: Označava uključuje li prsluk sustav hidratacijske mjehuriće ili
        ga podržava.
    hydration_mouthpiece_style:
      name: Stilovi usnika za hidrataciju
      description: Određuje dizajn ili funkcionalni stil usnika ili ventila sustava
        za hidrataciju, pomažući kupcima da odaberu željeno sučelje za piće i osiguraju
        kompatibilnost.
    hydration_pack_style:
      name: Hidratacija u stilu pakiranja
      description: Određuje strukturni stil hidratacijske ambalaže, kao što je ruksak
        ili prsluk, radi lakšeg pristajanja i korištenja kutije za filtriranje.
    hydration_system_insulation:
      name: Izolacija hidratacijskog sustava
      description: Označava jesu li spremnik i/ili cijev za piće izolirani kako bi
        se održala temperatura tekućine u vrućim ili hladnim uvjetima.
    hydration_valve_type:
      name: Vrsta hidratacijskog ventila
      description: Označava stil ventila za piće ili usnika koji se isporučuje sa
        sustavom ili bocom, pokrivajući uobičajene dizajne ventila s ugrizom i mlaznica
        visokog protoka.
    hydraulic_fluid_type:
      name: Vrsta hidraulične tekućine
      description: Određuje vrstu kočione tekućine za koju je namijenjena hidraulična
        ručica kočnice bicikla. Ove informacije su ključne za održavanje i sigurnost.
    hydrogenation_level:
      name: Razina hidrogenacije
      description: Označava je li mast nehidrogenirana, djelomično hidrogenirana ili
        potpuno hidrogenirana, što utječe na sadržaj trans masti i učinkovitost pečenja.
    hydrophobicity_level:
      name: Razina hidrofobnosti
      description: Označava stupanj učinkovitosti vodenog zrnanja/ploča na tržištu
        od strane proizvoda.
    ice_cream_format:
      name: Format sladoleda
      description: Opisuje fizički oblik ili prezentaciju proizvoda od sladoleda (npr.
        pinta, pločica, mochi).
    ice_skate_sharpener_type:
      name: Vrsta oštrača za klizaljke
      description: Klasificira cjelokupni dizajn ili format oštrača (ručni kamen,
        električni stroj, šablona itd.).
    ice_temperature_suitability:
      name: Prikladnost temperature leda
      description: Označava raspon temperature leda za koji je vosak za hokejašku
        palicu formuliran, što utječe na učinkovitost i svojstva odbijanja snijega.
    icing_sugar_variety:
      name: Raznovrsni šećer u prahu
      description: Klasificira formulaciju ili funkcionalnu vrstu šećera u prahu (primjerice
        fondan, netopivi snježni prah, obojen, aromatiziran).
    ignition_coil_configuration:
      name: Konfiguracija zavojnice paljenja
      description: Određuje faktor oblika zavojnice paljenja (jedna zavojnica/zavojnica
        na utikaču, višekutna zavojnica pakirana prema broju cilindara, vodilica zavojnice/kazeta
        ili stil razvodnika).
    ignition_lead_compliance_standard:
      name: Standard sukladnosti kabela za paljenje
      description: Formalni industrijski standard ili certifikat koji kabel(i) za
        paljenje zadovoljavaju, kako tvrdi proizvođač (primjerice SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Izolacijski materijal kabela za paljenje
      description: Primarna izolacija/materijal plašta koji se koristi na kupcu potencijala
        paljenja (vanjska izolacija kabela).
    ignition_lead_set_type:
      name: Ignition potencijalni kupac set type
      description: Je li proizvod pojedinačni kupac potencijala paljenja ili kompletan
        set, te čemu je set namijenjen.
    ignition_lead_terminal_type:
      name: Vrsta terminala kabela za paljenje
      description: Tip terminala/konektora koji se koristi na krajevima kabela za
        paljenje (primjerice tip terminala svjećice i tipa terminala zavojnice/razvodnika).
    illumination_type:
      name: Vrsta osvjetljenja
      description: Određuje je li i kako je lopta osvijetljena za noćnu igru (primjerice
        fosforescentni sjaj, LED aktivirana udarcem).
    immobilizer_installation_type:
      name: Vrsta ugradnje imobilizatora
      description: Označava kako je imobilizator ugrađen ili spojen na vozilo.
    immobilizer_unlock_method:
      name: Metoda otključavanja imobilizatora
      description: Određuje kako se imobilizator aktivira/deaktivira ili otključava.
    impact_protection_certifications:
      name: Certifikati zaštite od udarca
      description: Navodi specifične sigurnosne standarde koje zaštitna podloga zadovoljava
        ili premašuje.
    impact_protection_level:
      name: Razina zaštite od udaraca
      description: Određuje razinu zaštite Impact ili tehnologiju koju nudi atletska
        čaša.
    impact_protection_rating:
      name: Ocjena zaštite od udaraca
      description: Određuje certificiranu razinu zaštite od udarca sukladno standardima
        (primjerice EN 1621-1 razina 1, EN 14120 razina 2), pomažući vozačima da filtriraju
        za višu razinu zaštite.
    impact_surface_material:
      name: Materijal udarne površine
      description: Opisuje primarni materijal udara/udarne površine u svrhu sigurnosti
        i osjećaja (npr. pjena, plastika).
    incense_base_material:
      name: Materijal za bazu tamjana
      description: Primarni bazni/vezivni materijal koji se koristi za izradu mirisnog
        štapića (praškasta baza) u kompletu.
    incense_making_method:
      name: Metoda izrade tamjana
      description: Namjeravani proces obrade koji podržava komplet.
    incense_tool_type:
      name: Vrsta alata za tamjan
      description: Određuje kakav je alat za izradu tamjana ovaj proizvod (koristi
        se za oblike, mjerenje, prešanje, miješanje ili sušenje tamjana).
    incline_adjustment_type:
      name: Vrsta podešavanja nagiba
      description: Opisuje kako se (ili može li se) nagib mijenjati tijekom treninga.
    included_accessories:
      name: Uključeni pribor
      description: Popisi su uključivali dodatke poput rezervnih glava/bitova, kutije
        za pohranu, kabela Charge ili AC prilagodnika.
    included_case_type:
      name: Vrsta uključenog kofera
      description: Vrsta kutije za nošenje/skladištenje koja dolazi uz bas saksofon
        (ako postoji).
    included_components:
      name: Uključene komponente
      description: Navodi što je uključeno u paket (korisno za setove i pakete alata).
    included_fastener_components:
      name: Uključene komponente za pričvršćivanje
      description: Određuje je li proizvod set s kukicama i omotačima, samo s kukicama,
        samo s omotačima ili srodna varijanta zatvaranja odjeće.
    included_hydration_vessel_type:
      name: Uključena vrsta posude za hidrataciju
      description: Označava stil hidratacijskog spremnika koji je dostavljen uz ili
        koji podržava pojas.
    included_items_woodwind_instrument:
      name: Uključena stavka (drveni puhački instrument)
      description: Popisi koji se obično paketi stavki nalaze u paketu bas saksofona.
    included_materials:
      name: Uključeni materijali
      description: Označava koje su komponente uključene u uzorak kupnja (samo uzorak
        vs. uzorak + materijali).
    included_mounting_accessories:
      name: Uključeni pribor za montažu
      description: Navodi koji je pribor za montažu/pričvršćivanje uključen uz spikerfon.
    included_pump_type:
      name: Uključena vrsta crpke
      description: Označava vrstu pumpe koja je dostavljena ili integrirana sa zračnim
        krevetom.
    included_scraper_implement_type:
      name: Uključena vrsta priključka za struganje
      description: Označava koji pribor za igru dolazi s glazbenom strugalicom (primjerice
        štapić/štapić za struganje, žičana četka).
    indicator_design:
      name: Dizajn indikatora
      description: Klasificira fizički oblik ili stil indikatora ugriza u ribolovu.
    indicator_functions_tracked:
      name: Praćene funkcije indikatora
      description: Navodi specifične podatke o igri koje indikator prati, kao što
        su lopte, strikeovi, outi, inningi, broj bacanja, overi, wicketi, rezultat
        ili downovi.
    indoor_outdoor_use:
      name: Za unutarnju/vanjsku uporabu
      description: Označava je li kuglarski (bowling) igračka namijenjena za unutarnju,
        vanjsku upotrebu ili oboje.
    inflatable_decoration_items_included:
      name: Uključena je napuhana dekoracija
      description: Navodi ključni pribor koji je uključen uz napuhavanje (primjerice
        ventilator, kolce, užad za pričvršćivanje).
    inflatable_decoration_type:
      name: Vrsta dekoracije koja se napuhuje
      description: Određuje vrstu napuhane dekoracije za zabavu (oblici/faktor oblika)
        za podršku pregledavanja i filtriranja.
    inflatable_raft_float_features:
      name: Značajke napuhanog splava/plovka
      description: Funkcionalne značajke prisutne na napuhavajućem splavu/plovku.
    inflation_method_included:
      name: Uključena metoda napuhavanja
      description: Navodi vrstu otopine za napuhavanje guma koja je uključena u komplet
        za popravak, ako postoji.
    infused_scent:
      name: Infuzirani miris
      description: Označava aditive mirisa ili okusa impregnirane u materijalu mamca.
    ingredient_base_type:
      name: Vrsta baze sastojka
      description: Identificira primarnu bazu koja se koristi za fermentaciju (primjerice
        koncentrat soka od grožđa u odnosu na svježi sok u odnosu na voćni koncentrat).
    ingredient_physical_form:
      name: Fizički oblik sastojka
      description: Određuje fizički oblik u kojem se mirisni sastojak daje (koristi
        se za obradu, mjerenje i formuliranje).
    ingredient_processing_method:
      name: Metoda obrade sastojaka
      description: Određuje primarnu tehniku obrade primijenjenu na sastojak (primjerice
        liofilizacija, pečenje, fermentacija).
    ink_colors_included:
      name: Uključene boje tinte
      description: Određuje boje tinte uključene u jastučić(e) za pečat u kompletu.
    ink_pad_application_method:
      name: Metoda nanošenja tinte jastučićem
      description: Kako se tinta nanosi/koristi iz jastučića (tradicionalni jastučić
        za pečate vs. jastučić za mazanje vs. jastučić s vrhom kista).
    ink_pad_permanence:
      name: Trajnost jastučića za tintu
      description: Je li otisnuta tinta trajna i/ili arhivska (otpornost na blijeđenje
        i vodu nakon sušenja).
    ink_pad_size:
      name: Veličina jastučića s tintom
      description: Standardizirana veličina/čimbenik oblika površine kutije/podloge
        za tintu.
    ink_pad_special_effects:
      name: Specijalni efekti jastučića s tintom
      description: Posebni vizualni/funkcionalni učinci tinte prigodom otiskivanja
        (primjerice metalik, šljokice).
    ink_permanence:
      name: Trajnost tinte
      description: Označava je li osušena sumi tinta namijenjena kao trajna/arhivska
        ili periva/netrajna.
    ink_preparation_required:
      name: Potrebna je priprema tinte
      description: Označava je li sumi tinta spremna za uporabu ili ju je potrebno
        razrijediti vodom ili mljeti prije uporabe.
    inline_skate_brake_type:
      name: Vrsta kočnice za inline skateboard
      description: Određuje konfiguraciju kočnice uključenu u inline klizaljke, kao
        što je uklonjiva kočnica na peti ili bez kočnice.
    inner_tent_configuration:
      name: Unutarnja konfiguracija šatora
      description: Određuje konfiguraciju ili stil unutarnjeg šatora, na primjer puni
        uložak, mrežasti uložak ili termalna podstava.
    innerspring_coil_type:
      name: Vrsta namotaja unutarnje opruge
      description: Određuje stil konstrukcije sustava unutarnjih opruga unutar madraca,
        što utječe na podršku, izolaciju pokreta i cijenu.
    input_connector_type:
      name: Vrsta ulaznog priključka
      description: Određuje vrstu audio ulaza koji pedala koristi (obično 1/4-inčni
        TS).
    input_valve_type:
      name: Vrsta ulaznog ventila
      description: Označava standard ventila koji se nalazi na zračnici/kotaču bicikla
        na koji se adapter priključuje.
    insecticide_treatment:
      name: Tretman insekticidom
      description: Označava je li mreža tvornički tretirana insekticidom i, ako jest,
        vrstu tretmana koja se koristi za dodatnu zaštitu.
    insert_coverage_area:
      name: Umetni područje pokrivenosti
      description: Određuje koji dio stopala uložak treba pokriti (npr. punu dužinu,
        samo petu).
    insert_length_type:
      name: Vrsta duljine umetka
      description: Označava koliki dio ležišta stopala pokriva podrška luka.
    inside_message_type:
      name: Vrsta unutarnje poruke
      description: Označava sadrži li kartica unaprijed otisnutu poruku s unutarnje
        strane i je li je moguće prilagoditi ju.
    insole_attachment_method:
      name: Način pričvršćivanja uloška
      description: Određuje kako podrška za luk ostaje na mjestu unutar cipele (labavo
        sjedanje, s ljepljivom podlogom, s čičak trakom itd.).
    insole_material:
      name: Materijal uloška
      description: Opisuje materijal uloška ili tabaka na koji se stopalo naslanja,
        što utječe na ublažavanje i podršku.
    installation_fabrication_level:
      name: Razina izrade instalacije
      description: Označava tipičnu količinu prilagođene izrade ili modifikacije potrebne
        za ugradnju kompleta.
    installation_location:
      name: Lokacija instalacije
      description: Određuje tipičnu točku ugradnje osjetnika tlaka ulja u sustavu
        motornog ulja (primjerice otvor za blok uljnog kanala, kućište filtra, sendvič
        ploča ili daljinski nosač voda).
    installation_method:
      name: Način ugradnje
      description: Određuje kako je prostirka ili pločica pričvršćena ili postavljena
        na pod.
    instant_coffee_form:
      name: Oblik instant kave
      description: Opisuje fizički oblik u kojem se instant kava dostavlja, što utječe
        na način pripreme i vijek trajanja.
    instep_coverage:
      name: Pokrivenost gornjeg dijela stopala
      description: Određuje štiti li proizvod samo potkoljenicu ili i potkoljenicu
        i gornji dio članka/stopalo.
    instruction_format:
      name: Format upute
      description: Format uputa priloženih uz komplet.
    instrument_cleaning_swab_form_factor:
      name: Faktor oblika štapića za čišćenje instrumenata
      description: Određuje fizički stil štapića (primjerice provlačiva krpa u odnosu
        na sustav šipke/četke) kako bi odgovarao preferencijama igrača i ograničenjima
        instrumenta.
    instrument_dimensions_unit_context:
      name: Kontekst jedinice dimenzija instrumenta
      description: Pojašnjava na što se odnose navedene mjere visine/širine/duljine
        (npr. ukupni instrument, duljina jedne cijevi, visina stalka).
    instrument_electronics_type:
      name: Vrsta elektronike instrumenta
      description: Označava je li sustav preuzimanja/pretpojačala instrumenta aktivan
        ili pasivan.
    instrument_key:
      name: Tonalitet instrumenta
      description: Određuje oznaku tonaliteta blok-flaute koja se koristi u katalozima
        (obično C ili F za veće blok-flaute).
    instrument_level:
      name: Razina instrumenta
      description: Ciljana razina svirača za ponudu instrumenata.
    instrument_part_mounting_method:
      name: Način montaže dijela instrumenta
      description: Određuje kako se dio pričvršćuje ili instalira (primjerice stezanjem,
        ljepilom ili vijcima).
    instrument_parts_included:
      name: Dijelovi instrumenta uključeni
      description: Navodi glavne komponente/dijelove uključene u kutiju za A-klarinet.
    instrument_playing_technique:
      name: Tehnika sviranja instrumenta
      description: Kako se instrument obično svira/aktivira (npr. trese, udara, kucka).
    instrument_size_class:
      name: Klasa veličine instrumenta
      description: Opća veličina instrumenta izražena je kao kupac-prijazna klasa,
        a ne kao točna dimenzija.
    insulation_fill_material:
      name: Materijal toplinske izolacije
      description: Označava primarni materijal koji se koristi za izolaciju jakne
        ili prsluka.
    integrated_bottom_type:
      name: Integrirani donji tip
      description: Označava uključuje li odjevni predmet ugrađene gaćice, kratke hlače,
        triko ili slične donje slojeve za pokrivanje tijekom kretanja.
    integrated_charging_options:
      name: Integrirane opcije punjenja
      description: Navodi ugrađene priključke za napajanje ili punjenje raspoložive
        na noćnom ormariću.
    integrated_furniture_function:
      name: Funkcija integriranog namještaja
      description: Označava dodatne ugrađene elemente namještaja uključene u zidni
        krevet ili okvir (npr. radni stol, sofa, police).
    integrated_locking:
      name: Integrirano zaključavanje
      description: Uključuje li stalak integriranu bravu za spajanje stalaka na vozilo
        i/ili bicikla na stalak.
    integrated_power_options:
      name: Integrirane opcije napajanja
      description: Označava vrstu ugrađenog napajanja ili značajki punjenja koje nudi
        kuhinjski element.
    integrated_storage_features:
      name: Integrirane značajke pohrane
      description: Označava dodatne značajke pohrane ili pribora koje stalak za biljarski
        štap uključuje, izvan utora za štapove.
    integrated_tool_functions:
      name: Integrirane značajke alata
      description: Dodatne značajke alata integrirane u polugu (primjerice kuka za
        žbice, alat za skidanje jezgre ventila, kapaljka za perle).
    intended_board_type:
      name: Namijenjena vrsta ploče
      description: Određuje stil kiteboarda za koji je peraja dizajnirana (primjerice
        twin tip, usmjerena za surfanje, hidrokrilo).
    intended_consumption:
      name: Namijenjena potrošnja
      description: Određuje kako se proizvod namjerava konzumirati, navodeći je li
        siguran za jelo sirov, zahtijeva li pečenje ili je djelomično pečen.
    intended_craft:
      name: Namjenske rukotvorine
      description: Primarni kontekst rukotvorine za koji je vodič za pređu namijenjen.
    intended_culinary_use:
      name: Namijenjena kulinarska uporaba
      description: Označava primarnu kulinarsku primjenu umaka, kao što je umakanje,
        kuhanje ili glaziranje.
    intended_handlebar_style:
      name: Namijenjeni stil upravljača
      description: Opisuje namijenjenu šipku ili stil uporabe upravljača (npr. ravna
        šipka, zakrivljena šipka, aerodinamička). Ovo brzo sužava kompatibilnost bez
        prisiljavanja dodatnih podkategorija.
    intended_player_role:
      name: Predviđena uloga igrača
      description: Određuje ulogu na terenu za koju je pokrivalo za glavu namijenjeno
        (npr. hvatač, sudac).
    intended_playing_surface:
      name: Namijenjena površina za igru
      description: Površina za koju su pak, lopta ili obruč namijenjeni, kao što su
        led, asfalt, podovi dvorane ili sintetički led.
    intended_repair_location:
      name: Predviđena lokacija popravka
      description: Gdje se na gumi komplet namjerava popravljati.
    intended_seating_position:
      name: Predviđeni položaj sjedenja
      description: Određuje položaj sjedenja u vozilu na koji se sigurnosni pojas
        namjerava ugraditi ili koristiti.
    intended_sewing_application:
      name: Namijenjena aplikacija za šivanje
      description: Namijenjena aplikacija za šivanje za koju je niz poruke namijenjen
        (primjerice višenamjensko šivanje odjeće, prošivanje, tapeciranje).
    intended_technique:
      name: Namijenjena tehnika
      description: Primarna tehnika filcanja za koju je podloga/prostirka namijenjena.
    intended_use:
      name: Namijenjena uporaba
      description: Primarni kontekst uporabe instrumenta.
    intended_use_fleece_fabric:
      name: Namijenjena upotreba (flis tkanina)
      description: Primarni projekt/aplikacija za tržište je flis tkanine.
    intended_user:
      name: Namijenjeni korisnik
      description: Označava za koga je namijenjena zaštitna oprema zrakoplova.
    intended_yarn_form:
      name: Namijenjeni oblik pređe
      description: Određuje prezentaciju pređe koju najbolje podržava posuda za pređu.
    interaction_mode:
      name: Način interakcije
      description: Primarna metoda interakcije koja se koristi za pokretanje zvukova
        ili aktivnosti.
    interactive_effects:
      name: Interaktivni efekti
      description: Označava interaktivne elektroničke ili mehaničke efekte uključene
        u kuhinjski komplet za igru.
    interfacing_application_area:
      name: Područje sučelja za aplikacije
      description: Identificira uobičajena područja šivanja/rukotvorina koja sučelje
        treba podržati.
    interfacing_color_family:
      name: Obitelj boja za povezivanje
      description: Označava tipičnu međupodstavnu boju koja se koristi za uporabu
        ispod svijetlih ili tamnih tkanina.
    interfacing_selling_format:
      name: Format prodaje putem sučelja
      description: Opisuje format prodaje međuspoja (primjerice, kontinuirani rez
        koji se prodaje po duljini, unaprijed izrezani komadi, role ili uzorci).
    interfacing_stiffness_level:
      name: Razina krutosti međupovršine
      description: Opisuje stupanj krutosti/čvrstoće koji pruža međupovršina.
    interior_padding_type:
      name: Vrsta unutarnjeg podstavljanja
      description: Tip unutarnjeg razmaka u podnožju ili sustav umetaka koji se koristi
        unutar kutije za zaštitu i organiziranje sadržaja.
    interior_stall_configuration:
      name: Konfiguracija unutarnjeg prostora
      description: Određuje unutarnji izgled/konfiguraciju za prijevoz životinja (orijentacija
        štale i stil odjeljka).
    invitation_printing_coverage:
      name: Pokrivenost tiskom pozivnica
      description: Koja je strana/e pozivnice tiskana (samo prednja u odnosu na dvostranu).
    iodization:
      name: Jodizacija
      description: Označava je li i u kojoj mjeri jod dodan soli.
    iridescence_level:
      name: Razina iridescencije
      description: Opisuje intenzitet prirodnog/tretiranog iridescentnog sjaja tipičnog
        za paunovo perje.
    irish_warpipe_set_configuration:
      name: Konfiguracija kompleta velike irske gajde
      description: Označava koja se konfiguracija prodaje (cijeli instrument vs. dijelovi/djelomični
        set) posebno za irske vojne gajde.
    iron_on_applique_application_method:
      name: Metoda aplikacije glačanjem
      description: Određuje kako se aplikacija za glačanje namjerava primijeniti na
        supstrat.
    ironing_center_features:
      name: Značajke centra za glačanje
      description: Navodi specijalizirane značajke centara za glačanje koje poboljšavaju
        uporabljivost i praktičnost.
    jacket_breast_style:
      name: Stil prsa jakne
      description: Određuje je li sako jednostruko ili dvostruko kopčanje.
    jacket_vent_style:
      name: Stil ventilacije jakne
      description: Označava vrstu otvora (proreza) na stražnjoj strani sakoa.
    jam_and_jelly_consistency:
      name: Konzistencija džema i želea
      description: Opisuje teksturu namaza, ukazujući na prisutnost komadića voća
        ili sjemenki.
    jaw_shape:
      name: Oblik čeljusti
      description: Geometrija čeljusti ili vrha (npr. ravna, savijena, s dugim nosom)
        što utječe na preciznost i doseg.
    jerky_form:
      name: Trzavi oblik
      description: Opisuje fizički oblik ili rez sušenog mesa (primjerice trakice,
        štapići, zalogaji).
    jersey_style:
      name: Stil dresa
      description: Određuje oblik dresa ili stil nošenja za navijačke dresove.
    jew_harp_accessories_included:
      name: Uključeni dodaci za židovsku harfu
      description: Popisi su uključivali stavku u paketu s židovskom harfom (primjerice
        kutija, vrećica, upute).
    jew_s_harp_frame_style:
      name: Stil okvira židovske harfe
      description: Opisuje stil konstrukcije okvira/tijela židovske harfe, koji Influence
        osjećaj, izdržljivost i ergonomiju sviranja.
    jew_s_harp_tongue_profile:
      name: Profil jezika židovske harfe
      description: Opisuje profil/geometriju jezička (jezička) jevrejske harfe, što
        utječe na odziv i boju zvuka.
    jewelry_pieces_included:
      name: Uključeni komadi nakita
      description: Navodi specifične komade nakita uključene u set kako bi kupci točno
        znali koje komade kupuju.
    jigsaw_puzzle_piece_shape:
      name: Oblik dijela slagalice
      description: Opći stil reza/oblika komada i profil ruba.
    jockstrap_design_features:
      name: Značajke dizajna jockstrapa
      description: Obuhvaća posebne dizajnerske elemente jedinstvene za suspenzor
        koji utječu na značajke ili estetiku.
    juggling_club_construction_type:
      name: Vrsta konstrukcije žonglerskog čunja
      description: Određuje ukupnu vrstu konstrukcije žonglerske palice (primjerice
        jednodijelna lijevana u odnosu na sastavljenu višedijelnu), što može utjecati
        na trajnost, osjećaj i održavanje.
    juggling_club_core_material:
      name: Materijal za jezgru žonglerskog čunja
      description: Primarni materijal jezgre koji se koristi unutar palice (razlikuje
        se od vanjskog omota/trake).
    juggling_prop_set_size:
      name: Veličina kompleta rekvizita za žongliranje
      description: Broj glavnih rekvizita uključenih u set (primjerice set od 3 kugle,
        par poi-ja).
    juggling_ring_edge_style:
      name: Stil ruba žongliranja prstenom
      description: Profil ruba prstena koji utječe na udobnost i hvatanje.
    juice_form:
      name: Oblik soka
      description: Određuje fizički oblik ili fazu obrade proizvoda (primjerice tekućina
        jedne jačine, koncentrat, prah).
    juice_processing_method:
      name: Metoda obrade soka
      description: Određuje primarnu tehniku obrade primijenjenu na sok ili napitak,
        što utječe na okus, hranjivo zadržavanje kupaca i životni vijek polica.
    jump_rope_style:
      name: Stil užeta za preskakanje
      description: Klasificira stil konstrukcije užeta/kable (npr. perlasto, platneno,
        brzinsko uže), što snažno utječe na namjeravanu upotrebu i učinkovitost.
    kale_variety:
      name: Sorta kelja
      description: Identificira specifičan kultivar ili sortu kelja (npr. kovrčavi,
        lacinato/dinosaur, crveni ruski). To pomaže kupcu da odabere na temelju okusa,
        teksture i kulinarske upotrebe.
    kaleidoscope_viewing_type:
      name: Vrsta gledanja u kaleidoskop
      description: Označava format gledanja ili način rada kaleidoskopa (primjerice
        klasični okular, teleidoskop s lećom, pogon kotačićem, projekcija).
    kayak_construction_type:
      name: Vrsta konstrukcije kajaka
      description: Određuje primarni stil konstrukcije kajaka, kao što je tvrda školjka
        ili napuhavanje.
    kayak_design_type:
      name: Vrsta dizajna kajaka
      description: Klasificira primarnu namjeru dizajna kajaka (npr. skije za surfanje,
        čamac za igru, touring).
    kayak_hull_design:
      name: Dizajn trupa kajaka
      description: Identificira primarne oblike trupa što utječe na karakteristike
        trupa kao što su stabilnost i upravljivost u uvjetima valova.
    kayak_storage_bag_type:
      name: Vrsta torbe za skladištenje kajaka
      description: Označava stil ili format torbe za pohranu kajaka, kao što je suha
        torba ili torba za veslo.
    kayak_style:
      name: Kajakaški stil
      description: Određuje primarni dizajn ili stil upotrebe kajaka (primjerice rekreacijski,
        turistički, na napuhavanje).
    keel_type:
      name: Vrsta kobilice
      description: Identificira konfiguraciju kobilice jedrilice.
    kettlebell_style:
      name: Stil s girjama
      description: Identificira konstrukciju ili stilske varijante girje (primjerice
        natjecateljske, podesive, mekane), pomažući kupcu da odabere pravo zvono za
        svoje potrebe treninga.
    key_attachment_mechanism:
      name: Mehanizam za pričvršćivanje ključa
      description: Određuje opremu koja se koristi za pričvršćivanje ključeva unutar
        kutije, kao što su prstenovi, kopče ili vijci.
    key_retention_when_unlocked:
      name: Zadržavanje ključa kada je otključano
      description: Označava može li se ključ izvaditi iz brave kada je u otključanom
        položaju.
    keyboard_amplifier_inputs:
      name: Ulazi za pojačalo tipkovnice
      description: Navodi ulazne veze koje podržava pojačalo tipkovnice (primjerice
        1/4 ulaz TRS, MIDI ulaz, Bluetooth).
    keyboard_amplifier_output_types:
      name: Vrste izlaza pojačala za klavijaturu
      description: Određuje vrste primarnih izlaznih mehanizama sinhronizacije koje
        podržava pojačalo tipkovnice za usmjeravanje zvuka na druge sustave.
    keyboard_case_handle_type:
      name: Vrsta ručke za kućište tipkovnice
      description: Primarni sustav korisničkog imena koji se koristi za pomicanje/nošenje
        kutije tipkovnice (pored remena).
    keyboard_case_interior_padding_type:
      name: Keyboard kutija unutrašnjost razmak u podnožju type
      description: Primarni pristup unutarnjem amortizaciji/oblozi korišten unutar
        tvrde kutije.
    keyboard_case_protection_level:
      name: Razina zaštite tipkovnice kutija
      description: Cjelokupna klasa zaštite/krutoće tvrde kutije, koja razlikuje lijevanu
        kutiju s tvrdom školjkom od teške kutije i povezane pristojbe letenja/ATA-style
        kutije.
    keyboard_case_wheel_type:
      name: Vrsta kotačića kućišta tipkovnice
      description: Konfiguracija kotača za tvrdu kutiju koja uključuje kotače.
    keyboard_pedal_connector_type:
      name: Vrsta konektora pedale tipkovnice
      description: Određuje mehanizam sinhronizacije/vrstu utikača koji se koristi
        za spajanje sustain pedale na klavijaturu ili digitalni klavir.
    keyboard_power_supply_type:
      name: Supply napajanja tipkovnice
      description: Primarni način napajanja tipkovnice (baterija, AC adapter, USB
        napajanje).
    keyboard_stand_tier_type:
      name: Vrsta stalka za klavijaturu
      description: Označava prodaje li se stalak samo kao osnovni stalak ili uključuje/dodaje
        dodatak druge razine.
    keyboard_stand_tiers:
      name: Tiersi stalak za tipkovnicu
      description: Broj slojeva za igru koje podržava stalak u obliku slova Z (primjerice
        jednoslojni ili dvoslojni).
    keychain_attachment_type:
      name: Vrsta pričvršćivanja privjeska za ključeve
      description: Određuje primarni pričvrsni uređaj koji se koristi za pričvršćivanje
        privjeska za ključeve, torbe ili remene.
    keychain_style:
      name: Stil privjeska za ključeve
      description: Opisuje ukupni oblik privjeska za ključeve (što je on fizički).
    keywork_finish:
      name: Završna obrada ključeva
      description: Opisuje završnu obradu/prevlaku posebno na mehanizmu tipki, odvojeno
        od završne obrade tijela.
    kick_point:
      name: Točka udarca
      description: Određuje lokaciju fleksibilne točke udarca na osovini hokejaške
        palice, što utječe na brzinu i osjećaj ispucavanja šuta.
    kick_zone_grip_system:
      name: Sustav hvatanja u zoni udarca
      description: Označava tehnologiju korištenu u zoni udarca skije za bolje prianjanje.
    kickboard_features:
      name: Značajke daske za kickboard
      description: Highlight posebne karakteristike daske za udaranje koje poboljšavaju
        trening ili udobnost, uključujući teksturu površine i mogućnosti hvatanja.
    kickboard_handle_style:
      name: Stil upravljača na romobilu
      description: Označava ima li i kako romobil rukohvate ili površinske obrade
        koje utječu na upravljanje i udobnost.
    kickstand_mounting_position:
      name: Položaj za montažu oslonca
      description: Označava mjesto na okvir bicikla gdje se pričvršćuje nožica (primjerice
        središnji nosač, nosač lančane vilice, nosač stražnje osovine).
    kickstand_type:
      name: Vrsta postolja
      description: Opisuje strukturni stil ili mehanizam postolja (primjerice bočno
        postolje s jednom nogom, središnje postolje s dvije noge, teleskopsko).
    kidney_belt_support_level:
      name: Razina podrške za bubrežni pojas
      description: proizvođač - označena ukupna razina podrške koju osigurava pojas
        za bubrege za stabilizaciju donjeg dijela leđa i trbuha.
    kiln_firing_atmosphere:
      name: Atmosfera pečenja u peći
      description: Određuje atmosferu(e) pečenja koju peć može podržati tijekom rada
        (primjerice oksidacija ili redukcija).
    kiln_heating_element_type:
      name: Vrsta grijaćeg elementa peći
      description: Vrsta/materijal grijaćih elemenata koji se koriste u peći.
    kingpin_design:
      name: Dizajn kraljevskog klina
      description: Opisuje stil konstrukcije samog kingpin hardvera, što utječe na
        težinu i zazor brušenja.
    kingpin_orientation:
      name: Orijentacija glavnog klina
      description: Identificira orijentaciju glavnog klina kamiona, što utječe na
        karakteristike vožnje i kompatibilnost s platformom.
    kit_components_included:
      name: Uključene komponente kompleta
      description: Navodi pojedinačne hardverske dijelove date u kompletu (primjerice
        klinovi za tlo, vijci, trake, alat za montažu) kako bi kupci točno znali što
        kupuju.
    kit_format:
      name: Format kompleta
      description: Određuje kako je komplet pakiran i nošen (primjerice torbica, kutija,
        kutija).
    kit_items_included:
      name: Uključene stavke kompleta
      description: Navodi glavnu opremu i dodatke uključene u komplet za izradu vina
        kako bi kupac mogao razlikovati Shopify Starter komplet od nadopuna samo sastojcima.
    kit_pouch_case_type:
      name: Vrsta torbice/kutije kompleta
      description: Određuje vrstu uključenog rješenja za pohranu za kompletnu njegu
        (ako postoji).
    kit_tools_included:
      name: Alati uključeni u komplet
      description: Navodi glavne alate navedene u kompletu (ako ih ima) za dovršetak
        projekta.
    kite_inflation_system:
      name: Sustav za napuhavanje zmajeva
      description: Označava kako su napuhani prednji rub i podupirači zmaja.
    kite_line_configuration:
      name: Konfiguracija uzice zmaja
      description: Označava broj letećih/kontrolnih linija koje je zmajsko jedro dizajnirano
        koristiti, uobičajena specifikacija za ispravno uparivanje prečki i linija.
    kite_type:
      name: Vrsta zmaja
      description: Definira kategoriju strukturnog dizajna zmaja (oblik i stil uzice).
    kiteboard_bag_style:
      name: Stil torbe za kiteboard
      description: Specifičan stil ili podtip kutije za kajt dasku (npr. torba za
        ploču, torba za golf, putna torba, folijska torba).
    kiwifruit_variety:
      name: Sorta kivija
      description: Identificira specifičnu sortu ili boju kivija (zelena, zlatna,
        crvena itd.).
    knee_pad_pocket_type:
      name: Tip džepa za štitnike za koljena
      description: Označava odgovara li odjeća zaštitnim štitnicima za koljena i kako.
    knee_pad_style:
      name: Stil štitnika za koljeno
      description: Opisuje stil konstrukcije ili oblik zaštite za koljeno (primjerice
        rukav, narukvica, štitnik).
    knee_protection_design:
      name: Dizajn zaštite za koljena
      description: Označava broj zglobnih dijelova za koljena ugrađenih u štitnik
        za noge.
    kneeboard_construction:
      name: Konstrukcija klemborda
      description: Označava primarnu tehniku izrade ili kompozitnu konstrukciju ploče
        (primjerice roto-lijevana plastika, sažimanje lijevano, karbonska vlakna).
    kneeboard_strap_type:
      name: Vrsta remena za koljena
      description: Opisuje stil sustava remena za koljena koji se koristi za pričvršćivanje
        vozača na dasku.
    knife_lock_mechanism:
      name: Mehanizam zaključavanja noža
      description: Označava mehanizam koji se koristi za osiguranje oštrice sklopivog
        noža u otvorenom položaju ili označava dizajn bez zaključavanja.
    knife_locking_mechanism:
      name: Mehanizam zaključavanja noža
      description: Određuje vrstu mehanizma koji osigurava oštricu u otvorenom položaju,
        izravno definirajući sigurnost, čvrstoću i jednostavnost korištenja noževa
        sa bravicom.
    knife_opening_mechanism:
      name: Mehanizam otvaranja noža
      description: Opisuje kako se oštrica izvlači iz ručke, gdje se razlikuju ručni,
        potpomognuti, automatski i specijalni stilovi otvaranja.
    knife_system:
      name: Sustav noža
      description: Radi li i kako nož za rezanje na overlocku.
    knit_elastic_application:
      name: Pletena elastična aplikacija
      description: Određuje namjeravanu uporabu pletenog elastičnog obruba za šivanje/obradu.
    knit_pattern:
      name: Uzorak pletenja
      description: Identificira primarni pleteni bod ili teksturu korištenu u tkanini
        kardigana, kao što su pletenica, rebrasti uzorak ili vafl, što omogućuje kupcima
        da pronađu specifične teksture i toplinska svojstva.
    knit_style:
      name: Pleteni stil
      description: Određuje primarnu konstrukciju pletenja, teksturu ili dekorativni
        uzorak na tkanini džempera.
    knitting_marker_counter_type:
      name: Vrsta markera/brojača za pletenje
      description: Određuje funkcionalnu vrstu proizvoda unutar markera i brojača
        za pletenje.
    knitting_needle_tip_style:
      name: Stil vrha igle za pletenje
      description: Oštrina vrha /Shapes optimizirani za različite pređe i tehnike.
    knock_sensor_technology:
      name: Tehnologija senzora detonacije
      description: Tehnologija senzora korištena u senzoru detonacija.
    knurl_aggressiveness:
      name: Agresivnost nazubljenja
      description: Opisuje oštrinu ili teksturu uzorka nazubljenosti na osovini vodilice,
        što utječe udobnost i sigurnost hvata.
    knurl_marking_standard:
      name: Standard označavanja nazubljenjem
      description: Određuje položaj prstenova s referentnim nazubljenjem koji se koriste
        za postavljanje ruke (primjerice oznake IPF ili IWF).
    kohlrabi_variety:
      name: Sorta koraba
      description: Određuje kultivar ili tržište lukovice kelerabe, omogućujući korisnicima
        da biraju između različitih profila okusa, veličine i boja.
    koji_mold_type:
      name: Vrsta Kojijevog kalupa
      description: Označava vrstu ili soj koji plijesni koji se koristi tijekom fermentacije,
        što utječe na aromu i okus.
    kumquat_variety:
      name: Sorta kumkvata
      description: Identificira ponuđeni kultivar ili sortu kumkvata, što omogućuje
        kupcu odabir voća na temelju profila okusa, veličine ili kulinarske primjene.
    label_edge_type:
      name: Vrsta ruba oznake
      description: Određuje stil završne obrade ruba koji se koristi kako bi spriječio
        habanje i definirao estetiku.
    label_finish:
      name: Završetak etikete
      description: Određuje površinsku završnu obradu, teksturu ili zaštitni premaz/tretman
        primijenjen na etiketu.
    label_finish_edge_style:
      name: Stil završne obrade/ruba oznake
      description: Način obrade rubova, što utječe na udobnost i trajnost (primjerice
        tkani rub u odnosu na laserski rezan).
    label_fold_type:
      name: Vrsta preklapanja etikete
      description: Određuje kako je ušivna etiketa konstruirana za ušivanje u stavku
        (primjerice krajnji pregib u odnosu na središnji pregib), što utječe na način
        na koji se primjenjuje i gdje se nalazi.
    label_text_type:
      name: Vrsta teksta oznake
      description: Označava je li oznaka prazna, unaprijed otisnuta ili je namijenjena
        personalizaciji/prilagođavanju.
    lace_area_size:
      name: Veličina područja vezice
      description: Definira veličinu ili konfiguraciju dijela čipke (primjerice zatvaranje
        4×4, 13×6 frontalno), što određuje raspoloživi prostor za razdvajanje.
    lace_tightener_style:
      name: Stil zatezala vezica
      description: Označava mehanički dizajn ili oblik uređaja za zatezanje vezica.
    lace_type:
      name: Vrsta vezice
      description: Opisuje materijal čipke ili završnu obradu na liniji kose/kapi,
        što utječe na realizam i usklađenost s tonom kože.
    lacrosse_ball_certification:
      name: Certifikat za lacrosse loptu
      description: Određuje odobrenje upravnog tijela za sport ili standarde koje
        lacrosse lopta zadovoljava.
    lacrosse_goal_regulation_certification:
      name: Certifikat o regulaciji golova u lacrosseu
      description: Označava zadovoljava li gol ili mreža za lacrosse specifikacije
        određenog nadležnog tijela (primjerice NCAA ili NFHS).
    lacrosse_pocket_type:
      name: Tip džepa za lacrosse
      description: Identificira opći stil džepa ili mrežastog udubljenja u glavi,
        utječe na kontrolu i otpuštanje lopte.
    lacrosse_string_type:
      name: Vrsta Lacrosse strune
      description: Klasificira točan oblik ili namjeravanu upotrebu predmeta u vidu
        strune ili mreže kako bi kupci mogli razlikovati dijelove mreže, komplet i
        specifičnu ulogu strune unutar džepa.
    ladder_position:
      name: Položaj ljestava
      description: Označava gdje se na potkrovlju kreveta za malu djecu nalaze ljestve
        ili pristup stepenicama.
    lanyard_attachment_hardware:
      name: Hardver za pričvršćivanje uzice
      description: Označava vrstu hardvera na kraju uzice koja se spaja na ključeve,
        značke, telefone ili drugi pribor.
    lanyard_style:
      name: Stil vezice
      description: Određuje kako se uzica nosi ili prenosi.
    lanyard_type:
      name: Vrsta uzice
      description: Opisuje stil uzice koja se isporučuje sa zviždaljkom ili je kompatibilna
        s njom.
    lap_hand_loom_accessories_included:
      name: Uključen pribor za ručni tkalački stroj
      description: Pribor uključen u paket tkalačkog stana za krilo.
    lapel_style:
      name: Stil revera
      description: Određuje dizajn revera sakoa (primjerice zarez, šiljak, šal).
    laser_safety_class:
      name: Klasa laserske sigurnosti
      description: Klasifikacija laserske sigurnosti proizvoda (npr. klasa 2, 3R,
        3B, 4) kako je navedeno u dokumentaciji/oznaci uređaja.
    latex_processing_method:
      name: Metoda obrade lateksa
      description: Određuje proizvodni proces koji se koristi za proizvodnju lateks
        pjene - obično Dunlop ili Talalay - što utječe na osjećaj, odziv i cijenu.
    latex_type:
      name: Vrsta lateksa
      description: Označava podrijetlo i sastav lateksa korištenog u madracu (prirodni,
        organski, sintetički ili miješani), informirajući kupce o trajnosti, ekološkoj
        prihvatljivosti i potencijalnim alergenima.
    launch_profile:
      name: Launch profil
      description: Označava tipičnu putanju Launch (niska, ID br. trgovca, visoka)
        koju je osovina golf palice dizajnirana da proizvede.
    launcher_mounting_configuration:
      name: Konfiguracija montaže lansera
      description: Označava kako je bacač montiran ili konfiguriran za uporabu, pomažući
        kupcima kojima su potrebne samostojeće, ispodcijevne ili opcije montirane
        na šinu.
    layer_construction:
      name: Konstrukcija slojeva
      description: Određuje konstrukciju laminata tkanine (primjerice dvoslojna, dvoslojna,
        troslojna, troslojna) koja utječe na težinu, pakiranje i trajnost.
    layer_design:
      name: Dizajn slojeva
      description: Opisuje konstrukciju mrežice za kosu u smislu slojeva ili reverzibilnosti.
    lazy_kate_tension_control_type:
      name: Vrsta kontrole napetosti Lazy Kate
      description: Kako lijena kate primjenjuje otpor/napetost na špulice tijekom
        namotavanja ili savijanja.
    lead_hardware_type:
      name: Vrsta hardvera za elektrode
      description: Definira stil pričvršćivanja ili zatvarača na kraju potencijalnog
        kupca (kopča, omča, lanac itd.), utječe na jednostavnost korištenja, sigurnost
        i prikladnost discipline.
    leaf_gelatin_grade:
      name: Ocjena želatina u listovima
      description: Određuje standardizirani stupanj čvrstoće koji se koristi za želatinske
        listove.
    leaf_preparation:
      name: Priprema lista
      description: Opisuje kako se listovi pripremaju prije pakiranja, kao što su
        sjeckani, usitnjeni ili narezani na trakice.
    leaf_spring_material:
      name: Materijal lisnate opruge
      description: Primarni konstrukcijski materijal pakiranja lisnate opruge.
    leak_protection_layer:
      name: Sloj zaštite od curenja
      description: Označava koristi li ugrađeni sustav pelena za plivanje jednoslojni
        ili dvoslojni dizajn za zaštitu od propuštanja.
    leash_clip_type:
      name: Vrsta kopče za povodac
      description: Određuje vrstu kopče ili hardvera koji se koristi za pričvršćivanje
        povodca na ogrlicu ili pojas (primjerice kopča s vijkom, karabiner, okretna
        kopča).
    leash_style:
      name: Stil uzice
      description: Opisuje konfiguraciju užeta ili način namotavanja povodca.
    leash_type:
      name: Vrsta povodca
      description: Klasificira cjelokupni stil ili namjensku konfiguraciju uzice za
        brzo filtriranje prema namjeni.
    leavening_action_type:
      name: Vrsta djelovanja kvasca
      description: Identificira kemijsku formulaciju ili način narastanja praška za
        pecivo (npr. jednostruko djelovanje, dvostruko djelovanje, bez aluminija).
        To izravno utječe na učinkovitost pečenja i prikladnost recepta.
    leavening_agent:
      name: Sredstvo za dizanje tijesta
      description: Određuje primarni mehanizam dizanja tijesta koji se koristi u tijestu.
    led_color_options:
      name: Opcije boja LED dioda
      description: Navodi dostupne boje LED Colors na alarmu za vizualnu indikaciju
        ugriza.
    led_indicator_color:
      name: LED indikator boja
      description: Identificira boju LED indikatora proizvoda, pomažući ribolovcima
        da usklade više alarma ili prilagode osobnim preferencijama.
    led_light_color:
      name: LED svjetlo boja
      description: Određuje boju bilo koje integrirane LED rasvjete.
    leek_variety:
      name: Sorta poriluka
      description: Označava kultivar ili sortu poriluka, što omogućuje razlikovanje
        prema okusu, veličini i vegetacijskom razdoblju.
    leg_coverage:
      name: Pokrivenost nogu
      description: Određuje koliki dio noge pokriva ronilačko odijelo (primjerice
        kratko, puna dužina).
    leg_cuff_style:
      name: Stil manžete za noge
      description: Određuje stil završne obrade na otvoru gležnja hlača.
    leg_cut_height:
      name: Visina reza nogu
      description: Označava koliko je visoko izrezan otvor za noge na donjem dijelu
        bikinija.
    leg_cut_style:
      name: Stil kroja nogavica
      description: Opisuje Shapes otvora za noge, koji utječu na izgled, udobnost
        i linije preplanulosti.
    leg_length:
      name: Duljina nogu
      description: Kategorizira debla prema relativnoj duljini nogu (kratka, ID trgovca,
        duga) kako bi kupci mogli odabrati željenu pokrivenost bez dijeljenja kategorije.
    leg_loop_type:
      name: Vrsta petlje za nogu
      description: Opisuje dizajn petlji za noge.
    leg_opening_style:
      name: Stil otvora za nogavice
      description: Određuje kako su otvori za nogavice na donjoj trenirci završeni,
        kao što su elastične manžete, rubovi sa patent zatvaračem ili otvoreni rubovi.
    leg_style:
      name: Stil nogavica
      description: Definira stil dizajna ili konstrukcije nogu ili baze klupe.
    legging_foot_design:
      name: Dizajn stopala s nogavicama
      description: Određuje jesu li tajice bez stopala, sa stopalom ili se mogu pretvoriti
        između oba stila.
    leggings_waistband_style:
      name: Stil pojasa tajica
      description: Određuje strukturni dizajn pojasa tajica, što utječe udobnost,
        podršku i estetiku.
    lei_closure_style:
      name: Stil zatvaranja lei
      description: Opisuje je li lei neprekidna petlja ili ima otvorene krajeve koji
        se vežu ili pričvršćuju vrpcom.
    lemon_variety:
      name: Sorta limuna
      description: Identificira specifičnu sortu ili kultivar limuna (npr. Eureka,
        Meyer, Amalfi).
    length_adjustment_method:
      name: Metoda podešavanja duljine
      description: Označava može li se i kako duljina užeta za preskakanje prilagoditi
        korisniku.
    lens_color_tint:
      name: Boja/nijansa leće
      description: Boja ili nijansa zaštitnih naočala koje su dostavljene s proizvodom.
    lens_construction:
      name: Konstrukcija leće
      description: Određuje strukturnu izradu leće (npr. jednoslojna, dvoslojna termalna)
        kako bi se naznačila otpornost na zamagljivanje i optička učinkovitost.
    lens_tint_category:
      name: Kategorija nijanse leće
      description: Klasificira zatamnjenost leća na temelju međunarodnih kategorija
        nijansi, pomažući korisnicima da odaberu leće prikladne za različite svjetlosne
        uvjete.
    lettuce_variety:
      name: Sorta salate
      description: Identificira specifičnu hortikulturnu sortu salate (primjerice
        ledenka, rimska, muškatna), omogućujući precizno filtriranje i usporedbu.
    level_of_play:
      name: Razina igre
      description: Razina učinkovitosti koju je naveo proizvođač i koja je usuglašena
        s konkurentnošću igrača i budžetom.
    lever_configuration:
      name: Konfiguracija poluge
      description: Označava konfiguraciju poluge/upravljača kontrole motora plovila
        (npr. jedna poluga u odnosu na dvostruku polugu).
    lever_type:
      name: Vrsta poluge
      description: Vrsta/mehanizam poluga za promjenu visine tona ugrađenih na strune
        harfe.
    license_plate_cover_style:
      name: Stil okvira registarske tablice
      description: Određuje stil izrade okvira registarske tablice (npr. puni okvir
        u odnosu na navojne poklopce).
    license_plate_personalization_type:
      name: Vrsta personalizacije registarske pločice
      description: Određuje je li registarska tablica prazna, unaprijed tiskana ili
        podržava li prilagodbe koje osigurava kupac (tekst i/ili slika).
    license_usage_terms:
      name: Uvjeti licence/korištenja
      description: Prava korištenja uzorka (primjerice samo za osobnu uporabu u odnosu
        na ograničeno komercijalnu).
    licensed_sports_property:
      name: Licencirani sportski proizvod
      description: Označava je li proizvod službeno licenciran od strane lige/tima/organizacije.
    lid_hinge_mechanism:
      name: Mehanizam šarke poklopca
      description: Određuje mehanizam šarki koji se koristi za poklopac, što utječe
        na sigurnost i jednostavnost korištenja.
    lid_support_positions:
      name: Pozicije podrške poklopca
      description: Određuje podržane položaje palice poklopca za veliki klavir (koliko
        se poklopac može otvoriti).
    lie_angle_color_code:
      name: Kod za boja kuta Lie
      description: Označava proizvođačev sustav kuta ležanja s boja kodom koji se
        koristi na nekim palicama (primjerice crna točka, zelena točka).
    life_jacket_certification_standard:
      name: Standard certificiranja prsluka za spašavanje
      description: Službena sigurnosna klasifikacija ili standard koji proizvod zadovoljava,
        kao što su USCG tip ili ISO/AS razine.
    life_raft_certification_standard:
      name: Standard certificiranja splavi za spašavanje
      description: Sigurnosni standard/certifikat koji splav mora ispuniti.
    life_raft_container_type:
      name: Splav za spašavanje tipa spremnik
      description: Kako je splav za spašavanje pakirana za skladištenje i raspoređivanje.
    life_vest_approval_standard:
      name: Standard odobrenja prsluka za spašavanje
      description: Označava standard certifikacije/odobrenja kojem je prsluk za spašavanje
        sukladan.
    life_vest_intended_user:
      name: Namijenjeni korisnik prsluka za spašavanje
      description: Označava predviđenu kategoriju korisnika za prikladnost i opskrbu.
    lifebuoy_approval_standard:
      name: Standardno odobrenje za pojas za spašavanje
      description: Sigurnosno odobrenje ili standard sa kojim je pojas za spašavanje
        usuglašen (npr. USCG/SOLAS).
    lifebuoy_features:
      name: Značajke pojasa za spašavanje
      description: Funkcionalna sigurnost, montaža/obrada i uključene dodatne značajke
        za kolute za spašavanje.
    lift_mechanism_type:
      name: Vrsta mehanizma podizanja
      description: Određuje mehanizam koji pomaže u podizanju/spuštanju ili otvaranju/zatvaranju
        zidnog kreveta.
    lift_stand_support_point:
      name: Točka podrške za podizanje/stajanje
      description: Gdje dizalica/stalak dodiruje/podržava vozilo.
    lifting_gas_type:
      name: Vrsta plina za podizanje
      description: Određuje primarni plin za podizanje ili medij za uzgon koji koristi
        zračni brod.
    lifting_support_type:
      name: Tip podrške za podizanje
      description: Označava vozi li se dizalo preko staza ili se dizalo preko krakova/pločica
        koje dodiruju okvir/točke podizanja.
    ligature_and_cap_component_type:
      name: Vrsta komponente ligature i kape
      description: Označava je li proizvod ligatura, kapa ili set koji uključuje oboje.
    ligature_material:
      name: Materijal ligature
      description: Primarni materijal tijela ligature koji dodiruje i učvršćuje jezičak
        ( metal, koža, tkanina).
    ligature_plating_or_finish:
      name: Prevlaka ili završna obrada ligature
      description: Određuje prevlaku i/ili površinsku završnu obradu koja se nanosi
        na metalnu ligaturu i/ili kapu klarineta.
    ligature_reed_contact_style:
      name: Kontaktni stil jezička ligature
      description: Određuje kako ligatura dodiruje jezičak (primjerice minimalni kontakt,
        višetočkasti, omotani).
    ligature_screw_position_relative_to_reed:
      name: Položaj vijka ligature (u odnosu na jezičak)
      description: Označava položaj vijaka za zatezanje ligature u odnosu na stranu
        okrenutu prema jezičku/sviraču kada su postavljeni na usnik.
    ligature_tension_adjustment_mechanism:
      name: Mehanizam za podešavanje napetosti ligature
      description: Opisuje kako ligatura primjenjuje/podešava pritisak na jezičak
        (dizajn pričvršćivanja).
    ligature_tightening_mechanism_type:
      name: Vrsta mehanizma za zatezanje ligature
      description: Određuje mehanizam kojim se ligatura zateže oko usnika i jezička
        (npr. jednostruki vijak, dvostruki vijak, poluga/brzo otpuštanje).
    light_bar_housing_material:
      name: Materijal kućišta svjetlosne trake
      description: Primarni materijal kućišta/tijela svjetlosne trake, što utječe
        na otpornost i odvođenje topline.
    light_bar_lens_material:
      name: Materijal leće svjetlosne trake
      description: Primarni materijal leće/poklopca svjetlosne trake, koji može utjecati
        na otpornost na udarce i optičku jasnoću.
    light_bar_mounting_location:
      name: Mjesto montaže svjetlosne trake
      description: Primarni predviđeni položaj za montažu na vozilu.
    light_stand_style:
      name: Stil stalka za svjetlo
      description: Određuje strukturni stil ili oblik stalka koji se koristi za podršku
        rasvjetnim svjetlima sa specijalnim efektima (primjerice tronožac, T-bar,
        podizna svjetiljka), a ne površinu za ugradnju (zid/strop), što je određeno
        vrstom montaže.
    light_switch_function:
      name: Functionsprekidača za svjetlo
      description: Označava koji(e) strujni(e) krug(ove) ili funkciju(e) sklopka kontrolira.
    lighting_control_protocols_supported:
      name: Podržani protokoli za upravljanje rasvjetom
      description: Upravljački/mrežni protokoli voditelj obrade podršku uz ili umjesto
        DMX512.
    lighting_effects:
      name: Svjetlosni efekti
      description: Određuje sve integrirane značajke rasvjete koje poboljšavaju igranje
        ili estetiku.
    lighting_mode:
      name: Način osvjetljenja
      description: Navodi dostupne obrasce operativnog svjetla, kao što su stalno,
        trepćuće, stroboskop ili SOS.
    lily_variety:
      name: Sorta ljiljana
      description: Označava komercijalnu/botaničku sortu ljiljana koja se prodaje
        kao svježe rezani cvijet (primjerice azijski, orijentalni).
    limb_articulation:
      name: Artikulacija udova
      description: Označava stupanj fleksibilnosti ili artikulacije udova u lutki
        (nema, fiksna, polufleksibilna, potpuno artikulirana).
    limb_material:
      name: Materijal udova
      description: Primarni materijal korišten u krakovima luka ili samostrela utječe
        na težinu, izdržljivost, vibracije i ukupnu učinkovitost.
    lime_variety:
      name: Sorta limete
      description: Identificira specifičnu botaničku ili komercijalnu sortu limete
        koja se prodaje.
    line_buoyancy:
      name: Plovnost strune
      description: Opisuje pluta li pletenica prirodno ili tone li i kojom brzinom,
        što utječe na prezentaciju varalice i upravljanje strunom.
    line_purpose:
      name: Svrha linije
      description: Definira namjeravanu značajku uzice unutar sustava zmaja (npr.
        prednja leteća uzica, uzica za spuštanje zmaja, uzda).
    linen_finish_treatment:
      name: Završna obrada/tretman lana
      description: Bilo koji postupak završne obrade lanene tkanine koji mijenja osjećaj
        na dodir, izgled ili učinkovitost.
    linen_weave_type:
      name: Vrsta lanenog tkanja
      description: Određuje strukturu tkanja lanene tkanine, koja utječe na teksturu,
        prozračnost i drap.
    liner_padding_type:
      name: Vrsta obloge u podnožju
      description: Označava konstrukciju ili stil amortizacije podstave (primjerice
        mrežasta, lagano podstavljena, prošivena).
    liner_shape:
      name: Oblik podstave
      description: Opisuje ukupne oblike obloge vreće za spavanje kako bi je korisnici
        mogli uskladiti sa svojim preferencijama vreće za spavanje i udobnosti.
    liner_type:
      name: Vrsta podstave
      description: Označava imaju li kratke hlače unutarnju podstavu i, ako da, koji
        je to model.
    lining:
      name: Oblaganje
      description: Označava je li i kako je sažetak za plivanje podstavljen, uključujući
        opseg pokrivenosti podstave unutar odjevnog predmeta.
    lining_material:
      name: Materijal podstave
      description: Određuje materijal koji se koristi za unutarnju podstavu cipele,
        što utječe na udobnost, prozračnost i toplinu.
    lining_type:
      name: Vrsta podstave
      description: Određuje je li kupaći kostim podstavljen i u kojoj mjeri.
    link_connection_style:
      name: Link u stilu Veze
      description: Klasificira način spajanja karike s lancem (primjerice brza karika,
        prikačeno spajanje), omogućujući vozačima da odaberu ispravnu metodu ugradnje
        ili zamjenski dio.
    live_bait_form:
      name: Oblik živog mamca
      description: Određuje fizički oblik ili stanje očuvanja mamca, kao što je živi,
        smrznuti ili sušeni.
    living_room_furniture_items_included:
      name: Uključeni komadi namještaja za dnevni boravak
      description: Određuje pojedinačne komade namještaja koji su dio garniture za
        dnevni boravak, što pomaže kupcima da brzo shvate koje su komponente (npr.
        sofa, dvosjed, stolić za kavu) uključene.
    load_mechanism:
      name: Mehanizam punjenjaili
      description: Određuje primarnu metodu kojom se otpor generira ili dodaje stroju
        (npr. selektorizirani snop utega, opterećenje pločom, opterećenje trakom).
    lock_cylinder_type:
      name: Vrsta cilindra brave
      description: Određuje vrstu korištenog cilindra/jezgre ključa (relevantno za
        otpor otvaranja i zamjenske ključeve).
    lock_security_level:
      name: Razina sigurnosti zaključavanja
      description: Opisuje sigurnosne značajke otpornosti brave/cilindra na probijanje
        i bušenje.
    lock_system:
      name: Sustav zaključavanja
      description: Vrsta sigurnosnog sustava zaključavanja koji se koristi za držanje
        dizala na visini.
    locker_bench_configuration:
      name: Konfiguracija klupe u ormariću
      description: Opisuje orijentaciju ili strukturnu konfiguraciju klupe s ormarićima
        (primjerice jednostrana, dvostrana s otokom, montirana na zid).
    locomotive_prototype_power_type:
      name: Vrsta napajanja prototipa lokomotive
      description: Određuje stvarnu vrstu pogona lokomotive koju model predstavlja.
    locomotive_wheel_arrangement_whyte_notation:
      name: Raspored kotača lokomotive (Whyteova notacija)
      description: Raspored kotača prototipa lokomotive (primjerice 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Klasifikacija visine loft kreveta
      description: Označava ukupni stil visine loft kreveta (nizak, srednji, visok,
        ekstra visok), što pomaže kupcima u usklađivanju visine stropa i prostora
        ispod kreveta.
    logo_application_method:
      name: Način nanošenja logotipa
      description: Opisuje kako se školski grb ili logotip nanosi na odjeću (primjerice
        vezenjem ili tiskanjem).
    logo_label_compatible_fabric_weight:
      name: Težina tkanine kompatibilna s logotipom
      description: Preporučena kategorija težine tkanine za pričvršćivanje etikete
        bez izobličenja ili deformacije.
    logo_label_edge_finish:
      name: Završna obrada ruba naljepnice s logotipom
      description: Određuje konstrukciju/završnu obradu ruba etikete, što utječe na
        otpornost na habanje i udobnost na koži.
    logo_label_print_production_method:
      name: Metoda ispisa/proizvodnje etikete logotipa
      description: Kako se logotip nanosi/oblikuje na površini etikete.
    long_block_completeness:
      name: Potpunost dugog bloka
      description: Određuje koje su glavne komponente uključene u sklop dugog bloka.
    long_john_pieces_included:
      name: Uključeni dijelovi dugih gaća
      description: Pojašnjava uključuje li proizvod samo donji, samo gornji ili oba
        dijela seta dugih gaća.
    longan_variety:
      name: Sorta Longan
      description: Označava kultivar ili komercijalnu sortu ploda longana (npr. Kohala,
        Biew Kiew), što pomaže kupcima da prepoznaju željene karakteristike okusa,
        veličine i slatkoće.
    loom_accessories_included:
      name: Uključeni pribor za tkalački stan
      description: Ključni pribor uključen je u kutiju/paket s razbojem.
    loom_finish:
      name: Završna obrada na tkalačkom stanu
      description: Površinska obrada na tkalačkom stanu (prvenstveno za drvene tkalačke
        stanove).
    loom_folding_portability_design_type:
      name: Vrsta dizajna sklopivog/prenosivog tkalačkog stana
      description: Treba li se i kako tkalački stan savijati/sklopiti radi transporta
        ili kompaktnog skladištenja.
    loom_frame_folding_design:
      name: Dizajn sklapanja okvira za tkalački stan
      description: Određuje hoće li se i kako okvir stolnog tkalačkog stana sklapa,
        sažeti ili rastavlja radi skladištenja ili transporta.
    loom_tension_adjustment_method:
      name: Metoda podešavanja napetosti tkalačkog stana
      description: Primarna metoda koja se koristi za podešavanje napetosti osnove
        na tkalačkom stanu.
    loom_tie_up_system:
      name: Sustav za vezanje tkalačkog stana
      description: Vrsta sustava vezivanja/veza koji se koristi između pedala/lamela/osovina
        (primjerice Texsolv ili metalni lanac).
    loquat_variety:
      name: Sorta mušmule
      description: Označava kultivar ili sortu mušmule, odražavajući razlike u veličini,
        okusu, sezoni zrenja i izgledu.
    lubricant_features:
      name: Karakteristike maziva
      description: Highlight posebne karakteristike učinkovitosti, aditive ili prednosti
        maziva.
    lubrication_requirement:
      name: Zahtjev za podmazivanje
      description: Označava je li traka za trčanje prethodno tretirana/ne zahtijeva
        održavanje ili zahtijeva kontinuirano podmazivanje ili poliranje voskom.
    lubrication_type:
      name: Vrsta podmazivanja
      description: Određuje podmazivanje/mazivost čahure i je li ona dizajnirana za
        servisiranje mašću (npr. žljebovi ili zerk spojnica).
    lug_nut_seat_profile:
      name: Profil sjedišta matice
      description: Određuje profil dosjeda matice kotača potreban za osiguranje ispravne
        kompatibilnosti matice i sigurne ugradnje.
    lumbar_support_type:
      name: Tip lumbalne podrške
      description: Opisuje stil lumbalne podrške koja se isporučuje sa stolicom (primjerice
        odvojivi jastuk, podesivi mehanizam, masaža).
    lunge_trainer_style:
      name: Stil trenažera za iskorake
      description: Definira strukturni dizajn trenažera za iskorake.
    lure_buoyancy:
      name: Plovnost varalice
      description: Određuje kako se varalica ponaša u stupcu vode kada je u stanju
        mirovanja ili tijekom vraćanja (npr. pluta na površini, lebdi u vodi ili tone).
    luster:
      name: Polumat
      description: Opisuje način na koji svjetlost reagira s površinom uzorka (npr.
        staklastom, metalnom).
    lychee_cultivar:
      name: Kultivar ličija
      description: Identificira specifičnu sortu ili kultivar ličija - kao što su
        Brewster, Hak Ip ili Mauritius - koji se mogu razlikovati po okusu, veličini
        sjemena, sezoni berbe i cijeni.
    lyre_flip_folder_mounting_location:
      name: Mjesto za montažu mape Lyre/flip
      description: Tamo gdje je lira ili preklopni mehanizam namijenjen za montažu
        na instrument ili pribor (primjerice zvono, olovnu cijev, stalak).
    lyrics_display_type:
      name: Vrsta prikaza teksta pjesme
      description: Kako se tekst pjesme prikazuje (ako je podržano) tijekom karaoke.
    magazine_compatibility:
      name: Kompatibilnost magazina
      description: Označava primarne kalibre ili vrste spremnika za koje su ugrađeni
        džepovi prsluka namijenjeni.
    magnet_requirement:
      name: Zahtjev za magnet
      description: Označava da li je osjetniku potreban vanjski magnet za rad.
    magnet_toy_storage_included:
      name: Uključeno magnetno spremište za igračke
      description: Vrsta pohrane/kutija uključena je uz magnetsku igračku za organizaciju
        stola i putovanja.
    malanga_variety:
      name: Sorta Malanga
      description: Identificira specifičnu sortu korijena malange/tara koja se prodaje
        kako bi se kupcima pomoglo u odabiru željenog okusa, boje ili kulinarske primjene.
    malt_color_rating_system:
      name: Sustav ocjenjivanja boja slada
      description: Određuje na koju se skalu boja navedena boja odnosi (Lovibond,
        SRM ili EBC).
    malt_crush:
      name: Zdrobljeni slad
      description: Označava prodaje li se bazni slad cijeli/nemljeveni ili prethodno
        zdrobljen, a ako jest, i način zdrobljenja.
    malt_form:
      name: Oblik slada
      description: Označava prodaje li se proizvod kao cijela zrna ili prerađena za
        gnječenje (primjerice zdrobljena).
    malt_intended_use:
      name: Namjena slada
      description: Namijenjena primarna uporaba slada (proizvodnja piva, destilacija
        ili dvojna namjena).
    malt_treatment:
      name: Sladni tretman
      description: Opisuje kako je žito/slad obrađen izvan standardnog sušenja (uobičajeni
        specijalni postupci).
    malt_usage_purpose:
      name: Namjena korištenja slada
      description: Opisuje primarni funkcionalni doprinos specijalnog slada recepturi
        piva.
    man_overboard_system_type:
      name: Vrsta sustava za čovjeka u moru
      description: Određuje primarnu kategoriju rješenja za slučaj pada čovjeka u
        more (MOB) koju pruža proizvod.
    mandolin_back_sides_wood:
      name: Drvena leđa i stranice mandoline
      description: Označava vrstu drveta korištenu za leđa i stranice mandoline.
    mandolin_body_top_wood:
      name: Gornja ploča tijela mandoline od drveta
      description: Primarno drvo/materijal korišten za rezonantnu ploču mandoline
        (gore).
    mandolin_bridge_type:
      name: Vrsta mandolinskog Bridge
      description: Određuje vrstu mosta koji se koristi na mandolini.
    mandolin_pickup_configuration:
      name: Konfiguracija pickupa mandoline
      description: Označava uključuje li mandolina elektroniku i koji je tip sustava
        preuzimanja ugrađen.
    mandolin_string_configuration:
      name: Konfiguracija žica mandoline
      description: Označava konfiguraciju strune mandoline prema ukupnom nizu i broju
        slijedova (npr. 8 struna/ 4 slijeda).
    mangosteen_variety:
      name: Sorta mangostina
      description: Identificira specifičnu vrstu ili kultivar mangostina ili blisko
        srodnog voća Garcinia koje se prodaje.
    mannequin_style:
      name: Stil lutke
      description: Opisuje strukturni dizajn ili stil konstrukcije lutke za obuku.
    manufacturing_process:
      name: Proizvodni proces
      description: Primarna metoda proizvodnje tijela role ili špule (primjerice CNC
        obrada, tlačno lijevanje).
    map_coverage_sky_planet_body:
      name: Pokrivenost karte (nebo/planetarno tijelo)
      description: 'Označava što karta prikazuje: noćno nebo (zviježđa) ili određeno
        planetarno tijelo.'
    map_format:
      name: Format karte
      description: Definira fizički ili digitalni prikaz lovačkih karata i vodiča.
    map_sensor_output_signal_type:
      name: Vrsta izlaznog signala MAP senzora
      description: Određuje vrstu izlaznog signala koji MAP senzor daje upravljačkoj
        jedinici motora (ECU).
    map_size_sheet:
      name: Veličina karte (list)
      description: Određuje gotovu veličinu lista karte/postera/planisfere radi lakšeg
        prikaza i kompatibilnosti (veličina Frame , prostor na zidu).
    marabou_feather_form:
      name: Oblik pera marabua
      description: Oblik proizvoda od marabu pera kakav se prodaje.
    marabou_feather_treatment:
      name: Tretman od perja marabua
      description: Kako je pero marabua obrađivano ili dorađeno za Craft .
    marble_track_set_feature_modules:
      name: Moduli značajki kompleta tobogana za pikule
      description: Highlight posebne funkcionalne Modules uključene u set (npr. dizalo,
        lanser, prekidači).
    marine_flare_certification_standard:
      name: Certifikat/standard za pomorske baklje
      description: Označava koje certifikate ili standarde pomorske sigurnosti baklja
        tvrdi da ispunjava.
    marine_safety_standard_compliance:
      name: Usklađenost sa standardima pomorske sigurnosti
      description: Označava koje formalne standarde sigurnosti vode ili odobrenja
        dodatak ispunjava.
    marine_transmission_type:
      name: Vrsta pomorskog prijenosa
      description: Određuje vrstu brodskog mjenjača uparenog s unutarnjim motorom
        (npr. izravni pogon u odnosu na V-pogon).
    marker_action_type:
      name: Vrsta mehanizma markera
      description: Opisuje osnovni mehanizam paljenja/rada markera.
    marker_caliber:
      name: Kalibar markera
      description: Određuje promjer kuglica boje za koje je marker namijenjen ispaljivanju.
    marking_durability:
      name: Trajnost označavanja
      description: Označava koliko dugo se očekuje da će obojena linija ostati vidljiva
        pod normalnim uvjetima, kao što je privremeno (do 3 tjedna), polutrajno (do
        6 mjeseci) ili trajno (više od 6 mjeseci).
    marking_tip_type:
      name: Vrsta vrha za označavanje
      description: Vrsta umetka za označavanje koji šestar koristi za crtanje (npr.
        držač mine u odnosu na tintu u odnosu na vrh za označavanje).
    marshmallow_processing_method:
      name: Metoda obrade sljeza
      description: Opisuje svaku posebnu obradu primijenjenu na sljezove kolačiće
        koja utječe na teksturu, trajnost ili okus.
    marshmallow_size:
      name: Veličina marshmallowa
      description: Klasificira relativnu veličinu pojedinačnih komada sljezovih kolačića.
    martial_arts_belt_rank:
      name: Rang pojasa borilačkih vještina
      description: Označava vještinu/rang predstavljen bojom pojasa ili posebnom kombinacijom
        boja.
    mask_bib_type:
      name: Vrsta maske s podbradnikom
      description: Određuje vrstu podbradnika na maski za mačevanje, kao što je standardni
        platneni, vodljivi, uklonjivi ili nijedan.
    mask_cage_material:
      name: Materijal kaveza maske
      description: Materijal koji se posebno koristi za kavez lica ili okvir maske.
    mask_goggle_design:
      name: Dizajn maske/naočala
      description: Definira cjelokupni strukturni dizajn ili stil pokrivanja zaštitne
        opreme.
    mask_skirt_material:
      name: Materijal suknjice maske
      description: Označava materijal mekane suknje koja osigurava vodonepropusno
        brtvljenje između maske i lica.
    mask_strap_material:
      name: Materijal remena maske
      description: Određuje materijal remena koji pričvršćuje masku za glavu.
    mass_air_flow_sensor_measurement_type:
      name: Vrsta mjerenja senzora protoka zraka (MAF)
      description: Određuje tehnologiju očitavanja/stil izlaza koji koristi MAF senzor.
    mass_air_flow_sensor_mounting_type:
      name: Vrsta montaže Flow protoka zraka
      description: Kako je MAF senzor ili sklop senzora montiran/ugrađen u usisni
        sustav.
    massage_feature:
      name: Masažna značajka
      description: Označava uključuje li podesiva baza integrirane Functions masaže
        i, ako da, koliko zona masaže pruža.
    mast_attachment_interface:
      name: Sučelje za pričvršćivanje jarbola
      description: Određuje standard veze između trupa i jarbola, pomažući Kupacu
        u osiguravanju pristajanja komponenti.
    mast_base_type:
      name: Vrsta baze jarbola
      description: Označava montažni interfejs koji spaja jarbol s pločom ili adapterom.
    mast_bend_curve:
      name: Krivulja savijanja jarbola
      description: Uzorak savijanja jarbola koji određuje kompatibilnost jedara i
        obradu.
    mast_diameter_type:
      name: Vrsta promjera jarbola
      description: Standardizirana klasifikacija promjera jarbola za jedrenje na dasci
        (npr. RDM, SDM, MDM) koja se koristi za provjere kompatibilnosti.
    mat_backing_type:
      name: Vrsta podloge za prostirku
      description: Određuje vrstu podloge na donjoj strani prostirke koja pomaže da
        ostane na mjestu na raznim površinama.
    mat_installation_method:
      name: Način ugradnje podloge
      description: Označava kako je prostirka postavljena ili pričvršćena.
    mat_style:
      name: Stil prostirke
      description: Definira strukturni stil ili oblik prostirke (npr. sklopiva prostirka,
        pločica koja se međusobno spaja, podloga za udarce).
    maternity_panel_type:
      name: Vrsta panela za trudnice
      description: Označava stil rastezljivog panela ili pojasa dizajniranog za prilagođavanje
        rastu tijekom trudnoće.
    maternity_waistband_style:
      name: Stil pojasa za trudnice
      description: Označava dizajn i položaj pojasa ili trbušnog dijela specifičnog
        za trudničke hlače, opisujući kako odjevni predmet podržava rastući trbuh.
    mattress_top_type:
      name: Vrsta gornje obloge madraca
      description: Određuje stil gornjeg sloja madraca ili površinske konstrukcije,
        kao što je gornji sloj s jastukom ili čvrsti gornji sloj.
    maturation_vessel_material:
      name: Materijal posude za sazrijevanje
      description: Određuje primarni materijal posude ili bačve koja se koristi za
        odležavanje shochua.
    maximum_quilt_size_supported:
      name: Maksimalna podržana veličina prošivene deke
      description: Maksimalna veličina popluna/projekta koju okvir može primiti (obično
        se opisuje kao veličina kreveta ili maksimalna širina).
    meal_course:
      name: Slijed obroka
      description: Identificira tipičnu priliku obroka za proizvod.
    meal_preparation_state:
      name: Stanje pripreme obroka
      description: Označava koliko je pripreme potrebno prije konzumacije (npr. spremno
        za jelo, komplet obroka).
    meat_processing_state:
      name: Stanje obrade mesa
      description: Označava stupanj kuhanja ili salamurenja primijenjenog na proizvod
        od mesa prije prodaje.
    meat_quality_grade:
      name: Razred kvalitete mesa
      description: Označava stupanj kvalitete ili klasifikaciju koju je mesu dodijelilo
        priznato tijelo za ocjenjivanje (npr. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Izjava o uzgoju mesa
      description: Highlight uobičajene tvrdnje o dobrobiti životinja ili poljoprivrednoj
        praksi povezane s mesom (npr. hranjeno travom, slobodni uzgoj).
    mechanical_loom_assembly_status:
      name: Status sklopa mehaničkog tkalačkog stana
      description: Kako se tkalački stan šalje ili se isporučuje u smislu potrebne
        montaže.
    mechanical_loom_weaving_type:
      name: Vrsta mehaničkog tkalačkog stana
      description: Primarni mehanizam/vrsta tkanja koji podržava tkalački stan.
    mechanical_puzzle_primary_mechanism:
      name: Primarni mehanizam mehaničke slagalice
      description: Primarna interakcija/mehanizam korišten za rješavanje mehaničke
        zagonetke.
    mechanical_puzzle_solution_format:
      name: Format rješenja mehaničke zagonetke
      description: Format u kojem se daju savjeti/rješenja kada su uključeni.
    medal_attachment_style:
      name: Stil pričvršćenja medalje
      description: Određuje kako se medalja namjerava nositi ili prikazivati (npr.,
        na vratu, prikačeno na leđima).
    medal_award_level:
      name: Razina dodjele medalje
      description: Određuje razinu nagrade koju predstavlja medalja (npr. 1. mjesto,
        sudionik).
    medal_finish:
      name: Završna obrada medalje
      description: Određuje površinsku obradu medalje (vizualni sjaj/teksturu), neovisno
        o materijalu.
    medal_packaging:
      name: Pakiranje medalja
      description: Označava vrstu pakiranja za prezentaciju koje je uključeno sa medaljom.
    melodica_accessory_set_included:
      name: Uključeni komplet melodica pribora
      description: Koji uobičajeni pribor je uključen u paketu melodica paketu.
    melodica_air_chamber_material:
      name: Materijal zračne komore melodica
      description: Materijal zračne komore/tijela melodike (ABS, drvo itd.) kada ga
        prodavači razlikuju od ostalih dijelova.
    melodica_included_accessories:
      name: Uključeni dodaci za melodiku
      description: Uključeni dodaci za melodiku u pakiranju.
    melodica_key_color_scheme:
      name: Melodica key shema boja
      description: shema boja tipki (ne tijela), što utječe na čitljivost (posebno
        za djecu/početnike).
    melodica_mouthpiece_configuration:
      name: Konfiguracija usnika melodica
      description: Označava koja su sučelja za puhanje uključena/korištena za sviranje
        melodike.
    melodica_mouthpiece_type:
      name: Tip usnika Melodica
      description: Stil sučelja za puhanje uključen s melodikom (usnik i/ili fleksibilna
        cijev).
    melodica_reed_plate_material:
      name: Materijal ploče jezičaka melodike
      description: Materijal ploče jezička (razlikuje se od ukupnog materijala tijela
        instrumenta), što može utjecati na trajnost i ton.
    melodica_size_class:
      name: Klasa melodične veličine
      description: Opća veličina/prenosivost melodike, obično na temelju grupiranja
        broja tonaliteta i faktora oblika (npr. Shop Mini/studentski vs. standardni
        vs. modeli s proširenim rasponom).
    melon_variety:
      name: Sorta dinje
      description: Navodi specifičnu vrstu dinje u proizvodu kako bi kupac mogao brzo
        prepoznati svoju preferiranu sortu.
    memory_foam_infusion_material:
      name: Materijal za infuziju memorijske pjene
      description: Označava posebne tvari umetnute u memorijsku pjenu u svrhu hlađenja,
        kontrole mirisa ili u antimikrobne svrhe.
    memory_wire_gauge:
      name: Mjerač memorijske žice
      description: Određuje veličinu američkog mjernog broja žica (AWG) memorijske
        žice.
    memory_wire_project_size:
      name: Veličina projekta memorijske žice
      description: Određuje namijenjeni oblik/veličinu zavojnice nakita za koji je
        memorijska žica oblikovana (npr. narukvica, ogrlica, prsten).
    metal_purity:
      name: Čistoća metala
      description: Označava finoću ili stupanj čistoće metala korištenog u nakitu,
        obično izražen u karatima (K) ili dijelovima na tisuću.
    metrics_counted:
      name: prebrojani mjerni podaci
      description: Navodi pojedinačne statistike ili događaje za koje je brojač namijenjen.
    metronome_display_style:
      name: Stil prikaza metronoma
      description: Određuje kako se tempo prikazuje/indikuje korisniku (igla/klatno
        vs. numerički LED/LCD vs. trepćuće svjetlo).
    metronome_output_method:
      name: Metoda izlaza metronoma
      description: Određuje dostupne izlazne metode za zvuk/signal ritma metronoma.
    microphone_toy_feature_set:
      name: Komplet značajki igračke s mikrofonom
      description: Ključne mogućnosti mikrofona usmjerene na igru za igračke mikrofone
        (glasovni efekti, pojačanje, snimanje itd.).
    midi_output_type:
      name: Vrsta MIDI izlaza
      description: Određuje vrstu(e) MIDI izlaza koje pružaju pokretački Modules.
    military_branch:
      name: Vojna podružnica
      description: Označava vojnu podružnicu za koju je uniforma izdana ili prema
        kojoj je inspirirana.
    milk_base_type:
      name: Vrsta mliječne baze
      description: Navodi primarno mlijeko ili alternativu mlijeku koja se koristi
        u napitku, ako postoji.
    milk_feeding_method:
      name: Metoda hranjenja mlijekom
      description: Označava kako su izvorne životinje hranjene (npr. travom ili žitaricama),
        što može utjecati na okus i nutritivni profil.
    milk_processing_method:
      name: Metoda obrade mlijeka
      description: Označava tehniku obrade ili prerade kojoj je mlijeko prošlo, a
        koja utječe na sigurnost, trajnost i nutritivna svojstva.
    milk_source_animal:
      name: Izvorno životinjsko mlijeko
      description: Identificira životinju od koje je dobiveno mlijeko, pomažući potrošačima
        da odaberu kravlje, kozje, bivolje ili druge mliječne proizvode životinjskog
        podrijetla.
    millet_processing_method:
      name: Metoda obrade prosa
      description: Označava primarnu metodu obrade ili stanje zrna prosa (npr. nepolirano,
        oljušteno, proklijalo).
    millet_variety:
      name: Sorta prosa
      description: Identificira specifičnu vrstu prosa sadržanu u proizvodu (npr.
        biserno, lisičje repato, prstasto).
    milling_process:
      name: Proces glodanja
      description: Označava metodu proizvodnje koja se koristi za mljevenje brašna,
        što može Influence okus, izloženost toplini i nutritivni profil.
    mint_mark:
      name: Oznaka kovnice
      description: Oznaka kovnice kao što je prikazano na kovanici (ako je primjenjivo).
    mirror_configuration:
      name: Konfiguracija ogledala
      description: Određuje stil ili strukturu ogledala uključenog u set za umivaonik.
    mirror_coverage:
      name: Pokrivenost zrcalom
      description: Opisuje opseg zrcalnih panela na kliznim vratima.
    mirror_curvature_type:
      name: Vrsta zakrivljenosti zrcala
      description: Određuje je li površina zrcala konveksna, ravna ili konkavna, što
        utječe na vidno polje.
    mirror_mounting_location:
      name: Mjesto za montažu ogledala
      description: Određuje gdje se na biciklu ili vozaču namjerava montirati ogledalo.
    mirror_shape:
      name: Oblici Shapes
      description: Označava geometrijski oblik ili stil glavnog ogledala koje je uključeno
        u komplet toaletnog stolića.
    mix_ratio:
      name: Omjer miješanja
      description: Određuje preporučeni omjer razrjeđivanja rashladne tekućine i vode
        (za koncentrate) ili potvrđuje fiksni omjer prethodnog miješanja za prethodno
        razrijeđene proizvode.
    mma_glove_type:
      name: Vrsta MMA rukavice
      description: Označava primarnu namjenu ili stil rukavice unutar MMA treninga
        ili natjecanja.
    mobility_features:
      name: Značajke mobilnosti
      description: Označava ugrađene elemente za kretanje ili prenosivost poput kotačića
        ili sklopivih nogu.
    model_aircraft_assembly_level:
      name: Razina montaže modela zrakoplova
      description: Označava koliko je zgrade potrebno izgraditi prije nego što se
        zrakoplov može koristiti.
    model_making_kit_items_included:
      name: Izrada modela komplet stavka uključena
      description: Navodi što je uključeno u komplet ili paket za izradu modela (npr.
        boja, ljepilo, kist).
    model_making_product_type:
      name: Vrsta proizvoda za izradu modela
      description: Identificira što je stavka u osnovi unutar izrade modela (komplet,
        pribor, alat ili dodatak) kako bi se poboljšalo pregledavanje i filtriranje
        različitih vrsta proizvoda unutar izrade modela.
    model_rocket_kit_contents:
      name: Kompletan sadržaj modela rakete
      description: Označava je li proizvod kompletan višestupanjski model rakete ili
        dodatak/modul/komplet dijelova (npr. komponente potisnog motora ili održavajućeg
        stupnja).
    model_rocket_kit_format:
      name: Format kompleta modela rakete
      description: Određuje prodaje li se raketa kao komplet i razinu spremnosti za
        montažu.
    model_rocket_motor_impulse_class:
      name: Klasa impulsa motora modela rakete
      description: Označava standardizirani model raketnog motora ukupne Impulse klase
        (primjerice A, B, C ...).
    model_rocket_motor_mount_size:
      name: Veličina nosača modela raketnog motora
      description: Određuje promjer kućišta motora koji nosač motora rakete može prihvatiti.
    model_rocket_power_source_required:
      name: Potreban izvor napajanja za model rakete
      description: Označava zahtijeva li proizvod baterije/vanjsko napajanje i koje
        vrste.
    model_rocket_propellant_type:
      name: Vrsta raketnog goriva za model
      description: Označava sustav pogonskog goriva/motor koji se koristi za pogon
        u proizvodima u modelarstvu raketa.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Preporučena veličina šipke za pokretanje ili šine za model rakete
      description: Određuje promjer šipke za pokretanje ili veličinu lansirne šine
        za koju je raketa dizajnirana (primjerice šipka 1/8 inča, šina za pokretanje
        1010).
    model_rocket_recovery_method:
      name: Metoda spašavanja modela rakete
      description: Primarni sustav oporavka koji se koristi za sigurno vraćanje rakete
        nakon leta.
    model_rocket_recovery_system_type:
      name: Tip sustava za spašavanje modela rakete
      description: Određuje primarnu metodu spašavanja koja se koristi za siguran
        povratak rakete nakon leta.
    model_rocket_staging:
      name: Odvajanje modela rakete
      description: Označava s koliko pogonskih stupnjeva je model rakete dizajniran
        za let.
    model_train_accessory_electrical_connection_type:
      name: Električni pribor za model vlaka, tip veze
      description: Određuje stil konektora ili terminala koji se koristi za spajanje
        dodatne opreme napajanog modela vlaka na maketu (kada je to primjenjivo).
    model_train_coupler_type:
      name: Vrsta spojnice za modelni vlak
      description: Određuje standard spojnice ugrađen na model vlaka ili lokomotivu.
    model_train_gauge:
      name: Širina kolosijeka modela vlaka
      description: Određuje sustav kolosijeka modelne željeznice za koji je pribor
        namijenjen (kada je primjenjivo), pomažući u osiguravanju fizičke kompatibilnosti
        s korisnikovim praksama i izgledima.
    model_train_lighting_features:
      name: Značajke osvjetljenja modela vlaka
      description: Određuje funkcionalnost rasvjete uključenu u model vlaka/lokomotive.
    model_train_power_pickup_method:
      name: Model preuzimanja snage vlaka
      description: Određuje kako model prima napajanje za rad (napajanje šina, baterija
        itd.).
    model_train_scale:
      name: Mjerilo modela vlaka
      description: Određuje standard mjerila/veličine modelnog vlaka (odnos između
        modela i stvarnog vlaka).
    model_train_sound_features:
      name: Zvučne značajke modelnog vlaka
      description: Označava uključuje li model zvučne efekte i koju vrstu zvuka nudi.
    model_train_track_gauge:
      name: Širina kolosjeka modela vlaka
      description: Određuje standard kolosijeka/sustava na kojem je model dizajniran
        za pokretanje (primjerice standardni kolosijek, varijanta uskog kolosijeka
        ili kolosijeci specifični za marku/sustav gdje je primjenjivo).
    modeling_dough_base_material:
      name: Osnovni materijal za modeliranje tijesta
      description: Primarna baza/sastav tijesta za modeliranje (primjerice na bazi
        pšenice/brašna u odnosu na polimernu).
    modeling_dough_features:
      name: Značajke tijesta za modeliranje
      description: Ključne funkcionalne karakteristike tijesta za modeliranje koje
        kupci obično filtriraju.
    modification_level:
      name: Razina modifikacije
      description: Označava stupanj modifikacije slada (koliko su temeljito razgrađeni
        endosperm/proteini ječma), često se sažima kao nedovoljno modificirano/modificirano/prekomjerno
        modificirano.
    molasses_base_ingredient:
      name: Sastojak za bazu melase
      description: Identificira primarni biljni ili voćni izvor od kojeg se proizvodi
        melasa.
    molasses_grade:
      name: Kvaliteta melase
      description: Klasificira melasu prema fazi ekstrakcije/rafiniranja, što izravno
        utječe na intenzitet okusa, boju i nutritivni profil.
    mold_material:
      name: Materijal kalupa
      description: Sastav primarnog materijala samog kalupa (primjerice silikon, plastika,
        metal).
    molle_compatibility:
      name: Kompatibilnost s MOLLE-om
      description: Označava da li prsluk ima MOLLE/PALS traku za pričvršćivanje modularnih
        torbica i dodatne opreme.
    motor_belt_type:
      name: Vrsta motornog remena
      description: Definira dizajn/profil remena koji se koristi u sustavu pogona
        trake za trčanje.
    motor_configuration:
      name: Konfiguracija motora
      description: Označava koliko neovisnih pogonskih motora skuter koristi.
    motor_mounting_configuration:
      name: Konfiguracija montaže motora
      description: Opisuje kako je motor montiran/implementiran u konverziji kompleta
        za skuter.
    motor_mounting_position:
      name: Položaj montaže motora
      description: Označava gdje je na električnom skuteru montiran motor, kao što
        je glavčina prednjeg kotača, glavčina stražnjeg kotača, glavčina dvostrukog
        kotača ili ID br. trgovca-pogona.
    motor_position:
      name: Položaj motora
      description: Označava gdje se motor nalazi na električnom biciklu, što utječe
        na obradu i održavanje.
    motor_vehicle_a_v_integration_features:
      name: Značajke integracije audio/video sustava u motornom vozilu
      description: Značajke integracije pametnih telefona i vozila koje podržava glavna
        jedinica (primjerice Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Žarulja za motorna vozila aplikacija/position
      description: Određuje predviđeni položaj osvjetljenja vozila ili funkcije za
        koje je žarulja dizajnirana (primjerice kratko svjetlo, stop svjetlo).
    motor_vehicle_bulb_approval_standard:
      name: Žarulja za motorna vozila standardno odobrenje
      description: Označava usklađenost s regulativom/odobrenje oznaka za korištenje
        cesta na ciljnom tržištu.
    motor_vehicle_oxygen_sensor_bank:
      name: Banka senzora kisika motornog vozila
      description: Označava na koji red cilindara motora odgovara lambda sonda (primjerice
        red 1 vs. red 2) za V-tip/bokser motore; uporaba Nije primjenjivo za linijske
        motore.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Broj žica senzora kisika u motornom vozilu
      description: Broj žica u kabelskom svežnju lambda sonde.
    motor_vehicle_oxygen_sensor_position:
      name: Položaj lambda sonde u motornom vozilu
      description: Određuje gdje je senzor kisika (O2) ugrađen u ispušni sustav u
        odnosu na katalizator.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Broj senzora lambda sonde u motornom vozilu
      description: Označava broj senzora (npr. Senzor 1 ili Senzor 2) unutar zadane
        oznake banke/položaja.
    motor_vehicle_oxygen_sensor_type:
      name: Vrsta senzora kisika motornog vozila
      description: Određuje dizajn/tehnologiju osjetnika kisika.
    motor_vehicle_paint_application_method:
      name: Metoda primjene boja za motorna vozila
      description: Kako se boja namjerava nanositi na površinu vozila.
    motor_vehicle_paint_system_step:
      name: Korak sustava za bojanje motornih vozila
      description: Označava za koji je korak ili komponentu sustava za obnovu automobila
        proizvod namijenjen (primjerice temeljni premaz, osnovni premaz, prozirni
        premaz).
    motor_vehicle_speaker_mounting_type:
      name: Vrsta montaže zvučnika u motornom vozilu
      description: Kako se zvučnik namjerava ugraditi u vozilo (faktor oblika montaže).
    motor_vehicle_subwoofer_size:
      name: Veličina subwoofera motornog vozila
      description: Nominalni promjer zvučnika subwoofera (npr. 8 in, 10 in, 12 in),
        koristi se za usklađivanje prostora vozila i kompatibilnosti kućišta.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfiguracija zvučne zavojnice subwoofera motornih vozila
      description: Broj/konfiguracija zvučnih zavojnica koja se koristi za usklađivanje
        opcija ožičenja pojačala (primjerice SVC vs DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedancija zvučne zavojnice subwoofera motornog vozila (po zavojnici)
      description: Nazivna impedancija svake zvučne zavojnice (ne konačno ožičenje
        učitati), koristi se za izračune ožičenja.
    motor_vehicle_voltage_regulator_type:
      name: Vrsta regulatora napona motornog vozila
      description: Označava tehnologiju/oblik regulatora koji se koristi u motornim
        vozilima.
    motorcycle_armor_certification_standard:
      name: Standard certificiranja motociklističke zaštitne opreme
      description: Označava formalni sigurnosni standard(e) koje štitnik certificirano
        zadovoljava (primjerice EN 1621-2 za štitnike za leđa, EN 1621-3 za štitnike
        za prsa).
    motorcycle_cover_size_class:
      name: Navlaka za motocikl veličina klase
      description: Standardizirana veličina kante za navlake za pohranu motocikala
        temeljena na tipičnoj kategoriji/rasponu duljina motocikala kojem odgovara.
    motorcycle_glove_certification_standard:
      name: Standard certifikacije motociklističkih rukavica
      description: Određuje zaštitni certifikat/standard kojem rukavice odgovaraju
        (primjerice razine EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Vodootporna izrada motociklističkih rukavica
      description: Određuje vrstu metode vodootpornosti koja se koristi u rukavici
        (ako postoji).
    motorcycle_guard_coverage_area:
      name: Područje pokrivenosti motociklističkog čuvara
      description: Primarno područje pokrivenosti koje proizvod osigurava (lakat,
        zapešće, podlaktica, kombinacija).
    motorcycle_kidney_belt_construction_type:
      name: Vrsta konstrukcije remena za bubrege motocikla
      description: Stil konstrukcije bubrežnog pojasa koji utječe na krutost, protok
        zraka i zaštitu.
    motorcycle_kidney_belt_purpose:
      name: Namjena pojasa za bubrege motocikla
      description: Označava primarni stil vožnje ili scenarij za koji je dizajniran
        remen za bubrege motocikla.
    motorcycle_luggage_capacity_class:
      name: Klasa nosivosti prtljage motocikla
      description: Označava volumenski kapacitet prtljage motocikla, izražen u litrama.
    motorcycle_luggage_mounting_system:
      name: Sustav za montažu prtljage za motocikle
      description: Sustav za pričvršćivanje/montažu koji se koristi za pričvršćivanje
        torbe/korpe na motocikl (primjerice remeni za prebacivanje, brzootpuštajući
        sustav montiran na stalak).
    motorcycle_luggage_side:
      name: Strana prtljage motocikla
      description: Za bisage/torbe za bisage, označava je li stavka za lijevu stranu,
        desnu stranu ili par/set.
    motorcycle_protective_gear_size_system:
      name: Sustav veličina zaštitne opreme za motocikle
      description: Označava sustav dimenzioniranja koji se koristi na proizvodu (primjerice
        alfanumerički, numerički, jedna veličina).
    motorcycle_rack_carrier_style:
      name: Stil nosača za motocikle
      description: Opisuje funkcionalni stil prijevoznika za prijevoz motocikla ili
        skutera (platforma vs. šina vs. dizalica s pomoćnim podizanjem itd.).
    motorcycle_riding_discipline:
      name: Disciplina vožnje motocikla
      description: Označava primarnu disciplinu jahanja/upotrebe za koju je vratni
        štitnik dizajniran.
    motorcycle_tire_speed_rating:
      name: Indeks brzine motociklističkih guma
      description: Označava maksimalnu održivu brzinu za koju je guma predviđena,
        koristeći standardni slovni kod (primjerice H, V, W).
    motorsport_window_net_certification:
      name: Certifikacija za mrežicu za prozore u motosportu
      description: Certifikat ili homologacija za sigurnost utrka koju mreža za prozor
        zadovoljava (primjerice SFI ili FIA), uključujući broj specifikacije gdje
        je primjenjivo.
    mound_usage_type:
      name: Vrsta uporabe nasipa
      description: Identificira namijenjeno okruženje primjene humka, kao što je vježbanje,
        igra, bullpen ili višenamjensko.
    mount_attachment_method:
      name: Način pričvršćivanja nosača
      description: Određuje kako se nosač pričvršćuje na površinu/strukturu vozila.
    mountainboard_truck_type:
      name: Vrsta kamiona za mountainboard
      description: Klasificira stil kamiona uključenih sa pločom, što utječe na odziv
        pri okretanju i izdržljivost.
    mounting_attachment_method:
      name: Način montaže/pričvršćivanja
      description: Kako je držač/torba dizajnirana za pričvršćivanje na bubanj, stalak,
        remen ili drugu površinu.
    mounting_attachment_type:
      name: Vrsta montaže/pričvršćenja
      description: Kako se pribor za omjer pričvršćuje ili povezuje s kotačem za predenje.
    mounting_hardware_included_for_installation:
      name: Priloženi montažni pribor (za instalaciju)
      description: Označava je li montažni pribor potreban za ugradnju stražnjeg sjedala
        (npr. nosači, vijci, šine) uključen u proizvod.
    mounting_location:
      name: Mjesto montaže
      description: Određuje predviđeno područje položaja na opremi ili tijelu za svjetlo/reflektor
        (primjerice prednja vilica, kaciga, žbice kotača).
    mounting_method:
      name: Način montaže
      description: Način montaže ili pričvršćivanja držača za štapić/četkicu (primjerice
        stezaljkom, remenom, ljepilom).
    mounting_position:
      name: Položaj montaže
      description: Određuje gdje se u kabini vozila namjerava montirati/ugraditi komanda
        ručne kočnice.
    mounting_rail_type:
      name: Vrsta montažne šine
      description: Određuje standard šine ili sučelja na koji se pribor pričvršćuje,
        kao što su Picatinny ili M-LOK.
    mounting_receiver_size:
      name: Veličina montažnog prijemnika
      description: Veličina prijemnika kuke potrebna za teretni stalak montiran na
        kuku.
    mounting_storage_type:
      name: Vrsta montaže/skladištenja
      description: Kako se uređaj namjerava montirati ili spremiti na plovilo/osobu.
    mouth_grip_type:
      name: Vrsta hvata za usta
      description: Opisuje vrstu hvatišta za usta ili zaštite na zviždaljci radi udobnosti
        i higijene.
    mouthguard_mold_type:
      name: Vrsta kalupa za štitnik za zube
      description: Opisuje kako se štitnik za zube prilagođava zubima sportaša (primjerice
        metoda „kuhaj i zagrizi", prilagođeno pristajanje zubima).
    mouthpiece_facing_length:
      name: Duljina okrenuta prema usniku
      description: Označava kategoriju duljine krivulje okrenute ka (lay) usniku (ne
        ukupnu duljinu usnika), što utječe na odziv, otpor i kompatibilnost s jezičkom.
    mouthpiece_material:
      name: Materijal usnika
      description: Određuje materijal usnika/vrha puhala za zabave koji dolazi u kontakt
        s ustima, a koji se može razlikovati od materijala glavnog tijela.
    mouthpiece_shank_receiver_size:
      name: Veličina drške usnika/prijemnika
      description: Određuje standard prijemnika/drške usnika kompatibilan s flugelhornom.
    mouthpiece_shank_size:
      name: Veličina drške usnika
      description: Određuje standard prianjanja usnika/prijemnika kako bi se osigurala
        kompatibilnost s predviđenim limenim puhačkim instrumentom.
    mouthpiece_shank_type:
      name: Vrsta drške usnika
      description: Određuje standard prijemnika/drške usnika radi kompatibilnosti
        (gdje je primjenjivo).
    mouthpiece_style:
      name: Stil usnika
      description: Klasificira dizajn/oblike dijela usnika žvale, što utječe na točke
        pritiska, težinu i preferencije konja.
    mouthpiece_type:
      name: Vrsta usnika
      description: Vrsta usnika na kraju za puhanje (ugrađeni, odvojivi ili dodatak).
    movement_mechanism:
      name: Mehanizam kretanja
      description: Definira kako se klupa pomiče tijekom uporabe (njihanje, klizanje,
        ljuljanje itd.).
    muffin_size:
      name: Veličina muffina
      description: Klasificira fizičku veličinu formata proizvoda za muffine (primjerice
        Shop Mini, standard, jumbo).
    mushroom_variety:
      name: Raznolikost gljiva
      description: Identificira specifičnu vrstu ili sortu gljive ili tartufa sadržanu
        u proizvodu (primjerice shiitake, kraljevska kamenica, crni tartuf).
    music_stand_desk_tilt_adjustment:
      name: Podešavanje nagiba stola za stalak za note
      description: Označava može li se i kako podesiti kut stola.
    music_stand_intended_use:
      name: Namjena stalka za note
      description: Označava primarnu namjeravanu postavku/namjenu za stalak.
    musical_block_pitch_type:
      name: Vrsta visine tona glazbenog bloka
      description: Opisuje proizvodi li glazbeni blok određeni (ugođeni) ili neodređeni
        ton.
    musical_box_mechanism_type:
      name: Vrsta mehanizma glazbene kutije
      description: Kako glazbena kutija proizvodi/reproducira zvuk (primjerice pokret
        na navijanje u odnosu na elektroničku reprodukciju).
    musical_keyboard_case_fit_type:
      name: Glazbena klavijatura kutija odgovara tipu
      description: Opisuje kako je kutija dimenzionirana prema instrumentu (primjerice
        univerzalni/generički raspon veličina u odnosu na model-specifično/prilagođeno
        prileganje).
    musical_ratchet_sound_character:
      name: Karakter zvuka čegrtaljke
      description: Opći opis boje/glasnoće čegrtaljke.
    musical_scraper_groove_surface_material:
      name: Materijal površine utora glazbenog strugača
      description: Određuje materijal rebraste/žljebljene površine za struganje (može
        se razlikovati od materijala tijela).
    musical_scraper_type:
      name: Vrsta glazbenog strugača
      description: Određuje stil/dizajn glazbenog instrumenta (primjerice guiro vs.
        reco-reco), koji utječe na zvuk i tehniku sviranja.
    mute_attachment_method:
      name: Način pričvršćenja prigušivača
      description: Određuje kako je prigušivač činele pričvršćen na činelu ili kako
        se drži na njoj (npr. gel, statička prianjajuća traka, magnet, kopča).
    mute_attenuation_level:
      name: Razina prigušenja zvuka
      description: Označava koliko prigušivanje smanjuje percipiranu glasnoću, što
        je posebno važno za prigušivanja u vježbama.
    mute_cork_padding_material:
      name: Materijal čepa za prigušivanje/razmak
      description: Određuje materijal kontaktnog razmaka prigušivača (npr. traka/jastučići
        od pluta) koji se koristi za hvat/prianjanje i zaštitu zvona.
    mute_coverage_type:
      name: Vrsta pokrivenosti usta
      description: Označava stil/pokrivenost prigušivača na površini za igru, od prigušivača
        malih točka do prigušivača za cijelu površinu u vježbanju.
    mute_finish:
      name: Završetak prigušivanja
      description: Površinska obrada nijemca koja može utjecati na trajnost i estetiku
        (primjerice polirana u odnosu na satensku).
    name_label_text_template:
      name: Predložak teksta oznake za naziv
      description: Određuje unaprijed postavljeni tekst ili predlog ispisan na etiketi
        naziva (primjerice 'Pripada', 'Izradio').
    napkin_ply:
      name: Sloj salvete
      description: Označava debljinu koktel salvete po broju slojeva (naslaga).
    neck_brace_fit_system:
      name: Sustav za pričvršćivanje vratne narukvice
      description: Označava primarnu metodu koja se koristi za podešavanje i pričvršćivanje
        vratne ogrlice na vozača.
    neck_brace_size_basis:
      name: Osnovna veličina ortoze za vrat
      description: Označava osnovu veličine koja se koristi za odabir ispravne veličine
        ovratnika.
    neck_configuration:
      name: Konfiguracija vrata
      description: Određuje stil/konfiguraciju vrata saksofona, što utječe na ergonomiju
        i svirljivost.
    neck_coverage_type:
      name: Vrsta pokrivenosti vrata
      description: Određuje stil pokrivanja vrata datog s dekom.
    neck_support_size_system:
      name: Sustav podrške za vrat
      description: Označava sustav veličina koji se koristi za trkaću potporu/naramenicu
        za vrat (primjerice za odrasle, mlade ili jednu veličinu).
    necklace_length_type:
      name: Vrsta duljine ogrlice
      description: Određuje konvencionalnu kategoriju duljine ogrlice, kao što su
        ogrlica ili opera, kako bi se olakšala kupnja na temelju stila.
    needle_balance_zone:
      name: Zona ravnoteže igle
      description: Označava magnetsku saldo zonu ili hemisferu za koju je podešena
        igla kompasa, osiguravajući točna očitanja diljem svijeta.
    needle_case_format:
      name: Format kutije igle
      description: Ukupni čimbenik oblika organizatora kutije za iglu.
    needle_damping_type:
      name: Vrsta prigušenja igle
      description: Opisuje kako je igla kompasa stabilizirana (npr. punjena tekućinom,
        suha ili elektronički stabilizirana), što utječe na vrijeme stabilizacije
        i trajnost.
    needle_felting_needle_profile:
      name: Profil igle za filcanje iglom
      description: Presjek/profil igle za filcanje koji utječe na način pomicanja
        vlakana i dobiveni rezultat.
    needle_holder_features:
      name: Značajke držača igle
      description: Istaknute funkcionalne značajke držača igle.
    needle_holder_mounting_attachment_method:
      name: Način montaže/pričvršćivanja držača igle
      description: Kako se držač igle treba pričvrstiti ili koristiti tijekom skladištenja
        (npr. magnetom, kopčom, remenom).
    needle_holder_style:
      name: Stil držača igle
      description: Fizičko skladištenje ili stil/dizajn držača igle.
    needle_pushing_surface_type:
      name: Vrsta površine za guranje igle
      description: Vrsta/dizajn površine za guranje igle na dlanu za šivanje (primjerice
        metalna udubina, kovanica ili ojačani dio).
    needle_requirement_beading_pattern:
      name: Potrebna igla (uzorak za izradu perlica)
      description: Vrsta/veličina igle preporučana uzorkom.
    needle_size_system:
      name: Sustav veličine igle
      description: Standard veličine koji se koristi za označavanje veličine igle.
    needle_threader_compatible_needle_type:
      name: Tip igle kompatibilan s uvlakačem konca
      description: Određuje za koje vrste igala je uvlakač konca namijenjen (prema
        kategoriji/uporabi igle).
    needle_threader_mechanism_type:
      name: Vrsta mehanizma uvlačivača konca
      description: Opisuje kako uvlač konca hvata/provlači niz poruke kroz ušicu igle.
    needle_threader_packaging_type:
      name: Vrsta pakiranja uvlakača konca u iglu
      description: Kako se proizvod prodaje/pakira (pojedinačno vs. višestruko pakiranje
        vs. set).
    needlecraft_fabric_color_family:
      name: Obitelj boja tkanine za ručni rad
      description: Normalizirana obitelj boja za tkaninu ravnomjernog tkanja (koristi
        se uz boju za filtre).
    needlecraft_fabric_composition:
      name: Sastav tkanine za ručni rad
      description: Određuje sastav/mješavinu vlakana tkanine za ručni rad (npr. 100%
        pamuk, mješavina lana i pamuka).
    needlecraft_fabric_weave_type:
      name: Vrsta tkanja tkanine za ručni rad
      description: Određuje tkanje/konstrukciju lana za ručni rad (primjerice ravnomjerno
        tkanje u odnosu na tradicionalno laneno platno), što utječe na ponašanje i
        izgled šava.
    needlecraft_kit_items_included:
      name: Kompletna stavka za ručni rad uključena
      description: Navodi glavne komponente uključene u komplet za ručni rad (alate
        i potrošni materijal).
    needlecraft_kit_project_type:
      name: Vrsta projekta kompleta za izradu ručnog rada
      description: Identificira što gotova stavka čini komplet (ishod projekta).
    needlecraft_stitching_coverage:
      name: Pokrivenost šivanjem ručnim radovima
      description: Označava je li tkanina prošivena preko 1 niza poručica/kvadrata
        ili preko 2 niza poručica (uobičajeno za ravnomjerno tkanje i lan).
    needlepoint_canvas_mesh_count:
      name: Broj mreža platna za vezenje
      description: Namjeravana mreža/broj poruka platna (niz poruka po inču) za koju
        je dizajn predviđen (obično se naziva broj platna).
    needlepoint_frame_canvas_attachment_method:
      name: Metoda pričvršćivanja okvira platna za vezenje
      description: Opisuje kako se platno za goblen pričvršćuje na okvir za goblen.
    needlepoint_frame_compatible_stand_type:
      name: Vrsta stalka kompatibilna s okvirom za goblen
      description: Ako je okvir dizajniran za montažu na stalak, navodi se vrsta(e)
        stalka s kojima je kompatibilan.
    needlepoint_frame_contents:
      name: Sadržaj okvira za platno za vezenje
      description: Navodi koje su komponente i pribor uključeni u okvir za goblen
        (primjerice okvir, dodatne šipke/štapići, čavlići/prikačeno, trake za hvatanje,
        torba za nošenje).
    needlepoint_frame_tension_adjustment_type:
      name: Vrsta podešavanja napetosti okvira platna za vezenje
      description: Označava kako se (ili može li se) napetost okvira podesiti tijekom
        uporabe.
    needlepoint_pattern_chart_format:
      name: Format uzorka za goblen
      description: Kako je dizajn goblena prikazan za šivanje (ucrtani u odnosu na
        tiskani/oslikani vodič).
    needlepoint_project_type:
      name: Vrsta projekta s platnom za vezenje
      description: Namijenjena gotova stavka/kategorija za koju je dizajn goblena
        namijenjen.
    net_design:
      name: Dizajn mreže
      description: Označava stil konstrukcije mreže, pokazujući može li se uvući ili
        sklopiti radi prenosivosti.
    net_mesh_pattern:
      name: Uzorak mreže
      description: Određuje geometrijske oblika otvora mreže, koji mogu utjecati na
        vidljivost i čvrstoću.
    net_twine_gauge:
      name: Mjerač neto konopca
      description: Označava debljinu niti ili čvrstoću mreže, tradicionalno izraženu
        kao broj mjerenja (primjerice 18, 36).
    nicotine_source:
      name: Izvor nikotina
      description: Označava je li nikotin u proizvodu dobiven iz duhana, sintetski
        ili proizvod ne sadrži nikotin.
    nipple_drive_interface:
      name: Sučelje nipple žbice
      description: Identificira stil/standard pogonskog sučelja ili glave nipla (vanjskog
        ili unutarnjeg), koji određuje potreban alat i metodu izrade kotača.
    nock_activation_method:
      name: Metoda aktivacije nocka
      description: Određuje mehanizam kojim se LED osvijetljenog utora strijele pali
        ili gasi (primjerice pritisak tetive, osjetnik pokreta, ručna sklopka).
    nock_fitment_code:
      name: Kod prilagodbe utora
      description: Proizvođač ili industrijski kod koji identificira obitelj/seriju
        udubljenja kojoj pripada.
    nock_throat_size:
      name: Veličina utora zareza
      description: Određuje veličinu utora (žljeba) koji se pričvršćuje na tetivu.
    nock_transparency_level:
      name: Razina prozirnosti nocka
      description: Opisuje kako prozirnost materijala noka - jasna, prozirna, neprozirna
        ili svijetli u mraku - utječe na vidljivost i estetiku.
    nock_type:
      name: Vrsta udubljenja
      description: Određuje dizajn zareza koji se koristi na strijeli ili vijku, kao
        što je prikačeni, polumjesec ili osvijetljeni.
    noise_reduction_type:
      name: Vrsta smanjenja buke
      description: Označava tehnologiju za smanjenje buke koja se koristi (ili ne
        koristi) u integriranim slušalicama kacige, ako je primjenjivo.
    noise_suppression_technology:
      name: Tehnologija suzbijanja buke
      description: Određuje koristi li proizvod pasivno prigušivanje ili aktivni elektronički
        sklop koji sažeti glasne zvukove i/ili pojačava ambijentalni zvuk.
    non_slip_base_features:
      name: Značajke neklizajuće baze
      description: Označava protuklizne značajke koje sprječavaju pomicanje pedale
        tijekom učinkovitosti.
    nose_bridge_type:
      name: Vrsta mosta za nos
      description: Označava dizajn nosnog mosta, što utječe na pristajanje različitim
        veličinama lica.
    nose_clip_accessories_included:
      name: Uključeni pribor za štipaljke za nos
      description: Navodi sav dodatni pribor koji se isporučuje s kopčom za nos za
        plivanje (primjerice čepići za uši, torbica za pohranu).
    nose_clip_features:
      name: Značajke štipaljke za nos
      description: Highlight opće funkcionalne ili udobne značajke kopče za nos.
    nose_coverage_style:
      name: Stil pokrivenosti nosa
      description: Označava prisutnost i vrstu zaštitne ploče za nos ili njušku na
        maski za insekte.
    noseband_type:
      name: Vrsta nosnog remena
      description: Određuje dizajn nosnog remena (ako postoji) kokji je dostavljen
        uzdom.
    number_of_canvas_meshes:
      name: Broj mreža platna
      description: Veličina mrežice plastičnog platna, izražena kao broj rupa po inču
        (HPI) ili broj rupa, određuje veličinu uboda i podatke o projektu.
    number_of_chainrings:
      name: Broj lančanika
      description: Označava koliko lančanika kurlica može montirati ili s koliko je
        dostavljeno.
    number_of_control_stations:
      name: Broj kontrolnih stanica
      description: Označava broj kormilarskih/upravljačkih stanica koje podržava upravljački
        komplet (jedna stanica u odnosu na dvije stanice itd.).
    number_of_digits:
      name: Broj znamenki
      description: Koliko znamenki brojač prikazuje (primjerice 1-znamenkasti, 2-znamenkasti,
        3-znamenkasti).
    number_of_guitar_slots:
      name: Broj utora za gitaru
      description: Označava za koliko gitara je kutija/torba namijenjena.
    number_of_needlecraft_fabrics:
      name: Broj tkanina za vezenje
      description: Određuje broj tkanine za platno/tkaninu za vezenje, obično izražen
        kao kvadrati/niz po inču (npr. 14 uboda).
    number_of_plastic_canvas_meshes:
      name: Broj plastičnih mreža od platna
      description: Određuje broj rupa na plastičnom platnu (mrežica po inču), što
        određuje veličinu uboda i razinu informacija o projektu.
    number_of_quilting_frame_rails:
      name: Broj šina okvira za prošivanje
      description: Broj tračnica/valjaka uključenih u okvir za prošivanje (primjerice
        sustavi s dvije tračnice u odnosu na sustave s tri tračnice).
    number_of_rope_slots:
      name: Broj otvora za užad
      description: Označava je li uređaj za osiguravanje dizajniran za korištenje
        s jednim ili dva užeta.
    number_of_switch_poles:
      name: Broj polova prekidača
      description: Broj odvojenih strujnih krugova (polova) koje kontrolira prekidač
        (primjerice SPST, DPST).
    number_of_switch_throws:
      name: Broj prebacivanja prekidača
      description: Broj izlaznih putova (pogona) po polu (primjerice SPDT).
    number_of_timing_chain_rows:
      name: Broj redova lanaca razvodnog mehanizma
      description: Označava je li lanac razvoda jednoredni ili višeredni.
    number_of_trailer_axles:
      name: Broj osovina prikolice
      description: Broj osovina na prikolici.
    number_of_wheel_pieces:
      name: Broj dijelova kotača
      description: Označava je li kotač jednodijelne, dvodijelne ili trodijelne izrade.
    numbering_style:
      name: Stil numeriranja
      description: Označava jesu li i kako brojevi za identifikaciju tima unaprijed
        numerirani (primjerice bez broja, 1-10, prilagođeni).
    nunchuck_connector_type:
      name: Nunchuck mehanizam sinkronizacije tipa
      description: Stil povezivanja između dva nunchucka korisničko ime (primjerice
        uže, lanac, okretni lanac).
    nursing_access:
      name: Pristup za dojenje
      description: Identificira način pristupa za dojenje integriran u kupaći kostim,
        ako je to primjenjivo.
    nursing_access_type:
      name: Vrsta pristupa za dojenje
      description: Određuje kako odjevni predmet omogućuje pristup dojkama za dojenje
        ili izdajanje.
    nut_butter_texture:
      name: Tekstura maslaca od orašastih plodova
      description: Opisuje fizičku konzistenciju maslaca od orašastih plodova kako
        bi kupac lako mogao birati između glatkog, hrskavog itd.
    nutrient_fortification:
      name: Obogaćivanje hranjivim tvarima
      description: Identificira ključne hranjive tvari kojima je napitak ili prehrambeni
        proizvod obogaćen.
    oak_product_form:
      name: Oblik proizvoda od hrasta
      description: Označava fizički oblik hrasta koji se koristi za odležavanje/aromatiziranje
        proizvoda.
    oak_toast_level:
      name: Razina tosta hrasta
      description: Određuje stupanj prženja hrasta.
    oboe_case_capacity:
      name: Kapacitet kućišta oboe
      description: Označava za koje je instrumente i glavne komponente kutija namijenjena.
    oboe_case_carry_configuration:
      name: Konfiguracija nošenja kutije za obou
      description: Označava primarnu konfiguraciju nošenja koju nudi kutija/torba.
    oboe_case_design:
      name: Dizajn kutije za obou
      description: Klasificira konstrukciju/krutost kutije za obou ili torbe za gitaru
        (primjerice tvrda, polukruta, mekana) kako bi se naznačila razina zaštite.
    oboe_case_internal_fit_type:
      name: Unutarnji tip kutije za obou
      description: Označava je li unutrašnjost oblikovana za određenu konfiguraciju
        instrumenta ili koristi podesive pretince.
    oboe_keywork_plating:
      name: Oblaganje tipki oboe
      description: Određuje prevlaku/završnu obradu mehanizma (tipki) oboe, odvojeno
        od materijala tijela.
    oboe_strap_padding:
      name: Remen za obou razmak u podnožju
      description: Opisuje prisutnost/vrstu podstave u području kontakta remena/podrške
        za udobnost (npr. podstavljeno područje ramena/vrata).
    oboe_swab_style:
      name: Stil štapića za obou
      description: Određuje funkcionalni stil/konstrukciju štapića za čišćenje oboe
        (primjerice provlačivi, otežani svileni).
    observation_window_material:
      name: Materijal za prozor za promatranje
      description: Određuje materijal panela/prozora za gledanje (često utječe na
        jasnoću i trajnost).
    ocarina_accessories_included:
      name: Uključeni dodaci za okarinu
      description: Pribor koji dolazi s okarinom, kao što su kutija, remen za vrat
        ili dijagram prstohvata.
    ocarina_chamber_count:
      name: Broj komora okarine
      description: Označava koliko komora ima linijska okarina, što utječe na domet
        i složenost sviranja (jednostruka/dvostruka/trostruka itd.).
    ocarina_fingering_system:
      name: Okarina sustav prstovanja
      description: Određuje sustav/standard prstohvata koji slijedi privjesna okarina
        (ako je primjenjivo).
    ocarina_finish_type:
      name: Vrsta završne obrade okarine
      description: Površinska obrada tijela okarine koja utječe na osjećaj i estetiku.
    occupant_classification_sensor_support:
      name: Podrška za senzor klasifikacije putnika
      description: Označava uključuje li sjedalo osjetnika za klasifikaciju/težinu
        putnika ili ima li mogućnost prijenosa/ugradnje OEM osjetnika (obično za suvozačka
        sjedala).
    octave_harmonica_cover_plate_material:
      name: Materijal pokrovne ploče oktavne harmonike
      description: Materijal vanjskih pokrovnih ploča oktavne harmonike.
    octave_harmonica_tuning_system:
      name: Sustav ugađanja oktavne harmonike
      description: Ugađanje/temperament koji se koristi za oktavnu harmoniku.
    octoban_mounting_system_type:
      name: Vrsta sustava za montažu Octoban
      description: Kako je oktoban montiran/pozicioniran tijekom sviranja (postavljanje
        montaže/nosača/postolja).
    odor_control_features:
      name: Značajke kontrole mirisa
      description: Označava pruža li proizvod funkciju neutralizacije/dezodoriranja
        mirisa i kojim pristupom.
    office_furniture_items_included:
      name: Uključeni komadi uredskog namještaja
      description: Označava specifični uredski namještaj uključen u komplet, kao što
        je radni stol ili ormar za spise.
    oil_cooler_core_type:
      name: Vrsta jezgre hladnjaka ulja
      description: Određuje unutarnju konstrukciju jezgre hladnjaka ulja, što utječe
        na učinkovitost hlađenja, pad tlaka i trajnost.
    oil_cooler_mounting_style:
      name: Način montaže hladnjaka ulja
      description: Opisuje kako se hladnjak ulja namjerava montirati/ugraditi na vozilo.
    oil_dipstick_component_type:
      name: Vrsta komponente mjerne šipke za ulje
      description: Navodi koja se komponenta za mjerenje razine ulja prodaje (primjerice
        samo oštrica/šipka mjerne šipke, samo korisničko ime, kompletan sklop, cijev
        mjerne šipke itd.).
    oil_dipstick_measurement_markings:
      name: Oznake za mjerenje ulja na mjernoj šipki
      description: Određuje koje se oznake/skala nalaze na mjernoj šipki za očitavanje
        razine ulja.
    oil_dipstick_tube_mounting_type:
      name: Vrsta montaže cijevi za mjerenje ulja
      description: Određuje kako se cijev za mjerenje ulja drži ili montira na motor
        ili blok motora.
    oil_drain_plug_head_drive_type:
      name: Tip pogona glave čepa za ispuštanje ulja
      description: Određuje sučelje za zahvat alata na glavi čepa za ispuštanje ulja
        koje se koristi za ugradnju i uklanjanje.
    oil_drain_plug_magnet_type:
      name: Tip magneta za čep za ispuštanje ulja
      description: Određuje je li čep za ispuštanje magnetski i, ako jeste, kojeg
        je tipa.
    oil_fill_cap_type:
      name: Vrsta čepa za punjenje ulja
      description: Stil/vrsta sučelja čepa za punjenje ulja koji koristi poklopac
        ventila (ako je primjenjivo).
    oil_filler_cap_attachment_type:
      name: Vrsta pričvršćivanja čepa za punjenje ulja
      description: Određuje kako se čep za punjenje ulja drži na motoru/grlu za punjenje
        ulja (primjerice niz poruka, bajonetni/tromjesečje-okretanje, pritisni spoj).
    oil_filler_cap_installation_position:
      name: Položaj ugradnje čepa za punjenje ulja
      description: Određuje gdje se koristi čep kada postoji više mjesta za punjenje
        uljem (npr. poklopac ventila, cijev za daljinsko punjenje).
    oil_filler_cap_locking_type:
      name: Vrsta zaključavanja čepa za ulje
      description: Određuje je li čep za punjenje ulja nezaključavan ili koristi metodu
        zaključavanja/osiguranog uklanjanja (primjerice s ključem ili alatom) kako
        bi se spriječilo neovlašteno otvaranje/krađa ili slučajno otvaranje.
    oil_filler_cap_tether_type:
      name: Vrsta vezice čepa ulja
      description: Određuje je li čep za punjenje ulja pričvršćen/zadržan kako bi
        se spriječio gubitak i koja se vrsta pričvršćivanja koristi.
    oil_filler_cap_venting_type:
      name: Vrsta odzračivanja čepa za punjenje ulja
      description: Određuje je li čep ventiliran i mehanizam za ventilaciju (ako je
        primjenjivo).
    oil_filter_style:
      name: Stil filtra za ulje
      description: Određuje čimbenik oblika uljnog filtra i način montaže/ugradnje
        radi kompatibilnosti s nosačem filtra motora.
    oil_pan_baffle_windage_features:
      name: Značajke pregrade/zaštite od vjetra u karteru
      description: Označava unutarnje značajke kontrole ulja uključene u tavu.
    oil_pan_finish_coating:
      name: Završna obrada/prevlaka uljne posude
      description: Opisuje površinsku završnu obradu ili premaz korita za ulje (obojeno,
        praškasto obojeno, galvanizirano, sirovo itd.).
    oil_pressure_sensor_function_type:
      name: Vrsta funkcije osjetnika tlaka ulja
      description: Označava je li dio davač tlaka ulja s promjenjivim izlazom za mjerač/procesor
        ili sklopka za isključivanje/uključivanje za tlak ulja koja pokreće lampicu
        upozorenja.
    oil_pressure_sensor_signal_output_type:
      name: Vrsta izlaznog signala osjetnika tlaka ulja
      description: Određuje stil električnog izlaza/signala koji proizvodi senzor/davač
        tlaka ulja.
    oil_processing_method:
      name: Metoda obrade ulja
      description: Navodi kako je ulje proizvedeno ili rafinirano (npr. hladno prešano,
        djevičansko, rafinirano), što utječe na okus, nutritivne vrijednosti i prikladnu
        primjenu u kuhanju.
    oil_pump_drive_method:
      name: Metoda pogona uljne pumpe
      description: Označava što pokreće pumpu za ulje unutar motora.
    oil_pump_mounting_style:
      name: Stil montaže uljne pumpe
      description: Određuje gdje i kako se pumpa za ulje montira u motoru (npr. unutarnja
        vs. vanjska/udaljena, montaža na poklopac, montaža na uljno korito).
    oil_system_connection_thread_standard:
      name: Standard navoja za priključak uljnog sustava
      description: Određuje standard niz poruka/veza koji koristi sučelje sustava
        ulja dijela za ugradnju/kompatibilnost (primjerice M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Ocjena viskoznosti ulja
      description: Opisuje relativnu gustoću ulja za predenje za opremu za izradu
        (ne automobilske SAE klase).
    okra_variety:
      name: Sorta okre
      description: Identificira određeni kultivar ili tržište ponuđene okre, kao što
        su Clemson Spineless, Red Burgundy ili Baby Okra.
    olfactory_arts_material_form:
      name: Oblik materijala za olfaktornu umjetnost
      description: Određuje fizički oblik materijala u prodaji.
    olfactory_arts_tool_kit_content:
      name: Olfaktorni umjetnički alat kompletan sadržaj
      description: Navodi koje su komponente uključene kada se proizvod prodaje kao
        komplet ili set za izradu svijeća/štapića/parfema.
    olive_variety:
      name: Sorta maslina
      description: Određuje korišteni kultivar masline, što utječe na okus, teksturu,
        boju i regionalnu autentičnost.
    onion_variety:
      name: Sorta luka
      description: Određuje specifičnu vrstu luka kako bi kupci mogli brzo pronaći
        željenu boju, okus i profile uporabe, istovremeno omogućujući trgovcima da
        točno navedu proizvode.
    opacity_level:
      name: Razina neprozirnosti
      description: Označava koliko je tkanina prozirna ili neprozirna.
    operating_modes:
      name: Načini rada
      description: Primarni ugrađeni efekt/ Mode Motion podržan laserskom svjetlošću.
    operating_voltage:
      name: Radni napon
      description: Određuje nominalni napon sustava za koji je injektor dizajniran.
    optical_toy_features:
      name: Optičke značajke igračaka
      description: Highlight primarni vizualni/optički efekt koji igračka proizvodi.
    orchestral_string_core_material:
      name: Orkestarski niz core materijal
      description: Određuje materijal od kojeg je izrađena jezgra (niz), što snažno
        utječe na osjećaj, odziv i ton.
    orchestral_string_end_type:
      name: Vrsta kraja orkestarske strune
      description: Određuje stil pričvršćivanja na kraju repnog dijela niza.
    orchestral_string_included_strings:
      name: Uključene žice orkestralnog gudačkog instrumenta
      description: Navodi koje su specifične oznake uključene u pakiranje (razlikuje
        se ovisno o instrumentu).
    orchestral_string_instrument_fitting_part_type:
      name: Vrsta orkestralnog niz instrumenta/dijela
      description: Određuje o kojoj se vrsti okova/dijela radi (npr. kobilica, kordar,
        podbradak).
    orchestral_string_instrument_mute_type:
      name: Vrsta prigušivača orkestralnog gudačkog instrumenta
      description: Određuje funkcionalnu vrstu orkestralnog niskog instrumenta (primjerice
        vježba/hotel vs. učinkovitost/koncert) i/ili uobičajeni stil dizajna.
    orchestral_string_instrument_part_position:
      name: Položaj dionice instrumenta orkestarske strune
      description: Označava gdje dio pripada na instrumentu (korisno kada dijelovi
        dolaze u gornjoj/donjoj ili lijevoj/desnoj varijanti).
    orchestral_string_winding_material:
      name: Materijal namota gudačkog instrumenta
      description: Određuje vanjski materijal za namotavanje/omotavanje koji se koristi
        na nizu.
    organza_finish_sheen:
      name: Završna obrada/sjaj organze
      description: Opisuje površinski izgled organze (mat vs. sjajni/iridescentni
        efekti).
    organza_ribbon_transparency_level:
      name: Razina prozirnosti organza trake
      description: Opisuje koliko je prozirna vrpca organze.
    organza_transparency_level:
      name: Razina prozirnosti organze
      description: Opisuje koliko je proziran materijal organze kada se nanese jednom.
    origami_paper_shape:
      name: Oblik origami papira
      description: Određuje oblik lista koji se koriste za savijanje.
    origami_paper_sidedness:
      name: Dvostranost origami papira
      description: Označava ima li origami papir istu boju/uzorak na obje strane ili
        strane koje se razlikuju.
    ostrich_feather_part:
      name: Dio nojevog pera
      description: Označava stil/dio nojevog pera koji se koristi (primjerice perje
        nasuprot sivom) što utječe na mekoću, gustoću i tipičnu primjenu rukotvorina.
    outboard_motor_shaft_type:
      name: Vrsta osovine vanbrodskog motora
      description: Standardna klasa duljine osovine koju koriste vanbrodski motori
        (obrazac oznake koji se koristi u pomorskoj industriji).
    outboard_motor_steering_type:
      name: Vrsta upravljanja vanbrodskim motorom
      description: Određuje sučelje/mehanizam upravljanja koji koristi vanbrodski
        motor (primjerice kormilo ili sustav daljinskog upravljanja).
    outdoor_table_functionality:
      name: Funkcionalnost vanjskog stola
      description: Označava specijalizirane ugrađene funkcije koje idu izvan jednostavnu
        površinu stola (primjerice pretinac za hladnjak, polica za pohranu, poklopac
        za spremnik goriva, baza suncobrana, sklopivi dizajn, sef u bazenu, podesiva
        visina, integrirani kotači, LED rasvjeta).
    outerwear_length_type:
      name: Vrsta duljine gornje odjeće
      description: Klasificira ukupnu duljinu gornjeg odjevnog predmeta u standardnom
        opisnom rasponu.
    outerwear_pieces_included:
      name: Uključeni dijelovi vanjske odjeće
      description: Navodi dijelove odjeće koji se isporučuju kada se proizvod prodaje
        kao komplet.
    outfit_attachment_mechanism:
      name: Mehanizam pričvršćivanja odjeće
      description: Određuje kako se odjeća ili dodaci pričvršćuju na lutku (primjerice
        kartica, ljepilo, magneti).
    outfit_items_included:
      name: Uključeni odjevni predmeti
      description: Navodi određene odjevne predmete uključene u kompletu (npr. bodi,
        kratke hlače, traka za glavu).
    outlet_thread_type:
      name: Vrsta navoja na otvoru
      description: Standard navoja koji se koristi na izlaznim otvorima glavnog kočionog
        cilindra (npr. metrički konus u odnosu na inverzni konus).
    output_jack_type_instrument:
      name: Vrsta izlaznog priključka (instrument)
      description: Određuje vrstu audio izlaznog priključka na električnoj mandolini.
    output_signal_type:
      name: Vrsta izlaznog signala
      description: Ponašanje/vrsta električnog izlaza koju proizvodi senzor (npr.
        analogni otpor NTC termistora).
    outsole_marking_type:
      name: Vrsta oznake potplata
      description: Označava ostavlja li potplat tenisice tragove na površinama terena,
        što je ključno za sportove s reketom u zatvorenom prostoru.
    outsole_material:
      name: Materijal potplata
      description: Označava materijal potplata cipele koji dodiruje tlo, utječući
        na prianjanje, fleksibilnost i izdržljivost.
    outsole_stud_type:
      name: Vrsta čepa na potplatu
      description: Opisuje konfiguraciju vanjskog potplata/kopačke (primjerice oblikovane
        kopačke, gumene izbočine, izbočine na travnjaku) koja osigurava prianjanje
        na odabranoj površini za igru.
    oven_bake_clay_formulation:
      name: Formulacija gline pečene u pećnici
      description: Identificira obitelj formulacija gline pečene u pećnici (primjerice
        polimerna glina u odnosu na smolnu glinu), što utječe na obradu, ponašanje
        stvrdnjavanja i završna svojstva.
    oven_housing_configuration:
      name: Konfiguracija kućišta pećnice
      description: Definira namijenjeni izgled uređaja koji se ugrađuje u ormarić
        (npr. jedna pećnica, dvostruka pećnica ili kombinacija pećnice i mikrovalne
        pećnice).
    overhead_mount_installation_method:
      name: Metoda ugradnje iznad glave
      description: Kako je nadzemni nosač pričvršćen na vozilo (pričvršćivanje/stil
        pričvršćivanja).
    oversize_or_undersize_grade:
      name: Predimenzionirani ili premali razred
      description: Određuje veličinu kompleta (preveliki klipovi/prstenovi i/ili premali
        ležajevi) u odnosu na standardnu veličinu proizvođača originalne opreme.
    p_tex_application_method:
      name: Način nanošenja P-Texa
      description: Opisuje kako se P-Tex materijal nanosi na bazu skija ili snowboarda.
    p_tex_form:
      name: P-Tex obrazac
      description: Identificira fizički oblik u kojem se materijal za popravak dostavlja.
    packability:
      name: Pakivost
      description: Označava može li se prsluk pakirati ili spremiti kada se ne koristi
        i kako.
    packaging_format:
      name: format pakiranja
      description: Kako se nizovi pakiraju/prodaju (pojedinačne omotnice, rinfuza
        itd.).
    packaging_material:
      name: Materijal za pakiranje
      description: Određuje primarni materijal boce ili spremnika koji drži vodu.
    packaging_type:
      name: Vrsta pakiranja
      description: Opisuje kako je klimavko pakiran za skladištenje u slučaju maloprodaje/izlaganja/kolekcionarstva.
    packing_medium:
      name: Medij za pakiranje
      description: Označava tekućinu ili medij (kao što su voda, razni sirupi, sok
        ili salamura) koji se koristi za konzerviranje voća unutar spremnika.
    pad_components_included:
      name: Uključene komponente podloge
      description: Određuje koji su dijelovi uključeni kada se proizvod prodaje kao
        komplet (npr. štitnici za koljena i laktove, samo štitnici za zglobove).
    pad_controller_additional_control:
      name: Pad voditelj obrade dodatne kontrole
      description: Vrste dodatnih fizičkih kontrola izvan jastučića (gumbi, faderi)
        nazočnih na uređaju.
    pad_controller_performance_features:
      name: Značajke učinkovitosti kontrolera jastučića
      description: Ključne značajke jastučića povezane sa sviranjem i ekspresivnom
        kontrolom.
    pad_coverage_area:
      name: Područje pokrivenosti jastučića
      description: Određuje zone tijela koje štite integrirani jastučići pojasa.
    pad_material_or_technology:
      name: Materijal ili tehnologija jastučića
      description: Označava patentiranu tehnologiju apsorpcije udara ili zaštićeni
        materijal korišten u jastučiću.
    pad_mounting_or_holding_style:
      name: Stil montaže ili držanja jastučića
      description: Označava kako se jastučić drži, nosi ili postavlja tijekom uporabe.
    pad_saver_style:
      name: Stil za zaštitu jastučića
      description: Označava fizički stil/dizajn zaštitne folije koja se koristi za
        sušenje pločica i provrta.
    pad_shape:
      name: Oblik jastučića
      description: Definira geometrijski oblik ili zakrivljenost udarne površine ili
        cijelog tijela jastučića (primjerice okrugli, zakrivljeni, pravokutni, ravni),
        pomažući korisnicima da usklade jastučiće s ciljevima treninga i vrstama udaraca.
    pad_shell_type:
      name: Vrsta školjke jastučića
      description: Klasificira stil konstrukcije vanjske površine jastučića (primjerice
        tvrda ljuska, meka ljuska, unutarnji uložak).
    pad_style:
      name: Stil jastučića
      description: Određuje vrstu ili dizajn pločice dostavljene sa sanjkama.
    padding_layers:
      name: Slojevi razmaka
      description: Označava broj slojeva pjene korištenih za apsorpciju udaraca.
    padding_level:
      name: Nivo razmaka
      description: Označava količinu razmaka u podnožju integriranog u kontaktna područja
        remena/podrške (vrat/rame/leđa).
    padding_material:
      name: Materijal za punjenje
      description: Određuje unutarnje punjenje ili tvar za punjenje koja apsorbira
        udarac unutar vreća, štitnika, rukavica i lutaka.
    paddle_ball_attachment_type:
      name: Vrsta pričvršćivanja za lopticu za veslo
      description: Određuje kako je lopta povezana s reketom (ili nije pričvršćena).
    paddle_leash_style:
      name: Stil uzice za veslo
      description: Označava stil ili dizajn užeta za veslo.
    paddle_shape:
      name: Oblik vesla
      description: Definira ukupnu siluetu glave/tijela vesla (primjerice standardna,
        izdužena, široko tijelo), što utječe na doseg udarca, veličinu optimalne točke
        i upravljivost.
    paddleboard_intended_use:
      name: Namjena daske za veslanje
      description: Klasificira primarnu svrhu dizajna ili aktivnost za koju je daska
        izgrađena (primjerice turneje, joga, utrke).
    paint_application_method:
      name: Način nanošenja boje
      description: Primarni način na koji je proizvod namijenjen nanošenju na čeljust.
    paint_by_number_surface_type:
      name: Vrsta površine za bojanje po broju
      description: Površina na koju je otisnut numerirani dizajn (primjerice platno,
        papir, drvena ploča).
    paint_medium_application_method:
      name: Način primjene Paint medium
      description: Označava preporučeni način nanošenja medija.
    paint_medium_intended_effect:
      name: Željeni učinak medija boje
      description: Zabilježava primarni rezultat koji medij treba izraditi (tekstura,
        sjaj, glazura, tok itd.).
    paint_safe_bristles:
      name: Čekinje sigurne za bojanje
      description: Označava jesu li čekinje četke sigurne za uporabu na automobilskoj
        boji/prozirnom premazu (bez ogrebotina).
    paintable_surface:
      name: Površina koja se može bojati
      description: Označava je li oblik od papier-mâchéa spreman za bojanje kakav
        jest (primjerice premazan temeljnom bojom/zapečaćen) ili zahtijeva pripremu.
    paintball_caliber:
      name: Kalibar za paintball
      description: Određuje promjer/kalibar kuglica boje ili kompatibilne opreme.
    paintball_feed_system:
      name: Sustav za dopremanje municije u paintballu
      description: Definira kako se kuglice boje ubacuju u marker.
    paintball_fill_color:
      name: Paintball punjenje boja
      description: Označava boju unutarnje ispune oznaka, koja se može razlikovati
        od vanjske ljuske i određuje boju koja je ostala nakon udara.
    paintball_fill_type:
      name: Vrsta punjenja paintballa
      description: Opisuje bilo koju posebnu formulaciju ili svojstvo punjenja (npr.
        perivo, svijetli u mraku, prah).
    paintball_grade:
      name: Razred kvalitete paintballa
      description: Opisuje učinkovitost klase ili namjeravanu razinu upotrebe (primjerice
        ulazna, terenska, natjecateljska, zimska).
    paintball_mask_coverage_level:
      name: Razina pokrivenosti maske za paintball
      description: Označava koje dijelove lica ili glave paintball naočale ili maska
        štite (samo naočale, pola lica, cijelo lice ili cijela glava).
    paintball_tank_valve_type:
      name: Vrsta ventila za bocu za paintball
      description: Opisuje sučelje ventila ili regulatora nazočno na spremniku.
    painting_surface_priming_type:
      name: Vrsta temeljnog premaza za površinu za bojanje
      description: Određuje temeljni premaz/premaz na površini boje (izvan samo temeljnog/ne
        temeljnog premaza), što utječe na prianjanje boje i kompatibilnost tehnike.
    palette_knife_blade_edge_profile:
      name: Profil oštrice paletnog noža
      description: Opisuje profil radne oštrice paletnog noža (ne oštrinu), koji utječe
        na izradu oznaka i miješanje.
    palette_knife_flexibility:
      name: Fleksibilnost špatule
      description: Opisuje krutost/savitljivost oštrice paletnog noža.
    palette_surface_finish:
      name: Završna obrada površine palete
      description: Opisuje miješanje površinske obrade/premaz koji utječe na otpornost
        na mrlje i lakoću čišćenja.
    palm_padding_level:
      name: Razina jastučenja dlana
      description: Opisuje količinu amortizacije u području dlana rukavice ili jastučića
        za hvatanje.
    palm_padding_type:
      name: Jastučenje dlana
      description: Označava materijal ili konstrukciju korištenu za amortizaciju dlana
        (primjerice gel, pjena, dvoslojni).
    palm_wax_blend_readiness:
      name: Spremnost mješavine palminog voska
      description: Bilo da se radi o čistom palminom vosku ili o prethodno pomiješanoj
        formulaciji namijenjenoj specifičnim karakteristikama učinkovitosti.
    palm_wax_form:
      name: Oblik palminog voska
      description: Fizički oblik palminog voska kakav se prodaje, što utječe na jednostavnost
        mjerenja, brzinu topljenja i obradu.
    pan_flute_tuning_standard:
      name: Standard ugađanja Panove flaute
      description: Referentna frekvencija koja se koristi za ugađanje (npr. A4=440
        Hz), važna za sviranje s drugim instrumentima.
    pannier_configuration:
      name: Konfiguracija bisaga
      description: Označava prodaje li se proizvod kao pojedinačna torba, povezana
        dvostruka torba ili par/trostruki set bisaga.
    pannier_mounting_system:
      name: Sustav montaže bisaga
      description: Definira mehanizam koji se koristi za pričvršćivanje bisage na
        nosač bicikla ili okvir, osiguravajući kompatibilnost s različitim postavkama.
    pant_cuff_style:
      name: Stil manžete hlača
      description: Označava završnu obradu ili podešavanje na gležnju hlača (primjerice
        elastične manžete, poštanski broj gležnja, otvoreni rub).
    pant_leg_conversion_type:
      name: Vrsta konverzije nogavica
      description: Označava mogu li se i kako nogavice hlača preoblikovati ili prilagoditi
        za različite duljine.
    pantyhose_crotch_style:
      name: Stil najlonki u međunožju
      description: Definira dizajn međunožnog područja, razlikujući standardne zatvorene
        međunožne inačice, inačice bez međunožja ili inačice s ojačanim umetcima.
    papaya_variety:
      name: Sorta papaje
      description: Označava kultivar ili tržište papaje (primjerice Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Format papirnate i magnetske lutke
      description: Određuje je li proizvod tradicionalni komplet papirnih lutaka,
        komplet magnetskih lutaka ili hibridni format.
    paper_color_family:
      name: Obitelj boja papira
      description: Određuje je li pakiranje pojedinačne boje, raznih boja ili specijalnih
        mješavina (korisno kada su boje po porudžbini, ali su pakiranja miješana).
    paper_magnetic_doll_set_contents:
      name: Sadržaj seta papirnih i magnetskih lutki
      description: Označava koje su glavne komponente uključene u komplet.
    paper_opacity:
      name: Neprozirnost papira
      description: Označava koliko je papir proziran, od vrlo prozirnog do neprozirnog
        (korisno za precrtavanje).
    paraglider_certification_rating:
      name: Certifikacijska ocjena paraglajdera
      description: Navodi službenu ocjenu letne sposobnosti dodijeljenu krilu paraglajdera
        (npr. EN ili LTF klase).
    parasite_types_controlled:
      name: Kontrolirane vrste parazita
      description: Navodi unutarnje parazite protiv kojih je proizvod učinkovit kako
        bi kupci mogli prilagoditi programe deworminga specifičnim zarazama.
    parking_camera_mounting_location:
      name: Mjesto montaže parkirne kamere
      description: Gdje na vozilu je predviđena ugradnja kamere (primjerice područje
        registarske pločice, površinska montaža na stražnjoj strani, ugradbena montaža).
    parking_camera_night_vision_technology:
      name: Tehnologija noćnog vida za kameru za parkiranje
      description: Metoda pomoći pri slabom osvjetljenju koju koristi kamera.
    parking_camera_orientation:
      name: Orijentacija parkirne kamere
      description: Je li kamera dizajnirana za sigurnosnu kopiju, prednji pogled ili
        odabir/zrcalnu uporabu.
    parking_sensor_finish:
      name: Završna obrada parkirnog senzora
      description: Označava površinsku obradu prednje strane/poklopca parkirnog osjetnika
        (primjerice može se bojati/premazati temeljnom bojom, mat, sjajna) kako bi
        se uskladila s estetikom branika.
    parking_sensor_type:
      name: Vrsta parkirnog osjetnika
      description: Određuje tehnologiju očitavanja koju koristi parkirni senzor (npr.
        ultrazvučnu, elektromagnetsku, radarsku, optičku).
    parsley_root_variety:
      name: Sorta korijena peršina
      description: Navodi kultivar ili sortu korijena peršina kada ju je dostavio
        dobavljač.
    parsnip_variety:
      name: Sorta pastrnjaka
      description: Identificira specifičnu sortu ili kultivar pastrnjaka, kao što
        su Hollow Crown ili White Gem, što omogućuje odabir pastrnjaka na temelju
        okusa, slatkoće ili razlika u veličini.
    part_condition:
      name: Stanje dijela
      description: Označava je li dio nov, rabljen, remontiran itd.
    part_placement:
      name: Položaj dijela
      description: Označava gdje je dio ugrađen na stroju (primjerice penjačica za
        stepenice ili steper), na primjer lijevo, desno, sprijeda ili straga.
    partial_capo_covered_strings:
      name: Skraćeni kapodaster prekrivene žice
      description: Određuje raspon niza koji pokriva parcijalni kapodaster koristeći
        standardno numeriranje gitara od 6 niza (1 = visoki E, 6 = niski E).
    parting_style:
      name: Stil odvajanja
      description: Označava kako je perika podijeljena ili se može podijeliti (primjerice
        u sredini, sa strane, slobodni dio), što utječe na fleksibilnost stiliziranja.
    party_favor_type:
      name: Vrsta poklona za zabavu
      description: Određuje o kakvoj se vrsti poklona za zabavu radi (primjerice naljepnice,
        igračke Shop Mini , mjehurići) kako bi se omogućilo pregledavanje/filtriranje
        unutar poklona za zabavu.
    party_game_format:
      name: Format igre za zabavu
      description: Primarni fizički format društvene igre.
    party_horn_mouthpiece_type:
      name: Vrsta usnika za trubu za zabave
      description: Određuje konstrukciju usnika, što utječe na higijenu i udobnost.
    party_horn_style:
      name: Stil trube za zabavu
      description: Opisuje izradu/stil ponašanja trube za zabave (kako se širi ili
        proizvodi zvuk).
    passenger_car_type:
      name: Vrsta osobnog automobila
      description: Identificira specifičan tip putničkog voznog parka (putničkog automobila)
        za model (npr. vagon, spavaći vagon), koji se koristi za pregledavanje i izradu
        kompleta.
    passion_fruit_variety:
      name: Sorta marakuje
      description: Identificira/specificira ponuđenu botaničku ili komercijalnu sortu
        marakuje (npr. ljubičasta, žuta, Granadilla).
    pasta_sauce_texture:
      name: Tekstura umaka za tjesteninu
      description: Opisuje konzistenciju umaka (primjerice gladak, gust, kremast)
        kako bi odgovarao osjećaju u ustima potrošača.
    pasta_sauce_variety:
      name: Raznovrsni umaci za tjesteninu
      description: Klasificira umake za tjesteninu prema receptu ili stilu kako bi
        kupci mogli brzo pronaći klasike poput marinara umaka ili specijalne umake
        poput votke ili pesta.
    pastry_crust_state:
      name: Stanje kore tijesta
      description: Opisuje pripremu ili stanje pečenja kore prigodom kupnje.
    pastry_crust_style:
      name: Stil kore peciva
      description: Identificira specifičan stil tijesta ili vrstu tijesta za koru.
    pastry_filling_type:
      name: Vrsta nadjeva za tijesto
      description: Određuje primarni unutarnji nadjev tijesta ili sconea.
    patch_adhesion_method:
      name: Metoda lijepljenja flastera
      description: Određuje kako se flaster pričvršćuje na zračnicu ili gumu (primjerice
        samoljepljivim, vulkanizirajućim cementom ili toplinski aktiviranim).
    patch_backing_material:
      name: Materijal podloge zakrpe
      description: Materijal korišten na poleđini/baze krpice (primjerice filc, keper)
        koji dodiruje stavku koja se ukrašava.
    patch_backing_type:
      name: Vrsta podloge naljepnice
      description: Podloga korištena na flasteru (npr. toplinski lijepljena/peglana,
        ljepljiva traka za odljepljivanje, čičak traka, nijedna).
    patch_base_material:
      name: Materijal podloge naljepnice
      description: Primarni osnovni/podložni tekstilni materijal motiva (ne ukrasnih
        detalja).
    patch_border_edge_finish:
      name: Završna obrada ruba/krpa
      description: Metoda završne obrade rubova zakrpe (primjerice obrubljeni/prešiveni
        rub, laserski rezani rub) utječe na trajnost i izgled.
    patch_placement_area:
      name: Položaj smještanja zakrpe
      description: Uobičajeno predviđeno područje položaja za zakrpu na odjeći/dodacima.
    pathogen_removal_capability:
      name: Mogućnost uklanjanja patogena
      description: Određuje koje klase mikroorganizama (bakterije, protozoe, virusi)
        crpka može ukloniti.
    pattern_sizing_system:
      name: Sustav veličine uzorka
      description: Određuje regionalni sustav veličina ili standard koji se koristi
        za tablicu veličina uzorka (primjerice SAD, UK, EU).
    peak_style:
      name: Vrhunski stil
      description: Određuje stil vizira ili šiltera na kacigi, utječući na pokrivenost,
        estetiku i pravila discipline.
    pear_variety:
      name: Sorta kruške
      description: Identificira kultivar ili sortu krušaka (primjerice Bartlett, Bosc,
        Conference), omogućujući kupcima da odaberu svoj željeni okus, teksturu i
        kulinarsku uporabu.
    pearl_luster_grade:
      name: Stupanj bisernog sjaja
      description: Kvalitativni stupanj sjaja/sjaja površine bisera.
    pearl_matching_level:
      name: Razina podudaranja bisera
      description: Označava koliko se dobro biseri slažu unutar lota ili niza (primjerice
        po boji, veličini i sjaju).
    pearl_shape:
      name: Oblik perle
      description: Ukupna kategorija oblika bisera.
    pearl_surface_condition:
      name: Biserna površina uvjet
      description: Označava vidljivu površinsku svjetlost bisera, na temelju nazočnosti
        i ozbiljnosti mrlja ili oštećenja.
    pearl_treatment:
      name: Tretman perli
      description: Objavljuje svaki tretman primijenjen na biser koji utječe na boju/izgled.
    pearl_type:
      name: Vrsta bisera
      description: Navodi vrstu bisera/podrijetlo (primjerice slatkovodni, Akoya,
        tahićanski, Južno more) za bisere u rasutom stanju.
    peat_level:
      name: Razina treseta
      description: Opisuje intenzitet Influence tresetnog dima na viski, od netresetnog
        do jako tresetnog.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilnost sustava pedala i kopački
      description: Određuje za koje standarde pedala ili kopački su podložna pločica
        ili klin dizajnirani, osiguravajući da kupci odaberu proizvod koji odgovara
        njihovim pedalama i cipelama.
    pedal_configuration:
      name: Konfiguracija pedala
      description: Označava ima li stolica jednu pedalu, podijeljene/neovisne pedale
        ili se može pretvarati.
    pedal_mounting_style:
      name: Stil montaže pedale
      description: Određuje kako se papučica ili poklopac/pločica papučice pričvršćuje
        na vozilo (način ugradnje/pričvršćivanja).
    pedal_set_components:
      name: Komponente kompleta pedala
      description: Označava koje su pedale uključene u komplet.
    pedal_spindle_material:
      name: Materijal osovine pedale
      description: Materijal korišten za osovinu/vreteno pedale što utječe na čvrstoću,
        težinu i otpornost na koroziju.
    pedal_spindle_thread_size:
      name: Veličina navoja osovine pedale
      description: Određuje standard navoja osovine pedale koja se uvrće u pogonsku
        ručicu.
    pedal_type:
      name: Vrsta pedale
      description: Opisuje stil pedala dostavljenih s biciklom, navodeći kompatibilnost
        cipela i stil vožnje.
    pellet_accessory_type:
      name: Vrsta dodatka za pelete
      description: Identificira specifičnu vrstu pribora za pelete tako da ribolovci
        mogu brzo pronaći svrdla, trake ili graničnike prema svojim potrebama za izgradnju
        opreme.
    pellet_grade:
      name: Ocjena kuglica
      description: Označava preciznost proizvodnje ili stupanj učinkovitosti airsoft
        kuglica.
    pen_ink_color:
      name: Boja tinte za olovku
      description: Označava stvarnu boju tinte koju ispušta olovka, a koja se može
        razlikovati od vanjske boje tijela.
    penalty_card_accessories_included:
      name: Pribor za kaznene kartice uključen
      description: Navodi dodatni pribor za suđenje koji je uključen uz karticu za
        kaznene bodove, kao što su digitalni novčanik, blok za bodovanje, olovka,
        kovanica, zviždaljka ili torbica.
    penalty_card_colors_included:
      name: Uključene boje kaznenih kartona
      description: Navodi boje kaznenih kartica sadržanih u proizvodnom setu.
    penalty_flag_throw_distance:
      name: Udaljenost bacanja kaznene zastavice
      description: Klasifikacija dizajna koja označava predviđeni domet bacanja zastave.
    pendant_cutter_safety_features:
      name: Sigurnosne značajke rezača privjesaka
      description: Označava integrirane sigurnosne elemente koji smanjuju slučajne
        posjekotine tijekom nošenja.
    pendant_cutter_wear_method:
      name: Metoda trošenja rezača privjeska
      description: Određuje kako se privjesak za rezanje treba nositi.
    pepper_variety:
      name: Sorta paprike
      description: Označava sortu ili vrstu paprike korištene u proizvodu, što omogućuje
        kupcu da razlikuje različite profile okusa i razine ljutine.
    percussion_case_style:
      name: Stil kutije udaraljke
      description: Klasificira cjelokupni stil/konstrukciju kutije (mekana vs. tvrda/kruta
        kutija vs. hibridna).
    percussion_instruments_included:
      name: Uključeni udaraljkaški instrumenti
      description: Navodi vrste udaraljki uključenih kada je proizvod set igračaka
        s više instrumenata.
    percussion_mallet_handle_grip_style:
      name: Stil drške čekića za udaraljke
      description: Označava vrstu obrade hvata na korisničkom imenu (iznad teksture),
        kao što je golo drvo, lakirano, gumirano hvatište ili omotano.
    percussion_mallet_head_construction:
      name: Konstrukcija glave čekića za udaraljke
      description: Opisuje način izrade/konstrukcije glave čekića (npr. omotana pređom,
        omotana filcom, gumom, sirovo drvo), koji utječe na zvuk udara i trajnost.
    perfumery_base_carrier_type:
      name: Vrsta prijenosnika parfemske baze
      description: Određuje sustav prijenosnika/otapala parfemske baze (od čega je
        baza prvenstveno napravljena za razrjeđivanje i učinkovitost).
    perfumery_base_intended_application:
      name: Parfumerijska baza namijenjena aplikacija
      description: Označava format krajnje upotrebe za koji je baza namijenjena (primjerice
        fini mirisni sprej u odnosu na roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Nosioc/otapalo parfumerijskog sastojka
      description: Označava prijevoznik/otapalo u kojem se sastojak daje, ako je razrijeđen
        (primjerice etanol, DPG, ulje jojobe).
    perfumery_ingredient_form:
      name: Oblik sastojka u parfumeriji
      description: Određuje fizički oblik/stanje sastojka parfema kako je dato.
    perfumery_ingredient_type:
      name: Vrsta sastojka u parfumeriji
      description: Klasificira parfemski sastojak prema tome što predstavlja u parfemerijskoj
        praksi (primjerice eterično ulje, aromatična kemikalija).
    perfumery_ingredient_usage_note:
      name: Napomena o korištenju sastojaka parfumera
      description: Označava tipičnu ulogu u strukturi mirisa (gornji, srednji/srčani,
        bazni), priznajući da materijali mogu obuhvaćati note.
    perfumery_ingredients:
      name: Parfemski sastojci
      description: Navodi vrste potrošnih mirisnih materijala uključenih u komplet
        (primjerice eterična ulja, mirisna ulja, alkoholna baza).
    perfumery_note_position:
      name: Položaj parfemske note
      description: Označava tipičnu ulogu sastojka u strukturi mirisa (gornji dio/srce/baza).
    persimmon_variety:
      name: Sorta kakija
      description: Identificira kultivar ili sortu kakija, budući da se različite
        sorte poput Fuyu ili Hachiya razlikuju po teksturi, okusu, trpkosti i kulinarskoj
        uporabi.
    personalization_type:
      name: vrsta personalizacije
      description: Određuje može li se i kako proizvod prilagoditi za događaj (npr.
        monogram, ime/datum, umetanje fotografije).
    phonics_focus:
      name: Fokus na foniku
      description: Određuje na koju foniku i vještinu čitanja riječi cilja igračka
        za čitanje.
    physalis_variety:
      name: Sorta Physalis
      description: Identificira specifičnu botaničku vrstu, kultivar ili uobičajenu
        sortu fizalisa koja se prodaje.
    pi_ata_filler_type_included:
      name: Uključena vrsta punila za pinjatu
      description: Ako je punilo uključeno, navedite vrstu sadržaja koji je dat.
    pi_ata_hanging_method:
      name: Metoda vješanja pinjate
      description: Kako je pinjata dizajnirana za vješanje ili podupiranje (omča,
        kuka, uključena petlja itd.).
    pi_ata_opening_type:
      name: Vrsta otvaranja pinjate
      description: Kako se pristupa/zatvara otvor za punjenje (preklop, čičak, patentni
        zatvarač, prethodno zapečaćeno itd.).
    piccolo_key_system:
      name: Sustav s Piccolo ključem
      description: Označava sustav/dizajn tipki koji se koristi na pikolu (obično
        Boehmov sustav za moderne pikole).
    piccolo_keywork_features:
      name: Značajke tipkovnice Piccolo
      description: Navodi značajne mehanizme rada s tipkama i opcije na pikolu.
    pick_grip_aid:
      name: Pomoć pri hvatanju pick-upom
      description: Označava primarno ugrađeno pomagalo za hvatanje na trzalici, iznad
        općeg osjećaja/teksture površine (primjerice rupe za hvatanje, utisnuti logotip,
        gumeni umetak).
    pickleball_construction_type:
      name: Vrsta konstrukcije pickleball reketa
      description: Proizvodna izrada lopte, kao što je bešavna jednodijelna ili zavarena
        dvodijelna, što utječe na trajnost i konzistentnost leta.
    pickling_method:
      name: Metoda kiseljenja
      description: Određuje medij ili tehniku konzerviranja koja se koristi za kiseljenje,
        kao što je octena salamura ili laktofermentacija.
    pickup_and_preamp_configuration:
      name: Preuzimanje i konfiguracija predpojačala
      description: Pokazuje uključuje li viola organizaciju preuzimanja i/ili aktivno
        pretpojačalo za pojačanu učinkovitost ili snimanje.
    pickup_configuration:
      name: Konfiguracija pickupa
      description: Opisuje cjelokupni izgled električne gitare koristeći uobičajene
        skraćenice (primjerice SSS, HSS, HH).
    pickup_cover_material:
      name: Materijal poklopca pickupa
      description: Određuje primarni materijal poklopca preuzimanja (ako postoji),
        uključujući uobičajene pozlaćene završne obrade kada ih proizvođač tako navodi.
    pickup_cover_type:
      name: preuzimanje vrste naslovnice
      description: Određuje ima li električna gitara poklopac i materijal/stil poklopca
        (primjerice metalni ili plastični).
    pickup_string_spacing:
      name: preuzimanje niz razmak
      description: Standard razmaka između polova/nizova za koji je preuzimanje napravljeno
        (primjerice Fender/F-razmak vs. Gibson/standard), što utječe na poravnanje
        na gitarama opremljenim tremom.
    pie_crust_type:
      name: Vrsta kore za pitu
      description: Određuje stil ili vrstu tijesta koje se koristi za pitu ili tortu,
        kao što je prhko tijesto, tijesto od graham krekera ili tijesto bez glutena.
    piece_configuration:
      name: Konfiguracija komada
      description: Označava od koliko se zasebnih dijelova sastoji štap, osovina ili
        most, što utječe na prenosivost i stil sviranja.
    pillow_form_size:
      name: Veličina oblika jastuka
      description: Standardizirana oznaka gotove veličine za oblike/umetke za jastuke
        (npr. 18" x 18").
    pilot_helmet_communications_integration:
      name: Integracija komunikacije s pilotskom kacigom
      description: Označava uključuje li kaciga komponente zrakoplovne komunikacije
        ili je unaprijed konfigurirana za njih.
    pilot_helmet_visor_configuration:
      name: Konfiguracija vizira pilotske kacige
      description: Određuje konfiguraciju vizira/štitnika za lice koji dolazi s pilotskom
        kacigom.
    pin_attachment_type:
      name: Vrsta pričvršćenja igle
      description: Određuje mehanizam pričvršćivanja/zadnje strane koji se koristi
        za pričvršćivanje prikačena na odjeću ili površinu (primjerice leptir kopča,
        magnetska stražnja strana).
    pin_backing_type:
      name: Vrsta stražnjeg pričvršćenja
      description: Određuje mehanizam pričvršćivanja/podloge koji se koristi za pričvršćivanje
        prikačenoa na odjeću ili dodatke.
    pin_cushion_attachment_style:
      name: Stil pričvršćivanja jastučića za igle
      description: Kako se prikačeno jastuk nosi, pričvršćuje ili postavlja tijekom
        uporabe.
    pin_cushion_features:
      name: Značajke jastučića za igle
      description: Funkcionalne značajke koje nadilaze osnovno držanje igle.
    pin_face_customization_method:
      name: prikačeno lice prilagodba method
      description: Određuje kako se izrađuje dizajn prednje strane (npr. tvrda emajlirana
        boja, meka emajlirana boja, tiskana boja).
    pin_type:
      name: Vrsta igle
      description: Određuje stil ili format prikazanog proizvoda koji se koristi za
        kolekcionarske predmete sportskog navijača.
    ping_pong_certification:
      name: Certifikat za ping pong tenis
      description: Proglašava službeni standard ili razinu odobrenja upravnog tijela
        za proizvod.
    ping_pong_competition_certification:
      name: Certifikat za natjecanje Ping -pongu
      description: Označava službeni status certifikacije loptice za ping-pong za
        sankcioniranu igru (primjerice odobreno od strane ITTF-a).
    ping_pong_paddle_handle_style:
      name: Stil drške stolnoteniskog reketa
      description: Definira Shapes/stil lopatice, što utječe na udobnost hvata i tehniku
        igranja.
    ping_pong_robot_accessory_type:
      name: Vrsta pribora za robota Ping -pong
      description: Identificira funkcionalni podtip pribora kako bi kupci mogli brzo
        suziti rezultate (npr. mreže u odnosu na adaptere za napajanje).
    ping_pong_rubber_surface_type:
      name: Vrsta gumene površine za stolni tenis
      description: Identificira stil/teksturu gumene površine nanesene na reket, što
        utječe na karakteristike u svezi rotacije i brzine.
    ping_pong_rubber_type:
      name: Vrsta gume Ping -pong
      description: Određuje stil površinske izrade gumene podloge reketa za stolni
        tenis, što utječe na karakteristike igre.
    ping_pong_table_type:
      name: Vrsta stola za stolni tenis
      description: Klasificira cjelokupni stil ili format stola radi lakše usporedbe
        (npr. takmičarski, preklopiva ploča, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Metoda ozvučavanja/proizvodnje zvuka cjevastog instrumenta
      description: Određuje kako instrument proizvodi zvuk (mehanizam protoka zraka),
        što pomaže u razlikovanju Panovih frula, jezičaca i obitelji orguljskih cijevi
        u filtrima.
    piston_application_type:
      name: Vrsta primjene klipa
      description: Namijenjena uporaba/slučaj upotrebe klipa (zamjena u odnosu na
        izvedbe /trke u odnosu na teške uvjete rada).
    piston_crown_dish_style:
      name: Klipni oblik/izgled tanjura
      description: Shapes glave klipa koji utječe na volumen komore za izgaranje i
        sažimanje (primjerice ravni vrh, kupola, tanjur).
    piston_pin_retention_type:
      name: Klip prikačeno zadržavanje kupaca tip
      description: Određuje kako se klipni zglob (prikačeno) zadržava u sklopu klipa/klipnjače.
    pit_configuration:
      name: Konfiguracija jame
      description: Definira strukturni format područja za slijetanje (jednodijelni
        vs. više modula) i, posljedično, broj sekcija ili dostavljene module.
    pit_cover_type:
      name: Vrsta poklopca otvora
      description: Određuje zaštitnu površinu ili lim koji se dostavljaju sa jamicom,
        što utječe na otpornost na šiljke, zaštitu od vremenskih uvjeta i preferencije
        sportaša.
    pitahaya_flesh_color:
      name: Boja mesa pitaje
      description: Određuje boju unutarnjeg mesa pitaje (zmajevog voća) (primjerice
        bijela, crvena, magenta), ključni diferencijalni faktor koji utječe na okus,
        izgled i percipiranu nutritivnu vrijednost.
    pitch_mat_coverage_length:
      name: Duljina pokrivenosti terena
      description: Klasificira prostirku za kriket prema dijelu vratnice koji pokriva
        (npr. puni ili pola terena).
    pitch_range:
      name: Raspon terena
      description: Opisuje percipirani raspon tona/svjetlinu zvuka šejkera.
    pitch_standard:
      name: Standard visine tona
      description: Određuje standard visine tona (referentno ugađanje) za koji je
        blok-flauta izgrađena (primjerice A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Oznaka veličine gume za bacanje
      description: Označava standardnu klasifikaciju veličine terena za gumu terena,
        pojednostavljujući odabir bez potrebe da kupci znaju točne mjere.
    pitching_screen_style:
      name: Stil ekrana za bacanje
      description: Definira strukturni dizajn ekrana kako bi kupac mogao brzo odabrati
        ispravan zaštitni izgled za svoj scenarij treninga.
    pitching_target_design:
      name: Dizajn mete za bacanje
      description: Klasificira cjelokupni stil ili konfiguraciju mete za bacanje.
    pitching_wheel_count:
      name: Broj kotača za bacanje
      description: Označava broj pogonskih kotača koje koristi stroj za bacanje.
    pivot_adjustability:
      name: Podesivost okretnog zgloba
      description: Označava imaju li škare podesivi okretni vijak za podešavanje napetosti
        rezanja.
    pivot_piece_type:
      name: Vrsta pivotnog dijela
      description: Razlikuje različite oblike pivotnog sučelja, kao što su tradicionalne
        čašice ili tubularni stil.
    place_card_holder_closure_mechanism:
      name: Mehanizam zatvaranja držača kartice
      description: Određuje kako držač hvata ili učvršćuje karticu.
    place_card_orientation:
      name: Orijentacija kartice mjesta
      description: Određuje orijentaciju kartice mjesta prilikom korištenja/prikazivanja.
    place_card_printing_status:
      name: Status ispisa kartice mjesta
      description: Označava je li kartica mjesta prazna za rukopis/ispis, unaprijed
        ispisana (imena nisu personalizirana) ili personalizirana/prilagođeno ispisana.
    placket_type:
      name: Vrsta plakete
      description: Određuje stil prednjeg otvora na polo majici, uključujući broj
        guma ili alternativne zatvarače.
    planetarium_content_theme:
      name: Planetarij Sadržaj teme
      description: Primarni sadržaj prikazan planetarijskim projektorom.
    planetarium_projection_content_format:
      name: Planetarijska projekcija Sadržaj format
      description: Određuje mehanizam projekcije koji planetarij koristi (fizički
        diskovi/slajdovi u odnosu na digitalni/LED efekt).
    plant_fiber_type:
      name: Vrsta biljnih vlakana
      description: Specifična vrsta vlakana biljnog podrijetla kada je vrsta izvora
        rezanih vlakana biljka.
    plaster_gauze_finish:
      name: Završna obrada od gipsane gaze
      description: Rezultirajuća tendencija završne obrade površine nakon nanošenja
        i zaglađivanja.
    plaster_gauze_grade:
      name: Ocjena gipsane gaze
      description: Namijenjena vrsta gipsane gaze (primjerice za obrtnike/studente
        u odnosu na profesionalce).
    plaster_gauze_weave_density:
      name: Gustoća tkanja gipsane gaze
      description: Relativna otvorenost/zategnutost gaznog tkanja, što utječe na čvrstoću
        i preuzimanje gipsa.
    plastic_canvas_finish:
      name: Završna obrada od plastičnog platna
      description: Površinska/završna obrada plastične platnene role.
    plastic_canvas_sheet_finish:
      name: Završna obrada plastične platnene podloge
      description: Površinska/bridna obrada plastičnog platna.
    plastic_canvas_transparency:
      name: Prozirnost plastičnog platna
      description: Koliko je plastično platno prozirno/neprozirno.
    plate_bottom_design:
      name: Dizajn dna ploče
      description: Opisuje konstrukciju donje strane ploče, koja utječe na prianjanje,
        stabilnost i sigurnost na različitim površinama za igru.
    plate_compatibility_standard:
      name: Standard kompatibilnosti ploče
      description: Označava standard utega za koji je šipka dizajnirana (primjerice
        olimpijski 50 mm, standardni 25 mm).
    plate_installation_type:
      name: Vrsta ugradnje ploče
      description: Određuje kako je ploča pričvršćena ili postavljena na terenu (npr.
        u zemlji, sa šiljcima, za bacanje), omogućujući kupcima da biraju između trajnih
        i prijenosnih opcija.
    plate_size_category:
      name: Kategorija veličine ploče
      description: Klasificira ploču prema razini igre ili standardu propisa kako
        bi kupci mogli brzo pronaći opremu koja je u skladu s propisima lige.
    play_dough_putty_kit_contents:
      name: Sadržaj kompleta za plastelin i git
      description: Identificira glavne uključene komponente izvan samog spoja (primjerice
        alate, kalupe, ekstruder, skladište).
    play_dough_tool_set_items_included:
      name: Uključene stavke u komplet alata za plastelin
      description: Identificira vrste alata i pribor uključene u komplet alata za
        plastelin (npr. valjci, rezači, kalupi).
    play_environment_suitability:
      name: Prikladnost okruženja za igru
      description: Identificira predviđeno okruženje za komplet za igru (npr. u zatvorenom
        prostoru, na otvorenom, u vodi).
    play_food_features:
      name: Reproduciraj značajke hrane
      description: Posebne funkcionalne ili realizmične značajke stavke hrane u predstavi.
    play_food_items_included:
      name: Uključene su stavke hrane za igru
      description: Označava vrste hrane za igru koja je uključena u kuhinjski set
        za igru.
    play_food_size_scale:
      name: Igrajte vagu za veličinu hrane
      description: Označava približnu veličinu dijelova lažne hrane radi kompatibilnosti
        s kuhinjama za igru, lutkama i setovima za igru.
    play_money_set_components_included:
      name: Uključene komponente seta igraćeg novca
      description: Određuje koje su vrste komponenti uključene u skup za igru Novac/banking.
    play_pattern:
      name: Obrazac igre
      description: Primarni način korištenja igračke (primjerice vrpoljenje/ublažavanje
        stresa, skulptura/umjetnost za stolom, konstrukcija/slaganje ili slagalice).
    play_sprinkler_mounting_type:
      name: Vrsta montaže prskalice za igru
      description: Kako je prskalica za igru postavljena/osigurana tijekom uporabe.
    play_vehicle_lights_and_sounds:
      name: Reproduciraj svjetla i zvukove vozila
      description: Označava uključuje li igračka vozilo elektroničke efekte za igru
        poput svjetala i/ili zvukova.
    play_vehicle_scale:
      name: Vage za igranje vozila
      description: Označava omjer mjerila vozila za igru (uobičajeno se koristi za
        lijevane i modelne igračke vozila).
    player_size_category:
      name: Kategorija veličine igrača
      description: Definira namjeravanu veličinu/dobnu skupinu igrača kojoj odgovara
        set opreme za hvatanje (primjerice Tee Ball, Djeca, Srednja škola, Odrasli).
    player_size_range:
      name: Raspon veličina igrača
      description: Određuje predviđeni raspon veličina za remen/podršku (primjerice
        dijete, odrasli, univerzalno).
    playing_environment:
      name: Okruženje za igru
      description: Određuje primarnu površinu za igru ili kontekst za koji je hokejaška
        lopta dizajnirana.
    playing_method:
      name: Metoda igranja
      description: Primarni način na koji se instrument namjerava svirati/aktivirati.
    playing_surface_material:
      name: Materijal igraće površine
      description: Označava materijal prednje površine za sviranje cajona (tapa),
        koji snažno utječe na ton i osjećaj.
    playing_surface_type:
      name: Vrsta površine za igru
      description: Opisuje konstrukciju/osjećaj površine za igru na podlozi za vježbanje.
    playset_activities_included:
      name: Uključene aktivnosti u kompletu za igru
      description: Identificira glavne aktivnosti/komponente igre ugrađene u ljuljačku/igraonicu
        kako bi kupci lakše filtrirali što djeca mogu raditi na konstrukciji.
    playset_installation_type:
      name: Vrsta ugradnje seta za igru
      description: Određuje kako je ljuljačka/igralište instalirano ili pričvršćeno.
    playset_items_included:
      name: Uključeni elementi seta za igru
      description: Identificira vrste stavaka za igru pretvaranja uključenih u set
        za piknik (hrana, pribor za jelo, deka, košara itd.).
    pliers_jaw_style:
      name: Kliješta s čeljustima
      description: Opisuje primarnu konfiguraciju čeljusti ili funkcionalni stil kliješta.
    plum_variety:
      name: Sorta šljive
      description: Identificira specifičan kultivar ili sortu šljive, omogućujući
        kupcu da odabere na temelju okusa, boje i namjeravane kulinarske uporabe.
    plumcot_variety:
      name: Sorta plumcota
      description: Identificira specifičan kultivar ili komercijalnu sortu šljive
        (primjerice Flavor King, Dapple Dandy), što može utjecati na okus, boju i
        sezonalnost.
    plunger_mute_handle_type:
      name: Plunger mute korisničko ime tipa
      description: Određuje korisničko ime ili stil držanja koji se koristi za držanje
        i manipuliranje gumbom za utišavanje klipa za wa-wa efekte.
    pocket_closure_type:
      name: Vrsta zatvaranja džepa
      description: Definira kako je svaki džep osiguran, pomažući korisnicima da pronađu
        hlače s sigurnim prostorom za pohranu tijekom aktivnosti.
    pocket_knife_opening_mechanism:
      name: Mehanizam za otvaranje džepnog noža
      description: Kako se oštrica postavlja/otvara (ručno zarezivanje noktom, zarezivanje
        palcem, peraja, potpomognuto, automatski itd.).
    pocket_style:
      name: Džepni stil
      description: Određuje glavnu konstrukciju džepova na hlačama.
    pocket_type:
      name: Vrsta džepa
      description: Označava stil ili prisutnost džepova na odjevnom predmetu.
    pod_retention_system:
      name: Sustav pod zadržavanje kupaca
      description: Opisuje kako se paintball kapsule drže na mjestu i otpuštaju iz
        pojasa ili pakiranja.
    pogo_stick_footrest_type:
      name: Oslonac za noge tipa Pogo stick
      description: Opisuje dizajn platforme/klinčića za stopala koji se koristi za
        stajanje na pogo štapu.
    pogo_stick_suspension_type:
      name: Vrsta ovjesa za pogo štap
      description: Određuje mehanizam odbijanja pogo sticka, što utječe na osjećaj,
        trajnost i održavanje.
    poi_handle_type:
      name: Vrsta ručke poi-a
      description: Određuje stil korisničkog imena/hvatišta/pričvršćenja koji se koristi
        za držanje poija.
    poi_light_source:
      name: Izvor svjetla za poi
      description: Za osvijetljene poi točke, specificira tehnologiju rasvjete.
    poi_tether_type:
      name: Vrsta vezice za Poi
      description: Označava vrstu vezice koja spaja glavu poija s korisničkim imenom,
        gumbom ili omčom za zglob (primjerice uzica, uže, lanac).
    poi_type:
      name: Vrsta poi-ja
      description: Određuje primarnu vrstu konstrukcije/upotrebe poi-ja (primjerice
        vježba, LED, vatra).
    point_type:
      name: Vrsta točke
      description: Shapes/stil vrha korištenog na igli za vezenje.
    pointe_shoe_shank_length:
      name: Duljina špange baletne papučice
      description: Dio duljine cipele koji podržava potkoljenicu, kao što je puna
        ili duljina od 3/4.
    pointe_shoe_shank_strength:
      name: Čvrstoća drške špica
      description: Razina krutosti drške špica, koja utječe na podršku i vrijeme razrade.
    poker_accessory_storage_included:
      name: Uključen prostor za pohranu poker pribora
      description: Označava za koju dodatnu poker stavku pribor pruža namjenski prostor
        za pohranu.
    poker_chip_tray_rack_configuration:
      name: Konfiguracija poker čip tacnu/stalak
      description: Opisuje stil unutarnje organizacije stalka/posude za čips (redovi
        i kapacitet po redu).
    pole_anchoring_method:
      name: Način sidrenja stupa
      description: Definira kako je štap pričvršćen za tlo ili površinu za igru.
    pole_basket_type:
      name: Vrsta košare za štap
      description: Klasificira stil ili veličinu košare postavljene blizu vrha skijaškog
        štapa, što ukazuje na namjeravani uvjet zaštite od snijega.
    pole_connection_system:
      name: Sustav s polovima veze
      description: Identificira mehanizam koji spaja dijelove stupova, kao što su
        sustavi s elektrošokovima, niz poruka ili hub sustavi, pomažući korisnicima
        da procijene brzinu postavljanja i kompatibilnost.
    pole_system_type:
      name: Vrsta sustava stupova
      description: Opisuje strukturni sustav podrške ili stil postavljanja šatora
        (primjerice aluminijski stupovi, napuhane zračne cijevi, mjesto za planinarske
        štapove).
    police_equipment_fitment:
      name: Ugradnja opreme za policiju
      description: Određuje za koju je policijsku opremu vozilo konfigurirano ili
        unaprijed ožičeno.
    police_vehicle_equipment_package:
      name: Paket opreme za policijsko vozilo
      description: Označava policijsku specifičnu opremu uključenu u vozilo u trenutku
        prodaje.
    police_vehicle_light_siren_equipment:
      name: Oprema za svjetla/sirenu policijskog vozila
      description: Određuje koji su uređaji za upozorenje u nuždi ugrađeni u policijski
        automobil.
    police_vehicle_upfit_level:
      name: Razina opremljenosti policijskog vozila
      description: Opisuje koja je policijska oprema/dodatna oprema ugrađena na kamion.
    polish_formulation:
      name: Poljska formulacija
      description: Označava bazu formulacije/kemiju polira za hvataljke (ne metodu
        nanošenja).
    polish_purpose:
      name: Svrha poliranja
      description: Primarni namjeravani rezultat poliranja na površini instrumenta.
    pollen_level:
      name: Razina peludi
      description: Označava količinu/vjerojatnost bojanja peludi sorte ljiljana.
    polymer_clay_firmness_level:
      name: Stupanj čvrstoće polimerne gline
      description: Relativna čvrstoća/mekoća polimerne gline prije pečenja (obradivost).
    polymer_clay_translucency:
      name: Prozirnost polimerne gline
      description: Vizualna neprozirnost/prozirnost polimerne gline nakon stvrdnjavanja.
    pom_pom_handle_style:
      name: Stil ručke za pom-pom
      description: Opisuje stil ili konstrukciju korisničkog imena/hvata koji se koristi
        za držanje pompona.
    pom_pom_trim_backing_tape_material:
      name: Materijal za podlogu/traku s pomponima
      description: Označava materijal ušivene trake ili pletenice na koju su pričvršćeni
        pomponi (podloga za ukras).
    pom_pom_type:
      name: Vrsta pompona
      description: Označava nazočnost i specifičnu vrstu pompona ili bobblea na šeširu.
    pomegranate_product_form:
      name: Oblik proizvoda od nara
      description: Opisuje ponuđeni fizički oblik (cijelo voće, oguljene ljuske, koštice,
        smrznute ljuske).
    pomegranate_variety:
      name: Sorta nara
      description: Označava specifičan kultivar ili sortu ploda nara (primjerice Wonderful,
        Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Stil držača za rep
      description: Opisuje specifičnu konstrukciju ili oblik držača za rep kako bi
        kupci mogli odabrati svoj željeni stil.
    popcorn_form:
      name: Oblik za kokice
      description: Označava fizički ili oblik pripreme proizvoda kokica, kao što su
        gotovi za jelo, zrna, pakiranje u mikrovalnoj pećnici, komplet začina ili
        darivanje identifikacijski broj poreznog obveznika.
    pork_rind_form:
      name: Oblik svinjske kožice
      description: Kategorizira fizički oblik ili stil grickalica od svinjske kožice
        (primjerice kožica, čvarci, puf, peleta itd.).
    portability_features:
      name: Značajke prenosivosti
      description: Navodi ugrađene elemente koji pomažu pri premještanju, nošenju
        ili trgovini ležaljkom.
    portability_frame_type:
      name: Prenosivost/ Vrsta okvira
      description: Jesu li orkestralna zvona prijenosna/s okvirom za terenska vozila
        ili fiksna/s okvirom za koncertna vozila?
    portable_electronic_game_features:
      name: Značajke prijenosnih elektroničkih igara
      description: Ključne značajke igranja/hardvera koje uređaj podržava.
    post_surgery_stage_suitability:
      name: Prikladnost za postoperativnu fazu
      description: Označava za koju fazu oporavka (ako postoji) je odijelo namijenjeno,
        važno za medicinsko oblikovanje tijela (kupac).
    postage_stamp_format:
      name: Format poštanske marke
      description: Kako se konačna marka nudi/pakira (pojedinačna, par, traka, blok,
        arak, knjižica, zavojnica itd.).
    postmark_type:
      name: Vrsta poštanskog žiga
      description: Vrsta žiga/poštanskog žiga nazočna na korištenim konačnim markama.
    potato_cut_style:
      name: Stil rezanja krumpira
      description: Označava fizički rez ili način pripreme krumpira kada se ne prodaje
        cijeli.
    potato_intended_use:
      name: Namjena krumpira
      description: Razlikuje krumpir namijenjen za neposrednu konzumaciju od onog
        namijenjenog kao sjemenski krumpir ili smrznuti prerađeni proizvodi.
    potato_variety:
      name: Sorta krumpira
      description: Određuje kultivar/sortu krumpira, što omogućuje kupcima da pronađu
        određene vrste kao što su „Yukon Gold“, „Maris Piper“ ili „Purple Majesty“.
    pottery_clay_firing_required:
      name: Potrebno je pečenje gline za keramiku
      description: Zahtijeva li materijal pečenje u peći kako bi postigao željenu
        konačnu tvrdoću/završnu obradu.
    pottery_slip_application_method:
      name: Metoda nanošenja keramičkog premaza
      description: Određuje namjeravanu tehniku primjene za listić.
    pottery_slip_compatible_clay_body:
      name: Glineno tijelo kompatibilno s lončarskim listićem
      description: Označava vrstu(e) glinenog tijela s kojim je pločica dizajnirana
        da odgovara ili s kojima može raditi.
    pottery_slip_form:
      name: Kalupa za keramiku
      description: Označava prodaje li se premaz kao tekućina spremna za uporabu ili
        kao suha mješavina/prah koji zahtijeva miješanje.
    pouch_design:
      name: Dizajn torbice
      description: informacije o konstrukciji ili značajkama poboljšanja prednjeg
        područja džepa.
    pouch_style:
      name: Stil torbice
      description: Određuje dizajn prednjeg dijela džepa, adresirajući udobnost, podršku
        i estetske preferencije.
    powdered_beverage_variety:
      name: Vrsta instant napitka u prahu
      description: Klasificira proizvod prema vrsti napitka koji priprema (primjerice
        limunada, sportski napitak, proteinski shake).
    power_rack_style:
      name: Stil Power Stalak
      description: Određuje cjelokupni dizajn/konfiguraciju stalaka, pomažući kupcu
        da razlikuje pune kaveze, polustalak i varijantu koja štedi prostor.
    power_steering_fluid_formulation:
      name: Formulacija tekućine za servo upravljač
      description: Opća porodica formulacija tekućine (na bazi ATF-a u odnosu na namjensku
        hidrauličku/CHF u odnosu na univerzalnu), koja se koristi za filtriranje visoke
        razine kompatibilnosti.
    practice_mute_audio_output:
      name: Izlaz zvuka prigušivanje pri vježbi
      description: Određuje vrstu audio izlaza veza raspoloživog na prigušivaču za
        vježbu za praćenje i/ili snimanje (uobičajeno kod tihih/elektroničkih prigušivača
        za vježbu).
    practice_mute_intonation_impact:
      name: Vježbajte utjecaj nijeme intonacije
      description: Opisuje očekivani učinak ugađanja/intonacije pri korištenju vježbenog
        prigušivanja.
    practice_mute_venting_valve_type:
      name: Vježbajte prigušeno odzračivanje/tip ventila
      description: Određuje je li i kako se uređaj za utišavanje tijekom vježbanja
        ventilira ili uključuje podesivi ventil za promjenu otpora/glasnoće.
    practice_pad_features:
      name: Značajke vježbovne podloge
      description: Istaknite funkcionalne značajke podloge za vježbanje pored veličine/materijala.
    practice_pad_mounting_style:
      name: Stil montaže jastučića za vježbanje
      description: Označava kako se podloga za vježbanje treba postaviti ili pričvrstiti
        tijekom uporabe.
    practice_pad_rebound_level:
      name: Razina odskoka jastučića za vježbanje
      description: Označava relativni odskok/odziv jastučića za vježbanje u usporedbi
        s tipičnim membranama za bubnjeve.
    practice_pad_surface_configuration:
      name: Vježbajte konfiguraciju površine jastučića
      description: Opisuje ima li jastučić jednu ili više površina za igranje i razlikuju
        li se po osjećaju.
    pregnancy_stage_suitability:
      name: Prikladnost za stadij trudnoće
      description: Označava za koju fazu trudnoće ili postporođajnu fazu (faze) je
        odjevni predmet namijenjen.
    preparation_state:
      name: Stanje pripreme
      description: Označava stupanj pripreme ili kuhanja potreban prije konzumacije.
    preparation_style:
      name: Stil pripreme
      description: Definira stanje reza ili obrade vodenih kestena prilikom prodaje
        (npr. cijeli, narezani, pečeni, smrznuti).
    preservation_medium:
      name: Medij za očuvanje
      description: Određuje primarnu tekućinu ili medij u kojem se masline ili kapari
        konzerviraju (primjerice salamura, maslinovo ulje, ocat).
    presser_foot_attachment_method:
      name: Metoda pričvršćivanja pritisne stopice
      description: Označava kako se pritisna stopica šivaćeg stroja pričvršćuje na
        držač/prihvat stopice (primjerice pričvršćivanje na kopču u odnosu na pričvršćivanje
        vijcima), što utječe na kompatibilnost.
    pressure_gauge_type:
      name: Vrsta manometra
      description: Označava vrstu manometra koji dolazi s pumpom za bicikl, ako postoji.
    pressure_measurement_unit:
      name: Jedinica za mjerenje tlaka
      description: Označava jedinicu koja se koristi za očitavanje ili kalibraciju
        senzora tlaka, korisno za usporedbu proizvoda i osiguravanje kompatibilnosti
        mjerača/ECU-a.
    pressure_plate_balance_type:
      name: Pritisna ploča saldo tipa
      description: Označava je li tlačna ploča interno saldo ili zahtijeva/pretpostavlja
        vanjski saldo koji odgovara postavkama motora/zamašnjaka.
    pressure_plate_components_included:
      name: Uključene komponente tlačne ploče
      description: Što je uključeno u oglas s tlačnom pločom.
    pressure_sensor_application:
      name: Primjena senzora tlaka
      description: Identificira sustav vozila/mjernu točku za koju je osjetnik tlaka
        dizajniran.
    pressure_sensor_port_thread_standard:
      name: Standard utora/navoja osjetnika tlaka
      description: Određuje standard mehaničkog priključka/niz poruke koji se koristi
        za ugradnju osjetnika u sustav vozila.
    pressurization_method:
      name: Metoda tlačenja
      description: Označava kako se stvara ili održava tlak unutar uređaja.
    pretend_housekeeping_set_items_included:
      name: Uključene stavke kompleta za simulirano čišćenje
      description: Navodi koji pribor za kućanstvo je uključen u set (primjerice krpa
        za brisanje, metla, lopatica za smeće, boca s raspršivačem).
    pretend_play_electronic_features:
      name: Elektroničke značajke igranja glume
      description: Elektroničke/interaktivne značajke uključene u proizvod za igru
        pretvaranja.
    pretend_play_set_pieces_included:
      name: Uključeni dijelovi za igranje pretvaranja
      description: Ključni rekviziti/komponente uključene u set za igru pretvaranja
        (primjerice blagajna, igračka hrana, alati).
    pretend_play_set_theme:
      name: Tema kompleta za igranje pretvaranja
      description: Primarni scenarij/tema igre pretvaranja koju proizvod predstavlja
        (korisno za međusobna otkrivanja za svu djecu u igri pretvaranja).
    pretzel_coating:
      name: Premaz od pereca
      description: Označava sve vanjske začine ili premaze nanesene na perec, a obuhvaća
        i slane (posoljene, začinjene) i slatke (čokolada, jogurt, karamela) opcije.
    pretzel_shape:
      name: Pretzel oblik
      description: Određuje fizički oblik pereca (primjerice uviti se, zalijepiti
        se, zagristi), ključni diferencijalni znak koji korisnici koriste prigodom
        pretraživanja ili filtriranja.
    primary_component_material:
      name: Primarni sastavni materijal
      description: Primarni materijal bloka motora.
    primary_dish_application:
      name: Primarna aplikacija za jelo
      description: Označava glavno jelo ili pripremu za koju je tijesto namijenjeno.
    primary_plant_base:
      name: Primarna biljna baza
      description: Označava glavni nemliječni sastojak(ke) koji se koristi za izradu
        alternative sira.
    primary_plant_protein_source:
      name: Primarni izvor biljnih proteina
      description: Identificira glavni biljni sastojak koji osigurava proteine u proizvodu.
    primary_sweetener_source:
      name: Primarni izvor sladila
      description: Identificira biljku ili sirovinu od koje je sirup dobiven.
    print_placement:
      name: Položaj printa
      description: Označava gdje se na majici nalazi glavna grafika/logotip.
    print_technique:
      name: Tehnika tiska
      description: Određuje metodu ukrašavanja/tiska koja se koristi na grafici majice.
    printable_canvas_intended_use:
      name: Namjeravana uporava platna za ispis
      description: Primarna aplikacija za koju je optimizirano platno za ispis.
    printable_fabric_format:
      name: Format tkanine za ispis
      description: Određuje kako se ispisivi pamuk koj je dostavljen (pojedinačni
        listovi u odnosu na kontinuiranu rolu), što utječe na uvlačenje papira pisača
        i rad projekta.
    prism_material:
      name: Materijal prizme
      description: Određuje materijal samog optičkog elementa (prizma), što utječe
        jasnoću, trajnost i otpornost na ogrebotine.
    prisoner_transport_configuration:
      name: Konfiguracija prijevoza zatvorenika
      description: Određuje je li i kako je kombi konfiguriran za prijevoz pritvorenika/zatvorenika.
    prisoner_transport_partition_type:
      name: Vrsta pregrade za prijevoz zatvorenika
      description: Vrsta unutarnje pregrade/kaveza koji odvaja prednji i stražnji
        odjeljak.
    privacy_or_acoustic_feature:
      name: Privatnost ili akustična značajka
      description: Određuje ugrađene elemente za privatnost ili akustiku kao što su
        pregradne ploče, akustični zasloni ili potpuni zatvoreni prostori.
    processing_state:
      name: Faza obrade
      description: Jesu li perja sterilizirana/oprana ili na drugi način pripremljena
        za zanatsku uporabu.
    produce_grade:
      name: Kvaliteta proizvoda
      description: Klasificira ocjenu kvalitete dodijeljenu kiviju na temelju veličine,
        izgleda i uvjeta.
    produce_growth_stage:
      name: Faza rasta proizvoda
      description: Određuje fazu rasta u kojoj se proizvod prodaje (npr. mikrozelenilo,
        mladi list, zreli list, živa biljka, sjeme).
    produce_washing_state:
      name: Proizvodi stanje pranja
      description: Označava je li zeleno povrće oprano i spremno za jelo.
    profile_shape:
      name: Profil/oblik
      description: Ukupna zakrivljenost/profil činele (koliko strmo se uzdiže od ruba
        do zvona).
    projectile_ammunition_type:
      name: Vrsta projektila/streljiva
      description: Navodi vrstu projektila ili potrošnog materijala koje koristi igračka,
        ako je primjenjivo.
    projectile_finish:
      name: Završetak projektila
      description: Određuje bilo koji površinski premaz nanesen na BB, koji poboljšava
        kod otpornosti na koroziju ili vidljivosti (npr. bakreni premaz, pocinčano,
        obojeno).
    projectile_type:
      name: Vrsta projektila
      description: Označava vrstu projektila koju proizvod koristi ili za koju je
        namijenjen.
    pronation_support:
      name: Podrška za pronaciju
      description: Označava vrstu hoda ili pronacijskog obrasca kojem je tenisica
        namijenjena.
    propellant_type:
      name: Vrsta pogonskog goriva
      description: Određuje pogonsko gorivo za koje je dio ili pribor namijenjen.
    propeller_blade_cup:
      name: Šalica lopatice propelera
      description: Označava količinu zakrivljenja (uvijanja stražnjeg ruba) na lopaticama.
    propeller_hub_type:
      name: Vrsta glavčine propelera
      description: Određuje sustav glavčine/čahure koji koristi propeler (zamjenjiva
        kompletna glavčina u odnosu na utisnutu).
    propeller_rotation:
      name: Rotacija propelera
      description: Određuje smjer rotacije propelera.
    protectant_formula_base:
      name: Baza formule zaštite
      description: Određuje osnovnu formulaciju zaštitnog sredstva koja utječe na
        sjaj, osjećaj i čišćenje (primjerice na bazi vode u odnosu na na bazi otapala).
    protection_coverage_area:
      name: Područje pokrivenosti zaštitom
      description: Označava koje dijelove sata pokriva zaštitni dodatak.
    protection_level:
      name: Razina zaštite
      description: Označava predviđenu razinu zaštite kutije za transport i trgovinu
        instrumentom.
    protective_case_interior_protection_type:
      name: Zaštitna kutija unutarnja zaštita tipa
      description: Opisuje glavnu metodu unutarnje zaštite koja se koristi za osiguranje
        i ublažavanje sadržaja.
    protective_case_shell_type:
      name: Vrsta školjke zaštitne kutije
      description: Identificira cjelokupni stil konstrukcije vanjštine kutije (krutost)
        koji utječe na zaštitu od gnječenja i prenosivost.
    protective_contact_padding_material:
      name: Materijal razmaka zaštitnog kontakta
      description: Materijal korišten na kontaktnim točkama instrumenta (uložak vilice/zvona)
        za sprječavanje ogrebotina (primjerice filc, guma).
    protective_cup_configuration:
      name: Konfiguracija zaštitne čašice
      description: Određuje je li zaštitna čašica uključena, može li se ukloniti ili
        odjevni predmet ima samo džep za čašicu.
    protective_eyewear_standard_compliance:
      name: Usuglašenost sa standardima za zaštitne naočale
      description: Određuje sigurnosne standarde ili standarde otpornosti na udarce
        ili certifikate koje naočale zadovoljavaju ili premašuju za sportsku uporabu.
    protective_gear_certification_standard:
      name: Standard certifikacije zaštitne opreme
      description: 'Označava sigurnosni/certifikacijski standard kojem je oprema sukladna
        (razlikuje se ovisno o vrsti stavke: standardi za kacige, standardi za odijela,
        standardi za zaštitu od udaraca).'
    protective_gear_items_included:
      name: Uključene stavke zaštitne opreme
      description: Navodi pojedinačne dijelove sadržane u višedijelnom setu zaštitne
        opreme.
    protective_gear_padding_type:
      name: Zaštitna oprema tipa razmak u podnožju
      description: Određuje vrstu razmaka u podnožju koji se koristi u zaštitnoj opremi
        za zaštitu od udaraca.
    protective_gear_safety_certifications:
      name: Sigurnosni certifikati za zaštitnu opremu
      description: Navodi priznate sportske sigurnosne ili standarde učinkovitosti
        koje proizvod zadovoljava, kao što su NOCSAE ili ASTM standardi za kacige
        za hokej na travi.
    protective_pad_components_included:
      name: Uključene komponente zaštitne podloge
      description: Određuje koje su specifične zaštitne stavke uključene u višedijelni
        set kako bi kupac točno znao koji su dijelovi tijela pokriveni.
    protective_shorts_intended_use:
      name: Namjeravana uporaba zaštitnih kratkih hlača
      description: Zaštitne kratke hlače su primarna disciplina vožnje/trkanja za
        koju su namijenjene.
    protective_shorts_padding_type:
      name: Vrsta podstava zaštitnih hlačica
      description: Određuje konstrukciju/format zaštitnih elemenata korištenih u kratkim
        hlačama.
    protective_shorts_padding_zones:
      name: Zone podstava zaštitnih hlačica
      description: Označava koja područja tijela imaju integrirani jastučić/zaštitu
        u zaštitnim kratkim hlačama.
    protective_treatment:
      name: Zaštitni tretman
      description: Označava bilo koju zaštitnu završnu obradu ili tretman koji se
        primjenjuje za otpornost na mrlje, vodu ili UV zračenje (npr. Teflon).
    protector_coverage_area:
      name: Područje zaštitne pokrivenosti
      description: Određuje koje područje trupa treba pokriti štitnik (primjerice
        prsa, leđa, bokovi).
    puck_bottom_style:
      name: Stil dna paka
      description: Opisuje donji profil paka, koji Influence brzinu i kontrolu na
        različitim površinama za shuffleboard.
    puck_type:
      name: Vrsta paka
      description: Klasificira funkcionalni stil ili namjeravanu uporabu hokejaškog
        paka, od službene igre do kolekcionarskih suvenira.
    pull_buoy_style:
      name: Stil izvlačeće plutače
      description: Označava funkcionalni stil ili konfiguraciju pull-bove, kao što
        je standardna, gležanj ili pull-kick combo.
    pull_through_weight_material:
      name: Materijal utea za provlačenje
      description: Za štapiće koji se provlače, označava materijal utega koji se koristi
        za vođenje štapića kroz instrument.
    pulp_content:
      name: Sadržaj pulpe
      description: Označava količinu voćne ili povrtne pulpe nazočne u napitku.
    pump_accessories_included:
      name: Uključeni pribor za pumpu
      description: Navodi dodatne dostavljene stavke s kugličnom crpkom kako bi kupci
        mogli razumjeti sadržaj paketa.
    pumping_compatibility:
      name: Kompatibilnost s pumpanjem
      description: Označava je li grudnjak za dojenje dizajniran za pumpanje i hranjenje
        bez uporabe ruku.
    punch_pad_type:
      name: Vrsta bušilice
      description: Određuje dizajn ili stil podloge za udaranje/trening kako bi kupci
        mogli odabrati ispravnu podlogu za svoje potrebe treninga.
    punching_training_bag_shape:
      name: Oblik vreće za udaranje/trening
      description: Određuje geometrijski stil teške vreće, pomažući kupcima da odaberu
        modele prikladne za određene vježbe udaranja (npr. aperkate, udarce u tijelo).
    puncture_protection_technology:
      name: Tehnologija zaštite od probijanja
      description: Navodi sve vlasničke ili generičke slojeve protiv probijanja ili
        tehnologije ojačanja bočnice/kuka ugrađene u gumu (primjerice EXO, SnakeSkin,
        Kevlar pojas).
    puppet_features:
      name: Značajke lutke
      description: Highlight funkcionalne ili učinkovite značajke lutke (primjerice
        pomična usta, zvučni efekti, reverzibilnost).
    puppet_puppet_theater_accessory_type:
      name: Vrsta dodatka za kazalište lutaka
      description: Određuje o kakvoj se vrsti pribora radi (npr. scenski rekvizit,
        kostim lutke, upravljačka šipka, zamjenski mehanizam).
    purity_unit:
      name: Jedinica čistoće
      description: Kako se izražava čistoća kovanice (finoća vs. karat).
    push_up_bar_design:
      name: Dizajn šipke za sklekove
      description: Označava funkcionalni stil dizajna šipki za sklekove (primjerice
        fiksne, rotirajuće, paralete).
    pushrod_end_type:
      name: Vrsta kraja potisne šipke
      description: Određuje stil kraja/priključka potisne šipke koji se koristi na
        sučelju papučice ili glavnog cilindra.
    putty_glow_activation_method:
      name: Metoda aktivacije sjaja kita
      description: Kako se kit puni/aktivira da svijetli (primjerice sunčeva svjetlost,
        UV/crna svjetlost).
    putty_glow_color:
      name: Boja sjaja kita
      description: Identificira boju koju kit emitira kada svijetli u mraku.
    putty_inclusions:
      name: Uključci kita
      description: Značajni su dodaci unutar kita (primjerice šljokice, konfeti, pjenaste
        perle).
    putty_texture:
      name: Tekstura kita
      description: Primarno obradno ponašanje kita (primjerice odskočnost, rastezljivost,
        tekućina).
    puzzle_accessory_features:
      name: Značajke dodataka za slagalice
      description: Funkcionalne značajke i elementi dizajna pribora za slagalice (razlikuje
        se ovisno o vrsti pribora).
    pyrometric_cone_range:
      name: Raspon pirometrijske konusne strukture
      description: Preporučeni pirometrijski konus(i) za pečenje glazure (primjerice
        konus 06–04, konus 5–6).
    quarter_panel_coverage_type:
      name: Vrsta pokrivenosti zadnjeg blatobrana
      description: Određuje koliki dio površine tromjesečja panela proizvod zamjenjuje/popravlja.
    quarter_panel_set_contents:
      name: Sadržaj kompleta zadnjeg blatobrana
      description: Određuje konfiguraciju paketa zadnjeg blatobrana uključenu u oglas
        (jedna strana, par ili s dodatnim dijelovima za popravak).
    quilting_ruler_markings:
      name: Oznake na ravnalu za prošivanje
      description: Određuje vrste tiskanih oznaka na ravnalu za prošivanje koje se
        koriste za rezanje/poravnavanje.
    quilting_ruler_non_slip_feature:
      name: Protivklizna značajka ravnala za prošivanje
      description: Označava ima li ravnalo protukliznu podlogu/površinski tretman
        za smanjenje pomicanja na tkanini.
    quilting_ruler_transparency:
      name: Prozirnost ravnala za prošivanje
      description: Označava prozirnost/vidljivost materijala ravnala za vidjeti tkaninu
        i oznake ispod.
    quilting_thread_usage:
      name: Korištenje niz poruka za prošivanje
      description: Označava namjeravanu aplikaciju za prošivanje za niz poruke (kako
        se namjerava koristiti).
    quilting_thread_weight_system:
      name: Sustav težine konca za prošivanje
      description: Određuje sustav ocjenjivanja veličine navoja/težine koji se koristi
        za izražavanje debljine navoja (npr. wt, Tex, Denier), tako da se numerička
        veličina može ispravno protumačiti.
    quince_variety:
      name: Sorta dunje
      description: Identificira specifičan kultivar ili sortu dunje, budući da se
        okus, aroma i kulinarska prikladnost mogu razlikovati ovisno o sorti.
    quinoa_variety:
      name: Sorta kvinoje
      description: Identificira specifičnu boju ili sortu kvinoje, budući da različite
        sorte imaju različite okuse, teksture i vrijeme kuhanja.
    quinto_tuning_system:
      name: Sustav ugađanja Quinto
      description: Kako je kvinto ugođen/napet.
    race_car_class:
      name: Klasa trkaćih automobila
      description: Natjecateljska klasa/kategorija za koju je automobil izgrađen (pravilnik/homologacijska
        grupa).
    racing_balaclava_face_opening_style:
      name: Stil otvaranja lica balaklave za utrku
      description: Konfiguracija otvora za lice balaklave, koja utječe na pristajanje
        kacige, brtvljenje i udobnost.
    racing_balaclava_neck_coverage_length:
      name: Duljina pokrivanja vrata balaklave za utrku
      description: Duljina pokrivanja suknje/draperije oko vrata dizajnirana za uvlačenje
        u odijelo/zaštitu za vrat radi brtvljenja i zaštite.
    racing_balaclava_ventilation_zones:
      name: Ventilacijske zone za trkaće balaklave
      description: Označene prozračne/mrežaste ili ventilirane zone položaja za poboljšanje
        protoka zraka ispod kacige.
    racing_chest_guard_intended_use:
      name: Namjena štitnika za prsa za trkaće utrke
      description: Primarna disciplina motosporta ili kontekst za koji je štitnik
        za prsa dizajniran.
    racing_chest_guard_size_type:
      name: Vrsta veličine štitnik za prsa za utrku
      description: Označava je li proizvod veličine za mlade, odrasle ili je univerzalan/podesiv.
    racing_glove_certification_standard:
      name: Standard certificiranja trkaćih rukavica
      description: Navodi sigurnosni certifikat/standard kojem su u skladu trkaće
        rukavice (npr. FIA, SFI, CE) i opcionalno ocjenu/razinu kada je primjenjivo.
    racing_goggles_lens_system:
      name: Sustav leća za trkaće naočale
      description: Određuje sustav zamjene leća/spremnosti za kidanje koji podržavaju
        naočale.
    racing_helmet_certification_standard:
      name: Standard certificiranja motociklističke kacige
      description: Sigurnosni certifikati koje kaciga za utrke ispunjava.
    racing_kart_brake_type:
      name: Vrsta kočnice za karting
      description: Tip primarnog kočionog sustava ugrađenog u karting.
    racing_kart_class:
      name: Klasa kartinga
      description: Klasa natjecanja ili skup pravila kojih se karting mora pridržavati.
    racing_kart_frame_material:
      name: Materijal okvira za karting
      description: Primarni materijal okvira/šasije za karting.
    racing_kart_seat_size:
      name: Veličina sjedala za karting
      description: Oznaka veličine karting sjedala koja se koristi za pristajanje.
    racing_neck_support_style:
      name: Stil podrške za trkaći vrat
      description: Strukturni stil trkaće podrške/naramenice za vrat i kako se ona
        spaja s torzom/kacigom vozača.
    racing_suit_certification_standard:
      name: Standard certificiranja trkaćeg odijela
      description: Navodi certifikat/homologaciju sigurnosti utrka koju odijelo zadovoljava
        (primjerice FIA ili SFI standardi).
    racing_suit_cuff_design:
      name: Dizajn manžete odijela za utrku
      description: Vrsta manžete za gležanj/zapešće koja se koristi za spajanje s
        rukavicama/čizmama i poboljšanje brtvljenja/udobnosti.
    racing_suit_size_system:
      name: Sustav veličina trkaćeg odijela
      description: Sustav veličina koji se koristi za odijelo (primjerice Alpha S-XXL,
        Numeric EU/US, Youth).
    racing_truck_discipline:
      name: Disciplina utrka kamiona
      description: Određuje primarnu trkaću disciplinu/format u kojem je kamion izgrađen
        za natjecanje.
    rack_side_configuration:
      name: Konfiguracija bočne strane nosača
      description: Označava jesu li prostirke za stalak trgovine na jednoj ili obje
        strane, što utječe na učinkovitost prostora i pristup.
    rack_system_configuration:
      name: Konfiguracija sustava stalka
      description: Opisuje cjelokupni izgled/oblike stalaka sustava tamburaste stalake.
    racket_dampener_type:
      name: Vrsta prigušivača reketa
      description: Određuje mehanizam ugradnje ili funkcionalni stil prigušivača vibracija
        reketa.
    racket_grip_size:
      name: Veličina gripa reketa
      description: Određuje klasifikaciju veličine reketa na temelju opsega (primjerice
        G1–G6) kako bi se osiguralo pravilno pristajanje ruci i udobnost.
    racket_sport_shoe_court_surface:
      name: Površina terena za tenisice s reketima
      description: Određuje površinu teniskog terena za koju je tenisica dizajnirana
        ili optimizirana, pomažući igračima da odaberu obuću s pravim uzorkom potplata
        i gumenom smjesom za svoju tipičnu površinu za igru.
    racket_string_pattern:
      name: Uzorak žica reketa
      description: Određuje broj glavnih i poprečnih zupčanika u ležištu zupčanika
        (primjerice 16 x 18), koji utječe na kontrolu, rotaciju i izdržljivost.
    racket_stringing_status:
      name: Status špane reketa
      description: Označava prodaje li se reket s niskom žicom, bez žice ili prije
        nego što je bio s niskom žicom.
    racket_weight_class:
      name: Težinska kategorija reketa
      description: Pruža standardne badmintonske „U" težinske kategorije, omogućujući
        igračima da odaberu rekete unutar svog željenog raspona težine.
    racquet_toy_set_equipment_included:
      name: Uključena oprema za komplet igračaka s reketima
      description: Navodi koje su stavke uključene u igračku ili komplet (npr. mreža,
        lopte, reketi).
    racquetball_squash_training_aid_type:
      name: Vrsta pomagala za trening racquetballa i squasha.
      description: Klasificira određenu vrstu pomagala ili pribora za trening kako
        bi kupci mogli brzo pronaći stavku koja im je potrebna.
    radiator_cap_gasket_material:
      name: Materijal brtve čepa hladnjaka
      description: Materijal brtve (brtvi) korištene na čepu hladnjaka.
    radiator_cap_pressure_relief_style:
      name: Čep hladnjaka s funkcijom rasterećenja tlaka
      description: Određuje način rada čepa hladnjaka za smanjenje tlaka/odzračivanje/aktiviranje,
        što može utjecati na obradu, sigurnost i namjeravanu primjenu.
    radiator_expansion_tank_cap_application:
      name: Primjena čepa hladnjaka/ekspanzijske posude
      description: Označava je li čep namijenjen za grlo za punjenje hladnjaka ili
        za ekspanzijsku/preljevnu posudu rashladne tekućine.
    radiator_fan_control_type:
      name: Vrsta upravljanja ventilatorom hladnjaka
      description: Određuje kako se upravlja/pokreće ventilator hladnjaka.
    radiator_fan_mounting_pattern:
      name: Shema montaže ventilatora hladnjaka
      description: Određuje način/uzorak montaže koji se koristi za pričvršćivanje
        ventilatora ili sklopa ventilatora.
    radiator_fan_type:
      name: Vrsta ventilatora hladnjaka
      description: Određuje funkcionalni tip/konfiguraciju sklopa ventilatora hladnjaka.
    radiator_hose_end_type:
      name: Vrsta kraja crijeva hladnjaka
      description: Određuje primarni stil veze/brtvljenja koji se koristi na kraju(ovima)
        crijeva hladnjaka za spajanje s priključcima hladnjaka/motora.
    radiator_hose_position:
      name: Položaj crijeva hladnjaka
      description: Funkcionalni položaj/vrsta crijeva hladnjaka unutar sustava hlađenja.
    radiator_hose_shape:
      name: Oblik crijeva za hladnjak
      description: Ukupna geometrija/faktor oblika crijeva korišten za usmjeravanje
        i pristajanje instalacije.
    radiator_overflow_tank_level_sensor_provision:
      name: Osiguravanje osjetnik razine preljevnog spremnika hladnjaka
      description: Označava uključuje li spremnik ili podržava li on senzor razine
        rashladne tekućine.
    radiator_overflow_tank_shape:
      name: Oblik spremnika rashladne tekućine
      description: Ukupni oblik tijela preljevnog spremnika.
    radish_variety:
      name: Sorta rotkvice
      description: Označava kultivar ili vrstu rotkvice kako bi kuppci mogli odabrati
        određeni okus, boju ili veličinu (npr. daikon, lubenica, francuski doručak).
    radius_of_hollow:
      name: Polumjer šupljine
      description: Određuje profil šuplje oštrice koji proizvodi oštrač, izražen kao
        uobičajena diskretna veličina ili ravna površina.
    rail_coverage_configuration:
      name: Konfiguracija željezničke pokrivenosti
      description: Označava koji dio(ove) dječjeg krevetića štiti navlaka, pojašnjavajući
        je li kupnja jedna prednja ploča ili višedijelni perimetarski set.
    rail_mount_standard:
      name: Standardna montaža na šinu
      description: Označava standard šine ili montažnog sučelja koji se koristi za
        pričvršćivanje pribora (primjerice nišana, svjetiljke) na zračnu pušku.
    rail_side:
      name: Strana željeznice
      description: Označava je li zamjenska šina za lijevu stranu, desnu stranu ili
        se prodaje kao par.
    rail_style:
      name: Željeznički stil
      description: Kategorizira cjelokupni dizajn ili konfiguraciju ograde (primjerice
        A-Frame, duga, savijena), što određuje mogućnosti trikova i potreban prostor.
    rail_system:
      name: Sustav željeznica
      description: Označava sučelje za montažu dodatne opreme prisutno na pištolju
        (primjerice Picatinny, M-LOK).
    rain_sensor_technology:
      name: Tehnologija senzora za kišu
      description: Princip senzora koji se koristi za detekciju vode na vjetrobranskom
        staklu.
    rain_suit_configuration:
      name: Konfiguracija kišnog odijela
      description: Označava je li proizvod jednodijelni kombinezon, višedijelni set
        ili neka druga konfiguracija.
    rainstick_construction_type:
      name: Vrsta konstrukcije kišnog štapa
      description: Opisuje kako je konstruiran kišni štap (tradicionalna kaktusna/drvena
        cijev u odnosu na moderne alternative).
    rainstick_fill_material:
      name: Materijal za punjenje kišnih štapića
      description: Određuje unutarnje punjenje koje se koristi za izradu kaskadnog
        zvuka (primjerice sjemenke, perle).
    rainstick_playing_technique:
      name: Tehnika sviranja kišnim štapićem
      description: Označava preporučenu tehniku(e) sviranja ili stil obrade koji se
        koriste za postizanje željenog efekta na kišnom štapu.
    rainstick_sound_character:
      name: Karakter zvuka kišnog štapa
      description: Opisuje cjelokupni karakter zvuka koji proizvodi kišni štap.
    raising_method:
      name: Metoda uzgoja
      description: Opisuje kako su životinje uzgajane i dorađene prije obrade (primjerice
        hranjene travom, uzgojene na ispaši, dorađene u žitaricama).
    rally_competition_class:
      name: Razred reli natjecanja
      description: Klasa tijela za sankcioniranje ili pravila prema kojima je izgrađen
        reli automobil (ako je poznata).
    rally_surface_setup:
      name: Postavljanje površine za rally
      description: Primarna površina/teren za postavljanje ili izgradnju reli automobila.
    ramp_surface_texture:
      name: Tekstura površine rampe
      description: Opisuje završnu obradu ili razinu prianjanja površine za vožnju
        rampe.
    ratchet_mounting_style:
      name: Stil montaže čegrtaljke
      description: Kako se glazbena čegrtaljka drži ili montira tijekom sviranja ili
        postavljanja.
    rattle_element_material:
      name: Materijal elementa zvečke
      description: Materijal elemenata za zveckanje (primjerice zubi/zvečke/perle)
        koji izrađuju karakteristično zujanje/zveckanje.
    rattle_type:
      name: Vrsta zvečke
      description: Označava sadrži li varalica unutarnju zvečku ili zvučnu komoru
        i, ako da, vrstu korištene zvečke.
    rc_airship_lifting_gas_type:
      name: RC zračni brod s plinom za podizanje
      description: Označava kojim plinom se namjerava napuniti ovojnica zračnog broda/cepelina
        (ako je primjenjivo).
    rc_helicopter_control_frequency:
      name: Frekvencija upravljanja RC helikopterom
      description: Radiofrekvencijski pojas koji se koristi između kontrolera i helikoptera,
        a koji utječe na otpornost na smetnje i kompatibilnost (npr. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Značajke stabilizacije helikoptera na daljinsko upravljanje
      description: Navodi značajke pomoći za stabilnost/upravljanje koje olakšavaju
        let ili dodaju mogućnost.
    rc_motorcycle_controller_type:
      name: Vrsta kontrolera RC motocikla
      description: Faktor oblika uključene voditeljske obrade.
    rc_plane_takeoff_launch_method:
      name: Metoda polijetanja/pokretanja RC aviona
      description: Kako se avion obično lansira/polijeće, što utječe na to gdje i
        kako se može koristiti.
    rc_vehicle_controller_type:
      name: RC vozilo voditelj obrade tipa
      description: Određuje faktor oblika kontrolera koji se koristi za upravljanje
        vozilom na daljinsko upravljanje.
    rc_vehicle_scale:
      name: Mjerilo RC vozila
      description: Određuje omjer mjerila (veličinu) automobila/kamiona na daljinsko
        upravljanje (primjerice 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Vrsta terena za RC vozila
      description: Označava primarni teren za koji je automobil/kamion na daljinsko
        upravljanje namijenjen.
    reach_adjustment_type:
      name: Vrsta prilagodbe dosega
      description: Označava može li se razmak između lopatice ručice i upravljača
        podesiti i, ako je podesiv, je li podešavanje bez alata ili zahtijeva alat.
    rear_axle_spacing:
      name: Razmak stražnje osovine
      description: Veličina osovine/utira za osovinu na stražnjem dijelu okvira dizajnirana
        je za prihvaćanje, što utječe na kompatibilnost s kotačima.
    rear_axle_standard:
      name: Standardna stražnja osovina
      description: Definira sučelje/format osovine koji koristi stražnji kotač (primjerice
        brzo otpuštanje, razne veličine osovine s utorom).
    rear_axle_type:
      name: Vrsta stražnje osovine
      description: Određuje sustav pričvršćivanja i promjer osovine koji se koriste
        za pričvršćivanje stražnjeg kotača na okvir.
    rear_coverage:
      name: Pokrivenost stražnjeg dijela
      description: Određuje koliki dio stražnjice prekriva donji dio bikinija (primjerice
        malo, puno).
    rear_opening_type:
      name: Vrsta stražnjeg otvaranja
      description: Opisuje stil pristupa straga ili značajku 'preklopa na stražnjoj
        strani' za praktično korištenje kupaonice, kao što je spušteno sjedalo ili
        patentni zatvarač sa stražnje strane.
    rear_seat_configuration:
      name: Konfiguracija stražnjih sjedala
      description: Određuje konfiguraciju sklopa stražnjeg sjedala za podršku ugradnje
        i odabir unutarnjeg izgleda.
    rear_view_mirror_ornament_attachment_type:
      name: Vrsta pričvršćivanja ukrasa za retrovizor
      description: Određuje kako se ukras pričvršćuje na nosač ili kućište retrovizora
        (primjerice omča, kopča, kuka).
    rearview_mirror_mount_attachment_type:
      name: Vrsta montaže/učvršćenja retrovizora
      description: Definira kako se nosač fizički pričvršćuje na sklop retrovizora
        (tijelo ili nosač retrovizora), kao što je stezaljka, kopča, remen, ljepljiva
        podloga ili nosač koji se pričvršćuje vijcima.
    rebound_board_face_type:
      name: Vrsta površine odskočne ploče
      description: Opisuje konfiguraciju površine koja određuje ponašanje odbijanja,
        kao što su ravni, kutni ili višeslojni dizajni.
    rebound_level:
      name: Razina odskoka
      description: Označava koliko se lopta odbija nakon udarca, pomažući korisnicima
        da odaberu između dizajna s ne-odskokom i dizajna s umjerenim odskokom.
    rebound_surface_configuration:
      name: Konfiguracija površine za odbijanje
      description: Određuje izgled površina za odbijanje i predvidljivost odbijanja
        (jednostrano, dvostrano ili višestrano; predvidljivo naspram nepredvidljivog).
    rebounder_design:
      name: Dizajn odskoka
      description: Definira strukturni stil ili konfiguraciju odbijajuće površine
        proizvoda.
    rebounder_design_type:
      name: Vrsta dizajna odbijača
      description: Određuje primarni mehanizam odbijanja ili stil konstrukcije trenažera
        (npr. baza od elastične vrpce, mreža s okvirom, skočna meta).
    rebounder_sides:
      name: Strane skakača
      description: Označava može li igrač koji odbija loptu vratiti s jedne ili obje
        strane.
    rebounding_mechanism_type:
      name: Vrsta mehanizma odbijanja
      description: Određuje tehnologiju koja se koristi za vraćanje paka ili lopte
        (npr. gumeni odbojnik, elastična vrpca).
    recipient_relationship:
      name: Odnos primatelja
      description: Namjeravani odnos primatelja (primjerice mama, tata, prijatelj)
        za čestitku.
    recliner_control_type:
      name: Vrsta upravljanja naslonjačem
      description: Određuje kako se upravlja mehanizmom za naginjanje (npr. ručna
        poluga, električna ploča s gumbima, daljinski upravljač).
    recliner_motion_type:
      name: Vrsta gibanja naslonjača
      description: Definira primarnu mogućnost kretanja naslonjača (npr. ljuljačka,
        klizač, okretanje, držanje za zid, podizanje).
    reclining_mechanism:
      name: Mehanizam za naginjanje
      description: Određuje mehanizam koji se koristi za upravljanje funkcijom naginjanja
        sofe.
    recommended_candle_format:
      name: Preporučeni format svijeće
      description: Označava preporučani format(e) svijeća za koje su namijenjene ove
        samoljepljive kartice s fitiljem.
    recommended_container_type:
      name: Preporučena vrsta spremnika
      description: Materijali za spremnik koji su preporučani/sigurni za gel voštane
        svijeće.
    recommended_fabric_type:
      name: Preporučena vrsta tkanine
      description: Preporučana tkanina(e) za najbolje rezultate s uzorkom šivanja.
    recommended_fabric_weight:
      name: Preporučana težina tkanine
      description: Označava preporučenu kategoriju težine tkanine za uzorak.
    recommended_food_pairing:
      name: Preporučeno uparivanje s hranom
      description: Označava primarne proteine ili jela za koja je umak namijenjen
        (primjerice piletina, svinjetina, govedina, riba, povrće).
    recommended_lane_condition:
      name: Preporučano stanje trake
      description: Označava uzorak ulja ili uljnu traku za koju je kugla dizajnirana.
    recommended_motor_impulse_class:
      name: Preporučana klasa impulsa motora
      description: Određuje preporučani ukupni razred impulsa raketnog motora za siguran/optimalan
        let.
    recommended_reading_level:
      name: Preporučena razina čitanja
      description: Označava preporučenu fazu/sposobnost čitanja za proizvod kako bi
        se pomoglo kupcu da ga uskladi s trenutnim razvojem čitanja djeteta.
    recommended_sleep_position:
      name: Preporučani položaj za spavanje
      description: Označava za koje položaje spavanja je madrac dizajniran da ih udobno
        podržava (primjerice spavanje na boku ili leđima).
    recommended_storage:
      name: Preporučano skladištenje
      description: Označava kako se proizvod treba trgovati kako bi se održala svježina.
    recommended_surfaces:
      name: Preporučene površine
      description: Određuje namjeravane površine za lijepljenje/kategorije materijala
        za ljepilo, izvan opće kompatibilnosti s rukotvorinama (primjerice samo papir
        u odnosu na više površina).
    recommended_use_case:
      name: Preporučena namjena
      description: Primarni predviđeni scenarij uporabe brtvila (privremeni/hitni
        popravak u odnosu na dugoročni popravak).
    recommended_use_location:
      name: Preporučena lokacija za uporabu
      description: Namijenjeno okruženje za klackalicu (dvorište kuće u odnosu na
        komercijalno igralište itd.).
    recommended_vehicle_surfaces:
      name: Preporučene površine za vozila
      description: Određuje površine/završne obrade vozila za koje je četka namijenjena
        da bude sigurna (npr. prozirni lak, mat/satenski lak, vinilna folija/PPF,
        staklo, kotači).
    recorder_accessories_included:
      name: Uključeni dodaci za recorder
      description: Navodi priloženu dodatnu opremu koja dolazi s izvrsnim bas snimačem.
    recorder_bore_design:
      name: Dizajn otvora za snimanje
      description: Dizajn profila unutarnjeg provrta tijela snimača.
    recorder_bore_type:
      name: Vrsta otvora recordera
      description: Određuje stil otvora snimača.
    recorder_case_shell_type:
      name: Vrsta školjke kutije za blok-flautu
      description: Opisuje strukturnu krutost kutije.
    recorder_finish:
      name: Završna obrada blok-flaute
      description: Površinska obrada/obrada tijela blok-flaute (posebno važno za drvene
        alto blok-flaute).
    recorder_hole_type:
      name: Vrsta otvora za snimač
      description: Jesu li tonske rupe jednostruke (bez dvostrukih rupa) ili uključuju
        dvostruke rupe za poboljšan kromatski prstored.
    recorder_joint_configuration:
      name: Konfiguracija zgloba snimača
      description: Opisuje koliko dijelova kućišta ima snimač, što utječe na prenosivost,
        čišćenje i zamjenu dijelova.
    recorder_joint_style:
      name: Stil zgloba blok flaute
      description: Spojni/veza stil između dijelova snimača, ako je primjenjivo.
    recorder_keywork:
      name: Tipkovnica snimača
      description: Označava uključuje li snimač tipku(e) (metalni/plastični mehanizmi)
        za niske note, tipično za tenor/bas/velike snimače.
    recorder_mouthpiece_type:
      name: Vrsta usnika recordera
      description: Opisuje je li usnik/glava snimača integrirana (jednodijelna) ili
        uklonjiva/zamjenjiva.
    recorder_pitch_standard_a4:
      name: Standardna visina tona flaute (A4)
      description: Označava referentnu visinu tona za koju je snimač izgrađen (primjerice
        A=440 Hz moderna visina tona vs. A=415 Hz barokna visina tona).
    recorder_thumb_hole_type:
      name: Vrsta rupice za palac recordera
      description: Određuje ima li snimač s jednim ili dva otvora za palac.
    recreational_vehicle_holding_tank_type:
      name: Tip spremnika za rekreacijsko vozilo
      description: Označava koje spremnike za otpad kamper ima.
    recreational_vehicle_leveling_system:
      name: Sustav za niveliranje rekreacijskih vozila
      description: Vrsta instaliranog sustava za niveliranje/stabilizaciju.
    recycled_material_content:
      name: Sadržaj recikliranog materijala
      description: Označava udio odjevnog predmeta izrađenog od recikliranih vlakana
        ili pređe.
    reed_dent_material:
      name: Materijal za udubljenje trske
      description: Materijal udubljenja/zuba osnove (elemenata koji odvajaju krajeve
        osnove), koji utječe na trajnost i abraziju pređe.
    reed_type:
      name: Vrsta trske
      description: Određuje vrstu konstrukcije trske koju koriste gajdaši i trunovi.
    reeds_included:
      name: Uključene trske
      description: Određuje koje su trske uključene u komplet škotskih gajdi (pjevačke
        i/ili dronske) i jesu li od pruća ili sintetičke.
    reefing_method:
      name: Metoda skraćivanja jedara
      description: Označava mehanizam (ako postoji) za spuštanje ili spremanje jedra
        dok je brod na vodi.
    reel_profile:
      name: Profil koluta
      description: Klasificira strukturni stil/profil tijela role za baitcasting.
    reel_seat_material:
      name: Materijal držača role
      description: Određuje materijal od kojeg je izrađeno sjedište role, što utječe
        na težinu, osjetljivost i otpornost na koroziju.
    reel_seat_type:
      name: Vrsta sjedišta role
      description: Određuje stil mehanizma za zaključavanje koji pričvršćuje rolu
        za mušičarski štap.
    reel_size_class:
      name: Klasa veličine role
      description: Veličina određena od strane proizvođača (npr. 1000, 3000, 5000)
        koja označava kapacitet špule i ukupnu konstrukciju role.
    referee_wallet_accessories_included:
      name: Dodaci za sudački digitalni novčanik uključeni
      description: Navodi dodatne stavke dostavljene uz digitalni novčanik za suca,
        kao što su crveni/žuti karton,, zapisnici ili pribor za pisanje, kako bi kupci
        znali prodaje li se novčanik kao komplet.
    refinement_level:
      name: Razina profinjenosti
      description: Označava stupanj rafiniranja ulja, što utječe na okus, boju, nutritivne
        vrijednosti i točku dimljenja.
    reflective_finish:
      name: Reflektirajući završetak
      description: Određuje tretman reflektirajuće površine disko kugle (primjerice
        zrcalna pločica u odnosu na holografske/iridescentne efekte).
    reflective_or_glow_effect:
      name: Reflektirajući ili sjajni efekt
      description: Označava ima li kugla antene efekte vidljivosti kao što su reflektirajući
        materijal, elementi koji svijetle u mraku ili svjetleći/LED elementi.
    reflective_tape_pattern:
      name: Uzorak reflektirajuće trake
      description: Opisuje konfiguraciju reflektirajuće trake na odjevnom predmetu
        koja se koristi za ispunjavanje zahtjeva vidljivosti.
    regulation_standard:
      name: Standard regulacije
      description: Određuje službeni standard ili dimenziju/certifikaciju upravljačkog
        tijela koju mreža zadovoljava.
    regulator_diaphragm_material:
      name: Materijal membrane regulatora
      description: Određuje materijal dijafragme, što utječe na kompatibilnost goriva/etanola
        (primjerice E85) i trajnost.
    regulator_port_thread_standard:
      name: Standardni navoj priključka regulatora
      description: Određuje standard broja poruka/veza koji se koristi na tijelu regulatora
        za ulazne/izlazne/povratne otvore.
    rein_features:
      name: Značajke uzde
      description: Highlight posebne funkcionalne ili sigurnosne značajke nazočne
        na uzdama.
    rein_style:
      name: Rein stil
      description: Identificira strukturni dizajn ili konfiguraciju uzdi, omogućujući
        jahačima da odaberu ispravnu vrstu za svoju disciplinu i osobne preferencije.
    reinforced_areas:
      name: Ojačana područja
      description: Označava koji su dijelovi odjeće ojačani radi otpornosti na habanje.
    reinforcement_type:
      name: Vrsta armature
      description: Konstrukcijsko ojačanje korišteno u crijevu hladnjaka za čvrstoću
        i otpornost na temperaturu/tlak.
    release_activation_method:
      name: Metoda aktivacije otpuštanja
      description: Određuje kako strijelac pokreće pomagalo za otpuštanje strelice.
    release_bearing_material:
      name: Materijal ležaja za otpuštanje
      description: Primarni materijal komponenti ležaja/prednje strane (gdje je to
        navedeno od strane proizvođača).
    release_jaw_style:
      name: Stil čeljusti za otpuštanje
      description: Opisuje dizajn čeljusti otpuštajuće glave ili kuke.
    release_strap_type:
      name: Vrsta remena za otpuštanje
      description: Označava remen ili sustav povezivanja povezan s pomagalom za otpuštanje
        luka.
    remote_control_airship_envelope_material:
      name: Materijal za ovojnicu zračnog broda na daljinsko upravljanje
      description: Određuje primarni materijal ovojnice cepelina/zračnog broda (plinski
        jastuk), različit od ukupnog materijala igračke.
    remote_control_motorcycle_scale:
      name: Mjerilo RC motocikla
      description: Razmjer motocikla na daljinsko upravljanje u odnosu na pravi motocikl
        (ako je modeliran kao vozilo u razmjeri).
    remote_control_motorcycle_terrain_suitability:
      name: Prikladnost terena za motocikle na daljinsko upravljanje
      description: Primarni teren na kojem je motocikl na daljinsko upravljanje dizajniran
        za rad.
    remote_control_motorcycle_water_resistance:
      name: Vodootpornost motocikla s daljinskim upravljačem
      description: Razina zaštite od vode za elektroniku motocikla na daljinsko upravljanje.
    remote_control_plane_kit_completion_level:
      name: Razina dovršenosti kompleta za daljinsko upravljanje avionom
      description: Označava što je uključeno i koliko je set kompletan (primjerice
        spreman za let u odnosu na zahtjeve za zasebnim odašiljačem/prijemnikom/baterijom).
    remote_control_plane_landing_gear_type:
      name: Vrsta stajnog trapa za avion s daljinskim upravljanjem
      description: Označava konfiguraciju stajnog trapa, što utječe na trajnost i
        površine za polijetanje/slijetanje.
    remote_control_plane_power_type:
      name: Vrsta napajanja zrakoplova na daljinsko upravljanje
      description: Određuje kako se avion pokreće (električni vs. žarni/plin/nitro),
        što utječe na održavanje, buku i gdje se može letjeti.
    remote_control_watercraft_features:
      name: Značajke plovila na daljinsko upravljanje
      description: Highlight ključne značajke specifične za RC plovila koje utječu
        na upotrebljivost i trajnost.
    remote_control_watercraft_propulsion_drive_type:
      name: Vrsta pogona/pogona za plovilo s daljinskim upravljanjem
      description: Određuje kako se plovilo na daljinsko upravljanje pokreće u vodi.
    remote_control_watercraft_water_environment:
      name: Vodeno okruženje za plovni objekt na daljinsko upravljanje
      description: Označava predviđene uvjete vode pri kojima plovilo na daljinsko
        upravljanje najbolje funkcionira.
    remote_keyless_system_programming_method:
      name: Metoda programiranja daljinskog sustava bez ključa
      description: Kako je daljinski upravljač/sustav programiran ili uparen s vozilom
        (primjerice postupak uvođenja u organizaciju u odnosu na profesionalni alat).
    repair_compound_type:
      name: Vrsta popravne smjese
      description: Vrsta/formulacija potrošnog materijala za popravak (primjerice
        vrsta punila za karoseriju, vrsta smole za vjetrobransko staklo, vrsta cementa/brtvila
        za čepove za gume).
    repair_kit_components:
      name: Popravak kompletnih komponenti
      description: Navodi specifične stavke uključene u komplet za popravak, omogućujući
        kupcu da razumije sadržaj i usporedi paket.
    repair_method:
      name: Metoda popravke
      description: Određuje primarni pristup popravku koji komplet koristi, kao što
        su ljepljive zakrpe ili zamjena ventila.
    replacement_part_purpose:
      name: Svrha zamjenskog dijela
      description: Označava je li stavka originalni zamjenski dio, dio za nadogradnju/performanse
        ili dodatni pribor.
    replacement_part_type:
      name: Vrsta zamjenskog dijela
      description: Identificira funkcionalnu kategoriju dijela eliptičnog trenažera,
        omogućujući kupcima filtriranje komponente koju trebaju.
    replacement_parts_availability:
      name: Dostupnost rezervnih dijelova
      description: Označava jesu li potrošni/zamjenjivi dijelovi podržani za uvijač
        konca (primjerice zamjenske kukice/žice).
    replica_gun_action_type:
      name: Vrsta mehanizma pištolja replike
      description: Određuje vrstu rada/mehanizma replike vatrenog oružja (kao što
        je prikazano), kao što je mehanizam s repeticijom ili mehanizam s polugom.
    replica_gun_firing_mechanism:
      name: Mehanizam okidanja pištolja replike
      description: Označava da li i kako replika simulira paljbu/značajke (nesmrtonosne),
        kao što su ispaljenje kapisle ili neispaljenje.
    replica_gun_moving_parts:
      name: Replika pokretnih dijelova pištolja
      description: Označava koji su dijelovi funkcionalni/pomični na replici.
    reservoir_orientation:
      name: Orijentacija rezervoara
      description: Određuje namjeravanu orijentaciju ili profil mjehura unutar pakiranja.
    reservoir_type:
      name: Vrsta rezervoara
      description: Vrsta konfiguracije spremnika za glavni cilindar spojke.
    resin_suitability:
      name: Prikladnost smole
      description: Određuje je li rukometna lopta namijenjena za uporabu sa smolom
        (ljepilom) ili ne sadrži smolu.
    resistance_adjustability:
      name: Podesivost otpora
      description: Određuje može li korisnik mijenjati otpor disanja.
    resistance_band_design:
      name: Dizajn trake otpora
      description: Opisuje fizički oblik ili stil trake otpora (primjerice petlja,
        cijev s korisničkim imenom, osmica), pomažući kupcu da odabere pravi dizajn
        za svoju rutinu vježbanja.
    resistance_loading_type:
      name: Vrsta opterećenja otpora
      description: Označava kako se otpor/uteg osigurava ili opterećuje Smithov stroj
        (npr. s pločom ili odabranim snopom utega).
    response_fields_included:
      name: Uključena polja za odgovor
      description: Određuje koja su standardna polja/opcije odgovora prisutna na kartici
        odgovora (npr. prihvati/odbij, izbor obroka).
    restoration_status:
      name: Status restauracije
      description: Označava je li kombi originalan, restauriran, restomod ili projekt
        uvjet.
    rhinestone_base_color_family:
      name: Obitelj osnovnih boja kristala
      description: Označava skupinu boja baze kristala (npr. prozirna/kristalna, zlatna/žuta,
        plava).
    rhinestone_facet_style:
      name: Filtri u stilu rhinestona
      description: Uzorak lica/fasete cirkona koji utječe na sjaj i izgled (primjerice
        Xilion ružičasti, briljantni brus, fasetirani u odnosu na glatki).
    rhinestone_hole_reinforcement_material:
      name: Materijal za ojačanje rupe kristala
      description: Materijal oko/na rupama (primjerice metalna ušica, lijevana plastika)
        što utječe na trajnost tijekom šivanja.
    rhinestone_setting_type:
      name: Vrsta postavki kristala
      description: Kako je kamen montiran/obrađen za šivanje (primjerice postavke
        sa zupcima, postavke s okvirom, postavke s rubom).
    rhubarb_product_cut_type:
      name: Vrsta reza od rabarbare
      description: Opisuje fizičku pripremu ili rezanje rabarbare.
    ribbon_construction:
      name: Konstrukcija vrpce
      description: Opisuje ključne konstrukcijske značajke grosgrain vrpce kao što
        je to je li žičana ili elastična, što mijenja njezinu uporabu (primjerice
        mašne u odnosu na šivanje).
    ribbon_packaging_type:
      name: Vrsta pakiranja vrpce
      description: Označava kako se vrpca dostavlja/prodaje.
    ribbon_pattern_style:
      name: Stil uzorka vrpce
      description: Klasificira metodu aplikacije uzorka koja se obično koristi na
        grosgrain vrpci.
    ribbon_sheen_level:
      name: Razina sjaja vrpce
      description: Označava vizualni sjaj/sjaj površine satenske vrpce.
    ribbon_style:
      name: Stil vrpce
      description: Određuje vizualni uzorak/stil vrpce (primjerice jednobojna, prugasta,
        trobojna).
    ribbon_trim_backing_type:
      name: Vrsta podloge s vrpcom/obrubom
      description: Označava ima li vrpca/obrub podlogu i kakvu (za jednostavnu primjenu).
    ribbon_trim_edge_finish:
      name: Završna obrada ruba vrpce/obruba
      description: Opisuje konstrukciju/završnu obradu ruba vrpce/obruba (korisno
        za ponašanje pri habanju i namjeravanu upotrebu).
    ric_rac_wave_size:
      name: Veličina vala Ric-rac
      description: Opisuje amplitudu/skalu vala ric-rac (koliko su veliki cik-cak
        valovi).
    rice_grain_length:
      name: Duljina zrna riže
      description: Klasificira rižu prema duljini zrna, kao što su kratko, srednje
        ili dugo zrno, što utječe na karakteristike kuhanja i kulinarsku uporabu.
    rice_processing_method:
      name: Metoda obrade riže
      description: Opisuje kako je riža obrađena ili pripremljena (primjerice parboiled,
        proklijala, pahuljicala), što utječe na vrijeme kuhanja, nutritivne vrijednosti
        i uporabu.
    rice_variety:
      name: Sorta riže
      description: Određuje specifičnu sortu ili kultivar riže, što kupcima omogućuje
        odabir žitarica s preferiranim okusom, aromom, teksturom i namijenjenom vrstom
        kuhinje.
    riding_toy_features:
      name: Značajke igračke za jahanje
      description: Highlight uobičajene funkcionalne/sigurnosne značajke specifične
        za igračke za jahanje.
    rifle_action_type:
      name: Vrsta mehanizma puške
      description: Mehanizam rada puške (kako se puni/ispaljuje/izbacuje), važan za
        identifikaciju i interes kolekcionara.
    rifle_finish:
      name: Završna obrada puške
      description: Primarna vanjska završna obrada/premaz metalne konstrukcije.
    rifle_magazine_type:
      name: Vrsta spremnika za pušku
      description: Vrsta sustava za hranjenje puške.
    rifle_stock_material:
      name: Materijal kundaka puške
      description: Primarni materijal korišten za kundak/namještaj puške (primjerice
        orah, polimer).
    rim_clamping_method:
      name: Metoda stezanja obruča
      description: Kako stroj osigurava kotač/obruč tijekom montaže i demontaže.
    rim_strip_type:
      name: Vrsta trake na naplatku
      description: Klasificira traku/vrpcu prema stilu, konstrukciji ili specifičnoj
        primjeni (npr. traka za obruč bez zračnice u odnosu na zaštitnu gumenu traku).
    rim_tubeless_compatibility:
      name: Kompatibilnost s obručem bez zračnica
      description: Označava je li naplatak, traka ili kotač namijenjen za postavljanje
        gume bez zračnice.
    ripeness_stage:
      name: Faza zrelosti
      description: Označava stupanj zrelosti voća u trenutku sniženja (primjerice
        nezrelo, zrelo, spremno za jelo).
    riser_pad_type:
      name: Vrsta podloge za podizanje
      description: Klasificira funkcionalni stil podloge (primjerice standardni odstojnik,
        amortizer, kutni klin).
    roasted_malt_processing_type:
      name: Vrsta obrade prženog slada
      description: Specifičan pristup obradi ili varijanta koja se koristi za izradu
        prženog slada ili prženog zrna (npr. prženi nesladni ječam, crni slad, oljuštena
        ili oljuštena varijanta).
    robotic_toy_interaction_mode:
      name: Način interakcije s robotskom igračkom
      description: Opisuje primarni način na koji robot interagira ili se kreće tijekom
        igre.
    robotic_toy_light_features:
      name: Značajke svjetla robotske igračke
      description: Označava koristi li igračka svjetla kao dio igre i kako (primjerice
        LED diode, projekciju).
    robotic_toy_programming_supported:
      name: Podržano programiranje robotske igračke
      description: Određuje koji programski pristup, ako ga ima, podržava igračka.
    robotic_toy_skill_level:
      name: Robotska igračka vještina razina
      description: Označava razinu složenosti rada/programiranja koja se očekuje od
        korisnika.
    robotic_toy_sound_features:
      name: Zvučne značajke robotskih igračaka
      description: Označava zvučnu mogućnost robotske igračke.
    rod_butt_style:
      name: Stil stražnjeg dijela štapa
      description: Definira konfiguraciju kraja štapa koji se koristi u trolling aplikacijama.
    rod_construction_type:
      name: Vrsta konstrukcije štapa
      description: Označava cjelokupni stil izrade štapa u smislu dijelova i sklopivosti.
    rod_guide_material:
      name: Materijal za vođicu šipke
      description: Određuje materijal koji se koristi za vođice ili umetke za najlona
        štapa za ribolov, što utječe na trajnost, težinu i trenje najlona.
    rod_guide_type:
      name: Tip vodiča za šipku
      description: Određuje primarni stil linijskog vodiča ugrađenog na štap.
    rod_handle_type:
      name: Vrsta drške štapa
      description: Određuje konfiguraciju hvata štapa za ribolov, pomažući udobnosti
        i odabiru tehnike.
    roll_cage_tubing_material:
      name: Materijal cijevi kaveza za rolete
      description: Određuje materijal/leguru cijevi koja se koristi za zaštitni kavez/zaštitni
        luk (npr. DOM čelik u odnosu na 4130 krom-molibden).
    roller_skate_brake_shape:
      name: Oblik kočnice za role
      description: Opisuje geometrijski oblik/profil glave kočnice radi učinkovitosti
        ili estetskih preferencija.
    roller_skate_brake_type:
      name: Vrsta kočnice rola-klizaljki
      description: Određuje sustav kočenja koji se koristi na rolama.
    roller_ski_technique:
      name: Tehnika skijanja na rolerima
      description: Označava tehniku skijaškog trčanja za koju su skije na role dizajnirane.
    roller_technology:
      name: Tehnologija valjaka
      description: Označava integriranu tehnologiju koja poboljšava učinkovitost masaže,
        poput vibracija ili topline.
    rolling_case_wheel_configuration:
      name: Konfiguracija kotača za kotrljanje kućišta
      description: Određuje konfiguraciju kotača koja se koristi na kutiji s rotirajućim
        glazbenim tipkama.
    rolling_paper_format:
      name: Format papira za motanje
      description: Identificira fizički izgled proizvoda (npr. ravni limovi, prethodno
        valjani konusi, omotači).
    rolling_paper_gum_type:
      name: Vrsta gume za motanje papira
      description: Određuje ljepilo (gumu) koje se koristi na rubu papira u svrhu
        brtvljenja, a koje može utjecati na ukus i učinkovitost.
    rolling_paper_size:
      name: Veličina papira za motanje
      description: Označava standardnu veličinu klasifikacije papira za motanje ili
        konusa, što omogućuje kupcima da brzo odaberu ispravnu širinu/duljinu za svoje
        potrebe.
    rolling_stock_type:
      name: Vrsta željezničkog vozila
      description: Određuje o kojoj vrsti vlaka/željezničkog vozila se radi (lokomotiva
        vs. putnički/teretni vagoni i uobičajene podvrste vagona).
    roof_cargo_net_hook_fastener_style:
      name: Stil kuke/pričvršćivača za mrežu za krovni teret
      description: Određuje stil završnog okova koji se koristi za spajanje mreže
        na sidrišne točke (primjerice S-kuka, karabiner, J-kuka).
    roof_height_class:
      name: Klasa visine krova
      description: Kategorizira visinu krova koja se obično koristi za kombije (posebno
        relevantno za konverzije/kampere).
    roof_type:
      name: Vrsta krova
      description: Konfiguracija krovnog ili stropnog dijela kućišta.
    root_variety:
      name: Sorta korijena
      description: Identificira sortu ili uobičajenu vrstu korijena (npr. hren u odnosu
        na sorte pravog wasabija).
    rope_buoyancy:
      name: Plovnost užeta
      description: Navodi je li uže dizajnirano da pluta na površini vode, pomažući
        jahačima da izbjegnu zapetljavanje i pojednostavljujući izvlačenje.
    rope_construction:
      name: Konstrukcija užeta
      description: Specificira informacije o konstrukciji vlakana iznad stila pletenice,
        kao što je upletena naspram pletene jezgre/omotača i je li uže s jezgrom i
        plaštem.
    rope_material:
      name: Materijal užeta
      description: Označava materijal užeta/konopca za ugađanje.
    rope_strand_compatibility:
      name: Kompatibilnost niti užeta
      description: Označava koje konfiguracije niti užeta osiguravajući uređaj može
        koristiti (jednostruko, pola/dvostruko, dvostruko ili kombinacije).
    rope_stretch_type:
      name: Vrsta rastezanja užeta
      description: Opisuje karakteristike istezanja užeta, razlikujući neistezljive,
        nisko rastezljive, standardne ili elastične stilove.
    rose_bloom_stage:
      name: Faza cvjetanja ruže
      description: Označava koliko su otvoreni cvjetovi ruže prilikom dostave/uručenja
        (od pupoljka do potpunog otvaranja).
    rose_grade:
      name: sorta ruže
      description: Komercijalna kvaliteta rezanih ruža.
    rosette_center_type:
      name: Vrsta centra rozete
      description: Određuje vrstu središnje informacije ili umetka na prednjoj strani
        rozete.
    rosin_dust_level:
      name: Razina prašine smole
      description: Označava očekivanu količinu prašine kolofonija koja se proizvodi
        tijekom normalne uporabi.
    rosin_formula_additives:
      name: Formula/ aditivi za smolu
      description: Identificira značajne karakteristike formulacije kao što su hipoalergene,
        mješavine s niskim udjelom prašine ili mješavine s dodatkom metala.
    rosin_hardness:
      name: Tvrdoća kolofonija
      description: Označava relativnu tvrdoću/mekoću smole za gudalo, što može utjecati
        na prianjanje i prašinu u različitim klimama i stilovima sviranja.
    rotation_mechanism_type:
      name: Vrsta rotacijskog mehanizma
      description: Određuje mehanizam koji omogućuje rotaciju užeta, što utječe na
        glatkoću i postižnu brzinu (primjerice kuglični ležajevi u odnosu na čahure).
    rotation_motion_features:
      name: Značajke rotacije/pokret
      description: Označava okreću li se ili kreću planeti/orbite i kako.
    rotor_configuration_type:
      name: Vrsta konfiguracije rotora
      description: Identificira konfiguraciju rotora i stil upravljanja RC helikoptera
        (primjerice koaksijalni, jednorotorski fiksni korak u odnosu na kolektivni
        korak, višerotorski), što značajno utječe na karakteristike leta i prikladnost
        za različite razine vještina.
    rotor_construction_type:
      name: Konstrukcija rotora
      description: Određuje stil izrade rotora, koji utječe na težinu, krutost i upravljanje
        toplinom.
    rotor_mounting_interface:
      name: Sučelje za montažu rotora
      description: Definira standard sučelja glavčine koji se koristi za pričvršćivanje
        rotora na kotač.
    rotor_mounting_standard:
      name: Standard montaže rotora
      description: Određuje standard sučelja koji se koristi za pričvršćivanje rotora
        na glavčinu (primjerice 6-vitjni ili Center Lock).
    roulette_set_components_included:
      name: Uključene komponente seta za rulet
      description: Ključne komponente povezane s ruletom uključene uz kotač/komplet.
    roulette_wheel_ball_track_type:
      name: Kuglica za rulet pratiti tipa
      description: Opisuje stil pratitija s lopticom koji se koristi na kotaču, što
        utječe na realizam i osjećaj igre.
    roulette_wheel_numbering_system:
      name: Sustav numeriranja kotača ruleta
      description: Označava numeriranje kotača ruleta i nultu konfiguraciju za kompatibilnost
        igre/koeficijenata.
    rounders_equipment_included:
      name: Uključena oprema za rounders
      description: Navodi specifične roundere stavka ili pribor koji je dostavljen
        s pomagalima za trening ili pakiranjem kako bi kupci točno znali što se nalazi
        u kutiji.
    rounders_governing_body_approval:
      name: Rounders upravno tijelo odobrenje
      description: Označava certifikaciju ili odobrenje od strane službenih organizatora
        natjecanja ili drugog sportskog upravnog tijela.
    row_counter_format:
      name: Format brojača redaka
      description: Određuje format/stil brojača redova pletenja (npr. prstenasti,
        lančani, kliker, digitalni).
    row_counter_mechanism:
      name: Mehanizam brojača redova
      description: Određuje kako se broj redaka unaprijed/zapisuje u alatu.
    row_counter_mounting_method:
      name: Način montaže brojača redova
      description: Kako se brojač/marker pričvršćuje tijekom uporabe (na iglu, na
        prst, na projektor itd.).
    rowel_type:
      name: Vrsta veslača
      description: Opisuje oblike ili profil ruba vesla za preferencije jahača i osjetljivost
        konja.
    rowing_machine_part_type:
      name: Vrsta dijela veslačkog trenažera
      description: Identificira specifičnu komponentu koju proizvod treba zamijeniti
        na veslačkom trenažeru kako bi kupac mogao brzo pronaći točno potreban dio
        bez izrade eksplozije mikrokategorija.
    rubber_ducky_character_theme:
      name: Lik/tema gumene patkice
      description: Tema ili stil lika gumene patkice (korisno za neobične/kolekcionarske
        patkice).
    rubber_ducky_features:
      name: Značajke gumene patkice
      description: Funkcionalne/dizajnerske značajke specifične za igračke u vidu
        gumenih patkica za kupanje.
    rubber_ducky_size_class:
      name: Klasa veličine gumene patkice
      description: Grupa veličina gumenih patkica prilagođena kupcima na temelju tipične
        uporabe (igračka za kadu vs. ukras za tortu vs. jumbo).
    ruffle_style:
      name: Volančići
      description: Opisuje konstrukciju ili vizualni stil volana na mašni za stolicu.
    rugby_headgear_safety_certification:
      name: Certifikat o sigurnosti pokrivala za glavu za ragbi
      description: Označava ispunjava li pokrivalo za glavu službene ragbijaške ili
        opće sportske sigurnosne standarde.
    rugby_size:
      name: Veličina ragbija
      description: Kategorizira opremu prema uobičajenoj oznaci veličine specifične
        za ragbi koja se koristi u nazivu proizvoda.
    rugby_variant:
      name: Varijanta ragbija
      description: Određuje ragbi varijantu (kod ili format) za koju je proizvod namijenjen.
    ruler_edge_type:
      name: Vrsta ruba ravnala
      description: Identificira profil ruba/funkcije ruba korištene za mjerenje ili
        označavanje (primjerice ravni rub, zakošeni rub, rub).
    ruler_marking_style:
      name: Stil označavanja ravnalom
      description: Opisuje oznake/izgled vodiča otisnute na ravnalu iznad osnovnih
        oznaka.
    runner_configuration:
      name: Konfiguracija trkača
      description: Opisuje broj i raspored saonica.
    runner_material:
      name: Materijal za trčanje
      description: Određuje materijal koji se koristi za klizače ili klizne trake
        saonica.
    saddle_cover_style:
      name: Stil navlake za sedlo
      description: Klasificira cjelokupni dizajn ili stil uporabe proizvoda (npr.
        navlaka za pohranu, navlaka za nošenje, torba za nošenje).
    saddle_design:
      name: Dizajn sedla
      description: Klasificira cjelokupni ergonomski ili reljefni dizajn/stil sjedala
        (npr. izrez, bez nosa, s podijeljenim nosom, opružno).
    saddle_discipline:
      name: Disciplina u sedlu
      description: Određuje primarnu disciplinu jahanja ili namjeravanu uporabu/stil
        sedla.
    saddle_mounting_type:
      name: Vrsta montaže sjedala
      description: Određuje sučelje između sjedala i cijevi sjedala radi kompatibilnosti
        (npr. s prečkama, pivotalno, I-greda).
    saddle_pad_shape:
      name: Oblik podloge za sjedalo
      description: Opisuje fizički kroj/obris jastučića, što utječe na kompatibilnost
        sa sjedalom i estetske preferencije.
    saddle_pad_style:
      name: Stil podloge za sedlo
      description: Identificira funkcionalni stil jastučića ili namjensku disciplinu,
        omogućujući vozačima da odaberu pravi dizajn za svoju aktivnost ili vrstu
        sjedala.
    saddle_padding_material:
      name: Materijal za podstavu sjedala
      description: Označava primarni materijal ili tehnologiju amortizacije unutar
        sjedala koja utječe na udobnost i osjećaj vožnje.
    saddle_rail_material:
      name: Materijal šina sjedala
      description: Određuje materijal koji se koristi za šine ispod sjedala bicikla,
        što utječe na čvrstoću, udobnost, težinu i cijenu.
    saddle_tree_material:
      name: Materijal okvira sjedala
      description: Određuje materijal korišten za stablo sedla, unutarnji okvir sedla.
    saddle_tree_width:
      name: Širina sedla
      description: Opisuje klasifikaciju širine sedla, određujući pristajanje grebenu
        konja.
    safety_documentation_available:
      name: Dostupna sigurnosna dokumentacija
      description: Označava koji su dokumenti o sukladnosti/sigurnosti dostavljeni
        za sastojak (primjerice sigurnosno-tehnički list, IFRA certifikat/izjava,
        izjava/deklaracija o alergenima).
    safety_equipment_included:
      name: Uključena sigurnosna oprema
      description: Sigurnosna/zaštitna stavka uključena u komplet.
    safety_features:
      name: Sigurnosne značajke
      description: Označava ugrađene sigurnosne značajke namijenjene smanjenju slučajnih
        posjekotina ili zaštiti oštrice tijekom skladištenja.
    safety_harness_type:
      name: Vrsta sigurnosnog pojasa
      description: Označava stil i konfiguraciju dječjeg pojasa za zadržavanje djece
        koji je dostavljen sa sjedalom.
    safety_mechanism_type:
      name: Vrsta sigurnosnog mehanizma
      description: Opisuje stil ugrađenog sigurnosnog sustava koji se koristi za hvatanje
        utega tijekom neuspjelih dizanja.
    safety_restraint_type:
      name: Vrsta sigurnosnog pojasa
      description: Vrsta ugrađene dječje sjedalice na ljuljački, ako postoji.
    safety_warning:
      name: Sigurnosno upozorenje
      description: Označava sadrži li proizvod uobičajena upozorenja o sigurnosti
        igračaka koja se odnose na klikere (npr. opasnost od gušenja).
    sail_shape:
      name: Shapes
      description: Opisuje geometrijski stil kajakaškog jedra, koji utječe na učinkovitost,
        obradu i montažu.
    salad_dressing_type:
      name: Vrsta preljeva za salatu
      description: Identificira osnovni stil ili teksturu preljeva (primjerice kremasti,
        vinaigrette, na bazi jogurta), pomažući kupcima da razlikuju različite baze
        i konzistencije.
    salad_topping_base_ingredient:
      name: Osnovni sastojak za preljev za salatu
      description: Određuje glavnu skupinu sastojaka koja čini nadjev, pomažući korisnicima
        da filtriraju prema nutritivnim preferencijama, alergenima ili željenoj teksturi.
    salt_level:
      name: Razina soli
      description: Označava količinu soli ili natrija dodanih orašastim plodovima
        ili sjemenkama.
    sand_cup_features:
      name: Značajke šalice za pijesak
      description: Funkcionalne/fizičke značajke pješčanika koje utječu na igru i
        korištenje.
    sand_shovel_handle_style:
      name: Stil ručke lopate za pijesak
      description: Opisuje oblik drške/hvata na kraju drške lopate.
    sand_toy_set_pieces_included:
      name: Uključeni dijelovi seta igračaka za pijesak
      description: Navodi vrste komponenti igračaka za pijesak uključenih u komplet
        (npr. kanta, lopata, kalupi) kako bi kupci lakše usporedili komplete po onome
        što sadrže.
    sand_water_mill_items_included:
      name: Uključene su stavke za pijesak i mlin na vodu
      description: Navodi ključne dodatne komponente uključene u igračku mlin (kante,
        žlice, kalupe itd.).
    sandbag_style:
      name: Stil vreće s pijeskom
      description: Identificira specifičan dizajn i namjeravanu uporabu vreće s pijeskom
        za trening (primjerice bugarski, strongman, power), pomažući kupcima da odaberu
        između različitih modaliteta treninga.
    sandbox_bottom_type:
      name: Vrsta dna pješčanika
      description: Vrsta konstrukcije baze/dna koja se koristi ispod pijeska.
    sandbox_drainage_type:
      name: Vrsta drenaže u pješčaniku
      description: Način na koji pješčanik odvodi vodu (ako je primjenjivo), poput
        otvora za odvod ili uklonjivog čepa.
    sandbox_seating_type:
      name: Vrsta sjedenja u pješčaniku
      description: Uključuje li pješčanik integrirana sjedala i kakve vrste.
    sapodillo_variety:
      name: Sorta sapodila
      description: Identificira specifičan kultivar ili sortu sapodila/chikooa (primjerice
        „Alano", „Prolific"), omogućujući entuzijastima da odaberu željene profile
        okusa i karakteristike.
    sapote_variety:
      name: Sorta sapote
      description: Određuje određenu vrstu/tip ponuđene sapote (npr. crna, bijela,
        mamey), što kupcima omogućuje razlikovanje između različitih vrsta.
    satin_ribbon_face_type:
      name: Tip lica sa satenskom vrpcom
      description: Određuje ima li vrpca satenski završetak s jedne ili obje strane.
    sauce_consistency:
      name: Konzistencija umaka
      description: Opisuje teksturu ili gustoću umaka za pizzu.
    sauce_product_form:
      name: Oblik proizvoda umaka
      description: Označava fizički oblik proizvoda umaka, kao što su tekućina, ulje,
        pasta, prah, pahuljice ili sirup.
    sauce_variety:
      name: Raznovrsni umaci
      description: Označava određeni stil ili obitelj recepata bijelog ili kremastog
        umaka (npr. Alfredo, Béchamel, Hollandaise).
    saxophone_body_finish:
      name: Završna obrada tijela saksofona
      description: Opisuje primarnu završnu obradu/premaz na tijelu saksofona (odvojeno
        od tipki).
    saxophone_body_type:
      name: Tip tijela saksofona
      description: Opisuje ukupnu fizičku konfiguraciju tijela i orijentaciju zvona
        bas saksofona.
    saxophone_construction_style:
      name: Stil konstrukcije saksofona
      description: Označava uobičajene konstrukcijske značajke saksofona koje utječu
        na trajnost, rezonancu i servisiranje.
    saxophone_included_accessories:
      name: Uključeni pribor za saksofon
      description: Popisi su uključivali pribor koji se obično koristi s paketom alt
        saksofona.
    saxophone_key_system:
      name: Sustav tipki saksofona
      description: Označava sustav tipki saksofona (izgled/standard mehanizma) koji
        se koristi na instrumentu.
    saxophone_key_touch_material:
      name: Materijal za dodir tipki saksofona
      description: Određuje materijal koji se koristi za dodire tipki saksofona (npr.
        biserni dodiri tipki).
    saxophone_mouthpiece_baffle_type:
      name: Usnik za saksofon, tip pregrade
      description: Opisuje dizajn pregrade koji oblikuje protok zraka i svjetlinu.
    saxophone_neck_type:
      name: Vrsta vrata saksofona
      description: Određuje konfiguraciju vrata koji se isporučuje sa bas saksofonom.
    saxophone_package_contents:
      name: Sadržaj paketa saksofona
      description: Navodi koji ključni pribor dolazi uz saksofon (npr. kutija, usnik,
        ligatura, remen za vrat, komplet za čišćenje).
    saxophone_reed_cut:
      name: Rezani jezičak za saksofon
      description: Određuje rez/stil jezička saksofona, koji utječe na odziv, ton
        i osjećaj.
    saxophone_reed_material_type:
      name: Vrsta materijala trska za saksofon
      description: Određuje kategoriju materijala trske (primjerice trska u odnosu
        na sintetiku).
    saxophone_reed_strength_scale:
      name: Ljestvica jačine trske saksofona
      description: Određuje sustav/ljestvicu numeriranja jačine koja se koristi za
        jezičak (često ovisno o marki), omogućujući jasniju usporedbu među oglasima.
    saxophone_small_part_thread_size:
      name: Saxophone small part niz poruka veličina
      description: Određuje niz poruka veličina/standard za niz poruka male dijelove
        saksofona (prvenstveno vijke), omogućujući ispravan odabir pristajanja.
    saxophone_swab_application_area:
      name: Područje primjene krpe za saksofon
      description: Označava koji dio saksofona treba čistiti/sušiti štapićem.
    scabbard_material:
      name: Materijal korica
      description: Određuje primarni materijal uključene korice/futrole (ako je prisutna).
    scale_model_assembly_status:
      name: Status sklapanja makete
      description: Označava je li maketa spremna za izlaganje ili zahtijeva sastavljanje/bojanje.
    scale_model_car_features:
      name: Značajke makete automobila u mjerilu
      description: Značajne značajke makete automobila kao što su otvarajuća vrata/hauba,
        upravljivi kotači, ovjes itd.
    scale_model_kit_assembly_requirements:
      name: Zahtjevi za kompletnu montažu makete
      description: Određuje koji su dodatni koraci montaže/dostave obično potrebni,
        pored osnovne Shopify montaže snap-fit metodom.
    scale_model_kit_components_included:
      name: Uključene su kompletne komponente modela u mjerilu
      description: Navodi što je uključeno u model/komplet tenka (primjerice naljepnice,
        figure, foto-jetkane dijelove).
    scale_model_paint_status:
      name: Status boje makete
      description: Označava je li model helikoptera prethodno obojen/završno obrađen
        ili ga je potrebno bojati.
    scale_model_pose:
      name: Posa modela u mjerilu
      description: Određuje prikazanu pozu modela konja za usklađivanje prikaza/diorame.
    scale_model_rotor_configuration:
      name: Konfiguracija rotora makete u mjerilu
      description: Određuje konfiguraciju rotora helikoptera prikazanu modelom.
    scale_model_truck_era:
      name: Era maketa kamiona
      description: Označava eru/razdoblje stvarnog kamiona koji model predstavlja
        (korisno za kolekcionare koji traže starinske u odnosu na moderne kamione).
    scale_model_truck_propulsion_type:
      name: Vrsta pogona kamiona za maketu
      description: Označava je li prikazani kamion dizelski, benzinski, električni,
        hibridni ili neki drugi tip pogona (kako je predstavljeno/tržište modelom).
    scale_units:
      name: Jedinice skale
      description: Mjerne jedinice otisnute/ugravirane na gredi za postavke radijusa/promjera.
    scent_function:
      name: Značajka mirisa
      description: Definira primarne funkcije mirisnog proizvoda kako bi lovci mogli
        brzo suziti izbor na pravi alat (primjerice atraktant nasuprot eliminatoru
        mirisa).
    scent_source:
      name: Izvor mirisa
      description: Navodi primarni biološki ili aromatski izvor korišten u formulaciji
        proizvoda, uključujući vrste urina, mirise hrane, biljne arome itd.
    school_bus_body_type:
      name: Vrsta karoserije školskog autobusa
      description: Klasificira školski autobus prema uobičajenim formatima karoserije/klase
        koji se koriste na tržištu (npr. vrsta A–D).
    school_bus_safety_feature:
      name: Sigurnosna značajka školskog autobusa
      description: Značajna sigurnosna oprema instalirana na školskom autobusu.
    school_glue_washability:
      name: Perivost školskog ljepila
      description: Označava koliko se lako osušeno/mokro ljepilo može očistiti s kože/odjeće/površina.
    scissors_application:
      name: Aplikacija škara
      description: Primarna namjena primjene rezanja/materijala za škare.
    scooter_brake_pad_material:
      name: Materijal kočionih pločica skutera
      description: Određuje spoj koji se koristi u kočionim pločicama, a koji utječe
        na učinkovitost, buku i vijek trajanja.
    scoring_method:
      name: Metoda bodovanja
      description: Određuje kako se rezultati prate na stolu za stolni nogomet, kao
        što su ručni brojači kuglica ili elektroničke ploče za rezultate.
    scoring_pattern:
      name: Uzorak bodovanja
      description: prikaz zona za postizanje rezultata otisnutih na igralištu.
    scoring_system_type:
      name: Vrsta sustava bodovanja
      description: Opisuje stil mehanizma za vođenje rezultata koji je uključen u
        stol, kao što su ručni klizači ili razni elektronički zasloni.
    scottish_smallpipes_bag_material:
      name: Materijal za škotske male lule
      description: Određuje materijal vreće (spremnika zraka) koja je dostavljena
        s malim sviralima.
    scottish_smallpipes_drone_tuning_configuration:
      name: Konfiguracija ugađanja borduna za škotske male gajde
      description: Određuje podešavanje borduna dostavljeog s instrumentom (visine
        tona/uloga borduna u odnosu na toniku).
    scottish_smallpipes_reed_type:
      name: Vrsta trske škotskih malih gajdi
      description: Identificira vrstu trske koja se koristi za pjevalicu (i/ili jesu
        li trske sintetičke ili od trske).
    scraping_surface_type:
      name: Vrsta površine za struganje
      description: Određuje konstrukciju/geometriju strugajuće površine koja proizvodi
        zvuk (npr. užljebljena, češljasta/nazubljena, valovita).
    screw_drive_type:
      name: Vrsta pogona vijka
      description: Označava vrstu udubljenja na glavi vijka ili svornjaka, što ukazuje
        na alat potreban za njegovo zatezanje ili odvrtanje (primjerice šesterokutni/imbus,
        Torx).
    screw_thread_size:
      name: Veličina navoja vijka
      description: Određuje standard veličine niz poruke uključenih ili kompatibilnih
        vijaka (primjerice M4, M5, M6).
    sculpting_clay_base_type:
      name: Vrsta podloge od kiparske gline
      description: Opisuje osnovnu formulaciju/osnovu gline za kiparenje.
    seafood_cut:
      name: Rezanje morskih plodova
      description: Opisuje fizičko rezanje ili prezentaciju morskih plodova (npr.
        cijeli, file, odrezak).
    seafood_processing_method:
      name: Metoda obrade morskih plodova
      description: Određuje primarnu tehniku konzerviranja ili obrade koja se primjenjuje
        na morske plodove, kao što su dimljenje, soljenje ili liofilizacija.
    seafood_source:
      name: Izvor morskih plodova
      description: Označava je li morski plodovi ulovljeni u divljini, uzgojeni na
        farmi, biljnog podrijetla ili iz drugog izvora, što pomaže kupcima u procjeni
        održivosti i kvalitete.
    seal_material:
      name: Materijal brtve
      description: Materijal koji se koristi za brtve ili zaptivke na vratu, zapešću
        i gležnju koje održavaju odijelo vodonepropusnim.
    seal_type:
      name: Vrsta brtve
      description: Određuje metodu brtvljenja koju koristi spojnica za sprječavanje
        curenja rashladne tekućine.
    sealant_formulation:
      name: Formulacija brtvila
      description: Označava primarnu kemijsku formulaciju ili aditivnu tehnologiju
        brtvila za biciklističke gume (primjerice na bazi lateksa, ojačano vlaknima,
        akrilno).
    seals_leak_type:
      name: Vrsta curenja brtvi
      description: Vrsta/lokacija curenja rashladnog sustava koje proizvod treba zabrtviti.
    seam_construction:
      name: Izrada šavova
      description: Opisuje kako se izrađuje šav lopte, što utječe na zamah, izdržljivost
        i osjećaj.
    seam_design:
      name: Dizajn šava
      description: Određuje konstrukciju šava ili ukrasne značajke šava čarapa.
    seam_gauge_scale_type:
      name: Vrsta skale za mjerenje šava
      description: Označava koje su skale/oznake uključene na mjeraču šava iznad skale
        osnovnog ravnala.
    seam_gauge_slider_material:
      name: Materijal klizača za mjerenje šava
      description: Označava materijal komponente podesivog klizača/pokazivača ako
        je nazočna.
    seam_ripper_tip_style:
      name: Vrh rasparača šavova
      description: Opisuje funkcionalni dizajn vrha koji se koristi za klizanje ispod
        šavova i sigurno rezanje niza poruka.
    seam_sealing_type:
      name: Vrsta brtvljenja šava
      description: Opisuje metodu koja se koristi za sprječavanje prodora vode na
        šavove kabanice (primjerice potpuno zalijepljeno trakom, zavareno).
    seam_type:
      name: Vrsta šava
      description: Opisuje stil šivanja na bejzbol lopti, koji utječe na prianjanje,
        aerodinamiku i namjeravanu razinu igre.
    season_condition_protection:
      name: Sezonska/UV zaštita
      description: Označava primarne vremenske uvjete/uvjete od kojih je vjetrobransko
        staklo namijenjeno da štiti.
    season_rating:
      name: Ocjena sezone
      description: Označava sezonsku ocjenu šatora, što ukazuje na njegovu prikladnost
        za različite vremenske uvjete (primjerice tri sezone, četiri sezone, pet sezona/ekspedicija).
    seasoning_variety:
      name: Raznovrsni začini
      description: Klasificira začin prema načinu pripreme ili tradicionalnoj kulinarskoj
        uporabi.
    seat_adjustment_power_type:
      name: Vrsta električnog podešavanja sjedala
      description: Određuje kako se aktiviraju mehanizmi za podešavanje sjedala (ručne
        poluge u odnosu na elektromotore), što može utjecati na ožičenje/kompatibilnost.
    seat_belt_attachment_type:
      name: Vrsta pričvršćivanja sigurnosnog pojasa
      description: Određuje kako se remen pričvršćuje na vozilo/uređaj remena.
    seat_belt_buckle_electrical_connector_type:
      name: Kopča sigurnosnog pojasa električni mehanizam sinkronizacije tipa
      description: Određuje mehanizam sinhronizacije/sučelje koje se koristi za ožičenje
        prekidača kopče/zatezača, kada je primjenjivo.
    seat_belt_buckle_mounting_type:
      name: Vrsta pričvršćivanja kopče sigurnosnog pojasa
      description: Opisuje kako se kopča/prijemnik pričvršćuje na vozilo, sjedalo
        ili ručku pojasa (npr. vijčanim pričvršćivanjem, kopčom).
    seat_belt_buckle_release_button_color:
      name: Boja gumba za otpuštanje kopče sigurnosnog pojasa
      description: Određuje boju gumba za otpuštanje kopče.
    seat_belt_cover_placement:
      name: Položaj navlake sigurnosnog pojasa
      description: Označava gdje se na sigurnosnom pojasu namjerava koristiti navlaka.
    seat_belt_integration:
      name: Integracija sigurnosnog pojasa
      description: Određuje uključuje li sjedalo integrirani priključak za sigurnosni
        pojas i/ili kopču ili mora li se za ugradnju koristiti originalni priključak
        za kopču vozila.
    seat_belt_provision:
      name: Osiguravanje sigurnosnog pojasa
      description: Označava jesu li sigurnosni pojasevi i/ili pripadajući dijelovi
        pojasa (primjerice, kopče) uključeni u sklop stražnjeg sjedala ili se moraju
        prenijeti s izvornog sjedala.
    seat_belt_strap_installation_location:
      name: Mjesto ugradnje remena sigurnosnog pojasa
      description: Označava gdje je remen ugrađen unutar sustava pojasa.
    seat_cover_placement:
      name: Položaj navlake sjedala
      description: Označava za koje je sjedeće mjesto (položaje) na vozilu namijenjena
        navlaka.
    seat_cover_securement_method:
      name: Način pričvršćivanja navlake sjedala
      description: Označava primarni način pričvršćivanja navlake sjedala na sjedalo.
        Ako se koristi više metoda, odaberite glavnu/primarnu.
    seat_cover_set_contents:
      name: Sadržaj seta navlaka za sjedalo
      description: Opisuje koji su dijelovi uključeni u paket (primjerice samo donji
        dijelovi sjedala u odnosu na cijelo sjedalo + nasloni za glavu).
    seat_fabric:
      name: Tkanina za sjedalo
      description: Primarna tkanina korištena za sjedalo i naslon stolice.
    seat_height_category:
      name: Kategorija visine sjedala
      description: Klasificira stolicu prema tipičnom rasponu visine sjedala (primjerice
        visina pulta ili šanka) radi pojednostavljenja odabira.
    seat_material:
      name: Materijal sjedala
      description: Označava primarni materijal površine za sjedenje klupe.
    seat_mounting_type:
      name: Vrsta montaže sjedala
      description: Konfiguracija montaže/praćenja koja se koristi za pričvršćivanje
        sjedala na pod vozila.
    seating_surface_material:
      name: Materijal sjedeće površine
      description: Određuje materijal površine na kojoj se osoba naslanja (primjerice
        tekstilna mreža, tkanina za remen, vrb, tapecirani namještaj).
    seatpost_clamp_mechanism:
      name: Mehanizam stezanja cijevi sjedala
      description: Vrsta sustava stezanja/zatvaranja koji pričvršćuje cijevi sjedala.
    section_orientation_compatibility:
      name: Kompatibilnost orijentacije odjeljka
      description: Označava odgovara li pribor dijelu za lijevu ruku, desnu ruku ili
        dijelu za univerzalnu orijentaciju.
    sectional_configuration:
      name: Sekcijska konfiguracija
      description: Definira specifične module ili orijentaciju sekcijske jedinice
        (primjerice kut, lijevi naslonjač, ležaljka) kako bi kupac mogao sastaviti
        željeni izgled.
    sectional_shape:
      name: Shapes
      description: Definira cjelokupnu geometrijsku konfiguraciju/izgled kutne sofe.
    secured_components:
      name: Osigurane komponente
      description: Navodi specifične dijelove bicikla koje štite sigurnosne matice
        ili sigurnosna šipka (primjerice prednji kotač, stražnji kotač, cijev sjedala).
    seed_content:
      name: Sadržaj sjemena
      description: Označava je li citrusno voće bez sjemenki, ima li malo sjemenki
        ili je potpuno sa sjemenkama.
    seed_size_classification:
      name: Klasifikacija veličine sjemena
      description: Označava relativnu veličinu nejestive sjemenke unutar ličija, što
        utječe na količinu jestivog mesa.
    self_adhesive_backing_format:
      name: Format samoljepljive podloge
      description: Fizički format ljepljive podloge koji je dat s karticom fitilja
        (unaprijed nanesena podloga u odnosu na zasebne naljepnice itd.).
    self_adhesive_hook_loop_backing_type:
      name: Samoljepljiva podloga s čičkom i petljom
      description: Određuje konstrukciju podloge/podloge i sustav ljepila koji se
        koristi na samoljepljivoj strani.
    self_adhesive_hook_loop_fastener_shape:
      name: Oblik samoljepljivog čičak-zatvarača.
      description: Određuje rez/oblik dijelova stezača koji je dostavljen.
    self_hardening_clay_finish:
      name: Samostvrdnjavajuća glinena završna obrada
      description: Opisuje izgled/sjaj površine nakon potpunog sušenja (korisno za
        odabir između prirodnog mata, satena itd.).
    self_hardening_clay_water_resistance_after_curing:
      name: Otpornost samostvrdnjavajuće gline na vodu nakon sušenja
      description: Označava otpornost na vodu nakon potpunog stvrdnjavanja (bez dodatnog
        brtvila).
    sensor_functions:
      name: Funkcije osjetnika
      description: Označava koje podatke o cikličkoj mjernoj vrijednosti osjetnik
        mjeri.
    sensor_measurement_mode:
      name: Način mjerenja osjetnika
      description: Označava koje mjerne podatke osjetnik može snimiti (primjerice
        samo kadenca, samo brzina, dvostruka brzina i kadenca).
    sensor_mounting_position:
      name: Položaj montaže senzora
      description: Određuje mjesto na biciklu ili biciklisti gdje je senzor ugrađen,
        kao što je radilica, glavčina kotača ili papučica. To utječe na kompatibilnost
        s različitim postavkama bicikala.
    sensor_mounting_type:
      name: Vrsta montaže senzora
      description: Određuje kako se MAP osjetnik montira na usisni razvodnik/motor
        (primjerice prirubnica s vijcima u odnosu na utični umetak).
    sensor_or_gauge_mounting_location:
      name: Položaj montaže senzora ili mjerača
      description: Određuje gdje se na vozilu namjerava ugraditi senzor ili mjerač
        (na razini sustava/lokacije, ne lijevo/desno).
    sensory_modality:
      name: Osjetna modalnost
      description: Primarno/a osjetno/a iskustvo/iskustva koja igračka treba pružiti
        (može biti multiosjetno).
    sensory_toy_fidget_mechanism:
      name: Osjetna igračka s mehanizmom za vrpolje
      description: Primarna interakcija/mehanizam koji se koristi za vrpoljenje i
        samoregulaciju.
    sensory_toy_light_features:
      name: Značajke osjetnih svjetlosnih igračaka
      description: Svjetlosna ponašanja/učinci koje pruža igračka.
    sensory_toy_texture_type:
      name: Vrsta teksture osjetne igračke
      description: Dominantni elementi površinskog osjeta/teksture koji se koriste
        za taktilnu stimulaciju.
    sequin_application_method:
      name: Način nanošenja šljokica
      description: Kako se šljokica namjerava nanositi/koristiti (prišivanjem, lijepljenjem,
        toplinskim spajanjem itd.).
    sequin_finish:
      name: Završna obrada sa šljokicama
      description: Opisuje površinsku/vizualnu završnu obradu i reflektirajući učinak
        šljokica korištenih na naljepnici (npr. mat, metalik, holografski), a ne podlogu
        naljepnice ili način pričvršćivanja.
    serger_stitch_functions:
      name: Funkcije overlock boda
      description: Značajke šava koji overlok stroj podržava (varijacije overloka/overedža
        i specijalni overlok šavovi).
    serger_thread_count:
      name: Broj poruka Sergera niz
      description: Broj niz poruka koje serger može koristiti za spajanje (primjerice
        2/3/4/5-niz poruka mogućnost).
    service_interval:
      name: Servisni interval
      description: Preporučeno maksimalno vrijeme između potrebnih pregleda/servisiranja
        od strane ovlaštene servisne postaje.
    serving_temperature:
      name: Temperatura posluživanja
      description: Označava predviđenu temperaturu posluživanja ili stanje proizvoda
        prigodom konzumiranja.
    sesame_seed_hull_status:
      name: Status ljuske sjemenke sezama
      description: Određuje je li tahini napravljen od oljuštenih ili neoljuštenih
        sjemenki sezama, što utječe na boju, okus i nutritivne vrijednosti.
    sesame_seed_roast_level:
      name: Razina prženja sjemenki sezama
      description: Označava koliko su sjemenke sezama bile pržene prije mljevenja,
        što pomaže kupcu da odabere željeni intenzitet okusa.
    sesame_seed_variety:
      name: Sorta sjemenki sezama
      description: Označava boju ili vrstu sjemenki sezama koje se koriste za proizvodnju
        ulja.
    set_classification:
      name: Postavi klasifikaciju
      description: Definira namjeravanu razinu igre ili stil seta za kroket (primjerice
        turnir, rekreacija, putovanje).
    set_components:
      name: Komponente seta
      description: Označava koje su stavke uključene u proizvod (npr. samo središnja
        palica u odnosu na cijeli komplet).
    set_items_included:
      name: Uključeni set artikala
      description: Određuje odjevne predmete ili dodatke uključene u set, kao što
        su tkanina za sari, dupatta ili pojas.
    setup_mechanism:
      name: Mehanizam postavljanja
      description: Opisuje primarni način postavljanja šatora (npr. skočni, na napuhavanje/zračna
        greda, krovni na preklop).
    setup_type:
      name: Tip postavljanja
      description: Kako se sastavlja ili postavlja šator/tunel za igru.
    sew_in_interfacing_elasticity:
      name: Elastičnost međupovršine za ušivanje
      description: Označava je li ušiveni međupodstavak rastezljiv i, ako jest, u
        kojem smjeru (smjerovima), kako bi odgovarao pletenim ili tkanim projektima.
    sew_in_label_placement:
      name: Položaj ušivene etikete
      description: Označava planirani položaj smještanja na gotovoj stavci.
    sew_on_edge_finish:
      name: Završna obrada ruba za prišivanje
      description: Označava jesu li rubovi čičak trake neobrađeni/rezani ili obrađeni
        kako bi se spriječilo habanje.
    sew_on_rhinestone_hole_orientation:
      name: Orijentacija rupe za prišiveni kristal
      description: Raspored/orijentacija rupa u odnosu na kamen (npr. jedna pored
        druge, nasuprotna, križna) za podršku različitim stilovima šavova.
    sewing_kit_components_included:
      name: Uključene komponente seta za šivanje
      description: Navodi pribor/alate za šivanje uključene u komplet za šivanje kako
        bi kupci mogli usporediti što dolazi u svakom kompletu.
    sewing_machine_bobbin_class:
      name: Klasa špulice za šivaće strojeve
      description: Određuje klasu/sustav špulice kompatibilan sa šivaćim strojem za
        špulice i kutiju špulice.
    sewing_machine_buttonhole_type:
      name: Vrsta rupice za gumbe na šivaćem stroju
      description: Stroj podržava metodu izrade rupica za gumbe.
    sewing_machine_display_type:
      name: Vrsta zaslona šivaćeg stroja
      description: Vrsta upravljačkog/prikaznog sučelja na šivaćem stroju.
    sewing_machine_needle_point_type:
      name: Vrsta igle za šivaći stroj
      description: Definira geometriju vrha/obitelj vrhova igle koja određuje kako
        prodire u različite tkanine (npr. oštar u odnosu na kemijski u odnosu na klinasti).
    sewing_machine_needle_system:
      name: Sustav igle šivaćeg stroja
      description: Standardizirani sustav igli/broj modela koji određuje kompatibilnost
        stroja (često se piše kao 130/705 H, HAx1, DBx1, 15x1 itd.).
    sewing_machine_needle_type:
      name: Vrsta igle šivaćeg stroja
      description: Određuje namjeravanu primjenu/stil igle (npr. univerzalna, kemijska,
        traperice/denim), što utječe na kvalitetu šava i prikladnost tkanine.
    sewing_machine_shank_type:
      name: Vrsta drške igle šivaćeg stroja
      description: Određuje standard sučelja tijela pritisne stopice/gležnja za koji
        je stopica dizajnirana, osiguravajući kompatibilnost sa šivaćim strojem (primjerice
        nisko tijelo, visoko tijelo, koso tijelo).
    sewing_pattern_accessory_type:
      name: Vrsta pribora za šivaći kroj
      description: Određuje koji pribor izrađuje uzorak za šivanje.
    sewing_pattern_notions_required:
      name: Potrebne ideje o šivaćem kroju
      description: Navodi značajne dodatne materijale/opremu potrebne za dovršetak
        projekta (pored tkanine i konca).
    sewing_pattern_recommended_fabric:
      name: Preporučana tkanina za šivanje uzorka
      description: Navodi preporučane vrste/gramaže tkanina za kroj za šivanje (kako
        je odredio dizajner kroja).
    sewing_pattern_size_range:
      name: Raspon veličina krojeva za šivanje
      description: Određuje namjeravani raspon veličina koji pokriva uzorak (npr.
        od bebe do odrasle osobe, plus veličine).
    sewing_thread_size_system:
      name: Sustav veličine niti za šivanje
      description: Standard veličine koji se koristi za izražavanje niza veličina
        poruka (primjerice Tex, Denier, Ticket, broj težine, V veličina).
    shaft_curvature:
      name: Zakrivljenost osovine
      description: Opisuje ukupni oblik osovine, koji utječe na zazor, zamah i ergonomiju.
    shaft_kick_point:
      name: Točka udarca osovine
      description: Identificira položaj duž osovine gdje se najviše savija tijekom
        zamaha, što utječe na putanju leta lopte.
    shaft_length_type:
      name: Vrsta duljine osovine
      description: Standardna industrijska kategorička veličina za osovine strelica
        (npr. kratka, srednja) koja se koristi kada nisu dostupne točne milimetarske
        mjere.
    shaft_shape:
      name: Oblik osovine
      description: Definira profil poprečnog presjeka osovine tonfe (primjerice okrugli,
        kvadratni, osmerokutni).
    shaker_fill_material:
      name: Materijal punjenja shakera
      description: Određuje primarno unutarnje punjenje koje se koristi za izradu
        zvuka šejkera (kada je primjenjivo), kao što su perle, sjemenke ili kuglice.
    shaker_shell_material:
      name: Materijal školjke shakera
      description: Određuje primarni materijal tijela/ljuske posude za mućkanje jaja
        (vanjsko kućište).
    shallot_variety:
      name: Sorta ljutike
      description: Identificira specifičan kultivar, vrstu tržišta ili sortu ljutike.
    shank_style:
      name: Stil drške
      description: Opisuje ukupne oblike/konfiguraciju drški svrdla za rubnik (primjerice
        ravne, zakrivljene, pasuće).
    shapewear_enhancement_feature:
      name: Funkcija poboljšanja oblikovanja tijela
      description: Highlight primarno funkcionalno poboljšanje koje nudi odjevni predmet
        (primjerice kontrola trbuha, podizanje stražnjice, nepropusna podstava).
    sheath_type:
      name: Vrsta korice
      description: Vrsta korice/futrole koja dolazi s kolekcionarskim nožem.
    sheet_music_clip_padding_material:
      name: Materijal za oblaganje na hvataljkama za note.
      description: Materijal bilo koje čeljusti/hvataljke koji dodiruje papir ili
        rub stalka kako bi se spriječilo kidanje i klizanje.
    sheet_music_clip_spring_tension_level:
      name: Razina napetosti opruge isječka za note
      description: Relativna čvrstoća opruge stezaljke/ sila stezanja.
    sheet_music_clip_use_environment:
      name: Okruženje za korištenje isječka notnog zapisa
      description: Primarno namijenjene postavke gdje je isječak dizajniran za najbolje
        izvedbe.
    shell_construction:
      name: Izgradnja ljuske
      description: Određuje kako je konstruirana školjka bas bubnja, što snažno utječe
        na ton i težinu.
    shell_finish:
      name: Završna obrada ljuske
      description: Tretman vanjskog završnog sloja dumbek komore.
    shell_hull_status:
      name: Status ljuske/opne
      description: Označava prodaju li se orašasti plodovi ili sjemenke s neoštećenim
        ili uklonjenim ljuskama ili opnama.
    shift_boot_attachment_method:
      name: Metoda pričvršćivanja čizme mjenjača
      description: Određuje kako se manžeta mjenjača pričvršćuje na konzolu/oblogu
        mjenjača vozila (primjerice okvir obloge koji se pričvršćuje kopčom, prsten
        za zadržavanje, ljepilo).
    shift_boot_installation_hardware_included:
      name: Uključen hardver za instalaciju manžete mjenjača
      description: Navodi instalacijski hardver i komponente uključene uz manžetu
        mjenjača.
    shift_knob_illumination:
      name: Osvjetljenje ručice mjenjača
      description: Određuje uključuje li ručica mjenjača osvjetljenje i metodu/vrstu
        osvjetljenja (primjerice fotoluminiscentno, LED, optičko vlakno, uzorak pozadinskog
        osvjetljenja).
    shift_knob_installation_method:
      name: Način ugradnje ručice mjenjača
      description: Određuje kako se ručica mjenjača pričvršćuje na ručicu mjenjača.
    shift_knob_shape:
      name: Shapesručice mjenjača
      description: Opisuje ukupni ergonomski oblik ručice mjenjača.
    shift_pattern_type:
      name: Vrsta uzorka mijenjanja brzina
      description: Određuje stil oznake stupnja prijenosa na ručici mjenjača (ako
        postoji).
    shifter_compatibility:
      name: Kompatibilnost mjenjača
      description: Označava je li produžetak upravljača kompatibilan s elektroničkim
        mjenjačima, mehaničkim mjenjačima, objema ili nije kompatibilan s mjenjačima.
    shifter_mounting_interface:
      name: Sučelje za montažu mjenjača
      description: Opisuje kako se ručica mjenjača pričvršćuje na bicikl (primjerice,
        diskretna veličina stezaljke, I-Spec, MatchMaker, na kraju volana, donjoj
        cijevi, bežično).
    shifting_actuation_type:
      name: Vrsta aktiviranja mijenjanja brzina
      description: Označava mehanizam koji se koristi za mijenjanje brzina u skupni
        mjenjača (mehanički, elektronički žičani, elektronički bežični, hidraulički).
    shifting_mechanism:
      name: Mehanizam za mijenjanje brzina
      description: Označava radi li mjenjač mehanički ili elektronički, te je li indeksiran
        ili se temelji na trenju.
    shim_purpose:
      name: Svrha podložne pločice
      description: Definira funkcionalnu vrstu proizvoda (primjerice podložna pločica,
        klin, odstojnik) tako da biciklisti mogu brzo pronaći pravo rješenje za podešavanje
        bez potrebe za zasebnim podkategorijama.
    shin_guard_attachment_method:
      name: Način pričvršćivanja štitnika za potkoljenicu
      description: Klasificira cjelokupni format dizajna štitnika za potkoljenicu,
        uključujući integraciju štitnika za gležanj ili konstrukciju čarape.
    shirt_cuff_style:
      name: Stil manšete košulje
      description: Označava konstrukciju manžete rukava, koja utječe na formalnost,
        sparivanje s manžetama i udobnost.
    shochu_base_ingredient:
      name: Sastojak za bazu shochua
      description: Označava primarni izvor škroba ili šećera koji se koristi za proizvodnju
        shochua.
    shochu_soju_variety:
      name: Sorta shochua i sojua
      description: Klasificira proizvod prema njegovom prepoznatom stilu ili vrsti
        proizvodnje.
    shock_absorber_bushing_material:
      name: Materijal čahure amortizera
      description: Materijal montažnih čahura/izolatora koji je dostavljen s amortizerom
        ili koji je ugrađen u njega.
    shock_absorber_charge_type:
      name: Vrsta punjenja amortizera
      description: Specificira tehnologiju punjenja/prigušenja amortizera (primjerice
        hidraulički/uljni, plinski, zračni) i/ili povezani dizajn cijevi gdje je primjenjivo.
    shock_absorber_mount_type_lower:
      name: Vrsta nosača amortizera (donji)
      description: Stil donjeg sučelja za montažu amortizera za usklađivanje pristajanja.
    shock_absorber_mount_type_upper:
      name: Vrsta nosača amortizera (gornji)
      description: Određuje stil gornjeg (gornjeg) montažnog sučelja amortizera motornog
        vozila za usklađivanje prikladnosti/kompatibilnosti.
    shock_absorber_position:
      name: Položaj amortizera
      description: Određuje je li amortizer namijenjen za prednji, stražnji, lijevi
        ili desni položaj na vozilu (preciznije od postavljanja samo na osovinu).
    shock_absorption_system:
      name: Sustav za apsorpciju udara
      description: Definira mehanizam koji se koristi za smanjenje vibracija i buke
        pri odbijanju.
    shoe_collar_height:
      name: Visina ovratnika cipele
      description: Klasificira cipele prema visini ovratnika/kroja (niske, ID br.
        trgovca-top, visoke) kako bi se naznačilo pokrivanje gležnja i podrška.
    shoe_cover_height:
      name: Visina navlake za obuću
      description: Određuje razinu pokrivenosti navlake za biciklističke cipele, razlikujući
        navlake za prste od punih visokih navlaka za cipele.
    shoe_sizing_system:
      name: Sustav za određivanje veličine cipela
      description: Označava standard veličine (SAD, UK, EU, JP, Mondopoint itd.) koji
        se koristi za navedenu veličinu cipele.
    shoelace_aglet_material:
      name: Materijal agleta vezice za cipele
      description: Označava materijal korišten za vrhove (aglete) na krajevima vezica,
        što utječe na trajnost i stil.
    shooting_rest_design:
      name: Dizajn REST a za snimanje
      description: Klasificira strukturni stil oslonca (oslonac sa vrećom, saonice,
        tronožni oslonac, škripac za oružje itd.).
    shooting_stick_yoke_design:
      name: Dizajn jarma za palicu za gađanje
      description: Određuje stil kolijevke ili jarma koji se spaja s vatrenim oružjem
        ili optikom.
    shooting_target_style:
      name: Stil gađanja mete
      description: Klasificira stil ili dizajn meta za umjetničko klizanje i hokej
        kako bi kupci mogli odabrati fokus treninga koji im je potreban.
    shooting_target_type:
      name: Vrsta mete za gađanje
      description: Klasificira mete za gađanje prema strukturnom stilu, materijalu
        ili dizajnu (primjerice gong, silueta, papirna meta, animacija učenja), omogućujući
        strijelcima da brzo pronađu ispravnu metu za svoju disciplinu i vrstu vatrenog
        oružja.
    short_block_assembly_balance_type:
      name: Kratki blok sklopa saldo tip
      description: Označava je li rotirajući sklop interno ili eksterno saldo.
    short_block_intended_use:
      name: Namjena kratkog bloka
      description: Primarna namjena kutije za kratki blok.
    short_block_rotating_assembly_included:
      name: Uključen kratki blok rotirajući sklop
      description: Određuje koje su glavne komponente rotirajućeg sklopa uključene
        u kratki blok.
    shot_size:
      name: Veličina shot-a
      description: Određuje oznaku veličine sačme za rasutu sačmu ili komponente streljiva.
    shotgun_action_type:
      name: Vrsta mehanizma sačmarice
      description: Određuje mehanizam/djelovanje sačmarice.
    shotgun_choke_type:
      name: Vrsta prigušnice za sačmaricu
      description: Određuje konfiguraciju čoka cijevi(a) sačmarice.
    shotgun_gauge:
      name: Mjerač sačmarice
      description: Određuje kalibar cijevi sačmarice (i .410 otvor gdje je primjenjivo)
        za identifikaciju i filtriranje u oglasima za kolekcionare.
    shotgun_stock_material:
      name: Materijal kundaka sačmarice
      description: Određuje primarni materijal kundaka/prednjeg dijela (oružana oprema).
    shuffleboard_speed_rating:
      name: Ocjena brzine shuffleboarda
      description: Označava relativnu brzinu klizanja koju prah za shuffleboard ili
        drugi proizvod za održavanje pruža na stolu, omogućujući igračima da odaberu
        odgovarajuću brzinu za svoju razinu vještine i duljinu stola.
    shuffleboard_table_length_compatibility:
      name: Kompatibilnost duljine stola za shuffleboard
      description: Standardna duljina stola za shuffleboard kojoj je proizvod dizajniran
        da odgovara ili da joj se upotpuni.
    shuttlecock_base_material:
      name: Materijal baze perjanice (shuttlecocka)
      description: Označava materijal korišten za nos/bazu loptice, što utječe na
        trajnost, osjećaj i odskok.
    shuttlecock_feather_material:
      name: Materijal za perje za lopticu
      description: Identificira primarni izvor perja ili vrstu konstrukcije korištenu
        na suknjici loptice, što utječe trajnost, konzistentnost i cijenu.
    shuttlecock_grade:
      name: Razred loptice
      description: Određuje namjeravanu razinu igre ili klasifikaciju kvalitete (npr.
        trening, klub, natjecanje).
    shuttlecock_speed_rating:
      name: Ocjena brzine perjanice
      description: Određuje brzinu ili ocjenu loptice koju je odredio proizvođač,
        omogućujući igračima da odaberu ispravnu brzinu leta za svoje uvjete igre,
        temperaturu i nadmorsku visinu.
    side_panel_installation_state:
      name: Stanje instalacije bočne ploče
      description: Određuje je li bočna ploča dostavljena gola, premazana temeljnom
        bojom, obojena ili na drugi način premazana/pripremljena za ugradnju.
    side_wall_mechanism:
      name: Mehanizam bočnog zida
      description: Opisuje kako se bočna stijenka krevetića otvara ili spušta radi
        pristupa bebi.
    signal_source:
      name: Izvor signala
      description: Označava kako brojač kilometara prima/izvodi informacije o udaljenosti
        ili vremenu.
    silk_fiber_type:
      name: Vrsta svilenih vlakana
      description: Vrsta/izvor svilenih vlakana korištenih za izradu tkanine (primjerice
        dud ili tussah), što utječe na teksturu, ujednačenost i cijenu.
    simulated_game_species:
      name: Simulirane vrste divljači
      description: Označava određenu pticu ili životinju divljači koju lutka replicira
        za realističan trening.
    singlet_cut_style:
      name: Singlet kroj
      description: Određuje kroj/stil hrvačkog potkošulje, uzimajući u obzir visinu
        naramenice, stil leđa i varijacije za spol/mlade.
    sink_material:
      name: Materijal sudopera
      description: Određuje materijal integriranog sudopera koji je uključen u umivaonik.
    sinker_attachment_style:
      name: Stil pričvršćivanja sinkera
      description: Opisuje mehanizam koji se nalazi na dubinskom olovu za pričvršćivanje
        na ribolovnu liniju ili opremu.
    sinker_finish:
      name: Završna obrada s udubljenjem
      description: Određuje vanjski premaz ili površinsku obradu usipača.
    sinker_shape:
      name: Oblik sinkera
      description: Definira geometrijski oblik olova (primjerice Bullet, cilindar,
        Drop) kako bi ribolovci mogli odabrati optimalnu prezentaciju i otpornost
        na zapinjanje.
    siren_system_included:
      name: Uključen sustav sirene
      description: Označava je li instaliran sirena/PA sustav i koje vrste.
    siren_system_type:
      name: Vrsta sirenskog sustava
      description: Određuje instaliranu konfiguraciju sirene/PA sustava na policijskom
        kamionu.
    size_designation:
      name: Oznaka veličine
      description: Standardizirana etiketa veličine za trokutni instrument.
    size_system:
      name: Sustav veličina
      description: Određuje sustav dimenzioniranja ili regionalni standard kojem odgovara
        oznaka veličine (npr. US, UK, EU, međunarodno slovo).
    sizzle_mechanism:
      name: Mehanizam za šištanje
      description: Određuje kako činela proizvodi efekt šištanja (primjerice zakovice
        ugrađene u činelu, pričvrstivi lanac/šištanje ili bez uključenog hardvera).
    skate_blade_discipline:
      name: Disciplina na oštrici klizaljki
      description: Identificira klizačku disciplinu ili primjenu za koju je oštrica
        dizajnirana, kao što su hokej ili umjetničko klizanje, omogućujući kupcima
        filtriranje relevantnih oštrica.
    skate_brake_type:
      name: Vrsta kočnice za role
      description: Označava vrstu mehanizma zaustavljanja koji dolazi s klizaljkama.
    skateboard_nut_thread_size:
      name: Skateboard nut niz poruka veličina
      description: Određuje promjer i korak matice kako bi se osigurala kompatibilnost
        s osovinama skateboarda, glavnim klinovima ili montažnim dijelovima.
    skein_winder_bearing_bushing_type:
      name: Vrsta ležaja/čahure namotača klupka
      description: Određuje vrstu ležaja ili čahure koja se koristi u rotirajućem
        sklopu namotača klupka.
    skein_winder_drive_type:
      name: Vrsta pogona namotača klupka
      description: Kako se namotač klupka napaja/okreće tijekom uporabe.
    ski_binding_mechanism:
      name: Mehanizam za vezivanje skija
      description: Definira temeljni mehanički dizajn ili disciplinu veza (primjerice
        alpski, tehnički/prikačeno, telemark).
    ski_binding_part_type:
      name: Vrsta dijela skijaškog veza
      description: Identificira specifičnu komponentu ili pribor za skijaške vezove,
        omogućujući brzo filtriranje po mnogim vrstama dijelova.
    ski_boot_sole_standard:
      name: Standardni potplat skijaških cipela
      description: Označava jedinu normu ili standard kompatibilnosti s vezovima za
        koji je skijaška cipela certificirana.
    skill_focus:
      name: Fokus vještine
      description: Identificira primarnu košarkašku vještinu koju pomagalo za trening
        treba razviti.
    skimboard_construction:
      name: Konstrukcija skimboarda
      description: Opisuje primarnu konstrukciju ploče, s naglaskom na jezgru i tehniku
        slaganja (primjerice jezgra od pjene, drvena jezgra).
    skin_presence:
      name: Prisutnost kože
      description: Označava prodaje li se piletina s kožom, bez kože ili djelomično
        uklonjena.
    slapstick_handle_type:
      name: Slapstick korisničko ime tipa
      description: Opisuje stil hvata/korisničko ime integrirano u slapstick, što
        utječe na ergonomiju i udobnost sviranja.
    slapstick_playing_surface_material:
      name: Materijal za podlogu za igranje slapstickova
      description: Određuje materijal udarnih/pljuskajućih elemenata koji se međusobno
        dodiruju kako bi proizveli zvuk.
    sled_brake_type:
      name: Vrsta kočnice saonica
      description: Određuje mehanizam kočenja uključen na saonicama, ako postoji.
    sled_towing_method:
      name: Metoda vučenja saonica
      description: Označava primarni način vuče ili tegljenja saonica.
    sleep_position_suitability:
      name: Prikladnost položaja za spavanje
      description: Označava koji položaj spavanja madrac najučinkovitije podržava.
    sleeping_bag_shape:
      name: Shapesvreće za spavanje
      description: Ukupni kroj vreće za spavanje, koji utječe na toplinu, težinu i
        prostranost.
    sleeping_pad_type:
      name: Vrsta podloge za spavanje
      description: Označava stil izrade uloška - poput pjene zatvorenih ćelija ili
        napuhanog zraka - što izravno utječe na udobnost, težinu i izolaciju.
    sleepwear_set_pieces_included:
      name: Uključeni dijelovi seta za spavanje
      description: Navodi pojedinačne komponente koje se nalaze u višedijelnom kompletu
        odjeće za spavanje ili opuštanje.
    sleeve_bearing_type:
      name: Vrsta kliznog ležaja
      description: Označava tehnologiju koja omogućuje rotaciju rukava, što utječe
        na kvalitetu piruete za olimpijska dizanja.
    sleeve_style:
      name: Stil rukava
      description: Određuje stil rukava pored duljine (primjerice raglan).
    slide_board_accessories_included:
      name: Pribor za kliznu ploču uključen
      description: Navodi dodatne stavke koje su uključene u paket s pločom za slajd
        kako bi kupci točno znali što je uključeno i mogao usporediti paket.
    slide_installation_type:
      name: Vrsta ugradnje klizača
      description: Kako se tobogan namjerava instalirati ili montirati (samostalni,
        pričvršćen na igralište itd.).
    slide_intended_finger:
      name: Željeni prst za klizač
      description: Označava na kojem je prstu namijenjeno nošenje klizača ili to nije
        primjenjivo (npr. tonska traka).
    slide_safety_features:
      name: Sigurnosne značajke klizanja
      description: Sigurnosni elementi dizajna uključeni na toboganu.
    slide_type:
      name: Vrsta slajda
      description: Određuje koje vrste mesinganih kliznih mehanizama proizvod treba
        čistiti.
    slide_water_use_capability:
      name: Mogućnost korištenja vode na toboganu
      description: Je li tobogan namijenjen za korištenje s vodom (npr. priključak
        za crijevo) i kako.
    slime_putty_kit_components_included:
      name: Uključene su kompletne kompleta Slime & putty
      description: Navodi alate i dodatke uključene u proizvod slime/putty (posebice
        za komplet/paket).
    sling_material:
      name: Materijal remena
      description: Određuje vlakno/tekstil korišten u remenu za brzi zatezač (kost
        za psa).
    smith_machine_bar_path:
      name: Putanja šipke Smithovog stroja
      description: Opisuje fiksnu putanju kretanja šipke, informirajući korisnike
        o biomehanici i prostornim zahtjevima.
    smoke_color:
      name: Boja dima
      description: boja dima proizvedena bakljom/dimnim signalom (različito od tijela
        proizvoda boja).
    smoked_malt_smoking_material:
      name: Materijal za dimljenje dimljenog slada
      description: Za dimljene sladove, označava materijal korišten tijekom dimljenja
        (primjerice određene vrste drva ili treset).
    snack_mix_variety:
      name: Raznovrsne mješavine za grickalice
      description: Klasificira proizvod prema vrsti mješavine (npr. mješavina za trail,
        mješavina orašastih plodova, namkeen, sev).
    snack_processing_method:
      name: Metoda obrade grickalica
      description: Označava primarnu tehniku obrade ili konzerviranja koja se koristi
        za izradu grickalice (npr. liofilizacija, pečenje, prženje).
    snack_texture:
      name: Tekstura grickalica
      description: Označava fizički zagriz ili osjećaj u ustima štapića sezama.
    snap_installation_method:
      name: Način ugradnje kopče
      description: Kako se kopča instalira/pričvršćuje na materijal projekta.
    snare_drum_bearing_edge_profile:
      name: Profil ruba ležaja doboša
      description: Izrez/profil ruba ležaja školjke doboša.
    snare_drum_finish_type:
      name: Vrsta završne obrade doboša
      description: Visokokvalitetna završna konstrukcija/tip korišten na korpusu bubnja.
    snare_drum_hoop_type:
      name: Vrsta obruča doboša
      description: Vrsta obruča/okvira koji se koriste na dobošu.
    snare_drum_mounting_type:
      name: Vrsta montaže doboša
      description: Kako se doboš namjerava montirati/koristiti.
    snare_drum_shell_material:
      name: Materijal školjke doboša
      description: Određuje metal/leguru korištenu za korpus bubnja (glavno tijelo),
        što snažno utječe na ton, težinu i trajnost.
    snare_drum_strainer_mechanism:
      name: Mehanizam za sito doboša
      description: Vrsta mehanizma zatezača/otpuštača dobošnih žica koji se koristi
        za aktiviranje/deaktiviranje dobošnih žica.
    snare_drum_strainer_type:
      name: Vrsta sita za doboš
      description: Vrsta mehanizma zatezača/otpuštača dobošnih žica koji se koristi
        za aktiviranje/deaktiviranje dobošnih žica.
    snare_hoop_type:
      name: Vrsta obruča za bubanj
      description: Vrsta obruča/obruča na bubnju.
    snare_throw_off_type:
      name: Vrsta za izbacivanje doboša
      description: Vrsta mehanizma za cjedilo/odbacivanje koji se koristi za spajanje/isključivanje
        žica bubnja.
    snip_cutter_spring_mechanism:
      name: Opružni mehanizam rezača konca
      description: Označava koristi li rezač konca opružni/povratni mehanizam i njegov
        stil.
    snorkel_mount_position:
      name: Položaj montaže za disalicu
      description: Opisuje gdje se disalica nalazi na glavi korisnika tijekom uporabe.
    snorkel_top_type:
      name: Vrsta gornjeg dijela disalice
      description: Opisuje stil zaštite od ulaska vode na vrhu disalice koja je uključena
        u set.
    snow_condition_suitability:
      name: Prikladnost snježnih uvjeta
      description: Opisuje primarni snježni uvjet za koji je vosak namijenjen.
    snow_sports_helmet_safety_certification:
      name: Certifikat o sigurnosti kacige za zimske sportove
      description: Označava sigurnosne standarde koje kaciga zadovoljava za skijanje
        i snowboarding.
    snowboard_base_material:
      name: Materijal za bazu snowboarda
      description: Identificira osnovni sastav ili završnu obradu (ekstrudirane, sinterirane
        vrste, vlasničke formule) koja utječe na brzinu, trajnost i održavanje.
    snowboard_width_class:
      name: Klasa širine snowboarda
      description: Kategorizira ukupnu širinu daske u odnosu na veličinu čizme (npr.
        regularna, široka).
    soccer_ball_compartment_type:
      name: Vrsta odjeljka za nogometnu loptu
      description: Određuje kako (ili hoće li) ruksak primati nogometnu loptu.
    soccer_ball_type:
      name: Vrsta nogometne lopte
      description: Određuje namjeravanu uporabu ili stil nogometne lopte (primjerice
        utakmica, trening, futsal) kako bi kupac mogao brzo pronaći pravu varijantu
        bez potrebe za mnogim podkategorijama.
    soccer_dummy_base_type:
      name: Vrsta baze za nogometnu lutku
      description: Opisuje stil baze ili mehanizam za sidrenje koji lutka koristi.
    soccer_dummy_design:
      name: Dizajn lutke za nogomet
      description: Određuje stil konstrukcije lutke nogometnog gola, kao što je kruta
        ili napuhana.
    soccer_goal_target_style:
      name: Stil mete za nogometni gol
      description: Definira fizički oblik ili dizajn mete za trening kako bi kupci
        mogli odabrati stil koji najbolje odgovara njegovim vježbama.
    soccer_goal_type:
      name: Vrsta nogometnog gola
      description: Označava strukturni stil ili namjenu gola (primjerice skočni prozori,
        odbijanac, ulica).
    sock_cushioning:
      name: Amortizacija čarapa
      description: Označava količinu i stil jastučića ispod stopala ili obloge u podnožju
        ugrađene u čarapu.
    sock_cushioning_level:
      name: Razina amortizacije čarapa
      description: Određuje količinu amortizacije ispod stopala integrirane u čarapu.
    sock_grip_type:
      name: Vrsta hvatišta čarape
      description: Opisuje sve značajke prianjanja ili protukliznosti primijenjene
        na potplat čarape.
    sock_toe_style:
      name: Stil čarapa s vrhom
      description: Opisuje stil konstrukcije područja prstiju čarape.
    soft_bait_style:
      name: Stil mekog mamca
      description: Klasificira dizajn tijela ili profil mekog plastičnog mamca (primjerice
        crv, mamac za plivanje, ličinka).
    soft_top_attachment_type:
      name: Vrsta pričvršćenja mekog krova
      description: Označava način pričvršćivanja mekog krova na vozilo (kanal, kopče,
        čičak traka itd.).
    soft_top_includes_frame_hardware:
      name: Meki krov uključuje okvir/pribor
      description: Označava uključuje li proizvod okvir/lukove mekog krova i/ili montažni
        pribor.
    soft_top_installation_type:
      name: Vrsta ugradnje mekog krova
      description: Označava način ugradnje/pričvršćivanja mekog krova vozila, uz naznaku
        očekivanog načina ugradnje i potrebnog napora.
    soft_top_window_configuration:
      name: Konfiguracija prozora mekog krova
      description: Označava koliko prozora ima mekani krov i koji su položaji nazočni.
    softball_certification:
      name: Certifikacija softballa
      description: Navodi pečate ili odobrenja upravnog tijela otisnute na lopti koja
        određuju podobnost za ligu/utakmicu.
    softness_level:
      name: Razina mekoće
      description: Označava koliko je mekana/niskoprofilna strana s omčom, relevantno
        za udobnost na koži i primjenu s malim volumenom.
    solar_system_model_included_bodies:
      name: Model Sunčevog sustava uključuje tijela
      description: Označava koja su nebeska tijela predstavljena u kompletu modela.
    solar_system_model_scaling:
      name: Razmjer modela Sunčevog sustava
      description: Označava je li model Sunčevog sustava u razmjeru za veličinu planeta,
        udaljenosti/orbita, oboje ili je shematski/prikaz koji nije u razmjeri.
    sold_secure_certification_level:
      name: Razina certifikacije Sold Secure
      description: Navodi ocjenu Sold Secure koju je bravi dodijelilo neovisno britansko
        tijelo za testiranje (bronca, srebro, zlato, dijamant).
    sold_secure_rating:
      name: Ocjena Sold Secure
      description: Označava razinu certifikacije Sold Secure dodijeljenu bravi.
    sole_construction:
      name: Konstrukcija potplata
      description: Označava kako je potplat cipele izgrađen (puni, split, dvodijelni
        itd.), što izravno utječe na fleksibilnost, kontakt s podom i prikladnost
        za specifične plesne tehnike.
    sole_type:
      name: Vrsta potplata
      description: Opisuje strukturni stil potplata, ukazujući na fleksibilnost i
        namjeravanu uporabu.
    soprano_saxophone_body_style:
      name: Stil tijela sopran saksofona
      description: Opisuje fizičku konfiguraciju tijela sopran saksofona.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Vrsta baffle umetka usnika sopran saksofona
      description: Opisuje dizajn pregrade/krova usnika (kontura iza vrha), koji utječe
        na svjetlinu, projekciju i odziv.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Veličina komore usnika sopran saksofona
      description: Opisuje veličinu unutarnje komore usnika sopran saksofona, koja
        utječe na otpor i tonsku boju.
    soprano_saxophone_mouthpiece_finish:
      name: Završna obrada usnika sopran saksofona
      description: Površinska obrada/premaz naneseni na usnik (ako je primjenjivo).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Uključeni pribor za usnik za sopran saksofon
      description: Označava koji je pribor uključen u usnik.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Tonalni karakter usnika za sopran saksofon
      description: Visokokvalitetni tonski profil obično povezan s dizajnom usnika.
    sound_character:
      name: Zvučni lik
      description: Opisuje opći ton koji proizvodi slapstick.
    sound_expansion_method:
      name: Metoda širenja zvuka
      description: Određuje kako moduli mogu dodavati ili proširivati svoju internu
        zvučnu biblioteku izvan tvorničkih zvukova (primjerice sadržaj pakiranja,
        uvoz uzoraka, proširenje kartice).
    sound_module_sound_library_focus:
      name: Fokus zvučne biblioteke zvučnog modula
      description: Primarni naglasak na tvorničkom kompletu zvuka kako bi se kupcima
        pomoglo da pronađu pravi modul za njihov stil/slučaj uporabe.
    sound_port_type:
      name: Vrsta zvučnog otvora
      description: Opisuje dizajn otvora/porta za zvuk na stražnjoj strani cajona
        koji utječe na projekciju i odziv niskih tonova.
    sound_sensitivity_control:
      name: Kontrola osjetljivosti na zvuk
      description: Označava može li se i kako podesiti osjetljivost zvuka.
    sound_synthesizer_patch_memory:
      name: Memorija za patch sintetizatora zvuka
      description: Označava može li sintisajzer trgovati i pozivati unaprijed postavljene
        postavke (patche).
    sound_type:
      name: Vrsta zvuka
      description: Primarna vrsta(e) zvuka ili audio izlazi koje prostirka proizvodi
        (primjerice instrumenti, pjesme, glasovne upute) za reprodukciju vodiča.
    soundboard_material:
      name: Materijal zvučne ploče
      description: Materijal korišten za rezonantnu ploču harfe (gore) koja pokreće
        rezonancu i ton.
    soup_or_broth_variety:
      name: Raznovrsna juha ili temeljac
      description: Određuje stil, recept ili kulinarsku pripremu juhe ili temeljca
        kako bi kupac mogao brzo pronaći svoju željenu vrstu.
    sour_cream_variety:
      name: Raznolikost kiselog vrhnja
      description: Klasificira proizvode od kiselog vrhnja prema njihovoj specifičnoj
        sorti ili kulturnom stilu, kao što su crème fraîche ili meksička krema.
    soy_sauce_variety:
      name: Varijanta sojinog umaka
      description: Identificira specifičan stil ili formulaciju umaka od soje (npr.
        svijetli, tamni, tamari, ponzu), omogućujući kupcima brzo filtriranje prema
        profilu okusa i kulinarskoj uporabi.
    spark_plug_electrode_material:
      name: Materijal elektrode svjećice
      description: Materijal/tehnologija vrha/vrhova elektrode svjećice na kraju paljenja
        (središnji i/ili uzemljeni), kako je navedeno na tržištu (primjerice bakar,
        platina, iridij).
    spark_plug_seat_type:
      name: Vrsta sjedišta Spark
      description: Stil brtvljenja/sjedišta koji svjećica koristi na sučelju glave
        cilindra.
    spark_plug_terminal_type:
      name: Vrsta terminala svjećice
      description: Stil gornjeg terminal koji se koristi za spajanje potencijalnog
        kupca/prtljažnika za paljenje.
    sparkler_shape:
      name: Oblik prskalice
      description: Sveukupni oblik/čimbenik oblika prskalice.
    speaker_cone_material:
      name: Materijal membrane zvučnika
      description: Primarni materijal membrane zvučnika (woofer/ID br. konus trgovca).
    speaker_size:
      name: Veličina zvučnika
      description: Nominalna veličina pogonskog uređaja/ veličina pristajanja za komponentni
        zvučnik (primjerice 6,5 inča, 6x9 inča), koristi se za usklađivanje s tvorničkim
        lokacijama i adapterima za zvučnike.
    special_effects_output_interface:
      name: Izlazno sučelje za specijalne efekte
      description: Određuje izlazni mehanizam sinkronizacije/sučelja koje se koristi
        za kontrolu uređaja za specijalne efekte.
    special_effects_stand_stability_features:
      name: Značajke stabilnosti stalka za specijalne efekte
      description: Određuje ugrađene značajke stabilnosti i sigurnosti namijenjene
        sprječavanju prevrtanja ili klizanja tijekom događaja.
    specialty_malt_name_type:
      name: Naziv/vrsta specijalnog slada
      description: Identificira specifičnu imenovanu vrstu specijalnog slada (često
        se koristi kao komercijalni naziv stila).
    specimen_presentation:
      name: Prezentacija uzorka
      description: Označava kako je kolekcionarski primjerak pripremljen ili prezentiran
        (primjerice sirov/nepripremljen, poliran, izrezan ili montiran).
    speed_bag_accessories_included:
      name: Uključeni dodaci za speed bag
      description: Navodi dodatnu Supply s vrećom za brzinu, kao što su rukavice,
        zračne pumpe, okretne šipke, lanci ili stalci.
    speed_rating:
      name: Indeks brzine
      description: Označava brzinu površine za igru koju osigurava platno biljarskog
        stola (primjerice sporo, srednje ili brzo).
    speedometer_backlight_type:
      name: Vrsta pozadinskog osvjetljenja brzinomjera
      description: Određuje je li i kako je brzinomjer pozadinski osvijetljen za vidljivost
        noću.
    speedometer_display_type:
      name: Vrsta prikaza brzinomjera
      description: 'Označava stil očitavanja brzine brzinomjera: analogna igla/brojčanik,
        digitalno numeričko očitavanje ili kombinacija analognih i digitalnih elemenata.'
    speedometer_unit_of_measure:
      name: Jedinica mjere brzinomjera
      description: Određuje jedinice brzine prikazane na brojčaniku/zaslonu.
    spike_replaceability:
      name: Zamjenjivost šiljaka
      description: Označava jesu li šiljci na cipeli zamjenjivi, fiksni ili je cipela
        bez šiljaka.
    spike_shape:
      name: Oblici Shapes
      description: Identificira geometrijski stil vrha igle šiljka, što utječe na
        prianjanje i prikladnost za različite površine za nošenje.
    spike_thread_size:
      name: Veličina navoja šiljka
      description: Određuje veličinu ili standard navojne baze koja se uvrće u cipelu
        (npr. 1/4-20).
    spin_classification:
      name: Klasifikacija vrtnje
      description: Označava profil rotacije za koji je disk dizajniran (niska, srednja,
        visoka, hiper rotacija).
    spin_profile:
      name: Profil vrtnje
      description: Određuje relativne karakteristike rotacije koje osovina potiče.
    spin_types_supported:
      name: Podržane vrste vrtnje
      description: Navodi vrste rotacije koje stroj može dati lopticama kako bi igrači
        mogli vježbati različite stilove udaraca.
    spinach_preparation_style:
      name: Stil pripreme špinata
      description: Opisuje fizičku pripremu listova špinata ili njihov format (primjerice
        cijeli list, nasjeckan, kockice).
    spinach_variety:
      name: Sorta špinata
      description: Identificira botaničku ili tržišnu sortu špinata (primjerice baby,
        savoy, vodeni, crveni), što kupcima omogućuje odabir točne vrste koju žele.
    spindle_bearing_surface_material:
      name: Materijal ležajne površine vretena
      description: Materijal vrha/ležajne površine koji se koristi u podršci vretenima
        (vrh/dno), što utječe na glatkoću i trošenje.
    spindle_bearing_type:
      name: Vrsta ležaja vretena
      description: Vrsta sučelja vrha vretena/ležaja koje smanjuje trenje o zdjelu/čašicu
        za podršku.
    spindle_finish:
      name: Završna obrada vretena
      description: Površinska obrada/premaz vretena koji utječu na osjećaj, trajnost
        i estetiku.
    spindle_hook_type:
      name: Vrsta vretenaste kuke
      description: Mehanizam za hvatanje pređe na vrhu vretena koji se koristi za
        pričvršćivanje početka niti/pređe.
    spindle_support_method:
      name: Metoda podrške vretena
      description: Kako se vreteno treba podupirati tijekom vrtnje.
    spindle_tip_style:
      name: Stil vrha vretena
      description: Oblik/dizajn točke koja se naslanja u zdjelici/čašici (ležajna
        površina), utječući na trenje i glatkoću vrtnje.
    spindle_whorl_position:
      name: Položaj vretena
      description: Gdje se pršljen nalazi na osovini vretena.
    spinner_blade_shape:
      name: Oblik oštrice predioca
      description: Identificira primarne oblike lopatica korištene u animaciji učenja,
        što utječe na vibracije, bljesak i dubinu rada.
    spinner_control_card_design_type:
      name: Vrsta/dizajn kontrolne kartice predioca
      description: Opisuje vrstu kontrolne kartice predioca u smislu načina na koji
        predstavlja kontrolne informacije (npr. referenca omjera, referenca napetosti,
        grafikon konverzije).
    spinner_subtype:
      name: Podvrsta spinnera
      description: Klasificira cjelokupni dizajn ili obitelj animacija učitavanja
        (primjerice ugrađena animacija učitavanja, spinnerbait).
    spinning_oil_application_area:
      name: Područje primjene ulja za predenje
      description: Određuje predviđenu točku(e) primjene ulja na kotaču za predenje.
    spinning_oil_application_tool:
      name: Alat za nanošenje ulja pri predenju
      description: Označava stil aplikatora/vrha za pakiranje koji se koristi za nanošenje
        ulja na dijelove kotača za kontrolirano doziranje.
    spinning_oil_features:
      name: Značajke ulja za predenje
      description: Highlight funkcionalna svojstva relevantna za ulja za kotače za
        predenje (ostatak, mrlje, oksidacija i perivost).
    spinning_top_features:
      name: Značajke vrtuljka
      description: Posebne značajke igre uključene u čigru, osim osnovnog predenja.
    spinning_top_launch_mechanism:
      name: Mehanizam za lansiranje vrtuljke
      description: Kako se vrtilja pokreće/pokreće za vrtnju.
    spinning_wheel_brake_tension_system_type:
      name: Vrsta kočnice kolovrata/sustava zatezanja
      description: Određuje sustav kočenja/namotavanja koji se koristi za kontrolu
        namotavanja pređe.
    spinning_wheel_drive_system:
      name: Sustav pogona kolovrata
      description: Označava pogonski sustav za koji je špulica namijenjena.
    spinning_wheel_hook_system:
      name: Sustav kuka za kotačiće za predenje
      description: Određuje kako se pređa vodi duž krakova letka.
    spinning_wheel_part_application:
      name: Primjena dijela kolovrata
      description: Određuje za koje komponente kotača za predenje je ulje namijenjeno.
    spinning_wheel_portability_foldability:
      name: Prenosivost/sklopivost kotača za okretanje
      description: Označava je li kotač dizajniran za sklapanje/savijanje radi transporta.
    spinning_wheel_tension_adjustment_type:
      name: Vrsta podešavanja napetosti kolovrata
      description: Kako se napetost podešava na kotaču za kontrolu namotavanja.
    splice_termination_type:
      name: Vrsta spajanja/raskida
      description: Određuje krajnji raskid predviđen na sidrenoj liniji (primjerice
        spojena ušica, naprstak, kuka za lanac).
    split_shot_cut_type:
      name: Vrsta reza s Split sačmom
      description: Određuje stil utora ili otvora koji omogućuje pričvršćivanje na
        nit.
    split_shot_shape:
      name: Oblik split shot utega
      description: Opisuje fizički oblik podijeljenog hica, koji utječe na hidrodinamiku
        i otpornost na zapinjanje.
    split_shot_size:
      name: Veličina Split shot-a
      description: Standardizirani alfanumerički kod veličine (primjerice SSG, AAA,
        BB, 1) koje koriste proizvođači i ribolovci za klasifikaciju Split sačmarica.
        Nadopunjuje točna mjerenja težine.
    spoiler_adjustability:
      name: Podesivost spojlera
      description: Označava je li kut/visina spojlera podesiva.
    spoke_accessory_function:
      name: Functionspribora za žbice
      description: Klasificira primarne funkcije pribora na kotaču, kao što su dekorativne,
        reflektirajuće ili osvijetljene.
    spoke_butting_profile:
      name: Profil spoja žbica
      description: Opisuje kako se promjer žbice mijenja duž svoje duljine (obična,
        jednostruka, dvostruka, trostruka ili četverostruko sastavljena), što utječe
        na težinu i čvrstoću.
    spoke_gauge:
      name: Mjerač žbica
      description: Određuje debljinu žice (procjenu debljine žice) žbica s kojima
        je nipl kompatibilan.
    spoke_interface_type:
      name: Vrsta spoja žbice
      description: Označava stil glave žbica za koji je glavčina dizajnirana (J-savijena,
        ravna-povlačenje, T-glava).
    spoke_shape:
      name: Oblici Shapes
      description: Određuje vanjski presjek žice žbice, što utječe na aerodinamiku
        i estetiku.
    spool_form_factor:
      name: Oblik kalema
      description: Fizički stil tijela kalema i način na koji se zadržava niz poruke/pređe
        (primjerice prirubnica u odnosu na konus).
    spoon_style:
      name: Stil žlice
      description: Označava funkcionalni podtip ili stil žlice, kao što su zabacivanje,
        lepršanje ili panulanje.
    sports_bra_padding_type:
      name: Sportski grudnjak tipa razmak u podnožju
      description: Određuje vrstu razmaka u podnožju koji se nalazi u sportskom grudnjaku.
    sports_cap_style:
      name: Stil sportske kape
      description: Identificira cjelokupnu konstrukciju/stil kape (primjerice bejzbolska
        kapa, snapback), neovisno o brendiranju tima.
    sports_governing_body_certification:
      name: Certifikacija sportskog upravnog tijela
      description: Označava službene certifikate ili odobrenja priznatih sportskih
        upravnih tijela, kojima se potvrđuje da proizvod zadovoljava natjecateljske
        standarde.
    sports_surface_compatibility:
      name: Kompatibilnost sportskih površina
      description: Navodi vrste površina za igru na koje se boja može sigurno nanositi.
    sports_toy_set_contents:
      name: Sadržaj seta sportskih igračaka
      description: Identificira koje su komponente uključene u set sportskih igračaka
        (primjerice lopta, palica, mreža, mete).
    spray_string_cleanup_method:
      name: Metoda čišćenja raspršivačem
      description: Preporučeni način uklanjanja/čišćenja ostataka spreja.
    spray_string_finish_effect:
      name: Završna obrada/efekt spreja
      description: Vizualni efekt raspršenog sloja nakon nanošenja (sjaj/refleksija
        i specijalni efekti).
    spray_string_formulation_type:
      name: Vrsta formulacije spreja niz
      description: Kako se proizvod ponaša tijekom i nakon prskanja (primjerice perivo
        u odnosu na trajno lakiranje).
    spray_string_recommended_surface:
      name: Poprskajte preporučanu površinu
      description: Vrste površina na kojima je namijenjeno korištenje raspršivača
        (i koje će se vjerojatno očistiti).
    spray_string_scent:
      name: Miris u spreju
      description: Profil mirisa ili mirisa, ako postoji, raspršivača.
    spray_string_suitable_age_group:
      name: Poprskajte niz odgovarajuću dobnu skupinu
      description: Preporučana minimalna dob/dobna skupina korisnika za sigurnu uporabu.
    spread_consistency:
      name: Konzistencija namaza
      description: Opisuje teksturu/konzistenciju umaka ili namaza kako bi se postavila
        očekivanja za osjećaj u ustima i upotrebu (primjerice glatko, gusto, tučeno).
    spread_variety:
      name: Raznolikost širenja
      description: Klasificira određenu vrstu voćnog namaza (primjerice pekmez, žele,
        marmelada, skuta) kako bi kupci mogli razlikovati različite stilove pripreme
        i teksture.
    spreader_bar_type:
      name: Vrsta razuporne letve
      description: Označava vrstu šipke za rasipanje ili sustava kuka koji je dostavljen
        ili je kompatibilan s pojasom.
    sprint_canoe_class:
      name: Klasa sprint kanua
      description: Određuje službenu oznaku klase za sprint kanu utrke.
    sprout_presentation:
      name: Prezentacija klica
      description: Identificira fizički izgled proizvoda (primjerice svježe klice,
        mikrozelenje, lonac za uzgoj živih biljaka, prah).
    squash_and_gourd_variety:
      name: Sorte tikve i tikvice
      description: Identificira specifičnu sortu ili tržište tikve ili tikvice, pomažući
        kupcu da brzo pronađe željenu vrstu.
    stability_class:
      name: Razred stabilnosti
      description: Opća kategorizacija stabilnosti izvedena iz ocjena leta ili marketinških
        tvrdnji.
    stabilizer_thread_size:
      name: Stabilizator niz poruka veličina
      description: Specifikacija niti koja se koristi za pričvršćivanje stabilizatora
        ili dodatka na luk ili samostrel.
    stabilizer_type:
      name: Vrsta stabilizatora
      description: Označava stil ili pozicijsku klasifikaciju stabilizatora luka ili
        samostrela.
    stages_supported:
      name: Podržane faze
      description: Označava s koliko stupnjeva je raketa ili komplet dizajniran za
        let.
    stain_remover_format:
      name: Format sredstva za uklanjanje mrlja
      description: Određuje proizvod/format koji se koristi za tretiranje mrlja s
        vozila (boca s raspršivačem, aerosol, pjena, gel, prah, maramice, olovka/marker).
    stake_shape:
      name: Oblik udjela
      description: Definira presjek ili stil dizajna šatorskog kolca, što utječe na
        snagu držanja u različitim vrstama tla.
    stamp_block_features:
      name: Značajke bloka žiga
      description: Highlight funkcionalne značajke blokova žigova kao što su mjerna
        mreža, korisničko ime ili neklizajuće površine.
    stamp_block_type:
      name: Vrsta bloka žiga
      description: Određuje konstrukciju/stil bloka pečata koji se koristi za postavljanje
        pečata za žigosanje (primjerice prozirni akrilni blok, blok montiran na drvo
        ili blok za pozicioniranje).
    stamp_set_pieces_included:
      name: Uključeni dijelovi seta pečata
      description: Označava koje su komponente uključene u set pečata i jastučića
        za pečat (primjerice pečati, jastučići za tintu, markeri).
    stand_padding_material:
      name: Materijal podloge stalka
      description: Materijal koji se koristi na kontaktnim točkama za zaštitu završne
        obrade instrumenta (primjerice pjena, guma, silikon).
    staple_fiber_animal_fiber_type:
      name: Vrsta životinjskih vlakana od rezanaca
      description: Specifična vrsta vlakna životinjskog podrijetla kada je izvor stapl
        vlakana životinjskog podrijetla.
    staple_fiber_crimp_level:
      name: Razina kovrčanja rezanih vlakana
      description: Stupanj prirodne kovrčavosti/valovitosti vlakna.
    staple_fiber_preparation_type:
      name: Vrsta pripreme rezanih vlakana
      description: Stanje pripreme/obrade vlakana u prodaji (kako se poravnava/rukuje),
        što snažno utječe na metodu predenja, jednostavnost izrade nacrta i konačni
        rezultat.
    staple_fiber_source_type:
      name: Vrsta izvora rezanih vlakana
      description: Široka kategorija podrijetla za sadržaj vlakana.
    starch_processing_type:
      name: Vrsta obrade škroba
      description: Označava je li škrob prirodni ili je fizički ili kemijski modificiran
        (primjerice instant, preželatiniziran) kako bi se postigla specifična funkcionalna
        svojstva poput brzine zgušnjavanja ili tolerancije temperature.
    starch_source:
      name: Izvor škroba
      description: Navodi botanički izvor iz kojeg se dobiva škrob za kuhanje ili
        zgušnjivač (primjerice kukuruz, krumpir, tapioka). Izvor je glavni diferencijalni
        faktor za kuhanje škroba i izravno utječe prikladnost recepta, alergene i
        ponašanje potrošača u pretraživanju.
    starfruit_variety:
      name: Sorta karambole
      description: Identificira specifičan kultivar ili sortu karambole (primjerice Arkin,
        Fwang Tung).
    starter_drive_type:
      name: Vrsta starter pogona
      description: Vrsta mehanizma za pogon/uključivanje Shopify Starter koji se koristi
        za spajanje zupčanika s vijencem zupčanika.
    starter_pistol_action_type:
      name: Vrsta mehanizma startnog pištolja
      description: Identificira mehanizam ispaljenja/djelovanja starter pištolja (npr.
        sa jednostrukim djelovanjem, sa dvostrukim djelovanjem, poluautomatski).
    starter_pistol_caliber:
      name: Kalibar starter pištolja
      description: Određuje kalibar praznog streljiva ili patrona za koji je predviđen
        starter pištolj.
    starter_terminal_type:
      name: Vrsta priključka startera
      description: Određuje stil terminal/mehanizma sinkronizacije koji se koristi
        za električnu vezu na Shopify Starter ili Shopify Starter solenoidu (primjerice
        klin, lopata, utični mehanizam sinkronizacije).
    starting_block_anchoring_method:
      name: Metoda sidrenja početnog bloka
      description: Opisuje kako se blokovi pričvršćuju na površinu pratiti (primjerice
        šiljci, vakuumske čašice, gumene podloge).
    steerer_tube_design:
      name: Dizajn cijevi upravljača
      description: Opisuje strukturni dizajn cijevi upravljača - ravni, suženi, niz
        poruka itd. - koji određuje kompatibilnost ležaja i okvira.
    steering_cable_end_fitting_type:
      name: Vrsta priključka za kraj sajle upravljača
      description: Označava stil pričvršćivanja/montaže na krajevima kormilarskog
        kabela plovila (kraj kormila i kraj motora/kormila) kako bi se osigurala kompatibilnost
        s točkama veza kormila i motora. Koristite oznaku standard ili proizvođač
        gdje je primjenjivo.
    steering_column_adjustability_features:
      name: Značajke podesivosti stupaca upravljača
      description: Označava koje su funkcije podešavanja ugrađene u upravljački stupac.
    steering_column_ignition_provision:
      name: Osiguranje paljenja stupaca upravljača
      description: Označava je li upravljački stupac dizajniran za prihvat cilindra/prekidača
        brave paljenja i/ili brave upravljača.
    steering_column_shaft_end_interface_type:
      name: Tip sučelja kraja osovine upravljačkog stupaca
      description: Označava stil sučelja kraja osovine upravljačkog stupaca (primjerice
        užljebljen, dvostruko D, s ključem).
    steering_column_shift_type:
      name: Vrsta mjenjača stupca upravljača
      description: Određuje uključuje li stupac upravljača mehanizam za mijenjanje
        brzina montiran na stupac i vrstu njegovog mjenjača.
    steering_component_drive_type:
      name: Vrsta pogona upravljačkog dijela
      description: Određuje mehanizam pogona/pomoći relevantan za komponente upravljanja
        (posebno pumpe i EPS sustave).
    steering_position:
      name: Položaj volana
      description: Određuje je li kombi s volanom na lijevoj ili desnoj strani.
    steering_pump_pulley_type:
      name: Vrsta remenice crpke upravljača
      description: Određuje vrstu/sučelje pogona remenice koje se koristi s pumpom
        upravljača.
    steering_rack_finish_coating:
      name: Završna obrada/premaz letve upravljača
      description: Određuje vanjsku završnu obradu/premaz za zaštitu od korozije.
    steering_rack_position:
      name: Položaj letve upravljača
      description: Određuje gdje se stalak montira/koristi u sustavu upravljanja vozila.
    steering_wheel_cover_installation_type:
      name: Vrsta ugradnje poklopca volana
      description: Kako je poklopac volana postavljen/pričvršćen na volan.
    steering_wheel_grip_material:
      name: Materijal rukohvata upravljača
      description: Određuje materijal na obruču/ručki kotača (gdje ruke dolaze u kontakt),
        koji se može razlikovati od jezgre/žbica kotača.
    steering_wheel_mounting_pattern:
      name: Uzorak za montažu volana
      description: Određuje uzorak montaže vijaka/rupe koji se koristi za pričvršćivanje
        volana na glavčinu ili prilagodnik (primjerice tri vijka, pet vijaka).
    steering_wheel_rim_material_grip_surface:
      name: Materijal obruča volana (površina za hvatanje)
      description: Određuje primarni materijal ručke/obruča (različit od ukupnog konstrukcijskog
        materijala).
    stem_material:
      name: Materijal stabljike
      description: Određuje materijal koji se posebno koristi za cijev lule ili usnik
        (primjerice akril, Ebonite, lucit).
    stencil_machine_consumable_type:
      name: Vrsta potrošnog materijala za šablonirku
      description: Navodi potrošni materijal potreban za rad (ako postoji).
    step_surface_texture:
      name: Tekstura površine stepenice
      description: Određuje gazni sloj ili dizajn/materijal površine stepenice namijenjen
        poboljšanju prianjanja i udobnosti kada je mokro.
    stepper_motion_type:
      name: Vrsta koračnog Motion
      description: Definira primarni koračni pokret kojeg nudi stroj.
    stick_bow_profile:
      name: Profil štapnog luka
      description: Određuje profil zakrivljenosti (ili "vrstu luka") drške palice
        za hokej na travi, ključni faktor koji utječe na kontrolu lopte, učinkovitost
        trzanja i stil igre.
    stick_construction:
      name: Konstrukcija palice
      description: Određuje stil konstrukcije hokejaške palice, kao što je jednodijelni
        kompozitni, dvodijelni kompozitni ili drveni.
    stick_curvature_type:
      name: Vrsta zakrivljenosti štapa
      description: Opisuje profil zakrivljenosti štapa za bacanje, koji utječe na
        daljinu bacanja i preciznost.
    stick_head_shape:
      name: Oblik glave štapa
      description: Definira oblike glave štapa, što utječe na hvatanje, stil udaranja
        i blisku kontrolu lopte.
    stick_size_compatibility:
      name: Kompatibilnost veličine palice
      description: Označava veličinu hokejske palice s kojom je proizvod kompatibilan
        (primjerice Youth, Junior, Intermediate, Senior, Goal, Universal).
    sticker_decal_features:
      name: Značajke naljepnica/dekodera
      description: Zabilježava karakteristike aplikacije i učinkovitosti specifične
        za naljepnice/dekale (primjerice bez mjehurića, mogućnost premještanja).
    sticker_finish:
      name: Završna obrada naljepnice
      description: Opisuje površinsku obradu/vizualni efekt naljepnica.
    sticker_format:
      name: Format naljepnice
      description: Određuje Retail oblik ukrasnih naljepnica (primjerice list, rola,
        pojedinačno, knjiga).
    sticker_material_type:
      name: Vrsta materijala naljepnice
      description: Određuje primarnu podlogu/materijal ukrasne naljepnice (ne ukrasa).
    stilt_foot_attachment_type:
      name: Vrsta pričvršćivanja za stopalo za štule
      description: Označava kako se korisnikovo stopalo pričvršćuje za štulu (npr.
        kopčom, čičkom, vezicama).
    stirrup_style:
      name: Stil stremena
      description: Klasificira stil stremena specifičan za dizajn ili disciplinu,
        obuhvaćajući sigurnosne, disciplinske i konstrukcijske varijacije.
    stirrup_tread_material:
      name: Materijal gaznog sloja stremena
      description: Određuje materijal koji se koristi za podnožje ili gazni dio stremena,
        što utječe na prianjanje, udobnost i habanje.
    stitch_marker_and_counter_style:
      name: Marker i brojač šavova
      description: Određuje stil ili oblik markera uboda ili brojača uboda/redova
        (primjerice marker za zaključavanje, marker s prstenom za dijeljenje, brojač
        prstenova, digitalni brojač).
    stitch_types:
      name: Vrste šavova
      description: Vrste šavova (funkcionalni i dekorativni) koje stroj može proizvesti.
    stitching_method:
      name: Metoda šivanja
      description: Označava kako su kuglaste ploče spojene zajedno.
    stitching_state:
      name: Stanje šivanja
      description: Označava jesu li odjevni predmeti isporučeni nešiveni, polušiveni,
        šivani ili spremni za nošenje.
    stock_car_race_series:
      name: Serija utrka stock automobila
      description: Označava tijelo koje odobrava utrke ili seriju/klasu utrka za koje
        je serijski automobil napravljen za natjecanje.
    stone_adhesion:
      name: Prianjanje kamena
      description: Označava je li koštica breskve ili nektarine sa slobodnom, prianjajućom
        ili poluslobodnom košticom.
    stone_creation_method:
      name: Metoda izrade kamena
      description: Određuje je li kamen prirodan, uzgojen u laboratoriju, simuliran
        ili recikliran.
    stone_cut_grade:
      name: Vrsta brušenja kamena
      description: Označava ukupnu ocjenu kvalitete brušenja kamena.
    stone_cut_style:
      name: Stil brušenja kamena
      description: Stil brušenja/filtriranja staklenog kamena (primjerice filtri vs.
        kabošon).
    stone_fruit_cultivar:
      name: Sorta koštuničavog voća
      description: Identificira specifičnu sortu/kultivator breskve ili nektarine.
    stone_fruit_variety:
      name: Sorta koštuničavog voća
      description: Razlikuje podtip unutar kategorije (primjerice breskva, nektarina,
        krafna/ravna breskva).
    stone_setting_type:
      name: Vrsta postavljanja kamena
      description: Određuje kako se kamen pričvršćuje u komadu (okvir, krak, pavé
        itd.).
    stone_transparency:
      name: Prozirnost kamena
      description: Optička prozirnost/neprozirnost staklenog kamena.
    storage_case_type:
      name: Vrsta kutije za skladištenje
      description: Označava vrstu spremnika u kojem se set dolazi za skladištenje
        i transport (primjerice kutija, vreća).
    storage_compartment_type:
      name: Vrsta pretinca za odlaganje
      description: Određuje vrstu pretinca za pohranu koji plutača za plivanje pruža
        za osobne stvari.
    storage_media_and_transfer_methods_supported:
      name: Podržane metode pohranjivanja medijskog sadržaja i prijenosa
      description: Podržane metode medijskog sadržaja ili veze za uvoz/izvoz uzoraka
        i spremanje/učitavanje projekata.
    storage_requirements:
      name: Zahtjevi za pohranu
      description: Određuje kako se proizvod treba skladištiti prije i/ili nakon otvaranja
        kako bi se održala kvaliteta i sigurnost.
    stove_jack_compatibility:
      name: Kompatibilnost s utičnicom za štednjak
      description: Označava ima li šator vatrootporni otvor za cijev peći.
    straight_pin_application:
      name: Straight prikačeno aplikacija
      description: Određuje namijenjenu uporabu kutija za ravno prikačeno.
    straight_pin_finish:
      name: Ravno prikačeno završetkom
      description: Opisuje površinsku završnu obradu ili premaz prikačenog predmeta
        (npr. poniklani) koji utječe na otpornost na koroziju i klizanje.
    straight_pin_head_material:
      name: Ravno prikačeno materijal glave
      description: Određuje materijal prikačene glave (ako postoji), kao što je plastika
        ili staklo.
    straight_pin_head_shape:
      name: Oblik ravne glave igle
      description: Opisuje oblik/stil prikazane glave radi upotrebljivosti i vidljivosti.
    strand_configuration:
      name: Konfiguracija niti
      description: Označava koliko zasebnih redova ili niti čini lanac digitalnog
        novčića (jednostruki, dvostruki, trostruki).
    strand_material:
      name: Materijal niti
      description: Određuje materijal korišten za pojedinačne niti/trake.
    strap_attachment_hardware:
      name: Okovi za pričvršćivanje remena
      description: Određuje vrstu/dizajn oprreme koja se koristi za pričvršćivanje
        remena na instrument/točku podrške.
    strap_configuration:
      name: Konfiguracija remena
      description: Označava broj točaka pričvršćivanja kacige na remenu (primjerice
        2-točkovno, 4-točkovno), što je ključno za pristajanje, sigurnost i zahtjeve
        lige.
    strap_functionality:
      name: Funkcionalnost remena
      description: Određuje primarnu namjenu ili dizajn remena za prostirku za jogu.
    strap_padding:
      name: Remen razmak u podnožju
      description: Označava razinu podstavljene konstrukcije remena namijenjene poboljšanju
        udobnosti i raspodjeli težine.
    strap_side:
      name: Strana remena
      description: Označava je li remen namijenjen za lijevi vez, desni vez ili se
        prodaje kao par.
    strap_width:
      name: Širina remena
      description: Označava relativnu širinu naramenica (tanke, srednje, široke) za
        vodič kupaca koji traži specifičnu pokrivenost ili podršku.
    strength_classification:
      name: Klasifikacija čvrstoće
      description: Marketinška etiketa snage koju obično koriste marke (npr. lagano,
        jako, Iznimno jako).
    strength_grade:
      name: Razred čvrstoće
      description: Opisuje predviđenu razinu čvrstoće držanja čičak trake.
    stretch_level:
      name: Razina rastezanja
      description: Označava koliko se tekstil rasteže tijekom uporabe.
    stretch_type:
      name: Vrsta rastezanja
      description: Označava ima li tkanina mehaničko ili elastično rastezanje i u
        kojim smjerovima.
    stretcher_bar_material:
      name: Materijal za nosiljku
      description: Materijal korišten za nosače/Frame (primjerice bor, jela, topola,
        breza, MDF/konstruirano drvo).
    strike_shield_shape:
      name: Oblik štita za udarce
      description: Određuje ukupni faktor oblika udarne površine štita za udarce.
    string_core_shape:
      name: Oblik jezgre žice
      description: Određuje oblik jezgrene žice koji se koriste u namotanim žicama,
        što utječe na osjećaj i stabilnost.
    string_coverage:
      name: pokrivenost niza
      description: Određuje koje žice djelomični kapodaster je dizajniran da pritišće/pokriva.
    string_end_type:
      name: tip niz kraja
      description: Određuje kako se niz završava na mostu/kontrapiktetu radi kompatibilnosti
        (posebice važno za akustične/električne i neke bas gitare).
    string_set_type:
      name: Vrsta seta žica
      description: Određuje je li proizvod cijeli set ili pojedinačni zamjenski niz(ovi).
    strung_status:
      name: Status zategnutosti
      description: Označava da li glava za lacrosse dolazi sa džepom ili se prodaje
        bez žice.
    strut_placement:
      name: Položaj podupirača
      description: Određuje predviđeni položaj ugradnje amortizera na vozilu (sprijeda/straga
        i lijevo/desno).
    stud_attachment_type:
      name: Vrsta pričvršćenja zakovice
      description: Određuje kako su klinovi/kopačke pričvršćeni ili konfigurirani
        na potplatu, što utječe na vuču, održavanje i usklađenost s propisima lige.
    stud_configuration:
      name: Konfiguracija zakovica
      description: Definira oblike i raspored čepova/kopki na potplatu, utječući na
        prianjanje i učinkovitost na raznim površinama.
    stud_material:
      name: Materijal zakovice
      description: Označava primarni materijal klinova/kopki, informirajući o trajnosti,
        težini i usklađenosti sa sigurnosnim propisima.
    stuffed_animal_features:
      name: Značajke plišane životinje
      description: Highlight ugrađene značajke igre i udobnosti plišane životinje.
    stump_base_type:
      name: Vrsta baze panja
      description: Definira stil baze ili sustava montaže koji koristi štapić za kriket
        (šiljak, povratna opruga, otežana guma itd.).
    stump_mechanism:
      name: Mehanizam panja
      description: Određuje mehanizam povratka ili montaže panjeva za cvrčak (primjerice
        opružni, fiksni).
    stump_size:
      name: Veličina panja
      description: Etiketa veličine kategorije koja se koristi za panjeve za kriket,
        označava tipičnu visinu i odgovarajuću skupinu igrača.
    subwoofer_installation_type:
      name: Vrsta ugradnje subwoofera
      description: Kako se subwoofer namjerava ugraditi u audio sustav vozila.
    sugar_cane_variety:
      name: Sorta šećerne trske
      description: Identificira specifičan kultivar ili tržište šećerne trske, što
        može utjecati na boju, slatkoću i sadržaj vlakana.
    sugar_content_level:
      name: Razina sadržaja šećera
      description: Klasificira ukupnu razinu šećera ili formulaciju koncentrata napitka,
        što omogućuje kupcima da brzo pronađu opcije s normalnim i smanjenim šećerom
        ili bez šećera.
    sugar_refinement_level:
      name: Razina rafiniranja šećera
      description: Označava stupanj ili stil rafiniranja (boja, melasa, sadržaj ili
        razina obrade).
    sugar_source:
      name: Izvor šećera
      description: Identificira botaničko ili materijalno podrijetlo iz kojeg je šećer
        dobiven.
    suit_fit:
      name: Kroj odijela
      description: Ukupni kroj odijela, koji pokazuje koliko blizu prianja uz tijelo.
    suit_pieces:
      name: Dijelovi odijela
      description: Određuje koliko je usklađenih odjevnih predmeta uključeno u komplet
        odijela (primjerice dvodijelno, trodijelno, četverodijelno).
    suitable_for_anchoring_use:
      name: Pogodno za sidrenje
      description: Označava slučaj namjene za uporabu užeta/konopca vezanu uz sidrenje.
    suitable_for_craft_type:
      name: Prikladno za vrstu izrade
      description: Primarna uporaba žice za blokiranje u ručnim radovima.
    suitable_for_paint_type:
      name: Vrsta boje za koju je prikladno
      description: Označava s kojim vrstama boja je platno namijenjeno/sigurno za
        korištenje.
    suitable_for_swim_stroke:
      name: Pogodno za stil plivanja
      description: Označava za koji je stil plivanja ručno veslo dizajnirano ili optimizirano.
    suitable_mounting_surface_material:
      name: Prikladan materijal za montažnu površinu
      description: Određuje namjeravanu površinu/materijal za montažu na koji se ljepljiva
        podloga treba povezati.
    suitable_play_location:
      name: Prikladna lokacija za igru
      description: Primarno predviđeno okruženje(a) za igru s igračkom mlinom za pijesak
        i vodu.
    suitable_riding_conditions:
      name: Prikladni uvjeti vožnje
      description: Označava uvjete vožnje (primjerice suho, mokro, zimsko vrijeme)
        za koje je mazivo ili sredstvo za čišćenje bicikla formulirano.
    suitable_snow_conditions:
      name: Pogodni snježni uvjeti
      description: Označava primarni(e) uvjet(e) na snijegu za koji(e) je vosak za
        prianjanje formuliran.
    suitable_surface_type:
      name: Prikladna vrsta površine
      description: Određuje površine za hodanje za koje je ručka namijenjena.
    suitable_table_size:
      name: Prikladna veličina stola
      description: Označava duljinu(e) stola za biljar/snooker koju svjetlo treba
        osvijetliti.
    sun_protection_rating_upf:
      name: Ocjena zaštite od sunca (UPF)
      description: Pruža certificiranu UPF razinu zaštite od sunca za odjevni predmet.
    sun_shade_attachment_method:
      name: Način pričvršćivanja sjenila
      description: Kako je sjenilo pričvršćeno na prozor/vjetrobransko staklo.
    sun_shade_style:
      name: Stil sjenila za sunce
      description: Konstrukcija/format proizvoda za postavljanje i trgovinu sjenilom.
    sunchoke_variety:
      name: Sorta čičoke
      description: Označava specifičan kultivar ili sortu jeruzalemske artičoke, pružajući
        detaljne informacije za vrtlare, kuhare i iskusne kupce.
    sunflower_oil_variety:
      name: Vrsta suncokretovog ulja
      description: Klasificira profil masnih kiselina ili kultivar suncokretovog ulja
        (primjerice visokooleinsko, ID br. trgovca-oleinsko, linolno).
    sunflower_variety:
      name: Sorta suncokreta
      description: Sorta/kultivar suncokreta (uobičajene sorte tržišta za rezano cvijeće).
    support_brace_features:
      name: Značajke ortoze
      description: Navodi značajne funkcionalne značajke potpore za zglob kao što
        su prozračna tkanina, uklonjiva udlaga ili podesiva metalna ploča.
    support_leg_count:
      name: Broj noga za podršku
      description: Broj nogu koje dodiruju tlo kada se koristi palica za gađanje (primjerice
        monopod, dvonožac, tronožac).
    support_padding:
      name: podrška razmak u podnožju
      description: Označava uključuje li remen/podrška integrirani jastučić na kontaktnim
        točkama (vrat/rame/palac).
    support_structure_type:
      name: Tip strukture potpore
      description: Označava metodu konstrukcije koja se koristi za održavanje vjetrobranskog
        pojasa u uspravnom položaju.
    supported_bowling_delivery_types:
      name: Podržane vrste dostave za kuglanje
      description: Određuje varijacije kuglanja u kriketu koje stroj može simulirati,
        kao što su zamah prema unutra, zamah prema van i vrste vrtnje.
    supported_dive_modes:
      name: Podržani načini ronjenja
      description: Određuje operativni način ronjenja koji ronilačko računalo podržava,
        kao što su zrak, nitrox ili mjerač.
    supported_equipment_type:
      name: Vrsta podržane opreme
      description: Označava opremu za zimske sportove za koju je stalak namijenjen
        (npr. skije, snowboarde, skijaške štapove).
    supported_spin_types:
      name: Podržane vrste vrtnje
      description: Određuje varijacije rotacije lopte koje bacač može primijeniti.
    supported_spool_bobbin_types:
      name: Podržane vrste špule/špulne
      description: Određuje koje formate špule/špulne električni namotač može prihvatiti.
    surf_wax_temperature_rating:
      name: Ocjena temperature voska za surfanje
      description: Određuje raspon temperature vode za koji je vosak formuliran, osiguravajući
        optimalno prianjanje u različitim klimama.
    surface_coating_or_finish:
      name: Površinski premaz ili završna obrada
      description: Označava bilo kakav tretman površine primijenjen na kliješta koji
        ima značajku zaštite ili poboljšanja učinkovitosti.
    surface_coating_or_wrap:
      name: Površinski premaz ili omotač
      description: Vanjska površina trenažera koja se koristi za hvat/kontrolu središnje
        palice (a ponekad i ručnih palica).
    surface_finish:
      name: Površinska obrada
      description: Opisuje osjećaj/teksturu površine lopte koja utječe na hvat i kretanje
        tijekom kontaktnog žongliranja.
    surface_finish_prep:
      name: Površinska obrada/priprema
      description: Označava površinu trenja uvjet (primjerice ponovno obrađena, strojno
        obrađena, kao što je lijevano) pri sniženju.
    surface_types_included:
      name: Uključene vrste površina
      description: Određuje koju površinu komplet uključuje za crtanje/slikanje (ako
        postoji), kao što je platno, papirna podloga, drvene ploče ili ništa.
    surfboard_construction:
      name: Konstrukcija surf daske
      description: Određuje primarnu tehnologiju izrade ili slojevitost daske za surfanje.
    surfboard_tail_shape:
      name: Oblik repa daske za surfanje
      description: Definira obris repa daske, što utječe na upravljivost i držanje.
    suspension_bushing_type:
      name: Vrsta čahure ovjesa
      description: Određuje funkcionalnost/stil ugradnje čahure ovjesa.
    suspension_configuration:
      name: Konfiguracija ovjesa
      description: Opisuje ima li tricikl ovjes i gdje se on nalazi.
    suspension_material:
      name: Materijal traka
      description: Određuje materijal lanaca, užadi ili kabela koji se koriste za
        vješanje ljuljačke.
    suspension_trainer_accessories_included:
      name: Uključeni dodaci za trenažer s trakama
      description: Navodi dodatnu opremu dostavljenu s kompletom za trening (primjerice
        sidro za vrata, produžni remen, torbu za pohranu), što pomaže kupcu da razumije
        što se nalazi u kutiji i usporedi vrijednost paketa.
    suspension_trainer_anchor_type:
      name: Vrsta sidra za trenažer s trakama
      description: Definira način montaže ili sidrišnu točku za koju su trake dizajnirane
        (primjerice vrata, strop, drvo), informirajući o kompatibilnosti s korisničkim
        okruženjem.
    suspension_type:
      name: Vrsta ovjesa
      description: Određuje je li vilica kruta ili koristi određeni sustav ovjesa
        (zračni, spiralni, hibridni, elastomerni itd.), pomažući vozačima da prilagode
        vilicu svom stilu vožnje.
    sustain_pedal_form_factor:
      name: Čimbenik oblika sustain pedale
      description: Opisuje fizički stil sustain pedale (npr. nožna pedala u stilu
        klavira u odnosu na kompaktni nožni prekidač), što utječe na osjećaj i namjeravanu
        uporabu.
    sustain_pedal_switch_type:
      name: Vrsta prekidača sustain pedale
      description: Označava šalje li pedala trenutni (održavanje pritiska dok je pritisnuta)
        ili zadržavajući (prebacivanje) signal.
    sustainability_certification:
      name: Certifikacija održivosti
      description: Ekološki ili izvorni certifikat za drvni materijal.
    swab_intended_bassoon_section:
      name: Sekcija fagota namijenjena za bris
      description: Označava koji dio fagota treba čistiti štapić (različiti otvori/dijelovi
        zahtijevaju različite oblike i veličine štapića).
    swab_style:
      name: Stil krpice
      description: Opisuje fizički dizajn/format štapića koji se koristi za prolazak
        kroz ili dosezanje dijelova saksofona.
    swab_weight_material:
      name: Materijal za uteg na krpici
      description: Materijal utega/vodilice za provlačenje (ako postoji), što utječe
        na rizik od ogrebotina i trajnost.
    swab_weight_style:
      name: Stil utega za brisanje
      description: Određuje kako se štapić otežava kako bi prošao kroz otvor fagota.
    sway_bar_adjustability:
      name: Podesivost stabilizatora
      description: Je li i kako se krutost stabilizatora može podešavati (obično putem
        više rupa za montažu krajnjih spojnica).
    sway_bar_coating:
      name: Premaz stabilizatora
      description: Površinski tretman ili premaz na stabilizatoru za otpornost na
        koroziju i izgled.
    sway_bar_fitment_front_rear_kit:
      name: Ugradnja stabilizatora (prednji/stražnji/komplet)
      description: Označava je li stabilizator namijenjen za prednju osovinu, stražnju
        osovinu ili se prodaje kao prednji i stražnji komplet.
    sweatshirt_pocket_type:
      name: Tip džepa za majicu s kapuljačom
      description: Opisuje stil džepova na majici s kapuljačom.
    sweet_potato_variety:
      name: Sorta batata
      description: Identificira specifičan kultivar ili tržište slatkog krumpira.
    sweet_spot_position:
      name: Pozicija idealne točke
      description: Određuje gdje se duž oštrice nalazi idealna točka palice, što utječe
        na stil igre i tonove.
    sweetener_presence:
      name: Prisustvo sladila
      description: Navodi jesu li u maslacu od orašastih plodova nazočna dodana sladila
        i u kojoj količini.
    sweetening_type:
      name: Vrsta zaslađivanja
      description: Opisuje kako je proizvod zaslađen ili njegovu razinu slatkoće.
    swim_armband_construction_type:
      name: Vrsta konstrukcije trake za plivanje
      description: Definira strukturni stil ili mehanizam plutanja narukvica (napuhavanje
        u odnosu na čvrstu pjenu, hibrid itd.).
    swim_belt_purpose:
      name: Namjena pojasa za plivanje
      description: Funkcionalna klasifikacija pojasa za plivanje (primjerice podrška
        za plutanje, aqua jogging, trening otpora, statički tether, pričvršćivanje
        padobrana za vuču, balast s utezima, sigurnosno gaženje).
    swim_board_features:
      name: Značajke plivačke daske
      description: Highlight posebne karakteristike ili poboljšanja daske za plivanje
        koja poboljšavaju upotrebljivost ili sigurnost.
    swim_bottom_length:
      name: Duljina donjeg dijela za plivanje
      description: Klasificira ukupnu pokrivenost nogu kod plivačkih bokserica (npr.
        kratke kupaće gaće/hlače u odnosu na one do koljena).
    swim_buoy_features:
      name: Značajke plivačke plutače
      description: Bilježi dodatne značajne karakteristike ili dodatke koji poboljšavaju
        vidljivost, sigurnost ili korisnost plutače za plivanje.
    swim_cap_style:
      name: Stil kape za plivanje
      description: Definira stil izrade ili dizajna kape za plivanje (npr. duga kosa,
        kupolasta/za utrku, mjehurićasta/turban).
    swim_diaper_feature:
      name: Značajka plivačke pelene
      description: Označava ima li sažetak za plivanje integriranu značajku pelene
        protiv propuštanja ili zahtijeva/ne zahtijeva zasebnu pelenu za plivanje.
    swim_trainer_features:
      name: Značajke trenera za plivanje
      description: Highlight dodatne funkcionalne ili udobne značajke trenažera za
        plivanje.
    swim_trainer_type:
      name: Vrsta trenera za plivanje
      description: Definira strukturni stil ili format trenažera za plivanje kako
        bi se olakšalo filtriranje prema dizajnu i svrsi treninga.
    swim_training_focus:
      name: Fokus treninga plivanja
      description: Identificira primarni cilj treninga koji veslanje postiže (npr.
        tehnika, snaga, izolacija mišića).
    swim_weight_style:
      name: Stil plivačkih utega
      description: Klasificira čimbenik oblika težine plivajućeg proizvoda, pomažući
        kupcu da razlikuje fundamentalno različite vrste proizvoda, a da pritom ostane
        u istoj kategoriji.
    swimbait_buoyancy:
      name: Plovnost Swimbaita
      description: Označava kako se swimbait ponaša u vodenom stupcu (pluta, lebdi,
        tone itd.), omogućujući ribolovcima da odaberu ispravnu varalicu za svoju
        ciljanu dubinu i pronađu stil.
    swimbait_style:
      name: Stil swimbaita
      description: Klasificira konstrukciju ili dizajn djelovanja swimbaita, kao što
        je mamac s repom od lopatice ili klizeći mamac.
    swimwear_pieces_included:
      name: Uključeni dijelovi kupaćeg kostima
      description: Navodi pojedinačne komponente odjeće koje su dostavljene u setu
        burkinija kako bi kupci točno znali što dolazi u paketu.
    swimwear_set_pieces_included:
      name: Uključeni dijelovi seta kupaćeg kostima
      description: Navodi dijelove odjeće koji se nalaze u setu burkinija kako bi
        kupci točno znali što će dobiti (primjerice top, tajice, hidžab/kapu).
    swing_attachment_connection_type:
      name: Vrsta ljuljačke/veza
      description: Vrsta veza koja se koristi za vješanje ljuljačke s njezine podrške
        (primjerice uže, lanac, remeni).
    swing_trainer_type:
      name: Vrsta trenera za zamah
      description: Klasificira stil ili mehanizam trenažera za ljuljanje kako bi kupac
        mogao brzo pronaći uređaj koji odgovara njegovim ciljevima treninga.
    swing_training_objective:
      name: Cilj treninga zamaha
      description: Klasificira primarni fokus treninga, mehanizam ili cilj trenažera
        zamaha (npr. tempo, brzina, hvat).
    switch_electrical_positions:
      name: Preklopni električni položaji
      description: Određuje broj i ponašanje električnih položaja na prekidaču (primjerice
        tri položaja, trenutno uključeno).
    swivel_type:
      name: Okretni tip
      description: Određuje konfiguraciju okretanja koja se koristi za smanjenje zapetljavanja
        povodca.
    sword_scabbard_material:
      name: Materijal korica mača
      description: Određuje primarni materijal uključene korice/futrole (ako je prisutna).
    synthesizer_form_factor:
      name: Faktor oblika sintetizatora
      description: Opisuje format fizičkog/reprodukcijskog sučelja sintisajzera.
    synthetic_feather_style:
      name: Stil sintetičkog perja
      description: Stil/kroj sintetičkog pera koji se koristi za različite izglede
        i tehnike izrade.
    synthetic_formulation_type:
      name: Vrsta sintetičke formulacije
      description: Određuje vrstu sintetičke baze/formulacije (primjerice PAO, ester,
        hidrokrekirana skupina III).
    syrup_base_ingredient:
      name: Baza sirupa
      description: Označava primarnu biljku ili izvor šećera iz kojih se dobiva sirup
        ili nektar (npr. javor, agava, šećer od trske).
    syrup_variety:
      name: Raznolikost sirupa
      description: Definira opći stil ili kategoriju sirupa na temelju njegove formulacije
        ili tradicionalne uporabe (npr. javorov, aroma kave, voćni, ljekoviti).
    t_shirt_fit:
      name: Kroj majice kratkih rukava
      description: Opisuje predviđeni ukupni kroj/kroj majice.
    tabla_included_components:
      name: Tabla uključene komponente
      description: Označava koje su tipke uključene u proizvod tabli (jedan bubanj
        vs. set, navlake/kutija, čekić za ugađanje itd.).
    tabla_set_pieces_included:
      name: Uključeni dijelovi seta tabla
      description: Označava koje su komponente uključene u set tabla (npr. dajan,
        bajan, prstenovi, navlake, alati za ugađanje, torba).
    tabla_tonal_pitch_range_bayan:
      name: Tabla tonski/tonski raspon (bajan)
      description: Opisuje tipičnu kategoriju visine/tonalnog raspona za bayan bubnjeve
        (bas) na temelju veličine i konstrukcije.
    table_base_material:
      name: Materijal baze stola
      description: Identificira primarni materijal podnožja ili postolja stola (razlikuje
        se od nogu ili ploče stola), što pomaže filtriranju specifičnom za materijal.
    table_base_type:
      name: Vrsta baze stola
      description: Označava konstrukcijski dizajn koji podržava ploču stola (primjerice
        postolje, nogare, X-baza).
    table_coverage_position:
      name: Položaj pokrivanja tablice
      description: 'Označava za koji(e) položaj(e) stola za stolni tenis je navlaka
        dizajnirana: preklopljena, za igranje ili oboje.'
    table_hockey_part_type:
      name: Vrsta dijela za stolni hokej
      description: Identificira specifičnu vrstu komponente unutar sustava za stolni/zračni/šipni/bubble
        hokej.
    table_leg_design:
      name: Dizajn nogu stola
      description: Identificira strukturni stil ili geometriju noge, omogućujući kupcu
        da uskladi specifične estetike i potrebe podrške.
    table_size:
      name: Veličina stola
      description: Komercijalno navedena ukupna veličina biljarskog stola (u stopama),
        što kupcima omogućuje brz odabir uobičajenih opcija kao što su barski stolovi
        od sedam stopa ili turnirski stolovi od devet stopa.
    table_size_category:
      name: Kategorija veličine stola
      description: Kategorizira stol za stolni nogomet prema ukupnoj veličini kako
        bi kupci lakše uskladili raspoloživi prostor bez izračunavanja mjera.
    table_tennis_certification:
      name: Certifikat za stolni tenis
      description: Navodi službene standarde ili odobrenja nadležnih tijela koje proizvod
        zadovoljava (npr. ITTF, EN 14468-2 klase).
    tabletop_tilt_function:
      name: Functionsnagiba stola
      description: Određuje može li se ploča stola naginjati, okretati ili zakretati
        pod različitim kutovima.
    tackle_components_included:
      name: Uključene komponente ribolovnog pribora
      description: Navodi specifične komponente ribolovnog pribora uključene u komplet
        kako bi kupac točno znao što je uključeno.
    talking_drum_accessories_included:
      name: Pribor za govoreće bubnjeve uključen
      description: Navodi pribor koji dolazi s bubnjem za govor (u kutiji).
    talking_drum_cord_material:
      name: Materijal za žicu bubnja za govor
      description: Materijal koji se koristi za zatezne vrpce/užad koja spajaju membrane
        bubnjeva.
    talking_drum_tuning_mechanism:
      name: Mehanizam za ugađanje govorećeg bubnja
      description: Kako se mijenja visina tona/napetost bubnja tijekom sviranja (ili
        kada se postavlja).
    tam_tam_construction_style:
      name: Tam-tam stil gradnje
      description: Stil konstrukcije/čekićanja tam-tama.
    tam_tam_items_included:
      name: Uključena je uplata Tam-tam
      description: Pribor uključen uz tam-tam (npr. čekić, stalak, poklopac).
    tamarillo_variety:
      name: Sorta tamarila
      description: Identificira specifičnu sortu ili boju varijanta ploda tamarilla.
    tamarind_variety:
      name: Sorta tamarinda
      description: Označava botaničku ili komercijalnu sortu tamarinda koja može utjecati
        na okus, teksturu i kulinarsku uporabu.
    tambourine_frame_style:
      name: Stil okvira za tamburin
      description: Opisuje fizičku konfiguraciju ručnog okvira koji se koristi za
        držanje/sviranje tamburina.
    tambourine_head_material:
      name: Materijal glave tamburina
      description: Određuje materijal membrane za sviranje na tamburinama s glavom.
    tambourine_jingle_configuration:
      name: Konfiguracija zvečki na tamburinu
      description: Kako su džinglovi raspoređeni ili konstruirani na tamburinu.
    tambourine_jingle_material:
      name: Materijal za tamburin jingle
      description: Određuje materijal džinglova tamburina (metalnih diskova), što
        utječe na ton i trajnost.
    tambourine_mounting_type:
      name: Vrsta montaže tamburina
      description: Kako se tamburin treba držati ili montirati tijekom sviranja.
    tambourine_tuning_mechanism:
      name: Mehanizam za ugađanje tamburina
      description: Određuje sustav ugađanja koji se koristi na ručnim tamburinama
        s mogućnošću ugađanja (ako je primjenjivo).
    tank_model_scale:
      name: Razmjer makete tenka
      description: Određuje omjer mjerila modela tenka (primjerice 1:35, 1:72).
    tank_top_back_style:
      name: Stil leđa majice bez rukava
      description: Određuje oblik ili rez stražnjeg dijela majice bez rukava, što
        utječe na podršku, mobilnost i estetiku.
    tape_application_area:
      name: Područje primjene trake
      description: Određuje dio opreme ili izvođača gdje se traka namjerava primijeniti,
        što pomaže kupcima da odaberu ispravan stil.
    tape_finish:
      name: Završna obrada trake
      description: Površinska/vizualna završna obrada (sjaj ili tekstura) trake.
    tape_purpose:
      name: Svrha trake
      description: Određuje primarnu funkcionalnu uporabu trake unutar održavanja
        reketa ili prilagodbe.
    tape_type:
      name: Vrsta trake
      description: Klasificira funkcionalni stil ili konstrukciju hokejaške trake,
        kao što su tkanina, prozirni polietilen, grip, rastezljiva kohezivna traka,
        štitnik za potkoljenicu ili divoka koža.
    tapenade_main_ingredients:
      name: Glavni sastojci tapenade
      description: Određuje primarni osnovni sastojak koji definira tapenadu (maslina,
        rajčica, patlidžan, paprika itd.), što je korisno za kupce s preferencijama
        ili ograničenjima na temelju sastojaka.
    tapestry_loom_loom_format:
      name: Format tkalačkog stana za tapiserije
      description: Ukupni oblik/stil postolja ručnog tkalačkog stana za tapiserije.
    tapestry_loom_shedding_method:
      name: Metoda odvajanja tapiserijskog tkalačkog stana
      description: Kako tkalački stan izraditi proljev (odvaja osnovu niz poruka)
        za prolazak potke.
    tapestry_loom_tensioning_system:
      name: Sustav za zatezanje tkalačkog stana za tapiserije
      description: Metoda koja se koristi za zatezanje i učvršćivanje osnove na tkalačkom
        stanu za tapiserije.
    tar_head_material:
      name: Materijal glave strijele
      description: Označava materijal membrane (katranskog dijela) bubnja, koji snažno
        utječe na osjećaj, trajnost i ton.
    tar_playing_style:
      name: Stil sviranja Tara
      description: Određuje primarnu poziciju/tehniku sviranja za koju je tar namijenjen.
    tar_tuning_system:
      name: Sustav za podešavanje katrana
      description: Određuje kako se katran podešava (kako se podešava napetost glave).
    target_components:
      name: Komponente mete
      description: Određuje koje komponente goriva/usisa zraka proizvod treba čistiti.
    target_relative_humidity_rh:
      name: Ciljana relativna vlažnost (RH)
      description: Namijenjena ciljana relativna vlažnost koju proizvod treba održavati
        unutar instrumenta/kutije.
    target_resetting_mechanism:
      name: Mehanizam za ponovno postavljanje cilja
      description: Opisuje kako se, ili ako se, meta vraća u prvobitni položaj nakon
        što je pogođena.
    target_trainer_type:
      name: Vrsta trenera za mete
      description: Klasificira cjelokupni stil ili format trenažera za reketbol ili
        squash.
    targeted_contaminants:
      name: Ciljani onečišćivači
      description: Vrste mikroba ili parazita za koje je proizvod certificiran da
        ih eliminira.
    targeted_muscle_group:
      name: Ciljana grupa mišića
      description: Primarna mišićna skupina ovog pribora namijenjena je treniranju
        ili podršci.
    taro_variety:
      name: Sorta taroa
      description: Određuje naziv kultivara, vrste ili tržišni naziv ponuđenog korijena
        taroa (npr. Ljubičasti taro, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Vrsta zaglavlja s resicama
      description: Određuje konstrukciju gornjeg zaglavlja/dijela za montažu koji
        se koristi za pričvršćivanje ukrasa s resama na površinu (primjerice traku,
        pletenicu, vrpcu).
    tassel_trim_use_case:
      name: Ukras s resicama koristi kutiju
      description: Primarno namijenjeno područje aplikacije za ukras s resama.
    taste_profile:
      name: Profil ukusa
      description: Opisuje dominantne karakteristike okusa sorte jabuke.
    tea_variety:
      name: Sorta čaja
      description: Klasificira određenu vrstu ili stil čaja ili infuzije (npr. crni,
        zeleni, matcha, rooibos) kako bi kupci mogli filtrirati prema svojim preferiranim
        sortama.
    teasing_tool_style:
      name: Stil alata za zadirkivanje
      description: Fizički stil ili oblik alata za struganje koji se koristi za otvaranje
        i miješanje vlakana (primjerice četka, grablje, češalj).
    tee_base_style:
      name: Stil baze majice
      description: Identificira strukturni dizajn baze ragbi udarne lopte koja podržava
        loptu.
    temper_hardness:
      name: Temperatura / tvrdoća
      description: Označava koliko je žica mekana ili tvrda (koliko dobro drži oblik).
    temperature_control_type:
      name: Vrsta kontrole temperature
      description: Kako se kontrolira/podešava temperatura alata.
    tenkara_action_ratio:
      name: Omjer akcije Tenkara
      description: Označava tradicionalni Tenkara omjer savijanja koji opisuje gdje
        se štap savija pri učitavanju (primjerice 6:4).
    tennis_ball_court_surface:
      name: Površina terena za tenis s lopticama
      description: Određuje površinu(e) terena za koju je lopta dizajnirana kako bi
        se osigurala optimalna učinkovitost i izdržljivost.
    tennis_ball_pressure_type:
      name: Vrsta pritiska teniske loptice
      description: Označava unutarnji tlak ili izradu lopte (pod tlakom, bez tlaka,
        nisko sažimanje, pjena) što utječe na odskok i trajnost.
    tennis_racket_grip_size:
      name: Veličina gripa za teniski reket
      description: Određuje standardizirani opseg ručice reketa (L0–L5 ili ekvivalent
        u inčima) kako bi se osiguralo pravilno pristajanje ruci i udobnost.
    tenor_flutophone_fingering_system:
      name: Tenorski sustav prstohvata za flutofon
      description: Određuje sustav prstohvata koji koristi tenor flutofon (plan i
        program/konvencija notacije).
    tenor_recorder_joint_type:
      name: Vrsta zgloba za tenor blok flautu
      description: Određuje vrstu spoja/veze između dijelova tenorske blok-flaute.
    tenor_saxophone_key_system:
      name: Sustav tipki tenor saksofona
      description: Određuje korišteni sustav/standard tipkovnice (često se naziva
        Francuski/Boehm stil za saksofone).
    tenor_saxophone_pad_material:
      name: Materijal za podlogu za tenor saksofon
      description: Određuje primarni materijal koji se koristi za jastučiće instrumenta.
    tenor_trombone_slide_type:
      name: Vrsta poteznika na tenor trombonu.
      description: Vrsta poteznika koji se koristi na tenor trombonu (npr. standardni/ravni
        u odnosu na pokretač/aksijalni tok).
    tenor_trombone_valve_configuration:
      name: Konfiguracija ventila tenor trombona
      description: Označava ima li tenor trombon priključak za ventil/rotor i koju
        konfiguraciju koristi.
    tension_control_type:
      name: Vrsta kontrole napetosti
      description: Označava kako (ili osigurava li) čunak podesivo povlačenje/napetost
        na špulici/pinoli tijekom uvlačenja.
    tension_mechanism:
      name: Mehanizam zatezanja
      description: Način zatezanja koji se koristi za kontrolu dovoda potke s kalema/pirna
        tijekom tkanja.
    tension_pitch_modulation_system:
      name: Sustav modulacije napetosti/visine tona
      description: Kako bubanj koji govori mijenja visinu tona/napetost tijekom sviranja
        (primjerice, stiskanjem vrpci za napetost).
    tension_system:
      name: Sustav napetosti
      description: Sustav za namatanje/zatezanje kotača za predenje za koji je namijenjen
        komplet letaka.
    tent_fabric_material:
      name: Materijal tkanine šatora
      description: Označava primarnu tkaninu korištenu u gornjem dijelu ili tijelu
        šatora, što utječe na težinu, prozračnost i otpornost na vremenske uvjete.
    tent_season_rating:
      name: Ocjena sezone šatora
      description: Klasificira šator prema broju godišnjih doba ili vremenskim uvjetima
        za koje je konstruiran (primjerice 3-godišnja doba, 4-godišnja doba, ekspedicijski).
    tent_setup_type:
      name: Vrsta postavljanja šatora
      description: Označava strukturni stil postavljanja šatora, kao što je samostojeći,
        polu-samostojeći, ne-samostojeći, napuhavanje/s konstrukcijom ili skočni prozori.
    tent_style:
      name: Stil šatora
      description: Opisuje strukturni dizajn šatora (primjerice kupola, tunel, A-okvir).
    test_result_output_method:
      name: Metoda ispisa rezultata testa
      description: Određuje kako tester akumulatora vozila prikazuje ili dostavlja
        rezultate testiranja korisniku (primjerice indikator, zaslon, ispis, aplikacija
        ili softverska izvješća).
    tether_strap_system:
      name: Sustav vezica/remena
      description: Vrsta sustava vezica ili remena koji se koristi za spajanje potpornja
        za vrat s kacigom/pojasom (ako je primjenjivo).
    text_color:
      name: Boja teksta
      description: Boja tiskanog ili vezenog teksta na etiketi, različita od boje
        pozadine etikete.
    textile_craft_machine_operation_type:
      name: Vrsta rada stroja za tekstilne rukotvorine
      description: Kako se stroj koristi (ručni vs. nožni vs. motorizirani/električni).
    textile_finish_treatment:
      name: Završna obrada / tretman tekstila
      description: Označava značajnu površinsku obradu primijenjenu na tekstilni materijal.
    texture_inclusions:
      name: Uključivanja teksture
      description: Određuje dodane teksturne komponente, kao što su pulpa aloe vere,
        sjemenke bosiljka, kokosovo ulje, pucketavi bob ili komadići voća.
    therapeutic_technology:
      name: Terapeutska tehnologija
      description: Navodi sve integrirane terapijske značajke, kao što su gel za hlađenje,
        magnetske trake ili infracrvena keramika.
    thermal_set_components:
      name: Komponente za termičko očvršćivanje
      description: Označava uključuje li proizvod samo donji dio, samo gornji dio
        ili komplet oba dijela.
    thermal_weight:
      name: Toplinska težina
      description: Označava kategoriju topline tkanine balaklave.
    thermostat_type:
      name: Vrsta termostata
      description: Funkcionalni dizajn ili stil upravljanja termostatom kod sustava
        hlađenja motornog vozila.
    thimble_guide_size:
      name: Veličina vodilice za naprstak
      description: Oznaka veličine vodilice za naprstak (pristajanje/veličina pokrivenosti),
        obično se prodaje kao mala/srednja/velika, a ne izmjerena dimenzija.
    thread_connection_size:
      name: Veličina navojnog spoja
      description: Definira specifikaciju navoja koji spaja osovine, vrhove i adaptere
        (npr. 6 mm, 5/16"-24).
    thread_construction:
      name: Izrada konca
      description: Kako je konac izrađen ili obrađen (npr. razdvojivi konac za vezenje
        u odnosu na lijepljeni konac).
    thread_cord_type_beading_pattern:
      name: Vrsta konca/uzice (uzorak perlica)
      description: Preporučena vrsta konca ili uzice korištena za dovršetak uzorka.
    thread_cutter_form_factor:
      name: Oblik rezača konca
      description: Označava fizički stil rezača konca, kao što su ručne škare, škare
        s privjeskom ili škare s prstenom.
    thread_cutter_mechanism:
      name: Mehanizam za rezanje konca
      description: Opisuje radnju rezanja ili mehanizam koji koristi rezač konca
    thread_cutter_safety_features:
      name: Sigurnosne značajke rezača konca
      description: Označava ugrađene sigurnosne značajke koje smanjuju rizik od slučajnih
        posjekotina ili štite oštrice tijekom skladištenja.
    thread_cutter_usage_application:
      name: Uporaba/primjena rezača konca
      description: Označava primarnu rukotvorinsku namjenu za uporabu rezača konca
    thread_finish_treatment:
      name: Završna obrada / obrada konca
      description: Površinska završna obrada ili tretman primijenjen na konac koja
        utječe na obradu i učinkovitost (npr. voskiranje, lijepljenje, merceriziranje).
    thread_material:
      name: Materijal konca
      description: Sadržaj primarnog vlakna/materijala konca/konca za vezenje (ne
        tkanina).
    thread_material_fiber:
      name: Materijal konca (vlakna)
      description: Određuje primarno vlakno/materijal samog konca (ne tkaninu).
    thread_package_format:
      name: Format pakiranja konca
      description: Faktor oblika pakiranja šivaćeg konca (npr. kalem, konus, špulica).
    thread_rack_compatible_spool_type:
      name: Vrsta špulice kompatibilne sa stalkom konca.
      description: Vrsta pakiranja konca za koje je stalak namijenjen (špulne u odnosu
        na konuse, itd.).
    thread_standard_size:
      name: Standardna veličina navoja
      description: Identificira veličinu konca/standard težine koji se koristi na
        etiketi proizvoda (npr. wt, Tex, denier).
    thread_type:
      name: Vrsta konca
      description: Određuje izradu/vrstu križnog boda konca/konca za vezenje.
    thread_weight_system:
      name: Sustav težine konca
      description: Standard koji se koristi za izražavanje debljine/težine konca.
    thread_yarn_guide_mounting_attachment_style:
      name: Stil montaže/kačenja konca i prediva
      description: Opisuje kako se vođica nosi ili montira tijekom uporabe.
    thread_yarn_guide_tension_control:
      name: Kontrola zatezanja konca i prediva
      description: Označava da li i kako vodič omogućuje podesivu napetost/povlačenje
        konca ili prediva.
    thread_yarn_organizer_features:
      name: Značajke organizatora konca i prediva
      description: Istile značajke funkcionalne organizacije i prenosivosti specifične
        za pohranu konca/prediva.
    threader_intended_use:
      name: Namjena alata za provlačenje niti
      description: Označava primarni kontekst rukotvorine za koji je ručni udjevač
        konca u iglu namijenjen.
    threading_system:
      name: Sustav uvlačenja konca
      description: Označava metodu i pomagala koja se koriste za uvlačenje konca u
        endlaricu (npr. ručno, kodirano bojom, vođeno, zračno uvlačenje).
    threading_type:
      name: Vrsta navoja
      description: Označava koristi li nakit unutarnje konce, vanjske konce, je li
        bez konca ili to nije primjenjivo.
    throttle_type_scooter_conversion:
      name: Vrsta gasa (konverzija skutera)
      description: Označava faktor oblika/sučelje gasa koje je uključeno ili zahtijevano
        od kompleta konverzije.
    throw_rope_end_attachment:
      name: Pričvršćivanje kraja užeta za bacanje
      description: Pričvrsni hardver ili petlja koja se nalazi na radnom kraju(evima)
        užeta za bacanje.
    throw_rope_storage_packaging_type:
      name: Vrsta skladištenja/pakiranja užeta za bacanje
      description: Kako se uže za bacanje skladišti ili postavlja (npr. vreća ili
        kolut).
    throw_rope_visibility_features:
      name: Značajke vidljivosti užeta za bacanje
      description: Značajke vidljivosti i identifikacije namijenjene lakšem uočavanju
        užeta u vodi/pri slabom svjetlu.
    thrower_operation_type:
      name: Vrsta rada bacača
      description: Klasificira mehanički/radni stil bacača za brzo filtriranje ili
        ručnih u odnosu na automatske mehanizme.
    thumb_design:
      name: Dizajn palca
      description: Opisuje kako je palac uključen u rukavicu, što utječe na sigurnost
        i hvat.
    tiara_design:
      name: Dizajn tijare
      description: Određuje cjelokupni strukturni stil ili siluetu tijare.
    tie_down_points_straps_included:
      name: Uključene točke/remeni za vezivanje
      description: Određuje uključuje li stalak integrirane točke za pričvršćivanje
        i/ili uključene remene za pričvršćivanje motocikla/skutera.
    tiling_format:
      name: Format popločavanja
      description: Određuje stil dizajna PDF-a za sastavljanje tiskanih stranica.
    time_current_characteristic:
      name: Karakteristika vrijeme-struja
      description: Označava ponašanje osigurača u odnosu na vrijeme i struju (npr.
        brzo djelovanje u odnosu na vremensko kašnjenje), što utječe na prikladnost
        za strujne krugove s udarnom strujom.
    timer_count_mode:
      name: Način odbrojavanja tajmera
      description: Određuje način odbrojavanja tajmera, kao što je odbrojavanje unatrag,
        odbrojavanje prema gore (štoperica), oboje ili interval/ponavljanje.
    timer_display_type:
      name: Vrsta prikaza tajmera
      description: Označava kako tajmer igre prikazuje preostalo vrijeme (npr. digitalni
        zaslon, analogni brojčanik, pješčani sat ili bez vizualnog prikaza).
    timer_operating_modes:
      name: Načini rada timera
      description: Podržano ponašanje tajmera za efekte pokretača.
    timing_belt_construction_material_rubber_compound:
      name: Materijal za izradu zupčastog remena (gumena smjesa)
      description: Primarna korištena gumena smjesa za remen (npr. HNBR), koja utječe
        na otpornost na toplinu/ulje i na dugotrajnost.
    timing_belt_profile:
      name: Profil zupčastog remena
      description: Profil zuba/standarda oblika zupčastog remena (npr. trapezoidni
        u odnosu na krivolinijski).
    timing_belt_reinforcement_cord_material:
      name: Materijal ojačanja zupčastog remena
      description: Određuje materijal unutarnje ojačavajuće žice unutar zupčastog
        remena (npr. stakloplastika, aramid), što utječe na čvrstoću i istezanje.
    timing_component_material:
      name: Materijal komponente za mjerenje vremena
      description: Primarni materijal komponente za tajming (smjesa remena, metal
        lanca/zupčanika, materijal poklopca).
    tin_whistle_body_material:
      name: Materijal vrha tijela zviždaljke
      description: Hvata uobičajene kositrene materijale tijela zviždaljke preciznije
        od širokog popisa materijala instrumenta kada je to potrebno.
    tin_whistle_bore_type:
      name: Vrsta provrta kositrene zviždaljke
      description: Označava dizajn provrta na kositrenoj zviždaljci.
    tin_whistle_included_accessories:
      name: Oprema uključena sa kositrenom zviždaljkom
      description: Oprema koji dolazi uz kositrenu zviždaljku (npr. kutija, štapić
        za čišćenje).
    tip_finish_coating:
      name: Vrsta završne obrade/prevlake vrha
      description: Određuje površinsku obradu radnog kraja (npr. kromirana, obojena
        prahom) što utječe na otpornost na koroziju i oštećenje ruba.
    tip_shape:
      name: Oblik vrha
      description: Opisuje oblik ili oštrinu vrha trzalice gitare, što utječe na artikulaciju
        i osjećaj sviranja.
    tippet_rating:
      name: Ocjena vršnog dijela
      description: Maksimalna preporučena čvrstoća vršnog dijela predveza izražena
        u oznakama X za mušičarenje (npr. 4X).
    tire_changer_operation_type:
      name: Vrsta rada mjenjača guma
      description: Određuje kako se stroj za mijenjanje guma aktivira/upravlja (npr.
        ručno, pneumatski, hidraulički). Razlikuje se od općeg atributa "Izvor napajanja";
        koristi se pri opisu načina rada stroja.
    tire_changer_type:
      name: Vrsta mjenjača guma
      description: Opći stil rada, dizajn ili razina automatizacije stroja za izmjenu
        guma.
    tire_compound_type:
      name: Vrsta smjese gume
      description: Određuje klasifikaciju gumene smjese koja se koristi u gumama (npr.
        mekana, kišna, glatka), što utječe na prianjanje i trajnost pod različitim
        uvjetima.
    tire_load_range:
      name: Raspon opterećenja guma
      description: Označava nosivost gume/maksimalni tlak zraka (uobičajeno za LT
        gume) što odražava kapacitet nosivosti tereta.
    tire_position:
      name: Položaj gume
      description: Preporučeni položaj montaže na vozilu.
    tire_repair_kit_components:
      name: Komponente seta za popravak gume
      description: Određuje stavku uključenu u komplet, omogućujući kupcima usporedbu
        potpunosti paketa.
    tire_sidewall_type:
      name: Vrsta bočne stijenke gume
      description: Određuje stil ili konstrukcijske značajke bočne stijenke.
    tire_speed_rating:
      name: Indeks brzine gume
      description: Slovo ocjene za brzinu gume (npr. H, V, W) koje označava sposobnost
        maksimalne održive brzine.
    tire_spoon_type:
      name: Vrsta žlice za gume
      description: Kategorizira žlicu za gume prema obliku i namjeni.
    tire_system_compatibility:
      name: Kompatibilnost sustava guma
      description: Označava je li brtvilo namijenjeno za postavljanje bez zračnica,
        gume s zračnicom ili oboje.
    tire_temperature_rating_utqg:
      name: Ocjena temperature guma (UTQG)
      description: UTQG stupanj otpornosti na temperaturu za automobilske gume (npr.
        A, B, C).
    tire_traction_rating_utqg:
      name: Ocjena prianjanja guma (UTQG)
      description: UTQG ocjena prianjanja za učinkovitost kočenja na mokrom.
    tire_tread_style:
      name: Stil gaznog sloja gume
      description: Opisuje opći uzorak gaznoga sloja gume s zračnicom, koji odražava
        karakteristike predviđenog terena i prianjanja.
    tire_tube_type:
      name: Vrsta zračnice za gume
      description: Je li guma dizajnirana za uporabu bez zračnice ili s zračnicom.
    title_status:
      name: Status naslova
      description: Pravni/registracijski status vozila.
    tobacco_application:
      name: Primjena duhana
      description: Označava namijenjenu metodu konzumacije ili aparat za pušenje za
        koji je rinfuza duhana namijenjena.
    tobacco_cut_type:
      name: Vrsta rezanja duhana
      description: Određuje stil fizičkog reza ili pripreme rinfuze duhana, što utječe
        na brzinu sagorijevanja, način pakiranja i cjelokupno iskustvo pušenja.
    tobacco_strength:
      name: Jačina duhana
      description: Označava percipirani osjećaj tijela ili nikotina u duhanu prilikom
        konzumiranja, što kupcima pomaže u odabiru intenziteta koji odgovara njihovim
        preferencijama.
    toe_construction:
      name: Konstrukcija prstiju
      description: Određuje konfiguraciju područja prstiju ronilačkih čizama, što
        utječe na balans, osjećaj na dasci i toplinu.
    toe_coverage:
      name: Pokrivenost prstiju
      description: Označava vrstu pokrivenosti prstiju koju pruža čarapa.
    toe_pick_style:
      name: Stil hvataljke za prste
      description: Opisuje dizajn hvataljke za prste na lopaticama klizaljki za umjetničko
        klizanje.
    toe_protection_type:
      name: Vrsta zaštite prstiju
      description: Označava je li i kako je područje prstiju ojačano iz sigurnosnih
        razloga (npr. čelični prsti, mekani prsti).
    toe_reinforcement_type:
      name: Vrsta ojačanja prstiju
      description: informacije o izradi područja prstiju, što utječe na izdržljivost
        i kompatibilnost cipela.
    toe_stop_stem_thread_size:
      name: Veličina navoja na graničniku
      description: Određuje veličinu navoja na graničniku kako bi se osigurala kompatibilnost
        s pločama.
    tofu_preparation_style:
      name: Stil pripreme tofua
      description: Kategorizira tradicionalni stil ili podtip tofua pored čvrstoće
        (npr. svilenkasti, blokovski, napuhani, s kožicom, čvorast, fermentirani).
    tom_mount_adjustment_features:
      name: Značajke podešavanja nosača za tom
      description: Određuje koja podešavanja nosač toma omogućuje za pozicioniranje
        bubnja (npr. nagib, rotacija, visina).
    tom_mount_components_included:
      name: Uključene komponente nosača toma
      description: Određuje koji su dijelovi uključeni u nosač toma (prijemnik, ručka,
        kugla, stezaljke, memorijske brave, itd.).
    tom_mount_mounting_position:
      name: Položaj za montažu nosača toma
      description: Određuje gdje se nosač toma namjerava pričvrstiti (npr. bas bubanj,
        stalak za činele, stalak).
    tonneau_cover_mounting_style:
      name: Stil montaže pokrova tovarnog prostora
      description: Označava kako se pokrov prtljažnika postavlja/pričvršćuje na šine
        tovarnog prostora kamiona.
    tool_case_form_factor:
      name: Faktor oblika kutije alata
      description: Identificira fizički stil kutije alata, što utječe na portabilnost
        i pohranu (npr. aktovka, tvrda školjka).
    tool_functions_included:
      name: Uključene značajke alata
      description: Navodi specifične značajke popravka ili održavanja koje višenamjenski
        alat ili set alata može obavljati.
    top_bunk_access_method:
      name: Metoda pristupa gornjem krevetu
      description: Označava kako putnici dolaze do gornjeg kata kreveta, što pomaže
        u sigurnosti i štedi prostor.
    top_fit:
      name: Gornji dio
      description: Određuje ukupnu siluetu ili pristajanje gornjeg dijela tijelu (npr.
        uski ili preveliki).
    top_hat_style:
      name: Stil cilindra
      description: Identificira specifičnu stilsku varijaciju cilindra.
    top_soundboard_material:
      name: Materijal gornje ploče (zvučne ploče)
      description: Određuje materijal gornje ploče/zvučne ploče gitare (primarne ploče
        koja proizvodi ton).
    topping_form:
      name: Oblik za preljev
      description: Definira fizički oblik ili konzistenciju preljeva za desert kako
        bi se kupcima pomoglo da brže suze izbor na željenu primjenu.
    topping_type:
      name: Vrsta preljeva
      description: Označava primarni vanjski premaz ili preljev nanesen na krafnu.
    tow_hook_type:
      name: Vrsta vučne kuke
      description: Označava uključuje li daska za koljena integriranu kuku za vuču
        i specificira stil mehanizma.
    tow_point_configuration:
      name: Konfiguracija točke za vuču
      description: Određuje konfiguraciju vučnih točaka (jednostruka, dvostruka, višestruka)
        koju nudi vučna cijev za različite položaje vožnje.
    tow_strap_protective_features:
      name: Zaštitne značajke vučnog remena
      description: Značajne sigurnosne i izdržljive konstrukcijske značajke ugrađene
        u vučni remen.
    tow_strap_type:
      name: Vrsta trake za vuču
      description: Označava funkcionalnu konstrukciju vučnog remena, kao što je statički
        vučni remen u odnosu na kinetički remen za spašavanje.
    towable_tube_style:
      name: Stil vučne cijevi
      description: Označava opći dizajn ili oblik vučne cijevi, koji određuje položaj
        vozača i iskustvo vožnje.
    towed_water_sport_discipline:
      name: Disciplina sporta na vodi s vučom
      description: Određuje primarnu aktivnost na vodi s vučom za koju je rukavica
        namijenjena.
    towel_features:
      name: Značajke ručnika
      description: Navodi posebne karakteristike ili dodatke uključene s ručnikom.
    towel_style:
      name: Stil ručnika
      description: Klasificira funkcionalni dizajn ili format ručnika za golf.
    toy_airplane_control_type:
      name: Vrsta upravljanja zrakoplovom igračkom
      description: Određuje kako korisnik upravlja zrakoplovom igračkom.
    toy_airplane_features:
      name: Značajke zrakoplova igračke
      description: Ističe bitne značajke igre prisutne na zrakoplovu igrački.
    toy_airplane_flight_capability:
      name: Mogućnost letenja zrakoplova igračke
      description: Označava je li zrakoplov igračka dizajniran za stvarno letenje/jedrenje
        ili je prvenstveno namijenjen za igru/prikazivanje na tlu.
    toy_audio_features:
      name: Zvučne značajke igračke
      description: Navodi audio mogućnosti i zvučne efekte ugrađene u igračku.
    toy_boat_play_features:
      name: Značajke igre s čamcem igračkom
      description: Ističe bitne interaktivne značajke čamaca igračaka za otkrivanje
        i filtriranje.
    toy_boat_recommended_play_environment:
      name: Preporučeno okruženje za igru s čamcem igračkom
      description: Određuje namjeravano okruženje za igru sa čamcem igračkom kako
        bi se podržala očekivanja i sigurnost kupca (npr. kada u odnosu na otvorenu
        vodu).
    toy_bowling_equipment_included:
      name: Uključena oprema za kuglanje s igračkom
      description: Navodi koje su komponente za kuglanje uključene u komplet igračke
        za kuglanje (npr. pinovi, kugla, staza/prostirka, torba za nošenje).
    toy_car_features:
      name: Značajke igračke automobila
      description: Ističe značajke igre integrirane u igračku automobil (odvojeno
        od pogona), kao što su svjetla, zvukovi ili dijelovi koji se otvaraju.
    toy_drawing_tablet_accessories_included:
      name: Uključeni dodaci dječje ploče za crtanje
      description: Dodatni uključeni pribor pored same ploče (npr. dodatna olovka,
        pečati).
    toy_drawing_tablet_erase_method:
      name: Metoda brisanja na igrački-ploči za crtanje
      description: Kako se površina za crtanje čisti/briše.
    toy_drawing_tablet_screen_type:
      name: Vrsta zaslona na igrački-ploči za crtanje
      description: Vrsta površine za crtanje/prikaz koja se koristi (npr. LCD tablet
        za pisanje u odnosu na magnetsku ploču).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Instrument za za pisanje/crtanje na igrački-ploči za crtanje
      description: Primarni alat koji se koristi za crtanje na ploči (vrsta olovke).
    toy_figure_sound_feature:
      name: Značajka zvuka figure igračke
      description: Označava proizvodi li životinjska figura zvukove i koje vrste (npr.
        rika, realističan životinjski zvuk).
    toy_game_features:
      name: Značajke proizvoda/igre
      description: Ističe bitne značajke igre ili izrade relevantne za igračke za
        plažu i pijesak.
    toy_gift_basket_items_included:
      name: Uključeni artikli poklon košare za igračke
      description: 'Navodi glavne vrste igračaka uključene u košaru za darivanje (na
        primjer: plišana igračka, set za gradnju, slagalica).'
    toy_glider_launch_method:
      name: Način lansiranja igračke jedrilice
      description: Određuje kako se igračka jedrilica lansira, što utječe na stil
        igre i očekivanja kupca.
    toy_helicopter_control_type:
      name: Vrsta upravljanja helikopterom igračkom
      description: Kako se vrši kontrola/upravljanje helikopterom igračkom (neovisno
        o pogonu), na primjer ručnim daljinskim upravljačem, upravljanjem putem aplikacije
        ili bez upravljanja (slobodan let).
    toy_helicopter_features:
      name: Značajke helikoptera igračke
      description: Ključne funkcionalne značajke helikoptera igračke (posebno modela
        na daljinsko upravljanje) koje utječu na upotrebljivost i vrijednost igre.
    toy_jacks_set_items_included:
      name: Uključene stavke kompleta s pijunima.
      description: Određuje koje su osnovne stavke uključene u set igračaka s pijunima
        (npr. dizalice, lopta, vreća).
    toy_keyboard_learning_mode:
      name: Način učenja sa tipkovnicom igračkom
      description: Označava obrazovni/pristup učenjem koji podržava tipkovnica igračka
        (npr. svijetleće tipke, pjesme za praćenje, vođene lekcije, učenje uz pomoć
        aplikacija).
    toy_keyboard_sound_theme:
      name: Zvučna tema tipkovnice igračke
      description: Vrste ugrađenih glasova/zvukova instrumenata koje se nude (pored
        običnog klavira).
    toy_kitchen_appliances_included:
      name: Uključene igračke-kuhinjski aparati
      description: Određuje kuhinjske aparate predstavljene u kompletu za igru kada
        je proizvod aparat ili komplet usmjeren na aparate.
    toy_kitchen_assembly_requirement:
      name: Zahtjev za sastavljanje kuhinje igračke
      description: Označava je li potrebno sastavljanje i približnu složenost sastavljanja.
    toy_kitchen_interactive_features:
      name: Interaktivne značajke kuhinje igračke
      description: Ističe interaktivne elemente koji se obično nalaze u kuhinjama
        igračkama i srodnim dodacima.
    toy_motorcycle_feature_set:
      name: Set značajki za motocikl igračku
      description: Ključne značajke igre s motociklom igračkom (odaberite sve što
        je primjenjivo).
    toy_motorcycle_scale:
      name: Razmjer motocikla igračke
      description: Omjer skale za igračke/kolekcionarske motocikle (npr. 1:12).
    toy_parachute_launch_method:
      name: Metoda lansiranja padobrana igračke
      description: Kako je igračka namijenjena za lansiranje/otvaranje za let.
    toy_piano_and_keyboard_accessories_included:
      name: Uključeni pribor klavijature i klavir igračka
      description: Pribor uključen uz klavir igračku ili klavijaturu igračku.
    toy_playset_assembly_required:
      name: Potrebno je sastavljanje kompleta igračaka
      description: Označava je li potrebno sastavljanje od strane odrasle osobe prije
        igre (pored jednostavnog sklapanja).
    toy_playset_items_included:
      name: Uključeni elementi seta za igru
      description: Navodi glavne komponente uključene u komplet za igru (što dolazi
        u kutiji).
    toy_safety_certification:
      name: Certifikacija sigurnosti igračke
      description: Sigurnosni i usklađeni standardi/oznake primjenjivi na igračke
        na tržištu kupca (npr. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Značajke svemirske letjelice igračke
      description: Označava uobičajene interaktivne/igračke značajke ugrađene u svemirski
        brod igračku.
    toy_spaceship_size_class:
      name: Veličina svemirskog broda igračke
      description: Označava grubu klasu veličine za svemirski brod igračku kako bi
        se podržalo brzo filtriranje, odvojeno od točnih dimenzija (duljina/širina/visina),
        a ne numerički omjer skale modela (npr. 1:72).
    toy_tableware_pieces_included:
      name: Uključeni dijelovi dječjeg seta posuđa
      description: Navodi koje igračke-stolno posuđe su uključene (tanjuri, šalice,
        pribor za jelo, pribor za posluživanje).
    toy_tool_electronic_features:
      name: Elektroničke značajke alata igračke
      description: Opisuje interaktivne/elektroničke značajke igračke (svjetla, zvukovi,
        rotacija itd.).
    toy_tool_set_components_included:
      name: Uključene komponente seta dječjeg alata
      description: Navodi specifičan alat za igranje koji je uključen u pakiranje
        (posebno za komplete alata).
    toy_train_scale:
      name: Mjerilo modela vlakića
      description: Određuje standard razmjera za igračku/model vlaka (ili veličinu
        sustava tračnica) kako bi se osigurala kompatibilnost s postojećim vlakovima
        i tračnicama.
    toy_train_track_layout_type:
      name: Vrsta izgleda tračnice vlaka igračke
      description: Opisuje uključeni izgled/oblik za komplet vlakova ili pakiranje
        proširenih tračnica.
    toy_weapon_gadget_features:
      name: Značajke oružja igračke i naprave
      description: Istaknute uobičajene interaktivne i funkcionalne značajke specifične
        za oružja igračke i špijunske naprave.
    tpms_sensor_frequency_band:
      name: Frekvencijski pojas TPMS senzora
      description: Radiofrekvencijski pojas koji podržava pribor vezan za TPMS (ako
        je primjenjivo).
    track_and_field_discipline:
      name: Discipline na stazi i terenu
      description: Identificira specifične atletske događaje ili discipline za koje
        je proizvod namijenjen (npr. bacanje kugle, skok s motkom, sprint).
    track_event_specialization:
      name: Specijalizacija događaja na stazi
      description: Označava vrstu događaja za koju je optimizirana šiljasta cipela.
    track_field_event_suitability:
      name: Prikladnost događaja na terenu i staze
      description: Identificira specifične događaje na stazi i na terenu za koje je
        pomagalo za obuku namijenjeno.
    track_set_special_features:
      name: Posebne značajke kompleta za stazu
      description: Ističe bitne značajke igre uključene u komplet staze pored osnovne
        staze i automobila.
    track_surface_compatibility:
      name: Kompatibilnost s površinom staze
      description: Označava površine za trčanje za koje je dizajnirana kopačka ili
        cipela.
    tracking_aid_type:
      name: Vrsta pomagala za praćenje
      description: Označava uključuje li kajak uređaje koji poboljšavaju pravolinijsko
        praćenje.
    traction_pattern_type:
      name: Vrsta uzorka trakcije
      description: Opisuje primarni površinski žlijeb ili uzorak gaznoga sloja koji
        osigurava prianjanje na platformi.
    trading_card_league:
      name: Liga trgovanja karticama
      description: Identificira sportsku ligu povezanu sa kompletom kartica ili temom
        (gdje je primjenjivo).
    trailer_construction:
      name: Izrada prikolice
      description: Označava primarnu izradu prikolice za okvir/karoseriju (npr. aluminij,
        čelik ili mješovita konstrukcija).
    trailer_coupler_size:
      name: Veličina spojnice za prikolicu
      description: Određuje veličinu kugle prikolice koja je potrebna za vuču.
    trailer_hitch_mounting_location_method:
      name: Lokacija/metoda montaže kuke za prikolicu
      description: Određuje gdje i kako se kuka za prikolicu montira na vozilo (npr.
        stražnji prijemnik, prednji prijemnik, montirana na okvir, montirana na branik,
        montirana na tovarni prostor).
    trailer_light_function:
      name: Značajka svjetla prikolice
      description: Primarne značajke/položaj svjetla prikolice.
    trailer_suspension_type:
      name: Vrsta ovjesa prikolice
      description: Određuje vrstu sustava ovjesa koji se koristi u prikolici za bicikl,
        kao što je spiralna opruga ili lisnata opruga, radi poboljšanja udobnosti
        vožnje i zaštite tereta.
    trailer_wiring_circuit:
      name: Strujni krug ožičenja prikolice
      description: Navodi strujne krugove/signale rasvjete, kočnica i pomoćnih uređaja
        koji se prenose kroz ožičenje prikolice (tj. koji su vodovi za napajanje/uzemljenje
        i signalni vodovi prisutni).
    trailer_wiring_connector_type:
      name: Vrsta konektora ožičenja prikolice
      description: Određuje standard utikača na strani prikolice/vozila koji se koristi
        za kabelske svežnjeve i adaptere prikolice.
    train_whistle_intended_use:
      name: Namjena zviždaljke vlaka
      description: Kontekst primarne namjeravane uporabe za zviždaljku.
    train_whistle_sound_character:
      name: Karakter zvuka zviždaljke vlaka
      description: Opisuje percipirani tonski karakter zvuka zviždaljke (boja zvuka).
    trainer_mounting_type:
      name: Vrsta montaže trenera
      description: Opisuje kako se bicikl povezuje s trenažerom (npr. pogon na kotače
        ili izravni pogon).
    training_dummy_shape:
      name: Oblik lutke za trening
      description: Određuje cjelokupni dizajn ili siluetu lutke, što utječe na to
        kako pas drži predmet i na realizam treninga.
    training_focus:
      name: Fokus treninga
      description: Opisuje primarno područje vještina na koje je pomagalo usmjereno
        (npr. refleksi, rad nogu, koordinacija ruku i očiju).
    training_focus_area:
      name: Područje fokusa obuke
      description: Određuje primarnu lacrosse vještinu čijem razvoju je pomoć namijenjena.
    training_objective:
      name: Cilj obuke
      description: Određuje primarnu vještinu ili tehniku za koju je proizvod dizajniran
        da je poboljša.
    training_surface_suitability:
      name: Prikladnost površine za trening
      description: Određuje na kojim se površinama trenažer može koristiti.
    training_surface_usage:
      name: Korištenje površine za trening
      description: Određuje primarne aktivnosti koje podržava površina za trening,
        razlikujući klizačke sintetičke ledene ploče od suhih ili višenamjenskih sportskih
        prostirki.
    training_usage_type:
      name: Vrsta korištenja za trening
      description: Određuje primarno predviđeno razdoblje upotrebe ili kontekst za
        hlače za trening, kao što je dnevni ili noćni trening.
    trampoline_enclosure_type:
      name: Vrsta ograđenog prostora za trampolinu
      description: Određuje konfiguraciju ograde koja se koristi na trampolinu, uključujući
        način/gdje se mreža montira.
    trampoline_safety_certifications:
      name: Sigurnosni certifikati trampolina
      description: Označava koje sigurnosne standarde/certifikate relevantne za trampolinu
        proizvod tvrdi da je u skladu s njima.
    transfer_application_method:
      name: Način primjene transfera
      description: Određuje kako se prijenos nanosi na tkaninu (npr. peglanjem ili
        toplinskom prešom).
    transfer_method:
      name: Metoda prijenosa
      description: Određuje kako se dizajn treba prenijeti na tkaninu.
    transfer_peel_temperature:
      name: Temperatura kore prijenosa
      description: Određuje preporučeno temperaturno stanje (vruće, toplo ili hladno)
        pri kojem se list prijenosa treba ukloniti nakon prešanja.
    transmission_cooler_construction:
      name: Konstrukcija hladnjaka mjenjača
      description: Određuje konstrukcijski dizajn jezgre hladnjaka mjenjača.
    transmission_fluid_specification:
      name: Specifikacija ulja za mjenjač
      description: Originalni/specifikacijski standard koji ulje za mjenjač zadovoljava
        (npr. obitelji Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Materijal čahure nosača mjenjača
      description: Određuje elastomer ili izolatorski materijal koji se koristi u
        nosaču/izolatoru (element za prigušivanje vibracija).
    transmission_mount_type:
      name: Vrsta nosača mjenjača
      description: Određuje konstrukciju/dizajn nosača mjenjača (npr. hidraulički
        u odnosu na čvrsti) kako bi se pomoglo u određivanju pristajanja, NVH karakteristika
        i namjene.
    transparency_level:
      name: Razina transparentnosti
      description: Opisuje koliko su prozirni zidovi kante, što pomaže kupcima da
        odluče između jasne vidljivosti i skrivenog prostora za pohranu.
    transport_case_type:
      name: Vrsta transportne kutije
      description: Klasificira strukturni stil/krutost transportnog rješenja, odražavajući
        razinu zaštite i metodu pakiranja.
    transposition_modes:
      name: Način transpozicije
      description: Određuje načine transpozicije/koncertnog tona koji podržava tuner
        (npr. koncertni ton i transponirajuće tonalitete kao što su B♭ ili E♭).
    trap_design:
      name: Dizajn zamke
      description: Identificira strukturni stil ili mehanizam klopke, što određuje
        način postavljanja i vrste ili okruženja za koja je najprikladnija.
    trap_spring_configuration:
      name: Konfiguracija opruge zamke
      description: Označava broj ili raspored opruga koje pokreću zamku, što utječe
        na čvrstoću i legalnost.
    travel_bassinet_accessories_included:
      name: Uključen pribor za putnu kolijevku
      description: Navodi dodatne stavke koje su isporučene s putnom kolijevkom.
    travel_spinning_wheel_assembly_required:
      name: Potrebna je montaža putnog kolovrata
      description: Zahtijeva li kotač sastavljanje/postavljanje pored rasklapanja
        (npr. pričvršćivanje flajera, zatezanje, gazne papučice) prije uporabe.
    travel_spinning_wheel_portability_features:
      name: Značajke prenosivosti putnog kolovrata
      description: Elementi dizajna vezani uz prenosivost za putne kolovrate, kao
        što su sklopiva konstrukcija i uključena transportna rješenja.
    travel_trailer_appliances_fuel_type:
      name: Vrsta goriva za uređaje putne prikolice
      description: Primarno gorivo koje se koristi za ugrađene aparate/grijanje/kuhanje
        (ne vučno vozilo).
    travel_trailer_holding_tank_type:
      name: Vrsta spremnika za putničku prikolicu
      description: Označava koji se spremnici nalaze u putničkoj prikolici (odaberite
        sve što je primjenjivo).
    travel_trailer_power_hookup_shore_power:
      name: Priključak za napajanje putne prikolice (kopneni priključak)
      description: Podržani standardi električnih priključaka za vezu s kopnenim napajanjem.
    tread_pattern_type:
      name: Vrsta uzorka gaznog sloja
      description: Klasificira cjelokupni dizajn gaznog sloja gume, kao npr. glatki,
        poluglatki ili kvrgavi, što utječe na prianjanje, otpor pri kotrljanju i namjeravanu
        površinu.
    treadmill_key_type:
      name: Vrsta tipke za traku za trčanje
      description: Opisuje fizički stil ili mehanizam rada/veze sigurnosnog ključa
        (npr. magnetski okrugli, plastični umetak, kopča).
    treadmill_part_type:
      name: Vrsta dijela trake za trčanje
      description: Identificira specifičnu komponentu trake za trčanje koju proizvod
        namjerava zamijeniti kako bi kupci mogli brzo potvrditi prikladnost (npr.
        remen u odnosu na motor).
    treadmill_position:
      name: Položaj trake za trčanje
      description: Označava položaj ugradnje dijela na traci za trčanje (prednji,
        stražnji, gornji, donji, središnji).
    triangle_striker_material:
      name: Materijal trokutastog udarača
      description: Materijal priloženog udarača/batlića.
    trigger_input_connector:
      name: Konektor ulaza okidača
      description: Određuje standard fizičkog konektora koji se koristi za ulaz okidača.
    trigger_input_connector_type:
      name: Vrsta ulaznog priključka okidača
      description: Određuje vrstu fizičkog konektora koji se koristi za ulaze okidača.
    trigger_input_zone_support:
      name: Podrška za ulaznu zonu okidača
      description: Označava da li ulazi okidača podržavaju jednozonske i/ili dvozonske
        okidače (npr. glava/obod) i slične implementacije s više zona.
    trim_application_method:
      name: Način nanošenja trim materijala
      description: Označava kako se ukras namjerava pričvrstiti na projekt (npr. prišivanjem,
        peglanjem, ljepilom).
    trim_detail:
      name: Informacije o ukrasu
      description: Označava istaknute ukrasne rubove ili završne obrade na odjevnom
        predmetu (npr. ukras s resama, rese, čipkasti obrub).
    trim_elasticity:
      name: Elastičnost obrezivanja
      description: Označava je li ric-rac obrub rastezljiv za uporabu na pletenini/aktivnoj
        odjeći.
    trim_finish:
      name: Završna obrada ukrasa
      description: Površinska obrada nanesena na obrub (npr. metalik, svjetlucava,
        reflektirajuća).
    trim_tilt_type:
      name: Vrsta obruba i nagiba
      description: Da li i kako motor podržava podešavanje obruba/nagiba.
    trolleybus_power_supply_type:
      name: Vrsta napajanja trolejbusa
      description: Određuje kako trolejbus prima vučnu energiju iz električne mreže.
    truck_bed_body_type:
      name: Tip karoserije/podvozja kamiona
      description: Konfiguracija teretnog prostora ili karoserije iza kabine.
    truck_bed_length_class:
      name: Klasa duljine tovarnog prostora kamiona
      description: Označava klasu duljine tovarnog prostora kamiona kojoj je prilagođena
        teretna mreža (obično se naziva kratki/standardni/dugi tovarni prostor).
    truck_mounting_hole_pattern:
      name: Raspored rupa za montažu kamiona
      description: Određuje izgled rupe koja se koristi za montažu kamiona na palubu
        (npr. Stara škola, Nova škola, Univerzalni).
    truck_mounting_style:
      name: Stil montaže kamiona
      description: Način pričvršćivanja kamiona na platformu (gornji nosač, spuštanje
        itd.), što utječe na visinu vožnje i stabilnost.
    truck_profile:
      name: Profil kamiona
      description: Označava klasifikaciju visine vožnje skateboarda u odnosu na dasku,
        što utječe na zazor kotača i osjećaj daske.
    trumpet_bell_material:
      name: Materijal za trubu
      description: Materijal korišten za dio zvona (ponekad se razlikuje od ostatka
        instrumenta).
    trumpet_leadpipe_material:
      name: Materijal vodilice trube
      description: Materijal ili tretman korišten za olovnu cijev (glavnu cijev od
        usnika do ventila).
    trundle_mechanism:
      name: Mehanizam za kotačenje
      description: Opisuje kako se sekundarna komponenta kreveta postavlja od glavnog
        okvira.
    trunk_part_type:
      name: Vrsta dijela prtljažnika
      description: Određuje koja se komponenta karoserije povezana s prtljažnikom
        prodaje (npr. poklopac prtljažnika, šarka, zasun).
    tuba_leadpipe_material:
      name: Materijal olovne cijevi tube
      description: Označava materijal korišten za olovni (usni) dio tube.
    tube_base_type:
      name: Vrsta baze cijevi
      description: Određuje obitelj podnožja/utičnice cijevi koja se koristi za fizičko/električno
        prileganje (npr. Octal, Noval/9-prikačeno).
    tube_matching_grade:
      name: Razred podudaranja cijevi
      description: Označava jesu li cijevi testirane/usklađene kao set i vrstu pruženog
        usklađivanja.
    tube_weight_category:
      name: Kategorija težine cijevi
      description: Klasificira cijev prema konstrukciji/težini (npr. ultralake, standardne,
        teške) za brzu usporedbu izdržljivosti i učinkovitosti.
    tubeless_compatible:
      name: Kompatibilno s tubeless gumama
      description: Označava je li kotač dizajniran za korištenje bez unutarnje zračnice
        kada se koristi s gumama bez zračnica.
    tubing_shape:
      name: Oblik cijevi
      description: Određuje oblike poprečnog presjeka cijevi za podršku stalka.
    tubular_construction_type:
      name: Vrsta cijevne konstrukcije
      description: Određuje stil konstrukcije tubularnih biciklističkih guma, razlikujući
        tradicionalne lijepljene tubularne gume od novijih varijacija.
    tulip_type_flower_form:
      name: Vrsta tulipana (oblik cvijeta)
      description: Određuje hortikulturni tip/oblik cvijeta tulipana u buketu (npr.
        jednostruki, dvostruki, papigasti).
    tuner_input_method:
      name: Način unosa tunera
      description: Određuje kako tuner detektira visinu tona (mikrofon, osjetnik vibracija/isječaka,
        ulaz kabela instrumenta, kontaktno preuzimanje).
    tuning_mechanism:
      name: Mehanizam za podešavanje
      description: Kako su membrane bongoa zategnute/naštimovane.
    tuning_system:
      name: Sustav podešavanja
      description: Način ugađanja goblet bubnja ili informacija je li moguće ugađanje.
    turn_signal_lens_color:
      name: Boja leće pokazivača smjera
      description: boja vidljive leće/poklopca na kućištu pokazivača smjera (boja
        neemitiranog svjetla).
    turn_signal_lighting_style:
      name: Stil osvjetljenja pokazivača smjera
      description: Vizualni stil/animacija signalizacije koju pruža pokazivač smjera.
    turnip_and_rutabaga_variety:
      name: Sorta repe i rutabage
      description: Identificira specifičan kultivar ili sortu repe ili repe.
    tweeter_crossover_type:
      name: Vrsta skretnice visokotonca
      description: Označava vrstu visokopropusne skretnice i/ili zaštitne komponente
        uključene u visokotonac, ako postoji.
    tweeter_material:
      name: Materijal visokotonca
      description: Primarni materijal dijafragme/kupole visokotonca.
    tweeter_mount_type:
      name: Vrsta montaže visokotonca
      description: Određuje kako se visokotonac namjerava ugraditi u vozilo (način
        montaže/hardver).
    twill_direction:
      name: Smjer kepera
      description: Označava smjer keper linije tkanja trapera.
    twist_direction:
      name: Smjer uvijanja
      description: Smjer uvijanja niti korišten u pređi/niz poruci (S-uvijanje ili
        Z-uvijanje).
    u_joint_series_size:
      name: Serija/veličina kardanskog zgloba
      description: Određuje seriju ili standard veličine U-spoja koji se koristi (npr.
        serija 1310).
    uilleann_pipes_bag_material:
      name: Materijal za vrećice za cijevi Uilleann
      description: Materijal komponente zračnog jastuka (ako je uključen), koji utječe
        na osjećaj udara, trajnost i održavanje.
    uilleann_pipes_handedness:
      name: Uilleann cijevi za desnu ili lijevu ruku
      description: Označava je li set konfiguriran za sviranje desnom ili lijevom
        rukom.
    uilleann_pipes_set_configuration:
      name: Konfiguracija skupa cijevi Uilleann
      description: Određuje koja je konfiguracija Uilleann cijevi uključena, na temelju
        nazočnosti regulatora i dronova.
    uk_childrens_shoe_size:
      name: Veličina dječjih cipela u Ujedinjenom Kraljevstvu
      description: Određuje UK veličinu dječje obuće, kao što je 4 ili 4 Wide
    uk_clothing_size:
      name: Veličina odjeće (SAD)
      description: Određuje UK veličinu odjeće, kao što je 12 ili 18
    uk_cup_size:
      name: UK veličina košarice
      description: Određuje UK veličinu košarice grudnjaka, kao što je C ili FF
    uk_mens_shoe_size:
      name: Veličina muške obuće (SAD)
      description: Određuje veličinu muške obuće u UK-u, kao što je 9 ili 9 Wide.
    uk_womens_shoe_size:
      name: Veličina ženskih cipela u Ujedinjenom Kraljevstvu
      description: Određuje veličinu ženskih cipela u Ujedinjenom Kraljevstvu, kao
        što je 6 ili 6 Wide
    ukulele_back_and_sides_wood:
      name: Drvena leđa i stranice ukulele
      description: Označava drvo/materijal korišten za stražnju i bočne strane ukulele.
    ukulele_body_cutaway:
      name: Izrez za tijelo ukulele
      description: Označava ima li tijelo koncertne ukulele izrez za lakši pristup
        gornjem pragu.
    ukulele_body_shape:
      name: Oblik tijela ukulele
      description: Opći stil/oblik tijela korišten za ukulele.
    ukulele_bridge_material:
      name: Materijal mosta ukulele
      description: Određuje materijal korišten za most ukulele.
    ukulele_construction_type:
      name: Konstrukcija ukulelea
      description: Kako su konstruirane gornja/stražnja/bočne ploče instrumenta (puna
        vs. laminatna).
    ukulele_electronics_configuration:
      name: Ukulele elektronička konfiguracija
      description: Pokazuje je li ukulele samo akustični ili uključuje uvođenje u
        organizaciju elektronike (preuzimanje i/ili pretpojačalo) za pojačanje.
    ukulele_string_re_entrant_tuning:
      name: Podešavanje za pononovni ulazak žice ukulele
      description: Je li ukulele postavljen s ponovnim podešavanjem (visoki-G) naspram
        linearnog/niskog-G; uobičajene preferencije kupca i utječe li na zvuk.
    ukulele_top_wood:
      name: Gornja ploča ukulele od drveta
      description: Označava drvo/materijal korišten za gornju ploču/zvučnu ploču ukulele.
    ukulele_tuner_mechanism:
      name: Mehanizam za podešivača ukulele
      description: Određuje stil/mehanizam podešivača koji se koristi na ukuleleu.
    ukulele_tuner_type:
      name: Vrsta podešivača za ukulele
      description: Stil stroja za podešavanje koji se koristi na glavi ukulele.
    ukulele_tuning:
      name: Podešavanje ukulele
      description: Određuje predviđeno standardno podešavanje za džepnu ukulele.
    ultralight_aircraft_wing_configuration:
      name: Konfiguracija krila ultralakog zrakoplova
      description: Položaj i konfiguracija primarnog krila u odnosu na trup/strukturu.
    under_bed_features:
      name: Značajke ispod kreveta
      description: Označava primarni funkcionalni element koji se nalazi ispod platforme
        kreveta.
    underfoot_strap_type:
      name: Vrsta remena za ispod stopala
      description: Označava materijal ili dizajn koji se koristi za remen koji se
        kreće ispod obuće.
    underwear_fit:
      name: Kroj donjeg rublja
      description: Označava ukupni profil pristajanja bokserica (npr. uske, široke,
        sažimanje).
    underwear_pieces_included:
      name: Uključeni dijelovi donjeg rublja
      description: Identificira koji su odjevni predmeti isporučeni (gornji, donji,
        oba ili jednodijelni sindikalni set) kako bi korisnici znali kupuju li cijeli
        set ili pojedinačni set.
    uniform_pieces_included:
      name: Uključeni dijelovi uniforme
      description: Identificira koje su komponente odjeće dostavljene (npr. košulja,
        hlače, prsluk), pojašnjavajući sadržaj paketa za rasutu ili kompletnu kupnju.
    uniform_role:
      name: Uloga uniforme
      description: Određuje profesionalnu ulogu ili agenciju za koju je stavka uniforme
        namijenjena (npr. policija, šerif, hitna medicinska pomoć).
    update_method:
      name: Metoda ažuriranja
      description: Kako se firmware/softver ažuriranja isporučuju za skener.
    upholstery_fabric_backing_type:
      name: Vrsta podloge od tkanine za presvlake
      description: Određuje podlogu/laminaciju na tkanini presvlake koja utječe na
        ugradnju i osjećaj.
    upholstery_fabric_water_resistance:
      name: Vodootpornost presvlake
      description: Označava otpornost na vodu i prolijevanje površine presvlake.
    upper_material:
      name: Gornji materijal
      description: Određuje primarni materijal koji se koristi na gornjem dijelu tenisice,
        što utječe na prozračnost, izdržljivost i estetiku.
    upright_bass_pickup_system:
      name: Uspravni sustav za preuzimanje basa
      description: Označava uključuje li uspravni bas ugrađeni sustav preuzimanja/pretpojačala
        namijenjen za pojačavanje.
    upright_piano_power_source:
      name: Izvor napajanja za uspravni klavir
      description: Kako se uspravni klavir napaja, primjenjivo na akustične uspravne
        klavire bez napajanja, kao i na uspravne klavire s tihim/hibridnim sustavima
        koji zahtijevaju električnu energiju.
    urination_device_features:
      name: ZnačaZnačajke uređaja za mokrenje
      description: Ističe posebne karakteristike dizajna koje poboljšavaju funkcionalnost
        ili praktičnost.
    us_childrens_shoe_size:
      name: Veličina dječje obuće (SAD)
      description: Određuje veličinu dječje obuće u SAD-u, kao što je 5 ili 5 Wide.
    us_clothing_size:
      name: Veličina odjeće (SAD)
      description: Određuje američku veličinu odjeće, kao što je 8 ili 14
    us_cup_size:
      name: UK veličina košarice
      description: Određuje američku veličinu košarice grudnjaka, kao što je C ili
        DDD
    us_mens_shoe_size:
      name: Veličina muške obuće (SAD)
      description: Određuje američku veličinu muške obuće, kao što je 10 ili 10 Wide
    us_ring_size:
      name: Veličina prstena (SAD)
      description: Određuje američku veličinu prstena, kao što je 7 ili 9,5.
    us_womens_shoe_size:
      name: Veličina ženske obuće (SAD)
      description: Određuje veličinu ženske obuće u SAD-u, kao što je 8 ili 8 Wide.
    usage:
      name: Uporaba
      description: Opisuje namjeravanu uporabu kutije/podešavanja bregaste osovine.
    usda_honey_grade:
      name: USDA kvaliteta meda
      description: Označava službenu ocjenu koju je dodijelilo medu Ministarstvo poljoprivrede
        SAD-a (USDA).
    user_control_method:
      name: Metoda upravljanja korisnika
      description: Označava kako korisnik komunicira sa strojem (npr. putem ugrađene
        upravljačke ploče, daljinskog upravljača, aplikacije, glasa), uzimajući u
        obzir jednostavnost korištenja.
    vacuum_boost_reference_port:
      name: Referentni otvor za vakuum/pojačanje
      description: Označava uključuje li regulator referentni priključak razvodnika
        za vakuum/pojačanje i koji je to model.
    valve_base_shape:
      name: Oblik baze ventila
      description: Identificira geometriju spoja između baze ventila i ruba (okrugla,
        konusna, bočni otvor, T-oblika itd.) koja utječe na brtvljenje i kompatibilnost
        pjenastog uloška.
    valve_core_type:
      name: Vrsta jezgre ventila
      description: Označava je li jezgra ventila uklonjiva, fiksna ili bez jezgre,
        što utječe na postupke održavanja i kompatibilnost s alatima za ubrizgavanje
        brtvila.
    valve_cover_gasket_material:
      name: Materijal brtve poklopca ventila
      description: Određuje materijal brtve poklopca ventila koja je uključena s poklopcem
        ventila ili preporučani materijal brtve kada se prodaje bez brtve (ako je
        primjenjivo).
    valve_cover_material:
      name: Materijal poklopca ventila
      description: Primarni materijal od kojeg je izrađen poklopac ventila.
    valve_design:
      name: Dizajn ventila
      description: Označava konstrukciju/dizajn ventila motora.
    valve_guard_coverage_area:
      name: Područje pokrivenosti štitnika ventila
      description: Označava koje dijelove ventila štiti štitnik.
    valvetrain_configuration:
      name: Konfiguracija ventila motora
      description: Određuje izgled bregaste osovine/razvodnog mehanizma.
    varnish_formulation_base:
      name: Baza formulacije laka
      description: Određuje primarnu formulaciju/kemiju laka za instrumente, koja
        utječe na izgled, reverzibilnost i kompatibilnost s postojećim završnim obradama.
    varnish_transparency_tint:
      name: Prozirnost/nijansa laka
      description: Opisuje je li lak prozirni ili obojeni i, ako je obojen, opću skupinu
        nijansi.
    vegetable_matter_vm_content:
      name: Sadržaj biljne tvari (VM)
      description: Količina biljnih ostataka/nečistoća nazočnih u vlaknima.
    vegetable_preparation_style:
      name: Način pripreme povrća
      description: Opisuje kako je povrće prezentirano, reženo ili na drugi način
        pripremljeno prije sniženja (npr. cijelo, na kockice, cvjetići).
    vehicle_audio_dsp_form_factor:
      name: DSP format audio uređaja za vozila
      description: Određuje fizički/instalacijski format DSP jedinice.
    vehicle_battery_charger_features:
      name: Karakteristike punjača za automobilske akumulatore
      description: Navodi načine rada i ugrađene značajke punjača akumulatora vozila
        (npr. način s plutajućim punjenjem, desulfacija).
    vehicle_body_filler_form:
      name: Obrazac za popunjavanje karoserije vozila
      description: Fizički oblik/stil pakiranja proizvoda za punjenje tijela.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominalna veličina koaksijalnog zvučnika u vozilu
      description: Nominalna veličina zvučnika korištena u ugradnji (npr. 6,5 inča,
        6x9 inča).
    vehicle_cover_size_class:
      name: Navlaka za vozilo veličine klase
      description: Opća grupacija veličina koja označava za koju veličinu vozila je
        navlaka dizajnirana.
    vehicle_decor_set_items_included:
      name: Uključen set za ukrašavanje vozila
      description: Navodi vrste ukrasnih stavki uključenih u set dodatne opreme (vidljivost
        na razini komponente za kupce).
    vehicle_door_lock_actuation_method:
      name: Način aktiviranja brave na vratima vozila
      description: Označava kako se aktivira ili kontrolira brava na vratima vozila.
    vehicle_door_lock_actuator_kit_contents:
      name: Sadržaj kompleta aktuatora brave na vratima vozila
      description: Označava što je uključeno u aktuator (samo aktuator u odnosu na
        hardver/šipke/nosače/kabelski snop).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfiguracija ožičenja aktuatora brave na vratima vozila
      description: Određuje način ožičenja potreban za instalaciju (broj žica i uloga).
    vehicle_door_lock_included_components:
      name: Uključene komponente brave na vratima vozila
      description: Navodi koje su komponente uključene u paket (korisno za komplete/sklopove).
    vehicle_electrical_connector_type:
      name: Električni mehanizam vozila tipa sinkronizacije
      description: Određuje regulator/električni mehanizam sinkronizacije alternatora
        ili vrstu utikača (isključujući glavni B+ izlazni vijak).
    vehicle_equipment_fit_out_level:
      name: Razina opremljenosti vozila
      description: Označava razinu policijske opreme uključene u kombi.
    vehicle_glass_cleaner_form:
      name: Obrazac za čišćenje stakla vozila
      description: Fizički format sredstva za čišćenje stakla vozila (npr. sprej,
        pjena, maramice, gel, koncentrat).
    vehicle_hitch_cover_illumination_type:
      name: Vrsta osvjetljenja poklopca kuke za prikolicu vozila
      description: Određuje ima li poklopac kuke osvjetljenje i kakvo.
    vehicle_hitch_cover_mounting_type:
      name: Vrsta montaže poklopca kuke za vuču vozila
      description: Označava metodu koja se koristi za držanje/pričvršćivanje poklopca
        kuke u prijamniku kuke.
    vehicle_license_plate_finish:
      name: Završna obrada registarske pločice vozila
      description: Površinska obrada ploče.
    vehicle_license_plate_frame_anti_theft_design:
      name: Dizajn okvira registarske pločice vozila s protuprovalnim djelovanjem
      description: Sigurnosni elementi dizajna namijenjeni sprječavanju uklanjanja
        ili neovlaštenog otvaranja.
    vehicle_license_plate_frame_plate_standard:
      name: Standard okvira registarske pločice vozila
      description: Standard/regija registarske pločice kojoj okvir odgovara.
    vehicle_license_plate_frame_profile:
      name: Profil okvira registarske pločice vozila
      description: Način na koji okvir omeđuje ploču (pokrivenost/oblik) što utječe
        na čitljivost i usklađenost.
    vehicle_license_plate_mounting_hole_count:
      name: Broj rupa za montažu registarske pločice vozila
      description: Broj rupa za montažu na pločici.
    vehicle_license_plate_mounting_hole_pattern:
      name: Raspored rupa za montažu registarske pločice
      description: Položaj uzorka montažnih rupa na pločici.
    vehicle_license_plate_reflectivity:
      name: Refleksija registarske pločice vozila
      description: Reflektira li površina ploče svjetlost i kako (važno za vidljivost
        i sukladnost kod nekih neobičnih ploča).
    vehicle_license_plate_size_standard:
      name: Standard veličine registarske pločice vozila
      description: Označava regionalni/vozilni standard kojem pločica odgovara (razmak
        između rupa za montažu i ukupne dimenzije).
    vehicle_license_plate_text_style:
      name: Stil teksta registarske pločice vozila
      description: Stil znakova na pločici (ako ih ima), uključujući reljefne naspram
        tiskanih.
    vehicle_license_plate_theme:
      name: Tema registarske pločice vozila
      description: Tema dizajna visoke razine za umjetničko djelo tanjura.
    vehicle_lift_actuation_method:
      name: Način aktivacije dizalice vozila
      description: Kako se dizalica pokreće/aktivira za podizanje vozila.
    vehicle_lift_mounting_type:
      name: Vrsta montaže dizalice za vozila
      description: Označava kako je dizalica instalirana ili usidrena u radnom prostoru.
    vehicle_lift_type:
      name: Vrsta dizalice vozila
      description: Određuje strukturni stil dizalice za vozila koja se koristi za
        servisiranje ili skladištenje (npr. dvostupna, četverostupna, škarasta).
    vehicle_magnet_attachment_type:
      name: Vrsta pričvršćivanja magneta za vozilo
      description: Određuje primarni način pričvršćivanja/montaže za proizvode koji
        se prodaju kao magneti za vozila (na primjer, samo magnetski u odnosu na magnetske
        s ljepljivom pomoći).
    vehicle_magnet_intended_use:
      name: Namjena magneta za vozila
      description: Označava primarnu namijenu kutija magneta vozila.
    vehicle_mirror_adjustment_type:
      name: Vrsta podešavanja retrovizora vozila
      description: Određuje kako se zrcalo podešava/kako se njime upravlja.
    vehicle_mirror_glass_type:
      name: Vrsta stakla retrovizora
      description: Određuje optički/oblikovni tip površine zrcalnog stakla.
    vehicle_organizer_features:
      name: Značajke organizatora za vozilo
      description: Ključne funkcionalne značajke organizatora za vozila, kao što su
        sklopivost, vodootporna podstava, izolirani džepovi ili neklizajuća baza.
    vehicle_paint_chemistry_base:
      name: Kemija/baza za bojenje vozila
      description: Označava formulaciju/kemiju boje koja se koristi u boji vozila.
    vehicle_polish_application_method:
      name: Aplikacija za poliranje vozila
      description: Određuje preporučanu metodu ili alat za nanošenje sredstva za poliranje
        vozila.
    vehicle_pursuit_package:
      name: Paket za praćenje vozila
      description: Označava je li vozilo opremljeno paketom za poboljšanje izvedbi
        u potjeri namijenjenim za policijsku uporabu (na primjer, poboljšano hlađenje,
        kočnice, ovjes i kalibracija).
    vehicle_safety_equipment_position:
      name: Položaj sigurnosne opreme vozila
      description: Određuje gdje se na ili u vozilu namjerava koristiti ili ugraditi
        sigurnosna oprema.
    vehicle_safety_equipment_visibility_features:
      name: Značajke vidljivosti sigurnosne opreme vozila
      description: Označava značajke za poboljšanje vidljivosti osmišljene za povećanje
        uočljivosti.
    vehicle_seat_row:
      name: Red sjedala u vozilu
      description: Označava za koji stražnji red je sjedalo (drugi red vs. treći red),
        uključujući aplikaciju za stražnje sjedalo koje se može sklopiti.
    vehicle_steering_assist_type:
      name: Vrsta pomoći pri upravljanju vozilom
      description: Određuje sustav pomoći pri upravljanju za koji je komponenta dizajnirana.
    vehicle_steering_wheel_lock_form_factor:
      name: Čimbenik oblika brave volana vozila
      description: Opisuje fizički stil brave i kako se povezuje s volanom (i opcionalno
        s drugim kontrolama).
    vehicle_wax_polish_product_form:
      name: Obrazac za vosak/poliranje vozila
      description: Fizički oblik/format izdavanja voska, sredstva za poliranje, zaštitnog
        sredstva ili sredstva za brtvilo.
    vehicle_wheel_valve_stem_type:
      name: Vrsta ventila kotača vozila
      description: Određuje vrstu stabla ventila koja je podržana ili uključena.
    vehicle_windshield_fluid_formula:
      name: Formula tekućine za vjetrobransko staklo vozila
      description: Primarni fokus čišćenja/uklanjanja formulacije tekućine za vjetrobransko
        staklo.
    veil_length_type:
      name: Duljina vela
      description: Klasificira veo koristeći standardnu terminologiju duljine, a ne
        numeričku mjeru.
    vellum_opacity_level:
      name: Razina neprozirnosti veluma
      description: Označava koliko je pergament proziran ili neproziran.
    ventilation_configuration:
      name: Konfiguracija ventilacije
      description: Konfiguracija primarne ventilacije/usisa i ispuha zraka na kacigi.
    ventilation_control_type:
      name: Vrsta kontrole ventilacije
      description: Određuje stil upravljanja protokom zraka ugrađen u kacigu.
    ventilation_level:
      name: Razina ventilacije
      description: Označava relativni protok zraka/ventilacijski dizajn oklopa.
    venting_design:
      name: Dizajn ventilacije
      description: Određuje je li i kako poklopac ventiliran kako bi se smanjila kondenzacija
        i plijesan tijekom skladištenja.
    vestibule_type:
      name: Vrsta predvorja
      description: Klasificira izgled predvorja u odnosu na šator.
    vibraphone_bar_material:
      name: Materijal vibrafonske šipke
      description: Materijal tonskih traka/tipki vibrafona (traka koje proizvode zvuk).
    vibraphone_motor_type:
      name: Tip vibrafonskog motora
      description: Vrsta motora koji se koristi za pogon rotirajućih rezonatorskih
        ventilatora za vibrato (ako su ugrađeni).
    vibraphone_range_octaves:
      name: Raspon vibrafona (oktave)
      description: Raspon visine tona vibrafona izražen u oktavama (npr. 3 oktave,
        3,5 oktave).
    vibraphone_resonator_tube_material:
      name: Materijal rezonatorske cijevi vibrafona
      description: Materijal rezonatorskih cijevi vibrafona ispod rešetki.
    vibraphone_tuning_standard:
      name: Standard ugađanja vibrafona
      description: Referentni ton koji se koristi za ugađanje (A=440 Hz, itd.).
    viewing_sides:
      name: Stranice gledanja
      description: Određuje koliko strana semafora prikazuje informacije (jednostrano,
        dvostrano, četverostrano itd.).
    vintage_advertisement_decade:
      name: Desetljeće vintage oglasa
      description: Označava desetljeće u kojem je oglas izvorno tiskan ili proizveden
        (približno ako točna godina nije poznata).
    vintage_advertisement_format:
      name: Format vintage oglasa
      description: Određuje fizički format ili medij kolekcionarskog predmeta starinskog
        oglasa.
    vintage_advertisement_subject_category:
      name: Tematska kategorija vintage oglasa
      description: Identificira kategoriju proizvoda/usluge koja se oglašava (za što
        se oglas odnosi).
    vintage_classic_truck_cab_type:
      name: Starinski i klasični tip kabine za kamione
      description: Konfiguracija kabine/karoserija putničkog prostora kamiona.
    virginia_tech_helmet_star_rating:
      name: Virginia Tech kaciga ocjena zvjezdica
      description: Sigurnosna ocjena koju dodjeljuje Virginia Tech Helmet Lab (0–5
        zvjezdica).
    virtual_analog_synthesizer_form_factor:
      name: Čimbenik oblika virtualnog analognog sintetizatora
      description: Određuje fizički format kućišta sintisajzera (klavijatura vs. modul/stalak).
    viscosity_thickness:
      name: Viskoznost/gustoća
      description: Opisuje koliko je slip gust ili tekući u prodaji ili u preporučanoj
        radnoj konzistenciji.
    vise_configuration:
      name: Konfiguracija škripca
      description: Određuje strukturni izgled ili broj dijelova u setu škripca, što
        utječe na prenosivost i složenost postavljanja.
    visibility_features:
      name: Značajke vidljivosti
      description: Ističe elemente dizajna koji poboljšavaju vidljivost vozača u prometu.
    visor_brim_type:
      name: Vrsta vizira/obruba
      description: Označava prisutnost i stil vizira ili oboda na kacigi.
    visor_configuration:
      name: Konfiguracija vizira
      description: Opisuje nazočnost i stil bilo kojeg ugrađenog vizira ili štitnika
        za lice.
    visor_lens_finish:
      name: Završna obrada leće vizira
      description: Određuje nijansu, optičku završnu obradu ili grafički stil primijenjen
        na leću vizira.
    visor_style:
      name: Stil vizira
      description: Označava ima li kapuljača obod/vizir i njegovu konfiguraciju.
    voc_compliance_standard:
      name: Standard usklađenosti s VOC-om
      description: Izjava o usklađenosti s regulatornim VOC-ima za proizvod (gdje
        je primjenjivo).
    voc_regulatory_class:
      name: Regulatorni razred VOC-a
      description: Deklarirani regulatorni/usklađeni razred VOC-a za proizvod (prema
        Label/SDS-u), koji se koristi za regionalna regulatorna i ekološka ograničenja.
    vodka_base_ingredient:
      name: Baza votke
      description: Primarni poljoprivredni sastojak od kojeg se destilira votka (npr.
        pšenica, krumpir, kukuruz).
    voice_coil_configuration:
      name: Konfiguracija zvučne zavojnice
      description: Broj/raspored zvučnih zavojnica za fleksibilnost ožičenja i opcije
        impedancije.
    voice_effects:
      name: Glasovni efekti
      description: Ugrađene vrste vokalnih efekata koje podržava karaoke set.
    voltage_rating_type:
      name: Vrsta nazivnog napona
      description: Određuje odnosi li se nazivni napon osigurača na izmjeničnu, istosmjernu
        ili oboje.
    voltage_regulator_connector_type:
      name: Regulator napona mehanizam sinkronizacije tipa
      description: Određuje vrstu priključka/terminal koji se koristi za spajanje
        regulatora na ožičenje/alternator/generator vozila.
    wader_foot_type:
      name: Vrsta stopala čizama
      description: Određuje imaju li ribarske čizme integrirane čizme ili odvojene
        čarape.
    wader_sole_type:
      name: Vrsta potplata za vodene ribarske cipele
      description: Određuje materijal vanjskog potplata ili vrstu prianjanja koja
        se koristi na čizmama za ribanje ili čizmama za ribanje s visokim podnožjem.
    waistband_style:
      name: Stil pojasa
      description: Opisuje konstrukciju pojasa i kako se pričvršćuje ili podešava
        za pristajanje i udobnost.
    wakeboard_binding_mounting_pattern:
      name: Uzorak za montažu vezova za wakeboard
      description: Određuje uzorak umetka/ploče na wakeboardu s kojim su vezovi kompatibilni.
    wakeboard_riding_style:
      name: Stil vožnje wakeboarda
      description: Klasificira predviđeno okruženje ili stil korištenja wakeboarda.
    wall_decal_style:
      name: Stil zidne naljepnice
      description: Određuje kako se naljepnica proizvodi/aplicira (npr. izrezivanjem,
        primjenama, listom naljepnica).
    wallyball_equipment_included:
      name: Uključena oprema za wallyball
      description: Navodi specifične dijelove koji su dati u setu Wallyball kako bi
        kupci točno znali što kupuju i mogli usporediti pakete.
    warp_beam_type:
      name: Vrsta warp snopa
      description: Određuje konfiguraciju osnovnih greda uključenih ili ugrađenih
        na tkalački stan (postavljanje grede isporučene s tkalačkim stanom).
    washability:
      name: Washability
      description: Označava čisti li se ljepilo vodom i/ili se može prati nakon nanošenja.
    watch_band_design:
      name: Dizajn remena za sat
      description: Opisuje stil konstrukcije ili uzorak dizajna remena sata (npr.
        NATO, Milanese, Link).
    watch_movement:
      name: Mehanizam sata
      description: Određuje mehanizam koji pokreće sat, ključni čimbenik kojeg kupci
        koriste za razlikovanje modela.
    water_activation:
      name: Aktivacija vodom
      description: Može li se svjetionik automatski aktivirati nakon uranjanja u vodu
        (uobičajeno za EPIRB-ove kategorije I/II).
    water_chamber_configuration:
      name: Konfiguracija vodene komore
      description: Opisuje unutarnji izgled madraca, kao što su jednostruke ili dvostruke
        komore, što utječe na podršku, kontrolu temperature i poremećaje partner .
    water_dispensing_mechanism:
      name: Mehanizam za doziranje vode
      description: Definira kako se voda ispušta iz jedinice, kao što su slavine,
        mlaznice za raspršivanje ili gravitacijsko izlijevanje.
    water_exposure_protection_level:
      name: Razina zaštite od izloženosti vodi
      description: Označava razinu zaštite proizvoda pri izlaganju vodi (npr. prskanje
        u odnosu na privremeno uranjanje). Koristite stupanj zaštite od prodora (IP)
        kada je dostupan službeni IP kod.
    water_fed_design:
      name: Dizajn s napajanjem vodom
      description: Označava je li četka namijenjena za korištenje s tekućom vodom
        putem protočne ručke ili priključka za crijevo.
    water_gun_features:
      name: Značajke vodene puške
      description: Značajne funkcionalne značajke uključivale su i mogućnost vodenog
        pištolja.
    water_gun_operating_mechanism:
      name: Mehanizam za rad vodenog pištolja
      description: Kako vodeni pištolj stvara tlak i izbacuje vodu tijekom uporabe.
    water_gun_spray_pattern:
      name: Uzorak prskanja vodenog pištolja
      description: Vrsta mlaza vode koju proizvodi mlaznica tijekom paljenja.
    water_heating_method:
      name: Metoda zagrijavanja vode
      description: Opisuje kako se voda zagrijava prije uporabe ili se zagrijava li
        se - na primjer, apsorpcijom solarne energije, propanskim plamenicima, električnim
        grijaćim elementima, grijanjem na baterije, izolacijom za zadržavanje topline
        ili bez grijanja.
    water_mattress_construction:
      name: Izrada vodenih madraca
      description: Određuje stil konstrukcije vodenog madraca (npr. tvrda ili meka
        strana), što određuje kompatibilnost okvira i ukupni osjećaj.
    water_play_features:
      name: Značajke vodenih igara
      description: Komponente za vodene aktivnosti uključene u vodeni park/tobogan.
    water_polo_competition_approval:
      name: Oodbrenje za vaterpolo natjecanje
      description: Označava upravno tijelo ili razinu natjecanja za koju je lopta
        službeno odobrena ili certificirana.
    water_polo_goal_type:
      name: Vrsta gola za vaterpolo
      description: Klasificira strukturnu ili montažnu konfiguraciju gola (npr. plutajući,
        montiran na palubu, prenosivi).
    water_pump_drive_type:
      name: Vrsta pogona vodene crpke
      description: Određuje kako se vodena crpka pokreće/aktivira u sustavu hlađenja
        vozila.
    water_pump_housing_material:
      name: Materijal kućišta vodene crpke
      description: Materijal kućišta/tijela vodene crpke.
    water_pump_impeller_material:
      name: Materijal impelera vodene crpke
      description: Određuje materijal impelera vodene crpke (unutarnji rotor/krilca
        koja pomiče rashladnu tekućinu).
    water_pump_mounting_type:
      name: Vrsta montaže vodene crpke
      description: Određuje stil montaže/oblika vodene crpke za ugradnju motora (npr.
        kućište s vijcima u odnosu na uložak/umetak).
    water_purification_method:
      name: Metoda pročišćavanja vode
      description: Identificira primarni mehanizam kojim proizvod čini vodu sigurnom
        za piće na terenu (npr. crpka nasuprot gravitacijskom dovodu nasuprot UV svjetlu).
    water_resistance:
      name: Vodootporno
      description: Označava stupanj zaštite od vremenskih uvjeta, poput vodootpornosti
        ili otpornosti na vodu.
    water_resistance_level:
      name: Razina vodootpornosti
      description: Označava odbija li tekstil vodu i u kojoj mjeri.
    water_resistance_rating_case_protection_level:
      name: Ocjena vodootpornosti (razina zaštite kutija)
      description: Označava razinu vodootpornosti/zaštite koju pruža kutija u kotrljanju
        (marketinška razina, ne elektronička IP zaštita), npr. tip vodootpornosti.
    water_rocket_kit_items_included:
      name: Uključeni elementi kompleta za vodene rakete
      description: Glavne komponente uključene u proizvodni paket.
    water_rocket_propulsion_type:
      name: Vrsta pogona vodene rakete
      description: Primarni pogon/izvor energije koji se koristi za pokretanje rakete.
    water_rocket_recovery_system:
      name: Sustav za spašavanje vodenih raketa
      description: Metoda korištena za oporavak rakete nakon pokretanja.
    water_ski_base_design:
      name: Dizajn baze za vodene skije
      description: Određuje profil donjeg dijela trupa vodenih skija, što utječe na
        karakteristike obrade.
    water_ski_fin_type:
      name: Vrsta peraja za skijanje na vodi
      description: Određuje konfiguraciju peraja vodene skije, što utječe na praćenje
        i upravljivost.
    water_source:
      name: Izvor vode
      description: Identificira podrijetlo vode prije karbonizacije.
    water_sports_safety_standard:
      name: Standard sigurnosti za vodene sportove
      description: Navodi formalne sigurnosne standarde ili standarde plovnosti koje
        proizvod zadovoljava (npr. CE EN 1385 za kacige, ISO 12402-5 za pomagala za
        plovnost, USCG tip III).
    water_table_feature_set:
      name: Skup značajki podzemne vode
      description: Highlight ugrađene elemente za igru u podzemnoj vodi kao što su
        slapovi, raspršivači, crpke ili višeslojni bazeni.
    water_table_items_included:
      name: Uključena je razina podzemne vode
      description: Navodi koji pribor dolazi s kompletom vodenog stola (npr. brodovi,
        šalice, lijevak, figure).
    water_table_water_source_type:
      name: Vrsta izvora podzemne vode
      description: Određuje kako se podzemna voda puni vodom ili kako se ona doprema.
    waterbed_stabilization_level:
      name: Razina stabilizacije vodenog kreveta
      description: Označava stupanj smanjenja valova ili kontrole pokreta koju pruža
        vodeni madrac.
    watercolor_ink_water_resistance_after_drying:
      name: Otpornost vode na akvarelnu tintu (nakon sušenja)
      description: Označava postaje li akvarelna tinta vodootporna nakon sušenja (po
        proizvođačevoj tvrdnji).
    watercraft_care_application_area:
      name: Područje aplikacije za brigu o plovilima
      description: Označava glavno područje ili komponentu plovila na kojoj je proizvod
        namijenjen za uporabu.
    watercraft_drive_mechanism:
      name: Pogonski mehanizam plovila
      description: Opisuje specifični ugrađeni ili podržani pogonski mehanizam na
        vozilu.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Uzorak jedinice za slanje goriva u spremniku plovila
      description: Određuje uzorak/standard montaže za mjerne jedinice spremnika goriva
        i kompatibilne mjerače (npr. uobičajeni uzorci vijaka za brodove).
    watercraft_fuel_tank_shape:
      name: Oblik spremnika goriva za plovila
      description: Opisuje ukupni fizički oblik spremnika goriva kako bi se podržao
        prostor/planiranje uklapanja.
    watercraft_hull_material:
      name: Materijal trupa plovila
      description: Određuje primarni materijal konstrukcije trupa.
    watercraft_ignition_part_voltage:
      name: Napon dijela za paljenje plovila
      description: Nazivni napon/zahtjev za dio za paljenje (kada je primjenjivo),
        kao što su 12 V sustavi.
    watercraft_impeller_material_grade:
      name: Vrsta materijala impelera plovila
      description: Određuje materijal impelera plovila (npr. neoprenska guma, nitril,
        bronca).
    watercraft_lighting_certification_compliance:
      name: Certifikacija/sukladnost rasvjete plovila
      description: Označava sukladnost s propisima/standardima prema kojima je svjetlo
        certificirano za pomorsku uporabu (npr. usklađeno s USCG/ABYC/COLREG-ovima).
    watercraft_motor_mount_adjustment_features:
      name: Značajke podešavanja nosača motora plovila
      description: Mogućnosti podešavanja nosača (npr. nagib, podizanje, klizanje)
        koje utječu na upotrebljivost i pristajanje.
    watercraft_piston_part_type:
      name: Vrsta klipa plovila
      description: Identificira koju komponentu povezanu s klipom oglas predstavlja.
    watercraft_propeller_blade_rake:
      name: Grablje lopatica propelera plovila
      description: Određuje nagib lopatice (kut lopatice u odnosu na glavčinu), što
        utječe na uzgon pramca i učinkovitost.
    watercraft_propeller_rotation_direction:
      name: Smjer rotacije propelera plovila
      description: Označava potreban smjer/stranu ruke rotacije propelera za kompatibilnost
        pogonskog sklopa (npr. desni/standardni vs. lijevi/suprotno rotirajući).
    watercraft_pump_stage_impeller_role:
      name: Uloga faze crpjke za plovilo/ impeler
      description: Označava je li impeler namijenjen za određenu vrstu crpke (npr.
        crpka za sirovu vodu/morska voda, cirkulacija rashladne tekućine, mlazna crpka).
    watercraft_registration_status:
      name: Status registracije plovila
      description: Označava uključuje li jedrilica dokumentaciju o vlasništvu i/ili
        registraciji.
    watercraft_safety_equipment_activation_type:
      name: Vrsta aktiviranja sigurnosne opreme za plovilo
      description: Primarna metoda aktiviranja sigurnosnog uređaja (za svjetla/MOB
        alarme/PLB-ove), različita od inflacije.
    watercraft_steering_cable_core_material:
      name: Materijal jezgre kabela za upravljanje plovila
      description: Određuje materijal unutarnjeg kabela/jezgre koji prenosi silu.
    watercraft_steering_cable_hardware_included:
      name: Uključen hardver kabela za upravljanje plovilom
      description: Određuje koji su instalacijski hardver i pribor uključeni s kabelom
        za upravljanje.
    watercraft_steering_cable_system_type:
      name: Vrsta sustava sajli za upravljanje plovilom
      description: Određuje arhitekturu sustava upravljanja za koju je kabel dizajniran
        (npr. rotacijski, stalak).
    watercraft_steering_wheel_hub_bore_type:
      name: Vrsta glavčine/prolaza upravljača plovila
      description: Određuje stil središnjeg pričvršćivanja/sučelja provrta (npr. konusni,
        užljebljeni) gdje se kotač spaja s glavčinom ili prilagodnikom.
    watercress_variety:
      name: Sorta potočarke
      description: Identificira određenu sortu ili vrstu potočarke koja se prodaje.
    waterproof_level:
      name: Vodootpornost
      description: Označava razinu vodootpornosti obuće, uključujući sve tvrdnje o
        vodootpornosti podržane jamstvom.
    wax_blend_composition:
      name: Sastav mješavine voska
      description: Navodi voštane materijale pomiješane u vrsti mješavine proizvod
        i/ili tržište.
    wax_coat_type:
      name: Vrsta voskastog premaza
      description: Označava je li vosak namijenjen kao osnovni premaz, završni premaz
        ili višenamjenska/jednoslojna formula.
    wax_hardness:
      name: Tvrdoća voska
      description: Označava relativnu tvrdoću voska, što utječe na trajnost i klizanje
        na različitim vrstama snijega.
    wax_physical_form:
      name: Fizički oblik voska
      description: Označava fizički/ drugi oblik u kojem se dostavlja sirovi vosak
        za svijeće.
    wax_recommended_candle_application:
      name: Vosak koji se preporuča za svijeće
      description: Označava primarni stil(ove) svijeća za koje je vosak formuliran.
    wax_tackiness_level:
      name: Razina ljepljivosti voska
      description: Opisuje razinu ljepljivosti/prianjanja koju vosak pruža na lopatici.
    weapon_system_integration:
      name: Integracija oružnog sustava
      description: Označava uključuje li vozilo integrirane sustave naoružanja ili
        nosače.
    weather_suitability:
      name: Prikladnost za vremenske uvjete
      description: Označava uvjete okoline za koje su rukavice namijenjene, poput
        hladnoće ili mokrog vremena za igru.
    weave_finish:
      name: Tkanje/završna obrada
      description: Opisuje primarno tkanje tkanine ili površinsku obradu koja utječe
        na teksturu i sjaj kravate.
    weave_style:
      name: Stil tkanja
      description: Određuje tradicionalni uzorak tkanja koji se koristi u izradi panamskog
        šešira, što utječe na prozračnost, fleksibilnost, izgled i cijenu.
    weave_type:
      name: Vrsta tkanja
      description: Identificira stil tkanja/konstrukcije tkanine (trgovački naziv
        tkanja) koji utječe na teksturu, sjaj i drap.
    weaving_beater_edge_type:
      name: Vrsta ruba metlice za tkanje
      description: Opisuje profil radnog ruba ravnog udarača koji dodiruje potku (npr.
        ravni vs. nazubljeni).
    weaving_beater_style:
      name: Stil udarca pri tkanju
      description: Identificira funkcionalni stil/format ravnog tkalačkog metla.
    weaving_shuttle_tip_style:
      name: Stil tkanja s vrhom čunkova
      description: Određuje dizajn prednjeg vrha/nosa čunka, što utječe na način prolaska
        kroz zdjelu i vjerojatnost hvatanja niti osnove.
    weaving_shuttle_use_case:
      name: Okvir za uporabu tkalačkog šatla
      description: Određuje namjeravanu aplikaciju tkanja za koju je šatl dizajniran
        ili optimiziran.
    webbing_construction_type:
      name: Vrsta konstrukcije trake
      description: Opisuje fizički stil tkanja ili pletenice mreže, koji utječe na
        obradu, čvrstoću i namjeravanu uporabu.
    webbing_design:
      name: Dizajn remena
      description: Opisuje stil tkanja između prstiju, što utječe na trening otpora
        i pogon.
    weight_adjustability:
      name: Podesivost težine
      description: Opisuje može li korisnik mijenjati otpor proizvoda (npr. selektiran
        ili opterećujući) ili je fiksiran na jednu težinu.
    weight_integration_system:
      name: Sustav integracije težine
      description: Opisuje jesu li i kako su balastni utezi integrirani u BCD (npr.
        odvojivi džepovi za utege, ništa, opcionalni dodatak).
    weight_plate_compatibility:
      name: Kompatibilnost s utezima
      description: Definira koje promjere utega stroj prihvaća (olimpijski, standardni
        ili oba).
    weight_plate_style:
      name: Stil ploče s utezima
      description: Klasificira dizajn/vrstu utega (npr. olimpijski, bumper, selektorizirani)
        za brzo filtriranje kompatibilnosti.
    weightlifting_belt_style:
      name: Stil pojasa za dizanje utega
      description: Kategorizira cjelokupni dizajn ili namjensku konfiguraciju remena
        (npr. polužni remen, uronjeni remen, konusni remen).
    weightlifting_federation_certification:
      name: Certifikacija federacije za dizanje utega
      description: Službeno odobrenje ili usklađenost proizvoda od strane saveza za
        sportove snage, kao što su IPF ili IWF.
    wetsuit_boot_height:
      name: Visina čizme ronilačkog odijela
      description: Klasificira visinu/kroj čizme na nozi, utječe pokrivenost, pokretljivost
        i prodiranje vode.
    wetsuit_entry_system:
      name: Sustav za ulazak u ronilačko odijelo
      description: Opisuje vrstu i lokaciju otvora/poštanskog broja sustava koji se
        koristi za ulazak u ronilačko odijelo.
    wetsuit_seam_construction:
      name: Konstrukcija šavova ronilačkog odijela
      description: Određuje kako su šavovi izgrađeni i zatvoreni, što utječe na toplinu,
        fleksibilnost i trajnost.
    wheat_product_form:
      name: Oblik proizvoda pšenice
      description: Određuje fizički ili prerađeni oblik pšeničnog proizvoda.
    wheel_arrangement:
      name: Raspored kotača
      description: Određuje raspored kotača parne lokomotive (Whyte notacija), što
        je definirajuća karakteristika i uobičajeni kolekcionarski/pretraživački pojam.
    wheel_brake_type:
      name: Vrsta kočnice kotača
      description: Detaljno opisuje konfiguraciju kočenja na kotačima ili kotačićima
        kolica.
    wheel_chock_grip_features:
      name: Značajke prianjanja klinova za kotače
      description: Značajke dizajna za trakciju i prianjanje koje poboljšavaju snagu
        držanja na površinama i uz gume.
    wheel_cleaner_acidity_ph_category:
      name: Kategorija kiselosti/pH sredstva za čišćenje kotača
      description: Označava je li sredstvo za čišćenje kotača kiselo, neutralno ili
        alkalno (i opcionalno je li tržište kao pH-saldo).
    wheel_cleaner_formula_type:
      name: Vrsta formule za čišćenje kotača
      description: Za sredstva za čišćenje kotača i srodne otopine za pranje, označava
        primarnu kategoriju formule proizvoda (npr. na bazi kiseline, bez kiseline,
        pH neutralno/saldo ili reagira sa željezom).
    wheel_construction_type:
      name: Vrsta konstrukcije kotača
      description: Određuje metodu proizvodnje/konstrukcije kotača.
    wheel_contaminant_target:
      name: Cilj onečišćenja kotača
      description: Određuje primarne vrste onečišćenja koje je sredstvo za čišćenje
        namijenjeno uklanjanju.
    wheel_core_type:
      name: Vrsta jezgre kotača
      description: Opisuje stil konstrukcije jezgre kotača, koji utječe na težinu,
        krutost i prijenos energije.
    wheel_cylinder_inlet_port_thread_standard:
      name: Standardni navoj ulaznog otvora cilindra kotača
      description: Određuje standard navoja ulaznog priključka kočionog voda na cilindru
        kotača (npr. metrički mjehurićasti prošireni spoj u odnosu na SAE obrnuti
        prošireni spoj).
    wheel_fastener_seat_type:
      name: Vrsta sjedišta pričvršćivača kotača
      description: Određuje stil sjedišta matice/vijka koji se spaja s kotačem (npr.
        konusni/konusni, kuglasti/radijusni, ravni, mag/drškasti).
    wheel_illumination:
      name: Osvjetljenje kotača
      description: Označava ima li kotač ugrađenu rasvjetu ili značajke sjaja.
    wheel_material:
      name: Materijal kotača
      description: Identificira primarni sastav kotača, koji utječe na trajnost, prianjanje
        i prigušivanje vibracija.
    wheel_profile:
      name: Profil kotača
      description: Opisuje oblike presjeka kotača koji utječu na brzinu, prianjanje
        i okretnost.
    wheel_setup_type:
      name: Vrsta postave kotača
      description: Definira stil konfiguracije kotača koji se koristi na klizaljkama.
    wheel_system_finish:
      name: Završna obrada sustava kotača
      description: Površinska obrada/premaz naplataka/kotača i određenih dijelova/pribor
        za kotače.
    whip_style:
      name: Stil biča
      description: Klasificira proizvod prema specifičnom stilu jahanja bičem ili
        u crop stilu ili u predviđenoj disciplini.
    whipped_cream_base:
      name: Baza tučenog vrhnja
      description: Označava primarni osnovni sastojak koji se koristi za izradu šlaga,
        kao što su mliječno vrhnje ili kokos.
    whipped_cream_form:
      name: Oblik za šlag
      description: Označava fizički format u kojem se prodaje šlag.
    whistle_head_material:
      name: Materijal glave zviždaljke
      description: Određuje materijal glave/usnika zviždaljke (blok/glava fipple).
    whistle_light_features:
      name: Značajke zviždaljki
      description: Označava uključuje li zviždaljka integrirane svjetlosne efekte
        za zabave (npr. LED).
    whistle_purpose:
      name: Svrha zviždaljke
      description: Označava primarnu namjenu zviždaljke (sportski trening, sigurnost
        na moru, dresura pasa itd.).
    whistle_sound_style:
      name: Stil zvuka zvižduka
      description: Opisuje stil/karakter zvuka zvižduka (npr. jednotonski vs. višetonski).
    white_glue_finish_appearance_when_dry:
      name: Završni sloj/izgled bijelog ljepila nakon sušenja
      description: Određuje kako ljepilo izgleda nakon sušenja za zanatske/uredske
        svrhe (npr. prozirno vs. neprozirno).
    white_glue_washability:
      name: Može li se isprati bijelo ljepilo
      description: Označava može li se osušeno ljepilo isprati/očistiti s tkanina
        ili kože.
    whitewater_kayak_style:
      name: Stil kajaka za divlje vode
      description: Primarna namjera dizajna unutar segmenata za divlje vode (npr.
        Creekboat, River Runner, Playboat).
    whitewater_rating_class:
      name: Ocjena za divlje vode (klasa)
      description: Splav ima najvišu međunarodnu ljestvicu težine rijeke i ocjenjuje
        se prema korisničkom imenu.
    whorl_mounting_interface:
      name: Sučelje za montažu vretena
      description: Kako se pršljen pričvršćuje na kolovrat (stil osovine/veza).
    wick_construction_type:
      name: Vrsta konstrukcije žice
      description: Konstrukcija/stil fitilja (pleteni, ravni, kvadratni pleteni, s
        jezgrom, drveni itd.).
    wick_core_type:
      name: Vrsta jezgre fitilja
      description: Je li fitilj bez jezgre ili uključuje materijal jezgre (npr. s
        Paperjezgrom ili cinkovom jezgrom) što utječe na krutost i karakteristike
        gorenja.
    wick_tab_crimp_type:
      name: Vrsta krimpiranja Wick kartice
      description: Kako kartica fitilja pričvršćuje fitilj (konstrukcija/stil krimpanja).
    wick_tab_material:
      name: Materijal fitiljne pločice
      description: Materijal pričvršćene kartice/nosača (obično bijel lim), relevantan
        za otpornost na koroziju i regulatorne preferencije (npr. izbjegavanje potencijalnih
        kupaca).
    wick_tab_shape:
      name: Oblik Wick kartice
      description: Faktor oblika ploče kartice fitilja.
    wick_type_included:
      name: Vrsta fitilja uključena
      description: Određuje materijal/vrstu fitilja uključenog u komplet.
    wig_fiber_material:
      name: Materijal od vlakana za perike
      description: Identificira primarno vlakno korišteno za periku kako bi kupci
        mogli lako birati između vrsta ljudske kose i sintetičkih opcija s različitim
        karakteristikama stiliziranja i dugotrajnosti.
    wildlife_attractant_scent:
      name: Mirisni atraktant za divlje životinje
      description: Identificira primarni miris koji se koristi za privlačenje divljih
        životinja, uključujući mirise prirodne hrane i mirise feromonskog tipa.
    willow_grade:
      name: Stupanj vrbe
      description: Označava stupanj kvalitete korištene vrbe, navodeći strukturu vlakana
        i ukupnu razinu učinkovitosti.
    willow_type:
      name: Vrsta vrbe
      description: Označava vrstu vrbe ili alternativnog materijala koji se koristi
        za oštricu šišmiša, što uvelike utječe na učinkovitost, trajnost i cijenu.
    wind_up_mechanism_type:
      name: Vrsta mehanizma navijanja
      description: Određuje kako se igračka navija ili aktivira.
    wind_up_toy_movement_pattern:
      name: Uzorak kretanja igračke na navijanje
      description: Opisuje glavni pokret koji se proizvodi prigodom namatanja.
    windbreak_purpose:
      name: Namjena vjetrobranskog pojasa
      description: Definira primarnu namjenu kutije vjetrobranskog pojasa.
    windfoil_board_mounting_system:
      name: Sustav za montažu vjetrobranske ploče
      description: Određuje kutiju od folije ili montažno sučelje ugrađeno u ploču
        s vjetrobranskom folijom.
    windfoil_sail_style:
      name: Stil jedra s vjetrobrištem
      description: Klasificira jedro prema namjeravanom stilu ili disciplini jahanja.
    winding_direction:
      name: Smjer namotavanja
      description: Označava uzorak rotacije koji podržava navijalica sata (u smjeru
        kazaljke na satu, suprotno od kazaljke na satu ili dvosmjerno).
    winding_method:
      name: Metoda namatanja
      description: Kako se potka namjerava namotavati/utovarivati za uporabu u čunku.
    winding_speed_control_type:
      name: Vrsta kontrole brzine namotavanja
      description: Označava metodu koja se koristi za kontrolu brzine namatanja tijekom
        uporabe.
    winding_type:
      name: Vrsta namotavanja
      description: Određuje konstrukciju namotavanja basa (vanjski profil omotača).
    windlass_control_station_type:
      name: Tip upravljačke stanice vitla
      description: Vrsta upravljačkog sučelja uključenog ili podržanog za upravljanje
        vitlom.
    windlass_mount_type:
      name: Vrsta montaže vitla
      description: Gdje/kako se vitlo namjerava montirati na brodu.
    window_component_location:
      name: Lokacija komponente prozora
      description: Određuje na koji se prozor/otvor dio odnosi unutar vozila (npr.
        vjetrobransko staklo vs. staklo vrata vs. stražnje staklo vs. tromjesečje
        staklo).
    window_configuration:
      name: Konfiguracija prozora
      description: Označava nazočnost i relativnu veličinu prozirnih prozora za vidljivost
        na profilu krila.
    window_glass_construction:
      name: Izrada prozorskog stakla
      description: Određuje sigurnosnu/laminiranu konstrukciju stakla prozora motornog
        vozila.
    window_glass_features:
      name: Karakteristike prozorskog stakla
      description: Označava je li staklo podržalo integrirane tehnologije vozila (npr.
        jastučić senzora za kišu, nosač kamere).
    window_glass_finish:
      name: Završna obrada prozorskog stakla
      description: Određuje završnu obradu/zatamnjenje/tretman privatnosti prozorskih
        stakala motornih vozila.
    window_glass_tint_color:
      name: Boja zatamnjenja prozorskog stakla
      description: Određuje nijansu boje nazočne u staklu (ne opću boju proizvoda).
    window_glass_tint_level:
      name: Razina zatamnjenja prozorskog stakla
      description: Označava približnu tvorničku/zatamnjenu tamu prozorskog stakla
        (ne naknadno proizvedene folije). Koristite opisne razine kada točan VLT nije
        poznat.
    window_net_latch_mechanism:
      name: Mehanizam za zatvaranje prozorske mreže
      description: Određuje mehanizam za zatvaranje/otpuštanje koji se koristi za
        mrežicu za prozor (npr. gumb, poluga, kopča u stilu sigurnosnog pojasa).
    window_net_mounting_hardware:
      name: Okov za montažu prozorske mreže
      description: Označava vrstu montažnog okova ili način pričvršćivanja koji se
        koristi za ugradnju prozorske mrežice (npr. kopča, vijci, kuka/šipka) ili
        je li okov uključen.
    window_net_opening_direction:
      name: Smjer otvaranja prozorske mreže
      description: Određuje kako se mreža na prozoru otvara/otpušta u odnosu na putnika
        radi izlaska i usklađenosti s pravilima.
    window_regulator_operation:
      name: Rad regulatora prozora
      description: Određuje kako se upravlja podizačem prozora (ručno ili električno).
    windshield_coverage_area:
      name: Područje pokrivenosti vjetrobranskog stakla
      description: Određuje koje dijelove prednje vanjske strane vozila štiti navlaka
        za vjetrobransko staklo (npr. samo vjetrobransko staklo, a ne brisače, retrovizore,
        bočne prozore ili rub poklopca motora).
    windshield_mount_attachment_method:
      name: Način pričvršćivanja nosača vjetrobrana
      description: Određuje kako se nosač pričvršćuje ili hvata za površinu vjetrobranskog
        stakla.
    windshield_washer_fluid_seasonality:
      name: Sezonska tekućina za pranje vjetrobranskog stakla
      description: Označava predviđeno godišnje doba/klimu ili primarnu uporabu formulacije
        tekućine za pranje vjetrobranskog stakla (npr. zimsko sredstvo za odmrzavanje,
        ljetno sredstvo za pranje, za sva godišnja doba).
    windsurf_fin_style:
      name: Stil peraja za jedrenje na dasci
      description: Klasificira peraju prema predviđenoj disciplini jedrenja ili stilu
        korištenja (npr. valovi, slalom, trava).
    windsurfing_connection_standard:
      name: Standardna veza za jedrenje na dasci
      description: Mehaničko sučelje ili tip kutije koji se koristi za pričvršćivanje
        dijela na ploču ili konstrukciju.
    windsurfing_sail_style:
      name: Stil jedra za windsurfing
      description: Klasificira namjeravanu disciplinu jedrenja ili slučaj uporabe,
        kao što su val, freeride ili foil.
    wine_additive_type:
      name: Vrsta aditiva za vino
      description: Navodi o kakvom se proizvodu za proizvodnju crnog vina radi (sastojak,
        dodatak, kvasac, sredstvo za bistrenje, komplet itd.).
    wine_body:
      name: Tijelo vina
      description: Opisuje percipiranu težinu i osjećaj vina u ustima.
    wine_carbonation:
      name: Karbonizacija vina
      description: Označava je li vino mirno, polupjenušavo ili pjenušavo i, gdje
        je relevantno, intenzitet pjenušanja.
    wine_making_ingredient_type:
      name: Vrsta sastojka za proizvodnju vina
      description: Određuje kategoriju funkcionalnih sastojaka za potrošne aditive
        i sastojke za proizvodnju vina.
    wine_making_stage:
      name: Faza proizvodnje vina
      description: Označava za koju je fazu procesa proizvodnje vina proizvod namijenjen.
    wine_style:
      name: Stil vina
      description: Klasificira široki stil proizvodnje vina, pored boje, kao što su
        mirna, pjenušava ili alkoholizirana vina.
    winemaking_process_stage:
      name: Faza procesa proizvodnje vina
      description: Označava primarnu fazu procesa proizvodnje vina za koju je dostava
        namijenjena.
    wing_count:
      name: Broj krila
      description: Broj krila/krakova na bumerangu.
    wing_handle_type:
      name: Vrsta ručke krila
      description: Određuje stil sustava rukohvata na profilu krila.
    wing_part_type:
      name: Vrsta dijela krila
      description: Označava specifičnu komponentu ili zamjenski dio za profilno krilo.
    wingfoiling_style:
      name: Stil krila
      description: Označava specifičnu disciplinu krilastih profila ili stil jahanja
        na koji je proizvod usmjeren.
    wiper_arm_finish:
      name: Završna obrada ručice brisača
      description: Površinska obrada ili zaštitni premaz nanesen na krak brisača,
        što utječe na otpornost na koroziju i izgled.
    wiper_arm_pivot_mount_type:
      name: Vrsta nosača okretnog dijela ručice brisača
      description: Određuje kako se krak brisača pričvršćuje na polugu ili zglob brisača
        vozila.
    wiper_blade_attachment_type:
      name: Vrsta pričvršćivanja metlice brisača
      description: Određuje mehanizam sinhronizacije/stil pričvršćivanja koji se koristi
        za montažu metlice brisača na krak brisača.
    wiper_blade_rubber_material:
      name: Gumeni materijal metlice brisača
      description: Materijal elementa za brisanje (uložak/refil) koji dodiruje staklo.
    wiper_system_position:
      name: Položaj sustava brisača
      description: Označava položaj montaže na vozilu za sustav brisača.
    wire_coating_material:
      name: Materijal izolacije žice
      description: Određuje materijal vanjskog premaza/plašta nanesenog na žicu (ne
        materijal jezgre žice), što može utjecati na otpornost na abraziju i koliko
        glatko prolazi kroz rupe od perli.
    wire_coating_type:
      name: Vrsta premaza žice
      description: Određuje je li i kako je žica obložena/prekrivena (za boju, zaštitu
        i teksturu).
    wire_construction_type:
      name: Vrsta konstrukcije žice
      description: Određuje fizičku konstrukciju žice za izradu perli, kao što je
        namotana ili puna, te je li obložena.
    wire_finish:
      name: Završna obrada žice
      description: Određuje površinsku završnu obradu, premaz ili galvanizaciju nanesenu
        na žicu (npr. polirana, emajlirana, pocinčana, galvanizirana), što utječe
        na izgled i otpornost na tamnjenje/koroziju.
    wire_gauge_awg:
      name: Promjer žice (AWG)
      description: Američki mjerni profil žica (AWG) - veličina vodiča korištenih
        u ožičenju.
    wire_insulation_material:
      name: Materijal izolacije žice
      description: Materijal izolacije/plašta žice korištene u kabelskom svežnju (utječe
        na temperaturu/kemijsku otpornost).
    wire_packaging_type:
      name: Vrsta pakiranja žice
      description: Određuje način prodaje/pakiranja žice.
    wire_shape_profile:
      name: Profil/oblik žice
      description: Opisuje oblik poprečnog presjeka žice.
    wiring_configuration:
      name: Konfiguracija ožičenja
      description: Označava je li mač za mačevanje isporučen unaprijed ožičen za električno
        bodovanje, neožičen, bežični ili namijenjen za neelektrične vježbe.
    wobbler_style:
      name: Stil voblera
      description: Definira specifičan dizajn/stil akcije voblera, kao što je crankbait
        ili jerkbait.
    wood_block_surface_preparation:
      name: Priprema površine drvenih blokova
      description: Označava stanje površine drvenog bloka spremno za završnu obradu.
    wood_grain_direction:
      name: Smjer vlakana drva
      description: Smjer drvenih vlakana u odnosu na najdulju dimenziju proizvoda
        (važno za čvrstoću, ponašanje pri rezanju i izgled).
    wood_slice_edge_style:
      name: Stil ruba drvene kriške
      description: Stanje ruba kriške, kao što je rub prirodne kore u odnosu na glatki/brušeni
        rub.
    wooden_block_special_features:
      name: Posebne značajke drvenih blokova
      description: Značajne funkcionalne značajke uključene su u set drvenih blokova.
    woodwind_body_construction:
      name: Konstrukcija tijela drvenih puhaćih instrumenata
      description: Označava je li instrument izrađen u jednom dijelu ili više dijelova
        (npr. 2-dijelni/3-dijelni), što utječe na čišćenje, skladištenje i prenosivost.
    woodwind_polishing_cloth_intended_use:
      name: Namjena krpe za poliranje drvenih puhaćih instrumenata
      description: Određuje za što je krpa prvenstveno namijenjena čišćenju/poliranju
        drvenog puhačkog instrumenta.
    woodwind_small_part_type:
      name: Mali dio drvenih puhača
      description: Određuje o kojoj se vrsti malog zamjenskog dijela klarineta radi
        (npr. mehanizam tipki, jastučići/pluto/filc, prstenovi).
    woofer_mounting_type:
      name: Vrsta montaže zvučnika (woofera)
      description: Kako se woofer namjerava montirati/koristiti (slobodni zrak u odnosu
        na zatvoreni prostor) i uobičajeni načini montaže u automobilima.
    woofer_surround_material:
      name: Materijal za okvir woofera
      description: Materijal korišten za okvir woofera (vanjski prsten ovjesa).
    worn_on_finger:
      name: Istrošeni prst
      description: Određuje na kojem prstu se vodilica naprstka treba nositi.
    wrap_style:
      name: Stil omota
      description: Označava koliko puta se remen treba omotati oko struka.
    wrapping_occasion:
      name: Prigoda zamotavanja
      description: Primarna prigoda darivanja/slavlja za koju je namijenjen papir
        za zamotavanje
    wrapping_paper_features:
      name: Karakteristike papir za zamotavanje
      description: Funkcionalna i održivost povezana svojstva papira za zamotavanje,
        kao što su otpornost na kidanje, reciklirani sadržaj ili unaprijed izrezani
        formati listova.
    wrestling_dummy_design:
      name: Dizajn lutke za hrvanje
      description: Cjelokupni oblik tijela ili držanje lutke, poput stojećih ljudskih
        oblika ili vreće za bacanje, što diktira primjenjive vježbe treninga.
    wrestling_mat_safety_certifications:
      name: Sigurnosni certifikati za hrvačke prostirke
      description: Navodi sve industrijske ili sportske sigurnosne certifikate ili
        standarde koje prostirka zadovoljava.
    wrist_strap_style:
      name: Stil remena za zapešće
      description: Opisuje stil remena za zglob (ili njegov nedostatak) koji utječe
        na podršku i pristajanje.
    wrist_support_style:
      name: Stil podrške za zglob
      description: Označava konstrukciju ili stil potpore za zglob, kao što je ortoza,
        rukavica, traka ili omotač, kako bi se olakšao odabir korisničkih preferencija
        i učinkovitosti.
    xylophone_range_octaves:
      name: Raspon ksilofona (oktave)
      description: Ukupni raspon ksilofona izražen u oktavama (npr. 2,5 oktave, 3
        oktave, 4 oktave).
    xylophone_resonator_type:
      name: Tip rezonatora ksilofona
      description: Vrsta rezonatorskog sustava koji se koristi za pojačavanje tona
        (ako postoji).
    yam_variety:
      name: Sorta jama
      description: Označava kultivar ili uobičajenu sortu jama koji se prodaje (npr.
        ljubičasti, žuti, slonova noga).
    yarn_cutter_physical_style:
      name: Fizički stil rezača pređe
      description: Identificira fizički stil rezača pređe (npr. privjesak, prsten,
        škare) za podršku pregledavanju i filtriranju unutar ove kategorije.
    yarn_finish_or_effect:
      name: Završna obrada ili efekt pređe
      description: Highlight poseban vizualni ili funkcionalni tretman primijenjen
        na pređu, poput fluorescencije ili metalnog sjaja.
    yarn_guide_style:
      name: Pređa u stilu vodiča
      description: Fizički stil komponente za vođenje pređe.
    yarn_swift_adjustability:
      name: Brza podesljivost pređe
      description: Označava može li se i kako brzo podesiti (proširivo, sklopivo/preklopivo),
        što utječe na pohranu i raspon veličine klupka.
    yarn_swift_bearing_type:
      name: Vrsta ležaja pređe swift
      description: Opisuje mehanizam podrške rotacije (npr. kuglični ležaj) koji utječe
        na glatkoću i brzinu namatanja.
    yeast_application:
      name: Primjena kvasca
      description: Označava primarnu namjeravanu kulinarsku ili fermentacijsku uporabu
        kvasca.
    yo_yo_accessory_part_type:
      name: Vrsta pribora/dijela za jo-jo
      description: Označava o kojoj se vrsti zamjenskog dijela ili pribora za jo-jo
        radi (npr. niz, ležaj, odzivne pločice).
    yo_yo_axle_system_type:
      name: Vrsta sustava jo-jo osovina
      description: Konstrukcijski pristup za jo-jo osovinu (npr. fiksna osovina u
        odnosu na mjenjač), utjecaj na osjećaj zazora i održavanje.
    yo_yo_bearing_size_class:
      name: Razred veličine jo-jo ležaja
      description: Standardizirana veličina ležaja koju koristi jo-jo, gdje je primjenjivo.
    yo_yo_bearing_type:
      name: Vrsta jo-jo ležaja
      description: Konfiguracija ležaja koja utječe na odziv i karakteristike okretanja.
    yo_yo_play_style:
      name: Stil igre jo-joom
      description: Primarni namijenjeni stil igre jo-joa, koji odražava disciplinu
        niz/trik za koju je proizvod dizajniran.
    yo_yo_response_system:
      name: Sustav za odgovor jo-jo
      description: Određuje mehanizam odziva jo-jo za koji je ovaj dio dizajniran
        (kompatibilnost).
    yo_yo_responsiveness:
      name: Jo-jo odziv
      description: Vraća li se jo-jo u ruku povlačenjem (odgovara) ili zahtijeva vezivanje
        (nereaktivan).
    yo_yo_string_material:
      name: Materijal za jo-jo niz
      description: Sastav materijala jo-jo niza.
    yogurt_base_ingredient:
      name: Sastojak baze jogurta
      description: Identificira primarni izvor mlijeka ili biljnog podrijetla koji
        se koristi za izradu jogurta, što je ključno za prehrambene preferencije i
        razmatranje alergena.
    yoke_type:
      name: Vrsta jarma
      description: Označava stil kolijevke ili jarma koji podržava vatreno oružje
        na monopodu.
    zill_playing_style:
      name: Stil sviranja zillova
      description: Namjeravani kontekst/stil sviranja (uobičajeno trbušni ples u odnosu
        na orkestralnu/kulturnu varijantu).
    zill_strap_material:
      name: Materijal remena zillova
      description: Materijal trake za prste/elastike koja se koristi za držanje zila
        (ako je uključena), utječe na udobnost, izdržljivost i prianjanje.
    zills_strap_adjustability:
      name: Podešavanje Zills remena
      description: Može li se i kako priloženi remen/guma prilagoditi.
    zipper_application:
      name: Aplikacija patentnog zatvarača
      description: Određuje namjeravani projekt ili aplikaciju za koju je patentni
        zatvarač dizajniran.
    zipper_chain_type:
      name: Vrsta lanca za patentni zatvarač
      description: Određuje konstrukciju/vrstu lanca/zuba patentnog zatvarača.
    zipper_end_type:
      name: Vrsta kraja patentnog zatvarača
      description: Označava kako se patentni zatvarač završava i je li odvojiv (otvoreni
        kraj) ili je zatvorenog kraja (neodvojiv), uključujući uobičajene dijelove
        odvojivih krajeva koji se koriste u izradi patentnih zatvarača.
    zipper_gauge:
      name: Mjerač patentnog zatvarača
      description: 'Označava oznaku veličine/kalibra lanca patentnog zatvarača, obično
        izraženu kao broj s # (na primjer, #3 ili #5), što odgovara širini zuba/zavojnice
        i namjeni.'
    zipper_opening_length:
      name: Duljina otvora patentnog zatvarača
      description: Definira koliki dio prednjeg otvora ima patentni zatvarač, čime
        se razlikuje stil punog poštanskog broja od polupoštanskog broja ili tromjesečje-poštanskog
        broja.
    zipper_pull_material:
      name: Materijal za zatvaranje patentnog zatvarača
      description: Određuje materijal ručke ili kartice za povlačenje patentnog zatvarača
        (dijela koji hvatate), različit od zubaca/lanca i trake patentnog zatvarača.
    zipper_pull_side:
      name: Strana povlačenja patentnog zatvarača
      description: Određuje s koje strane (strana) patentnog zatvarača je dostupna
        kartica za povlačenje.
    zipper_pull_strap_cord_tab_material:
      name: Materijal za remen/uzicu/karticu s patentnim zatvaračem
      description: Materijal remena/uzlice/kartice/komponente rese pričvršćene na
        ručku patentnog zatvarača (ako postoji), isključujući glavni dio/tijelo ručke
        patentnog zatvarača.
    zipper_reversibility_mechanism:
      name: Mehanizam za reverzibilno otvaranje patentnog zatvarača
      description: Određuje kako je patentni zatvarač reverzibilan (npr. dvostrani
        klizač u odnosu na klizač s preklopom/automatskim zaključavanjem dizajniran
        za reverzibilne odjevne predmete).
    zipper_separating_type:
      name: Vrsta odvajanja patentnim zatvaračem
      description: Označava da li se patentni zatvarač odvaja na dnu/gore ili je zatvorenog
        kraja, za nošenje s jaknama, vrećama za spavanje, torbama itd.
    zipper_side:
      name: Strana s patentnim zatvaračem
      description: Označava stranu na kojoj se nalazi glavni patentni zatvarač kada
        je vreća za spavanje okrenuta licem prema gore.
    zipper_slider_material:
      name: Materijal za klizače patentnih zatvarača
      description: Određuje materijal klizača patentnog zatvarača (mehanizma za pomicanje),
        koji može utjecati otpornost na udarce i otpornost na koroziju.
    zipper_slider_pull_configuration:
      name: Konfiguracija klizača/povlačenja patentnog zatvarača
      description: Označava ima li patentni zatvarač jedan klizač/povlačilicu ili
        dvije, te jesu li povlačilice na jednoj ili obje strane klizača.
    zipper_style:
      name: Stil patentnog zatvarača
      description: Označava duljinu patentnog zatvarača ili nazočnost na odjevnom
        predmetu (npr. bez patentnog zatvarača, tromjesečje-poštanski broj, polupoštanski
        broj, puni poštanski broj).
    zipper_tape_material:
      name: Materijal trake patentnog zatvarača
      description: Određuje primarni materijal trake patentnog zatvarača (strane tkanine)
        koja je ušivena u projekt.
    zipper_teeth_type:
      name: Vrsta zubaca patentnog zatvarača
      description: Određuje stil konstrukcije lanca/zuba zatvarača (npr. zavojnica,
        lijevana plastika, metal, nevidljivi), što utječe na fleksibilnost, čvrstoću
        i tipičnu primjenu.
