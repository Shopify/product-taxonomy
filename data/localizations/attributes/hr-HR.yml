      description: Definira oblik iglica četke, npr. ravne, pod kutom
    broadcast_video_standard:
      name: Standard emitiranja videa
      description: Označava analogni standard emitiranja s kojim je VCR kompatibilan.
    broadcasting_standard_supported:
      name: Podržani standard emitiranja
      description: Specificira televizijske standarde emitiranja ili modulacije (satelit,
        kabel, zemaljski) koje proizvod može dekodirati ili rukovati.
    broadhead/field_point_material:
      name: Materijal širokog vrha s oštricama / poljskog vrha bez oštrica
      description: Utvrđuje materijal od kojeg su izrađeni streličarski široki vrhovi
        s oštricama i poljski vrhovi bez oštrica, kao što je nehrđajući čelik ili
        ugljični čelik
    broadhead_design:
      name: Dizajn širokog vrha s oštricama
      description: Označava vrstu dizajna širokog vrha s oštricama koji se upotrebljava
        u streličarstvu, npr. s fiksnim oštricama, s pomičnim oštricama
    brush_application:
      name: Primjena kista
      description: Opisuje predviđenu upotrebu slikarskih kistova, kao što je kist
        za akrilne boje ili kist za akvarel
    brush_end_type:
      name: Tip kraja četkice
      description: Opisuje strukturni format krajeva četkice (npr. jednokraki, dvokraki,
        uvlačivi).
    brush_head_shape:
      name: Oblik glave četke
      description: Definira cjelokupni oblik glave četke, što utječe na doseg i prikladnost
        za različite korisnike.
    brush_head_usage:
      name: Namjena glave četke
      description: Određuje predviđenu uporabu glave četke, obično u kozmetici, npr.
        dubinsko čišćenje, piling
    brush_material:
      name: Materijal četke
      description: Određuje vrstu materijala od kojeg je četka izrađena, poput silikona
        ili plastike
    brush_size:
      name: Veličina kista
      description: Određuje veličinu slikarskog kista, npr. 0, 12
    brush_type:
      name: Vrsta četke
      description: Određuje materijal upotrijebljen u četki za brijanje, poput sintetike
        ili dlake jazavca
    brushing_mode:
      name: Način četkanja
      description: Navodi unaprijed postavljene programe čišćenja kroz koje četkica
        za zube može ciklirati (npr., čisto, osjetljivo, izbjeljivanje).
    bug_type:
      name: Vrsta kukca
      description: Određuje vrstu insekata na koje proizvod djeluje, poput mrava ili
        stršljena
    building_board_material:
      name: Materijal građevinske ploče
      description: Određuje vrstu materijala upotrijebljenog u građevinskim pločama,
        poput šperploče ili cementa
    building_consumable_form:
      name: Oblik potrošnog građevinskog materijala
      description: Određuje oblik smjesa za sanaciju zidova, poput tekućine ili praha
    building_toy_type:
      name: Vrsta igračke za slaganje
      description: Određuje kategoriju igračke za slaganje, npr. STEM kompleti za
        slaganje, magnetske pločice
    bulb_cap_type:
      name: Vrsta podnoška žarulje
      description: Određuje vrstu podnoška ili grla žarulje ili rasvjetnog tijela,
        npr. E12, GU10
    bulb_shape:
      name: Oblik žarulje
      description: Opisuje oblik rasvjetnih proizvoda, npr. cijev, spirala
    bulb_size:
      name: Veličina žarulje
      description: Određuje veličinu žarulja, npr. A19, C7
    bulb_type:
      name: Vrsta žarulje
      description: Određuje vrstu žarulje koja se upotrebljava u rasvjetnim proizvodima,
        npr. LED, halogena
    bulldozer_blade_type:
      name: Tip noža buldožera
      description: Utvrđuje vrstu noža na buldožeru, poput kutnog ili ravnog (S-nož)
    bullet_protection_level:
      name: Razina zaštite od metaka
      description: Označava razinu zaštite od metaka u pancirnim prslucima, npr. IIA,
        IV
    bullhorn_features:
      name: Značajke megafona
      description: Ističe jedinstvene funkcije megafona, poput snimanja glasa ili
        funkcije sirene
    bullion_form:
      name: Oblik poluge plemenitih metala
      description: Određuje vrstu poluge plemenitih metala, kao što su zlatnici ili
        poluge
    bungee_arm_mechanism:
      name: Mehanizam elastične ruke
      description: Definira tehnologiju koja se koristi za vješanje i vođenje kabela
        miša (npr. opružna ruka, elastična vrpca, magnetska suspenzija).
    burner_material:
      name: Materijal plamenika
      description: Utvrđuje materijal upotrijebljen u konstrukciji plamenika za štednjak
        ili za roštilj, poput lijevanog željeza ili nehrđajućeg čelika
    butt_cap_color:
      name: Boja kapice za dršku
      description: Određuje boju kapice za dršku štapa za ribolov, kao što je crna
        ili plava
    butt_cap_material:
      name: Materijal kapice za dršku
      description: Definira sastav donjeg kraja drške na sportskoj opremi, npr. EVA
        (etilen vinil acetat), pluto
    butt_cap_pattern:
      name: Uzorak kapice za dršku
      description: Opisuje dizajn ili motiv na kapici drške štapa za ribolov, kao
        što je kamuflažni ili cvjetni
    button/snap_closure_type:
      name: Vrsta zatvaranja gumbom/drukerom
      description: Opisuje stil mehanizma za zatvaranje, poput magnetskog ili nevidljivog
    button_surface_profile:
      name: Profil površine tipke
      description: Opisuje fizičku konturu površine klipa tipke, utječući na ergonomiju
        i vizualni stil.
    cabinet_type:
      name: Vrsta arkadnog kabineta
      description: Određuje dizajn i format arkadnih igara, kao što je stolna ili
        mini arkadna igra
    cable_form_factor:
      name: Oblik kabela
      description: Opisuje fizički dizajn ili oblik kabela.
    cable_housing_material:
      name: Materijal bužira
      description: Utvrđuje materijal od kojeg je izrađen bužir, poput najlona ili
        PVC-a
    cable_jacket_rating:
      name: Ocjena plašta kabela
      description: Specificira okolišnu ili sigurnosnu ocjenu vanjskog plašta kabela
        (npr. plenum, izravno ukopavanje, otpornost na UV).
    cable_shielding:
      name: Oklop kabela
      description: Određuje vrstu zaštite koja se upotrebljava u kabelima, npr. pletena
        zaštita (STP), folija (FTP)
    cable_style:
      name: Stil kabela
      description: Opisuje fizički dizajn kabela (npr. pleteni, ravni, namotani, uvlačivi).
    cable_tie_type:
      name: Tip kabelske vezice
      description: Specificira stil konstrukcije ili mehanizam pričvršćivanja kabelske
        vezice.
    cable_tray_style:
      name: Stil kabelskog kanala
      description: Opisuje strukturalni stil sekcije kabelskog kanala koji određuje
        ventilaciju i metodu potpore kabela.
    cable_type:
      name: Vrsta sajle
      description: Klasificira vrstu sajle, obično u biciklističkoj opremi; npr. za
        kočnicu, za mjenjač
    cache_level:
      name: Razina predmemorije
      description: Označava hijerarhijsku poziciju predmemorije (npr. L1, L2, L3),
        što utječe na veličinu, latenciju i blizinu procesorskim jezgrama.
    caffeine_content:
      name: Razina sadržaja kofeina
      description: Ukazuje na količinu kofeina u proizvodu, npr. bez kofeina, niska
        razina kofeina
    cage_type:
      name: Vrsta kaveza
      description: Utvrđuje vrstu sigurnosnog kaveza u vozilima, poput punog kaveza
        ili polukaveza
    calculator_accessory_type:
      name: Vrsta dodataka za kalkulator
      description: Određuje vrstu dodatka za kalkulator, kao što je rola papira ili
        adapter za pisač
    calculator_features:
      name: Značajke kalkulatora
      description: Opisuje funkcije koje kalkulator može izvoditi, poput izračuna
        kredita ili statističke analize
    calendar/organizer_features:
      name: Značajke kalendara/rokovnika
      description: Opisuje posebne značajke kalendara ili rokovnika, kao što su termini
        za sastanke ili označeni praznici
    calendar_format:
      name: Format kalendara
      description: Određuje vremenski okvir proizvoda s kalendarom, poput dnevnog
        ili mjesečnog
    calibration_sensor_type:
      name: Vrsta senzora za kalibraciju
      description: Specificira osnovnu hardversku tehnologiju ili oblik kalibratora.
    call_blocking_method:
      name: Metoda blokiranja poziva
      description: Specificira kako uređaj identificira i blokira neželjene pozive.
    caller_id_compatibility:
      name: Kompatibilnost identifikacije pozivatelja
      description: Navodi podržava li telefon usluge identifikacije pozivatelja koje
        pruža telefonska mreža.
    caller_id_standard_compatibility:
      name: Kompatibilnost sa standardom identifikacije pozivatelja
      description: Označava koje formate signala identifikacije pozivatelja uređaj
        može dekodirati.
    cam_system:
      name: Sustav brijega
      description: Određuje sustav brijega koji se upotrebljava u opremi za streličarstvo,
        npr. hibridni sustav ili jednostruki sustav
    camera_attachment:
      name: Dodatak za fotoaparat
      description: Određuje dio fotoaparata ili dodatak za fotoaparat, kao što je
        kutno tražilo ili adapter za okular
    camera_button/knob_type:
      name: Vrsta gumba/kotačića fotoaparata
      description: Imenuje gumb ili kotačić na fotoaparatu, npr. gumb okidača, kotačić
        za odabir načina rada
    camera_control_type:
      name: Vrsta upravljanja fotoaparatom
      description: Određuje vrstu daljinskog upravljanja fotoaparatom, npr. daljinski
        prekidač, okidač
    camera_display_technology:
      name: Tehnologija zaslona fotoaparata
      description: Određuje tehnologiju zaslona fotoaparata, npr. OLED, Super AMOLED
    camera_features:
      name: Značajke fotoaparata/kamere
      description: Utvrđuje posebne mogućnosti fotoaparata, poput stabilizacije slike
        ili prepoznavanja lica
    camera_gear_type:
      name: Vrsta opreme za fotoaparat/kameru
      description: Utvrđuje vrstu opreme za fotoaparat, kao što je pogon fotoaparata
        ili uređaj za praćenje fokusa
    camera_hd_type:
      name: Vrsta HD-a fotoaparata/videokamere
      description: Određuje kvalitetu videozapisa fotoaparata/videokamere, kao što
        je Quad HD ili 8K ultra HD
    camera_lens_material:
      name: Materijal objektiva fotoaparata/videokamere
      description: Određuje sastav objektiva fotoaparata ili videokamere, kao što
        je staklo ili plastika
    camera_lens_type:
      name: Vrsta objektiva fotoaparata/videokamere
      description: Utvrđuje vrstu objektiva fotoaparata/videokamere, kao što je makro
        objektiv ili teleobjektiv
    camera_mounting_type:
      name: Način postavljanja kamere/videokamere
      description: Određuje način pričvršćivanja kamere, npr. stativ, pričvršćivanje
        kopčom
    camera_sensor_type:
      name: Vrsta senzora fotoaparata/videokamere
      description: Utvrđuje vrstu senzora u fotoaparatima/videokamerama ili optičkim
        uređajima, npr. CMOS, CCD
    camera_shape:
      name: Oblik kamere
      description: Opisuje stil dizajna nadzornih kamera, kao što su cjevasta ili
        u obliku kutije
    candle_kit_items_included:
      name: Artikli uključeni u komplet za izradu svijeća
      description: Određuje koje su stavke dio kompleta za izradu svijeća, poput stijenja
        za svijeće ili posude za taljenje voska
    candle_material:
      name: Materijal svijeće
      description: Određuje vrstu voska ili materijala koji se upotrebljava u svijećama,
        poput parafina ili pčelinjeg voska
    candle_shape:
      name: Oblik svijeće
      description: Opisuje oblik svijeće, kao što je cilindrični ili četvrtasti
    candle_type:
      name: Vrsta svijeće
      description: Određuje dizajn svijeća, kao što je tanka visoka svijeća ili lučica
    cane_base_design:
      name: Dizajn baze štapa
      description: Identificira konfiguraciju baze potpore štapa.
    canned_meat_variety:
      name: Vrsta konzerviranog mesa
      description: Označava različite vrste konzerviranog mesa, poput puretine ili
        šunke
    canopy_color:
      name: Boja platna
      description: Određuje nijansu platna na kišobranu ili suncobranu, poput crne
    canopy_material:
      name: Materijal platna
      description: Određuje materijal upotrijebljen u izradi kišobrana ili suncobrana,
        poput pamuka ili vinila
    canopy_pattern:
      name: Uzorak platna
      description: Utvrđuje vizualni motiv na platnu kišobrana ili suncobrana, poput
        kockica ili umjetničkog motiva
    cantilever_material:
      name: Materijal konzole
      description: Označava materijal konzole koja drži iglu, utječući na sposobnost
        praćenja i zvučni potpis.
    canvas_finish:
      name: Završna obrada platna
      description: Navodi je li platno spremno za slikanje, npr. grundirano, negrundirano
    canvas_material:
      name: Materijal platna za rukotvorine
      description: Utvrđuje vrstu materijala upotrijebljenog za izradu platna za rukotvorine,
        poput pamuka ili lana
    canvas_texture:
      name: Tekstura platna
      description: Opisuje površinsku teksturu platna, poput glatke teksture ili teksture
        srednje debljine niti
    capacitance_tolerance:
      name: Tolerancija kapaciteta
      description: Označava dopušteno odstupanje stvarnog kapaciteta od nominalne
        vrijednosti, izraženo kao postotak.
    capacitor_application:
      name: Primjena kondenzatora
      description: Označava primarnu namijenjenu uporabu ili klasu primjene kondenzatora
        (npr. rad motora, audio, prigušivač).
    capacitor_polarity:
      name: Polaritet kondenzatora
      description: Navodi je li kondenzator polariziran, nepolariziran ili bipolarni,
        utječući na orijentaciju ugradnje i prikladne pozicije kruga.
    car_freshener_fragrance:
      name: Miris osvježivača za automobil
      description: Određuje aromu osvježivača zraka za vozila, poput lavande ili mirisa
        novog automobila
    car_seat_installation:
      name: Postavljanje autosjedalice
      description: Određuje način postavljanja dječje autosjedalice, poput sustava
        kopči ili sigurnosnog pojasa
    car_seat_orientation:
      name: Orijentacija autosjedalice
      description: Određuje smjer prema kojem je dječja autosjedalica okrenuta, na
        primjer suprotno od smjera vožnje ili u smjeru vožnje
    car_type:
      name: Vrsta automobila
      description: Određuje kategoriju vozila, kao što je SUV ili limuzina
    carabiner_gate_type:
      name: Vrsta vratašaca na karabineru
      description: Definira vrstu vratašaca na karabinerima za penjanje, poput vratašaca
        sa zaključavanjem na maticu ili vratašaca bez mehanizma zaključavanja
    carabiner_shape:
      name: Oblik karabinera
      description: Utvrđuje oblik karabinera koji se upotrebljavaju u penjanju, poput
        HMS ili kruškastog
    card/adapter_installation:
      name: Ugradnja kartice/prilagodnika
      description: Utvrđuje način ugradnje U/I kartica ili prilagodnika, primjerice
        unutarnja ili vanjska ugradnja
    card_attributes:
      name: Atributi sličica
      description: Opisuje posebne značajke kolekcionarskih sličica, kao što je folija
        ili holografski učinak
    card_design:
      name: Dizajn kartice
      description: Određuje oblik kartice za označavanje mjesta za stolom ili kartice
        za slanje odgovora na pozivnicu, kao što je preklopna ili ravna
    card_format:
      name: Format pozivnice ili čestitke
      description: Opisuje stil pozivnica ili čestitki, poput ravne ili preklopne
    card_holder_design:
      name: Dizajn držača kartice
      description: Opisuje stil ili oblik držača kartice za označavanje mjesta za
        stolom, kao što je sa štipaljkom ili samostojeći
    card_interface_type:
      name: Tip sučelja kartice
      description: Opisuje komunicira li čitač putem fizičkih kontakata, beskontaktnog
        RF-a ili oboje.
    card_rechargeability:
      name: Mogućnost punjenja kartice
      description: Označava može li se saldo kartice ponovno napuniti nakon što se
        iskoristi početni kredit i primarni način nadoplate.
    card_size:
      name: Veličina čestitke
      description: Koristi se za označavanje veličine čestitki, npr. A4, letter
    card_usage_status:
      name: Status korištenja kartice
      description: Označava je li kredit telefonske kartice korišten ili ostaje netaknut.
    care_instructions:
      name: Upute za održavanje
      description: Pruža smjernice za održavanje proizvoda, kao što je ručno pranje
        ili samo kemijsko čišćenje
    carry_options:
      name: Mogućnosti nošenja
      description: Određuje dostupne metode nošenja predmeta, poput ručke ili remena
        za rame
    carrying_positions:
      name: Položaji nošenja
      description: Određuje različite načine nošenja nosiljke za bebe, poput nošenja
        na boku ili usmjereno unatrag
    carrying_type:
      name: Vrsta nošenja
      description: Opisuje način nošenja proizvoda, kao što je nošenje u ruci ili
        remen za nošenje preko ramena
    cart_design:
      name: Dizajn kolica
      description: Opisuje konfiguraciju ili strukturu medicinskih kolica, kao što
        su kolica s dvostrukom kukom ili kolica s postoljem
    cart_type:
      name: Vrsta vozila za golf
      description: Utvrđuje izvor napajanja vozila za golf, kao što je električno
        ili plinsko napajanje
    cartridge_authenticity:
      name: Autentičnost kasete
      description: Identificira je li potrošni materijal originalni proizvođač, kompatibilan,
        prerađen ili ponovno napunjen.
    cartridge_mounting_style:
      name: Stil montiranja kasete
      description: Specificira kako se kaseta pričvršćuje na tonearm ili headshell
        (npr. half-inch mount, P-mount), osiguravajući mehaničku kompatibilnost.
    cartridge_type:
      name: Vrsta zvučnice
      description: Utvrđuje tehnologiju zvučnice u gramofonima, kao što je keramička
        ili magnetska
    cartridge_yield_type:
      name: Vrsta prinosa kasete
      description: Označava klasu kapaciteta kasete definiranu od proizvođača (npr.
        standardni, visoki prinos).
    case_color:
      name: Boja kućišta
      description: Određuje boju kućišta proizvoda, poput prozirne ili bijele
    case_pattern:
      name: Uzorak kućišta
      description: Opisuje dizajn ili motiv na kućištu proizvoda, primjerice cvjetni
        ili geometrijski
    case_transparency_level:
      name: Razina transparentnosti kućišta
      description: Označava koliko je kućište prozirno.
    case_type:
      name: Vrsta etuija
      description: Određuje vrstu etuija za elektroničke uređaje i dodatke, primjerice
        u stilu novčanika ili u stilu knjige
    cassette_adapter_type:
      name: Vrsta adaptera za kazetu
      description: Utvrđuje vrstu adaptera za kazetu, npr. iz 3,5 mm audiopriključka
        u kazetu, iz Bluetootha u kazetu
    cat_age_group:
      name: Dobna skupina mačaka
      description: Definira proizvode prikladne za određene životne faze mačaka, npr.
        za mačiće, za starije mačke
    cat_litter_formula:
      name: Sastav pijeska za mačke
      description: Definira sastav pijeska za mačke, poput granula ili gline
    cbd_ingredients:
      name: Sastojci s CBD-om
      description: Utvrđuje konkretne komponente povezane s CBD-om u proizvodu, poput
        CBD-a punog spektra ili zaslađivača
    celebration_type:
      name: Vrsta proslave
      description: Određuje prigodu za koju je proizvod prikladan, poput Božića ili
        mature
    cellular_capability:
      name: Mobilna mogućnost
      description: Označava podržava li model mobilne mreže uz Wi-Fi.
    cervix_height_suitability:
      name: Prikladnost visine cerviksa
      description: Označava za koju visinu cerviksa (npr. nisku, prosječnu, visoku)
        je čašica optimizirana kako bi osigurala pravilno pristajanje.
    chain_link_type:
      name: Vrsta karike lanca
      description: Definira vrstu karike lanca za nakit, poput karike za vez užeta
        ili ravne karike
    chain_type:
      name: Vrsta lanca
      description: Utvrđuje vrstu lanca koji se koristi u dijelovima za plovila, poput
        lanca BBB ili High test (HT)
    chair/sofa_features:
      name: Značajke fotelje/sofe
      description: Utvrđuje jedinstvene karakteristike namještaja za sjedenje, kao
        što je otpornost na mrlje ili električno naginjanje naslona
    chair_features:
      name: Značajke stolice
      description: Ističe posebne funkcije stolice, poput funkcije masaže ili električnog
        naginjanja naslona
    chalkboard_surface:
      name: Površina ploče za pisanje kredom
