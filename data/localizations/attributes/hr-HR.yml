    toaster_features:
      name: Značajke tostera
      description: Navodi posebne funkcije i elemente dizajna dostupne na tosteru.
    tong_type:
      name: Vrsta hvataljki
      description: Određuje primarni stil ili namjeravanu upotrebu hvataljki.
    toothbrush_holder_features:
      name: Karakteristike držača četkica za zube
