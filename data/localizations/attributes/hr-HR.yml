    cover_color:
      name: Boja navlake
      description: Određuje primarnu boju navlake proizvoda, npr. prozirno, tamnoplava
    cover_features:
      name: Značajke navlake
      description: Opisuje posebne karakteristike navlake proizvoda, npr. vodootporno
