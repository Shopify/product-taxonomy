    snow_blower_stage_type:
      name: Vrsta faze puhalice za snijeg
      description: Označava broj faza svrdla/pokretača koje se koriste za pomicanje
        i ispuštanje snijega, primarna specifikacija koja se koristi za razlikovanje
        jednostupanjskih, dvostupanjskih i trostupanjskih strojeva.
    soap_dispenser_operation_type:
      name: Vrsta rada dozatora sapuna
      description: Određuje mehanizam aktivacije koji se koristi za doziranje sapuna
        ili losiona.
    soil_texture:
      name: Tekstura tla
      description: Opisuje prevladavajuću veličinu/sastav čestica tla koje utječu
        na drenažu i aeraciju.
    spa_installation_type:
      name: Vrsta instalacije toplica
      description: Klasificira spa na temelju načina na koji je instaliran ili konfiguriran
        na licu mjesta.
    space_heater_safety_features:
      name: Sigurnosne značajke grijalice za prostorije
      description: Naglašava ugrađene sigurnosne mehanizme koji štite korisnike i
        imovinu.
    spice_organizer_features:
      name: Značajke organizatora za začine
      description: Naglašava posebne funkcionalne karakteristike organizatora za začine.
    spray_pattern:
      name: Obrazac prskanja
      description: Definira vrstu raspršivanja ulja koju proizvodi mlaznica raspršivača.
    sprayer_operation_mechanism:
      name: Mehanizam rada raspršivača
      description: Određuje kako se stvara tlak za ispuštanje ulja iz raspršivača.
    spring_type:
      name: Vrsta opruge
      description: Identificira vrstu opruge koja se koristi u mehanizmu rubnog trimera.
    sprinkle_opening_style:
      name: Stil posipanja
      description: Definira grubost ili stil perforacija/mrežice koja se koristi za
        doziranje kakaa (fina mrežica u odnosu na velike rupe itd.).
    sprinkler_orientation:
      name: Orijentacija prskalice
      description: Označava orijentaciju ugradnje i stil glave protupožarne prskalice.
    sprinkler_response_type:
      name: Vrsta reakcije prskalice
      description: Određuje karakteristiku toplinskog odziva glave prskalice.
    sprinkler_type:
      name: Vrsta prskalice
      description: Klasificira mehaničko djelovanje ili stil distribucije prskalice
        radi lakše usporedbe i filtriranja.
    sprinkler_valve_type:
      name: Vrsta ventila za prskalicu
      description: Definira funkcionalni ili tip aktiviranja ventila prskalice.
    squirrel_feed_type:
      name: Vrsta hrane za vjeverice
      description: Identificira vrste hrane za koje je hranilica namijenjena, osiguravajući
        kompatibilnost s hranom koju vjeverice preferiraju.
    squirrel_resistance:
      name: Otpor na vjeverice
      description: Označava ima li otvorena hranilica značajke osmišljene za odbijanje
        vjeverica od pristupa loju.
    stackability:
      name: Mogućnost slaganja
      description: Označava može li se više jedinica sigurno složiti radi učinkovitog
        skladištenja.
    stackable_design:
      name: Dizajn s mogućnosti slaganja
      description: Označava je li posuda dizajnirana za sigurno slaganje kada je puna
        ili prazna.
    stacking_capability:
      name: Mogućnost slaganja
      description: Određuje može li se posuda slagati, ugniježđivati, sažimati ili
        se ne može slagati s drugim posudama.
    stainless_steel_cleaner_features:
      name: Karakteristike sredstva za čišćenje nehrđajućeg čelika
      description: Određuje posebne karakteristike performansi proizvoda koje su jedinstvene
        ili posebno relevantne za njegu nehrđajućeg čelika.
    staple/pin_shape:
      name: Oblik klamerice/igle
      description: Definira cjelokupni oblik zatvarača, pomažući kupcima da odaberu
        između klamerica u obliku slova U, igla s okruglim vrhom itd.
    staple_coating:
      name: Premaz za klamerice
      description: Opisuje bilo koji zaštitni premaz nanesen na klamericu ili iglu
        radi sprječavanja hrđe ili produljenja vijeka trajanja.
    steam_nozzle_type:
      name: Vrsta parne mlaznice
      description: Identificira funkcionalni stil nastavka mlaznice parnog čistača.
    steam_table_pan_cover_features:
      name: Značajke poklopca za posude za grijaće stolove
      description: Naglašava posebne funkcionalne karakteristike poklopaca za posude
