    lens/slide_material:
      name: Materijal objektiva/poklopca
      description: Označava materijal koji se upotrebljava za izradu objektiva ili
        poklopca objektiva, poput plastike ili stakla
    lens_cap_compatible_device:
      name: Uređaj kompatibilan s poklopcem objektiva
      description: Označava opremu kompatibilnu s poklopcima objektiva, poput monokulara
