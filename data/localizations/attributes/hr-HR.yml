    window_screen_type:
      name: Vrsta mrežice za prozore
      description: Definira strukturni stil ili način rada mrežice.
    window_treatment_lining_type:
      name: Vrsta obloge za prozorske ukrase
      description: Označava je li ukrasni zastor ili karniša obložena i koja se vrsta
        obloge koristi.
    wine_aerator_type:
      name: Vrsta aeratora za vino
      description: Određuje oblik ili način rada vinskog aeratora.
    wine_glass_style:
      name: Stil čaše za vino
      description: Određuje namjeravanu vrstu vina ili dizajn čaše za optimizaciju
        arome i okusa.
    wok_bottom_type:
      name: Vrsta wok dna
      description: Definira oblik wok dna, određujući kompatibilnost s različitim
        pločama za kuhanje i wok prstenovima.
    wood_grain_orientation:
      name: Orijentacija drvenih vlakana
      description: Određuje orijentaciju drvenih vlakana u proizvodu, kao što su čeona
        vlakna, rubna vlakna ili površinska vlakna. Orijentacija zrna utječe na trajnost
        i prikladnost noža.
    wood_seasoning_method:
      name: Metoda sušenja drva
      description: Označava kako je drvo za gorivo sušeno, što utječe na sadržaj vlage
        i kvalitetu izgaranja.
    wrap_format:
      name: Format omota
      description: Određuje fizički oblik u kojem se nalazi omot za hranu, kao što
        su role ili unaprijed izrezani listovi.
    abacus_bead_material:
      name: Materijal za perle abakusa
      description: Primarni materijal perli abakusa.
    abec_rating:
      name: ABEC ocjena
      description: Određuje stupanj preciznosti ležajeva na temelju ABEC ocjena, što
        označava glatkoću i razine tolerancije.
    abrasive_level:
      name: Razina abrazivnosti
      description: Relativna rezna snaga finog/grubljeg sredstva za poliranje na završnim
        obradama automobila.
    absinthe_accessories_included:
      name: Uključeni dodaci za apsint
      description: Pojedinosti o svim dodacima koji dolaze u pakiranju s proizvodom,
        kao što su žlice, čaše ili kocke šećera.
    ac_compressor_mounting_style:
      name: Stil montaže kompresora klime
      description: Opisuje stil mehaničke montaže/pričvršćivanja ili sučelje nosača
        kompresora na motor / sustav pogona kompresora klime.
    ac_compressor_oil_type:
      name: Vrsta ulja za kompresor klima uređaja
      description: Opisuje kemijski sastav ulja za podmazivanje koji kompresor klima
        uređaja zahtijeva ili koristi (uobičajene vrste uključuju PAG i POE).
    accent_modes:
      name: Načini naglašavanja
      description: Određuje kako metronom može naglašavati dobe unutar takta (osim
        ujednačenih otkucaja).
    access_mechanism:
      name: Mehanizam pristupa
      description: Opisuje kako korisnik dolazi do povišene platforme za spavanje.
    accessibility_features:
      name: Značajke pristupačnosti
      description: Navodi opremu i konfiguracije minibusa povezane s pristupačnosti.
    accessories_included:
      name: Uključeni dodaci
      description: Navodi dodatne stavke koje dolaze u paketu sa stolicom (npr. otoman,
        lumbalni jastuk), dajući kupcu jasan pregled dodane vrijednosti.
    accessory_pieces_included:
      name: Uključeni komadi dodataka
      description: Navodi dodatne stavke uključene u višedijelni poklon paket ili
        komplet odjevnih dodataka.
    acoustic_amplifier_feedback_control_features:
      name: Značajke upravljanja povratnom vezom akustičnog pojačala
      description: Označava ugrađene alate protiv povratne veze za akustične instrumente
        (npr. zaporni filtar, fazni prekidač, automatsko uklanjanje mikrofonije).
    acoustic_drum_kit_components_included:
      name: Uključene komponente kompleta akustičnih bubnjeva
      description: Označava koje su glavne komponente uključene u komplet (samo tijelo
        bubnjeva ili potpuni komplet; uključene činele / ostala oprema).
    acoustic_guitar_body_shape:
      name: Oblik tijela akustične gitare
      description: Opisuje oblik/obris tijela akustične gitare, koji utječe na ton,
        udobnost i tipičnu upotrebu.
    acoustic_guitar_string_core_design:
      name: Dizajn jezgre žice akustične gitare
      description: Konstrukcija jezgre omotanih žica.
    acoustic_piano_key_material:
      name: Materijal tipki akustičnog klavira
      description: Određuje primarni materijal koji je upotrijebljen za vrhove tipki
        klavira/bjelokosti.
    acoustic_piano_lid_type:
      name: Tip poklopca za akustični klavir
      description: Određuje stil mehanizma poklopca/zaštite koji se koristi na akustičnom
        klaviru (za razlikovanje između koncertnog klavira i pianina te spuštajućeg
        poklopca za tipke i gornjeg poklopca klavira).
    acoustic_piano_plate_frame_material:
      name: Materijal ploče/okvira akustičnog klavira
      description: Određuje glavni materijal ploče/okvira (sa žicama) klavira, a obično
        je to lijevano željezo.
    acoustic_piano_soundboard_material:
      name: Materijal rezonantne daske akustičnog klavira
      description: Određuje primarni materijal koji je upotrijebljen za rezonantnu
        dasku klavira.
    action_figure_scale:
      name: Skala akcijske figure
      description: Označava mjerilo kolekcionarske figurice (npr. 1:12) za koju je
        dodatak namijenjen.
    action_type:
      name: Vrsta radnje
      description: Opisuje mehanizam za pucanje ili napinjanje oružja (npr. mehanizam
        zatvarača, mehanizam s lomljivom cijevi, mehanizam s polugom).
    actuation_mechanism:
      name: Mehanizam pokretanja
      description: 'Označava kako ručica aktivira kočioni sustav: isključivo mehanički
        kabel, potpuno hidraulički, hidraulički aktiviran kabelom ili elektronički/bežično.'
    actuation_method:
      name: Metoda pokretanja
      description: Kako se sustav za suzbijanje aktivira ili prazni.
    adapter_orientation:
      name: Orijentacija adaptera
      description: Određuje kut ili konfiguraciju adaptera ventila biciklističke gume,
        što utječe na pristup pumpe (npr. ravno, 90°).
    additive_application_stage:
      name: Faza aplikacije aditive
      description: Označava u kojoj je fazi procesa proizvod namijenjen za upotrebu.
    adhesive_backing:
      name: Ljepljiva podloga
      description: Označava ima li svila za otiskivanje ljepljivu podlogu za aplikaciju
        samoljepljivom metodom.
    adhesive_formulation:
      name: Formulacija ljepila
      description: Označava kemijsku bazu ili formulaciju ljepila, kao što je cijanoakrilat
        ili epoksid.
    adhesive_sides:
      name: Ljepljive strane
      description: Označava nalazi li se topljivo ljepilo na jednoj ili obje strane
        trake/mreže.
    adjunct_grain_processing_form:
      name: Oblik prerade nesladnih žitarica
      description: Označava fizički oblik / način prerade zrna nesladne žitarice kakvo
        se prodaje za pivovarstvo (npr. pahuljasto, ekspandirano, sladno, sirovo).
    adjustability_type:
      name: Vrsta prilagodljivosti
      description: Određuje kakvu (ako ikakvu) vrstu prilagođavanja amortizer podržava.
    adjustable_cup_mutes:
      name: Prilagodljivi prigušivači za instrumente
      description: Označava može li se prigušivač prilagoditi/ukloniti i stil prilagođavanja.
    adjustable_zones:
      name: Prilagodljive zone
      description: Označava koji se dijelovi baze mogu neovisno podešavati.
    adjustment_type:
      name: Vrsta prilagodbe
      description: Označava je li regulator prilagodljive i kako se prilagodba izvodi.
    administration_method:
      name: Način primjene
      description: Označava kako se sredstvo protiv glista daje konju (npr. oralno
        ili injekcijom), pomažući kupcu da se pridržava veterinarskih uputa i odabere
        prihvatljivu metodu primjene.
    advice_card_prompt_type:
      name: Vrsta prompta na kartici sa savjetima
      description: Vrsta prompta otisnutog na kartici (ili nedostatak prompta).
    aeration_method:
      name: Metoda prozračivanja
      description: Opisuje vrstu prozračivanja koju spremnik pruža ili podržava, osiguravajući
        dovoljnu količinu kisika za živi mamac.
    aero_package_components:
      name: Komponente aerodinamičnog paketa
      description: Označava koje su ključne aerodinamičke komponente ugrađene na vozilo
        (odaberite sve što je primjenjivo).
    aerodynamic_elements_included:
      name: Uključeni aerodinamički elementi
      description: Određuje koje su aerodinamičke komponente uključene u automobil
        formule (odaberite sve koje se primjenjuju, ako su podržane).
    aftertouch_support:
      name: Podrška efekta aftertouch
      description: Označava podržava li kontroler efekt aftertouch (kanalni ili polifoni)
        na tipkama.
    agave_content_classification:
      name: Klasifikacija sadržaja agave
      description: Označava je li tekila proizvedena od 100% plave agave ili je mješavina
        koja sadrži najmanje 51% agavina šećera.
    aida_cloth_count:
      name: Broj platna aida
      description: Određuje gustoću tkanine Aida (broj kvadrata/uboda po inču), koja
        određuje veličinu boda i mjerilo uzorka.
    aida_cloth_pre_cut_format:
      name: Unaprijed izrezani format platna aida
      description: Označava prodaje li se tkanina Aida kao unaprijed izrezan komad,
        jednolično izrezan s role ili na roli.
    air_bag_material:
      name: Materijal mješine
      description: Određuje materijal mješine/spremnika koji se koristi s velikim
        irskim ratnim gajdama.
    air_bed_internal_construction:
      name: Unutarnja konstrukcija zračnog kreveta
      description: Opisuje unutarnju potpornu strukturu ili tehnologiju koja se koristi
        unutar zračnog kreveta za udobnost i stabilnost.
    air_dry_clay_color_form:
      name: Način bojenja gline koja se suši na zraku
      description: Prodaje li se glina unaprijed obojena, bijela/neutralna za oslikavanje
        ili kao mješavina/komplet.
    air_hockey_items_included:
      name: Uključene stavke za zračni hokej
      description: Navodi specifične dodatke sadržane u kompletu kako bi korisnici
        točno znali što dobivaju (npr. 2 palice, 4 paka, 2 filcane podloge).
    air_intake_temperature_sensor_mounting_style:
      name: Način montaže senzora temperature usisnog zraka
      description: Način fizičke montaže senzora temperature usisnog zraka u usisni
        sustav.
    air_integration_capability:
      name: Mogućnost integracije zraka
      description: Označava podržava li računalo za ronjenje bežične transmitere za
        mjerenje tlaka u boci i kako.
    air_mattress_valve_type:
      name: Vrsta ventila zračnog madraca
      description: Određuje stil ventila kojem pribor odgovara ili koji sadrži, osiguravajući
        kompatibilnost između pumpi, ventila i rezervnih dijelova.
    air_water_rocket_kit_items_included:
      name: Stavke uključene u komplet zračnih i vodenih raketa
      description: Ključne komponente uključene u komplet rakete (lanser, pumpa, krilca,
        dijelovi za punjenje).
    air_water_rocket_launch_method:
      name: Metoda lansiranja zračne i vodene rakete
      description: Kako se raketa stavlja pod pritisak i lansira (interakcija korisnika
        i stil opreme).
    airbag_position:
      name: Položaj zračnog jastuka
      description: Određuje predviđeni položaj/zonu sigurnosnog pojasa koji podržava
        zračni jastuk.
    aircraft_ads_b_capability:
      name: Mogućnost letjelice za ADS-B
      description: Određuje je li zrakoplov opremljen u skladu sa standardom ADS-B
        Out.
    aircraft_airframe_material:
      name: Materijal tijela letjelice
      description: Primarni materijal(i) korišteni u konstrukciji tijela zrakoplova.
    aircraft_cabin_configuration:
      name: Konfiguracija kabine zrakoplova
      description: Određuje izgled kabine zrakoplova (npr. konferencijska grupa, divan,
        kabina s četiri zone).
    aircraft_documentation_included:
      name: Uključena dokumentacija zrakoplova
      description: Navodi koji su dokumenti dostavljeni s dijelom (npr. 8130-3).
    aircraft_galley_configuration:
      name: Konfiguracija kuhinje zrakoplova
      description: Prisutnost i vrsta kuhinje / ugostiteljskih sadržaja u kabini.
    aircraft_installation_location:
      name: Lokacija za postavljanje u zrakoplovu
      description: Gdje se u zrakoplovu ugrađuje ili koristi određeni dio ili dodatak.
    aircraft_internet_connection:
      name: Internetska veza u zrakoplovu
      description: Označava prisutnost/vrstu internetske povezivosti u kabini.
    aircraft_landing_gear_type:
      name: Vrsta podvozja zrakoplova
      description: Određuje konfiguraciju podvozja žirokoptera.
    aircraft_lavatory_configuration:
      name: Konfiguracija toaleta u zrakoplovu
      description: Vrsta konfiguracije ugrađenih toaleta.
    aircraft_maintenance_program_enrollment:
      name: Upis u program održavanja zrakoplova
      description: Označava je li zrakoplov upisan u program održavanja motora i/ili
        tijela zrakoplova, a ako jest, koja se vrsta pokrića primjenjuje (motor, tijelo
        ili oboje).
    aircraft_operational_certification:
      name: Operativna certifikacija zrakoplova
      description: Određuje regulatornu ili operativnu certifikacijsku osnovu pod
        kojom se zrakoplov koristi (ovisno o jurisdikciji, npr. FAA dio 91/135/121,
        EASA AOC).
    aircraft_protective_gear_certification:
      name: Certifikacija zrakoplovne zaštitne opreme
      description: Određuje zrakoplovni/regulatorni ili industrijski standard koji
        zaštitna oprema prema dodijeljenom certifikatu zadovoljava.
    aircraft_system_application:
      name: Primjena zrakoplovnog sustava
      description: Određuje kojem zrakoplovnom sustavu ili području dio/dodatak pripada
        (upotrebljava se za pregledavanje i filtriranje različitih dijelova zrakoplova).
    airflow_resistance_level:
      name: Razina otpora zraka
      description: Označava koliki je prigušivač restriktivan u smislu povratnog tlaka
        /otpora zraka.
    airship_envelope_material:
      name: Materijal ovojnice zračnog broda
      description: Primarni materijal ovojnice zračnog broda.
    airsoft_part_type:
      name: Vrsta dijela za airsoft
      description: Označava vrstu funkcionalne komponente ili pribora za airsoft oružje
        (npr. spremnik, cijev, rukohvat).
    airworthiness_approval_basis:
      name: Osnova za odobrenje plovidbenosti
      description: Specificira osnovu odobrenja/certifikacije za pojedini dio gdje
        je primjenjivo (npr. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Podesivost glasnoće alarma
      description: Označava može li korisnik prilagoditi glasnoću alarma i kako.
    alcohol_ink_finish_effect:
      name: Efekt završne obrade alkoholnom tintom
      description: Opisuje vizualni efekt / završnu obradu koju proizvodi formulacija
        alkoholne tinte (osim same boje), kao što je metalik ili sedefasti sjaj.
    alignment_aid_style:
      name: Stil pomoćnih oznaka za poravnanje
      description: Opisuje vrstu oznaka za poravnanje otisnutih ili ugrađenih na površinu
        podloge (npr. ravna linija, oznake udaljenosti).
    alternator_cooling_type:
      name: Način hlađenja alternatora
      description: Opisuje kako se alternator hladi i ventilira.
    alternator_marine_ignition_protection_rating:
      name: Ocjena zaštite brodskog alternatora od zapaljenja
      description: Označava je li alternator zaštićen od zapaljenja za odjeljke brodskog
        motora (npr. usklađen s normama SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Konfiguracija montaže alternatora
      description: Opisuje konfiguraciju fizičke montaže koja se koristi za pričvršćivanje
        alternatora na nosač motora.
    alternator_pulley_type:
      name: Vrsta remenice alternatora
      description: Označava dizajn remenice/spojnice na alternatoru (ili označava
        da remenica nije uključena).
    alternator_regulator_type:
      name: Vrsta regulatora alternatora
      description: Označava je li regler alternatora unutarnji ili vanjski te upravlja
        li njime proizvođač originalne opreme (upravljano računalom / upravljačkim
        modulom pogona).
    alternator_terminal_connection_type:
      name: Vrsta priključka terminala alternatora
      description: Primarni električni Veza tip za izlaz alternatora/pobudni terminal
        kako bi se osigurala kompatibilnost kabelskog svežnja.
    altitude_suitability:
      name: Prikladnost za nadmorsku visinu
      description: Označava je li lopta konstruirana za određene uvjete nadmorske
        visine koji utječu na brzinu i odskok.
    ambulance_stretcher_mount_type:
      name: Način postavljanja nosila u vozilu hitne pomoći
      description: Određuje vrstu sustava za utovar/postavljanje nosila koju podržava
        vozilo hitne pomoći.
    american_football_safety_certification:
      name: Certifikat o sigurnosti američkog nogometa
      description: Označava sigurnosne certifikate ili standarde specifične za američki
        nogomet koje proizvod zadovoljava.
    amplifier_tube_function:
      name: Funkcija cijevi pojačala
      description: Određuje funkcionalnu ulogu cijevi unutar sklopa instrumentalnog
        pojačala (npr. cijevi pretpojačala ili izlazne cijevi).
    analog_synthesizer_cv_gate_i_o:
      name: Kontrolni napon i priključci (Gate I/O) analognog sintesajzera
      description: Označava vrste kontrolnog napona i upravljačkih priključaka podržanih
        za integraciju s modularnom/analognom opremom.
    analog_synthesizer_keybed_configuration:
      name: Konfiguracija klavijature analognog sintesajzera
      description: Opisuje ima li sintesajzer ugrađenu klavijaturu i, ako ima, njezin
        broj tipki.
    anchor_configuration:
      name: Konfiguracija sidra
      description: Označava upotrebljava li suspenzijski sustav jednu centraliziranu
        sidrišnu točku ili više neovisnih sidrišnih točaka, što utječe na raznolikost
        vježbi i složenost postavljanja.
    animal_raising_method:
      name: Metoda uzgoja životinje
      description: Opisuje poljoprivredne ili stočarske prakse koje se koriste za
        životinju od koje potječe meso.
    animal_species:
      name: Životinjske vrste
      description: Opisuje životinju ili stvorenje koje plišana igračka predstavlja
        (npr. medvjed, zeko, dinosaur).
    animal_trap_jaw_style:
      name: Stil čeljusti zamke za životinje
      description: Konfiguracija čeljusti zamke koja utječe na snagu držanja i dobrobit
        životinja.
    animal_trap_type:
      name: Vrsta zamke za životinje
      description: Klasificira mehanički stil/dizajn zamke, što omogućava kupcu da
        brzo pronađe točnu metodu hvatanja koja mu je potrebna ili koja je dozvoljena
        prema propisima.
    ankle_collar_style:
      name: Stil ruba oko gležnja
      description: Opisuje stil ili konstrukciju ruba oko gležnja tenisice, kao što
        je niski rez, srednji rez, visoki rez, čarapasti ovratnik ili bez vezica,
        što utječe na stabilnost, pristajanje i estetiku.
    ankle_guard_protection_level:
      name: Razina zaštite štitnika za gležnjeve
      description: Ocjenjuje ukupnu količinu zaštite od udaraca koju pruža štitnik
        za gležanj.
    ankle_strap_padding_type:
      name: Vrsta podstave remena za gležanj
      description: Opisuje materijal jastučića ili podstave u remenu kojii utječe
        na udobnost.
    ankle_strap_type:
      name: Vrsta remena za gležanj
      description: Klasificira konstrukciju ili dizajn remena za vezove za gležanj
        za snowboard.
    ant_farm_habitat_medium_type:
      name: Vrsta medija staništa farme mrava
      description: Određuje primarni medij za promatranje koji farma mrava pruža ili
        zahtijeva.
    ant_farm_kit_contents:
      name: Sadržaj kompleta farme mrava
      description: Identificira koje su komponente uključene u komplet farme mrava
        (npr. spremnik staništa, pijesak/gel, vaučer za mrave, alati za hranjenje).
    ant_farm_lighting_type:
      name: Vrsta rasvjete za farmu mrava
      description: Određuje vrstu ugrađene rasvjete/osvjetljenja (ako postoji) koja
        se upotrebljava za promatranje.
    antenna_fit_type:
      name: Vrsta primjene antene
      description: Za koji je oblik antene lopta za antenu namijenjena.
    anti_caking_agent:
      name: Tvar protiv zgrudnjavanja
      description: Navodi vrstu sredstva protiv zgrudnjavanja koje se dodaje radi
        sprječavanja zgrudnjavanja, informacije koje su važne za razmatranje alergija
        i preciznost recepta.
    anti_g_suit_bladder_material:
      name: Materijal zračne komore antigravitacijskog odijela
      description: Materijal korišten za unutarnje napuhane komore u antigravitacijskom
        odijelu; navedite sve što se primjenjuje ako je upotrijebljeno više materijala.
    anti_g_suit_connector_type:
      name: Vrsta priključka antigravitacijskog odijela
      description: Određuje stil/standard pneumatskog priključka za zrak/tlak koji
        se upotrebljava za povezivanje sa zrakoplovom ili regulatorom.
    anti_g_suit_inflation_method:
      name: Metoda napuhavanja antigravitacijskog odijela
      description: Označava kako se komore odijela stavljaju pod pritisak kako bi
        se osigurala zaštita od gravitacijske sile.
    anti_g_suit_size_system:
      name: Sustav veličina antigravitacijskog odijela
      description: Standard veličine koji se koristi za određivanje veličine/pristajanja
        odijela.
    anti_reverse_type:
      name: Vrsta mehanizma protiv povratnog hoda
      description: Određuje vrstu mehanizma za sprječavanje povratnog hoda, koji utječe
        na zakačenje udice i kontrolirani povratni hod.
    anti_theft_feature:
      name: Značajka zaštite od krađe
      description: Označava pruža li nosač/držač zaštitu od krađe, kao što su zatvarači
        za zaključavanja ili dizajn otporan na neovlašteno otvaranje.
    antique_gun_ignition_system:
      name: Sustav paljenja starinskog vatrenog oružja
      description: Određuje povijesni sustav paljenja/pucanja starinskog vatrenog
        oružja.
    apple_variety:
      name: Sorta jabuka
      description: Određuje sortu ili vrstu jabuke (npr. Gala, Fuji, Granny Smith),
        što korisnicima pomaže u odabiru na temelju okusa, teksture i kulinarske upotrebe.
    applique_edge_finish:
      name: Završna obrada ruba aplikacije
      description: Opisuje završnu obradu rubova, što utječe na izgled i otpornost
        na habanje.
    arbor_type:
      name: Vrsta jezgre špule
      description: Klasificira rolu prema dizajnu središnjeg dijela špule, što utječe
        na brzinu namotavanja strune, kapacitet pomoćne strune i memoriju strune.
    archery_accessory_type:
      name: Vrsta dodatka za streličarstvo
      description: Određuje vrstu dodatka namijenjenog za alate za streličarstvo kako
        bi kupci mogli brzo filtrirati proizvode.
    archery_part_type:
      name: Vrsta dijela za streličarstvo
      description: Identificira određeni metalni ili zamjenski dio koji se prodaje
        (npr. drška, krak, tetiva), omogućujući precizno filtriranje bez raspadanja
        slijeda kategorija.
    archery_range_accessory_type:
      name: Vrsta dodatka za streličarski poligon
      description: Klasificira specifičnu vrstu pribora koji se koristi na streljani,
        što kupcu omogućava brzo filtriranje za pronalazak specifične stavke koja
        mu je potrebna.
    archery_target_features:
      name: Značajke mete za streličarstvo
      description: Navodi specifične značajke performansi ili praktičnosti koje nisu
        obuhvaćene drugim atributima (npr. samozacjeljujuća pjena, transportna ručka).
    archery_tool_type:
      name: Vrsta alata za streličarstvo
      description: Klasificira specifičnu vrstu alata ili opreme za streličarstvo.
    armband_features:
      name: Značajke trake za ruku
      description: Navodi posebne funkcionalne ili vizualne značajke koje poboljšavaju
        traku za ruku.
    armguard_style:
      name: Stil štitnika za ruku
      description: Definira stil konstrukcije ili oblik štitnika za ruku, pružajući
        uvid u površinu dizajna i tradicionalni naspram modernog izgleda.
    armor_protection_type:
      name: Vrsta oklopne zaštite
      description: Vrsta zaštite koju pruža oklopni sustav vozila.
    armrest_adjustability:
      name: Podesivost naslona za ruke
      description: Definira dimenzijsku prilagodljivost i konfiguraciju naslona za
        ruke stolice (npr. fiksni, 2D, 3D, sklopivi).
    armrest_type:
      name: Vrsta naslona za ruke
      description: Opisuje prisutnost i mogućnost prilagođavanja naslona za ruke na
        stolici (npr. bez naslona za ruke, fiksni, prilagodljivi, uklonjivi).
    arrow_bolt_point_type:
      name: Vrsta vrha strijele / strijele za samostrel
      description: Definira stil vrha ili vrška ugrađenog na strijelu.
    arrow_component_type:
      name: Vrsta komponente za strijelu
      description: Klasificira određeni dio ili dodatak za strijelu (umetak, omotač,
        čahura, ljepilo itd.) tako da korisnici mogu filtrirati stavke bez potrebe
        za desecima dodatnih potkategorija.
    arrow_containment_level:
      name: Razina obuhvaćanja strijele
      description: Opisuje obuhvaća li oslonac strijelu u potpunosti, djelomično ili
        nimalo.
    arrow_fletching_orientation:
      name: Orijentacija perja strijele
      description: Određuje spiralnu ili pomaknutu orijentaciju perja (npr. lijevo
        uvijeno, desno uvijeno, spiralno) koja određuje smjer rotacije strelice.
    arrow_nock_groove_size:
      name: Veličina noka za strijele
      description: Određuje klasifikaciju veličine utora/grla noka, određujući kompatibilnost
        s različitim promjerima tetive.
    arrow_nock_type:
      name: Vrsta noka strijele
      description: Dizajn/stil noka strijele koji se povezuje s tetivom.
    arrow_rest_style:
      name: Stil oslonca za strijele
      description: Određuje funkcionalni stil/mehanizam držača strijele (npr. padajući,
        oštrica, četkasti). Stil određuje kako oslonac podržava, obuhvaća i otpušta
        strelicu te je primarni način razlikovanja proizvoda.
    arrow_shaft_compatibility:
      name: Kompatibilnost osovine za strijele
      description: Označava standard osovine/čahure strijele kojem odgovara osvijetljeni
        nok (npr. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Stil vrha alata za umjetnost/rukotvorine
      description: Opisuje oblik/profil radnog vrha (npr. šiljasti ili zaobljeni)
        kako bi se naznačila vrsta graviranja koju proizvodi.
    art_ink_lightfastness_rating:
      name: Ocjena svjetlosne postojanosti umjetničke tinte
      description: Označava otpornost tinte na blijeđenje pri izlaganju svjetlosti,
        obično izraženu standardnim ocjenama.
    art_ink_opacity:
      name: Neprozirnost umjetničke tinte
      description: Određuje razinu pokrivenosti tinte nakon nanošenja.
    art_security_rating:
      name: ART sigurnosna ocjena
      description: Određuje nizozemsku ART ocjenu zvjezdicama (1 – 5 zvjezdica) kojom
        je lokot ocijenjen.
    artichoke_cut:
      name: Rez artičoke
      description: Označava koji se dio ili pripravak artičoke nudi (npr. cijela,
        srce, donji dio), kako bi korisnici razumjeli vrstu ploda i namjeravanu kulinarsku
        primjenu.
    artichoke_variety:
      name: Sorta artičoke
      description: Označava kultivar ili botaničku sortu artičoke kako bi se lakše
        razlikovale veličine, boje, okusi i kulinarske upotrebe.
    articulation_features:
      name: Značajke artikulacije
      description: Označava ima li model dinosaura pokretne dijelove (pokretnu čeljust,
        udove, rep) i općenitu mogućnost promjene položaja.
    artificial_bait_form:
      name: Oblik umjetnog mamca
      description: Označava fizički oblik ili stil prezentacije mamca za ribolov.
    asa_mounting_type:
      name: Vrsta postavljanja ASA-e
      description: Označava stil sučelja ili standarda montaže ASA adaptera primjenjivog
        na pištolj drop forwards (npr. lastin rep, šina, izravna montaža).
    ascender_descender_type:
      name: Vrsta penjača/spuštača
      description: Klasificira stil penjača ili spuštača za preciznije filtriranje.
    aspiration_type:
      name: Vrsta usisavanja zraka
      description: Označava kako motor usisava zrak.
    assembly_state:
      name: Potreba za sastavljanjem
      description: Označava dostavlja li se ormar spreman za sastavljanje, prethodno
        sastavljen ili u nekom drugom obliku.
    assistance_mechanism:
      name: Mehanizam asistencije
      description: Navodi bilo koji ugrađeni sustav asistencije ili otpora koji multifunkcionalna
        sprava (power tower) pruža za zgibove, propadanja ili druge vježbe.
    atemoya_cultivar:
      name: Kultivar atemoye
      description: Određuje imenovani kultivar/sortu ploda atemoye, što kupcu omogućuje
        odabir plodova željenog okusa, veličine ili karakteristika sjemenki.
    athletic_cup_size:
      name: Veličina štitnika za genitalije
      description: Označava veličinu štitnika koju je naveo proizvođač kako bi se
        osiguralo da će sportašu ispravno pristajati.
    attachment_position:
      name: Položaj pričvršćivanja
      description: Određuje gdje bi se na sedlo ili jahača torba trebala pričvrstiti.
    attractant_scent_profile:
      name: Profil mirisa privlačne tvari
      description: Opisuje specifičan miris ili okus koji se koristi za privlačenje
        divljih životinja ili prikrivanje ljudskog mirisa.
    atv_utv_intended_use:
      name: Namijenjena uporaba za ATV/UTV vozila
      description: Primarna namjena/stil ATV ili UTV vozila.
    audio_channel_configuration:
      name: Konfiguracija audio kanala
      description: Broj odvojenih audio kanala koje podržava ekvilizator/DSP (npr.
        dvokanalni stereo, četverokanalni za prednje i stražnje zvučnike, šestokanalni).
    audio_inputs:
      name: Audio ulazi
      description: Određuje vrste ulaznih audiopriključaka dostupnih za uzorkovanje/snimanje
        (npr. 6,35 mm linijski, XLR, 3,5 mm, mikrofonsko pretpojačalo, phono).
    audio_output:
      name: Audio izlaz
      description: Označava proizvodi li igračka zvuk i kako se zvuk isporučuje.
    audio_outputs:
      name: Audio izlazi
      description: Navodi dostupne izlazne veze, uključujući glavne izlaze i sve dodijelive/pomoćne
        izlaze.
    audio_playback_source:
      name: Izvor reprodukcije glazbe
      description: Primarni izvor medijskih sadržaja iz kojih set za karaoke može
        reproducirati glazbu.
    autograph_authentication:
      name: Autentifikacija autograma
      description: Označava status/vrstu autentifikacije za autogram na sličici.
    autograph_format:
      name: Format autograma
      description: Opisuje je li potpis originalni rukom potpisani autogram, otisnuti/pečatirani
        faksimil ili posveta/dodatak.
    autogyro_cockpit_enclosure:
      name: Zatvorenost pilotske kabine žirokoptera
      description: Označava je li pilotska kabina otvorena ili zatvorena.
    available_firing_modes:
      name: Dostupni načini pucanja
      description: Navodi mogućnosti načina pucanja koje marker tvornički podržava.
    avocado_variety:
      name: Sorta avokada
      description: Označava kultivar ili sortu avokada, što omogućava kupcima da prepoznaju
        razlike u okusu, teksturi, veličini i sadržaju ulja.
    award_customization_included:
      name: Uključena prilagodba nagrade
      description: Označava kakva je personalizacija/prilagodba uključena u kupnju
        nagrade.
    award_material:
      name: Materijal nagrade
      description: Identificira primarni materijal (ili materijale) određene vrste
        nagrade (trofej, plaketa, medalja, značka, dijelovi vrpce).
    award_mounting_display_type:
      name: Način postavljanja/izlaganja nagrade
      description: Određuje kako bi se nagrada trebala izložiti ili postaviti (na
        zidu, na stolu ili na tijelu).
    award_plaque_plate_material:
      name: Materijal nagradne plakete
      description: Određuje materijal pločice s imenom /pločice za graviranje pričvršćene
        na plaketu (razlikuje se od materijala podloge).
    award_ribbon_attachment_type:
      name: Vrsta pričvršćivanja nagradne vrpce
      description: Navodi kako bi se vrpca trebala pričvrstiti ili nositi.
    award_ribbon_imprint_method:
      name: Metoda otiska nagradne vrpce
      description: Opisuje kako se na vrpcu nanosi tekst/grafika.
    award_ribbon_material:
      name: Materijal nagradne vrpce
      description: Primarni materijal tkanine vrpce (npr. saten, poliester).
    award_ribbon_placement_title:
      name: Plasman/titula nagradne vrpce
      description: Standardni plasman ili titula koju vrpca označava (npr. 1. mjesto,
        sudionik).
    axle_compatibility:
      name: Kompatibilnost osovina
      description: Označava standard osovine koju kotač prihvaća, osiguravajući kompatibilnost
        s okvirom i vilicom bicikla.
    back_beam_type:
      name: Vrsta osnovinog valjka
      description: Vrsta/prilagodljivost osnovinog valjka (npr. običan ili prilagodljive
        visine).
    back_design:
      name: Dizajn leđa
      description: Označava značajne konstrukcije leđa na odjevnim predmetima koje
        utječu na stil i potporu.
    back_panel_type:
      name: Vrsta stražnje ploče
      description: Označava stil ili materijal stražnje ploče ormarića, što utječe
        na vidljivost predmeta i usklađivanje dekora.
    back_sides_material:
      name: Materijal za leđa i bokove
      description: Određuje materijal koji se koristi za stražnju stranu i bočne strane
        tijela klasične gitare.
    backing_type:
      name: Vrsta poleđine
      description: Opisuje stil podloge/pričvršćivanja kamenčića koji se prodaje (za
        samoljepljive proizvode).
    backup_camera_mounting_location:
      name: Lokacija za postavljanje kamere za vožnju unatrag
      description: Označava predviđeno mjesto za postavljanje kamere za vožnju unatrag.
    backup_camera_video_interface:
      name: Video sučelje kamere za vožnju unatrag
      description: Određuje video izlaz / sučelje / mehanizam sinkronizacije koji
        sigurnosna kopija kamere koristi za spajanje na monitor, DVR ili glavnu jedinicu
        (npr. kompozitni RCA, LVDS OEM, IP preko Etherneta).
    badminton_set_components_included:
      name: Uključene komponente kompleta za badminton
      description: Navodi pojedinačne stavke koje se dobivaju s kompletom za badminton.
    bag_attachment_method:
      name: Način pričvršćivanja mijeha
      description: Označava primarnu metodu pričvršćivanja hidratacijske vrećice/držača
        na drugu opremu (npr. MOLLE traka, omča za remen, karabiner).
    bag_case_carrying_style:
      name: Stil nošenja koncertne torbe/kofera
      description: Opisuje primarni faktor oblika nošenja kofera/torbe (kako bi je
        se trebalo nositi).
    bag_cover_material:
      name: Materijal navlake za mijeh
      description: Određuje materijal navlake torbe (vanjska navlaka), što utječe
        na trajnost, hvat i izgled.
    bag_embellishment:
      name: Ukrasi na torbi
      description: Opisuje istaknute ukrasne elemente nanesene na vanjski dio torbe,
        kao što su rese, nitne ili prošivene ukrase.
    bag_fill_medium:
      name: Medij ispuna vreće
      description: Opisuje tvar korištenu za punjenje ili stvaranje pritiska u vreći
        (npr. zrak, voda, pijesak).
    bag_material:
      name: Materijal mijeha
      description: Materijal mijeha instrumenta.
    bag_padding_level:
      name: Razina podstavljenosti torbe
      description: Određuje stupanj ili stil podstave ugrađene u torbu ili navlaku.
    bag_size_descriptor:
      name: Opis veličine torbe
      description: Marketinška klasa veličine vrećaste torbe (npr. mini, velika) koja
        nadopunjuje točne dimenzije.
    bagel_size:
      name: Veličina peciva bagel
      description: Određuje opću veličinu peciva, npr. mini, tanko, standardno, veliko,
        ekstra veliko ili jumbo.
    bagpipe_accessories_included:
      name: Uključeni dodaci za gajde
      description: Navodi glavne komponente/dodatke koji se dobivaju s gajdama (osim
        osnovnih cijevi), na primjer kofer, sviraljka za vježbanje, navlaka, ukrasne
        rese, kontrola vlage.
    bagpipes_playing_mode:
      name: Način sviranja gajdi
      description: Kako se instrument puni zrakom tijekom sviranja.
    bait_compatibility:
      name: Kompatibilnost mamaca
      description: Navodi vrste mamaca za koje je pribor za pelete dizajniran, što
        ribolovcima pomaže da osiguraju da odabrani alat odgovara njihovom željenom
        mamcu.
    bait_species:
      name: Vrste mamaca
      description: Navodi primarni organizam koji se nudi kao mamac, pomažući ribolovcima
        da osiguraju usklađenost sa zakonom i učinkovitost za ciljane vrste.
    baking_chip_form:
      name: Oblik čokoladnih komadića za pečenje
      description: Opisuje fizičku veličinu ili oblik komadića, koji utječu na mogućnost
        topljenja i izgled recepta.
    balance_board_style:
      name: Stil ploče za ravnotežu
      description: Klasificira ploče za ravnotežu prema mehanizmu ili stilu konstrukcije
        za objašnjenje načina na koji se ploča kreće i izazova treninga koji pruža.
    balance_cushion_accessories_included:
      name: Uključeni dodaci za jastuk za ravnotežu
      description: Navodi svu dodatnu opremu koja dolazi s jastukom, što omogućuje
        kupcima usporedbu vrijednosti paketa.
    balance_type:
      name: Vrsta balansiranja
      description: Označava stanje/klasu balansiranja pogonske osovine kako je prodana
        (npr. tvornički balansirana, balansirana velikom brzinom, nebalansirana).
    ball_bladder_material:
      name: Materijal mjehura lopte
      description: Označava materijal korišten za unutarnji mjehur rukometne lopte,
        koji utječe na zadržavanje zraka, odskok i ukupnu izdržljivost.
    ball_certification:
      name: Certifikacija lopte
      description: Označava službene certifikate ili odobrenje performansi koje je
        lopta primila.
    ball_construction:
      name: Konstrukcija lopte
      description: Označava metodu proizvodnje koja se koristi za spajanje panela
        lopte, što utječe na trajnost, dodir, upijanje vode i cijenu.
    ball_core_construction:
      name: Konstrukcija jezgre lopte
      description: informacije o unutarnjoj građi lopte koja utječe na odskok i osjećaj.
    ball_core_type:
      name: Vrsta jezgre lopte
      description: Označava unutarnju konstrukciju lopte koja utječe na odskok i raspodjelu
        težine.
    ball_cup_game_included_pieces:
      name: Uključeni dijelovi u igri s čašama i lopticom
      description: Navodi koje su komponente uključene u paket proizvoda za igru s
        čašama i lopticom.
    ball_drilling_state:
      name: Stanje izbušenih rupa
      description: Označava jesu li u kugli izbušene rupe za prste i, ako jesu, u
        kojoj mjeri.
    ball_holder_type:
      name: Vrsta držača za lopticu
      description: Označava strukturni stil ili oblik držača za lopticu.
    ball_pit_ball_surface_finish:
      name: Završna obrada površine loptice za bazen s lopticama
      description: Opisuje taktilnu/vizualnu završnu obradu površine loptice, koja
        utječe na hvat, osjećaj pri igranju i čišćenje.
    ball_pit_safety_features:
      name: Sigurnosne značajke bazena s lopticama
      description: Sigurnosne značajke dizajna relevantne za bazene s lopticama.
    ball_pump_accessory_type:
      name: Vrsta pribora za pumpu za loptu
      description: Definira specifičnu vrstu pribora za pumpu za loptu kako bi trgovci
        mogli označiti mjerače tlaka, crijeva, maziva i ostale dodatke unutar jedne
        nadređene kategorije.
    ball_return_mechanism:
      name: Mehanizam za vraćanje lopte
      description: Određuje stil vraćanja lopte uključen u podlogu, ako postoji.
    ball_return_type:
      name: Vrsta povrata kugli
      description: Vrsta sustava za povratak kugli koji prikuplja kugle tijekom igre.
    ball_speed_rating:
      name: Ocjena brzine loptice
      description: Kategorija brzine koju je naveo proizvođač, a koja označava koliko
        brzo loptica igra pod standardnim uvjetima.
    ball_surface_texture:
      name: Tekstura površine lopte
      description: Opisuje vanjsku teksturu ili uzorak pruga na lopticama, što može
        utjecati na prianjanje i estetiku.
    ball_surface_type:
      name: Vrsta površine lopte
      description: Opisuje vanjski završni sloj ili amortizaciju lopte za označavanje
        osjećaja pri udarcu i prianjanja.
    ballonet_configuration:
      name: Konfiguracija unutarnjeg zračnog jastuka
      description: Vrsta/konfiguracija sustava unutarnjeg zračnog jastuka koji se
        koristi za upravljanje trimom i tlakom (za meke/polukrute zračne brodove).
    balloon_closure_valve_type:
      name: Vrsta zatvarača/ventila balona
      description: Označava kako je balon zatvoren nakon napuhavanja (npr. vezicom,
        samozatvarajućim ventilom).
    balloon_kit_finish:
      name: Završna obrada balona iz kompleta
      description: Opisuje površinsku/vizualnu završnu obradu balona uključenih u
        komplet.
    balloon_kit_material:
