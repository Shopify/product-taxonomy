    cosmetic_function:
      name: Funkcija kozmetičkog proizvoda
      description: Definira kakvu bi korist ili učinak kozmetički proizvod trebao
        donijeti korisniku, npr. umirujući proizvod, ljekoviti proizvod
    cosmetic_set_type:
      name: Tip kozmetičkog seta
      description: Klasificira set prema njegovom primarnom fokusu ili temi.
    costume_theme:
      name: Tema kostima
      description: Utvrđuje glavnu temu ili koncept kostima, poput horora ili fantastike
    cotton_ball_size:
