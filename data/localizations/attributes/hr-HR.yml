      description: Ističe razvojne koristi koje donosi proizvod, kao što je jezično-govorni
        razvoj ili emocionalni i društveni razvoj
    device_interface:
      name: Sučelje uređaja
      description: Određuje način povezivanja elektroničkih uređaja, npr. HDMI, USB
    device_technology:
      name: Tehnologija uređaja
      description: Opisuje vrstu tehnologije u alatima, poput digitalne ili analogne
    dexterity_skills:
