      name: Kompatibilne vježbe
      description: Određuje vježbe koje se mogu izvoditi uz korištenje proizvoda,
        kao što su zgibovi ili propadanja
    compatible_eyewear_type:
      name: Kompatibilan tip naočala
      description: Identificira vrstu naočala za koju je dodatak dizajniran da pristaje
        ili radi.
    compatible_filament:
      name: Kompatibilni filament
      description: Određuje vrste filamenata koje se mogu upotrebljavati u 3D pisač,
        poput filamenta od polilaktične kiseline (PLA) ili najlona
    compatible_film_type:
      name: Kompatibilna vrsta filma
      description: Utvrđuje vrstu filma koji se može upotrebljavati u fotoaparatu,
        poput negativ filma ili filma u boji
    compatible_flute_type:
      name: Kompatibilna vrsta flaute
      description: Utvrđuje s kojom je vrstom flaute proizvod kompatibilan, npr. univerzalni
        proizvod, proizvod kompatibilan s pikolo flautom
    compatible_game_format:
      name: Kompatibilan format igre
      description: Određuje vrstu podržanog formata igre, kao što je samo digitalno
        preuzimanje ili fizički disk
    compatible_gardening_tool:
      name: Kompatibilan vrtlarski alat
      description: Određuje s kojim se vrtlarskim alatima proizvod može upotrebljavati,
        primjerice s grabljama ili s lopatom
    compatible_hair_color:
      name: Kompatibilna boja kose
      description: Uparuje proizvode s određenim bojama kose, npr. srebrna, plava
    compatible_hammock_design:
      name: Kompatibilan dizajn viseće mreže
      description: Određuje vrstu viseće mreže s kojom je proizvod kompatibilan, npr.
        mreža za vješanje, mreža s okvirom
    compatible_harmonica_type:
      name: Kompatibilna vrsta harmonike
      description: Utvrđuje vrstu harmonike za koju je proizvod osmišljen, poput dijatonske
        ili kromatske
    compatible_hdcp:
      name: Kompatibilni HDCP
      description: Određuje je li uređaj kompatibilan s HDCP-om i, ako je, s kojom
        inačicom, npr. HDCP 2.2 ili nije kompatibilan
    compatible_instrument:
      name: Kompatibilno glazbalo
      description: Utvrđuje glazbalo za koje je proizvod osmišljen, poput gitare ili
        klavira
    compatible_keyboard_configuration:
      name: Kompatibilna konfiguracija klavijature
      description: Utvrđuje konfiguraciju klavijature koja je kompatibilna s proizvodom,
        poput klavijature sa 61 tipkom ili sa 76 tipki
    compatible_lock_type:
      name: Kompatibilna vrsta brave
      description: Utvrđuje vrste brava s kojima se proizvod može upotrebljavati,
        kao što je kombinirana brava ili električna
    compatible_makeup:
      name: Kompatibilna šminka
      description: Određuje kompatibilne proizvode za šminkanje, npr. ruž za usne,
        sjenilo
    compatible_mattress_size:
      name: Kompatibilna veličina madraca
      description: Određuje veličinu madraca koja odgovara proizvodu; npr. kraljevska
        veličina madraca, madrac za odvojeni krevet
    compatible_memory_cards:
      name: Kompatibilne memorijske kartice
      description: Utvrđuje vrste memorijskih kartica koje se mogu upotrebljavati
        s proizvodom, obično za fotoaparate; npr. SD, microSDHC
    compatible_microphone_thread:
      name: Kompatibilni navoj mikrofona
      description: Određuje kompatibilnu veličinu navoja za mikrofone, npr. 5/8"-27
    compatible_motherboard_form_factor:
      name: Kompatibilni format hardvera matične ploče
      description: Određuje koje veličine matične ploče proizvod može podržati, kao
        što je ATX
    compatible_oboe_type:
      name: Kompatibilna vrsta oboe
      description: Utvrđuje za koju je vrstu oboe proizvod osmišljen, kao što je univerzalni
        proizvod ili proizvod za engleski rog
    compatible_operating_system:
      name: Kompatibilni operativni sustav
      description: Definira softversku kompatibilnost proizvoda, npr. Windows, macOS
    compatible_orchestral_string_instrument:
      name: Kompatibilno orkestralno žičano glazbalo
      description: Utvrđuje za koje je orkestralno žičano glazbalo proizvod osmišljen,
        poput violine ili violončela
    compatible_paper_size:
      name: Kompatibilna veličina papira
      description: Određuje veličine papira koje stanu u uređaj , obično za pisače;
        npr. A4, postcard
    compatible_patient_profile:
      name: Kompatibilan profil pacijenta
      description: Utvrđuje kojoj je skupini pacijenata namijenjen medicinski proizvod,
        kao što je pedijatrijska ili gerijatrijska skupina
    compatible_percussion_instrument:
      name: Kompatibilne udaraljke
      description: Utvrđuje s kojim se udaraljkama proizvod može upotrebljavati, poput
        s bubnjem ili bongo bubnjem
    compatible_pinball_machine_edition:
      name: Kompatibilna edicija flipera
      description: Određuje kojoj ediciji ili razini opreme flipera odgovara dodatak
        (npr. Pro, Premium, LE).
    compatible_play_vehicle_type:
      name: Kompatibilna vrsta igračke vozila
      description: Utvrđuje vrstu igračke vozila za koju je proizvod prikladan, poput
        automobila ili čamca
    compatible_player:
      name: Kompatibilni uređaj za reprodukciju
      description: Utvrđuje koji se uređaji mogu upotrebljavati s adapterom za kazetu,
        npr. iPad, prijenosno računalo
    compatible_polish_thinner_type:
      name: Kompatibilan tip razrjeđivača laka
      description: Označava sustave premaza za nokte s kojima je razrjeđivač dizajniran
        da radi.
    compatible_power_supply_form_factor:
      name: Kompatibilan oblik napajanja
      description: Specificira veličinu jedinice napajanja (PSU) ili standard koji
        je kućište dizajnirano da primi.
    compatible_printer:
      name: Kompatibilni pisač
      description: Utvrđuje s kojom je vrstom pisača proizvod kompatibilan, kao što
        je laserski pisač ili tintni pisač
    compatible_processor_series:
      name: Kompatibilna serija procesora
      description: Određuje seriju procesora s kojom je proizvod kompatibilan, kao
        što je AMD Ryzen ili Intel core solo
    compatible_programming_languages:
      name: Kompatibilni programski jezici
      description: Utvrđuje programske jezike s kojima softverski proizvod može funkcionirati,
        poput Pythona ili Jave
    compatible_recipes:
      name: Kompatibilni recepti
      description: Određuje koji se recepti mogu pripremati u proizvodu, obično za
        aparate za sladoled, npr. sorbet, gelato
    compatible_resin_type:
      name: Kompatibilna vrsta smole
      description: Specificira kategorije UV smole koje SLA/MSLA pisač može koristiti.
    compatible_resolution:
      name: Kompatibilna razlučivost
      description: Definira podržanu razlučivost zaslona, npr. 1080p, puna HD razlučivost
    compatible_satellite_radio_service:
      name: Kompatibilna usluga satelitskog radija
      description: Identificira usluge satelitskog radija s kojima je prijamnik dizajniran
        da radi, osiguravajući kompatibilnost s postojećim ili namijenjenim pretplatama.
    compatible_seat_type:
      name: Kompatibilna vrsta autosjedalice
      description: Određuje vrstu dječje autosjedalice kojoj proizvod odgovara, kao
        što je pomoćno dječje sjedište ili autosjedalica za bebe
    compatible_shoe_size:
      name: Kompatibilna veličina cipela
      description: Uparuje proizvode s određenim veličinama cipela, npr. 12, 42
    compatible_software_platform:
      name: Kompatibilna softverska platforma
      description: Navodi softverske platforme s kojima je proizvod kompatibilan,
        npr. Adobe Creative ili Canva
    compatible_special_effects_device:
      name: Kompatibilni uređaj za specijalne efekte
      description: Utvrđuje s kojim uređajem za specijalne efekte proizvod može funkcionirati,
        kao što su LED svjetla ili aparati za maglu
    compatible_stove_top_type:
      name: Kompatibilna vrsta ploče za kuhanje
      description: Utvrđuje vrstu ploča za kuhanje s kojima se proizvod može upotrebljavati,
        poput plinske ili indukcijske
    compatible_string_instrument:
      name: Kompatibilno žičano glazbalo
      description: Utvrđuje za koje je žičano glazbalo proizvod osmišljen, npr. za
        ukulele ili bas gitaru
    compatible_stroller_type:
      name: Kompatibilna vrsta dječjih kolica
      description: Određuje vrstu dječjih kolica kojima proizvod odgovara, poput kišobran
        kolica ili kolica za trčanje
    compatible_vacuum_type:
      name: Kompatibilna vrsta usisavača
      description: Određuje vrstu usisivača s kojim je proizvod kompatibilan, kao
        što je ručni usisavač ili parni čistač
    compatible_vehicle:
      name: Kompatibilno vozilo
      description: Određuje vrstu vozila za koju je proizvod osmišljen, kao što je
        automobil ili SUV
    compatible_voice_assistant:
      name: Kompatibilan glasovni asistent
      description: Identificira platforme glasovne kontrole koje mogu upravljati prijamnikom.
    compatible_walking_aid_equipment:
      name: Kompatibilno pomagalo za hodanje
      description: Određuje za koja je pomagala za hodanje proizvod osmišljen, npr.
        štake, hodalice
    compatible_wax_container_size:
      name: Kompatibilna veličina posude za vosak
      description: Navodi standardne veličine uloška, limenki ili posuda koje se mogu
        postaviti izravno u grijač bez prelijevanja.
    compatible_wax_form:
      name: Kompatibilan oblik voska
      description: Određuje oblike depilatornog voska koje je grijač dizajniran za
        topljenje.
    compatible_weight_lifting_accessory:
      name: Kompatibilni dodatak za dizanje utega
      description: Navodi s kojom je opremom za dizanje utega proizvod kompatibilan,
        kao što su dvoručni uteg ili jednoručni uteg
    compliance_certifications:
      name: Certifikat o sukladnosti
      description: Navodi certifikate o sukladnosti proizvoda, kao što su HIPAA ili
        FedRAMP
    component_mounting_style:
      name: Stil montiranja komponente
      description: Definira primarnu metodu kojom se elektronička komponenta ili ploča
        pričvršćuje na tiskanu ploču, ploču, šasiju ili tračnicu.
    component_output_type:
      name: Vrsta izlaznog signala komponente
      description: Navodi vrstu izlaznog signala elektroničkih komponenti, kao što
        je UART ili analogni signal
    component_package_type:
      name: Vrsta paketa komponente
      description: Definira format hardvera ili paket elektroničkih komponenti, npr.
        SDM (Surface Mount Device), DIP (Dual In-line Package)
    component_size_code:
      name: Kod veličine komponente
      description: Specificira standardiziranu SMD ili through-hole oznaku veličine
        (npr. 0603, 0805) korištenu za pakiranje kondenzatora.
    component_tolerance:
      name: Tolerancija komponente
      description: Definira dopušteno odstupanje od nominalne vrijednosti (otpor,
        kapacitet, induktivitet, frekvencija itd.) izraženo kao postotak.
    components_included:
      name: Uključene komponente
      description: Navodi hardverske dijelove isporučene u početnom kompletu.
    compression_circuit_type:
      name: Vrsta kruga kompresije
      description: Opisuje osnovnu tehnologiju smanjenja pojačanja (npr. VCA, FET,
        optička) koja oblikuje zvuk i odziv procesora.
    compression_format:
      name: Format kompresije
      description: Definira vrstu upotrijebljene kompresije video datoteke, npr. MPEG-4,
        AVI
    compression_level:
      name: Razina kompresije
      description: Označava intenzitet pritiska u kompresijskim proizvodima, npr.
        lagani, čvrsti
    computer_accessories_included:
      name: Uključeni dodaci za računalo
      description: Navodi pomoćnu dodatnu opremu za računalo koja se isporučuje s
        proizvodom, poput miša ili torbe za prijenosno računalo
    computer_form:
      name: Oblik računala
      description: Definira fizički dizajn ili izgled računala, kao što je all-in-one
        ili notebook
    computer_server_features:
      name: Značajke računalnog poslužitelja
      description: Opisuje posebne značajke poslužitelja, kao što je redundantno napajanje
        ili podrška za virtualizaciju
    computer_specialized_features:
      name: Specijalizirane značajke računala
      description: Ističe specifične značajke računala, poput sustava za hlađenje
        tekućinom ili RGB rasvjete
    concertina_button_configuration:
      name: Konfiguracija gumba koncertine
      description: Određuje broj i raspored gumba na koncertini, kao što je anglo
        koncertina s 20 gumba
    condition:
      name: Stanje
      description: Opisuje stanje ili kvalitetu proizvoda, npr. kao novo (M), loše
        (P)
    conditioner_effect:
      name: Učinak regeneratora
      description: Definira koristi koje donosi regenerator za kosu, kao što je regenerator
        za zaglađivanje ili regenerator protiv prhuti
    condom_compatibility:
      name: Kompatibilnost kondoma
      description: Specificira s kojim materijalima kondoma je lubrikant siguran za
        uporabu.
    condom_fit_type:
      name: Vrsta prianjanja kondoma
      description: Opisuje cjelokupnu veličinu ili anatomsku konturu dizajniranu za
        poboljšanje udobnosti i osjeta.
    condom_type:
      name: Vrsta kondoma
      description: Navodi je li kondom namijenjen muškarcima ili ženama
    conductivity_gel_application:
      name: Primjena gela za vodljivost
      description: Specificira medicinski ili dijagnostički postupak za koji je gel
        ili losion za vodljivost namijenjen.
    conductor_core_type:
      name: Vrsta jezgre vodiča
      description: Označava je li unutarnji vodič upleteni ili čvrsta jezgra.
    connecting_thread:
      name: Cijevni navoj
      description: Određuje vrstu navoja za spajanje dijelova za vodoinstalacije,
        npr. IPS 1/2 inča
    connection_method:
      name: Način povezivanja
      description: Određuje vrstu povezivanja proizvoda, poput bežičnog ili ožičenog
    connection_type:
      name: Vrsta povezivanja
      description: Određuje vrstu povezivanja elektroničkih uređaja, poput ožičenog
        povezivanja ili povezivanja putem Bluetootha
    connectivity_technology:
      name: Tehnologija povezivanja
      description: Definira način prijenosa podataka u proizvodu, npr. Bluetooth,
        USB
    connectivity_type:
      name: Vrsta povezivanja
      description: Pojašnjava je li ploča bez lemljenja (breadboard stil) ili dizajnirana
        za lemljenje.
    connector_1_type:
      name: Tip konektora 1
      description: Specificira konektor ili sučelje prisutno na prvom kraju adaptera
        ili spojnice.
    connector_2_type:
      name: Tip konektora 2
      description: Specificira konektor ili sučelje prisutno na drugom kraju adaptera
        ili spojnice.
    connector_contact_plating:
      name: Premaz kontakata konektora
      description: Specificira površinski premaz ili oblogu nanesenu na električne
        kontakte za poboljšanje provodljivosti i otpornosti na koroziju.
    connector_design:
      name: Dizajn spojnice
      description: Utvrđuje dizajn spojnica ili karika lanca, npr. otvorena spojnica
        ili karabiner
    connector_gender:
      name: Vrsta konektora
      description: Određuje vrstu krajeva konektora u elektronici, npr. muški konektor,
        muški na ženski konektor
    connector_mounting_style:
      name: Stil montaže konektora
      description: Označava kako se konektor mehanički montira ili integrira u sklop
        (npr. PCB, panel, šasija, kabel, spojnica).
    connector_orientation:
      name: Orijentacija konektora
      description: Opisuje fizičku orijentaciju sučelja spajanja u odnosu na površinu
        montaže ili kabel (npr. ravno, pod pravim kutom, okomito).
    connector_position:
      name: Pozicija konektora
      description: Opisuje lokaciju video konektora kada se zaslon gleda sprijeda
        (npr. dolje-desno, gore-lijevo).
    connector_type:
      name: Vrsta konektora
      description: Specificira stil ili standard konektora prisutnog na krajevima
        žice premosnice.
    console_accessories_included:
      name: Uključeni dodaci za konzolu
      description: Navodi ključne dodatke ili komponente pakirane s konzolom (npr.
        kontroleri, kabeli, priključna stanica, igre).
    console_system:
      name: Sustav konzole
      description: Definira marku konzole za video igre, kao što je Atari 2600 ili
        Playstation
    console_type:
      name: Vrsta konzole
      description: Klasificira fizički oblik konzole i namijenjeno okruženje korištenja.
    constitutive_ingredients:
      name: Glavni sastojci
      description: Navodi glavne komponente koje se upotrebljavaju u formulaciji proizvoda,
        npr. pčelinji vosak, ulje divljeg šipka
    construction:
      name: Izrada
      description: Označava metodu ili tehniku izrade metala koja se upotrebljava
        u proizvodnji nakita (npr. pozlata, vermeil, punjenje, jednobojna)
    construction_set_theme:
      name: Tema kompleta za sastavljanje
      description: Utvrđuje temu kompleta za sastavljanje, poput gusara ili životinja
    contact_lens_case_accessories_included:
      name: Uključeni dodaci za kutiju za kontaktne leće
      description: Navodi dodatne predmete zapakirane s kutijom za kontaktne leće.
    contact_lens_case_features:
      name: Značajke kutije za kontaktne leće
      description: Ističe značajne funkcionalne značajke ili uključene elemente kutije.
    contact_lens_material:
      name: Materijal kontaktnih leća
      description: Određuje polimernu formulaciju ili obitelj materijala (npr. hidrogel,
        silikonski hidrogel) od kojih je leća napravljena.
    contact_material:
      name: Materijal kontakta
      description: Identificira metal ili premaz koji se koristi za kontakte baterije
        unutar držača.
    contrast:
      name: Kontrast
      description: Koristi se za određivanje razine kontrasta u fotografskom filmu,
        npr. normalni ili visoki kontrast
    contrast_ratio_typical:
      name: Omjer kontrasta (uobičajeni)
      description: Navodi omjer kontrasta zaslona, npr. 3000:1
    control_functions:
      name: Funkcije upravljanja
      description: Određuje funkcije upravljanja koje imaju pedale pojačala, kao što
        je prebacivanje kanala
    control_interface:
      name: Kontrolno sučelje
      description: Identificira kako se jedinica može konfigurirati ili kontrolirati
        (npr. PC softver, mobilna aplikacija, LCD na uređaju, daljinski upravljač).
    control_method:
      name: Metoda upravljanja
      description: Opisuje metodu upravljanja komponentama automatizacije, kao što
        je izravno upravljanje momentom i skalarno upravljanje (V/f)
    control_solution_level:
      name: Razina kontrolne otopine
      description: Označava razinu koncentracije glukoze kontrolne otopine.
    control_technology:
      name: Tehnologija upravljanja
      description: Određuje način zatvaranja i otvaranja, obično za zavjese i zastore,
        npr. ručni, motorizirani
    control_type:
      name: Vrsta upravljanja
      description: Određuje vrstu kontrolnog mehanizma, poput senzora ili gumba
    controller_design:
      name: Dizajn kontrolera
      description: Opisuje format hardvera kontrolera za automatizaciju, kao što su
        kompaktni kontroler ili kontroler u mehaničkom okviru
    controller_drive_type:
      name: Vrsta pogona kontrolera
      description: Navodi vrstu napajanja koja se upotrebljava u pogonima kontrolera
        za automatizaciju, kao što je pogon na izmjeničnu struju ili istosmjerna struja
    conversion_direction:
      name: Smjer konverzije
      description: Opisuje tip i smjer konverzije koju uređaj izvodi.
    converter_functionality:
      name: Funkcionalnost konvertera
      description: Navodi specifičnu funkciju konvertera za objektiv, kao što je povećavanje
        brzine ili širokokutni konverter
    conveyor_operation:
      name: Način rada tekuće vrpce
      description: Utvrđuje kako funkcionira sustav tekuće vrpce, na primjer motorizirani,
        gravitacijski
    cooking_compartments:
      name: Odjeljci za kuhanje
      description: Određuje broj odjeljaka za kuhanje u kuhinjskim aparatima kao što
        su friteze na vrući zrak, npr. jednostruko ili dvostruko
    cooking_method:
      name: Metoda kuhanja
      description: Navodi preporučenu metodu kuhanja, npr. grilanje, prženje
    cooking_wine_variety:
      name: Vrsta vina za kuhanje
      description: Opisuje različite vrste vina za kuhanje, npr. rižino vino, šeri
    cookware/bakeware_features:
      name: Značajke posuđa za kuhanje/pečenje
      description: Utvrđuje posebne značajke posuđa za kuhanje ili pečenje, kao što
        je premaz protiv prianjanja ili posuđe sigurno za pećnicu
    cookware/bakeware_material:
      name: Materijal posuđa za kuhanje/pečenje
      description: Utvrđuje osnovni materijal od kojeg je izrađeno posuđe za kuhanje
        ili pečenje, poput nehrđajućeg čelika ili keramike
    cookware_features:
      name: Značajke posuđa za kuhanje
      description: Ističe jedinstvene značajke posuđa za kuhanje, kao što je posuđe
        sigurno za pećnicu ili ručka koja se ne zagrijava
    cookware_items_included:
      name: Uključeni artikli posuđa za kuhanje
      description: Detaljno opisuje komponente seta posuđa za kuhanje, kao što je
        Dutch oven posuda ili tava
    cooling_technology:
      name: Tehnologija hlađenja
      description: Određuje metodu koja se upotrebljava za hlađenje elektroničkih
        uređaja, poput hlađenja zrakom ili odvodnika topline
    cord_fastening_system:
      name: Sustav fiksiranja konopa
