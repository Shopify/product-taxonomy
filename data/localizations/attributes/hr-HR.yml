        uređajima, npr. bez vrećice, vrećica za prašinu
    dust_mask_type:
      name: Vrsta maske protiv prašine
      description: Određuje oblik maski za zaštitu od prašine, poput konusnog oblika
        ili preklopnog oblika
    dvi_connection_type:
      name: Tip DVI veze
      description: Identificira specifični DVI konektor i format veze koji se podržava
        (npr. DVI-D jednostruka veza, DVI-I dvostruka veza, Mini-DVI).
    dye_form:
      name: Oblik boje
      description: Opisuje oblik boja za izradu rukotvorina, npr. u gelu ili u prahu
    dynamic_level:
      name: Dinamička razina
      description: Kategorizira loptice za racquetball i skvoš na temelju brzine i
        odskoka, npr. loptica sa zelenom točkom ili loptica s crvenom točkom
    dynamics_processing_function:
      name: Funkcija dinamičke obrade
      description: Identificira primarne dinamičke zadatke koje jedinica izvršava
