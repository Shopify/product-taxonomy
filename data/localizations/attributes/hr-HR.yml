---
hr-HR:
  attributes:
    3d_glasses_fit_design:
      name: Dizajn prianjanja 3D naočala
      description: Označava kako se naočale nose ili pričvršćuju (npr. klip-on, wrap-around,
        fit-over).
    3d_glasses_material:
      name: Materijal 3D naočala
      description: Određuje materijal upotrijebljen za izradu 3D naočala, primjerice
        bambus ili nehrđajući čelik
    3d_glasses_technology:
      name: Tehnologija 3D naočala
      description: Specificira tehnologiju 3D slike/sinkronizacije za koju su naočale
        dizajnirane, određujući kompatibilnost s određenim zaslonima ili projektorima.
    3d_printer_case_style:
      name: Stil kućišta 3D pisača
      description: Klasificira opću vrstu proizvoda kako bi kupci mogli razlikovati
        meke torbe za nošenje, tvrde futrole, stacionarne ograde i jednostavne pokrivače
        protiv prašine.
    3d_printer_cleaning_kit_components_included:
      name: Uključene komponente kompleta za čišćenje 3D pisača
      description: Navodi pojedine alate i potrošni materijal isporučene u kompletu
        kako bi kupci točno znali što kupuju.
    3d_printing_resin_type:
      name: Vrsta smole za 3D ispis
      description: Specificira formulaciju ili namijenjenu primjenu smole, pomažući
        kupcima brzo identificirati je li smola standardna, inženjerskog stupnja,
        lijevna ili druge specijalizirane vrste.
    80_plus_efficiency_rating:
      name: Ocjena učinkovitosti 80 Plus
      description: Označava službenu razinu certifikacije energetske učinkovitosti
        80 Plus koju je PSU postigao.
    abrasive_material:
      name: Abrazivni materijal
      description: Utvrđuje vrstu abrazivnog materijala koji se upotrebljava u alatu
        za brušenje, primjerice dijamant ili silicijev karbid
    absinthe_style:
      name: Stil apsinta
      description: Definira stil apsinta, npr. miješani, destilirani
    absinthe_variety:
      name: Vrsta apsinta
      description: Grupira artikle apsinta prema jedinstvenim vrstama, npr. crveni,
        zeleni
    absorbency_level:
      name: Razina upijanja
      description: Definira kapacitet upijanja, obično za higijenske proizvode, npr.
        noćni proizvod, lagano upijanje
    absorbent_hygiene_product_features:
      name: Značajke upijajućih higijenskih proizvoda
      description: Označava posebne karakteristike higijenskih proizvoda, npr. nepropusno
        ili hipoalergeno
    academic_level:
      name: Akademska razina
      description: Određuje akademsku razinu medijskog sadržaja, primjerice prijediplomska
        ili doktorska
    accessibility_design_features:
      name: Značajke dizajna pristupačnosti
      description: Navodi posebne elemente dizajna koji pomažu korisnicima s poteškoćama
        sa sluhom, vidom ili pokretljivošću.
    accessory_material:
      name: Materijal od kojeg je izrađen dodatak
      description: Određuje vrstu materijala od kojeg je izrađen dodatak, obično za
        potrepštine za pakiranje pošiljki; npr. plastika, karton
    accessory_size:
      name: Veličina dodatka
      description: Definira veličinu dodatka, kao što je jedna veličina ili kompaktna
        veličina
    accordion_tuning:
      name: Ugađanje harmonike
      description: Određuje vrstu ugađanja upotrijebljenog na harmonici, na primjer
        originalni zvuk ili komorni ton
    activation_mechanism:
      name: Mehanizam aktivacije
      description: Određuje primarnu metodu koja aktivira alarm.
    activation_method:
      name: Metoda aktivacije
      description: Opisuje kako korisnik aktivira pretplatnu ili SIM karticu.
    active_ingredient:
      name: Aktivni sastojak
      description: Utvrđuje osnovne tvari u predmetima za osobnu njegu, primjerice
        vitamin A, retinol
    activewear_clothing_features:
      name: Značajke sportske odjeće
      description: Utvrđuje jedinstvene karakteristike sportske odjeće, poput rastezljivosti
        u četiri smjera ili prozračnog dizajna
    activity:
      name: Aktivnost
      description: Određuje sport ili aktivnost za koju je proizvod osmišljen, poput
        tenisa ili pilatesa
    activity_tracker_design:
      name: Dizajn uređaja za praćenje aktivnosti
      description: Određuje kako se nosi uređaj za praćenje aktivnosti, npr. na kopčanje,
        traka za ruku
    acupuncture_model_format:
      name: Format modela za akupunkturu
      description: Definira veličinu i mjerilo modela za akupunkturu,npr. model u
        stvarnoj veličini, minijaturni model
    acupuncture_model_type:
      name: Vrsta modela za akupunkturu
      description: 'Određuje dio tijela ili vrstu koju model za akupunkturu predstavlja,
        npr. glava, šaka, životinja '
    adapter_directionality:
      name: Usmjerenost adaptera
      description: Označava podržava li adapter tok signala u oba smjera ili samo
        u jednom specificiranom smjeru.
    adapter_operating_modes:
      name: Radni načini adaptera
      description: Specificira funkcionira li adapter kao Bluetooth prijamnik, odašiljač
        ili oboje.
    adaptive_sync_technology:
      name: Tehnologija prilagodljive sinkronizacije
      description: Specificira tehnologiju varijabilne stope osvježavanja (VRR) podržanu
        od monitora za vizuale bez trganja.
    adc_resolution:
      name: ADC rezolucija
      description: Specificira rezoluciju (u bitovima) integriranog analogno-digitalnog
        pretvarača, definirajući preciznost mjerenja.
    additional_animation_software_features:
      name: Dodatne značajke softvera za animaciju
      description: Određuje jedinstvene značajke u softveru za uređivanje animacija,
        poput animacije likova ili vizualnih efekata
    additional_cleaning_technology:
      name: Dodatna tehnologija čišćenja
      description: Navodi tehnologije čišćenja uključene osim pare (npr., ultrazvuk,
        UV, ozon).
    additional_design_software_type:
      name: Dodatna vrsta softvera za projektiranje
      description: Određuje dodatne mogućnosti softvera za projektiranje, kao što
        je virtualni obilazak ili projektiranje krajobraza
    additional_financial_software_features:
      name: Dodatne značajke financijskog softvera
      description: Utvrđuje dodatne mogućnosti financijskog softvera, kao što je upravljanje
        imovinom ili revizija i usklađenost
    additional_graphic_software_features:
      name: Dodatne značajke softvera za grafički dizajn
      description: Ističe dodatne mogućnosti softvera za grafički dizajn, poput digitalne
        ilustracije ili dizajna izgleda
    additional_publishing_software_features:
      name: Dodatne značajke softvera za izdavaštvo
      description: Ističe dodatne funkcije softvera za izdavaštvo, poput dizajna tiska
        ili digitalnog izdavaštva
    additional_security_software_features:
      name: Dodatne značajke sigurnosnog softvera
      description: Određuje dodatne mogućnosti sigurnosnog softvera, npr. enkripcija
        diska, detekcija upada
    adhesive_application_type:
      name: Tip primjene ljepila
      description: Definira namijenjenu uslugu trepavica ili slučaj korištenja ljepila.
    adhesive_features:
      name: Značajke ljepila
      description: Ističe posebna svojstva ljepila korištenog na flasterima ili trakama.
    adhesive_format:
      name: Format ljepila
      description: Označava fizički oblik u kojem se ljepilo isporučuje za uporabu
        pri popravku.
    adhesive_strength:
      name: Snaga ljepila
      description: Određuje razinu čvrstoće lijepljenja ili podizanja ljepila nosnog
        flastera (npr. izvorna, ekstra snaga).
    adhesive_type:
      name: Vrsta ljepila
      description: Određuje vrstu ljepila korištenog u proizvodu, poput uklonjivog
        ili trajnog
    aftershave_product_form:
      name: Oblik proizvoda za njegu poslije brijanja
      description: Određuje konzistenciju proizvoda za njegu poslije brijanja, poput
        balzama ili kreme
    age_group:
      name: Dobna skupina
      description: Definira ciljanu starosnu skupinu za proizvod, kao što su odrasli
        ili djeca
    age_restrictions:
      name: Dobna ograničenja
      description: Označava najnižu starosnu dob za proizvod ili događaj, npr. 18
        godina ili više
    ai_application:
      name: Primjena umjetne inteligencije
      description: Određuje funkciju umjetne inteligencije u softveru, poput prediktivne
        analitike ili prepoznavanje govora
    air_freshener_form:
      name: Oblik osvježivača zraka
      description: Definira vrstu osvježivača zraka za automobile, npr. ulje, kopča
        za otvor ventilacije
    air_fryer_functions:
      name: Funkcije friteze na vrući zrak
      description: Navodi različite načine kuhanja koji su dostupni u fritezi na vrući
        zrak ili sličnom kućanskom aparatu, npr. prženje na vrućem zraku, pečenje
    air_mattress_features:
      name: Značajke zračnog madraca
      description: Opisuje jedinstvene karakteristike zračnog madraca, poput lakog
        napuhavanja ili otpornosti na probijanje
    air_tube_configuration:
      name: Konfiguracija zračne cijevi
      description: Označava broj ili stil cijevi za napuhavanje zraka integriranih
        s manžetom.
    airbrush_feed_type:
      name: Vrsta uvođenja boje u pištolj za raspršivanje boje
      description: Određuje način uvođenja boje u pištoljima za raspršivanje boje,
        poput uvođenja odozgo ili sifonskog uvođenja
    airbrush_operation_method:
      name: Način rada pištolja za raspršivanje boje
      description: Određuje stil rada pištolja za raspršivanje boje, na primjer, dvostruko
        djelovanje ili pojedinačno djelovanje
    aircraft_engine_configuration:
      name: Konfiguracija motora zrakoplova
      description: Određuje broj motora koji pokreću zrakoplov, npr. jednomotorni
        zrakoplov ili dvomotorni zrakoplov
    aircraft_engine_type:
      name: Vrsta motora zrakoplova
      description: Određuje vrstu motora koji pokreće zrakoplov, kao što je mlazni
        motor ili turbopropelerski motor
    airflow_opening_design:
      name: Dizajn otvora za protok zraka
      description: Opisuje konfiguraciju disanja ili ventilacije ugrađenu u nastavak
        za usta.
    airsoft_equipment_included:
      name: Uključena oprema za airsoft
      description: Određuje dodatnu opremu koja se isporučuje uz airsoft proizvode,
        kao što su zaštitne naočale ili taktički prsluk
    album_type:
      name: Vrsta albuma
      description: Opisuje stil uveza kompleta za izradu spomenara ili otiskivanje
        pečata, npr. spiralni uvez, spomenar
    alcohol/solvent_content:
      name: Sadržaj alkohola/otapala
      description: Klasificira proizvod na temelju sadržaja alkohola ili otapala za
        potrebe otpreme i regulacije (npr. alkohol ≤ 24 %, alkohol > 24 %, otapalo
        u maloj posudi)
    alcohol_content:
      name: Sadržaj alkohola
      description: Označava je li tonik bez alkohola ili, ako je prisutan, približno
        koliko alkohola formula sadrži.
    alert_type:
      name: Vrsta upozorenja
      description: Određuje vrstu upozorenja koje proizvod daje, poput zvučnih alarma
        ili obavijesti pametnog telefona
    allergen_information:
      name: Informacije o alergenima
      description: Označava potencijalne alergene koji se nalaze u hrani ili pićima,
        poput pšenice ili kikirikija
    allergen_test_type:
      name: Vrsta testa na alergene
      description: Određuje vrstu alergena koju komplet za testiranje otkriva, poput
        alergena iz hrane ili okoliša
    allergens:
      name: Alergeni
      description: Označava potencijalne alergene u proizvodima za zdravlje i ljepotu,
        npr. linalol ili limonen
    allergy_friendly_features:
      name: Značajke prikladne za osobe s alergijama
      description: Određuje ima li proizvod svojstva prikladna za osobe koje pate
        od alergija, kao što je bez lateksa ili otpornost na plijesan
    amino_acid_subtype:
      name: Podvrsta aminokiselina
      description: Specificira primarnu vrstu ili profil aminokiselina sadržanih u
        dodatku prehrani.
    amplifier/booster_suitable_location:
      name: Prikladna lokacija za pojačalo/pojačivač
      description: Određuje najbolje lokacije za pojačalo ili pojačivač signala, kao
        što je vozilo ili veliki prostor
    amplifier_class:
      name: Klasa pojačala
      description: Definira tip pojačala, kao što je AB ili D
    amplifier_configuration:
      name: Konfiguracija pojačala
      description: Određuje strukturu pojačala za motorna vozila, kao što su dvokanalno
        ili četverokanalno
    amputation_level:
      name: Razina amputacije
      description: Označava razinu amputacije za koju je skupljač dizajniran.
    analyte_measured:
      name: Izmjereni analit
      description: Identificira biomarker(e) za koje kontrolna otopina pruža kalibraciju.
    anamorphic_squeeze_ratio:
      name: Anamorfni omjer stiskanja
      description: Označava faktor horizontalne kompresije anamorfnog objektiva, omogućujući
        korisnicima da usklade objektiv sa željenim rezultatom otpuštanja.
    anatomical_detail_displayed:
      name: Prikazani anatomski detalji
      description: Označava koje anatomske značajke ili meridijani su istaknuti na
        modelu.
    anchor_type:
      name: Vrsta sidra
      description: Definira vrstu sidra koje se upotrebljava na opremi za vodene sportove
        s vučom, kao što je Danforthovo i plužno
    anemometer_application:
      name: Primjena anemometra
      description: Određuje namjenu anemometra, primjerice industrijski anemometar
        ili meteorološki anemometar
    angles_supported:
      name: Podržani kutovi
      description: Određuje raspon kutova koje proizvod može poprimiti, obično za
        elektroniku; npr. podesivo, 0° do 180°
    angling_style:
      name: Vrsta pecanja
      description: Definira ribolovnu tehniku za koju je proizvod dizajniran, kao
        što je surfcasting ili mušičarenje
    animal_feed_form:
      name: Oblik hrane za životinje
      description: Određuje oblik stočne hrane, poput tekućine ili granula
    animal_type:
      name: Vrsta životinje
      description: Određuje vrstu životinje kojoj je proizvod namijenjen, kao što
        su patke, jeleni ili psi
    answering_machine_type:
      name: Vrsta telefonske sekretarice
      description: Specificira prisutnost i tehnologiju integrirane telefonske sekretarice.
    antenna_connector_type:
      name: Vrsta konektora antene
      description: Specificira RF konektor korišten za pričvršćivanje vanjskih antena.
    antenna_rf_connector_type:
      name: Tip RF konektora antene
      description: Identificira RF konektor koji koristi antena.
    antenna_type:
      name: Vrsta antene
      description: Određuje vrstu antene za elektroničke uređaje, npr. svesmjerna,
        mrežasta
    anti_agin_skin_care_type:
      name: Vrsta proizvoda za njegu kože protiv starenja
      description: Klasificira vrstu proizvoda za njegu kože protiv starenja, npr.
        maska, tonik
    anti_perspirant_strength_level:
      name: Razina snage antiperspiranta
      description: Označava klasifikaciju učinkovitosti antiperspiranta (npr. klinička
        snaga, sportska snaga).
    antibody_class_tested:
      name: Testirana klasa antitijela
      description: Određuje imunoglobulin ili biomarker koji komplet detektira (npr.,
        IgE, IgG4).
    antifreeze_type:
      name: Vrsta antifriza
      description: Određuje vrstu antifriza za održavanje vozila, npr. koncentrat,
        razrijeđeni proizvod
    antique_car_design:
      name: Dizajn starodobnog automobila
      description: Opisuje primarni stil dizajna starodobnog automobila, npr. model
        T-bucket ili model grand tourer
    antique_vehicle_era:
      name: Razdoblje starodobnog vozila
      description: Opisuje povijesno razdoblje starodobnog vozila, kao što je razdoblje
        Brass Era (1896. - 1915.) ili razdoblje Vintage Era (1919. - 1930.)
    appliance_board_function:
      name: Funkcija ploče uređaja
      description: Specificira funkcionalnu ulogu ploče unutar uređaja.
    appliance_unit_location:
      name: Lokacija jedinice uređaja
      description: Označava fizički dio uređaja za koji je ploča namijenjena (npr.
        unutarnja ili vanjska jedinica).
    application_area:
      name: Područje nanošenja
      description: Određuje dio tijela ili područje na koje se proizvod nanosi, npr.
        usne, cijelo tijelo
    application_method:
      name: Metoda nanošenja
      description: Definira kako se proizvod nanosi ili koristi, npr. gel, tekućina,
        sprej
    application_type:
      name: Vrsta primjene
      description: Označava ostavlja li se tretman ili se ispire i bilo koji poseban
        način uporabe.
    applicator_format:
      name: Format aplikatora
      description: Opisuje fizički oblik ili stil aplikatora losiona ili kreme za
        sunčanje.
    applicator_material:
      name: Materijal aplikatora
      description: Određuje materijal od kojeg je načinjen aplikator, obično za tampone;
        npr. plastika, karton
    applicator_type:
      name: Vrsta aplikatora
      description: Utvrđuje vrstu aplikatora koji je priložen uz tampone, npr. aplikator,
        bez aplikatora
    applique/patch_shape:
      name: Oblik prišivka / ukrasne zakrpe
      description: Opisuje oblik prišivaka ili ukrasnih zakrpa, primjerice životinjski
        ili geometrijski
    applique_shape:
      name: Oblik prišivka
      description: Opisuje oblik prišivaka, na primjer cvjetni ili životinjski
    aquarium_filter_features:
      name: Značajke filtra za akvarij
      description: Opisuje posebne značajke filtara za akvarij, npr. brza izmjena
        uložaka, višestupanjska filtracija
    aquarium_light_spectrum:
      name: Svjetlosni spektar svjetla za akvarij
      description: Određuje vrstu svjetlosnog spektra rasvjete za akvarij, npr. plava,
        dnevna svjetlost
    aquarium_overflow_box_design:
      name: Dizajn preljevne kutije za akvarij
      description: Opisuje način postavljanja preljevne kutije za akvarij, kao što
        je vanjski ili obješeni
    archery_activity:
      name: Streličarska aktivnost
      description: Određuje vrstu streličarske aktivnosti, npr. lov na otvorenom,
        vježbanje s metama
    archery_equipment_included:
      name: Uključena oprema za streličarstvo
      description: Određuje dodatnu opremu za streličarstvo koja se isporučuje s proizvodom,
        npr. nosač stabilizatora, strijele od sigurnosnog stakla
    archery_style:
      name: Vrsta streličarstva
      description: Definira konkretnu vrstu streličarstva za koju je proizvod osmišljen,
        na primjer 3D streličarstvo, lov lukom
    archery_target_type:
      name: Vrsta mete za streličarstvo
      description: Određuje vrstu mete za streličarstvo osmišljene za različite vježbe
        gađanja, npr. 3D meta, vrećasta meta
    aromatherapy:
      name: Aromaterapija
      description: Određuje upotrijebljeni miris ili eterično ulje, npr. eukaliptus,
        lavanda
    arrangement:
      name: Aranžman
      description: Određuje način na koji je cvijeće aranžirano ili prezentirano,
        npr. u vazi, u košari
    arrow/bolt_material:
      name: Materijal od kojeg je izrađena strijela / strijela za samostrel
      description: Utvrđuje konstrukcijski materijal strijela ili strijela za samostrel,
        poput aluminija ili bambusa
    arrow_fletching_material:
      name: Materijal krilaca strijele
      description: Određuje materijal od kojeg su izrađena krilca strijele, poput
        sintetike ili plastike
    arrow_material:
      name: Materijal strijele
      description: Određuje sastav strijela, poput bambusa ili stakloplastike
    art/crafting_tool_material:
      name: Materijal od kojeg je izrađen pribor za umjetnost / izradu rukotvorina
      description: Određuje osnovni materijal od kojeg je izrađen pribor za umjetnost / izradu
        rukotvorina, poput drva ili metala
    art_fixative_application_method:
      name: Metoda nanošenja slikarskog fiksativa
      description: Opisuje kako se nanosi slikarski fiksativ, primjerice aerosol ili
        nanošenje kistom
    art_movement:
      name: Umjetnički pravac
      description: Definira stilski izraz ili umjetnički pravac kojem slika pripada,
        npr. impresionizam, ekspresionizam
    art_style:
      name: Umjetnički stil
      description: Opisuje estetski stil proizvoda, poput secesije ili tipografije
    artwork_authenticity:
      name: Autentičnost umjetnine
      description: Označava autentičnost umjetničkog djela, navodeći radi li se o
        izvorniku ili reprodukciji
    artwork_frame_material:
      name: Materijal okvira umjetnine
      description: Utvrđuje materijal od kojeg je izrađen okvir umjetnine, kao što
        je drveni okvir ili okvir s pozlatom
    artwork_type:
      name: Vrsta umjetnine
      description: Određuje stil digitalne umjetnine, poput tipografije ili digitalne
        slike
    assisted_braking_technology:
      name: Tehnologija potpomognutog kočenja
      description: Ukazuje na vrstu potpomognutog kočenja u spravama za osiguravanje,
        npr. aktivno, pasivno
