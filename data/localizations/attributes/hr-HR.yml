    counter_shape:
      name: Oblik pulta
      description: Opisuje oblik šanka ili pulta, kao što je ravno ili zakrivljeno
    country:
      name: Država
      description: Određuje državu koja se povezuje s proizvodom, poput Japana ili
        Njemačke
    country_of_issue:
      name: Država izdavanja
      description: Označava državu u kojoj je telefonska kartica izdana ili namijenjena
