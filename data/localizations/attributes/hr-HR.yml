      name: Vrsta perle (ukras za zakrpe)
      description: Primarna vrsta perli koje se koriste na površini zakrpe.
    beaded_accessory_project_type:
      name: Vrsta projekta dodatka od perlica
      description: Koji dodatak uzorak sačinjava.
    beading_needle_flexibility:
      name: Fleksibilnost igle za perle
      description: Relativna fleksibilnost tijela igle za prolazak kroz uske otvore
        pri radu s perlicama.
    beading_pattern_bead_size:
      name: Veličina perle za uzorak od perla
      description: Preporučena veličina ili veličine perli određene uzorkom (uobičajene
        veličine perli, npr. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Format tablice uzoraka za nizanje perli
      description: Kako je uzorak vizualno prikazan (npr. grafički prikaz ili fotografije
        korak po korak).
    beading_pattern_stitch_technique:
      name: Bod/tehnika uzorka za nizanje tehnika
      description: Primarni bod ili tehnika tkanja perlicama korištena u uzorku.
    beading_technique_stitch:
      name: Tehnika / bod nizanja perli
      description: Označava primarnu tehniku nanošenja perli ili vrstu boda korištenog
        u uzorku (npr. peyote bod, ciglasti bod).
    beading_thread_fiber_type:
      name: Vrsta vlakna konca za perle
      description: Određuje podvrstu vlakna/materijala konca za perle (specifičnije
        od generičkog materijala) relevantnu za učinkovitost.
    beading_thread_size:
      name: Veličina konca za perle
      description: Označava proizvođačku/industrijsku oznaku veličine konca za perle
        (specifično za marku/liniju), kao što je veličina D ili 00.
    beading_thread_use_case:
      name: Slučaj upotrebe konca za perle
      description: Identificira primarnu preporučenu upotrebu za konac za perle, pomažući
        kupcima da odaberu pravi proizvod za svoj projekt.
    beading_wire_coating_material:
      name: Materijal za premazivanje žice za perle
      description: Navodi materijal vanjskog premaza na žici za perle (ako postoji),
        što utječe na osjećaj, trajnost i otpornost na savijanje.
    beading_wire_strand_count:
      name: Broj žičanih niti za perle
      description: Označava broj niti u višestrukoj žici za perle (npr. 7-nitna, 19-nitna,
        49-nitna), što utječe na fleksibilnost i savitljivost.
    beadlock_type:
      name: Vrsta beadlocka
      description: Označava ima li kotač beadlock i koje je vrste (pomaže kupcima
        s terenskim i UTV vozilima).
    beam_material:
      name: Materijal grede
      description: Primarni materijal grede/šipke (često različit od glava/nastavaka).
    beam_pattern:
      name: Uzorak snopa svjetla
      description: Distribucijski uzorak izlazne svjetlosti koji se koristi za osvjetljenje
        za vožnju po cesti i terensku vožnju.
    bean_bag_fabric_material:
      name: Materijal tkanine vrećica
      description: Označava vanjsku tkaninu korištenu za vrećice koje dolaze u kompletu.
    bean_paste_variety:
      name: Vrsta paste od graha
      description: Klasificira specifičnu vrstu paste od graha na temelju načina proizvodnje
        ili glavnog sastojka.
    bean_preparation:
      name: Priprema graha
      description: Označava kako se grah priprema ili obrađuje prije prodaje (npr.
        cijele mahune, oljuštene, sjeckane, proklijale).
    bean_variety:
      name: Sorta graha
      description: Označava botaničku ili tržišnu vrstu graha (npr. mahune, edamame,
        duga vigna).
    beanie_style:
      name: Stil kape
      description: Opisuje cjelokupni dizajn, konstrukciju ili siluetu kape kako bi
        kupci mogli brzo odabrati između različitih varijacija.
    bearing_clearance:
      name: Zračnost ležaja
      description: Označava klasu unutarnje radijalne zračnosti ležaja (količina unutarnjeg
        zazora); klasa C0 također se naziva CN ili normalna zračnost.
    bearing_construction_type:
      name: Vrsta konstrukcije ležaja
      description: Označava dizajn ili stil konstrukcije ležaja koji se koristi u
        glavčini (npr. uložni, kuglični).
    bearing_edge_type:
      name: Vrsta ruba bubnja
      description: Vrsta/profil ruba koji nosi školjku bubnja, koji utječe na faze
        postizanja maksimalne glasnoće i održavanja tona.
    bearing_lubrication:
      name: Mazivo ležajeva
      description: Označava vrstu maziva koje se nanosi na ležaj tijekom proizvodnje,
        kao što je mast ili ulje.
    bearing_material:
      name: Materijal ležaja
      description: Identificira materijal konstrukcije ležaja (npr. čelični, keramički
        hibridni), pomažući vozačima da odaberu između opcija izdržljivosti, trošnosti
        i učinkovitosti.
    bearing_rating:
      name: Ocjena ležaja
      description: Određuje klasu tolerancije ili učinkovitosti ležaja u rolama (npr.
        ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Kod brtve ležaja
      description: Označava stil brtvljenja koji se koristi na ležaju, što utječe
        na trajnost i otpor kotrljanja.
    bearing_seal_type:
      name: Vrsta brtve ležaja
      description: Određuje dizajn brtve ili štitnika koji štiti unutarnje dijelove
        ležaja od onečišćenja i utječe na otpor (npr. 2RS, ZZ, LLU, otvoreno).
    bearing_shield_type:
      name: Vrsta štitnika ležaja
      description: Vrsta štitnika ili brtve koja štiti unutarnje dijelove ležaja.
    bearing_size_code:
      name: Kod veličine ležaja
      description: Standardizirana oznaka ležaja (npr. 608, 688) koja kombinara unutarnji
        i vanjski promjer te širinu.
    bearing_type:
      name: Vrsta ležaja
      description: Određuje stil konstrukcije upotrijebljenih ležajeva.
    beater_head_material:
      name: Materijal glave batića
      description: Opisuje materijal glave/kontakta batića za bas-bubanj (npr. filc,
        drvo, guma).
    beaters_included:
      name: Uključeni batići
      description: Navodi koliko je batića uključeno/ugrađeno na pedalu za bubanj
        (npr. jedan ili dva batića) ili ako batić nije uključen.
    bed_base_type:
      name: Vrsta podloge za krevet
      description: Definira strukturni stil podloge kreveta ili divana (npr. puna
        podnica, s elastičnim letvicama, prilagodljiva).
    bed_storage_type:
      name: Vrsta pohrane za krevet
      description: Definira integrirani mehanizam za pohranu u okviru kreveta.
    bedroom_furniture_items_included:
      name: Uključeni komadi namještaja za spavaću sobu
      description: Navodi pojedinačne komade namještaja koji dolaze u kompletu spavaće
        sobe (npr. krevet, komoda, noćni ormarići), što omogućava kupcu da brzo vidi
        što je uključeno bez čitanja dugih opisa.
    bedroom_vanity_items_included:
      name: Stavke uključene u toaletni stolić za spavaću sobu
      description: Navodi pojedinačne stavke koje dolaze s toaletnim stolićem za spavaću
        sobu kako bi korisnici točno znali što se isporučuje (npr. ogledalo, tabure,
        komplet rasvjete).
    beer_based_cocktail_variety:
      name: Vrsta koktela na bazi piva
      description: Klasificira koktele na bazi piva prema specifičnoj vrsti, npr.
        Radler, Shandy, Michelada.
    beet_variety:
      name: Vrsta repe
      description: Označava kultivar ili sortu repe, pomažući kupcima da prepoznaju
        njezin okus, boju i kulinarsku upotrebu (npr. crvena, zlatna, Chioggia).
    bell_actuation_mechanism:
      name: Mehanizam pokretanja zvona
      description: Opisuje koju je radnju potrebno poduzeti za zvonjenje, pomažući
        kupcu da odabere željeni ergonomski oblik.
    bell_guard_coverage_area:
      name: Područje prekrivanja ljevkastog završetka
      description: Označava za koji je dio ljevkastog završetka štitnik namijenjen.
    bell_material:
      name: Materijal zvona
      description: Materijal komponente lijevka (ako je naveden odvojeno od materijala
        čitavog instrumenta).
    bellhousing_bolt_pattern:
      name: Uzorak vijčanih rupa zvona mjenjača
      description: Označava standard ili obitelj uzorka vijčanih rupa zvona na strani
        motora koji koristi kućište mjenjača.
    bellows_material:
      name: Materijal mijeha
      description: Materijal tijela ili obloge mijeha (ako je uključen).
    bellows_orientation:
      name: Orijentacija mijeha
      description: Označava konfiguraciju mijeha koja se koristi za dovod zraka u
        cijevi.
    belly_panel_style:
      name: Stil trbušnog panela
      description: Opisuje konstrukciju pojasa ili trbušnog panela koji se prilagođava
        rastućem trbuhu.
    belt_buckle_type:
      name: Tip kopče remena
      description: Opisuje specifičan mehanizam kopče ili dizajn remena.
    beret_style:
      name: Stil beretke
      description: Označava specifičan dizajn ili kulturnu varijantu beretke.
    berry_species:
      name: Vrsta bobičastog voća
      description: Označava vrstu bobičastog voća u proizvodu, kako bi kupci mogli
        brzo filtrirati željenu vrstu bobica.
    beta_casein_variant:
      name: Varijanta beta-kazeina
      description: Označava koja je varijanta beta-kazeinskog proteina (primjerice
        A2) nazočna u mlijeku, za potrošače s osjetljivošću na probavu.
    beverage_sweetness_level:
      name: Razina slatkoće napitka
      description: Razvrstava napitak prema razini dodanog šećera ili slatkoće.
    bezel_graduation_units:
      name: Jedinice podjele na rotirajućem prstenu
      description: Označava mjerne jedinice na rotirajućem prstenu (stupnjevi, mils
        ili dvostruka skala).
    bicycle_brake_set_components_included:
      name: Komponente seta kočnica za bicikl koje su uključene u pakiranje.
      description: Navodi pojedinačne dijelove uključene u set kako bi kupci točno
        znali što je uključeno i mogli usporediti različite konfiguracije paketa.
    bicycle_cage_mounting_position:
      name: Položaj montaže držača za bidon
      description: Označava gdje je na biciklu predviđena montaža držača (cagea),
        primjerice na ramu ili vilici.
    bicycle_computer_mount_placement:
      name: Položaj nosača ciklokompjutera
      description: Označava gdje se na biciklu postavlja nosač računala, primjerice
        sprijeda na upravljaču ili na gornjem poklopcu lule.
    bicycle_folding_mechanism:
      name: Mehanizam sklapanja bicikla
      description: Označava mehanički sustav sklapanja okvira bicikla (npr. polu-sklopivi,
        vertikalno sklapanje).
    bicycle_frame_design:
      name: Dizajn okvira bicikla
      description: Označava opći stil okvira bicikla, koji utječe na pristupačnost,
        nosivost i način pohrane.
    bicycle_frame_style:
      name: Stil okvira bicikla
      description: Opisuje strukturni stil okvira bicikla (step-through, lowrider,
        chopper stretch itd.) koji utječe na položaj vozača i estetiku.
    bicycle_handlebar_type:
      name: Hvatovi za upravljač bicikla
      description: Identificira specifičan stil ili geometriju upravljača, pomažući
        vozačima da odaberu volane prikladne za njihov položaj vožnje i disciplinu.
    bicycle_headset_configuration:
      name: Konfiguracija ležaja upravljača bicikla
      description: Označava strukturni stil ili standard ležaja upravljača bicikla
        prema rasporedu čašica (primjerice External Cup, ZeroStack, Integrated, Threaded).
    bicycle_hub_type:
      name: Vrsta glavčine za bicikl
      description: Opisuje mehanizam glavčine koji dolazi s kotačem, utječući na kompatibilnost
        pogona i stil vožnje.
    bicycle_lock_security_certification:
      name: Sigurnosna certifikacija brave za bicikl.
      description: Neovisna certifikacija treće strane koja potvrđuje otpornost na
        krađu (primjerice Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Tip pedala za bicikl
      description: Određuje opći stil rada ili dizajn pedale, poput platformskih,
        SPD/clipless varijanti ili hibrida, pomažući vozačima da odaberu odgovarajuću
        vrstu sučelja za svoj stil vožnje.
    bicycle_propulsion_type:
      name: Vrsta pogona bicikla
      description: Označava način pogona bicikla, poput ručnog pedaliranja, električne
        asistencije ili motora s unutarnjim izgaranjem.
    bicycle_pump_type:
      name: Vrsta pumpe za bicikl
      description: Označava strukturni stil pumpe, pomažući kupcima da odaberu dizajn
        koji najbolje odgovara njihovim potrebama vožnje, skladištenja ili hitnih
        situacija.
    bicycle_rack_mounting_type:
      name: Tip montaže nosača za bicikl
      description: Opisuje primarni način ili točku pričvršćivanja nosača na bicikl,
        pomažući korisnicima da provjere kompatibilnost s okvirom i hardverom.
    bicycle_suspension_type:
      name: Vrsta amortizera za bicikl
      description: Označava nazočnost i konfiguraciju ovjesa na biciklu.
    bicycle_tire_tread_pattern:
      name: Uzorak gazne površine gume za bicikl
      description: Označava uzorak gazne površine gume, koji utječe na prianjanje
        i otpor kotrljanja na različitim podlogama.
    bidirectional_charging_capability:
      name: Mogućnost dvosmjernog punjenja.
      description: Označava podržava li električno vozilo dvosmjerno punjenje, poput
        V2G (vozilo-mreža) i/ili V2H (vozilo-dom).
    bike_rack_mounting_style:
      name: Stil montiranja na stalak za bicikl
      description: Način na koji je bicikl poduprt ili učvršćen na nosaču.
    bike_rack_tilt_function:
      name: Funkcija nagiba nosača za bicikl
      description: Označava postoji li i kakva funkcija nagiba za pristup stražnjem
        prtljažniku dok je nosač montiran.
    bikini_top_style:
      name: Stil gornjeg dijela bikinija
      description: Označava dizajn ili kroj gornjeg dijela bikinija, pomažući kupcima
        da pronađu željeni fit i siluetu.
    billiard_brush_type:
      name: Tip četke za bilijar
      description: Definira specifičan stil alata za čišćenje bilijarskog stola (npr.
        četka za stol, četka za rubove, napping blok).
    billiard_glove_finger_coverage:
      name: Pokrivenost prstiju bilijarske rukavice
      description: Identificira koje su prste pokrivene dizajnom rukavice, omogućujući
        precizno filtriranje rukavica za bilijar.
    billiard_pocket_style:
      name: Stil rupa za biljar
      description: Označava strukturni ili estetski stil džepa, koji utječe na kompatibilnost
        i izgled stola.
    billiard_rack_style:
      name: Stil nosača za bilijar
      description: Opisuje fizički stil ili mehanizam nosača (primjerice klasični
        okvir, šablona, sklopivi).
    billiard_table_type:
      name: Tip bilijarskog stola
      description: Označava disciplinu cue sporta ili način igre za koji je stol dizajniran
        (primjerice pool, snooker, karambol).
    billiards_discipline:
      name: Disciplina bilijara
      description: Označava specifičnu varijantu cue sporta (vrstu igre) za koju je
        proizvod namijenjen ili kompatibilan.
    binding_compatibility_standard:
      name: Standard kompatibilnosti vezova
      description: Označava standard vezivanja (normu potplata) za koji su pancerice
        certificirane, osiguravajući sigurno i ispravno uparivanje sa skijaškim vezovima.
    binding_inclusion:
      name: Sadržaj vezova u paketu
      description: Označava prodaju li se skije kao ravne, s integriranim sustavom
        ili s odvojenim vezovima u paketu.
    binding_interface:
      name: Sučelje vezova
      description: Označava ploču za vezove ili standard sučelja na koje su skije
        unaprijed montirane ili s kojima su kompatibilne, osiguravajući kompatibilnost
        pancerica i vezova.
    binding_liner_type:
      name: Tip unutarnje obloge vezova
      description: Opisuje stil unutarnje obloge u pancerici/vezovima (primjerice
        uklonjiva, pogodna za hodanje, termooblikovana).
    binding_mounting_system:
      name: Sustav montaže vezova
      description: Identificira sučelje koje se koristi za pričvršćivanje vezova na
        skiju (flat mount, šina/track, ploča itd.).
    binding_position:
      name: Položaj uveza
      description: Označava namjenski položaj ili konfiguraciju montaže za vezove
        (primjerice prednja pancerica, stražnja pancerica, ARTP).
    binding_strap_position:
      name: Položaj trake vezova
      description: Označava na kojem dijelu vezova je predviđena montaža trake.
    bingo_components_included:
      name: Uključene komponente za bingo
      description: Navodi komponente uključene u bingo set, poput bingo kuglica, kartica
        i markera.
    bingo_number_range:
      name: Raspon bingo brojeva
      description: Označava raspon brojeva ili varijantu bingo igre koju set podržava.
    bingo_set_features:
      name: Značajke bingo seta
      description: Identificira primarni format bingo seta (fizički/ručni ili elektronički/interaktivni).
    bipod_mounting_interface:
      name: Sustav montaže bipoda
      description: Označava sustav pričvršćivanja koji se koristi za povezivanje bipoda
        s oružjem ili rail sustavom.
    bit_attachment_type:
      name: Vrsta pričvršćivanja svrdla
      description: Označava način na koji se oglavlje povezuje s bridzom (primjerice
        vezanje, kopča, Chicago vijci).
    bit_mouthpiece_design:
      name: Dizajn usnika nastavka (bita)
      description: Označava strukturni stil ili konfiguraciju spoja usnika, koja utječe
        na raspodjelu pritiska, prostor za nepce i ukupnu jačinu djelovanja.
    bit_ring_style:
      name: Stil prstena nastavka (bita)
      description: Definira stil obraza ili prstena žvale koji se pričvršćuje na uzdu,
        utječući djelovanje, bočno vođenje i osjećaj uzde.
    bladder_material:
      name: Materijal mjehura
      description: Označava materijal unutarnje zračne komore koja zadržava zrak.
    blade_attachment_type:
      name: Vrsta pričvršćivanja oštrice
      description: Označava koristi li klizaljka spojni (zglobni) mehanizam ili fiksno
        pričvršćenu oštricu.
    blade_finish_coating:
      name: Završna obrada / premaz oštrice
      description: Površinska obrada oštrice primijenjena radi estetike ili zaštite
        od korozije.
    blade_hosel_type:
      name: Tip spoja hosela oštrice
      description: Određuje stil veze cijevi oštrice koja odgovara osovini, što utječe
        na kompatibilnost (primjerice standardna ili konusna).
    blade_length_type:
      name: Duljina oštrice
      description: Razvrstava duljinu peraje kao kratku, srednju ili dugu, pri čemu
        svaka utječe na ritam zaveslaja i ciljeve treninga.
    blade_lie:
      name: Lie broj oštrice
      description: Označava broj kuta odstupanja oštrice hokejaške palice, tj. način
        na koji lopatica leži na ledu u odnosu na dršku.
    blade_sharpness:
      name: Oštrina oštrice
      description: Označava je li rub oružja naoštren ili tup za potrebe treninga.
    blade_size_category:
      name: Kategorija veličine oštrice
      description: Standardizirani međunarodni kod veličine oštrice sablje (0–5) koji
        se koristi za razlikovanje oštrica za mlade i odrasle.
    blade_size_class:
      name: Klasa veličine oštrice
      description: Klasificira oštricu prema konvenciji veličine igrača, odgovarajućoj
        veličini osovine kao što su Youth, Junior, Intermediate ili Senior.
    blade_size_number:
      name: Broj veličine oštrice
      description: Standardni numerički kod veličine (0–5) definiran propisima o mačevanju
        koji određuje duljinu oštrice i podobnost za dobnu skupinu.
    blaster_mechanism:
      name: Mehanizam za blaster
      description: Definira unutarnji mehanizam rada gel blastera (primjerice GBB,
        AEG, opruga).
    block_edge_style:
      name: Stil ruba bloka
      description: Opisuje kako su rubovi/kutovi drvenih blokova obrađeni radi osjećaja
        i sigurnosti.
    blocking_mat_features:
      name: Značajke podloge za oblikovanje
      description: Funkcionalne značajke specifične za blokirajuće prostirke (skladištenje,
        prenosivost, upotrebljivost).
    blocking_mat_grid_unit:
      name: Jedinica mreže za blokiranje podloge
      description: Sustav jedinica koji se koristi na tiskanoj mreži, a koji pomaže
        korisnicima da usklade uzorke i mjere.
    blocking_mat_surface_markings:
      name: Oznake površine blokirajuće podloge
      description: Vrsta mjernih/vodič oznaka otisnutih ili utisnutih u površinu prostirke.
    blocking_wire_coating:
      name: Premaz za blokiranje žice
      description: Površinski tretman/premaz na blokirajućoj žici koji utječe na otpornost
        na hrđu, glatkoću i rizik od zapinjanja.
    blocking_wire_end_cap_type:
      name: Vrsta završnog poklopca blokirajuće žice
      description: Određuje vrstu zaštite/završne obrade koja se koristi na krajevima
        blokirajuće žice radi sigurnosti i zaštite tkanine.
    blocking_wire_set_includes:
      name: Set blokirne žice uključuje
      description: Određuje koje su komponente uključene u proizvod blokirajuće žice
        (primjerice T-priključak, cijev za pohranu).
    blocking_wire_usage:
      name: Blokiranje korištenja žice
      description: Primarna uporaba kutije za koju je dizajnirana fleksibilna žica
        za blokiranje.
    bloom_stage:
      name: Faza cvjetanja
      description: Označava koliko su cvjetovi tratinčica otvoreni prigodom dostave/otpreme.
    blower_motor_bearing_type:
      name: Vrsta ležaja motora ventilatora
      description: Određuje dizajn ležaja koji se koristi u motoru ventilatora.
    blower_motor_mounting_position:
      name: Položaj montaže motora ventilatora
      description: Gdje je motor ventilatora ugrađen u HVAC Modules/vozilo (primjerice
        sprijeda, straga).
    blowpipe_valve_type:
      name: Vrsta ventila za puhanje
      description: Određuje uključeni stil ventila za puhanje (ako postoji).
    bo_staff_style:
      name: Štap bo stila
      description: Definira strukturni stil ili konstrukciju štapa (primjerice ravni,
        suženi, obloženi pjenom, sklopivi).
    board_game_theme:
      name: Tema društvene igre
      description: Narativ/ Postavke teme društvene igre (koristi se za otkrivanje
        i pregledavanje).
    board_rail_shape:
      name: Oblik šina za ploču
      description: Određuje konturu tračnica ploče (primjerice mekane, tvrde, 50/50)
        što utječe na držanje i pokreće val.
    board_size_classification:
      name: Klasifikacija veličine ploče
      description: Klasificira ploču ili set za cornhole u uobičajene standardizirane
        veličine.
    board_type_compatibility:
      name: Kompatibilnost vrste daske
      description: Određuje vrstu daske za koju je uzica namijenjena.
    boat_construction_type:
      name: Vrsta sastavljanja čamca
      description: Opisuje strukturni stil ili format čamca na vesla (primjerice napuhan,
        krut).
    boat_hook_flotation:
      name: Plutanje na udici za brodove
      description: Označava je li udica dizajnirana da pluta ako se ispusti u vodu.
    boat_ladder_stowage_style:
      name: Stil skladištenja za brodske ljestve
      description: Opisuje kako se ljestve drže kada se ne koriste (primjerice sklopive,
        uvlačive, odvojive).
    boat_trailer_construction_type:
      name: Vrsta konstrukcije prikolice za brod
      description: Označava podržava li prikolica brod krevetima, valjcima ili hibridnim
        sustavom.
    boat_weaving_shuttle_weft_exit_type:
      name: Tip izlaza za potku čamca za tkanje brodova
      description: Kako potka izlazi iz čunka tijekom tkanja.
    bobbin_loading_type:
      name: Vrsta umetanja špulice
      description: Određuje kako se špulica umeće/stavlja u šivaći stroj.
    bobbin_system:
      name: Sustav špulice
      description: Sustav/vrsta umetanja špulice koju koristi šivaći stroj.
    bobbin_type:
      name: Vrsta špulice
      description: Određuje format prijevoznika pređe za koji je čunak dizajniran
        (ili ga uključuje), što određuje kompatibilnost i tipičnu upotrebu (primjerice
        čunkovi za brodove često koriste kaleme; čunkovi za krpe mogu biti otvoreni
        za trake).
    bobbin_winder_winding_direction:
      name: Smjer namotavanja namotača špulice
      description: Određuje smjer namatanja/rotacije koji podržava namotač špulice.
    bobble_mechanism:
      name: Mehanizam za klackalice
      description: Određuje stil mehanizma za klackalicu, koji utječe na kretanje
        i trajnost.
    bocal_material:
      name: Materijal puhačke cijevi
      description: Određuje materijal uključenih bokala.
    bodhr_n_head_material:
      name: Materijal za glavu Bodhrán
      description: Materijal glave za sviranje (membrana), koji snažno utječe na ton
        i zahtjeve održavanja.
    bodhr_n_tuning_system_type:
      name: Vrsta sustava za ugađanje za bodhran
      description: Stil ugrađenog mehanizma za podešavanje koji se koristi za podešavanje
        napetosti glave (ako se može podesiti).
    body_armor_coverage_area:
      name: Područje pokrivenosti oklopnog prsluka
      description: Označava koje zone tijela proizvod štiti.
    body_armor_intended_use:
      name: Namjena zaštitnog oklopa za tijelo
      description: Određuje primarni scenarij vožnje ili upotrebe za koji je dizajniran
        zaštitni oklop za ATV/UTV vozilo.
    body_cord_connector_style:
      name: Body cord mehanizam sinkronizacije style
      description: Opisuje konfiguraciju konektora na krajevima užeta (primjerice
        broj krakova ili stil bajuneta) koja određuje kompatibilnost s oružjem i kutijama
        za bodovanje.
    body_panel_finish_state:
      name: Stanje završne obrade karoserije
      description: Opisuje stanje pripreme/završne obrade površine tromjesečja ploče
        u prodanom stanju za bojanje/ugradnju.
    body_shape:
      name: Oblik tijela
      description: Određuje opće oblike/stil tijela električne gitare.
    bodysuit_bottom_coverage:
      name: Pokrivanje donjeg dijela bodija
      description: Definira kroj i pokrivenost donjeg dijela bodija, udobnost Impact
        i kompatibilnost s odjećom.
    boilie_shape:
      name: Oblici boila
      description: Identificira oblike boila koje proizvodi kotrljajući stol, omogućujući
        ribolovcima da biraju između različitih profila mamaca.
    boilie_stop_buoyancy:
      name: Zaustavljanje plovnosti boile
      description: Određuje je li zaustavljač boile dizajniran da pluta, tone ili
        ostaje neutralno plutajući, što utječe na prezentaciju mamca u vodenom stupcu.
    bok_choy_variety:
      name: Sorta Bok choyja
      description: Označava kultivar, naziv tržišta ili sortu bok choya (primjerice
        Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), što omogućuje kupcima odabir
        željenog okusa, veličine i izgleda.
    bolt_drive_style:
      name: Stil pogona vijaka
      description: Određuje stil pogona vijaka za montažu skateboarda, razlikujući
        uobičajene vrste glava/odvijača kao što su Allen ili Phillips.
    bone_content:
      name: Sadržaj kostiju
      description: Označava sadrži li meso kosti.
    bongo_center_block_material:
      name: Materijal središnjeg bloka bonga
      description: Materijal središnjeg bloka koji spaja dvije školjke bonga (ako
        je primjenjivo).
    bongo_shell_material:
      name: Materijal školjke bonga
      description: Materijal školjki bongoa (tijela bubnjeva), isključujući membrane
        i hardver.
    bongo_tuning_system:
      name: Sustav za ugađanje bonga
      description: Kako su bongosi uštimani/konstruirani za uštimavanje (primjerice
        tradicionalno uštimavanje s lugovima u odnosu na uštimavanje užetima), održavanje
        Impact i autentičnost.
    boning_type:
      name: Vrsta pojačanja
      description: Identificira strukturni sustav podrške unutar cinchera, kombinirajući
        i materijal i stil/oblike korištenih kostiju, koji izravno utječu na razinu
        podrške, fleksibilnost i izdržljivost.
    boot_liner_type:
      name: Vrsta podstave za čizme
      description: Opisuje konstrukciju ili prilagodbu unutarnje obloge unutar čizme
        za snowboard (primjerice toplinski oblikovana, uklonjiva).
    boot_sole_compatibility:
      name: Kompatibilnost potplata čizme
      description: Navodi norme potplata čizama ili sustave sučelja koje vez prihvaća.
    boot_support_level:
      name: Razina podrške za čizmu
      description: Opisuje ukupnu ocjenu krutosti/podrške gležnja ili čizme koju pruža
        klizaljka.
    boot_width_code:
      name: Šifra širine čizme
      description: proizvođač oznaka širine temeljena na slovima koja se koristi posebice
        za određivanje veličina za umjetničko klizanje (primjerice AAA, AA, B, C,
        D).
    booth_configuration:
      name: Konfiguracija separea
      description: Označava ukupnu konfiguraciju sjedenja u kabini (primjerice jednostrana,
        kutna, Modular).
    bootie_toe_design:
      name: Dizajn šiljastih čizmica
      description: Identificira stil konstrukcije prstiju kod surferskih i grebenskih
        čizama.
    border_type:
      name: Vrsta obruba
      description: Završna obrada rubova/obrub veza na izvezenoj zakrpi (utječe na
        izgled, otpornost na raslojavanje i percipiranu kvalitetu).
    bore_cleaner_format:
      name: Format čistača rupe
      description: Označava fizički oblik proizvoda za čišćenje provrta (alat ili
        potrošni materijal).
    bore_cleaner_safe_for_finish:
      name: Sredstvo za čišćenje rupa sigurno za završnu obradu
      description: Označava s kojim je uobičajenim završnim obradama limenih/glazbenih
        limenih instrumenata sredstvo za čišćenje provrta sigurno za korištenje.
    bottle_cage_loading_direction:
      name: Smjer utovara držača za boce
      description: Opisuje smjer iz kojeg se boca ubacuje ili vadi iz kaveza.
    bottle_neck_finish_closure_size:
      name: Završna obrada grla boce / veličina zatvarača
      description: Definira standardiziranu veličinu otvora boce kako bi se osigurala
        kompatibilnost s čepovima, plutama i zatvaračima (npr. 26 mm krunski završetak).
    bottle_style:
      name: Stil boce
      description: Uobičajeni oblici boca za punjenje koji se koriste u kućnom pivarstvu
        i vinarstvu.
    bottom_bracket_interface:
      name: Sučelje donje osovine
      description: Identificira standard osovine/donjeg ležaja za koji je kurbla dizajnirana,
        osiguravajući kompatibilnost okvira i donjeg ležaja.
    bottom_bracket_standard:
      name: Standardna osovina donjeg dijela
      description: Tip/standard školjke donjeg ležaja (bottom bracket) koji okvir
        podržava, što određuje kompatibilnost s kurblom.
    bottom_type_suitability:
      name: Prikladnost tipa dna
      description: Određuje morsko dno/prizemni uvjet na kojem je sidro dizajnirano
        da se najbolje drži.
    bounce_level:
      name: Razina odbijanja
      description: Označava koliki se odskok lopte vraća nakon bacanja ili ispuštanja,
        pomažući korisnicima odabrati pravu loptu za vježbe poput bacanja u zid ili
        slams.
    bouncy_ball_surface_finish:
      name: Završna obrada površine loptice skočice
      description: Određuje taktilnu i/ili vizualnu završnu obradu površine loptice
        za skakanje (npr. glatka, šiljasta, s glitterom).
    boundary_marker_type:
      name: Vrsta granične oznake
      description: Definira fizički oblik oznake ili proizvoda za označavanje terena
        (npr. čunj, traka, boja, šablona, stroj).
    bouquet_size_tier:
      name: Veličina buketa sloj
      description: Standardizirana veličinska kategorija buketa neovisna o broju stabljika
        (korisno za mješovite bukete).
    bow_and_yo_yo_edge_finish:
      name: Završna obrada ruba u obliku mašne i jo-joa
      description: Opisuje završnu obradu rubova/obruba koji se koristi na luku ili
        yo-yo-u (posebno za mašne izrađene od vrpce).
    bow_case_shell_type:
      name: Vrsta kućišta kofera za gudala
      description: Opisuje strukturnu konstrukciju vanjskog dijela futrole za luk
        (npr. tvrda školjka ili mekana torba).
    bow_compatibility:
      name: Kompatibilnost s lukom
      description: Određuje vrstu luka za koji je vrh luka namijenjen ili je ocijenjen
        prema korisničkom imenu.
    bow_hair_color:
      name: Boja mašne za kosu
      description: Identificira boju/izgled dlake koja se koristi na gudalu orkestralnog
        gudačkog instrumenta (npr. bijela/izbijeljena, prirodno bijela, crna).
    bow_stick_material:
      name: Materijal štapa gudala
      description: Identificira materijal štapa luka (glavne osovine), koji snažno
        utječe na težinu, osjećaj i cijenu.
    bow_type:
      name: Vrsta luka
      description: Određuje strukturni dizajn youth luka (npr. compound, recurve,
        longbow), što snažno utječe na stil gađanja, potrebnu opremu i programe treninga.
    bow_winding_material:
      name: Materijal za namatanje pramca
      description: Određuje materijal korišten za namotavanje/omotavanje gudala, Impact
        rukohvat i saldo.
    bow_yo_yo_embellishment_style:
      name: Stil ukrašavanja s mašnom/jo-joom
      description: Identificira način izrade ukrasa (konstrukcijski stil mašne ili
        tkaninskog yo-yo ukrasa).
    bowling_ball_core_type:
      name: Vrsta jezgre kugle za kuglanje
      description: Identificira unutarnji dizajn jezgre ili simetriju kugle za kuglanje,
        što utječe na kretanje kugle i potencijal zakretanja (hook).
    bowling_ball_coverstock_type:
      name: Vrsta poklopca kugle za kuglanje
      description: Određuje materijal ili tehnologiju vanjskog sloja (coverstocka)
        kugle za kuglanje, koji određuje trakciju i potencijal “hooka”.
    bowling_set_style:
      name: Stil kuglačkog seta
      description: Definira opći stil ili upotrebu kutije kuglačkog seta.
    box_lid_type:
      name: Vrsta poklopca kutije
      description: Tip poklopca/mehanizma za otvaranje koji koristi kutija za darivanje
        ili identifikacijski broj poreznog obveznika.
    box_spring_profile:
      name: Profil opružne kutije
      description: Klasificira ukupnu visinu box spring baze u kategorije prilagođene
        kupcima (npr. niskoprofilni, standardni, visoki profil), kako bi kupci mogli
        brzo filtrirati bez poznavanja točnih mjera.
    box_spring_requirement:
      name: Zahtjev za podnožje s opružnim okvirom
      description: Označava je li za madrac potrebna dodatna box spring baza ili temeljna
        podloga.
    boxing_ring_style:
      name: Stil boksačkog ringa
      description: Klasificira ukupni stil konstrukcije ili namjenu prstena (npr.
        natjecateljski vs. trening, povišeni vs. podni).
    bra_length_type:
      name: Duljina grudnjaka
      description: Definira klasifikaciju duljine grudnjaka na temelju vertikalnog
        pokrivanja, kao što su standardni, longline, midi ili cropped.
    bra_padding_type:
      name: Razmak grudnjaka u podnožju tipa
      description: Opisuje razinu ili prisutnost razmaka u podnožju u šalicama.
    braces_compatibility:
      name: Kompatibilnost s aparatićem
      description: Označava može li se štitnik za zube nositi s ortodontskim aparatićem
        (bravice) i u kojoj mjeri.
    brake_band_form:
      name: Oblik kočione trake
      description: Označava isporučuje li se kočiona traka kao kontinuirana petlja
        (beskonačna) ili kao izrezana duljina koja se mora pričvrstiti.
    brake_band_material_type:
      name: Vrsta materijala kočione trake
      description: Određuje funkcionalni materijal kočione trake (npr. pamučni konopac,
        najlonska sajla ili opružni čelik), što utječe na izdržljivost, grip, istezanje
        i buku.
    brake_band_style:
      name: Stil kočione trake
      description: Određuje sustav/vrstu napetosti kočione trake koji se koristi na
        kolu za predenje za primjenu napetosti na flyer/bobbin.
    brake_bleeding_method:
      name: Metoda odzračivanja kočnica
      description: Pristup krvarenju koji podržava komplet.
    brake_booster_assist_type:
      name: Vrsta pojačivača kočenja
      description: Označava pomoćni mehanizam koji koristi pojačivač kočenja.
    brake_booster_diaphragm_configuration:
      name: Konfiguracija membrane pojačivača kočenja
      description: Označava broj/vrstu dijafragmi korištenih u pojačivaču.
    brake_caliper_bleeder_screw_position:
      name: Položaj vijka za odzračivanje kočione čeljusti
      description: Određuje položaj odzračnog vijka na čeljusti kada je ugrađena (koristi
        se za provjeru je li odzračnik orijentiran na najvišoj točki za pravilno odzračivanje).
    brake_caliper_finish:
      name: Završna obrada kočionih čeljusti
      description: Određuje završnu površinsku obradu ili zaštitni premaz na kućištu
        kočione čeljusti (npr. lakiranje, galvanizacija, anodizacija).
    brake_caliper_included_hardware:
      name: Kočiona čeljust uključena u hardver
      description: Određuje što je uključeno u sklop čeljusti.
    brake_caliper_mount_type:
      name: Vrsta nosača kočione čeljusti
      description: Stil montažnog sučelja koji se koristi za pričvršćivanje čeljusti
        na zglob/nosač.
    brake_caliper_paint_base_chemistry:
      name: Osnovni kemijski sastav boje za kočione čeljusti
      description: Korišteni sustav boje/smole ili obitelj kemikalija.
    brake_caliper_paint_kit_contents:
      name: Boja kočione čeljusti kompletan Sadržaj
      description: Označava što je uključeno u paket Beyond same boje.
    brake_circuit_type:
      name: Vrsta kočionog kruga
      description: Konfiguracija hidrauličkog kruga koju podržava glavni cilindar.
    brake_clutch_fluid_base_chemistry:
      name: Kemija baze tekućine za kočnicu/spojku
      description: Osnovna kemijska baza kočione/kuplung hidraulične tekućine, koja
        utječe na kompatibilnost i mogućnost miješanja.
    brake_clutch_fluid_dot_specification:
      name: DOT specifikacija tekućine za kočnice/kvačilo
      description: DOT klasifikacija performansi za hidraulične kočione/kuplung tekućine
        (npr. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Završna obrada/premaz kočionog bubnja
      description: Površinska obrada ili zaštitni premaz na kočionom bubnju (npr.
        e-coat, lakiranje, pocinčavanje).
    brake_drum_type:
      name: Vrsta kočionog bubnja
      description: Vrsta konstrukcije kočionog bubnja (sa ili bez integrirane glavčine/ležaja).
    brake_fluid_base:
      name: Baza tekućine za kočnicu
      description: Određuje formulaciju potrebne ili uključene kočione tekućine.
    brake_fluid_base_chemistry:
      name: Kemija baze kočione tekućine
      description: Definira kemijsku bazu kočione tekućine, koja određuje kompatibilnost
        i pravila miješanja.
    brake_fluid_dot_specification:
      name: Specifikacija DOT-a tekućine za kočnicu
      description: Označava DOT ocjenu/specifikaciju kočione tekućine (npr. DOT 3,
        DOT 4) za proizvode kočione tekućine.
    brake_fluid_standards_compliance:
      name: Usklađenost sa standardima kočione tekućine
      description: Industrijski standardi koje kočiona tekućina tvrdi da ispunjava
        (ocjena Beyond DOT-a).
    brake_fluid_type:
      name: Vrsta kočione tekućine
      description: Određuje kočionu tekućinu potrebnu za hidraulične kočione čeljusti
        bicikla.
    brake_hose_end_fitting_type:
      name: Vrsta priključka za kraj kočionog crijeva
      description: Tip priključka na svakom kraju kočionog crijeva (npr. banjo, flare,
        ženski/muški navoj), koristi se za osiguranje kompatibilnosti s čeljustima/linijama.
    brake_lever_pull_type:
      name: Tip ručice kočnice s povlačenjem
      description: Definira omjer vuče sajle/mehaniku na koju je poluga dizajnirana,
        osiguravajući kompatibilnost s određenim kočionim čeljustima (npr. kratki
        pull obručaste kočnice u odnosu na dugi pull V-kočnice).
    brake_light_switch_actuation_type:
      name: Vrsta pokretanja prekidača za svjetlo kočnice
      description: Identificira koji fizički događaji aktiviraju sklopku (papučica/klip
        u odnosu na hidraulički tlak itd.).
    brake_light_switch_connector_type:
      name: Vrsta konektora prekidača za svjetlo kočnice
      description: Određuje stil/format električnog mehanizma sinhronizacije kojeg
        sklopka stop svjetla koristi za spajanje na kabelski svežanj vozila.
    brake_light_switch_contact_type:
      name: Vrsta kontakta prekidača za svjetlo kočnice
      description: Konfiguracija/ponašanje električnog kontakta prekidača stop svjetla
        (primjerice normalno otvoren/zatvoren, preklopni ili višestruki krug).
    brake_light_switch_mounting_style:
      name: Način montaže prekidača stop svjetla
      description: Kako je sklopka stop svjetla montirana/ugrađena na vozilo ili kočioni
