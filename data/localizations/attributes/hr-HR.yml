      description: Određuje vrstu posude(a) za svijeće uključene u komplet, ako postoji.
    candle_dye_form:
      name: Oblik boje za svijeće
      description: Određuje fizički oblik boje/koliora za svijeće koji se koristi
        u izradi svijeća.
    candle_fragrance_form:
      name: Oblik mirisa svijeće
      description: Određuje vrstu/oblik mirisnog sastojka namijenjenog za izradu svijeća.
    candle_making_tool_type:
      name: Vrsta alata za izradu svijeća
      description: Označava o kojoj se vrsti alata za izradu svijeća radi (primjerice
        posuda za izlijevanje, alat za centriranje fitilja, termometar).
    candy_texture:
      name: Tekstura slatkiša
      description: Opisuje osjećaj u ustima ili konzistenciju bombona, neovisno o
        okusu ili Shapes.
    candying_method:
      name: Metoda kandiranja
      description: Opisuje kako je voće kandirano ili konzervirano šećerom (primjerice
        kristalizirano, glazirano, u sirupu).
    canned_meat_form:
      name: Konzervirani oblik mesa
      description: Klasificira prerađeni oblik ili prezentaciju mesa unutar pakiranja.
    canoe_construction_type:
      name: Vrsta izrade kanua
      description: Razlikuje stilove izgradnje trupa kanua, kao što su tvrda školjka,
        napuhavanje i sklopivi.
    canoe_hull_shape:
      name: Oblik trupa kanua
      description: Definira primarni presjek trupa ili profil dna, što utječe na stabilnost
        i obradu.
    canoe_stern_design:
      name: Dizajn krme kanua
      description: Definira stil krme trupa, što utječe na kompatibilnost motora i
        obradu.
    canopy_type:
      name: Vrsta nadstrešnice
      description: Opisuje stil nadstrešnice ili pokrova iznad glave koji/a je uključen/a
        u krevet na rasklapanje.
    canvas_compatible_media:
      name: Canvas compatible medijski sadržaj
      description: Označava za koji umjetnički/zanatski medijski sadržaj je platno
        namijenjeno.
    canvas_format:
      name: Format platna
      description: Označava prodaje li se platno za ispis u listovima, rolama ili
        unaprijed izrezanim pločama.
    canvas_mounting_format:
      name: Platno za montažu/format
      description: Fizički format/način montaže slikarskog platna proizvod.
    canvas_stretcher_assembly_type:
      name: Vrsta sklopa nosila za platno
      description: Prodaje li se nosila sastavljena kao Frame ili kao šipke/komplet
        koji zahtijeva sastavljanje.
    canvas_stretcher_corner_joint_type:
      name: Vrsta kutnog spoja nosila platna
      description: Kako su kutovi nosila spojeni/konstruirani (primjerice utorom i
        čepom, prstnim spojem, klamericom, ključem).
    canvas_surface_tone:
      name: Ton površine platna
      description: Osnovni ton/boja premazane površine platna (podloge), ne bilo koji
        otisnuti dizajn ili uzorak (primjerice bijela, crna, tonirana).
    canvas_weave_type:
      name: Vrsta tkanja platna
      description: Opisuje strukturu tkanja površine platna koja utječe na teksturu
        i obradu boje.
    cap_attachment_style:
      name: Stil nastavka poklopca
      description: Određuje način konstrukcije/pričvršćivanja poklopca usnika saksofona,
        što može utjecati na zaštitu i pristajanje kutije.
    cap_construction:
      name: Izrada kape
      description: Određuje kako je konstrukcija perike (primjerice čipka sprijeda,
        puna čipka, ručno vezana), što utječe na realizam, udobnost i svestranost
        stiliziranja.
    cap_crown_structure:
      name: Struktura krune kape
      description: Označava je li kruna kape strukturirana (ukrućena) ili nestrukturirana
        (mekana).
    cap_fit_type:
      name: Vrsta prianjanja kape
      description: Definira kako kapa pristaje ili se podešava na glavi korisnika
        (primjerice pripijena naspram podesive).
    cap_seal_type:
      name: Vrsta brtve poklopca
      description: Određuje brtvenu komponentu koja se koristi za sprječavanje curenja
        ulja i izlaska pare (primjerice O-prsten, brtva).
    cap_size:
      name: Veličina kape
      description: Standardna veličina etikete koja označava ukupnu veličinu glave
        koja odgovara periki.
    cap_type:
      name: Vrsta čepa
      description: Vrsta sučelja čepa/zatvarača koji se koristi na preljevnom spremniku.
    caper_size_grade:
      name: Kapar veličine sorte
      description: Klasificira kapare prema industrijskim standardnim nazivima sorti
        koji odgovaraju promjeru pupka.
    capo_clamping_mechanism:
      name: Mehanizam za stezanje kapodastra
      description: Određuje način stezanja/aktivacije koji se koristi za primjenu
        pritiska na niz (način rada kapodastra).
    capo_finish:
      name: Završna obrada kapodastra
      description: Površinska obrada tijela kapodastra (vizualna/osjećajna), neovisno
        o boji (primjerice mat vs. sjajna).
    capo_fit_type:
      name: Vrsta prianjanja kapodastra
      description: Određuje profil vrata kojem je kapo dizajniran (uključujući radijus/ravnost),
        što utječe na stezanje bez zujanja i intonaciju.
    capo_pad_material:
      name: Materijal jastučića za kapodaster
      description: Određuje materijal kontaktne pločice koja dodiruje prag/glavu žice
        (utječe na prianjanje, stabilnost štima i potencijalno označavanje završne
        obrade).
    capo_tension_mechanism:
      name: Mehanizam za zatezanje kapodastra
      description: Određuje kako se primjenjuje i podešava pritisak/napetost na nizu
        za klizni kapo.
    capture_method:
      name: Metoda snimanja
      description: Označava je li klopka namijenjena za hvatanje živih životinja ili
        za ubijanje.
    car_ev_conversion_kit_motor_type:
      name: Vrsta motora za prenamjenu električnog automobila
      description: Određuje tehnologiju vučnog motora uključenu ili potrebnu za kompletnu
        konverziju (primjerice AC indukcija u odnosu na permanentni magnet).
    car_playset_items_included:
      name: Uključen set za igru s automobilima
      description: Navodi glavne komponente uključene u set automobila izvan osnovne
        strukture (primjerice automobili, figure, znakovi).
    car_shampoo_application_method:
      name: Metoda nanošenja auto šampona
      description: Kako se šampon treba nanositi tijekom pranja.
    car_wash_solution_form:
      name: Oblik otopine za pranje automobila
      description: Određuje fizički oblik otopine za pranje automobila (primjerice
        tekućina, pjena, maramice).
    car_wash_solution_scent:
      name: Miris otopine za pranje automobila
      description: Određuje miris/aromu otopine za pranje automobila (ako je mirisna).
    carbonated_water_variety:
      name: Raznovrsna gazirana voda
      description: Klasificira gaziranu vodu na temelju uobičajenih vrsta na tržištu
        i formulacije (primjerice tonik, mineralna voda, funkcionalna gazirana voda).
    carbonation:
      name: Karbonizacija
      description: Opisuje razinu ili vrstu karbonizacije u piću (primjerice negazirano,
        lagano gazirano, gazirano, nitro).
    carburetor_barrel_count:
      name: Broj cijevi rasplinjača
      description: Označava broj ograničenih provrta/cijevčica u rasplinjaču.
    carburetor_choke_type:
      name: Vrsta čoka rasplinjača
      description: Označava stil aktiviranja čoka koji koristi rasplinjač.
    carburetor_mounting_flange_type:
      name: Vrsta prirubnice za montažu rasplinjača
      description: Određuje stil sučelja za montažu rasplinjača kako bi se osiguralo
        prileganje usisnoj grani/razvodniku (primjerice uzorci slavine u odnosu na
        prirubnicu/vijke).
    card_binder_page_type:
      name: Vrsta stranice za mapiranje kartica
      description: 'Za fascikle/portfolije: stil stranica koje se koriste za pohranu
        kartica.'
    card_box_holder_type:
      name: tip kutije/držača kartice
      description: Određuje funkcionalni oblik proizvoda za prikupljanje ili držanje
        kartica na događajima (primjerice kutija, kutija u stilu poštanskog sandučića,
        košara, stalak).
    card_game_accessory_features:
      name: Značajke dodatne opreme za kartice za igre
      description: Značajne funkcionalne značajke pribora za igre kartica.
    card_lot_type:
      name: Vrsta serije kartice
      description: Označava je li proizvod jedna kartica ili serija/asortiman od više
        kartica.
    card_sleeve_size_format_compatibility:
      name: Kompatibilnost veličine/ formata čahure kartice
      description: Određuje veličinu kartice za koju su dizajnirani rukavi/kutije
        za palubu.
    carding_surface_pin_material:
      name: Materijal za grebenanje površine prikačeno
      description: Materijal prikačenih/zubih koji se koriste za kidanje i otvaranje
        vlakana.
    care_durability:
      name: Trajnost njege
      description: Označava očekivanu trajnost pranja/topline za etiketu nakon nanošenja.
    care_label_attachment_type:
      name: Vrsta pričvršćivanja etikete za njegu
      description: Kako je Label za njegu dizajnirana za nanošenje na stavku (primjerice
        prišivanjem, peglanjem/toplinskim lijepljenjem, ljepilom).
    care_label_format:
      name: Format etikete za njegu
      description: Fizički/tiskani format etikete proizvoda za njegu.
    care_label_symbol_system:
      name: Sustav simbola etikete za njegu
      description: Standardi/skup simbola korišten na Label (primjerice ISO simboli
        za njegu, ASTM/US simboli).
    cargo_area_configuration:
      name: Konfiguracija teretnog prostora
      description: Određuje strukturni stil ili lokaciju teretnog prostora na teretnom
        biciklu (primjerice bicikl longtail, bicikl s prednjim utovarivačem, tricikl).
    cargo_net_adjustability:
      name: Podesivost mreže za teret
      description: Označava može li se i kako podesiti napetost/prianjanje mreže za
        teret.
    cargo_net_position:
      name: Položaj mreže za teret
      description: Gdje se u prtljažniku/teretu namjerava postaviti ili pokrenuti
        mreža.
    cargo_net_stretch_type:
      name: Vrsta rastezljive mreže za teret
      description: Je li mreža za prtljagu u prtljažniku elastična/rastezljiva ili
        fiksna/nerastezljiva.
    cargo_net_style:
      name: Stil mreže za teret
      description: Određuje stil konstrukcije ili oblik mreže za teret (primjerice
        elastična vrpca, traka, barijera, viseća mreža).
    cargo_rack_finish:
      name: Završna obrada tereta od stalaka
      description: Vanjska površinska obrada/premaz teretnog stalka.
    carpet_cleaner_application_method:
      name: Metoda primjene sredstva za čišćenje tepiha
      description: Određuje namjeravani način na koji se proizvod nanosi i ugrađuje
        u tepih (izvan općeg oblika).
    carrier_style:
      name: Prijevoznički stil
      description: Mehanizam/stil nošenja koji se koristi za podršku broda na vozilu.
    carrot_size:
      name: Veličina mrkve
      description: Klasificira opću veličinu proizvoda mrkve.
    carrot_variety:
      name: Sorta mrkve
      description: Identificira određenu sortu ili kultivar mrkve.
    carrying_capacity_pairs_boards:
      name: Nosivost (parovi/daske)
      description: Označava koliko skija (pari) ili snowboarda dodatak omogućuje ili
        je namijenjen podršci kada se koristi sa stalkom (primjerice komplet produžetka).
    cartridge_thread_compatibility:
      name: Kompatibilnost niza uložaka
      description: Označava standard niz poruke za isparivač ili podršku za baterije,
        osiguravajući da su patrone i baterije fizički kompatibilne.
    case_capacity_butts_shafts:
      name: kapacitet kutije (kundaci × osovine)
      description: Definira koliko mjesta za bilješke i osovina kutija može primiti,
        izraženo u formatu mjesto za osovinu (primjerice 2x4 = 2 mjesta i 4 osovine).
    case_features:
      name: Značajke kutije
      description: Highlight funkcionalne značajke kutije za činele/bubnjeve vezane
        uz zaštitu i transport.
    case_humidifier_refill_type:
      name: Vrsta punjenja ovlaživača zraka za kutiju
      description: Označava koristi li ovlaživač zraka višekratne (regenerativne)
        medijske sadržaje ili jednokratne zamjenjive punjenja.
    case_lining_material:
      name: Materijal podstave kutije
      description: Označava primarni materijal koji oblaže unutrašnjost kutije ili
        torbe za gitaru, a koji dodiruje i štiti instrument ili sadržaj.
    case_material:
      name: Materijal kutije
      description: Identificira primarni materijal kutije sata, utječe na trajnost,
        težinu i estetiku.
    case_mounting_method:
      name: Način montaže kutije
      description: Kako se ovlaživač zraka namjerava postaviti ili pričvrstiti unutar
        kutije za instrumente.
    case_structure:
      name: Struktura kutije
      description: Označava krutost konstrukcije kutije.
    case_style_cymbal_drum:
      name: Stil kutije(činela/bubanj)
      description: Određuje je li proizvod mekana torba, tvrda kutija ili hibridni
        dizajn za prijevoz činela ili bubnjeva.
    casing_material:
      name: Materijal kućišta
      description: Označava primarnu tkaninu korištenu u kućištu gume, što utječe
        na težinu, osjećaj vožnje i zaštitu od probijanja.
    casino_set_chip_material:
      name: Materijal za čipove u kasino setu
      description: Primarni materijal uključenih čipova (ako je primjenjivo).
    casino_set_layout_included:
      name: Uključen je izgled kasino seta
      description: Određuje koja vrsta površine/izgleda za igru je uključena u set.
    cask_finish:
      name: Izgled bačve
      description: Označava bačvu koja se koristi za dovršavanje ili dozrijevanje
        žestokog pića, kao što je bačva za burbon ili bačva za sherry.
    cassava_variety:
      name: Sorta manioke
      description: Identificira specifični kultivar ili sortu juke/kasave koja se
        nudi, što utječe na okus, boju i svojstva kuhanja.
    cassette_body_type:
      name: Vrsta tijela kasete
      description: Standardni freehub ili driver koji stražnja glavčina ili kotač
        prihvaća (primjerice HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Skup značajki kasetofona
      description: Označava značajke transporta i reprodukcije kaseta uobičajene za
        kasetofone ugrađene u instrumentnu ploču.
    cassette_speed_compatibility:
      name: Kompatibilnost brzine kasete
      description: Označava broj brzina (primjerice 7 brzina, 12 brzina) za koje je
        kaseta ili slobodni kotač dizajniran, osiguravajući kompatibilnost lanca i
        mjenjača.
    castanet_shell_size_class:
      name: Veličina školjke kastanjete
      description: Standardizirana veličina razreda za školjke kastanjete, koju obično
        koriste svirači/učitelji za odabir pristajanja i tona.
    castanets_included_pieces:
      name: Kastanjete uključene u dijelove
      description: Označava što je uključeno u ponudu proizvoda (par vs. pojedinačni,
        Shopify Plus dodaci).
    castanets_pitch:
      name: Vrh kastanjeta
      description: Označava uobičajenu oznaku visine/veličine koju proizvođači koriste
        za opis raspona zvuka.
    castanets_type:
      name: Vrsta kastanjete
      description: Određuje stil kastanjete ili kategoriju predviđene uporabe.
    caster_type:
      name: Vrsta kotačića
      description: Označava vrstu kotačića ili kotačića ugrađenih u košaricu (primjerice
        okretni, s blokadom), što ukazuje na upravljivost i stabilnost.
    castle_playset_included_items:
      name: Set za igru dvorca uključuje stavku
      description: Snima glavne komponente uključene u set za igru dvorca kako bi
        kupci mogli usporediti setove (primjerice figure, namještaj, vozila, dodatke).
    catcher_equipment_included:
      name: Uključena oprema za hvatača
      description: Određuje komponente uključene u set opreme hvatača, kao što su
        kaciga hvatača ili štitnik za prsa.
    catcher_helmet_style:
      name: Stil kacige hvatača
      description: Označava cjelokupni stil dizajna zaštitne pokrivala za glavu hvatača.
    cattle_breed:
      name: Pasmina goveda
      description: Identificira pasminu goveda od koje je govedina dobivena (primjerice
        Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Sorta cvjetače
      description: Identificira kultivar, boju ili posebnu sortu cvjetače koja se
        prodaje.
    celery_form:
      name: Oblik celera
      description: Određuje fizički oblik ili način rezanja u kojem se celer prodaje.
    celery_variety:
      name: Vrsta celera
      description: Bilježi specifičan kultivar ili sortu celera, što omogućuje odabir
        kupca prema profilu okusa, boji ili kulinarskoj uporabi.
    cereal_bar_texture:
      name: Tekstura žitne pločice
      description: Opisuje osjećaj u ustima i konzistenciju žitne pločice (primjerice
        žvakaća, hrskava).
    cereal_type:
      name: Vrsta žitarica
      description: Klasificira oblike ili format žitarica ili granole (pahuljice,
        pufovi, grozdovi granole, müsli itd.) kako bi kupac lakše pronašao željenu
        teksturu ili način pripreme.
    certificate_border_style:
      name: Stil obruba certifikata
      description: Opisuje ukrasni rubni tretman korišten na certifikatu.
    certificate_personalization_type:
      name: Vrsta personalizacije certifikata
      description: Određuje kako se certifikat može personalizirati (prazno za rukopis,
        predložak za ispis, unaprijed ispisano s varijabilnim poljima itd.).
    certification_service:
      name: Usluga certificiranja
      description: Tvrtka za ocjenjivanje/certificiranje treće strane (ako je primjenjivo).
    certification_standard:
      name: Standard certifikacije
      description: Određuje certifikat o sigurnosti i otpornosti na vatru ili standard
        sukladnosti koji balaklava mora ispunjavati.
    chain_coating_finish:
      name: Premaz/završna obrada lanca
      description: Određuje bilo koju površinsku obradu ili završnu obradu primijenjenu
        na lanac radi poboljšanja trajnosti, smanjenja trenja, sprječavanja korozije
        ili promjene izgleda (primjerice Ti-nitrid, DLC, nikal, EPT otporan na hrđu).
    chain_connection_type:
      name: Vrsta lanca veza
      description: Određuje metodu zatvaranja koja je pružena ili potrebna za spajanje
        krajeva lanca.
    chain_tier_configuration:
      name: Konfiguracija lančane razine
      description: Određuje broj/raspored slojeva lanca u sklopu hvatača (jednostruki,
        dvostruki ili trostruki sloj).
    chain_tool_type:
      name: Vrsta lančanog alata
      description: Klasificira određenu vrstu alata za lanac bicikla kako bi kupci
        mogli brzo pronaći odgovarajući uređaj.
    chainring_shape:
      name: Oblik lančanika
      description: Označava oblike lančanika, kao što su okrugli ili ovalni/eliptični.
    chair_accessories_included:
      name: Uključeni dodaci za stolicu
      description: Navodi ugrađenu ili uključenu dodatnu opremu koja poboljšava funkcionalnost
        stolice.
    chair_sash_care_instructions:
      name: Upute za njegu okvira stolice
      description: Opisuje preporučanu metodu čišćenja/održavanja okvira stolice.
    chair_sash_finish:
      name: Završna obrada okvira stolice
      description: Opisuje površinski sjaj/završnu obradu tkanine krila.
    chair_storage_design:
      name: Dizajn skladišta za stolice
      description: Označava kako je sling stolica namijenjena za trgovinu (primjerice
        sklopiva, slagajuća, nesklopiva) kako bi se korisnicima pomoglo u procjeni
        skladištenja i prenosivosti.
    chaise_or_sectional_orientation:
      name: Orijentacija ležaljke ili sekcijske garniture
      description: Označava stranu na kojoj se nalazi integrirana ležaljka ili produženi
        dio kada se gleda prema sofi.
    chamber_size:
      name: Veličina komore
      description: Označava veličinu/volumen usnika, što utječe na otpor i tonsku
        boju.
    chanter_finger_spacing:
      name: Razmak prstiju pri pjevanju
      description: Označava razmak prstiju/veličinu prstiju pjevača (često opisan
        kao standardne, male ruke ili velike ruke).
    chanter_type:
      name: Vrsta sviraljke
      description: Stil/konfiguracija pjevača uključena u instrument (ili koju instrument
        koristi), kao što je otvoreni, zatvoreni, probni ili tonalitet.
    chard_variety:
      name: Sorta blitve
      description: Identificira specifičnu sortu ili vrstu boje blitve koja se prodaje.
    charging_port_location:
      name: Lokacija luke za utovar
      description: Fizička lokacija primarnog vanjskog ulaza za punjenje (priključak
        za punjenje).
    chassis_construction_type:
      name: Vrsta izrade kućišta
      description: Opisuje primarnu metodu konstrukcije šasije koja se koristi za
        vozilo.
    checkbook_loading_orientation:
      name: Orijentacija učitavanja čekovne knjižice
      description: Označava je li korica čekovne knjižice kompatibilna s formatima
        čekova s gornjim učitavanjem, bočno učitavanje ili univerzalnim formatima
        čekova.
    cheekpiece_style:
      name: Stil obraza
      description: Definira vrstu konfiguracije obraza/prstena na žvaletu, što određuje
        djelovanje uzde i bočnu stabilnost.
    cheese_alternative_form:
      name: Alternativni oblik sira
      description: Određuje fizički oblik ili rez u kojem se prodaje alternativa sira.
    cheese_form:
      name: Oblik sira
      description: Opisuje fizički izgled sira (npr. kolut, blok, narezan, usitnjen).
    cheese_texture:
      name: Tekstura sira
      description: Klasificira sir prema njegovoj općoj teksturi ili čvrstoći.
    cheese_variety:
      name: Vrsta sira
      description: Označava vrstu sira koji se koristi kao glavna aroma u grickalici.
    cherimoya_variety:
      name: Sorta čerimoje
      description: Identificira specifičnu sortu/kultivator cherimoye (primjerice
        Fino de Jete, El Bumpo).
    cherry_variety:
      name: Vrsta trešnje
      description: Označava kultivar ili sortu trešanja, pomažući kupcu da odabere
        specifične vrste poznate po svom okusu, boji, veličini ili namjeravanoj kulinarskoj
        uporabi.
    chest_pocket_style:
      name: Stil džepa na prsima
      description: Određuje prisutnost i raspored prsnih džepova na košulji.
    chewing_tobacco_form:
      name: Oblik duhana za žvakanje
      description: Identificira fizički oblik, stil reza ili veličinu vrećice duhana
        za žvakanje (primjerice rastresiti list, dugi rez, uska vrećica).
    chicory_variety:
      name: Sorta cikorije
      description: Identificira određenu sortu ili kultivar cikorije koja se prodaje
        (primjerice radič, belgijska endivija, endivija).
    chiffon_recommended_use:
      name: Preporučena uporaba šifona
      description: Primarna preporučena aplikacija za šivanje/obradu šifonske tkanine.
    child_seat_accessory_type:
      name: Vrsta dodatne opreme za dječju sjedalicu
      description: Definira specifičnu vrstu pribora ili zamjenskog dijela za dječju
        sjedalicu (primjerice jastuk za sjedalo, oslonac za noge, adapter za montažu),
        omogućujući kupcima da brzo suze pretragu na stavku koja im je potrebna bez
        izrade mnogih mikrokategorija.
    child_seat_mounting_type:
      name: Vrsta montaže dječje sjedalice
      description: Određuje kako se dječja sjedalica za bicikl pričvršćuje na okvir
        bicikla, stražnju stranu ili kokpit.
    chime_sound_character:
      name: Zvučni karakter zvona
      description: Opisuje namjeravani zvučni karakter/boju zvona.
    chin_cup_type:
      name: Vrsta šalice za bradu
      description: Određuje stil ili konstrukciju podbradnika, što utječe na udobnost
        i zaštitu od udaraca.
    chin_strap_type:
      name: Vrsta remena za bradu
      description: Određuje vrstu remena za bradu šešira - bez, fiksni, podesivi ili
        odvojivi - kako bi se kupcima olakšalo odabir stilova koji ostaju sigurni
        u vjetrovitim ili aktivnim uvjetima.
    china_cymbal_edge_shape:
      name: Oblik ruba kineskih činela
      description: Opisuje profil ruba/prirubnice tipičan za kineske činele (koliko
        je obruč zakrivljen prema gore), što utječe na osjećaj i zvuk.
    china_cymbal_sound_character:
      name: Zvuk kineskih činela
      description: Primarni deskriptor zvuka/tonalnih karaktera za porculanski činel
        koji se koristi za otkrivanje i filtriranje (primjerice kičasto, tamno, svijetlo).
        Može se primijeniti više vrijednosti.
    chinstrap_type:
      name: Vrsta podbradnog remena
      description: Vrsta podbradnog remena dolazi s kacigom.
    chip_cut_style:
      name: Stil rezanja čipsa
      description: Određuje fizički rez ili teksturu čipsa (primjerice rebrasti, kuhani
        u kotlu, pucketavi).
    chip_denomination:
      name: denominacija čipa
      description: Koje su apoeni (vrijednosti) čipova uključene u set (tiskane ili
        dodijeljene).
    chocolate_form:
      name: Oblik čokolade
      description: Opisuje fizički oblik u kojem se prodaje čokolada za pečenje.
    choy_sum_variety:
      name: Sorta choy suma
      description: Identificira specifično tržište ili botaničku sortu čoj sume koja
        se prodaje.
    cigar_wrapper_color:
      name: Boja omota za cigare
      description: Standardna klasifikacija boja omota cigare.
    cigarette_filter_type:
      name: Vrsta filtra za cigarete
      description: Označava ima li cigareta filtar i, ako ima, konstrukciju ili posebnu
        značajku tog filtra.
    cigarette_size:
      name: Veličina cigarete
      description: Klasificira cigarete prema standardnoj duljini ili formatu u industriji
        (primjerice king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Deskriptor jačine cigarete
      description: Marketinška naljepnica jačine koju tradicionalno koriste marke
        za označavanje intenziteta katrana/nikotina (npr. lagano, podebljano, srebrno).
    cinch_liner_material:
      name: Materijal podloške za kolan
      description: Označava materijal koji se koristi kao podloška ili podstava koja
        se naslanja na konja.
    circular_knitting_needle_cable_type:
      name: Vrsta kabela za kružne igle za pletenje
      description: Materijal/ponašanje i konstrukcija kabela (primjerice obloženi
        čelik, najlon) koji utječu na memoriju/savijanje i ponašanje pri okretanju.
    circular_knitting_needles_tip_material:
      name: Materijal za vrhove kružnih igala za pletenje
      description: Materijal dvaju vrhova igle (za razliku od materijala kabela).
    circumference_adjustment_mechanism:
      name: Mehanizam za podešavanje opsega
      description: Mehanizam koji se koristi za podešavanje ili zaključavanje opsega
        klupka.
    clamp_design:
      name: Dizajn stezaljke
      description: Opisuje strukturni stil ili mehanizam stezaljke.
    clamp_sheet_music_clip_features:
      name: Značajke stezaljke za note
      description: Funkcionalne i zaštitne značajke stezaljki za notni papir (primjerice
        razmak u podnožju, neklizajuće, okretne).
    clamping_closure_type:
      name: Vrsta stezanja/zatvaranja
      description: Određuje mehanizam koji se koristi za zatezanje ili pričvršćivanje
        obruča za vezenje oko tkanine.
    clarinet_bell_acoustic_design:
      name: Akustični dizajn zvona za klarinet
      description: Opisuje dizajn zvuka/otvora zvona namijenjen da utječe na odziv
        i intonaciju.
    clarinet_bell_adjustment_mechanism:
      name: Mehanizam za podešavanje zvona klarineta
      description: Opisuje kako se podešava duljina/geometrija zvona.
    clarinet_bell_ring_material:
      name: Materijal za zvono klarineta
      description: Određuje materijal zaštitnog prstena/trake na obodu zvona klarineta,
        ako postoji.
    clarinet_bell_tuning_effect:
      name: Efekt ugađanja zvona klarineta
      description: Označava kako je zvono dizajnirano da utječe na ugađanje/intonaciju
        (posebice grlene tonove i niski registar) u usporedbi sa standardnim zvonom.
    clarinet_body_type:
      name: Vrsta tijela klarineta
      description: Označava primarni tip konstrukcije tijela za A-klarinet.
    clarinet_bore_type:
      name: Vrsta otvora za klarinet
      description: Opisuje dizajn otvora alt klarineta.
    clarinet_cap_style:
      name: Stil kape za klarinet
      description: Stil dizajna kapice uključene uz proizvod ligature klarineta i/ili
        kapice usnika (npr. obrnuta ili ventilirana).
    clarinet_care_kit_intended_use:
      name: Kompletna njega klarineta za namjenu
      description: Primarni kontekst uporabe za koji je komplet namijenjen (npr. brzo
        svakodnevno sušenje u odnosu na dubinsko čišćenje/održavanje).
    clarinet_included_accessories:
      name: Uključen pribor za klarinet
      description: Označava što dolazi u kutiji s Bb klarinetom.
    clarinet_keywork_material:
      name: Materijal za tipke klarinet
      description: Određuje materijal mehanizma tipki klarineta (primjerice mesing,
        nikl srebro, posrebren).
    clarinet_keywork_plating:
      name: Obloga tipki klarineta
      description: Određuje premaz/materijal završne obrade tipkovnice klarineta (tipke).
    clarinet_mouthpiece_baffle_profile:
      name: Profil pregrade za usnik klarineta
      description: Opisuje unutarnji profil pregrade/krova usnika klarineta koji utječe
        na svjetlinu i projekciju.
    clarinet_mouthpiece_beak_shape:
      name: Oblik usnika za klarinet
      description: Određuje vanjski profil/kut kljuna za udobnost igrača i osjećaj
        embušure.
    clarinet_mouthpiece_chamber_size:
      name: Veličina bačvice usnika za klarinet
      description: Opisuje relativnu veličinu komore usnika za klarinet (kako je odredio
        proizvođač), koja može utjecati na boju tona i na otpor pri sviranju.
    clarinet_mouthpiece_intended_tone:
      name: Namijenjeni ton usnika za klarinet
      description: Opisuje opći tonski cilj naznačen za usnik.
    clarinet_mouthpiece_player_level:
      name: Razina svirača usnika za klarinet
      description: Označava tipičnu ciljnu razinu korisnika za usnik.
    clarinet_reed_cut:
      name: Rez trske za klarinet
      description: Određuje rez jezička/profil (npr. ispunjeni ili neispunjeni i drugi
        naznačeni stilovi reza), koji utječu na odziv i ton.
    clarinet_reed_material_type:
      name: Vrsta materijala trska za klarinet
      description: Označava od čega je izrađena trska (trska u odnosu na sintetičku
        i uobičajene sintetičke podvrste).
    clarinet_thumb_rest_type:
      name: Vrsta naslona za palac klarinet
      description: Vrsta/značajka oslonca za palac desne ruke.
    classical_guitar_string_3rd_string_type:
      name: Žice za klasičnu gitaru, tip treće žice
      description: Je li G (3.) niz običan (monofilament) ili namotan.
    classical_guitar_string_bass_winding_material:
      name: Materijal za namotavanje basa za klasičnu gitaru
      description: Materijal za omotavanje/namotavanje koji se koristi na bas gitari
        niz (obično niz 4-6).
    classical_guitar_string_set_configuration:
      name: Konfiguracija seta za niz klasične gitare
      description: Određuje je li proizvod kompletan set ili specifičan niz (obično
        violinska ili bas strana) za klasičnu gitaru.
    clay_modeling_dough_base_material:
      name: Osnovni materijal od gline i tijesta za modeliranje
      description: Primarna formulacija/osnovni tip materijala za modeliranje.
    clay_modeling_dough_curing_method:
      name: Metoda sušenja gline i tijesta za modeliranje
      description: Kako se materijal stvrdnjava (ili ostaje ponovno upotrebljiv),
        što određuje potrebne alate i tipičnu upotrebu kutije.
    clay_paintability:
      name: Prebojivost gline
      description: Označava može li se očvrsnuta glinena površina bojati i preporučane
        vrste boja.
    clay_primary_composition:
      name: Primarni sastav gline
      description: Primarni osnovni materijal/vezivo gline sušeće na zraku (primjerice
        na bazi papira, na bazi minerala).
    clay_shooting_discipline:
      name: Disciplina gađanja glinenih lopti
      description: Označava disciplinu gađanja glinenih kugli ili događaja za koje
        je proizvod namijenjen.
    cleaner_format:
      name: Čišći format
      description: Pakiranje/format čistača slajdova proizvod.
    cleaner_sanitizer_intended_area:
      name: Područje namijenjeno za čišćenje/dezinfekciju
      description: Primarni dio limenog instrumenta koji proizvod služi za čišćenje/dezinfekciju.
    cleaning_formula:
      name: Formula za čišćenje
      description: Određuje primarnu obitelj kemijskih sredstava za čišćenje/dezinfekciju
        proizvoda (ne marke) kako bi se podržala sigurnost, kompatibilnost i filtriranje
        uporabe.
    cleaning_task_focus:
      name: Fokus zadatka čišćenja
      description: Identificira primarne probleme čišćenja koje pranje bez vode treba
        riješiti.
    cleanup_method:
      name: Metoda čišćenja
      description: Određuje kako se ljepilo treba očistiti (dok je mokro) s ruku/alata/površina.
    clear_glue_application_method:
      name: Metoda nanošenja prozirnog ljepila
      description: Određuje stil doziranja/aplikatora koji je uključen u pakiranje
        prozirnog ljepila.
    clear_glue_finish_after_drying:
      name: Prozirni ljepljivi premaz (nakon sušenja)
      description: Opisuje izgled ljepila nakon sušenja/stvrdnjavanja (primjerice
        kristalno čisto vs. prozirno, sjajno vs. mat).
    cleat_bolt_pattern:
      name: Uzorak vijaka za klinove
      description: Određuje konfiguraciju vijaka cipele koja se koristi za pričvršćivanje
        kopačke, što određuje kompatibilnost pedale i cipele (primjerice MTB s dva
        vijka u odnosu na cestovni bicikl s tri vijka).
    cleat_compatibility:
      name: Kompatibilnost krampona
      description: Određuje kojim sustavima pedala ili kopački odgovara navlaka za
        cipele.
    cleat_finish:
      name: Završna obrada kopačke
      description: Određuje površinsku završnu obradu/premaz pričvrsne ploče doka,
        što utječe na otpornost na koroziju i izgled.
    cleat_receptacle_system:
      name: Sustav prihvata za pričvrsne ploče
      description: Označava kompatibilno sučelje za pričvršćivanje kopački/šiljaka
        koje se koristi na cipelama za golf s kopačkama.
    cleat_release_mechanism:
      name: Mehanizam za otpuštanje krampona
      description: Određuje kako se kopča bicikla odvaja od pedale (primjerice jednostruko
        otpuštanje ili višesmjerno otpuštanje).
    cleat_stud_type:
      name: Vrsta klinova za kopčanje
      description: Određuje konstrukciju ili stil pričvršćivanja klinova/kopački na
        potplatu tenisica za američki nogomet.
    climate_control_module_function:
      name: Funkcija modula kontrole klime
      description: Određuje primarnu ulogu modula u HVAC sustavu vozila.
    climbing_hold_mounting_type:
      name: Vrsta montaže za penjanje
      description: Određuje kako je držač pričvršćen na zid ili ploču za trening.
    climbing_hold_type:
      name: Vrsta uporišta za penjanje
      description: Kategorizira oblčike ili stil držanja koji definiraju način na
        koji se hvata.
    climbing_protection_device_type:
      name: Vrsta uređaja za zaštitu tijekom penjanja
      description: Određuje stil zaštitnog uređaja (primjerice cam, matica, piton),
        pomažući penjačima da brzo pronađu ispravnu opremu za određeni stijenski element
        ili stil penjanja.
    climbing_rope_middle_marking:
      name: Srednja oznaka užeta za penjanje
      description: Opisuje kako se identificiraju središnja točka (i/ili krajevi)
        užeta kako bi se olakšalo sigurno spuštanje niz uže.
    climbing_rope_treatment:
      name: Tretman po užetu za penjanje
      description: Označava bilo koji vodoodbojni, suhi ili zaštitni premaz nanesen
        na omotač i/ili jezgru užeta.
    climbing_rope_type:
      name: Vrsta užeta za penjanje
      description: Klasificira uže prema UIAA certifikatu i namjeni (primjerice dinamičko
        jednostruko, polovično, dvostruko, statičko, pomoćno uže), što omogućuje kupcima
        da brzo pronađu odgovarajuće uže za svoju aktivnost.
    climbing_safety_certifications:
      name: Certifikati za sigurnost penjanja
      description: Navodi standarde penjanja i industrijske sigurnosti koje uređaj
        zadovoljava.
    clip_color:
      name: Isječak boja
      description: Primarna boja stezaljke za notni zapis.
    clip_mechanism_type:
      name: Vrsta mehanizma za kopčanje
      description: Definira mehanizam pričvršćivanja koji koristi kopča za novac ili
        digitalna lisnica za novac-kopču, pomažući kupcima da odaberu između magnetske,
        opružne, polužne i drugih stilova.
    clip_style:
      name: Stil isječka
      description: Označava specifični mehanizam kopče koji se koristi za pričvršćivanje
        držača, pružajući informacije o kompatibilnosti (primjerice krokodilska kopča,
        karabiner).
    clipper_motor_technology:
      name: Tehnologija motora stroja za šišanje
      description: Identificira dizajn motora koji se koristi u trimeru, utječući
        na snagu, buku, trajnost i održavanje.
    closet_configuration:
      name: Konfiguracija ormara
      description: Definira ukupne oblike ili izgled sustava garderobera (primjerice
        L-oblik, U-oblik, otok).
    closing_mechanism:
      name: Mehanizam za zatvaranje
      description: Određuje radnju zatvaranja ladice, kao što je standardno, meko
        zatvaranje, samozatvaranje ili otvaranje pritiskom.
    cloth_construction:
      name: Izrada platna
      description: Označava tkanje ili završnu obradu tkanine koja utječe na brzinu
        i trajnost (primjerice češljana vs. vunena).
    cloth_thickness:
      name: Debljina tkanine
      description: Označava debljinu/težinu krpe za poliranje.
    club_head_material:
      name: Materijal glave palice
      description: Određuje glavni materijal korišten u izradi glave palice.
    clutch_hydraulic_system_type:
      name: Vrsta hidrauličkog sustava spojke
      description: Označava kompatibilnost sustava aktiviranja spojke/hidrauličkog
        sustava (primjerice hidraulična spojka u odnosu na sajlu).
    clutch_line_connection_type:
      name: Vrsta spojke veza
      description: Određuje krajnje sučelje/priključak koje koristi cijev spojke (važno
        za kompatibilnost s glavnim/radnim cilindrima i tvrdim vodovima).
    clutch_pressure_plate_actuation_type:
      name: Vrsta pokretanja potisne ploče spojke
      description: Označava je li spojka otpuštena potiskim ili povlačećim mehanizmom
        za otpuštanje (aktiviranje membranskom oprugom).
    clutch_pressure_plate_release_mechanism_type:
      name: Vrsta mehanizma za otpuštanje potisne ploče spojke
      description: Stil sučelja za otpuštanje/aktiviranje koji koristi tlačna ploča.
    clutch_pressure_plate_surface_type:
      name: Vrsta površine potisne ploče spojke
      description: Stil kontaktne površine trenja tlačne ploče.
    clutch_slave_cylinder_connection_type:
      name: Vrsta priključka pomoćnog cilindra spojke
      description: Spoj hidrauličkog voda na radnom cilindru (priključak za niz poruka,
        brzi priključak, Banjo itd.).
    clutch_slave_cylinder_mounting_type:
      name: Vrsta montaže pomoćnog cilindra spojke
      description: Način montaže radnog cilindra na mjenjač/kućište zvona (primjerice
        pričvršćivanje vijcima, pričvršćivanje kopčom, integrirano koncentrično pričvršćivanje).
    coating_type:
      name: Vrsta premaza
      description: Označava bilo koji vanjski premaz, preljev ili glazuru nanesenu
        na žitnu pločicu (primjerice čokolada, jogurt).
    cocking_mechanism:
      name: Mehanizam napinjanja
      description: Određuje primarnu metodu ili uređaj koji se koristi za napinjanje
        ili spuštanje napona samostrela.
    cocktail_garnish_form:
      name: Obrazac za ukrašavanje koktela
      description: Opisuje kako se ukras prezentira/obrađuje za uporabu (primjerice
        svježi u odnosu na dehidrirani).
    cocktail_mix_variety:
      name: Raznovrsne mješavine za koktele
      description: Označava određeni koktel koji je mješavina namijenjena za izradu
        (primjerice Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Karakteristike salvete za koktele
      description: Highlight funkcionalne, praktične i ekološki prihvatljive značajke
        koktel salveta.
    cocktail_pick_tip_style:
      name: Stil vrha za odabir koktela
      description: Opisuje oblike/značajke vrha koji se koriste za probijanje ili
        držanje ukrasa.
    cocktail_pick_top_handle_style:
      name: Vrh/ručka za koktele
      description: Opisuje ukrasni gornji ili korisnički oblik koji se koristi za
        hvatanje ili prezentaciju.
    cocktail_type:
      name: Vrsta koktela
      description: Navodi specifičan recept ili stil koktela koji predstavlja prethodno
        pomiješani proizvod (primjerice Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Materijal za dršku/trzalicu kišobrana za koktele
      description: Materijal štapića/dijela za trzanje (osim nadstrešnice) koktel
        suncobrana.
    cocoa_processing_method:
      name: Način obrade kakaa
      description: Navodi kako je kakao u prahu obrađen (primjerice prirodni, nizozemski
        obrađeni, crni kakao).
    cocoa_product_form:
      name: Oblik proizvoda od kakaa
      description: Definira fizički oblik u kojem se kakao proizvod prodaje.
    coconut_husk_status:
      name: Status kokosove ljuske
      description: Označava stupanj u kojem je vanjska ljuska ili ljuska kokosa uklonjena,
        što utječe na jednostavnost upotrebe, skladištenja i otpada.
    coconut_maturity_stage:
      name: Faza zrelosti kokosa
      description: Identificira razvojnu fazu kokosa prilikom branja, što snažno utječe
        na okus, sadržaj vode i kulinarsku uporabu (npr, pijenje u odnosu na kuhanje).
    coconut_oil_refinement_type:
      name: Vrsta rafiniranja kokosovog ulja
      description: Označava rafiniranost ili stupanj kokosovog ulja, primjerice djevičansko,
        rafinirano, MCT, frakcionirano.
    coconut_preparation_form:
      name: Oblik za pripremu kokosa
      description: Određuje kako se kokos fizički priprema ili reže (cijeli, narezani,
        usitnjeni, pasirani itd.), pomažući kupvcima da brzo pronađu format potreban
        za recepte ili grickanje.
    coffee_bean_species:
      name: Vrste zrna kave
      description: Označava vrstu zrna kave koja se koristi u proizvodu.
    coffee_beverage_variety:
      name: Vrsta napitka od kave
      description: Klasificira gotove ili miješane napitke od kave prema stilu.
    coffee_processing_method:
      name: Način obrade kave
      description: Označava tehniku obrade nakon berbe koja se koristi na zrnima kave.
    coil_material:
      name: Materijal zavojnice
      description: Određuje primarni materijal ili vrstu mrežice koja se koristi u
        grijaćoj zavojnici, što utječe na okus, dugovječnost i kompatibilnost s regulacijom
        temperature.
    coil_spring_design:
      name: Dizajn spiralne opruge
      description: Određuje brzinu/oblike dizajna spiralne opruge koji utječe na karakteristike
        vožnje.
    coil_spring_finish_coating:
      name: Završna obrada/premaz spiralne opruge
      description: Površinska obrada ili premaz naneseni u svrhu zaštite od korozije.
    coil_spring_material:
      name: Materijal spiralne opruge
      description: Primarni materijal/sastav spiralne opruge.
    coil_system_type:
      name: Vrsta sustava zavojnica
      description: informacije o specifičnom sustavu opruga ili zavojnica koji se
        koristi u odgovarajućim madracima, kao što su džepičaste zavojnice ili Bonnell
        zavojnice.
    coil_type:
      name: Vrsta zavojnice
      description: Opisuje konstrukciju ili korištenu tehnologiju zavojnice, utječući
        na proizvodnju pare i okus.
    coin_grade_numismatic:
      name: Ocjena kovanice (numizmatika)
      description: Standardizirana ocjena kovanice (primjerice Sheldonova ljestvica
        ili pridjevna ocjena).
    coin_strike_or_finish:
      name: Kovanica ili završetak
      description: Vrsta kovanja ili završna obrada kovanice (primjerice business
        strike, proof).
    coin_strike_type:
      name: Vrsta udarca kovanice
      description: Opisuje vrstu kovanja/završne obrade kovanice (primjerice proof,
        business strike).
    collar_style:
      name: Stil ovratnika
      description: Definira dizajn ovratnika ili ruba izreza oko vrata na odjevnom
        predmetu.
    collectible_gun_accessories_included:
      name: Uključeni pribor za kolekcionarsko oružje
      description: Navodi pribor i dokumentaciju priloženu uz kolekcionarski pištolj
        (primjerice futrola, kutija, bajonet, papirologija).
    collectible_gun_firing_mechanism:
      name: Mehanizam za okidanje kolekcionarskog pištolja
      description: Određuje vrstu mehanizma za paljenje/opuštanje oružja za kolekcionarsko
        vatreno oružje (posebno antikne i povijesne komade).
    collectible_knife_blade_finish:
      name: Završna obrada oštrice kolekcionarskog noža
      description: Opisuje površinsku obradu/tretman oštrice za izgled (a ponekad
        i za otpornost na koroziju).
    color_code_system:
      name: Sustav kodiranja boja
      description: Identificira sustav boja koda koji se koristi za numeričku referencu
        boje niza poruke (primjerice DMC, Anchor), ako je primjenjivo.
    color_coding_standard:
      name: standard kodiranja boja
      description: Označava slijedi li pločica međunarodni kod boja (primjerice IWF
        ili IPF) ili neku drugu shemu.
    color_effect:
      name: Efekt boja
      description: Određuje posebne tehnike bojanja ili efekte primijenjene na ekstenzije
        za kosu.
    color_family:
      name: Obitelj boja
      description: Obitelj boja visoke razine za sumi tintu (korisno kada je boja
        previše granularna, primjerice toplo crna u odnosu na plavo-crnu).
    color_finish:
      name: Završna obrada boje
      description: Određuje završnu obradu vidljivih komponenti štitnika za ruke (primjerice mat
        u odnosu na sjaj) kada sama boja nije dovoljna.
    coloring_finish:
      name: Završna obrada bojanja
      description: Određuje vizualnu završnu obradu ili poseban efekt koji se proizvodi
        bojom, kao što je metalik ili neon.
    comb_material:
      name: Materijal češlja
      description: Materijal češlja harmonike (tijelo koje tvori zračne komore).
    comb_type:
      name: Vrsta češlja
      description: Klasificira češljeve za njegu konja prema njihovom primarnom funkcionalnom
        stilu (primjerice češalj za curry, češalj za grivu, češalj za povlačenje),
        pomažući kupcima da brzo pronađe pravi alat za specifične potrebe njege.
    combat_shorts_cut_style:
      name: Stil borbenih kratkih hlača
      description: Označava kroj ili stil kroja specifičan za kratke hlače za borilačke
        sportove (primjerice visoki kroj, retro kroj, sažimanje).
    comic_creator_role:
      name: Uloga kreatora stripa
      description: Označava ulogu kreatora relevantnu za oglas (primjerice pisac,
        umjetnik).
    commemorative_coin_finish:
      name: Izgled prigodne kovanice
      description: Opisuje vrstu kovanja/završne obrade komemorativnog kovanog novca.
    commemorative_coin_mint_mark:
      name: Oznaka kovnice prigodnog kovanog novca
      description: Označava oznaku kovnice (ili nema oznake kovnice) na kovanici.
    commemorative_subject:
      name: Komemorativni predmet
      description: Primarni komemorirani subjekt (događaji, osoba, mjesto, godišnjica,
        organizacija itd.).
    commercial_vehicle_class:
      name: Klasa gospodarskog vozila
      description: Regulatorna/industrijska klasa temeljena na GVWR-u koja se koristi
        za opis težinske klase komercijalnog vozila za pregledavanje i filtriranje.
    compass_damping_medium:
      name: Srednje prigušenje kompasa
      description: Označava medij koji se koristi za stabilizaciju kretanja igle unutar
        kapsule kompasa.
    compass_illumination_type:
      name: Vrsta osvjetljenja kompasa
      description: Određuje kako su oznake kompasa vidljive u uvjetima slabog osvjetljenja
        (primjerice luminiscentna boja, tricij, LED pozadinsko osvjetljenje).
    compass_mounting_style:
      name: Stil montiranja kompasa
      description: Opisuje kako se kompas nosi, nosi ili instalira.
    compass_scale_units:
      name: Jedinice skale kompasa
      description: Označava mjerne jedinice (stupnjeve, mile ili oboje) označene na
        kućištu kompasa.
    compatible_abs_system:
      name: Kompatibilni ABS sustav
      description: Označava je li glavni cilindar namijenjen za vozila opremljena
        ABS-om.
    compatible_adapter_brand:
      name: Kompatibilna marka prilagodnika
      description: Označava oznaku glave palice za golf čiji je prilagodnik unaprijed
        konfiguriran da odgovara osovini.
    compatible_airbag_system_type:
      name: Kompatibilna vrsta sustava zračnih jastuka
      description: Označava generaciju/skup značajki sustava zračnih jastuka s kojom
        je dio kompatibilan (primjerice jednostupanjski vs. dvostupanjski).
    compatible_amplifier_fit_method:
      name: Kompatibilna metoda prilagodbe pojačala
      description: Označava kako je definirana kompatibilnost za navlaku/kutiju (univerzalno
        pristajanje u odnosu na ono specifično za model ili na ono po dimenziji).
    compatible_apparatus:
      name: Kompatibilna aparatura
      description: Određuje gimnastičku opremu ili aktivnost za koju su hvataljke
        namijenjene.
    compatible_archery_tool:
      name: Kompatibilni alat za streličarstvo
      description: Označava primarni alat ili dio opreme za streličarstvo s kojim
        je pribor dizajniran za rad.
    compatible_axle_size:
      name: Kompatibilna veličina osovine
      description: Određuje promjer glavčine/osovine ili standard niz poruka kojem
        je nožni oslonac dizajniran (primjerice 10 mm/3⁄8 inča, 14 mm, 3/8 inča 26
        TPI).
    compatible_axle_type:
      name: Kompatibilna vrsta osovine
      description: Označava standard(e) pričvršćivanja stražnje osovine trenažera,
        kao što je veličina brzootpuštajuće ili utorne osovine.
    compatible_axle_weight_rating:
      name: Kompatibilna nazivna težina osovine
      description: Određuje nazivnu nosivost osovine prikolice (nosivost po osovini)
        za koju je kočioni sklop prikolice dizajniran.
    compatible_bait_type:
      name: Kompatibilna vrsta mamca
      description: Identificira vrste mamaca za ribolov s kojima je bušilica kompatibilna
        kako bi ribolovci mogli odabrati alat koji odgovara njihovom preferiranom
        mamcu.
    compatible_bass_scale_length:
      name: Kompatibilna duljina bas skale
      description: Označava duljinu(e) skale basa za koju je namijenjen niz set (važno
        za pravilnu duljinu namotavanja i pristajanje).
    compatible_battle_top_system:
      name: Kompatibilni sustav borbenog vrha
      description: Identificira ekosustav ili seriju za koju je vrh dizajniran (koristi
        se za osiguranje kompatibilnosti dijelova i arene).
    compatible_bb_size:
      name: Kompatibilna veličina BB-a
      description: Označava promjer airsoft kuglica proizvod podrške.
    compatible_bed_frame_style:
      name: Kompatibilni stil okvira kreveta
      description: Određuje stil kreveta ili okvir kojem je pribor namijenjen.
    compatible_bicycle_tire_type:
      name: Kompatibilni tip biciklističke gume
      description: Određuje koje vrste biciklističkih guma proizvod može popraviti
        ili zabrtviti.
    compatible_bike_component:
      name: Kompatibilna komponenta bicikla
      description: Određuje za koju komponentu bicikla je alat ili proizvod namijenjen
        servisiranju.
    compatible_billiard_game:
      name: Kompatibilna igra biljara
      description: Identificira format(e) biljar igre za koje je stalak dizajniran,
        osiguravajući da kupci odaberu stalak koji odgovara njihovoj igri.
    compatible_billiard_table_size:
      name: Kompatibilna veličina biljarskog stola
      description: Određuje standardnu duljinu(e) stola kojoj je navlaka dizajnirana,
        osiguravajući da kupci odaberu navlaku odgovarajuće veličine za svoj biljarski
        stol.
    compatible_bit_type:
      name: Kompatibilna vrsta žvala
      description: Vrste nastavaka s kojima se može koristiti štitnik.
    compatible_blade_hosel:
      name: Kompatibilan hosel za oštricu
      description: Označava stil crijeva/konusa oštrice koji osovina prihvaća, osiguravajući
        da osovina i oštrica pravilno pristaju jedna drugoj.
    compatible_blade_system:
      name: Kompatibilan sustav oštrice
      description: 'Označava sustav/format zamjenske oštrice koji nož prihvaća (primjerice
        standardni hobby #11, Segmenti oštrice koje se lome).'
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibilni tkalački stan za tkanje brodova
      description: S kojim vrstama razboja je namijenjen brodski shuttle?
    compatible_bobbin_type:
      name: Kompatibilna vrsta špule
      description: Označava za koju vrstu špulice/kaluma je brodski shuttle namijenjen.
    compatible_bottle_mouth:
      name: Kompatibilno usta boce
      description: Vrsta ili promjer grla boce kojem je slamka ili čep dizajniran
        da odgovara.
    compatible_bow_attachment_system:
      name: Kompatibilni sustav za pričvršćivanje luka
      description: Označava sučelje uda ili pribora za koje je dio dizajniran (primjerice
        ILF, vijčani spoj, brzo odvajanje).
    compatible_bow_crossbow_type:
      name: Kompatibilni tip luka/samostrela
      description: Označava stil luka ili samostrela kojem je pribor dizajniran.
    compatible_brake_fluid:
      name: Kompatibilna tekućina za kočnicu
      description: DOT specifikacija(e) kočione tekućine s kojom su brtve/materijali
        glavnog kočionog cilindra dizajnirani da budu kompatibilni.
    compatible_brake_pad:
      name: Kompatibilna kočiona pločica
      description: Označava za koje je spojeve kočionih pločica rotor odobren, osiguravajući
        sigurnost i optimalno trošenje.
    compatible_brake_service_system:
      name: Kompatibilni sustav servisiranja kočnica
      description: Određuje je li dio namijenjen za disk kočnice, bubanj kočnice ili
        oboje.
    compatible_brake_system:
      name: Kompatibilan sustav kočnice
      description: Navodi ključne napomene o kompatibilnosti sustava za korištenje
        kočione tekućine.
    compatible_brake_type:
      name: Kompatibilna vrsta kočnice
      description: Određuje vrstu kočnice s kojom je stalak kompatibilan, kao što
        je disk ili obruč kočnice.
    compatible_brass_instrument_finish:
      name: Kompatibilna završna obrada za limeno puhačko glazbalo
      description: Određuje na kojim je završnim obradama limenih instrumenata sredstvo
        za čišćenje sigurno za korištenje bez oštećenja završne obrade.
    compatible_building_toy_system:
      name: Kompatibilni sustav igračaka za gradnju
      description: Označava s kojim je sustavom/standardom gradnje igračka kompatibilna
        (ili ekvivalentne veličine), kao što je LEGO-kompatibilno ili vlasnički.
    compatible_capo_fretboard_radius:
      name: Kompatibilni radijus praga kapodastra
      description: Određuje radijus/profil praga kojem je kapo dizajniran za optimalni
        kontakt i stabilnost ugađanja.
    compatible_capo_number_of_strings:
      name: Kompatibilni broj kapodastra od NIZ-a
      description: Označava za koliko je niza kapo dizajniran da stegne (korisno za
        instrumente od 6, 7, 8, 12 niza i specijalne instrumente).
    compatible_cardio_machine_type:
      name: Kompatibilna vrsta sprave za cardio
      description: Označava vrstu kardio uređaja za koji je pribor ili dio namijenjen
        za rad.
    compatible_chain_link_type:
      name: Kompatibilna vrsta lančane karike
      description: Označava stil lančane karike koju podržava alat (standardna, polu-karika,
        brza karika itd.).
    compatible_chain_size:
      name: Kompatibilna veličina lanca
      description: Određuje standarde širine lanca ili koraka (primjerice 1/8 inča,
        3/32 inča) za podršku alata.
    compatible_chain_width:
      name: Kompatibilna širina lanca
      description: Označava veličinu lanca s kojom je slobodni kotač dizajniran za
        rad.
    compatible_chip_denomination:
      name: Kompatibilna apoen čipa
      description: Označava koje apoene čipova pladanj/kutija uključuje etiketu ili
        namjenske pozicije za (ili je namijenjena organiziranju).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatibilna ligatura za usnik klarineta
      description: Označava standard pristajanja ligature ili napomene o kompatibilnosti
        za usnik.
    compatible_classical_guitar_string_scale_length:
      name: Kompatibilna duljina skale niz za klasičnu gitaru
      description: Namijenjena kompatibilnost duljine skale/duljine niza gitare za
        set.
    compatible_clay_target_size:
      name: Kompatibilna veličina glinene mete
      description: Navodi veličine ili oblike glinenih meta koje bacač može prihvatiti
        za pravilno pristajanje i izvedbe.
    compatible_cleat_system:
      name: Kompatibilan sustav krampona
      description: Određuje sučelje kopči ili uzorak vijaka pedale kako bi vozači
        mogli uskladiti svoje cipele s ispravnim sustavom.
    compatible_clipless_pedal_system:
      name: Kompatibilan sustav pedala bez kopči
      description: Označava specifični standard pedala/kopča bez kopči za koji je
        proizvod dizajniran za interakciju.
    compatible_clutch_type:
      name: Kompatibilni tip spojke
      description: Kompatibilnost sučelja spojke za zamašnjak (gdje je primjenjivo).
    compatible_coffee_pod_system:
      name: Kompatibilni sustav s kapsulama za kavu
      description: Određuje aparat za kavu ili sustav za kuhanje za koji su namijenjene
        kapsule ili podloge.
    compatible_construction_set_system:
      name: Kompatibilni sustav konstrukcijskih setova
      description: Označava s kojim je građevinskim sustavom/marka ekosustavom set
        kompatibilan (primjerice kompatibilan s LEGO-om, kompatibilan s DUPLO-om).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibilni klin/stalak za kontrabas klarinet
      description: Označava potreban sučelje stalka/klina ili stil podrške.
    compatible_coolant_chemistry:
      name: Kompatibilna kemija rashladne tekućine
      description: Određuje s kojim je obiteljima rashladnih tekućina aditiv formuliran
        da bude kompatibilan.
    compatible_cooling_system_material:
      name: Kompatibilni materijal sustava hlađenja
      description: Određuje za koje je sustave/materijale hlađenja ispiranje hladnjaka
        sigurno (primjerice aluminijski radijatori, sustavi s miješanim metalima).
    compatible_crib_format:
      name: Kompatibilni format dječjeg krevetića
      description: Definira opću veličinu ili kategoriju oblika madraca ili plahte
        kojoj je dodatak namijenjen.
    compatible_cross_stitch_fabric_count:
      name: Kompatibilni broj tkanina za križni bod
      description: Preporučena gustoća/gustoće tkanine za šivanje dizajna.
    compatible_cross_stitch_frame:
      name: Kompatibilni okvir za križni vez
      description: Označava za što je Frame namijenjen (ručna uporaba, stolni stalak,
        podni stalak ili univerzalni).
    compatible_crossbar:
      name: Kompatibilna prečka
      description: Kompatibilnost stalaka s prečkama stalaka na krovu vozila (ako
        su montirani na krov), uključujući standarde oblika/profila prečke.
    compatible_cycling_cleat:
      name: Kompatibilne biciklističke kopačke
      description: Određuje sustav kopački ili pedala s kojim su biciklističke cipele
        dizajnirane.
    compatible_cymbal_size:
      name: Kompatibilna veličina činele
      description: Određuje predviđeni (ili maksimalni) promjer činele za koji je
        kutija dizajnirana; ovo je kompatibilnost za veličinu činele, a ne vanjski
        promjer kutije.
    compatible_device_type:
      name: Kompatibilna vrsta uređaja
      description: Označava za koju vrstu uređaja je nosač namijenjen (primjerice
        monitor/TV, tablet, pametni telefon, prijenosni DVD player).
    compatible_dock_structure_type:
      name: Kompatibilna vrsta strukture dock
      description: Konstrukcija dock na koju se stepenice trebaju montirati.
    compatible_dough_type:
      name: Kompatibilna vrsta tijesta
      description: Određuje za koje vrste/marke tijesta su alati namijenjeni za rad
        (primjerice standardno tijesto za plastelin, glina za modeliranje).
    compatible_drawing_ink_surface:
      name: Kompatibilna površina s tintom za crtanje
      description: Označava preporučene površine/podloge za najbolju učinkovitost.
    compatible_drivetrain_brand:
      name: Kompatibilna marka pogona
      description: Navodi oznaku pogonskog sklopa ili kočionog sustava za koji je
        kabel dizajniran.
    compatible_drivetrain_speeds:
      name: Kompatibilne brzine pogonskog sklopa
      description: Određuje broj brzina pogonskog sklopa (primjerice 10 brzina) za
        podršku radilice ili lančanika.
    compatible_equipment:
      name: Kompatibilna oprema
      description: Određuje vrstu opreme za zimske sportove za koju je škripac namijenjen.
    compatible_evap_system:
      name: Kompatibilan EVAP sustav
      description: Označava je li čep goriva dizajniran sukladno zahtjevima EVAP sustava
        (primjerice brtvljenje prema specifikacijama proizvođača originalne opreme)
        i smanjuje broj lampica za provjeru motora.
    compatible_exercise_bike_style:
      name: Kompatibilan stil sobnog bicikla
      description: Označava za koje vrste bicikala za vježbanje je pribor ili zamjenski
        dio namijenjen.
    compatible_fencing_weapon:
      name: Kompatibilno oružje za mačevanje
      description: Određuje za koje je mačevalačko oružje ili disciplinu namijenjena
        jakna ili lamé.
    compatible_fiber_type:
      name: Kompatibilna vrsta vlakna
      description: Primarne vrste vlakana koje bubanj za grebenanje treba učinkovito
        obrađivati.
    compatible_fin_box_system:
      name: Kompatibilan sustav kutije za peraju
      description: Označava kutiju za peraje ili sustav montaže za koji je peraja
        dizajnirana, pomažući surferima da kupe peraje koje su kompatibilne s njihovom
        daskom za surfanje (primjerice FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Kompatibilan radijus vrata glazbala
      description: Određuje radijus hvataljke (ravni, zakrivljeni ili složeni) kojem
        je kapo dizajniran za ravnomjeran pritisak i smanjeno zujanje.
    compatible_finish_type:
      name: Kompatibilna vrsta završne obrade
      description: Označava za koje vrste završne obrade instrumenata je sprej siguran.
    compatible_fishing_reel_type:
      name: Kompatibilni tip ribolovne role
      description: Određuje vrstu ribolovne role za koju je pribor dizajniran ili
        s kojom radi (primjerice spinning, baitcasting, mušičarenje).
    compatible_fly_line_weight:
      name: Kompatibilna težina mušičarske strune
      description: Označava težine AFTMA mušičarske strune za koje je špula dizajnirana.
    compatible_flywheel_type:
      name: Kompatibilna vrsta zamašnjaka
      description: Određuje tip zamašnjaka s kojim se namjerava koristiti tlačna ploča
        spojke.
    compatible_football_kick_type:
      name: Kompatibilna vrsta nogometnog udarca
      description: Identificira situacije udaranja koje proizvod podržava (primjerice
        početni udarac, gol iz igre), pomažući sportašima da brzo pronađu odgovarajuću
        opremu.
    compatible_fuel_system_type:
      name: Kompatibilna vrsta sustava za gorivo
      description: Određuje sustav dostave goriva za koji je čistač namijenjen.
    compatible_gas_type:
      name: Kompatibilna vrsta plina
      description: Označava vrstu komprimiranog plina za koji je namijenjen spremnik
        zraka za paintball.
    compatible_gel_wax_additives:
      name: Kompatibilni aditivi za gel vosak
      description: Određuje koje su vrste aditiva kompatibilne s ovim gel voskom (primjerice
        vrsta boje, ugrađeno).
    compatible_glaze_layering:
      name: Kompatibilno nanošenje glazure
      description: Je li glazura namijenjena za nanošenje u slojevima s drugim glazurama
        radi postizanja efekata.
    compatible_golf_bag_type:
      name: Kompatibilna vrsta torbe za golf
      description: Označava kojim formatima golf torbi odgovara navlaka ili kutija.
    compatible_ground_polarity:
      name: Kompatibilni polaritet uzemljenja
      description: Označava je li regulator napona namijenjen za električne sustave
        vozila s negativnim ili pozitivnim uzemljenjem (ili nije osjetljiv na polaritet).
    compatible_guitar_body_shape:
      name: Kompatibilan oblik tijela gitare
      description: Označava kojem tijelu/obliku gitare kutija odgovara.
    compatible_guitar_case:
      name: Kompatibilna kutija za gitaru
      description: Određuje u koje stilove kutija za gitaru ovlaživač zraka odgovara
        i u koje pravilno radi.
    compatible_guitar_scale_length:
      name: Kompatibilna duljina skale za gitaru
      description: Označava koju duljinu skale gitare set niza treba koristiti (na
        temelju duljine namotaja/ukupne duljine).
    compatible_gun_platform:
      name: Kompatibilna platforma za pištolj
      description: Određuje operativnu platformu ili izvor napajanja s kojim je proizvod
        kompatibilan (primjerice AEG, GBB, HPA).
    compatible_hair_length:
      name: Kompatibilna duljina kose
      description: Određuje maksimalnu duljinu ili volumen kose koji pokrivalo za
        glavu udobno može primiti.
    compatible_head_and_neck_restraint_system:
      name: Kompatibilan sustav za zaštitu glave i vrata
      description: Označava uključuje li kaciga sidrišne točke i/ili je kompatibilna
        sa sustavima za zadržavanje glave i vrata (primjerice HANS), uključujući status
        uključivanja/ugradnje sidrišnih cijevi.
    compatible_helmet_certification_standard:
      name: Standard certifikacije kompatibilne kacige
      description: Označava bilo koji sigurnosni standard za kacigu ili kontekst certifikacije
        koji dodatak treba podržati (primjerice trake za skidanje za uporabu na utrkama
        često se odnose na specifična pravila sankcioniranja).
    compatible_helmet_shell_size:
      name: Kompatibilna veličina školjke kacige
      description: Označava kojoj veličini školjke kacige odgovara zamjenski unutarnji
        dio (veličina školjke često odgovara rasponima veličina poput XS–S, M, L–XL).
    compatible_helmet_size:
      name: Kompatibilna veličina kacige
      description: Označava veličinu kacige s kojom je maska za lice kompatibilna.
    compatible_helmet_type:
      name: Kompatibilna vrsta kacige
      description: Kategorija kacige za koju je podrška za vrat dizajnirana.
    compatible_hitch_receiver_size:
      name: Kompatibilna veličina prijamnika kuke
      description: Veličina otvora prijemnika kuke koju pribor dizajniran je da odgovara
        (za stalak pribor montiran na kuku).
    compatible_hook_size:
      name: Kompatibilna veličina kuke
      description: Sustav(i) veličina kukica i/ili raspon veličina za koje je organizator
        dizajniran da odgovara (primjerice veličina američkih slova/brojki, raspon
        mjernih podataka mm).
    compatible_horse_coat_type:
      name: Kompatibilna vrsta konjske dlake
      description: Određuje karakteristike dlake konja za koje je stroj za uklanjanje
        dlake najprikladniji (primjerice gusta zimska dlaka ili osjetljiva dlaka).
    compatible_host_platform:
      name: Kompatibilne platforme smještene na poslužitelju
      description: Određuje s kojom je platformom smještena na poslužitelju ili vrstom
        uređaja kompatibilan pad voditelj obrade (primjerice Windows, macOS, iOS,
        Android) ili može li raditi samostalno bez računala.
    compatible_inflation_gas:
      name: Kompatibilni plin za napuhavanje
      description: Određuje čime se balon treba napuhati (zrakom, helijem ili bilo
        kojim od njih).
    compatible_injection_type:
      name: Kompatibilna vrsta mlaznice
      description: Označava koji sustav ubrizgavanja goriva proizvod treba čistiti.
    compatible_instrument_surface_material:
      name: Kompatibilna površina/materijal instrumenta
      description: Označava na kojim se površinama/materijalima instrumenata sredstvo
        za poliranje namjerava koristiti.
    compatible_intercom_system:
      name: Kompatibilni interfonski sustav
      description: Označava spremnost/kompatibilnost kacige za montažu ili ugradnju
        interfonskog/komunikacijskog sustava za kacigu.
    compatible_interior_material:
      name: Kompatibilni unutarnji materijal
      description: Označava za koje je materijale unutrašnjosti vozila sredstvo za
        uklanjanje mrlja sigurno/učinkovito (npr. tepih, presvlake od tkanine, koža,
        vinil).
    compatible_kayak_type:
      name: Kompatibilna vrsta kajaka
      description: Navodi općenite stilove kajaka na koje je jedarni komplet namijenjen
        za montažu.
    compatible_license_plate_hole_pattern:
      name: Kompatibilni uzorak rupa za registarsku pločicu
      description: Određuje konfiguraciju montažne rupe koju podržava nosač/držač
        (strana vozila i/ili strana pločice).
    compatible_license_plate_size:
      name: Kompatibilna veličina registarske ploče
      description: Označava regionalnu ili dimenzionalnu veličinu (veličine) za koju
        je nosač/držač dizajniran.
    compatible_loom:
      name: Kompatibilni razboj
      description: Određuje vrstu(e) tkalačkog stana s kojim se namjerava koristiti
        ravni tkalački metlica.
    compatible_loom_type:
      name: Kompatibilna vrsta tkalačkog stana
      description: Označava tkalačke postavke za koje je namijenjena upotreba metlice
        (npr. kruti tkalački stanovi za osjeku u odnosu na tkalačke stanove za tapiserije).
    compatible_machine_type:
      name: Kompatibilna vrsta stroja
      description: Označava za koju vrstu prošivanja je okvir namijenjen (samo ručno
        prošivanje, domaći šivaći stroj, stroj za prošivanje s dugom rukom).
    compatible_mast_type:
      name: Kompatibilna vrsta jarbola
      description: 'Određuje za koje je promjere jarbola jedro dizajnirano: smanjeni
        promjer (RDM), standardni promjer (SDM) ili oboje.'
    compatible_model_system_train_scale:
      name: Kompatibilni modelni sustav (vaga za vlak)
      description: Određuje mjerilo/sustav modela vlaka kojem pribor odgovara kada
        je primjenjivo (npr. HO, N, O).
    compatible_mounting_surface:
      name: Kompatibilna površina za montažu
      description: Površina ili predmet na koji se kopča treba pričvrstiti.
    compatible_mouthpiece_patch:
      name: Kompatibilni flaster za usnik
      description: Označava je li usnik namijenjen za upotrebu s jastučićima/flasterima
        za usnik i preporučeni raspon debljine flastera.
    compatible_mouthpiece_type:
      name: Kompatibilna vrsta usnika
      description: Označava za koju vrstu usnika/držač je melofon namijenjen (obično
        prijamnici u stilu francuskog roga ili trube, ovisno o modelu).
    compatible_neck_profile_width:
      name: Kompatibilni profil/širina vrata
      description: Označava profil/širinu vrata gitare kojoj je kapo dizajniran (primjerice
        uski, za električnu gitaru u odnosu na široki, za klasičnu gitaru).
    compatible_needle_size:
      name: Kompatibilna veličina igle
      description: Označava veličine/vrste igala za koje je kutija namijenjena (npr.
        za vez, tapiseriju, duljine igala za ručno šivanje).
    compatible_needle_system:
      name: Kompatibilan sustav igala
      description: Sustav(i) igala s kojima je stroj kompatibilan (npr. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibilni mehanizam parkirne kočnice
      description: Označava je li čeljust dizajnirana za rad s integriranim mehanizmom
        parkirne kočnice.
    compatible_pedal_instrument_type:
      name: Kompatibilni tip pedalnog instrumenta
      description: Određuje za što se pedala namjerava koristiti (primjerice digitalni
        klavir, klavijatura/sintetizator, MIDI voditelj obrade).
    compatible_pedal_type:
      name: Kompatibilna vrsta pedale
      description: Označava stil pedale ili sustav kojem je remen ili kopča dizajnirana
        (primjerice platforma, SPD, Look Keo).
    compatible_pin_type:
      name: Kompatibilna vrsta igle
      description: Za koju vrstu prikačenog materijala je prostirka namijenjena (ili
        je li prikačeno-sposobna).
    compatible_pipe_filter_size:
      name: Kompatibilna veličina filtra za cijevi
      description: Označava veličinu ili stil filtra koji cijev može prihvatiti (ili
        da filtar nije potreban).
    compatible_plate_size:
      name: Kompatibilna veličina ploče
      description: Dimenzija balističke ploče ili standardizirana veličina koju prsluk
        može prihvatiti.
    compatible_play_vehicle_scale:
      name: Kompatibilan omjer igračke vozila
      description: Označava mjerilo igračke za koje je pribor dizajniran (primjerice
        1:64), što poboljšava prikladnost/kompatibilnost za kolekcionare i pratiti
        sustave.
    compatible_playing_surface:
      name: Kompatibilna površina za igranje
      description: Označava vrstu igrališta ili površine za koju su dizajnirane tenisice
        za američki nogomet.
    compatible_pole_dimensions:
      name: Kompatibilne dimenzije polova
      description: Određuje veličinu presjeka pola kojem pribor odgovara.
    compatible_pole_shape:
      name: Kompatibilan oblik štapa
      description: Određuje oblik presjeka štapa ili stupa kojem je podložak dizajniran
        da odgovara.
    compatible_power_steering_system:
      name: Kompatibilan sustav servo upravljanja
      description: Označava vrstu(e) sustava upravljanja za koje je tekućina namijenjena.
    compatible_powerplant_type:
      name: Kompatibilni tip pogonskog agregata
      description: Označava pogonski sustav zračne puške za koji je dio namijenjen
        (primjerice opružno-klipni, CO2, PCP).
    compatible_presser_foot:
      name: Kompatibilna pritisna stopica
      description: Označava sustav pričvršćivanja/kompatibilnosti pritisne stopice
        koji podržava šivaći stroj (npr. pričvršćivanje na kopčanje u odnosu na pričvršćivanje
        vijcima; nisko/visoko/koso pričvršćivanje). Koristite 'Universal/Multiple'
        ako je podržano više sustava ili su uključeni adapteri.
    compatible_protective_gear:
      name: Kompatibilna zaštitna oprema
      description: Određuje s kojom drugom zaštitnom opremom je ortoza za vrat namijenjena
        za rad.
    compatible_protective_gear_integration:
      name: Integracija kompatibilne zaštitne opreme
      description: Opisuje kako se štitnik namjerava nositi ili integrirati s drugom
        opremom (primjerice umetnuti džep, samostalni remen).
    compatible_punching_bag_type:
      name: Kompatibilna vrsta vreće za udaranje
      description: Označava s kojim je stilovima vreća za udaranje ili trening proizvod
        kompatibilan.
    compatible_racing_discipline:
      name: Kompatibilna trkaća disciplina
      description: Disciplina(e) motosporta za koju je kaciga namijenjena/certificirana.
    compatible_rc_scale:
      name: Kompatibilna RC vaga
      description: Označava omjer RC skale (primjerice 1:10) za koji je pribor ili
        dio dizajniran da odgovara.
    compatible_recorder_size:
      name: Kompatibilna veličina blokflaute
      description: Određuje za koju veličinu snimača je kutija dizajnirana.
    compatible_recorder_type:
      name: Kompatibilna vrsta blokflaute
      description: Određuje vrstu blok-flaute (obitelj/veličina) s kojom je pribor
        kompatibilan (primjerice sopran, alt).
    compatible_reed_cut:
      name: Kompatibilan rez jezička
      description: Određuje s kojim stilom reza jezička ligatura treba biti kompatibilna
        (npr. ispunjena/francuski rez vs. neispunjena/američki rez).
    compatible_reed_type:
      name: Kompatibilna vrsta jezička
      description: Određuje rez/vrstu trske za koju je usnik dizajniran.
    compatible_reel_type:
      name: Kompatibilna vrsta role
      description: Određuje vrstu ribolovne role kojoj je torba, kutija ili poklopac
        dizajniran da odgovara.
    compatible_refrigerant_type:
      name: Kompatibilna vrsta rashladnog sredstva
      description: Označava s kojim rashladnim sredstvom se isparivač klima uređaja
        namjerava koristiti.
    compatible_ride_equipment:
      name: Kompatibilna oprema za vožnju
      description: Vrste sportske opreme na kotačima za koju je rampa namijenjena.
    compatible_roof_height:
      name: Kompatibilna visina krova
      description: Označava za koji je profil krova pokrov dizajniran (standardni
        vs. produženi/visoki krov).
    compatible_roof_rail_type:
      name: Kompatibilna vrsta šine za krov
      description: Određuje na koju konfiguraciju krova je osnovni stalak sustav namijenjen
        za pričvršćivanje.
    compatible_rope_count:
      name: Kompatibilan broj užeta
      description: Određuje konfiguraciju užeta za boksački ring za koju je dio dizajniran,
        kao što su prstenovi s tri užeta, prstenovi sa četiri užeta ili univerzalni
        oblik.
    compatible_rope_type:
      name: Kompatibilna vrsta užeta
      description: Određuje koje se konstrukcije užeta mogu koristiti s uređajem.
    compatible_saddle_type:
      name: Kompatibilna vrsta sedla
      description: Određuje stil sedla ili disciplinu jahanja kojoj je dodatak dizajniran,
        osiguravajući ispravnu kompatibilnost s engleskim, zapadnjačkim i drugim sedlima.
    compatible_saxophone_size:
      name: Kompatibilna veličina saksofona
      description: Označava s kojom veličinom saksofona je proizvod kompatibilan (primjerice
        sopran, alt, tenor).
    compatible_saxophone_type:
      name: Kompatibilna vrsta saksofona
      description: Određuje za koji saksofon je ligatura/kapa dizajnirana.
    compatible_scale_length:
      name: Kompatibilna duljina skale
      description: Označava raspon duljine ljestvice gitare za koji su nizovi namijenjeni
        (primjerice kratka ljestvica, standardna, bariton).
    compatible_seat_airbag:
      name: Kompatibilni zračni jastuk sjedala
      description: Označava sadrži li sjedalo bočne zračne jastuke ili je kompatibilno
        s vozilima opremljenima zračnim jastucima ugrađenim u sjedalo.
    compatible_seating_capacity:
      name: Kompatibilan kapacitet sjedenja
      description: Određuje broj sjedala ili konfiguraciju za koju je pribor dizajniran.
    compatible_sensor_port_type:
      name: Kompatibilni tip osjetnog priključka
      description: Određuje podržava li karter ulje senzore razine ulja i/ili temperature
        ulja i tip otvora ako je primjenjivo.
    compatible_shifter_type:
      name: Kompatibilna vrsta mjenjača
      description: Označava vrstu ili konfiguraciju mjenjača kojoj je namijenjena
        manžeta mjenjača.
    compatible_shis:
      name: Kompatibilni SHIS
      description: Navodi kod(ove) Standardiziranog sustava za identifikaciju slušalica
        (SHIS) kojima dio odgovara (primjerice IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Kompatibilna disciplina klizanja/rolanja
      description: Označava disciplinu(e) klizanja za koju je dio ili dodatak dizajniran.
    compatible_snowshoe_deck_type:
      name: Kompatibilni tip palube za krplje
      description: Određuje okvir krplja ili stil daske s kojim je vez kompatibilan.
    compatible_special_effects_lighting_features:
      name: Kompatibilne značajke rasvjete za specijalne efekte
      description: Highlight uobičajene zastavice mogućnosti koje utječu na odluke
        o kupnji efektnih svjetala (izvan boja/uzoraka), kao što su povezivanje jedinica
        ili reagiranje na zvuk.
    compatible_spinning_wheel_drive_system:
      name: Kompatibilni sustav pogona na kotače za okretanje
      description: Određuje koji(e) sustav(e) pogona na prednje kotače podržava dodatna
        oprema.
    compatible_spoke_gauge:
      name: Kompatibilni mjerač žbica
      description: Označava veličinu žice žbice i prianjanje navoja niplova, što kupcima
        omogućuje pravilno uparivanje žbica i niplova.
    compatible_steering_wheel_airbag:
      name: Kompatibilni zračni jastuk volana
      description: Označava da li volan podržava originalni modul zračnog jastuka
        (ili je namijenjen za primjenu bez zračnog jastuka).
    compatible_steering_wheel_control_button:
      name: Kompatibilne tipke za upravljanje na volanu
      description: Označava kompatibilnost s tvornički ugrađenim kontrolama na upravljaču
        (audio/tempomat/telefon) i pripadajućim ožičenjem.
    compatible_stencil_material:
      name: Kompatibilan materijal šablone
      description: Materijali od kojih stroj može izrađivati šablone ili ih obrađivati
        (npr. papir, plastična folija, PET folija).
    compatible_stencil_media_format:
      name: Kompatibilni format medija šablona
      description: 'Označava koji oblik šablone medijski sadržaj čini podrška stroja:
        listovi, role ili oboje.'
    compatible_strap_retractor:
      name: Kompatibilni retraktor remena
      description: Označava je li remen kompatibilan s uvlačivim sustavima ili je
        namijenjen za neuvlačive (statične) pojaseve.
    compatible_string_instrument_finish:
      name: Kompatibilna završna obrada žičanog glazbala
      description: Određuje na kojim vrstama završne obrade instrumenata je sredstvo
        za poliranje sigurno za uporabu.
    compatible_substrate_material:
      name: Kompatibilan materijal za supstrat
      description: Površinski materijal(i) na koji je boja formulirana da prianja.
    compatible_surface:
      name: Kompatibilna površina
      description: Određuje površinu/materijal na koji se čičak ljepilo treba zalijepiti.
    compatible_surface_material:
      name: Kompatibilan materijal površine
      description: Materijali površine vozila na kojima je proizvod namijenjen za
        uporabu.
    compatible_tear_off_system:
      name: Kompatibilan sustav odljepljivanja gornjeg sloja
      description: Označava podržavaju li naočale mogućnost otkidanja i/ili odmotavanja,
        uključujući i imaju li nosače za otkidanje.
    compatible_thermostat_type:
      name: Kompatibilna vrsta termostata
      description: Je li grlo/kućište vode dizajnirano za prihvat termostata i, ako
        jest, koje vrste/veličine.
    compatible_thread:
      name: Kompatibilna poruka
      description: Označava za koje vrste konca/pređe je uvlakač namijenjen (prema
        debljini/vrsti).
    compatible_thread_spool_format:
      name: Kompatibilan niz poruka/spool format
      description: Označava za koje je formate poruka kutija namijenjena (špulne,
        špulice, špulice/kartice od konca, čunjevi itd.).
    compatible_thread_yarn_tool:
      name: Kompatibilan alat za thread & yarn
      description: Kompatibilnost stroja/sustava za alate koji se montiraju na drugu
        opremu ili se koriste s njom (primjerice šivaći stroj, overlock stroj, tkalački
        stan, kolovrat).
    compatible_tire_application:
      name: Kompatibilna primjena guma
      description: Označava primjenu gume/kotača za koji je dizajniran alat za rezanje
        perli (na temelju gume/kotača koji se servisira, a ne modela vozila).
    compatible_tom_pad_mounting:
      name: Kompatibilno montiranje tom padova
      description: Određuje na što se elektronički tom-tom montira (primjerice stezaljka/šipka,
        L-šipka, stalak), što utječe na to hoće li odgovarati postojećim sustavima
        nosača.
    compatible_toy_vehicle_scale:
      name: Kompatibilan omjer igračke vozila
      description: Označava razmjer igračke vozila ili približnu veličinu vozila s
        kojom je set za igru kompatibilan.
    compatible_tpms_sensor_type:
      name: Kompatibilna vrsta TPMS senzora
      description: Određuje podržava li kotač TPMS senzore i/ili bilo koji potreban
        tip ventila/osjetnika
    compatible_training_equipment:
      name: Kompatibilna oprema za vježbanje
      description: Navodi vrste opreme za trening ili fitnes koja se može pričvrstiti
        na nosač.
    compatible_treadmill_design:
      name: Kompatibilan dizajn trake za trčanje
      description: Određuje dizajn trake za trčanje s kojim je dodatak kompatibilan,
        kao što su sklopivi ili nesklopivi modeli.
    compatible_tube:
      name: Kompatibilna zračnica
      description: Označava konstrukciju unutarnje zračnice ili gume za koju je flaster
        dizajniran, kao što su butil, lateks, TPU ili tubeless.
    compatible_valve_type:
      name: Kompatibilna vrsta ventila
      description: Određuje s kojim tipom mesinganog ventila je mazivo kompatibilno.
    compatible_vaporizing_material:
      name: Kompatibilni materijal za isparavanje
      description: Označava vrste materijala za koje je uređaj namijenjen isparavanju.
    compatible_vehicle_windshield_fluid:
      name: Kompatibilna tekućina za vjetrobransko staklo vozila
      description: Tvrdnje o kompatibilnosti vezane uz opremu vozila ili tretman stakla
        (primjerice sigurno za premaze otporne na kišu, sigurno za perače prednjih
        svjetala).
    compatible_visor_system:
      name: Kompatibilan sustav za vizir
      description: Označava s kojim je vrstama vizira/umetka kaciga za motocikl kompatibilna.
    compatible_water_board_type:
      name: Kompatibilna vrsta daske za vodene sportove
      description: Za koje je daske za vodene sportove stalak namijenjen?
    compatible_water_sport_board_type:
      name: Kompatibilni tip daske za vodene sportove
      description: Navodi vrste ploča za koje je stalak namijenjen za transport.
    compatible_watercraft_communication_standard:
      name: Kompatibilni komunikacijski standard za plovila
      description: Određuje podržane standarde pomorske komunikacije/mreže ili integracijske
        protokole za interoperabilnost s uvođenjem u organizaciju elektronike.
    compatible_watercraft_engine_type:
      name: Kompatibilna vrsta motora plovila
      description: Označava ciljnu konfiguraciju pogonskog sklopa kojoj dio odgovara
        (vanbrodski/unutarnji/zmlazni pogon).
    compatible_weight_plate_diameter:
      name: Kompatibilni promjer ploče s utezima
      description: Određuje koje promjere utega stroj prihvaća.
    compatible_wheel_finish:
      name: Kompatibilna završna obrada kotača
      description: Određuje završnu obradu/materijale kotača na kojima je sredstvo
        za čišćenje sigurno za korištenje (prema tvrdnji proizvođača).
    compatible_whorl_drive_band_type:
      name: Kompatibilni tip pogonskog remena sa spiralnim pogonom
      description: Određuje s kojim stilom pogonskog pojasa je namijenjen rad spirale.
    compatible_wick_series:
      name: Kompatibilne serije fitilja
      description: Označava uobičajene serije/vrste fitilja za koje je kartica dizajnirana
        (naziv industrije), ako je to odredio prodavatelj.
    compatible_winder_head_bit:
      name: Kompatibilna glava/nastavak za namatanje
      description: Određuje stil sučelja tipke/glave tunera koju podržava namotač
        (primjerice glava s prorezom, izmjenjivi bitovi, univerzalna glava).
    compatible_windlass_rode:
      name: Kompatibilno sidreno vitlo
      description: Određuje za koju vrstu sidrenog užeta je vitlo dizajnirano.
    compatible_windshield_type:
      name: Kompatibilna vrsta vjetrobranskog stakla
      description: Određuje s kojim je postavkama vjetrobranskog stakla kućište dizajnirano
        za rad.
    compatible_wood:
      name: Kompatibilno drvo
      description: Određuje za koje vrste drva hvataljke se preporučuje/sigurno je
        poliranje.
    compatible_writing_surface:
      name: Kompatibilna površina za pisanje
      description: Određuje površine/papire na kojima je tinta namijenjena za najbolji
        učinak.
    compatible_zipper_size:
      name: Kompatibilna veličina patentnog zatvarača
      description: 'Označava veličinu patentnog zatvarača kojoj ručka treba odgovarati
        (često se izražava kao #3, #5, #8, #10), poboljšavajući filtriranje kompatibilnosti.'
    compliance_certification:
      name: Certifikat o sukladnosti
      description: Standardi sukladnosti/odobrenja koje svjetlosna traka zadovoljava
        za cestovnu uporabu i elektromagnetsku kompatibilnost.
    component_position:
      name: Položaj komponente
      description: Određuje relativni položaj dijela unutar sklopa razvoda motora
        (primjerice prednji vs. stražnji poklopac, gornji vs. donji). Ne prednji/stražnji
        položaj vozila.
    concentration_level:
      name: Razina koncentracije
      description: Kvalitativna indikacija koncentracije koncentrata rajčice (jednostruka,
        dvostruka, trostruka), korisna za usklađivanje zahtjeva recepta.
    concentration_type:
      name: Vrsta koncentrata
      description: Označava je li proizvod spreman za uporabu ili koncentrat, te (ako
        je koncentrat) tipične smjernice za razrjeđivanje.
    concert_bass_drum_mounting_stand_type:
      name: Vrsta stalka za montažu koncertnog bas bubnja
      description: Kako se koncertni bas bubanj podupire ili montira radi učinkovitosti.
    concert_pitch_standard:
      name: Koncertni standard tonaliteta
      description: Određuje referencu koncertne visine tona (A4) na koju je klavir
        ugođen u trenutku sniženja (npr. A440, A442, A444).
    condiment_form:
      name: Oblik začina
      description: Označava fizički oblik ili konzistenciju proizvoda od hrena (npr.
        pasta, prah, krema).
    condiment_texture:
      name: Tekstura začina
      description: Opisuje fizičku konzistenciju relisha ili chutneyja (primjerice
        gust, gladak).
    confetti_format:
      name: Format konfeta
      description: Određuje format proizvoda konfeta na temelju načina na koji se
        konfeti pakiraju ili lansiraju (npr. rasuti raspršeni konfeti u odnosu na
        pucače/topove).
    conga_head_tensioning_system:
      name: Sustav za zatezanje glave Conge
      description: Vrsta hardvera koji se koristi za zatezanje/ugađanje membrane konge
        (npr. tradicionalno ugađanje s ušicama u odnosu na moderne mehanizme za brzo
        ugađanje).
    conga_set_included_drum_types:
      name: Set konga uključuje vrste bubnjeva
      description: Koje su vrste konga uključene u komplet Conga (primjerice quinto
        + conga + tumba).
    connector_case_style:
      name: Stil kućišta konektora
      description: Klasificira cjelokupni stil konstrukcije mehanizma sinhronizacije
        kutija (primjerice tvrda školjka vs. mekana torbica) kako bi odražavao razinu
        zaštite i prenosivost.
    console_cover_installation_method:
      name: Način ugradnje poklopca konzole
      description: Određuje kako se poklopac konzole pričvršćuje na konzolu/naslon
        za ruke (npr. navlačenjem, elastičnim trakama, čičkom i petljom, ljepilom,
        kopčom).
    console_display_type:
      name: Vrsta prikaza konzole
      description: Identificira stil korisničkog zaslona koji se nalazi na stroju
        (primjerice LCD, LED, zaslon osjetljiv na dodir).
    construction_design:
      name: Dizajn izrade
      description: Označava koliko zglobnih dijelova čini jastučić, mobilnost Impact
        (primjerice jednodijelni vs. trodijelni).
    contact_angle:
      name: Kontaktni kut
      description: Određuje kontaktni kut ležajnih prstenova, izražen kao pojedinačni
        kut ili skup uparenih kutova (primjerice 36°/45°).
    contact_juggling_ball_fill_type:
      name: Vrsta punjenja kontaktne žonglerske loptice
      description: Identificira je li lopta puna ili ispunjena (a ako je ispunjena,
        kakvom vrstom ispune), što utječe na raspodjelu težine i trajnost.
    contact_juggling_ball_transparency:
      name: Prozirnost kontaktne žonglerske loptice
      description: Određuje prozirnost/optički izgled lopte.
    contact_surface_material:
      name: Materijal kontaktne površine
      description: Označava materijal koji se koristi na kontaktnim točkama koje dodiruju
        instrument (primjerice pluto/guma) kako bi se spriječilo grebanje i poboljšao
        hvat.
    container_material:
      name: Materijal spremnika
      description: Određuje primarni materijal proizvoda u Retail spremniku (primjerice
        staklo, PET plastika, aluminij).
    contaminant_removal:
      name: Uklanjanje onečišćujućih tvari
      description: Navodi klase onečišćujućih tvari za koje je proizvod certificiran
        za uklanjanje ili smanjenje.
    contra_alto_clarinet_body_configuration:
      name: Konfiguracija tijela kontraalt klarineta
      description: Opisuje fizički oblik kontraalt klarineta (primjerice ravni u odnosu
        na preklopljeni dizajn).
    contra_alto_clarinet_lowest_note_extension:
      name: Produžetak najniže note kontraalt klarineta
      description: Određuje najnižu notu koju instrument može svirati (najnižu notu
        koju tipkovnica dopušta), obično se koristi za razlikovanje niskog E♭, niskog
        D i niskog C modela.
    contra_bass_clarinet_bell_type:
      name: Tip zvona za kontrabas klarinet
      description: Konfiguracija zvona koja se koristi na kontrabas klarinetu.
    contra_bass_clarinet_bore_type:
      name: Vrsta provrta za kontrabas klarinet
      description: Dizajn otvora instrumenta.
    contra_bass_clarinet_lowest_written_note:
      name: Najniža nota kontrabas klarineta
      description: Najniža napisana nota koju instrument može odsvirati (često ovisi
        o produžetku za niski C u odnosu na niski Eb).
    control_arm_bushing_material:
      name: Materijal čahure upravljačke vilice
      description: Određuje materijal uključenih/ugrađenih čahura, ako su prisutne.
    control_arm_bushings_included:
      name: Uključene čahure upravljačkog ramena
      description: Označava je li se upravljačka ruka isporučuje s ugrađenim čahurama.
    control_arm_finish:
      name: Završna obrada upravljačke vilice
      description: Određuje zaštitnu obradu nanesenu na upravljačku vilicu (zaštita
        od korozije i izgled).
    control_arm_grease_fitting_type:
      name: Vrsta mazalice upravljačke vilice
      description: Određuje uključuje li sklop upravljačke ruke/kuglastog zgloba mazalicu
        (zerk) i je li ona servisna.
    control_arm_material:
      name: Materijal upravljačke ruke
      description: Određuje primarni materijal i proizvodnu konstrukciju tijela upravljačke
        vilice.
    control_arm_position:
      name: Položaj upravljačke ruke
      description: Određuje položaj ovjesa za koji je upravljačka ramena dizajnirana
        unutar konteksta kuta/boka osovine (primjerice gornji/donji, prednji/stražnji,
        lijevi/desni).
    control_arm_style:
      name: Stil upravljačke ruke
      description: Označava geometrijski/dizajnerski stil upravljačke vilice korištene
        u izgledu ovjesa.
    control_cable_connector_type:
      name: Vrsta konektora kontrolnog kabela
      description: Određuje stil kraja/mehanizma sinhronizacije koji koriste upravljački
        kabeli za povezivanje s upravljačkim elementima i motorom (primjerice završni
        spojevi specifični za OEM).
    control_voltage_or_gate_connectivity:
      name: Kontrolni napon ili povezivost vrata
      description: Određuje kontrolni napon/podržani upravljački priključak za integraciju
        s modularnom/analognom opremom.
    controller_function:
      name: Funkcija kontrolora
      description: Definira primarnu ulogu upravljačke ploče trake za trčanje, kao
        što je upravljanje motorom, napajanje ili inverterski pogon.
    controller_type:
      name: Vrsta kontrolora
      description: Određuje kontroler motora/sustav upravljanja koji je uključen u
        komplet za EV konverziju skutera (ili koji je potreban za uporabu), fokusirajući
        se na karakteristike kontrolera relevantne za kompatibilnost i učinkovitost.
    conversion_kit_cooling_method:
      name: konverzija komplet cooling method
      description: Primarni pristup upravljanju toplinom koji se koristi za integraciju
        motora/invertera/baterije.
    conversion_kit_installation_complexity:
      name: Složenost ugradnje kompleta za konverziju
      description: Očekivani stupanj napora instalacije na temelju tipičnog potrebnog
        alata/korisnika vještina.
    converted_bed_size:
      name: Pretvoreni krevet veličine
      description: Označava veličinu kreveta ili konfiguraciju u koju će se krevetić
        pretvoriti kada se ovaj komplet instalira.
    convertible_configuration:
      name: Konvertibilna konfiguracija
      description: Označava u koliko se različitih konfiguracija kreveta proizvod
        može pretvoriti (primjerice krevetić 3 u 1 → krevet za malu djecu → dnevni
        krevet).
    convertible_high_chair_modes:
      name: Načini rada sklopive hranilice
      description: Određuje konfiguracije sjedenja u koje se stolica može pretvoriti.
    cookie_decorating_kit_items_included:
      name: Uključene stavke kompleta za ukrašavanje kolačića
      description: Navodi pojedinačne komponente za ukrašavanje kako bi korisnici
        točno znali koji dodaci se nalaze u kutiji (primjerice tubice za glazuru,
        posip, kalupi za kolačiće).
    cookie_variety:
      name: Vrsta kolačića
      description: Identificira specifičan stil ili vrstu kolačića, pomažući kupcima
        da brzo pronađu svoju željenu vrstu.
    cooking_state:
      name: Stanje kuhanja
      description: Označava stupanj spremnosti pilećeg proizvoda prigodom prodaje
        (sirovo, potpuno kuhano, marinirano itd.).
    coolant_additive_purpose:
      name: Namjena aditiva za rashladnu tekućinu
      description: Primarne namijenjene funkcije aditiva za rashladnu tekućinu (ne
        sredstva za ispiranje hladnjaka ili namjenskog brtvila).
    coolant_base_fluid:
      name: Osnovna rashladna tekućina
      description: Identificira primarnu glikolnu bazu koja se koristi u formulaciji
        antifriza/rashladne tekućine.
    coolant_outlet_connection_style:
      name: Vrsta priključka za izlaz rashladne tekućine
      description: Stil sučelja izlaznog priključka koji se koristi za spajanje crijeva
        hladnjaka ili cijevi rashladne tekućine.
    coolant_outlet_neck_angle:
      name: Kut grla izlaza rashladne tekućine
      description: Kut/orijentacija izlaza grla vode u odnosu na prirubnicu za montažu/motor
        (korisno za usmjeravanje gornjeg crijeva hladnjaka).
    coolant_technology:
      name: Tehnologija rashladne tekućine
      description: Određuje kemijski sastav/tehnološku skupinu rashladne tekućine
        koju koristi antifriz/rashladna tekućina (kao što je etiketa na pakiranju).
    coolant_temperature_sensor_port:
      name: Otvor za senzor temperature rashladne tekućine
      description: Ima li grlo za vodu priključak za osjetnik ili prekidač temperature
        rashladne tekućine i koje sučelje koristi.
    coolant_temperature_sensor_seal_type:
      name: Vrsta brtve za senzor temperature rashladne tekućine
      description: Vrsta brtvljenja koja se koristi između osjetnika i kanala motora/rashladne
        tekućine.
    cooling_system_component_included:
      name: Uključena komponenta sustava hlađenja
      description: Navodi dodatne komponente sustava hlađenja uključene sa vodenom
        pumpom.
    cooling_system_flush_application_step:
      name: Korak aplikacije za ispiranje rashladnog sustava
      description: Označava gdje se proizvod uklapa u proces usluge (primjerice sredstvo
        za čišćenje prije ispiranja u odnosu na završno ispiranje/neutralizator).
    cooling_system_type:
      name: Vrsta sustava hlađenja
      description: Određuje konfiguraciju sustava hlađenja koju koristi unutarnji
        brodski motor (primjerice sirova voda/otvoreni krug, zatvoreni krug/slatka
        voda s izmjenjivačem topline, hlađenje kobilicom).
    cord_material:
      name: Materijal niti
      description: Određuje materijal užeta/konopca koji se koristi za provlačenje
        brisača kroz saksofon.
    core_type_bass_strings:
      name: Vrsta jezgre (bas niz)
      description: Određuje osnovni oblik niza, koji utječe na osjećaj i fleksibilnost.
    cork_grease_base_material:
      name: Osnovni materijal za mast od pluta
      description: Primarna baza formulacije masti za pluto (primjerice na bazi lanolina).
    cork_grease_form:
      name: Oblik masti od pluta
      description: Fizički oblik proizvoda za mast od pluta.
    corn_presentation:
      name: Izgled kukuruza
      description: Određuje fizički izgled ili oblik kukuruznog proizvoda (npr. cijeli
        u ljusci, zrna, prah).
    corn_syrup_variety:
      name: Sorta kukuruznog sirupa
      description: Određuje određeni stil ili varijantu obrade sirupa.
    corn_variety:
      name: Vrsta kukuruza
      description: Identificira specifičnu botaničku ili tržišnu sortu kukuruza koja
        se prodaje, omogućujući kupcima da razlikuju vrste koje se razlikuju po okusu,
        teksturi, boji i kulinarskoj uporabi.
    corner_compatibility:
      name: Kompatibilnost s kutovima
      description: Određuje oblik kuta stola (kvadratni ili zaobljeni) za koje je
        poklopac dizajniran.
    corner_flag_features:
      name: Značajke korner zastavice
      description: Highlight posebne funkcionalne karakteristike ili poboljšanja kutne
        zastavice (primjerice sklopivi stup, reflektirajući materijal).
    cornet_mouthpiece_shank_type:
      name: Vrsta drške usnika za kornet
      description: Određuje standard prijemnika/drške usnika koji kornet podržava
        radi kompatibilnosti.
    cornhole_league_certification:
      name: Certifikacija Cornhole lige
      description: Označava službene certifikate ili odobrenja lige kojima proizvod
        zadovoljava.
    corrosion_resistance:
      name: Otpornost na koroziju
      description: Određuje tretman otpornosti na koroziju ili ocjenu nosača/držača
        za vanjsku izloženost.
    corrosion_resistance_level:
      name: Razina otpornosti na koroziju
      description: Označava zaštitu od korozije prikladnu za okruženja sa slatkom/slanom
        vodom.
    costume_components_included:
      name: Uključene komponente kostima
      description: Navodi dijelove odjeće i dodatke uključene u kostim, pojašnjavajući
        što je dio kompleta.
    cotton_weave_type:
      name: Vrsta pamučnog tkanja
      description: Opisuje strukturu tkanja/pletenja ispisive pamučne površine koja
        utječe na teksturu i oštrinu otiska.
    counter_type:
      name: Vrsta radne ploče
      description: Označava prisutnost i stil ugrađenog ponavljanja ili praćenja sile.
    counterweight_fill_material:
      name: Materijal za punjenje protutega
      description: Označava tvar koja se može koristiti za dodavanje balasta ili prethodno
        punjenje protuutega.
    counterweight_type:
      name: Vrsta protuutega
      description: Određuje dizajn ili stil konstrukcije protuutega, kao što je vreća
        s pijeskom ili čelična ploča, radi lakše kompatibilnosti i ugradnje.
    coupler_system:
      name: Sustav spojnica
      description: Vrsta/sustav spojnice ugrađen na model lokomotive radi kompatibilnosti
        s voznim parkom.
    court_surface_suitability:
      name: Prikladnost površine terena
      description: Označava površinu košarkaškog terena za koju je potplat tenisice
        dizajniran, pomažući kupcima da odaberu pravu trakciju i izdržljivost za unutarnje
        drvene terene, vanjski asfalt/beton ili oboje.
    cover_fit_style:
      name: Stil kroja navlake
      description: Opisuje kako se poklopac postavlja preko stola, što utječe na izgled
        i razinu zaštite.
    cover_fit_type:
      name: Vrsta pristajanja navlake
      description: Označava je li prekrivač krojen (po mjeri/djelomično po mjeri)
        ili univerzalan, te je li namijenjen za privez u vodi ili skladištenje/uporabu
        na prikolici.
    cowbell_beater_type:
      name: Vrsta udarača za kravlje zvono
      description: Preporučena vrsta udarnog alata za zvuk/završnu obradu kravljeg
        zvona (ako je proizvod odredio).
    cowbell_mounting_method:
      name: Način montaže kravljeg zvona
      description: Kako se kravlje zvono namjerava montirati/koristiti (ručno u odnosu
        na montirano na hardver).
    cowbell_sound_character:
      name: Zvučni karakter kravljeg zvona
      description: Opći tonski karakter korišten u oglasu (podržava otkrivanje izvan
        veličine).
    cradle_capacity:
      name: Kapacitet kolijevke
      description: Označava je li kolijevka namijenjena za jedno dojenče ili blizance.
    craft_cutter_embosser_machine_operation:
      name: Rad stroja za rezanje/utiskivanje za rukotvorine
      description: Određuje kako rezač/utiskivač radi iz perspektive korisnika (primjerice
        ručica, električni potisni gumb, upravljanje aplikacijom).
    craft_decoration_maker_accessories_included:
      name: Pribor za izradu ukrasa za rukotvorine uključen
      description: Navodi ključni pribor koji se isporučuje s uređajem za ukrašavanje
        rukotvorina (primjerice početna traka/folija, punila za naljepnice, ulošci
        sa šljokicama, alati za čišćenje).
    craft_foil_application_method:
      name: Metoda nanošenja folije za rukotvorine
      description: Označava kako se zanatska folija namjerava primijeniti/aktivirati
        (ljepilom, toplinom, tonerom/reaktivnim sredstvom itd.).
    craft_foil_format:
      name: Format zanatske folije
      description: Označava fizički format zanatske folije kako se prodaje (primjerice
        rola vs. listovi).
    craft_glue_finish:
      name: Završna obrada ljepilom za rukotvorine
      description: Opisuje izgled ljepila nakon sušenja (npr. prozirno, bijelo/neprozirno,
        prozirno, sjajno/mat).
    craft_magnet_application:
      name: Primjena zanatskih magneta
      description: Primarna namijenjena uporaba u obrtu ili površina za montažu magnetskog
        proizvoda.
    craft_magnet_holding_strength_level:
      name: Razina čvrstoće držanja magneta za rukotvorine
      description: Relativna kategorija čvrstoće za magnete rukotvorine kako bi se
        pomoglo kupcima da odaberu odgovarajuću snagu držanja za svoj projekt.
    craft_organizer_storage_features:
      name: Značajke pohrane organizatora za rukotvorine
      description: Opisuje značajke organizacije i unutarnje elemente za pohranu organizatora
        za rukotvorine (primjerice podesive pregrade, ladice, prozirne džepove).
    craft_scoring_board_included_accessories:
      name: Uključeni dodaci ploče za bodovanje za rukotvorine
      description: Pribor uključen uz ploču za bodovanje (primjerice olovka za bodovanje/koštana
        mapa, trokut, alat za kuverte).
    craft_scoring_board_measurement_system:
      name: Sustav mjerenja ploče za bodovanje za rukotvorine
      description: Označava mjerni sustav označen na ploči za bodovanje (imperijalni,
        mjerni podatak, dualni ili neoznačeni).
    craft_wire_finish_coating:
      name: Završna obrada/premaz žice za rukotvorine
      description: Određuje površinsku završnu obradu ili premaz nanesen na žicu radi
        boje, otpornosti na tamnjenje ili zaštite.
    craft_wood_surface_preparation:
      name: Priprema površine od drveta za rukotvorinu
      description: Označava je li drvena površina spremna za završnu obradu/bojanje
        ili zahtijeva pripremu (primjerice brušenje/premazanje).
    crank_spindle_interface:
      name: Sučelje osovine radilice
      description: Određuje sustav osovine radilice koji podržava donja osovina (npr.
        SRAM DUB, Square Taper), osiguravajući kompatibilnost između radilice i donje
        osovine.
    crankshaft_balance_type:
      name: Vrsta balansa radilice
      description: Označava je li radilica interno saldo (neutralno) ili eksterno
        saldo (zahtijeva harmonijski balanser/utege zamašnjaka).
    crankshaft_bolt_pattern:
      name: Uzorak vijka radilice
      description: Raspored vijaka na stražnjoj prirubnici za pričvršćivanje zamašnjaka/fleksibilne
        ploče.
    crankshaft_sensor_reluctor_type:
      name: Tip reluktora osjetnika radilice
      description: Konfiguracija kotača pokretača/reluktora koji se koristi (gdje
        je primjenjivo).
    craps_accessories_included:
      name: Uključeni dodaci za craps
      description: Označava dodatnu dodatnu opremu specifičnu za craps, beyond kockicu/čipove/izgled.
    crash_cymbal_profile:
      name: Profil crash činele
      description: Ukupna zakrivljenost/profil činele (koliko je gudalo izraženo),
        što utječe na visinu tona i odziv.
    crash_cymbal_sound_character:
      name: Zvučni karakter za crash činele
      description: Deskriptori primarnih tonalnih karaktera za zvuk crash činele.
    crash_pad_size_class:
      name: Klasa veličine podmetača za sudare
      description: Označava opću veličinu penjačke podloge, dajući kupcu brzi smisao
        pokrivenosti površine bez potrebe za točnim dimenzijama.
    crate_engine_assembly_level:
      name: Razina montaže motora sanduka
      description: Koliko je motor sanduka dovršen kao poslan (koje su glavne komponente
        uključene).
    cream_base_ingredient:
      name: Sastojak za bazu kreme
      description: Identificira primarni izvor vrhnja, obuhvaćajući i mliječne vrste
        i biljne alternative.
    cream_cheese_base:
      name: Baza od krem sira
      description: Identificira primarni mliječni ili biljni izvor koji se koristi
        za izradu krem sira, što pomaže kupcima kod razmatranja u svezi prehrane,
        alergena i ukusa.
    cream_cheese_form:
      name: Oblik krem sira
      description: Opisuje fizički oblik ili teksturu krem sira (primjerice blok,
        šlag, umak), što utječe na mazivost i namjeravanu uporabu.
    cream_variety:
      name: Raznolikost kreme
      description: Označava specifičan tip vrhnja na temelju sadržaja masti, načina
        obrade ili namjeravane kulinarske upotrebe (primjerice pola-pola, dvostruko
        vrhnje, vrhnje za kuhanje).
    crib_accessory_features:
      name: Značajke dodataka za dječji krevetić
      description: Navodi funkcionalne ili na udobnost usmjerene značajke specifične
        za pribor za dječje krevetiće i krevetiće za malu djecu, kao što su prozračnost
        ili elastični rubovi.
    crib_bumper_features:
      name: Značajke ograde za dječji krevetić
      description: Naglašava posebne funkcionalne karakteristike ogradice za krevetić.
    crib_conversion_kit_components:
      name: Komponente kompleta za preobrazbu krevetića
      description: Navodi glavne dijelove uključene u komplet kako bi kupci trebali
        provjeriti imaju li sve što je potrebno za ugradnju.
    cricket_ball_grade:
      name: Vrsta loptice za kriket
      description: Određuje razinu kvalitete ili namjeravani standard igre lopte.
    cricket_ball_piece_construction:
      name: Konstrukcija dijela kriket loptice
      description: Označava broj vanjskih dijelova ili oblikovanih dijelova korištenih
        za izgradnju ljuske lopte, ključni pokazatelj kvalitete i cijene.
    cricket_ball_type:
      name: Vrsta lopte za kriket
      description: Označava vrstu kriket loptice koja se isporučuje s proizvodom ili
        označava ako loptica nije uključena.
    cricket_bat_accessory_type:
      name: Vrsta pribora za palicu za kriket
      description: Određuje vrstu pribora za palicu za kriket ili stavku za održavanje
        kako bi kupac mogao brzo filtrirati proizvod koji im je potreban.
    cricket_bat_size:
      name: Veličina palice za kriket
      description: Označava standardiziranu klasifikaciju veličine palice za kriket
        (0–6, Harrow, SH, LH), obično odabranu na temelju dobi i visine igrača.
    cricket_bat_size_compatibility:
      name: Kompatibilnost veličina palica za kriket
      description: Navodi veličinu palice kojoj je pribor dizajniran, osiguravajući
        odgovarajuću kompatibilnost.
    cricket_helmet_role:
      name: Uloga kaciga za kriket
      description: Označava ulogu igranja za koju je kaciga dizajnirana, kao što je
        udaranje ili čuvanje wicketa.
    cricket_leg_guard_type:
      name: Vrsta štitnika za noge za kriket
      description: Označava specifičan stil zaštite nogu za kriket.
    cricket_player_role:
      name: Uloga igrača kriketa
      description: Određuje primarnu ulogu igranja za koju je cipela dizajnirana.
    cricket_protection_grade:
      name: Razred zaštite za kriket
      description: Određuje klasifikaciju stupnja zaštite koju dodjeljuje proizvođač
        opreme za kriket.
    cricket_stump_base_type:
      name: Vrsta baze stupa za kriket
      description: Označava stil baze ili materijal od koji se dostavlja s panjevima,
        što utječe na stabilnost i prikladnost površine za igru.
    cricket_stump_target_features:
      name: Značajke ciljanog panjeva cvrčka
      description: Ističe različite funkcionalne značajke koje poboljšavaju upotrebljivost,
        vidljivost, izdržljivost ili stabilnost tijekom obuke.
    cricket_stump_type:
      name: Vrsta panja za cvrčak
      description: Kategorizira stil ili konstrukciju panjeva kako bi kupcima pomogao
        u lakšme odabiru između tradicionalnih panjeva za utakmice, varijante za trening
        ili modernih osvijetljenih modela.
    cricket_training_focus:
      name: Fokus za vježbanje za kriket
      description: Primarna vještina ili disciplina kriketa koju pomagalo treba poboljšati.
    croquet_set_components_included:
      name: Uključene komponente kompleta za kroket
      description: Navodi sve ključne komponente dostavljene sa setom (npr. vratašca,
        kolce, torbu za nošenje) kako bi korisnici točno znali što kupuju.
    cross_country_binding_system:
      name: Sustav vezanja kod kros trčanja
      description: Određuje standard vezova za skije za prelazne skije za koji je
        proizvod bušen ili je s njim kompatibilan.
    cross_stitch_chart_symbol_type:
      name: Vrsta simbola u dijagramu križnog boda
      description: Kako je grafikon predstavljen (simboli, Colors ili oboje).
    cross_stitch_finishing_type:
      name: Vrsta završne obrade križnim bodom
      description: Namijenjena vrsta završne obrade/prikaza za šivani projekt.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mehanizam za držanje tkanine okvira s križnim bodom
      description: Označava kako je tkanina pričvršćena/zategnuta u okviru (primjerice
        kopčama, stezaljkama, čavlićima), što utječe na jednostavnost korištenja i
        kompatibilnost tkanine.
    cross_stitch_frame_included_components:
      name: Frame za križni vez uključen u komponente
      description: Navodi što dolazi u kutiji (primjerice samo okvir u odnosu na okvir
        + stezaljke + stalak), smanjujući dvosmislenost i vraćanje proizvoda.
    cross_stitch_frame_type:
      name: Vrsta okvira za križni bod
      description: Određuje konstrukciju/vrstu okvira za križni bod (kako se tkanina
        drži), što utječe na upotrebljivost i kompatibilnost projekta.
    cross_stitch_pattern_technique:
      name: Tehnika uzorka križnog boda
      description: Tehnika/stil križnog boda koji zahtijeva dijagram.
    crossbar_shape_profile:
      name: Oblici/profili prečke
      description: Određuje aerodinamiku/oblik profila prečke.
    crossbar_style:
      name: Stil prečke
      description: Označava stil konstrukcije prečke, razlikujući krute natjecateljske
        šipke od fleksibilnih ili hibridnih šipki za trening.
    crossbow_type:
      name: Vrsta samostrela
      description: Označava temeljni stil dizajna samostrela, kao što su složeni,
        zakrivljeni ili pištoljski. Stil izrade vodi slučajeve učinkovitosti, veličine
        i iskoristivosti, pa kupac često po njemu vrši filtriranje.
    crossover_component_type:
      name: Vrsta komponente skretnice
      description: Identificira topologiju primarne komponente korištene u pasivnoj
        mreži skretnice.
    crossover_configuration:
      name: Konfiguracija crossovera
      description: Označava koristi li skretnica jednu točku skretnice ili više točaka
        (npr. dvosmjerni vs. trosmjerni dizajn).
    crossover_type:
      name: Vrsta križanja
      description: Vrsta križne mreže uključena je u set komponenti.
    crown_profile:
      name: Profil krune
      description: Određuje visinu/profil krune kape iznad oboda.
    crown_style:
      name: Stil krune
      description: Definira ukupnu siluetu ili profil krune na šeširu-polucilindru.
    crust_taste_profile:
      name: Profil okusa korice
      description: Označava je li inherentna orijentacija okusa kore slatka, slana
        ili neutralna.
    crystal_finish:
      name: Kristalni završetak
      description: Opisuje površinsku završnu obradu, premaz ili stanje obrade rastresitog
        kristala (npr. sirov, poliran, bubnjan, filtriran, matiran, premazan aurom,
        obojen, toplinski obrađen).
    crystal_material:
      name: Kristalni materijal
      description: Označava materijal koji se koristi za staklo sata koje štiti brojčanik.
    crystalline_finish_style:
      name: Stil završne obrade kristala
      description: Karakterističan kristalni/perjasti izgled koji proizvodi palmin
        vosak u gotovim svijećama.
    cucumber_variety:
      name: Sorta krastavca
      description: Označava kultivar ili tržište krastavca (primjerice engleski, perzijski,
        Kirby).
    cue_compatibility:
      name: Kompatibilnost štapa
      description: Označava konfiguraciju spojeva bilja za koju je kutija dizajnirana,
        kao što su jednodijelni ili 3/4-zglobni biljevi.
    cue_construction:
      name: Izrada štapa
      description: Označava kako je štap konstruiran - broj dijelova ili je li djelomična
        komponenta, poput samo stražnjeg dijela ili samo osovine - što utječe na prenosivost
        i kompatibilnost.
    cue_head_material:
      name: Materijal glave štapa
      description: Označava materijal glave biljarskog štapa (dio koji dodiruje pak),
        što utječe na trajnost i zaštitu površine.
    cue_sport_compatibility:
      name: Kompatibilnost s Cue sportovima
      description: Označava za koji je sport s biljarskim štapom pribor namijenjen.
    cue_thread_size:
      name: Veličina poruke je niska
      description: Određuje specifikaciju niz poruke koja se koristi na produžecima,
        štitnicima zglobova, vijcima za utege i ostalom priboru za bilješke kako bi
        se osiguralo pravilno pristajanje.
    cue_tip_hardness:
      name: Tvrdoća vrha štapa
      description: Ocjenjuje čvrstoću vrha biljarskog štapa što utječe na kontrolu
        bijele kugle i na odziv.
    cuff_height:
      name: Visina manžete
      description: Navodi visinu manžete čizme (niska, srednja, visoka, uklonjiva/podesiva),
        što utječe na podršku i fleksibilnost.
    cuff_position:
      name: Položaj manžete
      description: Označava mjesto na tijelu jahača na koje se pričvršćuje manžeta
        za povodac.
    cultivation_method:
      name: Metoda uzgoja
      description: Navodi kako je povrće uzgajano, obuhvaćajući tehnike uzgoja i poljoprivredne
        prakse.
    cup_type:
      name: Vrsta šalice
      description: Označava profil površine šljokice (ravna ili udubljena) i dubinu
        udubljenja, što može utjecati na sjaj, teksturu i način na koji se lijepi
        prigodom šivanja ili lijepljenja.
    cupcake_size:
      name: Veličina kolačića
      description: Određuje fizičku veličinu prodanih kolačića (primjerice Shop Mini,
        standard, jumbo).
    curd_size:
      name: Veličina skute
      description: Određuje veličinu ili teksturu svježeg sira.
    cure_method:
      name: Metoda stvrdnjavanja
      description: Opisuje postupak potreban za stvrdnjavanje ili otvrdnjavanje ljepila
        (primjerice UV svjetlo, vlažnost zraka, toplina).
    curing_or_preparation_method:
      name: Metoda sušenja ili pripreme
      description: Navodi se kako su masline sušene ili na drugi način pripremljene
        (primjerice sušene u salamuri, sušene u ulju, pečene na roštilju).r.
    curling_broom_head_material:
      name: Materijal za glavu metle za uvijanje
      description: Identificira primarni sastav materijala glave ili jastučića metle.
    curling_broom_head_type:
      name: Vrsta glave metle za uvijanje
      description: Određuje stil ili konstrukciju glave/jastučića za pometanje.
    curling_shoe_slider_material:
      name: Materijal za klizače cipela za uvijanje
      description: Označava primarni materijal kliznog potplata koji se koristi na
        cipelama za curling.
    curling_training_aid_type:
      name: Vrsta pomagala za trening curlinga
      description: Označava vrstu pomagala za trening uvijanja.
    curry_variety:
      name: Vrsta curryja
      description: Klasificira curry umak prema specifičnom stilu curryja ili receptu
        za koji su namijenjeni, kao što su Tikka Masala, Massaman ili Thai Green,
        kako bi se omogućilo precizno filtriranje okusa/stila.
    cushion_rubber_profile:
      name: Profil gume jastuka
      description: Shapes ili profilni kod gumenih dijelova za podupiranje tračnica.
    cushioning_level:
      name: Razina amortizacije
      description: Označava količinu razmaka ispod stopala u podnožju koju čarapa
        pruža za zaštitu od udaraca i udobnost.
    custom_label_content_type:
      name: Vrsta sadržaja prilagođene etikete
      description: Određuje koje se informacije prilagođavaju na etiketi za ušivanje
        (npr. ime, logotip, poruka, veličina, simboli za njegu, kontaktni podaci).
    customization_type:
      name: Vrsta prilagodbe
      description: Određuje je li dres prazan, izdat za igrača ili je prilagođen s
        personaliziranim imenom/brojem.
    cut_or_preparation_style:
      name: Stil rezanja ili pripreme
      description: Određuje kako su komadi povrća izrezani ili pripremljeni unutar
        konzerve ili staklenke (primjerice cijeli, narezani na kockice, štapići).
    cut_resistance_rating:
      name: Ocjena otpornosti na rezanje
      description: Određuje formalno testiranu razinu otpornosti na rezanje stavke.
    cut_type:
      name: Vrsta reza
      description: Označava prodaje li se tkanina po metru/metru, kao prethodno izrezana
        ili kao rola/baton.
    cutting_application:
      name: Primjena rezanja
      description: Primarna namjena rezanja - kutija za škare.
    cutting_mat_grid_style:
      name: Stil mreže podloge za rezanje
      description: Otisnuti vodičev stil na površini prostirke.
    cutting_mat_intended_use:
      name: Namjena podloge za rezanje
      description: Primarni slučaj uporabe radne površine/obrade za koji je podloga
        za rezanje dizajnirana.
    cv_boot_clamp_type:
      name: Vrsta stezaljke manžete homokinetskog diferencijala
      description: Određuje stil stezaljke/trake koja se koristi za pričvršćivanje
        manžete homokinetičkog zgloba.
    cv_boot_kit_contents:
      name: Kompletna manžeta homokineze Sadržaj
      description: Navodi što je uključeno sa manžetom homokinetičkog zgloba (npr.
        stezaljke, paket masti, trake za pričvršćivanje).
    cv_boot_material:
      name: Materijal manžete homokinetičkog zgloba
      description: Određuje primarni materijal od kojeg je izrađena manžeta CV zgloba.
    cv_boot_position:
      name: Položaj manžete homokineze
      description: Određuje odgovara li manžeta homokinetičkog zgloba unutarnjem (unutarnjem)
        ili vanjskom (vanjskom) položaju homokinetičkog zgloba na osovini.
    cycling_apparel_fit:
      name: Prikladna odjeća za biciklizam
      description: Opisuje kroj odjevnog predmeta, ukazujući na namjeravanu uskost
        i aerodinamiku (primjerice Trkački, Opušteni).
    cylinder_head_assembly:
      name: Sklop glave cilindra
      description: Označava stupanj potpunosti glave cilindra kako se prodaje (npr.
        potpuno sastavljena s ugrađenim komponentama ventilskog mehanizma u odnosu
        na goli/nesastavljeni odljevak).
    cylinder_head_material_grade:
      name: Vrsta materijala glave cilindra
      description: Određuje materijal i vrstu korištene za odljevak glave cilindra.
    cylinder_head_position:
      name: Položaj glave cilindra
      description: Označava kojem bloku/strani ili orijentaciji odgovara glava cilindra
        na motorima s više blokova (primjerice lijeva/desna strana ili blok 1/blok
        2).
    cymbal_alloy:
      name: Legura činele
      description: Legura/sastav činele(a) u kompletu.
    cymbal_application:
      name: Aplikacija za činele
      description: Primarna sviračka aplikacija za koju je činela namijenjena/tržište.
    cymbal_arm_mounting_interface:
      name: Sučelje za montažu ručice činele
      description: Određuje kako se ručka činele pričvršćuje na REST hardvera bubnja
        (primjerice stezaljku, stalak, prijemnik stalka).
    cymbal_arm_rotation_positioning_features:
      name: Značajke rotacije/pozicioniranja ručice činele
      description: Određuje značajke pozicioniranja koje utječu na to kako se ruka
        može nagnuti/rotirati i zaključati.
    cymbal_arm_style:
      name: Stil ruke činele
      description: Određuje je li ručka činele ravna ili u obliku buma, za doseg i
        postavke pozicioniranja.
    cymbal_drum_case_wheel_configuration:
      name: Konfiguracija kotača za činele i bubnjeve kutija
      description: Označava ima li kutija kotače i (ako je primjenjivo) konfiguraciju
        kotača za transport kotrljanjem.
    cymbal_hammering_style:
      name: Stil udaranja činele
      description: Proces/izgled čekićanja koji utječe na kompleksnost i osjećaj.
    cymbal_kit_components_included:
      name: Uključene komponente kompleta za činele
      description: Određuje koje su vrste činela uključene u komplet/pakiranje ride
        činela (uz samu ride činelu).
    cymbal_kit_items_included:
      name: Artikli uključeni u komplet činela
      description: Označava koje su činele uključene u komplet/pakiranje (prema vrsti
        činele).
    cymbal_lathing:
      name: Letvica za činelu
      description: Određuje je li/koliko je površine činele tokareno (žljebljeno)
        u odnosu na netokareno/sirovo.
    cymbal_playing_style_genre:
      name: Stil/žanr sviranja činele
      description: Identificira tipičan kontekst izvedbe za koji su činele dizajnirane
        (primjerice zills za trbušni ples u odnosu na marširajuće/orkestralne ručne
        činele).
    cymbal_set_configuration:
      name: Konfiguracija seta činela
      description: Označava prodaje li se proizvod kao jedna činela, par činela ili
        set od više parova (primjerice za skupne upute).
    cymbal_sound_character:
      name: Zvučni karakter činela
      description: Opisuje ukupni tonski profil/zvučnost činele korištene za otkrivanje
        (npr. svijetlo naspram tamnog).
    cymbal_sustain:
      name: Sustain činele
      description: Koliko dugo činela zvoni nakon udarca.
    cymbal_type:
      name: Vrsta činele
      description: Određuje funkcionalnu ulogu činele koju elektronički pad činele
        treba emulirati.
    cymbal_volume_level:
      name: Razina glasnoće činele
      description: Percipirana glasnoća/izlazna kategorija činele.
    cymbal_weight_class:
      name: Težinska klasa činele
      description: Označava težinsku klasu činele, što utječe na ton, glasnoću i odziv.
    dairy_heat_treatment:
      name: Toplinski tretman mliječnih proizvoda.
      description: Označava stupanj obrade ili pasterizacije primijenjen na vrhnje
        (primjerice sirovo, pasterizirano, UHT), koji utječe na vijek trajanja, okus
        i učinkovitost mućenja.
    damage_type:
      name: Vrsta oštećenja
      description: Određuje vrste oštećenja vjetrobranskog stakla za koje je komplet
        namijenjen popravku.
    damper_pedal_style:
      name: Stil pedale prigušivača
      description: Opisuje fizički stil damper pedale koja se koristi s klavijaturama/digitalnim
        klavirima.
    damping_adjustability:
      name: Podesivost prigušenja
      description: Označava koji su parametri prigušenja i/ili visine vožnje podesivi
        na amortizeru.
    damping_level:
      name: Razina prigušenja
      description: Označava relativnu količinu smanjenja glasnoće i trajanja zvuka
        koju pruža mute.
    dance_occasion:
      name: Prigoda za ples
      description: Označava kontekst namjeravane uporabe odjevnog predmeta unutar
        plesne prakse ili učinkovitost.
    darbuka_accessories_included:
      name: Uključeni dodaci za darbuku
      description: Navodi uobičajenu dodatnu opremu uključenu u darbuku.
    darbuka_body_finish_type:
      name: Vrsta završne obrade tijela tarabuke
      description: Opisuje vanjsku završnu obradu, premaz ili dekorativnu obradu tijela
        tarabuke.
    darbuka_head_material:
      name: Materijal za glavu Darbuke
      description: Određuje materijal membrane bubnja na darbuci.
    dart_barrel_material:
      name: Materijal cijevi strelice
      description: Određuje primarni materijal cijevi strelice, što utječe na raspodjelu
        težine, trajnost i cijenu.
    dart_shaft_design:
      name: Dizajn osovine strelice
      description: Klasificira mehanički dizajn osovine, odnosno je li fiksna, rotirajuća,
        teleskopska ili integrira let, što utječe na učinkovitost i cijenu.
    dart_shaft_thread_type:
      name: Tip osi strelice niz poruke
      description: Označava veličinu/vrstu navoja koji se koristi za uvrtanje osovine
        u cijev strelice, osiguravajući kompatibilnost između osovina i cijevi.
    dart_thread_size:
      name: Veličina konca strelice
      description: Određuje veličinu/standard s kojim je dio kompatibilan, osiguravajući
        prianjanje između osovina, vrhova i cijevi.
    dart_tip_compatibility:
      name: Kompatibilnost vrha strelica
      description: Označava je li dio strelice namijenjen za čelični vrh, meki vrh
        ili obje vrste strelica.
    dart_tip_connection_type:
      name: Tip veza vrha strelice
      description: Opisuje specifikaciju niz poruke ili sustav montaže koji vrh koristi
        za pričvršćivanje na cijev ili osovinu strelice, osiguravajući kompatibilnost.
    dartboard_tournament_approval:
      name: Pikado turnir odobrenje
      description: Označava je li pikado službeno odobren od strane određenih pikado
        saveza ili liga.
    dartboard_type:
      name: Vrsta pikado mete
      description: Klasificira pikado prema tehnologiji izrade i kompatibilnosti s
        pikadom (npr. s čekinjama, elektronički, magnetski).
    dash_cover_construction_type:
      name: Vrsta izrade navlake za nadzornu ploču
      description: Opisuje kako je poklopac armaturne ploče oblikovan/strukturiran
        (primjerice oblikovan u kalupu nasuprot šivanju), što utječe na preciznost
        pristajanja i izgled.
    dash_cover_cutout_configuration:
      name: Konfiguracija izreza na poklopcu armaturne ploče
      description: Označava za koje je OEM otvore/osjetnike nadzorne ploče poklopac
        prethodno izrezan ili oblikovan.
    dashboard_accessory_position:
      name: Položaj dodatne opreme na nadzornoj ploči
      description: Određuje gdje se na/oko nadzorne ploče namjerava postaviti ili
        montirati pribor.
    date_variety:
      name: Vrsta datulje
      description: Navodi kultivar/sortu datulja (primjerice Medjool, Deglet Noor,
        Ajwa). Raznolikost snažno Influence na okus, veličinu, teksturu i Highlight
        je u većini naziva proizvoda i opisa, pa njezino obuhvaćanje poboljšava filtriranje
        i otkrivanje.
    dayan_head_material:
      name: Materijal glave dajana
      description: Materijal površine za igru (pudi), kao što je prirodna koža ili
        sintetika.
    dayan_strap_material:
      name: Materijal remena dajana
      description: Materijal za zatezne trake (baddhi) koje se koriste za vezanje
        dayana.
    dayan_syahi_type:
      name: Vrsta Dayan syahi
      description: Vrsta aplikacije syahija (crne paste za ugađanje) na glavi dayana.
    decaffeination_method:
      name: Metoda dekofeinizacije
      description: Označava postupak koji se koristi za uklanjanje kofeina iz kave
        bez kofeina.
    decal_installation_method:
      name: Način postavljanja naljepnice
      description: Način nanošenja naljepnice na površinu vozila (primjerice suho
        nanošenje, mokro nanošenje). Informacije o alatu/zahtjevima (npr. prijenosna
        traka ili pištolj za toplinu) trebaju biti navedene u uputama ili povezanim
        atributima alata kada je to primjenjivo.
    decal_orientation:
      name: Orijentacija naljepnice
      description: Je li naljepnica namijenjena za unutarnju ili vanjsku primjenu
        na staklu.
    decal_placement_type:
      name: Vrsta položaja naljepnice
      description: Označava gdje se naljepnica namjerava postaviti na vozilu (npr.
        karoserija, branik, poklopac motora).
    decal_visibility_property:
      name: Svojstvo vidljivosti naljepnice
      description: Optička/vidljiva svojstva naljepnice namijenjena poboljšanju vidljivosti
        ili odziva na svjetlo (primjerice reflektirajuća, fluorescentna, svijetleća
        u mraku ili prozirna svojstva).
    deck_concave_level:
      name: Ravan podbubnja palube
      description: Označava dubinu ili intenzitet konkavnog ugla špila (primjerice
        blag, srednji, dubok).
    deck_flex_rating:
      name: Ocjena savitljivosti daske
      description: Kvalitativna ocjena fleksibilnosti/krutosti palube.
    deck_material:
      name: Materijal daske
      description: Označava primarni materijal od kojeg je izrađena daska skateboarda.
    decoder_interface_socket_type:
      name: Vrsta sučelja/utičnice dekodera
      description: Vrsta digitalnog dekoderskog sučelja ili uvođenje u organizaciju
        konfiguracije dekodera za model lokomotive.
    decoration_technique:
      name: Tehnika ukrašavanja
      description: Označava primarnu metodu koja se koristi za nanošenje grafike ili
        ukrasa na majicu.
    decorative_stamp_form_factor:
      name: Čimbenik oblika ukrasnog pečata
      description: Identificira format fizičkog pečata i način ispisa dizajna (jedan
        pečat, set, valjak, pozadina itd.).
    decorative_tape_application:
      name: Aplikacija dekorativne trake
      description: Primarna uporaba u rukotvorinama za koju je dekorativna traka dizajnirana
        ili plasirana na tržište.
    decorative_tape_format:
      name: Format ukrasne trake
      description: Određuje kako se ukrasna traka dostavlja/pakira za uporabu.
    decoy_buoyancy:
      name: Uzgon mamca
      description: Opisuje kako se mamac ponaša u vodenom stupaku (pluta, lebdi ili
        tone).
    decoy_joint_type:
      name: Vrsta zgloba za mamljenje
      description: Označava je li tijelo mamca čvrsto ili zglobno, što utječe na plivanje.
    decoy_motion_mechanism:
      name: Mehanizam mamca za pokret
      description: Opisuje kako, ako uopće, mamac proizvodi kretanje ili uznemiravanje
        vode kako bi privukao divljač.
    decoy_posture:
      name: Pozicija mamca
      description: Označava prikazani stav ili aktivnost životinje koju modelira mamac
        (primjerice hranjenje, odmor, budnost).
    decoy_size_class:
      name: Klasa veličine mamca
      description: Kategorizira relativnu veličinu mamca u usporedbi sa stvarnom životinjom
        (primjerice standardna, magnum, prevelika).
    decoy_style:
      name: Stil mamca
      description: Definira fizički oblik ili klasu dizajna mamca kako bi pomogao
        lovcima da odaberu ispravnu postavku.
    deli_meat_variety:
      name: Raznolikost delikatesnog mesa
      description: Klasificira specifičnu vrstu delikatesnog mesa (npr. salama, mortadela,
        pršut, pečena govedina).
    delivery_form:
      name: Oblik isporuke
      description: Fizički oblik dostave sredstva za čišćenje injektora.
    denim_composition:
      name: Sastav trapera
      description: Primarni sastav vlakana trapera (osnovna vlakna isključujući boje/završne
        obrade).
    denim_finish:
      name: Traper završna obrada
      description: Površinska/procesna obrada nanesena na traper tkaninu.
    denim_intended_use:
      name: Namjena trapera
      description: Tipičan projekt/uporaba za koju se traper koristi na tržištu.
    denim_stretch_type:
      name: Vrsta rastezljivog trapera
      description: Ima li traper mehaničku rastezljivost, dodani elastan/spandex ili
        ga uopće nema.
    denim_wash:
      name: Pranje trapera
      description: Označava nijansu ili tretman pranja primijenjen na traper tkaninu
        (npr. svijetlo, tamno, sirovo, kiselo).
    derailleur_cage_length:
      name: Duljina kaveza mjenjača
      description: Označava duljinu kaveza mjenjača koja određuje kapacitet lanca
        (prvenstveno za stražnje mjenjače).
    derailleur_mounting_style:
      name: Način montaže mjenjača
      description: Određuje kako se mjenjač pričvršćuje na okvir bicikla ili vješalicu
        (primjerice lemljenjem, stezaljkom, izravnom montažom, UDH).
    derailleur_type:
      name: Vrsta mjenjača
      description: Označava je li proizvod prednji ili stražnji mjenjač.
    deshedder_tool_type:
      name: Vrsta alata za uklanjanje ljuski
      description: Klasificira strukturni stil četke protiv linjanja kako bi kupac
        mogao odabrati svoju preferiranu metodu njege (npr. oštricom, blokom, curryjem
        ili rukavicom).
    diabolo_axle_system:
      name: Diabolo sustav osovina
      description: Određuje sustav/konfiguraciju diabolo osovine koja utječe na brušenje,
        stabilnost i trošenje dna.
    diagnostic_functions_supported:
      name: Podržane dijagnostičke funkcije
      description: Određuje dijagnostičke/održavajuće funkcije koje skener može obavljati.
    diagnostic_interface_type:
      name: Vrsta dijagnostičkog sučelja
      description: veza/sučelje koje se koristi za komunikaciju s vozilom ili uređajem
        (npr. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Ocjena boje dijamanta
      description: Označava stupanj boje dijamanata, od D (bezbojan) do Z (svijetla
        boja), ili označava otmjene boja dijamante.
    diaper_cover_style:
      name: Stil navlake za pelene
      description: Definira siluetu dizajna ili dekorativni stil navlake za pelene
        kako bi se olakšalo pregledavanje i filtriranje na temelju stila.
    diastatic_power_unit:
      name: Dijastatska jedinica za napajanje
      description: Određuje sustav jedinica koji se koristi za Izvješća dijastatičke
        vrijednosti snage proizvoda (primjerice °Lintner vs Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Sustav za ugađanje dijatonske usne harmonike
      description: Određuje sustav izgleda/štimovanja nota koji koristi dijatonska
        harmonika.
    dice_sides:
      name: Strane kocke
      description: Broj stranica (lica) po kocki za kocke uključene u proizvod (npr.
        d6, d20). Za mješovite setove, koristite dominantno ili prikaži kao više vrijednosti
        kada je to podržano.
    didgeridoo_construction_type:
      name: Vrsta konstrukcije didžeridua
      description: Kako je didžeridu konstruiran ili oblikovan (tradicionalni ili
        moderni pristup konstrukciji).
    dietary_formulation_claim:
      name: Tvrdnja o dijetalnoj formulaciji
      description: Highlight ključne atribute formulacije ili izuzeća relevantna za
        prehranu konja (primjerice bez žitarica, s niskim udjelom škroba, organsko).
    dinosaur_playset_scale_figure_size_class:
      name: Set za igru s dinosaurima u mjerilu/veličini klase
      description: Opisuje opći razmjer uključenih dinosaura/figura radi bolje kompatibilnosti
        s drugim setovima.
    dinosaur_species_included:
      name: Uključene vrste dinosaura
      description: Identificira koje su vrste dinosaura zastupljene u setu za igru
        (figure ili oblikovani dinosauri).
    dipsy_diver_size_designation:
      name: Oznaka veličine Dipsy divera
      description: Označava proizvođačem definiranu veličinu koda ribolovnog dipseya,
        koji je u korelaciji s težinom i dubinom zarona.
    disc_brake_rotor_mount_type:
      name: Vrsta nosača disk kočnog rotora
      description: Označava kako se rotor disk kočnice pričvršćuje na glavčinu (primjerice
        6-vitjni, Center Lock).
    disc_lock_accessories_included:
      name: Uključen pribor za zaključavanje diska
      description: Određuje dodatnu stavku koja dolazi u pakiranju s bravom za disk
        bicikla, kao što je kabel za podsjetnik, torbica za nošenje, nosač za montažu
        ili baterije.
    disco_ball_mirror_tile_material:
      name: Materijal pločica ogledala na disko kugli
      description: Materijal reflektirajućih pločica na disko kugli (ako je primjenjivo).
    disco_ball_mirror_tile_size:
      name: Disco kugla ogledalo pločica veličine
      description: Približna veličina pojedinačnih zrcalnih pločica/kvadrata na disko
        kugli.
    display_backlight_color:
      name: Boja pozadinskog osvjetljenja zaslona
      description: Pozadinsko osvjetljenje/boja osvjetljenja zaslona/brojčanika mjerača.
    disposable_compostable_claim:
      name: Tvrdnja za jednokratnu upotrebu/kompostabilnost
      description: Označava je li proizvod kompostabilan, biorazgradiv, reciklabilan
        ili se ne može reciklirati (gdje je primjenjivo).
    distillation_method:
      name: Metoda destilacije
      description: Označava metodu destilacije ili vrstu destilatora koji se koristi
        za proizvodnju žestokog pića.
    distilled_water_intended_use:
      name: Namjena destilirane vode
      description: Definira primarnu primjenu destilirane vode (npr. za piće, CPAP
        uređaj, ovlaživač zraka, glačalo na paru).
    distress_transmission_frequency:
      name: Frekvencija prijenosa u nevolji
      description: Primarna radiofrekvencija/frekvencije koje se koriste za uzbunjivanje
        u nevolji.
    distressing_level:
      name: Razina uznemirujućeg
      description: Određuje količinu namjernog habanja, poderotina ili oštećenja nanesenih
        na tkaninu.
    distressing_style:
      name: Uznemirujući stil
      description: Označava vrstu ili razinu oštećenja na trapericama, poput poderanih
        ili efekata izblijedjelih nabora.
    distributor_advance_mechanism:
      name: Mehanizam za napredovanje razdjelnika
      description: Određuje vrstu mehanizma za unaprijedno paljenje koji koristi razvodnik.
    distributor_cap_terminal_type:
      name: Vrsta terminala poklopca razvodnika
      description: Određuje vrstu terminala poklopca razvodnika.
    distributor_gear_material:
      name: Materijal zupčanika razvodnika
      description: Određuje materijal zupčanika pogona razvodnika.
    distributor_ignition_type:
      name: Vrsta paljenja razvodnika
      description: Određuje je li razdjelnik dizajniran za razvodne kutije, elektroničko
        paljenje ili HEI sustave.
    distributor_kit_contents:
      name: Kompletan sadržaj distributera
      description: Označava koje su komponente uključene u razvodnik (npr. kapa, rotor,
        modul paljenja, brtva/O-prsten, pogonski zupčanik, ožičenje/mehanizam sinkronizacije).
    dive_computer_form_factor:
      name: Oblik ronilačkog računala
      description: Određuje fizički dizajn ili način montaže ronilačkog računala,
        kao što je montaža na konzolu ili u stilu sata.
    diving_mask_design:
      name: Dizajn maske za ronjenje
      description: Definira cjelokupni strukturni stil ronilačke maske, što utječe
        na pogodnost, vidno polje i namjeravanu uporabu.
    divot_tool_prong_configuration:
      name: Konfiguracija zubaca alata Divot
      description: Određuje broj i raspored zubaca na alatu za bušenje koji se koriste
        za popravak oštećenja travnjaka.
    divot_tool_style:
      name: Stil alata za divot
      description: Definira cjelokupni strukturni ili stil postavljanja alata za izrezivanje,
        kao što je fiksni, preklopni/sklopivi, višenamjenski alat ili pribor koji
        se pričvršćuje na šešir ili palicu.
    djembe_shell_construction:
      name: Izrada školjke za djembe
      description: Opisuje metodu izrade školjke/tijela djembea.
    djembe_tuning_system:
      name: Sustav za ugađanje djembea
      description: Određuje kako je djembe zategnut/štimovan.
    dmx_output_connector_type:
      name: DMX izlazni mehanizam tipa sinkronizacije
      description: Format fizičkog mehanizma sinkronizacije koji se koristi za DMX
        izlazne portove voditelja obrade.
    doctor_playset_items_included:
      name: Uključeni artikli kompleta za igranje doktora
      description: Navodi simulirane medicinske alate i pribor za igranje uloga uključen
        u set za igru liječnika (primjerice stetoskop, šprica, refleksni čekić).
    doctor_playset_role_play_setting:
      name: Doktor igraonica s postavkama za igranje uloga
      description: Identificira primarni kontekst uloge koji predstavlja set za igru
        s doktorom.
    doctor_playset_wearable_items_included:
      name: Uključeni nosivi artikli kompleta za igranje doktora
      description: Označava nosive dijelove kostima uključene u set za igru.
    doll_accessory_type:
      name: Vrsta dodatka za lutku
      description: Definira o kojoj se vrsti pribora za lutku ili akcijsku figuru
        radi (primjerice odjeća, obuća, namještaj, izložbeni stalci), omogućujući
        kupacu pregledavanje i filtriranje unutar ove kategorije pribora.
    doll_eye_type:
      name: Tip lutkinog oka
      description: Određuje stil izrade očiju lutke (npr. umetnute akrilne, oslikane,
        LED osvijetljene).
    doll_hair_fiber_type:
      name: Vrsta vlakana za kosu lutke
      description: Vrsta kose/vlakana korištena na lutki (ili nijedna), što utječe
        na realizam, stil i njegu.
    doll_making_kit_components_included:
      name: Uključene komponente kompleta za izradu lutke
      description: Navodi ključne materijale i alate uključene u komplet za izradu
        lutke kako bi kupci mogli usporediti pakete i znati što im je potrebno za
        samosnabdijevanje.
    dollhouse_installation_placement_type:
      name: Vrsta ugradnje/položaja kućice za lutke
      description: Kako je kućica za lutke namijenjena za korištenje ili postavljanje
        (npr. za stol, za podno ili zidno postavljanje).
    dollhouse_items_included:
      name: Stavka za kućicu za lutke uključena
      description: Identificira što dolazi u kutiji s kućicom za lutke (namještaj,
        lutke, pribor).
    dollhouse_lighting_type:
      name: Vrsta rasvjete za kućicu za lutke
      description: Vrsta rasvjete uključene u kućicu za lutke ili koju ona podržava.
    dollhouse_room_type:
      name: Vrsta sobe u kućici za lutke
      description: Određuje predviđenu sobu/područje unutar kućice za lutke gdje se
        dodatak obično koristi.
    dollhouse_scale:
      name: Mjerilo za kućicu za lutke
      description: Omjer mjerila kućice za lutke ili pribora za kućicu za lutke (primjerice
        1:12) kako bi se osigurala kompatibilnost između kućica, namještaja i figura.
    dollhouse_style_theme:
      name: Stil/tema kućice za lutke
      description: Sveukupni stil ili tema kućice za lutke za razgledavanje i darivanje
        (primjerice moderna vs. viktorijanska).
    donnos_playing_technique:
      name: Donnosova tehnika sviranja
      description: Kako se Donnos svira/aktivira (samo ručno u odnosu na palicu/udarač),
        kako bi odgovarao očekivanjima kupca i uključenoj dodatnoj opremi.
    donnos_tuning_system:
      name: Sustav ugađanja Donnos
      description: Primarna metoda koja se koristi za ugađanje ili promjenu visine
        tona (npr. mehanizam za zatezanje/stiskanje).
    door_assembly_type:
      name: Vrsta sklopa vrata
      description: 'Označava što je uključeno: samo kućište vrata, obloga vrata ili
        kompletna montaža vrata.'
    door_closure_mechanism:
      name: Mehanizam za zatvaranje vrata
      description: Definira mehanizam koji kontrolira zatvaranje vrata (primjerice
        meko zatvaranje, magnetska brava).
    door_handle_components_included:
      name: Komponente korisničkog imena vrata uključene
      description: Označava koji su ključni dijelovi uključeni s ručicom vrata (npr.
        cilindar brave, brtva, ukrasni poklopac, montažni hardver, ožičenje, zasun/aktuator).
    door_handle_operation:
      name: Vrata korisničko ime rad
      description: Određuje primarni način aktiviranja/upravljanja sklopa vrata vozila
        (primjerice mehaničko povezivanje, cilindar ključa, dodirno/gumbasto zaključavanje,
        električno otvaranje/otključavanje).
    door_lock_knob_attachment_method:
      name: Način pričvršćivanja gumba za bravu vrata
      description: Određuje kako se gumb brave na vratima pričvršćuje na šipku brave
        (primjerice niz poruka, na dodir).
    door_lock_position:
      name: Položaj brave na vratima
      description: Određuje za koji položaj vrata/otvaranja su brava ili dio brave
        vrata dizajnirane da odgovaraju vozilu.
    door_seal_feature_set:
      name: Set značajki brtve vrata
      description: Funkcionalne značajke brtve vrata.
    door_seal_material_type:
      name: Vrsta materijala brtve vrata
      description: Primarna obitelj elastomera/materijala koja se koristi za brtvu
        vrata (izvan generičkog materijala).
    door_seal_product_form:
      name: Oblik proizvoda za brtvu vrata
      description: Označava oblik prodaje/pakiranja brtve vrata.
    door_window_operation:
      name: Način otvaranja prozora vrata
      description: Određuje je li sustav prozora vrata namijenjen za ručno ili električno
        upravljanje ili vrata nemaju prozor.
    double_decker_bus_deck_configuration:
      name: Konfiguracija palube dvokatnog autobusa
      description: Određuje konfiguraciju pristupa palubi/krova dvokatnog autobusa.
    double_drum_pedal_linkage_medium:
      name: Srednja poluga pedale s dvostrukim bubnjem
      description: Određuje medij koji se koristi za povezivanje sekundarne papučice
        s primarnom papučicom (primjerice pogonsko vratilo, lanac, remen).
    double_end_bag_core_type:
      name: Tip jezgre s dvostrukim krajem
      description: Identificira unutarnju konstrukciju udarne jezgre koja određuje
        brzinu odskoka, osjećaj i zahtjeve za održavanjem.
    double_pointed_needle_point_style:
      name: Dvostruki šiljasti vrh igle
      description: Opisuje oštrinu vrha/oblik namijenjen različitim pređama i stilovima
        pletenja.
    dough_extruder_accessories_included:
      name: Uključeni pribor za ekstruder tijesta
      description: Dodatne komponente uključene u ekstruder za tijesto.
    dough_extruder_operation_type:
      name: Vrsta rada ekstrudera za tijesto
      description: Kako se tijesto gura kroz ekstruder da bi se formirali oblici.
    dough_extruder_shape_disc_included:
      name: Ekstruder za tijesto, s uključenim diskom za oblik
      description: Oblik(ci) koje ekstruder može proizvesti pomoću priloženih diskova/mlaznica.
    dough_format:
      name: Oblik tijesta
      description: Identificira fizički izgled/oblici tijesta unutar pakiranja (primjerice
        kugla, list, disk, usitnjene niti).
    doumbek_accessories_included:
      name: Uključeni dodaci za doumbek
      description: Pribor uključen uz doumbek (primjerice ključ za ugađanje, kutija).
    doumbek_head_material:
      name: Materijal glave doumbeka
      description: Materijal glave (membrane) bubnja na doumbeku.
    doumbek_head_type:
      name: Doumbek tip glave
      description: Konstrukcija/vrsta doumbek glave (kako je membrana izrađena ili
        montirana).
    doumbek_playing_style_technique:
      name: Doumbek stil/tehnika sviranja
      description: Namjeravani kontekst/stil sviranja koji se obično povezuje s doumbekom.
    doumbek_tuning_system:
      name: Sustav ugađanja doumbeka
      description: Kako je doumbek zategnut/ugođen (ili se ne može ugođivati).
    dowel_end_style:
      name: Stil kraja tiple
      description: Opisuje rezove/oblike krajeva tiple što utječe na jednostavnost
        umetanja, sigurnost i namjeravanu uporabu.
    dowel_surface_texture:
      name: Tekstura površine tipla
      description: Opisuje površinski uvjet tiple, poput glatke ili rebraste, što
        utječe na izgled i prianjanje ljepila.
    drafting_compass_adjustment_mechanism:
      name: Mehanizam za podešavanje kompasa za crtanje
      description: Primarni mehanizam za fino podešavanje koji se koristi za precizno
        podešavanje radijusa.
    drafting_compass_fine_adjustment_mechanism:
      name: Mehanizam fine regulacije tehničkog šestara
      description: Vrsta finog podešavanja koja se koristi za precizno postavljanje
        radijusa (ako postoji).
    drafting_compass_lead_holder_type:
      name: Izrada kompasa potencijalni kupac holder type
      description: Vrsta umetka/držača za crtanje koji je uključen ili podržan od
        strane kompasa.
    drag_system_material:
      name: Materijal sustava za vuču
      description: Identificira materijal ili tehnologiju korištenu u drag stogu,
        utječe otpornost na toplinu i glatkoću.
    drag_system_type:
      name: Vrsta sustava kočenja
      description: Označava vrstu mehanizma kočnice koji se koristi u rolni, kao što
        su prednja, stražnja, polužna, zvjezdasta, magnetska ili disk kočnica.
    drag_type:
      name: Vrsta povlačenja
      description: Određuje stil mehanizma vučenja koji koristi kolut (lokacija ili
        način aktiviranja).
    drawer_features:
      name: Značajke ladice
      description: Posebni konstrukcijski elementi ili funkcionalnosti ladica (npr.
        meko zatvaranje, obložene filcom).
    drawer_slide_type:
      name: Vrsta klizača ladice
      description: Određuje stil montaže i izvlačenja vodilica ladica (npr. podmontaža,
        potpuno izvlačenje).
    drawing_ink_compatible_tools:
      name: Alati kompatibilni s tintom za crtanje
      description: Određuje alate za koje je tinta namijenjena (primjerice olovka
        za umakanje u odnosu na kist).
    drawing_ink_permanence:
      name: Trajnost tinte za crtanje
      description: Označava karakteristike trajnosti važne za gotova umjetnička djela
        i reprodukciju.
    dress_embellishment:
      name: Ukrašavanje haljine
      description: Highlight istaknute dekorativne elemente ugrađene u dizajn haljine.
    dress_train_type:
      name: Vrsta šlep haljine
      description: Označava prisutnost i duljinu/stil šlep-lepa, informirajući o formalnosti
        i prikladnosti mjestu.
    dried_surface_finish:
      name: Završna obrada suhe površine
      description: Opisuje tipičan izgled površine nakon sušenja (sjaj/tekstura).
    drink_tube_insulation:
      name: Izolacija cijevi za piće
      description: Označava uključuje li cijev za piće izolaciju ili toplinsku oblogu
        za sprječavanje zagrijavanja ili smrzavanja tekućina.
    drive_band_cross_section_shape:
      name: Oblik poprečnog presjeka pogonskog remena
      description: Shapes profila pogonske trake (okrugli, ravni itd.).
    drive_band_join_type:
      name: Vrsta spajanja pogonskog pojasa
      description: Kako je pogonski pojas spojen/konstruiran (beskonačan nasuprot
        onog koji treba vezanje itd.).
    drive_band_material_type:
      name: Vrsta pogonskog remena
      description: Određuje materijal/vrstu pogonskog remena koji se koristi na kotačima
        za predenje.
    drive_location:
      name: Lokacija pogona
      description: Označava gdje se zamašnjak/pogonski mehanizam nalazi na eliptičnom
        trenažeru, što utječe na otisak i osjećaj kretanja.
    drive_mechanism:
      name: Pogonski mehanizam
      description: Označava vrstu pogonskog sklopa koji se koristi za prijenos snage
        s pedala na zamašnjak.
    drive_shaft_material:
      name: Materijal pogonskog vratila
      description: Određuje primarni konstrukcijski materijal cijevi pogonskog vratila
        ili cijelog sklopa.
    drive_system:
      name: Pogonski sustav
      description: Određuje mehanizam kojim se sila pedale prenosi na sustav otpora.
    drivetrain_configuration:
      name: Konfiguracija pogonskog sklopa
      description: Određuje postavke pogonskog sklopa na biciklu, pokazujući je li
        stražnja glavčina fiksna, slobodna s jednom brzinom ili preklopna.
    drivetrain_speed_compatibility:
      name: Kompatibilnost brzina pogonskog sklopa
      description: Navodi brzine kasete za koje je lančanik konstruiran, osiguravajući
        odgovarajuće profile zubaca i razmak.
    drone_positioning_system:
      name: Sustav za pozicioniranje drona
      description: Uvođenje u organizaciju tehnologiju pozicioniranja/držanja podržanu
        dronom za navigaciju i stabilno lebdenje.
    drone_transmission_type:
      name: Vrsta prijenosa drona
      description: Primarna metoda koja se koristi za kontrolu i/ili video vezu između
        drona i voditelja obrade/uređaja.
    drop_spindle_whorl_position:
      name: Položaj spirala padajućeg vretena
      description: lokacija pršljena na osovini.
    drum_carder_accessories_included:
      name: Uključeni dodaci za bubanj-karder
      description: Uobičajeno je uključena stavka s bubnjem carder komplet.
    drum_clamp_locking_mechanism:
      name: Mehanizam za zaključavanje stezaljke bubnja
      description: Određuje kako se stezaljka pričvršćuje/zateže na cijev/obruč (primjerice
        krilni vijak, vijak s ključem za bubanj, brzo otpuštanje).
    drum_clamp_mount_interface:
      name: Sučelje za montažu stezaljke bubnja
      description: Određuje što stezaljka omogućuje za pričvršćivanje pribora (primjerice
        prijemnik L-šipke, kuglasti zglob, nagibnik činele).
    drum_clamp_type:
      name: Vrsta stezaljke za bubanj
      description: Određuje funkcionalni stil stezaljke koji se koristi u kompletnom
        hardveru za montažu bačve (primjerice obručna stezaljka u odnosu na stezaljku
        za cijev/stalak).
    drum_head_application_batter_resonant:
      name: Aplikacija glave bubnja (udarač/rezonantna)
      description: Određuje za koju stranu/ulogu je membrana dizajnirana na bubnju
        (gornja površina za sviranje vs. donja rezonantna/strana bubnja).
    drum_head_collar_type:
      name: Vrsta ovratnika glave bubnja
      description: Određuje ima li glava standardni ovratnik, niski ovratnik ili specijalni
        profil ovratnika kako bi odgovarao određenim rubovima/ljuskama ležaja.
    drum_head_damping_control:
      name: Kontrola prigušenja membrane bubnja
      description: Ugrađene značajke kontrole gornjeg tona ili stil prigušenja uključeni
        su u dizajn glave.
    drum_head_film_material:
      name: Materijal folije za membranu bubnja
      description: Primarni materijal filma za glavu (obično PET/Mylar, ali može uključivati
        i specijalne materijale).
    drum_head_hoop_collar_type:
      name: Vrsta obruča/ovratnika glave bubnja
      description: Označava konstrukciju obruča i prstena membrane bubnja (npr. profil
        prstena i materijal obruča), što može utjecati na pristajanje i stabilnost
        ugađanja na određenim korpusima i obručima.
    drum_head_hoop_rim_material:
      name: Materijal obruča/obruča membrane bubnja
      description: Materijal obruča/obroča (ugrađeni obruč unutar membrane), što može
        utjecati na trajnost i stabilnost ugađanja.
    drum_head_included:
      name: Uključena membrana za bubanj
      description: Označava jesu li uz bubanj uključene membrane za udaranje i/ili
        rezonantne membrane.
    drum_head_muffling_feature:
      name: Značajka prigušenja glave bubnja
      description: Ugrađene funkcije kontrole gornjeg tona integrirane u glavu bubnja.
    drum_head_muffling_type:
      name: Vrsta prigušivanja membrane bubnja
      description: Označava da li membrana bubnja uključuje ugrađene elemente za kontrolu/prigušivanje
        gornjeg tona.
    drum_head_ply_count:
      name: Broj slojeva membrane bubnja
      description: Broj slojeva/slojeva folije korištenih u konstrukciji glave bubnja
        (primjerice jednoslojni, dvoslojni).
    drum_head_position:
      name: Položaj membrane bubnja
      description: Označava je li membrana bubnja namijenjena kao membrana za udaranje
        (gornja/udarna), rezonantna (donja), membrana za stranu bubnja (donja) ili
        se može koristiti na oba načina.
    drum_head_reinforcement_type:
      name: Vrsta ojačanja glave bubnja
      description: Određuje uključuje li membrana bubnja elemente pojačanja poput
        središnje točke ili kontrolnog prstena za povećanje izdržljivosti i fokusiranog
        tona.
    drum_head_surface_finish:
      name: Površinska obrada glave bubnja
      description: Tekstura/završna obrada površine glave koja utječe na napad i odziv
        četke.
    drum_head_type:
      name: Vrsta membrane za bubanj
      description: Određuje konstrukciju/vrstu membrane koja se koristi na bubnju
        (prvenstveno za membrane za udaranje/rezonantne membrane kako je dato).
    drum_key_design_type:
      name: Dizajn ključa za bubanj
      description: Opisuje funkcionalni dizajn ključa zateznog bubnja (primjerice
        standardni, zupčasti, T-korisničko ime).
    drum_key_drive_type:
      name: Vrsta pogona tipke bubnja
      description: Određuje stil pogona/sučelja ključa bubnja koji se koristi za zahvat
        zatezne šipke ili montažnog hardvera.
    drum_key_handle_style:
      name: Tipka bubnja korisničko ime stil
      description: Opisuje korisničko ime/ergonomski stil tipke bubnja, koji utječe
        na udobnost i polugu tijekom ugađanja.
    drum_kit_included_items:
      name: Stavke uključene u komplet bubnja
      description: Navodi koje su glavne stavke uključene u kompletni paket bubnjeva
        izvan školjki/padova (primjerice hardver, činele, tron).
    drum_kit_portability:
      name: Prenosivost kompleta bubnja
      description: Označava je li komplet dizajniran za kompaktno skladištenje/transport
        (primjerice putovanje/kompaktnost/sklapanje).
    drum_kit_shell_construction_features:
      name: Značajke konstrukcije kompletne školjke bubnja
      description: Način na koji su školjke konstruirane (broj/vrsta slojeva), što
        utječe na ton i trajnost.
    drum_mount_clamp_type:
      name: Vrsta stezaljke za bubanj
      description: Opisuje faktor oblika stezaljke koji se koristi u hardveru za montažu
        bubnja.
    drum_multi_clamp_clamp_type:
      name: Vrsta stezaljke za bubanj s više stezaljki
      description: Funkcionalni stil/konfiguracija višestruke stezaljke (kako steže
        i što spaja).
    drum_mute_material:
      name: Materijal za prigušivanje bubnja
      description: Određuje primarni materijal prigušivača bubnja koji dodiruje membranu
        bubnja i/ili prigušuje vibracije.
    drum_pad_triggering_zones:
      name: Zone pokretača bubnja
      description: Označava broj/vrstu zona pokretača koje podržava udaraljku (npr.
        samo membrana vs. membrana+obruč), što utječe na ekspresivnost i kompatibilnost
        modula.
    drum_pedal_accessories_included:
      name: Uključeni dodaci za pedalu bubnja
      description: Navodi ključni pribor i komponente koje dolaze s pedalom za bubanj.
    drum_pedal_baseplate_type:
      name: Vrsta osnovne ploče pedale za bubanj
      description: Označava koristi li pedala osnovnu ploču ili plutajući/bezokvirni
        dizajn.
    drum_pedal_bearing_type:
      name: Vrsta ležaja pedale bubnja
      description: Određuje mehanizam ležaja koji se koristi na primarnim točkama
        okretanja (primjerice klackalica, peta, greben).
    drum_pedal_cam_type:
      name: Tip bregaste pedale bubnja
      description: Određuje Shapes/geometriju pedale bubnja koji Influence na osjećaj
        i odziv (primjerice linearno vs. akcelerator).
    drum_pedal_chain_configuration:
      name: Konfiguracija lanca pedale za bubanj
      description: Određuje raspored lanca koji koristi bubnjarska pedala s lančanim
        pogonom (primjerice jednolančani, dvostruki lančani ili ofsetni lančani).
    drum_pedal_chain_type:
      name: Vrsta lanca pedale bubnja
      description: Označava vrstu lanca koji se koristi u pogonu (primjerice valjkasti
        lanac u odnosu na lanac biciklističkog tipa), što može utjecati na glatkoću
        i trajnost.
    drum_pedal_clamp_type:
      name: Vrsta stezaljke pedale za bubanj
      description: Određuje kako se pedala pričvršćuje na obruč bas bubnja.
    drum_pedal_intended_use:
      name: Namjena pedale za bubanj
      description: Označava primarni kontekst sviranja za koji je pedala s remenskim
        pogonom dizajnirana/tržište.
    drum_pedal_spring_adjustment_method:
      name: Metoda podešavanja opruge pedale bubnja
      description: Označava kako se podešava napetost opruge na pedali.
    drum_pedal_spring_type:
      name: Vrsta opruge pedale bubnja
      description: Određuje opružni mehanizam koji se koristi za vraćanje pedale.
    drum_shell_material:
      name: Materijal školjke bubnja
      description: Određuje primarni materijal za izradu kućišta akustičnih bubnjeva
        (npr. javor, breza, akril).
    drum_shell_wood_species:
      name: Vrste drva školjke bubnja
      description: Identificira vrstu drva korištenu za korpus bubnja, utječe na ton
        i rezonancu.
    drumhead_type:
      name: Vrsta membrane za bubanj
      description: Konfiguracija/tip glave korišten na oktobanu.
    drumstick_model:
      name: Model bubnjarske palice
      description: Standardizirana oznaka modela/veličine palice za bubanj koju koriste
        mnogi marke (primjerice 5A, 7A).
    drumstick_taper:
      name: Suženje palice za bubanj
      description: Opisuje profil konusa od osovine do vrha, utjecajni odskok i balans.
    drysuit_footwear_style:
      name: Stil obuće za suho odijelo
      description: Opisuje integrirani završni sloj suhog odijela za potkoljenice
        (primjerice ugrađene čizme, neoprenske čarape, čarape za stopala ili brtve
        za gležnjeve).
    dumbbell_style:
      name: Stil s bučicama
      description: Identificira temeljni dizajn bučice - bilo da se radi o fiksnoj
        jedinici, podesivom sustavu ili stilu ručice s mogućnošću opterećenja - što
        snažno utječe na odluke o kupnji i slučajeve uporabe tijekom vježbanja.
    dundun_playing_position:
      name: Igračka pozicija Dunduna
      description: Predviđeni položaj za sviranje/nošenje bubnja.
    dye_status:
      name: Status boje
      description: Označava je li vata obojena, nebojana/prirodna ili uključuje više
        boja/mješavina.
    dye_style:
      name: Stil bojanja
      description: Određuje je li niz poruke boja jednobojna, šarena ili na neki drugi
        način posebice obojana.
    dye_technique:
      name: Tehnika bojenja
      description: Metoda koja se koristi za bojanje vlakana (primjerice ručno bojanje,
        bojanje u kotlu, svemirsko bojanje).
    dye_type_needlecraft_fabric:
      name: Vrsta boje (tkanina za ručni rad)
      description: Označava je li lanena tkanina jednobojna, ručno bojana ili posebno
        bojana.
    dyeing_color_processing:
      name: Bojanje / obrada boja
      description: Opisuje je li i kako je vlakno bilo obojeno (npr. neobojeno, izbijeljeno/bijelo
        ili specifičnim tehnikama bojenja).
    e_bike_certification_class:
      name: Klasa certifikacije za električne bicikle
      description: Određuje službenu oznaku brzine gume za električne bicikle (primjerice
        E-25, E-50).
    e_bike_speed_rating:
      name: Indeks brzine električnog bicikla
      description: Navodi službenu razinu certifikacije gume za električni bicikl
        (primjerice E25 za ≤25 km/h, E50 za ≤50 km/h).
    e_scooter_connector_type:
      name: Vrsta konektora za električni skuter
      description: Označava vrstu električnog konektora ili utikača koji komponenta
        koristi za napajanje ili signalni priključak.
    e_scooter_throttle_type:
      name: Električni skuter ograničenog tipa
      description: Određuje vrstu ograničenja koja se koristi za kontrolu ubrzanja
        na električnom skuteru.
    ear_coverage:
      name: Pokrivanje ušiju
      description: Navodi uključuje li kaciga zaštitu za uši i je li ona odvojiva.
    ear_coverage_style:
      name: Stil pokrivenosti ušiju
      description: Opisuje kako, ili da li, su uši prekrivene maskom protiv muha.
    ear_coverage_type:
      name: Vrsta pokrivanja za uši
      description: Određuje kako šešir prekriva ili štiti uši, uključujući nazočnost
        i stil zaklopki za uši.
    ear_guard_type:
      name: Vrsta štitnika za uši
      description: Opisuje stil zaštite za uši integrirane u kapu, kao što su štitnici
        od tvrde plastike, podstavljeni ili uklonjivi.
    earmuff_style:
      name: Stil naušnika
      description: Označava način nošenja štitnika za uši ili njegov strukturni dizajn
        (npr. preko glave ili omotavanje iza glave).
    earring_closure_type:
      name: Vrsta zatvaranja naušnice
      description: Određuje mehanizam koji se koristi za pričvršćivanje naušnice na
        uho (primjerice potisni mehanizam, mehanizam s polugom, kopča).
    easel_art_desk_features:
      name: Značajke štafelaja i umjetničkog stola
      description: Highlight uobičajene funkcionalne značajke uključene u štafelaj
        ili umjetnički stol.
    easel_art_desk_surface_type:
      name: Vrsta površine za štafelaj i umjetnički stol
      description: Označava upotrebljivu površinu(e) za crtanje/pisanje (primjerice
        ploča za pisanje kredom, bijela ploča, rola papira, magnetska ploča).
    eb_clarinet_body_type:
      name: Vrsta tijela Eb klarineta
      description: Određuje je li Eb klarinet sopran ili alt varijanta.
    eco_material_type:
      name: Vrsta eko materijala
      description: Highlight ekološki osviještenu tehnologiju pjene ili materijala
        korištenu u ulošku.
    edge_construction:
      name: Konstrukcija ruba
      description: Označava ima li skija metalni rub duž cijele svoje duljine, dijela
        ili cijelog svog dijela.
    edge_tuner_type:
      name: Vrsta rubnog tunera
      description: Klasificira stil uređaja za podešavanje rubova skija ili snowboarda,
        kao što je vodič ili električni stroj.
    edible_plant_part:
      name: Jestivi dio biljke
      description: Označava koji se dio biljke prodaje za konzumaciju.
    educational_guide_included:
      name: Uključen edukativni vodič
      description: Označava koji su materijali za učenje uključeni u model.
    educational_topic:
      name: Obrazovna tema
      description: Primarna tema učenja podržana je obrazovnim sadržajem mravinjaka.
    egg_component:
      name: Komponenta jaja
      description: Označava koji dio jajeta proizvod sadrži, kao što su cijelo jaje,
        samo bjelanjci, žumanjci ili mješavine/zamjene.
    egg_component_replaced:
      name: Zamijenjena komponenta jaja
      description: Označava koji dio jajeta proizvod treba zamijeniti (primjerice
        cijelo jaje, bjelanjak).
    egg_enrichment:
      name: Obogaćivanje jaja
      description: Označava bilo kakvu nutritivnu obogaćenost dodanu jajima, poput
        obogaćivanja omega-3 ili vitaminom D.
    egg_farming_method:
      name: Metoda uzgoja jaja
      description: Označava metodu proizvodnje ili uzgoja koja se koristi za jaja
        (primjerice uzgoj bez kaveza, slobodni uzgoj, organski).
    egg_grade:
      name: Ocjena jaja
      description: Označava ocjenu kvalitete koju su dodijelila regulatorna ili industrijska
        tijela.
    egg_processing_state:
      name: Stanje obrade jaja
      description: Označava bilo kakvu obradu primijenjenu na jajima prije sniženja
        (primjerice svježa, slana, stoljeće jaje).
    egg_production_method:
      name: Metoda proizvodnje jaja
      description: Određuje sustav uzgoja ili smještaja koji se koristi za proizvodnju
        jaja (npr. uzgoj bez kaveza, uzgoj na ispaši, organski).
    egg_replacer_main_ingredient:
      name: Glavni sastojak zamjene za jaja
      description: Označava primarni osnovni sastojak od kojeg je napravljena zamjena
        za jaja, što pomaže korisnicima s prehrambenim potrebama ili željenim svojstvima
        pečenja.
    egg_size:
      name: Veličina jaja
      description: Razvrstava jaja prema standardnim tržišnim oznakama veličine.
    egg_source_animal:
      name: Životinja koja je izvor jaja
      description: Identificira životinjsku vrstu koja je proizvela jaja.
    egg_white_processing_method:
      name: Metoda obrade bjelanjaka
      description: Označava kako su bjelanjci obrađeni nakon kolekcije (npr. pasterizirani,
        sušeni raspršivanjem), što utječe na sigurnost hrane, vijek trajanja i slučajeve
        uporabe.
    eggplant_variety:
      name: Sorta patlidžana
      description: Određuje kultivar ili tržište patlidžana, što kupcu omogućuje odabir
        vrsta koje se razlikuju po veličini, okusu, boji i kulinarskoj uporabi.
    eggshell_color:
      name: Boja ljuske jajeta
      description: Određuje prevladavajuću boju ljuske jaja.
    elastic_edge_finish_type:
      name: Završna obrada/vrsta elastičnog ruba
      description: Određuje rubnu konstrukciju tkane elastike koja utječe na udobnost
        i primjenu.
    elastic_intended_use:
      name: Elastična namjena
      description: Primarna primjena za koju je elastika dizajnirana (pomaže u otkrivanju
        i smanjuje neusklađenosti).
    elastic_recovery_performance:
      name: Učinkovitost elastičnog oporavka
      description: Opisuje koliko se dobro tkana elastika vraća u svoju izvornu duljinu
        nakon istezanja.
    elastic_recovery_quality:
      name: Kvaliteta elastičnog oporavka
      description: Označava oporavak elastične mase nakon istezanja - koliko se dobro
        vraća u prvobitnu duljinu nakon istezanja.
    elastic_stretch_level:
      name: Razina elastičnog rastezanja
      description: Koliko se elastika može istegnuti pod napetošću (često se izražava
        kao relativne razine kada točan postotak nije naveden).
    elastic_structure:
      name: Elastična struktura
      description: Određuje strukturnu konstrukciju elastične trake za rupice za gumbe
        (primjerice pletene ili tkane), koja može utjecati na istezanje, oporavak
        i učinkovitost šivanja.
    elastic_type:
      name: Vrsta elastike
      description: Određuje vrstu konstrukcije elastike (primjerice preklopna elastika
        (FOE), pletena, pletena, tkana).
    electric_assist_type:
      name: Vrsta električne pomoći
      description: Označava ima li bicikl pomoć motora i vrstu pružene pomoći.
    electric_bicycle_motor_position:
      name: Položaj motora električnog bicikla
      description: Lokacija pogonskog motora na električnom biciklu, kao što su srednji
        pogon, prednja glavčina, stražnja glavčina ili dvostruka glavčina.
    electric_bike_class:
      name: Klasa električnih bicikala
      description: Kategorizira električne bicikle prema regulatornim klasama koje
        definiraju ograničenja brzine i ograničenu pomoć.
    electric_guitar_bridge_type:
      name: Vrsta mosta za električnu gitaru
      description: Određuje vrstu sustava mosta/vibrato na električnoj gitari.
    electric_instrument_output_connection_type:
      name: Vrsta izlaznog priključka električnog instrumenta
      description: Određuje fizički audio izlaz(e) na električnom violončelu.
    electric_riding_vehicle_control_options:
      name: Mogućnosti upravljanja električnim vozilom za vožnju
      description: Mogućnosti upravljanja/rada dostupne vozaču/roditelju (npr. pedala,
        volan, daljinsko upravljanje).
    electric_spinning_wheel_speed_control_type:
      name: Vrsta električne kontrole brzine kotača za predenje
      description: Opisuje kako korisnik podešava brzinu vrtnje na električnom kotaču.
    electric_ukulele_output_jack_type:
      name: Izlazni priključak za električnu ukulele
      description: Određuje fizički izlaz mehanizam sinhronizacije koji koristi električna
        ukulele.
    electric_van_body_length_class:
      name: Klasa duljine karoserije električnog kombija
      description: Uobičajena klasa veličine kombija na temelju međuosovinskog razmaka/duljine
        koja se koristi u oglasu.
    electric_van_roof_height_class:
      name: Klasa visine krova električnog kombija
      description: Uobičajena klasifikacija visine krova koja se koristi za kombije
        (posebno teretne kombije).
    electric_vehicle_drivetrain_layout:
      name: Izgled pogona električnog vozila
      description: Konfiguracija motora/osovine koja opisuje koliko motora i gdje
        se nalaze (izvan jednostavnog pogona na sva četiri kotača (AWD/FWD/RWD)).
    electric_winder_accessories_included:
      name: Pribor za električni namotač uključen
      description: Navodi pribor koji dolazi s električnim namotačem (primjerice stezaljke,
        prilagodnici).
    electrical_connector_type:
      name: Vrsta električnog priključka
      description: Određuje stil mehanizma sinhronizacije koji koristi sustav brave/zaključavanja
        vrata za električnu integraciju (ako je primjenjivo).
    electrical_system_voltage:
      name: Napon električnog sustava
      description: Označava nominalni napon električnog sustava vozila za koji je
        regulator dizajniran.
    electronic_cymbal_trigger_zones:
      name: Zone pokretača elektroničke činele
      description: Određuje koliko neovisnih zona pokretača pruža jastučić činele
        (npr. gudalo/rub/zvono).
    electronic_drum_module_audio_interface_functionality:
      name: Funkcionalnost audio sučelja elektroničkih modula bubnjeva
      description: Označava mogu li moduli djelovati kao USB audio sučelje za snimanje/reprodukciju
        (uz MIDI).
    electronic_drum_module_metronome_features:
      name: Značajke metronoma elektroničkih modula bubnjeva
      description: Određuje ugrađenu mogućnost vježbe/metronoma.
    electronic_drum_module_power_source:
      name: Izvor napajanja za elektroničke module bubnjeva
      description: Određuje potreban ili podržani izvor napajanja za upravljački modul.
    electronic_drum_module_sample_import_support:
      name: Podrška za uvoz uzoraka modula elektroničkog bubnja
      description: Označava mogu li moduli uvoziti korisničke uzorke i kojom metodom.
    electronic_drum_pad_playing_surface_type:
      name: Vrsta površine za sviranje elektroničkog bubnja
      description: Opisuje konstrukciju površine za igranje jastučića toma (npr. mrežasta
        membrana u odnosu na gumenu), što utječe na odskok, buku i osjećaj.
    electronic_features:
      name: Elektroničke značajke
      description: Označava elektroničke/interaktivne značajke uključene u stavku
        za igranje bankarstva (ako ih ima).
    electronic_lights_and_sound:
      name: Elektronička svjetla i zvuk
      description: Označava uključuje li set za igru kućice za lutke elektronička
        svjetla i/ili zvučne značajke (primjerice svjetla, zvono na vratima, glazbu,
        zvučne efekte).
    electronics_power_source:
      name: Elektronički izvor napajanja
      description: Određuje kako se napaja aktivna elektronika (kada je primjenjivo).
    eligible_race_series:
      name: Serije utrka koje ispunjavaju uvjete
      description: Serija utrka ili tijelo koje odobrava natjecanje u kojem automobil
        ima pravo sudjelovati.
    elliptical_trainer_part_type:
      name: Vrsta dijela eliptičnog trenažera
      description: Klasificira određenu vrstu pribora ili zamjenskog dijela za eliptični
        trenažer (npr. remen, konzolu, pedalu) tako da kupci mogu brzo filtrirati
        stavku koja im je potrebna bez navigacije kroz mnoge mikrokategorije.
    embellishment_technique:
      name: Tehnika ukrašavanja
      description: informacija primarni dekorativni ili površinski rad primijenjen
        na odjevnom predmetu, kao što su vez, tisak ili perlice.
    embellishment_type:
      name: Vrsta ukrašavanja
      description: Označava vrstu ukrasnog elementa primijenjenog na podvezicu, poput
        čipke, mašnica ili bisera.
    embossing_pen_ink_color:
      name: Utiskivanje olovke s tintom, boja
      description: Određuje boju tinte koju nanosi reljefna olovka (može biti prozirna/ljepljiva
        ili pigmentirana). Razlikuje se od boje olovke/bačve.
    embossing_stylus_tip_shape:
      name: Oblik vrha olovke za utiskivanje
      description: Opisuje geometriju vrha za utiskivanje koji se koristi za izradu
        različitih efekata (primjerice kuglasti vs. šiljasti).
    embroidered_coverage_level:
      name: Razina pokrivenosti vezenim materijalom
      description: Približna količina pokrivenosti izvezenim nizom poruke na prednjoj
        strani zakrpe.
    embroidered_patch_backing_type:
      name: Vrsta podloge vezene zakrpe
      description: Sloj podloge/podrške na poleđini vezene zakrpe utječe na trajnost
        i način na koji se može primijeniti.
    embroidery_hoop_type:
      name: Vrsta obruča za vezenje
      description: Identificira stil konstrukcije obruča za vezenje i njegov primarni
        mehanizam za zatezanje.
    embroidery_machine_bobbin_type:
      name: Vrsta špulice za vezenje
      description: Vrsta/način punjenja sustava špulice.
    emergency_lighting_configuration:
      name: Konfiguracija rasvjete za hitne slučajeve
      description: Određuje konfiguraciju primarne ugrađene rasvjete za upozorenje
        u hitnim slučajevima na vozilu (primjerice svjetlosna traka na krovu, svjetla
        na rešetki).
    emergency_lighting_package:
      name: Paket rasvjete za hitne slučajeve
      description: Određuje vrste ugrađenih svjetala za upozorenje u hitnim slučajevima.
    emissions_compliance_standard:
      name: Standard sukladnosti s emisijama
      description: Označava certifikaciju/usklađenost s emisijama za motor gdje je
        to primjenjivo.
    emissions_standard:
      name: Standard emisija
      description: Standard sukladnosti s emisijama za vozilo (razlikuje se ovisno
        o regiji i godini).
    enclosure_panel_configuration:
      name: Konfiguracija ploče kućišta
      description: Određuje koje su ploče ili stranice kućišta uključene (konfiguracija
        pokrivenosti), kao što je potpuno kućište, samo bočne zavjese ili trostrano
        (otvoreno sprijeda/straga).
    enclosure_window_material:
      name: Materijal za prozore kućišta
      description: Označava materijal korišten za prozirne prozorske ploče kućišta.
    end_fitting_type:
      name: Vrsta završnog spoja
      description: Stil mehanizma sinhronizacije koji se koristi na svakom kraju podupirača
        (na strani vozila i na strani poklopca), određuje kompatibilnost nosača.
    end_type:
      name: Vrsta završetka
      description: Određuje stil završetka/pričvršćivanja na krajevima vučne trake
        za spajanje na točke oporavka.
    ends_style_blocking_wires:
      name: Završni stil (blokirajuće žice)
      description: Kako su krajevi žice za blokiranje završeni radi sigurnosti i lakšeg
        provlačenja kroz rubove čipke.
    enduro_bike_suspension_adjustability:
      name: Podesivost ovjesa enduro bicikla
      description: Označava koja su podešavanja ovjesa dostupna (obično za prednju
        vilicu i stražnji amortizer).
    engine_bay_mounting_location:
      name: Lokacija montaže u prostoru motora
      description: Gdje je predviđena ugradnja preljevnog spremnika u udubljenje motora
        (relativni položaj).
    engine_bearing_coating:
      name: Premaz ležaja motora
      description: Određuje bilo koji površinski premaz na ležaju (za otpornost na
        habanje, ugradljivost, smanjeno trenje).
    engine_bearing_position:
      name: Položaj ležaja motora
      description: Određuje lokaciju/funkciju ležaja unutar motora.
    engine_bearing_size:
      name: Veličina ležaja motora
      description: Određuje je li ležaj standardne veličine ili premale/predimenzionirane
        varijante (obično se veže za brušenje radilice i rasprodaju).
    engine_configuration:
      name: Konfiguracija motora
      description: Opisuje izgled/konfiguraciju cilindara motora (npr. redni, V, ravni,
        bokser).
    engine_cooling_type:
      name: Vrsta hlađenja motora
      description: Određuje način hlađenja motora.
    engine_degreaser_form:
      name: Oblik odmašćivača motora
      description: Fizički oblik/oblik dostave odmašćivača motora.
    engine_degreaser_rinse_requirement:
      name: Potreba za ispiranjem odmašćivača motora
      description: Je li odmašćivač namijenjen ispiranju vodom nakon nanošenja.
    engine_mount_type:
      name: Vrsta nosača motora
      description: Određuje funkcionalni dizajn nosača motora (primjerice hidraulički,
        čvrsti, amortizer s okretnim momentom).
    engine_oil_formulation:
      name: Formulacija motornog ulja
      description: Označava fokus formulacije motornog ulja, kao što su standardna
        uporaba, kondicioniranje za veliku kilometražu, produljeni intervali zamjene
        ili primjena za vozni park/teška vozila i povezani uvjeti primjene.
    engine_oil_specification:
      name: Specifikacija motornog ulja
      description: Specifikacija/standard kojem ulje odgovara (primjerice API SP,
        API SN Shopify Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Sadržaj kompleta za obnovu motora
      description: Označava koje su glavne komponente uključene u komplet za obnovu
        motora.
    engine_rotation_direction:
      name: Smjer rotacije motora
      description: Određuje smjer vrtnje motora koji se koristi u pomorskim aplikacijama.
    engine_timing_system_drive_type:
      name: Vrsta pogona sustava za upravljanje vremenom motora
      description: Označava je li sustav razvoda motora remenski, lančani ili zupčanički
        pogon radi usklađivanja kompatibilnosti.
    engine_valve_coating:
      name: Premaz ventila motora
      description: Označava bilo kakvu površinsku obradu ili premaz nanesen na ventil
        radi otpornosti na habanje/toplinu.
    engine_valve_position:
      name: Položaj ventila motora
      description: Određuje je li ventil motora namijenjen za usisnu ili ispušnu stranu
        motora.
    engine_valve_stem_tip_type:
      name: Vrsta vrha stabla ventila motora
      description: Određuje stil ili konstrukciju vrha ventila na mjestu kontakta
        s klackalicom ili podešivačem.
    engine_valvetrain_type:
      name: Tip ventilskog mehanizma motora
      description: Raspored ventilskog mehanizma/bregastog vratila.
    enhancement_level:
      name: Razina poboljšanja
      description: 'Približno povećanje volumena koje pruža umetak, izraženo u veličinama
        šalica: Suptilno (do jedne šalice), Umjereno (jedna do dvije šalice), Značajno
        (dvije+ šalice).'
    entry_zipper_location:
      name: Lokacija ulaznog patentnog zatvarača
      description: Određuje gdje se nalazi primarni patentni zatvarač ili otvor odijela
        (primjerice sprijeda, straga, na ramenu, dijagonalno).
    epee_point_type:
      name: Vrsta vrha mača
      description: Određuje marku ili standard vrha ugrađenog na oštricu, što utječe
        na kompatibilnost i održavanje.
    equestrian_discipline:
      name: Konjička disciplina
      description: Određuje disciplinu jahanja za koju je ostruga namijenjena ili
        najprikladnija.
    equestrian_helmet_safety_certification:
      name: Certifikat o sigurnosti kacige za jahanje
      description: Određuje sigurnosne standarde ili certifikate kojima je kaciga
        sukladna
    equine_application_area:
      name: Područje primjene za konje
      description: Određuje regiju tijela ili materijal za koji je proizvod namijenjen
        (npr. kopito, griva, čavlić).
    equipment_contact_material_brew_wine:
      name: Materijal za kontakt s opremom (pivo/vino)
      description: Primarni materijal stavke koji dolazi u dodir s tekućinom (primjerice
        staklo, nehrđajući čelik, plastika).
    eu_children_clothing_size:
      name: Veličina dječje odjeće EU
      description: Određuje veličinu dječje odjeće EU prema visini, kao što je 104
        ili 140
    eu_clothing_size:
      name: Veličina odjeće (EU)
      description: Određuje EU veličinu odjeće, kao što je 38 ili 46
    eu_cup_size:
      name: Veličina EU kupa
      description: Označava veličinu košarica grudnjaka EU, kao što je C ili E
    eu_ring_size:
      name: Veličina EU prstena
      description: Određuje veličinu EU prstena prema opsegu, kao što je 52 ili 63
    eu_shoe_size:
      name: EU veličina cipela
      description: Određuje veličinu EU cipele, kao što je 42 ili 42 Wide
    euphonium_included_accessories:
      name: Priloženi pribor za eufonij
      description: Popisi su uključivali stavku koja se obično pakira s eufonijem
        (primjerice usnikom, kutijom).
    euphonium_valve_configuration:
      name: Konfiguracija eufonijskog ventila
      description: Određuje broj ventila i je li 4. ventil ručno upravljan ili mehanizmom
        bočnog djelovanja.
    european_sword_historical_period:
      name: Povijesno razdoblje europskog mača
      description: Primarno povijesno razdoblje na kojem se temelji uzorak/replika
        mača (ili doba originala).
    european_sword_pattern_type:
      name: Uzorak/vrsta europskog mača
      description: Specifičan uzorak/vrsta europskog mača (tipologija) predstavljen
        kolekcionarskim mačem.
    ev_connector_adapter_direction:
      name: Smjer EV priključka/adaptera
      description: Određuje što prilagodnik konvertira FROM i TO (strana ulaza vozila
        u odnosu na stranu punjača/kabela), omogućujući precizno filtriranje kompatibilnosti.
    ev_conversion_kit_completeness_level:
      name: Razina dovršenosti kompleta za EV konverziju
      description: Označava je li proizvod potpuni komplet za konverziju ili djelomični
        komplet/paket (npr. samo motor+kontroler).
    ev_conversion_kit_drivetrain_configuration:
      name: EV konverzija kompletna konfiguracija pogona
      description: Određuje arhitekturu pogonskog sklopa kompleta za EV konverziju,
        uključujući položaj motora/izgled pogona i zadržava li postojeći mjenjač.
    ev_conversion_kit_voltage_class:
      name: EV konverzija kompletna klasa napona
      description: Nazivni razred napona sustava (bucket) oko koje je dizajniran komplet
        EV konverzija. Koristite ovo za filtriranje prema uobičajenim klasama napona
        sustava uz točno mjerenje napona.
    evaporator_core_type:
      name: Vrsta jezgre isparivača
      description: Specificira konstrukcijski dizajn jezgre isparivača automobilskog
        klima uređaja.
    evenweave_fabric_finish_treatment:
      name: Završna obrada/tretman tkanine ravnomjernog tkanja
      description: Označava bilo kakvu predobradu ili tretman primijenjen na tkaninu
        koji utječe na obradu ili izgled.
    evenweave_fabric_package_format:
      name: Format pakiranja tkanine Evenweave
      description: Kako se tkanina prodaje (rezani komad u odnosu na kontinuiranu
        tkaninu po jardu/metru).
    exercise_bike_accessory_part_type:
      name: Vrsta pribora/dijela za sobni bicikl
      description: Opisuje primarne funkcije ili vrstu komponente stavke (primjerice
        pedala, pogonski remen, držač boce, poklopac zaslona, kurbla).
    exercise_bike_cushion_component:
      name: Komponenta jastuka za sobni bicikl
      description: Određuje dostavljenu komponentu povezanu sa sjedalom, kao što je
        jastučić za sjedalo, sjedalo ili navlaka za sjedalo.
    exercise_bike_metrics_tracked:
      name: Praćeni mjerni podataci sobnog bicikla
      description: Navodi polja s podacima o vježbanju koja računalo može mjeriti
        i prikazivati u stvarnom vremenu.
    exercise_mat_accessories_included:
      name: Pribor za prostirku za vježbanje uključen
      description: Navodi dodatne komponente koje su dostavljene s prostirkom, kao
        što su remeni ili štitnici za koljena.
    exhaust_cooling_type:
      name: Vrsta hlađenja ispušnih plinova
      description: Označava je li ispušna komponenta namijenjena za sustave s mokrim
        ispuhom (hlađenje vodom/ubrizgavanje vode) ili suhim ispuhom.
    exhaust_installation_position:
      name: Položaj ugradnje ispuha
      description: Označava gdje je dio ugrađen na vozilu.
    exhaust_outlet_configuration:
      name: Konfiguracija ispušnog otvora
      description: Označava ispušni izlaz koji se nalazi na stražnjoj strani vozila.
    expansion_tank_cap_connection_type:
      name: Čep ekspanzijske posude Vrsta veze
      description: Tip mehaničke konekcije koji se koristi za pričvršćivanje i brtvljenje
        čepa na vrat ekspanzijske posude.
    expansion_tank_cap_pressure_relief_feature:
      name: Funkcija za smanjenje tlaka u čepu ekspanzijske posude
      description: Pruža li čep funkciju smanjenja tlaka/vakuuma i kako.
    expansion_tank_cap_seal_material:
      name: Materijal brtve čepa ekspanzijske posude
      description: Materijal brtve/zaptivke koja dodiruje grlo ekspanzijske posude.
    extension_attachment_method:
      name: Način pričvršćivanja produžetka
      description: Označava kako se produžetak pričvršćuje na kokpit/upravljač bicikla,
        pomažući vozačima da potvrde kompatibilnost s postojećim postavkama.
    extension_bend_type:
      name: Vrsta produžnog savijanja
      description: Opisuje geometrijski stil ili zakrivljenost produžetka upravljača,
        što utječe na ergonomiju i aerodinamiku vozača.
    extension_mechanism:
      name: Mehanizam za proširenje
      description: Opisuje metodu koju stol koristi za proširenje svoje duljine ili
        površine, ako je to primjenjivo.
    extension_table_features:
      name: Značajke stola za proširenje
      description: Highlight funkcionalne značajke specifične za produžne stolove
        šivaćih strojeva.
    eyelet_grommet_installation_method:
      name: Način ugradnje ušica i ušica
      description: Određuje kako se rupica/ušica ugrađuje/pričvršćuje u materijal.
    eyewear_lens_shape:
      name: Shapesleća za naočale
      description: Označava geometrijske oblike leće, poput cilindričnih ili sferičnih,
        što utječe na vidno polje, izobličenje i stil.
    eyewear_strap_material:
      name: Materijal remena naočala
      description: Određuje materijal podesivog remena koji pričvršćuje zaštitne naočale
        ili naočale na glavu korisnika.
    fabric_backing_type:
      name: Vrsta tkanine za podlogu
      description: Određuje uključuje li ispisivi pamuk stabilizirajuću papirnu podlogu
        (i kakvu), što određuje može li se uvlačiti kroz standardne pisače.
    fabric_cut_format:
      name: Format rezanog materijala
      description: Određuje kroj/format platna za ručni rad.
    fabric_end_use:
      name: Krajnja upotreba tkanine
      description: Identificira primarnu namjenu tkanine (za što se najbolje koristi).
    fabric_finish:
      name: Završna obrada tkanine
      description: Površinska završna obrada/tretman nanesena na svilenu tkaninu a
        koja utječe na sjaj, osjećaj na dodir i učinkovitost.
    fabric_intended_use:
      name: Namjena tkanine
      description: Primarne preporučene aplikacije/projekti za lanene tkanine.
    fabric_opacity_level:
      name: Razina neprozirnosti tkanine
      description: Označava koliko je tkanina prozirna, što utječe na potrebe za slojevima
        i podstavom.
    fabric_patch_shape:
      name: Oblik tkaninske zakrpe
      description: Opisuje oblik zakrpa uključenih u komplet.
    fabric_repair_kit_application_method:
      name: Metoda aplikacije kompleta za popravak tkanine
      description: Određuje kako se popravak nanosi na tkaninu (primjerice peglanjem,
        prišivanjem, lijepljenjem).
    fabric_repair_kit_components_included:
      name: Uključene su kompletne komponente za popravak tkanine
      description: Navodi specifične komponente navedene u kompletu (primjerice flasteri,
        niz poruke, igla, ljepilo).
    fabric_repair_kit_intended_use:
      name: Popravak tkanine - kompletna namjena
      description: Određuje uobičajeni zadatak popravka za koji je komplet dizajniran
        (npr. poderotine, rupe, porubljivanje).
    fabric_selling_format:
      name: Format prodaje tkanine
      description: Određuje kako se tkanina prodaje (kontinuirana duljina, prethodno
        izrezan komad, rola/baterka ili uzorak).
    fabric_stretch_level:
      name: Razina rastezljivosti tkanine
      description: Opisuje stupanj rastezljivosti/elastičnosti tkanine, pomažući kupcima
        da odaberu odgovarajuće tkanine za uske odjevne predmete ili strukturirane
        projekte.
    fabric_stretch_type:
      name: Vrsta rastezljivosti tkanine
      description: Označava rastezljivost tkanine boardshortsa, važnu za pokretljivost
        tijekom surfanja ili plivanja.
    fabric_texture:
      name: Tekstura tkanine
      description: Opisuje površinski osjećaj ili pletenu strukturu tkanine korištene
        u gornjem dijelu odjeće za opuštanje.
    fabric_use_case:
      name: Slučaj uporabe tkanine
      description: Primarna namjena za komad/vijak od satenske tkanine.
    fabric_weight_class:
      name: Težinski razred tkanine
      description: Kategorizira flanel prema tipičnim rasponima uporabne težine kako
        bi se olakšalo kupcima da vrše filtriranje bez poznavanja točne GSM/oz.
    face_mask_material:
      name: Materijal maske za lice
      description: Sastav materijala maske za lice koja je uključena ili je kompatibilna
        s kacigom.
    face_mask_style:
      name: Stil maske za lice
      description: Definira cjelokupne oblike ili stil konstrukcije modne maske za
        lice, pomažući kupcima da pronađu željeni oblik i estetiku.
    face_mask_style_code:
      name: Kod stila maske za lice
      description: Definira strukturni stil bara ili obitelj industrijskih kodova
        maske za lice (primjerice ROPO, OPO, RJOP).
    face_protection_type:
      name: Vrsta zaštite lica
      description: Označava vrstu zaštite za lice dostavljena s kacigom ili je ugrađena
        u nju, kao što su kavezi ili viziri.
    faceplate_security_features:
      name: Sigurnosne značajke prednje ploče
      description: Snima značajke odvraćanja od krađe i pristupa povezane s prednjom
        pločom, izvan osnovnog Shopify dizajna.
    facing_length:
      name: Okrenuto prema duljini
      description: Određuje duljinu okrenute strane (duljinu krivulje) usnika, što
        utječe na odziv i izbor jezička.
    fan_shroud_type:
      name: Vrsta poklopca ventilatora
      description: Određuje stil pokrivenosti/geometrije kućišta ventilatora (primjerice
        puni vs. pola vs. prstenasti).
    farming_method:
      name: Metoda uzgoja
      description: Highlight prakse dobrobiti životinja ili stočarske prakse koje
        se koriste za uzgoj životinja, poput slobodnog uzgoja ili organskog uzgoja.
    farming_practice:
      name: Poljoprivredna praksa
      description: Identificira primarnu metodu uzgoja koja se koristi za proizvod
        (primjerice konvencionalnu, organsku, hidroponsku).
    fascinator_style:
      name: Fascinator stil
      description: Opisuje strukturni dizajn ili oblik fascinatora kako bi kupci mogli
        brzo izvršiti filtriranje prema popularnim stilovima šešira.
    fastener_grade:
      name: Vrsta pričvršćivača
      description: Označava stupanj/klasu čvrstoće vijka, kao što je stupanj 8 ili
        klasa 10.9, koja određuje nosivost.
    fat_rendering_state:
      name: Stanje renderiranja masti
      description: Određuje je li mast otopljena, netopljena (sirova) ili djelomično
        otopljena, što utječe na životni vijek polica i kulinarsku primjenu.
    fat_source:
      name: Izvor masti
      description: Identificira primarni izvor masti korištene za proizvodnju maslaca,
        ghija ili margarina (životinjskog ili biljnog podrijetla), podržavajući filtriranje
        alergena i prehrane.
    faucet_hole_configuration:
      name: Konfiguracija otvora za slavinu
      description: Označava broj i položaj prethodno izbušenih rupa za slavinu na
        gornjoj ploči umivaonika.
    feather_application:
      name: Aplikacija perja
      description: Primarna namjena ili primjena purećeg perja za rukotvorine ili
        izradu.
    feather_attachment_format:
      name: Pričvršćivanje/format pera
      description: Kako se sintetičko perje priprema/prodaje za uporabu (rasuto, na
        nizu, na traci itd.).
    feather_coloration_style:
      name: Stil obojenja perja
      description: Opisuje kako se boja nanosi/pojavljuje na peru(ima) (npr. jednobojno,
        obojano na vrhovima, gradijentno), neovisno o osnovnoj vrijednosti boje.
    feather_component:
      name: Komponenta perja
      description: Određuje koji se dio/stil paunovog pera prodaje (primjerice očno
        pero u odnosu na paunovo pero).
    feather_curvature:
      name: Zakrivljenost pera
      description: Ukupni oblik/profil zakrivljenosti pera.
    feather_finish:
      name: Završna obrada od perja
      description: Označava jesu li nojeva pera prirodna ili su obrađena (primjerice
        obojena ili izbijeljena) za dekorativnu uporabu.
    feather_form:
      name: Oblik perja
      description: Određuje fizički oblik komada guščjeg perja koji se prodaju.
    feather_grade:
      name: Stupanj perja
      description: Ukupna kvaliteta/ocjena odabira pera za rukotvorine u odnosu na
        uporabu u izložbene svrhe.
    feather_part:
      name: Dio pera
      description: Dio/struktura purećeg pera koji se prodaje (uobičajeno u oglasima
        nabavke rukotvorina i vezivanja muha).
    feather_processing_type:
      name: Vrsta obrade perja
      description: Kako je perje obrađeno/tretirano za uporabu u rukotvorinama (primjerice
        obojeno, izbijeljeno, prirodno/neobojeno).
    feather_product_form:
      name: Oblik proizvoda od perja
      description: Fizički oblik/kroj perja kakav se prodaje (primjerice slobodno
        perje vs. boa vs. rese).
    feather_quantity_unit:
      name: Jedinica za količinu perja
      description: Definira kako se proizvod prodaje (npr. po komadu, po težini, u
        svežnju) kako bi se podržala točna usporedba među oglasima.
    feather_source:
      name: Izvor perja
      description: Određuje životinjski izvor perja korištenog u pernatim lopticama.
    feather_stiffness:
      name: Krutost perja
      description: Relativna ukočenost/krutost pernatih bodlji/strukture.
    feed_mechanism:
      name: Mehanizam za uvlačenje
      description: Označava kako se loptice ubacuju u stroj za bacanje.
    feed_purpose:
      name: Svrha hranjenja
      description: Opisuje primarni nutritivni ili funkcionalni cilj hrane ili dodatka
        prehrani.
    feeder_mechanism_type:
      name: Vrsta mehanizma hranjenja
      description: Označava mehanizam za doziranje koji hranilica koristi za ispuštanje
        hrane.
    feijoa_cultivar:
      name: Kultivar feijoe
      description: Identificira specifičan kultivar ili sortu feijoe, budući da različiti
        kultivari nude različite okuse, veličinu i vrijeme berbe.
    felt_duty:
      name: Felt carine i povezane pristojbe
      description: Određuje klasifikaciju teniske loptice (primjerice extra carine
        i povezane pristojbe, regular carine i povezane pristojbe) koja utječe dugovječnost
        na različitim površinama.
    felting_mold_intended_use:
      name: Namjena kalupa za filcanje
      description: Za izradu čega je kalup namijenjen ili za što se koristi u projektima
        filcanja.
    felting_pad_surface_material:
      name: Materijal površine za filcanje
      description: Materijal koji se koristi na radnoj površini podloge/prostirke
        za filcanje koja dolazi u dodir s vlaknima/iglom.
    fencing_certification:
      name: Certifikat za mačevanje
      description: Navodi službena odobrenja upravnih tijela koja oružje za mačevanje
        zadovoljava (primjerice FIE, USFA), s naznakom zakonitosti natjecanja i standarda
        kvalitete.
    fencing_connector_type:
      name: Vrsta konektora za ogradu
      description: Određuje konfiguraciju mehanizma sinhronizacije koja se koristi
        za pričvršćivanje ogradnih užeta, utičnica ili kolutova (primjerice 2-prikačeno,
        3-prikačeno, bajonet), osiguravajući kompatibilnost komponenti.
    fencing_discipline:
      name: Disciplina mačevanja
      description: Određuje oružje ili disciplinu mačevanja za koju je proizvod dizajniran
        ili s kojom je kompatibilan.
    fencing_weapon_type:
      name: Vrsta oružja za mačevanje
      description: Određuje stil mačevanja ili oružja za vježbanje s kojim je pomagalo
        za trening kompatibilno ili koje predstavlja, pomažući korisnicima da pronađu
        odgovarajuću opremu.
    fender_finish_state:
      name: Stanje završne obrade blatobrana
      description: Označava stanje dostavljene površine/završne obrade blatobrana
        za bojanje i spremnost za ugradnju.
    fender_pieces_included:
      name: Uključeni dijelovi blatobrana
      description: Navodi komponente koje se dostavljaju s proizvodom kako bi se razjasnilo
        radi li se o jednom blatobranu ili kompletnom setu s priborom.
    fender_type:
      name: Vrsta blatobrana
      description: Klasificira cjelokupni dizajn ili stil blatobrana.
    fennel_trimming:
      name: Obrezivanje komorača
      description: Označava koji dijelovi biljke pripadaju lukovici komorača (primjerice
        s listovima, odrezanim vrhom i korijenom).
    fennel_variety:
      name: Sorta komorača
      description: Označava kultivar ili tržišnu vrstu lukovica komorača koje se prodaju.
    fermentation_application:
      name: Primjena fermentacije
      description: Označava primarnu hranu ili piće za koje je kultura namijenjena
        da fermentira (npr. sir, jogurt, mliječni kefir, kiselo tijesto).
    fermentation_method:
      name: Metoda fermentacije
      description: Navodi kako je soja umak proizveden ili fermentiran (primjerice
        prirodno kuhan, kemijski hidroliziran).
    fermentation_vessel_material:
      name: Materijal posude za fermentaciju
      description: Primarni materijal posude za fermentaciju uključen u komplet (ako
        postoji).
    ferrule_material:
      name: Materijal ferule
      description: Određuje materijal korišten za osovinu (primjerice Juma, fenol,
        polikarbonat, XTC ili ništa), što utječe na otpornost i osjećaj udarca.
    fia_homologation_certification:
      name: FIA homologacija/certifikacija
      description: Označava je li automobil (ili sigurnosna ćelija) certificiran/homologiran
        i prema kojem standardu.
    fiber_animal_source_type:
      name: Vrsta vlakana/životinja izvora
      description: Životinjski ili primarni izvor od kojeg potječe roving (ili sintetika),
        kao što su merino vuna, alpaka ili biljna vlakna.
    fiber_luster_level:
      name: Razina sjaja vlakana
      description: Vizualni sjaj vlakana, u rasponu od mat do visokog sjaja.
    fiber_preparation_processing_stage:
      name: Faza pripreme / obrade vlakana
      description: Označava kako je snop pripremljen/obrađen za upotrebu (npr. kardiran
        u odnosu na češljani, miješani, superprani).
    fiber_preparation_type:
      name: Vrsta pripreme vlakana
      description: Označava kako je vlakno pripremljeno za izradu (primjerice grebenana
        vuna, bubnjasto grebenana, prethodno filcana ploča).
    field_hockey_ball_playing_surface:
      name: Površina za igru s loptom za hokej na travi
      description: Označava površinu za igru ili okruženje za koje je lopta dizajnirana.
    field_hockey_ball_type:
      name: Vrsta lopte za hokej na travi
      description: Kategorizira loptu za hokej na travi prema njezinoj namjeni ili
        posebnim značajkama.
    field_hockey_goal_size_standard:
      name: Standardna veličina gola za hokej na travi
      description: Klasificira gol prema uobičajenim standardima hokeja na travi ili
        veličini treninga (primjerice FIH propisi za vanjske uvjete, mladi, Shop Mini).
    field_hockey_training_objective:
      name: Cilj treninga hokeja na travi
      description: Definira primarnu vještinu ili područje fokusa koje je pomagalo
        za obuku osmišljeno za poboljšanje.
    field_point_attachment_method:
      name: Metoda pričvršćivanja točaka polja
      description: Označava kako je vrh strelice pričvršćen za osovinu ili umetak
        strelice (primjerice uvrtanjem, lijepljenjem).
    field_point_tip_style:
      name: Stil vrha polja
      description: Definira geometrijski stil ili funkcionalni profil vrha terenskog
        boda, utječući na prodiranje, napor uklanjanja i zakonitost.
    fielding_glove_position:
      name: Položaj rukavice za igru
      description: Označava obrambeni položaj ili uporabu za koju je rukavica namijenjena
        u bejzbolu ili softbolu.
    fielding_training_focus:
      name: Fokus treninga na terenu
      description: Određuje primarno područje vještina na koje se pomoć odnosi tijekom
        vježbe.
    fig_variety:
      name: Sorta smokve
      description: Identificira specifičnu sortu ili kultivar smokve koji se prodaje.
    figure_8_device_design:
      name: Dizajn uređaja Slika 8
      description: Identificira specifičnu konfiguraciju uređaja u obliku osmice,
        koja utječe na karakteristike obrade i namjeravanu uporabu.
    figure_finish_type:
      name: Vrsta završne obrade figure
      description: Označava površinu/završnu obradu boje figure modela konja (kako
        izgleda/kako se osjeća kao kolekcionarski predmet).
    figurine_scale:
      name: Razmjer figurice
      description: Razmjer/omjer figurice u odnosu na stvarni subjekt (kada je to
        primjenjivo), npr. 1:6.
    fill_status:
      name: Status ispune
      description: Označava prodaje li se lutka za hvatanje unaprijed napunjena, nenapunjena
        ili djelomično napunjena, određujući trošak dostave i potreban napor.
    filling_consistency:
      name: Konzistencija punjenja
      description: Opisuje teksturu ili viskoznost punjenja kako je dato (primjerice
        glatka krema, komadi voća, pasta).
    filling_type:
      name: Vrsta punjenja
      description: Navodi glavni nadjev ili kremu unutar kolačića, ako postoji.
    filtration_and_mother_status:
      name: Filtracija i status majke
      description: Označava je li ocat filtriran, nefiltriran, sirov ili sadrži 'majku',
        što je namijenjeno potrošačima koji traže probiotičke ili sirove opcije.
    filtration_method:
      name: Metoda filtracije
      description: Materijal ili tehnika koja se koristi za filtriranje i pročišćavanje
        votke nakon destilacije.
    fin_box_system:
      name: Sustav perajastih kutija
      description: Određuje kutiju s rebrima ili montažno sučelje koje ploča koristi,
        određujući kompatibilnost rebara s naknadno naručenim proizvodima.
    fin_buoyancy:
      name: Plovnost peraja
      description: Označava je li peraja pozitivno, neutralno ili negativno plovna
        u vodi, što utječe na rezanje i balans opreme za ronjenje.
    fin_flex_rating:
      name: Ocjena fleksibilnosti peraje
      description: Označava relativnu krutost ili razinu savitljivosti peraje, što
        utječe na ukupnu učinkovitost.
    fin_mounting_system:
      name: Sustav montaže peraje
      description: Definira sučelje za pričvršćivanje ili standard koji se koristi
        za pričvršćivanje peraje na dasku za kiteboard (primjerice FCS II, pričvršćivanje
        vijcima, četiri rupe), osiguravajući kompatibilnost između peraja i dasaka.
    fin_position:
      name: Položaj peraja
      description: Određuje predviđeni položaj montaže peraja na ploči.
    fin_strap_type:
      name: Vrsta remena peraje
      description: Određuje stil remena ili sustava zadržavanja kupaca koji se koristi
        za pričvršćivanje peraje na petu/stopalo.
    fin_template:
      name: Predložak peraja
      description: Kategorizira hidrodinamički predložak ili obris peraje daske za
        surfanje, što utječe na stil okretanja, brzinu i ukupni osjećaj daske.
    finger_count:
      name: Brojanje prstiju
      description: Označava broj prstiju za koje je rukavica, kartica ili izdanje
        korisničko ime namijenjeno za podršku.
    finger_coverage:
      name: Pokrivenost prstima
      description: Označava koliki je dio prstiju prekriven.
    finger_grip_adjustability:
      name: Podesivost hvatišta za prste
      description: Označava kako se hvatište za prste pričvršćuje ili prilagođava
        različitim veličinama ruke.
    finger_hole_configuration:
      name: Konfiguracija otvora za prste
      description: Određuje orijentaciju rupa za prste u smjeru ruke (za dešnjake,
        ljevake ili ambidekstralne).
    finger_hole_count:
      name: Broj rupica za prste
      description: Navodi broj rupica za prste u koži drške, ključnu razliku u stilu
        između modela bez prstiju, s 2, 3 i 4 rupe.
    finger_pick_band_style:
      name: Stil trake za trzalicu prstom
      description: Stil trake/omče koja se pričvršćuje na prst, što utječe na udobnost
        i prilagodljivost.
    finger_pick_blade_length:
      name: Duljina oštrice trzalice
      description: Duljina oštrice za branje koja se proteže od trake.
    finger_pick_blade_shape:
      name: Oblik oštrice trzavice
      description: Oblik/profil površine za branje (oštrice) koja dodiruje oštricu.
    finger_pick_size:
      name: Veličina trzalice
      description: Određivanje veličine trake/omče trzalice kako bi odgovarala različitim
        opsezima prstiju ili palca (ne veličini instrumenta).
    finger_pick_wear_location:
      name: Lokacija nošenja trzalice
      description: Označava na kojem se prstu smije nositi trzalica ili je li proizvod
        set za palac i prst.
    finger_protection:
      name: Zaštita prstiju
      description: Označava uključuje li rukavica zaštitu za prste i jesu li bodlje
        uklonjive.
    fingerboard_bearing_type:
      name: Vrsta ležaja prsta
      description: Određuje vrstu ležaja koji se koristi u kotačićima hvataljke.
    fingerboard_grip_type:
      name: Vrsta hvata na hvataljci (grif ploči)
      description: Određuje materijal/vrstu površine za hvatanje koja se koristi na
        hvataljci.
    fining_agent_active_ingredient:
      name: Aktivni sastojak sredstva za bistrenje
      description: Primarno sredstvo za bistrenje ili pročišćavanje koje se koristi
        u proizvodu.
    fining_agent_type:
      name: Vrsta sredstva za bistrenje
      description: Određuje kemijski sastav ili materijal sredstva za bistrenje/razbistrenje
        za proizvode koji bistre crno vino.
    finish_after_baking:
      name: Završetak nakon pečenja
      description: Opisuje tipičan izgled površine nakon sušenja/pečenja.
    finish_effect:
      name: Završni efekt
      description: Opisuje posebne površinske/optičke efekte primijenjene na cirkon.
    finish_type:
      name: Vrsta završne obrade
      description: Površinska obrada nanesena na tijelo ukulele.
    finished_product_format:
      name: Format završenog proizvoda
      description: Određuje vrstu mirisa za koji je komplet namijenjen.
    fire_pit_accessories_included:
      name: Uključeni dodaci za ložište
      description: Navodi značajnu dodatnu opremu dostavljenu s ognjištem, kao što
        su mrežice protiv iskrenja ili vulkansko kamenje, što jasno pokazuje što se
        nalazi u kutiji.
    firework_assortment_launch_type:
      name: Vrsta lansiranja za asortiman vatrometa
      description: Opisuje kako se priloženi vatromet obično pali/pokreće.
    firework_assortment_types_included:
      name: Uključene vrste asortimana vatrometa
      description: Identificira primarne vrste vatrometa uključene u asortiman kako
        bi kupac mogao usporediti sadržaj paketa (primjerice fontane, rimske svijeće,
        petarde).
    firework_effect_types:
      name: Vrste vatrometnih efekata
      description: Primarne obitelji vizualnih i/ili osjetnih učinaka koje proizvodi
        asortiman (odaberite sve što se primjenjuje).
    firework_ignition_method:
      name: Metoda paljenja vatrometa
      description: Određuje kako se vatromet pali ili inicira (npr. fitilj ili električna
        šibica).
    firework_visual_intensity_level:
      name: Razina vizualnog intenziteta vatrometa
      description: Ukupni vizualni intenzitet/volumen varnica za efekt fontane.
    firing_mode:
      name: Način paljenja
      description: Navodi odabrane ili primarne načine paljbe za podršku airsoft pištolja.
    first_day_cover_cachet_type:
      name: Vrsta cachet otiska na prigodnoj omotnici prvog dana
      description: Vrsta žiga na naslovnici prvog dana (npr. tiskani, ručno oslikani).
    first_day_cover_cancellation_type:
      name: Vrsta otkazivanja naslovnice prvog dana
      description: Vrsta/stil poštanskog žiga primijenjenog na omotnici prvog dana
        (primjerice strojni žig, ručni žig).
    first_day_cover_set_type:
      name: Vrsta kompleta naslovnice prvog dana
      description: Označava predstavlja li naslovnica jedno izdanje, cijeli komplet
        ili podskup/kombinaciju.
    fishing_hook_size:
      name: Veličina udice za ribolov
      description: 'Određuje standardiziranu oznaku veličine udice za ribolov (npr.
        #4, 1/0, 10/0), čime pomaže ribolovcima da usklade dimenzije udice s ciljanom
        vrstom i mamcem.'
    fishing_hook_style:
      name: Stil ribarske udice
      description: Identificira specifičan dizajn ili uzorak savijanja pojedinačne
        udice, što utječe na prezentaciju, učinkovitost kvačenja i namjeravane primjene.
    fishing_hook_type:
      name: Vrsta ribarske udice
      description: Opisuje konfiguraciju udice koja je data s ribarskom žlicom (ako
        postoji).
    fishing_line_application:
      name: Aplikacija za ribolovnu liniju
      description: Označava namjeravanu uporabu materijala za ribolovnu strunu ili
        predvez (npr. predvez, glavna struna, podvez).
    fishing_line_buoyancy_type:
      name: Vrsta uzgona ribarske strune
      description: Klasificira ponašanje strune u vodenom stupacu (primjerice plutanje,
        srednje duboko pecanje, tonjenje), pomažući ribolovcima da odaberu odgovarajuću
        dubinu.
    fishing_needle_purpose:
      name: Namjena ribarske igle
      description: Identificira primarnu primjenu igle u zadacima ribarske opreme.
    fishing_needle_types_included:
      name: Uključene vrste igala za ribolov
      description: Navodi specifične stilove igala ili alata za izradu montažnih dijelova
        koji se nalaze u setu kako bi kupci mogli brzo vidjeti sadržaj kompleta.
    fit_profile:
      name: Profil prilagodbe
      description: Opisuje cjelokupni kroj i siluetu jastučića što utječe na pokretljivost
        i pokrivenost.
    fit_volume_classification:
      name: Klasifikacija volumena po mjeri
      description: Kategorizira ukupni unutarnji volumen prtljažnika kao tržište po
        marki (primjerice LV za mali volumen).
    fitting_angle:
      name: Kut ugradnje
      description: Određuje kut savijanja tijela spojnice (primjerice ravno, 45°,
        90°). Za spojnice s promjenjivim kutom koristite „Podesivo / okretno" i „Ostalo"
        za neuobičajene kutove.
    flag_base_type:
      name: Vrsta baze zastave
      description: Definira sidreni ili osnovni stil koji se koristi za pričvršćivanje
        kutne zastavice na različitim površinama za igru.
    flag_design_theme:
      name: Tema dizajna zastave
      description: Opisuje primarnu temu dizajna predstavljenu na zastavi (npr. zemlja/nacionalna,
        sportski tim, praznik), čime podržava otkrivanje i filtriranje za kupnju temeljenu
        na namjeri.
    flag_mounting_method:
      name: Način montaže zastave
      description: Određuje kako se zastava pričvršćuje na vozilo (primjerice nosač
        antene, nosač za kuku, magnetski).
    flag_type:
      name: Vrsta zastave
      description: Klasificira specifičnu namjenu ili stil golfske zastavice, kao
        što su prikačeno zastavica, zastavica za košaricu ili zastavica za vježbanje.
    flame_resistance_standard:
      name: Standard otpornosti na plamen
      description: Označava specifični standard/certifikat otpornosti na plamen ili
        električni luk koji odjeća zadovoljava.
    flamenco_cajon_snare_system:
      name: Sustav za zamku flamenko kutije
      description: Određuje unutarnji mehanizam doboša koji se koristi za stvaranje
        karakterističnog flamenko zujanja (ili bez njega).
    flammability_compliance:
      name: Usklađenost s propisima o zapaljivosti
      description: Određuje primjenjive standarde zapaljivosti koje tkanina zadovoljava
        za unutrašnjost vozila.
    flannel_brushing_finish:
      name: Završna obrada od četkanja flanela
      description: Označava je li flanel četkan i s koje strane (strana), što utječe
        na mekoću, toplinu i izgled.
    flannel_use_type:
      name: Vrsta uporabe flanela
      description: Primarna namjena aplikacije za flanelski rez/vijak.
    flap_configuration:
      name: Konfiguracija preklopa
      description: Određuje stil preklopa sedla, kao što je jednostruki preklop ili
        dvostruki preklop.
    flare_color:
      name: Boja bljeska
      description: Boja emitiranog svjetla/plamena (ili boja leće za LED baklje).
    flash_card_included_features:
      name: Značajke uključene u flash kartice
      description: Highlight funkcionalne značajke učenja/korištenja uključene u flash
        karticu.
    flavor_intensity:
      name: Intenzitet okusa
      description: Označava koliko je koncentriran proizvod za aromu, pomažući korisnicima
        da odrede odgovarajuću dozu (primjerice standardna jačina, super jačina).
    flavor_solvent_base:
      name: Baza aromatičnog otapala
      description: Označava primarnog nositelja ili otapalo korištene u aromi (npr.
        alkohol, propilen glikol, glicerin).
    fleece_fiber_animal_type:
      name: Životinjska vrsta flis vlakana
      description: Životinjski izvor vlakana flisa (vrsta).
    fleece_finish_surface:
      name: Završna obrada / površina od flisa
      description: Opisuje površinu/završnu obradu flisa (npr. protiv ljuštenja, četkano)
        koja utječe na učinkovitost, mekoću i izgled ljuštenja.
    fleece_preparation_method:
      name: Metoda pripreme flisa
      description: Kako se runo priprema/obrađuje za rukotvorine i predenje (stanje
        vlakna).
    flesh_color:
      name: Boja mesa
      description: Određuje unutarnju boju mesa dinje.
    fletching_orientation:
      name: Orijentacija perja
      description: Određuje kako su perja postavljena na osovini (primjerice ravno,
        pomaknuto, spiralno), što utječe na rotaciju i let strijele.
    fletching_profile:
      name: Profil perja
      description: Definira geometrijske oblike ili rez perja, što utječe na otpor,
        rasprodaju, buku i ukupne karakteristike leta strijele.
    flight_system_type:
      name: Vrsta sustava leta
      description: Identificira stil konstrukcije krila, razlikujući sklopive, lijevane
        i integrirane sustave krila i osovine.
    float_attachment_method:
      name: Način pričvršćenja plovka
      description: Opisuje kako je plovak pričvršćen za najlon (npr. klizni ili fiksni),
        što omogućuje ribolovcima filtriranje prema stilu montaže.
    float_design:
      name: Dizajn plutača
      description: Klasificira cjelokupni stil ili vrstu ribolovnog plovka (primjerice
        bobber, waggler, pencil) tako da ribolovci mogu brzo odabrati model koji odgovara
        njihovoj tehnici i uvjetima lova.
    float_raft_use_environment:
      name: Okruženje za korištenje plutača/splavi
      description: Primarna namjena za vodene postavke napuhavanja (bazen vs. mirna
        otvorena voda vs. surfanje), što odražava očekivanja trajnosti i dizajna.
    floatation:
      name: Plutanje
      description: Je li svjetionik dizajniran da pluta u vodi.
    floor_construction_type:
      name: Vrsta konstrukcije poda
      description: Određuje dizajn poda splavi (npr. samoprazneći, s unutarnjim povezujućim
        nitima) koji utječe na odvodnju, krutost i učinkovitost.
    floor_design:
      name: Dizajn poda
      description: Vrsta podnog pokrivača koji je dat s kućištem.
    floor_inclusion:
      name: Uključivanje poda
      description: Navodi ima li predvorje pod i je li taj pod uklonjiv.
    floor_mat_cleaning_method:
      name: Metoda čišćenja podnih prostirki
      description: Označava proizvođačevu preporučenu primarnu metodu čišćenja za
        podnu prostirku.
    floor_mat_edge_style:
      name: Stil ruba podne prostirke
      description: Opisuje ima li prostirka podignute rubove/rubove za zadržavanje
        prolivene tekućine i krhotina.
    floor_mat_format:
      name: Format podne prostirke
      description: Definira fizički format ili stil zaštitnog materijala za pod (primjerice
        pojedinačna prostirka, međusobno povezana pločica, rola).
    floor_mat_retention_system:
      name: Sustav zadržavanja podne prostirke
      description: Određuje metodu koja se koristi za pričvršćivanje prostirke na
        mjestu.
    floor_mat_set_configuration:
      name: Konfiguracija seta podnih prostirki
      description: Označava koje su pozicije uključene u paket (npr. samo prednji
        par, puni komplet).
    floss_sugar_granulation_grade:
      name: Granulacija šećerne vate
      description: Opisuje veličinu kristala mješavine šećera (fini, srednji, grubi),
        koja može utjecati na učinkovitost stroja i konačnu teksturu.
    floss_sugar_product_form:
      name: Oblik proizvoda od šećerne vatne vate
      description: Označava je li šećerna vata spremna za upotrebu, koncentrat okusa
        koji se mora pomiješati s osnovnim šećerom, ili bezbojnim osnovnim šećerom.
    flour_grind_texture:
      name: Tekstura mljevenog brašna
      description: Označava veličinu mljevenja ili teksturu brašna, kao što je superfino,
        srednje, grubo ili mljeveno na kamenu, što može utjecati na učinkovitost recepta.
    flour_processing_method:
      name: Metoda obrade brašna
      description: Obuhvata značajne metode obrade ili tretmana primijenjene na brašno
        (primjerice mljevenje na kamenu, bijeljenje, klijanje, obogaćivanje) što utječe
        okus, boju ili nutritivne vrijednosti.
    flower_care_instructions:
      name: Upute za njegu cvijeća
      description: Pruža preporučene korake njege specifične za svježe rezano cvijeće
        (primjerice obrezivanje stabljika, promjena učestalosti zalijevanja).
    flugelhorn_leadpipe_material:
      name: Materijal olovne cijevi krilnice
      description: Materijal usnika cijevi (ako je naveden odvojeno od ukupnog materijala
        instrumenta).
    flugelhorn_trigger_type:
      name: Tip pokretača krilnog roga
      description: Označava uključuje li krilni rog pokretač za ugađanje i koji klizač/ventil
        on pokreće.
    fluorescence_grade:
      name: Fluorescentni stupanj
      description: Označava intenzitet fluorescencije dijamanta kada je izložen UV
        svjetlu.
    fluorescence_under_uv:
      name: Fluorescencija pod UV zračenjem
      description: Označava pokazuje li/koju vrstu fluorescencije uzorak pod ultraljubičastim
        svjetlom.
    fluorocarbon_content:
      name: Sadržaj fluorougljika
      description: Označava sadrži li vosak aditive fluorougljika i u kojoj količini.
    flute_case_capacity:
      name: Kapacitet kutije za flautu
      description: Označava za što je kutija namijenjena, dalje od glavnog tijela
        flaute (npr. flauta + pikolo, dodatni zglob).
    flute_cleaning_rod_tip_type:
      name: Vrsta vrha štapića za čišćenje flaute
      description: Opisuje dizajn kraja šipke koji drži krpu/štapić ili dodiruje instrument
        (primjerice s prorezom, niz poruke, rupica).
    flute_footjoint_type:
      name: Vrsta donjeg zgloba flaute
      description: Određuje konfiguraciju donjeg zgloba flaute.
    flute_headjoint_cork_type:
      name: Vrsta zgloba flaute od pluta
      description: Određuje materijal/vrstu sklopa pluta/čepa glavnog zgloba koji
        se isporučuje s glavnim zglobom.
    flute_key_system:
      name: Sustav tipki flaute
      description: Označava mehanički/ključni sustav koji flauta koristi (primjerice
        Boehmov sustav) gdje je primjenjivo.
    flute_keywork_material:
      name: Materijal mehanike flaute
      description: Materijal i/ili prevlaka tipki (ključa), kada je navedeno odvojeno
        od materijala tijela.
    flute_offset_g:
      name: Pomak žljebova G
      description: Određuje ima li flauta pomaknuti G ključ izgled.
    flute_wall_thickness:
      name: Debljina stijenke žlijeba
      description: Kategorija debljine stijenke cijevi za flaute (tanka stijenka,
        standardna, debela stijenka).
    fly_pattern_type:
      name: Tip uzorka mušice
      description: Klasificira umjetnu muhu prema stilu ribolova ili imitaciji insekata/krme
        kako bi ribolovcima pomoglo da brzo pronađu ispravan stil muhe.
    fly_rod_style:
      name: Stil štapa za mušičarenje
      description: Klasificira štap prema predviđenoj disciplini bacanja ili primjeni
        (npr. za jednu ruku, Switch, Spey).
    fly_style:
      name: Leteći stil
      description: Određuje vrstu rasklopa ili prednjeg otvora na donjem dijelu dugih
        gaća.
    fly_tying_tools_included:
      name: Uključeni alati za vezanje muha
      description: Navodi specifične alate za vezanje muha koji se nalaze u setu kako
        bi kupac točno znao što je uključeno i mogao usporediti pakete.
    fly_type:
      name: Vrsta muhe
      description: Određuje imaju li duge gaće funkcionalni rasklop i stil tog rasklopa.
    flyer_hook_mounting_method:
      name: Metoda montaže kuke za letke
      description: Način pričvršćivanja kuke na letak (primjerice uvrtanjem u odnosu
        na prešanje), što utječe na mogućnost ugradnje i kompatibilnost.
    flyer_hook_orientation:
      name: Orijentacija kuke za letak
      description: Je li kuka namijenjena za lijevu ili desnu stranu letaka ili je
        reverzibilna/univerzalna.
    flyer_kit_finish_coating:
      name: Kompletna završna obrada/premaz letka
      description: Površinska obrada nanesena na komponente kompleta letka.
    flyer_kit_included_components:
      name: Komplet letka s uključenim komponentama
      description: Identificira koji su dijelovi uključeni u komplet.
    flyer_orifice_type:
      name: Vrsta otvora letka
      description: Određuje stil otvora koji se koristi na letku.
    flying_disc_feature_set:
      name: Skup značajki letećeg diska
      description: Značajne funkcionalne karakteristike letećeg diska.
    flysheet_material:
      name: Materijal za ceradu
      description: Označava glavnu tkaninu korištenu za vanjski šator/vanjski krov,
        što utječe na težinu, izdržljivost i otpornost na vremenske uvjete.
    flywheel_balance_type:
      name: Zamašnjak saldo tipa
      description: Označava je li zamašnjak neutralno balansiran ili pak koristi uteg
        za vanjsku neravnotežu.
    foam_blocks_size_class:
      name: Pjenasti blokovi veličine klase
      description: Označava opću veličinu klase blokova u skupu.
    foam_blocks_surface_texture:
      name: Tekstura površine pjenastih blokova
      description: Opisuje osjet/završnu obradu vanjske površine pjenastih blokova.
    foam_surface_effect:
      name: Efekat pjenaste površine
      description: Opisuje uobičajene dekorativne površinske efekte koji se primjenjuju
        na pjenu za rukotvorine ili stiropor, kao što su svjetlucavi, metalik ili
        holografski završni slojevi.
    foil_color:
      name: Boja folije
      description: Određuje boju folije korištenu na certifikatu (ako je primjenjivo).
    foil_curtain_mounting_method:
      name: Način montaže folijske zavjese
      description: Kako se folijska zavjesa namjerava postaviti ili objesiti (primjerice
        ljepljiva traka, ušice).
    foil_discipline:
      name: Disciplina floret
      description: Označava primarni stil ili disciplinu vožnje za koju je folija
        dizajnirana.
    foil_mast_board_mounting_type:
      name: Vrsta montaže na jarbol od folije
      description: Definira sučelje na vrhu jarbola koje se pričvršćuje na ploču ili
        folijsku stazu.
    foil_mast_fuselage_connection_type:
      name: Vrsta spajanja trupa s folijskim jarbolom
      description: Određuje kako se jarbol spaja s trupom ili sklopom prednjeg krila.
    foil_mounting_interface:
      name: Sučelje za montažu foila
      description: Označava standard veze kojeg dio koristi za pričvršćivanje na ploču
        ili druge folijske komponente.
    foil_mounting_system:
      name: Sustav montaže foila
      description: Određuje sučelje za montažu folija ili peraja na dasci, osiguravajući
        kompatibilnost s postojećim hardverom vozača.
    foil_mounting_type:
      name: Tip montaže foila
      description: Identificira sustav sučelja koji se koristi za pričvršćivanje folije
        na ploču, osiguravajući kompatibilnost između komponenti.
    fold_over_elastic_application:
      name: Preklopna elastična aplikacija
      description: Primarna namjena/primjena za gumicu za rupice za gumbe.
    foldability:
      name: Sklopivost
      description: Opisuje može li se i kako pregrada sklopiti ili sažeti radi pohrane
        ili rekonfiguracije.
    foldability_stow:
      name: Sklopivost (sposobnost sklapanja)
      description: Sklapa li se/sprema li se stalak kada se ne koristi (primjerice
        sklapa li se uz vozilo).
    folding_style:
      name: Stil sklapanja
      description: Označava kako se podloga za slijetanje sklapa za transport i skladištenje,
        što utječe na ujednačenost površine za slijetanje i mogućnost pakiranja.
    food_basket_items_included:
      name: Stavke uključene u košaru s hranom
      description: Navodi glavne vrste hrane uključene u košaricu kako bi kupac lakše
        odabrao košarice koje odgovaraju ukusima ili prehrambenim potrebama primatelja.
    food_coloring_form:
      name: Oblik za bojenje hrane
      description: Određuje fizički oblik ili format dostave u kojem se prehrambena
        boja dostavlja (primjerice gel, tekućina, prah, sprej).
    food_contact_material:
      name: Materijal za kontakt s hranom
      description: Primarni materijal opreme za proizvodnju vina (fermentori, sifoni,
        lijevka) koja se koristi s moštom/vinom.
    food_packing_medium:
      name: Sredstvo za pakiranje hrane
      description: Određuje medij u kojem je voće ili povrće pakirano (npr. voda,
        salamura, sirup, ulje).
    foosball_rod_type:
      name: Vrsta šipke za stolni nogomet
      description: Označava mehaničku konfiguraciju šipke koja utječe na osjećaj i
        sigurnost igranja.
    foot_arch_type_compatibility:
      name: Kompatibilnost tipova svoda stopala
      description: Označava profil svoda stopala za koji je uložak dizajniran.
    foot_arch_type_suitability:
      name: Prikladnost za tip svoda stopala
      description: Označava koji profil luka stopala uložak treba podržati.
    foot_coverage:
      name: Pokrivenost stopala
      description: Označava je li cipela s petom, bez pete, sa stremenom ili s otvorenom
        petom.
    foot_guard_type:
      name: Vrsta štitnika za noge
      description: Označava uključuje li štitnik za noge kapicu za prste/stopalo i
        određuje je li kapica fiksna ili uklonjiva.
    foot_support_level:
      name: Razina potpore stopala
      description: Označava razinu strukturne podrške ili čvrstoće koju pruža uložak
        za cipele, kao što je niska, srednja, visoka ili ekstra visoka.
    footbag_play_style:
      name: Stil igre footbag-a
      description: Primarno namijenjeni stil igre za footbag.
    football_ball_type:
      name: Vrsta nogometne lopte
      description: Određuje primarnu namjenu ili kontekst nogometne lopte, kao što
        je igranje, trening ili kolekcionarski prikaz.
    football_dummy_type:
      name: Vrsta lutke za nogomet
      description: Klasificira stil ili funkcionalni dizajn lutke kako bi odražavao
        njezinu specifičnu namjenu za trening.
    football_glove_certification:
      name: Certifikacija nogometnih rukavica
      description: Označava certifikat ili sukladnost sa standardima potrebnim za
        natjecateljsku igru (primjerice SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Vrsta montaže podnožja
      description: Određuje kako se podnožje pričvršćuje na okvir kreveta ili pod,
        čime kupcima pomaže u odabiru kompatibilnog hardvera i načina ugradnje.
    footboard_style:
      name: Stil podnožja kreveta
      description: Definira strukturni ili estetski stil dizajna podnožja.
    footrest_adjustability:
      name: Podesivost oslonca za noge
      description: Određuje mogu li se i kako oslonci za noge prilagoditi različitim
        duljinama djetetovih nogu.
    footrest_type:
      name: Vrsta oslonca za noge
      description: Označava nazočnost i dizajn oslonca za noge na stolcu.
    footstrap_configuration:
      name: Konfiguracija remena za noge
      description: Određuje uzorak umetanja remena za noge na dasci.
    footswitch_action_style:
      name: Stil djelovanja nožnog prekidača
      description: Označava je li djelovanje prekidača trenutno ili zaključavajuće
        i podržava li oboje.
    footswitch_power_source:
      name: Izvor napajanja nožnog prekidača
      description: Određuje kako se nožni prekidač napaja, ako je to primjenjivo (pasivno
        putem pojačala, baterije, vanjskog adaptera, USB-a itd.).
    footwear_construction_method:
      name: Metoda izrade obuće
      description: Definira tehniku koja se koristi za pričvršćivanje gornjeg dijela
        na potplat, što utječe trajnost, mogućnosti ponovnog postavljanja potplata
        i cijenu.
    footwear_cut:
      name: Kroj obuće
      description: Označava visinu ovratnika gležnja (niski rez, ID br. trgovca rez,
        visoki rez), mobilnost salda i podršku.
    footwear_size_system:
      name: Sustav veličina obuće
      description: Označava regionalni standard veličine koji se koristi za navedenu
        veličinu cipela (primjerice SAD, EU, UK).
    footwear_support_type:
      name: Tip obuće za podršku
      description: Određuje biomehaničku podršku ili razinu kontrole pronacije koju
        cipela pruža (npr. neutralno, stabilnost, kontrola pokreta).
    fork_material:
      name: Materijal vilice
      description: Određuje materijal koji se koristi za prednju vilicu bicikla što
        utječe krutost, težinu i kvalitetu vožnje.
    form_factor:
      name: Faktor oblika
      description: Primarni hardver oblik faktora DMX voditelj obrade.
    formula_car_series_class:
      name: Serija/klasa Formula automobila
      description: Označava trkaću seriju ili klasu u kojoj je Formula automobil izgrađen
        za natjecanje.
    formulation_style:
      name: Stil formulacije
      description: Highlight specijalizirane formulacije osmišljene za određene namjene
        ili preferencije (primjerice Barista, Extra Creamy).
    formulation_type:
      name: Vrsta formulacije
      description: Stil formulacije dezinfekcijskog spreja.
    fossil_preparation_level:
      name: Razina pripreme fosila
      description: Stupanj pripreme/čišćenja koji se vrši na uzorku (npr. nepripremljeno
        u matrici u odnosu na potpuno pripremljeno).
    fossil_preservation_type:
      name: Vrsta očuvanja fosila
      description: Vrsta očuvanja fosila (primjerice permineralizirano, odljev, kalup,
        prikaz).
    fossil_restoration_status:
      name: Status obnove fosila
      description: Je li i kako uzorak popravljen/restauriran (primjerice lijepljen,
        rekonstruiran, kompozitiran).
    foundation_configuration:
      name: Konfiguracija osnove
      description: Određuje je li podnica proizvedena kao jedan komad ili kao podijeljeni/dvodijelni
        set za veće veličine madraca.
    foundation_profile:
      name: Profil podnice
      description: Klasificira ukupnu kategoriju visine osnove - npr. ultra-nisko,
        nisko, standardno ili visoki profil - tako da kupac može brzo uskladiti željenu
        visinu madraca i veličinu plahte.
    frame_adjustability:
      name: Podesivost okvira
      description: Označava može li se i kako okvir podesiti (primjerice podesivnost
        širine/visine, rotacija/nagib), što utječe na ergonomiju i prikladnost projektu.
    frame_drum_jingle_configuration:
      name: Konfiguracija zveckanja bubnja okvira
      description: Uključuje li bubanj okvira džinglove i, ako da, opću konfiguraciju.
    frame_drum_tuning_system:
      name: Sustav za ugađanje bubnja okvira
      description: Kako je bubanj okvira uštiman ili je li uštimljiv.
    frame_finish:
      name: Završna obrada okvira
      description: Određuje zaštitni premaz ili završnu obradu materijala nanesenu
        na okvir, što utječe na trajnost i estetiku.
    frame_mounting_standard:
      name: Standard montaže okvira
      description: Definira specifikaciju sučelja čizma-okvir (primjerice 195 mm 2-točkovni,
        Trinity 3-točkovni), što je ključno za kompatibilnost okvira.
    frame_steel_gauge:
      name: Okvir od čelika
      description: Označava debljinu (kalibar) čeličnih cijevi korištenih u uspravnim
        nosačima stalaka, što je ključni pokazatelj čvrstoće i stabilnosti.
    frame_suspension_type:
      name: Vrsta ovjesa okvira
      description: Označava dizajn ovjesa okvira bicikla, kao što je kruti, tvrdi
        ili puni ovjes, kako bi se kupci lakše odlučili za okvir koji odgovara njihovoj
        namjeravanoj konstrukciji.
    free_reed_instrument_orientation:
      name: Orijentacija instrumenta sa slobodnim jezičkom
      description: Određuje kako se instrument drži/svira (u ruci s mijehom, preko
        ramena itd.) radi ergonomije i filtriranja po slučaju uporabe.
    free_weight_rack_type:
      name: Vrsta stalka sa slobodnom težinom
      description: Klasificira strukturni stil ili funkciju stalka (npr. stalak s
        utegom, stalak za girje, stablo ploča).
    freehub_body_type:
      name: Vrsta tijela slobodnog hoda
      description: Određuje standard tijela slobodnog zupčanika ili kasetofona koji
        podržava stražnja glavčina bicikla.
    freehub_driver_standard:
      name: Standardni Freehub upravljački program
      description: Označava sučelje kasete/drivera koje podržava dio glavčine (primjerice
        Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Standardni broj poruke za slobodni hod
      description: Određuje standard ili veličinu glavčine s kojom je slobodni hod
        kompatibilan.
    french_horn_bell_construction:
      name: Konstrukcija zvona francuskog roga
      description: Određuje kako je zvono konstruirano i može li se ukloniti radi
        transporta/servisiranja.
    french_horn_bell_material:
      name: Materijal zvona francuskog roga
      description: Označava materijal/leguru zvona (i često proširenja zvona) koja
        se koristi na francuskom rogu.
    french_horn_bell_type:
      name: Vrsta zvona za francuski rog
      description: Stil konstrukcije zvona.
    french_horn_finish:
      name: Završna obrada francuskog roga
      description: Vanjska završna obrada/premaz instrumenta.
    french_horn_included_accessories:
      name: Pribor uključen sa francuskim rogom
      description: Pribor uključen uz francuski rog (kutija, usnik itd.).
    french_horn_leadpipe_material:
      name: Materijal usisne cijevi francuskog roga
      description: Određuje materijal/leguru olovne cijevi.
    french_horn_wrap_type:
      name: Vrsta omota francuskog roga
      description: Ukupna konfiguracija omota/oblika francuskog roga.
    fretboard_radius_fit:
      name: Prilagođavanje radijusa praga
      description: Označava je li zakrivljenost jastučića kapoa dizajnirana za ravne
        ili zaobljene pragove gitare ili je podesiva tako da bi se prilagodila višestrukim
        radijusima pragova gitare.
    friction_surface_included:
      name: Uključena površina za trenje
      description: Uključuje li zamašnjak zamjenjivu/ugrađenu površinu trenja (npr.
        umetak, prsten) ili je to jednodijelna površina trenja.
    fringe_curtain_finish:
      name: Završna obrada zavjese s resama
      description: Opisuje vizualnu završnu obradu površine resa (sjaj/tekstura).
    fringe_curtain_material:
      name: Materijal za zavjese s resama
      description: Određuje primarni materijal traka za zavjese (npr. PET folija,
        plastika, papir, tkanina).
    fringe_curtain_use_location:
      name: Lokacija upotrebe resastih zavjesa
      description: Označava je li resasta zavjesa namijenjena za unutarnju uporabu,
        vanjsku uporabu ili oboje.
    fringe_trim_style:
      name: Stil sa resicama
      description: Određuje konstrukciju/stil resa (kako su pramenovi ili petlje oblikovani
        i predstavljeni).
    front_axle_standard:
      name: Standardna prednja osovina
      description: Navodi promjer osovine i razmak koji vilica može prihvatiti (primjerice
        15 x 110 mm Boost), osiguravajući kompatibilnost s glavčinom.
    front_button_configuration:
      name: Konfiguracija prednjih gumba
      description: Označava stil prednjeg gumba na jakni, navodeći je li jednostruko
        ili dvoredno kopčanje i broj prednjih gumba.
    front_closure_style:
      name: Stil prednjeg zatvaranja
      description: Označava stil prednje konstrukcije trench kaputa, kao što je jednostruki
        ili dvoredni, otvoreni, na omot ili poštanski broj.
    front_decoration_type:
      name: Vrsta prednje dekoracije
      description: Označava vrstu ukrasa ili zakrpe na prednjoj strani šešira (npr.
        vezena zakrpa, kožna zakrpa).
    front_point_configuration:
      name: Konfiguracija prednjeg vrha
      description: Određuje dizajn prednjih točaka (jedna, dvije, modularno, zamjenjivo),
        što utječe na preciznost prodiranja na ledu i mješovitom terenu.
    front_seat_position:
      name: Položaj prednjeg sjedala
      description: Za koju stranu/položaj u prvom redu je sjedalo namijenjeno.
    front_style:
      name: Prednji stil
      description: Opisuje prednju konstrukciju chino hlača, naznačujući jesu li hlače
        ravne prednje strane, plisirane ili imaju neki drugi detalj.
    frosting_or_icing_type:
      name: Vrsta glazure ili glazure
      description: Određuje vrstu glazure ili preljeva koji se nanosi na tortu ili
        desertnu pločicu.
    fruit_cultivar_or_variety:
      name: Sorta ili kultivar voća
      description: Označava određeni kultivar ili naziv sorte voća (npr. Gala, Granny
        Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Stil rezanja voćem
      description: Opisuje kako se voće priprema ili reže (npr. cijelo, narezano na
        kriške, na kockice).
    fruit_mix_variety:
      name: Raznovrsna mješavina voća
      description: Navodi tematsku mješavinu ili opću vrstu mješavine voća (npr. tropska
        mješavina, mješavina bobičastog voća).
    fruit_piece_form:
      name: Oblik voćnih komada
      description: Opisuje fizički rez ili prezentaciju komada suhog voća, npr. cijelo,
        narezano, u prahu.
    fruit_snack_form:
      name: Oblik voćnog snacka
      description: Klasificira fizički oblik ili stil u kojem je voćni zalogaj predstavljen.
    fruit_topping_format:
      name: Format voćnog preljeva
      description: Opisuje fizički oblik, teksturu ili stil preljeva kako bi se kupac
        mogao odabrati između umaka, sirupa, komadića voća, pucketavih bisera itd.
    fruit_variety:
      name: Sorta voća
      description: Identificira primarno voće korišteno za recept/komplet/Supply voćnim
        vinom (npr. jabuka, trešnja, kupina).
    fuel_cap_gasket_seal_material:
      name: Materijal brtve/zaptivke čepa za gorivo
      description: Određuje materijal koji se koristi za brtvu/O-prsten na čepu za
        gorivo.
    fuel_cap_locking_mechanism:
      name: Mehanizam zaključavanja čepa goriva
      description: Označava način zaključavanja koji koristi zaključavajući čep za
        gorivo.
    fuel_cap_type:
      name: Vrsta poklopca spremnika goriva
      description: Određuje funkcionalni tip/dizajn čepa za gorivo koji se koristi
