    thermometer_design:
      name: Dizajn termometra
      description: Određuje osnovni način rada ili tehnologiju kućnog termometra.
    thermos_handle_type:
      name: Vrsta ručke termosice
      description: Opisuje stil ručke ili pomagala za nošenje integriranog u termosicu.
    thread_standard:
