    vent_pipe_type:
      name: Vrsta ventilacijske cijevi
      description: Klasificira stil konstrukcije dimnjaka ili ventilacijske cijevi.
    vent_style:
      name: Stil ventilacije
      description: Klasificira strukturni stil ili namjenu komponente ventilacijskog
