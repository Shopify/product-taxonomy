    steam_table_pan_size:
      name: Veličina posude za grijaće stolove
      description: Označava standardiziranu frakciju Gastronorm/hotelske posude (npr.
        puna, 1/2, 1/3) koja odgovara posudi ili poklopcu.
    steam_table_pan_size_compatibility:
      name: Kompatibilnost veličine posude za grijaće stolove
      description: Navodi gastronorm ili standardne veličine posude koje uređaj može
        primiti.
    steam_table_pan_type:
      name: Vrsta posude za grijače stolove
      description: Određuje stil konstrukcije posude, što utječe na drenažu i performanse
        grijanja.
    stemware_design:
      name: Dizajn čaša sa stalcima
      description: Određuje ima li čaša tradicionalni stalak ili je bez stalka.
    stick_tip_style:
      name: Stil vrha štapića
      description: Definira dizajn kraja štapića, utječući na način na koji probija
        ili podupire hranu.
    stocking_toe_orientation:
      name: Orijentacija prstiju čarape
      description: Određuje smjer u kojem su usmjereni prsti čarape kada je obješena,
        što utječe na vizualnu simetriju pri prikazu više čarapa.
    stopper_type:
      name: Vrsta stopera
      description: Određuje vrstu zatvarača koji se isporučuje s dekanterom, ako postoji.
    strainer_style:
      name: Stil cjedila
      description: Klasificira dizajn cjedila ili sita.
    strainer_type:
      name: Vrsta cjedila
      description: Određuje stil ili dizajn cjedila, ukazujući na njegovu namjenu
        za kulinarsku upotrebu i konstrukciju mreže.
    strap_end_fitting_type:
      name: Vrsta spoja kraja remena
      description: Određuje hardver ili spoj smješten na kraju vučnog remenja koji
        olakšava spajanje, usidravanje ili podešavanje.
    straw_dispensing_mechanism:
