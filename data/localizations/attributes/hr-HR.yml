    umbrella_base_type:
      name: Vrsta baze kišobrana
      description: Definira strukturni stil ili dizajn montaže baze.
    umbrella_opening_mechanism:
      name: Mehanizam za otvaranje kišobrana
      description: Definira kako se platno kišobrana rasklapa i uvlači.
    umbrella_type:
      name: Vrsta kišobrana
      description: Određuje cjelokupni dizajn ili oblik kišobrana.
    upf_rating:
      name: UPF ocjena
      description: Označava faktor ultraljubičaste zaštite (UPF) tkanine platna suncobrana,
