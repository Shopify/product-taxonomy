    wheel_tread_style:
      name: Stil gazišta kotača
      description: Određuje dizajn gazišta kotača koji utječe na prianjanje, razinu
        buke i potencijalne oznake na podu.
    whistling:
      name: Zviždanje
      description: Određuje hoće li kuhalo za vodu proizvoditi zvuk zviždanja kada
