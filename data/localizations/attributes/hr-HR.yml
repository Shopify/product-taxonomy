    detector_type:
      name: Vrsta detektora
      description: Određuje metodu detekcije koja se upotrebljava u sigurnosnim uređajima,
        npr. ionizacija, optička detekcija, uzorkovanje zraka
    developer_strength:
      name: Jačina developera
      description: Specificira koncentraciju peroksida ili volumen developera ili
        kompleta koji odgovara željenoj razini podizanja.
    developmental_features:
