      description: Gibt die Whisky-Sorte an, z. B. Single Malt, Blended Malt
    whiskey_variety:
      name: Auswahl an Whiskey
      description: Klassifiziert Whisky nach Kornsorten oder Typ, z. B. Mais, Roggen,
        Rye
    wi_fi_band:
      name: WLAN-Band
      description: Gibt den Funkfrequenzbereich eines Geräts an, z. B. 2,4 GHz
    wi_fi_standard:
      name: WLAN-Standard
      description: Gibt das drahtlose Netzwerkprotokoll für WLANs an, z. B. 802.11ac
    width_adjustment:
      name: Breitenverstellung
      description: Gibt an, ob die Breite des Geräts verändert werden kann, um an
        verschiedene Vorrichtungen, Betten oder Benutzer angepasst zu werden.
    winder_features:
      name: Wicklereigenschaften
      description: Beschreibt spezielle Eigenschaften von Gitarrensaitenkurbeln, wie
