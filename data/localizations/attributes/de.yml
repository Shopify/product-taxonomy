        können.
    awning_operation_type:
      name: Markisen-Betriebstyp
      description: Beschreibt den Mechanismus zum Aus- und Einfahren der Markise.
    bag_clip_style:
      name: Verschlussclip-Stil
      description: Beschreibt, wie der Verschlussmechanismus des Clips gebaut ist.
    bag_configuration:
      name: Beutelkonfiguration
      description: Beschreibt Anzahl und Art der Beutel, die im Grasschnitt-Auffangsystem
