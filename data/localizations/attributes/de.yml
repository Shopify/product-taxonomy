    apron_features:
      name: Schürzeneigenschaften
      description: Hebt spezielle funktionale Eigenschaften der Schürze hervor.
    apron_style:
      name: Schürzenstil
      description: Definiert den allgemeinen Schnitt bzw. die Konstruktion der Schürze.
    aquatic_plant_growth_habit:
      name: Wuchsform von Wasserpflanzen
      description: Klassifiziert Wasserpflanzen nach ihrer typischen Position und
