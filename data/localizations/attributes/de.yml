    yacht_type:
      name: Yachttyp
      description: Klassifiziert den Yachttyp, z. B. Motoryacht oder Exploreryacht
    yarn_weight_category:
      name: Garngewichtskategorie
      description: Identifiziert die Dicke des Garns, wie super voluminös oder Handwerk
    zipper_pull_style:
      name: Stil des Reißverschlussziehgriffs
      description: Beschreibt das Design oder die Oberfläche eines Reißverschlusses,
        z. B. strukturiert oder geprägt
    zoom_type:
      name: Zoomtyp
      description: Gibt die Art der Zoomfunktion in Dokumentenkameras an, z. B. digital
        oder optisch
    air_fryer_accessory_type:
      name: Typ für Heißluftfritteusen-Zubehör
      description: Gibt genau an, welche Art von Zubehör verkauft wird.
    air_purifier_filter_technology:
      name: Luftreiniger-Filtertechnologie
      description: Gibt das primäre Filtrations- oder Reinigungsverfahren an, das
        vom Gerät angewendet wird.
    air_purifier_filtration_rating:
      name: Leistung des Luftreinigerfilters
      description: Gibt die zertifizierte Effizienzklasse des Filtermediums an.
    animal_care_set_components_included:
