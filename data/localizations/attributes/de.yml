    wheel_part_type:
      name: Radteiltyp
      description: Identifiziert die spezifische Komponente des Radsystems eines Fahrzeugs,
        wie Radlager oder Radnabe
    wheel_style:
      name: Lenkradstil
      description: Beschreibt die physische Felgenform oder den Fahrdisziplinstil.
    wheel_type:
      name: Radtyp
      description: Gibt die Art des Rades für Fahrradprodukte an, z. B. aufblasbar
        oder fest
    wheelchair_type:
      name: Rollstuhltyp
      description: Gibt den Rollstuhltyp an, z. B. elektrisch, manuell
    whiskey_style:
