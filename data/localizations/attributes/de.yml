    windlass_design:
      name: Design der Ankerwinde
      description: Beschreibt die Ausrichtung einer Ankerwinde, z. B. horizontal oder
        vertikal
    window_treatment_material:
      name: Fensterbehandlungsmaterial
      description: Gibt die Zusammensetzung von Jalousien oder Rollos an, z. B. aus
        Aluminium oder Kunststoff
    windsurfing_board_style:
      name: Windsurfbrett-Stil
      description: Gibt den Typ des Windsurfbretts an, z. B. Freestyle oder Slalom
    wine_rack_design:
      name: Weinregal-Design
      description: Gibt den Stil oder die Designrichtung eines Weinregals an, z. B.
        modern, traditionell
    wine_sweetness:
      name: Weinsüße
      description: Hilft bei der Kategorisierung der Weinsüße, z. B. trocken, süß
    wine_variety:
      name: Auswahl an Wein
      description: Hilft bei der Unterscheidung verschiedener Weinsorten, z. B. weiß,
        Rosé
    wing_style:
      name: Flügelstil
      description: Zeigt an, ob die Binde stabilisierende Flügel enthält und, falls
        ja, welchen Stil
    wipe_dispenser/warmer_features:
      name: Eigenschaften des Wischtuchspenders/-wärmers
      description: Beschreibt die besonderen Merkmale von Wischtuchspendern und Wärmern,
