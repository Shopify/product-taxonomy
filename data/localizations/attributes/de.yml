    baking_liner_size:
      name: Größe der Backform
      description: Größenangabe in von Bäckereien verwendeten Kategorien, um das Fassungsvermögen
        der Backform im Verhältnis zur Standardgröße von Cupcakes zu beschreiben.
    baking_sheet_style:
      name: Backblech-Stil
      description: Gibt den Konstruktionsstil des Blechs an, z. B. ob es sich um ein
        Blech mit Rand oder ein Blech mit Lochung handelt.
    ballast_material:
      name: Ballastmaterial
      description: Listet die Materialien auf, die zum Ballastieren (Füllen) der Walzentrommel
        verwendet werden können, und hilft Käufer:innen dabei, Modelle auszuwählen,
        die mit ihrem bevorzugten Füllmedium kompatibel sind.
    base_features:
      name: Basiseigenschaften
      description: Hebt die Stabilität oder die Griffigkeit der Basis hervor und unterstützt
        damit Benutzer:innen, die eine rutschfeste oder saugfähige Oberfläche benötigen.
    baster_tip_type:
      name: Spitzentyp für Bratenspritze
      description: Klassifiziert den Stil der Spitze oder des Aufsatzes auf der Bratenspritze,
        sodass Käufer:innen zwischen Bratenspritzen in Ballonform, Injektionsnadeln
        und Bürstenspitzen filtern können.
    bathroom_accessories_included:
      name: Enthaltene Badezimmeraccessoire
      description: Listet die einzelnen Artikel im Badezimmeraccessoire-Set auf, damit
        Käufer:innen genau wissen, welche Teile enthalten sind.
    bathroom_accessory_compatibility:
      name: Kompatibilität von Badezimmeraccessoires
      description: Gibt an, für welches Badezimmeraccessoire oder welche Armatur die
        Halterung konzipiert ist.
    battery_backup_support:
      name: Unterstützung für Notstromversorgung
      description: Gibt an, ob eine Notstromversorgung enthalten oder optional ist
        bzw. nicht unterstützt wird.
    bedskirt_corner_style:
      name: Eckstil für Bettvolant
      description: Legt fest, wie die Ecken des Bettvolant verarbeitet sind, was sich
        auf die Passform bei Betten mit Fußteil oder Pfosten auswirkt.
    bedskirt_style:
      name: Bettvolant-Stil
      description: Definiert die Konstruktion und das visuelle Design des Bettvolants
        und hilft Käufer:innen bei der Auswahl zwischen verschiedenen Ausführungen
        wie gerüscht oder tailliert.
    beer_glass_type:
      name: Bierglastyp
      description: Kennzeichnet den spezifischen Stil oder die spezifische Form des
        Bierglases und hilft Käufer:innen, das ideale Gefäß für ihr bevorzugtes Bier
        zu finden (z. B. Pint, Pils, Weizen).
    belt_profile:
      name: Riemenprofil
      description: Identifiziert den Querschnitt oder die Ausführung des Riemens,
        um eine korrekte Passform für die Riemenscheibenkonstruktion zu gewährleisten.
    beverage_tub_features:
      name: Getränkewanneneigenschaften
      description: Hebt bemerkenswerte Designmerkmale oder enthaltene Komponenten
        hervor, die die Funktionalität oder den Bedienkomfort des Getränkebeckens
        erhöhen.
    blade_construction_method:
      name: Rotorblatt-Konstruktionsmethode
      description: Gibt an, wie die Klinge hergestellt wurde.
    blade_finish:
      name: Oberflächenbehandlung der Klinge
      description: Oberflächenbehandlung oder ästhetische Veredelung der Klinge.
    blade_shape:
      name: Klingenform
      description: Beschreibt die geometrische Forma bzw. das Profil des Schaufelblatts.
    blade_sidedness:
      name: Klingenseitigkeit
      description: Zeigt an, ob die Heckenscherenklinge nur auf einer Seite oder auf
        beiden Seiten Schneidzähne hat.
    bleach_formulation:
      name: Bleichmittelformulierung
      description: Gibt die chemische Grundlage des Bleichmittels an (z. B. auf Chlor-
        oder Sauerstoffbasis).
    bleach_type:
      name: Bleichmittelart
      description: Gibt an, ob und in welcher Art Bleich- oder Aufhellungsmittel im
        Fleckenentferner verwendet wird.
    blender_jar_material:
      name: Material des Mixerbehälters
      description: Gibt das verwendete Material des Hauptmixbehälters an.
    blooming_season:
      name: Blütezeit
      description: Gibt die Jahreszeit(en) an, in der/denen die Pflanze typischerweise
        blüht.
    booster_pump_requirement:
      name: Anforderung für Druckerhöhungspumpe
      description: Klärt, ob für den Betrieb der Spülvorrichtung eine separate Druckerhöhungspumpe
        erforderlich ist.
    bore_type:
      name: Bohrungstyp
      description: Definiert die Bohrungsform oder Schnittstelle, die zur Montage
        der Riemenscheibe an der Welle verwendet wird.
    bottle_cap_gasket_material:
      name: Material der Flaschenverschlussdichtung
      description: Kennzeichnet das Material der Dichtung, die den Flaschenrand berührt.
    bottle_cap_liner_type:
      name: Dichtungseinlage im Flaschenverschluss
      description: Gibt die Art bzw. das Material der Dichtung im Inneren des Flaschenverschlusses
        an, die die Auslaufsicherheit und Produktkompatibilität beeinflusst.
    bottle_fill_state:
      name: Flaschenfüllzustand
      description: Gibt an, ob die Flasche leer oder mit Trinkwasser vorgefüllt verkauft
        wird.
    bottle_stopper_mechanism:
      name: Flaschenverschlussmechanismus
      description: Definiert den Dichtungsmechanismus bzw. -stil, der vom Verschluss
        oder Sicherungsring verwendet wird.
    bowl_type:
      name: Schüsseltyp
      description: Klassifiziert den primären Verwendungszweck oder Stil der Schüssel.
    bread_storage_ventilation:
      name: Belüftung für Brotaufbewahrung
      description: Beschreibt, ob und wie der Behälter die Luftzirkulation ermöglicht,
        um das Brot frisch zu halten.
    brew_strength_options:
      name: Optionen für Brühstärke
      description: Listet die wählbaren Brühstärkestufen auf, die die Extraktionszeit
        oder den Durchfluss anpassen, um einen milderen oder kräftigeren Kaffee zu
        erhalten.
    bridge_railing_style:
      name: Brückengeländer-Stil
      description: Gibt das Vorhandensein und die Ausführung des Geländers an, was
        die Sicherheit und das Erscheinungsbild beeinflusst.
    briquette_ignition_type:
      name: Brikett-Zündtyp
      description: Gibt an, ob die Briketts Anzündhilfen enthalten oder als Standardvariante
        geliefert werden, um Benutzer:innen den Anzündkomfort zu verdeutlichen.
    bristle_stiffness:
      name: Borstensteifigkeit
      description: Gibt die Steifigkeit der Bürstenborsten an, die die Scheuerkraft
        und die Eignung für verschiedene Oberflächen von Toilettenschüsseln beeinflusst.
    bristle_tip_type:
      name: Borstenspitzentyp
      description: Gibt an, ob die Borstenspitzen für eine feinere Staubaufnahme gespalten
        (gefranst) sind oder für groben Schmutz ungefranst bleiben.
    bucket_features:
      name: Eimereigenschaften
      description: Hebt die besonderen Merkmale oder funktionalen Erweiterungen eines
        Eimers hervor, damit Käufer:innen schnell Produkte mit den gewünschten Eigenschaften
        finden können.
    bulb_finish:
      name: Glühbirnenoberfläche
      description: Beschreibt die äußere Beschichtung oder Oberflächenbehandlung des
        Glühbirnenglases, die die Lichtstreuung und den Stil beeinflusst.
    burner_shape:
      name: Brennerform
      description: Beschreibt die geometrische Konstruktion des Grillbrenners, die
        die Passform und die Wärmeverteilung im Inneren des Grills bestimmt.
    burr_shape:
      name: Mahlwerksform
      description: Gibt die Geometrie des Mahlwerks für Mahlwerke an, die die Mahlkonsistenz
        und Wärmeentwicklung beeinflusst.
    butterfly_feeder_food_type:
      name: Typ des Schmetterlingsfutters
      description: Gibt an, für welche Art von Futter oder Lockmittel der Futterspender
        ausgelegt ist.
    cabinet_light_fixture_style:
      name: Schrankleuchten-Stil
      description: Beschreibt den physischen Stil oder Formfaktor der Schrankleuchte.
    candle_container_material:
      name: Material für Kerzenbehälter
      description: Identifiziert das Material des Kerzengefäßes bzw. -behälters (bei
        Kerzen im Glas/in Dosen).
    canner_type:
      name: Typ für Einkochtopf
      description: Gibt die Einkochmethode oder den Einkochstil an, für den der Einkochtopf
        ausgelegt ist.
    canopy_shape:
      name: Pavillonform
      description: Legt die geometrische Form des geöffneten Pavillons fest.
    canopy_venting:
      name: Pavillonbelüftung
      description: Beschreibt die Belüftungskonfiguration des Pavillons, die den Windwiderstand
        und die Wärmeabfuhr beeinflusst.
    car_cleaning_kit_items_included:
      name: Inbegriffene Artikel des Auto-Reinigungssets
      description: Listet die im Set enthaltenen Werkzeuge und Zubehörteile auf, damit
        Käufer:innen genau wissen, was sie erhalten und Pakete vergleichen können.
    carbonation_level_adjustment:
      name: Anpassung des Kohlensäuregehalts
      description: Gibt an, ob der Wassersprudler einen festen oder einstellbaren
        Kohlensäuregehalt bietet.
    catalytic_combustor_type:
      name: Typ der katalytischen Brennkammer
      description: Gibt an, ob der Ofen ein katalytisches, nicht-katalytisches oder
        hybrides Verbrennungssystem verwendet, was die Effizienz und die Emissionen
        beeinflusst.
    ceiling_light_fixture_style:
      name: Deckenleuchtenstil
      description: Definiert den primären strukturellen Stil oder die Konfiguration
        der Deckenleuchte.
    center_hole_shape:
      name: Form der Mittelbohrung
      description: Beschreibt die geometrische Form der Befestigungs-/Mittelbohrung
        der Klinge, die die Kompatibilität mit bestimmten Mähspindeln bestimmt.
    chainsaw_bar_mount_type:
      name: Befestigungstyp für Kettensägenschwert
      description: Gibt das Befestigungsmuster oder die Schlitzform eines Kettensägenschwerts
        an, um sicherzustellen, dass sie zum Antriebskopf der Säge passt.
    chainsaw_bar_nose_type:
      name: Typ für Kettensägen-Schwertspitzen
      description: Bestimmt den Typ der Schwertspitze, der sich auf die Schneidleistung
        und den Wartungsaufwand auswirkt.
    chainsaw_bar_type:
      name: Typ für Kettensägenschwerter
      description: Klassifiziert die Konstruktion oder den Zweck eines Schwerts.
    chainsaw_cutter_type:
      name: Typ für Kettensägenschneider
      description: Identifiziert das Schneiderprofil oder Design der Kette, das die
        Schnittgeschwindigkeit, die Haltbarkeit und die Rückschlageigenschaften beeinflusst.
    champagne_glass_type:
      name: Champagnerglastyp
      description: Legt das spezifische Design eines Champagnerglases fest und ermöglicht
        Käufer:innen die Unterscheidung zwischen Formen, die für unterschiedliche
        Trinkerlebnisse optimiert sind.
    chandelier_shape:
      name: Kronleuchterform
      description: Definiert die allgemeine Struktur des Kronleuchters.
    charcoal_chimney_features:
      name: Merkmale eines Anzündkamins
      description: Listet die wichtigsten funktionalen Merkmale des Anzündkamins auf.
    charcoal_ignition_type:
      name: Holzkohlezündung
      description: Gibt an, ob die Holzkohle behandelt oder technisch verändert wurde,
        um das Anzünden zu erleichtern oder eine sauberere Verbrennung zu erzielen.
    chopstick_style:
      name: Essstäbchenstil
      description: Gibt den regionalen oder kulturellen Stil der Essstäbchen an, der
        sich auf deren Länge, Form und Verzierung auswirken kann.
    chopstick_trainer_design:
      name: Design des Essstäbchen-Trainers
      description: Beschreibt die mechanische Konstruktion oder die Methode, die vom
        Trainer verwendet wird.
    cigar_cutter_type:
      name: Zigarrenschneidertyp
      description: Gibt den Schneidemechanismus bzw. -stil zum Entfernen der Zigarrenkappe
        an.
    cigar_punch_type:
      name: Zigarrenlochertyp
      description: Kennzeichnet den Mechanismus oder den Stil des Zigarrenlochers.
    clay_pot_material:
      name: Tontopfmaterial
      description: Gibt die Zusammensetzung oder die Art des in dem Gefäßes verwendeten
        Tons an, z. B. Steingut oder Steinzeug.
    cleaner_concentration:
      name: Reinigerkonzentration
      description: Gibt an, ob der Reiniger gebrauchsfertig oder als Konzentrat verkauft
        wird, das vor Gebrauch verdünnt werden muss.
    cleaning_cloth_features:
      name: Putztucheigenschaften
      description: Hebt besondere Leistungsmerkmale des Tuchs hervor.
    cleaning_solution_concentration:
      name: Reinigungslösungskonzentration
      description: Gibt an, ob das Produkt gebrauchsfertig, konzentriert oder in anderen
        Verdünnungsformen verkauft wird.
    clock_chime_melody:
      name: Glockenspielmelodie
      description: Gibt die Melodie oder das Schlagmuster an, das die Uhr stündlich
        oder viertelstündlich spielt.
    clock_display_type:
      name: Uhranzeigetyp
      description: Legt fest, wie die Zeit angezeigt wird; nützlich für Kund:innen,
        die eine verschiedene Anzeigen bevorzugen (digital, analog, Flip usw.).
    clock_hand_mounting_type:
      name: Montageart für Uhrzeiger
      description: Legt fest, wie der Uhrzeiger am Uhrwerk angebracht wird.
    clock_hand_style:
      name: Uhrzeigerstil
      description: Legt das visuelle Design der Zeiger fest und hilft Käufer:innen,
        Zeiger zu finden, die zur Ästhetik ihrer Uhr passen.
    clock_movement_type:
      name: Uhrwerkstyp
      description: Identifiziert den internen Zeitmessmechanismus der Uhr.
    clothespin_type:
      name: Wäscheklammerntyp
      description: Bestimmt die strukturelle Konstruktion bzw. den Stil der Wäscheklammer.
    co2_cylinder_compatibility:
      name: Kompatibilität der CO2-Zylinder
      description: Definiert die Art oder Größe der CO2-Zylinder, die der Wassersprudler
        akzeptiert, und stellt so sicher, dass Käufer:innen kompatible Nachfüllkartuschen
        finden können.
    co2_supplementation_requirement:
      name: Bedarf an CO2-Zugabe
      description: Zeigt die für ein optimales Pflanzenwachstum in Aquarien erforderliche
        Kohlendioxidzugabe an.
    coaster_features:
      name: Untersetzereigenschaften
      description: Identifiziert besondere Merkmale von Untersetzern, wie z. B. eine
        saugfähige oder rutschfeste Unterseite.
    cocktail_strainer_type:
      name: Cocktailsiebtyp
      description: Legt die Konstruktion des Cocktailsiebs fest, was sich auf die
        Kompatibilität mit Shakern und die Art der Verwendung auswirkt.
    code_technology:
      name: Codetechnologie
      description: Gibt den Code oder die Sicherheitstechnologie an, die die Fernbedienung
        zur Kommunikation mit dem Garagentoröffner verwendet.
    coffee_decanter_warmer_features:
      name: Eigenschaften des Kaffeekannenwärmers
      description: Hebt besondere funktionelle oder sicherheitsrelevante Merkmale
        hervor, die speziell für Kaffeekannenwärmer gelten.
    coffee_filter_basket_size:
      name: Größe von Kaffeefilterkörben
      description: Gibt die standardisierte Größenbezeichnung an, die der Korb unterstützt,
        und gewährleistet so die Kompatibilität mit Filtern und Maschinen.
    coffee_filter_shape:
      name: Kaffeefilterformen
      description: Legt die geometrische Form des Kaffeefilters fest, um die Kompatibilität
        mit verschiedenen Kaffeemaschinen zu gewährleisten.
    coffee_filter_type:
      name: Kaffeefiltertyp
      description: Gibt an, welchen Filtertyp eine Kaffeemaschine akzeptiert oder
        enthält, was sich auf den Geschmack und die laufenden Verbrauchskosten auswirken
        kann.
    coffee_grinder_accessory_type:
      name: Typ für Kaffeemühlenzubehör
      description: Klassifiziert den jeweiligen Zubehörtyp, um das Filtern und Suchen
        zu erleichtern.
    colander_style:
      name: Siebstil
      description: Klassifiziert die Bauart des Siebs, z. B. schüsselförmig oder über
        der Spüle.
    compatible_air_conditioner_type:
      name: Kompatibler Klimaanlagentyp
      description: Gibt den Klimaanlagentyp an, für den das Zubehörteil konzipiert
        ist.
    compatible_awning_rail_type:
      name: Kompatibler Markisenschienentyp
      description: Gibt an, für welche Markisenschiene oder welches Rohrsystem der
        Aufhängeclip geeignet ist.
    compatible_beverage_type:
      name: Kompatibler Getränketyp
      description: Gibt an, für welche Art von Getränk der Stöpsel oder Verschluss
        konzipiert ist.
    compatible_can_size:
      name: Kompatible Dosengröße
      description: Listet die Größe der Getränkedosen auf, die der Zerkleinerer verarbeiten
        kann.
    compatible_cigarette_size:
      name: Kompatible Zigarettengröße
      description: Listet die standardmäßigen Zigarettenlängen oder -formate auf,
        die in den Halter passen.
    compatible_coffee_capsule_system:
      name: Kompatibles Kaffeekapselsystem
      description: Gibt an, für welches Kapsel- oder Pad-System der Adapter ausgelegt
        ist, damit Käufer:innen einen Adapter auswählen können, der zu ihrem bevorzugten
        Kaffeeformat passt.
    compatible_coffee_maker_type:
      name: Kompatible Kaffeemaschine
      description: Gibt den Typ der Kaffee- oder Espressomaschine an, für die das
        Zubehör konzipiert ist.
    compatible_cooking_thermometer_type:
      name: Kompatibler Kochthermometertyp
      description: Gibt an, für welche Arten von Kochthermometern dieses Kalibrierungswerkzeug
        geeignet ist.
    compatible_coupler_size:
      name: Kompatible Kupplungsgröße
      description: Gibt die Kupplungsgröße an, auf die der Spritzbeutel ohne Zuschneiden
        passt.
    compatible_dehumidifier_technology:
      name: Kompatible Entfeuchtungstechnologie
      description: Gibt die Entfeuchtungstechnologie an, mit der der Filter kompatibel
        ist, z. B. Kompressor oder Trockenmittel.
    compatible_feeder_type:
      name: Kompatibler Zuführungstyp
      description: Gibt an, für welche Zuführungsstile das Tablett geeignet ist.
    compatible_footwear_material:
      name: Kompatibles Schuhmaterial
      description: Listet die Arten von Schuhmaterialien auf, für die die Politur
        oder das Wachs geeignet ist.
    compatible_fuel_type:
      name: Kompatibler Brennstofftyp
      description: Gibt den Brennstofftyp an, mit dem das Zubehör kompatibel sein
        soll, um eine optimale Abstimmung mit Propan-, Erdgas-, Elektro- oder anderen
        brennstoffbetriebenen Terrassenstrahlern zu gewährleisten.
    compatible_garment_steamer_design:
      name: Kompatibles Design für Dampfglätter
      description: Gibt an, für welche Dampfglättermodelle der Kabelhalter geeignet
        ist.
    compatible_grill_type:
      name: Kompatibler Grilltyp
      description: Gibt an, für welche Grillarten das Zubehör geeignet ist.
    compatible_hazardous_waste_type:
      name: Kompatibler Sondermülltyp
      description: Gibt die Art des Sondermülls an, für dessen Aufbewahrung der Behälter
        ausgelegt ist.
    compatible_ironing_board_type:
      name: Kompatibler Bügelbretttyp
      description: Gibt den Bügelbretttyp an, zu dem das Teil passt, und hilft Käufer:innen
        bei der Bestimmung der Kompatibilität.
    compatible_lawn_mower_type:
      name: Kompatibler Rasenmähertyp
      description: Gibt den Mähertyp an, für den die Antriebsrolle geeignet ist.
    compatible_leaf_blower_style:
      name: Kompatibler Laubbläsertyp
      description: Gibt den Bauformfaktor des Laubbläsers an, mit dem das Zubehör
        kompatibel ist.
    compatible_mailbox_size:
      name: Kompatible Briefkastengröße
      description: Gibt die Briefkastengröße(n) an, für die das Zubehör gemäß den
        gängigen USPS-/Branchenklassifizierungen geeignet ist.
    compatible_mailbox_type:
      name: Kompatibler Briefkastentyp
      description: Gibt den Stil des Briefkastens an, der in das Gehäuse passt oder
        mit diesem verbunden werden kann, damit die Käufer:innen die richtige Passform
        ermitteln können.
    compatible_napkin_size:
      name: Kompatible Serviettengröße
      description: Gibt die Abmessungen oder das Format von Servietten an, für das
        der Halter bzw. Spender ausgelegt ist.
    compatible_outdoor_grill_style:
      name: Kompatibler Stil des Außengrills
      description: Gibt den Grilltyp bzw. die -konfiguration an, für die die Abdeckung
        konzipiert ist.
    compatible_radiator_style:
      name: Kompatibler Heizkörpertyp
      description: Listet die Heizkörpertypen auf, für die das Zubehörteil ausgelegt
        ist, z. B. Flachheizkörper, Säulenheizkörper, Handtuchheizkörper oder Fußleistenheizkörper.
    compatible_refrigerator_compartment:
      name: Kompatibles Kühlschrankfach
      description: Gibt an, wo im Kühlschrank das Zubehör verwendet werden soll.
    compatible_stove_fuel_type:
      name: Kompatibler Brennstofftyp für Kocher
      description: Gibt an, mit welchen Brennstoffarten ein Zubehörteil für mobile
        Kocher kompatibel ist, und hilft Kund:innen so, den passenden Artikel für
        ihren Kocher zu finden (z. B. Gaskartuschen oder Spiritus).
    compatible_stove_type:
      name: Kompatibler Kochertyp
      description: Gibt an, mit welchen Arten von mobilen Kochern diese Basisstation
        kompatibel ist.
    compatible_tissue_box_type:
      name: Kompatibler Typ für Taschentuchboxen
      description: Gibt an, für welche Art/Größe von Taschentuchboxen der Halter geeignet
        ist.
    compatible_tractor_type:
      name: Kompatibler Traktortyp
      description: Gibt die Traktorenkategorie an, für die das Teil/Zubehör bestimmt
        ist.
    compatible_umbrella_type:
      name: Kompatibler Regenschirmtyp
      description: Gibt den Stil des Sonnenschirms an, für den die Schutzhülle geeignet
        ist.
    compatible_washing_machine_type:
      name: Kompatibler Waschmaschinentyp
      description: Gibt an, für welche Waschmaschinentypen der Reiniger geeignet ist
        (z. B. Frontlader, Toplader, Hochleistungsmaschinen).
    compatible_waste_container_type:
      name: Kompatibler Abfallbehältertyp
      description: Gibt die Art von Abfallbehälter an, für die das Zubehör konzipiert
        ist oder mit der es funktioniert.
    compatible_water_cooler_type:
      name: Kompatibler Wasserspendertyp
      description: Gibt an, mit welchen Wasserspendermodellen das Zubehör kompatibel
        ist, und hilft Kund:innen so bei der Auswahl der richtigen Teile für ihr Gerät.
    compatible_water_heater_type:
      name: Kompatibler Typ für Warmwasserbereiter
      description: Gibt an, mit welchem Warmwasserbereiter-Typ das Produkt kompatibel
        ist.
    compatible_wrap_material:
      name: Kompatibles Lebensmittelverpackungsmaterial
      description: Listet die Arten von Frischhaltefolie auf, für die der Spender
        ausgelegt ist.
    compost_aerator_design:
      name: Design für Kompostbelüfter
      description: Beschreibt die mechanische Konstruktion oder Bauart des Belüfters
        und erläutert, wie dieser den Kompost durchmischt.
    compost_form:
      name: Kompostform
      description: Beschreibt die physische Ausgestaltung oder Verpackungsart des
        Kompostprodukts.
    compost_source_material:
      name: Ausgangsmaterial für Kompost
      description: Gibt das primäre organische Material (oder die Materialien) an,
        aus dem (oder denen) der Kompost gewonnen wird.
    compression_method:
      name: Komprimierungsmethode
      description: Kennzeichnet die Technik, mit der Luft aus dem Beutel entfernt
        oder Platz im Beutel gespart wird.
    cooking_gel_fuel_base:
      name: Basis für Chafing Dish- & Fonduebrennpasten
      description: Identifiziert die primäre chemische Basis des Gelbrennstoffs, sodass
        Benutzer:innen zwischen ethanol-, methanol- und glykolbasierten sowie anderen
        Brennstoffformulierungen wählen können, die sich in Bezug auf Geruch, Wärmeabgabe
        und Eignung für den Innen- und Außenbereich unterscheiden.
    cooking_surface_texture:
      name: Oberflächenstruktur der Kochfläche
      description: Gibt die Beschaffenheit der Kochfläche an, z. B. flach, geriffelt
        oder doppelt verwendbar.
    cooking_thermometer_design:
      name: Design für Kochthermometer
      description: Kennzeichnet die Funktionsweise eines Kochthermometers, z. B. analog
        oder digital.
    cookware_coating_material:
      name: Beschichtungsmaterial für Kochgeschirr
      description: Identifiziert die Art der Innen- oder Außenbeschichtung des Kochgeschirrs
        und gibt Aufschluss über Antihaftleistung, Haltbarkeit und Pflegeaufwand.
    cookware_coating_type:
      name: Beschichtungsart für Kochgeschirr
      description: Gibt die Innen- oder Oberflächenbeschichtung des Kochgeschirrs
        an.
    cookware_lid_style:
      name: Deckelart für Kochgeschirr
      description: Beschreibt den allgemeinen Stil bzw. die funktionale Konstruktion
        des Deckels.
    cooler_style:
      name: Kühlboxstil
      description: Identifiziert die strukturelle Konstruktion der tragbaren Kühlbox
        für Speisen und Getränke und hilft Käufer:innen bei der Auswahl zwischen Hartschalenkoffern,
        weichen Taschen, Rucksäcken usw.
    corkscrew_accessories_included:
      name: Im Lieferumfang enthaltenes Korkenzieherzubehör
      description: Gibt die zusätzlichen Komponenten an, die im Lieferumfang des Korkenziehers
        enthalten sind.
    corkscrew_hinge_type:
      name: Typ des Korkenzieherscharniers
      description: Gibt an, ob der Korkenzieher einen einfachen oder einen doppelten
        Scharnierhebelmechanismus verwendet.
    corkscrew_tools_included:
      name: Enthaltene Korkenzieherwerkzeuge
      description: Listet die Werkzeuge und Zubehörteile auf, die im Lieferumfang
        des Korkenziehers enthalten sind (z. B. Folienschneider, Flaschenöffner, Messerklinge),
        damit Käufer:innen sehen können, was enthalten ist.
    crushing_method:
      name: Zerkleinerungsmethode
      description: Beschreibt den Mechanismus, der zum Komprimieren der Dose verwendet
        wird.
    crust_browning_level:
      name: Bräunungsgrad der Kruste
      description: Zeigt die vom Brotbackautomaten angebotenen wählbaren Optionen
        für die Krustenfarbe bzw. den Bräunungsgrad an.
    cultivar_type:
      name: Sortentyp
      description: Gibt die Züchtungsart der Sorte an und weist darauf hin, ob es
        sich um eine alte Sorte, eine Hybridsorte, eine offen bestäubte Sorte oder
        eine gentechnisch veränderte Sorte handelt.
    cultivator_type:
      name: Grubbertyp
      description: Klassifiziert die Bauart des Grubbers, z. B. Frontzinken oder Heckzinken.
    cup_warmer_features:
      name: Eigenschaften des Tassenwärmers
      description: Hebt besondere Design- oder Komfortmerkmale hervor, die speziell
        für Tassenwärmer entwickelt wurden.
    curtain_heading_style:
      name: Stil des Vorhangkopfs
      description: Gibt den Stil der oberen Kante bzw. des oberen Saums an, an dem
        der Vorhang oder die Gardine aufgehängt wird. Dadurch werden die benötigten
        Beschläge und das Gesamtbild bestimmt.
    curtain_lining_type:
      name: Vorhangfuttertyp
      description: Gibt an, ob der Vorhang gefüttert ist und welche Art von Futter
        verwendet wurde, da dies Auswirkungen auf Wärmedämmung, Sichtschutz und Fall
        hat.
    curtain_rod_type:
      name: Vorhangstangentyp
      description: Klassifiziert den strukturellen Stil der Stange und hilft Käufer:innen
        so, schnell die für ihre Installationsanforderungen geeigneten Stangen zu
        finden.
    cutting_disc_function:
      name: Funktion der Schneidescheibe
      description: Definiert die spezifische Lebensmittelverarbeitungsaktion, die
        die Scheibe durchführt.
    cutting_head_type:
      name: Schneidkopftyp
      description: Legt den vom Anbauteil verwendeten Typ des Schneidelements fest.
    cutting_mechanism_type:
      name: Typ des Schneidemechanismus
      description: Beschreibt die Art des in den Portionierer integrierten Schneidewerkzeugs.
    cylinder_connector_type:
      name: Typ des Zylinderanschlusses
      description: Gibt an, welche Verbindung oder Gewindeschnittstelle des Zylinders
        verwendet wird, und bestimmt die Kompatibilität mit bestimmten Sprudelbereitermodellen.
    decorating_bag_features:
      name: Spritzbeuteleigenschaften
      description: Hebt besondere Design- oder Funktionsmerkmale des Spritzbeutels
        hervor.
    dehumidifier_refill_form:
      name: Form von Nachfüllpackungen für Luftentfeuchter
      description: Definiert das physische Format der Nachfüllpackung, damit Kund:innen
        kompatible Ausführungen auswählen können.
    desiccant_material:
      name: Trockenmittelmaterial
      description: Gibt die verwendete feuchtigkeitsabsorbierende Substanz an. Dies
        ist wichtig für Leistung, Wiederverwendbarkeit und Sicherheit.
    dial_finish:
      name: Oberflächenbehandlung des Zifferblatts
      description: Beschreibt die Oberflächenbehandlung des Zifferblatts, die Spiegelung
        und Stil beeinflusst.
    dinnerware_features:
      name: Geschirreigenschaften
      description: Hebt besondere funktionale Eigenschaften des Geschirrs hervor.
    dish_detergent_features:
      name: Eigenschaften des Geschirrspülmittels
      description: Listet wichtige Formulierungen oder ökologische Eigenschaften auf,
        anhand derer Käufer:innen Produkte filtern und vergleichen können.
    dishwasher_accessory_type:
      name: Typ des Geschirrspülerzubehörs
      description: Klassifiziert die spezifische Zubehörart und ermöglicht Käufer:innen
        so ein schnelles Filtern.
    dishwasher_wash_programs:
      name: Geschirrspülerprogramme
      description: Listet die voreingestellten Waschprogramme des Geschirrspülers
        auf und ermöglicht es den Kund:innen, nach Programmen zu filtern.
    dispensing_mechanism:
      name: Dosiermechanismus
      description: Beschreibt, wie das Getränk aus dem Isolierbehälter ausgegeben
        wird und wie sich dies auf die Brauchbarkeit in verschiedenen Umgebungen auswirkt.
    dispensing_temperature_options:
      name: Optionen für die Ausgabetemperatur
      description: Zeigt die Optionen für die Temperaturen an, die der Wasserspender
        ausgeben kann.
    displayed_character:
      name: Angezeigtes Zeichen
      description: Identifiziert das alphanumerische Zeichen, das durch das einzelne
        Stück repräsentiert wird.
    diving_board_surface_texture:
      name: Oberflächenstruktur des Sprungbretts
      description: Beschreibt die Oberflächenstruktur des Bretts, die sich auf Griffigkeit
        und Rutschfestigkeit auswirkt.
    door_configuration:
      name: Türkonfiguration
      description: Gibt an, wie viele Zugangstüren die Falle hat
    door_hinge_orientation:
      name: Ausrichtung des Türscharniers
      description: Gibt die Scharnierposition bzw. Öffnungsrichtung der Tür oder des
        Deckels des Gefriergeräts an.
    door_hinge_position:
      name: Türscharnierposition
      description: Gibt die Seite der Tür an, an der sich das Scharnier befindet,
        oder ob es beidseitig verwendbar ist, was sich auf die Installation und die
        Raumplanung auswirkt.
    draft_gas_type:
      name: Gasart
      description: Gibt die Art des für die Abfüllung verwendeten Gassystems an. Dies
        ist wichtig für die Karbonisierung und die Art des Getränks.
    drainage_design:
      name: Ablaufdesign
      description: Gibt an, wie die Seifenschale das abfließende Wasser ableitet,
        damit die Seife trocken bleibt.
    drainage_method:
      name: Entwässerungsmethode
      description: Beschreibt, wie das gesammelte Wasser abgeführt wird, und gibt
        an, ob eine manuelle Entleerung erforderlich ist.
    drawer_organizer_features:
      name: Eigenschaften des Schubladen-Organizers
      description: Hebt die wichtigsten funktionalen Merkmale eines Schubladen-Organizer-Einsatzes
        hervor.
    drinkware_crystal_composition:
      name: Kristallzusammensetzung des Trinkgefäßes
      description: Identifiziert die spezifische Glas-/Kristallzusammensetzung und
        hebt den Bleigehalt sowie die Klarheitseigenschaften hervor.
    drinkware_holder_style:
      name: Getränkehalterstil
      description: Klassifiziert das allgemeine Design oder die Konfiguration eines
        Getränkehalters.
    drinkware_insulation:
      name: Isolierung des Trinkgefäßes
      description: Identifiziert die Isolierkonstruktion des Trinkgefäßes, die sich
        auf die Temperaturerhaltung auswirkt.
    dripper_design:
      name: Kaffeetrichterdesign
      description: Legt die allgemeine Form bzw. den Ablauftyp des Kaffeetrichters
        fest, der sich auf die Brüheigenschaften auswirkt.
    drum_grating_styles_included:
      name: Inbegriffene Reibetrommelstile
      description: Zählt die unterschiedlichen Reibe- oder Schneidtrommelstile auf,
        die im Set enthalten sind, damit Benutzer:innen schnell die angebotenen Funktionen
        erkennen können.
    dryer_drum_material:
      name: Trocknertrommelmaterial
      description: Kennzeichnet das Material der Trommelinnenkonstruktion, welches
        die Haltbarkeit, die statische Aufladung und die Geräuschentwicklung beeinflusst.
    dryer_sheet_features:
      name: Trocknertucheigenschaften
      description: Hebt spezielle Eigenschaften oder Vorteile von Trocknertüchern
        hervor.
    dryer_venting_type:
      name: Trocknerentlüftungstyp
      description: Klassifiziert die Entlüftungsmethode eines Wäschetrockners, die
        sich auf die Installationsanforderungen und die Energieeffizienz auswirkt.
    drying_system:
      name: Trocknungssystem
      description: Gibt die Technologie an, die der Geschirrspüler zum Trocknen des
        Geschirrs am Ende des Spülgangs verwendet.
    duster_head_material:
      name: Material des Staubwedelkopfes
      description: Gibt das Material des Staubwedelkopfes im Hinblick auf Leistung
        und Allergien an.
    dustpan_type:
      name: Kehrschaufeltyp
      description: Klassifiziert den allgemeinen Stil oder Formfaktor der Kehrschaufel.
    edge_finish:
      name: Kantenverarbeitung
      description: Beschreibt die Verarbeitungstechnik an den Kanten des Läufers,
        die sich auf die Ästhetik und die Strapazierfähigkeit auswirkt.
    egg_cooker_functions:
      name: Eierkocherfunktionen
      description: Listet die vom Eierkocher unterstützten Modi auf.
    egg_cup_design:
      name: Eierbecherdesign
      description: Gibt den strukturellen Stil des Eierbechers an, z. B. mit Füßen
        oder Sockel.
    electric_kettle_features:
      name: Wasserkocherfunktionen
      description: Listet bemerkenswerte Komfort- oder Sicherheitsmerkmale des Wasserkochers
        auf.
    emergency_blanket_features:
      name: Eigenschaften der Notfalldecke
      description: Hebt spezielle funktionale Eigenschaften der Decke hervor.
    emergency_lighting_operating_mode:
      name: Betriebsmodus der Notbeleuchtung
      description: Legt fest, wie sich die Notbeleuchtungsvorrichtung im Normalbetrieb
        und bei Stromausfällen verhält.
    entrance_slot_design:
      name: Design der Zugangsöffnung
      description: Beschreibt den Stil der Öffnungen, durch die die Schmetterlinge
        in das Haus gelangen können.
    espresso_boiler_type:
      name: Espressokesseltyp
      description: Beschreibt die Konfiguration des Heizsystems zur Herstellung von
        Kaffee und Dampf.
    fabric_care_product_form:
      name: Form des Textilpflegeprodukts
      description: Gibt die physikalische Form eines Textilpflegeprodukts an, wie
        z. B. eines Weichspülers oder eines Trocknerzusatzes.
    fabric_softener_features:
      name: Weichspülereigenschaften
      description: Hebt spezielle Eigenschaften oder Vorteile von Weichspülern hervor.
    fabric_stiffness_level:
      name: Steifigkeitsgrad des Gewebes
      description: Gibt den Grad der Steifig- oder Festigkeit an, den das Gewebe durch
        die Stärke nach dem Bügeln erhält.
    fabric_weave:
      name: Stoffgewebe
      description: Gibt die spezifische Webart des Stoffes an, die sich auf Haptik
        und Aussehen auswirkt.
    feeder_design:
      name: Zuführungsdesign
      description: Legt den strukturellen Stil der Zuführung fest.
    fermentation_crock_type:
      name: Gärtopftyp
      description: Identifiziert die grundlegende Konstruktion des Topfes.
    filament_style:
      name: Filamentstil
      description: Definiert die interne Filamentkonfiguration, die die Ästhetik und
        die Lichtverteilung beeinflusst.
    film_reusability:
      name: Wiederverwendbarkeit des Films
      description: Gibt an, ob die Folie für den einmaligen Gebrauch bestimmt ist
        oder entfernt, gelagert und wiederverwendet werden kann.
    filter_bleaching_method:
      name: Filterbleichverfahren
      description: Gibt den Bleichstatus und das für den Filter verwendete Verfahren
        an und gibt so Aufschluss über Geschmack und Nachhaltigkeit.
    filter_technology:
      name: Filtertechnologie
      description: Gibt die eingesetzte Geruchsbekämpfungs- oder Filtrationstechnologie
        an.
    fire_alarm_panel_type:
      name: Bedienfeldtyp des Brandmelders
      description: Identifiziert die Systemarchitektur des Bedienfelds.
    fire_protection_class:
      name: Brandschutzklasse
      description: Gibt die Zertifizierungsklasse an, die die maximal zulässige Innentemperatur
        bei Brandprüfungen definiert (z. B. UL-Klasse 350).
    fire_starter_type:
      name: Zündertyp
      description: Gibt die primäre Form oder den Mechanismus des Zünderprodukts an
        und hilft Käufer:innen, genau die benötigte Zündart zu finden.
    fireplace_fuel_form:
      name: Form des Kaminbrennstoffs
      description: Gibt die physikalische Form oder Darreichungsform des Brennstoffs
        an, sodass Käufer:innen zwischen Scheiten, Pellets, Briketts, Geldosen und
        anderen für ihre Geräte geeigneten Optionen wählen können.
    fireplace_tool_items_included:
      name: Inbegriffene Kaminwerkzeugartikel
      description: Listet die spezifischen Kaminwerkzeuge oder Zubehörteile auf, die
        mit dem Produkt geliefert werden, damit Käufer:innen genau wissen, was sie
        bekommen, und Bundles leicht vergleichen können.
    firewood_seasoning:
      name: Brennholztrocknung
      description: Gibt den Trocknungsgrad des Brennholzes an, der den Feuchtigkeitsgehalt,
        die Entzündbarkeit und die Heizleistung beeinflusst.
    flag_attachment_style:
      name: Flaggenbefestigungsstil
      description: Beschreibt, wie die Fahne oder der Windsack an einem Mast oder
        Befestigungspunkt angebracht wird.
    flame_adjustment:
      name: Flammenregulierung
      description: Gibt an, ob und wie die Flammenintensität reguliert werden kann.
    flask_insulation_type:
      name: Isolierungstyp des Flachmanns
      description: Gibt die Wärmedämmkonstruktion des Flachmanns an, die die Temperatur
        beeinflusst.
    flatware_finish:
      name: Oberflächenbehandlung des Bestecks
      description: Beschreibt die Oberflächenbehandlung bzw. den Glanz des Besteckteil,
        was die Ästhetik und die Sichtbarkeit von Kratzern beeinflusst.
    floor_protection_transparency_level:
      name: Transparenzgrad des Bodenschutzes
      description: Gibt an, wie durchsichtig die Folie oder der Läufer ist, von transparent
        bis undurchsichtig.
    floor_scrubber_brush_type:
      name: Typ der Bodenschrubberbürste
      description: Definiert die primäre Bürsten- oder Padkonfiguration, die vom Schrubber
        verwendet wird.
    floor_surface_compatibility:
      name: Bodenbelagskompatibilität
      description: Gibt an, für welche Bodenbeläge der Schutz geeignet ist und welche
        er schützen soll.
    flow_control_type:
      name: Durchflussregelungstyp
      description: Beschreibt, ob die Spitze einen einstellbaren Mechanismus zur Regelung
        der Wasserausgabe enthält.
    flue_outlet_position:
      name: Position des Abzugrohrs
      description: Gibt an, wo das Abzugrohr aus dem Ofenkörper austritt, und beeinflusst
        so das Installationslayout und den Schornsteinanschluss (je nach Kontext).
    flue_pipe_connection_type:
      name: Typ der Abzugrohrverbindung
      description: Beschreibt den Verbindungsmechanismus, mit dem die Erweiterung
        mit anderen Komponenten des Abgasmanagementsystems verbunden wird.
    fluorescent_tube_output_type:
      name: Ausgabetyp der Leuchtstoffröhre
      description: Gibt den untergeordneten Ausgabetyp der Leuchtstoffröhre an, der
        für die Kompatibilität mit Vorschaltgeräten und die Helligkeit wichtig ist.
    fly_swatter_type:
      name: Fliegenklatschentyp
      description: Gibt die Funktionsweise bzw. den Mechanismus der Fliegenklatsche
        an.
    foil_duty_rating:
      name: Einstufung der Folienfestigkeit
      description: Klassifiziert die Festigkeit oder Qualität der Folie für den vorgesehenen
        Verwendungszweck.
    foliage_color:
      name: Laubfarbe
      description: Gibt die vorherrschende Farbe der Pflanzenblätter an und hilft
        so bei der Zierpflanzenauswahl, zusätzlich zur Blütenfarbe.
    fondue_pot_type:
      name: Fonduetopftyp
      description: Klassifiziert die Heizart oder den Verwendungszweck des Fondue-Sets.
    fondue_set_pieces_included:
      name: Inbegriffene Teile des Fondue-Sets
      description: Gibt die Bestandteile eines Fondue-Sets an, z. B. einen Fonduetopf
        oder Fonduegabeln.
    food_carrier_insulation_type:
      name: Isolierart des Lebensmittelbehälters
      description: Gibt an, ob das Produkt isoliert ist und welche Isoliertechnologie
        verwendet wurde.
    food_dehydrator_surface_type:
      name: Oberflächentyp des Dörrautomaten
      description: Beschreibt die Oberflächenbeschaffenheit von Blechen/Tabletts,
        die den Luftstrom und das Ablösen von Lebensmitteln beeinflusst.
    food_dehydrator_tray_type:
      name: Typ für Dörrautomatentabletts
      description: Kennzeichnet den spezifischen Stil oder das funktionale Design
        des Tabletts.
    food_grater_type:
      name: Typ der Küchenreibe
      description: Identifiziert den strukturellen Stil und die beabsichtigte Verwendung
        der Reibe.
    food_processor_attachments_included:
      name: Inbegriffenes Küchenmaschinenzubehör
      description: Listet die im Set enthaltenen spezifischen Zubehörtypen auf, damit
        Kund:innen genau wissen, welche Funktionen sie erhalten.
    food_storage_bag_features:
      name: Eigenschaften von Lebensmittelaufbewahrungsbeuteln
      description: Hebt spezielle funktionale Eigenschaften des Beutels hervor.
    food_storage_bag_type:
      name: Typ für Frischhaltebeutel
      description: Gibt den primären Stil oder den vorgesehenen Verwendungszweck des
        Frischhaltebeutels an.
    food_storage_features:
      name: Eigenschaften der Lebensmittelaufbewahrung
      description: Hebt besondere Eigenschaften hervor, die die Funktionalität oder
        den Komfort des Lebensmittelaufbewahrungs-Produkts erhöhen.
    food_wrap_features:
      name: Eigenschaften der Lebensmittelverpackungsmaterialien
      description: Hebt besondere Eigenschaften hervor, die die Nutzung und Nachhaltigkeit
        beeinflussen.
    footwear_type_compatibility:
      name: Kompatibilität des Schuhtyps
      description: Gibt an, für welche Art von Schuhen der Dehner bestimmt ist.
    formulation_concentration:
      name: Formulierungskonzentration
      description: Gibt an, ob es sich bei dem Produkt um ein Konzentrat oder eine
        gebrauchsfertige Zubereitung handelt.
    fountain_design:
      name: Brunnendesign
      description: Klassifiziert den strukturellen Stil oder den Formfaktor des Brunnens.
    fragrance_oil_application:
      name: Duftölanwendung
      description: Gibt den empfohlenen oder üblichen Anwendungsfall für das Öl an
        und hilft Heimwerker:innen und Hobbykund:innen bei der Auswahl der richtigen
        Zusammensetzung.
    fragrance_oil_composition:
      name: Zusammensetzung des Duftöls
      description: Gibt an, ob es sich bei der Formulierung um ein rein natürliches
        ätherisches Öl, ein synthetisches Duftöl oder eine Mischung aus beidem handelt.
    fragrance_refill_type:
      name: Typ der Duftnachfüllung
      description: Definiert das Format der Duftnachfüllungen, die der Diffusor akzeptiert.
    freezer_configuration:
      name: Gefrierschrankkonfiguration
      description: Gibt die physische Ausrichtung/den Designstil des Gefriergeräts
        an.
    freezing_method:
      name: Gefriermethode
      description: Gibt die Technologie an, die zum Einfrieren der Mischung in einer
        Speiseeismaschine verwendet wird, und hilft Käufer:innen, zwischen Kompressormodellen,
        Vorkühlbehältern, handbetriebenen Salz-Eismaschinen und anderen Bauarten zu
        unterscheiden.
    fuel_compatibility:
      name: Kraftstoffkompatibilität
      description: Gibt an, für welche Brennstoffarten der Rost ausgelegt ist und
        er sicher verwendet werden kann.
    funnel_type:
      name: Trichtertyp
      description: Klassifiziert den Trichter anhand seiner Konstruktion oder seines
        Verwendungszwecks.
    furnace_configuration:
      name: Ofenkonfiguration
      description: Legt die physische Luftstromausrichtung des Ofengehäuses für die
        Installation fest.
    furniture_anchor_type:
      name: Möbelverankerungstyp
      description: Legt den strukturellen Stil eines Möbelverankerungssets fest und
        gibt dessen Wirkungsweise an.
    garage_floor_mat_style:
      name: Stil der Garagenbodenmatte
      description: Kennzeichnet das Produktformat oder den Stil der Garagenbodenmatte.
    garbage_disposal_feed_type:
      name: Zuführungstyp des Abfallzerkleinerers
      description: Identifiziert, wie Lebensmittelabfälle in den Zerkleinerer gelangen –
        entweder kontinuierlich während des Betriebs oder in einzelnen Mengen.
    garbage_disposal_stopper_style:
      name: Stoppvorrichtung für Abfallzerkleinerer
      description: Kennzeichnet die funktionale Ausführung der Stoppvorrichtung.
    garden_hose_design:
      name: Gartenschlauchdesign
      description: Identifiziert den strukturellen Stil des Schlauchs, der den Verwendungszweck
        und die Handhabung bestimmt.
    garden_hose_fitting_type:
      name: Typ des Gartenschlauchanschlusses
      description: Kennzeichnet den Typ oder die Funktion eines Gartenschlauchanschlusses,
        z. B. Adapter oder Y-Stück, um die Suche und das Filtern zu erleichtern.
    gardening_fork_type:
      name: Mistgabeltyp
      description: Klassifiziert den spezifischen Til oder die beabsichtigte Verwendung
        der Gabel.
    garland_style:
      name: Girlandenstil
      description: Klassifiziert die Konstruktion oder den Dekorationsstil der Girlande.
    gas_type:
      name: Gasart
      description: Gibt die Art des im Ladezylinder enthaltenen Druckgases an.
    gasket_profile_type:
      name: Dichtungsprofiltyp
      description: Gibt das branchenübliche Profil oder den Querschnitt der Dichtung
        an.
    gazebo_roof_material:
      name: Dachmaterial für die Gartenlaube
      description: Gibt das Dachplattenmaterial der Gartenlaube oder die Festdachabdeckung
        an.
    glass_and_surface_cleaner_features:
      name: Eigenschaften des Glas- und Oberflächenreinigers
      description: Hebt besondere Eigenschaften oder Vorteile des Glas- und Oberflächenreinigers
        hervor.
    glass_cleaner_features:
      name: Glasreinigereigenschaften
      description: Hebt besondere Leistungsmerkmale oder Formulierungseigenschaften
        hervor, die speziell für Glasreiniger gelten.
    glazing_material:
      name: Verglasungsmaterial
      description: Gibt an, welches Material den Fotobereich bedeckt (z. B. Glas,
        Acrylglas oder keines).
    globe_map_content:
      name: Globuskarteninhalt
      description: Beschreibt den primären kartografischen Inhalt, der auf dem Globus
        dargestellt wird.
    glue_trap_design:
      name: Klebefallendesign
      description: Kennzeichnet den physischen Stil oder das Format der Falle und
        trägt so zur Kompatibilität mit Aufstellungsorten und Schädlingsarten bei.
    grab_bar_shape:
      name: Haltegriffform
      description: Definiert die Konstruktion des Haltegriffs und beeinflusst damit
        die Montageposition und die Art der Nutzerunterstützung.
    grass_discharge_type:
      name: Grasauswurftyp
      description: Legt fest, wie der Rasenmäher das Schnittgut auswirft (z. B. Seitenauswurf,
        Fangkorb hinten).
    grate_design:
      name: Rostdesign
      description: Identifiziert den strukturellen Stil und die beabsichtigte Verwendung
        des Rostes.
    grater_design:
      name: Reibendesign
      description: Klassifiziert die physikalische Konstruktion oder den Mechanismus
        einer Reibe.
    grating_surface_coarseness:
      name: Rauheit der Reibefläche
      description: Gibt die Größe oder Struktur der Schnittlöcher oder Rillen auf
        der Reibefläche an.
    grill_grate_material:
      name: Grillrostmaterial
      description: Gibt das Material oder die Beschichtung des Hauptgrillrosts an.
    grill_thermometer_type:
      name: Grillthermometer-Typ
      description: Kennzeichnet das primäre Design oder die Technologie des Grillthermometers
        und hilft Käufer:innen, schnell das passende Modell für ihre Grillausrüstung
        zu finden.
    grinding_mechanism_material:
      name: Material für Mahlmechanismus
      description: Gibt das Material des internen Mahlwerks bzw. der Mahlscheiben
        an, die die Gewürze tatsächlich zerkleinern.
    grinding_mechanism_type:
      name: Typ für Mahlmechanismus
      description: Gibt den internen Mechanismus an, der für das Mahlen verantwortlich
        ist.
    growing_media_buffering:
      name: Pufferung des Wachstumsmediums
      description: Gibt an, ob die Kokosfasern gepuffert wurden, um überschüssige
        Salze zu entfernen, was sich auf das Nährstoffmanagement auswirkt.
    growing_media_form:
      name: Form des Wachstumsmediums
      description: Beschreibt die physikalische Beschaffenheit der Kokosfasern und
        informiert Verbraucher:innen über die Handhabung und den Wasserbedarf.
    growing_medium_type:
      name: Typ des Wachstumsmediums
      description: Identifiziert das Substratangebot für die Keimung und das Wachstum
        der Samen.
    growth_habit:
      name: Wuchsform
      description: Beschreibt die allgemeine Form der Pflanze und hilft Kund:innen
        bei der Entscheidung über Abstände und Behälter.
    hand_dryer_accessory_type:
      name: Zubehörtyp für Händetrockner
      description: Identifiziert die spezifische Art des Händetrocknerzubehörs, damit
        Käufer:innen schnell erkennen kann, um was für ein Produkt es sich handelt.
    handle_connection_type:
      name: Befestigungsart des Stiels
      description: Gibt den Mechanismus an, mit dem der Stiel am Besen, Mopp oder
        an anderen Reinigungsaufsätzen befestigt wird, um die Kompatibilität zu gewährleisten.
    handle_grip_style:
      name: Griffform
      description: Definiert die Form oder Ergonomie des Gabelgriffs.
    handle_length_adjustability:
      name: Verstellbarkeit der Grifflänge
      description: Beschreibt, ob und wie die Grifflänge angepasst werden kann, sodass
        Käufer:innen zwischen festen und ausziehbaren Griffen filtern können.
    handle_position:
      name: Griffposition
      description: Beschreibt die Anordnung oder den Stil des Griffs an der Gießkanne,
        der sich auf die ergonomische Handhabung beim Gießen und die Aufbewahrung
        auswirkt.
    handrail_configuration:
      name: Handlaufkonfiguration
      description: Gibt an, ob das Produkt Handläufe beinhaltet und wie diese angeordnet
        sind.
    hanging_attachment_type:
      name: Hängebefestigungstyp
      description: Gibt die benötigte Vorrichtung oder Methode zum Aufhängen des Glasfensterbildes
        an.
    hardiness_zone:
      name: Winterhärtezone
      description: Gibt die USDA-Klimazone (oder eine vergleichbare Klimazone) an,
        in der die Pflanze im Freien überleben kann.
    hazards_detected:
      name: Erkannte Gefahren
      description: Listet die spezifischen Gefahren auf, die dieses Gerät erkennen
        soll.
    heating_stages:
      name: Heizstufen
      description: Gibt die Anzahl der Heizstufen oder Modulationsstufen an, die das
        Gerät unterstützt.
    home_alarm_features:
      name: Funktionen der Heimalarmanlage
      description: Kennzeichnet spezielle Funktionen einer Heimalarmanlage, wie z. B.
        Batteriesicherung oder professionelle Überwachung.
    hook_style:
      name: Hakenstil
      description: Klassifiziert die Konstruktion/Funktionen des Hakens zur einfacheren
        visuellen und funktionalen Zuordnung.
    humidifier_features:
      name: Merkmale des Luftbefeuchters
      description: Hebt die wichtigen Zusatzfunktionen oder -optionen hervor, die
        verschiedene Luftbefeuchtermodelle unterscheiden und die Filterung erleichtern.
    humidifier_filter_type:
      name: Typ des Luftbefeuchterfilters
      description: Identifiziert den Stil oder die Konstruktion des Filters, damit
        Kund:innen den passenden Ersatzfilter für ihren Luftbefeuchter finden können.
    humidor_accessory_type:
      name: Typ des Humidorzubehörs
      description: Klassifiziert die jeweilige Zubehörart und ermöglicht Käufer:innen
        so ein schnelles Filtern innerhalb der übergeordneten Kategorie.
    hydroponic_nutrient_system:
      name: Hydroponisches Nährstoffsystem
      description: Gibt die Anzahl der Komponenten im hydroponischen Nährstoffsystem
        an (z. B. einteilig, zweiteilig), die vor Gebrauch kombiniert werden müssen.
    hygrometer_type:
      name: Hygrometertyp
      description: Gibt an, um welche Art von Hygrometer es sich handelt, das gegebenenfalls
        im Humidor enthalten ist.
    ice_bucket_accessories_included:
      name: Inbegriffenes Eisbehälterzubehör
      description: Listet das zusätzliche Barzubehör auf, das mit dem Eisbehälter
        geliefert wird.
    ice_bucket_insulation:
      name: Eisbehälterisolierung
      description: Gibt die Wandkonstruktion bzw. die Isolierleistung des Eisbehälters
        an, die Einfluss darauf hat, wie lange das Eis gefroren bleibt.
    ice_cream_maker_accessories_included:
      name: Inbegriffenes Speiseeismaschinenzubehör
      description: Identifiziert die zusätzlichen Artikel in einem mehrteiligen Zubehörset,
        damit Kund:innen genau wissen, was sie erhalten.
    ice_shape:
      name: Eisform
      description: Beschreibt die Eisform, die die Maschine produziert, und hilft
        den Benutzer:innen so bei der Auswahl von Maschinen, die ihre bevorzugte Eisform
        erzeugen.
    incense_holder_style:
      name: Stil des Räucherstäbchenhalters
      description: Identifiziert die strukturelle Konstruktion des Halters und hilft
        Käufer:innen, zwischen verschiedenen funktionalen und gestalterischen Ausführungen
        zu wählen.
    infuser_type:
      name: Typ des Einsatzes
      description: Gibt an, ob ein Einsatz für Obst oder Tee enthalten ist und um
        welche Ausführung es sich handelt.
    inner_pot_coating:
      name: Innentopfbeschichtung
      description: Kennzeichnet die Art der Oberflächenbeschichtung des Innentopfs
        und gibt damit Aufschluss über die Antihaft-Eigenschaften und die Pflegeleichtigkeit.
    insulation_capability:
      name: Isolierleistung
      description: Gibt an, ob und wie die Hülle Getränke isoliert, und unterscheidet
        rein dekorative Hüllen von temperaturregulierenden Hüllen.
    insulation_status:
      name: Isolierstatus
      description: Gibt an, ob die Feldflasche isoliert ist, um die Getränketemperatur
        zu halten.
    insulation_technology:
      name: Isoliertechnologie
      description: Beschreibt die zur Temperaturerhaltung verwendete Isolierkonstruktion.
    insulation_type:
      name: Isolierungstyp
      description: Gibt an, ob und wie die Getränkewanne oder der Kühler isoliert
        ist, was sich auf die Kühlleistung und die Kondensationskontrolle auswirkt.
    intended_beverage_type:
      name: Vorgesehener Getränketyp
      description: Gibt das primäre Getränk an, für das die Karaffe konzipiert wurde
        oder mit dem sie am häufigsten verwendet wird.
    internal_membrane_type:
      name: Typ der internen Membran
      description: Beschreibt die interne Trennkonstruktion, die Wasser und Luft im
        Inneren des Behälters voneinander trennt.
    iron_cleaner_purpose:
      name: Zweck des Eisenreinigers
      description: Gibt die vorgesehene Hauptanwendung des Reinigers an.
    ironing_board_form_factor:
      name: Formfaktor des Bügelbretts
      description: Klassifiziert die allgemeine Ausführung bzw. die Installation des
        Bretts, um Käufer:innen die Auswahl des richtigen Typs zu erleichtern.
    ironing_board_pad_shape:
      name: Form des Bügelbrettpolsters
      description: Zeigt die Form bzw. das Profil des Polsters an, um sicherzustellen,
        dass es zu verschiedenen Bügelbrettdesigns passt.
    jar_shape:
      name: Krugform
      description: Beschreibt die allgemeine geometrische oder traditionelle Form
        des dekorativen Gefäßes.
    juicer_type:
      name: Entsaftertyp
      description: Klassifiziert den Mechanismus, den der Entsafter zur Saftgewinnung
        verwendet.
    key_blade_type:
      name: Schlüsselblatttyp
      description: Klassifiziert die physische Form des Schlüsselblatts, z. B. flach/gezahnt,
        röhrenförmig oder mit Vertiefung.
    kitchen_layout:
      name: Küchenlayout
      description: Definiert die Gesamtkonfiguration der Einbauküche (z. B. einzeilig
        oder L-förmig), um Käufer:innen zu helfen, Sets zu finden, die zu ihren Raumformen
        und Arbeitsabläufen passen.
    kitchen_linen_items_included:
      name: Inbegriffene Küchentextilien
      description: Listet die einzelnen Küchentextilienkomponenten des Sets auf und
        informiert Käufer:innen genau über die Artikel, die sie kaufen.
    label_content_type:
      name: Etiketteninhaltstyp
      description: Beschreibt, ob das Etikett leer, mit einer Vorlage vorbedruckt
        oder anderweitig formatiert ist.
    lamp_arm_style:
      name: Lampenarmstil
      description: Beschreibt die Konstruktion des Lampenarms/-halses, die die Einstellbarkeit
        und Positionierung beeinflusst (z. B. Schwanenhals vs. Schwenkarm).
    lamp_post_base_mounting_type:
      name: Montagetyp des Laternensockels
      description: Gibt an, wie der Socke am Boden oder an der Oberfläche installiert
        bzw. befestigt wird.
    lamp_shade_fitter_type:
      name: Typ der Lampenschirmhalterung
      description: Definiert den Befestigungsmechanismus zwischen Lampenschirm und
        Lampe und gewährleistet so die Kompatibilität.
    lamp_shade_shape:
      name: Lampenschirmform
      description: Legt die geometrische Form des Schirms fest, sodass Kund:innen
        die gewünschten Silhouetten schnell finden können.
    lamp_shade_translucency:
      name: Lichtdurchlässigkeit des Lampenschirms
      description: Beschreibt, wie viel Licht durch den Schirm hindurchdringt, und
        hilft Benutzer:innen so, die gewünschte Beleuchtung auszuwählen.
    lampshade_shape:
      name: Lampenschirmform
      description: Beschreibt die geometrische Form des Lampenschirms.
    laundry_ball_texture:
      name: Wäscheballstruktur
      description: Beschreibt die Oberflächenbeschaffenheit des Balls, welche die
        Stoffbewegung und die Fusselentfernung beeinflusst.
    laundry_wash_accessory_type:
      name: Typ des Wäschezubehörs
      description: Kennzeichnet den spezifischen Typ des Wäschebeutels oder -korbs.
    lawn_aerator_type:
      name: Rasenlüftertyp
      description: Klassifiziert Rasenlüfter nach ihrer grundlegenden Funktionsweise
        oder Bauform.
    lawn_mower_belt_type:
      name: Typ für Rasenmäher-Keilriemen
      description: Klassifiziert die strukturelle Gestaltung oder das Profil des Riemens.
    lawn_mower_blade_type:
      name: Typ des Rasenmähermessers
      description: Gibt die Schneid- oder Hubkonstruktion des Rasenmähermessers und
        den vorgesehenen Verwendungszweck an.
    lawn_spreader_type:
      name: Rasenstreuertyp
      description: Gibt die mechanische Bauweise oder Konfiguration eines Rasen- bzw.
        Gartenstreuers an, z. B. Streuwagen oder Rotationsstreuer.
    lawn_tractor_tread_type:
      name: Typ des Rasentraktorreifens
      description: Beschreibt das Reifenprofil, das für bestimmte Oberflächen oder
        Traktionsanforderungen vorgesehen ist.
    lid_features:
      name: Deckeleigenschaften
      description: Hebt alle besonderen funktionalen Elemente des Deckels hervor,
        die das Kochen oder Reinigen erleichtern.
    lid_vent_type:
      name: Deckelbelüftungstyp
      description: Gibt an, ob und wie der Deckel Dampf entweichen lässt.
    lift_mechanism:
      name: Hebemechanismus
      description: Bezeichnet den Mechanismus, mit dem die Jalousie oder der Rollo
        angehoben, abgesenkt oder geneigt wird.
    light_exposure_requirement:
      name: Bedarf an Lichtexposition
      description: Gibt die Lichtintensität an, die die Ökosphäre benötigt, um gesund
        zu bleiben, ohne dass die Organismen überhitzt oder gestresst werden.
    liner_installation_method:
      name: Installationsmethode des Liners
      description: Beschreibt, wie der Liner auf der Oberfläche an Ort und Stelle
        bleibt.
    lint_roller_type:
      name: Fusselwalzentyp
      description: Klassifiziert den Reinigungsmechanismus bzw. das Design der Fusselrolle.
    live_trap_design:
      name: Lebendfallendesign
      description: Klassifiziert den allgemeinen strukturellen Stil der Falle
    lock_keying_option:
      name: Schließschlüsseloption
      description: Gibt an, wie das Schloss verschlossen ist, und unterstützt Käufer:innen,
        die mehrere Schlösser benötigen, die mit einem Schlüssel oder mit individuellen
        Schlüsseln je Schloss betätigt werden.
    lubricant_requirement:
      name: Anforderung an das Schmiermittel
      description: Gibt die Art des Schmiermittels an, das beim Schärfen empfohlen
        oder benötigt wird.
    lunch_set_items_included:
      name: Im Lunchbox-Set enthaltene Artikel
      description: Listet die einzelnen Komponenten auf, die im Lunchbox-Set enthalten
        sind.
    machete_blade_style:
      name: Stil der Machetenklinge
      description: Gibt den traditionellen regionalen oder funktionalen Stil der Machetenklinge
        an.
    map_style:
      name: Kartenstil
      description: Definiert den kartografischen Stil oder den thematischen Schwerpunkt,
        der auf dem Globus dargestellt wird.
    masher_head_design:
      name: Stampferkopfdesign
      description: Klassifiziert die Gestaltung der Stampferoberfläche, die sich auf
        die Textur und den erforderlichen Kraftaufwand auswirkt.
    mattress_protector_features:
      name: Matratzenschonereigenschaften
      description: Hebt die funktionalen oder schützenden Eigenschaften von Matratzenschonern
        hervor, sodass Käufer:innen nach Eigenschaften wie Wasserdichtigkeit oder
        hypoallergenen Materialien filtern können.
    measuring_spoon_features:
      name: Messlöffeleigenschaften
      description: Hebt besondere Designmerkmale oder funktionale Eigenschaften eines
        Messlöffels hervor.
    meat_tenderizer_face_type:
      name: Typ der Fleischklopferoberfläche
      description: Beschreibt die Oberflächenstruktur des Fleischklopfers.
    meat_tenderizer_mechanism:
      name: Mechanismus des Fleischklopfers
      description: Klassifiziert den Hauptmechanismus des Fleischklopfers.
    medical_specialty:
      name: Medizinisches Fachgebiet
      description: Gibt die medizinische Fachrichtung oder die medizinische Disziplin
        an, für die das Gerät konzipiert ist.
    merv_rating:
      name: MERV-Bewertung
      description: Definiert den Mindestwirkungsgrad (Minimum Efficiency Reporting
        Value, MERV) und gibt an, wie gut der Filter Partikel unterschiedlicher Größe
        zurückhalten kann.
    microwave_compatibility:
      name: Mikrowellenkompatibilität
      description: Gibt an, ob der Artikel sicher in einem Mikrowellenherd verwendet
        werden kann.
    microwave_oven_functions:
      name: Funktionen des Mikrowellenherds
      description: Es stehen voreingestellte oder erweiterte Kochmodi zur Verfügung,
        sodass Kund:innen Modelle mit Heißluft, Grill, Sensorsteuerung usw. finden
        können.
    milk_frother_type:
      name: Milchaufschäumertyp
      description: Klassifiziert das Produkt nach seinem Aufschäummechanismus oder
        seiner Form.
    milk_frothing_method:
      name: Milchaufschäummethode
      description: Gibt die Technologie oder den Mechanismus an, der zum Aufschäumen
        von Milch verwendet wird.
    milk_frothing_system:
      name: Milchaufschäumsystem
      description: Gibt die Art des Milchaufschäum- oder Dampfmechanismus an, der
        von der Maschine bereitgestellt wird.
    mirror_curvature:
      name: Spiegelkrümmung
      description: Gibt die Krümmung der reflektierenden Oberfläche an, die sich auf
        den Betrachtungswinkel und die Verzerrung auswirkt.
    mirror_type:
      name: Spiegeltyp
      description: Klassifiziert den allgemeinen Stil oder die Funktionskategorie
        des Spiegels.
    mist_output_mode:
      name: Nebelausgabemodus
      description: Zeigt die am Diffusor verfügbaren wählbaren Nebelmuster oder Intensitätseinstellungen
        an.
    mixing_bowl_features:
      name: Rührschüsseleigenschaften
      description: Hebt spezielle funktionale Eigenschaften der Schüssel hervor, die
        sich auf die Benutzerfreundlichkeit und die Pflege auswirken.
    mixing_mechanism:
      name: Mischmechanismus
      description: Beschreibt den internen Mechanismus, der zum Mischen der Dressingzutaten
        verwendet wird.
    mochi_maker_functions:
      name: Funktionen der Mochi-Maschine
      description: Listet die integrierten Modi auf oder programmiert die Geräteunterstützung.
    mode_of_action:
      name: Wirkungsweise
      description: Gibt an, wie das Fungizid wirkt, und differenziert zwischen Kontaktfungiziden
        und systemischen bzw. translaminaren Präparaten.
    moisture_absorber_form:
      name: Trocknungsmittelform
      description: Beschreibt die physische Form des Produkts und ermöglicht es Käufer:innen,
        Hängetaschen, Wannen, Pakete usw. auszuwählen.
    money_retrieval_method:
      name: Methode der Geldentnahme
      description: Beschreibt, wie das gesparte Geld aus dem Sparschwein entnommen
        wird.
    mop_head_type:
      name: Typ des Wischmoppkopfes
      description: Gibt die Konstruktion des Moppkopfes bzw. der Nachfüllpackung an
        und hilft Käufer:innen, die passende Ausführung für ihre Reinigungsbedürfnisse
        zu finden.
    mop_wringing_mechanism:
      name: Auswringmechanismus des Mopps
      description: Zeigt an, wie überschüssige Flüssigkeit aus dem Mopp entfernt wird,
        und hilft Käufer:innen so bei der Auswahl der bevorzugten Auswringmethode.
    mounting_bolt_pattern:
      name: Muster des Befestigungsbolzens
      description: Gibt die Anzahl und Anordnung der Befestigungsbolzenlöcher am Spindelgehäuse
        an (z. B. Dreieck mit 3 Bolzen, Quadrat mit 4 Bolzen).
    mouthpiece_shape:
      name: Mundstückform
      description: Legt die Form des Mundstückendes des Zigarettenhalters fest.
    mower_deck_material:
      name: Material des Mähdecks
      description: Gibt das Konstruktionsmaterial des Mähdecks an, das sich auf Haltbarkeit
        und Gewicht auswirkt.
    mulch_form:
      name: Mulchform
      description: Beschreibt die physikalische Form oder Konsistenz des Mulchs.
    nap_mat_items_included:
      name: Inbegriffene Schlafmattenartikel
      description: Führt die einzelnen Komponenten oder Zubehörteile auf, die im Lieferumfang
        der Schlafmatte enthalten sind.
    napkin_edge_finish:
      name: Verarbeitung des Serviettenrandes
      description: Gibt die Naht oder den dekorativen Abschluss entlang des Randes
        oder Saums der Serviette an.
    noodle_core_design:
      name: Nudelkernkonstruktion
      description: Beschreibt, ob die Nudel einen festen oder hohlen Kern hat.
    nozzle_adjustability:
      name: Düsenverstellbarkeit
      description: Gibt an, ob die Düse so eingestellt werden kann, dass das Sprühbild
        oder der Durchfluss verändert wird.
    nozzle_material:
      name: Düsenmaterial
      description: Legt das Material der Sprühdüsen im Hinblick auf Haltbarkeit und
        Verstopfungsresistenz fest.
    nozzle_style:
      name: Düsenstil
      description: Legt die funktionale Form oder den Stil des Düsenendes des Rohrs
        fest.
    nozzle_types_included:
      name: Inbegriffene Düsentypen
      description: Listet die Formen oder Ausführungen der mit der Fleischpistole
        gelieferten Düsen auf und informiert Käufer:innen über die Produktformen,
        die sie herstellen können.
    number_of_compartments:
      name: Anzahl der Fächer
      description: Zeigt an, wie viele separate Fächer der Abfallbehälter zur Sortierung
        von Abfällen oder Wertstoffen hat.
    numeral_style:
      name: Ziffernstil
      description: Definiert den visuellen Stil bzw. das Vorhandensein von Ziffern
        auf dem Zifferblatt.
    oil_dispenser_spout_design:
      name: Ausgießerdesign des Ölspenders
      description: Beschreibt den Stil des Ausgießers oder der Düse, der sich auf
        die Durchflussregelung und den Tropfschutz auswirkt.
    organizer_application:
      name: Organizer-Anwendung
      description: Gibt den primären Typ der Artikel an, für deren Aufbewahrung der
        Einsatz vorgesehen ist.
    ornament_hook_style:
      name: Stil des Ornamenthakens
      description: Kennzeichnet den Stil oder die Form des Ornamenthakens, der zum
        Aufhängen von Dekorationen verwendet wird.
    oscillation_mode:
      name: Oszillationsmodus
      description: Beschreibt, ob und wie der Ventilator oszilliert, um die Luft zu
        verteilen.
    oscillation_type:
      name: Oszillationstyp
      description: Gibt an, ob und wie der Ventilator oszilliert. Das ist wichtig
        für Käufer:innen, die eine großflächige Luftzirkulation benötigen.
    outdoor_grill_rack_type:
      name: Typ des Außengrillrosts
      description: Gibt die funktionale Ausführung des Rostmodells an und verdeutlicht
        dadurch den vorgesehenen Verwendungszweck beim Kochen.
    oxygen_indicator_type:
      name: Typ der Sauerstoffanzeige
      description: Gibt an, ob eine visuelle Anzeige vorhanden ist, die angibt, ob
        das Absorberpaket noch aktiv ist, und welche Form diese Anzeige hat.
    pad_cleaning_action:
      name: Padreinigungsfunktion
      description: Beschreibt die primäre Reinigungsfunktion bzw. das Endergebnis
        des Pads.
    pan_bottom_type:
      name: Pfannenbodentyp
      description: Gibt an, ob die Pfanne einen herausnehmbaren oder einen festen
        Boden hat.
    pan_perforation_type:
      name: Pfannenperforationstyp
      description: Gibt an, ob der Boden bzw. die Seiten der Pfanne massiv oder perforiert
        sind, um den Flüssigkeitsablauf zu ermöglichen.
    parasol_opening_mechanism:
      name: Öffnungsmechanismus des Sonnenschirms
      description: Beschreibt, wie der Schirm geöffnet bzw. geschlossen wird.
    parchment_paper_coating:
      name: Pergamentpapierbeschichtung
      description: Beschreibt das Oberflächenverfahren, das auf das Papier angewendet
        wurde, um Antihaft-Eigenschaften zu erzielen.
    particle_size_grade:
      name: Partikelgrößenklasse
      description: Beschreibt die Granulatgrößenklassifizierung des Vermiculits, die
        sich auf die Belüftungs- und Wasserrückhalteeigenschaften auswirkt.
    patio_heater_safety_features:
      name: Sicherheitsmerkmale von Terrassenstrahlern
      description: Hebt die integrierten Sicherheitsmechanismen, die Unfälle verhindern
        und einen sicheren Betrieb gewährleisten sollen.
    pattern_match_type:
      name: Typ der Musterausrichtung
      description: Legt fest, wie das Muster während der Verlegung zwischen den Streifen
        ausgerichtet werden soll.
    pendulum_compatibility:
      name: Pendelkompatibilität
      description: Gibt an, ob das Uhrwerk ein Pendel antreiben kann und ob ein Pendel
        enthalten ist.
    perch_design:
      name: Sitzstangendesign
      description: Beschreibt den strukturellen Stil oder die Form der Sitzstange.
    perch_surface_texture:
      name: Oberflächenstruktur der Sitzstange
      description: Definiert die Oberflächenbeschaffenheit der Sitzstange, die sich
        auf die Griffigkeit und den Nagelverschleiß auswirkt.
    pet_safety:
      name: Haustiersicherheit
      description: Gibt an, ob die Pflanze für gängige Haustiere giftig oder ungiftig
        ist.
    pet_toxicity:
      name: Toxizität für Haustiere
      description: Gibt an, ob die Pflanze für gängige Haustiere giftig ist, und gewährleistet
        so die Sicherheit für Kund:innen, die Haustiere besitzen.
    ph_adjustment_direction:
      name: Richtung der Anpassung des pH-Werts
      description: Gibt an, ob das Produkt so formuliert ist, dass es den pH-Wert
        der Lösung erhöht (pH-Wert nach oben) oder senkt (pH-Wert nach unten).
    pie_pan_edge_style:
      name: Stil der Kuchenformrandes
      description: Beschreibt die Gestaltung des Randes, die sich auf das Aussehen
        der Kruste und die Lösbarkeit auswirkt.
    pin_shape:
      name: Nadelform
      description: Beschreibt die allgemeine Form der Nadel, die den Stoff hält.
    pipe_connection_method:
      name: Rohranschlussmethode
      description: Gibt die Art der Anschlüsse an den Enden des Rohrbogens an (z. B.
        Außengewinde, Innengewinde, Steckverbindung, Gewinde), um die Kompatibilität
        bei der Installation sicherzustellen.
    piping_tip_shape:
      name: Form der Spritztülle
      description: Definiert die Form oder das Design einer Spritz- bzw. Dekoriertülle.
    pitcher_spout_style:
      name: Ausgussstil
      description: Definiert das Design des Ausgusses, das die Präzision der Latte
        Art und die Gießkontrolle beeinflusst.
    pizza_cutter_design:
      name: Pizzaschneiderdesign
      description: Kennzeichnet den strukturellen Stil des Pizzaschneiders und hilft
        Kund:innen so bei der Auswahl zwischen verschiedenen Schneidemechanismen.
    pizza_pan_style:
      name: Pizzablechstil
      description: Kennzeichnet den Konstruktions- oder Designstil des Pizzablechs
        und gibt an, wie es den Teigboden backt und für welche Pizzasorte es gedacht
        ist.
    plant_care_difficulty:
      name: Schwierigkeit der Pflanzenpflege
      description: Gibt den Pflegeaufwand an, der für die Pflege der Pflanze erforderlich
        ist, und hilft so Anfänger:innen und Expert:innen bei der Auswahl der richtigen
        Pflanze.
    plant_container_type:
      name: Pflanzenbehältertyp
      description: Gibt die Art des Behälters an, in dem der künstliche Strauch geliefert
        wird, falls vorhanden.
    plant_life_cycle:
      name: Pflanzenlebenszyklus
      description: Gibt an, ob es sich um eine einjährige, zweijährige oder mehrjährige
        Pflanze handelt.
    planter_material:
      name: Pflanzkübelmaterial
      description: Gibt das Material des mitgelieferten Topfes oder Pflanzgefäßes
        an, sofern vorhanden.
    plate_coupling_pattern:
      name: Muster des Tellerkopplers
      description: Gibt die Konfiguration der Unterseitennabe an, die mit der Motorkupplung
        des Drehtellers der Mikrowelle zusammenpasst und so die korrekte Drehung gewährleistet.
    plate_purpose:
      name: Scheibenzweck
      description: Definiert die funktionale Rolle der Scheibe innerhalb des Mähsystems.
    plate_style:
      name: Tellerstil
      description: Kennzeichnet den spezifischen Stil oder den Verwendungszweck des
        Geschirrtellers.
    pole_construction_type:
      name: Mastkonstruktionstyp
      description: Definiert den strukturellen Stil des Mastes, der Aufbau und Transportierbarkeit
        beeinflusst.
    pool_chemical_type:
      name: Poolchemikalientyp
      description: Kategorisiert die primäre Funktion oder die chemische Zusammensetzung
        des Wasseraufbereitungsprodukts.
    pool_filter_type:
      name: Poolfiltertyp
      description: Kennzeichnet die Filtrationstechnologie oder den Konstruktionsstil
        des Pool- oder Spa-Filters.
    pool_game_type:
      name: Typ des Poolspiels
      description: Gibt die spezifische Spiel- oder Sportart an, die das Produkt im
        Schwimmbad ermöglicht.
    pool_ladder_design:
      name: Poolleiterdesign
      description: Klassifiziert die allgemeine Konstruktion der Poolleiter.
    pool_liner_installation_style:
      name: Art der Poolfolieninstallation
      description: Gibt die Befestigungsmethode an, mit der die Poolfolie an der Poolwand
        befestigt wird.
    pool_lounge_style:
      name: Schwimminselstil
      description: Klassifiziert den strukturellen Stil der Schwimminsel, damit Kund:innen
        nach Form oder Funktion filtern können.
    pool_lounger_features:
      name: Eigenschaften der Poolliege
      description: Hebt die besonderen integrierten Funktionen hervor, die die Liege
        funktionaler oder komfortabler machen.
    pool_skimmer_type:
      name: Poolskimmertyp
      description: Klassifiziert die Bauart des Skimmers und hilft Käufer:innen beim
        Vergleich von Handkeschern mit automatischen oder schwimmenden Skimmern.
    pool_toy_features:
      name: Eigenschaften des Poolspielzeugs
      description: Hebt wichtige Eigenschaften hervor, die speziell für Poolspielzeug
        gelten.
    pool_type:
      name: Pooltyp
      description: Klassifiziert den strukturellen Stil des Schwimmbeckens.
    pool_vacuum_type:
      name: Typ des Poolsaugers
      description: Kennzeichnet die Funktionsweise oder den Antriebsmechanismus eines
        Poolsaugers.
    popcorn_kernel_variety:
      name: Popcornkernsorte
      description: Gibt die natürliche Sorte oder Form des Popcornkerns an.
    portafilter_type:
      name: Siebträgertyp
      description: Identifiziert den strukturellen Stil des Siebträgers, der sich
        auf die Extraktionsmethode und den Arbeitsablauf auswirkt.
    post_installation_method:
      name: Pfosteninstallationsmethode
      description: Definiert, wie der Briefkastenpfosten installiert bzw. befestigt
        wird.
    pour_spout_design:
      name: Ausgießerdesign
      description: Gibt besondere Merkmale oder den Stil des Ausgießers an, der sich
        auf die Durchflussregelung auswirkt.
    pour_spout_style:
      name: Ausgießerstil
      description: Beschreibt die Konstruktion des Ausgießers, die sich auf die Durchflussregelung
        und den Tropfschutz auswirkt.
    power_equipment_hitch_type:
      name: Anhängerkupplungstyp
      description: Gibt die Verbindungsschnittstelle an, über die der Anhänge an Traktoren
        oder Antriebseinheiten montiert wird.
    predator_guard_style:
      name: Stil der Raubtierabwehr
      description: Kategorisiert die strukturelle Ausführung der Schutzvorrichtung
        und hilft Käufer:innen so, schnell Lösungen mit Kegeln, Scheiben, Käfigen
        oder Lochplatten finden.
    preferred_soil_type:
      name: Bevorzugter Bodentyp
      description: Gibt die Bodenbeschaffenheit an, bei der die Pflanze gut gedeiht.
    preparation_type:
      name: Zubereitungsart
      description: Beschreibt die Methode, die erforderlich ist, um das Lebensmittel
        verzehrfertig zu machen.
    preservation_method:
      name: Konservierungsmethode
      description: Beschreibt die Technik, die zum Trocknen oder Konservieren der
        Blumen verwendet wurde.
    pressure_cooker_handle_type:
      name: Typ des Schnellkochtopf-Griffs
      description: Gibt die Art oder Position des auszutauschenden Schnellkochtopf-Griffs
        an.
    pressure_cooker_safety_features:
      name: Sicherheitsmerkmale des Schnellkochtopfes
      description: Listet eingebaute Sicherheitsmechanismen auf, die Unfälle verhindern,
        z. B. verriegelbare Deckel oder Druckentlastungsventile.
    pressure_settings:
      name: Druckeinstellungen
      description: Gibt an, wie viele verschiedene Druckstufen der Schnellkochtopf
        Benutzer:innen bietet.
    pressure_washer_outlet_connector_type:
      name: Anschlusstyp für Hochdruckreinigerauslass
      description: Identifiziert die Vorgaben für den Anschluss an der Vorderseite
        des Pistolenkopfes, an dem Lanzen oder Düsen angebracht wird.
    pressure_washer_spray_pattern:
      name: Sprühmuster des Hochdruckreinigers
      description: Gibt den Sprühwinkel bzw. das Sprühmuster an, das von der Düse
        des Hochdruckreinigers erzeugt wird.
    print_edition_type:
      name: Druckausgabetyp
      description: Klassifiziert den Typ der Druckausgabe und gibt Auskunft über Seltenheit
        und Wert.
    printed_sides:
      name: Bedruckte Seiten
      description: Gibt an, ob das Produkt einseitig oder beidseitig bedruckt ist.
    procedure:
      name: Verfahren
      description: Gibt die medizinische Prozedur oder die Art der Ausbildung an,
        für die das Gerät konzipiert ist.
    protected_item_type:
      name: Typ des geschützten Artikels
      description: Gibt an, welche Art von Dokument oder Objekt die RFID-Abdeckung
        schützen soll.
    pulley_groove_profile:
      name: Profil der Riemenscheibennut
      description: Definiert die Riemenschnittstellenart der Spannrolle.
    pulp_ejection_type:
      name: Typ des Fruchtfleischauswurfs
      description: Gibt an, wie das Fruchtfleisch aus der Maschine ausgestoßen wird.
    pump_type:
      name: Pumpentyp
      description: Gibt das Pumpenmechanismusdesign des Hochdruckreinigers fest.
    punch_bowl_components_included:
      name: Inbegriffene Bowleschlüsselkomponenten
      description: Listet die zusätzlichen Artikel auf, die mit der Bowleschüssel
        geliefert werden, sodass Käufer:innen den Setinhalt auf einen Blick erfassen
        können.
    quilt_construction_type:
      name: Typ für Steppdeckenkonstruktionen
      description: Beschreibt die innere Steppnaht oder die Kammerkonstruktion einer
        Steppdecke, die sich auf die Wärmeverteilung und Strapazierfähigkeit auswirkt.
    radiator_design_type:
      name: Kühlerbauart
      description: Identifiziert den strukturellen Stil des Kühlers.
    rain_barrel_design:
      name: Regentonnendesign
      description: Klassifiziert den strukturellen Stil der Regentonne.
    rain_chain_style:
      name: Regenkettenstil
      description: Gibt das strukturelle Design der Regenkette an, damit Kund:innen
        nach optischen Vorlieben und Wasserablaufleistung filtern können.
    range_hood_filter_type:
      name: Typ des Dunstabzugshaubenfilters
      description: Klassifiziert den Typ des Ersatzfilters, um die korrekte Passform
        und Leistung zu gewährleisten.
    range_installation_type:
      name: Herdinstallationstyp
      description: Beschreibt die Konfiguration für die Installation des Herdes in
        der Küche.
    recorder_type:
      name: Rekordertyp
      description: Gibt die verwendete Aufzeichnungstechnologie an (z. B. DVR, NVR),
        um den Vergleich von analogen und IP-Lösungen zu erleichtern.
    refrigerator_configuration:
      name: Kühlschrankkonfiguration
      description: Identifiziert das gesamte Tür- und Fachlayout des Kühlschranks.
    release_type:
      name: Veröffentlichungstyp
      description: Gibt an, wie schnell Nährstoffe aus dem Dünger freigesetzt werden.
    relief_style:
      name: Reliefstil
      description: Gibt an, ob die Oberflächenerhebungen auf dem Globus erhöht, eingekerbt
        oder flach sind.
    repellent_mechanism:
      name: Abwehrmechanismus
      description: Gibt den primären Abwehrmechanismus des Produkts an, z. B. chemischer
        Duft, Ultraschall oder Blinklicht.
    replaceable_brush_head:
      name: Austauschbarer Bürstenkopf
      description: Gibt an, ob der Bürstenkopf abgenommen und bei Verschleiß ausgetauscht
        werden kann.
    rib_material:
      name: Rippenmaterial
      description: Gibt das Material an, das für die Streben oder Speichen des Schirms
        verwendet wird, z. B. Fiberglas oder Aluminium.
    rice_cooker_functions:
      name: Reiskocherfunktionen
      description: Listet die voreingestellten Kochprogramme bzw. Modi des Reiskochers
        auf und ermöglicht Käufer:innen so einen Vergleich.
    roaster_oven_functions:
      name: Grillofenfunktionen
      description: Listet die voreingestellten oder unterstützten Funktionen auf,
        die an einem Bräter verfügbar sind.
    roasting_rack_shape:
      name: Bratrostform
      description: Gibt die strukturelle Form oder das Design des Rosts an, das sich
        auf die Passform und die Garleistung auswirkt.
    rockwool_form:
      name: Form der Steinwolle
      description: Gibt die physikalische Form oder Konfiguration des Steinwollprodukts
        an.
    roof_style:
      name: Dachform
      description: Definiert den architektonischen Stil oder die Form des Daches.
    rose_attachment:
      name: Befestigung des Brausekopfes
      description: Gibt an, ob die Brause mit einem abnehmbaren Brause- oder Sprühkopf
        ausgestattet ist, fest montiert ist oder gar keinen Brausekopf hat.
    safety_mirror_features:
      name: Eigenschaften des Sicherheitsspiegels
      description: Hebt besondere Leistungsmerkmale hervor, die die Haltbarkeit oder
        Sichtbarkeit verbessern.
    salad_spinner_mechanism:
      name: Mechanismus der Salatschleuder
      description: Gibt den Schleudermechanismus an, der zum Trocknen von Salat verwendet
        wird, und hilft Käufer:innen, die bevorzugte Funktionsweise auszuwählen.
    sand_color:
      name: Sandfarbe
      description: Gibt die Farbe des Sandes oder der körnigen Füllung im Inneren
        der Sanduhr an, unabhängig von der Gehäusefarbe.
    sand_type:
      name: Sandart
      description: Gibt die Sandart anhand ihrer Zusammensetzung oder gängigen Anwendung
        an.
    saucer_functionality:
      name: Untertassenfunktion
      description: Gibt die funktionale Ausführung der Untertasse oder des Tabletts
        an, z. B. selbstbewässernd oder mit einem Wasserreservoir ausgestattet.
    sauna_form_factor:
      name: Saunaformfaktor
      description: Definiert den allgemeinen strukturellen Stil der Saunaeinheit.
    sauna_heater_type:
      name: Saunaofentyp
      description: Gibt die Art des im Saunapaket enthaltenen oder unterstützten Heizgeräts
        an.
    scoop_release_mechanism:
      name: Freigabemechanismus der Schaufel
      description: Beschreibt die Art des in die Schaufel integrierten Mechanismus
        zur Ausgabe des Produkts.
    scoop_surface_design:
      name: Schaufeloberflächendesign
      description: Beschreibt, ob die Schaufeloberfläche massiv oder perforiert ist,
        um den Ölablauf zu ermöglichen.
    scoop_wall_design:
      name: Schaufelwanddesign
      description: Beschreibt, ob die Schaufeloberfläche massiv oder perforiert bzw.
        geschlitzt ist, damit kleine Teile oder Öl hindurchtreten können.
    scrubber_head_type:
      name: Bürstenkopftyp
      description: Beschreibt die mechanische Funktionsweise bzw. die Konstruktion
        des Bürstenkopfes.
    scrubbing_strength:
      name: Scheuerfestigkeit
      description: Gibt den relativen Scheuer- oder Abriebgrad des Produkts an.
    seafood_utensil_items_included:
      name: Inbegriffene Schalentier-Utensilien
      description: Listet zusätzliche Werkzeuge für Schalentiere auf, die im Lieferumfang
        des Knackers enthalten sind, sodass Käufer:innen einzelne Knacker mit dem
        kompletten Set vergleichen können.
    sealing_modes:
      name: Versiegelungsmodi
      description: Listet die auf dem Gerät verfügbaren operativen Versiegelungsprogramme
        auf.
    security_sensor_subtype:
      name: Untertyp des Sicherheitssensors
      description: Definiert die spezifischen Funktionen oder den Typ des Sicherheitssensors.
    seed_treatment:
      name: Saatgutaufbereitung
      description: Gibt an, ob und wie die Samen aufbereitet wurden.
    self_cleaning_method:
      name: Selbstreinigungsmethode
      description: Gibt die Art der Selbstreinigungstechnologie an, die der Ofen verwendet.
    serveware_pieces_included:
      name: Inbegriffenes Serviergeschirr
      description: Listet die verschiedenen Serviergeschirrkomponenten auf, die in
        einem mehrteiligen Set enthalten sind.
    shaker_set_pieces_included:
      name: Inbegriffene Streuer-Set-Teile
      description: Listet die einzelnen Komponenten auf, die neben den normalen Salz-
        und Pfefferstreuern im Set enthalten sind.
    sheath_material:
      name: Hüllenmaterial
      description: Material der Thermoelementsonden-Hülle, das die Korrosionsbeständigkeit
        und die maximale Betriebstemperatur beeinflusst.
    shelf_location_in_appliance:
      name: Regalposition im Gerät
      description: Gibt an, wo innerhalb des Geräts das Regal installiert werden soll.
    shoe_brush_type:
      name: Schuhbürstentyp
      description: Klassifiziert den funktionalen Stil der Schuhbürste und ermöglicht
        es Käufer:innen, Bürsten für bestimmte Aufgaben zu finden.
    shoe_dryer_technology:
      name: Schuhtrocknertechnologie
      description: Gibt die primäre Trocknungstechnologie des Schuhtrockners an.
    shoe_organizer_design:
      name: Schuhorganizer-Design
      description: Kennzeichnet den allgemeinen Stil oder das Format des Schuhorganizers,
        um Käufer:innen die Artikelauswahl zu erleichtern.
    shoe_polish_form:
      name: Schuhcremeform
      description: Identifiziert die physische Form oder die Darreichungsform des
        Schuhcremeprodukts.
    shoe_treatment_purpose:
      name: Zweck des Schuhpflegemittels
      description: Identifiziert die Hauptfunktion oder den Hauptvorteil des Schuhpflegeprodukts.
    shoe_tree_design:
      name: Schuhspannerdesign
      description: Identifiziert den strukturellen Stil bzw. Mechanismus des Schuhspanners,
        der sich auf die Einstellbarkeit, den vorgesehenen Schuhtyp und die Bedienfreundlichkeit
        auswirkt.
    shot_glass_style:
      name: Schnapsglasstil
      description: Kategorisiert den spezifischen Stil oder das Format des Schnapsglases.
    shovel_handle_grip_type:
      name: Typ des Schaufelstielgriffs
      description: Legt die Griffform am Ende des Griffs fest.
    shovel_head_type:
      name: Schaufelkopftyp
      description: Klassifiziert die funktionale Form oder den Stil des Schaufel-
        oder Spatenkopfes.
    shower_curtain_ring_type:
      name: Typ für Duschvorhangringe
      description: Identifiziert den funktionalen Stil des Duschvorhangrings.
    shrub_shape:
      name: Strauchform
      description: Beschreibt die allgemeine Form des in Form geschnittenen oder gestutzten
        künstlichen Strauchs.
    signature_presence:
      name: Vorhandensein der Signatur
      description: Gibt an, ob und wie das Gemälde vom Künstler oder von der Künstlerin
        signiert wurde.
    sink_caddy_features:
      name: Eigenschaften des Spülbecken-Organizers
      description: Hebt funktionale Elemente eines Spülbecken-Organizers hervor.
    size_adjustability:
      name: Größenverstellbarkeit
      description: Gibt an, ob die Länge bzw. Breite des Produkts an verschiedene
        Schuhgrößen angepasst werden kann.
    skewer_tip_type:
      name: Spießspitzentyp
      description: Definiert die Art der Spießspitze, die sich auf die Leichtigkeit
        des Aufspießens von Lebensmitteln und die Optik insgesamt auswirkt.
    sleeping_position_suitability:
      name: Eignung für Schlafposition
      description: Gibt an, für welche Schlafpositionen das Kissen konzipiert ist.
    sleeve_insulation:
      name: Hüllenisolierung
      description: Gibt an, ob die Hülle eine Wärmeisolierung bietet, um Getränke
        kalt oder warm zu halten.
    slice_style:
      name: Schnittart
      description: Gibt die primäre Schnittart der Küchenschneidemaschine an, z. B.
        Julienne oder Waffel.
    slipcover_stretch_type:
      name: Dehnbarkeit des Schonbezugs
      description: Gibt den Grad und die Richtung der im Schonbezug verwendeten Gewebeelastizität
        an.
    smoker_type:
      name: Rauchertyp
      description: Klassifiziert Raucher:innen anhand der körperlichen Merkmale oder
        Rauchmethode.
    smoking_chip_size:
      name: Größe der Räucherchips
      description: Gibt die physikalische Schnittgröße der Räucherchips an, die die
        Brenngeschwindigkeit und die Eignung für verschiedene Grills oder Räucheröfen
        beeinflusst.
    snow_blower_stage_type:
      name: Schneefräsenstufen-Typ
      description: Gibt die Anzahl der Schnecken- bzw. Flügelradstufen an, die zum
        Bewegen und Auswerfen von Schnee verwendet werden. Dies ist eine wichtige
        Spezifikation zur Unterscheidung zwischen einstufigen, zweistufigen und dreistufigen
        Maschinen.
    soap_dispenser_operation_type:
      name: Funktionsweise des Seifenspenders
      description: Gibt den Aktivierungsmechanismus an, der zum Ausgeben von Seife
        oder Lotion verwendet wird.
    soil_texture:
      name: Bodenbeschaffenheit
      description: Beschreibt die vorherrschende Partikelgröße oder Zusammensetzung
        des Bodens, die sich auf die Entwässerung und Belüftung auswirkt.
    spa_installation_type:
      name: Einbauart für Spas
      description: Klassifiziert das Spa anhand seiner Installations- oder Konfigurationsart
        vor Ort.
    space_heater_safety_features:
      name: Sicherheitsmerkmale des Raumheizgeräts
      description: Hebt die integrierten Sicherheitsmechanismen hervor, die Benutzer:innen
        und Eigentum schützen.
    spice_organizer_features:
      name: Eigenschaften des Gewürzregals & -ständers
      description: Hebt spezielle funktionale Eigenschaften von Gewürzregalen & -ständern
        hervor.
    spray_pattern:
      name: Sprühbild
      description: Definiert die Art der Öldispersion, die durch die Sprühdüse erzeugt
        wird.
    sprayer_operation_mechanism:
      name: Sprühmechanismus
      description: Legt fest, wie der Druck erzeugt wird, um das Öl aus dem Sprühgerät
        abzugeben.
    spring_type:
      name: Federtyp
      description: Gibt die Art der im Kantenschneidermechanismus verwendeten Feder
        an.
    sprinkle_opening_style:
      name: Stil der Streuöffnung
      description: Definiert die Feinheit oder Art der Perforationen oder des Siebs,
        das zum Dosieren von Kakao verwendet wird (feines Sieb vs. große Löcher usw.).
    sprinkler_orientation:
      name: Sprinklerausrichtung
      description: Gibt die Einbauausrichtung und den Ausführungstyp des Sprinklerkopfes
        an.
    sprinkler_response_type:
      name: Empfindlichkeit des Sprinklers
      description: Gibt die thermische Empfindlichkeit des Sprinklerkopfes an.
    sprinkler_type:
      name: Sprinklertyp
      description: Klassifiziert die mechanische Wirkungsweise oder den Verteilungsstil
        des Sprinklers, um einen einfacheren Vergleich und eine bessere Filterung
        zu ermöglichen.
    sprinkler_valve_type:
      name: Sprinklerventiltyp
      description: Definiert den Funktions- oder Betätigungstyp des Sprinklerventils.
    squirrel_feed_type:
      name: Art des Eichhörnchenfutters
      description: Gibt an, für welche Futterarten der Futterautomat ausgelegt ist,
        um die Kompatibilität mit den bevorzugten Nahrungsmitteln der Eichhörnchen
        sicherzustellen.
    squirrel_resistance:
      name: Widerstandsfähigkeit gegen Eichhörnchen
      description: Gibt an, ob der Futterspender mit Gitter Eigenschaften aufweist,
        die Eichhörnchen vom Zugang zum Futterspender abhalten sollen.
    stackability:
      name: Stapelbarkeit
      description: Gibt an, ob mehrere Einheiten platzsparend sicher gestapelt werden
        können.
    stackable_design:
      name: Stapelbares Design
      description: Gibt an, ob der Behälter so konstruiert ist, dass er im vollen
        oder leeren Zustand sicher gestapelt werden kann.
    stacking_capability:
      name: Stapelbarkeit
      description: Legt fest, ob der Container gestapelt, verschachtelt, zusammengelegt
        oder nicht mit anderen Containern gestapelt werden kann.
    stainless_steel_cleaner_features:
      name: Eigenschaften des Edelstahlreinigers
      description: Gibt besondere Leistungsmerkmale des Produkts an, die einzigartig
        oder besonders relevant für die Edelstahlpflege sind.
    staple/pin_shape:
      name: Form der Heftklammer oder Nadel
      description: Definiert die allgemeine Form des Befestigungselements und hilft
        Kund:innen bei der Auswahl zwischen U-förmigen Klammern, Rundkopfklammern
        usw.
    staple_coating:
      name: Klammerbeschichtung
      description: Bezeichnet die Schutzbeschichtung, die auf die Klammer oder Nadel
        aufgebracht wird, um Rost zu verhindern oder die Lebensdauer zu verlängern.
    steam_nozzle_type:
      name: Düsentyp für Dampfreiniger
      description: Identifiziert die Funktionsart des Düsenaufsatzes für Dampfreiniger.
    steam_table_pan_cover_features:
      name: Eigenschaften der Abdeckung des Behälters für Warmhaltetheken
      description: Hebt besondere funktionale Eigenschaften der Abdeckungen von Behältern
        für Warmhaltetheken hervor, die den Gastronomiebetrieb unterstützen.
    steam_table_pan_size:
      name: Größe des Behälters für Warmhaltetheken
      description: Gibt den standardisierten Gastronorm- bzw. Hotelbehälteranteil
        an (z. B. voll, 1/2, 1/3), für den der Behälter oder die Abdeckung ausgelegt
        ist.
    steam_table_pan_size_compatibility:
      name: Größenkompatibilität des Behälters für Warmhaltetheken
      description: Gibt die Größen der Gastronorm- oder Standardbehälter an, die die
        Einheit aufnehmen kann.
    steam_table_pan_type:
      name: Behältertyp für Warmhaltetheken
      description: Legt den Konstruktionsstil des Behälters fest, der sich auf die
        Ableitungs- und Heizleistung auswirkt.
    stemware_design:
      name: Stielglasdesign
      description: Gibt an, ob das Trinkgefäß einen traditionellen Stiel oder keinen
        Stiel hat.
    stick_tip_style:
      name: Stil der Spießspitze
      description: Bestimmt die Form der Spießspitze und beeinflusst damit, wie gut
        der Spieß Lebensmittel durchsticht oder stabilisiert.
    stocking_toe_orientation:
      name: Zehenausrichtung des Strumpfes
      description: Gibt die Richtung an, in die die Spitze des Strumpfes zeigt, wenn
        er aufgehängt wird. Dies hat Auswirkungen auf die visuelle Symmetrie bei der
        Präsentation mehrerer Strümpfe.
    stopper_type:
      name: Stopfentyp
      description: Gibt die Art des Verschlusses an, mit dem die Karaffe gegebenenfalls
        ausgestattet ist.
    strainer_style:
      name: Küchensiebstil
      description: Klassifiziert die Bauart des Siebs oder Abtropfsiebs.
    strainer_type:
      name: Siebtyp
      description: Gibt den Stil oder das Design des Siebs an und kennzeichnet dessen
        vorgesehenen Verwendungszweck in der Küche sowie die Maschenkonstruktion.
    strap_end_fitting_type:
      name: Befestigungselement am Gurtende
      description: Gibt die Vorrichtung oder das Befestigungselement am Ende des Zuggurts
        an, das die Verbindung, Befestigung oder Einstellung erleichtert.
    straw_dispensing_mechanism:
      name: Ausgabemechanismus des Trinkhalmspenders
      description: Beschreibt die Art und Weise der Trinkhalmausgabe und unterstützt
        Käufer:innen bei der Suche nach bestimmten Hygiene- oder Komfortmerkmalen.
    sugar_dispenser_mechanism:
      name: Zuckerspendermechanismus
      description: Gibt an, wie der Zucker aus dem Behälter ausgegeben wird, und unterstützt
        Käufer:innen bei der Auswahl der bevorzugten Ausgabemethode.
    suitable_for_pool_shape:
      name: Eignung für Poolform
      description: Gibt an, für welche Formen das Zubehör geeignet ist, um die richtige
        Passform zu gewährleisten.
    suitable_pool_surface_type:
      name: Geeignete Pooloberflächenart
      description: Identifiziert die Oberflächenmaterialien des Pools, für die die
        Bürste oder der Besen konzipiert ist, um Oberflächenbeschädigungen zu vermeiden
        und eine optimale Reinigung zu gewährleisten.
    suitable_spread_material:
      name: Geeignetes Streumaterial
      description: Gibt an, für welche Materialarten das Streugerät ausgelegt ist.
    sundial_type:
      name: Sonnenuhrtyp
      description: Kennzeichnet den Designstil oder die wissenschaftliche Konfiguration
        der Sonnenuhr.
    supplement_function:
      name: Nährstofffunktion
      description: Klassifiziert Nährstoffe nach ihrem Hauptzweck und hilft landwirtschaftlichen
        Betrieben dabei, den richtigen Nährstoff für die spezifischen Bedürfnisse
        ihrer Pflanzen auszuwählen.
    surface_reflectivity:
      name: Oberflächenreflexion
      description: Gibt an, ob die Schildoberfläche so gestaltet ist, dass sie Licht
        reflektiert und dadurch die Sichtbarkeit bei Nacht verbessert.
    sweetener_type:
      name: Süßstoffart
      description: Gibt das hauptsächlich im Sirup verwendete Süßungsmittel an.
    table_skirt_pleat_style:
      name: Faltenstil des Tischvorhangs
      description: Definiert den dekorativen Falten- oder Raffungsstil des Vorhangs
        und hilft Käufer:innen bei der Auswahl des passenden Stils.
    tablecloth_clip_design:
      name: Design der Klemme für Tischdecken
      description: Beschreibt den Mechanismus oder die Bauart der Klemme für Tischdecken.
    tablecloth_features:
      name: Tischdeckeneigenschaften
      description: Hebt besondere Leistungs- oder Designmerkmale der Tischdecke hervor.
    tamper_evident_feature:
      name: Manipulationssicherung
      description: Gibt das Vorhandensein und den Still der in den Verschluss integrierten
        Manipulationssicherung an.
    tang_type:
      name: Erltyp
      description: Gibt die Erlkonstruktion eines Messers an und zeigt auf, wie weit
        das Klingenmetall in den Griff hineinreicht.
    teapot_spout_style:
      name: Stil des Teekannenausgusses
      description: Beschreibt die Gestaltung des Ausgusses der Teekanne, die sich
        auf die Gießkontrolle und die Optik auswirkt.
    temperature_zones:
      name: Temperaturzonen
      description: Gibt an, wie viele unabhängig voneinander steuerbare Temperaturzonen
        der Weinkühlschrank bietet.
    thermocouple_junction_type:
      name: Typ der Thermoelementverbindung
      description: Gibt die Konstruktion der Messstelle an, die sich auf die Reaktionszeit
        und die elektrische Isolierung auswirkt.
    thermometer_design:
      name: Thermometerdesign
      description: Gibt die grundlegende Funktionsweise bzw. Technologie des Haushaltsthermometers
        an.
    thermos_handle_type:
      name: Typ des Thermoskannengriffs
      description: Beschreibt die Art des Griffs oder der Tragehilfe, die in die Thermoskanne
        integriert ist.
    thread_standard:
      name: Gewindestandard
      description: Gibt die Gewindespezifikation an, die für die Anschlüsse des Zubehörs
        verwendet wird, um die Kompatibilität mit Sanitärkomponenten sicherzustellen.
    tilt_mechanism:
      name: Kippmechanismus
      description: Beschreibt den Mechanismus, mit dem der Baldachin gekippt werden
        kann, um eine optimale Beschattung zu erzielen.
    time_format:
      name: Zeitformat
      description: Gibt an, ob die Uhr die Zeit im 12-Stunden- oder 24-Stunden-Format
        oder in beiden Formaten anzeigen kann.
    timer_mechanism:
      name: Timermechanismus
      description: Identifiziert den zugrunde liegenden Mechanismus zur Zeitmessung.
    tine_position:
      name: Zinkenposition
      description: Beschreibt die Anordnung der Zinken im Verhältnis zu den Rädern
        oder dem Motor. Dies wirkt sich auf die Manövrierfähigkeit und die Bodendurchdringung
        aus.
    tire_construction:
      name: Reifenkonstruktion
      description: Bestimmt die interne Konstruktionsmethode der Reifenkarkasse.
    tire_construction_type:
      name: Reifenkonstruktionstyp
      description: Gibt an, ob es sich um einen Diagonal- oder Radialreifen handelt.
        Dies wirkt sich auf Flexibilität, Tragfähigkeit und Fahrkomfort aus.
    tire_tread_pattern:
      name: Muster des Reifenprofils
      description: Beschreibt das Reifenprofil und gibt damit die Eignung für unterschiedliche
        Rasenbeschaffenheiten und Traktionsanforderungen an.
    tissue_lotion_content:
      name: Taschentuchlotion
      description: Gibt an, ob die Taschentücher mit Lotion oder anderen beruhigenden
        Zusätzen getränkt sind.
    toaster_features:
      name: Toasterfunktionen
      description: Listet die speziellen Funktionen und Designelemente des Toasters
        auf.
    tong_type:
      name: Zangentyp
      description: Gibt den primären Stil oder den vorgesehenen Verwendungszweck der
        Zange an.
    toothbrush_holder_features:
      name: Eigenschaften des Zahnbürstenhalters
      description: Hebt die besonderen Funktionen oder Designelemente hervor, die
        den Halter auszeichnen.
    toothpick_dispensing_mechanism:
      name: Mechanismus des Zahnstocherspenders
      description: Identifiziert den Mechanismus, durch den die Zahnstocher ausgegeben
        werden.
    topographical_relief:
      name: Topografisches Relief
      description: Gibt an, ob die Globusoberfläche eine erhabene Topographie aufweist.
    towel_holder_design:
      name: Design des Handtuchhalters
      description: Beschreibt den strukturellen Stil eines Handtuchhalters, z. B.
        Stange oder Ring.
    towel_weave:
      name: Handtuchgewebe
      description: Beschreibt die Konstruktion oder Webart des Handtuchstoffs, die
        sich auf Textur, Saugfähigkeit und Trocknungszeit auswirkt.
    track_lighting_rail_type:
      name: Lichtschienentyp
      description: Definiert den mechanischen/elektrischen Standard der Schiene und
        legt fest, welche Leuchten und Halterungen kompatibel sind.
    track_lighting_system_compatibility:
      name: Kompatibilität des Lichtschienensystems
      description: Legt den elektrischen und mechanischen Standard der Schiene fest,
        für die die Leuchte oder das Zubehörteil ausgelegt ist.
    track_rail_circuit_configuration:
      name: Konfiguration der Schienenstromkreise
      description: Gibt die Anzahl oder Art der von der Schiene unterstützten Stromkreise
        an. Dies wirkt sich auf die unabhängige Steuerung von Leuchtengruppen aus.
    track_system_standard:
      name: Schienensystemstandard
      description: Identifiziert den physischen Standard, zu dem die Stromzufuhr passt,
        sodass Käufer:innen die Komponenten an ihre Schiene anpassen können (z. B.
        H-, J- oder L-Schiene).
    tractor_tire_application:
      name: Anwendung des Traktorreifens
      description: Gibt die primäre Anwendung oder Umgebung an, für die der Reifen
        konzipiert wurde.
    tractor_tire_tread_classification:
      name: Klassifizierung des Traktorreifenprofils
      description: Klassifiziert das Reifenprofil von Traktoren nach landwirtschaftlichen
        und industriellen Standards.
    tree_shape:
      name: Baumform
      description: Beschreibt die allgemeine Silhouette oder das Profil eines künstlichen
        Baumes.
    trigger_type:
      name: Auslösertyp
      description: Gibt den Auslösemechanismus an, mit dem der Wasserdurchfluss an
        der Düse gesteuert wird.
    trimmer_line_feed_system:
      name: Fadenzufuhrsystem für Trimmer
      description: Gibt an, wie der Schneidfaden während des Betriebs vom Kopf zugeführt
        wird.
    trimmer_line_shape:
      name: Form des Trimmerfadens
      description: Beschreibt die Querschnittsform des Trimmerfadens, die die Schneidleistung
        und Geräuschentwicklung beeinflusst.
    turntable_type:
      name: Drehtellertyp
      description: Bezeichnet die Art der Kochfläche und unterscheidet zwischen herkömmlichen
        drehbaren Glastellern und flachen oder nicht drehbaren Ausführungen.
    ultrasonic_cleaner_accessories_included:
      name: Inbegriffenes Zubehör für Ultraschallreiniger
      description: Listet zusätzliche Komponenten auf, die im Lieferumfang des Reinigungsmittels
        enthalten sind, damit Käufer:innen genau wissen, was sich in der Verpackung
        befindet.
    umbrella_base_type:
      name: Schirmständertyp
      description: Definiert den strukturellen Stil oder die Montageart des Ständers.
    umbrella_opening_mechanism:
      name: Öffnungsmechanismus des Schirms
      description: Legt fest, wie der Schirm ausgefahren und eingefahren wird.
    umbrella_type:
      name: Schirmtyp
      description: Legt das allgemeine Design bzw. den Formfaktor des Schirms fest.
    upf_rating:
      name: UPF-Bewertung
      description: Gibt den UV-Schutzfaktor (UPF) des Sonnenschirmstoffs an und quantifiziert
        dessen Wirksamkeit gegen schädliche UV-Strahlung.
    utensil_flexibility:
      name: Flexibilität des Küchenutensils
      description: Gibt an, wie steif oder flexibel der Schaberkörper ist, was sich
        auf die Eignung für gewölbte Schüsseln oder festen Teig auswirkt.
    utensil_holder_features:
      name: Eigenschaften des Halters für Küchenutensilien
      description: Beschreibt besondere funktionale Eigenschaften eines Halters für
        Küchenutensilien.
    utensil_tray_features:
      name: Merkmale der Besteckschublade
      description: Hebt besondere Eigenschaften hervor, die die Funktionalität der
        Schublade verbessern.
    vacuum_hose_connection_type:
      name: Anschlusstyp des Staubsaugerschlauchs
      description: Beschreibt den Anschlusstyp an den Schlauchenden, der die korrekte
        mechanische Passform mit Staubsaugern oder Zubehörteilen gewährleistet.
    valance_style:
      name: Volantstil
      description: Identifiziert das dekorative Design des Volants und hilft Kund:innen
        so bei der Auswahl eines Stils, der zu ihrer Einrichtung passt.
    valet_organizer_features:
      name: Organizer-Eigenschaften
      description: Hebt bestimmte organisatorische Eigenschaften hervor, die in den
        Organizer mit Ladestation integriert sind.
    valve_configuration:
      name: Ventilkonfiguration
      description: Definiert den funktionalen Stil des Gartenschlauchventils und hilft
        Käufer:innen so, schnell die richtige Lösung für ihre Bewässerung auszuwählen.
    valve_stem_angle:
      name: Ventilschaftwinkel
      description: Legt die Ausrichtung oder den Winkel des Ventilschafts relativ
        zum Schlauch fest. Dies wirkt sich auf die Leichtigkeit des Aufpumpens und
        die Passform an der Felge aus.
    vase_filler_type:
      name: Vasenfüller
      description: Kategorisiert das Produkt nach der spezifischen Art des Füllmaterials
        oder der Füllform.
    vent_pipe_type:
      name: Entlüftungsrohrtyp
      description: Klassifiziert den Konstruktionsstil des Abzugs- oder Entlüftungsrohrs.
    vent_style:
      name: Lüftungsstil
      description: Klassifiziert den strukturellen Stil oder den Zweck des Lüftungsbauteils.
    waffle_style:
      name: Waffelstil
      description: Identifiziert das von den Platten erzeugte Waffelmuster.
    wallpaper_removal_type:
      name: Typ der Tapetenentfernung
      description: Gibt die Ablösbarkeit bei einer Neugestaltung an.
    wallpaper_washability_rating:
      name: Pflegeleichtigkeit der Tapete
      description: Definiert, wie die Tapetenoberfläche nach der Anbringung gereinigt
        werden kann.
    warmer_type:
      name: Wärmertyp
      description: Gibt den primären Erwärmungsmechanismus oder den Verwendungszweck
        des Kerzen- oder Ölwärmers an.
    warmth_level:
      name: Wärmegrad
      description: Klassifiziert den allgemeinen Wärmegrad oder die saisonale Eignung
        der Stepp- oder Bettdecke.
    warmth_rating:
      name: Wärmebewertung
      description: Gibt den Isolationsgrad einer Decke an, vergleichbar mit den TOG-Werten
        bei Bettwaren.
    waste_container_lid_features:
      name: Eigenschaften des Abfallbehälterdeckels
      description: Hebt besondere Funktionen oder Erweiterungen hervor, die im Deckel
        integriert sind.
    waste_container_sign_message:
      name: Hinweis auf dem Abfallbehälterschild
      description: Definiert den spezifischen Abfall oder Warnhinweis, der auf dem
        Etikett oder Schild abgedruckt ist.
    water_filtration_technology:
      name: Wasserfiltertechnologie
      description: Beschreibt die Kerntechnologie oder den Kernmechanismus, der zur
        Wasserreinigung verwendet wird.
    water_heater_element_connection_type:
      name: Anschlusstyp des Heizelements
      description: Identifiziert die Befestigungsart des Elements, wobei zwischen
        Einschraub- und verschiedenen Flanschausführungen unterschieden wird.
    water_sensor_design:
      name: Wassersensordesign
      description: Legt den physischen Stil des Wassersensorelements fest.
    water_supply_type:
      name: Wasserversorgungstyp
      description: Gibt an, wie das Gerät mit Wasser versorgt wird, und unterscheidet
        zwischen manuell befüllbaren Behältern und fest installierten Wasserleitungen.
    watering_needs:
      name: Bewässerungsbedarf
      description: Beschreibt den typischen Wasserbedarf der Pflanze.
    wax_paper_form:
      name: Format des Wachspapiers
      description: Gibt an, ob das Paper als Endlosrolle oder in vorgeschnittenen
        Blättern verkauft wird.
    weather_guard_mounting_method:
      name: Befestigungsmethode des Regenschutzes
      description: Gibt an, wie der Schutz am Zuführer oder an der Stützkonstruktion
        befestigt wird.
    wheel_bearing_type:
      name: Radlagertyp
      description: Kennzeichnet die interne Lager- oder Buchsenkonstruktion des Rades,
        die sich auf die Laufruhe und den Wartungsaufwand auswirkt.
    wheel_tread_style:
      name: Radprofilart
      description: Legt das Profildesign des Rades fest, welches die Traktion, den
        Geräuschpegel und mögliche Bodenabdrücke beeinflusst.
    whistling:
      name: Pfeifen
      description: Legt fest, ob der Wasserkocher ein Pfeifgeräusch erzeugt, wenn
        das Wasser den Siedepunkt erreicht.
    wick_material:
      name: Dochtmaterial
      description: Gibt die Zusammensetzung des verwendeten Dochtes an (z. B. Baumwolle,
        Fiberglas).
    window_film_installation_surface:
      name: Anwendungsbereich der Fensterfolie
      description: Gibt an, ob die Folie für den Innenbereich, den Außenbereich oder
        für die Anwendung in beiden Bereichen konzipiert ist.
    window_film_type:
      name: Fensterfolienart
      description: Kategorisiert den funktionalen Stil der Folie (z. B. Privatsphäre
        vs. Sicherheit).
    window_rod_type:
      name: Fensterstangentyp
      description: Klassifiziert den funktionalen Stil der Fensterstange.
    window_screen_type:
      name: Fliegengittertyp
      description: Definiert den strukturellen Stil oder die Funktionsweise des Gitters.
    window_treatment_lining_type:
      name: Futtertyp der Fensterdrapierung
      description: Gibt an, ob der Volant gefüttert ist und welche Art von Futter
        verwendet wird.
    wine_aerator_type:
      name: Weinbelüftertyp
      description: Legt den Formfaktor oder die Funktionsweise des Weinbelüfters fest.
    wine_glass_style:
      name: Weinglassstil
      description: Gibt den vorgesehenen Wein oder das Glasdesign für optimales Aroma
        und besten Geschmack an.
    wok_bottom_type:
      name: Wokbodentyp
      description: Definiert die Form des Wokbodens und bestimmt so die Kompatibilität
        mit verschiedenen Herdplatten und Wokringen.
    wood_grain_orientation:
      name: Holzmaserungsausrichtung
      description: Gibt die Ausrichtung der Holzmaserung im Produkt an, z. B. Hirnholz,
        Kantenholz oder Flächenholz. Die Maserungsausrichtung beeinflusst die Strapazierfähigkeit
        und die Messerschonung.
    wood_seasoning_method:
      name: Holztrocknungsmethode
      description: Gibt an, wie das Brennholz getrocknet oder gelagert wurde, was
        sich auf den Feuchtigkeitsgehalt und die Brennqualität auswirkt.
    wrap_format:
      name: Format der Lebensmittelverpackung
      description: Gibt die physische Form an, in der die Lebensmittelverpackung geliefert
        wird, z. B. in Rollen oder vorgeschnittenen Blättern.
    abacus_bead_material:
      name: Abakusperlenmaterial
      description: Hauptmaterial der Abakusperlen.
    abec_rating:
      name: ABEC-Bewertung
      description: Gibt die Präzisionsklasse der Lager auf Basis der ABEC-Bewertung
        und damit Laufruhe und Toleranzniveaus an.
    abrasive_level:
      name: Schleifgrad
      description: Relative Schleifkraft einer Politur/Paste auf Autolacken.
    absinthe_accessories_included:
      name: Absinthzubehör inklusive
      description: Listet alle Zubehörteile auf, die im Lieferumfang des Produkts
        enthalten sind, z. B. Löffel, Gläser oder Zuckerwürfel.
    ac_compressor_mounting_style:
      name: Montageart für Klimakompressor
      description: Beschreibt die Art der mechanischen Montage/Befestigung bzw. die
        Halterungsschnittstelle des Kompressors am Motor bzw. am Nebenantriebssystem.
    ac_compressor_oil_type:
      name: Öltyp des Klimaanlagen-Kompressors
      description: Gibt die für den Klimaanlagen-Kompressor erforderliche/verwendete
        Schmierölzusammensetzung an. (Gängige Typen sind PAG und POE).
    accent_modes:
      name: Betonungsmodi
      description: Legt fest, wie das Metronom die Taktschläge innerhalb eines Takts
        betonen kann (über den einfachen Klick hinaus).
    access_mechanism:
      name: Zugangsmechanismus
      description: Beschreibt, wie die erhöhte Schlafplattform erreicht werden kann.
    accessibility_features:
      name: Mobilitätshilfen
      description: Gibt die barrierefreien Ausstattungsmerkmale und Konfigurationen
        des Kleinbusses an.
    accessories_included:
      name: Zubehör inklusive
      description: Listet ergänzende Artikel auf, die im Paket mit dem Stuhl enthalten
        sind (z. B. Hocker, Lendenkissen), und bietet Käufer:innen einen transparenten
        Überblick über den Mehrwert.
    accessory_pieces_included:
      name: Enthaltene Accessoires
      description: Listet die Zubehörartikel auf, die in einem mehrteiligen Geschenk-Set
        oder Paket mit Bekleidungszubehör enthalten sind.
    acoustic_amplifier_feedback_control_features:
      name: Rückkopplungssteuerungsfunktionen des akustischen Verstärkers
      description: Gibt die integrierten Rückkopplungsschutzfunktionen für akustische
        Instrumente an (z. B. Notch-Filter, Phasenschalter, automatische Rückkopplungsunterdrückung).
    acoustic_drum_kit_components_included:
      name: Enthaltene Komponenten des akustischen Schlagzeug-Sets
      description: Gibt an, welche Hauptkomponenten im Set enthalten sind (nur Shell-Set
        vs. komplettes Set, Becken/Hardware inklusive).
    acoustic_guitar_body_shape:
      name: Form des Akustikgitarrenkorpus
      description: Beschreibt die Form/den Umriss des Korpus einer Akustikgitarre,
        der sich auf Klang, Spielkomfort und typische Verwendung auswirkt.
    acoustic_guitar_string_core_design:
      name: Konstruktion des Kerns von Akustikgitarrensaiten
      description: Der Kernaufbau der umwickelten Saiten.
    acoustic_piano_key_material:
      name: Material für akustische Klaviertasten
      description: Gibt das Hauptmaterial der Tastenbeläge an.
    acoustic_piano_lid_type:
      name: Deckeltyp für akustische Klaviere
      description: Gibt die Art des Deckelmechanismus an, der bei einem akustischen
        Klavier verwendet wird (Unterscheidung zwischen Flügel und Klavier mit Klappdeckel).
    acoustic_piano_plate_frame_material:
      name: Material der Klavierplatte/des Klavierrahmens
      description: Gibt das Hauptmaterial der Klavierplatte/des Klavierrahmens (Harfe)
        an, üblicherweise Gusseisen.
    acoustic_piano_soundboard_material:
      name: Material für den Resonanzboden eines akustischen Klaviers
      description: Gibt das primäre Material an, das für den Resonanzboden des Klaviers
        verwendet wird.
    action_figure_scale:
      name: Maßstab der Actionfigur
      description: Gibt das Maßstabsverhältnis (z. B. 1:12) an, für das das Zubehör
        vorgesehen ist.
    action_type:
      name: Aktionstyp
      description: Beschreibt den Abzugs- oder Spannmechanismus der Waffe (z. B. Repetierverschluss,
        Klappverschluss, Hebelverschluss).
    actuation_mechanism:
      name: Betätigungsmethode
      description: 'Gibt an, wie der Hebel das Bremssystem betätigt: rein mechanisch
        über Seilzug, vollhydraulisch, hydraulisch über Seilzug oder elektronisch/drahtlos.'
    actuation_method:
      name: Betätigungsmethode
      description: Gibt an, wie das Löschsystem aktiviert oder ausgelöst wird.
    adapter_orientation:
      name: Adapterausrichtung
      description: Gibt den Winkel oder die Konfiguration eines Reifenventiladapters
        an, der die Zugänglichkeit der Pumpe beeinflusst (z. B. gerade, 90°).
    additive_application_stage:
      name: Phase der Additivzugabe
      description: Gibt an, in welchem Prozessschritt das Produkt verwendet werden
        soll.
    adhesive_backing:
      name: Kleberückseite
      description: Ob die bedruckbare Seide über eine selbstklebende Rückseite zum
        Aufkleben verfügt.
    adhesive_formulation:
      name: Klebstoffformulierung
      description: Gibt die chemische Basis oder Formulierung des Klebstoffs an, z. B.
        Cyanacrylat oder Epoxidharz.
    adhesive_sides:
      name: Klebeseiten
      description: Gibt an, ob sich der Schmelzklebstoff auf einer Seite oder auf
        beiden Seiten des Klebebands/der Bahn befindet.
    adjunct_grain_processing_form:
      name: Verarbeitungsform des als Brauzusatz verwendeten Getreides
      description: Gibt die physikalische/verarbeitete Form des als Brauzutat verwendeten
        Getreides an (z. B. flockig, geröstet, gemälzt oder roh).
    adjustability_type:
      name: Art der Verstellbarkeit
      description: Gibt an, welche Art von Einstellung die Strebe ggf. unterstützt.
    adjustable_cup_mutes:
      name: Verstellbarer Cup-Dämpfer
      description: Gibt an, ob der Cup verstellbar/herausnehmbar ist, und gibt die
        Verstellmethode an.
    adjustable_zones:
      name: Einstellbare Zonen
      description: Gibt an, welche Abschnitte der Basis unabhängig voneinander verstellt
        werden können.
    adjustment_type:
      name: Anpassungsart
      description: Gibt an, ob der Regler einstellbar ist und wie die Einstellung
        erfolgt.
    administration_method:
      name: Verabreichungsmethode
      description: Gibt an, wie das Entwurmungsmittel dem Pferd verabreicht wird (z. B.
        oral oder per Injektion), und hilft Käufer:innen, die tierärztlichen Anweisungen
        einzuhalten und eine praktikable Anwendungsmethode auszuwählen.
    advice_card_prompt_type:
      name: Art der Aufforderung auf der Spruchkarte
      description: Art der auf der Karte abgedruckten Aufforderung (oder deren Fehlen).
    aeration_method:
      name: Belüftungsmethode
      description: Beschreibt die Art der Belüftung, die durch den Container bereitgestellt
        oder unterstützt wird und die eine ausreichende Sauerstoffversorgung für Lebendköder
        gewährleistet.
    aero_package_components:
      name: Komponenten des Aerodynamikpakets
      description: Gibt an, welche wichtigen aerodynamischen Komponenten am Fahrzeug
        verbaut sind (alle zutreffenden auswählen).
    aerodynamic_elements_included:
      name: Enthaltene Aerodynamische Elemente
      description: Gibt an, welche aerodynamischen Komponenten der Formel-1-Rennwagen
        aufweist (alle zutreffenden auswählen, sofern unterstützt).
    aftertouch_support:
      name: Aftertouch-Unterstützung
      description: Ob der Controller Aftertouch (Kanal oder polyphon) auf Tasten/Pads
        unterstützt.
    agave_content_classification:
      name: Einstufung des Agavenanteils
      description: Gibt an, ob der Tequila zu 100 % aus blauer Weber-Agave hergestellt
        wird oder ob es sich um einen Mixto handelt, der mindestens 51 % Agavenzucker
        enthält.
    aida_cloth_count:
      name: Fadenzahl des Aida-Tuchs
      description: Gibt die Fadenzahl des Aida-Tuchs an (Anzahl der Quadrate/Stiche
        pro Zoll), die die Stichgröße und den Maßstab des Musters bestimmt.
    aida_cloth_pre_cut_format:
      name: Vorgeschnittenes Aida-Tuch
      description: Gibt an, ob das Aida-Tuch als vorgeschnittenes Stück, als durchgehend
        vom Ballen geschnittenes Stück oder auf einer Rolle verkauft wird.
    air_bag_material:
      name: Material für Blasebalgschläuche
      description: Gibt das Material des Luftsacks/-reservoirs an, das bei der irischen
        Dudelsackpfeife verwendet wird.
    air_bed_internal_construction:
      name: Innenkonstruktion des Luftbetts
      description: Beschreibt die interne Stützstruktur bzw. Technologie, die im Inneren
        des Luftbetts für Komfort und Stabilität sorgt.
    air_dry_clay_color_form:
      name: Farbform des lufttrocknenden Tons
      description: Ob der Ton vorgefärbt, weiß/neutral zum Bemalen oder als Mischung/Sortiment
        verkauft wird.
    air_hockey_items_included:
      name: Enthaltene Airhockey-Artikel
      description: Listet die einzelnen Zubehörteile auf, die in einem Set enthalten
        sind, damit Kund:innen genau wissen, was sie erhalten (z. B. 2 Schieber, 4 Pucks,
        2 Filzgleiter).
    air_intake_temperature_sensor_mounting_style:
      name: Montageart des Luftansaugtemperatursensors
      description: Die physische Montageart des IAT-Sensors im Ansaugsystem.
    air_integration_capability:
      name: Luftintegrationsfunktion
      description: Gibt an, ob und wie der Tauchcomputer drahtlose Flaschendrucksender
        unterstützt.
    air_mattress_valve_type:
      name: Ventilart für Luftmatratzen
      description: Gibt die Ventilausführung an, für die ein Zubehörteil geeignet
        ist oder die es enthält, und gewährleistet so die Kompatibilität zwischen
        Pumpen, Ventilen und Ersatzteilen.
    air_water_rocket_kit_items_included:
      name: Im Luft- und Wasserraketenpaket enthaltene Artikel
      description: Wichtige Komponenten des Raketensets (Werfer, Pumpe, Leitwerke,
        Nachfüllteile).
    air_water_rocket_launch_method:
      name: Verfahren zum Abschuss von Luft- und Wasserraketen
      description: Wie die Rakete unter Druck gesetzt und abgeschossen wird (Benutzerinteraktion
        und Art der Ausrüstung).
    airbag_position:
      name: Airbagposition
      description: Gibt die vorgesehene Rückhalteposition bzw. -zone an, die das Airbagbauteil
        abdeckt.
    aircraft_ads_b_capability:
      name: ADS-B-Fähigkeit des Flugzeugs
      description: Gibt an, ob das Flugzeug für die Einhaltung der ADS-B-Out-Vorschriften
        ausgerüstet ist.
    aircraft_airframe_material:
      name: Flugzeugzellenmaterial
      description: Hauptmaterialien, die beim Bau der Flugzeugzelle verwendet werden.
    aircraft_cabin_configuration:
      name: Konfiguration der Flugzeugkabine
      description: Gibt die Kabinenkonfiguration des Flugzeugs an (z. B. Konferenzkonfiguration,
        Divan-Konfiguration, Vier-Zonen-Kabine).
    aircraft_documentation_included:
      name: Enthaltene Flugzeugdokumentation
      description: Gibt an, welche Dokumente mit dem Teil geliefert werden (z. B.
        8130-3).
    aircraft_galley_configuration:
      name: Art der Bordküche
      description: Vorhandensein und Art der Bordküche/Verpflegungseinrichtungen in
        der Kabine.
    aircraft_installation_location:
      name: Einbauort im Flugzeug
      description: Wo im Flugzeug das Teil oder Zubehör eingebaut oder verwendet wird.
    aircraft_internet_connection:
      name: Internetverbindung im Flugzeug
      description: Gibt das Vorhandensein/die Art der Internetverbindung in der Kabine
        an.
    aircraft_landing_gear_type:
      name: Typ des Flugzeugfahrwerks
      description: Gibt die Fahrwerkskonfiguration des Tragschraubers an.
    aircraft_lavatory_configuration:
      name: Flugzeugtoilettenkonfiguration
      description: Art der Toilettenkonfiguration an Bord.
    aircraft_maintenance_program_enrollment:
      name: Einschreibung in Flugzeugwartungsprogramm
      description: Gibt an, ob das Flugzeug an einem Wartungsprogramm für Triebwerke
        und/oder Flugzeugzelle teilnimmt und, falls ja, welche Art der Abdeckung gilt
        (Triebwerk, Flugzeugzelle oder beides).
    aircraft_operational_certification:
      name: Betriebsgenehmigung für Flugzeug
      description: Gibt die behördliche oder betriebliche Zulassungsgrundlage an,
        auf deren Basis das Luftfahrzeug betrieben wird (abhängig von der jeweiligen
        Rechtsordnung, z. B. FAA Part 91/135/121, EASA-AOC).
    aircraft_protective_gear_certification:
      name: Zertifizierung von Flugzeugschutzausrüstung
      description: Gibt die Luftfahrt-, Behörden- oder Branchennorm an, nach der die
        Schutzausrüstung zertifiziert ist.
    aircraft_system_application:
      name: Anwendung in Flugzeugsystem
      description: Gibt an, zu welchem Flugzeugsystem oder -bereich das Teil/Zubehör
        gehört (dient zum Durchsuchen und Filtern verschiedener Flugzeugteile).
    airflow_resistance_level:
      name: Luftströmungswiderstand
      description: Zeigt an, wie stark sich der Dämpfer in Bezug auf Gegendruck/Luftwiderstand
        anfühlt.
    airship_envelope_material:
      name: Material für die Luftschiffhülle
      description: Hauptmaterial der Luftschiffhülle (Außenhaut).
    airsoft_part_type:
      name: Typ für Airsoft-Teil
      description: Bezeichnet die Funktionskomponente oder den Zubehörtyp für Airsoft-Waffen
        (z. B. Magazin, Lauf, Handschutz).
    airworthiness_approval_basis:
      name: Grundlage der Lufttüchtigkeitsgenehmigung
      description: Gibt ggf. die Genehmigungs-/Zertifizierungsgrundlage für das Teil
        an (z. B. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Einstellbarkeit der Alarmlautstärke
      description: Gibt an, ob und wie die Lautstärke des Alarms von Benutzer:innen
        angepasst werden kann.
    alcohol_ink_finish_effect:
      name: Finish/Effekt durch Alkoholtinte
      description: Beschreibt den visuellen Effekt bzw. das Finish, das durch die
        Alkoholtintenformulierung erzielt wird (über die reine Farbe hinaus), z. B.
        Metallic- oder Perlglanz-Effekte.
    alignment_aid_style:
      name: Art der Ausrichtungshilfe
      description: Beschreibt die Art der auf der Mattenoberfläche aufgedruckten oder
        eingearbeiteten Ausrichtungshilfen (z. B. gerade Linien, Abstandsmarkierungen).
    alternator_cooling_type:
      name: Art der Lichtmaschinenkühlung
      description: Beschreibt, wie die Lichtmaschine gekühlt und belüftet wird.
    alternator_marine_ignition_protection_rating:
      name: Zündschutzklasse für Schiffsmotoren-Lichtmaschinen
      description: Gibt an, ob die Lichtmaschine für den Einsatz in Schiffsmaschinenräumen
        zündgeschützt ist (z. B. gemäß SAE J1171/ISO 8846).
    alternator_mounting_configuration:
      name: Montagekonfiguration der Lichtmaschine
      description: Gibt die physische Montagekonfiguration an, die zur Befestigung
        der Lichtmaschine an einer Motorhalterung verwendet wird.
    alternator_pulley_type:
      name: Typ der Lichtmaschinenriemenscheibe
      description: Gibt die Riemenscheiben-/Kupplungskonstruktion der Lichtmaschine
        an (oder gibt an, dass keine Riemenscheibe enthalten ist).
    alternator_regulator_type:
      name: Typ des Lichtmaschinenreglers
      description: Gibt an, ob der Spannungsregler in die Lichtmaschine integriert
        oder extern ist und ob er vom Hersteller gesteuert wird (computergesteuert/PCM-gesteuert).
    alternator_terminal_connection_type:
      name: Anschlussart der Lichtmaschinenklemmen
      description: Bevorzugte Art des elektrischen Anschlusses für die Ausgangs- und
        Erregerklemmen der Lichtmaschine, um die Kompatibilität des Kabelbaums zu
        gewährleisten.
    altitude_suitability:
      name: Eignung für Höhenlagen
      description: Gibt an, ob der Ball für bestimmte Höhenlagen konstruiert wurde,
        die sich auf Geschwindigkeit und Sprungverhalten auswirken.
    ambulance_stretcher_mount_type:
      name: Typ der Tragehalterung für Krankenwagen
      description: Gibt den Typ des vom Krankenwagen unterstützten Tragenlade-/Montagesystems
        an.
    american_football_safety_certification:
      name: Sicherheitszertifizierung für American Football
      description: Gibt an, welche für American Football spezifischen Sicherheitszertifizierungen
        oder -normen das Produkt erfüllt.
    amplifier_tube_function:
      name: Funktion der Verstärkerröhre
      description: Gibt die funktionale Rolle der Röhre innerhalb einer Instrumentenverstärkerschaltung
        an (z. B. Vorstufe oder Endstufe).
    analog_synthesizer_cv_gate_i_o:
      name: CV/Gate I/O für analoge Synthesizer
      description: Gibt die Arten von Steuerspannungs- und Gate-Anschlüssen an, die
        für die Integration mit modularen/analogen Geräten unterstützt werden.
    analog_synthesizer_keybed_configuration:
      name: Konfiguration der Tastatur eines analogen Synthesizers
      description: Zeigt auf, ob der Synthesizer über eine eingebaute Tastatur verfügt,
        und gibt ggf. die Anzahl der Tasten an.
    anchor_configuration:
      name: Ankerkonfiguration
      description: Gibt an, ob das Aufhängungssystem einen einzigen zentralen Verankerungspunkt
        oder mehrere unabhängige Verankerungspunkte verwendet, was sich auf die Übungsvielfalt
        und die Komplexität des Aufbaus auswirkt.
    animal_raising_method:
      name: Tieraufzuchtmethode
      description: Beschreibt die landwirtschaftlichen oder haltungstechnischen Praktiken,
        die für das jeweilige Tier angewendet werden.
    animal_species:
      name: Tierarten
      description: Gibt an, welches Tier oder Geschöpf durch das Stofftier dargestellt
        wird (z. B. Bär, Hase, Dinosaurier).
    animal_trap_jaw_style:
      name: Tierfalle im Backen-Stil
      description: Die Konfiguration der Fallenbacken und ihr Einfluss auf die Haltekraft
        und das Tierwohl.
    animal_trap_type:
      name: Tierfallenart
      description: Klassifiziert die mechanische Bauart/Konstruktion der Falle, sodass
        Käufer:innen schnell die exakt benötigte oder gesetzlich zulässige Fangmethode
        finden können.
    ankle_collar_style:
      name: Stil des Knöchelkragens
      description: Beschreibt den Stil oder die Konstruktion des Knöchelkragens eines
        Schuhs, z. B. niedrig geschnitten, mittelhoch geschnitten, hoch geschnitten,
        Sockenkragen oder schnürsenkellos, was sich auf Halt, Passform und Ästhetik
        auswirkt.
    ankle_guard_protection_level:
      name: Schutzstufe des Knöchelschutzes
      description: Bewertet den Gesamtschutz, den der Knöchelschutz bietet.
    ankle_strap_padding_type:
      name: Typ der Fesselriemenpolsterung
      description: Beschreibt das im Riemen verwendete Polstermaterial oder die Polsterung,
        die den Tragekomfort beeinflusst.
    ankle_strap_type:
      name: Fesselriementyp
      description: Klassifiziert die Konstruktion oder das Design eines Fesselriemens
        an einer Snowboardbindung.
    ant_farm_habitat_medium_type:
      name: Substrattyp der Ameisenfarm
      description: Gibt das primäre Substrat an, das von der Ameisenfarm bereitgestellt
        oder benötigt wird und in dem Ameisen Tunnel bauen und beobachtet werden können.
    ant_farm_kit_contents:
      name: Inhalt des Ameisenfarmpakets
      description: Gibt an, welche Komponenten im Ameisenfarm-Paket enthalten sind
        (z. B. Substratbehälter, Sand/Gel, Gutschein für Ameisen, Fütterungswerkzeuge).
    ant_farm_lighting_type:
      name: Beleuchtungsart der Ameisenfarm
      description: Gibt (falls vorhanden) die integrierte Beleuchtungsart an, die
        zur Beobachtung verwendet wird.
    antenna_fit_type:
      name: Antennentyp
      description: Für welchen Antennenformfaktor die Antennenkugel vorgesehen ist.
    anti_caking_agent:
      name: Trennmittel
      description: Gibt die Art des Trennmittels an, mit dem die Klumpenbildung verhindert
        wird. Diese Angabe ist für die Berücksichtigung von Allergien und die Genauigkeit
        der Rezeptur wichtig.
    anti_g_suit_bladder_material:
      name: Druckblasenmaterial des Anti-G-Anzugs
      description: Material, das für die innere Druckblase im Anti-G-Anzug verwendet
        wird. Es werden alle zutreffenden Materialien aufgelistet, falls mehrere Materialien
        verwendet werden.
    anti_g_suit_connector_type:
      name: Anschlussart des Anti-G-Anzugs
      description: Gibt den Typ oder Standard des Luft-/Druckschlauchanschlusses an,
        der für die Verbindung mit dem Flugzeug oder dem Regler verwendet wird.
    anti_g_suit_inflation_method:
      name: Verfahren zum Aufblasen des Anti-G-Anzugs
      description: Gibt an, wie die Blasen des Anzugs unter Druck gesetzt werden,
        um G-Schutz zu gewährleisten.
    anti_g_suit_size_system:
      name: Größensystem des Anti-G-Anzugs
      description: Größenstandard zur Angabe des Anzuggrößen-/Passformsystems.
    anti_reverse_type:
      name: Typ der Rücklaufsperre
      description: Gibt die Art des bereitgestellten Rücklaufsperrmechanismus an,
        der sich auf das Anschlagen des Hakens und Spiel nach hinten auswirkt.
    anti_theft_feature:
      name: Diebstahlschutzfunktion
      description: Gibt an, ob die Halterung/der Halter Diebstahlschutz bietet, z. B.
        durch abschließbare Befestigungen oder eine manipulationssichere Konstruktion.
    antique_gun_ignition_system:
      name: Zündsystem der antiken Schusswaffe
      description: Gibt das historische Zündsystem der antiken Feuerwaffe an.
    apple_variety:
      name: Apfelsorte
      description: Gibt die Apfelsorte oder -varietät an (z. B. Gala, Fuji, Granny
        Smith) und hilft Kund:innen so bei der Auswahl anhand von Geschmack, Konsistenz
        und kulinarischer Verwendung.
    applique_edge_finish:
      name: Abschluss der Applikationskanten
      description: Beschreibt die Kantenverarbeitung, was sich auf die Widerstandsfähigkeit
        gegen Ausfransen auswirkt.
    arbor_type:
      name: Laubentyp
      description: Klassifiziert die Rolle anhand der Konstruktion der Spulenwelle,
        die sich auf die Schnureinzugsgeschwindigkeit, die Backing-Kapazität und den
        Memory-Effekt der Schnur auswirkt.
    archery_accessory_type:
      name: Typen von Zubehör für Bogenschießen
      description: Gibt die Art des Zubehörs für Bogenschießgeräte an, damit Käufer:innen
        Produkte schnell filtern können.
    archery_part_type:
      name: Typen von Teilen für Bogenschießen
      description: Kennzeichnet die spezifische Hardware oder das Ersatzteil, das
        verkauft wird (z. B. Mittelteil, Wurfarm, Bogensehne), und ermöglicht so ein
        präzises Filtern, ohne die Kategorienstruktur aufzubrechen.
    archery_range_accessory_type:
      name: Typen des Zubehörs für Bogenschießanlagen
      description: Klassifiziert die Art des Zubehörs, das auf einem Bogenschießstand
        verwendet wird, und ermöglicht es Käufer:innen, schnell nach genau den benötigten
        Artikeln zu filtern.
    archery_target_features:
      name: Merkmale von Bogenschießzielen
      description: Listet spezielle Leistungs- oder Komfortmerkmale auf, die nicht
        von anderen Produktattributen abgedeckt werden (z. B. selbstheilender Schaumstoff,
        Tragegriff).
    archery_tool_type:
      name: Bogenschießwerkzeug-Typ
      description: Klassifiziert die jeweilige Art des Bogenschießwerkzeugs oder Ausrüstungsteils.
    armband_features:
      name: Armbandmerkmale
      description: Listet besondere funktionale oder visuelle Merkmale auf, die das
        Armband aufwerten.
    armguard_style:
      name: Armschutzstil
      description: Definiert den Konstruktionsstil oder Formfaktor des Armschutzes
        und bietet Einblick in die Abdeckung sowie das traditionelle oder moderne
        Design.
    armor_protection_type:
      name: Art von Fahrzeugpanzerung
      description: Art des Schutzes, der durch das Fahrzeugpanzerungssystem geboten
        wird.
    armrest_adjustability:
      name: Verstellbarkeit der Armlehne
      description: Definiert die dimensionale Einstellbarkeit und Konfiguration der
        Armlehnen des Stuhls (z. B. fest, 2D, 3D, hochklappbar).
    armrest_type:
      name: Armlehnentyp
      description: Beschreibt das Vorhandensein und die Einstellbarkeit von Armlehnen
        am Stuhl (z. B. keine Armlehnen, fest, verstellbar, abnehmbar).
    arrow_bolt_point_type:
      name: Pfeil-/Bolzenspitze
      description: Definiert die Art der Spitze, die an einem Pfeil oder Bolzen angebracht
        ist.
    arrow_component_type:
      name: Pfeilkomponententyp
      description: Klassifiziert das spezifische Teil oder Zubehör für einen Pfeil
        (Einsatz, Ummantelung, Buchse, Klebstoff usw.), damit Kund:innen Artikel filtern
        können, ohne Dutzende zusätzlicher Unterkategorien zu benötigen.
    arrow_containment_level:
      name: Pfeilhaltestufe
      description: Beschreibt, ob die Auflage den Pfeil vollständig, teilweise oder
        gar nicht umschließt.
    arrow_fletching_orientation:
      name: Ausrichtung der Pfeilbefiederung
      description: Gibt die Flügel- oder Versatzorientierung der Befiederung an (z. B.
        linksflügelig, rechtsflügelig, spiralförmig), die die Drehrichtung des Pfeils
        bestimmt.
    arrow_nock_groove_size:
      name: Größe der Pfeilnockennut
      description: Gibt die Größenklassifizierung der Sehnennut bzw. des Nockenhalses
        an und bestimmt so die Kompatibilität mit verschiedenen Bogensehnendurchmessern.
    arrow_nock_type:
      name: Pfeilnocken-Typ
      description: Design/Stil der Pfeilnocke, die mit der Bogensehne interagiert.
    arrow_rest_style:
      name: Bauart der Pfeilauflage
      description: Gibt den funktionalen Stil/Mechanismus der Pfeilauflage an (z. B.
        Drop-away, Blade, Whisker Biscuit). Die Bauart bestimmt, wie die Auflage den
        Pfeil stützt, umschließt und freigibt und ist bei Produkten für Käufer:innen
        ein primäres Unterscheidungsmerkmal.
    arrow_shaft_compatibility:
      name: Pfeilschafkompatibilität
      description: Gibt den Pfeilschaft-/Buchsenstandard an, zu dem die beleuchtete
        Nocke passt (z. B. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Spitzenstil für Kunst-/Bastelwerkzeuge
      description: Beschreibt die Form/das Profil der Arbeitsspitze (z. B. spitz vs.
        abgerundete Kugel), um die Art der von ihr erzeugten Prägespur zu kennzeichnen.
    art_ink_lightfastness_rating:
      name: Lichtechtheitsbewertung von Künstlertinte
      description: Gibt die Lichtbeständigkeit der Tinte an, die typischerweise durch
        Standardbewertungen ausgedrückt wird.
    art_ink_opacity:
      name: Deckkraft von Künstlertinte
      description: Gibt den Deckkraftgrad der Tinte nach dem Auftragen an.
    art_security_rating:
      name: ART-Sicherheitsbewertung
      description: Gibt die niederländische ART-Sternebewertung (1–5 Sterne) des Schlosses
        an.
    artichoke_cut:
      name: Artischockenschnitt
      description: Gibt an, welcher Teil oder welche Zubereitungsart der Artischocke
        angeboten wird (z. B. ganz, Herz, Boden), damit Kund:innen die Machart und
        die beabsichtigte kulinarische Verwendung einschätzen können.
    artichoke_variety:
      name: Artischockensorte
      description: Gibt die Sorte oder botanische Varietät der Artischocke an, um
        Käufer:innen die Unterscheidung hinsichtlich Größe, Farbe, Geschmack und kulinarischer
        Verwendung zu erleichtern.
    articulation_features:
      name: Gelenkmerkmale
      description: Gibt an, ob das Dinosaurier-Modell bewegliche Teile (beweglicher
        Kiefer, Gliedmaßen, Schwanz) und eine allgemeine Beweglichkeit aufweist.
    artificial_bait_form:
      name: Form des Kunstköders
      description: Gibt die physische Form oder die Präsentationsart des Angelköders
        bzw. Lockmittels an.
    asa_mounting_type:
      name: ASA-Montageart
      description: Gibt die Art der Air Source Adapter (ASA)-Schnittstelle oder den
        Montagestandard an, den der Drop Forward verwendet (z. B. Schwalbenschwanz,
        Schiene, Direktmontage).
    ascender_descender_type:
      name: Steig-/Abstiegsleitertyp
      description: Klassifiziert den Typ des Steig- oder Abseilgeräts für eine präzisere
        Filterung.
    aspiration_type:
      name: Art der Luftzufuhr
      description: Zeigt an, ob es sich um einen Saug- oder Turbomotor handelt.
    assembly_state:
      name: Montageart
      description: Gibt an, ob der Schrank als Bausatz, vormontiert oder in einer
        anderen Form geliefert wird.
    assistance_mechanism:
      name: Unterstützungsmechanismus
      description: Gibt an, ob der Power Tower über eingebaute Unterstützungs- oder
        Widerstandssysteme für Klimmzüge, Dips oder andere Übungen verfügt.
    atemoya_cultivar:
      name: Atemoya-Sorte
      description: Gibt die benannte Sorte/Varietät der Atemoya-Frucht an, damit Käufer:innen
        Früchte mit dem von ihnen bevorzugten Geschmack, der gewünschten Größe oder
        den gewünschten Sameneigenschaften auswählen können.
    athletic_cup_size:
      name: Größe der Suspensorien für Sportler
      description: Gibt die vom Hersteller festgelegte Größe des Tiefschutzes an,
        um eine korrekte Passform für den Sportler zu gewährleisten.
    attachment_position:
      name: Befestigungsposition
      description: Gibt an, wo die Tasche am Sattel oder an der Reitausrüstung befestigt
        wird.
    attractant_scent_profile:
      name: Duftprofil des Lockstoffs
      description: Beschreibt den spezifischen Geruch oder Geschmack, der dazu dient,
        Wildtiere anzulocken oder den menschlichen Geruch zu überdecken.
    atv_utv_intended_use:
      name: ATV/UTV-Verwendungszweck
      description: Primärer Verwendungszweck/Stil des ATV/UTV.
    audio_channel_configuration:
      name: Audiokanalkonfiguration
      description: Die Anzahl der diskreten Audiokanäle, die vom Equalizer/DSP unterstützt
        werden (z. B. 2-Kanal-Stereo, 4-Kanal-Front/Rear, 6-Kanal).
    audio_inputs:
      name: Audioeingänge
      description: Gibt die Art der Audioeingangsverbindung (je nach Kontext) an,
        die für die Abtastung/Aufnahme zur Verfügung stehen (z. B. 6,35-mm-Klinke,
        XLR, 3,5-mm-Klinke, Mikrofonvorverstärker, Phono).
    audio_output:
      name: Audioausgang
      description: Gibt an, ob das Spielzeug Geräusche macht und wie die Audioausgabe
        erfolgt.
    audio_outputs:
      name: Audioausgänge
      description: Gibt die verfügbaren Audioausgänge an, abhängig vom Kontext, einschließlich
        der Hauptausgänge und aller zuweisbaren/Aux-Ausgänge.
    audio_playback_source:
      name: Audiowiedergabequelle
      description: Gibt die Hauptmedienquellen für die Musik an, die das Karaoke-Set
        abspielen kann.
    autograph_authentication:
      name: Autogramm-Authentifizierung
      description: Gibt den Authentifizierungsstatus/-typ für ein Autogramm auf der
        Karte an.
    autograph_format:
      name: Autogrammformat
      description: Beschreibt, ob es sich bei der Signatur um ein originales handsigniertes
        Autogramm, ein gestempeltes/gedrucktes Faksimile oder eine Inschrift/ein Add-on
        handelt.
    autogyro_cockpit_enclosure:
      name: Cockpitverkleidung für Tragschrauber
      description: Gibt an, ob das Cockpit offen oder geschlossen ist.
    available_firing_modes:
      name: Verfügbare Feuermodi
      description: Listet die auswählbaren Feuermodi auf, die der Markierer standardmäßig
        unterstützt.
    avocado_variety:
      name: Avocadosorte
      description: Gibt die Avocadosorte an und hilft Käufer:innen, Unterschiede in
        Geschmack, Textur, Größe und Ölgehalt zu erkennen.
    award_customization_included:
      name: Anpassung der Auszeichnung inklusive
      description: Gibt an, welche Personalisierung/Anpassung im Kauf der Auszeichnung
        enthalten ist.
    award_material:
      name: Machart der Auszeichnung
      description: Bezeichnet das/die Haupmerkmal(e) der Auszeichnung (z. B. Trophäe,
        Plakette, Medaille, Anstecknadel, Band, Pokal).
    award_mounting_display_type:
      name: Montage-/Präsentationsart der Auszeichnung
      description: Bezeichnet, wie die Auszeichnung präsentiert oder angebracht wird
        (Wand, Schreibtisch, tragbar).
    award_plaque_plate_material:
      name: Material für Auszeichnungsplaketten
      description: Gibt das Material des Namensschildes/der Gravurplatte an, die an
        der Plakette angebracht ist (zu unterscheiden vom Trägermaterial).
    award_ribbon_attachment_type:
      name: Befestigungsart für Auszeichnungsbänder
      description: Gibt an, wie das Band befestigt oder getragen werden soll.
    award_ribbon_imprint_method:
      name: Druckverfahren für Auszeichnungsbänder
      description: Bezeichnet, wie Text/Grafiken auf das Menüband angewendet werden.
    award_ribbon_material:
      name: Material für Auszeichnungsbänder
      description: Primärmaterial des Bandstoffs (z. B. Satin oder Polyester).
    award_ribbon_placement_title:
      name: Platzierung/Titel der Auszeichnungsschleife
      description: Die durch das Band symbolisierte Platzierung oder der Titel (z. B.
        1. Platz, erfolgreiche Teilnahme).
    axle_compatibility:
      name: Achsenkompatibilität
      description: Gibt den Achsstandard an, den das Rad unterstützt, um die Kompatibilität
        mit Rahmen und Gabel sicherzustellen.
    back_beam_type:
      name: Rückstrahlertyp
      description: Typ bzw. Einstellbarkeit des hinteren Trägers (z. B. fest oder
        höhenverstellbar).
    back_design:
      name: Rückseitendesign
      description: Beschreibt besondere Rückenkonstruktionen an Kleidungsstücken,
        die sich auf Stil und Halt auswirken.
    back_panel_type:
      name: Rückwandtyp
      description: Gibt Stil und Material der Rückwand des Gehäuses an, was sich auf
        die Sichtbarkeit der Ausstellungsstücke und die Abstimmung mit der Dekoration
        auswirkt.
    back_sides_material:
      name: Material für Rückseite und Seiten
      description: Bezeichnet das Material, das für die Rückseite und die Zargen des
        Korpus der klassischen Gitarre verwendet wird.
    backing_type:
      name: Trägerart
      description: Beschreibt die Träger- bzw. Befestigungsart des angebotenen Strasssteins
        (bei selbstklebenden Produkten).
    backup_camera_mounting_location:
      name: Montageort der Rückfahrkamera
      description: Gibt den vorgesehenen Einbauort der Rückfahrkamera am Fahrzeug
        an.
    backup_camera_video_interface:
      name: Rückfahrkamera-Videoschnittstelle
      description: Gibt den Videoausgang/die Schnittstelle/den Anschluss an, der von
        der Rückfahrkamera verwendet wird, um eine Verbindung zu einem Monitor, DVR
        oder einer Haupteinheit herzustellen (z. B. Composite RCA, LVDS OEM, IP über
        Ethernet).
    badminton_set_components_included:
      name: Enthaltene Komponenten des Badminton-Sets
      description: Listet die Einzelteile in einem Badminton-Set auf.
    bag_attachment_method:
      name: Beutelbefestigungsmethode
      description: Kennzeichnet die primäre Methode, mit der der Trinkbeutel/Halter
        an anderer Ausrüstung befestigt wird (z. B. MOLLE-Gurtband, Gürtelschlaufe,
        Karabiner).
    bag_case_carrying_style:
      name: Transportart von Gigbag/Koffer
      description: Gibt die primäre Transportart von Gigbag/Koffer an, bzw. wie der
        Instrumentenschutz zum Tragen konzipiert ist.
    bag_cover_material:
      name: Taschenhüllenmaterial
      description: Gibt das Material der Taschenhülle (Außenhülle) an, das Haltbarkeit,
        Griffigkeit und Aussehen beeinflusst.
    bag_embellishment:
      name: Taschenverzierung
      description: Beschreibt auffällige dekorative Elemente an der Außenseite der
        Tasche, wie Quasten, Nieten oder Steppnähte.
    bag_fill_medium:
      name: Beutelfüllmaterial
      description: Gibt an, welches Material zum Befüllen des Beutels verwendet wird
        (z. B. Luft, Wasser, Sand).
    bag_material:
      name: Beutelmaterial
      description: Material des Airbags/Beutels.
    bag_padding_level:
      name: Polsterungsgrad des Beutels
      description: Gibt den Grad oder die Art der in die Tasche oder Hülle eingearbeiteten
        Polsterung an.
    bag_size_descriptor:
      name: Taschengrößenbeschreibung
      description: Marketing-Größenklasse der Beuteltasche (z. B. Mini oder Groß)
        als Ergänzung zu den exakten Dimensionen.
    bagel_size:
      name: Bagelgröße
      description: Gibt die allgemeine Größe des Bagels an, z. B. Mini, Thin, Standard,
        Large, Extra Large und Jumbo.
    bagpipe_accessories_included:
      name: Dudelsackzubehör inklusive
      description: Listet die wichtigsten Komponenten/Zubehörteile auf, die zum Dudelsack
        gehören (neben der Kernrohre), zum Beispiel Kiste, Übungschanter, Abdeckung,
        Schnüre, Feuchtigkeitsregulierung.
    bagpipes_playing_mode:
      name: Spielmodus des Dudelsacks
      description: Wie das Instrument während des Spielens mit Luft versorgt wird.
    bait_compatibility:
      name: Köderart
      description: Listet die Köderarten auf, für die das Pellet-Zubehör ausgelegt
        ist, damit Angler sicherstellen können, dass das gewählte Werkzeug zum bevorzugten
        Köder passt.
    bait_species:
      name: Köderarten
      description: Kennzeichnet den primären Organismus, der als Köder angeboten wird,
        und hilft Anglern dabei, die Zulässigkeit und Wirksamkeit für die Zielfischart
        sicherzustellen.
    baking_chip_form:
      name: Backflocken-Form
      description: Beschreibt die physische Größe oder Form der Backchips, die das
        Schmelzverhalten und das Aussehen des Rezepts beeinflusst.
    balance_board_style:
      name: Balance-Board-Stil
      description: Klassifiziert Balance-Boards nach ihrem Mechanismus oder ihrer
        Konstruktionsart, um anzuzeigen, wie sich das Board bewegt und welche Trainingsherausforderung
        geboten wird.
    balance_cushion_accessories_included:
      name: Balance-Kissenzubehör im Lieferumfang enthalten
      description: Listet sämtliches Zubehör auf, das zusammen mit dem Kissen geliefert
        wird, damit Käufer:innen den Umfang des Bundles vergleichen können.
    balance_type:
      name: Balanceart
      description: Gibt die Auswuchtgüte oder -klasse der Antriebswelle im Verkaufszustand
        an (z. B. Präzisionsindustrie, hohe Präzision oder Unwucht).
    ball_bladder_material:
      name: Material der Ballblase
      description: Gibt das Material der inneren Ballblase des Handballs an, das sich
        auf Luftdichtigkeit, Sprungverhalten und allgemeine Haltbarkeit auswirkt.
    ball_certification:
      name: Ballzertifizierung
      description: Kennzeichnet offizielle Leistungszertifizierungen, die der Ball
        erhalten hat.
    ball_construction:
      name: Machart des Balls
      description: Gibt das Herstellungsverfahren an, mit dem die einzelnen Panels
        des Balls verbunden wurden. Dies beeinflusst Haltbarkeit, Haptik, Wasseraufnahme
        und Preis.
    ball_core_construction:
      name: Innenmaterial des Ball
      description: Gibt den inneren Aufbau des Balls an, der sich auf den Rückprall
        und das Ballgefühl auswirkt.
    ball_core_type:
      name: Bauart der Ballfüllung
      description: Gibt die innere Konstruktion des Balls an, die sich auf Sprungverhalten
        und Gewichtsverteilung auswirkt.
    ball_cup_game_included_pieces:
      name: Ball- und Becherspiel, inklusive Spielmaterialien
      description: Gibt an, welche Komponenten im Produktpaket für ein Ball-und-Becher-Spiel
        enthalten sind.
    ball_drilling_state:
      name: Bohrzustand des Balls
      description: Gibt an, ob Fingerlöcher in den Ball gebohrt wurden und falls ja,
        in welchem Umfang.
    ball_holder_type:
      name: Ballhaltertyp
      description: Kennzeichnet den Konstruktionsstil oder Formfaktor des Ballhalters.
    ball_pit_ball_surface_finish:
      name: Oberflächenbeschaffenheit der Bälle im Bällebad
      description: Beschreibt die taktile/visuelle Beschaffenheit der Balloberfläche,
        die Einfluss auf Griffigkeit, Spielgefühl und Reinigung hat.
    ball_pit_safety_features:
      name: Sicherheitsmerkmale des Bällebads
      description: Sicherheitsrelevante Konstruktionsmerkmale von Bällebädern.
    ball_pump_accessory_type:
      name: Zubehörtyp für Ballpumpen
      description: Definiert die jeweilige Art des Ballpumpenzubehörs, damit Händler:innen
        Manometer, Schläuche, Schmiermittel und weiteres Zubehör innerhalb einer einzigen
        übergeordneten Kategorie labeln können.
    ball_return_mechanism:
      name: Ballrückgabemechanismus
      description: Gibt gegebenenfalls die Art der in der Matte integrierten Ballrückführung
        an.
    ball_return_type:
      name: Ballrücklauftyp
      description: Art des Taschen-/Rückgabesystems, das die Bälle während des Spiels
        wieder einsammelt.
    ball_speed_rating:
      name: Ballgeschwindigkeitsbewertung
      description: Vom Hersteller festgelegte Geschwindigkeitskategorie, die angibt,
        wie schnell sich der Ball unter Standardbedingungen verhält.
    ball_surface_texture:
      name: Oberflächenstruktur des Balls
      description: Beschreibt die äußere Textur oder das Streifenmuster der Bälle,
        das sich auf Griffigkeit und Ästhetik auswirken kann.
    ball_surface_type:
      name: Außenmaterial des Balls
      description: Beschreibt die äußere Oberfläche oder Polsterung des Balls, die
        sich auf Ballsgefühl und Griffigkeit auswirkt.
    ballonet_configuration:
      name: Ballonet-Konfiguration
      description: Typ/Konfiguration des Ballonet-Systems zur Trimmung und Druckregulierung
        (für nicht starre/halbstarre Luftschiffe).
    balloon_closure_valve_type:
      name: Ballonverschluss-/Ventiltyp
      description: Gibt an, wie der Ballon nach dem Aufblasen verschlossen wird (z. B.
        durch Knoten, selbstschließendes Ventil).
    balloon_kit_finish:
      name: Ballon-Setmaterial
      description: Beschreibt die Oberflächenbeschaffenheit bzw. das optische Finish
        der im Kit enthaltenen Ballons.
    balloon_kit_material:
      name: Material des Ballon-Kits
      description: Gibt das Hauptmaterial der im Set enthaltenen Ballons an.
    banana_variety:
      name: Bananensorte
      description: Gibt die angebotene Bananensorte bzw. die Bananenart an.
    banjo_head_type:
      name: Typ des Banjofells
      description: Typ bzw. Material des Banjofells, das Klangfarbe, Lautstärke und
        Spielgefühl beeinflusst.
    banjo_neck_material:
      name: Material des Banjohals
      description: Material des Halses, das Spielgefühl, Stabilität und Klang beeinflusst.
    banjo_pickup_configuration:
      name: Pickup-Konfiguration des Banjos
      description: Gibt an, ob das Banjo ein fest installiertes Pickup hat und, falls
        ja, welcher Pickup-Typ verbaut wurde.
    banjo_rim_material:
      name: Banjo-Kesselmaterial
      description: Das Material des Kessels (des runden Korpus), das sich maßgeblich
        auf Klangfarbe und Gewicht auswirkt.
    banjo_tone_ring_type:
      name: Art des Banjo-Tonrings
      description: Gibt die Bauart bzw. Materialfamilie des Tonrings des Banjos an,
        die Klangfarbe und Lautstärke prägt.
    banjo_tuning_machine_type:
      name: Banjo-Stimmmechanikart
      description: Art der Stimmmechanik, die beim Banjo verwendet wurde.
    banknote_authentication_grading:
      name: Echtheitsprüfung/Grading von Banknoten
      description: Drittanbieterdienst (falls vorhanden), der die Banknote authentifiziert
        bzw. bewertet hat.
    banknote_grade:
      name: Banknotenbewertung
      description: Standardisierte Bewertung der Banknote auf einer Sammlerskala für
        Banknoten.
    banknote_holder_type:
      name: Typ des Banknotenhalters
      description: Gibt den Erhaltungszustand der Banknote an (z. B. lose oder gekapselte
        Scheine).
    banknote_material:
      name: Material der Banknote
      description: Primäres Substrat/Material der Banknote.
    banknote_security_features:
      name: Banknoten-Sicherheitsmerkmale
      description: Auffällige Sicherheits-/Gestaltungsmerkmale der Banknote.
    banknote_serial_number_type:
      name: Typ der Banknotenseriennummer
      description: Gibt an, ob die Seriennummer vorhanden ist und/oder besondere Sammlermerkmale
        aufweist (neben der eigentlichen Nummer).
    banner_display_location:
      name: Einsatzort des Banners
      description: Gibt den vorgesehenen Einsatzort des Banners an (z. B. Türrahmen,
        Wand oder Tischhintergrund).
    banner_hanging_hardware_type:
      name: Typ der Banneraufhängung
      description: Gibt die primären Aufhänge- bzw. Befestigungselemente an, die im
        Banner integriert oder im Lieferumfang enthalten sind (z. B. Ösen, Stangendurchführung
        oder Seil).
    banner_message_type:
      name: Typ der Bannernachricht
      description: Gibt an, ob der Bannertext bzw. die Bannernachricht vorgedruckt
        (fest) oder leer/anpassbar ist.
    banner_shape:
      name: Bannerformen
      description: Gibt die Form/den Zuschnitt des Sportfanbanners an.
    banquette_configuration:
      name: Sitzbankaufbau
      description: Form oder Ausrichtung der Sitzbank.
    bar_coating:
      name: Riegelbeschichtung
      description: Gibt an, ob und gegebenenfalls welche essbare Außenbeschichtung
        auf den Riegel aufgebracht wurde.
    bar_pad_style:
      name: Lenkerpolster-Stil
      description: Designstil der Lenkerpolsterung und der Abdeckung.
    bar_texture:
      name: Stangenstruktur
      description: Beschreibt die allgemeine Textur oder den Biss des Riegels.
    barb_type:
      name: Widerhaken-Typ
      description: Gibt an, ob der Haken einen Widerhaken hat und um welche Art von
        Haken es sich handelt.
    barbell_finish:
      name: Finish der Langhantel
      description: Gibt das Schutz- oder ästhetische Oberflächenverfahren/die Beschichtung
        an, die auf die Stange und/oder die Hülsen aufgebracht wurde und die sich
        auf die Korrosionsbeständigkeit, das Griffgefühl und den Preis auswirkt.
    barbell_knurling_pattern:
      name: Rändelmuster der Langhantel
      description: Gibt die Art und den Charakter der gerändelten Griffpartie einer
        Langhantel an, einschließlich spezifischer Markierungen für Powerlifting oder
        Gewichtheben.
    barista_suitability:
      name: Eignung als Barista
      description: Beschreibt, ob das Produkt für die Zubereitung und das Aufschäumen
        von Kaffee ausgelegt ist.
    barre_rail_configuration:
      name: Konfiguration der Ballettstange
      description: Gibt die Anzahl der horizontalen Stangen an, die mit der Ballettstange
        geliefert werden.
    barrel_or_cask_type:
      name: Fasstyp
      description: Gibt die Art des Fasses an, das zur Reifung oder Veredelung des
        Tequilas verwendet wurde (z. B. amerikanische Eiche, Ex-Bourbon-Fass oder
        Sherryfass).
    barrel_profile:
      name: Fassprofil
      description: Beschreibt die Gesamtform bzw. Balance des Dartbarrels.
    barrel_thread_standard:
      name: Fass-Gewindestandard
      description: Kennzeichnet das Laufgewinde des Markierers zur Sicherstellung
        der Kompatibilität mit Nachrüstläufen.
    base_anchoring_method:
      name: Sockelverankerung
      description: Gibt an, wie der Sockel am Boden befestigt ist und zeigt damit
        ihre Eignung für verschiedene Oberflächen und Spielbedingungen an.
    base_ballast_method:
      name: Sockelballastmethode
      description: Gibt an, wie (oder ob) der Sockel des Trainingsgeräts zur Stabilisierung
        beschwert ist (z. B. mit Wasser oder Sand gefüllt).
    base_configuration:
      name: Bettgestellkonstruktion
      description: Gibt die strukturelle Konfiguration der Panelbasis an.
    base_fill_material:
      name: Sockelfüllmaterial
      description: Gibt an, welches Material zum Füllen oder Beschweren des Sockels
        der Basketball-Mannequin verwendet wird, was sich auf die Stabilität und den
        Aufbauaufwand auswirkt.
    base_ingredient:
      name: Grundzutat
      description: Kennzeichnet die hauptsächlich verwendeten Zutaten aus landwirtschaftlicher
        Herkunft, aus dem der Shochu oder Soju destilliert wurde.
    base_oil_type:
      name: Basisöltyp
      description: Gibt die Zusammensetzung des Basisöls der Getriebeflüssigkeit an
        (z. B. vollsynthetisch, teilsynthetisch oder konventionell).
    base_storage_type:
      name: Basisstauraumtyp
      description: Gibt an, ob die Basis über integrierten Stauraum verfügt und welcher
        Mechanismus verwendet wird.
    baseball_glove_type:
      name: Baseballhandschuh-Typ
      description: Kategorisiert den Handschuh oder Fanghandschuh nach Spielerposition
        oder funktionellem Zweck.
    baseball_softball_league_certification:
      name: Baseball- und Softball-Liga-Zertifizierung
      description: Gibt an, welchen Verbands- oder Ligastandard das Produkt erfüllt.
    baseball_softball_usage_role:
      name: Baseball-/Softball-Nutzungsrolle
      description: Gibt an, für welche Rolle oder welchen Teilnehmertyp auf dem Spielfeld
        der Beinschutz vorgesehen ist (z. B. Fänger:in, Schlagfrau/-mann, Schiedsrichter:in,
        Feldspieler:in).
    baseball_toy_set_components_included:
      name: Enthaltene Komponenten des Baseball-Sets für Kinder
      description: Gibt an, welche Baseball-Komponenten im Produkt enthalten sind
        (z. B. Schläger, Ball, Tee oder Bases).
    baseplate_construction:
      name: Grundplattenkonstruktion
      description: Gibt das Herstellungsverfahren der LKW-Grundplatte an, was sich
        auf Festigkeit und Gewicht auswirkt.
    basketball_hoop_accessory_type:
      name: Zubehörtyp für Basketballkörbe
      description: Klassifiziert die jeweilige Art des Teil oder Zubehörs vom Basketballkorb
        zum Filtern und Vergleichen.
    basketball_padding_location:
      name: Basketball-Polsterungsposition
      description: Kennzeichnet den Teil des Basketballsystems, der durch das Polster
        abgedeckt werden soll.
    basketball_rim_type:
      name: Typ des Basketballrings
      description: Gibt den strukturellen oder Leistungsstil des Basketballkorbs an,
        damit Käufer:innen das Design auswählen können, das dem eigenen Spielniveau
        und Installationsanforderungen entspricht.
    basketball_toy_features:
      name: Funktionen des Basketballspielzeugs
      description: Gibt besondere Spiel- und Funktionsmerkmale von Basketballartikels
        an, die über grundlegende Abmessungen hinausgehen.
    bass_clarinet_body_material:
      name: Material des Bassklarinettenkorpus
      description: Primärmaterial des Bassklarinettenkorpus (ohne Klappenmechanik,
        Stege und sonstige Metallbeschläge).
    bass_clarinet_lowest_written_note:
      name: Tiefster notierter Ton der Bassklarinette
      description: Der tiefste Ton, den die Bassklarinette spielen kann (von Spieler:innen
        oft als tiefes E♭, tiefes D, tiefes C oder Tief-H-Erweiterungsset bezeichnet).
    bass_drum_beater_head_shape:
      name: Kopfform des Bassdrum-Schlägels
      description: Beschreibt die geometrische Form bzw. das Profil der Schlagfläche
        des Bassdrum-Schlägels (die Fläche, die mit dem Trommelfell in Kontakt kommt).
    bass_drum_beater_shaft_material:
      name: Material des Schlägelschafts einer Bassdrum
      description: Gibt das Material der Schlägerwelle/-stange an (nicht des Schlägerkopfes).
    bass_drum_head_built_in_muffling:
      name: Integrierte Dämpfung des Bassdrumfells
      description: Art der integrierten Dämpfung bzw. Schalldämpfung im Fell-Design.
    bass_drum_head_configuration:
      name: Bassdrumfell-Konfiguration
      description: Beschreibt, welche Felle beim Kauf im Lieferumfang der Bassdrum
        enthalten bzw. bereits montiert sind.
    bass_drum_head_surface_finish:
      name: Oberflächenbeschaffenheit des Bassdrumfells
      description: Oberflächenstruktur/-beschaffenheit des Bassdrumfells.
    bass_drum_head_type:
      name: Typ des Bassdrumfells
      description: Bauart oder spezielle Konstruktion des Bassdrumfells.
    bass_drum_hoop_material:
      name: Material des Bassdrum-Spannreifens
      description: Kennzeichnet das Material des Bassdrum-Spannreifens (Gegenspannreifen),
        welches sich auf Haltbarkeit, Ästhetik und Gewicht auswirkt.
    bass_drum_mounting_style:
      name: Montageart für Bassdrum
      description: Gibt an, wie die Bassdrum gehalten/verwendet werden soll (mit Bassdrumbeinen,
        Wiege/Ständer, als Marschtrommel usw.).
    bass_harmonica_comb_material:
      name: Material des Kamms der Bassmundharmonika
      description: Material des Kamms/Korpus (Luftkammerblock) der Bassmundharmonika.
    bass_harmonica_mouthpiece_style:
      name: Mundstückstil der Bassharmonika
      description: Kennzeichnet die Mundstückart der Bassmundharmonika.
    bass_harmonica_reed_material:
      name: Material der Bassmundharmonika-Blätter
      description: Material der in der Bassmundharmonika verwendeten Stimmzungen.
    bass_harmonica_tuning_system:
      name: Bassharmonika-Stimmsystem
      description: Gibt das Stimmsystem/die Stimmung der Bassmundharmonika an.
    bass_recorder_bocal_type:
      name: Art des S-Bogens der Bassblockflöte
      description: Gibt die Bauart des S-Bogens/Windkanals an, der verwendet wird,
        um das Mundstück einer Bassblockflöte zu verbinden.
    bass_recorder_included_accessories:
      name: Bassblockflöte inklusive Zubehör
      description: Listet das im Bassblockflöten-Set enthaltene Zubehör auf.
    bass_recorder_keywork_material:
      name: Material der Klappenmechanik der Bassblockflöte
      description: Gibt das Material der Blockflötenmechanik an (falls vorhanden).
    bass_trombone_slide_material:
      name: Zugmaterial der Bassposaune
      description: Gibt das primäre Material/die Beschichtung der äußeren Zugrohre
        (und/oder der Zugbaugruppe) für die Bassposaune an.
    bass_trombone_valve_wrap_style:
      name: Bauart des Ventilverlaufs der Bassposaune
      description: Gibt die Bauart der Ventilführung des Instruments an.
    bass_ukulele_string_type:
      name: Saitentyp der Bass-Ukulele
      description: Gibt den allgemeinen Saitentyp an, der auf der Bass-Ukulele verwendet
        wird.
    bassinet_cradle_accessory_features:
      name: Merkmale des Zubehörs für Babybetten und Wiegen
      description: Bezeichnet bemerkenswerte funktionelle Merkmale oder Eigenschaften
        des Babybett- oder Wiegenzubehörs (z. B. wasserdicht, bio-zertifiziert, hypoallergen).
    bassoon_bell_material:
      name: Material des Fagott-Kopfstücks
      description: Gibt das Material des Fagottschallbechers an.
    bassoon_bocal_system:
      name: S-Bogensystem des Fagotts
      description: Die Bocal-Variante bzw. der Bocal-Typ für verschiedene Fagottsysteme
        und Einsatzbereiche.
    bassoon_case_shell_type:
      name: Hartschalentyp des Fagottkoffers
      description: Gibt die Schutzkonstruktion des Koffers an (weich, hart oder hybrid).
    bassoon_keywork_material:
      name: Material der Fagottmechanik
      description: Material und/oder Beschichtung der Fagottmechanik (Klappen und
        mechanische Beschläge).
    bassoon_model_level:
      name: Spielniveau des Fagottmodells
      description: Gibt das empfohlene Spielniveau für das Fagott an.
    bassoon_performance_level:
      name: Leistungsprüfungsniveau des Fagotts
      description: Gibt das vorgesehene Spielniveau für das Fagottmodell an.
    bassoon_reed_scrape_style:
      name: Schabstil des Fagottrohrblatts
      description: Gibt die Schab- bzw. Profilform des Fagottrohrblatts an.
    bassoon_reed_thread_color:
      name: Fadenfarbe des Fagottrohrblatts
      description: Farbe des Bindefadens, der am Rohrblatt verwendet wird.
    bassoon_reed_type:
      name: Fagottrohrblatttyp
      description: Gibt die Art des Fagottrohrblatts an, zu dem das Produkt passt
        (sofern zutreffend).
    bassoon_system:
      name: Fagottsystem
      description: Benennt das Fagottklappensystem bzw. die Konstruktionstradition,
        die beim Instrument verwendet wurde.
    bat_construction:
      name: Aufbau des Schlägers
      description: Gibt an, aus wie vielen einzelnen Teilen oder verbundenen Abschnitten
        der Schlägerkörper besteht (z. B. einteilig, zweiteilig, Hybrid), was sich
        auf Flexibilität, Vibrationsdämpfung und Gesamtleistung auswirkt.
    bat_handle_size_compatibility:
      name: Griffgröße des Schlägers
      description: Gibt die Größe(n) des Cricketschlägergriffs an, für die der Griff
        geeignet ist.
    bath_book_interactive_features:
      name: Interaktive Funktionen des Badebuchs
      description: In das Badebuch integrierte Spiel- und Lernfunktionen.
    bath_bubble_machine_features:
      name: Funktionen der Badewannendüse
      description: Zentrale Funktionsmerkmale der Badeschaummaschine über die grundlegende
        Schaumerzeugung hinaus.
    bath_crayon_features:
      name: Merkmale von Badekreiden
      description: Zentrale Funktions- und Sicherheitsmerkmale von Badekreiden.
    bath_squirter_spray_pattern:
      name: Sprühmuster der Badewasserspritze
      description: Beschreibt, wie die Badewannendüse beim Zusammendrücken oder Aktivieren
        Wasser abgibt (das Ausgabemuster).
    bath_toy_molded_drain_design:
      name: Design mit integriertem Abfluss bei Badespielzeug
      description: Gibt an, ob das Spielzeug so konstruiert ist, dass Wasser abläuft
        oder es trocknet, um die Wasserbindung zu reduzieren.
    bath_toy_water_play_function:
      name: Funktionen des Badespielzeugs
      description: Kennzeichnet den primären Wasserinteraktions- bzw. Spielmechanismus
        des Spielzeugs.
    baton_size_standard:
      name: Staffelstabgröße
      description: Wettbewerbsgrößenklassifizierung des Staffelstabes (Junioren oder
        Senioren).
    battery_case_certification_standard:
      name: Zertifizierung/Standard der Batteriebox
      description: Listet die relevanten Transport-/Sicherheitszertifizierungen oder
        Prüfnormen auf, die die Box für den Transport/die Lagerung von Batterien erfüllt.
    battery_case_interior_padding_material:
      name: Batteriebox-Innenpolstermaterial
      description: Gibt das primäre Polster-/Auskleidungsmaterial an, das im Inneren
        der Box verwendet wird (falls zutreffend).
    battery_configuration:
      name: Akkukonfiguration
      description: Gibt die physische Anordnung bzw. Form des Akkupacks (Formfaktor)
        an, damit Benutzer:innen den Akku an den begrenzten Platz im Batteriefach
        bestimmter Airsoft-Repliken anpassen können.
    battery_group_size:
      name: Batteriegruppengröße
      description: Standardisierte Größe der Batteriebox (z. B. BCI Gruppe 24F, H6)
        für den Einbau in viele Fahrzeuge.
    battery_polarity:
      name: Batteriepolarität
      description: Gibt die Polarität/Ausrichtung der Anschlüsse (Position des positiven
        Anschlusses) an, was eine wichtige Einbauvoraussetzung für viele Auto- und
        Powersport-Batterien darstellt.
    battery_standards_supported:
      name: Unterstützte Batteriestandards
      description: Benennt die vom Tester unterstützten Batteriebewertungsstandards
        für die Prüfung der Anlassleistung oder des Zustands der Batterie.
    battery_voltage_class:
      name: Batteriespannungsklasse
      description: Gängige Spannungssystemklasse für EV-Batteriepacks zur schnellen
        Filterung (z. B. 400-V- oder 800-V-Systeme).
    batting_cage_components_included:
      name: Enthaltene Schlagkäfigkomponenten
      description: Listet die mit dem Produkt mitgelieferten Teile auf, damit Käufer:innen
        überprüfen können, ob ein komplettes System oder bestimmte Ersatzteile enthalten
        sind.
    batting_helmet_accessories_included:
      name: Enthaltenes Zubehör für Schlaghelme
      description: Listet das im Lieferumfang des Schlaghelms enthaltene Schutz- oder
        Kosmetikzubehör auf.
    batting_stuffing_form_factor:
      name: Schlag- und Füllformfaktor
      description: Gibt an, ob das Produkt als loses Füllmaterial, Platten, Rollen,
        vorgeschnittene Stücke oder Formteile verkauft wird.
    batting_stuffing_loft_level:
      name: Loft-Stufe von Wattierung und Füllmaterial
      description: Gibt den Loft bzw. die Bauschigkeit von Wattierung oder Füllmaterial
        an (relative Höhe bzw. Dicke), typischerweise zur Auswahl von Stepp- und Polstermaterialien.
    batting_stuffing_thermal_insulation_level:
      name: Wärmedämmungsgrad von Watte und Füllmaterial
      description: Relative Wärme-/Isolierleistung von Füllmaterial, das in Steppdecken,
        Jacken und Decken verwendet wird.
    batting_tee_base_design:
      name: Design der Schlagtee-Basis
      description: Beschreibt die Bauart bzw. Konstruktion des Abschlagssockel, welche
        die Stabilität beeinflusst und bestimmt, für welche Arten von Spielflächen
        er geeignet ist.
    battle_top_arena_stadium_compatibility:
      name: Kompatibilität mit Battle-Top-Arenen/-Stadien
      description: Gibt an, für welches Arena- bzw. Stadionsystem das Produkt konzipiert
        wurde (insbesondere bei Sets oder speziellen Arenaformen).
    battle_top_items_included:
      name: Enthaltene Battle-Top-Artikel
      description: Gibt an, welche Battle-Top-Artikel im Paket enthalten sind (z. B.
        Top, Launcher, Stadion/Arena, Reißleine oder Ersatzteile).
    battle_top_performance_type:
      name: Leistungstyp des Battle-Tops
      description: Beschreibt den allgemeinen Leistungsstil des Kampfkreisels, der
        typischerweise dessen Verhalten in der Arena widerspiegelt (aggressiv vs.
        ausdauerorientiert usw.).
    bayan_included_accessories:
      name: Enthaltenes Zubehör für Bayan
      description: Zubehör, das im Lieferumfang des Bayans enthalten ist (im Karton).
    bayan_tuning_system_type:
      name: Typ des Bayan-Stimmsystems
      description: Gibt an, wie das Bayan gespannt bzw. gestimmt wird (Konstruktionsart),
        was sich auf Transportfähigkeit und Stimmbarkeit auswirkt.
    bb_gun_action_type:
      name: BB-Gun-Funktionstyp
      description: Kennzeichnet den mechanischen Lade- oder Zyklusmechanismus der
        BB-Gun (z. B. Hebelwirkung, Pumpmechanismus, Kipplauf).
    bb_gun_caliber:
      name: Kaliber des BB-Gewehrs
      description: Definiert den Durchmesser der BBs, für die das Gewehr ausgelegt
        ist, um die Kompatibilität mit der Munition sicherzustellen.
    bb_gun_part_type:
      name: Typ des BB-Gewehrteils
      description: Klassifiziert die spezifischen Komponenten oder Zubehörteile der
        BB-Gun und ermöglicht es Käufer:innen, schnell das exakte Ersatz, Upgrade-
        oder Zusatzteil (z. B. Lauf, Kolbendichtung, Schnelllader) zu finden.
    beach_ball_features:
      name: Merkmale des Strandballs
      description: Besondere funktionelle Merkmale, die speziell für Strandbälle gelten.
    beach_bucket_features:
      name: Merkmale des Strandeimers
      description: Funktionale Merkmale des Strandeimers, die sich auf Nutzung, Haltbarkeit
        und Komfort auswirken.
    beach_sand_toy_items_included:
      name: Enthaltene Strand- und Sandspielzeugartikel
      description: Zusätzliche Strand-/Sandspielteile, die im Eimer enthalten sind,
        sofern dieser als Set verkauft wird.
    bead_breaker_type:
      name: Typ des Reifenwulstbrechers
      description: Typ/Ausführung des Reifenhebelmechanismus.
    bead_hole_style:
      name: Perlenloch-Stil
      description: Gibt die Machart des Lochs/Schlitzes in der Perle an, die Einfluss
        darauf hat, wie sie auf dem Haken oder der Schnur sitzt.
    bead_type:
      name: Perlenart
      description: Die im Muster benötigte primäre Perlenart.
    bead_type_patch_embellishment:
      name: Perlenart (Aufnäherverzierung)
      description: Hauptart der auf der Oberfläche des Aufnähers verwendeten Perlen.
    beaded_accessory_project_type:
      name: Typ des Perlenschmuckprojekts
      description: Welches Accessoire lässt sich aus dem Schnittmuster herstellen?
    beading_needle_flexibility:
      name: Flexibilität der Perlnadel
      description: Relative Flexibilität des Nadelschafts zum Navigieren auf engen
        Perlenwebbahnen.
    beading_pattern_bead_size:
      name: Perlengröße des Perlenmusters
      description: Empfohlene Perlengröße(n) gemäß Anleitung (üblicherweise Rocailles-Größen
        wie 11/0 oder 8/0).
    beading_pattern_chart_format:
      name: Format des Perlenmusterdiagramms
      description: Wie das Muster visuell dargestellt wird (z. B. grafisch dargestellt
        oder Schritt-für-Schritt-Fotos).
    beading_pattern_stitch_technique:
      name: Stich-/Technikart des Perlenmusters
      description: Primärer Perlenwebstich oder primäre Perlenwebtechnik, die im Muster
        verwendet wird.
    beading_technique_stitch:
      name: Perlensticktechnik/Stich
      description: Kennzeichnet die primäre Perlensticktechnik oder den primären Stich,
        der im Muster verwendet wird (z. B. Peyote-Stich, Brick-Stich).
    beading_thread_fiber_type:
      name: Perlenfaden-Fasertyp
      description: Gibt den Faser-/Materialsubtyp des Wulstfadens (spezifischer als
        generisches Material) an, der für das Projekt relevant ist.
    beading_thread_size:
      name: Perlenfadengröße
      description: Gibt das Hersteller-/Branchen-Größenlabel an, das für Perlenfäden
        verwendet wird (marken-/linienspezifisch), z. B. Größe D oder 00.
    beading_thread_use_case:
      name: Verwendungszweck des Perlenfadens
      description: Gibt die primäre empfohlene Verwendung des Perlgarns an und hilft
        Käufer:innen, das richtige Produkt für ein Projekt auszuwählen.
    beading_wire_coating_material:
      name: Beschichtungsmaterial für Drahtperlen
      description: Gibt das äußere Beschichtungsmaterial des Perlendrahts an (falls
        vorhanden), das Haptik, Haltbarkeit und Knickfestigkeit beeinflusst.
    beading_wire_strand_count:
      name: Anzahl der Perlendrahtstränge
      description: Gibt die Anzahl der Stränge in mehrsträngigem Schmuckdraht an (z. B.
        7-strängig, 19-strängig, 49-strängig), was sich auf die Flexibilität und den
        Fall des Drahtes auswirkt.
    beadlock_type:
      name: Beadlock-Typ
      description: Gibt an, ob es sich um eine Beadlock-Felge handelt und um welchen
        Typ (hilft Offroad-/UTV-Käufer:innen).
    beam_material:
      name: Zirkelmaterial
      description: Primärmaterial des Balkens bzw. Stabs (häufig abweichend von Köpfen
        oder Befestigungselementen).
    beam_pattern:
      name: Strahlmuster
      description: Verteilungsmuster der Lichtleistung für die Fahr-/Geländebeleuchtung.
    bean_bag_fabric_material:
      name: Material des Sitzsackbezugs
      description: Kennzeichnet den Außenstoff der im Set enthaltenen Sitzsäcke.
    bean_paste_variety:
      name: Sorte der Bohnenpaste
      description: Klassifiziert die jeweilige Bohnenpastenart anhand des Herstellungsverfahrens
        oder der Hauptzutat.
    bean_preparation:
      name: Bohnenzubereitung
      description: Gibt an, wie die Bohnen vor dem Verkauf zubereitet oder verarbeitet
        werden (z. B. ganze Schoten, geschält, gehackt oder gekeimt).
    bean_variety:
      name: Bohnensorte
      description: Gibt die botanische oder Marktsorte der Bohnen an (z. B. grüne
        Bohnen, Edamame, Spargelbohnen).
    beanie_style:
      name: Mützenstil
      description: Gibt das Gesamtdesign, die Konstruktion oder die Silhouette der
        Mütze an, damit Käufer:innen schnell zwischen gängigen Varianten wählen können.
    bearing_clearance:
      name: Lagerabstand
      description: Gibt die innere Radialluftklasse des Lagers an (das Ausmaß des
        internen Spiels); Klasse C0 wird auch als CN oder normale Lagerluft bezeichnet.
    bearing_construction_type:
      name: Lagerkonstruktionsart
      description: Kennzeichnet die Lagerkonstruktion oder Bauart, die in der Nabe
        verwendet wird (z. B. Patronenlager, Kugellager).
    bearing_edge_type:
      name: Lagerkantentyp
      description: Art/Profil der Lagerkante der Mantelwelle, die den Angriff und
        die Stabilität beeinflusst.
    bearing_lubrication:
      name: Lagerschmierung
      description: Gibt die Art des Schmierstoffs an, der während der Herstellung
        auf das Lager aufgetragen wurde, z. B. Fett oder Öl.
    bearing_material:
      name: Lagermaterial
      description: Kennzeichnet das Lagerkonstruktionsmaterial (z. B. Stahl, Keramik,
        Hybrid) und hilft Fahrer:innen so bei der Auswahl zwischen Optionen hinsichtlich
        Haltbarkeit, Kosten und Leistung.
    bearing_rating:
      name: Lagerbelastbarkeit
      description: Gibt die Lagertoleranz oder Leistungsklasse an, die in den Inlineskates
        verwendet wurde (z. B. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Art der Lagerdichtung
      description: Gibt die Art der Abdichtung des Lagers an, die sich auf die Haltbarkeit
        und den Rollwiderstand auswirkt.
    bearing_seal_type:
      name: Lagerdichtungstyp
      description: Gibt die Dichtungs- oder Abschirmungskonstruktion an, die die Lagerinnenteile
        vor Verunreinigungen schützt und den Widerstand beeinflusst (z. B. 2RS, ZZ,
        LLU oder offen).
    bearing_shield_type:
      name: Lagerabschirmungsart
      description: Art der Abschirmung oder Abdichtung zum Schutz der Lagerinnenteile.
    bearing_size_code:
      name: Lagergrößencode
      description: Standardisierte Lagerbezeichnung (z. B. 608, 688), die Innendurchmesser,
        Außendurchmesser und Breite einbezieht.
    bearing_type:
      name: Lagertyp
      description: Gibt die Bauart der im Steuersatz verwendeten Lager an.
    beater_head_material:
      name: Material des Schlägelkopfs
      description: Gibt das Kontakt-/Kopfmaterial eines Bassdrum-Schlägels an (z. B.
        Filz, Holz, Gummi).
    beaters_included:
      name: Schlägel inklusive
      description: Gibt an, wie viele Schlägel im Lieferumfang des Drum-Pedals enthalten
        sind (z. B. ein einzelner oder ein doppelter Schlägel) oder ob kein Schlägel
        mitgeliefert wird.
    bed_base_type:
      name: Bettgestellart
      description: Definiert den Konstruktionsstil des Bett- oder Divangestells (z. B.
        Plattformbett, Federholzrahmen, verstellbar).
    bed_storage_type:
      name: Art des Bettstauraums
      description: Definiert den integrierten Aufbewahrungsmechanismus des Bettrahmens.
    bedroom_furniture_items_included:
      name: Schlafzimmermöbel inklusive
      description: Gibt die einzelnen Möbelstücke an, die im Schlafzimmer-Set enthalten
        sind (z. B. Bett, Kommode oder Nachttische), damit Käufer:innen schnell sehen
        können, was enthalten ist, ohne lange Beschreibungen lesen zu müssen.
    bedroom_vanity_items_included:
      name: Enthaltene Artikel im Schlafzimmer-Schminktisch
      description: Listet die im Schlafzimmer-Schminksets enthaltenen Artikel auf,
        damit Kund:innen genau wissen, was geliefert wird (z. B. Spiegel, Hocker,
        Beleuchtung).
    beer_based_cocktail_variety:
      name: Bierbasierte Cocktailvariationen
      description: Klassifiziert bierbasierte Cocktails nach ihrer jeweiligen Sorte,
        z. B. Radler, Shandy oder Michelada.
    beet_variety:
      name: Rübensorte
      description: Gibt die Sorte oder Varietät der Rübe an und hilft Käufer:innen
        dabei, Geschmack, Farbe und kulinarische Verwendungsmöglichkeiten zu erkennen
        (z. B. Rot, Golden oder Chioggia).
    bell_actuation_mechanism:
      name: Betätigungsmethode für Glocke
      description: Benennt die Aktion, die zum Läuten der Klingel erforderlich ist,
        und hilft Käufer:innen, die bevorzugte Ergonomie auszuwählen.
    bell_guard_coverage_area:
      name: Glockenschutzabdeckung
      description: Zeigt an, welcher Teil der Glocke durch die Schutzabdeckung geschützt
        werden soll.
    bell_material:
      name: Glockenmaterial
      description: Material der Glockenkomponenten (falls abweichend vom Gesamtmaterial
        des Instruments).
    bellhousing_bolt_pattern:
      name: Schraubenmuster des Glockengehäuses
      description: Gibt den Standard bzw. die Musterfamilie der Schraubenanordnung
        am Getriebeglockengehäuse bzw. auf der Motorseite an, die vom Getriebegehäuse
        verwendet wird.
    bellows_material:
      name: Balgmaterial
      description: Material des Balgkörpers bzw. der Balgabdeckung (falls vorhanden).
    bellows_orientation:
      name: Ausrichtung des Balgs
      description: Gibt die Balgkonfiguration an, mit der Luft in die Pfeifen geleitet
        wird.
    belly_panel_style:
      name: Stil des Bauchpanels
      description: Beschreibt die Konstruktion des Bunds bzw. Bauchpanels, das Platz
        für einen wachsenden Bauch bietet.
    belt_buckle_type:
      name: Typ der Gürtelschnalle
      description: Beschreibt den spezifischen Schnallenmechanismus bzw. das Design
        des Gürtels.
    beret_style:
      name: Baskenmützenstil
      description: Kennzeichnet das spezifische Barettdesign oder die kulturelle Variante.
    berry_species:
      name: Beerenart
      description: Gibt die im Produkt enthaltene Beerenart an, damit schnell nach
        der gewünschten Beere gefiltert werden kann.
    beta_casein_variant:
      name: Beta-Casein-Variante
      description: Gibt an, welche Beta-Casein-Proteinvariante (z. B. A2) in der Milch
        enthalten ist, insbesondere für Verbraucher mit Bedenken hinsichtlich der
        Verträglichkeit.
    beverage_sweetness_level:
      name: Süßegrad des Getränks
      description: Klassifiziert das Getränk nach dem Grad der zugesetzten Süße bzw.
        des zugesetzten Zuckers.
    bezel_graduation_units:
      name: Teilungseinheiten der Lünette
      description: Gibt die Einheitenskala auf der drehbaren Lünette an (Grad, Mil
        oder Doppelskala).
    bicycle_brake_set_components_included:
      name: Enthaltene Komponenten des Fahrradbremsensets
      description: Listet die im Set enthaltenen Einzelteile auf, damit genau ersichtlich
        ist, was enthalten ist und verschiedene Bundle-Konfigurationen verglichen
        werden können.
    bicycle_cage_mounting_position:
      name: Montageposition des Fahrradkäfigs
      description: Gibt an, wo am Fahrrad der Flaschenhalter montiert werden soll.
    bicycle_computer_mount_placement:
      name: Position der Fahrradcomputerhalterung
      description: Gibt an, wo die Computerhalterung am Fahrrad montiert wird, z. B.
        vorne am Lenker oder auf der Vorbaukappe.
    bicycle_folding_mechanism:
      name: Klappmechanismus des Fahrrads
      description: Gibt das mechanische Faltsystem des Fahrradrahmens an (z. B. Halb-
        oder Vertikalfaltung).
    bicycle_frame_design:
      name: Design des Fahrradrahmens
      description: Beschreibt den allgemeinen Stil des Fahrradrahmens, der Zugänglichkeit,
        Ladekapazität und Stauraum beeinflusst.
    bicycle_frame_style:
      name: Stil des Fahrradrahmens
      description: Beschreibt die Bauart des Fahrradrahmens (z. B. Tiefeinsteiger,
        Lowrider oder Chopper Stretch), die sich auf Sitzhaltung und Optik auswirkt.
    bicycle_handlebar_type:
      name: Art des Fahrrad-Lenkergriffs
      description: Kennzeichnet den spezifischen Lenkerstil bzw. die Geometrie und
        hilft bei der Auswahl passend zur Fahrposition und Disziplin.
    bicycle_headset_configuration:
      name: Konfiguration des Fahrradsteuersatzes
      description: Gibt Bauart bzw. Standard des Fahrradsteuersatzes anhand der Lagerschalenanordnung
        an (z. B. External Cup, ZeroStack, Integrated oder Threaded).
    bicycle_hub_type:
      name: Fahrradnabentyp
      description: Beschreibt den mit dem Laufrad gelieferten Nabenmechanismus, der
        Antriebskompatibilität und Fahrstil beeinflusst.
    bicycle_lock_security_certification:
      name: Sicherheitszertifizierung für Fahrradschlösser
      description: Unabhängige Zertifizierung durch Dritte zur Bestätigung der Diebstahlschutzleistung
        (z. B. Sold Secure, ART oder Varefakta).
    bicycle_pedal_type:
      name: Fahrradpedaltyp
      description: Gibt Bauart bzw. Design des Pedals an, z. B. Plattform-, Klick-
        oder Hybridpedal, und erleichtert so die Auswahl passend zum Fahrstil.
    bicycle_propulsion_type:
      name: Antriebsart Fahrrad
      description: Gibt an, wie das Fahrrad angetrieben wird, z. B. durch Muskelkraft,
        elektrische Unterstützung oder Verbrennungsmotor.
    bicycle_pump_type:
      name: Fahrradpumpentyp
      description: Kennzeichnet die Bauart der Pumpe und hilft bei der Auswahl passend
        zu Fahr-, Aufbewahrungs- oder Notfallanforderungen.
    bicycle_rack_mounting_type:
      name: Montageart des Fahrradträgers
      description: Beschreibt die primäre Methode bzw. Position zur Befestigung des
        Gepäckträgers am Fahrrad und hilft Benutzer:innen dabei, die Kompatibilität
        mit Rahmen und Zubehör zu bestätigen.
    bicycle_suspension_type:
      name: Fahrradfederungstyp
      description: Kennzeichnet das Vorhandensein und die Konfiguration der Federung
        am Fahrrad.
    bicycle_tire_tread_pattern:
      name: Reifenprofil des Fahrrads
      description: Gibt das Reifenprofil an, das Traktion und Rollwiderstand auf unterschiedlichen
        Untergründen beeinflusst.
    bidirectional_charging_capability:
      name: Fähigkeit zum bidirektionalen Laden
      description: Gibt an, ob das Elektrofahrzeug bidirektionale Ladefunktionen wie
        V2G und/oder V2H unterstützt.
    bike_rack_mounting_style:
      name: Fahrradträger-Montagestil
      description: Gibt an, wie das Fahrrad vom Träger gehalten bzw. gesichert wird.
    bike_rack_tilt_function:
      name: Neigefunktion des Fahrradträgers
      description: Gibt an, ob und welche Kippfunktion vorhanden ist, um bei montiertem
        Träger Zugang zum hinteren Laderaum zu ermöglichen.
    bikini_top_style:
      name: Stil des Bikinioberteils
      description: Gibt das Design bzw. den Schnitt des Bikinioberteils an und hilft
        Käufer:innen dabei, bevorzugte Passformen und Silhouetten zu finden.
    billiard_brush_type:
      name: Typ der Billardbürste
      description: Definiert die jeweilige Art des Billardtisch-Reinigungswerkzeugs
        (z. B. Tischbürste, Bandenbürste oder Bürstenklotz).
    billiard_glove_finger_coverage:
      name: Fingerabdeckung des Billardhandschuhs
      description: Gibt an, welche Finger vom Handschuhdesign bedeckt werden, und
        ermöglicht so eine präzise Filterung nach billardspezifischen Handschuhstilen.
    billiard_pocket_style:
      name: Ballfangtaschenstil
      description: Gibt den strukturellen oder optischen Stil der Tasche an, der sich
        auf Kompatibilität und Tischdesign auswirkt.
    billiard_rack_style:
      name: Stil des Billarddreiecks
      description: Beschreibt die physische Bauart bzw. den Mechanismus des Racks
        (z. B. traditioneller Rahmen, Vorlagenblatt oder faltbar).
    billiard_table_type:
      name: Typ des Billardtischs
      description: Gibt die Billarddisziplin bzw. Nutzungsart an, für die der Tisch
        konzipiert ist (z. B. Pool, Snooker oder Karambolage).
    billiards_discipline:
      name: Billarddisziplin
      description: Gibt die spezifische Billardvariante (Spielart) an, für die das
        Produkt bestimmt oder geeignet ist.
    binding_compatibility_standard:
      name: Bindungskompatibilitätsstandard
      description: Kennzeichnet die Bindungsschnittstelle (Sohlennorm), für die der
        Skischuh zertifiziert ist, um eine sichere und korrekte Nutzung mit Skibindungen
        zu gewährleisten.
    binding_inclusion:
      name: Enthaltene Bindung
      description: Gibt an, ob die Ski ohne Bindung, mit integriertem System oder
        mit separater Bindung verkauft werden.
    binding_interface:
      name: Bindungsschnittstelle
      description: Gibt die Bindungsplatte bzw. den Schnittstellenstandard an, mit
        dem die Skier vormontiert oder kompatibel sind, um die Kompatibilität von
        Skischuh und Bindung sicherzustellen.
    binding_liner_type:
      name: Typ des Bindungsinnenschuhs
      description: Beschreibt die Art des Innenschuhs in Bindung bzw. Schuh (z. B.
        herausnehmbar, begehbar oder thermoverformbar).
    binding_mounting_system:
      name: Bindungsmontagesystem
      description: Kennzeichnet die Schnittstelle zur Befestigung der Bindung am Ski
        (Flat Mount, Schiene/Track, Platte usw.).
    binding_position:
      name: Bindungsposition
      description: Bezeichnet die vorgesehene Montageposition bzw. Konfiguration der
        Bindung (z. B. Vorderfuß, Hinterfuß oder ARTP).
    binding_strap_position:
      name: Position des Bindungsriemens
      description: Gibt an, wo an der Bindung der Riemen angebracht werden soll.
    bingo_components_included:
      name: Enthaltene Bingokomponenten
      description: Listet die im Bingo-Set enthaltenen Komponenten auf, z. B. Bingokugeln,
        Karten und Marker.
    bingo_number_range:
      name: Zahlenbereich beim Bingo
      description: Gibt den vom Set unterstützten Bingozahlenbereich bzw. die Variante
        an.
    bingo_set_features:
      name: Merkmale des Bingo-Sets
      description: Kennzeichnet das primäre Format des Bingo-Sets (physisch/manuell
        oder elektronisch/interaktiv).
    bipod_mounting_interface:
      name: Montageschnittstelle des Zweibeins
      description: Gibt die Befestigungsschnittstelle an, mit der das Zweibein an
        der Schusswaffe oder am Schienensystem befestigt wird.
    bit_attachment_type:
      name: Befestigungsart des Gebisses
      description: Gibt an, wie das Kopfstück mit dem Gebiss verbunden wird (z. B.
        Binderiemen, Schnallenenden oder Chicago-Schrauben).
    bit_mouthpiece_design:
      name: Design des Gebissmundstücks
      description: Kennzeichnet die Bauart bzw. Gelenkkonfiguration des Mundstücks,
        die Druckverteilung, Gaumenfreiheit und Gesamtschärfe bestimmt.
    bit_ring_style:
      name: Stil des Gebissrings
      description: Definiert die Art der Gebissseitenstücke bzw. -ringe, die am Zaumzeug
        befestigt werden und Einfluss auf Wirkung, seitliche Führung und Zügelgefühl
        haben.
    bladder_material:
      name: Blasenmaterial
      description: Gibt das Material der inneren Luftblase an.
    blade_attachment_type:
      name: Kufenbefestigungstyp
      description: Gibt an, ob der Schlittschuh über einen Klappmechanismus (Scharniermechanismus)
        oder eine feste Kufenhalterung verfügt.
    blade_finish_coating:
      name: Oberflächenbeschaffenheit bzw. Beschichtung der Klinge
      description: Oberflächenbehandlung der Klinge aus optischen Gründen oder zum
        Korrosionsschutz.
    blade_hosel_type:
      name: Typ des Klingenhosels
      description: Gibt die Verbindungsart des Klingenhalses an, der in den Schaft
        eingesetzt wird, und beeinflusst damit die Kompatibilität (z. B. Standard
        oder Tapered).
    blade_length_type:
      name: Blattlängentyp
      description: Klassifiziert die Flossenblattlänge als kurz, mittel oder lang,
        wobei jede Variante Trittfrequenz und Trainingsziele beeinflusst.
    blade_lie:
      name: Lie-Winkel der Klinge
      description: Gibt die Lie-Zahl der Hockeyschlägerkelle an und beschreibt damit,
        wie die Kelle im Verhältnis zum Schaft auf dem Eis aufliegt.
    blade_sharpness:
      name: Klingenschärfe
      description: Gibt an, ob die Schneide der Waffe für Trainingszwecke geschärft
        oder stumpf ist.
    blade_size_category:
      name: Kategorie der Klingenlänge
      description: Standardisierter internationaler Größenkode für Säbelklingen (0–5)
        zur Unterscheidung zwischen Jugend- und Erwachsenenklingen.
    blade_size_class:
      name: Größenklasse der Klingenlänge
      description: Klassifiziert die Klinge nach der üblichen Spielergrößenkonvention
        passend zu Schaftgrößen wie Youth, Junior, Intermediate oder Senior.
    blade_size_number:
      name: Klingengrößennummer
      description: Standardisierter numerischer Größencode (0–5), der in den Fechtregeln
        definiert ist und Klingenlänge sowie Altersklasseneignung bestimmt.
    blaster_mechanism:
      name: Blastermechanismus
      description: Definiert den internen Funktionsmechanismus des Gelblasters (z. B.
        GBB, AEG oder Federdruck).
    block_edge_style:
      name: Stil der Blockkante
      description: Beschreibt die Verarbeitung der Kanten bzw. Ecken der Holzbausteine
        im Hinblick auf Haptik und Sicherheit.
    blocking_mat_features:
      name: Eigenschaften der Blockiermatte
      description: Funktionale Eigenschaften speziell für Blockiermatten (Aufbewahrung,
        Transportfähigkeit, Benutzerfreundlichkeit).
    blocking_mat_grid_unit:
      name: Rastereinheit der Blockiermatte
      description: Das auf dem gedruckten Raster verwendete Einheitensystem hilft
        Benutzer:innen dabei, Muster und Maße abzugleichen.
    blocking_mat_surface_markings:
      name: Oberflächenmarkierungen der Blocking-Matte
      description: Art der Mess- bzw. Führungsmarkierungen auf der Oberfläche der
        Matte.
    blocking_wire_coating:
      name: Beschichtung des Blockierdrahts
      description: Oberflächenbehandlung bzw. Beschichtung des Blockierdrahts, die
        Rostbeständigkeit, Glätte und das Risiko des Hängenbleibens beeinflusst.
    blocking_wire_end_cap_type:
      name: Typ der Endkappe des Blockierdrahts
      description: Gibt die Art des Endschutzes bzw. der Endverarbeitung an den Blockierdrahtenden
        zum Schutz von Stoff und Sicherheit an.
    blocking_wire_set_includes:
      name: Im Blockierdrahtset enthalten
      description: Gibt an, welche Komponenten im Lieferumfang des Blockierdrahtprodukts
        enthalten sind (z. B. T-Nadeln oder Aufbewahrungsrohr).
    blocking_wire_usage:
      name: Verwendungszweck des Blocking-Drahts
      description: Hauptverwendungszweck des flexiblen Blockierdrahts.
    bloom_stage:
      name: Blühstadium
      description: Gibt an, wie weit die Gänseblümchenblüten bei Lieferung bzw. Versand
        geöffnet sind.
    blower_motor_bearing_type:
      name: Lagertyp des Gebläsemotors
      description: Gibt die im Gebläsemotor verwendete Lagerbauart an.
    blower_motor_mounting_position:
      name: Montageposition des Gebläsemotors
      description: Gibt an, wo der Gebläsemotor im HVAC-Modul bzw. Fahrzeug eingebaut
        ist (z. B. vorne oder hinten).
    blowpipe_valve_type:
      name: Typ des Blasrohrventils
      description: Gibt an, welcher Blasrohrventiltyp enthalten ist (falls vorhanden).
    bo_staff_style:
      name: Stil des Bo-Stabs
      description: Definiert Bauart bzw. Konstruktion des Stabs (z. B. gerade, konisch,
        schaumstoffgepolstert oder zusammenklappbar).
    board_game_theme:
      name: Thema des Brettspiels
      description: Erzählerisches bzw. thematisches Setting des Brettspiels (für Suche
        und Navigation).
    board_rail_shape:
      name: Form der Boardkante
      description: Gibt die Form der Boardkanten an (z. B. weich, hart oder 50/50),
        die Halt und Vortrieb auf der Welle beeinflusst.
    board_size_classification:
      name: Klassifizierung der Boardgröße
      description: Klassifiziert das Cornhole-Brett bzw. -Set nach gängigen standardisierten
        Größen.
    board_type_compatibility:
      name: Kompatibilität des Boardtyps
      description: Gibt den Boardtyp an, für den die Leash konzipiert ist.
    boat_construction_type:
      name: Bootkonstruktionstyp
      description: Beschreibt Bauart bzw. Ausführung des Ruderboots (z. B. aufblasbar
        oder starr).
    boat_hook_flotation:
      name: Schwimmfähigkeit des Bootshakens
      description: Gibt an, ob der Bootshaken schwimmt, wenn er ins Wasser fällt.
    boat_ladder_stowage_style:
      name: Verstauart der Bootsleiter
      description: Beschreibt, wie die Leiter verstaut wird, wenn sie nicht verwendet
        wird (z. B. klappbar, einziehbar oder abnehmbar).
    boat_trailer_construction_type:
      name: Bauart des Bootsanhängers
      description: Gibt an, ob der Anhänger das Boot mit Auflagen, Rollen oder einem
        Hybridsystem stützt.
    boat_weaving_shuttle_weft_exit_type:
      name: Schussfadenaustrittstyp des Webschiffchens
      description: Beschreibt, wie der Schussfaden beim Weben aus dem Schiffchen austritt.
    bobbin_loading_type:
      name: Art des Spulenladens
      description: Gibt an, wie die Spule in die Nähmaschine eingesetzt bzw. geladen
        wird.
    bobbin_system:
      name: Spulensystem
      description: Das von der Nähmaschine verwendete Spulenladesystem bzw. der Spulentyp.
    bobbin_type:
      name: Spulentyp
      description: Gibt das Garnträgerformat an, für das das Schiffchen ausgelegt
        ist bzw. das enthalten ist, wodurch Kompatibilität und typischer Einsatzzweck
        bestimmt werden (z. B. verwenden Bootsschiffchen häufig Spulen, während Stoffschiffchen
        offen für Stoffstreifen sein können).
    bobbin_winder_winding_direction:
      name: Wickelrichtung des Spulenwicklers
      description: Gibt die vom Spulenwickler unterstützte Wickel- bzw. Drehrichtung
        an.
    bobble_mechanism:
      name: Wackelmechanismus
      description: Gibt die Bauart des Wackelmechanismus an, die sich auf Bewegung
        und Haltbarkeit auswirkt.
    bocal_material:
      name: Bocal-Material
      description: Gibt das Material der enthaltenen Bocal(s) an.
    bodhr_n_head_material:
      name: Material des Bodhrán-Fells
      description: Material des Spielfells (Membran), das Klang und Wartungsaufwand
        stark beeinflusst.
    bodhr_n_tuning_system_type:
      name: Typ des Bodhrán-Stimmsystems
      description: Art des integrierten Stimmmechanismus zur Einstellung der Fellspannung
        (falls stimmbar).
    body_armor_coverage_area:
      name: Schutzbereich der Körperschutzweste
      description: Gibt an, welche Körperbereiche durch das Produkt geschützt werden.
    body_armor_intended_use:
      name: Verwendungszweck der Körperschutzweste
      description: Gibt das primäre Fahr- bzw. Einsatzszenario an, für das die ATV-/UTV-Körperschutzweste
        konzipiert ist.
    body_cord_connector_style:
      name: Anschlussart des Körperkabels
      description: Beschreibt die Steckerkonfiguration an den Kabelenden (z. B. Anzahl
        der Kontakte oder Bajonettverschluss), die die Kompatibilität mit Waffen und
        Wertungssystemen bestimmt.
    body_panel_finish_state:
      name: Oberflächenzustand des Karosserieblechs
      description: Beschreibt den Oberflächen- bzw. Vorbereitungszustand des Seitenteils
        im Auslieferungszustand für Lackierung oder Montage.
    body_shape:
      name: Korpusform
      description: Gibt die allgemeine Korpusform bzw. den Stil der E-Gitarre an.
    bodysuit_bottom_coverage:
      name: Bedeckungsgrad des Bodysuit-Unterteils
      description: Definiert Schnitt und Bedeckung des unteren Teils des Bodysuits,
        was Komfort und Kombinierbarkeit mit anderen Outfits beeinflusst.
    boilie_shape:
      name: Form des Boilies
      description: Kennzeichnet die Form der vom Rolltisch hergestellten Boilies,
        damit zwischen verschiedenen Köderprofilen gewählt werden kann.
    boilie_stop_buoyancy:
      name: Auftrieb des Boiliestoppers
      description: Gibt an, ob der Boiliestopper schwimmt, sinkt oder neutralen Auftrieb
        besitzt, was die Köderpräsentation im Wasser beeinflusst.
    bok_choy_variety:
      name: Pak-Choi-Sorte
      description: Gibt Sorte, Handelsnamen oder Varietät des Pak Choi an (z. B. Baby,
        Shanghai, Nai Bai, Tatsoi oder Purple Lady), damit gewünschter Geschmack,
        Größe und Optik ausgewählt werden können.
    bolt_drive_style:
      name: Antriebsart der Schraube
      description: Gibt die Antriebsart der Skateboard-Montageschrauben an und unterscheidet
        zwischen gängigen Kopf- bzw. Antriebstypen wie Inbus oder Phillips.
    bone_content:
      name: Knochenanteil
      description: Gibt an, ob das Fleisch Knochen enthält.
    bongo_center_block_material:
      name: Material des Bongo-Mittelblocks
      description: Material des Mittelblocks, der die beiden Bongokessel verbindet
        (falls vorhanden).
    bongo_shell_material:
      name: Material der Bongo-Kessel
      description: Material der Bongo-Kessel (Trommelkörper), ohne Felle und Hardware.
    bongo_tuning_system:
      name: Bongo-Stimmsystem
      description: Beschreibt, wie die Bongos gestimmt bzw. konstruiert sind (z. B.
        traditionelle Spannschraubenstimmung oder Seilstimmung), was Wartung und Authentizität
        beeinflusst.
    boning_type:
      name: Korsettstabart
      description: Kennzeichnet das innere Stützsystem des Korsetts, einschließlich
        Material sowie Art bzw. Form der verwendeten Stäbe, was Stützgrad, Flexibilität
        und Haltbarkeit direkt beeinflusst.
    boot_liner_type:
      name: Typ des Schuh-Innenschuhs
      description: Beschreibt die Konstruktion bzw. Anpassungsfähigkeit des Innenschuhs
        im Snowboardboot (z. B. wärmeverformbar oder herausnehmbar).
    boot_sole_compatibility:
      name: Schuhsohlenkompatibilität
      description: Listet die Schuhsohlennormen bzw. Schnittstellensysteme auf, die
        von der Bindung unterstützt werden.
    boot_support_level:
      name: Unterstützungsgrad des Boots
      description: Beschreibt den allgemeinen Steifigkeits- bzw. Unterstützungsgrad
        im Knöchel- oder Schuhbereich des Schlittschuhs.
    boot_width_code:
      name: Bootbreitencode
      description: Vom Hersteller verwendete Breitenbezeichnung mit Buchstaben speziell
        für die Größenangabe bei Eiskunstlaufschuhen (z. B. AAA, AA, B, C oder D).
    booth_configuration:
      name: Kabinenkonfiguration
      description: Gibt die allgemeine Sitzkonfiguration der Kabine an (z. B. einseitig,
        Ecke oder modular).
    bootie_toe_design:
      name: Zehenkappendesign des Booties
      description: Kennzeichnet die Zehenkonstruktion von Surfschuhen und Riffboots.
    border_type:
      name: Randtyp
      description: Kantenverarbeitung bzw. Randstil des gestickten Aufnähers (der
        Optik, Ausfransschutz und Qualitätswahrnehmung beeinflusst).
    bore_cleaner_format:
      name: Format des Laufreinigers
      description: Gibt die physische Bauform des Laufreinigungsprodukts an (Werkzeug
        oder Verbrauchsmaterial).
    bore_cleaner_safe_for_finish:
      name: Laufreiniger, sicher für Oberflächenbeschichtungen
      description: Gibt an, für welche gängigen Oberflächen von Blechblasinstrumenten
        der Laufreiniger sicher verwendet werden kann.
    bottle_cage_loading_direction:
      name: Beladungsrichtung des Flaschenhalters
      description: Beschreibt die Richtung, aus der eine Flasche in den Halter eingesetzt
        bzw. entnommen wird.
    bottle_neck_finish_closure_size:
      name: Flaschenhalsfinish bzw. Verschlussgröße
      description: Die standardisierte Flaschenöffnungs- bzw. Verschlussgröße zur
        Sicherstellung der Kompatibilität mit Verschlüssen, Korken und Verschließgeräten
        (z. B. 26-mm-Kronkorkenverschluss).
    bottle_style:
      name: Flaschenstil
      description: Gängige Flaschenformen zum Abfüllen beim Heim- und Weinbrauen.
    bottom_bracket_interface:
      name: Tretlagerschnittstelle
      description: Kennzeichnet den Spindel- bzw. Tretlagerstandard, für den die Kurbel
        ausgelegt ist, um die Kompatibilität mit Rahmen und Tretlager sicherzustellen.
    bottom_bracket_standard:
      name: Tretlagerstandard
      description: Gibt das vom Rahmen unterstützte Tretlagergehäuse bzw. die Schnittstelle
        an, wodurch die Kompatibilität mit der Kurbelgarnitur bestimmt wird.
    bottom_type_suitability:
      name: Eignung für Bodentypen
      description: Gibt an, für welche Meeresboden- bzw. Grundbedingungen der Anker
        am besten geeignet ist.
    bounce_level:
      name: Sprungkraft
      description: Gibt an, wie stark der Ball beim Fallenlassen oder Werfen zurückspringt,
        um die Auswahl des passenden Balls für Übungen wie Wall Balls oder Slams zu
        erleichtern.
    bouncy_ball_surface_finish:
      name: Flummi-Oberflächenbeschaffenheit
      description: Gibt die taktile bzw. visuelle Oberflächenbeschaffenheit eines
        Flummis an (z. B. glatt, stachelig oder glitzernd).
    boundary_marker_type:
      name: Typ der Grenzmarkierung
      description: Definiert die physische Form des Feld- bzw. Platzmarkierungsprodukts
        (z. B. Kegel, Klebeband, Farbe, Schablone oder Maschine).
    bouquet_size_tier:
      name: Größenkategorie des Blumenstraußes
      description: Standardisierte Größenkategorie für Blumenstrauß bzw. Bündel unabhängig
        von der Anzahl der Stiele (praktisch bei gemischten Blumenstielen).
    bow_and_yo_yo_edge_finish:
      name: Kantenabschluss von Schleife und Stoffrosette
      description: Beschreibt die Kanten- bzw. Zierverarbeitung der Schleife bzw.
        Stoffrosette (insbesondere bei bandbasierten Schleifen).
    bow_case_shell_type:
      name: Art des Instrumentenkoffers
      description: Beschreibt die äußere Bauweise des Bogenkoffers (z. B. Hartschale
        oder Softcase).
    bow_compatibility:
      name: Bogenkompatibilität
      description: Gibt an, für welchen Bogentyp die Jagdspitze vorgesehen bzw. geeignet
        ist.
    bow_hair_color:
      name: Farbe des Bogenhaars
      description: Kennzeichnet Farbe bzw. Erscheinungsbild des Bogenhaars für Orchesterstreichinstrumente
        (z. B. weiß/gebleicht, naturweiß oder schwarz).
    bow_stick_material:
      name: Material des Bogenstocks
      description: Gibt das Material des Bogenstocks (Hauptschaft) an, das Gewicht,
        Spielgefühl und Preis maßgeblich beeinflusst.
    bow_type:
      name: Bogentyp
      description: Gibt die Bauart des Jugendbogens an (z. B. Compound-, Recurve-
        oder Langbogen), was Schießstil, benötigtes Zubehör und Trainingsprogramme
        stark beeinflusst.
    bow_winding_material:
      name: Material der Bogenwicklung
      description: Gibt das Material der Bogenwicklung an, das sich auf Griffgefühl
        und Balance auswirkt.
    bow_yo_yo_embellishment_style:
      name: Verzierungstil von Schleife bzw. Stoffrosette
      description: Kennzeichnet die Konstruktionsart der Verzierung (Schleife oder
        Stoffrosette).
    bowling_ball_core_type:
      name: Typ des Bowlingkugel-Kerns
      description: Kennzeichnet die innere Kernkonstruktion bzw. Symmetrie der Bowlingkugel,
        die Ballbewegung und Hook-Potenzial beeinflusst.
    bowling_ball_coverstock_type:
      name: Typ des Bowlingkugel-Oberflächenmaterials
      description: Gibt Material bzw. Technologie der äußeren Bowlingkugeloberfläche
        an, die Traktion und Hook-Potenzial bestimmt.
    bowling_set_style:
      name: Stil des Bowling-Sets
      description: Definiert den allgemeinen Stil bzw. Einsatzzweck des Bowling-Sets.
    box_lid_type:
      name: Deckeltyp der Box
      description: Art des Deckels bzw. Öffnungsmechanismus der Geschenkbox oder Dose.
    box_spring_profile:
      name: Profil des Boxspringbetts
      description: Klassifiziert die Gesamthöhe des Boxspringbetts in kundenfreundliche
        Profilkategorien (z. B. niedrig, Standard oder hoch), damit schnell gefiltert
        werden kann, ohne genaue Maße zu kennen.
    box_spring_requirement:
      name: Anforderungen an den Lattenrost
      description: Gibt an, ob für die Matratze ein zusätzlicher Lattenrost oder ein
        Untergestell erforderlich ist.
    boxing_ring_style:
      name: Boxringstil
      description: Klassifiziert den allgemeinen Konstruktionsstil oder das vorgesehene
        Nutzungsszenario des Rings (z. B. Wettkampf vs. Training, erhöht vs. am Boden).
    bra_length_type:
      name: BH-Längentyp
      description: Definiert die Längenklassifizierung von BHs basierend auf der vertikalen
        Abdeckung, z. B. Standard, Longline, Midi oder Cropped.
    bra_padding_type:
      name: Typ der BH-Polsterung
      description: Beschreibt den Grad der Polsterung in den Körbchen.
    braces_compatibility:
      name: Spangenkompatibilität
      description: Gibt an, ob und in welchem Umfang der Mundschutz mit einer kieferorthopädischen
        Zahnspange getragen werden kann.
    brake_band_form:
      name: Bremsbandform
      description: Gibt an, ob das Bremsband als Endlosband oder als Zuschnitt geliefert
        wird, der befestigt werden muss.
    brake_band_material_type:
      name: Art des Bremsbandmaterials
      description: Legt das Funktionsmaterial des Bremsbands fest (z. B. Baumwollkordel,
        Nylonschnur oder Federstahl), das die Haltbarkeit, Griffigkeit, Dehnung und
        Geräuschentwicklung beeinflusst.
    brake_band_style:
      name: Art des Bremsbands
      description: Gibt das System bzw. die Art der Bremsbandspannung an, das bzw.
        die an einem Spinnrad verwendet wird, um die Flügel- bzw. Spulenspannung zu
        regulieren.
    brake_bleeding_method:
      name: Methode zur Bremsenentlüftung
      description: Entlüftungsmethode, die vom Paket unterstützt wird.
    brake_booster_assist_type:
      name: Unterstützungstyp des Bremskraftverstärkers
      description: Gibt die vom Bremskraftverstärker verwendete Unterstützungsmethode
        an.
    brake_booster_diaphragm_configuration:
      name: Konfiguration der Bremskraftverstärkermembran
      description: Gibt die Anzahl/Art der im Verstärker verwendeten Membranen an.
    brake_caliper_bleeder_screw_position:
      name: Position der Entlüftungsschraube am Bremssattel
      description: Gibt die Position der Entlüftungsschraube am Bremssattel im eingebauten
        Zustand an (dient zur Überprüfung, ob die Entlüftungsschraube für eine ordnungsgemäße
        Entlüftung am höchsten Punkt ausgerichtet ist).
    brake_caliper_finish:
      name: Oberfläche des Bremssattels
      description: Gibt die Oberflächenbeschaffenheit oder Schutzbeschichtung des
        Bremssattelkörpers an (z. B. Lackierung, Galvanisierung, Eloxierung).
    brake_caliper_included_hardware:
      name: Enthaltene Komponenten für Bremssattel
      description: Gibt an, was im Lieferumfang der Bremssattelbaugruppe enthalten
        ist.
    brake_caliper_mount_type:
      name: Befestigungstyp des Bremssattels
      description: Art der Befestigungsvorrichtung, mit der der Bremssattel am Achsschenkel/an
        der Halterung befestigt wird.
    brake_caliper_paint_base_chemistry:
      name: Chemische Zusammensetzung der Lackgrundierung für Bremssättel
      description: Das verwendete Lack-/Harzsystem oder die verwendete Produktfamilie.
    brake_caliper_paint_kit_contents:
      name: Inhalt des Bremssattellack-Pakets
      description: Gibt an, was neben dem Lack selbst im Paket enthalten ist.
    brake_circuit_type:
      name: Bremskreistyp
      description: Die vom Hauptzylinder unterstützte Konfiguration des Hydraulikkreislaufs.
    brake_clutch_fluid_base_chemistry:
      name: Chemische Basis für Brems-/Kupplungsflüssigkeit
      description: Chemische Basis für Brems-/Kupplungshydraulikflüssigkeit, die die
        Kompatibilität und Mischbarkeit beeinflusst.
    brake_clutch_fluid_dot_specification:
      name: DOT-Spezifikation für Brems-/Kupplungsflüssigkeit
      description: DOT-Leistungsklasse der Hydraulikflüssigkeiten für Bremsen/Kupplungen
        (z. B. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Oberfläche/Beschichtung der Bremstrommel
      description: Oberflächenbehandlung oder Schutzbeschichtung der Bremstrommel
        (z. B. E-Coat, Lackierung, Zinkbeschichtung).
    brake_drum_type:
      name: Bremstrommeltyp
      description: Bauart der Bremstrommel (mit oder ohne integrierte Nabe bzw. integriertes
        Lager).
    brake_fluid_base:
      name: Bremsflüssigkeitsbasis
      description: Gibt die Zusammensetzung der benötigten oder enthaltenen Hydraulikflüssigkeit
        der Bremse an.
    brake_fluid_base_chemistry:
      name: Chemische Basis für Bremsflüssigkeit
      description: Gibt die chemische Basis der Bremsflüssigkeit an, die die Kompatibilität
        und die Mischvorschriften bestimmt.
    brake_fluid_dot_specification:
      name: DOT-Spezifikation für Bremsflüssigkeit
      description: Gibt die DOT-Klassifizierung/Spezifikation für Bremsflüssigkeitsprodukte
        an (z. B. DOT 3 oder DOT 4).
    brake_fluid_standards_compliance:
      name: Konformität mit Bremsflüssigkeitsstandards
      description: Industriestandards, die die Bremsflüssigkeit angeblich erfüllt
        (über die DOT-Klassifizierung hinaus).
    brake_fluid_type:
      name: Bremsflüssigkeitstyp
      description: Gibt die für hydraulische Fahrradbremssättel benötigte Bremsflüssigkeit
        an.
    brake_hose_end_fitting_type:
      name: Typ der Endverschraubung der Bremsleitung
      description: Verschraubungssart an beiden Enden des Bremsschlauchs (z. B. Banjo,
        Bördel, Innen-/Außengewinde), um die Kompatibilität mit Bremssätteln/Leitungen
        zu gewährleisten.
    brake_lever_pull_type:
      name: Betätigungsart des Bremshebels
      description: Gibt das Zugverhältnis/die Mechanik an, für die der Hebel ausgelegt
        ist, und gewährleistet so die Kompatibilität mit bestimmten Bremssätteln (z. B.
        Felgenbremsen mit kurzem Zugweg im Vergleich zu V-Bremsen mit langem Zugweg).
    brake_light_switch_actuation_type:
      name: Betätigungstyp für Bremslichtschalter
      description: Gibt an, welches physikalische Ereignis den Schalter betätigen
        (Pedal/Kolben vs. Hydraulikdruck usw.).
    brake_light_switch_connector_type:
      name: Anschlusstyp für Bremslichtschalter
      description: Gibt den Stil bzw. das Format des elektrischen Steckers an, über
        den der Bremslichtschalter an den Fahrzeugkabelbaum angeschlossen wird.
    brake_light_switch_contact_type:
      name: Kontakttyp für Bremslichtschalter
      description: Konfiguration der elektrischen Kontakte/Verhalten des Bremslichtschalters
        (z. B. normalerweise offen/geschlossen, Umschalter oder Mehrkreisschalter).
    brake_light_switch_mounting_style:
      name: Montagestil des Bremslichtschalters
      description: Wie der Bremslichtschalter am Fahrzeug oder Bremssystem befestigt/installiert
        ist (z. B. mit Gewinde, zum Einrasten, mit Halterung, mit Banjo-Schraube).
    brake_master_cylinder_mounting_type:
      name: Befestigungstyp des Hauptbremszylinders
      description: Wie der Hauptbremszylinder am Fahrzeug/Bremskraftverstärker befestigt
        wird (Schraubenmuster/Flanschausführung).
    brake_master_cylinder_reservoir_type:
      name: Typ des Hauptbremszylinder-Flüssigkeitsbehälters
      description: Typ/Konfiguration des Bremsflüssigkeitsbehälters, der für den Hauptbremszylinder
        bereitgestellt oder benötigt wird.
    brake_mount_type:
      name: Befestigungstyp der Bremse
      description: Gibt die in die Gabel integrierte Bremsschnittstelle an, damit
        Fahrende die Kompatibilität des Bremssystems überprüfen können.
    brake_mounting_flange_bolt_pattern:
      name: Schraubenmuster des Brembefestigungsflansches
      description: Gibt das Loch-/Schraubenmuster des Befestigungsflansches an, das
        zur Befestigung der Bremsankerplatte oder des Bremssattelhalters an der Anhängerachse
        verwendet wird (z. B. 4-Loch).
    brake_pad_backing_plate_material:
      name: Material der Bremsbelag-Trägerplatte
      description: Gibt das Material der Bremsbelag-Trägerplatte an, das sich auf
        die Wärmeableitung und das Gewicht auswirkt.
    brake_pad_compatible_rotor_type:
      name: Mit dem Bremsbelag kompatibler Rotortyp
      description: Gibt den vorgesehenen Rotor-/Scheibenoberflächentyp an, für den
        der Bremsbelag ausgelegt ist.
    brake_pad_compound:
      name: Bremsbelagmischung
      description: Gibt die Reibmaterialzusammensetzung eines Bremsbelags an.
    brake_pad_form_factor:
      name: Formfaktor des Bremsbelags
      description: Gibt das Bremssystem bzw. den Bauformfaktor an, für den der Bremsbelag
        ausgelegt ist (z. B. Scheibenbremse, Trommelbremse, Feststellbremse).
    brake_pad_material:
      name: Bremsbelagmaterial
      description: Gibt die in der Bremsbelagschicht verwendete Reibstoffmischung/Materialgruppe
        an.
    brake_pad_shim_included:
      name: Bremsbelag-Unterlegscheiben enthalten
      description: Gibt an, ob Dämpfungsunterlegscheiben im Lieferumfang enthalten
        oder bereits angebracht sind.
    brake_pad_wear_indicator_type:
      name: Art der Verschleißanzeige für Bremsbeläge
      description: Gibt an, welche Art von Verschleißanzeige bei den Bremsbelägen
        enthalten ist (z. B. eine mechanische Verschleißanzeige oder ein elektronischer
        Sensor).
    brake_position:
      name: Bremsposition
      description: Gibt an, wo am Fahrzeug das Bremsbauteil eingebaut werden soll.
    brake_rotor_mount_type:
      name: Befestigungstyp der Bremsscheibe
      description: Gibt die Schnittstelle an, die zum Anbringen einer Bremsscheibe
        an der Nabe verwendet wird (falls zutreffend).
    brake_service_kit_components_included:
      name: Im Bremsreparatur-Set enthaltene Komponenten
      description: Liste der im Bremsreparatur-Set enthaltenen Werkzeuge/Adapter/Verbrauchsmaterialien.
    brake_shoe_friction_material:
      name: Reibmaterial für Bremsbacken
      description: Die Reibbelagmischung der Bremsbacke (das Material, das mit der
        Bremstrommel in Kontakt kommt).
    brake_shoe_set_contents:
      name: Inhalt des Bremsbacken-Sets
      description: Inhalt des Pakets (z. B. nur Bremsbacken oder Bremsbacken plus
        Hardware/Federn).
    brake_system_type:
      name: Bremssystemtyp
      description: Gibt die Bremstechnologie an, die zur Kontrolle der Spulenrotation
        beim Auswerfen verwendet wird.
    brake_type:
      name: Bremsentyp
      description: Art der Kettbaumbrems-/Spannvorrichtung.
    brandy_age_classification:
      name: Brandy-Altersklassfizierung
      description: Kategorisiert Brandy anhand branchenüblicher Qualitäts- und Altersbezeichnungen
        (z. B. VS, VSOP, XO), die die Mindestanforderungen an die Reifezeit widerspiegeln.
    brass_cleaning_tool_type:
      name: Typ des Reinigungswerkzeugs für Messing
      description: Gibt die Art des Werkzeugs an, das zum Reinigen oder Warten von
        Blechblasinstrumenten verwendet wird.
    brass_instrument_application_area:
      name: Anwendungsbereich bei Blechblasinstrumenten
      description: Die Bereiche des Blechblasinstruments, auf die das Desinfektionsspray
        angewendet werden soll.
    brass_instrument_care_kit_purpose:
      name: Verwendungszweck des Pflegesets für Blechblasinstrumente
      description: Beschreibt das vorgesehene Nutzungsszenario für das Set (routinemäßige
        Wartung, gründliche Reinigung, Reise/Notfall, Starterpaket für Schüler:innen
        usw.).
    brass_instrument_case_shell_material:
      name: Hauptmaterial des Blechblasinstrumentenkoffers
      description: Hauptmaterial der starren Schale/des starren Rahmens (falls zutreffend),
        unabhängig vom allgemeinen Material der Tasche/des Koffers.
    brass_instrument_lubricant_additives_features:
      name: Additive/Eigenschaften des Klappenöls für Blechblasinstrumente
      description: Besondere funktionale Merkmale der Klappenölformulierung.
    brass_instrument_lubricant_base_composition:
      name: Basiszusammensetzung des Klappenöls für Blechblasinstrumente
      description: Primäre Klappenölbasis/-zusammensetzung für Klappenöle von Blechblasinstrumenten.
    brass_instrument_lubricant_viscosity_grade:
      name: Viskositätsgrad des Klappenöls für Blechblasinstrumente
      description: Relative Viskosität/Fließverhalten des für Blechblasinstrumente
        vorgesehenen Klappenöls.
    brass_instrument_replacement_part_type:
      name: Art der Ersatzteile für Blechblasinstrumente
      description: Gibt an, um welche Art von Ersatzteil es sich bei Blechblasinstrumenten
        handelt (Ventil-/Zug-/Wasserklappenkomponenten, Korken/Filze, Schutzvorrichtungen
        usw.).
    brass_instrument_valve_configuration:
      name: Konfiguration des Blechblasinstrument-Ventils
      description: Wie das Instrument die Tonhöhe verändert (Ventil-/Zugmechanismus).
    brass_lubricant_application_area:
      name: Anwendungsbereich für Öl für Blechblasinstrumente
      description: Der Mechanismus eines Blechblasinstruments, für das das Klappenöl
        bestimmt ist.
    brass_mouthpiece_backbore:
      name: Rückbohrung des Messingmundstücks
      description: Profil/Kategorie der Rückbohrung des Mundstücks (Form/Größe der
        Rückbohrung). Beeinflusst die Klangfarbe und die Intonation.
    brass_mouthpiece_cup_depth:
      name: Kesseltiefe des Messingmundstücks
      description: Klassifizierung der Kesseltiefe des Mundstücks (wie tief der Kessel
        ist). Beeinflusst die Klangfarbe und das Ansprechverhalten.
    brass_polishing_cloth_abrasiveness_level:
      name: Schleifgrad des Poliertuchs für Messing
      description: Gibt an, wie stark das Tuch beim Entfernen von Anlaufspuren wirkt
        und inwieweit es für einen sanften Glanz sorgt.
    bread_crumb_base_ingredient:
      name: Basiszutat des Paniermehls
      description: Gibt die Hauptzutat an, aus der die Paniermehlkrümel hergestellt
        werden, z. B. Weizen, Reis, Schweineschwarte oder Mandeln.
    bread_variety:
      name: Auswahl an Brot
      description: Gibt die Art oder Sorte des Brotes oder der Brötchen an und hilft
        Käufer:innen, bestimmte Sorten zu finden (z. B. Brioche, Baguette, Naan).
    breadstick_style:
      name: Grissinistil
      description: Gibt den spezifischen traditionellen Stil oder das Format des Grissinis
        an.
    bridge_head_material:
      name: Material des Hilfsqueue-Kopfs
      description: Das Material, das ausschließlich für den Hilfsqueue-Kopf verwendet
        wurde. Beeinflusst Gewicht, Spielgefühl und Haltbarkeit.
    bridge_head_type:
      name: Typ des Hilfsqueue-Kopfes
      description: Gibt Aufschluss über den Stil des Hilfsqueue-Kopfes und hilft Käufer:innen
        dabei, die gewünschte Form der Queue-Auflage auszuwählen.
    bridle_part_type:
      name: Typ des Zaumzeugteils
      description: Gibt die spezifische Komponente des Zaumzeugs an, die der Ersatzteilartikel
        darstellt, und hilft Kund:innen so, das benötigte Ersatzteil zu finden.
    bridle_style:
      name: Zaumzeugstil
      description: Klassifiziert den Gesamtstil oder die Konstruktion des Zaumzeugs,
        damit Reiter:innen schnell die für ihre Bedürfnisse oder Reitdisziplin geeignete
        Ausrüstung finden können.
    broadhead_field_point_attachment_style:
      name: Befestigungsart für Jagdspitzen/Feldspitzen
      description: Gibt an, wie die Jagdspitze oder Feldspitze am Pfeilschaft befestigt
        wird.
    broadhead_thread_size:
      name: Gewindegröße der Jagdspitze
      description: Listet die Gewindespezifikation auf, die zum Befestigen der Jagd-
        oder Feldspitze am Pfeileinsatz oder -schaft verwendet wird.
    broadhead_tip_type:
      name: Typ der Jagdspitze
      description: Legt die Form der Spitze/der Hülse der Jagdspitze fest, die das
        Eindringen in das Wild einleitet. Beeinflusst die Leistung bei der Jagd auf
        verschiedene Wildarten.
    broccoli_cut:
      name: Form des Brokkolis
      description: Gibt an, wie der Brokkoli vor dem Verpacken geschnitten oder zubereitet
        wurde (z. B. ganzer Kopf, Röschen, geriebener Brokkoli).
    broccoli_variety:
      name: Brokkolisorte
      description: Gibt die spezifische Brokkolisorte oder Marktsorte an (z. B. Tenderstem
        oder Romanesco).
    broom_head_material:
      name: Material des Besenkopfes
      description: Gibt die Materialzusammensetzung des Besenkopfes an, welche sich
        auf die Haltbarkeit und die Spieleigenschaften auswirkt.
    brush_format:
      name: Bürstenformat
      description: Gibt die physische Form einer Ski- oder Snowboardbürste an, wobei
        zwischen handgeführten Bürsten und maschinell betriebenen Rotationsbürsten
        mit Roto-Woll- oder Roto-Filzzylindern unterschieden wird.
    brush_shape:
      name: Bürstenform
      description: Gibt die physikalische Form oder das Profil des Bürstenkörpers
        oder -kopfes an, das sich auf die Kontaktfläche und die Handhabung auswirkt.
    brussel_sprout_preparation:
      name: Rosenkohlzubereitung
      description: Beschreibt die physikalische Zubereitung oder Schnittart des bereitgestellten
        Rosenkohls.
    brussels_sprout_variety:
      name: Rosenkohlsorte
      description: Gibt die Sorte oder Varietät des Rosenkohls an und berücksichtigt
        dabei sowohl aktuelle als auch zukünftige Sorten.
    bubble_blower_features:
      name: Funktionen des Seifenblasen-Bläsers
      description: Listet die gängigen Funktionsmerkmale von Seifenblasen-Bläsern
        auf.
    bubble_gun_bubble_output_modes:
      name: Ausgabemodi der Seifenblasenpistole
      description: Gibt die Betriebsmodi der Seifenblasenpistole an, z. B. Einstellungen
        für Einzelblasen, Dauerausgabe oder mehrere Geschwindigkeiten.
    bubble_machine_features:
      name: Merkmale der Seifenblasenmaschine
      description: Hebt allgemeine Funktionsmerkmale von Seifenblasenmaschinen hervor,
        die über den normalen Betrieb hinausgehen.
    bubble_machine_items_included:
      name: Enthaltene Artikel der Seifenblasenmaschine
      description: Listet die wichtigsten im Lieferumfang enthaltenen Artikel auf
        (z. B. Seifenblasenlösung, zusätzliche Stäbe, Tragegurt oder Fernbedienung).
    bubble_output_rate:
      name: Blasenausstoßrate
      description: Gibt die ungefähre/qualitative Seifenblasenproduktionsrate einer
        Seifenblasenmaschine an (z. B. niedrig/mittel/hoch) und zeigt auf, ob der
        Ausstoß variabel ist.
    bubble_solution_container_type:
      name: Behältertyp der Seifenblasenlösung
      description: Gibt an, wie die Seifenblasenlösung für die Seifenblasenpistole
        bereitgestellt/verwendet wird (z. B. interner Behälter, angeschlossene Flasche
        oder separate Schale).
    bubble_toy_included_accessories:
      name: Im Lieferumfang des Seifenblasenspielzeugs enthaltenes Zubehör
      description: Listet die Artikel auf, die üblicherweise im Lieferumfang des Seifenblasenspielzeugs
        enthaltenen sind (z. B. Lösungsflasche, Schale oder Ersatzstäbe).
    buckwheat_processing_method:
      name: Verarbeitungsmethode des Buchweizens
      description: Beschreibt die Verarbeitung des Buchweizens vor dem Verkauf (z. B.
        geröstet, gekeimt, gepufft).
    buckwheat_product_form:
      name: Form des Buchweizenprodukts
      description: Spezielle physikalische Darreichungsformen des Buchweizens, die
        nicht in der allgemeinen Liste enthalten sind (z. B. Flocken, Puffs, Instant-Beutel).
    bug_collecting_kit_items_included:
      name: Im Set enthaltene Artikel
      description: Werkzeuge und Lehrmaterialien, die in einer Insektensammlung enthalten
        sind.
    built_in_storage_type:
      name: Integrierter Stauraum
      description: Gibt die Arten von Stauraum an, die in das Etagenbett integriert
        sind (z. B. Schubladen, Regale, Stauraum in der Treppe).
    bumper_finish:
      name: Stoßfängeroberfläche
      description: Gibt die Oberflächenbeschichtung oder -veredelung an, mit der der
        Stoßfänger versehen ist.
    bumper_sensor_cutouts:
      name: Aussparungen für Stoßfängersensoren
      description: Gibt an, welche Öffnungen/Aussparungen der Stoßfänger für die OEM-Montage
        aufweist oder unterstützt.
    bunk_bed_configuration:
      name: Etagenbettkonfiguration
      description: Gibt die Kombination aus strukturellem Aufbau und Matratzengröße
        des Etagenbetts an.
    buoyancy:
      name: Auftrieb
      description: Gibt das Schwimmverhalten des Köders oder Kunstköders in der Wassersäule
        an, z. B. ob er schwimmt, sinkt oder in der Mitte schwebt.
    burkini_pieces_included:
      name: Inbegriffene Burkiniteile
      description: Listet die im Burkini-Set enthaltenen Kleidungsstücke auf, damit
        Kund:innen genau wissen, was sie kaufen.
    burn_rate:
      name: Brenngeschwindigkeit
      description: Beschreibt, wie schnell das Zigarettenpapier nach dem Anzünden
        abbrennt.
    bus_model_type:
      name: Busmodelltyp
      description: Gibt die reale Buskonfiguration bzw. den realen Bustyp an, die
        bzw. den das maßstabsgetreue Modell darstellt (Karosserie-/Nutzungsklasse).
    bust_design:
      name: Design des Brustbereichs
      description: Beschreibt die Konfiguration des Brustbereichs und die Ausschnittabdeckung
        des Bodysuits (z. B. offener Brustbereich, integrierter BH, tiefer Ausschnitt).
    butter_variety:
      name: Buttersorte
      description: Gibt die Herstellungsart oder die charakteristische Sorte der Butter
        an, z. B. Sauerrahmbutter, Süßrahmbutter, Butter nach europäischer Art, geklärte
        Butter (Ghee) oder Molkenbutter.
    buttermilk_variety:
      name: Buttermilchsorte
      description: Kennzeichnet die spezifische Art oder Form der verkauften Buttermilch
        (z. B. fermentiert, traditionell, in Pulverform).
    button_application:
      name: Anwendung des Knopfes
      description: Gibt die vorgesehene Anwendung oder die Art des Projekts für den
        Knopf an (z. B. Bekleidung, Polsterung).
    button_attachment_type:
      name: Knopf-Befestigungsart
      description: Bezieht sich auf die Konstruktion des Knopfes für die Befestigung
        am Stoff (z. B. Löcher zum Annähen vs. Öse), nicht auf die Art des Verschlusses.
    button_finish:
      name: Knopfoberfläche
      description: Beschreibt die Oberflächenbeschaffenheit/das Aussehen des Knopfes
        (z. B. matt vs. glänzend).
    buttonhole_elastic_application:
      name: Anwendung des Knopflochgummis
      description: Primärer Verwendungszweck/primäre Anwendung des umgeschlagenen
        Ziergummibands.
    cab_type:
      name: Fahrerhaustyp
      description: Gibt die Konfiguration des LKW-Fahrerhauses an.
    cabasa_construction_type:
      name: Cabasa-Konstruktionstyp
      description: Gibt die physische Konstruktion/den Stil des Cabasa-Körpers und
        der Ketten-/Perlenanordnung an.
    cabbage_variety:
      name: Kohlsorte
      description: Gibt die Kohlsorte an (z. B. Grünkohl, Chinakohl, Wirsing), damit
        Käufer:innen nach Geschmack, Konsistenz und kulinarischer Verwendung filtern
        können.
    cabinet_door_style:
      name: Schranktürstil
      description: Gibt das optische Design der Schranktür an, z. B. Shaker-Stil oder
        Paneelausführung, um eine harmonische Einbindung in die Küchenoptik zu gewährleisten.
    cabinet_overlay_type:
      name: Auflagetyp des Schranks
      description: Gibt an, wie die Türen auf dem Schrankrahmen aufliegen.
    cable_end_type:
      name: Kabelendentyp
      description: Beschreibt die Form oder die Ausführung des Kabelendstücks bzw.
        der -verschraubung, die an die Brems- oder Schalthebel angeschlossen wird.
    cable_housing_construction:
      name: Konstruktion der Kabelummantelung
      description: Beschreibt das strukturelle Design der Ummantelung, z. B. spiralgewickelt,
        kompressionsfrei oder aus segmentierten Gliedern. Wirkt sich auf die Flexibilität
        und das Fahrgefühl aus.
    cable_housing_liner_type:
      name: Typ der Innenbeschichtung der Kabelummantelung
      description: Gibt an, ob das Gehäuse über eine Innenauskleidung und/oder Schmierbehandlung
        verfügt und welches Material bzw. welche Technologie verwendet wird, was Reibungsreduzierung
        und Witterungsbeständigkeit beeinflusst.
    cable_management_type:
      name: Art des Kabelmanagements
      description: Gibt an, welche integrierten Kabel- bzw. Strommanagementfunktionen
        der Konferenztisch bietet.
    cable_surface_treatment:
      name: Oberflächenbehandlung des Kabels
      description: Kennzeichnet spezielle Beschichtungen oder Oberflächenbehandlungen
        des Kabels zur Verringerung von Reibung oder zum Schutz vor Korrosion.
    cabochon_back_type:
      name: Rückseitentyp des Cabochons
      description: Gibt Rückseitenprofil bzw. Oberflächenbeschaffenheit des Cabochons
        an, was Fassungs-, Klebemethoden und Kompatibilität beeinflusst.
    cacao_bean_variety:
      name: Kakaobohnensorte
      description: Gibt die botanische Sorte bzw. den Kultivar der verwendeten Kakaobohne
        an.
    cacao_roast_level:
      name: Kakaoröstgrad
      description: Beschreibt den Röstgrad des Kakaos vor dem Mahlen.
    cage_package_type:
      name: Verpackungsart des Käfigs
      description: Definiert, welche Komponenten im Lieferumfang enthalten sind (z. B.
        nur Netz, Rahmenset oder Komplettpaket).
    cajon_body_shell_material:
      name: Material des Cajón-Korpus bzw. -Gehäuses
      description: Kennzeichnet das Material des Cajón-Korpus bzw. -Gehäuses (ohne
        Schlagfläche).
    cajon_corner_control_system:
      name: Eckenverstellsystem des Cajóns
      description: Gibt an, ob das Cajón eine Anpassung des Eckklangs unterstützt
        (z. B. über Eckschrauben), um die Slap-Ansprache zu verändern.
    cajon_corner_edge_design:
      name: Eck- bzw. Kantendesign des Cajóns
      description: Beschreibt die Konstruktion von Ecken bzw. Kanten, die Komfort
        und Spielbarkeit beeinflusst.
    cajon_feet_type:
      name: Typ der Cajón-Füße
      description: Gibt die Art der Füße des Cajóns an, was Stabilität und Resonanz
        beeinflusst.
    cajon_snare_adjustability:
      name: Einstellbarkeit des Cajón-Snares
      description: Gibt an, ob und wie der Snare-Effekt eingestellt werden kann (Spannung,
        Aktivierung oder beides).
    cajon_snare_system_type:
      name: Typ des Cajón-Snare-Systems
      description: Gibt den internen Snare-Mechanismus an, der den Snare-Effekt erzeugt.
    cake_shape:
      name: Kuchenform
      description: Beschreibt die physische Form, in der der Kaffeekuchen gebacken
        wird.
    cake_topping:
      name: Kuchenbelag
      description: Kennzeichnet den Hauptbelag bzw. die Hauptverzierung des Kaffeekuchens.
    cake_type:
      name: Kuchenart
      description: Beschreibt die Art bzw. Sorte des Kuchens (z. B. Rührkuchen, Biskuit
        oder Käsekuchen).
    caliper_mount_type:
      name: Bremssattel-Montageart
      description: Definiert den Rahmen- bzw. Gabelschnittstellenstandard des Bremssattels
        (z. B. Post Mount oder Flat Mount).
    caliper_mounting_standard:
      name: Bremssattel-Montagestandard
      description: Gibt die Montageschnittstelle bzw. den Montagestandard an (z. B.
        Flat Mount, Post Mount oder IS), mit dem der Bremssattel am Fahrradrahmen
        oder an der Gabel befestigt wird.
    camera_mounting_location_vehicle_exterior:
      name: Kameramontageort (Fahrzeugaußenbereich)
      description: Gibt an, an welcher Stelle des Fahrzeugs die Kamera(s) montiert
        werden sollen (z. B. Frontgrill, Heck oder Seitenspiegel).
    camouflage_environment_type:
      name: Typ der Tarnumgebung
      description: Gibt die primäre Umgebung an, für die das Tarnmuster entwickelt
        wurde, z. B. Wald, Wüste oder Sumpf.
    camping_oil_application:
      name: Campingölanwendung
      description: Gibt den primären Verwendungszweck des Öls beim Camping an (z. B.
        Lampenöl oder Brennstoff für Kocher).
    camshaft_construction:
      name: Bauart der Nockenwelle
      description: Fertigungsart/Rohlingstyp der Nockenwelle.
    camshaft_material:
      name: Material der Nockenwelle
      description: Hauptmaterial des Nockenwellenkerns bzw. der Nockenwelle (Basismaterial).
    camshaft_position:
      name: Nockenwellenposition
      description: Gibt die vorgesehene Position bzw. Art der Nockenwelle innerhalb
        des Motors an (z. B. Einlass oder Auslass bzw. eine bestimmte Zylinderbank/Position).
    candle_container_type_included:
      name: Enthaltener Kerzenbehältertyp
      description: Gibt an, welche Art von Kerzengefäß(en) gegebenenfalls im Paket
        enthalten ist.
    candle_dye_form:
      name: Form des Kerzenfarbstoffs
      description: Gibt die physische Form des bei der Kerzenherstellung verwendeten
        Kerzenfarbstoffs bzw. Färbemittels an.
    candle_fragrance_form:
      name: Form des Duftstoffs für Kerzen
      description: Gibt die Art bzw. Form des Duftstoffs an, der für die Kerzenherstellung
        vorgesehen ist.
    candle_making_tool_type:
      name: Art des Kerzenherstellungswerkzeugs
      description: Kennzeichnet, um welche Art von Werkzeug zur Kerzenherstellung
        es sich handelt (z. B. Gießtopf, Dochtzentrierer oder Thermometer).
    candy_texture:
      name: Textur der Süßigkeit
      description: Beschreibt das Mundgefühl bzw. die Konsistenz der Süßigkeit, unabhängig
        von Geschmack oder Form.
    candying_method:
      name: Kandierungsmethode
      description: Beschreibt, wie die Früchte kandiert bzw. mit Zucker haltbar gemacht
        wurden (z. B. kristallisiert, glasiert oder in Sirup eingelegt).
    canned_meat_form:
      name: Form der Fleischkonserve
      description: Klassifiziert die verarbeitete Form bzw. Präsentation des Fleisches
        innerhalb der Verpackung.
    canoe_construction_type:
      name: Kanukonstruktionstyp
      description: Unterscheidet zwischen verschiedenen Bauarten von Kanurümpfen,
        z. B. Hartschalen-, aufblasbaren oder Faltkanus.
    canoe_hull_shape:
      name: Form des Kanurumpfs
      description: Definiert den hauptsächlichen Rumpfquerschnitt bzw. das Bodenprofil,
        das Stabilität und Handling beeinflusst.
    canoe_stern_design:
      name: Heckform des Kanus
      description: Definiert die Heckform des Rumpfes, die Motorkompatibilität und
        Handling beeinflusst.
    canopy_type:
      name: Art des Baldachins
      description: Beschreibt die Art des Baldachins bzw. der Überdachung, die im
        Lieferumfang des Cabana-Bettes enthalten ist.
    canvas_compatible_media:
      name: Mit der Leinwand kompatible Medien
      description: Gibt an, für welche Kunst- bzw. Bastelmedien die Leinwand vorgesehen
        ist.
    canvas_format:
      name: Leinwandformat
      description: Gibt an, ob die bedruckbare Leinwand als Bögen, Rollen oder vorgeschnittene
        Paneele verkauft wird.
    canvas_mounting_format:
      name: Leinwandmontage/-format
      description: Physisches Format bzw. Montageart der Malleinwand.
    canvas_stretcher_assembly_type:
      name: Montageart des Leinwandkeilrahmens
      description: Gibt an, ob der Keilrahmen montiert als Rahmen oder als Leisten/Set
        zum Zusammenbauen verkauft wird.
    canvas_stretcher_corner_joint_type:
      name: Eckverbindungsart des Leinwandkeilrahmens
      description: Beschreibt, wie die Ecken des Keilrahmens verbunden bzw. konstruiert
        sind (z. B. Zapfenverbindung, Fingerzinkenverbindung, geklammert oder mit
        Keilen).
    canvas_surface_tone:
      name: Oberflächenton der Leinwand
      description: Grundton bzw. Grundfarbe der grundierten Leinwandoberfläche, nicht
        eines aufgedruckten Designs oder Musters (z. B. weiß, schwarz oder getönt).
    canvas_weave_type:
      name: Webart der Leinwand
      description: Beschreibt die Webstruktur der Leinwandoberfläche, die Textur und
        Farbverarbeitung beeinflusst.
    cap_attachment_style:
      name: Kappenbefestigungsart
      description: Gibt die Bau- bzw. Befestigungsart der Saxophonmundstückkappe an,
        die Schutz und Passform im Etui beeinflussen kann.
    cap_construction:
      name: Aufbau der Kappe
      description: Gibt an, wie die Perückenkappe konstruiert ist (z. B. Lace Front,
        Full Lace oder handgeknüpft), was Realismus, Tragekomfort und Stylingmöglichkeiten
        beeinflusst.
    cap_crown_structure:
      name: Struktur der Kappenkrone
      description: Gibt an, ob die Kappenkrone strukturiert (verstärkt) oder unstrukturiert
        (weich) ist.
    cap_fit_type:
      name: Kappenpassform
      description: Definiert, wie die Kappe sitzt bzw. an den Kopf angepasst wird
        (z. B. fest angepasst oder verstellbar).
    cap_seal_type:
      name: Art der Verschlussdichtung
      description: Gibt das Dichtungselement an, das verwendet wird, um Ölleckagen
        und das Austreten von Dämpfen zu verhindern (z. B. O-Ring oder Dichtung).
    cap_size:
      name: Kappengröße
      description: Standardgrößenangaben, die die passende Kopfgröße für die Perückenkappe
        angeben.
    cap_type:
      name: Kappenart
      description: Art der am Ausgleichsbehälter verwendeten Kappen- bzw. Verschlussschnittstelle.
    caper_size_grade:
      name: Größenklasse der Kapern
      description: Klassifiziert Kapern anhand branchenüblicher Güteklassen, die dem
        Knospendurchmesser entsprechen.
    capo_clamping_mechanism:
      name: Klemmmechanismus des Kapodasters
      description: Gibt die Art der Klemmung bzw. Betätigung an, mit der Druck auf
        die Saiten ausgeübt wird (wie der Kapodasters bedient wird).
    capo_finish:
      name: Oberfläche des Kapodasters
      description: Oberfläche des Kapodasters (optisch/haptisch), unabhängig von der
        Farbe (z. B. matt oder glänzend).
    capo_fit_type:
      name: Passform des Kapodasters
      description: Gibt das Halsprofil an, für das das Kapodasters ausgelegt ist (einschließlich
        Radius bzw. Ebenheit), was geräuschfreie Klemmung und Intonation beeinflusst.
    capo_pad_material:
      name: Kapodaster-Padmaterial
      description: Gibt das Material des Kontaktpads an, das die Saiten bzw. das Griffbrett
        berührt (beeinflusst Halt, Stimmstabilität und mögliche Lackabdrücke).
    capo_tension_mechanism:
      name: Spannmechanismus des Kapodasters
      description: Gibt an, wie Druck bzw. Spannung beim Schiebe-Kapodaster auf die
        Saiten ausgeübt und eingestellt wird.
    capture_method:
      name: Fangmethode
      description: Gibt an, ob das Tier in der Falle lebend gefangen oder getötet
        wird.
    car_ev_conversion_kit_motor_type:
      name: Motortyp des Elektrofahrzeug-Umrüst-Kits für Autos
      description: Gibt die im Umrüst-Kit enthaltene oder für das jeweilige Kit erforderliche
        Traktionsmotortechnologie an (z. B. Wechselstrom-Induktionsmotor vs. Permanentmagnetmotor).
    car_playset_items_included:
      name: Enthaltene Auto-Spielset-Artikel
      description: Listet die wichtigsten Komponenten des Auto-Spielsets auf, die
        über die Basis hinausgehen (z. B. Autos, Figuren, Schilder).
    car_shampoo_application_method:
      name: Anwendungsmethode des Autoshampoos
      description: Wie das Shampoo beim Waschen angewendet werden soll.
    car_wash_solution_form:
      name: Form des Autowaschmittels
      description: Gibt die physikalische Form der Autowaschmittels an (z. B. Flüssigkeit,
        Schaum, Tücher).
    car_wash_solution_scent:
      name: Duft des Autowaschmittels
      description: Gibt den Duft des Autowaschmittels an (falls parfümiert).
    carbonated_water_variety:
      name: Kohlensäurehaltiges Wasser
      description: Klassifiziert kohlensäurehaltiges Wasser nach gängigen Marktsorten
        und Zusammensetzung (z. B. Tonic, Selters, funktionales Sprudelwasser).
    carbonation:
      name: Kohlensäure
      description: Beschreibt den Grad oder die Art der Kohlensäure im Getränk (z. B.
        still, leicht sprudelnd, sprudelnd, Nitro).
    carburetor_barrel_count:
      name: Anzahl der Vergaserzylinder
      description: Gibt die Anzahl der Drosselbohrungen bzw. Kammern im Vergaser an.
    carburetor_choke_type:
      name: Art des Vergaser-Chokes
      description: Gibt die Art der Choke-Betätigung des Vergasers an.
    carburetor_mounting_flange_type:
      name: Art des Vergaser-Montageflansches
      description: Gibt die Bauart der Vergaserbefestigungsschnittstelle an, um die
        Passform mit Ansaugung bzw. Ansaugkrümmer sicherzustellen (z. B. Stutzen-
        oder Flansch-/Schraubenmuster).
    card_binder_page_type:
      name: Art der Sammelordnerseiten
      description: Beschreibt bei Sammelordnern bzw. Portfolios die Art der Seiten
        zur Kartenaufbewahrung.
    card_box_holder_type:
      name: Art der Kartenbox bzw. des Kartenhalters
      description: Gibt die funktionale Bauart des Produkts zum Sammeln bzw. Aufbewahren
        von Karten bei Veranstaltungen an (z. B. Box, Briefkastenbox, Korb oder Halterständer).
    card_game_accessory_features:
      name: Merkmale des Kartenspielzubehörs
      description: Beschreibt besondere funktionale Merkmale von Kartenspielzubehör.
    card_lot_type:
      name: Art des Kartensets
      description: Gibt an, ob es sich bei dem Produkt um eine einzelne Karte oder
        ein Kartenlos/Sortiment mit mehreren Karten handelt.
    card_sleeve_size_format_compatibility:
      name: Größen-/Formatkompatibilität der Kartenhüllen
      description: Gibt die Kartengröße(n) an, für die die Hüllen, Seiten bzw. Deckboxen
        ausgelegt sind.
    carding_surface_pin_material:
      name: Material der Kardiernadeln
      description: Material der Nadeln bzw. Zähne zum Auflockern und Öffnen der Fasern.
    care_durability:
      name: Pflegebeständigkeit
      description: Gibt die erwartete Wasch- bzw. Hitzebeständigkeit des Labels nach
        dem Aufbringen an.
    care_label_attachment_type:
      name: Befestigungsart des Pflegeetiketts
      description: Gibt an, wie das Pflegeetikett am Artikel angebracht werden soll
        (z. B. einnähen, aufbügeln/Heattransfer oder kleben).
    care_label_format:
      name: Format des Pflegeetiketts
      description: Physisches bzw. gedrucktes Format des Pflegeetiketts.
    care_label_symbol_system:
      name: Symbolsystem des Pflegeetiketts
      description: Gibt die auf dem Etikett verwendeten Normen bzw. Symbole an (z. B.
        ISO-Pflegesymbole oder ASTM-/US-Symbole).
    cargo_area_configuration:
      name: Konfiguration des Laderaums
      description: Gibt die Bauart bzw. Position des Laderaums an einem Lastenfahrrad
        an (z. B. Longtail, Frontlader oder Dreirad).
    cargo_net_adjustability:
      name: Verstellbarkeit des Laderaumnetzes
      description: Gibt an, ob und wie das Laderaumnetz hinsichtlich Spannung bzw.
        Passform angepasst werden kann.
    cargo_net_position:
      name: Position des Laderaumnetzes
      description: Gibt an, wo im Koffer- bzw. Laderaum das Netz montiert werden bzw.
        verwendet werden soll.
    cargo_net_stretch_type:
      name: Dehnbarkeit des Laderaumnetzes
      description: Gibt an, ob das Kofferraum-Laderaumnetz elastisch/dehnbar oder
        fest/nicht dehnbar ist.
    cargo_net_style:
      name: Bauart des Laderaumnetzes
      description: Gibt die Bauart bzw. den Formfaktor des Laderaumnetzes an (z. B.
        Gummiseil, Gurtband, Barriere oder Hängematte).
    cargo_rack_finish:
      name: Oberflächenfinish des Gepäckträgers
      description: Oberflächenveredelung bzw. Beschichtung des Gepäckträgers
    carpet_cleaner_application_method:
      name: Anwendungsmethode des Teppichreinigers
      description: Gibt an, wie das Produkt aufgetragen und in den Teppich eingearbeitet
        werden soll (über die allgemeine Produktform hinaus).
    carrier_style:
      name: Trägersystemtyp
      description: Der Trägermechanismus bzw. die Trägerart zur Befestigung des Bootes
        am Fahrzeug.
    carrot_size:
      name: Karottengröße
      description: Klassifiziert die allgemeine Größe der Karotte.
    carrot_variety:
      name: Karottensorte
      description: Kennzeichnet die spezifische Sorte bzw. Züchtung der Karotte.
    carrying_capacity_pairs_boards:
      name: Tragfähigkeit (Paare/Boards)
      description: Gibt an, wie viele Ski (Paare) oder Snowboards ein Zubehörteil
        bei Verwendung mit dem Träger aufnehmen bzw. unterstützen kann (z. B. Erweiterungssets).
    cartridge_thread_compatibility:
      name: Kompatibilität des Kartuschengewindes
      description: Gibt den Gewindestandard an, den ein Verdampfer oder Akku unterstützt,
        damit Kartuschen und Akkus physisch kompatibel sind.
    case_capacity_butts_shafts:
      name: Kofferkapazität (Unterteile × Oberteile)
      description: Definiert, wie viele Queue-Unterteile und -Oberteile der Koffer
        aufnehmen kann, angegeben im Format Unterteile × Oberteile (z. B. 2×4 = 2
        Unterteile und 4 Oberteile).
    case_features:
      name: Merkmale der Kiste
      description: Hebt die funktionalen Merkmale des Becken-/Schlagzeugkoffers in
        Bezug auf Schutz und Transport hervor.
    case_humidifier_refill_type:
      name: Nachfüllart des Kofferbefeuchters
      description: Gibt an, ob der Luftbefeuchter wiederverwendbare (erneut befeuchtbare/regenerierbare)
        Medien oder austauschbare Einweg-Nachfüllpackungen verwendet.
    case_lining_material:
      name: Kistenfuttermaterial
      description: Bezeichnet das hauptsächliche Material, das die Innenseite eines
        Koffers oder Gigbags auskleidet und das Instrument bzw. den Inhalt schützt.
    case_material:
      name: Gehäusematerial
      description: Bestimmt das hauptsächliche Material des Uhrengehäuses, das Haltbarkeit,
        Gewicht und Ästhetik beeinflusst.
    case_mounting_method:
      name: Montageart des Kofferbefeuchters
      description: Beschreibt, wie der Befeuchter im Instrumentenkoffer positioniert
        bzw. befestigt werden soll.
    case_structure:
      name: Kofferkonstruktion
      description: Gibt die Steifigkeit der Kofferkonstruktion an.
    case_style_cymbal_drum:
      name: Kofferstil (Becken/Schlagzeug)
      description: Gibt an, ob es sich bei dem Produkt um eine weiche Tasche, einen
        harten Koffer oder eine Hybridkonstruktion für den Transport von Becken oder
        Schlagzeugen handelt.
    casing_material:
      name: Karkassenmaterial
      description: Kennzeichnet das hauptsächliche Material der Reifenkarkasse, das
        Gewicht, Fahrgefühl und Pannenschutz beeinflusst.
    casino_set_chip_material:
      name: Chipmaterial des Casino-Sets
      description: Hauptmaterial der enthaltenen Chips (falls zutreffend).
    casino_set_layout_included:
      name: Enthaltenes Spielfeldlayout des Casino-Sets
      description: Gibt an, welche Art von Spielfläche bzw. Spielfeldlayout im Set
        enthalten ist.
    cask_finish:
      name: Fassveredelung
      description: Gibt das Fass an, das zur Veredelung oder Reifung der Spirituose
        verwendet wird, z. B. Bourbonfass oder Sherryfass.
    cassava_variety:
      name: Manioksorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät des angebotenen
        Manioks, die Geschmack, Farbe und Kocheigenschaften beeinflusst.
    cassette_body_type:
      name: Freilaufkörpertyp
      description: Gibt den Freilauf- bzw. Antriebsstandard an, den die Hinterradnabe
        bzw. das Hinterrad unterstützt (z. B. HG 11, XDR oder Microspline).
    cassette_deck_feature_set:
      name: Funktionsumfang des Kassettendecks
      description: Kennzeichnet Kassettentransport- und Wiedergabefunktionen, die
        bei integrierten Kassettenabspielern üblich sind.
    cassette_speed_compatibility:
      name: Kompatibilität der Kassettengeschwindigkeit
      description: Gibt die Anzahl der Gänge an (z. B. 7-fach oder 12-fach), für die
        die Kassette bzw. das Freilaufritzel ausgelegt ist, um die Kompatibilität
        mit Kette, Schalthebel und Schaltwerk sicherzustellen.
    castanet_shell_size_class:
      name: Größenklasse der Kastagnettenschalen
      description: Standardisierte Größenklasse für Kastagnettenschalen, die häufig
        von Spieler:innen und Lehrkräften zur Auswahl von Passform und Klang verwendet
        wird.
    castanets_included_pieces:
      name: Enthaltene Teile der Kastagnetten
      description: Gibt an, was im Produkt enthalten ist (Paar oder Einzelstück sowie
        zusätzliches Zubehör).
    castanets_pitch:
      name: Tonhöhe der Kastagnetten
      description: Gibt die vom Hersteller verwendete Tonhöhen- bzw. Größenbezeichnung
        zur Beschreibung des Klangumfangs an.
    castanets_type:
      name: Art der Kastagnetten
      description: Gibt die Bauart bzw. vorgesehene Verwendungskategorie der Kastagnetten
        an.
    caster_type:
      name: Rollentyp
      description: Kennzeichnet die Art der am Wagen angebrachten Rollen oder Räder
        (z. B. Lenkrollen oder Feststellrollen), die Manövrierfähigkeit und Stabilität
        beeinflusst.
    castle_playset_included_items:
      name: Im Burg-Spielset enthaltene Artikel
      description: Erfasst die wichtigsten Bestandteile des Burg-Spielsets, damit
        Käufer:innen verschiedene Sets vergleichen können (z. B. Figuren, Möbel, Fahrzeuge
        oder Zubehör).
    catcher_equipment_included:
      name: Catcherausrüstung inklusive
      description: Gibt die Komponenten an, die in einem Catcher-Ausrüstungsset enthalten
        sind, z. B. Catcherhelm oder Brustschutz.
    catcher_helmet_style:
      name: Bauart des Catcherhelms
      description: Kennzeichnet die allgemeine Bauart der Schutzausrüstung des Catchers.
    cattle_breed:
      name: Rinderrasse
      description: Gibt die Rinderrasse an, von der das Rindfleisch stammt (z. B.
        Angus, Wagyu oder Hereford).
    cauliflower_variety:
      name: Blumenkohlsorte
      description: Kennzeichnet die Sorte, Farbe oder besondere Varietät des angebotenen
        Blumenkohls.
    celery_form:
      name: Form des Selleries
      description: Gibt die physische Form bzw. Schnittart an, in der der Sellerie
        verkauft wird.
    celery_variety:
      name: Selleriesorte
      description: Erfasst die spezifische Sorte bzw. Varietät des Selleries, damit
        Käufer:innen nach Geschmacksprofil, Farbe oder kulinarischer Verwendung auswählen
        können.
    cereal_bar_texture:
      name: Textur des Müsliriegels
      description: Beschreibt das Mundgefühl bzw. die Konsistenz des Müsliriegels
        (z. B. zäh oder knusprig).
    cereal_type:
      name: Art des Frühstücksgetreides
      description: Klassifiziert die Formen bzw. Formate von Frühstücksgetreide oder
        Granola (Flocken, Puffs, Granola-Cluster, Müsli usw.), damit Käufer:innen
        eine bevorzugte Textur oder Zubereitungsart finden können.
    certificate_border_style:
      name: Stil des Zertifikatsrahmens
      description: Beschreibt die dekorative Gestaltung des Zertifikatsrahmens.
    certificate_personalization_type:
      name: Personalisierungsart des Zertifikats
      description: Gibt an, wie das Zertifikat personalisiert werden kann (leer für
        handschriftliche Einträge, druckbare Vorlage, vorgedruckte variable Felder
        usw.).
    certification_service:
      name: Zertifizierungsdienst
      description: Externes Bewertungs- bzw. Zertifizierungsunternehmen (falls zutreffend).
    certification_standard:
      name: Zertifizierungsstandard
      description: Gibt die Sicherheits- und Feuerbeständigkeitszertifizierung bzw.
        den Konformitätsstandard an, den die Sturmhaube erfüllt.
    chain_coating_finish:
      name: Kettenbeschichtung/-oberfläche
      description: Gibt an, welche Oberflächenbehandlung bzw. Veredelung auf die Kette
        aufgebracht wurde, um Haltbarkeit zu verbessern, Reibung zu verringern, Korrosion
        zu verhindern oder das Aussehen zu verändern (z. B. Ti-Nitrid, DLC, Nickel
        oder rostschutzbeschichtetes EPT).
    chain_connection_type:
      name: Art der Kettenverbindung
      description: Gibt die Verschlussmethode an, die zum Verbinden der Kettenenden
        verwendet bzw. benötigt wird.
    chain_tier_configuration:
      name: Konfiguration der Kettenebenen
      description: Gibt die Anzahl bzw. Anordnung der Kettenebenen in der Fangvorrichtung
        an (ein-, zwei- oder dreistufig).
    chain_tool_type:
      name: Art des Kettenwerkzeugs
      description: Klassifiziert die jeweilige Art des Fahrradkettenwerkzeugs, damit
        Käufer:innen schnell das passende Werkzeug finden können.
    chainring_shape:
      name: Form des Kettenblatts
      description: Gibt die Form des Kettenblatts an, z. B. rund oder oval/elliptisch.
    chair_accessories_included:
      name: Stuhlzubehör inklusive
      description: Listet integrierte oder im Lieferumfang enthaltene Zubehörteile
        auf, die die Funktionalität des Stuhls verbessern.
    chair_sash_care_instructions:
      name: Pflegehinweise für Stuhlschärpen
      description: Beschreibt die empfohlene Reinigungs- bzw. Pflegemethode für die
        Stuhlschärpe.
    chair_sash_finish:
      name: Oberfläche der Stuhlschärpe
      description: Beschreibt den Oberflächenglanz bzw. die Oberflächenbeschaffenheit
        des Schärpenstoffs.
    chair_storage_design:
      name: Aufbewahrungsart des Stuhls
      description: Gibt an, wie der Sling-Stuhl gelagert werden soll (z. B. faltbar,
        stapelbar oder nicht zusammenklappbar), damit Kund:innen Lagerung und Transportierbarkeit
        besser einschätzen können.
    chaise_or_sectional_orientation:
      name: Ausrichtung der Chaiselongue bzw. Wohnlandschaft
      description: Gibt an, auf welcher Seite sich die integrierte Chaiselongue bzw.
        der verlängerte Bereich befindet, wenn man vor dem Sofa steht.
    chamber_size:
      name: Kammergröße
      description: Gibt die Kammergröße bzw. das Volumen des Mundstücks an, was Widerstand
        und Klangfarbe beeinflusst.
    chanter_finger_spacing:
      name: Fingerabstand der Spielpfeife
      description: Gibt das Fingerabstands- bzw. Größenprofil der Spielpfeife an (oft
        als Standard, für kleine Hände oder für große Hände beschrieben).
    chanter_type:
      name: Spielpfeifentyp
      description: Gibt die im Instrument enthaltene bzw. verwendete Bauart der Spielpfeife
        an, z. B. offen, geschlossen, Übungspfeife oder mit Klappen.
    chard_variety:
      name: Mangoldsorte
      description: Kennzeichnet die spezifische Sorte bzw. Farbvariante des angebotenen
        Mangolds.
    charging_port_location:
      name: Position des Ladeanschlusses
      description: Physische Position des primären externen Ladeanschlusses (Charging
        Port) des Fahrzeugs.
    chassis_construction_type:
      name: Chassiskonstruktionstyp
      description: Beschreibt die hauptsächliche Fahrgestellkonstruktion des Fahrzeugs.
    checkbook_loading_orientation:
      name: Ausrichtung des Scheckbuchformats
      description: Gibt an, ob der Scheckbuchumschlag mit von oben, von der Seite
        oder universell einlegbaren Scheckformaten kompatibel ist.
    cheekpiece_style:
      name: Art des Wangenstücks
      description: Definiert die Art der Seiten- bzw. Ringkonfiguration am Wassertrensengebiss,
        die Zügelwirkung und Seitenstabilität bestimmt.
    cheese_alternative_form:
      name: Form der Käsealternative
      description: Gibt die physische Form bzw. Schnittart an, in der die Käsealternative
        verkauft wird.
    cheese_form:
      name: Form des Käses
      description: Beschreibt die physische Darreichungsform des Käses (z. B. Laib,
        Block, in Scheiben oder gerieben).
    cheese_texture:
      name: Textur des Käses
      description: Klassifiziert den Käse nach seiner allgemeinen Textur bzw. Festigkeit.
    cheese_variety:
      name: Käsesorte
      description: Gibt die Käsesorte an, die als hauptsächliches Aroma im Snack verwendet
        wird.
    cherimoya_variety:
      name: Cherimoya-Sorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät der Cherimoya
        (z. B. Fino de Jete oder El Bumpo).
    cherry_variety:
      name: Kirschensorte
      description: Gibt die Sorte bzw. Varietät der Kirschen an und hilft Käufer:innen
        dabei, Sorten nach Geschmack, Farbe, Größe oder kulinarischem Verwendungszweck
        auszuwählen.
    chest_pocket_style:
      name: Art der Brusttasche
      description: Gibt Vorhandensein und Anordnung der Brusttaschen am Hemd an.
    chewing_tobacco_form:
      name: Form des Kautabaks
      description: Kennzeichnet die physische Form, Schnittart oder Beutelgröße des
        Kautabaks (z. B. lose Blätter, Long Cut oder Slim Pouch).
    chicory_variety:
      name: Zichoriensorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät der angebotenen
        Zichorie (z. B. Radicchio, Belgische Endivie oder Escarole).
    chiffon_recommended_use:
      name: Empfohlene Verwendung von Chiffon
      description: Empfohlene Näh- bzw. Bastelanwendungen für Chiffonstoffe.
    child_seat_accessory_type:
      name: Art des Kindersitzzubehörs
      description: Definiert die konkrete Art des Kindersitzzubehörs bzw. Ersatzteils
        (z. B. Sitzkissen, Fußstütze oder Montageadapter), damit Käufer:innen schnell
        den benötigten Artikel finden können, ohne viele Mikrokategorien anzulegen.
    child_seat_mounting_type:
      name: Befestigungsart des Kindersitzes
      description: Gibt an, wie der Fahrradkindersitz am Fahrradrahmen, Gepäckträger
        oder Cockpitbereich befestigt wird.
    chime_sound_character:
      name: Klangcharakter des Glockenspiels
      description: Beschreibt den beabsichtigten Klangcharakter bzw. die Klangfarbe
        des Glockenspiels.
    chin_cup_type:
      name: Kinnkappentyp
      description: Gibt die Art bzw. Konstruktion der Kinnkappe an, die Komfort und
        Aufprallschutz beeinflusst.
    chin_strap_type:
      name: Kinnriementyp
      description: Gibt den Kinnriementyp eines Huts an–kein, fest, verstellbar oder
        abnehmbar–, damit leichter Modelle ausgewählt werden können, die auch bei
        Wind oder Bewegung sicher sitzen.
    china_cymbal_edge_shape:
      name: Form des China-Beckenrands
      description: Beschreibt das für China-Becken typische Rand- bzw. Flanschprofil
        (wie stark der Rand nach oben gebogen ist), das Spielgefühl und Klang beeinflusst.
    china_cymbal_sound_character:
      name: Klangcharakter des China-Beckens
      description: Primäre Klang- bzw. Toncharakterbeschreibungen für ein China-Becken
        zur Suche und Filterung (z. B. trashig, dunkel, hell). Es können mehrere Werte
        zutreffen.
    chinstrap_type:
      name: Kinnriementyp
      description: Art des mit dem Helm gelieferten Kinnriemens.
    chip_cut_style:
      name: Schnittart der Chips
      description: Gibt Schnitt- bzw. Texturart der Chips an (z. B. geriffelt, kettle
        cooked, gepoppt).
    chip_denomination:
      name: Chip-Nennwert
      description: Gibt an, welche Chip-Nennwerte (Werte) im Set enthalten sind (aufgedruckt
        oder zugewiesen).
    chocolate_form:
      name: Schokoladenform
      description: Beschreibt die physische Form, in der die Backschokolade verkauft
        wird.
    choy_sum_variety:
      name: Choy-Sum-Sorte
      description: Gibt die konkrete Handels- bzw. botanische Sorte des angebotenen
        Choy Sum an.
    cigar_wrapper_color:
      name: Farbe des Zigarrendeckblatts
      description: Standardisierte Farbklassifizierung des Zigarrendeckblatts.
    cigarette_filter_type:
      name: Zigarettenfiltertyp
      description: Gibt an, ob die Zigarette einen Filter besitzt und gegebenenfalls
        dessen Bauart bzw. Besonderheit.
    cigarette_size:
      name: Zigarettengröße
      description: Klassifiziert Zigaretten nach branchenüblicher Längen- bzw. Formatbezeichnung
        (z. B. King Size, 100s, Slim).
    cigarette_strength_descriptor:
      name: Stärkebezeichnung für Zigaretten
      description: Traditionelle Marketingbezeichnung zur Kennzeichnung der Teer-
        bzw. Nikotinintensität (z. B. Light, Bold, Silver).
    cinch_liner_material:
      name: Material des Cinch-Futters
      description: Kennzeichnet das Material der Polsterung bzw. des Futters, das
        am Pferd anliegt.
    circular_knitting_needle_cable_type:
      name: Kabeltyp der Rundstricknadel
      description: Material, Verhalten und Konstruktion des Kabels (z. B. beschichteter
        Stahl, Nylon), die Knickverhalten, Formstabilität und Drehverhalten beeinflussen.
    circular_knitting_needles_tip_material:
      name: Material der Rundstricknadelspitzen
      description: Material der beiden Nadelspitzen (im Unterschied zum Kabelmaterial).
    circumference_adjustment_mechanism:
      name: Umfangverstellmechanismus
      description: Mechanismus zum Einstellen oder Fixieren des Strangumfangs.
    clamp_design:
      name: Klemmdesign
      description: Beschreibt den strukturellen Stil oder Mechanismus der Klemme.
    clamp_sheet_music_clip_features:
      name: Funktionen der Notenblattklemme
      description: Funktions- und Schutzmerkmale von Notenblattklemmen (z. B. Polsterung,
        rutschfest, drehbar).
    clamping_closure_type:
      name: Klemm-/Verschlussart
      description: Beschreibt den Mechanismus, mit dem der Stickrahmen am Stoff befestigt
        bzw. gespannt wird.
    clarinet_bell_acoustic_design:
      name: Akustikdesign des Klarinettenschallbechers
      description: Beschreibt die Klang- bzw. Belüftungskonstruktion des Schallbechers
        zur Beeinflussung von Ansprache und Intonation.
    clarinet_bell_adjustment_mechanism:
      name: Verstellmechanismus des Klarinettenschallbechers
      description: Beschreibt, wie Länge bzw. Geometrie des Schallbechers angepasst
        werden.
    clarinet_bell_ring_material:
      name: Material des Klarinettenschallbecherrings
      description: Gibt das Material des Schutzrings bzw. -bands am Rand des Klarinettenschallbechers
        an, falls vorhanden.
    clarinet_bell_tuning_effect:
      name: Stimmungseffekt des Klarinettenschallbechers
      description: Gibt an, wie der Schallbecher im Vergleich zu einem Standardschallbecher
        Stimmung bzw. Intonation beeinflusst (insbesondere Kehltöne und tiefe Register).
    clarinet_body_type:
      name: Art des Klarinettenkorpus
      description: Kennzeichnet die primäre Korpusbauart der A-Klarinette.
    clarinet_bore_type:
      name: Bohrungstyp der Klarinette
      description: Beschreibt die Bohrungskonstruktion der Altklarinette.
    clarinet_cap_style:
      name: Stil der Klarinettenkappe
      description: Designstil der Kappe, die einer Klarinettenligatur bzw. Mundstückkappe
        beiliegt (z. B. umgekehrt oder belüftet).
    clarinet_care_kit_intended_use:
      name: Verwendungszweck des Klarinettenpflegesets
      description: Primärer Einsatzzweck, für den das Set konzipiert ist (z. B. schnelles
        tägliches Trocknen vs. gründliche Reinigung/Wartung).
    clarinet_included_accessories:
      name: Enthaltenes Klarinettenzubehör
      description: Gibt an, was im Lieferumfang der B-Klarinette enthalten ist.
    clarinet_keywork_material:
      name: Material der Klarinettenmechanik
      description: Gibt das Material der Klarinettenmechanik an (z. B. Messing, Neusilber,
        versilbert).
    clarinet_keywork_plating:
      name: Klarinettenklappenbeschichtung
      description: Gibt Beschichtung bzw. Materialoberfläche der Klarinettenklappen
        an.
    clarinet_mouthpiece_baffle_profile:
      name: Schallwandprofil des Klarinettenmundstücks
      description: Beschreibt das innere Schallwand- bzw. Dachprofil des Klarinettenmundstücks,
        das Helligkeit und Projektion beeinflusst.
    clarinet_mouthpiece_beak_shape:
      name: Form des Klarinettenmundstückschnabels
      description: Gibt äußeres Schnabelprofil bzw. den Winkel für Spielkomfort und
        Ansatzgefühl an.
    clarinet_mouthpiece_chamber_size:
      name: Größe der Kammer des Klarinettenmundstücks
      description: Beschreibt die relative Kammergröße eines Klarinettenmundstücks
        (wie vom Hersteller angegeben), die Klangfarbe und Blaswiderstand beeinflussen
        kann.
    clarinet_mouthpiece_intended_tone:
      name: Beabsichtigter Klang des Klarinettenmundstücks
      description: Beschreibt die allgemeine Klangcharakteristik, für die das Mundstück
        ausgelegt ist.
    clarinet_mouthpiece_player_level:
      name: Spielniveau des Klarinettenmundstücks
      description: Gibt das typische Spielniveau der Zielgruppe für das Mundstück
        an.
    clarinet_reed_cut:
      name: Schnitt des Klarinettenblatts
      description: Gibt Schnitt bzw. Profil des Rohrblatts an (z. B. filed, unfiled
        oder andere vermarktete Schnittarten), was Ansprache und Klang beeinflusst.
    clarinet_reed_material_type:
      name: Materialart des Klarinettenblatts
      description: Gibt an, aus welchem Material das Rohrblatt besteht (Rohrholz oder
        synthetisch sowie gängige synthetische Unterarten).
    clarinet_thumb_rest_type:
      name: Typ der Daumenstütze der Klarinette
      description: Art bzw. Eigenschaft der rechten Daumenstütze.
    classical_guitar_string_3rd_string_type:
      name: Typ der 3. Saite der klassischen Gitarre
      description: Gibt an, ob die G-Saite (3. Saite) blank (monofilament) oder umsponnen
        ist.
    classical_guitar_string_bass_winding_material:
      name: Wickelmaterial der Basssaiten der klassischen Gitarre
      description: Das Umspinnungs- bzw. Wickelmaterial der Basssaiten (typischerweise
        Saiten 4–6).
    classical_guitar_string_set_configuration:
      name: Konfiguration des Saitensatzes der klassischen Gitarre
      description: Gibt an, ob das Produkt ein kompletter Saitensatz oder einzelne
        Saiten (typischerweise Diskant- oder Basssaiten) für eine klassische Gitarre
        sind.
    clay_modeling_dough_base_material:
      name: Basismaterial von Ton und Modelliermasse
      description: Primäre Zusammensetzung bzw. Basisart des Modelliermaterials.
    clay_modeling_dough_curing_method:
      name: Aushärtungsmethode von Ton und Modelliermasse
      description: Beschreibt, wie das Material aushärtet (bzw. wiederverwendbar bleibt),
        wodurch benötigte Werkzeuge und typische Einsatzbereiche bestimmt werden.
    clay_paintability:
      name: Bemalbarkeit von Ton
      description: Gibt an, ob die ausgehärtete Tonoberfläche bemalt werden kann und
        welche Farbarten empfohlen werden.
    clay_primary_composition:
      name: Primäre Zusammensetzung des Tons
      description: Primäres Basismaterial bzw. Bindemittel des lufttrocknenden Tons
        (z. B. auf Papierbasis oder mineralischer Basis).
    clay_shooting_discipline:
      name: Disziplin des Tontaubenschießens
      description: Gibt die Disziplin bzw. den Wettbewerb im Tontaubenschießen an,
        für den das Produkt vorgesehen ist.
    cleaner_format:
      name: Format des Reinigers
      description: Verpackung bzw. Format des Slide-Reinigers.
    cleaner_sanitizer_intended_area:
      name: Vorgesehener Einsatzbereich des Reinigungs- bzw. Desinfektionsmittels
      description: Hauptbereich des Blechblasinstruments, für den das Produkt zur
        Reinigung bzw. Desinfektion vorgesehen ist.
    cleaning_formula:
      name: Reinigungsformel
      description: Gibt die primäre chemische Reinigungs- bzw. Desinfektionsmittelbasis
        des Produkts an (nicht die Marke), um Sicherheits-, Kompatibilitäts- und Nutzungsfilterung
        zu unterstützen.
    cleaning_task_focus:
      name: Schwerpunkt der Reinigungsaufgabe
      description: Kennzeichnet die hauptsächlichen Reinigungsprobleme, für die die
        wasserlose Reinigung vorgesehen ist.
    cleanup_method:
      name: Reinigungsmethode
      description: Gibt an, wie der Klebstoff (im nassen Zustand) von Händen, Werkzeugen
        oder Oberflächen entfernt werden soll.
    clear_glue_application_method:
      name: Auftragsmethode für transparenten Klebstoff
      description: Gibt die Art des Spenders bzw. Applikators an, der der Verpackung
        des transparenten Klebstoffs beiliegt.
    clear_glue_finish_after_drying:
      name: Oberflächenfinish des transparenten Klebstoffs (nach dem Trocknen)
      description: Beschreibt das Erscheinungsbild des Klebstoffs nach dem Trocknen
        bzw. Aushärten (z. B. kristallklar vs. durchscheinend, glänzend vs. matt).
    cleat_bolt_pattern:
      name: Lochmuster der Schuhplatte
      description: Gibt die Schraubenkonfiguration des Schuhs zur Befestigung der
        Schuhplatte an, die die Kompatibilität von Pedal und Schuh bestimmt (z. B.
        2-Loch-MTB vs. 3-Loch-Rennrad).
    cleat_compatibility:
      name: Stollenkompatibilität
      description: Gibt an, zu welchen Pedal- oder Cleat-Systemen der Schuhüberzug
        passt.
    cleat_finish:
      name: Oberflächenfinish der Klampe
      description: Gibt die Oberflächenbeschaffenheit bzw. Beschichtung der Bootsklampe
        an, die Korrosionsbeständigkeit und Aussehen beeinflusst.
    cleat_receptacle_system:
      name: Aufnahmesystem für Schuhplatten
      description: Kennzeichnet die kompatible Befestigungsschnittstelle für Spikes
        bzw. Schuhplatten bei Golfschuhen mit Spikes.
    cleat_release_mechanism:
      name: Freigabemechanismus für Stollen
      description: Gibt an, wie sich eine Fahrradschuhplatte vom Pedal löst (z. B.
        einfache oder multidirektionale Auslösung).
    cleat_stud_type:
      name: Typ der Schuhstollen
      description: Gibt Bauart bzw. Befestigungsart der Stollen bzw. Cleats an der
        Außensohle von American-Football-Schuhen an.
    climate_control_module_function:
      name: Funktion des Klimasteuerungsmoduls
      description: Gibt die primäre Funktion des Moduls im Fahrzeugklimasystem an.
    climbing_hold_mounting_type:
      name: Montageart des Klettergriffs
      description: Gibt an, wie der Griff an Wand oder Trainingsboard befestigt wird.
    climbing_hold_type:
      name: Klettergrifftyp
      description: Kategorisiert Form bzw. Stil des Griffs, wodurch bestimmt wird,
        wie er gegriffen wird.
    climbing_protection_device_type:
      name: Art der Kletterschutzausrüstung
      description: Gibt die Art des Sicherungsgeräts an (z. B. Cam, Klemmkeil oder
        Haken), damit schneller die passende Ausrüstung für eine bestimmte Felsformation
        oder einen bestimmten Kletterstil gefunden werden kann.
    climbing_rope_middle_marking:
      name: Mittelmarkierung des Kletterseils
      description: Beschreibt, wie die Mitte (und/oder die Enden) des Seils markiert
        sind, um sicheres Abseilen und Ablassen zu unterstützen.
    climbing_rope_treatment:
      name: Behandlung des Kletterseils
      description: Gibt wasserabweisende, trockene oder schützende Beschichtungen
        an, die auf Mantel und/oder Kern des Seils aufgebracht wurden.
    climbing_rope_type:
      name: Typ des Kletterseils
      description: Klassifiziert das Seil nach UIAA-Zertifizierung und Verwendungszweck
        (z. B. dynamisches Einfachseil, Halbseil, Zwillingsseil, statisches Seil oder
        Reepschnur), damit schnell das passende Seil gefunden werden kann.
    climbing_safety_certifications:
      name: Sicherheitszertifizierungen fürs Klettern
      description: Listet die Kletter- und Industriesicherheitsstandards auf, die
        das Gerät erfüllt.
    clip_color:
      name: Farbe des Clips
      description: Hauptfarbe der Notenblattklemme.
    clip_mechanism_type:
      name: Typ des Clip-Mechanismus
      description: Definiert den Verschlussmechanismus eines Geldclips oder einer
        Geldbörsenklammer, um Käufer:innen die Auswahl zwischen Magnet-, Federsteg-,
        Hebel- und anderen Varianten zu erleichtern.
    clip_style:
      name: Clipstil
      description: Kennzeichnet den spezifischen Clipmechanismus zur Befestigung des
        Halters und liefert Kompatibilitätsinformationen (z. B. Krokodilklemme oder
        Karabiner).
    clipper_motor_technology:
      name: Motortechnologie des Haarschneiders
      description: Kennzeichnet die im Haarschneider verwendete Motorkonstruktion,
        die Leistung, Geräuschentwicklung, Haltbarkeit und Wartungsaufwand beeinflusst.
    closet_configuration:
      name: Schrankkonstruktion
      description: Definiert die allgemeine Form bzw. das Layout des begehbaren Kleiderschranksystems
        (z. B. L-förmig, U-förmig oder mit Insel).
    closing_mechanism:
      name: Schließmechanismus
      description: Gibt die Schließfunktion der Schublade an, z. B. Standard, Soft-Close,
        Selbstschließung oder Push-to-Open.
    cloth_construction:
      name: Stoffaufbau
      description: Gibt Webart bzw. Oberflächenbeschaffenheit des Tuchs an, die Geschwindigkeit
        und Haltbarkeit beeinflusst (z. B. Kammgarn vs. Wollgarn).
    cloth_thickness:
      name: Stoffdicke
      description: Gibt Dicke bzw. Gewichtsklasse des Poliertuchs an.
    club_head_material:
      name: Material des Schlägerkopfs
      description: Gibt das Hauptmaterial an, aus dem der Schlägerkopf gefertigt ist.
    clutch_hydraulic_system_type:
      name: Typ des Kupplungshydrauliksystems
      description: Gibt die Kompatibilität des Kupplungsbetätigungs- bzw. Hydrauliksystems
        an (z. B. hydraulische Kupplung oder Umrüstung auf Seilzug).
    clutch_line_connection_type:
      name: Anschlussart der Kupplungsleitung
      description: Gibt die Endanschluss- bzw. Fitting-Schnittstelle der Kupplungsleitung
        an (wichtig für die Kompatibilität mit Geber-/Nehmerzylindern und starren
        Leitungen).
    clutch_pressure_plate_actuation_type:
      name: Typ der Kupplungsdruckplattenbetätigung
      description: Gibt an, ob die Kupplung über einen Druck- oder Zugmechanismus
        gelöst wird (Membranfederbetätigung).
    clutch_pressure_plate_release_mechanism_type:
      name: Typ des Ausrückmechanismus der Kupplungsdruckplatte
      description: Beschreibt die Art der Ausrück- bzw. Betätigungsschnittstelle der
        Druckplatte.
    clutch_pressure_plate_surface_type:
      name: Oberflächentyp der Kupplungsdruckplatte
      description: Beschreibt die Reibkontaktfläche der Druckplatte.
    clutch_slave_cylinder_connection_type:
      name: Anschlusstyp des Kupplungsnehmerzylinders
      description: Anschluss-Schnittstelle der Hydraulikleitung am Kupplungsnehmerzylinder
        (Gewindeanschluss, Schnellkupplung, Banjo usw.).
    clutch_slave_cylinder_mounting_type:
      name: Montageart des Kupplungsnehmerzylinders
      description: Beschreibt, wie der Kupplungsnehmerzylinder am Getriebe bzw. an
        der Getriebeglocke befestigt wird (z. B. angeschraubt, eingeklipst oder integrierter
        konzentrischer Zylinder).
    coating_type:
      name: Beschichtungsart
      description: Kennzeichnet jede äußere Beschichtung, Glasur oder jeden Überzug
        des Müsliriegels (z. B. Schokolade oder Joghurt).
    cocking_mechanism:
      name: Spannmechanismus
      description: Gibt die primäre Methode bzw. Vorrichtung zum Spannen oder Entspannen
        der Armbrustsehne an.
    cocktail_garnish_form:
      name: Form der Cocktailgarnitur
      description: Beschreibt, wie die Garnitur für die Verwendung präsentiert bzw.
        verarbeitet wird (z. B. frisch oder getrocknet).
    cocktail_mix_variety:
      name: Cocktailmix-Sorte
      description: Gibt den konkreten Cocktail an, der mit der Mischung zubereitet
        werden soll (z. B. Margarita, Mojito oder Piña Colada).
    cocktail_napkin_features:
      name: Eigenschaften von Cocktailservietten
      description: Hebt funktionale, praktische und umweltfreundliche Eigenschaften
        von Cocktailservietten hervor.
    cocktail_pick_tip_style:
      name: Stil der Cocktailspießspitze
      description: Beschreibt die Form bzw. Eigenschaft der Spitze zum Aufspießen
        oder Halten von Garnituren.
    cocktail_pick_top_handle_style:
      name: Stil von Oberseite bzw. Griff des Cocktailspießes
      description: Beschreibt die dekorative Oberseite bzw. Griffform zum Halten oder
        Präsentieren.
    cocktail_type:
      name: Cocktailtyp
      description: Gibt das konkrete Cocktailrezept bzw. den Stil des vorgemischten
        Produkts an (z. B. Margarita, Negroni oder Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Material von Griff bzw. Stab des Cocktailschirms
      description: Material des Stab- bzw. Spießteils des Cocktailschirms (ohne Schirmdach).
    cocoa_processing_method:
      name: Kakaoverarbeitungsmethode
      description: Gibt an, wie das Kakaopulver verarbeitet wurde (z. B. Natural,
        Dutch Processed oder Black Cocoa).
    cocoa_product_form:
      name: Form des Kakaoprodukts
      description: Definiert die physische Form, in der das Kakaoprodukt verkauft
        wird.
    coconut_husk_status:
      name: Status der Kokosnussschale
      description: Gibt an, in welchem Umfang die äußere Hülle bzw. Schale der Kokosnuss
        entfernt wurde, was Benutzerfreundlichkeit, Lagerung und Abfallmenge beeinflusst.
    coconut_maturity_stage:
      name: Reifestadium der Kokosnuss
      description: Kennzeichnet das Entwicklungsstadium der Kokosnuss zum Zeitpunkt
        der Ernte, das Geschmack, Wassergehalt und kulinarische Verwendung stark beeinflusst
        (z. B. zum Trinken oder Kochen).
    coconut_oil_refinement_type:
      name: Raffinationsart von Kokosnussöl
      description: Gibt den Raffinationsgrad bzw. die Qualitätsstufe des Kokosöls
        an, z. B. nativ, raffiniert, MCT oder fraktioniert.
    coconut_preparation_form:
      name: Zubereitungsform der Kokosnuss
      description: Gibt an, wie die Kokosnuss physisch vorbereitet bzw. geschnitten
        wird (ganz, in Scheiben, geraspelt, püriert usw.), damit schnell die passende
        Form für Rezepte oder Snacks gefunden werden kann.
    coffee_bean_species:
      name: Kaffeebohnensorte
      description: Gibt die im Produkt verwendete Kaffeebohnensorte an.
    coffee_beverage_variety:
      name: Kaffeegetränkesorte
      description: Klassifiziert trinkfertige oder zubereitete Kaffeegetränke nach
        Stilrichtung.
    coffee_processing_method:
      name: Kaffeeverarbeitungsmethode
      description: Gibt die nach der Ernte angewandte Verarbeitungsmethode der Kaffeebohnen
        an.
    coil_material:
      name: Spulenmaterial
      description: Gibt das primäre Material bzw. die Mesh-Art der Heizspule an, was
        Geschmack, Haltbarkeit und Kompatibilität mit Temperaturregelung beeinflusst.
    coil_spring_design:
      name: Bauart der Schraubenfeder
      description: Gibt Federkennlinie bzw. Form der Schraubenfeder an, die die Fahreigenschaften
        beeinflusst.
    coil_spring_finish_coating:
      name: Oberflächenfinish bzw. Beschichtung der Schraubenfeder
      description: Oberflächenfinish bzw. Beschichtung zum Schutz vor Korrosion.
    coil_spring_material:
      name: Material der Schraubenfeder
      description: Primäres Material bzw. Zusammensetzung der Schraubenfeder.
    coil_system_type:
      name: Typ des Federsystems
      description: Beschreibt das konkrete Feder- bzw. Spulensystem der jeweiligen
        Matratze, z. B. Taschenfedern oder Bonnellfedern.
    coil_type:
      name: Typ der Spule
      description: Beschreibt die verwendete Spulenkonstruktion bzw. Technologie,
        die Dampfentwicklung und Geschmack beeinflusst.
    coin_grade_numismatic:
      name: Erhaltungsgrad der Münze (numismatisch)
      description: Standardisierter Erhaltungsgrad der Münze (z. B. Sheldon-Skala
        oder adjektivischer Erhaltungsgrad).
    coin_strike_or_finish:
      name: Münzprägung oder Oberflächenfinish
      description: Art der Prägung bzw. Oberflächenbearbeitung der Münze (z. B. Umlaufprägung
        oder Polierte Platte).
    coin_strike_type:
      name: Art der Münzprägung
      description: Beschreibt die Art der Prägung bzw. Oberflächenbearbeitung der
        Münze (z. B. Polierte Platte oder Umlaufprägung).
    collar_style:
      name: Kragenstil
      description: Definiert das Design des Kragens bzw. Halsausschnitts des Kleidungsstücks.
    collectible_gun_accessories_included:
      name: Enthaltenes Zubehör für Sammlerwaffen
      description: Listet Zubehör und Dokumentation auf, die der Sammlerwaffe beiliegen
        (z. B. Holster, Koffer, Bajonett oder Unterlagen).
    collectible_gun_firing_mechanism:
      name: Zündmechanismus der Sammlerwaffe
      description: Gibt die Art des Schuss- bzw. Zündmechanismus der Sammlerwaffe
        an (insbesondere bei antiken und historischen Waffen).
    collectible_knife_blade_finish:
      name: Oberflächenfinish der Sammlermesserklinge
      description: Beschreibt die Oberflächenbearbeitung bzw. Behandlung der Klinge
        im Hinblick auf Aussehen (und teilweise Korrosionsbeständigkeit).
    color_code_system:
      name: Farbcodesystem
      description: Gibt gegebenenfalls das Farbcodesystem an, das für die numerische
        Farbreferenz des Garns verwendet wird (z. B. DMC oder Anchor).
    color_coding_standard:
      name: Farbcodierungsstandard
      description: Gibt an, ob die Hantelscheibe einem internationalen Farbcode (z. B.
        IWF oder IPF) oder einem anderen Schema folgt.
    color_effect:
      name: Farbeffekt
      description: Beschreibt spezielle Farbtechniken oder Effekte, die bei Haarverlängerungen
        angewendet werden.
    color_family:
      name: Farbfamilie
      description: Allgemeine Farbfamilie für Sumi-Tinte (hilfreich, wenn Farbe zu
        detailliert ist, z. B. warmes Schwarz vs. Blauschwarz).
    color_finish:
      name: Farbfinish
      description: Gibt die Oberflächenbeschaffenheit der sichtbaren Handschutzkomponenten
        an (z. B. matt vs. glänzend), wenn die Farbe allein nicht ausreicht.
    coloring_finish:
      name: Farbfinish
      description: Gibt das visuelle Finish bzw. den durch die Färbung erzeugten Spezialeffekt
        an, z. B. Metallic oder Neon.
    comb_material:
      name: Kammmaterial
      description: Material des Mundharmonikakamms (des Körpers, der die Luftkammern
        bildet).
    comb_type:
      name: Art des Kamms
      description: Klassifiziert Pflegekämme für Pferde nach ihrer primären Funktion
        (z. B. Striegel, Mähnenkamm oder Ausdünnungskamm), damit schnell das passende
        Werkzeug für bestimmte Pflegebedürfnisse gefunden werden kann.
    combat_shorts_cut_style:
      name: Schnittstil von Kampfshorts
      description: Kennzeichnet die für Kampfsportshorts typische Schnitt- bzw. Passformart
        (z. B. High Cut, Retro Cut oder Compression).
    comic_creator_role:
      name: Rolle des Comicschöpfers
      description: Gibt die dem Angebot zugeordnete Rolle des Schöpfers an (z. B.
        Autor oder Illustrator).
    commemorative_coin_finish:
      name: Oberfläche der Gedenkmünze
      description: Beschreibt die Präge- bzw. Oberflächenart einer Gedenkmünze.
    commemorative_coin_mint_mark:
      name: Münzzeichen der Gedenkmünze
      description: Gibt das Münzzeichen der Münze an (oder dass kein Münzzeichen vorhanden
        ist).
    commemorative_subject:
      name: Gedenkmotiv
      description: Primäres Gedenkmotiv (Ereignis, Person, Ort, Jubiläum, Organisation
        usw.).
    commercial_vehicle_class:
      name: Nutzfahrzeugklasse
      description: Auf dem zulässigen Gesamtgewicht (GVWR) basierende regulatorische
        bzw. branchenspezifische Klasse zur Beschreibung der Gewichtsklasse eines
        Nutzfahrzeugs für Suche und Filterung.
    compass_damping_medium:
      name: Dämpfungsmedium des Kompasses
      description: Gibt das Medium an, das zur Stabilisierung der Nadelbewegung innerhalb
        der Kompasskapsel verwendet wird.
    compass_illumination_type:
      name: Beleuchtungsart des Kompasses
      description: Gibt an, wie die Kompassmarkierungen bei schlechten Lichtverhältnissen
        sichtbar gemacht werden (z. B. Leuchtfarbe, Tritium oder LED-Hintergrundbeleuchtung).
    compass_mounting_style:
      name: Kompass-Anbringungsstil
      description: Beschreibt, wie der Kompass getragen, befestigt oder installiert
        wird.
    compass_scale_units:
      name: Maßeinheiten des Kompasses
      description: Kennzeichnet die auf dem Kompassgehäuse angegebenen Maßeinheiten
        (Grad, Mil oder beides).
    compatible_abs_system:
      name: Kompatibles ABS-System
      description: Gibt an, ob der Hauptbremszylinder für Fahrzeuge mit ABS vorgesehen
        ist.
    compatible_adapter_brand:
      name: Kompatible Adaptermarke
      description: Gibt die Marke des Golfschlägerkopfs an, für deren Adapter der
        Schaft vorkonfiguriert ist.
    compatible_airbag_system_type:
      name: Kompatibler Airbag-Systemtyp
      description: Gibt die Airbag-Systemgeneration bzw. den Funktionsumfang an, mit
        dem das Teil kompatibel ist (z. B. einstufig vs. zweistufig).
    compatible_amplifier_fit_method:
      name: Kompatible Verstärker-Einbauart
      description: Gibt an, wie die Kompatibilität der Abdeckung bzw. des Gehäuses
        definiert ist (universell passend, modellspezifisch oder nach Abmessungen).
    compatible_apparatus:
      name: Kompatibles Gerät
      description: Gibt an, für welches Turngerät bzw. welche Aktivität die Griffe
        ausgelegt sind.
    compatible_archery_tool:
      name: Kompatibles Bogenschießgerät
      description: Gibt das primäre Bogenschießgerät oder Ausrüstungsteil an, für
        das das Zubehör ausgelegt ist.
    compatible_axle_size:
      name: Kompatible Achsengröße
      description: Gibt den Naben-/Achsdurchmesser bzw. die Gewindenorm an, für die
        die Fußraste ausgelegt ist (z. B. 10 mm/3⁄8 Zoll, 14 mm oder 3/8 Zoll 26 TPI).
    compatible_axle_type:
      name: Kompatibler Achsentyp
      description: Kennzeichnet die unterstützten Befestigungsstandards der Hinterachse
        des Trainers, z. B. Schnellspanner oder Steckachsengrößen.
    compatible_axle_weight_rating:
      name: Kompatible Achslastklasse
      description: Gibt die zulässige Achslast des Anhängers (Tragfähigkeit pro Achse)
        an, für die die Anhängerbremsanlage ausgelegt ist.
    compatible_bait_type:
      name: Kompatible Köderart
      description: Gibt an, mit welchen Arten von Angelködern der Köderbohrer kompatibel
        ist, damit Angler ein Werkzeug passend zu ihrem bevorzugten Köder auswählen
        können.
    compatible_bass_scale_length:
      name: Kompatible Mensur für Bassgitarren
      description: Gibt die Bassmensur(en) an, für die der Saitensatz vorgesehen ist
        (wichtig für korrekte Wicklungslänge und Passform).
    compatible_battle_top_system:
      name: Kompatibles Battle-Top-System
      description: Gibt an, für welches Battle-Top-Produktsystem bzw. welche Serie
        das Top konzipiert wurde (zur Sicherstellung der Teile- und Arena-Kompatibilität).
    compatible_bb_size:
      name: Passende Patronengröße
      description: Gibt den Durchmesser der Airsoft-Kugeln an, mit dem das Produkt
        kompatibel ist.
    compatible_bed_frame_style:
      name: Kompatibler Bettrahmentyp
      description: Gibt den Bett- bzw. Rahmentyp an, für den das Zubehör geeignet
        ist.
    compatible_bicycle_tire_type:
      name: Kompatibler Fahrradreifentyp
      description: Gibt an, welche Fahrradreifentypen mit dem Produkt repariert oder
        abgedichtet werden können.
    compatible_bike_component:
      name: Kompatible Fahrradkomponente
      description: Gibt an, für welche Fahrradkomponente das Werkzeug bzw. Produkt
        ausgelegt ist.
    compatible_billiard_game:
      name: Kompatible Billardspielart
      description: Gibt an, für welche Billardspielarten das Rack ausgelegt ist, damit
        Kundschaft ein passendes Rack auswählen kann.
    compatible_billiard_table_size:
      name: Kompatible Billardtischgröße
      description: Gibt die Standard-Tischlänge(n) an, für die die Abdeckung ausgelegt
        ist, damit Kundschaft eine passend dimensionierte Abdeckung für ihren Billardtisch
        auswählen kann.
    compatible_bit_type:
      name: Kompatible Gebissart
      description: Arten von Gebissen, mit denen der Schutz verwendet werden kann.
    compatible_blade_hosel:
      name: Kompatibles Schlägerdesign
      description: Gibt den Hosel- bzw. Konustyp der Klinge an, den der Schaft aufnimmt,
        damit Schaft und Klinge korrekt zusammenpassen.
    compatible_blade_system:
      name: Kompatibles Klingensystem
      description: Gibt das Ersatzklingensystem bzw. -format an, das das Messer unterstützt
        (z. B. Standard-Hobbymesser Nr. 11 oder Abbrechklingen mit Segmenten).
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibler Webstuhl für Webschiffchen
      description: Gibt an, mit welchen Webstuhltypen das Webschiffchen verwendet
        werden soll.
    compatible_bobbin_type:
      name: Kompatibler Garnspulentyp
      description: Gibt an, für welche Art von Spule bzw. Garnspule das Webschiffchen
        ausgelegt ist.
    compatible_bottle_mouth:
      name: Kompatibler Flaschenhals
      description: Typ bzw. Durchmesser des Flaschenhalses, für den der Strohhalm
        oder Verschluss ausgelegt ist.
    compatible_bow_attachment_system:
      name: Kompatibles Bogenbefestigungssystem
      description: Kennzeichnet die Wurfarm- bzw. Zubehörschnittstelle, für die das
        Teil ausgelegt ist (z. B. ILF, Schraubbefestigung oder Schnellverschluss).
    compatible_bow_crossbow_type:
      name: Kompatibler Bogen-/Armbrusttyp
      description: Kennzeichnet den Bogen- bzw. Armbrusttyp, für den das Zubehör ausgelegt
        ist.
    compatible_brake_fluid:
      name: Kompatible Bremsflüssigkeit
      description: Gibt die DOT-Spezifikation(en) der Bremsflüssigkeit an, mit denen
        die Dichtungen bzw. Materialien des Hauptbremszylinders kompatibel sind.
    compatible_brake_pad:
      name: Kompatibler Bremsbelag
      description: Gibt an, für welche Bremsbelagmischungen die Bremsscheibe zugelassen
        ist, um Sicherheit und optimalen Verschleiß zu gewährleisten.
    compatible_brake_service_system:
      name: Kompatibles Bremssystem
      description: Gibt an, ob das Teil für Scheibenbremsen, Trommelbremsen oder beide
        vorgesehen ist.
    compatible_brake_system:
      name: Kompatibles Bremssystem
      description: Enthält wichtige Hinweise zur Systemkompatibilität bei der Verwendung
        von Bremsflüssigkeit.
    compatible_brake_type:
      name: Kompatibler Bremsentyp
      description: Gibt den Bremstyp an, mit dem das Rack kompatibel ist, z. B. Scheiben-
        oder Felgenbremse.
    compatible_brass_instrument_finish:
      name: Kompatible Oberflächenbehandlungen von Blechblasinstrumenten
      description: Gibt an, für welche Oberflächen von Blechblasinstrumenten der Reiniger
        geeignet ist, ohne die Oberfläche zu beschädigen.
    compatible_building_toy_system:
      name: Kompatibles Bauspielsystem
      description: Gibt an, mit welchem Bausystem bzw. Standard das Spielzeug kompatibel
        ist (oder welche äquivalenten Größen verwendet werden), z. B. LEGO-kompatibel
        oder proprietär.
    compatible_capo_fretboard_radius:
      name: Kompatibler Griffbrettradius für Kapodaster
      description: Gibt den Griffbrettradius bzw. das Griffbrettprofil an, für das
        der Kapodaster für optimalen Kontakt und Stimmstabilität ausgelegt ist.
    compatible_capo_number_of_strings:
      name: Kompatible Capo-Nummer der Saite
      description: Gibt an, für wie viele Saiten der Kapodaster ausgelegt ist (nützlich
        für 6-, 7-, 8-, 12-saitige und Spezialinstrumente).
    compatible_cardio_machine_type:
      name: Kompatibles Herz-Kreislauf-Gerät
      description: Gibt an, für welchen Typ von Cardiogerät das Zubehör bzw. Teil
        ausgelegt ist.
    compatible_chain_link_type:
      name: Kompatibler Kettengliedtyp
      description: Kennzeichnet den Kettengliedtyp, den das Werkzeug unterstützt (Standard,
        Halbglied, Schnellglied usw.).
    compatible_chain_size:
      name: Kompatible Kettengröße
      description: Gibt die Kettenbreite bzw. Teilungsstandards an, die das Werkzeug
        unterstützt (z. B. 1/8 Zoll oder 3/32 Zoll).
    compatible_chain_width:
      name: Kompatible Kettenbreite
      description: Gibt an, für welche Kettengröße das Freilaufritzel ausgelegt ist.
    compatible_chip_denomination:
      name: Kompatible Chip-Nennwerte
      description: Gibt an, für welche Chip-Nennwerte das Tablett bzw. Case beschriftete
        oder spezielle Fächer enthält (oder organisiert werden soll).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatible Klarinettenmundstück-Ligatur
      description: Gibt den Passstandard bzw. die Kompatibilitätshinweise der Ligatur
        für das Mundstück an.
    compatible_classical_guitar_string_scale_length:
      name: Kompatible Mensur für klassische Gitarrensaiten
      description: Gibt die vorgesehene Gitarrenmensur bzw. Saitenlängenkompatibilität
        des Sets an.
    compatible_clay_target_size:
      name: Kompatible Tontaubengröße
      description: Listet die Größen bzw. Formen der Tontauben auf, die der Werfer
        für optimale Passform und Leistung aufnehmen kann.
    compatible_cleat_system:
      name: Kompatibles Stollensystem
      description: Gibt die Cleat-Schnittstelle bzw. das Lochmuster an, das vom Pedal
        unterstützt wird, damit Fahrende ihre Schuhe dem richtigen System zuordnen
        können.
    compatible_clipless_pedal_system:
      name: Kompatibles Klickpedalsystem
      description: Gibt den spezifischen Klickpedal-/Cleat-Standard an, mit dem das
        Produkt kompatibel ist.
    compatible_clutch_type:
      name: Kompatibler Kupplungstyp
      description: Kupplungsschnittstellen-Kompatibilität für das Schwungrad (falls
        zutreffend).
    compatible_coffee_pod_system:
      name: Kompatibles Kaffeekapselsystem
      description: Gibt die Kaffeemaschine bzw. das Brühsystem an, für die bzw. das
        die Pads oder Kapseln vorgesehen sind.
    compatible_construction_set_system:
      name: Kompatibles Konstruktionsspielsystem
      description: Gibt an, mit welchem Bausystem bzw. Markenökosystem das Set kompatibel
        ist (z. B. LEGO-kompatibel oder DUPLO-kompatibel).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibler Stift/Ständer für Kontrabassklarinette
      description: Gibt die erforderliche Ständer-/Stift-Schnittstelle bzw. den benötigten
        Stütztyp an.
    compatible_coolant_chemistry:
      name: Kompatible Kühlmittelchemie
      description: Gibt an, mit welchen Kühlmitteltypen das Additiv kompatibel ist.
    compatible_cooling_system_material:
      name: Kompatibles Kühlsystemmaterial
      description: Gibt an, für welche Kühlsysteme bzw. Materialien die Kühlerreinigung
        sicher geeignet ist (z. B. Aluminiumkühler oder Mischmetallsysteme).
    compatible_crib_format:
      name: Kompatibles Krippenformat
      description: Definiert die allgemeine Größen- oder Formkategorie der Matratze
        oder des Lakens, für die das Zubehör ausgelegt ist.
    compatible_cross_stitch_fabric_count:
      name: Kompatible Kreuzstich-Stoffdichte
      description: Empfohlene Stoffdichte(n) zum Sticken des Designs.
    compatible_cross_stitch_frame:
      name: Kompatibler Kreuzstichrahmen
      description: Gibt an, wofür der Rahmen ausgelegt ist (Handnutzung, Tischständer,
        Bodenständer oder universell).
    compatible_crossbar:
      name: Kompatible Querträger
      description: Kompatibilität des Racks mit Querträgern von Fahrzeugdachträgern
        (bei Dachmontage), einschließlich Querträgerformen bzw. Profilstandards.
    compatible_cycling_cleat:
      name: Kompatibles Fahrrad-Cleat-System
      description: Gibt an, mit welchem Cleat- bzw. Pedalsystem die Fahrradschuhe
        kompatibel sind.
    compatible_cymbal_size:
      name: Kompatible Beckengröße
      description: Gibt den vorgesehenen (oder maximalen) Beckendurchmesser an, für
        den das Case ausgelegt ist. Dies bezieht sich auf die Kompatibilität mit der
        Beckengröße, nicht auf den Außendurchmesser des Cases.
    compatible_device_type:
      name: Kompatibler Gerätetyp
      description: Gibt an, für welche Art von Gerät die Halterung vorgesehen ist
        (z. B. Monitor/Fernseher, Tablet, Smartphone oder tragbarer DVD-Player).
    compatible_dock_structure_type:
      name: Kompatibler Docktyp
      description: Die Dockkonstruktion, an der die Stufen befestigt werden sollen.
    compatible_dough_type:
      name: Kompatible Teigart
      description: Gibt an, für welche Arten bzw. Marken von Knetmasse die Werkzeuge
        ausgelegt sind (z. B. Standard-Spielknete oder Modelliermasse).
    compatible_drawing_ink_surface:
      name: Kompatible Zeichenfläche
      description: Gibt empfohlene Oberflächen bzw. Materialien für optimale Ergebnisse
        an.
    compatible_drivetrain_brand:
      name: Kompatible Antriebsstrangmarke
      description: Listet die Marken von Antriebs- bzw. Bremssystemen auf, mit denen
        das Kabel kompatibel ist.
    compatible_drivetrain_speeds:
      name: Kompatible Antriebsstufen
      description: Gibt die Anzahl der Antriebsstufen an, die die Kurbel oder das
        Kettenblatt unterstützt (z. B. 10-fach).
    compatible_equipment:
      name: Kompatible Ausrüstung
      description: Gibt an, für welche Art von Wintersportausrüstung der Schraubstock
        ausgelegt ist.
    compatible_evap_system:
      name: Kompatibles EVAP-System
      description: Gibt an, ob der Tankdeckel die Anforderungen des EVAP-Systems erfüllt
        (z. B. OEM-konforme Abdichtung) und das Aufleuchten der Motorkontrollleuchte
        reduzieren soll.
    compatible_exercise_bike_style:
      name: Kompatibler Heimtrainertyp
      description: Gibt an, für welche Arten von Heimtrainern das Zubehör bzw. Ersatzteil
        ausgelegt ist.
    compatible_fencing_weapon:
      name: Kompatible Fechtwaffe
      description: Gibt an, für welche Fechtwaffe bzw. Disziplin die Jacke oder das
        Lamé vorgesehen ist.
    compatible_fiber_type:
      name: Kompatibler Fasertyp
      description: Gibt die primären Fasertypen an, die die Trommelkardiermaschine
        effektiv verarbeiten soll.
    compatible_fin_box_system:
      name: Kompatibles Finnenboxsystem
      description: Gibt die Finnenbox bzw. das Montagesystem an, für das die Finne
        ausgelegt ist, damit Surfer kompatible Finnen für ihr Surfbrett auswählen
        können (z. B. FCS II, Futures oder US Box).
    compatible_fingerboard_radius:
      name: Kompatibler Radius des Griffbretts
      description: Gibt den Griffbrettradius an (flach, gewölbt oder kombiniert),
        für den der Kapodaster ausgelegt ist, um gleichmäßigen Druck und weniger Schnarren
        zu gewährleisten.
    compatible_finish_type:
      name: Kompatible Oberflächenbehandlungen von Instrumenten
      description: Gibt an, für welche Instrumentenoberflächen das Spray laut Hersteller
        geeignet ist.
    compatible_fishing_reel_type:
      name: Kompatibler Angelrollentyp
      description: Gibt den Typ der Angelrolle an, für den das Zubehör ausgelegt ist
        bzw. mit dem es verwendet werden kann (z. B. Spinnrolle, Baitcastingrolle
        oder Fliegenrolle).
    compatible_fly_line_weight:
      name: Kompatibles Fliegenschnurgewicht
      description: Gibt die AFTMA-Fliegenschnurklassen an, für die die Spule ausgelegt
        ist.
    compatible_flywheel_type:
      name: Kompatibler Schwungradtyp
      description: Gibt den Schwungradtyp an, mit dem die Kupplungsdruckplatte verwendet
        werden soll.
    compatible_football_kick_type:
      name: Kompatibler Football-Kicktyp
      description: Gibt die Kick-Situationen an, für die das Produkt ausgelegt ist
        (z. B. Kickoff oder Field Goal), damit Sportler schnell die passende Ausrüstung
        finden können.
    compatible_fuel_system_type:
      name: Kompatibler Kraftstoffsystemtyp
      description: Gibt das Kraftstoffsystem an, für das der Reiniger ausgelegt ist.
    compatible_gas_type:
      name: Kompatible Gasart
      description: Gibt die Art des Druckgases an, für das der Paintball-Lufttank
        ausgelegt ist.
    compatible_gel_wax_additives:
      name: Kompatible Gelwachs-Additive
      description: Gibt an, welche Additivtypen mit diesem Gelwachs kompatibel sind
        (z. B. Farbstofftypen oder Einbettungen).
    compatible_glaze_layering:
      name: Kompatible Glasurschichtung
      description: Gibt an, ob die Glasur für Effekt-Schichtungen mit anderen Glasuren
        vorgesehen ist.
    compatible_golf_bag_type:
      name: Kompatibler Golftaschentyp
      description: Gibt an, zu welchen Golftaschenformaten die Hülle bzw. das Case
        passt.
    compatible_ground_polarity:
      name: Kompatible Massepolarität
      description: Gibt an, ob der Spannungsregler für elektrische Fahrzeugsysteme
        mit negativer oder positiver Masse vorgesehen ist (oder nicht polaritätsempfindlich
        ist).
    compatible_guitar_body_shape:
      name: Kompatible Gitarrenkorpusform
      description: Gibt an, für welche Gitarrenkorpusform das Case ausgelegt ist.
    compatible_guitar_case:
      name: Kompatibles Gitarrencase
      description: Gibt an, für welche Gitarrencase-Typen der Luftbefeuchter ausgelegt
        ist und ordnungsgemäß funktioniert.
    compatible_guitar_scale_length:
      name: Kompatible Mensur
      description: Gibt an, für welche Gitarrenmensur(en) der Saitensatz geeignet
        ist (basierend auf Wicklungs- bzw. Gesamtlänge).
    compatible_gun_platform:
      name: Kompatible Waffenplattform
      description: Gibt die Betriebsplattform bzw. Energiequelle an, mit der das Produkt
        kompatibel ist (z. B. AEG, GBB oder HPA).
    compatible_hair_length:
      name: Kompatible Haarlänge
      description: Gibt die maximale Haarlänge bzw. das maximale Haarvolumen an, für
        die bzw. das die Kopfbedeckung bequem geeignet ist.
    compatible_head_and_neck_restraint_system:
      name: Kompatibles Kopf- und Nackenstützsystem
      description: Gibt an, ob der Helm Verankerungspunkte enthält und/oder mit Kopf-
        und Nackenstützsystemen kompatibel ist (z. B. HANS), einschließlich des Vorhandenseins
        bzw. Installationsstatus der Verankerungspfosten.
    compatible_helmet_certification_standard:
      name: Kompatibler Helmzertifizierungsstandard
      description: Gibt an, für welche Helmsicherheitsnorm bzw. welchen Zertifizierungskontext
        das Zubehör ausgelegt ist (z. B. beziehen sich Abreißvisiere für den Renneinsatz
        häufig auf bestimmte Reglements).
    compatible_helmet_shell_size:
      name: Kompatible Helmschalengröße
      description: Gibt an, für welche Helmschalengröße(n) ein Ersatz-Innenteil geeignet
        ist (Helmschalengrößen entsprechen häufig Größenbereichen wie XS–S, M oder
        L–XL).
    compatible_helmet_size:
      name: Kompatible Helmgröße
      description: Gibt die Helmgrößen an, mit denen die Gesichtsmaske kompatibel
        ist.
    compatible_helmet_type:
      name: Kompatibler Helmtyp
      description: Gibt die Helmkategorie an, für die die Nackenstütze ausgelegt ist.
    compatible_hitch_receiver_size:
      name: Kompatible Größe der Anhängerkupplungsaufnahme
      description: Gibt die Größe der Anhängerkupplungsaufnahme an, für die das Zubehör
        ausgelegt ist (für an der Anhängerkupplung montiertes Rack-Zubehör).
    compatible_hook_size:
      name: Kompatible Hakengröße
      description: Gibt das/due Häkelhakengrößensystem(e) und/oder den Größenbereich
        an, für den der Organizer ausgelegt ist (z. B. US-Buchstaben-/Zahlengrößen
        oder metrischer mm-Bereich).
    compatible_horse_coat_type:
      name: Kompatibler Pferdefelltyp
      description: Gibt die Fellmerkmale des Pferdes an, für die das Fellpflegewerkzeug
        am besten geeignet ist (z. B. dichtes Winterfell oder empfindliches Fell).
    compatible_host_platform:
      name: Kompatible Hostplattform
      description: Gibt an, mit welchen Plattformen bzw. Gerätetypen der Pad-Controller
        kompatibel ist (z. B. Windows, macOS, iOS oder Android) oder ob er eigenständig
        ohne Computer betrieben werden kann.
    compatible_inflation_gas:
      name: Kompatibles Füllgas
      description: Gibt an, womit der Ballon befüllt werden soll (Luft, Helium oder
        beides).
    compatible_injection_type:
      name: Kompatibler Einspritztyp
      description: Gibt an, für welches Kraftstoffeinspritzsystem das Produkt ausgelegt
        ist.
    compatible_instrument_surface_material:
      name: Kompatible Instrumentenoberfläche bzw. kompatibles Instrumentenmaterial
      description: Gibt an, für welche Instrumentenoberflächen bzw. -materialien das
        Poliermittel vorgesehen ist.
    compatible_intercom_system:
      name: Kompatibles Intercomsystem
      description: Gibt an, ob der Helm für die Montage bzw. Installation eines Helm-Intercom-
        bzw. Kommunikationssystems vorbereitet bzw. kompatibel ist.
    compatible_interior_material:
      name: Kompatibles Innenmaterial
      description: Gibt an, für welche Materialien im Fahrzeuginnenraum der Fleckenentferner
        sicher bzw. wirksam ist (z. B. Teppich, Stoffpolsterung, Leder oder Vinyl).
    compatible_kayak_type:
      name: Kompatibler Kayaktyp
      description: Listet die allgemeinen Kajaktypen auf, für die das Segelset ausgelegt
        ist.
    compatible_license_plate_hole_pattern:
      name: Kompatibles Lochmuster für Kennzeichen
      description: Gibt die von der Halterung unterstützte Montagelochkonfiguration
        an (Fahrzeugseite und/oder Kennzeichenseite).
    compatible_license_plate_size:
      name: Kompatible Kennzeichengröße
      description: Gibt die regionalen bzw. dimensionalen Kennzeichengröße(n) an,
        für die die Halterung ausgelegt ist.
    compatible_loom:
      name: Kompatibler Webstuhl
      description: Gibt den/die Webstuhltyp(en) an, für den/die der Flachwebkamm vorgesehen
        ist.
    compatible_loom_type:
      name: Kompatibler Webstuhl-Typ
      description: Gibt an, für welche Webkonfiguration der Webkamm vorgesehen ist
        (z. B. Webstühle mit starrem Webblatt oder Gobelinwebstühle).
    compatible_machine_type:
      name: Kompatibler Maschinentyp
      description: Gibt an, für welche Art von Quilt-Setup der Rahmen ausgelegt ist
        (nur Handquilten, Haushaltsnähmaschine oder Langarm-Quiltmaschine).
    compatible_mast_type:
      name: Kompatibler Masttyp
      description: 'Gibt an, für welche Mastdurchmesser das Segel ausgelegt ist: Reduced
        Diameter Mast (RDM), Standard Diameter Mast (SDM) oder beides.'
    compatible_model_system_train_scale:
      name: Kompatibles Modellbahnsystem (Maßstab)
      description: Gibt gegebenenfalls den Modellbahnmaßstab bzw. das System an, zu
        dem das Zubehör passt (z. B. HO, N oder O).
    compatible_mounting_surface:
      name: Kompatible Montagefläche
      description: Die vorgesehene Oberfläche bzw. das vorgesehene Objekt, an dem
        die Klemme befestigt werden soll.
    compatible_mouthpiece_patch:
      name: Kompatibles Mundstückspolster
      description: Gibt an, ob das Mundstück für die Verwendung mit Mundstückspolstern/-auflagen
        vorgesehen ist und welcher Dickenbereich empfohlen wird.
    compatible_mouthpiece_type:
      name: Kompatible Mundstückart
      description: Gibt an, für welchen Mundstücktyp bzw. Schaft das Mellophon ausgelegt
        ist (je nach Modell üblicherweise Waldhorn- oder Trompetenaufnahme).
    compatible_neck_profile_width:
      name: Kompatible(s) Halsprofil/-breite
      description: Gibt das Gitarrenhalsprofil bzw. die Halsbreite an, für die der
        Kapodaster geeignet ist (z. B. schmale E-Gitarre vs. breite klassische Gitarre).
    compatible_needle_size:
      name: Kompatible Nadelstärke
      description: Gibt die Nadelgrößen bzw. -typen an, für die das Etui geeignet
        ist (z. B. Stick-, Gobelin- oder Handnähnadeln).
    compatible_needle_system:
      name: Kompatibles Nadelsystem
      description: Nadelsystem(e), mit dem bzw. denen die Maschine kompatibel ist
        (z. B. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibler Feststellbremsmechanismus
      description: Gibt an, ob der Bremssattel für die Verwendung mit einem integrierten
        Feststellbremsmechanismus ausgelegt ist.
    compatible_pedal_instrument_type:
      name: Kompatibler Pedalinstrumententyp
      description: Gibt an, für welches Gerät das Pedal vorgesehen ist (z. B. Digitalpiano,
        Keyboard/Synthesizer oder MIDI-Controller).
    compatible_pedal_type:
      name: Kompatibler Pedaltyp
      description: Gibt den Pedaltyp bzw. das System an, für das der Riemen oder Clip
        geeignet ist (z. B. Plattformpedal, SPD oder Look Keo).
    compatible_pin_type:
      name: Kompatible Nadelart
      description: Gibt an, für welche Art von Stecknadeln die Matte ausgelegt ist
        (oder ob sie zum Anpinnen geeignet ist).
    compatible_pipe_filter_size:
      name: Kompatible Pfeifenfiltergröße
      description: Gibt die Filtergröße bzw. den Filtertyp an, für den die Pfeife
        ausgelegt ist (oder dass kein Filter erforderlich ist).
    compatible_plate_size:
      name: Kompatible Plattengröße
      description: Abmessungen bzw. standardisierte Größen ballistischer Schutzplatten,
        die die Weste aufnehmen kann.
    compatible_play_vehicle_scale:
      name: Kompatibler Spielfahrzeug-Maßstab
      description: Gibt den Spielzeugmaßstab an, für den das Zubehör ausgelegt ist
        (z. B. 1:64), wodurch Passform und Kompatibilität für Sammler und Schienensysteme
        verbessert werden.
    compatible_playing_surface:
      name: Kompatible Spielfläche
      description: Gibt die Art des Spielfelds bzw. Untergrunds an, für den die American-Football-Schuhe
        ausgelegt sind.
    compatible_pole_dimensions:
      name: Kompatible Mastabmessungen
      description: Gibt die Größe des Mastquerschnitts an, zu dem das Zubehör passt.
    compatible_pole_shape:
      name: Kompatible Mastform
      description: Gibt die Querschnittsform der Stange bzw. Säule an, für die die
        Polsterung ausgelegt ist.
    compatible_power_steering_system:
      name: Kompatibles Servolenksystem
      description: Gibt den bzw. die Lenksystemtyp(en) an, für die die Flüssigkeit
        vorgesehen ist.
    compatible_powerplant_type:
      name: Kompatibler Antriebstyp
      description: Gibt das Antriebssystem der BB-Gun an, für das das Teil vorgesehen
        ist (z. B. Federkolben, CO2 oder PCP).
    compatible_presser_foot:
      name: Kompatibler Nähfuß
      description: Gibt das vom Nähgerät unterstützte Nähfußbefestigungs- bzw. Kompatibilitätssystem
        an (z. B. Snap-on vs. Schraubbefestigung; niedriger, hoher oder schräger Schaft).
        ‚Universal/Mehrere‘ verwenden, wenn mehrere Systeme unterstützt werden oder
        Adapter enthalten sind.
    compatible_protective_gear:
      name: Kompatible Schutzausrüstung
      description: Gibt an, mit welcher anderen Schutzausrüstung die Nackenstütze
        kompatibel ist.
    compatible_protective_gear_integration:
      name: Integration kompatibler Schutzausrüstung
      description: Beschreibt, wie der Protektor getragen bzw. mit anderer Ausrüstung
        kombiniert werden soll (z. B. Einschubtasche oder eigenständige Befestigung).
    compatible_punching_bag_type:
      name: Kompatibler Boxsacktyp
      description: Gibt an, mit welchen Boxsack- bzw. Trainingssacktypen das Produkt
        kompatibel ist.
    compatible_racing_discipline:
      name: Kompatible Renndisziplin
      description: Die Motorsportdisziplin(en), für die der Helm vorgesehen/zertifiziert
        ist/sind.
    compatible_rc_scale:
      name: Kompatibler RC-Maßstab
      description: Gibt das RC-Maßstabsverhältnis an (z. B. 1:10), für das das Zubehör
        bzw. Teil ausgelegt ist.
    compatible_recorder_size:
      name: Kompatible Recordergröße
      description: Gibt an, für welche Blockflötengröße(n) das Etui ausgelegt ist.
    compatible_recorder_type:
      name: Kompatibler Blockflötentyp
      description: Gibt den Blockflötentyp (Familie/Größe) an, mit dem das Zubehör
        kompatibel ist (z. B. Sopran oder Alt).
    compatible_reed_cut:
      name: Kompatibler Rohrblattschnitt
      description: Gibt an, mit welchem Rohrblattschnitt die Blattschraube kompatibel
        sein soll (z. B. filed/französischer Schnitt vs. unfiled/amerikanischer Schnitt).
    compatible_reed_type:
      name: Kompatible Blattart
      description: Gibt den Rohrblattschnitt bzw. die Rohrblattart an, für die das
        Mundstück ausgelegt ist.
    compatible_reel_type:
      name: Kompatibler Rollentyp
      description: Gibt an, für welchen Angelrollentyp die Tasche, das Etui bzw. die
        Abdeckung ausgelegt ist.
    compatible_refrigerant_type:
      name: Kompatibler Kältemitteltyp
      description: Gibt an, für welches Kältemittel der Klimaanlagenverdampfer vorgesehen
        ist.
    compatible_ride_equipment:
      name: Kompatible Geräte
      description: Arten von Rollsportgeräten, für die die Rampe vorgesehen ist.
    compatible_roof_height:
      name: Kompatible Dachhöhe
      description: Gibt an, für welches Dachprofil die Abdeckung ausgelegt ist (Standarddach
        vs. Hochdach).
    compatible_roof_rail_type:
      name: Kompatibler Dachrelingtyp
      description: Gibt an, an welcher Dachkonfiguration das Basisträgersystem befestigt
        werden soll.
    compatible_rope_count:
      name: Kompatible Seilanzahl
      description: Gibt die Seilkonfiguration des Boxrings an, für die das Teil ausgelegt
        ist, z. B. 3-Seil-Ringe, 4-Seil-Ringe oder Universalpassform.
    compatible_rope_type:
      name: Kompatibler Seiltyp
      description: Gibt an, welche Seilkonstruktionen mit dem Gerät verwendet werden
        können.
    compatible_saddle_type:
      name: Kompatibler Satteltyp
      description: Gibt den Satteltyp bzw. die Reitdisziplin an, für die das Zubehör
        ausgelegt ist, um die korrekte Kompatibilität mit englischen, Western- und
        anderen Sätteln sicherzustellen.
    compatible_saxophone_size:
      name: Kompatible Saxophongröße
      description: Gibt an, mit welcher Saxophongröße das Produkt kompatibel ist (z. B.
        Sopran, Alt oder Tenor).
    compatible_saxophone_type:
      name: Kompatibler Saxophontyp
      description: Gibt an, für welches Saxophon die Blattschraube bzw. Kappe ausgelegt
        ist.
    compatible_scale_length:
      name: Kompatible Saitenlänge
      description: Gibt den Gitarrenmensurbereich an, für den die Saiten vorgesehen
        sind (z. B. Short Scale, Standard oder Bariton).
    compatible_seat_airbag:
      name: Kompatibler Sitzairbag
      description: Gibt an, ob der Sitz Seitenairbags unterstützt bzw. enthält oder
        mit Fahrzeugen kompatibel ist, die über sitzmontierte Airbags verfügen.
    compatible_seating_capacity:
      name: Kompatible Sitzplatzkapazität
      description: Gibt die Anzahl der Sitze bzw. die Konfiguration an, für die das
        Zubehör ausgelegt ist.
    compatible_sensor_port_type:
      name: Kompatibler Sensoranschlusstyp
      description: Gibt an, ob die Ölwanne Ölstand- und/oder Öltemperatursensoren
        unterstützt und gegebenenfalls welchen Anschlusstyp.
    compatible_shifter_type:
      name: Kompatibler Schalthebelyp
      description: Gibt den Schalthebeltyp bzw. die Schalthebelkonfiguration an, für
        die die Schaltmanschette ausgelegt ist.
    compatible_shis:
      name: Kompatibles SHIS
      description: Listet die SHIS-Codes (Standardized Headset Identification System)
        auf, zu denen das Teil passt (z. B. IS42, EC34 oder ZS44/28.6).
    compatible_skating_discipline:
      name: Kompatible Eislaufdisziplin
      description: Gibt die Eislaufdisziplin(en) an, für die das Teil bzw. Zubehör
        ausgelegt ist.
    compatible_snowshoe_deck_type:
      name: Kompatibler Schneeschuhdecktyp
      description: Gibt die Schneeschuhrahmen- bzw. Deckart an, mit der die Bindung
        kompatibel ist.
    compatible_special_effects_lighting_features:
      name: Kompatible Spezialeffekt-Beleuchtungsfunktionen
      description: Hebt gängige Funktionsmerkmale hervor, die Kaufentscheidungen bei
        Effektbeleuchtung beeinflussen (über Farbe/Muster hinaus), z. B. das Verbinden
        mehrerer Geräte oder die Reaktion auf Audio.
    compatible_spinning_wheel_drive_system:
      name: Kompatibles Spinnrad-Antriebssystem
      description: Gibt an, welche(s) Spinnrad-Antriebssystem(e) vom Zubehör unterstützt
        werden.
    compatible_spoke_gauge:
      name: Kompatible Speichenstärke
      description: Gibt die Speichendrahtstärke an, zu der die Nippelgewinde passen,
        damit Käufer Speichen und Nippel korrekt aufeinander abstimmen können.
    compatible_steering_wheel_airbag:
      name: Kompatibler Lenkradairbag
      description: Gibt an, ob das Lenkrad die Beibehaltung eines OEM-Airbagmoduls
        unterstützt (oder für Anwendungen ohne Airbag vorgesehen ist).
    compatible_steering_wheel_control_button:
      name: Kompatibler Lenkrad-Bedienknopf
      description: Gibt die Kompatibilität mit werkseitig am Lenkrad montierten Bedienelementen
        (Audio/Tempomat/Telefon) sowie der zugehörigen Verkabelung an.
    compatible_stencil_material:
      name: Kompatibles Schablonenmaterial
      description: Materialien, aus denen die Maschine Schablonen herstellen bzw.
        die sie verarbeiten kann (z. B. Papier, Kunststofffolie oder Mylar).
    compatible_stencil_media_format:
      name: Kompatibles Schablonenformat
      description: 'Gibt an, welche Schablonenformate die Maschine unterstützt: Bögen,
        Rollen oder beides.'
    compatible_strap_retractor:
      name: Kompatibler Gurtaufroller
      description: Gibt an, ob der Gurt mit aufrollbaren Systemen kompatibel ist oder
        für nicht aufrollbare (statische) Gurte ausgelegt ist.
    compatible_string_instrument_finish:
      name: Kompatible Oberflächenfinish von Saiteninstrumenten
      description: Gibt an, für welche Instrumentenoberflächen das Poliermittel sicher
        verwendet werden kann.
    compatible_substrate_material:
      name: Kompatibles Substratmaterial
      description: Das/Die Oberflächenmaterial(ien), auf dem/denen die Farbe haften
        soll.
    compatible_surface:
      name: Kompatible Oberfläche
      description: Gibt die Oberfläche/das Material an, an dem der Klettverschluss
        haften soll.
    compatible_surface_material:
      name: Kompatibles Oberflächenmaterial
      description: Fahrzeugoberflächenmaterialien, für die das Produkt vorgesehen
        ist.
    compatible_tear_off_system:
      name: Kompatibles Abreißsystem
      description: Gibt an, ob die Schutzbrille Abreiß- und/oder Roll-Off-Folien unterstützt,
        einschließlich der Information, ob Befestigungspunkte für Abreißfolien vorhanden
        sind.
    compatible_thermostat_type:
      name: Kompatibler Thermostattyp
      description: Gibt an, ob der Wasserstutzen bzw. das Gehäuse für die Aufnahme
        eines Thermostats ausgelegt ist und falls ja, für welchen Typ bzw. welche
        Größe.
    compatible_thread:
      name: Kompatibler Faden
      description: Gibt an, für welche Arten von Fäden bzw. Garnen der Einfädler ausgelegt
        ist (nach Dicke bzw. Typ).
    compatible_thread_spool_format:
      name: Kompatibles Garn-/Spulenformat
      description: Gibt an, für welche Garnformate die Box ausgelegt ist (Spulen,
        Unterfadenspulen, Stickgarnkarten bzw. -spulen, Konen usw.).
    compatible_thread_yarn_tool:
      name: Kompatibles Garn- und Fadenwerkzeug
      description: Maschinen-/Systemkompatibilität für Werkzeuge, die an anderen Geräten
        montiert werden oder mit diesen verwendet werden (z. B. Nähmaschine, Overlockmaschine,
        Webstuhl oder Spinnrad).
    compatible_tire_application:
      name: Kompatibler Reifeneinsatzbereich
      description: Gibt den Reifen-/Rad-Einsatzbereich an, für den der Wulstlöser
        ausgelegt ist (basierend auf dem gewarteten Reifen/Rad, nicht auf dem Fahrzeugmodell).
    compatible_tom_pad_mounting:
      name: Kompatible Tompad-Halterung
      description: Gibt an, woran das elektronische Tom-Tom befestigt wird (z. B.
        Klemm-/Stangenhalterung, L-Stange oder Stativhalterung), was beeinflusst,
        ob es mit bestehenden Rack-Systemen kompatibel ist.
    compatible_toy_vehicle_scale:
      name: Kompatibler Spielfahrzeug-Maßstab
      description: Gibt den Spielzeugfahrzeugmaßstab bzw. die ungefähre Fahrzeuggröße
        an, mit der das Spielset kompatibel ist.
    compatible_tpms_sensor_type:
      name: Kompatibler TPMS-Sensortyp
      description: Gibt an, ob das Rad TPMS-Sensoren und/oder einen bestimmten Ventil-/Sensortyp
        unterstützt.
    compatible_training_equipment:
      name: Kompatible Trainingsgeräte
      description: Listet die Arten von Trainings- bzw. Fitnessgeräten auf, die an
        der Halterung befestigt werden können.
    compatible_treadmill_design:
      name: Kompatibles Laufbanddesign
      description: Gibt an, mit welchem Laufbanddesign das Zubehör kompatibel ist,
        z. B. klappbare oder nicht klappbare Modelle.
    compatible_tube:
      name: Kompatibler Schlauch
      description: Gibt die Schlauch- bzw. Reifenkonstruktion an, für die der Flicken
        ausgelegt ist, z. B. Butyl, Latex, TPU oder Tubeless.
    compatible_valve_type:
      name: Kompatibler Ventiltyp
      description: Gibt an, mit welchem Messingventiltyp das Schmiermittel kompatibel
        ist.
    compatible_vaporizing_material:
      name: Kompatibles Verdampfungsmaterial
      description: Gibt die Materialtypen an, die mit dem Gerät verdampft werden können.
    compatible_vehicle_windshield_fluid:
      name: Kompatible Fahrzeug-Scheibenwaschflüssigkeit
      description: Kompatibilitätsangaben in Bezug auf Fahrzeugausstattung oder Glasbehandlungen
        (z. B. geeignet für wasserabweisende Beschichtungen oder Scheinwerferreinigungsanlagen).
    compatible_visor_system:
      name: Kompatibles Visiersystem
      description: Gibt an, mit welchen Visier-/Einsatzsystemtypen der Motorradhelm
        kompatibel ist.
    compatible_water_board_type:
      name: Kompatibles Wassersportgerät
      description: Gibt an, für welche Wassersportboards das Rack ausgelegt ist.
    compatible_water_sport_board_type:
      name: Kompatibler Wassersportboard-Typ
      description: Listet die Boardtypen auf, für deren Transport das Rack ausgelegt
        ist.
    compatible_watercraft_communication_standard:
      name: Kompatibler Wasserfahrzeug-Kommunikationsstandard
      description: Gibt unterstützte maritime Kommunikations-/Netzwerkstandards bzw.
        Integrationsprotokolle für die Interoperabilität mit Bordelektronik an.
    compatible_watercraft_engine_type:
      name: Kompatibler Wasserfahrzeugmotortyp
      description: Gibt die Ziel-Antriebskonfiguration an, zu der das Teil passt (Außenborder/Innenborder/Z-Antrieb/Jetantrieb).
    compatible_weight_plate_diameter:
      name: Kompatibler Hantelscheibendurchmesser
      description: Gibt an, welche Hantelscheibendurchmesser die Maschine unterstützt.
    compatible_wheel_finish:
      name: Kompatible Felgenoberfläche
      description: Gibt an, auf welchen Felgenoberflächen/-materialien der Reiniger
        sicher verwendet werden kann (laut Herstellerangaben).
    compatible_whorl_drive_band_type:
      name: Kompatibler Spinnrad-Antriebsbandtyp
      description: Gibt an, mit welchem Antriebsbandtyp der Wirtel verwendet werden
        soll.
    compatible_wick_series:
      name: Kompatible Dochtserien
      description: Gibt gängige Dochtserien/-typen an, zu denen die Lasche passt (branchenübliche
        Bezeichnungen), sofern vom Verkäufer angegeben.
    compatible_winder_head_bit:
      name: Kompatibler Wickelkopf/Bit
      description: Gibt den Schnittstellentyp des Stimmwirbels/-kopfs an, den die
        Aufziehhilfe unterstützt (z. B. Schlitzkopf, austauschbare Bits oder Universalkopf).
    compatible_windlass_rode:
      name: Kompatible Ankerleine für Ankerwinden
      description: Gibt an, für welche Art von Ankerleine die Ankerwinde ausgelegt
        ist.
    compatible_windshield_type:
      name: Kompatibler Windschutzscheibentyp
      description: Gibt an, für welche Windschutzscheibenkonfiguration das Gehäuse
        ausgelegt ist.
    compatible_wood:
      name: Kompatibles Holz
      description: Gibt an, für welche Griffbrettholzarten das Poliermittel empfohlen/sicher
        ist.
    compatible_writing_surface:
      name: Kompatible Schreiboberfläche
      description: Gibt an, auf welchen Oberflächen bzw. Papieren die Tinte optimal
        verwendet werden kann.
    compatible_zipper_size:
      name: Kompatible Reißverschlussgröße
      description: 'Gibt die Reißverschlussgröße an, für die der Zipper vorgesehen
        ist (oft als #3, #5, #8 oder #10 angegeben), wodurch die Kompatibilitätsfilterung
        verbessert wird.'
    compliance_certification:
      name: Konformitätszertifizierung
      description: Normen bzw. Zulassungsstandards, die die Lichtleiste für den Straßenverkehr
        und die elektromagnetische Verträglichkeit erfüllt.
    component_position:
      name: Komponentenposition
      description: Gibt die relative Position des Teils innerhalb der Steuertriebbaugruppe
        des Motors an (z. B. vordere vs. hintere Abdeckung, oben vs. unten). Nicht
        die vordere/hintere Position am Fahrzeug.
    concentration_level:
      name: Konzentrationsgrad
      description: Qualitative Angabe darüber, wie konzentriert das Tomatenmark ist
        (einfach, doppelt, dreifach), hilfreich zur Anpassung an Rezeptanforderungen.
    concentration_type:
      name: Art des Konzentrats
      description: Gibt an, ob das Produkt gebrauchsfertig oder ein Konzentrat ist
        und (falls es sich um ein Konzentrat handelt) typische Verdünnungshinweise.
    concert_bass_drum_mounting_stand_type:
      name: Typ des Montageständers für Konzert-Basstrommeln
      description: Beschreibt, wie die Konzert-Basstrommel für Aufführungen gehalten
        bzw. montiert wird.
    concert_pitch_standard:
      name: Kammertonstandard
      description: Gibt die Konzerttonhöhe (A4) an, auf die das Klavier zum Zeitpunkt
        des Verkaufs gestimmt ist (z. B. A440, A442 oder A444).
    condiment_form:
      name: Form des Würzmittels
      description: Gibt die physische Form bzw. Konsistenz des Meerrettichprodukts
        an (z. B. Paste, Pulver, Creme).
    condiment_texture:
      name: Textur des Würzmittels
      description: Beschreibt die physische Konsistenz des Relishs oder Chutneys (z. B.
        stückig oder glatt).
    confetti_format:
      name: Konfetti-Format
      description: Gibt das Konfetti-Produktformat an, je nachdem, wie das Konfetti
        verpackt oder abgefeuert wird (z. B. loses Streukonfetti oder Party-Popper/Kanonen).
    conga_head_tensioning_system:
      name: Spannsystem des Congafells
      description: Art der Hardware, die zum Spannen bzw. Stimmen des Congafells verwendet
        wird (z. B. traditionelle Spannböckchen oder moderne Schnellstimmsysteme).
    conga_set_included_drum_types:
      name: Im Conga-Set enthaltene Trommeltypen
      description: Gibt an, welche Conga-Typen in einem Conga-Set enthalten sind (z. B.
        Quinto + Conga + Tumba).
    connector_case_style:
      name: Bauart des Steckergehäuses
      description: Klassifiziert die allgemeine Bauart des Steckeretuis (z. B. Hartschale
        vs. weiche Tasche), um Schutzgrad und Transportfähigkeit widerzuspiegeln.
    console_cover_installation_method:
      name: Installationsmethode der Konsolenabdeckung
      description: Gibt an, wie die Konsolenabdeckung an Konsole bzw. Armlehne befestigt
        wird (z. B. Überzug, elastische Bänder, Klettverschluss, Klebefläche oder
        Clipbefestigung).
    console_display_type:
      name: Konsolenanzeigetyp
      description: Kennzeichnet die Art des Benutzerdisplays am Gerät (z. B. LCD,
        LED oder Touchscreen).
    construction_design:
      name: Konstruktionsdesign
      description: Gibt an, aus wie vielen beweglichen Teilen das Polster besteht,
        was sich auf die Beweglichkeit auswirkt (z. B. 1-teilig oder 3-teilig).
    contact_angle:
      name: Kontaktwinkel
      description: Gibt den Kontaktwinkel der Lagerringe an, ausgedrückt als einzelner
        Winkel oder Winkelpaar (z. B. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Fülltyp des Contact-Juggling-Balls
      description: Gibt an, ob der Ball massiv oder gefüllt ist (und falls gefüllt,
        mit welcher Art von Füllung), was sich auf Gewichtsverteilung und Haltbarkeit
        auswirkt.
    contact_juggling_ball_transparency:
      name: Transparenz des Contact-Juggling-Balls
      description: Gibt die Transparenz bzw. das optische Erscheinungsbild des Balls
        an.
    contact_surface_material:
      name: Material der Kontaktfläche
      description: Kennzeichnet das Material an den Kontaktpunkten zum Instrument
        (z. B. Kork oder Gummi), um Kratzer zu vermeiden und die Griffigkeit zu verbessern.
    container_material:
      name: Material des Containers
      description: Gibt das Hauptmaterial der Produktverpackung an (z. B. Glas, PET-Kunststoff
        oder Aluminium).
    contaminant_removal:
      name: Schadstoffentfernung
      description: Listet die Schadstoffklassen auf, deren Entfernung oder Reduzierung
        durch das Produkt zertifiziert ist.
    contra_alto_clarinet_body_configuration:
      name: Korpuskonfiguration der Kontraaltklarinette
      description: Beschreibt die physische Bauform der Kontraaltklarinette (z. B.
        gerade vs. gefaltete Bauweise).
    contra_alto_clarinet_lowest_note_extension:
      name: Erweiterung des tiefsten Tons der Kontraaltklarinette
      description: Gibt die tiefste spielbare Tonerweiterung des Instruments an (den
        tiefsten Ton, den die Mechanik zulässt), häufig zur Unterscheidung zwischen
        tiefem Es-, tiefem D- und tiefem C-Modell verwendet.
    contra_bass_clarinet_bell_type:
      name: Schallbechertyp der Kontrabassklarinette
      description: Schallbecherkonfiguration der Kontrabassklarinette.
    contra_bass_clarinet_bore_type:
      name: Typ der Kontrabassklarinettenbohrung
      description: Bohrungsdesign des Instruments.
    contra_bass_clarinet_lowest_written_note:
      name: Tiefster notierter Ton für Kontrabassklarinette
      description: Der tiefste notierte Ton, den das Instrument spielen kann (abhängig
        von der Erweiterung auf tiefes C oder tiefes Es).
    control_arm_bushing_material:
      name: Material der Querlenkerbuchse
      description: Gibt das Material der enthaltenen bzw. verbauten Buchsen an, falls
        vorhanden.
    control_arm_bushings_included:
      name: Inklusive Querlenkerbuchsen
      description: Gibt an, ob der Querlenker mit vormontierten Buchsen versendet
        wird.
    control_arm_finish:
      name: Oberflächenfinish des Querlenkers
      description: Gibt die Schutzbeschichtung an, die auf den Querlenker aufgetragen
        wurde (Korrosionsschutz und Optik).
    control_arm_grease_fitting_type:
      name: Schmiernippeltyp des Querlenkers
      description: Gibt an, ob die Querlenker-/Kugelgelenkbaugruppe einen Schmiernippel
        (Zerk) enthält und ob dieser gewartet werden kann.
    control_arm_material:
      name: Material des Querlenkers
      description: Gibt das Hauptmaterial und die Fertigungsbauweise des Querlenkerkörpers
        an.
    control_arm_position:
      name: Position des Querlenkers
      description: Gibt die Fahrwerksposition an, für die der Querlenker innerhalb
        der Achs- bzw. Fahrzeugseite ausgelegt ist (z. B. oben/unten, vorne/hinten,
        links/rechts).
    control_arm_style:
      name: Bauart des Querlenkers
      description: Kennzeichnet die geometrische bzw. konstruktive Bauart des Querlenkers
        innerhalb der Fahrwerkskonstruktion.
    control_cable_connector_type:
      name: Typ des Steuerkabelanschlusses
      description: Gibt den End- bzw. Anschlusstyp an, den die Steuerkabel zur Verbindung
        mit Steuerung und Motor verwenden (z. B. OEM-spezifische Endanschlüsse).
    control_voltage_or_gate_connectivity:
      name: Steuerspannung oder Gate-Anschluss
      description: Gibt die Steuerspannungs- und Gate-Anschlüsse an, die für die Integration
        mit modularen/analogen Geräten unterstützt werden.
    controller_function:
      name: Controller-Funktion
      description: Definiert die primäre Funktion der Laufband-Steuerplatine, z. B.
        Motorsteuerung, Stromversorgung oder Wechselrichterantrieb.
    controller_type:
      name: Controller-Typ
      description: Gibt den Motorcontroller bzw. das Steuerungssystem an, das im E-Scooter-Umrüstkit
        enthalten (oder für die Nutzung erforderlich ist), wobei der Fokus auf den
        für Kompatibilität und Leistung relevanten Eigenschaften liegt.
    conversion_kit_cooling_method:
      name: Kühlmethode des Umrüstsatzes
      description: Primäres Wärmemanagementverfahren für die Integration von Motor,
        Wechselrichter und Batterie.
    conversion_kit_installation_complexity:
      name: Installationskomplexität des Umrüstkits
      description: Erwarteter Installationsaufwand basierend auf typischen erforderlichen
        Kenntnissen bzw. Werkzeugen.
    converted_bed_size:
      name: Größe des umgebauten Betts
      description: Gibt die Bettgröße bzw. Konfiguration an, in die das Kinderbett
        nach Installation dieses Kits umgewandelt wird.
    convertible_configuration:
      name: Umwandlungskonfiguration
      description: Gibt an, in wie viele verschiedene Bettkonfigurationen sich das
        Produkt umwandeln lässt (z. B. 3-in-1-Kinderbett → Kleinkinderbett → Tagesbett).
    convertible_high_chair_modes:
      name: Modi für umwandelbare Hochstühle
      description: Gibt die Sitzkonfigurationen an, in die sich der Stuhl umwandeln
        lässt.
    cookie_decorating_kit_items_included:
      name: Im Keksdekorations-Kit enthaltene Artikel
      description: Listet die einzelnen enthaltenen Dekorationselemente auf, damit
        Kund:innen genau wissen, welches Zubehör in der Box enthalten ist (z. B. Zuckerguss-Tuben,
        Streusel oder Ausstechformen).
    cookie_variety:
      name: Kekssorte
      description: Kennzeichnet die spezifische Art bzw. Sorte des Cookies, damit
        Käufer:innen schnell den bevorzugten Typ findet.
    cooking_state:
      name: Garzustand
      description: Gibt den Zubereitungsgrad des Hähnchenprodukts beim Verkauf an
        (roh, vollständig gegart, mariniert usw.).
    coolant_additive_purpose:
      name: Zweck des Kühlmittelzusatzes
      description: Primäre Funktion des Kühlmittelzusatzes (kein Kühlerreiniger oder
        spezielles Dichtungsmittel).
    coolant_base_fluid:
      name: Basisflüssigkeit des Kühlmittels
      description: Gibt die primäre Glykolbasis an, die in der Frostschutzmittel-/Kühlmittelformulierung
        verwendet wird.
    coolant_outlet_connection_style:
      name: Bauart des Kühlmittelauslassanschlusses
      description: Gibt die primäre Glykolbasis an, die in der Frostschutzmittel-/Kühlmittelformulierung
        verwendet wird.
    coolant_outlet_neck_angle:
      name: Winkel des Kühlmittelauslassstutzens
      description: Gibt Winkel bzw. Ausrichtung des Wasserstutzenauslasses relativ
        zu Montageflansch bzw. Motor an (hilfreich für die Verlegung des oberen Kühlerschlauchs).
    coolant_technology:
      name: Kühlmitteltechnologie
      description: Gibt die Chemie bzw. Technologieklasse des im Frostschutzmittel/Kühlmittel
        verwendeten Kühlmittels an (wie üblicherweise auf der Verpackung angegeben).
    coolant_temperature_sensor_port:
      name: Anschluss für Kühlmitteltemperatursensor
      description: Gibt an, ob der Wasserstutzen einen Anschluss für einen Kühlmitteltemperatursensor
        bzw. -schalter besitzt und welche Schnittstelle verwendet wird.
    coolant_temperature_sensor_seal_type:
      name: Dichtungstyp für Kühlmitteltemperatursensor
      description: Gibt die Art der Abdichtung zwischen Sensor und Motor- bzw. Kühlmittelkanal
        an.
    cooling_system_component_included:
      name: Enthaltene Komponenten des Kühlsystems
      description: Listet zusätzliche Komponenten des Kühlsystems auf, die zusammen
        mit der Wasserpumpe geliefert werden.
    cooling_system_flush_application_step:
      name: Anwendungsschritt der Kühlsystemspülung
      description: Gibt an, an welcher Stelle das Produkt im Serviceprozess eingesetzt
        wird (z. B. Vorspülreiniger oder abschließender Spül-/Neutralisationsreiniger).
    cooling_system_type:
      name: Kühlsystemtyp
      description: Gibt die Kühlsystemkonfiguration eines Innenbord-Schiffsmotors
        an (z. B. Rohwasser/offener Kreislauf, geschlossener Süßwasserkreislauf mit
        Wärmetauscher oder Kielkühlung).
    cord_material:
      name: Schnurmaterial
      description: Gibt das Material der Schnur bzw. des Fadens an, mit dem der Wischer
        durch das Saxophon gezogen wird.
    core_type_bass_strings:
      name: Kerntyp (Basssaiten)
      description: Gibt die Form des Saitenkerns an, die Spielgefühl und Flexibilität
        beeinflusst.
    cork_grease_base_material:
      name: Basismaterial des Korkfetts
      description: Hauptbestandteil der Korkfettformulierung (z. B. auf Lanolinbasis).
    cork_grease_form:
      name: Form des Korkfetts
      description: Die physische Form des Korkfettprodukts.
    corn_presentation:
      name: Darreichungsform von Mais
      description: Gibt die physische Darreichungsform des Maisprodukts an (z. B.
        ganze Kolben in der Hülle, Körner oder Pulver)
    corn_syrup_variety:
      name: Maissirup-Sorte
      description: Gibt die jeweilige Art bzw. Verarbeitungsvariante des Sirups an.
    corn_variety:
      name: Maissorte
      description: Kennzeichnet die spezifische botanische bzw. handelsübliche Sorte
        des angebotenen Maises, damit Käufer:innen Sorten nach Geschmack, Textur,
        Farbe und kulinarischer Verwendung unterscheiden können.
    corner_compatibility:
      name: Eckenkompatibilität
      description: Gibt die Tischform an, für die die Abdeckung konzipiert ist (quadratisch
        oder rund).
    corner_flag_features:
      name: Merkmale der Eckfahne
      description: Hebt besondere funktionale Merkmale bzw. Verbesserungen der Eckfahne
        hervor (z. B. zusammenklappbare Stange oder reflektierendes Material).
    cornet_mouthpiece_shank_type:
      name: Typ des Kornettmundstückschafts
      description: Gibt den vom Kornett unterstützten Standard für Mundstückaufnahme
        bzw. Schaft zur Sicherstellung der Kompatibilität an.
    cornhole_league_certification:
      name: Cornhole-Liga-Zertifizierung
      description: Gibt offizielle Zertifizierungen bzw. Ligazulassungen an, die das
        Produkt erfüllt.
    corrosion_resistance:
      name: Korrosionsbeständigkeit
      description: Gibt die Korrosionsschutzbehandlung bzw. Korrosionsbeständigkeitsklasse
        der Halterung für den Außeneinsatz an.
    corrosion_resistance_level:
      name: Korrosionsbeständigkeitsklasse
      description: Gibt den Korrosionsschutz für Süßwasser- bzw. Salzwasserumgebungen
        an.
    costume_components_included:
      name: Enthaltene Kostümkomponenten
      description: Listet die Kleidungsstücke und Accessoires auf, die zum Kostüm
        gehören, und verdeutlicht, welche Bestandteile im Set enthalten sind.
    cotton_weave_type:
      name: Baumwollwebart
      description: Beschreibt die Web- bzw. Strickstruktur der bedruckbaren Baumwolloberfläche,
        die sich auf Textur und Druckschärfe auswirkt.
    counter_type:
      name: Zählertyp
      description: Gibt Vorhandensein und Art der integrierten Wiederholungs- bzw.
        Kraftmessung an.
    counterweight_fill_material:
      name: Füllmaterial des Gegengewichts
      description: Gibt die Substanz an, die zum Beschweren oder Vorbefüllen des Gegengewichts
        verwendet werden kann.
    counterweight_type:
      name: Art des Gegengewichts
      description: Gibt die Bauart des Gegengewichts an, z. B. Sandsack oder Stahlplatte,
        um Kompatibilität und Montage zu erleichtern.
    coupler_system:
      name: Kupplungssystem
      description: Gibt den an der Modelllokomotive verwendeten Kupplungstyp bzw.
        das Kupplungssystem zur Kompatibilität mit rollendem Material an.
    court_surface_suitability:
      name: Eignung für Spielfeldoberflächen
      description: Gibt an, für welchen Basketballplatzbelag die Außensohle des Schuhs
        konzipiert ist, und hilft Käufer:innen dabei, die passende Traktion und Haltbarkeit
        für Hallenholzböden, Asphalt-/Betonplätze im Freien oder beides auszuwählen.
    cover_fit_style:
      name: Abeckungsart
      description: Beschreibt, wie die Abdeckung über den Tisch passt und wie sich
        dies auf Aussehen und Schutzgrad auswirkt.
    cover_fit_type:
      name: Passform der Abdeckung
      description: Gibt an, ob die Abdeckung maßgefertigt (individuell/teilindividuell)
        oder universell ist und ob sie für die Verankerung im Wasser oder zur Lagerung
        bzw. Anhängernutzung vorgesehen ist.
    cowbell_beater_type:
      name: Art des Kuhglockenschlägels
      description: Gibt die empfohlene Schlägelart für Klang bzw. Finish der Kuhglocke
        an (falls vom Produkt angegeben).
    cowbell_mounting_method:
      name: Befestigungsmethode der Kuhglocke
      description: Gibt an, wie die Kuhglocke montiert bzw. verwendet werden soll
        (handgehalten oder an Hardware montiert).
    cowbell_sound_character:
      name: Klangcharakter der Kuhglocke
      description: Beschreibt den allgemeinen Klangcharakter, der in Produktlisten
        verwendet wird (unterstützt die Produktsuche über die Größe hinaus).
    cradle_capacity:
      name: Tragfähigkeit der Halterung
      description: Gibt an, ob die Wiege für ein einzelnes Baby oder Zwillinge ausgelegt
        ist.
    craft_cutter_embosser_machine_operation:
      name: Bedienung der Craft-Schneide-/Prägemaschine
      description: Gibt an, wie der Schneide- bzw. Prägeapparat aus Sicht des Benutzerablaufs
        bedient wird (z. B. manuelle Kurbel, elektrischer Druckknopf oder App-Steuerung).
    craft_decoration_maker_accessories_included:
      name: Im Basteldekorationsgerät enthaltenes Zubehör
      description: Listet die wichtigsten Zubehörteile auf, die im Lieferumfang des
        Basteldekorationsgeräts enthalten sind (z. B. Starter-Klebeband/-folie, Nachfüllpackungen
        für Aufkleber, Glitzerkartuschen oder Reinigungswerkzeuge).
    craft_foil_application_method:
      name: Anwendungsmethode für Craft-Folie
      description: Gibt an, wie die Bastelfolie aufgebracht bzw. aktiviert werden
        soll (Klebstoff, Hitze, Toner/Reaktivverfahren usw.).
    craft_foil_format:
      name: Format der Bastelfolie
      description: Gibt das physische Verkaufsformat der Bastelfolie an (z. B. Rolle
        oder Bogen).
    craft_glue_finish:
      name: Finish des Craft-Klebers
      description: Beschreibt das Aussehen des Klebstoffs nach dem Trocknen (z. B.
        transparent, weiß/undurchsichtig, durchscheinend oder glänzend/matt).
    craft_magnet_application:
      name: Verwendungszweck des Bastelmagneten
      description: Gibt den hauptsächlichen Bastelzweck bzw. die vorgesehene Montagefläche
        des Magnetprodukts an.
    craft_magnet_holding_strength_level:
      name: Haltekraft des Bastelmagneten
      description: Relative Stärkekategorie für Craft-Magnete, damit Käufer:innen
        die passende Haltekraft für ihr Projekt auswählen können.
    craft_organizer_storage_features:
      name: Aufbewahrungsfunktionen des Craft-Organizers
      description: Beschreibt Organisationsmerkmale und interne Aufbewahrungselemente
        von Bastelorganizern (z. B. verstellbare Trennwände, Schubladen oder transparente
        Taschen).
    craft_scoring_board_included_accessories:
      name: Im Craft-Falzbrett enthaltenes Zubehör
      description: Zubehör, das im Lieferumfang des Falzbretts enthalten ist (z. B.
        Falzstift/Falzbein, Dreieck oder Umschlagwerkzeug).
    craft_scoring_board_measurement_system:
      name: Maßsystem des Craft-Falzbretts
      description: Gibt das auf der Anzeigetafel angegebene Maßsystem an (imperial,
        metrisch, dual oder unmarkiert).
    craft_wire_finish_coating:
      name: Finish/Beschichtung des Craft-Drahts
      description: Gibt die Oberflächenbeschaffenheit bzw. Beschichtung des Drahts
        an, die für Farbe, Anlaufschutz oder Schutz verwendet wird.
    craft_wood_surface_preparation:
      name: Oberflächenvorbereitung von Craft-Holz
      description: Gibt an, ob die Holzoberfläche bereit zum Lackieren bzw. Streichen
        ist oder vorbereitet werden muss (z. B. durch Schleifen oder Grundieren).
    crank_spindle_interface:
      name: Kurbelspindelschnittstelle
      description: Gibt das von der Tretlageraufnahme unterstützte Kurbelspindelsystem
        an (z. B. SRAM DUB oder Square Taper), um die Kompatibilität zwischen Kurbelgarnitur
        und Tretlager sicherzustellen.
    crankshaft_balance_type:
      name: Typ der Kurbelwellenauswuchtung
      description: Gibt an, ob die Kurbelwelle intern ausgewuchtet (neutral) oder
        extern ausgewuchtet ist (erfordert Schwingungsdämpfer-/Schwungradgewichte).
    crankshaft_bolt_pattern:
      name: Schraubenmuster der Kurbelwelle
      description: Lochkreis am hinteren Flansch zur Befestigung von Schwungrad bzw.
        Flexplate.
    crankshaft_sensor_reluctor_type:
      name: Reluktortyp des Kurbelwellensensors
      description: Gibt die verwendete Konfiguration des Triggerrads bzw. Reluktorrads
        des Kurbelwellensensors an (sofern zutreffend).
    craps_accessories_included:
      name: Würfelsetzubehör inklusive
      description: Kennzeichnet zusätzliches craps-spezifisches Zubehör, das über
        Würfel, Chips und Spielfeld hinaus enthalten ist.
    crash_cymbal_profile:
      name: Profil des Crash-Beckens
      description: Beschreibt die Gesamtkrümmung bzw. das Profil des Beckens (wie
        stark die Wölbung ausgeprägt ist), was Tonhöhe und Ansprache beeinflusst.
    crash_cymbal_sound_character:
      name: Crashbecken-Klangcharakter
      description: Primäre Klangcharakteristika des Crashbeckens.
    crash_pad_size_class:
      name: Größenklasse des Crashpads
      description: Gibt die allgemeine Größenkategorie eines Kletter-Crashpads an
        und vermittelt Käufer:innen schnell einen Eindruck der verfügbaren Auflagefläche,
        ohne genaue Maße anzugeben.
    crate_engine_assembly_level:
      name: Montagegrad des Crate-Motors
      description: Gibt an, wie vollständig der Crate-Motor im Auslieferungszustand
        ist (welche Hauptkomponenten enthalten sind).
    cream_base_ingredient:
      name: Basiszutat der Creme
      description: Gibt die primäre Grundlage der Creme an, einschließlich Milchprodukte
        und pflanzlicher Alternativen.
    cream_cheese_base:
      name: Basis des Frischkäses
      description: Gibt die primäre Milch- oder pflanzliche Quelle an, die zur Herstellung
        des Frischkäses verwendet wird, und hilft Käufer:innen bei Ernährungs-, Allergen-
        und Geschmacksaspekten.
    cream_cheese_form:
      name: Frischkäseform
      description: Beschreibt die physische Form bzw. Textur des Frischkäses (z. B.
        Block, aufgeschlagen oder Dip), die Streichfähigkeit und Verwendungszweck
        beeinflusst.
    cream_variety:
      name: Sahnesorte
      description: Kennzeichnet die jeweilige Sahnesorte anhand von Fettgehalt, Verarbeitungsart
        oder kulinarischem Verwendungszweck (z. B. Half & Half, Doppelrahm oder Kochsahne).
    crib_accessory_features:
      name: Eigenschaften des Krippenzubehörs
      description: Listet funktionale oder komfortorientierte Merkmale auf, die speziell
        für Zubehör für Kinder- und Kleinkinderbetten gelten, wie z. B. Atmungsaktivität
        oder elastische Ränder.
    crib_bumper_features:
      name: Merkmale des Kinderbettschutzes
      description: Hebt spezielle funktionale Eigenschaften eines Kinderbettumrandungsschutzes
        hervor.
    crib_conversion_kit_components:
      name: Komponenten des Krippenumbausatzes
      description: Listet die im Set enthaltenen Hauptbestandteile auf, damit Käufer:innen
        prüfen können, ob alles für die Installation enthalten ist.
    cricket_ball_grade:
      name: Qualitätsstufe des Cricketballs
      description: Gibt die Qualitätsstufe bzw. den vorgesehenen Spielstandard des
        Balls an.
    cricket_ball_piece_construction:
      name: Konstruktion des Cricketballs
      description: Gibt die Anzahl der äußeren Teile bzw. Formsegmente an, aus denen
        die Ballhülle besteht – ein wichtiger Hinweis auf Qualität und Preis.
    cricket_ball_type:
      name: Typ des Cricketballs
      description: Gibt an, welche Art von Cricketball im Produkt enthalten ist oder
        ob kein Ball enthalten ist.
    cricket_bat_accessory_type:
      name: Art des Cricketschläger-Zubehörs
      description: Gibt die Art des Zubehörs bzw. Wartungsartikels für Cricketschläger
        an, damit Käufer:innen schnell das passende Produkt finden können.
    cricket_bat_size:
      name: Größe des Cricketschlägers
      description: Kennzeichnet die standardisierte Größenklassifizierung von Cricketschlägern
        (0–6, Harrow, SH, LH), die üblicherweise anhand von Alter und Körpergröße
        gewählt wird.
    cricket_bat_size_compatibility:
      name: Größenkompatibilität für Cricketschläger
      description: Gibt die Schlägergrößen an, für die das Zubehör ausgelegt ist,
        um die richtige Kompatibilität sicherzustellen.
    cricket_helmet_role:
      name: Spielrolle des Crickethelms
      description: Gibt die Spielrolle an, für die der Helm ausgelegt ist, z. B. Batter
        oder Wicketkeeper.
    cricket_leg_guard_type:
      name: Art des Cricket-Beinschutzes
      description: Bezeichnet die spezifische Art des Beinschutzes für Cricket.
    cricket_player_role:
      name: Spielrolle im Cricket
      description: Gibt die hauptsächliche Spielrolle an, für die der Schuh ausgelegt
        ist.
    cricket_protection_grade:
      name: Schutzklasse für Cricket
      description: Gibt die von Herstellern von Cricketausrüstung verwendete Schutzklassenbewertung
        an.
    cricket_stump_base_type:
      name: Typ der Cricket-Stumpf-Basis
      description: Gibt die mit den Stumps gelieferte Basisart bzw. das Basismaterial
        an, das Stabilität und Eignung für den jeweiligen Spielbelag beeinflusst.
    cricket_stump_target_features:
      name: Merkmale des Cricket-Trainingsziels mit Stumps
      description: Hebt besondere funktionale Merkmale hervor, die Benutzerfreundlichkeit,
        Sichtbarkeit, Haltbarkeit oder Stabilität beim Training verbessern.
    cricket_stump_type:
      name: Art der Cricket-Stumps
      description: Kategorisiert die Bauart bzw. Konstruktion der Stumps, damit Käufer:innen
        zwischen traditionellen Match-Stumps, Trainingsvarianten oder modernen beleuchteten
        Modellen wählen können.
    cricket_training_focus:
      name: Schwerpunkt des Cricket-Trainings
      description: Primäre Cricket-Fähigkeit bzw. Disziplin, die mit der Trainingshilfe
        verbessert werden soll.
    croquet_set_components_included:
      name: Im Set enthalten
      description: Listet alle wichtigen Komponenten auf, die im Set enthalten sind
        (z. B. Wickets, Heringe oder Tragetasche), damit Kunden genau verstehen, was
        sie kaufen.
    cross_country_binding_system:
      name: Langlaufbindungssystem
      description: Gibt den Langlaufskibindungsstandard an, für den das Produkt gebohrt
        wurde bzw. mit dem es kompatibel ist.
    cross_stitch_chart_symbol_type:
      name: Symboltyp des Kreuzstichdiagramms
      description: Gibt an, wie das Diagramm dargestellt wird (Symbole, Farben oder
        beides).
    cross_stitch_finishing_type:
      name: Fertigstellungsart für Kreuzsticharbeiten
      description: Gibt die vorgesehene Fertigstellungs- bzw. Präsentationsart für
        das Stickprojekt an.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Stoffhaltemechanismus des Stickrahmens
      description: Gibt an, wie der Stoff im Rahmen befestigt bzw. gespannt wird (z. B.
        mit Clips, Klemmen oder Heftstiften), was Benutzerfreundlichkeit und Stoffkompatibilität
        beeinflusst.
    cross_stitch_frame_included_components:
      name: Im Kreuzstichrahmen enthaltene Komponenten
      description: Listet den Lieferumfang auf (z. B. nur Rahmen oder Rahmen + Klemmen
        + Ständer), wodurch Unklarheiten und Rücksendungen reduziert werden.
    cross_stitch_frame_type:
      name: Art des Kreuzstichrahmens
      description: Gibt die Konstruktion bzw. Art des Stickrahmens an (wie der Stoff
        gehalten wird), was sich auf Benutzerfreundlichkeit und Projektkompatibilität
        auswirkt.
    cross_stitch_pattern_technique:
      name: Kreuzstichmustertechnik
      description: Gibt die von der Vorlage geforderte Kreuzstichtechnik bzw. -art
        an.
    crossbar_shape_profile:
      name: Form/Profil der Querstange
      description: Gibt die aerodynamische Form bzw. das Profil der Querstange an.
    crossbar_style:
      name: Stil der Querstange
      description: Kennzeichnet die Bauart der Querlatte und unterscheidet starre
        Wettkampfquerlatten von flexiblen oder hybriden Trainingsquerlatten.
    crossbow_type:
      name: Armbrusttyp
      description: Kennzeichnet die grundlegende Bauart der Armbrust, z. B. Compound-,
        Recurve- oder Pistolenarmbrust. Die Bauart beeinflusst Leistung, Größe und
        Einsatzbereiche, daher filtern Käufer:innen häufig danach.
    crossover_component_type:
      name: Typ der Crossover-Komponente
      description: Kennzeichnet die primäre Komponententopologie des passiven Crossover-Netzwerks.
    crossover_configuration:
      name: Crossover-Konfiguration
      description: Gibt an, ob der Crossover einen einzelnen oder mehrere Übergangspunkte
        verwendet (z. B. 2-Wege- oder 3-Wege-Designs).
    crossover_type:
      name: Art der Frequenzweiche
      description: Gibt die Art der im Komponentensatz enthaltenen Frequenzweiche
        an.
    crown_profile:
      name: Kronenprofil
      description: Gibt die Höhe bzw. das Profil der Kappenkrone über dem Schirm an.
    crown_style:
      name: Kronenform
      description: Definiert die Gesamtsilhouette bzw. das Profil der Krone eines
        Bowlerhuts.
    crust_taste_profile:
      name: Geschmacksprofil der Kruste
      description: Gibt an, ob die Kruste geschmacklich eher süß, herzhaft oder neutral
        ist.
    crystal_finish:
      name: Kristalloberfläche
      description: Beschreibt die Oberflächenbeschaffenheit, Beschichtung oder den
        Verarbeitungszustand des losen Kristalls (z. B. roh, poliert, getrommelt,
        facettiert, mattiert, aura-beschichtet, gefärbt oder wärmebehandelt).
    crystal_material:
      name: Kristallmaterial
      description: Gibt das Material des Uhrenglases an, das das Zifferblatt schützt.
    crystalline_finish_style:
      name: Stil des kristallinen Finishs
      description: Beschreibt das charakteristische kristalline bzw. federartige Erscheinungsbild,
        das Palmwachs in fertigen Kerzen erzeugt.
    cucumber_variety:
      name: Gurkensorte
      description: Gibt die Sorte bzw. Handelsvariante der Gurke an (z. B. English,
        Persian oder Kirby).
    cue_compatibility:
      name: Queue-Kompatibilität
      description: Gibt die Queue-Gelenkkonfiguration an, für die der Koffer ausgelegt
        ist, z. B. einteilige oder 3/4-geteilte Queues.
    cue_construction:
      name: Queue-Aufbau
      description: Gibt an, wie der Queue aufgebaut ist – Anzahl der Teile oder ob
        es sich um eine Teilkomponente wie nur Unterteil oder nur Oberteil handelt
        – was Tragbarkeit und Kompatibilität beeinflusst.
    cue_head_material:
      name: Material des Queuekopfes
      description: Kennzeichnet das Material des Queuekopfs (des Teils, der mit dem
        Puck in Kontakt kommt), das Haltbarkeit und Oberflächenschutz beeinflusst.
    cue_sport_compatibility:
      name: Kompatibilität mit Queue-Sportarten
      description: Gibt an, für welche Queue-Sportart das Zubehör ausgelegt ist.
    cue_thread_size:
      name: Queue-Gewindegröße
      description: Gibt die Gewindespezifikation an, die für Verlängerungen, Gelenkschützer,
        Gewichtsschrauben und anderes Queue-Zubehör verwendet wird, um eine korrekte
        Passform sicherzustellen.
    cue_tip_hardness:
      name: Härte der Queuespitze
      description: Bewertet die Härte der Queuespitze, die sich auf die Kontrolle
        des Spielballs und das Spielgefühl auswirkt.
    cuff_height:
      name: Höhe der Manschette
      description: Gibt die Höhe der Stiefelmanschette an (niedrig, mittel, hoch,
        abnehmbar/verstellbar), was Halt und Flexibilität beeinflusst.
    cuff_position:
      name: Position der Manschette
      description: Gibt an, an welcher Stelle am Körper des Riders die Leash-Manschette
        befestigt wird.
    cultivation_method:
      name: Anbaumethode
      description: Beschreibt, wie das Blattgemüse angebaut wurde, einschließlich
        Anbautechniken und landwirtschaftlicher Praktiken.
    cup_type:
      name: Paillettenform
      description: Gibt das Oberflächenprofil der Paillette (flach oder gewölbt) sowie
        die Wölbungstiefe an, was Glanz, Textur und Sitz beim Annähen oder Kleben
        beeinflussen kann.
    cupcake_size:
      name: Cupcake-Größe
      description: Gibt die physische Größenkategorie der angebotenen Cupcakes an
        (z. B. Mini, Standard oder Jumbo).
    curd_size:
      name: Kristallgröße
      description: Gibt die Größe bzw. Textur der Hüttenkäsebruchstücke an.
    cure_method:
      name: Aushärtungsmethode
      description: Beschreibt den Prozess, der zum Aushärten bzw. Abbinden des Klebstoffs
        erforderlich ist (z. B. UV-Licht, Luftfeuchtigkeit oder Wärme).
    curing_or_preparation_method:
      name: Pökel- bzw. Zubereitungsmethode
      description: Gibt an, wie die Oliven eingelegt bzw. anderweitig zubereitet wurden
        (z. B. in Salzlake eingelegt, in Öl eingelegt oder gegrillt).
    curling_broom_head_material:
      name: Material des Curlingbesenkopfs
      description: Gibt die hauptsächliche Materialzusammensetzung des Besenkopfs
        bzw. Pads an.
    curling_broom_head_type:
      name: Art des Curlingbesenkopfs
      description: Gibt die Bauart bzw. Konstruktion des Besenkopfs bzw. Pads an.
    curling_shoe_slider_material:
      name: Material des Gleitelements des Curlingschuhs
      description: Kennzeichnet das Hauptmaterial der Gleitsohle von Curlingschuhen.
    curling_training_aid_type:
      name: Typ der Curling-Trainingshilfe
      description: Kennzeichnet die Art der Curling-Trainingshilfe.
    curry_variety:
      name: Currysorte
      description: Klassifiziert Currysaucen nach dem jeweiligen Currystil bzw. Rezept,
        das damit zubereitet werden soll, z. B. Tikka Masala, Massaman oder Thai Green,
        um eine präzise Geschmacks- bzw. Stilfilterung zu ermöglichen.
    cushion_rubber_profile:
      name: Profil des Bandengummis
      description: Form bzw. Profilcode der Bandengummis.
    cushioning_level:
      name: Dämpfungsgrad
      description: Gibt an, wie viel Polsterung die Socke unter dem Fuß für Aufprallschutz
        und Komfort bietet.
    custom_label_content_type:
      name: Inhaltstyp des benutzerdefinierten Labels
      description: Gibt an, welche Informationen auf dem Einnählabel angepasst werden
        (z. B. Name, Logo, Nachricht, Größe, Pflegesymbole oder Kontaktinformationen).
    customization_type:
      name: Anpassungstyp
      description: Gibt an, ob das Trikot unbedruckt, spielerausgegeben oder individuell
        mit personalisiertem Namen bzw. Nummer versehen ist.
    cut_or_preparation_style:
      name: Schnitt- bzw. Zubereitungsart
      description: Gibt an, wie die Gemüsestücke in der Dose bzw. im Glas geschnitten
        oder zubereitet wurden (z. B. ganz, gewürfelt oder in Stifte geschnitten).
    cut_resistance_rating:
      name: Schnittfestigkeitsklasse
      description: Gibt die offiziell geprüfte Schnittschutzklasse des Artikels an.
    cut_type:
      name: Schnittart
      description: Gibt an, ob der Stoff als Meterware, Zuschnitt oder Rolle/Ballen
        verkauft wird.
    cutting_application:
      name: Schneidanwendung
      description: Gibt den hauptsächlichen Verwendungszweck der Schere an.
    cutting_mat_grid_style:
      name: Rasterstil der Schneidematte
      description: Gibt die Art der aufgedruckten Führung auf der Mattenoberfläche
        an.
    cutting_mat_intended_use:
      name: Verwendungszweck der Schneidematte
      description: Primärer Einsatzbereich der Schneidematte für Bastel- bzw. Arbeitsflächen.
    cv_boot_clamp_type:
      name: Art der CV-Manschettenklemme
      description: Gibt die Art der Klemme bzw. des Bands an, das zur Befestigung
        der CV-Manschette verwendet wird.
    cv_boot_kit_contents:
      name: Inhalt des CV-Manschettensatzes
      description: Listet auf, was im Lieferumfang der CV-Manschette enthalten ist
        (z. B. Klemmen, Fettpackung oder Haltebänder).
    cv_boot_material:
      name: Material der CV-Manschette
      description: Gibt die hauptsächliche Materialkonstruktion der CV-Manschette
        an.
    cv_boot_position:
      name: Position der CV-Manschette
      description: Gibt an, ob die CV-Manschette für die innere (Inboard-) oder äußere
        (Outboard-) CV-Gelenkposition an der Achse geeignet ist.
    cycling_apparel_fit:
      name: Passform der Radbekleidung
      description: Beschreibt den Schnitt des Kleidungsstücks und die vorgesehene
        Enge bzw. Aerodynamik (z. B. Race oder Relaxed).
    cylinder_head_assembly:
      name: Zylinderkopf-Baugruppe
      description: Gibt den Vollständigkeitsgrad des Zylinderkopfs im Verkaufszustand
        an (z. B. vollständig montiert mit eingebauten Ventiltriebskomponenten oder
        als nacktes/unmontiertes Gussteil).
    cylinder_head_material_grade:
      name: Materialgüte des Zylinderkopfs
      description: Gibt Material und Güteklasse des für den Zylinderkopfguss verwendeten
        Werkstoffs an.
    cylinder_head_position:
      name: Position des Zylinderkopfs
      description: Gibt an, für welche Zylinderbank bzw. Seite oder Ausrichtung der
        Zylinderkopf bei Mehrbankmotoren geeignet ist (z. B. linke/rechte Seite oder
        Bank 1/Bank 2).
    cymbal_alloy:
      name: Beckenlegierung
      description: Legierung bzw. Zusammensetzung der im Set enthaltenen Becken.
    cymbal_application:
      name: Einsatzbereich des Beckens
      description: Gibt den hauptsächlichen Einsatzzweck an, für den das Becken entwickelt
        bzw. vermarktet wird.
    cymbal_arm_mounting_interface:
      name: Montageschnittstelle des Beckenarms
      description: Gibt an, wie der Beckenarm an der übrigen Schlagzeughardware befestigt
        wird (z. B. Klemme, Rack oder Stativaufnahme).
    cymbal_arm_rotation_positioning_features:
      name: Rotations-/Positionierungsfunktionen des Beckenarms
      description: Gibt Positionierungsmerkmale an, die beeinflussen, wie der Arm
        geneigt, gedreht und arretiert werden kann.
    cymbal_arm_style:
      name: Art des Beckenarms
      description: Gibt an, ob der Beckenarm gerade oder als Galgenarm ausgeführt
        ist, um unterschiedliche Reichweiten und Positionierungen zu ermöglichen.
    cymbal_drum_case_wheel_configuration:
      name: Radkonfiguration des Becken-/Schlagzeugkoffers
      description: Gibt an, ob der Koffer über Rollen verfügt und (falls zutreffend),
        welche Rollenkonfiguration für den Transport verwendet wird.
    cymbal_hammering_style:
      name: Hämmerungsart des Beckens
      description: Beschreibt Hämmerungsverfahren bzw. Erscheinungsbild, die Klangkomplexität
        und Spielgefühl beeinflussen.
    cymbal_kit_components_included:
      name: Enthaltene Komponenten des Becken-Sets
      description: Gibt an, welche Beckentypen im Ride-Becken-Kit/-Pack enthalten
        sind (zusätzlich zum Ride-Becken selbst).
    cymbal_kit_items_included:
      name: Inbegriffene Becken-Set-Artikel
      description: Gibt an, welche Becken im Paket enthalten sind (nach Beckentyp).
    cymbal_lathing:
      name: Abdrehen des Beckens
      description: Gibt an, ob bzw. in welchem Umfang die Beckenoberfläche abgedreht
        (gerillt) oder unbehandelt/roh ist.
    cymbal_playing_style_genre:
      name: Spielstil/Genre des Beckens
      description: Kennzeichnet den typischen Einsatzbereich, für den die Becken ausgelegt
        sind (z. B. Bauchtanz-Zills oder Marsch-/Orchester-Handbecken).
    cymbal_set_configuration:
      name: Konfiguration des Beckensets
      description: Gibt an, ob das Produkt als einzelnes Becken, als abgestimmtes
        Paar oder als Mehrfach-Set verkauft wird (z. B. für Gruppenunterricht).
    cymbal_sound_character:
      name: Beckenklangcharakter
      description: Beschreibt das allgemeine Klangprofil bzw. die Klangcharakteristik
        des Beckens zur besseren Produkterkennung (z. B. hell oder dunkel).
    cymbal_sustain:
      name: Sustain des Beckens
      description: Gibt an, wie lange das Becken nach dem Anschlagen nachklingt.
    cymbal_type:
      name: Beckentyp
      description: Gibt die funktionale Beckenart an, die das elektronische Beckenpad
        nachbilden soll.
    cymbal_volume_level:
      name: Klanglautstärke des Beckens
      description: Beschreibt die wahrgenommene Lautstärke bzw. Ausgangsleistung des
        Beckens.
    cymbal_weight_class:
      name: Gewichtsklasse des Beckens
      description: Gibt die Gewichtsklasse des Beckens an, die sich auf Klangfarbe,
        Lautstärke und Ansprache auswirkt.
    dairy_heat_treatment:
      name: Wärmebehandlung von Milchprodukten.
      description: Kennzeichnet den Verarbeitungs- bzw. Pasteurisierungsgrad der Sahne
        (z. B. roh, pasteurisiert oder UHT), der Haltbarkeit, Geschmack und Aufschlagverhalten
        beeinflusst.
    damage_type:
      name: Schadensart
      description: Gibt an, für welche Arten von Windschutzscheibenschäden das Set
        vorgesehen ist.
    damper_pedal_style:
      name: Bauart des Dämpferpedals
      description: Beschreibt die physische Bauart des Dämpferpedals, das mit Keyboards
        bzw. Digitalpianos verwendet wird.
    damping_adjustability:
      name: Einstellbarkeit der Dämpfung
      description: Gibt an, welche Dämpfungs- und/oder Fahrhöhenparameter am Stoßdämpfer
        einstellbar sind.
    damping_level:
      name: Dämpfungsgrad
      description: Gibt das relative Maß an Lautstärke- und Sustainreduzierung an,
        das der Dämpfer bewirkt.
    dance_occasion:
      name: Tanzanlass
      description: Gibt den vorgesehenen Einsatzbereich des Kleidungsstücks im Tanztraining
        oder bei Aufführungen an.
    darbuka_accessories_included:
      name: Inbegriffenes Darbuka-Zubehör
      description: Listet das üblicherweise mit der Darbuka gelieferte Zubehör auf.
    darbuka_body_finish_type:
      name: Oberflächenfinish des Darbuka-Korpus
      description: Beschreibt die äußere Oberflächenbeschaffenheit, Beschichtung oder
        dekorative Verarbeitung des Darbuka-Korpus.
    darbuka_head_material:
      name: Material des Darbukafells
      description: Gibt das Material der Trommelfellmembran einer Darbuka an.
    dart_barrel_material:
      name: Material des Dartbarrels
      description: Gibt das Hauptmaterial des Dartbarrels an, das Gewichtsverteilung,
        Haltbarkeit und Preis beeinflusst.
    dart_shaft_design:
      name: Design des Dartschafts
      description: Klassifiziert die mechanische Bauart des Schafts, z. B. feststehend,
        drehbar, teleskopisch oder mit integriertem Flight, was sich auf Leistung
        und Preis auswirkt.
    dart_shaft_thread_type:
      name: Gewindeart des Dartschafts
      description: Gibt die Gewindegröße bzw. den Gewindetyp an, mit dem der Schaft
        in den Dartbarrel eingeschraubt wird, um die Kompatibilität zwischen Schäften
        und Barrels sicherzustellen.
    dart_thread_size:
      name: Dart-Gewindegröße
      description: Gibt die Gewindegröße bzw. den Gewindestandard an, mit der bzw.
        dem das Teil kompatibel ist, um die Passgenauigkeit zwischen Schäften, Spitzen
        und Barrels sicherzustellen.
    dart_tip_compatibility:
      name: Kompatibilität der Dartspitzen
      description: Gibt an, ob das Dartteil für Steeldarts, Softdarts oder beide Dartarten
        vorgesehen ist.
    dart_tip_connection_type:
      name: Anschlussart der Dartspitze
      description: Beschreibt die Gewindespezifikation bzw. das Befestigungssystem,
        mit dem die Spitze an einem Dartbarrel oder -schaft befestigt wird, um die
        Kompatibilität sicherzustellen.
    dartboard_tournament_approval:
      name: Turnierzulassung für Dartscheiben
      description: Gibt an, ob die Dartscheibe von bestimmten Dartverbänden oder -ligen
        offiziell zugelassen ist.
    dartboard_type:
      name: Art der Dartscheibe
      description: Klassifiziert die Dartscheibe nach Konstruktionstechnologie und
        Dartkompatibilität (z. B. Borsten-, elektronische oder magnetische Dartscheibe).
    dash_cover_construction_type:
      name: Konstruktionstyp der Armaturenbrettabdeckung
      description: Beschreibt, wie die Armaturenbrettabdeckung geformt bzw. konstruiert
        ist (z. B. gegossen oder genäht), was Passgenauigkeit und Optik beeinflusst.
    dash_cover_cutout_configuration:
      name: Ausschnittkonfiguration der Armaturenbrettabdeckung
      description: Gibt an, für welche OEM-Armaturenbrettöffnungen bzw. -sensoren
        die Abdeckung vorgeschnitten oder geformt ist.
    dashboard_accessory_position:
      name: Position des Armaturenbrettzubehörs
      description: Gibt an, wo auf bzw. um das Armaturenbrett herum das Zubehör angebracht
        oder montiert werden soll.
    date_variety:
      name: Dattelsorte
      description: Gibt die Sorte bzw. Varietät der Datteln an (z. B. Medjool, Deglet
        Noor oder Ajwa). Die Sorte beeinflusst Geschmack, Größe und Textur maßgeblich
        und wird in den meisten Produkttiteln und -beschreibungen hervorgehoben. Ihre
        Angabe verbessert daher die Filterung und Auffindbarkeit.
    dayan_head_material:
      name: Material der Dayan-Bespannung
      description: Material der Spielfläche (Pudi), z. B. Naturfell oder synthetisches
        Material.
    dayan_strap_material:
      name: Material der Dayan-Riemen
      description: Material der Spannbänder (Baddhi), die zum Verschnüren des Dayan
        verwendet werden.
    dayan_syahi_type:
      name: Art der Dayan-Syahi
      description: Art der Syahi-Anwendung (schwarze Stimmpaste) auf dem Dayan-Fell.
    decaffeination_method:
      name: Entkoffeinierungsmethode
      description: Beschreibt das Verfahren zur Entfernung von Koffein aus entkoffeiniertem
        Kaffee.
    decal_installation_method:
      name: Anbringungsmethode des Aufklebers
      description: Beschreibt, wie der Aufkleber auf die Fahrzeugoberfläche aufgebracht
        wird (z. B. trocken oder nass). Details zu Werkzeugen bzw. Anforderungen (z. B.
        Transferfolie oder Heißluftpistole) sollten gegebenenfalls in Anleitungen
        oder zugehörigen Werkzeugattributen erfasst werden.
    decal_orientation:
      name: Ausrichtung des Aufklebers
      description: Gibt an, ob der Aufkleber für die Innenseite von Glas oder für
        Außenflächen vorgesehen ist.
    decal_placement_type:
      name: Platzierungsart des Aufklebers
      description: Gibt an, wo am Fahrzeug der Aufkleber angebracht werden soll (z. B.
        Karosserieteil, Stoßstange oder Motorhaube).
    decal_visibility_property:
      name: Sichtbarkeitseigenschaft des Aufklebers
      description: Optische bzw. sichtbarkeitsbezogene Eigenschaften eines Aufklebers,
        die die Sichtbarkeit oder Lichtreaktion verbessern sollen (z. B. reflektierend,
        fluoreszierend, nachleuchtend oder transparent).
    deck_concave_level:
      name: Konkavitätsgrad des Decks
      description: Gibt die Tiefe bzw. Intensität der Konkavform des Decks an (z. B.
        flach, mittel oder tief).
    deck_flex_rating:
      name: Flexibilitätsgrad des Decks
      description: Qualitative Bewertung der Flexibilität bzw. Steifigkeit des Decks.
    deck_material:
      name: Deck-Material
      description: Kennzeichnet das primäre Konstruktionsmaterial des Skateboarddecks.
    decoder_interface_socket_type:
      name: Decoder-Schnittstellen-/Sockeltyp
      description: Typ der digitalen Decoder-Schnittstelle bzw. Konfiguration des
        integrierten Decoders für das Lokomotivmodell.
    decoration_technique:
      name: Dekorationstechnik
      description: Kennzeichnet die primäre Methode zum Aufbringen von Grafiken oder
        Verzierungen auf das T-Shirt.
    decorative_stamp_form_factor:
      name: Bauform des dekorativen Stempels
      description: Kennzeichnet das physische Stempelformat und die Art, wie ein Design
        gedruckt wird (Einzelstempel, Set, Rollstempel, Hintergrundstempel usw.).
    decorative_tape_application:
      name: Verwendungsart des Dekorbands
      description: Primärer Bastel-Einsatzbereich, für den das dekorative Klebeband
        konzipiert oder vermarktet wird.
    decorative_tape_format:
      name: Format des dekorativen Klebebands
      description: Gibt an, wie das Dekorband für die Verwendung geliefert bzw. verpackt
        wird.
    decoy_buoyancy:
      name: Auftrieb des Lockvogels
      description: Beschreibt, wie sich der Lockvogel im Wasser verhält (schwimmend,
        schwebend oder sinkend).
    decoy_joint_type:
      name: Gelenkart des Lockvogels
      description: Gibt an, ob der Köderkörper massiv oder gelenkig ist, was sich
        auf das Schwimmverhalten auswirkt.
    decoy_motion_mechanism:
      name: Bewegungsmechanismus des Lockvogels
      description: Beschreibt, wie der Lockvogel gegebenenfalls Bewegungen oder Wasserverwirbelungen
        erzeugt, um Wild anzulocken.
    decoy_posture:
      name: Haltung des Lockvogels
      description: Gibt die dargestellte Haltung bzw. Aktivität des durch den Lockvogel
        dargestellten Tiers an (z. B. fressend, ruhend oder aufmerksam).
    decoy_size_class:
      name: Größenklasse des Lockvogels
      description: Kategorisiert die relative Größe des Lockvogels im Vergleich zum
        echten Tier (z. B. Standard, Magnum oder Oversize).
    decoy_style:
      name: Stil des Lockvogels
      description: Definiert die Bauform bzw. Designklasse des Lockvogels, damit Jäger:innen
        das passende Setup auswählen können.
    deli_meat_variety:
      name: Wurstwaren-Sortiment
      description: Klassifiziert die jeweilige Art der Wurstwaren (z. B. Salami, Mortadella,
        Prosciutto oder Roastbeef).
    delivery_form:
      name: Zustellungsform
      description: Darreichungsform des Injektorreinigers.
    denim_composition:
      name: Denim-Zusammensetzung
      description: Primäre Faserzusammensetzung des Denims (Basisfasern ohne Farbstoffe
        oder Veredelungen).
    denim_finish:
      name: Denim-Finish
      description: Oberflächen- bzw. Veredelungsfinish des Denimstoffs.
    denim_intended_use:
      name: Vorgesehene Verwendung von Denim
      description: Typischer Einsatzbereich bzw. Verwendungszweck, für den der Denim
        vermarktet wird.
    denim_stretch_type:
      name: Stretchart des Denims
      description: Gibt an, ob der Denim mechanisch dehnbar ist, Elastan/Spandex enthält
        oder nicht dehnbar ist.
    denim_wash:
      name: Denim-Waschung
      description: Kennzeichnet den Farbton oder das Waschverfahren, das auf den Denimstoff
        angewendet wird (z. B. hell, dunkel, roh, säurebehandelt).
    derailleur_cage_length:
      name: Länge des Schaltwerkskäfigs
      description: Gibt die Länge des Schaltwerkskäfigs an, die die Kettenkapazität
        bestimmt (hauptsächlich bei Schaltwerken hinten).
    derailleur_mounting_style:
      name: Montageart des Schaltwerks
      description: Gibt an, wie das Schaltwerk am Fahrradrahmen bzw. Schaltauge befestigt
        wird (z. B. Anlötsockel, Klemme, Direct Mount oder UDH).
    derailleur_type:
      name: Art des Schaltwerks
      description: Gibt an, ob es sich bei dem Produkt um ein Vorder- oder Hinterradschaltwerk
        handelt.
    deshedder_tool_type:
      name: Art des Fellpflegewerkzeugs
      description: Klassifiziert die Bauart des Entfilzungswerkzeugs, damit Käufer:innen
        ihre bevorzugte Pflegemethode auswählen können (z. B. Klinge, Block, Striegel
        oder Handschuh).
    diabolo_axle_system:
      name: Achssystem des Diabolos
      description: Gibt das Achssystem bzw. die Achskonfiguration des Diabolos an,
        das bzw. die Grinds, Stabilität und Schnurverschleiß beeinflusst.
    diagnostic_functions_supported:
      name: Unterstützte Diagnosefunktionen
      description: Gibt die Diagnose- bzw. Wartungsfunktionen an, die der Scanner
        ausführen kann.
    diagnostic_interface_type:
      name: Typ der Diagnoseschnittstelle
      description: Verbindung bzw. Schnittstelle zur Kommunikation mit dem Fahrzeug
        oder Gerät (z. B. OBD-II, Bluetooth, Wi‑Fi oder USB).
    diamond_color_grade:
      name: Diamant-Farbgrad
      description: Gibt die Farbklassifizierung von Diamanten an, von D (farblos)
        bis Z (leicht gefärbt), oder kennzeichnet farbige Diamanten.
    diaper_cover_style:
      name: Stil der Windelüberhose
      description: Definiert die Designsilhouette oder den dekorativen Stil der Windelüberhose,
        um stilbasiertes Durchsuchen und Filtern zu erleichtern.
    diastatic_power_unit:
      name: Einheit der diastatischen Kraft
      description: Gibt das Einheitensystem an, das zur Angabe des diastatischen Kraftwerts
        eines Produkts verwendet wird (z. B. °Lintner oder Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Stimmsystem für diatonische Mundharmonika
      description: Gibt das Notenlayout bzw. Stimmsystem der diatonischen Mundharmonika
        an.
    dice_sides:
      name: Anzahl der Würfelseiten
      description: Anzahl der Seiten (Flächen) pro Würfel für die im Produkt enthaltenen
        Würfel (z. B. d6 oder d20). Verwendet bei gemischten Sets den überwiegenden
        Wert oder listet ihn, sofern unterstützt, als mehrere Werte auf.
    didgeridoo_construction_type:
      name: Bauart des Didgeridoos
      description: Beschreibt, wie das Didgeridoo gebaut bzw. gefertigt ist (traditionelle
        oder moderne Bauweise).
    dietary_formulation_claim:
      name: Angabe zur Ernährungsformulierung
      description: Hebt wichtige Zusammensetzungsmerkmale oder Ausschlüsse hervor,
        die für die Pferdeernährung relevant sind (z. B. getreidefrei, stärkearm oder
        Bio).
    dinosaur_playset_scale_figure_size_class:
      name: Größenklasse/Maßstab des Dinosaurier-Spielsets
      description: Beschreibt den allgemeinen Maßstab der enthaltenen Dinosaurier/Figuren,
        um die Kompatibilität mit anderen Sets sicherzustellen.
    dinosaur_species_included:
      name: Enthaltene Dinosaurierarten
      description: Gibt an, welche Dinosaurierarten im Spielset dargestellt sind (Figuren
        oder geformte Dinosaurier).
    dipsy_diver_size_designation:
      name: Größenbezeichnung des Dipsy Divers
      description: Gibt den vom Hersteller festgelegten Größencode des Dipsy Divers
        an, der mit Gewicht und Tauchtiefe zusammenhängt.
    disc_brake_rotor_mount_type:
      name: Befestigungstyp der Bremsscheibe
      description: Gibt an, wie die Bremsscheibe an der Nabe befestigt wird (z. B.
        6-Loch oder Center Lock).
    disc_lock_accessories_included:
      name: Enthaltenes Zubehör für Bremsscheibenschlösser
      description: Gibt die zusätzlichen Artikel an, die mit dem Fahrradscheibenschloss
        geliefert werden, z. B. Erinnerungskabel, Tragetasche, Montagehalterung oder
        Batterien.
    disco_ball_mirror_tile_material:
      name: Material der Spiegelkacheln für Discokugeln
      description: Material der reflektierenden Spiegelflächen der Discokugel (falls
        zutreffend).
    disco_ball_mirror_tile_size:
      name: Größe der Spiegelflächen der Discokugel
      description: Ungefähre Größe der einzelnen Spiegelkacheln/-quadrate auf der
        Discokugel.
    display_backlight_color:
      name: Farbe der Display-Hintergrundbeleuchtung
      description: Farbe der Hintergrundbeleuchtung bzw. Beleuchtung der Anzeige/des
        Zifferblatts.
    disposable_compostable_claim:
      name: Angabe zu Einweg/Kompostierbarkeit
      description: Gibt an, ob das Produkt kompostierbar, biologisch abbaubar, recycelbar
        oder keines davon ist (falls zutreffend).
    distillation_method:
      name: Destillationsverfahren
      description: Gibt das Destillationsverfahren bzw. die Art der Brennanlage an,
        die zur Herstellung der Spirituose verwendet wird.
    distilled_water_intended_use:
      name: Verwendungszweck von destilliertem Wasser
      description: Definiert den primären Verwendungszweck des destillierten Wassers
        (z. B. Trinkwasser, CPAP-Gerät, Luftbefeuchter oder Dampfbügeleisen).
    distress_transmission_frequency:
      name: Frequenz für Notrufe
      description: Primäre Funkfrequenz(en), die für Notrufe verwendet werden.
    distressing_level:
      name: Grad des Used-Looks
      description: Gibt den Grad der absichtlich erzeugten Abnutzung, Risse oder Ausfransungen
        des Stoffes an.
    distressing_style:
      name: Art des Used-Looks
      description: Gibt die Art bzw. den Grad des Used-Looks bei Jeans an, z. B. Risse
        oder Whisker-Effekte.
    distributor_advance_mechanism:
      name: Verstellmechanismus des Verteilers
      description: Gibt die Art des Zündzeitpunktverstellmechanismus an, der vom Verteiler
        verwendet wird.
    distributor_cap_terminal_type:
      name: Anschlussart der Verteilerkappe
      description: Gibt die Bauart der Anschlüsse der Verteilerkappe an.
    distributor_gear_material:
      name: Material des Verteilerzahnrads
      description: Gibt das Material des Verteilerantriebszahnrads an.
    distributor_ignition_type:
      name: Art der Verteilerzündung
      description: Gibt an, ob der Verteiler für Kontaktzündung, elektronische Zündung
        oder HEI-Systeme ausgelegt ist.
    distributor_kit_contents:
      name: Inhalt des Verteiler-Kits
      description: Gibt an, welche Komponenten im Lieferumfang des Verteilers enthalten
        sind (z. B. Verteilerkappe, Verteilerfinger, Zündmodul, Dichtung/O-Ring, Antriebsrad
        oder Verkabelung/Stecker).
    dive_computer_form_factor:
      name: Bauform des Tauchcomputers
      description: Gibt die physische Bauart bzw. Montageart des Tauchcomputers an,
        z. B. Konsolenmontage oder Uhrenstil.
    diving_mask_design:
      name: Design der Tauchmaske
      description: Definiert die allgemeine Bauform der Tauchmaske, die Passform,
        Sichtfeld und Verwendungszweck beeinflusst.
    divot_tool_prong_configuration:
      name: Zinkenkonfiguration des Divot-Tools
      description: Gibt Anzahl und Anordnung der Zinken des Divot-Tools an, die zur
        Reparatur von Rasenschäden verwendet werden.
    divot_tool_style:
      name: Stil des Divot-Werkzeugs
      description: Definiert die allgemeine Bauart bzw. Verwendungsweise des Divot-Tools,
        z. B. feststehend, klappbar, Multifunktionswerkzeug oder Zubehör zum Befestigen
        an Hut oder Schläger.
    djembe_shell_construction:
      name: Konstruktion des Djembe-Korpus
      description: Beschreibt die Bauweise des Djembe-Korpus.
    djembe_tuning_system:
      name: Stimmsystem der Djembe
      description: Gibt an, wie die Djembe gespannt bzw. gestimmt wird.
    dmx_output_connector_type:
      name: Typ des DMX-Ausgangsanschlusses
      description: Physisches Anschlussformat, das für die DMX-Ausgangsports des Controllers
        verwendet wird.
    doctor_playset_items_included:
      name: Enthaltene Arzt-Spielset-Artikel
      description: Gibt die Spielzeug-Arztinstrumente und Rollenspielaccessoires an,
        die im Arzt-Spielset enthalten sind (z. B. Stethoskop, Spritze oder Reflexhammer).
    doctor_playset_role_play_setting:
      name: Rollenspielthema des Doktorspielsets
      description: Kennzeichnet den primären Rollenspielkontext, den das Arzt-Spielset
        darstellt.
    doctor_playset_wearable_items_included:
      name: Enthaltene tragbare Arzt-Spielset-Artikel
      description: Gibt an, welche tragbaren Kostümteile im Spielset enthalten sind.
    doll_accessory_type:
      name: Art des Puppenzubehörs
      description: Definiert, um welche Art von Puppen- oder Actionfigurenzubehör
        es sich bei dem Produkt handelt (z. B. Kleidung, Schuhe, Möbel oder Displayständer),
        damit Käufer:innen innerhalb dieser Zubehörkategorie stöbern und filtern können.
    doll_eye_type:
      name: Art der Puppenaugen
      description: Gibt die Bauart der Puppenaugen an (z. B. eingelassenes Acryl,
        bemalt oder LED-beleuchtet).
    doll_hair_fiber_type:
      name: Faserart des Puppenhaars
      description: Art der Haare/Fasern, die bei der Puppe verwendet werden (oder
        ob keine vorhanden sind), was Realismus, Styling und Pflege beeinflusst.
    doll_making_kit_components_included:
      name: Enthaltene Komponenten des Puppenherstellungspakets
      description: Listet die wichtigsten Materialien und Werkzeuge auf, die im Puppenherstellungsset
        enthalten sind, damit Käufer:innen Sets vergleichen und erkennen können, was
        sie selbst noch benötigen.
    dollhouse_installation_placement_type:
      name: Installations-/Platzierungsart des Puppenhauses
      description: Gibt an, wie das Puppenhaus verwendet bzw. platziert werden soll
        (z. B. auf dem Tisch, freistehend oder an der Wand montiert).
    dollhouse_items_included:
      name: Enthaltene Bestandteile des Puppenhauses
      description: Gibt an, was zusammen mit dem Puppenhaus im Lieferumfang enthalten
        ist (Möbel, Puppen oder Zubehör).
    dollhouse_lighting_type:
      name: Beleuchtungsart des Puppenhauses
      description: Art der Beleuchtung, die im Puppenhaus enthalten ist oder unterstützt
        wird.
    dollhouse_room_type:
      name: Art des Puppenhauszimmers
      description: Gibt den vorgesehenen Raum bzw. Bereich innerhalb eines Puppenhauses
        an, in dem das Zubehör üblicherweise verwendet wird.
    dollhouse_scale:
      name: Maßstab des Puppenhauses
      description: Maßstabsverhältnis eines Puppenhauses oder Puppenhauszubehörs (z. B.
        1:12), um die Kompatibilität zwischen Häusern, Möbeln und Figuren zu gewährleisten.
    dollhouse_style_theme:
      name: Stil/Thema des Puppenhauses
      description: Gesamtstil bzw. Thema des Puppenhauses zum Stöbern und Verschenken
        (z. B. modern oder viktorianisch).
    donnos_playing_technique:
      name: Spieltechnik des Donnos
      description: Gibt an, wie der Donnos gespielt bzw. ausgelöst wird (nur mit der
        Hand oder mit Schlägel/Schläger), damit Käufererwartungen und enthaltenes
        Zubehör übereinstimmen.
    donnos_tuning_system:
      name: Donnos-Stimmsystem
      description: Primäre Methode zum Stimmen oder Ändern der Tonhöhe (z. B. Spannseile
        oder Quetschmechanismus).
    door_assembly_type:
      name: Tür-Baugruppentyp
      description: 'Gibt an, was enthalten ist: nur Türrohling, Türhaut oder eine
        komplette Türbaugruppe.'
    door_closure_mechanism:
      name: Türschließmechanismus
      description: Definiert den Mechanismus, der das Schließen der Tür steuert (z. B.
        Soft-Close oder Magnetverschluss).
    door_handle_components_included:
      name: Enthaltene Türgriffkomponenten
      description: Gibt an, welche wichtigen Teile im Lieferumfang des Türgriffs enthalten
        sind (z. B. Schließzylinder, Dichtung, Zierabdeckung, Befestigungsmaterial,
        Kabelbaum oder Riegel/Betätiger).
    door_handle_operation:
      name: Funktionsweise des Türgriffs
      description: Gibt die primäre Betätigungs- bzw. Funktionsweise der Türgriffbaugruppe
        des Fahrzeugs an (z. B. mechanische Verbindung, Schließzylinder, schlüssellose
        Berührung/Taste oder elektrisches Ausfahren).
    door_lock_knob_attachment_method:
      name: Befestigungsart des Türverriegelungsknopfs
      description: Gibt an, wie der Türverriegelungsknopf an der Verriegelungsstange
        befestigt wird (z. B. geschraubt oder aufgesteckt).
    door_lock_position:
      name: Position der Türverriegelung
      description: Gibt an, für welche Tür bzw. Öffnungsposition das Türschloss oder
        Türschlossteil an einem Fahrzeug vorgesehen ist.
    door_seal_feature_set:
      name: Funktionsmerkmale der Türdichtung
      description: Funktionale Merkmale der Türdichtung.
    door_seal_material_type:
      name: Materialart der Türdichtung
      description: Primäre Elastomer- bzw. Materialfamilie, die für die Türdichtung
        verwendet wird (über allgemeine Materialien hinaus).
    door_seal_product_form:
      name: Produktform der Türdichtung
      description: Gibt die Verkaufs- bzw. Verpackungsform der Türdichtung an.
    door_window_operation:
      name: Türfensterbedienung
      description: Gibt an, ob das Fenstersystem der Tür für manuelle oder elektrische
        Bedienung vorgesehen ist oder ob die Tür kein Fenster besitzt.
    double_decker_bus_deck_configuration:
      name: Deckkonfiguration des Doppeldeckerbusses
      description: Gibt die Konfiguration von Deckzugang bzw. Dach eines Doppeldeckerbusses
        an.
    double_drum_pedal_linkage_medium:
      name: Verbindungsmechanismus des Doppelfußmaschinenpedals
      description: Gibt das Verbindungselement an, das das Sekundärpedal mit dem Primärpedal
        verbindet (z. B. Antriebswelle, Kette oder Riemen).
    double_end_bag_core_type:
      name: Kernart des Double-End-Balls
      description: Kennzeichnet die Konstruktion des inneren Schlagkerns, die Rückprallgeschwindigkeit,
        Schlaggefühl und Wartungsaufwand bestimmt.
    double_pointed_needle_point_style:
      name: Spitzenform der Doppelspitzstricknadel
      description: Beschreibt die Spitzenschärfe bzw. -form für verschiedene Garne
        und Strickarten.
    dough_extruder_accessories_included:
      name: Enthaltenes Zubehör für Teigextruder
      description: Zusätzliche Komponenten, die mit dem Teigextruder geliefert werden.
    dough_extruder_operation_type:
      name: Betriebsart des Teigextruders
      description: Beschreibt, wie der Teig durch den Extruder gepresst wird, um Formen
        zu erzeugen.
    dough_extruder_shape_disc_included:
      name: Enthaltene Formscheiben für den Teigextruder
      description: Formen, die der Extruder mithilfe der enthaltenen Scheiben/Düsen
        herstellen kann.
    dough_format:
      name: Teigformat
      description: Kennzeichnet die physische Form bzw. Darreichungsform des Teigs
        in der Verpackung (z. B. Kugel, Platte, Scheibe oder zerkleinerte Stränge).
    doumbek_accessories_included:
      name: Inbegriffenes Doumbek-Zubehör
      description: Zubehör, das mit der Doumbek geliefert wird (z. B. Stimmschlüssel
        oder Tasche).
    doumbek_head_material:
      name: Material des Doumbek-Kopfes
      description: Material des Trommelfells (der Membran) der Doumbek.
    doumbek_head_type:
      name: Art des Doumbek-Fells
      description: Konstruktion bzw. Art des Doumbek-Fells (wie die Membran gefertigt
        oder befestigt ist).
    doumbek_playing_style_technique:
      name: Spielstil/-technik der Doumbek
      description: Beabsichtigter Spielkontext bzw. Spielstil, der üblicherweise mit
        der Doumbek verbunden ist.
    doumbek_tuning_system:
      name: Doumbek-Stimmsystem
      description: Gibt an, wie die Doumbek gespannt bzw. gestimmt wird oder ob sie
        nicht stimmbar ist.
    dowel_end_style:
      name: Form der Dübelenden
      description: Beschreibt Schnitt bzw. Form der Dübelenden, was Einführbarkeit,
        Sicherheit und den vorgesehenen Bastel- bzw. Verwendungszweck beeinflusst.
    dowel_surface_texture:
      name: Dübeloberflächentextur
      description: Beschreibt die Oberflächenbeschaffenheit des Dübels, z. B. glatt
        oder geriffelt, was Optik und Klebehaftung beeinflusst.
    drafting_compass_adjustment_mechanism:
      name: Einstellmechanismus des Zeichenzirkels
      description: Primärer Feineinstellmechanismus zur präzisen Einstellung des Radius.
    drafting_compass_fine_adjustment_mechanism:
      name: Mechanismus für Feinjustierung des Zeichenzirkels
      description: Art der Feinjustierung zur präzisen Einstellung des Radius (falls
        vorhanden).
    drafting_compass_lead_holder_type:
      name: Art des Minenhalters des Zeichenzirkels
      description: Art des Zeicheneinsatzes bzw. Halters, der im Zirkel enthalten
        ist oder unterstützt wird.
    drag_system_material:
      name: Material des Bremssystems
      description: Kennzeichnet das im Bremssystem verwendete Material bzw. die Technologie,
        die Hitzebeständigkeit und Laufruhe beeinflusst.
    drag_system_type:
      name: Art des Bremssystems
      description: Kennzeichnet die Art des Bremssystems der Rolle, z. B. Frontbremse,
        Heckbremse, Hebelbremse, Sternbremse, Magnetbremse oder Scheibenbremse.
    drag_type:
      name: Art des Bremssystems
      description: Gibt die Bauart des Bremssystems an, das von der Rolle verwendet
        wird (Position oder Betätigungsmethode).
    drawer_features:
      name: Schubladenmerkmale
      description: Beschreibt besondere Konstruktionselemente oder Funktionen der
        Schublade (z. B. Soft-Close oder Filzauskleidung).
    drawer_slide_type:
      name: Art der Schubladenschiene
      description: Gibt die Montage- und Auszugsart der Schubladenschienen an (z.
        B. Unterbau oder Vollauszug).
    drawing_ink_compatible_tools:
      name: Mit Zeichentinte kompatible Werkzeuge
      description: Gibt an, für welche Werkzeuge die Tinte vorgesehen ist (z. B. Federhalter
        oder Pinsel).
    drawing_ink_permanence:
      name: Beständigkeit der Zeichentinte
      description: Kennzeichnet Beständigkeitseigenschaften, die für fertige Kunstwerke
        und Reproduktionen wichtig sind.
    dress_embellishment:
      name: Kleiderverzierungen
      description: Hebt auffällige dekorative Elemente hervor, die in das Kleiderdesign
        integriert sind.
    dress_train_type:
      name: Art der Kleiderschleppe
      description: Gibt an, ob eine Schleppe vorhanden ist und welche Länge bzw. welchen
        Stil sie hat, was Rückschlüsse auf Formalitätsgrad und Anlass zulässt.
    dried_surface_finish:
      name: Oberflächenbeschaffenheit nach Trocknung
      description: Beschreibt das typische Oberflächenbild nach dem Trocknen (Glanz
        bzw. Struktur).
    drink_tube_insulation:
      name: Isolierung des Trinkschlauchs
      description: Gibt an, ob der Trinkschlauch eine Isolierung oder Thermohülle
        besitzt, um Flüssigkeiten vor Erwärmung oder Einfrieren zu schützen.
    drive_band_cross_section_shape:
      name: Querschnittsform des Antriebsbands
      description: Profilform des Antriebsbands (rund, flach usw.).
    drive_band_join_type:
      name: Verbindungstyp des Antriebsbands
      description: Gibt an, wie das Antriebsband verbunden bzw. konstruiert ist (endlos
        oder zum Verknoten usw.).
    drive_band_material_type:
      name: Art des Antriebsbandmaterials
      description: Gibt das Material bzw. die Art des Antriebsbands an, das bei Spinnrädern
        verwendet wird.
    drive_location:
      name: Position des Antriebs
      description: Gibt an, wo sich Schwungrad bzw. Antriebsmechanismus auf dem Ellipsentrainer
        befinden, was Stellfläche und Bewegungsgefühl beeinflusst.
    drive_mechanism:
      name: Antriebsmechanismus
      description: Kennzeichnet die Art des Antriebssystems, das die Kraft von den
        Pedalen auf das Schwungrad überträgt.
    drive_shaft_material:
      name: Material der Antriebswelle
      description: Gibt das primäre Konstruktionsmaterial des Antriebswellenrohrs
        bzw. der kompletten Baugruppe an.
    drive_system:
      name: Antriebssystem
      description: Gibt den Mechanismus an, der die Pedalkraft auf das Widerstandssystem
        überträgt.
    drivetrain_configuration:
      name: Antriebskonfiguration
      description: Gibt die Antriebskonfiguration des Fahrrads an und kennzeichnet,
        ob die Hinterradnabe starr, Single-Speed-Freilauf oder Flip-Flop ist.
    drivetrain_speed_compatibility:
      name: Geschwindigkeitskompatibilität des Antriebsstrangs
      description: Listet die Kassettengeschwindigkeiten auf, für die das Kettenblatt
        ausgelegt ist, um korrekte Zahnprofile und Abstände sicherzustellen.
    drone_positioning_system:
      name: Drohnenpositionierungssystem
      description: Integrierte Positionierungs- bzw. Stabilisierungstechnologie der
        Drohne für Navigation und stabiles Schweben.
    drone_transmission_type:
      name: Drohnenübertragungstyp
      description: Primäre Methode zur Steuerung bzw. Videoverbindung zwischen Drohne
        und Controller/Gerät.
    drop_spindle_whorl_position:
      name: Position des Fallspindelwirtels
      description: Position des Wirtels auf der Welle.
    drum_carder_accessories_included:
      name: Enthaltenes Trommelkardenzubehör
      description: Üblicherweise enthaltene Bestandteile eines Trommelkardier-Sets.
    drum_clamp_locking_mechanism:
      name: Verriegelungsmechanismus der Trommelklemme
      description: Gibt an, wie die Klemme an Rohr bzw. Spannreifen befestigt oder
        festgezogen wird (z. B. Flügelschraube, Trommelschraube oder Schnellverschluss).
    drum_clamp_mount_interface:
      name: Montageschnittstelle der Trommelklemme
      description: Gibt an, welche Befestigungsmöglichkeiten die Klemme für Zubehör
        bietet (z. B. L-Stangenaufnahme, Kugelgelenk oder Beckenneiger).
    drum_clamp_type:
      name: Art der Trommelklemme
      description: Gibt die funktionale Art der Klemme an, die bei Drumkit-Montagehardware
        verwendet wird (z. B. Spannreifenklemme oder Rack-/Rohrklemme).
    drum_head_application_batter_resonant:
      name: Einsatzbereich des Trommelfells (Schlagfell/Resonanzfell)
      description: Gibt an, für welche Seite bzw. Funktion das Fell an der Trommel
        vorgesehen ist (obere Spielfläche oder untere Resonanz-/Snare-Seite).
    drum_head_collar_type:
      name: Art des Trommelfellprofils
      description: Gibt an, ob das Fell ein Standard-, Low- oder Spezialprofil besitzt,
        passend für bestimmte Gratungen bzw. Kessel.
    drum_head_damping_control:
      name: Dämpfungsregelung des Trommelfells
      description: In das Felldesign integrierte Obertonkontroll- bzw. Dämpfungsfunktionen.
    drum_head_film_material:
      name: Material der Trommelfellfolie
      description: Primärmaterial der Fellfolie (üblicherweise PET/Mylar, kann aber
        auch Spezialmaterialien umfassen).
    drum_head_hoop_collar_type:
      name: Typ des Trommelfell-Spannreifens-/Fellkragens
      description: Kennzeichnet die Konstruktion von Spannreifen und Kragen des Trommelfells
        (z. B. Kragenprofil und Spannreifenmaterial), die sich auf Passform und Stimmstabilität
        bei bestimmten Kesseln und Spannreifen auswirken kann.
    drum_head_hoop_rim_material:
      name: Material des Spannreifens des Trommelfells
      description: Material des Spannreifens (des eingebetteten Reifens im Fell),
        das Haltbarkeit und Stimmstabilität beeinflussen kann.
    drum_head_included:
      name: Enthaltenes Trommelfell
      description: Gibt an, ob Schlag- und/oder Resonanzfelle mit der Trommel geliefert
        werden.
    drum_head_muffling_feature:
      name: Dämpfungseigenschaft des Trommelfells
      description: In das Trommelfell integrierte Obertonkontrollfunktionen.
    drum_head_muffling_type:
      name: Dämpfungstyp des Trommelfells
      description: Gibt an, ob das Trommelfell integrierte Obertonkontroll- bzw. Dämpfungselemente
        enthält.
    drum_head_ply_count:
      name: Anzahl der Trommelfelllagen
      description: Anzahl der Folienlagen bzw. -schichten, die beim Aufbau des Trommelfells
        verwendet werden (z. B. 1-lagig oder 2-lagig).
    drum_head_position:
      name: Position des Trommelfells
      description: Gibt an, ob das Trommelfell als Schlagfell (oben), Resonanzfell
        (unten), Snare-Resonanzfell oder für beide Anwendungen vorgesehen ist.
    drum_head_reinforcement_type:
      name: Art der Trommelfellverstärkung
      description: Gibt an, ob das Snarefell Verstärkungsmerkmale wie einen Mittelpunkt
        oder Kontrollring besitzt, um Haltbarkeit zu erhöhen und den Klang zu fokussieren.
    drum_head_surface_finish:
      name: Oberflächenbeschaffenheit des Trommelfells
      description: Oberflächenstruktur bzw. Finish des Fells, die Anschlag und Besenansprache
        beeinflussen.
    drum_head_type:
      name: Typ des Trommelfells
      description: Gibt die Konstruktion bzw. Art des auf der Trommel verwendeten
        Fells an (hauptsächlich für mitgelieferte Schlag- bzw. Resonanzfelle).
    drum_key_design_type:
      name: Typ des Stimmschlüsseldesigns
      description: Beschreibt die funktionale Bauart des Stimmschlüssels (z. B. Standard,
        Ratsche oder T-Griff).
    drum_key_drive_type:
      name: Antriebsart des Stimmschlüssels
      description: Gibt die Antriebs- bzw. Anschlussart des Stimmschlüssels an, der
        zum Betätigen der Spannstange oder der Montagehardware verwendet wird.
    drum_key_handle_style:
      name: Griffart des Stimmschlüssels
      description: Beschreibt die Griff- bzw. Ergonomieform des Stimmschlüssels, die
        Komfort und Hebelwirkung beim Stimmen beeinflusst.
    drum_kit_included_items:
      name: Im Drum-Kit enthaltene Artikel
      description: Listet auf, welche Hauptbestandteile zusätzlich zu Kesseln/Pads
        im Drumkit enthalten sind (z. B. Hardware, Becken oder Hocker).
    drum_kit_portability:
      name: Tragbarkeit des Drum-Kits
      description: Gibt an, ob das Set für eine platzsparende Aufbewahrung bzw. einen
        kompakten Transport ausgelegt ist (z. B. Reise-, Kompakt- oder Klappdesign).
    drum_kit_shell_construction_features:
      name: Konstruktionsmerkmale der Drumkessel
      description: Beschreibt die Konstruktion der Kessel (Anzahl/Art der Lagen),
        die Klang und Haltbarkeit beeinflusst.
    drum_mount_clamp_type:
      name: Typ der Befestigungsklemme für Trommeln
      description: Beschreibt die Bauform der Klemme, die in der Trommelhalterung
        verwendet wird.
    drum_multi_clamp_clamp_type:
      name: Typ der Mehrfachklemme für Trommeln
      description: Beschreibt die funktionale Bauart bzw. Konfiguration der Mehrfachklemme
        (wie sie befestigt wird und was sie verbindet).
    drum_mute_material:
      name: Material des Trommeldämpfers
      description: Gibt das Hauptmaterial des Trommeldämpfers an, das mit dem Trommelfell
        in Kontakt kommt und/oder Vibrationen dämpft.
    drum_pad_triggering_zones:
      name: Triggerzonen des Drumpads
      description: Gibt Anzahl bzw. Art der vom Tom-Pad unterstützten Triggerzonen
        an (z. B. nur Fell oder Fell + Rand), was sich auf Ausdrucksstärke und Modulkompatibilität
        auswirkt.
    drum_pedal_accessories_included:
      name: Inbegriffenes Drum-Pedal-Zubehör
      description: Listet wichtige Zubehörteile und Komponenten auf, die im Lieferumfang
        des Drum-Pedals enthalten sind.
    drum_pedal_baseplate_type:
      name: Typ der Drum-Pedal-Grundplatte
      description: Gibt an, ob das Pedal eine Grundplatte oder eine freischwebende/rahmenlose
        Konstruktion verwendet.
    drum_pedal_bearing_type:
      name: Lagertyp des Drum-Pedals
      description: Gibt den Lagermechanismus an, der an den primären Drehpunkten verwendet
        wird (z. B. Wippe, Ferse oder Nocke).
    drum_pedal_cam_type:
      name: Typ der Fußmaschinenkette
      description: Gibt die Form bzw. Geometrie der Nocke des Drum-Pedals an, die
        Spielgefühl und Ansprache beeinflusst (z. B. linear oder beschleunigend).
    drum_pedal_chain_configuration:
      name: Konfiguration der Drum-Pedalkette
      description: Gibt die Kettenanordnung eines kettengetriebenen Drum-Pedals an
        (z. B. Einfachkette, Doppelkette oder versetzte Kette).
    drum_pedal_chain_type:
      name: Typ der Fußmaschinenkette
      description: Gibt die im Antrieb verwendete Kettenart an (z. B. Rollenkette
        oder Fahrradkette), die Laufruhe und Haltbarkeit beeinflussen kann.
    drum_pedal_clamp_type:
      name: Art der Drum-Pedal-Klemme
      description: Gibt an, wie das Pedal am Bassdrum-Spannreifen befestigt wird.
    drum_pedal_intended_use:
      name: Verwendungszweck des Drum-Pedals
      description: Kennzeichnet den hauptsächlichen Einsatzbereich, für den das riemengetriebene
        Pedal entwickelt bzw. vermarktet wird.
    drum_pedal_spring_adjustment_method:
      name: Einstellmethode der Drum-Pedal-Feder
      description: Gibt an, wie die Federspannung am Pedal eingestellt wird.
    drum_pedal_spring_type:
      name: Typ der Fußmaschinenfeder
      description: Gibt den Federmechanismus an, der für die Rückstellbewegung des
        Pedals verwendet wird.
    drum_shell_material:
      name: Material des Trommelkessels
      description: Gibt das primäre Kesselmaterial für akustische Trommeln an (z. B.
        Ahorn, Birke oder Acryl).
    drum_shell_wood_species:
      name: Holzart des Drumkessels
      description: Gibt die Holzart an, die für den Drumkessel verwendet wird und
        Klang sowie Resonanz beeinflusst.
    drumhead_type:
      name: Trommelfelltyp
      description: Fellkonfiguration/-art, die beim Octoban verwendet wird.
    drumstick_model:
      name: Drumstick-Modell
      description: Standardisierte Modell-/Größenbezeichnung für Drumsticks, die von
        vielen Marken verwendet wird (z. B. 5A oder 7A).
    drumstick_taper:
      name: Verjüngung des Drumsticks
      description: Beschreibt das sich verjüngende Profil vom Schaft bis zur Spitze,
        was Rückprall und Balance beeinflusst.
    drysuit_footwear_style:
      name: Schuhstil des Trockentauchanzugs
      description: Beschreibt den integrierten Abschluss im Unterschenkelbereich des
        Trockentauchanzugs (z. B. integrierte Stiefel, Neoprensocken, Strumpffuß oder
        offene Knöchelmanschetten).
    dumbbell_style:
      name: Hantelstil
      description: Kennzeichnet die grundlegende Bauart der Hantel – ob feste Einheit,
        verstellbares System oder beladbarer Griff – was Kaufentscheidungen und Trainingsanwendungen
        maßgeblich beeinflusst.
    dundun_playing_position:
      name: Spielposition der Dundun
      description: Vorgesehene Spiel- bzw. Trageposition der Trommel.
    dye_status:
      name: Färbestatus
      description: Gibt an, ob die Watte gefärbt, ungefärbt/naturbelassen oder mehrfarbig/gemischt
        ist.
    dye_style:
      name: Färbestil
      description: Gibt an, ob die Garnfarbe einfarbig, mehrfarbig oder auf andere
        Weise speziell gefärbt ist.
    dye_technique:
      name: Färbetechnik
      description: Methode zur Färbung der Faser (z. B. handgefärbt, kesselgefärbt
        oder Space-Dyeing).
    dye_type_needlecraft_fabric:
      name: Färbeart (Handarbeitsstoff)
      description: Gibt an, ob das Leinen einfarbig, handgefärbt oder speziell gefärbt
        ist.
    dyeing_color_processing:
      name: Färbung/Farbverarbeitung
      description: Beschreibt, ob und wie die Faser gefärbt wurde (z. B. ungefärbt,
        gebleicht/weiß oder mit speziellen Färbetechniken).
    e_bike_certification_class:
      name: Zertifizierungsklasse des E-Bikes
      description: Gibt die offizielle Geschwindigkeitsklasse des Reifens für Elektrofahrräder
        an (z. B. E-25 oder E-50).
    e_bike_speed_rating:
      name: Geschwindigkeitsklasse des E-Bikes
      description: Gibt die offizielle E-Bike-Zertifizierungsstufe des Reifens an
        (z. B. E25 für ≤25 km/h oder E50 für ≤50 km/h).
    e_scooter_connector_type:
      name: Typ des E-Scooter-Anschlusses
      description: Kennzeichnet die Art des elektrischen Steckverbinders bzw. Steckers,
        der von der Komponente für Strom- oder Signalverbindungen verwendet wird.
    e_scooter_throttle_type:
      name: Art des E-Scooter-Gasgriffs
      description: Gibt die Art des Gasgriffs an, mit dem die Beschleunigung des E-Scooters
        gesteuert wird.
    ear_coverage:
      name: Ohrenabdeckung
      description: Gibt an, ob der Helm über einen Ohrenschutz verfügt und ob dieser
        abnehmbar ist.
    ear_coverage_style:
      name: Ohrabdeckungsstil
      description: Beschreibt, wie bzw. ob die Ohren durch die Fliegenmaske bedeckt
        werden.
    ear_coverage_type:
      name: Art der Ohrenabdeckung
      description: Gibt an, wie der Hut die Ohren bedeckt oder schützt, einschließlich
        Vorhandensein und Art der Ohrenklappen.
    ear_guard_type:
      name: Art des Ohrenschutzes
      description: Beschreibt die Art des in die Kappe integrierten Ohrenschutzes,
        z. B. aus hartem Kunststoff, gepolstert oder abnehmbar.
    earmuff_style:
      name: Stil der Ohrenschützer
      description: Gibt an, wie der Gehörschutz getragen wird bzw. welche Bauart er
        besitzt (z. B. über dem Kopf oder hinter dem Kopf verlaufend).
    earring_closure_type:
      name: Ohrring-Verschlusstyp
      description: Gibt den Mechanismus an, mit dem der Ohrring am Ohr befestigt wird
        (z. B. Steckverschluss, Klappverschluss oder Clipverschluss).
    easel_art_desk_features:
      name: Merkmale von Staffelei und Zeichentisch
      description: Hebt gängige funktionale Merkmale hervor, die bei der Staffelei
        oder dem Zeichentisch enthalten sind.
    easel_art_desk_surface_type:
      name: Oberflächenart von Staffelei und Zeichentisch
      description: Kennzeichnet die nutzbaren Zeichen- bzw. Schreibflächen (z. B.
        Kreidetafel, Whiteboard, Papierrolle oder Magnettafel).
    eb_clarinet_body_type:
      name: Art des Eb-Klarinettenkorpus
      description: Gibt an, ob es sich bei der Es-Klarinette um eine Sopran- oder
        Altvariante handelt.
    eco_material_type:
      name: Art des Öko-Materials
      description: Hebt die umweltfreundliche Schaumstoff- bzw. Materialtechnologie
        hervor, die in der Polsterung verwendet wird.
    edge_construction:
      name: Kantenkonstruktion
      description: Gibt an, ob der Ski auf keiner, einem Teil oder der gesamten Länge
        über Metallkanten verfügt.
    edge_tuner_type:
      name: Typ des Kantenschärfers
      description: Klassifiziert die Art des Ski- oder Snowboardkantenschärfers, z. B.
        Feilenführung oder elektrische Maschine.
    edible_plant_part:
      name: Essbarer Pflanzenteil
      description: Gibt an, welcher Teil der Pflanze zum Verzehr verkauft wird.
    educational_guide_included:
      name: Enthaltener Lernleitfaden
      description: Gibt an, welche Lernmaterialien im Modell enthalten sind.
    educational_topic:
      name: Lernthema
      description: Primäres Lernthema, das durch die Lerninhalte der Ameisenfarm unterstützt
        wird.
    egg_component:
      name: Ei-Komponente
      description: Gibt an, welchen Teil des Eis das Produkt enthält, z. B. Vollei,
        nur Eiweiß, Eigelb oder Mischungen/Ersatzstoffe.
    egg_component_replaced:
      name: Ersetzte Eierkomponente
      description: Gibt an, welchen Teil des Eis das Produkt ersetzen soll (z. B.
        Vollei oder Eiweiß).
    egg_enrichment:
      name: Eieranreicherung
      description: Gibt an, ob den Eiern zusätzliche Nährstoffe zugesetzt wurden,
        z. B. Omega-3-Fettsäuren oder Vitamin D.
    egg_farming_method:
      name: Haltungsmethode für Eier
      description: Gibt die Produktions- bzw. Haltungsform der Eier an (z. B. käfigfrei,
        Freilandhaltung oder Bio).
    egg_grade:
      name: Eierqualitätsstufe
      description: Kennzeichnet die Qualitätsstufe, die von Aufsichts- oder Branchenorganisationen
        vergeben wird.
    egg_processing_state:
      name: Verarbeitungszustand der Eier
      description: Gibt an, welche Verarbeitung die Eier vor dem Verkauf durchlaufen
        haben (z. B. frisch, gesalzen oder Tausendjährige Eier).
    egg_production_method:
      name: Produktionsmethode der Eier
      description: Gibt das Haltungs- bzw. Aufzuchtsystem an, das zur Eierproduktion
        verwendet wird (z. B. Freilandhaltung, Weidehaltung oder Bio).
    egg_replacer_main_ingredient:
      name: Hauptbestandteil des Eiersatzes
      description: Kennzeichnet die primäre Basiszutat, aus der der Eiersatz hergestellt
        wird, und unterstützt Benutzer:innen mit besonderen Ernährungsbedürfnissen
        oder gewünschten Backeigenschaften.
    egg_size:
      name: Eiergröße
      description: Klassifiziert Eier nach standardisierten Marktgrößen.
    egg_source_animal:
      name: Tierische Quelle der Eier
      description: Kennzeichnet die Tierart, die die Eier produziert hat.
    egg_white_processing_method:
      name: Verarbeitungsmethode von Eiweiß
      description: Gibt an, wie das Eiweiß nach der Gewinnung verarbeitet wurde (z.
        B. pasteurisiert oder sprühgetrocknet), was sich auf Lebensmittelsicherheit,
        Haltbarkeit und Einsatzbereiche auswirkt.
    eggplant_variety:
      name: Auberginensorte
      description: Gibt die Sorte bzw. Marktvarietät der Aubergine an, damit Käufer:innen
        zwischen Varianten wählen können, die sich in Größe, Geschmack, Farbe und
        kulinarischer Verwendung unterscheiden.
    eggshell_color:
      name: Eierschalenfarbe
      description: Gibt die vorherrschende Schalenfarbe der Eier an.
    elastic_edge_finish_type:
      name: Elastischer Kantenabschluss/-typ
      description: Gibt die Kantenkonstruktion des gewebten Elastikmaterials an, die
        sich auf Tragekomfort und Anwendung auswirkt.
    elastic_intended_use:
      name: Verwendungszweck des Gummibands
      description: Primärer Einsatzbereich, für den das Elastikmaterial entwickelt
        wurde (unterstützt die Produkterkennung und reduziert Fehlkäufe).
    elastic_recovery_performance:
      name: Rückstellkraft des Gummibands
      description: Beschreibt, wie gut das gewebte Gummiband nach dem Dehnen in seine
        ursprüngliche Länge zurückkehrt.
    elastic_recovery_quality:
      name: Rückstelleigenschaft des Gummibands
      description: Gibt die Rückstellfähigkeit des Gummibands an – also wie gut es
        nach dem Dehnen in seine ursprüngliche Länge zurückkehrt.
    elastic_stretch_level:
      name: Dehnbarkeit des Gummibands
      description: Gibt an, wie stark sich das Gummiband unter Spannung dehnen kann
        (oft als relativer Wert angegeben, wenn kein exakter Prozentsatz vorliegt).
    elastic_structure:
      name: Struktur des Gummibands
      description: Gibt die strukturelle Ausführung des Knopflochgummis an (z. B.
        gestrickt, gewebt oder geflochten), was Dehnbarkeit, Rückstellkraft und Näheigenschaften
        beeinflussen kann.
    elastic_type:
      name: Art des Gummibands
      description: Gibt die Konstruktionsart des Gummibands an (z. B. Falzgummi (FOE),
        geflochten, gestrickt oder gewebt).
    electric_assist_type:
      name: Typ der elektrischen Unterstützung
      description: Gibt an, ob das Fahrrad über Motorunterstützung verfügt und welche
        Art von Unterstützung angeboten wird.
    electric_bicycle_motor_position:
      name: Position des Elektrofahrradmotors
      description: Position des Antriebsmotors am Elektrofahrrad, z. B. Mittelmotor,
        Vorderradnabe, Hinterradnabe oder Doppelnabe.
    electric_bike_class:
      name: Klasse des Elektrofahrrads
      description: Klassifiziert das E-Bike nach gesetzlichen Klassen, die Geschwindigkeitsbegrenzungen
        und Gasgriffunterstützung festlegen.
    electric_guitar_bridge_type:
      name: Stegtyp der E-Gitarre
      description: Gibt die Art des Steg- bzw. Vibratosystems der E-Gitarre an.
    electric_instrument_output_connection_type:
      name: Typ des Audioausgangsanschlusses des elektrischen Instruments
      description: Gibt die physischen Audioausgänge an, die beim elektrischen Cello
        vorhanden sind.
    electric_riding_vehicle_control_options:
      name: Steuerungsoptionen des elektrischen Fahrzeugs
      description: Steuerungs-/Bedienungsoptionen, die Fahrer:in bzw. Elternteil zur
        Verfügung stehen (z. B. Pedale, Lenkrad oder Fernsteuerung).
    electric_spinning_wheel_speed_control_type:
      name: Typ der Drehzahlregelung des elektrischen Spinnrads
      description: Beschreibt, wie die Benutzer:innen die Drehgeschwindigkeit des
        elektrischen Rads einstellen.
    electric_ukulele_output_jack_type:
      name: Typ der Ausgangsbuchse der elektrischen Ukulele
      description: Gibt den physischen Ausgangsanschluss an, der bei der elektrischen
        Ukulele verwendet wird.
    electric_van_body_length_class:
      name: Elektrotransporter-Längenklasse
      description: Gängige Transportergrößenklasse basierend auf Radstand bzw. Länge,
        die in Produktangeboten verwendet wird.
    electric_van_roof_height_class:
      name: Dachhöhenklasse des Elektrotransporters
      description: Gängige Dachhöhenklassifizierung für Transporter (insbesondere
        Kastenwagen).
    electric_vehicle_drivetrain_layout:
      name: Antriebslayout des Elektrofahrzeugs
      description: Motor-/Achskonfiguration, die beschreibt, wie viele Motoren vorhanden
        sind und wo sie sich befinden (über einfache AWD-/FWD-/RWD-Angaben hinaus).
    electric_winder_accessories_included:
      name: Enthaltenes Zubehör für die elektrische Wickelmaschine
      description: Listet das Zubehör auf, das mit der elektrischen Wickelmaschine
        geliefert wird (z. B. Klemmen oder Adapter).
    electrical_connector_type:
      name: Typ des elektrischen Steckverbinders
      description: Gibt die Anschlussart an, die vom Türschloss bzw. Verriegelungssystem
        für die elektrische Integration verwendet wird (falls zutreffend).
    electrical_system_voltage:
      name: Spannung des elektrischen Systems
      description: Gibt die nominale Spannung des elektrischen Fahrzeugsystems an,
        für die der Regler ausgelegt ist.
    electronic_cymbal_trigger_zones:
      name: Triggerzonen des elektronischen Beckens
      description: Gibt an, wie viele unabhängige Triggerzonen das Beckenpad bietet
        (z. B. Bow/Edge/Bell).
    electronic_drum_module_audio_interface_functionality:
      name: Audio-Interface-Funktionalität des elektronischen Drum-Moduls
      description: Gibt an, ob das Modul zusätzlich zu MIDI auch als USB-Audio-Interface
        für Aufnahme und Wiedergabe genutzt werden kann.
    electronic_drum_module_metronome_features:
      name: Metronomfunktionen des elektronischen Drum-Moduls
      description: Gibt die integrierten Übungs- bzw. Metronomfunktionen an.
    electronic_drum_module_power_source:
      name: Stromversorgung des elektronischen Drum-Moduls
      description: Gibt die erforderliche bzw. unterstützte Stromversorgung des Steuermoduls
        an.
    electronic_drum_module_sample_import_support:
      name: Unterstützung des Sample-Imports für elektronische Drum-Module
      description: Gibt an, ob das Modul Benutzersamples importieren kann und mit
        welcher Methode.
    electronic_drum_pad_playing_surface_type:
      name: Art der Spielfläche des elektronischen Drum-Pads
      description: Beschreibt die Beschaffenheit der Spielfläche des Tom-Pads (z.
        B. Mesh Head oder Gummi), was sich auf Rückprall, Geräuschentwicklung und
        Spielgefühl auswirkt.
    electronic_features:
      name: Elektronische Funktionen
      description: Gibt an, welche elektronischen bzw. interaktiven Funktionen der
        Spielbanking-Artikel gegebenenfalls enthält.
    electronic_lights_and_sound:
      name: Elektronische Licht- und Soundfunktionen
      description: Gibt an, ob das Puppenhaus-Spielset elektronische Licht- und/oder
        Soundfunktionen enthält (z. B. Lichter, Türklingel, Musik oder Soundeffekte).
    electronics_power_source:
      name: Stromversorgung der Elektronik
      description: Gibt an, wie aktive Elektronik mit Strom versorgt wird (falls zutreffend).
    eligible_race_series:
      name: Zulässige Rennserien
      description: Rennserie oder Motorsportverband, für den das Fahrzeug zugelassen
        ist.
    elliptical_trainer_part_type:
      name: Art des Crosstrainer-Teils
      description: Klassifiziert die jeweilige Art von Zubehör oder Ersatzteilen für
        einen Ellipsentrainer (z. B. Riemen, Konsole oder Pedal), damit Käufer:innen
        schnell zum benötigten Artikel filtern können, ohne viele Mikrokategorien
        durchsuchen zu müssen.
    embellishment_technique:
      name: Verzierungstechnik
      description: Beschreibt die primären dekorativen bzw. oberflächenbezogenen Veredelungen
        des Kleidungsstücks, z. B. Stickerei, Druck oder Perlenarbeit.
    embellishment_type:
      name: Art der Verzierung
      description: Gibt die Art des dekorativen Elements an, das am Strumpfband angebracht
        ist, z. B. Spitze, Schleifen oder Perlen.
    embossing_pen_ink_color:
      name: Farbe der Prägestifttinte
      description: Gibt die Farbe der vom Prägestift aufgetragenen Tinte an (kann
        transparent/klebrig oder pigmentiert sein). Unterscheidet sich von der Farbe
        des Stifts/Gehäuses.
    embossing_stylus_tip_shape:
      name: Form der Prägestiftspitze
      description: Beschreibt die Form der Prägespitze, mit der verschiedene Effekte
        erzeugt werden (z. B. kugelförmig oder spitz).
    embroidered_coverage_level:
      name: Stickabdeckungsgrad
      description: Ungefähre Menge der Stickgarnabdeckung auf der Vorderseite des
        Aufnähers.
    embroidered_patch_backing_type:
      name: Typ der Rückseite des gestickten Aufnähers
      description: Die Träger- bzw. Stützschicht auf der Rückseite des gestickten
        Aufnähers, die Haltbarkeit und Anbringungsmöglichkeiten beeinflusst.
    embroidery_hoop_type:
      name: Art des Stickrahmens
      description: Kennzeichnet die Bauart des Stickrahmens und seinen primären Spannmechanismus.
    embroidery_machine_bobbin_type:
      name: Spulentyp der Stickmaschine
      description: Art bzw. Ladeverfahren des Spulensystems.
    emergency_lighting_configuration:
      name: Konfiguration der Notbeleuchtung
      description: Gibt die primäre installierte Warnbeleuchtungskonfiguration des
        Fahrzeugs an (z. B. Dachlichtleiste oder Kühlergrillleuchten).
    emergency_lighting_package:
      name: Notbeleuchtungspaket
      description: Gibt die Art der installierten Warnleuchten an.
    emissions_compliance_standard:
      name: Emissionsnorm
      description: Gibt gegebenenfalls die Emissionszertifizierung bzw. Konformität
        des Motors an.
    emissions_standard:
      name: Emissionsnorm
      description: Emissionsnorm des Fahrzeugs (je nach Region und Baujahr unterschiedlich).
    enclosure_panel_configuration:
      name: Konfiguration der Gehäuseplatten
      description: Gibt an, welche Gehäuseteile bzw. Seitenwände enthalten sind (Abdeckungskonfiguration),
        z. B. vollständige Umhüllung, nur Seitenvorhänge oder dreiseitig (vorne/hinten
        offen).
    enclosure_window_material:
      name: Material des Gehäusefensters
      description: Gibt das Material an, das für die transparenten Fensterflächen
        des Gehäuses verwendet wird.
    end_fitting_type:
      name: Art des Endbeschlags
      description: Die Anschlussart an beiden Enden der Strebe (fahrzeug- und deckelseitig),
        die die Kompatibilität der Halterung bestimmt.
    end_type:
      name: Endtyp
      description: Gibt die Befestigungs- bzw. Verschlussart an den Enden des Abschleppgurts
        zur Verbindung mit Bergungspunkten an.
    ends_style_blocking_wires:
      name: Endenausführung (Blockierdrähte)
      description: Beschreibt, wie die Enden des Blockierdrahts verarbeitet sind,
        um Sicherheit und einfaches Einfädeln durch Spitzenkanten zu gewährleisten.
    enduro_bike_suspension_adjustability:
      name: Einstellbarkeit der Enduro-Federung
      description: Gibt an, welche Einstellmöglichkeiten für die Federung vorhanden
        sind (typischerweise Vordergabel und hinterer Stoßdämpfer).
    engine_bay_mounting_location:
      name: Montageort im Motorraum
      description: Gibt die vorgesehene Einbauposition (relative Position) des Ausgleichsbehälters
        im Motorraum an.
    engine_bearing_coating:
      name: Motorlagerbeschichtung
      description: Gibt eine vorhandene Oberflächenbeschichtung des Lagers an (zur
        Verschleißfestigkeit, Einbettbarkeit oder Reibungsreduzierung).
    engine_bearing_position:
      name: Position des Motorlagers
      description: Gibt die Position bzw. Funktion des Lagers innerhalb des Motors
        an.
    engine_bearing_size:
      name: Größe des Motorlagers
      description: Gibt an, ob es sich um ein Lager in Standardgröße oder um eine
        Unter- bzw. Übergrößenvariante handelt (häufig in Verbindung mit Kurbelwellenschliff
        und Lagerspiel).
    engine_configuration:
      name: Motorkonfiguration
      description: Beschreibt die Zylinderanordnung bzw. -konfiguration des Motors
        (z. B. Reihen-, V- oder Boxer-/Flachmotor).
    engine_cooling_type:
      name: Art der Motorkühlung
      description: Gibt die Kühlmethode des Motors an.
    engine_degreaser_form:
      name: Darreichungsform des Motorentfetters
      description: Physische Form bzw. Darreichungsform des Motorentfetters.
    engine_degreaser_rinse_requirement:
      name: Spülanforderung für Motorentfetter
      description: Gibt an, ob der Entfetter nach der Anwendung mit Wasser abgespült
        werden soll.
    engine_mount_type:
      name: Art der Motorhalterung
      description: Gibt die funktionale Bauart der Motorhalterung an (z. B. hydraulisch,
        starr oder Drehmomentstütze).
    engine_oil_formulation:
      name: Motorenölformulierung
      description: Kennzeichnet den Formulierungsschwerpunkt des Motoröls, z. B. Standardanwendung,
        Hochlaufleistungsformel, verlängerte Ölwechselintervalle oder Flotten-/Schwerlastanwendungen.
    engine_oil_specification:
      name: Motorölspezifikation
      description: Die Spezifikation bzw. Norm, die das Öl erfüllt (z. B. API SP,
        API SN Plus, API CK-4, ACEA C3 oder ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Inhalt des Motorüberholungskits
      description: Gibt an, welche Hauptkomponenten im Motorüberholungskit enthalten
        sind.
    engine_rotation_direction:
      name: Drehrichtung des Motors
      description: Gibt die in Marineanwendungen verwendete Drehrichtung des Motors
        an.
    engine_timing_system_drive_type:
      name: Antriebsart des Motorsteuerungssystems
      description: Gibt an, ob das Steuersystem des Motors riemen-, ketten- oder zahnradgetrieben
        ist, um die Kompatibilität sicherzustellen.
    engine_valve_coating:
      name: Motorventilbeschichtung
      description: Kennzeichnet Oberflächenbehandlungen oder Beschichtungen des Ventils
        zur Verbesserung der Verschleiß- bzw. Hitzebeständigkeit.
    engine_valve_position:
      name: Position des Motorventils
      description: Gibt an, ob das Motorventil für die Einlass- oder Auslassseite
        des Motors vorgesehen ist.
    engine_valve_stem_tip_type:
      name: Typ der Ventilschaftspitze
      description: Gibt an, ob das Motorventil für die Einlass- oder Auslassseite
        des Motors vorgesehen ist.
    engine_valvetrain_type:
      name: Typ des Motorventiltriebs
      description: Anordnung von Ventiltrieb/Nockenwelle.
    enhancement_level:
      name: Verstärkungsgrad
      description: 'Ungefähre Volumenzunahme durch den Einsatz, angegeben in Körbchengrößen:
        gering (bis zu 1 Körbchengröße), mittel (1–2 Körbchengrößen) oder stark (mehr
        als 2 Körbchengrößen).'
    entry_zipper_location:
      name: Position des Einstiegsreißverschlusses
      description: Gibt an, wo sich der primäre Einstiegsreißverschluss bzw. die Hauptöffnung
        des Anzugs befindet (z. B. vorne, hinten, an der Schulter oder diagonal).
    epee_point_type:
      name: Art der Degenspitze
      description: Gibt die Bauart bzw. den Standard der an der Klinge montierten
        Spitze an, was Kompatibilität und Wartung beeinflusst.
    equestrian_discipline:
      name: Reitsportdisziplin
      description: Gibt die Reitdisziplin an, für die der Sporn vorgesehen bzw. am
        besten geeignet ist.
    equestrian_helmet_safety_certification:
      name: Sicherheitszertifizierung des Reithelms
      description: Gibt die Sicherheitsstandards bzw. Zertifizierungen an, denen der
        Helm entspricht.
    equine_application_area:
      name: Anwendungsbereich für das Pferd
      description: Gibt die Körperregion bzw. das Material an, für die bzw. das das
        Produkt bestimmt ist (z. B. Huf, Mähne oder Zaumzeug).
    equipment_contact_material_brew_wine:
      name: Gerätekontaktmaterial (Brauerei/Wein)
      description: Hauptmaterial des Teils, das mit der Flüssigkeit in Kontakt kommt
        (z. B. Glas, Edelstahl oder Kunststoff).
    eu_children_clothing_size:
      name: EU-Kinderkleidungsgröße
      description: Gibt die EU-Kinderkleidungsgröße anhand der Körpergröße an, z. B.
        104 oder 140.
    eu_clothing_size:
      name: EU-Kleidergröße
      description: Gibt die EU-Kleidergröße an, z. B. 38 oder 46
    eu_cup_size:
      name: EU-Körbchengröße
      description: Gibt die EU-BH-Körbchengröße an, z. B. C oder E.
    eu_ring_size:
      name: EU-Ringgröße
      description: Gibt die EU-Ringgröße anhand des Umfangs an, z. B. 52 oder 63.
    eu_shoe_size:
      name: EU-Schuhgröße
      description: Gibt die EU-Schuhgröße an, z. B. 42 oder 42 Wide.
    euphonium_included_accessories:
      name: Im Lieferumfang des Euphoniums enthaltenes Zubehör
      description: Listet Zubehör auf, das üblicherweise zusammen mit einem Euphonium
        geliefert wird (z. B. Mundstück oder Koffer).
    euphonium_valve_configuration:
      name: Ventilkonfiguration des Euphoniums
      description: Gibt die Anzahl der Ventile an und ob das 4. Ventil von Hand oder
        mit einem Seitenbetätigungsmechanismus bedient wird.
    european_sword_historical_period:
      name: Historische Epoche des europäischen Schwerts
      description: Hauptepoche, auf der das Schwertmuster bzw. die Replik basiert
        (oder die Epoche des Originals).
    european_sword_pattern_type:
      name: Muster/Typ des europäischen Schwerts
      description: Gibt das spezifische Muster bzw. den Typ (die Typologie) des europäischen
        Schwerts an, das durch das Sammlerschwert dargestellt wird.
    ev_connector_adapter_direction:
      name: Richtung des EV-Anschlusses/-Adapters
      description: Gibt an, welche Verbindung der Adapter von und zu welcher Seite
        umwandelt (Fahrzeuganschlussseite bzw. Ladegerät-/Kabelseite), um eine präzise
        Kompatibilitätsfilterung zu ermöglichen.
    ev_conversion_kit_completeness_level:
      name: Vollständigkeitsgrad des EV-Umrüstkits
      description: Gibt an, ob es sich bei dem Produkt um ein vollständiges Umrüstkit
        oder ein Teilkit/-Bundle handelt (z. B. nur Motor + Controller).
    ev_conversion_kit_drivetrain_configuration:
      name: Antriebskonfiguration des EV-Umrüstkits
      description: Gibt die Antriebsarchitektur eines EV-Umrüstkits an, einschließlich
        Motorposition/Antriebslayout und ob das bestehende Getriebe beibehalten wird.
    ev_conversion_kit_voltage_class:
      name: Spannungsklasse des EV-Umrüstkits
      description: Gibt die nominale Systemspannungsklasse an, für die das EV-Umrüstkit
        ausgelegt ist. Verwenden Sie dies zusätzlich zur exakten Spannungsangabe zum
        Filtern nach gängigen Systemspannungsklassen.
    evaporator_core_type:
      name: Typ des Verdampferkerns
      description: Gibt die Bauart des Verdampferkerns einer Fahrzeugklimaanlage an.
    evenweave_fabric_finish_treatment:
      name: Finish/Veredelung von Evenweave-Stoff
      description: Gibt Vorveredelungen oder Behandlungen an, die auf den Stoff angewendet
        wurden und Handhabung oder Aussehen beeinflussen.
    evenweave_fabric_package_format:
      name: Verpackungsformat von Evenweave-Stoff
      description: Gibt an, wie der Stoff verkauft wird (Zuschnittstück oder fortlaufende
        Meterware).
    exercise_bike_accessory_part_type:
      name: Zubehör-/Teileart für Heimtrainer
      description: Beschreibt die primäre Funktion bzw. den Komponententyp des Artikels
        (z. B. Pedal, Antriebsriemen, Flaschenhalter, Bildschirmabdeckung oder Kurbelarm).
    exercise_bike_cushion_component:
      name: Sitzkomponente des Heimtrainers
      description: Gibt die enthaltene Sitzkomponente an, z. B. Sitzpolster, Sattel
        oder Sitzbezug.
    exercise_bike_metrics_tracked:
      name: Erfasste Kennzahlen des Heimtrainers
      description: Listet die Trainingsdatenfelder auf, die der Computer in Echtzeit
        messen und anzeigen kann.
    exercise_mat_accessories_included:
      name: Enthaltenes Zubehör für die Trainingsmatte
      description: Listet zusätzliche Komponenten auf, die mit der Matte geliefert
        werden, z. B. Gurte oder Knieschoner.
    exhaust_cooling_type:
      name: Art der Abgaskühlung
      description: Gibt an, ob die Abgaskomponente für Nassabgassysteme (wassergekühlt/wassereingespritzt)
        oder Trockenabgassysteme vorgesehen ist.
    exhaust_installation_position:
      name: Einbauposition der Abgasanlage
      description: Gibt an, an welcher Stelle am Fahrzeug das Teil eingebaut wird.
    exhaust_outlet_configuration:
      name: Konfiguration des Abgasauslasses
      description: Gibt die Anordnung der Abgasauslässe am Heck des Fahrzeugs an.
    expansion_tank_cap_connection_type:
      name: Anschlussart des Ausgleichsbehälterdeckels
      description: Beschreibt die mechanische Anschlussart, mit der der Deckel am
        Hals des Ausgleichsbehälters befestigt und abgedichtet wird.
    expansion_tank_cap_pressure_relief_feature:
      name: Druckentlastungsfunktion des Ausgleichsbehälterdeckels
      description: Druckentlastungsfunktion des Ausgleichsbehälterdeckels
    expansion_tank_cap_seal_material:
      name: Dichtungsmaterial des Deckels des Ausdehnungsgefäßes
      description: Material der Dichtung, die mit dem Hals des Ausdehnungsgefäßes
        in Kontakt kommt.
    extension_attachment_method:
      name: Befestigungsart der Verlängerung
      description: Gibt an, wie die Verlängerung am Fahrradcockpit bzw. Lenker befestigt
        wird, damit Fahrer:innen die Kompatibilität mit ihrem vorhandenen Setup prüfen
        können.
    extension_bend_type:
      name: Art der Verlängerungsbiegung
      description: Beschreibt die geometrische Form bzw. Biegung der Lenkerverlängerung,
        die Ergonomie und Aerodynamik beeinflusst.
    extension_mechanism:
      name: Ausziehmechanismus
      description: Beschreibt gegebenenfalls die Methode, mit der ein Tisch seine
        Länge oder Oberfläche erweitert.
    extension_table_features:
      name: Merkmale des Erweiterungstisches
      description: Hebt funktionale Merkmale hervor, die speziell für Nähmaschinen-Verlängerungstische
        relevant sind.
    eyelet_grommet_installation_method:
      name: Befestigungsart von Ösen & Tüllen
      description: Gibt an, wie die Öse bzw. Tülle im Material befestigt wird.
    eyewear_lens_shape:
      name: Form der Brillengläser
      description: Gibt die geometrische Form der Linse an, z. B. zylindrisch oder
        sphärisch, was Sichtfeld, Verzerrung und Stil beeinflusst.
    eyewear_strap_material:
      name: Brillenbandmaterial
      description: Gibt das Material des verstellbaren Bands an, mit dem die Schutzbrille
        bzw. Brille am Kopf befestigt wird.
    fabric_backing_type:
      name: Art der Stoffrückseite
      description: Gibt an, ob die bedruckbare Baumwolle eine stabilisierende Papierrückseite
        besitzt (und welche Art), was bestimmt, ob sie durch Standarddrucker geführt
        werden kann.
    fabric_cut_format:
      name: Format des Stoffzuschnitts
      description: Gibt Zuschnitt bzw. Format des Handarbeits-Canvasstücks an.
    fabric_end_use:
      name: Verwendungszweck des Stoffes
      description: Gibt den hauptsächlichen Verwendungszweck des Stoffes an (wofür
        er am besten geeignet ist).
    fabric_finish:
      name: Stoffveredelung
      description: Oberflächenfinish bzw. Veredelung des Seidenstoffs, das Glanz,
        Haptik und Leistung beeinflusst.
    fabric_intended_use:
      name: Vorgesehene Verwendung des Stoffes
      description: Empfohlene Hauptanwendungen bzw. Projekte für den Leinenstoff.
    fabric_opacity_level:
      name: Transparenzgrad des Stoffes
      description: Gibt an, wie durchsichtig der Stoff ist, was sich auf Lagenlook
        und Futterbedarf auswirkt.
    fabric_patch_shape:
      name: Form des Stoffpatches
      description: Beschreibt die Form der im Paket enthaltenen Patches.
    fabric_repair_kit_application_method:
      name: Anwendungsmethode des Stoffreparaturkits
      description: Gibt an, wie die Reparatur am Stoff angebracht wird (z. B. aufbügeln,
        aufnähen oder kleben).
    fabric_repair_kit_components_included:
      name: Enthaltene Bestandteile des Stoffreparatursets
      description: Listet die im Set enthaltenen Komponenten auf (z. B. Flicken, Garn,
        Nadel oder Klebstoff).
    fabric_repair_kit_intended_use:
      name: Vorgesehene Verwendung des Stoffreparaturkits
      description: Gibt die typische Reparaturaufgabe an, für die das Kit konzipiert
        ist (z. B. Risse, Löcher oder Säumen).
    fabric_selling_format:
      name: Stoffverkaufsformat
      description: Gibt an, wie der Stoff verkauft wird (Meterware, vorgeschnittenes
        Stück, Rolle/Ballen oder Muster).
    fabric_stretch_level:
      name: Dehnungsgrad des Stoffes
      description: Beschreibt den Grad der Dehnbarkeit bzw. Elastizität des Stoffes
        und hilft Käufer:innen bei der Auswahl geeigneter Stoffe für figurbetonte
        Kleidungsstücke oder strukturierte Projekte.
    fabric_stretch_type:
      name: Dehnungsart des Stoffes
      description: Gibt die Dehnbarkeit des Boardshort-Materials an, die für die Bewegungsfreiheit
        beim Surfen oder Schwimmen wichtig ist.
    fabric_texture:
      name: Stoffstruktur
      description: Beschreibt die Oberflächenbeschaffenheit bzw. Strickstruktur des
        Stoffes, der für das Loungewear-Oberteil verwendet wird.
    fabric_use_case:
      name: Einsatzbereich des Stoffes
      description: Primärer Verwendungszweck des Satin-Stoffstücks bzw. der Stoffrolle.
    fabric_weight_class:
      name: Stoffgewichtsklasse
      description: Kategorisiert Flanell nach typischen Gewichtsklassen, damit Käufer:innen
        filtern können, ohne die genaue GSM-/oz-Angabe zu kennen.
    face_mask_material:
      name: Gesichtsmaskenmaterial
      description: Materialzusammensetzung der im Lieferumfang des Helms enthaltenen
        oder mit diesem kompatiblen Gesichtsmaske.
    face_mask_style:
      name: Gesichtsmaskenform
      description: Definiert die allgemeine Form bzw. Bauart der modischen Gesichtsmaske
        und hilft Käufer:innen dabei, die gewünschte Passform und Optik zu finden.
    face_mask_style_code:
      name: Stilcode der Gesichtsmaske
      description: Definiert die Bauart bzw. Codefamilie der Gesichtsmaske (z. B.
        ROPO, OPO oder RJOP).
    face_protection_type:
      name: Art des Gesichtsschutzes
      description: Gibt die Art des mitgelieferten oder integrierten Gesichtsschutzes
        des Helms an, z. B. Gitter oder Visier.
    faceplate_security_features:
      name: Frontplatten-Sicherheitsmerkmale
      description: Erfasst Diebstahlschutz- und Zugriffsfunktionen der Frontblende
        über das grundlegende Design hinaus.
    facing_length:
      name: Beleglänge
      description: Gibt die Bahnlänge (Kurvenlänge) des Mundstücks an, die Ansprache
        und Blattwahl beeinflusst.
    fan_shroud_type:
      name: Art der Lüfterabdeckung
      description: Gibt die Abdeckungs- bzw. Bauform der Lüfterabdeckung an (z. B.
        vollständig, halb oder ringförmig).
    farming_method:
      name: Anbaumethode
      description: Hebt Tierwohl- bzw. Haltungspraktiken hervor, die bei der Aufzucht
        der Tiere verwendet werden, z. B. Freilandhaltung oder Biohaltung.
    farming_practice:
      name: Landwirtschaftliche Praxis
      description: Gibt die hauptsächliche Anbaumethode des Produkts an (z. B. konventionell,
        biologisch oder hydroponisch).
    fascinator_style:
      name: Stil des Fascinators
      description: Beschreibt das strukturelle Design oder die Form des Fascinators,
        damit Käufer:innen schnell nach beliebten Hutstilen filtern können.
    fastener_grade:
      name: Güteklasse des Befestigungsmittels
      description: Gibt die Festigkeitsklasse des Bolzens an, z. B. Güteklasse 8 oder
        Klasse 10.9, die die Tragfähigkeit bestimmt.
    fat_rendering_state:
      name: Zustand des ausgelassenen Fetts
      description: Gibt an, ob das Fett ausgelassen, roh oder teilweise ausgelassen
        ist, was Haltbarkeit und kulinarische Verwendung beeinflusst.
    fat_source:
      name: Fettquelle
      description: Gibt die hauptsächliche Fettquelle an, die zur Herstellung von
        Butter, Ghee oder Margarine verwendet wird (tierisch oder pflanzlich), und
        unterstützt die Filterung nach Allergien und Ernährungsformen.
    faucet_hole_configuration:
      name: Konfiguration der Wasserhahnlöcher
      description: Gibt Anzahl und Position der vorgebohrten Armaturenlöcher auf der
        Waschtischplatte an.
    feather_application:
      name: Verwendungszweck der Federn
      description: Primärer Verwendungszweck bzw. Einsatzbereich der Truthahnfedern
        für Crafting oder Fertigung.
    feather_attachment_format:
      name: Befestigung/Format der Federn
      description: Gibt an, wie die synthetischen Federn für die Verwendung vorbereitet
        bzw. verkauft werden (lose, an einer Schnur, auf Klebeband usw.).
    feather_coloration_style:
      name: Stil der Federfärbung
      description: Beschreibt, wie die Farbe auf die Feder(n) aufgetragen wird bzw.
        erscheint (z. B. einfarbig, spitzengefärbt oder Farbverlauf), unabhängig vom
        grundlegenden Farbwert.
    feather_component:
      name: Federbestandteil
      description: Gibt an, welcher Teil bzw. welche Art der Pfauenfeder verkauft
        wird (z. B. Augenfeder oder Herl).
    feather_curvature:
      name: Federkrümmung
      description: Beschreibt die allgemeine Form bzw. das Krümmungsprofil der Feder.
    feather_finish:
      name: Federfinish
      description: Gibt an, ob die Straußenfedern naturbelassen oder für dekorative
        Zwecke verarbeitet wurden (z. B. gefärbt oder gebleicht).
    feather_form:
      name: Federform
      description: Gibt die physische Form der verkauften Gänsefederstücke an.
    feather_grade:
      name: Federklasse
      description: Gesamtqualität bzw. Auswahlklasse der Feder für Bastel- oder Dekorationszwecke.
    feather_part:
      name: Federteil
      description: Der Teil bzw. die Struktur der verkauften Truthahnfeder (üblich
        bei Crafting- und Fliegenbindebedarf).
    feather_processing_type:
      name: Federverarbeitungsart
      description: Beschreibt, wie die Federn für Bastelzwecke verarbeitet bzw. behandelt
        wurden (z. B. gefärbt, gebleicht oder naturbelassen/ungefärbt).
    feather_product_form:
      name: Form des Federprodukts
      description: Beschreibt die physische Form bzw. den Zuschnitt des Federprodukts
        im Verkaufszustand (z. B. lose Federn, Boas oder Fransen).
    feather_quantity_unit:
      name: Mengeneinheit der Federn
      description: Definiert, wie das Produkt verkauft wird (z. B. pro Stück, nach
        Gewicht oder pro Bündel), um einen genauen Vergleich zwischen Angeboten zu
        ermöglichen.
    feather_source:
      name: Mengeneinheit der Federn
      description: Gibt die tierische Herkunft der Federn an, die in Federbällen verwendet
        werden.
    feather_stiffness:
      name: Steifigkeit der Federn
      description: Relative Steifigkeit bzw. Festigkeit der Federäste/-struktur.
    feed_mechanism:
      name: Zuführmechanismus
      description: Gibt an, wie die Bälle in die Ballwurfmaschine eingeführt werden.
    feed_purpose:
      name: Verwendungszweck des Futters
      description: Beschreibt das hauptsächliche ernährungsphysiologische bzw. funktionale
        Ziel des Futters oder Ergänzungsmittels.
    feeder_mechanism_type:
      name: Typ des Zuführermechanismus
      description: Kennzeichnet den Ausgabemechanismus, mit dem der Futterspender
        das Futter freigibt.
    feijoa_cultivar:
      name: Feijoa-Sorte
      description: Gibt die konkrete Sorte bzw. Varietät der Feijoa an, da verschiedene
        Sorten unterschiedliche Geschmacksrichtungen, Größen und Erntezeiten aufweisen.
    felt_duty:
      name: Filzklasse
      description: Gibt die Filzklasse des Tennisballs an (z. B. Extra Duty oder Regular
        Duty), die die Haltbarkeit auf unterschiedlichen Belägen beeinflusst.
    felting_mold_intended_use:
      name: Vorgesehene Verwendung von Filzformen
      description: Gibt an, wofür die Form bei Filzprojekten verwendet werden soll.
    felting_pad_surface_material:
      name: Oberflächenmaterial für Filzunterlagen
      description: Material der Arbeitsfläche der Filzunterlage bzw. Filzmatte, die
        mit Faser oder Nadel in Kontakt kommt.
    fencing_certification:
      name: Fechtzertifizierung
      description: Listet die offiziellen Zulassungen von Verbänden auf, denen die
        Fechtwaffe entspricht (z. B. FIE oder USFA), und kennzeichnet damit Wettkampftauglichkeit
        und Qualitätsstandards.
    fencing_connector_type:
      name: Typ des Fechtverbinders
      description: Gibt die Steckerkonfiguration an, die zum Anschließen von Fechtkabeln,
        Buchsen oder Trommeln verwendet wird (z. B. 2-polig, 3-polig oder Bajonett),
        um die Kompatibilität der Komponenten sicherzustellen.
    fencing_discipline:
      name: Fechtdisziplin
      description: Gibt an, für welche Fechtwaffe bzw. Disziplin das Produkt vorgesehen
        oder geeignet ist.
    fencing_weapon_type:
      name: Art der Fechtwaffe
      description: Gibt an, mit welcher Fecht- bzw. Übungswaffenart die Trainingshilfe
        kompatibel ist oder welche sie darstellt, damit Nutzer:innen passende Ausrüstung
        finden können.
    fender_finish_state:
      name: Lackierungszustand des Kotflügels
      description: Gibt den gelieferten Oberflächen- bzw. Finishzustand des Kotflügels
        für Lackierung und Montagebereitschaft an.
    fender_pieces_included:
      name: Inbegriffene Kotflügelteile
      description: Listet die mitgelieferten Komponenten auf, um zu verdeutlichen,
        ob es sich um einen einzelnen Kotflügel oder ein komplettes Set mit Zubehör
        handelt.
    fender_type:
      name: Art des Kotflügels
      description: Klassifiziert das Gesamtdesign bzw. den Stil des Kotflügels.
    fennel_trimming:
      name: Zuschnitt des Fenchels
      description: Gibt an, welche Pflanzenteile zusammen mit der Fenchelknolle enthalten
        sind (z. B. mit Fenchelgrün, abgeschnittenem oberen Teil oder Wurzel).
    fennel_variety:
      name: Fenchelsorte
      description: Gibt die Sorte bzw. Marktsorte der verkauften Fenchelknollen an.
    fermentation_application:
      name: Verwendungszweck der Fermentation
      description: Gibt das primäre Lebensmittel bzw. Getränk an, für dessen Fermentation
        die Kultur entwickelt wurde (z. B. Käse, Joghurt, Milchkefir oder Sauerteig).
    fermentation_method:
      name: Fermentationsmethode
      description: Gibt an, wie die Sojasauce hergestellt bzw. fermentiert wurde (z. B.
        natürlich gebraut oder chemisch hydrolysiert).
    fermentation_vessel_material:
      name: Material des Gärgefäßes
      description: Hauptmaterial des im Set enthaltenen Fermentationsbehälters (falls
        vorhanden).
    ferrule_material:
      name: Material der Ferrule
      description: Gibt das Material der Schafthülse an (z. B. Juma, Phenolharz, Polycarbonat,
        XTC oder keines), was Haltbarkeit und Spielgefühl beeinflusst.
    fia_homologation_certification:
      name: FIA-Homologation/Zertifizierung
      description: Gibt an, ob das Fahrzeug (bzw. die Sicherheitszelle) zertifiziert/homologiert
        ist und nach welchem Standard.
    fiber_animal_source_type:
      name: Tier-/Quellenart der Faser
      description: Das Tier bzw. die primäre Quelle, aus der das Kammzugmaterial stammt
        (oder synthetisch), z. B. Merinowolle, Alpaka oder Pflanzenfasern.
    fiber_luster_level:
      name: Faserglanzgrad
      description: Optischer Glanz der Faser, von matt bis hochglänzend.
    fiber_preparation_processing_stage:
      name: Faseraufbereitungs-/Verarbeitungsphase
      description: Gibt an, wie die Wolle für die Verwendung aufbereitet bzw. verarbeitet
        wurde (z. B. kardiert oder gekämmt, gemischt oder Superwash).
    fiber_preparation_type:
      name: Art der Faseraufbereitung
      description: Gibt an, wie die Faser für Handarbeiten vorbereitet wurde (z. B.
        Kardierflies, trommelkardiert oder vorgefilzte Platte).
    field_hockey_ball_playing_surface:
      name: Spieloberfläche für Feldhockeybälle
      description: Gibt die Spielfläche bzw. Umgebung an, für die der Ball konzipiert
        ist.
    field_hockey_ball_type:
      name: Art des Feldhockeyballs
      description: Kategorisiert den Feldhockeyball nach seinem Verwendungszweck oder
        besonderen Merkmalen.
    field_hockey_goal_size_standard:
      name: Standardgröße des Feldhockeytors
      description: Klassifiziert das Tor nach gängigen Feldhockeystandards bzw. Trainingsgrößen
        (z. B. FIH Outdoor-Regelgröße, Jugend oder Mini).
    field_hockey_training_objective:
      name: Trainingsziel im Feldhockey
      description: Definiert die hauptsächliche Fähigkeit bzw. den Schwerpunktbereich,
        den die Trainingshilfe verbessern soll.
    field_point_attachment_method:
      name: Befestigungsart der Feldspitze
      description: Gibt an, wie die Feldspitze am Pfeilschaft bzw. Einsatz befestigt
        wird (z. B. einschrauben oder einkleben).
    field_point_tip_style:
      name: Stil der Feldspitze
      description: Definiert die geometrische Bauart bzw. das funktionale Profil der
        Feldspitze, was Eindringtiefe, Entfernungsaufwand und Zulässigkeit beeinflusst.
    fielding_glove_position:
      name: Position des Fanghandschuhs
      description: Kennzeichnet die Defensivposition bzw. den Verwendungszweck, für
        den der Handschuh beim Baseball oder Softball konzipiert ist.
    fielding_training_focus:
      name: Schwerpunkt des Feldtrainings
      description: Gibt den hauptsächlichen Kompetenzbereich an, auf den die Trainingshilfe
        während der Übungseinheiten abzielt.
    fig_variety:
      name: Feigensorte
      description: Kennzeichnet die spezifische Sorte bzw. Variante der verkauften
        Feigen.
    figure_8_device_design:
      name: Gerätedesign (Abbildung 8)
      description: Kennzeichnet die spezifische Bauform des Abseilachters, die Handhabungseigenschaften
        und Verwendungszweck beeinflusst.
    figure_finish_type:
      name: Oberflächenfinish der Figur
      description: Gibt die Oberflächen- bzw. Lackbeschaffenheit der Pferdefigur an
        (wie sie als Sammlerstück aussieht bzw. sich anfühlt).
    figurine_scale:
      name: Maßstab der Figur
      description: Maßstab bzw. Verhältnis der Figur zum realen Vorbild (falls zutreffend),
        z. B. 1:6.
    fill_status:
      name: Füllstatus
      description: Gibt an, ob die Grappling-Dummy vorgefüllt, ungefüllt oder teilweise
        gefüllt verkauft wird, was Versandkosten und Aufwand für Käufer:innen beeinflusst.
    filling_consistency:
      name: Konsistenz der Füllung
      description: Beschreibt die Textur bzw. Viskosität der Füllung im Lieferzustand
        (z. B. glatte Creme, Fruchtstücke oder Paste).
    filling_type:
      name: Füllart
      description: Gibt die Hauptfüllung bzw. Creme im Inneren des Kekses an, falls
        vorhanden.
    filtration_and_mother_status:
      name: Filtrations- und Mutterstatus
      description: Gibt an, ob der Essig gefiltert, ungefiltert, roh oder mit „Essigmutter“
        ist und richtet sich damit an Verbraucher:innen, die probiotische oder naturbelassene
        Optionen suchen.
    filtration_method:
      name: Filtermethode
      description: Material oder Verfahren, das zum Filtern und Reinigen des Wodkas
        nach der Destillation verwendet wird.
    fin_box_system:
      name: Finnenkastensystem
      description: Gibt das Finnenkasten- bzw. Montagesystem des Boards an und bestimmt
        damit die Kompatibilität mit nachrüstbaren Finnen.
    fin_buoyancy:
      name: Auftrieb der Flosse
      description: Gibt an, ob die Flosse im Wasser positiven, neutralen oder negativen
        Auftrieb besitzt, was Trimm und Ausrüstungsbalance des Tauchers beeinflusst.
    fin_flex_rating:
      name: Flexibilitätsgrad der Finne
      description: Gibt die relative Steifigkeit bzw. den Flexgrad der Finne an, was
        die Gesamtleistung beeinflusst.
    fin_mounting_system:
      name: Befestigungssystem der Finne
      description: Definiert die Befestigungsschnittstelle bzw. den Standard zur Montage
        der Finne am Kiteboard (z. B. FCS II, Schraubbefestigung oder 4-Loch-System),
        um die Kompatibilität zwischen Finnen und Boards sicherzustellen.
    fin_position:
      name: Position der Flosse
      description: Gibt die vorgesehene Montageposition der Finne auf dem Board an.
    fin_strap_type:
      name: Flossenbandtyp
      description: Gibt die Art des Riemen- bzw. Haltesystems an, mit dem die Finne
        an Ferse bzw. Fuß befestigt wird.
    fin_template:
      name: Flossenvorlage
      description: Kategorisiert die hydrodynamische Form bzw. Kontur der Surfboard-Finne,
        die Kurvenverhalten, Geschwindigkeit und Fahrgefühl beeinflusst.
    finger_count:
      name: Anzahl der Finger
      description: Gibt die Anzahl der Finger an, für die Handschuh, Tab oder Releasegriff
        ausgelegt sind.
    finger_coverage:
      name: Fingerabdeckung
      description: Gibt an, wie viel der Finger bedeckt sind.
    finger_grip_adjustability:
      name: Einstellbarkeit des Fingergriffs
      description: Gibt an, wie der Fingergriff befestigt bzw. an unterschiedliche
        Handgrößen angepasst wird.
    finger_hole_configuration:
      name: Fingerlochkonfiguration
      description: Gibt die Ausrichtung der Fingerlöcher an (rechts-, links- oder
        beidhändig).
    finger_hole_count:
      name: Anzahl der Fingerlöcher
      description: Gibt die Anzahl der Fingerlöcher im Griffleder an, ein wesentlicher
        Stilunterschied zwischen fingerlosen, 2-Loch-, 3-Loch- und 4-Loch-Modellen.
    finger_pick_band_style:
      name: Bandstil des Fingerpicks
      description: Art des Bands bzw. der Schlaufe, die am Finger befestigt wird und
        Tragekomfort sowie Einstellbarkeit beeinflusst.
    finger_pick_blade_length:
      name: Länge der Fingerpick-Klinge
      description: Länge der Anschlagklinge, die vom Band absteht.
    finger_pick_blade_shape:
      name: Form des Fingerpicks
      description: Form bzw. Profil der Anschlagfläche (Klinge), die die Saiten berührt.
    finger_pick_size:
      name: Größe des Fingerpicks
      description: Größe des Bands bzw. der Schlaufe des Fingerpicks für unterschiedliche
        Finger- oder Daumenumfänge (nicht Instrumentengröße).
    finger_pick_wear_location:
      name: Trageposition des Fingerpicks
      description: Gibt an, an welchem Finger der Fingerpick getragen werden soll
        oder ob es sich um ein Daumen-und-Finger-Set handelt.
    finger_protection:
      name: Fingerschutz
      description: Gibt an, ob der Handschuh über Fingerschutzschienen verfügt und
        ob diese herausnehmbar sind.
    fingerboard_bearing_type:
      name: Lagertyp des Fingerboards
      description: Gibt den Lagertyp an, der in Fingerboard-Rollen verwendet wird.
    fingerboard_grip_type:
      name: Art des Fingerboard-Griffes
      description: Gibt das Material bzw. die Art der Grifffläche des Fingerboard-Decks
        an.
    fining_agent_active_ingredient:
      name: Wirkstoff des Schönungsmittels
      description: Hauptsächlich verwendetes Schönungs- bzw. Klärungsmittel im Produkt.
    fining_agent_type:
      name: Art des Schönungsmittels
      description: Gibt die chemische Zusammensetzung bzw. das Material des Schönungs-/Klärungsmittels
        für Produkte zur Klärung von Rotwein an.
    finish_after_baking:
      name: Oberflächenbeschaffenheit nach dem Backen
      description: Beschreibt das typische Oberflächenbild nach dem Aushärten bzw.
        Backen.
    finish_effect:
      name: Finish-Effekt
      description: Beschreibt spezielle Oberflächen- bzw. optische Effekte des Strasssteins.
    finish_type:
      name: Art des Finishs
      description: Oberflächenfinish des Ukulelenkorpus.
    finished_product_format:
      name: Format des fertigen Produkts
      description: Gibt an, welche Art von Duftprodukt mit dem Set hergestellt werden
        soll.
    fire_pit_accessories_included:
      name: Inbegriffenes Feuerstellenzubehör
      description: Listet wichtiges Zubehör auf, das im Lieferumfang der Feuerstelle
        enthalten ist, z. B. Funkenschutzgitter oder Lavasteine, und schafft Klarheit
        darüber, was enthalten ist.
    firework_assortment_launch_type:
      name: Starttyp des Feuerwerkssortiments
      description: Beschreibt, wie die enthaltenen Feuerwerkskörper typischerweise
        gezündet bzw. gestartet werden.
    firework_assortment_types_included:
      name: Enthaltene Arten von Feuerwerkskörpern
      description: Kennzeichnet die wichtigsten im Sortiment enthaltenen Feuerwerksarten,
        damit Käufer:innen den Inhalt verschiedener Sets vergleichen können (z. B.
        Fontänen, Römische Lichter oder Knallkörper).
    firework_effect_types:
      name: Arten der Feuerwerkseffekte
      description: Hauptsächliche visuelle bzw. sensorische Effektarten des Sortiments
        (alle zutreffenden auswählen).
    firework_ignition_method:
      name: Zündmethode des Feuerwerks
      description: Gibt an, wie das Feuerwerk gezündet bzw. gestartet wird (z. B.
        mit Zündschnur oder elektrischem Zünder).
    firework_visual_intensity_level:
      name: Visuelle Intensitätsstufe des Feuerwerks
      description: Gesamte visuelle Intensität bzw. Funkenmenge des Fontäneneffekts.
    firing_mode:
      name: Feuermodus
      description: Listet die auswählbaren bzw. primären Feuermodi der Airsoft-Waffe
        auf.
    first_day_cover_cachet_type:
      name: Art des Ersttagsbrief-Stempels
      description: Art des Stempels auf dem Ersttagsbrief (z. B. gedruckt oder handgemalt).
    first_day_cover_cancellation_type:
      name: Entwertungsart des Ersttagsbriefs
      description: Art bzw. Stil des Poststempels auf dem Ersttagsbrief (z. B. Maschinen-
        oder Handstempel).
    first_day_cover_set_type:
      name: Art des Ersttagsbrief-Sets
      description: Gibt an, ob das Cover eine einzelne Ausgabe, ein vollständiges
        Set oder eine Teilmenge/Kombination darstellt.
    fishing_hook_size:
      name: Größe des Angelhakens
      description: 'Gibt die standardisierte Größenbezeichnung des Angelhakens an
        (z. B. #4, 1/0 oder 10/0), damit Angler:innen Hakengröße, Zielfischart und
        Köder besser aufeinander abstimmen können.'
    fishing_hook_style:
      name: Angelhakenstil
      description: Kennzeichnet das spezifische Design bzw. Biegemuster des Einzelhakens,
        das Präsentation, Hakeneffizienz und vorgesehene Einsatzbereiche beeinflusst.
    fishing_hook_type:
      name: Angelhakentyp
      description: Beschreibt die mit dem Blinker gelieferte Hakenkonfiguration (falls
        vorhanden).
    fishing_line_application:
      name: Verwendungszweck der Angelschnur
      description: Kennzeichnet den vorgesehenen Verwendungszweck der Angelschnur
        bzw. des Vorfachmaterials (z. B. Vorfach, Hauptschnur oder Tippet).
    fishing_line_buoyancy_type:
      name: Auftriebsart der Angelschnur
      description: Klassifiziert das Verhalten der Schnur im Wasser (z. B. schwimmend,
        intermediär oder sinkend) und hilft Angler:innen bei der Wahl der passenden
        Lauftiefe.
    fishing_needle_purpose:
      name: Verwendungszweck der Angelnadel
      description: Kennzeichnet den primären Einsatzbereich der Nadel bei Angelmontagearbeiten.
    fishing_needle_types_included:
      name: Enthaltene Arten von Angelnadeln
      description: Listet die im Set enthaltenen Nadel- bzw. Rigging-Werkzeugarten
        auf, damit Kund:innen den Lieferumfang schnell erkennen können.
    fit_profile:
      name: Passformprofil
      description: Beschreibt den Gesamtschnitt und die Silhouette des Polsters, was
        sich auf Beweglichkeit und Abdeckung auswirkt.
    fit_volume_classification:
      name: Klassifizierung des Passformvolumens
      description: Kategorisiert das gesamte Innenvolumen des Schuhs entsprechend
        der Herstellerangaben (z. B. LV für geringes Volumen).
    fitting_angle:
      name: Winkel des Anschlussstücks
      description: Gibt den Biegewinkel des Anschlussstücks an (z. B. gerade, 45°
        oder 90°). Verwenden Sie „Verstellbar/Drehbar“ für Anschlussstücke mit variablem
        Winkel und „Sonstige“ für ungewöhnliche Winkel.
    flag_base_type:
      name: Typ der Flaggenbasis
      description: Definiert die Verankerungs- bzw. Basisart zur Befestigung der Eckfahne
        auf unterschiedlichen Spielflächen.
    flag_design_theme:
      name: Thema des Flaggendesigns
      description: Beschreibt das primäre Designthema der Flagge (z. B. Land/Nationalität,
        Sportteam oder Feiertag) und unterstützt Suche sowie Filterung beim intentbasierten
        Shopping.
    flag_mounting_method:
      name: Befestigungsmethode der Fahne
      description: Gibt an, wie die Fahne am Fahrzeug befestigt wird (z. B. Antennenhalterung,
        Anhängerkupplungshalterung oder magnetisch).
    flag_type:
      name: Flaggenart
      description: Klassifiziert den spezifischen Zweck bzw. Stil der Golfflagge,
        z. B. Pin-Flagge, Cart-Flagge oder Übungsflagge.
    flame_resistance_standard:
      name: Flammschutznorm
      description: Gibt die spezifische flammhemmende bzw. lichtbogenbeständige Norm/Zertifizierung
        an, die das Kleidungsstück erfüllt.
    flamenco_cajon_snare_system:
      name: Schnarrsystem der Flamenco-Cajón
      description: Gibt den internen Snare-Mechanismus an, der den charakteristischen
        Flamenco-Sound erzeugt (oder keinen).
    flammability_compliance:
      name: Einhaltung der Entflammbarkeitsnormen
      description: Gibt die geltenden Entflammbarkeitsnormen an, die der Stoff für
        Fahrzeuginnenräume erfüllt.
    flannel_brushing_finish:
      name: Flanell-Finish durch Aufrauen
      description: Gibt an, ob der Flanell angeraut ist und auf welcher Seite bzw.
        welchen Seiten, was Weichheit, Wärme und Aussehen beeinflusst.
    flannel_use_type:
      name: Verwendungsart des Flanells
      description: Primärer Verwendungszweck des Flanellzuschnitts bzw. der Flanellrolle.
    flap_configuration:
      name: Blattkonfiguration
      description: Gibt die Art des Sattelblatts an, z. B. Monoblatt oder Doppelblatt.
    flare_color:
      name: Farbe der Signalrakete
      description: Farbe des ausgestrahlten Lichts bzw. der Flamme (oder Linsenfarbe
        bei LED-Fackeln).
    flash_card_included_features:
      name: Enthaltene Funktionen der Lernkarten
      description: Hebt funktionale Lern- bzw. Nutzungsmerkmale der Lernkarten hervor.
    flavor_intensity:
      name: Geschmacksintensität
      description: Gibt an, wie konzentriert das Aromaprodukt ist, und hilft Nutzer:innen
        bei der Bestimmung der geeigneten Dosierung (z. B. Standardstärke oder Superstärke).
    flavor_solvent_base:
      name: Lösungsmittelbasis des Aromas
      description: Gibt den primären Trägerstoff bzw. das Lösungsmittel an, das im
        Aromastoff verwendet wird (z. B. Alkohol, Propylenglykol oder Glycerin).
    fleece_fiber_animal_type:
      name: Tierart der Fleecefaser
      description: Tierische Herkunft der Vliesfaser (Tierart).
    fleece_finish_surface:
      name: Fleece-Finish/Oberfläche
      description: Beschreibt Oberfläche bzw. Finish des Fleeces (z. B. Anti-Pilling
        oder gebürstet), was Pillingverhalten, Weichheit und Aussehen beeinflusst.
    fleece_preparation_method:
      name: Methode der Fleecevorbereitung
      description: Beschreibt, wie das Vlies für Handarbeiten und Spinnen vorbereitet
        bzw. verarbeitet wurde (Zustand der Faser).
    flesh_color:
      name: Farbe des Fruchtfleischs
      description: Gibt die Farbe des Fruchtfleischs im Inneren der Melone an.
    fletching_orientation:
      name: Ausrichtung der Befiederung
      description: Gibt an, wie die Befiederung am Schaft angebracht ist (z. B. gerade,
        versetzt oder spiralförmig), was Rotation und Flugbahn des Pfeils beeinflusst.
    fletching_profile:
      name: Profil der Befiederung
      description: Definiert die geometrische Form bzw. den Zuschnitt der Befiederung,
        was Luftwiderstand, Freigängigkeit, Geräuschentwicklung und Flugeigenschaften
        des Pfeils beeinflusst.
    flight_system_type:
      name: Art des Flightsystems
      description: Kennzeichnet die Bauart des Flights und unterscheidet zwischen
        faltbaren, geformten und integrierten Flight-und-Schaft-Systemen.
    float_attachment_method:
      name: Posenbefestigungsmethode
      description: Beschreibt, wie die Pose an der Angelschnur befestigt wird (z. B.
        beweglich oder fest), damit Angler:innen nach Montageart filtern können.
    float_design:
      name: Design der Angelpose
      description: Klassifiziert die allgemeine Bauart bzw. den Typ der Angelpose
        (z. B. Pose, Waggler oder Bleistiftpose), damit Angler:innen schnell ein passendes
        Modell für Technik und Bedingungen auswählen können.
    float_raft_use_environment:
      name: Einsatzumgebung von Schwimmkörpern/Rettungsflößen
      description: Hauptsächlicher Einsatzbereich des aufblasbaren Produkts (Pool,
        ruhiges offenes Wasser oder Brandung), was Anforderungen an Haltbarkeit und
        Design widerspiegelt.
    floatation:
      name: Schwimmfähigkeit
      description: Gibt an, ob das Signalgerät zum Schwimmen auf Wasser ausgelegt
        ist.
    floor_construction_type:
      name: Bodenkonstruktionstyp
      description: Gibt die Konstruktion des Raft-Bodens an (z. B. selbstlenzend oder
        Drop-Stitch), was Entwässerung, Steifigkeit und Leistung beeinflusst.
    floor_design:
      name: Bodendesign
      description: Art der im Lieferumfang enthaltenen Bodenabdeckung.
    floor_inclusion:
      name: Boden enthalten
      description: Gibt an, ob der Vorraum einen Boden besitzt und ob dieser herausnehmbar
        ist.
    floor_mat_cleaning_method:
      name: Reinigungsmethode der Fußmatte
      description: Gibt die vom Hersteller empfohlene primäre Reinigungsmethode für
        die Fußmatte an.
    floor_mat_edge_style:
      name: Kantenart der Fußmatte
      description: Beschreibt, ob die Matte erhöhte Ränder besitzt, um Flüssigkeiten
        und Schmutz aufzufangen.
    floor_mat_format:
      name: Format der Fußmatte
      description: Definiert die physische Form bzw. Bauart des Bodenschutzprodukts
        (z. B. Einzelmatte, Stecksystem oder Rolle).
    floor_mat_retention_system:
      name: Befestigungssystem der Fußmatte
      description: Gibt die Methode an, mit der die Matte an ihrem Platz fixiert wird.
    floor_mat_set_configuration:
      name: Konfiguration des Fußmattensets
      description: Gibt an, welche Positionen im Paket enthalten sind (z. B. nur vorderes
        Paar oder vollständiges Set).
    floss_sugar_granulation_grade:
      name: Körnungsgrad des Zuckerwattezuckers
      description: Beschreibt die Kristallgröße der Zuckermischung (fein, mittel oder
        grob), was Maschinenleistung und Endtextur beeinflussen kann.
    floss_sugar_product_form:
      name: Produktform des Zuckerwattezuckers
      description: Gibt an, ob der Zuckerwattezucker gebrauchsfertig ist, ein Aromakonzentrat
        darstellt, das mit Basiszucker gemischt werden muss, oder ein farbloser Basiszucker
        ist.
    flour_grind_texture:
      name: Mahlgrad des Mehls
      description: Gibt Mahlgrad bzw. Textur des Mehls an, z. B. superfein, mittel,
        grob oder steingemahlen, was das Backergebnis beeinflussen kann.
    flour_processing_method:
      name: Mehlverarbeitungsmethode
      description: Erfasst besondere Verarbeitungs- bzw. Behandlungsmethoden des Mehls
        (z. B. steingemahlen, gebleicht, gekeimt oder angereichert), die Geschmack,
        Farbe oder Nährwert beeinflussen.
    flower_care_instructions:
      name: Pflegehinweise für Blumen
      description: Enthält empfohlene Pflegeschritte speziell für frisch geschnittene
        Blumen (z. B. Stiele kürzen oder Wasser häufiger wechseln).
    flugelhorn_leadpipe_material:
      name: Material des Flügelhorn-Mundrohrs
      description: Material des Mundrohrs (wenn getrennt vom gesamten Instrumentenmaterial
        angegeben).
    flugelhorn_trigger_type:
      name: Art des Flügelhorn-Triggers
      description: Gibt an, ob das Flügelhorn über einen Stimmtrigger verfügt und
        welchen Zug bzw. welches Ventil dieser betätigt.
    fluorescence_grade:
      name: Fluoreszenzgrad
      description: Gibt die Fluoreszenzintensität des Diamanten bei Bestrahlung mit
        UV-Licht an.
    fluorescence_under_uv:
      name: Fluoreszenz unter UV-Licht
      description: Gibt an, ob bzw. welche Art von Fluoreszenz die Probe unter ultraviolettem
        Licht zeigt.
    fluorocarbon_content:
      name: Fluorkohlenstoffgehalt
      description: Gibt an, ob und in welchem Umfang das Wachs Fluorcarbon-Zusätze
        enthält.
    flute_case_capacity:
      name: Kapazität des Flötenkoffers
      description: Gibt an, wofür das Etui zusätzlich zum Hauptkörper der Flöte ausgelegt
        ist (z. B. Flöte + Piccolo oder zusätzliches Kopfstück).
    flute_cleaning_rod_tip_type:
      name: Art der Spitze des Flötenreinigungsstabs
      description: Beschreibt die Ausführung des Stangenendes, das das Tuch bzw. den
        Wischer hält oder mit dem Instrument in Kontakt kommt (z. B. geschlitzt, mit
        Gewinde oder Öse).
    flute_footjoint_type:
      name: Typ des Flötenfußstücks
      description: Gibt die Fußstückkonfiguration der Flöte an.
    flute_headjoint_cork_type:
      name: Typ des Korks des Flötenkopfstücks
      description: Gibt Material bzw. Art der Korken-/Stopfenbaugruppe des Kopfstücks
        an, die mit dem Kopfstück geliefert wird.
    flute_key_system:
      name: Klappensystem der Flöte
      description: Kennzeichnet das mechanische bzw. Klappensystem der Flöte (z. B.
        Böhm-System), falls zutreffend.
    flute_keywork_material:
      name: Material der Flötenmechanik
      description: Material und/oder Beschichtung der Klappen (Klappenmechanik), sofern
        diese getrennt vom Korpusmaterial angegeben werden.
    flute_offset_g:
      name: Versetztes G der Flöte
      description: Gibt an, ob die Flöte über ein versetztes G-Klappenlayout verfügt.
    flute_wall_thickness:
      name: Wandstärke der Flöte
      description: Wandstärkenkategorie des Flötenrohrs (dünnwandig, Standard oder
        dickwandig).
    fly_pattern_type:
      name: Fliegenmustertyp
      description: Klassifiziert die künstliche Fliege nach Angelstil bzw. Insekten-/Beuteimitation,
        damit Angler:innen schnell die passende Fliegenart finden können.
    fly_rod_style:
      name: Stil der Fliegenrute
      description: Klassifiziert die Rute nach ihrer vorgesehenen Wurfdisziplin bzw.
        ihrem Einsatzbereich (z. B. Einhand, Switch oder Spey).
    fly_style:
      name: Schlitzstil
      description: Gibt die Art des Eingriffs bzw. der vorderen Öffnung der langen
        Unterhose an.
    fly_tying_tools_included:
      name: Enthaltene Fliegenbindewerkzeuge
      description: Listet die im Set enthaltenen Fliegenbindewerkzeuge auf, damit
        Käufer:innen genau sehen können, was enthalten ist, und Sets vergleichen können.
    fly_type:
      name: Art des Eingriffs
      description: Gibt an, ob die lange Unterhose über einen funktionalen Eingriff
        verfügt und wie dieser ausgeführt ist.
    flyer_hook_mounting_method:
      name: Befestigungsart des Flyerhakens
      description: Beschreibt, wie der Haken am Flyer befestigt wird (z. B. eingeschraubt
        oder eingepresst), was Montage und Kompatibilität beeinflusst.
    flyer_hook_orientation:
      name: Ausrichtung des Flügelhakens
      description: Gibt an, ob der Haken für die linke oder rechte Seite des Flyers
        vorgesehen oder wendbar/universell ist.
    flyer_kit_finish_coating:
      name: Finish/Beschichtung des Flyer-Kits
      description: Oberflächenfinish der Komponenten des Flyer-Kits.
    flyer_kit_included_components:
      name: Enthaltene Komponenten des Flyer-Kits
      description: Gibt an, welche Teile im Paket enthalten sind.
    flyer_orifice_type:
      name: Art der Flyeröffnung
      description: Gibt die Art der Öffnung an, die am Flyer verwendet wird.
    flying_disc_feature_set:
      name: Funktionsumfang der Wurfscheibe
      description: Besondere funktionale Merkmale der Wurfscheibe.
    flysheet_material:
      name: Material des Außenzelts
      description: Gibt das Hauptmaterial des Außenzelts bzw. Außenzeltschutzes an,
        das Gewicht, Haltbarkeit und Wetterbeständigkeit beeinflusst.
    flywheel_balance_type:
      name: Auswuchtungsart des Schwungrads
      description: Gibt das Hauptmaterial des Außenzelts bzw. Außenzeltschutzes an,
        das Gewicht, Haltbarkeit und Wetterbeständigkeit beeinflusst.
    foam_blocks_size_class:
      name: Größenklasse der Schaumstoffblöcke
      description: Gibt die allgemeine Größenklasse der im Set enthaltenen Blöcke
        an.
    foam_blocks_surface_texture:
      name: Oberflächenstruktur von Schaumstoffblöcken
      description: Beschreibt die Haptik bzw. Oberflächenbeschaffenheit der Schaumstoffblöcke.
    foam_surface_effect:
      name: Oberflächeneffekt des Schaums
      description: Beschreibt gängige dekorative Oberflächeneffekte auf Craft-Schaum
        oder Styropor, z. B. Glitzer-, Metallic- oder holografische Effekte.
    foil_color:
      name: Folienfarbe
      description: Gibt die auf dem Zertifikat verwendete Folienakzentfarbe an (falls
        zutreffend).
    foil_curtain_mounting_method:
      name: Montageart des Folienvorhangs
      description: Beschreibt, wie der Folienvorhang angebracht bzw. aufgehängt werden
        soll (z. B. Klebestreifen oder Ösen).
    foil_discipline:
      name: Foil-Disziplin
      description: Gibt den hauptsächlichen Fahrstil bzw. die Disziplin an, für die
        das Foil ausgelegt ist.
    foil_mast_board_mounting_type:
      name: Montageart des Foilmasts am Board
      description: Definiert die Schnittstelle an der Spitze des Masts, die mit dem
        Board oder der Foil-Schiene verbunden wird.
    foil_mast_fuselage_connection_type:
      name: Verbindungsart zwischen Foilmast und Fuselage
      description: Gibt an, wie der Mast mit dem Rumpf bzw. der Frontflügelbaugruppe
        verbunden wird.
    foil_mounting_interface:
      name: Foil-Montagefläche
      description: Kennzeichnet den Verbindungsstandard, mit dem das Teil am Board
        oder an anderen Foil-Komponenten befestigt wird.
    foil_mounting_system:
      name: Foil-Befestigungssystem
      description: Gibt die Montageschnittstelle für Foils bzw. Finnen am Board an
        und gewährleistet die Kompatibilität mit vorhandener Hardware.
    foil_mounting_type:
      name: Foil-Befestigungstyp
      description: Kennzeichnet das Schnittstellensystem zur Befestigung des Foils
        am Board, um die Kompatibilität zwischen den Komponenten sicherzustellen.
    fold_over_elastic_application:
      name: Verwendungszweck von Falzgummi
      description: Hauptverwendungszweck/Anwendung für Knopflochgummi.
    foldability:
      name: Faltbarkeit
      description: Beschreibt, ob und wie sich die Trennwand zur Aufbewahrung oder
        Neukonfiguration zusammenfalten lässt.
    foldability_stow:
      name: Faltbarkeit (zum Verstauen)
      description: Gibt an, ob sich der Gepäckträger bei Nichtgebrauch zusammenklappen
        bzw. verstauen lässt (z. B. hochklappbar am Fahrzeug).
    folding_style:
      name: Faltstil
      description: Gibt an, wie sich das Crashpad für Transport und Lagerung zusammenfalten
        lässt, was Gleichmäßigkeit der Landefläche und Packmaß beeinflusst.
    food_basket_items_included:
      name: Im Lebensmittelkorb enthaltene Artikel
      description: Listet die wichtigsten im Korb enthaltenen Lebensmittelarten auf,
        damit Käufer:innen Körbe passend zu Geschmack oder Ernährungsbedürfnissen
        auswählen können.
    food_coloring_form:
      name: Form des Lebensmittelfarbstoffs
      description: Gibt die physische Form bzw. das Darreichungsformat an, in dem
        der Lebensmittelfarbstoff geliefert wird (z. B. Gel, Flüssigkeit, Pulver oder
        Spray).
    food_contact_material:
      name: Lebensmittelkontaktmaterial
      description: Hauptmaterial der Weinherstellungsgeräte (Gärbehälter, Heber, Trichter),
        die mit Most bzw. Wein verwendet werden.
    food_packing_medium:
      name: Verpackungsmedium für Lebensmittel
      description: Gibt das Medium an, in dem Obst oder Gemüse verpackt ist (z. B.
        Wasser, Salzlake, Sirup oder Öl).
    foosball_rod_type:
      name: Typ der Tischfußballstange
      description: Gibt die mechanische Konfiguration der Stange an, die Spielgefühl
        und Sicherheit beeinflusst.
    foot_arch_type_compatibility:
      name: Kompatibilität mit Fußgewölbetypen
      description: Gibt das Fußgewölbeprofil an, für das die Einlage ausgelegt ist.
    foot_arch_type_suitability:
      name: Eignung für Fußgewölbetyp
      description: Gibt an, welches Fußgewölbeprofil die Einlage unterstützen soll.
    foot_coverage:
      name: Fußbedeckung
      description: Gibt an, ob die Beinbekleidung mit Fußteil, ohne Fußteil, mit Steg
        oder mit offener Ferse ausgeführt ist.
    foot_guard_type:
      name: Art des Fußschutzes
      description: Gibt an, ob der Beinschutz eine Zehen-/Fußkappe besitzt und ob
        diese fest oder abnehmbar ist.
    foot_support_level:
      name: Fuß-Unterstützungsniveau
      description: Gibt den Grad der strukturellen Unterstützung bzw. Festigkeit an,
        den eine Schuheinlage bietet, z. B. niedrig, mittel, hoch oder extra hoch.
    footbag_play_style:
      name: Spielstil des Footbags
      description: Primär vorgesehene Spielweise des Footbags.
    football_ball_type:
      name: Art des Footballs
      description: Gibt den hauptsächlichen Verwendungszweck bzw. Einsatzbereich des
        Footballs an, z. B. Spiel, Training oder Sammlerstück.
    football_dummy_type:
      name: Art des Football-Dummys
      description: Klassifiziert Bauart bzw. funktionales Design des Dummys entsprechend
        seines speziellen Trainingszwecks.
    football_glove_certification:
      name: Zertifizierung des Footballhandschuhs
      description: Gibt die für den Wettkampfeinsatz erforderliche Zertifizierung
        bzw. Normenkonformität an (z. B. SFIA, NFHS oder NCAA).
    footboard_mounting_type:
      name: Montageart des Fußbretts
      description: Gibt an, wie das Fußteil am Bettgestell oder Boden befestigt wird,
        und unterstützt Käufer:innen bei der Auswahl kompatibler Hardware und Installationsmethoden.
    footboard_style:
      name: Fußteilstil
      description: Definiert den strukturellen bzw. ästhetischen Designstil des Fußteils.
    footrest_adjustability:
      name: Verstellbarkeit der Fußstütze
      description: Gibt an, ob und wie die Fußstützen an unterschiedliche Beinlängen
        von Kindern angepasst werden können.
    footrest_type:
      name: Typ der Fußstütze
      description: Kennzeichnet Vorhandensein und Ausführung einer Fußstütze am Hocker.
    footstrap_configuration:
      name: Konfiguration des Fußriemens
      description: Gibt das Muster der Fußschlaufenbefestigung auf dem Boarddeck an.
    footswitch_action_style:
      name: Funktionsart des Fußschalters
      description: Gibt an, ob die Schalterfunktion tastend oder rastend ist und ob
        beide Optionen unterstützt werden.
    footswitch_power_source:
      name: Stromquelle des Fußschalters
      description: Gibt gegebenenfalls an, wie der Fußschalter mit Strom versorgt
        wird (passiv über Verstärkerbuchse, Batterie, externes Netzteil, USB usw.).
    footwear_construction_method:
      name: Schuhkonstruktionsmethode
      description: Definiert die Technik zur Verbindung von Obermaterial und Sohle,
        die Haltbarkeit, Wiederbesohlbarkeit und Preis beeinflusst.
    footwear_cut:
      name: Schafthöhe des Schuhs
      description: Gibt die Höhe des Schuhschafts an (Low Cut, Mid Cut oder High Cut),
        was Beweglichkeit und Stabilität beeinflusst.
    footwear_size_system:
      name: Schuhgrößensystem
      description: Gibt den regionalen Größenstandard der angegebenen Schuhgröße an
        (z. B. US, EU oder UK).
    footwear_support_type:
      name: Art der Schuhunterstützung
      description: Gibt an, welche biomechanische Unterstützung bzw. Pronationskontrolle
        der Schuh bietet (z. B. Neutral, Stability oder Motion Control).
    fork_material:
      name: Material der Gabel
      description: Gibt das Material der Fahrradgabel an, das Steifigkeit, Gewicht
        und Fahrverhalten beeinflusst.
    form_factor:
      name: Formfaktor
      description: Primärer Hardware-Formfaktor des DMX-Controllers.
    formula_car_series_class:
      name: Formelwagen-Serie/Klasse
      description: Gibt die Rennserie bzw. Klasse an, für die der Formelwagen gebaut
        wurde.
    formulation_style:
      name: Rezepturstil
      description: Hebt spezielle Rezepturen hervor, die für bestimmte Anwendungen
        oder Vorlieben entwickelt wurden (z. B. Barista oder Extra Creamy).
    formulation_type:
      name: Art der Formulierung
      description: Art der Formulierung des Desinfektionssprays.
    fossil_preparation_level:
      name: Präparationsgrad des Fossils
      description: Grad der Präparation bzw. Reinigung des Präparats (z. B. unpräpariert
        in Matrix oder vollständig präpariert).
    fossil_preservation_type:
      name: Art der Fossilerhaltung
      description: Art der Fossilerhaltung (z. B. permineralisiert, Abguss, Abdruck
        oder Impression).
    fossil_restoration_status:
      name: Restaurierungsstatus des Fossils
      description: Gibt an, ob und wie das Präparat repariert bzw. restauriert wurde
        (z. B. geklebt, rekonstruiert oder mit Kompositmaterial versehen).
    foundation_configuration:
      name: Konfiguration der Foundation
      description: Gibt an, ob die Unterkonstruktion einteilig oder als geteiltes
        Zwei-Teile-Set für größere Matratzengrößen gefertigt ist.
    foundation_profile:
      name: Profil der Unterkonstruktion
      description: Klassifiziert die Gesamthöhenkategorie der Foundation–z. B. ultraniedrig,
        niedrig, Standard oder hoch–damit Käufer:innen schnell passende Matratzenhöhe
        und Bettlaken auswählen können.
    frame_adjustability:
      name: Verstellbarkeit des Rahmens
      description: Gibt an, ob und wie der Rahmen verstellbar ist (z. B. Breiten-/Höhenverstellung
        oder Dreh-/Neigefunktion), was Ergonomie und Passform beeinflusst.
    frame_drum_jingle_configuration:
      name: Konfiguration der Schellen der Rahmentrommel
      description: Gibt an, ob die Rahmentrommel Schellen besitzt und wie diese grundsätzlich
        angeordnet sind.
    frame_drum_tuning_system:
      name: Stimmsystem der Rahmentrommel
      description: Beschreibt, wie die Rahmentrommel gestimmt wird bzw. ob sie stimmbar
        ist.
    frame_finish:
      name: Rahmenfinish
      description: Gibt die Schutzbeschichtung bzw. Materialoberfläche des Rahmens
        an, die Haltbarkeit und Ästhetik beeinflusst.
    frame_mounting_standard:
      name: Standard für Rahmenmontage
      description: Definiert die Schnittstellenspezifikation zwischen Schuh und Rahmen
        (z. B. 195 mm 2-Punkt oder Trinity 3-Punkt), die für die Rahmenkompatibilität
        entscheidend ist.
    frame_steel_gauge:
      name: Stahlstärke des Rahmens
      description: Gibt die Wandstärke (Gauge) der in den Regalstützen verwendeten
        Stahlrohre an, ein wichtiger Indikator für Festigkeit und Stabilität.
    frame_suspension_type:
      name: Art der Rahmenfederung
      description: Gibt die Federungskonstruktion des Fahrradrahmens an, z. B. Starrrahmen,
        Hardtail oder Vollfederung, damit Käufer:innen passende Rahmen für ihr Setup
        auswählen können.
    free_reed_instrument_orientation:
      name: Ausrichtung des Durchschlagzungeninstruments
      description: Gibt an, wie das Instrument gehalten bzw. gespielt wird (handgehalten
        mit Balg, mit Schultergurt usw.), um Ergonomie und Einsatzbereich besser filtern
        zu können.
    free_weight_rack_type:
      name: Typ des Freihantelständers
      description: Klassifiziert die Bauart bzw. Funktion des Regals (z. B. Hantelständer,
        Kettlebell-Regal oder Gewichtsscheibenständer).
    freehub_body_type:
      name: Typ des Freilaufkörpers
      description: Gibt den vom Hinterradnabenkörper unterstützten Freilaufkörper-
        bzw. Kassettenstandard an.
    freehub_driver_standard:
      name: Freilaufkörperstandard
      description: Gibt die Kassetten-/Freilaufschnittstelle an, die vom Nabenteil
        unterstützt wird (z. B. Shimano HG oder SRAM XD).
    freewheel_thread_standard:
      name: Freilaufgewindestandard
      description: Gibt den Nabengewindestandard bzw. die Größe an, mit der der Freilauf
        kompatibel ist.
    french_horn_bell_construction:
      name: Konstruktion des Waldhorn-Schallbechers
      description: Gibt an, wie der Schallbecher konstruiert ist und ob er für Transport
        bzw. Wartung abgenommen werden kann.
    french_horn_bell_material:
      name: Material des Waldhorn-Schallbechers
      description: Gibt das Material bzw. die Legierung des Schallbechers (und häufig
        auch des Schallbecherrands) des Waldhorns an.
    french_horn_bell_type:
      name: Art des Waldhorn-Schallbechers
      description: Bauart des Schallbechers.
    french_horn_finish:
      name: Finish des Waldhorns
      description: Äußeres Finish bzw. Beschichtung des Instruments.
    french_horn_included_accessories:
      name: Im Lieferumfang des Waldhorns enthaltenes Zubehör
      description: Zubehör, das mit dem Waldhorn geliefert wird (Koffer, Mundstück
        usw.).
    french_horn_leadpipe_material:
      name: Material des Waldhorn-Mundrohrs
      description: Gibt das Material bzw. die Legierung des Mundrohrs an.
    french_horn_wrap_type:
      name: Art der Waldhorn-Wicklung
      description: Gesamte Wicklungs- bzw. Formkonfiguration des Waldhorns.
    fretboard_radius_fit:
      name: Passung für Griffbrettradius
      description: Gibt an, ob die Krümmung der Capo-Auflage für flache oder gewölbte
        Griffbretter ausgelegt ist oder an verschiedene Griffbrettradien angepasst
        werden kann.
    friction_surface_included:
      name: Enthaltene Reibfläche
      description: Gibt an, ob das Schwungrad eine austauschbare bzw. installierte
        Reibfläche besitzt (z. B. Einsatz oder Ring) oder aus einer einteiligen Reibfläche
        besteht.
    fringe_curtain_finish:
      name: Finish des Fransenvorhangs
      description: Beschreibt die optische Oberflächenbeschaffenheit der Fransen (Glanz/Textur).
    fringe_curtain_material:
      name: Material des Fransenvorhangs
      description: Gibt das Hauptmaterial der Vorhangstreifen an (z. B. PET-Folie,
        Kunststoff, Papier oder Stoff).
    fringe_curtain_use_location:
      name: Einsatzort des Fransenvorhangs
      description: Gibt an, ob der Fransenvorhang für den Innenbereich, Außenbereich
        oder beides vorgesehen ist.
    fringe_trim_style:
      name: Stil der Fransenborte
      description: Gibt die Ausführung bzw. den Stil der Fransenborte an (wie die
        Stränge oder Schlaufen gestaltet und angeordnet sind).
    front_axle_standard:
      name: Vorderachsstandard
      description: Gibt Achsdurchmesser und Einbaubreite an, für die die Gabel ausgelegt
        ist (z. B. 15 × 110 mm Boost), um die Kompatibilität mit der Nabe sicherzustellen.
    front_button_configuration:
      name: Konfiguration der Frontknöpfe
      description: Gibt die Knopfleiste der Jacke an und legt fest, ob sie ein- oder
        zweireihig ist und wie viele Frontknöpfe vorhanden sind.
    front_closure_style:
      name: Art des Frontverschlusses
      description: Gibt die Art der Vorderkonstruktion des Trenchcoats an, z. B. einreihig,
        zweireihig, offen, Wickeloptik oder Reißverschluss.
    front_decoration_type:
      name: Art der Frontverzierung
      description: Kennzeichnet die Art der Verzierung bzw. des Aufnähers auf der
        Vorderseite des Huts (z. B. gestickter Aufnäher oder Lederaufnäher).
    front_point_configuration:
      name: Konfiguration der Frontspitzen
      description: Gibt die Bauart der Frontspitzen an (Mono-Punkt, Doppel-Punkt,
        modular oder austauschbar), was die Präzision beim Eindringen in Eis und gemischtes
        Gelände beeinflusst.
    front_seat_position:
      name: Position des Vordersitzes
      description: Gibt an, für welche Seite bzw. Position in der vorderen Reihe der
        Sitz vorgesehen ist.
    front_style:
      name: Frontstil
      description: Beschreibt die Vorderkonstruktion der Chinohose und gibt an, ob
        sie eine glatte Front, Falten oder andere Details besitzt.
    frosting_or_icing_type:
      name: Art des Frostings bzw. der Glasur
      description: Gibt die Art des Frostings bzw. der Glasur an, die auf Kuchen oder
        Dessert-Riegel aufgetragen wird.
    fruit_cultivar_or_variety:
      name: Obstsorte oder -varietät
      description: Gibt die jeweilige Sorte oder den Sortennamen der Frucht an (z. B.
        Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Schnittart des Obsts
      description: Beschreibt, wie das Obst vorbereitet bzw. geschnitten ist (z. B.
        ganz, in Scheiben oder gewürfelt).
    fruit_mix_variety:
      name: Sorte der Fruchtmischung
      description: Benennt die Themenmischung bzw. allgemeine Sorte der Fruchtmischung
        (z. B. Tropical Mix oder Berry Medley).
    fruit_piece_form:
      name: Form der Fruchtstücke
      description: Beschreibt die physische Form bzw. Präsentation der Trockenfrüchte,
        z. B. ganz, in Scheiben oder pulverisiert.
    fruit_snack_form:
      name: Fruchtsnack-Form
      description: Klassifiziert die physische Form bzw. Art, in der der Fruchtsnack
        angeboten wird.
    fruit_topping_format:
      name: Format des Frucht-Toppings
      description: Beschreibt die physische Form, Textur bzw. Art des Toppings, damit
        Käufer:innen zwischen Soßen, Sirupen, Fruchtstücken, Popping Pearls usw. wählen
        können.
    fruit_variety:
      name: Fruchtsorte
      description: Gibt die hauptsächlich verwendete Frucht für Rezept, Set oder Zubehör
        zur Herstellung von Fruchtwein an (z. B. Apfel, Kirsche oder Brombeere).
    fuel_cap_gasket_seal_material:
      name: Material der Tankdeckeldichtung
      description: Gibt das Material der Dichtung bzw. des O-Rings am Tankdeckel an.
    fuel_cap_locking_mechanism:
      name: Tankdeckel-Verriegelungsmechanismus
      description: Gibt die Verriegelungsart des abschließbaren Tankdeckels an.
    fuel_cap_type:
      name: Tankdeckeltyp
      description: Gibt die funktionale Bauart bzw. Ausführung des Tankdeckels für
        den Tankeinfüllstutzen eines Fahrzeugs an.
    fuel_cap_venting:
      name: Tankdeckelentlüftung
      description: Gibt an, ob der Tankdeckel belüftet ist und welche Art der Entlüftung
        gegebenenfalls verwendet wird.
    fuel_filter_features:
      name: Merkmale des Kraftstofffilters
      description: Listet wichtige funktionale Merkmale des Kraftstofffilters auf
        (Wasserabscheidung, Ablassventil, Sensoranschluss usw.).
    fuel_filter_media_material:
      name: Material des Kraftstofffiltermediums
      description: Gibt das primäre Filtermedium an, das im Kraftstofffilterelement
        verwendet wird.
    fuel_filter_mounting_connection_type:
      name: Montage-/Anschlussart des Kraftstofffilters
      description: Gibt an, wie der Kraftstofffilter angeschlossen bzw. montiert wird
        (z. B. Gewinde-/Spin-on-Anschluss, Schnellanschluss, Schlauchtülle oder Banjo-Anschluss).
    fuel_injection_cleaning_method:
      name: Reinigungsmethode der Kraftstoffeinspritzung
      description: Gibt an, wie das Set zur Reinigung des Kraftstoffeinspritzsystems
        verwendet wird.
    fuel_injector_electrical_connector_type:
      name: Art des elektrischen Steckanschlusses der Kraftstoffeinspritzdüse
      description: Gibt den Standard bzw. die Form des elektrischen Injektoranschlusses
        an.
    fuel_injector_seat_type:
      name: Art des Kraftstoffeinspritzdüsensitzes
      description: Gibt die Bauart der Düsen-/Sitzschnittstelle an, die zur Abdichtung
        am Ansaugtrakt bzw. an der Kraftstoffleiste verwendet wird.
    fuel_injector_spray_pattern:
      name: Sprühmuster des Kraftstoffeinspritzers
      description: Kennzeichnet das Kraftstoffsprüh- bzw. Verteilungsmuster der Einspritzdüse
        anhand von Hersteller- oder Branchenbezeichnungen (z. B. Kegel-, Fächer-,
        Punktstrahl- oder Mehrlochmuster).
    fuel_level_sensor_mounting_type:
      name: Montageart des Kraftstoffstandssensors
      description: Gibt die physische Montageschnittstelle an, mit der der Kraftstoffstandsensor/-geber
        am Kraftstofftank oder Pumpenmodul befestigt wird.
    fuel_level_sensor_sensing_mechanism:
      name: Messmechanismus des Kraftstoffstandssensors
      description: Gibt den Messmechanismus bzw. die Technologie an, die zur Messung
        des Kraftstoffstands in einem Kraftstoffstandsensor bzw. einer Gebereinheit
        verwendet wird.
    fuel_line_compliance_standard:
      name: Konformitätsnorm der Kraftstoffleitung
      description: Gibt die gesetzliche bzw. branchenspezifische Norm an, die die
        Kraftstoffleitung erfüllt (häufig bei Marineanwendungen).
    fuel_line_connector_interface_type:
      name: Art der Kraftstoffleitungsanschlussschnittstelle
      description: Gibt die Anschluss- bzw. Schnittstellenart an dem/den Ende(n) der
        Kraftstoffleitung bzw. des Anschlussstücks an.
    fuel_pressure_regulator_body_material:
      name: Material des Gehäuses des Kraftstoffdruckreglers
      description: Gibt das Material des Reglergehäuses bzw. -körpers im Hinblick
        auf Haltbarkeit und Korrosionsbeständigkeit an.
    fuel_pressure_regulator_mounting_type:
      name: Montageart des Kraftstoffdruckreglers
      description: Gibt an, wie der Kraftstoffdruckregler montiert bzw. installiert
        wird, was Passform und Kompatibilität beeinflusst.
    fuel_pump_inlet_type:
      name: Art des Kraftstoffpumpeneinlasses
      description: Anschlussart am Pumpeneinlass.
    fuel_pump_mounting_location:
      name: Montageort der Kraftstoffpumpe
      description: Gibt an, wo die Kraftstoffpumpe im Kraftstoffsystem des Fahrzeugs
        installiert ist.
    fuel_pump_outlet_connection_type:
      name: Typ der Kraftstoffpumpenauslassverbindung
      description: Gibt die physische Anschlussart am Kraftstoffpumpenausgang für
        Passform- bzw. Installationskompatibilität an.
    fuel_system_application:
      name: Einsatzbereich des Kraftstoffsystems
      description: Gibt die Architektur des Kraftstoffversorgungssystems an, die von
        der Kraftstoffpumpe unterstützt wird (z. B. Vergaser, EFI, GDI oder Diesel-Förder-/Transferpumpe).
    fuel_system_connection_type:
      name: Typ der Kraftstoffsystemverbindung
      description: Gibt die vom Paket unterstützte(n) Kraftstoffsystem-Anschlussstandard(s)
        bzw. Adapterschnittstelle(n) an.
    fuel_system_type:
      name: Typ des Kraftstoffsystems
      description: Gibt das Kraftstoffversorgungssystem des Motors an (z. B. Vergaser-
        oder Einspritzsystem).
    fuel_tank_installation_position:
      name: Einbauposition des Kraftstofftanks
      description: Gibt die typische Einbauposition des Kraftstofftanks am Fahrzeug
        an.
    fuel_tank_orientation:
      name: Ausrichtung des Kraftstofftanks
      description: Gibt an, ob der Kraftstofftank horizontal oder vertikal eingebaut
        werden soll.
    fuel_tank_shape:
      name: Form des Kraftstofftanks
      description: Beschreibt die Gesamtform des Kraftstofftanks zur Unterstützung
        von Passgenauigkeit und Austauschkompatibilität.
    fur_type:
      name: Fellart
      description: Gibt die Fellart bzw. das Kunstfellmaterial an der Außenseite der
        Muff-Clutch oder Tasche an.
    furniture_finish:
      name: Möbeloberfläche
      description: Beschreibt die Oberflächenbehandlung bzw. das Finish des Möbelstücks,
        was dessen Aussehen und Pflegeaufwand beeinflusst.
    fuse_form_factor:
      name: Sicherungsformfaktor
      description: Gibt den physischen Sicherungstyp bzw. die Bauform an, damit die
        Sicherung in den vorgesehenen Sicherungshalter oder Sicherungsblock passt
        (z. B. Flach- oder Patronensicherung).
    fuse_terminal_or_mount_style:
      name: Art des Sicherungsanschlusses oder der Sicherungsmontage
      description: Gibt an, wie die Sicherung mechanisch bzw. elektrisch angeschlossen
        wird (Steck-, Schraub- oder Inline-Verbindung).
    fusible_application_method:
      name: Aufbügelmethode
      description: Gibt an, wie ein Schmelzklebstoff aktiviert bzw. aufgebracht wird
        (z. B. durch Aufbügeln, Pressen oder zusätzliche Vernähung).
    fusible_hem_tape_application_method:
      name: Anwendungsmethode für aufbügelbares Saumband
      description: Beschreibt, wie das Band aktiviert bzw. aufgebracht wird (z. B.
        Aufbügeln oder Transferpresse).
    fusible_seam_tape_activation_method:
      name: Aktivierungsmethode für Schmelzklebeband
      description: Gibt an, wie der Klebstoff während der Anwendung aktiviert wird.
    fusible_seam_tape_application:
      name: Verwendungszweck von Schmelznahtband
      description: Gibt den primären vorgesehenen Einsatzbereich des Schmelzklebebands
        an.
    fusible_seam_tape_material:
      name: Material des Schmelzklebebands
      description: Material bzw. Zusammensetzung von Band, Vlies oder Trägermaterial
        (nicht des Stoffes, mit dem es verbunden wird).
    fusible_seam_tape_washability:
      name: Waschbarkeit des Schmelznahtbands
      description: Gibt an, ob die versiegelte Naht nach dem Waschen bzw. Reinigen
        intakt bleibt.
    fusible_seam_tape_waterproof_rating:
      name: Wasserdichtigkeitsklasse des Schmelznahtbands
      description: Gibt an, ob das Nahtband nach der Anwendung eine wasserdichte oder
        wasserabweisende Naht erzeugen soll.
    fusible_tape_backing_type:
      name: Art der Rückseite des Schmelzklebebands
      description: Gibt an, ob das Band über ein Trägerpapier bzw. eine Schutzfolie
        verfügt und in welcher Form diese ausgeführt ist, was Handhabung und Anwendung
        beeinflusst.
    futon_frame_conversion_mechanism:
      name: Umwandlungsmechanismus des Futonrahmens
      description: Definiert den Mechanismus bzw. die Bauart, mit der der Rahmen zwischen
        Sofa-, Liege- und Bettposition umgewandelt wird.
    gaiter_height_type:
      name: Höhenart der Gamasche
      description: Klassifiziert Gamaschen nach der Höhe der Beinabdeckung, z. B.
        knöchelhoch, wadenhoch, kniehoch oder oberschenkelhoch.
    game_variation:
      name: Spielvariante
      description: Gibt den Spielstil an, für den das Set ausgelegt ist (z. B. klassisches
        Tetherball, Tether-Tennis oder Speedball).
    garlic_preparation_style:
      name: Zubereitungsart für Knoblauch
      description: Gibt an, wie der Knoblauch vor dem Verkauf zubereitet bzw. verarbeitet
        wurde (z. B. ganz, gehackt oder pulverisiert).
    garlic_variety:
      name: Knoblauchsorten
      description: Gibt die botanische bzw. kommerzielle Sorte oder Kultivar des angebotenen
        Knoblauchs an.
    garment_back_style:
      name: Rückenstil des Kleidungsstücks
      description: Kennzeichnet das Design bzw. die Konstruktion der Rückseite des
        Kleidungsstücks (z. B. offener Rücken, Racerback oder gekreuzter Rücken).
    garment_pattern_type:
      name: Art des Kleidungsstückmusters
      description: Gibt an, für welche Art von Kleidungsstück das Schnittmuster vorgesehen
        ist.
    garnish_type:
      name: Art der Garnitur
      description: Gibt an, welche Garnitur (Zutat oder Garnierungsart) zum Verfeinern
        eines Cocktails verwendet wird.
    gas_lift_class:
      name: Gasfederklasse
      description: Gibt die Sicherheits- und Belastungsklasse der Gasdruckfeder für
        die Sitzhöhenverstellung an.
    gas_propellant_type:
      name: Art des Gas-Treibmittels
      description: Gibt die empfohlene bzw. kompatible Art des Gas-Treibmittels an,
        wenn der Blaster gasbetrieben ist.
    gatta_tabla_tuning_block_material:
      name: Material des Gatta (Tabla-Stimmblocks)
      description: Material der Stimmklötze (Gatta), die zwischen Stimmriemen und
        Korpus verwendet werden.
    gauge_mounting_type:
      name: Montageart für Messgerät
      description: Gibt an, wie der Kraftstoffmesser am Wasserfahrzeug montiert bzw.
        installiert wird.
    gauge_style:
      name: Messgerätstil
      description: Gibt an, welche Art von Druckmesser die Pumpe verwendet, z. B.
        analoges Manometer, digitale Anzeige oder keinen.
    gear_oil_api_classification:
      name: API-Klassifizierung des Getriebeöls
      description: API-GL-Klassifizierung für Getriebeöle, die in Differentialen bzw.
        Schaltgetrieben verwendet werden.
    gel_wax_density_grade:
      name: Dichtegrad des Gelwachses
      description: Gibt den Dichtegrad des Gelwachses an, der Klarheit, Duftaufnahme
        und Eignung für Einbettungen beeinflusst.
    gel_wax_transparency_level:
      name: Transparenzgrad des Gelwachses
      description: Beschreibt die Transparenz bzw. Opazität des Gelwachses bei bestimmungsgemäßer
        Verwendung.
    gelatin_form:
      name: Form der Gelatine
      description: Beschreibt die physische Form der Gelatine, damit Nutzer:innen
        das passende Format für Rezepte und industrielle Anwendungen auswählen können.
    gelatin_or_gelling_agent_source:
      name: Herkunft der Gelatine bzw. des Geliermittels
      description: Gibt die Herkunft bzw. Art des im Produkt verwendeten Geliermittels
        an, was für Ernährungs- und Religionsvorgaben wichtig ist.
    gelatin_source:
      name: Herkunft der Gelatine
      description: Gibt die tierische, pflanzliche oder synthetische Herkunft der
        Gelatine an, damit Käufer:innen die Kompatibilität mit diätetischen, ethischen
        oder religiösen Anforderungen prüfen können.
    gelling_agent:
      name: Geliermittel
      description: Kennzeichnet die primäre Substanz, die zum Gelieren bzw. Andicken
        des Desserts verwendet wird und für Ernährungseignung sowie Konsistenz wichtig
        ist.
    gemstone_clarity_grade:
      name: Reinheitsgrad des Edelsteins
      description: Reinheitsgrad des Edelsteins (falls bewertet).
    gemstone_creation_method:
      name: Methode zur Herstellung des Edelsteins
      description: Gibt an, ob der Edelstein natürlich, im Labor hergestellt oder
        eine Imitation/ein Simulant ist.
    gemstone_cut_style:
      name: Art des Edelsteinschliffs
      description: Beschreibt die Schliffart bzw. Oberflächenbearbeitung des Edelsteins.
    gemstone_treatment_status:
      name: Behandlungsstatus des Edelsteins
      description: Gibt an, ob und wie der Edelstein behandelt/veredelt wurde.
    geological_period:
      name: Erdzeitalter
      description: Geologische Periode (und gegebenenfalls Epoche) des Fossils, sofern
        bekannt (z. B. Jura, Kreide oder Eozän).
    gift_box_tin_insert_type:
      name: Art der Einlage für Geschenkbox/-dose
      description: Konfiguration der Inneneinlage zum Organisieren bzw. Schützen der
        Artikel in der Box bzw. Dose.
    gift_box_tin_sustainability_features:
      name: Nachhaltigkeitsmerkmale von Geschenkbox/-dose
      description: Nachhaltigkeitsbezogene Merkmale der Geschenkbox-/Dosenverpackung.
    gift_box_tin_window_type:
      name: Art der Geschenkbox/-dose mit Sichtfenster
      description: Gibt an, ob die Geschenkbox ein Sichtfenster besitzt und welche
        Art von Sichtfenster verwendet wird.
    gift_message_option:
      name: Option für Geschenknachrichten
      description: Gibt an, ob und wie eine Geschenknachricht bzw. Notiz hinzugefügt
        werden kann (keine, enthalten oder anpassbar).
    ginger_maturity:
      name: Reifegrad des Ingwers
      description: Gibt das Erntestadium des Ingwers an, z. B. jung oder reif, was
        Geschmacksintensität und bevorzugte kulinarische Verwendung beeinflusst.
    ginger_variety:
      name: Ingwersorte
      description: Gibt die Sorte, Art oder das verwandte Rhizom innerhalb der Ingwerfamilie
        an, um Geschmacksprofile und kulinarische Einsatzbereiche zu unterscheiden.
    glass_kiln_controller_type:
      name: Art der Glasofensteuerung
      description: Art der Temperatur- bzw. Brennsteuerung, die mit dem Ofen geliefert
        wird.
    glass_kiln_firing_application:
      name: Verwendungszweck des Glasofenbrands
      description: Primäre Glasbearbeitungsanwendung(en), für die der Ofen ausgelegt
        ist.
    glass_stone_application_method:
      name: Anwendungsmethode für Glassteine
      description: Gibt an, wie die Glassteine in Projekten befestigt bzw. angebracht
        werden sollen (z. B. aufkleben, Hotfix oder aufnähen).
    glass_tint:
      name: Glastönung
      description: Die Glas- bzw. Kunststofftönung der Flasche zur Regulierung der
        Lichteinwirkung (üblich beim Brauen bzw. bei der Weinherstellung).
    glaze_firing_atmosphere:
      name: Brennatmosphäre der Glasur
      description: Die Brennatmosphäre(n), für die die Glasur ausgelegt ist.
    glaze_opacity:
      name: Deckkraft der Glasur
      description: Gibt an, wie transparent die Glasur nach dem Brennen erscheint.
    glaze_product_form:
      name: Produktart der Glasur
      description: Die physische Form, in der das Glasurprodukt geliefert wird (z. B.
        Flüssigkeit, Trockenpulver, Konzentrat oder Spray).
    glider_avionics_package:
      name: Avionikpaket des Segelflugzeugs
      description: Gibt den Gesamtumfang der im Segelflugzeug installierten Navigations-
        und Fluginstrumente an.
    glider_certification_rating:
      name: Zertifizierungsklasse des Segelflugzeugs
      description: Offizielle Zertifizierungsklasse, die Sicherheits- und Leistungsniveau
        des Segelflugzeugs kennzeichnet (z. B. EN-A oder EN-B).
    glider_landing_gear_configuration:
      name: Fahrwerkskonfiguration des Segelflugzeugs
      description: Gibt die vom Segelflugzeug verwendete Fahrwerkskonfiguration an.
    glider_launch_method:
      name: Startmethode des Segelflugzeugs
      description: Gibt an, wie das Segelflugzeug typischerweise gestartet wird bzw.
        selbst startet.
    glider_performance_class:
      name: Leistungsklasse des Segelflugzeugs
      description: Wettbewerbs- bzw. Leistungsklasse oder Kategorie, die üblicherweise
        für Segelflugzeuge verwendet wird.
    glitter_application_method:
      name: Methode für das Auftragen von Glitzer
      description: Gibt die vorgesehene Technik zum Auftragen bzw. Verwenden des Bastelglitzers
        an (z. B. streuen, untermischen, aufreiben, über Klebstoff auftragen, aufpinseln,
        aufsprühen oder hitzefixieren/prägen).
    glitter_eco_friendly_claim:
      name: Umweltfreundlichkeitsangabe für Glitzer
      description: Umwelt- bzw. Ökoangaben speziell für lose Glitzerformulierungen.
    glitter_effect_type:
      name: Art des Glitzereffekts
      description: Beschreibt den visuellen Effekt des Glitzers bzw. der Pailletten
        zusätzlich zur Grundfarbe (z. B. holografisch oder irisierend).
    glitter_glue_base_solvent_type:
      name: Basis-/Lösungsmitteltyp des Glitzerklebers
      description: Beschreibt die Hauptbasis des Glitzerklebers (ein häufiger Aspekt
        für Käufer:innen hinsichtlich Reinigung und Materialverträglichkeit).
    glitter_opacity_coverage:
      name: Deckkraft/Abdeckung des Glitzers
      description: Gibt an, wie deckend der Glitzereffekt nach dem Auftragen erscheint.
    glitter_use_suitability:
      name: Eignung des Glitzers für bestimmte Anwendungen
      description: Gibt den hauptsächlichen vorgesehenen bzw. zugelassenen Verwendungszweck
        des Glitzerpulvers an (z. B. nur Bastelzwecke, kosmetische Qualität/körpergeeignet
        oder lebensmittelecht).
    glove_armor_placement:
      name: Position der Handschuhprotektoren
      description: Kennzeichnet die Position der Schutzpanzerung am Handschuh.
    glove_cuff_length:
      name: Länge der Handschuhstulpe
      description: Gibt die Länge bzw. Art der Stulpenabdeckung des Rennhandschuhs
        am Handgelenk/Unterarm an.
    glove_finger_coverage:
      name: Fingerabdeckung des Handschuhs
      description: Beschreibt den Grad der Fingerabdeckung des Handschuhs, von vollständig
        bedeckten Fingern bis hin zu fingerlosen Modellen.
    glove_finger_design:
      name: Fingerdesign des Handschuhs
      description: Gibt die Fingerkonfiguration des Handschuhs an, z. B. Fünf-Finger-Handschuh
        oder Fäustling.
    glove_fit_profile:
      name: Passformprofil des Handschuhs
      description: Beschreibt die innere Form und Gesamtsilhouette des Handschuhs,
        damit Spieler:innen das bevorzugte Tragegefühl auswählen können.
    glove_insulation:
      name: Handschuhisolierung
      description: Gibt die Isolierungs-/Wärmekonstruktion bzw. Beheizung des Handschuhs
        an (z. B. Isolierungsgrad, Futter-/Isolierungstechnologie oder beheizte Ausführung).
    glove_palm_material:
      name: Material der Handschuhinnenfläche
      description: Gibt das hauptsächlich verwendete Material der Handschuhinnenfläche
        an (der Hauptkontakt- bzw. Grifffläche), das sich von der Oberhand unterscheiden
        kann.
    glove_size:
      name: Handschuhgröße
      description: Gibt die allgemeine Handgröße an, für die die Pratzen ausgelegt
        sind, häufig angegeben in Bekleidungsgrößen oder Jugendgrößen.
    glove_webbing_style:
      name: Art des Fangnetzes des Handschuhs
      description: Definiert die Konstruktion des Fangnetzes bzw. der Fangtasche des
        Handschuhs, was Ballkontrolle, Positionseignung und Spielerpräferenzen beeinflusst.
    glow_effect:
      name: Leuchteffekt
      description: Gibt an, ob die Gelkugeln im Dunkeln leuchten oder Leuchtspur-Eigenschaften
        für Spiele bei schlechten Lichtverhältnissen besitzen.
    glow_plug_connector_type:
      name: Typ des Glühkerzensteckers
      description: Gibt die Art des elektrischen Anschlusses bzw. Steckers an der
        Glühkerze an, der mit dem Fahrzeugkabelbaum verbunden wird.
    glow_plug_heating_element_type:
      name: Typ des Glühkerzen-Heizelements
      description: Art bzw. Technologie des von der Glühkerze verwendeten Heizelements.
    glue_application_format:
      name: Auftragsformat des Klebstoffs
      description: Gibt das Applikator- bzw. Dosierformat an, das zum Auftragen des
        Schulklebers verwendet wird.
    glue_applicator_type:
      name: Art des Klebstoffapplikators
      description: Gibt die Art des integrierten Applikators bzw. der Dosierspitze
        zum Auftragen des Flüssigklebers an.
    glue_base_formulation:
      name: Basisformulierung des Klebstoffs
      description: Gibt die hauptsächliche chemische bzw. grundlegende Formulierung
        des Bastelflüssigklebers an (hinsichtlich Leistung, Sicherheit und Reinigung).
    glue_gun_nozzle_style:
      name: Art der Heißklebepistolendüse
      description: Gibt die physische Form der Düsenspitze der Heißklebepistole an,
        die Präzision und Klebstoffabdeckung beeinflusst.
    glue_safety_standard:
      name: Klebstoffsicherheitsnorm
      description: Gibt an, ob der Klebstoff gemäß Kennzeichnung und gängigen Standards
        ungiftig bzw. kindersicher ist.
    goal_frame_material:
      name: Material des Torrahmens
      description: Gibt das Material von Torpfosten bzw. Torrahmen an, das Gewicht,
        Transportfähigkeit und Witterungsbeständigkeit beeinflusst.
    goal_size:
      name: Torgröße
      description: Klassifiziert ein Fußballtor in gängige Wettkampf- oder Trainingsgrößen
        für eine schnellere Auswahl als anhand reiner Maße.
    goal_size_classification:
      name: Torgrößen-Klassifizierung
      description: Kennzeichnet die standardisierte Größenklasse des Tores (z. B.
        Standardgröße, Jugend oder Mini), damit Nutzer:innen schnell passende Ausrüstung
        für ihr Spielniveau auswählen können.
    goal_size_standard:
      name: Standard der Torgröße
      description: Gibt an, welchem offiziellen bzw. Altersgruppenstandard das Tor
        entspricht (z. B. World-Aquatics-Regelwerk oder 12U).
    goalie_configuration:
      name: Torhüterkonfiguration
      description: Kennzeichnet die Anzahl der Torhüter pro Seite am Tisch (amerikanischer
        Stil mit 3 Torhütern vs. europäischer Stil mit 1 Torhüter).
    goalie_playing_surface:
      name: Torhüterspielfläche
      description: Gibt die hauptsächliche Spielfläche bzw. Einsatzumgebung an, für
        die das Eishockey-Torwartset ausgelegt ist.
    goalkeeper_glove_cut:
      name: Torwarthandschuhschnitt
      description: Gibt den Schnitt der Handfläche bzw. Finger von Torwarthandschuhen
        an, der Passform, Ballgefühl und Kontrolle beeinflusst.
    goalkeeper_training_aid_type:
      name: Typ der Trainingshilfen für Torwarte
      description: Kennzeichnet die Art der Torwart-Trainingshilfe und ermöglicht
        eine präzise Filterung.
    goblet_drum_playing_style:
      name: Spielstil der Goblet Drum
      description: Gibt an, ob das Instrument hauptsächlich für das Spielen mit den
        Händen oder mit Sticks/Schlägeln ausgelegt ist.
    gobo_format:
      name: Gobo-Format
      description: Gibt die vom Projektor unterstützte Gobo-Größe bzw. den Gobo-Standard
        an (Durchmesser- und Dickenklasse), um die Kompatibilität mit Ersatz- bzw.
        Sonder-Gobos sicherzustellen.
    gobo_root_variety:
      name: Klettenwurzelsorte
      description: Gibt die konkrete Sorte bzw. Varietät der Klettenwurzel an.
    gobo_rotation:
      name: Gobo-Rotation
      description: Gibt an, ob sich das Gobo drehen kann und welche Drehrichtung unterstützt
        wird.
    goggle_accessory_type:
      name: Art des Zubehörs für Brillen
      description: Klassifiziert die Art des Zubehörs (z. B. Hülle, Etui oder Gurt),
        damit Käufer:innen das vielfältige Produktsortiment innerhalb dieser Oberkategorie
        filtern können.
    goggle_features:
      name: Funktionen der Schutzbrille
      description: Listet besondere funktionale bzw. Designmerkmale der Schutzbrille
        auf.
    goggle_fit_design:
      name: Passformdesign der Schutzbrille
      description: Beschreibt, wie die Schutzbrille sitzen bzw. getragen werden soll,
        einschließlich OTG-Kompatibilität (Over the Glasses).
    goggle_gasket_material:
      name: Material der Schutzbrillendichtung
      description: Material der Dichtung, die am Gesicht anliegt und Komfort, Allergieverträglichkeit
        sowie Auslaufschutz beeinflusst.
    goggle_integration:
      name: Schutzbrillenintegration
      description: Gibt an, ob der Helm für die Verwendung mit Skibrillen ausgelegt
        ist und/oder integrierte Funktionen zur Befestigung der Skibrille besitzt.
    goggle_lens_shape:
      name: Form der Schutzbrillengläser
      description: Definiert das Krümmungsprofil der Ersatzlinse, das Verzerrung und
        Sichtfeld beeinflusst (z. B. zylindrisch, sphärisch oder torisch).
    goggle_lens_tint:
      name: Tönung der Schutzbrillengläser
      description: Definiert die Tönung bzw. Oberflächenbeschaffenheit der Linse,
        die Lichtdurchlässigkeit, Farbwahrnehmung und ästhetisches Erscheinungsbild
        beeinflusst.
    goggle_strap_material:
      name: Material des Schutzbrillenbands
      description: Hauptmaterial des Kopfbands, das Haltbarkeit und Tragekomfort beeinflusst.
    golf_accessory_set_purpose:
      name: Zweck des Golfzubehörsets
      description: Gibt den hauptsächlichen Verwendungszweck bzw. das Thema des Golfzubehörsets
        an.
    golf_bag_style:
      name: Stil des Golfbags
      description: Kennzeichnet die hauptsächliche Bauart bzw. Verwendung des Golfbags
        (z. B. Standbag, Cartbag oder Staffbag).
    golf_ball_alignment_design:
      name: Ausrichtungsdesign des Golfballs
      description: Gibt integrierte visuelle Ausrichtungshilfen an, die auf die Balloberfläche
        gedruckt oder eingeprägt sind.
    golf_ball_construction:
      name: Konstruktion des Golfballs
      description: Gibt die Anzahl der Schichten bzw. Bestandteile des Golfballs an,
        was Spin, Spielgefühl und Weite beeinflusst.
    golf_ball_cover_material:
      name: Material der Golfballhülle
      description: Kennzeichnet das äußere Hüllenmaterial des Golfballs, das Spin,
        Haltbarkeit und Spielgefühl beeinflusst.
    golf_cart_cover_climate_use:
      name: Klimaeignung der Golfcart-Abdeckung
      description: Gibt die hauptsächlichen Klima- bzw. Wetterbedingungen an, für
        die die Abdeckung ausgelegt ist.
    golf_cart_enclosure_fit_type:
      name: Passformtyp des Golfcart-Gehäuses
      description: Gibt an, ob das Gehäuse für eine bestimmte Sitzanzahl bzw. Bauform
        ausgelegt ist oder eine universelle/einstellbare Passform bietet.
    golf_cart_intended_use:
      name: Verwendungszweck des Golfcarts
      description: Gibt den hauptsächlichen Verwendungszweck an, für den das Golfcart
        ausgelegt bzw. konfiguriert ist.
    golf_club_number:
      name: Nummer des Golfschlägers
      description: Kennzeichnet die spezifische Nummer bzw. Wedge-Bezeichnung auf
        dem Schläger (z. B. 5, PW oder GW).
    golf_club_part_type:
      name: Art des Golfschlägerteils
      description: Unterteilt das Golfschlägerzubehör bzw. die Komponente in gängige
        Untertypen (z. B. Adapterhülse, Ferrule oder Gewicht).
    golf_grip_size:
      name: Größe des Golfgriffs
      description: Gibt die äußere Größenkategorie des Golfgriffs an und zeigt damit,
        wie dick sich der Griff in der Hand anfühlt.
    golf_shoe_spike_type:
      name: Art der Golfschuhspikes
      description: Kennzeichnet die Art des Traktionssystems an der Außensohle von
        Golfschuhen (z. B. mit Spikes oder spikelos).
    golf_tee_style:
      name: Golf-Tee-Stil
      description: Beschreibt die strukturelle bzw. funktionale Bauart des Golf-Tees,
        die Ballhöhe, Haltbarkeit oder Spinreduzierung beeinflusst.
    golf_training_focus:
      name: Schwerpunkt des Golftrainings
      description: Klassifiziert die primäre Fähigkeit bzw. den Aspekt, den das Produkt
        verbessern soll.
    golf_training_objective:
      name: Ziel des Golftrainings
      description: Identifiziert die primäre Fähigkeit bzw. den Aspekt im Golf, den
        die Trainingshilfe verbessern soll.
    gong_profile_type:
      name: Typ des Gongprofils
      description: Beschreibt das physische Profil des Operngongs (z. B. flache oder
        erhöhte Mitte), das Klang und Spielweise stark beeinflusst.
    grading_scale:
      name: Bewertungsskala
      description: Die Bewertungsskala, die für die graduierte Anlagemünze verwendet
        wird (z. B. Sheldon 1–70).
    grading_service:
      name: Bewertungsdienst
      description: Externer Bewertungs- bzw. Zertifizierungsdienst für Münze oder
        Banknote (z. B. PCGS oder NGC).
    graduation_increment:
      name: Skalenteilung
      description: Gibt die kleinste gedruckte bzw. gravierte Teilung auf der Skala
        der Nahtlehre an (die Auflösung der Markierungen).
    grain_processing_method:
      name: Getreideverarbeitungsmethode
      description: Gibt die hauptsächliche Verarbeitungsmethode des Getreides an (z. B.
        parboiled, gewalzt oder gekeimt), die Kochzeit, Textur und Nährwert beeinflusst.
    grand_piano_soundboard_material:
      name: Material des Flügel-Resonanzbodens
      description: Hauptmaterial des Klavierresonanzbodens, das Klang und Haltbarkeit
        beeinflusst.
    grappling_dummy_pose:
      name: Pose des Grappling-Dummys
      description: Beschreibt die Standard-Körperhaltung der Trainingspuppe und bestimmt,
        welche Übungen und Techniken sie unterstützt.
    grease_application:
      name: Verwendungszweck des Schmierfetts
      description: Gibt die primäre Fahrzeugkomponente bzw. den Einsatzbereich an,
        für die bzw. den das Schmierfett vorgesehen ist.
    grease_consistency_grade_nlgi:
      name: Konsistenzklasse des Schmierfetts (NLGI)
      description: Gibt die NLGI-Konsistenzklasse an, die die Festigkeit des Schmierfetts
        beschreibt (z. B. ist NLGI 2 ein gängiges Mehrzweckfett).
    grease_thickener_type:
      name: Typ des Fettverdickers
      description: Gibt das Verdicker- bzw. Seifensystem an, das in der Schmierfettformulierung
        verwendet wird.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Art des Blasrohrventils der Great Highland Bagpipes
      description: Gibt das im Blasrohr verwendete Rückschlagventilsystem an.
    great_highland_bagpipes_drone_configuration:
      name: Bordunkonfiguration der Great Highland Bagpipes
      description: Gibt die im Set enthaltenen Drohnentypen an.
    great_highland_bagpipes_mounting_material:
      name: Material der Zierbeschläge der Great Highland Bagpipes
      description: Gibt das Material der Zierbeschläge der Dudelsäcke an (z. B. Neusilber
        oder Elfenbeinimitat).
    greens_maturity_stage:
      name: Reifestadium des Blattgemüses
      description: Gibt das Entwicklungsstadium des Blattgemüses zum Erntezeitpunkt
        an.
    greens_preparation_state:
      name: Verarbeitungszustand des Blattgemüses
      description: Beschreibt, wie das Blattgemüse verarbeitet bzw. verpackt ist (z. B.
        vorgewaschen, gehackt oder verzehrfertig).
    grenade_effect_type:
      name: Art des Granateneffekts
      description: Kennzeichnet den hauptsächlichen Effekt der Paintballgranate nach
        der Aktivierung (z. B. Rauch, Farbe oder Blendgranate).
    grid_unit:
      name: Maßeinheit des Rasters
      description: Das primäre Maßsystem, das auf der Matte aufgedruckt ist (falls
        ein Raster/eine Skala vorhanden ist).
    grille_emblem_provision:
      name: Vorrichtung für das Kühlergrillemblem
      description: Gibt an, ob und wie der Kühlergrill ein OEM-Emblem bzw. -Logo unterstützt.
    grille_mounting_method:
      name: Montagemethode für Kühlergrill
      description: Gibt an, wie der Kühlergrill am Fahrzeug montiert wird (z. B. direkter
        Austausch oder Einsatz/Overlay, verschraubt oder geklipst/eingerastet, Bohren
        erforderlich oder nicht erforderlich).
    grille_style:
      name: Kühlergrillstil
      description: Gibt den visuellen bzw. gestalterischen Stil des Fahrzeuggrills
        an.
    grip_chalk_form:
      name: Form der Griffkreide
      description: Kennzeichnet die physische Form der Kreide, die mit dem Beutel
        geliefert wird bzw. verwendet wird.
    grip_coverage:
      name: Griffabdeckung
      description: Kennzeichnet Vorhandensein und Position von Silikon- bzw. gummierten
        Griffelementen an der Socke.
    grip_design:
      name: Griffdesign
      description: Gibt die Griff- bzw. Lochkonfiguration der Gewichtsscheibe an,
        um Tragen und vielseitige Trainingsmöglichkeiten zu erleichtern.
    grip_enhancer_effect:
      name: Effekt des Griffverstärkers
      description: Beschreibt das primäre Leistungsmerkmal des Produkts (z. B. Feuchtigkeitsaufnahme
        oder klebriges Harzfinish).
    grip_enhancer_form:
      name: Form des Griffverstärkers
      description: Kennzeichnet die physische Form bzw. das Format des Griffverstärkerprodukts,
        damit Sportler:innen die passende Anwendungsmethode auswählen können.
    grip_features:
      name: Griffmerkmale
      description: Kennzeichnet integrierte Griffmerkmale, die Halt, Komfort oder
        Kontrolle während des Spiels verbessern sollen.
    grip_material:
      name: Griffmaterial
      description: Gibt das Material der griffigen Oberfläche der Hose an.
    grip_shape:
      name: Form des Griffs
      description: Beschreibt die Querschnittsform bzw. den Stil des Griffs, insbesondere
        bei Puttergriffen.
    grip_surface_type:
      name: Oberflächentyp des Griffs
      description: Beschreibt das Design der Pedaltrittfläche bzw. Traktionsoberfläche,
        das Grip und Fahrgefühl beeinflusst.
    grip_tackiness_level:
      name: Grad der Griffigkeit
      description: Bewertet, wie griffig bzw. klebrig die Griffoberfläche ist, und
        hilft Spieler:innen bei der Wahl zwischen trockenem Griffgefühl und besonders
        griffiger Kontrolle.
    grip_tape_form:
      name: Form des Griffbands
      description: Gibt die Darreichungsform des Griptape-Produkts an (z. B. Bogen,
        Rolle oder Sprühkit).
    grip_wax_form:
      name: Form des Griffwachses
      description: Klassifiziert die physische Form, in der das Griffwachs verkauft
        wird.
    gripper_coverage:
      name: Greiferabdeckung
      description: Gibt die Art des Greifers am rutschfesten Schuh an und kennzeichnet
        Oberflächenabdeckung sowie Abnehmbarkeit.
    grommet_application_material:
      name: Einsatzmaterial der Ösen
      description: Primärmaterial(ien), in die die Ösen eingesetzt werden sollen (z. B.
        Stoff, Leder, Vinyl oder Plane/Canvas).
    grommet_duty_rating:
      name: Belastungsklasse der Ösen
      description: Gibt die vorgesehene Festigkeits- bzw. Verwendungsklasse der Öse
        an.
    grommet_style:
      name: Stil der Ösen
      description: Bauart des Ösensets (wie es montiert bzw. verwendet wird).
    grooming_glove_texture_type:
      name: Textur des Pflegehandschuhs
      description: Kennzeichnet die primäre Oberflächenstruktur für die Pflege und
        gibt damit den vorgesehenen Zweck an, z. B. Schrubben, Polieren oder Waschen.
    groove_orientation:
      name: Ausrichtung der Nuten
      description: Beschreibt die Richtung bzw. Anordnung von Rillen oder Stegen auf
        dem Instrument.
    groove_sampler_onboard_effects:
      name: Integrierte Effekte des Groove-Samplers
      description: Gibt die Kategorien der integrierten Effektbearbeitung an, die
        im Groove-Sampler verfügbar sind (Insert/Master), z. B. Hall, Delay, Kompression,
        Verzerrung, EQ oder Filterung.
    groove_sampler_storage_expansion_type:
      name: Typ der Speichererweiterung des Groove-Samplers
      description: Gibt die vom Groove-Sampler unterstützten abnehmbaren bzw. erweiterbaren
        Speicheroptionen an.
    ground_attachment_method:
      name: Bodenbefestigungsmethode
      description: Beschreibt, wie der Passbogen auf dem Spielfeld befestigt wird,
        was Stabilität und Untergrundkompatibilität beeinflusst.
    groupset_components_included:
      name: Groupset-Komponenten inklusive
      description: Listet die spezifischen Antriebskomponenten auf, die im Gruppensatz
        enthalten sind, damit Kunden den Bundle-Inhalt nachvollziehen können.
    gt_racing_class:
      name: GT-Rennklasse
      description: Gibt die GT-Kategorie bzw. -Klasse an, für die das Fahrzeug gebaut
        oder homologiert wurde.
    guard_construction_type:
      name: Schutzkonstruktionstyp
      description: Gibt an, ob es sich bei dem Schutz um einen Hartschalenprotektor,
        eine weiche Protektoreinlage oder eine Manschetten-/Gurtkonstruktion handelt.
    guard_size_measurement_basis:
      name: Messgrundlage für die Schutzgröße
      description: Gibt an, auf welcher Messung die Größenbestimmung basiert (z. B.
        Ellbogenumfang, Handgelenkumfang oder Unterarmumfang).
    guard_style:
      name: Stil des Schutzes
      description: Klassifiziert Bauart bzw. Typ des Schlittschuhkufenschutzes, damit
        Käufer:innen schnell zwischen harten Gehschützern, weichen Schonern, federbelasteten
        Schützern und anderen Ausführungen unterscheiden können.
    guava_flesh_color:
      name: Farbe des Guavenfruchtfleischs
      description: Gibt die Farbe des inneren Fruchtfleischs der Guave an.
    guava_variety:
      name: Guavensorte
      description: Kennzeichnet die spezifische Sorte bzw. Marktsorte der verkauften
        Guave (z. B. Apple Guava, Mexican Cream, Thai, Pink, Seedless oder White).
    guide_material:
      name: Führungsmaterial
      description: Material der Schnurführungen bzw. Einsätze der Rute.
    guide_type:
      name: Typ der Rutenringe
      description: Gibt die Art der an der Angelrute montierten Ringe an, z. B. Einzelfuß-,
        Rollen- oder Schlangenringe.
    guideline_markings:
      name: Leitlinienmarkierungen
      description: Art der visuellen Ausrichtungsmarkierungen, die auf die Oberfläche
        der Wurfmatte gedruckt oder eingelegt sind, um Wurfübungen zu unterstützen.
    guiro_scraper_material:
      name: Material des Guiro-Schabers
      description: Material des mitgelieferten bzw. empfohlenen Schabers/Schlägels
        für die Guiro.
    guiro_surface_style:
      name: Oberflächenstil der Guiro
      description: Beschreibt das Muster bzw. die Geometrie der Spielfläche, die zum
        Erzeugen von Tönen abgeschabt wird.
    guitar_body_finish_type:
      name: Art der Gitarrenkorpus-Lackierung
      description: Gibt die Oberflächenbehandlung des Gitarrenkorpus an.
    guitar_bridge_system_type:
      name: Typ des Gitarrenbrückensystems
      description: Designfamilie des Brücken-/Saitenhaltersystems für Kompatibilität
        und Produktsuche.
    guitar_case_style:
      name: Stil des Gitarrenkoffers
      description: Gibt den allgemeinen Schutz- bzw. Strukturstil des Gitarrenkoffers
        oder Gigbags an.
    guitar_humidifier_placement:
      name: Platzierung des Gitarrenbefeuchters
      description: Gibt an, wo der Luftbefeuchter im Verhältnis zum Instrument oder
        zur Umgebung verwendet bzw. platziert werden soll.
    guitar_pedal_i_o_configuration:
      name: I/O-Konfiguration des Gitarrenpedals
      description: Gibt an, ob das Pedal Mono- oder Stereo-Ein-/Ausgangsrouting unterstützt.
    guitar_pedal_output_connector_type:
      name: Typ des Ausgangsanschlusses des Gitarrenpedals
      description: Gibt den vom Pedal verwendeten Audioausgangsanschlusstyp an.
    guitar_slide_finish:
      name: Finish des Gitarren-Slides
      description: Oberflächenfinish des Slides, das Spielgefühl und Reibung an den
        Saiten beeinflusst.
    guitar_slide_style:
      name: Gitarren-Slide-Stil
      description: Gibt die Bauform des Gitarren-Slides bzw. Tonbars sowie dessen
        Trage- bzw. Verwendungsweise an.
    guitar_stand_type:
      name: Typ des Gitarrenständers
      description: Gibt die primäre Bauform des Gitarrenständers an (wie die Gitarre
        gestützt bzw. aufbewahrt wird).
    guitar_strap_attachment_type:
      name: Typ der Gitarrengurtbefestigung
      description: Gibt an, wie der Gurt an der Gitarre bzw. den Gurtknöpfen befestigt
        wird, einschließlich der Verwendung traditioneller Enden oder Schnellverschlusssysteme.
    guitar_strap_end_material:
      name: Material der Gitarrengurtenden
      description: Material der Gurtenden bzw. Laschen (die Teile, die an Gurtknöpfen
        oder Strap-Lock-Systemen befestigt werden).
    guitar_strap_features:
      name: Gitarrengurteigenschaften
      description: Bemerkenswerte Funktionsmerkmale des Gitarrengurts zusätzlich zu
        grundlegender Größe bzw. Material (Mehrfachauswahl).
    guitar_string_coating:
      name: Beschichtung der Gitarrensaiten
      description: Gibt an, ob die Saiten eine Schutzbeschichtung besitzen und gegebenenfalls,
        welche Art von Beschichtung verwendet wird.
    guitar_string_gauge_type:
      name: Typ der Gitarrensaitenstärke
      description: Die vermarktete Stärkenkategorie eines Akustikgitarrensaitensatzes
        (z. B. extra light, light oder medium). Wird häufig anhand der Stärke der
        hohen E-Saite angenähert; die genauen Stärkenbereiche können je nach Hersteller
        variieren.
    guitar_string_set_gauge_category:
      name: Stärkenkategorie des Gitarrensaitensatzes
      description: Gängige vermarktete Saitenstärkenfamilien für Gitarrensaitensätze
        (typischerweise abgeleitet von der hohen E-Saite bzw. 1. Saite).
    guitar_string_winding_type:
      name: Wicklungsart der Gitarrensaiten
      description: Gibt die äußere Wicklungsart der umwickelten Saiten im Set an.
    guitar_tuning_peg_button_shape:
      name: Form der Gitarrenwirbelknöpfe
      description: Form bzw. Stil des Stimmwirbels bzw. -knopfs.
    guitar_tuning_peg_configuration:
      name: Konfiguration der Gitarrenstimmwirbel
      description: Anordnung des Mechaniksatzes auf der Kopfplatte.
    guitar_tuning_peg_mounting_style:
      name: Befestigungsart der Gitarrenstimmwirbel
      description: Gibt an, wie die Stimmmechanik an der Kopfplatte befestigt wird
        (Buchsenausführung und Verdrehschutz).
    guitar_tuning_peg_shaft_type:
      name: Typ der Gitarrenstimmwirbelwelle
      description: Gibt an, ob der Saitenpfosten massiv oder geschlitzt ist und wie
        die Saite befestigt wird.
    guitar_tuning_peg_style:
      name: Stil der Gitarrenstimmwirbel
      description: Die physische Bauart der Stimmmechanik bzw. des Wirbels sowie das
        Befestigungsformat an der Kopfplatte eines Instruments (z. B. gekapseltes
        oder offenes Getriebe, Locking, Split-Post).
    gum_condition:
      name: Zustand der Gummierung
      description: Zustand bzw. Status der Gummierung auf der Rückseite der Briefmarke
        (z. B. postfrisch, mit Falz oder ohne Gummierung).
    gun_action_type:
      name: Mechanismus der Waffe
      description: Mechanische Funktionsart zum Laden bzw. Abfeuern (z. B. Repetier-
        oder Hebelmechanismus).
    gun_operational_status:
      name: Betriebsstatus der Waffe
      description: Gibt an, ob die Sammlerwaffe deaktiviert bzw. nicht schussfähig
        ist (und wie sie präsentiert wird).
    gun_type:
      name: Waffentyp
      description: Kennzeichnet den allgemeinen Bauformtyp der antiken Schusswaffe.
    gusset_material:
      name: Zwickelmaterial
      description: Gibt das im Schritt- bzw. Zwickelfutter verwendete Material an,
        das Atmungsaktivität, Hygiene und Tragekomfort beeinflusst.
    gymnastics_discipline:
      name: Gymnastikdisziplin
      description: Gibt die Turnsportart an, für die das Produkt vorgesehen ist (z. B.
        Kunstturnen, Rhythmische Sportgymnastik oder Akrobatik).
    hair_extension_texture:
      name: Struktur der Haarverlängerung
      description: Beschreibt das Locken-, Wellen- bzw. Strukturmuster der Extensionssträhnen.
    hair_net_style:
      name: Stil des Haarnetzes
      description: Kennzeichnet die Design- bzw. Konstruktionsart des Haarnetzes (z. B.
        Bouffant, Snood oder Duttabdeckung).
    hair_quality_grade:
      name: Qualitätsstufe des Haarteils
      description: Kennzeichnet branchenübliche Qualitäts- bzw. Herkunftsbezeichnungen
        des Haares.
    halter_style:
      name: Stil des Halfters
      description: Kennzeichnet den funktionalen bzw. gestalterischen Stil des Halfters
        (z. B. Seil-, Sicherheits- oder Showhalfter) und hilft Käufer:innen bei der
        Auswahl eines passenden Halfters für den vorgesehenen Einsatzbereich.
    hammock_style:
      name: Stil der Hängematte
      description: Beschreibt die Bauart bzw. Konstruktion der Hängematte.
    hand_and_foot_coverage:
      name: Hand- und Fußabdeckung
      description: Beschreibt integrierte oder abnehmbare Fäustlinge und Fußüberzüge,
        die Hände und/oder Füße bedecken.
    hand_cymbal_set_configuration:
      name: Konfiguration des Handbeckensets
      description: Gibt an, ob das Produkt als abgestimmtes Paar, einzelnes Becken
        oder größeres Set verkauft wird.
    hand_drum_head_material:
      name: Material des Handtrommelfells
      description: Material des Trommelfells (der Membran), das bei der Kelchtrommel
        verwendet wird.
    hand_exerciser_style:
      name: Stil des Handtrainers
      description: Klassifiziert die Bauart bzw. den Mechanismus des Handtrainers.
    hand_guard_backbone_material:
      name: Material des Handschutzrückgrats
      description: Material des strukturellen Rückgrats bzw. Verstärkungselements
        (falls vorhanden), das Festigkeit und Schutz bestimmt.
    hand_guard_coverage_style:
      name: Stil der Handschutzabdeckung
      description: Beschreibt die Abdeckung bzw. das Profil des Handschutzes, was
        Wind- und Aufprallschutz beeinflusst.
    hand_guard_mounting_type:
      name: Montageart des Handschutzes
      description: Gibt an, wie die Handschützer am Motorrad befestigt werden (z. B.
        Lenkerende mit Innenklemme oder nur Klemme).
    hand_guard_set_configuration:
      name: Konfiguration des Handschutz-Sets
      description: Gibt an, ob das Produkt als links-/rechtsseitiges Paar oder einzeln
        verkauft wird.
    hand_guard_style:
      name: Stil des Handschutzes
      description: Beschreibt die Abdeckung bzw. den Stil des Handschutzes (z. B.
        geschlossen, offen, vollständig, leicht oder Standard).
    hand_guard_weather_protection:
      name: Wetterschutz des Handschutzes
      description: Gibt den vorgesehenen Wetterschutz der Handschützer an.
    hand_paddle_strap_type:
      name: Typ des Handpaddelriemens
      description: Gibt an, welche Art von Riemen bzw. ob kein Riemen verwendet wird,
        um das Handpaddel an der Hand der Benutzerin bzw. des Benutzers zu befestigen.
    hand_percussion_mount_attachment_mechanism:
      name: Befestigungsmechanismus der Handperkussionshalterung
      description: Gibt an, wie die Halterung an einem Ständer, Rack oder anderer
        Hardware befestigt wird (z. B. Klemm- oder Stangenbefestigung).
    hand_percussion_mounting_handling:
      name: Montage/Handhabung der Handperkussion
      description: Gibt an, ob das Instrument typischerweise in der Hand gehalten,
        getragen, montiert oder auf einem Tisch bzw. Boden platziert wird.
    hand_percussion_pitch_type:
      name: Tonhöhentyp der Handperkussion
      description: Gibt an, ob das Instrument eine bestimmte Tonhöhe (stimmbar/Töne)
        oder eine unbestimmte Tonhöhe erzeugt.
    hand_percussion_playing_method:
      name: Spielweise der Handperkussion
      description: Gibt an, wie das Instrument typischerweise gespielt wird, um Töne
        zu erzeugen (z. B. geschüttelt oder geschabt).
    hand_percussion_set_configuration:
      name: Konfiguration des Handperkussionssets
      description: Gibt an, ob es sich bei dem Produkt um ein einzelnes Instrument,
        ein abgestimmtes Paar oder ein mehrteiliges Set handelt.
    hand_percussion_size_class:
      name: Größenklasse der Handperkussion
      description: Allgemeine Größenkategorie des Instruments, wenn keine genaue Maßangabe
        vorhanden ist bzw. zur einfacheren Filterung.
    hand_sewing_needle_point_type:
      name: Typ der Handnähnadelspitze
      description: Form bzw. Stil der Handnähnadelspitze zum Durchstechen verschiedener
        Materialien (z. B. Gewebe, Strickwaren oder Leder) bzw. Garne.
    hand_support_level:
      name: Handstützgrad
      description: Gibt den Grad der Unterstützung bzw. Kompression an, den Handschuh,
        Bandage oder Riemen bieten.
    hand_support_size:
      name: Empfohlen für Handgröße
      description: Vom Hersteller angegebene Größe des Handschuhs, Riemens oder der
        Bandage (XS–XXL oder Einheitsgröße).
    handball_ball_type:
      name: Typ des Handballs
      description: Gibt die vorgesehene Nutzungskategorie des Handballs an, z. B.
        Spiel, Training oder Beachhandball.
    handball_playing_surface:
      name: Spielfläche des Handballs
      description: Gibt die Spielfläche(n) an, für die der Handball optimiert ist.
    handball_target_type:
      name: Typ des Handballziels
      description: Gibt die Art bzw. das Design des Wurfziels an, das für das Mannschaftshandballtraining
        vorgesehen ist.
    handbrake_actuation_type:
      name: Typ der Handbremsbetätigung
      description: Gibt an, wie die Feststellbremse betätigt wird.
    handbrake_orientation:
      name: Ausrichtung der Handbremse
      description: Gibt an, ob die Handbremse für Links- oder Rechtslenkerfahrzeuge
        ausgelegt ist oder universell verwendet werden kann.
    handgun_grip_material:
      name: Material des Handfeuerwaffengriffs
      description: Hauptmaterial der Griffschalen bzw. Verkleidungen der Handfeuerwaffe.
    handle_configuration:
      name: Griffkonfiguration
      description: Beschreibt die Bauart des Wakeboard-Griffs (z. B. einfach, doppelt,
        Deep-V oder T-Wrap), damit Käufer:innen passende Fähigkeiten, Tricks oder
        Boardtypen auswählen können.
    handle_ergonomics:
      name: Ergonomie des Griffs
      description: Beschreibt ergonomische Merkmale des Griffs zur Verbesserung von
        Komfort und Kontrolle.
    handle_grip_material:
      name: Griffmaterial
      description: Gibt das Material der Grifffläche des Griffs an, das Komfort und
        Griffigkeit beeinflusst, insbesondere bei Nässe.
    handle_grip_type:
      name: Griffform
      description: Gibt die Griffbeschichtung, das Griffmaterial bzw. die Oberflächenbeschaffenheit
        zur Verbesserung von Komfort und Kontrolle an.
    handle_shape:
      name: Form des Griffs
      description: Querschnittsform bzw. Profil des Griffs.
    handlebar_design:
      name: Lenkerdesign
      description: Gibt die Art der Lenker am Stepper an, z. B. keine, fest, höhenverstellbar,
        klappbar oder mit Widerstandsbändern.
    handlebar_type:
      name: Typ des Lenkers
      description: Kennzeichnet die Art des am Fahrrad montierten Lenkers, die Fahrhaltung,
        Kontrolle und Komfort beeinflusst.
    handslide_bore_type:
      name: Typ der Handschieberbohrung
      description: Gibt an, ob die Bassposaune einen Zug mit einfacher oder doppelter
        Bohrung verwendet.
    handwear_cuff_style:
      name: Stil der Handschuhstulpe
      description: Beschreibt die Stulpen- bzw. Handgelenkkonstruktion von Handschuhen
        oder Fäustlingen, die Abdeckung und Passform beeinflusst.
    handwear_insulation_material:
      name: Isoliermaterial der Handschuhe
      description: Kennzeichnet das Isolier- bzw. Futtermaterial im Inneren von Handschuhen
        oder Fäustlingen.
    handwear_size:
      name: Handschuhgröße
      description: Gibt die Größe von Handschuhen oder anderer Handbekleidung an,
        um eine passende Passform sicherzustellen.
    hang_glider_design:
      name: Design des Hängegleiters
      description: Klassifiziert die Bauart des Hängegleiters (z. B. Flexflügel, Starrflügel
        oder motorisiert).
    hanger_thread_size:
      name: Gewindegröße des Aufhängers
      description: Gibt die Gewindegröße bzw. den Gewindestandard an, der zur Befestigung
        des Aufhängers an Banksticks oder Bissanzeigern verwendet wird, um die Kompatibilität
        sicherzustellen.
    hanging_suspension_method:
      name: Aufhängungsmethode
      description: Definiert die primäre Hardware bzw. das System zum Aufhängen der
        Schaukel (z. B. Seil, Kette oder Gestellrahmen).
    hardtop_finish_type:
      name: Typ der Hardtop-Oberfläche
      description: Gibt den Zustand der äußeren Oberflächenbehandlung des Hardtops
        an (z. B. grundiert oder lackiert), was Montagebereitschaft und Erscheinungsbild
        beeinflusst.
    hardtop_shell_material:
      name: Material der Hardtop-Schale
      description: Gibt das Hauptmaterial der starren Hardtop-Schale eines Fahrzeugs
        an (nicht eines Bezugsstoffs), z. B. Fiberglas oder Aluminium.
    hardtop_window_configuration:
      name: Konfiguration der Hardtop-Fenster
      description: Beschreibt, welche Fenster im Hardtop enthalten sind und wie sie
        konfiguriert sind.
    harmonica_comb_material:
      name: Material des Kamms der Mundharmonika
      description: Material des Kanzellenkörpers der Mundharmonika.
    harmonica_cover_plate_finish:
      name: Oberflächenfinish der Mundharmonika-Abdeckplatten
      description: Gibt das Finish bzw. die Beschichtung der Mundharmonika-Abdeckplatten
        an.
    harmonica_cover_plate_material:
      name: Material der Mundharmonika-Abdeckplatten
      description: Material der äußeren Abdeckplatten.
    harmonica_finish:
      name: Finish der Mundharmonika
      description: Oberflächenfinish der Mundharmonika-Abdeckplatten bzw. des Korpus.
    harmonica_included_accessories:
      name: Enthaltenes Mundharmonikazubehör
      description: Gibt an, welches Zubehör im Lieferumfang der Mundharmonika enthalten
        ist.
    harmonica_note_range:
      name: Tonumfang der Mundharmonika
      description: Klassifizierung des Instrumentenumfangs im orchestralen Kontext
        (z. B. Bass, Bariton oder Tenor).
    harmonica_reed_plate_material:
      name: Material der Mundharmonika-Stimmplatte
      description: Material der Stimmplatten (z. B. Messing, Edelstahl oder Aluminium).
    harmonica_system_type:
      name: System/Typ der Mundharmonika
      description: Kennzeichnet das Orchester-Mundharmonikasystem bzw. die Bauform
        (z. B. Chord, Bass, Bariton oder Polyphonia).
    harmonica_tuning_system:
      name: Stimmsystem für Mundharmonika
      description: Gibt das Stimmungslayout bzw. -system der Mundharmonika an (z. B.
        Richter-, Solo- oder Orchesterstimmung).
    harness_shell_type:
      name: Typ der Gurtschale
      description: Beschreibt die Steifigkeit der Schalenkonstruktion des Gurts (z. B.
        Softshell, Hardshell oder Hybrid).
    harness_style:
      name: Stil des Gurts
      description: Definiert die Bauart bzw. das Design des Gurts, z. B. Hüft-, Sitz-,
        Brust-/Westen-, Wing- oder Boardshort-Gurt bzw. Hybrid.
    harness_type:
      name: Gurttyp
      description: Klassifiziert die Bauart des Klettergurts, z. B. Sitz-, Ganzkörper-
        oder Brustgurt.
    harp_action_type:
      name: Art der Aktion für die Harfe
      description: Primärer Mechanismus zur Änderung von Tonhöhe bzw. Vorzeichen an
        der Harfe.
    harp_finish:
      name: Finish der Harfe
      description: Oberflächenfinish des Harfenkorpus (z. B. natur, gebeizt, lackiert
        oder bemalt).
    harp_included_accessories:
      name: Enthaltenes Harfenzubehör
      description: Listet das im Lieferumfang der Pedalharfe enthaltene Zubehör auf.
    harvest_method:
      name: Erntemethode
      description: Gibt an, ob die Meeresfrüchte aus Wildfang, Aquakultur oder einer
        anderen Gewinnungsmethode stammen.
    harvest_stage:
      name: Erntephase
      description: Gibt das Wachstumsstadium an, in dem der Rucola geerntet wurde,
        z. B. Microgreen, Baby Leaf oder ausgewachsener Bund.
    hat_style:
      name: Stil des Huts
      description: Beschreibt Bauart bzw. Stil des Partyhuts (z. B. Kegelhut, Krone,
        Zylinder oder Schirmmütze), um das grundlegende Erscheinungsbild des Artikels
        widerzuspiegeln.
    hazard_signal_mode:
      name: Modus des Warnsignals
      description: Wählbare Beleuchtungsmuster bzw. -modi für LED-/elektronische Warnfackeln.
    head_configuration:
      name: Kopfkonfiguration
      description: Gibt an, ob der Axtkopf eine Dechsel, einen Hammer, beides oder
        keines von beidem besitzt, was die Funktionalität auf Eis und gemischtem Gelände
        direkt beeinflusst.
    head_material:
      name: Kopfmaterial
      description: Material des mitgelieferten Quinto-Fells.
    head_movement_type:
      name: Art der Kopfbewegung
      description: Richtungsbeweglichkeit des Zweibein- oder Stockkopfs (z. B. Schwenken,
        Neigen oder Kippen).
    head_side:
      name: Fellseite
      description: Gibt an, ob das Trommelfell für die Schlagseite (Beater-Seite),
        die Resonanzseite (Vorderseite) oder beide Seiten vorgesehen ist.
    head_weight_style:
      name: Stil der Kopfgewichtung
      description: Kennzeichnet die Gewichtskonfiguration am Kopf der Fliege, die
        Sinkgeschwindigkeit und Präsentation beeinflusst.
    headband_embellishment:
      name: Verzierung des Haarbands
      description: Kennzeichnet dekorative Elemente am Haarband (z. B. Schleifen,
        Perlen, Kristalle oder Tierohren).
    headboard_style:
      name: Stil des Kopfteils
      description: Beschreibt die Bauart bzw. das Design des mit dem Bett gelieferten
        Kopfteils.
    headgear_strap_configuration:
      name: Konfiguration der Kopfschutzriemen
      description: Gibt die Anzahl der Riemen an, mit denen der Wrestling-Kopfschutz
        befestigt wird.
    headjoint_crown_style:
      name: Stil der Kopfstückkrone
      description: Gibt die Bauart bzw. das Design der Kopfstückkrone (Endkappe) der
        Flöte an, was Ästhetik sowie Gewicht/Balance beeinflussen kann.
    headjoint_pitch_standard:
      name: Stimmungsstandard des Kopfstücks
      description: Gibt den Stimmungsstandard des Kopfstücks an (z. B. A=440 oder
        A=442).
    headliner_product_form:
      name: Dachhimmel-Produktform
      description: Gibt an, ob es sich bei dem Produkt um eine komplette geformte
        Dachhimmelbaugruppe, einen Ersatzstoff oder ein Reparatur-/Verkleidungsteil
        handelt.
    headrest_mount_attachment_method:
      name: Befestigungsmethode der Kopfstützenhalterung
      description: Gibt an, wie die Halterung an den Kopfstützen- bzw. Sitzpfosten
        befestigt wird.
    headrest_provision:
      name: Kopfstützenausstattung
      description: Gibt an, ob Kopfstützen enthalten sind und/oder Befestigungspunkte
        für Kopfstützen vorhanden sind.
    headset_standard:
      name: Steuersatzstandard
      description: Typ der vom Rahmen verwendeten Steuerrohr-/Steuersatzschnittstelle.
    headstall_style:
      name: Stil des Kopfstücks
      description: Klassifiziert die Bauart bzw. Ohr-/Stirnkonfiguration des Kopfstücks.
    headwear_intended_use:
      name: Vorgesehene Verwendung der Kopfbedeckung
      description: Gibt den primären Verwendungszweck bzw. Kontext für das Tragen
        des Turbans an (z. B. Haarausfall durch Chemotherapie, Schwimmen oder religiöse
        Gründe).
    hearing_enhancer_style:
      name: Stil des Hörverstärkers
      description: Beschreibt die Bauform des Geräts, damit Benutzer:innen zwischen
        Over-Ear-, In-Ear-, Hinter-dem-Kopf- und anderen Designs wählen können.
    heart_rate_monitoring_method:
      name: Methode zur Herzfrequenzüberwachung
      description: Kennzeichnet, wie das Gerät während des Trainings Herzfrequenzdaten
        erfasst.
    heart_rate_sensing_technology:
      name: Technologie zur Herzfrequenzerfassung
      description: Gibt die physiologische Messmethode an, mit der der Monitor die
        Herzfrequenz erfasst (z. B. elektrisches EKG oder optisches PPG).
    heart_rate_sensor_placement:
      name: Platzierung des Herzfrequenzsensors
      description: Gibt an, wo der Sensor getragen bzw. positioniert wird (am Körper
        oder Fahrrad), was Komfort und Messgenauigkeit beeinflusst.
    heat_retention_technology:
      name: Wärmespeichertechnologie
      description: Beschreibt Technologien, Beschichtungen oder Materialien, die Schwitzen
        bzw. thermische Aktivität bei trainingsorientierter Shapewear verstärken (z. B.
        Neopren-Saunaeffekt).
    heated_glass_feature:
      name: Funktion des beheizbaren Glases
      description: Gibt an, ob die Fensterscheibe integrierte elektrische Elemente
        wie Heizdrähte für die Heckscheibenenteisung und/oder eine im Glas integrierte
        Antenne besitzt.
    heater_control_actuation_method:
      name: Betätigungsart der Heizungssteuerung
      description: Gibt an, wie die Heizungs-/Klimasteuerung die HVAC-Einheit des
        Fahrzeugs betätigt (z. B. seilzug-, vakuum- oder elektronisch gesteuert).
    heater_control_electrical_connector_type:
      name: Typ des elektrischen Steckverbinders der Heizungssteuerung
      description: Gibt die Art bzw. Schnittstelle des elektrischen Steckverbinders
        der Heizungssteuerungseinheit an (z. B. Anschlusskabel oder Steckertyp).
    heating_technology:
      name: Heiztechnologie
      description: Kennzeichnet den primären Heizmechanismus, den der Verdampfer zur
        Umwandlung von Material in Dampf verwendet.
    heel_shape:
      name: Absatzform
      description: Gibt die geometrische Form bzw. Silhouette des Absatzes an und
        unterstützt Käufer:innen beim Filtern nach gewünschtem Stil und Stabilität
        (z. B. Stiletto- oder Blockabsatz).
    helicopter_mission_type:
      name: Einsatzart des Hubschraubers
      description: Primärer Verwendungszweck bzw. Einsatzbereich des Hubschraubers.
    helicopter_rotor_configuration:
      name: Rotor-Konfiguration des Hubschraubers
      description: Gibt die Anordnung des Hubschrauberrotorsystems an (Haupt-/Heckrotor),
        z. B. einzelner Hauptrotor mit Heckrotor, koaxial, Tandem oder ineinandergreifend.
    helmet_accessory_type:
      name: Art des Helmzubehörs
      description: Kennzeichnet die spezifische Art des Fahrradhelmteils bzw. Zubehörs,
        damit Käufer:innen schnell den richtigen Artikel finden können.
    helmet_audio_connector_type:
      name: Typ des Audioanschlusses des Helms
      description: Gibt den Typ des Flugzeug-Audioanschlusses an, der vom Kommunikationskabel
        des Helms verwendet wird, sofern vorhanden.
    helmet_communication_system_readiness:
      name: Kompatibilität mit Helmkommunikationssystemen
      description: Gibt an, ob der Helm für die Verwendung mit einem Intercom-/Bluetooth-Kommunikationssystem
        ausgelegt ist.
    helmet_construction_type:
      name: Helmkonstruktionstyp
      description: Beschreibt die Bauart der Helmschale und Innenausstattung (z. B.
        Schaumstoff, Hartschale oder Hybrid).
    helmet_fit_head_shape:
      name: Helmpassform (Kopfform)
      description: Das interne Passformprofil für unterschiedliche Kopfformen.
    helmet_interior_liner_type:
      name: Typ des Helminnenfutters
      description: Art des Komfortfutters sowie dessen Herausnehmbarkeit bzw. Waschbarkeit.
    helmet_liner_material:
      name: Helmfuttermaterial
      description: Gibt das Material des Innenfutters bzw. der Polsterung an, das
        Komfort und Stoßdämpfung bietet.
    helmet_retention_closure_type:
      name: Typ des Helmverschlusses
      description: Gibt den Verschluss- bzw. Befestigungsmechanismus des Helm-Kinnriemens
        an (z. B. Doppel-D-Ring oder mikrometrische Ratsche).
    helmet_safety_certification:
      name: Sicherheitszertifizierung des Helms
      description: Listet die Sicherheitsstandards bzw. Zertifizierungen auf, die
        der Helm erfüllt.
    helmet_safety_certification_standard:
      name: Standard der Sicherheitszertifizierung des Helms
      description: Sicherheits- bzw. Homologationsstandards, für die der Motorradhelm
        zertifiziert ist.
    helmet_shell_material:
      name: Außenmaterial des Helms
      description: Primäres Außenschalenmaterial bzw. Konstruktionsprinzip des Helms.
    helmet_size_system:
      name: Helmgrößensystem
      description: Das Größenschema zur Angabe der Helmgröße.
    helmet_sun_visor_type:
      name: Typ des Helmsonnenvisiers
      description: Gibt an, ob der Helm über ein internes herunterklappbares Sonnenvisier,
        ein getöntes Außenvisier, beides oder keines von beiden verfügt.
    helmet_vehicle_fit:
      name: Vorgesehene Fahrzeugart des Helms
      description: Fahrzeugtyp bzw. Fahrzweck, für den der Helm vorgesehen ist.
    helmet_ventilation_adjustability:
      name: Einstellbarkeit der Helmbelüftung
      description: Gibt an, wie die Helmbelüftung von der fahrenden Person gesteuert
        werden kann.
    helmet_ventilation_configuration:
      name: Konfiguration der Helmbelüftung
      description: Beschreibt Aufbau und Einstellbarkeit der Helmbelüftung (z. B.
        Kinn-, Stirn-/Lufteinlass- oder verschließbare Belüftungsöffnungen).
    helmet_visor_peak_adjustability:
      name: Verstellbarkeit des Helmvisiers/-schirms
      description: Gibt an, ob der Schirm bzw. das Visier des Offroad-Helms verstellbar
        und/oder abnehmbar ist.
    helmet_visor_shield_optical_features:
      name: Optische Eigenschaften des Helmvisiers
      description: Optische Eigenschaften und Kompatibilitätsmerkmale des Hauptvisiers.
    helmet_visor_shield_type:
      name: Typ des Helmvisiers
      description: Primäre Visierkonfiguration des Helms.
    hem_style:
      name: Stil des Saums
      description: Kennzeichnet die Verarbeitungsart des Beinabschlusses, z. B. sauber,
        umgeschlagen oder offen, die das Erscheinungsbild des Kleidungsstücks maßgeblich
        beeinflusst.
    hemisphere_compatibility:
      name: Kompatibilität mit Hemisphären
      description: Gibt anhand der sichtbaren Sternbilder an, für welche Hemisphäre
        die Sternenkarte ausgelegt ist.
    hemline_style:
      name: Stil des Saums
      description: Definiert Schnitt bzw. Design des unteren Kleidsaums.
    herbal_infusion_function:
      name: Funktion des Kräuteraufgusses
      description: Kennzeichnet den primären Wellness- bzw. Funktionsnutzen, mit dem
        der Kräuteraufguss beworben wird.
    hex_size:
      name: Sechskantgröße
      description: Gibt die Größe des Sechskantschlüssels an, der zum Ein- bzw. Ausbau
        der Glühkerze erforderlich ist.
    hi_hat_pair_type:
      name: Typ des Hi-Hat-Paars
      description: Gibt an, ob es sich beim Angebot um ein abgestimmtes Top-/Bottom-Paar
        oder eine einzelne Beckenkomponente handelt.
    hi_hat_sound_character:
      name: Hi-Hat-Klangcharakter
      description: Beschreibt das allgemeine Klangprofil, damit Käufer:innen nach
        dem gewünschten Sound filtern können.
    high_visibility_class:
      name: Warnschutzstandard
      description: Gibt die Sichtbarkeitsklassifizierung des Kleidungsstücks gemäß
        ANSI/ISEA 107 an.
    highback_style:
      name: Stil des Highbacks
      description: Beschreibt Bauart bzw. Design des Highbacks, die die Fahreigenschaften
        beeinflussen.
    hitch_ball_diameter:
      name: Kugeldurchmesser der Anhängerkupplung
      description: Durchmesser des Kugelkopfs der Anhängerkupplung, der mit der Anhängerkupplung
        des Anhängers verbunden wird (z. B. 1 7/8 Zoll, 2 Zoll, 2 5/16 Zoll oder 50
        mm).
    hitch_ball_mounting_style:
      name: Befestigungsart der Anhängerkupplungskugel
      description: Gibt an, ob es sich bei der Anhängerkupplungskugel um eine Standardkugel
        mit Mutterbefestigung, eine fest eingepresste Ausführung für bestimmte Kupplungsköpfe
        oder eine Kugel mit integrierter Hardware handelt.
    hobby_horse_handle_type:
      name: Griffart des Steckenpferds
      description: Gibt die Griffkonstruktion an, die zum Halten oder Lenken des Steckenpferds
        verwendet wird.
    hobby_horse_sound_features:
      name: Soundfunktionen des Steckenpferds
      description: Gibt an, ob das Steckenpferd Soundeffekte besitzt und um welche
        Art es sich handelt.
    hockey_goal_type:
      name: Typ des Hockeytors
      description: Gibt die Bauart bzw. den vorgesehenen Einsatzbereich des Hockeytors
        an (z. B. reguläres Eishockey, Street Hockey oder Minihockey).
    hockey_size_category:
      name: Größe des Hockeyschlägers nach Kategorie
      description: Kennzeichnet das standardisierte Größensegment der Ausrüstung,
        zu dem das Teil passt (Youth, Junior, Intermediate oder Senior).
    hockey_size_segment:
      name: Hockey-Größensegment
      description: Gibt das standardisierte Größensegment der Hockeyausrüstung an,
        das Gesamtgröße und Passform der Schoner bestimmt.
    hold_surface_texture:
      name: Oberflächentextur des Griffs
      description: Beschreibt die Rauheit bzw. haptische Oberflächenbeschaffenheit
        der Grifffläche.
    home_decor_sewing_pattern_project_type:
      name: Projektart des Home-Deko-Schnittmusters
      description: Gibt an, welche Art von Home-Deko-Artikel mit dem Schnittmuster
        hergestellt wird (z. B. Kissenbezug, Vorhang oder Tischläufer).
    homologation_rule_set:
      name: Homologation/Regelwerk
      description: Gibt an, welcher Zulassungsbehörde bzw. welchem Regelwerk das Fahrzeug
        entspricht (sofern zutreffend).
    honey_form:
      name: Honigform
      description: Gibt die physische Form bzw. Darreichungsform des Honigprodukts
        an.
    honey_processing_method:
      name: Honigverarbeitungsmethode
      description: Gibt an, wie der Honig vor der Verpackung behandelt bzw. verarbeitet
        wurde.
    honey_variety:
      name: Auswahl an Honig
      description: Kennzeichnet die botanische bzw. florale Herkunft des Honigs–ob
        monofloral oder polyfloral–was Geschmack, Farbe und Preis direkt beeinflusst.
    hood_configuration:
      name: Kapuzenkonfiguration
      description: Beschreibt das Design der Kapuze und deren Einstellmöglichkeiten.
    hood_design:
      name: Kapuzenstil
      description: Gibt Vorhandensein und Art der Kapuze am Kleidungsstück an.
    hood_style:
      name: Kapuzentyp
      description: Gibt Vorhandensein und Art der Kapuze am Kleidungsstück an.
    hood_type:
      name: Kapuzentyp
      description: Kennzeichnet besondere Designmerkmale des Kapuzenteils des Kleidungsstücks.
    hook_and_eye_size_hook_number:
      name: Größe des Haken-und-Ösen-Verschlusses (Hakennummer)
      description: Standardisierte Größen-/Nummerierungsangabe für Haken-und-Ösen-Verschlüsse
        (sofern zutreffend), die auf der Verpackung zur Angabe der Gesamtgröße verwendet
        wird.
    hook_and_loop_fastener_duty_rating:
      name: Belastungsklasse des Klettverschlusses
      description: Gibt die vorgesehene Festigkeits- bzw. Belastungsklasse des Klettverschlusses
        an.
    hook_and_loop_fastener_format:
      name: Format des Klettverschlusses
      description: Gibt die physische Form bzw. das Verpackungsformat des Klettverschlussprodukts
        an (z. B. Rolle/Klebeband, Punkte oder Streifen).
    hook_and_loop_fastener_side:
      name: Seite des Klettverschlusses
      description: Gibt an, ob das Produkt nur die Hakenseite, nur die Flauschseite
        oder ein Set mit beiden Seiten umfasst.
    hook_coating_finish:
      name: Hakenbeschichtung
      description: Oberflächenbehandlung bzw. Beschichtung des Hakens zur Korrosionsbeständigkeit,
        Tarnung oder Farbgebung (z. B. schwarzes Nickel oder Blankzinn).
    hook_configuration:
      name: Hakenkonfiguration
      description: Beschreibt Vorhandensein und Art der mit dem Lockvogel gelieferten
        Haken.
    hook_eye_style:
      name: Öhrhakenstil
      description: Gibt die Form bzw. Ausrichtung der Hakenöse an, was beeinflusst,
        wie der Haken gebunden oder befestigt wird.
    hook_eye_type:
      name: Öhrhakentyp
      description: Gibt die Konstruktion der Hakenöse an, was sich auf Knotenauswahl
        und Montage auswirkt.
    hook_loop_format:
      name: Klettverschlussformat
      description: Gibt die physische Form des aufnähbaren Klettverschlusses an.
    hook_loop_side:
      name: Klettbandseite
      description: Gibt an, ob es sich bei dem Produkt um die Hakenseite, die Flauschseite
        oder ein passendes Klettverschluss-Set handelt.
    hook_material:
      name: Hakenmaterial
      description: Kennzeichnet das speziell für den Gaffhaken/-kopf verwendete Material,
        ein wichtiger Faktor für Festigkeit und Korrosionsbeständigkeit bei Salzwassereinsatz.
    hook_organizer_style:
      name: Stil des Hakenorganizers
      description: Die physische Bauart bzw. Form des Hakenorganizers (z. B. Koffer,
        Rolle oder Beutel), die das Durchsuchen und Filtern nach Organizer-Typ unterstützt.
    hook_point_configuration:
      name: Hakenspitzenkonfiguration
      description: Gibt an, ob der Haken zwei Spitzen (Doppelhaken) oder drei Spitzen
        (Drilling) besitzt.
    hook_point_type:
      name: Hakenspitzentyp
      description: Beschreibt Schliff bzw. Form der Spitze eines Angelhakens, was
        Eindringverhalten und Haltekraft beeinflusst.
    hook_shank_length:
      name: Hakenschaftlänge
      description: Gibt die relative Längenklassifizierung des Hakenschafts an (z. B.
        kurz oder lang), um einen schnellen visuellen und funktionalen Vergleich zu
        ermöglichen.
    hooks_eyes_attachment_method:
      name: Befestigungsmethode von Haken und Ösen
      description: Gibt an, wie Haken und Ösen am Kleidungsstück oder Projekt befestigt
        werden.
    hop_up_type:
      name: Hop-up-Typ
      description: Definiert das Hop-up-System, das den BBs Rückwärtsdrall verleiht,
        um Reichweite und Genauigkeit zu verbessern.
    horse_blanket_type:
      name: Typ der Pferdedecke
      description: Gibt die primäre Bauart bzw. den vorgesehenen Verwendungszweck
        der Pferdedecke oder des Pferdelakens an.
    horse_brush_type:
      name: Pferdebürstenart
      description: Klassifiziert die Bürste nach ihrer spezifischen Pflegeart bzw.
        ihrem Verwendungszweck, sodass Kund:innen filtern können, ohne die Kategorienhierarchie
        aufzuteilen.
    horse_care_purpose:
      name: Zweck der Pferdepflege
      description: Primärer funktionaler Zweck des Produkts innerhalb der Pferdepflege,
        einschließlich Gesundheit, Fellpflege und Management.
    horse_feed_stage:
      name: Lebensphase des Pferdes
      description: Gibt die Lebensphase bzw. den physiologischen Zustand des Pferdes
        an, für den das Futter formuliert wurde.
    horse_groomer_type:
      name: Typ des Pferdepflegewerkzeugs
      description: Klassifiziert die Art des Pflegewerkzeugs, damit Käufer:innen schnell
        das benötigte Werkzeug finden können.
    horse_leg_protection_type:
      name: Typ des Pferdebeinschutzes
      description: Klassifiziert die spezifische Bauart bzw. Funktion des Pferdeschuhs,
        der Bandage oder des Verbands.
    horse_model_breed:
      name: Pferdemodellrasse
      description: Gibt die Pferderasse an, die durch das maßstabsgetreue Modell dargestellt
        wird (falls zutreffend).
    hosiery_toe_style:
      name: Zehenstil der Strumpfwaren
      description: Definiert die Konstruktion des Zehenbereichs der Strumpfwaren,
        die für Haltbarkeit und Kompatibilität mit offenen Schuhen wichtig ist.
    hot_air_balloon_basket_type:
      name: Typ des Heißluftballonkorbs
      description: Gibt die primäre Korbkonfiguration bzw. den Korbstil an (z. B.
        Standard-Sportkorb, kommerzieller Hochkapazitätskorb, unterteilter oder barrierefreier
        Korb mit Tür), die bzw. der für Einstieg und vorgesehenen Betrieb verwendet
        wird.
    hot_air_balloon_burner_type:
      name: Typ des Heißluftballonbrenners
      description: Typ bzw. Konfiguration des im Ballon installierten Brennersystems.
    hot_air_balloon_envelope_material:
      name: Material der Heißluftballonhülle
      description: Primäres Gewebe bzw. Material der Ballonhülle (Canopy).
    hotfix_application_tool:
      name: Hotfix-Applikationstool
      description: Empfohlenes Werkzeug bzw. Wärmequelle zum Aufbringen von Hotfix-Strasssteinen.
    hub_axle_type:
      name: Nabenachsentyp
      description: Kennzeichnet die Achsschnittstelle bzw. das Befestigungssystem,
        für die bzw. das die Nabe ausgelegt ist (Schnellspanner, Steckachse usw.).
    hub_motor_type:
      name: Typ des Nabenmotors
      description: Beschreibt die Bauart des Nabenmotors (Getriebemotor, Direktantrieb,
        Bürstenmotor oder bürstenloser Motor), um Käufer:innen über Drehmoment-, Gewichts-
        und Wirkungsgradmerkmale zu informieren.
    hula_hoop_construction_type:
      name: Konstruktionsart des Hula-Hoop-Reifens
      description: Beschreibt, wie der Reifen konstruiert bzw. zusammengebaut ist.
    hula_hoop_features:
      name: Funktionen des Hula-Hoop-Reifens
      description: Hebt wichtige Eigenschaften hervor, die auf den Hula-Hoop-Reifen
        zutreffen.
    hull_design:
      name: Rumpfdesign
      description: Beschreibt die Rumpfform, die Leistung und Fahreigenschaften beeinflusst.
    hull_type:
      name: Rumpftyp
      description: Beschreibt die Rumpfform, die Leistung und Stabilität beeinflusst.
    humidifier_refill_medium_type:
      name: Typ des Nachfüllmediums für Luftbefeuchter
      description: Kennzeichnet das Feuchtigkeitsspeicher- bzw. Nachfüllmedium, das
        vom Etui-Luftbefeuchter verwendet wird (das befeuchtet oder ersetzt wird).
    humidifier_refill_method:
      name: Nachfüllmethode des Luftbefeuchters
      description: Beschreibt, wie der Luftbefeuchter mit Feuchtigkeit aufgeladen
        bzw. ersetzt wird.
    humidifying_medium:
      name: Befeuchtungsmedium
      description: Kennzeichnet das vom Produkt verwendete Befeuchtungselement bzw.
        -medium (das befeuchtet bzw. aktiviert wird).
    hummus_base_ingredient:
      name: Basiszutat des Hummus
      description: Kennzeichnet die primäre Hülsenfrucht- oder Gemüsebasis, die zur
        Herstellung des Hummus verwendet wird.
    hunting_call_type:
      name: Typ des Jagdlockrufs
      description: Klassifiziert die primäre Funktionsweise bzw. den Mechanismus des
        Lockrufs (z. B. mundgeblasen, elektronisch oder Box), damit Jäger:innen schnell
        das Format auswählen können, das am besten zu ihren Bedürfnissen und ihrem
        Erfahrungsniveau passt.
    hunting_dog_collar_function:
      name: Funktionen des Jagdhundehalsbands
      description: Klassifiziert die primäre Funktion bzw. den Verwendungszweck des
        Halsbands und hilft Käufer:innen beim Filtern nach Funktionen wie Tracking,
        Training, Sichtbarkeit oder Standardverwendung.
    hvac_control_functions:
      name: Steuerungsfunktionen der Klimaanlage
      description: Gibt an, welche HVAC-, Enteisungs- bzw. Luftstromfunktionen von
        der Einheit gesteuert werden (mechanisch oder elektronisch).
    hybrid_drivetrain_configuration:
      name: Konfiguration des Hybridantriebs
      description: Beschreibt die Architektur des PHEV-Systems und wie Elektromotor(en)
        und Verbrennungsmotor den Antrieb erzeugen.
    hybrid_system_type:
      name: Typ des Hybridsystems
      description: Klassifiziert die vom Fahrzeug verwendete Hybridarchitektur.
    hybrid_truck_cab_type:
      name: Typ der Hybrid-Lkw-Kabine
      description: Gibt die Kabinenkonfiguration des Lkw an, die Sitzplatzkapazität
        und Innenraum beeinflusst.
    hydration_bag_features:
      name: Merkmale des Trinkrucksacks
      description: Hebt bemerkenswerte Design- bzw. Funktionsmerkmale hervor, die
        speziell für Trinkrucksäcke gelten.
    hydration_belt_features:
      name: Funktionen des Trinkgürtels
      description: Listet bemerkenswerte integrierte Funktionen auf, die Benutzerfreundlichkeit,
        Sicherheit oder Komfort des Trinkgürtels verbessern.
    hydration_bladder_compatibility:
      name: Kompatibilität mit Trinkblasen
      description: Gibt an, ob die Weste ein Trinkblasensystem enthält oder unterstützt.
    hydration_mouthpiece_style:
      name: Stil des Trinksystem-Mundstücks
      description: Gibt Design bzw. Funktionsstil eines Mundstücks oder Ventils des
        Trinksystems an und hilft Käufer:innen bei der Auswahl der bevorzugten Trinklösung
        sowie der Sicherstellung der Kompatibilität.
    hydration_pack_style:
      name: Stil des Trinkrucksacks
      description: Gibt die Bauart des Trinkrucksacks an, z. B. Rucksack oder Weste,
        um Passform und Einsatzbereich besser filtern zu können.
    hydration_system_insulation:
      name: Isolierung des Trinksystems
      description: Gibt an, ob Behälter und/oder Trinkschlauch isoliert sind, um die
        Flüssigkeitstemperatur bei heißen oder kalten Bedingungen zu halten.
    hydration_valve_type:
      name: Typ des Trinkventils
      description: Kennzeichnet die Art des mit dem System oder der Flasche gelieferten
        Trinkventils bzw. Mundstücks, einschließlich gängiger Beißventil- und High-Flow-Düsen-Designs.
    hydraulic_fluid_type:
      name: Typ der Hydraulikflüssigkeit
      description: Gibt die Art der Bremsflüssigkeit an, für die der hydraulische
        Fahrradbremshebel ausgelegt ist. Diese Information ist für Wartung und Sicherheit
        entscheidend.
    hydrogenation_level:
      name: Hydrierungsgrad
      description: Gibt an, ob das Fett ungehärtet, teilweise gehärtet oder vollständig
        gehärtet ist, was Transfettgehalt und Backeigenschaften beeinflusst.
    hydrophobicity_level:
      name: Grad der Hydrophobie
      description: Gibt den vom Produkt beworbenen Grad der Wasserabperl- bzw. Wasserfilmleistung
        an.
    ice_cream_format:
      name: Eiscremeformat
      description: Beschreibt die physische Form bzw. Darreichungsform des Eiscremeprodukts
        (z. B. Becher, Riegel oder Mochi).
    ice_skate_sharpener_type:
      name: Typ des Schlittschuhschleifers
      description: Klassifiziert die Bauart bzw. das Format des Schleifgeräts (Handschleifstein,
        elektrische Maschine, Schleifvorrichtung usw.).
    ice_temperature_suitability:
      name: Eignung für Eistemperaturen
      description: Gibt den Eistemperaturbereich an, für den das Hockeyschlägerwachs
        formuliert ist, was Leistung und schneeabweisende Eigenschaften beeinflusst.
    icing_sugar_variety:
      name: Puderzuckerart
      description: Klassifiziert die Zusammensetzung bzw. den Funktionstyp des Puderzuckers
        (z. B. Fondant, nicht schmelzendes Schneepulver, gefärbt oder aromatisiert).
    ignition_coil_configuration:
      name: Konfiguration der Zündspule
      description: Gibt die Bauform der Zündspule an (Einzelzündspule/Coil-on-Plug,
        Mehrfachzündspulenpaket nach Zylinderanzahl, Zündspulenleiste/-kassette oder
        Verteilerbauweise).
    ignition_lead_compliance_standard:
      name: Konformitätsstandard für Zündkabel
      description: Formale Industrienorm bzw. Zertifizierung, die das bzw. die Zündkabel
        laut Hersteller erfüllen (z. B. SAE J2031 oder ISO 3808).
    ignition_lead_insulation_material:
      name: Isoliermaterial des Zündkabels
      description: Primäres Isolier- bzw. Mantelmaterial des Zündkabels (äußere Kabelisolierung).
    ignition_lead_set_type:
      name: Typ des Zündkabelsatzes
      description: Gibt an, ob es sich bei dem Produkt um ein einzelnes Zündkabel
        oder ein komplettes Set handelt und wofür das Set vorgesehen ist.
    ignition_lead_terminal_type:
      name: Typ des Zündkabelanschlusses
      description: Gibt die Anschluss- bzw. Steckerausführung an den Enden des Zündkabels
        an (z. B. Zündkerzenanschluss sowie Zündspulen-/Verteileranschluss).
    illumination_type:
      name: Beleuchtungsart
      description: Gibt an, ob und wie der Ball für Nachtspiele beleuchtet wird (z. B.
        phosphoreszierendes Leuchten oder durch Aufprall aktivierte LEDs).
    immobilizer_installation_type:
      name: Montageart der Wegfahrsperre
      description: Gibt an, wie die Wegfahrsperre im Fahrzeug installiert bzw. angeschlossen
        wird.
    immobilizer_unlock_method:
      name: Methode zum Entsperren der Wegfahrsperre
      description: Gibt an, wie die Wegfahrsperre aktiviert/deaktiviert bzw. entsperrt
        wird.
    impact_protection_certifications:
      name: Zertifizierungen für Aufprallschutz
      description: Nennt die spezifischen Sicherheitsstandards, die das Schutzpolster
        erfüllt oder übertrifft.
    impact_protection_level:
      name: Aufprallschutzstufe
      description: Gibt den Aufprallschutzgrad bzw. die Aufprallschutztechnologie
        des Tiefschutzes an.
    impact_protection_rating:
      name: Aufprallschutzklasse
      description: Gibt den zertifizierten Aufprallschutzgrad gemäß Normen an (z. B.
        EN 1621-1 Level 1 oder EN 14120 Level 2) und hilft Fahrer:innen beim Filtern
        nach höherwertigem Schutz.
    impact_surface_material:
      name: Material der Aufprallfläche
      description: Beschreibt das primäre Material der Aufprall- bzw. Schlagfläche
        im Hinblick auf Sicherheit und Haptik (z. B. Schaumstoff oder Kunststoff).
    incense_base_material:
      name: Basismaterial des Räucherwerks
      description: Primäres Basis- bzw. Bindemittelmaterial zur Herstellung des Räucherwerks
        (Pulverbasis) im Paket.
    incense_making_method:
      name: Methode zur Herstellung von Räucherwerk
      description: Der vom Paket unterstützte Herstellungsprozess.
    incense_tool_type:
      name: Typ des Räucherwerkzeugs
      description: Gibt an, um welche Art von Räucherwerkzeug es sich handelt (zum
        Formen, Messen, Pressen, Mischen oder Trocknen von Räucherwerk).
    incline_adjustment_type:
      name: Art der Neigungsverstellung
      description: Beschreibt, wie (oder ob) die Steigung während des Trainings verändert
        werden kann.
    included_accessories:
      name: Enthaltenes Zubehör
      description: Listet enthaltenes Zubehör wie Ersatzköpfe/-bits, Aufbewahrungskoffer,
        Ladekabel oder Netzteil auf.
    included_case_type:
      name: Enthaltener Koffertyp
      description: Art des mit dem Basssaxophon gelieferten Transport- bzw. Aufbewahrungskoffers
        (falls vorhanden).
    included_components:
      name: Enthaltene Komponenten
      description: Listet den Lieferumfang auf (nützlich für Werkzeugsets und Bundles).
    included_fastener_components:
      name: Enthaltene Befestigungskomponenten
      description: Gibt an, ob es sich bei dem Produkt um ein Haken-und-Ösen-Set,
        nur Haken, nur Ösen oder eine verwandte Verschlussvariante für Kleidungsstücke
        handelt.
    included_hydration_vessel_type:
      name: Typ des enthaltenen Trinkbehälters
      description: Kennzeichnet die Art des vom Gürtel mitgelieferten bzw. unterstützten
        Trinkbehälters.
    included_items_woodwind_instrument:
      name: Enthaltene Artikel (Holzblasinstrument)
      description: Listet auf, welche üblicherweise gebündelten Artikel im Lieferumfang
        des Basssaxophons enthalten sind.
    included_materials:
      name: Enthaltene Materialien
      description: Gibt an, welche Komponenten im Kauf des Schnittmusters enthalten
        sind (nur Schnittmuster oder Schnittmuster + Materialien).
    included_mounting_accessories:
      name: Enthaltenes Montagezubehör
      description: Listet auf, welches Montage- bzw. Befestigungszubehör im Lieferumfang
        des Freisprechtelefons enthalten ist.
    included_pump_type:
      name: Typ der enthaltenen Pumpe
      description: Kennzeichnet die Art der mitgelieferten bzw. integrierten Pumpe
        des Luftbetts.
    included_scraper_implement_type:
      name: Typ des enthaltenen Schaberwerkzeugs
      description: Gibt an, welche Spielwerkzeuge im Lieferumfang des Musikschabers
        enthalten sind (z. B. Schaberstab/-stange oder Drahtbürste).
    indicator_design:
      name: Design des Bissanzeigers
      description: Klassifiziert die physische Form bzw. Bauart des Bissanzeigers.
    indicator_functions_tracked:
      name: Verfolgte Anzeigefunktionen
      description: Listet die spezifischen Spielkennzahlen auf, die der Anzeiger verfolgt,
        z. B. Balls, Strikes, Outs, Innings, Pitch Count, Overs, Wickets, Score oder
        Downs.
    indoor_outdoor_use:
      name: Innen-/Außeneinsatz
      description: Gibt an, ob der Bowlinggerät für den Innenbereich, Außenbereich
        oder beides vorgesehen ist.
    inflatable_decoration_items_included:
      name: Enthaltene aufblasbare Dekorationsartikel
      description: Listet wichtiges Zubehör auf, das im Lieferumfang der aufblasbaren
        Dekoration enthalten ist (z. B. Gebläse, Heringe oder Befestigungsseile).
    inflatable_decoration_type:
      name: Typ der aufblasbaren Dekoration
      description: Gibt die Art der aufblasbaren Partydekoration (Form/Bauart) an,
        um Durchsuchen und Filtern zu unterstützen.
    inflatable_raft_float_features:
      name: Merkmale des aufblasbaren Floßes/Schwimmkörpers
      description: Funktionale Merkmale des aufblasbaren Floßes bzw. Schwimmkörpers.
    inflation_method_included:
      name: Enthaltene Aufblasmethode
      description: Gibt an, welche Art von Reifenaufblaslösung im Reparaturkit enthalten
        ist, falls vorhanden.
    infused_scent:
      name: Eingearbeiteter Duft
      description: Kennzeichnet Duft- bzw. Aromazusätze, die in das Ködermaterial
        eingearbeitet sind.
    ingredient_base_type:
      name: Typ der Zutatenbasis
      description: Kennzeichnet die primäre Basis für die Fermentation (z. B. Traubensaftkonzentrat,
        frischer Saft oder Fruchtkonzentrat).
    ingredient_physical_form:
      name: Physische Form der Zutat
      description: Gibt die physische Form an, in der der Duftstoff geliefert wird
        (für Handhabung, Dosierung und Formulierung).
    ingredient_processing_method:
      name: Zutatenverarbeitungsmethode
      description: Gibt die primäre Verarbeitungstechnik an, die auf die Zutat angewendet
        wird (z. B. gefriergetrocknet, geröstet oder fermentiert).
    ink_colors_included:
      name: Enthaltene Tintenfarben
      description: Gibt die im Set enthaltene(n) Tintenfarbe(n) der Stempelkissen
        an.
    ink_pad_application_method:
      name: Auftragsmethode des Stempelkissens
      description: Gibt an, wie die Tinte aus dem Stempelkissen abgegeben bzw. verwendet
        wird (klassisches Stempelkissen, Tupfkissen oder Pinselspitzenkissen).
    ink_pad_permanence:
      name: Haltbarkeit des Stempelkissens
      description: Gibt an, ob die Stempeltinte permanent und/oder archivfest ist
        (beständig gegen Ausbleichen und Wasser nach dem Trocknen).
    ink_pad_size:
      name: Größe des Stempelkissens
      description: Standardisierte Größe bzw. Bauform der Stempelkissenoberfläche
        bzw. des Gehäuses.
    ink_pad_special_effects:
      name: Spezialeffekte des Stempelkissens
      description: Besondere visuelle bzw. funktionale Effekte der Tinte beim Stempeln
        (z. B. Metallic oder Glitzer).
    ink_permanence:
      name: Tintenbeständigkeit
      description: Gibt an, ob die getrocknete Sumi-Tinte dauerhaft/archivfest oder
        abwaschbar/nicht dauerhaft sein soll.
    ink_preparation_required:
      name: Erforderliche Tintenvorbereitung
      description: Gibt an, ob die Sumi-Tinte gebrauchsfertig ist oder vor der Verwendung
        mit Wasser verdünnt bzw. angerieben werden muss.
    inline_skate_brake_type:
      name: Typ der Inline-Skate-Bremse
      description: Gibt die Bremskonfiguration der Inlineskates an, z. B. abnehmbare
        Fersenbremse oder keine Bremse.
    inner_tent_configuration:
      name: Konfiguration des Innenzelts
      description: Gibt die Konfiguration bzw. Bauart des Innenzelts an, z. B. Vollzelt-,
        Netz- oder Thermoeinsatz.
    innerspring_coil_type:
      name: Typ der Federkernspirale
      description: Gibt die Bauart des Federkernsystems in der Matratze an, was Stützkraft,
        Bewegungsisolation und Preis beeinflusst.
    input_connector_type:
      name: Anschlussart für den Input
      description: Gibt den vom Pedal verwendeten Audioeingangsanschlusstyp an (typischerweise
        1/4-Zoll-TS).
    input_valve_type:
      name: Typ des Eingangsventils
      description: Gibt den Ventilstandard des Fahrradschlauchs bzw. -rads an, an
        den der Adapter angeschlossen wird.
    insecticide_treatment:
      name: Insektizidbehandlung
      description: Gibt an, ob das Netz werkseitig mit Insektizid behandelt wurde
        und falls ja, welche Behandlungsart für zusätzlichen Schutz verwendet wurde.
    insert_coverage_area:
      name: Abdeckungsbereich der Einlage
      description: Gibt an, welchen Teil des Fußes die Einlage abdecken soll (z. B.
        gesamte Fußlänge oder nur Ferse).
    insert_length_type:
      name: Einlegesohlen-Längentyp
      description: Gibt an, wie viel des Fußbetts von der Fußgewölbestütze abgedeckt
        wird.
    inside_message_type:
      name: Typ der Innennachricht
      description: Gibt an, ob die Karte auf der Innenseite eine vorgedruckte Nachricht
        enthält und ob diese personalisierbar ist.
    insole_attachment_method:
      name: Befestigungsart der Einlegesohle
      description: Gibt an, wie die Fußgewölbestütze im Schuh befestigt wird (lose
        eingelegt, selbstklebend, mit Klettverschluss usw.).
    insole_material:
      name: Material der Einlegesohle
      description: Beschreibt das Material des Fußbetts bzw. der Einlegesohle, auf
        dem der Fuß aufliegt, was Dämpfung und Unterstützung beeinflusst.
    installation_fabrication_level:
      name: Erforderlicher Anpassungsaufwand bei der Installation
      description: Gibt den typischen Umfang individueller Anpassungen bzw. Modifikationen
        an, die für die Installation des Kits erforderlich sind.
    installation_location:
      name: Installationsort
      description: Gibt den typischen Einbauort des Öldrucksensors im Motorölsystem
        an (z. B. Ölkanalanschluss am Motorblock, Filtergehäuse, Sandwichplatte oder
        Fernleitungsanschluss).
    installation_method:
      name: Installationsmethode
      description: Gibt an, wie die Matte bzw. Fliese am Boden befestigt oder installiert
        wird.
    instant_coffee_form:
      name: Form des Instantkaffees
      description: Beschreibt die physische Form, in der der Instantkaffee geliefert
        wird, was Zubereitungsmethode und Haltbarkeit beeinflusst.
    instep_coverage:
      name: Spannabdeckung
      description: Gibt an, ob das Produkt nur das Schienbein oder sowohl Schienbein
        als auch Spann/Fuß schützt.
    instruction_format:
      name: Format der Anleitung
      description: Format der dem Paket beiliegenden Anleitung.
    instrument_cleaning_swab_form_factor:
      name: Bauform des Instrumentenreinigungswischers
      description: Gibt die physische Bauart des Reinigungswischers an (z. B. Durchziehtuch
        oder Stab-/Bürstensystem), passend zu Spielerpräferenzen und Instrumenteneigenschaften.
    instrument_dimensions_unit_context:
      name: Bezug der Maßeinheiten des Instruments
      description: Erläutert, worauf sich die angegebenen Höhen-/Breiten-/Längenmaße
        beziehen (z. B. Gesamtinstrument, Länge eines einzelnen Rohrs oder Stativhöhe).
    instrument_electronics_type:
      name: Typ der Instrumentenelektronik
      description: Gibt an, ob das Tonabnehmer-/Vorverstärkersystem des Instruments
        aktiv oder passiv ist.
    instrument_key:
      name: Tonart des Instruments
      description: Gibt die in Katalogen verwendete Tonartbezeichnung der Blockflöte
        an (üblicherweise C oder F bei größeren Blockflöten).
    instrument_level:
      name: Instrumentenniveau
      description: Ziel-Spielniveau des angebotenen Instruments.
    instrument_part_mounting_method:
      name: Befestigungsmethode des Instrumententeils
      description: Gibt an, wie das Teil befestigt bzw. installiert wird (z. B. Klemmen,
        Kleben oder Verschrauben).
    instrument_parts_included:
      name: Enthaltene Instrumententeile
      description: Listet die wichtigsten im Lieferumfang der A-Klarinette enthaltenen
        Komponenten bzw. Teile auf.
    instrument_playing_technique:
      name: Spieltechnik des Instruments
      description: Gibt an, wie das Instrument typischerweise gespielt bzw. betätigt
        wird (z. B. geschüttelt, geschlagen oder geklappert).
    instrument_size_class:
      name: Größenklasse des Instruments
      description: Allgemeine Größe des Instruments in Form einer kundenfreundlichen
        Größenklasse statt exakter Maße.
    insulation_fill_material:
      name: Füllmaterial der Dämmung
      description: Kennzeichnet das primäre Isoliermaterial der Jacke bzw. Weste.
    integrated_bottom_type:
      name: Integriertes Unterteil
      description: Gibt an, ob das Kleidungsstück integrierte Slips, Shorts, Bodys
        oder ähnliche Unterziehschichten für zusätzliche Abdeckung bei Bewegung besitzt.
    integrated_charging_options:
      name: Integrierte Ladeoptionen
      description: Listet die integrierten Strom- bzw. Ladeanschlüsse des Nachttischs
        auf.
    integrated_furniture_function:
      name: Integrierte Möbelfunktionen
      description: Kennzeichnet zusätzliche integrierte Möbelelemente, die im Wandbett
        bzw. Rahmen enthalten sind (z. B. Schreibtisch, Sofa oder Regale).
    integrated_locking:
      name: Integrierte Verriegelung
      description: Gibt an, ob das Gestell über ein integriertes Schloss zur Sicherung
        zwischen Gestell und Fahrzeug und/oder Fahrrad und Gestell verfügt.
    integrated_power_options:
      name: Integrierte Stromversorgungsoptionen
      description: Gibt die Art der integrierten Strom- bzw. Ladefunktionen des Schminktischs
        an.
    integrated_storage_features:
      name: Integrierte Aufbewahrungsfunktionen
      description: Kennzeichnet zusätzliche Aufbewahrungs- bzw. Zubehörfunktionen
        des Billardqueue-Regals über die Queuehalter hinaus.
    integrated_tool_functions:
      name: Integrierte Werkzeugfunktionen
      description: Zusätzliche Werkzeugfunktionen, die in den Hebel integriert sind
        (z. B. Speichenhaken, Ventilkernentferner oder Reifenabzieher).
    intended_board_type:
      name: Vorgesehener Boardtyp
      description: Gibt den Kiteboard-Typ an, für den die Finne ausgelegt ist (z. B.
        Twin Tip, Surf Directional oder Hydrofoil).
    intended_consumption:
      name: Vorgesehene Verzehrart
      description: Gibt an, wie das Produkt verzehrt werden soll und ob es roh verzehrt
        werden kann, gebacken werden muss oder teilweise vorgebacken ist.
    intended_craft:
      name: Vorgesehene Handarbeitstechnik
      description: Primärer Handarbeitsbereich, für den die Garnführung ausgelegt
        ist.
    intended_culinary_use:
      name: Vorgesehene kulinarische Verwendung
      description: Gibt die primäre kulinarische Verwendung der Sauce an, z. B. Dippen,
        Kochen oder Glasieren.
    intended_handlebar_style:
      name: Vorgesehene Lenkerart
      description: Beschreibt die vorgesehene Lenker- bzw. Einsatzart des Hebels (z. B.
        Flatbar, Dropbar oder Aero). Dadurch lässt sich die Kompatibilität schnell
        eingrenzen, ohne zusätzliche Unterkategorien zu erzwingen.
    intended_player_role:
      name: Vorgesehene Spielerrolle
      description: Gibt die Rolle auf dem Spielfeld an, für die der Kopfschutz vorgesehen
        ist (z. B. Catcher oder Schiedsrichter).
    intended_playing_surface:
      name: Vorgesehene Spielfläche
      description: Oberfläche, für die Puck, Ball oder Ring ausgelegt sind, z. B.
        Eis, Asphalt, Hallenboden oder Kunsteis.
    intended_repair_location:
      name: Vorgesehene Reparaturstelle
      description: Gibt an, an welcher Stelle des Reifens das Kit Reparaturen durchführen
        soll.
    intended_seating_position:
      name: Vorgesehene Sitzposition
      description: Gibt die Sitzposition im Fahrzeug an, an der der Sicherheitsgurt
        verwendet bzw. installiert werden soll.
    intended_sewing_application:
      name: Vorgesehene Nähanwendung
      description: Vorgesehene Nähanwendung, für die der Faden ausgelegt ist (z. B.
        allgemeines Nähen von Kleidung, Quilten oder Polstern).
    intended_technique:
      name: Vorgesehene Technik
      description: Primäre Filztechnik, für die die Unterlage bzw. Matte ausgelegt
        ist.
    intended_use:
      name: Verwendungszweck
      description: Primärer Verwendungskontext des Instruments.
    intended_use_fleece_fabric:
      name: Verwendungszweck (Fleece-Stoff)
      description: Primäres Projekt bzw. primäre Anwendung, für das bzw. die der Fleecestoff
        vermarktet wird.
    intended_user:
      name: Zielgruppe
      description: Gibt an, für wen die Flugzeugschutzausrüstung bestimmt ist.
    intended_yarn_form:
      name: Vorgesehene Garnform
      description: Gibt an, welche Garnform von der Garnschale am besten unterstützt
        wird.
    interaction_mode:
      name: Interaktionsmodus
      description: Primäre Interaktionsmethode zum Auslösen von Geräuschen oder Aktivitäten.
    interactive_effects:
      name: Interaktive Effekte
      description: Kennzeichnet die interaktiven elektronischen oder mechanischen
        Effekte des Küchenspielsets.
    interfacing_application_area:
      name: Anwendungsbereich der Einlage
      description: Gibt die typischen Näh- bzw. Handarbeitsbereiche an, für die die
        Einlage vorgesehen ist.
    interfacing_color_family:
      name: Farbfamilie der Einlage
      description: Gibt die typische Grundfarbe der Einlage an, die unter hellen oder
        dunklen Stoffen verwendet wird.
    interfacing_selling_format:
      name: Verkaufsformat der Einlage
      description: Beschreibt das Verkaufsformat der Einlage (z. B. Endloszuschnitt
        nach Länge, vorgeschnittene Stücke, Rollen oder Musterstücke).
    interfacing_stiffness_level:
      name: Steifigkeitsgrad der Einlage
      description: Beschreibt den Steifigkeits- bzw. Festigkeitsgrad der Einlage.
    interior_padding_type:
      name: Typ der Innenpolsterung
      description: Art der Innenpolsterung bzw. des Einlegesystems im Koffer zum Schutz
        und zur Organisation des Inhalts.
    interior_stall_configuration:
      name: Konfiguration der Innenboxen
      description: Gibt die Innenaufteilung bzw. -konfiguration für den Tiertransport
        an (Ausrichtung der Boxen und Art der Abteile).
    invitation_printing_coverage:
      name: Druckumfang der Einladung
      description: Gibt an, welche Seite(n) der Einladung bedruckt werden (nur Vorderseite
        oder beidseitig).
    iodization:
      name: Jodierung
      description: Gibt an, ob und in welchem Umfang dem Salz Jod zugesetzt wurde.
    iridescence_level:
      name: Grad der Irisierung
      description: Beschreibt die Intensität des natürlichen bzw. behandelten irisierenden
        Schimmers von Pfauenfedern.
    irish_warpipe_set_configuration:
      name: Konfiguration des Irish-Warpipe-Sets
      description: Gibt an, welche Konfiguration für Irish Warpipes verkauft wird
        (vollständiges Instrument oder Teile-/Teilset).
    iron_on_applique_application_method:
      name: Aufbringungsmethode der Bügelapplikation
      description: Gibt an, wie die Bügelapplikation auf dem Untergrund angebracht
        werden soll.
    ironing_center_features:
      name: Funktionen der Bügelstation
      description: Listet spezielle Funktionen von Bügelstationen auf, die Benutzerfreundlichkeit
        und Komfort verbessern.
    jacket_breast_style:
      name: Bruststil des Sakkos
      description: Gibt an, ob das Sakko einreihig oder zweireihig ist.
    jacket_vent_style:
      name: Rückenschlitzstil
      description: Gibt die Art des Schlitzes (Öffnung) auf der Rückseite des Sakkos
        an.
    jam_and_jelly_consistency:
      name: Konsistenz von Marmelade und Gelee
      description: Beschreibt die Konsistenz des Brotaufstrichs und ob Fruchtstücke
        oder Kerne enthalten sind.
    jaw_shape:
      name: Form der Backen
      description: Geometrie der Backen bzw. Spitze (z. B. gerade, gebogen oder Spitzzange),
        die Präzision und Reichweite beeinflusst.
    jerky_form:
      name: Form des Trockenfleischs
      description: Beschreibt die physische Form bzw. den Zuschnitt der Trockenfleischstücke
        (z. B. Streifen, Sticks oder Stückchen).
    jersey_style:
      name: Stil des Trikots
      description: Gibt die Bauart bzw. den Tragestil von Fantrikots an.
    jew_harp_accessories_included:
      name: Maultrommelzubehör inklusive
      description: Listet die mit der Maultrommel gelieferten Artikel auf (z. B. Koffer,
        Beutel oder Anleitung).
    jew_s_harp_frame_style:
      name: Bauart des Maultrommelrahmens
      description: Beschreibt die Bauart des Rahmens bzw. Korpus der Maultrommel,
        die Spielgefühl, Haltbarkeit und Ergonomie beeinflusst.
    jew_s_harp_tongue_profile:
      name: Profil der Maultrommelzunge
      description: Beschreibt Profil bzw. Geometrie der Maultrommelzunge (Zunge/Rohrblatt),
        was Ansprache und Klangfarbe beeinflusst.
    jewelry_pieces_included:
      name: Enthaltener Schmuck
      description: Listet die im Set enthaltenen Schmuckstücke auf, damit Käufer:innen
        genau wissen, welche Artikel enthalten sind.
    jigsaw_puzzle_piece_shape:
      name: Form der Puzzleteile
      description: Allgemeine Schnitt- bzw. Formart der Teile und deren Kantenprofil.
    jockstrap_design_features:
      name: Designmerkmale des Suspensoriums
      description: Beschreibt besondere Designelemente von Suspensorien, die Funktion
        oder Ästhetik beeinflussen.
    juggling_club_construction_type:
      name: Bauart der Jonglierkeule
      description: Gibt die allgemeine Bauart der Jonglierkeule an (z. B. einteilig
        geformt oder mehrteilig zusammengesetzt), was Haltbarkeit, Haptik und Wartung
        beeinflussen kann.
    juggling_club_core_material:
      name: Kernmaterial der Jonglierkeule
      description: Das primäre Kernmaterial im Inneren der Keule (im Gegensatz zu
        äußerer Umwicklung bzw. Klebeband).
    juggling_prop_set_size:
      name: Größe des Jonglierrequisiten-Sets
      description: Anzahl der primären Requisiten im Set (z. B. 3-Ball-Set oder Poi-Paar).
    juggling_ring_edge_style:
      name: Randstil des Jonglierrings
      description: Das Kantenprofil des Rings, das Komfort und Fangverhalten beeinflusst.
    juice_form:
      name: Form des Safts
      description: Gibt die physische Form bzw. den Verarbeitungsgrad des Produkts
        an (z. B. trinkfertige Flüssigkeit, Konzentrat oder Pulver).
    juice_processing_method:
      name: Saftverarbeitungsmethode
      description: Gibt die primäre Verarbeitungstechnik des Safts bzw. Getränks an,
        was Geschmack, Nährstofferhalt und Haltbarkeit beeinflusst.
    jump_rope_style:
      name: Stil des Springseils
      description: Klassifiziert die Bauart des Seils bzw. Kabels (z. B. Perlen-,
        Stoff- oder Speedseil), was Verwendungszweck und Leistung stark beeinflusst.
    kale_variety:
      name: Auswahl an Grünkohl
      description: Kennzeichnet die spezifische Sorte bzw. Varietät des Grünkohls
        (z. B. kraus, Lacinato/Dinosaur oder Red Russian). Dies hilft Käufer:innen
        bei der Auswahl nach Geschmack, Textur und kulinarischer Verwendung.
    kaleidoscope_viewing_type:
      name: Betrachtungsart des Kaleidoskops
      description: Kennzeichnet die Betrachtungs- bzw. Bedienungsart des Kaleidoskops
        (z. B. klassisches Okularrohr, teleidoskopbasierte Linse, Radbetrieb oder
        Projektion).
    kayak_construction_type:
      name: Kajakkonstruktionstyp
      description: Gibt die primäre Bauart des Kajaks an, z. B. Hartschale oder aufblasbar.
    kayak_design_type:
      name: Typ des Kajakdesigns
      description: Klassifiziert die primäre Ausrichtung des Kajaks (z. B. Surfski,
        Playboat oder Tourenkajak).
    kayak_hull_design:
      name: Rumpfdesign des Kajaks
      description: Kennzeichnet die primäre Rumpfform, die Fahreigenschaften wie Stabilität
        und Manövrierfähigkeit bei Wellengang beeinflusst.
    kayak_storage_bag_type:
      name: Art der Kajak-Aufbewahrungstasche
      description: Kennzeichnet Stil bzw. Format einer Kajak-Aufbewahrungstasche,
        z. B. Drybag oder Paddeltasche.
    kayak_style:
      name: Stil des Kajaks
      description: Gibt die primäre Bauart bzw. den primären Nutzungsstil des Kajaks
        an (z. B. Freizeit-, Touren- oder aufblasbares Kajak).
    keel_type:
      name: Kieltyp
      description: Kennzeichnet die Kielkonfiguration des Segelboots.
    kettlebell_style:
      name: Stil der Kettlebell
      description: Kennzeichnet die Bauart bzw. Stilvariante der Kettlebell (z. B.
        Wettkampf-, verstellbare oder weiche Kettlebell) und hilft Käufer:innen bei
        der Auswahl für ihre Trainingsanforderungen.
    key_attachment_mechanism:
      name: Befestigungsmechanismus der Schlüssel
      description: Gibt die Hardware an, mit der Schlüssel im Koffer befestigt werden,
        z. B. Ringe, Clips oder Schraubbolzen.
    key_retention_when_unlocked:
      name: Schlüsselentnahme im entriegelten Zustand
      description: Gibt an, ob der Schlüssel aus dem Schloss entfernt werden kann,
        wenn dieses entriegelt ist.
    keyboard_amplifier_inputs:
      name: Eingänge des Keyboardverstärkers
      description: Listet die vom Keyboardverstärker unterstützten Eingangsanschlüsse
        auf (z. B. 6,35-mm-TRS, MIDI-In oder Bluetooth).
    keyboard_amplifier_output_types:
      name: Ausgangstypen des Keyboardverstärkers
      description: Gibt die primären Ausgangsanschlusstypen an, die der Keyboardverstärker
        zur Weiterleitung von Audiosignalen an andere Systeme unterstützt.
    keyboard_case_handle_type:
      name: Griffart des Keyboardkoffers
      description: Primäres Griffsystem zum Transportieren bzw. Tragen des Keyboardkoffers
        (zusätzlich zu Gurten).
    keyboard_case_interior_padding_type:
      name: Typ der Innenpolsterung des Keyboardkoffers
      description: Primäre Polsterungs- bzw. Auskleidungsart im Inneren des Hartschalenkoffers.
    keyboard_case_protection_level:
      name: Schutzklasse des Keyboardkoffers
      description: Gesamtklasse des Schutzes bzw. der Steifigkeit des Hartschalenkoffers,
        zur Unterscheidung zwischen geformten Hartschalenkoffern und robusten Flight-/ATA-Koffern.
    keyboard_case_wheel_type:
      name: Rollenart des Keyboardkoffers
      description: Radkonfiguration für Hartschalenkoffer mit Rollen.
    keyboard_pedal_connector_type:
      name: Anschlussart des Keyboardpedals
      description: Gibt die Anschluss- bzw. Steckerausführung an, mit der das Sustain-Pedal
        an ein Keyboard oder Digitalpiano angeschlossen wird.
    keyboard_power_supply_type:
      name: Art der Stromversorgung des Keyboards
      description: Primäre Stromversorgungsart des Keyboards (Batterie, Netzteil oder
        USB-Stromversorgung).
    keyboard_stand_tier_type:
      name: Typ der Keyboardständer-Ebene
      description: Gibt an, ob der Ständer nur als Basisständer verkauft wird oder
        einen Aufsatz für eine zweite Ebene enthält.
    keyboard_stand_tiers:
      name: Keyboardständer-Ebenen
      description: Anzahl der vom Z-Ständer unterstützten Ebenen (z. B. einstufig
        oder zweistufig).
    keychain_attachment_type:
      name: Befestigungsart des Schlüsselanhängers
      description: Gibt die primäre Befestigungsvorrichtung an, mit der der Schlüsselanhänger
        an Schlüsseln, Taschen oder Gürteln befestigt wird.
    keychain_style:
      name: Stil des Schlüsselanhängers
      description: Beschreibt die allgemeine Bauform des Schlüsselanhängers (physische
        Beschaffenheit).
    keywork_finish:
      name: Finish der Klappenmechanik
      description: Beschreibt das Finish bzw. die Beschichtung der Klappenmechanik
        getrennt vom Finish des Korpus.
    kick_point:
      name: Kickpunkt
      description: Gibt die Position des Flex-Kickpunkts am Schaft eines Hockeyschlägers
        an, die Schussabgabe und Spielgefühl beeinflusst.
    kick_zone_grip_system:
      name: Grip-System der Abdruckzone
      description: Kennzeichnet die in der Abdruckzone des Skis verwendete Technologie
        zur Verbesserung der Traktion.
    kickboard_features:
      name: Merkmale des Kickboards
      description: Hebt besondere Merkmale des Kickboards hervor, die Training oder
        Komfort verbessern, einschließlich Oberflächenstruktur und Griffoptionen.
    kickboard_handle_style:
      name: Griffart des Kickboards
      description: Gibt an, ob und wie das Kickboard Handgriffe oder Oberflächenstrukturen
        bietet, die Handhabung und Komfort beeinflussen.
    kickstand_mounting_position:
      name: Montageposition des Seitenständers
      description: Kennzeichnet die Position am Fahrradrahmen, an der der Seitenständer
        befestigt wird (z. B. Mittelhalterung, Kettenstrebenhalterung oder Hinterachshalterung).
    kickstand_type:
      name: Typ des Seitenständers
      description: Beschreibt Bauart bzw. Mechanismus des Seitenständers (z. B. einbeiniger
        Seitenständer, zweibeiniger Mittelständer oder Teleskopständer).
    kidney_belt_support_level:
      name: Unterstützungsgrad des Nierengurts
      description: Vom Hersteller angegebener Unterstützungsgrad des Nierengurts zur
        Stabilisierung von unterem Rücken und Bauchbereich.
    kiln_firing_atmosphere:
      name: Brennatmosphäre des Ofens
      description: Gibt die Brennatmosphäre(n) an, die der Brennofen während des Betriebs
        unterstützt (z. B. Oxidation oder Reduktion).
    kiln_heating_element_type:
      name: Typ des Brennofen-Heizelements
      description: Typ bzw. Material der im Brennofen verwendeten Heizelemente.
    kingpin_design:
      name: Kingpin-Design
      description: Beschreibt die Bauart der Kingpin-Hardware selbst, was Gewicht
        und Grind-Freiheit beeinflusst.
    kingpin_orientation:
      name: Ausrichtung des Kingpins
      description: Kennzeichnet die Ausrichtung des Kingpins der Achse, die Fahreigenschaften
        und Deckkompatibilität beeinflusst.
    kit_components_included:
      name: Im Set enthaltene Komponenten
      description: Listet die im Paket enthaltenen Hardwareteile auf (z. B. Erdanker,
        Schrauben, Gurte oder Montagewerkzeug), damit Käufer:innen genau wissen, was
        enthalten ist.
    kit_format:
      name: Paket-Format
      description: Gibt an, wie das Paket verpackt und transportiert wird (z. B. Beutel,
        Kiste, Karton).
    kit_items_included:
      name: Enthaltene Paket-Artikel
      description: Listet die wichtigsten Geräte und Materialien im Weinherstellungs-Paket
        auf, damit Käufer:innen Starterpakete von reinen Zutaten-Nachfüllpacks unterscheiden
        können.
    kit_pouch_case_type:
      name: Typ der Kit-Tasche bzw. der Kiste
      description: Gibt die Art der im Pflegepaket enthaltenen Aufbewahrungslösung
        an (falls vorhanden).
    kit_tools_included:
      name: Im Kit enthaltene Werkzeuge
      description: Listet die wichtigsten im Paket enthaltenen Werkzeuge auf (falls
        vorhanden), die zur Durchführung des Projekts benötigt werden.
    kite_inflation_system:
      name: Aufblassystem des Kites
      description: Gibt an, wie Fronttube und Struts des Kites aufgeblasen werden.
    kite_line_configuration:
      name: Konfiguration der Kiteleinen
      description: Gibt die Anzahl der Flug- bzw. Steuerleinen an, für die das Kitesegel
        ausgelegt ist, eine wichtige Angabe zur richtigen Kombination von Bar und
        Leinen.
    kite_type:
      name: Typ des Kites
      description: Definiert die strukturelle Designkategorie des Kites (Form und
        Waageleinenstil).
    kiteboard_bag_style:
      name: Stil der Kiteboardtasche
      description: Spezifische Bauart bzw. Unterkategorie der Kiteboardtasche (z. B.
        Boardbag, Golftasche, Reisetasche oder Foilbag).
    kiwifruit_variety:
      name: Kiwisorte
      description: Kennzeichnet die spezifische Sorte bzw. Farbvariante der Kiwi (grün,
        gold, rot usw.).
    knee_pad_pocket_type:
      name: Typ der Knieschoner-Tasche
      description: Gibt an, ob und wie das Kleidungsstück Knieschoner aufnehmen kann.
    knee_pad_style:
      name: Knieschonerart
      description: Beschreibt die Bauart bzw. den Formfaktor des Knieschutzes (z.
        B. Manschette, Orthese oder Schützer).
    knee_protection_design:
      name: Design des Knieschutzes
      description: Gibt die Anzahl der im Beinschutz integrierten Kniegelenksegmente
        an.
    kneeboard_construction:
      name: Konstruktion des Kneeboards
      description: Kennzeichnet die primäre Konstruktionstechnik bzw. den Verbundaufbau
        des Boards (z. B. rotationsgeformter Kunststoff, kompressionsgeformt oder
        Kohlefaser).
    kneeboard_strap_type:
      name: Typ des Kneeboard-Gurts
      description: Beschreibt die Bauart des Kniegurtsystems zur Befestigung der fahrenden
        Person am Board.
    knife_lock_mechanism:
      name: Verriegelungsmechanik des Messers
      description: Gibt den Mechanismus an, mit dem die Klinge eines Klappmessers
        in geöffneter Position gesichert wird, oder kennzeichnet nicht verriegelnde
        Ausführungen.
    knife_locking_mechanism:
      name: Verriegelungsmechanismus der Messers
      description: Gibt die Art des Mechanismus an, der die Klinge in geöffneter Position
        sichert und damit Sicherheit, Stabilität und Benutzerfreundlichkeit von feststellbaren
        Messern bestimmt.
    knife_opening_mechanism:
      name: Öffnungsmechanismus des Messers
      description: Beschreibt, wie die Klinge aus dem Griff ausgeklappt wird, und
        unterscheidet zwischen manuellen, unterstützten, automatischen und speziellen
        Öffnungsarten.
    knife_system:
      name: Messersystem
      description: Gibt an, ob und wie das Schneidemesser der Overlockmaschine funktioniert.
    knit_elastic_application:
      name: Verwendungszweck des Strickgummis
      description: Gibt den vorgesehenen Näh- bzw. Handarbeitszweck des gestrickten
        Gummibands an.
    knit_pattern:
      name: Strickmuster
      description: Kennzeichnet die primäre Strickart bzw. Struktur des Cardiganstoffs,
        z. B. Zopf-, Rippen- oder Waffelmuster, damit Käufer:innen gezielt nach bestimmten
        Strukturen und Wärmeeigenschaften suchen können.
    knit_style:
      name: Strickstil
      description: Gibt die primäre Strickart, Struktur oder das dekorative Muster
        des Pulloverstoffs an.
    knitting_marker_counter_type:
      name: Typ des Strickmarkierers/-zählers
      description: Gibt den funktionalen Produkttyp innerhalb von Strickmarkierern
        und -zählern an.
    knitting_needle_tip_style:
      name: Stil der Stricknadelspitze
      description: Spitzenschärfe bzw. -form, optimiert für unterschiedliche Garne
        und Techniken.
    knock_sensor_technology:
      name: Klopfsensor
      description: Die im Klopfsensor verwendete Sensortechnologie.
    knurl_aggressiveness:
      name: Aggressivität der Rändelung
      description: Beschreibt Schärfe bzw. Struktur der Rändelung am Stangenschaft,
        was Griffkomfort und Halt beeinflusst.
    knurl_marking_standard:
      name: Standard der Rändelmarkierung
      description: Gibt die Position der Referenzringe der Rändelung zur Handpositionierung
        an (z. B. IPF- oder IWF-Markierungen).
    kohlrabi_variety:
      name: Kohlrabisorte
      description: Gibt die Sorte bzw. Marktvarietät der Kohlrabiknolle an, damit
        Kund:innen zwischen unterschiedlichen Geschmacksprofilen, Größen und Farben
        wählen können.
    koji_mold_type:
      name: Typ des Koji-Schimmels
      description: Gibt die Art bzw. den Stamm des bei der Fermentation verwendeten
        Koji-Schimmels an, was Aroma und Geschmack beeinflusst.
    kumquat_variety:
      name: Kumquatsorte
      description: Kennzeichnet die angebotene Kumquat-Sorte bzw. -Varietät, damit
        Käufer:innen Früchte nach Geschmacksprofil, Größe oder kulinarischer Verwendung
        auswählen können.
    label_edge_type:
      name: Typ der Etikettenkante
      description: Gibt die Kantenverarbeitung an, die Ausfransen verhindert und die
        Optik bestimmt.
    label_finish:
      name: Etikettbeschichtung
      description: Gibt Finish, Struktur oder Schutzbeschichtung/-behandlung des Etiketts
        an.
    label_finish_edge_style:
      name: Finish-/Kantenstil des Etiketts
      description: Beschreibt die Kantenverarbeitung, die Komfort und Haltbarkeit
        beeinflusst (z. B. gewebte Kante oder lasergeschnitten).
    label_fold_type:
      name: Faltart des Etiketts
      description: Gibt an, wie das Einnähetikett konstruiert ist (z. B. Endfalz oder
        Mittelfalz), was Anbringung und Position beeinflusst.
    label_text_type:
      name: Textart des Etiketts
      description: Gibt an, ob das Etikett leer, vorgedruckt oder zur Personalisierung
        vorgesehen ist.
    lace_area_size:
      name: Größe des Lace-Bereichs
      description: Definiert Größe bzw. Konfiguration des Lace-Bereichs (z. B. 4×4
        Closure oder 13×6 Frontal), was den verfügbaren Scheitelbereich bestimmt.
    lace_tightener_style:
      name: Stil des Schnürsenkelspanners
      description: Kennzeichnet die mechanische Bauart bzw. den Formfaktor des Schnürsystems.
    lace_type:
      name: Typ des Lace-Materials
      description: Beschreibt Material bzw. Finish des Lace-Bereichs am Haaransatz
        bzw. an der Kappe, was Realismus und Anpassung an den Hautton beeinflusst.
    lacrosse_ball_certification:
      name: Zertifizierung des Lacrosseballs
      description: Gibt die Zulassungen bzw. Standards der Sportverbände an, die der
        Lacrosseball erfüllt.
    lacrosse_goal_regulation_certification:
      name: Regelwerkszertifizierung des Lacrosse-Tors
      description: Gibt an, ob das Lacrosse-Tor bzw. -Netz die Vorgaben eines bestimmten
        Sportverbands erfüllt (z. B. NCAA oder NFHS).
    lacrosse_pocket_type:
      name: Typ der Lacrosse-Tasche
      description: Kennzeichnet die allgemeine Bauart der im Schlägerkopf eingespannten
        Tasche bzw. des Netzes, was Ballkontrolle und Ballfreigabe beeinflusst.
    lacrosse_string_type:
      name: Typ der Lacrosse-Bespannung
      description: Klassifiziert die genaue Bauart bzw. den Verwendungszweck der Schnur
        bzw. des Netzes, damit Kund:innen zwischen Netzteilen, Kits und bestimmten
        Schnurfunktionen innerhalb einer Tasche unterscheiden können.
    ladder_position:
      name: Position der Leiter
      description: Kennzeichnet die Position der Leiter bzw. des Treppenzugangs am
        Hochbett für Kleinkinder.
    lanyard_attachment_hardware:
      name: Befestigungsvorrichtung des Lanyards
      description: Gibt die Art der Befestigungsvorrichtung am Ende des Lanyards an,
        die mit Schlüsseln, Ausweisen, Smartphones oder anderem Zubehör verbunden
        wird.
    lanyard_style:
      name: Schlüsselbandstil
      description: Gibt an, wie das Lanyard getragen bzw. verwendet wird.
    lanyard_type:
      name: Typ des Lanyards
      description: Beschreibt die Art des mit der Pfeife gelieferten bzw. kompatiblen
        Lanyards.
    lap_hand_loom_accessories_included:
      name: Enthaltenes Zubehör für den Handwebrahmen
      description: Zubehör, das im Lieferumfang des Handwebrahmens enthalten ist.
    lapel_style:
      name: Reversstil
      description: Gibt die Form des Revers am Sakko an (z. B. fallendes Revers, Spitzrevers
        oder Schalkragen).
    laser_safety_class:
      name: Lasersicherheitsklasse
      description: Lasersicherheitsklassifizierung des Produkts gemäß Gerätedokumentation
        bzw. Kennzeichnung (z. B. Klasse 2, 3R, 3B oder 4).
    latex_processing_method:
      name: Latexverarbeitungsmethode
      description: Gibt das Herstellungsverfahren des Latexschaums an–typischerweise
        Dunlop oder Talalay–was Haptik, Reaktionsfähigkeit und Preis beeinflusst.
    latex_type:
      name: Typ des Latex
      description: Gibt Herkunft und Zusammensetzung des in der Matratze verwendeten
        Latex an (natürlich, biologisch, synthetisch oder gemischt) und informiert
        Käufer:innen über Haltbarkeit, Umweltfreundlichkeit und mögliche Allergene.
    launch_profile:
      name: Launch-Profil
      description: Gibt die typische Flugbahn an (niedrig, mittel oder hoch), die
        der Golfschlägerschaft erzeugen soll.
    launcher_mounting_configuration:
      name: Montageart des Abschussgeräts
      description: Gibt an, wie der Werfer montiert bzw. konfiguriert wird, und unterstützt
        Käufer:innen bei der Auswahl zwischen eigenständigen, Unterlauf- oder Schienenmontageoptionen.
    layer_construction:
      name: Schichtsystem
      description: Gibt den Aufbau des Gewebelaminats an (z. B. 2-lagig, 2,5-lagig
        oder 3-lagig), was Gewicht, Packmaß und Haltbarkeit beeinflusst.
    layer_design:
      name: Schichtdesign
      description: Beschreibt den Aufbau des Haarnetzes hinsichtlich Schichten bzw.
        Wendbarkeit.
    lazy_kate_tension_control_type:
      name: Typ der Spannungsregelung der Lazy Kate
      description: Beschreibt, wie die Lazy Kate beim Verzwirnen bzw. Aufwickeln Spannung
        auf die Spulen ausübt.
    lead_hardware_type:
      name: Typ der Leinenbefestigung
      description: Definiert die Befestigungsart am Ende der Leine (z. B. Karabiner,
        Clip, Schlaufe oder Kette), was Benutzerfreundlichkeit, Sicherheit und Eignung
        für bestimmte Trainingsarten beeinflusst.
    leaf_gelatin_grade:
      name: Blattgelatine-Qualität
      description: Gibt die standardisierte Festigkeitsklasse von Gelatineblättern
        an.
    leaf_preparation:
      name: Zubereitungsart des Fertigsalats
      description: Beschreibt, wie die Blätter vor dem Verpacken vorbereitet werden,
        z. B. gehackt, zerkleinert oder in Julienne geschnitten.
    leaf_spring_material:
      name: Biegefedermaterial
      description: Primäres Konstruktionsmaterial des Blattfederpakets.
    leak_protection_layer:
      name: Auslaufschutzschicht
      description: Gibt an, ob das integrierte Windelsystem der Schwimmjammer ein
        ein- oder zweilagiges Design zum Auslaufschutz verwendet.
    leash_clip_type:
      name: Typ des Leinenclips
      description: Gibt die Clip- bzw. Befestigungsart an, mit der die Leine an Halsband
        oder Geschirr befestigt wird (z. B. Karabinerhaken, Karabiner oder Drehclip).
    leash_style:
      name: Stil der Leine
      description: Beschreibt die Kordelkonfiguration bzw. Wickelart der Leine.
    leash_type:
      name: Leinenart
      description: Klassifiziert die allgemeine Bauart bzw. zweckorientierte Konfiguration
        der Leine, um ein schnelles Filtern nach Verwendungszweck zu ermöglichen.
    leavening_action_type:
      name: Wirkungsart des Triebmittels
      description: Kennzeichnet die chemische Zusammensetzung bzw. Art des Backtriebmittels
        (z. B. einfachwirkend, doppeltwirkend oder aluminiumfrei). Dies beeinflusst
        direkt Backergebnis und Rezepttauglichkeit.
    leavening_agent:
      name: Triebmittel
      description: Gibt den primären Triebmechanismus im Teig an.
    led_color_options:
      name: LED-Farboptionen
      description: Listet die auswählbaren LED-Farben auf, die am Alarm zur visuellen
        Bissanzeige verfügbar sind.
    led_indicator_color:
      name: Farbe der LED-Anzeige
      description: Kennzeichnet die Farbe der LED-Anzeige des Produkts und hilft Angler:innen
        dabei, mehrere Bissanzeiger abzustimmen oder persönliche Vorlieben umzusetzen.
    led_light_color:
      name: Farbe des LED-Lichts
      description: Gibt die Farbe integrierter LED-Beleuchtung an.
    leek_variety:
      name: Auswahl an Porree
      description: Gibt die Sorte bzw. Varietät des Lauchs an und ermöglicht die Unterscheidung
        nach Geschmack, Größe und Erntezeit.
    leg_coverage:
      name: Beinlänge
      description: Gibt an, wie viel vom Bein durch das Neoprenanzugteil bedeckt wird
        (z. B. Shorty oder Ganzkörperlänge).
    leg_cuff_style:
      name: Stil des Beinbündchens
      description: Gibt die Art des Abschlusses an der Knöchelöffnung der Hose an.
    leg_cut_height:
      name: Höhe des Beinausschnitts
      description: Gibt an, wie hoch der Beinausschnitt des Bikinihöschens geschnitten
        ist.
    leg_cut_style:
      name: Beinschnitt
      description: Beschreibt die Form des Beinausschnitts, was Aussehen, Komfort
        und Bräunungslinien beeinflusst.
    leg_length:
      name: Beinlänge
      description: Kategorisiert Badehosen nach relativer Beinlänge (kurz, mittel
        oder lang), damit Käufer:innen ihre bevorzugte Abdeckung wählen können, ohne
        die Kategorie aufzuteilen.
    leg_loop_type:
      name: Beinschlaufenart
      description: Beschreibt die Konstruktion der Beinschlaufen.
    leg_opening_style:
      name: Stil der Beinöffnung
      description: Gibt an, wie die Beinabschlüsse der Jogginghose verarbeitet sind,
        z. B. mit elastischen Bündchen, Reißverschlussabschlüssen oder offenen Säumen.
    leg_style:
      name: Bauart der Beine
      description: Definiert die Bauart bzw. das Design der Bankbeine oder des Gestells.
    legging_foot_design:
      name: Fußdesign der Leggings
      description: Gibt an, ob die Leggings fußlos, mit Fußteil oder zwischen beiden
        Varianten wandelbar sind.
    leggings_waistband_style:
      name: Stil des Leggingsbunds
      description: Gibt die strukturelle Gestaltung des Leggingsbunds an, was Komfort,
        Halt und Optik beeinflusst.
    lei_closure_style:
      name: Verschlussart der Lei
      description: Beschreibt, ob die Lei eine geschlossene Schlaufe bildet oder offene
        Enden besitzt, die gebunden bzw. mit Bändern verschlossen werden.
    lemon_variety:
      name: Zitronensorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät der Zitronen (z. B.
        Eureka, Meyer oder Amalfi).
    length_adjustment_method:
      name: Methode zur Längenverstellung
      description: Gibt an, ob und wie die Länge des Springseils an die nutzende Person
        angepasst werden kann.
    lens_color_tint:
      name: Linsenfarbe/-tönung
      description: Farbe bzw. Tönung der mit dem Produkt gelieferten Schutzbrillengläser.
    lens_construction:
      name: Schutzbrillenkonstruktion
      description: Gibt die Bauart der Linse an (z. B. einfach oder doppelt verglast/thermisch),
        um Beschlagbeständigkeit und optische Leistung zu kennzeichnen.
    lens_tint_category:
      name: Linsentönungskategorie
      description: Klassifiziert die Dunkelheit der Linse anhand internationaler Tönungskategorien
        und hilft Kund:innen bei der Auswahl geeigneter Linsen für unterschiedliche
        Lichtverhältnisse.
    lettuce_variety:
      name: Salatsorte
      description: Kennzeichnet die spezifische Salatsorte (z. B. Eisberg-, Romana-
        oder Kopfsalat) und ermöglicht präzises Filtern und Vergleichen.
    level_of_play:
      name: Spielniveau
      description: Vom Hersteller angegebene Leistungsstufe passend zu Spielniveau
        und Budget.
    lever_configuration:
      name: Hebelanordnung
      description: Gibt die Hebel- bzw. Griffkonfiguration der Motorsteuerung des
        Wasserfahrzeugs an (z. B. Einhebel- oder Zweihebelsteuerung).
    lever_type:
      name: Hebeltyp
      description: Art bzw. Mechanismus der an den Harfensaiten montierten Tonhöhenhebel.
    license_plate_cover_style:
      name: Stil der Kennzeichenabdeckung
      description: Gibt die Bauart der Kennzeichenabdeckung an (z. B. Vollabdeckung
        oder Schraubkappen).
    license_plate_personalization_type:
      name: Typ der Kennzeichenpersonalisierung
      description: Gibt an, ob das Kennzeichen leer, vorgedruckt oder durch Käufer:innen
        individualisierbar ist (Text und/oder Grafiken).
    license_usage_terms:
      name: Lizenz-/Nutzungsbedingungen
      description: Nutzungsrechte für das Muster (z. B. nur private Nutzung oder eingeschränkte
        kommerzielle Nutzung).
    licensed_sports_property:
      name: Lizenzierte Sportmarke
      description: Gibt an, ob das Produkt offiziell von einer Liga, einem Team oder
        einer Organisation lizenziert ist.
    lid_hinge_mechanism:
      name: Deckelscharniermechanismus
      description: Gibt den für den Deckel verwendeten Scharniermechanismus an, was
        Sicherheit und Benutzerfreundlichkeit beeinflusst.
    lid_support_positions:
      name: Positionen der Deckelstütze
      description: Gibt die unterstützten Positionen der Deckelstütze des Flügels
        an (wie weit der Deckel geöffnet werden kann).
    lie_angle_color_code:
      name: Farbcode des Lie-Winkels
      description: Kennzeichnet das farbcodierte Lie-Winkel-System des Herstellers,
        das bei einigen Golfschlägern verwendet wird (z. B. Black Dot oder Green Dot).
    life_jacket_certification_standard:
      name: Zertifizierungsstandard für Rettungswesten
      description: Offizielle Sicherheitsklassifizierung bzw. Norm, die das Produkt
        erfüllt, z. B. USCG-Typ oder ISO-/AS-Stufen.
    life_raft_certification_standard:
      name: Zertifizierungsstandard für Rettungsboote
      description: Sicherheitsstandard bzw. Zertifizierung, nach dem bzw. der das
        Floß gebaut und gewartet wird.
    life_raft_container_type:
      name: Typ des Rettungsinsel-Containers
      description: Beschreibt, wie die Rettungsinsel für Lagerung und Einsatz verpackt
        ist.
    life_vest_approval_standard:
      name: Normstandard für Rettungswesten
      description: Gibt den Zertifizierungs- bzw. Zulassungsstandard an, dem die Rettungsweste
        entspricht.
    life_vest_intended_user:
      name: Vorgesehene Nutzergruppe der Rettungsweste
      description: Gibt die vorgesehene Trägerkategorie für Passform und Ausstattung
        an.
    lifebuoy_approval_standard:
      name: Zulassungsstandard des Rettungsrings
      description: Sicherheitszulassung bzw. Norm, der der Rettungsring entspricht
        (z. B. USCG/SOLAS).
    lifebuoy_features:
      name: Merkmale des Rettungsrings
      description: Funktions-, Befestigungs- und Zubehörmerkmale des Rettungsrings.
    lift_mechanism_type:
      name: Hebemechanismus
      description: Beschreibt den Mechanismus zum Anheben/Absenken bzw. Öffnen/Schließen
        des Wandbetts.
    lift_stand_support_point:
      name: Hebe-/Auflagepunkt
      description: Stelle, an der Hebebühne bzw. Ständer das Fahrzeug berühren bzw.
        stützen.
    lifting_gas_type:
      name: Typ des Traggases
      description: Gibt das primäre Traggas bzw. Auftriebsmedium des Luftschiffs an.
    lifting_support_type:
      name: Typ der Hebeunterstützung
      description: Gibt an, ob die Hebebühne über Auffahrrampen genutzt wird oder
        das Fahrzeug über Arme/Auflagen an Rahmen bzw. Hebepunkten anhebt.
    ligature_and_cap_component_type:
      name: Typ der Ligatur-/Kappenkomponente
      description: Gibt an, ob es sich bei dem Produkt um eine Ligatur, eine Kappe
        oder ein Set mit beidem handelt.
    ligature_material:
      name: Material der Ligatur
      description: Primäres Material des Ligaturkörpers, das das Rohrblatt berührt
        und fixiert (z. B. Metall, Leder oder Stoff).
    ligature_plating_or_finish:
      name: Beschichtung bzw. Finish der Ligatur
      description: Gibt die Beschichtung bzw. Oberflächenbehandlung einer Metall-Ligatur
        und/oder -Kappe für Klarinetten an.
    ligature_reed_contact_style:
      name: Kontaktart der Ligatur zum Rohrblatt
      description: Gibt an, wie die Ligatur das Rohrblatt berührt (z. B. minimaler
        Kontakt, Mehrpunktkontakt oder Rundumkontakt).
    ligature_screw_position_relative_to_reed:
      name: Position der Ligaturschraube (relativ zum Rohrblatt)
      description: Gibt die Position der Feststellschraube(n) der Ligatur relativ
        zur dem Rohrblatt bzw. der spielenden Person zugewandten Seite an, wenn sie
        auf dem Mundstück montiert ist.
    ligature_tension_adjustment_mechanism:
      name: Mechanismus zur Einstellung der Ligaturspannung
      description: Beschreibt, wie die Ligatur Druck auf das Rohrblatt ausübt bzw.
        einstellt (Befestigungsdesign).
    ligature_tightening_mechanism_type:
      name: Typ des Feststellmechanismus der Ligatur
      description: Gibt den Mechanismus an, mit dem die Ligatur um Mundstück und Rohrblatt
        festgezogen wird (z. B. Einzelschraube, Doppelschraube oder Hebel-/Schnellverschluss).
    light_bar_housing_material:
      name: Gehäusematerial der Lichtleiste
      description: Primäres Material des Gehäuses bzw. Körpers der Lichtleiste, was
        Haltbarkeit und Wärmeableitung beeinflusst.
    light_bar_lens_material:
      name: Linsenmaterial des Lightbars
      description: Primäres Material der Linse bzw. Abdeckung der Lichtleiste, was
        Schlagfestigkeit und optische Klarheit beeinflussen kann.
    light_bar_mounting_location:
      name: Montageort des Lightbars
      description: Primär vorgesehene Montageposition am Fahrzeug.
    light_stand_style:
      name: Stil des Lichtstativs
      description: Gibt die Bauart bzw. Form des Stativs zur Befestigung von Spezialeffektbeleuchtung
        an (z. B. Dreibeinstativ, T-Bar oder Kurbelstativ), nicht die Montagefläche
        (Wand/Decke), die separat über die Montageart definiert wird.
    light_switch_function:
      name: Funktion des Lichtschalters
      description: Gibt an, welche Beleuchtungskreise bzw. Funktionen der Schalter
        steuert.
    lighting_control_protocols_supported:
      name: Unterstützte Lichtsteuerungsprotokolle
      description: Steuerungs- bzw. Netzwerkprotokolle, die der Controller zusätzlich
        zu oder anstelle von DMX512 unterstützt.
    lighting_effects:
      name: Lichteffekte
      description: Gibt integrierte Beleuchtungsfunktionen an, die Gameplay oder Optik
        verbessern.
    lighting_mode:
      name: Beleuchtungsmodus
      description: Listet die verfügbaren Lichtmodi auf, z. B. Dauerlicht, Blinklicht,
        Stroboskop oder SOS.
    lily_variety:
      name: Lilienart
      description: Gibt die Handels- bzw. botanische Sorte der als Schnittblume verkauften
        Lilie an (z. B. Asiatische oder Orientalische Lilie).
    limb_articulation:
      name: Beweglichkeit der Gliedmaßen
      description: Gibt den Grad der Flexibilität bzw. Beweglichkeit der Gliedmaßen
        der Puppe an (keine, fixiert, halbflexibel oder voll beweglich).
    limb_material:
      name: Material der Wurfarme
      description: Primäres Material der Wurfarme eines Bogens oder einer Armbrust,
        was Gewicht, Haltbarkeit, Vibration und Gesamtleistung beeinflusst
    lime_variety:
      name: Auswahl an Limetten
      description: Kennzeichnet die spezifische botanische bzw. kommerzielle Limettensorte.
    line_buoyancy:
      name: Auftrieb der Schnur
      description: Beschreibt, ob die geflochtene Schnur von Natur aus schwimmt oder
        sinkt und wie schnell, was Köderführung und Schnurmanagement beeinflusst.
    line_purpose:
      name: Leinenzweck
      description: Definiert die vorgesehene Funktion der Leine innerhalb des Kite-Systems
        (z. B. Frontleine, Depower-Leine oder Waageleine).
    linen_finish_treatment:
      name: Finish/Behandlung des Leinens
      description: Jegliche Veredelungsbehandlung des Leinenstoffs, die Haptik, Optik
        oder Leistung verändert.
    linen_weave_type:
      name: Webart des Leinens
      description: Gibt die Webart des Leinenstoffs an, was Textur, Atmungsaktivität
        und Fall beeinflusst.
    liner_padding_type:
      name: Typ der Futterpolsterung
      description: Gibt die Bauart bzw. Polsterung des Futters an (z. B. Mesh, leicht
        gepolstert oder gesteppt).
    liner_shape:
      name: Form des Inletts
      description: Beschreibt die allgemeine Form des Schlafsackinletts, damit Kund:innen
        es passend zu Schlafsack und Komfortvorlieben auswählen können.
    liner_type:
      name: Typ des Innenfutters
      description: Gibt an, ob die Shorts ein Innenfutter besitzen und falls ja, um
        welche Art es sich handelt.
    lining:
      name: Futter
      description: Gibt an, ob und wie die Badehose gefüttert ist, einschließlich
        des Umfangs der Innenfütterung.
    lining_material:
      name: Futtermaterial
      description: Gibt das Material des Innenfutters des Schuhs an, was Komfort,
        Atmungsaktivität und Wärme beeinflusst.
    lining_type:
      name: Art des Futters
      description: Gibt an, ob und in welchem Umfang das Badebekleidungsstück gefüttert
        ist.
    link_connection_style:
      name: Art der Kettenverbindung
      description: Klassifiziert, wie das Kettenglied mit der Kette verbunden wird
        (z. B. Schnellverschluss oder Verbindungsstift), damit Fahrer:innen die richtige
        Montageart bzw. das passende Ersatzteil auswählen können.
    live_bait_form:
      name: Form des Lebendköders
      description: Gibt die physische Form bzw. den Konservierungszustand des Köders
        an, z. B. lebend, gefroren oder getrocknet.
    living_room_furniture_items_included:
      name: Wohnzimmermöbel inklusive
      description: Gibt die einzelnen Möbelstücke der Wohnzimmergarnitur an und hilft
        Käufer:innen schnell zu erkennen, welche Komponenten enthalten sind (z. B.
        Sofa, Zweisitzer oder Couchtisch).
    load_mechanism:
      name: Lademechanismus
      description: Gibt die primäre Methode an, mit der Widerstand an der Maschine
        erzeugt bzw. hinzugefügt wird (z. B. Gewichtsstapel, scheibenbeladen oder
        bandbasiert).
    lock_cylinder_type:
      name: Typ des Schließzylinders
      description: Gibt die Art des verwendeten Schlüsselzylinders bzw. -kerns an
        (relevant für Aufsperrschutz und Ersatzschlüssel).
    lock_security_level:
      name: Sicherheitsstufe des Schlosses
      description: Beschreibt die Sicherheitsmerkmale des Schlosses bzw. Zylinders
        gegen Picking und Aufbohren.
    lock_system:
      name: Schließsystem
      description: Art des Sicherheitsverriegelungssystems, das verwendet wird, um
        den Lift in angehobener Position zu halten.
    locker_bench_configuration:
      name: Konfiguration der Spindbank
      description: Beschreibt die Ausrichtung bzw. strukturelle Konfiguration der
        Spindbank (z. B. einseitig, doppelseitige Insel oder wandmontiert).
    locomotive_prototype_power_type:
      name: Antriebsart des Lokomotivvorbilds
      description: Gibt die reale Antriebsart der Lokomotive an, die durch das Modell
        dargestellt wird.
    locomotive_wheel_arrangement_whyte_notation:
      name: Radanordnung der Lokomotive (Whyte-Notation)
      description: Radanordnung des Lokomotivvorbilds (z. B. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Höhenklassifizierung des Hochbetts
      description: Gibt die Gesamthöhe des Hochbetts an (niedrig, mittel, hoch oder
        extra hoch) und hilft Käufer:innen bei der Auswahl passend zu Deckenhöhe und
        Platz unter dem Bett.
    logo_application_method:
      name: Methode der Logoaufbringung
      description: Beschreibt, wie Schulwappen bzw. Logo auf dem Kleidungsstück angebracht
        sind (z. B. gestickt oder gedruckt).
    logo_label_compatible_fabric_weight:
      name: Kompatibles Stoffgewicht für das Logoetikett
      description: Empfohlene Stoffgewichtskategorie zur Anbringung des Etiketts ohne
        Verzug oder zusätzliches Volumen.
    logo_label_edge_finish:
      name: Kantenverarbeitung des Logoetiketts
      description: Gibt die Kantenkonstruktion bzw. -verarbeitung des Etiketts an,
        was Ausfransschutz und Tragekomfort auf der Haut beeinflusst.
    logo_label_print_production_method:
      name: Druck-/Produktionsverfahren des Logoetiketts
      description: Beschreibt, wie das Logo auf die Oberfläche des Etiketts aufgebracht
        bzw. geformt wird.
    long_block_completeness:
      name: Vollständigkeit des Longblocks
      description: Gibt an, welche Hauptkomponenten in der Longblock-Baugruppe enthalten
        sind.
    long_john_pieces_included:
      name: Enthaltene Long-John-Teile
      description: Gibt an, ob das Produkt nur Unterteil, nur Oberteil oder beide
        Teile des Long-John-Sets umfasst.
    longan_variety:
      name: Longan-Sorte
      description: Gibt die Sorte bzw. Handelssorte der Longanfrucht an (z. B. Kohala
        oder Biew Kiew) und hilft Käufer:innen bei der Auswahl nach Geschmack, Größe
        und Süßegrad.
    loom_accessories_included:
      name: Enthaltenes Zubehör für den Webstuhl
      description: Wichtiges Zubehör, das im Lieferumfang des Webstuhls enthalten
        ist.
    loom_finish:
      name: Finish des Webstuhls
      description: Oberflächenfinish des Webstuhls (hauptsächlich bei Holzwebstühlen).
    loom_folding_portability_design_type:
      name: Typ des faltbaren/tragbaren Webstuhldesigns
      description: Gibt an, ob und wie sich der Webstuhl für Transport oder platzsparende
        Lagerung zusammenklappen lässt.
    loom_frame_folding_design:
      name: Faltbares Rahmendesign des Webstuhls
      description: Gibt an, ob und wie sich der Rahmen des Tischwebstuhls für Lagerung
        oder Transport zusammenklappen, zerlegen oder kompakt verstauen lässt.
    loom_tension_adjustment_method:
      name: Methode zur Einstellung der Webstuhlspannung
      description: Primäre Methode zur Einstellung der Kettfadenspannung am Webstuhl.
    loom_tie_up_system:
      name: Bindungssystem des Webstuhls
      description: Art des Verbindungssystems zwischen Tritten, Lamellen und Schäften
        (z. B. Texsolv oder Metallkette).
    loquat_variety:
      name: Mispelsorte
      description: Gibt die Sorte bzw. Varietät der Mispel an und beschreibt Unterschiede
        in Größe, Geschmack, Reifezeit und Aussehen.
    lubricant_features:
      name: Eigenschaften des Schmierstoffs
      description: Hebt besondere Leistungsmerkmale, Additive oder Vorteile des Schmierstoffs
        hervor.
    lubrication_requirement:
      name: Anforderung an die Schmierung
      description: Gibt an, ob das Laufband vorbehandelt bzw. wartungsfrei ist oder
        regelmäßig geschmiert bzw. gewachst werden muss.
    lubrication_type:
      name: Schmierungsart
      description: Gibt an, ob die Buchse geschmiert werden kann und für die Wartung
        mit Fett ausgelegt ist (z. B. mit Nuten oder Schmiernippel).
    lug_nut_seat_profile:
      name: Profil des Radmuttersitzes
      description: Gibt das vom Rad benötigte Profil des Radmuttersitzes an, um Kompatibilität
        und sichere Montage der Radmuttern zu gewährleisten.
    lumbar_support_type:
      name: Typ der Lendenwirbelstütze
      description: Beschreibt die Art der Lendenwirbelstütze des Stuhls (z. B. abnehmbares
        Kissen, Verstellmechanismus oder Massagefunktion).
    lunge_trainer_style:
      name: Stil des Ausfallschritttrainers
      description: Definiert die Bauart des Ausfallschritttrainers.
    lure_buoyancy:
      name: Auftrieb des Köders
      description: Gibt an, wie sich der Köder im Wasser verhält, wenn er ruht oder
        eingeholt wird (z. B. an der Oberfläche schwimmend, schwebend oder sinkend).
    luster:
      name: Glanzeigenschaft
      description: Beschreibt die Art, wie Licht mit der Oberfläche des Exemplars
        interagiert (z. B. glasartig oder metallisch).
    lychee_cultivar:
      name: Litschi-Sorte
      description: Kennzeichnet die jeweilige Litschi-Sorte bzw. den Kultivar–z. B.
        Brewster, Hak Ip oder Mauritius–die sich hinsichtlich Geschmack, Kerngröße,
        Erntezeit und Preis unterscheiden können.
    lyre_flip_folder_mounting_location:
      name: Montageposition der Lyra/des Flipfolders
      description: Gibt an, wo Lyra oder Flipfolder am Instrument bzw. Zubehör montiert
        werden sollen (z. B. Schallbecher, Mundrohr oder Ständer).
    lyrics_display_type:
      name: Typ der Liedtextanzeige
      description: Gibt an, wie Liedtexte beim Karaoke angezeigt werden (falls unterstützt).
    magazine_compatibility:
      name: Magazinkompatibilität
      description: Gibt die primären Magazinkaliber bzw. Magazintypen an, für die
        die integrierten Taschen der Weste ausgelegt sind.
    magnet_requirement:
      name: Magnetanforderung
      description: Gibt an, ob der Sensor für den Betrieb einen externen Magneten
        benötigt.
    magnet_toy_storage_included:
      name: Enthaltene Aufbewahrung für Magnetspielzeug
      description: Art der im Lieferumfang enthaltenen Aufbewahrung bzw. Box für das
        Magnetspielzeug zur Organisation auf dem Schreibtisch und für Reisen.
    malanga_variety:
      name: Malanga-Sorte
      description: Kennzeichnet die spezifische Sorte der angebotenen Malanga/Taro-Wurzel,
        um dem Käufer die Auswahl des gewünschten Geschmacks, der Farbe oder der kulinarischen
        Anwendung zu erleichtern.
    malt_color_rating_system:
      name: Bewertungssystem für Malzfarbe
      description: Gibt an, auf welche Farbskala sich die angegebene Farbe bezieht
        (Lovibond, SRM oder EBC).
    malt_crush:
      name: Malzschrotung
      description: Gibt an, ob das Basismalz ganz/ungemahlen oder vorgeschrotet verkauft
        wird und falls ja, welche Art der Schrotung verwendet wurde.
    malt_form:
      name: Malzform
      description: Gibt an, ob das Produkt als ganze Körner oder verarbeitet für das
        Maischen verkauft wird (z. B. geschrotet).
    malt_intended_use:
      name: Einsatzzweck für das Malz
      description: Vorgesehener primärer Verwendungszweck des Malzes (Brauen, Destillieren
        oder beides).
    malt_treatment:
      name: Malzbehandlung
      description: Beschreibt, wie das Getreide bzw. Malz über das Standarddarren
        hinaus verarbeitet wurde (gängige Spezialverfahren).
    malt_usage_purpose:
      name: Verwendungszweck des Malzes
      description: Beschreibt den primären funktionalen Beitrag eines Spezialmalzes
        zu einem Bierrezept.
    man_overboard_system_type:
      name: Typ des Mann-über-Bord-Systems
      description: Gibt die primäre Kategorie der vom Produkt bereitgestellten Mann-über-Bord-Lösung
        (MOB) an.
    mandolin_back_sides_wood:
      name: Holz für Boden und Zargen der Mandoline
      description: Gibt die Holzart an, die für Boden und Zargen der Mandoline verwendet
        wird.
    mandolin_body_top_wood:
      name: Holz der Mandolinendecke
      description: Primäres Holz bzw. Material der Resonanzdecke (Oberdecke) der Mandoline.
    mandolin_bridge_type:
      name: Typ des Mandolinenstegs
      description: Gibt die Stegart der Mandoline an.
    mandolin_pickup_configuration:
      name: Tonabnehmerart der Mandoline
      description: Gibt an, ob die Mandoline über Elektronik verfügt und welches Tonabnehmersystem
        installiert ist.
    mandolin_string_configuration:
      name: Saitenart der Mandoline
      description: Gibt die Saitenkonfiguration der Mandoline anhand der Gesamtzahl
        der Saiten und Chöre an (z. B. 8 Saiten / 4 Chöre).
    mangosteen_variety:
      name: Mangostan-Sorte
      description: Kennzeichnet die angebotene Art bzw. Sorte der Mangostan oder einer
        verwandten Garcinia-Frucht.
    mannequin_style:
      name: Stil der Schaufensterpuppe
      description: Beschreibt die Bauart bzw. den Konstruktionsstil der Trainingspuppe.
    manufacturing_process:
      name: Herstellungsverfahren
      description: Primäres Herstellungsverfahren des Rollenkörpers bzw. der Spule
        (z. B. CNC-gefräst oder Druckguss).
    map_coverage_sky_planet_body:
      name: Kartenabdeckung (Himmel/Himmelskörper)
      description: 'Gibt an, was die Karte darstellt: den Nachthimmel (Sternbilder)
        oder einen bestimmten Himmelskörper.'
    map_format:
      name: Kartenformat
      description: Definiert die physische oder digitale Darstellung von Jagdkarten
        und -führern.
    map_sensor_output_signal_type:
      name: Typ des Ausgangssignals des MAP-Sensors
      description: Gibt die Art des Ausgangssignals an, das der MAP-Sensor an das
        Motorsteuergerät (ECU) liefert.
    map_size_sheet:
      name: Kartengröße (Blatt)
      description: Gibt die fertige Größe des Kartenblatts, Posters oder der Planisphäre
        an, um Darstellung und Kompatibilität zu erleichtern (Rahmengröße, Wandfläche).
    marabou_feather_form:
      name: Form der Marabufeder
      description: Bauform des angebotenen Marabufederprodukts.
    marabou_feather_treatment:
      name: Behandlung der Marabufeder
      description: Beschreibt, wie die Marabufeder für Bastel- bzw. Handarbeitszwecke
        verarbeitet oder veredelt wurde.
    marble_track_set_feature_modules:
      name: Funktionsmodule des Murmelbahnsets
      description: Hebt besondere Funktionsmodule hervor, die im Set enthalten sind
        (z. B. Aufzug, Starter oder Weichen).
    marine_flare_certification_standard:
      name: Zertifizierung/Standard für Seenotsignale
      description: Gibt an, welche maritime(n) Sicherheitszertifizierung(en) bzw.
        -standards das Seenotsignal laut Hersteller erfüllt.
    marine_safety_standard_compliance:
      name: Einhaltung maritimer Sicherheitsstandards
      description: Gibt an, welche formalen Sicherheitsstandards bzw. Zulassungen
        für den Wassersport das Zubehör erfüllt.
    marine_transmission_type:
      name: Schiffsantriebsart
      description: Gibt die Art des Schiffsgetriebes an, das mit dem Innenbordmotor
        kombiniert ist (z. B. Direktantrieb oder V-Antrieb).
    marker_action_type:
      name: Makierertypen
      description: Beschreibt den grundlegenden Schuss- bzw. Betriebsmechanismus des
        Markierers.
    marker_caliber:
      name: Kaliber des Markierers
      description: Gibt den Durchmesser der Paintballs an, für die der Markierer ausgelegt
        ist.
    marking_durability:
      name: Haltbarkeit der Markierung
      description: Gibt an, wie lange die markierte Linie unter normalen Bedingungen
        sichtbar bleibt, z. B. temporär (bis zu 3 Wochen), semipermanent (bis zu 6
        Monate) oder permanent (mehr als 6 Monate).
    marking_tip_type:
      name: Typ der Markierungsspitze
      description: Art des Markiereinsatzes, den der Zirkel zum Zeichnen verwendet
        (z. B. Minenhalter, Tinte oder Reißspitze).
    marshmallow_processing_method:
      name: Verarbeitungsmethode der Marshmallows
      description: Beschreibt spezielle Verarbeitungsmethoden der Marshmallows, die
        Textur, Haltbarkeit oder Geschmack beeinflussen.
    marshmallow_size:
      name: Marshmallowgröße
      description: Klassifiziert die relative Größe einzelner Marshmallowstücke.
    martial_arts_belt_rank:
      name: Gürtelgrad im Kampfsport
      description: Gibt die Fähigkeits- bzw. Rangstufe an, die durch die Farbe oder
        besondere Farbkombination des Gürtels dargestellt wird.
    mask_bib_type:
      name: Typ des Maskenlatzes
      description: Gibt die Art des Latzes an der Fechtmaske an, z. B. Standardstoff,
        leitfähig, abnehmbar oder ohne Latz.
    mask_cage_material:
      name: Material des Maskengitters
      description: Material, das speziell für das Gesichtsgitter bzw. den Maskenrahmen
        verwendet wird.
    mask_goggle_design:
      name: Design der Maske/Schutzbrille
      description: Definiert die allgemeine Bauart bzw. den Abdeckungsstil der Schutzausrüstung.
    mask_skirt_material:
      name: Dichtungsmaterial der Maske
      description: Kennzeichnet das Material des weichen Dichtungsrandes, der die
        wasserdichte Abdichtung zwischen Maske und Gesicht gewährleistet.
    mask_strap_material:
      name: Riemenmaterial der Maske
      description: Gibt das Material des Riemens an, der die Maske am Kopf befestigt.
    mass_air_flow_sensor_measurement_type:
      name: Messart des Luftmassenmessers
      description: Gibt die vom MAF-Sensor verwendete Sensortechnologie bzw. Ausgangsart
        an.
    mass_air_flow_sensor_mounting_type:
      name: Montageart des Luftmassenmessers
      description: Beschreibt, wie der Luftmassenmesser bzw. die Sensoreinheit im
        Ansaugsystem montiert bzw. installiert wird.
    massage_feature:
      name: Massagefunktion
      description: Gibt an, ob die verstellbare Basis über eine integrierte Massagefunktion
        verfügt und falls ja, wie viele Massagezonen sie bietet.
    mast_attachment_interface:
      name: Mastbefestigungsschnittstelle
      description: Gibt den Verbindungsstandard zwischen Rumpf und Mast an und hilft
        Käufer:innen dabei, die Passgenauigkeit der Komponenten sicherzustellen.
    mast_base_type:
      name: Mastfußtyp
      description: Kennzeichnet die Montageschnittstelle, die den Mast mit dem Board
        oder Adapter verbind
    mast_bend_curve:
      name: Mastbiegekurve
      description: Biegeverhalten des Masts, das Segelkompatibilität und Handling
        bestimmt.
    mast_diameter_type:
      name: Mastdurchmessertyp
      description: Standardisierte Durchmesserklassifizierung des Windsurfmasts (z. B.
        RDM, SDM oder MDM) zur Überprüfung der Kompatibilität.
    mat_backing_type:
      name: Typ der Mattenrückseite
      description: Gibt die Art der Unterseite der Matte an, die dafür sorgt, dass
        sie auf verschiedenen Oberflächen an Ort und Stelle bleibt.
    mat_installation_method:
      name: Installationsmethode der Matte
      description: Gibt an, wie die Matte installiert bzw. befestigt wird.
    mat_style:
      name: Stil der Matte
      description: Definiert die Bauart bzw. den Formfaktor der Matte (z. B. Faltmatte,
        Steckmatte oder Crashpad).
    maternity_panel_type:
      name: Typ des Umstandseinsatzes
      description: Kennzeichnet die Art des Stretch-Einsatzes bzw. Bundes, der für
        den wachsenden Bauch während der Schwangerschaft ausgelegt ist.
    maternity_waistband_style:
      name: Stil des Umstandsbunds
      description: Beschreibt Gestaltung und Position des Bundes bzw. Bauchpanels
        bei Umstandshosen und wie das Kleidungsstück den wachsenden Bauch unterstützt.
    mattress_top_type:
      name: Typ der Matratzenoberfläche
      description: Gibt die Art der obersten Schicht bzw. Oberflächenkonstruktion
        der Matratze an, z. B. Pillow Top oder Tight Top.
    maturation_vessel_material:
      name: Material des Reifungsgefäßes
      description: Gibt das primäre Material des Gefäßes bzw. Fasses an, das zur Reifung
        des Shochu verwendet wird.
    maximum_quilt_size_supported:
      name: Unterstützte maximale Quiltgröße
      description: Die maximale Größe der Steppdecke bzw. des Projekts, die der Rahmen
        aufnehmen kann (üblicherweise als Bettgröße oder maximale Breite angegeben).
    meal_course:
      name: Art der Mahlzeit
      description: Gibt die typische Mahlzeit bzw. den Verzehranlass für das Produkt
        an.
    meal_preparation_state:
      name: Zubereitungszustand der Mahlzeit
      description: Gibt an, wie viel Vorbereitung vor dem Verzehr erforderlich ist
        (z. B. verzehrfertig oder Meal Kit).
    meat_processing_state:
      name: Verarbeitungszustand des Fleisches
      description: Gibt den Gar- bzw. Pökelgrad an, dem das Fleischprodukt vor dem
        Verkauf unterzogen wurde.
    meat_quality_grade:
      name: Qualitätsstufe des Fleisches
      description: Kennzeichnet die Qualitätsstufe bzw. Klassifizierung, die dem Fleisch
        von einer anerkannten Bewertungsstelle zugewiesen wurde (z. B. USDA, MSA oder
        Wagyu).
    meat_raising_claim:
      name: Angaben zur Tierhaltung
      description: Hebt gängige Angaben zu Tierwohl bzw. Haltungsformen hervor, die
        mit dem Fleisch verbunden sind (z. B. Weidehaltung oder Freilandhaltung).
    mechanical_loom_assembly_status:
      name: Montagezustand des mechanischen Webstuhls
      description: Beschreibt, in welchem Montagezustand der Webstuhl geliefert bzw.
        versendet wird.
    mechanical_loom_weaving_type:
      name: Webart des mechanischen Webstuhls
      description: Primärer Webmechanismus bzw. Webtyp, der vom Webstuhl unterstützt
        wird.
    mechanical_puzzle_primary_mechanism:
      name: Primärer Mechanismus des mechanischen Puzzles
      description: Primäre Interaktion bzw. primärer Mechanismus zur Lösung des mechanischen
        Puzzles.
    mechanical_puzzle_solution_format:
      name: Lösungsformat für mechanische Puzzles
      description: Format, in dem Hinweise bzw. Lösungen bereitgestellt werden, sofern
        enthalten.
    medal_attachment_style:
      name: Befestigungsart der Medaille
      description: Gibt an, wie die Medaille getragen bzw. präsentiert werden soll
        (z. B. Umhängeband oder Anstecknadel).
    medal_award_level:
      name: Auszeichnungsstufe der Medaille
      description: Gibt die Auszeichnungsstufe an, die durch die Medaille dargestellt
        wird (z. B. 1. Platz oder Teilnahme).
    medal_finish:
      name: Finish der Medaille
      description: Gibt das Oberflächenfinish der Medaille an (optischer Glanz bzw.
        Struktur), unabhängig vom Material.
    medal_packaging:
      name: Verpackung der Medaille
      description: Gibt die Art der Präsentationsverpackung an, die der Medaille beiliegt.
    melodica_accessory_set_included:
      name: Enthaltenes Melodica-Zubehörset
      description: Gibt an, welches gängige Zubehör im Lieferumfang der Melodica enthalten
        ist.
    melodica_air_chamber_material:
      name: Material der Luftkammer der Melodica
      description: Material der Luftkammer bzw. des Korpus der Melodica (ABS, Holz
        usw.), sofern es getrennt von anderen Teilen angegeben wird.
    melodica_included_accessories:
      name: Mitgeliefertes Zubehör zur Melodica
      description: Zubehör, das im Lieferumfang der Melodica enthalten ist (im Karton).
    melodica_key_color_scheme:
      name: Farbschema der Melodica-Tasten
      description: Farbschema der Tasten (nicht des Gehäuses), das die Lesbarkeit
        beeinflusst (insbesondere für Kinder bzw. Anfänger:innen).
    melodica_mouthpiece_configuration:
      name: Konfiguration des Melodica-Mundstücks
      description: Gibt an, welche Blasvorrichtung(en) zum Spielen der Melodica enthalten
        sind bzw. verwendet werden.
    melodica_mouthpiece_type:
      name: Typ des Melodica-Mundstücks
      description: Art der mit der Melodica gelieferten Blasvorrichtung (Mundstück
        und/oder flexibler Schlauch).
    melodica_reed_plate_material:
      name: Material der Stimmzungen der Melodica
      description: Material der Stimmplatte (unabhängig vom Material des Instrumentenkorpus),
        das Haltbarkeit und Klang beeinflussen kann.
    melodica_size_class:
      name: Größenklasse der Melodica
      description: Allgemeine Größen- bzw. Transportklasse der Melodica, typischerweise
        basierend auf Tastenanzahl und Formfaktor (z. B. Mini-/Schülermodell, Standard
        oder Extended Range).
    melon_variety:
      name: Auswahl an Melonen
      description: Gibt die genaue Melonensorte im Produkt an, damit Käufer:innen
        ihre bevorzugte Sorte schnell identifizieren können.
    memory_foam_infusion_material:
      name: Infusionsmaterial des Memory-Schaums
      description: Kennzeichnet spezielle Stoffe, die dem Memory-Schaum zur Kühlung,
        Geruchskontrolle oder für antimikrobielle Zwecke zugesetzt wurden.
    memory_wire_gauge:
      name: Stärke des Memory-Drahts
      description: Gibt die Stärke des Memory-Drahts in American Wire Gauge (AWG)
        an.
    memory_wire_project_size:
      name: Projektgröße des Memory-Drahts
      description: Gibt die vorgesehene Schmuckform bzw. Spulengröße an, für die der
        Memory-Draht geformt ist (z. B. Armband, Halskette oder Ring).
    metal_purity:
      name: Metallreinheit
      description: Gibt den Feinheits- bzw. Reinheitsgrad des im Schmuck verwendeten
        Metalls an, typischerweise in Karat (K) oder Tausendteilen.
    metrics_counted:
      name: Gezählte Kennzahlen
      description: Listet die einzelnen Statistiken bzw. Ereignisse auf, die der Zähler
        erfassen soll.
    metronome_display_style:
      name: Stil der Metronomanzeige
      description: Gibt an, wie das Tempo angezeigt wird (Zeiger/Pendel, numerische
        LED-/LCD-Anzeige oder Blinklicht).
    metronome_output_method:
      name: Ausgabemethode des Metronoms
      description: Gibt die verfügbaren Ausgabemethoden für das Ton- bzw. Taktsignal
        des Metronoms an.
    microphone_toy_feature_set:
      name: Funktionsumfang des Spielzeugmikrofons
      description: Wichtige Spielfunktionen des Spielzeugmikrofons (Stimmeffekte,
        Verstärkung, Aufnahme usw.).
    midi_output_type:
      name: Typ der MIDI-Ausgabe
      description: Gibt die Art bzw. Art(en) der vom Trigger-Modul bereitgestellten
        MIDI-Ausgabe an.
    military_branch:
      name: Teilstreitkraft
      description: Kennzeichnet die Teilstreitkraft, für die die Uniform ausgegeben
        wurde bzw. von der sie inspiriert ist.
    milk_base_type:
      name: Grundzutat der Pflanzenmilch
      description: Gibt die primär im Getränk verwendete Milch bzw. Milchalternative
        an, falls vorhanden.
    milk_feeding_method:
      name: Fütterungsart der Milchtiere
      description: Gibt an, wie die Tiere gefüttert wurden (z. B. Gras- oder Getreidefütterung),
        was Geschmack und Nährwertprofil beeinflussen kann.
    milk_processing_method:
      name: Milchverarbeitungsmethode
      description: Gibt das Verfahren bzw. die Verarbeitungstechnik an, der die Milch
        unterzogen wurde, was Sicherheit, Haltbarkeit und Nährwerte beeinflusst.
    milk_source_animal:
      name: Tierische Quelle der Milch
      description: Kennzeichnet das Tier, von dem die Milch stammt, und hilft Verbraucher:innen
        bei der Auswahl zwischen Kuh-, Ziegen-, Büffel- oder anderen tierischen Milchprodukten.
    millet_processing_method:
      name: Hirseverarbeitungsmethode
      description: Gibt die primäre Verarbeitungsmethode bzw. den Zustand des Hirsekorns
        an (z. B. ungeschält, geschält oder gekeimt).
    millet_variety:
      name: Hirsesorte
      description: Kennzeichnet die spezifische Hirseart im Produkt (z. B. Perlhirse,
        Kolbenhirse oder Fingerhirse).
    milling_process:
      name: Mahlverfahren
      description: Gibt das Herstellungsverfahren an, mit dem das Mehl vermahlen wurde,
        was Geschmack, Hitzeeinwirkung und Nährwertprofil beeinflussen kann.
    mint_mark:
      name: Münzzeichen
      description: Münzzeichen wie auf der Münze dargestellt (falls zutreffend).
    mirror_configuration:
      name: Spiegelart
      description: Gibt den Stil oder die Bauart des im Schminktisch-Set enthaltenen
        Spiegels an.
    mirror_coverage:
      name: Spiegelabdeckung
      description: Beschreibt den Umfang der Spiegelflächen an den Schiebetüren.
    mirror_curvature_type:
      name: Typ der Spiegelkrümmung
      description: Gibt an, ob die Spiegeloberfläche konvex, flach oder konkav ist,
        was das Sichtfeld beeinflusst.
    mirror_mounting_location:
      name: Spiegelmontageort
      description: Gibt an, wo am Fahrrad oder an der fahrenden Person der Spiegel
        montiert werden soll.
    mirror_shape:
      name: Spiegelform
      description: Kennzeichnet die geometrische Form oder den Stil des Hauptspiegels
        im Schminktisch-Set.
    mix_ratio:
      name: Mischungsverhältnis
      description: Gibt das empfohlene Kühlmittel-Wasser-Verdünnungsverhältnis (für
        Konzentrate) an oder bestätigt ein festes Vormischungsverhältnis für vorverdünnte
        Produkte.
    mma_glove_type:
      name: MMA-Handschuhtyp
      description: Gibt den primären Verwendungszweck oder Stil des Handschuhs im
        MMA-Training oder -Wettkampf an.
    mobility_features:
      name: Mobilitätsmerkmale
      description: Kennzeichnet integrierte Bewegungs- oder Transportelemente wie
        Rollen oder klappbare Beine.
    model_aircraft_assembly_level:
      name: Montagegrad des Modellflugzeugs
      description: Gibt an, wie viel Montage erforderlich ist, bevor das Flugzeug
        verwendet werden kann.
    model_making_kit_items_included:
      name: Im Modellbau-Set enthaltene Artikel
      description: Listet auf, was in einem Modellbau-Set oder Bundle enthalten ist
        (z. B. Farbe, Kleber oder Pinsel).
    model_making_product_type:
      name: Modellbauprodukttyp
      description: Kennzeichnet, um welche Art von Artikel es sich im Modellbau handelt
        (Set, Zubehör, Werkzeug oder Verbrauchsmaterial), um das Durchsuchen und Filtern
        verschiedener Produkttypen im Modellbau zu verbessern.
    model_rocket_kit_contents:
      name: Inhalt des Modellraketen-Sets
      description: Gibt an, ob es sich bei dem Produkt um ein vollständiges mehrstufiges
        Modellraketen-Set oder um ein Add-on-/Modul-/Teileset handelt (z. B. Booster-
        oder Sustainer-Komponenten).
    model_rocket_kit_format:
      name: Format des Modellraketen-Sets
      description: Gibt an, ob die Rakete als Set verkauft wird und welchen Montagegrad
        sie aufweist.
    model_rocket_motor_impulse_class:
      name: Impulsklasse des Modellraketenmotors
      description: Gibt die standardisierte Gesamtimpulsklasse des Modellraketenmotors
        an (z. B. A, B oder C).
    model_rocket_motor_mount_size:
      name: Größe der Modellraketen-Motorhalterung
      description: Gibt den Durchmesser des Motorgehäuses an, für den die Motorhalterung
        der Rakete ausgelegt ist.
    model_rocket_power_source_required:
      name: Erforderliche Energiequelle für Modellraketen
      description: Gibt an, ob das Produkt Batterien bzw. eine externe Stromversorgung
        benötigt und falls ja, welche Art.
    model_rocket_propellant_type:
      name: Typ des Modellraketentreibstoffs
      description: Kennzeichnet das Treibstoff- bzw. Motorsystem, das für den Antrieb
        von Modellraketenprodukten verwendet wird.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Empfohlene Größe der Startrampe bzw. -schiene für Modellraketen
      description: Gibt den Durchmesser der Startrampe bzw. die Größe der Startschiene
        an, für die die Rakete ausgelegt ist (z. B. 1/8-Zoll-Stange oder Launch Rail
        1010).
    model_rocket_recovery_method:
      name: Bergungsmethode der Modellrakete
      description: Primäre Bergungsmethode, mit der die Rakete nach dem Flug sicher
        zurückgebracht wird.
    model_rocket_recovery_system_type:
      name: Typ des Modellraketen-Bergungssystems
      description: Gibt die primäre Bergungsmethode an, mit der die Rakete nach dem
        Flug sicher zurückgebracht wird.
    model_rocket_staging:
      name: Stufensystem der Modellrakete
      description: Gibt an, mit wie vielen angetriebenen Stufen die Modellrakete fliegen
        soll.
    model_train_accessory_electrical_connection_type:
      name: Typ der elektrischen Verbindung für Modelleisenbahnzubehör
      description: Gibt den Stecker- oder Klemmentyp an, der zum Anschluss elektrisch
        betriebener Modelleisenbahnzubehörteile an eine Anlage verwendet wird (sofern
        zutreffend).
    model_train_coupler_type:
      name: Modellbahnkupplungstyp
      description: Gibt den Kupplungsstandard an, der an den Modelleisenbahn-Waggons
        oder der Lokomotive verbaut ist.
    model_train_gauge:
      name: Spurweitentyp der Modelleisenbahn
      description: Gibt das Spurweitensystem der Modelleisenbahn an, für das das Zubehör
        bestimmt ist (sofern zutreffend), um die physische Kompatibilität mit Gleisen
        und Anlage sicherzustellen.
    model_train_lighting_features:
      name: Eigenschaften der Modelleisenbahn-Beleuchtung
      description: Gibt die Beleuchtungsfunktionen an, die in der Modelleisenbahn
        bzw. Lokomotive enthalten sind.
    model_train_power_pickup_method:
      name: Stromabnahmemethode der Modelleisenbahn
      description: Gibt an, wie das Modell mit Strom versorgt wird (Gleisstrom, Batterie
        usw.).
    model_train_scale:
      name: Größe der Modelleisenbahn
      description: Gibt den Maßstabs- bzw. Größenstandard der Modelleisenbahn an (Verhältnis
        zwischen Modell und realem Zug).
    model_train_sound_features:
      name: Soundfunktionen der Modelleisenbahn
      description: Gibt an, ob das Modell integrierte Soundeffekte enthält und welche
        Art von Soundfunktionen es bietet.
    model_train_track_gauge:
      name: Spurweite der Modelleisenbahn
      description: Gibt den Spurweiten- bzw. Gleissystemstandard an, für den das Modell
        ausgelegt ist (z. B. Standardspur, Schmalspurvarianten oder marken-/systemspezifische
        Spurweiten).
    modeling_dough_base_material:
      name: Grundmaterial des Modellierteigs
      description: Primäre Grundlage bzw. Zusammensetzung des Modellierteigs (z. B.
        auf Weizen-/Mehlbasis oder auf Polymerbasis).
    modeling_dough_features:
      name: Merkmale des Modellierteigs
      description: Wichtige funktionale Eigenschaften des Modellierteigs, nach denen
        Käufer:innen häufig filtern.
    modification_level:
      name: Modifikationsgrad
      description: Gibt den Grad der Malzmodifikation an (wie stark Gerstenendosperm
        bzw. Proteine abgebaut wurden), häufig zusammengefasst als untermodifiziert,
        modifiziert oder übermodifiziert.
    molasses_base_ingredient:
      name: Grundzutat der Melasse
      description: Gibt die primäre Pflanzen- oder Fruchtquelle an, aus der die Melasse
        hergestellt wird.
    molasses_grade:
      name: Qualitätsstufe der Melasse
      description: Klassifiziert die Melasse nach Extraktions- bzw. Raffinationsstufe,
        was sich direkt auf Geschmacksintensität, Farbe und Nährwertprofil auswirkt.
    mold_material:
      name: Material der Gussform
      description: Primäre Materialzusammensetzung der Form selbst (z. B. Silikon,
        Kunststoff oder Metall).
    molle_compatibility:
      name: MOLLE-Kompatibilität
      description: Gibt an, ob die Weste über MOLLE-/PALS-Gurtbänder zur Befestigung
        modularer Taschen und Zubehörteile verfügt.
    motor_belt_type:
      name: Typ des Motorriemens
      description: Definiert die Bauart bzw. das Profil des im Laufbandantrieb verwendeten
        Riemens.
    motor_configuration:
      name: Motorkonfiguration
      description: Gibt an, wie viele unabhängige Antriebsmotoren der Scooter verwendet.
    motor_mounting_configuration:
      name: Montagekonfiguration des Motors
      description: Beschreibt, wie der Motor im Umrüstkit für einen Scooter montiert
        bzw. integriert wird.
    motor_mounting_position:
      name: Montageposition des Motors
      description: Gibt an, wo am Elektroroller der Motor montiert ist, z. B. Vorderradnabe,
        Hinterradnabe, Doppelnabe oder Mittelmotor.
    motor_position:
      name: Motorposition
      description: Gibt an, wo sich der Motor am E-Bike befindet, was Handling und
        Wartung beeinflusst.
    motor_vehicle_a_v_integration_features:
      name: Funktionen zur Audio-/Video-Integration im Kraftfahrzeug
      description: Smartphone- und Fahrzeugintegrationsfunktionen, die von der Headunit
        unterstützt werden (z. B. Apple CarPlay, Android Auto oder MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Anwendungsbereich/Position der Kfz-Glühlampe
      description: Gibt die vorgesehene Position bzw. Funktion der Fahrzeugbeleuchtung
        an, für die die Glühlampe ausgelegt ist (z. B. Abblendlicht oder Bremslicht).
    motor_vehicle_bulb_approval_standard:
      name: Genehmigungsstandard für Kfz-Glühlampen
      description: Gibt die Einhaltung gesetzlicher Vorschriften bzw. Genehmigungskennzeichnungen
        für die Straßennutzung im Zielmarkt an.
    motor_vehicle_oxygen_sensor_bank:
      name: Sauerstoffsensorsonden im Kraftfahrzeug
      description: Gibt an, an welcher Zylinderbank der Sauerstoffsensor bei V- oder
        Boxermotoren angebracht wird (z. B. Bank 1 oder Bank 2); bei Reihenmotoren
        „Nicht zutreffend“ verwenden.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Anzahl der Kabel des Sauerstoffsensors im Kraftfahrzeug
      description: Anzahl der Kabel im Kabelbaum des Sauerstoffsensors.
    motor_vehicle_oxygen_sensor_position:
      name: Position des Sauerstoffsensors im Kraftfahrzeug
      description: Gibt an, wo der Sauerstoffsensor (O2) im Abgassystem relativ zum
        Katalysator installiert ist.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Sensornummer des Lambdasensors im Kraftfahrzeug
      description: Gibt die Sensornummer innerhalb einer bestimmten Bank- bzw. Positionsbezeichnung
        an (z. B. Sensor 1 oder Sensor 2).
    motor_vehicle_oxygen_sensor_type:
      name: Art der Sauerstoffsensors im Kraftfahrzeug
      description: Gibt die Konstruktion bzw. Technologie des Sauerstoffsensors an.
    motor_vehicle_paint_application_method:
      name: Auftragsmethode für Fahrzeuglack
      description: Beschreibt, wie die Farbe auf die Fahrzeugoberfläche aufgetragen
        werden soll.
    motor_vehicle_paint_system_step:
      name: Schritt des Fahrzeuglackiersystems
      description: Gibt an, für welchen Schritt bzw. welche Komponente eines Fahrzeuglackiersystems
        das Produkt bestimmt ist (z. B. Grundierung, Basislack oder Klarlack).
    motor_vehicle_speaker_mounting_type:
      name: Montageart des Kfz-Lautsprechers
      description: Gibt an, wie der Lautsprecher im Fahrzeug installiert werden soll
        (Montageart).
    motor_vehicle_subwoofer_size:
      name: Größe der Subwoofer für Autos
      description: Nenndurchmesser des Subwoofers (z. B. 8 Zoll, 10 Zoll oder 12 Zoll),
        um Kompatibilität mit Fahrzeugraum und Gehäuse sicherzustellen.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfiguration der Schwingspulen des Kfz-Subwoofers
      description: Anzahl bzw. Konfiguration der Schwingspulen zur Anpassung an die
        Verdrahtungsoptionen des Verstärkers (z. B. SVC oder DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedanz der Schwingspule des Kfz-Subwoofers (pro Spule)
      description: Impedanzwert jeder Schwingspule (nicht die endgültige Verdrahtungslast),
        der für Verdrahtungsberechnungen verwendet wird.
    motor_vehicle_voltage_regulator_type:
      name: Typ des Spannungsreglers für Kraftfahrzeuge
      description: Kennzeichnet die in Kraftfahrzeugen verwendete Reglertechnologie
        bzw. Bauform.
    motorcycle_armor_certification_standard:
      name: Zertifizierungsstandard für Motorradschutzkleidung
      description: Gibt die formalen Sicherheitsstandards an, die der Protektor nachweislich
        erfüllt (z. B. EN 1621-2 für Rückenprotektoren oder EN 1621-3 für Brustprotektoren).
    motorcycle_cover_size_class:
      name: Größenklasse der Motorradabdeckung
      description: Standardisierte Größenklasse für Motorradabdeckungen basierend
        auf der typischen Motorradkategorie bzw. dem passenden Längenbereich.
    motorcycle_glove_certification_standard:
      name: Zertifizierungsstandard für Motorradhandschuhe
      description: Gibt die Schutzzertifizierung bzw. den Standard an, dem die Handschuhe
        entsprechen (z. B. EN-13594-Stufen).
    motorcycle_glove_waterproof_construction:
      name: Wasserdichte Konstruktion von Motorradhandschuhen
      description: Gibt die Art der im Handschuh verwendeten Imprägniermethode an
        (falls vorhanden).
    motorcycle_guard_coverage_area:
      name: Abdeckungsbereich des Motorradschutzes
      description: Der primäre Schutzbereich des Produkts (Ellbogen, Handgelenk, Unterarm
        oder Kombination).
    motorcycle_kidney_belt_construction_type:
      name: Konstruktionsart des Motorrad-Nierengurts
      description: Die Konstruktion des Nierengurts beeinflusst Steifigkeit, Luftzirkulation
        und Schutz.
    motorcycle_kidney_belt_purpose:
      name: Zweck des Motorrad-Nierengurts
      description: Gibt den primären Fahrstil bzw. Einsatzzweck an, für den der Motorrad-Nierengurt
        konzipiert ist.
    motorcycle_luggage_capacity_class:
      name: Kapazitätsklasse des Motorradgepäcks
      description: Gibt das Volumen des Motorradgepäcks als Literbereich an.
    motorcycle_luggage_mounting_system:
      name: Befestigungssystem des Motorradgepäcks
      description: Befestigungssystem zur Sicherung der Tasche bzw. des Koffers am
        Motorrad (z. B. Überwurfgurte oder gepäckträgerbasierter Schnellverschluss).
    motorcycle_luggage_side:
      name: Seite des Motorradgepäcks
      description: Gibt bei Seiten- bzw. Satteltaschen an, ob der Artikel für die
        linke Seite, die rechte Seite oder als Paar/Set vorgesehen ist.
    motorcycle_protective_gear_size_system:
      name: Größensystem der Motorrad-Schutzausrüstung
      description: Gibt das für das Produkt verwendete Größensystem an (z. B. alphabetische
        Größenangaben, numerische Größen oder Einheitsgröße).
    motorcycle_rack_carrier_style:
      name: Bauart des Motorradträgers
      description: Beschreibt die funktionale Bauart des Trägers für den Transport
        eines Motorrads oder Rollers (z. B. Plattform-, Schienen- oder hebegestützte
        Ausführung).
    motorcycle_riding_discipline:
      name: Motorradfahrdisziplin
      description: Gibt den hauptsächlichen Fahrstil bzw. die Disziplin an, für die
        der Nackenschutz ausgelegt ist.
    motorcycle_tire_speed_rating:
      name: Geschwindigkeitsindex für Motorradreifen
      description: Gibt die maximale Dauergeschwindigkeit an, für die der Reifen ausgelegt
        ist, unter Verwendung des standardisierten Buchstabencodes (z. B. H, V oder
        W).
    motorsport_window_net_certification:
      name: Zertifizierung des Motorsport-Fensternetzes
      description: Gibt die Rennsicherheitszertifizierung bzw. Homologation an, die
        das Fensternetz erfüllt (z. B. SFI oder FIA), einschließlich Spezifikationsnummer,
        sofern zutreffend.
    mound_usage_type:
      name: Verwendungszweck des Wurfhügels
      description: Gibt die vorgesehene Einsatzumgebung des Wurfhügels an, z. B. Training,
        Spiel, Bullpen oder Mehrzweck.
    mount_attachment_method:
      name: Befestigungsmethode
      description: Gibt an, wie die Halterung an der Fahrzeugoberfläche bzw. -struktur
        befestigt wird.
    mountainboard_truck_type:
      name: Typ der Mountainboard-Achsen
      description: Klassifiziert die Art der mit dem Board gelieferten Achsen, was
        Lenkverhalten und Haltbarkeit beeinflusst.
    mounting_attachment_method:
      name: Montage-/Befestigungsmethode
      description: Beschreibt, wie die Halterung bzw. Tasche an einer Trommel, einem
        Ständer, Gürtel oder einer anderen Oberfläche befestigt wird.
    mounting_attachment_type:
      name: Befestigungsart
      description: Beschreibt, wie das Übersetzungszubehör am Spinnrad befestigt wird
        bzw. mit diesem interagiert.
    mounting_hardware_included_for_installation:
      name: Montagematerial im Lieferumfang enthalten (für die Installation)
      description: Gibt an, ob das für die Montage des Rücksitzes erforderliche Befestigungsmaterial
        (z. B. Halterungen, Schrauben oder Schienen) im Lieferumfang enthalten ist.
    mounting_location:
      name: Montageort
      description: Gibt den vorgesehenen Montageort für das Licht bzw. den Reflektor
        an der Ausrüstung oder am Körper an (z. B. Vordergabel, Helm oder Radspeichen).
    mounting_method:
      name: Montageart
      description: Beschreibt, wie ein Stock- bzw. Pinselhalter befestigt wird (z. B.
        per Klemme, Gurt oder Klebefläche).
    mounting_position:
      name: Montageposition
      description: Gibt an, wo die Handbremssteuerung im Fahrzeuginnenraum montiert
        bzw. installiert werden soll.
    mounting_rail_type:
      name: Typ der Montageschiene
      description: Gibt die Schiene bzw. den Schnittstellenstandard an, an dem das
        Zubehör befestigt wird, z. B. Picatinny oder M-LOK.
    mounting_receiver_size:
      name: Größe der Montageaufnahme
      description: Gibt die für trägerbasierte Gepäcksysteme erforderliche Größe der
        Anhängerkupplung an.
    mounting_storage_type:
      name: Montage-/Aufbewahrungsart
      description: Beschreibt, wie das Gerät am Schiff bzw. an der Person montiert
        oder verstaut werden soll.
    mouth_grip_type:
      name: Typ des Mundstückgriffs
      description: Beschreibt die Art des Mundstückgriffs bzw. Schutzes an der Pfeife
        im Hinblick auf Komfort und Hygiene.
    mouthguard_mold_type:
      name: Typ der Mundschutzform
      description: Beschreibt, wie der Mundschutz an die Zähne der sporttreibenden
        Person angepasst wird (z. B. durch Erhitzen und Anpassen oder individuelle
        Zahnarztanpassung).
    mouthpiece_facing_length:
      name: Länge der Mundstückbahn
      description: Gibt die Kategorie der Mundstückbahn (Lay) an (nicht die Gesamtlänge
        des Mundstücks), was Ansprache, Widerstand und Blattkompatibilität beeinflusst.
    mouthpiece_material:
      name: Mundstückmaterial
      description: Gibt das Material des Mundstücks bzw. der Spitze eines Blasgeräts
        (Partybläsers) an, das sich vom Material des Hauptkörpers unterscheiden kann.
    mouthpiece_shank_receiver_size:
      name: Größe von Mundstückschaft/-aufnahme
      description: Gibt den mit dem Flügelhorn kompatiblen Standard für Mundstückaufnahme
        bzw. -schaft an.
    mouthpiece_shank_size:
      name: Größe des Mundstückschafts
      description: Gibt den Passformstandard für Mundstückschaft bzw. -aufnahme an,
        um die Kompatibilität mit dem vorgesehenen Blechblasinstrument sicherzustellen.
    mouthpiece_shank_type:
      name: Art des Mundstückschafts
      description: Gibt den Standard für Mundstückaufnahme bzw. -schaft zur Sicherstellung
        der Kompatibilität an (sofern zutreffend).
    mouthpiece_style:
      name: Mundstückstil
      description: Klassifiziert die Konstruktion bzw. Form des Mundstückteils der
        Kandare, was Druckpunkte, Schärfegrad und Akzeptanz beim Pferd beeinflusst.
    mouthpiece_type:
      name: Mundstücktyp
      description: Art des Mundstücks am Blasende (eingebaut, abnehmbar oder als Zubehör
        erhältlich).
    movement_mechanism:
      name: Bewegungsmechanismus
      description: Definiert, wie sich die Bank während der Nutzung bewegt (schwingend,
        gleitend, schaukelnd usw.).
    muffin_size:
      name: Muffingröße
      description: Klassifiziert das physische Größenformat des Muffinprodukts (z. B.
        Mini, Standard oder Jumbo).
    mushroom_variety:
      name: Pilzsorte
      description: Kennzeichnet die spezifische Pilz- oder Trüffelsorte im Produkt
        (z. B. Shiitake, Kräuterseitling oder schwarzer Trüffel).
    music_stand_desk_tilt_adjustment:
      name: Neigungsverstellung des Notenständers
      description: Gibt an, ob und wie der Neigungswinkel angepasst werden kann.
    music_stand_intended_use:
      name: Verwendungszweck des Notenständers
      description: Gibt den primären Verwendungszweck bzw. Einsatzbereich des Ständers
        an.
    musical_block_pitch_type:
      name: Tonhöhentyp des Musikblocks
      description: Beschreibt, ob der Musikblock einen bestimmten Ton (gestimmt) oder
        einen unbestimmten Ton erzeugt.
    musical_box_mechanism_type:
      name: Typ des Spieluhrmechanismus
      description: Beschreibt, wie die Spieluhr Töne erzeugt bzw. abspielt (z. B.
        Aufziehmechanismus oder elektronische Wiedergabe).
    musical_keyboard_case_fit_type:
      name: Passformtyp des Keyboardkoffers
      description: Beschreibt, wie der Koffer auf das Instrument abgestimmt ist (z. B.
        universeller Größenbereich oder modellspezifische Passform).
    musical_ratchet_sound_character:
      name: Klangcharakter der Ratsche
      description: Allgemeine Beschreibung des Klang- bzw. Lautstärkecharakters der
        Ratsche.
    musical_scraper_groove_surface_material:
      name: Oberflächenmaterial der Rillen des Schabinstruments
      description: Gibt das Material der geriffelten bzw. genuteten Schabfläche an
        (kann vom Material des Korpus abweichen).
    musical_scraper_type:
      name: Typ des Schabinstruments
      description: Gibt Stil bzw. Bauart des Schabinstruments an (z. B. Guiro oder
        Reco-Reco), was Klang und Spieltechnik beeinflusst.
    mute_attachment_method:
      name: Befestigungsmethode für den Dämpfer
      description: Gibt an, wie ein Beckendämpfer am Becken befestigt bzw. gehalten
        wird (z. B. Gel, statische Haftung, Magnet oder Clip).
    mute_attenuation_level:
      name: Dämpfungsgrad
      description: Gibt an, wie stark der Dämpfer die wahrgenommene Lautstärke reduziert,
        insbesondere bei Übungsdämpfern.
    mute_cork_padding_material:
      name: Material von Dämpferkork/-polsterung
      description: Gibt das Material der Kontaktpolsterung des Dämpfers an (z. B.
        Korkstreifen oder -polster), die für Halt, Passform und den Schutz des Schallbechers
        verwendet wird.
    mute_coverage_type:
      name: Abdeckungsart des Dämpfers
      description: Gibt Art bzw. Abdeckung des Dämpfers auf der Spielfläche an, von
        kleinen Punktdämpfern bis hin zu vollflächigen Übungsdämpfern.
    mute_finish:
      name: Finish des Dämpfers
      description: Oberflächenfinish des Dämpfers, das Haltbarkeit und Optik beeinflussen
        kann (z. B. poliert oder satiniert).
    name_label_text_template:
      name: Textvorlage des Namensetiketts
      description: Gibt den voreingestellten Text bzw. die Vorlage an, die auf das
        Namensetikett gedruckt wird (z. B. „Gehört zu“ oder „Hergestellt von“).
    napkin_ply:
      name: Serviettenlagen
      description: Gibt die Dicke der Cocktailserviette anhand der Anzahl der Lagen
        an.
    neck_brace_fit_system:
      name: Anpassungssystem der Nackenstütze
      description: Kennzeichnet die primäre Methode, mit der die Nackenstütze an die
        fahrende Person angepasst und befestigt wird.
    neck_brace_size_basis:
      name: Grundlage der Größenbestimmung der Nackenstütze
      description: Gibt die Grundlage der Größenbestimmung an, die zur Auswahl der
        richtigen Größe der Nackenstütze verwendet wird.
    neck_configuration:
      name: S-Bogen-Art
      description: Gibt die mit dem Saxophon gelieferte Halsform/-konfiguration an,
        was Ergonomie und Spielbarkeit beeinflusst.
    neck_coverage_type:
      name: Halsschutz
      description: Gibt die Art der Nackenabdeckung an, die mit der Decke geliefert
        wird.
    neck_support_size_system:
      name: Größensystem der Nackenstütze
      description: Gibt das Größensystem an, das für die Nackenstütze bzw. Halskrause
        im Rennsport verwendet wird (z. B. Erwachsene, Jugendliche oder Einheitsgröße).
    necklace_length_type:
      name: Halskettenlänge
      description: Gibt die übliche Kategorie der Kettenlänge an, z. B. Choker oder
        Opernlänge, um stilorientiertes Einkaufen zu erleichtern.
    needle_balance_zone:
      name: Ausgleichszone der Kompassnadel
      description: Gibt die magnetische Ausgleichszone bzw. Hemisphäre an, auf die
        die Kompassnadel abgestimmt ist, um weltweit genaue Messwerte sicherzustellen.
    needle_case_format:
      name: Format des Nadeletuis
      description: Allgemeiner Formfaktor des Nadeletuis.
    needle_damping_type:
      name: Stabilisierungsart der Kompassnadel
      description: Beschreibt, wie die Kompassnadel stabilisiert wird (z. B. flüssigkeitsgefüllt,
        trocken oder elektronisch stabilisiert), was Einschwingzeit und Haltbarkeit
        beeinflusst.
    needle_felting_needle_profile:
      name: Profil der Nadelfilznadel
      description: Querschnitt bzw. Profil einer Filznadel, was beeinflusst, wie die
        Fasern bewegt werden und welche Oberflächenstruktur entsteht.
    needle_holder_features:
      name: Merkmale des Nadelhalters
      description: Besondere funktionale Merkmale des Nadelhalters.
    needle_holder_mounting_attachment_method:
      name: Montage-/Befestigungsmethode des Nadelhalters
      description: Beschreibt, wie der Nadelhalter während der Aufbewahrung befestigt
        bzw. verwendet werden soll (z. B. magnetisch, per Clip oder mit Riemen).
    needle_holder_style:
      name: Nadelhalterstil
      description: Beschreibt die physische Aufbewahrungs- bzw. Trageart des Nadelhalters.
    needle_pushing_surface_type:
      name: Typ der Nadelschiebefläche
      description: Gibt die Art bzw. Ausführung der Nadelschiebefläche auf der Nähhandfläche
        an (z. B. Metallvertiefung, Münze oder verstärkter Aufnäher).
    needle_requirement_beading_pattern:
      name: Nadelanforderung (Perlenmuster)
      description: Vom Muster empfohlener Nadeltyp bzw. empfohlene Nadelgröße.
    needle_size_system:
      name: Nadelstärkesystem
      description: Größenstandard, der für die Kennzeichnung der Nadelstärke verwendet
        wird.
    needle_threader_compatible_needle_type:
      name: Kompatibler Nadeltyp für den Nadeleinfädler
      description: Gibt an, für welche Nadeltypen der Einfädler ausgelegt ist (nach
        Nadelkategorie bzw. Verwendungszweck).
    needle_threader_mechanism_type:
      name: Einfädelungsmechanismus
      description: Beschreibt, wie der Einfädler den Faden durch das Nadelöhr führt
        bzw. zieht.
    needle_threader_packaging_type:
      name: Verpackungsart des Nadeleinfädlers
      description: Beschreibt, wie das Produkt verkauft bzw. verpackt wird (Einzelpackung,
        Mehrfachpackung oder Set).
    needlecraft_fabric_color_family:
      name: Farbfamilie des Handarbeitsstoffs
      description: Normalisierte Farbfamilie für gleichmäßig gewebte Stoffe (wird
        zusammen mit „Farbe“ für Filteroptionen verwendet).
    needlecraft_fabric_composition:
      name: Zusammensetzung des Handarbeitsstoffs
      description: Gibt die Faserzusammensetzung bzw. Mischung des Handarbeitsstoffs
        an (z. B. 100 % Baumwolle oder Leinen-/Baumwollmischung)
    needlecraft_fabric_weave_type:
      name: Webart des Handarbeitsstoffs
      description: Gibt die Webart bzw. Konstruktion des Handarbeitsleinens an (z. B.
        gleichmäßig gewebt oder traditionelles Leinen), was Stichverhalten und Aussehen
        beeinflusst.
    needlecraft_kit_items_included:
      name: Im Handarbeitsset enthaltene Artikel
      description: Listet die wichtigsten Bestandteile des Handarbeitssets auf (Werkzeuge
        und Verbrauchsmaterialien).
    needlecraft_kit_project_type:
      name: Projekttyp des Handarbeitssets
      description: Kennzeichnet, welcher fertige Artikel mit dem Set hergestellt wird
        (das Projektergebnis).
    needlecraft_stitching_coverage:
      name: Stickabdeckung des Handarbeitsstoffs
      description: Gibt an, ob der Stoff über 1 Faden/Quadrat oder über 2 Fäden gestickt
        wird (üblich bei gleichmäßig gewebten Stoffen und Leinen).
    needlepoint_canvas_mesh_count:
      name: Maschenzahl der Needlepoint-Leinwand
      description: Gibt die vorgesehene Maschenweite bzw. Fadendichte an (Fäden pro
        Zoll), für die das Design ausgelegt ist (allgemein als Canvas Count bezeichnet).
    needlepoint_frame_canvas_attachment_method:
      name: Befestigungsmethode der Needlepoint-Leinwand am Rahmen
      description: Beschreibt, wie die Needlepoint-Leinwand am Needlepoint-Rahmen
        befestigt wird.
    needlepoint_frame_compatible_stand_type:
      name: Kompatibler Ständertyp für den Needlepoint-Rahmen
      description: Gibt an, mit welchen Ständertypen der Rahmen kompatibel ist, sofern
        er für die Montage an einem Ständer vorgesehen ist.
    needlepoint_frame_contents:
      name: Inhalt des Needlepoint-Rahmens
      description: Gibt an, welche Komponenten und Zubehörteile im Lieferumfang des
        Needlepoint-Rahmens enthalten sind (z. B. Rahmen, zusätzliche Stäbe/Stangen,
        Heftnägel/Nadeln, Griffstreifen oder Tragetasche).
    needlepoint_frame_tension_adjustment_type:
      name: Typ der Spannungseinstellung des Needlepoint-Rahmens
      description: Gibt an, wie (oder ob) die Spannung des Rahmens während der Nutzung
        angepasst werden kann.
    needlepoint_pattern_chart_format:
      name: Format des Nadelspitzenmusterdiagramms
      description: Beschreibt, wie das Needlepoint-Muster zum Sticken dargestellt
        wird (Stickvorlage oder gedruckte/gemalte Vorlage).
    needlepoint_project_type:
      name: Projekttyp für Needlepoint
      description: Der vorgesehene fertige Artikel bzw. die vorgesehene Kategorie,
        für die das Needlepoint-Muster bestimmt ist.
    net_design:
      name: Netzdesign
      description: Kennzeichnet die Konstruktionsart des Netzes und gibt an, ob es
        für den Transport einziehbar oder faltbar ist.
    net_mesh_pattern:
      name: Netzmaschenmuster
      description: Gibt die geometrische Form der Netzöffnungen an, was Sichtbarkeit
        und Festigkeit beeinflussen kann.
    net_twine_gauge:
      name: Stärke des Netzgarns
      description: Gibt die Garnstärke bzw. Festigkeit des Netzes an, traditionell
        ausgedrückt als Stärkenzahl (z. B. 18 oder 36).
    nicotine_source:
      name: Nikotinquelle
      description: Gibt an, ob das Nikotin im Produkt aus Tabak gewonnen wurde, synthetisch
        ist oder ob das Produkt kein Nikotin enthält.
    nipple_drive_interface:
      name: Antriebsschnittstelle des Nippels
      description: Kennzeichnet die Art bzw. den Standard der Antriebsschnittstelle
        oder des Kopfes des Nippels (extern oder intern), was das erforderliche Werkzeug
        und die Methode zum Laufradbau bestimmt.
    nock_activation_method:
      name: Aktivierungsmethode der Nocke
      description: Gibt den Mechanismus an, mit dem die LED der beleuchteten Pfeilnocke
        ein- oder ausgeschaltet wird (z. B. Bogensehnendruck, Bewegungssensor oder
        manueller Schalter).
    nock_fitment_code:
      name: Passformcode der Nocke
      description: Hersteller- oder Branchencode, der die Nockenfamilie bzw. -serie
        kennzeichnet, zu der sie gehört.
    nock_throat_size:
      name: Größe der Nockkerbe
      description: Gibt die Größe der Nockkerbe (Nut) an, die an der Bogensehne einrastet.
    nock_transparency_level:
      name: Transparenz des Nockpunkts
      description: Beschreibt, wie durchsichtig das Nockmaterial ist – transparent,
        transluzent, undurchsichtig oder im Dunkeln leuchtend –, was Sichtbarkeit
        und Optik beeinflusst.
    nock_type:
      name: Nockentyp
      description: Gibt die Nockenform an, die an einem Pfeil oder Bolzen verwendet
        wird, z. B. Pin, Half-Moon oder beleuchtet.
    noise_reduction_type:
      name: Art der Geräuschreduzierung
      description: Gibt gegebenenfalls an, welche Geräuschunterdrückungstechnologie
        im integrierten Headset des Helms verwendet wird bzw. nicht verwendet wird.
    noise_suppression_technology:
      name: Geräuschunterdrückungstechnologie
      description: Gibt an, ob das Produkt passive Dämpfung oder aktive elektronische
        Schaltungen verwendet, die laute Geräusche komprimieren und/oder Umgebungsgeräusche
        verstärken.
    non_slip_base_features:
      name: Merkmale der rutschfesten Unterseite
      description: Kennzeichnet die Antirutschmerkmale, die verhindern sollen, dass
        sich das Pedal während der Nutzung bewegt.
    nose_bridge_type:
      name: Typ des Nasenstegs
      description: Gibt die Form des Nasenstegs an, was die Passform bei unterschiedlichen
        Gesichtsgrößen beeinflusst.
    nose_clip_accessories_included:
      name: Im Lieferumfang enthaltenes Zubehör für Nasenclips
      description: Listet zusätzliches Zubehör auf, das mit der Schwimm-Nasenklammer
        geliefert wird (z. B. Ohrstöpsel oder Aufbewahrungsetui).
    nose_clip_features:
      name: Merkmale des Nasenclips
      description: Hebt allgemeine funktionale oder Komfortmerkmale des Nasenclips
        hervor.
    nose_coverage_style:
      name: Nasenschutzart
      description: Gibt das Vorhandensein und die Art des Nasen- bzw. Schnauzenschutzes
        an der Fliegenmaske an.
    noseband_type:
      name: Typ des Nasenbands
      description: Gibt die Ausführung des Nasenriemens an (falls vorhanden), der
        mit dem Zaumzeug geliefert wird.
    number_of_canvas_meshes:
      name: Anzahl der Canvas-Maschen
      description: Gibt die Maschenweite der Kunststoff-Canvas an, angegeben in Löchern
        pro Zoll (HPI) oder als Count, was Stichgröße und Projektdetails bestimmt.
    number_of_chainrings:
      name: Anzahl der Kettenblätter
      description: Gibt an, für wie viele Kettenblätter die Kurbelgarnitur ausgelegt
        ist bzw. mit wie vielen sie geliefert wird.
    number_of_control_stations:
      name: Anzahl der Steuerstationen
      description: Gibt die Anzahl der vom Steuerungssystem unterstützten Steuer-
        bzw. Kontrollstationen an (Einzelstation, Doppelstation usw.).
    number_of_digits:
      name: Anzahl der Ziffern
      description: Gibt an, wie viele Ziffern der Zähler anzeigt (z. B. 1-stellig,
        2-stellig oder 3-stellig).
    number_of_guitar_slots:
      name: Anzahl der Gitarrenfächer
      description: Gibt an, für wie viele Gitarren der Koffer bzw. die Gigbag ausgelegt
        ist.
    number_of_needlecraft_fabrics:
      name: Anzahl der Handarbeitsstoffe
      description: Gibt die Fadenzahl für Handarbeitsleinwand bzw. -stoff an, typischerweise
        ausgedrückt in Quadraten bzw. Fäden pro Zoll (z. B. 14-Count).
    number_of_plastic_canvas_meshes:
      name: Anzahl der Canvas-Maschen
      description: Gibt die Maschenzahl der Kunststoff-Canvas an (Löcher pro Zoll),
        was Stichgröße und Detailgrad des Projekts bestimmt.
    number_of_quilting_frame_rails:
      name: Anzahl der Quiltrahmen-Schienen
      description: Gibt die Anzahl der im Quiltrahmen enthaltenen Schienen bzw. Rollen
        an (z. B. 2-Schienen- oder 3-Schienen-Systeme).
    number_of_rope_slots:
      name: Anzahl der Seilschlitze
      description: Gibt an, ob das Sicherungsgerät für die Verwendung mit Einfach-
        oder Doppelseilen ausgelegt ist.
    number_of_switch_poles:
      name: Anzahl der Pole im Schalter
      description: Anzahl der getrennten Stromkreise (Pole), die vom Schalter gesteuert
        werden (z. B. SPST oder DPST).
    number_of_switch_throws:
      name: Anzahl der Schaltstellungen
      description: Anzahl der Ausgangswege (Schaltstellungen) pro Pol (z. B. SPDT).
    number_of_timing_chain_rows:
      name: Anzahl der Steuerkettenreihen
      description: Gibt an, ob die Steuerkette einreihig oder mehrreihig ist.
    number_of_trailer_axles:
      name: Anzahl der Anhängerachsen
      description: Anzahl der Achsen am Anhänger.
    number_of_wheel_pieces:
      name: Anzahl der Radteile
      description: Gibt an, ob das Rad einteilig, zweiteilig oder dreiteilig aufgebaut
        ist.
    numbering_style:
      name: Nummerierungsstil
      description: Gibt an, ob und wie die Leibchen zur Teamidentifizierung vornummeriert
        sind (z. B. unnummeriert, 1–10 oder individuell).
    nunchuck_connector_type:
      name: Verbindungstyp des Nunchucks
      description: Art der Verbindung zwischen den beiden Nunchaku-Griffen (z. B.
        Seil, Kette oder Drehgelenkkette).
    nursing_access:
      name: Stillzugang
      description: Gibt gegebenenfalls die Art des in das Badekleid integrierten Stillzugangs
        an.
    nursing_access_type:
      name: Art des Stillzugangs
      description: Gibt an, wie das Kleidungsstück Zugang zur Brust zum Stillen oder
        Abpumpen ermöglicht.
    nut_butter_texture:
      name: Textur der Nussbutter
      description: Beschreibt die Konsistenz der Nussbutter, damit Käufer:innen leicht
        zwischen cremig, stückig usw. wählen können.
    nutrient_fortification:
      name: Nährstoffanreicherung
      description: Kennzeichnet die wichtigsten Nährstoffe, mit denen das Getränk
        oder Lebensmittel angereichert ist.
    oak_product_form:
      name: Produktform des Eichenholzes
      description: Kennzeichnet die physische Form der Eiche, die zur Reifung bzw.
        Aromatisierung von Produkten verwendet wird.
    oak_toast_level:
      name: Röstgrad des Eichenholzes
      description: Gibt den Röstgrad von Eichenprodukten an.
    oboe_case_capacity:
      name: Kapazität des Oboenkoffers
      description: Gibt an, für welche Instrumente und Hauptkomponenten der Koffer
        ausgelegt ist.
    oboe_case_carry_configuration:
      name: Tragekonfiguration des Oboenkoffers
      description: Gibt die primäre Tragekonfiguration des Koffers bzw. der Gigbag
        an.
    oboe_case_design:
      name: Design des Oboenkoffers
      description: Klassifiziert die Konstruktion bzw. Steifigkeit eines Oboenkoffers
        oder einer Gigbag (z. B. hart, halbstarr oder weich), um den Schutzgrad anzugeben.
    oboe_case_internal_fit_type:
      name: Innenpassform des Oboenkoffers
      description: Gibt an, ob der Innenraum für eine bestimmte Instrumentenkonfiguration
        vorgeformt ist oder verstellbare Fächer verwendet.
    oboe_keywork_plating:
      name: Beschichtung der Oboenmechanik
      description: Gibt die Beschichtung bzw. Oberflächenbehandlung der Oboenmechanik
        (Klappen) an, getrennt vom Korpusmaterial.
    oboe_strap_padding:
      name: Polsterung des Oboengurts
      description: Beschreibt das Vorhandensein bzw. die Art der Polsterung im Kontaktbereich
        von Gurt bzw. Stütze für mehr Komfort (z. B. gepolsterter Schulter- oder Nackenbereich).
    oboe_swab_style:
      name: Typ des Oboenreinigers
      description: Gibt die funktionale Bauart bzw. Konstruktion eines Oboenreinigers
        an (z. B. Durchziehreiniger oder beschwerte Seide).
    observation_window_material:
      name: Material des Sichtfensters
      description: Gibt das Material der Sichtscheiben bzw. des Sichtfensters an,
        was häufig Klarheit und Haltbarkeit beeinflusst.
    ocarina_accessories_included:
      name: Inbegriffenes Okarina-Zubehör
      description: Im Lieferumfang der Okarina enthaltenes Zubehör, z. B. Koffer,
        Halsband oder Grifftabelle.
    ocarina_chamber_count:
      name: Anzahl der Okarinakammern
      description: Gibt an, wie viele Kammern die Inline-Okarina besitzt, was Tonumfang
        und Spielkomplexität beeinflusst (einfach, doppelt, dreifach usw.).
    ocarina_fingering_system:
      name: Griffsystem der Okarina
      description: Gibt das Griffsystem bzw. den Standard an, dem die Anhänger-Okarina
        folgt (falls zutreffend).
    ocarina_finish_type:
      name: Oberflächenart der Okarina
      description: Oberflächenbeschaffenheit des Okarina-Korpus, die Haptik und Optik
        beeinflusst.
    occupant_classification_sensor_support:
      name: Unterstützung für Insassenklassifizierungssensoren
      description: Gibt an, ob der Sitz über einen Sensor zur Insassenklassifizierung
        bzw. Gewichtserkennung verfügt oder die Möglichkeit bietet, den OEM-Sensor
        zu übernehmen bzw. zu installieren (häufig bei Beifahrersitzen).
    octave_harmonica_cover_plate_material:
      name: Material der Oktav-Mundharmonika-Abdeckplatten
      description: Material der äußeren Deckplatten der Oktavharmonika.
    octave_harmonica_tuning_system:
      name: Stimmsystem für Oktavenmundharmonika
      description: Stimmung bzw. Temperament der Oktavharmonika.
    octoban_mounting_system_type:
      name: Typ des Octoban-Montagesystems
      description: Beschreibt, wie der Octoban während des Spielens montiert bzw.
        positioniert wird (Halterung, Ständeraufbau usw.).
    odor_control_features:
      name: Geruchskontrollfunktionen
      description: Gibt an, ob das Produkt eine geruchsneutralisierende bzw. desodorierende
        Funktion bietet und auf welche Weise dies erfolgt.
    office_furniture_items_included:
      name: Büromöbel inklusive
      description: Kennzeichnet die spezifischen Büromöbelstücke, die im Set enthalten
        sind, z. B. Schreibtisch oder Aktenschrank.
    oil_cooler_core_type:
      name: Typ des Ölkühlerkerns
      description: Gibt die interne Kernkonstruktion des Ölkühlers an, was Kühlleistung,
        Druckverlust und Haltbarkeit beeinflusst.
    oil_cooler_mounting_style:
      name: Montageart des Ölkühlers
      description: Beschreibt, wie der Ölkühler am Fahrzeug montiert bzw. installiert
        werden soll.
    oil_dipstick_component_type:
      name: Typ der Ölmessstab-Komponente
      description: Gibt an, welche Komponente zur Ölstandsmessung verkauft wird (z. B.
        nur Messstabklinge/-stange, nur Griff, komplette Baugruppe oder Messstabrohr).
    oil_dipstick_measurement_markings:
      name: Messmarkierungen des Ölmessstabs
      description: Gibt an, welche Markierungen bzw. Skalen am Ölmessstab zum Ablesen
        des Ölstands vorhanden sind.
    oil_dipstick_tube_mounting_type:
      name: Montageart des Ölmessstabrohrs
      description: Gibt an, wie das Ölmessstabrohr am Motor bzw. Motorblock befestigt
        oder montiert wird.
    oil_drain_plug_head_drive_type:
      name: Typ des Antriebs am Ölablassschraubenkopf
      description: Gibt die Werkzeugaufnahmeschnittstelle am Kopf der Ölablassschraube
        an, die für Montage und Demontage verwendet wird.
    oil_drain_plug_magnet_type:
      name: Typ des Magneten der Ölablassschraube
      description: Gibt an, ob die Ablassschraube magnetisch ist und falls ja, um
        welchen Typ es sich handelt.
    oil_fill_cap_type:
      name: Typ des Öleinfülldeckels
      description: Gibt die Art bzw. den Typ der vom Ventildeckel verwendeten Öleinfülldeckelschnittstelle
        an (falls zutreffend).
    oil_filler_cap_attachment_type:
      name: Befestigungsart des Öleinfülldeckels
      description: Gibt an, wie der Öleinfülldeckel am Motor bzw. Öleinfüllstutzen
        befestigt wird (z. B. Gewinde, Bajonett-/Vierteldrehverschluss oder Presspassung).
    oil_filler_cap_installation_position:
      name: Einbauposition des Öleinfülldeckels
      description: Gibt an, wo die Kappe verwendet wird, wenn mehrere Öleinfüllöffnungen
        vorhanden sind (z. B. Ventildeckel oder externes Einfüllrohr).
    oil_filler_cap_locking_type:
      name: Verschlussart des Öleinfülldeckels
      description: Gibt an, ob der Öleinfülldeckel nicht abschließbar ist oder über
        eine verriegelte bzw. gesicherte Öffnungsmethode verfügt (z. B. Schlüssel
        oder Werkzeug erforderlich), um Manipulation, Diebstahl oder versehentliches
        Öffnen zu verhindern.
    oil_filler_cap_tether_type:
      name: Halterung des Öleinfülldeckels
      description: Gibt an, ob der Öleinfülldeckel gegen Verlust gesichert ist und
        welche Art der Sicherung verwendet wird.
    oil_filler_cap_venting_type:
      name: Typ der Entlüftung des Öleinfülldeckels
      description: Gibt an, ob die Kappe belüftet ist und welcher Belüftungsmechanismus
        verwendet wird (falls zutreffend).
    oil_filter_style:
      name: Typ des Ölfilters
      description: Gibt Bauform sowie Montage- bzw. Installationsart des Ölfilters
        an, um die Kompatibilität mit der Filterhalterung des Motors sicherzustellen.
    oil_pan_baffle_windage_features:
      name: Merkmale des Ölwannen-Schwallblechs/Windabweisers
      description: Kennzeichnet interne Ölkontrollfunktionen, die in der Ölwanne enthalten
        sind.
    oil_pan_finish_coating:
      name: Beschichtung der Ölwanne
      description: Beschreibt die Oberflächenbeschaffenheit bzw. Beschichtung der
        Ölwanne (z. B. lackiert, pulverbeschichtet, galvanisiert oder roh).
    oil_pressure_sensor_function_type:
      name: Funktionstyp des Öldrucksensors
      description: Gibt an, ob es sich um einen Öldruckgeber mit variablem Ausgang
        für Anzeige bzw. Steuergerät oder um einen Ein-/Aus-Öldruckschalter handelt,
        der eine Warnleuchte auslöst.
    oil_pressure_sensor_signal_output_type:
      name: Typ des Signalausgangs des Öldrucksensors
      description: Gibt die Art des elektrischen Ausgangs- bzw. Signals an, das vom
        Öldrucksensor bzw. -geber erzeugt wird.
    oil_processing_method:
      name: Ölverarbeitungsmethode
      description: Gibt an, wie das Öl hergestellt bzw. raffiniert wurde (z. B. kaltgepresst,
        nativ oder raffiniert), was Geschmack, Nährwert und geeignete Kochanwendungen
        beeinflusst.
    oil_pump_drive_method:
      name: Antriebsmethode der Ölpumpe
      description: Gibt an, wodurch die Ölpumpe im Motor angetrieben wird.
    oil_pump_mounting_style:
      name: Montageart der Ölpumpe
      description: Gibt an, wo und wie die Ölpumpe im Motor montiert wird (z. B. intern
        oder extern/fernmontiert, Deckelmontage oder Ölwannenmontage).
    oil_system_connection_thread_standard:
      name: Gewindestandard der Ölsystemverbindung
      description: Gibt den Gewinde- bzw. Verbindungsstandard an, der von der Ölsystemschnittstelle
        des Teils für Installation und Kompatibilität verwendet wird (z. B. M12x1,5,
        1/8-27 NPT oder BSPP).
    oil_viscosity_grade:
      name: Ölviskositätsklasse
      description: Beschreibt die relative Viskosität des Spinnöls für Handarbeitsgeräte
        (nicht SAE-Klassen für Kraftfahrzeuge).
    okra_variety:
      name: Okrasorte
      description: Kennzeichnet die angebotene Okrasorte bzw. Marktsorte, z. B. Clemson
        Spineless, Red Burgundy oder Baby Okra.
    olfactory_arts_material_form:
      name: Materialart zur Duftherstellung
      description: Gibt die physische Form des Materials im Verkaufszustand an.
    olfactory_arts_tool_kit_content:
      name: Inhalt des Werkzeugsets für olfaktorische Kunst
      description: Listet die enthaltenen Komponenten auf, wenn das Produkt als Set
        zur Herstellung von Kerzen, Räucherwerk oder Parfüm verkauft wird.
    olive_variety:
      name: Olivensorte
      description: Gibt die verwendete Olivensorte an, was Geschmack, Textur, Farbe
        und regionale Authentizität beeinflusst.
    onion_variety:
      name: Auswahl an Zwiebeln
      description: Gibt die genaue Zwiebelsorte an, damit Käufer:in schnell die gewünschte
        Farbe, den Geschmack und die Verwendungshinweise finden kann, während Händler
        die Produkte präzise auflisten können.
    opacity_level:
      name: Deckkraft
      description: Gibt an, wie transparent oder blickdicht der Stoff ist.
    operating_modes:
      name: Betriebsmodi
      description: Primäre integrierte Effekt- bzw. Bewegungsmodi des Laserlichts.
    operating_voltage:
      name: Betriebsspannung
      description: Gibt die Nennsystemspannung an, für die der Injektor ausgelegt
        ist.
    optical_toy_features:
      name: Merkmale des optischen Spielzeugs
      description: Hebt den primären visuellen bzw. optischen Effekt hervor, der vom
        Spielzeug erzeugt wird.
    orchestral_string_core_material:
      name: Kernmaterial der Orchesterstreichersaite
      description: Gibt das Kernmaterial der Saite an, was Spielgefühl, Ansprache
        und Klang maßgeblich beeinflusst.
    orchestral_string_end_type:
      name: Endtyp der Orchesterstreichersaite
      description: Gibt die Befestigungsart am Saitenhalterende der Saite an.
    orchestral_string_included_strings:
      name: Saiten für Streichinstrumente
      description: Listet die spezifischen Saiten auf, die in der Packung enthalten
        sind (variiert je nach Instrument).
    orchestral_string_instrument_fitting_part_type:
      name: Typ des Beschlags bzw. Teils für Orchesterstreichinstrumente
      description: Gibt an, um welche Art von Beschlag bzw. Teil es sich handelt (z. B.
        Steg, Saitenhalter oder Kinnhalter).
    orchestral_string_instrument_mute_type:
      name: Dämpfer für Streichinstrumente
      description: Gibt den Funktionstyp des Dämpfers für Orchesterstreichinstrumente
        an (z. B. Übungs-/Hoteldämpfer oder Konzertdämpfer) und/oder den gängigen
        Designstil.
    orchestral_string_instrument_part_position:
      name: Position des Teils am Orchesterstreichinstrument
      description: Gibt an, wo das Teil am Instrument angebracht wird (nützlich bei
        oberen/unteren oder linken/rechten Varianten).
    orchestral_string_winding_material:
      name: Wickelmaterial für Saiten von Streichinstrumenten
      description: Gibt das äußere Wicklungs- bzw. Umhüllungsmaterial der Saite an.
    organza_finish_sheen:
      name: Organza-Finish/-Glanz
      description: Beschreibt die Oberflächenoptik des Organzas (matt oder glänzend/irisierend).
    organza_ribbon_transparency_level:
      name: Transparenzgrad des Organzabands
      description: Beschreibt, wie durchsichtig das Organzaband ist.
    organza_transparency_level:
      name: Organza-Transparenzstufe
      description: Beschreibt, wie transparent der Organzastoff in einfacher Lage
        ist.
    origami_paper_shape:
      name: Form des Origamipapiers
      description: Gibt die zum Falten verwendete Papierform an.
    origami_paper_sidedness:
      name: Bedruckung des Origamipapiers
      description: Gibt an, ob das Origamipapier auf beiden Seiten dieselbe Farbe
        bzw. dasselbe Muster oder kontrastierende Seiten aufweist.
    ostrich_feather_part:
      name: Teil der Straußenfeder
      description: Kennzeichnet die verwendete Art bzw. den Teil der Straußenfeder
        (z. B. Schmuckfeder oder Unterfeder), was Weichheit, Dichte und typische Bastelanwendungen
        beeinflusst.
    outboard_motor_shaft_type:
      name: Schafttyp des Außenbordmotors
      description: Standardisierte Schaftlängenklasse für Außenbordmotoren (Bezeichnung
        aus der Schifffahrtsbranche).
    outboard_motor_steering_type:
      name: Lenkungstyp des Außenbordmotors
      description: Gibt die vom Außenbordmotor verwendete Steuerungsschnittstelle
        bzw. den Steuerungsmechanismus an (z. B. Pinne oder Fernsteuerungssystem).
    outdoor_table_functionality:
      name: Funktionen des Outdoor-Tischs
      description: Kennzeichnet spezielle integrierte Funktionen, die über eine einfache
        Tischoberfläche hinausgehen (z. B. Kühlfach, Ablagefach, Gasflaschenabdeckung,
        Sonnenschirmhalterung, Stuhlverbinder, Klappdesign, poolsicheres Design, Höhenverstellung,
        integrierte Rollen oder LED-Beleuchtung).
    outerwear_length_type:
      name: Länge der Oberbekleidung
      description: Klassifiziert die Gesamtlänge eines Oberbekleidungsstücks in standardisierte
        beschreibende Kategorien.
    outerwear_pieces_included:
      name: Inbegriffene Oberbekleidung
      description: Listet die Kleidungsstücke auf, die enthalten sind, wenn das Produkt
        als Set verkauft wird.
    outfit_attachment_mechanism:
      name: Befestigungsmechanismus für Outfits
      description: Gibt an, wie Kleidungsstücke oder Accessoires an der Puppe befestigt
        werden (z. B. Laschen, Klebstoff oder Magnete).
    outfit_items_included:
      name: Inbegriffene Outfits
      description: Listet die spezifischen Kleidungsstücke auf, die im Set enthalten
        sind (z. B. Body, Shorts oder Stirnband).
    outlet_thread_type:
      name: Typ des Auslassgewindes
      description: Gibt den Gewindestandard an, der an den Auslassanschlüssen der
        Bremsleitung des Hauptbremszylinders verwendet wird (z. B. metrische Bördelung
        oder SAE-Inverted-Flare).
    output_jack_type_instrument:
      name: Typ der Ausgangsbuchse (Instrument)
      description: Gibt den Typ der Audioausgangsbuchse an der elektrischen Mandoline
        an.
    output_signal_type:
      name: Typ des Ausgangssignals
      description: Beschreibt das elektrische Ausgangsverhalten bzw. den Ausgangstyp
        des Sensors (z. B. analoger Widerstand eines NTC-Thermistors).
    outsole_marking_type:
      name: Art der Sohlenmarkierung
      description: Gibt an, ob die Außensohle des Schuhs Spuren auf Hallenböden hinterlässt,
        ein wichtiger Faktor bei Hallensportarten mit Schlägern.
    outsole_material:
      name: Material der Außensohle
      description: Gibt das Material der Außensohle an, das den Boden berührt und
        Griffigkeit, Flexibilität sowie Haltbarkeit beeinflusst.
    outsole_stud_type:
      name: Typ der Außensohlenstollen
      description: Beschreibt die Konfiguration der Außensohle bzw. Stollen (z. B.
        geformte Stollen, Gummistollen oder Rasennoppen), die Traktion auf dem gewählten
        Untergrund bietet.
    oven_bake_clay_formulation:
      name: Zusammensetzung des ofenhärtenden Tons
      description: Kennzeichnet die Zusammensetzungsart des ofenhärtenden Tons (z. B.
        Polymer- oder Harzton), was Verarbeitung, Aushärtungsverhalten und Produkteigenschaften
        beeinflusst.
    oven_housing_configuration:
      name: Konfiguration des Ofengehäuses
      description: Definiert die vorgesehene Gerätekonfiguration, die der Schrank
        aufnehmen kann (z. B. Einzelbackofen, Doppelbackofen oder Backofen-Mikrowellen-Kombination).
    overhead_mount_installation_method:
      name: Installationsmethode der Deckenhalterung
      description: Beschreibt, wie die Deckenhalterung am Fahrzeug befestigt wird
        (Befestigungsmaterial bzw. Befestigungsart).
    oversize_or_undersize_grade:
      name: Übergrößen- oder Untergrößenklasse
      description: Gibt die Größenklasse des Sets an (Übermaßkolben/-ringe und/oder
        Untermaßlager) im Verhältnis zur OEM-Standardgröße.
    p_tex_application_method:
      name: P-Tex-Aufbringungsmethode
      description: Beschreibt, wie das P-Tex-Material auf den Ski- oder Snowboardbelag
        aufgetragen wird.
    p_tex_form:
      name: Form des P-Tex
      description: Gibt die physische Form an, in der das Reparaturmaterial geliefert
        wird.
    packability:
      name: Packmaß
      description: Gibt an, ob und wie die Weste verstaut oder zusammengepackt werden
        kann, wenn sie nicht verwendet wird.
    packaging_format:
      name: Verpackungsformat
      description: Beschreibt, wie die Saiten verpackt bzw. verkauft werden (Einzelhüllen,
        lose Ware usw.).
    packaging_material:
      name: Verpackungsmaterial
      description: Gibt das Hauptmaterial der Flasche bzw. des Behälters an, der das
        Wasser enthält.
    packaging_type:
      name: Verpackungsart
      description: Beschreibt, wie die Wackelkopffigur für Verkauf, Präsentation oder
        Sammleraufbewahrung verpackt ist.
    packing_medium:
      name: Einlegemedium
      description: Gibt die Flüssigkeit bzw. das Medium an (z. B. Wasser, Sirup, Saft
        oder Salzlake), das zur Konservierung der Früchte im Behälter verwendet wird.
    pad_components_included:
      name: Inbegriffene Protektoren
      description: Gibt an, welche Teile enthalten sind, wenn das Produkt als Set
        verkauft wird (z. B. Knie- und Ellbogenschoner oder nur Handgelenkschützer).
    pad_controller_additional_control:
      name: Zusätzliche Bedienelemente des Pad-Controllers
      description: Beschreibt die zusätzlichen physischen Bedienelemente neben den
        Pads, die am Gerät vorhanden sind (z. B. Drehregler, Fader oder Tasten).
    pad_controller_performance_features:
      name: Performance-Funktionen des Pad-Controllers
      description: Wichtige performancebezogene Pad-Funktionen für Spiel und ausdrucksstarke
        Steuerung.
    pad_coverage_area:
      name: Abdeckungsbereich des Polsters
      description: Gibt die Körperbereiche an, die durch die integrierten Polster
        des Stützgürtels geschützt werden.
    pad_material_or_technology:
      name: Polstermaterial oder -technologie
      description: Gibt die proprietäre stoßabsorbierende Technologie bzw. das Markenmaterial
        an, das im Polster verwendet wird.
    pad_mounting_or_holding_style:
      name: Montage- oder Halteart des Polsters
      description: Gibt an, wie das Polster während der Nutzung gehalten, getragen
        oder montiert wird.
    pad_saver_style:
      name: Typ des Pad-Savers
      description: Gibt die Bauart bzw. das Design des Pad-Savers an, der zum Trocknen
        der Polster und der Bohrung verwendet wird.
    pad_shape:
      name: Schlagpolsterform
      description: Definiert die geometrische Form bzw. Krümmung der Schlagfläche
        oder des gesamten Polsters (z. B. rund, gebogen, rechteckig oder flach), um
        Polster an Trainingsziele und Schlagarten anzupassen.
    pad_shell_type:
      name: Typ der Polsterschale
      description: Klassifiziert die Bauart der Außenfläche des Polsters (z. B. Hartschale,
        Weichschale oder Inneneinsatz).
    pad_style:
      name: Typ des Polsters
      description: Gibt den mit dem Schlitten gelieferten Polstertyp bzw. das Design
        an.
    padding_layers:
      name: Anzahl der Polsterschichten
      description: Gibt die Anzahl der Schaumstoffschichten an, die zur Stoßabsorption
        verwendet werden.
    padding_level:
      name: Polsterungsgrad
      description: Gibt den Anteil der Polsterung in den Kontaktbereichen des Gurts
        bzw. der Stütze (Nacken, Schultern, Rücken) an.
    padding_material:
      name: Polstermaterial
      description: Bezeichnet das Füll- oder Polstermaterial, das Stöße in Taschen,
        Schilden, Handschuhen und Dummies absorbiert.
    paddle_ball_attachment_type:
      name: Befestigungsart des Paddelballs
      description: Gibt an, wie der Ball mit dem Schläger verbunden ist (oder ob er
        nicht befestigt ist).
    paddle_leash_style:
      name: Stil der Paddelsicherung
      description: Kennzeichnet Stil oder Ausführung der Paddelsicherung.
    paddle_shape:
      name: Paddelform
      description: Definiert die Gesamtform des Paddelkopfs bzw. -körpers (z. B. Standard,
        länglich, Wide Body), die sich auf Reichweite, Sweetspot-Größe und Manövrierfähigkeit
        auswirkt.
    paddleboard_intended_use:
      name: Verwendungszweck des Paddleboards
      description: Klassifiziert den primären Verwendungszweck bzw. die Aktivität,
        für die das Board entwickelt wurde (z. B. Touring, Yoga, Racing).
    paint_application_method:
      name: Farbaufbringungsmethode
      description: Primäre Befestigungsart am Bremssattel
    paint_by_number_surface_type:
      name: Oberflächentyp für Malen nach Zahlen
      description: Die Oberfläche, auf der das nummerierte Motiv gedruckt ist (z. B.
        Leinwand, Papier oder Holzplatte).
    paint_medium_application_method:
      name: Anwendungsmethode für Malmittel
      description: Gibt die empfohlene Anwendungsmethode des Malmittels an.
    paint_medium_intended_effect:
      name: Beabsichtigte Wirkung des Malmittels
      description: Beschreibt den primären Effekt, den das Malmittel erzeugen soll
        (z. B. Textur, Glanz, Lasur oder Fließverhalten).
    paint_safe_bristles:
      name: Lackschonende Borsten
      description: Gibt an, ob die Bürstenborsten für die Verwendung auf Fahrzeuglack
        oder Klarlack geeignet sind und keine Kratzer verursachen.
    paintable_surface:
      name: Überstreichbare Oberfläche
      description: Gibt an, ob die Pappmachéform direkt bemalt werden kann (z. B.
        grundiert oder versiegelt) oder vorbereitet werden muss.
    paintball_caliber:
      name: Paintball-Kaliber
      description: Gibt Durchmesser bzw. Kaliber von Paintballs oder kompatibler Ausrüstung
        an.
    paintball_feed_system:
      name: Paintball-Zuführungssystem
      description: Definiert, wie Paintballs dem Markierer zugeführt werden.
    paintball_fill_color:
      name: Füllfarbe für Paintballs
      description: Gibt die Farbe der inneren Markierungsfüllung an, die sich von
        der äußeren Hülle unterscheiden kann und die Farbe des Treffers bestimmt.
    paintball_fill_type:
      name: Füllmethode für Paintballs
      description: Beschreibt besondere Eigenschaften oder Zusammensetzungen der Füllung
        (z. B. abwaschbar, im Dunkeln leuchtend oder pulverförmig).
    paintball_grade:
      name: Qualitätsstufe der Paintballs
      description: Beschreibt Leistungsklasse oder vorgesehenen Einsatzbereich (z. B.
        Einsteiger, Feld, Wettkampf oder Winter).
    paintball_mask_coverage_level:
      name: Abdeckungsgrad der Paintball-Maske
      description: Gibt an, welche Bereiche von Gesicht oder Kopf durch die Paintball-Brille
        bzw. -Maske geschützt werden (nur Brille, halbes Gesicht, ganzes Gesicht oder
        ganzer Kopf).
    paintball_tank_valve_type:
      name: Ventiltyp für Paintball-Tanks
      description: Beschreibt die am Tank vorhandene Ventil- oder Regleranschlussschnittstelle.
    painting_surface_priming_type:
      name: Grundierungsart der Maloberfläche
      description: Gibt die Grundierung bzw. Beschichtung der Maloberfläche an, die
        sich auf Farbhaftung und Kompatibilität mit verschiedenen Maltechniken auswirkt.
    palette_knife_blade_edge_profile:
      name: Kantenprofil der Palettenmesserklinge
      description: Beschreibt das Arbeitskantenprofil einer Palettenmesserklinge (nicht
        die Schärfe), das sich auf Strichführung und Mischverhalten auswirkt.
    palette_knife_flexibility:
      name: Flexibilität des Palettenmessers
      description: Beschreibt Steifigkeit bzw. Flexibilität der Palettenmesserklinge.
    palette_surface_finish:
      name: Oberflächenbeschaffenheit der Palette
      description: Beschreibt die Oberflächenbeschaffenheit bzw. Beschichtung der
        Mischfläche, die Fleckenbeständigkeit und Reinigungsfreundlichkeit beeinflusst.
    palm_padding_level:
      name: Polsterungsgrad des Handschuhs
      description: Beschreibt den Grad der Polsterung im Handflächenbereich des Handschuhs
        oder Griffpolsters.
    palm_padding_type:
      name: Polsterungsart des Handschuhs
      description: Gibt Material oder Konstruktion der Handflächenpolsterung an (z. B.
        Gel, Schaumstoff oder Doppelschicht).
    palm_wax_blend_readiness:
      name: Mischungsart des Palmwachses
      description: Gibt an, ob es sich um reines Palmwachs oder um eine vorgemischte
        Rezeptur mit bestimmten Leistungseigenschaften handelt.
    palm_wax_form:
      name: Form des Palmwachses
      description: Beschreibt die physische Form des Palmwachses beim Verkauf, die
        sich auf Dosierung, Schmelzgeschwindigkeit und Handhabung auswirkt.
    pan_flute_tuning_standard:
      name: Stimmstandard für Panflöten
      description: Referenzfrequenz zum Stimmen (z. B. A4 = 440 Hz), wichtig für das
        Zusammenspiel mit anderen Instrumenten.
    pannier_configuration:
      name: Gepäcktaschenkonfiguration
      description: Gibt an, ob das Produkt als einzelne Tasche, verbundene Doppeltasche
        oder als Doppel- bzw. Dreierset verkauft wird.
    pannier_mounting_system:
      name: Gepäcktaschen-Befestigungssystem
      description: Definiert den Mechanismus zur Befestigung der Packtasche am Fahrradträger
        oder Rahmen und gewährleistet die Kompatibilität mit verschiedenen Setups.
    pant_cuff_style:
      name: Abschluss der Hosenbeine
      description: Kennzeichnet Abschluss oder Anpassung am Knöchel der Hose (z. B.
        elastische Bündchen, Knöchelreißverschlüsse oder offener Saum).
    pant_leg_conversion_type:
      name: Umwandlungsart der Hosenbeine
      description: Gibt an, ob und wie die Hosenbeine für unterschiedliche Längen
        angepasst oder umgewandelt werden können.
    pantyhose_crotch_style:
      name: Schrittkonstruktion der Strumpfhose
      description: Definiert die Konstruktion des Schrittbereichs und unterscheidet
        zwischen geschlossenem Schritt, offenem Schritt und verstärktem Zwickel.
    papaya_variety:
      name: Papayasorte
      description: Gibt Sorte oder Handelsvarietät einer Papaya an (z. B. Solo oder
        Maradol).
    paper_and_magnetic_doll_format:
      name: Format für Papier- und Magnetpuppen
      description: Gibt an, ob es sich um ein klassisches Papierpuppenset, ein Magnetpuppenset
        oder ein Hybridformat handelt.
    paper_color_family:
      name: Papierfarbgruppe
      description: Gibt an, ob die Packung einfarbig, mehrfarbig oder als Spezialmischung
        zusammengestellt ist (nützlich, wenn die Farbe pro Artikel angegeben wird,
        die Packungen aber gemischt sind).
    paper_magnetic_doll_set_contents:
      name: Inhalt des Papier- und Magnetpuppensets
      description: Gibt an, welche Hauptkomponenten im Set enthalten sind.
    paper_opacity:
      name: Papierdeckkraft
      description: Gibt an, wie transparent bzw. deckend das Papier ist (nützlich
        zum Abpausen).
    paraglider_certification_rating:
      name: Zertifizierungsklasse des Gleitschirms
      description: Gibt die offizielle Flugtauglichkeitsklasse des Gleitschirmflügels
        an (z. B. EN- oder LTF-Klasse).
    parasite_types_controlled:
      name: Bekämpfte Parasitenarten
      description: Listet die inneren Parasiten auf, gegen die das Produkt wirksam
        ist, damit Entwurmungsprogramme gezielt angepasst werden können.
    parking_camera_mounting_location:
      name: Montageort der Einparkhilfe
      description: Gibt an, an welcher Stelle des Fahrzeugs die Kamera montiert werden
        soll (z. B. Kennzeichenbereich, Heckaufbau oder bündige Montage).
    parking_camera_night_vision_technology:
      name: Nachtsichttechnologie der Parkkamera
      description: Beschreibt die von der Kamera verwendete Technologie zur Unterstützung
        bei schlechten Lichtverhältnissen.
    parking_camera_orientation:
      name: Ausrichtung der Parkkamera
      description: Gibt an, ob die Kamera für Rückansicht, Frontansicht oder spiegelbare
        bzw. umschaltbare Nutzung ausgelegt ist.
    parking_sensor_finish:
      name: Oberflächenbeschaffenheit des Parksensors
      description: Gibt die Oberflächenbeschaffenheit der Parksensorabdeckung an (z. B.
        lackierbar, grundiert, matt oder glänzend), damit sie optisch zum Stoßfänger
        passt.
    parking_sensor_type:
      name: Sensortyp des Parksensors
      description: Gibt die vom Parksensor verwendete Sensortechnologie an (z. B.
        Ultraschall, elektromagnetisch, Radar oder optisch).
    parsley_root_variety:
      name: Petersilienwurzelsorte
      description: Gibt Sorte oder Varietät der Petersilienwurzel an, sofern vom Lieferanten
        angegeben.
    parsnip_variety:
      name: Pastinakensorte
      description: Kennzeichnet die spezifische Sorte bzw. Züchtung der Pastinake,
        z. B. Hollow Crown oder White Gem, damit nach Geschmack, Süße oder Größe ausgewählt
        werden kann.
    part_condition:
      name: Zustand des Teils
      description: Gibt an, ob das Teil neu, gebraucht, generalüberholt usw. ist.
    part_placement:
      name: Einbauposition des Teils
      description: Gibt an, an welcher Stelle der Maschine (z. B. Treppensteiger oder
        Stepper) das Teil montiert wird, etwa links, rechts, vorne oder hinten.
    partial_capo_covered_strings:
      name: Vom Teilcapo abgedeckte Saiten
      description: Gibt den Saitenbereich an, den der Teilcapo abdeckt, basierend
        auf der Standardnummerierung für 6-saitige Gitarren (1 = hohes E, 6 = tiefes
        E).
    parting_style:
      name: Scheitelstil
      description: Gibt an, wie die Perücke gescheitelt ist bzw. gescheitelt werden
        kann (z. B. Mittelscheitel, Seitenscheitel oder freier Scheitel).
    party_favor_type:
      name: Art des Partygeschenks
      description: Gibt an, um welche Art von Partygeschenk es sich handelt (z. B.
        Aufkleber, Mini-Spielzeug oder Seifenblasen), um das Filtern innerhalb der
        Kategorie zu erleichtern.
    party_game_format:
      name: Format des Partyspiels
      description: Primäres physisches Format des Partyspiels.
    party_horn_mouthpiece_type:
      name: Mundstücktyp für Partyhörner
      description: Gibt die Konstruktion des Mundstücks an, die sich auf Hygiene und
        Komfort auswirkt.
    party_horn_style:
      name: Stil des Partyhorns
      description: Beschreibt Konstruktion bzw. Funktionsweise des Partyhorns (wie
        es sich entfaltet oder Töne erzeugt).
    passenger_car_type:
      name: Personenwagentyp
      description: Kennzeichnet den spezifischen Personenwagentyp des Modells (z. B.
        Reisezugwagen oder Schlafwagen), der zum Filtern und Zusammenstellen von Sets
        verwendet wird.
    passion_fruit_variety:
      name: Passionsfruchtsorte
      description: Gibt die botanische oder kommerzielle Sorte der angebotenen Passionsfrucht
        an (z. B. Purple, Yellow oder Granadilla).
    pasta_sauce_texture:
      name: Konsistenz der Pastasauce
      description: Beschreibt die Konsistenz der Sauce (z. B. glatt, stückig oder
        cremig), passend zu unterschiedlichen Vorlieben beim Mundgefühl.
    pasta_sauce_variety:
      name: Pastasaucensorte
      description: Klassifiziert Pastasaucen nach Rezept oder Stil, damit Klassiker
        wie Marinara oder spezielle Saucen wie Vodka oder Pesto schnell gefunden werden
        können.
    pastry_crust_state:
      name: Zustand des Teigbodens
      description: Beschreibt den Zubereitungs- oder Backzustand des Teigbodens beim
        Kauf.
    pastry_crust_style:
      name: Art des Teigbodens
      description: Gibt die spezifische Gebäck- oder Teigart des Bodens an.
    pastry_filling_type:
      name: Art der Gebäckfüllung
      description: Gibt die Hauptfüllung des Gebäcks oder Scones an.
    patch_adhesion_method:
      name: Befestigungsart des Flickens
      description: Gibt an, wie der Flicken am Schlauch oder Reifen befestigt wird
        (z. B. selbstklebend, vulkanisiert mit Kleber oder wärmeaktiviert).
    patch_backing_material:
      name: Grundmaterial des Patches
      description: Material auf der Rückseite bzw. Basis des Aufnähers, das mit dem
        zu verzierenden Artikel in Kontakt kommt (z. B. Filz oder Köper).
    patch_backing_type:
      name: Befestigungsart des Patches
      description: Art der Rückseite des Aufnähers (z. B. aufbügelbar, selbstklebend,
        Klettverschluss oder ohne Rückseite).
    patch_base_material:
      name: Hauptmaterial des Patches
      description: Primäres Trägertextilmaterial des Motivaufnähers (ohne dekorative
        Verzierungen).
    patch_border_edge_finish:
      name: Rand- bzw. Kantenabschluss des Aufnähers
      description: Beschreibt die Art der Kantenverarbeitung des Aufnähers (z. B.
        gekettelt, overlockt oder lasergeschnitten), die Haltbarkeit und Aussehen
        beeinflusst.
    patch_placement_area:
      name: Platzierungsbereich des Aufnähers
      description: Üblicher Platzierungsbereich des Aufnähers auf Bekleidung oder
        Accessoires.
    pathogen_removal_capability:
      name: Eigenschaft zur Pathogenentfernung
      description: Gibt an, welche Klassen von Mikroorganismen (Bakterien, Protozoen
        oder Viren) von der Pumpe entfernt werden können.
    pattern_sizing_system:
      name: Größensystem des Schnittmusters
      description: Gibt das regionale Größensystem bzw. den Standard der Größentabelle
        des Schnittmusters an (z. B. US, UK oder EU).
    peak_style:
      name: Schirmstil
      description: Legt Stil bzw. Form des Visiers oder Schirms am Helm fest, was
        Schutzwirkung, Optik und Disziplinvorgaben beeinflusst.
    pear_variety:
      name: Auswahl an Birnen
      description: Kennzeichnet die Birnensorte (z. B. Bartlett, Bosc oder Conference),
        damit nach Geschmack, Textur und Verwendungszweck ausgewählt werden kann.
    pearl_luster_grade:
      name: Glanzgrad der Perle
      description: Qualitativer Glanzgrad der Perlenoberfläche.
    pearl_matching_level:
      name: Übereinstimmungsgrad der Perlen
      description: Gibt an, wie gut Perlen innerhalb einer Partie oder eines Strangs
        (hinsichtlich Farbe, Größe und Glanz) übereinstimmen.
    pearl_shape:
      name: Perlenform
      description: Allgemeine Formkategorie der Perle.
    pearl_surface_condition:
      name: Zustand der Perlenoberfläche
      description: Gibt den sichtbaren Oberflächenzustand der Perle anhand von Anzahl
        und Ausprägung von Makeln oder Flecken an.
    pearl_treatment:
      name: Behandlung der Perle
      description: Gibt an, welche Behandlung an der Perle vorgenommen wurde, die
        Farbe oder Aussehen beeinflusst.
    pearl_type:
      name: Perlenart
      description: Gibt Art bzw. Herkunft der losen Perlen an (z. B. Süßwasser, Akoya,
        Tahiti oder Südsee).
    peat_level:
      name: Torfgehalt
      description: Beschreibt die Intensität des Torfraucharomas im Whisky, von ungetorft
        bis stark getorft.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilität mit Pedal- und Cleat-Systemen
      description: Gibt an, mit welchen Pedal- oder Cleat-Standards Unterlegscheibe
        oder Keil kompatibel sind, damit passende Produkte für Pedale und Schuhe gewählt
        werden können.
    pedal_configuration:
      name: Pedalkonfiguration
      description: Gibt an, ob der Stuhl über ein einzelnes Pedal, unabhängige Pedale
        oder ein umwandelbares Design verfügt.
    pedal_mounting_style:
      name: Pedal-Montagestil
      description: Gibt an, wie das Pedal bzw. die Pedalabdeckung oder das Pedalpolster
        am Fahrzeug befestigt wird (Montage- bzw. Befestigungsmethode).
    pedal_set_components:
      name: Pedalset-Komponenten
      description: Gibt an, welche Pedale im Set enthalten sind.
    pedal_spindle_material:
      name: Material der Pedalspindel
      description: Material der Pedalachse bzw. Pedalspindel, das Festigkeit, Gewicht
        und Korrosionsbeständigkeit beeinflusst.
    pedal_spindle_thread_size:
      name: Gewindegröße der Pedalspindel
      description: Gibt den Gewindestandard der Pedalspindel an, die in den Kurbelarm
        geschraubt wird.
    pedal_type:
      name: Pedaltyp
      description: Beschreibt den Typ der mit dem Fahrrad gelieferten Pedale und gibt
        Hinweise auf Schuhkompatibilität und Fahrstil.
    pellet_accessory_type:
      name: Pellet-Zubehör
      description: Kennzeichnet die jeweilige Art von Pelletzubehör, damit Angler
        Bohrer, Bander oder Stopper passend zur Montage schnell finden können.
    pellet_grade:
      name: Pelletqualität
      description: Gibt die Fertigungsgenauigkeit bzw. Leistungsklasse der Airsoft-Pellets
        an.
    pen_ink_color:
      name: Tintenfarbe des Stifts
      description: Gibt die tatsächliche Tintenfarbe des Stifts an, die von der Gehäusefarbe
        abweichen kann.
    penalty_card_accessories_included:
      name: Enthaltenes Zubehör für Strafkarten
      description: Listet zusätzliches Schiedsrichterzubehör auf, das mit den Strafkarten
        geliefert wird, z. B. Kartenmappe, Notizblock, Bleistift, Münze, Pfeife oder
        Tasche.
    penalty_card_colors_included:
      name: Farben der enthaltenen Strafkarten
      description: Listet die Farben der im Produktset enthaltenen Strafkarten auf.
    penalty_flag_throw_distance:
      name: Wurfweite der Strafflagge
      description: Designklassifizierung zur vorgesehenen Wurfweite der Flagge.
    pendant_cutter_safety_features:
      name: Sicherheitsmerkmale des Anhängerschneiders
      description: Beschreibt integrierte Sicherheitsmerkmale zur Verringerung versehentlicher
        Schnittverletzungen beim Tragen oder Transportieren.
    pendant_cutter_wear_method:
      name: Trageart des Anhängerschneiders
      description: Gibt an, wie der Anhängerschneider getragen werden soll.
    pepper_variety:
      name: Paprikasorte
      description: Gibt die verwendete Paprika- oder Pfeffersorte an, damit zwischen
        verschiedenen Geschmacksprofilen und Schärfegraden unterschieden werden kann.
    percussion_case_style:
      name: Stil des Schlaginstrumentenkoffers
      description: Klassifiziert Bauart bzw. Stil des Koffers (weiche Tasche, Hartschalenkoffer
        oder Hybrid).
    percussion_instruments_included:
      name: Enthaltene Percussioninstrumente
      description: Listet die enthaltenen Schlaginstrumente auf, wenn es sich um ein
        Spielzeugset mit mehreren Instrumenten handelt.
    percussion_mallet_handle_grip_style:
      name: Griffstil des Schlagschlägels
      description: Beschreibt die Art der Griffausführung am Schlägelgriff (z. B.
        blankes Holz, lackiert, gummiert oder umwickelt).
    percussion_mallet_head_construction:
      name: Konstruktion des Schlagschlägelkopfes
      description: Beschreibt die Bauweise des Schlägelkopfs (z. B. Garnwicklung,
        Filzwicklung, Gummi oder rohes Holz), die Klang und Haltbarkeit beeinflusst.
    perfumery_base_carrier_type:
      name: Trägerstofftyp der Parfümbasis
      description: Gibt das Träger- bzw. Lösungsmittelsystem der Parfümbasis an, also
        woraus die Basis hauptsächlich für Verdünnung und Leistung besteht.
    perfumery_base_intended_application:
      name: Verwendungszweck der Parfümbasis
      description: Gibt an, für welche Art von Endprodukt die Basis vorgesehen ist
        (z. B. Duftspray oder Roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Trägerstoff bzw. Lösungsmittel des Duftstoffs
      description: Gibt das Träger- bzw. Lösungsmittel an, in dem der Duftstoff geliefert
        wird (z. B. Ethanol, DPG oder Jojobaöl).
    perfumery_ingredient_form:
      name: Form der Inhaltsstoffe für Düfte
      description: Gibt die physische Form bzw. den Zustand des gelieferten Duftstoffs
        an.
    perfumery_ingredient_type:
      name: Art der Inhaltsstoffe für Düfte
      description: Klassifiziert den Duftstoff nach seiner Art in der Parfümerie (z. B.
        ätherisches Öl oder Aromastoff).
    perfumery_ingredient_usage_note:
      name: Anwendungshinweis für Duftstoffe
      description: Kennzeichnet die typische Rolle in einer Duftstruktur (Kopf-, Herz-
        oder Basisnote), wobei Inhaltsstoffe mehreren Duftnoten zugeordnet sein können.
    perfumery_ingredients:
      name: Inhaltsstoffe für Düfte
      description: Listet die Arten der im Set enthaltenen verbrauchbaren Duftstoffe
        auf (z. B. ätherische Öle, Duftöle oder Alkoholbasis).
    perfumery_note_position:
      name: Position der Duftnote
      description: Gibt die typische Rolle des Inhaltsstoffs in einer Duftstruktur
        an (Kopf-, Herz- oder Basisnote).
    persimmon_variety:
      name: Kakisorte
      description: Kennzeichnet die Sorte oder Varietät der Kaki, da sich Sorten wie
        Fuyu oder Hachiya hinsichtlich Textur, Geschmack, Adstringenz und kulinarischer
        Verwendung unterscheiden.
    personalization_type:
      name: Personalisierungsart
      description: Gibt an, ob und wie das Produkt für ein Event personalisiert werden
        kann (z. B. Monogramm, Name/Datum oder Fotoeinsatz).
    phonics_focus:
      name: Schwerpunkt der Lautlehre
      description: Gibt an, welche Fähigkeiten in Lautlehre und Wortlesen durch das
        Lernspielzeug gefördert werden.
    physalis_variety:
      name: Physalissorte
      description: Gibt die spezifische botanische Art, den Kultivar oder die gängige
        Sorte der angebotenen Physalis an.
    pi_ata_filler_type_included:
      name: Enthaltene Piñatafüllung
      description: Falls eine Füllung enthalten ist, wird die Art des enthaltenen
        Inhalts angegeben.
    pi_ata_hanging_method:
      name: Aufhängemethode der Piñata
      description: Beschreibt, wie die Piñata aufgehängt bzw. befestigt wird (Schlaufe,
        Haken, enthaltene Schnur usw.).
    pi_ata_opening_type:
      name: Öffnungsart der Piñata
      description: Beschreibt, wie die Einfüllöffnung geöffnet bzw. verschlossen wird
        (Klappe, Klettverschluss, Reißverschluss, versiegelt usw.).
    piccolo_key_system:
      name: Klappensystem der Piccoloflöte
      description: Kennzeichnet das Klappensystem bzw. die Bauart der Piccoloflöte
        (typischerweise Böhm-System bei modernen Piccoloflöten).
    piccolo_keywork_features:
      name: Merkmale der Piccoloflötenklappen
      description: Gibt besondere Mechaniken und Optionen der Klappenmechanik der
        Piccoloflöte an.
    pick_grip_aid:
      name: Griffhilfe für Plektren
      description: Kennzeichnet die hauptsächliche integrierte Griffhilfe des Plektrums
        zusätzlich zur allgemeinen Oberflächenstruktur (z. B. Grifflöcher, geprägtes
        Logo oder Gummieinlage).
    pickleball_construction_type:
      name: Bauart des Pickleballs
      description: Beschreibt die Herstellungsbauweise des Balls, z. B. nahtlos einteilig
        oder verschweißt zweiteilig, was Haltbarkeit und Flugkonsistenz beeinflusst.
    pickling_method:
      name: Einlegemethode
      description: Gibt das Konservierungsmedium bzw. die Methode zum Einlegen an,
        z. B. Essiglake oder Milchsäuregärung.
    pickup_and_preamp_configuration:
      name: Tonabnehmer- und Vorverstärkerkonfiguration
      description: Gibt an, ob die Viola über einen integrierten Tonabnehmer und/oder
        einen aktiven Vorverstärker für verstärktes Spielen oder Aufnahmen verfügt.
    pickup_configuration:
      name: Tonabnehmerkonfiguration
      description: Beschreibt die gesamte Tonabnehmerkonfiguration einer E-Gitarre
        anhand gängiger Kurzbezeichnungen (z. B. SSS, HSS oder HH).
    pickup_cover_material:
      name: Beschichtung des Tonabnehmers
      description: Gibt das hauptsächliche Material der Tonabnehmerabdeckung an (falls
        vorhanden), einschließlich üblicher galvanischer Beschichtungen, sofern vom
        Hersteller so angegeben.
    pickup_cover_type:
      name: Art der Tonabnehmerabdeckung
      description: Gibt an, ob der Tonabnehmer der E-Gitarre eine Abdeckung besitzt
        und aus welchem Material bzw. in welcher Ausführung diese gefertigt ist (z. B.
        Metall oder Kunststoff).
    pickup_string_spacing:
      name: Saitenabstand des Tonabnehmers
      description: Der Polstück-/Saitenabstandsstandard, für den der Tonabnehmer ausgelegt
        ist (z. B. Fender/F-Spaced oder Gibson/Standard), was die Ausrichtung bei
        Gitarren mit Tremolo beeinflusst.
    pie_crust_type:
      name: Art des Kuchenbodens
      description: Gibt die Art des Bodens für Kuchen oder Tarte an, z. B. Mürbeteig,
        Graham-Cracker-Boden oder glutenfreier Boden.
    piece_configuration:
      name: Teilekonfiguration
      description: Gibt an, aus wie vielen Einzelteilen Queue, Schaft oder Brücke
        bestehen, was Transportfähigkeit und Spielstil beeinflusst.
    pillow_form_size:
      name: Größe des Kisseninletts
      description: Standardisierte Größenangabe für Kisseninletts bzw. Kisseneinsätze
        (z. B. 18" × 18").
    pilot_helmet_communications_integration:
      name: Integration der Kommunikationssysteme des Pilotenhelms
      description: Gibt an, ob der Helm Komponenten für die Luftfahrtkommunikation
        enthält oder dafür vorkonfiguriert ist.
    pilot_helmet_visor_configuration:
      name: Visierkonfiguration des Pilotenhelms
      description: Gibt die Konfiguration des Visiers bzw. Gesichtsschutzes an, die
        mit dem Pilotenhelm geliefert wird.
    pin_attachment_type:
      name: Befestigungsart des Pins
      description: Gibt den Befestigungsmechanismus der Anstecknadel an, mit dem sie
        an Kleidung oder Oberflächen befestigt wird (z. B. Butterfly-Verschluss oder
        Magnetverschluss).
    pin_backing_type:
      name: Rückseite des Pins
      description: Gibt den Befestigungs- bzw. Rückseitenmechanismus an, mit dem die
        Anstecknadel an Kleidung oder Accessoires befestigt wird.
    pin_cushion_attachment_style:
      name: Befestigungsart des Nadelkissens
      description: Beschreibt, wie das Nadelkissen während der Nutzung getragen, befestigt
        oder positioniert wird.
    pin_cushion_features:
      name: Merkmale des Nadelkissens
      description: Funktionale Merkmale über die grundlegende Aufbewahrung von Nadeln
        hinaus.
    pin_face_customization_method:
      name: Anpassungsmethode der Vorderseite der Anstecknadel
      description: Gibt an, wie das Frontdesign hergestellt wird (z. B. Hartemaille,
        Weichemaille oder Druck).
    pin_type:
      name: Art der Anstecknadel
      description: Gibt die Art bzw. das Format der Anstecknadel für Fan-Sammlerstücke
        im Sportbereich an.
    ping_pong_certification:
      name: Tischtennis-Zertifizierung
      description: Gibt den offiziellen Standard bzw. die Zulassungsstufe des Produkts
        an.
    ping_pong_competition_certification:
      name: Wettkampf-Zertifizierung für Tischtennis
      description: Gibt den offiziellen Zertifizierungsstatus des Tischtennisballs
        für offizielle Wettkämpfe an (z. B. ITTF-zugelassen).
    ping_pong_paddle_handle_style:
      name: Griffstil des Tischtennisschlägers
      description: Definiert Form bzw. Stil des Schlägergriffs, was Griffkomfort und
        Spieltechnik beeinflusst.
    ping_pong_robot_accessory_type:
      name: Zubehörart für Tischtennisroboter
      description: Kennzeichnet den funktionalen Untertyp des Zubehörs, damit Käufer:innen
        Ergebnisse schneller eingrenzen können (z. B. Netze oder Netzteile).
    ping_pong_rubber_surface_type:
      name: Art der Tischtennisbelagoberfläche
      description: Beschreibt die Art bzw. Struktur der Belagoberfläche des Schlägers,
        die Spin- und Geschwindigkeitseigenschaften beeinflusst.
    ping_pong_rubber_type:
      name: Art des Tischtennisbelags
      description: Gibt die Bauart der Oberfläche des Tischtennisbelags an, die die
        Spieleigenschaften beeinflusst.
    ping_pong_table_type:
      name: Tischtennisplattenart
      description: Klassifiziert die allgemeine Bauart bzw. das Format des Tischs
        für einfachere Vergleiche (z. B. Wettkampf, Conversion Top oder Mini).
    pipe_instrument_voicing_sound_production_method:
      name: Intonation bzw. Klangerzeugungsmethode des Pfeifeninstruments
      description: Gibt an, wie das Instrument Klang erzeugt (Luftstrommechanismus),
        und hilft dabei, Panflöten, Rohrblattpfeifen und Orgelpfeifenfamilien in Filtern
        zu unterscheiden.
    piston_application_type:
      name: Verwendungszweck des Kolbens
      description: Vorgesehener Einsatzzweck des Kolbens (Ersatzteil, Performance/Rennsport
        oder Schwerlast).
    piston_crown_dish_style:
      name: Art des Kolbenbodens bzw. der Kolbenmulde
      description: Form des Kolbenbodens, die Brennraumvolumen und Verdichtung beeinflusst
        (z. B. flach, gewölbt oder mit Mulde).
    piston_pin_retention_type:
      name: Art der Kolbenbolzensicherung
      description: Gibt an, wie der Kolbenbolzen in der Kolben-/Pleuelbaugruppe gesichert
        wird.
    pit_configuration:
      name: Mattenkonfiguration
      description: Definiert die strukturelle Ausführung des Landebereichs (einteilig
        oder mehrmodulig) und damit die Anzahl der enthaltenen Abschnitte bzw. Module.
    pit_cover_type:
      name: Mattenabdeckung
      description: Gibt die mit der Sprunggrube gelieferte Schutzoberfläche bzw. Abdeckung
        an, die Spikeschutz, Wetterschutz und Präferenzen der Athlet:innen beeinflusst.
    pitahaya_flesh_color:
      name: Farbe des Pitahaya-Fruchtfleischs
      description: Gibt die Farbe des Fruchtfleischs der Pitahaya (Drachenfrucht)
        an (z. B. weiß, rot oder magenta), ein wichtiges Unterscheidungsmerkmal für
        Geschmack, Aussehen und wahrgenommenen Nährwert.
    pitch_mat_coverage_length:
      name: Abdeckungslänge der Cricket-Pitchmatte
      description: Klassifiziert die Cricket-Pitchmatte nach dem Bereich des Wickets,
        den sie abdeckt (z. B. volles oder halbes Pitch).
    pitch_range:
      name: Tonhöhenbereich
      description: Beschreibt den wahrgenommenen Tonhöhenbereich bzw. die Klanghelligkeit
        des Shaker-Sounds.
    pitch_standard:
      name: Tonhöhenstandard
      description: Gibt die Tonhöhennorm (Referenzstimmung) an, für die die Blockflöte
        gebaut wurde (z. B. A=440, A=442 oder A=415).
    pitching_rubber_size_designation:
      name: Größenbezeichnung des Pitching Rubber
      description: Gibt die Standardgrößenklassifizierung des Pitching Rubber an und
        vereinfacht so die Auswahl, ohne dass Käufer:innen die genauen Maße kennen
        müssen.
    pitching_screen_style:
      name: Art des Pitching Screens
      description: Definiert die Bauart des Screens, damit Käufer:innen schnell die
        passende Schutzkonfiguration für ihr Trainingsszenario auswählen können.
    pitching_target_design:
      name: Design des Pitching-Ziels
      description: Klassifiziert die allgemeine Bauart bzw. Konfiguration des Pitching-Ziels.
    pitching_wheel_count:
      name: Anzahl der Pitching-Räder
      description: Gibt die Anzahl der Antriebsräder einer Pitching-Maschine an.
    pivot_adjustability:
      name: Verstellbarkeit des Drehpunkts
      description: Gibt an, ob die Schere über eine verstellbare Drehpunktschraube
        zur Anpassung der Schnittspannung verfügt.
    pivot_piece_type:
      name: Art des Drehpunktstücks
      description: Unterscheidet zwischen den enthaltenen Formen der Drehpunktschnittstelle,
        z. B. traditionelle Cups oder Röhrenform.
    place_card_holder_closure_mechanism:
      name: Verschlussmechanismus des Platzkartenhalters
      description: Gibt an, wie der Halter die Karte festhält bzw. sichert.
    place_card_orientation:
      name: Ausrichtung der Platzkarte
      description: Gibt die Ausrichtung der Platzkarte bei Verwendung bzw. Präsentation
        an.
    place_card_printing_status:
      name: Druckstatus der Platzkarte
      description: Gibt an, ob die Platzkarte leer zum Beschriften/Drucken, vorgedruckt
        (Namen nicht personalisiert) oder personalisiert/individuell bedruckt ist.
    placket_type:
      name: Art der Knopfleiste
      description: Gibt die Art der vorderen Öffnung des Poloshirts an, einschließlich
        Anzahl der Knöpfe oder alternativer Verschlussarten.
    planetarium_content_theme:
      name: Inhaltsthema des Planetariums
      description: Hauptinhalt, der vom Planetariumsprojektor dargestellt wird.
    planetarium_projection_content_format:
      name: Inhaltsformat der Planetariumsprojektion
      description: Gibt den Projektionsmechanismus des Planetariums an (physische
        Discs/Dias oder digitaler/LED-Effekt).
    plant_fiber_type:
      name: Art der Pflanzenfaser
      description: Spezifische Pflanzenfaserart, wenn die Herkunft der Stapelfaser
        „Pflanze“ ist.
    plaster_gauze_finish:
      name: Oberfläche der Gipsbinde
      description: Beschreibt die resultierende Oberflächenbeschaffenheit nach dem
        Auftragen und Glätten.
    plaster_gauze_grade:
      name: Qualitätsstufe der Gipsbinde
      description: Gibt die Verwendungs- bzw. Qualitätsstufe der Gipsbinde an (z. B.
        Bastel-/Schülerbedarf oder Profiqualität).
    plaster_gauze_weave_density:
      name: Webdichte der Gipsbinde
      description: Beschreibt die relative Offenheit bzw. Dichte des Gewebes der Gipsbinde,
        was Festigkeit und Gipsaufnahme beeinflusst.
    plastic_canvas_finish:
      name: Finish des Kunststoff-Canvas
      description: Oberflächen- bzw. Finishbehandlung der Kunststoff-Canvasrolle.
    plastic_canvas_sheet_finish:
      name: Oberflächenart der Kunststoffleinwand
      description: Oberflächen- bzw. Randbehandlung der Kunststoffleinwand.
    plastic_canvas_transparency:
      name: Transparenz des Kunststoff-Canvas
      description: Gibt an, wie transparent bzw. undurchsichtig der Kunststoff-Canvas
        ist.
    plate_bottom_design:
      name: Design der Unterseite der Platte
      description: Beschreibt die Konstruktion der Unterseite der Platte, die Traktion,
        Stabilität und Sicherheit auf unterschiedlichen Spielflächen beeinflusst.
    plate_compatibility_standard:
      name: Handelscheibenstandard
      description: Gibt den Gewichtsscheibenstandard an, für den die Hantelstange
        ausgelegt ist (z. B. Olympic 50 mm oder Standard 25 mm).
    plate_installation_type:
      name: Montageart der Platte
      description: Gibt an, wie die Platte auf dem Spielfeld befestigt bzw. positioniert
        wird (z. B. im Boden verankert, mit Spikes oder auflegbar), damit Käufer:innen
        zwischen festen und mobilen Optionen wählen können.
    plate_size_category:
      name: Größenkategorie der Plate
      description: Klassifiziert die Platte nach Spielniveau bzw. Regelstandard, damit
        Käufer:innen schnell regelkonforme Ausrüstung finden können.
    play_dough_putty_kit_contents:
      name: Inhalt des Spielknete- und Knetmassen-Sets
      description: Nennt die wichtigsten enthaltenen Komponenten zusätzlich zur eigentlichen
        Knetmasse (z. B. Werkzeuge, Formen, Extruder oder Aufbewahrung).
    play_dough_tool_set_items_included:
      name: Enthaltene Teile des Spielknete-Werkzeugsets
      description: Nennt die Arten von Werkzeugen und Zubehörteilen, die im Spielknete-Werkzeugset
        enthalten sind (z. B. Rollen, Ausstecher oder Formen).
    play_environment_suitability:
      name: Eignung für Spielumgebungen
      description: Gibt die vorgesehene Spielumgebung für das Set an (z. B. Innenbereich,
        Außenbereich oder Wasser).
    play_food_features:
      name: Merkmale der Spiellebensmittel
      description: Besondere funktionale oder realistische Merkmale der Spiellebensmittel.
    play_food_items_included:
      name: Enthaltene Spiellebensmittel
      description: Gibt die Arten von Spiellebensmitteln an, die im Küchenspielset
        enthalten sind.
    play_food_size_scale:
      name: Größenmaßstab der Spiellebensmittel
      description: Gibt den ungefähren Größenmaßstab der Spiellebensmittel an, um
        die Kompatibilität mit Spielküchen, Puppen und Spielsets sicherzustellen.
    play_money_set_components_included:
      name: Im Spielgeldset enthaltene Komponenten
      description: Gibt an, welche Arten von Komponenten im Spielgeld-/Banking-Set
        enthalten sind.
    play_pattern:
      name: Spielmuster
      description: Gibt die hauptsächliche Verwendungsart des Spielzeugs an (z. B.
        Fidget-/Stressabbau-Spielzeug, Schreibtischskulptur/Kunstobjekt, Konstruktionsspielzeug
        oder Puzzle).
    play_sprinkler_mounting_type:
      name: Montageart des Wasserspiel-Sprengers
      description: Beschreibt, wie der Wasserspiel-Sprenger während der Nutzung positioniert
        bzw. befestigt wird.
    play_vehicle_lights_and_sounds:
      name: Fahrzeuglichter und -geräusche abspielen
      description: Gibt an, ob das Spielfahrzeug elektronische Effekte wie Lichter
        und/oder Geräusche enthält.
    play_vehicle_scale:
      name: Maßstab des Spielfahrzeugs
      description: Gibt den Maßstab des Spielfahrzeugs an (häufig bei Druckguss- und
        modellähnlichen Spielfahrzeugen verwendet).
    player_size_category:
      name: Altersklasse
      description: Definiert die vorgesehene Spielergröße bzw. Altersgruppe, für die
        das Catcher-Ausrüstungsset geeignet ist (z. B. Tee Ball, Jugend, Intermediate
        oder Erwachsene).
    player_size_range:
      name: Spielergrößenbereich
      description: Gibt den vorgesehenen Größenbereich für Gurt bzw. Unterstützung
        an (z. B. Kind, Erwachsene oder Universalgröße).
    playing_environment:
      name: Spielumgebung
      description: Gibt die hauptsächliche Spielfläche bzw. den Einsatzbereich an,
        für die bzw. den der Hockeyball ausgelegt ist.
    playing_method:
      name: Spielweise
      description: Beschreibt die hauptsächliche Art, wie das Instrument gespielt
        bzw. aktiviert wird.
    playing_surface_material:
      name: Spielflächenmaterial
      description: Gibt das Material der vorderen Spielfläche (Tapa) des Cajóns an,
        das Klang und Spielgefühl stark beeinflusst.
    playing_surface_type:
      name: Art der Spielfläche
      description: Beschreibt Aufbau bzw. Spielgefühl der Spielfläche des Übungspads.
    playset_activities_included:
      name: Enthaltene Spielset-Aktivitäten
      description: Nennt die wichtigsten Spielaktivitäten bzw. Komponenten, die in
        das Schaukel- bzw. Spielset integriert sind, damit Käufer:innen danach filtern
        können, was Kinder damit machen können.
    playset_installation_type:
      name: Montageart des Spielgeräts
      description: Gibt an, wie das Schaukel- bzw. Spielset installiert bzw. befestigt
        wird.
    playset_items_included:
      name: Im Spielset enthaltene Artikel
      description: Nennt die Arten von Rollenspielartikeln, die im Picknick-Spielset
        enthalten sind (Lebensmittel, Geschirr, Decke, Korb usw.).
    pliers_jaw_style:
      name: Art der Zangenbacken
      description: Beschreibt die hauptsächliche Backenkonfiguration bzw. Funktionsart
        der Zange.
    plum_variety:
      name: Pflaumensorte
      description: Gibt die konkrete Sorte bzw. Varietät der Pflaume an, damit Käufer:innen
        nach Geschmack, Farbe und kulinarischem Verwendungszweck auswählen können.
    plumcot_variety:
      name: Auswahl an Plumcots
      description: Gibt die konkrete Sorte bzw. Handelsvarietät der Plumcot an (z. B.
        Flavor King oder Dapple Dandy), was Geschmack, Farbe und Saisonabhängigkeit
        beeinflussen kann.
    plunger_mute_handle_type:
      name: Art des Griffs des Plunger-Dämpfers
      description: Gibt die Griff- bzw. Halteart an, mit der ein Plunger-Dämpfer für
        Wa-Wa-Effekte gehalten und bewegt wird.
    pocket_closure_type:
      name: Art des Taschenverschlusses
      description: Definiert, wie jede Tasche verschlossen wird, damit Nutzer:innen
        Hosen mit sicherer Aufbewahrung während der Aktivität finden können.
    pocket_knife_opening_mechanism:
      name: Öffnungsmechanismus des Taschenmessers
      description: Beschreibt, wie die Klinge geöffnet wird (manuelle Nagelkerbe,
        Daumenpin, Flipper, assisted opening, automatisch usw.).
    pocket_style:
      name: Taschenstil
      description: Gibt die hauptsächliche Taschenkonstruktion der Hose an.
    pocket_type:
      name: Taschenart
      description: Gibt die Art bzw. das Vorhandensein von Taschen am Kleidungsstück
        an.
    pod_retention_system:
      name: Pod-Haltesystem
      description: Beschreibt, wie Paintball-Pods im Gurt bzw. Pack gehalten und daraus
        entnommen werden.
    pogo_stick_footrest_type:
      name: Art der Fußstütze des Pogo-Sticks
      description: Beschreibt die Konstruktion der Fußplattform bzw. Fußstifte zum
        Stehen auf dem Pogo-Stick.
    pogo_stick_suspension_type:
      name: Art der Federung des Pogo-Sticks
      description: Gibt den Rückfederungsmechanismus des Pogo-Sticks an, der Spielgefühl,
        Haltbarkeit und Wartungsaufwand beeinflusst.
    poi_handle_type:
      name: Haltgriff des Poi
      description: Gibt die Art von Griff bzw. Befestigung an, mit der die Poi gehalten
        werden.
    poi_light_source:
      name: Lichtquelle der Poi
      description: Gibt bei beleuchteten Poi die verwendete Lichttechnologie an.
    poi_tether_type:
      name: Art der Poi-Verbindung
      description: Kennzeichnet die Art der Verbindung zwischen Poi-Kopf und Griff,
        Knauf oder Handgelenkschlaufe (z. B. Schnur, Seil oder Kette).
    poi_type:
      name: Art der Poi
      description: Gibt die hauptsächliche Bauart bzw. Verwendungsart der Poi an (z. B.
        Übungs-, LED- oder Feuer-Poi).
    point_type:
      name: Art der Spitze
      description: Form bzw. Ausführung der Spitze der Sticknadel.
    pointe_shoe_shank_length:
      name: Länge der Spitzenschuhinnensohle
      description: Abschnitt der Schuhlänge, der vom Schaft unterstützt wird, z. B.
        volle Länge oder 3/4-Länge.
    pointe_shoe_shank_strength:
      name: Stärke des Spitzenschuhschafts
      description: Steifigkeitsgrad des Schafts eines Spitzenschuhs, der Unterstützung
        und Eintragezeit beeinflusst.
    poker_accessory_storage_included:
      name: Enthaltener Stauraum für Pokerzubehör
      description: Gibt an, für welche zusätzlichen Pokerartikel das Zubehör speziellen
        Stauraum bietet.
    poker_chip_tray_rack_configuration:
      name: Konfiguration des Pokerchip-Trays/-Racks
      description: Beschreibt die interne Organisationsstruktur des Chip-Trays bzw.
        -Racks (Reihen und Kapazität pro Reihe).
    pole_anchoring_method:
      name: Stangensockelbefestigung
      description: Definiert, wie der Pfosten im Boden bzw. auf der Spielfläche befestigt
        wird.
    pole_basket_type:
      name: Stangentellerart
      description: Klassifiziert Art bzw. Größe des Korbs am Ende des Skistocks und
        gibt damit die vorgesehenen Schneebedingungen an.
    pole_connection_system:
      name: Verbindungssystem der Stangen
      description: Kennzeichnet den Mechanismus, der die Stangensegmente verbindet,
        z. B. Gummiseil-, Gewinde- oder Nabensysteme, und hilft Nutzer:innen bei der
        Einschätzung von Aufbaugeschwindigkeit und Kompatibilität.
    pole_system_type:
      name: Stangensystemart
      description: Beschreibt das strukturelle Stützsystem bzw. die Aufbauweise des
        Zelts (z. B. Aluminiumstangen, aufblasbare Luftschläuche oder Aufbau mit Trekkingstöcken).
    police_equipment_fitment:
      name: Kompatibilität mit Polizeiausrüstung
      description: Gibt an, für welche Polizeiausrüstung das Fahrzeug ausgelegt bzw.
        vorverkabelt ist.
    police_vehicle_equipment_package:
      name: Ausstattungspaket für Polizeifahrzeuge
      description: Kennzeichnet die polizeispezifische Ausstattung bzw. den Umbau,
        die bzw. der im Lieferumfang des Fahrzeugs enthalten ist.
    police_vehicle_light_siren_equipment:
      name: Licht-/Sirenenausstattung des Polizeifahrzeugs
      description: Gibt an, welche Warn- bzw. Signaleinrichtungen im Polizeifahrzeug
        installiert sind.
    police_vehicle_upfit_level:
      name: Ausstattungsgrad des Polizeifahrzeugs
      description: Beschreibt, welche polizeispezifische Ausstattung bzw. Umbauten
        am Fahrzeug installiert sind.
    polish_formulation:
      name: Formulierung der Politur
      description: Gibt die Grundformulierung bzw. chemische Zusammensetzung der Griffbrettpolitur
        an (nicht die Anwendungsmethode).
    polish_purpose:
      name: Verwendungszweck der Politur
      description: Hauptzweck bzw. gewünschtes Ergebnis der Politur auf der Instrumentenoberfläche.
    pollen_level:
      name: Pollenmenge
      description: Gibt Menge bzw. Wahrscheinlichkeit von Pollenflecken der jeweiligen
        Liliensorte an.
    polymer_clay_firmness_level:
      name: Festigkeitsgrad der Polymerknete
      description: Relative Festigkeit bzw. Weichheit der Polymerknete vor dem Backen
        (Verarbeitbarkeit).
    polymer_clay_translucency:
      name: Transparenz der Polymerknete
      description: Visuelle Deckkraft bzw. Transparenz der Polymerknete nach dem Aushärten.
    pom_pom_handle_style:
      name: Tanzwedelgriffart
      description: Beschreibt Art bzw. Konstruktion des Griffs zum Halten des Pompons.
    pom_pom_trim_backing_tape_material:
      name: Material des Trägerbands der Pompon-Borte
      description: Kennzeichnet das Material des angenähten Bands bzw. Geflechts,
        an dem die Pompons befestigt sind (die Basis der Borte).
    pom_pom_type:
      name: Art des Pompons
      description: Gibt Vorhandensein und konkrete Art des Pompons bzw. Bommels an
        der Mütze an.
    pomegranate_product_form:
      name: Produktform des Granatapfels
      description: Beschreibt die angebotene Form (ganze Frucht, geschälte Kerne,
        Kerne oder gefrorene Kerne).
    pomegranate_variety:
      name: Granatapfelsorte
      description: Kennzeichnet die konkrete Sorte bzw. Varietät des Granatapfels
        (z. B. Wonderful, Bhagwa oder Kandhari).
    ponytail_holder_style:
      name: Art des Pferdeschwanzhalters
      description: Beschreibt die konkrete Bauart bzw. Form des Pferdeschwanzhalters,
        damit Käufer:innen ihren bevorzugten Stil auswählen können.
    popcorn_form:
      name: Form des Popcorns
      description: Gibt die Form bzw. Zubereitungsart des Popcornprodukts an, z. B.
        verzehrfertig, Körner, Mikrowellenpackung, Gewürzset oder Geschenkdose.
    pork_rind_form:
      name: Form der Schweineschwarte
      description: Kategorisiert die Form bzw. Art von Schweineschwarten-Snacks (z. B.
        Schwarte, Crackling, Puff oder Pellet).
    portability_features:
      name: Tragefunktionen
      description: Listet integrierte Elemente auf, die Transport, Tragen oder Verstauen
        der Liege erleichtern.
    portability_frame_type:
      name: Tragbarkeit/Rahmentyp
      description: Gibt an, ob die Orchesterglocken tragbar auf einem mobilen Gestell
        oder fest auf einem Konzertgestell montiert sind.
    portable_electronic_game_features:
      name: Funktionen tragbarer elektronischer Spiele
      description: Wichtige Gameplay- bzw. Hardwarefunktionen, die vom Gerät unterstützt
        werden.
    post_surgery_stage_suitability:
      name: Eignung für postoperative Phasen
      description: Gibt an, für welche Genesungsphase (falls zutreffend) der Bodysuit
        ausgelegt ist, was für Käufer:innen medizinischer Shapewear wichtig ist.
    postage_stamp_format:
      name: Format der Briefmarke
      description: Gibt an, wie die Dauermarke angeboten bzw. verpackt wird (Einzelmarke,
        Paar, Streifen, Block, Bogen, Heftchenbogen, Rolle usw.).
    postmark_type:
      name: Art des Poststempels
      description: Art der Entwertung bzw. des Poststempels auf gebrauchten Dauermarken.
    potato_cut_style:
      name: Schnittart der Kartoffeln
      description: Gibt die Schnitt- bzw. Zubereitungsart der Kartoffeln an, wenn
        sie nicht als ganze Kartoffeln verkauft werden.
    potato_intended_use:
      name: Vorgesehene Verwendung der Kartoffeln
      description: Unterscheidet Kartoffeln zum direkten Verzehr von Saatkartoffeln
        oder tiefgekühlten Verarbeitungsprodukten.
    potato_variety:
      name: Kartoffelsorte
      description: Gibt die Sorte bzw. Varietät der Kartoffeln an, damit Käufer:innen
        bestimmte Arten wie „Yukon Gold“, „Maris Piper“ oder „Purple Majesty“ finden
        können.
    pottery_clay_firing_required:
      name: Brennen des Töpfertons erforderlich
      description: Gibt an, ob das Material gebrannt werden muss, um die vorgesehene
        Endhärte bzw. Oberflächenbeschaffenheit zu erreichen.
    pottery_slip_application_method:
      name: Anwendungsmethode des Töpferschlickers
      description: Gibt die vorgesehene Anwendungstechnik für den Schlicker an.
    pottery_slip_compatible_clay_body:
      name: Mit dem Töpferschlicker kompatible Tonmasse
      description: Gibt die Tonmassenart(en) an, für die der Schlicker ausgelegt bzw.
        mit denen er kompatibel ist.
    pottery_slip_form:
      name: Form des Töpferschlickers
      description: Gibt an, ob der Schlicker als gebrauchsfertige Flüssigkeit oder
        als Trockenmischung/Pulver zum Anmischen verkauft wird.
    pouch_design:
      name: Design des Beutels
      description: Beschreibt die Konstruktions- bzw. Ausstattungsmerkmale des vorderen
        Beutelbereichs.
    pouch_style:
      name: Stil des Beutels
      description: Gibt die Gestaltung des vorderen Beutelbereichs an und berücksichtigt
        Komfort, Unterstützung und ästhetische Vorlieben.
    powdered_beverage_variety:
      name: Auswahl an Getränkepulver
      description: Klassifiziert das Produkt nach der Art des Getränks, das damit
        zubereitet wird (z. B. Limonade, Sportgetränk oder Proteinshake).
    power_rack_style:
      name: Art des Power Racks
      description: Gibt die allgemeine Bauart bzw. Konfiguration des Racks an und
        hilft Käufer:innen dabei, zwischen Full Cages, Half Racks und platzsparenden
        Varianten zu unterscheiden.
    power_steering_fluid_formulation:
      name: Formulierung der Servolenkungsflüssigkeit
      description: Die allgemeine Formulierung der Flüssigkeit (ATF-basiert, spezielle
        Hydraulik-/CHF-Flüssigkeit oder universell), verwendet zur groben Kompatibilitätsfilterung.
    practice_mute_audio_output:
      name: Audioausgang des Übungsdämpfers
      description: Gibt die Art des Audioausgangsanschlusses am Übungsdämpfer für
        Monitoring und/oder Aufnahme an (üblich bei geräuscharmen bzw. elektronischen
        Übungsdämpfern).
    practice_mute_intonation_impact:
      name: Einfluss des Übungsdämpfers auf die Intonation
      description: Beschreibt die zu erwartende Wirkung des Übungsdämpfers auf Stimmung
        bzw. Intonation.
    practice_mute_venting_valve_type:
      name: Art der Belüftung bzw. des Ventils des Übungsdämpfers
      description: Gibt an, ob und wie der Übungsdämpfer belüftet ist bzw. ein verstellbares
        Ventil zur Änderung von Widerstand oder Lautstärke besitzt.
    practice_pad_features:
      name: Funktionen des Übungspads
      description: Hebt funktionale Merkmale des Übungspads zusätzlich zu Größe und
        Material hervor.
    practice_pad_mounting_style:
      name: Montageart des Übungspads
      description: Gibt an, wie das Übungspad während der Nutzung positioniert bzw.
        befestigt werden soll.
    practice_pad_rebound_level:
      name: Rückprallniveau des Übungspads
      description: Gibt den relativen Rückprall bzw. die Reaktion des Übungspads im
        Vergleich zu typischen Schlagzeugfellen an.
    practice_pad_surface_configuration:
      name: Konfiguration der Übungspad-Oberfläche
      description: Beschreibt, ob das Pad eine oder mehrere Spielflächen besitzt und
        ob sich diese im Spielgefühl unterscheiden.
    pregnancy_stage_suitability:
      name: Eignung für Schwangerschaftsphasen
      description: Gibt an, für welche Schwangerschafts- bzw. Wochenbettphase(n) das
        Kleidungsstück ausgelegt ist.
    preparation_state:
      name: Zubereitungszustand
      description: Gibt den erforderlichen Vorbereitungs- bzw. Gargrad vor dem Verzehr
        an.
    preparation_style:
      name: Zubereitungsart
      description: Definiert den Schnitt- bzw. Verarbeitungszustand der Wasserkastanien
        beim Verkauf (z. B. ganz, geschnitten, geröstet oder gefroren).
    preservation_medium:
      name: Konservierungsmedium
      description: Gibt die hauptsächliche Flüssigkeit bzw. das Medium an, in dem
        die Oliven oder Kapern konserviert werden (z. B. Salzlake, Olivenöl oder Essig).
    presser_foot_attachment_method:
      name: Befestigungsart des Nähfußes
      description: Gibt an, wie der Nähmaschinenfuß am Nähfußhalter/-schaft befestigt
        wird (z. B. Snap-on- oder Schraubbefestigung), was die Kompatibilität beeinflusst.
    pressure_gauge_type:
      name: Art des Manometers
      description: Gibt an, welche Art von Manometer gegebenenfalls in der Fahrradpumpe
        enthalten ist.
    pressure_measurement_unit:
      name: Druckmesseinheit
      description: Gibt die Einheit an, die für die Messung bzw. Kalibrierung des
        Drucksensors verwendet wird, was für den Produktvergleich und die Sicherstellung
        der Kompatibilität von Messgerät und Steuergerät nützlich ist.
    pressure_plate_balance_type:
      name: Auswuchtungsart der Druckplatte
      description: Gibt an, ob die Druckplatte intern ausgewuchtet ist oder eine externe
        Auswuchtung passend zur Motor-/Schwungradkonfiguration benötigt bzw. voraussetzt.
    pressure_plate_components_included:
      name: Enthaltene Komponenten der Druckplatte
      description: Gibt an, was im Angebot der Druckplatte enthalten ist.
    pressure_sensor_application:
      name: Verwendungszweck des Drucksensors
      description: Gibt das Fahrzeugsystem bzw. den Messpunkt an, für den der Drucksensor
        ausgelegt ist.
    pressure_sensor_port_thread_standard:
      name: Anschluss-/Gewindestandard des Drucksensors
      description: Gibt den mechanischen Anschluss- bzw. Gewindestandard an, der für
        den Einbau des Sensors in das Fahrzeugsystem verwendet wird.
    pressurization_method:
      name: Druckbeaufschlagungsmethode
      description: Beschreibt, wie der Druck im Inneren des Geräts erzeugt bzw. aufrechterhalten
        wird.
    pretend_housekeeping_set_items_included:
      name: Enthaltene Teile des Haushalts-Rollenspielsets
      description: Listet die im Set enthaltenen Haushaltsutensilien auf (z. B. Mopp,
        Besen, Kehrschaufel oder Sprühflasche).
    pretend_play_electronic_features:
      name: Elektronische Rollenspielfunktionen
      description: Elektronische bzw. interaktive Funktionen, die im Rollenspielprodukt
        enthalten sind.
    pretend_play_set_pieces_included:
      name: Enthaltene Teile des Rollenspielsets
      description: Wichtige Requisiten bzw. Komponenten, die im Rollenspielset enthalten
        sind (z. B. Kasse, Spiellebensmittel oder Werkzeuge).
    pretend_play_set_theme:
      name: Thema des Rollenspielsets
      description: Das hauptsächliche Rollenspielszenario bzw. Thema, das durch das
        Produkt dargestellt wird (nützlich für übergreifende Entdeckungen innerhalb
        aller Rollenspiel-Unterkategorien).
    pretzel_coating:
      name: Brezelüberzug
      description: Kennzeichnet sämtliche äußeren Würzungen bzw. Überzüge der Brezel,
        einschließlich herzhafter (gesalzen, gewürzt) und süßer Varianten (Schokolade,
        Joghurt, Karamell).
    pretzel_shape:
      name: Brezelform
      description: Gibt die physische Form der Brezel an (z. B. gedreht, Stange oder
        Bissen), ein wichtiges Unterscheidungsmerkmal bei Suche und Filterung.
    primary_component_material:
      name: Material der Hauptkomponente
      description: Hauptmaterial des Motorblocks.
    primary_dish_application:
      name: Hauptverwendungszweck des Gerichts
      description: Gibt das Hauptgericht bzw. die Zubereitung an, für das bzw. die
        der Teig vorgesehen ist.
    primary_plant_base:
      name: Hauptpflanzenbasis
      description: Gibt die hauptsächliche(n) nicht-milchbasierte(n) Zutat(en) an,
        die für die Herstellung der Käsealternative verwendet werden.
    primary_plant_protein_source:
      name: Hauptquelle pflanzlichen Proteins
      description: Gibt die hauptsächliche pflanzliche Zutat an, die das Protein im
        Produkt liefert.
    primary_sweetener_source:
      name: Hauptquelle des Süßungsmittels
      description: Gibt die Pflanze bzw. den Rohstoff an, aus dem der Sirup gewonnen
        wird.
    print_placement:
      name: Aufdrucksplatzierung
      description: Gibt an, wo die Hauptgrafik bzw. das Hauptlogo auf dem T-Shirt
        platziert ist.
    print_technique:
      name: Drucktechnik
      description: Gibt die Dekorations- bzw. Druckmethode an, die für die Grafik
        auf dem T-Shirt verwendet wurde.
    printable_canvas_intended_use:
      name: Verwendungszweck der bedruckbaren Leinwand
      description: Hauptanwendung, für die die bedruckbare Leinwand optimiert ist.
    printable_fabric_format:
      name: Format des bedruckbaren Stoffes
      description: Gibt an, wie die bedruckbare Baumwolle geliefert wird (Einzelblätter
        oder Endlosrolle), was Druckereinzug und Projektablauf beeinflusst.
    prism_material:
      name: Material des Prismas
      description: Gibt das Material des optischen Elements selbst (des Prismas) an,
        das Klarheit, Haltbarkeit und Kratzfestigkeit beeinflusst.
    prisoner_transport_configuration:
      name: Konfiguration für den Gefangenentransport
      description: Gibt an, ob und wie der Transporter für den Gefangenen- bzw. Häftlingstransport
        konfiguriert ist.
    prisoner_transport_partition_type:
      name: Art der Trennwand für den Gefangenentransport
      description: Art der Trennwand bzw. des Käfigs im Innenraum, die bzw. der Vorder-
        und Hinterbereich trennt.
    privacy_or_acoustic_feature:
      name: Sichtschutz- oder Akustikmerkmal
      description: Gibt integrierte Sichtschutz- bzw. Akustikelemente an, z. B. Trennwände,
        Akustikpaneele oder vollständige Einhausungen.
    processing_state:
      name: Verarbeitungszustand
      description: Gibt an, ob die Federn sterilisiert, gewaschen oder anderweitig
        für Bastelzwecke vorbereitet wurden.
    produce_grade:
      name: Qualitätsstufe des Produkts
      description: Klassifiziert die Qualitätsstufe der Kiwi anhand von Größe, Aussehen
        und Zustand.
    produce_growth_stage:
      name: Wachstumsstadium des Produkts
      description: Gibt das Wachstumsstadium an, in dem das Produkt verkauft wird
        (z. B. Microgreen, Baby Leaf, ausgewachsenes Blatt, lebende Pflanze oder Samen).
    produce_washing_state:
      name: Waschzustand des Produkts
      description: Gibt an, ob das Blattgemüse gewaschen und verzehrfertig ist.
    profile_shape:
      name: Profil/Form
      description: Gesamtkrümmung bzw. Profil des Beckens (wie stark es vom Rand zur
        Glocke ansteigt).
    projectile_ammunition_type:
      name: Projektil-/Munitionstyp
      description: Gibt gegebenenfalls die Art der Projektile bzw. Verbrauchsmaterialien
        an, die von der Spielzeugwaffe verwendet werden.
    projectile_finish:
      name: Projektiloberfläche
      description: Gibt die Oberflächenbeschichtung des BBs an, die Korrosionsschutz
        oder Sichtbarkeit verbessert (z. B. kupferbeschichtet, verzinkt oder lackiert).
    projectile_type:
      name: Projektiltyp
      description: Gibt an, welche Art von Projektil das Produkt verwendet bzw. wofür
        es vorgesehen ist.
    pronation_support:
      name: Pronationsunterstützung
      description: Gibt an, für welche Gang- bzw. Pronationsart der Sneaker ausgelegt
        ist.
    propellant_type:
      name: Art des Treibmittels
      description: Gibt das Treibmittel an, für dessen Verwendung das Teil bzw. Zubehör
        ausgelegt ist.
    propeller_blade_cup:
      name: Wölbung des Propellerblatts
      description: Gibt den Grad der Wölbung (Krümmung der Hinterkante) der Blätter
        an.
    propeller_hub_type:
      name: Art der Propellernabe
      description: Gibt das vom Propeller verwendete Naben- bzw. Buchsensystem an
        (austauschbare Nabensysteme oder eingepresste Varianten).
    propeller_rotation:
      name: Drehrichtung des Propellers
      description: Gibt die Drehrichtung des Propellers an.
    protectant_formula_base:
      name: Basisformulierung des Schutzmittels
      description: Gibt die Basisformulierung des Schutzmittels an, die Glanz, Haptik
        und Reinigung beeinflusst (z. B. wasser- oder lösemittelbasiert).
    protection_coverage_area:
      name: Schutzabdeckungsbereich
      description: Gibt an, welche Teile der Uhr durch das Schutzzubehör abgedeckt
        werden.
    protection_level:
      name: Schutzstufe
      description: Gibt den vorgesehenen Schutzgrad des Koffers für Transport und
        Lagerung des Instruments an.
    protective_case_interior_protection_type:
      name: Art des Innenschutzes des Schutzkoffers
      description: Beschreibt die hauptsächliche Innenpolsterung bzw. Schutzmethode
        zur Sicherung und Polsterung des Inhalts.
    protective_case_shell_type:
      name: Art der Schutzkofferschale
      description: Kennzeichnet die allgemeine Bauart der Außenschale des Koffers
        (Steifigkeit), die Schutz vor Druckbelastung und Tragbarkeit beeinflusst.
    protective_contact_padding_material:
      name: Material der Schutzpolsterung an Kontaktstellen
      description: Material, das an den Kontaktstellen des Instruments (Joch-/Schallbechereinsatz)
        verwendet wird, um Kratzer zu vermeiden (z. B. Filz oder Gummi).
    protective_cup_configuration:
      name: Konfiguration des Schutzbechers
      description: Gibt an, ob ein Schutzbecher enthalten bzw. herausnehmbar ist oder
        ob das Kleidungsstück lediglich über eine Tasche zur Aufnahme eines Schutzbechers
        verfügt.
    protective_eyewear_standard_compliance:
      name: Einhaltung von Schutzbrillenstandards
      description: Gibt die Sicherheits- bzw. Schlagfestigkeitsstandards oder Zertifizierungen
        an, die die Schutzbrille für den Sporteinsatz erfüllt oder übertrifft.
    protective_gear_certification_standard:
      name: Zertifizierungsstandard für Schutzausrüstung
      description: Gibt den Sicherheits- bzw. Zertifizierungsstandard an, den die
        Ausrüstung erfüllt (je nach Artikeltyp unterschiedlich, z. B. Helmnormen,
        Anzugnormen oder Normen für Aufprallschutz).
    protective_gear_items_included:
      name: Enthaltene Teile der Schutzausrüstung
      description: Listet die einzelnen Bestandteile eines mehrteiligen Schutzausrüstungssets
        auf.
    protective_gear_padding_type:
      name: Art der Polsterung der Schutzausrüstung
      description: Gibt die Art der Polsterung an, die in der Schutzausrüstung zum
        Aufprallschutz verwendet wird.
    protective_gear_safety_certifications:
      name: Sicherheitszertifizierungen der Schutzausrüstung
      description: Listet anerkannte sportspezifische Sicherheits- bzw. Leistungsstandards
        auf, die vom Produkt erfüllt werden, z. B. NOCSAE- oder ASTM-Normen für Feldhockeyhelme.
    protective_pad_components_included:
      name: Enthaltene Komponenten der Schutzpolsterung
      description: Gibt an, welche konkreten Schutzelemente in einem mehrteiligen
        Set enthalten sind, damit Käufer:innen genau wissen, welche Körperbereiche
        geschützt werden.
    protective_shorts_intended_use:
      name: Vorgesehene Verwendung der Schutzshorts
      description: Gibt die hauptsächliche Fahr- bzw. Renndisziplin an, für die die
        Schutzshorts ausgelegt sind.
    protective_shorts_padding_type:
      name: Polsterungsart der Protektorenshort
      description: Gibt die Bauart bzw. Ausführung der in den Shorts verwendeten Schutzelemente
        an.
    protective_shorts_padding_zones:
      name: Position der Polsterung an der Protektorenshort
      description: Kennzeichnet die Körperbereiche der Schutzshorts mit integrierter
        Polsterung bzw. Protektoren.
    protective_treatment:
      name: Schutzbehandlung
      description: Gibt Schutzbeschichtungen bzw. -behandlungen an, die Flecken-,
        Wasser- oder UV-Beständigkeit bieten (z. B. Teflon).
    protector_coverage_area:
      name: Abdeckungsbereich der Schutzausrüstung
      description: Gibt an, welche Rumpfbereiche der Protektor abdecken soll (z. B.
        Brust, Rücken oder Seiten).
    puck_bottom_style:
      name: Art der Puck-Unterseite
      description: Beschreibt das Profil der Unterseite des Pucks, das Geschwindigkeit
        und Kontrolle auf verschiedenen Shuffleboard-Oberflächen beeinflusst.
    puck_type:
      name: Art des Pucks
      description: Klassifiziert die funktionale Bauart bzw. den Verwendungszweck
        des Hockeypucks, vom offiziellen Spielbetrieb bis hin zum Sammlerstück.
    pull_buoy_style:
      name: Art des Pull Buoys
      description: Gibt die funktionale Bauart bzw. Konfiguration des Pull Buoys an,
        z. B. Standard-, Knöchel- oder Pullkick-Kombination.
    pull_through_weight_material:
      name: Material des Durchzugsgewichts
      description: Gibt bei Durchziehwischern das Material des Gewichts an, mit dem
        der Wischer durch das Instrument geführt wird.
    pulp_content:
      name: Fruchtfleischgehalt
      description: Gibt die Menge an Frucht- bzw. Gemüsefruchtfleisch im Getränk an.
    pump_accessories_included:
      name: Enthaltenes Pumpenzubehör
      description: Listet zusätzliche Artikel auf, die mit der Ballpumpe geliefert
        werden, damit Käufer:innen den Inhalt des Sets nachvollziehen können.
    pumping_compatibility:
      name: Kompatibilität zum Abpumpen
      description: Gibt an, ob der Still-BH sowohl zum freihändigen Abpumpen als auch
        zum Stillen geeignet ist.
    punch_pad_type:
      name: Art des Schlagpolsters
      description: Gibt die Bauart bzw. Ausführung eines Schlag- bzw. Trainingspolsters
        an, damit Käufer:innen das passende Modell für ihre Trainingsbedürfnisse auswählen
        können.
    punching_training_bag_shape:
      name: Form des Box- bzw. Trainingssacks
      description: Gibt die geometrische Form des Boxsacks an und hilft Käufer:innen
        bei der Auswahl von Modellen für bestimmte Schlagübungen (z. B. Uppercuts
        oder Körpertreffer).
    puncture_protection_technology:
      name: Pannenschutztechnologie
      description: Listet proprietäre oder allgemeine Pannenschutzschichten bzw. Seitenwand-/Karkassenverstärkungen
        auf, die im Reifen integriert sind (z. B. EXO, SnakeSkin oder Kevlar-Gürtel).
    puppet_features:
      name: Puppenmerkmale
      description: Hebt funktionale bzw. besondere Merkmale der Puppe hervor (z. B.
        beweglicher Mund, Soundeffekte oder Wendefunktion).
    puppet_puppet_theater_accessory_type:
      name: Art des Zubehörs für Puppen & Puppentheater
      description: Gibt an, um welche Art von Zubehör es sich handelt (z. B. Bühnenrequisite,
        Puppenkostüm, Steuerstange oder Ersatzschnur).
    purity_unit:
      name: Einheit des Reinheitsgrads
      description: Gibt an, wie der Reinheitsgrad der Münze angegeben wird (Feingehalt
        oder Karat).
    push_up_bar_design:
      name: Bauart der Liegestützgriffe
      description: Gibt die funktionale Bauart der Liegestützgriffe an (z. B. fest,
        drehbar oder Parallettes).
    pushrod_end_type:
      name: Art des Schubstangenendes
      description: Gibt die Bauart des Schubstangenendes bzw. Befestigungselements
        an, das an der Schnittstelle zum Pedal oder Hauptbremszylinder verwendet wird.
    putty_glow_activation_method:
      name: Aktivierungsmethode des Leuchteffekts der Knete
      description: Gibt an, wie die Knete zum Leuchten aufgeladen bzw. aktiviert wird
        (z. B. Sonnenlicht oder UV-/Schwarzlicht).
    putty_glow_color:
      name: Leuchtfarbe der Knete
      description: Gibt die Farbe an, die die Knete im Dunkeln beim Leuchten abgibt.
    putty_inclusions:
      name: Bestandteile der Knete
      description: Gibt besondere Bestandteile der Knete an (z. B. Glitzer, Konfetti
        oder Schaumstoffperlen).
    putty_texture:
      name: Textur der Knete
      description: Beschreibt das hauptsächliche Verhalten der Knete beim Spielen
        bzw. Verformen (z. B. elastisch, dehnbar oder flüssigkeitsähnlich).
    puzzle_accessory_features:
      name: Funktionen des Puzzlezubehörs
      description: Funktionale Merkmale und Designelemente von Puzzlezubehör (je nach
        Zubehörtyp unterschiedlich).
    pyrometric_cone_range:
      name: Pyrometrischer Kegelbereich
      description: Gibt die empfohlenen pyrometrischen Kegel an, für die die Glasur
        formuliert ist (z. B. Kegel 06–04 oder Kegel 5–6).
    quarter_panel_coverage_type:
      name: Abdeckungsart des Seitenwandbereichs
      description: Gibt an, wie viel des Seitenwandbereichs durch das Produkt ersetzt
        bzw. repariert wird.
    quarter_panel_set_contents:
      name: Inhalt des Seitenwandbereich-Sets
      description: Gibt die im Angebot enthaltene Konfiguration des Seitenwandbereich-Sets
        an (einzelne Seite, Paar oder mit zusätzlichen Reparaturabschnitten).
    quilting_ruler_markings:
      name: Markierungen des Quiltlineals
      description: Gibt die Arten der aufgedruckten Markierungen auf dem Quiltlineal
        an, die zum Schneiden bzw. Ausrichten verwendet werden.
    quilting_ruler_non_slip_feature:
      name: Rutschhemmende Eigenschaft des Quiltlineals
      description: Gibt an, ob das Lineal über eine rutschhemmende Rückseite bzw.
        Oberflächenbehandlung verfügt, um ein Verrutschen auf Stoff zu verhindern.
    quilting_ruler_transparency:
      name: Transparenz des Quiltlineals
      description: Gibt die Transparenz bzw. Sichtbarkeit des Linealmaterials an,
        damit Stoff und Markierungen darunter sichtbar bleiben.
    quilting_thread_usage:
      name: Verwendungszweck des Quiltgarns
      description: Gibt den vorgesehenen Verwendungszweck des Quiltgarns an (wie es
        eingesetzt werden soll).
    quilting_thread_weight_system:
      name: Gewichtssystem des Quiltgarns
      description: Gibt das Größen- bzw. Gewichtssystem des Garns an, mit dem die
        Garnstärke beschrieben wird (z. B. wt, Tex oder Denier), damit die numerische
        Größe korrekt interpretiert werden kann.
    quince_variety:
      name: Auswahl an Quitten
      description: Gibt die konkrete Sorte bzw. Varietät der Quitte an, da sich Geschmack,
        Aroma und kulinarische Eignung je nach Sorte unterscheiden können.
    quinoa_variety:
      name: Quinoa-Sorte
      description: Gibt die konkrete Farbe bzw. Sorte des Quinoas an, da verschiedene
        Sorten unterschiedliche Geschmacksrichtungen, Texturen und Kochzeiten aufweisen.
    quinto_tuning_system:
      name: Quinto-Stimmsystem
      description: Beschreibt, wie die Quinto gestimmt bzw. gespannt wird.
    race_car_class:
      name: Rennwagenklasse
      description: Gibt die Wettbewerbsklasse bzw. Kategorie an, für die das Fahrzeug
        gebaut wurde (Regelwerk-/Homologationsgruppe).
    racing_balaclava_face_opening_style:
      name: Art der Gesichtsöffnung der Renn-Sturmhaube
      description: Beschreibt die Form der Gesichtsöffnung der Sturmhaube, die Passform,
        Abdichtung und Tragekomfort des Helms beeinflusst.
    racing_balaclava_neck_coverage_length:
      name: Länge der Halsabdeckung der Renn-Sturmhaube
      description: Beschreibt die Länge der Halsabdeckung, die zum Abdichten und Schützen
        in den Anzug bzw. die Nackenstütze gesteckt wird.
    racing_balaclava_ventilation_zones:
      name: Belüftungszonen der Rennsturmhaube
      description: Gibt die Platzierung atmungsaktiver Netz- bzw. Belüftungszonen
        zur Verbesserung der Luftzirkulation unter dem Helm an.
    racing_chest_guard_intended_use:
      name: Vorgesehene Verwendung des Rennbrustschutzes
      description: Gibt die primäre Motorsportdisziplin bzw. den Einsatzbereich an,
        für den der Brustschutz ausgelegt ist.
    racing_chest_guard_size_type:
      name: Größenart des Rennbrustschutzes
      description: Gibt an, ob das Produkt für Kinder/Jugendliche, Erwachsene oder
        universell/verstellbar ausgelegt ist.
    racing_glove_certification_standard:
      name: Zertifizierungsstandard der Rennhandschuhe
      description: Gibt die Sicherheitszertifizierung bzw. den Sicherheitsstandard
        an, dem die Rennhandschuhe entsprechen (z. B. FIA, SFI, CE), sowie gegebenenfalls
        die Einstufung bzw. Klasse.
    racing_goggles_lens_system:
      name: Linsensystem der Rennbrille
      description: Gibt das von der Brille unterstützte System zum Linsenwechsel bzw.
        Tear-off-System an.
    racing_helmet_certification_standard:
      name: Zertifizierungsstandard der Rennhelme
      description: Gibt die Sicherheitszertifizierung(en) an, die der Rennhelm erfüllt.
    racing_kart_brake_type:
      name: Bremstyp des Rennkarts
      description: Gibt den primären Bremssystemtyp des Karts an.
    racing_kart_class:
      name: Rennkartklasse
      description: Gibt die Wettbewerbsklasse bzw. das Regelwerk an, nach dem das
        Kart gebaut wurde.
    racing_kart_frame_material:
      name: Rahmenmaterial des Rennkarts
      description: Gibt das Hauptmaterial des Kart-Rahmens bzw. Chassis an.
    racing_kart_seat_size:
      name: Sitzgröße des Rennkarts
      description: Gibt die Größenbezeichnung des Kartsitzes zur Bestimmung der Passform
        an.
    racing_neck_support_style:
      name: Bauart der Rennnackenstütze
      description: Beschreibt die Bauart der Rennnackenstütze bzw. -orthese und wie
        sie mit Oberkörper bzw. Helm der fahrenden Person verbunden wird.
    racing_suit_certification_standard:
      name: Zertifizierungsstandard der Rennhandschuhe
      description: Gibt die Rennsport-Sicherheitszertifizierung bzw. Homologation
        an, die der Anzug erfüllt (z. B. FIA- oder SFI-Standards).
    racing_suit_cuff_design:
      name: Manschettendesign des Rennanzugs
      description: Gibt die Art der Knöchel- bzw. Handgelenkmanschette an, die mit
        Handschuhen bzw. Stiefeln kombiniert wird, um Abdichtung und Komfort zu verbessern.
    racing_suit_size_system:
      name: Zertifizierungsstandard des Rennanzugs
      description: Gibt das für den Anzug verwendete Größensystem an (z. B. Alpha
        S–XXL, numerisch EU/US, Kinder/Jugendliche).
    racing_truck_discipline:
      name: Renntruck-Disziplin
      description: Gibt die primäre Renndisziplin bzw. das Rennformat an, für das
        der Truck gebaut wurde.
    rack_side_configuration:
      name: Seitenkonfiguration des Regals
      description: Gibt an, ob das Rack Matten einseitig oder beidseitig lagert, was
        sich auf Platzeffizienz und Zugriff auswirkt.
    rack_system_configuration:
      name: Regal-Systemkonfiguration
      description: Beschreibt das allgemeine Layout bzw. die Form des Drum-Rack-Systems.
    racket_dampener_type:
      name: Schlägerdämpfertyp
      description: Gibt den Befestigungsmechanismus bzw. die Funktionsweise des Schwingungsdämpfers
        für Schläger an.
    racket_grip_size:
      name: Schlägergriffgröße
      description: Gibt die auf dem Umfang basierende Größenklassifizierung des Schlägergriffs
        an (z. B. G1–G6), um eine optimale Passform und hohen Komfort zu gewährleisten.
    racket_sport_shoe_court_surface:
      name: Platzbelag für Racketsportschuhe
      description: Gibt den Tennisplatzbelag an, für den der Schuh entwickelt bzw.
        optimiert wurde, damit Spieler:innen Schuhe mit geeignetem Sohlenprofil und
        passender Gummimischung für ihren typischen Untergrund auswählen können.
    racket_string_pattern:
      name: Bespannungsmuster des Schlägers
      description: Gibt die Anzahl der Längs- und Quersaiten im Saitenbett an (z. B.
        16 × 18), was Kontrolle, Spin und Haltbarkeit beeinflusst.
    racket_stringing_status:
      name: Besaitungsstatus des Schlägers
      description: Gibt an, ob der Schläger bespannt, unbespannt oder vorbespannt
        verkauft wird.
    racket_weight_class:
      name: Schlägergewichtsklasse
      description: Gibt die standardmäßigen Badminton-Gewichtskategorien „U“ an, damit
        Spieler:innen Schläger innerhalb ihres bevorzugten Gewichtsbereichs auswählen
        können.
    racquet_toy_set_equipment_included:
      name: Enthaltene Ausstattung des Schlägerspielzeug-Sets
      description: Listet die im Spielzeug bzw. Set enthaltenen Artikel auf (z. B.
        Netz, Bälle, Schläger/Paddles).
    racquetball_squash_training_aid_type:
      name: Art der Racquetball- & Squash-Trainingshilfen
      description: Klassifiziert die jeweilige Art des Trainingshilfsmittels bzw.
        Zubehörs, damit Käufer:innen den benötigten Artikel schnell finden kann.
    radiator_cap_gasket_material:
      name: Material des Kühlerverschlussdeckels
      description: Gibt das Material der am Kühlerdeckel verwendeten Dichtung(en)
        an.
    radiator_cap_pressure_relief_style:
      name: Druckentlastungsart des Kühlerdeckels
      description: Gibt die Art der Druckentlastung, Entlüftung bzw. Betätigung des
        Kühlerdeckels an, was sich auf Handhabung, Sicherheit und Einsatzbereich auswirken
        kann.
    radiator_expansion_tank_cap_application:
      name: Anwendung des Kühler-/Ausgleichsbehälterdeckels
      description: Gibt an, ob der Deckel für einen Kühlereinfüllstutzen oder einen
        Kühlmittel-Ausgleichs-/Überlaufbehälter vorgesehen ist.
    radiator_fan_control_type:
      name: Steuerungstyp des Kühlerlüfters
      description: Gibt an, wie der Kühlerlüfter gesteuert bzw. aktiviert wird.
    radiator_fan_mounting_pattern:
      name: Montagemuster des Kühlerlüfters
      description: Gibt die Montageart bzw. das Montagemuster an, mit dem der Lüfter
        bzw. die Lüftereinheit befestigt wird.
    radiator_fan_type:
      name: Kühlerlüftertyp
      description: Gibt den Funktionstyp bzw. die Konfiguration der Kühlerlüfterbaugruppe
        an.
    radiator_hose_end_type:
      name: Endtyp des Kühlerschlauchs
      description: Gibt die primäre Verbindungs- bzw. Dichtungsart an, die an den
        Enden des Kühlerschlauchs zur Verbindung mit Kühler- bzw. Motoranschlüssen
        verwendet wird.
    radiator_hose_position:
      name: Position des Kühlerschlauchs
      description: Gibt die funktionale Position bzw. Art des Kühlerschlauchs innerhalb
        des Kühlsystems an.
    radiator_hose_shape:
      name: Form des Kühlerschlauchs
      description: Beschreibt die allgemeine Schlauchgeometrie bzw. Bauform für Verlegung
        und Passform bei der Installation.
    radiator_overflow_tank_level_sensor_provision:
      name: Vorrichtung für Füllstandssensor am Kühlmittel-Ausgleichsbehälter
      description: Gibt an, ob der Behälter einen Kühlmittelstandsensor enthält bzw.
        unterstützt.
    radiator_overflow_tank_shape:
      name: Form des Kühlerüberlaufbehälters
      description: Beschreibt die allgemeine Bauform des Überlaufbehälters.
    radish_variety:
      name: Radieschensorte
      description: Gibt die Sorte bzw. Art des Radieschens an, damit Kundschaft bestimmte
        Geschmacks-, Farb- oder Größenmerkmale auswählen kann (z. B. Daikon, Watermelon,
        French Breakfast).
    radius_of_hollow:
      name: Radius der Hohlkehle
      description: Gibt das vom Schleifgerät erzeugte Hohlprofil der Klinge an, ausgedrückt
        in gängigen Größen oder als flach.
    rail_coverage_configuration:
      name: Konfiguration der Schienenabdeckung
      description: Gibt an, welche Teile des Kinderbetts durch das Bezugset geschützt
        werden, und verdeutlicht, ob es sich um eine einzelne Frontabdeckung oder
        ein mehrteiliges Rundum-Set handelt.
    rail_mount_standard:
      name: Standard der Schienenmontage
      description: Kennzeichnet den Schienen- bzw. Montageschnittstellenstandard,
        der zur Befestigung von Zubehör (z. B. Visier, Taschenlampe) an einem BB-Gewehr
        verwendet wird.
    rail_side:
      name: Schienenseite
      description: Gibt an, ob die Ersatzschiene für die linke oder rechte Seite vorgesehen
        ist oder als Paar verkauft wird.
    rail_style:
      name: Rail-Stil
      description: Kategorisiert das Gesamtdesign bzw. die Konfiguration der Rail
        (z. B. A-Frame, Rainbow, geknickt), was Trickmöglichkeiten und Platzbedarf
        bestimmt.
    rail_system:
      name: Schienensystem
      description: Kennzeichnet die am Gewehr vorhandene Zubehörmontageschnittstelle
        (z. B. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Regensensortechnologie
      description: Gibt das Messprinzip zur Erkennung von Wasser auf der Windschutzscheibe
        an.
    rain_suit_configuration:
      name: Konfiguration des Regenanzugs
      description: Gibt an, ob das Produkt ein einteiliger Overall, ein mehrteiliges
        Set oder eine andere Konfiguration ist.
    rainstick_construction_type:
      name: Konstruktionsart des Regenstabs
      description: Beschreibt, wie der Regenstab aufgebaut ist (traditionelles Kaktus-/Holzrohr
        vs. moderne Alternativen).
    rainstick_fill_material:
      name: Füllmaterial des Regenstabs
      description: Gibt das Innenfüllmaterial an, das zur Erzeugung des rieselnden
        Klangs verwendet wird (z. B. Samen, Perlen).
    rainstick_playing_technique:
      name: Spieltechnik des Regenstabs
      description: Gibt die empfohlene(n) Spieltechnik(en) oder die Handhabungsart
        an, mit denen der gewünschte Effekt auf dem Regenstab erzeugt wird.
    rainstick_sound_character:
      name: Klangcharakter des Regenstabs
      description: Beschreibt den gesamten Klangcharakter, den der Regenstab erzeugt.
    raising_method:
      name: Aufzuchtmethode
      description: Beschreibt, wie die Tiere vor der Verarbeitung aufgezogen und gemästet
        wurden (z. B. grasgefüttert, Weidehaltung, getreidegemästet).
    rally_competition_class:
      name: Rallye-Wettbewerbsklasse
      description: Gibt die Klasse des Motorsportverbands bzw. Regelwerks an, nach
        dem das Rallyeauto gebaut wurde (falls bekannt).
    rally_surface_setup:
      name: Rallye-Untergrund-Setup
      description: Gibt den primären Untergrund bzw. das Gelände an, für das das Rallyeauto-Setup
        bzw. der Aufbau ausgelegt ist.
    ramp_surface_texture:
      name: Oberflächentextur der Skateboardrampe
      description: Beschreibt die Oberflächenbeschaffenheit bzw. den Grip der Fahrfläche
        der Rampe.
    ratchet_mounting_style:
      name: Anbringungsart der Ratsche
      description: Beschreibt, wie die musikalische Ratsche während des Spielens bzw.
        Aufbaus gehalten oder montiert wird.
    rattle_element_material:
      name: Material der Rasselelemente
      description: Gibt das Material der rasselnden Elemente an (z. B. Zähne, Schellen,
        Perlen), die das charakteristische Summen bzw. Rasseln erzeugen.
    rattle_type:
      name: Rasseltyp
      description: Gibt an, ob der Köder eine interne Rassel bzw. Schallkammer enthält
        und falls ja, welche Art von Rassel verwendet wird.
    rc_airship_lifting_gas_type:
      name: Hebegastyp des RC-Luftschiffs
      description: Gibt an, mit welchem Gas die Hülle des Luftschiffs bzw. Blimps
        gefüllt werden soll (falls zutreffend).
    rc_helicopter_control_frequency:
      name: Steuerfrequenz des RC-Helikopters
      description: Gibt das Funkfrequenzband an, das zwischen Fernsteuerung und Helikopter
        verwendet wird und Einfluss auf Störsicherheit und Kompatibilität hat (z. B.
        2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Stabilisierungsfunktionen des RC-Helikopters
      description: Listet Stabilitäts- bzw. Steuerungsfunktionen auf, die das Fliegen
        erleichtern oder zusätzliche Funktionen bieten.
    rc_motorcycle_controller_type:
      name: Fernsteuerungstyp des RC-Motorrads
      description: Gibt die Bauform der enthaltenen Fernsteuerung an.
    rc_plane_takeoff_launch_method:
      name: Startmethode des RC-Flugzeugs
      description: Beschreibt, wie das Flugzeug typischerweise gestartet wird bzw.
        abhebt, was beeinflusst, wo und wie es eingesetzt werden kann.
    rc_vehicle_controller_type:
      name: Fernsteuerungstyp des RC-Fahrzeugs
      description: Gibt die Bauform der Fernsteuerung an, die zur Steuerung des RC-Fahrzeugs
        verwendet wird.
    rc_vehicle_scale:
      name: Maßstab des RC-Fahrzeugs
      description: Gibt das Maßstabsverhältnis (Größenklasse) des ferngesteuerten
        Autos bzw. Trucks an (z. B. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Geländeart des RC-Fahrzeugs
      description: Gibt das primäre Gelände an, für das das ferngesteuerte Auto bzw.
        der ferngesteuerte Truck ausgelegt ist.
    reach_adjustment_type:
      name: Art der Griffweitenverstellung
      description: Gibt an, ob der Abstand zwischen Bremshebel und Lenker eingestellt
        werden kann und ob die Einstellung werkzeuglos erfolgt oder ein Werkzeug benötigt.
    rear_axle_spacing:
      name: Hinterachs-Einbaubreite
      description: Gibt die Ausfallenden- bzw. Achsgröße an, für die der hintere Teil
        des Rahmens ausgelegt ist, was die Laufradkompatibilität beeinflusst.
    rear_axle_standard:
      name: Hinterachsstandard
      description: Definiert die Achsschnittstelle bzw. das Achsformat des Hinterrads
        (z. B. Schnellspanner oder verschiedene Steckachsengrößen).
    rear_axle_type:
      name: Hinterachstyp
      description: Gibt das Befestigungssystem und den Achsdurchmesser an, die zur
        Befestigung des Hinterrads am Rahmen verwendet werden.
    rear_coverage:
      name: Abdeckung hinten
      description: Gibt an, wie viel vom Gesäß das Bikinihöschen bedeckt (z. B. knapp
        oder vollständig).
    rear_opening_type:
      name: Art der rückseitigen Öffnung
      description: Beschreibt die Art des rückseitigen Zugangs bzw. der „Po-Klappe“
        für eine bequemere Toilettennutzung, z. B. Drop Seat oder durchgehender Reißverschluss
        hinten.
    rear_seat_configuration:
      name: Rücksitzkonfiguration
      description: Gibt die Konfiguration der Rücksitzanlage an, um Passform und Innenraumlayout
        festzulegen.
    rear_view_mirror_ornament_attachment_type:
      name: Befestigungsart für Rückspiegeldekoration
      description: Gibt an, wie die Dekoration am Rückspiegelstiel bzw. -gehäuse befestigt
        wird (z. B. Schlaufe, Clip oder Haken).
    rearview_mirror_mount_attachment_type:
      name: Befestigungsart für Rückspiegelhalterung
      description: Definiert, wie die Halterung physisch an der Rückspiegelbaugruppe
        (Spiegelkörper oder -stiel) befestigt wird, z. B. mittels Klemme, Clip, Gurt,
        Klebepad oder angeschraubter Halterung.
    rebound_board_face_type:
      name: Oberflächenart des Rückprallbretts
      description: Beschreibt die Oberflächenkonfiguration, die das Rückprallverhalten
        bestimmt, z. B. flache, angewinkelte oder mehrseitige Ausführungen.
    rebound_level:
      name: Rückprallniveau
      description: Gibt an, wie stark der Ball nach dem Aufprall zurückspringt, und
        hilft Nutzer:innen bei der Wahl zwischen Modellen ohne oder mit moderatem
        Rückprall.
    rebound_surface_configuration:
      name: Konfiguration der Rückprallfläche
      description: Legt die Anordnung der Rückprallflächen und die Vorhersagbarkeit
        der Rückpralle fest (einseitig, zweiseitig oder mehrseitig; vorhersagbar vs.
        unvorhersehbar).
    rebounder_design:
      name: Rebounder-Stil
      description: Definiert die strukturelle Ausführung oder Konfiguration der Rückprallfläche
        des Produkts.
    rebounder_design_type:
      name: Rebounder-Designtyp
      description: Gibt den primären Rückprallmechanismus bzw. die Bauweise des Trainers
        an (z. B. elastische Kordelbasis, gerahmtes Netz, Pop-up-Ziel).
    rebounder_sides:
      name: Rebounder-Seiten
      description: Gibt an, ob der Rebounder Bälle von einer oder beiden Seiten zurückspielen
        kann.
    rebounding_mechanism_type:
      name: Rebounder-Mechanismus
      description: Gibt die Technologie an, die zum Zurückführen des Pucks oder Balls
        verwendet wird (z. B. Gummipuffer, Bungee-Seil).
    recipient_relationship:
      name: Beziehung zum Empfänger bzw. zur Empfängerin
      description: Beabsichtigte Beziehung zur empfangenden Person (z. B. Mama, Papa,
        Freund:in) für die Grußkarte.
    recliner_control_type:
      name: Steuerungsart für Liegesessel
      description: Gibt an, wie der Verstellmechanismus betätigt wird (z. B. manueller
        Hebel, elektrisches Tastenfeld, Fernbedienung).
    recliner_motion_type:
      name: Bewegungsmechanismus des Liegesessels
      description: Definiert die primäre Bewegungsfunktion des Sessels (z. B. Schaukel-,
        Gleit-, Dreh-, wandnaher oder Aufstehsessel).
    reclining_mechanism:
      name: Verstellmechanismus
      description: Gibt den Mechanismus an, mit dem die Verstellfunktion des Sofas
        betätigt wird.
    recommended_candle_format:
      name: Empfohlenes Kerzenformat
      description: Gibt das/die empfohlene(n) Kerzenformat(e) an, für das/die diese
        selbstklebenden Dochtlaschen vorgesehen sind.
    recommended_container_type:
      name: Empfohlener Behältertyp
      description: Materialien von Behältern, die für Gelwachskerzen empfohlen bzw.
        geeignet sind.
    recommended_fabric_type:
      name: Empfohlener Gewebetyp
      description: Empfohlene(r) Stoff(e) für optimale Ergebnisse mit dem Schnittmuster.
    recommended_fabric_weight:
      name: Empfohlenes Stoffgewicht
      description: Gibt die empfohlene Stoffgewichtskategorie für das Schnittmuster
        an.
    recommended_food_pairing:
      name: Empfohlene Speisenkombination
      description: Gibt die primären Proteinquellen oder Gerichte an, für die die
        Sauce gedacht ist (z. B. Huhn, Schweinefleisch, Rindfleisch, Fisch, Gemüse).
    recommended_lane_condition:
      name: Empfohlene Bahnkondition
      description: Gibt das Ölmuster oder die Bahnkondition an, für die der Ball entwickelt
        wurde.
    recommended_motor_impulse_class:
      name: Empfohlene Gesamtimpulsklasse des Motors
      description: Gibt die empfohlene Gesamtimpulsklasse des Modellraketenmotors
        für einen sicheren bzw. optimalen Flug an.
    recommended_reading_level:
      name: Empfohlenes Lesestufe
      description: Gibt die empfohlene Lesestufe bzw. Lesefähigkeit für das Produkt
        an, damit Käufer:innen es an die aktuelle Leseentwicklung des Kindes anpassen
        können.
    recommended_sleep_position:
      name: Empfohlene Schlafposition
      description: Gibt an, für welche Schlafpositionen die Matratze komfortable Unterstützung
        bietet (z. B. Seiten- oder Rückenschläfer:innen).
    recommended_storage:
      name: Empfohlene Lagerung
      description: Gibt an, wie das Produkt gelagert werden sollte, um seine Frische
        zu erhalten.
    recommended_surfaces:
      name: Empfohlene Oberflächen
      description: Gibt die vorgesehenen Klebeflächen bzw. Materialkategorien des
        Klebstoffs an, über die allgemeine Bastelkompatibilität hinaus (z. B. nur
        Papier vs. mehrere Oberflächen).
    recommended_use_case:
      name: Empfohlene Anwendung
      description: Primärer Verwendungszweck des Dichtmittels (vorübergehende bzw.
        Notfallreparatur vs. langfristige Reparatur).
    recommended_use_location:
      name: Empfohlener Einsatzort
      description: Vorgesehene Umgebung für die Wippe (z. B. privater Garten vs. öffentlicher
        Spielplatz).
    recommended_vehicle_surfaces:
      name: Empfohlene Fahrzeugoberflächen
      description: Gibt an, für welche Fahrzeugoberflächen bzw. Lackierungen die Bürste
        geeignet ist (z. B. Klarlack, Matt-/Satinlack, Vinylfolie/PPF, Glas, Felgen).
    recorder_accessories_included:
      name: Inbegriffenes Blockflötenzubehör
      description: Listet das im Lieferumfang der Großbassblockflöte enthaltene Zubehör
        auf.
    recorder_bore_design:
      name: Bohrungsdesign der Blockflöte
      description: Die Gestaltung des Innenbohrungsprofils des Blockflötenkorpus.
    recorder_bore_type:
      name: Lochform der Blockflöte
      description: Gibt die Bohrungsform der Blockflöte an.
    recorder_case_shell_type:
      name: Kofferschalentyp für Blockflöten
      description: Beschreibt die strukturelle Steifigkeit des Koffers.
    recorder_finish:
      name: Oberflächenbehandlung der Blockflöte
      description: Oberflächenbehandlung bzw. -veredelung des Blockflötenkorpus (besonders
        relevant bei Altblockflöten aus Holz).
    recorder_hole_type:
      name: Lochtyp der Blockflöte
      description: Gibt an, ob die Tonlöcher einfach ausgeführt sind (keine Doppellöcher)
        oder Doppellöcher für verbesserte chromatische Griffweisen besitzen.
    recorder_joint_configuration:
      name: Gelenkkonfiguration der Blockflöte
      description: Beschreibt, aus wie vielen Teilen die Blockflöte besteht, was sich
        auf Transport, Reinigung und Austauschbarkeit von Teilen auswirkt.
    recorder_joint_style:
      name: Verbindungsart der Blockflöte
      description: Die Verbindungsart zwischen den Teilen der Blockflöte, falls zutreffend.
    recorder_keywork:
      name: Klappenmechanik der Blockflöte
      description: Gibt an, ob die Blockflöte Klappen (Metall-/Kunststoffmechanismen)
        für tiefe Töne besitzt, wie sie typischerweise bei Tenor-, Bass- oder großen
        Blockflöten vorkommen.
    recorder_mouthpiece_type:
      name: Mundstück der Blockflöte
      description: Beschreibt, ob Mundstück bzw. Kopfstück der Blockflöte integriert
        (einteilig) oder abnehmbar bzw. austauschbar ist.
    recorder_pitch_standard_a4:
      name: Stimmung der Blockflöte (A4)
      description: Gibt die Tonhöhenreferenz an, für die die Blockflöte gebaut wurde
        (z. B. A=440 Hz moderne Stimmung vs. A=415 Hz Barockstimmung).
    recorder_thumb_hole_type:
      name: Daumenlochform der Blockflöte
      description: Gibt an, ob die Blockflöte ein einfaches oder doppeltes Daumenloch
        besitzt.
    recreational_vehicle_holding_tank_type:
      name: Abwassertanktyp für Wohnmobile
      description: Gibt an, über welche Abwassertanks das Wohnmobil verfügt.
    recreational_vehicle_leveling_system:
      name: Nivellierungssystem für Wohnmobile
      description: Art des installierten Nivellierungs- bzw. Stabilisierungssystems.
    recycled_material_content:
      name: Anteil recycelter Materialien
      description: Gibt den Anteil des Kleidungsstücks an, der aus recycelten Fasern
        oder Garnen besteht.
    reed_dent_material:
      name: Material der Webkammzähne
      description: Material der Webkammzähne (Elemente zum Trennen der Kettfäden),
        das Haltbarkeit und Garnabrieb beeinflusst.
    reed_type:
      name: Rohrblatttyp
      description: Gibt die Bauart des Rohrblatts an, das bei Spielpfeife und Bordunpfeifen
        des Dudelsacks verwendet wird.
    reeds_included:
      name: Enthaltene Rohrblätter
      description: Gibt an, welche Rohrblätter im Great-Highland-Bagpipe-Set enthalten
        sind (Spielpfeife und/oder Bordunpfeifen) und ob sie aus Rohr oder Kunststoff
        bestehen.
    reefing_method:
      name: Reffmethode
      description: Gibt den Mechanismus an (falls vorhanden), mit dem das Segel auf
        dem Wasser gerefft oder verstaut werden kann.
    reel_profile:
      name: Rollenprofil
      description: Klassifiziert die strukturelle Bauweise bzw. das Profil des Baitcasting-Rollenkörpers.
    reel_seat_material:
      name: Material des Rollenhalters
      description: Gibt das Konstruktionsmaterial des Rollenhalters an, das Gewicht,
        Sensibilität und Korrosionsbeständigkeit beeinflusst.
    reel_seat_type:
      name: Rollenhaltertyp
      description: Gibt die Art des Verriegelungsmechanismus an, mit dem die Fliegenrolle
        an der Rute befestigt wird.
    reel_size_class:
      name: Größenklasse der Rolle
      description: Die vom Hersteller angegebene Größenklassifizierung (z. B. 1000,
        3000, 5000), die Aufschluss über Spulenkapazität und Gesamtkonstruktion der
        Rolle gibt.
    referee_wallet_accessories_included:
      name: Enthaltenes Zubehör für Schiedsrichter-Mappen
      description: Listet die zusätzlichen Artikel auf, die mit der Schiedsrichter-Mappe
        geliefert werden, z. B. Rot-/Gelbkarten, Spielnotizblätter oder Schreibutensilien,
        damit Käufer wissen, ob die Mappe als Komplettset verkauft wird.
    refinement_level:
      name: Raffinationsgrad
      description: Gibt den Raffinationsgrad des Öls an, der Geschmack, Farbe, Nährwert
        und Rauchpunkt beeinflusst.
    reflective_finish:
      name: Reflektierende Oberfläche
      description: Gibt die reflektierende Oberflächenbehandlung einer Discokugel
        an (z. B. Spiegelkacheln vs. holografische/irisierende Effekte).
    reflective_or_glow_effect:
      name: Reflektierender oder leuchtender Effekt
      description: Gibt an, ob die Antennenkugel Sichtbarkeitseffekte wie reflektierendes
        Material, Leuchteffekte im Dunkeln oder Leucht-/LED-Elemente besitzt.
    reflective_tape_pattern:
      name: Muster des reflektierenden Bands
      description: Beschreibt die Anordnung des reflektierenden Bands auf dem Kleidungsstück
        zur Erfüllung der Sichtbarkeitsanforderungen.
    regulation_standard:
      name: Regulierungsstandard
      description: Gibt die offizielle Norm oder die von einer Aufsichtsbehörde festgelegten
        Maße bzw. Zertifizierungen an, die das Netz erfüllt.
    regulator_diaphragm_material:
      name: Membranmaterial des Reglers
      description: Gibt das Material der Membran an, das die Kraftstoff-/Ethanolkompatibilität
        (z. B. E85) und die Haltbarkeit beeinflusst.
    regulator_port_thread_standard:
      name: Gewindestandard des Regleranschlusses
      description: Gibt den Gewinde-/Verbindungsstandard an, der am Reglergehäuse
        für Einlass-, Auslass- und Rücklaufanschlüsse verwendet wird.
    rein_features:
      name: Zügeleigenschaften
      description: Hebt besondere funktionale oder sicherheitsrelevante Eigenschaften
        der Zügel hervor.
    rein_style:
      name: Zügelstil
      description: Kennzeichnet die strukturelle Bauweise oder Konfiguration der Zügel,
        damit Reiter:innen den passenden Typ für ihre Disziplin und persönlichen Vorlieben
        auswählen können.
    reinforced_areas:
      name: Verstärkte Bereiche
      description: Kennzeichnet die Bereiche des Kleidungsstücks, die für höhere Abriebfestigkeit
        verstärkt sind.
    reinforcement_type:
      name: Verstärkungsart
      description: Die im Kühlerschlauch verwendete Konstruktionsverstärkung für höhere
        Festigkeit sowie Temperatur- und Druckbeständigkeit.
    release_activation_method:
      name: Auslösemechanismus
      description: Gibt an, wie eine Bogenschieß-Auslösehife von der Schützin bzw.
        vom Schützen ausgelöst wird.
    release_bearing_material:
      name: Material des Ausrücklagers
      description: Primärmaterial der Lager- bzw. Kontaktflächenkomponenten (sofern
        vom Hersteller angegeben).
    release_jaw_style:
      name: Stil der Auslösebacken
      description: Beschreibt die Bauweise der Auslösekopfbacken bzw. des Hakens.
    release_strap_type:
      name: Typ des Auslöseriemens
      description: Kennzeichnet das mit der Bogenschieß-Auslösehife gelieferte Riemen-
        oder Verbindungssystem.
    remote_control_airship_envelope_material:
      name: Hüllenmaterial für ferngesteuerte Luftschiffe
      description: Gibt das Hauptmaterial der Hülle des Luftschiffs bzw. Zeppelins
        (Gasblase) an, getrennt vom allgemeinen Spielzeugmaterial.
    remote_control_motorcycle_scale:
      name: Maßstab des ferngesteuerten Motorrads
      description: Maßstab des RC-Motorrads im Verhältnis zu einem echten Motorrad
        (falls als maßstabsgetreues Fahrzeug modelliert).
    remote_control_motorcycle_terrain_suitability:
      name: Geländeeignung für ferngesteuerte Motorräder
      description: Das hauptsächliche Gelände, für das das RC-Motorrad ausgelegt ist.
    remote_control_motorcycle_water_resistance:
      name: Wasserbeständigkeit ferngesteuerter Motorräder
      description: Grad des Wasserschutzes für die Elektronik des RC-Motorrads.
    remote_control_plane_kit_completion_level:
      name: Komplettierungsgrad des RC-Flugzeug-Kits
      description: Gibt an, was enthalten ist und wie vollständig das Set ist (z. B.
        flugbereit vs. separater Sender/Empfänger/Akku erforderlich).
    remote_control_plane_landing_gear_type:
      name: Fahrwerkstyp für RC-Flugzeuge
      description: Gibt die Fahrwerkskonfiguration an, die sich auf Haltbarkeit sowie
        Start- und Landeflächen auswirkt.
    remote_control_plane_power_type:
      name: Antriebsart für RC-Flugzeuge
      description: Gibt an, wie das Flugzeug angetrieben wird (elektrisch vs. Glühzünder/Benzin/Nitro),
        was sich auf Wartung, Lautstärke und Einsatzorte auswirkt.
    remote_control_watercraft_features:
      name: Funktionen ferngesteuerter Wasserfahrzeuge
      description: Hebt wichtige, für RC-Wasserfahrzeuge spezifische Funktionen hervor,
        die Benutzerfreundlichkeit und Haltbarkeit beeinflussen.
    remote_control_watercraft_propulsion_drive_type:
      name: Antriebsart für ferngesteuerte Wasserfahrzeuge
      description: Gibt an, wie das ferngesteuerte Wasserfahrzeug im Wasser angetrieben
        wird.
    remote_control_watercraft_water_environment:
      name: Wasserumgebung für ferngesteuerte Wasserfahrzeuge
      description: Gibt die vorgesehenen Wasserbedingungen an, unter denen das RC-Wasserfahrzeug
        die beste Leistung erzielt.
    remote_keyless_system_programming_method:
      name: Programmiermethode für schlüssellose Fernzugangssysteme
      description: Gibt an, wie die Fernbedienung bzw. das System mit dem Fahrzeug
        programmiert oder gekoppelt wird (z. B. Bordverfahren vs. professionelles
        Werkzeug).
    repair_compound_type:
      name: Typ der Reparaturmasse
      description: Art/Zusammensetzung des enthaltenen Verbrauchsreparaturmaterials
        (z. B. Karosseriespachtel, Scheibenharz, Reifenreparaturkleber/-dichtmittel).
    repair_kit_components:
      name: Komponenten des Reparatursets
      description: Listet die im Reparaturset enthaltenen Artikel auf, damit Käufer:innen
        den Inhalt nachvollziehen und Sets vergleichen können.
    repair_method:
      name: Reparaturmethode
      description: Gibt die primäre Reparaturmethode des Sets an, z. B. selbstklebende
        Flicken oder Ventilaustausch.
    replacement_part_purpose:
      name: Zweck des Ersatzteils
      description: Gibt an, ob es sich bei dem Artikel um ein OEM-Ersatzteil, ein
        Upgrade-/Leistungsteil oder ein zusätzliches Zubehörteil handelt.
    replacement_part_type:
      name: Ersatzteiltyp
      description: Kennzeichnet die Funktionskategorie des Crosstrainer-Ersatzteils,
        damit Käufer:innen gezielt nach der benötigten Komponente filtern können.
    replacement_parts_availability:
      name: Verfügbarkeit von Ersatzteilen
      description: Gibt an, ob für das Einfädelwerkzeug Verbrauchs- bzw. Austauschteile
        unterstützt werden (z. B. Ersatzhaken/-drähte).
    replica_gun_action_type:
      name: Mechanismustyp der Replikwaffe
      description: Gibt die Funktions- bzw. Mechanismusart der dargestellten Replikwaffe
        an, z. B. Repetier- oder Unterhebelmechanismus.
    replica_gun_firing_mechanism:
      name: Schussmechanismus der Replikwaffe
      description: Gibt an, ob und wie die Replik Schuss- bzw. Funktionsvorgänge simuliert
        (nicht tödlich), z. B. mit Platzpatronen oder ohne Schussfunktion.
    replica_gun_moving_parts:
      name: Bewegliche Teile der Replikwaffe
      description: Gibt an, welche Teile der Replik funktionsfähig bzw. beweglich
        sind.
    reservoir_orientation:
      name: Ausrichtung des Reservoirs
      description: Gibt die vorgesehene Ausrichtung bzw. Form der Trinkblase innerhalb
        des Rucksacks an.
    reservoir_type:
      name: Reservoirtyp
      description: Art der Reservoirkonfiguration für den Kupplungsgeberzylinder.
    resin_suitability:
      name: Harzeignung
      description: Gibt an, ob der Handball für die Verwendung mit Harz (Kleber) ausgelegt
        oder harzfrei ist.
    resistance_adjustability:
      name: Widerstandseinstellbarkeit
      description: Gibt an, ob der Atemwiderstand vom Benutzer bzw. von der Benutzerin
        angepasst werden kann.
    resistance_band_design:
      name: Design des Widerstandsbandes
      description: Beschreibt die physische Form bzw. Ausführung eines Widerstandsbandes
        (z. B. Schlaufe, Schlauch mit Griffen, Achterform), damit Käufer:innen das
        passende Design für ihr Trainingsprogramm auswählen können.
    resistance_loading_type:
      name: Art der Widerstandsbelastung
      description: Gibt an, wie Widerstand bzw. Gewicht an der Smith-Maschine bereitgestellt
        oder geladen wird (z. B. gewichtsscheibenbasiert oder Gewichtsstapel mit Stecksystem).
    response_fields_included:
      name: Enthaltene Antwortfelder
      description: Gibt an, welche Standardantwortfelder/-optionen auf der Antwortkarte
        vorhanden sind (z. B. Zusage/Absage, Essensauswahl).
    restoration_status:
      name: Restaurierungsstatus
      description: Gibt an, ob sich der Van im Originalzustand, restaurierten Zustand,
        Restomod-Zustand oder Projektzustand befindet.
    rhinestone_base_color_family:
      name: Farbgruppe der Strasssteinbasis
      description: Gibt die Farbgruppe der Strasssteinbasis an (z. B. transparent/kristall,
        gold/gelb, blau).
    rhinestone_facet_style:
      name: Facettenstil des Strasssteins
      description: Das Oberflächen-/Facettenmuster des Strasssteins, das Glanz und
        Erscheinungsbild beeinflusst (z. B. Xilion Rose, Brillantschliff, facettiert
        vs. glatt).
    rhinestone_hole_reinforcement_material:
      name: Material der Strasslochverstärkung
      description: Material um bzw. an den Löchern (z. B. Metallöse, geformter Kunststoff),
        das die Haltbarkeit beim Nähen beeinflusst.
    rhinestone_setting_type:
      name: Fassungsart des Strasssteins
      description: Gibt an, wie der Stein zum Nähen befestigt bzw. eingefasst ist
        (z. B. Krappenfassung, Zargenfassung, Randfassung).
    rhubarb_product_cut_type:
      name: Schnittart des Rhabarberprodukts
      description: Beschreibt die physische Verarbeitung bzw. Schnittform des Rhabarberprodukts.
    ribbon_construction:
      name: Bandkonstruktion
      description: Beschreibt wichtige Konstruktionsmerkmale von Ripsband, z. B. Drahtverstärkung
        oder Elastizität, die den Verwendungszweck beeinflussen (z. B. Schleifen vs.
        Nähen).
    ribbon_packaging_type:
      name: Verpackungsart des Bands
      description: Gibt an, wie das Band geliefert bzw. verkauft wird.
    ribbon_pattern_style:
      name: Stil des Bandmusters
      description: Klassifiziert die Musteranwendungsmethode, die üblicherweise bei
        Ripsband verwendet wird.
    ribbon_sheen_level:
      name: Glanzgrad des Bandes
      description: Gibt den optischen Glanzgrad der Satinbandoberfläche an.
    ribbon_style:
      name: Bandstil
      description: Gibt das visuelle Muster bzw. den Stil des Bands an (z. B. einfarbig,
        gestreift, dreifarbig).
    ribbon_trim_backing_type:
      name: Rückseitenart von Band/Borte
      description: Gibt an, ob das Band bzw. die Borte eine Rückseite besitzt und
        welcher Art diese ist (zur einfacheren Anwendung).
    ribbon_trim_edge_finish:
      name: Kantenverarbeitung von Band/Borte
      description: Beschreibt die Kantenkonstruktion bzw. -verarbeitung von Band/Borte
        (relevant für Ausfransverhalten und Verwendungszweck).
    ric_rac_wave_size:
      name: Wellengröße von Zackenlitze
      description: Beschreibt die Wellenamplitude bzw. -größe der Zackenlitze (wie
        groß die Zickzacklinien/Wellen sind).
    rice_grain_length:
      name: Reiskornlänge
      description: Klassifiziert Reisprodukte nach Kornlänge, z. B. Rundkorn-, Mittelkorn-
        oder Langkornreis, was Kocheigenschaften und kulinarische Verwendung beeinflusst.
    rice_processing_method:
      name: Reisverarbeitungsmethode
      description: Beschreibt, wie der Reis verarbeitet bzw. zubereitet wurde (z. B.
        parboiled, gekeimt, geflockt), was Kochzeit, Nährwert und Verwendung beeinflusst.
    rice_variety:
      name: Auswahl an Reis
      description: Gibt die spezifische Reissorte bzw. Züchtung an, damit Käufer:innen
        Körner mit gewünschtem Geschmack, Aroma, gewünschter Textur und passender
        Küche auswählen können.
    riding_toy_features:
      name: Merkmale von Aufsitzspielzeug
      description: Hebt gängige funktionale bzw. sicherheitsrelevante Merkmale hervor,
        die speziell für Aufsitzspielzeug gelten.
    rifle_action_type:
      name: Mechanismustyp des Gewehrs
      description: Der Funktionsmechanismus des Gewehrs (wie es lädt, schießt und
        auswirft), wichtig für Identifikation und Sammlerinteresse.
    rifle_finish:
      name: Oberflächenfinish des Gewehrs
      description: Primäre äußere Oberflächenbehandlung bzw. Beschichtung der Metallteile.
    rifle_magazine_type:
      name: Magazintyp des Gewehrs
      description: Typ des Zuführsystems für das Gewehr.
    rifle_stock_material:
      name: Material des Gewehrschafts
      description: Hauptmaterial des Gewehrschafts bzw. der Ausstattungsteile (z. B.
        Walnussholz, Polymer).
    rim_clamping_method:
      name: Felgenklemmmethode
      description: Gibt an, wie die Maschine das Rad bzw. die Felge beim Montieren
        und Demontieren fixiert.
    rim_strip_type:
      name: Felgenbandtyp
      description: Klassifiziert das Band bzw. den Streifen nach Ausführung, Konstruktion
        oder spezifischem Einsatzbereich (z. B. Tubeless-Felgenband vs. Schutzgummistreifen).
    rim_tubeless_compatibility:
      name: Tubeless-Kompatibilität der Felge
      description: Gibt an, ob die Felge, das Band oder das Rad für Tubeless-Reifensysteme
        ausgelegt ist.
    ripeness_stage:
      name: Reifestufe
      description: Gibt den Reifegrad der Frucht zum Zeitpunkt des Verkaufs an (z. B.
        unreif, reif, verzehrfertig).
    riser_pad_type:
      name: Typ des Riser-Pads
      description: Klassifiziert die funktionale Ausführung des Pads (z. B. Standard-Abstandshalter,
        stoßdämpfend, angewinkelter Keil).
    roasted_malt_processing_type:
      name: Verarbeitungsart von Röstmalz
      description: Die spezifische Verarbeitungsmethode bzw. Variante zur Herstellung
        des Röstmalzes oder Röstgetreides (z. B. unvermälzte Röstgerste, Schwarzmalz,
        entbitterte oder entspelzte Varianten).
    robotic_toy_interaction_mode:
      name: Interaktionsmodus von Roboterspielzeug
      description: Beschreibt die primäre Art, wie der Roboter während des Spielens
        interagiert oder sich bewegt.
    robotic_toy_light_features:
      name: Lichtfunktionen von Roboterspielzeug
      description: Gibt an, ob und wie das Spielzeug Lichtfunktionen als Teil des
        Spielens nutzt (z. B. LEDs, Projektionen).
    robotic_toy_programming_supported:
      name: Unterstützte Programmierung für Roboterspielzeug
      description: Gibt an, welchen Programmieransatz das Spielzeug gegebenenfalls
        unterstützt.
    robotic_toy_skill_level:
      name: Schwierigkeitsgrad von Roboterspielzeug
      description: Gibt den erwarteten Komplexitätsgrad für Bedienung bzw. Programmierung
        durch die nutzende Person an.
    robotic_toy_sound_features:
      name: Soundfunktionen von Roboterspielzeug
      description: Gibt die Soundfunktionen des Roboterspielzeugs an.
    rod_butt_style:
      name: Stil des Rutenendes
      description: Definiert die Ausführung des Rutenendes für den Einsatz beim Schleppangeln.
    rod_construction_type:
      name: Rutenkonstruktionstyp
      description: Gibt die allgemeine Bauweise der Rute hinsichtlich Anzahl der Teile
        und Zusammenklappbarkeit an.
    rod_guide_material:
      name: Material der Rutenringe
      description: Gibt das Material der Schnurführungen bzw. Einsätze der Angelrute
        an, das Haltbarkeit, Gewicht und Schnurreibung beeinflusst.
    rod_guide_type:
      name: Typ der Rutenringe
      description: Gibt die primäre Ausführung der an der Rute montierten Schnurführungen
        an.
    rod_handle_type:
      name: Rutengrifftyp
      description: Gibt die Griffkonfiguration der Angelrute an, was Komfort und Technikauswahl
        unterstützt.
    roll_cage_tubing_material:
      name: Rohrmaterial des Überrollkäfigs
      description: Gibt das Rohrmaterial bzw. die Legierung des Überrollkäfigs bzw.
        Überrollbügels an (z. B. DOM-Stahl vs. 4130 Chromoly).
    roller_skate_brake_shape:
      name: Form der Rollschuhbremse
      description: Beschreibt die geometrische Form bzw. das Profil des Bremskopfs
        für Leistungs- oder Designvorlieben.
    roller_skate_brake_type:
      name: Typ der Rollschuhbremse
      description: Gibt das bei Rollschuhen verwendete Bremssystem an.
    roller_ski_technique:
      name: Rollski-Technik
      description: Gibt die Langlauftechnik an, für die die Rollski ausgelegt sind.
    roller_technology:
      name: Rollentechnologie
      description: Gibt integrierte Technologien an, die die Massagewirkung verbessern,
        z. B. Vibration oder Wärme.
    rolling_case_wheel_configuration:
      name: Radkonfiguration von Rollkoffern
      description: Gibt die Radkonfiguration an, die bei rollbaren Keyboardkoffern
        verwendet wird.
    rolling_paper_format:
      name: Format des Drehpapiers
      description: Kennzeichnet die physische Darreichungsform des Produkts (z. B.
        flache Blätter, vorgerollte Cones, Wraps).
    rolling_paper_gum_type:
      name: Klebstoffart des Drehpapiers
      description: Gibt den am Papierrand verwendeten Klebstoff zum Verschließen an,
        der Geschmack und Funktion beeinflussen kann.
    rolling_paper_size:
      name: Größe des Drehpapiers
      description: Bezeichnet die Standardgrößenklassifizierung des Drehpapiers bzw.
        Cones, damit Käufer:innen schnell die passende Breite bzw. Länge auswählen
        können.
    rolling_stock_type:
      name: Typ des Schienenfahrzeugs
      description: Gibt an, um welche Art von Zug bzw. Schienenfahrzeug es sich beim
        Modell handelt (Lokomotive vs. Personen-/Güterwagen sowie gängige Wagentypen).
    roof_cargo_net_hook_fastener_style:
      name: Haken-/Befestigungsart für Dachgepäcknetze
      description: Gibt die Art der Endbefestigung an, mit der das Netz an Befestigungspunkten
        angebracht wird (z. B. S-Haken, Karabiner, J-Haken).
    roof_height_class:
      name: Dachtypen
      description: Klassifiziert die bei Vans üblichen Dachhöhen (besonders relevant
        für Ausbauten bzw. Camper-Umbauten).
    roof_type:
      name: Dachtyp
      description: Konfiguration des Dach- bzw. Deckenbereichs des Gehäuses.
    root_variety:
      name: Wurzelsorte
      description: Kennzeichnet die Sorte bzw. den gängigen Typ der Wurzel (z. B.
        Meerrettich vs. echte Wasabi-Sorten).
    rope_buoyancy:
      name: Auftrieb der Leine
      description: Gibt an, ob das Seil so ausgelegt ist, dass es auf der Wasseroberfläche
        schwimmt, um Verheddern zu vermeiden und das Bergen zu erleichtern.
    rope_construction:
      name: Leinenart
      description: Gibt Details zur Faserkonstruktion über die Flechtart hinaus an,
        z. B. gedrehter vs. geflochtener Kern/Mantel sowie ob es sich um ein Kernmantelseil
        handelt.
    rope_material:
      name: Seilmaterial
      description: Gibt das Material des Spannseils bzw. der Spannkordel an.
    rope_strand_compatibility:
      name: Kompatibilität der Seilstränge
      description: Gibt an, welche Seilstrangkonfigurationen das Sicherungsgerät unterstützt
        (Einfach-, Halb-/Doppelseil, Zwillingsseil oder Kombinationen).
    rope_stretch_type:
      name: Dehnungsart des Seils
      description: Beschreibt die Dehnungseigenschaften des Seils und unterscheidet
        zwischen nicht dehnbaren, gering dehnbaren, Standard- und Bungee-Ausführungen.
    rose_bloom_stage:
      name: Blühstadium der Rose
      description: Gibt an, wie weit die Rosenblüten bei Lieferung/Ankunft geöffnet
        sind (von Knospe bis vollständig geöffnet).
    rose_grade:
      name: Qualitätsklasse der Rose
      description: Handelsübliche Qualitätsklasse von Schnittrosen.
    rosette_center_type:
      name: Typ des Rosettenmittelteils
      description: Gibt die Art des mittleren Details bzw. Einsatzes auf der Vorderseite
        der Rosette an.
    rosin_dust_level:
      name: Kolophoniumstaubgrad
      description: Gibt die zu erwartende Menge an Kolophoniumstaub an, die bei normaler
        Verwendung entsteht.
    rosin_formula_additives:
      name: Kolophoniumrezeptur/-zusätze
      description: Kennzeichnet besondere Formulierungsmerkmale wie hypoallergene,
        staubarme oder metallhaltige Mischungen.
    rosin_hardness:
      name: Kolophoniumhärte
      description: Gibt die relative Härte bzw. Weichheit des Bogenkolophoniums an,
        was sich je nach Klima und Spielstil auf Griffigkeit und Staubbildung auswirken
        kann.
    rotation_mechanism_type:
      name: Rotationsmechanismus
      description: Gibt den Mechanismus an, der die Rotation des Seils ermöglicht
        und sich auf Laufruhe und erreichbare Geschwindigkeit auswirkt (z. B. Kugellager
        vs. Buchsen)
    rotation_motion_features:
      name: Rotations-/Bewegungsmerkmale
      description: Gibt an, ob und wie sich Planeten/Umlaufbahnen drehen oder bewegen.
    rotor_configuration_type:
      name: Rotorkonfiguration
      description: Kennzeichnet die Rotorkonfiguration und den Steuerungsstil des
        RC-Helikopters (z. B. koaxial, Einrotor mit festem Blattwinkel vs. Collective
        Pitch, Multirotor), was die Flugeigenschaften und die Eignung für unterschiedliche
        Fähigkeitsstufen wesentlich beeinflusst.
    rotor_construction_type:
      name: Rotorbauart
      description: Gibt die Bauweise des Rotors an, die Gewicht, Steifigkeit und Wärmemanagement
        beeinflusst.
    rotor_mounting_interface:
      name: Scheibenbremsenadapter
      description: Definiert den Nabenschnittstellenstandard, der zur Befestigung
        des Rotors am Rad verwendet wird.
    rotor_mounting_standard:
      name: Standardmontage der Scheibenbremse
      description: Gibt den Schnittstellenstandard an, der zur Befestigung des Rotors
        an der Nabe verwendet wird (z. B. 6-Loch oder Center Lock).
    roulette_set_components_included:
      name: Im Rouletteset enthaltene Komponenten
      description: Wichtige Roulette-Komponenten, die im Rad/Set enthalten sind.
    roulette_wheel_ball_track_type:
      name: Typ der Kugelbahn des Roulette-Rads
      description: Beschreibt die Art der Kugelbahn des Roulette-Rads, die sich auf
        Realismus und Spielgefühl auswirkt.
    roulette_wheel_numbering_system:
      name: Nummerierungssystem des Roulette-Rads
      description: Gibt die Nummerierung des Roulette-Rads und die Nullkonfiguration
        für die Spiel-/Quotenkompatibilität an.
    rounders_equipment_included:
      name: Schlagballausrüstung inklusive
      description: Listet die spezifischen Rounders-Artikel bzw. Zubehörteile auf,
        die im Trainingshilfen-Set bzw. in der Packung enthalten sind, damit Käufer:innen
        genau wissen, was enthalten ist.
    rounders_governing_body_approval:
      name: Genehmigung durch den Rounders-Verband
      description: Gibt die Zertifizierung bzw. Genehmigung durch einen offiziellen
        Rounders- oder anderen Sportverband an.
    row_counter_format:
      name: Format des Reihenzählers
      description: Gibt das Format bzw. die Ausführung eines Strick-Reihenzählers
        an (z. B. Ring, Kette, Klicker oder digital).
    row_counter_mechanism:
      name: Mechanismus des Reihenzählers
      description: Gibt an, wie die Reihenzahl am Werkzeug weitergeschaltet bzw. aufgezeichnet
        wird.
    row_counter_mounting_method:
      name: Befestigungsmethode des Reihenzählers
      description: Gibt an, wie der Zähler bzw. Marker während der Verwendung befestigt
        wird (an der Nadel, am Finger, am Projekt usw.).
    rowel_type:
      name: Sporenart
      description: Beschreibt die Form bzw. das Kantenprofil des Sporenrads im Hinblick
        auf Reitvorlieben und Pferdeempfindlichkeit.
    rowing_machine_part_type:
      name: Typ des Rudergeräteteils
      description: Kennzeichnet die spezifische Komponente, die das Produkt an einem
        Rudergerät ersetzen soll, damit Käufer:innen schnell das exakt benötigte Teil
        finden können, ohne eine Vielzahl von Mikrokategorien zu schaffen.
    rubber_ducky_character_theme:
      name: Quietscheenten-Figur/-Thema
      description: Thema bzw. Figurendesign der Quietscheente (nützlich für Sammler-
        oder Neuheiten-Quietscheenten).
    rubber_ducky_features:
      name: Merkmale der Quietscheente
      description: Funktionale bzw. gestalterische Merkmale speziell für Quietscheenten-Badespielzeug.
    rubber_ducky_size_class:
      name: Größenklasse der Quietscheente
      description: Eine kundenfreundliche Größeneinteilung für Quietscheenten basierend
        auf der typischen Verwendung (Badewannenspielzeug vs. Tortenaufsatz vs. Jumbo).
    ruffle_style:
      name: Rüschenstil
      description: Beschreibt die Konstruktion bzw. den visuellen Stil der Rüsche
        an einer Stuhlschärpe.
    rugby_headgear_safety_certification:
      name: Sicherheitszertifizierung für Rugby-Kopfschutz
      description: Gibt an, ob der Kopfschutz offiziellen Rugby- oder allgemeinen
        Sportsicherheitsstandards entspricht.
    rugby_size:
      name: Rugbygröße
      description: Kategorisiert Ausrüstung nach den im Rugby üblichen Größenbezeichnungen,
        die in Produkttiteln verwendet werden.
    rugby_variant:
      name: Rugby-Variante
      description: Gibt die Rugby-Variante (Code bzw. Format) an, für die das Produkt
        vorgesehen ist.
    ruler_edge_type:
      name: Linealkantentyp
      description: Kennzeichnet das Kantenprofil bzw. die Funktion, die zum Messen
        oder Markieren verwendet wird (z. B. gerade Kante, abgeschrägt oder mit Lippe).
    ruler_marking_style:
      name: Stil der Linealmarkierungen
      description: Beschreibt das auf dem Lineal aufgedruckte Markierungs-/Führungslayout,
        das über einfache Teilstriche hinausgeht.
    runner_configuration:
      name: Kufenkonfiguration
      description: Beschreibt die Anzahl und Anordnung der Kufen am Schlitten.
    runner_material:
      name: Material der Kufen
      description: Gibt das Material an, das für die Kufen bzw. Gleitstreifen des
        Schlittens verwendet wird.
    saddle_cover_style:
      name: Stil des Sattelbezugs
      description: Klassifiziert das allgemeine Design bzw. die Verwendungsart des
        Produkts (z. B. Schutzhülle, Überzug zum Reiten oder Tragetasche).
    saddle_design:
      name: Satteldesign
      description: Klassifiziert das allgemeine ergonomische bzw. entlastende Design
        des Sattels (z. B. Aussparung, ohne Nase, geteilte Nase oder gefedert).
    saddle_discipline:
      name: Satteldisziplin
      description: Gibt die primäre Reitdisziplin bzw. den vorgesehenen Verwendungszweck/Stil
        des Sattels an.
    saddle_mounting_type:
      name: Anbringungsart des Sattels
      description: Gibt die Schnittstelle zwischen Sattel und Sattelstütze zur Sicherstellung
        der Kompatibilität an (z. B. Schienen, Pivotal oder I-Beam).
    saddle_pad_shape:
      name: Form des Sattelpads
      description: Beschreibt den physischen Zuschnitt bzw. die Kontur des Pads, was
        sich auf die Sattelkompatibilität und die optische Präferenz auswirkt.
    saddle_pad_style:
      name: Art der Sattelpolsterung
      description: Kennzeichnet den funktionalen Stil bzw. die vorgesehene Disziplin
        des Pads, damit Reiter:innen das passende Design für ihre Aktivität oder ihren
        Satteltyp auswählen können.
    saddle_padding_material:
      name: Material der Sattelpolsterung
      description: Kennzeichnet das primäre Polstermaterial bzw. die Technologie im
        Inneren des Sattels, die Komfort und Fahrgefühl beeinflusst.
    saddle_rail_material:
      name: Material der Sattelstreben
      description: Gibt das Material an, das für die Streben unter einem Fahrradsattel
        verwendet wird, was sich auf Stabilität, Komfort, Gewicht und Preis auswirkt.
    saddle_tree_material:
      name: Material des Sattelbaums
      description: Gibt das Material an, das für den Sattelbaum, also das innere Gestell
        des Sattels, verwendet wird.
    saddle_tree_width:
      name: Breite des Sattelbaums
      description: Beschreibt die Breitenklassifizierung des Sattelbaums, die die
        Passform am Widerrist des Pferdes bestimmt.
    safety_documentation_available:
      name: Verfügbare Sicherheitsdokumentation
      description: Gibt an, welche Konformitäts-/Sicherheitsdokumente für den Inhaltsstoff
        bereitgestellt werden (z. B. Sicherheitsdatenblatt, IFRA-Zertifikat/-Erklärung
        oder Allergenhinweis/-deklaration).
    safety_equipment_included:
      name: Enthaltene Sicherheitsausrüstung
      description: m Set enthaltene Sicherheits-/Schutzartikel.
    safety_features:
      name: Sicherheitsvorrichtungen
      description: Kennzeichnet integrierte Sicherheitsmerkmale, die versehentliche
        Schnittverletzungen reduzieren oder die Klinge während der Aufbewahrung schützen
        sollen.
    safety_harness_type:
      name: Typ des Sicherheitsgurts
      description: Gibt die Ausführung und Konfiguration des mit dem Sitz gelieferten
        Kindersicherheitsgurts an.
    safety_mechanism_type:
      name: Sicherheitsmechanismus
      description: Beschreibt die Art des integrierten Sicherheitssystems, das die
        Langhantel bei misslungenen Hebeversuchen auffängt.
    safety_restraint_type:
      name: Typ der Sicherheitsrückhaltevorrichtung
      description: Art der integrierten Kindersicherung am Schaukelsitz, falls vorhanden.
    safety_warning:
      name: Sicherheitswarnung
      description: Gibt an, ob das Produkt übliche Sicherheitswarnungen für Spielzeugmurmeln
        enthält (z. B. Erstickungsgefahr).
    sail_shape:
      name: Segelform
      description: Beschreibt die geometrische Form des Kajaksegels, die Effizienz,
        Handhabung und Montage beeinflusst.
    salad_dressing_type:
      name: Art des Salatdressings
      description: Kennzeichnet den grundlegenden Stil bzw. die Konsistenz des Dressings
        (z. B. cremig, Vinaigrette oder auf Joghurtbasis) und hilft Käufer:innen dabei,
        verschiedene Grundlagen und Konsistenzen zu unterscheiden.
    salad_topping_base_ingredient:
      name: Grundzutat des Salat-Toppings
      description: Gibt die Hauptzutatenkategorie des Toppings an und hilft Kund:innen
        dabei, nach Ernährungspräferenzen, Allergenen oder gewünschter Konsistenz
        zu filtern.
    salt_level:
      name: Salzgehalt
      description: Gibt die Menge an Salz bzw. Natrium an, die den Nüssen oder Samen
        zugesetzt wurde.
    sand_cup_features:
      name: Merkmale des Sandbechers
      description: Funktionale bzw. physische Merkmale des Sandbechers bzw. der Sandbecher,
        die Spiel und Nutzung beeinflussen.
    sand_shovel_handle_style:
      name: Griffstil der Sandschaufel
      description: Beschreibt die Form des Griffs bzw. der Griffzone am Ende des Schaufel-/Spatenstiels.
    sand_toy_set_pieces_included:
      name: Inbegriffene Teile des Sandspielzeug-Sets
      description: Listet die Arten von Sandspielzeug-Komponenten auf, die im Set
        enthalten sind (z. B. Eimer, Schaufel oder Förmchen), damit Käufer:innen Sets
        anhand ihres Inhalts vergleichen können.
    sand_water_mill_items_included:
      name: Enthaltene Artikel der Sand- und Wassermühle
      description: Listet die wichtigsten Zubehörteile auf, die im Lieferumfang der
        Spielzeugmühle enthalten sind (Eimer, Schaufeln, Förmchen usw.).
    sandbag_style:
      name: Sandsackstil
      description: Kennzeichnet das spezifische Design und den vorgesehenen Trainingseinsatz
        des Sandsacks (z. B. Bulgarian, Strongman oder Power) und hilft Käufer:innen
        bei der Auswahl zwischen verschiedenen Trainingsarten.
    sandbox_bottom_type:
      name: Typ des Sandkastenbodens
      description: Die Art der Boden- bzw. Unterkonstruktion unter dem Sand.
    sandbox_drainage_type:
      name: Entwässerungstyp des Sandkastens
      description: Gibt an, wie der Sandkasten Wasser ableitet (falls zutreffend),
        z. B. über Ablauflöcher oder einen herausnehmbaren Stopfen.
    sandbox_seating_type:
      name: Sandkasten-Sitzgelegenheit
      description: Gibt an, ob der Sandkasten integrierte Sitzgelegenheiten enthält
        und wenn ja, welche Art.
    sapodillo_variety:
      name: Sapodillo-Sorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät von Sapodillo/Chikoo
        (z. B. „Alano“ oder „Prolific“), damit Liebhaber:innen bevorzugte Geschmacksprofile
        und Eigenschaften auswählen können.
    sapote_variety:
      name: Auswahl an Sapoten
      description: Gibt die jeweilige angebotene Sapote-Art bzw. den angebotenen Typ
        an (z. B. schwarz, weiß oder Mamey), damit Käufer:innen zwischen verschiedenen
        Sorten unterscheiden können.
    satin_ribbon_face_type:
      name: Satinausführung des Bands
      description: Gibt an, ob das Band auf einer oder auf beiden Seiten satiniert
        ist.
    sauce_consistency:
      name: Konsistenz der Sauce
      description: Beschreibt die Konsistenz bzw. Dicke der Pizzasauce.
    sauce_product_form:
      name: Produktformat der Sauce
      description: Gibt die physische Form des Saucenprodukts an, z. B. Flüssigkeit,
        Öl, Paste, Pulver, Flocken oder Sirup.
    sauce_variety:
      name: Saucenart
      description: Kennzeichnet die spezifische Art bzw. Rezeptfamilie der weißen
        Sauce bzw. Sahnesauce (z. B. Alfredo, Béchamel oder Hollandaise).
    saxophone_body_finish:
      name: Oberflächenfinish des Saxophonkorpus
      description: Beschreibt die primäre Oberflächenbehandlung bzw. Beschichtung
        des Saxophonkorpus (getrennt von der Mechanik).
    saxophone_body_type:
      name: Bauweise des Saxophonkorpus
      description: Beschreibt die allgemeine physische Konfiguration des Basssaxophonkorpus
        und die Ausrichtung des Schallbechers.
    saxophone_construction_style:
      name: Bauweise des Saxophons
      description: Gibt gängige Konstruktionsmerkmale von Saxophonen an, die sich
        auf Haltbarkeit, Resonanz und Wartung auswirken.
    saxophone_included_accessories:
      name: Enthaltenes Zubehör für das Saxophon
      description: Listet Zubehörteile auf, die üblicherweise mit einem Altsaxophon-Bundle
        geliefert werden.
    saxophone_key_system:
      name: Klappensystem des Saxophons
      description: Kennzeichnet das am Instrument verwendete Saxophon-Klappensystem
        (Layout-/Mechanismusstandard).
    saxophone_key_touch_material:
      name: Material der Saxophonklappenauflagen
      description: Gibt das Material an, das für die Klappenauflagen des Saxophons
        verwendet wird (z. B. Perlmuttauflagen).
    saxophone_mouthpiece_baffle_type:
      name: Baffle-Typ des Saxophonmundstücks
      description: Beschreibt das Baffle-Design, das Luftstrom und Klanghelligkeit
        beeinflusst.
    saxophone_neck_type:
      name: Typ des Saxophonhalses
      description: Gibt die Halskonfiguration an, die mit dem Basssaxophon geliefert
        wird.
    saxophone_package_contents:
      name: Inhalt des Saxophonpakets
      description: Listet auf, welches wichtige Zubehör im Lieferumfang des Saxophons
        enthalten ist (z. B. Koffer, Mundstück, Blattschraube, Halsgurt oder Reinigungsset).
    saxophone_reed_cut:
      name: Schnitt des Saxophonblatts
      description: Gibt den Schnitt bzw. die Ausführung des Saxophonblatts an, was
        Ansprache, Klang und Spielgefühl beeinflusst.
    saxophone_reed_material_type:
      name: Materialtyp des Saxophonblatts
      description: Gibt die Materialkategorie des Blatts an (z. B. Rohrblatt oder
        synthetisch).
    saxophone_reed_strength_scale:
      name: Stärke-Skala des Saxophonblatts
      description: Gibt das für das Blatt verwendete Stärke-Nummerierungssystem bzw.
        die Skala an (häufig markenabhängig), um einen besseren Vergleich zwischen
        Angeboten zu ermöglichen.
    saxophone_small_part_thread_size:
      name: Gewindegröße von Saxophon-Kleinteilen
      description: Gibt die Gewindegröße bzw. den Gewindestandard für kleine Gewindeteile
        des Saxophons an (hauptsächlich Schrauben), damit die richtige Passform ausgewählt
        werden kann.
    saxophone_swab_application_area:
      name: Einsatzbereich des Saxophonwischers
      description: Gibt an, welcher Teil des Saxophons mit dem Wischer gereinigt bzw.
        getrocknet werden soll.
    scabbard_material:
      name: Material der Scheide
      description: Gibt das Hauptmaterial der gegebenenfalls enthaltenen Schwertscheide
        an.
    scale_model_assembly_status:
      name: Montagezustand des Modellbausatzes
      description: Gibt an, ob das Modell ausstellungsbereit ist oder montiert bzw.
        bemalt werden muss.
    scale_model_car_features:
      name: Merkmale des Modellautos
      description: Besondere Merkmale des Modellautos, z. B. zu öffnende Türen/Motorhaube,
        lenkbare Räder oder Federung.
    scale_model_kit_assembly_requirements:
      name: Montageanforderungen des Modellbausatzes
      description: Gibt an, welche zusätzlichen Montageschritte bzw. Materialien typischerweise
        über die einfache Steckmontage hinaus erforderlich sind.
    scale_model_kit_components_included:
      name: Enthaltene Komponenten des Modellbausatzes
      description: Listet auf, was im Lieferumfang des Panzer-Modellbausatzes enthalten
        ist (z. B. Abziehbilder, Figuren oder Fotoätzteile).
    scale_model_paint_status:
      name: Lackierstatus des Modellbausatzes
      description: Gibt an, ob das Hubschraubermodell bereits lackiert/fertiggestellt
        ist oder noch lackiert werden muss.
    scale_model_pose:
      name: Pose des Miniaturmodells
      description: Gibt die dargestellte Pose des Pferdemodells zur Abstimmung mit
        Display bzw. Diorama an.
    scale_model_rotor_configuration:
      name: Rotorkonfiguration des Modellbausatzes
      description: Gibt die vom Modell dargestellte Hubschrauber-Rotorkonfiguration
        an.
    scale_model_truck_era:
      name: Epoche de
      description: Gibt die Epoche bzw. den Zeitraum des realen Lkw an, den das Modell
        darstellt (nützlich für Sammler:innen, die Oldtimer- statt moderne Lkw suchen).
    scale_model_truck_propulsion_type:
      name: Antriebsart des Modell-Lkw
      description: Gibt an, ob der dargestellte Lkw mit Diesel-, Benzin-, Elektro-,
        Hybrid- oder einem anderen Antrieb ausgestattet ist (wie im Modell dargestellt
        bzw. vermarktet).
    scale_units:
      name: Maßeinheiten
      description: Die auf dem Balken aufgedruckten bzw. eingravierten Maßeinheiten
        zum Einstellen von Radius/Durchmesser.
    scent_function:
      name: Duftfunktion
      description: Definiert die Hauptfunktion eines Duftprodukts, damit Jäger:innen
        schnell das passende Produkt auswählen können (z. B. Lockstoff vs. Geruchsneutralisierer).
    scent_source:
      name: Duftquelle
      description: Listet die primäre biologische bzw. aromatische Quelle auf, die
        in der Produktformulierung verwendet wird, darunter Urinarten, lebensmittelbasierte
        Duftstoffe, Pflanzenaromen usw.
    school_bus_body_type:
      name: Karosserietyp des Schulbusses
      description: Klassifiziert einen Schulbus nach den auf dem Markt üblichen Karosserie-/Klassenformaten
        (z. B. Typ A–D).
    school_bus_safety_feature:
      name: Sicherheitsmerkmal des Schulbusses
      description: Besondere Sicherheitsausstattung, die im Schulbus installiert ist.
    school_glue_washability:
      name: Auswaschbarkeit von Schulkleber
      description: Gibt an, wie leicht sich getrockneter bzw. nasser Kleber von Haut,
        Kleidung bzw. Oberflächen entfernen lässt.
    scissors_application:
      name: Einsatzbereich der Schere
      description: Das primäre vorgesehene Schneidmaterial bzw. der Haupteinsatzbereich
        der Schere.
    scooter_brake_pad_material:
      name: Material der Rollerbremsbeläge
      description: Gibt die Zusammensetzung der Bremsbeläge an, die sich auf Leistung,
        Geräuschentwicklung und Lebensdauer auswirkt.
    scoring_method:
      name: Wertungsmethode
      description: Gibt an, wie Punkte am Tischkicker gezählt werden, z. B. mit manuellen
        Kugelzählern oder elektronischen Anzeigetafeln.
    scoring_pattern:
      name: Punktezonenmuster
      description: Layout der auf dem Spielfeld aufgedruckten Punktezonen.
    scoring_system_type:
      name: Zählart für die Spielstandmessung
      description: Beschreibt die Art des im Tisch enthaltenen Punktezählmechanismus,
        z. B. manuelle Schieberegler oder verschiedene elektronische Anzeigen.
    scottish_smallpipes_bag_material:
      name: Material des Scottish-Smallpipes-Sacks
      description: Gibt das Material des mit den Smallpipes gelieferten Sacks (Luftreservoirs)
        an.
    scottish_smallpipes_drone_tuning_configuration:
      name: Bordun-Stimmkonfiguration der Scottish Smallpipes
      description: Gibt die mit dem Instrument gelieferte Bordun-Stimmkonfiguration
        an (die Tonhöhen/Rollen der Bordune relativ zur Tonika).
    scottish_smallpipes_reed_type:
      name: Rohrblatttyp der Scottish Smallpipes
      description: Gibt den Rohrblatttyp an, der für die Spielpfeife verwendet wird
        (und/oder ob synthetische oder Rohrblätter aus Schilfrohr verwendet werden).
    scraping_surface_type:
      name: Oberfläche des Scrapers
      description: Gibt die Konstruktion bzw. Geometrie der Schabfläche an, die den
        Klang erzeugt (z. B. gerillt, kamm-/zahnartig oder geriffelt).
    screw_drive_type:
      name: Schraubenantriebstyp
      description: Gibt die Art des Antriebsprofils am Schrauben- bzw. Bolzenkopf
        an und damit das Werkzeug, das zum Festziehen bzw. Lösen benötigt wird (z. B.
        Innensechskant/Inbus oder Torx).
    screw_thread_size:
      name: Gewindegröße der Schrauben
      description: Gibt den Gewindegrößenstandard der enthaltenen bzw. kompatiblen
        Schrauben an (z. B. M4, M5, M6).
    sculpting_clay_base_type:
      name: Basistyp der Modelliermasse
      description: Beschreibt die zugrunde liegende Zusammensetzung bzw. Basis der
        Modelliermasse.
    seafood_cut:
      name: Zuschnitt der Meeresfrüchte
      description: Beschreibt den physischen Zuschnitt bzw. die Präsentationsform
        des Meeresfrüchteprodukts (z. B. ganz, Filet oder Steak).
    seafood_processing_method:
      name: Verarbeitungsmethode für Meeresfrüchte
      description: Gibt die primäre Konservierungs- bzw. Verarbeitungsmethode an,
        die auf die Meeresfrüchte angewendet wurde, z. B. geräuchert, gesalzen oder
        gefriergetrocknet.
    seafood_source:
      name: Herkunft der Meeresfrüchte
      description: Gibt an, ob die Meeresfrüchte aus Wildfang, Aquakultur, pflanzlicher
        Herkunft oder einer anderen Quelle stammen, und hilft Käufer:innen dabei,
        Nachhaltigkeit und Qualität zu beurteilen.
    seal_material:
      name: Dichtungsmaterial
      description: Material der Dichtungen bzw. Manschetten an Hals, Handgelenken
        und Knöcheln, die den Anzug wasserdicht halten.
    seal_type:
      name: Dichtungstyp
      description: Gibt die Dichtungsmethode an, die von der Armatur verwendet wird,
        um Kühlmittellecks zu verhindern.
    sealant_formulation:
      name: Dichtmittelformulierung
      description: Kennzeichnet die primäre chemische Zusammensetzung oder Additivtechnologie
        des Fahrradreifendichtmittels (z. B. auf Latexbasis, faserverstärkt, Acryl).
    seals_leak_type:
      name: Art des Dichtungslecks
      description: Art/Position des Lecks im Kühlsystem, das das Produkt abdichten
        soll.
    seam_construction:
      name: Nahtkonstruktion
      description: Beschreibt, wie die Naht des Balls gefertigt ist, was sich auf
        Flugverhalten, Haltbarkeit und Spielgefühl auswirkt.
    seam_design:
      name: Saumstil
      description: Gibt die Nahtkonstruktion bzw. dekorative Nahtmerkmale der Strumpfwaren
        an.
    seam_gauge_scale_type:
      name: Skalierungstyp der Nahtlehre
      description: Gibt an, welche Skalen bzw. Markierungen zusätzlich zur Grundskala
        auf der Nahtlehre vorhanden sind.
    seam_gauge_slider_material:
      name: Material des Nahtlehren-Schiebers
      description: Kennzeichnet das Material des verstellbaren Schieber- bzw. Zeigerelements,
        sofern vorhanden.
    seam_ripper_tip_style:
      name: Spitzenform des Nahttrenners
      description: Beschreibt die funktionale Spitzenform, mit der unter Stiche geglitten
        und Fäden sicher durchtrennt werden können.
    seam_sealing_type:
      name: Art der Nahtabdichtung
      description: Beschreibt die Methode, mit der das Eindringen von Wasser an den
        Nähten des Regenanzugs verhindert wird (z. B. vollständig versiegelt oder
        verschweißt).
    seam_type:
      name: Nahtart
      description: Beschreibt die Nahtart des Baseballs, die sich auf Griffigkeit,
        Aerodynamik und das vorgesehene Spielniveau auswirkt.
    season_condition_protection:
      name: Saison-/Wetterschutz
      description: Gibt an, vor welchen Wetterbedingungen bzw. Einflüssen die Windschutzscheibenabdeckung
        hauptsächlich schützen soll.
    season_rating:
      name: Saisonklassifizierung
      description: Gibt die Saisonklassifizierung des Zelts an und zeigt damit seine
        Eignung für unterschiedliche Wetterbedingungen an (z. B. 3-Jahreszeiten, 4-Jahreszeiten
        oder 5-Jahreszeiten/Expedition).
    seasoning_variety:
      name: Gewürzart
      description: Klassifiziert das Gewürz nach seiner Zubereitungsart bzw. traditionellen
        kulinarischen Verwendung.
    seat_adjustment_power_type:
      name: Antriebsart der Sitzverstellung
      description: Gibt an, wie die Sitzverstellmechanismen betätigt werden (manuelle
        Hebel vs. Elektromotoren), was sich auf Verkabelung bzw. Kompatibilität auswirken
        kann.
    seat_belt_attachment_type:
      name: Befestigungsart des Sicherheitsgurts
      description: Gibt an, wie der Gurt an der Fahrzeug- bzw. Gurthardware befestigt
        wird.
    seat_belt_buckle_electrical_connector_type:
      name: Elektrischer Steckertyp des Sicherheitsgurtschlosses
      description: Gibt den Stecker bzw. die Schnittstelle an, die gegebenenfalls
        für die Verkabelung von Gurtschloss-Schalter bzw. Gurtstraffer verwendet wird.
    seat_belt_buckle_mounting_type:
      name: Befestigungsart des Sicherheitsgurtschlosses
      description: Beschreibt, wie das Gurtschloss bzw. die Aufnahme am Fahrzeug,
        Sitz oder Gurtbandhalter befestigt wird (z. B. verschraubt oder eingeklipst).
    seat_belt_buckle_release_button_color:
      name: Farbe des Entriegelungsknopfs des Sicherheitsgurtschlosses
      description: Gibt die Farbe des Entriegelungsknopfs des Gurtschlosses an.
    seat_belt_cover_placement:
      name: Position der Sicherheitsgurtabdeckung
      description: Gibt an, an welcher Stelle des Sicherheitsgurts die Abdeckung verwendet
        werden soll.
    seat_belt_integration:
      name: Sicherheitsgurteinbau
      description: Gibt an, ob der Sitz über einen integrierten Sicherheitsgurt und/oder
        eine integrierte Gurtschlossaufnahme verfügt oder ob die OEM-Gurtschlossaufnahme
        des Fahrzeugs für die Montage übernommen werden muss.
    seat_belt_provision:
      name: Sicherheitsgurtausstattung
      description: Gibt an, ob Sicherheitsgurte und/oder zugehörige Gurthardware (z. B.
        Gurtschlösser) im Lieferumfang der Rücksitzbaugruppe enthalten sind oder vom
        Originalsitz übernommen werden müssen.
    seat_belt_strap_installation_location:
      name: Einbauort des Sicherheitsgurtbandes
      description: Gibt an, wo der Riemen innerhalb des Gurtsystems angebracht wird.
    seat_cover_placement:
      name: Position des Sitzbezugs
      description: Gibt an, für welche Sitzposition(en) im Fahrzeug der Bezug vorgesehen
        ist.
    seat_cover_securement_method:
      name: Befestigungsmethode des Sitzbezugs
      description: Gibt die primäre Befestigungsart des Sitzbezugs am Sitz an. Wenn
        mehrere Methoden verwendet werden, wählen Sie die wichtigste bzw. primäre
        Methode aus.
    seat_cover_set_contents:
      name: Inhalt des Sitzbezug-Sets
      description: Beschreibt, welche Teile im Paket enthalten sind (z. B. nur Sitzflächen
        vs. kompletter Sitz + Kopfstützen).
    seat_fabric:
      name: Sitzmaterial
      description: Hauptmaterial für Sitz- und Rückenlehnenbespannung des Stuhls.
    seat_height_category:
      name: Sitzhöhenkategorie
      description: Klassifiziert den Hocker nach typischen Sitzhöhenbereichen (z. B.
        Tresen- oder Barhöhe), um die Auswahl zu vereinfachen.
    seat_material:
      name: Sitzmaterial
      description: Gibt das Hauptmaterial der Sitzfläche der Bank an.
    seat_mounting_type:
      name: Sitzmontageart
      description: Montage- bzw. Schienenkonfiguration zur Befestigung des Sitzes
        am Fahrzeugboden.
    seating_surface_material:
      name: Oberflächenmaterial der Sitzfläche
      description: Gibt das Material der Liegefläche an (z. B. Textilene-Netzgewebe,
        Gurtgewebe, Korbgeflecht oder gepolsterter Bezug).
    seatpost_clamp_mechanism:
      name: Klemmmechanismus der Sattelstütze
      description: Art des Klemm- bzw. Verschlusssystems zur Befestigung der Sattelstütze.
    section_orientation_compatibility:
      name: Kompatibilität der Abschnittsausrichtung
      description: Gibt an, ob das Zubehör zu einem linksseitigen, rechtsseitigen
        oder universell ausgerichteten Modul passt.
    sectional_configuration:
      name: Konfiguration des Modulsofas
      description: Definiert das konkrete Modul bzw. die Ausrichtung der Sofaeinheit
        (z. B. Ecke, linkes Armteil oder Chaiselongue), damit gewünschte Konfigurationen
        zusammengestellt werden können.
    sectional_shape:
      name: Form des Modulsofas
      description: Definiert die geometrische Gesamtkonfiguration bzw. das Layout
        des Modulsofas.
    secured_components:
      name: Gesicherte Komponenten
      description: Listet die spezifischen Fahrradteile auf, die durch Schnellspanner
        oder Sicherheitsmuttern geschützt werden (z. B. Vorderrad, Hinterrad oder
        Sattelstütze).
    seed_content:
      name: Kerngehalt
      description: Gibt an, ob die Zitrusfrucht kernlos, kernarm oder kernreich ist.
    seed_size_classification:
      name: Klassifizierung der Samengröße
      description: Gibt die relative Größe des ungenießbaren Kerns im Inneren der
        Litschi an, was die Menge des essbaren Fruchtfleischs beeinflusst.
    self_adhesive_backing_format:
      name: Art der selbstklebenden Rückseite
      description: Physische Form der mit der Dochtlasche gelieferten Kleberückseite
        (voraufgebrachtes Pad vs. separate Aufkleber usw.).
    self_adhesive_hook_loop_backing_type:
      name: Typ der selbstklebenden Klettverschlussrückseite
      description: Gibt Aufbau von Trägermaterial bzw. Schutzfolie sowie das auf der
        selbstklebenden Seite verwendete Klebstoffsystem an.
    self_adhesive_hook_loop_fastener_shape:
      name: Form des selbstklebenden Klettverschlusses
      description: Gibt Schnitt bzw. Form der enthaltenen Befestigungsteile an.
    self_hardening_clay_finish:
      name: Oberflächenfinish des selbsthärtenden Tons
      description: Beschreibt Erscheinungsbild bzw. Glanz der Oberfläche nach vollständiger
        Aushärtung (hilfreich bei der Auswahl zwischen Naturmatt, Satin usw.).
    self_hardening_clay_water_resistance_after_curing:
      name: Wasserbeständigkeit von selbsthärtendem Ton nach dem Aushärten
      description: Gibt die Beständigkeit gegenüber Wassereinwirkung nach vollständiger
        Aushärtung an (ohne zusätzliches Dichtmittel).
    sensor_functions:
      name: Sensorfunktionen
      description: Gibt an, welche Fahrradkennzahlen der Sensor misst.
    sensor_measurement_mode:
      name: Sensormessmodus
      description: Gibt an, welche Kennzahlen der Sensor erfassen kann (z. B. nur
        Trittfrequenz, nur Geschwindigkeit oder Geschwindigkeit und Trittfrequenz).
    sensor_mounting_position:
      name: Montageposition des Sensors
      description: Gibt die Position am Fahrrad oder Fahrer an, an der der Sensor
        installiert wird, z. B. Kurbelarm, Radnabe oder Schuh. Dies beeinflusst die
        Kompatibilität mit verschiedenen Fahrradkonfigurationen.
    sensor_mounting_type:
      name: Montageart des Sensors
      description: Gibt an, wie der MAP-Sensor am Ansaugkrümmer bzw. Motor befestigt
        wird (z. B. Schraubflansch vs. Steckmuffe).
    sensor_or_gauge_mounting_location:
      name: Montageort des Sensors bzw. Messgeräts
      description: Gibt an, wo am Fahrzeug der Sensor bzw. das Messgerät installiert
        werden soll (System-/Standortebene, nicht links/rechts).
    sensory_modality:
      name: Sinnesmodalität
      description: Primäre Sinneserfahrung(en), die das Spielzeug bieten soll (kann
        multisensorisch sein).
    sensory_toy_fidget_mechanism:
      name: Fidget-Mechanismus des sensorischen Spielzeugs
      description: Primärer Interaktionsmechanismus für Fidgeting und Selbstregulation.
    sensory_toy_light_features:
      name: Lichtfunktionen des sensorischen Spielzeugs
      description: Lichtverhalten/-effekte des Spielzeugs.
    sensory_toy_texture_type:
      name: Texturart des sensorischen Spielzeugs
      description: Dominante Oberflächen- bzw. Texturelemente zur taktilen Stimulation.
    sequin_application_method:
      name: Anbringungsmethode der Pailetten
      description: Gibt an, wie die Paillette angebracht bzw. verwendet werden soll
        (aufnähen vs. aufkleben vs. hitzefixieren usw.).
    sequin_finish:
      name: Paillettenfinish
      description: Beschreibt Oberflächenfinish bzw. optischen und reflektierenden
        Effekt der auf dem Aufnäher verwendeten Pailletten (z. B. matt, metallisch
        oder holografisch), nicht jedoch Rückseite oder Befestigungsart des Aufnähers.
    serger_stitch_functions:
      name: Stichfunktionen der Overlockmaschine
      description: Gibt die von der Overlockmaschine unterstützten Stichfunktionen
        an (Overlock-/Overedge-Varianten und spezielle Overlockstiche).
    serger_thread_count:
      name: Fadenanzahl der Overlockmaschine
      description: Anzahl der Fäden, die die Overlockmaschine zum Nähen verwenden
        kann (z. B. 2-/3-/4-/5-Fadenfähigkeit).
    service_interval:
      name: Serviceintervall
      description: Empfohlener maximaler Zeitraum zwischen erforderlichen Inspektionen
        bzw. Wartungen durch eine autorisierte Servicestelle.
    serving_temperature:
      name: Serviertemperatur
      description: Gibt die vorgesehene Serviertemperatur bzw. den Zustand des Produkts
        beim Verzehr an.
    sesame_seed_hull_status:
      name: Zustand der Sesamsamenschale
      description: Gibt an, ob das Tahini aus geschälten oder ungeschälten Sesamsamen
        hergestellt wird, was Farbe, Geschmack und Nährwerte beeinflusst.
    sesame_seed_roast_level:
      name: Röstgrad der Sesamsamen
      description: Gibt an, wie stark die Sesamsamen vor dem Mahlen geröstet wurden,
        damit leichter die gewünschte Geschmacksintensität gewählt werden kann.
    sesame_seed_variety:
      name: Sesamsamensorte
      description: Kennzeichnet Farbe oder Sorte der zur Herstellung des Öls verwendeten
        Sesamsamen.
    set_classification:
      name: Setklassifizierung
      description: Definiert das vorgesehene Spielniveau bzw. den Stil des Krocketsets
        (z. B. Turnier, Freizeit oder Reise).
    set_components:
      name: Setbestandteile
      description: Gibt an, welche Bestandteile im Produkt enthalten sind (z. B. nur
        Mittelstange vs. komplettes Set).
    set_items_included:
      name: Im Set enthaltene Artikel
      description: Gibt die im Set enthaltenen Kleidungsstücke oder Accessoires an,
        z. B. Sari-Stoff, Dupatta oder Gürtel.
    setup_mechanism:
      name: Aufbaumechanismus
      description: Beschreibt die primäre Aufbaumethode des Zelts (z. B. Pop-up, aufblasbar/Airbeam
        oder Dachzelt mit Klappmechanismus).
    setup_type:
      name: Aufbauart
      description: Beschreibt, wie das Spielzelt bzw. der Spieltunnel aufgebaut oder
        aufgestellt wird.
    sew_in_interfacing_elasticity:
      name: Elastizität der einnähbaren Einlage
      description: Gibt an, ob die einnähbare Einlage dehnbar ist und falls ja, in
        welche Richtung(en), passend für Strick- oder Webprojekte.
    sew_in_label_placement:
      name: Platzierung des Einnählabels
      description: Gibt den vorgesehenen Platzierungsort auf dem fertigen Artikel
        an.
    sew_on_edge_finish:
      name: Kantenverarbeitung zum Annähen
      description: Gibt an, ob die Klettverschlusskanten roh/geschnitten oder gegen
        Ausfransen verarbeitet sind.
    sew_on_rhinestone_hole_orientation:
      name: Lochausrichtung der aufnähbaren Strasssteine
      description: Anordnung bzw. Ausrichtung der Löcher relativ zum Stein (z. B.
        nebeneinander, gegenüberliegend oder kreuzförmig) zur Unterstützung verschiedener
        Sticharten.
    sewing_kit_components_included:
      name: Im Nähset enthaltene Artikel
      description: Listet die im Nähset enthaltenen Nähutensilien bzw. Werkzeuge auf,
        damit verglichen werden kann, was in den einzelnen Sets enthalten ist.
    sewing_machine_bobbin_class:
      name: Spulenklasse der Nähmaschine
      description: Gibt die mit der Nähmaschine kompatible Spulenklasse bzw. das Spulensystem
        für Spulen und Spulenkapseln an.
    sewing_machine_buttonhole_type:
      name: Knopflochtyp der Nähmaschine
      description: Beschreibt die von der Maschine unterstützte Methode zur Knopflocherstellung.
    sewing_machine_display_type:
      name: Anzeigetyp der Nähmaschine
      description: Art der Bedien- bzw. Anzeigeschnittstelle der Nähmaschine.
    sewing_machine_needle_point_type:
      name: Typ der Nähmaschinennadelspitze
      description: Definiert Spitzengeometrie bzw. Spitzenart der Nadel, die bestimmt,
        wie sie verschiedene Stoffe durchdringt (z. B. spitz vs. Kugelspitze vs. Keilspitze).
    sewing_machine_needle_system:
      name: System der Nähmaschinennadeln
      description: Das standardisierte Nadelsystem bzw. die Modellnummer, die die
        Maschinenkompatibilität bestimmt (häufig angegeben als 130/705 H, HAx1, DBx1,
        15x1 usw.).
    sewing_machine_needle_type:
      name: Art der Nähmaschinennadeln
      description: Gibt den vorgesehenen Einsatzbereich bzw. Stil der Nadel an (z. B.
        Universal, Kugelspitze oder Jeans/Denim), was Stichqualität und Stoffeignung
        beeinflusst.
    sewing_machine_shank_type:
      name: Schaftart der Nähmaschinennadeln
      description: Gibt den Schaft-/Halterungsstandard des Nähfußes an, für den der
        Fuß ausgelegt ist, um die Kompatibilität mit der Nähmaschine sicherzustellen
        (z. B. niedriger Schaft, hoher Schaft oder Schrägschaft).
    sewing_pattern_accessory_type:
      name: Zubehörart des Schnittmusters
      description: Gibt an, welches Accessoire mit dem Schnittmuster hergestellt wird.
    sewing_pattern_notions_required:
      name: Erforderliches Nähzubehör für das Schnittmuster
      description: Listet wichtige zusätzliche Materialien bzw. Zubehörteile auf,
        die zur Fertigstellung des Projekts benötigt werden (zusätzlich zu Stoff und
        Garn).
    sewing_pattern_recommended_fabric:
      name: Empfohlener Stoff für das Schnittmuster
      description: Listet die empfohlenen Stoffarten bzw. Stoffgewichte für das Schnittmuster
        auf (gemäß den Angaben des Schnittmusterdesigners).
    sewing_pattern_size_range:
      name: Größenbereich des Schnittmusters
      description: Gibt den vorgesehenen Größenbereich an, den das Schnittmuster abdeckt
        (z. B. Baby bis Erwachsene oder Plus-Size-Größen).
    sewing_thread_size_system:
      name: Größenbezeichnungssystem für Nähgarn
      description: Der Standard zur Angabe der Garnstärke (z. B. Tex, Denier, Ticket,
        Gewichtszahl oder V-Größe).
    shaft_curvature:
      name: Schaftkrümmung
      description: Beschreibt die allgemeine Form des Schafts, die Freiraum, Schwung
        und Ergonomie beeinflusst.
    shaft_kick_point:
      name: Schaft-Kickpunkt
      description: Kennzeichnet die Position entlang des Schafts, an der er sich während
        des Schwungs am stärksten biegt, was die Flugbahn des Balls beeinflusst.
    shaft_length_type:
      name: Schaftlänge
      description: Branchenübliche kategorische Größenbezeichnung für Dartschäfte
        (z. B. Short oder Medium), die verwendet wird, wenn keine genauen Millimeterangaben
        vorliegen.
    shaft_shape:
      name: Schaftform
      description: Definiert das Querschnittsprofil des Tonfa-Schafts (z. B. rund,
        quadratisch oder achteckig).
    shaker_fill_material:
      name: Füllmaterial des Shakers
      description: Gibt die primäre Innenfüllung an, die zur Erzeugung des Schüttelgeräuschs
        verwendet wird (falls zutreffend), z. B. Perlen, Samen oder Schrot.
    shaker_shell_material:
      name: Außenmaterial des Shakers
      description: Gibt das primäre Material des Eierschüttlers bzw. des Gehäuses
        an (das äußere Gehäuse).
    shallot_variety:
      name: Schalottensorte
      description: Kennzeichnet die spezifische Sorte, den Markttyp oder die Varietät
        des Schalottenprodukts.
    shank_style:
      name: Stil des Schafts
      description: Beschreibt die allgemeine Form bzw. Konfiguration der Schäfte des
        Kandarengebisses (z. B. gerade, gebogen oder grazing).
    shapewear_enhancement_feature:
      name: Shapewear-Verbesserungsfunktion
      description: Hebt die primäre funktionale Verbesserung hervor, die das Kleidungsstück
        bietet (z. B. Bauchkontrolle, Po-Lifting oder auslaufsicheres Futter).
    sheath_type:
      name: Scheidentyp
      description: Art der Scheide bzw. des Köchers, die bzw. der dem Sammlermesser
        beiliegt.
    sheet_music_clip_padding_material:
      name: Polstermaterial der Notenblattklemme
      description: Material der Backen- bzw. Griffpolsterung, die mit Papier oder
        der Kante des Notenständers in Kontakt kommt, um Reißen und Verrutschen zu
        verhindern.
    sheet_music_clip_spring_tension_level:
      name: Federspannungsstufe der Notenblattklemme
      description: Relative Stärke der Clipfeder bzw. Klemmkraft.
    sheet_music_clip_use_environment:
      name: Einsatzumgebung der Notenblattklemme
      description: Primäre Einsatzumgebung, für die die Klemme entwickelt wurde.
    shell_construction:
      name: Kesselkonstruktion
      description: Gibt an, wie der Bassdrum-Kessel konstruiert ist, was Klang und
        Gewicht stark beeinflusst.
    shell_finish:
      name: Oberflächenfinish des Kessels
      description: Äußere Oberflächenbehandlung des Doumbek-Kessels.
    shell_hull_status:
      name: Schalen-/Hüllenzustand
      description: Gibt an, ob Nüsse oder Samen mit intakter oder entfernter Schale
        bzw. Hülle verkauft werden.
    shift_boot_attachment_method:
      name: Befestigungsmethode der Schaltmanschette
      description: Gibt an, wie die Schaltmanschette an Fahrzeugkonsole bzw. Schalthebelverkleidung
        befestigt wird (z. B. einclipsbarer Zierrahmen, Haltering oder Klebstoff).
    shift_boot_installation_hardware_included:
      name: Enthaltenes Montagematerial für die Schaltmanschette
      description: Listet das mit der Schaltmanschette gelieferte Montagematerial
        und die enthaltenen Komponenten auf.
    shift_knob_illumination:
      name: Beleuchtung des Schaltknaufs
      description: Gibt an, ob der Schaltknauf beleuchtet ist und welche Beleuchtungsart
        verwendet wird (z. B. photolumineszent, LED, faseroptisch oder hinterleuchtetes
        Muster).
    shift_knob_installation_method:
      name: Montagemethode des Schaltknaufs
      description: Gibt an, wie der Schaltknauf am Schalthebel befestigt wird.
    shift_knob_shape:
      name: Form des Schaltknaufs
      description: Beschreibt die allgemeine ergonomische Form des Schaltknaufs.
    shift_pattern_type:
      name: Typ des Schaltschemas
      description: Gibt die Art der Gangmarkierung auf dem Schaltknauf an (falls vorhanden).
    shifter_compatibility:
      name: Kompatible Schaltungen
      description: Gibt an, ob die Lenkerverlängerung mit elektronischen Schalthebeln,
        mechanischen Schalthebeln, beiden oder keinem Schalthebel kompatibel ist.
    shifter_mounting_interface:
      name: Montagehalterung der Schaltung
      description: Beschreibt, wie der Schalthebel am Fahrrad befestigt wird (z. B.
        bestimmte Klemmgröße, I-Spec, MatchMaker, Lenkerende, Unterrohr oder kabellos).
    shifting_actuation_type:
      name: Art der Schaltbetätigung
      description: Kennzeichnet den Mechanismus zum Schalten der Gänge in der Schaltgruppe
        (mechanisch, elektronisch kabelgebunden, elektronisch kabellos oder hydraulisch).
    shifting_mechanism:
      name: Schaltmechanismus
      description: Gibt an, ob der Schalthebel mechanisch oder elektronisch funktioniert
        und ob er indexiert oder reibungsbasiert ist.
    shim_purpose:
      name: Zweck der Unterlegscheibe
      description: Definiert den Funktionstyp des Produkts (z. B. Unterlegscheibe,
        Keil oder Distanzstück), damit Radfahrer schnell die passende Einstellungslösung
        finden können, ohne separate Unterkategorien zu benötigen.
    shin_guard_attachment_method:
      name: aBefestigungsmethode des Schienbeinschoners für Schienbeinschoner
      description: Klassifiziert das allgemeine Design des Schienbeinschoners, einschließlich
        integrierter Knöchelschützer oder Sockenkonstruktion.
    shirt_cuff_style:
      name: Bündchenstil
      description: Beschreibt die Konstruktion der Ärmelmanschette, die Formalität,
        Kombinierbarkeit mit Manschettenknöpfen und Tragekomfort beeinflusst.
    shochu_base_ingredient:
      name: Grundzutat für Shochu
      description: Gibt die primäre Stärke- oder Zuckerquelle an, die zur Herstellung
        von Shochu verwendet wird.
    shochu_soju_variety:
      name: Shochu- und Soju-Sorte
      description: Klassifiziert das Produkt nach anerkanntem Stil bzw. Herstellungstyp.
    shock_absorber_bushing_material:
      name: Material der Stoßdämpferbuchsen
      description: Material der Montagebuchsen bzw. Isolatoren, die mit dem Stoßdämpfer
        geliefert oder darin integriert sind.
    shock_absorber_charge_type:
      name: Typ der Stoßdämpferfüllung
      description: Gibt die Dämpfungs- bzw. Fülltechnologie des Stoßdämpfers an (z. B.
        hydraulisch/Öl, gasgefüllt oder Luft) und gegebenenfalls die zugehörige Rohrkonstruktion.
    shock_absorber_mount_type_lower:
      name: Typ der (unteren) Stoßdämpferbefestigung
      description: Typ der unteren Befestigungsschnittstelle des Stoßdämpfers zur
        Sicherstellung der Passgenauigkeit.
    shock_absorber_mount_type_upper:
      name: Typ der (oberen) Stoßdämpferbefestigung
      description: Gibt den Typ der (oberen) Befestigungsschnittstelle eines Fahrzeugstoßdämpfers
        zur Sicherstellung der Passgenauigkeit bzw. Kompatibilität an.
    shock_absorber_position:
      name: Position des Stoßdämpfers
      description: Gibt an, ob der Stoßdämpfer für die vordere, hintere, linke oder
        rechte Position am Fahrzeug vorgesehen ist (genauer als nur die Achsposition).
    shock_absorption_system:
      name: Stoßdämpfungssystem
      description: Definiert den Mechanismus zur Reduzierung von Vibrationen und Geräuschen
        beim Rückfedern.
    shoe_collar_height:
      name: Höhe des Schuhkragens
      description: Klassifiziert Schuhe nach Schaft- bzw. Kragenhöhe (Low-Top, Mid-Top
        oder High-Top), um Knöchelabdeckung und Halt anzugeben.
    shoe_cover_height:
      name: Höhe der Überschuhe
      description: Gibt den Abdeckungsgrad des Fahrradschuhüberzugs an und unterscheidet
        zwischen Zehenüberzügen und hochgeschnittenen Überschuhen.
    shoe_sizing_system:
      name: Schuhgrößensystem
      description: Gibt den für die angegebene Schuhgröße verwendeten Größenstandard
        an (US, UK, EU, JP, Mondopoint usw.).
    shoelace_aglet_material:
      name: Material der Schnürsenkelenden
      description: Gibt das Material der Spitzen (Aglets) an den Enden der Schnürsenkel
        an, das Haltbarkeit und Stil beeinflusst.
    shooting_rest_design:
      name: Design der Schießauflage
      description: Klassifiziert die Bauart der Auflage (Sackauflage, Schlittenauflage,
        Dreibeinauflage, Gewehrschraubstock usw.).
    shooting_stick_yoke_design:
      name: Design des Schießstockjochs
      description: Gibt die Art der Halterung bzw. des Jochs an, die bzw. das mit
        der Schusswaffe oder Optik verwendet wird.
    shooting_target_style:
      name: Stil der Schießscheibe
      description: Klassifiziert Stil bzw. Design von Schusszielen für Eiskunstlauf
        und Hockey, damit der passende Trainingsschwerpunkt gewählt werden kann.
    shooting_target_type:
      name: Art der Zielscheiben
      description: Klassifiziert Schießziele nach Bauart, Material oder Design (z. B.
        Gong, Silhouette, Papier-Bullseye oder Spinner), damit schnell das passende
        Ziel für Disziplin und Waffentyp gefunden werden kann.
    short_block_assembly_balance_type:
      name: Auswuchtungsart der Shortblock-Baugruppe
      description: Gibt an, ob die rotierende Baugruppe intern oder extern ausgewuchtet
        ist.
    short_block_intended_use:
      name: Verwendungszweck des Shortblocks
      description: Primärer Verwendungszweck des Shortblocks.
    short_block_rotating_assembly_included:
      name: Enthaltene rotierende Baugruppe des Shortblocks
      description: Gibt an, welche Hauptkomponenten der rotierenden Baugruppe im Shortblock
        enthalten sind.
    shot_size:
      name: Schrotgröße
      description: Gibt die Schrotgrößenbezeichnung für loses Schrot oder Munitionskomponenten
        an.
    shotgun_action_type:
      name: Verschlussart der Schrotflinte
      description: Gibt den Funktions- bzw. Verschlussmechanismus der Schrotflinte
        an.
    shotgun_choke_type:
      name: Choke-Typ der Schrotflinte
      description: Gibt die Choke-Konfiguration des bzw. der Schrotflintenläufe an.
    shotgun_gauge:
      name: Kaliber der Schrotflinte
      description: Gibt das Kaliber der Schrotflinte an (und gegebenenfalls .410 Bore)
        zur Identifizierung und Filterung in Sammlerangeboten.
    shotgun_stock_material:
      name: Material des Schrotflintenschafts
      description: Gibt das Hauptmaterial von Schaft bzw. Vorderschaft an.
    shuffleboard_speed_rating:
      name: Geschwindigkeitsbewertung für Shuffleboard
      description: Gibt die relative Gleitgeschwindigkeit an, die Shuffleboard-Pulver
        oder andere Pflegeprodukte auf dem Tisch erzeugen, damit die passende Geschwindigkeit
        für Spielniveau und Tischlänge gewählt werden kann.
    shuffleboard_table_length_compatibility:
      name: Kompatibilität mit Shuffleboard-Tischlängen
      description: Standardlänge des Shuffleboard-Tischs, für die das Produkt ausgelegt
        ist bzw. die es ergänzt.
    shuttlecock_base_material:
      name: Material des Federballkopfes
      description: Gibt das Material der Spitze bzw. Basis des Federballs an, das
        Haltbarkeit, Spielgefühl und Rückprall beeinflusst.
    shuttlecock_feather_material:
      name: Material der Federballfedern
      description: Gibt die primäre Federquelle bzw. Konstruktionsart des Federballkorbs
        an, was Haltbarkeit, Konsistenz und Preis beeinflusst.
    shuttlecock_grade:
      name: Qualitätsstufe des Federballs
      description: Gibt das vorgesehene Spielniveau bzw. die Qualitätsklassifizierung
        an (z. B. Training, Verein oder Wettkampf).
    shuttlecock_speed_rating:
      name: Geschwindigkeitsklasse des Federballs
      description: Gibt die vom Hersteller angegebene Geschwindigkeit bzw. Einstufung
        des Federballs an, damit Spieler:innen die passende Fluggeschwindigkeit für
        ihre Spielbedingungen, Temperatur und Höhenlage auswählen können.
    side_panel_installation_state:
      name: Montagezustand der Seitenwand
      description: Gibt an, ob die Seitenwand unlackiert, grundiert, lackiert oder
        anderweitig beschichtet bzw. montagefertig vorbereitet geliefert wird.
    side_wall_mechanism:
      name: Seitenwandmechanismus
      description: Beschreibt, wie sich die Seitenwand des Beistellbettchens öffnen
        bzw. absenken lässt, um Zugang zum Baby zu erhalten.
    signal_source:
      name: Signalquelle
      description: Gibt an, wie der Kilometerzähler Entfernungs- bzw. Zeitinformationen
        empfängt bzw. ermittelt.
    silk_fiber_type:
      name: Seidenfasertyp
      description: Art bzw. Herkunft der zur Herstellung des Stoffs verwendeten Seidenfaser
        (z. B. Maulbeer- oder Tussahseide), was sich auf Textur, Gleichmäßigkeit und
        Preis auswirkt.
    simulated_game_species:
      name: Simulierte Wildart
      description: Gibt an, welchen Wildvogel bzw. welches Tier die Attrappe für ein
        realistisches Training nachbildet.
    singlet_cut_style:
      name: Schnittstil des Singlets
      description: Gibt den Schnitt bzw. Stil des Wrestling-Singlets an, einschließlich
        Trägerhöhe, Rückenstil sowie Varianten für Geschlecht bzw. Jugendgrößen.
    sink_material:
      name: Waschbeckenmaterial
      description: Gibt das Material des bzw. der im Waschtisch integrierten Waschbecken
        an.
    sinker_attachment_style:
      name: Befestigungsart des Senkers
      description: Beschreibt den Mechanismus des Grundbleis zur Befestigung an Angelschnur
        bzw. Montage.
    sinker_finish:
      name: Oberflächenfinish des Senkers
      description: Gibt die äußere Beschichtung bzw. Oberflächenbehandlung des Senkers
        an.
    sinker_shape:
      name: Form des Senkers
      description: Definiert die geometrische Form des Senkers (z. B. Bullet, Zylinder
        oder Tropfenform), damit Angler:innen die optimale Präsentation und Hängerresistenz
        auswählen können.
    siren_system_included:
      name: Sirenensystem enthalten
      description: Gibt an, ob ein Sirenen-/Durchsagesystem installiert ist und um
        welchen Typ es sich handelt.
    siren_system_type:
      name: Typ des Sirenensystems
      description: Gibt die installierte Sirenen-/Durchsagekonfiguration des Polizeifahrzeugs
        an.
    size_designation:
      name: Größenbezeichnung
      description: Standardisierte Größenbezeichnung für das Triangelinstrument.
    size_system:
      name: Größensystem
      description: Gibt das Größensystem bzw. den regionalen Standard an, dem die
        Größenbezeichnung entspricht (z. B. US, UK, EU oder internationale Buchstabengrößen).
    sizzle_mechanism:
      name: Sizzle-Mechanismus
      description: Gibt an, wie das Becken den Sizzle-Effekt erzeugt (z. B. durch
        im Becken installierte Nieten, eine anbringbare Kette/einen Sizzler oder ohne
        mitgelieferte Hardware).
    skate_blade_discipline:
      name: Einsatzbereich der Schlittschuhkufe
      description: Kennzeichnet die Eislaufdisziplin bzw. den Einsatzzweck, für den
        die Kufe ausgelegt ist, z. B. Hockey oder Eiskunstlauf, damit Käufer:innen
        passende Kufen leichter finden können.
    skate_brake_type:
      name: Rollschuhbremstyp
      description: Kennzeichnet die Art des bei den Schlittschuhen integrierten Bremssystems.
    skateboard_nut_thread_size:
      name: Gewindegröße der Skateboard-Mutter
      description: Gibt die Gewindegröße (Durchmesser und Steigung) der Mutter an,
        um die Kompatibilität mit Skateboardachsen, Kingpins bzw. Befestigungshardware
        sicherzustellen.
    skein_winder_bearing_bushing_type:
      name: Lager-/Buchsentyp des Strangwicklers
      description: Gibt die Art des Lagers bzw. der Buchse an, die in der rotierenden
        Baugruppe des Strangwicklers verwendet wird.
    skein_winder_drive_type:
      name: Antriebsart des Strangwicklers
      description: Gibt an, wie der Strangwickler während der Verwendung angetrieben
        bzw. gedreht wird.
    ski_binding_mechanism:
      name: Mechanismus der Skibindung
      description: Definiert die grundlegende mechanische Konstruktion bzw. Disziplin
        der Bindung (z. B. Alpin, Tech/Pin oder Telemark).
    ski_binding_part_type:
      name: Typ des Skibindungsteils
      description: Kennzeichnet die spezifische Komponente bzw. das Zubehör für Skibindungen
        und ermöglicht ein schnelles Filtern über viele Teiletypen hinweg.
    ski_boot_sole_standard:
      name: Standard der Skischuhsohle
      description: Kennzeichnet die Sohlennorm bzw. den Bindungskompatibilitätsstandard,
        für den der Skischuh zertifiziert ist.
    skill_focus:
      name: Trainingsschwerpunkt
      description: Kennzeichnet die primäre Basketballfähigkeit, die mit dem Trainingsgerät
        verbessert werden soll.
    skimboard_construction:
      name: Bauart des Skimboards
      description: Beschreibt den grundlegenden Aufbau des Boards mit Schwerpunkt
        auf Kern- und Laminattechnik (z. B. Schaumkern oder Holzkern).
    skin_presence:
      name: Hautanteil
      description: Gibt an, ob das Hähnchen mit Haut, ohne Haut oder teilweise ohne
        Haut verkauft wird.
    slapstick_handle_type:
      name: Griffart des Slapsticks
      description: Beschreibt die Art des in den Slapstick integrierten Griffs bzw.
        Handstücks, was sich auf Ergonomie und Spielkomfort auswirkt.
    slapstick_playing_surface_material:
      name: Material der Slapstick-Spielfläche
      description: Gibt das Material der Schlagflächen an, die zur Klangerzeugung
        aufeinandertreffen.
    sled_brake_type:
      name: Schlittenbremstyp
      description: Gibt an, welcher Bremsmechanismus gegebenenfalls am Schlitten vorhanden
        ist.
    sled_towing_method:
      name: Schleppmethode des Schlittens
      description: Gibt an, wie der Schlitten hauptsächlich gezogen bzw. geschleppt
        wird.
    sleep_position_suitability:
      name: Eignung für Schlafposition
      description: Gibt an, für welche Schlafposition(en) die Matratze am besten geeignet
        ist.
    sleeping_bag_shape:
      name: Form des Schlafsacks
      description: Gesamtschnitt des Schlafsacks, der sich auf Wärmeleistung, Gewicht
        und Geräumigkeit auswirkt.
    sleeping_pad_type:
      name: Art der Isomatte
      description: Kennzeichnet die Bauweise der Isomatte, z. B. geschlossenzelliger
        Schaumstoff oder aufblasbare Luftkammern, was sich direkt auf Komfort, Gewicht
        und Isolierung auswirkt.
    sleepwear_set_pieces_included:
      name: Im Nachtwäscheset enthaltene Artikel
      description: Listet die einzelnen Bestandteile eines mehrteiligen Schlafanzug-
        bzw. Loungewear-Sets auf.
    sleeve_bearing_type:
      name: Gleitlagertyp
      description: Kennzeichnet die Technologie, die die Rotation der Hülse ermöglicht
        und sich auf die Rotationsqualität bei olympischen Gewichtheberübungen auswirkt.
    sleeve_style:
      name: Ärmelstil
      description: Gibt den Ärmelstil zusätzlich zur Ärmellänge an (z. B. Raglan).
    slide_board_accessories_included:
      name: Enthaltenes Zubehör für das Slideboard
      description: Listet zusätzliches Zubehör auf, das zusammen mit dem Slideboard
        geliefert wird, damit Käufer:innen genau wissen, was enthalten ist, und Bundles
        vergleichen können.
    slide_installation_type:
      name: Montageart der Rutsche
      description: Gibt an, wie die Rutsche installiert bzw. montiert werden soll
        (freistehend, an einem Spielgerät befestigt usw.).
    slide_intended_finger:
      name: Vorgesehener Finger für den Slide
      description: Gibt an, an welchem Finger der Slide getragen werden soll bzw.
        ob dies nicht zutrifft (z. B. bei einem Tonstab).
    slide_safety_features:
      name: Sicherheitsmerkmale der Rutsche
      description: Sicherheitsrelevante Konstruktionselemente der Rutsche.
    slide_type:
      name: Art des Zugmechanismus
      description: Gibt an, für welche Art von Blechbläser-Zugmechanismus das Produkt
        zur Reinigung vorgesehen ist.
    slide_water_use_capability:
      name: Wassernutzung der Rutsche
      description: Gibt an, ob die Rutsche für die Verwendung mit Wasser ausgelegt
        ist (z. B. mit Schlauchanschluss) und wie dies funktioniert.
    slime_putty_kit_components_included:
      name: Enthaltene Komponenten des Schleim- und Knete-Sets
      description: Listet die Werkzeuge und Zusatzmaterialien auf, die im Schleim-/Knete-Produkt
        enthalten sind (insbesondere bei Sets/Bundles).
    sling_material:
      name: Schlingenmaterial
      description: Gibt das Faser- bzw. Textilmaterial der Schlinge (Dogbone) des
        Expresssets an.
    smith_machine_bar_path:
      name: Bewegungsbahn der Smith-Maschine
      description: Beschreibt die feste Bewegungsbahn der Stange und informiert Nutzer:innen
        über Biomechanik und Platzbedarf.
    smoke_color:
      name: Rauchfarbe
      description: Farbe des Rauchs, der durch das Leucht- bzw. Rauchsignal erzeugt
        wird (abweichend von der Farbe des Produktgehäuses).
    smoked_malt_smoking_material:
      name: Räuchermaterial für geräuchertes Malz
      description: Kennzeichnet bei geräucherten Malzen das beim Räuchern verwendete
        Material (z. B. bestimmte Holzarten oder Torf).
    snack_mix_variety:
      name: Art der Snackmischung
      description: Klassifiziert das Produkt nach der Art der Mischung (z. B. Studentenfutter,
        Nussmischung, Namkeen oder Sev).
    snack_processing_method:
      name: Snackverarbeitungsmethode
      description: Gibt die primäre Verarbeitungs- bzw. Konservierungsmethode an,
        die zur Herstellung des Snacks verwendet wurde (z. B. gefriergetrocknet, gebacken
        oder geröstet).
    snack_texture:
      name: Snack-Textur
      description: Gibt Biss bzw. Mundgefühl der Sesamstangen an.
    snap_installation_method:
      name: Anbringungsmethode des Druckknopfes
      description: Beschreibt, wie der Druckknopf am Projektmaterial befestigt wird.
    snare_drum_bearing_edge_profile:
      name: Gratungsprofil der Snare-Drum
      description: Schnitt bzw. Profil der Gratung des Snare-Kessels.
    snare_drum_finish_type:
      name: Art der Snaredrum-Oberflächenbearbeitung
      description: Hochwertige Oberflächenkonstruktion bzw. Oberflächenart des Snare-Kessels.
    snare_drum_hoop_type:
      name: Art des Snaredrum-Spannreifens
      description: Art der Spannreifen bzw. Ränder, die bei der Snaredrum verwendet
        wurden.
    snare_drum_mounting_type:
      name: Bauart der Snaredrum
      description: Beschreibt, wie die Snare montiert bzw. verwendet werden soll.
    snare_drum_shell_material:
      name: Material des Snaredrumkessels
      description: Gibt das Metall bzw. die Legierung an, aus dem bzw. der der Snare-Kessel
        (der Hauptkörper) gefertigt ist, was Klang, Gewicht und Haltbarkeit stark
        beeinflusst.
    snare_drum_strainer_mechanism:
      name: Mechanismus des Snare-Abhebers
      description: Art der Mechanik zum Aufspannen bzw. Abspannen des Snareteppichs.
    snare_drum_strainer_type:
      name: Typ des Snare-Abhebers
      description: Art der Mechanik zum Aufspannen bzw. Abspannen von Snareteppichen.
    snare_hoop_type:
      name: Typ des Snare-Spannreifens
      description: Art der Spannreifen bzw. Ränder der Snare-Drum.
    snare_throw_off_type:
      name: Typ des Snare-Abwurfs
      description: Art des Abheber- bzw. Abwurfmechanismus zum Aktivieren bzw. Deaktivieren
        der Snareteppiche.
    snip_cutter_spring_mechanism:
      name: Federmechanismus des Fadenschneiders
      description: Gibt an, ob der Fadenschneider über einen Feder- bzw. Rückstellmechanismus
        verfügt und um welche Bauart es sich handelt.
    snorkel_mount_position:
      name: Position der Schnorchelhalterung
      description: Beschreibt, wo der Schnorchel während der Nutzung am Kopf der Benutzer:innen
        positioniert ist.
    snorkel_top_type:
      name: Typ des Schnorcheloberteils
      description: Beschreibt die Art des Wasserschutzes am oberen Ende des im Set
        enthaltenen Schnorchels.
    snow_condition_suitability:
      name: Eignung für Schneeverhältnisse
      description: Beschreibt die hauptsächlichen Schneeverhältnisse, für die das
        Wachs vorgesehen ist.
    snow_sports_helmet_safety_certification:
      name: Sicherheitszertifizierung für Schneesporthelme
      description: Gibt an, welche(n) Sicherheitsstandard(s) der Helm für Ski- und
        Snowboardeinsätze erfüllt.
    snowboard_base_material:
      name: Belagsmaterial des Snowboards
      description: Kennzeichnet die Zusammensetzung bzw. Oberflächenbeschaffenheit
        des Belags (extrudiert, gesintert, proprietäre Mischungen), die sich auf Geschwindigkeit,
        Haltbarkeit und Wartungsaufwand auswirkt.
    snowboard_width_class:
      name: Snowboardbreitenklasse
      description: Klassifiziert die Gesamtbreite des Boards im Verhältnis zur Schuhgröße
        (z. B. Regular oder Wide).
    soccer_ball_compartment_type:
      name: Art des Fußballfachs
      description: Gibt an, wie (bzw. ob) der Rucksack einen Fußball aufnimmt.
    soccer_ball_type:
      name: Typ des Fußballs
      description: Gibt den vorgesehenen Einsatzbereich bzw. die Art des Fußballs
        an (z. B. Spielball, Trainingsball oder Futsal), damit Käufer:innen schnell
        die passende Variante finden können, ohne viele Unterkategorien durchsuchen
        zu müssen.
    soccer_dummy_base_type:
      name: Standfußtyp der Fußball-Attrappe
      description: Beschreibt die Art des Sockels bzw. Verankerungsmechanismus der
        Attrappe.
    soccer_dummy_design:
      name: Design der Fußball-Attrappe
      description: Gibt die Bauart der Fußballtor-Attrappe an, z. B. starr oder aufblasbar.
    soccer_goal_target_style:
      name: Stil des Fußballtor-Ziels
      description: Definiert die Bauform bzw. das Design des Trainingsziels, damit
        Käufer:innen den Stil auswählen können, der am besten zu ihren Übungen passt.
    soccer_goal_type:
      name: Art des Fußballtors
      description: Gibt die Bauart bzw. den vorgesehenen Einsatzbereich des Tors an
        (z. B. Pop-up, Rebounder oder Street).
    sock_cushioning:
      name: Sockenpolsterung
      description: Gibt Umfang und Art der unter dem Fuß integrierten Polsterung bzw.
        Dämpfung der Socke an.
    sock_cushioning_level:
      name: Grad der Sockenpolsterung
      description: Gibt den Umfang der unter dem Fuß integrierten Polsterung der Socke
        an.
    sock_grip_type:
      name: Art der Sockenhaftung
      description: Beschreibt vorhandene Haft- bzw. Antirutschmerkmale an der Sohle
        der Socke.
    sock_toe_style:
      name: Zehenstil der Socke
      description: Beschreibt die Konstruktionsart des Zehenbereichs der Socke.
    soft_bait_style:
      name: Stil des Weichköders
      description: Klassifiziert die Körperform bzw. das Profil des Weichplastikköders
        (z. B. Wurm, Swimbait oder Grub).
    soft_top_attachment_type:
      name: Anbringungsart des Stoff- oder Textilverdecks
      description: Gibt an, wie das Verdeck am Fahrzeug befestigt wird (z. B. Schienen,
        Druckknöpfe oder Klettverschluss).
    soft_top_includes_frame_hardware:
      name: Verdeck enthält Rahmen/Beschläge
      description: Gibt an, ob das Produkt den Verdeckrahmen/die Verdeckbügel und/oder
        das Montagematerial enthält.
    soft_top_installation_type:
      name: Montageart des Verdecks
      description: Beschreibt, wie das Fahrzeugverdeck montiert bzw. befestigt wird,
        einschließlich der erwarteten Montagemethode und des erforderlichen Aufwands.
    soft_top_window_configuration:
      name: Fensterkonfiguration des Stoff- oder Textilverdecks
      description: Gibt an, wie viele Fenster das Verdeck besitzt und an welchen Positionen
        sie sich befinden.
    softball_certification:
      name: Softballzertifizierung
      description: Listet die auf dem Ball aufgedruckten Verbandsstempel bzw. Zulassungen
        auf, die die Eignung für Liga bzw. Spiel bestimmen.
    softness_level:
      name: Weichheitsgrad
      description: Gibt an, wie weich bzw. flach die Schlaufenseite ist, was für Hautkomfort
        und Anwendungen mit geringer Materialstärke relevant ist.
    solar_system_model_included_bodies:
      name: Enthaltene Himmelskörper im Sonnensystemmodell
      description: Gibt an, welche Himmelskörper im Modellset dargestellt sind.
    solar_system_model_scaling:
      name: Maßstab des Sonnensystemmodells
      description: Gibt an, ob das Sonnensystemmodell maßstabsgetreu in Bezug auf
        Planetengrößen, Entfernungen/Umlaufbahnen, beides oder als schematische/nicht
        maßstabsgetreue Darstellung ausgeführt ist.
    sold_secure_certification_level:
      name: Sold-Secure-Zertifizierungsstufe
      description: Gibt die Sold-Secure-Bewertung an, die dem Schloss von der unabhängigen
        britischen Prüfstelle verliehen wurde (Bronze, Silber, Gold oder Diamant).
    sold_secure_rating:
      name: Sold-Secure-Bewertung
      description: Gibt die dem Schloss zugewiesene Sold-Secure-Zertifizierungsstufe
        an.
    sole_construction:
      name: Sohlenmachart
      description: Gibt an, wie die Schuhsohle aufgebaut ist (durchgehend, Split-Sohle,
        zweiteilig usw.), was sich direkt auf Flexibilität, Bodenkontakt und die Eignung
        für bestimmte Tanztechniken auswirkt.
    sole_type:
      name: Sohlentyp
      description: Beschreibt die strukturelle Bauweise der Sohle und gibt Hinweise
        auf Flexibilität und vorgesehenen Einsatzbereich.
    soprano_saxophone_body_style:
      name: Bauform des Sopransaxophons
      description: Beschreibt die physische Bauform des Sopransaxophonkorpus.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Baffle-Typ des Sopransaxophonmundstücks
      description: Beschreibt das Baffle-/Dachdesign des Mundstücks (die Kontur hinter
        der Spitze), das sich auf Klanghelligkeit, Projektion und Ansprache auswirkt.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Größe der Kammer des Sopransaxophon-Mundstücks
      description: Beschreibt die Größe der Innenkammer des Sopransaxophon-Mundstücks,
        die Widerstand und Klangfarbe beeinflusst.
    soprano_saxophone_mouthpiece_finish:
      name: Mundstückfinish des Sopransaxophons
      description: Oberflächenfinish bzw. Beschichtung des Mundstücks (falls zutreffend).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Enthaltenes Zubehör für das Sopransaxophon-Mundstück
      description: Gibt an, welches Zubehör im Lieferumfang des Mundstücks enthalten
        ist.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Klangcharakter des Sopransaxophon-Mundstücks
      description: Allgemeines Klangprofil, das typischerweise mit dem Mundstückdesign
        verbunden ist.
    sound_character:
      name: Klangcharakter
      description: Beschreibt den allgemeinen Klangcharakter des Slapsticks.
    sound_expansion_method:
      name: Methode zur Sounderweiterung
      description: Gibt an, wie das Modul seine interne Soundbibliothek über die Werkssounds
        hinaus erweitern kann (z. B. durch Content-Pakete, Sample-Import oder Erweiterungskarten).
    sound_module_sound_library_focus:
      name: Schwerpunkt der Soundbibliothek des Soundmoduls
      description: Beschreibt den Schwerpunkt des werkseitigen Soundsets, damit Käufer:innen
        das passende Modul für ihren Stil bzw. Einsatzzweck finden können.
    sound_port_type:
      name: Art der Schallöffnung
      description: Beschreibt die Konstruktion des Schalllochs bzw. der Schallöffnung
        auf der Rückseite des Cajóns, die Projektion und Bassansprache beeinflusst.
    sound_sensitivity_control:
      name: Regelung der Schallempfindlichkeit
      description: Gibt an, ob und wie die Schallempfindlichkeit angepasst werden
        kann.
    sound_synthesizer_patch_memory:
      name: Patchspeicher des Klangsynthesizers
      description: Gibt an, ob der Synthesizer Presets (Patches) speichern und abrufen
        kann.
    sound_type:
      name: Klangart
      description: Primäre Klangarten bzw. Audioausgaben der Matte (z. B. Instrumente,
        Lieder oder Sprachansagen), die das Spiel begleiten.
    soundboard_material:
      name: Resonanzbodenmaterial
      description: Material des Resonanzbodens (der Decke) der Harfe, das Resonanz
        und Klang beeinflusst.
    soup_or_broth_variety:
      name: Art der Suppe bzw. Brühe
      description: Gibt die Art, das Rezept bzw. die kulinarische Zubereitung der
        Suppe bzw. Brühe an, damit Käufer:innen schnell ihre bevorzugte Sorte finden
        können.
    sour_cream_variety:
      name: Sauerrahm-Art
      description: Klassifiziert Sauerrahmprodukte nach ihrer spezifischen Sorte bzw.
        regionalen Art, z. B. Crème fraîche oder mexikanische Crema.
    soy_sauce_variety:
      name: Auswahl an Sojasaucen
      description: Kennzeichnet die spezifische Art bzw. Rezeptur der Sojasauce (z. B.
        hell, dunkel, Tamari oder Ponzu), damit Käufer:innen schnell nach Geschmacksprofil
        und kulinarischem Verwendungszweck filtern können.
    spark_plug_electrode_material:
      name: Material der Zündkerzenelektrode
      description: Material bzw. Technologie der Elektroden-Spitze(n) am Zündende
        der Zündkerze (Mittel- und/oder Masseelektrode), wie vermarktet (z. B. Kupfer,
        Platin oder Iridium).
    spark_plug_seat_type:
      name: Sitztyp der Zündkerze
      description: Art der Dichtung bzw. des Sitzes der Zündkerze an der Schnittstelle
        zum Zylinderkopf.
    spark_plug_terminal_type:
      name: Art des Zündkerzensteckers
      description: Art des oberen Anschlusskontakts zur Verbindung mit Zündkabel bzw.
        Zündkerzenstecker.
    sparkler_shape:
      name: Form der Wunderkerze
      description: Allgemeine Form bzw. Gestaltung der Wunderkerze.
    speaker_cone_material:
      name: Material der Lautsprechermembran
      description: Hauptmaterial der Lautsprechermembran (Tieftöner-/Mitteltönermembran).
    speaker_size:
      name: Lautsprechergröße
      description: Nenn- bzw. Einbaugröße des Komponentenlautsprechers (z. B. 6,5
        Zoll oder 6 × 9 Zoll), passend für werkseitige Einbauorte und Lautsprecheradapter.
    special_effects_output_interface:
      name: Ausgangsschnittstelle für Spezialeffekte
      description: Gibt den Ausgangsanschluss bzw. die Schnittstelle an, die zur Steuerung
        von Spezialeffektgeräten verwendet wird.
    special_effects_stand_stability_features:
      name: Stabilitätsmerkmale des Spezialeffekt-Stativs
      description: Gibt integrierte Stabilitäts- und Sicherheitsmerkmale an, die ein
        Umkippen bzw. Verrutschen während Veranstaltungen verhindern sollen.
    specialty_malt_name_type:
      name: Name/Art des Spezialmalzes
      description: Kennzeichnet die konkrete Spezialmalzsorte bzw. -art (häufig als
        Handelsbezeichnung verwendet).
    specimen_presentation:
      name: Präsentationsform des Exponats
      description: Gibt an, wie das Sammlerstück präpariert bzw. präsentiert wird
        (z. B. roh/unbearbeitet, poliert, geschnitten oder montiert).
    speed_bag_accessories_included:
      name: Enthaltenes Zubehör für den Speedbag
      description: Listet zusätzliches Zubehör auf, das zusammen mit dem Speedbag
        geliefert wird, z. B. Handschuhe, Luftpumpen, Wirbel, Ketten oder Ständer.
    speed_rating:
      name: Geschwindigkeitsklasse
      description: Gibt die Geschwindigkeit der Spielfläche des Billardtuchs an (z. B.
        langsam, mittel oder schnell).
    speedometer_backlight_type:
      name: Art der Tachometer-Hintergrundbeleuchtung
      description: Gibt an, ob und wie der Tachometer zur besseren Sichtbarkeit bei
        Nacht hinterleuchtet ist.
    speedometer_display_type:
      name: Art der Tachometeranzeige
      description: 'Gibt die Art der Geschwindigkeitsanzeige des Tachometers an: analoger
        Zeiger/Zifferblatt, digitale Zahlenanzeige oder eine Kombination aus analogen
        und digitalen Elementen.'
    speedometer_unit_of_measure:
      name: Maßeinheit des Tachometers
      description: Gibt die auf Zifferblatt bzw. Display angezeigten Geschwindigkeitseinheiten
        an.
    spike_replaceability:
      name: Austauschbarkeit der Spikes
      description: Gibt an, ob die Spikes des Schuhs austauschbar, fest montiert oder
        ob keine Spikes vorhanden sind.
    spike_shape:
      name: Form des Spikes
      description: Kennzeichnet die geometrische Form der Spike-Spitze, die Griffigkeit
        und Eignung für verschiedene Laufbahnoberflächen beeinflusst.
    spike_thread_size:
      name: Gewindegröße der Spikes
      description: Gibt die Größe bzw. den Standard des Gewindesockels an, der in
        den Schuh eingeschraubt wird (z. B. 1/4-20).
    spin_classification:
      name: Dreheigenschaft
      description: Gibt das Rotationsprofil an, für das der Diskus ausgelegt ist (niedrig,
        mittel, hoch oder Hyper-Spin).
    spin_profile:
      name: Spin-Rate
      description: Gibt die relativen Spin-Eigenschaften an, die durch den Schaft
        unterstützt werden.
    spin_types_supported:
      name: Unterstützte Spin-Arten
      description: Listet die Spin-Arten auf, die die Maschine den Bällen verleihen
        kann, damit Spieler:innen gegen verschiedene Schlagarten trainieren können.
    spinach_preparation_style:
      name: Zubereitungsart des Spinats
      description: Beschreibt die physische Aufbereitung der Spinatblätter bzw. das
        Produktformat (z. B. ganze Blätter, gehackt oder gewürfelt).
    spinach_variety:
      name: Spinatart
      description: Kennzeichnet die botanische bzw. marktübliche Spinatart (z. B.
        Babyspinat, Wirsing-Spinat, Wasserspinat oder roter Spinat), damit Käufer:innen
        genau die gewünschte Sorte auswählen können.
    spindle_bearing_surface_material:
      name: Material der Spindel-Lagerfläche
      description: Material der Auflage- bzw. Lagerfläche von unterstützten Spindeln
        (Spitze/Boden), das Laufruhe und Verschleiß beeinflusst.
    spindle_bearing_type:
      name: Art des Spindelhalters
      description: Art der Spindelspitzen-/Lagerschnittstelle, die die Reibung an
        Stützschale bzw. Stützbecher reduziert.
    spindle_finish:
      name: Oberflächenfinish der Spindel
      description: Oberflächenfinish bzw. Beschichtung der Spindel, die Haptik, Haltbarkeit
        und Optik beeinflusst.
    spindle_hook_type:
      name: Typ des Spindelhakens
      description: Der Garnfangmechanismus am oberen Ende der Spindel zur Befestigung
        des Vorfadens bzw. Garns.
    spindle_support_method:
      name: Art der Spindelunterstützung
      description: Beschreibt, wie die Spindel beim Spinnen gestützt werden soll.
    spindle_tip_style:
      name: Form der Spindelspitze
      description: Form bzw. Gestaltung der Spitze, die in der Schale bzw. im Becher
        aufliegt (die Lagerfläche) und Reibung sowie Laufruhe beeinflusst.
    spindle_whorl_position:
      name: Position des Spindelwirtels
      description: Gibt an, an welcher Position der Wirtel auf der Spindelwelle sitzt.
    spinner_blade_shape:
      name: Form des Spinnerblatts
      description: Kennzeichnet die primäre Form des Spinnerblatts, die Vibration,
        Lichtreflexion und Lauftiefe beeinflusst.
    spinner_control_card_design_type:
      name: Design/Typ der Spinner-Kontrollkarte
      description: Beschreibt die Art der Spinner-Kontrollkarte hinsichtlich der Darstellung
        von Steuerinformationen (z. B. Übersetzungsreferenz, Spannungsreferenz oder
        Umrechnungstabelle).
    spinner_subtype:
      name: Spinner-Untertyp
      description: Klassifiziert das allgemeine Spinner-Design bzw. die Spinnerfamilie
        (z. B. Inline-Spinner oder Spinnerbait).
    spinning_oil_application_area:
      name: Einsatzbereich des Spinnöls
      description: Gibt die vorgesehene(n) Auftragsstelle(n) des Öls am Spinnrad an.
    spinning_oil_application_tool:
      name: Applikationsart des Spinnöls
      description: Kennzeichnet die Art der Applikator- bzw. Verpackungsspitze zum
        kontrollierten Auftragen von Öl auf Teile des Spinnrads.
    spinning_oil_features:
      name: Eigenschaften des Spinnöls
      description: Hebt funktionale Eigenschaften hervor, die für Spinnradöle relevant
        sind (Rückstände, Fleckenbildung, Oxidation und Auswaschbarkeit).
    spinning_top_features:
      name: Kreiseleigenschaften
      description: Besondere Spielfunktionen des Kreisels zusätzlich zur normalen
        Drehfunktion.
    spinning_top_launch_mechanism:
      name: Startmechanismus des Kreisels
      description: Beschreibt, wie der Kreisel in Rotation versetzt wird.
    spinning_wheel_brake_tension_system_type:
      name: Typ des Brems-/Spannsystems des Spinnrads
      description: Gibt das Brems- bzw. Aufwickelspannungssystem an, das zur Steuerung
        der Garnaufnahme verwendet wird.
    spinning_wheel_drive_system:
      name: Antrieb des Spinnrads
      description: Gibt das Antriebssystem an, für das die Spule vorgesehen ist.
    spinning_wheel_hook_system:
      name: Hakensystem des Spinnrads
      description: Gibt an, wie das Garn entlang der Flügelarme geführt wird.
    spinning_wheel_part_application:
      name: Einsatzbereich des Spinnradteils
      description: Gibt an, für welche Komponenten des Spinnrads das Öl vorgesehen
        ist.
    spinning_wheel_portability_foldability:
      name: Tragbarkeit/Faltbarkeit des Spinnrads
      description: Gibt an, ob das Rad für den Transport zusammenklappbar ist.
    spinning_wheel_tension_adjustment_type:
      name: Art der Spannungseinstellung des Spinnrads
      description: Beschreibt, wie die Spannung am Rad zur Steuerung der Garnaufnahme
        eingestellt wird.
    splice_termination_type:
      name: Art der Spleiß-/Endverbindung
      description: Gibt die Endverbindung der Ankerleine an (z. B. gespleißte Öse,
        Kausche oder Kettenhaken).
    split_shot_cut_type:
      name: Kerbentyp des Split-Shot-Gewichts
      description: Gibt die Nut- bzw. Öffnungsart an, die die Befestigung an der Angelschnur
        ermöglicht.
    split_shot_shape:
      name: Split-Shot-Form
      description: Beschreibt die physische Form des Split-Shot-Gewichts, die Hydrodynamik
        und Hängerresistenz beeinflusst.
    split_shot_size:
      name: Größe des Split-Shot-Gewichts
      description: Standardisierter alphanumerischer Größencode (z. B. SSG, AAA, BB
        oder 1), der von Herstellern und Angler:innen zur Klassifizierung von Split-Shot-Gewichten
        verwendet wird. Ergänzt exakte Gewichtsangaben.
    spoiler_adjustability:
      name: Verstellbarkeit des Spoilers
      description: Gibt an, ob Winkel bzw. Höhe des Spoilers verstellbar sind.
    spoke_accessory_function:
      name: Funktion des Speichenzubehörs
      description: Klassifiziert die Hauptfunktion des Zubehörs am Rad, z. B. dekorativ,
        reflektierend oder beleuchtet.
    spoke_butting_profile:
      name: Konifizierungsprofil der Speiche
      description: Beschreibt, wie sich der Speichendurchmesser entlang der Länge
        verändert (glatt, einfach, doppelt, dreifach oder vierfach konifiziert), was
        Gewicht und Stabilität beeinflusst.
    spoke_gauge:
      name: Speichenstärke
      description: Gibt die Speichenstärke (Drahtstärke) an, mit der der Nippel kompatibel
        ist.
    spoke_interface_type:
      name: Speichenkopfdesign
      description: Gibt den Speichenkopftyp an, für den die Nabe ausgelegt ist (J-Bend,
        Straight-Pull oder T-Head).
    spoke_shape:
      name: Form der Speiche
      description: Gibt den äußeren Querschnitt des Speichendrahts an, der Aerodynamik
        und Optik beeinflusst.
    spool_form_factor:
      name: Spulenform
      description: Beschreibt die Bauform des Spulenkörpers und wie Faden bzw. Garn
        gehalten werden (z. B. Flansch- oder Kegelform).
    spoon_style:
      name: Art des Blinkerlöffels
      description: Gibt den funktionalen Untertyp bzw. die Art des Blinkerlöffels
        an, z. B. Wurf-, Flutter- oder Schleppblinker.
    sports_bra_padding_type:
      name: Art der Sport-BH-Polsterung
      description: Gibt die Art der Polsterung im Sport-BH an.
    sports_cap_style:
      name: Stil der Sportkappe
      description: Kennzeichnet die allgemeine Bauart bzw. den Stil der Kappe (z. B.
        Baseballcap oder Snapback), unabhängig vom Team-Branding.
    sports_governing_body_certification:
      name: Zertifizierung durch Sportverbände
      description: Kennzeichnet die offiziellen Zertifizierungen bzw. Zulassungen
        anerkannter Sportverbände, die bestätigen, dass das Produkt Wettkampfstandards
        erfüllt.
    sports_surface_compatibility:
      name: Kompatible Bodenbeläge
      description: Listet die Spiel- bzw. Oberflächenarten auf, auf die die Farbe
        sicher aufgetragen werden kann.
    sports_toy_set_contents:
      name: Inhalt des Sportspielzeugsets
      description: Gibt an, welche Komponenten im Sportspielzeugset enthalten sind
        (z. B. Ball, Schläger, Netz oder Ziele).
    spray_string_cleanup_method:
      name: Reinigungsmethode für Sprühschlangen
      description: Empfohlene Methode zum Entfernen bzw. Reinigen von Rückständen
        der Sprühschlangen.
    spray_string_finish_effect:
      name: Effekt der Sprühschlangen
      description: Visueller Effekt der aufgesprühten Schlangen nach dem Auftragen
        (Glanz, Reflexion und Spezialeffekte).
    spray_string_formulation_type:
      name: Eigenschaften der Sprühschlangen
      description: Beschreibt das Verhalten des Produkts während und nach dem Sprühen
        (z. B. auswaschbar oder dauerhaft).
    spray_string_recommended_surface:
      name: Empfohlene Oberfläche für Sprühschlangen
      description: Oberflächenarten, auf denen die Sprühschlangen verwendet werden
        sollen (und sich voraussichtlich wieder entfernen lassen).
    spray_string_scent:
      name: Duft der Sprühschlangen
      description: Duft- bzw. Geruchsprofil der Sprühschlangen, falls vorhanden.
    spray_string_suitable_age_group:
      name: Geeignete Altersgruppe für Sprühschlangen
      description: Empfohlenes Mindestalter bzw. geeignete Altersgruppe für eine sichere
        Nutzung.
    spread_consistency:
      name: Konsistenz des Aufstrichs
      description: Beschreibt die Textur bzw. Konsistenz des Dips oder Aufstrichs,
        um Erwartungen hinsichtlich Mundgefühl und Verwendung zu vermitteln (z. B.
        glatt, stückig oder luftig aufgeschlagen).
    spread_variety:
      name: Art des Fruchtaufstrichs
      description: Klassifiziert die jeweilige Art des Fruchtaufstrichs (z. B. Marmelade,
        Gelee, Konfitüre oder Curd), damit Käufer:innen verschiedene Zubereitungsarten
        und Konsistenzen unterscheiden können.
    spreader_bar_type:
      name: Art der Hakenplatte
      description: Gibt die Art der mit dem Trapez gelieferten bzw. kompatiblen Spreizstange
        oder des Hakensystems an.
    sprint_canoe_class:
      name: Sprint-Kanu-Klasse
      description: Gibt die offizielle Klassenbezeichnung für Sprint-Kanurennen an.
    sprout_presentation:
      name: Präsentationsform der Sprossen
      description: Kennzeichnet die physische Darreichungsform des Produkts (z. B.
        frische Sprossen, Microgreens, lebender Anzuchttopf oder Pulver).
    squash_and_gourd_variety:
      name: Kürbis- und Flaschenkürbisart
      description: Kennzeichnet die spezifische Sorte bzw. Marktvariante des Kürbisses
        oder Flaschenkürbisses, damit Käufer:innen schnell die gewünschte Art finden
        können.
    stability_class:
      name: Stabilitätsklasse
      description: Allgemeine Stabilitätsklassifizierung auf Basis von Flugwerten
        bzw. Marketingangaben.
    stabilizer_thread_size:
      name: Gewindegröße des Stabilisators
      description: Gewindespezifikation zur Befestigung eines Stabilisators oder Zubehörs
        an Bogen bzw. Armbrust.
    stabilizer_type:
      name: Art des Stabilisators
      description: Kennzeichnet die Bauart bzw. Positionsklassifizierung des Stabilisators
        für Bogen oder Armbrust.
    stages_supported:
      name: Unterstützte Stufen
      description: Gibt an, für wie viele Stufen eine Rakete bzw. ein Bausatz ausgelegt
        ist.
    stain_remover_format:
      name: Format des Fleckenentferners
      description: Gibt die Darreichungsform des Produkts zur Behandlung von Fahrzeugflecken
        an (Sprühflasche, Aerosol, Schaum, Gel, Pulver, Tücher oder Stift/Marker).
    stake_shape:
      name: Form des Zeltpflocks
      description: Definiert den Querschnitt bzw. die Bauform eines Zeltpflocks, was
        die Haltekraft in unterschiedlichen Bodenarten beeinflusst.
    stamp_block_features:
      name: Merkmale des Stempelblocks
      description: Hebt funktionale Merkmale von Stempelblöcken hervor, z. B. Messraster,
        Griffe oder rutschfeste Oberflächen.
    stamp_block_type:
      name: Art des Stempelblocks
      description: Gibt die Bauart bzw. den Stil des Stempelblocks an, der zur Befestigung
        von Stempeln verwendet wird (z. B. transparenter Acrylblock, Holzblock oder
        Positionierungsblock).
    stamp_set_pieces_included:
      name: Im Stempelset enthaltene Artikel
      description: Gibt an, welche Komponenten im Stempel- und Stempelkissen-Set enthalten
        sind (z. B. Stempel, Stempelkissen oder Marker).
    stand_padding_material:
      name: Polsterungsmaterial des Ständers
      description: Material, das an den Kontaktstellen zum Schutz der Instrumentenoberfläche
        verwendet wird (z. B. Schaumstoff, Gummi oder Silikon).
    staple_fiber_animal_fiber_type:
      name: Tierfaserart der Stapelfaser
      description: Spezifische Faserart tierischen Ursprungs, wenn die Stapelfaser
        tierischen Ursprungs ist.
    staple_fiber_crimp_level:
      name: Kräuselungsgrad der Stapelfaser
      description: Grad der natürlichen Kräuselung bzw. Welligkeit der Faser.
    staple_fiber_preparation_type:
      name: Aufbereitungsart der Stapelfaser
      description: Der Aufbereitungs- bzw. Verarbeitungszustand der Faser beim Verkauf
        (Ausrichtung/Handhabung), der sich stark auf Spinnmethode, Verstreckbarkeit
        und Endergebnis auswirkt.
    staple_fiber_source_type:
      name: Herkunftsart der Stapelfaser
      description: Allgemeine Herkunftskategorie des Faserinhalts.
    starch_processing_type:
      name: Verarbeitungsart der Stärke
      description: Gibt an, ob die Stärke naturbelassen oder physikalisch bzw. chemisch
        modifiziert wurde (z. B. Instantstärke oder vorverkleisterte Stärke), um bestimmte
        funktionale Eigenschaften wie Verdickungsgeschwindigkeit oder Temperaturbeständigkeit
        zu erzielen.
    starch_source:
      name: Stärkequelle
      description: Gibt die botanische Quelle an, aus der die Kochstärke bzw. das
        Verdickungsmittel gewonnen wird (z. B. Mais, Kartoffel oder Tapioka). Die
        Herkunft ist das wichtigste Unterscheidungsmerkmal bei Kochstärken und beeinflusst
        direkt die Eignung für Rezepte, Allergenhinweise und das Suchverhalten der
        Verbraucher:innen.
    starfruit_variety:
      name: Sternfrucht-Sorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät der Sternfrucht
        (z. B. Arkin oder Fwang Tung).
    starter_drive_type:
      name: Art des Anlassers
      description: Art des Starter-Antriebs-/Eingriffsmechanismus zum Eingriff des
        Ritzels in den Zahnkranz.
    starter_pistol_action_type:
      name: Funktionsart der Startpistole
      description: Kennzeichnet den Schuss-/Funktionsmechanismus der Startpistole
        (z. B. Single Action, Double Action oder halbautomatisch).
    starter_pistol_caliber:
      name: Kaliber der Startpistole
      description: Gibt das Kaliber der Platzpatrone bzw. Munition an, für das die
        Startpistole ausgelegt ist.
    starter_terminal_type:
      name: Art des Anlasseranschlusses
      description: Gibt die Anschlussart an, die für elektrische Verbindungen am Anlasser
        bzw. Anlassermagnetschalter verwendet wird (z. B. Bolzen-, Flach- oder Steckanschluss).
    starting_block_anchoring_method:
      name: Verankerungsmethode des Startblocks
      description: Beschreibt, wie die Blöcke auf der Laufbahn befestigt werden (z. B.
        Spikes, Saugnäpfe oder Gummipads).
    steerer_tube_design:
      name: Bauart des Gabelschafts
      description: Beschreibt die Bauart des Gabelschafts – gerade, konisch, mit Gewinde
        usw. –, die die Kompatibilität mit Steuersatz und Rahmen bestimmt.
    steering_cable_end_fitting_type:
      name: Art des Lenkkabel-Endanschlusses
      description: Kennzeichnet die Anschlussart an den Enden eines Wasserfahrzeug-Lenkkabels
        (Steuerstand- sowie Motor-/Pinnenende), um die Kompatibilität mit den Anschlussstellen
        von Steuerstand und Motor sicherzustellen. Verwenden Sie gegebenenfalls die
        Standard- bzw. Herstellerbezeichnung.
    steering_column_adjustability_features:
      name: Einstellfunktionen der Lenksäule
      description: Gibt an, welche Einstellfunktionen in die Lenksäule integriert
        sind.
    steering_column_ignition_provision:
      name: Vorrichtung für das Zündschloss der Lenksäule
      description: Gibt an, ob die Lenksäule für die Aufnahme eines Zündschlosszylinders/-schalters
        und/oder einer Lenkradsperre ausgelegt ist.
    steering_column_shaft_end_interface_type:
      name: Schnittstellentyp des Lenksäulenwellenendes
      description: Kennzeichnet die Anschlussart des Lenksäulenwellenendes (z. B.
        Keilwelle, Doppel-D oder Passfederverbindung).
    steering_column_shift_type:
      name: Schaltart der Lenksäule
      description: Gibt an, ob die Lenksäule einen Lenksäulenschalthebel enthält und
        für welchen Getriebetyp er ausgelegt ist.
    steering_component_drive_type:
      name: Antriebsart der Lenkkomponente
      description: Gibt den Antriebs- bzw. Unterstützungsmechanismus für Lenkungskomponenten
        an (insbesondere Pumpen und EPS-Systeme).
    steering_position:
      name: Lenkposition
      description: Gibt an, ob der Transporter Links- oder Rechtslenkung hat.
    steering_pump_pulley_type:
      name: Riemenscheibentyp der Lenkpumpe
      description: Gibt den Riemenscheibenantrieb bzw. die Schnittstelle an, die mit
        der Lenkpumpe verwendet wird.
    steering_rack_finish_coating:
      name: Oberfläche/Beschichtung des Lenkgetriebes
      description: Gibt die äußere Oberflächenbehandlung bzw. Beschichtung zum Korrosionsschutz
        an.
    steering_rack_position:
      name: Position des Lenkgetriebes
      description: Gibt an, an welcher Stelle das Lenkgetriebe im Fahrzeuglenksystem
        montiert bzw. verwendet wird.
    steering_wheel_cover_installation_type:
      name: Montageart der Lenkradabdeckung
      description: Beschreibt, wie die Lenkradabdeckung am Lenkrad montiert bzw. befestigt
        wird.
    steering_wheel_grip_material:
      name: Material des Lenkradgriffs
      description: Gibt das Material des Lenkradkranzes bzw. Griffs (Kontaktfläche
        für die Hände) an, das sich vom Kern bzw. den Speichen des Lenkrads unterscheiden
        kann.
    steering_wheel_mounting_pattern:
      name: Befestigungsmuster des Lenkrads
      description: Gibt das Schrauben-/Lochmuster an, das zur Befestigung des Lenkrads
        an einer Nabe oder einem Adapter verwendet wird (z. B. 3-Loch oder 5-Loch).
    steering_wheel_rim_material_grip_surface:
      name: Material des Lenkradkranzes (Grifffläche)
      description: Gibt das primäre Material der Griff- bzw. Kranzoberfläche an (unabhängig
        vom allgemeinen Konstruktionsmaterial).
    stem_material:
      name: Material des Pfeifenstiels
      description: Gibt das Material an, das speziell für den Pfeifenstiel bzw. das
        Mundstück verwendet wird (z. B. Acryl, Ebonit oder Lucit).
    stencil_machine_consumable_type:
      name: Verbrauchsmaterial für Schablonenmaschinen
      description: Gibt an, welche Verbrauchsmaterialien für den Betrieb benötigt
        werden (falls vorhanden).
    step_surface_texture:
      name: Oberflächentextur der Stufen
      description: Gibt das Trittflächen- bzw. Oberflächendesign/-material an, das
        die Griffigkeit und den Komfort bei Nässe verbessern soll.
    stepper_motion_type:
      name: Bewegungsart des Steppers
      description: Definiert die primäre Bewegungsart des Geräts.
    stick_bow_profile:
      name: Bogenprofil des Schlägers
      description: Gibt das Krümmungsprofil (bzw. den „Bow-Typ“) des Feldhockeyschlägers
        an, ein entscheidender Faktor für Ballkontrolle, Drag-Flick-Leistung und Spielstil.
    stick_construction:
      name: Bauart des Schlägers
      description: Gibt die Bauart des Hockeyschlägers an, z. B. einteiliges Verbundmaterial,
        zweiteiliges Verbundmaterial oder Holz.
    stick_curvature_type:
      name: Krümmungsart des Wurfstocks
      description: Beschreibt das Krümmungsprofil des Wurfstocks, das Wurfweite und
        Genauigkeit beeinflusst.
    stick_head_shape:
      name: Form des Schlägerkopfs
      description: Definiert die Form des Schlägerkopfs, die Ballannahme, Schlagstil
        und enge Ballkontrolle beeinflusst.
    stick_size_compatibility:
      name: Kompatible Größe für den Schläger
      description: Kennzeichnet die Hockeyschläger-Größengruppe, mit der das Produkt
        kompatibel ist (z. B. Youth, Junior, Intermediate, Senior, Goalie oder Universal).
    sticker_decal_features:
      name: Merkmale von Aufklebern/Dekoren
      description: Erfasst anwendungs- und leistungsbezogene Merkmale von Aufklebern/Dekoren
        (z. B. blasenfrei oder repositionierbar).
    sticker_finish:
      name: Stickeroberfläche
      description: Beschreibt die Oberflächenbeschaffenheit bzw. den visuellen Effekt
        der Aufkleber.
    sticker_format:
      name: Aufkleberformat
      description: Gibt die Verkaufsform der dekorativen Aufkleber an (z. B. Bogen,
        Rolle, einzeln oder Buch).
    sticker_material_type:
      name: Materialart des Aufklebers
      description: Gibt das primäre Trägermaterial des dekorativen Aufklebers an (nicht
        die Verzierungen).
    stilt_foot_attachment_type:
      name: Befestigungsart des Stelzenfußes
      description: Gibt an, wie der Fuß der Benutzer:innen an der Stelze befestigt
        wird (z. B. Schnallenriemen, Klettverschluss oder Schnürung).
    stirrup_style:
      name: Art des Steigbügels
      description: Klassifiziert die design- bzw. disziplinspezifische Art von Steigbügeln
        einschließlich Sicherheits-, Disziplin- und Konstruktionsvarianten.
    stirrup_tread_material:
      name: Material der Steigbügel-Trittfläche
      description: Gibt das Material der Trittfläche des Steigbügels an, das Griffigkeit,
        Komfort und Verschleiß beeinflusst.
    stitch_marker_and_counter_style:
      name: Art des Maschenmarkierers bzw. Reihenzählers
      description: Gibt die Art bzw. Bauform eines Maschenmarkierers oder Reihen-/Maschenzählers
        an (z. B. Verriegelungsmarkierer, Spaltringmarkierer, Ringzähler oder digitaler
        Zähler).
    stitch_types:
      name: Sticharten
      description: Arten von Stichen (funktional und dekorativ), die die Maschine
        erzeugen kann.
    stitching_method:
      name: Nähmethode
      description: Gibt an, wie die Ballpaneele miteinander verbunden sind.
    stitching_state:
      name: Verarbeitungszustand der Nähte
      description: Gibt an, ob die Kleidungsstücke ungenäht, teilgenäht, genäht oder
        tragefertig geliefert werden.
    stock_car_race_series:
      name: Stockcar-Rennserie
      description: Gibt den Verband bzw. die Rennserie/-klasse an, für die das Stockcar
        gebaut wurde.
    stone_adhesion:
      name: Kernhaftung
      description: Gibt an, ob sich der Kern von Pfirsich bzw. Nektarine leicht, schwer
        oder teilweise vom Fruchtfleisch lösen lässt.
    stone_creation_method:
      name: Herstellungsmethode des Steins
      description: Gibt an, ob der Stein natürlich, im Labor hergestellt, simuliert
        oder recycelt ist.
    stone_cut_grade:
      name: Schliffqualität des Steins
      description: Gibt die Gesamtbewertung der Schliffqualität des Steins an.
    stone_cut_style:
      name: Art des Steinschliffs
      description: Schliff-/Facettenart des Glassteins (z. B. facettiert oder Cabochon).
    stone_fruit_cultivar:
      name: Steinobstsorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät von Pfirsich oder
        Nektarine.
    stone_fruit_variety:
      name: Art des Steinobsts
      description: Unterscheidet die Unterart innerhalb der Kategorie (z. B. Pfirsich,
        Nektarine oder Plattpfirsich).
    stone_setting_type:
      name: Art der Steinfassung
      description: Gibt an, wie der Stein im Schmuckstück befestigt ist (z. B. Zargenfassung,
        Krappenfassung oder Pavéfassung).
    stone_transparency:
      name: Transparenz des Steins
      description: Optische Transparenz/Opazität des Glassteins.
    storage_case_type:
      name: Art des Aufbewahrungskoffers
      description: Gibt die Art des Behälters an, in dem das Set zur Aufbewahrung
        und zum Transport geliefert wird (z. B. Karton, Case oder Tasche).
    storage_compartment_type:
      name: Typ des Staufachs
      description: Gibt die Art des Staufachs an, das die Schwimmboje für persönliche
        Gegenstände bietet.
    storage_media_and_transfer_methods_supported:
      name: Unterstützte Speichermedien und Übertragungsmethoden
      description: Unterstützte Medien bzw. Verbindungsmethoden zum Importieren/Exportieren
        von Samples sowie zum Speichern/Laden von Projekten.
    storage_requirements:
      name: Lagerungsanforderungen
      description: Gibt an, wie das Produkt vor und/oder nach dem Öffnen gelagert
        werden soll, um Qualität und Sicherheit zu gewährleisten.
    stove_jack_compatibility:
      name: Kompatibilität mit Ofenrohrdurchführung
      description: Gibt an, ob das Zelt über eine feuerfeste Öffnung für ein Ofenrohr
        verfügt.
    straight_pin_application:
      name: Verwendungszweck von Stecknadeln
      description: Gibt den vorgesehenen Verwendungszweck von Stecknadeln an.
    straight_pin_finish:
      name: Oberflächenfinish von Stecknadeln
      description: Beschreibt die Oberflächenbeschaffenheit bzw. Beschichtung der
        Stecknadel (z. B. vernickelt), die Korrosionsbeständigkeit und Gleitfähigkeit
        beeinflusst.
    straight_pin_head_material:
      name: Material des Stecknadelkopfs
      description: Gibt das Material des Stecknadelkopfs an (falls vorhanden), z. B.
        Kunststoff oder Glas.
    straight_pin_head_shape:
      name: Form des Stecknadelkopfs
      description: Beschreibt Form bzw. Stil des Stecknadelkopfs im Hinblick auf Benutzerfreundlichkeit
        und Sichtbarkeit.
    strand_configuration:
      name: Drahtart
      description: Gibt an, aus wie vielen einzelnen Reihen bzw. Strängen die Geldbörsenkette
        besteht (einfach, doppelt, dreifach).
    strand_material:
      name: Material des Strangs
      description: Gibt das Material an, das für die einzelnen Stränge bzw. Fransen
        verwendet wird.
    strap_attachment_hardware:
      name: Befestigungsmechanismus des Gurts
      description: Gibt Art bzw. Ausführung der Hardware an, die zur Befestigung des
        Gurts am Instrument bzw. Befestigungspunkt verwendet wird.
    strap_configuration:
      name: Gurtkonfiguration
      description: Gibt die Anzahl der Befestigungspunkte des Helms am Gurt an (z. B.
        2-Punkt oder 4-Punkt), was für Passform, Sicherheit und die Einhaltung der
        Ligavorschriften entscheidend ist.
    strap_functionality:
      name: Gurtfunktion
      description: Gibt den primären Verwendungszweck bzw. das Design des Yogamattengurts
        an.
    strap_padding:
      name: Gurtpolsterung
      description: Gibt den Grad der Polsterung des Gurts an, die den Tragekomfort
        verbessern und das Gewicht besser verteilen soll.
    strap_side:
      name: Gurtseite
      description: Gibt an, ob der Gurt für die linke Bindung, die rechte Bindung
        oder als Paar vorgesehen ist.
    strap_width:
      name: Gurtbreite
      description: Gibt die relative Breite der Schultergurte an (dünn, mittel, breit),
        damit Kundschaft die gewünschte Abdeckung bzw. Unterstützung auswählen kann.
    strength_classification:
      name: Stärkenklassifikation
      description: Von Marken üblicherweise verwendete Stärke-Bezeichnung im Marketing
        (z. B. Light, Strong oder Extra Strong).
    strength_grade:
      name: Festigkeitsklasse
      description: Beschreibt die vorgesehene Haltekraft bzw. Belastungsstufe des
        Klettverschlusses.
    stretch_level:
      name: Dehnungsgrad
      description: Gibt an, wie stark sich das Textil im Gebrauch dehnt.
    stretch_type:
      name: Art der Dehnbarkeit
      description: Gibt an, ob der Stoff mechanisch oder elastisch dehnbar ist und
        in welche Richtung(en).
    stretcher_bar_material:
      name: Material der Keilrahmenleisten
      description: Material der Keilrahmenleisten bzw. des Rahmens (z. B. Kiefer,
        Tanne, Pappel, Birke oder MDF/Holzwerkstoff).
    strike_shield_shape:
      name: Form des Schlagpolsters
      description: Gibt die allgemeine Form der Schlagfläche des Schlagpolsters an.
    string_core_shape:
      name: Form des Saitenkerns
      description: Gibt die Form des Kerndrahts an, der bei umsponnenen Saiten verwendet
        wird und Spielgefühl sowie Stabilität beeinflusst.
    string_coverage:
      name: Saitenabdeckung
      description: Gibt an, welche Saiten der Teilkapodaster greifen bzw. abdecken
        soll (nach Anzahl oder gängigem Satz).
    string_end_type:
      name: Typ des Saitenendes
      description: Gibt an, wie die Saite am Steg bzw. Saitenhalter endet, um die
        Kompatibilität sicherzustellen (besonders wichtig für Akustik-/E-Gitarren
        und einige Bassinstrumente).
    string_set_type:
      name: Art des Saitensets
      description: Gibt an, ob es sich um einen vollständigen Satz oder einzelne Ersatzsaiten
        handelt.
    strung_status:
      name: Besaitungsstatus
      description: Gibt an, ob der Lacrosse-Schlägerkopf bereits bespannt geliefert
        oder unbespannt verkauft wird.
    strut_placement:
      name: Position der Verstrebung
      description: Gibt die vorgesehene Einbauposition des Federbeins am Fahrzeug
        an (vorne/hinten und links/rechts).
    stud_attachment_type:
      name: Befestigungsart der Stollen
      description: Gibt an, wie die Stollen bzw. Spikes an der Außensohle befestigt
        oder angeordnet sind, was Traktion, Wartung und die Einhaltung der Ligavorschriften
        beeinflusst.
    stud_configuration:
      name: Stollenkonfiguration
      description: Definiert Form und Anordnung der Stollen bzw. Spikes an der Außensohle,
        was Traktion und Leistung auf verschiedenen Untergründen beeinflusst.
    stud_material:
      name: Stollenmaterial
      description: Gibt das Hauptmaterial der Stollen bzw. Spikes an und liefert Informationen
        zu Haltbarkeit, Gewicht und Einhaltung von Sicherheitsvorschriften.
    stuffed_animal_features:
      name: Merkmale des Stofftiers
      description: Hebt integrierte Spiel- und Komfortfunktionen des Stofftiers hervor.
    stump_base_type:
      name: Typ der Cricket-Stumpf-Basis
      description: Definiert die Art der Basis bzw. des Befestigungssystems des Cricket-Stumpfs
        (Spike, Rückholfeder, beschwertes Gummi usw.).
    stump_mechanism:
      name: Mechanismus der Stümpfe
      description: Gibt den Rückstell- bzw. Befestigungsmechanismus der Cricket-Stumps
        an (z. B. federnd oder fest).
    stump_size:
      name: Größe des Cricket-Stumpfs
      description: Kategorische Größenbezeichnung für Cricket-Stumps, die die typische
        Höhe und die passende Altersgruppe angibt.
    subwoofer_installation_type:
      name: Einbauart des Subwoofers
      description: Gibt an, wie der Subwoofer in ein Fahrzeug-Audiosystem eingebaut
        werden soll.
    sugar_cane_variety:
      name: Zuckerrohrsorte
      description: Kennzeichnet die spezifische Sorte bzw. Marktvarietät des Zuckerrohrs,
        die Farbe, Süße und Fasergehalt beeinflussen kann.
    sugar_content_level:
      name: Zuckergehaltsstufe
      description: Klassifiziert den Gesamtzuckergehalt bzw. die Zusammensetzung des
        Getränkekonzentrats, damit Kundschaft schnell reguläre, zuckerreduzierte oder
        zuckerfreie Varianten finden kann.
    sugar_refinement_level:
      name: Zuckerraffinierungsgrad
      description: Gibt den Grad bzw. die Art der Raffination an (Farbe, Melassegehalt
        oder Verarbeitungsgrad).
    sugar_source:
      name: Zuckerquelle
      description: Gibt den botanischen bzw. materiellen Ursprung an, aus dem der
        Zucker gewonnen wird.
    suit_fit:
      name: Passform des Anzugs
      description: Gesamtschnitt des Anzugs, der angibt, wie eng er am Körper anliegt.
    suit_pieces:
      name: Bestandteile des Anzugs
      description: Gibt an, wie viele aufeinander abgestimmte Kleidungsstücke im Anzugset
        enthalten sind (z. B. 2-teilig, 3-teilig oder 4-teilig).
    suitable_for_anchoring_use:
      name: Geeignet für Verankerungszwecke
      description: Gibt den vorgesehenen Verwendungszweck der Leine bzw. des Seils
        im Zusammenhang mit der Verankerung an.
    suitable_for_craft_type:
      name: Geeignet für Handarbeitstyp
      description: Gibt den primären Handarbeitszweck an, für den der Spanndraht vorgesehen
        ist.
    suitable_for_paint_type:
      name: Geeignet für Farbart
      description: Gibt an, für welche Farbtypen die Leinwand geeignet bzw. sicher
        verwendbar ist.
    suitable_for_swim_stroke:
      name: Geeignet für Schwimmstile
      description: Gibt an, für welche(n) Schwimmstil(e) das Handpaddel entwickelt
        bzw. optimiert wurde.
    suitable_mounting_surface_material:
      name: Geeignetes Montageflächenmaterial
      description: Gibt die vorgesehene Montagefläche bzw. das Material an, auf dem
        die Kleberückseite haften soll.
    suitable_play_location:
      name: Geeignete Spielorte
      description: Primär vorgesehene Spielumgebung(en) für das Sand- und Wassermühlenspielzeug.
    suitable_riding_conditions:
      name: Geeignete Fahrbedingungen
      description: Gibt die Fahrbedingungen an (z. B. trocken, nass oder Winter),
        für die ein Fahrradschmierstoff bzw. -reiniger entwickelt wurde.
    suitable_snow_conditions:
      name: Geeignete Schneebedingungen
      description: Gibt die primären Schneebedingungen an, für die das Grip-Wachs
        entwickelt wurde.
    suitable_surface_type:
      name: Geeignete Oberflächenart
      description: Gibt an, für welche Gehflächen der Griff ausgelegt ist.
    suitable_table_size:
      name: Geeignete Tischgröße
      description: Gibt die Billard-/Snookertischlänge(n) an, für die die Leuchte
        ausgelegt ist.
    sun_protection_rating_upf:
      name: Sonnenschutzfaktor (UPF)
      description: Gibt den zertifizierten UPF-Sonnenschutzgrad des Kleidungsstücks
        an.
    sun_shade_attachment_method:
      name: Befestigungsmethode für den Sonnenschutz
      description: Gibt an, wie der Sonnenschutz an Fenster bzw. Windschutzscheibe
        befestigt wird.
    sun_shade_style:
      name: Art des Sonnenschutzes
      description: Beschreibt Konstruktion bzw. Format des Produkts zum Anbringen
        und Verstauen des Sonnenschutzes.
    sunchoke_variety:
      name: Topinambursorte
      description: Kennzeichnet die spezifische Sorte bzw. Varietät von Topinambur
        (Jerusalem Artischocke) und bietet detaillierte Informationen für Gärtner,
        Köche und anspruchsvolle Käufer.
    sunflower_oil_variety:
      name: Auswahl an Sonnenblumenölen
      description: Klassifiziert das Fettsäureprofil bzw. die Sorte des Sonnenblumenöls
        (z. B. High Oleic, Mid-Oleic oder Linoleic).
    sunflower_variety:
      name: Sonnenblumenart
      description: Sorte bzw. Varietät der Sonnenblume (gängige Marktsorten für Schnittblumen).
    support_brace_features:
      name: Merkmale der Stützbandage
      description: Listet wichtige funktionale Merkmale der Handgelenkstütze auf,
        z. B. atmungsaktives Gewebe, abnehmbare Schiene oder verstellbare Metallplatte.
    support_leg_count:
      name: Anzahl der Stützbeine
      description: Anzahl der Beine, die beim Gebrauch des Schießstocks Bodenkontakt
        haben (z. B. Einbein-, Zweibein- oder Dreibeinstativ).
    support_padding:
      name: Polsterung der Stütze
      description: Gibt an, ob der Gurt bzw. die Stütze an den Kontaktpunkten (Nacken/Schulter/Daumen)
        über integrierte Polsterung verfügt.
    support_structure_type:
      name: Art der Stützstruktur
      description: Gibt die Konstruktionsmethode an, mit der der Windschutz aufrecht
        gehalten wird.
    supported_bowling_delivery_types:
      name: Unterstützte Bowling-Arten
      description: Gibt die Cricket-Bowling-Varianten an, die die Maschine simulieren
        kann, z. B. Inswing, Outswing und Spin-Arten.
    supported_dive_modes:
      name: Unterstützte Tauchmodi
      description: Gibt die Betriebsmodi an, die der Tauchcomputer unterstützt, z. B.
        Air, Nitrox oder Gauge.
    supported_equipment_type:
      name: Unterstützter Gerätetyp
      description: Gibt die Wintersportausrüstung an, für die das Rack ausgelegt ist
        (z. B. Skier, Snowboards oder Skistöcke).
    supported_spin_types:
      name: Unterstützte Spin-Arten
      description: Gibt die Ballrotationen an, die der Launcher erzeugen kann.
    supported_spool_bobbin_types:
      name: Unterstützte Spulen-/Bobbin-Typen
      description: Gibt an, für welche Spulen-/Bobbin-Formate die elektrische Wickelmaschine
        ausgelegt ist.
    surf_wax_temperature_rating:
      name: Temperaturangabe für Surfwachs
      description: Gibt den Wassertemperaturbereich an, für den das Wachs entwickelt
        wurde, um optimalen Grip in unterschiedlichen Klimazonen zu gewährleisten.
    surface_coating_or_finish:
      name: Oberflächenbeschichtung bzw. -bearbeitung
      description: Gibt an, welche Schutz- bzw. leistungssteigernde Oberflächenbehandlung
        auf die Zange aufgebracht wurde.
    surface_coating_or_wrap:
      name: Oberflächenbeschichtung bzw. Ummantelung
      description: Die äußere Oberflächenbehandlung für besseren Grip bzw. bessere
        Kontrolle am Mittelstock (und teilweise an den Handstäben).
    surface_finish:
      name: Oberflächenfinish
      description: Beschreibt Haptik bzw. Textur der Balloberfläche, die Grip und
        Bewegung beim Contact Juggling beeinflusst.
    surface_finish_prep:
      name: Oberflächenbearbeitung/-vorbereitung
      description: Gibt den Zustand der Reibfläche zum Verkaufszeitpunkt an (z. B.
        überarbeitet, bearbeitet oder gegossen).
    surface_types_included:
      name: Enthaltene Oberflächenarten
      description: Gibt an, welche Oberflächen das Set zum Zeichnen bzw. Malen enthält
        (falls vorhanden), z. B. Leinwand, Papierblock, Holzplatten oder keine.
    surfboard_construction:
      name: Bauart des Surfboards
      description: Gibt die primäre Konstruktionstechnologie bzw. den Aufbau des Surfboards
        an.
    surfboard_tail_shape:
      name: Form des Surfboard-Hecks
      description: Definiert die Form des Board-Hecks, die Wendigkeit und Halt beeinflusst.
    suspension_bushing_type:
      name: Typ der Aufhängungsbuchse
      description: Gibt die Funktions- bzw. Einbauart der Aufhängungsbuchse an.
    suspension_configuration:
      name: Federungskonfiguration
      description: Beschreibt, ob das Dreirad über eine Federung verfügt und wo diese
        angebracht ist.
    suspension_material:
      name: Material der Aufhängung
      description: Gibt das Material der Ketten, Seile oder Kabel an, die zum Aufhängen
        der Schaukel verwendet werden.
    suspension_trainer_accessories_included:
      name: Enthaltenes Zubehör für den Suspension Trainer
      description: Listet zusätzliche Artikel auf, die im Trainer-Set enthalten sind
        (z. B. Türanker, Verlängerungsgurt oder Aufbewahrungstasche), damit Kundschaft
        den Lieferumfang und den Wert des Sets besser vergleichen kann.
    suspension_trainer_anchor_type:
      name: Verankerungstyp des Suspension Trainers
      description: Definiert die Montageart bzw. den Verankerungspunkt, für den die
        Gurte ausgelegt sind (z. B. Tür, Decke oder Baum), und gibt so Auskunft über
        die Kompatibilität mit der Umgebung der Nutzenden.
    suspension_type:
      name: Art der Federung
      description: Gibt an, ob die Gabel starr ist oder ein bestimmtes Federungssystem
        verwendet (Luft, Stahlfeder, Hybrid, Elastomer usw.), damit Fahrende die passende
        Gabel für ihren Fahrstil auswählen können.
    sustain_pedal_form_factor:
      name: Bauform des Sustain-Pedals
      description: Beschreibt die physische Bauform des Sustain-Pedals (z. B. Klavierpedal
        oder kompakter Fußschalter), was Spielgefühl und Verwendungszweck beeinflusst.
    sustain_pedal_switch_type:
      name: Schaltertyp des Sustain-Pedals
      description: Gibt an, ob das Pedal ein Momentansignal (Sustain beim Drücken)
        oder ein Rastsignal (Umschalten) sendet.
    sustainability_certification:
      name: Nachhaltigkeitszertifizierung
      description: Umwelt- bzw. Herkunftszertifizierung für das Holzmaterial.
    swab_intended_bassoon_section:
      name: Vorgesehener Fagottbereich für den Wischer
      description: Gibt an, welcher Teil des Fagotts mit dem Wischer gereinigt werden
        soll (unterschiedliche Bohrungen bzw. Teile erfordern unterschiedliche Formen
        und Größen von Wischern).
    swab_style:
      name: Art des Wischers
      description: Beschreibt die physische Bauform bzw. Ausführung des Wischers,
        der zum Reinigen oder Erreichen bestimmter Bereiche des Saxophons verwendet
        wird.
    swab_weight_material:
      name: Material des Wischergewichts
      description: Material des Durchziehgewichts bzw. Vorläufers (falls vorhanden),
        das Kratzrisiko und Haltbarkeit beeinflusst.
    swab_weight_style:
      name: Stil des Wischergewichts
      description: Gibt an, wie der Wischer beschwert ist, damit er durch die Bohrung
        des Fagotts geführt werden kann.
    sway_bar_adjustability:
      name: Einstellbarkeit des Stabilisators
      description: Gibt an, ob und wie die Steifigkeit des Stabilisators einstellbar
        ist (typischerweise über mehrere Befestigungslöcher an den Koppelstangen).
    sway_bar_coating:
      name: Beschichtung des Stabilisators
      description: Oberflächenbehandlung bzw. Beschichtung des Stabilisators zur Verbesserung
        von Korrosionsbeständigkeit und Optik.
    sway_bar_fitment_front_rear_kit:
      name: Einbauposition des Stabilisators (vorn/hinten/Set)
      description: Gibt an, ob der Stabilisator für die Vorderachse, Hinterachse oder
        als Set für Vorder- und Hinterachse vorgesehen ist.
    sweatshirt_pocket_type:
      name: Taschenart des Sweatshirts
      description: Beschreibt die Taschenart des Sweatshirts.
    sweet_potato_variety:
      name: Süßkartoffelsorte
      description: Kennzeichnet die spezifische Sorte bzw. Marktvarietät der Süßkartoffel.
    sweet_spot_position:
      name: Position des Sweet Spots
      description: Gibt an, an welcher Stelle sich der Sweet Spot des Schlägers befindet,
        was Spielstil und Platzbedingungen beeinflusst.
    sweetener_presence:
      name: Vorhandensein von Süßungsmitteln
      description: Gibt an, ob und in welcher Menge dem Nussmus Süßungsmittel zugesetzt
        wurden.
    sweetening_type:
      name: Art der Süßung
      description: Beschreibt, wie das Produkt gesüßt wird bzw. seinen Süßegrad.
    swim_armband_construction_type:
      name: Konstruktionsart der Schwimmarmbänder
      description: Definiert die Bauart bzw. den Auftriebsmechanismus der Schwimmarmbänder
        (aufblasbar, Schaumstoff, Hybrid usw.).
    swim_belt_purpose:
      name: Verwendungszweck des Schwimmgürtels
      description: Funktionale Klassifizierung des Schwimmgürtels (z. B. Auftriebshilfe,
        Aquajogging, Widerstandstraining, statische Leine, Befestigung eines Bremsfallschirms,
        Gewichtsballast oder Sicherheitswaten).
    swim_board_features:
      name: Schwimmbretteigenschaften
      description: Hebt besondere Eigenschaften bzw. Verbesserungen des Schwimmbretts
        hervor, die Benutzerfreundlichkeit oder Sicherheit erhöhen.
    swim_bottom_length:
      name: Länge der Schwimmhose
      description: Klassifiziert die Beinlänge der Schwimmboxershorts (z. B. kurz
        oder knielang).
    swim_buoy_features:
      name: Merkmale der Schwimmboje
      description: Beschreibt zusätzliche bemerkenswerte Eigenschaften oder Zubehörteile,
        die Sichtbarkeit, Sicherheit oder Nutzen der Schwimmboje verbessern.
    swim_cap_style:
      name: Stil der Badekappe
      description: Definiert die Bauart bzw. den Designstil der Badekappe (z. B. für
        langes Haar, Kuppel-/Rennstil oder Bubble-/Turbanstil).
    swim_diaper_feature:
      name: Eigenschaften der Schwimmwindel
      description: Gibt an, ob die Schwimmhose über eine integrierte auslaufsichere
        Windelfunktion verfügt oder eine separate Schwimmwindel benötigt bzw. darauf
        verzichtet.
    swim_trainer_features:
      name: Merkmale des Schwimmtrainers
      description: Hebt zusätzliche Funktions- oder Komfortmerkmale des Schwimmtrainers
        hervor.
    swim_trainer_type:
      name: Art des Schwimmtrainers
      description: Definiert die Bauart bzw. Ausführung des Schwimmtrainers, um das
        Filtern nach Design und Trainingszweck zu erleichtern.
    swim_training_focus:
      name: Schwerpunkt des Schwimmtrainers
      description: Gibt das primäre Trainingsziel an, auf das das Paddel ausgelegt
        ist (z. B. Technik, Kraft oder Muskelisolation).
    swim_weight_style:
      name: Art des Schwimmgewichts
      description: Klassifiziert die Bauform des Schwimmgewichts, damit Kundschaft
        verschiedene Produkttypen innerhalb derselben Kategorie leichter unterscheiden
        kann.
    swimbait_buoyancy:
      name: Auftrieb des Swimbaits
      description: Gibt an, wie sich der Swimbait im Wasser verhält (schwimmend, schwebend,
        sinkend usw.), damit Angler den passenden Köder für Zieltiefe und Führungsstil
        auswählen können.
    swimbait_style:
      name: Stil des Swimbaits
      description: Klassifiziert die Bauart bzw. das Bewegungsdesign des Swimbaits,
        z. B. Paddle Tail oder Glide Bait.
    swimwear_pieces_included:
      name: Inbegriffene Badebekleidung
      description: Listet die enthaltenen Bestandteile bzw. Accessoires der bedeckenden
        Badebekleidung auf, damit Käufer:innen genau wissen, was im Set enthalten
        ist.
    swimwear_set_pieces_included:
      name: Im Badebekleidungsset enthaltene Artikel
      description: Listet die einzelnen Bestandteile des Sets für bedeckende Badebekleidung
        auf, damit Kundschaft genau weiß, was enthalten ist (z. B. Oberteil, Leggings
        oder Hijab/Badekappe).
    swing_attachment_connection_type:
      name: Befestigungs-/Verbindungstyp der Schaukel
      description: Die Art der Verbindung, mit der die Schaukel an ihrer Aufhängung
        befestigt wird (z. B. Seil, Kette oder Gurte).
    swing_trainer_type:
      name: Art des Schlagtrainers
      description: Klassifiziert Stil bzw. Mechanismus des Swing-Trainers, damit Kundschaft
        schnell Geräte passend zu ihren Trainingszielen finden kann.
    swing_training_objective:
      name: Ziel des Schlagtrainings
      description: Klassifiziert den primären Trainingsschwerpunkt, Mechanismus bzw.
        Zweck des Swing-Trainers (z. B. Tempo, Geschwindigkeit oder Griff).
    switch_electrical_positions:
      name: Schaltpositionen
      description: Gibt Anzahl und Verhalten der elektrischen Schaltpositionen des
        Schalters an (z. B. 3 Positionen oder Momentkontakt).
    swivel_type:
      name: Typ des Drehgelenks
      description: Gibt die Konfiguration des Drehgelenks an, die verwendet wird,
        um ein Verheddern der Leine zu verhindern.
    sword_scabbard_material:
      name: Material der Schwertscheide
      description: Gibt das Hauptmaterial der gegebenenfalls enthaltenen Schwertscheide
        an.
    synthesizer_form_factor:
      name: Bauform des Synthesizers
      description: Beschreibt das physische bzw. spielbare Schnittstellenformat des
        Synthesizers.
    synthetic_feather_style:
      name: Stil der synthetischen Feder
      description: Stil bzw. Schnitt der synthetischen Feder für unterschiedliche
        Looks und Basteltechniken.
    synthetic_formulation_type:
      name: Typ der synthetischen Formulierung
      description: Gibt den Typ des synthetischen Grundöls bzw. der Formulierung an
        (z. B. PAO, Ester oder hydrocrackte Gruppe III).
    syrup_base_ingredient:
      name: Grundzutat des Sirups
      description: Gibt die primäre Pflanzen- bzw. Zuckerquelle an, aus der der Sirup
        oder Nektar gewonnen wird (z. B. Ahorn, Agave oder Rohrzucker).
    syrup_variety:
      name: Sirupsorte
      description: Definiert die allgemeine Art bzw. Kategorie des Sirups anhand seiner
        Zusammensetzung oder traditionellen Verwendung (z. B. Ahorn-, Kaffee-, Frucht-
        oder Medizinalsirup).
    t_shirt_fit:
      name: Passform des T-Shirts
      description: Beschreibt die vorgesehene Passform bzw. den Schnitt des T-Shirts.
    tabla_included_components:
      name: Enthaltene Komponenten der Tabla
      description: Gibt an, welche Hauptbestandteile im Tabla-Angebot enthalten sind
        (einzelne Trommel oder Set, Abdeckungen/Taschen, Stimmhammer usw.).
    tabla_set_pieces_included:
      name: Im Tabla-Set enthaltene Artikel
      description: Gibt an, welche Komponenten im Tabla-Set enthalten sind (z. B.
        Dayan, Bayan, Ringe, Abdeckungen, Stimmwerkzeuge oder Tasche)
    tabla_tonal_pitch_range_bayan:
      name: on-/Tonhöhenbereich der Tabla (Bayan)
      description: Beschreibt den typischen Tonhöhen- bzw. Klangbereich der Bayan-Trommel
        (Bass) basierend auf Größe und Bauart.
    table_base_material:
      name: Material der Tischbeine
      description: Kennzeichnet das Hauptmaterial des Tischsockels bzw. Tischfußes
        (im Unterschied zu Tischbeinen oder Tischplatte) und unterstützt materialspezifische
        Filterungen.
    table_base_type:
      name: Art des Tischgestells
      description: Kennzeichnet die Konstruktion, die die Tischplatte trägt (z. B.
        Sockel-, Bock- oder X-Gestell).
    table_coverage_position:
      name: Position der Tischabdeckung
      description: 'Gibt an, für welche Position(en) der Tischtennisplatte die Abdeckung
        geeignet ist: zusammengeklappt, Spielposition oder beides.'
    table_hockey_part_type:
      name: Art des Tischhockey-Teils
      description: Kennzeichnet den spezifischen Komponententyp innerhalb von Tisch-,
        Air-, Stangen- oder Bubble-Hockeysystemen.
    table_leg_design:
      name: Design des Tischbeins
      description: Kennzeichnet die Bauart bzw. Geometrie des Tischbeins, damit Käufer:innen
        passende ästhetische und funktionale Anforderungen auswählen können.
    table_size:
      name: Tischgröße
      description: Gibt die handelsübliche Gesamtgröße des Billardtischs (in Fuß)
        an, damit Käufer:innen schnell zwischen Optionen wie 7-Fuß-Bartischen oder
        9-Fuß-Turniertischen wählen können.
    table_size_category:
      name: Größenkategorie des Tisches
      description: Kategorisiert den Tischkicker nach seiner Gesamtstellfläche, damit
        Käufer:innen den verfügbaren Platz leichter einschätzen können.
    table_tennis_certification:
      name: Tischtennis-Zertifizierung
      description: Listet offizielle Normen bzw. Zulassungen von Verbänden auf, die
        das Produkt erfüllt (z. B. ITTF oder EN 14468-2).
    tabletop_tilt_function:
      name: Neigungsfunktion der Tischplatte
      description: Gibt an, ob die Tischplatte geneigt, geklappt oder in verschiedene
        Winkel gedreht werden kann.
    tackle_components_included:
      name: Im Angelset enthaltene Artikel
      description: Listet die einzelnen Komponenten des Angelzubehörs auf, die im
        Set enthalten sind, damit Käufer:innen genau wissen, was mitgeliefert wird.
    talking_drum_accessories_included:
      name: Enthaltenes Zubehör für die Talking Drum
      description: Listet das Zubehör auf, das zusammen mit der Talking Drum geliefert
        wird (im Lieferumfang enthalten).
    talking_drum_cord_material:
      name: Material der Talking-Drum-Spannschnüre
      description: Material der Spannschnüre bzw. Seile, die die Trommelfelle miteinander
        verbinden.
    talking_drum_tuning_mechanism:
      name: Stimmmechanismus der Talking Drum
      description: Beschreibt, wie die Tonhöhe der Trommel während des Spielens verändert
        (bzw. die Spannung eingestellt wird).
    tam_tam_construction_style:
      name: Bauart des Tam-Tams
      description: Bau- bzw. Hämmerungsart des Tam-Tams.
    tam_tam_items_included:
      name: Enthaltene Bestandteile des Tam-Tams
      description: Gibt an, welches Zubehör zusammen mit dem Tam-Tam geliefert wird
        (z. B. Schlägel, Ständer oder Schutzhülle).
    tamarillo_variety:
      name: Auswahl an Tamarillos
      description: Kennzeichnet die spezifische Sorte bzw. Farbvariante der Tamarillo-Frucht.
    tamarind_variety:
      name: Tamarindenart
      description: Gibt die botanische bzw. handelsübliche Sorte der Tamarinde an,
        die Geschmack, Konsistenz und kulinarische Verwendung beeinflussen kann.
    tambourine_frame_style:
      name: Bauform des Tamburins
      description: Beschreibt die Bauform des handgehaltenen Rahmens, der zum Spielen
        des Tamburins verwendet wird.
    tambourine_head_material:
      name: Material des Tambourinfells
      description: Gibt das Material des Spielfells (der Membran) bei Tamburinen mit
        Fell an.
    tambourine_jingle_configuration:
      name: Schellenkonfiguration des Tamburins
      description: Beschreibt, wie die Schellen am Tamburin angeordnet bzw. aufgebaut
        sind.
    tambourine_jingle_material:
      name: Material der Tamburin-Schellen
      description: Gibt das Material der Schellen (Metallscheiben) des Tamburins an,
        das Klang und Haltbarkeit beeinflusst.
    tambourine_mounting_type:
      name: Befestigungsart des Tamburins
      description: Beschreibt, wie das Tamburin während des Spielens gehalten bzw.
        befestigt werden soll.
    tambourine_tuning_mechanism:
      name: Stimmmechanismus des Tamburins
      description: Gibt das Stimmsystem an, das bei stimmbaren Handtamburinen verwendet
        wird (falls zutreffend).
    tank_model_scale:
      name: Maßstab des Panzermodells
      description: Gibt das Maßstabsverhältnis des Panzermodells an (z. B. 1:35 oder
        1:72).
    tank_top_back_style:
      name: Rückenform des Tanktops
      description: Gibt die Form bzw. den Schnitt der Rückseite des Tanktops an, was
        Halt, Bewegungsfreiheit und Optik beeinflusst.
    tape_application_area:
      name: Anwendungsbereich des Tapes
      description: Gibt an, an welchem Teil der Ausrüstung bzw. des Körpers das Band
        angebracht werden soll, damit Käufer:innen die passende Variante auswählen
        können.
    tape_finish:
      name: Oberflächenfinish des Bands
      description: Oberflächenbeschaffenheit bzw. optischer Effekt des Bands (Glanz
        oder Struktur).
    tape_purpose:
      name: Zweck des Tapes
      description: Gibt den primären funktionalen Einsatzbereich des Bands bei der
        Wartung bzw. Anpassung von Schlägern an.
    tape_type:
      name: Art des Bands
      description: Klassifiziert die funktionale Art bzw. Bauweise des Hockeybands,
        z. B. Stoffband, transparentes Polyethylenband, Gripband, kohäsives Stretchband,
        Schienbeinschonerband oder Chamoisband.
    tapenade_main_ingredients:
      name: Hauptzutaten der Tapenade
      description: Gibt die Hauptzutat an, die die Tapenade bestimmt (Olive, Tomate,
        Aubergine, Paprika usw.), hilfreich für Käufer:innen mit bestimmten Zutatenvorlieben
        oder Einschränkungen.
    tapestry_loom_loom_format:
      name: Bauform des Gobelinwebstuhls
      description: Gesamtbauform bzw. Ständerart des Gobelin-Handwebstuhls.
    tapestry_loom_shedding_method:
      name: Fachbildungsmethode des Gobelinwebstuhls
      description: Beschreibt, wie der Webstuhl ein Fach bildet (die Kettfäden trennt),
        damit der Schussfaden durchgeführt werden kann.
    tapestry_loom_tensioning_system:
      name: Spannsystem des Gobelinwebstuhls
      description: Beschreibt die Methode, mit der die Kette auf dem Gobelinwebstuhl
        gespannt und befestigt wird.
    tar_head_material:
      name: Material des Tarfells
      description: Kennzeichnet das Material des Tar-Fells (der Membran), das Spielgefühl,
        Haltbarkeit und Klang maßgeblich beeinflusst.
    tar_playing_style:
      name: Spielstil der Tar
      description: Gibt die primäre Spielposition bzw. Spieltechnik an, für die die
        Tar ausgelegt ist.
    tar_tuning_system:
      name: Stimmsystem der Tar
      description: Gibt an, wie die Tar gestimmt wird (wie die Fellspannung eingestellt
        wird).
    target_components:
      name: Anwendungsziele
      description: Gibt an, welche Kraftstoff- bzw. Luftansaugkomponenten mit dem
        Produkt gereinigt werden sollen.
    target_relative_humidity_rh:
      name: Zielwert der relativen Luftfeuchtigkeit (RH)
      description: Gibt die angestrebte relative Luftfeuchtigkeit an, die das Produkt
        im Instrument bzw. Koffer aufrechterhalten soll.
    target_resetting_mechanism:
      name: Rückstellmechanismus des Ziels
      description: Beschreibt, wie bzw. ob ein Ziel nach einem Treffer in seine Ausgangsposition
        zurückkehrt.
    target_trainer_type:
      name: Art des Zieltrainings
      description: Klassifiziert die allgemeine Bauart bzw. das Format des Racquetball-
        oder Squash-Zieltrainers.
    targeted_contaminants:
      name: Zielgerichtete Schadstoffe
      description: Arten von Mikroorganismen bzw. Parasiten, die das Produkt nachweislich
        beseitigt.
    targeted_muscle_group:
      name: Zielmuskelgruppe
      description: Gibt die primäre Muskelgruppe an, die mit dem Zubehör trainiert
        bzw. unterstützt werden soll.
    taro_variety:
      name: Taro-Sorte
      description: Gibt die Sorte, Art bzw. Handelsbezeichnung der angebotenen Taro-Wurzel
        an (z. B. Purple Taro, Eddoe oder Dasheen).
    tassel_trim_header_type:
      name: Befestigungsart der Quastenborte
      description: Gibt die Bauart des oberen Befestigungsbereichs an, mit dem die
        Quastenborte an einer Oberfläche angebracht wird (z. B. Band, Borte oder Kordel).
    tassel_trim_use_case:
      name: Verwendungszweck der Quastenborte
      description: Gibt den primären Einsatzbereich der Quastenborte an.
    taste_profile:
      name: Geschmacksprofil
      description: Beschreibt die dominierenden Geschmackseigenschaften der Apfelsorte.
    tea_variety:
      name: Auswahl an Tees
      description: Klassifiziert die jeweilige Tee- bzw. Aufgussart (z. B. Schwarztee,
        Grüntee, Matcha oder Rooibos), damit Käufer:innen nach ihren bevorzugten Sorten
        filtern können.
    teasing_tool_style:
      name: Bauform des Toupierwerkzeugs
      description: Beschreibt die Bauform des Toupierwerkzeugs zum Öffnen und Vermischen
        von Fasern (z. B. Bürste, Rechen oder Kamm).
    tee_base_style:
      name: Bauform des Rugby-Kicking-Tees
      description: Kennzeichnet die Bauform der Basis eines Rugby-Kicking-Tees, die
        den Ball stützt.
    temper_hardness:
      name: Härtegrad
      description: Gibt an, wie weich oder hart der Draht ist und wie gut er seine
        Form behält.
    temperature_control_type:
      name: Art der Temperatursteuerung
      description: Beschreibt, wie die Temperatur des Werkzeugs geregelt bzw. eingestellt
        wird.
    tenkara_action_ratio:
      name: Tenkara-Aktionsverhältnis
      description: Gibt das traditionelle Tenkara-Biegeverhältnis an, das beschreibt,
        an welcher Stelle sich die Rute unter Belastung biegt (z. B. 6:4).
    tennis_ball_court_surface:
      name: Belag des Tennisplatzes
      description: Gibt die Platzbeläge an, für die der Ball ausgelegt ist, um optimale
        Leistung und Haltbarkeit zu gewährleisten.
    tennis_ball_pressure_type:
      name: Druckart des Tennisballs
      description: Kennzeichnet den Innendruck bzw. die Bauart des Balls (druckbeaufschlagt,
        drucklos, Low-Compression oder Schaumstoff), die Sprungverhalten und Haltbarkeit
        beeinflusst.
    tennis_racket_grip_size:
      name: Griffgröße des Tennisschlägers
      description: Gibt den standardisierten Umfang des Schlägergriffs an (L0–L5 bzw.
        entsprechende Zollgrößen), um eine passende Handhabung und hohen Komfort zu
        gewährleisten.
    tenor_flutophone_fingering_system:
      name: Griffsystem des Tenorflötophons
      description: Gibt das Griffsystem an, das beim Tenorflötophon verwendet wird
        (Lehrplan- bzw. Notationsstandard).
    tenor_recorder_joint_type:
      name: Verbindungsart der Tenorblockflöte
      description: Gibt die Verbindungsart zwischen den einzelnen Teilen der Tenorblockflöte
        an.
    tenor_saxophone_key_system:
      name: Klappensystem des Tenorsaxophons
      description: Gibt das verwendete Klappensystem bzw. den Standard an (bei Saxophonen
        oft als französisches/Böhm-System bezeichnet).
    tenor_saxophone_pad_material:
      name: Material der Tenorsaxophon-Polster
      description: Gibt das Hauptmaterial der Instrumentenpolster an.
    tenor_trombone_slide_type:
      name: Zugtyp der Tenorposaune
      description: Gibt die Art des bei der Tenorposaune verwendeten Zugs an (z. B.
        Standard/Geradzug oder Trigger/Axial-Flow).
    tenor_trombone_valve_configuration:
      name: Ventilkonfiguration der Tenorposaune
      description: Gibt an, ob die Tenorposaune über einen Ventil- bzw. Rotoraufsatz
        verfügt und welche Konfiguration verwendet wird.
    tension_control_type:
      name: Art der Spannungsregelung
      description: Gibt an, wie (bzw. ob) das Schiffchen während des Fadentransports
        eine einstellbare Spannung auf die Spule bzw. den Spulenkern ausübt.
    tension_mechanism:
      name: Spannmechanismus
      description: Beschreibt die Art der Spannungseinstellung zur Steuerung des Schussfadens
        von der Spule bzw. dem Garnkern beim Weben.
    tension_pitch_modulation_system:
      name: Spannungs-/Tonhöhenmodulationssystem
      description: Beschreibt, wie die Talking Drum während des Spielens Tonhöhe bzw.
        Spannung verändert (z. B. durch Zusammendrücken der Spannschnüre).
    tension_system:
      name: Spannsystem
      description: Gibt an, für welches Aufwickel- bzw. Spannsystem eines Spinnrads
        das Flyer-Set vorgesehen ist.
    tent_fabric_material:
      name: Zeltstoffmaterial
      description: Kennzeichnet das Hauptmaterial des Außenzelts bzw. Zeltkörpers,
        das Gewicht, Atmungsaktivität und Wetterbeständigkeit beeinflusst.
    tent_season_rating:
      name: Saisonklassifizierung des Zelts
      description: Klassifiziert das Zelt nach den Jahreszeiten bzw. Wetterbedingungen,
        für die es ausgelegt ist (z. B. 3-Jahreszeiten-, 4-Jahreszeiten- oder Expeditionszelt).
    tent_setup_type:
      name: Zeltaufbauweise
      description: Gibt die Konstruktionsart des Zelts an, z. B. freistehend, halbfreistehend,
        nicht freistehend, aufblasbar/Luftrahmen oder Pop-up.
    tent_style:
      name: Zeltbauart
      description: Beschreibt die Bauform des Zelts (z. B. Kuppel-, Tunnel- oder A-Zelt).
    test_result_output_method:
      name: Methode zur Ausgabe der Testergebnisse
      description: Gibt an, wie das Fahrzeugbatterietestgerät die Testergebnisse anzeigt
        bzw. bereitstellt (z. B. Kontrollanzeige, Bildschirm, Ausdruck, App oder Softwarebericht).
    tether_strap_system:
      name: Befestigungs-/Gurtsystem
      description: Art des Befestigungs- bzw. Gurtsystems, mit dem die Nackenstütze
        mit Helm oder Gurt verbunden wird (falls zutreffend).
    text_color:
      name: Textfarbe
      description: Farbe des aufgedruckten bzw. gestickten Textes auf dem Etikett,
        unabhängig von der Hintergrundfarbe des Etiketts.
    textile_craft_machine_operation_type:
      name: Betriebsart der Textilhandarbeitsmaschine
      description: Beschreibt, wie die Maschine betrieben wird (handbetrieben, fußbetrieben
        oder motorisiert/elektrisch).
    textile_finish_treatment:
      name: Textilveredelung/-behandlung
      description: Gibt besondere Oberflächenbehandlungen an, die auf das Textilmaterial
        angewendet wurden.
    texture_inclusions:
      name: Zusätzliche Texturelemente
      description: Gibt zusätzliche Bestandteile für die Textur an, z. B. Aloe-Fruchtfleisch,
        Basilikumsamen, Nata de Coco, Popping Boba oder Fruchtstücke.
    therapeutic_technology:
      name: Therapeutische Technologie
      description: Gibt integrierte therapeutische Funktionen an, z. B. Kühlgel, Magnetstreifen
        oder Infrarotkeramik.
    thermal_set_components:
      name: Im Thermowäscheset enthaltene Artikel
      description: Gibt an, ob das Produkt nur Unterteil, nur Oberteil oder beide
        Teile als Set umfasst.
    thermal_weight:
      name: Wärmegrad
      description: Gibt die Wärmekategorie des Sturmhaubenmaterials an.
    thermostat_type:
      name: Thermostattyp
      description: Die funktionale Bauart bzw. Regelungsart eines Thermostats für
        Fahrzeugkühlsysteme.
    thimble_guide_size:
      name: Größe der Fingerhutführung
      description: Größenangabe der Fingerhutführung (Passform/Abdeckungsgröße), üblicherweise
        als klein/mittel/groß statt mit exakten Maßen angegeben.
    thread_connection_size:
      name: Gewindeanschlussgröße
      description: Definiert die Gewindespezifikation zur Verbindung von Schäften,
        Spitzen und Adaptern (z. B. 6 mm oder 5/16"-24).
    thread_construction:
      name: Garnkonstruktion
      description: Beschreibt, wie das Garn aufgebaut bzw. behandelt ist (z. B. mehrsträngiges
        Stickgarn oder gebondetes Garn).
    thread_cord_type_beading_pattern:
      name: Garn-/Kordelart (Perlenmuster)
      description: Empfohlene Garn- bzw. Kordelart zur Fertigstellung des Musters.
    thread_cutter_form_factor:
      name: Bauform des Fadenschneiders
      description: Kennzeichnet die Bauform des Fadenschneiders, z. B. Hand-, Anhänger-
        oder Ringausführung.
    thread_cutter_mechanism:
      name: Schneidmechanismus des Fadenschneiders
      description: Beschreibt die Schneidfunktion bzw. den Mechanismus des Fadenschneiders.
    thread_cutter_safety_features:
      name: Sicherheitsmerkmale des Fadenabschneiders
      description: Bezeichnet integrierte Sicherheitsfunktionen die das Risiko für
        versehentliche Schnittverletzungen reduzieren oder die Klinge während der
        Aufbewahrung schützen sollen.
    thread_cutter_usage_application:
      name: Verwendungszweck des Fadenschneiders
      description: Gibt den hauptsächlichen Einsatzbereich des Fadenschneiders im
        Handarbeits- bzw. Bastelbereich an.
    thread_finish_treatment:
      name: Fadenveredelung/-behandlung
      description: Oberflächenbehandlung bzw. Veredelung des Garns, die Handhabung
        und Eigenschaften beeinflusst (z. B. gewachst, gebondet oder mercerisiert).
    thread_material:
      name: Garnmaterial
      description: Hauptfaser bzw. Hauptmaterial des Garns bzw. der Stickseide (nicht
        des Stoffes).
    thread_material_fiber:
      name: Garnmaterial (Faser)
      description: Gibt die primäre Faser bzw. das Hauptmaterial des Garns selbst
        an (nicht des Stoffes).
    thread_package_format:
      name: Verpackungsform des Garns
      description: Verpackungsart des Nähgarns (z. B. Spule, Konus oder Unterfadenspule).
    thread_rack_compatible_spool_type:
      name: Kompatibler Spulentyp für das Garnregal
      description: Gibt an, für welche Garnverpackungen das Regal ausgelegt ist (z. B.
        Spulen oder Konen).
    thread_standard_size:
      name: Standardmaße des Fadens
      description: Gibt den auf dem Produktetikett verwendeten Standard für Garnstärke
        bzw. Garngewicht an (z. B. wt, Tex oder Denier).
    thread_type:
      name: Garnart
      description: Gibt die Art bzw. Konstruktion des Kreuzstichgarns bzw. der Stickseide
        an.
    thread_weight_system:
      name: Garnstärkensystem
      description: Der Standard zur Angabe von Garnstärke bzw. Garngewicht.
    thread_yarn_guide_mounting_attachment_style:
      name: Befestigungsart der Garnführung
      description: Beschreibt, wie die Führung während der Verwendung getragen bzw.
        befestigt wird.
    thread_yarn_guide_tension_control:
      name: Spannungsregelung der Garnführung
      description: Gibt an, ob und wie die Führung eine einstellbare Spannung bzw.
        einen einstellbaren Widerstand für Garn oder Faden bietet.
    thread_yarn_organizer_features:
      name: Funktionen des Garnorganizers
      description: Hebt Funktionen zur Organisation und Mobilität hervor, die speziell
        für die Aufbewahrung von Garnen und Fäden gedacht sind.
    threader_intended_use:
      name: Verwendungszweck des Einfädlers
      description: Kennzeichnet den hauptsächlichen Einsatzbereich, für den der handgeführte
        Nadeleinfädler konzipiert ist.
    threading_system:
      name: Einfädelsystem
      description: Gibt die Methode und Hilfsmittel zum Einfädeln der Overlockmaschine
        an (z. B. manuell, farbcodiert, geführt oder Lufteinfädelung).
    threading_type:
      name: Gewindeart
      description: Gibt an, ob das Schmuckstück ein Innengewinde, Außengewinde, kein
        Gewinde besitzt oder dies nicht zutrifft.
    throttle_type_scooter_conversion:
      name: Gasgriffart (Rollerumbau)
      description: Gibt die Bauform bzw. Schnittstelle des Gasgriffs an, die im Umrüstkit
        enthalten ist oder benötigt wird.
    throw_rope_end_attachment:
      name: Endbefestigung des Wurfseils
      description: Beschreibt die Befestigung bzw. Schlaufe am Arbeitsende des Wurfseils.
    throw_rope_storage_packaging_type:
      name: Aufbewahrungs-/Verpackungsart des Wurfseils
      description: Beschreibt, wie das Wurfseil aufbewahrt bzw. bereitgestellt wird
        (z. B. Tasche oder Rolle).
    throw_rope_visibility_features:
      name: Sichtbarkeitsmerkmale des Wurfseils
      description: Sichtbarkeits- und Kennzeichnungsmerkmale, die das Seil im Wasser
        bzw. bei schlechten Lichtverhältnissen besser sichtbar machen sollen.
    thrower_operation_type:
      name: Betriebsart der Wurfmaschine
      description: Klassifiziert die mechanische Bauart bzw. Funktionsweise des Werfers
        zur schnellen Unterscheidung zwischen manuellen und automatischen Mechanismen.
    thumb_design:
      name: Daumenkonstruktion
      description: Beschreibt, wie der Daumen im Handschuh integriert ist und wie
        sich dies auf Sicherheit und Griffigkeit auswirkt.
    tiara_design:
      name: Tiara-Stil
      description: Gibt die allgemeine Bauform bzw. Silhouette der Tiara an.
    tie_down_points_straps_included:
      name: Enthaltene Verzurrpunkte/Gurte
      description: Gibt an, ob der Gepäckträger integrierte Verzurrpunkte und/oder
        Gurte zur Sicherung des Motorrads bzw. Rollers enthält.
    tiling_format:
      name: Kachelformat
      description: Gibt das PDF-Layout zur Zusammensetzung gedruckter Seiten an.
    time_current_characteristic:
      name: Zeit-Strom-Kennlinie
      description: Gibt das Zeit-Strom-Verhalten der Sicherung an (z. B. flink oder
        träge), was die Eignung für Einschaltstromkreise beeinflusst.
    timer_count_mode:
      name: Zählmodus des Timers
      description: Gibt den Zählmodus des Timers an, z. B. Countdown, Hochzählen (Stoppuhr),
        beides oder Intervall-/Wiederholungsmodus.
    timer_display_type:
      name: Art der Timeranzeige
      description: Gibt an, wie der Spieltimer die verbleibende Zeit anzeigt (z. B.
        Digitalanzeige, analoges Zifferblatt, Sanduhr oder ohne visuelle Anzeige).
    timer_operating_modes:
      name: Betriebsmodi des Timers
      description: Unterstützte Timerfunktionen zum Auslösen von Effekten.
    timing_belt_construction_material_rubber_compound:
      name: Material des Zahnriemens (Gummimischung)
      description: Gibt die hauptsächlich verwendete Gummimischung des Riemens an
        (z. B. HNBR), die Hitze- und Ölbeständigkeit sowie die Lebensdauer beeinflusst.
    timing_belt_profile:
      name: Zahnriemenprofil
      description: Zahnprofil bzw. Zahnform des Zahnriemens (z. B. trapezförmig oder
        kurvenförmig).
    timing_belt_reinforcement_cord_material:
      name: Material der Verstärkungskordel des Zahnriemens
      description: Gibt das Material der inneren Verstärkungskordel im Zahnriemen
        an (z. B. Glasfaser oder Aramid), das Festigkeit und Dehnung beeinflusst.
    timing_component_material:
      name: Material der Motorsteuerungskomponenten
      description: Hauptmaterial der Steuerkomponente (Riemenmischung, Ketten-/Zahnradmetall
        oder Abdeckungsmaterial).
    tin_whistle_body_material:
      name: Material des Tin-Whistle-Korpus
      description: Erfasst gängige Materialien des Tin-Whistle-Korpus bei Bedarf genauer
        als die allgemeine Instrumentenmaterialliste.
    tin_whistle_bore_type:
      name: Bohrungsart der Tin Whistle
      description: Gibt die Bohrungskonstruktion der Tin Whistle an.
    tin_whistle_included_accessories:
      name: Enthaltenes Zubehör für die Tin Whistle
      description: Zubehör, das zusammen mit der Tin Whistle geliefert wird (z. B.
        Etui oder Reinigungsstab).
    tip_finish_coating:
      name: Beschichtung der Spitze
      description: Gibt die Oberflächenbehandlung am Arbeitsende an (z. B. verchromt
        oder pulverbeschichtet), die Korrosionsbeständigkeit und Felgenschutz beeinflusst.
    tip_shape:
      name: Spitzenform
      description: Beschreibt die Form bzw. Schärfe der Plektrumspitze, die Artikulation
        und Spielgefühl beeinflusst.
    tippet_rating:
      name: Vorfachstärkenbewertung
      description: Gibt die maximal empfohlene Vorfachstärke in den beim Fliegenfischen
        üblichen X-Bezeichnungen an (z. B. 4X).
    tire_changer_operation_type:
      name: Betriebsart der Reifenmontiermaschine
      description: Gibt an, wie die Reifenmontiermaschine betrieben bzw. betätigt
        wird (z. B. manuell, pneumatisch oder hydraulisch). Unterscheidet sich vom
        allgemeinen Attribut „Energiequelle“ und wird verwendet, um die Betätigungsart
        der Maschine zu beschreiben.
    tire_changer_type:
      name: Typ der Reifenmontiermaschine
      description: Beschreibt die allgemeine Bauart, Funktionsweise oder den Automatisierungsgrad
        einer Reifenmontiermaschine.
    tire_compound_type:
      name: Art der Reifenmischung
      description: Gibt die Klassifizierung der verwendeten Reifenmischung an (z. B.
        weich, Regen oder Slick), die Traktion und Haltbarkeit unter verschiedenen
        Bedingungen beeinflusst.
    tire_load_range:
      name: Tragfähigkeitsbereich des Reifens
      description: Gibt die Tragfähigkeits- bzw. Ply-Rating-Klassifizierung des Reifens
        an (häufig bei LT-Reifen), die die maximale Belastbarkeit widerspiegelt.
    tire_position:
      name: Reifenposition
      description: Empfohlene Montageposition am Fahrzeug.
    tire_repair_kit_components:
      name: Komponenten des Reifenreparatursets
      description: Gibt die im Set enthaltenen Komponenten an, damit Kund:innen die
        Vollständigkeit verschiedener Sets vergleichen können.
    tire_sidewall_type:
      name: Reifenseitenwandtyp
      description: Gibt die Gestaltung bzw. Bauweise der Reifenseitenwand an.
    tire_speed_rating:
      name: Geschwindikeitsklasse der Reifen
      description: Geschwindigkeitsindex des Reifens (z. B. H, V oder W), der die
        maximal zulässige Dauergeschwindigkeit angibt.
    tire_spoon_type:
      name: Typ des Reifenmontierhebels
      description: Klassifiziert den Reifenmontierhebel nach Endform und Verwendungszweck.
    tire_system_compatibility:
      name: Kompatibilität des Reifensystems
      description: Gibt an, ob das Dichtmittel für schlauchlose Reifen, Schlauchreifen
        oder beide Varianten geeignet ist.
    tire_temperature_rating_utqg:
      name: Temperaturklasse des Reifens (UTQG)
      description: UTQG-Temperaturklasse für Fahrzeugreifen (z. B. A, B oder C).
    tire_traction_rating_utqg:
      name: Traktionsklasse des Reifens (UTQG)
      description: UTQG-Traktionsklasse für die Nassbremsleistung.
    tire_tread_style:
      name: Reifenprofil
      description: Beschreibt das allgemeine Profil des Schlauchreifens, das den vorgesehenen
        Untergrund und die Traktionseigenschaften widerspiegelt.
    tire_tube_type:
      name: Reifenschlauchtyp
      description: Gibt an, ob der Reifen für schlauchlose Systeme oder Schlauchreifen
        ausgelegt ist.
    title_status:
      name: Qualitätseinstufung
      description: Rechts- bzw. Zulassungsstatus des Fahrzeugs.
    tobacco_application:
      name: Verwendungszweck des Tabaks
      description: Gibt die vorgesehene Konsumart bzw. das Rauchgerät an, für das
        der lose Tabak bestimmt ist.
    tobacco_cut_type:
      name: Schnittart des Tabaks
      description: Gibt die Schnitt- bzw. Aufbereitungsart des losen Tabaks an, die
        Brennverhalten, Stopfmethode und Raucherlebnis beeinflusst.
    tobacco_strength:
      name: Tabakstärke
      description: Gibt die wahrgenommene Stärke bzw. den Nikotingehalt des Tabaks
        an und hilft Käufer:innen, die passende Intensität auszuwählen.
    toe_construction:
      name: Zehenkonstruktion
      description: Gibt die Bauart des Zehenbereichs von Neoprenschuhen an, die Gleichgewicht,
        Boardgefühl und Wärmeisolierung beeinflusst.
    toe_coverage:
      name: Zehenabdeckung
      description: Gibt an, welche Art der Zehenabdeckung die Socke bietet.
    toe_pick_style:
      name: Form des Zackens
      description: Beschreibt die Bauform des Zackens an Eiskunstlaufkufen.
    toe_protection_type:
      name: Art des Zehenschutzes
      description: Gibt an, ob und wie der Zehenbereich aus Sicherheitsgründen verstärkt
        ist (z. B. Stahlkappe oder weiche Zehenkappe).
    toe_reinforcement_type:
      name: Art der Zehenverstärkung
      description: Beschreibt die Konstruktion des Zehenbereichs, die Haltbarkeit
        und Schuhkompatibilität beeinflusst.
    toe_stop_stem_thread_size:
      name: Gewindegröße des Toe-Stop-Schafts
      description: Gibt die Gewindegröße des Toe-Stop-Schafts an, um die Kompatibilität
        mit der Platte sicherzustellen.
    tofu_preparation_style:
      name: Zubereitungsart des Tofus
      description: Klassifiziert die traditionelle Art bzw. Unterkategorie von Tofu
        unabhängig vom Härtegrad (z. B. Seidentofu, Blocktofu, Pufftofu, Tofuhaut,
        Tofuknoten oder fermentierter Tofu).
    tom_mount_adjustment_features:
      name: Einstellfunktionen der Tomhalterung
      description: Gibt an, welche Einstellmöglichkeiten die Tomhalterung zur Positionierung
        der Trommel bietet (z. B. Neigung, Drehung oder Höhe).
    tom_mount_components_included:
      name: Beim Tom-Halter inbegriffene Komponenten
      description: Gibt an, welche Teile im Lieferumfang der Tomhalterung enthalten
        sind (Empfänger, Arm, Kugelgelenk, Klemmen, Memory Locks usw.).
    tom_mount_mounting_position:
      name: Montageposition der Tomhalterung
      description: Gibt an, wo die Tomhalterung befestigt werden soll (z. B. an der
        Bassdrum, am Beckenständer oder am Rack).
    tonneau_cover_mounting_style:
      name: Anbringungsart der Ladeflächenabdeckung
      description: Gibt an, wie die Laderaumabdeckung an den Ladeflächenschienen befestigt
        wird.
    tool_case_form_factor:
      name: Bauform des Werkzeugkoffers
      description: Kennzeichnet die Bauform des Werkzeugkoffers, die sich auf Transport
        und Aufbewahrung auswirkt (z. B. Aktentasche oder Hartschalenkoffer).
    tool_functions_included:
      name: Enthaltene Werkzeugfunktionen
      description: Listet die konkreten Reparatur- bzw. Wartungsfunktionen auf, die
        das Multifunktionswerkzeug oder Werkzeugset ausführen kann.
    top_bunk_access_method:
      name: Zugang zum oberen Bett
      description: Gibt an, wie das obere Bett erreicht wird, was Sicherheit und Platzplanung
        unterstützt.
    top_fit:
      name: Passform des Oberteils
      description: Gibt die allgemeine Passform bzw. Silhouette des Oberteils an (z. B.
        Slim Fit oder Oversize).
    top_hat_style:
      name: Zylinderstil
      description: Kennzeichnet die spezifische Stilvariante des Zylinders.
    top_soundboard_material:
      name: Material der Decke (Resonanzboden)
      description: Gibt das Material der Gitarrendecke bzw. des Resonanzbodens an
        (der hauptsächlichen klangerzeugenden Fläche).
    topping_form:
      name: Form des Toppings
      description: Definiert die physische Form bzw. Konsistenz des Dessert-Toppings,
        damit Käufer:innen schneller die gewünschte Variante finden.
    topping_type:
      name: Art des Toppings
      description: Gibt das hauptsächliche äußere Topping bzw. die Beschichtung des
        Donuts an.
    tow_hook_type:
      name: Typ des Abschlepphakens
      description: Gibt an, ob das Kneeboard über einen integrierten Abschlepphaken
        verfügt und welche Mechanismusart verwendet wird.
    tow_point_configuration:
      name: Art der Schleppvorrichtung
      description: Gibt die Konfiguration der Zugpunkte (einfach, doppelt oder mehrfach)
        des Towable Tubes für verschiedene Fahrpositionen an.
    tow_strap_protective_features:
      name: Schutzmerkmale des Abschleppgurts
      description: Besondere Sicherheits- und Haltbarkeitsmerkmale des Abschleppgurts.
    tow_strap_type:
      name: Abschleppseiltyp
      description: Gibt die funktionale Bauart des Abschleppgurts an, z. B. statischer
        Abschleppgurt oder kinetischer Bergungsgurt.
    towable_tube_style:
      name: Bauform des Towable Tubes
      description: Kennzeichnet die allgemeine Bauform des Towable Tubes, die Fahrposition
        und Fahrerlebnis bestimmt.
    towed_water_sport_discipline:
      name: Wassersportart
      description: Gibt die hauptsächliche gezogene Wassersportart an, für die der
        Handschuh ausgelegt ist.
    towel_features:
      name: Handtuchmerkmale
      description: Listet besondere Eigenschaften oder Extras des Handtuchs auf.
    towel_style:
      name: Handtuchart
      description: Klassifiziert die funktionale Bauform bzw. das Format des Golfhandtuchs.
    toy_airplane_control_type:
      name: Steuerungsart des Spielzeugflugzeugs
      description: Gibt an, wie das Spielzeugflugzeug gesteuert wird.
    toy_airplane_features:
      name: Funktionen des Spielzeugflugzeugs
      description: Hebt besondere Spielfunktionen des Spielzeugflugzeugs hervor.
    toy_airplane_flight_capability:
      name: Flugfähigkeit des Spielzeugflugzeugs
      description: Gibt an, ob das Spielzeugflugzeug tatsächlich fliegen bzw. gleiten
        kann oder hauptsächlich zum Spielen bzw. Ausstellen gedacht ist.
    toy_audio_features:
      name: Audiofunktionen des Spielzeugs
      description: Listet die integrierten Audiofunktionen und Soundeffekte des Spielzeugs
        auf.
    toy_boat_play_features:
      name: Spielfunktionen des Spielzeugboots
      description: Hebt besondere interaktive Funktionen von Spielzeugbooten hervor,
        um Suche und Filterung zu erleichtern.
    toy_boat_recommended_play_environment:
      name: Empfohlene Spielumgebung für Spielzeugboote
      description: Gibt die vorgesehene Spielumgebung des Spielzeugboots an, um Erwartungen
        und Sicherheit zu unterstützen (z. B. Badewanne oder offenes Wasser).
    toy_bowling_equipment_included:
      name: Enthaltene Spielzeug-Bowlingausrüstung
      description: Gibt an, welche Bowlingbestandteile im Spielzeug-Bowlingset enthalten
        sind (z. B. Kegel, Ball, Bahn/Matte oder Tragetasche).
    toy_car_features:
      name: Funktionen des Spielzeugautos
      description: Hebt integrierte Spielfunktionen des Spielzeugautos hervor (unabhängig
        vom Antrieb), z. B. Lichter, Geräusche oder zu öffnende Teile.
    toy_drawing_tablet_accessories_included:
      name: Enthaltenes Zubehör für das Spielzeug-Zeichentablett
      description: Zusätzlich enthaltenes Zubehör über das Tablet hinaus (z. B. zusätzlicher
        Stift oder Stempel).
    toy_drawing_tablet_erase_method:
      name: Löschmethode des Spielzeug-Zeichentabletts
      description: Beschreibt, wie die Zeichenfläche gelöscht bzw. gereinigt wird.
    toy_drawing_tablet_screen_type:
      name: Bildschirmtyp des Spielzeug-Zeichentabletts
      description: Gibt die verwendete Zeichen- bzw. Anzeigeoberfläche an (z. B. LCD-Schreibtablett
        oder magnetische Oberfläche).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Schreib-/Zeichenwerkzeug des Spielzeug-Zeichentabletts
      description: Primäres Zeichenwerkzeug für das Tablet (Art des Stifts).
    toy_figure_sound_feature:
      name: Soundfunktion der Spielfigur
      description: Gibt an, ob die Tierfigur Geräusche erzeugt und welche Art von
        Geräuschen (z. B. Brüllen oder realistische Tierlaute).
    toy_game_features:
      name: Spielzeugeigenschaften
      description: Hebt besondere Spiel- oder Konstruktionsmerkmale hervor, die für
        Strand- und Sandspielzeug relevant sind.
    toy_gift_basket_items_included:
      name: Im Geschenkkorb enthaltenes Spielzeug
      description: Listet die wichtigsten Arten von Spielzeugartikeln auf, die im
        Geschenkkorb enthalten sind (z. B. Plüschtier, Bausatz oder Puzzle).
    toy_glider_launch_method:
      name: Startmethode des Spielzeuggleiters
      description: Gibt an, wie der Spielzeuggleiter gestartet wird, was sich auf
        Spielweise und Erwartungen der Käufer:innen auswirkt.
    toy_helicopter_control_type:
      name: Steuerungsart des Spielzeughubschraubers
      description: Beschreibt, wie der Spielzeughubschrauber gesteuert bzw. bedient
        wird (unabhängig vom Antrieb), z. B. per Fernbedienung, App-Steuerung oder
        ohne Steuerung (Freiflug).
    toy_helicopter_features:
      name: Funktionen des Spielzeughubschraubers
      description: Wichtige Funktionsmerkmale eines Spielzeughubschraubers (insbesondere
        RC-Modelle), die Benutzerfreundlichkeit und Spielwert beeinflussen.
    toy_jacks_set_items_included:
      name: Enthaltene Bestandteile des Hüpfspiel-Sets
      description: Gibt an, welche Hauptbestandteile im Hüpfspiel-Set enthalten sind
        (z. B. Spielsteine, Ball oder Beutel).
    toy_keyboard_learning_mode:
      name: Lernmodus des Spielzeugkeyboards
      description: Kennzeichnet den Lernansatz, den das Spielzeugkeyboard unterstützt
        (z. B. leuchtende Tasten, Mitsinglieder, geführte Lektionen oder App-gestütztes
        Lernen).
    toy_keyboard_sound_theme:
      name: Klangthema des Spielzeugkeyboards
      description: Arten integrierter Instrumentenklänge bzw. Klangthemen (über einfache
        Klavierklänge hinaus).
    toy_kitchen_appliances_included:
      name: Enthaltene Spielzeugküchengeräte
      description: Gibt an, welche(s) Küchengerät(e) im Spielset dargestellt sind,
        wenn das Produkt ein einzelnes Gerät oder ein auf Küchengeräte ausgerichtetes
        Set ist.
    toy_kitchen_assembly_requirement:
      name: Montageaufwand der Spielzeugküche
      description: Gibt an, ob eine Montage erforderlich ist und wie aufwendig sie
        ungefähr ist.
    toy_kitchen_interactive_features:
      name: Interaktive Funktionen der Spielzeugküche
      description: Hebt interaktive Elemente hervor, die häufig in Spielzeugküchen
        und passendem Zubehör vorkommen.
    toy_motorcycle_feature_set:
      name: Funktionsumfang des Spielzeugmotorrads
      description: Wichtige Spielfunktionen des Spielzeugmotorrads (alle zutreffenden
        auswählen).
    toy_motorcycle_scale:
      name: Maßstab des Spielzeugmotorrads
      description: Maßstabsverhältnis für Spielzeug- bzw. Sammlermotorräder (z. B.
        1:12).
    toy_parachute_launch_method:
      name: Startmethode des Spielzeugfallschirms
      description: Beschreibt, wie das Spielzeug gestartet bzw. für den Flug eingesetzt
        wird.
    toy_piano_and_keyboard_accessories_included:
      name: Enthaltenes Zubehör für Spielzeugklavier und -keyboard
      description: Zubehör, das zusammen mit dem Spielzeugklavier bzw. Spielzeugkeyboard
        geliefert wird.
    toy_playset_assembly_required:
      name: Montage des Spielsets erforderlich
      description: Gibt an, ob vor dem Spielen eine Montage durch Erwachsene erforderlich
        ist (über einfaches Zusammenstecken hinaus).
    toy_playset_items_included:
      name: Im Spielset enthaltene Artikel
      description: Listet die wichtigsten im Spielset enthaltenen Bestandteile auf
        (Lieferumfang).
    toy_safety_certification:
      name: Sicherheitszertifizierung des Spielzeugs
      description: Sicherheits- und Konformitätsstandards/-kennzeichnungen, die für
        Spielzeug im jeweiligen Markt gelten (z. B. EN 71, ASTM F963 oder UKCA).
    toy_spaceship_features:
      name: Funktionen des Spielzeugraumschiffs
      description: Kennzeichnet typische interaktive bzw. spielerische Funktionen
        des Spielzeugraumschiffs.
    toy_spaceship_size_class:
      name: Größenklasse des Spielzeugraumschiffs
      description: Gibt eine allgemeine Größenklasse des Spielzeugraumschiffs an,
        um eine schnelle Filterung zu ermöglichen, unabhängig von exakten Abmessungen
        (Länge/Breite/Höhe) und ohne numerischen Modellmaßstab (z. B. 1:72).
    toy_tableware_pieces_included:
      name: Inbegriffene Teile des Spielgeschirrsets
      description: Gibt an, welche Spielzeuggeschirrteile enthalten sind (Teller,
        Tassen, Besteck oder Servierteile).
    toy_tool_electronic_features:
      name: Elektronische Funktionen des Spielzeugwerkzeugs
      description: Beschreibt interaktive bzw. elektronische Funktionen des Spielzeugwerkzeugs
        (Lichter, Geräusche, Drehbewegungen usw.).
    toy_tool_set_components_included:
      name: Enthaltene Komponenten des Spielwerkzeug-Sets
      description: Listet die konkreten Rollenspiel-Werkzeuge auf, die im Paket enthalten
        sind (insbesondere bei Werkzeugsets).
    toy_train_scale:
      name: Maßstab des Spielzeugzugs
      description: Gibt den Maßstabsstandard der Spielzeug-/Modelleisenbahn (bzw.
        die Gleissystemgröße) an, um die Kompatibilität mit vorhandenen Zügen und
        Gleisen sicherzustellen.
    toy_train_track_layout_type:
      name: Gleislayouttyp der Spielzeugeisenbahn
      description: Beschreibt das enthaltene Gleislayout bzw. die Gleisform eines
        Zugsets oder einer Gleiserweiterung.
    toy_weapon_gadget_features:
      name: Funktionen von Spielzeugwaffen und Gadgets
      description: Hebt typische interaktive und funktionale Merkmale von Spielzeugwaffen
        und Spionage-Gadgets hervor.
    tpms_sensor_frequency_band:
      name: Frequenzband des TPMS-Sensors
      description: Funkfrequenzband, das von TPMS-Zubehör unterstützt wird (falls
        zutreffend).
    track_and_field_discipline:
      name: Leichtathletikdisziplin
      description: Gibt die konkrete Leichtathletikdisziplin an, für die das Produkt
        vorgesehen ist (z. B. Kugelstoßen, Stabhochsprung oder Sprint).
    track_event_specialization:
      name: Spezialisierung auf Laufdisziplinen
      description: Gibt an, für welche Disziplin der Spikeschuh optimiert ist.
    track_field_event_suitability:
      name: Eignung für Leichtathletikdisziplinen
      description: Kennzeichnet die konkrete(n) Leichtathletikdisziplin(en), für die
        die Trainingshilfe vorgesehen ist.
    track_set_special_features:
      name: Besondere Funktionen des Rennstrecken-Sets
      description: Hebt besondere Spielfunktionen hervor, die zusätzlich zu Strecke
        und Fahrzeugen im Rennstrecken-Set enthalten sind.
    track_surface_compatibility:
      name: Geeignete Geländeart
      description: Gibt die Laufuntergründe an, für die der Spike bzw. Schuh ausgelegt
        ist.
    tracking_aid_type:
      name: Art der Spurhilfe
      description: Gibt an, ob das Kajak über Vorrichtungen verfügt, die die Spurtreue
        verbessern.
    traction_pattern_type:
      name: Art des Traktionsprofils
      description: Beschreibt die primäre Oberflächenrille bzw. das Profil, das für
        Halt auf dem Pad sorgt.
    trading_card_league:
      name: Liga der Sammelkarte
      description: Gibt die Sportliga an, mit der das Kartenset bzw. Motiv verbunden
        ist (falls zutreffend).
    trailer_construction:
      name: Bauweise des Anhängers
      description: Gibt die hauptsächliche Bauweise des Anhängers bzw. Rahmens an
        (z. B. Aluminium, Stahl oder Mischbauweise).
    trailer_coupler_size:
      name: Größe der Anhängerkupplung
      description: Gibt die Kugelgröße der Anhängerkupplung an, die zum Ziehen erforderlich
        ist.
    trailer_hitch_mounting_location_method:
      name: Montageort/-art der Anhängerkupplung
      description: Gibt an, wo und wie die Anhängerkupplung am Fahrzeug montiert wird
        (z. B. hinten, vorne, am Rahmen, an der Stoßstange oder an der Ladefläche).
    trailer_light_function:
      name: Funktion der Anhängerbeleuchtung
      description: Hauptfunktion bzw. Position der Anhängerleuchte.
    trailer_suspension_type:
      name: Art der Anhängerfederung
      description: Gibt die Art des im Fahrradanhänger verwendeten Federungssystems
        an, z. B. Schraubenfeder oder Blattfeder, um Fahrkomfort und Schutz der Ladung
        zu verbessern.
    trailer_wiring_circuit:
      name: Stromkreise der Anhängerverkabelung
      description: Listet die Beleuchtungs-, Brems- und Zusatzstromkreise bzw. -signale
        der Anhängerverkabelung auf (d. h. welche Strom-, Masse- und Signalleitungen
        vorhanden sind).
    trailer_wiring_connector_type:
      name: Steckertyp der Anhängerverkabelung
      description: Gibt den Steckstandard auf Anhänger- bzw. Fahrzeugseite an, der
        für Anhängerkabelbäume und Adapter verwendet wird.
    train_whistle_intended_use:
      name: Verwendungszweck der Zugpfeife
      description: Hauptsächlicher Einsatzbereich der Pfeife.
    train_whistle_sound_character:
      name: Klangcharakter der Zugpfeife
      description: Beschreibt den wahrgenommenen Klangcharakter (die Klangfarbe) der
        Pfeife.
    trainer_mounting_type:
      name: Heimtrainer-Montageart
      description: Beschreibt, wie das Fahrrad mit dem Trainer verbunden wird (z. B.
        Wheel-on oder Direct Drive).
    training_dummy_shape:
      name: Form der Trainingspuppe
      description: Gibt das Gesamtdesign bzw. die Silhouette der Trainingspuppe an,
        was Halt und Trainingsrealismus beeinflusst.
    training_focus:
      name: Trainingsschwerpunkt
      description: Beschreibt den primären Kompetenzbereich, auf den die Trainingshilfe
        abzielt (z. B. Reflexe, Fußarbeit oder Hand-Augen-Koordination).
    training_focus_area:
      name: Schwerpunktbereich des Trainings
      description: Gibt die wichtigste Lacrosse-Fähigkeit an, die mit der Trainingshilfe
        entwickelt werden soll.
    training_objective:
      name: Trainingsziel
      description: Gibt die wichtigste Fähigkeit bzw. Technik an, die mit dem Produkt
        verbessert werden soll.
    training_surface_suitability:
      name: Eignung des Trainingsuntergrunds
      description: Gibt an, auf welchen Untergründen das Trainingsgerät verwendet
        werden kann.
    training_surface_usage:
      name: Verwendungszweck des Trainingsuntergrunds
      description: Gibt die hauptsächlichen Einsatzbereiche der Trainingsfläche an
        und unterscheidet dabei befahrbare Kunsteisplatten von Trocken- oder Multisportmatten.
    training_usage_type:
      name: Art der Trainingsnutzung
      description: Gibt den hauptsächlichen Verwendungszeitraum bzw. Einsatzbereich
        der Trainingshose an, z. B. tagsüber oder über Nacht.
    trampoline_enclosure_type:
      name: Art der Trampolinumrandung
      description: Gibt die Bauart der Trampolinumrandung an, einschließlich der Art
        und Position der Netzbefestigung.
    trampoline_safety_certifications:
      name: Sicherheitszertifizierungen des Trampolins
      description: Gibt an, welche trampolinrelevanten Sicherheitsstandards bzw. Zertifizierungen
        laut Hersteller erfüllt werden.
    transfer_application_method:
      name: Auftragungsmethode
      description: Gibt an, wie der Transfer auf den Stoff aufgebracht wird (z. B.
        Aufbügeln oder Transferpresse).
    transfer_method:
      name: Transfermethode
      description: Gibt an, wie das Design auf Stoff übertragen werden soll.
    transfer_peel_temperature:
      name: Abziehtemperatur des Transfers
      description: Gibt den empfohlenen Temperaturzustand (heiß, warm oder kalt) an,
        bei dem die Trägerfolie nach dem Pressen entfernt werden sollte.
    transmission_cooler_construction:
      name: Bauart des Getriebekühlers
      description: Gibt die Bauweise des Getriebekühlerkerns an.
    transmission_fluid_specification:
      name: Spezifikation des Getriebeöls
      description: OEM- bzw. Spezifikationsstandard, den das Getriebeöl erfüllt (z. B.
        Dexron-/Mercon-Familien, ATF+4 oder JWS 3309).
    transmission_mount_bushing_material:
      name: Material der Getriebelagerbuchse
      description: Gibt das Elastomer- bzw. Isolatormaterial an, das in der Lagerbuchse
        bzw. im Isolator verwendet wird (dem schwingungsdämpfenden Element).
    transmission_mount_type:
      name: Art der Getriebehalterung
      description: Gibt die Bauart bzw. Konstruktion der Getriebehalterung an (z. B.
        hydraulisch oder starr), um Passform, NVH-Eigenschaften und Verwendungszweck
        zu bestimmen.
    transparency_level:
      name: Transparenzgrad
      description: Beschreibt, wie durchsichtig die Behälterwände sind, damit Käufer:innen
        zwischen sichtbarer und verdeckter Aufbewahrung wählen können.
    transport_case_type:
      name: Art des Transportkoffers
      description: Klassifiziert die Bauart bzw. Stabilität der Transportlösung und
        spiegelt Schutzgrad sowie Verpackungsart wider.
    transposition_modes:
      name: Transpositionsmodi
      description: Gibt die Transpositions- bzw. Kammertonmodi an, die das Stimmgerät
        unterstützt (z. B. Kammerton sowie transponierende Tonarten wie B♭ oder E♭).
    trap_design:
      name: Fallendesign
      description: Kennzeichnet die Bauart bzw. den Mechanismus der Falle, die bzw.
        der die Aufstellmethode sowie die geeigneten Tierarten oder Einsatzumgebungen
        bestimmt.
    trap_spring_configuration:
      name: Federkonfiguration der Falle
      description: Gibt Anzahl bzw. Anordnung der Federn an, die die Falle antreiben,
        was Stärke und Zulässigkeit beeinflusst.
    travel_bassinet_accessories_included:
      name: Enthaltenes Zubehör für die Reisebabywanne
      description: Listet zusätzliches Zubehör auf, das zusammen mit der Reisebabywanne
        geliefert wird.
    travel_spinning_wheel_assembly_required:
      name: Montageaufwand des Reise-Spinnrads
      description: Gibt an, ob das Rad vor der Nutzung über das bloße Aufklappen hinaus
        montiert bzw. eingerichtet werden muss (z. B. Anbringen von Flügel, Spannung
        oder Tritten).
    travel_spinning_wheel_portability_features:
      name: Transportmerkmale des Reise-Spinnrads
      description: Beschreibt transportbezogene Konstruktionsmerkmale von Reise-Spinnrädern,
        z. B. faltbare Bauweise oder enthaltene Transportlösungen.
    travel_trailer_appliances_fuel_type:
      name: Kraftstoffart der Geräte im Wohnwagen
      description: Hauptbrennstoff für Bordgeräte, Heizung oder Kochgeräte (nicht
        für das Zugfahrzeug).
    travel_trailer_holding_tank_type:
      name: Art des Abwassertanks im Wohnwagen
      description: Gibt an, welche Abwassertanks im Wohnwagen vorhanden sind (Mehrfachauswahl
        möglich).
    travel_trailer_power_hookup_shore_power:
      name: Stromanschluss des Wohnwagens (Landstrom)
      description: Unterstützte elektrische(n) Anschlussstandard(s) für Landstromanschlüsse.
    tread_pattern_type:
      name: Reifenprofil
      description: Klassifiziert das allgemeine Reifenprofil, z. B. Slick, Semi-Slick
        oder Stollenprofil, das Traktion, Rollwiderstand und den vorgesehenen Untergrund
        beeinflusst.
    treadmill_key_type:
      name: Typ des Laufbandschlüssels
      description: Beschreibt die Bauform bzw. den Funktions- oder Verbindungsmechanismus
        des Sicherheitsschlüssels (z. B. magnetisch-rund, Kunststoffeinsatz oder Clip-System).
    treadmill_part_type:
      name: Art des Laufbandersatzteils
      description: Kennzeichnet die konkrete Laufbandkomponente, die durch das Produkt
        ersetzt werden soll, damit Käufer:innen die Kompatibilität schnell prüfen
        können (z. B. Laufbandgurt oder Motor).
    treadmill_position:
      name: Position am Laufband
      description: Kennzeichnet die Einbauposition des Teils am Laufband (vorne, hinten,
        oben, unten oder mittig).
    triangle_striker_material:
      name: Material des Triangelschlägels
      description: Material des mitgelieferten Schlägels.
    trigger_input_connector:
      name: Trigger Eingangsanschluss
      description: Gibt den physischen Anschlussstandard für Trigger-Eingänge an.
    trigger_input_connector_type:
      name: Anschlussart für den Trigger-Eingang
      description: Gibt den physischen Anschlusstyp für Trigger-Eingänge an.
    trigger_input_zone_support:
      name: Unterstützung für Trigger-Eingangszonen
      description: Gibt an, ob die Trigger-Eingänge Single-Zone- und/oder Dual-Zone-Trigger
        (z. B. Fell/Rand) sowie ähnliche Multi-Zone-Implementierungen unterstützen.
    trim_application_method:
      name: Befestigungsmethode der Bordüre
      description: Gibt an, wie die Borte an einem Projekt befestigt werden soll (z. B.
        aufnähen, aufbügeln oder kleben).
    trim_detail:
      name: Besatzdetails
      description: Kennzeichnet auffällige dekorative Kanten oder Abschlüsse am Kleidungsstück
        (z. B. Quasten-, Fransen- oder Spitzenbesatz).
    trim_elasticity:
      name: Elastizität des Besatzes
      description: Gibt an, ob die Zickzackborte dehnbar ist und sich dadurch für
        Strickwaren oder Sportbekleidung eignet.
    trim_finish:
      name: Oberflächentextur der Bordüre
      description: Oberflächenveredelung des Besatzes (z. B. Metallic-, Glitzer- oder
        Reflexeffekt).
    trim_tilt_type:
      name: Trimm- und Neigungsart
      description: Gibt an, ob und wie der Motor eine Trimm- bzw. Neigungsverstellung
        unterstützt.
    trolleybus_power_supply_type:
      name: Stromversorgungsart des Oberleitungsbusses
      description: Gibt an, wie der Oberleitungsbus seine Antriebsenergie aus dem
        Stromnetz bezieht.
    truck_bed_body_type:
      name: Art der LKW-Ladefläche/des Aufbaus
      description: Beschreibt die Bauform der Ladefläche bzw. des Aufbaus hinter dem
        Fahrerhaus.
    truck_bed_length_class:
      name: Längenklasse der LKW-Ladefläche
      description: Gibt die Längenklasse der Ladefläche an, für die das Ladungsnetz
        geeignet ist (üblicherweise kurz, Standard oder lang).
    truck_mounting_hole_pattern:
      name: Befestigungslochmuster der Achsen
      description: Gibt das Lochmuster zur Befestigung der Achsen am Deck an (z. B.
        Old School, New School oder Universal).
    truck_mounting_style:
      name: Montageart der Achse
      description: Beschreibt, wie die Achsen am Deck befestigt werden (Top Mount,
        Drop-Through usw.), was Fahrhöhe und Stabilität beeinflusst.
    truck_profile:
      name: Achsprofil
      description: Gibt die Bauhöhe der Skateboardachse im Verhältnis zum Deck an,
        was Rollenfreiheit und Fahrgefühl beeinflusst.
    trumpet_bell_material:
      name: Material des Trompetenschallstücks
      description: Material des Schallstücks, das sich teilweise vom übrigen Instrument
        unterscheidet.
    trumpet_leadpipe_material:
      name: Material des Trompeten-Mundrohrs
      description: Material bzw. Oberflächenbehandlung des Mundrohrs (Hauptrohr vom
        Mundstück zu den Ventilen).
    trundle_mechanism:
      name: Ausziehmechanismus
      description: Beschreibt, wie das zweite Bettteil aus dem Hauptrahmen herausgezogen
        wird.
    trunk_part_type:
      name: Art des Kofferraumteils
      description: Gibt an, welches kofferraumbezogene Karosserieteil verkauft wird
        (z. B. Kofferraumdeckel, Scharnier oder Schloss).
    tuba_leadpipe_material:
      name: Material des Tuba-Mundrohrs
      description: Gibt das Material an, das für das Leadpipe (Mundrohr) der Tuba
        verwendet wird.
    tube_base_type:
      name: Röhrensockelart
      description: Gibt die Sockel- bzw. Fassungsfamilie der Röhre an, die für die
        physische bzw. elektrische Passform verwendet wird (z. B. Oktal oder Noval/9-Pin).
    tube_matching_grade:
      name: Grad der Röhrenabstimmung
      description: Gibt an, ob die Röhren als Set geprüft bzw. abgestimmt wurden und
        welche Art der Abstimmung vorliegt.
    tube_weight_category:
      name: Gewichtsklasse des Fahrradschlauchs
      description: Klassifiziert den Schlauch nach Bauart bzw. Gewicht (z. B. ultraleicht,
        Standard oder Heavy Duty), um Haltbarkeit und Leistung schnell vergleichen
        zu können.
    tubeless_compatible:
      name: Tubeless-kompatibel
      description: Gibt an, ob das Rad für die Nutzung ohne Schlauch in Kombination
        mit Tubeless-Reifen ausgelegt ist.
    tubing_shape:
      name: Rohrform
      description: Gibt die Querschnittsform der Stützrohre des Ständers an.
    tubular_construction_type:
      name: Bau art des Schlauchreifens
      description: Gibt die Bauart von Fahrradschlauchreifen an und unterscheidet
        zwischen traditionellen geklebten Schlauchreifen und neueren Varianten.
    tulip_type_flower_form:
      name: Tulpenart (Blütenform)
      description: Gibt die gärtnerische Art bzw. Blütenform der Tulpen im Strauß
        an (z. B. einfach, gefüllt oder Papageientulpe).
    tuner_input_method:
      name: Eingangsmethode des Stimmgeräts
      description: Gibt an, wie das Stimmgerät die Tonhöhe erkennt (Mikrofon, Vibrations-/Clip-Sensor,
        Instrumentenkabeleingang oder Kontakttonabnehmer).
    tuning_mechanism:
      name: Stimmmechanismus
      description: Beschreibt, wie die Bongofelle gespannt bzw. gestimmt werden.
    tuning_system:
      name: Stimmsystem
      description: Beschreibt, wie die Kesseltrommel gestimmt wird bzw. ob sie stimmbar
        ist.
    turn_signal_lens_color:
      name: Farbe der Blinkerlinse
      description: Farbe der sichtbaren Linse bzw. Abdeckung des Blinkergehäuses (nicht
        die Lichtfarbe).
    turn_signal_lighting_style:
      name: Beleuchtungsstil des Blinkers
      description: Der visuelle Signalstil bzw. die Animation des Blinkers.
    turnip_and_rutabaga_variety:
      name: Sorte von Speiserübe und Steckrübe
      description: Kennzeichnet die konkrete Sorte bzw. Varietät der Speiserübe oder
        Steckrübe.
    tweeter_crossover_type:
      name: Art der Hochtöner-Frequenzweiche
      description: Gibt an, welche Art von Hochpassweiche und/oder Schutzbauteil im
        Hochtöner enthalten ist, falls vorhanden.
    tweeter_material:
      name: Material des Hochtöners
      description: Hauptmaterial der Membran bzw. Kalotte des Hochtöners.
    tweeter_mount_type:
      name: Montageart des Hochtöners
      description: Gibt an, wie der Hochtöner im Fahrzeug montiert werden soll (Montageart
        bzw. Montagematerial).
    twill_direction:
      name: Köperrichtung
      description: Gibt die Richtung der Köperlinie eines Denimgewebes an.
    twist_direction:
      name: Schlagungsart
      description: Gibt die Drehrichtung des Garns bzw. Fadens an (S- oder Z-Drehung).
    u_joint_series_size:
      name: Serie/Größe des Kreuzgelenks
      description: Gibt die verwendete Serie bzw. Größennorm des Kreuzgelenks an (z. B.
        Serie 1310).
    uilleann_pipes_bag_material:
      name: Material des Luftsacks der Uilleann Pipes
      description: Gibt das Material des Luftsacks an (falls vorhanden), das Spielgefühl,
        Haltbarkeit und Wartungsaufwand beeinflusst.
    uilleann_pipes_handedness:
      name: Händigkeit der Uilleann Pipes
      description: Gibt an, ob das Set für Rechts- oder Linkshänder ausgelegt ist.
    uilleann_pipes_set_configuration:
      name: Konfiguration des Uilleann-Pipes-Sets
      description: Gibt an, welche Konfiguration der Uilleann Pipes enthalten ist,
        basierend auf dem Vorhandensein von Regulatoren und Bordunen.
    uk_childrens_shoe_size:
      name: Britische Kinderschuhgröße
      description: Gibt die britische Kinderschuhgröße an, z. B. 4 oder 4 Wide.
    uk_clothing_size:
      name: UK-Kleidergröße
      description: Gibt die UK-Kleidergröße an, z. B. 12 oder 18
    uk_cup_size:
      name: UK-Körbchengröße
      description: Gibt die UK-BH-Körbchengröße an, z. B. C oder FF.
    uk_mens_shoe_size:
      name: Britische Herrenschuhgröße
      description: Gibt die britische Herrenschuhgröße an, z. B. 9 oder 9 Wide.
    uk_womens_shoe_size:
      name: Britische Damenschuhgröße
      description: Gibt die britische Damenschuhgröße an, z. B. 6 oder 6 Wide.
    ukulele_back_and_sides_wood:
      name: Holz von Boden und Zargen der Ukulele
      description: Gibt das Holz bzw. Material an, das für Boden und Zargen der Ukulele
        verwendet wird.
    ukulele_body_cutaway:
      name: Cutaway des Ukulelenkorpus
      description: Gibt an, ob der Korpus der Konzertukulele über einen Cutaway für
        leichteren Zugang zu den oberen Bünden verfügt.
    ukulele_body_shape:
      name: Korpusform der Ukulele
      description: Gibt die allgemeine Korpusform bzw. Bauart der Ukulele an.
    ukulele_bridge_material:
      name: Material der Ukulelenbrücke
      description: Gibt das Material an, das für den Steg der Ukulele verwendet wird.
    ukulele_construction_type:
      name: Bauart der Ukulele
      description: Beschreibt, wie Decke, Boden und Zargen des Instruments gefertigt
        sind (massiv oder laminiert).
    ukulele_electronics_configuration:
      name: Elektronikkonfiguration der Ukulele
      description: Gibt an, ob die Ukulele rein akustisch ist oder integrierte Elektronik
        (Tonabnehmer und/oder Vorverstärker) zur Verstärkung besitzt.
    ukulele_string_re_entrant_tuning:
      name: Reentrant-Stimmung der Ukulele
      description: Gibt an, ob die Ukulele mit Reentrant-Stimmung (High-G) oder linearer/Low-G-Stimmung
        ausgestattet ist, eine häufige Käuferpräferenz, die den Klang beeinflusst.
    ukulele_top_wood:
      name: Holz der Ukulelendecke
      description: Gibt das Holz bzw. Material an, das für die Decke bzw. den Resonanzboden
        der Ukulele verwendet wird.
    ukulele_tuner_mechanism:
      name: Mechanik der Ukulelenstimmwirbel
      description: Gibt die Bauart bzw. Mechanik der auf der Ukulele verwendeten Stimmwirbel
        an.
    ukulele_tuner_type:
      name: Art der Ukulelenstimmwirbel
      description: Gibt die Bauart der Stimmmechanik an der Kopfplatte der Ukulele
        an.
    ukulele_tuning:
      name: Stimmung der Ukulele
      description: Gibt die vorgesehene Standardstimmung der Taschen-Ukulele an.
    ultralight_aircraft_wing_configuration:
      name: Flügelkonfiguration des Ultraleichtflugzeugs
      description: Beschreibt Position und Konfiguration des Hauptflügels relativ
        zum Rumpf bzw. zur Struktur.
    under_bed_features:
      name: Merkmale des Bettkastens
      description: Kennzeichnet das hauptsächliche Funktionselement unter der Bettplattform.
    underfoot_strap_type:
      name: Art des Fußriemens
      description: Kennzeichnet das Material bzw. die Bauart des Riemens, der unter
        dem Schuh verläuft.
    underwear_fit:
      name: Passform der Unterwäsche
      description: Gibt das allgemeine Passformprofil der Boxershorts an (z. B. eng,
        locker oder Kompression).
    underwear_pieces_included:
      name: Inbegriffene Unterwäscheartikel
      description: Gibt an, welche Kleidungsstücke enthalten sind (Oberteil, Unterteil,
        beides oder einteiliger Overall), damit Kund:innen wissen, ob sie ein komplettes
        Set oder einen Einzelartikel kaufen.
    uniform_pieces_included:
      name: Enthaltene Uniformteile
      description: Gibt an, welche Kleidungsstücke enthalten sind (z. B. Hemd, Hose
        oder Weste), und verdeutlicht den Inhalt von Sets bzw. Großpackungen.
    uniform_role:
      name: Einsatzbereich der Uniform
      description: Gibt die Berufsgruppe bzw. Behörde an, für die der Uniformartikel
        vorgesehen ist (z. B. Polizei, Sheriff oder Rettungsdienst).
    update_method:
      name: Aktualisierungsmethode
      description: Beschreibt, wie Firmware- bzw. Software-Updates für den Scanner
        bereitgestellt werden.
    upholstery_fabric_backing_type:
      name: Art der Rückseitenbeschichtung des Polsterstoffs
      description: Gibt die Rückseitenbeschichtung bzw. Laminierung des Polsterstoffs
        an, die Montage und Haptik beeinflusst.
    upholstery_fabric_water_resistance:
      name: Wasserbeständigkeit des Polsterstoffs
      description: Gibt die Widerstandsfähigkeit der Polsterstoffoberfläche gegen
        Wasser und verschüttete Flüssigkeiten an.
    upper_material:
      name: Obermaterial
      description: Gibt das hauptsächlich im oberen Bereich des Sneakers verwendete
        Material an, das Atmungsaktivität, Haltbarkeit und Optik beeinflusst.
    upright_bass_pickup_system:
      name: Tonabnehmersystem des Kontrabasses
      description: Gibt an, ob der Kontrabass über ein installiertes Tonabnehmer-/Vorverstärkersystem
        zur Verstärkung verfügt.
    upright_piano_power_source:
      name: Stromversorgung des Klaviers
      description: Beschreibt die Stromversorgung des Klaviers, sowohl bei akustischen
        Klavieren ohne Stromanschluss als auch bei Silent- bzw. Hybrid-Systemen mit
        Strombedarf.
    urination_device_features:
      name: Merkmale der Urinierhilfe
      description: Hebt besondere Designmerkmale hervor, die Funktionalität oder Komfort
        verbessern.
    us_childrens_shoe_size:
      name: US-Kinderschuhgröße
      description: Gibt die US-Kinderschuhgröße an, z. B. 5 oder 5 Wide.
    us_clothing_size:
      name: US-Kleidergröße
      description: Gibt die US-Kleidergröße an, z. B. 8 oder 14
    us_cup_size:
      name: US-Körbchengröße
      description: Gibt die US-BH-Körbchengröße an, z. B. C oder DDD.
    us_mens_shoe_size:
      name: US-Herrenschuhgröße
      description: Gibt die US-Herrenschuhgröße an, z. B. 10 oder 10 Wide.
    us_ring_size:
      name: US-Ringgröße
      description: Gibt die US-Ringgröße an, z. B. 7 oder 6,5
    us_womens_shoe_size:
      name: US-Damenschuhgröße
      description: Gibt die US-Damenschuhgröße an, z. B. 8 oder 8 Wide.
    usage:
      name: Verwendungszweck
      description: Beschreibt den vorgesehenen Einsatzzweck bzw. die Abstimmung der
        Nockenwelle.
    usda_honey_grade:
      name: USDA-Honigklassifizierung
      description: Gibt die offizielle Qualitätsklassifizierung des Honigs gemäß USDA
        an.
    user_control_method:
      name: Bedienungsmethode
      description: Gibt an, wie Nutzer:innen mit dem Gerät interagieren (z. B. Bedienfeld
        am Gerät, Fernbedienung, App oder Sprachsteuerung), was Rückschlüsse auf die
        Benutzerfreundlichkeit ermöglicht.
    vacuum_boost_reference_port:
      name: Referenzanschluss für Vakuum/Boost
      description: Gibt an, ob der Regler einen Referenzanschluss für Vakuum/Boost
        am Ansaugkrümmer besitzt und welcher Bauart dieser ist.
    valve_base_shape:
      name: Form der Ventilbasis
      description: Kennzeichnet die Geometrie der Schnittstelle zwischen Ventilbasis
        und Felge (rund, konisch, seitlicher Anschluss, T-förmig usw.), die Abdichtung
        und Kompatibilität mit Schaumeinlagen beeinflusst.
    valve_core_type:
      name: Art des Ventileinsatzes
      description: Gibt an, ob der Ventilkern austauschbar, fest oder kernlos ist,
        was Wartung und Kompatibilität mit Dichtmittel-Injektionswerkzeugen beeinflusst.
    valve_cover_gasket_material:
      name: Material der Ventildeckeldichtung
      description: Gibt das Material der mit dem Ventildeckel gelieferten Ventildeckeldichtung
        bzw. das empfohlene Dichtungsmaterial an, wenn keine Dichtung enthalten ist
        (falls zutreffend).
    valve_cover_material:
      name: Ventildeckelmaterial
      description: Hauptmaterial des Ventildeckels.
    valve_design:
      name: Ventilkonstruktion
      description: Kennzeichnet die Bauart bzw. Konstruktion des Motorventils.
    valve_guard_coverage_area:
      name: Anwendungsbereich des Ventilschutzes
      description: Gibt an, welche Teile des Ventilbereichs durch die Schutzvorrichtung
        geschützt werden.
    valvetrain_configuration:
      name: Ventiltriebskonfiguration
      description: Gibt die Konfiguration von Nockenwelle und Ventiltrieb an.
    varnish_formulation_base:
      name: Basisformulierung des Lacks
      description: Gibt die hauptsächliche Formulierung bzw. chemische Basis des Lacks
        für Streichinstrumente an, die Aussehen, Reversibilität und Kompatibilität
        mit vorhandenen Lackierungen beeinflusst.
    varnish_transparency_tint:
      name: Transparenz/Tönung des Lacks
      description: Beschreibt, ob der Lack klar oder getönt ist und, falls getönt,
        zu welcher Farbfamilie die Tönung gehört.
    vegetable_matter_vm_content:
      name: Anteil pflanzlicher Bestandteile (VM)
      description: Gibt die Menge an Pflanzenresten bzw. Verunreinigungen in der Faser
        an.
    vegetable_preparation_style:
      name: Zubereitungsart des Gemüses
      description: Beschreibt, wie das Gemüse vor dem Verkauf präsentiert, geschnitten
        oder anderweitig vorbereitet wird (z. B. ganz, gewürfelt oder in Röschen).
    vehicle_audio_dsp_form_factor:
      name: Formfaktor des Fahrzeug-Audio-DSP
      description: Gibt die physische Bau- bzw. Installationsform der DSP-Einheit
        an.
    vehicle_battery_charger_features:
      name: Funktionen des Fahrzeugbatterieladegeräts
      description: Listet Betriebsmodi und integrierte Funktionen des Fahrzeugbatterieladegeräts
        auf (z. B. Erhaltungsladung oder Desulfatierung).
    vehicle_body_filler_form:
      name: Form des Karosseriespachtels
      description: Gibt die physische Form bzw. Verpackungsart des Karosseriespachtels
        an.
    vehicle_coaxial_speaker_nominal_size:
      name: Nenngröße des Fahrzeug-Koaxiallautsprechers
      description: Gibt die Nenngröße des Lautsprechers an, die für den Einbau verwendet
        wird (z. B. 6,5 Zoll oder 6×9 Zoll).
    vehicle_cover_size_class:
      name: Größenklasse der Fahrzeugabdeckung
      description: Gibt die allgemeine Größenklasse an, für welche Fahrzeuggröße die
        Abdeckung ausgelegt ist.
    vehicle_decor_set_items_included:
      name: Enthaltene Teile des Fahrzeugdekor-Sets
      description: Listet die Arten von Dekorationsartikeln auf, die im Zubehörset
        enthalten sind.
    vehicle_door_lock_actuation_method:
      name: Betätigungsart des Fahrzeugtürschlosses
      description: Gibt an, wie das Fahrzeugtürschloss betätigt bzw. gesteuert wird.
    vehicle_door_lock_actuator_kit_contents:
      name: Inhalt des Sets für den Türschloss-Stellantrieb
      description: Gibt an, was zusammen mit dem Aktuator geliefert wird (nur Aktuator
        oder zusätzlich Hardware, Stangen, Halterungen bzw. Kabelbaum).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Verdrahtungskonfiguration des Türschloss-Stellantriebs
      description: Gibt die für die Installation benötigte Verdrahtung an (Anzahl
        und Funktion der Kabel).
    vehicle_door_lock_included_components:
      name: Enthaltene Komponenten des Fahrzeugtürschlosses
      description: Listet die im Paket enthaltenen Komponenten auf (nützlich für Sets
        bzw. Baugruppen).
    vehicle_electrical_connector_type:
      name: Art des elektrischen Fahrzeuganschlusses
      description: Gibt die Bauart des elektrischen Steckers bzw. Anschlusses für
        Regler/Feld der Lichtmaschine an (ohne den Haupt-B+-Anschlussbolzen).
    vehicle_equipment_fit_out_level:
      name: Ausstattungsgrad des Fahrzeugs
      description: Gibt den Umfang der im Fahrzeug enthaltenen Polizeiausstattung
        an.
    vehicle_glass_cleaner_form:
      name: Form des Fahrzeugglasreinigers
      description: Gibt die physische Produktform des Fahrzeugglasreinigers an (z. B.
        Spray, Schaum, Tücher, Gel oder Konzentrat).
    vehicle_hitch_cover_illumination_type:
      name: Beleuchtungsart der Anhängerkupplungsabdeckung
      description: Gibt an, ob und welche Beleuchtung die Anhängerkupplungsabdeckung
        besitzt.
    vehicle_hitch_cover_mounting_type:
      name: Anbringungsart der Anhängerkupplungsabdeckung
      description: Gibt die Methode an, mit der die Anhängerkupplungsabdeckung in
        der Aufnahme befestigt wird.
    vehicle_license_plate_finish:
      name: Finish des Fahrzeugkennzeichens
      description: Oberflächenfinish des Kennzeichens.
    vehicle_license_plate_frame_anti_theft_design:
      name: Diebstahlschutzdesign des Kennzeichenrahmens
      description: Sicherheitsrelevante Designelemente, die das Entfernen oder Manipulieren
        erschweren sollen.
    vehicle_license_plate_frame_plate_standard:
      name: Standard des Kennzeichenrahmens
      description: Gibt den Kennzeichenstandard bzw. die Region an, für die der Rahmen
        ausgelegt ist.
    vehicle_license_plate_frame_profile:
      name: Profil des Fahrzeugkennzeichenrahmens
      description: Beschreibt, wie der Rahmen das Kennzeichen umgibt (Abdeckung/Formgebung),
        was Lesbarkeit und Vorschriftenkonformität beeinflusst.
    vehicle_license_plate_mounting_hole_count:
      name: Anzahl der Befestigungslöcher des Fahrzeugkennzeichens
      description: Anzahl der Befestigungslöcher am Kennzeichen.
    vehicle_license_plate_mounting_hole_pattern:
      name: Muster der Befestigungslöcher des Fahrzeugkennzeichens
      description: Anordnungsmuster der Befestigungslöcher am Kennzeichen.
    vehicle_license_plate_reflectivity:
      name: Reflektivität des Fahrzeugkennzeichens
      description: Gibt an, ob und wie die Oberfläche des Kennzeichens Licht reflektiert
        (wichtig für Sichtbarkeit und Vorschriftenkonformität bei manchen Fun-Kennzeichen).
    vehicle_license_plate_size_standard:
      name: Größenstandard des Fahrzeugkennzeichens
      description: Gibt die regionale bzw. fahrzeugspezifische Norm an, für die das
        Kennzeichen ausgelegt ist (Abstand der Befestigungslöcher und Gesamtabmessungen).
    vehicle_license_plate_text_style:
      name: Schriftart des Fahrzeugkennzeichens
      description: Stil der Kennzeichenzeichen (falls vorhanden), einschließlich geprägt
        oder gedruckt.
    vehicle_license_plate_theme:
      name: Thema des Fahrzeugkennzeichens
      description: Übergeordnetes Designthema der Kennzeichengrafik.
    vehicle_lift_actuation_method:
      name: Betätigungsart des Fahrzeughebebühne
      description: Beschreibt, wie die Hebebühne bzw. der Wagenheber zum Anheben des
        Fahrzeugs angetrieben bzw. betätigt wird.
    vehicle_lift_mounting_type:
      name: Montageart der Fahrzeughebebühne
      description: Gibt an, wie die Hebebühne im Arbeitsbereich installiert bzw. verankert
        wird.
    vehicle_lift_type:
      name: Art der Fahrzeughebebühne
      description: Gibt die Bauart der Hebebühne für Wartung oder Lagerung an (z. B.
        2-Säulen-, 4-Säulen- oder Scherenhebebühne).
    vehicle_magnet_attachment_type:
      name: Befestigungsart des Fahrzeugmagneten
      description: Gibt die hauptsächliche Befestigungs- bzw. Montagemethode für Fahrzeugmagnete
        an (z. B. nur magnetisch oder magnetisch mit zusätzlicher Klebefläche).
    vehicle_magnet_intended_use:
      name: Verwendungszweck des Fahrzeugmagneten
      description: Gibt den hauptsächlichen Verwendungszweck des Fahrzeugmagneten
        an.
    vehicle_mirror_adjustment_type:
      name: Verstellungsart des Fahrzeugspiegels
      description: Gibt an, wie der Spiegel eingestellt bzw. gesteuert wird.
    vehicle_mirror_glass_type:
      name: Glaseigenschaften des Fahrzeugspiegels
      description: Gibt die optische Form bzw. Bauart der Spiegelglasoberfläche an.
    vehicle_organizer_features:
      name: Eigenschaften des Fahrzeug-Organizers
      description: Beschreibt wichtige funktionale Merkmale von Fahrzeugorganizern,
        z. B. Faltbarkeit, wasserabweisendes Innenfutter, isolierte Taschen oder rutschfeste
        Böden.
    vehicle_paint_chemistry_base:
      name: Chemische Basis des Fahrzeuglacks
      description: Gibt die Formulierung bzw. chemische Zusammensetzung des Fahrzeuglacks
        an.
    vehicle_polish_application_method:
      name: Anwendungsmethode der Fahrzeugpolitur
      description: Gibt die empfohlene Methode bzw. das empfohlene Werkzeug zum Auftragen
        der Fahrzeugpolitur an.
    vehicle_pursuit_package:
      name: Polizei-Einsatzpaket des Fahrzeugs
      description: Gibt an, ob das Fahrzeug mit einem Leistungspaket für den Polizeieinsatz
        ausgestattet ist (z. B. verbesserte Kühlung, Bremsen, Federung und Kalibrierung).
    vehicle_safety_equipment_position:
      name: Position der Fahrzeugsicherheitsausrüstung
      description: Gibt an, wo am bzw. im Fahrzeug die Sicherheitsausrüstung verwendet
        oder installiert werden soll.
    vehicle_safety_equipment_visibility_features:
      name: Sichtbarkeitsmerkmale der Fahrzeugsicherheitsausrüstung
      description: Kennzeichnet Merkmale zur Verbesserung der Sichtbarkeit und Erhöhung
        der Auffälligkeit.
    vehicle_seat_row:
      name: Sitzreihe des Fahrzeugs
      description: Gibt an, für welche hintere Sitzreihe der Sitz vorgesehen ist (zweite
        oder dritte Reihe), einschließlich Notsitzen im Fond.
    vehicle_steering_assist_type:
      name: Art der Lenkunterstützung des Fahrzeugs
      description: Gibt das Lenkunterstützungssystem an, für das die Komponente ausgelegt
        ist.
    vehicle_steering_wheel_lock_form_factor:
      name: Formfaktor der Lenkradsperre
      description: Beschreibt die Bauart der Lenkradsperre und wie sie mit dem Lenkrad
        (und gegebenenfalls anderen Bedienelementen) verbunden wird.
    vehicle_wax_polish_product_form:
      name: Produktform von Fahrzeugwachs/-politur
      description: Gibt die physische Form bzw. das Dosierformat von Wachs, Politur,
        Schutzmittel oder Versiegelung an.
    vehicle_wheel_valve_stem_type:
      name: Art des Fahrzeugradventilschafts
      description: Gibt den unterstützten bzw. enthaltenen Ventilschafttyp an.
    vehicle_windshield_fluid_formula:
      name: Formulierung der Scheibenwaschflüssigkeit
      description: Gibt den hauptsächlichen Reinigungs- bzw. Entfernungsschwerpunkt
        der Scheibenwaschflüssigkeitsformulierung an.
    veil_length_type:
      name: Schleierlänge
      description: Klassifiziert einen Schleier anhand standardisierter Längenbezeichnungen
        statt numerischer Maße.
    vellum_opacity_level:
      name: Deckkraft des Pergaments
      description: Gibt an, wie lichtdurchlässig bzw. deckend das Pergamentblatt ist.
    ventilation_configuration:
      name: Konfiguration der Belüftung
      description: Hauptkonfiguration der Belüftung sowie der Luftzufuhr und -abfuhr
        des Helms.
    ventilation_control_type:
      name: Belüftungssteuerung
      description: Gibt die Art des im Helm integrierten Luftstrommanagements an.
    ventilation_level:
      name: Belüftungsgrad
      description: Gibt die Luftstrom- bzw. Belüftungskonstruktion der Schutzkleidung
        an.
    venting_design:
      name: Belüftungsdesign
      description: Gibt an, ob und wie die Abdeckung belüftet ist, um Kondensation
        und Schimmelbildung während der Lagerung zu reduzieren.
    vestibule_type:
      name: Art des Vorraums
      description: Klassifiziert die Anordnung des Vorraums im Verhältnis zum Zelt.
    vibraphone_bar_material:
      name: Material der Vibraphon-Klangstäbe
      description: Material der Klangstäbe bzw. Tasten des Vibraphons (der klangerzeugenden
        Stäbe).
    vibraphone_motor_type:
      name: Art des Vibraphonmotors
      description: Gibt die Art des Motors an, der die rotierenden Resonatorlüfter
        für das Vibrato antreibt (falls vorhanden).
    vibraphone_range_octaves:
      name: Tonumfang des Vibraphons (Oktaven)
      description: Gibt den Tonumfang des Vibraphons in Oktaven an (z. B. 3 Oktaven
        oder 3,5 Oktaven).
    vibraphone_resonator_tube_material:
      name: Material der Vibraphon-Resonatorrohre
      description: Gibt das Material der Resonatorrohre unter den Klangstäben des
        Vibraphons an.
    vibraphone_tuning_standard:
      name: Stimmstandard des Vibraphons
      description: Gibt die Referenztonhöhe für die Stimmung an (z. B. A=440 Hz).
    viewing_sides:
      name: Anzeigeseiten
      description: Gibt an, auf wie vielen Seiten der Anzeigetafel Informationen angezeigt
        werden (einseitig, doppelseitig, vierseitig usw.).
    vintage_advertisement_decade:
      name: Jahrzehnt der Vintage-Werbung
      description: Gibt das Jahrzehnt an, in dem die Werbung ursprünglich gedruckt
        bzw. produziert wurde (ungefähr, falls das genaue Jahr unbekannt ist).
    vintage_advertisement_format:
      name: Format der Retro-Werbung
      description: Gibt das physische Format bzw. Medium des Vintage-Werbe-Sammlerstücks
        an.
    vintage_advertisement_subject_category:
      name: Motivkategorie der Vintage-Werbung
      description: Gibt die Produkt- bzw. Dienstleistungskategorie an (für die geworben
        wird).
    vintage_classic_truck_cab_type:
      name: Fahrerhaustyp von Oldtimer- und klassischen Lkw
      description: Gibt die Fahrerhauskonfiguration bzw. Karosserieform des Fahrgastraums
        des Lkw an.
    virginia_tech_helmet_star_rating:
      name: Virginia-Tech-Helmsternebewertung
      description: Gibt die Sicherheitsbewertung des Virginia Tech Helmet Lab an (0–5
        Sterne).
    virtual_analog_synthesizer_form_factor:
      name: Formfaktor des virtuell-analogen Synthesizers
      description: Gibt die physische Bauform des Synthesizergehäuses an (Tastatur
        oder Modul/Rack).
    viscosity_thickness:
      name: Viskosität/Dicke
      description: Beschreibt, wie dick- oder dünnflüssig die Schlickermasse im Verkaufszustand
        bzw. bei empfohlener Verarbeitungskonsistenz ist.
    vise_configuration:
      name: Spannerkonfiguration
      description: Gibt die strukturelle Anordnung bzw. Anzahl der Teile im Schraubstockset
        an, was Transportfähigkeit und Aufbauaufwand beeinflusst.
    visibility_features:
      name: Sichtbarkeitsfunktionen
      description: Hebt Designelemente hervor, die die Sichtbarkeit der fahrenden
        Person im Straßenverkehr verbessern.
    visor_brim_type:
      name: Art des Visiers bzw. Schirms
      description: Gibt Vorhandensein und Art eines Visiers oder einer Krempe am Helm
        an.
    visor_configuration:
      name: Schirmart
      description: Beschreibt Vorhandensein und Bauart eines integrierten Visiers
        bzw. Gesichtsschutzes.
    visor_lens_finish:
      name: Oberfläche der Visierscheibe
      description: Gibt die Tönung, optische Oberflächenbeschaffenheit bzw. grafische
        Gestaltung der Visierscheibe an.
    visor_style:
      name: Visierstil
      description: Gibt an, ob die Kapuze über einen Schirm bzw. ein Visier verfügt
        und wie dieses gestaltet ist.
    voc_compliance_standard:
      name: VOC-Konformitätsstandard
      description: Gibt die gesetzliche VOC-Konformitätsangabe für das Produkt an
        (falls zutreffend).
    voc_regulatory_class:
      name: VOC-Regulierungsklasse
      description: Gibt die deklarierte VOC-Regulierungs- bzw. Konformitätsklasse
        des Produkts an (gemäß Etikett/Sicherheitsdatenblatt), die für regionale gesetzliche
        und umweltbezogene Einschränkungen relevant ist.
    vodka_base_ingredient:
      name: Grundzutat des Wodkas
      description: Gibt den hauptsächlichen landwirtschaftlichen Rohstoff an, aus
        dem der Wodka destilliert wird (z. B. Weizen, Kartoffeln oder Mais).
    voice_coil_configuration:
      name: Schwingspulenkonfiguration
      description: Gibt Anzahl bzw. Anordnung der Schwingspulen für flexible Verdrahtung
        und verschiedene Impedanzoptionen an.
    voice_effects:
      name: Gesangseffekte
      description: Gibt die integrierten Gesangseffekte an, die vom Karaoke-Set unterstützt
        werden.
    voltage_rating_type:
      name: Art der Spannungsnennangabe
      description: Gibt an, ob sich die Spannungsangabe der Sicherung auf Wechselstrom,
        Gleichstrom oder beides bezieht.
    voltage_regulator_connector_type:
      name: Art des Spannungsregleranschlusses
      description: Gibt die Anschluss- bzw. Klemmenart an, die zum Anschluss des Reglers
        an die Fahrzeugverkabelung/Lichtmaschine/den Generator verwendet wird.
    wader_foot_type:
      name: Art der Watschuhe
      description: Gibt an, ob die Wathosen integrierte Stiefel oder separate Füßlinge
        besitzen.
    wader_sole_type:
      name: Art der Watsohle
      description: Gibt das Sohlenmaterial bzw. die Traktionsart an, die bei Watstiefeln
        oder Wathosen mit integriertem Stiefelfuß verwendet wird.
    waistband_style:
      name: Art des Hosenbundes
      description: Beschreibt die Konstruktion des Hosenbundes und wie dieser zur
        Anpassung von Passform und Tragekomfort befestigt bzw. eingestellt wird.
    wakeboard_binding_mounting_pattern:
      name: Montagemuster der Wakeboard-Bindung
      description: Gibt das Einsatz- bzw. Plattenmuster des Wakeboards an, mit dem
        die Bindungen kompatibel sind.
    wakeboard_riding_style:
      name: Wakeboard-Fahrstil
      description: Klassifiziert die vorgesehene Einsatzumgebung bzw. den Fahrstil
        des Wakeboards.
    wall_decal_style:
      name: Art des Wandaufklebers
      description: Gibt an, wie der Aufkleber hergestellt bzw. angebracht wird (z. B.
        gestanzt, Transferfolie oder Aufkleberbogen).
    wallyball_equipment_included:
      name: Wallyball-Ausrüstung inklusive
      description: Listet die einzelnen Bestandteile des Wallyball-Sets auf, damit
        Käufer:innen genau wissen, was enthalten ist, und verschiedene Sets vergleichen
        können.
    warp_beam_type:
      name: Art des Kettbaums
      description: Gibt die im Webstuhl enthaltene bzw. installierte Kettbaumkonfiguration
        an (die mit dem Webstuhl gelieferte Kettbaumanordnung).
    washability:
      name: Waschbarkeit
      description: Gibt an, ob sich der Klebstoff mit Wasser entfernen lässt und/oder
        nach dem Auftragen auswaschbar ist.
    watch_band_design:
      name: Design des Uhrenarmbands
      description: Beschreibt die Bauart bzw. das Designmuster eines Uhrenarmbands
        (z. B. NATO, Milanaise oder Gliederarmband).
    watch_movement:
      name: Uhrwerk
      description: Gibt den Mechanismus an, der die Uhr antreibt, ein wichtiges Unterscheidungsmerkmal
        zwischen verschiedenen Modellen.
    water_activation:
      name: Wasseraktivierung
      description: Gibt an, ob sich der Notsender bei Wasserkontakt automatisch aktiviert
        (üblich bei EPIRBs der Kategorie I/II).
    water_chamber_configuration:
      name: Konfiguration der Wasserkammer
      description: Beschreibt die Anordnung der inneren Wasserkammern der Matratze,
        z. B. Einzel- oder Doppelkammersysteme, was Stützkraft, Temperaturregulierung
        und Bewegungsübertragung beeinflusst.
    water_dispensing_mechanism:
      name: Ausgabemechanismus des Wasserspenders
      description: Beschreibt, wie Wasser aus dem Gerät abgegeben wird, z. B. über
        Hähne, Sprühdüsen oder Schwerkraftauslauf.
    water_exposure_protection_level:
      name: Schutzgrad bei Wasserkontakt
      description: Gibt den Schutzgrad des Produkts bei Wasserkontakt an (z. B. Spritzwasserschutz
        oder kurzzeitiges Untertauchen). Verwenden Sie die Schutzart (IP-Schutzart),
        wenn ein offizieller IP-Code verfügbar ist.
    water_fed_design:
      name: Bauweise mit Wasserdurchlauf
      description: Gibt an, ob die Bürste für die Verwendung mit fließendem Wasser
        über einen Wasserdurchlaufgriff oder einen Schlauchanschluss ausgelegt ist.
    water_gun_features:
      name: Eigenschaften der Wasserpistole
      description: Beschreibt besondere funktionale Merkmale und enthaltene Funktionen
        der Wasserpistole.
    water_gun_operating_mechanism:
      name: Funktionsweise der Wasserpistole
      description: Beschreibt, wie die Wasserpistole während der Nutzung Wasser unter
        Druck setzt und ausstößt.
    water_gun_spray_pattern:
      name: Sprühmuster der Wasserpistole
      description: Beschreibt die Art des Wasserstrahls, der beim Spritzen aus der
        Düse erzeugt wird.
    water_heating_method:
      name: Wassererwärmungsmethode
      description: Beschreibt, wie bzw. ob das Wasser vor der Verwendung erwärmt wird
        – z. B. durch Solarabsorption, Propangasbrenner, elektrische Heizelemente,
        batteriebetriebene Heizung, wärmespeichernde Isolierung oder gar nicht.
    water_mattress_construction:
      name: Bauart der Wassermatratze
      description: Gibt die Bauart der Wassermatratze an (z. B. Hardside oder Softside),
        die Kompatibilität mit dem Rahmen und das Liegegefühl beeinflusst.
    water_play_features:
      name: Eigenschaften des Wasserspielzeugs
      description: Enthaltene Wasserspiel-Komponenten des Wasserparks bzw. der Wasserrutsche.
    water_polo_competition_approval:
      name: Wettkampfzulassung des Wasserballs
      description: Gibt den Verband bzw. die Wettbewerbsebene an, für die der Ball
        offiziell zugelassen oder zertifiziert ist.
    water_polo_goal_type:
      name: Art des Wasserballtors
      description: Klassifiziert die Bau- bzw. Montageart des Tores (z. B. schwimmend,
        deckmontiert oder tragbar).
    water_pump_drive_type:
      name: Antriebsart der Wasserpumpe
      description: Gibt an, wie die Wasserpumpe im Fahrzeugkühlsystem angetrieben
        bzw. betätigt wird.
    water_pump_housing_material:
      name: Material des Wasserpumpengehäuses
      description: Material des Wasserpumpengehäuses/-körpers.
    water_pump_impeller_material:
      name: Material des Wasserpumpenlaufrads
      description: Gibt das Material des Wasserpumpenlaufrads an (interner Rotor bzw.
        Schaufelrad zur Bewegung des Kühlmittels).
    water_pump_mounting_type:
      name: Montageart der Wasserpumpe
      description: Gibt die Montage- bzw. Bauart der Wasserpumpe für den Motoreinbau
        an (z. B. anschraubbares Gehäuse oder Kartuschen-/Einsatzsystem).
    water_purification_method:
      name: Wasseraufbereitungsmethode
      description: Beschreibt den hauptsächlichen Mechanismus, mit dem das Produkt
        Wasser unterwegs trinkbar macht (z. B. Pumpe, Schwerkraftsystem oder UV-Licht).
    water_resistance:
      name: Wasserbeständigkeit
      description: Gibt den gebotenen Wetterschutzgrad an, z. B. wasserdicht oder
        wasserabweisend.
    water_resistance_level:
      name: Grad der Wasserbeständigkeit
      description: Gibt an, ob und in welchem Maß das Textil wasserabweisend ist.
    water_resistance_rating_case_protection_level:
      name: Wasserbeständigkeitsklasse (Schutzstufe des Koffers)
      description: Gibt den Grad der Wasserbeständigkeit bzw. des Wasserschutzes des
        Rollkoffers an (Marketingangabe, keine IP-Schutzklasse für Elektronik), z. B.
        wasserabweisend oder wasserdicht.
    water_rocket_kit_items_included:
      name: Enthaltene Teile des Wasserraketen-Sets
      description: Gibt die wichtigsten im Produktpaket enthaltenen Komponenten an.
    water_rocket_propulsion_type:
      name: Antriebsart der Wasserrakete
      description: Gibt die hauptsächliche Antriebs- bzw. Energiequelle zum Starten
        der Rakete an.
    water_rocket_recovery_system:
      name: Bergungssystem der Wasserrakete
      description: Beschreibt die Methode zur Bergung der Rakete nach dem Start.
    water_ski_base_design:
      name: Design der Wasserski-Unterseite
      description: Gibt das Profil der Unterseite des Wasserskis an, das die Fahreigenschaften
        beeinflusst.
    water_ski_fin_type:
      name: Art der Wasserskifinne
      description: Gibt die Finnenkonfiguration des Wasserskis an, die Spurtreue und
        Manövrierfähigkeit beeinflusst.
    water_source:
      name: Wasserquelle
      description: Gibt die Herkunft des Wassers vor der Kohlensäurezugabe an.
    water_sports_safety_standard:
      name: Sicherheitsstandard für Wassersport
      description: Listet die formalen Sicherheits- bzw. Auftriebsstandards auf, die
        das Produkt erfüllt (z. B. CE EN 1385 für Helme, ISO 12402-5 für Auftriebshilfen
        oder USCG Typ III).
    water_table_feature_set:
      name: Funktionsumfang des Wassertischs
      description: Hebt integrierte Spielfunktionen des Wassertischs hervor, z. B.
        Wasserfälle, Sprühdüsen, Pumpen oder mehrstufige Becken.
    water_table_items_included:
      name: Enthaltene Teile des Wassertisch-Sets
      description: Gibt an, welches Zubehör im Wassertisch-Set enthalten ist (z. B.
        Boote, Becher, Trichter oder Figuren).
    water_table_water_source_type:
      name: Wasserversorgungsart des Wassertischs
      description: Gibt an, wie der Wassertisch befüllt bzw. mit Wasser versorgt wird.
    waterbed_stabilization_level:
      name: Stabilisierungsgrad des Wasserbetts
      description: Gibt den Grad der Wellenreduzierung bzw. Bewegungsdämpfung der
        Wasserbettmatratze an.
    watercolor_ink_water_resistance_after_drying:
      name: Wasserbeständigkeit der Aquarelltinte (nach dem Trocknen)
      description: Gibt an, ob die Aquarelltinte nach dem Trocknen wasserbeständig
        bzw. wasserfest wird (laut Herstellerangabe).
    watercraft_care_application_area:
      name: Anwendungsbereich der Wasserfahrzeugpflege
      description: Gibt den hauptsächlichen Bereich bzw. die Komponente eines Wasserfahrzeugs
        an, für die das Produkt vorgesehen ist.
    watercraft_drive_mechanism:
      name: Antriebsmechanismus des Wasserfahrzeugs
      description: Beschreibt den installierten bzw. unterstützten Bordantriebsmechanismus.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Montagemuster der Kraftstofftank-Gebereinheit für Wasserfahrzeuge
      description: Gibt das Montagebild bzw. den Standard für Kraftstofftankgeber
        und kompatible Anzeigen an (z. B. gängige Lochbilder im Marinebereich).
    watercraft_fuel_tank_shape:
      name: Form des Kraftstofftanks des Wasserfahrzeugs
      description: Beschreibt die physische Bauform des Kraftstofftanks zur Unterstützung
        der Platz- und Einbauplanung.
    watercraft_hull_material:
      name: Rumpfmaterial des Wasserfahrzeugs
      description: Gibt das hauptsächliche Material der Rumpfkonstruktion an.
    watercraft_ignition_part_voltage:
      name: Spannung des Zündsystems des Wasserfahrzeugs
      description: Gibt die Nennspannung bzw. Spannungsanforderung für das Zündteil
        an (falls zutreffend), z. B. 12-V-Systeme.
    watercraft_impeller_material_grade:
      name: Materialqualität des Wasserfahrzeug-Impellers
      description: Gibt das Material des Wasserfahrzeug-Impellers an (z. B. Neoprenkautschuk,
        Nitril oder Bronze).
    watercraft_lighting_certification_compliance:
      name: Zertifizierung/Konformität der Wasserfahrzeugbeleuchtung
      description: Gibt an, nach welchen Vorschriften bzw. Standards die Leuchte für
        den Marineeinsatz zertifiziert ist (z. B. USCG-, ABYC- oder COLREGs-konform).
    watercraft_motor_mount_adjustment_features:
      name: Einstellmöglichkeiten der Motorhalterung des Wasserfahrzeugs
      description: Beschreibt die Einstellmöglichkeiten der Halterung (z. B. Neigen,
        Anheben oder Verschieben), die Bedienbarkeit und Passform beeinflussen.
    watercraft_piston_part_type:
      name: Art des Kolbenteils für Wasserfahrzeuge
      description: Gibt an, welche kolbenbezogene Komponente das Angebot umfasst.
    watercraft_propeller_blade_rake:
      name: Blattneigung des Wasserfahrzeugpropellers
      description: Gibt die Blattneigung an (Winkel des Propellerblatts relativ zur
        Nabe), die Buganhebung und Leistung beeinflusst.
    watercraft_propeller_rotation_direction:
      name: Drehrichtung des Wasserfahrzeugpropellers
      description: Gibt die erforderliche Propellerdrehrichtung bzw. Drehrichtung
        für die Kompatibilität mit dem Antriebsstrang an (z. B. rechtsdrehend/Standard
        oder linksdrehend/gegenläufig).
    watercraft_pump_stage_impeller_role:
      name: Pumpenstufe/Funktion des Wasserfahrzeug-Laufrads
      description: Gibt an, ob das Laufrad für eine bestimmte Pumpenfunktion vorgesehen
        ist (z. B. Rohwasser-/Seewasserpumpe, Kühlmittelumwälzung oder Jetpumpe).
    watercraft_registration_status:
      name: Registrierungsstatus des Wasserfahrzeugs
      description: Gibt an, ob für das Segelboot Eigentums- und/oder Registrierungsunterlagen
        vorliegen.
    watercraft_safety_equipment_activation_type:
      name: Aktivierungsart der Sicherheitsausrüstung für Wasserfahrzeuge
      description: Beschreibt die hauptsächliche Aktivierungsmethode der Sicherheitsvorrichtung
        (für Notsender/MOB-Alarme/PLBs), unabhängig von einer Aufblasfunktion.
    watercraft_steering_cable_core_material:
      name: Kernmaterial des Wasserfahrzeug-Lenkkabels
      description: Gibt das Material des inneren Kabels bzw. Kerns an, der die Kraft
        überträgt.
    watercraft_steering_cable_hardware_included:
      name: Enthaltenes Zubehör für das Wasserfahrzeug-Lenkkabel
      description: Gibt an, welche Montageelemente und Zubehörteile im Lieferumfang
        des Lenkkabels enthalten sind.
    watercraft_steering_cable_system_type:
      name: Art des Wasserfahrzeug-Lenkkabelsystems
      description: Gibt die Bauart des Lenksystems an, für die das Kabel ausgelegt
        ist (z. B. Drehlenkung oder Zahnstangenlenkung).
    watercraft_steering_wheel_hub_bore_type:
      name: Art der Nabe/Bohrung des Wasserfahrzeuglenkrads
      description: Gibt die Bauart der mittigen Befestigungs- bzw. Bohrungsschnittstelle
        an (z. B. konisch oder verzahnt), an der das Rad mit einer Nabe oder einem
        Adapter verbunden wird.
    watercress_variety:
      name: Brunnenkresse-Sorte
      description: Gibt die konkrete Sorte bzw. Art der angebotenen Kresse an.
    waterproof_level:
      name: Grad der Wasserdichtigkeit
      description: Gibt den Wasserschutzgrad des Schuhwerks an, einschließlich möglicher
        garantierter Wasserdichtigkeitsangaben.
    wax_blend_composition:
      name: Zusammensetzung der Wachsmischung
      description: Listet die im Produkt enthaltenen Wachsmaterialien bzw. die beworbene
        Mischungsart auf.
    wax_coat_type:
      name: Art der Wachsbeschichtung
      description: Gibt an, ob das Wachs als Grundschicht, Deckschicht oder All-in-One-/Einschichtformel
        vorgesehen ist.
    wax_hardness:
      name: Wachshärte
      description: Gibt die relative Härte des Wachses an, die Haltbarkeit und Gleiteigenschaften
        auf verschiedenen Schneearten beeinflusst.
    wax_physical_form:
      name: Physische Form des Wachses
      description: Gibt die physische Form an, in der das rohe Kerzenwachs geliefert
        wird.
    wax_recommended_candle_application:
      name: Empfohlene Kerzenart für das Wachs
      description: Gibt die hauptsächlichen Kerzenart(en) an, für die das Wachs formuliert
        wurde.
    wax_tackiness_level:
      name: Viskosität des Wachses
      description: Beschreibt den Grad an Klebrigkeit bzw. Griffigkeit, den das Wachs
        auf der Klinge bietet.
    weapon_system_integration:
      name: Waffensystemintegration
      description: Gibt an, ob das Fahrzeug integrierte Waffensysteme oder Halterungen
        besitzt.
    weather_suitability:
      name: Wettertauglichkeit
      description: Gibt die Umgebungsbedingungen an, für die die Handschuhe ausgelegt
        sind, z. B. kaltes oder nasses Wetter.
    weave_finish:
      name: Webart/Oberflächenveredelung
      description: Beschreibt die hauptsächliche Webart bzw. Oberflächenveredelung
        des Stoffes, die Textur und Glanz der Krawatte beeinflusst.
    weave_style:
      name: Webart
      description: Beschreibt das traditionelle Flechtmuster, das bei der Herstellung
        des Panamahuts verwendet wird und Atmungsaktivität, Flexibilität, Aussehen
        und Preis beeinflusst.
    weave_type:
      name: Webart
      description: Gibt die Web- bzw. Konstruktionsart des Stoffes an (Handelsbezeichnung
        der Webart), die Textur, Glanz und Fall beeinflusst.
    weaving_beater_edge_type:
      name: Kantenart des Webkamms
      description: Beschreibt das Profil der Arbeitskante des Flachwebkamms, die mit
        dem Schussfaden in Kontakt kommt (z. B. gerade oder gezahnt).
    weaving_beater_style:
      name: Art des Webkamms
      description: Kennzeichnet die funktionale Bauart bzw. Ausführung des Flachwebkamms.
    weaving_shuttle_tip_style:
      name: Art der Spitze des Webschiffchens
      description: Gibt die Form der vorderen Spitze bzw. Nase des Webschiffchens
        an, die beeinflusst, wie es durch das Fach läuft und wie leicht sich Kettfäden
        verfangen.
    weaving_shuttle_use_case:
      name: Verwendungszweck des Webschiffchens
      description: Gibt die vorgesehene Webanwendung an, für die das Schiffchen entwickelt
        bzw. optimiert wurde.
    webbing_construction_type:
      name: Gurtbandart
      description: Beschreibt die physische Web- bzw. Flechtart des Gurtbands, die
        Handhabung, Festigkeit und Verwendungszweck beeinflusst.
    webbing_design:
      name: Design der Schwimmhäute
      description: Beschreibt die Art der Schwimmhäute zwischen den Fingern, die Widerstandstraining
        und Vortrieb beeinflusst.
    weight_adjustability:
      name: Regulierbarkeit des Gewichts
      description: Beschreibt, ob der Widerstand des Produkts vom Benutzer verändert
        werden kann (z. B. über Steckgewichte oder zusätzliche Belastung) oder auf
        ein festes Gewicht eingestellt ist.
    weight_integration_system:
      name: Gewichtsintegrationssystem
      description: Beschreibt, ob und wie Ballastgewichte in das Tarierjacket integriert
        sind (z. B. abnehmbare Gewichtstaschen, keine oder optionales Zubehör).
    weight_plate_compatibility:
      name: Kompatibilität mit Gewichtsscheiben
      description: Gibt an, welche Gewichtsscheiben-Durchmesser die Maschine unterstützt
        (Olympisch, Standard oder beide).
    weight_plate_style:
      name: Art der Gewichtsscheibe
      description: Klassifiziert die Bauart bzw. den Typ der Gewichtsscheibe (z. B.
        olympisch, Bumper Plate oder Steckgewichtssystem) zur schnellen Kompatibilitätsfilterung.
    weightlifting_belt_style:
      name: Art des Gewichthebergürtels
      description: Kategorisiert die Bauart bzw. zweckorientierte Ausführung des Gürtels
        (z. B. Hebelgürtel, Dip-Gürtel oder konischer Gürtel).
    weightlifting_federation_certification:
      name: Zertifizierung durch Gewichtheberverbände
      description: Gibt die offizielle Zulassung bzw. Konformität des Produkts durch
        Kraftsportverbände wie IPF oder IWF an.
    wetsuit_boot_height:
      name: Höhe der Neoprenstiefel
      description: Klassifiziert Höhe bzw. Schnitt des Stiefels am Bein, was Abdeckung,
        Beweglichkeit und Wassereintritt beeinflusst.
    wetsuit_entry_system:
      name: Einstiegssystem des Neoprenanzugs
      description: Beschreibt Art und Position des Öffnungs- bzw. Reißverschlusssystems
        zum Anziehen des Neoprenanzugs.
    wetsuit_seam_construction:
      name: Nahtkonstruktion des Neoprenanzugs
      description: Gibt an, wie die Nähte verarbeitet und versiegelt sind, was Wärmeisolierung,
        Flexibilität und Haltbarkeit beeinflusst.
    wheat_product_form:
      name: Form des Weizenprodukts
      description: Gibt die physische bzw. verarbeitete Form des Weizenprodukts an.
    wheel_arrangement:
      name: Radanordnung
      description: Gibt die Radanordnung der Dampflokomotive (nach Whyte-Notation)
        an, ein wichtiges Merkmal und häufiger Sammler- bzw. Suchbegriff.
    wheel_brake_type:
      name: Radbremsentyp
      description: Beschreibt die Bremskonfiguration der Räder bzw. Rollen des Wagens.
    wheel_chock_grip_features:
      name: Haftungsmerkmale des Radkeils
      description: Beschreibt Traktions- und Gripmerkmale, die die Haftung auf Oberflächen
        und an Reifen verbessern.
    wheel_cleaner_acidity_ph_category:
      name: Säuregrad-/pH-Kategorie des Felgenreinigers
      description: Gibt an, ob der Felgenreiniger sauer, neutral oder alkalisch ist
        (optional auch, ob er als pH-neutral beworben wird).
    wheel_cleaner_formula_type:
      name: Formeltyp des Felgenreinigers
      description: Gibt bei Felgenreinigern und ähnlichen Reinigungslösungen die hauptsächliche
        Formelart des Produkts an (z. B. säurebasiert, säurefrei, pH-neutral/-ausgeglichen
        oder eisenreaktiv).
    wheel_construction_type:
      name: Radkonstruktionstyp
      description: Gibt das Herstellungs- bzw. Konstruktionsverfahren des Rads an.
    wheel_contaminant_target:
      name: Zielverschmutzungsarten des Felgenreinigers
      description: Gibt die hauptsächlichen Verschmutzungsarten an, die der Reiniger
        entfernen soll.
    wheel_core_type:
      name: Core-Typ der Rollen
      description: Beschreibt die Bauart des Radkerns, die Gewicht, Steifigkeit und
        Energieübertragung beeinflusst.
    wheel_cylinder_inlet_port_thread_standard:
      name: Gewindestandard des Einlassanschlusses des Radzylinders
      description: Gibt den Gewindestandard des Bremsleitungseinlasses am Radzylinder
        an (z. B. metrische Bördelung oder SAE-Inverted-Flare).
    wheel_fastener_seat_type:
      name: Art des Radbefestigungssitzes
      description: Gibt die Bauart des Radmutter- bzw. Radbolzensitzes an, die mit
        dem Rad kompatibel ist (z. B. konisch/kegelförmig, Kugel/Radius, flach oder
        Mag/Schaft).
    wheel_illumination:
      name: Radbeleuchtung
      description: Gibt an, ob das Rad über integrierte Beleuchtung oder Leuchteffekte
        verfügt.
    wheel_material:
      name: Radmaterial
      description: Gibt das hauptsächliche Material der Räder an, das Haltbarkeit,
        Grip und Vibrationsdämpfung beeinflusst.
    wheel_profile:
      name: Rollenprofil
      description: Beschreibt die Querschnittsform des Rads, die Geschwindigkeit,
        Grip und Wendigkeit beeinflusst.
    wheel_setup_type:
      name: Art des Rollenaufbaus
      description: Definiert die bei den Skates verwendete Radkonfiguration.
    wheel_system_finish:
      name: Oberflächenfinish des Radsystems
      description: Gibt die Oberflächenveredelung bzw. Beschichtung von Felgen/Rädern
        und bestimmten Radteilen bzw. Zubehörteilen an.
    whip_style:
      name: Art der Reitpeitsche
      description: Klassifiziert das Produkt nach der jeweiligen Reitpeitschen- bzw.
        Gertenart oder der vorgesehenen Disziplin.
    whipped_cream_base:
      name: Grundzutat der Sprühsahne
      description: Gibt die hauptsächliche Basiszutat an, die zur Herstellung der
        Schlagsahne verwendet wird, z. B. Sahne oder Kokosnuss.
    whipped_cream_form:
      name: Form der Schlagsahne
      description: Gibt die physische Form an, in der die Schlagsahne verkauft wird.
    whistle_head_material:
      name: Material des Tin-Whistle-Kopfs
      description: Gibt das Material des Pfeifenkopfs bzw. Mundstücks an (Fipple-Block/-Kopf).
    whistle_light_features:
      name: Lichtfunktionen der Pfeife
      description: Gibt an, ob die Pfeife integrierte Lichteffekte für Partys besitzt
        (z. B. LED).
    whistle_purpose:
      name: Verwendungszweck der Pfeife
      description: Gibt die hauptsächliche vorgesehene Verwendung der Pfeife an (Sporttraining,
        Sicherheit auf See, Hundetraining usw.).
    whistle_sound_style:
      name: Klangcharakteristik der Pfeife
      description: Beschreibt den Stil bzw. Charakter des Pfeiftons (z. B. eintönig
        oder mehrtönig).
    white_glue_finish_appearance_when_dry:
      name: Oberfläche/Aussehen von Weißleim im trockenen Zustand
      description: Gibt an, wie der Klebstoff nach dem Trocknen für Bastel- bzw. Bürozwecke
        aussieht (z. B. transparent oder deckend).
    white_glue_washability:
      name: Auswaschbarkeit des Weißleims
      description: Gibt an, ob eingetrockneter Klebstoff aus Textilien oder von der
        Haut ausgewaschen bzw. entfernt werden kann.
    whitewater_kayak_style:
      name: Bauart des Wildwasserkajaks
      description: Primärer Einsatzzweck innerhalb des Wildwassersegments (z. B. Creekboat,
        River Runner oder Playboat).
    whitewater_rating_class:
      name: Wildwasser-Schwierigkeitsgrad (Klasse)
      description: Höchste Klasse der internationalen Wildwasser-Schwierigkeitsskala,
        für die das Raft ausgelegt ist.
    whorl_mounting_interface:
      name: Anbringungsweise des Spinnwirtels
      description: Beschreibt, wie der Wirtel am Spinnrad befestigt wird (Wellenbauart
        bzw. Verbindung).
    wick_construction_type:
      name: Machart des Dochts
      description: Beschreibt die Bauart bzw. Ausführung des Dochts (geflochten, flach,
        quadratisch geflochten, mit Kern, aus Holz usw.).
    wick_core_type:
      name: Art des Dochtkerns
      description: Gibt an, ob der Docht kernlos ist oder einen Kern aus Material
        enthält (z. B. Papier- oder Zinkkern), was Steifigkeit und Brenneigenschaften
        beeinflusst.
    wick_tab_crimp_type:
      name: Crimpart der Dochtlasche
      description: Beschreibt, wie die Dochtlasche den Docht fixiert (Bauart bzw.
        Crimpstil).
    wick_tab_material:
      name: Material des Dochtfußes
      description: Gibt das Material der befestigten Lasche bzw. Halterung an (üblicherweise
        Weißblech), relevant für Korrosionsbeständigkeit und regulatorische Anforderungen
        (z. B. Vermeidung von Blei).
    wick_tab_shape:
      name: Form der Dochtlasche
      description: Form bzw. Bauart der Dochtlaschenplatte.
    wick_type_included:
      name: Enthaltene Dochtart
      description: Gibt das im Set enthaltene Dochtmaterial bzw. den enthaltenen Dochttyp
        an.
    wig_fiber_material:
      name: Material der Perückenfasern
      description: Gibt die hauptsächlich für das Perückenhaar verwendete Faser an,
        damit Käufer:innen leicht zwischen Echthaarvarianten und synthetischen Optionen
        mit unterschiedlichen Styling- und Haltbarkeitseigenschaften wählen können.
    wildlife_attractant_scent:
      name: Duftlockmittel für Wild
      description: Gibt den hauptsächlichen Lockduft zur Anlockung von Wildtieren
        an, einschließlich natürlicher Nahrungsgerüche und pheromonartiger Duftstoffe.
    willow_grade:
      name: Qualitätsstufe des Weidenholzes
      description: Gibt die Qualitätsstufe des verwendeten Weidenholzes an und beschreibt
        Maserung sowie allgemeines Leistungsniveau.
    willow_type:
      name: Art des Weidenholzes
      description: Gibt die Art des Weidenholzes oder alternativen Materials an, das
        für das Schlägerblatt verwendet wird und Leistung, Haltbarkeit sowie Preis
        stark beeinflusst.
    wind_up_mechanism_type:
      name: Art von Aufziehmechanismus
      description: Gibt an, wie das Spielzeug aufgezogen oder aktiviert wird.
    wind_up_toy_movement_pattern:
      name: Bewegungsmuster des Aufziehspielzeugs
      description: Beschreibt die hauptsächliche Bewegung, die beim Aufziehen entsteht.
    windbreak_purpose:
      name: Verwendungszweck des Windschutzes
      description: Definiert den hauptsächlichen vorgesehenen Einsatzzweck des Windschutzes.
    windfoil_board_mounting_system:
      name: Montagesystem des Windfoil-Boards
      description: Gibt die Foilbox bzw. Montageschnittstelle an, die in das Windfoil-Board
        integriert ist.
    windfoil_sail_style:
      name: Windfoil-Segeltyp
      description: Klassifiziert das Segel nach dem vorgesehenen Fahrstil bzw. der
        Disziplin.
    winding_direction:
      name: Wickelrichtung
      description: Gibt das vom Uhrenbeweger unterstützte Drehmuster an (im Uhrzeigersinn,
        gegen den Uhrzeigersinn oder bidirektional).
    winding_method:
      name: Wickelmethode
      description: Beschreibt, wie der Schussfaden für die Verwendung im Schiffchen
        aufgewickelt bzw. eingelegt werden soll.
    winding_speed_control_type:
      name: Art der Wickelgeschwindigkeitsregelung
      description: Gibt die Methode an, mit der die Wickelgeschwindigkeit während
        der Nutzung gesteuert wird.
    winding_type:
      name: Wicklungsart
      description: Gibt die Wicklungskonstruktion der Basssaiten an (äußeres Wicklungsprofil).
    windlass_control_station_type:
      name: Art der Steuerstation der Ankerwinde
      description: Art der Steuerungsschnittstelle, die für den Betrieb der Ankerwinde
        vorgesehen oder unterstützt wird.
    windlass_mount_type:
      name: Montageart der Ankerwinde
      description: Gibt an, wo bzw. wie die Ankerwinde am Boot montiert werden soll.
    window_component_location:
      name: Position der Fensterkomponente
      description: Gibt an, für welches Fenster bzw. welche Öffnung im Fahrzeug das
        Teil vorgesehen ist (z. B. Windschutzscheibe, Türscheibe, Heckscheibe oder
        Dreiecksscheibe).
    window_configuration:
      name: Fensterkonfiguration
      description: Gibt Vorhandensein und relative Größe transparenter Sichtfenster
        am Wingfoil an.
    window_glass_construction:
      name: Konstruktion des Fensterglases
      description: Gibt die Sicherheits- bzw. Laminierungskonstruktion des Fahrzeugfensterglases
        an.
    window_glass_features:
      name: Merkmale des Fensterglases
      description: Gibt an, ob das Glas integrierte Fahrzeugtechnologien unterstützt
        (z. B. Regensensor oder Kamerahalterung).
    window_glass_finish:
      name: Oberfläche des Fensterglases
      description: Gibt die Oberflächenbehandlung, Tönung bzw. den Sichtschutz des
        Fahrzeugfensterglases an.
    window_glass_tint_color:
      name: Farbtönung des Fensterglases
      description: Gibt den Farbton der vorhandenen Tönung im Glas an (nicht die allgemeine
        Produktfarbe).
    window_glass_tint_level:
      name: Tönungsgrad des Fensterglases
      description: Gibt die ungefähre werkseitige bzw. Sichtschutz-Tönung des Fensterglases
        an (keine nachträglich angebrachte Folie). Beschreibende Stufen verwenden,
        wenn der genaue VLT-Wert nicht bekannt ist.
    window_net_latch_mechanism:
      name: Verriegelungsmechanismus des Fensternetzes
      description: Gibt den Verriegelungs- bzw. Entriegelungsmechanismus des Fensternetzes
        an (z. B. Druckknopf, Hebel oder Schnalle im Sicherheitsgurtstil).
    window_net_mounting_hardware:
      name: Befestigungsmaterial des Fensternetzes
      description: Gibt die Art des Befestigungsmaterials bzw. der Befestigungsmethode
        zur Installation des Fensternetzes an (z. B. Clipbefestigung, Schrauben oder
        Haken-/Stangensystem) oder ob Befestigungsmaterial enthalten ist.
    window_net_opening_direction:
      name: Öffnungsrichtung des Fensternetzes
      description: Gibt an, wie das Fensternetz relativ zum Fahrzeuginsassen geöffnet
        bzw. freigegeben wird, um Ausstieg und Regelkonformität zu ermöglichen.
    window_regulator_operation:
      name: Betätigungsart des Fensterhebers
      description: Gibt an, wie der Fensterheber betätigt wird (manuelle Kurbel oder
        elektrisch).
    windshield_coverage_area:
      name: Abdeckungsbereich der Windschutzscheibe
      description: Gibt an, welche Bereiche der Fahrzeugfront durch die Windschutzscheibenabdeckung
        geschützt werden sollen (z. B. nur die Windschutzscheibe oder zusätzlich Scheibenwischer,
        Spiegel, Seitenscheiben oder Motorhaubenkante).
    windshield_mount_attachment_method:
      name: Befestigungsmethode der Windschutzscheibenhalterung
      description: Gibt an, wie die Halterung an der Oberfläche der Windschutzscheibe
        haftet bzw. greift.
    windshield_washer_fluid_seasonality:
      name: Saisonale Eignung der Scheibenwaschflüssigkeit
      description: Gibt die vorgesehene Jahreszeit bzw. das Klima oder den hauptsächlichen
        Einsatzzweck der Scheibenwaschflüssigkeit an (z. B. Winterenteiser, Sommerreiniger
        gegen Insektenreste oder Ganzjahresprodukt).
    windsurf_fin_style:
      name: Windsurf-Finnentyp
      description: Klassifiziert die Finne nach der vorgesehenen Segeldisziplin bzw.
        Einsatzart (z. B. Wave, Slalom oder Weed).
    windsurfing_connection_standard:
      name: Windsurf-Verbindungsstandard
      description: Mechanische Schnittstelle bzw. Boxenart zur Befestigung des Teils
        am Board oder Rigg.
    windsurfing_sail_style:
      name: Windsurfsegelart
      description: Klassifiziert die vorgesehene Disziplin bzw. den Einsatzzweck des
        Segels, z. B. Wave, Freeride oder Foil.
    wine_additive_type:
      name: Art des Weinzusatzstoffs
      description: Gibt an, um welche Art von Produkt zur Rotweinherstellung es sich
        handelt (Zutat, Zusatzstoff, Hefe, Schönungsmittel, Set usw.).
    wine_body:
      name: Weinkörper
      description: Beschreibt das wahrgenommene Gewicht und das Mundgefühl des Weins.
    wine_carbonation:
      name: Kohlensäuregehalt des Weins
      description: Gibt an, ob es sich um Stillwein, Perlwein oder Schaumwein handelt
        und gegebenenfalls die Intensität der Kohlensäure.
    wine_making_ingredient_type:
      name: Art der Weinherstellungszutat
      description: Gibt die funktionale Zutatenkategorie für verwendbare Zusatzstoffe
        und Zutaten zur Weinherstellung an.
    wine_making_stage:
      name: Phase der Weinherstellung
      description: Gibt an, für welchen Schritt des Weinherstellungsprozesses das
        Produkt vorgesehen ist.
    wine_style:
      name: Weinstil
      description: Klassifiziert den allgemeinen Produktionsstil des Weins über die
        Farbe hinaus, z. B. Stillwein, Schaumwein oder Likörwein.
    winemaking_process_stage:
      name: Phase des Weinherstellungsprozesses
      description: Gibt die hauptsächliche Phase des Weinherstellungsprozesses an,
        für die das Produkt vorgesehen ist.
    wing_count:
      name: Flügelanzahl
      description: Anzahl der Flügel bzw. Arme des Bumerangs.
    wing_handle_type:
      name: Wing-Handle-Art
      description: Gibt die Bauart des Handgriffsystems am Wingfoil an.
    wing_part_type:
      name: Art des Wingfoil-Teils
      description: Gibt die konkrete Komponente bzw. das Ersatzteil für ein Wingfoil
        an.
    wingfoiling_style:
      name: Wingfoiling-Stil
      description: Gibt die konkrete Wingfoiling-Disziplin bzw. den Fahrstil an, für
        den das Produkt ausgelegt ist.
    wiper_arm_finish:
      name: Oberflächenfinish des Wischerarms
      description: Oberflächenfinish bzw. Schutzbeschichtung des Wischerarms, die
        Korrosionsbeständigkeit und Aussehen beeinflusst.
    wiper_arm_pivot_mount_type:
      name: Art der Drehgelenkbefestigung des Wischerarms
      description: Gibt an, wie der Wischerarm am Wischergestänge bzw. Drehpunkt des
        Fahrzeugs befestigt wird.
    wiper_blade_attachment_type:
      name: Gibt an, wie der Wischerarm am Wischergestänge bzw. Drehpunkt des Fahrzeugs
        befestigt wird.
      description: Gibt die Anschluss- bzw. Befestigungsart an, die zur Montage des
        Wischerblatts am Wischerarm verwendet wird.
    wiper_blade_rubber_material:
      name: Gummimaterial des Wischerblatts
      description: Material des Wischelements (Einsatz/Nachfüllstreifen), das mit
        dem Glas in Kontakt kommt.
    wiper_system_position:
      name: Position des Scheibenwischersystems
      description: Gibt die Montageposition des Scheibenwischersystems am Fahrzeug
        an.
    wire_coating_material:
      name: Material der Drahtbeschichtung
      description: Gibt das äußere Beschichtungs- bzw. Mantelmaterial des Drahts an
        (nicht das Material des Kerndrahts), das Abriebfestigkeit und Leichtgängigkeit
        beim Durchführen durch Perlenlöcher beeinflussen kann.
    wire_coating_type:
      name: Art der Drahtbeschichtung
      description: Gibt an, ob und wie der Draht beschichtet bzw. ummantelt ist (für
        Farbe, Schutz und Textur).
    wire_construction_type:
      name: Drahtbauweise
      description: Gibt die physische Konstruktion des Perldrahts an, z. B. Litze
        oder Massivdraht und ob dieser beschichtet ist.
    wire_finish:
      name: Drahtoberfläche
      description: Gibt die Oberflächenveredelung, Beschichtung oder Plattierung des
        Drahts an (z. B. poliert, emailliert, verzinkt oder plattiert), die Aussehen
        sowie Anlauf- und Korrosionsbeständigkeit beeinflusst.
    wire_gauge_awg:
      name: Drahtstärke (AWG)
      description: American-Wire-Gauge-(AWG)-Größe der im Kabelbaum verwendeten Leiter.
    wire_insulation_material:
      name: Material der Kabelisolierung
      description: Material der Drahtisolierung bzw. des Drahtmantels im Kabelbaum
        (beeinflusst Temperatur- und Chemikalienbeständigkeit).
    wire_packaging_type:
      name: Verpackungsart des Drahtes
      description: Gibt an, wie der Draht verkauft/verpackt wird.
    wire_shape_profile:
      name: Drahtform/-profil
      description: Beschreibt die Querschnittsform des Drahts.
    wiring_configuration:
      name: Verdrahtungskonfiguration
      description: Gibt an, ob der Fechtdegen vormontiert für elektrische Wertung,
        unverkabelt, drahtlos oder für das Training ohne elektrische Wertung vorgesehen
        ist.
    wobbler_style:
      name: Wobbler-Stil
      description: Definiert den spezifischen Design- bzw. Aktionsstil des Wobblers,
        z. B. Crankbait oder Jerkbait.
    wood_block_surface_preparation:
      name: Oberflächenvorbereitung des Holzblocks
      description: Gibt den gebrauchsfertigen Oberflächenzustand des Holzblocks zur
        Endbearbeitung und für Bastelarbeiten an.
    wood_grain_direction:
      name: Holzmaserungsrichtung
      description: Richtung der Holzmaserung relativ zur längsten Abmessung des Produkts
        (wichtig für Festigkeit, Schnittverhalten und Aussehen).
    wood_slice_edge_style:
      name: Kantenstil der Holzscheibe
      description: Beschreibt die Randbeschaffenheit der Scheibe, z. B. natürlicher
        Rindenrand oder glatt/geschliffen.
    wooden_block_special_features:
      name: Besondere Merkmale der Holzbausteine
      description: Beschreibt besondere funktionale Merkmale des Holzbausteinsets.
    woodwind_body_construction:
      name: Korpuskonstruktion des Holzblasinstruments
      description: Gibt an, ob das Instrument aus einem Stück oder aus mehreren Teilen
        besteht (z. B. 2-teilig/3-teilig), was Reinigung, Lagerung und Transport beeinflusst.
    woodwind_polishing_cloth_intended_use:
      name: Verwendungszweck des Poliertuchs für Holzblasinstrumente
      description: Gibt an, welche Bereiche eines Holzblasinstruments mit dem Tuch
        hauptsächlich gereinigt bzw. poliert werden sollen.
    woodwind_small_part_type:
      name: Art des Kleinteils für Holzblasinstrumente
      description: Gibt an, um welche Art von Klarinetten-Kleinersatzteil es sich
        handelt (z. B. Klappenmechanik, Polster/Kork/Filz oder Ringe).
    woofer_mounting_type:
      name: Anbringungsart des Subwoofers
      description: Beschreibt, wie der Tieftöner montiert bzw. verwendet werden soll
        (Freiluftmontage oder Gehäusemontage) sowie gängige Montagearten im Fahrzeugbereich.
    woofer_surround_material:
      name: Material der Tieftönersicke
      description: Material der Tieftönersicke (äußerer Aufhängungsring).
    worn_on_finger:
      name: Tragefinger
      description: Gibt an, an welchem Finger die Fingerhutführung getragen werden
        soll.
    wrap_style:
      name: Wickelstil
      description: Gibt an, wie oft der Gürtel um die Taille gewickelt werden soll.
    wrapping_occasion:
      name: Anlass der Geschenkverpackung
      description: Gibt den hauptsächlichen Geschenk- bzw. Feierlass an, für den das
        Geschenkpapier vorgesehen ist.
    wrapping_paper_features:
      name: Eigenschaften des Geschenkpapiers
      description: Funktionale und nachhaltigkeitsbezogene Eigenschaften des Geschenkpapiers,
        z. B. Reißfestigkeit, Recyclinganteil oder vorgeschnittene Bogenformate.
    wrestling_dummy_design:
      name: Bauart der Wrestlingpuppe
      description: Beschreibt die allgemeine Körperform bzw. Haltung der Puppe, z. B.
        stehende menschliche Form oder Wurfsack, wodurch sich die möglichen Trainingsübungen
        ergeben.
    wrestling_mat_safety_certifications:
      name: Sicherheitszertifizierungen für Ringermatten
      description: Listet branchen- bzw. sportartspezifische Sicherheitszertifizierungen
        oder Normen auf, die die Matte erfüllt.
    wrist_strap_style:
      name: Art des Handgelenkbands
      description: Beschreibt die Art des Handgelenkriemens (oder dessen Fehlen),
        die Halt und Passform beeinflusst.
    wrist_support_style:
      name: Art der Handgelenkstütze
      description: Kennzeichnet die Bauart bzw. Ausführung der Handgelenkstütze, z. B.
        Bandage, Handschuh, Tape oder Wickelband, um Auswahl nach Vorlieben und Leistung
        zu erleichtern.
    xylophone_range_octaves:
      name: Tonumfang des Xylofons (Oktaven)
      description: Der gesamte Tonumfang des Xylophons, ausgedrückt in Oktaven (z. B.
        2,5 Oktaven, 3 Oktaven oder 4 Oktaven).
    xylophone_resonator_type:
      name: Art des Xylophonresonators
      description: Gibt die Art des Resonatorsystems zur Klangverstärkung an (falls
        vorhanden).
    yam_variety:
      name: Auswahl an Yams
      description: Gibt die Sorte bzw. gängige Varietät der angebotenen Yamswurzel
        an (z. B. lila, gelb oder Elefantenfuß).
    yarn_cutter_physical_style:
      name: Bauart des Garnschneiders
      description: Kennzeichnet die Bauart des Garnschneiders (z. B. Anhänger, Ring
        oder Schere), um Suche und Filterung innerhalb dieser Kategorie zu erleichtern.
    yarn_finish_or_effect:
      name: Garnfinish oder -effekt
      description: Hebt besondere visuelle oder funktionale Veredelungen des Garns
        hervor, z. B. Fluoreszenz oder metallischen Glanz.
    yarn_guide_style:
      name: Stil der Garnführung
      description: Die physische Bauart der Garnführungskomponente.
    yarn_swift_adjustability:
      name: Einstellbarkeit des Garnwicklers
      description: Gibt an, ob und wie der Garnhaspel verstellbar ist (ausziehbar,
        zusammenklappbar/faltbar), was Aufbewahrung und die Bandbreite der verarbeitbaren
        Stranggrößen beeinflusst.
    yarn_swift_bearing_type:
      name: Lagertyp des Garnhaspels
      description: Beschreibt den Rotationsmechanismus (z. B. Kugellager), der Laufruhe
        und Wickelgeschwindigkeit beeinflusst.
    yeast_application:
      name: Anwendungsbereich der Hefe
      description: Kennzeichnet den primären vorgesehenen Verwendungszweck des Hefeprodukts
        in Küche oder Fermentation.
    yo_yo_accessory_part_type:
      name: Art des Jojo-Zubehörs bzw. -Ersatzteils
      description: Gibt an, um welche Art von Jojo-Ersatzteil oder Zubehör es sich
        bei dem Produkt handelt (z. B. Schnur, Kugellager oder Reaktionspads).
    yo_yo_axle_system_type:
      name: Typ des Jojo-Achsensystems
      description: Beschreibt die Konstruktionsart der Jojo-Achse (z. B. feste Achse
        vs. Transaxle), die Spielgefühl und Wartung beeinflusst.
    yo_yo_bearing_size_class:
      name: Größenklasse des Jojo-Lagers
      description: Standardisierte Lagergrößenklasse, die gegebenenfalls vom Jojo
        verwendet wird.
    yo_yo_bearing_type:
      name: Typ des Jojo-Lagers
      description: Lagerkonfiguration, die Ansprechverhalten und Dreheigenschaften
        beeinflusst.
    yo_yo_play_style:
      name: Spielstil des Jojos
      description: Gibt den primären Spielstil des Jojos an, der die String- bzw.
        Trickdisziplin widerspiegelt, für die das Produkt konzipiert wurde.
    yo_yo_response_system:
      name: Jojo-Reaktionssystem
      description: Gibt den Jojo-Reaktionsmechanismus an, für den dieses Teil ausgelegt
        ist (Kompatibilität).
    yo_yo_responsiveness:
      name: Reaktionsverhalten des Jojos
      description: Gibt an, ob das Jojo durch einen Ruck in die Hand zurückkehrt (responsive)
        oder einen Bindevorgang erfordert (unresponsive).
    yo_yo_string_material:
      name: Material der Jojo-Schnur
      description: Materialzusammensetzung der Jojo-Schnur.
    yogurt_base_ingredient:
      name: Grundzutat des Joghurts
      description: Gibt die primäre Milch- oder pflanzliche Quelle an, die zur Herstellung
        des Joghurts verwendet wird, was für Ernährungspräferenzen und Allergenhinweise
        entscheidend ist.
    yoke_type:
      name: Jochtyp
      description: Kennzeichnet die Art der Halterung bzw. des Jochs, die die Schusswaffe
        auf dem Einbeinstativ stützt.
    zill_playing_style:
      name: Spielweise der Zimbel
      description: Beabsichtigter Spielkontext bzw. Spielstil (üblicherweise Bauchtanz
        vs. orchestrale/kulturelle Varianten).
    zill_strap_material:
      name: Riemenmaterial der Zimbel
      description: Material des Fingerriemens bzw. Gummibands zur Befestigung der
        Zimbeln (falls vorhanden), das Komfort, Haltbarkeit und Griffigkeit beeinflusst.
    zills_strap_adjustability:
      name: Verstellbarkeit des Zimbelriemens
      description: Gibt an, ob und wie der mitgelieferte Riemen bzw. das Gummiband
        für eine optimale Passform angepasst werden kann.
    zipper_application:
      name: Verwendungszweck des Reißverschlusses
      description: Gibt das vorgesehene Projekt bzw. den Einsatzzweck an, für den
        der Reißverschluss konzipiert wurde.
    zipper_chain_type:
      name: Typ der Reißverschlusskette
      description: Gibt Bauart bzw. Typ der Reißverschlusskette bzw. -zähne an.
    zipper_end_type:
      name: Endtyp des Reißverschlusses
      description: Gibt an, wie der Reißverschluss endet und ob er teilbar (offenes
        Ende) oder geschlossen (nicht teilbar) ist, einschließlich der bei Bastelreißverschlüssen
        üblichen Endteile für teilbare Reißverschlüsse.
    zipper_gauge:
      name: Reißverschlussgröße
      description: 'Gibt die Stärke bzw. Größenbezeichnung des Reißverschlusses an,
        typischerweise ausgedrückt als Zahl mit einem # (z. B. #3 oder #5), die mit
        Zahn-/Spiralbreite und Verwendungszweck zusammenhängt.'
    zipper_opening_length:
      name: Länge der Reißverschlussöffnung
      description: Definiert, wie viel der vorderen Öffnung mit einem Reißverschluss
        versehen ist, und unterscheidet so zwischen Vollreißverschluss-, Halbreißverschluss-
        und Viertelreißverschlussmodellen.
    zipper_pull_material:
      name: Material des Reißverschlussziehers
      description: Gibt das Material des Reißverschlussziehers bzw. der Zuglasche
        an (der Teil, den man greift), im Unterschied zu Reißverschlusszähnen/-kette
        und Reißverschlussband.
    zipper_pull_side:
      name: Reißverschluss-Zugrichtung
      description: Gibt an, von welcher bzw. welchen Seite(n) des Reißverschlusses
        die Zuglasche zugänglich ist.
    zipper_pull_strap_cord_tab_material:
      name: Material der Reißverschluss-Ziehschlaufe/-kordel/-lasche
      description: Material der Schlaufe/Kordel/Lasche bzw. Quaste, die am Reißverschlusszieher
        befestigt ist (falls vorhanden), ausgenommen Hauptkörper bzw. Mechanik des
        Reißverschlussziehers.
    zipper_reversibility_mechanism:
      name: Wendemechanismus des Reißverschlusses
      description: Gibt an, wie der Reißverschluss wendbar ist (z. B. doppelseitiger
        Schieber vs. Klapp-/Automatikschieber für wendbare Kleidungsstücke).
    zipper_separating_type:
      name: Typ des teilbaren Reißverschlusses
      description: Gibt an, ob der Reißverschluss unten bzw. oben teilbar oder geschlossen
        ist, passend für Jacken, Schlafsäcke, Taschen usw.
    zipper_side:
      name: Seite des Reißverschlusses
      description: Gibt die Seite an, auf der sich der Hauptreißverschluss befindet,
        wenn der Schlafsack mit der Vorderseite nach oben liegt.
    zipper_slider_material:
      name: Material des Reißverschlussschiebers
      description: Gibt das Material des Reißverschlussschiebers an (des beweglichen
        Mechanismus), das Festigkeit und Korrosionsbeständigkeit beeinflussen kann.
    zipper_slider_pull_configuration:
      name: Konfiguration von Reißverschlussschieber bzw. -zieher
      description: Gibt an, ob der Reißverschluss einen oder zwei Schieber bzw. Zieher
        besitzt und ob sich die Zieher auf einer oder beiden Seiten des Schiebers
        befinden.
    zipper_style:
      name: Reißverschlussart
      description: Gibt die Länge bzw. das Vorhandensein eines Reißverschlusses am
        Kleidungsstück an (z. B. ohne Reißverschluss, Viertelreißverschluss, Halbreißverschluss
        oder Vollreißverschluss).
    zipper_tape_material:
      name: Material des Reißverschlussbands
      description: Gibt das Hauptmaterial des Reißverschlussbands (Stoffseiten) an,
        das in das Projekt eingenäht wird.
    zipper_teeth_type:
      name: Art der Reißverschlusszähne
      description: Gibt die Konstruktionsart der Reißverschlusskette bzw. -zähne an
        (z. B. Spirale, geformter Kunststoff, Metall oder unsichtbar), was Flexibilität,
        Festigkeit und typische Einsatzbereiche beeinflusst.
