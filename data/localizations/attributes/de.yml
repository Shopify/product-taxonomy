    weight_type:
      name: Gewichtsart
      description: Beschreibt das Gewicht von Artikeln, z. B. leicht, mittel oder
        schwer
    weight_unit_supported:
      name: Unterstützte Gewichtseinheit
      description: Gibt die Gewichtseinheiten an, die ein Produkt für die Messung
        bietet, z. B. Pfund, Stone
    welding_helmet_features:
      name: Eigenschaften des Schweißhelms
      description: Kennzeichnet spezielle Merkmale von Schweißhelmen, z. B. True Color,
