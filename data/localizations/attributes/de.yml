    wipe_dispenser_features:
      name: Eigenschaften des Wischtuchspenders
      description: Beschreibt besondere Eigenschaften von Tuchspendern, wie z. B.
        Spendermechanismus oder LED-Anzeige
    wipe_fragrance:
      name: Duftnote des Feuchttuchs
      description: Gibt das Aroma von Wischprodukten an, z. B. ohne Duftstoffe oder
        Lavendel
    wipe_packaging:
      name: Verpackung der Feuchttücher
      description: Gibt den Behälter oder die Verpackungsart für Tücher an, z. B.
        Nachfüllpackung, in Reisegröße
    wipe_purpose:
      name: Tuch-Zweck
      description: Identifiziert den primären beabsichtigten Gebrauch oder Nutzen
        der Tücher
    wipe_warmer_features:
      name: Eigenschaften des Wischtuchwärmers
      description: Beschreibt die spezifischen Merkmale eines Feuchttuchwärmers, wie
        z. B. Reisefreundlichkeit oder Feuchtigkeitsspeicherung
    wire/rope_material:
      name: Draht-/Seilmaterial
      description: Gibt das in Draht- oder Seilprodukten verwendete Material an, wie
        Kupfer oder Polyester
    wire_thickness:
      name: Drahtstärke
      description: Gibt die Dicke der Drähte an, z. B. dick oder dünn
    wireless_charging_standard:
      name: Kabelloser Ladestandard
      description: Identifiziert die vom Telefon unterstützten induktiven Ladeprotokolle.
    wireless_multi_room_platform:
      name: Drahtlose Multiroom-Plattform
      description: Definiert das proprietäre oder Drittanbieter-Ökosystem, das für
        Multiroom-Audio-Streaming verwendet wird.
    wireless_streaming_protocols_supported:
      name: Unterstützte drahtlose Streaming-Protokolle
      description: Identifiziert die drahtlosen Streaming-Standards oder -Dienste,
        die das Stereogerät nativ empfangen kann.
    wood_finish:
      name: Holzoberfläche
      description: Beschreibt die Oberflächenbehandlung oder die Konstruktionsmethode,
        die bei Holzprodukten angewendet wird (z. B. Massivholz, furniert, Holzwerkstoffe,
        geölt, lackiert, gestrichen).
    woodwind_care_items_included:
      name: Enthaltene Pflegeartikel für Holzblasinstrumente
      description: Kennzeichnet die Pflegeartikel, die einem Holzblasinstrument beiliegen,
        wie z. B. Reinigungsbürste oder Korkfett
    work_capacity:
      name: Arbeitskapazität
      description: Beschreibt die Leistungsstufe eines Produkts, z. B. Schwerlast
        oder Leichtlast
    wreath_design:
      name: Kranzdesign
      description: Identifiziert das primäre Material oder die Form eines Kranzes,
        wie Metall oder Reifen
    wrist_rest_features:
      name: Handballenauflage-Funktionen
      description: Listet spezielle funktionale oder Designmerkmale auf, die einen
        Mehrwert bieten.
    wrist_rest_type:
      name: Handballenauflage-Typ
      description: Identifiziert die vorgesehene Gerätepaarung oder Set-Konfiguration
        der Handballenauflage (z. B. nur Tastatur, nur Maus, kombinierte Sets).
    xlr_pin_count:
      name: XLR-Pin-Anzahl
      description: Gibt die spezifische Pin-Konfiguration (Anzahl der Pins) der XLR-Stecker
