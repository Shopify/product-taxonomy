    watercraft_engine_control_type:
      name: Motorsteuerungsweise des Wasserfahrzeugs
      description: Identifiziert den Typ des Steuerungssystems in einem Wasserfahrzeugmotor,
        wie z. B. Gashebel oder Schalthebel
    watercraft_features:
      name: Eigenschaften des Wasserfahrzeugs
      description: Beschreibt Annehmlichkeiten oder Systeme auf einem Wasserfahrzeug,
        wie z. B. eine Küche oder ein Bremssystem
    watercraft_motor_mounting_type:
      name: Anbringungsweise des Wasserfahrzeugmotors
      description: Identifiziert, wo am Wasserfahrzeug der Motor montiert ist, z.
        B. am Bug oder am Heck
    watercraft_propulsion_type:
      name: Antriebsart des Wasserfahrzeugs
      description: Gibt an, wie ein Wasserfahrzeug angetrieben wird, z. B. manuell
        oder motorisiert
    watercraft_steering_wheel_type:
      name: Typ des Wasserfahrzeuglenkrads
      description: Gibt den Typ des Wasserfahrzeug-Lenkrads an, z. B. elektrisch oder
        Standard
    watercraft_type:
      name: Wasserfahrzeugtyp
      description: Identifiziert die Kategorie des Wasserfahrzeugs, z. B. Sport oder
        Luxus
    waveski_features:
      name: Waveski-Eigenschaften
      description: Beschreibt die besonderen Eigenschaften eines Waveskis, wie verstellbare
        Riemen oder Anti-Rutsch
    wax_application_method:
      name: Wachsauftragsmethode
      description: Gibt die Technik an, mit der Wachs auf Wintersportausrüstung aufgetragen
        wird, z. B. kalt oder heiß
    wax_type:
      name: Wachstyp
      description: Gibt die Art des Wachses in Artikeln wie Kerzen an, wie Soja oder
        Paraffin
    wear_schedule:
      name: Tragezeitplan
      description: Gibt die maximal zugelassen ununterbrochene Tragedauer der Linse
        bis zur Entfernung an
    weather_alert_technology:
      name: Wetterwarntechnologie
      description: Gibt den vom Radio unterstützten Warnstandard oder die Zertifizierung
        für automatisierte Notfallwarnungen an.
    weather_strip_design:
      name: Design des Dichtungsstreifens
      description: Beschreibt die Form von Dichtungsmaterialien, wie rund oder flach
    weather_supply_application_method:
      name: Anwendungsmethode von Wetterzubehör
      description: Beschreibt, wie Wetterschutzmittel angewendet werden, z. B. selbstklebend
        oder nicht klebend
    weatherization_application:
      name: Anwendung des Witterungsschutzes
      description: Identifiziert, wo ein Wetterschutzprodukt angewendet wird, z. B.
        an Fenstern oder Türen
    webcam_design:
      name: Design der Webcam
      description: Identifiziert den Typ der Webcam, z. B. Konferenz-, Laptop- oder
        Plug-and-Play-Webcam
    weight_bar_activity:
      name: Hantelstangenaktivität
      description: Gibt den Verwendungszweck von Hantelstangen an, z. B. Powerlifting,
        Techniktraining
    weight_bar_type:
      name: Hantelstangentyp
      description: Gibt das Design von Hantelstangen an, wie z. B. Trap oder Curl
    weight_loss_mechanism:
      name: Wirkprinzip des Gewichtsverlusts
      description: Identifiziert den primären physiologischen Ansatz, den das Nahrungsergänzungsmittel
