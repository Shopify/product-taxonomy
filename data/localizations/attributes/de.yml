        Silikon
    watch_accessory_style:
      name: Uhrenaccessoire-Stil
      description: Gibt den Stil von Uhraccessoires an, z. B. sportlich, modern
    watch_display:
      name: Uhrdisplay
      description: Gibt die Art des Uhrdisplays an, z. B. digital oder analog
    watch_features:
      name: Eigenschaften der Uhr
      description: Kennzeichnet besondere Merkmale einer Uhr, wie z. B. Automatikwerk
        oder Leuchtzeiger
    watch_material:
      name: Uhrenmaterial
      description: Gibt die Art des für die Uhr verwendeten Materials an, z. B. Titan
