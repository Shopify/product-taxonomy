---
de:
  attributes:
    3d_glasses_fit_design:
      name: 3D-Brillen-Passform-Design
      description: Gibt an, wie die Brille getragen oder befestigt wird (z. B. Clip-on,
        Wrap-Around, Fit-Over)
    3d_glasses_material:
      name: 3D-Brillenmaterial
      description: Gibt das für 3D-Brillen verwendete Material an, z. B. Bambus oder
        Edelstahl
    3d_glasses_technology:
      name: 3D-Brillen-Technologie
      description: Gibt die 3D-Bild-/Synchronisationstechnologie an, für die die Brille
        entwickelt wurde, und bestimmt die Kompatibilität mit bestimmten Displays
        oder Projektoren
    3d_printer_case_style:
      name: 3D-Drucker-Gehäusestil
      description: Klassifiziert den allgemeinen Produkttyp, damit Käufer:innen zwischen
        weichen Tragetaschen, Hartschalenkoffern, stationären Gehäusen und einfachen
        Staubschutzhüllen unterscheiden können
    3d_printer_cleaning_kit_components_included:
      name: Enthaltene Komponenten des 3D-Drucker-Reinigungssets
      description: Listet die im Set enthaltenen einzelnen Werkzeuge und Verbrauchsmaterialien
        auf, damit Käufer:innen genau wissen, was sie kaufen
    3d_printing_resin_type:
      name: 3D-Druck-Harztyp
      description: Gibt die Formulierung oder beabsichtigte Anwendung des Harzes an
        und hilft Käufer:innen dabei, schnell zu erkennen, ob es sich um Standard-,
        Engineering-, gießbare oder andere spezialisierte Typen handelt
    80_plus_efficiency_rating:
      name: 80 Plus Effizienzbewertung
      description: Bezeichnet das offizielle 80 Plus Energieeffizienz-Zertifizierungsniveau,
        das das Netzteil erreicht hat.
    abrasive_material:
      name: Schleifmaterial
      description: Identifiziert die Art des Schleifmittels, das in Schleifwerkzeugen
        verwendet wird, wie Diamant oder Siliziumkarbid
    absinthe_style:
      name: Absinth-Stil
      description: Gibt die Absinthsorte an, z. B. gemischt, destilliert
    absinthe_variety:
      name: Auswahl an Absinth
      description: Unterscheidet Absinthprodukte durch ihre einzigartigen Sorten,
        z. B. Rouge, Verte
    absorbency_level:
      name: Saugfähigkeitsgrad
      description: Gibt die Saugfähigkeit an, z. B. über Nacht, leicht bei Körperpflegeprodukten
    absorbent_hygiene_product_features:
      name: Eigenschaften saugfähiger Hygieneprodukte
      description: Identifiziert besondere Eigenschaften von Hygieneprodukten, wie
        z. B. auslaufsicher oder hypoallergen
    academic_level:
      name: Akademischer Grad
      description: Gibt das akademische Niveau des Medieninhalts an, z. B. Bachelor-
        oder Doktortitel
    accessibility_design_features:
      name: Zugänglichkeits-Designmerkmale
      description: Listet spezielle Designelemente auf, die Benutzern mit Hör-, Seh-
        oder Geschicklichkeitsproblemen helfen
    accessory_material:
      name: Zubehörmaterial
      description: Spezifiziert die Art des Materials im Zubehör, typischerweise für
        Versandbedarf, d. h. Kunststoff, Karton
    accessory_size:
      name: Zubehörgröße
      description: Gibt die Größe eines Zubehörprodukts an, z. B. Einheitsgröße oder
        kompakt
    accordion_tuning:
      name: Akkordeon-Stimmung
      description: Gibt die Art der Stimmung eines Akkordeons an, z. B. trockene Stimmung
        oder Kammerstimmung.
    activation_mechanism:
      name: Aktivierungsmechanismus
      description: Gibt die primäre Methode an, die den Alarm auslöst.
    activation_method:
      name: Aktivierungsmethode
      description: Beschreibt, wie das Prepaid-Guthaben bzw. die SIM vom Benutzer
        aktiviert wird.
    active_ingredient:
      name: Wirkstoff
      description: Gibt die Hauptinhaltsstoffe von Körperpflegeprodukten an, z. B.
        Vitamin A, Retinol
    activewear_clothing_features:
      name: Eigenschaften von Activewear-Kleidung
      description: Identifiziert einzigartige Merkmale von Sportbekleidung, wie Vier-Wege-Stretch
        oder atmungsaktives Design
    activity:
      name: Aktivität
      description: Gibt die Sportart oder Aktivität an, für die das Produkt vorgesehen
        ist, z. B. Tennis oder Pilates
    activity_tracker_design:
      name: Design des Aktivitäts-Trackers
      description: Gibt an, wie der Aktivitätstracker getragen wird, z. B. zum Anklipsen,
        Armband
    acupuncture_model_format:
      name: Format des Akupunkturmodells
      description: Gibt die Größe und den Maßstab von Akupunkturmodellen an, z. B.
        lebensgroß, Miniatur
    acupuncture_model_type:
      name: Typ des Akupunkturmodells
      description: 'Gibt den Körperteil oder die Art an, die das Akupunkturmodell
        darstellt, z. B. Kopf, Hand, Tier '
    adapter_directionality:
      name: Richtungsart des Adapters
      description: Gibt an, ob der Adapter den Signalfluss in beide Richtungen oder
        nur in eine festgelegte Richtung unterstützt
    adapter_operating_modes:
      name: Betriebsmodi des Adapters
      description: Gibt an, ob der Adapter als Bluetooth-Empfänger, -Sender oder beides
        fungiert.
    adaptive_sync_technology:
      name: Adaptive Synchronisationstechnologie
      description: Gibt die vom Monitor unterstützte Technologie mit variabler Bildwiederholrate
        (VRR) für rissfreie Bilder an.
    adc_resolution:
      name: ADC-Auflösung
      description: Gibt die Auflösung (in Bit) des integrierten Analog-Digital-Wandlers
        an und definiert die Messgenauigkeit.
    additional_animation_software_features:
      name: Zusätzliche Funktionen der Animationssoftware
      description: Spezifiziert einzigartige Funktionen in Animationsbearbeitungssoftware,
        wie z. B. Charakteranimation oder visuelle Effekte
    additional_cleaning_technology:
      name: Zusätzliche Reinigungstechnologie
      description: Listet alle Reinigungstechnologien auf, die neben Dampf enthalten
        sind (z. B. Ultraschall, UV, Ozon).
    additional_design_software_type:
      name: Zusätzlicher Design-Softwaretyp
      description: Spezifiziert zusätzliche Funktionen der Design-Software, wie z.
        B. virtuelle Touren oder Landschaftsdesign.
    additional_financial_software_features:
      name: Zusätzliche Funktionen der Finanzsoftware
      description: Identifiziert zusätzliche Funktionen von Finanzsoftware, wie Vermögensverwaltung,
        Rechnungsprüfung und Compliance
    additional_graphic_software_features:
      name: Zusätzliche Funktionen der Grafiksoftware
      description: Hebt zusätzliche Funktionen von Grafiksoftware hervor, wie digitale
        Illustration oder Layoutgestaltung
    additional_publishing_software_features:
      name: Zusätzliche Funktionen der Publishing-Software
      description: Hebt zusätzliche Funktionen in der Verlagssoftware hervor, z. B.
        Druckdesign oder digitales Publishing
    additional_security_software_features:
      name: Zusätzliche Funktionen der Sicherheitssoftware
      description: Identifiziert zusätzliche Funktionen von Sicherheitssoftware, z.
        B. Festplattenverschlüsselung, Angriffserkennung
    adhesive_application_type:
      name: Anwendungstyp für Kleiber
      description: Definiert den beabsichtigten Wimpernservice oder Anwendungsfall
        für den Kleber.
    adhesive_features:
      name: Klebemerkmale
      description: Hebt spezielle Eigenschaften des Klebers hervor, der auf Pflastern
        oder Klebeband verwendet wird.
    adhesive_format:
      name: Form des Klebstoffs
      description: Gibt die physische Form an, in der der Klebstoff für Reparaturzwecke
        geliefert wird
    adhesive_strength:
      name: Klebkraft
      description: Gibt die Stärke der Haft- oder Hebekraft für den Kleber des Nasenstreifens
        an (z. B. original, extra stark)
    adhesive_type:
      name: Klebstofftyp
      description: Identifiziert die Art des Klebstoffs, der in einem Produkt verwendet
        wird, z. B. entfernbar oder permanent
    aftershave_product_form:
      name: Aftershave Produktform
      description: Kennzeichnet die Konsistenz eines Aftershave-Produkts wie Balsam
        oder Creme
    age_group:
      name: Altersgruppe
      description: Gibt die Zielgruppe für ein Produkt an, z. B. Erwachsene oder Kinder
    age_restrictions:
      name: Altersbeschränkungen
      description: Gibt das Mindestalter für ein Produkt oder eine Veranstaltung an,
        z. B. 18 Jahre oder älter
    ai_application:
      name: KI-Anwendung
      description: Gibt die Funktion von KI in Software an, wie etwa Predictive Analytics
        oder Spracherkennung
    air_freshener_form:
      name: Form des Lufterfrischers
      description: Definiert die Art der Auto-Lufterfrischer, z. B. Öl, Lüftungsclip
    air_fryer_functions:
      name: Funktionen der Heißluftfritteuse
      description: Listet die verschiedenen Kochmodi auf, die bei einer Heißluftfritteuse
        oder einem ähnlichen Gerät verfügbar sind, z. B. Heißluftfrittieren, Backen
    air_mattress_features:
      name: Eigenschaften der Luftmatratze
      description: Beschreibt einzigartige Eigenschaften einer Luftmatratze, wie z.
        B. einfaches Aufblasen oder Durchstoßfestigkeit
    air_tube_configuration:
      name: Luftschlauchanordnung
      description: Gibt die Anzahl oder den Stil der in die Manschette integrierten
        Luftschläuche an
    airbrush_feed_type:
      name: Airbrush-Zufuhrtyp
      description: Identifiziert die Methode der Farbzufuhr in Airbrushpistolen, wie
        Schwerkraft oder Siphon
    airbrush_operation_method:
      name: Funktionsweise der Airbrush
      description: Gibt die Funktionsweise von Airbrushes an, z. B. Double-Action
        oder Single-Action
    aircraft_engine_configuration:
      name: Konfiguration des Flugzeugtriebwerks
      description: Gibt die Anzahl der Triebwerke an, die das Luftfahrzeug antreiben,
        z. B. Einzel- oder Doppeltriebwerke
    aircraft_engine_type:
      name: Motortyp des Luftfahrzeugs
      description: Gibt den Motortyp an, der das Luftfahrzeug antreibt, z. B. Jet
        oder Turboprop
    airflow_opening_design:
      name: Design der Luftstromöffnung
      description: Beschreibt die Atem- oder Belüftungskonfiguration, die in das Mundstück
        eingebaut ist
    airsoft_equipment_included:
      name: Airsoft-Ausrüstung inklusive
      description: Gibt zusätzliche Ausrüstung an, die mit Airsoft-Produkten geliefert
        wird, wie z. B. Schutzbrillen oder taktische Westen
    album_type:
      name: Albumtyp
      description: Beschreibt die Bindungsart von Scrapbooking- oder Stempelsets,
        z. B. Spiralbindung, Scrapbook
    alcohol/solvent_content:
      name: Alkohol-/Lösungsmittelgehalt
      description: Klassifiziert das Produkt anhand des Alkohol- oder Lösungsmittelgehalts
        für Versand- und regulatorische Zwecke (z. B. Alkohol ≤24 %, Alkohol >24 %,
        Lösungsmittel – kleiner Behälter)
    alcohol_content:
      name: Alkoholgehalt
      description: Zeigt an, ob das Tonic alkoholfrei ist oder, falls vorhanden, wie
        viel Alkohol die Formel ungefähr enthält
    alert_type:
      name: Alarmtyp
      description: Gibt die Art der vom Produkt erzeugten Alarmtypen an, z. B. akustische
        oder Smartphone-Benachrichtigungen
    allergen_information:
      name: Informationen zu Allergenen
      description: Weist auf mögliche Allergene in Nahrungsmitteln oder Getränken
        hin, wie Weizen oder Erdnüsse
    allergen_test_type:
      name: Allergentesttyp
      description: Gibt den Allergentyp an, den das Testkit erkennen soll, z. B. Essen
        oder Umwelt
    allergens:
      name: Allergene
      description: Weist auf mögliche Allergene in Gesundheits- und Schönheitsprodukten
        hin, z. B. Linalool oder Limonin
    allergy_friendly_features:
      name: Allergikerfreundliche Funktionen
      description: Gibt an, ob ein Produkt allergiefreundliche Eigenschaften hat,
        wie etwa latexfrei oder schimmelresistent
    amino_acid_subtype:
      name: Aminosäure-Untertyp
      description: Gibt den primären Typ oder das Profil der im Nahrungsergänzungsmittel
        enthaltenen Aminosäuren an.
    amplifier/booster_suitable_location:
      name: Geeigneter Standort für Verstärker/Booster
      description: Gibt die besten Standorte für Verstärker oder Signalverstärker
        an, z. B. Fahrzeug oder großer Veranstaltungsort
    amplifier_class:
      name: Verstärkerklasse
      description: Gibt den Verstärkertyp, z. B. AB oder D
    amplifier_configuration:
      name: Verstärkerkonfiguration
      description: Gibt den Aufbau von Kfz-Verstärkern an, z. B. Zweikanal oder Vierkanal
    amputation_level:
      name: Amputationsniveau
      description: Bezeichnet das Amputationsniveau, für das der Stumpfkompressionsstrumpf
        konzipiert ist
    analyte_measured:
      name: Gemessener Analyt
      description: Identifiziert die Biomarker, für die die Kontrolllösung eine Kalibrierung
        bereitstellt
    anamorphic_squeeze_ratio:
      name: Anamorphes Komprimierungsverhältnis
      description: Gibt den horizontalen Kompressionsfaktor eines anamorphotischen
        Objektivs an und ermöglicht es Benutzern, Objektive mit der gewünschten Entkomprimierungsausgabe
        abzugleichen
    anatomical_detail_displayed:
      name: Dargestelltes anatomisches Detail
      description: Gibt an, welche anatomischen oder Meridianmerkmale am Modell hervorgehoben
        sind
    anchor_type:
      name: Ankerart
      description: Gibt bei seilgebundenen Wassersportgeräten die Art des Ankers an,
        z. B. Flachanker oder Pflug
    anemometer_application:
      name: Anwendung des Anemometers
      description: Identifiziert den Verwendungszweck eines Anemometers, z. B. industriell
        oder meteorologisch
    angles_supported:
      name: Unterstützte Winkel
      description: Gibt den Winkelbereich bei Produkten an, z. B. einstellbar oder
        0° bis 180° bei Elektronik
    angling_style:
      name: Angelstil
      description: Gibt die Angeltechnik an, für die das Produkt entwickelt wurde,
        z. B. Surf Casting oder Fliegenfischen
    animal_feed_form:
      name: Form des Tierfutters
      description: Gibt die Form des Tierfutters an, z. B. flüssig oder als Granulat
    animal_type:
      name: Tierart
      description: Gibt die Tierart an, für die ein Produkt bestimmt ist, z. B. Enten,
        Rotwild oder Hunde
    answering_machine_type:
      name: Anrufbeantwortertyp
      description: Gibt das Vorhandensein und die Technologie eines integrierten Anrufbeantworters
        an
    antenna_connector_type:
      name: Antennenanschlusstyp
      description: Gibt den HF-Anschluss an, der zum Anschließen externer Antennen
        verwendet wird
    antenna_rf_connector_type:
      name: Antennen-HF-Steckertyp
      description: Identifiziert den HF-Stecker, der von der Antenne verwendet wird.
    antenna_type:
      name: Antennentyp
      description: Gibt den Antennentyp für elektronische Geräte an, z. B. omnidirektional,
        Gitter
    anti_agin_skin_care_type:
      name: Anti-Aging-Hautpflegetyp
      description: Klassifiziert die Art der Anti-Aging-Hautpflegeartikel, z. B. Maske
        oder Toner
    anti_perspirant_strength_level:
      name: Antitranspirant-Stärkegrad
      description: Bezeichnet die Wirksamkeitsklassifizierung des Antitranspirants
        (z. B. klinische Stärke, Sportstärke)
    antibody_class_tested:
      name: Getestete Antikörperklasse
      description: Gibt das Immunglobulin oder den Biomarker an, den das Kit nachweist
        (z. B. IgE, IgG4).
    antifreeze_type:
      name: Frostschutzmitteltyp
      description: Gibt die Art des Frostschutzmittels für die Fahrzeugpflege an,
        z. B. Konzentrat, vorverdünnt
    antique_car_design:
      name: Oldtimer-Design
      description: Beschreibt den primären Designstil eines antiken Autos, wie T-Bucket
        oder Grand Tourer
    antique_vehicle_era:
      name: Klassifizierung nach Baujahr
      description: Beschreibt die historische Periode eines Oldtimer, z. B. Ancestor
        oder Vintage
    appliance_board_function:
      name: Geräteplatinen-Funktion
      description: Gibt die funktionale Rolle der Platine innerhalb des Geräts an.
    appliance_unit_location:
      name: Geräteeinheit-Standort
      description: Gibt den physischen Bereich des Geräts an, für den die Platine
        vorgesehen ist (z. B. Innen- oder Außeneinheit).
    application_area:
      name: Anwendungsbereich
      description: Gibt den Körperteil oder -bereich an, wo das Produkt aufgetragen
        wird, z. B. Lippen, Ganzkörper
    application_method:
      name: Anwendungsmethode
      description: Gibt an, wie ein Produkt angewendet wird, z. B. Gel, flüssig, Spray
    application_type:
      name: Anwendungsart
      description: Gibt an, ob die Behandlung einwirken oder ausgespült werden muss,
        sowie jeden speziellen Verwendungsmodus.
    applicator_format:
      name: Format des Applikators
      description: Beschreibt die Bauform bzw. Ausführung des Applikators für Lotion
        oder Sonnenschutzmittel.
    applicator_material:
      name: Material des Applikators
      description: Gibt das Material an, aus dem der Applikator besteht, z. B. Kunststoff,
        Karton bei Tampons
    applicator_type:
      name: Applikatortyp
      description: Identifiziert die Art des Applikators, der den Tampons beiliegt,
        z. B. Applikator oder Nicht-Applikator
    applique/patch_shape:
      name: Form der Applikation/des Patchs
      description: Beschreibt die Form von Applikationen oder Patches, z.B. Tiermotiv
        oder geometrische
    applique_shape:
      name: Form der Applikation
      description: Beschreibt die Form von Applikationselementen, wie Blumen- oder
        Tiermotiven
    aquarium_filter_features:
      name: Funktionen des Aquariumfilters
      description: Beschreibt Besonderheiten von Aquarienfiltern, z. B. schneller
        Kartuschenwechsel, mehrstufige Filterung
    aquarium_light_spectrum:
      name: Lichtspektrum des Aquariums
      description: Gibt die Art des Lichtspektrums für die Aquariumbeleuchtung an,
        z. B. blau, Tageslicht
    aquarium_overflow_box_design:
      name: Design des Aquarium-Überlaufkastens
      description: Beschreibt die Art des Setups eines Aquarienüberlaufkastens, z.
        B. extern oder zum Aufhängen
    archery_activity:
      name: Bogenschießen
      description: Gibt die Art der Bogenschießaktivität an, z. B. Jagd im Freien,
        Zielübungen
    archery_equipment_included:
      name: Bogenschießausrüstung inklusive
      description: Gibt das mitgelieferte Bogensportzubehör an, z. B. Stabilisatorhalterung,
        Sicherheitsglaspfeile
    archery_style:
      name: Bogenschießen-Stil
      description: Gibt die Art des Bogenschießens an, für die das Produkt entwickelt
        wurde, z. B. 3D-Bogenschießen, Bogenjagd
    archery_target_type:
      name: Typen von Zielscheiben für Bogenschießen
      description: Gibt den Typ der Zielscheiben für Bogenschießen an, der für verschiedene
        Schießübungen entwickelt wurde, z. B. 3D-Ziel, Bag-Ziel
    aromatherapy:
      name: Aromatherapie
      description: Gibt den verwendeten Duftstoff oder das ätherische Öl an, z. B.
        Eukalyptus, Lavendel
    arrangement:
      name: Arrangement
      description: Gibt an, wie Blumen arrangiert oder präsentiert werden, z. B. Vase,
        Korb
    arrow/bolt_material:
      name: Pfeil-/Bolzenmaterial
      description: Identifiziert das Konstruktionsmaterial von Pfeilen oder Bolzen,
        wie Aluminium oder Bambus
    arrow_fletching_material:
      name: Pfeilbefiederungsmaterial
      description: Identifiziert das in der Pfeilbefiederung verwendete Material,
        z. B. Kunststoff oder Plastik
    arrow_material:
      name: Pfeilmaterial
      description: Identifiziert die Zusammensetzung von Pfeilen, wie Bambus oder
        Fiberglas
    art/crafting_tool_material:
      name: Kunst-/Bastelwerkzeugmaterial
      description: Identifiziert das Hauptmaterial von Kunst- oder Bastelwerkzeugen,
        wie Holz oder Metall
    art_fixative_application_method:
      name: Aufbringungsmethode des Fixativs
      description: Beschreibt, wie ein Kunstfixiermittel aufgetragen wird, z. B. als
        Aerosol oder mit Pinsel
    art_movement:
      name: Kunststil
      description: Definiert den stilistischen Ansatz oder den Kunststil eines Gemäldes,
        z. B. Impressionismus, Expressionismus
    art_style:
      name: Kunststil
      description: Beschreibt den ästhetischen Stil eines Produkts, wie etwa Jugendstil
        oder Typografie
    artwork_authenticity:
      name: Authentizität des Kunstwerks
      description: Gibt die Authentizität des Kunstwerks an, d. h., ob es sich um
        eine Originalkreation oder eine Reproduktion handelt
    artwork_frame_material:
      name: Rahmenmaterial
      description: Identifiziert das Material, das in Kunstrahmen verwendet wird,
        wie Holz oder vergoldet
    artwork_type:
      name: Kunstwerktyp
      description: Gibt den Stil digitaler Kunstwerke an, beispielsweise Typografie
        oder digitale Malerei
    assisted_braking_technology:
      name: Bremskraftverstärker
      description: Gibt die Art der Bremsunterstützung in Sicherungsgeräten an, z.
        B. aktiv oder passiv
    attachment_method:
      name: Befestigungsmethode
      description: Gibt an, wie das Produkt befestigt oder fixiert wird, z. B. Klettverschluss,
        zum Anklipsen
    attachment_options:
      name: Befestigungsoptionen
      description: Gibt die Methoden zur Befestigung oder Sicherung eines Produkts
        an, z. B. Halteband
    attachment_type:
      name: Befestigungstyp
      description: Gibt die Methode der Produktbefestigung oder -verbindung an, z. B.
        Schnappbefestigung oder Klettverschluss
    atv/off_road_tire_type:
      name: Quad-/Offroad-Reifentyp
      description: Kennzeichnet den spezifischen Einsatz von ATV- oder Geländereifen,
        wie Sand oder Schlamm
    audio/scan_converter_features:
      name: Funktionen des Audio/Scan-Konverters
      description: Beschreibt die Fähigkeiten eines Audio-/Scan-Konverters, wie automatische
        Konvertierung oder Fernsteuerung
    audio/video_cable_connector_type_end_a:
      name: Audio-/Video-Kabelsteckertyp (Ende A)
      description: Gibt den genauen Stecker oder die Schnittstelle am ersten Ende
        (Ende A) des Kabels an
    audio/video_cable_connector_type_end_b:
      name: Audio-/Video-Kabelsteckertyp (Ende B)
      description: Gibt den genauen Stecker oder die Schnittstelle am zweiten Ende
        (Ende B) des Kabels an
    audio_bypass_type:
      name: Steuerungsschnittstelle
      description: Gibt an, wie das Audiosignal im Bypass geführt wird (z. B. True
        Bypass, gepuffert, Relais).
    audio_cassette_tape_type:
      name: Audiokassetten-Bandtyp
      description: Gibt die IEC-Bandformulierung (Bias) für Audiokassetten an.
    audio_codecs/formats_supported:
      name: Unterstützte Audio-Codecs/Formate
      description: Gibt die Audiodateitypen an, die ein Produkt abspielen kann, z. B.
        WAVE oder MP3
    audio_component_form_factor:
      name: Audiokomponenten-Formfaktor
      description: Definiert den physischen Stil oder das Installationsformat der
        Komponente
    audio_connectivity:
      name: Audio-Konnektivität
      description: Gibt die vom Produkt unterstützten Audio-Anschlusstypen an, z. B.
