    wheel_hardness:
      name: Radhärte
      description: Gibt den Härtegrad von Skateboard-Rollen an, z. B. 75A
    wheel_hub_placement:
      name: Radnabenplatzierung
      description: Gibt die Position der Radnabe bei Skateboards an, z. B. Centerset
