    corn_syrup_variety:
      name: Majssirapsort
      description: Anger sirapens specifika stil eller variant .
    corn_variety:
      name: Majssort
      description: Identifierar den specifika botaniska eller marknadsförda majssorten
        som säljs, vilket gör det möjligt för kunden att skilja mellan typer som skiljer
        sig åt i Taste, konsistens, färg och kulinarisk användning.
    corner_compatibility:
      name: Hörnkompatibel
      description: Anger bordsändarnas hörnform (rund eller fyrkantig) som skyddet
        är utformat för.
    corner_flag_features:
      name: Funktioner för hörnflaggan
      description: Framhäver speciella funktionella egenskaper eller förbättringar
        av hörnflaggan (t.ex. hopfällbar stång, reflexmaterial).
    cornet_mouthpiece_shank_type:
      name: Kornettmunstyckesskafttyp
      description: Anger den standard för munstyckesmottagare/skaft som stöds av kornetten
