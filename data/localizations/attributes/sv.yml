        elastiska kanter.
    crib_bumper_features:
      name: Funktioner på spjälsängsstötfångaren
      description: Framhäver spjälsängens särskilda funktioner.
    crib_conversion_kit_components:
      name: Konverteringskit för spjälsängar
      description: Listar de viktigaste delarna som ingår i kit så att kunden kan
        kontrollera att de har allt som krävs för installationen.
