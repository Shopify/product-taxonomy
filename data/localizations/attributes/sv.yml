    intended_repair_location:
      name: Avsedd reparationsplats
      description: Var på däcket satsen är avsedd att reparera.
    intended_seating_position:
      name: Avsedd sittposition
      description: Anger den fordonssätesposition som säkerhetsbältet är avsett att
