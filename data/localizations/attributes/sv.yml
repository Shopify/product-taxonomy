        utomhusasfalt/betong eller båda.
    cover_fit_style:
      name: Skyddets passformsstil
      description: Beskriver hur skyddet passar över bordet, vilket påverkar utseende
        och skyddsnivå.
    cover_fit_type:
      name: Typ av överdrag
      description: Anger om skyddet är skräddarsytt (specialtillverkat/halvspecialtillverkat)
        eller universellt, och om det är avsett för förtöjning i vattnet eller förvaring/släpvagnsanvändning.
    cowbell_beater_type:
      name: Typ av koklocka
      description: Rekommenderad slagredskapstyp för ljud/finish av koklocka (om specificerat
        av produkten).
    cowbell_mounting_method:
      name: Koskälla fästmetod
      description: Hur koklockan är avsedd att monteras/användas (handhållen vs monterad
        på utrustning).
    cowbell_sound_character:
      name: Koskälla ljudkaraktär
      description: Allmänt tontecken som används i listning (stödjer upptäckt utöver
        storlek).
    cradle_capacity:
      name: Vaggans kapacitet
      description: Anger om vaggan är avsedd för att hålla ett enskilt spädbarn eller
        tvillingar.
    craft_cutter_embosser_machine_operation:
      name: Drift av Craft /präglingsmaskin
      description: Anger hur skäraren/präglaren fungerar ur ett användarens arbetsflödesperspektiv
        (t.ex. manuell vev, elektrisk tryckknapp, app-styrd).
    craft_decoration_maker_accessories_included:
      name: Tillbehör Maker Craft ingår
      description: Listar viktiga tillbehör som ingår i Craft Decoration Maker (t.ex.
        Shopify Starter tejp/film, refill för klistermärken, glitterpatroner, rengöringsverktyg).
    craft_foil_application_method:
      name: Craft -appmetod
      description: Identifierar hur Craft är avsedd att appliceras/aktiveras (vidhäftande,
        värme, toner/reaktiv, etc.).
    craft_foil_format:
      name: Craft
      description: Anger det fysiska formatet för Craft som den såldes (t.ex. rulle
        eller ark).
    craft_glue_finish:
      name: Hobbylim – ytfinish
      description: Beskriver limmets utseende efter torkning (t.ex. genomskinligt,
        vit/opakt, genomskinligt, blankt/matt).
    craft_magnet_application:
      name: App Craft magneter
      description: Primärt avsedd användning Craft - låda eller monteringsyta för
        magnetprodukten.
    craft_magnet_holding_strength_level:
      name: Hållstyrka för Craft
      description: Relativ styrkekategori för Craft för att hjälpa kunder att välja
        lämplig hållkraft för sitt projekt.
    craft_organizer_storage_features:
      name: Hobbyförvaring – förvaringsfunktioner
      description: Beskriver organisationsfunktioner och interna förvaringselement
        i Craft (t.ex. justerbara avdelare, lådor, genomskinliga fickor).
    craft_scoring_board_included_accessories:
      name: Ingående tillbehör till hobbyresultavla
      description: Tillbehör medföljer poängtavlan (t.ex. poängpenna/benvikare, triangel,
