    corrosion_resistance_level:
      name: Korrosionsbeständighetsnivå
      description: Indikerar korrosionsskydd lämpligt för sötvatten-/saltvattenmiljöer.
    costume_components_included:
      name: Kostymkomponenter ingår
      description: Listar de plagg och accessoarer som ingår i dräkten och förtydligar
