    cooling_system_type:
      name: Typ av kylsystem
      description: Anger kylsystemkonfigurationen som används av en inombordsmarinmotor
        (t.ex. råvatten/öppen slinga, sluten slinga/sötvatten med värmeväxlare, kölkyld).
    cord_material:
      name: Kabelmaterial
      description: Anger materialet i snöret/strängen som används för att dra pinnen
        genom saxofonen.
    core_type_bass_strings:
      name: Kärntyp (bassträng)
      description: Anger strängens form , vilket påverkar känslan och flexibiliteten.
    cork_grease_base_material:
      name: Basmaterial för korkfett
      description: Primär bas för korkfettformuleringen (t.ex. lanolinbaserad).
    cork_grease_form:
      name: Korkfettform
      description: Korkfettproduktens fysiska formfaktor.
    corn_presentation:
      name: Majs – utförande
      description: Anger majsproduktens fysiska presentation eller form (t.ex. hel
