    item_material:
      name: Artikel - material
      description: Anger den primära substansen i en artikel, vanligtvis för fordonsdelar
        och tillbehör; ex koppar, glasfiber
    item_style:
      name: Artikelstil
      description: Beskriver det estetiska eller designmässiga temat för en produkt,
        till exempel modern eller rustik
    j_cup_type:
      name: Typ J-kopp
      description: Anger stilen på J-krokar på tyngdlyftningsutrustning, t.ex. plan,
        sandwich
    jaw_advancement_adjustability:
      name: Käkframskjutningsjustering
      description: Indikerar om och hur underkäkspositionen som tillhandahålls av
        enheten kan justeras av användaren.
    jaw_material:
      name: Käkmaterial
      description: Identifierar materialet som används i ett verktygs käft, som stål
        eller titan
    jewelry_cleaning_accessories_included:
      name: Inkluderade smyckesrengöringstillbehör
      description: Listar eventuella extra verktyg eller tillbehör som levereras med
        rengöringsmedlet (t.ex. borstar, brickor, polerdukar).
    jewelry_cleaning_purpose:
      name: Smyckesrengöringssyfte
      description: Anger produktens primära avsedda funktion (t.ex. borttagning av
        anlöpning, polering, skyddande beläggning).
    jewelry_finding_type:
      name: Typ av smyckesdelar
      description: Identifierar den specifika komponenten som används vid smyckestillverkning,
        till exempel en pärlhållare eller en ringögla
    jewelry_material:
      name: Smycken - material
      description: Identifierar det huvudsakliga materialet som används i smycken,
        som guld eller emalj
    jewelry_project_type:
      name: Typ av smyckeprojekt
      description: Anger typen av smyckesprojekt, till exempel halsbandstillverkning
        eller trådarbete
    jewelry_set_type:
      name: Typ av smyckesset
      description: Identifierar typen av smycke i ett smyckestillverkningsset, till
        exempel ring eller halsband
    jewelry_steam_cleaner_features:
      name: Smyckesångrengörarens funktioner
      description: Listar anmärkningsvärda inbyggda funktioner eller säkerhetsfunktioner
        som skiljer modeller åt.
    jewelry_type:
      name: Typ av smycke
      description: Skiljer på olika typer av smycken, till exempel äkta eller imiterade
        smycken
    joint_connection:
      name: Ledanslutning
      description: Anger ledkopplingen i biljardköer, t.ex. komposit, ingen led
    joint_face_type:
      name: Ledtyp fram
      description: Anger typen av ledyta på biljardskaft, till exempel hel eller styrd
    joint_style:
      name: Ledstil
      description: Definierar typen av fog som används i biljardköer, till exempel
        uni-loc eller radiell
    journey_type:
      name: Typ av resa
      description: Anger typen av resa som biljetten omfattar baserat på antal resor
        och färdriktning.
    joystick_mounting_style:
      name: Joystickens monteringsstil
      description: Indikerar hur joystickenheten säkras till en kontrollpanel eller
        skåp.
    joystick_sensor_technology:
      name: Joystickens sensorteknologi
      description: Identifierar den primära avkänningstekniken som används för att
        detektera rörelse eller position.
    jump_rope_design:
      name: Design på hopprep
      description: Beskriver typen av hopprep, till exempel vanligt eller smart
    jumping_surface_color:
      name: Färg på hoppyta
      description: Identifierar färgen på studsmattans hoppyta, till exempel blå eller
        svart
    jumping_surface_material:
      name: Material för hoppyta
      description: Anger tyget på studsmattans hoppområde, t.ex. syntet, polypropen
    jumping_surface_pattern:
      name: Mönster på hoppyta
      description: Identifierar designen eller trycket på en studsmattas hoppyta,
        till exempel stjärnor eller ränder
    karaoke_modes:
      name: Karaokelägen
      description: Anger typen av karaokeframträdande, till exempel singel eller duett
    kerosene_application:
      name: Applicering av fotogen
      description: Identifierar den specifika användningen av fotogen, till exempel
        för värmare eller flygbränsle
    key_purpose:
      name: Nyckelsyfte
      description: Anger var en nyckel eller nyckelämne är avsedd att användas, t.ex.
        dörr, hänglås
    keyboard_action:
