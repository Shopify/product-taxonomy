    crossbow_type:
      name: Armborsttyp
      description: Identifierar den grundläggande designstilen för armborst, såsom
        compound, recurve eller pistol. Byggstil driver prestanda, storlek och använd
        låda, så kund filtrerar ofta efter det.
    crossover_component_type:
      name: Delningsfilterkomponenttyp
      description: Identifierar den primära komponenttopologin som används i det passiva
        delningsfiltret.
    crossover_configuration:
      name: Crossover-konfiguration
      description: Anger om delningsfiltret använder en enda delningspunkt eller flera
        punkter (t.ex. 2-vägs eller 3-vägsdesign).
    crossover_type:
      name: Delningsfiltertyp
      description: Typ av delningsfilter nätverk ingår i komponentsatsen.
    crown_profile:
      name: Kronprofil
      description: Anger höjden/profilen på kepskronan ovanför brättet.
    crown_style:
      name: Kronstil
      description: Definierar den övergripande silhuetten eller profilen av kronan
        på en bowlerhatt.
    crust_taste_profile:
      name: Skorpa Taste
      description: Anger om skorpans inneboende smakorientering är söt, salt eller
        neutral.
    crystal_finish:
      name: Kristallfinish
      description: Beskriver ytfinish, beläggning eller bearbetningstillstånd för
        den lösa kristallen (t.ex. rå, polerad, trumlad, fasettslipad, frostad, aurabelagd,
        färgad, värmebehandlad).
    crystal_material:
      name: Kristallmaterial
      description: Anger materialet som används till urglaset som skyddar urtavlan.
    crystalline_finish_style:
      name: Kristallin finishstil
      description: Det karakteristiska kristallina/fjäderliknande utseendet som palmvaxet
        i färdiga ljus producerar.
    cucumber_variety:
      name: Gurkasort
      description: Anger gurkans kultivar eller marknadssort (t.ex. engelsk, persisk,
        kirby).
    cue_compatibility:
      name: Kökompatibel
      description: Indikerar den kökopplingskonfiguration som lådan är utformad för
        att hantera, till exempel endelade eller 3/4-ledade köer.
    cue_construction:
      name: Kökonstruktion
      description: Anger hur kön är konstruerad – antal delar eller om den är en delkomponent,
