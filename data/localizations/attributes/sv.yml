    cross_stitch_frame_type:
      name: ram
      description: Anger konstruktionen/typen av ram (hur tyget hålls), vilket påverkar
        användbarhet och projektkompatibilitet.
    cross_stitch_pattern_technique:
      name: teknik för korsstygnsmönster
      description: Den korsstygnsteknik/stil som krävs av diagrammet.
    crossbar_shape_profile:
      name: Tvärstång – form/profil
      description: Anger tvärstångens aerodynamik/formprofil.
    crossbar_style:
      name: Typ av tvärstång
      description: Identifierar tvärstångens konstruktionsstil och skiljer styva tävlingsstänger
