        bearbetningsstil eller avsedd kulinarisk användning (t.ex. halv & halv, dubbelgrädde,
        matlagningsgrädde).
    crib_accessory_features:
      name: Detaljer för spjälsängstillbehör
      description: Listar funktionella eller komfortinriktade funktioner specifika
