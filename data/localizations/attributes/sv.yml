---
sv:
  attributes:
    3d_glasses_fit_design:
      name: 3D-glasögonpassningsdesign
      description: Indikerar hur glasögonen bärs eller fästs (t.ex. clip-on, omslutande,
        passa över)
    3d_glasses_material:
      name: 3D-glasögon - material
      description: Anger materialet som används för 3D-glasögon som bambu eller rostfritt
        stål
    3d_glasses_technology:
      name: 3D-glasögonteknik
      description: Anger 3D-bilds-/synkroniseringstekniken som glasögonen är designade
        för, vilket bestämmer kompatibilitet med specifika displayer eller projektorer
    3d_printer_case_style:
      name: Fodralstil för 3D-skrivare
      description: Klassificerar den övergripande produkttypen så att köpare kan skilja
        mellan mjuka bärväskor, hårdskalsväskor, stationära höljen och enkla dammskydd
    3d_printer_cleaning_kit_components_included:
      name: Komponenter i rengöringskit för 3D-skrivare
      description: Listar de individuella verktygen och förbrukningsmaterialen som
        ingår i kitet så att köpare vet exakt vad de köper
    3d_printing_resin_type:
      name: 3D-utskriftshartstyp
      description: Anger formulering eller avsedd användning av hartset, vilket hjälper
        köpare att snabbt identifiera om hartset är standard, tekniskt kvalificerat,
        gjutbart eller andra specialiserade typer
    80_plus_efficiency_rating:
      name: 80 Plus-effektivitetsklassning
      description: Betecknar den officiella 80 Plus energieffektivitetscertifieringsnivån
        som nätaggregatet har uppnått.
    abrasive_material:
      name: Slipande material
      description: Identifierar typen av slipmedel som används i slipverktyg som diamant
        eller kiselkarbid
    absinthe_style:
      name: Absintstil
      description: Definierar stilen på absint, t.ex. blandad, destillerad
    absinthe_variety:
      name: Absintsort
      description: Särskiljer absintprodukter baserat på deras unika varianter, t.ex.
        rouge, verte
    absorbency_level:
      name: Absorptionsnivå
      description: Anger absorptionsförmåga, vanligtvis för personvårdsartiklar; t.ex.
        över natten, ljus
    absorbent_hygiene_product_features:
      name: Detaljer för absorberande hygienprodukter
      description: Identifierar särskilda egenskaper hos hygienprodukter, t.ex. att
        de är läckagesäkra eller allergivänliga
    academic_level:
      name: Akademisk nivå
      description: Anger den akademiska nivån på mediainnehåll, till exempel grundutbildning
        eller doktorsexamen
    accessibility_design_features:
      name: Funktioner för tillgänglighetsdesign
      description: Listar speciella designelement som hjälper användare med hörsel-,
        syn- eller fingerfärdighetsproblem.
    accessory_material:
      name: Tillbehör - material
      description: Anger typ av material i tillbehör, vanligtvis för fraktmaterial,
        t.ex. plast, kartong
    accessory_size:
      name: Tillbehörsstorlek
      description: Definierar storleken på en accessoar, till exempel en storlek eller
        kompakt
    accordion_tuning:
      name: Stämning av dragspel
      description: Anger vilken typ av stämning som används i ett dragspel, till exempel
        torr- eller konsertton
    activation_mechanism:
      name: Aktiveringsmekanism
      description: Anger den primära metoden som utlöser larmet.
    activation_method:
      name: Aktiveringsmetod
      description: Beskriver hur den förbetalda krediten eller SIM-kortet aktiveras
        av användaren.
    active_ingredient:
      name: Aktiv ingrediens
      description: Identifierar primära ämnen i personlig vård, t.ex. vitamin A, retinol
    activewear_clothing_features:
      name: Detaljer för träningskläder
      description: Identifierar unika egenskaper hos aktiva kläder, såsom fyrvägsstretch
        eller andningsbar design
    activity:
      name: Aktivitet
      description: Anger den sport eller aktivitet som produkten är avsedd för, till
        exempel tennis eller pilates
    activity_tracker_design:
      name: Design på aktivitetsspårare
      description: Anger hur aktivitetsspåraren bärs, t.ex. clip on, armband
    acupuncture_model_format:
      name: Format på akupunkturmodell
      description: Definierar storleken och skalan på akupunkturmodeller, t.ex. naturlig
        storlek, miniatyr
    acupuncture_model_type:
      name: Typ av akupunkturmodell
      description: 'Specificerar kroppsdelen eller arten som akupunkturmodellen representerar,
        t.ex. huvud, hand, djur '
    adapter_directionality:
      name: Adapterriktning
      description: Anger om adaptern stöder signalflöde i båda riktningarna eller
        bara i en angiven riktning.
    adapter_operating_modes:
      name: Adapterdriftslägen
      description: Anger om adaptern fungerar som en Bluetooth-mottagare, sändare
        eller båda
    adaptive_sync_technology:
      name: Adaptiv synkroniseringsteknik
      description: Anger variabel uppdateringsfrekvensteknik (VRR) som stöds av monitorn
        för att undvika skärmrivningar (screen tearing).
    adc_resolution:
      name: ADC-upplösning
      description: Anger upplösningen (i bitar) för den integrerade analog-till-digital-omvandlaren,
        vilket definierar mätprecision
    additional_animation_software_features:
      name: Ytterligare detaljer för programvara för animering
      description: Specificerar unika funktioner i animationsredigeringsprogram, till
        exempel karaktärsanimering eller visuella effekter
    additional_cleaning_technology:
      name: Ytterligare rengöringsteknik
      description: Listar eventuella rengöringstekniker som ingår utöver ånga (t.ex.
        ultraljud, UV, ozon).
    additional_design_software_type:
      name: Typ av ytterligare programvara för design
      description: Specificerar ytterligare funktioner för designprogramvara, till
        exempel virtuell rundtur eller landskapsdesign
    additional_financial_software_features:
      name: Ytterligare detaljer för programvara för ekonomi
      description: Identifierar extra funktioner för finansiell programvara, till
        exempel tillgångsförvaltning eller revision och efterlevnad
    additional_graphic_software_features:
      name: Ytterligare detaljer för grafisk programvara
      description: Framhäver extra funktioner hos grafisk programvara, till exempel
        digital illustration eller layoutdesign
    additional_publishing_software_features:
      name: Ytterligare detaljer för programvara för publicering
      description: Framhäver extra funktioner i publiceringsmjukvara, till exempel
        tryckt design eller digital publicering
    additional_security_software_features:
      name: Ytterligare detaljer för programvara för säkerhet
      description: Identifierar extra kapacitet hos säkerhetsprogramvara, t.ex. diskkryptering,
        intrångsdetektering
    adhesive_application_type:
      name: Limmets användningstyp
      description: Definierar den avsedda fransbehandlingen eller användningsfallet
        för limmet.
    adhesive_features:
      name: Limegenskaper
      description: Framhäver speciella egenskaper hos det lim som används på plåster
        eller tejp.
    adhesive_format:
      name: Limformat
      description: Anger den fysiska form som limmet levereras i för reparationsändamål.
    adhesive_strength:
      name: Vidhäftningsstyrka
      description: Anger bindnings- eller lyftstyrkenivån för nässtrimlans lim (t.ex.
        original, extra stark).
    adhesive_type:
      name: Typ av lim
      description: Identifierar vilken typ av lim som används i en produkt, till exempel
        avtagbar eller permanent
    aftershave_product_form:
      name: Produktform för aftershave
      description: Identifierar konsistensen av en aftershaveprodukt, till exempel
        balsam eller kräm
    age_group:
      name: Åldersgrupp
      description: Definierar avsett åldersintervall för en produkt, till exempel
        vuxna eller barn
    age_restrictions:
      name: Åldersbegränsningar
      description: Anger krav på lägsta ålder för en produkt eller ett event, som
        18 år eller äldre
    ai_application:
      name: AI-applikation
      description: Anger AI:s funktion i programvaran, som förutsägande analys eller
        taligenkänning
    air_freshener_form:
      name: Form av luftfräschare
      description: Definierar typen av billuftfräschare, t.ex. olja, ventilklämma
    air_fryer_functions:
      name: Airfryerfunktioner
      description: Visar olika tillagningslägen som finns i en airfryer eller liknande
        apparat – t.ex. airfry, ugnsstekning
    air_mattress_features:
      name: Detaljer för luftmadrass
      description: Beskriver unika egenskaper hos en luftmadrass, som lätt att blåsa
        upp eller punkteringsresistent
    air_tube_configuration:
      name: Luftslangskonfiguration
      description: Anger antalet eller stilen av luftuppblåsningsslangar integrerade
        med manschetten.
    airbrush_feed_type:
      name: Typ av matning för airbrush
      description: Identifierar metoden för färgleverans i airbrush, t.ex. gravitation
        eller sifon
    airbrush_operation_method:
      name: Driftmetod airbrush
      description: Specificerar driftstilen för airbrush, till exempel dubbelverkande
        eller enkelverkande
    aircraft_engine_configuration:
      name: Konfiguration av flygplansmotorer
      description: Anger antalet motorer som driver flygplanet, t.ex. en eller två
        motorer
    aircraft_engine_type:
      name: Flygplanets motortyp
      description: Anger typen av motor som driver flygplanet, såsom jet eller turboprop
    airflow_opening_design:
      name: Luftflödesöppningsdesign
      description: Beskriver andnings- eller ventilationskonfigurationen som är inbyggd
        i munstycket.
    airsoft_equipment_included:
      name: Airsoft-utrustning som ingår
      description: Anger extra utrustning försedd med airsoftprodukter, såsom skyddsglasögon
        eller skyddsväst
    album_type:
      name: Albumtyp
      description: Beskriver bindningsstilen för scrapbooking eller stämplingskits,
        t.ex. spiralbunden, scrapbook
    alcohol/solvent_content:
      name: Alkohol-/lösningsmedelsinnehåll
      description: Klassificerar produkten baserat på alkohol- eller lösningsmedelsinnehåll
        för transport- och regleringsändamål (t.ex. alkohol ≤24 %, alkohol >24 %,
        lösningsmedelsbehållare i liten behållare)
    alcohol_content:
      name: Alkoholhalt
      description: Indikerar om tonern är alkoholfri eller, om den finns, ungefär
        hur mycket alkohol formeln innehåller.
    alert_type:
      name: Varningstyp
      description: Anger vilken typ av varning en produkt ger, till exempel ljudlarm
        eller smartphoneaviseringar
    allergen_information:
      name: Allergeninformation
      description: Anger allergener som kan finnas i mat eller dryck, till exempel
        vete eller jordnötter
    allergen_test_type:
      name: Allergentesttyp
      description: Anger den allergentyp som testsatsen är utformad för att upptäcka,
        till exempel mat eller miljö
    allergens:
      name: Allergener
      description: Indikerar potentiella allergener i hälso- och skönhetsprodukter,
        t.ex. linalool eller limonen
    allergy_friendly_features:
      name: Detaljer för allergivänligt
      description: Identifierar om en produkt har allergivänliga egenskaper, som latexfri
        eller mögelresistent
    amino_acid_subtype:
      name: Aminosyraundertyp
      description: Anger den primära typen eller profilen av aminosyror som finns
        i kosttillskottet.
    amplifier/booster_suitable_location:
      name: Lämplig plats för förstärkare/booster
      description: Anger de bästa platserna för förstärkare eller signalförstärkare,
        till exempel fordon eller stor arena
    amplifier_class:
      name: Förstärkarklass
      description: Definierar typen av förstärkare, till exempel AB eller D
    amplifier_configuration:
      name: Förstärkarkonfiguration
      description: Anger konfigureringen av motorfordonsförstärkare, till exempel
        tvåkanals eller fyrkanaligt
    amputation_level:
      name: Amputationsnivå
      description: Anger amputationsnivån som krympstrumpan är designad för.
    analyte_measured:
      name: Mätt analyt
      description: Identifierar biomarkören/biomarkörerna för vilka kontrollösningen
        tillhandahåller kalibrering.
    anamorphic_squeeze_ratio:
      name: Anamorfiskt pressningsförhållande
      description: Indikerar den horisontella kompressionsfaktorn för en anamorfisk
        lins, vilket gör det möjligt för användare att matcha linser med önskad avtryckningsutgång.
    anatomical_detail_displayed:
      name: Visad anatomisk detalj
      description: Anger vilka anatomiska eller meridianfunktioner som framhävs på
        modellen.
    anchor_type:
      name: Typ av förankring
      description: Anger vilket ankare som används för bogserad vattensportutrustning,
        till exempel fluke eller plog
    anemometer_application:
      name: Tillämpning för vindmätare
      description: Identifierar den avsedda användningen av en vindmätare, till exempel
        industriell eller meteorologisk
    angles_supported:
      name: Stödda vinklar
      description: Specificerar intervallet av vinklar en produkt kan rymma, vanligtvis
        för elektronik; t.ex. justerbar, 0° till 180°
    angling_style:
      name: Metestil
      description: Definierar den fisketeknik som produkten är avsedd för, till exempel
        surfcasting eller flugfiske
    animal_feed_form:
      name: Djurfoderform
      description: Anger formen för djurfoder, såsom vätska eller korn
    animal_type:
      name: Typ av djur
      description: Anger vilken typ av djur en produkt är avsedd för, till exempel
        ankor, rådjur eller hundar
    answering_machine_type:
      name: Telefonsvararstyp
      description: Anger närvaron och tekniken för en integrerad telefonsvarare
    antenna_connector_type:
      name: Antennanslutningstyp
      description: Anger RF-anslutningen som används för att fästa externa antenner
    antenna_rf_connector_type:
      name: Antennens RF-kontakttyp
      description: Identifierar RF-kontakten som används av antennen.
    antenna_type:
      name: Typ av antenn
      description: Anger typen av antenn för elektroniska enheter, t.ex. rundstrålande,
        rutnät
    anti_agin_skin_care_type:
      name: Typ av åldersbekämpande hudvård
      description: Klassificerar typen av anti-aging hudvårdsartiklar, t.ex. ansiktsmask,
        toner
    anti_perspirant_strength_level:
      name: Antiperspirantens styrkenivå
      description: Betecknar antiperspirantens effektivitetsklassificering (t.ex.
        klinisk styrka, sportstyrka).
    antibody_class_tested:
      name: Testad antikroppsklass
      description: Anger immunglobulinet eller biomarkören som kitet upptäcker (t.ex.
        IgE, IgG4).
    antifreeze_type:
      name: Typ av frostskyddsmedel
      description: Anger typen av frostskyddsmedel för fordonsunderhåll, t.ex. koncentrat,
        utspädd
    antique_car_design:
      name: Antik bildesign
      description: Beskriver den primära designstilen för en antik bil, till exempel
        t-bucket eller grand tourer
    antique_vehicle_era:
      name: Tidsepok för antika fordon
      description: Beskriver den historiska perioden för ett antikt fordon, t.ex.
        Brass Era eller Vintage Era
    appliance_board_function:
      name: Apparatkortets funktion
      description: Anger kortets funktionella roll inom apparaten
    appliance_unit_location:
      name: Apparatenhetsplacering
      description: Indikerar den fysiska sektionen av apparaten för vilken kortet
        är avsett (t.ex. inomhus- eller utomhusenhet)
    application_area:
      name: Appliceringsområde
      description: Anger kroppsdelen eller området där produkten appliceras, t.ex.
        läppar, hela kroppen
    application_method:
      name: Appliceringsmetod
      description: Definierar hur en produkt appliceras eller används, t.ex. gel,
        vätska, spray
    application_type:
      name: Appliceringstyp
      description: Anger om behandlingen lämnas kvar eller sköljs ur och eventuellt
        särskilt användningssätt.
    applicator_format:
      name: Applikatorformat
      description: Beskriver den fysiska formen eller stilen för lotion- eller solskyddsapplikatorn.
    applicator_material:
      name: Applikatormaterial
      description: Anger materialet som används i applikatorn, vanligtvis för tamponger;
        t ex plast, kartong
    applicator_type:
      name: Typ av applikator
      description: Identifierar vilken typ av applikator som ingår i tamponger, t.ex.
        applikator, icke-applikator
    applique/patch_shape:
      name: Form på applikation/lapp
      description: Beskriver formen av applikationer eller lappar, såsom djur eller
        geometrisk form.
    applique_shape:
      name: Applikationsform
      description: Beskriver formen av applikationsartiklar, såsom blomma eller djur
    aquarium_filter_features:
      name: Detaljer för akvariumfilter
      description: Beskriver speciella funktioner av akvariefilter, t.ex. snabbt byte
        av patron, flerstegsfiltrering
    aquarium_light_spectrum:
      name: Ljusspektrum för akvarium
      description: Anger typen av ljusspektrum för akvariebelysning, t.ex. blått,
        dagsljus
    aquarium_overflow_box_design:
      name: Design på uppsamlingslådor för akvarie
      description: Beskriver inställningsstilen för en överfyllningslåda för akvarier,
        till exempel extern eller hängande
    archery_activity:
      name: Bågskytteaktivitet
      description: Anger typen av bågskytteaktivitet, t.ex. utomhusjakt, målträning
    archery_equipment_included:
      name: Bågskytteutrustning som ingår
      description: Specificerar medföljande tillbehör för bågskytte, t.ex. stabilisatorfäste,
        säkerhetsglaspilar
    archery_style:
      name: Bågskytte stil
      description: Definierar den specifika typen av bågskytte produkten är designad
        för, t.ex. 3D-bågskytte, bågjakt
    archery_target_type:
      name: Typ av måltavla för bågskytte
      description: Anger typen av måltavla för bågskytte för olika skjutövningar,
        t.ex. 3D-måltavla, skjutsäck
    aromatherapy:
      name: Aromaterapi
      description: Anger doften eller eterisk olja som används, t.ex. eukalyptus,
        lavendel
    arrangement:
      name: Arrangemang
      description: Anger hur blommor arrangeras eller presenteras, t.ex. vas, korg
    arrow/bolt_material:
      name: Pil/skäkta - material
      description: Identifierar konstruktionsmaterialet för pilar eller bultar, t.ex.
        aluminium eller bambu
    arrow_fletching_material:
      name: Pilfjädring - material
      description: Identifierar materialet som används i pilar, såsom syntet eller
        plast
    arrow_material:
      name: Pil - material
      description: Identifierar sammansättningen av pilar, som bambu eller glasfiber
    art/crafting_tool_material:
      name: Konst- och hobbyverktyg - material
      description: Identifierar huvudmaterialet i konst eller hantverksverktyg, som
        trä eller metall
    art_fixative_application_method:
      name: Appliceringsmetod för konstfixativ
      description: Beskriver hur ett konstfixativ appliceras, till exempel aerosol
        eller med borste
    art_movement:
      name: Konströrelse
      description: Definierar den stilistiska metoden eller konströrelsen i en tavla,
        t.ex. impressionism, expressionism
    art_style:
      name: Konststil
      description: Beskriver den estetiska stilen hos en produkt, som jugendstil eller
        typografi
    artwork_authenticity:
      name: Konstverkets autenticitet
      description: Anger om konstverket är autentiskt och ifall det är ett original
        eller en reproduktion
    artwork_frame_material:
      name: Konstram - material
      description: Identifierar materialet som används i konstramar, som trä eller
        guldpläterade
    artwork_type:
      name: Typ av konstverk
      description: Anger stilen för digitala konstverk, som typografi eller digital
        målning
    assisted_braking_technology:
      name: Teknologi assisterad bromsning
      description: Indikerar typen av assisterad bromsning i säkerhetsanordningar,
        t.ex. aktiv, passiv
    attachment_method:
      name: Fastsättningsmetod
      description: Definierar metoden som används för att fästa produkten, t.ex. kardborre,
        clip-on
    attachment_options:
      name: Fastsättningsalternativ
      description: Anger metoderna för att fästa eller säkra en produkt, t.ex snodd
    attachment_type:
      name: Fastsättningstyp
      description: Definierar metoden för produktfästning eller anslutning, såsom
        snap-on eller krok och ögla
    atv/off_road_tire_type:
      name: Däcktyp för fyrhjuling/terrängfordon
      description: Identifierar den specifika användningen av ATV eller terrängdäck,
        som sand eller lera
    audio/scan_converter_features:
      name: Detaljer för ljud- och skanningskonverterare
      description: Beskriver funktionerna hos en audio/skannomvandlare, såsom automatisk
        konvertering eller fjärrkontroll
    audio/video_cable_connector_type_end_a:
      name: Audio/Video-kabelkontakttyp (ände A)
      description: Anger den exakta kontakten eller gränssnittet som finns på den
        första änden (ände A) av kabeln.
    audio/video_cable_connector_type_end_b:
      name: Audio/Video-kabelkontakttyp (ände B)
      description: Anger den exakta kontakten eller gränssnittet som finns på den
        andra änden (ände B) av kabeln.
    audio_bypass_type:
      name: Ljudförbikopplingstyp
      description: Anger hur ljudsignalen dirigeras när effekten är frånkopplad (t.ex.
        true bypass, buffrad, relä)
    audio_cassette_tape_type:
      name: Ljudkassettbandtyp
      description: Anger IEC-bandformulering (bias) för ljudkassetter.
    audio_codecs/formats_supported:
      name: Kompatibla ljudkodekar/-format
      description: Anger de ljudfiltyper som en produkt kan spela upp, till exempel
        WAVE eller MP3
    audio_component_form_factor:
      name: Ljudkomponents formfaktor
      description: Definierar komponentens fysiska stil eller installationsformat
    audio_connectivity:
      name: Ljudanslutning
      description: Definierar de typer av ljudanslutning som en produkt stöder, till
        exempel HDMI eller USB
    audio_conversion_direction:
      name: Ljudkonverteringsriktning
      description: Anger det signalflöde som omvandlaren stöder (t.ex. analog-till-digital,
        digital-till-analog, dubbelriktad).
    audio_converter_features:
      name: Detaljer för ljudkonverterare
      description: Skisserar huvuddragen hos en ljudomvandlare, som AI-drivet eller
        analogt support
    audio_d/a_converter_dac:
      name: Ljud D/A-konverterare (Dac)
      description: Anger typen av digital till analog (DAC)-omvandlare i ljudenheter,
        t.ex. USB, optisk
    audio_duplex_capability:
      name: Ljudduplexkapacitet
      description: Anger om enheten stöder fullduplex (samtidig tvåvägs) eller halvduplex
        ljudkommunikation
    audio_mixer_type:
      name: Typ av ljudmixer
      description: Identifierar typen av ljudmixer, till exempel analog eller streaming
    audio_output_channel:
      name: Ljudutgångskanal
      description: Indikerar antalet kanaler eller högtalarkonfiguration som ett ljudsystem
        kan mata ut till, till exempel 2 eller 5.1
    audio_output_format:
      name: Ljudutgångsformat
