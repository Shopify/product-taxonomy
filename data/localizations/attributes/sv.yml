    cotton_weave_type:
      name: Bomullsvävtyp
      description: Beskriver väv-/stickkonstruktionen på den tryckbara bomullsytan
        som påverkar textur och tryckskärpa.
    counter_type:
      name: Disktyp
      description: Indikerar förekomsten och stilen för inbyggd repetition eller kraftspårning.
    counterweight_fill_material:
      name: Motviktsfyllningsmaterial
      description: Anger det ämne som kan användas för att lägga till ballast till
        eller förfylla motvikten.
    counterweight_type:
      name: Motviktstyp
      description: Anger design- eller konstruktionsstilen för motvikten, såsom sandsäck
        eller stålplåt, för att underlätta kompatibilitet och installation.
    coupler_system:
      name: Kopplingssystem
      description: Kopplingstyp/system monterat på modellloket för kompatibilitet
