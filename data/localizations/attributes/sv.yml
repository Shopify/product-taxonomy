    craft_scoring_board_measurement_system:
      name: Mätningssystem för Craft
      description: Anger det mätsystem som är markerat på poängtavlan (imperial, mätvärde,
        dual eller omärkt).
    craft_wire_finish_coating:
      name: Hobbytråd – finish/beläggning
      description: Anger den ytfinish eller beläggning som applicerats på tråden för
        färg, antändningsbeständighet eller skydd.
    craft_wood_surface_preparation:
      name: Förberedelse av ytan på Craft
      description: Anger om träytan är redo för ytbehandling/målning eller behöver
        förberedas (t.ex. slipning/grundning).
    crank_spindle_interface:
      name: Vevaxelns gränssnitt
      description: Anger vevaxelsystemet för vevlagerstödet (t.ex. SRAM DUB, Square
        Taper), vilket säkerställer kompatibilitet mellan vevparti och vevlager.
    crankshaft_balance_type:
      name: Vevaxel Saldo-typ
      description: Indikerar om vevaxeln är internt saldo (neutral) eller externt
        saldo (kräver harmonisk balanserare/svänghjulsvikter).
    crankshaft_bolt_pattern:
      name: Vevaxelns bultmönster
      description: Bultmönster på bakflänsen för infästning av svänghjul/flexplatta.
    crankshaft_sensor_reluctor_type:
      name: Vevaxelsensor, reluktortyp
      description: Vevaxelpositionsgivarens utlösare/reluktorhjulskonfiguration som
