        till spjälsäng och vagga (t.ex. vattentät, ekologiskt certifierad, allergivänlig).
    bassoon_bell_material:
      name: Material för fagottklocka
      description: Anger materialet i fagottens klockstycke.
    bassoon_bocal_system:
      name: Fagottens bocalsystem
      description: Den variant/typ som används för olika fagottsystem och användningar.
    bassoon_case_shell_type:
      name: Fagottfodralets skaltyp
      description: Indikerar lådans skyddsstruktur (mjuk, hård eller hybrid).
    bassoon_keywork_material:
      name: Tangentmaterial till fagott
      description: Material och/eller plätering som används för fagottens klaviatur
        (klaviatur och mekanisk utrustning).
    bassoon_model_level:
      name: Fagottmodellnivå
      description: Indikerar den avsedda spelarnivån för fagotten.
    bassoon_performance_level:
      name: Fagottprestandanivå
      description: Visar fagottmodellens spelarnivå.
    bassoon_reed_scrape_style:
      name: Fagottrörets skrapstil
      description: Indikerar skrap-/profilstilen på fagottröret.
    bassoon_reed_thread_color:
      name: Fagottrörets mönsterfärg
      description: Bindtrådens färg på rörbladet.
    bassoon_reed_type:
      name: Fagottrörstyp
      description: Anger vilken undertyp av fagottrör som produkten passar till (i
        gällande fall).
    bassoon_system:
      name: Fagottsystem
      description: Identifierar fagottsystemet/designtraditionen som instrumentet
        använder.
    bat_construction:
      name: Konstruktion för fladdermöss
      description: Anger hur många distinkta delar eller sammanfogade sektioner som
        utgör slagträets kropp (t.ex. ett stycke, tvådelad, hybrid), vilket påverkar
        flexibilitet, vibrationskontroll och övergripande prestanda.
    bat_handle_size_compatibility:
      name: Slagträets storlekskompatibilitet
      description: Anger vilken/ vilka storlekar på cricketträets handtag som greppet
        är utformat att passa.
    bath_book_interactive_features:
      name: Interaktiva funktioner i badboken
      description: Inbyggda lek-/inlärningsfunktioner integrerade i badboken.
    bath_bubble_machine_features:
      name: Bubbelmaskinens funktioner
      description: Viktiga funktioner hos badbubbelmaskinen bubbelutgång.
    bath_crayon_features:
      name: Badkritans egenskaper
      description: Viktiga funktionella och säkerhetsmässiga egenskaper hos badkritor.
    bath_squirter_spray_pattern:
      name: Badspruta spraymönster
      description: Beskriver hur badsprutan sprutar vatten (utmatningsmönstret) när
        den kläms eller aktiveras.
    bath_toy_molded_drain_design:
      name: Badleksak med gjuten avloppsdesign
      description: Anger om leksaken är utformad för att dränera/torka för att minska
        vattenbevarandet.
    bath_toy_water_play_function:
      name: Badleksakens vattenleksfunktioner
      description: Identifierar leksakens primära mekanism för vattenlek.
    baton_size_standard:
      name: Standardstorlek för stafettpinnar
      description: Tävlingsstorleksklassificering för stafettpinnen (junior eller
        senior).
    battery_case_certification_standard:
      name: Certifiering/standard för batterilåda
      description: Listar relevanta transport-/säkerhetscertifieringar eller teststandarder
        som lådan uppfyller för batteritransport/förvaring.
    battery_case_interior_padding_material:
      name: Fodermaterial för batterilåda
      description: Anger det primära dämpnings-/fodermaterialet som används inuti
        lådan (om tillämpligt).
    battery_configuration:
      name: Batterikonfiguration
      description: Anger batteriets fysiska utformning/form (form factor) så att användare
        kan matcha batteriet mot det begränsade utrymmet i specifika Airsoft-replikor.
    battery_group_size:
      name: Batterigruppstorlek
      description: Standardiserad storlek på batterilåda (t.ex. BCI grupp 24F, H6)
        används för montering i många fordon.
    battery_polarity:
      name: Batteripolaritet
      description: Anger terminalpolariteten/orienteringen (positivt terminalläge),
        vilket är en viktig begränsning för montering av många bil- och motorsportbatterier.
    battery_standards_supported:
      name: Batteristandarder som stöds
      description: Anger de batteriklassificeringsstandarder som testaren stöder vid
        testning av startprestanda eller hälsa.
    battery_voltage_class:
      name: Batterispänningsklass
      description: Vanlig spänningssystemklass för elbilsbatteripaket, som används
        för snabb filtrering (t.ex. 400V vs 800V-system).
    batting_cage_components_included:
      name: Komponenter för slagbur som ingår
      description: Listar de enskilda delarna som medföljer produkten, så att köpare
        kan bekräfta om ett komplett system eller specifika reservdelar ingår.
    batting_helmet_accessories_included:
      name: Tillbehör för slaghjälm ingår
      description: Listar paketet med skyddande eller kosmetiska tillbehör som medföljer
        slaghjälmen.
    batting_stuffing_form_factor:
      name: Vaddering och fyllning formfaktor
      description: Identifierar om produkten säljs som lös fyllning, ark, rullar,
        förskurna bitar eller färdiga former.
    batting_stuffing_loft_level:
      name: Vaddering och fyllning loftnivå
      description: Anger loftet (fyllighet/styvhet) hos vaddering eller stoppning,
        dvs. relativ fluffighet/höjd. Vanligt vid val av vadd för quiltning och stoppning.
    batting_stuffing_thermal_insulation_level:
      name: Värmeisoleringsnivå för vaddering och fyllning
      description: Relativ värme-/isoleringsförmåga hos vaddering som används i täcken,
        jackor och filtar.
    batting_tee_base_design:
      name: Utformning av bollhållarens/T-stativets bas
      description: Beskriver stilen eller konstruktionen på peggens bas, vilket påverkar
        stabiliteten och vilka typer av spelytor den passar för.
    battle_top_arena_stadium_compatibility:
      name: Kompatibilitet med arena/stadion för battle tops
      description: Anger vilket arena-/stadionsystem produkten är kompatibel med (särskilt
        för set eller speciella arenaformer).
    battle_top_items_included:
      name: Battle top-artiklar som ingår
      description: Anger vilka Battle top-artiklar som ingår i paketet (t.ex. topp,
        avfyrningsraket, stadion/arena, dragsnöre, reservdelar).
    battle_top_performance_type:
      name: Prestanda-typ för battle tops
      description: Beskriver den allmänna prestandastilen för stridstoppen, vilket
        vanligtvis återspeglar hur den beter sig i arenan (aggressiv eller uthållighetsfokuserad,
        etc.).
    bayan_included_accessories:
      name: Inkluderade tillbehör från Bayan
      description: Medföljande tillbehör till bayan (i kartongen).
    bayan_tuning_system_type:
      name: Typ av stämsystem för bayan
      description: Hur bayanen är spänd/stämd (konstruktionstyp), vilket påverkar
        portabiliteten och hur lätt den är att stämma.
    bb_gun_action_type:
      name: Typ av BB-pistol
      description: Indikerar BB-pistolens mekaniska laddnings- eller cyklingsmekanism
        (t.ex. hävstångsfunktion, pump, brytrör).
    bb_gun_caliber:
      name: Kaliber för BB-gevär
      description: Definierar diametern på de kulor som vapnet är konstruerat för
        att avfyra, vilket säkerställer ammunitionskompatibilitet.
    bb_gun_part_type:
      name: Typ av BB-gevärsdel
      description: Klassificerar den specifika komponenten eller tillbehöret som är
        utformat för luftgevärsvapen, vilket gör det möjligt för kunden att snabbt
        hitta rätt ersättnings-, uppgraderings- eller tilläggsdel (t.ex. pipa, kolvtätning,
        speedloader).
    beach_ball_features:
      name: Strandbollens funktioner
      description: Anmärkningsvärda funktionella egenskaper för strandbollar.
    beach_bucket_features:
      name: Funktioner för strandhink
      description: Funktionella egenskaper hos strandhinken som påverkar användning,
        hållbarhet och bekvämlighet.
    beach_sand_toy_items_included:
      name: Strand- och sandleksaker som ingår
      description: Ytterligare strand-/sandleksaker ingår med hinken (om den säljs
        som ett set).
    bead_breaker_type:
      name: Typ av pärlbrytare
      description: Typ/utformning av pärlbrytarmekanismen.
    bead_hole_style:
      name: Pärlhålsstil
      description: Anger stilen eller konfigurationen av hålet/spåret i pärlan, vilket
        påverkar hur den sitter på kroken eller linan.
    bead_type:
      name: Pärltyp
      description: Primär pärltyp som krävs för mönstret.
    bead_type_patch_embellishment:
      name: Pärltyp (lapputsmyckning)
      description: Primär typ av pärlor som används på ytan.
    beaded_accessory_project_type:
      name: Projekttyp för pärlaccessoarer
      description: Vilken accessoar mönstret gör.
    beading_needle_flexibility:
      name: Flexibilitet i pärlnålar
      description: Nålskaftets relativa flexibilitet för att navigera i snäva pärlbroderivägar.
    beading_pattern_bead_size:
      name: Pärlstorlek för pärlmönster
      description: Rekommenderad(e) pärlstorlek(ar) anges av mönstret (vanligtvis
        storlek på fröpärlor, t.ex. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Format för pärlmönsterdiagram
      description: Hur mönstret representeras visuellt (t.ex. grafiskt eller steg
        för steg-foton).
    beading_pattern_stitch_technique:
      name: Pärlmönster – stygn/teknik
      description: Primär pärlvävningssöm eller teknik som används i mönstret.
    beading_technique_stitch:
      name: Pärlteknik / stygn
      description: Identifierar den primära pärltekniken eller stygn som används i
        mönstret (t.ex. peyotesöm, tegelstygn).
    beading_thread_fiber_type:
      name: Pärltrådens fibertyp
      description: Anger fiber-/materialundertypen för pärltråden (mer specifikt än
        generiskt material), vilket är relevant för prestanda.
    beading_thread_size:
      name: Storlek på pärltråd
      description: Indikerar tillverkarens/industrins storleksetikett som används
        för pärltråd (varumärkes-/linjespecifik), såsom storlek D eller 00.
    beading_thread_use_case:
      name: Pärltrådens användningsområde
      description: Identifierar den primära rekommenderade användningen för pärltråden,
        vilket hjälper kunden att välja rätt produkt för sitt projekt.
    beading_wire_coating_material:
      name: Beläggningsmaterial för pärltråd
      description: Anger det yttre beläggningsmaterialet på pärltråden (om sådant
        finns), vilket påverkar känsla, hållbarhet och kinkmotstånd.
    beading_wire_strand_count:
      name: Antal trådar i pärltråd
      description: Anger antalet trådar i flertrådig pärltråd (t.ex. 7-trådig, 19-trådig,
        49-trådig), vilket påverkar flexibilitet och fall.
    beadlock_type:
      name: Beadlock-typ
      description: Anger om fälgen är av beadlock-typ och vilken stil (hjälper köpare
        av terrängfordon/UTV-fordon).
    beam_material:
      name: Bjälkmaterial
      description: Primärmaterial för balken/stången (ofta annat än huvuden/infästningarna).
    beam_pattern:
      name: Ljusmönster
      description: Fördelningsmönster för ljusflödet som används för kör-/terrängbelysning.
    bean_bag_fabric_material:
      name: Tygmaterial för sackosäckar
      description: Identifierar det yttertyg som används till säckarna i setet.
    bean_paste_variety:
      name: Bönpastasort
      description: Klassificerar den specifika typen av bönpasta baserat på produktionsstil
        eller huvudingrediens.
    bean_preparation:
      name: Bönberedning
      description: Anger hur bönorna tillreds eller bearbetas före försäljning (t.ex.
        hela baljor, skalade, hackade, grodda).
    bean_variety:
      name: Bönsort
      description: Anger bönornas botaniska eller marknadsförda sort (t.ex. gröna
        bönor, edamamebönor, långbönor).
    beanie_style:
      name: Mössans stil
      description: Anger mössans övergripande design, konstruktion eller silhuett
        så att kunden snabbt kan välja bland vanliga varianter.
    bearing_clearance:
      name: Lagerutförsäljning av mössor
      description: Anger lagrets inre radiella glappklass (mängden inre glapp). Klass
        C0 kallas även CN eller normalt glapp.
    bearing_construction_type:
      name: Typ av lagerkonstruktion
      description: Identifierar lagerdesignen eller konstruktionsstilen som används
        i navet (t.ex. patron, lös kula).
    bearing_edge_type:
      name: Lagerkanttyp
      description: Typ/profil av skallagerkant, som påverkar attack och upprätthållande.
    bearing_lubrication:
      name: Lagersmörjning
      description: Anger vilken typ av smörjmedel som applicerats på lagret under
        tillverkningen, såsom fett eller olja.
    bearing_material:
      name: Lagrets material
      description: Identifierar lagrets konstruktionsmaterial (t.ex. stål, keramisk
        hybrid), vilket hjälper cyklister att välja mellan hållbarhet, kostnad och
        prestanda.
    bearing_rating:
      name: Lagerklassificering
      description: Anger lagertoleransen eller prestandaklassen som används i skridskorna
        (t.ex. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Lagrets tätningskod
      description: Indikerar vilken tätningstyp som används på lagret, vilket påverkar
        hållbarhet och rullmotstånd.
    bearing_seal_type:
      name: Bärande tätningskod
      description: Anger den tätnings- eller skyddsdesign som skyddar lagrets inre
        delar från föroreningar och påverkar luftmotståndet (t.ex. 2RS, ZZ, LLU, öppen).
    bearing_shield_type:
      name: Lagersköldtyp
      description: Typ av skydd eller tätning som skyddar lagrets inre delar.
    bearing_size_code:
      name: Lagerstorlekskod
      description: Standardiserad lagerbeteckning (t.ex. 608, 688) som kombinerar
        innerdiameter, ytterdiameter och bredd.
    bearing_type:
      name: Lagertyp
      description: Anger konstruktionsstilen för lagren som används i headsetet.
    beater_head_material:
      name: Material för visp
      description: Anger kontakt-/huvudmaterialet för en bastrumklubba (t.ex. filt,
        trä, gummi).
    beaters_included:
      name: Klubbor ingår
      description: Anger hur många klubbor som ingår/installeras med trumpedalen (t.ex.
        enkel eller dubbel klubba), eller om ingen klubba ingår.
    bed_base_type:
      name: Typ av sängram
      description: Definierar sängens eller divanbottens struktur (t.ex. plattformsbädd,
        fjädrande ribbor, justerbar).
    bed_storage_type:
      name: Typ av sängförvaring
      description: Definierar den integrerade förvaringsmekanismen för sängramen.
    bedroom_furniture_items_included:
      name: Sovrumsmöbler som ingår
      description: Anger de enskilda möblerna som ingår i sovrumssetet (t.ex. säng,
        byrå, nattduksbord), vilket gör att kunden snabbt kan se vad som ingår utan
        att läsa långa beskrivningar.
    bedroom_vanity_items_included:
      name: Sovrumsartiklar som ingår
      description: Listar de enskilda artiklarna som kommer med badrumsmöblerna, så
        att kunderna vet exakt vad som levereras (t.ex. spegel, pall, lampor).
    beer_based_cocktail_variety:
      name: Ölbaserad cocktailvariant
      description: Klassificerar ölbaserade cocktails efter deras specifika variant,
        t.ex. Radler, Shandy, Michelada.
    beet_variety:
      name: Betsort
      description: Anger sorten av rödbeta, vilket hjälper kunden att identifiera
        smak, färg och kulinariska användningsområden (t.ex. röd, golden, chioggia).
    bell_actuation_mechanism:
      name: Aktiveringsmekanism för klocka
      description: Anger vilken användaråtgärd som krävs för att ringa på klockan,
        vilket hjälper kunden att välja önskad ergonomi.
    bell_guard_coverage_area:
      name: Klockvaktens täckningsområde
      description: Anger vilken del av klockan som skyddet är utformat för att skydda.
    bell_material:
      name: Klockans material
      description: Material i klockkomponenten (om det anges separat från instrumentets
        övergripande material).
    bellhousing_bolt_pattern:
      name: Bultmönster för klockhus
      description: Anger standarden eller mönsterfamiljen för bultmönster på motorsidan/klockhuset
        som transmissionslådan använder.
    bellows_material:
      name: Bälgmaterial
      description: Material i bälgkropp/hölje (om sådant ingår).
    bellows_orientation:
      name: Bälgorientering
      description: Indikerar bälgkonfigurationen som används för föra luft till rören.
    belly_panel_style:
      name: Magpanelstil
      description: Beskriver konstruktionen av midjebandet eller bukpanelen som rymmer
        en växande mage.
    belt_buckle_type:
      name: Bältesspännetyp
      description: Beskriver den specifika spännmekanismen eller designen som används
        på bältet.
    beret_style:
      name: Baskerstil
      description: Identifierar den specifika baskerdesignen eller kulturella varianten.
    berry_species:
      name: Bärarter
      description: Anger vilken bärart som ingår i produkten så att kunden snabbt
        kan filtrera efter önskat bär.
    beta_casein_variant:
      name: Beta-kaseinvariant
      description: Anger vilken beta-kaseinvariant (t.ex. A2) som finns i mjölken
        för konsumenter med problem med smältbarheten.
    beverage_sweetness_level:
      name: Dryckens söthetsnivå
      description: Klassificerar drycken efter grad av tillsatt sötma eller socker.
    bezel_graduation_units:
      name: Bezel-graderingsenheter
      description: Anger enhetsmarkeringarna på den roterande ramen (grader, mil eller
        dubbel skala).
    bicycle_brake_set_components_included:
      name: Delar till cykelbromsset som ingår
      description: Listar de enskilda delarna i kitet så att kunden vet exakt vad
        som ingår och kan jämföra olika paketkonfigurationer.
    bicycle_cage_mounting_position:
      name: Monteringsläge för flaskhållare
      description: Anger var på cykeln som hållaren är avsedd att installeras.
    bicycle_computer_mount_placement:
      name: Placering av cykeldatorfäste
      description: Identifierar var på cykeln datorfästet ska monteras, till exempel
        framtill på styret eller på styrstammens toppkåpa.
    bicycle_folding_mechanism:
      name: Hopfällningsmekanism för cykel
      description: Anger det mekaniska hopfällningssystemet som används för ramen
        (t.ex. halvvikning, vertikalvikning).
    bicycle_frame_design:
      name: Ramdesign
      description: Anger den övergripande stilen på ramen, vilket påverkar kapacitet,
        lastkapacitet och förvaring.
    bicycle_frame_style:
      name: Cykelramstil
      description: Beskriver ramens strukturella stil (step-through, lowrider, chopper
        stretch, etc.) vilket påverkar förarens hållning och utseendet.
    bicycle_handlebar_type:
      name: Typ av cykelstyre
      description: Identifierar styrets stil eller geometri, vilket hjälper cyklister
        att välja ett styre som passar deras körställning och disciplin.
    bicycle_headset_configuration:
      name: Konfiguration av cykelstyrlager
      description: Anger cykelstyrlagrets strukturella stil eller standard enligt
        dess kåpanordning (t.ex. extern kåpa, ZeroStack, integrerad, gängad).
    bicycle_hub_type:
      name: Typ av cykelnav
      description: Beskriver navmekanismen på hjulet, vilket påverkar drivlinans kompatibilitet
        och körstil.
    bicycle_lock_security_certification:
      name: Säkerhetscertifiering för cykellås
      description: Oberoende tredjepartscertifiering som validerar stöldskyddsprestanda
        (t.ex. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Typ av cykelpedal
      description: Anger pedalens övergripande funktionsstil eller design, såsom plattform,
        klickfri variant eller hybrider, vilket hjälper cyklister att välja rätt modell
        för sin körstil.
    bicycle_propulsion_type:
      name: Typ av framdrivning för cykel
      description: Anger hur cykeln drivs, till exempel manuell trampning, elektrisk
        assistans eller förbränningskraft.
    bicycle_pump_type:
      name: Typ av cykelpump
      description: Identifierar pumpens strukturella stil och hjälper kunden att välja
        den design som bäst passar deras behov vid cykling, förvaring eller nödsituationer.
    bicycle_rack_mounting_type:
      name: Monteringstyp för cykelstativ
      description: Beskriver den primära metoden eller platsen som används för att
        fästa stället på cykeln, vilket hjälper användaren att bekräfta kompatibilitet
        med sin ram och tillhörande delar.
    bicycle_suspension_type:
      name: Typ av cykelgafflar
      description: Identifierar förekomsten och konfigurationen av fjädring på cykeln.
    bicycle_tire_tread_pattern:
      name: Cykeldäckens mönster
      description: Anger däckets mönster, vilket påverkar väggrepp och rullmotstånd
        på olika underlag.
    bidirectional_charging_capability:
      name: Dubbelriktad laddkapacitet
      description: Anger om elbilen stöder dubbelriktat laddningsläge, såsom V2G och/eller
        V2H.
    bike_rack_mounting_style:
      name: Cykelrackmonteringsstil
      description: Hur cykeln stöds/säkras av stativet.
    bike_rack_tilt_function:
      name: Cykelställ – lutningsfunktion
      description: Om/vilka funktioner som finns för att komma åt det bakre lastutrymmet
        medan stativet är installerat.
    bikini_top_style:
      name: Bikiniöverdelsstil
      description: Anger designen eller snittet på bikiniöverdelen, vilket hjälper
        kunden att hitta önskad passform och silhuett.
    billiard_brush_type:
      name: Biljardborstetyp
      description: Definierar den specifika typen av rengöringsverktyg för biljardbord
        (t.ex. bordsborste, rälsborste, tuppborste).
    billiard_glove_finger_coverage:
      name: Biljardfingerskydd
      description: Identifierar vilka fingrar som täcks av handskdesignen, vilket
        ger exakt filtrering för biljardspecifika handskstilar.
    billiard_pocket_style:
      name: Biljardhålstil
      description: Anger fickans strukturella eller estetiska stil, vilket påverkar
        kompatibilitet och bordsdekor.
    billiard_rack_style:
      name: Biljardställsstil
      description: Beskriver den fysiska stilen eller mekanismen för stället (t.ex.
        traditionell ram, mallplåt, vikbart).
    billiard_table_type:
      name: Biljardbordstyp
      description: Anger vilken kösportdisciplin eller användningsstil bordet är utformat
        för (t.ex. biljard, snooker, carambole).
    billiards_discipline:
      name: Biljarddisciplin
      description: Anger den specifika kösportvarianten (speltyp) som produkten är
        avsedd för eller kompatibel med.
    binding_compatibility_standard:
      name: Standard för bindningskompatibilitet
      description: Identifierar bindningssystemet (sulnormen) som pjäxan är certifierad
        för, vilket säkerställer säker och korrekt anslutning till skidorna.
    binding_inclusion:
      name: Bindande inkludering
      description: Anger om skidorna säljs platta, med ett integrerat system eller
        med separata bindningar inkluderade.
    binding_interface:
      name: Bindningsgränssnitt
      description: Indikerar bindningsplattan eller standarden som skidorna är förmonterade
        med eller kompatibla med, vilket säkerställer kompatibilitet mellan pjäxor
        och bindningar.
    binding_liner_type:
      name: Typ av bindningsfodring
      description: Beskriver typen av innerfoder som används i bindningen/stöveln
        (t.ex. avtagbart, gångbart, värmegjutbart).
    binding_mounting_system:
      name: Bindningens monteringssystem
      description: Identifierar gränssnittet som används för att fästa bindningen
        till skidan (flat mount, spår, platta, etc.).
    binding_position:
      name: Bindande läge
      description: Anger den avsedda monteringspositionen eller konfigurationen för
        bindningen (t.ex. framstövel, bakstövel, ARTP).
    binding_strap_position:
      name: Bindningsremmens position
      description: Anger var på bindningen remmen är avsedd att installeras.
    bingo_components_included:
      name: Bingodelar som ingår
      description: Listar de komponenter som medföljer bingosetet, såsom bingobollar,
        kort och markörer.
    bingo_number_range:
      name: Bingonummerintervall
      description: Identifierar bingonummerintervallet/varianten som stöds av setet.
    bingo_set_features:
      name: Bingosetets funktioner
      description: Identifierar det primära produktformatet för bingosetet (fysiskt/manuellt
        eller elektroniskt/interaktivt).
    bipod_mounting_interface:
      name: Gränssnitt för montering av bipod
      description: Anger det fästsystemet som används för att ansluta bipoden till
        skjutvapnet eller skensystemet.
    bit_attachment_type:
      name: Typ av bitfäste
      description: Anger hur huvudstativet ansluts till bettet (t.ex. buntband, spänne,
        sexbult).
    bit_mouthpiece_design:
      name: Utformning av bettet
      description: Identifierar munstyckets strukturella stil eller ledkonfiguration,
        vilket styr tryckfördelning, frigång mot gommen och övergripande svårighetsgrad.
    bit_ring_style:
      name: Bitringsstil
      description: Definierar stilen på bettets kind eller ring som fästs vid tränset,
        vilket påverkar sidledsstyrningen och tygelkänslan.
    bladder_material:
      name: Madrassmaterial
      description: Identifierar materialet som används till den inre blåsan som håller
        luft.
    blade_attachment_type:
      name: Typ av bladfäste
      description: Identifierar om skridskon använder en klappmekanism (gångjärnsmekanism)
        eller ett fast skenfäste.
    blade_finish_coating:
      name: Skenyta/beläggning
      description: Ytbehandling som appliceras på bladet för estetiska skäl eller
        korrosionsskydd.
    blade_hosel_type:
      name: Skenans fästtyp
      description: Anger kopplingsstilen för skenan som passar i skaftet, vilket påverkar
        kompatibiliteten (t.ex. standard eller konisk).
    blade_length_type:
      name: Typ av bladlängd
      description: Klassificerar skenans längd som kort, medel eller lång, varje längd
        påverkar sparkkadens och träningsmål.
    blade_lie:
      name: Blad-LIE
      description: Anger lie-numret på hockeyklubbans skena, vilket indikerar hur
        bladet sitter på isen i förhållande till skaftet.
    blade_sharpness:
      name: Bladets skärpa
      description: Indikerar om vapnets egg är slipad eller trubbig för träning.
    blade_size_category:
      name: Skenstorlek kategori
      description: Standardiserad internationell storlekskod för sabelskening (05)
        som används för att skilja ungdoms- och vuxenklingor.
    blade_size_class:
      name: Skenstorlek klass
      description: Klassificerar skenan efter spelarstorlekskonvention, och matchar
        skaftstorlekar som ungdom, junior, mellannivå eller senior.
    blade_size_number:
      name: Skenstorleksnummer
      description: Standardnumerisk storlekskod (05) definierad av fäktningsregler
        som avgör bladlängd och åldersgruppsbehörighet.
    blaster_mechanism:
      name: Blaster-mekanism
      description: Definierar den interna driftsmekanismen för gelblastern (t.ex.
        GBB, AEG, fjäder).
    block_edge_style:
      name: Blockkantstil
      description: Beskriver hur kanterna/hörnen på träklossarna är ytbehandlade för
        känsla och säkerhet.
    blocking_mat_features:
      name: Blockmattans funktioner
      description: Egenskaper för blockeringsmattor (förvaring, portabilitet, användbarhet).
    blocking_mat_grid_unit:
      name: Blockeringsmatta med rutnät
      description: Enhetssystemet som används i det utskrivna rutnätet, vilket hjälper
        användare att matcha mönster och mått.
    blocking_mat_surface_markings:
      name: Blockeringsmatta med ytmarkeringar
      description: Typ av mått-/vägledningsmarkeringar tryckta eller gjutna i mattytan.
    blocking_wire_coating:
      name: Blockerande trådbeläggning
      description: Ytbehandling/beläggning på blockeringstråden som påverkar rostbeständighet,
        jämnhet och risk för att tråden fastnar.
    blocking_wire_end_cap_type:
      name: Typ av ändkåpa för blockerande tråd
      description: Anger vilken typ av ändskydd/finish som används på blockerande
        trådändar för säkerhet och tygskydd.
    blocking_wire_set_includes:
      name: Setet med blockeringstrådar inkluderar
      description: Anger vilka komponenter som ingår i blockeringstrådsprodukten (t.ex.
        T-spår, förvaringsrör).
    blocking_wire_usage:
      name: Användning av blockeringstrådar
      description: Primär användning som den flexibla blockeringstråden är avsedd
        för.
    bloom_stage:
      name: Blomningsstadium
      description: Anger hur öppna prästkrageblommorna är vid leverans/avsändning.
    blower_motor_bearing_type:
      name: Fläktmotorns lagertyp
      description: Anger lagerkonstruktionen som används i fläktmotorn.
    blower_motor_mounting_position:
      name: Fläktmotorns monteringsläge
      description: Var fläktmotorn är installerad i HVAC-modulen/fordonet (t.ex. fram,
        bak).
    blowpipe_valve_type:
      name: Blåsrörsventiltyp
      description: Anger vilken typ av blåsrörsventil som ingår (om sådan finns).
    bo_staff_style:
      name: Bostavsstil
      description: Definierar stavens strukturella stil eller konstruktion (t.ex.
        rak, avsmalnande, skumstoppad, hopfällbar).
    board_game_theme:
      name: Brädspelstema
      description: Berättelse/tema för brädspelet (används för att se och hitta).
    board_rail_shape:
      name: Skenans form på brädan
      description: Anger konturen på brädans skenor (t.ex. mjuka, hårda, 50/50), vilket
        påverkar hållfasthet och drivkraft på vågor.
    board_size_classification:
      name: Klassificering av brädstorlek
      description: Klassificerar cornhole-brädan eller setet i vanliga standardiserade
        storlek.
    board_type_compatibility:
      name: Kompatibel med bräda
      description: Anger vilken typ av bräda kopplet är avsett för.
    boat_construction_type:
      name: Typ av båtkonstruktion
      description: Beskriver roddbåtens strukturella stil eller format (t.ex. uppblåsbar,
        hård).
    boat_hook_flotation:
      name: Båtkrokflytning
      description: Anger om båtshaken är konstruerad för att flyta om den tappas i
        vatten.
    boat_ladder_stowage_style:
      name: Förvaringsstil för båtstege
      description: Beskriver hur stegen fungerar när den inte används (t.ex. hopfällbar,
        infällbar, avtagbar).
    boat_trailer_construction_type:
      name: Konstruktionstyp för båttrailer
      description: Anger om trailern stöder båten med britsar, rullar eller ett hybridsystem.
    boat_weaving_shuttle_weft_exit_type:
      name: Skyttelvävning utgång
      description: Hur tyget lämnar skytteln under vävningen.
    bobbin_loading_type:
      name: Typ av spolladdning
      description: Anger hur spolen sätts i/laddas i symaskinen.
    bobbin_system:
      name: Spolsystem
      description: Spolladdningssystem/typ som används av symaskinen.
    bobbin_type:
      name: Spoltyp
      description: Anger det garnformat som skytteln är avsedd att använda (eller
        inkluderar), vilket avgör kompatibilitet och typisk användning (t.ex. båtskyttlar
        använder ofta spolar, trasskyttlar kan vara öppna för remsor).
    bobbin_winder_winding_direction:
      name: Riktning för spolningsmaskin
      description: Anger spolnings-/rotationsriktningen som stöds av spolmaskinen.
    bobble_mechanism:
      name: Gungmekanism
      description: Anger gungmekanismens stil, vilket påverkar rörelse och hållbarhet.
    bocal_material:
      name: Munstyckets material
      description: Anger materialet i de medföljande fagottrören.
    bodhr_n_head_material:
      name: Material för Bodhrán-huvud
      description: Materialet i spelhuvudet (membranet), vilket starkt påverkar ton
        och underhållskrav.
    bodhr_n_tuning_system_type:
      name: Bodhrán justeringssystem
      description: Den typ av inbyggd mekanism som används för att justera huvudspänningen
        (om den är inställbar).
    body_armor_coverage_area:
      name: Område för kroppsskydd
      description: Anger vilka kroppszoner produkten skyddar.
    body_armor_intended_use:
      name: Avsedd användning av kroppsskydd
      description: Anger det primära kör- eller användningsscenario som ATV/UTV-skyddet
        är avsett för.
    body_cord_connector_style:
      name: Anslutningsstil för kroppslina
      description: Beskriver anslutningskonfigurationen vid linans ändar (t.ex. antal
        stift eller bajonettform) som avgör kompatibilitet med vapen och poängboxar.
    body_panel_finish_state:
      name: Karosspanelens färdiga skick
      description: Beskriver kvartalspanelens befintliga skick för förberedelse/finish
        av ytan inför målning/installation.
    body_shape:
      name: Kroppsform
      description: Anger elgitarrens allmänna form/stil.
    bodysuit_bottom_coverage:
      name: Kroppsdräktens nederdel
      description: Definierar snittet och täckningen av kroppsdräktens nederdel, vilket
        påverkar komfort och kompatibilitet med kläder.
    boilie_shape:
      name: Boilie-former
      description: Identifierar former på boilies som produceras av rullbordet, vilket
        gör det möjligt för sportfiskare att välja mellan olika betesprofiler.
    boilie_stop_buoyancy:
      name: Boilie-stoppets flytkraft
      description: Anger om boilie-stoppet är utformat för att flyta, sjunka eller
        förbli neutralt flytande, vilket påverkar betespresentationen i vattenpelaren.
    bok_choy_variety:
      name: Pak choi-sort
      description: Anger sort eller varumärke för bok choy (t.ex. baby, Shanghai,
        Nai Bai, Tatsoi, Purple Lady), vilket gör det möjligt för kunden att välja
        önskad smak, storlek och utseende.
    bolt_drive_style:
      name: Bultdrivstil
      description: Anger drivstilen för skateboardmonteringsbultar, och skiljer mellan
        vanliga huvud-/drivtyper som insexnyckel eller stjärnskruvmejsel.
    bone_content:
      name: Beninnehåll
      description: Anger om köttet innehåller ben.
    bongo_center_block_material:
      name: Bongons mittblocksmaterial
      description: Materialet i mittblocket som förbinder de två bongoskalen (om tillämpligt).
    bongo_shell_material:
      name: Bongons skalmaterial
      description: Materialet i bongoskalet (trumkroppar), exklusive huvud och utrustning.
    bongo_tuning_system:
      name: Bongons stämningssystem
      description: Hur bongon stäms/konstrueras för stämning (t.ex. traditionell spännhusstämning
        eller repstämning), vilket påverkar underhållet och äktheten.
    boning_type:
      name: Inläggstyp
      description: Identifierar det strukturella stödet inuti midjeformaren. Kombinerar
        både materialet och stilen/formerna på stödet som används, vilket direkt påverkar
        stöd, flexibilitet och hållbarhet.
    boot_liner_type:
      name: Typ av foder
      description: Beskriver konstruktionen eller anpassningskapaciteten hos innerfodret
        inuti snowboardpjäxan (t.ex. värmeformbar, avtagbar).
    boot_sole_compatibility:
      name: Kompatibel med stövelsula
      description: Listar de skosulenormer eller fästsystem som bindningen accepterar.
    boot_support_level:
      name: Nivå av stöd
      description: Beskriver den övergripande styvheten/stödet i fotleden eller pjäxan
        som skridskon ger.
    boot_width_code:
      name: Kod för stövelbredd
      description: Tillverkarnas bokstavsbaserade breddbeteckning som används specifikt
        för konståkningsstorlekar (t.ex. AAA, AA, B, C, D).
    booth_configuration:
      name: Båskonfiguration
      description: Identifierar den övergripande sittkonfigurationen för båset (t.ex.
        enkelsidig, hörn, modulärt).
    bootie_toe_design:
      name: Tådesign för kort stövel
      description: Identifierar tåkonstruktionen på surf- och revkängor.
    border_type:
      name: Kanttyp
      description: Kantfinish/kantstil på den broderade lappen (påverkar utseende,
        fransningsmotstånd och upplevd kvalitet).
    bore_cleaner_format:
      name: Borrengöringsformat
      description: Anger det fysiska formatet för borrengöringsprodukten (verktyg
        eller förbrukningsartikel).
    bore_cleaner_safe_for_finish:
      name: Borrengöring säker för ytbehandling
      description: Anger vilka vanliga ytbehandlingar för bäckblåsinstrument som borrengöraren
        är säker att använda med.
    bottle_cage_loading_direction:
      name: Flaskhållarens lastriktning
      description: Beskriver riktningen från vilken en flaska sätts i eller tas ut
        ur hållaren.
    bottle_neck_finish_closure_size:
      name: Flaskhalsyta/stängningsstorlek
      description: Den standardiserade flasköppningen/ytan säkerställer kompatibilitet
        med korkar, kapsyler och förslutare (t.ex. 26 mm kronfinish).
    bottle_style:
      name: Flaskstil
      description: Vanliga formfaktorer för tappningsflaskor som används vid hembryggning
        och vinframställning.
    bottom_bracket_interface:
      name: Fäste för nedre vevarm
      description: Identifierar den del som vevarmen är konstruerad för, vilket säkerställer
        kompatibilitet mellan ramen och vevarmen.
    bottom_bracket_standard:
      name: Vevlagerstandard
      description: Vevarmsskal/fäste som stöds av ramen, vilket avgör vevarmens kompatibilitet.
    bottom_type_suitability:
      name: Lämplighet för bottentyp
      description: Anger den bottentjocklek som ankaret är konstruerat för att hålla
        bäst i.
    bounce_level:
      name: Studsnivå
      description: Indikerar hur mycket bollen studsar när den släpps eller kastas,
        vilket hjälper användare att välja rätt boll för övningar som väggkast eller
        slams.
    bouncy_ball_surface_finish:
      name: Yta på studsboll
      description: Anger den taktila och/eller visuella ytfinishen hos en studsande
        boll (t.ex. slät, taggig, glittrande).
    boundary_marker_type:
      name: Typ av gränsmarkör
      description: Definierar den fysiska formen av fält- eller plangränsmarkören
        eller markeringsprodukten (t.ex. kon, tejp, färg, schablon, maskin).
    bouquet_size_tier:
      name: Bukettstorlek
      description: Standardiserad storleknivå för buketten/knippet oberoende av stjälkantal
        (användbart vid blandade stjälkar).
    bow_and_yo_yo_edge_finish:
      name: Kantfinish på båge och jojo
      description: Beskriver kanten som används på bågen/jojon (särskilt för bandbaserade
        rosetter).
    bow_case_shell_type:
      name: Typ av bågfodralskal
      description: Beskriver den strukturella konstruktionen av bågfodralets utsida
        (t.ex. hårt skal eller mjukt fodral).
    bow_compatibility:
      name: Kompatibel med båge
      description: Anger vilken typ av båge som bredspetsen är avsedd för eller klassad
        för att använda.
    bow_hair_color:
      name: Båghårsfärg
      description: Identifierar färgen/utseendet på håret som används på en orkestral
        stränginstrumentbåge (t.ex. vit/blekt, naturlig vit, svart).
    bow_stick_material:
      name: Bågpinnens material
      description: Identifierar materialet som används till bågpinnen (huvudskaftet),
        vilket starkt påverkar vikt, känsla och pris.
    bow_type:
      name: Bågtyp
      description: Anger den strukturella utformningen av ungdomsbågen (t.ex. compound-båge,
        recurve-båge, långbåge), vilket starkt påverkar skjutstil, nödvändiga tillbehör
        och träningsprogram.
    bow_winding_material:
      name: Material för båglindning
      description: Anger materialet som används för bågens lindning/omslag, vilket
        påverkar grepp och balans.
    bow_yo_yo_embellishment_style:
      name: Utsmyckning av båge/jojo
      description: Identifierar utsmyckningens konstruerade stil (båge eller jojo
        med tyg).
    bowling_ball_core_type:
      name: Bowlingklotets kärntyp
      description: Identifierar den interna kärndesignen eller symmetrin hos bowlingklotet,
        vilket påverkar rörelsen och krokpotentialen.
    bowling_ball_coverstock_type:
      name: Typ av skydd för bowlingklot
      description: Anger det yttre höljesmaterialet eller tekniken för bowlingklotet,
        vilket dikterar grepp och krokpotential.
    bowling_set_style:
      name: Bowlingsetets stil
      description: Definierar den allmänna stilen eller användningen för bowlingsetet.
    box_lid_type:
      name: Typ av lådlock
      description: Typ av lock/öppningsmekanism som används av presentasken.
    box_spring_profile:
      name: Resårprofil
      description: Klassificerar resårmadrassens totala höjd i kundvänliga profilkategorier
        (t.ex. låg profil, standard, hög profil), så att kunder snabbt kan filtrera
        utan att känna till de exakta måtten.
    box_spring_requirement:
      name: Krav på resårmadrasser
      description: Anger om en extra resårmadrass eller grund behövs till madrassen.
    boxing_ring_style:
      name: Boxningsringstil
      description: Klassificerar den övergripande konstruktionsstilen eller den avsedda
        användningen för ringen (t.ex. tävling eller träning, upphöjd eller golv).
    bra_length_type:
      name: Typ av bh-längd
      description: Definierar längdklassificeringen av behåar baserat på vertikal
        täckning, såsom standard, lång, medel eller kort.
    bra_padding_type:
      name: BH-utfyllnadstyp
      description: Beskriver nivån eller förekomsten av vaddering i kopparna.
    braces_compatibility:
      name: Kompatibel med tandställning
      description: Anger om tandskyddet kan bäras med ortodontiska tandställningar
        och i vilken utsträckning.
    brake_band_form:
      name: Bromsbandets form
      description: Anger om bromsbandet levereras som en kontinuerlig slinga (ändlös)
        eller som en klipplängd som måste fästas.
    brake_band_material_type:
      name: Bromsbandsmaterialtyp
      description: Anger bromsbandets funktionella material (t.ex. bomullslina, nylonlina,
        fjäderstål) vilket påverkar hållbarhet, grepp, stretch och ljudnivå.
    brake_band_style:
      name: Bromsbandsstil
      description: Anger bromsbandets spänningssystem/stil som används på ett snurrande
        hjul för att applicera spolspänning.
    brake_bleeding_method:
      name: Bromsluftningsmetod
      description: Luftningsmetod som stöds av kitet.
    brake_booster_assist_type:
      name: Typ av bromsservoassistans
      description: Indikerar den hjälpmekanism som används av bromsservon.
    brake_booster_diaphragm_configuration:
      name: Konfiguration av bromsservomembran
      description: Anger antalet/typen av membran som används i boostern.
    brake_caliper_bleeder_screw_position:
      name: Bromsokets luftningsskruvs position
      description: Anger luftningsskruvens position på bromsoket när det är monterat
        (används för att verifiera att luftningsskruven är placerad vid den högsta
        punkten för korrekt luftning).
    brake_caliper_finish:
      name: Bromsoksyta
      description: Anger den ytfinish eller skyddande beläggning som applicerats på
        bromsokets kropp (t.ex. färg, plätering, anodisering).
    brake_caliper_included_hardware:
      name: Bromsoksutrustning som ingår
      description: Anger vad som ingår i bromsoket.
    brake_caliper_mount_type:
      name: Fästtyp för bromsoket
      description: Monteringsgränssnittsstil som används för att fästa bromsoket på
        styrleden/fästet.
    brake_caliper_paint_base_chemistry:
      name: Bromsoksfärgens baskemi
      description: Färg-/hartssystemet eller den kemiska familjen som används.
    brake_caliper_paint_kit_contents:
      name: Bromsokskitets innehåll
      description: Anger vad som ingår i paketet förutom själva färgen.
    brake_circuit_type:
      name: Bromskretstyp
      description: Hydraulkretskonfiguration som stöds av huvudcylindern.
    brake_clutch_fluid_base_chemistry:
      name: Baskemi för broms-/kopplingsvätska
      description: Primär kemisk bas för broms-/kopplingshydraulvätskan, vilket påverkar
        kompatibilitet och blandbarhet.
    brake_clutch_fluid_dot_specification:
      name: Broms-/kopplingsvätskans DOT-specifikation
      description: DOT-prestandaklassificering för hydrauliska broms-/kopplingsvätskor
        (t.ex. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Bromstrummans ytbehandling/beläggning
      description: Ytbehandling eller skyddande beläggning applicerad på bromstrumman
        (t.ex. e-coat, målad, zinkbelagd).
    brake_drum_type:
      name: Typ av trumbroms
      description: Bromstrummans konstruktionstyp (med eller utan integrerat nav/lager).
    brake_fluid_base:
      name: Bromsvätskebas
      description: Anger sammansättningen av den hydrauliska bromsvätska som krävs
        eller ingår.
    brake_fluid_base_chemistry:
      name: Bromsvätskans baskemi
      description: Definierar den kemiska basen för bromsvätskan, vilket avgör kompatibilitet
        och blandningsregler.
    brake_fluid_dot_specification:
      name: DOT-specifikationer för bromsvätska
      description: Anger DOT-bromsvätskeklassificering/specifikation (t.ex. DOT 3,
        DOT 4) för bromsvätskeprodukter.
    brake_fluid_standards_compliance:
      name: Överensstämmelse med bromsvätskestandarder
      description: Branschstandarder som bromsvätskan påstår sig uppfylla (utöver
        DOT-klassificering).
    brake_fluid_type:
      name: Bromsvätsketyp
      description: Anger vilken bromsvätska som krävs för hydrauliska cykelbromsok.
    brake_hose_end_fitting_type:
      name: Typ av ändkoppling för bromsslang
      description: Kopplingstyp i varje ände av bromsslangen (t.ex. banjo, flare,
        female/male-gänga), används för att säkerställa kompatibilitet med bromsok/ledningar.
    brake_lever_pull_type:
      name: Bromsspakens dragtyp
      description: Definierar vajerdragningsförhållandet/mekaniken som spaken är konstruerad
        för, vilket säkerställer kompatibilitet med specifika bromsok (t.ex. fälgbromsar
        med kort drag eller V-bromsar med långt drag).
    brake_light_switch_actuation_type:
      name: Typ av aktiveringsknapp för bromsljus
      description: Identifierar vilka fysiska händelser som aktiverar brytaren (pedal/kolv
        eller hydraultryck etc.).
    brake_light_switch_connector_type:
      name: Typ av anslutningsknapp för bromsljus
      description: Anger den elektriska anslutningsstil/format som används av bromsljusbrytaren
        för anslutning till fordonets kabelhärva.
    brake_light_switch_contact_type:
      name: Typ av kontaktknapp för bromsljus
      description: Elektrisk kontaktkonfiguration/beteende hos bromsljusbrytaren (t.ex.
        normalt öppen/sluten, växlande eller flerkrets).
    brake_light_switch_mounting_style:
      name: Monteringsstil för bromsljusbrytare
      description: Hur bromsljusbrytaren är monterad/installerad på fordonet eller
        bromssystemet (t.ex. gänga, clip-in, fäste, banjobult).
    brake_master_cylinder_mounting_type:
      name: Monteringstyp för huvudbromscylinder
      description: Hur huvudcylindern monteras på fordonet/bromsservon (bultmönster/flänstyp).
    brake_master_cylinder_reservoir_type:
      name: Reservtyp för huvudbromscylindrar
      description: Typ/konfiguration av bromsvätskebehållarens källa eller behov från
        huvudcylindern.
    brake_mount_type:
      name: Typ av bromsfäste
      description: Identifierar bromsgränssnittet som är inbyggt i gaffeln så att
        cyklister kan bekräfta bromssystemets kompatibilitet.
    brake_mounting_flange_bolt_pattern:
      name: Bultmönster för bromsmonteringsfläns
      description: Anger hål-/bultmönstret för monteringsflänsen som används för att
        fästa bromsplattan eller bromsoksfästet på släpvagnsaxeln (t.ex. 4-bults).
    brake_pad_backing_plate_material:
      name: Material för bromsbeläggens stödplatta
      description: Anger materialet i bromsbeläggets stödplatta, vilket påverkar värmeavledning
        och vikt.
    brake_pad_compatible_rotor_type:
      name: Bromsbeläggskompatibel rotortyp
      description: Anger den avsedda rotor-/skivyta som belägget är konstruerat för
        att fungera med.
    brake_pad_compound:
      name: Bromsbeläggsblandning
      description: Identifierar friktionsmaterialets formulering för ett bromsbelägg.
    brake_pad_form_factor:
      name: Bromsbeläggens formfaktor
      description: Anger det bromssystem/den formfaktor som bromsbelägget är avsett
        för (t.ex. skivbroms, trumbroms, parkeringsbroms).
    brake_pad_material:
      name: Bromsbeläggens material
      description: Anger den friktionsblandning/materialfamilj som används i bromsbelägget.
    brake_pad_shim_included:
      name: Bromsbeläggsskiva ingår
      description: Anger om ljudreducerande shims ingår eller är förmonterade.
    brake_pad_wear_indicator_type:
      name: Typ av slitageindikator för bromsbelägg
      description: Anger vilken typ av slitageindikator som ingår i bromsbeläggen
        (t.ex. mekanisk slitagevarnare eller elektronisk sensor).
    brake_position:
      name: Bromsläge
      description: Anger var på fordonet bromskomponenten är avsedd att monteras.
    brake_rotor_mount_type:
      name: Typ av bromsskivor
      description: Definierar gränssnittet som används för att fästa en bromsskiva
        till navet (om tillämpligt).
    brake_service_kit_components_included:
      name: Komponenter till bromsservicekit som ingår
      description: Lista över verktyg/adaptrar/förbrukningsartiklar som ingår i kitet.
    brake_shoe_friction_material:
      name: Bromsbackens friktionsmaterial
      description: Friktions-/beläggsmassan som används på bromsbacken (materialet
        som är i kontakt med trumman).
    brake_shoe_set_contents:
      name: Innehåll av bromsbackssats
      description: Vad ingår i paketet (t.ex. endast skor eller skor med utrustning/fjädrar).
    brake_system_type:
      name: Bromssystemtyp
      description: Anger den bromsmekanismteknik som används för att styra spolens
        rotation under kastning.
    brake_type:
      name: Bromstyp
      description: Typ av broms-/spännmekanism för varpbalk.
    brandy_age_classification:
      name: Ålderklassificering för brandy
      description: Kategoriserar brandy med hjälp av branschstandardiserade kvalitets-/åldersbeteckningar
        (t.ex. VS, VSOP, XO) som återspeglar minimikrav på lagring.
    brass_cleaning_tool_type:
      name: Typ av rengöringsverktyg för mässing
      description: Anger vilken typ av verktyg som används för att rengöra eller underhålla
        bleckblåsinstrument.
    brass_instrument_application_area:
      name: Användningsområde för bleckblåsinstrument
      description: Den/de del/delar av bleckblåsinstrumentet som desinfektionssprayen
        är avsedd att användas på.
    brass_instrument_care_kit_purpose:
      name: Syfte med kit för bleckblåsinstrument
      description: Beskriver det avsedda användningsscenariot för kitet (rutinunderhåll,
        djuprengöring, resor/nödsituationer, startkit för studenter, etc.).
    brass_instrument_case_shell_material:
      name: Skalmaterial för mässingsinstrumentfodral
      description: Det primära materialet i det styva skalet/ramen (i förekommande
        fall), separat från det vanliga väsk-/fodralmaterialet.
    brass_instrument_lubricant_additives_features:
      name: Tillsatser/egenskaper hos smörjmedel för bleckblåsinstrument
      description: Anmärkningsvärda egenskaper hos smörjmedelsformuleringen.
    brass_instrument_lubricant_base_composition:
      name: Smörjmedelsbas för bleckblåsinstrument
      description: Primär smörjmedelsbas/kemi som används för smörjmedel för bleckblåsinstrument.
    brass_instrument_lubricant_viscosity_grade:
      name: Viskositetsgrad för smörjmedel för mässingsinstrument
      description: Relativ tjocklek/flöde hos smörjmedlet avsett för bleckblåsinstrument.
    brass_instrument_replacement_part_type:
      name: Ersättningsdelar till bleckblåsinstrument
      description: Anger vilken typ av reservdel det är för bleckblåsinstrument (ventil/reglage/vattenklaviaturkomponenter,
        korkar/filt, skydd etc.).
    brass_instrument_valve_configuration:
      name: Konfiguration av ventil för mässingsinstrument
      description: Hur instrumentet ändrar tonhöjd (ventil-/slidemekanism).
    brass_lubricant_application_area:
      name: Applikationsområde för smörjmedel för mässing
      description: Bleckblåsinstrumentets mekanism som smörjmedlet är avsett för.
    brass_mouthpiece_backbore:
      name: Backbore-munstycke
      description: Munstyckets backbore-profil (form/storlek på hålet), påverkar ton
        och intonation.
    brass_mouthpiece_cup_depth:
      name: Munstyckets koppdjup
      description: Munstyckets koppdjupsklassificering (hur djup koppen är), vilket
        påverkar ton och respons.
    brass_polishing_cloth_abrasiveness_level:
      name: Slitstyrka för mässingspolerduk
      description: Indikerar hur aggressiv duken är för att ta bort missfärgningar
        eller att ge en mild glans.
    bread_crumb_base_ingredient:
      name: Basingrediens i brödsmulorna
      description: Indikerar den primära ingrediensen som smulorna är gjorda av, såsom
        vete, ris, fläsksvål eller mandel.
    bread_variety:
      name: Brödsort
      description: Anger stilen eller varianten av bröd eller bullar, vilket hjälper
        kunden att hitta specifika typer (t.ex. brioche, baguette, naan).
    breadstick_style:
      name: Brödpinnestil
      description: Identifierar brödpinnens specifika traditionella stil eller format.
    bridge_head_material:
      name: Brohuvudets material
      description: Material som exklusivt används för brygghuvudet, vilket påverkar
        vikt, känsla och hållbarhet.
    bridge_head_type:
      name: Typ av brygga
      description: Identifierar stilen på brygghuvudet och hjälper köpare att välja
        föredragna köutformningar.
    bridle_part_type:
      name: Typ av tränsdel
      description: Identifierar den specifika komponenten i tränset som ersättningsartikeln
        representerar, vilket hjälper kunder att hitta exakt den del de behöver.
    bridle_style:
      name: Tränsstil
      description: Klassificerar tränsets övergripande stil eller konstruktion så
        att ryttare snabbt kan hitta utrustning som passar deras behov eller disciplin.
    broadhead_field_point_attachment_style:
      name: Bredspets-/fältpunktsfäste
      description: Anger hur bredspetsen eller fältspetsen fästs vid pilskaftet.
    broadhead_thread_size:
      name: Bredspetsgängstorlek
      description: Listar gängspecifikationen som används för att fästa bredspetsen
        eller fältspetsen vid pilinsatsen eller skaftet.
    broadhead_tip_type:
      name: Typ av bredspets
      description: Definierar stilen på bredspetsens spets/hylsa som initierar penetration,
        vilket påverkar prestationen på olika vilt.
    broccoli_cut:
      name: Broccoliskuren
      description: Anger hur broccolin har skurits eller tillagats innan den förpackades
        (t.ex. helt huvud, buketter, riven).
    broccoli_variety:
      name: Broccolisort
      description: Identifierar den specifika sorten av broccoli (t.ex. Tenderstem,
        Romanesco).
    broom_head_material:
      name: Borsthuvudets material
      description: Anger materialsammansättningen i kvasthuvudet, vilket påverkar
        hållbarheten och spelegenskaper.
    brush_format:
      name: Penselformat
      description: Indikerar det fysiska formatet på en skid- eller snowboardborste,
        och skiljer mellan handhållna block och borrdrivna roterande format som rotoull-
        eller rotofiltcylindrar.
    brush_shape:
      name: Borstform
      description: Anger den fysiska formen eller profilen för borstkroppen eller
        -huvudet, vilket påverkar kontaktyta och hantering.
    brussel_sprout_preparation:
      name: Brysselkålsberedning
      description: Beskriver den fysiska beredningen eller skärningen av brysselkålen.
    brussels_sprout_variety:
      name: Brysselkålssort
      description: Anger sorten eller kultivaren av brysselkål, med hänsyn till nuvarande
        och framtida sorter.
    bubble_blower_features:
      name: Funktioner för bubbelblåsare
      description: Listar vanliga funktioner hos bubbelblåsare.
    bubble_gun_bubble_output_modes:
      name: Bubbelpistolens lägen
      description: Anger bubbelpistolens lägen, till exempel enbubbel, kontinuerlig
        eller flerhastighetsläge.
    bubble_machine_features:
      name: Detaljer för bubbelmaskin
      description: Främhäver vanliga funktioner hos bubbelmaskiner utöver vanlig drift.
    bubble_machine_items_included:
      name: Bubbelmaskinartiklar som ingår
      description: Listar viktiga artiklar som ingår i förpackningen (t.ex. bubbellösning,
        extra stavar, bärrem, fjärrkontroll).
    bubble_output_rate:
      name: Bubbelutgångshastighet
      description: Indikerar den ungefärliga/kvalitativa bubbelproduktionshastigheten
        för en bubbelblåsare (t.ex. låg/medel/hög), inklusive om produktionen är variabel.
    bubble_solution_container_type:
      name: Bubbellösningens behållartyp
      description: Anger hur bubbellösningen används med bubbelpistolen (t.ex. intern
        behållare, ansluten flaska, separat bricka/dopp).
    bubble_toy_included_accessories:
      name: Bubbelleksak inkluderade tillbehör
      description: Listar vanliga artiklar som medföljer bubbelleksaken (t.ex. lösningsflaska,
        bricka, reservstavar).
    buckwheat_processing_method:
      name: Bearbetningsmetod för bovete
      description: Beskriver den bearbetning som tillämpas på bovetet före försäljning
        (t.ex. rostat, groddat, puffat).
    buckwheat_product_form:
      name: Boveteproduktform
      description: Bovetespecifik fysisk presentation som inte omfattas av den allmänna
        listan (t.ex. flingor, puffar, snabbpåsar).
    bug_collecting_kit_items_included:
      name: Delar för insektsinsamling som ingår
      description: Verktyg och utbildningsmaterial ingår i ett bugginsamlingskit.
    built_in_storage_type:
      name: Inbyggd förvaringstyp
      description: Identifierar de typer av förvaring som är integrerade i våningssängens
        ram (t.ex. lådor, hyllor, trappförvaring).
    bumper_finish:
      name: Stötfångarens ytbehandling
      description: Anger vilken ytbeläggning eller finish som applicerats på stötfångaren.
    bumper_sensor_cutouts:
      name: Utskärningar för stötfångarsensorer
      description: Anger vilka OEM-assistansöppningar/urskärningar stötfångaren inkluderar
        eller stöder.
    bunk_bed_configuration:
      name: Våningssängskonfiguration
      description: Indikerar våningssängens strukturella layout och madrasstorlekskombination.
    buoyancy:
      name: Flytkraft
      description: Indikerar betets flytförmåga i vattenpelaren, såsom att flyta,
        sjunka eller hänga.
    burkini_pieces_included:
      name: Burkinidelar som ingår
      description: Listar burkinisetets delar, så att kunderna vet exakt vad de köper.
    burn_rate:
      name: Brinnhastighet
      description: Beskriver hur snabbt papper brinner när det väl tänts.
    bus_model_type:
      name: Bussmodelltyp
      description: Identifierar den verkliga busskonfigurationen/typen som representeras
        av skalmodellen (kropp/användningsklass).
    bust_design:
      name: Bystdesign
      description: Beskriver kroppsdräktens bystkonfiguration och halsringning (t.ex.
        öppen byst, inbyggd bh, urringning).
    butter_variety:
      name: Smörsort
      description: Anger produktionsstilen eller den distinkta typen av smör, såsom
        syrat smör, söt grädde, europeiskt smör, skirat smör (ghee) eller vasslesmör.
    buttermilk_variety:
      name: Kärnmjölkssort
      description: Identifierar den specifika stilen eller formen av kärnmjölk som
        säljs (t.ex. syrad, traditionell, pulveriserad).
    button_application:
      name: Knappapplicering
      description: Anger den avsedda användningen eller projekttypen för knappen (t.ex.
        kläder, möbelklädsel).
    button_attachment_type:
      name: Typ av knapp
      description: Anger knappens konstruktion för att fästa den på tyg (t.ex. genomsydda
        hål kontra skaft), inte stängningsstilen.
    button_finish:
      name: Knappfinish
      description: Beskriver ytfinish/utseende på knappen (t.ex. matt eller blank).
    buttonhole_elastic_application:
      name: Användning för knapphålsresår
      description: Primär avsedd användning för resårbandet med vikbar utsmyckning.
    cab_type:
      name: Typ av taxi
      description: Anger lastbilshyttens konfiguration.
    cabasa_construction_type:
      name: Typ av cabasakonstruktion
      description: Anger den fysiska konstruktionen/stilen för cabasahöljet och kedjan/pärlanordningen.
    cabbage_variety:
      name: Kålssort
      description: Identifierar sorten eller typen av kål (t.ex. grön, napa, savoykål)
        så att kunden kan filtrera efter smak, konsistens och kulinarisk användning.
    cabinet_door_style:
      name: Skåpdörrsstil
      description: Identifierar den visuella designen på skåpsdörrpanelen, till exempel
        Shaker-panel eller upphöjd panel, för att matcha kökets utseende.
    cabinet_overlay_type:
      name: Skåpöverlagringstyp
      description: Anger hur dörrarnas överlagring eller deras läge i förhållande
        till ramen.
    cable_end_type:
      name: Typ av kabelände
      description: Beskriver former eller stilen på vajerns ändnippel eller koppling
        som samverkar med broms- eller växelspakar.
    cable_housing_construction:
      name: Byggnation av kabelhus
      description: Beskriver husets strukturella utformning, såsom spirallindad, kompressionsfri
        eller segmenterad länk, som påverkar kompressionsmotstånd, flexibilitet och
        körkänsla.
    cable_housing_liner_type:
      name: Kabelhöljets fodertyp
      description: Anger om huset har ett invändigt foder och/eller smörjbehandling,
        och vilket material eller vilken teknik som används, vilket påverkar friktionsminskning
        och väderbeständighet.
    cable_management_type:
      name: Typ av kabelhantering
      description: Anger vilken typ av inbyggd kabel- eller strömhanteringsfunktioner
        som konferensbordet erbjuder.
    cable_surface_treatment:
      name: Hantering av kabelytor
      description: Identifierar eventuell specialbeläggning eller ytbehandling som
        applicerats på kabeln för minskad friktion eller korrosionsskydd.
    cabochon_back_type:
      name: Cabochonbaksida
      description: Indikerar cabochonens bakprofil/finish, vilket påverkar inställningar/limningsmetoder
        och kompatibilitet.
    cacao_bean_variety:
      name: Kakaobönsort
      description: Anger den botaniska sorten av den kakaoböna som används.
    cacao_roast_level:
      name: Kakaorostningsnivå
      description: Beskriver i vilken grad kakaon rostades före malning.
    cage_package_type:
      name: Förpackningstyp för bur
      description: Definierar vilka komponenter som ingår i köpet (t.ex. endast nät,
        ramkit, komplett paket).
    cajon_body_shell_material:
      name: Cajonkropp/skalmaterial
      description: Identifierar materialet i cajonkroppen/skalet (exklusive tapa).
    cajon_corner_control_system:
      name: Cajon hörnkontrollsystem
      description: Anger om cajonen har stöd för hörnljudsjustering (t.ex. hörnskruvar)
        för att variera slagresponsen.
    cajon_corner_edge_design:
      name: Hörn-/kantdesign på cajon
      description: Beskriver hörn-/kantkonstruktionen som påverkar komfort och spelbarhet.
    cajon_feet_type:
      name: Typ av cajonfötter
      description: Anger typen av fötter på cajonen, vilket påverkar stabilitet och
        resonans.
    cajon_snare_adjustability:
      name: Justerbarhet för cajonvirveltrumma
      description: Anger om och hur virveltrummeeffekten kan justeras (spänning, engagemang
        eller båda).
    cajon_snare_system_type:
      name: Typ av cajonvirveltrumma
      description: Anger den interna virveltrummekanism som används för att skapa
        effekten av en virveltrumma.
    cake_shape:
      name: Tårtformer
      description: Beskriver den fysiska formen i vilken kaffekakan bakas.
    cake_topping:
      name: Tårtdekoration
      description: Identifierar det primära övre lägret som applicerats på kaffekakan.
    cake_type:
      name: Typ av tårta
      description: Beskriver stilen eller varianten av kaka t.ex. pundkaka, sockerkaka,
        cheesecake).
    caliper_mount_type:
      name: Typ av bromsoksfäste
      description: Definierar ramen eller gaffelfäststandarden som bromsoket använder
        (t.ex. stolpmontering, platt montering).
    caliper_mounting_standard:
      name: Monteringsstandard för bromsok
      description: Anger monteringsgränssnittet/standarden (t.ex. platt montering,
        stolpmontering, IS, etc.) som används för att fästa bromsoket på ramen eller
        gaffeln.
    camera_mounting_location_vehicle_exterior:
      name: Kameramonteringsplattor (fordonets utsida)
      description: Där kameran/kamerorna är avsedda att monteras på fordonet (t.ex.
        grill, bakre del, sidospeglar).
    camouflage_environment_type:
      name: Typ av kamouflagemiljö
      description: Indikerar den primära miljön som kamouflagemönstret är utformat
        för, såsom skogsmark, öken eller träsk.
    camping_oil_application:
      name: Campingoljeapplicering
      description: Anger den primära avsedda användningen för oljan i campingsammanhang
        (t.ex. lyktbränsle eller köksbränsle).
    camshaft_construction:
      name: Kamaxelkonstruktion
      description: Tillverkning/blank stil på kamaxeln.
    camshaft_material:
      name: Kamaxelns material
      description: Primärmaterial för kamaxelns kärna/axel (basmaterial).
    camshaft_position:
      name: Kamaxelns position
      description: Anger kamaxelns avsedda plats/typ i motorn (t.ex. insug eller avgas,
        eller en specifik motorbank/position).
    candle_container_type_included:
      name: Ljushållartyp som ingår
      description: Anger vilken typ av ljushållare som ingår i kitet, om sådana finns.
    candle_dye_form:
      name: Färgämnesform för ljus
      description: Anger den fysiska formen av färgämne som används vid ljustillverkning.
    candle_fragrance_form:
      name: Doftämnesform för ljus
      description: Anger typen/formen av doftämne som används vid ljustillverkning.
    candle_making_tool_type:
      name: Typ av verktyg för ljustillverkning
      description: Identifierar vilken typ av ljustillverkningsverktyg produkten är
        (t.ex. hällkärl, vekecentreringsverktyg, termometer).
    candy_texture:
      name: Godiskonsistens
      description: Beskriver godisets känsla i munnen eller konsistensen, oberoende
        av smak eller form.
    candying_method:
      name: Godistillverkningsmetoden
      description: Beskriver hur frukten har kanderats eller konserverats med socker
        (t.ex. kristalliserats, glaserats, i sirap).
    canned_meat_form:
      name: Konserverad köttform
      description: Klassificerar den bearbetade formen eller presentationen av köttet
        i förpackningen.
    canoe_construction_type:
      name: Typ av kanotkonstruktion
      description: Skiljer mellan kanotskrov, som hårt skal, uppblåsbart och hopfällbart.
    canoe_hull_shape:
      name: Kanotens form
      description: Definierar skrovets primära tvärsnitt eller bottenprofil, vilket
        påverkar stabilitet och hantering.
    canoe_stern_design:
      name: Kanotens akterdesign
      description: Definierar skrovets akterstil, vilket påverkar motorkompatibilitet
        och hantering.
    canopy_type:
      name: Typ av baldakin
      description: Beskriver stilen på tältet eller överdraget som ingår i cabanasängen.
    canvas_compatible_media:
      name: Målardukens kompatibela media
      description: Anger vilka konst-/hantverksmedia som målarduken är avsedd att
        användas med.
    canvas_format:
      name: Målardukens format
      description: Anger om den utskrivbara duken säljs som ark, rullar eller färdigskurna
        paneler.
    canvas_mounting_format:
      name: Målardukens montering/format
      description: Fysiskt format/monteringsstil för målarduken.
    canvas_stretcher_assembly_type:
      name: Typ av montering av dukbår
      description: Anger om båren säljs monterad som en ram eller som stänger/kit
        som kräver montering.
    canvas_stretcher_corner_joint_type:
      name: Hörnfogstyp för målarduk
      description: Hur hörnen är sammanfogade/konstruerade (t.ex. kilramar, spännramar).
    canvas_surface_tone:
      name: Målardukens ytfärg
      description: Nyans/färg på den grundmålade dukytan, inte något tryckt mönster
        eller design (t.ex. vit, svart, tonad).
    canvas_weave_type:
      name: Målardukens vävtyp
      description: Beskriver dukens vävkonstruktion, vilket påverkar textur och färghantering.
    cap_attachment_style:
      name: Kepsfästestil
      description: Anger konstruktionen/fästningsstilen för en saxofonmunstyckeskapsel,
        vilket kan påverka skydd och fodralets passform.
    cap_construction:
      name: Kepskonstruktion
      description: Anger hur perukmössan är konstruerad (t.ex. spetsframsida, hel
        spets, handknuten), vilket påverkar hur naturlig den ser ur, komfort och stylingmöjligheter.
    cap_crown_structure:
      name: Mössans kronstruktur
      description: Anger om mössans krona är strukturerad (förstyvad) eller ostrukturerad
        (mjuk).
    cap_fit_type:
      name: Typ av kepspassform
      description: Definierar hur mössan passar eller justeras på bärarens huvud (t.ex.
        åtsittande eller justerbar).
    cap_seal_type:
      name: Typ av locktätning
      description: Anger den tätningskomponent som används för att förhindra oljeläckage
        och ångutsläpp (t.ex. O-ring, packning).
    cap_size:
      name: Lockstorlek
      description: Standardstorleksbeteckningar som indikerar perukkåpans passform
        för huvudstorlek.
    cap_type:
      name: Typ av keps
      description: Typ av fäste på locket/förslutningen som används på överfyllnadstanken.
    caper_size_grade:
      name: Kaprisens storlekskvalitet
      description: Klassificerar kapris efter branschstandardiserade kvalitetsnamn
        som motsvarar knoppdiameter.
    capo_clamping_mechanism:
      name: Capo-klämmekanism
      description: Anger den kläm-/aktiveringsstil som används för att applicera tryck
        på strängen (hur capotaston används).
    capo_finish:
      name: Capotastons ytfinish
      description: Ytfinishen på capotastokroppen (visuell/känsla), oberoende av färg
        (t.ex. matt eller blank).
    capo_fit_type:
      name: Capotastons passform
      description: Anger halsprofilen som capotaston är utformad för att passa (inklusive
        radie/planhet), vilket påverkar surrfri fastspänning och intonation.
    capo_pad_material:
      name: Capo-dynans material
      description: Anger materialet på kontaktplattan som vidrör greppbrädan/strängarna
        (påverkar grepp, stämningsstabilitet och potentiell ytmarkeringar).
    capo_tension_mechanism:
      name: Capotastons spänningsmekanism
      description: Anger hur tryck/spänning appliceras och justeras på strängen för
        en glidande capo.
    capture_method:
      name: Infångningsmetod
      description: Anger om fällan är avsedd för levande fångst eller dödlig åtgärd.
    car_ev_conversion_kit_motor_type:
      name: Konverteringskit för elbilar motortyp
      description: Anger den traktionsmotorteknik som ingår eller behövs i kitet (t.ex.
        AC-induktion eller permanent magnet).
    car_playset_items_included:
      name: Artiklar för billekset som ingår
      description: Listar viktiga komponenter som ingår i billeksetet utöver basstrukturen
        (t.ex. bilar, figurer, skyltar).
    car_shampoo_application_method:
      name: Appliceringsmetod för bilschampo
      description: Hur schampot är avsett att appliceras under tvätt.
    car_wash_solution_form:
      name: Biltvättlösningens form
      description: Anger den fysiska formen på bilrengöringen (t.ex. vätska, skum,
        våtservetter).
    car_wash_solution_scent:
      name: Bilrengöringens doft
      description: Anger doften/aromen på bilrengöringen (om den är parfymerad).
    carbonated_water_variety:
      name: Kolsyrat vattensort
      description: Klassificerar kolsyrat vatten baserat på vanliga märkvärden och
        sammansättning (t.ex. tonic, seltzer, funktionellt kolsyrat vatten).
    carbonation:
      name: Kolsyra
      description: Beskriver nivån eller typen av kolsyra i drycken (t.ex. ej kolsyrat,
        lätt kolsyrat, kolsyrat, nitro).
    carburetor_barrel_count:
      name: Antal förgasarrör
      description: Anger antalet spjällhål/rör i förgasaren.
    carburetor_choke_type:
      name: Förgasarchoketyp
      description: Indikerar vilken chokemanövreringsstil som förgasaren använder.
    carburetor_mounting_flange_type:
      name: Förgasarens monteringsflänstyp
      description: Anger förgasarens monteringsgränssnittsstil för att säkerställa
        passform med insug/grenrör (t.ex. tapp kontra fläns-/bultmönster).
    card_binder_page_type:
      name: Kortpärmens sidtyp
      description: 'För pärmar/portföljer: samma sidstil som användas för butikssålda
        kort.'
    card_box_holder_type:
      name: Typ av kortlåda/behållare
      description: Anger produktens funktionella formfaktor för att samla eller förvara
        kort vid evenemang (t.ex. låda, brevlådeliknande låda, korg, stativ).
    card_game_accessory_features:
      name: Funktioner hos kortspelstillbehör
      description: Anmärkningsvärda funktioner hos kortspelstillbehör.
    card_lot_type:
      name: kortlottyp
      description: Anger om produkten är ett enkelt kort eller ett parti/sortiment
        med flera kort.
    card_sleeve_size_format_compatibility:
      name: Kortfodralets storlek/formatkompatibilitet
      description: Anger den/de kortlek(ar) som fodralen/sidorna/kortlekslådorna är
        utformade för att passa.
    carding_surface_pin_material:
      name: Kardningsytans nålmaterial
      description: Materialet i nålarna/tänderna som används för att öppna fibern.
    care_durability:
      name: Hållbarhet
      description: Anger förväntad hållbarhet för tvätt/värme för etiketten efter
        applicering.
    care_label_attachment_type:
      name: Typ av fäste för etiketten
      description: Hur etiketten är utformad för att appliceras på artikeln (t.ex.
        sy-i-söm, stryk-på-/värmeöverföringar, självhäftande).
    care_label_format:
      name: Etikettens format
      description: Det fysiska/tryckta formatet för etiketten.
    care_label_symbol_system:
      name: Etikettens symbolsystem
      description: Standarderna/symbolerna som används på etiketten (t.ex. ISO-vårdsymboler,
        ASTM/US-symboler).
    cargo_area_configuration:
      name: Lastutrymmeskonfiguration
      description: Anger den strukturella stilen eller platsen för lastutrymmet på
        en godscykel (t.ex. longtail, frontlastare, trehjuling).
    cargo_net_adjustability:
      name: Lastnätets justerbarhet
      description: Anger om och hur lastnätet kan justeras för spänning/passform.
    cargo_net_position:
      name: Lastnätets position
      description: Var i bagageutrymmet nätet är avsett att monteras eller användas.
    cargo_net_stretch_type:
      name: Lastnätets stretchtyp
      description: Huruvida bagagenätet är elastiskt/töjbart eller fast/ej töjbart.
    cargo_net_style:
      name: Lastnätsstil
      description: Anger lastnätets konstruktionsstil eller formfaktor (t.ex. elastisk
        lina, vävband, barriär, hängmatta).
    cargo_rack_finish:
      name: Lasthyllans ytfinish
      description: Utvändig ytbehandling/beläggning av lasthyllan.
    carpet_cleaner_application_method:
      name: Appliceringsmetod för mattrengöring
      description: Anger det avsedda sättet som produkten ska appliceras och bearbetas
        på mattan (utöver den allmänna formen).
    carrier_style:
      name: Lastarens stil
      description: Bärmekanismen/typen som används för att stödja båten på fordonet.
    carrot_size:
      name: Morotsstorlek
      description: Klassificerar den allmänna storleken på morotsprodukten.
    carrot_variety:
      name: Morotssort
      description: Identifierar den specifika sorten av morot.
    carrying_capacity_pairs_boards:
      name: Bärförmåga (par/brädor)
      description: Anger hur många skidor (par) eller snowboards ett tillbehör möjliggör
        eller är avsett att stödja när det används med hyllan (t.ex. förlängningskit).
    cartridge_thread_compatibility:
      name: Kompatibilitet med hylstråd
      description: Indikerar trådstandarden som en vaporizer eller batteri har stöd
        för, vilket säkerställer att hylsor och batterier är fysiskt kompatibla.
    case_capacity_butts_shafts:
      name: Fodralets kapacitet (ändar × skaft)
      description: Definierar hur många köändar och -skaft som fodralet rymmer, uttryckt
        i formatet ände gånger skaft (t.ex. 2x4 = 2 ändar och 4 skaft).
    case_features:
      name: Detaljer för fodral
      description: Framhäver funktionella egenskaper hos cymbal-/trumsetet relaterade
        till skydd och transport.
    case_humidifier_refill_type:
      name: Påfyllningstyp för luftfuktarfodral
      description: Anger om luftfuktaren använder återanvändbar (återfuktningsbar/regenererbar)
        media eller utbytbara engångpåfyllningar.
    case_lining_material:
      name: Fodralets fodermaterial
      description: Identifierar det primära materialet på insidan av fodralet eller
        väskan som är i kontakt med och skyddar instrumentet eller innehållet.
    case_material:
      name: Fodralets material
      description: Identifierar klockans primära material, vilket påverkar hållbarhet,
        vikt och utseende.
    case_mounting_method:
      name: Lådans monteringsmetod
      description: Hur luftfuktaren är avsedd att placeras eller fästas inuti instrumentet.
    case_structure:
      name: Fodralstruktur
      description: Indikerar styvheten i lådakonstruktionen.
    case_style_cymbal_drum:
      name: Fodralstil (cymbal/trumma)
      description: Anger om produkten är en mjuk väska, en hård väska eller en hybriddesign
        för transport av cymbaler eller trumset.
    casing_material:
      name: Skalmaterial
      description: Identifierar det primära materialet som används i däckhöljet, vilket
        påverkar vikt, åkkänsla och punkteringsskydd.
    casino_set_chip_material:
      name: Kasinoset med spelmarkörer
      description: Primärt material för de medföljande spelmarkörerna (om tillämpligt).
    casino_set_layout_included:
      name: Spelyta som ingår i kasinosetet
      description: Anger vilken typ av spelyta som ingår i setet.
    cask_finish:
      name: Fatyta
      description: Anger det fat eller den tunna som används för att färdigställa
        eller mogna spriten, till exempel ett bourbonfat eller sherryfat.
    cassava_variety:
      name: Kassavasort
      description: Identifierar den specifika sorten av yuca/kassava som erbjuds,
        vilket påverkar smak, färg och tillagningsegenskaper.
    cassette_body_type:
      name: Kassettkroppstyp
      description: Frinav eller drivhjulsstandard som baknavet eller hjulet accepterar
        (t.ex. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Funktioner för kassettdäck
      description: Indikerar kassettransport- och uppspelningsfunktioner som är vanliga
        för inbyggda kassettspelare.
    cassette_speed_compatibility:
      name: Kompatibilitet med kassetthastighet
      description: Anger antalet växlar (t.ex. 7-växlad, 12-växlad) som kassetten
        eller frihjulet är konstruerat för att fungera med, vilket säkerställer kompatibilitet
        med kedja, växel och kedjeväxel.
    castanet_shell_size_class:
      name: Kastanjetternas skalstorleksklass
      description: Standardiserad storleksklass för kastanjettskal, som vanligtvis
        används av spelare/lärare för att välja passform och ton.
    castanets_included_pieces:
      name: Delar som ingår med kastanjetter
      description: Anger vad som ingår i produktebjudandet (par eller enkla, extra).
    castanets_pitch:
      name: Kastanjetton
      description: Indikerar den vanliga tonhöjds-/storleksbeteckningen som tillverkare
        använder för att beskriva ljudomfånget.
    castanets_type:
      name: Typ av kastanjetter
      description: Anger kastanjetternas stil eller avsedda användningskategori.
    caster_type:
      name: Hjultyp
      description: Identifierar typen av hjul som är monterade på vagnen (t.ex. vridbara,
        låsbara), vilket påverkar användandet och stabiliteten.
    castle_playset_included_items:
      name: Slottsleksetets inkluderade artiklar
      description: Samlar in de viktigaste komponenterna som ingår i slottsleksetet,
        så att kunder kan jämföra set (t.ex. figurer, möbler, fordon, tillbehör).
    catcher_equipment_included:
      name: Catcher-utrustning som ingår
      description: Anger de komponenter som ingår i catcher-utrustning, som en catcher-hjälm
        eller ett bröstskydd.
    catcher_helmet_style:
      name: Catcher-hjälmstil
      description: Indikerar den övergripande designstilen för catcherns hjälm.
    cattle_breed:
      name: Boskapsras
      description: Identifierar den nötkreatursras som nötköttet kommer från (t.ex.
        Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Blomkålssort
      description: Identifierar sort, färg eller specialsort för den blomkål som säljs.
    celery_form:
      name: Selleriform
      description: Anger den fysiska formen eller skurna stilen i vilken sellerin
        säljs.
    celery_variety:
      name: Sellerisort
      description: Registrerar den specifika sorten av selleri, vilket gör det möjligt
        för kunden att välja efter smakprofil, färg eller kulinarisk användning.
    cereal_bar_texture:
      name: Müslibarens konsistens
      description: Beskriver munkänslan och konsistensen hos müslibaren (t.ex. seg,
        krispig).
    cereal_type:
      name: Typ av flingor
      description: Klassificerar formen eller formatet på flingor eller granola (flingor,
        puffar, granolakluster, müsli, etc.) för att hjälpa kunder att hitta en föredragen
        konsistens eller tillagningsmetod.
    certificate_border_style:
      name: Certifikatets kantstil
      description: Beskriver den dekorativa kantbehandlingen som används på certifikatet.
    certificate_personalization_type:
      name: Typ av certifikatanpassning
      description: Anger hur certifikatet kan anpassas (tomt för handskrift, utskrivbar
        mall, förtryckt med olika fält, etc.).
    certification_service:
      name: Certifieringstjänst
      description: Graderings-/certifieringsföretag från tredje part (om tillämpligt).
    certification_standard:
      name: Certifieringsstandard
      description: Anger den säkerhets- och brandskyddscertifiering eller efterlevnadsstandard
        som balaklavan är klassad för att uppfylla.
    chain_coating_finish:
      name: Kedjebeläggning/ytfinish
      description: Anger all ytbehandling som applicerats på kedjan för att förbättra
        hållbarheten, minska friktion, förhindra korrosion eller förändra utseendet
        (t.ex. Ti-nitrid, DLC, nickel, rostskyddande EPT).
    chain_connection_type:
      name: Kedjekopplingstyp
      description: Anger den stängningsmetod som tillhandahålls eller krävs för att
        sammanfoga ändarna av kedjan.
    chain_tier_configuration:
      name: Kedjenivåkonfiguration
      description: Anger antalet/arrangemanget av kedjenivåer i kedjehålen (enkel-,
        dubbel- eller trippelnivå).
    chain_tool_type:
      name: Kedjeverktygstyp
      description: Klassificerar den specifika typen av verktyg för cykelkedjor så
        att kunden snabbt kan hitta rätt enhet.
    chainring_shape:
      name: Cykeldrevets form
      description: Indikerar kedjedrevets form, såsom runt eller ovalt/elliptiskt.
    chair_accessories_included:
      name: Stoltillbehör som ingår
      description: Listar inbyggda eller inkluderade tillbehör som förbättrar en stols
        funktionalitet.
    chair_sash_care_instructions:
      name: Instruktioner för skötsel av stolsrosett
      description: Beskriver rekommenderad rengörings-/underhållsmetod för stolsrosetten.
    chair_sash_finish:
      name: Stolsrosettens ytfinish
      description: Beskriver tygets ytglans/ytfinish.
    chair_storage_design:
      name: Design av stolsförvaring
      description: Anger hur stolen är avsedd att användas (t.ex. hopfällbar, stapelbar,
        icke-hopfällbar) för att hjälpa kunden att bedöma förvaring och bärbarhet.
    chaise_or_sectional_orientation:
      name: Schäslong- eller sektionsorientering
      description: Anger den sida på vilken en integrerad schäslong eller förlängd
        sektion är placerad när du är vänd mot soffan.
    chamber_size:
      name: Kammarens storlek
      description: Indikerar munstyckets kammarvolym, vilket påverkar motstånd och
        tonart.
    chanter_finger_spacing:
      name: Avstånd mellan fingrarna på övningssångare
      description: Indikerar fingeravståndet/storlekprofilen på övningssångaren (beskrivs
        ofta som standard, små händer eller stora händer).
    chanter_type:
      name: Typ av chanter
      description: Den spelsstil/konfiguration som ingår i instrumentet (eller används
        av instrumentet), såsom öppen, sluten, övnings- eller tangentförstärkt.
    chard_variety:
      name: Mangoldsort
      description: Identifierar den specifika sorten eller färgvarianten av mangold
        som säljs.
    charging_port_location:
      name: Laddningsportens placering
      description: Fysiska plats för fordonets primära externa laddningsuttag (laddningsport).
    chassis_construction_type:
      name: Typ av chassikonstruktion
      description: Beskriver den primära chassikonstruktionsmetoden som används för
        fordonet.
    checkbook_loading_orientation:
      name: Orientering för checkhäftet
      description: Anger om checkhäftets utsida är kompatibelt med checkformaten toppladdad,
        sidladdad eller universella.
    cheekpiece_style:
      name: Kindbettsstil
      description: Definierar typen av kind-/ringskonfiguration på bettet, vilket
        avgör tygelfunktionen och sidostabiliteten.
    cheese_alternative_form:
      name: Alternativ ostform
      description: Anger den fysiska formen eller styckningsstorleken i vilken ostalternativet
        säljs.
    cheese_form:
      name: Ostform
      description: Beskriver den fysiska presentationen av ostprodukten (t.ex. hjul,
        block, skivad, strimlad).
    cheese_texture:
      name: Ostkonsistens
      description: Klassificerar osten efter dess allmänna konsistens eller fasthet.
    cheese_variety:
      name: Ostsort
      description: Identifierar vilken typ av ost som används som primär smaksättning
        i mellanmålet.
    cherimoya_variety:
      name: Kirimojasorten
      description: Identifierar den specifika sorten av kirimoja (t.ex. Fino de Jete,
        El Bumpo).
    cherry_variety:
      name: Körsbärssort
      description: Anger körsbärssorten, vilket hjälper kunden att välja specifika
        typer kända för sin smak, färg, storlek eller avsedda kulinariska användning.
    chest_pocket_style:
      name: Bröstficksstil
      description: Anger närvaron och konfigurationen av bröstfickor på skjortan.
    chewing_tobacco_form:
      name: Tuggtobaksform
      description: Identifierar den fysiska formen, skärstilen eller påsens storlek
        på tuggtobaksprodukten (t.ex. lösa blad, långskuren, smal påse).
    chicory_variety:
      name: Cikoriasort
      description: Identifierar den specifika sorten av cikoria som säljs (t.ex. radicchio,
        belgisk endiv, escarole).
    chiffon_recommended_use:
      name: Rekommenderad användning av chiffong
      description: Primära rekommenderade sömnads-/hantverksanvändningar för chiffongtyg.
    child_seat_accessory_type:
      name: Tillbehörstyp för barnstol
      description: Definierar den specifika typen av tillbehör eller reservdel till
        barnstol (t.ex. sittdyna, fotstöd, monteringsadapter), vilket gör att kunderna
        snabbt kan begränsa resultaten till den artikel de behöver utan att behöva
        skapa flera mikrokategorier.
    child_seat_mounting_type:
      name: Monteringstyp för barnstol
      description: Anger hur cykelbarnstolen fästs på ramen, pakethållaren eller sätet.
    chime_sound_character:
      name: Klockljudkaraktär
      description: Beskriver den avsedda ljudkaraktären/klangfärgen för klockspelen.
    chin_cup_type:
      name: Hakskyddstyp
      description: Anger stilen eller konstruktionen på hakskyddet, vilket påverkar
        komfort och skyddsförmåga.
    chin_strap_type:
      name: Hakremstyp
      description: Anger typen av hakrem på en mössa, ingen, fast, justerbar eller
        avtagbar, för att hjälpa kunder att välja modeller som sitter säkert i blåsiga
        eller aktiva förhållanden.
    china_cymbal_edge_shape:
      name: Kantform på kinacymbaler
      description: Beskriver den kant-/flänsprofil som är typisk för kinacymbaler
        (hur uppåtböjd kanten är), vilket påverkar känsla och ljud.
    china_cymbal_sound_character:
      name: Kinacymbalernas ljudkaraktär
      description: Primär ljud-/tonkaraktärsbeskrivning för en kinacymbal som används
        för upptäckt och filtrering (t.ex. mörk, ljus). Flera värden kan gälla.
    chinstrap_type:
      name: Hakremstyp
      description: Hakrem av samma typ som medföljer hjälmen.
    chip_cut_style:
      name: Chipsens form
      description: Anger chipsens fysiska textur (t.ex. räfflade, poppade).
    chip_denomination:
      name: Spelmarkörernas värden
      description: Vilka värden som ingår i uppsättningen (tryckta eller tilldelade).
    chocolate_form:
      name: Chokladform
      description: Beskriver den fysiska formen i vilken bakchokladen säljs.
    choy_sum_variety:
      name: Blomsellerikålsort
      description: Identifierar den specifika marknaden eller botaniska varianten
        för den blomsellerikål som säljs.
    cigar_wrapper_color:
      name: Cigarrhöljets färg
      description: Standard färgklassificering av cigarrens hölje.
    cigarette_filter_type:
      name: Cigarettfiltertyp
      description: Anger om cigaretten har ett filter och, i så fall, filtrets konstruktion
        eller speciella egenskap.
    cigarette_size:
      name: Cigarettstorlek
      description: Klassificerar cigaretter efter branschstandardiserad längd- eller
        formatterminologi (t.ex. king, 100s, smala).
    cigarette_strength_descriptor:
      name: Cigarettstyrka beskrivning
      description: Marknadsföringsetikett som traditionellt används av varumärken
        för att indikera tjära/nikotinintensitet (t.ex. Light, Bold, Silver).
    cinch_liner_material:
      name: Gjordfodrets material
      description: Identifierar materialet som används till fodret eller vadderingen
        som ligger mot hästen.
    circular_knitting_needle_cable_type:
      name: Rundstickor av kabeltyp
      description: Kabelmaterial och konstruktion (t.ex. belagt stål, nylon), som
        påverkar kinking och vridning.
    circular_knitting_needles_tip_material:
      name: Materialet i spetsen på rundstickor
      description: Materialet i de två nålspetsarna (till skillnad från kabelmaterialet).
    circumference_adjustment_mechanism:
      name: Mekanism för justering av omkrets
      description: Mekanism som används för att justera eller låsa nystanets omkrets.
    clamp_design:
      name: Klämkonstruktion
      description: Beskriver klämmans struktur eller mekanism.
    clamp_sheet_music_clip_features:
      name: Funktioner hos notklämma
      description: Funktionella och skyddande egenskaper hos notklämmorna (t.ex. utfyllnad,
        halkfri, vridbar).
    clamping_closure_type:
      name: Kläm-/stängningstyp
      description: Anger mekanismen som används för att dra åt eller fästa broderiramen
        runt tyget.
    clarinet_bell_acoustic_design:
      name: Akustisk design för klarinettklocka
      description: Beskriver klockans ljud-/ventilationsdesign som påverkar respons
        och intonation.
    clarinet_bell_adjustment_mechanism:
      name: Justeringsmekanism för klarinettklocka
      description: Beskriver hur klocklängden/geometrin justeras.
    clarinet_bell_ring_material:
      name: Klarinettklockans material
      description: Anger materialet i skyddsringen/bandet på klarinettklockans kant,
        om sådan finns.
    clarinet_bell_tuning_effect:
      name: Klarinettklockans stämningseffekt
      description: Indikerar hur klockan är utformad för att påverka stämning/intonation
        (särskilt halstoner och lågt register) jämfört med en vanlig klocka.
    clarinet_body_type:
      name: Typ av klarinettkropp
      description: Indikerar den primära kroppskonstruktionen för A-klarinetten.
    clarinet_bore_type:
      name: Klarinettrörtyp
      description: Beskriver rördesignen på altklarinetten.
    clarinet_cap_style:
      name: Klarinettkapselstil
      description: Designstil på kapseln som ingår i en klarinettligatur och/eller
        munstyckeskapsel (t.ex. inverterad eller ventilerad).
    clarinet_care_kit_intended_use:
      name: Underhållskit för klarinett och avsedd användning
      description: Primärt användningssammanhang som kitet är utformat för (t.ex.
        snabb daglig torkning kontra djuprengöring/underhåll).
    clarinet_included_accessories:
      name: Klarinettillbehör som ingår
      description: Identifierar vad som medföljer i förpackningen med Bb-klarinetten.
    clarinet_keywork_material:
      name: Klarinettklaffarnas material
      description: Anger materialet i klarinettens klaffmekanism (t.ex. mässing, silver,
        silverpläterad).
    clarinet_keywork_plating:
      name: Tangentlackering klarinett
      description: Anger plätering/materialfinish på klarinettklaffarna.
    clarinet_mouthpiece_baffle_profile:
      name: Klarinettmunstyckets baffelprofil
      description: Beskriver den inre takprofilen på klarinettmunstycket, som påverkar
        ljudstyrka och projektion.
    clarinet_mouthpiece_beak_shape:
      name: Klarinettmunstyckets näbbform
      description: Anger den yttre näbbprofilen/vinkeln för spelarkomfort och embouchure-känsla.
    clarinet_mouthpiece_chamber_size:
      name: Storlek på klarniettens munstycke
      description: Beskriver den relativa kammarstorleken hos ett klarinettmunstycke
        (enligt tillverkarens specifikation), vilket kan påverka tonfärg och spelmotstånd.
    clarinet_mouthpiece_intended_tone:
      name: Avsedd ton för klarinettmunstycket
      description: Beskriver den avsedda tonen för munstycket.
    clarinet_mouthpiece_player_level:
      name: Klarinettmunstyckets spelarnivå
      description: Indikerar den typiska användarnivån för munstycket.
    clarinet_reed_cut:
      name: Klarinettrörsskärning
      description: Anger rörbladets skärning/profil (t.ex. filad eller ofilad och
        andra markerade skärstilar), vilket påverkar respons och ton.
    clarinet_reed_material_type:
      name: Klarinettrörets materialtyp
      description: Anger vad röret är gjort av (rör eller syntetiskt och vanliga syntetiska
        undertyper).
    clarinet_thumb_rest_type:
      name: Klarinettens tumstödstyp
      description: Typ/egenskap hos tumstödet.
    classical_guitar_string_3rd_string_type:
      name: Klassisk gitarrsträng 3:e strängtyp
      description: Huruvida G-strängen (3:e) är slät (monofilament) eller lindad.
    classical_guitar_string_bass_winding_material:
      name: Klassisk bassträng lindningsmaterial
      description: Lindningsmaterialet som används på bassträngar (typiskt sträng
        4-6).
    classical_guitar_string_set_configuration:
      name: Klassisk gitarrsträngskonfiguration
      description: Anger om produkten är ett komplett set eller en specifik sträng
        (vanligtvis diskant- eller bassidan) för en klassisk gitarr.
    clay_modeling_dough_base_material:
      name: Basmaterial för lera och modelleringsdeg
      description: Primär formulering/bastyp för modelleringsmaterialet.
    clay_modeling_dough_curing_method:
      name: Metod för härdning av lera och modelleringsdeg
      description: Hur materialet härdar (eller förblir återanvändbart), vilket avgör
        vilka verktyg som behövs och typisk användning.
    clay_paintability:
      name: Möjlighet att måla leran
      description: Anger om den härdade lerytan kan målas och vilka färgtyper som
        rekommenderas.
    clay_primary_composition:
      name: Lerans primära sammansättning
      description: Primärt basmaterial/bindemedel i den lufttorkade leran (t.ex. papper-/mineralbaserad).
    clay_shooting_discipline:
      name: Lerskyttedisciplin
      description: Identifierar den lerskyttedisciplin eller evenemang som produkten
        är avsedd för.
    cleaner_format:
      name: Rengöringsmedlets format
      description: Produktens förpackningsmaterial/format.
    cleaner_sanitizer_intended_area:
      name: Avsett område för rengöring/desinfektion
      description: Den primära delen av bleckblåsinstrumentet som produkten är avsedd
        att rengöra/sanera.
    cleaning_formula:
      name: Rengöringsformel
      description: Anger produktens primära rengörings-/desinfektionskemifamilj (inte
        märke) för filtrering efter säkerhet, kompatibilitet och användning.
    cleaning_task_focus:
      name: Städuppgift
      description: Identifierar de primära rengöringsproblem som den vattenfria tvätten
        är avsedd att åtgärda.
    cleanup_method:
      name: Rengöringsmetod
      description: Anger hur limmet är avsett att avlägsnas (medan det är vått) från
        händer/verktyg/ytor.
    clear_glue_application_method:
      name: Genomskinlig limappliceringsmetod
      description: Anger applikatorstilen som ingår i förpackningen.
    clear_glue_finish_after_drying:
      name: Ytfinish på det genomskinliga limmet (efter torkning)
      description: Beskriver limmets utseende när det har torkat/härdat (t.ex. klart
        eller genomskinligt, blankt eller matt).
    cleat_bolt_pattern:
      name: Broddmönster
      description: Anger skons broddkonfiguration som används för att fästa broddarna,
        vilket avgör pedal- och skokompatibilitet (t.ex. 2-broddig MTB eller 3-broddig
        väg).
    cleat_compatibility:
      name: Kompatibel med klossar
      description: Anger vilka pedal- eller broddystem skoskyddet passar till.
    cleat_finish:
      name: Broddyta
      description: Anger ytbehandlingen/beläggningen på broddarna, vilket påverkar
        korrosionsbeständighet och utseende.
    cleat_receptacle_system:
      name: Klossfästesystem
      description: Identifierar det kompatibla gränssnittet för spik-/klossfästen
        som används på spikade golfskor.
    cleat_release_mechanism:
      name: Mekanism för att ta av broddarna
      description: Anger broddarna tas av pedalen (t.ex. enkel frigöring eller flerriktad
        frigöring).
    cleat_stud_type:
      name: Typ av kloss/dubb
      description: Anger konstruktionen eller fästsättet för dubbar/broddar på yttersulan
        på amerikanska fotbollsskor.
    climate_control_module_function:
      name: Klimatkontrollmodulernas funktion
      description: Anger den primära rollen för modulen i fordonets HVAC-system.
    climbing_hold_mounting_type:
      name: Monteringstyp för klättergrepp
      description: Anger hur greppet är fäst vid väggen eller träningsbrädan.
    climbing_hold_type:
      name: Typ av klätterfäste
      description: Kategoriserar form eller stilen på greppet som definierar hur man
        greppar det.
    climbing_protection_device_type:
      name: Typ av enhet för klättringsskydd
      description: Anger typen av skyddsenhet (t.ex. kam, mutter, piton), vilket hjälper
        klättrare att snabbt välja rätt utrustning för en given klipptyp eller klätterstil.
    climbing_rope_middle_marking:
      name: Klätterrepets mittmarkering
      description: Beskriver hur repets mittpunkt (och/eller ändar) identifieras för
        att underlätta säker firning och nedfirning.
    climbing_rope_treatment:
      name: Hantering av klätterrep
      description: Indikerar eventuell vattenavvisande, torr eller skyddande ytbehandling
        som applicerats på repets utsida och/eller kärna.
    climbing_rope_type:
      name: Typ av klätterrep
      description: Klassificerar repet efter UIAA-certifiering och avsedd användning
        (t.ex. dynamisk enkel, halv, dubbel, statisk, tillbehörslina), vilket gör
        att kunderna snabbt kan hitta rätt rep för sin aktivitet.
    climbing_safety_certifications:
      name: Säkerhetscertifieringar för klättring
      description: Listar de klättrings- och industriella säkerhetsstandarder som
        enheten uppfyller.
    clip_color:
      name: Klämmans färg
      description: Notklämmans primära färg.
    clip_mechanism_type:
      name: Typ av klämmekanism
      description: Definierar fästmekanismen som används av en sedelhållare eller
        sedelhållarplånbok, vilket hjälper kunder att välja mellan magnetisk, fjäderstångs-,
        hävstångs- och andra stilar.
    clip_style:
      name: Klämmans stil
      description: Identifierar den specifika klämmekanismen som används för att fästa
        hållaren och ger kompatibilitetsinformation (t.ex. krokodilklämma, karbinhake).
    clipper_motor_technology:
      name: Klippmaskinenens motorteknik
      description: Identifierar motorkonstruktionen som används i klippmaskinen, vilket
        påverkar dess kraft, ljud, hållbarhet och underhåll.
    closet_configuration:
      name: Garderobskonfiguration
      description: Definierar den övergripande formen eller layouten i garderobrumssystemet
        (t.ex. L-format, U-format, ö).
    closing_mechanism:
      name: Stängningsmekanism
      description: Anger lådans stängningsfunktion, till exempel standard, mjukstängning,
        självstängande eller tryck-för-att-öppna.
    cloth_construction:
      name: Textilkonstruktion
      description: Indikerar tygets väv eller yta, som påverkar hastighet och hållbarhet
        (t.ex. kamgarn eller ull).
    cloth_thickness:
      name: Tygets tjocklek
      description: Anger polerdukens tjocklek/viktklass.
    club_head_material:
      name: Klubbhuvudets material
      description: Anger det huvudsakliga materialet som används vid konstruktionen
        av klubbhuvudet.
    clutch_hydraulic_system_type:
      name: Kopplingens hydraulsystemtyp
      description: Indikerar kompatibilitet mellan kopplingsmanövrering/hydraulsystem
        (t.ex. hydraulisk koppling eller kabelkonverteringar).
    clutch_line_connection_type:
      name: Kopplingsledningens kopplingstyp
      description: Anger ändkopplings-/kopplingsgränssnittet som används av kopplingsledningen
        (viktigt för kompatibilitet med huvud-/slavcylindrar och stela ledningar).
    clutch_pressure_plate_actuation_type:
      name: Typ av tryckplattor för kopplingsaktivering
      description: Anger om kopplingen frigörs med en tryck- eller dragavlastningsmekanism
        (membranfjäderaktivering).
    clutch_pressure_plate_release_mechanism_type:
      name: Typ av frigöringsmekanism för kopplingstryckplatta
      description: Stilen på utlösningsmetoden som används av tryckplattan.
    clutch_pressure_plate_surface_type:
      name: Kopplingstryckplattans yttyp
      description: Typen av friktionskontaktyta på tryckplattan.
    clutch_slave_cylinder_connection_type:
      name: Typ av anslutning koppling med slavcylindrar
      description: Hydraulledningens kopplingsmetod på slavcylindern (gängad anslutning,
        snabbkoppling, banjo, etc.).
    clutch_slave_cylinder_mounting_type:
      name: Typ av montering för koppling med slavcylindrar
      description: Hur slavcylindern monteras på kopplingen/sprängkåpa (t.ex. bultad,
        inklämd, integrerad).
    coating_type:
      name: Beläggningstyp
      description: Identifierar eventuell yttre lager eller glasyr som applicerats
        på müslibaren (t.ex. choklad, yoghurt).
    cocking_mechanism:
      name: Laddningsmekanism
      description: Anger den primära metoden eller enheten som används för att spänna
        eller lossa armborststrängen.
    cocktail_garnish_form:
      name: Cocktailgarneringens form
      description: Beskriver hur garneringen presenteras/bearbetas för användning
        (t.ex. färsk eller torkad).
    cocktail_mix_variety:
      name: Typ av cocktailmix
      description: Anger den specifika cocktail som blandningen är avsedd att skapa
        (t.ex. margarita, mojito, piña colada).
    cocktail_napkin_features:
      name: Cocktailservetternas funktion
      description: Framhäver funktionaliteten, bekvämligheten och de miljövänliga
        egenskaperna hos cocktailservetterna.
    cocktail_pick_tip_style:
      name: Cocktailpinne
      description: Beskriver formen/funktionen som används för att sticka hål på eller
        fästa garneringar.
    cocktail_pick_top_handle_style:
      name: Cocktail handtagsstil
      description: Beskriver den dekorativa topp- eller handtagsformen som används
        för att greppa eller för presentation.
    cocktail_type:
      name: Cocktailtyp
      description: Anger det specifika cocktailreceptet eller den specifika cocktailstilen
        som representeras av den färdigblandade produkten (t.ex. margarita, negroni,
        piña colada).
    cocktail_umbrella_handle_pick_material:
      name: Pinnens material
      description: Material i pinnen (inte paraplyet) av cocktailparaplyet.
    cocoa_processing_method:
      name: Metod för bearbetning av kakao
      description: Anger hur kakaopulvret har bearbetats (t.ex. naturligt, holländskt
        bearbetat, svart kakao).
    cocoa_product_form:
      name: Kakao produktform
      description: Definierar den fysiska form i vilken kakaoprodukten säljs.
    coconut_husk_status:
      name: Status för kokosnötskal
      description: Indikerar i vilken utsträckning kokosnötens yttre skal eller skal
        har tagits bort, vilket påverkar användningen, lagring och avfall.
    coconut_maturity_stage:
      name: Kokosnötens mognadsstadium
      description: Identifierar kokosnötens utvecklingsstadium vid skörd, vilket starkt
        påverkar smak, vatteninnehåll och kulinarisk användning (t.ex. att dricka
        eller laga mat).
    coconut_oil_refinement_type:
      name: Typ av förädling av kokosolja
      description: Anger kokosoljans förädling eller kvalitet, t.ex. jungfrulig, raffinerad,
        MCT, fraktionerad.
    coconut_preparation_form:
      name: Kokosnötsberedning
      description: Anger hur kokosnöten fysiskt tillagas eller skärs (hel, skivad,
        strimlad, mosad, etc.), vilket hjälper kunden att snabbt hitta det format
        som behövs för ett recept eller mellanmål.
    coffee_bean_species:
      name: Kaffebönsorter
      description: Anger vilken art av kaffebönor som används i produkten.
    coffee_beverage_variety:
      name: Kaffedrycksvariant
      description: Klassificerar konsumtionsfärdiga eller blandade kaffedrycker efter
        stil.
    coffee_processing_method:
      name: Metod för bearbetning av kaffe
      description: Indikerar den bearbetningsteknik som används på kaffebönorna efter
        skörd.
    coil_material:
      name: Rullens material
      description: Anger det primära material eller den typ av nät som används i värmespolen,
        vilket påverkar smak, livslängd och kompatibilitet med temperaturkontroll.
    coil_spring_design:
      name: Spiralfjäderdesign
      description: Anger spiralfjäderns hastighet/form design som påverkar körupplevelsen.
    coil_spring_finish_coating:
      name: Spiralfjäderyta/beläggning
      description: Ytbehandling eller beläggning applicerad för korrosionsskydd.
    coil_spring_material:
      name: Spiralfjädermaterial
      description: Spiralfjäderns primära material/sammansättning.
    coil_system_type:
      name: Typ av fjädersystem
      description: Uppgifter om det specifika fjädersystemet som används i tillämpliga
        madrasser, såsom pocketfjädring eller Bonellfjädring.
    coil_type:
      name: Fjädertyp
      description: Beskriver fjäderns konstruktion eller den teknik som används, vilket
        påverkar ångproduktionen och smaken.
    coin_grade_numismatic:
      name: Myntkvalitet (numismatisk)
      description: Standardiserad klassificering av myntet (t.ex. Sheldon-skala eller
        adjektivgrad).
    coin_strike_or_finish:
      name: Myntslag eller yta
      description: Myntets slagtyp eller yta (t.ex. affärsmynt, proofmynt).
    coin_strike_type:
      name: Myntslagstyp
      description: Beskriver myntets slagtyp eller yta (t.ex. affärsmynt, proofmynt).
    collar_style:
      name: Kragstil
      description: Definierar designen på kragen eller halsringningen på plagget.
    collectible_gun_accessories_included:
      name: Tillbehör för samlarvapen som ingår
      description: Listar tillbehör och dokumentation som medföljer samlarvapnet (t.ex.
        hölster, låda, bajonett, dokumentation).
    collectible_gun_firing_mechanism:
      name: Samlarvapnets avfyrningsmekanism
      description: Anger vapnets typ av avfyrnings-/tändningsmekanism (särskilt antika
        och historiska föremål).
    collectible_knife_blade_finish:
      name: Samlarbart knivbladsyta
      description: Beskriver bladets ytfinish/behandling gällande utseende (och ibland
        korrosionsbeständighet).
    color_code_system:
      name: Färgkodssystem
      description: Identifierar färgkodssystemet som används för trådens numeriska
        färgreferens (t.ex. DMC, Anchor), om tillämpligt.
    color_coding_standard:
      name: Färgkodningsstandard
      description: Anger om plattorna följer en internationell färgkod (t.ex. IWF
        eller IPF) eller ett annat schema.
    color_effect:
      name: Färgeffekt
      description: Anger speciella färgtekniker eller effekter som tillämpas på hårförlängningar.
    color_family:
      name: Färgfamilj
      description: Färgfamilj på hög nivå för sumi-bläck (användbart när färgen är
        för granulär, t.ex. varm svart jämfört med blåsvart).
    color_finish:
      name: Färgyta
      description: Anger ytfinishen på de synliga handskyddskomponenterna (t.ex. matt
        eller blank) när enbart färg är otillräckligt.
    coloring_finish:
      name: Färgfinish
      description: Anger den visuella finishen eller specialeffekten som färgen producerar,
        till exempel metallic eller neon.
    comb_material:
      name: Kammens material
      description: Materialet i munspelskammen (kroppen som bildar luftkamrarna).
    comb_type:
      name: Typ av kam
      description: Klassificerar hästens kammar efter deras primära funktioner (t.ex.
        currykam, mankam, dragkam), vilket hjälper kunder att snabbt hitta rätt verktyg
        för specifika behov.
    combat_shorts_cut_style:
      name: Shorts i stridsstil
      description: Anger snittet eller passformen som är specifik för shortsen (t.ex.
        högt skurna, retroskurna, kompressionsshorts).
    comic_creator_role:
      name: Skaparen
      description: Anger den krediterade skaparen som är relevant för annonsen (t.ex.
        författare, konstnär).
    commemorative_coin_finish:
      name: Jubileumsmyntyta
      description: Beskriver präglings-/finishtypen för ett jubileumsmynt.
    commemorative_coin_mint_mark:
      name: Jubileumsmyntmärke
      description: Indikerar märkningen (eller ingen märkning) på myntet.
    commemorative_subject:
      name: Jubileumsämne
      description: Primärt jubileumsämne (händelse, person, plats, årsdag, organisation,
        etc.).
    commercial_vehicle_class:
      name: Kommersiell fordonsklass
      description: GVWR-baserad reglerings-/branschklass som används för att beskriva
        ett nyttofordons viktklass för att hitta och filtrera.
    compass_damping_medium:
      name: Kompassens dämpningsmedium
      description: Anger det medium som används för att stabilisera nålens rörelse
        inuti kompasskapseln.
    compass_illumination_type:
      name: Typ av kompassbelysning
      description: Anger hur kompassmarkeringarna syns i svagt ljus (t.ex. självlysande
        färg, tritium, LED-bakgrundsbelysning).
    compass_mounting_style:
      name: Kompassens monteringsstil
      description: Beskriver hur kompassen bärs eller installeras.
    compass_scale_units:
      name: Kompassens skalenheter
      description: Identifierar måttenheterna (grader, mil eller båda) som är markerade
        på kompasshuset.
    compatible_abs_system:
      name: Kompatibelt ABS-system
      description: Anger om huvudcylindern är avsedd för fordon utrustade med ABS
        (låsningsfria bromsar).
    compatible_adapter_brand:
      name: Kompatibla adaptermärken
      description: Identifierar golfklubbsmärken vars adapter skaftet är förkonfigurerat
        för att passa.
    compatible_airbag_system_type:
      name: Kompatibelt krockkuddesystem
      description: Anger vilken generation/funktionsset krockkuddesystemet som delen
        är kompatibel med (t.ex. enkelt eller tvåstegs).
    compatible_amplifier_fit_method:
      name: Kompatibel passformsmetod för förstärkare
      description: Anger hur kompatibilitet definieras för locket/lådan (universell
        passform, modellspecifik eller efter dimension).
    compatible_apparatus:
      name: Kompatibel apparat
      description: Anger vilken gymnastikapparat eller aktivitet som greppen är avsedda
        för.
    compatible_archery_tool:
      name: Kompatibelt bågskytteverktyg
      description: Indikerar det primära bågskytteverktyget eller den primära utrustningen
        som tillbehöret är utformat för att fungera med.
    compatible_axle_size:
      name: Kompatibel axelstorlek
      description: Anger nav-/axeldiametern eller gängstandarden som fotpinnen är
        utformad för att passa (t.ex. 10 mm/3⁄8 tum, 14 mm, 3/8 tum 26 TPI).
    compatible_axle_type:
      name: Kompatibel axeltyp
      description: Identifierar bakaxelns fäststandarder som tränaren stödjer, som
        snabbkoppling eller thru-axelstorlekar.
    compatible_axle_weight_rating:
      name: Kompatibel axelviktklassificering
      description: Anger släpvagnens axelviktsklassificering (kapacitet per axel)
        som bromsenheten är konstruerad för att passa.
    compatible_bait_type:
      name: Kompatibel betestyp
      description: Identifierar vilka typer av fiskebete som betesborren är kompatibel
        med, så att sportfiskare kan välja ett verktyg som matchar deras föredragna
        bete.
    compatible_bass_scale_length:
      name: Kompatibel basskalelängd
      description: Anger basskalalängden/längderna som strängsatsen är avsedd för
        (viktigt för korrekt lindningslängd och passform).
    compatible_battle_top_system:
      name: Kompatibelt stridstoppssystem
      description: Identifierar ekosystemet eller serien för stridstopprodukten som
        toppen är designad för (används för att säkerställa kompatibilitet mellan
        delar och arenor).
    compatible_bb_size:
      name: Kompatibel BB-storlek
      description: Indikerar diametern på airsoftkulorna som produkten stödjer.
    compatible_bed_frame_style:
      name: Kompatibel sängramsstil
      description: Anger vilken säng- eller ram som tillbehöret är utformat för att
        passa.
    compatible_bicycle_tire_type:
      name: Kompatibel cykeldäckstyp
      description: Anger vilka cykeldäckstyper produkten kan reparera eller täta.
    compatible_bike_component:
      name: Kompatibel cykelkomponent
      description: Anger vilken del av cykeln som verktyget eller produkten är avsedd
        att serva.
    compatible_billiard_game:
      name: Kompatibelt biljardspel
      description: Identifierar vilket/vilka biljardspelsformat hyllan är utformad
        för, vilket säkerställer att kunder kan välja en hylla som passar deras spel.
    compatible_billiard_table_size:
      name: Kompatibel biljardbordsstorlek
      description: Anger standardlängden/längderna på biljardbordet som locket är
        utformat för att passa, vilket säkerställer att kunden väljer ett lock i rätt
        storlek till sitt biljardbord.
    compatible_bit_type:
      name: Kompatibel bittyp
      description: Typer av bits som skyddet kan användas med.
    compatible_blade_hosel:
      name: Kompatibel bladhosel
      description: Indikerar bladets hosel/kona-stil som skaftet accepterar, vilket
        säkerställer att skaftet och bladet passar ihop ordentligt.
    compatible_blade_system:
      name: Kompatibelt bladsystem
      description: 'Indikerar vilket ersättningsbladssystem/format kniven accepterar
        (t.ex. standard hobby #11, brytbara segmentblad).'
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibel vävstol
      description: Vilka typer av vävstolar båtskytteln är avsedd att användas med.
    compatible_bobbin_type:
      name: Kompatibel bobintyp
      description: Anger vilken typ av spole båtskytteln är avsedd att använda.
    compatible_bottle_mouth:
      name: Kompatibel flasköppning
      description: Flaskans öppning eller diameter som sugröret eller korken är utformad
        för att passa.
    compatible_bow_attachment_system:
      name: Kompatibelt system för bågfäste
      description: Indikerar den montering för lem eller tillbehör som delen är avsedd
        för (t.ex. ILF, skruvpassning, snabbkoppling).
    compatible_bow_crossbow_type:
      name: Kompatibel båge/armborsttyp
      description: Anger vilken typ av båge eller armborst som tillbehöret är utformat
        för att passa.
    compatible_brake_fluid:
      name: Kompatibel bromsvätska
      description: Bromsvätskans DOT-specifikation(er) som huvudcylinderns tätningar/material
        är utformade för att vara kompatibla med.
    compatible_brake_pad:
      name: Kompatibla bromsbelägg
      description: Anger vilka bromsbeläggsblandningar rotorn är godkänd för, vilket
        garanterar säkerhet och optimalt slitage.
    compatible_brake_service_system:
      name: Kompatibelt bromsservicesystem
      description: Anger om delen är avsedd för skivbromsar, trumbromsar eller båda.
    compatible_brake_system:
      name: Kompatibelt bromssystem
      description: Anger viktiga kompatibilitetsanmärkningar för systemet för bromsvätskeanvändning.
    compatible_brake_type:
      name: Kompatibel bromstyp
      description: Anger vilken bromstyp som hyllan är kompatibel med, till exempel
        skivbroms eller fälg.
    compatible_brass_instrument_finish:
      name: Kompatibel bleckblåsinstrumentyta
      description: Anger vilka ytbehandlingar för bleckblåsinstrument som rengöringsmedlet
        är säkert att använda på utan att skada ytbehandlingen.
    compatible_building_toy_system:
      name: Kompatibelt byggleksakssystem
      description: Anger vilket byggsystem/standard leksaken är kompatibel med (eller
        motsvarande storlek), till exempel LEGO-kompatibel eller äganderätt.
    compatible_capo_fretboard_radius:
      name: Kompatibel radie för capogreppbräda
      description: Anger greppbrädans radie/profil som capoen är utformad för att
        passa för optimal kontakt och stämningsstabilitet.
    compatible_capo_number_of_strings:
      name: Kompatibelt antal strängar för en capo
      description: Anger hur många strängar capon är avsedd att klämma (användbart
        för 6-, 7-, 8-, 12-strängar och specialinstrument).
    compatible_cardio_machine_type:
      name: Kompatibel träningsmaskinstyp
      description: Identifierar vilken typ av konditionsmaskin som tillbehöret eller
        delen är utformad för att fungera med.
    compatible_chain_link_type:
      name: Kompatibel kedjelänktyp
      description: Identifierar kedjelänktypen som verktygsstödet är utformat för
        (standard, halvlänk, snabblänk, etc.).
    compatible_chain_size:
      name: Kompatibel kedjestorlek
      description: Anger kedjebredden eller stigstandarderna (t.ex. 1/8 tum, 3/32
        tum) för verktygsstödet.
    compatible_chain_width:
      name: Kompatibel kedjebredd
      description: Anger vilka kedjestorlekar frihjulet är avsett att fungera med.
    compatible_chip_denomination:
      name: Kompatibel valör för spelmarkörerna
      description: Anger vilka spelmarkörsvalörer lådan innehåller märkta eller dedikerade
        positioner för (eller är avsedda att organisera).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatibel ligatur för klarinettmunstycke
      description: Identifierar standarden för ligaturpassform eller kompatibilitetsanmärkningar
        för munstycket.
    compatible_classical_guitar_string_scale_length:
      name: Kompatibel skallängd för klassisk gitarrsträng
      description: Den avsedda kompatibiliteten för gitarrens skallängd/stränglängd.
    compatible_clay_target_size:
      name: Kompatibel lermålstorlek
      description: Listar de lermålsstorlekar eller former som kastaren kan acceptera
        för korrekt passform och prestanda.
    compatible_cleat_system:
      name: Kompatibelt klossystem
      description: Anger broddmonteringen eller bultmönstret för pedalstödet så att
        cyklister kan matcha sina skor till rätt system.
    compatible_clipless_pedal_system:
      name: Kompatibelt klickfritt pedalsystem
      description: Identifierar den specifika standarden för klickpedaler/broddar
        som produkten är utformad för att fungera med.
    compatible_clutch_type:
      name: Kompatibel kopplingstyp
      description: Kopplingssystemets kompatibilitet med svänghjulet (i förekommande
        fall).
    compatible_coffee_pod_system:
      name: Kompatibelt kaffekapselsystem
      description: Anger den kaffemaskin eller det bryggsystem som kapslarna är avsedda
        för.
    compatible_construction_set_system:
      name: Kompatibelt byggsatssystem
      description: Anger vilket byggsystem/märkesekosystem setet är kompatibelt med
        (t.ex. LEGO-kompatibelt, DUPLO-kompatibelt).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibelt stativ/fäste för kontrabasklarinett
      description: Indikerar vilket system av ställ/knoppar eller vilket stöd som
        krävs.
    compatible_coolant_chemistry:
      name: Kompatibel kylvätskekemi
      description: Anger vilka kylvätskefamiljer tillsatsen är formulerad för att
        vara kompatibel med.
    compatible_cooling_system_material:
      name: Kompatibelt kylsystemmaterial
      description: Anger vilka kylsystem/material kylarspolningen är säker för (t.ex.
        aluminiumradiatorer, system med blandade metaller).
    compatible_crib_format:
      name: Kompatibelt spjälsängsformat
      description: Definierar madrassens eller lakanets allmänna storlek eller form
        som tillbehöret är utformat för att passa.
    compatible_cross_stitch_fabric_count:
      name: Kompatibelt trådtäthet för korsstygn
      description: Rekommenderad trådtäthet för att brodera mönstret.
    compatible_cross_stitch_frame:
      name: Kompatibel korsstygnsram
      description: Anger vad ramen är avsedd att användas med (handhållen användning,
        bordsstativ, golvstativ eller universell).
    compatible_crossbar:
      name: Kompatibel tvärstång
      description: Tvärstångens kompatibilitet med fordonets takställ (om takmonterade),
        inklusive tvärstångens form/profilstandarder.
    compatible_cycling_cleat:
      name: Kompatibla cykelbroddar
      description: Anger vilket brodd- eller pedalsystem som cykelskorna är utformade
        för att fungera med.
    compatible_cymbal_size:
      name: Kompatibel cymbalstorlek
      description: Anger den avsedda (eller maximala) cymbaldiametern som fodralet
        är konstruerat för att passa. Detta är kompatibilitet för cymbalstorlek, inte
        fodralets ytterdiameter.
    compatible_device_type:
      name: Kompatibel enhetstyp
      description: Anger vilken typ av enhet fästet är avsett att hålla (t.ex. skärm/TV,
        surfplatta, smartphone, bärbar DVD-spelare).
    compatible_dock_structure_type:
      name: Kompatibel strukturtyp
      description: Bryggkonstruktionen som trappstegen är konstruerade för att monteras
        på.
    compatible_dough_type:
      name: Kompatibel degtyp
      description: Anger vilka typer/märken av deg verktygen är utformade för att
        fungera med (t.ex. vanlig playdoh, modellera).
    compatible_drawing_ink_surface:
      name: Kompatibel ritbläckyta
      description: Indikerar rekommenderade ytor/substrat för bästa prestanda.
    compatible_drivetrain_brand:
      name: Kompatibelt cykelkedjemärke
      description: Listar de märken på drivlinor eller bromssystem som vajern är konstruerad
        för att fungera med.
    compatible_drivetrain_speeds:
      name: Kompatibla drivlinehastigheter
      description: Anger antalet drivlineväxlar (t.ex. 10-växlad) som vevaxeln eller
        drevet stöder.
    compatible_equipment:
      name: Kompatibel utrustning
      description: Anger vilken typ av vintersportutrustning som skruvstädet är utformat
        för att hålla.
    compatible_evap_system:
      name: Kompatibelt EVAP-system
      description: Indikerar om tanklocket är utformat för att uppfylla EVAP-systemets
        krav (t.ex. OEM-specifikationstätning) och minska antalet motorlampor.
    compatible_exercise_bike_style:
      name: Kompatibel motionscykelstil
      description: Anger vilka typer av motionscyklar som tillbehöret eller reservdelen
        är avsedd att passa.
    compatible_fencing_weapon:
      name: Kompatibelt fäktningsvapen
      description: Anger vilket fäktningsvapen eller vilken disciplin jackan eller
        lamén är avsedd för.
    compatible_fiber_type:
      name: Kompatibel fibertyp
      description: Primära fibertyper som trumkardan är avsedd att bearbeta effektivt.
    compatible_fin_box_system:
      name: Kompatibelt fenlådesystem
      description: Identifierar fenlådan eller monteringssystemet som fenan är utformad
        för att passa, vilket hjälper surfare att köpa fenor som är kompatibla med
        deras surfbräda (t.ex. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Kompatibel fingerboard-radie
      description: Anger greppbrädans radie (platt, böjd eller compound) som capoen
        är utformad för att matcha för jämnt tryck och minskat surr.
    compatible_finish_type:
      name: Kompatibel yttyp
      description: Anger vilka instrumentytor som sprayen anges vara säker för.
    compatible_fishing_reel_type:
      name: Kompatibel fiskerulletyp
      description: Anger vilken typ av fiskerulle som tillbehöret är utformat för
        att passa eller fungera med (t.ex. spinnrulle, betekastrulle, fluga).
    compatible_fly_line_weight:
      name: Kompatibel fluglinevikt
      description: Indikerar de AFTMA-fluglinevikter som spolen är konstruerad för
        att hålla.
    compatible_flywheel_type:
      name: Kompatibel svänghjulstyp
      description: Anger vilken svänghjulstyp som kopplingstryckplattan är avsedd
        att användas med.
    compatible_football_kick_type:
      name: Kompatibla fotbollssparkar
      description: Identifierar de sparksituationer som produkten är utformad för
        att stödja (t.ex. avspark, fältmål), vilket hjälper idrottare att snabbt hitta
        lämplig utrustning.
    compatible_fuel_system_type:
      name: Kompatibel bränslesystemtyp
      description: Anger vilket bränslesystem som rengöraren är avsedd för.
    compatible_gas_type:
      name: Kompatibel gastyp
      description: Identifierar vilken typ av komprimerad gas som paintball-lufttanken
        är avsedd för.
    compatible_gel_wax_additives:
      name: Kompatibla gelvaxtillsatser
      description: Anger vilka tillsatstyper som är kompatibla med detta gelvax (t.ex.
        färgämnestyp, inbäddade).
    compatible_glaze_layering:
      name: Kompatibel glasyrlager
      description: Om glasyren är avsedd att läggas i lager med andra glasyrer för
        att skapa effekter.
    compatible_golf_bag_type:
      name: Kompatibel golfväsketyp
      description: Anger vilka golfväskeformat som överdraget eller fodralet passar
        till.
    compatible_ground_polarity:
      name: Kompatibel jordpolaritet
      description: Anger om spänningsregulatorn är avsedd för elektriska fordonssystem
        med negativ eller positiv jordning (eller inte är polaritetskänslig).
    compatible_guitar_body_shape:
      name: Kompatibla gitarrformer
      description: Anger vilken gitarrkropp/-form som fodralet är utformat för att
        passa.
    compatible_guitar_case:
      name: Kompatibla gitarrfodral
      description: Anger vilka gitarrfodralmodeller luftfuktaren är utformad för att
        passa och fungera korrekt i.
    compatible_guitar_scale_length:
      name: Kompatibel gitarrskalelängd
      description: Anger vilken/vilka gitarrlängder strängsatsen är avsedd att passa
        (baserat på lindningslängd/total längd).
    compatible_gun_platform:
      name: Kompatibel vapenplattform
      description: Anger den plattform eller strömkälla som produkten är kompatibel
        med (t.ex. AEG, GBB, HPA).
    compatible_hair_length:
      name: Kompatibel hårlängd
      description: Anger den maximala hårlängden eller volymen som huvudbonaden bekvämt
        klarar av.
    compatible_head_and_neck_restraint_system:
      name: Kompatibelt huvud- och nackstödssystem
      description: Anger om hjälmen har förankringspunkter och/eller är kompatibel
        med huvud- och nackstödsystem (t.ex. HANS), inklusive status för införande/installation
        av förankringsstolpe.
    compatible_helmet_certification_standard:
      name: Certifieringsstandard för kompatibel hjälm
      description: Indikerar eventuell hjälmsäkerhetsstandard eller sammanhang som
        tillbehöret är utformat för att stödja (t.ex. hjälpmar med automatisk öppning
        för tävlingsbruk hänvisar ofta till specifika sanktionsregler).
    compatible_helmet_shell_size:
      name: Kompatibla hjälmstorlekar
      description: Indikerar vilken/vilka hjälmstorlek(ar) en ersättningsdel passar
        till (storlek kopplas ofta till storleksintervall som XS–S, M, L–XL).
    compatible_helmet_size:
      name: Kompatibel hjälmstorlek
      description: Anger vilken hjälmstorlek som ansiktsmasken är kompatibel med.
    compatible_helmet_type:
      name: Kompatibel hjälmtyp
      description: Hjälmkategori som nackstödet är utformat för att fungera med.
    compatible_hitch_receiver_size:
      name: Kompatibel storlek på dragkroksfästet
      description: Dragkroksfästets öppning, som tillbehöret är utformat för att passa
        (för dragkroksmonterade ställtillbehör).
    compatible_hook_size:
      name: Kompatibel krokstorlek
      description: Virknålsstorlekssystem och/eller storleksomfång som organisatören
        är designad för att passa (t.ex. amerikansk bokstavs-/nummerstorlek, mm-intervall).
    compatible_horse_coat_type:
      name: Kompatibel hästpälstyp
      description: Anger de hästpälsar som borsten är bäst lämpad för (t.ex. tjock
        vinterpäls eller känslig päls).
    compatible_host_platform:
      name: Kompatibel värdplattform
      description: Anger vilka värdbaserade plattformar eller enhetstyper padkontrollen
        är kompatibel med (t.ex. Windows, macOS, iOS, Android) eller om den kan fungera
        fristående utan dator.
    compatible_inflation_gas:
      name: Kompatibla gaser
      description: Anger vad ballongen är avsedd att blåsas upp med (luft, helium
        eller endera).
    compatible_injection_type:
      name: Kompatibel insprutstyp
      description: Anger vilket bränsleinsprutssystem produkten är avsedd att rengöra.
    compatible_instrument_surface_material:
      name: Kompatibel instrumentyta/material
      description: Anger vilka instrumentytor/material polermedlet är avsett att användas
        på.
    compatible_intercom_system:
      name: Kompatibelt intercomsystem
      description: Indikerar hjälmens beredskap/kompatibilitet för montering eller
        installation av ett kommunikationssystem.
    compatible_interior_material:
      name: Kompatibelt fodringsmaterial
      description: Anger vilka material i fordonets interiör som fläckborttagningsmedlet
        är säkert/effektivt för (t.ex. matta, tygklädsel, läder, vinyl).
    compatible_kayak_type:
      name: Kompatibel kajaktyp
      description: Listar de allmänna kajakstilar som kitet är utformat att monteras
        på.
    compatible_license_plate_hole_pattern:
      name: Kompatibelt hålmönster för registreringsskylt
      description: Anger monteringshålskonfigurationen som stöds av fästet/hållaren
        (fordonssida och/eller skyltsida).
    compatible_license_plate_size:
      name: Kompatibel registreringsskyltsstorlek
      description: Anger den/de regionala eller dimensionella registreringsskyltstorlek
        som fästet/hållaren är utformad att passa.
    compatible_loom:
      name: Kompatibel vävstol
      description: Anger vilka vävstolstyper som slagbommen är avsedd att användas
        med.
    compatible_loom_type:
      name: Kompatibel vävtyp
      description: Indikerar den vävkonfiguration som slagaren är avsedd att användas
        med (t.ex. styva vävstolar kontra gobelängvävstolar).
    compatible_machine_type:
      name: Kompatibel maskintyp
      description: Anger vilken typ av kviltning som ramen är avsedd att fungera med
        (endast handkviltning, inhemsk symaskin, kviltningmaskin).
    compatible_mast_type:
      name: Kompatibel masttyp
      description: 'Anger vilka mastdiametrar seglet är konstruerat för: reducerad
        diameter (RDM), standarddiameter (SDM) eller båda.'
    compatible_model_system_train_scale:
      name: Kompatibelt modellsystem (tågskala)
      description: Anger modelltågsskalan/systemet som tillbehöret passar till, om
        tillämpligt, (t.ex. HO, N, O).
    compatible_mounting_surface:
      name: Kompatibel monteringsyta
      description: Den avsedda ytan eller föremålet som klämman är utformad fästas
        vid.
    compatible_mouthpiece_patch:
      name: Kompatibel munstycke
      description: Anger om munstycket är utformat för användning med munstyckeskuddar/plåster
        och rekommenderat intervall för plåstrets tjocklek.
    compatible_mouthpiece_type:
      name: Kompatibel munstycketyp
      description: Anger vilken typ av munstycke/skaft mellofonen är avsedd att användas
        med (vanligtvis valthorn eller trumpetliknande instrument beroende på modell).
    compatible_neck_profile_width:
      name: Kompatibel halsprofil/bredd
      description: Anger gitarrens halsprofil/bredd som capoen är utformad för att
        passa (t.ex. smal elektrisk eller bred klassisk).
    compatible_needle_size:
      name: Kompatibel nålstorlek
      description: Anger de nålstorlekar/typer som fodralet är avsett att passa (t.ex.
        broderi, gobeläng, handsömnad).
    compatible_needle_system:
      name: Kompatibelt nålsystem
      description: Nålsystem som maskinen är kompatibel med (t.ex. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibel parkeringsbromsmekanism
      description: Anger om bromsoket är konstruerat för att fungera med en integrerad
        parkeringsbromsmekanism.
    compatible_pedal_instrument_type:
      name: Kompatibel pedalinstrumenttyp
      description: Anger vad pedalen är avsedd att användas med (t.ex. digitalpiano,
        keyboard/synth, MIDI-kontroll).
    compatible_pedal_type:
      name: Kompatibel pedaltyp
      description: Anger vilken pedalstil eller vilket system som remmen eller klämman
        är utformad för att passa (t.ex. plattform, SPD, Look Keo).
    compatible_pin_type:
      name: Kompatibel nåltyp
      description: Vilken typ av pins mattan är avsedd att användas med (eller om
        den går att använda med pins).
    compatible_pipe_filter_size:
      name: Kompatibel rörfilterstorlek
      description: Indikerar vilken filterstorlek eller typ som röret är konstruerat
        för att fungera med (eller att inget filter krävs).
    compatible_plate_size:
      name: Kompatibel tallriksstorlek
      description: Ballistisk plattdimension eller standardiserad storlek som västen
        fungerar med.
    compatible_play_vehicle_scale:
      name: Kompatibel lekfordonsskala
      description: Indikerar vilken leksaksskala tillbehöret är utformat för att passa
        (t.ex. 1:64), vilket förbättrar passformen/kompatibiliteten för samlare och
        spårsystem.
    compatible_playing_surface:
      name: Kompatibel lekyta
      description: Anger vilken typ av spelplan eller yta som amerikanska fotbollsskor
        är avsedda för.
    compatible_pole_dimensions:
      name: Kompatibla stolpdimensioner
      description: Anger storleken på stolptvärsnittet som tillbehöret passar till.
    compatible_pole_shape:
      name: Kompatibel stolpform
      description: Anger formen på den stolpe eller kolumn som vadderingen är utformad
        för att passa.
    compatible_power_steering_system:
      name: Kompatibelt servostyrningssystem
      description: Anger vilka styrsystemtyp vätskan är avsedd för.
    compatible_powerplant_type:
      name: Kompatibel kraftverkstyp
      description: Anger framdrivningssystem för den BB-pistol som delen är avsedd
        för (t.ex. fjäderkolv, CO2, PCP).
    compatible_presser_foot:
      name: Kompatibel pressarfot
      description: Anger det system för montering/kompatibilitet av pressarfoten som
        stöds av symaskinen (t.ex. snäppfäste kontra skruvfäste; lågt/högt/snett skaft).
        Använd 'Universal/Multiple' om flera system stöds eller om adaptrar ingår.
    compatible_protective_gear:
      name: Kompatibel skyddsutrustning
      description: Anger vilken annan skyddsutrustning nackskyddet är utformat att
        fungera med.
    compatible_protective_gear_integration:
      name: Kompatibel integrering av skyddsutrustning
      description: Beskriver hur skyddet är avsett att bäras eller integreras med
        annan utrustning (t.ex. insatsficka, fristående fästtyp).
    compatible_punching_bag_type:
      name: Kompatibel typ av boxningssäck
      description: Anger vilka typer av boxningssäckar eller träningssäckar produkten
        är kompatibel med.
    compatible_racing_discipline:
      name: Kompatibel tävlingsdisciplin
      description: De motorsportdisciplin som hjälmen är avsedd/certifierad för.
    compatible_rc_scale:
      name: Kompatibel RC-skala
      description: Anger RC-skalförhållandet (t.ex. 1:10) som tillbehöret eller delen
        är utformad för att passa.
    compatible_recorder_size:
      name: Kompatibel inspelningsstorlek
      description: Anger vilken/vilka blockflöjtsstorlek(ar) fodralet är designat
        för att passa.
    compatible_recorder_type:
      name: Kompatibel inspelningstyp
      description: Anger vilken blockflöjtstyp (familj/storlek) som tillbehöret är
        kompatibelt med (t.ex. sopran, alt).
    compatible_reed_cut:
      name: Kompatibel tungklippning
      description: Anger vilken rörsskärningsstil ligaturen är avsedd att vara kompatibel
        med (t.ex. filad/fransk skärning eller ofilad/amerikansk skärning).
    compatible_reed_type:
      name: Kompatibel tungtyp
      description: Anger den rörbladsskärning/typ som munstycket är utformat för.
    compatible_reel_type:
      name: Kompatibel vindtyp
      description: Anger vilken typ av fiskerulle som väskan, fodralet eller skyddet
        är utformat för att passa.
    compatible_refrigerant_type:
      name: Kompatibel köldmedietyp
      description: Anger vilket köldmedium AC-förångaren är avsedd att användas med.
    compatible_ride_equipment:
      name: Kompatibel ridutrustning
      description: Typer av hjulförsedd sportutrustning som rampen är avsedd för.
    compatible_roof_height:
      name: Kompatibel takhöjd
      description: Anger vilken takprofil taket är avsett för (standard eller förlängt/högt
        tak).
    compatible_roof_rail_type:
      name: Kompatibel takrännetyp
      description: Anger vilken takkonfiguration bashyllsystemet är utformat att fästas
        på.
    compatible_rope_count:
      name: Kompatibelt repantal
      description: Anger den repkonfiguration för boxningsringen som delen är utformad
        för, till exempel 3-repringar, 4-repringar eller universalpassning.
    compatible_rope_type:
      name: Kompatibel reptyp
      description: Anger vilka repkonstruktioner som kan användas med enheten.
    compatible_saddle_type:
      name: Kompatibel sadeltyp
      description: Anger den sadelstil eller ridgren som tillbehöret är utformat för
        att passa, vilket säkerställer korrekt kompatibilitet mellan engelska, western
        och andra sadlar.
    compatible_saxophone_size:
      name: Kompatibel saxofonstorlek
      description: Anger vilken saxofonstorlek produkten är kompatibel med (t.ex.
        sopran, alt, tenor).
    compatible_saxophone_type:
      name: Kompatibel saxofontyp
      description: Anger vilken saxofon ligaturen/kapseln är utformad för att passa.
    compatible_scale_length:
      name: Kompatibel skalelängd
      description: Identifierar det skallängdsomfång för gitarrer som strängarna är
        avsedda för (t.ex. kort skala, standardskala, barytonskala).
    compatible_seat_airbag:
      name: Kompatibel säteskrockkudde
      description: Anger om sätet har sidokrockkuddar eller är kompatibelt med fordon
        utrustade med sätesmonterade krockkuddar.
    compatible_seating_capacity:
      name: Kompatibel säteskapacitet
      description: Anger antalet säten eller den konfiguration som tillbehöret är
        utformat för att passa.
    compatible_sensor_port_type:
      name: Kompatibel sensorporttyp
      description: Anger om oljetråget stöder oljenivå- och/eller oljetemperatursensorer
        och porttyp om tillämpligt.
    compatible_shifter_type:
      name: Kompatibel reglagetyp
      description: Identifierar den växelspakstyp eller konfiguration som växelskyddet
        är utformat för att passa.
    compatible_shis:
      name: Kompatibel SHIS
      description: Listar den/de SHIS-kod(er) för standardiserat headsetidentifieringssystem
        (t.ex. IS42, EC34, ZS44/28.6) som delen passar till.
    compatible_skating_discipline:
      name: Kompatibel skridskoåkningstyp
      description: Anger vilken/vilka skridskosportgrenar delen eller tillbehöret
        är utformat för att passa.
    compatible_snowshoe_deck_type:
      name: Kompatibel snöskobräda
      description: Anger snöskoramen eller -brädan som bindningen är kompatibel med.
    compatible_special_effects_lighting_features:
      name: Kompatibla funktioner för specialeffektbelysning
      description: Framhäver vanliga kapacitetsflaggor som styr köpbeslut för effektlampor
        (utöver färg/mönster), till exempel att koppla samman enheter eller ljudreaktioner.
    compatible_spinning_wheel_drive_system:
      name: Kompatibelt hjulsdrivningssystem
      description: Anger vilket/vilka spinnhjulsdriftssystem tillbehöret stöder.
    compatible_spoke_gauge:
      name: Kompatibel ekermätare
      description: Indikerar ekrarnas tjocklek och nippelns passform, vilket gör det
        möjligt för köpare att matcha ekrar och nipplar korrekt.
    compatible_steering_wheel_airbag:
      name: Kompatibel rattkrockkudde
      description: Anger om ratten har stöd för en OEM-krockkudde (eller är avsedd
        för applikationer utan krockkudde).
    compatible_steering_wheel_control_button:
      name: Kompatibel rattkontrollknapp
      description: Indikerar kompatibilitet med fabriksmonterade rattreglage (ljud/farthållare/telefon)
        och relaterad kablar
    compatible_stencil_material:
      name: Kompatibelt stencilmaterial
      description: Material som maskinen kan skapa schabloner från eller bearbeta
        (t.ex. papper, plastfilm, mylar).
    compatible_stencil_media_format:
      name: Kompatibela stencilmedia
      description: 'Anger vilka stencilmedia maskinen stöder: ark, rullar eller båda.'
    compatible_strap_retractor:
      name: Kompatibel remindragare
      description: Anger om remmen är kompatibel med infällbara system eller är avsedd
        för icke-infällbara (statiska) bälten.
    compatible_string_instrument_finish:
      name: Kompatibel stränginstrumentyta
      description: Anger vilka typer av instrumentytor som polermedlet är säkert att
        använda på.
    compatible_substrate_material:
      name: Kompatibelt substratmaterial
      description: Det/de ytmaterial som färgen är formulerad för att fästa vid.
    compatible_surface:
      name: Kompatibel yta
      description: Anger ytan/materialet som kardborrebindningen är avsedd att fästa
        vid.
    compatible_surface_material:
      name: Kompatibelt ytmaterial
      description: Fordonsytor som produkten är avsedd att användas på.
    compatible_tear_off_system:
      name: Kompatibelt rivtåligt system
      description: Anger om glasögonen har stöd för tear-off och/eller roll-off, inklusive
        om de har monteringsstolpar för tear-offs.
    compatible_thermostat_type:
      name: Kompatibel termostattyp
      description: Om vattenhalsen/-hylsan är utformad för att acceptera en termostat
        och, i så fall, vilken typ/storlek.
    compatible_thread:
      name: Kompatibel tråd
      description: Anger vilka typer av tråd/garn trädaren är avsedd att hantera (efter
        tjocklek/typ).
    compatible_thread_spool_format:
      name: Kompatibelt tråd-/spolformat
      description: Anger vilka trådformat lådan är avsedd att förvara (spolar, tandtrådsspolar/kort,
        koner etc.).
    compatible_thread_yarn_tool:
      name: Kompatibelt tråd- och garnverktyg
      description: Maskin-/systemkompatibilitet för verktyg som monteras på eller
        används med annan utrustning (t.ex. symaskin, overlockmaskin, vävstol, spinnrock).
    compatible_tire_application:
      name: Kompatibla däck
      description: Indikerar vilket däck-/hjulsegment som däckkantbrytaren är avsedd
        för (baserat på däcket/hjulet som servas, inte fordonsmodellen).
    compatible_tom_pad_mounting:
      name: Kompatibelt monteringsfäste för pukpad
      description: Anger vad den elektroniska pukan monteras på (t.ex. kläm-/stångfäste,
        L-stångsfäste, stativfäste), vilket påverkar om den passar befintliga monteringssystem.
    compatible_toy_vehicle_scale:
      name: Kompatibel lekfordonsskala
      description: Indikerar vilken leksaksfordonskala eller ungefärlig fordonsstorlek
        som leksetet är kompatibelt med.
    compatible_tpms_sensor_type:
      name: Kompatibel TPMS-sensortyp
      description: Anger om hjulet stöder TPMS-sensorer och/eller någon annan erforderlig
        ventil-/sensortyp.
    compatible_training_equipment:
      name: Kompatibla träningsutrustning
      description: Listar de typer av tränings- eller fitnessutrustning som kan fästas
        på fästet.
    compatible_treadmill_design:
      name: Kompatibel löpbandsdesign
      description: Anger vilken löpbandsdesign som tillbehöret är kompatibelt med,
        till exempel hopfällbara eller icke-hopfällbara modeller.
    compatible_tube:
      name: Kompatibel tub
      description: Indikerar vilken slang- eller däckkonstruktion som lappen är avsedd
        för, till exempel butyl, latex, TPU eller slanglös.
    compatible_valve_type:
      name: Kompatibel ventiltyp
      description: Anger vilken ventiltyp smörjmedlet är kompatibelt med.
    compatible_vaporizing_material:
      name: Kompatibla förångningsmaterial
      description: Anger de materialtyper som enheten är avsedd att förånga.
    compatible_vehicle_windshield_fluid:
      name: Kompatibel vindrutevätska för fordon
      description: Kompatibilitetspåståenden relaterade till fordonsutrustning eller
        glashantering (t.ex. säker för regnavvisande beläggningar, säker för strålkastarspolare).
    compatible_visor_system:
      name: Kompatibelt skärmsystem
      description: Anger vilka typer av visir/inläggssystem motorcykelhjälmen är kompatibel
        med.
    compatible_water_board_type:
      name: Kompatibel vattenbrädatyp
      description: Vilka vattensportbrädor takräcket är avsett att bära.
    compatible_water_sport_board_type:
      name: Kompatibla vattensportbrädor
      description: Listar de typer av brädor som takräcket är avsett att transportera.
    compatible_watercraft_communication_standard:
      name: Kompatibel kommunikationsstandard för vattenfarkoster
      description: Anger de kommunikations-/nätverksstandarder eller integrationsprotokoll
        som stöds för interoperabilitet med introduktionselektronik.
    compatible_watercraft_engine_type:
      name: Kompatibla motortyper
      description: Anger den drivlinekonfiguration som delen passar till (utombords/inombords/sterndrev/jetdrev).
    compatible_weight_plate_diameter:
      name: Kompatibel skivdiameter
      description: Anger vilka diametrar maskinen accepterar.
    compatible_wheel_finish:
      name: Kompatibel fälgfinish
      description: Anger de fälgbehandlingar/-material som rengöringsmedlet är säkert
        att använda på (enligt tillverkaren).
    compatible_whorl_drive_band_type:
      name: Kompatibel virveldrivband
      description: Anger vilken drivbandsstil virveln är avsedd att fungera med.
    compatible_wick_series:
      name: Kompatibla vekserier
      description: Indikerar vanliga vekserier/-typer som veken är utformad att passa
        med (branschnamn), om säljaren anger det.
    compatible_winder_head_bit:
      name: Kompatibelt lindningshuvud/-borr
      description: Anger stilen för stämnyckel/huvud för lindningsstödet (t.ex. spårat
        huvud, utbytbara bits, universalhuvud).
    compatible_windlass_rode:
      name: Kompatibelt ankare
      description: Anger vilken typ av ankare som ankarspelet är avsett att använda.
    compatible_windshield_type:
      name: Kompatibel vindrutetyp
      description: Anger vilken vindrutekonfiguration som höljet är utformat för att
        fungera med.
    compatible_wood:
      name: Kompatibelt trä
      description: Anger vilka träslag för greppbrädor poleringen rekommenderas/är
        säker för.
    compatible_writing_surface:
      name: Kompatibel skrivyta
      description: Anger ytor/papper som bläcket är avsett att fungera bäst på.
    compatible_zipper_size:
      name: Kompatibel dragkejdestorlek
      description: 'Anger dragkedjestorleken som handtaget är avsett att passa (ofta
        uttryckt som #3, #5, #8, #10), vilket förbättrar filtreringen.'
    compliance_certification:
      name: Efterlevnadscertifikat
      description: Standarder för väganvändning och elektromagnetisk kompatibilitet
        som lampan uppfyller.
    component_position:
      name: Komponentens position
      description: Anger delens relativa position inom motorns transmissionsenhet
        (t.ex. främre eller bakre kåpa, övre eller nedre). Inte fordonets placering
        fram/bak.
    concentration_level:
      name: Koncentrationsnivå
      description: Kvalitativ indikation på hur koncentrerad tomatpurén är (enkel,
        dubbel, trippel), för att matcha receptkrav.
    concentration_type:
      name: Koncentrationstyp
      description: Anger om produkten är färdig att använda eller koncentrerad, och
        (om koncentrat) typiska utspädningsriktlinjer.
    concert_bass_drum_mounting_stand_type:
      name: Stativ för konsertbastrummor
      description: Hur konsertbastrumman stöds eller monteras för uppträdandet.
    concert_pitch_standard:
      name: Standard för konserttonhöjd
      description: Anger den konserttonhöjdsreferens (A4) som pianot är stämt till
        vid försäljningstillfället (t.ex. A440, A442, A444).
    condiment_form:
      name: Kondimentform
      description: Anger pepparrotsproduktens fysiska form eller konsistens (t.ex.
        pasta, pulver, kräm).
    condiment_texture:
      name: Tillbehörets konsistens
      description: Beskriver relishens eller chutneyns fysiska konsistens (t.ex. klumpig,
        len).
    confetti_format:
      name: Konfettiformat
      description: Anger konfettiproduktens format baserat på hur konfettin förpackas
        eller avfyras (t.ex. löst scatterspill kontra poppers/kanoner).
    conga_head_tensioning_system:
      name: Spännsystem för congahuvud
      description: Typ av beslag som används för att spänna/stämma congaskinnet (t.ex.
        traditionell skruvbultskonstruktion kontra moderna snabbjusteringsmekanismer).
    conga_set_included_drum_types:
      name: Trumtyper i congasetet
      description: Vilka congatyper som ingår i ett congaset (t.ex. quinto + conga
        + tumba).
    connector_case_style:
      name: Laddfodralsstil
      description: Klassificerar den övergripande konstruktionsstilen för laddfodralet
        (t.ex. hårt eller mjukt skal) för att återspegla skyddsnivå och bärbarhet.
    console_cover_installation_method:
      name: Installationsmetod för konsolskydd
      description: Anger hur konsolöverdraget fästs på konsolen/armstödet (t.ex. slip-on,
        elastiska remmar, kardborreband, självhäftande, klämma).
    console_display_type:
      name: Konsolens skärmtyp
      description: Identifierar typen av användardisplay som finns på maskinen (t.ex.
        LCD, LED, pekskärm).
    construction_design:
      name: Byggdesign
      description: Anger hur många ledade delar som utgör dynan, påverkar rörlighet
        (t.ex. 1-delad vs 3-delad).
    contact_angle:
      name: Kontaktvinkel
      description: Anger lagerbanornas kontaktvinkel, uttryckt som en enda vinkel
        eller en parvis vinkeluppsättning (t.ex. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Fyllningstyp för jongleringsboll
      description: Identifierar om bollen är solid eller fylld (och om fylld, vilken
        typ av fyllning), vilket påverkar distribution och hållbarhet.
    contact_juggling_ball_transparency:
      name: Jongleringsbollens genomskinlighet
      description: Anger bollens genomskinlighet/optiska utseende.
    contact_surface_material:
      name: Kontaktytans material
      description: Identifierar materialet som används vid kontaktpunkterna som vidrör
        instrumentet (t.ex. kork/gummi) för att förhindra repor och förbättra greppet.
    container_material:
      name: Behållarens material
      description: Anger det primära materialet i produktens behållare (t.ex. glas,
        polyetentereftalat plast, aluminium).
    contaminant_removal:
      name: Borttagning av föroreningar
      description: Listar de klasser av föroreningar som produkten är certifierad
        att ta bort eller minska.
    contra_alto_clarinet_body_configuration:
      name: Kroppskonfiguration av kontraaltklarinett
      description: Beskriver den fysiska konstruktionen och formen hos kontraaltklarinetten
        (t.ex. rak eller vikt design).
    contra_alto_clarinet_lowest_note_extension:
      name: Den lägsta noten för kontraaltklarinett
      description: Anger instrumentets lägsta spelbara not (den lägsta noten som klaviaturen
        tillåter), används vanligtvis för att skilja mellan låg E♭ och låg D och låg
        C-modeller.
    contra_bass_clarinet_bell_type:
      name: Typ av kontrabasklarinettklocka
      description: Klockkonfiguration som används på kontrabasklarinetten.
    contra_bass_clarinet_bore_type:
      name: Typ av kontrabasklarinettpipa
      description: Instrumentets borrningsdesign.
    contra_bass_clarinet_lowest_written_note:
      name: Den lägsta noten för kontrabasklarinett
      description: Den lägsta skrivna tonen instrumentet kan spela (beror ofta på
        lågt C eller lågt Eb-utvidgning).
    control_arm_bushing_material:
      name: Material i styrarmsbussning
      description: Anger materialet i de medföljande/installerade bussningarna, om
        sådana finns.
    control_arm_bushings_included:
      name: Styrarmsbussningar som ingår
      description: Indikerar om styrarmen är monterad med bussningar.
    control_arm_finish:
      name: Styrarmens ytfinish
      description: Anger den skyddande ytbehandlingen som applicerats på styrarmen
        (korrosionsskydd och utseende).
    control_arm_grease_fitting_type:
      name: Smörjnippeltyp för styrarmen
      description: Anger om styrarmen/kulleden inkluderar en smörjnippel (zerk) och
        om den är servicebar.
    control_arm_material:
      name: Material för styrarmen
      description: Anger det primära materialet och tillverkningskonstruktionen för
        styrarmskroppen.
    control_arm_position:
      name: Styrarmens position
      description: Anger det fjädringsläge som styrarmen är konstruerad för inom axelns
        hörn/sidan (t.ex. övre/nedre, fram/bak, vänster/höger).
    control_arm_style:
      name: Styrarmsstil
      description: Identifierar den geometriska/designmässiga stilen på styrarmen
        som används i layouten.
    control_cable_connector_type:
      name: Styrkabelns anslutningstyp
      description: Anger den änd-/anslutningsstil som används av styrkablarna för
        att ansluta till styrningen och motorn (t.ex. OEM-specifika ändkopplingar).
    control_voltage_or_gate_connectivity:
      name: Styrspänning eller grindanslutning
      description: Anger kontrollströmmen/portanslutningsstödet för integrering med
        modulär/analog utrustning.
    controller_function:
      name: Styrfunktioner
      description: Definierar den primära rullen på löpbandets kontrollkort, såsom
        motorstyrning, strömförsörjning eller växelriktning.
    controller_type:
      name: Styrtyp
      description: Anger regulatorn/styrsystemet som ingår i konverteringssatsen för
        elscooter (eller krävs för användning), med fokus på regulatorns egenskaper
        som är relevanta för kompatibilitet och prestanda.
    conversion_kit_cooling_method:
      name: Kylningsmetod för växlingskit
      description: Primär termisk styrningsmetod som används för integrationen mellan
        motor/växelriktare/batteri.
    conversion_kit_installation_complexity:
      name: Installationskomplexitet för växlingskit
      description: Förväntad installationsansträngning baserat på typisk kundkompetens/verktyg
        som krävs.
    converted_bed_size:
      name: Konverterad sängstorlek
      description: Anger sängstorlek eller konfiguration som spjälsängen kommer att
        konverteras till när detta kit installeras.
    convertible_configuration:
      name: Konverterbar konfiguration
      description: Anger hur många olika sängkonfigurationer produkten kan konverteras
        till (t.ex. 3-i-1 spjälsäng → småbarnssäng → dagbädd).
    convertible_high_chair_modes:
      name: Lägen för konvertibla barnstolar
      description: Anger de konfigurationer som stolen kan konverteras till.
    cookie_decorating_kit_items_included:
      name: Ingående artiklar i kakdekorationskit
      description: Listar de enskilda dekorationskomponenterna som medföljer så att
        kunder vet exakt vad som finns i lådan (t.ex. glasyrrör, strössel, kakformar).
    cookie_variety:
      name: Kaksort
      description: Identifierar den specifika stilen eller varianten av kakor, vilket
        hjälper kunden att snabbt hitta sin föredragna typ.
    cooking_state:
      name: Tillagningsstatus
      description: Anger kycklingproduktens beredskapstillstånd vid försäljning (rå,
        genomkokt, marinerad etc.).
    coolant_additive_purpose:
      name: Syfte med kylvätsketillsatsen
      description: Primära avsedda funktioner för kylvätsketillsatsen (ej kylarspolning
        eller dedikerad tätningsprodukt).
    coolant_base_fluid:
      name: Kylvätskebasvätska
      description: Identifierar den primära glykolbasen som används i frostskydds-/kylvätskans
        formulering.
    coolant_outlet_connection_style:
      name: Kylvätskeutlopp – anslutningstyp
      description: Utloppskopplingstypen som används för att ansluta en kylarslang
        eller kylvätskeledning.
    coolant_outlet_neck_angle:
      name: Kylvätskeutloppets halsvinkel
      description: Vinkeln/orienteringen av vattenhalsutloppet i förhållande till
        monteringsflänsen/motorn (användbart för att dra den övre kylarslangen).
    coolant_technology:
      name: Kylvätsketeknik
      description: Anger kylvätskekemin/teknikfamiljen som används av frostskyddsmedlet/kylvätskan
        (som vanligtvis syns på förpackningen).
    coolant_temperature_sensor_port:
      name: Temperatursensorport för kylvätska
      description: Om vattenhalsen har en port för en kylvätsketemperaturgivare eller
        -brytare och vilket gränssnitt den använder.
    coolant_temperature_sensor_seal_type:
      name: Typ av temperatursensortätning för kylvätska
      description: Typ av tätningsmetod som används mellan sensorn och motor-/kylvätskekanalen.
    cooling_system_component_included:
      name: Kylsystemkomponenter som ingår
      description: Listar ytterligare kylsystemkomponenter som ingår i vattenpumpen.
    cooling_system_flush_application_step:
      name: Steg för spolning av kylsystemet
      description: Anger var produkten passar in i serviceprocessen (t.ex. förspolningsrengöring
