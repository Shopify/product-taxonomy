    knife_locking_mechanism:
      name: Låsmekanism för kniv
      description: Anger vilken typ av mekanism som säkrar bladet i öppet läge, vilket
        direkt definierar säkerhet, styrka och användarvänlighet för att låsa bladknivar.
    knife_opening_mechanism:
      name: Öppningsmekanism för kniv
      description: Beskriver hur bladet fälls ut från handtaget, och skiljer mellan
        manuella, assisterade, automatiska och specialöppningsstilar.
    knife_system:
      name: Knivsystem
      description: Om och hur skärkniven fungerar på overlockmaskinen.
    knit_elastic_application:
      name: Användningsområde för stickad resår
      description: Anger den avsedda sömnads-/hantverksanvändningen för den stickade
        resårkanten.
    knit_pattern:
      name: Stickmönster
      description: Identifierar den primära sticksömmen eller texturen som används
        i koftatyget, såsom kabel, ribb eller våffelmönster, vilket gör det möjligt
        för kunden att hitta specifika texturer och termiska egenskaper.
    knit_style:
      name: Stickstil
      description: Anger den primära stickkonstruktionen, texturen eller det dekorativa
        mönstret som finns på tröjtyget.
    knitting_marker_counter_type:
      name: Stickmarkör/räknetyp
      description: Anger den funktionella produkttypen inom stickmarkörer och räknare.
    knitting_needle_tip_style:
      name: Sticknålens spetsstil
      description: Spetsskärpa/form optimerad för olika garner och tekniker.
    knock_sensor_technology:
      name: Teknik för knackningssensor
      description: Den sensorteknik som används i knackningssensorn.
    knurl_aggressiveness:
      name: Räffelns grovhet
      description: Beskriver skärpan eller texturen på det räfflade mönstret på styrskaftet,
        vilket påverkar greppkomfort och säkerhet.
    knurl_marking_standard:
      name: Standard för räffelringar
      description: Anger positionen för de räfflade referensringar som används för
        manuell placering (t.ex. IPF- eller IWF-markeringar).
    kohlrabi_variety:
      name: Kålrabbisort
      description: Anger sort eller marknadsvariant för kålrabbilöken, vilket gör
        det möjligt för kunden att välja mellan olika smakprofiler, storlekar och
        färger
    koji_mold_type:
      name: Typ av kojikultur
      description: Indikerar vilken typ eller stam av kojimögel som används under
        jäsningen, vilket påverkar arom och smak.
    kumquat_variety:
      name: Kumquat-sort
      description: Identifierar sort eller variant av kumquater som erbjuds, vilket
        gör det möjligt för kunden att välja frukt baserat på smakprofil, storlek
        eller kulinariskt användningsområde.
    label_edge_type:
      name: Typ av kant på etikett
      description: Anger den kantfinishstil som används för att förhindra fransning
        och definiera estetik.
    label_finish:
      name: Etikettens ytfinish
      description: Anger ytfinish, textur eller skyddande beläggning/behandling som
        applicerats på etiketten.
    label_finish_edge_style:
      name: Ytfinish/kantstil på etikett
      description: Hur kanterna är färdigställda, vilket påverkar komfort och hållbarhet
        (t.ex. vävd kant kontra laserskuren).
    label_fold_type:
      name: Vikningstyp för etikett
      description: Anger hur den isyningsbara etiketten är konstruerad för att sys
        in i en artikel (t.ex. ändvikning kontra mittvikning), vilket påverkar hur
        den appliceras och var den sitter.
    label_text_type:
      name: Typ av etiketttext
      description: Anger om etiketten är tom, förtryckt eller avsedd att vara personlig/anpassad.
    lace_area_size:
      name: Spetsområdets storlek
      description: Definierar storleken eller konfigurationen av spetssektionen (t.ex. 4x4
        closure, 13x6 frontal), vilket avgör tillgängligt delningsutrymme.
    lace_tightener_style:
      name: Typ av snörningssträckare
      description: Identifierar den mekaniska designen eller formfaktorn för snörningsåtdragningsenheten.
    lace_type:
      name: Spetstyp
      description: Beskriver spetsmaterialet eller finishen vid hårfästet/mössan,
        vilket påverkar realism och hudtonsmatchning.
    lacrosse_ball_certification:
      name: Certifiering för lacrossebollar
      description: Anger vilket sportstyrande organ eller vilken standard lacrossebollen
        uppfyller.
    lacrosse_goal_regulation_certification:
      name: Certifiering för lacrossemål
      description: Anger om lacrossemålet eller nätet uppfyller en specifik specifikation
        från ett styrande organ (t.ex. NCAA eller NFHS).
    lacrosse_pocket_type:
      name: Ficktyp för lacrosse
      description: Identifierar den allmänna stilen på ficka eller nät som är strängat
        i huvudet, vilket påverkar bollkontroll och frisläppning.
    lacrosse_string_type:
      name: Typ av lacrosse-sträng
      description: Klassificerar den exakta formen eller avsedda användningen av sträng-
        eller nätartikeln så att kunder kan skilja mellan nätdelar, satser och specifika
        strängroller i en ficka.
    ladder_position:
      name: Position för stege
      description: Identifierar var stegen eller trappan är placerad på loft-sängen
        för småbarn.
    lanyard_attachment_hardware:
      name: Fästhårdvara för snodd
      description: Indikerar typen av utrustning i änden av nyckelbandet som ansluts
        till nycklar, brickor, telefoner eller andra tillbehör.
    lanyard_style:
      name: Typ av snöre
      description: Anger hur remmen bärs.
    lanyard_type:
      name: Typ av snodd
      description: Beskriver stilen på snodd som medföljer eller är kompatibel med
        visselpipan.
    lap_hand_loom_accessories_included:
      name: Tillbehör som medföljer knävävstol
      description: Tillbehör ingår i knävävstolspaketet.
    lapel_style:
      name: Slagstil för kavaj
      description: Anger designen på kavajens slag (t.ex. narv, skärm, sjal).
    laser_safety_class:
      name: Säkerhetsklass för laser
      description: Produktens lasersäkerhetsklassificering (t.ex. klass 2, 3R, 3B,
        4) enligt medföljande dokumentation/etikett.
    latex_processing_method:
      name: Processmetod för latex
      description: Anger tillverkningsprocessen som används för att producera latexskummet
        – vanligtvis Dunlop eller Talalay – vilket påverkar känsla, respons och pris.
    latex_type:
      name: Latextyp
      description: Anger ursprung och sammansättning av latexen som används i madrassen
        (naturlig, ekologisk, syntetisk eller blandad), vilket informerar kunden om
        hållbarhet, miljövänlighet och potentiella allergener.
    launch_profile:
      name: Uppskjutningsprofil
      description: Indikerar den typiska uppskjutningsbanan (låg, medel, hög) som
        ett golfklubbskaft är utformat för att producera.
    launcher_mounting_configuration:
      name: Uppsättningsmetod för avfyrningsramp
      description: Identifierar hur avfyrningsanordningen är monterad eller konfigurerad
        för användning, vilket hjälper köpare som behöver fristående, under-pipa-
        eller skenmonterade alternativ.
    layer_construction:
      name: Lageruppbyggnad
      description: Anger tyglaminatkonstruktionen (t.ex. 2-lagers, 2,5-lagers, 3-lagers)
        vilket påverkar vikt, packbarhet och hållbarhet.
    layer_design:
      name: Lagerdesign
      description: Beskriver hårnätets konstruktion i termer av lager eller reversibilitet.
    lazy_kate_tension_control_type:
      name: Typ av spänningskontroll för lazy kate
      description: Hur lazy kate applicerar drag/spänning på spolar under tvinning
        eller lindning.
    lead_hardware_type:
      name: Typ av kopplingshårdvara
      description: Definierar fäst- eller spänntypen i änden av kopplet (snäppe, klämma,
        ögla, kedja etc.), vilket påverkar användarvänlighet, säkerhet och lämplighet
        för olika discipliner.
    leaf_gelatin_grade:
      name: Kvalitet på bladgelatin
      description: Anger den standardiserade hållfasthetsgraden som används för gelatinark.
    leaf_preparation:
      name: Beredning av blad
      description: Beskriver hur bladen förbereds före förpackning, såsom hackade,
        strimlade eller julienne-skuren
    leaf_spring_material:
      name: Bladfjäderns material
      description: Primärt konstruktionsmaterial för bladfjäderpaketet.
    leak_protection_layer:
      name: Läckageskyddande lager
      description: Anger om badbyxans inbyggda blöjsystem använder en enkel- eller
        dubbelskiktsdesign för läckageskydd.
    leash_clip_type:
      name: Typ av koppelklämma
      description: Anger den typ av klämma eller utrustning som används för att fästa
        kopplet vid ett halsband eller en sele (t.ex. bultklick, karbinhake, vridklämma).
    leash_style:
      name: Koppelstil
      description: Beskriver kopplets linuppbyggnad eller lindningsstil.
    leash_type:
      name: Typ av koppel
      description: Klassificerar kopplets övergripande stil eller syftesstyrda konfiguration
        för snabb filtrering efter avsedd användning.
    leavening_action_type:
      name: Typ av jäsningsmekanism
      description: Identifierar den kemiska formuleringen eller jäsningstypen för
        bakpulvret (t.ex. enkelverkande, dubbelverkande, aluminiumfritt). Detta påverkar
        direkt bakprestanda och receptets lämplighet.
    leavening_agent:
      name: Jäsmedel
      description: Anger den primära jäsmekanismen som används i degen.
    led_color_options:
      name: Färgalternativ för LED
      description: Listar de valbara LED-färgerna som finns tillgängliga på larmet
        för visuell bettindikering.
    led_indicator_color:
      name: Färg på LED-indikator
      description: Identifierar färgen på produktens LED-indikator, vilket hjälper
        sportfiskare att matcha flera larm eller passa personliga preferenser.
    led_light_color:
      name: Färg på LED-ljus
      description: Anger färgen på eventuell integrerad LED-belysning.
    leek_variety:
      name: Löksort
      description: Anger purjolökens kultivar eller sort, vilket möjliggör differentiering
        efter smak, storlek och växtsäsong.
    leg_coverage:
      name: Bentäckning
      description: Anger hur mycket av benet våtdräktsdelen täcker (t.ex. shorty,
        hellång).
    leg_cuff_style:
      name: Typ av benmanschett
      description: Anger avslutningsstilen vid byxornas ankelöppning.
    leg_cut_height:
      name: Benöppningens höjd
      description: Anger hur högt benöppningen är skuren på bikinitrosan.
    leg_cut_style:
      name: Modell av benavslut
      description: Beskriver formen på benöppningen, vilket påverkar utseende, komfort
        och solbränningslinjer.
    leg_length:
      name: Benlängd
      description: Kategoriserar trunks efter relativ benlängd (kort, mellan, lång)
        så att kunden kan välja sin föredragna täckning utan att dela upp kategorin.
    leg_loop_type:
      name: Typ av benögla
      description: Beskriver utformningen av benöglorna.
    leg_opening_style:
      name: Benöppningsstil
      description: Anger hur benöppningarna är avslutade på joggingbyxorna, såsom
        elastiska muddar, blixtlåsfållar eller öppna fållar.
    leg_style:
      name: Typ av ben
      description: Definierar designstil eller konstruktionstyp för bänkbenen eller
        basen.
    legging_foot_design:
      name: Fotdesign för leggings
      description: Anger om leggings är fotlösa, med fot eller kan konverteras mellan
        de båda stilarna.
    leggings_waistband_style:
      name: Leggings – midjebandstyp
      description: Anger den strukturella utformningen av leggingsens midjeband, vilket
        påverkar komfort, stöd och utseende.
    lei_closure_style:
      name: Typ av stängning för lei
      description: Beskriver om leien är en kontinuerlig ögla eller har öppna ändar
        som knyts eller fästs med ett band.
    lemon_variety:
      name: Citronsort
      description: Identifierar den specifika sorten eller varianten av citroner (t.ex.
        Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Längdjusteringsmetod
      description: Anger om och hur hopprepets längd kan justeras för att passa användaren.
    lens_color_tint:
      name: Linsfärg/toning
      description: Färg eller toning av skyddsglasögonlinser som medföljer produkten.
    lens_construction:
      name: Konstruktion av lins
      description: Anger linsens strukturella konstruktion (t.ex. enkelruta, termisk
        dubbelruta) för att indikera imskydd och optisk prestanda.
    lens_tint_category:
      name: Kategori för linsfärg
      description: Klassificerar linsmörkhet baserat på internationella toningskategorier,
        vilket hjälper kunder att välja linser som passar olika ljusförhållanden.
    lettuce_variety:
      name: Salladssort
      description: Identifierar den specifika trädgårdssorten av sallad (t.ex. isbergssallat,
        romansallat, butterheadsallat), vilket möjliggör exakt filtrering och jämförelse.
    level_of_play:
      name: Spelnivå
      description: Tillverkarens angivna prestationsnivå som överensstämmer med spelarnas
        konkurrenskraft och budget.
    lever_configuration:
      name: Utformning av spak
      description: Indikerar spak-/handtagskonfigurationen för vattenfarkostens motorreglage
        (t.ex. enspak kontra dubbelspak).
    lever_type:
      name: Spaktyp
      description: Typ/mekanism för tonhöjdsförändrande spakar installerade på harpans
        strängar.
    license_plate_cover_style:
      name: Typ av täckning för registreringsskylt
      description: Anger konstruktionsstilen för registreringsskyltskyddet (t.ex.
        heltäckande kontra skruvkapslar).
    license_plate_personalization_type:
      name: Typ av personanpassning för registreringsskylt
      description: Anger om registreringsskylten är tom, förtryckt eller stödjer kundens
        egen anpassning (text och/eller grafik).
    license_usage_terms:
      name: Licens-/användningsvillkor
      description: Användningsrättigheter för mönstret (t.ex. endast personligt bruk
        kontra begränsad kommersiell användning).
    licensed_sports_property:
      name: Licensierad sportprodukt
      description: Anger om produkten är officiellt licensierad av en liga/lag/organisation.
    lid_hinge_mechanism:
      name: Lockets gångjärnsmekanism
      description: Anger gångjärnsmekanismen som används för locket, vilket påverkar
        säkerhet och användarvänlighet.
    lid_support_positions:
      name: Lockets stödpositioner
      description: Anger de positioner som stöds för lockspakarna för flygeln (hur
        långt locket kan öppnas).
    lie_angle_color_code:
      name: Färgkod för liggvinkel
      description: Betecknar tillverkarens färgkodade liggvinkelsystem som används
        på vissa klubbor (t.ex. svart prick, grön prick).
    life_jacket_certification_standard:
      name: Certifieringsstandard för flytväst
      description: Officiell säkerhetsklassificering eller standard som produkten
        uppfyller, såsom USCG-typ eller ISO/AS -nivåer.
    life_raft_certification_standard:
      name: Certifieringsstandard för livflotte
      description: Säkerhetsstandarden/certifieringen som flotten är byggd och servas
        för att uppfylla.
    life_raft_container_type:
      name: Livflotte – förvaringstyp
      description: Hur livflotten packas för förvaring och utplacering.
    life_vest_approval_standard:
      name: Godkännandestandard för flytväst
      description: Anger den certifierings-/godkännandestandard som flytvästen uppfyller.
    life_vest_intended_user:
      name: Avsedd användare för flytväst
      description: Anger den avsedda bärarkategorin för passform och användning.
    lifebuoy_approval_standard:
      name: Godkännandestandard för livboj
      description: Säkerhetsgodkännande eller standard som livbojen uppfyller (t.ex.
        USCG/SOLAS).
    lifebuoy_features:
      name: Livbojfunktioner
      description: Funktionell säkerhet, montering/hantering och inkluderade tillbehörsfunktioner
        för livbojar.
    lift_mechanism_type:
      name: Typ av lyftmekanism
      description: Anger mekanismen som hjälper till att höja/sänka eller öppna/stänga
        väggsängen.
    lift_stand_support_point:
      name: Lyft-/stödpunkt
      description: Där lyften/stativet har kontakt med/stödjer fordonet.
    lifting_gas_type:
      name: Form av lyftgas
      description: Anger den primära lyftgasen eller flytmediet som används av luftskeppet.
    lifting_support_type:
      name: Typ av lyftstöd
      description: Anger om hissen körs upp på via körbanor eller lyfter via armar/dynor
        som kommer i kontakt med ramen/lyftpunkterna.
    ligature_and_cap_component_type:
      name: Typ av ligatur- och kapsylkomponent
      description: Anger om produkten är en ligatur, en kapsyl eller ett set som innehåller
        båda.
    ligature_material:
      name: Ligaturmaterial
      description: Primärmaterial i ligaturkroppen som är i kontakt med och säkrar
        rörbladet (t.ex. metall, läder, tyg).
    ligature_plating_or_finish:
      name: Ligaturplätering eller ytbehandling
      description: Anger pläteringen och/eller ytbehandlingen som appliceras på en
        metallligatur och/eller -kapsyl för klarinett.
    ligature_reed_contact_style:
      name: Kontaktstil mellan ligatur och rörblad
      description: Anger hur ligaturen kommer i kontakt med rörbladet (t.ex. minimal
        kontakt, flerpunktskontakt, omslutande).
    ligature_screw_position_relative_to_reed:
      name: Ligaturskruvens position (i förhållande till rörbladet)
      description: Indikerar läget för ligaturens åtdragningsskruv/skruvar i förhållande
        till den sida som vetter mot rörbladet/spelaren när den är monterad på munstycket.
    ligature_tension_adjustment_mechanism:
      name: Mekanism för justering av ligaturspänning
      description: Beskriver hur ligaturen applicerar/justerar tryck på rörbladet
        (fästdesign).
    ligature_tightening_mechanism_type:
      name: Typ av ligaturåtdragningsmekanism
      description: Anger mekanismen med vilken ligaturen dras åt runt munstycket och
        rörbladet (t.ex. enkelskruv, dubbelskruv, spak/snabbkoppling).
    light_bar_housing_material:
      name: Material för ljusrampshölje
      description: Primärmaterial i ljusrampshöljet/kroppen, vilket påverkar hållbarhet
        och värmeavledning.
    light_bar_lens_material:
      name: Ljusstånglinsens material
      description: Primärmaterial i ljusrampens lins/skydd, vilket kan påverka slagtålighet
        och optisk klarhet.
    light_bar_mounting_location:
      name: Monteringsplats för ljuslist
      description: Primärt avsedd monteringsposition på fordonet.
    light_stand_style:
      name: Typ av ljusstativ
      description: Anger stativets strukturella stil eller utförande som används för
        support specialeffektbelysning (t.ex. stativ, T-balk, vev), inte installationsytan
        (vägg/tak), vilken avgörs av monteringstyp.
    light_switch_function:
      name: Ljusströmbrytarens funktion
      description: Identifierar vilken/vilka belysningskretsar eller funktioner som
        brytaren styr.
    lighting_control_protocols_supported:
      name: Protokoll för belysningskontroll som stöds
      description: Styr-/nätverksprotokoll som controller stöder utöver eller istället
        för DMX512.
    lighting_effects:
      name: Ljuseffekter
      description: Anger alla integrerade belysningsfunktioner som förbättrar spelupplevelsen
        eller estetiken.
    lighting_mode:
      name: Belysningsläge
      description: Listar upp de tillgängliga ljusmönstren för drift, såsom fast sken,
        blinkande, stroboskopiskt sken eller SOS.
    lily_variety:
      name: Liljesort
      description: Anger den kommersiella/botaniska sorten av lilja som säljs som
        färsk snittblomma (t.ex. asiatisk, orientalisk).
    limb_articulation:
      name: Bågarmsled
      description: Indikerar graden av extremitetens flexibilitet eller ledrörlighet
        i dockan (ingen, fast, halvflexibel, fullt ledrörlig).
    limb_material:
      name: Lemmaterial
      description: Det primära materialet som används i armarna på en båge eller armborst,
        vilket påverkar vikt, hållbarhet, vibrationer och övergripande prestanda.
    lime_variety:
      name: Limesort
      description: Identifierar den specifika botaniska eller kommersiella limesorten
        som säljs.
    line_buoyancy:
      name: Flytkraft för lina
      description: Beskriver om flätan flyter eller sjunker naturligt och i vilken
        takt, vilket påverkar betespresentation och linhantering.
    line_purpose:
      name: Linans användningsområde
      description: Definierar linans avsedda funktion för draken (t.ex. främre flyglina,
        depowerlina, briddelina).
    linen_finish_treatment:
      name: Linnefinish/behandling
      description: Varje efterbehandlingsprocess som tillämpas på linnetyget som förändrar
        känsla, utseende eller prestanda.
    linen_weave_type:
      name: Typ av linneväv
      description: Anger linnetygets vävkonstruktion, vilket påverkar textur, andningsförmåga
        och fall.
    liner_padding_type:
      name: Typ av foderstoppning
      description: Anger fodrets konstruktion eller dämpningstyp (t.ex. mesh, lätt
        vadderat, quiltat).
    liner_shape:
      name: Fodrets form
      description: Beskriver sovsäcksfodrets övergripande form så att kunder kan matcha
        det till sin sovsäck och komfortpreferenser.
    liner_type:
      name: Fodertyp
      description: Anger om shortsen har ett invändigt foder och, i så fall, vilken
        typ det är.
    lining:
      name: Foder
      description: Anger om och hur badbyxorna är fodrade, inklusive omfattningen
        av fodrets täckning inuti plagget.
    lining_material:
      name: Fodermaterial
      description: Anger vilket material som används till skons innerfoder, vilket
        påverkar komfort, luftgenomsläpplighet och värme.
    lining_type:
      name: Fodertyp
      description: Anger om badplagget är fodrat och i vilken utsträckning.
    link_connection_style:
      name: Kopplingsstil för kedjelänk
      description: Klassificerar hur länken sammanfogar kedjan (t.ex. snabblänk, sammanfogningspinne),
        vilket gör det möjligt för cyklister att välja rätt installationsmetod eller
        reservdel.
    live_bait_form:
      name: Form för levande bete
      description: Anger betets fysiska form eller konserveringstillstånd, såsom levande,
        fryst eller torkat.
    living_room_furniture_items_included:
      name: Möbeldelar för vardagsrum som ingår
      description: Anger de enskilda möblerna som ingår i vardagsrumssetet, vilket
        hjälper kunden att snabbt förstå exakt vilka komponenter (t.ex. soffa, tvåsitssoffa,
        soffbord) som ingår.
    load_mechanism:
      name: Lastmekanism
      description: Anger den primära metoden med vilken motstånd genereras eller läggs
        till maskinen (t.ex. selekterbar viktstapel, plattbelastad, bandbelastad).
    lock_cylinder_type:
      name: Typ av låscylinder
      description: Anger vilken typ av nyckelcylinder/kärna som används (relevant
        för urtagsmotstånd och ersättningsnycklar).
    lock_security_level:
      name: Låsets säkerhetsnivå
      description: Beskriver låsets/cylinderns säkerhetsmotståndsegenskaper mot dyrkning
        och borrning.
    lock_system:
      name: Låssystem
      description: Typ av säkerhetslåssystem som används för att hålla hissen på höjd.
    locker_bench_configuration:
      name: Konfiguration av skåpbänk
      description: Beskriver orienteringen eller den strukturella konfigurationen
        av skåpbänken (t.ex. enkelsidig, dubbelsidig köksö, väggmonterad).
    locomotive_prototype_power_type:
      name: Krafttyp för lokomotivprototyp
      description: Anger den verkliga lokomotivframdrivningstyp som representeras
        av modellen.
    locomotive_wheel_arrangement_whyte_notation:
      name: Lokomotivhjulsarrangemang (Whyte-notation)
      description: Hjularrangemang för lokprototypen (t.ex. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Loftsäng – höjdklassificering
      description: Indikerar loftsängens totala höjd (låg, mellan, hög, extra hög),
        vilket hjälper kunden att matcha takhöjden och utrymmesbehovet under sängen.
    logo_application_method:
      name: Metod för applicering av logotyp
      description: Beskriver hur skolans vapen eller logotyp är applicerad på plagget
        (t.ex. broderad eller tryckt).
    logo_label_compatible_fabric_weight:
      name: Kompatibel tygvikt för logotypetikett
      description: Rekommenderad tygviktskategori för att fästa etiketten utan att
        den deformeras eller blir skrymmande.
    logo_label_edge_finish:
      name: Kantfinish för logotypetikett
      description: Anger etikettens kantkonstruktion/finish, vilket påverkar fransningsmotstånd
        och komfort mot huden.
    logo_label_print_production_method:
      name: Logotypetikett – tryck-/produktionsmetod
      description: Hur logotypen appliceras/formas på etiketten.
    long_block_completeness:
      name: Kompletthetsgrad för långblock
      description: Anger vilka huvudkomponenter som ingår tillsammans med långblocksatsen.
    long_john_pieces_included:
      name: Delar som ingår i långkalsongset
      description: Förtydligar om produkten endast inkluderar underdelen, endast överdelen
        eller båda delarna av långkalsongen.
    longan_variety:
      name: Longan-sorten
      description: Anger kultivar eller kommersiell sort av longan (t.ex. Kohala,
        Biew Kiew), vilket hjälper kunden att identifiera önskad smak, storlek och
        sötmaegenskaper.
    loom_accessories_included:
      name: Medföljande tillbehör för vävstol
      description: Viktiga tillbehör som medföljer vävstolen i lådan/paketet.
    loom_finish:
      name: Ytbehandling för vävstol
      description: Vävstolens ytfinish (främst för trävävstolar).
    loom_folding_portability_design_type:
      name: Design för vikbar/bärbar vävstol
      description: Om och hur vävstolen fälls ihop för transport eller kompakt förvaring.
    loom_frame_folding_design:
      name: Vikbar design på vävramen
      description: Anger om och hur bordsvävstolens ram fälls ihop eller demonteras
        för förvaring eller transport.
    loom_tension_adjustment_method:
      name: Metod för justering av vävstolsspänning
      description: Primär metod som används för att justera varpspänningen på vävstolen.
    loom_tie_up_system:
      name: Uppbindningssystem för vävstol
      description: Typ av förankrings-/kopplingssystem som används mellan pedaler/lammar/axlar
        (t.ex. Texsolv eller metallkedja).
    loquat_variety:
      name: Loquat-sort
      description: Anger kultivar eller sort av mispel, vilket återspeglar skillnader
        i storlek, smak, mognadssäsong och utseende.
    lubricant_features:
      name: Smörjmedlets egenskaper
      description: Framhäver smörjmedlets speciella egenskaper, tillsatser eller fördelar.
    lubrication_requirement:
      name: Smörjningskrav
      description: Anger om löpbandets band är förbehandlat/underhållsfritt eller
        kräver kontinuerlig smörjning eller vaxning.
    lubrication_type:
      name: Smörjningstyp
      description: Anger bussningens smörjbarhet/fettningsbarhet och om den är konstruerad
        för att smörjas med fett (t.ex. spår eller en smörjnippel).
    lug_nut_seat_profile:
      name: Hjulmutterns sätesprofil
      description: Anger hjulmutterns sätesprofil som krävs av hjulet för att säkerställa
        korrekt hjulmutterkompatibilitet och säker installation.
    lumbar_support_type:
      name: Typ av ländryggsstöd
      description: Beskriver typen av ländryggsstöd som finns på stolen (t.ex. avtagbar
        kudde, justerbar mekanism, massage).
    lunge_trainer_style:
      name: Typ av utfallsstegstränare
      description: Definierar den strukturella designen av en utfallstränare.
    lure_buoyancy:
      name: Flytförmåga för bete
      description: Anger hur betet beter sig i vattenpelaren i vila eller under infiskning
        (t.ex. flyter på ytan, svävar mitt i vattnet eller sjunker).
    luster:
      name: Glans
      description: Beskriver hur ljus interagerar med provytan (t.ex. glaskropp, metallisk).
    lychee_cultivar:
      name: Litchi-sort
      description: Identifierar den specifika litchisorten eller kultivaren – såsom
        Brewster, Hak Ip eller Mauritius – som kan skilja sig åt i smak, fröstorlek,
        skördesäsong och pris.
    lyre_flip_folder_mounting_location:
      name: Monteringsplats för lyra/vikfolder
      description: Där lyran eller vikfacket är avsett att monteras på instrumentet
        eller tillbehöret (t.ex. klocka, leadpipe, stativ).
    lyrics_display_type:
      name: Typ av textvisning
      description: Hur sångtexter visas (om det stöds) under karaoke.
    magazine_compatibility:
      name: Magasinkompatibilitet
      description: Identifierar de primära magasinkalibrarna eller magasintyperna
        som västens inbyggda fickor är utformade för att hålla.
    magnet_requirement:
      name: Magnetkrav
      description: Anger om sensorn behöver en extern magnet för att fungera.
    magnet_toy_storage_included:
      name: Förvaring som ingår med magnetleksak
      description: Förvaringstyp/låda ingår med magnetleksaken för skrivbordsorganisation
        och resor.
    malanga_variety:
      name: Malanga-sort
      description: Identifierar den specifika sorten av malanga-/tarorot som säljs
        för att hjälpa kunden att välja önskad smak, färg eller kulinariskt användningsområde.
    malt_color_rating_system:
      name: Färgklassificeringssystem för malt
      description: Anger vilken färgskala den angivna färgen avser (Lovibond, SRM
        eller EBC).
    malt_crush:
      name: Maltkrossningsgrad
      description: Anger om basmaltet säljs hel/omalen eller förkrossad, och i så
        fall krossningsstilen.
    malt_form:
      name: Maltform
      description: Anger om produkten säljs som hela kärnor eller bearbetas för mosning
        (t.ex. krossad).
    malt_intended_use:
      name: Avsedd användning för malt
      description: Avsedd primär användning för maltet (bryggning, destillering eller
        dubbelt ändamål).
    malt_treatment:
      name: Maltbehandling
      description: Beskriver hur spannmålen/maltet bearbetades utöver standardtorkning
        (vanliga specialprocesser).
    malt_usage_purpose:
      name: Användningsområde för malt
      description: Beskriver det primära funktionella bidraget från en specialmalt
        till ett ölrecept.
    man_overboard_system_type:
      name: Man överbord – systemtyp (MOB-systemtyp)
      description: Anger den primära kategorin för man-över-bord (MOB)-lösning som
        tillhandahålls av produkten.
    mandolin_back_sides_wood:
      name: Träslag för mandolinens rygg och sidor
      description: Anger vilket träslag som används till mandolinens baksida och sidor.
    mandolin_body_top_wood:
      name: Träslag för mandolinens lock
      description: Primärt trä/material som använts till mandolinens resonansbotten
        (lock).
    mandolin_bridge_type:
      name: Typ av mandolinbrygga
      description: Anger mandolinens typ av stall
    mandolin_pickup_configuration:
      name: Utformning av pickup för mandolin
      description: Anger om mandolinen inkluderar elektronik och vilken typ av pickupsystem
        som är installerat.
    mandolin_string_configuration:
      name: Strängkonfiguration för mandolin
      description: Anger mandolinsträngskonfigurationen efter totalt antal strängar
        och antal källor (t.ex. 8 strängar / 4 källor).
    mangosteen_variety:
      name: Mangostansort
      description: Identifierar den specifika arten eller kultivaren av mangostan
        eller närbesläktad Garcinia-frukt som säljs.
    mannequin_style:
      name: Skyltdocka-stil
      description: Beskriver träningsdockans strukturella design eller konstruktionsstil.
    manufacturing_process:
      name: Tillverkningsprocess
      description: Primär produktionsmetod för rullkroppen eller spolen (t.ex. CNC-fräst,
        pressgjuten).
    map_coverage_sky_planet_body:
      name: Karttäckning (himmel/planetkropp)
      description: 'Anger vad kartan avbildar: natthimlen (konstellationer) eller
        en specifik planetkropp.'
    map_format:
      name: Kartformat
      description: Definierar den fysiska eller digitala presentationen av jaktkartor
        och guider.
    map_sensor_output_signal_type:
      name: Utsignaltyp för MAP-sensor
      description: Anger vilken typ av utsignal som MAP-sensorn tillhandahåller motorstyrenheten
        (ECU).
    map_size_sheet:
      name: Kartstorlek (ark)
      description: Anger den färdiga storleken på kartbladet/affischen/planisfären
        för att underlätta visning och kompatibilitet (ram, väggyta).
    marabou_feather_form:
      name: Maraboufjäderform
      description: Formfaktorn för maraboufjäderprodukten som den säljs.
    marabou_feather_treatment:
      name: Behandling av maraboufjäder
      description: Hur maraboufjädern bearbetades eller färdigställdes för hantverk.
    marble_track_set_feature_modules:
      name: Set för marmorbana – funktionsmoduler
      description: Framhäver specialfunktionella moduler som ingår i setet (t.ex.
        hiss, avfyrare, växlar).
    marine_flare_certification_standard:
      name: Certifiering/standard för marin nödraket
      description: Anger vilka marina säkerhetscertifieringar eller standarder som
        facklan påstår sig uppfylla.
    marine_safety_standard_compliance:
      name: Överensstämmelse med marin säkerhetsstandard
      description: Anger vilka formella vattensäkerhetsstandarder eller godkännanden
        som tillbehöret uppfyller.
    marine_transmission_type:
      name: Typ av marindrivlina
      description: Anger typen av marin transmission som är parad med inombordsmotorn
        (t.ex. direktdrift kontra V-drift).
    marker_action_type:
      name: Typ av mekanism för märkpenna
      description: Beskriver markörens grundläggande avfyrnings-/manövermekanism.
    marker_caliber:
      name: Markörkaliber
      description: Anger diametern på paintball-kulorna som markören är avsedd att
        avfyra.
    marking_durability:
      name: Märkningshållbarhet
      description: Anger hur länge den målade linjen förväntas vara synlig under normal
        belastning, såsom tillfällig (upp till 3 veckor), semi-permanent (upp till
        6 månader) eller permanent (mer än 6 månader).
    marking_tip_type:
      name: Typ av märkningsspets
      description: Typ av markeringsinsats som passaren använder för att rita (t.ex.
        blyerts, bläck, ritspets).
    marshmallow_processing_method:
      name: Marshmallow-bearbetningsmetod
      description: Beskriver eventuella speciella bearbetningar som tillämpas på marshmallows
        som påverkar konsistens, hållbarhet eller smak.
    marshmallow_size:
      name: Marshmallowstorlek
      description: Klassificerar den relativa storleken på enskilda marshmallowbitar.
    martial_arts_belt_rank:
      name: Kampsportsbälte - ranking
      description: Indikerar den kompetens/ranknivå som representeras av bältets färg
        eller speciella färgkombination.
    mask_bib_type:
      name: Typ av maskhaklapp
      description: Anger typen av haklapp på en fäktmask, till exempel standardtyg,
        ledande, avtagbar eller ingen.
    mask_cage_material:
      name: Monteringstyp för massflödessensor
      description: Material som används specifikt för ansiktsburen eller maskramen.
    mask_goggle_design:
      name: Mask-/skyddsglasögondesign
      description: Definierar den övergripande strukturella designen eller täckningsstilen
        för skyddsutrustningen.
    mask_skirt_material:
      name: Maskkjolens material
      description: Identifierar materialet i den mjuka kjolen som ger den vattentäta
        förseglingen mellan mask och ansikte.
    mask_strap_material:
      name: Maskremmens material
      description: Anger materialet i remmen som fäster masken vid huvudet.
    mass_air_flow_sensor_measurement_type:
      name: Mättyp för massflödessensor
      description: Anger den avkänningsteknik/utgångsstil som används av MAF-sensorn.
    mass_air_flow_sensor_mounting_type:
      name: Monteringstyp för Flow
      description: Hur MAF-sensorn eller sensorenheten är monterad/installerad i insugningssystemet.
    massage_feature:
      name: Massagefunktion
      description: Anger om den justerbara basen har en integrerad massagefunktion
        och, i så fall, hur många massagezoner den erbjuder.
    mast_attachment_interface:
      name: Gränssnitt för mastfäste
      description: Anger kopplingsstandarden mellan flygkroppen och masten, vilket
        hjälper kunden att säkerställa att komponenterna passar.
    mast_base_type:
      name: Mastbastyp
      description: Identifierar monteringsgränssnittet som ansluter masten till kortet
        eller adaptern.
    mast_bend_curve:
      name: Mastböjningskurva
      description: Mastens flexmönster som avgör seglets kompatibilitet och hantering.
    mast_diameter_type:
      name: Mastdiametertyp
      description: Standardiserad diameterklassificering av vindsurfingmasten (t.ex.
        RDM, SDM, MDM) som används för kompatibilitetskontroller.
    mat_backing_type:
      name: Typ av baksida på matta
      description: Anger vilken typ av greppbaksida mattan har för att hålla den på
        plats på olika ytor.
    mat_installation_method:
      name: Metod för montering av matta
      description: Anger hur mattan är installerad eller fäst på plats.
    mat_style:
      name: Stil på matta
      description: Definierar mattans strukturella stil eller formfaktor (t.ex. vikmatta,
        sammankopplande platta, kollisionsmatta).
    maternity_panel_type:
      name: Typ av mödravårdspanel
      description: Indikerar stilen på stretchpanelen eller midjebandet som är utformat
        för att anpassa sig till graviditetstillväxt.
    maternity_waistband_style:
      name: Typ av magpanel för gravidkläder
      description: Anger designen och placeringen av midjebandet eller magpanelen
        specifikt för gravidbyxor, och beskriver hur plagget stöder en växande mage.
    mattress_top_type:
      name: Typ av madrassöveryta
      description: Anger stilen på madrassens översta lager eller ytkonstruktion,
        till exempel pillow top eller tight top.
    maturation_vessel_material:
      name: Lagringsbehållarens material
      description: Anger det primära materialet i kärlet eller tunnan som används
        för att lagra shochu.
    maximum_quilt_size_supported:
      name: Maximal täckesstorlek som stöds
      description: Den maximala quilt-/projektstorlek som ramen rymmer (vanligtvis
        beskriven som sängstorlek eller maximal bredd).
    meal_course:
      name: Serveringsrätt
      description: Identifierar det typiska måltidstillfället för produkten.
    meal_preparation_state:
      name: Tillagningsgrad för måltid
      description: Anger hur mycket förberedelse som krävs före konsumtion (t.ex.
        färdig att äta, kit).
    meat_processing_state:
      name: Förädlingsgrad för kött
      description: Anger graden av tillagning eller härdning som köttprodukten har
        genomgått före försäljning.
    meat_quality_grade:
      name: Kvalitetsklass för kött
      description: Anger den kvalitetsgrad eller klassificering som köttet har tilldelats
        av en erkänd klassificeringsmyndighet (t.ex. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Uppfödningspåstående för kött
      description: Framhäver vanliga påståenden om djurens välfärd eller uppfödningsmetoder
        som är förknippade med köttet (t.ex. gräsbetat, frigående).
    mechanical_loom_assembly_status:
      name: Monteringsstatus för mekanisk vävstol
      description: Hur vävstolen levereras vad gäller monteringskrav.
    mechanical_loom_weaving_type:
      name: Typ av mekanisk vävstol
      description: Primär vävmekanism/typ som stöds av vävstolen.
    mechanical_puzzle_primary_mechanism:
      name: Primär mekanism för mekaniskt pussel
      description: Primär interaktion/mekanism som används för att lösa det mekaniska
        pusslet.
    mechanical_puzzle_solution_format:
      name: Lösningsformat för mekaniskt pussel
      description: Format i vilket tips/lösningar ges när de inkluderas.
    medal_attachment_style:
      name: Modell för medaljfäste
      description: Anger hur medaljen är avsedd att bäras eller visas (t.ex. halsband,
        ryggnål).
    medal_award_level:
      name: Medaljens utmärkelsenivå
      description: Anger vilken utmärkelsenivå medaljen representerar (t.ex. 1:a plats,
        deltagare).
    medal_finish:
      name: Medaljfinish
      description: Anger medaljens ytfinish (visuell glans/textur), oberoende av material.
    medal_packaging:
      name: Medaljförpackning
      description: Anger vilken typ av presentationsförpackning som medföljer medaljen.
    melodica_accessory_set_included:
      name: Melodica-tillbehörsset ingår
      description: Anger vilka vanliga tillbehör som ingår i melodica-paketet.
    melodica_air_chamber_material:
      name: Melodica-luftkammarmaterial
      description: Materialet i melodikans luftkammare/kropp (ABS, trä, etc.) när
        säljare skiljer det från andra delar.
    melodica_included_accessories:
      name: Ingående tillbehör för melodika
      description: Tillbehör som medföljer melodikan i kartongen
    melodica_key_color_scheme:
      name: Färgschema för melodikans tangenter
      description: Tangenternas färgschema (inte kroppen), vilket påverkar läsbarheten
        (särskilt för barn/nybörjare).
    melodica_mouthpiece_configuration:
      name: Melodica-munstyckets konfiguration
      description: Anger vilket/vilka blåsgränssnitt som ingår/används för att spela
        melodica.
    melodica_mouthpiece_type:
      name: Typ av munstycke för melodika
      description: Typ av blåsgränssnitt som ingår med melodikan (munstycke och/eller
        flexibelt rör).
    melodica_reed_plate_material:
      name: Material för Melodica-tungplatta
      description: Materialet i rörbladsplattan (skiljer sig från instrumentets övergripande
        material), vilket kan påverka hållbarhet och ton.
    melodica_size_class:
      name: Storleksklass för melodika
      description: Allmän storlek/portabilitetsklass för en melodika, vanligtvis baserad
        på tangentantalsgrupperingar och formfaktor (t.ex. mini/student vs standard
        vs modeller med utökat omfång).
    melon_variety:
      name: Melonsort
      description: Anger den specifika typen av melon i produkten för att hjälpa kunder
        att snabbt identifiera sin föredragna sort.
    memory_foam_infusion_material:
      name: Material för infundering i minnesskum
      description: Identifierar speciella ämnen som infunderats i minnesskummet för
        kylning, luktkontroll eller antimikrobiella ändamål.
    memory_wire_gauge:
      name: Tjocklek på minnestråd
      description: Anger minnestrådens tjocklek i AWG (American Wire Gauge).
    memory_wire_project_size:
      name: Projektstorlek för minnestråd
      description: Anger den avsedda smyckesformen/spiralstorleken som minnestråden
        är formad för (t.ex. armband, halsband, ring).
    metal_purity:
      name: Metallrenhet
      description: Anger finhets- eller renhetsgraden hos metallen som används i smycket,
        vanligtvis uttryckt i karat (K) eller tusendelar.
    metrics_counted:
      name: Spårade mätvärden
      description: Listar de individuella statistikuppgifterna eller händelserna som
        räknaren är utformad för att spåra.
    metronome_display_style:
      name: Metronomens visningsstil
      description: Anger hur tempot visas/indikeras för användaren (nål/pendel kontra
        numerisk LED/LCD kontra blinkande ljus).
    metronome_output_method:
      name: Metronomens utmatningsmetod
      description: Anger tillgängliga utmatningsmetoder för metronomljud/slagsignal.
    microphone_toy_feature_set:
      name: Mikrofonleksakens funktioner
      description: Viktiga lekfokuserade mikrofonfunktioner för leksaksmikrofoner
        (rösteffekter, förstärkning, inspelning etc.)
    midi_output_type:
      name: MIDI-utgångstyp
      description: Anger typen/typerna av MIDI-utgång som tillhandahålls av trigger-modulen.
    military_branch:
      name: Militär gren/försvarsgren
      description: Identifierar den militära gren/försvarsgren som uniformen är utfärdad
        för eller inspirerad av.
    milk_base_type:
      name: Typ av mjölkbas
      description: Anger vilken primärmjölk eller mjölkalternativ som används i drycken,
        om sådant finns.
    milk_feeding_method:
      name: Mjölkmatningsmetod
      description: Anger hur ursprungsdjuren utfodrades (t.ex. gräsbetade eller spannmålsutfodrade),
        vilket kan påverka smak och näringsprofil.
    milk_processing_method:
      name: Bearbetningsmetod för mjölk
      description: Anger den hanterings- eller bearbetningsteknik som mjölken har
        genomgått, vilket påverkar säkerhet, hållbarhet och näringsegenskaper.
    milk_source_animal:
      name: Från vilket djur mjölken kommer
      description: Identifierar djuret som mjölken erhölls från, vilket hjälper konsumenter
        att välja ko, get, buffel eller andra animaliska mejeriprodukter.
    millet_processing_method:
      name: Bearbetningsmetod för hirs
      description: Anger den primära bearbetningsmetoden eller tillståndet hos hirskornet
        (t.ex. opolerat, skalat, groddat).
    millet_variety:
      name: Hirssort
      description: Identifierar den specifika typen av hirs som finns i produkten
        (t.ex. pärlhirs, rävsvans, fingerhirs).
    milling_process:
      name: Malningsprocess
      description: Anger vilken produktionsmetod som används för att mala mjölet,
        vilket kan påverka smak, värmeexponering och näringsprofil.
    mint_mark:
      name: Myntmärke
      description: Myntmärket som visas på myntet (om tillämpligt).
    mirror_configuration:
      name: Utformning av spegel
      description: Anger stilen eller strukturen på spegeln som ingår i sminkbordssetet.
    mirror_coverage:
      name: Spegeltäckning
      description: Beskriver omfattningen av spegelpaneler på skjutdörrarna.
    mirror_curvature_type:
      name: Typ av spegelkrökning
      description: Anger om spegelytan är konvex, plan eller konkav, vilket påverkar
        synfältet.
    mirror_mounting_location:
      name: Monteringsplats för spegel
      description: Anger var på cykeln eller cyklisten spegeln är avsedd att monteras.
    mirror_shape:
      name: Spegelform
      description: Indikerar de geometriska formerna eller stilen på den primära spegeln
        som medföljer sminkbordssetet.
    mix_ratio:
      name: Blandningsförhållande
      description: Anger rekommenderat utspädningsförhållande mellan kylvätska och
        vatten (för koncentrat), eller bekräftar ett fast förblandningsförhållande
        för förspädda produkter.
    mma_glove_type:
      name: Typ av MMA-handske
      description: Indikerar handskens primära avsedda användning eller stil inom
        MMA-träning eller tävling.
    mobility_features:
      name: Mobilitetsfunktioner
      description: Indikerar inbyggda rörelse- eller portabilitetselement såsom hjul
        eller fällbara ben.
    model_aircraft_assembly_level:
      name: Monteringsgrad för modellflygplan
      description: Anger hur mycket byggnadsarbete som krävs innan flygplanet kan
        användas.
    model_making_kit_items_included:
      name: Ingående artiklar i modellbyggsats
      description: Listar vad som ingår i ett kit eller paket (t.ex. färg, lim, pensel).
    model_making_product_type:
      name: Produkttyp för modellbyggande
      description: Identifierar vad artikeln fundamentalt sett är inom modellbygge
        (sats, tillbehör, verktyg eller förnödenhet) för att förbättra bläddring och
        filtrering mellan blandade produkttyper inom modellbygge.
    model_rocket_kit_contents:
      name: Innehåll i modellraketssats
      description: Anger om produkten är en komplett flerstegsmodellraketssats eller
        en tilläggs-/modul-/delssats (t.ex. booster- eller sustainerstegskomponenter).
    model_rocket_kit_format:
      name: Utförande av Modellraketsats
      description: Anger om raketen säljs som ett kit och monteringsberedskapsnivån.
    model_rocket_motor_impulse_class:
      name: Impulsklass för modellraketmotor
      description: Indikerar den standardiserade totalimpulsklassen för modellraketmotor
        (t.ex. A, B, C ...).
    model_rocket_motor_mount_size:
      name: Storlek på modellraketmotorfäste
      description: Anger motorhöljets diameter som raketens motorfäste är konstruerat
        för att acceptera.
    model_rocket_power_source_required:
      name: Kraftkälla för modellraket som krävs
      description: Anger om produkten kräver batterier/extern strömförsörjning, och
        vilken typ.
    model_rocket_propellant_type:
      name: Drivmedelstyp för modellraket
      description: Identifierar det drivmedels-/motorsystem som används för framdrivning
        i modellraketsprodukter.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Rekommenderad avfyrningsstång eller skena för modellraket
      description: Anger avfyrningsstångens diameter eller skenans storlek som raketen
        är konstruerad för (t.ex. 1/8 tums stång, avfyrningsskena 1010).
    model_rocket_recovery_method:
      name: Återhämtningsmetod för modellraket
      description: Primärt system för säker återhämtning av raket.
    model_rocket_recovery_system_type:
      name: Typ av återhämtningssystem för modellraket
      description: Anger den primära återhämtningsmetod som används för att återföra
        raketen säkert efter flygning.
    model_rocket_staging:
      name: Modellraket – stegkonstruktion
      description: Anger hur många motoriserade steg modellraketen är konstruerad
        för att flyga med.
    model_train_accessory_electrical_connection_type:
      name: Elektrisk kopplingstyp för modelljärnvägstillbehör
      description: Anger den anslutning eller terminalstil som används för att ansluta
        strömförsörjda modelljärnvägstillbehör till en layout (i förekommande fall).
    model_train_coupler_type:
      name: Typ av modelltågskoppling
      description: Anger den koppelstandard som är installerad på modelltågets rullande
        materiel eller lok.
    model_train_gauge:
      name: Spårvidd för modelltåg
      description: Anger vilken modelljärnvägsspårmåttstandard som tillbehöret är
        avsett för (i förekommande fall), vilket bidrar till att säkerställa fysisk
        kompatibilitet med användarens spår och layout.
    model_train_lighting_features:
      name: Belysningsfunktioner för modelltåg
      description: Anger belysningsfunktionaliteten som ingår i modelltåget/loket.
    model_train_power_pickup_method:
      name: Strömupptagningsmetod för modelltåg
      description: Anger hur modellen får ström för drift (spårström, batteri, etc.).
    model_train_scale:
      name: Skala för modelltåg
      description: Anger skala-/storlekstandarden för modelltåget (förhållandet mellan
        modellen och det verkliga tåget).
    model_train_sound_features:
      name: Modelltåg – ljudegenskaper
      description: Anger om modellen inkluderar inbyggda ljudeffekter och vilken typ
        av ljud den har.
    model_train_track_gauge:
      name: Spårvidd för modelltåg
      description: Anger spårvidd/spårsystemstandard som modellen är konstruerad att
        köra på (t.ex. normalspår, smalspårsvarianter eller varumärkes-/systemspecifika
        spår där tillämpligt).
    modeling_dough_base_material:
      name: Basmaterial för modellera
      description: Primär bas/sammansättning av modelleringsdegen (t.ex. vete-/mjölbaserad
        kontra polymerbaserad).
    modeling_dough_features:
      name: Egenskaper för modellera
      description: Viktiga funktionella egenskaper hos modelleringsdegen som kunder
        vanligtvis filtrerar efter.
    modification_level:
      name: Modifieringsnivå
      description: Indikerar graden av maltmodifiering (hur grundligt kornens endosperm/proteiner
        bryts ner), ofta sammanfattat som undermodifierad/modifierad/övermodifierad.
    molasses_base_ingredient:
      name: Melassbasingrediens
      description: Identifierar den primära växt- eller fruktkällan från vilken melassen
        produceras.
    molasses_grade:
      name: Melassgrad
      description: Klassificerar melassen efter extraktions-/förädlingsstadium, vilket
        direkt påverkar smakintensitet, färg och näringsprofil.
    mold_material:
      name: Gjutformens material
      description: Primär materialsammansättning i själva formen (t.ex. silikon, plast,
        metall).
    molle_compatibility:
      name: MOLLE-kompatibilitet
      description: Anger om västen har MOLLE/PALS-väv för att fästa modulära fickor
        och tillbehör.
    motor_belt_type:
      name: Motorremtyp
      description: Definierar designen/profilen på remmen som används i löpbandets
        drivsystem.
    motor_configuration:
      name: Motorkonfiguration
      description: Anger hur många oberoende drivmotorer scootern använder.
    motor_mounting_configuration:
      name: Utformning av motorfäste
      description: Beskriver hur motorn monteras/implementeras i konverteringssatsen
        för en skoter.
    motor_mounting_position:
      name: Monteringsposition för motor
      description: Indikerar var på elscootern motorn är monterad, till exempel framhjulsnav,
        bakhjulsnav, dubbelhjulsnav eller mellanhjulsdrift.
    motor_position:
      name: Motorposition
      description: Indikerar var motorn är placerad på elcykeln, vilket påverkar hantering
        och underhåll.
    motor_vehicle_a_v_integration_features:
      name: A/V-integrationsfunktioner för motorfordon
      description: Smarttelefon- och fordonsintegreringsfunktioner som stöds av huvudenheten
        (t.ex. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Användningsområde/position för belysningslampa i motorfordon
      description: Anger den avsedda fordonsbelysningspositionen eller funktionen
        som belysningslampan är avsedd för (t.ex. halvljus, bromsljus).
    motor_vehicle_bulb_approval_standard:
      name: Indikerar godkännandemärkning för väganvändning på målmarknaden.
      description: Indikerar godkännande märkning för väganvändning i målmarknaden.
    motor_vehicle_oxygen_sensor_bank:
      name: Lambdasond för motorfordon – bank
      description: Anger vilken cylinderbank lambdasensorn passar på (t.ex. bank 1
        vs bank 2) för V-typ/boxermotorer; använd Ej tillämpligt för radmotorer.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Antal ledningar i lambdasensor för motorfordon
      description: Antal kablar i lambdasensorns kabelhärva.
    motor_vehicle_oxygen_sensor_position:
      name: Position för lambdasensor i motorfordon
      description: Anger var syresensorn (O2) är installerad i avgassystemet i förhållande
        till katalysatorn.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Sensornummer för lambdasensor i motorfordon
      description: Anger sensornumret (t.ex. Sensor 1 eller Sensor 2) inom en given
        bank-/positionsbeteckning.
    motor_vehicle_oxygen_sensor_type:
      name: Typ av lambdasond för motorfordon
      description: Anger syresensorns design/teknik.
    motor_vehicle_paint_application_method:
      name: Appliceringsmetod för motorfordonsfärg
      description: Hur färgen är avsedd att appliceras på fordonets yta.
    motor_vehicle_paint_system_step:
      name: Steg av lackeringssystem för motorfordon
      description: Anger vilket steg eller vilken komponent i ett system för billackering
        som produkten är avsedd för (t.ex. grundfärg, baslack, klarlack).
    motor_vehicle_speaker_mounting_type:
      name: Monteringstyp för högtalare i motorfordon
      description: Hur högtalaren är avsedd att installeras i fordonet (monteringsformfaktor).
    motor_vehicle_subwoofer_size:
      name: Storlek på subwoofers för motorfordon
      description: Nominell subwooferelementdiameter (t.ex. 8 tum, 10 tum, 12 tum),
        används för att matcha fordonets utrymme och höljets kompatibilitet.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfiguration av talspole för subwoofer i motorfordon
      description: Antal/konfiguration av talspolar som används för att matcha förstärkarens
        kopplingsalternativ (t.ex. SVC vs DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedans för talspole i motorfordon (per spole)
      description: Impedansklassning för varje talspole (inte slutgiltig kopplad last),
        används för kopplingsberäkningar.
    motor_vehicle_voltage_regulator_type:
      name: Typ av spänningsregulator för motorfordon
      description: Anger den regulatorteknik/form som används i motorfordon.
    motorcycle_armor_certification_standard:
      name: Certifieringsstandard för mc-skydd
      description: Anger den/de formella säkerhetsstandard(er) som skyddet är certifierat
        för att uppfylla (t.ex. EN 1621-2 för ryggskydd, EN 1621-3 för bröstskydd).
    motorcycle_cover_size_class:
      name: Storleksklass för motorcykelskydd
      description: Standardiserad storleksklass för motorcykelförvaringsskydd baserat
        på den typiska motorcykelkategorin/längdintervall som den passar.
    motorcycle_glove_certification_standard:
      name: Certifieringsstandard för motorcykelhandskar
      description: Anger den skyddscertifiering/standard som handskarna uppfyller
        (t.ex. EN 13594-nivåer).
    motorcycle_glove_waterproof_construction:
      name: Vattentät konstruktion för motorcykelhandskar
      description: Anger vilken typ av vattentätningsmetod som används i handsken
        (om någon).
    motorcycle_guard_coverage_area:
      name: Skyddsområde för motorcykel
      description: Det primära täckningsområdet som produkten tillhandahåller (armbåge,
        handled, underarm, kombination).
    motorcycle_kidney_belt_construction_type:
      name: Typ av njurbälte för motorcykel
      description: Njurbältets konstruktionsstil som påverkar styvhet, luftflöde och
        skydd.
    motorcycle_kidney_belt_purpose:
      name: Syfte med njurbälte för motorcykel
      description: Identifierar den primära körstilen eller det primära scenariot
        som motorcykelnjurbältet är utformat för.
    motorcycle_luggage_capacity_class:
      name: Kapacitetsklass för motorcykelbagage
      description: Anger motorcykelbagagets volymkapacitet, uttryckt i literintervall.
    motorcycle_luggage_mounting_system:
      name: System för montering av motorcykelbagage
      description: Fästsystem som används för att fästa väskan/packväskan på motorcykeln
        (t.ex. kastremmar, snabbkoppling monterad på hyllställ).
    motorcycle_luggage_side:
      name: Sida för motorcykelbagage
      description: För sidoväskor/sadelväskor, anger om artikeln är för vänster sida,
        höger sida eller ett par/set.
    motorcycle_protective_gear_size_system:
      name: Storlekssystem för motorcykelskyddsutrustning
      description: Anger vilket storlekssystem som används på produkten (t.ex. alfabetisk
        storlek, numerisk, en storlek).
    motorcycle_rack_carrier_style:
      name: Bärarstil för motorcykelställ
      description: Beskriver den funktionella bärarstilen för transport av en motorcykel
        eller skoter (plattform kontra räls kontra lyftassisterad, etc.).
    motorcycle_riding_discipline:
      name: Disciplin för motorcykelkörning
      description: Anger vilken kördisciplin nackkragen är avsedd för.
    motorcycle_tire_speed_rating:
      name: Hastighetsklass för motorcykeldäck
      description: Identifierar den maximala ihållande hastighet som däcket är klassat
        för, med hjälp av standardbokstavskoden (t.ex. H, V, W).
    motorsport_window_net_certification:
      name: Fönsternätscertifiering för motorsport
      description: Certifiering eller homologering för racingsäkerhet som fönsternätet
        uppfyller (t.ex. SFI eller FIA), inklusive specifikationsnummer där så är
        tillämpligt.
    mound_usage_type:
      name: Typ av användning för kulle
      description: Identifierar den avsedda användningsmiljön för kullen, till exempel
        träning, match, bullpen eller multi-purpose.
    mount_attachment_method:
      name: Monteringsmetod för fästning
      description: Anger hur fästet fästs på fordonets yta/struktur.
    mountainboard_truck_type:
      name: Typ av mountainboard-truck
      description: Klassificerar stilen på truckar som ingår i brädan, vilket påverkar
        svängrespons och hållbarhet.
    mounting_attachment_method:
      name: Monteringsmetod
      description: Hur hållaren/väskan är utformad för att fästas på en trumma, stativ,
        bälte eller annan yta.
    mounting_attachment_type:
      name: Typ av montering/fästning
      description: Hur utväxlingstillbehöret fästs eller samverkar med spinnrocken.
    mounting_hardware_included_for_installation:
      name: Monteringsutrustning ingår (för installation)
      description: Anger om monteringsutrustningen som krävs för att montera baksätet
        (t.ex. fästen, bultar, skenor) ingår i produkten.
    mounting_location:
      name: Monteringsplats
      description: Anger det avsedda placeringsområdet på utrustning eller kaross
        för ljuset/reflektorn (t.ex. framgaffel, hjälm, ekrar).
    mounting_method:
      name: Monteringsmetod
      description: Hur en pinne-/borsthållare monteras eller fästs (t.ex. med klämma,
        rem, självhäftande).
    mounting_position:
      name: Monteringsposition
      description: Anger var handbromsreglaget är avsett att monteras/installeras
        i fordonets kupé.
    mounting_rail_type:
      name: Monteringsskenatyp
      description: Anger den skena eller gränssnittsstandard som tillbehöret fästs
        på, till exempel Picatinny eller M-LOK.
    mounting_receiver_size:
      name: Storlek på monteringsmottagare
      description: Dragkroksstorlek som krävs för dragmonterade lasthållare.
    mounting_storage_type:
      name: Monterings-/förvaringstyp
      description: Hur enheten är avsedd att monteras eller förvaras på fartyget/personen.
    mouth_grip_type:
      name: Typ av mungrepp
      description: Beskriver typen av mungrepp eller skydd på visselpipan för komfort
        och hygien.
    mouthguard_mold_type:
      name: Typ av tandskydd
      description: Beskriver hur tandskyddet monteras på idrottarens tänder (t.ex.
        koka-och-betta, specialanpassad tandtillpassning).
    mouthpiece_facing_length:
      name: Munstyckets vändningslängd
      description: Indikerar längdkategorin för munstyckets ansatsyta (lay), vilket
        påverkar respons, motstånd och rörbladskompatibilitet.
    mouthpiece_material:
      name: Munstyckets material
      description: Anger materialet i munstycket/spetsdelen för munkontakt på en blowout
        (party-blower), vilket kan skilja sig från huvudkroppsmaterialet.
    mouthpiece_shank_receiver_size:
      name: Munstyckesskaft/mottagarstorlek
      description: Anger munstyckets mottagare/skaftstandard som är kompatibel med
        flugelhornet.
    mouthpiece_shank_size:
      name: Munstyckesskaft – storlek
      description: Anger standardpassformen för munstyckets skaft/mottagare för att
        säkerställa kompatibilitet med det avsedda bleckblåsinstrumentet.
    mouthpiece_shank_type:
      name: Munstycke – typ av skaft på
      description: Anger munstyckets mottagare/skaftstandard för kompatibilitet (där
        så är tillämpligt).
    mouthpiece_style:
      name: Typ av munstycke
      description: Klassificerar designen/formen på munstycket på bettet, vilket påverkar
        tryckpunkter, skärpa och hästens preferens.
    mouthpiece_type:
      name: Typ av munstycke
      description: Typ av munstycke vid blåsänden (inbyggt, avtagbart eller tilläggsmodell).
    movement_mechanism:
      name: Rörelsemekanism
      description: Definierar hur bänken rör sig under användning (gunga, glidning,
        gungning etc.).
    muffin_size:
      name: Blockspel – tonhöjdstyp
      description: Klassificerar muffinsproduktens fysiska storleksformat (t.ex. mini,
        standard, jumbo).
    mushroom_variety:
      name: Svampsort
      description: Identifierar den specifika arten eller sorten av svamp eller tryffel
        som finns i produkten (t.ex. shiitake, kungsostron, svart tryffel).
    music_stand_desk_tilt_adjustment:
      name: Justering av notställsbordets lutning
      description: Anger om och hur notställsvinkeln kan justeras.
    music_stand_intended_use:
      name: Notställets avsedda användning
      description: Anger den primära avsedda miljön/användningsområdet för notstället.
    musical_block_pitch_type:
      name: Musikalisk blocktonhöjdstyp
      description: Beskriver om det musikaliska blocket producerar en bestämd tonhöjd
        (stämd) eller en obestämd tonhöjd.
    musical_box_mechanism_type:
      name: Typ av speldosamekanism
      description: Hur speldosa producerar/spelar ljud (t.ex. uppdragningsurverk kontra
        elektronisk uppspelning).
    musical_keyboard_case_fit_type:
      name: Passformsmodell för keyboardfodral
      description: Beskriver hur fodralet är dimensionerat för instrumentet (t.ex.
        universell/generisk storlek kontra modellspecifik/anpassad passform).
    musical_ratchet_sound_character:
      name: Spärra – ljudkaraktär
      description: Allmän beskrivning av spärrhakens klangfärg/ljudstyrka.
    musical_scraper_groove_surface_material:
      name: Skrapinstrument – spårets ytmaterial
      description: Anger materialet i den räfflade skrapytan (kan skilja sig från
        kroppsmaterialet).
    musical_scraper_type:
      name: Typ av raspinstrument
      description: Anger stilen/designen på det musikaliska raspinstrumentet (t.ex.
        guiro vs reco-reco), vilket påverkar ljud och spelteknik.
    mute_attachment_method:
      name: Metod för att fästa dämpare
      description: Anger hur en cymbaldämpare är fäst vid eller hålls på plats på
        cymbalen (t.ex. gel, statisk laddning, magnet, klämma).
    mute_attenuation_level:
      name: Dämpningsnivå för cymbaldämpare
      description: Indikerar hur mycket dämpningen minskar den upplevda volymen, särskilt
        relevant för övningsdämpningar.
    mute_cork_padding_material:
      name: Dämpkork/dämpningsmaterial
      description: Anger materialet i dämparens kontaktdynor (t.ex. korkremsa/dynor)
        som används för grepp/passform och klockskydd.
    mute_coverage_type:
      name: Typ av täckning för dämpare
      description: Indikerar dämparens stil/täckning på spelytan, från små punktdämpare
        till övningsdämpare för hela spelytan.
    mute_finish:
      name: Dämpare – ytbehandling
      description: Ytbehandling på dämparen som kan påverka hållbarhet och estetik
        (t.ex. polerad kontra satin).
    name_label_text_template:
      name: Namnetikett – textmall
      description: Anger den förinställda texten eller mallen som är tryckt på namnetiketten
        (t.ex. 'Tillhör', 'Tillverkad av').
    napkin_ply:
      name: Antal lager i servett
      description: Anger cocktailservettens tjocklek i antal skikt (plyer).
    neck_brace_fit_system:
      name: Passformsystem för nackstöd
      description: Indikerar den primära metoden som används för att justera och säkra
        nackstödet till föraren.
    neck_brace_size_basis:
      name: Grund för storleksval av nackstöd
      description: Indikerar storleksgrunden som används för att välja rätt storlek
        på nackskyddet.
    neck_configuration:
      name: Utformning av hals
      description: Anger halsstil/konfiguration som medföljer saxofonen, vilket påverkar
        ergonomi och spelbarhet.
    neck_coverage_type:
      name: Typ av halstäckning
      description: Anger stilen på nacktäcket som medföljer filten.
    neck_support_size_system:
      name: Nackstöd – storlekssystem
      description: Indikerar vilket storlekssystem som används för racing-nackstödet
        (t.ex. vuxen, ungdom eller en storlek).
    necklace_length_type:
      name: Typ av halsbandslängd
      description: Anger den konventionella halsbandslängdskategorin, såsom choker
        eller opera, för att underlätta stilbaserad shopping.
    needle_balance_zone:
      name: Nålens balanszon
      description: Indikerar den magnetiska balanszonen eller halvklotet som kompassnålen
        är inställd för, vilket säkerställer noggranna avläsningar över hela världen.
    needle_case_format:
      name: Format på nålfodral
      description: Övergripande förvaringsformfaktor för nålfodralet.
    needle_damping_type:
      name: Typ av nåldämpning
      description: Beskriver hur kompassnålen stabiliseras (t.ex. vätskefylld, torr
        eller elektroniskt stabiliserad), vilket påverkar stabiliseringstid och hållbarhet.
    needle_felting_needle_profile:
      name: Nålprofil för nålfiltning
      description: Tvärsnitt/profil av en tovningsnål som påverkar hur fibrerna rör
        sig och den producerade finishen.
    needle_holder_features:
      name: Nålhållarens egenskaper
      description: Utmärkande funktioner för nålförare
    needle_holder_mounting_attachment_method:
      name: Montering/fastsättningsmetod för nålhållare
      description: Hur nålhållaren är avsedd att fästas eller användas under förvaring
        (t.ex. magnetisk, klämma, rem).
    needle_holder_style:
      name: Typ av nålförare
      description: Nålhållarens fysiska förvaring eller bärstil/design.
    needle_pushing_surface_type:
      name: Typ av nåltryckyta
      description: Typ/utformning av nålens tryckyta på syhandflatan (t.ex. metallgrop,
        mynt eller förstärkt lapp).
    needle_requirement_beading_pattern:
      name: Nålbehov (för pärlmönster)
      description: Nåltyp/storlek som rekommenderas av mönstret.
    needle_size_system:
      name: Nålstorlekssystem
      description: Storleksstandard som används för märkning av nålstorlek.
    needle_threader_compatible_needle_type:
      name: Nåltyp kompatibel med nålträdare
      description: Anger vilka nåltyper trädaren är avsedd att fungera med (efter
        nålkategori/användning).
    needle_threader_mechanism_type:
      name: Typ av mekanism för nålträdare
      description: Beskriver hur påträdaren fångar/drar tråden genom nålsögat.
    needle_threader_packaging_type:
      name: Typ av förpackning för nålträdare
      description: Hur produkten säljs/förpackas (singelförpackning vs. multipack
        vs. set).
    needlecraft_fabric_color_family:
      name: Färgfamilj för handarbetstyg
      description: Normaliserad färgfamilj för jämnvävt tyg (används tillsammans med
        färg för filtrering).
    needlecraft_fabric_composition:
      name: Sammansättning av handarbetstyg
      description: Anger fibersammansättningen/blandningen av handarbetstyget (t.ex.
        100 % bomull, linne-/bomullsblandning).
    needlecraft_fabric_weave_type:
      name: Vävtyp för handarbetstyg
      description: Anger väven/konstruktionen av handarbetslinne (t.ex. jämnväv kontra
        traditionellt linne), vilket påverkar stygnens beteende och utseende.
    needlecraft_kit_items_included:
      name: Ingående delar i handarbetssats
      description: Listar de viktigaste komponenterna som ingår i satsen (verktyg
        och förbrukningsartiklar).
    needlecraft_kit_project_type:
      name: Projekttyp för handarbetssats
      description: Identifierar vilken färdig artikel satsen ger (projektresultatet).
    needlecraft_stitching_coverage:
      name: Stygnstäckning för handarbete
      description: Anger om tyget är sydd över 1 tråd/ruta eller över 2 trådar (vanligt
        för jämnväv och linne).
    needlepoint_canvas_mesh_count:
      name: Maskantal för nålsticksduk
      description: Det avsedda maskantalet (trådar per tum) som mönstret är ritat
        för (vanligtvis kallat canvas count).
    needlepoint_frame_canvas_attachment_method:
      name: Fästmetod för nålstickningsram
      description: Beskriver hur nålstickningsduken är fäst vid ramen.
    needlepoint_frame_compatible_stand_type:
      name: Stativtyp kompatibel med nålstickningsram
      description: Om ramen är utformad för att monteras på ett stativ anges vilken/vilka
        stativtyper den är kompatibel med.
    needlepoint_frame_contents:
      name: Needlepointram – innehåll
      description: Anger vilka komponenter och tillbehör som ingår i ramen (t.ex.
        ram, extra stänger/stavar, spikar/stift, greppremsor, bärväska).
    needlepoint_frame_tension_adjustment_type:
      name: Justeringstyp för ram
      description: Indikerar hur (eller om) ramens spänning kan justeras under användning.
    needlepoint_pattern_chart_format:
      name: Needlepoint – format för mönsterdiagram
      description: Hur nålstickningsdesignen presenteras för sömnad (diagram vs. tryckt/målad
        guide).
    needlepoint_project_type:
      name: Needlepoint – projekttyp
      description: Den avsedda färdiga artikeln/kategorin som nålstickningsdesignen
        är för.
    net_design:
      name: Nätdesign
      description: Identifierar nätets konstruktionsstil och anger om det kan dras
        in eller vikas för att vara portabelt.
    net_mesh_pattern:
      name: Nätmaskmönster
      description: Anger den geometriska formen på nätöppningarna, vilket kan påverka
        synlighet och styrka.
    net_twine_gauge:
      name: Tjocklek på nätgarn
      description: Anger nätets garntjocklek eller hållfasthet, traditionellt uttryckt
        som ett gaugenummer (t.ex. 18, 36).
    nicotine_source:
      name: Nikotinkälla
      description: Anger om nikotinet i produkten är tobaksderiverat, syntetiskt eller
        om produkten inte innehåller nikotin.
    nipple_drive_interface:
      name: Drivgränssnitt för nippel
      description: Identifierar stilen/standarden för nippelns drivgränssnitt eller
        huvud (externt eller internt), och bestämmer vilket verktyg och hjultillverkningsmetod
        som krävs.
    nock_activation_method:
      name: Aktiveringsmetod för pilnock
      description: Anger mekanismen med vilken den självlysande pilnockens LED slås
        på eller av (t.ex. bågsträngstryck, rörelsesensor, manuell brytare).
    nock_fitment_code:
      name: Passningskod för nock
      description: Tillverkarens eller branschens kod som identifierar vilken nockfamilj/serie
        den tillhör.
    nock_throat_size:
      name: Nockens spårstorlek
      description: Anger storleken på nockhalsen (spåret) som snäpper fast på bågsträngen.
    nock_transparency_level:
      name: Transparensnivå för nock
      description: Beskriver hur genomskinligt nockmaterialet är – klar, genomskinlig,
        ogenomskinlig eller självlysande – vilket påverkar synlighet och utseende..
    nock_type:
      name: Nocktyp
      description: Anger nockdesignen som används på en pil eller bult, till exempel
        pin, halvmåne eller självlysande.
    noise_reduction_type:
      name: Typ av brusreducering
      description: Anger vilken brusreduceringsteknik som används (eller inte används)
        i hjälmens integrerade headset, om tillämpligt.
    noise_suppression_technology:
      name: Brusdämpningsteknik
      description: Anger om produkten använder passiv dämpning eller aktiv elektronisk
        krets som komprimerar höga ljud och/eller förstärker omgivningsljud.
    non_slip_base_features:
      name: Halkfria basfunktioner
      description: Indikerar de halkskyddsfunktioner som finns för att förhindra att
        pedalen rör sig under användning.
    nose_bridge_type:
      name: Typ av näsbrygga
      description: Indikerar näsbryggans design, vilket påverkar passformen över olika
        ansiktsformer.
    nose_clip_accessories_included:
      name: Tillbehör som medförljer näsklämma
      description: Listar eventuella ytterligare tillbehör som medföljer simnäsklämman
        (t.ex. öronproppar, förvaringsfodral).
    nose_clip_features:
      name: Egenskaper för näsklämma
      description: Framhäver allmänna funktionella eller komfortmässiga egenskaper
        hos näsklämman.
    nose_coverage_style:
      name: Typ av nästäckning
      description: Indikerar förekomsten och typen av nospanel på flugmasken.
    noseband_type:
      name: Typ av nosgrimma
      description: Anger nosgrimmens design (om sådan finns) som medföljer tränset.
    number_of_canvas_meshes:
      name: Antal duknät
      description: Maskstorleken på plastduksarket, uttryckt som hål per tum (HPI)
        eller antal, vilket avgör stygnstorlek och projektdetalj.
    number_of_chainrings:
      name: Antal kedjekransar
      description: Anger hur många kedjekransar vevpartiet är avsett att montera eller
        som medföljer.
    number_of_control_stations:
      name: Antal kontrollstationer
      description: Anger antalet roder-/kontrollstationer som stöds av kontrolluppsättningen
        (enkelstation kontra dubbelstation, etc.).
    number_of_digits:
      name: Antal siffror
      description: Hur många siffror räknaren visar (t.ex. 1-siffrig, 2-siffrig, 3-siffrig).
    number_of_guitar_slots:
      name: Antal gitarrfack
      description: Anger hur många gitarrer lådan/gigbagen är avsedd att rymma.
    number_of_needlecraft_fabrics:
      name: Antal tyger för handarbete
      description: Anger tygantalet för handarbetsduk/tyg, vanligtvis uttryckt som
        rutor/trådar per tum (t.ex. 14-count).
    number_of_plastic_canvas_meshes:
      name: Maskantal för plastduk
      description: Anger maskantalet för plastduk (hål per tum), vilket avgör stygnstorlek
        och projektdetaljnivå.
    number_of_quilting_frame_rails:
      name: Antal ramskenor för quiltning
      description: Antal skenor/rullar som ingår i Frame (t.ex. 2-skenassystem kontra
        3-skenassystem).
    number_of_rope_slots:
      name: Antal repluckor
      description: Anger om säkringsenheten är konstruerad för användning med ett
        eller två rep.
    number_of_switch_poles:
      name: Antal switchpoler
      description: Antalet separata kretsar (poler) som styrs av brytaren (t.ex. SPST,
        DPST).
    number_of_switch_throws:
      name: Antal kastlägen
      description: Antalet utgångsvägar (kast) per pol (t.ex. SPDT).
    number_of_timing_chain_rows:
      name: Antal kamkedjerader
      description: Anger om kamkedjan är enradig eller flerradig.
    number_of_trailer_axles:
      name: Antal släpvagnsaxlar
      description: Antal axlar på släpvagnen.
    number_of_wheel_pieces:
      name: Antal hjuldelar
      description: Anger om hjulet är tillverkat i 1, 2 eller 3 delar.
    numbering_style:
      name: Numreringsstil
      description: Anger om och hur nummerlapparna är förnumrerade för lagidentifiering
        (t.ex. onumrerade, 1-10, anpassade).
    nunchuck_connector_type:
      name: Nunchuck-anslutningstyp
      description: Typ av koppling mellan de två nunchuck-handtagen (t.ex. rep, kedja,
        svivelkedja).
    nursing_access:
      name: Amningsmöjlighet
      description: Identifierar metoden för amningstillgång som är integrerad i baddräkten,
        om tillämpligt.
    nursing_access_type:
      name: Tillgång för amning
      description: Anger hur plagget ger åtkomst till bröstet för amning eller pumpning.
    nut_butter_texture:
      name: Nötsmörskonsistens
      description: Beskriver nötsmörets fysiska konsistens så att kunden enkelt kan
        välja mellan slätt, krispigt etc.
    nutrient_fortification:
      name: Näringsberikning
      description: Identifierar viktiga näringsämnen som drycken eller livsmedelsprodukten
        är berikad med.
    oak_product_form:
      name: Produktform för ek
      description: Identifierar den fysiska formen av ek som används för lagring/smaksättning
        av produkter.
    oak_toast_level:
      name: Ekrostningsgrad
      description: Anger rostningsgraden för ekprodukter.
    oboe_case_capacity:
      name: Kapacitet för oboefodral
      description: Anger vilket/vilka instrument och huvudkomponenter lådan är avsedd
        att bära.
    oboe_case_carry_configuration:
      name: Bärkonfiguration för oboefodral
      description: Indikerar den primära bärkonfigurationen som erbjuds av lådan/gigbagen.
    oboe_case_design:
      name: Design av oboefodral
      description: Klassificerar konstruktionen/styvheten hos en oboeväska eller gigbag
        (t.ex. hård, halvstyv, mjuk) för att indikera skyddsnivå.
    oboe_case_internal_fit_type:
      name: Invändig passform för oboefodral
      description: Anger om interiören är gjuten för en specifik instrumentkonfiguration
        eller använder justerbara fack.
    oboe_keywork_plating:
      name: Oboe-klaviaturplätering
      description: Anger pläteringen/finishen på oboens klaviatur (tangenter), separat
        från kroppens material.
    oboe_strap_padding:
      name: Stoppning i oboerem
      description: Beskriver förekomsten/typen av stoppning i remmens/stödets kontaktområde
        för komfort (t.ex. vadderat axel-/nackområde).
    oboe_swab_style:
      name: Typ av rengöringspinne för oboe
      description: Anger den funktionella stilen/konstruktionen för en oboe-rengöringspinne
        (t.ex. genomdragbar, viktad siden).
    observation_window_material:
      name: Material för observationsfönstret
      description: Anger materialet för visningspanelerna/fönstret (ofta påverkar
        klarhet och hållbarhet).
    ocarina_accessories_included:
      name: Tillbehör som medföljer okarina
      description: Tillbehör som medföljer ocarinan, såsom ett fodral, halsrem eller
        grepptabell.
    ocarina_chamber_count:
      name: Antal kammare för okarina
      description: Anger hur många kammare den inline-okarinan har, vilket påverkar
        omfång och spelkomplexitet (enkel/dubbel/trippel, etc.).
    ocarina_fingering_system:
      name: Fingersättningssystem för okarina
      description: Anger det fingersättningssystem/standard som hängande ocarinan
        följer (om tillämpligt).
    ocarina_finish_type:
      name: Ocarina – typ av finish
      description: Ytfinish på ocarinans kropp som påverkar känsla och det estetiska
        utförandet
    occupant_classification_sensor_support:
      name: Stöd för passagerarklassificeringssensor
      description: Anger om sätet har en sensor för passagerarklassificering/vikt
        eller har möjlighet att överföra/installera OEM-sensorn (vanligtvis för passagerarsätena
        fram).
    octave_harmonica_cover_plate_material:
      name: Munspelsskalets material
      description: Material i de yttre täckplattorna på oktavmunspelet.
    octave_harmonica_tuning_system:
      name: Oktavstämningssystem för munspel
      description: Stämningen/temperan som används för oktavmunspelet.
    octoban_mounting_system_type:
      name: Monteringssystemtyp för octoban
      description: Hur octoban monteras/placeras under spel (monterings-/fästes-/stativkonfiguration).
    odor_control_features:
      name: Funktioner för luktkontroll
      description: Anger om produkten har luktneutraliserande/luktdeodoriserande funktion
        och med vilken metod.
    office_furniture_items_included:
      name: Medföljande möbeldelar för kontor
      description: Identifierar den specifika kontorsmöbelartikeln som ingår i setet,
        till exempel ett skrivbord eller arkivskåp.
    oil_cooler_core_type:
      name: Typ av oljekylarkärna
      description: Anger oljekylarens interna kärnkonstruktion, vilket påverkar kyleffektivitet,
        tryckfall och hållbarhet.
    oil_cooler_mounting_style:
      name: Monteringsstil för oljekylare
      description: Beskriver hur oljekylaren är avsedd att monteras/installeras på
        fordonet.
    oil_dipstick_component_type:
      name: Typ av oljestickekomponent
      description: Anger vilken oljenivåmätningskomponent som säljs (t.ex. endast
        oljesticksblad/-stång, endast handtag, komplett enhet, oljesticksrör etc.).
    oil_dipstick_measurement_markings:
      name: Mätmarkeringar på oljesticka
      description: Anger vilka markeringar/skalor som finns på oljestickan för avläsning
        av oljenivån.
    oil_dipstick_tube_mounting_type:
      name: Monteringstyp för oljesticksrör
      description: Anger hur oljestickans rör är fäst eller monterat på motorn eller
        motorblocket.
    oil_drain_plug_head_drive_type:
      name: Drivtyp för oljeavtappningspluggens huvud
      description: Anger verktygsingreppsgränssnittet på oljeavtappningspluggens huvud
        som används för installation och demontering.
    oil_drain_plug_magnet_type:
      name: Magnettyp för oljeavtappningsplugg
      description: Anger om avtappningspluggen är magnetisk och i så fall vilken typ.
    oil_fill_cap_type:
      name: Typ av oljepåfyllningslock
      description: Stil/typ av oljepåfyllningslocksgränssnitt som används av ventilkåpan
        (om tillämpligt).
    oil_filler_cap_attachment_type:
      name: Fästtyp för oljepåfyllningslock
      description: Anger hur oljepåfyllningslocket sitter kvar på motorns/oljepåfyllningshalsen
        (t.ex. gängat, bajonett/quarter-turn, presspassning).
    oil_filler_cap_installation_position:
      name: Monteringsläge för oljepåfyllningslock
      description: Anger var locket används när det finns flera oljepåfyllningspunkter
        (t.ex. ventilkåpa, fjärrpåfyllningsrör).
    oil_filler_cap_locking_type:
      name: Typ av låsning för oljepåfyllningslock
      description: Anger om oljepåfyllningslocket är icke-låsande eller använder en
        låsande/säkrad borttagningsmetod (t.ex. nyckel eller verktygskrävande) för
        att förhindra manipulering/stöld eller oavsiktlig öppning.
    oil_filler_cap_tether_type:
      name: Typ av tjudring för oljelock
      description: Anger om oljepåfyllningslocket är fastspänt för att förhindra förlust
        och vilken typ av fastspänning som används.
    oil_filler_cap_venting_type:
      name: Ventilationstyp för oljepåfyllningslock
      description: Anger om locket är ventilerat och ventilationsmekanismen (om tillämpligt).
    oil_filter_style:
      name: Oljefilterstil
      description: Anger oljefiltrets formfaktor och monterings-/installationsstil
        för kompatibilitet med motorns filterfäste.
    oil_pan_baffle_windage_features:
      name: Oljetrågsbaffel-/vindskyddsfunktioner
      description: Indikerar interna oljekontrollfunktioner som ingår i tråget.
    oil_pan_finish_coating:
      name: Ytbehandling/beläggning för oljetråg
      description: Beskriver ytbehandlingen eller beläggningen på oljetråget (målad,
        pulverlackerad, pläterad, rå, etc.).
    oil_pressure_sensor_function_type:
      name: Funktionstyp för oljetryckssensor
      description: Anger om delen är en oljetrycksgivare med variabel utgång för en
        mätare/styrenhet, eller en på/av oljetrycksbrytare som utlöser en varningslampa.
    oil_pressure_sensor_signal_output_type:
      name: Oljetryckssensorns signalutgångstyp
      description: Anger den elektriska utsignalen/signaltypen som produceras av oljetryckssensorn/sändaren.
    oil_processing_method:
      name: Bearbetningsmetod för olja
      description: Anger hur oljan producerades eller raffinerades (t.ex. kallpressad,
        jungfru, raffinerad), vilket påverkar smak, näringsvärde och lämpliga tillagningsmetoder.
    oil_pump_drive_method:
      name: Drivmetod för oljepump
      description: Anger vad som driver oljepumpen i motorn.
    oil_pump_mounting_style:
      name: Typ av montering för oljepump
      description: Anger var och hur oljepumpen monteras i motorn (t.ex. intern vs.
        extern/fjärrmonterad, kåpmontering, oljetrågsmontering).
    oil_system_connection_thread_standard:
      name: Gängstandard för anslutning i oljesystem
      description: Anger den tråd-/kopplingsstandard som används av delens oljesystemgränssnitt
        för installation/kompatibilitet (t.ex. M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Oljeviskositetsgrad
      description: Beskriver den relativa tjockleken på spinnoljan för hantverk (ej
        SAE-kvaliteter för fordon).
    okra_variety:
      name: Okrasort
      description: Identifierar den specifika kultivar eller marknadssort av okra
        som erbjuds, såsom Clemson Spineless, röd Burgundy eller Baby Okra.
    olfactory_arts_material_form:
      name: Olfaktoriska hobbymaterial
      description: Anger materialets fysiska form som det säljs.
    olfactory_arts_tool_kit_content:
      name: Innehåll i doftkonstsats
      description: Listar vilka komponenter som ingår när produkten säljs som ett
        kit eller set för tillverkning av ljus/rökelse/parfym.
    olive_variety:
      name: Olivsort
      description: Anger vilken olivkultivar som används, vilket påverkar smak, konsistens,
        färg och regional äkthet.
    onion_variety:
      name: Löksort
      description: Anger den specifika typen av lök så att kunden snabbt kan hitta
        föredragen färg, smak och användningsområden, samtidigt som det gör det möjligt
        för handlare att korrekt lista produkter.
    opacity_level:
      name: Opacitetsnivå
      description: Anger hur genomskinligt eller ogenomskinligt tyget är.
    operating_modes:
      name: Driftläge
      description: Primära inbyggda effekt-/rörelsemönster som stöds av laserljuset.
    operating_voltage:
      name: Driftspänning
      description: Anger den nominella systemspänning som injektorn är konstruerad
        för.
    optical_toy_features:
      name: Funktioner hos optiska leksaker
      description: Framhäver den primära visuella/optiska effekten som leksaken producerar.
    orchestral_string_core_material:
      name: Orkestersträngs kärnmaterial
      description: Anger kärnans konstruktionsmaterial för strängen (kärnan), vilket
        starkt påverkar känsla, respons och ton.
    orchestral_string_end_type:
      name: Typ av strängände för orkestersträng
      description: Anger fäststilen vid strängens bakstyckesände.
    orchestral_string_included_strings:
      name: Strängar för orkesterstränginstrument som ingår
      description: Listar vilka specifika strängar som ingår i paketet (varierar beroende
        på instrument).
    orchestral_string_instrument_fitting_part_type:
      name: Typ av beslag/del för orkesterstränginstrument
      description: Anger vilken typ av beslag/del produkten är (t.ex. brygga, bakstycke,
        hakstöd).
    orchestral_string_instrument_mute_type:
      name: Typ av dämpare för orkesterstränginstrument
      description: Anger den funktionella typen av dämpare för orkesterstränginstrument
        (t.ex. övning/hotell vs. konsertbruk) och/eller vanlig designstil.
    orchestral_string_instrument_part_position:
      name: Orkesterstränginstrument – delens position
      description: Anger var delen hör hemma på instrumentet (användbart när delar
        finns i övre/nedre eller vänster/höger variant).
    orchestral_string_winding_material:
      name: Material för strängar till orkesterstränginstrument
      description: Anger det yttre lindnings-/omslagsmaterialet som används på strängen.
    organza_finish_sheen:
      name: Organza-finish / glans
      description: Beskriver organzans ytliga utseende (matt vs. glänsande/iriserande
        effekter).
    organza_ribbon_transparency_level:
      name: Organzabandets genomskinlighetsnivå
      description: Beskriver hur genomskinligt organzabandet är.
    organza_transparency_level:
      name: Genomskinlighetsgrad för organza
      description: Beskriver hur genomskinligt organzatyget är när det läggs i ett
        lager.
    origami_paper_shape:
      name: Origamipapper – form
      description: Anger den pappersform som används för vikning.
    origami_paper_sidedness:
      name: Origamipapper – ensidigt/dubbelsidigt
      description: Anger om origamipappret har samma färg/mönster på båda sidor eller
        kontrasterande sidor.
    ostrich_feather_part:
      name: Strutsfjäderdel
      description: Identifierar strutsfjäderstilen/delen som används (t.ex. plym kontra
        drab) vilket påverkar mjukhet, densitet och typiskt hantverksanvändning.
    outboard_motor_shaft_type:
      name: Typ av axel för utombordsmotor
      description: Standardaxellängdsklass som används av utombordare (beteckning
        som används inom marinindustrin).
    outboard_motor_steering_type:
      name: Typ av styrning för utombordsmotor
      description: Anger styrgränssnittet/mekanismen som används av utombordsmotorn
        (t.ex. rorkult eller fjärrstyrningssystem).
    outdoor_table_functionality:
      name: Funktionalitet för utomhusbord
      description: Identifierar specialiserade inbyggda funktioner som går utöver
        en enkel bordsyta (t.ex. kylfack, förvaringshylla, bensintanksskydd, parasollfot,
        stolskoppling, hopfällbar design, pool-säker, justerbar höjd, integrerade
        hjul, LED-belysning).
    outerwear_length_type:
      name: Typ av ytterkläders längd
      description: Klassificerar ett ytterplaggs totala längd i standardiserade beskrivande
        intervall.
    outerwear_pieces_included:
      name: Ingående ytterplagg
      description: Listar de plagg som medföljer när produkten säljs som ett set.
    outfit_attachment_mechanism:
      name: Mekanism för fastsättning av outfit
      description: Anger hur klädsel eller accessoarer fästs på dockan (t.ex. flik,
        självhäftande material, magneter).
    outfit_items_included:
      name: Ingående delar i outfit
      description: Listar de specifika plaggartiklarna som ingår i setet (t.ex. body,
        shorts, pannband).
    outlet_thread_type:
      name: Gängtyp för utlopp
      description: Gängstandard som används vid huvudcylinderns bromsledningsutloppsportar
        (t.ex. metrisk bubbelrörskoning vs SAE omvänd kon).
    output_jack_type_instrument:
      name: Utgångstyp (instrument)
      description: Anger typen av ljudutgångsuttag på den elektriska mandolinen.
    output_signal_type:
      name: Utgångssignaltyp
      description: Elektriskt utmatningsbeteende/typ som produceras av sensorn (t.ex.
        analogt motstånd för NTC-termistor).
    outsole_marking_type:
      name: Märkningstyp för yttersula
      description: Indikerar om skons yttersula lämnar märken på planens ytor, en
        viktig faktor för inomhusracketsporter.
    outsole_material:
      name: Yttersulamaterial
      description: Anger materialet i skons yttersula som är i kontakt med marken
        och påverkar grepp, flexibilitet och hållbarhet.
    outsole_stud_type:
      name: Typ av sulklackar
      description: Beskriver yttersula-/dubbkonfigurationen (t.ex. gjutna dubbar,
        gummiklackar, gräsnubbar) som ger grepp på den valda spelytan.
    oven_bake_clay_formulation:
      name: Formulering för ugnsbakad lera
      description: Identifierar formuleringsfamiljen för ugnsbakad lera (t.ex. polymerlera
        kontra hartslera), vilket påverkar hantering, härdningsbeteende och slutliga
        egenskaper.
    oven_housing_configuration:
      name: Ugnshuskonfiguration
      description: Definierar den avsedda layout som skåpet ska rymma (t.ex. enkel
        ugn, dubbelugn eller kombination av ugn och mikrovågsugn).
    overhead_mount_installation_method:
      name: Installationsmetod för takfäste
      description: Hur takfästet är fäst vid fordonet (hårdvara/fäststil).
    oversize_or_undersize_grade:
      name: Överdimensionerings- eller underdimensioneringsgrad
      description: Anger kitstorlekkvalitet (överdimensionerade kolvar/ringar och/eller
        underdimensionerade lager) i förhållande till OEM-standardstorlek.
    p_tex_application_method:
      name: Metod för applicering av P-Tex
      description: Beskriver hur P-Tex-materialet appliceras på skid- eller snowboardbasen.
    p_tex_form:
      name: P-Tex-form
      description: Identifierar den fysiska form i vilken reparationsmaterialet levereras.
    packability:
      name: Packbarhet
      description: Anger om och hur västen kan packas eller läggas undan när den inte
        används.
    packaging_format:
      name: Förpackningsformat
      description: Hur strängarna förpackas/säljs (enskilda kuvert, bulk, etc.).
    packaging_material:
      name: Förpackningsmaterial
      description: Anger det primära materialet i flaskan eller behållaren som innehåller
        vattnet.
    packaging_type:
      name: Typ av förpackning
      description: Beskriver hur bobbleheaden är förpackad för försäljning/visning/samlarförvaring.
    packing_medium:
      name: Packningsmedium
      description: Anger den vätska eller det medium (såsom vatten, olika siraper,
        juice eller saltlake) som används för att konservera frukten inuti behållaren.
    pad_components_included:
      name: Medföljande delar för dyna
      description: Anger vilka delar som ingår när produkten säljs som ett set (t.ex.
        knä- och armbågsskydd, endast handledsskydd).
    pad_controller_additional_control:
      name: Ytterligare kontroller för pad-kontroller
      description: Typer av ytterligare fysiska kontroller utöver pads (rattar, faders,
        knappar) som finns på enheten.
    pad_controller_performance_features:
      name: Prestandafunktioner för pad-kontroller
      description: Viktiga prestanda-relaterade padfunktioner för spelande och uttrycksfull
        kontroll.
    pad_coverage_area:
      name: Täckningsområde för dynan
      description: Anger de kroppszoner som gördelns integrerade vadderingar skyddar.
    pad_material_or_technology:
      name: Material eller teknik för dynan
      description: Anger vilken stötdämpningsteknik eller vilket märkesmaterial som
        används i dynan.
    pad_mounting_or_holding_style:
      name: Dynans typ av montering eller fästanordning
      description: Indikerar hur dynan hålls, bärs eller monteras under användning.
    pad_saver_style:
      name: Typ av dynskydd
      description: Indikerar den fysiska stilen/designen på dynskyddet som används
        för att torka dynorna och borrningen.
    pad_shape:
      name: Form på dyna
      description: Definierar den geometriska formen eller krökningen av dynans slagyta
        eller hela kroppen (t.ex. rund, böjd, rektangulär, platt), vilket hjälper
        användare att matcha dynor till träningsmål och slagtyper.
    pad_shell_type:
      name: Skaltyp för dyna
      description: Klassificerar konstruktionsstilen på dynans yttre yta (t.ex. hårt
        skal, mjukt skal, invändig insats).
    pad_style:
      name: Typ av dyna
      description: Anger typ eller design av dynan som medföljer släden.
    padding_layers:
      name: Dämpningslager
      description: Anger antalet skumlager som används för stötdämpning.
    padding_level:
      name: Vadderingsnivå
      description: Anger mängden vaddering som är integrerad i remmens/stödets kontaktytor
        (nacke/axel/rygg).
    padding_material:
      name: Vadderingsmaterial
      description: Anger den inre stoppningen eller vadderingsmaterialet som absorberar
        stötar inuti väskor, skydd, vantar och dockor.
    paddle_ball_attachment_type:
      name: Fästtyp för paddelboll
      description: Anger hur bollen är kopplad till paddeln (eller om den inte är
        fastspänd).
    paddle_leash_style:
      name: Typ av paddelsäkring
      description: Anger typ eller utformning på paddelns säkerhetslina.
    paddle_shape:
      name: Form på paddel
      description: Definierar den övergripande silhuetten av paddelhuvudet/kroppen
        (t.ex. standard, avlång, bred), vilket påverkar räckvidd, sweet spot-storlek
        och manövrerbarhet.
    paddleboard_intended_use:
      name: Avsedd användning av paddelbräda
      description: Klassificerar det primära designändamålet eller den aktivitet som
        brädan är byggd för (t.ex. Touring, Yoga, Racing).
    paint_application_method:
      name: Metod för färgapplicering
      description: Det primära sättet som produkten är avsedd att appliceras på bromsoket.
    paint_by_number_surface_type:
      name: Yttyp för målning efter nummer
      description: Ytan som den numrerade designen är tryckt på (t.ex. duk, papper,
        träpanel).
    paint_medium_application_method:
      name: Appliceringsmetod för målningsmedium
      description: Anger det rekommenderade sättet att applicera mediet.
    paint_medium_intended_effect:
      name: Avsedd effekt för målningsmedium
      description: Anger det primära resultat som mediet är avsett att skapa (textur,
        glans, glasering, flytbarhet, etc.).
    paint_safe_bristles:
      name: Färgtåliga borst
      description: Anger om borsthåren är märkta som säkra för användning på billack/klarlack
        (repfria).
    paintable_surface:
      name: Målningsbar yta
      description: Anger om papier-maché-formen är redo att målas som den är (t.ex.
        grundmålad/förseglad) eller kräver förberedelse.
    paintball_caliber:
      name: Paintballkaliber
      description: Anger diametern/kalibern för paintballbollar eller kompatibel utrustning.
    paintball_feed_system:
      name: Paintballmatningssystem
      description: Definierar hur paintballbollar matas in i markören.
    paintball_fill_color:
      name: Fyllnadsfärg för paintball
      description: " Indikerar färgen på den inre markeringsfyllningen, vilken kan
        skilja sig från det yttre skalet och avgör färgen som blir kvar vid träff."
    paintball_fill_type:
      name: Typ av fyllning för paintball
      description: Beskriver eventuella speciella formuleringar eller egenskaper hos
        fyllningen (t.ex. tvättbart, självlysande pulver).
    paintball_grade:
      name: Kvalitetsgrad för paintball
      description: Beskriver prestandaklass eller avsedd användningsnivå (t.ex. nybörjare,
        fält, tävling, vinter).
    paintball_mask_coverage_level:
      name: Täckningsgrad för paintballmask
      description: Anger vilka delar av ansiktet eller huvudet som paintballglasögonen
        eller -masken skyddar (endast glasögon, halva ansiktet, hela ansiktet eller
        hela huvudet).
    paintball_tank_valve_type:
      name: Typ av ventil för paintballtank
      description: Beskriver ventil- eller regulatorgränssnittet som finns på tanken.
    painting_surface_priming_type:
      name: Grunderingstyp för målningsyta
      description: Anger grundningen/beläggningen på målningsytan (utöver bara grundmålad/ogrundmålad),
        vilket påverkar färgens vidhäftning och teknikens kompatibilitet.
    palette_knife_blade_edge_profile:
      name: Palettknivbladets kantprofil
      description: Beskriver arbetskantprofilen på ett palettknivsblad (inte skärpan),
        vilket påverkar penseldrag och blandning.
    palette_knife_flexibility:
      name: Palettknivens flexibilitet
      description: Beskriver palettknivsbladets styvhet/flexibilitet.
    palette_surface_finish:
      name: Palettens ytfinish
      description: Beskriver palettens ytfinish/beläggning som påverkar fläckbeständighet
        och rengöringsvänlighet.
    palm_padding_level:
      name: Nivå av handflate-dämpning
      description: Beskriver mängden dämpning i handflatan på handsken eller greppplattan.
    palm_padding_type:
      name: Typ av handflate-dämpning
      description: Indikerar materialet eller konstruktionen som används för dämpning
        i handflatan (t.ex. gel, skum, dubbelskikt).
    palm_wax_blend_readiness:
      name: Blandningsgrad för palmvax
      description: Anger om produkten är rent palmvax eller en förblandad formulering
        avsedd för specifika prestandaegenskaper.
    palm_wax_form:
      name: Palmvaxform
      description: Palmvaxets fysiska form som det säljs, vilket påverkar mätbarhet,
        smälthastighet och hantering.
    pan_flute_tuning_standard:
      name: Standard för stämning av panflöjt
      description: Referensfrekvens som används för stämning (t.ex. A4=440 Hz), viktig
        för att spela med andra instrument.
    pannier_configuration:
      name: Utformning av sidoväska
      description: Anger om produkten säljs som en enkel väska, en sammankopplad dubbel
        eller ett par/trippel set sidoväskor.
    pannier_mounting_system:
      name: Infästningssystem för sidoväska
      description: Definierar mekanismen som används för att fästa sidoväskan på cykelstället
        eller ramen, vilket säkerställer kompatibilitet med olika konfigurationer.
    pant_cuff_style:
      name: Typ av byxmanschett
      description: " Indikerar byxornas avslutning eller justering vid vristen (t.ex.
        elastiska muddar, blixtlås vid vristen, öppen fåll)."
    pant_leg_conversion_type:
      name: Typ av benkonvertering för byxor
      description: Anger om och hur byxbenen kan omvandlas eller justeras för olika
        längder.
    pantyhose_crotch_style:
      name: Grenstil för strumpbyxor
      description: Definierar utformningen av grenområdet och skiljer mellan standardversioner
        med stängt gren, grenlösa eller förstärkta grenkil.
    papaya_variety:
      name: Papayasort
      description: Anger kultivar eller marknadssort av papaya (t.ex. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Format för pappers- och magnetdocka
      description: Anger om produkten är en traditionell pappersdocka, ett magnetiskt
        dock-set eller ett hybridformat.
    paper_color_family:
      name: Pappers färgfamilj
      description: Anger om paketet är enfärgat, blandade färger eller specialblandningar
        (användbart när färgen är per artikel men paketen är blandade).
    paper_magnetic_doll_set_contents:
      name: Innehåll i pappers- och magnetdockeset
      description: Anger vilka huvudkomponenter som ingår i setet.
    paper_opacity:
      name: Pappersopacitet
      description: Indikerar hur genomskinligt pappret är, från mycket transparent
        till ogenomskinligt (användbart för kalkering).
    paraglider_certification_rating:
      name: Certifieringsklass för paraglider
      description: Anger den officiella flygvärdighetsklassificeringen som tilldelats
        en paraglider-flygel (t.ex. EN- eller LTF-klasser).
    parasite_types_controlled:
      name: Kontrollerade parasittyper
      description: Listar de inre parasiter som produkten är effektiv mot så att köpare
        kan skräddarsy avmaskningsprogram till specifika angrepp.
    parking_camera_mounting_location:
      name: Monteringsplats för backkamera
      description: Var på fordonet kameran är avsedd att installeras (t.ex. registreringsskyltsområde,
        ytmontering bak, infälld montering).
    parking_camera_night_vision_technology:
      name: Nattvisionsteknik för parkeringskamera
      description: Den metod som kameran använder för att hjälpa till i svagt ljus.
    parking_camera_orientation:
      name: Parkeringskamerans orientering
      description: Om kameran är utformad för bakåtsikt, framåtsikt eller valbar/speglad
        användning.
    parking_sensor_finish:
      name: Parkeringssensorns ytbehandling
      description: Anger ytfinishen på parkeringssensorns framsida/kåpa (t.ex. övermålningsbar/grundmålad,
        matt, blank) för att matcha stötfångarens estetik.
    parking_sensor_type:
      name: Typ av parkeringssensor
      description: Anger vilken sensorteknik som används av parkeringssensorn (t.ex.
        ultraljud, elektromagnetisk, radar, optisk).
    parsley_root_variety:
      name: Persiljerotsort
      description: Anger kultivar eller sort av persiljeroten när denna tillhandahålls
        av leverantören.
    parsnip_variety:
      name: Palsternackasort
      description: Identifierar den specifika sorten eller kultivaren av palsternacka,
        såsom Hollow Crown eller White Gem, vilket gör det möjligt för köpare att
        välja baserat på smak, sötma eller storleksskillnader.
    part_condition:
      name: Delens skick
      description: Anger om delen är ny, begagnad, renoverad etc.
    part_placement:
      name: Delplacering
      description: Anger var på maskinen (t.ex. trappklättrare eller stepmaskin) delen
        är installerad, till exempel vänster, höger, fram eller bak.
    partial_capo_covered_strings:
      name: Strängar som täcks av partiell capo
      description: Anger strängomfånget som den partiella capon täcker med hjälp av
        standard 6-strängad gitarrnumrering (1 = hög E, 6 = låg E).
    parting_style:
      name: Avbrytningsstil
      description: Indikerar hur peruken är eller kan benas (t.ex. mittbena, sidbena,
        fri bena), vilket påverkar stylingsflexibiliteten.
    party_favor_type:
      name: Typ av festgåva
      description: Anger vilken typ av festgåva det är (t.ex. klistermärken, minileksaker,
        bubblor) för att möjliggöra bläddring/filtrering inom festgåvor.
    party_game_format:
      name: Format för partyspel
      description: Primärt fysiskt format för partyspelet.
    party_horn_mouthpiece_type:
      name: Typ av munstycke för partytuta
      description: Anger munstyckets konstruktion, vilket påverkar hygien och komfort.
    party_horn_style:
      name: Stil för partyhorn
      description: Beskriver partyhornets konstruktion/beteende (hur det sträcker
        sig eller producerar ljud).
    passenger_car_type:
      name: Personbilstyp
      description: Identifierar den specifika typen av passagerarvagn för modellen
        (t.ex. sittvagn, sovvagn), som används för bläddring och set-byggande.
    passion_fruit_variety:
      name: Passionsfruktsort
      description: Identifierar/specificerar den botaniska eller kommersiella sorten
        av passionsfrukt som erbjuds (t.ex. lila, gul, granadilla).
    pasta_sauce_texture:
      name: Konsistens på pastasås
      description: Beskriver såsens konsistens (t.ex. slät, klumpig, krämig) för att
        matcha konsumentens munkänsla.
    pasta_sauce_variety:
      name: Pastasåsvariant
      description: Klassificerar pastasåser efter recept eller stil så att kunden
        snabbt kan hitta klassiker som marinara eller specialsåser som vodka eller
        pesto.
    pastry_crust_state:
      name: Skorpans tillstånd
      description: Beskriver skorpans tillrednings- eller gräddningstillstånd vid
        inköp.
    pastry_crust_style:
      name: Typ av pajskal
      description: Identifierar den specifika bakstilen eller degtypen på skorpan.
    pastry_filling_type:
      name: Typ av bakverksfyllning
      description: Anger den primära inre fyllningen i bakverket eller scones.
    patch_adhesion_method:
      name: Metod för lappens vidhäftning
      description: Anger hur lappen fäster på slangen eller däcket (t.ex. självhäftande,
        vulkaniserande med cement eller värmeaktiverad).
    patch_backing_material:
      name: Material på baksida av tygmärke
      description: Material som används på baksidan/basen av lappen (t.ex. filt, twill)
        som är i kontakt med den artikel som ska utsmyckas.
    patch_backing_type:
      name: Typ av fästning för tygmärke
      description: Baksidan som används på lappen (t.ex. värmeförsegling/strykning,
        självhäftande klister, kardborreband, ingen).
    patch_base_material:
      name: Tygmärkets basväv
      description: Primärt textilmaterial för bas-/baksidan av motivlappen (inte de
        dekorativa utsmyckningarna).
    patch_border_edge_finish:
      name: Kantfinish för lapp
      description: Kantbehandlingsmetoden på lappen (t.ex. broderad kant, laserskuren
        kant) påverkar hållbarhet och utseende.
    patch_placement_area:
      name: Område för lappplacering
      description: Vanligt avsett placeringsområde för lappen på kläder/tillbehör.
    pathogen_removal_capability:
      name: Kapacitet för borttagning av patogener
      description: Anger vilka klasser av mikroorganismer (bakterier, protozoer, virus)
        pumpen är certifierad för att ta bort.
    pattern_sizing_system:
      name: Storlekssystem för mönster
      description: Anger det regionala storlekssystem eller den standard som används
        för mönstrets storlekstabell (t.ex. USA, Storbritannien, EU).
    peak_style:
      name: Skärmtyp
      description: Anger stilen på visiret eller skärmen på hjälmen, vilket påverkar
        täckning, estetik och disciplinregler.
    pear_variety:
      name: Päronsort
      description: Identifierar kultivar eller sort av päron (t.ex. Bartlett, Bosc,
        Conference), vilket gör det möjligt för kunderna att välja sin föredragna
        smak, konsistens och kulinariska användning.
    pearl_luster_grade:
      name: Grad för pärlglans
      description: Kvalitativ lyster/blankhet på pärlytan.
    pearl_matching_level:
      name: Pärlmatchningsnivå
      description: Anger hur väl pärlor matchar inom ett parti eller en sträng (t.ex.
        efter färg, storlek och lyster).
    pearl_shape:
      name: Pärlform
      description: Den övergripande formkategorin för pärlan
    pearl_surface_condition:
      name: Pärlytans skick
      description: Indikerar pärlytans synliga skick, baserat på förekomsten och graden
        av defekter eller fläckar.
    pearl_treatment:
      name: Pärlbehandling
      description: Beskriver eventuell behandling som tillämpats på pärlan och som
        påverkar färg/utseende.
    pearl_type:
      name: Pärltyp
      description: Anger pärlsort/ursprung (t.ex. sötvatten, Akoya, Tahiti, Söderhav)
        för lösa pärlor.
    peat_level:
      name: Röknivå (torv)
      description: Beskriver intensiteten av torvrökens påverkan i whiskyn, från orökad
        till kraftigt rökig.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilitet mellan pedal och skoklossystem
      description: Anger vilka pedal- eller skoklossstandarder som distansen eller
        kilen är utformad för att fungera med, vilket säkerställer att kunden väljer
        en produkt som passar deras pedaler och skor.
    pedal_configuration:
      name: Pedalkonfiguration
      description: Anger om stolen har en enda pedal, delade/oberoende pedaler eller
        en konvertibel design.
    pedal_mounting_style:
      name: Typ av pedalmontering
      description: Anger hur pedalen eller pedalskyddet/pedaldynan fästs på fordonet
        (installations-/fästningsmetod).
    pedal_set_components:
      name: Pedalsetets komponenter
      description: Anger vilka pedaler som ingår i setet.
    pedal_spindle_material:
      name: Material på pedalaxeln
      description: Material som används för pedalaxeln/spindeln, vilket påverkar hållfasthet,
        vikt och korrosionsbeständighet.
    pedal_spindle_thread_size:
      name: Gängstorlek för pedalspindel
      description: Anger gängstandarden för pedalspindeln som skruvas in i vevarmen.
    pedal_type:
      name: Pedaltyp
      description: Beskriver typen av pedaler som medföljer cykeln, vilket anger skokompatibilitet
        och körstil.
    pellet_accessory_type:
      name: Typ av tillbehör för pellets
      description: Identifierar den specifika typen av pelletstillbehör så att sportfiskare
        snabbt kan hitta borrar, banders eller stopp beroende på deras riggbyggbehov.
    pellet_grade:
      name: Pelletskvalitet
      description: Indikerar tillverkningsprecisionen eller prestandakvaliteten för
        airsoftkulorna.
    pen_ink_color:
      name: Bläckfärg för penna
      description: Indikerar den faktiska bläckfärgen som pennan avger, vilken kan
        skilja sig från den yttre färgen på kroppen.
    penalty_card_accessories_included:
      name: Ingående tillbehör till straffkort
      description: Listar ytterligare domartillbehör som ingår med straffkorten, såsom
        plånbok, poängblock, penna, mynt, visselpipa eller fodral.
    penalty_card_colors_included:
      name: Färger som ingår på straffkort
      description: Listar färgerna på straffkorten som ingår i produktuppsättningen.
    penalty_flag_throw_distance:
      name: Kastavstånd för straffflagga
      description: Designklassificering som anger flaggans avsedda kasträckvidd.
    pendant_cutter_safety_features:
      name: Säkerhetsfunktioner för hängsmyckesskärare
      description: Identifierar integrerade säkerhetselement som minskar oavsiktliga
        skärskador under bärning/användning.
    pendant_cutter_wear_method:
      name: Bärmetod för hängsmyckesskärare
      description: Anger hur hängsmyckesskäraren är avsedd att bäras.
    pepper_variety:
      name: Pepparsort
      description: Anger vilken sort eller art av peppar som används i produkten,
        vilket gör det möjligt för kunden att skilja mellan olika smakprofiler och
        hettanivåer.
    percussion_case_style:
      name: Typ av fodral för slagverk
      description: Klassificerar den övergripande stilen/konstruktionen av fodralet
        (mjuk väska vs hårt/styv fodral vs hybrid).
    percussion_instruments_included:
      name: Slagverksinstrument som medföljer
      description: Listar de typer av slagverksinstrument som ingår när produkten
        är en leksakssats med flera instrument.
    percussion_mallet_handle_grip_style:
      name: Handtagsgreppstil för slagverksklubba
      description: Identifierar typen av greppbehandling på handtaget (utöver textur),
        såsom bart trä, lackerat, gummerat grepp eller lindning.
    percussion_mallet_head_construction:
      name: Konstruktion av slagverksklubbans huvud
      description: Beskriver klubbans huvudkonstruktion (t.ex. lindat garn, filtlindat,
        gummi, obehandlat trä), vilket påverkar slagklang och hållbarhet.
    perfumery_base_carrier_type:
      name: Bärartyp för parfymbas
      description: Anger bärar-/lösningsmedelssystemet i en parfymbas (vad basen huvudsakligen
        är gjord av för utspädning och prestanda).
    perfumery_base_intended_application:
      name: Avsett användningsområde för parfymbas
      description: Anger det slutanvändningsformat som basen är avsedd för (t.ex.
        fin doftspray kontra roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Bärare/lösningsmedel för parfymingrediens
      description: Identifierar bäraren/lösningsmedlet som ingrediensen levereras
        i, om den är utspädd (t.ex. etanol, DPG, jojobaolja).
    perfumery_ingredient_form:
      name: Form på parfymingrediens
      description: Anger parfymingrediensens fysiska form/tillstånd som den levereras.
    perfumery_ingredient_type:
      name: Typ av parfymingrediens
      description: Klassificerar parfymingrediensen efter vad den är i parfympraxis
        (t.ex. eterisk olja, aromkemikalie).
    perfumery_ingredient_usage_note:
      name: Anmärkning om användning av parfymingredienser
      description: Indikerar typisk roll i en doftstruktur (topp-/huvudnoter, mellan-/hjärtnoter,
        bas- kroppsnoter), med erkännande av att material kan spänna över noterna.
    perfumery_ingredients:
      name: Parfymingredienser
      description: Listar de typer av förbrukningsbara doftämnen som ingår i kit (t.ex.
        eteriska oljor, doftoljor, alkoholbas).
    perfumery_note_position:
      name: Notposition i parfym
      description: Indikerar ingrediensens typiska roll i en doftstruktur (topp/hjärta/bas).
    persimmon_variety:
      name: Persimonsort
      description: Identifierar persimonens kultivar eller sort, eftersom olika sorter
        som Fuyu eller Hachiya skiljer sig åt i konsistens, smak, strävhet och kulinarisk
        användning.
    personalization_type:
      name: Typ av personanpassning
      description: Anger om och hur produkten kan anpassas för ett evenemang (t.ex.
        monogram, namn/datum, fotoinsats).
    phonics_focus:
      name: Fokus på fonik
      description: Anger vilken ljudningsmetod och ordläsningsförmåga som läsleksaken
        riktar sig mot.
    physalis_variety:
      name: Physalissort
      description: Identifierar den specifika botaniska arten, kultivaren eller vanliga
        sorten av physalis som säljs.
    pi_ata_filler_type_included:
      name: Piñatafyllning som ingår
      description: Om fyllning ingår, vilken typ av innehåll som tillhandahålls.
    pi_ata_hanging_method:
      name: Upphängningsmetod för piñata
      description: Hur piñatan är utformad för att hängas eller stödjas (ögla, krok,
        snöre ingår, etc.).
    pi_ata_opening_type:
      name: Typ av piñataöppning
      description: Hur påfyllningsöppningen nås/stängs (flik, kardborreband, dragkedja,
        förseglad etc.).
    piccolo_key_system:
      name: Piccola – klaffsystem
      description: Identifierar det tangentsystem/den design som används på piccolon
        (vanligtvis Boehm-systemet för moderna piccolos).
    piccolo_keywork_features:
      name: Funktioner för piccolans klaffsystem
      description: Anger anmärkningsvärda tangentmekanismer och alternativ på piccolon.
    pick_grip_aid:
      name: Grepphjälpmedel för plektrum
      description: Indikerar det primära inbyggda grepphjälpmedlet på plektrumet utöver
        allmän ytkänsla/textur (t.ex. grepphål, präglad logotyp, gummiinlägg).
    pickleball_construction_type:
      name: Konstruktionstyp för pickleball
      description: Tillverkningskonstruktionen av bollen, såsom sömlös i ett stycke
        eller svetsad i två delar, vilket påverkar hållbarhet och flygegenskaper.
    pickling_method:
      name: Betningsmetod
      description: Anger det konserveringsmedium eller den teknik som används för
        inläggning, såsom vinägerlösning eller laktojäsning.
    pickup_and_preamp_configuration:
      name: Pickup- och förförstärkarkonfiguration
      description: Anger om violan har ett inbyggt element och/eller aktiv förförstärkare
        för förstärkt framförande eller inspelning.
    pickup_configuration:
      name: Utformning av pickup
      description: Beskriver den övergripande layout för en elgitarr med hjälp av
        vanliga förkortningar (t.ex. SSS, HSS, HH).
    pickup_cover_material:
      name: Material för pickup-lock
      description: Anger huvudmaterialet för pickupens täckhölje (om sådant finns),
        inklusive vanliga pläterade ytbehandlingar när det är så som tillverkaren
        specificerar det.
    pickup_cover_type:
      name: Typ av pickupskydd
      description: Anger om en elgitarrpickup har ett täckhölje och täckhöljets material/stil
        (t.ex. metall vs plast).
    pickup_string_spacing:
      name: Strängavstånd för pickup
      description: Det standardiserade polavståndet/strängavståndet som pickupen är
        gjord för (t.ex. Fender/F-spaced vs Gibson/standard), vilket påverkar passningen
        på gitarrer med tremolo.
    pie_crust_type:
      name: Typ av pajdeg
      description: Anger vilken typ eller stil av skorpa som används till pajen eller
        tarten, till exempel flagnande deg, graham cracker eller glutenfri skorpa.
    piece_configuration:
      name: Antalskonfiguration
      description: Anger hur många separata delar kön, skaftet eller stallet består
        av, vilket påverkar portabilitet och spelstil.
    pillow_form_size:
      name: Kuddeform – storlek
      description: Standardiserad beteckning för färdig storlek för kuddformar/inlägg
        (t.ex. 18" x 18").
    pilot_helmet_communications_integration:
      name: Kommunikationsintegrering för pilothjälm
      description: Anger om hjälmen inkluderar eller är förkonfigurerad för kommunikationskomponenter
        för flyg.
    pilot_helmet_visor_configuration:
      name: Konfiguration av pilothjälmsvisir
      description: Anger visir-/ansiktsskyddskonfigurationen som ingår i pilothjälmen.
    pin_attachment_type:
      name: Typ av fästning för nål
      description: Anger nålens baksida/fästmekanism som används för att fästa nålen
        på kläder eller en yta (t.ex. fjärilslås, magnetisk baksida).
    pin_backing_type:
      name: Typ av nålfäste
      description: Anger den fästmekanism som används för att fästa nålen på kläder
        eller accessoarer.
    pin_cushion_attachment_style:
      name: Nålkudde – typ av fäste
      description: Hur nålkudden bärs, fästs eller placeras under användning.
    pin_cushion_features:
      name: Egenskaper för nålkudde
      description: Funktionella egenskaper utöver grundläggande nålhållning.
    pin_face_customization_method:
      name: Anpassningsmetod för nålens framsida
      description: Anger hur frontdesignen är producerad (t.ex. hård emalj, mjuk emalj,
        tryckt).
    pin_type:
      name: Nåltyp
      description: Anger nålens produktstil eller format som används för sportfans
        samlarobjekt.
    ping_pong_certification:
      name: Bordtenniscerifiering
      description: Anger produktens officiella standard eller styrande organs godkännandenivå.
    ping_pong_competition_certification:
      name: Bordtennistävlingscertifiering
      description: Anger pingisbollens officiella certifieringsstatus för sanktionerat
        spel (t.ex. ITTF-godkänd).
    ping_pong_paddle_handle_style:
      name: Bordtennisracket – typ av handtag
      description: Definierar formen/stilen på paddelns handtag, vilket påverkar greppkomfort
        och spelteknik.
    ping_pong_robot_accessory_type:
      name: Typ av tillbehör till pingisrobot
      description: Identifierar tillbehörets funktionella undertyp så att kunden snabbt
        kan begränsa resultaten (t.ex. nät kontra strömadaptrar).
    ping_pong_rubber_surface_type:
      name: Yttyp för pingisgummi
      description: Identifierar stilen/texturen på gummiytan som appliceras på paddeln,
        vilket påverkar spinn och hastighetsegenskaper.
    ping_pong_rubber_type:
      name: Typ av pingisgummi
      description: Anger ytkonstruktionsstilen för ett pingisgummiskikt, vilket påverkar
        spelegenskaperna.
    ping_pong_table_type:
      name: Typ av pingisbord
      description: Klassificerar bordets övergripande stil eller format för enklare
        jämförelse (t.ex. tävlingsbord, konverteringsskiva, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Ljudalstringssätt för rörinstrument
      description: Anger hur instrumentet producerar ljud (luftflödesmekanism), vilket
        hjälper till att skilja panflöjter, rörbladspipor och orgelpipor i filter.
    piston_application_type:
      name: Användningsområde för kolv
      description: Avsett användningsområde för kolven (ersättning vs prestanda/racing
        vs tung last).
    piston_crown_dish_style:
      name: Kolvkrona/skålform
      description: Formen på kolvkronan som påverkar förbränningskammarens volym och
        kompression (t.ex. platt topp, kupol, skål).
    piston_pin_retention_type:
      name: Fästtyp för kolvbult
      description: Anger hur kolvbulten hålls kvar i kolv-/vevstaksenheten.
    pit_configuration:
      name: Utformning av grop/pit
      description: " Definierar landningsområdets strukturella format (en del kontra
        flera moduler) och därmed antalet sektioner eller moduler som medföljer."
    pit_cover_type:
      name: Typ av groplock
      description: Anger den skyddande ytan eller duken som medföljer gropen, vilket
        påverkar spikmotstånd, väderskydd och idrottarens preferens.
    pitahaya_flesh_color:
      name: Pitahayans fruktköttsfärg
      description: Anger den inre fruktköttsfärgen på pitahaya (drakfrukt) (t.ex.
        vit, röd, magenta), en viktig differentieringsfaktor som påverkar smak, utseende
        och upplevt näringsinnehåll.
    pitch_mat_coverage_length:
      name: Täckningslängd för planmattan
      description: Klassificerar cricketplanens matta efter den del av wicket den
        täcker (t.ex. hel eller halv plan).
    pitch_range:
      name: Tonhöjdsområde
      description: Beskriver det upplevda tonhöjdsomfånget/ljusstyrkan för skakarens
        ljud.
    pitch_standard:
      name: Tonhöjdsstandard
      description: Anger tonhöjdsstandarden (referensstämning) som blockflöjten är
        byggd för (t.ex. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Storleksbeteckning för pitching rubber
      description: Indikerar standardfältstorleksklassificeringen för pitching rubber,
        vilket förenklar valet utan att kunden behöver känna till de exakta måtten.
    pitching_screen_style:
      name: Pitching-skärmstil
      description: Definierar skärmens strukturella design så att kunden snabbt kan
        välja rätt layout för sitt träningsscenario.
    pitching_target_design:
      name: Design av pitching-mål
      description: Klassificerar den övergripande stilen eller konfigurationen av
        pitchingmålet.
    pitching_wheel_count:
      name: Antal pitchinghjul
      description: Anger antalet framdrivningshjul som en pitchmaskin använder.
    pivot_adjustability:
      name: Vridjustering
      description: Indikerar om saxen har en justerbar svängskruv för att justera
        skärspänningen.
    pivot_piece_type:
      name: Typ av svängstycke
      description: Skiljer mellan olika svänggränssnittsformer som medföljer, såsom
        traditionella koppar eller rörform.
    place_card_holder_closure_mechanism:
      name: Stängningsmekanism för platskortshållare
      description: Anger hur hållaren greppar eller säkrar kortet.
    place_card_orientation:
      name: Orientering av platskort
      description: Anger platskortets orientering när det används/visas.
    place_card_printing_status:
      name: Utskriftsstatus för platskort
      description: Anger om platskortet är tomt för handskrift/utskrift, förtryckt
        (namnen är inte personliga) eller personligt/anpassat tryckt.
    placket_type:
      name: Typ av knapplås
      description: Anger stilen på den främre öppningen på polotröjan, inklusive knappantal
        eller alternativa stängningar.
    planetarium_content_theme:
      name: Temainnehåll för planetarium
      description: Primärt innehåll som visas av planetarieprojektorn.
    planetarium_projection_content_format:
      name: Innehållsformat för planetariumprojektion
      description: Anger vilken projektionsmekanism planetariet använder för innehåll
        (fysiska skivor/dias kontra digital/LED-effekt).
    plant_fiber_type:
      name: Typ av växtfiber
      description: Specifik fibertyp av växtursprung när stapelfiberkällan är växtbaserad.
    plaster_gauze_finish:
      name: Ytfinish för gipsgaze
      description: Resulterande ytjämnhetstendens efter applicering och utjämning.
    plaster_gauze_grade:
      name: Gipsgaze – kvalitet
      description: Avsedd användningsgrad för gipsgasen (t.ex. hantverk/student vs
        professionell).
    plaster_gauze_weave_density:
      name: Vävtäthet för gipsgaze
      description: Relativ öppenhet/täthet hos gasväven, vilket påverkar hållfasthet
        och gipshämtning.
    plastic_canvas_finish:
      name: Ytfinish för plastduk
      description: Ytbehandling/finishbehandling av plastduksrullen.
    plastic_canvas_sheet_finish:
      name: Ytbehandling för plastcanvas-ark
      description: Yt-/kantbehandling för plastcanvas-ark
    plastic_canvas_transparency:
      name: Genomskinlighet för plastduk
      description: Hur genomskinlig/ogenomskinlig plastduken är.
    plate_bottom_design:
      name: Design av plattans botten
      description: Beskriver konstruktionen av plattans undersida, vilket påverkar
        grepp, stabilitet och säkerhet på olika spelytor.
    plate_compatibility_standard:
      name: Kompatibilitetsstandard för tallrik
      description: Anger vilken viktskivsstandard som stången är konstruerad för (t.ex.
        olympisk 50 mm, standard 25 mm).
    plate_installation_type:
      name: Installationstyp för platta
      description: Anger hur plattan är fäst eller placerad på planen (t.ex. nedgrävd,
        spikad, utkastbar), vilket gör det möjligt för köpare att välja mellan permanenta
        och portabla alternativ.
    plate_size_category:
      name: Tallriksstorlekskategori
      description: Klassificerar plattan efter spelnivå eller regelstandard så att
        köpare snabbt kan hitta ligakompatibel utrustning.
    play_dough_putty_kit_contents:
      name: Innehåll i lekdegssats
      description: Identifierar de viktigaste ingående komponenterna utöver själva
        degen (t.ex. verktyg, formar, extruder, förvaring).
    play_dough_tool_set_items_included:
      name: Verktyg som ingår i set för leklera
      description: Identifierar de typer av verktyg och tillbehör som ingår i en verktygssats
        för modellera (t.ex. valsar, utstickare, formar).
    play_environment_suitability:
      name: Lämplighet för lekmiljöer
      description: Identifierar den avsedda spelmiljön för setet (t.ex. inomhus, utomhus,
        vatten).
    play_food_features:
      name: Egenskaper för leksaksmat
      description: Särskilda funktionella eller realistiska inslag för leksaksmatartiklar.
    play_food_items_included:
      name: Matleksaker som ingår
      description: Anger vilka typer av lekmat som ingår i köksleksetet.
    play_food_size_scale:
      name: Storleksskala för lekmat
      description: Indikerar den ungefärliga storleken på låtsasmatbitarna för kompatibilitet
        med lekkök, dockor och lekset.
    play_money_set_components_included:
      name: Ingående delar i leksakspengar-set
      description: Anger vilka komponenttyper som ingår i spelpengar/bankuppsättningen.
    play_pattern:
      name: Spelmönster
      description: Det primära sättet leksaken är avsedd att användas (t.ex. fidget/stresslindring,
        skrivbordsskulptur/konst, konstruktion/bygge eller pussel).
    play_sprinkler_mounting_type:
      name: Monteringstyp för leksprinkler
      description: Hur lekspridaren är placerad/säkrad under användning.
    play_vehicle_lights_and_sounds:
      name: Leksaksfordonets ljus och ljud
      description: Anger om leksaksfordonet har elektroniska lekeffekter som ljus
        och/eller ljud.
    play_vehicle_scale:
      name: Skala för lekfordon
      description: Indikerar skalaförhållandet för lekfordonet (vanligtvis används
        för gjutna och modellliknande leksaksfordon).
    player_size_category:
      name: Spelarstorlekskategori
      description: Definierar den avsedda spelarstorleken/åldersgruppen som catcher-utrustningen
        passar till (t.ex. Tee Ball, ungdom, intermediate, vuxen).
    player_size_range:
      name: Storleksintervall för spelare
      description: Anger det avsedda storleksintervallet för användaren för remmen/support
        (t.ex. barn, vuxen, universal).
    playing_environment:
      name: Lekmiljö
      description: Anger den primära spelytan eller sammanhanget för vilket hockeybollen
        är utformad.
    playing_method:
      name: Spelmetod
      description: Det primära sättet som instrumentet är avsett att spelas/aktiveras.
    playing_surface_material:
      name: Material för spelyta
      description: Identifierar materialet i cajonens främre spelyta (tapa), vilket
        starkt påverkar ton och känsla.
    playing_surface_type:
      name: Typ av spelyta
      description: Beskriver spelytans konstruktion/känsla på övningsplattan.
    playset_activities_included:
      name: Lekset – aktiviteter som ingår
      description: Identifierar de viktigaste lekaktiviteterna/komponenterna som är
        inbyggda i gungan/lekställningen för att hjälpa kunder att filtrera efter
        vad barnen kan göra på konstruktionen.
    playset_installation_type:
      name: Typ av installation för lekset
      description: Anger hur gungan/lekställningen är installerad eller säkrad.
    playset_items_included:
      name: Delar som ingår i lekset
      description: Identifierar de typer av låtsasleksaker som ingår i picknickleksetet
        (mat, porslin, filt, korg, etc.).
    pliers_jaw_style:
      name: Tångens käftform
      description: Beskriver tångens primära käftkonfiguration eller funktionella
        stil.
    plum_variety:
      name: Plommonsort
      description: Identifierar den specifika kultivar eller sorten av plommon, vilket
        gör det möjligt för kunden att välja baserat på smak, färg och avsedd kulinarisk
        användning.
    plumcot_variety:
      name: Pluotsort
      description: Identifierar den specifika kultivaren eller kommersiella sorten
        av plumcot (t.ex. Flavor King, Dapple Dandy), vilket kan påverka smak, färg
        och säsongsvariation.
    plunger_mute_handle_type:
      name: Typ av handtag för plungerdämpare
      description: Anger handtaget eller greppstilen som används för att hålla och
        manipulera en plunger-dämpare för wa-wa-effekter.
    pocket_closure_type:
      name: Fickförslutningstyp
      description: Definierar hur varje ficka är säkrad, vilket hjälper användare
        att hitta byxor med säker förvaring under aktivitet.
    pocket_knife_opening_mechanism:
      name: Öppningsmekanism för fickkniv
      description: Hur bladet fälls ut/öppnas (manuellt nagelklaft, tumstift, flipper,
        assisterat, automatiskt, etc.).
    pocket_style:
      name: Fickstil
      description: Anger byxornas primära fickkonstruktion.
    pocket_type:
      name: Typ av ficka
      description: Identifierar stilen eller förekomsten av fickor på plagget.
    pod_retention_system:
      name: Fastsättningssystem för pod
      description: Beskriver hur paintballkapslar hålls på plats och lossas från selen
        eller packen.
    pogo_stick_footrest_type:
      name: Typ av fotstöd för pogo stick
      description: Beskriver fotplattformen/pinndesignen som används för att stå på
        pogo-pinnen.
    pogo_stick_suspension_type:
      name: Fjädringstyp för pogo stick
      description: Anger pogo stickens rebound-mekanism, vilket påverkar känsla, hållbarhet
        och underhåll.
    poi_handle_type:
      name: Typ av handtag för poi
      description: Anger vilken stil på handtag/grepp/fäste som används för att hålla
        poi.
    poi_light_source:
      name: Poi-ljuskälla
      description: För upplysta poi, specificerar belysningstekniken.
    poi_tether_type:
      name: Typ av koppling för poi
      description: Anger vilken typ av koppling som ansluter poi-huvudet till handtaget,
        knoppen eller handledsöglan (t.ex. snöre, rep, kedja).
    poi_type:
      name: Poi-typ
      description: Anger den primära poi-konstruktionen/användningstypen (t.ex. övning,
        LED, eld).
    point_type:
      name: Punkttyp
      description: Form/stil på spetsen som används på broderinålen.
    pointe_shoe_shank_length:
      name: Skaftlängd för spetssko
      description: Den del av skolängden som skaftet stöder, till exempel full längd
        eller 3/4-längd.
    pointe_shoe_shank_strength:
      name: Pointe-skoskaftstyrka
      description: Styvhetsnivån för en pointeskos skaft, som påverkar stöd och inkörningstid.
    poker_accessory_storage_included:
      name: Ingående förvaring för pokertillbehör
      description: Anger vilken ytterligare pokerartikel tillbehöret har dedikerad
        förvaring för.
    poker_chip_tray_rack_configuration:
      name: Konfiguration av pokerchipsfack/ställ
      description: Beskriver den interna organisationsstilen för ett pokerchipsfack/ställ
        (rader och kapacitet per rad).
    pole_anchoring_method:
      name: Metod för stagning av stång
      description: Definierar hur stången är fäst vid marken eller spelytan.
    pole_basket_type:
      name: Typ av stolpkorg
      description: Klassificerar stilen eller storleken på korgen som monteras nära
        spetsen av skidstaven, vilket indikerar avsedda snöförhållanden.
    pole_connection_system:
      name: Polkopplingssystem
      description: Identifierar mekanismen som sammanfogar stavsektioner, såsom gummisnöre,
        gängor eller navsystem, vilket hjälper användare att bedöma uppsättningshastighet
        och kompatibilitet.
    pole_system_type:
      name: Typ av stångsystem
      description: Beskriver det strukturella stödsystemet eller uppställningsstilen
        som tältet använder (t.ex. aluminiumstänger, uppblåsbara luftrör, uppställning
        med vandringsstavar).
    police_equipment_fitment:
      name: Anpassning av polisutrustning
      description: Anger vilken brottsbekämpande utrustning fordonet är konfigurerat
        eller förkopplat för att stödja.
    police_vehicle_equipment_package:
      name: Utrustningspaket för polisfordon
      description: Anger den polisspecifika anpassningsutrustning som ingår i fordonet
        vid försäljning.
    police_vehicle_light_siren_equipment:
      name: Polisfordonets ljus-/sirenutrustning
      description: Anger vilka nödvarningsenheter som är installerade på polisbilen.
    police_vehicle_upfit_level:
      name: Anpassningsnivå av polisfordon
      description: Beskriver vilken polisspecifik utrustning/anpassning som är installerad
        på lastbilen.
    polish_formulation:
      name: Formulering för polish
      description: Indikerar formuleringens bas/kemi för greppbrädespoleringen (inte
        appliceringsmetoden).
    polish_purpose:
      name: Användningsområde för polish
      description: Primärt avsett resultat av poleringen på instrumentytan.
    pollen_level:
      name: Pollenhalt
      description: Indikerar mängden/sannolikheten för pollenfärgning från liljesorten.
    polymer_clay_firmness_level:
      name: Polymerleras fasthetsnivå
      description: Polymerlerans relativa fasthet/mjukhet före gräddning (bearbetbarhet).
    polymer_clay_translucency:
      name: Polymerlerans genomskinlighet
      description: Visuell opacitet/transparens hos polymerleran när den härdats.
    pom_pom_handle_style:
      name: Modell av pompomhandtag
      description: Beskriver stilen eller konstruktionen av handtaget/greppet som
        används för att hålla pom-pom.
    pom_pom_trim_backing_tape_material:
      name: Baksides-/tejpmaterial för pom-pom-kant
      description: Identifierar materialet i den sydda tejpen eller flätan som pom-pomerna
        är fästa vid (kantbasen).
    pom_pom_type:
      name: Pompong – typ
      description: Indikerar förekomst och specifik typ av pom-pom eller tofs på hatten.
    pomegranate_product_form:
      name: Granatäpplets produktform
      description: Beskriver den fysiska formen som erbjuds (hel frukt, skalade arillus,
        kärnor, frysta arillus).
    pomegranate_variety:
      name: Granatäpplesort
      description: Identifierar den specifika kultivarn eller sorten av granatäpplefrukten
        (t.ex. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Stil för hästsvanshållare
      description: Beskriver den specifika konstruktionen eller formfaktorn för hästsvanshållaren
        så att kunden kan välja sin föredragna stil.
    popcorn_form:
      name: Popcornform
      description: Anger popcornproduktens fysiska eller beredningsform, såsom färdig
        att äta, kärnor, mikrovågspåse, kryddsats eller presentplåt.
    pork_rind_form:
      name: Fläsksvålsutförande
      description: Kategoriserar den fysiska formen eller stilen hos fläsksvålssnacks
        (t.ex. svål, crackling, puff, pellets, etc.).
    portability_features:
      name: Portabilitetsfunktioner
      description: Listar inbyggda element som underlättar förflyttning, bärande eller
        förvaring av solstolen.
    portability_frame_type:
      name: Bärbarhet/ramtyp
      description: Huruvida orkesterklockspelen är bärbara/fältramsstil eller fasta/konsertramsstil.
    portable_electronic_game_features:
      name: Funktioner för bärbara elektroniska spel
      description: Viktiga spel-/utrustningsfunktioner som stöds av enheten.
    post_surgery_stage_suitability:
      name: Lämplighet för postoperativt stadium
      description: Anger vilket återhämtningsstadium (om något) bodyn är utformad
        för, viktigt för medicinsk shapewear-kund.
    postage_stamp_format:
      name: Frimärkesformat
      description: Hur det definitiva frimärket erbjuds/förpackas (enstaka, par, remsa,
        block, ark, häftesark, rulle, etc.).
    postmark_type:
      name: Poststämpeltyp
      description: Typ av avstämpel/poststämpel som finns på använda definitiva frimärken.
    potato_cut_style:
      name: Typ av potatisskärning
      description: Anger den fysiska styckningen eller beredningsstilen för potatis
        när den inte säljs hel.
    potato_intended_use:
      name: Avsedd användning för potatis
      description: Skiljer potatis avsedd för omedelbar konsumtion från de som är
        avsedda som utsädespotatis eller frysta bearbetade produkter.
    potato_variety:
      name: Potatissort
      description: Anger potatissorten/kultivaren, vilket gör det möjligt för kunden
        att hitta specifika typer som "Yukon Gold", "Maris Piper" eller "Purple Majesty".
    pottery_clay_firing_required:
      name: Bränning av keramiklera som krävs
      description: Huruvida materialet kräver bränning i ugn för att uppnå sin avsedda
        slutliga hårdhet/finish.
    pottery_slip_application_method:
      name: Appliceringsmetod för keramikglasyr
      description: Anger den avsedda appliceringstekniken för glasyren.
    pottery_slip_compatible_clay_body:
      name: Lerkropp kompatibel med keramikglasyr
      description: Indikerar den/de lerkroppstyper som slipen är utformad för att
        matcha eller fungera med.
    pottery_slip_form:
      name: Glasyrform
      description: Anger om glasyren säljs som en bruksfärdig vätska eller som en
        torrblandning/pulver som kräver blandning.
    pouch_design:
      name: Påsedesign
      description: Beskriver konstruktionen eller förbättringsfunktionerna i det främre
        påsområdet.
    pouch_style:
      name: Typ av påse
      description: Anger utformningen av det främre påsområdet med hänsyn till komfort,
        stöd och estetik.
    powdered_beverage_variety:
      name: Dryckessort i pulverform
      description: Klassificerar produkten efter vilken typ av dryck den tillreder
        (t.ex. lemonad, sportdryck, proteinshake).
    power_rack_style:
      name: Stil för power rack
      description: Anger den övergripande designen/konfigurationen av ställverket,
        vilket hjälper kunden att skilja mellan fulla burar, halva ställ och platsbesparande
        varianter.
    power_steering_fluid_formulation:
      name: Formulering av servostyrningsvätska
      description: Den allmänna formuleringsfamiljen för vätskan (ATF-baserad vs dedikerad
        hydraulisk/CHF vs universal), som används för översiktlig kompatibilitetsfiltrering.
    practice_mute_audio_output:
      name: Ljudutgång för övningsdämpare
      description: Anger vilken typ av ljudutgång som är tillgänglig på övningsdämparen
        för monitorering och/eller inspelning (vanligt i tysta/elektroniska övningsdämpare).
    practice_mute_intonation_impact:
      name: Inverkan på intonation för övningsdämpare
      description: Beskriver den förväntade stämnings-/intonationseffekten när övningsdämpningen
        används.
    practice_mute_venting_valve_type:
      name: Ventilations-/ventiltyp för övningsdämpare
      description: Anger om och hur övningsdämparen ventileras eller inkluderar en
        justerbar ventil för att ändra motstånd/volym.
    practice_pad_features:
      name: Funktioner för övningspad
      description: Framhäver funktionella egenskaper hos övningsplattan utöver storlek/material.
    practice_pad_mounting_style:
      name: Monteringsstil för övningsplatta
      description: Anger hur övningsplattan är avsedd att placeras eller fästas under
        användning.
    practice_pad_rebound_level:
      name: Rebound-nivå för övningsplatta
      description: Indikerar den relativa returen/responsen hos övningsplattan jämfört
        med typiska trumskinn.
    practice_pad_surface_configuration:
      name: Konfiguration av övningsplattans yta
      description: Beskriver om padden har en eller flera spelytor och om de skiljer
        sig åt i känsla.
    pregnancy_stage_suitability:
      name: Lämplighet för graviditetsstadier
      description: Anger vilket/vilka graviditets- eller postpartumfaser plagget är
        utformat för.
    preparation_state:
      name: Förberedelsestatus
      description: Anger den nivå av förberedelse eller tillagning som krävs före
        konsumtion.
    preparation_style:
      name: Beredningssätt
      description: Definierar skuret eller bearbetningsstadiet för vattenkastanjerna
        vid försäljning (t.ex. hela, skivade, rostade, frysta).
    preservation_medium:
      name: Konserveringsmedium
      description: Anger den primära vätskan eller mediet i vilket oliverna eller
        kaprisen konserveras (t.ex. saltlake, olivolja, vinäger).
    presser_foot_attachment_method:
      name: Metod för fastsättning av pressarfot
      description: Anger hur symaskinens pressarfot fästs på pressarfotshållaren/skaftet
        (t.ex. snäppfäste kontra skruvfäste), vilket påverkar kompatibiliteten.
    pressure_gauge_type:
      name: Typ av tryckmätare
      description: Anger vilken typ av tryckmätare som medföljer cykelpumpen, om sådan
        finns.
    pressure_measurement_unit:
      name: Tryckenhet
      description: Indikerar enheten som används för trycksensorns avläsning eller
        kalibrering, användbar för att jämföra produkter och säkerställa kompatibilitet
        mellan mätare/styrenhet.
    pressure_plate_balance_type:
      name: Balanstyp för tryckplatta
      description: Indikerar om tryckplattan är internt balanserad eller kräver/förutsätter
        extern balans som matchar motorns/svänghjulets konfiguration.
    pressure_plate_components_included:
      name: Ingående komponenter i tryckplatta
      description: Vad som ingår i tryckplattans listning.
    pressure_sensor_application:
      name: Användningsområde för trycksensor
      description: Identifierar fordonssystemet/mätpunkten som trycksensorn är avsedd
        för.
    pressure_sensor_port_thread_standard:
      name: Port/gängstandard för trycksensor
      description: Anger den mekaniska port-/gängstandard som används för att installera
        sensorn i fordonssystemet.
    pressurization_method:
      name: Trycksättningsmetod
      description: Identifierar hur tryck genereras eller bibehålls inuti enheten.
    pretend_housekeeping_set_items_included:
      name: Leksaksstädset – artiklar som ingår
      description: Listar vilka städtillbehör som ingår i setet (t.ex. mopp, kvast,
        sopskyffel, sprayflaska).
    pretend_play_electronic_features:
      name: Elektroniska funktioner för låtsasspel
      description: Elektroniska/interaktiva funktioner ingår i låtsaspelsprodukten.
    pretend_play_set_pieces_included:
      name: Delar som ingår i låtsaslekset
      description: Viktiga rekvisita/komponenter som ingår i låtsasleksetet (t.ex.
        kassaapparat, leksaksmat, verktyg).
    pretend_play_set_theme:
      name: Tema för låtsaslekset
      description: Primärt låtsasscenario/tema som representeras av produkten (användbart
        för tvärgående upptäckt inom alla låtsasleksaker).
    pretzel_coating:
      name: Pretzelbeläggning
      description: Identifierar eventuella yttre kryddor eller beläggningar som applicerats
        på pretzeln, vilket omfattar både salta (saltade, kryddade) och söta (choklad,
        yoghurt, kola) alternativ.
    pretzel_shape:
      name: Kringelform
      description: Anger kringlans fysiska form (t.ex. tvinnad, pinne, bit), en viktig
        särskiljningsfaktor som kunder använder vid sökning eller filtrering.
    primary_component_material:
      name: Primärt komponentmaterial
      description: Primärmaterial i motorblocket.
    primary_dish_application:
      name: Primärt användningsområde för maträtt
      description: Identifierar huvudrätten eller tillredningen som degen är avsedd
        för.
    primary_plant_base:
      name: Primär växtbas
      description: Anger den/de huvudsakliga mejerifria ingrediensen/ingredienserna
        som använts för att skapa ostalternativet.
    primary_plant_protein_source:
      name: Primär växtproteinkälla
      description: Identifierar den huvudsakliga växtingrediensen som tillhandahåller
        protein i produkten.
    primary_sweetener_source:
      name: Primär sötningsmedelskälla
      description: Identifierar växten eller råmaterialet från vilket sirapen härrör.
    print_placement:
      name: Placering av tryck
      description: Anger var den huvudsakliga grafiken/logotypen är placerad på t-shirten.
    print_technique:
      name: Tryckteknik
      description: Anger vilken dekorations-/tryckmetod som används på t-shirtgrafiken.
    printable_canvas_intended_use:
      name: Avsedd användning för tryckbar canvas
      description: Primärt användningsområde som den tryckbara canvasen är optimerad
        för.
    printable_fabric_format:
      name: Format för tryckbart tyg
      description: Anger hur den tryckbara bomullen levereras (enstaka ark vs kontinuerlig
        rulle), vilket påverkar skrivarens matning och projektets arbetsflöde.
    prism_material:
      name: Prismamaterial
      description: Anger materialet i själva det optiska elementet (prismat), vilket
        påverkar klarhet, hållbarhet och reptålighet.
    prisoner_transport_configuration:
      name: Konfiguration av fångartransport
      description: Anger om och hur skåpbilen är konfigurerad för transport av frihetsberövade/fångar.
    prisoner_transport_partition_type:
      name: Typ av skiljevägg för fångtransport
      description: Typ av inre skiljevägg/bur som separerar främre och bakre fack.
    privacy_or_acoustic_feature:
      name: Avskildhets- eller akustisk funktion
      description: Anger inbyggda element för avskildhet eller akustiska element såsom
        avskiljare, akustiska skärmar eller kompletta inkapslingar.
    processing_state:
      name: Bearbetningsgrad
      description: Om fjädrarna är steriliserade/tvättade eller på annat sätt förberedda
        för hantverk.
    produce_grade:
      name: Kvalitetsklass för produkt
      description: Klassificerar kvalitetsklassen som tilldelas kiwifrukten baserat
        på storlek, utseende och skick.
    produce_growth_stage:
      name: Tillväxtstadium för jordbruksprodukt
      description: Anger det tillväxtstadium i vilket produkten säljs (t.ex. mikrogrönt,
        baby leaf, moget blad, levande planta, frö).
    produce_washing_state:
      name: Tvättstatus för jordbruksprodukt
      description: Indikerar om grönsakerna har tvättats och är redo att ätas.
    profile_shape:
      name: Profil/form
      description: Cymbalens övergripande krökning/profil (hur brant den stiger från
        kant till klocka).
    projectile_ammunition_type:
      name: Projektil-/ammunitionstyp
      description: Anger vilken typ av projektiler eller förbrukningsartiklar som
        används av leksaksvapnet, om tillämpligt.
    projectile_finish:
      name: Ytfinish för projektil
      description: Anger all ytbeläggning som applicerats på BB:n för att förbättra
        korrosionsbeständigheten eller synligheten (t.ex. kopparbelagd, förzinkad,
        målad).
    projectile_type:
      name: Projektiltyp
      description: Identifierar vilken typ av projektil produkten använder eller är
        avsedd för.
    pronation_support:
      name: Pronationsstöd
      description: Indikerar vilken typ av gång eller pronationsmönster som sneakern
        är utformad för att hantera.
    propellant_type:
      name: Drivmedelstyp
      description: Anger det drivmedel som delen eller tillbehöret är avsett att använda.
    propeller_blade_cup:
      name: Propellerbladets skålning
      description: Indikerar mängden kopp (bakkantskrullning) på bladen.
    propeller_hub_type:
      name: Propellernavtyp
      description: Anger det nav-/bussningssystem som används av propellern (utbytbart
        navkit kontra inpressat).
    propeller_rotation:
      name: Propellerrotation
      description: Anger rotationsriktningen för en propeller.
    protectant_formula_base:
      name: Bas för skyddsformel
      description: Anger basformuleringen av skyddsmedlet, vilket påverkar glans,
        känsla och rengöring (t.ex. vattenbaserat kontra lösningsmedelsbaserat).
    protection_coverage_area:
      name: Skyddets täckningsområde
      description: Identifierar vilka delar av klockan som skyddstillbehöret täcker.
    protection_level:
      name: Skyddsnivå
      description: Anger fodralets avsedda skyddsnivå för transport och förvaring
        av instrumentet.
    protective_case_interior_protection_type:
      name: Invändig skyddstyp för skyddsfodral
      description: Beskriver den huvudsakliga metoden för invändigt skydd som används
        för att säkra och dämpa innehållet.
    protective_case_shell_type:
      name: Skyddsfodral – skaltyp
      description: Identifierar den övergripande konstruktionsstilen hos fodralets
        exteriör (styvhet) som påverkar krosskydd och bärbarhet.
    protective_contact_padding_material:
      name: Skyddskontakt – dämpningsmaterial
      description: Material som används på instrumentets kontaktpunkter (ok/klockainlägg)
        för att förhindra repor (t.ex. filt, gummi).
    protective_cup_configuration:
      name: Konfiguration av skyddskopp
      description: Anger om en skyddande kopp ingår, är avtagbar eller om plagget
        endast har en ficka för att hålla en kopp.
    protective_eyewear_standard_compliance:
      name: Standardefterlevnad för skyddsglasögon
      description: Anger de säkerhets- eller stöttålighetsstandarder eller certifieringar
        som glasögonen uppfyller eller överträffar för sportbruk.
    protective_gear_certification_standard:
      name: Standard för certifiering av skyddsutrustning
      description: 'Anger vilken säkerhets-/certifieringsstandard som utrustningen
        uppfyller (varierar beroende på artikeltyp: hjälmstandarder, dräktstandarder,
        stötskyddsstandarder).'
    protective_gear_items_included:
      name: Delar som ingår i skyddsutrustning
      description: Listar de enskilda delarna som ingår i en skyddsutrustningssats
        med flera delar.
    protective_gear_padding_type:
      name: Typ av vaddering i skyddsutrustning
      description: Anger vilken typ av vaddering som används i skyddsutrustning för
        stötskydd.
    protective_gear_safety_certifications:
      name: Säkerhetscertifieringar för skyddsutrustning
      description: Listar erkända sportspecifika säkerhets- eller prestationsstandarder
        som produkten uppfyller, såsom NOCSAE- eller ASTM-standarder för fälthockeyhjälmar.
    protective_pad_components_included:
      name: Medföljande komponenter till skyddsdynor
      description: Anger vilka specifika skyddsartiklar som ingår i ett flerdelat
        set så att kunden vet exakt vilka kroppsdelar som täcks.
    protective_shorts_intended_use:
      name: Avsedd användning för skyddsshorts
      description: Primär rid-/tävlingsdisciplin som skyddsshortsen är utformade för.
    protective_shorts_padding_type:
      name: Typ av vaddering för skyddsshorts
      description: Anger konstruktionen/formatet på de skyddande elementen som används
        i shortsen.
    protective_shorts_padding_zones:
      name: Vadderingszoner för skyddsshorts
      description: Identifierar vilka kroppsdelar som har integrerad dämpning/pansar
        i skyddsshortsen.
    protective_treatment:
      name: Skyddande behandling
      description: Anger all skyddande ytbehandling eller behandling som applicerats
        för fläck-, vatten- eller UV-beständighet (t.ex. Teflon).
    protector_coverage_area:
      name: Täckningsområde för skydd
      description: Anger vilket/vilka område(n) av torso skyddet är utformat för att
        täcka (t.ex. bröst, rygg, sidor).
    puck_bottom_style:
      name: Puckens bottenstil
      description: Beskriver puckens undersida, vilket påverkar hastighet och kontroll
        på olika shuffleboard-ytor.
    puck_type:
      name: Pucktyp
      description: Klassificerar den funktionella stilen eller avsedda användningen
        av hockeypucken, från officiellt spel till samlarobjekt som souvenirer.
    pull_buoy_style:
      name: Typ av dragboj
      description: Indikerar den funktionella stilen eller konfigurationen av dragbojen,
        till exempel standard, ankel eller pullkick-kombination.
    pull_through_weight_material:
      name: Material för genomdragningsvikt
      description: För genomdragbara rengöringspinnar identifierar denna egenskap
        materialet i vikten som används för att styra pinnen genom instrumentet.
    pulp_content:
      name: Massainnehåll
      description: Anger mängden frukt- eller grönsaksmassa som finns i drycken.
    pump_accessories_included:
      name: Medföljande tillbehör för pump
      description: Listar ytterligare artiklar som medföljer bollpumpen så att kunden
        kan förstå paketets innehåll.
    pumping_compatibility:
      name: Pumpkompatibilitet
      description: Anger om amnings-bh:n är utformad för handsfree-pumpning samt amning.
    punch_pad_type:
      name: Typ av slagplatta
      description: Anger designen eller stilen på en boxnings-/träningsdyna så att
        kunden kan välja rätt dyna för sina träningsbehov.
    punching_training_bag_shape:
      name: Boxningssäck/träningssäck – form
      description: Anger den geometriska stilen på den tunga säcken, vilket hjälper
        kunden att välja modeller som passar specifika slagövningar (t.ex. uppercuts,
        body shots).
    puncture_protection_technology:
      name: Punkteringsskyddsteknik
      description: Listar eventuella proprietära eller generiska punkteringsskyddande
        lager eller sidoväggs-/höljesförstärkningstekniker som ingår i däcket (t.ex.
        EXO, SnakeSkin, Kevlar).
    puppet_features:
      name: Dockfunktioner
      description: Framhäver funktionella eller prestandamässiga egenskaper hos dockan
        (t.ex. rörlig mun, ljudeffekter, vändbar).
    puppet_puppet_theater_accessory_type:
      name: Typ av tillbehör för dockor/dockteater
      description: Anger vilken typ av tillbehör produkten är (t.ex. rekvisita, dockdräkt,
        kontrollstång, reservsträng).
    purity_unit:
      name: Enhet för renhet
      description: Hur myntets renhet uttrycks (finhet kontra karat).
    push_up_bar_design:
      name: Push-up-stångsdesign
      description: Indikerar den funktionella designstilen för armhävningsstänger
        (t.ex. fasta, roterande, parallella).
    pushrod_end_type:
      name: Typ av tryckstångsände
      description: Anger stilen på tryckstångsänden/fästet som används vid pedal-
        eller huvudcylindergränssnittet.
    putty_glow_activation_method:
      name: Aktiveringsmetod för lysande kitt
      description: Hur kittet laddas/aktiveras för att glöda (t.ex. solljus, UV/svart
        ljus).
    putty_glow_color:
      name: Glödande kittets färg
      description: Identifierar vilken färg kittet avger när det lyser i mörker.
    putty_inclusions:
      name: Inblandningar i kitt
      description: Framträdande inblandningar i kittet (t.ex. glitter, konfetti, skumpärlor).
    putty_texture:
      name: Kittets textur
      description: Kittets primära hanteringsbeteende (t.ex. studsande, töjbar, vätskeliknande).
    puzzle_accessory_features:
      name: Egenskaper för pusseltillbehör
      description: Funktionella funktioner och designelement hos pusseltillbehör (varierar
        beroende på tillbehörstyp).
    pyrometric_cone_range:
      name: Pyrometriskt konintervall
      description: Den/de rekommenderade pyrometriska konen/konerna som glasyren är
        formulerad för att brännas till (t.ex. kon 06–04, kon 5–6).
    quarter_panel_coverage_type:
      name: Täckningstyp för kvartspanel
      description: Anger hur mycket av kvartspanelens yta som produkten ersätter/reparerar.
    quarter_panel_set_contents:
      name: Innehåll i kvartspanelsset
      description: Anger konfigurationen av kvartspanelspaketet som ingår i listningen
        (ensidig, par eller med ytterligare reparationssektioner).
    quilting_ruler_markings:
      name: Quiltningslinjalens markeringar
      description: Anger vilka typer av tryckta markeringar på quiltlinjalen som används
        för klippning/justering.
    quilting_ruler_non_slip_feature:
      name: Halkfri funktion för quiltningslinjal
      description: Anger om linjalen har en halkfri baksida/ytbehandling för att minska
        förskjutningar på tyget.
    quilting_ruler_transparency:
      name: Quiltningslinjalens genomskinlighet
      description: Indikerar linjalens genomskinlighet/synlighet för att se tyg och
        markeringar under.
    quilting_thread_usage:
      name: Användningsområde för quiltningstråd
      description: Anger den avsedda quiltningsanvändningen för tråden (hur den är
        avsedd att användas).
    quilting_thread_weight_system:
      name: Viktsystem för quiltningstråd
      description: Anger trådstorlek/viktklassificeringssystem som används för att
        uttrycka trådtjocklek (t.ex. wt, Tex, Denier), så att den numeriska storleken
        kan tolkas korrekt.
    quince_variety:
      name: Kvittensort
      description: Identifierar den specifika kultivar eller sorten av kvitten, eftersom
        smak, arom och kulinarisk lämplighet kan variera beroende på sort.
    quinoa_variety:
      name: Quinoa-sort
      description: Identifierar den specifika färgen eller sorten av quinoa, eftersom
        olika sorter har distinkta smaker, konsistenser och tillagningstider.
    quinto_tuning_system:
      name: Stämningssystem för quinto
      description: Hur quinto är stämd/spänd.
    race_car_class:
      name: Racerbilsklass
      description: Tävlingsklass/kategori som bilen är byggd för (regeluppsättning/homologeringsgruppering).
    racing_balaclava_face_opening_style:
      name: Stil för ansiktsöppning på racingbalaklava
      description: Balaklavans ansiktsöppning, vilket påverkar hjälmens passform,
        tätning och komfort.
    racing_balaclava_neck_coverage_length:
      name: Tävlingsbalaklavans halslängd
      description: Täckningslängden på halskjolen/draperingen som är utformad för
        att stoppas in i dräkten/nackbandaget för tätning och skydd.
    racing_balaclava_ventilation_zones:
      name: Ventilationszoner för racingbalaklava
      description: Anpassade ventilerande zoner/mesh- eller ventilerade zoner för
        att förbättra luftflödet under hjälmen.
    racing_chest_guard_intended_use:
      name: Avsedd användning för bröstskydd i racing
      description: Primär motorsportdisciplin eller sammanhang som bröstskyddet är
        utformat för.
    racing_chest_guard_size_type:
      name: Storlekstyp för racingbröstskydd
      description: Anger om produkten är i storlek för ungdom, vuxen eller är universell/justerbar.
    racing_glove_certification_standard:
      name: Certifieringsstandard för racinghandske
      description: Anger säkerhetscertifieringen/standarden som racinghandskarna uppfyller
        (t.ex. FIA, SFI, CE) och eventuellt klassificeringen/nivån när så är tillämpligt.
    racing_goggles_lens_system:
      name: Linssystem för racingglasögon
      description: Anger det system för linsbyte/avrivningsberedskap som stöds av
        glasögonen.
    racing_helmet_certification_standard:
      name: Certifieringsstandard för racinghjälm
      description: Den/de säkerhetscertifiering(ar) som racinghjälmen uppfyller.
    racing_kart_brake_type:
      name: Bromstyp för racerkart
      description: Primärbromssystemtyp monterad på karten.
    racing_kart_class:
      name: Klass för racingkart
      description: Tävlingsklass eller regeluppsättning som karten är byggd för att
        följa.
    racing_kart_frame_material:
      name: Racingkart – material för ram
      description: Ram/chassimaterial för karten.
    racing_kart_seat_size:
      name: Storlek för racingkartstol
      description: Kartsätesstorleksbeteckning som används för montering.
    racing_neck_support_style:
      name: Stil för racing-nackstöd
      description: Strukturell stil på racing-nackstödet och hur det samverkar med
        förarens torso/hjälm.
    racing_suit_certification_standard:
      name: Certifieringsstandard för racingdräkt
      description: Anger vilken säkerhetscertifiering/homologering för racing som
        dräkten uppfyller (t.ex. FIA- eller SFI-standarder).
    racing_suit_cuff_design:
      name: Design av manschett på racingdräkten
      description: Typ av fotleds-/handledsmanschett som används för att ansluta till
        handskar/stövlar och förbättra tätning/komfort.
    racing_suit_size_system:
      name: Storlekssystem för tävlingsdräkter
      description: Storlekssystem som används för dräkten (t.ex. Alpha S-XXL, Numeric
        EU/US, Youth).
    racing_truck_discipline:
      name: Racingdisciplin för lastbil
      description: Anger den primära racingdisciplin/format som lastbilen är byggd
        för att tävla i.
    rack_side_configuration:
      name: Utformning av racksida
      description: Indikerar om hyllstället har mattor på ena sidan eller båda sidor,
        vilket påverkar utrymmeseffektiviteten och tillgängligheten.
    rack_system_configuration:
      name: Systemkonfiguration för hyllställ
      description: Beskriver den övergripande layouten/formen på trumställssystemet.
    racket_dampener_type:
      name: Typ av racketdämpare
      description: Anger installationsmekanismen eller funktionsstilen för racketvibrationsdämparen.
    racket_grip_size:
      name: Racketgreppsstorlek
      description: Anger den omkretsbaserade storleksklassificeringen av rackethandtaget
        (t.ex. G1–G6) för att säkerställa korrekt handpassning och komfort.
    racket_sport_shoe_court_surface:
      name: Spelunderlag för racketsportskor
      description: Anger den tennisbanyta som skon är designad eller optimerad för,
        vilket hjälper spelare att välja skor med rätt mönster på yttersula och gummiblandning
        för deras typiska spelunderlag.
    racket_string_pattern:
      name: Racket string pattern
      description: Anger antalet huvud- och tvärsträngar i strängbädden (t.ex. 16
        x 18), vilket påverkar kontroll, spin och hållbarhet.
    racket_stringing_status:
      name: Status för racketsträngning
      description: Anger om racketen säljs strängad, osträngad eller försträngd.
    racket_weight_class:
      name: Racketviktklass
      description: Tillhandahåller standardviktkategorierna "U" för badminton, vilket
        gör det möjligt för spelare att välja racketar inom sitt föredragna viktintervall.
    racquet_toy_set_equipment_included:
      name: Ingående utrustning i racketleksaksset
      description: Listar vilka artiklar som ingår i leksaken eller setet (t.ex. nät,
        bollar, paddlar/racketar).
    racquetball_squash_training_aid_type:
      name: Typ av träningshjälpmedel för racquetball/squash
      description: Klassificerar den specifika typen av träningshjälpmedel eller tillbehör
        så att kunden snabbt kan hitta den artikel de behöver.
    radiator_cap_gasket_material:
      name: Material för kylarlockets packning
      description: Material i den/de tätningspackning/packningar som används på kylarlocket.
    radiator_cap_pressure_relief_style:
      name: Tryckavlastningsstil för kylarlock
      description: Anger kylarlockets tryckavlastnings-/ventilations-/manövreringsstil,
        vilket kan påverka hantering, säkerhet och avsedd tillämpning.
    radiator_expansion_tank_cap_application:
      name: Användningsområde för kylar-/expansionstanklock
      description: Identifierar om locket är avsett för en kylarpåfyllningshals eller
        för en kylvätskeexpansions-/överfyllnadsbehållare.
    radiator_fan_control_type:
      name: Typ av kylfläktstyrning
      description: Anger hur kylarfläkten styrs/utlöses.
    radiator_fan_mounting_pattern:
      name: Monteringsmönster för kylfläkt
      description: Anger monteringsstil/mönster som används för att fästa fläkten
        eller fläktenheten.
    radiator_fan_type:
      name: Typ av kylfläkt
      description: Anger funktionell typ/konfiguration för kylfläktenheten.
    radiator_hose_end_type:
      name: Ändtyp för kylarslang
      description: Anger den primära kopplings-/tätningstypen som används vid kylarslangens
        ände/ändar för att ansluta till kylar-/motorportar.
    radiator_hose_position:
      name: Kylarslangens position
      description: Funktionell position/typ av kylarslang i kylsystemet.
    radiator_hose_shape:
      name: Kylarslangens form
      description: Övergripande slanggeometri/formfaktor som används för installationsdragning
        och montering.
    radiator_overflow_tank_level_sensor_provision:
      name: Stöd för nivåsensor i kylaroverflowtank
      description: Anger om tanken inkluderar eller stöder en sensor för kylvätskenivå.
    radiator_overflow_tank_shape:
      name: Form på expansionskärl för kylare
      description: Övergripande formfaktor för överfyllningstankens kropp.
    radish_variety:
      name: Sort av rädisa
      description: Anger sort eller typ av rädisa så att kunden kan välja specifik
        smak, färg eller storleksegenskaper (t.ex. daikon, vattenmelon, french breakfast).
    radius_of_hollow:
      name: Skålradie
      description: Anger den konkava slipningsprofilen som produceras av sliparen,
        uttryckt som vanliga diskreta storlekar eller flat.
    rail_coverage_configuration:
      name: Konfiguration av skyddstäckning för spjälsäng
      description: Anger vilken/vilka delar av spjälsängen överdraget skyddar, vilket
        förtydligar om överdraget är en enda frontpanel eller ett överdrag i flera
        delar.
    rail_mount_standard:
      name: Monteringsstandard för skena
      description: Identifierar skenan eller monteringsgränssnittet som används för
        att fästa ett tillbehör (t.ex. sikte, ficklampa) på ett luftgevär.
    rail_side:
      name: Skenans sida
      description: Anger om ersättningsskenan är för vänster sida, höger sida eller
        säljs som en parkoppla.
    rail_style:
      name: Skenstil
      description: Kategoriserar den övergripande designen eller konfigurationen av
        skenan (t.ex. A-frame, rainbow, kinked), vilket avgör trickmöjligheter och
        erforderligt utrymme.
    rail_system:
      name: Skensystem
      description: Identifierar monteringsgränssnittet för tillbehör som finns på
        pistolen (t.ex. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Teknik för regnsensor
      description: Den avkänningsprincip som används för att detektera vatten på vindrutan.
    rain_suit_configuration:
      name: Konfiguration av regnkläder
      description: Identifierar om produkten är en overall i ett stycke, ett set i
        flera delar eller en annan konfiguration.
    rainstick_construction_type:
      name: Rainstick-konstruktionstyp
      description: Beskriver hur regnpinnen är konstruerad (traditionellt kaktus-/trärör
        kontra moderna alternativ).
    rainstick_fill_material:
      name: Rainstick-fyllningsmaterial
      description: Anger den interna fyllningen som används för att skapa det porlande
        ljudet (t.ex. frön, pärlor).
    rainstick_playing_technique:
      name: Rainstick-spelteknik
      description: Indikerar den/de rekommenderade speltekniken(er) eller hanteringstilen
        som används för att producera den avsedda effekten på en regnpinne.
    rainstick_sound_character:
      name: Rainstick-ljudkaraktär
      description: Beskriver den övergripande ljudkaraktären som produceras av regnpinnen.
    raising_method:
      name: Uppfödningsmetod
      description: Beskriver hur djuren föddes upp och slutbehandlades före slakt
        (t.ex. gräsbetade, betesuppfödda, spannmålsutfodrade).
    rally_competition_class:
      name: Rallytävlingsklass
      description: Godkännandeorgan eller regelklass som rallybilen är byggd för (där
        sådan är känd).
    rally_surface_setup:
      name: Rallyyta – konfiguration
      description: Primär yta/terräng för rallybilskonfiguration eller byggmål.
    ramp_surface_texture:
      name: Ytstruktur för ramp
      description: Beskriver finishen eller greppnivån på rampens åkyta.
    ratchet_mounting_style:
      name: Typ av montering för spärrmekanism
      description: Hur den musikaliska råsten hålls eller monteras under spelning
        eller uppsättning.
    rattle_element_material:
      name: Material för skallraelement
      description: Materialet i de skrammelande elementen (t.ex. tänder/bjällror/pärlor)
        som skapar det karakteristiska surret/skramlet.
    rattle_type:
      name: Skrammeltyp
      description: Anger om betet innehåller en inre skallra eller ljudkammare och,
        i så fall, vilken typ av skallra som används.
    rc_airship_lifting_gas_type:
      name: Gastyp för RC-luftskepp
      description: Anger vilken gas luftskeppets hölje är avsett att fyllas med (om
        tillämpligt).
    rc_helicopter_control_frequency:
      name: RC-helikopterkontrollfrekvens
      description: Radiofrekvensbandet som används mellan styrenheten och helikoptern,
        vilket påverkar störningsmotstånd och kompatibilitet (t.ex. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Stabiliseringsfunktioner för RC-helikopter
      description: Listar stabilitets-/kontrollassistansfunktioner som gör flygningen
        enklare eller utökar kapacitet.
    rc_motorcycle_controller_type:
      name: Typ av kontroll för radiostyrd motorcykel
      description: Styrenhetens utformning
    rc_plane_takeoff_launch_method:
      name: RC-flygplan – startmetod
      description: Hur planet vanligtvis startar, vilket påverkar var och hur det
        kan användas.
    rc_vehicle_controller_type:
      name: Typ av styrenhet för RC-fordon
      description: Anger styrenhetens utformning som används för att styra RC-fordonet.
    rc_vehicle_scale:
      name: Skala för radiostyrd fordon
      description: Anger skalaförhållandet (storleksklassen) för den fjärrstyrda bilen/lastbilen
        (t.ex. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: RC-fordons terrängtyp
      description: Anger den primära terrängen som den fjärrstyrda bilen/lastbilen
        är avsedd för.
    reach_adjustment_type:
      name: Räckviddsjusteringstyp
      description: Anger om avståndet mellan spakbladet och styret kan justeras och,
        om det är justerbart, om justeringen sker verktygslöst eller kräver ett verktyg.
    rear_axle_spacing:
      name: Bakaxelavstånd
      description: Utfall/axeldimension som ramens bakdel är utformad för att acceptera,
        vilket påverkar hjulkompatibiliteten.
    rear_axle_standard:
      name: Bakaxelstandard
      description: Definierar axelgränssnittet/formatet som används av bakhjulet (t.ex.
        snabbkoppling, olika genomgående axelkopplingar).
    rear_axle_type:
      name: Bakaxeltyp
      description: Anger fästsystemet och axeldiametern som används för att fästa
        bakhjulet på ramen.
    rear_coverage:
      name: Täckning bak
      description: Anger hur mycket av skinkorna bikinitrosen täcker (t.ex. minimal,
        heltäckande).
    rear_opening_type:
      name: Bakre öppningstyp
      description: Beskriver stilen på bakre åtkomst eller "rumpklaff"-funktion för
        bekväm användning i badrummet, till exempel nedfällbart sittdynsöppning eller
        hel dragkedja bak.
    rear_seat_configuration:
      name: Baksäteskonfiguration
      description: Anger konfigurationen av baksätesenheten för att underlätta val
        av montering och inredningslayout.
    rear_view_mirror_ornament_attachment_type:
      name: Typ av fäste för backspegelprydnad
      description: Anger hur prydnaden fästs på backspegelns skaft eller hölje (t.ex.
        snoddögla, klämma, krok).
    rearview_mirror_mount_attachment_type:
      name: Typ av montering för backspegel
      description: Definierar hur fästet fysiskt fästs på backspegeln (spegelhus eller
        skaft), såsom klämma, clip, rem, självhäftande dyna eller bultfäste.
    rebound_board_face_type:
      name: Reboundbrädans yta
      description: Beskriver ytkonfigurationen som bestämmer returbeteendet, såsom
        plana, vinklade eller flerytedesigner.
    rebound_level:
      name: Rebound-nivå
      description: Indikerar hur mycket väggbollen studsar tillbaka efter stöt, vilket
        hjälper användarna att välja mellan designer utan och med måttlig studs.
    rebound_surface_configuration:
      name: Konfiguration av rebound-ytan
      description: Anger arrangemanget av returytor och förutsägbarheten för returer
        (enkel-, dubbel- eller flersidig, förutsägbar eller oförutsägbar).
    rebounder_design:
      name: Design för rebounder
      description: Definierar produktens strukturella stil eller studsande ytkonfiguration.
    rebounder_design_type:
      name: Rebounder-designtyp
      description: Anger den primära returmekanismen eller konstruktionsstilen för
        tränaren (t.ex. elastisk snörbas, ramnät, popup-måltavla).
    rebounder_sides:
      name: Rebounder-sidor
      description: Anger om reboundern kan returnera bollar från ena sidan eller båda
        sidor.
    rebounding_mechanism_type:
      name: Typ av studsmekanism
      description: Anger vilken teknik som används för att returnera pucken eller
        bollen (t.ex. gummistötfångare, elastisk lina).
    recipient_relationship:
      name: Mottagarrelation
      description: Avsedd mottagarrelation (t.ex. mamma, pappa, vän) för hälsningskortet.
    recliner_control_type:
      name: Typ av kontroll för vilfåtölj
      description: Anger hur lutningsmekanismen manövreras (t.ex. manuell spak, elektrisk
        knapppanel, fjärrkontroll).
    recliner_motion_type:
      name: Typ av fåtöljrörelse
      description: Definierar fåtöljens primära rörelsekapacitet (t.ex. gungstol,
        glidstol, snurrstol, väggnära, lyftstol).
    reclining_mechanism:
      name: Lutningsmekanism
      description: Anger mekanismen som används för att manövrera soffans lutningsfunktion.
    recommended_candle_format:
      name: Rekommenderat ljusformat
      description: Anger det/de rekommenderade ljusformat som dessa självhäftande
        vekar är avsedda för.
    recommended_container_type:
      name: Rekommenderad behållartyp
      description: Behållarmaterial som är rekommenderade/säkra för gelvaxljus.
    recommended_fabric_type:
      name: Rekommenderad typ av tyg
      description: Rekommenderat/rekommenderade tyg(er) för bästa resultat med sömnadsmönstret.
    recommended_fabric_weight:
      name: Rekommenderad tygvikt
      description: Anger den rekommenderade tygviktskategorin för mönstret.
    recommended_food_pairing:
      name: Rekommenderad matkombination
      description: Identifierar de primära proteinerna eller rätterna som såsen är
        avsedd för (t.ex. kyckling, fläsk, nötkött, fisk, grönsaker).
    recommended_lane_condition:
      name: Rekommenderat banunderlag
      description: Indikerar oljemönstret eller banans skick som bollen är konstruerad
        för.
    recommended_motor_impulse_class:
      name: Rekommenderad motorimpulsklass
      description: Anger den rekommenderade totalimpulsklassen för modellraketmotorn
        för säker/optimal flygning.
    recommended_reading_level:
      name: Rekommenderad läsnivå
      description: Anger det rekommenderade lässtadiet/den rekommenderade läsförmågan
        för produkten, för att hjälpa kunden att matcha den med ett barns nuvarande
        läsutveckling.
    recommended_sleep_position:
      name: Rekommenderad sovställning
      description: Identifierar vilka sovpositioner madrassen är utformad för att
        stödja bekvämt (t.ex. sido- eller ryggsovare).
    recommended_storage:
      name: Rekommenderad förvaring
      description: Anger hur produkten ska förvaras för att bibehålla färskheten.
    recommended_surfaces:
      name: Rekommenderade underlag
      description: Anger de avsedda ytorna/materialkategorierna för limmet, utöver
        allmän hantverkskompatibilitet (t.ex. endast papper kontra flera ytor).
    recommended_use_case:
      name: Rekommenderat användningsområde
      description: Primärt avsett användningsscenario för förseglaren (tillfällig/akut
        vs. långsiktig reparation).
    recommended_use_location:
      name: Rekommenderade användningsplatser
      description: Avsedd miljö för gungbrädan (hemmabakgård kontra kommersiell lekplats,
        etc.).
    recommended_vehicle_surfaces:
      name: Rekommenderade fordonsytor
      description: Anger de fordonsytor/finisher som penseln är avsedd att vara säker
        för (t.ex. genomskinlig lack, matt/satinlack, vinylfolie/PPF, glas, fälgar).
    recorder_accessories_included:
      name: Blockflöjtstillbehör som ingår
      description: Listar de tillbehör som medföljer basblockflöjten
    recorder_bore_design:
      name: Utformning av blockflöjtens borrning
      description: Blockflöjtkroppens inre borrprofil
    recorder_bore_type:
      name: Typ av borrning för blockflöjt
      description: Anger borrtypen för blockflöjten
    recorder_case_shell_type:
      name: Blockflöjtsfodral – skaltyp
      description: Beskriver fodralets strukturella styvhet
    recorder_finish:
      name: Blockflöjtens yta
      description: Ytbehandling/behandling av blockflöjtskroppen (särskilt relevant
        för altblockflöjter av trä)
    recorder_hole_type:
      name: Typ av blockflöjtshål
      description: Huruvida tonhålen är enkla (inga dubbla hål) eller inkluderar dubbla
        hål för förbättrad kromatisk fingersättning.
    recorder_joint_configuration:
      name: Blockflöjtsdelarnas konfiguration
      description: Beskriver hur många kroppsdelar blockflöjten har, vilket påverkar
        portabilitet, rengöring och utbyte av delar.
    recorder_joint_style:
      name: Blockflöjtens ledtyp
      description: Skarv-/kopplingstyp mellan blockflöjtsdelarna, om tillämpligt.
    recorder_keywork:
      name: Blockflöjttangent
      description: Anger om blockflöjten har en eller flera tangenter (metall-/plastmekanismer)
        för låga toner, typiskt för tenor-/bas-/stora blockflöjter.
    recorder_mouthpiece_type:
      name: Typ av munstycke för blockflöjt
      description: Beskriver om blockflöjtens munstycke/huvud är integrerat (i ett
        stycke) eller avtagbart/utbytbart.
    recorder_pitch_standard_a4:
      name: Blockflöjtens tonhöjdsstandard (A4)
      description: Anger tonhöjdsreferensen som blockflöjten är byggd för (t.ex. A=440
        Hz modern tonhöjd vs. A=415 Hz barocktonhöjd).
    recorder_thumb_hole_type:
      name: Typ av tumhål för blockflöjt
      description: Anger om blockflöjten har ett enkelt eller dubbelt tumhål.
    recreational_vehicle_holding_tank_type:
      name: Typ av avfallstank för fritidsfordon
      description: Anger vilka avfallstankar husbilen har.
    recreational_vehicle_leveling_system:
      name: Nivelleringssystem för fritidsfordon
      description: Typ av installerat nivellerings-/stabiliseringssystem.
    recycled_material_content:
      name: Innehåll av återvunnet material
      description: Anger andelen av plagget som är tillverkat av återvunna fibrer
        eller garner.
    reed_dent_material:
      name: Material för rörbladständer
      description: Materialet i rörbladets tänder/spalter (de element som separerar
        varpändarna), vilket påverkar hållbarheten och garnslitaget.
    reed_type:
      name: Typ av rörblad
      description: Anger typen av rörbladskonstruktion som används av säckpipans melodipipa
        och stämrör.
    reeds_included:
      name: Rörblad ingår
      description: Anger vilka rörblad som ingår i Great Highland-säckpipssetet (melodipipa
        och/eller stämrör) och om de är av rör eller syntetmaterial.
    reefing_method:
      name: Metod för revning
      description: Indikerar mekanismen (om någon) för att minska eller stuva ner
        seglet på vattnet.
    reel_profile:
      name: Rullens profil
      description: Klassificerar den strukturella stilen/profilen på beteskastrullens
        kropp.
    reel_seat_material:
      name: Material för rullfäste
      description: Anger konstruktionsmaterialet för rullfästet, vilket påverkar vikt,
        känslighet och korrosionsbeständighet.
    reel_seat_type:
      name: Rulle – typ av fäste
      description: Anger den låsmekanism som fäster flugrullen vid spöt.
    reel_size_class:
      name: Storleksklasser för rullar
      description: Tillverkardefinierad storleksklassificering (t.ex. 1000, 3000,
        5000) som anger spolkapacitet och total rullekonstruktion.
    referee_wallet_accessories_included:
      name: Domarplånbok – tillbehör som ingår
      description: Listar de extra artiklar som medföljer en domarplånbok, såsom röda/gula
        kort, poängblad eller skrivverktyg, så att köpare vet om plånboken säljs som
        ett komplett kit.
    refinement_level:
      name: Förfiningsnivå
      description: Indikerar graden av raffinering som oljan har genomgått, vilket
        påverkar smak, färg, näringsinnehåll och rökpunkt.
    reflective_finish:
      name: Reflekterande yta
      description: Anger den reflekterande ytans behandling av en discokula (t.ex.
        spegelblank kontra holografiska/iriserande effekter).
    reflective_or_glow_effect:
      name: Reflekterande eller glödande effekt
      description: Indikerar om antennkulan har synlighetseffekter såsom reflekterande
        material, självlysande element eller lysande/LED-element.
    reflective_tape_pattern:
      name: Reflekterande tejpmönster
      description: Beskriver konfigurationen av reflextejp på plagget som används
        för att uppfylla synlighetskraven.
    regulation_standard:
      name: Reglerstandard
      description: Anger den officiella standarden eller styrande organs dimension/certifiering
        som nätet uppfyller.
    regulator_diaphragm_material:
      name: Material i regulatormembranet
      description: Anger membranmaterialet, vilket påverkar bränsle-/etanolkompatibilitet
        (t.ex. E85) och hållbarhet.
    regulator_port_thread_standard:
      name: Regulatorport – gängstandard
      description: Anger den portgänga/kopplingsstandard som används på regulatorhuset
        för inlopps-/utlopps-/returportar.
    rein_features:
      name: Funktioner för tygel
      description: Framhäver speciella funktionella eller säkerhetsfunktioner som
        finns på tyglarna.
    rein_style:
      name: Tygelstil
      description: Identifierar tyglarnas strukturella design eller konfiguration,
        vilket gör det möjligt för ryttare att välja rätt typ för sin disciplin och
        personliga preferens.
    reinforced_areas:
      name: Förstärkta områden
      description: Identifierar vilka delar av plagget som är förstärkta för att motstå
        slitage.
    reinforcement_type:
      name: Förstärkningstyp
      description: Konstruktionsförstärkning som används i kylarslangen för styrka
        och temperatur-/trycktålighet.
    release_activation_method:
      name: Metod för frigöringsaktivering
      description: Anger hur ett bågskytteutlösningshjälpmedel utlöses av bågskytten.
    release_bearing_material:
      name: Material för släpplager
      description: Primärmaterial för lager-/ytkomponenterna (där det specificeras
        av tillverkaren).
    release_jaw_style:
      name: Typ av utlösningskäft
      description: Beskriver utformningen av utlösningshuvudets käftar eller krok.
    release_strap_type:
      name: Typ av utlösningsrem
      description: Identifierar remmen eller kopplingssystemet som medföljer utlösningshjälpmedlet
        för bågskytte.
    remote_control_airship_envelope_material:
      name: Fjärrstyrt luftskepp – höljesmaterial
      description: Anger det primära materialet i luftskeppets hölje (gaspåse), till
        skillnad från det övergripande leksaksmaterialet.
    remote_control_motorcycle_scale:
      name: Skala för radiostyrd motorcykel
      description: Skalan på den fjärrstyrda motorcykeln i förhållande till en riktig
        motorcykel (om den modelleras som ett skalafordon).
    remote_control_motorcycle_terrain_suitability:
      name: Fjärrstyrd motorcykel – terränglämplighet
      description: Primär terräng som RC-motorcykeln är konstruerad för att köras
        på.
    remote_control_motorcycle_water_resistance:
      name: Fjärrstyrd motorcykel – vattenbeständighet
      description: Vattenskyddsnivå för RC-motorcykelns elektronik.
    remote_control_plane_kit_completion_level:
      name: Radiostyrt flygplan – kitets färdigställandenivå
      description: Anger vad som ingår och hur komplett setet är (t.ex. flygklar kontra
        kräver separat sändare/mottagare/batteri).
    remote_control_plane_landing_gear_type:
      name: Radiostyrt flygplan – typ av landningsställ
      description: Indikerar landningsställets konfiguration, som påverkar hållbarhet
        och start-/landningsytor.
    remote_control_plane_power_type:
      name: Radiostyrt flygplan – drivmedelstyp
      description: Anger hur planet drivs/framdrivs (elektriskt vs. glödstiftsmotor/gas/nitro),
        vilket påverkar underhåll, buller och var det kan flygas.
    remote_control_watercraft_features:
      name: Funktioner för fjärrstyrd vattenfarkost
      description: Framhäver viktiga funktioner specifika för RC-vattenfarkoster som
        påverkar användbarhet och hållbarhet.
    remote_control_watercraft_propulsion_drive_type:
      name: Fjärrstyrd vattenfarkost framdrivning/drivtyp
      description: Anger hur den fjärrstyrda vattenfarkosten körs i vattnet.
    remote_control_watercraft_water_environment:
      name: Fjärrstyrd vattenfarkost – vattenmiljö
      description: Indikerar de avsedda vattenförhållandena där RC-vattenfarkosten
        presterar bäst.
    remote_keyless_system_programming_method:
      name: Programmeringsmetod för fjärrstyrt nyckelfritt system
      description: Hur fjärrkontrollen/systemet programmeras eller paras ihop med
        fordonet (t.ex. procedur i fordonet kontra professionellt verktyg).
    repair_compound_type:
      name: Typ av reparationsmassa
      description: Typ/formulering av det ingående förbrukningsmaterialet för reparation
        (t.ex. typ av karossfyllmedel, typ av vindruteharts, typ av däckpluggcement/tätningsmedel).
    repair_kit_components:
      name: Reparationssats – komponenter
      description: Listar de specifika artiklarna som ingår i reparationssatsen, vilket
        gör det möjligt för kunden att förstå innehållet och jämföra paket.
    repair_method:
      name: Reparationsmetod
      description: Anger den primära reparationsmetoden som kitet använder, såsom
        dra-och-fäst-plåster eller ventilbyte.
    replacement_part_purpose:
      name: Användningsområde för reservdel
      description: Anger om artikeln är en OEM-ersättningsdel, en uppgraderingsdel/prestandadel
        eller ett tilläggstillbehör.
    replacement_part_type:
      name: Typ av reservdel
      description: Identifierar den funktionella kategorin för crosstrainerns del,
        vilket gör det möjligt för kunder att filtrera efter den komponent de behöver.
    replacement_parts_availability:
      name: Tillgänglighet av reservdelar
      description: Anger om förbrukningsbara/utbytbara delar stöds för trädaren (t.ex.
        reservkrokar/vajrar).
    replica_gun_action_type:
      name: Typ av funktionsmekanism för replikavapen
      description: Anger funktionstypen för replikavapnet (såsom det visas), t.ex.
        slutstycksmekanism eller hävstångsmekanism.
    replica_gun_firing_mechanism:
      name: Avfyrningsmekanism för replikavapen
      description: Anger om och hur replikan simulerar avfyrning/funktion (icke-dödlig),
        såsom lockavfyrning eller ingen avfyrning.
    replica_gun_moving_parts:
      name: Rörliga delar av replikavapen
      description: Anger vilka delar som är funktionella/rörliga på replikan.
    reservoir_orientation:
      name: Reservoarens orientering
      description: Anger den avsedda orienteringen eller profilen för blåsan inuti
        paketet.
    reservoir_type:
      name: Reservoartyp
      description: Typ av behållarekonfiguration för kopplingshuvudcylindern.
    resin_suitability:
      name: Lämplighet för harts
      description: Anger om handbollen är avsedd för användning med harts (lim) eller
        är hartsfri.
    resistance_adjustability:
      name: Motståndsjusterbarhet
      description: Anger om andningsmotståndet kan ändras av användaren.
    resistance_band_design:
      name: Design av motståndsband
      description: Beskriver den fysiska formen eller stilen på ett motståndsband
        (t.ex. ögla, rör med handtag, åttetal), vilket hjälper kunden att välja rätt
        design för sin träningsrutin.
    resistance_loading_type:
      name: Typ av motståndsbelastning
      description: Indikerar hur motstånd/vikt tillhandahålls eller belastas på Smith-maskinen
        (t.ex. plattbelastad eller selekterbar viktstapel).
    response_fields_included:
      name: Svarsfält ingår
      description: Anger vilka standardfält/alternativ för svar som finns på svarskortet
        (t.ex. acceptera/avböj, måltidsval).
    restoration_status:
      name: Restaureringsstatus
      description: Anger om skåpbilen är original, restaurerad, ombyggd (restomod)
        eller projektskick.
    rhinestone_base_color_family:
      name: Strassbasens färgfamilj
      description: Identifierar färgfamiljen för strassbasen (t.ex. genomskinlig/kristall,
        guld/gul, blå).
    rhinestone_facet_style:
      name: Strassens fasetteringsstil
      description: Strassstenens framsida/fasetteringsmönster som påverkar glitter
        och utseende (t.ex. Xilion rose, briljantslipning, fasetterad vs slät).
    rhinestone_hole_reinforcement_material:
      name: Förstärkningsmaterial för strasshål
      description: Material runt/vid hålen (t.ex. metallgenomföring, gjuten plast)
        som påverkar hållbarheten under sömnad.
    rhinestone_setting_type:
      name: Typ av infattning för strass
      description: Hur stenen monteras/kantas för sömnad (t.ex. klofattning, ramfattning,
        kantfattning).
    rhubarb_product_cut_type:
      name: Typ av skuren rabarberprodukt
      description: Beskriver den fysiska beredningen eller styckningen av rabarberprodukten.
    ribbon_construction:
      name: Bandkonstruktion
      description: Beskriver viktiga konstruktionsegenskaper hos ryggåsband, såsom
        att det är trådförstärkt eller elastiskt, vilket ändrar dess användning (t.ex.
        rosetter kontra sömnad).
    ribbon_packaging_type:
      name: Band förpackningsmaterial typ
      description: Indikerar hur bandet levereras/säljs.
    ribbon_pattern_style:
      name: Bandmönsterstil
      description: Klassificerar den mönsterappningsmetod som vanligtvis används på
        ryggåsband.
    ribbon_sheen_level:
      name: Bandets glansnivå
      description: Indikerar den visuella glansen på satinbandets yta.
    ribbon_style:
      name: Bandstil
      description: Anger bandets visuella mönster/stil (t.ex. enfärgat, randigt, trefärgat).
    ribbon_trim_backing_type:
      name: Baksida av band/kant
      description: Anger om bandet/kanten har en baksida och vilken typ (för enkel
        applicering).
    ribbon_trim_edge_finish:
      name: Band-/kantavslut
      description: Beskriver kantkonstruktionen/finishen på band/kant (användbart
        för fransningsbeteende och avsedd användning).
    ric_rac_wave_size:
      name: Ric-rac – vågstorlek
      description: Beskriver vågamplituden/skalan för ric-rac (hur stora sicksackvågorna/vågorna
        är).
    rice_grain_length:
      name: Riskornas längd
      description: Klassificerar risprodukter efter kärnlängd, såsom kort-, medel-
        eller långkornigt, vilket påverkar tillagningsegenskaper och kulinarisk användning.
    rice_processing_method:
      name: Bearbetningsmetod för ris
      description: Beskriver hur riset har bearbetats eller beretts (t.ex. förkokt,
        groddad, flingad), vilket påverkar koktid, näringsinnehåll och användningsområde.
    rice_variety:
      name: Rissort
      description: Anger den specifika rissorten eller kultivaren, vilket gör det
        möjligt för kunden att välja korn med föredragen smak, arom, konsistens och
        avsedd matlagning.
    riding_toy_features:
      name: Ridleksak – egenskaper
      description: Framhäver vanliga egenskaper och säkerhetsfunktioner som är specifika
        för ridleksaker.
    rifle_action_type:
      name: Typ av gevärsmekanism
      description: Gevärets manövermekanism (hur det laddas/avfyras/utmatas), viktig
        för identifiering och samlarintresse.
    rifle_finish:
      name: Gevärsfinish
      description: Primär utvändig ytbehandling/beläggning av metallarbetet.
    rifle_magazine_type:
      name: Typ av gevärsmagasin
      description: Typ av matningssystem för geväret.
    rifle_stock_material:
      name: Material för gevärsstock
      description: Primärt material som används för gevärskolven (t.ex. valnöt, polymer).
    rim_clamping_method:
      name: Fälgklämningsmetod
      description: Hur maskinen säkrar hjulet/fälgen vid montering och demontering.
    rim_strip_type:
      name: Typ av fälglist
      description: Klassificerar remsan/tejpen efter stil, konstruktion eller specifik
        tillämpning (t.ex. slanglös fälgband kontra skyddande gummiremsa).
    rim_tubeless_compatibility:
      name: Fälg – slanglös kompatibilitet
      description: Anger om fälgen, tejpen eller hjulet är konstruerat för slanglös
        däckkonfiguration.
    ripeness_stage:
      name: Mognadsstadium
      description: Anger fruktens mognadsnivå vid tidpunkten för försäljning (t.ex.
        omogen, mogen, redo att äta).
    riser_pad_type:
      name: Typ av förhöjningsplatta
      description: Klassificerar dynans funktionella stil (t.ex. standarddistans,
        stötdämpande, vinklad kil).
    roasted_malt_processing_type:
      name: Rostad maltbearbetningstyp
      description: Den specifika bearbetningsmetod eller variant som används för att
        skapa det rostade maltet eller det rostade spannmålet (t.ex. omältat rostat
        korn, svartmalt, avskalad eller avbitrad variant).
    robotic_toy_interaction_mode:
      name: Robotleksak – Interaktionssätt
      description: Beskriver det primära sättet roboten interagerar eller rör sig
        under lek.
    robotic_toy_light_features:
      name: Ljusfunktioner för robotleksak
      description: Anger om och hur leksaken använder ljus som en del av leken (t.ex.
        lysdioder, projektion).
    robotic_toy_programming_supported:
      name: Stöd för programmering av robotleksaker
      description: Anger vilken programmeringsmetod, om någon, leksaken stöder.
    robotic_toy_skill_level:
      name: Kompetensnivå för robotleksak
      description: Anger komplexitetsnivån för drift/programmering som förväntas av
        användaren.
    robotic_toy_sound_features:
      name: Ljudfunktioner för robotleksak
      description: Indikerar robotleksakens ljudkapacitet.
    rod_butt_style:
      name: Typ av spöbutt
      description: Definierar konfigurationen av spöets bakände som används vid trollingfiske.
    rod_construction_type:
      name: Konstruktionstyp för spö
      description: Indikerar spöets övergripande konstruktion vad gäller delar och
        hopfällbarhet.
    rod_guide_material:
      name: Material för linstyrning
      description: Anger materialet som används för fiskespöets linstyrningar eller
        insatser, vilket påverkar hållbarhet, vikt och linfriktion.
    rod_guide_type:
      name: Typ av linstyrning
      description: Anger den primära typen av linstyrning som är installerade på spöt.
    rod_handle_type:
      name: Typ av handtag för spö
      description: Anger greppkonfigurationen för ett fiskespö, vilket underlättar
        komfort och teknikval.
    roll_cage_tubing_material:
      name: Material för rullburrör
      description: Anger det rörmaterial/legering som används för störtburen/stötbågen
        (t.ex. DOM-stål kontra 4130 krommolybden).
    roller_skate_brake_shape:
      name: Rullskridskobromsens form
      description: Beskriver bromshuvudets geometriska form/profil för prestanda eller
        estetiska preferenser.
    roller_skate_brake_type:
      name: Bromsmetod för rullskridsko
      description: Anger bromssystemet som används på rullskridskor.
    roller_ski_technique:
      name: Rullskidåkningsteknik
      description: Identifierar den längdåkningsteknik som rullskidorna är konstruerade
        för.
    roller_technology:
      name: Rullteknik
      description: Indikerar integrerad teknik som förbättrar massageprestanda, såsom
        vibration eller värme.
    rolling_case_wheel_configuration:
      name: Rullväska – hjulkonfiguration
      description: Anger hjulkonfigurationen som används på rullande musiktangentbordsfodral.
    rolling_paper_format:
      name: Rullpapper – format
      description: Identifierar produktens fysiska presentation (t.ex. platta ark,
        färdigrullade koner, omslag).
    rolling_paper_gum_type:
      name: Rullpapper – limtyp
      description: Anger det lim som används på rullpapprets kant för försegling,
        vilket kan påverka smak och prestanda.
    rolling_paper_size:
      name: Rullpapper – storlek
      description: Anger standardklassificeringen av rullpappret eller konen, vilket
        gör det möjligt för kunden att snabbt välja rätt bredd/längd för sina behov.
    rolling_stock_type:
      name: Typ av rullande materiel
      description: Anger vilken typ av tåg/järnvägsfordon modellen är (lok kontra
        person-/godsvagnar och vanliga vagnsundertyper).
    roof_cargo_net_hook_fastener_style:
      name: Taklastnät – typ av krok/fäste
      description: Anger vilken typ av ändbeslag som används för att ansluta nätet
        till förankringspunkter (t.ex. S-krok, karbinhake, J-krok).
    roof_height_class:
      name: Takhöjdsklass
      description: Kategoriserar takhöjd som vanligtvis används för skåpbilar (särskilt
        relevant för konvertering/husbilsbyggnationer).
    roof_type:
      name: Taktyp
      description: Konfiguration av kapslingens tak- eller innertakssektion.
    root_variety:
      name: Rotsort
      description: Identifierar rotsorten eller den vanligaste typen (t.ex. pepparrot
        kontra äkta wasabisorter).
    rope_buoyancy:
      name: Flytförmåga rep
      description: Anger om repet är utformat för att flyta på vattenytan, vilket
        hjälper åkare att undvika intrassling och förenklar upptagning.
    rope_construction:
      name: Repkonstruktion
      description: Anger fiberkonstruktionsdetaljer utöver flätad stil, såsom tvinnad
        vs. flätad kärna/mantel och om repet har kernmantel-konstruktion.
    rope_material:
      name: Repmaterial
      description: Identifierar materialet i stämningsrepet/snöret.
    rope_strand_compatibility:
      name: Reptrådens kompatibilitet
      description: Anger vilka repkonfigurationer säkringsenheten kan hantera (enkel,
        halv/dubbel, tvilling eller kombinationer).
    rope_stretch_type:
      name: Repsträckningstyp
      description: Beskriver repets töjbarhetsegenskaper och skiljer mellan icke-töjbara,
        lågtöjbara, standard- eller bungee-typer.
    rose_bloom_stage:
      name: Rosenblomningsstadium
      description: Anger hur öppna rosenblommorna är vid leverans/ankomst (från knopp
        till helt utslagna).
    rose_grade:
      name: Roskvalitet
      description: Snittrosor av kommersiell kvalitet.
    rosette_center_type:
      name: Rosettcentrumtyp
      description: Anger typen av mittdetalj eller insats på rosettens framsida.
    rosin_dust_level:
      name: Nivå av harpiksdamm
      description: Indikerar den förväntade mängden hartsdamm som produceras vid normal
        användning.
    rosin_formula_additives:
      name: Rosinformel / tillsatser
      description: Identifierar anmärkningsvärda formuleringsegenskaper såsom allergivänliga,
        dammfattiga eller metallinfunderade blandningar.
    rosin_hardness:
      name: Rosinhårdhet
      description: Indikerar den relativa hårdheten/mjukheten hos stråkharts, vilket
        kan påverka grepp och dammbildning i olika klimat och spelstilar.
    rotation_mechanism_type:
      name: Typ av rotationsmekanism
      description: Anger mekanismen som gör att repet kan rotera, vilket påverkar
        jämnhet och uppnåbar hastighet (t.ex. kullager kontra bussningar).
    rotation_motion_features:
      name: Rotations-/rörelsefunktioner
      description: Anger om planeter/banor roterar eller rör sig och hur.
    rotor_configuration_type:
      name: Typ av rotorkonfiguration
      description: Identifierar RC-helikopterns rotorkonfiguration och kontrollstil
        (t.ex. koaxial, enkelrotor med fast pitch kontra kollektiv pitch, multirotor),
        vilket väsentligt påverkar flygegenskaper och lämplighet för olika kompetensnivåer.
    rotor_construction_type:
      name: Rotor – konstruktionstyp
      description: Anger rotorns konstruktion, vilket påverkar vikt, styvhet och värmehantering.
    rotor_mounting_interface:
      name: Gränssnitt för rotormontering.
      description: Definierar navgränssnittsstandarden som används för att fästa rotorn
        till hjulet.
    rotor_mounting_standard:
      name: Standard för rotormontering
      description: Anger gränssnittsstandarden som används för att fästa rotorn till
        navet (t.ex. 6-bults eller Center Lock).
    roulette_set_components_included:
      name: Medföljande komponenter i roulettset
      description: Viktiga rouletterelaterade komponenter ingår i hjulet/setet.
    roulette_wheel_ball_track_type:
      name: Roulettehjul – typ av bollbana
      description: Beskriver stilen på bollbanan som används på hjulet, vilket påverkar
        realismen och spelkänslan.
    roulette_wheel_numbering_system:
      name: Numreringssystem för roulettehjul
      description: Indikerar roulettehjulets numrering och nollkonfiguration för kompatibilitet
        mellan spel och odds.
    rounders_equipment_included:
      name: Medföljande utrustning för rounders
      description: Listar de specifika rounders-artiklarna eller tillbehören som medföljer
        träningssetet eller paketet så att köpare vet exakt vad som finns i lådan.
    rounders_governing_body_approval:
      name: Rounders – godkännande från styrande organ
      description: Indikerar certifiering eller godkännande av ett officiellt rounders-
        eller annat sportstyrande organ.
    row_counter_format:
      name: Radräknarformat
      description: Anger formatet/stilen för en stickningsräknare (t.ex. ring, kedja,
        klickräknare, digital).
    row_counter_mechanism:
      name: Radräknemekanism
      description: Anger hur radantalet registreras i verktyget.
    row_counter_mounting_method:
      name: Monteringsmetod för radräknare
      description: Hur räknaren/markören fästs under användning (på nålen, på fingret,
        på projektet etc.).
    rowel_type:
      name: Sporrkrans – typ
      description: Beskriver sporrkransens form eller kantprofil för ryttarens preferenser
        och hästens känslighet.
    rowing_machine_part_type:
      name: Deltyp för roddmaskin
      description: Identifierar den specifika komponent som produkten är avsedd att
        ersätta på en roddmaskin så att kunderna snabbt kan hitta exakt den del de
        behöver utan att skapa en explosion av mikrokategorier.
    rubber_ducky_character_theme:
      name: Gummianka – karaktär/tema
      description: Tema eller karaktärsstyling hos gummiankan (användbart för nyhets-/samlarankor).
    rubber_ducky_features:
      name: Gummianka – egenskaper
      description: Funktionella/designmässiga egenskeper specifika för badleksaker
        av gummiankor.
    rubber_ducky_size_class:
      name: Gummianka – storleksklass
      description: En kundvänlig storlekgrupp för gummiankor baserat på typisk användning
        (badkarsleksak vs tårtdekoration vs jumbo).
    ruffle_style:
      name: Volangstil
      description: Beskriver konstruktionen eller den visuella stilen på volangen
        på en stolssash.
    rugby_headgear_safety_certification:
      name: Säkerhetscertifiering för rugbyhuvudskydd
      description: Anger om huvudskyddet uppfyller officiella säkerhetsstandarder
        för rugby eller allmänna sporter.
    rugby_size:
      name: Rugby-storlek
      description: Kategoriserar utrustning efter vanlig rugbyspecifik beteckning
        som används i produkttitlar.
    rugby_variant:
      name: Rugbyvariant
      description: Anger den rugbyvariant (kod eller format) som produkten är avsedd
        för.
    ruler_edge_type:
      name: Linjalkanttyp
      description: Identifierar kantprofilen/funktionen som används för mätning eller
        märkning (t.ex. rak kant, avfasad, avsats).
    ruler_marking_style:
      name: Linjalens markeringsstil
      description: Beskriver markerings-/guide-layouten som är tryckt på linjalen
        utöver vanliga tickmärken.
    runner_configuration:
      name: Utformning av löpare
      description: Beskriver antalet och placeringen av medar på pulkan.
    runner_material:
      name: Löparmaterial
      description: Anger materialet som används för pulkans medar eller glidlister.
    saddle_cover_style:
      name: Sadelöverdragsstil
      description: Klassificerar produktens övergripande design eller användningsstil
        (t.ex. förvaringsskydd, ridskydd, bärväska).
    saddle_design:
      name: Sadeldesign
      description: Klassificerar sadelns övergripande ergonomiska eller reliefbaserade
        design/stil (t.ex. utskuren, noslös, delad nos, fjädrad).
    saddle_discipline:
      name: Sadeldisciplin
      description: Anger sadelns primära ridgren eller avsedda användning/stil.
    saddle_mounting_type:
      name: Typ av sadelmontering
      description: Anger gränssnittet mellan sadeln och sadelstolpen för kompatibilitet
        (t.ex. skenor, pivotal, I-balk).
    saddle_pad_shape:
      name: Sadelunderlag – form
      description: Beskriver den fysiska formen/omrisset på sadelunderlaget, vilket
        påverkar sadelns kompatibilitet och estetiska preferenser.
    saddle_pad_style:
      name: Modell av sadelunderlägg
      description: Identifierar sadelunderlagets funktionella stil eller avsedda ridgren,
        vilket gör det möjligt för ryttare att välja rätt design för sin aktivitet
        eller sadeltyp.
    saddle_padding_material:
      name: Sadelns dämpningsmaterial
      description: Indikerar det primära dämpningsmaterialet eller tekniken inuti
        sadeln som påverkar komfort och ridkänsla.
    saddle_rail_material:
      name: Material för sadelränna
      description: Anger materialet som används för skenorna under en cykelsadel,
        vilket påverkar styrka, komfort, vikt och pris.
    saddle_tree_material:
      name: Material för sadelträd
      description: Anger materialet som används för sadelstommen (sadelns inre ram).
    saddle_tree_width:
      name: Sadelstommens bredd
      description: Beskriver sadelstommens breddklassificering, som avgör hur den
        passar hästens manke.
    safety_documentation_available:
      name: Säkerhetsdokumentation tillgänglig
      description: Anger vilka efterlevnads-/säkerhetsdokument som tillhandahålls
        för ingrediensen (t.ex. säkerhetsdatablad, IFRA-certifikat/utlåtande, allergenutlåtande/försäkran).
    safety_equipment_included:
      name: Ingående säkerhetsutrustning
      description: Säkerhets-/skyddsartiklar som ingår i satsen.
    safety_features:
      name: Säkerhetsfunktioner
      description: Indikerar inbyggda säkerhetsfunktioner avsedda att minska oavsiktliga
        skärskador eller skydda bladet under förvaring.
    safety_harness_type:
      name: Säkerhetsseletyp
      description: Anger stil och konfiguration av barnselen som medföljer bilbarnstolen.
    safety_mechanism_type:
      name: Typ av säkerhetsmekanism
      description: Beskriver stilen på det inbyggda säkerhetssystemet som används
        för att fånga skivstången vid misslyckade lyft.
    safety_restraint_type:
      name: Typ av säkerhetsbälte
      description: Typ av inbyggd barnsäkerhetsanordning på gungstolen, om sådan finns.
    safety_warning:
      name: Säkerhetsvarning
      description: Anger om produkten har vanliga säkerhetsvarningar för leksaker
        som är relevanta för kulor (t.ex. kvävningsrisk).
    sail_shape:
      name: Seglets form
      description: Beskriver kajakseglets geometriska stil, vilket påverkar effektivitet,
        hantering och montering.
    salad_dressing_type:
      name: Typ av salladsdressing
      description: Identifierar dressingens grundläggande stil eller konsistens (t.ex.
        krämig, vinägrett, yoghurtbaserad), vilket hjälper kunden att skilja mellan
        olika baser och konsistenser.
    salad_topping_base_ingredient:
      name: Basingrediens för salladstillbehör
      description: Anger den primära ingrediensgruppen som toppingen utgör, vilket
        hjälper kunder att filtrera efter näringspreferenser, allergenfrågor eller
        önskad konsistens.
    salt_level:
      name: Saltnivå
      description: Anger mängden salt eller natrium som tillsatts i nötterna eller
        fröna.
    sand_cup_features:
      name: Sandkopp – funktioner
      description: Funktionella/fysiska egenskaper hos sandkoppen/sandkopparna som
        påverkar lek och användning.
    sand_shovel_handle_style:
      name: Stil på sandspadens handtag
      description: Beskriver handtagets/greppets form i slutet av spaden/spadens handtag.
    sand_toy_set_pieces_included:
      name: Delar som ingår i sandleksakset
      description: Listar de typer av sandleksakskomponenter som ingår i setet (t.ex.
        hink, spade, formar) för att hjälpa kunder att jämföra setet efter vad de
        innehåller.
    sand_water_mill_items_included:
      name: Sand- och vattenkvarnsartiklar som ingår
      description: Listar de viktigaste tillbehörskomponenterna som medföljer kvarnleksaken
        (hinkar, skopor, formar etc.).
    sandbag_style:
      name: Sandsäcksstil
      description: Identifierar den specifika designen och det avsedda träningsanvändandet
        av sandsäcken (t.ex. bulgarisk, strongman, power), vilket hjälper kunden att
        välja mellan olika träningsformer.
    sandbox_bottom_type:
      name: Sandlådans bottentyp
      description: Den typ av bas-/bottenkonstruktion som används under sanden.
    sandbox_drainage_type:
      name: Typ av dränering för sandlåda
      description: Hur sandlådan dränerar vatten (om tillämpligt), till exempel dräneringshål
        eller en avtagbar plugg.
    sandbox_seating_type:
      name: Typ av sittplats för sandlåda
      description: Om sandlådan inkluderar integrerade sittplatser och vilken typ.
    sapodillo_variety:
      name: Sapodillo-sorten
      description: Identifierar den specifika sorten av sapodillo/chikoo (t.ex. "Alano",
        "Prolific"), vilket gör det möjligt för entusiaster att välja föredragna smakprofiler
        och egenskaper.
    sapote_variety:
      name: Sapotesort
      description: Anger den specifika art/typ av sapote som erbjuds (t.ex. svart,
        vit, mamey), vilket gör det möjligt för kunden att skilja mellan olika sorter.
    satin_ribbon_face_type:
      name: Satinband – sidotyp
      description: Anger om bandet har en satinfinish på ena sidan eller båda sidor.
    sauce_consistency:
      name: Såskonsistens
      description: Beskriver pizzasåsens konsistens eller tjocklek.
    sauce_product_form:
      name: Produktform för sås
      description: Anger såsproduktens fysiska form, såsom vätska, olja, pasta, pulver,
        flingor eller sirap.
    sauce_variety:
      name: Såsvariant
      description: Identifierar den specifika stilen eller receptfamiljen för vit-
        eller gräddsåsen (t.ex. Alfredo, Béchamelsås, Hollandaisesås).
    saxophone_body_finish:
      name: Saxofonkroppens ytbehandling
      description: Beskriver den primära ytbehandlingen/pläteringen på saxofonkroppen
        (separat från klaviaturen).
    saxophone_body_type:
      name: Typ av saxofonkropp
      description: Beskriver den övergripande fysiska konfigurationen av bas-saxofonens
        kropp och klockorientering.
    saxophone_construction_style:
      name: Saxofonens konstruktionsstil
      description: Indikerar vanliga konstruktionsegenskaper hos saxofonen som påverkar
        hållbarhet, resonans och service.
    saxophone_included_accessories:
      name: Ingående tillbehör för saxofon
      description: Listar de tillbehör som vanligtvis medföljer ett altsaxofonpaket.
    saxophone_key_system:
      name: Saxofonens klaviatursystem
      description: Identifierar saxofonens klaviatursystem (layout/mekanismstandard)
        som används på instrumentet.
    saxophone_key_touch_material:
      name: Material för saxofonens klaviaturanslag
      description: Anger materialet som används för saxofonklaviaturanslag (t.ex.
        pärlklaviaturanslag).
    saxophone_mouthpiece_baffle_type:
      name: Saxofonmunstycke, baffeltyp
      description: Beskriver baffeldesignen som formar luftflöde och ljusstyrka.
    saxophone_neck_type:
      name: Saxofon – typ av hals
      description: Anger halskonfigurationen som medföljer bas-saxofonen.
    saxophone_package_contents:
      name: Saxofonpaket – Innehåll
      description: Listar vilka viktiga tillbehör som ingår i saxofonen (t.ex. fodral,
        munstycke, ligatur, halsrem, rengöringssats).
    saxophone_reed_cut:
      name: Saxofonrörbladsskärning
      description: Anger skärning/stil på saxofonrörbladet, vilket påverkar respons,
        ton och känsla.
    saxophone_reed_material_type:
      name: Materialtyp för saxofonrörblad
      description: Anger kategorin för rörbladsmaterial (t.ex. rotting kontra syntetiskt).
    saxophone_reed_strength_scale:
      name: Saxofonrörbladets styrkeskala
      description: Anger det numreringssystem/skala som används för rörbladet (ofta
        beroende på märke), vilket möjliggör tydligare jämförelse mellan listningar.
    saxophone_small_part_thread_size:
      name: Gängstorlek för smådelar till saxofon
      description: Anger gängstorlek/standard för gängade smådelar till saxofon (främst
        skruvar), vilket möjliggör val av korrekt passform.
    saxophone_swab_application_area:
      name: Användningsområde för saxofonrengöringsduk
      description: Anger vilken del av saxofonen som rengöringsduken är avsedd att
        rengöra/torka.
    scabbard_material:
      name: Balja/slida – material
      description: Anger huvudmaterial för medföljande slida/balja (om sådan finns)
    scale_model_assembly_status:
      name: Skalmodell – monteringsgrad
      description: Anger om skalmodellen är färdigbyggd och klar att ställa fram eller
        kräver montering/målning.
    scale_model_car_features:
      name: Skalmodellbil – egenskaper
      description: Utmärkande funktioner hos skalmodellbilen såsom öppningsbara dörrar/huv,
        styrbara hjul, fjädring etc.
    scale_model_kit_assembly_requirements:
      name: Skalmodell – monteringskrav för byggsats
      description: Anger vilka ytterligare monteringssteg/material som vanligtvis
        krävs utöver grundläggande snäppmontering.
    scale_model_kit_components_included:
      name: Skalmodellbyggsats – medföljande komponenter
      description: Listar vad som ingår i stridsvagn-skalmodellen/byggsatsen (t.ex.
        dekaler, figurer, fotoetsningsdelar).
    scale_model_paint_status:
      name: Skalmodell – målningsbehov
      description: Anger om helikoptermodellen är förmålad/färdigbehandlad eller behöver
        målas.
    scale_model_pose:
      name: Position för skalmodell
      description: Anger den avbildade posen för hästmodellen för matchning mellan
        visning/diorama.
    scale_model_rotor_configuration:
      name: Skalmodellens rotorkonfiguration
      description: Anger helikopterns rotorkonfiguration som avbildas av modellen.
    scale_model_truck_era:
      name: Skalmodell av lastbil – tidsperiod
      description: Anger eran/tidsperioden för den verkliga lastbilen som modellen
        representerar (användbart för samlare som söker vintage kontra moderna lastbilar).
    scale_model_truck_propulsion_type:
      name: Skalmodell av lastbil – framdrivningstyp
      description: Anger om den avbildade lastbilen är diesel-, bensin-, el-, hybrid-
        eller annan framdrivningstyp (enligt modellens märkning).
    scale_units:
      name: Skalindelning
      description: Måttenheterna som är tryckta/graverade på balken för inställning
        av radie/diameter.
    scent_function:
      name: Doftfunktion
      description: Definierar den primära funktionen hos en doftprodukt så att jägare
        snabbt kan välja rätt verktyg (t.ex. lockmedel kontra lukteliminator).
    scent_source:
      name: Doftkälla
      description: Listar den primära biologiska eller aromatiska källan som används
        i produktformuleringen, inklusive urintyper, livsmedelsbaserade dofter, växtaromer
        etc.
    school_bus_body_type:
      name: Skolbussens karosstyp
      description: Klassificerar en skolbuss efter vanliga kaross-/klassformat som
        används i marknaden (t.ex. typ A–D).
    school_bus_safety_feature:
      name: Skolbussens säkerhetsfunktion
      description: Utmärkande säkerhetsutrustning installerad på skolbussen.
    school_glue_washability:
      name: Skollim – avtvättbarhet
      description: Anger hur lätt det torkade/våta limmet kan rengöras från hud/kläder/ytor.
    scissors_application:
      name: Saxens användningsområde
      description: Primärt avsett klippmaterial/-område för saxen.
    scooter_brake_pad_material:
      name: Material för bromsbelägg på skoter
      description: Anger vilken blandning som används i bromsbelägg, vilket påverkar
        prestanda, bromsljud och livslängd.
    scoring_method:
      name: Poängsättningsmetod
      description: Anger hur poäng räknas på bordsfotbollsbordet, till exempel med
        manuella pärlräknare eller elektroniska resultattavlor.
    scoring_pattern:
      name: Poängsättningsmönster
      description: Placering av poängzoner tryckt på spelplanen.
    scoring_system_type:
      name: Typ av poängsystem
      description: Beskriver typen av poängföringsmekanism som ingår i bordet, såsom
        manuella reglage eller olika elektroniska displayer.
    scottish_smallpipes_bag_material:
      name: Skotskt småpipspåsematerial
      description: Anger materialet i påsen (luftbehållaren) som medföljer småpiporna.
    scottish_smallpipes_drone_tuning_configuration:
      name: Stämningskonfiguration för småpipornas borduner
      description: Anger den bordunstämningskonfiguration som medföljer instrumentet
        (bordunernas tonhöjd/roll i förhållande till grundtonen).
    scottish_smallpipes_reed_type:
      name: Skotska småpipors rörbladstyp
      description: Identifierar vilken rörbladstyp som används för spelpipan (och/eller
        om rörbladen är syntetiska kontra rotting).
    scraping_surface_type:
      name: Typ av skrapyta
      description: Anger konstruktionen/geometrin hos den skrapyta som producerar
        ljud (t.ex. spårad, kam/tänder, korrugerad).
    screw_drive_type:
      name: Skruvdrivningstyp
      description: Anger typen av skruvspår på skruv- eller bulthuvudet, och indikerar
        vilket verktyg som krävs för att dra åt eller ta bort den (t.ex. insex/Allen,
        Torx).
    screw_thread_size:
      name: Storlek på skruvmönster
      description: Anger gängstorleksstandarden för de medföljande eller kompatibla
        skruvarna (t.ex. M4, M5, M6).
    sculpting_clay_base_type:
      name: Typ av bas för modellera
      description: Beskriver den underliggande formuleringen/basen för skulpteringsleran.
    seafood_cut:
      name: Styckning av skaldjur
      description: Beskriver den fysiska styckningen eller presentationen av fisk-
        och skaldjursprodukten (t.ex. hel, filé, biff).
    seafood_processing_method:
      name: Bearbetningsmetod för skaldjur
      description: Anger den primära konserverings- eller bearbetningsteknik som används
        för fisken/skaldjuren, såsom rökt, saltat eller frystorkad.
    seafood_source:
      name: Källa för skaldjur
      description: Anger om fisken är vildfångad, odlad, växtbaserad eller från en
        annan källa, vilket hjälper kunder att utvärdera hållbarhet och kvalitet.
    seal_material:
      name: Tätningsmaterial
      description: Material som används till tätningar eller packningar för hals,
        handled och vrist som håller dräkten vattentät.
    seal_type:
      name: Tätningstyp
      description: Anger den tätningsmetod som används av kopplingen för att förhindra
        kylvätskeläckage.
    sealant_formulation:
      name: Tätningsmedelsformulering
      description: Indikerar den primära kemiska formuleringen eller tillsatstekniken
        för cykeldäckets tätningsmedel (t.ex. latexbaserat, fiberförstärkt, akryl).
    seals_leak_type:
      name: Typ av läckage som tätas
      description: Typ/plats för kylsystemläcka som produkten är avsedd att täta.
    seam_construction:
      name: Sömkonstruktion
      description: Beskriver hur bollens söm skapas, vilket påverkar flygegenskaper,
        hållbarhet och känsla.
    seam_design:
      name: Utformning av söm
      description: Anger sömkonstruktionen eller dekorativa sömfunktioner hos strumporna.
    seam_gauge_scale_type:
      name: Sömmätare skala-typ
      description: Indikerar vilka skalor/markeringar som finns på sömmätaren utöver
        baslinjalens skala.
    seam_gauge_slider_material:
      name: Sömmmått glidmaterial
      description: Identifierar materialet i den justerbara skjutreglagets/pekarkomponenten
        om sådan finns.
    seam_ripper_tip_style:
      name: Sömsprättare-spetsstil
      description: Beskriver den funktionella spetsdesignen som används för att skjuta
        under stygn och klippa tråd säkert.
    seam_sealing_type:
      name: Sömtätningstyp
      description: Beskriver metoden som används för att förhindra vatteninträngning
        i regndräktens sömmar (t.ex. heltejpad, svetsad).
    seam_type:
      name: Sömtyp
      description: Beskriver sömstilen på basebollen, vilket påverkar grepp, aerodynamik
        och avsedd spelnivå.
    season_condition_protection:
      name: Säsongs-/väderskydd
      description: Indikerar det primära väder/förhållande som vindruteskyddet är
        avsett att skydda mot.
    season_rating:
      name: Säsongsklassning
      description: Anger tältets säsongsklassificering, vilket indikerar dess lämplighet
        för olika väderförhållanden (t.ex. 3-säsonger, 4-säsonger, 5-säsonger/expedition).
    seasoning_variety:
      name: Kryddsort
      description: Klassificerar kryddningen efter dess tillagningsstil eller traditionella
        kulinariska användning.
    seat_adjustment_power_type:
      name: Typ av sätesjusteringskraft
      description: Anger hur sätesjusteringsmekanismerna manövreras (manuella spakar
        kontra elmotorer), vilket kan påverka kablage/kompatibilitet.
    seat_belt_attachment_type:
      name: Typ av säkerhetsbältesfäste
      description: Anger hur remmen fästs vid fordonet/bältesutrustningen.
    seat_belt_buckle_electrical_connector_type:
      name: Typ av elektrisk anslutning för säkerhetsbältesspänne
      description: Anger den anslutning/gränssnitt som används för kabeldragning av
        spännesomkopplare/förspännare, i förekommande fall.
    seat_belt_buckle_mounting_type:
      name: Monteringstyp för säkerhetsbältesspänne
      description: Beskriver hur spännet/fästet fästs på fordonet, sätet eller bältesröret
        (t.ex. med bult, med klick).
    seat_belt_buckle_release_button_color:
      name: Färg på spännets öppningsknapp
      description: Anger färgen på spännets öppningsknapp.
    seat_belt_cover_placement:
      name: Placering av säkerhetsbältesskydd
      description: Anger var på säkerhetsbältet skyddet är avsett att användas.
    seat_belt_integration:
      name: Integrering av säkerhetsbälte
      description: Anger om sätet har ett integrerat uttag för säkerhetsbälte och/eller
        spänne, eller om fordonets originaluttag för spänne måste överföras för installation.
    seat_belt_provision:
      name: Säkerhetsbälte – utförande
      description: Anger om säkerhetsbälten och/eller tillhörande bältesutrustning
        (till exempel spännen) ingår i baksätets montering eller måste överföras från
        originalsätet.
    seat_belt_strap_installation_location:
      name: Monteringsplats för säkerhetsbälte
      description: Indikerar var remmen är installerad i bältessystemet.
    seat_cover_placement:
      name: Placering av sätesöverdrag
      description: Anger vilken/vilka sittplatser överdraget är avsett för på fordonet.
    seat_cover_securement_method:
      name: Sätesöverdragets fästmetod
      description: Indikerar det primära sättet som sätesöverdraget är fäst vid sätet.
        Om flera metoder används, välj den huvudsakliga/primära.
    seat_cover_set_contents:
      name: Sätesöverdrag – innehåll
      description: Beskriver vilka delar som ingår i paketet (t.ex. endast sitsbottnar
        kontra heldäckande sits + nackstöd).
    seat_fabric:
      name: Sitstyg
      description: Primärt tyg som används till stolens sits och ryggstöd.
    seat_height_category:
      name: Sitthöjdskategori
      description: Klassificerar pallen efter typisk sitthöjd (t.ex. disk- eller barhöjd)
        för att förenkla valet.
    seat_material:
      name: Sitsmaterial
      description: Identifierar det primära materialet i bänkens sittyta.
    seat_mounting_type:
      name: Typ av montering för säte
      description: Monterings-/spårakonfiguration som används för att fästa sätet
        på fordonets golv.
    seating_surface_material:
      name: Sittyta – material
      description: Anger materialet i det område en person lutar sig på (t.ex. textilene-nät,
        slingtyg, rotting, vadderad klädsel).
    seatpost_clamp_mechanism:
      name: Sadelstolpeklämmekanism
      description: Typ av kläm-/stängningssystem som säkrar sadelstolpen.
    section_orientation_compatibility:
      name: Kompatibilitet mellan sektionsorientering
      description: Anger om tillbehöret passar en vänsterarmssektion, högerarmssektion
        eller universell sektion.
    sectional_configuration:
      name: Sektionskonfiguration
      description: Definierar den specifika modulen eller orienteringen för sektionsenheten
        (t.ex. hörn, vänster armstödsände, schäslong) så att kunden kan montera önskad
        konfiguration.
    sectional_shape:
      name: Sektionssoffans form
      description: Definierar den övergripande geometriska konfigurationen/utformningen
        för sektionssoffan.
    secured_components:
      name: Säkrade komponenter
      description: Listar de specifika cykeldelar som låsspett eller säkerhetsmuttrar
        skyddar (t.ex. framhjul, bakhjul, sadelstolpe).
    seed_content:
      name: Fröinnehåll
      description: Anger om citrusfrukten är kärnfri, har få kärnor eller innehåller
        mycket kärnor.
    seed_size_classification:
      name: Klassificering för fröstorlek
      description: Indikerar den relativa storleken av det oätliga fröet inuti litchien,
        vilket påverkar mängden ätbart fruktkött.
    self_adhesive_backing_format:
      name: Självhäftande baksida – utförande
      description: Fysiskt format på den självhäftande baksidan som medföljer veken
        (förapplicerad dyna kontra separata klistermärken, etc.).
    self_adhesive_hook_loop_backing_type:
      name: Självhäftande kardborreband
      description: Anger konstruktionen av baksidan/fodret och det självhäftande systemet
        som används på den självhäftande sidan.
    self_adhesive_hook_loop_fastener_shape:
      name: Form på kardborreband
      description: Anger skärningen/formen på de medföljande fästelementen.
    self_hardening_clay_finish:
      name: Självhärdande lerfinish
      description: Beskriver ytans utseende/glans när den är helt härdad (användbart
        för att välja mellan naturmatt, sidenmatt etc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Självhärdande leras vattenbeständighet efter härdning
      description: Indikerar motståndskraft mot vattenexponering efter fullständig
        härdning (utan ytterligare tätningsmedel).
    sensor_functions:
      name: Sensorfunktioner
      description: Anger vilka cykelmätvärden sensorn mäter.
    sensor_measurement_mode:
      name: Mätläge för sensor
      description: Anger vilka mätvärden sensorn kan fånga (t.ex. endast kadens, endast
        hastighet, dubbel hastighet och kadens).
    sensor_mounting_position:
      name: Monteringsposition för sensor
      description: Anger platsen på cykeln eller cyklisten där sensorn är placerad,
        såsom vevarm, hjulnav eller sko. Detta påverkar kompatibiliteten med olika
        cykelkonfigurationer.
    sensor_mounting_type:
      name: Typ av montering för sensor
      description: Anger hur MAP-sensorn monteras på insugningsgrenröret/motorn (t.ex.
        bultad fläns kontra insticksgenomföring).
    sensor_or_gauge_mounting_location:
      name: Monteringsplattor för sensorer eller mätare
      description: Anger var på fordonet sensorn eller mätaren är avsedd att installeras
        (system-/platsnivå, inte vänster/höger).
    sensory_modality:
      name: Sensorisk modalitet
      description: Primär sensorisk upplevelse(r) som leksaken är utformad för att
        ge (kan vara multisensorisk).
    sensory_toy_fidget_mechanism:
      name: Fidgetmekanism för sensorisk leksak
      description: Primär interaktion/mekanism som används för fidgeting och självreglering.
    sensory_toy_light_features:
      name: Ljusfunktioner för sensorisk leksak
      description: Ljusbeteenden/effekter som leksaken tillhandahåller.
    sensory_toy_texture_type:
      name: Texturtyp för sensorisk leksak
      description: Dominerande ytkänsla/texturelement som används för taktil stimulering.
    sequin_application_method:
      name: Metod för applicering av paljetter
      description: Hur paljetten är avsedd att appliceras/användas (sy-på kontra limning
        kontra värmefixering, etc.).
    sequin_finish:
      name: Paljettfinish
      description: Beskriver ytan/den visuella finishen och den reflekterande effekten
        av paljetterna som används på lappen (t.ex. matt, metallisk, holografisk),
        inte lappens baksida eller fästmetod.
    serger_stitch_functions:
      name: Overlockmaskin – sömfunktioner
      description: De sömfunktioner som overlockmaskinen stöder (overlock/overedge-varianter
        och specialoverlocksömmar).
    serger_thread_count:
      name: Antal trådar i overlockmaskinen
      description: Antal trådar som overlockmaskinen kan använda för att sy (t.ex.
        2/3/4/5-trådskapacitet).
    service_interval:
      name: Serviceintervall
      description: Rekommenderad maximal tid mellan obligatorisk inspektion/service
        av en godkänd servicestation.
    serving_temperature:
      name: Serveringstemperatur
      description: Anger avsedd serveringstemperatur eller produktens tillstånd vid
        konsumtion.
    sesame_seed_hull_status:
      name: Sesamfrö – skalförekomst
      description: Anger om tahinin är gjord av skalade eller oskalade sesamfrön,
        vilket påverkar färg, Taste och näringsinnehåll.
    sesame_seed_roast_level:
      name: Sesamfrön – rostningsnivå
      description: Indikerar hur mycket sesamfröna rostades innan malning, vilket
        hjälper kunden att välja sin föredragna smakintensitet.
    sesame_seed_variety:
      name: Sesamfrösort
      description: Identifierar färgen eller sorten av sesamfrön som används för att
        tillverka oljan.
    set_classification:
      name: Setklassificering
      description: Definierar den avsedda spelnivån eller stilen för krocketsetet
        (t.ex. turnering, fritid, reseset).
    set_components:
      name: Setkomponenter
      description: Anger vilka artiklar som ingår i produkten (t.ex. endast mittspaken
        kontra komplett set).
    set_items_included:
      name: Delar som ingår i setet
      description: Anger de plagg eller accessoarer som ingår i setet, såsom sari-tyg,
        dupatta eller bälte.
    setup_mechanism:
      name: Monteringsmekanism
      description: Beskriver den primära uppsättningsmetoden för tältet (t.ex. popup-tält,
        uppblåsbart/luftbalktält, takmonterat skaltält).
    setup_type:
      name: Typ av montering
      description: Hur lektältet/tunneln monteras eller sätts upp.
    sew_in_interfacing_elasticity:
      name: Insytt mellanlägg – elasticitet
      description: Anger om det insydda mellanlägget är töjbart och, i så fall, i
        vilken/vilka riktningar – för att matcha stickade eller vävda projekt.
    sew_in_label_placement:
      name: Placering av insydd etikett
      description: Anger var på den färdiga produkten etiketten är avsedd att placeras.
    sew_on_edge_finish:
      name: Påsytt kantavslut
      description: Anger om kardborrebandets kanter är råa/skurna eller färdigbearbetade
        för att motstå fransning.
    sew_on_rhinestone_hole_orientation:
      name: Hålorientering för påsytt strass
      description: Fördelning/arrangemang av hål i förhållande till stenen (t.ex.
        sida vid sida, mittemot, kors) för att möjliggöra olika stygnstilar.
    sewing_kit_components_included:
      name: Komponenter som ingår i syset
      description: Listar de sömnadsdetaljer/verktyg som ingår i ett kit så att kunden
        kan jämföra vad som finns i varje kit.
    sewing_machine_bobbin_class:
      name: Typ av symaskinsspole
      description: Anger spoltypen/systemet som är kompatibelt med symaskinen för
        spolar och spollådor.
    sewing_machine_buttonhole_type:
      name: Knapphålstyp för symaskin
      description: Metod för att skapa knapphål som stöds av maskinen.
    sewing_machine_display_type:
      name: Typ av symaskinsdisplay
      description: Typ av kontroll-/displaygränssnitt på symaskinen.
    sewing_machine_needle_point_type:
      name: Symaskinsnålspetstyp
      description: Definierar nålens spetsgeometri/spetsfamilj som avgör hur den tränger
        igenom olika tyger (t.ex. vass vs. kulspets vs. kil).
    sewing_machine_needle_system:
      name: Nålsystem för symaskin
      description: Det standardiserade nålsystem/modellnummer som avgör maskinkompatibilitet
        (ofta skrivet som 130/705 H, HAx1, DBx1, 15x1, etc.).
    sewing_machine_needle_type:
      name: Typ av nål för symaskin
      description: Anger nålens avsedda användning/stil (t.ex. universal, kulspets,
        jeans/denim), vilket påverkar stygnkvaliteten och tygets lämplighet.
    sewing_machine_shank_type:
      name: Symaskin – typ av fäste för pressarfot
      description: Anger standarden för pressarfotens skaft/fotfäste som foten är
        konstruerad för, vilket säkerställer kompatibilitet med symaskinen (t.ex.
        lågt skaft, högt skaft, snett skaft).
    sewing_pattern_accessory_type:
      name: Typ av tillbehör till symönster
      description: Anger vilket tillbehör sömnadsmönstret är till för.
    sewing_pattern_notions_required:
      name: Nödvändiga tillbehör för sömnadsmönster
      description: Listar viktiga ytterligare material/utrustning som krävs för att
        slutföra projektet (utöver tyg och tråd).
    sewing_pattern_recommended_fabric:
      name: Rekommenderat tyg för sömnadsmönster
      description: Listar rekommenderade tygtyper/-vikter för sömnadsmönstret (enligt
        mönsterdesignern).
    sewing_pattern_size_range:
      name: Sömnadsmönstrets storleksintervall
      description: Anger det avsedda storleksintervall som täcks av mönstret (t.ex.
        baby till vuxen, plusstorlekar).
    sewing_thread_size_system:
      name: Sytråd – storlekssystem
      description: Storleksstandarden som används för att uttrycka trådstorleken (t.ex.
        Tex, Denier, Ticket, viktnummer, V-storlek).
    shaft_curvature:
      name: Skaftkrökning
      description: Beskriver skaftets övergripande form, vilket påverkar frigång,
        sving och ergonomi.
    shaft_kick_point:
      name: Skaftets flexpunkt
      description: Identifierar positionen längs skaftet där det böjs mest under en
        sving, vilket påverkar bollens bana.
    shaft_length_type:
      name: Typ av axellängd
      description: Branschstandardiserad kategorisk storleksbeteckning för dartskaft
        (t.ex. kort, medium) som används när exakta millimetermått inte anges.
    shaft_shape:
      name: Skaftform
      description: Definierar tvärsnittsprofilen för tonfa-skaftet (t.ex. rund, fyrkantig,
        åttkantig).
    shaker_fill_material:
      name: Fyllningsmaterial för shaker
      description: Anger den primära interna fyllningen som används för att skapa
        skakarljudet (när det är tillämpligt), till exempel pärlor, frön eller hagel.
    shaker_shell_material:
      name: Skalmaterial för shaker
      description: Anger det primära materialet i äggskakarens kropp/skal (det yttre
        höljet).
    shallot_variety:
      name: Schalottenlökssort
      description: Identifierar den specifika odlingssorten, handelstypen eller sorten
        av schalottenlöksprodukten.
    shank_style:
      name: Typ av skaft
      description: Beskriver den övergripande formen/konfigurationen av bettets skaft
        (t.ex. raka, böjda, betande).
    shapewear_enhancement_feature:
      name: Formgivande egenskaper för shapewear
      description: Framhäver den primära funktionella förbättringen som plagget erbjuder
        (t.ex. magkontroll, rumplyft, läckagesäkert foder).
    sheath_type:
      name: Typ av slida
      description: Typ av slida/balja som medföljer samlarkniven.
    sheet_music_clip_padding_material:
      name: Dämpningsmaterial för notklämma
      description: Materialet i klämmans greppdämpning som kommer i kontakt med papper
        eller stativets kant för att förhindra rivning och glidning.
    sheet_music_clip_spring_tension_level:
      name: Notklämmans fjäderspänningsnivå
      description: Relativ styrka hos klämfjädern / klämkraften.
    sheet_music_clip_use_environment:
      name: Notklämmans användningsmiljö
      description: Primärt avsedd användningsmiljö där klämman är utformad för att
        fungera bäst.
    shell_construction:
      name: Skalkonstruktion
      description: Anger hur bastrummans skal är konstruerat, vilket starkt påverkar
        ton och vikt.
    shell_finish:
      name: Skalfinish
      description: Utvändig behandling av doumbek-skalet.
    shell_hull_status:
      name: Skalstatus
      description: Anger om nötterna eller fröna säljs med skalet intakt eller borttaget.
    shift_boot_attachment_method:
      name: Fästmetod för växelstövel
      description: Anger hur växelspaksskyddet fästs på fordonets konsol/växelspakslist
        (t.ex. klämbar list, låsring, självhäftande).
    shift_boot_installation_hardware_included:
      name: Ingående installationsmaterial för växelspaksskydd
      description: Listar installationsutrustningen och komponenterna som ingår med
        växelspaksskyddet.
    shift_knob_illumination:
      name: Växelknoppens belysning
      description: Anger om växelvredet har belysning och belysningsmetod/typ (t.ex.
        fotoluminescerande, LED, fiberoptisk, bakgrundsbelyst).
    shift_knob_installation_method:
      name: Installationsmetod för växelknopp
      description: Anger hur växelknoppen fästs på växelspaken.
    shift_knob_shape:
      name: Växelknoppens form
      description: Beskriver den övergripande ergonomiska utformningen av växelknoppen.
    shift_pattern_type:
      name: Typ av växelmönster
      description: Anger stilen på växelmarkeringen på växelknoppen (om sådan finns).
    shifter_compatibility:
      name: Kompatibilitet för växelreglage
      description: Anger om styrförlängningen är kompatibel med elektroniska växelreglage,
        mekaniska växelreglage, båda, eller inte kompatibel med växelreglage.
    shifter_mounting_interface:
      name: Gränssnitt för montering av växelreglage
      description: Beskriver hur växelreglaget fästs på cykeln (t.ex. diskret klämma,
        I-Spec, MatchMaker, styreände, diagonalrör, trådlös).
    shifting_actuation_type:
      name: Växlingsmanövreringstyp
      description: Identifierar mekanismen som används för att växla i gruppsetet
        (mekanisk, elektroniskt trådbunden, elektronisk trådlös, hydraulisk).
    shifting_mechanism:
      name: Växlingsmekanism
      description: Identifierar om växelreglaget fungerar mekaniskt eller elektroniskt,
        och om det är indexerat eller friktionsbaserat.
    shim_purpose:
      name: Syfte med shims
      description: Definierar produktens funktionella typ (t.ex. shim, kil, distans)
        så att cyklister snabbt kan hitta rätt justeringslösning utan att behöva separata
        underkategorier.
    shin_guard_attachment_method:
      name: Metod för fastsättning av benskydd
      description: Klassificerar den övergripande designen för benskyddet, inklusive
        integration med vristskydd eller strumpkonstruktion.
    shirt_cuff_style:
      name: Modell av skjortärm
      description: Identifierar konstruktionen av ärmmanschetten, vilket påverkar
        formalitet, kombination med manschettknappar och komfort.
    shochu_base_ingredient:
      name: Shochu-basingrediens
      description: Identifierar den primära stärkelse- eller sockerkällan som används
        för att producera shochu.
    shochu_soju_variety:
      name: Shochu & soju sort
      description: Klassificerar produkten efter dess erkända stil eller produktionstyp.
    shock_absorber_bushing_material:
      name: Material i stötdämparbussning
      description: Material i monteringsbussningar/isolatorer som medföljer eller
        är inbyggda i stötdämparen.
    shock_absorber_charge_type:
      name: Typ av laddning för stötdämpare
      description: Anger stötdämparens laddnings-/dämpningsteknik (t.ex. hydraulisk/olja,
        gasfylld, luft) och/eller relaterad rörkonstruktion där så är tillämpligt.
    shock_absorber_mount_type_lower:
      name: Typ av fäste för stötdämpare (nedre)
      description: Anger den nedre monteringsgränssnittstypen för stötdämparen för
        passformsanpassning.
    shock_absorber_mount_type_upper:
      name: Stötdämparfäste (övre)
      description: Anger den övre (översta) monteringsgränssnittstypen för en stötdämpare
        i motorfordon för matchning av passform/kompatibilitet.
    shock_absorber_position:
      name: Stötdämparens position
      description: Anger om stötdämparen är avsedd för fram-, bak-, vänster- eller
        högerposition på fordonet (mer detaljerad än placering endast på axeln).
    shock_absorption_system:
      name: Stötdämpningssystem
      description: Definierar mekanismen som används för att minska vibrationer och
        ljud vid returrörelser.
    shoe_collar_height:
      name: Skokragens höjd
      description: Klassificerar skor efter krage/snitthöjd (låg, mellan, hög) för
        att indikera täckning och stöd för fotleden.
    shoe_cover_height:
      name: Höjd för skoskydd
      description: Anger täckningsnivån för cykelskoskyddet, och skiljer tåskydd från
        heltäckande höga skoöverdrag.
    shoe_sizing_system:
      name: Skostorlekssystem
      description: Identifierar den storleksstandard (US, UK, EU, JP, Mondopoint,
        etc.) som används för den angivna skostorleken.
    shoelace_aglet_material:
      name: Material för skosnörens plastspetsar
      description: Identifierar materialet som används för plastspetsarna i ändarna
        av skosnörena, vilket påverkar hållbarhet och stil.
    shooting_rest_design:
      name: Typ av stöd för skytte
      description: Klassificerar skytte Stödets strukturella stil (påsstöd, medar,
        stativstöd, skruvstäd för gevär, etc.).
    shooting_stick_yoke_design:
      name: Design av ok för skjutkäppar
      description: Anger den vagga- eller okstil som samverkar med skjutvapnet eller
        optiken.
    shooting_target_style:
      name: Skjutmålsstil
      description: Klassificerar stilen eller utformningen av mål för konståkning
        och hockeyskott så att kunder kan välja rätt träningsfokus.
    shooting_target_type:
      name: Typ av måltavla
      description: Klassificerar skjutmål efter strukturell stil, material eller design
        (t.ex. gong, silhuett, papperstavel, roterande), vilket gör det möjligt för
        skyttar att snabbt hitta rätt måltavla för sin stil och skjutvapentyp.
    short_block_assembly_balance_type:
      name: Balanseringstyp för kortblocksmontering
      description: Anger om den roterande enheten är internt eller externt balanserad.
    short_block_intended_use:
      name: Avsedd användning för kortblock
      description: Primär avsedd användning för kortblocket.
    short_block_rotating_assembly_included:
      name: Roterande kortblock ingår
      description: Anger vilka större roterande monteringskomponenter som ingår till
        kortblocket.
    shot_size:
      name: Skottstorlek
      description: Anger beteckningen för hagelstorlek för lösa hagel- eller ammunitionskomponenter.
    shotgun_action_type:
      name: Typ av hagelgevärsmekanism
      description: Anger hagelgevärets funktionsmekanism.
    shotgun_choke_type:
      name: Typ av choke för hagelgevär
      description: Anger chokekonfigurationen för hagelgevärets pipa/pipor.
    shotgun_gauge:
      name: Hagelgevärskaliber
      description: Anger ett hagelgevärs kaliber (och .410 kaliber där så är tillämpligt)
        för identifiering och filtrering i listor över samlarobjekt.
    shotgun_stock_material:
      name: Material för hagelgevärsstock
      description: Anger det primära materialet för kolven/förstocken.
    shuffleboard_speed_rating:
      name: Shuffleboard – hastighetsklassning
      description: Indikerar den relativa glidhastighet som shuffleboardpulver eller
        andra underhållsprodukter ger på bordet, vilket gör det möjligt för spelarna
        att välja lämplig hastighet för sin kompetensnivå och bordslängd.
    shuffleboard_table_length_compatibility:
      name: Kompatibilitet med shuffleboardbordets längd
      description: Standardlängd på shuffleboardbord som en produkt är utformad för
        att passa eller komplettera.
    shuttlecock_base_material:
      name: Material för bas på badmintonfjäder
      description: Identifierar materialet som används till badmintonbollens nos/bas,
        vilket påverkar hållbarhet, känsla och retur.
    shuttlecock_feather_material:
      name: Material för badmintonbollens fjädrar
      description: Identifierar den primära fjäderkällan eller konstruktionstypen
        som används på badmintonbollens kjol, vilket påverkar hållbarhet, konsistens
        och pris.
    shuttlecock_grade:
      name: Badmintonbollskvalitet
      description: Anger den avsedda spelnivån eller kvalitetsklassificeringen (t.ex.
        träning, klubb, tävling).
    shuttlecock_speed_rating:
      name: Hastighetsklass för badmintonfjäder
      description: Anger tillverkarens angivna hastighet eller klassificering för
        badmintonbollen, vilket gör det möjligt för spelare att välja rätt flyghastighet
        för sina spelvillkor, temperatur och höjd.
    side_panel_installation_state:
      name: Sidopanelens installationsgrad
      description: Anger om sidopanelen levereras obehandlad, grundmålad, målad eller
        på annat sätt belagd/förberedd för installation.
    side_wall_mechanism:
      name: Sidoväggsmekanism
      description: Beskriver hur liggdelens sängvägg öppnas eller sänks för att komma
        åt barnet.
    signal_source:
      name: Signalkälla
      description: Anger hur vägmätaren tar emot/härleder information om avstånd eller
        tid.
    silk_fiber_type:
      name: Silkesfibertyp
      description: Typ/källa av sidenfiber som används för att tillverka tyget (t.ex.
        mullbärsspindel eller tussah), vilket påverkar textur, enhetlighet och pris.
    simulated_game_species:
      name: Simulerade viltarter
      description: Indikerar den specifika viltfågeln eller det specifika djuret som
        dockan replikerar för realistisk träning.
    singlet_cut_style:
      name: Singlet-modell
      description: Anger snitt/stil på brottarsinglet, med hänsyn till remhöjd, ryggstil
        och kön/ungdomsvariationer.
    sink_material:
      name: Material för sänke
      description: Anger materialet för det/de integrerade handfat som medföljer kommoden.
    sinker_attachment_style:
      name: Sänke – typ av fäste
      description: Beskriver mekanismen som finns på sänket för att fästa det vid
        fiskelinan eller riggen.
    sinker_finish:
      name: Sänke – finish
      description: Anger sänkets yttre beläggning eller ytbehandling.
    sinker_shape:
      name: Form på sänke
      description: Definierar sänkets geometriska form (t.ex. kula, cylinder, tårform)
        så att sportfiskare kan välja optimal presentation och motståndskraft mot
        fastkrokning.
    siren_system_included:
      name: Sirensystem ingår
      description: Anger om en siren/högtalarsystem är installerat och vilken typ.
    siren_system_type:
      name: Typ av sirensystem
      description: Anger den installerade siren-/högtalarkonfigurationen på polisbilen.
    size_designation:
      name: Storleksbeteckning
      description: Standardiserad storleksbeteckning för triangelinstrumentet.
    size_system:
      name: Storlekssystem
      description: Anger det storlekssystem eller den regionala standard som storleksbeteckningen
        motsvarar (t.ex. USA, Storbritannien, EU, internationella bokstavsstorlekar).
    sizzle_mechanism:
      name: Fräsmekanism
      description: Anger hur cymbalen producerar fräseffekten (t.ex. nitar installerade
        i cymbalen, fästbar kedja/rassel eller ingen utrustning inkluderad).
    skate_blade_discipline:
      name: 'Skridskoblad – användningsområde '
      description: Identifierar den skridskodisciplin eller det användningsområde
        som bladet är utformat för, till exempel hockey eller konståkning, vilket
        gör att kunden kan filtrera fram relevanta blad.
    skate_brake_type:
      name: Typ av bromssätt för rullskridsko
      description: Identifierar typen av stoppmekanism som medföljer skridskorna.
    skateboard_nut_thread_size:
      name: Gängstorlek för skateboardmutter
      description: Anger mutterns trådstorlek (diameter och stigning) för att säkerställa
        kompatibilitet med skateboardaxlar, kingpins eller monteringsutrustning.
    skein_winder_bearing_bushing_type:
      name: Typ av lager/bussning för nystanlindare
      description: Anger vilken typ av lager eller bussning som används i nystanlindarens
        roterande enhet.
    skein_winder_drive_type:
      name: Drivtyp för nystanlindare
      description: Hur nystanlindaren drivs/vrids under användning.
    ski_binding_mechanism:
      name: Skidbindningsmekanism
      description: Definierar den grundläggande mekaniska designen eller disciplinen
        för bindningen (t.ex. alpin, tech/pin, telemark).
    ski_binding_part_type:
      name: Typ av skidbindningsdel
      description: Identifierar den specifika komponenten eller tillbehöret för skidbindningar,
        vilket möjliggör snabb filtrering över många deltyper.
    ski_boot_sole_standard:
      name: Pjäxstandard för skidsko
      description: Identifierar sulnormen eller bindningskompatibilitetsstandarden
        som pjäxan är certifierad för.
    skill_focus:
      name: Färdighetsfokus
      description: Identifierar den primära basketfärdigheten som träningshjälpmedlet
        är avsett att utveckla.
    skimboard_construction:
      name: Konstruktion för skimboard
      description: Beskriver brädans primära uppbyggnad, med fokus på kärna och laminatteknik
        (t.ex. skumkärna, träkärna).
    skin_presence:
      name: Skinn
      description: Anger om kycklingen säljs med skinn på, borttagen eller delvis
        borttagen.
    slapstick_handle_type:
      name: Slapstick-handtagstyp
      description: Beskriver greppstilen/handtaget som är integrerat i slapsticken,
        vilket påverkar ergonomi och spelkomfort.
    slapstick_playing_surface_material:
      name: Slagmaterial för slapstick
      description: Anger materialet i de slagande elementen som träffar varandra för
        att producera ljudet.
    sled_brake_type:
      name: Typ av broms för pulka
      description: Anger vilken bromsmekanism som ingår i släden, om någon.
    sled_towing_method:
      name: Slädebogseringsmetod
      description: Indikerar det primära sättet som skotern dras eller bogseras.
    sleep_position_suitability:
      name: Lämplig sovposition
      description: Anger vilken/vilka sovställningar madrassen är utformad för att
        stödja mest effektivt.
    sleeping_bag_shape:
      name: Sovsäck – form
      description: Sovsäckens övergripande skärning, vilket påverkar värme, vikt och
        rymlighet.
    sleeping_pad_type:
      name: Typ av liggunderlag
      description: Identifierar konstruktionsstilen på liggunderlaget – såsom sluten
        cell-skum eller uppblåsbar luft – vilket direkt påverkar komfort, vikt och
        isolering.
    sleepwear_set_pieces_included:
      name: Ingående delar i nattklädsel-set
      description: Listar de enskilda komponenterna som ingår i ett flerdelat set
        med sovplagg eller loungekläder.
    sleeve_bearing_type:
      name: Typ av hylslager
      description: Identifierar tekniken som möjliggör ärmrotation, vilket påverkar
        spinnkvaliteten vid olympiska lyft.
    sleeve_style:
      name: Modell av ärm
      description: Anger ärmmodellen utöver längden (t.ex. raglan).
    slide_board_accessories_included:
      name: Tillbehör för slideboard
      description: Listar kompletterande artiklar som medföljer glidbrädan så att
        kunden vet exakt vad som ingår och kan jämföra paket.
    slide_installation_type:
      name: Typ av installation för skena
      description: Hur rutschkanan är avsedd att installeras eller monteras (fristående,
        fäst vid en lekställning, etc.).
    slide_intended_finger:
      name: Slide – fingerposition
      description: Anger vilket finger sliden är avsedd att bäras på, eller om den
        inte är fingerbaserad (t.ex. en tonstav).
    slide_safety_features:
      name: Säkerhetsfunktioner för slide
      description: Säkerhetsrelaterade designelement som ingår på sliden
    slide_type:
      name: Slide-typ
      description: Anger vilken typ(er) av mässingsslide-mekanismer produkten är avsedd
        att rengöra.
    slide_water_use_capability:
      name: Vattenanvändningskapacitet för rutschkana
      description: Om rutschkanan är avsedd att användas med vatten (t.ex. slangkoppling)
        och hur.
    slime_putty_kit_components_included:
      name: Komponenter i slime- och putty-kit ingår
      description: Listar verktygen och tilläggen som ingår i slime-/kittprodukten
        (särskilt för kit/paket).
    sling_material:
      name: Material i rem
      description: Anger fibern/textilen som används i quickdraw-remmen (hundbensformad).
    smith_machine_bar_path:
      name: Smithmaskinens stångbana
      description: Beskriver stångens fasta rörelsebana och informerar användarna
        om biomekanik och utrymmeskrav.
    smoke_color:
      name: Rökfärg
      description: Rökfärgen som produceras av facklan/röksignalen (skiljer sig från
        produktkroppens färg).
    smoked_malt_smoking_material:
      name: Material för rökning av malt
      description: För rökt malt, identifierar det material som används under rökningen
        (t.ex. specifikt träslag eller torv).
    snack_mix_variety:
      name: Snackmixvariant
      description: Klassificerar produkten efter blandningsstil (t.ex. trailmix, nötmix,
        namkeen, sev).
    snack_processing_method:
      name: Bearbetningsmetod för snacks
      description: Anger den primära bearbetnings- eller konserveringsteknik som använts
        för att skapa mellanmålet (t.ex. frystorkad, bakad, rostad).
    snack_texture:
      name: Snacktextur
      description: Indikerar sesamstängernas tuggmotstånd eller konsistens.
    snap_installation_method:
      name: Metod för Snäppmontering
      description: Hur tryckknappen installeras/fästs på projektmaterialet.
    snare_drum_bearing_edge_profile:
      name: Kantprofil för virveltrums resonansbädd
      description: Resonansbäddens kantprofil på virveltrumman.
    snare_drum_finish_type:
      name: Typ av ytfinish för virveltrumma
      description: Högklassig finish/konstruktionstyp som används på virveltrumman.
    snare_drum_hoop_type:
      name: Typ av ring/rand för virveltrumma
      description: Typ av ringar/kanter som används på virveltrumman.
    snare_drum_mounting_type:
      name: Typ av montering för virveltrumma
      description: Hur virveltrumman är avsedd att monteras/användas.
    snare_drum_shell_material:
      name: Virveltrummas – material för skal
      description: Anger metallen/legeringen som används till virveltrummans kåpa
        (huvudkroppen), vilket starkt påverkar ton, vikt och hållbarhet.
    snare_drum_strainer_mechanism:
      name: Mekanism för virveltrummans avstängningsanordning
      description: Typ av sil-/utlösningsmekanism som används för att koppla in/koppla
        ur virveltrådarna.
    snare_drum_strainer_type:
      name: Typ av avstängningsanordning för virveltrumma
      description: Typ av sil-/utlösningsmekanism för virveltrådar.
    snare_hoop_type:
      name: Virveltrumma – ringtyp
      description: Typ av ringar/fästen på virveltrumman.
    snare_throw_off_type:
      name: Typ av utlösningsmekanism (throw-off)
      description: Typ av sil-/utlösningsmekanism som används för att koppla in/koppla
        ur virveltrådarna.
    snip_cutter_spring_mechanism:
      name: Fjädermekanism för saxklippare
      description: Anger om klippsaxen använder en fjäder-/returmekanism och dess
        stil.
    snorkel_mount_position:
      name: Snorkelmonteringsposition
      description: Beskriver var snorkeln är placerad på användarens huvud under användning.
    snorkel_top_type:
      name: Snorkeltopptyp
      description: Beskriver typen av vatteninträngningsskydd högst upp på snorkeln
        som ingår i setet.
    snow_condition_suitability:
      name: Lämplighet för snöförhållanden
      description: Beskriver de primära snöförhållanden som vaxet är avsett för.
    snow_sports_helmet_safety_certification:
      name: Säkerhetscertifiering för vintersportshjälmar
      description: Identifierar den/de säkerhetsstandard(er) som hjälmen uppfyller
        för skidåkning och snowboardåkning.
    snowboard_base_material:
      name: Snowboard – basmaterial
      description: Identifierar baskompositionen eller ytbehandlingen (extruderade,
        sintrade kvaliteter, proprietära formler) som påverkar hastighet, hållbarhet
        och underhåll.
    snowboard_width_class:
      name: Snowboard – breddklass
      description: Kategoriserar den totala brädans bredd i förhållande till skostorlek
        (t.ex. Regular, Wide).
    soccer_ball_compartment_type:
      name: Typ av fack för fotboll
      description: Anger hur (eller om) ryggsäcken rymmer en fotboll.
    soccer_ball_type:
      name: Typ av fotboll
      description: Anger den avsedda användningen eller stilen för fotboll (t.ex.
        match, träning, futsal) så att kunden snabbt kan hitta rätt variant utan att
        behöva många underkategorier.
    soccer_dummy_base_type:
      name: Typ av bas för fotbollsträningsdocka
      description: Beskriver vilken typ av bas eller förankringsmekanism som dockan
        använder.
    soccer_dummy_design:
      name: Fotbollsdocka – design
      description: Anger konstruktionsstilen för en fotbollsmåldocka, såsom stel eller
        uppblåsbar.
    soccer_goal_target_style:
      name: Typ av skotträningsmål för fotboll
      description: Definierar den fysiska utformningen eller designen på träningsmålet
        så att kunden kan välja den stil som bäst passar deras övningar.
    soccer_goal_type:
      name: Typ av fotbollsmål
      description: Anger målets strukturella stil eller avsedda användning (t.ex.
        pop-up-mål, studsmål, gatumål).
    sock_cushioning:
      name: Dämpning för strumpa
      description: Anger mängden och typen av dämpning eller vaddering under foten
        som är införlivad i strumpan.
    sock_cushioning_level:
      name: Strumpornas dämpningsnivå
      description: Anger mängden dämpning under foten som är integrerad i strumpan.
    sock_grip_type:
      name: Strumpgreppstyp
      description: Beskriver eventuella grepp- eller halkfria funktioner som tillämpas
        på strumpans sula.
    sock_toe_style:
      name: Strumpans tåstil
      description: Beskriver konstruktionsstilen för strumpans tåområde.
    soft_bait_style:
      name: Mjuk betestil
      description: Klassificerar kroppsdesignen eller profilen hos det mjuka plastbetet
        (t.ex. mask, swimbete, grub).
    soft_top_attachment_type:
      name: Typ av fäste för mjukt tak
      description: Identifierar hur suffletten fästs på fordonet (kanal, tryckknappar,
        kardborreband etc.).
    soft_top_includes_frame_hardware:
      name: Sufflett inkluderar ram/utrustning
      description: Anger om produkten inkluderar sufflettens ram/bågar och/eller monteringsutrustning.
    soft_top_installation_type:
      name: Sufflett Installationstyp
      description: Anger hur fordonets sufflett installeras/fästs, med angivande av
        förväntad installationsmetod och nödvändig arbetsinsats.
    soft_top_window_configuration:
      name: Fönsterkonfiguration för mjukt tak
      description: Anger hur många fönster suffletten har och vilka positioner som
        finns.
    softball_certification:
      name: Certifiering för softball
      description: Listar de styrande organets stämplar eller godkännande som är tryckta
        på bollen och som avgör behörighet för liga/match.
    softness_level:
      name: Mjukhetsnivå
      description: Indikerar hur mjuk/lågprofil öglesidan är, relevant för komfort
        mot huden och låg bulk.
    solar_system_model_included_bodies:
      name: Solsystemmodellens ingående himlakroppar
      description: Anger vilka himlakroppar som representeras i modelluppsättningen.
    solar_system_model_scaling:
      name: Skalning av solsystemmodell
      description: Anger om solsystemmodellen är skalriktig för planetstorlekar, avstånd/banor,
        båda, eller är en schematisk/icke-skalriktig representation.
    sold_secure_certification_level:
      name: Sold Secure-certifieringsnivå
      description: Anger det Sold Secure-betyg som låset fått av det oberoende brittiska
        testorganet (brons, silver, guld, diamant).
    sold_secure_rating:
      name: Sold Secure-klassning
      description: Indikerar vilken Sold Secure-certifieringsnivå som är tilldelad
        låset.
    sole_construction:
      name: Konstruktion för sula
      description: Indikerar hur skons sula är uppbyggd (hel, delad, tvådelad, etc.),
        vilket direkt påverkar flexibilitet, golvkontakt och lämplighet för specifika
        danstekniker.
    sole_type:
      name: Typ av sula
      description: Beskriver sulans strukturella stil, vilket indikerar flexibilitet
        och avsedd användning.
    soprano_saxophone_body_style:
      name: Sopransaxofon – typ av kropp
      description: Beskriver sopransaxofonkroppens fysiska konfigurationen.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Sopransaxofonmunstycke – typ av baffel
      description: Beskriver munstyckets baffel-/takdesign (konturen bakom spetsen),
        vilket påverkar ljusstyrka, projektion och respons.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Storlek på munstycket för sopransaxofon
      description: Beskriver det inre kammarutrymmet i sopransaxofonmunstycket, vilket
        påverkar motstånd och tonal färg.
    soprano_saxophone_mouthpiece_finish:
      name: Sopransaxofonmunstycke – ytfinish
      description: Ytbehandling/plätering applicerad på munstycket (om tillämpligt).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Sopransaxofonmunstycke – medföljande tillbehör
      description: Identifierar vilka tillbehör som ingår i munstycket.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Sopransaxofonmunstyckets tonala karaktär
      description: Övergripande klangprofil som vanligtvis förknippas med munstyckets
        design.
    sound_character:
      name: Ljudkaraktär
      description: Beskriver den allmänna klangfärgen som produceras av slapsticken.
    sound_expansion_method:
      name: Ljudexpansionsmetod
      description: Anger hur modulen kan lägga till eller utöka sitt interna ljudbibliotek
        utöver fabriksljuden (t.ex. innehållspaket, samplingsimport, expansionskort).
    sound_module_sound_library_focus:
      name: Ljudbibliotekets fokus för ljudmodul
      description: Primär tonvikt på fabriksljuduppsättningen för att hjälpa kunder
        att hitta rätt ljudmodul för sin stil/användning.
    sound_port_type:
      name: Typ av ljudport
      description: Beskriver ljudhålets/portens design på baksidan av cajonen som
        påverkar projektion och lågfrekvensrespons.
    sound_sensitivity_control:
      name: Kontroll av ljudkänslighet
      description: Anger om och hur ljudkänsligheten kan justeras.
    sound_synthesizer_patch_memory:
      name: Ljudsyntesens förinställningsminne
      description: Anger om synthesizern kan lagra och hämta förinställningar.
    sound_type:
      name: Ljudtyp
      description: Primära ljudtyper eller ljudutgångar som mattan producerar (t.ex.
        instrument, sånger, röstmeddelanden) för att vägleda spelet.
    soundboard_material:
      name: Material för resonansplatta
      description: Material som används till harpans resonansplatta (överst) som driver
        resonans och ton.
    soup_or_broth_variety:
      name: Soppa- eller buljongvariant
      description: Anger stilen, receptet eller den kulinariska tillagningen av soppan
        eller buljongen så att kunden snabbt kan hitta sin föredragna typ.
    sour_cream_variety:
      name: Gräddfilssort
      description: Klassificerar gräddfilsprodukter efter deras specifika variant
        eller kulturella stil, såsom crème fraîche eller mexikansk crema.
    soy_sauce_variety:
      name: Sojsåssort
      description: Identifierar den specifika stilen eller formuleringen av sojasås
        (t.ex. ljus, mörk, tamari, ponzu), vilket gör det möjligt att snabbt filtrera
        efter smakprofil och kulinarisk användning.
    spark_plug_electrode_material:
      name: Tändstiftets elektrodmaterial
      description: Material/teknik för tändstiftets tändelektrodspets(ar) (mitten
        och/eller jord), enligt märkning (t.ex. koppar, platina, iridium).
    spark_plug_seat_type:
      name: Typ av tändstiftssäte
      description: Tätnings-/sätestyp som används av tändstiftet vid cylinderhuvudets
        anslutning.
    spark_plug_terminal_type:
      name: Typ av terminal för tändstift
      description: Övre terminalens utformning som används för att ansluta tändkabeln/stöveln.
    sparkler_shape:
      name: Tomteblossets form
      description: Övergripande form/utformning av tomteblosset.
    speaker_cone_material:
      name: Högtalarkon – material
      description: Primärmaterial i högtalarkonen (woofer/mellanregisterkon).
    speaker_size:
      name: Högtalarstorlek
      description: Nominell elementstorlek/passningsstorlek för komponenthögtalaren
        (t.ex. 6,5 tum, 6x9 tum), används för att matcha fabrikshögtalare och högtalaradaptrar.
    special_effects_output_interface:
      name: Utgångsgränssnitt för specialeffekter
      description: Anger utgångsanslutningen/gränssnittet som används för att styra
        specialeffekter.
    special_effects_stand_stability_features:
      name: Stabilitetsfunktioner för specialeffektstativet
      description: Anger inbyggda stabilitets- och säkerhetsfunktioner avsedda att
        förhindra tippning eller glidning under evenemang.
    specialty_malt_name_type:
      name: Namn/typ av specialmalt
      description: Identifierar den specifika namngivna specialmalttypen (används
        ofta som kommersiellt stilnamn).
    specimen_presentation:
      name: Provpresentation
      description: Anger hur samlarobjektet är förberett eller presenterat (t.ex.
        rått/oberett, polerat, skuret eller monterat).
    speed_bag_accessories_included:
      name: Tillbehör för hastighetssäck ingår
      description: Listar ytterligare artiklar som medföljer hastighetssäcken, såsom
        handskar, luftpumpar, svivlar, kedjor eller stativ.
    speed_rating:
      name: Hastighetsklassificering
      description: Indikerar spelytans hastighet som biljardduken ger (t.ex. långsam,
        medel eller snabb).
    speedometer_backlight_type:
      name: Typ av bakgrundsbelysning för hastighetsmätare
      description: Anger om och hur hastighetsmätaren är bakgrundsbelyst för nattvisning.
    speedometer_display_type:
      name: Hastighetsmätarens displaytyp
      description: 'Anger hastighetsmätarens avläsningsstil: analog nål/ratta, digital
        numerisk avläsning eller en kombination av analoga och digitala element.'
    speedometer_unit_of_measure:
      name: Hastighetsmätarens måttenhet
      description: Anger hastighetsenheterna som visas på ratten/displayen.
    spike_replaceability:
      name: Utbytbarhet av spikar
      description: Anger om spikarna på skon är utbytbara, fasta eller om skon är
        spikfri.
    spike_shape:
      name: Spikens form
      description: Identifierar den geometriska stilen på spikspetsen, vilket påverkar
        grepp och lämplighet för olika spåraytor.
    spike_thread_size:
      name: Storlek på spikmönster
      description: Anger storleken eller standarden för gängbasen som skruvas in i
        skon (t.ex. 1/4-20).
    spin_classification:
      name: Klassificering för spinn
      description: Indikerar vilken spinnprofil diskusen är konstruerad för (låg,
        medel, hög, hyperspinn).
    spin_profile:
      name: Spinnprofil
      description: Anger de relativa spinnegenskaper som skaftet främjar.
    spin_types_supported:
      name: Spintyper som stöds
      description: Listar de typer av spinn som maskinen kan ge bollarna så att spelarna
        kan öva mot olika slagstilar.
    spinach_preparation_style:
      name: Sätt att tillaga spenat
      description: Beskriver den fysiska beredningen av spenatbladen eller produktformatet
        (t.ex. hela blad, hackade, tärningar).
    spinach_variety:
      name: Spenatsort
      description: Identifierar den botaniska eller marknadssorten av spenat (t.ex.
        baby, savoy, vatten, röd), vilket gör det möjligt för kunder att välja exakt
        den sort de vill ha.
    spindle_bearing_surface_material:
      name: Spindellagerytans material
      description: Materialet i spets-/lagerytan som används i stödspindlar (spets/botten),
        vilket påverkar jämnhet och slitage.
    spindle_bearing_type:
      name: Typ av spindellager
      description: Typ av gränssnitt mellan spindelspets/lager som minskar friktionen
        mot stödskålen.
    spindle_finish:
      name: Spindelfinish
      description: Ytbehandling/beläggning av spindeln som påverkar känsla, hållbarhet
        och estetik.
    spindle_hook_type:
      name: Spindelkroktyp
      description: Garnfångningsmekanismen högst upp på spindeln som används för att
        säkra ledaren/garnet.
    spindle_support_method:
      name: Spindelstödsmetod
      description: Hur spindeln är avsedd att stödjas under spinning.
    spindle_tip_style:
      name: Spindelspetsstil
      description: Form/utformning av spetsen som vilar i skålen/koppen (lagerytan),
        vilket påverkar friktion och rotationsjämnhet.
    spindle_whorl_position:
      name: Position för spindelskiva
      description: Där spinnkroken sitter på spindelaxeln.
    spinner_blade_shape:
      name: Spinnerbladets form
      description: Identifierar den primära bladformen som används på spinnern, vilket
        påverkar vibrationer, reflexblixt och löpdjup.
    spinner_control_card_design_type:
      name: Design/typ av styrkort för spinner
      description: Beskriver typen av spinner-kontrollkort i termer av hur det presenterar
        kontrollinformation (t.ex. förhållandereferens, spänningsreferens, omvandlingstabell).
    spinner_subtype:
      name: Underkategori för spinner
      description: Klassificerar den övergripande spinner-designen eller -familjen
        (t.ex. inline-spinner, spinnerbait).
    spinning_oil_application_area:
      name: Appliceringsområde för spinnrocksolja
      description: Anger den/de avsedda appliceringspunkten/-punkterna på en spinnrock
        för oljan.
    spinning_oil_application_tool:
      name: Verktyg för applicering av spinnolja
      description: Indikerar vilken typ av applikatorspets/förpackningsspets som används
        för att applicera olja på spinnrocksdelar för kontrollerad dosering.
    spinning_oil_features:
      name: Spinnrocksolja – egenskaper
      description: Framhäver funktionella egenskaper som är relevanta för spinnrocksoljor
        (rester, fläckar, oxidation och tvättbarhet).
    spinning_top_features:
      name: Egenskaper för snurra
      description: Speciella leksaksfunktioner som ingår i snurran utöver grundläggande
        snurrning.
    spinning_top_launch_mechanism:
      name: Utlösningsmekanism för snurra
      description: Hur leksakssnurran startas/framdrivs för snurrning.
    spinning_wheel_brake_tension_system_type:
      name: Typ av broms-/spänningssystem för spinnrock
      description: Anger det broms-/upptagningsspänningssystem som används för att
        styra garnupptaget.
    spinning_wheel_drive_system:
      name: Drivsystem för spinnhjul
      description: Indikerar vilket drivsystem spolen är avsedd för.
    spinning_wheel_hook_system:
      name: Spinnrockens kroksystem
      description: Anger hur garn styrs längs spinnrockens vingar.
    spinning_wheel_part_application:
      name: Spinnrocksdel – applicering
      description: Anger vilka spinnrockskomponenter oljan är avsedd för.
    spinning_wheel_portability_foldability:
      name: Bärbarhet/vikbarhet av spinnrock
      description: Anger om spinnrocken är konstruerad för att fällas ihop för transport.
    spinning_wheel_tension_adjustment_type:
      name: Justeringstyp för spinnrocksspänning
      description: Hur spänningen justeras på spinnrocken för upptagningskontroll.
    splice_termination_type:
      name: Skarv-/ändavslutningstyp
      description: Anger den ändavslutning som finns på ankarlinan (t.ex. skarvad
        ögla, kaus, kedjekrok).
    split_shot_cut_type:
      name: Skärttyp för fiskesänke (split shot)
      description: Anger det spår eller den öppningsstil som möjliggör anslutning
        till linan.
    split_shot_shape:
      name: Form på delat sänke
      description: Beskriver den fysiska formen på delade sänket, vilket påverkar
        hydrodynamik och motståndskraft mot fastkrokning.
    split_shot_size:
      name: Storlek på delat sänke (split shot)
      description: Standardiserad alfanumerisk storlekskod (t.ex. SSG, AAA, BB, 1)
        som används av tillverkare och sportfiskare för att klassificera delade sänken.
        Kompletterar exakta viktmätningar.
    spoiler_adjustability:
      name: Spoilerns justerbarhet
      description: Anger om spoilerns vinkel/höjd är justerbar.
    spoke_accessory_function:
      name: Ekertillbehör – egenskaper
      description: Klassificerar tillbehörets primära funktion på hjulet, såsom dekorativ,
        reflekterande eller belyst.
    spoke_butting_profile:
      name: Ekeravsmalningsprofil
      description: Beskriver hur ekerdiametern förändras längs dess längd (slät, enkel-,
        dubbel-, trippel- eller fyrstegsavsmalnad), vilket påverkar vikt och styrka.
    spoke_gauge:
      name: Ekermått
      description: Anger tjockleken (trådtjockleken) på ekrarna som ekerkoppen är
        kompatibel med.
    spoke_interface_type:
      name: Typ av gränssnitt för eker
      description: Indikerar vilken ekerhuvudstil navet är konstruerat för (J-böjning,
        rakt drag, T-huvud).
    spoke_shape:
      name: Ekerform
      description: Anger ekertrådens yttre tvärsnitt, vilket påverkar aerodynamik
        och estetik.
    spool_form_factor:
      name: Utformning av spole
      description: Spolkroppens fysiska utformning och hur tråden/garnet hålls på
        plats (t.ex. flänsad kontra konisk).
    spoon_style:
      name: Skedstil
      description: Indikerar skedens funktionella undertyp eller stil, såsom kastsked,
        fladdersked eller trollingkedja.
    sports_bra_padding_type:
      name: Sport-bh – vaddering
      description: Anger vilken typ av vaddering som finns i sport-bh:n.
    sports_cap_style:
      name: Sportkepsstil
      description: Identifierar den övergripande kepskonstruktionen/stilen (t.ex.
        basebollkeps, snapback), oberoende av lagets varumärke.
    sports_governing_body_certification:
      name: Certifiering av idrottsstyrande organ
      description: Indikerar officiella certifieringar eller godkännanden från erkända
        idrottsstyrande organ, som bekräftar att produkten uppfyller tävlingsstandarder.
    sports_surface_compatibility:
      name: Kompatibilitet med sportytor
      description: Listar de spel- eller yttyper som färgen säkert kan appliceras
        på.
    sports_toy_set_contents:
      name: Innehåll i sportleksakssetet
      description: Identifierar vilka komponenter som ingår i sportleksakssetet (t.ex.
        boll, klubba, nät, måltavlor).
    spray_string_cleanup_method:
      name: Rengöringsmetod för spraysträng
      description: Rekommenderat sätt att ta bort/rengöra rester från spraysträng.
    spray_string_finish_effect:
      name: Spraysträngens finish/effekt
      description: Visuell effekt av den sprayade strängen efter applicering (glans/reflektion
        och specialeffekter).
    spray_string_formulation_type:
      name: Typ av formulering för spraysträng
      description: Hur produkten beter sig under och efter sprayning (t.ex. tvättbar
        kontra permanent).
    spray_string_recommended_surface:
      name: Rekommenderad yta för spraysträng
      description: Ytor som spraysträngen är avsedd att användas på (och som den sannolikt
        går att rengöra från).
    spray_string_scent:
      name: Spraysträngens doft
      description: Doft- eller luktprofil, om någon, hos spraysträngen.
    spray_string_suitable_age_group:
      name: Lämplig åldersgrupp för spraysträng
      description: Rekommenderad lägsta användarålder/åldersgrupp för säker användning.
    spread_consistency:
      name: Bredbarhet
      description: Beskriver dippens eller påläggets konsistens för att sätta förväntningar
        på munkänsla och användning (t.ex. len, chunky, vispad).
    spread_variety:
      name: Påläggssort
      description: Klassificerar den specifika typen av fruktpålägg (t.ex. sylt, gelé,
        marmelad, fruktkräm) så att kunden kan skilja mellan olika tillagningsstilar
        och texturer.
    spreader_bar_type:
      name: Typ av spridarstång
      description: Anger vilken typ av spridarstång eller kroksystem som medföljer
        eller är kompatibelt med selen.
    sprint_canoe_class:
      name: Sprintkanotklass
      description: Anger den officiella sprintkanotklassbeteckningen.
    sprout_presentation:
      name: Presentation av groddar
      description: Identifierar produktens fysiska presentation (t.ex. färska groddar,
        mikrogrönt, levande odlingskruka, pulver).
    squash_and_gourd_variety:
      name: Squash- och kalebasssort
      description: Identifierar den specifika sorten eller marknadssorten av squashen
        eller kalebassen, vilket hjälper kunder att snabbt hitta önskad typ.
    stability_class:
      name: Stabilitetsklass
      description: Allmän stabilitetskategorisering härledd från flygegenskaper eller
        marknadsföringspåståenden.
    stabilizer_thread_size:
      name: Gängstorlek för stabilisator
      description: Trådspecifikation som används för att fästa en stabilisator eller
        ett tillbehör till en båge eller armborst.
    stabilizer_type:
      name: Stabilisatortyp
      description: Identifierar stilen eller positionsklassificeringen av stabilisatorn
        för båge eller armborst.
    stages_supported:
      name: Stadier som stöds
      description: Anger hur många stadier en raket eller byggsats är konstruerad
        för att flyga med.
    stain_remover_format:
      name: Fläckborttagningsproduktens form
      description: Anger produktens leveransform/format som används för att behandla
        fordonsfläckar (sprayflaska, aerosol, skum, gel, pulver, våtservetter, penna/stift).
    stake_shape:
      name: Tältpåle – form
      description: Definierar tvärsnittet eller designstilen för en tältpåle, vilket
        påverkar hållkraften i olika marktyper.
    stamp_block_features:
      name: Funktioner för stämpelblock
      description: Framhäver funktionella egenskaper hos stämpelblock, såsom mätrutnät,
        handtag eller halkfria ytor.
    stamp_block_type:
      name: Typ av stämpelblock
      description: Anger konstruktionen/stilen på det stämpelblock som används för
        att montera stämplar för stämpling (t.ex. genomskinligt akrylblock, trämonterat
        block eller positioneringsblock).
    stamp_set_pieces_included:
      name: Delar som ingår i stämpelset
      description: Anger vilka komponenter som ingår i stämpel- och stämpeldynasetet
        (t.ex. stämplar, stämpeldynor, pennor).
    stand_padding_material:
      name: Material för stativdämpning
      description: Material som används på kontaktpunkter för att skydda instrumentets
        ytbehandling (t.ex. skum, gummi, silikon).
    staple_fiber_animal_fiber_type:
      name: Typ av animalisk stapelfiber
      description: Specifik djurfiber-typ för animalisk stapelfiberskälla.
    staple_fiber_crimp_level:
      name: Krusningsnivå för stapelfiber
      description: Grad av naturlig krusning/vågighet i fibern.
    staple_fiber_preparation_type:
      name: Typ av beredning av stapelfibrer
      description: Fiberns berednings-/bearbetningstillstånd som den säljs (hur den
        är justerad/hanterad), vilket starkt påverkar spinningsmetoden, hur enkelt
        det är att dra och slutresultatet.
    staple_fiber_source_type:
      name: Typ av stapelfiberkälla
      description: Övergripande ursprungskategori för fiberinnehållet.
    starch_processing_type:
      name: Stärkelsebearbetningstyp
      description: Anger om stärkelsen är naturlig eller har modifierats fysiskt eller
        kemiskt (t.ex. snabb, förgelatiniserad) för att ge specifika funktionella
        egenskaper såsom förtjockningshastighet eller temperaturtolerans.
    starch_source:
      name: Stärkelsekälla
      description: Anger den botaniska källan från vilken matlagningsstärkelsen eller
        förtjockningsmedlet kommer (t.ex. majs, potatis, tapioka). Källa är den primära
        differentieringsfaktorn för matlagning av stärkelse och har direkt Impact
        på receptlämplighet, allergenöverväganden och konsumenternas sökbeteende.
    starfruit_variety:
      name: Stjärnfruktsort
      description: Identifierar den specifika sorten av stjärnfrukt (t.ex. Arkin,
        Fwang Tung).
    starter_drive_type:
      name: Typ av startdrivning
      description: Typ av startmotor/drivmekanism som används för att koppla in pinjongen
        i ringdrevet.
    starter_pistol_action_type:
      name: Startpistolens funktionstyp
      description: Identifierar avfyrnings-/verkningsmekanismen för startpistolen
        (t.ex. enkelverkande, dubbelverkande, halvautomatisk).
    starter_pistol_caliber:
      name: Startpistolens kaliber
      description: Anger vilken kaliber av lös ammunition eller patron som startpistolen
        är avsedd för.
    starter_terminal_type:
      name: Typ av startterminal
      description: Anger terminal/anslutningsstilen som används för elektrisk koppling
        på startmotorn eller startsolenoiden (t.ex. bult, spade, kontaktdon).
    starting_block_anchoring_method:
      name: Förankringsmetod för startblock
      description: Beskriver hur blocken fästs på spåraytan (t.ex. spikar, sugkoppar,
        gummikuddar).
    steerer_tube_design:
      name: Styrrörsdesign
      description: Beskriver styrrörets strukturella utformning – rak, konisk, gängad
        etc. – vilket avgör kompatibilitet mellan styrlager och ram.
    steering_cable_end_fitting_type:
      name: Typ av ändkoppling för styrvajer
      description: Identifierar ändavslutningen/fästningstypen vid ändarna av en vattenskoters
        styrvajer (rodrets ände och motor-/rorkultsände) för att säkerställa kompatibilitet
        med styrrodrets och motorns kopplingspunkter. Använd standard- eller tillverkarbeteckningen
        där så är tillämpligt.
    steering_column_adjustability_features:
      name: Funktioner för justerbarhet av rattstång
      description: Indikerar vilka justeringsfunktioner som är inbyggda i rattstången.
    steering_column_ignition_provision:
      name: Tändningsanordning för rattstång
      description: Anger om rattstången är konstruerad för att acceptera en tändningslåscylinder/-brytare
        och/eller rattlås.
    steering_column_shaft_end_interface_type:
      name: Typ av gränssnitt på styrpelarens axelände
      description: Identifierar gränssnittstypen mellan styrpelaren och axeln (t.ex.
        splines, dubbel D-formad, nyckelförsedd).
    steering_column_shift_type:
      name: Typ av växelmekanism på rattstång
      description: Anger om rattstången har en rattstångsmonterad växelmekanism och
        dess växellådstyp.
    steering_component_drive_type:
      name: Styrkomponentens drivtyp
      description: Anger driv-/hjälpmekanismen som är relevant för styrkomponenter
        (särskilt pumpar och elektriska styrservosystem).
    steering_position:
      name: Styrposition
      description: Anger om skåpbilen är vänsterstyrd eller högerstyrd.
    steering_pump_pulley_type:
      name: Typ av styrpumpsremskiva
      description: Anger den typ/gränssnitt för remskiva som används med styrpumpen.
    steering_rack_finish_coating:
      name: Ytbehandling/beläggning för styrväxel
      description: Anger den utvändiga ytbehandlingen/beläggningen för korrosionsskydd.
    steering_rack_position:
      name: Position för styrstång
      description: Anger var styrväxeln är monterad/används i fordonets styrsystem.
    steering_wheel_cover_installation_type:
      name: Typ av installation av rattskydd
      description: Hur rattskyddet är monterat/fästs på ratten.
    steering_wheel_grip_material:
      name: Material i rattgreppet
      description: Anger materialet på ratten/greppet (där händerna kommer i kontakt),
        vilket kan skilja sig från rattens kärna/ekrar.
    steering_wheel_mounting_pattern:
      name: Rattmonteringsmönster
      description: Anger det monteringsmönster för bultar/hål som används för att
        fästa ratten på ett nav eller en adapter (t.ex. 3-bults, 5-bults).
    steering_wheel_rim_material_grip_surface:
      name: Rattkransens material (greppyta)
      description: Anger det primära greppet/rattkransbeläggningsmaterialet (skiljer
        sig från det övergripande konstruktionsmaterialet).
    stem_material:
      name: Stammaterial
      description: Anger det material som specifikt används för pipans skaft eller
        munstycke (t.ex. akryl, ebonit, lucit).
    stencil_machine_consumable_type:
      name: Typ av förbrukningsvara till stencilmaskin
      description: Anger de förbrukningsvaror som krävs för drift (om några).
    step_surface_texture:
      name: Struktur för stegyta
      description: Anger stegytans design/material som är avsett att förbättra grepp
        och komfort i vått tillstånd.
    stepper_motion_type:
      name: Typ av rörelsemönster för stepper
      description: Definierar det primära stegmönster som erbjuds av maskinen.
    stick_bow_profile:
      name: Profil för stickbåge
      description: Anger krökningsprofilen (eller "bågtypen") för landhockeyklubbans
        skaft, en kritisk faktor som påverkar bollkontroll, dragflickprestanda och
        spelstil.
    stick_construction:
      name: Konstruktion av pinne
      description: Anger konstruktionsstilen för hockeyklubban, till exempel komposit
        i ett stycke, komposit i två delar eller trä.
    stick_curvature_type:
      name: Typ av klubbkrökning
      description: Beskriver kastklubbans krökningsprofil, vilket påverkar kastlängd
        och precision.
    stick_head_shape:
      name: Klubbhuvudets form
      description: Definierar formen på klubbhuvudet, vilket påverkar bollfångst,
        slagstil och närkontroll av bollen.
    stick_size_compatibility:
      name: Kompatibilitet med pinnstorlek
      description: Identifierar den grupp av hockeyklubbor som produkten är kompatibel
        med (t.ex. Ungdom, Junior, Medel, Senior, Målvakt, Universal).
    sticker_decal_features:
      name: Funktioner för klistermärken/dekaler
      description: Fångar applicerings- och prestandaegenskaper specifika för klistermärken/dekaler
        (t.ex. bubbelfria, omplaceringsbara).
    sticker_finish:
      name: Ytfinish för klistermärke
      description: Beskriver klistermärkenas ytfinish/visuella effekt.
    sticker_format:
      name: Klistermärkesformat
      description: Anger detaljhandelsformatet för de dekorativa klistermärkena (t.ex.
        ark, rulle, individuellt, bok).
    sticker_material_type:
      name: Materialtyp för klistermärken
      description: Anger det primära underlaget/materialet för den dekorativa klistermärket
        (inte utsmyckningarna).
    stilt_foot_attachment_type:
      name: Fäste för styltafot
      description: Anger hur användarens fot fästs på styltan (t.ex. spänne, kardborreband,
        snörning).
    stirrup_style:
      name: Typ av stigbygel
      description: Klassificerar den design- eller disciplinspecifika stilen för stigbyglar,
        omfattande säkerhets-, disciplin- och konstruktionsvariationer.
    stirrup_tread_material:
      name: Stigbygelns slitbanematerial
      description: Anger materialet som används till stigbygelns fotplatta eller slitbana,
        vilket påverkar grepp, komfort och slitage.
    stitch_marker_and_counter_style:
      name: Stygnmarkörs- och räknarstil
      description: Anger stilen eller utformningen för en stygnmarkör eller stygn-/varvräknare
        (t.ex. låsmarkör, delad ringmarkör, ringräknare, digital räknare).
    stitch_types:
      name: Stygntyper
      description: Typer av sömmar (funktionella och dekorativa) som maskinen kan
        producera.
    stitching_method:
      name: Sömnadsmetod
      description: Indikerar hur kulpanelerna är sammanfogade.
    stitching_state:
      name: Sömnadsgrad
      description: Anger om plaggdelarna levereras osydda, halvsydda, sydda eller
        färdiga att bäras.
    stock_car_race_series:
      name: Stock car-tävlingsserie
      description: Anger det godkännandeorgan eller den tävlingsserie/klass som stockbilen
        är byggd för att tävla i.
    stone_adhesion:
      name: Kärna – vidhäftningstyp
      description: Indikerar om persiko- eller nektarinkärnan är fristående, fastsittande
        eller halvt fastsittande.
    stone_creation_method:
      name: Metod för framställning av sten
      description: Anger om stenen är naturlig, labbskapad, simulerad eller återvunnen.
    stone_cut_grade:
      name: Slipningskvalitet
      description: Indikerar den övergripande bedömningen av ädelstenens slipningskvalitet.
    stone_cut_style:
      name: Typ av stenslipning
      description: Slipning/fasetteringsstil på glasstenen (t.ex. fasetterad vs cabochon).
    stone_fruit_cultivar:
      name: Stenfruktskultivar
      description: Identifierar den specifika kultivar/sorten av persikan eller nektarinen.
    stone_fruit_variety:
      name: Stenfruktsort
      description: Skiljer mellan undertyp inom kategorin (t.ex. persika, nektarin,
        donut/platt persika).
    stone_setting_type:
      name: Steninstallationer av typ
      description: Anger hur en sten är fäst i stycket (bezel, prong, pavé, etc.).
    stone_transparency:
      name: Stentransparens
      description: Optisk transparens/opacitet hos glasstenen.
    storage_case_type:
      name: Lagringstyp
      description: Anger vilken typ av låda som setet levereras i för förvaring och
        transport (t.ex. låda, låda, påse).
    storage_compartment_type:
      name: Förvaringsfacktyp
      description: Anger vilken typ av förvaringsfack som simbojen tillhandahåller
        för personliga tillhörigheter.
    storage_media_and_transfer_methods_supported:
      name: Lagringsmedia och överföringsmetoder som stöds
      description: Media eller anslutningsmetoder som stöds för att importera/exportera
        prover och spara/ladda projekt.
    storage_requirements:
      name: Förvaringskrav
      description: Anger hur produkten ska förvaras före och/eller efter öppning för
        att bibehålla kvalitet och säkerhet.
    stove_jack_compatibility:
      name: Kompatibilitet med kaminrörsöppning
      description: Anger om tältet har en brandsäker öppning för ett kaminrör.
    straight_pin_application:
      name: Raknål – applicering
      description: Anger avsedd användning för raknålar.
    straight_pin_finish:
      name: Raknålens ytfinish
      description: Beskriver ytfinishen eller beläggningen på raknålen (t.ex. förnicklad)
        som påverkar korrosionsbeständighet och glidning.
    straight_pin_head_material:
      name: Material för raknålshuvud
      description: Anger materialet i raknålshuvudet (om sådant finns), såsom plast
        eller glas.
    straight_pin_head_shape:
      name: Raknålshuvudets form
      description: Beskriver formen/stilen på raknålshuvudet för användbarhet och
        synlighet.
    strand_configuration:
      name: Remkonstruktion
      description: Anger hur många separata rader eller trådar som utgör plånbokskedjan
        (enkel, dubbel, trippel).
    strand_material:
      name: Strandmaterial
      description: Anger materialet som används för de enskilda trådarna/banden.
    strap_attachment_hardware:
      name: 'Utformning av sträng '
      description: Anger typen/utformningen av beslagen som används för att fästa
        remmen vid instrumentet eller fästpunkten.
    strap_configuration:
      name: Remkonstruktion
      description: Anger antalet hjälmfästen på remmen (t.ex. 2-punktsrem, 4-punktsrem),
        vilket är avgörande för passform, säkerhet och ligans krav.
    strap_functionality:
      name: Remfunktion
      description: Anger den primära avsedda användningen eller utformningen av yogamattans
        rem.
    strap_padding:
      name: Vaddering för rem
      description: Indikerar graden av vaddering i remmen som är avsedd att förbättra
        komforten och fördela vikten.
    strap_side:
      name: Remsida
      description: Anger om remmen är avsedd för vänster bindning, höger bindning
        eller säljs som ett par.
    strap_width:
      name: Rembredd
      description: Indikerar axelremmarnas relativa bredd (tunna, medelbreda, breda)
        för att vägleda kunder som söker specifikt skydd eller stöd.
    strength_classification:
      name: Beslag för remfäste
      description: Marknadsföringsetikett för styrka som ofta används av varumärken
        (t.ex. Light, Strong, Extra Strong).
    strength_grade:
      name: Styrkeklass
      description: Beskriver den avsedda hållstyrkan/belastningsnivån för kardborrbandet.
    stretch_level:
      name: Töjbarhetsnivå
      description: Anger hur mycket textilien töjs ut vid användning.
    stretch_type:
      name: Töjbarhetstyp
      description: Anger om tyget har mekanisk eller elastisk töjbarhet och i vilken/vilka
        riktning(ar).
    stretcher_bar_material:
      name: Material för bårstång
      description: Material som används till bårstängerna/ramen (t.ex. tall, gran,
        poppel, björk, MDF/konstruerat trä).
    strike_shield_shape:
      name: Slagskyddets form
      description: Anger den övergripande formen på slagskyddets träffyta.
    string_core_shape:
      name: Strängkärnans form
      description: Anger kärntrådens Shapes som används i lindad sträng, vilket påverkar
        känsla och stabilitet.
    string_coverage:
      name: sträng täckning
      description: Anger kärntrådens form som används i lindade strängar, vilket påverkar
        känsla och stabilitet.
    string_end_type:
      name: Sträng – ändtyp
      description: Anger hur strängen avslutas vid stall/stränghållare för kompatibilitet
        (särskilt viktigt för akustiska/elektriska och viss bas).
    string_set_type:
      name: Typ av strängset
      description: Anger om produkten är en komplett uppsättning eller individuella
        ersättningssträngar.
    strung_status:
      name: Strängstatus
      description: Anger om lacrossehuvudet levereras färdigsträngat med en ficka
        eller säljs osträngt.
    strut_placement:
      name: Placering av stag
      description: Anger den avsedda monteringspositionen på fordonet (fram/bak och
        vänster/höger) för fjäderbenet.
    stud_attachment_type:
      name: Typ av fäste för dubb
      description: Anger hur dobbarna/klossarna är fästa eller konfigurerade på yttersulan,
        vilket påverkar grepp, underhåll och efterlevnad av ligans regler.
    stud_configuration:
      name: Utformning av dubb
      description: Definierar formen och placeringen av dubbar/klossar på yttersulan,
        vilket påverkar grepp och prestation på olika underlag.
    stud_material:
      name: Material för dubb
      description: Identifierar det primära materialet i dubbarna/klossarna, vilket
        ger information om hållbarhet, vikt och efterlevnad av säkerhetsföreskrifter.
    stuffed_animal_features:
      name: Gosedjur – egenskaper
      description: Framhäver gosedjurets inbyggda lek- och komfortegenskaper.
    stump_base_type:
      name: Typ av stumpbas
      description: Definierar stilen på basen eller monteringssystemet som cricketstumpen
        använder (spik, fjäderretur, viktad gummi, etc.).
    stump_mechanism:
      name: Stumpmekanism
      description: Anger retur- eller monteringsmekanismen för cricketstumpar (t.ex.
        återfjädrande, fast).
    stump_size:
      name: Stumpstorlek
      description: Kategorisk storleksbeteckning som används för cricketstumpar och
        indikerar typisk längd och lämplig spelaråldersgrupp.
    subwoofer_installation_type:
      name: Subwooferinstallationstyp
      description: Hur subwoofern är avsedd att installeras i ett fordons ljudsystem.
    sugar_cane_variety:
      name: Sockerrörssort
      description: Identifierar den specifika sorten eller marknadssorten av sockerrör,
        som kan påverka färg, sötma och fiberinnehåll.
    sugar_content_level:
      name: Sockernivå
      description: Klassificerar den totala sockernivån eller formuleringen av dryckeskoncentratet,
        vilket gör det möjligt för kunder att snabbt hitta vanliga, reducerade eller
        sockerfria alternativ.
    sugar_refinement_level:
      name: Socker – raffineringsgrad
      description: Anger raffineringsgrad eller -stil (färg, melassinnehåll eller
        bearbetningsnivå).
    sugar_source:
      name: Usrsprung för socker
      description: Identifierar det botaniska eller materialmässiga ursprunget från
        vilket sockret härrör.
    suit_fit:
      name: Kostymens passform
      description: Dräktens övergripande skärning, som indikerar hur tätt den sitter
        mot kroppen.
    suit_pieces:
      name: Kostymdelar
      description: Anger hur många matchande plagg som ingår i kostymsetet (t.ex.
        2-delat, 3-delat, 4-delat).
    suitable_for_anchoring_use:
      name: Lämplig för förankringsändamål
      description: Indikerar den avsedda förankringsrelaterade användningen för linan/repet.
    suitable_for_craft_type:
      name: Lämplig för typ av hantverk
      description: Primärt användningsområde för blockeringsvajern inom nålarbete.
    suitable_for_paint_type:
      name: Lämplig för typ av färg
      description: Anger vilka färgtyper duken är avsedd/säker att användas med.
    suitable_for_swim_stroke:
      name: Lämplig för simtag
      description: Anger vilket/vilka simtag handpaddeln är utformad eller optimerad
        för.
    suitable_mounting_surface_material:
      name: Lämpligt material för monteringsyta
      description: Anger den avsedda monteringsytan/materialet som den självhäftande
        baksidan är avsedd att fästa vid.
    suitable_play_location:
      name: Lämplig lekmiljö
      description: Primär avsedd(a) lekmiljö(er) för sand- och vattenkvarnleksaken.
    suitable_riding_conditions:
      name: Lämpliga ridförhållanden
      description: Indikerar körförhållandena (t.ex. torrt, vått, vinter) som ett
        cykelsmörjmedel eller rengöringsmedel är framtaget för.
    suitable_snow_conditions:
      name: Lämpliga snöförhållanden
      description: Indikerar det/de primära snöförhållanden som fästvaxet är formulerat
        för.
    suitable_surface_type:
      name: Lämplig yttyp
      description: Anger de gångytor som greppet är utformat för.
    suitable_table_size:
      name: Lämplig bordsstorlek
      description: Anger längden/längderna på biljard-/snookerbordet som lampan är
        avsedd att lysa upp.
    sun_protection_rating_upf:
      name: Solskyddsklassificering (UPF)
      description: Ger plaggets certifierade UPF-solskyddsnivå.
    sun_shade_attachment_method:
      name: Metod för montering av solskydd
      description: Hur solskyddet är fäst vid fönstret/vindrutan.
    sun_shade_style:
      name: Solskyddsstil
      description: Produktens konstruktion/format för att fälla ut och förvara solskyddet.
    sunchoke_variety:
      name: Jordärtskockssort
      description: Anger den specifika sorten av jordärtskocka, vilket ger detaljerad
        information för trädgårdsmästare, kockar och kräsna kunder.
    sunflower_oil_variety:
      name: Solrosoljesort
      description: Klassificerar fettsyraprofilen eller sorten för solrosoljan (t.ex.
        högoleisk, medeloleisk, linoleisk).
    sunflower_variety:
      name: Solrossort
      description: Sort av solros (vanliga marknadssorter för snittblommor).
    support_brace_features:
      name: Funktioner för handledsstöd
      description: Listar utmärkande funktionella egenskaper hos handledsstödet, såsom
        andningsbart tyg, avtagbar skena eller justerbar metallplatta.
    support_leg_count:
      name: Antal stödben
      description: Antal ben som har markkontakt när skjutkäppen används (t.ex. enbensstativ,
        tvåbensstativ, stativ).
    support_padding:
      name: Stödvaddering
      description: Anger om remmen/stödet inkluderar integrerad vaddering vid kontaktpunkter
        (nacke/axel/tumme).
    support_structure_type:
      name: typ av stödstruktur
      description: Anger den konstruktionsmetod som används för att hålla vindskyddet
        upprätt.
    supported_bowling_delivery_types:
      name: Typer av bowlingkast som stöds
      description: Anger de cricketbowlingvariationer som maskinen kan simulera, såsom
        inswing, outswing och spin-typer.
    supported_dive_modes:
      name: Dykningar som stöds eller Dykarläge
      description: Anger vilka driftlägen dykdatorn stöder, till exempel luft, nitrox
        eller mätarläge.
    supported_equipment_type:
      name: Typ av utrustning som stöds
      description: Identifierar den vintersportutrustning som stället är avsett att
        hålla (t.ex. skidor, snowboards, skidstavar).
    supported_spin_types:
      name: Stödda spinntyper
      description: Anger de variationer i bollens snurr som kastaren kan tillämpa.
    supported_spool_bobbin_types:
      name: Stödda spoltyper
      description: Anger vilka spolformat den elektriska lindningsmaskinen är utformad
        för att acceptera.
    surf_wax_temperature_rating:
      name: Temperaturklassificering för surfvax
      description: Anger det vattentemperaturområde som vaxet är formulerat för, vilket
        säkerställer optimalt grepp i olika klimat.
    surface_coating_or_finish:
      name: Ytbeläggning eller ytfinish
      description: Anger all skyddande eller prestationsförbättrande ytbehandling
        som applicerats på tången.
    surface_coating_or_wrap:
      name: Ytbeläggning eller omslag
      description: Den yttre ytan som används för grepp/kontroll på mittklubban (och
        ibland handklubbor).
    surface_finish:
      name: Ytbehandling
      description: Beskriver känslan/texturen på bollytan som påverkar grepp och rörelse
        under kontaktjonglering.
    surface_finish_prep:
      name: Ytbehandling/förberedelse
      description: Indikerar friktionsytans skick (t.ex. ombearbetad, maskinbearbetad,
        gjuten) vid försäljning.
    surface_types_included:
      name: Inkluderade yttyper
      description: Anger vilken yta satsen inkluderar för teckning/målning (om någon),
        såsom duk, pappersblock, träpaneler eller ingen.
    surfboard_construction:
      name: Konstruktion för surfbräda
      description: Anger surfbrädans primära konstruktionsteknik eller laminateknik.
    surfboard_tail_shape:
      name: Surfbräda – bakändens form
      description: Definierar konturerna av brädans bakände, vilket påverkar manövrerbarhet
        och grepp.
    suspension_bushing_type:
      name: Typ av upphängningsbussning
      description: Anger funktions-/installationsstilen för upphängningsbussningen.
    suspension_configuration:
      name: Fjädringskonfiguration
      description: Beskriver om trehjulingen har fjädring och var den är placerad.
    suspension_material:
      name: Upphängningsmaterial
      description: Anger materialet i kedjor, rep eller vajrar som används för att
        hänga upp gungan.
    suspension_trainer_accessories_included:
      name: Tillbehör för upphängningstränare ingår
      description: Listar ytterligare artiklar som medföljer träningssatsen (t.ex.
        dörrankare, förlängningsrem, förvaringsväska), vilket hjälper kunder att förstå
        vad som finns i lådan och jämföra paketets värde.
    suspension_trainer_anchor_type:
      name: Typ av förankring för suspension trainer
      description: Definierar monteringsstilen eller förankringspunkten som remmarna
        är utformade för (t.ex. dörr, tak, träd), vilket ger information om kompatibilitet
        med användarens miljö.
    suspension_type:
      name: Typ av fjädring
      description: Anger om gaffeln är styv eller använder ett visst fjädringssystem
        (luft, spiral, hybrid, elastomer, etc.), vilket hjälper cyklister att anpassa
        gaffeln till sin körstil.
    sustain_pedal_form_factor:
      name: Utformning av sustainpedal
      description: Beskriver den fysiska stilen på en sustainpedal (t.ex. fotpedal
        i pianostil kontra kompakt fotpedal), vilken Impact och avsedd användning
        som helst.
    sustain_pedal_switch_type:
      name: Typ av sustainpedalbrytare
      description: Anger om pedalen skickar en momentan (uthållande signal medan den
        trycks ned) eller en låsande (växlande) signal.
    sustainability_certification:
      name: Hållbarhetscertifiering
      description: Miljö- eller inköpscertifiering för trämaterialet.
    swab_intended_bassoon_section:
      name: Rengöringsduk avsedd fagottsektion
      description: Identifierar vilken del av en fagott som rengöringsduken är avsedd
        att rengöra (olika hål/delar kräver olika former och storlekar).
    swab_style:
      name: Typ av rengöringsduk
      description: Beskriver den fysiska utformningen/formatet på den rengöringsduk
        som används för att passera genom eller nå områden på saxofonen.
    swab_weight_material:
      name: Material för rengöringsdukens vikt
      description: Materialet i dragvikten/draglinan (om sådan finns), vilket påverkar
        risken för repor och hållbarhet.
    swab_weight_style:
      name: Modell av topsvikt
      description: Anger hur rengöringsduken viktas för att passera genom fagotthålet.
    sway_bar_adjustability:
      name: Justerbarhet för krängningshämmare
      description: Huruvida och hur krängningshämmarens styvhet är justerbar (vanligtvis
        via flera monteringshål i ändlänkarna).
    sway_bar_coating:
      name: Beläggning för krängningshämmare
      description: Ytbehandling eller beläggning på krängningshämmaren för korrosionsbeständighet
        och utseende.
    sway_bar_fitment_front_rear_kit:
      name: Krängningshämmarmontering (fram/bak/sats)
      description: Anger om krängningshämmaren är avsedd för framaxeln, bakaxeln eller
        säljs som en fram- och baksats.
    sweatshirt_pocket_type:
      name: Ficktyp för tröja
      description: Beskriver stilen på fickorna på tröjan.
    sweet_potato_variety:
      name: Sötpotatissort
      description: Identifierar den specifika sorten eller marknadssorten av sötpotatisen.
    sweet_spot_position:
      name: Träffpunktens läge
      description: Identifierar var slagträets träffpunkt är belägen längs bladet,
        vilket påverkar spelstil och slagförhållanden.
    sweetener_presence:
      name: Närvaro av sötningsmedel
      description: Anger om tillsatta sötningsmedel finns i nötsmöret och i vilken
        mängd.
    sweetening_type:
      name: Sötningstyp
      description: Beskriver hur produkten sötas eller dess söthetsnivå.
    swim_armband_construction_type:
      name: Konstruktionstyp för simarmband
      description: Definierar armbandens strukturella stil eller flytmekanism (uppblåsbara
        vs. fast skum, hybrid, etc.).
    swim_belt_purpose:
      name: Syfte med simbältet
      description: Funktionell klassificering av simbältet (t.ex. flythjälp, vattenjogging,
        styrketräning, statisk lina, fallskärmsfäste, viktballast, vadningsskydd).
    swim_board_features:
      name: Egenskaper för simbräda
      description: Framhäver speciella egenskaper eller förbättringar av simbrädan
        som förbättrar användbarhet eller säkerhet.
    swim_bottom_length:
      name: Badbyxlängd
      description: Klassificerar den totala bentäckningen hos simboxers (t.ex. korta
        modeller kontra knälånga).
    swim_buoy_features:
      name: Funktioner för simbojen
      description: Listar ytterligare utmärkande egenskaper eller tillägg som förbättrar
        en simbojs synlighet, säkerhet eller användbarhet.
    swim_cap_style:
      name: Badmössans stil
      description: Definierar konstruktionen eller designstilen på badmössan (t.ex.
        långhårsmössa, kupol/racingmössa, bubbelmössa/turban).
    swim_diaper_feature:
      name: Egenskaper för simblöja
      description: Anger om badbyxan har en integrerad läckagesäker blöjfunktion eller
        kräver/utelämnar en separat badblöja.
    swim_trainer_features:
      name: Simträningsutrustning – egenskaper
      description: Framhäver ytterligare funktionella eller komfortegenskaper hos
        simtränaren.
    swim_trainer_type:
      name: Typ av simredskap
      description: Definierar simtränarens strukturella stil eller format för att
        underlätta filtrering efter design och träningssyfte.
    swim_training_focus:
      name: Simträning – fokusområde
      description: Identifierar det primära träningsmålet som paddeln siktar på (t.ex.
        teknik, styrka, muskelisolering).
    swim_weight_style:
      name: Modell av simvikt
      description: Klassificerar simviktens utformning, vilket hjälper kunden att
        skilja mellan fundamentalt olika produkttyper samtidigt som de förblir inom
        samma kategori.
    swimbait_buoyancy:
      name: Swimbait flytkraft
      description: Indikerar hur swimbaiten beter sig i vattenpelaren (flytande, hängande,
        sjunkande, etc.), vilket gör det möjligt för sportfiskare att välja rätt bete
        för sitt måldjup och fiskestil.
    swimbait_style:
      name: Swimbait-stil
      description: Klassificerar konstruktionen eller aktionsdesignen hos swimbaiten,
        till exempel paddle-tail eller glidebete.
    swimwear_pieces_included:
      name: Delar som ingår i baddräkt
      description: Listar de plaggkomponenter som ingår i burkinisetet så att kunderna
        vet exakt vad de får (t.ex. topp, leggings, hijab/huvudkåpa).
    swimwear_set_pieces_included:
      name: Delar som ingår i baddräktset
      description: Listar de plaggkomponenter som ingår i burkinisetet så att kunderna
        vet exakt vad de får (t.ex. topp, leggings, hijab/keps).
    swing_attachment_connection_type:
      name: Gungfäste/kopplingstyp
      description: Klassificerar svingtränarens stil eller mekanism så att kunden
        snabbt kan hitta produkter som matchar deras träningsmål.
    swing_trainer_type:
      name: Typ av svingträningsredskap
      description: Klassificerar svingtränarens stil eller mekanism så att kunden
        snabbt kan hitta enheter som matchar deras träningsmål.
    swing_training_objective:
      name: Mål med svingträning
      description: Klassificerar svingtränarens primära träningsfokus, mekanism eller
        mål (t.ex. tempo, hastighet, grepp).
    switch_electrical_positions:
      name: Brytarens elektriska lägen
      description: Anger antalet och funktionen för elektriska lägen på brytaren (t.ex.
        3-läges, momentant på).
    swivel_type:
      name: Sviveltyp
      description: Anger den svivelkonfiguration som används för att minska trassel
        i kopplet.
    sword_scabbard_material:
      name: Material till svärdslida
      description: Anger huvudmaterial för medföljande slida/balja (om sådan finns).
    synthesizer_form_factor:
      name: Synthesizer – utformning
      description: Beskriver synthesizerns fysiska gränssnitt och spelupplägg.
    synthetic_feather_style:
      name: Syntetisk fjäderstil
      description: Stil/snitt på den syntetiska fjädern som används för olika utseenden
        och hantverkstekniker.
    synthetic_formulation_type:
      name: Syntetisk sammansättningstyp
      description: Anger den syntetiska basoljan/sammansättningstypen (t.ex. PAO,
        ester, hydrokrackad grupp III).
    syrup_base_ingredient:
      name: Bas-ingrediens för sirap
      description: Identifierar den primära växten eller sockerkällan från vilken
        sirapen eller nektaren härrör (t.ex. lönn, agave, rörsocker).
    syrup_variety:
      name: Sirapsort
      description: Definierar den allmänna stilen eller kategorin av sirap baserat
        på dess formulering eller traditionella användning (t.ex. lönnsirap, kaffesmak,
        fruktsirap, medicinsk sirap).
    t_shirt_fit:
      name: T-shirt – passform
      description: Beskriver den avsedda övergripande passformen/snittet för t-shirten.
    tabla_included_components:
      name: Tabla – inkluderade komponenter
      description: Anger vilka viktiga artiklar som ingår i tabla-produktlistan (singeltrumma
        vs. trumset, överdrag/fodral, stämhammare etc.).
    tabla_set_pieces_included:
      name: Delar som ingår i tablaset
      description: Anger vilka komponenter som ingår i tabla-setet (t.ex. dayan, bayan,
        ringar, överdrag, stämverktyg, väska).
    tabla_tonal_pitch_range_bayan:
      name: Tabla ton-/tonhöjdsområde (bayan)
      description: Beskriver den typiska tonhöjds-/tonomfångskategorin för bayantrummor
        (bas) baserat på storlek och konstruktion.
    table_base_material:
      name: Material för bordsunderrede
      description: Identifierar det primära materialet i bordets bas eller piedestal
        (till skillnad från ben eller bordsskiva), vilket underlättar materialspecifik
        filtrering.
    table_base_type:
      name: Typ av bordsbas
      description: Identifierar den strukturella konstruktion som bär bordsskivan
        (t.ex. piedestal, bock, X-sockel).
    table_coverage_position:
      name: Skyddets placering på bordet
      description: 'Anger vilken/vilka pingisbordspositioner skyddet är utformat för
        att passa: hopfällt, spelande eller båda.'
    table_hockey_part_type:
      name: Typ av del för bordshockey
      description: Identifierar den specifika komponenttypen inom bords-/luft-/stav-/bubbelhockeysystem.
    table_leg_design:
      name: Bordsbensdesign
      description: Identifierar benets strukturella stil eller geometri, vilket gör
        det möjligt för kunden att matcha specifika estetiska och stödjande behov.
    table_size:
      name: Bordstorlek
      description: Kommersiellt angivna totala biljardbordsstorlekar (i fot), vilket
        gör det möjligt för kunder att snabbt välja vanliga alternativ som 7-fots
        barbord eller 9-fots turneringsbord.
    table_size_category:
      name: Bordsstorlekskategori
      description: Kategoriserar bordsfotbollsbordet efter total yta för att hjälpa
        kunder att matcha tillgängligt utrymme utan att beräkna mått.
    table_tennis_certification:
      name: Bordtenniscertifiering
      description: Listar officiella standarder eller godkännanden från styrande organ
        som produkten uppfyller (t.ex. ITTF, EN 14468-2 klasser).
    tabletop_tilt_function:
      name: Lutningsfunktion för bordsskiva
      description: Anger om bordsskivan kan lutas, vändas eller vridas i olika vinklar.
    tackle_components_included:
      name: Komponenter som medföljer tackel
      description: Listar de specifika komponenterna för fiskeutrustning som ingår
        i satsen så att kunden vet exakt vad som medföljer.
    talking_drum_accessories_included:
      name: Tillbehör för talande trummor ingår
      description: Listar de tillbehör som medföljer taltrumman (i lådan).
    talking_drum_cord_material:
      name: Material till talande trummans rep
      description: Material som används till spännsnören/rep som förbinder trumskinnarna.
    talking_drum_tuning_mechanism:
      name: Talande trumstämningsmekanism
      description: Hur trummans tonhöjd ändras/spänning appliceras under spelning
        (eller vid uppsättning).
    tam_tam_construction_style:
      name: Konstruktion/slagteknik för tam-tam.
      description: Konstruktion/hamrande stil för tam-tam.
    tam_tam_items_included:
      name: Tam-tam – medföljande tillbehör
      description: Tillbehör som medföljer tam-tam (t.ex. klubba, stativ, skydd).
    tamarillo_variety:
      name: Tamarillosort
      description: Identifierar den specifika sorten eller färgvarianten av tamarillofrukten.
    tamarind_variety:
      name: Tamarindsort
      description: Anger den botaniska eller kommersiella sorten av tamarind, vilket
        kan påverka smak, konsistens och kulinarisk användning.
    tambourine_frame_style:
      name: Tamburin – typ av ram
      description: Beskriver den fysiska handhållna ramen som används för att hålla/spela
        tamburinen.
    tambourine_head_material:
      name: Material för tamburinens skinn
      description: Anger materialet i slagskinnet (membranet) på tamburiner med skinn.
    tambourine_jingle_configuration:
      name: Tamburinens bjällerkonfiguration
      description: Hur bjällrorna är arrangerade eller konstruerade på tamburinen.
    tambourine_jingle_material:
      name: Material för tamburinens bjällror
      description: Anger materialet i tamburinens bjällror (metallskivorna), vilket
        påverkar ton och hållbarhet.
    tambourine_mounting_type:
      name: Monteringstyp för tamburin
      description: Hur tamburinen är avsedd att hållas eller monteras under spel.
    tambourine_tuning_mechanism:
      name: Tamburinstämningsmekanism
      description: Anger det stämningssystem som används på stämningsbara handhållna
        tamburiner (om tillämpligt).
    tank_model_scale:
      name: Tankmodell skala
      description: Anger skalaförhållandet för tankens skalamodell (t.ex. 1:35, 1:72).
    tank_top_back_style:
      name: Linne – ryggdesign
      description: Anger formen eller snittet på linnets baksida, vilket påverkar
        stöd, rörlighet och estetik.
    tape_application_area:
      name: Appliceringsområde för tejp
      description: Anger den del av utrustningen eller spelaren där bandet är avsett
        att appliceras, vilket hjälper kunden att välja rätt stil.
    tape_finish:
      name: Tejpfinish
      description: Yta/visuell finish (glans eller textur) på tejpen.
    tape_purpose:
      name: Tejpens ändamål
      description: Anger tejpens primära funktionella användning inom racketunderhåll
        eller anpassning.
    tape_type:
      name: Tejptyp
      description: Klassificerar den funktionella stilen eller konstruktionen av hockeytejpen,
        såsom tyg, genomskinlig polyeten, grepptejp, självhäftande stretchtejp, benskydd
        eller sämskskinn.
    tapenade_main_ingredients:
      name: Tapenadens huvudingredienser
      description: Anger den primära basingrediensen som definierar tapenaden (oliv,
        tomat, aubergine, paprika, etc.), användbar för kunder med ingrediensbaserade
        preferenser eller begränsningar.
    tapestry_loom_loom_format:
      name: Gobelängvävstolens format
      description: Övergripande utformning/stativstil för gobelänghandvävstolen.
    tapestry_loom_shedding_method:
      name: Metod för att öppna varptrådarna
      description: Hur vävstolen skapar ett skäl (separerar varptrådarna) för att
        föra igenom inslaget.
    tapestry_loom_tensioning_system:
      name: Spännsystem för vävstol
      description: Metoden som används för att spänna och fästa varpen på vävstolen.
    tar_head_material:
      name: Material för tjärhuvud
      description: Identifierar materialet i tar-trumskinnet (membranet), vilket starkt
        påverkar känsla, hållbarhet och ton.
    tar_playing_style:
      name: Tar-spelstil
      description: Anger den primära spelpositionen/tekniken som tar-instrumentet
        är avsedd för.
    tar_tuning_system:
      name: Tar-stämningssystem
      description: Anger hur tar-instrumentet stäms (hur skinnspänningen justeras).
    target_components:
      name: Delar som ingår för mål
      description: Anger vilka bränsle-/luftintagskomponenter produkten är avsedd
        att rengöra.
    target_relative_humidity_rh:
      name: Målvärde för relativ luftfuktighet (RH)
      description: Den avsedda relativa luftfuktigheten som produkten är utformad
        för att upprätthålla inuti instrument-/lådamiljön.
    target_resetting_mechanism:
      name: Mekanism för återställning av mål
      description: Beskriver hur, eller om, ett mål återgår till sin ursprungliga
        position efter att ha träffats.
    target_trainer_type:
      name: Typ av målträningsredskap
      description: Klassificerar den övergripande stilen eller formatet för racquetball-
        eller squashmåltränaren.
    targeted_contaminants:
      name: Riktade föroreningar
      description: Typer av mikrober eller parasiter som produkten är certifierad
        för att eliminera.
    targeted_muscle_group:
      name: Riktad muskelgrupp
      description: Den primära muskelgrupp som tillbehöret är avsett att träna eller
        stödja.
    taro_variety:
      name: Tarorotsort
      description: Anger sorten, arten eller marknadsnamnet för taroroten som erbjuds
        (t.ex. lila taro, eddoe, dasheen).
    tassel_trim_header_type:
      name: Typ av tofskantshuvud
      description: Anger konstruktionen av den övre huvud-/monteringsdelen som används
        för att fästa tofskanten på en yta (t.ex. tejp, fläta, snöre).
    tassel_trim_use_case:
      name: Användningsområde för tofskant
      description: Primärt avsett användningsområde för tofskanten.
    taste_profile:
      name: Smakprofil
      description: Beskriver de dominerande smakegenskaperna hos äppelsorten.
    tea_variety:
      name: Tesort
      description: Klassificerar den specifika typen eller stilen av te eller infusion
        (t.ex. svart, grönt, matcha, rooibos) så att kunderna kan filtrera efter sina
        föredragna sorter.
    teasing_tool_style:
      name: Retningsverktygsstil
      description: Den fysiska stilen eller utformningen på det kardverktyg som används
        för att öppna och blanda fibrer (t.ex. borste, kratta, kam).
    tee_base_style:
      name: Typ av tee-bas
      description: Identifierar den strukturella utformningen av basen på en rugby-tee
        som stöder bollen.
    temper_hardness:
      name: Härdning / hårdhet
      description: Indikerar hur mjuk eller hård tråden är (hur väl den håller formen).
    temperature_control_type:
      name: Typ av temperaturkontroll
      description: Hur verktygets temperatur styrs/justeras.
    tenkara_action_ratio:
      name: Tenkara-aktionsförhållande
      description: Indikerar det traditionella Tenkara-flexförhållandet som beskriver
        var stången böjs under belastning (t.ex. 6:4).
    tennis_ball_court_surface:
      name: Tennisbollplanens yta
      description: Anger den/de banytor som bollen är avsedd för för att säkerställa
        optimal prestanda och hållbarhet.
    tennis_ball_pressure_type:
      name: Typ av tryck på tennisbollen
      description: Identifierar bollens interna tryck eller konstruktion (trycksatt,
        trycklös, lågkomprimering, skum) som påverkar studs och hållbarhet.
    tennis_racket_grip_size:
      name: Tennisracket – greppstorlek
      description: Anger den standardiserade omkretsen för rackethandtaget (L0–L5
        eller motsvarande tum) för att säkerställa korrekt handpassform och komfort.
    tenor_flutophone_fingering_system:
      name: Tenorflutofon – fingersättningssystem
      description: Anger det fingersättningssystem som används av tenorflutofonen
        (läroplan/notationskonvention).
    tenor_recorder_joint_type:
      name: Kopplingstyp för tenorblockflöjt
      description: Anger kopplingstypen mellan sektioner av tenorblockflöjten.
    tenor_saxophone_key_system:
      name: Tenorsaxofon-tangentsystem
      description: Anger vilket klaviatursystem/standard som används (ofta kallad
        fransk/Boehm-stil för saxofoner).
    tenor_saxophone_pad_material:
      name: Material för tenorsaxofondyna
      description: Anger huvudmaterial för instrumentdynor.
    tenor_trombone_slide_type:
      name: Typ av glidmekanism för tenortrombon
      description: Typ av glidmekanism som används på tenortrombonen (t.ex. standard/rak
        kontra tryck/axialflöde).
    tenor_trombone_valve_configuration:
      name: Konfiguration av tenortrombonventil
      description: Anger om tenortrombonen har en ventil-/rotoranslutning och vilken
        konfiguration den använder.
    tension_control_type:
      name: Typ av spänningskontroll
      description: Indikerar hur (eller om) skytteln ger justerbar broms/spänning
        på spolen/spolröret under matning.
    tension_mechanism:
      name: Spännmekanism
      description: Den typ av spänning som används för att kontrollera väftmatningen
        från spolen/spolröret under vävning.
    tension_pitch_modulation_system:
      name: Spännings-/tonhöjdsmoduleringssystem
      description: Hur den talande trumman ändrar tonhöjd/spänning under spelning
        (till exempel genom att klämma på spänningssnörena).
    tension_system:
      name: Spänningssystem
      description: Det spinnrocksupptagnings-/spänningssystem som byggsatsen är avsett
        för.
    tent_fabric_material:
      name: Material för tältduk
      description: Identifierar det primära tyget som används i tältets yttertyg eller
        kropp, vilket påverkar vikt, andningsbarhet och väderbeständighet.
    tent_season_rating:
      name: Tältsäsongsklassning
      description: Klassificerar tältet efter antalet säsonger eller väderförhållanden
        det är konstruerat för (t.ex. 3-säsonger, 4-säsonger, expedition).
    tent_setup_type:
      name: Typ av tältuppsättning
      description: Anger tältets strukturella uppställningsstil, såsom fristående,
        halvfristående, icke-fristående, uppblåsbart/luftram eller pop-up-tält.
    tent_style:
      name: Typ av tält
      description: Beskriver tältets strukturella utformning (t.ex. kupol, tunnel,
        A-ram).
    test_result_output_method:
      name: Utmatningsmetod för testresultat
      description: Anger hur fordonets batteritestare presenterar eller levererar
        testresultat till användaren (t.ex. indikator, skärm, utskrift, mobilapp eller
        programvarurapport).
    tether_strap_system:
      name: Remsystem
      description: Typ av rem- eller bandsystem som används för att fästa nackstödet
        till hjälmen/selen (om tillämpligt).
    text_color:
      name: Textfärg
      description: Färgen på den tryckta eller broderade texten på etiketten, skild
        från etikettens bakgrundsfärg.
    textile_craft_machine_operation_type:
      name: Textilhantverksmaskin – typ av manövrering
      description: Hur maskinen manövreras (handdriven kontra fotdriven kontra motoriserad/elektrisk).
    textile_finish_treatment:
      name: Textilbehandling / ytbehandling
      description: Anger utmärkande ytbehandlingar som tillämpas på textilmaterialet.
    texture_inclusions:
      name: Texturinneslutningar
      description: Anger tillsatta texturkomponenter, såsom aloe vera-massa, basilikafrön,
        nata de coco, popping boba eller fruktbitar.
    therapeutic_technology:
      name: Terapeutisk teknologi
      description: Anger eventuella integrerade terapeutiska funktioner, såsom kylgel,
        magnetremsor eller infraröd keramik.
    thermal_set_components:
      name: Delar till underställset
      description: Anger om produkten innehåller endast underdel, endast överdel eller
        båda tillsammans som ett set.
    thermal_weight:
      name: Termisk vikt
      description: Indikerar värmekategorin för balaklavatyget.
    thermostat_type:
      name: Termostattyp
      description: Den funktionella designen eller styrstilen för en termostat i ett
        motorfordons kylsystem.
    thimble_guide_size:
      name: Fingerborgsguidens storlek
      description: Storleksbeteckning för fingerborgsguiden (passform/täckningsstorlek),
        vanligtvis säljs som liten/medel/stor snarare än uppmätt dimension.
    thread_connection_size:
      name: Gängkopplingens storlek
      description: Definierar gängspecifikationen som förbinder axlar, spetsar och
        adaptrar (t.ex. 6 mm, 5/16"-24).
    thread_construction:
      name: trådkonstruktion
      description: Hur tråden är konstruerad eller behandlad (t.ex. tvinnad broderitråd
        kontra sammanflätad tråd).
    thread_cord_type_beading_pattern:
      name: Tråd-/snörestyp (pärlningsmönster)
      description: Rekommenderad tråd- eller snöretyp som används för att slutföra
        mönstret.
    thread_cutter_form_factor:
      name: Trådskärarens utformning
      description: Identifierar trådskärarens fysiska stil, till exempel handhållen
        sax, hängsax eller ringsax.
    thread_cutter_mechanism:
      name: trådskärmekanism
      description: Beskriver den skärande funktionen eller mekanismen som används
        av trådskäraren.
    thread_cutter_safety_features:
      name: Säkerhetsfunktioner för trådskärare
      description: Anger inbyggda säkerhetsfunktioner som minskar risk för oavsiktliga
        skärskador eller skyddar blad vid förvaring.
    thread_cutter_usage_application:
      name: Användningsområde för trådskärare
      description: Indikerar den primära hantverksanvändningen för trådskäraren.
    thread_finish_treatment:
      name: Ytbehandling av tråd
      description: Ytbehandling eller behandling som appliceras på tråden och som
        påverkar hantering och prestanda (t.ex. vaxad, sammanflätad, merceriserad).
    thread_material:
      name: trådmaterial
      description: Primärfiber/materialinnehåll i tråden (ej tyg).
    thread_material_fiber:
      name: Trådmaterial (fiber)
      description: Anger själva trådens primära fiber/material (inte tyg).
    thread_package_format:
      name: Trådpaketformat
      description: Förpackningsutformning för sytråden (t.ex. spole, kon, rulle).
    thread_rack_compatible_spool_type:
      name: Typ av spole som är kompatibel med trådställ
      description: Typ av trådpaket som hyllstället är utformat för att rymma (spolar
        kontra koner, etc.).
    thread_standard_size:
      name: Gängstandardstorlek
      description: Identifierar trådstorlek/viktstandard som används på produktetiketten
        (t.ex. wt, Tex, denier).
    thread_type:
      name: Trådtyp
      description: Anger konstruktionen/typen av korsstygnstråd/garn.
    thread_weight_system:
      name: Trådviktssystem
      description: Standarden som används för att uttrycka trådtjocklek/vikt.
    thread_yarn_guide_mounting_attachment_style:
      name: Montering/fastsättning av tråd- och garnguide
      description: Beskriver hur guiden bärs eller monteras under användning.
    thread_yarn_guide_tension_control:
      name: Spänningskontroll för tråd- och garnguide
      description: Anger om och hur guiden ger justerbar spänning/motstånd på tråden
        eller garnet.
    thread_yarn_organizer_features:
      name: Funktioner för tråd- och garnorganisering
      description: Framhäver funktionell organisation och portabilitet specifikt för
        förvaring av tråd/garn.
    threader_intended_use:
      name: Avsedd användning för trädare
      description: Indikerar det primära hantverkssammanhanget som den handhållna
        nålträdaren är avsedd för.
    threading_system:
      name: Gängningssystem
      description: Anger metoden och hjälpmedlen som används för att träda overlockmaskinen
        (t.ex. manuell, färgkodad, guidad, luftträdning).
    threading_type:
      name: Typ av gängning
      description: Anger om smycket använder invändiga gängor, utvändiga gängor, är
        gänglöst eller inte tillämpligt.
    throttle_type_scooter_conversion:
      name: Gaskontrolltyp (scooterkonvertering)
      description: Anger gaskontrollens utformning/gränssnitt som ingår eller krävs
        av konverteringssatsen.
    throw_rope_end_attachment:
      name: Kastlinans ändfäste
      description: Ändavslutningen/fästutrustningen eller öglan som finns i kastrepets
        arbetsände/ändarna.
    throw_rope_storage_packaging_type:
      name: Typ av förvaring/förpackning för kastrep
      description: Hur kastrepet förvaras eller tas fram (t.ex. säck eller rulle).
    throw_rope_visibility_features:
      name: Synlighetsfunktioner för kastrepet
      description: Synlighets- och identifieringsfunktioner avsedda att göra repet
        lättare att se i vatten/svagt ljus.
    thrower_operation_type:
      name: Typ av kastarfunktion
      description: Klassificerar kastarens mekaniska/driftsstil för snabb filtrering
        av manuella kontra automatiska mekanismer.
    thumb_design:
      name: Tummens design
      description: Beskriver hur tummen är integrerad i handsken, vilket påverkar
        säkerhet och grepp.
    tiara_design:
      name: Design för tiara
      description: Anger tiarans övergripande strukturella stil eller silhuett.
    tie_down_points_straps_included:
      name: Surrningspunkter/remmar ingår
      description: Anger om hyllstället inkluderar integrerade surrningspunkter och/eller
        medföljande remmar för att säkra motorcykeln/scootern.
    tiling_format:
      name: Utskriftsformat
      description: Anger PDF-layoutstilen för att montera utskrivna sidor.
    time_current_characteristic:
      name: Tid-ström-karakteristik
      description: Indikerar säkringens tid-ström-beteende (t.ex. snabbverkande kontra
        tidsfördröjd), vilket påverkar lämpligheten för inkopplingsströmskretsar.
    timer_count_mode:
      name: Timer-räkningsläge
      description: Anger timerns räkningsläge, såsom nedräkning, uppräkning (stoppur),
        båda eller intervall/upprepning.
    timer_display_type:
      name: Timervisningstyp
      description: Indikerar hur speltimern visar den återstående tiden (t.ex. digital
        skärm, analog urtavla, timglas eller ingen visuell visning).
    timer_operating_modes:
      name: Driftlägen för timer
      description: Timerbeteenden som stöds för att utlösa effekter.
    timing_belt_construction_material_rubber_compound:
      name: Kamremskonstruktionsmaterial (gummiblandning)
      description: Primär gummiblandning för remmen som används (t.ex. HNBR), vilket
        påverkar värme-/oljebeständighet och livslängd.
    timing_belt_profile:
      name: Kamremsprofil
      description: Standardform för kuggprofil (t.ex. trapetsformad vs. kurvlinjär).
    timing_belt_reinforcement_cord_material:
      name: Kamremsförstärkningsmaterial
      description: Anger det interna förstärkningsmaterialet inuti kamremmen (t.ex.
        glasfiber, aramid), vilket påverkar styrka och töjning.
    timing_component_material:
      name: Material för tidskomponent
      description: Primärmaterial i kamkomponenten (remblandning, kedja/drevmetall,
        kåpamaterial).
    tin_whistle_body_material:
      name: Material för visselpipans kropp
      description: Samlar in vanliga material för visselpipans kropp mer specifikt
        än den breda listan över instrumentmaterial vid behov.
    tin_whistle_bore_type:
      name: Borrtyp för tennvisselpipa
      description: Anger borrningsutformningen för tennvisselpipan.
    tin_whistle_included_accessories:
      name: Ingående tillbehör för tennvisselpipa
      description: Tillbehör som medföljer tennvisselpipan (t.ex. fodral, rengöringsstav).
    tip_finish_coating:
      name: Ytfinish/beläggning för spets
      description: Anger ytbehandlingen på arbetsänden (t.ex. förkromad, pulverlackerad)
        som påverkar korrosionsbeständighet och risk för märken på fälgen.
    tip_shape:
      name: Spetsform
      description: Beskriver formen eller skärpan på gitarrplektrumspetsen, vilket
        påverkar artikulation och anslagskänsla.
    tippet_rating:
      name: Tippet-styrka
      description: Maximal rekommenderad tippetstyrka uttryckt i flugfiske X-beteckningar
        (t.ex. 4X).
    tire_changer_operation_type:
      name: Manövreringstyp för däckbytare
      description: Anger hur en däckbytarmaskin aktiveras/manövreras (t.ex. manuell,
        pneumatisk, hydraulisk). Till skillnad från det allmänna attributet "Strömkälla";
        använd vid beskrivning av maskinens manövreringsmetod.
    tire_changer_type:
      name: Typ av däckbytare
      description: Den allmänna driftsstilen, designen eller automatiseringsnivån
        för en däckbytarmaskin.
    tire_compound_type:
      name: Typ av gummiblandning för däck
      description: Anger klassificeringen av gummiblandningen som används i däcken
        (t.ex. mjuk, regndäck, slicks), vilken påverkar grepp och hållbarhet under
        olika förhållanden.
    tire_load_range:
      name: Däckets lastkapacitetsintervall
      description: Indikerar däckets lagermärkning/lastintervallbeteckning (vanligtvis
        för LT-däck) vilket återspeglar bärförmågan.
    tire_position:
      name: Däckposition
      description: Rekommenderad monteringsposition på fordonet
    tire_repair_kit_components:
      name: Medföljande delar i set för däckreparation
      description: Anger de artiklar som ingår i satsen, vilket gör det möjligt för
        kunder att jämföra paketets fullständighet.
    tire_sidewall_type:
      name: Däcksidatyp
      description: Anger sidoväggens styling eller konstruktionsegenskaper.
    tire_speed_rating:
      name: Hastighetsklass för däck
      description: Däckets hastighetsklassificeringsbokstav (t.ex. H, V, W) som anger
        maximal kapacitet för bibehållen hastighet.
    tire_spoon_type:
      name: Däckskedtyp
      description: Kategoriserar däckskeden efter ändform och avsedd användning.
    tire_system_compatibility:
      name: Däcksystemkompatibilitet
      description: Anger om tätningsmedlet är avsett för slanglös konfiguration, slangdäck
        eller båda.
    tire_temperature_rating_utqg:
      name: Däcktemperaturklassificering (UTQG)
      description: UTQG temperaturbeständighetsklass för bildäck (t.ex. A, B, C).
    tire_traction_rating_utqg:
      name: Däckens väggreppsklassificering (UTQG)
      description: UTQG dragningsklass för våtbromsprestanda.
    tire_tread_style:
      name: Typ av däckmönster
      description: Beskriver det allmänna slitbanemönstret för det tubulära däcket,
        vilket återspeglar avsedd terräng och väggreppsegenskaper.
    tire_tube_type:
      name: Däckslangtyp
      description: Om däcket är konstruerat för slanglöst eller slangförsett bruk.
    title_status:
      name: Titelstatus
      description: Fordonets juridiska status/registreringsstatus.
    tobacco_application:
      name: Tobak – användningsområde
      description: Anger den avsedda konsumtionsmetoden eller rökapparaten som löstobaken
        är avsedd för.
    tobacco_cut_type:
      name: Typ av tobaksskärning
      description: Anger den fysiska skärningen eller tillredningsmetoden för löstobaken,
        vilket påverkar brinnhastighet, förpackningsmetod och den övergripande rökupplevelsen.
    tobacco_strength:
      name: Tobaksstyrka
      description: Indikerar den upplevda kropps- eller nikotinkänslan av tobaken
        vid konsumtion, vilket hjälper kunden att välja en intensitet som matchar
        deras preferens.
    toe_construction:
      name: Konstruktion för tå
      description: Anger konfigurationen av tåområdet på våtdräktsstövlar, vilket
        påverkar balans, brädkänsla och värme.
    toe_coverage:
      name: Tåtäckning
      description: Anger vilken typ av tåskydd strumpan ger.
    toe_pick_style:
      name: Typ av tåpigg
      description: Beskriver utformningen av tåpiggen på konståkningsskenor.
    toe_protection_type:
      name: Typ av tåskydd
      description: Anger om och hur tåområdet är förstärkt av säkerhetsskäl (t.ex.
        ståltå, mjuktå).
    toe_reinforcement_type:
      name: Typ av tåförstärkning
      description: Anger konstruktionen av tåområdet, vilket påverkar hållbarhet och
        skokompatibilitet.
    toe_stop_stem_thread_size:
      name: Gängstorlek för tåstoppsskaft
      description: Anger gängstorleken på tåstoppsskaften för att säkerställa plattkompatibilitet.
    tofu_preparation_style:
      name: Typ av beredning för tofu
      description: Kategoriserar den traditionella stilen eller undertypen av tofu
        utöver fasthet (t.ex. silkeslen, block, puff, skinn, knut, fermenterad).
    tom_mount_adjustment_features:
      name: Justeringsfunktioner för pukfäste
      description: Anger vilka delar som ingår i pukfästet (mottagare, arm, kula,
        klämmor, läsfästen etc.).
    tom_mount_components_included:
      name: Komponenter för tomfäste som ingår
      description: Anger vilka delar som ingår i pukfästet (mottagare, arm, kula,
        klämmor, minneslås etc.).
    tom_mount_mounting_position:
      name: Monteringsposition för pukfäste
      description: Anger var pukfästet är avsett att fästas (t.ex. bastrumma, cymbalstativ,
        hyllställ).
    tonneau_cover_mounting_style:
      name: Typ av montering för tonneau-kåpa
      description: Indikerar hur lastutrymmets skydd installeras/fästs på lastbilens
        flakräcken.
    tool_case_form_factor:
      name: Verktygslådans utformning
      description: Identifierar verktygslådans fysiska stil, vilket påverkar portabilitet
        och förvaring (t.ex. portfölj, hårt skal).
    tool_functions_included:
      name: Medföljande verktygsfunktioner
      description: Listar de specifika reparations- eller underhållsfunktioner som
        ett multiverktyg eller en verktygssats kan utföra.
    top_bunk_access_method:
      name: Åtkomstmetod för översta våningssängen
      description: Indikerar hur passagerare når den översta våningssängen, vilket
        underlättar säkerhets- och utrymmesöverväganden.
    top_fit:
      name: Toppens passform
      description: Anger toppens övergripande silhuett eller passform på kroppen (t.ex.
        smal eller överdimensionerad).
    top_hat_style:
      name: Typ av top hat
      description: Identifierar den specifika stilvariationen för en top hat.
    top_soundboard_material:
      name: Material på ovansidan (resonansplattan)
      description: Anger materialet i gitarrens topp/resonansplatta (den primära tonproducerande
        plattan).
    topping_form:
      name: Toppingform
      description: Definierar den fysiska formen eller konsistensen på desserttoppingen
        för att hjälpa kunden att snabbt begränsa sig till önskad användning.
    topping_type:
      name: Typ av topping
      description: Indikerar det primära yttre toppingen eller beläggningen som applicerats
        på munken.
    tow_hook_type:
      name: Typ av dragkrok
      description: Anger om knäbrädan har en integrerad dragkrok och specificerar
        dess mekanismstil.
    tow_point_configuration:
      name: Utformning av bogserfäste
      description: Anger konfigurationen av bogserpunkten (enkel, dubbel, flera) som
        erbjuds av det bogserbara röret för olika åkningspositioner.
    tow_strap_protective_features:
      name: Skyddande funktioner för bogserremmen
      description: Utmärkande säkerhets- och hållbarhetsfunktioner inbyggda i bogserremmen.
    tow_strap_type:
      name: Typ av bogserrem
      description: Indikerar den funktionella bogserremmens konstruktion, såsom statisk
        bogserrem kontra kinetisk återhämtningsrem.
    towable_tube_style:
      name: Typ av bogserrör
      description: Identifierar den allmänna designen eller utformningen av det bogserbara
        röret, vilket avgör åkarens position och åkupplevelse.
    towed_water_sport_discipline:
      name: Disciplin för bogserad vattensport
      description: Anger den primära bogserade vattensporten som handsken är avsedd
        för.
    towel_features:
      name: Handdukens funktioner
      description: Listar speciella egenskaper eller extrafunktioner som ingår i en
        handduk.
    towel_style:
      name: Handduksstil
      description: Klassificerar golfhanddukens funktionella design eller format.
    toy_airplane_control_type:
      name: Kontrolltyp för leksaksflygplan
      description: Anger hur leksaksflygplanet styrs av användaren.
    toy_airplane_features:
      name: Funktioner för leksaksflygplan
      description: Framhäver utmärkande lekfunktioner som finns på leksaksflygplanet.
    toy_airplane_flight_capability:
      name: Leksaksflygplanets flygkapacitet
      description: Anger om leksaksflygplanet är designat för att faktiskt flyga/glida
        eller främst är för marklek/uppvisning.
    toy_audio_features:
      name: Leksaksljudfunktioner
      description: Listar ljudkapaciteten och ljudeffekterna som är inbyggda i leksaken.
    toy_boat_play_features:
      name: Leksaksbåt – funktioner
      description: Framhäver utmärkande interaktiva funktioner hos leksaksbåtar för
        upptäckt och filtrering.
    toy_boat_recommended_play_environment:
      name: Rekommenderad lekmiljö för leksaksbåtar
      description: Anger den avsedda lekmiljön för leksaksbåten för att stödja kundens
        förväntningar och säkerhet (t.ex. badkar kontra öppet vatten).
    toy_bowling_equipment_included:
      name: Leksaksutrustning för bowling ingår
      description: Anger vilka bowlingkomponenter som ingår i leksaksbowlingsetet
        (t.ex. käglor, klot, bana/matta, bärväska).
    toy_car_features:
      name: Leksaksbilens funktioner
      description: Framhäver lekfunktioner som är integrerade i leksaksbilen (separata
        från framdrivningen), såsom ljus, ljud eller öppningsbara delar.
    toy_drawing_tablet_accessories_included:
      name: Tillbehör för rittavla som ingår
      description: Ytterligare medföljande tillbehör utöver själva surfplattan (t.ex.
        extra penna, stämplar).
    toy_drawing_tablet_erase_method:
      name: Raderingsmetod för leksaksritplattor
      description: Hur ritningsytan rensas/töms.
    toy_drawing_tablet_screen_type:
      name: Skärmtyp för leksaksritplatta
      description: Vilken typ av rit-/visningsyta som används (t.ex. LCD-skrivplatta
        kontra magnetisk).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Leksaksritplatta – skriv-/ritinstrument
      description: Primärt verktyg som används för att rita på surfplattan (typ av
        penna).
    toy_figure_sound_feature:
      name: Ljudfunktion för leksaksfigurer
      description: Anger om djurfiguren producerar ljud och vilken typ (t.ex. vrål,
        realistiskt djurläte).
    toy_game_features:
      name: Egenskaper för leksak/spel
      description: Framhäver utmärkande lek- eller konstruktionsdetaljer som är relevanta
        för strand- och sandleksaker.
    toy_gift_basket_items_included:
      name: Delar som ingår i presentkorg med leksaker
      description: 'Listar de huvudsakliga typerna av leksaksartiklar som ingår i
        presentkorgen (till exempel: plyschleksak, byggset, pussel).'
    toy_glider_launch_method:
      name: Utskjutningsmetod för leksaksglidare
      description: Anger hur leksaksglidaren skjuts iväg, vilket påverkar spelstil
        och kundernas förväntningar.
    toy_helicopter_control_type:
      name: Kontrolltyp för leksakshelikopter
      description: Hur leksakshelikoptern styrs/manövreras (oberoende av framdrivning),
        till exempel med handhållen fjärrkontroll, mobilapp eller ingen styrning (fri
        flygning).
    toy_helicopter_features:
      name: Leksakshelikopter – funktioner
      description: Viktiga funktionella egenskaper hos en leksakshelikopter (särskilt
        RC-modeller) som påverkar användbarhet och lekvärde.
    toy_jacks_set_items_included:
      name: Ingående delar i leksaks-jacks-set
      description: Anger vilka kärnartiklar som ingår i leksaks-jacks-setet (t.ex.
        krysspinn, boll, väska).
    toy_keyboard_learning_mode:
      name: Inlärningsläge för leksakstangentbord
      description: Indikerar den pedagogiska inlärningsmetod som leksakstangentbordet
        stöder (t.ex. upplysta tangenter, sånger att följa med i, guidade lektioner,
        appar-stödd inlärning).
    toy_keyboard_sound_theme:
      name: Ljudtema för leksakstangentbord
      description: Typer av inbyggda instrumentröster/ljudteman som erbjuds (utöver
        vanligt piano).
    toy_kitchen_appliances_included:
      name: Medföljande leksaksköksapparater
      description: Anger den/de köksapparat(er) som representeras i leksetet när produkten
        är en apparat eller ett apparatfokuserat set.
    toy_kitchen_assembly_requirement:
      name: Krav för montering av leksakskök
      description: Anger om montering behövs och den ungefärliga monteringskomplexiteten.
    toy_kitchen_interactive_features:
      name: Interaktiva funktioner i leksaksköket
      description: Framhäver interaktiva element som vanligtvis finns i leksakskök
        och relaterade tillbehör.
    toy_motorcycle_feature_set:
      name: Leksaksmotorcykel – funktioner
      description: Viktiga lekfunktioner för leksaksmotorcykeln (välj alla som gäller).
    toy_motorcycle_scale:
      name: Leksaksmotorcykel – skala
      description: Skalaförhållande för leksaks-/samlarmotorcyklar (t.ex. 1:12).
    toy_parachute_launch_method:
      name: Uppskjutningsmetod för leksaksfallskärm
      description: Hur leksaken är avsedd att skjutas upp/fällas ut för flygning.
    toy_piano_and_keyboard_accessories_included:
      name: Tillbehör för leksakspiano och keyboard ingår
      description: Tillbehör medföljer leksakspianot eller leksakskeyboardet.
    toy_playset_assembly_required:
      name: Montering av leksaksset krävs
      description: Indikerar om vuxenmontering krävs före lek (utöver enkel ihopsnäppning).
    toy_playset_items_included:
      name: Delar som ingår i leksaksset
      description: Listar de viktigaste komponenterna som ingår i leksetet (vad som
        medföljer i lådan).
    toy_safety_certification:
      name: Säkerhetscertifiering för leksak
      description: Säkerhets- och efterlevnadsstandarder/märkningar som gäller för
        leksaker i kundens marknad (t.ex. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Funktioner för leksaksrymdskepp
      description: Indikerar vanliga interaktiva/lekfunktioner som är inbyggda i leksaksrymdskeppet.
    toy_spaceship_size_class:
      name: Leksaksrymdskepp – storleksklass
      description: Indikerar en grov storleksklass för leksaksrymdskeppet för att
        möjliggöra snabb filtrering, separat från exakta dimensioner (längd/bredd/höjd)
        och inte ett numeriskt modellskalförhållande (t.ex. 1:72).
    toy_tableware_pieces_included:
      name: Delar i leksaksservis som ingår
      description: Anger vilka leksaksdukningsartiklar som ingår (tallrikar, koppar,
        bestick, serveringsdelar).
    toy_tool_electronic_features:
      name: Elektroniska funktioner för leksaksverktyg
      description: Beskriver leksaksverktygets interaktiva/elektroniska funktioner
        (ljus, ljud, roterande rörelse etc.).
    toy_tool_set_components_included:
      name: Delar i leksaksverktygsset som ingår
      description: Listar de specifika leksaksverktygen som ingår i paketet (särskilt
        för verktygsset).
    toy_train_scale:
      name: Skala för leksakståg
      description: Specificerar leksaks-/modelltågsskala-standarden (eller spårsystemets
        storlek) för att säkerställa kompatibilitet med befintliga tåg och spår.
    toy_train_track_layout_type:
      name: Typ av spårupplägg för leksakståg
      description: Beskriver den medföljande spårlayouten/formen för ett tågset eller
        expansionsspårpaket.
    toy_weapon_gadget_features:
      name: Leksaksvapen och prylfunktioner
      description: Framhäver vanliga interaktiva och funktionella funktioner specifika
        för leksaksvapen och spionprylar.
    tpms_sensor_frequency_band:
      name: TPMS-sensorns frekvensband
      description: Radiofrekvensband som stöds av TPMS-relaterade tillbehör (i förekommande
        fall).
    track_and_field_discipline:
      name: Friidrottsgren
      description: Identifierar den specifika friidrottsgrenen eller disciplinen som
        produkten är avsedd för (t.ex. kulstötning, stavhopp, sprint).
    track_event_specialization:
      name: Specialisering inom friidrottsgren
      description: Anger vilken typ av gren som spikskon är optimerad för.
    track_field_event_suitability:
      name: Lämplighet för friidrottsgren
      description: Identifierar de specifika friidrottsgren(ar) som träningshjälpmedlet
        är avsett för.
    track_set_special_features:
      name: Specialfunktioner för racerset
      description: Framhäver anmärkningsvärda spelfunktioner som ingår i racersetet
        utöver grundläggande bana och bilar.
    track_surface_compatibility:
      name: Kompatibilitet för banunderlag
      description: Anger den/de löpytor som spikskon är avsedd för.
    tracking_aid_type:
      name: Typ av spårningshjälpmedel
      description: Anger om kajaken har utrustning som förbättrar spårning i rak linje.
    traction_pattern_type:
      name: Typ av greppmönster
      description: Beskriver det primära ytspåret eller slitbanemönstret som ger grepp
        på underlaget.
    trading_card_league:
      name: Samlarkort – liga
      description: Identifierar den sportliga som är associerad med kortuppsättningen
        eller ämnet (i förekommande fall).
    trailer_construction:
      name: Släpvagnskonstruktion
      description: Identifierar släpvagnens primära konstruktion för ram/kaross (t.ex.
        aluminium, stål eller blandad konstruktion).
    trailer_coupler_size:
      name: Släpvagnskoppling – storlek
      description: Anger vilken kulstorlek på släpvagnskopplingen som krävs för bogsering.
    trailer_hitch_mounting_location_method:
      name: Monteringsplats/metod för dragkrok
      description: Anger var och hur dragkroken är monterad på fordonet (t.ex. bakre
        uttag, främre uttag, rammonterad, stötfångarmonterad, flakmonterad).
    trailer_light_function:
      name: Släpvagnsbelysning – funktion
      description: Primär funktion/position för släpvagnsbelysningen.
    trailer_suspension_type:
      name: Typ av fjädring för släpvagn
      description: Anger vilken typ av fjädringssystem som används i cykelkärran,
        såsom spiralfjäder eller bladfjäder för att förbättra åkkomforten och lastskyddet.
    trailer_wiring_circuit:
      name: Släpvagnens ledningskrets
      description: Listar belysnings-, broms- och hjälpkretsar/signaler som släpvagnens
        kablage bär (dvs. vilka ström-/jord- och signalledningar som finns).
    trailer_wiring_connector_type:
      name: Typ av kabelanslutning för släpvagn
      description: Anger den kontaktstandard för släpvagns-/fordonssida som används
        för släpvagnskablage och adaptrar.
    train_whistle_intended_use:
      name: Tågvissla – användningsområde
      description: Primärt avsett användningssammanhang för tågvisslan.
    train_whistle_sound_character:
      name: Tågvisslans ljudkaraktär
      description: Beskriver den upplevda tonala karaktären hos tågvissslans ljud
        (klangfärg).
    trainer_mounting_type:
      name: Monteringstyp för trainer
      description: Beskriver hur cykeln samverkar med träningsstativet (t.ex. hjul-på
        eller direktdrift).
    training_dummy_shape:
      name: Form på träningsdocka
      description: Anger dockans övergripande design eller silhuett, vilket påverkar
        hundens grepp och träningens realism.
    training_focus:
      name: Träningsfokus
      description: Beskriver det primära kompetensområde som hjälpmedlet riktar sig
        mot (t.ex. reflexer, fotarbete, hand-öga-koordination).
    training_focus_area:
      name: Fokusområde för träning
      description: Anger de primära lacrossefärdigheterna som hjälpmedlet är utformat
        för att utveckla.
    training_objective:
      name: Träningsmål
      description: Anger de primära kompetenser eller tekniker som produkten är utformad
        för att förbättra.
    training_surface_suitability:
      name: Lämplighet för träningsytor
      description: Anger vilka ytor träningsredskapet kan användas på.
    training_surface_usage:
      name: Användning av träningsyta
      description: Anger de primära aktiviteterna som träningsytan stöder, och skiljer
        skatevänliga syntetiska ispaneler från torrmarks- eller multisportmattor.
    training_usage_type:
      name: Typ av träningsanvändning
      description: Anger den primära avsedda användningsperioden eller användningssammanhanget
        för träningsbyxorna, till exempel träning dagtid eller nattetid.
    trampoline_enclosure_type:
      name: Typ av inhägnad för studsmatta
      description: Anger vilken konfiguration som används på studsmattan, inklusive
        hur/var nätet är monterat.
    trampoline_safety_certifications:
      name: Säkerhetscertifieringar för studsmatta
      description: Anger relaterade säkerhetsstandarder/certifieringar som studsmattan
        gör anspråk på att uppfylla.
    transfer_application_method:
      name: Appliceringsmetod för transfer
      description: Anger hur överföringen appliceras på tyget (t.ex. strykning kontra
        värmepress).
    transfer_method:
      name: 'Överföringsmetod '
      description: Anger hur designen är avsedd att överföras till tyg.
    transfer_peel_temperature:
      name: Avskalningstemperatur för överföring
      description: Anger det rekommenderade temperaturtillståndet (varmt, ljummet
        eller kallt) vid vilket bärararket ska tas bort efter pressning.
    transmission_cooler_construction:
      name: Växellådskylarens konstruktion
      description: Anger konstruktionsdesignen för en växellådskylare.
    transmission_fluid_specification:
      name: Specifikation för transmissionsolja
      description: OEM/specifikationsstandard som transmissionsoljan uppfyller (t.ex.
        Dexron/Mercon-familjer, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Material för växellådans bussning
      description: Anger elastomer- eller isolatormaterialet som används i monteringsbussningen/isolatorn
        (vibrationsdämpande element).
    transmission_mount_type:
      name: Typ av transmissionsfäste
      description: Specificerar konstruktionen/designen av ett transmissionsfäste
        (t.ex. hydrauliskt kontra fast) för att fastställa passform, NVH-egenskaper
        och avsedd användning.
    transparency_level:
      name: Transparensnivå
      description: Beskriver hur genomskinliga lådans väggar är, vilket hjälper kunden
        att välja mellan full synlighet och dold förvaring.
    transport_case_type:
      name: Typ av transportväska
      description: Klassificerar transportlösningens strukturella stil/styvhet, vilket
        återspeglar skyddsnivå och packningsmetod.
    transposition_modes:
      name: Transponeringslägen
      description: Anger de transponerings-/konserttonlägen som stämapparaten stöder
        (t.ex. konserttonhöjd och transponeringsnycklar som B♭ eller E♭).
    trap_design:
      name: Design av fälla
      description: Identifierar fällans strukturella stil eller mekanism, vilket avgör
        utplaceringsmetod och vilken art eller miljö den är bäst lämpad för.
    trap_spring_configuration:
      name: Konfiguration av fällfjädern
      description: Anger antalet eller arrangemanget av fjädrar som driver fällan,
        vilket påverkar styrka och laglighet.
    travel_bassinet_accessories_included:
      name: Resesängtillbehör ingår
      description: Listar kompletterande artiklar som medföljer resesängen.
    travel_spinning_wheel_assembly_required:
      name: Monteringskrav för rese-spinnrock
      description: Om hjulet kräver montering/inställning utöver utfällning (t.ex.
        montering av spinnvinge, spänning, trampor) före användning.
    travel_spinning_wheel_portability_features:
      name: Bärbarhetsfunktioner för rese-spinnrock
      description: Bärbarhetsrelaterade designelement för rese-spinnrockar, såsom
        vikbar konstruktion och medföljande transportlösningar.
    travel_trailer_appliances_fuel_type:
      name: Bränsletyp för husvagnsapparater
      description: Primärt bränsle som används för inbyggda apparater/uppvärmning/matlagning
        (ej dragfordon).
    travel_trailer_holding_tank_type:
      name: Typ av septiktank för husvagn
      description: Anger vilka hålltankar som finns i husvagnen (välj alla som gäller).
    travel_trailer_power_hookup_shore_power:
      name: Anslutning av landström till husvagn
      description: Standard(er) för elanslutning som stöds för landströmskoppling.
    tread_pattern_type:
      name: Typ av slitbanemönster
      description: Klassificerar däckets övergripande slitbanedesign, såsom slick,
        halvslick eller terrängmönstrad, vilket påverkar grepp, rullmotstånd och avsedd
        yta.
    treadmill_key_type:
      name: Löpbandsnyckeltyp
      description: Beskriver säkerhetsnyckelns fysiska utformning eller manöver-/kopplingsmekanism
        (t.ex. magnetisk rund, plastinsats, klicklås).
    treadmill_part_type:
      name: Typ av löpbandkomponent
      description: Identifierar den specifika löpbandskomponenten som produkten är
        avsedd att ersätta så att kunden snabbt kan bekräfta passformen (t.ex. löpband
        kontra motor).
    treadmill_position:
      name: Löpbandsposition
      description: Anger delens monteringsposition på löpbandet (fram, bak, övre,
        nedre, mitten).
    triangle_striker_material:
      name: Material för triangelklubba
      description: Material i den medföljande klubban/slagröret.
    trigger_input_connector:
      name: Anslutning för trigger-ingång
      description: Anger den fysiska kontaktstandard som används för triggeringångar.
    trigger_input_connector_type:
      name: Typ av kontakt för triggeringång
      description: Anger den fysiska anslutningstypen som används för trigger-ingångar.
    trigger_input_zone_support:
      name: Zonstöd för trigger-ingång
      description: Anger om trigger-ingångar stöder enzons- och/eller tvåzons-utlösare
        (t.ex. huvud/båge) och liknande flerzonsimplementeringar.
    trim_application_method:
      name: Metod för applicering av trim
      description: Anger hur listen/bandet är avsett att fästas på ett projekt (t.ex.
        sy på, strykas på, självhäftande).
    trim_detail:
      name: Kantdetalj
      description: Identifierar framträdande dekorativa kanter eller ytor på plagget
        (t.ex. tofskant, fransar, spetskant).
    trim_elasticity:
      name: Trimelasticitet
      description: Anger om sicksackbandet har stretch för användning på stickade/träningskläder.
    trim_finish:
      name: Kantfinish
      description: Ytbehandling som appliceras på kanten (t.ex. metallic, glitter,
        reflekterande).
    trim_tilt_type:
      name: Trim- och tilttyp
      description: Om och hur motorn stöder trim-/tiltjustering.
    trolleybus_power_supply_type:
      name: Typ av strömförsörjning för trådbuss
      description: Anger hur trådbussen får dragkraft från det elektriska nätet.
    truck_bed_body_type:
      name: Flak/karosserityp
      description: Konfiguration av lastflaket eller karossen bakom hytten.
    truck_bed_length_class:
      name: Lastbilsflakslängdsklass
      description: Anger den längdklass för lastbilsflak som lastnätet är konstruerat
        för att passa (vanligtvis kallat kort/standard/lång flak).
    truck_mounting_hole_pattern:
      name: Hålmönster för truckmontering
      description: Anger hålbilden som används för att montera truckar på däcket (t.ex.
        gammaldags, modern, universal).
    truck_mounting_style:
      name: Typ av lastbilsmontering
      description: Hur truckarna är fästa på däcket (toppmontering, Dropmontering
        etc.) Influence Ride och stabilitet.
    truck_profile:
      name: Lastbilsprofil
      description: Indikerar skateboardtruckens Ride i förhållande till brädan, vilket
        påverkar hjulförsäljningen och brädkänslan.
    trumpet_bell_material:
      name: Material för trumpetklocka
      description: Material som används till klockan (skiljer sig ibland från resten
        av instrumentet).
    trumpet_leadpipe_material:
      name: Material för trumpetens leadpipe
      description: Material eller behandling som används för ledningsröret (huvudröret
        från munstycket till ventilerna).
    trundle_mechanism:
      name: Utdragsmekanism
      description: Beskriver hur den sekundära sängkomponenten dras ut från huvudramen.
    trunk_part_type:
      name: Typ av bagagedel
      description: Anger vilken bagagerelaterad karosserikomponent som säljs (t.ex.
        bagagelucka, gångjärn, spärr).
    tuba_leadpipe_material:
      name: Material för tubans ledningsrör
      description: Identifierar materialet som används för tubans ledningsrör (munrör).
    tube_base_type:
      name: Typ av bas för tub
      description: Anger rörets bas-/hylsfamilj som används för fysisk/elektrisk passform
        (t.ex. Octal, Noval/9-stift).
    tube_matching_grade:
      name: Rörmatchning
      description: Anger om rören testas/matchas som en uppsättning och vilken typ
        av matchning som tillhandahålls.
    tube_weight_category:
      name: Viktkategori för tub
      description: Klassificerar röret efter konstruktion/vikt (t.ex. ultralätt, standard,
        tung) för snabb jämförelse av hållbarhet kontra prestanda.
    tubeless_compatible:
      name: Kompatibel med slanglöst
      description: Anger om hjulet är konstruerat för att användas utan slang när
        det kombineras med slanglösa däck.
    tubing_shape:
      name: Rörform
      description: Anger tvärsnittsformen för stativets stödrör.
    tubular_construction_type:
      name: Typ av rörkonstruktion
      description: Anger konstruktionsstilen för tubulärcykeldäck, och skiljer mellan
        traditionella limmade tubulärdäck och nyare varianter.
    tulip_type_flower_form:
      name: Tulpantyp (blomform)
      description: Anger den horticulturella typen/blomformen för tulpanerna i buketten
        (t.ex. enkla, dubbla, papegojtulpaner).
    tuner_input_method:
      name: Stämapparatens ingångsmetod
      description: Anger hur stämapparaten detekterar tonhöjd (mikrofon, vibrations-/klämsensor,
        instrumentkabelingång, kontaktsensor).
    tuning_mechanism:
      name: Stämningsmekanism
      description: Hur bongoskinnarna är spända/stämda.
    tuning_system:
      name: Stämningssystem
      description: Hur goblet-trumman stäms eller om den är stämbar.
    turn_signal_lens_color:
      name: Blinkerslinsens färg
      description: Färg på den synliga linsen/kåpan på blinkershöljet (ej avgett ljusfärg).
    turn_signal_lighting_style:
      name: Blinkersljusstil
      description: Den visuella signaleringsstilen/animationen som blinkersen tillhandahåller.
    turnip_and_rutabaga_variety:
      name: Sort av rova och kålrot
      description: Identifierar den specifika sorten av rova eller kålrot.
    tweeter_crossover_type:
      name: Diskantfiltertyp
      description: Anger vilken typ av högpassfilter och/eller skyddskomponent som
        ingår i diskanthögtalaren, om sådan finns.
    tweeter_material:
      name: Material för diskantelement
      description: Diskantens primära membran/kupolmaterial.
    tweeter_mount_type:
      name: Diskantmonteringstyp
      description: Anger hur diskanten är avsedd att installeras i fordonet (monteringsmetod/utrustning).
    twill_direction:
      name: Twillriktning
      description: Indikerar twilllinjens riktning för en denimväv.
    twist_direction:
      name: Vridriktning
      description: Riktning för snodd som används i garnet/tråden (S-snodd eller Z-snodd).
    u_joint_series_size:
      name: U-kopplingsserie/storlek
      description: Anger vilken U-kopplingsserie eller storlekstandard som används
        (t.ex. 1310-serien).
    uilleann_pipes_bag_material:
      name: Material för uilleannpipans luftsäck
      description: Materialet i luftsäckskomponenten (om sådan ingår), vilket påverkar
        känsla, hållbarhet och underhåll.
    uilleann_pipes_handedness:
      name: Uilleannpipans höger-/vänsterkonfiguration
      description: Anger om setet är konfigurerat för höger- eller vänsterhänt layout.
    uilleann_pipes_set_configuration:
      name: Uilleannpipset – konfiguration
      description: Anger vilken konfiguration av uilleannpipset som ingår, baserat
        på förekomst av regulatorer och borduner.
    uk_childrens_shoe_size:
      name: Skostorlek för barn i Storbritannien
      description: Anger Storbritanniens barnstorlekar, till exempel 4 eller 4 bred
    uk_clothing_size:
      name: Klädstorlekar Storbritannien
      description: Anger klädstorlekar i Storbritannien, till exempel 12 eller 18
    uk_cup_size:
      name: Kupstorlek Storbritannien
      description: Anger kupstorlekar i Storbritannien, till exempel C eller FF
    uk_mens_shoe_size:
      name: Skostorlekar män Storbritannien
      description: Anger Storbritanniens skostorlekar för män, till exempel 9 eller
        9 bred
    uk_womens_shoe_size:
      name: Storbritanniens damskostorlek
      description: Anger den brittiska damskostorleken, till exempel 6 eller 6 Wide
    ukulele_back_and_sides_wood:
      name: Träslag för ukulelens baksida och väggar
      description: Identifierar träet/materialet som används till ukuleles baksida
        och sidor.
    ukulele_body_cutaway:
      name: Ukulele-cutaway
      description: Indikerar om konsertukulelekroppen har en cutaway för enklare åtkomst
        till de övre banden.
    ukulele_body_shape:
      name: Ukulelekroppens form
      description: Allmän kroppsform som används för ukulele.
    ukulele_bridge_material:
      name: Material för ukulele-bryggan
      description: Anger materialet som används för ukulele-bryggan.
    ukulele_construction_type:
      name: Konstruktionstyp av ukulele
      description: Hur instrumentets ovansida/baksida/sidor är konstruerade (massivt
        trä vs. laminat).
    ukulele_electronics_configuration:
      name: Ukulele elektronik konfiguration
      description: Anger om ukulelen endast är akustisk eller inkluderar inbyggd elektronik
        (mikrofon och/eller förförstärkare) för förstärkning.
    ukulele_string_re_entrant_tuning:
      name: Ukulelens re-entrant-stämning
      description: Huruvida ukulelen är inställd med reentrant-stämning (hög-G) kontra
        linjär/låg-G; vanliga kundpreferenser och påverkar ljudet.
    ukulele_top_wood:
      name: Ukulele-topp i trä
      description: Identifierar träet/materialet som används till ukulelens lock/resonanslåda.
    ukulele_tuner_mechanism:
      name: Ukulele-stämningsmekanism
      description: Anger stämapparatens stil/mekanism som används på ukulelen.
    ukulele_tuner_type:
      name: Typ av ukulele-stämapparat
      description: Stil på stämskruv som används på ukulelehuvudet.
    ukulele_tuning:
      name: Ukulele-stämning
      description: Anger den avsedda standardstämningen för fickukulelen.
    ultralight_aircraft_wing_configuration:
      name: Konfiguration av ultralätt flygplansvinge
      description: Placering och konfiguration av primärvingen i förhållande till
        flygkroppen/strukturen.
    under_bed_features:
      name: Egenskaper för sängens underdel
      description: Identifierar det primära funktionella elementet som finns under
        sängplattformen.
    underfoot_strap_type:
      name: Typ av rem under foten
      description: Identifierar materialet eller designen som används för remmen som
        löper under skon.
    underwear_fit:
      name: Underklädernas passform
      description: Indikerar den övergripande passformen för boxershortsen (t.ex.
        slim, lös, kompression).
    underwear_pieces_included:
      name: Delar som ingår i underklädesset
      description: Identifierar vilka plagg som tillhandahålls (överdel, underdel,
        båda eller hel dräkt) så att kunderna vet om de köper ett komplett set eller
        en enskild artikel.
    uniform_pieces_included:
      name: Uniformdelar ingår
      description: Identifierar vilka plaggkomponenter som medföljer (t.ex. skjorta,
        byxor, väst), förtydligande av paketets innehåll för bulk- eller satsköp.
    uniform_role:
      name: Hur firmware-/programvaruuppdateringar levereras för streckkodsläsaren.
      description: Anger den yrkesroll eller myndighet som uniformen är avsedd för
        (t.ex. polis, sheriff, ambulans).
    update_method:
      name: uppdateringsmetod
      description: Hur firmware/programvara uppdateras levereras för streckkodsläsare.
    upholstery_fabric_backing_type:
      name: Typ av baksidesmaterial för klädseltyg
      description: Anger den baksida/laminering på klädseltyget som påverkar installation
        och känsla.
    upholstery_fabric_water_resistance:
      name: Vattentålighet för klädseltyg
      description: Indikerar motståndskraft mot vatten och spill för klädselns tygyta.
    upper_material:
      name: Övre material
      description: Anger det primära materialet som används på den övre delen av sneakern,
        vilket påverkar andningsförmåga i tyget, hållbarhet och utseende.
    upright_bass_pickup_system:
      name: Pickupsystem för kontrabas
      description: Anger om kontrabasen inkluderar ett installerat pickup-/förförstärkarsystem
        avsett för förstärkning.
    upright_piano_power_source:
      name: Strömkälla för piano
      description: Hur pianot drivs, tillämpligt på akustiska pianon utan ström samt
        pianon med tysta/hybridsystem som kräver elektricitet.
    urination_device_features:
      name: Funktioner för urineringsanordning
      description: Framhäver speciella designegenskaper som förbättrar funktionalitet
        eller bekvämlighet.
    us_childrens_shoe_size:
      name: Skostorlekar barn USA
      description: Anger USA:s barnstorlekar, till exempel 5 eller 5 bred
    us_clothing_size:
      name: Klädstorlekar USA
      description: Anger klädstorlekar i USA, till exempel 8 eller 14
    us_cup_size:
      name: Kupstorlek USA
      description: Anger kupstorlekar i USA, till exempel C eller DDD
    us_mens_shoe_size:
      name: Skostorlekar män USA
      description: Anger USA:s skostorlekar för män, till exempel 10 eller 10 bred
    us_ring_size:
      name: Ringstorlekar USA
      description: Anger ringstorlekar i USA, till exempel 7 eller 9,5
    us_womens_shoe_size:
      name: Skostorlekar kvinnor USA
      description: Anger USA:s skostorlekar för kvinnor, till exempel 8 eller 8 bred
    usage:
      name: Användande
      description: Beskriver kamaxelns avsedda användningsområde/avstämning.
    usda_honey_grade:
      name: USDA-honungsklass
      description: Anger den officiella klassificering som tilldelats honungen av
        USA:s jordbruksdepartement (USDA).
    user_control_method:
      name: Metod för användarkontroll
      description: Anger hur användaren interagerar med maskinen (t.ex. inbyggd kontrollpanel,
        fjärrkontroll, app, röst), vilket bidrar till överväganden om användarvänlighet.
    vacuum_boost_reference_port:
      name: Referensport för vakuum/laddtryck
      description: Anger om regulatorn har en referensport på grenröret för vakuum/laddtryck
        och vilken typ av port.
    valve_base_shape:
      name: Ventilbasens form
      description: Identifierar gränssnittsgeometrin mellan ventilbasen och kanten
        (rund, konisk, sidoport, T-formad, etc.) vilket påverkar tätning och kompatibilitet
        mellan skum och inlägg.
    valve_core_type:
      name: Typ av ventilinsats
      description: Anger om ventilens kärna är avtagbar, fast eller kärnlös, information
        som påverkar underhållsprocedurer och kompatibilitet med verktyg för tätningsmedelsinjektion.
    valve_cover_gasket_material:
      name: Material för ventilkåpspackning
      description: Anger materialet i ventilkåpans packning som medföljer ventilkåpan,
        eller det rekommenderade packningsmaterialet vid försäljning utan packning
        (om tillämpligt).
    valve_cover_material:
      name: Material för ventilkåpa
      description: Primärt konstruktionsmaterial för ventilkåpan.
    valve_design:
      name: Ventildesign
      description: Identifierar konstruktionen/utformningen av motorventilen.
    valve_guard_coverage_area:
      name: Täckningsområde för ventilskydd
      description: Anger vilka delar av ventilsektionen som skyddet täcker.
    valvetrain_configuration:
      name: Utformning av ventilmekanism
      description: Anger kam-/ventilkonfiguration.
    varnish_formulation_base:
      name: Lackbas
      description: Anger den primära formuleringen/kemin för stränginstrumentlacken,
        vilket påverkar utseende, reversibilitet och kompatibilitet med befintliga
        ytbehandlingar.
    varnish_transparency_tint:
      name: Lacktransparens/toning
      description: Beskriver om lacken är genomskinlig eller tonad och, om den är
        tonad, den allmänna toningsnyansen.
    vegetable_matter_vm_content:
      name: Innehåll av vegetabiliskt material (VM)
      description: Mängd växtrester/föroreningar som finns i fibern.
    vegetable_preparation_style:
      name: Grönsaksberedningsmetod
      description: Beskriver hur grönsaken presenteras, skärs eller på annat sätt
        bereds före försäljning (t.ex. hel, tärnad, i buketter).
    vehicle_audio_dsp_form_factor:
      name: Utformning av fordonsljud-DSP
      description: Anger DSP-enhetens fysiska utformning/installationssätt.
    vehicle_battery_charger_features:
      name: Funktioner för fordonsbatteriladdare
      description: Listar driftlägen och inbyggda funktioner för fordonsbatteriladdaren
        (t.ex. underhållsläge, avsulfatering).
    vehicle_body_filler_form:
      name: Fysisk form av billackspackel
      description: Den fysiska formen/förpackningsstilen på spackelprodukten.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominell storlek på koaxialhögtalare i fordon
      description: Nominell högtalarstorlek som används i monteringen (t.ex. 6,5 tum,
        6x9 tum).
    vehicle_cover_size_class:
      name: Fordonsskyddets storleksklass
      description: Allmän storlekgruppering som anger vilken fordonsstorlek skyddet
        är utformat för att passa.
    vehicle_decor_set_items_included:
      name: Ingående artiklar i fordonsdekorationsset
      description: Listar de typer av dekorartiklar som ingår i tillbehörssetet (synlighet
        på komponentnivå för kund).
    vehicle_door_lock_actuation_method:
      name: Metod för aktivering av fordonsdörrlås
      description: Indikerar hur fordonets dörrlås aktiveras eller styrs.
    vehicle_door_lock_actuator_kit_contents:
      name: Innehåll i sats för fordonsdörrlåsmanöverdon
      description: Anger vad som ingår i manöverdonet (endast manöverdon vs. hårdvara/stänger/fästen/kablage).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfiguration av ledningsdragning för fordonsdörrlåsets manöverdon
      description: Anger den kabelkonfiguration som behövs för installationen (antal
        kablar och funktion).
    vehicle_door_lock_included_components:
      name: Komponenter som ingår i fordonsdörrlåset
      description: Listar vilka komponenter som ingår i paketet (användbart för byggsatser/monteringar).
    vehicle_electrical_connector_type:
      name: Typ av elektrisk anslutning för fordon
      description: Anger generatorns regulator/fältelektriska anslutning eller kontakttyp
        (exklusive B+ huvudutgångsstift).
    vehicle_equipment_fit_out_level:
      name: Utrustningsnivå för fordon
      description: Anger vilken nivå av polisutrustning som ingår i skåpbilen.
    vehicle_glass_cleaner_form:
      name: Produktformat för fordonsglasrengöring
      description: Fysiskt produktformat för fordonsglasrengöringsmedlet (t.ex. spray,
        skum, våtservetter, gel, koncentrat).
    vehicle_hitch_cover_illumination_type:
      name: Typ av belysning för dragkrokskydd
      description: Anger om dragkrokskyddet har belysning och vilken typ.
    vehicle_hitch_cover_mounting_type:
      name: Typ av montering för dragkrokskydd
      description: Indikerar metoden som används för att hålla kvar/fästa dragkroksskyddet
        i dragkroksfästet.
    vehicle_license_plate_finish:
      name: Ytbehandling av fordonets registreringsskylt
      description: Ytbehandling av plattan.
    vehicle_license_plate_frame_anti_theft_design:
      name: Stöldskyddsdesign för fordonsregistreringsskyltsram
      description: Säkerhetsrelaterade designelement avsedda att avskräcka från borttagning
        eller obehörig åtkomst.
    vehicle_license_plate_frame_plate_standard:
      name: Standard för ram till fordonsregistreringsskylt
      description: Registreringsskyltsstandard/region som ramen är dimensionerad för
        att passa.
    vehicle_license_plate_frame_profile:
      name: Fordonsregistrering – skyltsramsprofil
      description: Hur ramen avgränsar plattan (täckning/form) vilket påverkar läsbarhet
        och efterlevnad.
    vehicle_license_plate_mounting_hole_count:
      name: Antal monteringshål för fordonets registreringsskylt
      description: Antal monteringshål på plattan.
    vehicle_license_plate_mounting_hole_pattern:
      name: Hålmönster för montering av registreringsskylt
      description: Placeringsmönster för monteringshål på plattan.
    vehicle_license_plate_reflectivity:
      name: Reflektivitet hos fordonsregistreringsskylt
      description: Huruvida och hur plattans yta reflekterar ljus (viktigt för synlighet
        och laglighet för vissa dekorativa skyltar).
    vehicle_license_plate_size_standard:
      name: Standardstorlek för registreringsskyltar
      description: Anger den regionala/fordonsstandard som plattan är dimensionerad
        för att passa (avstånd mellan monteringshål och totala mått).
    vehicle_license_plate_text_style:
      name: Typsnitt för registreringsskylt
      description: Stil på skyltens tecken (om några), inklusive upphöjda kontra tryckta.
    vehicle_license_plate_theme:
      name: Tema för registreringsskylt
      description: Övergripande designtema för skyltens utsmyckning.
    vehicle_lift_actuation_method:
      name: Aktiveringsmetod för fordonslyft
      description: Hur lyften/domkraften drivs/manövreras för att höja fordonet.
    vehicle_lift_mounting_type:
      name: Typ av montering av fordonslyft
      description: Anger hur lyften är installerad eller förankrad i arbetsytan.
    vehicle_lift_type:
      name: Typ av fordonslyft
      description: Anger konstruktionsstilen för fordonshiss som används för service
        eller förvaring (t.ex. 2-stolpar, 4-stolpar, saxhiss).
    vehicle_magnet_attachment_type:
      name: Typ av fäste för fordonsmagnet
      description: Anger den primära fäst-/monteringsmetoden för produkter som säljs
        som fordonsmagneter (t.ex. endast magnetisk vs. magnetisk med självhäftande
        hjälp).
    vehicle_magnet_intended_use:
      name: Avsedd användning för fordonsmagnet
      description: Indikerar den primära avsedda användningen av fordonsmagneten.
    vehicle_mirror_adjustment_type:
      name: Typ av justering av fordonsspegel
      description: Anger hur spegeln justeras/styrs.
    vehicle_mirror_glass_type:
      name: Typ av backspegelglas
      description: Anger den optiska typen/formen för spegelglasytan.
    vehicle_organizer_features:
      name: Egenskaper för bilorganisatör
      description: Viktiga funktionella funktioner hos fordonsorganisatörer, såsom
        vikbarhet, vattentätt foder, isolerade fickor eller halkfri botten.
    vehicle_paint_chemistry_base:
      name: Billackens kemi/bas
      description: Anger färgens sammansättning/kemi som används i fordonslack.
    vehicle_polish_application_method:
      name: Metod för fordonspolering
      description: Anger den rekommenderade metoden eller verktyget för applicering
        av fordonspolish.
    vehicle_pursuit_package:
      name: Polispaket för fordon
      description: Anger om fordonet är utrustat med ett prestandapaket för polisbruk
        (t.ex. uppgraderad kylning, bromsar, fjädring och kalibrering).
    vehicle_safety_equipment_position:
      name: Placering av fordonssäkerhetsutrustning
      description: Anger var på eller i fordonet säkerhetsutrustningen är avsedd att
        användas eller installeras.
    vehicle_safety_equipment_visibility_features:
      name: Synlighetsfunktioner för fordonssäkerhetsutrustning
      description: Indikerar synlighetsförbättrande funktioner utformade för att öka
        synligheten.
    vehicle_seat_row:
      name: Bilens sätesrad
      description: Anger vilken bakre rad sätet är till för (andra raden vs. tredje
        raden), inklusive användning för extra utfällbart säte.
    vehicle_steering_assist_type:
      name: Typ av styrhjälp för fordon
      description: Anger vilket styrhjälpsystem komponenten är avsedd för.
    vehicle_steering_wheel_lock_form_factor:
      name: Utformning av rattlås för fordon
      description: Beskriver låsets fysiska stil och hur det samverkar med ratten
        (och eventuellt andra reglage).
    vehicle_wax_polish_product_form:
      name: Produktform för fordonsvax/polering
      description: Den fysiska formen/förpackningstypen för vaxet, polermedlet, skyddsmedlet
        eller tätningsmedlet.
    vehicle_wheel_valve_stem_type:
      name: Typ av fordonshjulsventil
      description: Anger vilken ventilspindeltyp som stöds eller ingår.
    vehicle_windshield_fluid_formula:
      name: Formel för vindrutevätska
      description: Primärt rengörings-/borttagningsfokus för vindrutevätskans formulering.
    veil_length_type:
      name: Typ av slöjlängd
      description: Klassificerar en slöja med hjälp av standardlängdterminologi snarare
        än numeriska mått.
    vellum_opacity_level:
      name: Pergamentets opacitetsnivå
      description: Anger hur genomskinligt eller ogenomskinligt pergamentpapperet
        är.
    ventilation_configuration:
      name: Utformning av ventilation
      description: Hjälmens primära ventilation/luftintag och avgaskonfiguration.
    ventilation_control_type:
      name: Styrningstyp för ventilation
      description: Anger vilken typ av luftflödeshantering som är inbyggd i hjälmen.
    ventilation_level:
      name: Ventilationsnivå
      description: Indikerar den relativa luftflödes-/ventilationsdesignen för rustningen.
    venting_design:
      name: Ventilationsdesign
      description: Anger om och hur locket är ventilerat för att minska kondens och
        mögel under förvaring.
    vestibule_type:
      name: Vestibultyp
      description: Klassificerar vestibulens layout i förhållande till tältet.
    vibraphone_bar_material:
      name: Material för vibrafonstången
      description: Materialet i vibrafonens tonstavar/tangenter (de ljudproducerande
        stavarna).
    vibraphone_motor_type:
      name: Vibrafonmotortyp
      description: Typ av motor som används för att driva de roterande resonatorfläktarna
        för vibrato (om sådan finns).
    vibraphone_range_octaves:
      name: Vibrafonomfång (oktaver)
      description: Vibrafonens tonhöjdsomfång uttryckt i oktaver (t.ex. 3 oktaver,
        3,5 oktaver).
    vibraphone_resonator_tube_material:
      name: Material i vibrafonresonatorrör
      description: Materialet i vibrafonresonatorrören under tonstavarna.
    vibraphone_tuning_standard:
      name: Vibrafonstämningsstandard
      description: Referenstonhöjd som används för stämning (A=440 Hz, etc.).
    viewing_sides:
      name: Visningssidor
      description: Anger hur många sidor på resultattavlan som visar information (enkelsidig,
        dubbelsidig, fyrsidig, etc.).
    vintage_advertisement_decade:
      name: Vintagereklamens årtionde
      description: Anger vilket årtionde annonsen ursprungligen trycktes eller producerades
        (ungefärligt om det exakta året är okänt).
    vintage_advertisement_format:
      name: Format på vintageannons
      description: Anger det fysiska formatet eller mediet för det vintage reklamföremålet.
    vintage_advertisement_subject_category:
      name: Ämneskategori för vintagereklam
      description: Identifierar vilken produkt-/tjänstekategori som annonseras (vad
        annonsen är till för).
    vintage_classic_truck_cab_type:
      name: Hytttyp för vintage- och klassisk lastbil
      description: Hyttkonfiguration/karosseristil för lastbilens passagerarutrymme.
    virginia_tech_helmet_star_rating:
      name: Virginia Tech:s stjärnklassificering för hjälmar
      description: Säkerhetsklassificering tilldelad av Virginia Tech Helmet Lab (0–5
        stjärnor).
    virtual_analog_synthesizer_form_factor:
      name: Fysiskt format för virtuell analog synthesizer
      description: Anger det fysiska formatet för synthesizerchassit (klaviatur vs.
        modul/stativ).
    viscosity_thickness:
      name: Viskositet/tjocklek
      description: Beskriver hur tjock eller flytande engoben är som den säljs eller
        vid rekommenderad arbetskonsistens.
    vise_configuration:
      name: Utformning av skruvstycke
      description: Anger den strukturella layout eller antalet delar i skruvstädssetet,
        vilket påverkar portabilitet och installationskomplexitet.
    visibility_features:
      name: Synlighetsfunktioner
      description: Framhäver designelement som förbättrar åkarens synlighet i trafiken.
    visor_brim_type:
      name: Visir/brättetyp
      description: Anger förekomst och modell av skärm/brätte på hjälmen.
    visor_configuration:
      name: Utformning av skärm
      description: Beskriver förekomsten och stilen på eventuella inbyggda visir eller
        ansiktsskydd.
    visor_lens_finish:
      name: Visirlinsens finish
      description: Anger nyans, optisk finish eller grafisk stil som tillämpas på
        visirlinsen.
    visor_style:
      name: Visirstil
      description: Anger om huvan har en skärm/brätte och dess konfiguration.
    voc_compliance_standard:
      name: VOC-överensstämmelsestandard
      description: Produktens deklarerade överensstämmelse med VOC-regler (i förekommande
        fall).
    voc_regulatory_class:
      name: VOC-regleringsklass
      description: Deklarerad VOC-reglerings-/efterlevnadsklass för produkten (enligt
        etikett/säkerhetsdatablad), använd för regionala reglerings- och miljörestriktioner.
    vodka_base_ingredient:
      name: Basingrediens för vodka
      description: Primär jordbruksingrediens från vilken vodkan destilleras (t.ex.
        vete, potatis, majs).
    voice_coil_configuration:
      name: Konfiguration av talspole
      description: Antal/arrangemang av talspolar för flexibilitet i ledningsdragning
        och impedansalternativ.
    voice_effects:
      name: Rösteffekter
      description: Inbyggda sångareffekter som stöds av karaoke-setet.
    voltage_rating_type:
      name: Spänningsklassningstyp
      description: Anger om säkringens spänningsklassificering gäller för växelström,
        likström eller båda.
    voltage_regulator_connector_type:
      name: Spänningsregulatorns anslutningstyp
      description: Anger den kopplings-/terminalstil som används för att ansluta regulatorn
        till fordonets kablage/ generator.
    wader_foot_type:
      name: Typ av vadarstövel
      description: Anger om vadarbyxorna har integrerade kängor eller separata strumpfötter.
    wader_sole_type:
      name: Typ av vadarsula
      description: Anger yttersulans material eller grepptyp som används på vadarstövlar
        eller vadarbyxor med stövelsula.
    waistband_style:
      name: Linningsstil
      description: Beskriver midjebandets konstruktion och hur det är fäst eller justerat
        för passform och komfort.
    wakeboard_binding_mounting_pattern:
      name: Monteringsmönster för wakeboardbindning
      description: Anger vilket insats-/plattmönster på wakeboarden som bindningarna
        är kompatibla med.
    wakeboard_riding_style:
      name: Wakeboardåkningsstil
      description: Klassificerar den avsedda miljön eller användningsstilen för wakeboarden.
    wall_decal_style:
      name: Typ av väggdekal
      description: Anger hur dekalen är producerad/applicerad (t.ex. stansad, överföringsdekal,
        klistermärkesark).
    wallyball_equipment_included:
      name: Utrustning för wallyball som ingår
      description: Listar de specifika delarna som medföljer i wallyball-setet så
        att kunderna vet exakt vad de köper och kan jämföra paket.
    warp_beam_type:
      name: Typ av varpbom
      description: Anger vävstolens inkluderade eller installerade varpbalkkonfiguration
        (balkkonfigurationen som medföljer vävstolen).
    washability:
      name: Tvättbarhet
      description: Anger om limmet rengörs med vatten och/eller är tvättbart efter
        applicering.
    watch_band_design:
      name: Klockarmband – design
      description: Beskriver konstruktionsstilen eller designmönstret för ett klockarmband
        (t.ex. NATO, Milanese, Link).
    watch_movement:
      name: Klockans urverk
      description: Anger mekanismen som driver klockan, en nyckelfaktor som kunderna
        använder för att skilja mellan modeller.
    water_activation:
      name: Vattenaktivering
      description: Om fyren kan aktiveras automatiskt vid nedsänkning i vatten (vanligt
        för EPIRB-system av kategori I/II).
    water_chamber_configuration:
      name: Konfiguration av vattenkammaren
      description: Beskriver madrassens inre blåsuppbyggnad, såsom en- eller tvåkammare,
        vilket påverkar stöd, temperaturkontroll och störningar från medsovare.
    water_dispensing_mechanism:
      name: Vattenutmatningsmekanism
      description: Definierar hur vatten släpps ut från enheten, till exempel genom
        kranar, sprutmunstycken eller självflöde.
    water_exposure_protection_level:
      name: Skyddsnivå för vattenexponering
      description: Anger produktens skyddsnivå vid exponering för vatten (t.ex. stänk
        kontra tillfällig nedsänkning i vatten). Använd IP-klassificering (Ingress
        Protection) när en officiell IP-kod finns tillgänglig.
    water_fed_design:
      name: Typ av vattenapplicering
      description: Anger om borsten är avsedd att användas med rinnande vatten via
        ett genomflödeshandtag eller slangkoppling.
    water_gun_features:
      name: Egenskaper för vattenpistol
      description: Utmärkande funktioner och medföljande kapacitet hos vattenpistolen.
    water_gun_operating_mechanism:
      name: Vattenpistolens manövermekanism
      description: Hur vattenpistolen trycksätter och trycker ut vatten under användning.
    water_gun_spray_pattern:
      name: Vattenpistolens sprutmönster
      description: Den typ av vattenstråle som produceras av munstycket under avfyrning.
    water_heating_method:
      name: Vattenuppvärmningsmetod
      description: Beskriver hur, eller om, vattnet värms upp före användning – till
        exempel solabsorption, propanbrännare, elektriska element, batteridriven uppvärmning,
        värmelagrande isolering eller ouppvärmt.
    water_mattress_construction:
      name: Vattenmadrasskonstruktion
      description: Anger vattenmadrassens konstruktionsstil (t.ex. hård eller mjuk
        sida), vilket avgör ram och den övergripande känslan.
    water_play_features:
      name: Egenskaper för vattenlek
      description: Vattenaktivitetskomponenter som ingår i vattenparken/rutschkanan.
    water_polo_competition_approval:
      name: Vattenpolo – tävlingsgodkännande
      description: Identifierar det styrande organ eller den tävlingsnivå för vilken
        bollen är officiellt godkänd eller certifierad.
    water_polo_goal_type:
      name: Typ av vattenpolomål
      description: Klassificerar målets strukturella eller monteringskonfiguration
        (t.ex. flytande, däcksmonterat, portabelt).
    water_pump_drive_type:
      name: Vattenpumpdriftstyp
      description: Anger hur vattenpumpen drivs/manövreras i fordonets kylsystem.
    water_pump_housing_material:
      name: Material för vattenpumpshöljet
      description: Material i vattenpumphuset/kroppen.
    water_pump_impeller_material:
      name: Vattenpumpens impellermaterial
      description: Anger materialet i vattenpumpens pumphjul (intern rotor/vinge som
        flyttar kylvätskan).
    water_pump_mounting_type:
      name: Monteringstyp för vattenpump
      description: Anger vattenpumpens monterings-/utformningsstil för motormontering
        (t.ex. bultad hölje kontra patron/insats).
    water_purification_method:
      name: Metod för vattenrening
      description: Identifierar den primära mekanismen genom vilken produkten gör
        vatten säkert att dricka i fält (t.ex. pump kontra gravitationsmatning kontra
        UV-ljus).
    water_resistance:
      name: Vattentålighet
      description: Anger graden av väderskydd som tillhandahålls, till exempel vattentätt
        eller vattenbeständigt.
    water_resistance_level:
      name: Vattentålighetsnivå
      description: Anger om textilien är vattenavvisande och i vilken grad.
    water_resistance_rating_case_protection_level:
      name: Vattentäthetsklass (fodralets skyddsnivå)
      description: Indikerar nivån av vattentålighet/skydd som den rullande lådan
        ger (marknadsföringsmässig nivå, inte elektronisk IP-tätning), t.ex. vattentålig
        kontra vattentät.
    water_rocket_kit_items_included:
      name: Medföljande delar i vattenraketssats
      description: Viktigaste komponenter som ingår i produktpaketet.
    water_rocket_propulsion_type:
      name: Typ av drivmedel för vattenraket
      description: Primär framdrivnings-/energikälla som används för att skjuta upp
        raketen.
    water_rocket_recovery_system:
      name: Återfångningssystem för vattenraket
      description: Metod som används för att återfånga raketen efter uppskjutning.
    water_ski_base_design:
      name: Design av basen för vattenskidor
      description: Anger bottenprofilen för vattenskidor, vilket påverkar hanteringsegenskaperna.
    water_ski_fin_type:
      name: Typ av fena för vattenskidor
      description: Anger fenkonfigurationen för en vattenskida, vilket påverkar riktningsstabilitet
        och manövrerbarhet.
    water_source:
      name: Vattenkälla
      description: Identifierar vattnets ursprung innan kolsyretillsättning
    water_sports_safety_standard:
      name: Säkerhetsstandard för vattensporter
      description: Listar formella säkerhets- eller flytväststandarder som produkten
        uppfyller (t.ex. CE EN 1385 för hjälmar, ISO 12402-5 för flytvästar, USCG
        typ III).
    water_table_feature_set:
      name: Funktionsuppsättning för vattenbord
      description: Framhäver inbyggda lekfunktioner i vattenbordet, såsom vattenfall,
        sprutor, pumpar eller bassänger i flera nivåer.
    water_table_items_included:
      name: Vattenbordsartiklar som ingår
      description: Anger vilka tillbehör som medföljer vattenbordssetet (t.ex. båtar,
        koppar, trattar, figurer).
    water_table_water_source_type:
      name: Typ av vattenkälla för vattenbord
      description: Anger hur vattenbordet fylls eller förses med vatten.
    waterbed_stabilization_level:
      name: Stabiliseringsnivå för vattenmadrassen
      description: Indikerar graden av vågreducering eller rörelsekontroll som vattenmadrassen
        tillhandahåller.
    watercolor_ink_water_resistance_after_drying:
      name: Vattenbeständighet för akvarellfärg (efter torkning)
      description: Anger om akvarellfärgen blir vattenbeständig/vattentät efter torkning
        (enligt tillverkarens uppgift).
    watercraft_care_application_area:
      name: Användningsområde för vattenskotervård
      description: Anger det huvudsakliga område eller den huvudsakliga komponenten
        av en vattenfarkost som produkten är avsedd att användas på.
    watercraft_drive_mechanism:
      name: Drivmekanism för vattenfarkoster
      description: Beskriver den specifika framdrivningsmekanism ombord som är installerad
        eller stödd.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Bränsletankssändare för vattenfarkoster – mönster
      description: Anger monteringsmönster/standard för bränsletankens mätare och
        kompatibla mätare (t.ex. vanliga marina bultmönster).
    watercraft_fuel_tank_shape:
      name: Form på bränsletank för vattenfarkoster
      description: Beskriver bränsletankens övergripande fysiska utformning för att
        möjliggöra utrymmes-/inpassningsplanering.
    watercraft_hull_material:
      name: Material för vattenskoterskrov
      description: Anger det primära materialet för skrovkonstruktionen.
    watercraft_ignition_part_voltage:
      name: Spänning för tändningsdelen i vattenfarkosten
      description: Nominell spänning/krav för tändningsdelen (i förekommande fall),
        t.ex. 12 V-system.
    watercraft_impeller_material_grade:
      name: Materialkvalitet för vattenskotrars pumphjul
      description: Anger materialet i vattenskoterns pumphjul (t.ex. neoprengummi,
        nitril, brons).
    watercraft_lighting_certification_compliance:
      name: Certifiering/efterlevnad av belysning för vattenfarkoster
      description: Anger vilken överensstämmelse med regler/standarder som lampan
        är certifierad för marint bruk (t.ex. USCG/ABYC/COLREGs-kompatibel).
    watercraft_motor_mount_adjustment_features:
      name: Justeringsfunktioner för vattenskoterns motorfäste
      description: Fästets justeringskapacitet (t.ex. lutning, lyftning, glidning)
        som påverkar användbarhet och passform.
    watercraft_piston_part_type:
      name: Typ av kolvdel för vattenskoter
      description: Identifierar vilken kolvrelaterad komponent listan representerar.
    watercraft_propeller_blade_rake:
      name: Vattenfarkostens propellerbladslutning
      description: Anger bladets lutning (bladvinkel i förhållande till navet), vilket
        påverkar bågens lyft och prestanda.
    watercraft_propeller_rotation_direction:
      name: Vattenfarkostens propellerrotationsriktning
      description: Anger propellerns rotationsriktning/högervridning för kompatibilitet
        med drivlinan (t.ex. höger/standard vs. vänster/motroterande).
    watercraft_pump_stage_impeller_role:
      name: Vattenskoterns pumpsteg / pumphjulets funktion
      description: Identifierar om pumphjulet är avsett för en specifik pumpfunktion
        (t.ex. råvatten-/sjöpump, kylvätskecirkulation, jetpump).
    watercraft_registration_status:
      name: Registreringsstatus för vattenfarkoster
      description: Anger om segelbåten inkluderar äganderätts- och/eller registreringsdokumentation.
    watercraft_safety_equipment_activation_type:
      name: Aktiveringstyp för säkerhetsutrustning för vattenfarkoster
      description: Primär metod för att aktivera säkerhetsenheten (för fyrljus/MOB-larm/PLB),
        skild från uppblåsning.
    watercraft_steering_cable_core_material:
      name: Kärnmaterial för styrvajern till vattenskotern
      description: Anger materialet i den inre vajern/kärnan som överför kraft.
    watercraft_steering_cable_hardware_included:
      name: Ingående hårdvara för styrvajer till vattenskoter
      description: Anger vilken installationshårdvara och vilka tillbehör som ingår
        med styrvajern.
    watercraft_steering_cable_system_type:
      name: Typ av styrvajersystem för vattenskoter
      description: Anger den styrsystemsarkitektur som kabeln är konstruerad för (t.ex.
        roterande, kuggstång).
    watercraft_steering_wheel_hub_bore_type:
      name: Vattenfordon – typ av nav/borrning för ratt
      description: Anger stilen för mittmontering/hålgränssnitt (t.ex. konisk, kilspår)
        där hjulet passar i ett nav eller en adapter.
    watercress_variety:
      name: Vattenkrasse-sort
      description: Identifierar den specifika sorten eller typen av krasse som säljs.
    waterproof_level:
      name: Vattentäthetsnivå
      description: Anger skornas vattenskyddsnivå, inklusive eventuella garantirelaterade
        vattentäthetsanspråk.
    wax_blend_composition:
      name: Vaxblandningens sammansättning
      description: Listar de vaxmaterial som blandats i produkten och/eller den marknadsförda
        blandningstypen.
    wax_coat_type:
      name: Typ av vaxbeläggning
      description: Anger om vaxet är avsett som baslack, topplack eller universal-/enskiktsformula.
    wax_hardness:
      name: Vaxhårdhet
      description: Indikerar vaxets relativa hårdhet, vilket påverkar hållbarhet och
        glid på olika snötyper.
    wax_physical_form:
      name: Vaxets fysiska form
      description: Anger den fysiska formen som det råa stearinet levereras i.
    wax_recommended_candle_application:
      name: Rekommenderad ljustyp för vaxet
      description: Anger den/de primära ljusstil(ar) som vaxet är formulerat för.
    wax_tackiness_level:
      name: Klibbighetsgrad för vax
      description: Beskriver graden av klibbighet/grepp som vaxet ger på bladet.
    weapon_system_integration:
      name: Integrering av vapensystem
      description: Anger om fordonet har integrerade vapensystem eller fästen.
    weather_suitability:
      name: Väderlämplighet
      description: Indikerar de miljöförhållanden som handskarna är avsedda för, såsom
        spel i kallt eller vått väder.
    weave_finish:
      name: Väv/finish
      description: Beskriver den primära tygväven eller ytbehandlingen som påverkar
        slipsens textur och glans.
    weave_style:
      name: Typ av vävning
      description: Anger det traditionella vävmönstret som används vid tillverkning
        av Panamahatten, vilket påverkar andningsförmåga, flexibilitet, utseende och
        pris.
    weave_type:
      name: Vävtyp
      description: Identifierar tygets väv-/konstruktionsstil (handelsnamn för väv)
        som påverkar textur, glans och fall.
    weaving_beater_edge_type:
      name: Typ av vävslags kant
      description: Beskriver arbetskantprofilen på den platta vävslagen som är i kontakt
        med inslaget (t.ex. rak vs. tandad).
    weaving_beater_style:
      name: Modell av vävslag
      description: Identifierar den funktionella stilen/formatet för den platta vävslagaren.
    weaving_shuttle_tip_style:
      name: Vävningsskyttelspetsstil
      description: Anger skyttelns främre spets/nosdesign, vilket påverkar hur den
        passerar genom skälet och sannolikheten för att fånga varptrådar.
    weaving_shuttle_use_case:
      name: Användningsområde för vävskyttel
      description: Anger den avsedda vävapplikation som skytteln är utformad eller
        optimerad för.
    webbing_construction_type:
      name: Konstruktionstyp för bandväv
      description: Beskriver den fysiska väven eller flätstilen hos bandet, vilket
        påverkar hantering, styrka och avsedd användning.
    webbing_design:
      name: Banddesign
      description: Beskriver stilen på vävbandet mellan fingrarna, vilket påverkar
        styrketräning och framdrivning.
    weight_adjustability:
      name: Justerbarhet för vikt
      description: Beskriver om produktens motstånd kan ändras av användaren (t.ex.
        selekterbart eller belastbart) eller är fast inställt på en enda vikt.
    weight_integration_system:
      name: Viktintegrationssystem
      description: Beskriver om och hur ballastvikter är integrerade i BCD:n (flytkontrollenheten)
        (t.ex. avtagbara viktfickor, inga, valfritt tillägg).
    weight_plate_compatibility:
      name: Viktskivors kompatibilitet
      description: Definierar vilka viktplattor som maskinen accepterar (olympisk,
        standard eller båda).
    weight_plate_style:
      name: Typ av viktskiva
      description: Klassificerar viktplattans design/typ (t.ex. olympisk, stötdämpande,
        selektiv) för snabb kompatibilitetsfiltrering.
    weightlifting_belt_style:
      name: Typ av tyngdlyftningsbälte
      description: Kategoriserar remmens övergripande design eller syftesdrivna konfiguration
        (t.ex. hävstångsrem, dopprem, konisk rem).
    weightlifting_federation_certification:
      name: Certifiering för tyngdlyftningsförbundet
      description: Officiellt godkännande eller överensstämmelse med styrkesportförbunds
        krav, såsom IPF eller IWF.
    wetsuit_boot_height:
      name: Våtdräktens stövelhöjd
      description: Klassificerar stövelns höjd/snitt på benet, vilket påverkar täckning,
        rörlighet och vatteninträngning.
    wetsuit_entry_system:
      name: Våtdräktens påtagningssystem
      description: Beskriver typen och placeringen av öppnings-/dragkedjesystemet
        som används för att komma på våtdräkten.
    wetsuit_seam_construction:
      name: Våtdräktens sömkonstruktion
      description: Anger hur sömmarna är byggda och förseglade, vilket påverkar värme,
        flexibilitet och hållbarhet.
    wheat_product_form:
      name: Produktform för vete
      description: Anger veteproduktens fysiska eller bearbetade form.
    wheel_arrangement:
      name: Hjularrangemang
      description: Anger bromskonfigurationen som finns på varukorgens hjul eller
        länkhjul.
    wheel_brake_type:
      name: Typ av hjulbroms
      description: Uppgift om bromskonfigurationen som finns på varukorgens hjul eller
        länkhjul.
    wheel_chock_grip_features:
      name: Hjulklossarnas greppfunktioner
      description: Drag- och greppfunktioner som förbättrar hållkraften på underlag
        och mot däck.
    wheel_cleaner_acidity_ph_category:
      name: Hjulrengöringsmedel surhetsgrad / pH-kategori
      description: Anger om fälgrengöraren är sur, neutral eller alkalisk (och eventuellt
        om den är marknadsförd som pH-balanserad).
    wheel_cleaner_formula_type:
      name: Typ av fälgrengöringsmedel
      description: För fälgrengöringsmedel och relaterade tvättlösningar anger detta
        produktens primära formelkategori (t.ex. syrabaserad, icke-syra, pH-neutral/balanserad
        eller järnreaktiv).
    wheel_construction_type:
      name: Konstruktionstyp för hjul
      description: Anger tillverknings-/konstruktionsmetoden för hjulet.
    wheel_contaminant_target:
      name: Mål för föroreningar på hjul
      description: Anger de primära föroreningstyper som rengöringsmedlet är utformat
        för att avlägsna.
    wheel_core_type:
      name: Typ av hjulkärna
      description: Beskriver hjulkärnans konstruktionsstil, vilket påverkar vikt,
        styvhet och energiöverföring.
    wheel_cylinder_inlet_port_thread_standard:
      name: Hjulcylinderns inloppsports gängstandard
      description: Anger bromsledningens inloppsports gängstandard på hjulcylindern
        (t.ex. metrisk bubblautvidgning vs. SAE inverterad utvidgning).
    wheel_fastener_seat_type:
      name: Hjulfäste, sätestyp
      description: Anger den typ av hjulmutter/bultfäste som passar till hjulet (t.ex.
        konisk/konisk, kula/radie, platt, mag/skaft).
    wheel_illumination:
      name: Hjulbelysning
      description: Anger om hjulet har inbyggd belysning eller självlysande funktioner.
    wheel_material:
      name: Hjulmaterial
      description: Identifierar hjulens primära sammansättning, vilket påverkar hållbarhet,
        grepp och vibrationsdämpning.
    wheel_profile:
      name: Hjulprofil
      description: Beskriver hjulets tvärsnittsform som påverkar hastighet, grepp
        och smidighet.
    wheel_setup_type:
      name: Typ av hjuluppsättning
      description: Definierar hjulkonfigurationsstilen som används på skridskorna.
    wheel_system_finish:
      name: Hjulsystemfinish
      description: Ytbehandling/beläggning av fälgar/hjul och vissa hjuldelar/tillbehör.
    whip_style:
      name: Piskstil
      description: Klassificerar produkten efter dess specifika piska eller ridspö
        eller avsedda disciplin.
    whipped_cream_base:
      name: Bas för vispad grädde
      description: Identifierar den primära basingrediensen som används för att göra
        vispgrädden, såsom grädde eller kokos.
    whipped_cream_form:
      name: Vispgrädde – försäljningsform
      description: Anger i vilken fysisk form vispgrädden säljs
    whistle_head_material:
      name: Material i visselpipans munstycke
      description: Anger materialet i visslans huvud/munstycke (fippleblock/huvud).
    whistle_light_features:
      name: Funktioner för visslans ljus
      description: Anger om visslan har integrerade ljuseffekter för fester (t.ex.
        LED).
    whistle_purpose:
      name: Vissla – syfte
      description: Identifierar visslans primära avsedda användning (sportcoachning,
        marin säkerhet, hundträning etc.).
    whistle_sound_style:
      name: Typ av visslingsljud
      description: Beskriver stilen/karaktären på visslans ljud (t.ex. entonig kontra
        flertonig).
    white_glue_finish_appearance_when_dry:
      name: Vitt limm – torkad yta/finish
      description: Anger hur limmet ser ut efter torkning för hantverks-/kontorsbruk
        (t.ex. genomskinlig eller ogenomskinlig).
    white_glue_washability:
      name: Tvättbarhet för vitt lim
      description: Anger om torkat lim kan tvättas bort/rengöras från tyger eller
        hud.
    whitewater_kayak_style:
      name: Typ av forskajak
      description: Primär designintention inom forssegmentet (t.ex. bäckbåt, flodbåt,
        lekbåt).
    whitewater_rating_class:
      name: Forsklassificering (klass)
      description: Högsta internationella klassen på flodsvårighetsskalan som flotten
        är klassad att hantera.
    whorl_mounting_interface:
      name: Monteringsgränssnitt för whorl
      description: Hur kransen fästs på spinnrocken (axelstil/koppling).
    wick_construction_type:
      name: Konstruktionstyp för veke
      description: Vekens konstruktion/stil (flätad, platt, fyrkantig flätad, kärnad,
        trä, etc.).
    wick_core_type:
      name: Vekekärntyp
      description: Anger om veken är kärnlös eller innehåller ett kärnmaterial (t.ex.
        papperskärnad eller zinkkärnad) vilket påverkar styvhet och brinnegenskaper.
    wick_tab_crimp_type:
      name: Typ av krympning för vekflik
      description: Hur vekfliken fäster veken (konstruktion/krympningsstil).
    wick_tab_material:
      name: Material för veketåga
      description: Materialet i den bifogade fliken/hållaren (vanligtvis tennplåt),
        relevant för korrosionsbeständighet och regulatoriska preferenser (t.ex. undvikande
        av bly).
    wick_tab_shape:
      name: Vekflikens form
      description: Form/utformning på vekens flikplatta.
    wick_type_included:
      name: Typ av veke ingår
      description: Anger vekmaterialet/typen som ingår i satsen.
    wig_fiber_material:
      name: Perukfibermaterial
      description: Identifierar den primära fibern som används för perukens hår så
        att kunden enkelt kan välja mellan människohår och syntetiska alternativ med
        olika styling- och livslängdsegenskaper.
    wildlife_attractant_scent:
      name: Doftmedel för att locka vilt
      description: Identifierar den primära doften som används för att locka till
        sig vilda djur, inklusive dofter av naturlig mat och feromonliknande dofter.
    willow_grade:
      name: Pilträ - kvalitet
      description: Anger kvalitetsgraden för det använda pilträdet, vilket indikerar
        ådringsstruktur och övergripande prestationsnivå.
    willow_type:
      name: Typ av pilträ
      description: Identifierar vilken typ av pilträ eller alternativt material som
        används för slagträets blad, vilket i hög grad påverkar prestanda, hållbarhet
        och pris.
    wind_up_mechanism_type:
      name: Typ av uppvridningsmekanism
      description: Anger hur leksaken lindas eller aktiveras.
    wind_up_toy_movement_pattern:
      name: Uppdragsleksaks rörelsemönster
      description: Beskriver den huvudsakliga rörelsen som uppstår vid lindning.
    windbreak_purpose:
      name: Syfte med vindskydd
      description: Definierar den primära avsedda användningen av vindskyddet.
    windfoil_board_mounting_system:
      name: Monteringssystem för vindfoilbräda
      description: Anger folielådan eller monteringsgränssnittet som är inbyggt i
        vindfoilbrädan.
    windfoil_sail_style:
      name: Windfoil-segelstil
      description: Klassificerar seglet efter avsedd åkstil eller disciplin.
    winding_direction:
      name: Lindningsriktning
      description: Indikerar rotationsmönstret som stöds av klockuppdragningsmaskinen
        (medurs, moturs eller dubbelriktad).
    winding_method:
      name: Lindningsmetod
      description: Hur inslaget är avsett att lindas/laddas för användning i skytteln.
    winding_speed_control_type:
      name: Lindningshastighetskontrolltyp
      description: Indikerar den metod som används för att kontrollera lindningshastigheten
        under användning.
    winding_type:
      name: Lindningstyp
      description: Anger bassträngens (yttre omslutningsprofil) lindningskonstruktion.
    windlass_control_station_type:
      name: Ankarspel – typ av kontrollstation
      description: Typ av kontrollgränssnitt som ingår eller stöds för att manövrera
        ankarspelet.
    windlass_mount_type:
      name: Typ av ankarspelsfäste
      description: Var/hur ankarspelet är avsett att monteras på båten.
    window_component_location:
      name: Fönsterkomponentens placering
      description: Anger vilket fönster/vilken öppning delen gäller i fordonet (t.ex.
        vindruta, dörrglas, bakruta eller sidoruta).
    window_configuration:
      name: Fönsterkonfiguration
      description: Anger finish/toning/sekretessbehandling av fönsterglas i motorfordon.
    window_glass_construction:
      name: Fönsterglaskonstruktion
      description: Anger säkerhets-/lamineringskonstruktionen för motorfordons glasruta.
    window_glass_features:
      name: Fönsterglas – specifikation
      description: Anger om glaset stöder integrerade fordonstekniker (t.ex. regnsensorplatta,
        kamerafäste).
    window_glass_finish:
      name: Fönsterglasfinish
      description: Anger finish/toning/skyddsbehandling av fönsterglas i motorfordon.
    window_glass_tint_color:
      name: Färg på toning av fönsterglas
      description: Anger färgtonen på den nyans som finns i glaset (inte den allmänna
        produktfärgen).
    window_glass_tint_level:
      name: Toningsnivå för fönsterglas
      description: Anger den ungefärliga fabriksmonterade toningsnivån på fönsterglaset
        (gäller ej vid eftermonterad film). Beskrivande nivåer som används då exakt
        VLT inte är känt.
    window_net_latch_mechanism:
      name: Fönsternätets spärrmekanism
      description: Anger den spärr-/upplåsningsmekanism som används för fönsternätet
        (t.ex. tryckknapp, spak, säkerhetsbältesspänne).
    window_net_mounting_hardware:
      name: Monteringsutrustning för fönsternät
      description: Identifierar vilken typ av monteringsutrustning eller fästmetod
        som används för att installera fönsternätet (t.ex. klämma, skruvar, krok/stång),
        eller om utrustning ingår.
    window_net_opening_direction:
      name: Fönsternätets öppningsriktning
      description: Anger hur fönsternätet öppnas/släpps i förhållande till den boende
        för utgång och regelefterlevnad.
    window_regulator_operation:
      name: Fönsterhiss – operativ funktion
      description: Anger hur fönsterhissen manövreras (manuell vev eller elektrisk).
    windshield_coverage_area:
      name: Vindrutans täckningsområde
      description: Anger vilka delar av fordonets främre yttre del som vindruteskyddet
        är utformat för att skydda (t.ex. endast vindruta kontra inkluderar vindrutetorkare,
        speglar, sidorutor eller motorhuvskanten).
    windshield_mount_attachment_method:
      name: Metod för montering av vindruta
      description: Anger hur fästet fäster eller greppar vindrutans yta.
    windshield_washer_fluid_seasonality:
      name: Säsongsanpassning för vindrutespolarvätska
      description: Anger avsedd säsong/klimat eller primär användning för spolarvätskans
        sammansättning (t.ex. vinteravisning, sommartvätt, året runt-användning).
    windsurf_fin_style:
      name: Typ av vindsurfingfena
      description: Klassificerar fenan efter den avsedda seglingsdisciplinen eller
        användningsstilen (t.ex. våg, slalom, sjögräs).
    windsurfing_connection_standard:
      name: Standard för vindsurfingkoppling
      description: Mekaniskt gränssnitt eller lådtyp som används för att fästa delen
        på brädan eller riggen.
    windsurfing_sail_style:
      name: Modell av vindsurfingsegel
      description: Klassificerar seglets avsedda disciplin eller användningsområde,
        såsom våg, freeride eller foil.
    wine_additive_type:
      name: Typ av vintillsats
      description: Anger vilken typ av rödvinsprodukt detta är (ingrediens, tillsats,
        jäst, klarningsmedel, sats, etc.).
    wine_body:
      name: Vinkropp
      description: Beskriver vinets upplevda vikt och munkänsla.
    wine_carbonation:
      name: Vinkolsyrning
      description: Anger om vinet är stilla, pärlande eller mousserande och, i förekommande
        fall, brusintensiteten.
    wine_making_ingredient_type:
      name: Typ av ingrediens för vinframställning
      description: Anger den funktionella ingredienskategorin för konsumtionstillsatser
        och ingredienser för vinframställning.
    wine_making_stage:
      name: Vinframställningsfas
      description: Identifierar vilket steg i vinframställningsprocessen produkten
        är avsedd för.
    wine_style:
      name: Vinstil
      description: Klassificerar vinets breda produktionsstil utöver färg, såsom stilla,
        mousserande eller starkvin.
    winemaking_process_stage:
      name: Vinframställningsprocessens steg
      description: Anger det primära steget i vinframställningsprocessen som produkten
        är avsedd för.
    wing_count:
      name: Antal vingar
      description: Antal vingar/armar på boomerangen.
    wing_handle_type:
      name: Typ av vinghandtag
      description: Anger stilen på handgreppssystemet på vingprofilvingen.
    wing_part_type:
      name: Typ av vingdel
      description: Identifierar den specifika komponenten eller reservdelen för en
        vingprofilvinge.
    wingfoiling_style:
      name: Typ av wingfoiling
      description: Indikerar den specifika wingfoiling-disciplinen eller åkstilen
        som produkten är avsedd för.
    wiper_arm_finish:
      name: Torkararm – finish
      description: Ytbehandling eller skyddande beläggning applicerad på torkararmen,
        vilket påverkar korrosionsbeständighet och utseende.
    wiper_arm_pivot_mount_type:
      name: Torkararm – typ av svängfäste
      description: Anger hur torkararmen monteras på fordonets torkarlänkage eller
        axelfäste.
    wiper_blade_attachment_type:
      name: Typ av torkarbladsfäste
      description: Anger typ av anslutning/fäste som används för att montera torkarbladet
        på torkararmen.
    wiper_blade_rubber_material:
      name: Torkarbladets gummimaterial
      description: Materialet i torkelementet (insats/påfyllning) som är i kontakt
        med glaset.
    wiper_system_position:
      name: Torkarsystemets position
      description: Anger monteringsläget på fordonet för vindrutetorkarsystemet.
    wire_coating_material:
      name: Trådbeläggningsmaterial
      description: Anger det yttre beläggnings-/mantelmaterialet som appliceras på
        tråden (inte kärntrådens material), vilket kan påverka nötningsbeständigheten
        och hur smidigt den passerar genom pärlhålen.
    wire_coating_type:
      name: Trådbeläggningstyp
      description: Anger om och hur tråden är belagd/täckt (för färg, skydd och textur).
    wire_construction_type:
      name: Konstruktionstyp för kabel
      description: Anger den fysiska konstruktionen av pärltråden, såsom flertrådig
        kontra solid och om den är belagd.
    wire_finish:
      name: Trådfinish
      description: Anger den ytfinish, beläggning eller plätering som appliceras på
        tråden (t.ex. polerad, emaljerad, galvaniserad, pläterad), vilket påverkar
        utseende och motståndskraft mot missfärgning/korrosion.
    wire_gauge_awg:
      name: Tråddiameter (AWG)
      description: American Wire Gauge (AWG)-storlek på ledarna som används i ledningsnätet.
    wire_insulation_material:
      name: Isoleringsmaterial för kabel
      description: Material i trådisoleringen/manteln som används i kablaget (påverkar
        temperatur-/kemikalieresistens).
    wire_packaging_type:
      name: Förpackningstyp för tråd
      description: Anger hur tråden säljs/förpackas.
    wire_shape_profile:
      name: Trådform/profil
      description: Beskriver trådens tvärsnittsform.
    wiring_configuration:
      name: Kabelkonfiguration
      description: Anger om fäktningsvärjan levereras förkopplad för elektrisk poängsättning,
        okopplad, trådlös eller är avsedd för icke-elektrisk träning.
    wobbler_style:
      name: Wobbler-stil
      description: Definierar wobblerns specifika design/aktionsstil, såsom crankbait
        eller jerkbait.
    wood_block_surface_preparation:
      name: Förberedelse av ytan på träblock
      description: Indikerar träblockets färdiga yttillstånd för efterbehandling och
        hantverk.
    wood_grain_direction:
      name: Träets ådringsriktning
      description: Träets ådringsriktning i förhållande till produktens längsta dimension
        (viktigt för hållfasthet, skäregenskaper och utseende).
    wood_slice_edge_style:
      name: Träskivans kantstil
      description: Kantens skick på skivan, såsom naturlig barkkant kontra slät/slipad
        kant.
    wooden_block_special_features:
      name: Specialfunktioner i träklossar
      description: Utmärkande funktioner som ingår i träkloss-setet.
    woodwind_body_construction:
      name: Träblåskroppskonstruktion
      description: Anger om instrumentet är tillverkat i ett stycke eller flera sektioner
        (t.ex. 2-delat/3-delat), vilket påverkar rengöring, förvaring och bärbarhet.
    woodwind_polishing_cloth_intended_use:
      name: Avsedd användning för polerduk för träblås
      description: Anger vad tyget primärt är avsett att rengöra/polera på ett träblåsinstrument.
    woodwind_small_part_type:
      name: Typ av liten reservdel för träblåsinstrument
      description: Anger vilken typ av liten reservdel till klarinett artikeln är
        (t.ex. klaviaturutrustning, dynor/kork/filt, ringar).
    woofer_mounting_type:
      name: Typ av montering för bashögtalare
      description: Hur bashögtalaren är avsedd att monteras/användas (frilufts kontra
        kapsling) och vanliga monteringssätt i bilar.
    woofer_surround_material:
      name: Material för bashögtalarens upphängning
      description: Material som används till bashögtalarens kantupphängning (yttre
        upphängningsring).
    worn_on_finger:
      name: Bärfinger
      description: Anger vilket finger fingerborgen är avsedd att bäras på.
    wrap_style:
      name: Typ av lindning
      description: Anger hur många gånger bältet är avsett att lindas runt midjan.
    wrapping_occasion:
      name: Inslagningstillfälle
      description: Primärt present-/firandetillfälle som omslagspappret är avsett
        för.
    wrapping_paper_features:
      name: Omslagspapper – egenskaper
      description: Funktionella och hållbarhetsrelaterade egenskaper hos omslagspapper,
        såsom rivmotstånd, återvunnet innehåll eller förskurna arkformat.
    wrestling_dummy_design:
      name: Brottningsdocka – design
      description: Övergripande kroppsform eller hållning hos dockan, såsom stående
        människoliknande form eller kastpåse, vilket avgör vilka träningsövningar
        som är tillämpliga.
    wrestling_mat_safety_certifications:
      name: Säkerhetscertifieringar för brottningsmattor
      description: Listar alla säkerhetscertifieringar eller standarder från branscher
        eller idrottsorganisationer som mattan uppfyller.
    wrist_strap_style:
      name: Modell av handledsrem
      description: Beskriver stilen på handledsremmen (eller bristen på densamma)
        som påverkar stöd och passform.
    wrist_support_style:
      name: Typ av handledsstöd
      description: Identifierar konstruktionen eller stilen på handledsstödet, såsom
        stödskena, handske, tejp eller lindning, för att hjälpa användaren att välja
        preferenser och prestanda.
    xylophone_range_octaves:
      name: Omfång för xylofon (oktaver)
      description: Xylofonens totala omfång uttryckt i oktaver (t.ex. 2,5 oktaver,
        3 oktaver, 4 oktaver).
    xylophone_resonator_type:
      name: Typ av xylofonresonator
      description: Typ av resonatorsystem som används för att förstärka ton (om sådant
        finns).
    yam_variety:
      name: Jamsrotsort
      description: Anger vilken sort eller vanlig sort av jams som säljs (t.ex. lila,
        gul, elefantfot).
    yarn_cutter_physical_style:
      name: Garnskärarens fysiska stil
      description: Identifierar den fysiska stilen på en garnklippare (t.ex. hänge,
        ring, klipp) för att möjliggöra bläddring och filtrering inom denna kategori.
    yarn_finish_or_effect:
      name: Garnfinish eller effekt
      description: Framhäver speciell visuell eller funktionell behandling som tillämpas
        på garnet, såsom fluorescens eller metallisk gnistra.
    yarn_guide_style:
      name: Garnguidestil
      description: Den fysiska stilen på garnstyrkomponenten.
    yarn_swift_adjustability:
      name: Garnvindans justerbarhet
      description: Anger om och hur garnvindan kan justeras (utdragbar, hopfällbar/vikbar),
        vilket påverkar förvaring och vilken storlek på härvor den kan hantera.
    yarn_swift_bearing_type:
      name: Typ av lager för garnvinda
      description: Beskriver rotationsstödet (t.ex. kullager) som påverkar jämnhet
        och lindningshastighet.
    yeast_application:
      name: Användning av jäst
      description: Anger den primära avsedda användningen för jästprodukten, antingen
        inom kulinariska eller fermenteringsändamål.
    yo_yo_accessory_part_type:
      name: Jojo-tillbehör/deltyp
      description: Identifierar vilken typ av jojo-reservdel eller tillbehör produkten
        är (t.ex. snöre, lager, responsdynor).
    yo_yo_axle_system_type:
      name: Typ av jojoaxelsystem
      description: Konstruktionsmetod för jojoaxeln (fast axel eller transaxel), vilket
        påverkar känslan vid användning och underhåll.
    yo_yo_bearing_size_class:
      name: Jojolagrets storleksklass
      description: Standardiserad storleksklass för lager som används av jojo, där
        så är tillämpligt.
    yo_yo_bearing_type:
      name: Jojo-lagertyp
      description: Lagerkonfiguration som påverkar respons och spinnegenskaper.
    yo_yo_play_style:
      name: Jojo-spelstil
      description: Jojons primära avsedda spelstil, som återspeglar den snöre-/trickdisciplin
        som produkten är designad för.
    yo_yo_response_system:
      name: Jojo – responssystem
      description: Anger den jojo-responsmekanism som den här delen är utformad för
        (kompatibilitet).
    yo_yo_responsiveness:
      name: Jojo-responsivitet
      description: Om jojon återvänder till handen med ett ryck (responsiv) eller
        kräver en bindning (icke-responsiv).
    yo_yo_string_material:
      name: Material för Jojo-snöre
      description: Materialsammansättning av jojosnöret.
    yogurt_base_ingredient:
      name: Basingrediens för yoghurt
      description: Identifierar den primära mjölk- eller växtbaserade källan som används
        för att tillverka yoghurten, vilket är avgörande för kostpreferenser och allergenöverväganden.
    yoke_type:
      name: Oktyp
      description: Identifierar typen av vagga eller ok som stöder skjutvapnet på
        enbensstativet.
    zill_playing_style:
      name: Spelstil för zill
      description: Avsedd spelkontext/stil (vanligtvis magdans kontra orkester-/kulturell
        variant).
    zill_strap_material:
      name: Material för zill-rem
      description: Material i fingerremmen/resåren som används för att hålla fast
        zills (om den ingår), vilket påverkar komfort, hållbarhet och grepp.
    zills_strap_adjustability:
      name: Zills – remjustering
      description: Om och hur den medföljande remmen/resåren kan justeras för passform.
    zipper_application:
      name: Användningsområde för dragkedja
      description: Anger det avsedda projektet eller användningsområdet som dragkedjan
        är utformad för.
    zipper_chain_type:
      name: Typ av kedja för dragkedja
      description: Anger konstruktionen/typen av dragkedjekedjan/tänderna.
    zipper_end_type:
      name: Typ av ändavslutning för dragkedja
      description: Anger hur dragkedjan avslutas och om den är separerbar (öppen ände)
        eller sluten (icke-separerande), inklusive vanliga separerande ändmonteringar
        som används i hantverksdragkedjor.
    zipper_gauge:
      name: Dragkedjestorlek
      description: 'Indikerar beteckningen för dragkedjekedjans storlek, vanligtvis
        uttryckt som ett nummer med ett # (t.ex. #3 eller #5), vilket motsvarar tand-/spolbredd
        och avsedd användning.'
    zipper_opening_length:
      name: Dragkedjans öppningslängd
      description: Definierar hur mycket av den främre öppningen som är försedd med
        dragkedja, och skiljer mellan stilar med hel-dragkedja, halv-dragkedja eller
        kvarts-dragkedja.
    zipper_pull_material:
      name: Material för dragkedja
      description: Anger materialet i dragkedjans drag eller dragflik (den del du
        greppar), till skillnad från dragkedjans tänder/kedja och tejp.
    zipper_pull_side:
      name: Sida för dragkedjans dragtapp
      description: Anger vilken/vilka sidor av dragkedjan som dragfliken är åtkomlig
        från.
    zipper_pull_strap_cord_tab_material:
      name: Material för dragkedjans rem/snöre/flik
      description: Material i rem-/snöre-/flik-/tofsdelen som är fäst vid blixtlåsets
        dragare (om sådan finns), exklusive själva dragaren och dess huvuddel.
    zipper_reversibility_mechanism:
      name: Dragkedjans vändbarhetsmekanism
      description: Anger hur dragkedjan är vändbar (t.ex. dubbelsidigt skjutreglage
        kontra vändbart/autolåsande skjutreglage avsett för vändbara plagg).
    zipper_separating_type:
      name: Dragkedja – typ av separering
      description: Anger om dragkedjan separerar längst ner/uppe eller är stängd,
        för passform med jackor, sovsäckar, väskor etc.
    zipper_side:
      name: Dragkedjans sida
      description: Anger vilken sida huvuddragkedjan är placerad på när sovsäcken
        ligger med framsidan uppåt.
    zipper_slider_material:
      name: Material i dragkedjans skjutreglage
      description: Anger materialet i dragkedjans skjutreglage (den rörliga mekanismen),
        vilket kan påverka styrka och korrosionsbeständighet.
    zipper_slider_pull_configuration:
      name: Konfiguration för dragkedja/dragreglage
      description: Anger om dragkedjan har en eller två skjutreglage/dragspännen,
        och om det finns dragspännen på ena eller båda sidorna av skjutreglaget.
    zipper_style:
      name: Modell av dragkedja
      description: Indikerar dragkedjans längd eller närvaro på plagget (t.ex. utan
        dragkedja, kvarts-dragkedja, halv-dragkedja, hel-dragkedja).
    zipper_tape_material:
      name: Material i dragkedjeband
      description: Anger det primära materialet för dragkedjebandet (tygsidorna) som
        sys in i projektet.
    zipper_teeth_type:
      name: Typ av dragkedjetänder
      description: Anger konstruktionsstilen för dragkedjekedjan/tänderna (t.ex. spiral,
        gjuten plast, metall, osynlig), vilket påverkar flexibilitet, styrka och typisk
        tillämpning.
