    cricket_stump_type:
      name: Cricketstumptyp
      description: Kategoriserar stubbarnas stil eller konstruktion för att hjälpa
        kunder att välja mellan traditionella matchstumpar, träningsvarianter eller
        moderna upplysta modeller.
    cricket_training_focus:
      name: Träning för cricket
      description: Primär cricketkompetens eller disciplin som hjälpmedlet är utformat
        för att förbättra.
    croquet_set_components_included:
      name: Delar till krocketset som ingår
      description: Listar alla viktiga komponenter Supply setet (t.ex. wickets, insatser,
        bärväska) så att kunderna förstår exakt vad de köper.
    cross_country_binding_system:
      name: Bindningssystem för längdskidåkning
      description: Anger standarden för terrängskidbindningar som produkten är borrad
        för eller kompatibel med.
    cross_stitch_chart_symbol_type:
      name: Symboltyp för korsstygnsdiagram
      description: Hur diagrammet representeras (symboler, Colors eller båda).
    cross_stitch_finishing_type:
      name: Typ av korsstygnsfinish
      description: Avsedd efterbehandling/visningstyp för det sydda projektet.
    cross_stitch_frame_fabric_holding_mechanism:
