      description: Beskriver förpackningen eller leveransmetoden för konstbläck, som
        penna eller flaska
    ink_pattern:
      name: Bläckmönster
      description: Identifierar det visuella temat för pennor eller frimärken, t.ex.
        geometrisk, jul
    ink_type:
      name: Bläcktyp
      description: Identifierar vilken typ av bläck som används i en produkt, till
        exempel lösningsmedelsbaserat eller färgämne
    inline_skating_style:
      name: Inlinesåkning, stil
      description: Definierar den specifika stilen av inlines som produkten är designad
        för, till exempel rekreations- eller inlinesåkning
    input/output_ports:
      name: In-/utgångsportar
      description: Identifierar vilka typer av portar som är tillgängliga på en enhet,
        till exempel USB eller utgångsjack
    input_connection:
      name: Ingångsanslutning
      description: Anger typen av ingångsanslutning för ljudkablar, till exempel 3,5
        mm eller RCA
    input_connection_type:
      name: Typ av ingångsanslutning
      description: Anger anslutning eller gränssnittsstandard som accepteras på omvandlarens
        ingångssida.
    input_signal_interface:
      name: Ingångssignalgränssnitt
      description: Anger typ(er) av ingångsanslutning(ar) som ljudomvandlaren accepterar.
    input_video_interface:
      name: Ingångsvideogränssnitt
      description: Anger typ(er) av videokontakt som accepteras som ingång av skanningsomvandlaren.
    insole_length_type:
      name: Innersulans längdtyp
      description: Definierar täckningen eller längdstilen för inlägget.
    installation_accessories_included:
      name: Installationstillbehör som ingår
      description: Identifierar eventuella verktyg eller instruktionsmaterial som
        medföljer batteriet för att underlätta installationen.
    installation_tools_included:
      name: Installationsverktyg som ingår
      description: Listar eventuella verktyg eller förbrukningsmaterial som medföljer
        delen för att underlätta installationen.
    instruction_set_architecture:
      name: Instruktionsarkitektur
      description: Definierar datorarkitekturen en processor kan förstå, t.ex. 32-bitars
    instrument/accessory_finish:
      name: Instrument-/tillbehörsfinish
      description: Beskriver ytbehandlingen eller färgen på ett musikinstrument eller
        tillbehör, som guldpläterad eller lackerad
    instrument_accessory_material:
      name: Instrument tillbehör - material
      description: Identifierar materialet som används i tillbehör till musikinstrument,
        som trä eller mässing
    instrument_bow_material:
      name: Instrument stråke - material
      description: Identifierar materialet som används i konstruktionen av ett musikinstruments
        båge, som kolfiber eller bresilja
    instrument_color:
      name: Färg på instrument
      description: Identifierar färgen på ett musikinstrument, till exempel svart
        eller silver
    instrument_controller_type:
      name: Instrumentcontrollertyp
      description: Identifierar det musikinstrument som simuleras av en spelkontroll,
        till exempel gitarr eller mikrofon
    instrument_material:
      name: Instrument - material
      description: Identifierar det huvudsakliga materialet som används vid konstruktionen
        av ett musikinstrument, som lönnträ eller mässing
    instrument_part_material:
      name: Instrument del - material
      description: Anger vilken typ av material som används i instrumentens delar,
        till exempel ebenholts eller guldpläterad
    instrument_pattern:
      name: Instrumentmönster
      description: Beskriver den visuella designen eller motivet på ett musikinstrument,
        till exempel solid eller textur
    instrument_string_color:
      name: Färg på instrumentsträng
      description: Identifierar färgen på strängarna på musikinstrument, till exempel
        guld eller silver
    instrument_string_material:
      name: Instrumentsträng - material
      description: Anger sammansättningen av musikinstrument strängar, som brons eller
        fluorkarbon
    instrument_string_pattern:
      name: Mönster på instrumentsträng
      description: Indikerar mönstret på gitarrsträngar, till exempel solid eller
        geometrisk
    instrument_support_type:
      name: Typ av instrumentstöd
      description: Identifierar vilken typ av stöd som används för ett musikinstrument,
        till exempel en nackrem eller ett notställ
    insulation_material:
      name: Isolering - material
      description: Anger sammansättningen av isolering, såsom mineralull eller polyuretan
        (PU)
    integrated_led_lighting:
      name: Integrerad LED-belysning
      description: Indikerar om högtalaren har inbyggd LED- eller RGB-belysning och
        dess typ.
    integrated_power/charging_options:
      name: Integrerade ström-/laddningsalternativ
      description: Anger om stativet inkluderar inbyggda eluttag och/eller USB-laddningsportar,
        vilket förbättrar användbarheten för anslutna enheter
    integrated_stand_type:
      name: Integrerad stativtyp
      description: Beskriver stilen på det inbyggda stativet eller stödmekanismen
        på fodralet.
    intended_application:
      name: Avsedd användning
      description: Anger den specifika användningen av färger och bets, t.ex. dörrar,
        däck/staket
    intended_effect:
      name: Avsedd effekt
      description: Beskriver den primära välbefinnandenytta som CBD-tillskottet marknadsförs
        för att tillhandahålla.
    intended_jewelry_type:
      name: Avsedd smyckestyp
      description: Anger vilka typer av smycken som stället är designat för att hålla
        eller visa.
    intended_surface:
      name: Avsedd yta
      description: Identifierar den primära yta som skyddet är designat för att skydda.
    intercom_communication_type:
      name: Intercom-kommunikationstyp
      description: Klassificerar det grundläggande kommunikationsformatet som enheten
        stöder
    intercom_wiring_type:
      name: Intercom-ledningstyp
      description: Anger lednings- eller kommunikationsschemat som en porttelefons
        högtalarenhet är designad för
    interface_type:
      name: Gränssnittstyp
      description: Anger vilken typ av anslutning en produkt använder, till exempel
        Bluetooth eller USB
    interior_lining_material:
      name: Inre fodermaterial
      description: Identifierar det primära materialet som fodrar insidan av smyckesskrinet,
        vilket skyddar smycken från repor och slitage.
    interior_texture:
      name: Invändig textur
      description: Definierar det interna ytmönstret som hjälper till att skapa lödder
        inuti skålen eller muggen.
    internal_drive_form_factor_supported:
      name: Kompatibel formfaktor för intern hårddisk
      description: Indikerar de kompatibla hårddiskstorlekarna för en enhet, t.ex.
        2,5-tum
    internet_radio_form_factor:
      name: Internetradions formfaktor
      description: Definierar internetradions fysiska stil eller monteringsorientering
    intimate_apparel_features:
      name: Detaljer för intimplagg
      description: Beskriver speciella egenskaper hos intima kläder, som andningsbar
        design eller bekväm passform
    inverter_type:
      name: Typ av växelriktare
      description: Anger typen av strömriktare i EV-delar, som ren sinusvåg eller
        fyrkantsvåg
    invitation_personalization_design:
      name: Personlig design av inbjudningar
      description: Definierar designfunktionerna för en inbjudan, t.ex. OSA ingår,
        anpassningsbar
    ironing_features:
      name: Detaljer för strykning
      description: Specificerar de speciella egenskaperna hos ett strykjärn eller
        stryksystem, t.ex. automatisk avstängning, ångboost
    item_condition:
      name: Artikelns skick
      description: Indikerar kvaliteten på en artikel, vanligtvis fordon eller fordonsdelar;
