    keyboard_backlight_type:
      name: Tangentbordets bakgrundsbelysningstyp
      description: Beskriver belysningsteknologin eller stilen som används för tangentbordets
        tangenter eller hölje.
    keyboard_format:
      name: Tangentbordsformat
      description: Definierar storleken och layouten för ett tangentbord, till exempel
        i full storlek eller kompakt
    keyboard_key_type:
      name: Typ av tangentbordstangent
      description: Beskriver responsen eller känslan av tangenter på musikaliska keyboards,
        som viktade eller halvviktade
    keyboard_language:
      name: Tangentbordsspråk
      description: Anger språklayouten för ett tangentbord, som ENG (engelska) eller
        DEU (tyska)
    keyboard_layout:
      name: Tangentbordslayout
      description: Anger placeringen av tangenter på ett tangentbord, t.ex. QWERTY,
        Workman
    keyboard_mounting_style:
      name: Tangentbordsmonteringsstil
      description: Definierar den interna plattmonteringsmetoden som påverkar ljud
        och känsla hos mekaniska tangentbord.
    keyboard_port_type:
      name: Tangentbordsporttyp
      description: Anger typen av port för tangentbordsanslutning, till exempel USB
        typ-C
    keyboard_specialized_features:
      name: Specialfunktioner tangentbord
      description: Identifierar unika egenskaper hos ett tangentbord, som justerbar
        vinkel eller bakgrundsbelysning
    keyboard_switch_type:
      name: Typ av tangentbordsknappar
      description: Anger tangentbordets feedbackstil, till exempel taktil eller med
        klick
    keyboard_type:
      name: Tangentbordstyp
      description: Specificerar design och funktionalitet för ett tangentbord, t.ex.
        standard, bakgrundsbelyst
    keycap_legend_printing_method:
      name: Tryckmetod för tangentknappsmärkning
      description: Beskriver hur symboler appliceras på tangenterna, vilket påverkar
        livslängd och utseende.
    keycap_material:
      name: Material för tangenter
      description: Anger det primära materialet eller tillverkningsprocessen för tangenterna,
        vilket påverkar hållbarhet, struktur och märkning.
    keycap_profile:
      name: Tangenthattsprofil
      description: Anger skulpturen eller formfamiljen för tangentkapslarna, vilket
        påverkar skrivkänslan och estetiken.
    keypad_style:
      name: Knappsatsstil
      description: Definierar inmatningsmetod för knappsatser, till exempel numeriska
        eller alfanumeriska
    keystone_correction_type:
      name: Trapetskorrigeringstyp
      description: Beskriver vilken typ av trapets- eller geometrisk korrigering projektorn
        stöder för att eliminera trapetsförvrängning (t.ex. manuell vertikal, automatisk
        fyrpunkt)
    kiln_features:
      name: Ugnsfunktioner
      description: Anger de funktionella egenskaperna och designegenskaperna hos ugnen.
    kiln_loading_style:
      name: Ugnslastningsmetod
      description: Anger metoden genom vilken föremål placeras i och tas bort från
        ugnskammaren.
    kit_construction_type:
      name: Byggsatstyp
      description: Anger tyget på studsmattans hoppområde, t.ex. syntet, polypropen
    kitchen/dining_furniture_items_included:
      name: Köks- och matrumsartiklar som ingår
      description: Identifierar de specifika möbler som ingår i en uppsättning, till
        exempel matstolar eller köksö
    kitchen_utensil_items_included:
      name: Köksredskap ingår
      description: Identifierar verktygen som ingår i ett köksredskapsset, till exempel
        visp eller tång
    kitesurfing_style:
      name: Kitesurfingstil
      description: Anger vilken typ av kitesurfing produkten är avsedd för, till exempel
        vågridning
    knee_brace_style:
      name: Knäortosstil
      description: Definierar den strukturella designen av ortosen, vilket återspeglar
        hur den bärs och stödnivån som tillhandahålls.
    kneeboard_features:
      name: Detaljer för kneeboard
      description: Beskriver specifika egenskaper hos en kneeboard, som justerbar
        rem eller halkskydd
    knife_type:
      name: Knivtyp
      description: Klassificerar knivar baserat på deras avsedda användning eller
        design, till exempel multiverktyg eller EDC
    knitting/padding_project_type:
      name: Typ av stickning/stoppning
      description: Identifierar den avsedda användningen av sticknings- eller stoppningsmaterial,
        t.ex. kviltning eller kuddtillverkning
    knitting_project_type:
      name: Typ av stickningsprojekt
      description: Anger typen av stickningsprojekt, till exempel kuddtillverkning
        eller leksakstillverkning med stoppning
    knob/handle_design:
      name: Utförande på knopp/handtag
      description: Beskriver stilen på skåpbeslag, till exempel en rund knopp eller
        stånghandtag
    knob_function:
      name: Vredfunktion
      description: Specificerar funktionen för förstärkarrattarna, såsom förstärkning
        eller närvaro
    knob_style:
      name: Knoppstil
      description: Beskriver designen av vreden på musikinstrumentförstärkare, som
        standard eller retro/vintage
    knot_shape:
      name: Knutform
      description: Anger den övergripande formen eller profilen på knuten eller borstens
        huvud.
    labeling_project_type:
      name: Typ av märkningsprojekt
      description: Anger hantverkssyftet för insydda etiketter, som hemtextilarbete
        eller personlig presenttillverkning
    laboratory_freezer_design:
      name: Konstruktion av laboratoriefrysar
      description: Beskriver konfigurationen av en labbfrys, till exempel upprätt
        eller frysbox
    lacrosse_equipment_included:
      name: Lacrosseutrustning som ingår
      description: Anger artiklarna i en uppsättning med lacrosseutrustning, såsom
        lacrosseklubba eller axelvaddar
    ladder_type:
      name: Stegtyp
      description: Identifierar stilen på båtstege, såsom fast eller teleskopisk
    lamination_mode:
      name: Lamineringsläge
      description: Identifierar vilken typ av lamineringsprocess som används, till
        exempel kallaminering eller varmlaminering
    lamination_type:
      name: Lamineringstyp
      description: Identifierar om diagrammets eller modellens yta är laminerad och
        i så fall om den är enkel- eller dubbelsidig.
    lamp_assembly_type:
      name: Lampaggregatstyp
      description: Anger om produkten är en bara lampa, en lampa med hölje, ett dubbelpaket
        eller annan aggregatskonfiguration
    lamp_quality_grade:
      name: Lampkvalitetsgrad
      description: Indikerar om lampan är original OEM, använder en OEM-lampa i kompatibelt
        hölje eller är helt eftermarknads-/kompatibel
    lamp_type:
      name: Lamptyp
      description: Anger ljuskällan i fotografiska förstorare, t.ex. kallt ljus, interferensfilter
    lancet_mechanism_type:
      name: Lansettmekanismtyp
      description: Definierar lansetternas fungerande mekanism eller säkerhetsdesign
        (t.ex. säkerhetsindragbar, tryckaktiverad).
    language:
      name: Språk
      description: Anger vilket språk som används eller kompatibelt språk, t.ex. engelska,
        flerspråkig
    language_version:
      name: Språkversion
      description: Anger språkversionen av en medieprodukt, till exempel ENG-US eller
        ARA-arabiska
    laptop_cable_type:
      name: Bärbar datorkabeltyp
      description: Identifierar kabelns funktionella syfte inom den bärbara datorn.
    laptop_housing_part_type:
      name: Bärbar datorhöljedeltyp
      description: Anger vilken yttre komponent som tillhandahålls (t.ex. bottenbas,
        handledsstöd, ram).
    laser_color:
      name: Laserfärg
      description: Identifierar färgen på en laserpekare, som röd eller grön
    laser_light_source:
      name: Laserljuskälla
      description: Specificerar ljustekniken som används i laserpekare, såsom LED
    laser_pattern:
      name: Lasermönster
      description: Identifierar designen eller motivet som produceras av en laser,
        till exempel stjärnor eller djur
    lathe_application:
      name: Svarvtillämpning
      description: Anger vilken typ av arbete en svarv är designad för, som akrylspinning
        eller glasbearbetning
    laundry_detergent_features:
      name: Detaljer för tvättmedel
      description: Beskriver speciella egenskaper hos tvättmedel, som färgskydd eller
        fläckborttagning
    lead_grade:
      name: Blyertsklass
      description: Anger blygraden i skrivredskap, t.ex. H, 9B
    leash_design:
      name: Design på koppel
      description: Beskriver funktionaliteten hos husdjurskoppel, till exempel avtagbara
        eller indragbara
    leather/vinyl_texture:
      name: Läder-/vinyltextur
      description: Beskriver ytkänslan hos läder- eller vinylprodukter, som släta
        eller korniga
    leather_type:
      name: Lädertyp
      description: Anger den animaliska källan eller typen av läder som används i
        produkten (t.ex. kohud, kalvskinn, krokodil, pytonhud, syntetläder)
    lectern_mounting_type:
      name: Monteringstyp för talarstol
      description: Anger inställningsstilen för en talarstol, som bordsskiva eller
        golv
    led_light_mode:
      name: LED-ljusläge
      description: Listar de valbara driftslägena som kombinerar olika spektrum eller
        intensiteter (t.ex. blått, rött, blått och rött).
    leg_color:
      name: Benfärg
      description: Definierar nyansen på en produkts ben, t.ex. vita, bruna
    leg_lock_type:
      name: Benlåstyp
      description: Anger typen av lås för ben på elektroniktillbehör, vanligtvis selfiepinnar;
