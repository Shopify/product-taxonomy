      description: Indikerar den standardiserade cricketträ-storlekklassificeringen
        (0–6, Harrow, SH, LH), vanligtvis vald baserat på spelarens ålder och längd.
    cricket_bat_size_compatibility:
      name: Cricketträ – storlekskompatibilitet
      description: Listar den batstorlek som tillbehöret är utformat för att passa,
        vilket säkerställer korrekt kompatibilitet.
    cricket_helmet_role:
      name: Cricket hjälmrulle
      description: Indikerar den spelroll hjälmen är avsedd för, såsom slagning eller
        wicketkeeping.
    cricket_leg_guard_type:
      name: Typ av benskydd för cricket
      description: Betecknar den specifika stilen för benskydd i cricket.
    cricket_player_role:
      name: Cricketspelarens roll
      description: Anger den primära spelrullen som skon är avsedd för.
    cricket_protection_grade:
      name: Cricketskyddsklass
      description: Anger den skyddsklassificering som tilldelats av tillverkare av
        cricketutrustning.
    cricket_stump_base_type:
      name: Typ av cricketbas
      description: Indikerar basstilen eller materialet Supply stubbarna, vilket påverkar
        stabilitet och lämplighet för spelytan.
    cricket_stump_target_features:
      name: Funktioner för cricket stump target
      description: Framhäver tydliga funktionella egenskaper som förbättrar träningens
