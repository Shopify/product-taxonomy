      description: Beskriver materialet i fotbädden eller innersulan som foten vilar
        på, vilket påverkar dämpning och stöd.
    installation_fabrication_level:
      name: Tillverkningsgrad för installation
      description: Anger den typiska mängden specialtillverkning eller modifiering
