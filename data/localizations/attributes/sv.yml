    craps_accessories_included:
      name: Tärningstillbehör som ingår
      description: Identifierar ytterligare craps-specifika tillbehör som ingår utöver
        tärningar/marker/layout.
    crash_cymbal_profile:
      name: Profil för kraschcymbal
      description: Cymbalens övergripande krökning/profil (hur uttalad stråken är),
        påverkar och respons.
    crash_cymbal_sound_character:
      name: Crash-cymbaler ljudkaraktär
      description: Primära tonkaraktärsbeskrivningar för kraschcymbalens ljud.
    crash_pad_size_class:
      name: Kraschskydd storlekklass
      description: Indikerar den allmänna storlekkategorin för en klätterplatta, vilket
        ger kunden en snabb Sense av ytbeläggning utan att behöva exakta dimensioner.
    crate_engine_assembly_level:
      name: Nivå för montering av lådans motor
      description: Hur komplett är lådmotorn som leverera (vilka huvudkomponenter
        ingår).
    cream_base_ingredient:
      name: Ingrediens i gräddbasen
      description: Identifierar gräddens primära källa, och täcker både mejeriprodukter
        och växtbaserade alternativ.
    cream_cheese_base:
      name: Färskostbas
      description: Identifierar den primära mejeri- eller växtbaserade källan som
