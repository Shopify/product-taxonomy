        kompatibilitet.
    cue_head_material:
      name: Köhuvudets material
      description: Identifierar materialet i köhuvudet (den del som är i kontakt med
        pucken), vilket påverkar hållbarhet och ytskydd.
    cue_sport_compatibility:
      name: Kompatibilitet med kösport
      description: Identifierar vilken bilsport tillbehöret är utformat för.
    cue_thread_size:
      name: Cue tråd storlek
      description: Anger trådspecifikationen som används på förlängningar, ledskydd,
        viktbultar och andra kötillbehör för att säkerställa korrekt passform.
    cue_tip_hardness:
      name: Hårdhet på köspets
      description: Betygsätter fastheten hos köspetsen vilket Influence köbollens
        kontroll och feedback.
    cuff_height:
      name: Manschetthöjd
      description: Anger höjden på stövelmanschetten (låg, medel, hög, avtagbar/justerbar),
        påverkar och support .
    cuff_position:
      name: Manschettposition
      description: Indikerar var på ryttarens kropp koppelmanschetten är avsedd att
        fästas.
    cultivation_method:
      name: Odlingsmetod
      description: Anger hur de gröna odlades, inklusive odlingstekniker och jordbruksmetoder.
    cup_type:
      name: Kopptyp
      description: Indikerar paljettens ytprofil (platt eller kupad) och kupdjup,
        vilket kan påverka glitter, textur och hur den sitter när den sys eller limmas.
    cupcake_size:
      name: Cupcake-storlek
      description: Anger den fysiska butikskategorin för de sålda cupcakesen (t.ex.
        Shop Mini, standard, jumbo).
    curd_size:
      name: Ostmassans storlek
      description: Anger ostmassans storlek eller konsistens.
    cure_method:
      name: Härdningsmetod
      description: Beskriver den process som krävs för att limmet ska härda (t.ex.
        UV-ljus, luftfuktighet, värme).
    curing_or_preparation_method:
      name: Härdning eller beredningsmetod
      description: Anger hur oliverna har torkats eller på annat sätt tillagats (t.ex.
        saltlake-, olje- eller grillats).
    curling_broom_head_material:
      name: Material för lockborstehuvud
      description: Identifierar den primära materialsammansättningen i kvasthuvudet
        eller dynan.
    curling_broom_head_type:
      name: Huvud för lockborste
      description: Anger stilen eller konstruktionen på sophuvudet/sopdynan.
    curling_shoe_slider_material:
      name: Material för curlingskor
      description: Identifierar det primära materialet i glidsulan som används på
        curlingskor.
    curling_training_aid_type:
      name: Typ av hjälpmedel för curlingträning
      description: Identifierar typen av hjälpmedel för curlingträning.
    curry_variety:
      name: Currysort
      description: Klassificerar currysåsprodukter efter den specifika currystil eller
        recept de är avsedda att skapa, såsom Tikka Masala, Massaman eller Thai grön,
        för att möjliggöra exakt smak-/stilfiltrering.
    cushion_rubber_profile:
      name: Dämpad gummiprofil
      description: form eller profilkod för gummidelar till rälsdämpare.
    cushioning_level:
      name: Dämpningsnivå
      description: Indikerar mängden utfyllnad under foten som strumpan ger för påverkar
        och komfort.
    custom_label_content_type:
      name: Anpassad etikett Innehållstyp
      description: Anger vilken information som är anpassad på den påsydda etiketten
        (t.ex. namn, logotyp, meddelande, storlek, skötselsymboler, kontaktinformation).
    customization_type:
      name: anpassningstyp
      description: Anger om tröjan är tom, utgiven av spelare eller specialdesignad
        med personligt namn/nummer.
    cut_or_preparation_style:
      name: Skär- eller förberedelsestil
      description: Anger hur grönsaksbitarna skärs eller tillagas inuti burken eller
        burken (t.ex. hela, tärnade, spjut).
    cut_resistance_rating:
      name: Skärskyddsklass
      description: Anger artikelns formellt testade skärmotståndsnivå.
    cut_type:
      name: Skärtyp
      description: Anger om tyget säljs av yard/meter, som förskuret eller som rulle/bult.
    cutting_application:
      name: Skärmetod
      description: Primärt avsedd skäranvändning - låda för saxen.
    cutting_mat_grid_style:
      name: Skärmatta Grid
      description: Den tryckta guidestilen på mattans yta.
    cutting_mat_intended_use:
      name: Avsedd användning av skärmattan
      description: Den primära Craftsom skärmattan är avsedd för.
    cv_boot_clamp_type:
      name: Typ av CV-klämma
      description: Anger den klämma-/bandtyp som används för att säkra CV-damasken.
    cv_boot_kit_contents:
      name: CV- kit Innehåll
      description: Listar vad som ingår i CV-damasken (t.ex. klämmor, fettpaket, fästband).
    cv_boot_material:
      name: CV-damaskmaterial
      description: Anger det primära materialkonstruktionen för CV-damasken.
    cv_boot_position:
      name: CV-stötfångarposition
      description: Anger om CV-damasken passar den inre (inombords) eller yttre (utombords)
        CV-ledens position på axeln.
    cycling_apparel_fit:
      name: Cykelkläder passform
      description: Beskriver plaggets skärning och indikerar avsedd täthet och aerodynamik
        (t.ex. Tävlingsmodell, Avslappnad).
    cylinder_head_assembly:
      name: Cylinderhuvudenhet
      description: Anger fullständighetsnivån för cylinderhuvudet som det säljs (t.ex.
        helt monterat med installerade ventilstyrningskomponenter jämfört med omonterat
        gjutgods).
    cylinder_head_material_grade:
      name: Materialkvalitet för cylinderhuvud
      description: Anger material och kvalitet som används för gjutning av cylinderhuvudet.
    cylinder_head_position:
      name: Topplockets position
      description: Identifierar vilken bank/sida eller orientering cylinderhuvudet
        passar på motorer med flera bankar (t.ex. vänster/höger sida eller bank 1/bank
        2).
    cymbal_alloy:
      name: Cymballegering
      description: Legering/sammansättning av cymbalen/cymbalerna i kit.
    cymbal_application:
      name: Cymbal-appen
      description: Primär spelapp som cymbalen är designad/märkt för.
    cymbal_arm_mounting_interface:
      name: Monteringsgränssnitt för cymbalarm
      description: Anger hur cymbalarmen fästs på REST av trumutrustningen (t.ex.
        klämma, hyllställ, stativmottagare).
    cymbal_arm_rotation_positioning_features:
      name: Funktioner för rotation/positionering av cymbalarmen
      description: Anger positioneringsfunktioner som påverkar hur armen kan vinklas/roteras
        och låsas.
    cymbal_arm_style:
      name: Cymbalarmstil
      description: Anger om en cymbalarm är rak eller bom, för räckvidd och positionering.
    cymbal_drum_case_wheel_configuration:
      name: Cymbal & trumma låda hjulkonfiguration
      description: Anger om lådan har hjul och (om tillämpligt) hjulkonfigurationen
        för rullande transport.
    cymbal_hammering_style:
      name: Cymbalhammarstil
      description: Hamrande process/utseende påverkar komplexitet och känsla.
    cymbal_kit_components_included:
      name: Ingående komponenter i cymbalkit
      description: Anger vilka cymbaltyper som ingår i Ride kit/-paketet (utöver själva
        Ride cymbalen).
    cymbal_kit_items_included:
      name: Ljussatsartiklar som ingår
      description: Identifierar vilka cymbaler som ingår i kit/paketet (efter cymbaltyp).
    cymbal_lathing:
      name: Cymbalsvarvning
      description: Anger om/hur mycket av cymbalytan är svarvad (rillad) kontra osvarvad/rå.
    cymbal_playing_style_genre:
      name: Cymbalspelstil/genre
      description: Identifierar den typiska Context som cymbalerna är avsedda för
        (t.ex. magdanscymbaler kontra marsch-/orkestercymbaler).
    cymbal_set_configuration:
      name: Cymbaluppsättningskonfiguration
      description: Anger om produkten säljs som en enda cymbal, en matchande parkoppla
        eller ett set med flera parkoppla (t.ex. för gruppinstruktion).
    cymbal_sound_character:
      name: Cymballjudkaraktär
      description: Beskriver den övergripande tonprofilen/klangen hos cymbalen som
        används för discovery (t.ex. ljus kontra mörk).
    cymbal_sustain:
      name: Cymbal sustain
      description: Hur länge cymbalen ringer efter att den slagits an.
    cymbal_type:
      name: Cymbaltyp
      description: Anger den funktionella cymbalrulle som den elektroniska cymbalpaden
        är avsedd att emulera.
    cymbal_volume_level:
      name: Cymbalens volymnivå
      description: Upplevd ljudstyrka/utgångskategori för cymbalen.
    cymbal_weight_class:
      name: Cymbalviktsklass
      description: Indikerar cymbalens viktklass, som påverkar ton, volym och respons.
    dairy_heat_treatment:
      name: Värmebehandling av mejeriprodukter.
      description: Identifierar den bearbetnings- eller pastöriseringsnivå som tillämpats
        på grädden (t.ex. rå, pastöriserad, UHT), vilket påverkar gräddens hållbarhet,
        smak och vispegenskaper.
    damage_type:
      name: Skadetyp
      description: Anger vilka typer av vindruteskador som kit är avsedd att reparera.
    damper_pedal_style:
      name: Dämparpedalstil
      description: Beskriver den fysiska stilen på dämparpedalen som används med keyboards/digitala
        pianon.
    damping_adjustability:
      name: Dämpningsjusterbarhet
      description: Anger vilka dämpnings- och/eller åkhöjdsparametrar som är justerbara
        på stötdämparen.
    damping_level:
      name: Dämpningsnivå
      description: Indikerar den relativa mängden volym- och sustainreducering som
        dämpningen ger.
    dance_occasion:
      name: Danstillfälle
      description: Indikerar Context avsedda användningssammanhang inom danspraktik
        eller prestanda.
    darbuka_accessories_included:
      name: Badrumstillbehör som ingår
      description: Listar vanliga tillbehör som medföljer darbukan.
    darbuka_body_finish_type:
      name: Darbuka-karossfinishtyp
      description: Beskriver den yttre finishen, beläggningen eller den dekorativa
        behandlingen av darbuka-kroppen.
    darbuka_head_material:
      name: Darbuka-huvudmaterial
      description: Anger materialet i trumskinnets membran på en darbuka.
    dart_barrel_material:
      name: Material för dartpipor
      description: Anger det primära materialet i pilröret, vilket påverkar distribution,
        hållbarhet och pris.
    dart_shaft_design:
      name: Design av dartskaft
      description: Klassificerar axelns mekaniska design, såsom om den är fast, roterande,
        teleskopisk eller integrerad i vingvingen, vilket påverkar prestanda och pris.
    dart_shaft_thread_type:
      name: Dartaxel trådtyp
      description: Indikerar vilken gängstorlek/typ som används för att skruva fast
        skaftet i pilcylindern, vilket säkerställer kompatibilitet mellan skaft och
        pipor.
    dart_thread_size:
      name: Storlek på piltråd
      description: Anger den trådstorlek/standard som delen är kompatibel med, vilket
        säkerställer passform mellan axlar, spetsar och pipor.
    dart_tip_compatibility:
      name: Kompatibilitet med dartspetsar
      description: Anger om pildelen är avsedd för stålspets, mjuk spets eller båda
        typerna av pilar.
    dart_tip_connection_type:
      name: Dartspetskopplingstyp
      description: Beskriver trådspecifikationen eller monteringssystemet som spetsen
        använder för att fästa på en dartpip eller -skaft, vilket säkerställer kompatibilitet.
    dartboard_tournament_approval:
      name: Tillstånd för darttavlaturnering
      description: Anger om darttavlan är officiellt godkänd av specifika dartförbund
        eller ligor.
    dartboard_type:
      name: Typ av darttavla
      description: Klassificerar darttavlan efter konstruktionsteknik och kompatibilitet
        med dartpilar (t.ex. borsttavla, elektronisk, magnetisk).
    dash_cover_construction_type:
      name: Typ av skyddskonstruktion för instrumentbräda
      description: Beskriver hur instrumentbrädans skydd är format/strukturerat (t.ex.
        gjutet kontra sytt) vilket Impact bra passform, precision och utseende.
    dash_cover_cutout_configuration:
      name: Konfiguration av utskärning för instrumentpanelens skydd
      description: Anger vilka originalöppningar/sensorer på instrumentpanelen som
        locket är förskuret eller format för.
    dashboard_accessory_position:
      name: instrumentpanelens tillbehörsposition
      description: Anger var på/runt instrumentpanelen tillbehöret är avsett att placeras
        eller monteras.
    date_variety:
      name: Dadelsort
      description: Anger dadlarnas kultivar/sort (t.ex. Medjool, Deglet Noor, Ajwa).
        Variation Influence starkt smak, storlek, konsistens och Highlight i de flesta
        produktnamn och beskrivningar, så att fånga den förbättrar filtrering och
        upptäckt.
    dayan_head_material:
      name: Dayan-huvudets material
      description: Materialet i spelytan (pudi), såsom naturlig dölja-typ eller syntetiskt.
    dayan_strap_material:
      name: Dayan-remmens material
      description: Materialet i spännremmarna (baddhi) som används för att snöra dayanen.
    dayan_syahi_type:
      name: Dayan syahi-typ
      description: Typ av syahi-app (svart tuning paste) på dayanhuvudet.
    decaffeination_method:
      name: Avkoffeineringsmetod
      description: Identifierar processen som används för att ta bort koffein från
        koffeinfritt kaffe.
    decal_installation_method:
      name: Metod för montering av dekalen
      description: Hur dekalen appliceras på fordonets yta (t.ex. torrapplicering,
        våtapplicering). Verktygs-/kravuppgifter (t.ex. Överföringstejp eller värmepistol)
        bör anges i instruktioner eller relaterad verktygsattribut när så är tillämpligt.
    decal_orientation:
      name: Dekalorientering
      description: Om dekalen är avsedd för invändig glasbruk eller utvändig glasbruk.
    decal_placement_type:
      name: Typ av dekalplacering
      description: Anger var på fordonet dekalen är avsedd att fästas (t.ex. karosseri,
        stötfångare, motorhuv).
    decal_visibility_property:
      name: Egenskap för dekalens synlighet
      description: Optiska/synlighetsegenskaper hos en dekal avsedd att förbättra
        synligheten eller ljusresponsen (t.ex. reflekterande, fluorescerande, självlysande
        eller transparenta egenskaper).
    deck_concave_level:
      name: Däckets konkava nivå
      description: Indikerar djupet eller intensiteten på däckets konkavhet (t.ex.
        mild, medium, djup).
    deck_flex_rating:
      name: Däckets flexbetyg
      description: Kvalitativ bedömning av däckets flexibilitet/styvhet.
    deck_material:
      name: Däckmaterial
      description: Identifierar det primära konstruktionsmaterialet för skateboarddecket.
    decoder_interface_socket_type:
      name: Avkodargränssnitt / uttagstyp
      description: Typ av digital dekodergränssnitt eller introduktionsdekoderkonfiguration
        för lokmodellen.
    decoration_technique:
      name: Dekorationsteknik
      description: Identifierar den primära metoden som används för att applicera
        grafik eller utsmyckningar på t-shirten.
    decorative_stamp_form_factor:
      name: Dekorativ stämpelformfaktor
      description: Identifierar det fysiska stämpelformatet och hur den trycker en
        design (enkelstämpel, set, rulle, bakgrund, etc.).
    decorative_tape_application:
      name: App för dekortejp
      description: Primärt Craft som dekortejpen är avsedd eller märkt för.
    decorative_tape_format:
      name: Dekorativt tejpformat
      description: Anger hur den dekorativa tejpen Supply/förpackas för användning.
    decoy_buoyancy:
      name: Flytkraft för lockbetet
      description: Beskriver hur lockbetet beter sig i vattenpelaren (flytande, svävande
        eller sjunkande).
    decoy_joint_type:
      name: Typ av lockbeslag
      description: Indikerar om lockbeteets kropp är solid eller ledad, vilket påverkar
        simningen.
    decoy_motion_mechanism:
      name: Mekanism för Motion
      description: Beskriver hur, om alls, lockbetet orsakar rörelse eller vattenstörningar
        för att locka till sig vilt.
    decoy_posture:
      name: Lockbetshållning
      description: Indikerar den avbildade hållningen eller aktiviteten hos djuret
        som modellerats av lockbeteet (t.ex. ätande, vila, vakenhet).
    decoy_size_class:
      name: Lockbete storlek klass
      description: Kategoriserar lockbeteets relativa skala jämfört med det verkliga
        djuret (t.ex. Standard, Magnum, Överdimensionerad).
    decoy_style:
      name: Lockbetestil
      description: Definierar den fysiska formfaktorn eller designklassen för lockbetet
        för att hjälpa jägare att välja rätt konfiguration.
    deli_meat_variety:
      name: Delikat köttsort
      description: Klassificerar den specifika typen av charkuterivaror (t.ex. salami,
        bologna, prosciutto, rostbiff).
    delivery_form:
      name: Leveransform
      description: Fysisk leverans form av injektorrengöraren.
    denim_composition:
      name: Denimsammansättning
      description: Denimens primära fibersammansättning (basfibrer exklusive färgämnen/ytbehandlingar).
    denim_finish:
      name: Denimfinish
      description: Ytbehandling/bearbetning applicerad på denimtyg.
    denim_intended_use:
      name: Avsedd användning för denim
      description: Typiskt projekt/användningsområde som jeansen är märkt för.
    denim_stretch_type:
      name: Denim stretchtyp
      description: Om denimtyget har mekanisk stretch, tillsatt elastan/spandex eller
        ingen stretch.
    denim_wash:
      name: Denimtvätt
      description: Anger vilken nyans eller tvättbehandling som tillämpats på denimtyg
        (t.ex. ljus, mörk, rå, syra).
    derailleur_cage_length:
      name: Växelhållarens längd
      description: Anger växelhållarens längd, vilket avgör kedjans kapacitet (främst
        för bakväxlar).
    derailleur_mounting_style:
      name: Växelförarens monteringsstil
      description: Anger hur växeln fästs på Frame eller -hängaren (t.ex. fastlödning,
        klämma, direktmontering, UDH).
    derailleur_type:
      name: Växelförartyp
      description: Anger om produkten är en fram- eller bakväxel.
    deshedder_tool_type:
      name: Avskärningsverktygstyp
      description: Klassificerar avklipparens strukturella stil så att kunden kan
        välja sin föredragna groomingmetod (t.ex. blad, block, curry eller glove).
    diabolo_axle_system:
      name: Diabolo-axelsystem
      description: Anger det diaboloaxelsystem/konfiguration som påverkar grindar,
        stabilitet och strängslitage.
    diagnostic_functions_supported:
      name: Diagnostiska Functions som stöds
      description: Anger de diagnostiska/ Functions som streckkodsläsaren kan utföra.
    diagnostic_interface_type:
      name: Diagnostiskt gränssnittstyp
      description: Anslutning/gränssnitt som används för att kommunicera med fordonet
        eller enheten (t.ex. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Diamantfärgad kvalitet
      description: Indikerar diamanternas färggrad, från D (färglös) till Z (ljus
        färg), eller betecknar fancy färgdiamanter.
    diaper_cover_style:
      name: Blöjskyddsstil
      description: Definierar blöjfodralets designsilhuett eller dekorativa stil för
        att underlätta stilbaserad bläddring och filtrering.
    diastatic_power_unit:
      name: Diastatisk kraftenhet
      description: Anger enhetssystemet som används för att rapportera en produkts
        diastatiska effektvärde (t.ex. °Lintner vs Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Stämningssystem för munspel
      description: Anger layout/stämningssystemet som används av den diatoniska munspelen.
    dice_sides:
      name: Tärningssidor
      description: Antal sidor (ytor) per tärning för tärningarna som ingår i produkten
        (t.ex. d6, d20). För blandade set, använd den dominerande eller lista flera
        värden när det stöds.
    didgeridoo_construction_type:
      name: Didgeridoo-konstruktionstyp
      description: Hur didgeridoon är konstruerad eller formad (traditionell eller
        modern konstruktionsmetod).
    dietary_formulation_claim:
      name: Påstående om kostformulering
      description: Highlight viktiga formuleringsattribut eller undantag som är relevanta
        för hästnäring (t.ex. spannmålsfri, lågstärkelsehalt, ekologisk).
    dinosaur_playset_scale_figure_size_class:
      name: Dinosaur playset skala/figure storlek class
      description: Beskriver den allmänna skalan för ingående dinosaurier/figurer
        för att underlätta kompatibilitet med andra set.
    dinosaur_species_included:
      name: Dinosauriearter ingår
      description: Identifierar vilka dinosauriearter som representeras i leksetet
        (figurer eller gjutna dinosaurier).
    dipsy_diver_size_designation:
      name: Dipsy diver storlek designation
      description: Indikerar den tillverkardefinierade storlekkoden för fiskedipseyn,
        vilken korrelerar med vikt och dykdjup.
    disc_brake_rotor_mount_type:
      name: Typ av bromsskivor
      description: Identifierar hur en skivbromsrotor fästs på navet (t.ex. 6-bults,
        Center Lock).
    disc_lock_accessories_included:
      name: Tillbehör för skivlås ingår
      description: Anger den extra artikel som medföljer ett cykelskivlås, såsom påminnelsesvajer,
        bärfodral, monteringsfäste eller batterier.
    disco_ball_mirror_tile_material:
      name: Material för diskokulans spegelplattor
      description: Materialet i den reflekterande plattan på discokulan (om tillämpligt).
    disco_ball_mirror_tile_size:
      name: Discobollsspegel platta storlek
      description: Ungefärlig längd på enskilda spegelplattor/kvadrater på discokulan.
    display_backlight_color:
      name: Färg på displayens bakgrundsbelysning
      description: Bakgrundsbelysning/belysningsfärg på mätarens display/ratt.
    disposable_compostable_claim:
      name: Engångs-/komposterbarhetsdeklaration
      description: Anger om produkten är komposterbar, biologiskt nedbrytbar, återvinningsbar
        eller inte komposterbar (i förekommande fall).
    distillation_method:
      name: Destillationsmetod
      description: Identifierar den destillationsmetod eller destillationstyp som
        används för att framställa spriten.
    distilled_water_intended_use:
      name: Avsedd användning av destillerat vatten
      description: Definierar den primära appen för destillerat vatten (t.ex. dricksvatten,
        CPAP-apparat, luftfuktare, ångstrykjärn).
    distress_transmission_frequency:
      name: Nödsändningsfrekvens
      description: Primär radiofrekvens/frekvenser som används för nödlarm.
    distressing_level:
      name: Besvärande nivå
      description: Anger mängden avsiktligt slitage, revor eller fransningar som applicerats
        på tyget.
    distressing_style:
      name: Besvärande stil
      description: Indikerar typen eller graden av slitage på jeans, såsom slitna
        eller mustaschiga effekter.
    distributor_advance_mechanism:
      name: Distributörens framåtriktade mekanism
      description: Anger vilken typ av tändningsförskjutningsmekanism som används
        av fördelaren.
    distributor_cap_terminal_type:
      name: Typ av terminal på fördelarlock
      description: Anger typen av fördelarlocksterminal.
    distributor_gear_material:
      name: Material för fördelardrev
      description: Anger materialet i fördelarens drivhjul.
    distributor_ignition_type:
      name: Distributörens tändningstyp
      description: Anger om fördelaren är konstruerad för växelströmsväxlar, elektronisk
        tändning eller HEI-system.
    distributor_kit_contents:
      name: Fördelarkit kit
      description: Anger vilka komponenter som ingår i fördelaren (t.ex. lock, rotor,
        Modules, packning/O-ring, drivdrev, kablage/koppling).
    dive_computer_form_factor:
      name: Dykdatorns formfaktor
      description: Anger den fysiska designen eller monteringsmetoden för dykdatorn,
        t.ex. konsolmonterad eller armbandsursmodell.
    diving_mask_design:
      name: Design av dykmask
      description: Definierar dykmaskens övergripande strukturella stil, Influence
        , synfält och avsedd användning.
    divot_tool_prong_configuration:
      name: Konfiguration av Divot-verktygets stift
      description: Anger antalet och placeringen av stift på divotverktyget som används
        för att reparera skador på gräsmattan.
    divot_tool_style:
      name: Divot-verktygsstil
      description: Definierar den övergripande strukturen eller implementeringsstilen
        för divotverktyget, såsom fast, switchblade/hopfällbart, multiverktyg eller
        tillbehör som fästs på en hatt eller klubba.
    djembe_shell_construction:
      name: Djembeskalkonstruktion
      description: Beskriver konstruktionsmetoden för djembens skal/kropp.
    djembe_tuning_system:
      name: Djembe-stämningssystem
      description: Anger hur djemben är spänd/stämd.
    dmx_output_connector_type:
      name: DMX-utgångskopplingstyp
      description: Fysiskt anslutningsformat som används för controllerDMX-utgång(ar).
    doctor_playset_items_included:
      name: Artiklar till läkarleksak som ingår
      description: Anger de låtsasmedicinska verktyg och rulllekstillbehör som ingår
        i läkarleksetet (t.ex. stetoskop, spruta, reflexhammare).
    doctor_playset_role_play_setting:
      name: Doktor lekset roll-play Inställningar
      description: Identifierar den primära Context som doktorns speluppsättning representerar.
    doctor_playset_wearable_items_included:
      name: Bärbara artiklar till läkarleksak som ingår
      description: Indikerar bärbara dräktkomponenter som ingår i leksetet.
    doll_accessory_type:
      name: Typ av docktillbehör
      description: Definierar vilken typ av dock- eller actionfigurtillbehör produkten
        är (t.ex. kläder, skor, möbler, displayställ), vilket gör det möjligt för
        kunder att bläddra och filtrera inom denna tillbehörskategori.
    doll_eye_type:
      name: Dockögontyp
      description: Anger konstruktionsstilen för dockans ögon (t.ex. infälld akryl,
        målad, LED-belysning).
    doll_hair_fiber_type:
      name: Typ av dockhårfiber
      description: Typ av hår/fiber som används på dockan (eller inget alls), vilket
        påverkar realism, styling och skötsel.
    doll_making_kit_components_included:
      name: Delar som ingår i dollkit
      description: Listar de viktigaste materialen och verktygen som ingår i kit så
        att kunderna kan jämföra paketen och veta vad de behöver Supply sig med.
    dollhouse_installation_placement_type:
      name: Typ av dockhusinstallation/placering
      description: Hur dockhuset är avsett att användas eller placeras (t.ex. bordsskiva
        vs. golvstående vs. väggmonterat).
    dollhouse_items_included:
      name: Dockhusartikel ingår
      description: Identifierar vad som följer med i lådan med dockhuset (möbler,
        dockor, tillbehör).
    dollhouse_lighting_type:
      name: Typ av dockhusbelysning
      description: Typ av belysning som ingår i eller stöds av dockhuset.
    dollhouse_room_type:
      name: Rumstyp för dockhus
      description: Anger det avsedda rummet/området i ett dockhus där tillbehöret
        vanligtvis används.
    dollhouse_scale:
      name: Dockhus skala
      description: Skalaförhållandet för ett dockhus eller dockskåpstillbehör (t.ex.
        1:12) för att säkerställa kompatibilitet mellan hus, möbler och figurer.
    dollhouse_style_theme:
      name: Dockhusstil/tema
      description: Dockhusets övergripande stil eller tema för bläddring och gåvoprocess
        (t.ex. modernt vs. viktorianskt).
    donnos_playing_technique:
      name: Donnos spelteknik
      description: Hur Donnos spelas/manövreras (endast hand vs. med klubba/slagmanöver),
        för att matcha köpares förväntningar och medföljande tillbehör.
    donnos_tuning_system:
      name: Dunnos stämningssystem
      description: Primär metod som används för att stämma eller ändra tonhöjd (t.ex.
        spänningssnören/klämningsmekanism).
    door_assembly_type:
      name: Typ av dörrmonstering
      description: 'Anger vad som ingår: endast dörrskal, dörrutsida eller komplett
        dörrenhet.'
    door_closure_mechanism:
      name: Dörrstängningsmekanism
      description: Definierar mekanismen som styr dörrens stängningsfunktion (t.ex.
        mjukstängning, magnetiskt lås).
    door_handle_components_included:
      name: Komponenter för dörranvändarnamn ingår
      description: Anger vilka viktiga delar som ingår i dörranvändarnamnet (t.ex.
        låscylinder, packning/tätning, listskydd, monteringsutrustning, ledningstråd,
        lås/ställdon).
    door_handle_operation:
      name: Dörranvändarnamnets drift
      description: Anger den primära aktiverings-/manövreringsstilen för fordonsdörrens
        användarnamnenhet (t.ex. mekanisk länkage, nyckelcylinder, nyckelfri touch/knapp,
        elektrisk pop-out).
    door_lock_knob_attachment_method:
      name: Fästmetod för dörrlåsknopp
      description: Anger hur dörrlåsvredet fästs på låsstången (t.ex. tråd, push-on).
    door_lock_position:
      name: Dörrlåsets position
      description: Anger vilken dörr-/öppningsposition dörrlåset eller dörrlåsdelen
        är avsedd att passa på ett fordon.
    door_seal_feature_set:
      name: Dörrtätningsfunktioner
      description: Funktionella egenskaper hos dörrtätningen.
    door_seal_material_type:
      name: Dörrtätningsmaterialtyp
      description: Primär elastomer/materialfamilj som används för dörrtätningen (Beyond
        generiskt material).
    door_seal_product_form:
      name: Produktform för dörrtätning
      description: Anger dörrtätningens försäljnings-/förpackningsform.
    door_window_operation:
      name: Manövrering av sidoruta
      description: Anger om dörrens fönstersystem är avsett för manuell eller elektrisk
        manövrering, eller om dörren saknar fönster.
    double_decker_bus_deck_configuration:
      name: Dubbeldäckad buss – våningskonfiguration
      description: Anger tillgång till övervåningen och platskonfigurationen för en
        dubbeldäckad buss.
    double_drum_pedal_linkage_medium:
      name: Medium för länkning mellan dubbeltrumpedaler
      description: Anger det medium som används för att länka sekundärpedalen till
        primärpedalen (t.ex. drivaxel, kedja, rem).
    double_end_bag_core_type:
      name: Kärntyp för dubbeländad slag-/boxningssäck
      description: Identifierar den interna slagkärnans konstruktion, som avgör returhastighet,
        känsla och underhållskrav.
    double_pointed_needle_point_style:
      name: Dubbelspetsad nålspetsstil
      description: Beskriver spetsarnas skärpa/form avsedda för olika garner och stickstilar.
    dough_extruder_accessories_included:
      name: Tillbehör till degextruder ingår
      description: Ytterligare medföljande komponenter till degextruder
    dough_extruder_operation_type:
      name: Driftstyp för degextruder
      description: Hur degen trycks genom extrudern för att skapa former.
    dough_extruder_shape_disc_included:
      name: Degextruderns formskivor ingår
      description: De former som extrudern kan producera via medföljande skivor/munstycken.
    dough_format:
      name: Degtyp
      description: Identifierar degens fysiska form i förpackningen (t.ex. boll, ark,
        skiva, strimlor).
    doumbek_accessories_included:
      name: Skrivartillbehör ingår
      description: Medföljande tillbehör till doumbek (t.ex. stämnyckel, fodral)
    doumbek_head_material:
      name: Doumbek-huvudets material
      description: Materialet i trumskinn (membranet) på doumbek.
    doumbek_head_type:
      name: Doumbek – typ av skinn
      description: Konstruktion/typ av doumbekskinn
    doumbek_playing_style_technique:
      name: Doumbek – spelstil/teknik
      description: Avsedd att spela Context/stil som vanligtvis förknippas med doumbek.
    doumbek_tuning_system:
      name: Dunnos stämningssystem
      description: Hur doumbeken är spänd/stämd (eller om den inte är stämbar)
    dowel_end_style:
      name: Typ av pluggände
      description: Beskriver snittet/formen på pluggändarna, vilket påverkar hur lätt
        de förs in, säkerhet och avsedd användning inom hantverk.
    dowel_surface_texture:
      name: Kulans yta
      description: Beskriver ytans skick (slät eller räfflad), vilket påverkar utseende
        och limvidhäftning.
    drafting_compass_adjustment_mechanism:
      name: Justeringsmekanism för kompass
      description: Primär finjusteringsmekanism som används för att ställa in radien
        exakt.
    drafting_compass_fine_adjustment_mechanism:
      name: Finjusteringsmekanism för passare
      description: Typ av finjustering som används för att ställa in radien exakt
        (om sådan finns).
    drafting_compass_lead_holder_type:
      name: Typ av blyertshållare för passare
      description: Typ av ritinsats/hållare som passaren använder eller stöder
    drag_system_material:
      name: Material för dragsystem
      description: Anger materialet eller tekniken i bromssystemet (dragstacken),
        vilket påverkar värmebeständighet och jämnhet.
    drag_system_type:
      name: Typ av dragsystem
      description: Anger vilken typ av bromsmekanism som används i rullen, såsom fram-,
        bak-, hävstångs-, stjärn-, magnetisk eller skivbroms.
    drag_type:
      name: Dragtyp
      description: Anger vilken typ av bromsmekanism som används av rullen (bromspedal
        eller aktiveringsmetod).
    drawer_features:
      name: Egenskaper för utdragslåda
      description: Anger speciella lådkonstruktionselement eller funktioner (t.ex.
        mjukstängning, filtfodrad).
    drawer_slide_type:
      name: Typ av lådskena
      description: Anger monterings- och utdragsstil för lådskenorna (t.ex. undermontering,
        full utdragning).
    drawing_ink_compatible_tools:
      name: Redskap som är kompatibla med tusch
      description: Anger de appliceringsverktyg som tuschet är avsett för (t.ex. dopppenna
        vs pensel).
    drawing_ink_permanence:
      name: Beständighet för tusch
      description: Indikerar beständighetsegenskaper som är viktiga för färdigt konstverk
        och reproduktion.
    dress_embellishment:
      name: Klänningsutsmyckning
      description: Framhäver framträdande dekorativa element som ingår i klänningens
        design.
    dress_train_type:
      name: Typ av släp för klänning
      description: Indikerar närvaron och längden/stilen på klänningssläpet, vilket
        ger information om formalitet och lämplighet för evenemangsplats.
    dried_surface_finish:
      name: Skärmytans finish
      description: Beskriver det typiska ytutseendet efter torkning (glans/textur).
    drink_tube_insulation:
      name: Isolering för sugrör
      description: Anger om sugröret har isolering eller en termisk hylsa för att
        förhindra att vätskor värms upp eller fryser.
    drive_band_cross_section_shape:
      name: Drivbandets tvärsnittsform
      description: Drivbandets profilform (rund, platt, etc.)
    drive_band_join_type:
      name: Typ av drivbandkoppling
      description: Hur drivbandet är sammanfogat/konstruerat (ändlöst vs. behöver
        knytas, etc.).
    drive_band_material_type:
      name: Typ av material på drivbandet
      description: Anger materialet/typen av drivband som används på spinnhjul.
    drive_location:
      name: Drivposition
      description: Identifierar var svänghjulet/drivmekanismen är placerad på elliptisken,
        vilket påverkar fotavtrycket och rörelsekänslan.
    drive_mechanism:
      name: Drivmekanism
      description: Anger mekanismen som överför pedalkraft till motståndssystemet.
    drive_shaft_material:
      name: Drivaxelmaterial
      description: Anger det primära konstruktionsmaterialet för drivaxelröret eller
        den kompletta enheten.
    drive_system:
      name: Drivsystem
      description: Anger mekanismen som Överföringar pedalkraft tillför motståndssystemet.
    drivetrain_configuration:
      name: Drivlinans konfiguration
      description: Anger drivlinans konfiguration på cykeln och indikerar om baknavet
        är fast, frihjul, enväxlat eller flip-flop.
    drivetrain_speed_compatibility:
      name: Hastighetskompatibilitet för drivlina
      description: Listar de kassetthastigheter som kedjedrevet är konstruerat för
        att fungera med, vilket säkerställer korrekt kuggprofil och avstånd.
    drone_positioning_system:
      name: Drönarpositioneringssystem
      description: Inbyggd positionerings-/hållteknik som stöds av drönaren för navigering
        och stabil svävning.
    drone_transmission_type:
      name: Överföringstyp för drönare
      description: Primär metod som används för kontroll- och/eller videolänk mellan
        drönaren och kontrollenheten.
    drop_spindle_whorl_position:
      name: Sländvirvelns position
      description: Placering av virveln på skaftet.
    drum_carder_accessories_included:
      name: Skrivartillbehör ingår
      description: Vanliga medföljande artiklar i ett kardningsmaskinskit
    drum_clamp_locking_mechanism:
      name: Låsmekanism för trumklämma
      description: Anger hur klämman låses/dras åt mot röret/bågen (t.ex. vingbult,
        trumnyckelbult, snabbkoppling).
    drum_clamp_mount_interface:
      name: Gränssnitt för montering av trumklämma
      description: Anger vad klämman har för att fästa tillbehör (t.ex. L-stångsfäste,
        kulled, cymbaltilter).
    drum_clamp_type:
      name: Typ av Trumklämma
      description: Anger den funktionella klämstil som används vid montering av kit
        (t.ex. ringklämma vs. hyllställ/rörklämma).
    drum_head_application_batter_resonant:
      name: Trumskinnets användningsområde (slag/resonans)
      description: Anger vilken sida/roll skinnet är utformat för på en trumma (övre
        spelyta vs. nedre resonans-/virveltrumsida).
    drum_head_collar_type:
      name: Typ av trumskinnskrage
      description: Anger om huvudet har en standardkrage, låg krage eller specialkrageprofil
        för att matcha vissa lagerkanter/skal.
    drum_head_damping_control:
      name: Dämpningskontroll för trumskinn
      description: Inbyggda övertonskontrollfunktioner eller dämpningsstil som ingår
        i skinnets konstruktion.
    drum_head_film_material:
      name: Trumskinnsfilmmaterial
      description: Primärmaterial för huvudfilmen (vanligtvis polyetentereftalat/Mylar,
        men kan inkludera specialmaterial).
    drum_head_hoop_collar_type:
      name: 'Typ av '
      description: Identifierar trumskinnets båge- och kragekonstruktion (t.ex. kragens
        profil och bågmaterial), vilket kan påverka passform och stämningsstabilitet
        på vissa skal och fälgar.
    drum_head_hoop_rim_material:
      name: Material för trumskinnsbåge/kant
      description: Materialet i köttbågen/kanten (inbäddadbågen inuti skinnet), vilket
        kan påverka hållbarhet och stämningsstabilitet.
    drum_head_included:
      name: Trumskinn ingår
      description: Anger om trumman har slag- och/eller resonansskinn.
    drum_head_muffling_feature:
      name: Dämpningsfunktion för trumskinn
      description: Inbyggda övertonskontrollfunktioner integrerade i trumskinnet.
    drum_head_muffling_type:
      name: Typ av trumskinnsdämpning
      description: Anger om trumskinnet har inbyggda element för övertonskontroll/dämpning.
    drum_head_ply_count:
      name: Antal lager i trumskinnet
      description: Antal filmlager/skikt som används i trumskinnets konstruktion (t.ex.
        1-lagers, 2-lagers).
    drum_head_position:
      name: Trumskinnets position
      description: Anger om trumskinnet är avsett som slagskinn (topp/slag), resonansskinn
        (botten), virvelskinn (botten) eller kan användas på båda sätten.
    drum_head_reinforcement_type:
      name: Typ av förstärkning för trumskinn
      description: Anger om virveltrummans skinn har förstärkningsfunktioner som en
        centerpunkt eller kontrollring för att öka hållbarheten och fokusera tonen.
    drum_head_surface_finish:
      name: Ytbehandling av bastrummans huvud
      description: Ytstruktur/finish på skinnet som påverkar anslag och borstrespons.
    drum_head_type:
      name: Trumskinnstyp
      description: Anger skinnkonstruktionen/typen som används på trumman (främst
        för slag-/resonansskinn som medföljer).
    drum_key_design_type:
      name: Typ av trumnyckeldesign
      description: Beskriver den funktionella utformningen av stämtrumnyckeln (t.ex.
        standard, spärrhake, T-handtag).
    drum_key_drive_type:
      name: Drivtyp för trumnyckel
      description: Anger driv-/gränssnittsstilen för trumnyckeln som används för att
        aktivera spänningsstången eller monteringsutrustningen.
    drum_key_handle_style:
      name: Trumnyckelns handtagsstil
      description: Beskriver handtags-/ergonomisk stil på trumnyckeln, vilket påverkar
        komfort och hävstång vid stämning.
    drum_kit_included_items:
      name: Delar som ingår i trumset
      description: Listar vilka viktiga artiklar som ingår i trumsetets paket utöver
        skalen/padarna (t.ex. hårdvara, cymbaler, trumstol).
    drum_kit_portability:
      name: Portabilitet för trumset
      description: Anger om kit är utformat för kompakt förvaring/transport (t.ex.
        resor/kompakt/vikbart).
    drum_kit_shell_construction_features:
      name: Funktioner för konstruktion av kit skal
      description: Hur skalen är konstruerade (antal/typ av lager), vilket påverkar
        ton och hållbarhet.
    drum_mount_clamp_type:
      name: Typ av klämma för trumfäste
      description: Beskriver klämformfaktorn som används vid trummonteringsutrustning.
    drum_multi_clamp_clamp_type:
      name: Typ av flerklämma för trummor
      description: Multiklämmans funktionella stil/konfiguration (hur den klämms fast
        och vad den ansluter).
    drum_mute_material:
      name: Material för trumdämpning
      description: Anger det primära materialet i trumdämparen som är i kontakt med
        trumskinnet och/eller dämpar vibrationer.
    drum_pad_triggering_zones:
      name: Trumplattans utlösare zoner
      description: Anger antalet/typen av triggerytor som stöds av tom-paden (t.ex.
        endast skinn vs. skinn+kant), vilket påverkar uttrycksfullhet och modulens
        kompatibilitet.
    drum_pedal_accessories_included:
      name: Medföljande tillbehör till trumpedal
      description: Listar viktiga tillbehör och komponenter som medföljer trumpedalen.
    drum_pedal_baseplate_type:
      name: Typ av trumpedals bottenplatta
      description: Anger om pedalen använder en basplatta eller en flytande/ramlös
        design.
    drum_pedal_bearing_type:
      name: Lagertyp för trumpedal
      description: Anger den lagermekanism som används vid primära vridpunkter (t.ex.
        vipparm, klack, kam).
    drum_pedal_cam_type:
      name: Typ av kam för trumpedal
      description: Anger Shapes/geometrin hos en trumpedal som Influence känslan och
        responsen (t.ex. linjär kontra gaspedal).
    drum_pedal_chain_configuration:
      name: Konfiguration av trumpedalkedja
      description: Anger kedjearrangemanget som används av en kedjedriven trumpedal
        (t.ex. enkelkedja, dubbelkedja eller offsetkedja).
    drum_pedal_chain_type:
      name: Typ av kedja för trumpedal
      description: Indikerar vilken typ av kedja som används i drivningen (t.ex. rullkedja
        kontra cykelkedja), vilket kan påverka jämnhet och hållbarhet.
    drum_pedal_clamp_type:
      name: Trumpedalklämma av typ
      description: Anger hur pedalen fästs på bastrummans båge.
    drum_pedal_intended_use:
      name: Avsedd användning för trumpedalen
      description: Indikerar det primära Context remdrivningspedalen är designad/märkt
        för.
    drum_pedal_spring_adjustment_method:
      name: Justeringsmetod för trumpedalens fjäder
      description: Indikerar hur fjäderspänningen justeras på pedalen.
    drum_pedal_spring_type:
      name: Typ av fjäder för trumpedal
      description: Anger fjädermekanismen som används för pedalåtergång.
    drum_shell_material:
      name: Trumskalets material
      description: Anger det primära skalkonstruktionsmaterialet för akustiska trummor
        (t.ex. lönn, björk, akryl).
    drum_shell_wood_species:
      name: Träslag för trumskal
      description: Identifierar träslaget som används till trumskalet, Influence och
        resonans.
    drumhead_type:
      name: Trumskinnstyp
      description: Huvudkonfiguration/typ som används på Octoban.
    drumstick_model:
      name: Trumpinnemodell
      description: Standardiserad trumsticka modell/storleksbeteckning som används
        av många varumärken (t.ex. 5A, 7A).
    drumstick_taper:
      name: Trumstick-kona
      description: Beskriver avsmalningsprofilen från skaft till spets, Impact rebound
        och saldo.
    drysuit_footwear_style:
      name: Torrdräktsskor stil
      description: Beskriver den integrerade underbensfinishen på torrdräkten (t.ex.
        inbyggda kängor, neoprenstrumpor, strumpor eller bara fotledstätningar).
    dumbbell_style:
      name: Hantelstil
      description: Identifierar hantelns grundläggande design – oavsett om det är
        en fast enhet, ett justerbart system eller en belastbar användarnamn-stil
        – vilket starkt Influence köpbeslut och träningsanvändning.
    dundun_playing_position:
      name: Dunduns spelposition
      description: Avsedd spel-/bärposition för trumman.
    dye_status:
      name: Färgstatus
      description: Anger om vadden är färgad, ofärgad/naturlig eller innehåller flera
        Colors/blandningar.
    dye_style:
      name: Färgstil
      description: Anger om trådfärgen är enfärgad, brokig eller på annat sätt specialfärgad.
    dye_technique:
      name: Färgteknik
      description: Metod som används för att färga fibern (t.ex. handfärgad, kittelfärgad,
        rymdfärgad).
    dye_type_needlecraft_fabric:
      name: Färgtyp (handarbetstyg)
      description: Anger om linnetyget är enfärgat, handfärgat eller specialfärgat.
    dyeing_color_processing:
      name: Färgning / färgbearbetning
      description: Beskriver om och hur fibern är färgad (t.ex. ofärgad, blekt/vit
        eller specifika färgningstekniker).
    e_bike_certification_class:
      name: Klass för elcykelcertifiering
      description: Anger däckets officiella hastighetsbetyg för elcyklar (t.ex. E-25,
        E-50).
    e_bike_speed_rating:
      name: Hastighetsklassificering för elcykel
      description: Anger den officiella certifieringsnivån för elcykeldäcket (t.ex.
        E25 för ≤25 km/h, E50 för ≤50 km/h).
    e_scooter_connector_type:
      name: Anslutningstyp för elscooter
      description: Identifierar typen av elektrisk anslutning eller kontakt som används
        av komponenten för ström- eller signalkoppling.
    e_scooter_throttle_type:
      name: Elscooter av gränstyp
      description: Anger vilken typ av gränsläge som används för att styra accelerationen
        på en elsparkcykel.
    ear_coverage:
      name: Öronskydd
      description: Anger om hjälmen inkluderar hörselskydd och om det är avtagbart.
    ear_coverage_style:
      name: Typ av örontäckning
      description: Beskriver hur, eller om, öronen är täckta av flugmasken.
    ear_coverage_type:
      name: Typ av öronskydd
      description: Anger hur hatten täcker eller skyddar öronen, inklusive förekomsten
        och typen av öronflikar.
    ear_guard_type:
      name: Typ av öronskydd
      description: Beskriver typen av hörselskydd som är integrerat i mössan, till
        exempel hårdplast, vadderade eller avtagbara skydd.
    earmuff_style:
      name: Hörselkåpor
      description: Identifierar hur hörselkåpan bärs eller dess strukturella designstil
        (t.ex. över huvudet eller omslutande bakom huvudet).
    earring_closure_type:
      name: Stängningstyp för sele
      description: Anger den mekanism som används för att fästa örhänget i örat (t.ex.
        push-back, leverback, clip-on).
    easel_art_desk_features:
      name: Funktioner för staffli och konstskrivbord
      description: Highlight vanliga funktionella funktioner som ingår i staffliet
        eller konstskrivbordet.
    easel_art_desk_surface_type:
      name: Yta för staffli och konstskrivbord
      description: Identifierar den/de användbara rit-/skrivytan/-ytorna som finns
        (t.ex. griffeltavla, whiteboardtavla, Paper , magnettavla).
    eb_clarinet_body_type:
      name: Typ av klarinettkropp
      description: Anger om Eb-klarinetten är en sopran- eller variant.
    eco_material_type:
      name: Ekomaterialtyp
      description: Highlight det miljömedvetna skummet eller den materialteknik som
        används i dynan.
    edge_construction:
      name: Däckkonstruktion
      description: Anger om skidan har en metallkant längs ingen, delar av eller hela
        sin längd.
    edge_tuner_type:
      name: Typ av kantavstämare
      description: Klassificerar stilen på skid- eller snowboardkanttrimmare, till
        exempel en filguide eller elektrisk maskin.
    edible_plant_part:
      name: Ätbar växtdel
      description: Anger vilken del av växten som säljs för konsumtion.
    educational_guide_included:
      name: Pedagogisk guide ingår
      description: Anger vilket läromedel som ingår i modellen.
    educational_topic:
      name: Utbildningsämne
      description: Primärt lärandeämne som stöds av myrfarmens pedagogiska innehåll.
    egg_component:
      name: Äggkomponent
      description: Identifierar vilken del av ägget produkten innehåller, såsom hela
        ägg, endast äggvita, äggulor eller blandningar/ersättningar.
    egg_component_replaced:
      name: Äggkomponent utbytt
      description: Anger vilken del av ägget produkten är avsedd att ersätta (t.ex.
        helt ägg, äggvitament).
    egg_enrichment:
      name: Äggberikning
      description: Indikerar eventuell näringsberikning som tillsatts äggen, såsom
        omega-3- eller D-vitaminberikning.
    egg_farming_method:
      name: Äggodlingsmetod
      description: Anger vilken produktions- eller uppfödningsmetod som används för
        äggen (t.ex. burfri, frigående, ekologisk).
    egg_grade:
      name: Äggkvalitet
      description: Anger den kvalitetsklass som tilldelats av tillsyns- eller branschorgan.
    egg_processing_state:
      name: Äggbearbetningsstatistik
      description: Indikerar all bearbetning som tillämpats på äggen före rötning
        (t.ex. Fresh, saltade, hundraårsägg).
    egg_production_method:
      name: Äggproduktionsmetod
      description: Anger det uppfödnings- eller inhysningssystem som används för att
        producera äggen (t.ex. burfritt, betesuppfött, ekologiskt).
    egg_replacer_main_ingredient:
      name: Huvudingrediens i äggersättning
      description: Anger den primära basingrediensen som äggersättningen är gjord
        av, vilket hjälper användare med kostbehov eller önskade bakegenskaper.
    egg_size:
      name: Äggstorlek
      description: Klassificerar ägg efter standard marknad storleksbeteckningar.
    egg_source_animal:
      name: Äggkällans djur
      description: Identifierar djurarten som producerade äggen.
    egg_white_processing_method:
      name: Äggvitbearbetningsmetod
      description: Anger hur äggvitorna bearbetades efter produktserie (t.ex. pastöriserade,
        spraytorkade), vilket påverkar livsmedelssäkerhet, hållbarhet och användning.
    eggplant_variety:
      name: Auberginesort
      description: Anger kultivar eller marknadsförd sort av aubergine, vilket gör
        det möjligt för kunden att välja typer som skiljer sig åt i storlek, smak,
        färg och kulinarisk användning.
    eggshell_color:
      name: Äggskalfärg
      description: Anger den dominerande skalfärgen på äggen.
    elastic_edge_finish_type:
      name: Elastisk kantfinish/typ
      description: Anger kantkonstruktionen på det vävda resårbandet som Impact komfort
        och app.
    elastic_intended_use:
      name: Elastisk avsedd användning
      description: Primärt användningsområde som elastiken är utformad för (underlättar
        att hitta rätt produkt och minskar felmatchningar).
    elastic_recovery_performance:
      name: Elastisk återhämtningsprestanda
      description: Beskriver hur väl det vävda resårbandet återgår till sin ursprungliga
        längd efter sträckning.
    elastic_recovery_quality:
      name: Elastisk återhämtningskvalitet
      description: Indikerar resårens töjningsåterhämtning – hur väl den återgår till
        sin ursprungliga längd efter att ha sträckts ut.
    elastic_stretch_level:
      name: Elastisk stretchnivå
      description: Hur mycket resåren kan töjas ut under spänning (ofta uttryckt som
        relativa nivåer när exakt % inte anges).
    elastic_structure:
      name: Elastisk struktur
      description: Anger den strukturella konstruktionen av knapphålsresår (t.ex.
        stickat, vävt, flätat), vilket kan påverka töjning, återhämtning och sömnadsprestandan.
    elastic_type:
      name: Elasticitet
      description: Anger konstruktionstyp för resårbandet (t.ex. vikbart resårband
        (FOE), flätat, stickat, vävt).
    electric_assist_type:
      name: Elektrisk assistanstyp
      description: Anger om cykeln har motorassistans och vilken typ av assistans
        som tillhandahålls.
    electric_bicycle_motor_position:
      name: Elcykelmotorns position
      description: Placering av drivmotorn på elcykeln, såsom mitthjulsdrift, framnav,
        baknav eller dubbelnav.
    electric_bike_class:
      name: Elcykelklass
      description: Kategoriserar elcykeln enligt regleringsklasser som definierar
        hastighetsgränser och gasreglageassistans.
    electric_guitar_bridge_type:
      name: Elgitarr – stalltyp
      description: Anger stall-/vibratosystemtypen på elgitarren.
    electric_instrument_output_connection_type:
      name: Typ av utgångsanslutning för elektriskt instrument
      description: Anger den/de fysiska ljudutgångskopplingen/kopplingarna som finns
        på den elektriska cellon.
    electric_riding_vehicle_control_options:
      name: Styrningsalternativ för elektriska åkfordon
      description: Kontroll-/manövreringsalternativ tillgängliga för föraren/föräldern
        (t.ex. pedal, ratt, fjärrstyrning).
    electric_spinning_wheel_speed_control_type:
      name: Elektrisk hastighetskontroll av spinnhjul
      description: Beskriver hur användaren justerar spinnhastigheten på det elektriska
        spinnhjulet.
    electric_ukulele_output_jack_type:
      name: Typ av utgångskontakt för elektrisk ukulele
      description: Specificerar den fysiska utgångskontakten som används av den elektriska
        ukulelen.
    electric_van_body_length_class:
      name: Elskåpbil – längdklass för kaross
      description: Vanlig hjulbas-/längdbaserad skåpbilsstorleksklass som används
        i listning.
    electric_van_roof_height_class:
      name: Takhöjdsklass för elskåpbil
      description: Vanlig takhöjdsklassificering som används för skåpbilar (särskilt
        lastbilar).
    electric_vehicle_drivetrain_layout:
      name: Drivlinans layout för elfordon
      description: Motor-/axelkonfiguration som beskriver hur många motorer och var
        de är placerade (utöver enkel fyrhjulsdrift/framhjulsdrift/bakhjulsdrift).
    electric_winder_accessories_included:
      name: Tillbehör för elektrisk lindningsmaskin som ingår
      description: Listar tillbehör som medföljer den elektriska lindningsmaskinen
        (t.ex. klämmor, adaptrar).
    electrical_connector_type:
      name: Elektrodkopplingstyp
      description: Anger anslutningstypen som används av dörrlåset/låssystemet för
        elektrisk integration (om tillämpligt).
    electrical_system_voltage:
      name: Elsystemets spänning
      description: Anger den nominella spänningen i fordonets elsystem som regulatorn
        är konstruerad för.
    electronic_cymbal_trigger_zones:
      name: Utlösarzoner för elektronisk cymbal
      description: Anger hur många oberoende utlösarzoner cymbalpaden har (t.ex. slag/kant/klocka).
    electronic_drum_module_audio_interface_functionality:
      name: Ljudgränssnittsfunktioner för elektronisk trummodul
      description: Anger om modulen kan fungera som ett USB-ljudgränssnitt för inspelning/uppspelning
        (utöver MIDI).
    electronic_drum_module_metronome_features:
      name: Metronomfunktioner för elektronisk trummodul
      description: Anger inbyggd övnings-/metronomkapacitet.
    electronic_drum_module_power_source:
      name: Strömkälla för elektronisk trummodul
      description: Anger den strömkälla som krävs eller stöds för modulen.
    electronic_drum_module_sample_import_support:
      name: Stöd för import av användarljud för elektronisk trummodul
      description: Anger om modulen kan importera egna ljudfiler (samples) och med
        vilken metod.
    electronic_drum_pad_playing_surface_type:
      name: Typ av spelyta för elektronisk trumplatta
      description: Beskriver spelytans konstruktion på tom-paden (t.ex. nätskinn kontra
        gummi), vilket påverkar studs, ljud och känsla.
    electronic_features:
      name: Elektroniska funktioner
      description: Indikerar elektroniska/interaktiva funktioner som ingår i bankleksaken
        (om några).
    electronic_lights_and_sound:
      name: Strömkälla för elektronik
      description: Anger om dockskåpsleksetet inkluderar elektroniska lampor och/eller
        ljudfunktioner (t.ex. lampor, dörrklocka, musik, ljudeffekter).
    electronics_power_source:
      name: elektronisk strömkälla
      description: Anger hur aktiv elektronik drivs (i förekommande fall).
    eligible_race_series:
      name: Kvalificerade tävlingsserier
      description: Tävlingsserie eller sanktionsorgan som bilen är berättigad att
        tävla i.
    elliptical_trainer_part_type:
      name: Deltyp för elliptisk träningsmaskin
      description: Klassificerar den specifika typen av tillbehör eller reservdel
        för en crosstrainer (t.ex. bälte, konsol, pedal) så att kunderna snabbt kan
        filtrera fram till den artikel de behöver utan att navigera bland många mikrokategorier.
    embellishment_technique:
      name: Utsmyckningsteknik
      description: Anger det primära dekorativa arbetet som applicerats på plagget,
        såsom broderi, tryck eller pärlarbete.
    embellishment_type:
      name: Utsmyckningstyp
      description: Identifierar vilken typ av dekorativt element som används på strumpebandet,
        såsom spets, rosetter eller pärlor.
    embossing_pen_ink_color:
      name: Bläckfärg för präglingspenna
      description: Anger färgen på det bläck som avsätts av präglingspennan (kan vara
        genomskinlig/klibbig eller pigmenterad). Skiljer sig från pennans/pipans färg.
    embossing_stylus_tip_shape:
      name: Spetsform på präglingspenna
      description: Beskriver geometrin hos präglingsspetsen som används för att skapa
        olika effekter (t.ex. kula kontra spetsig).
    embroidered_coverage_level:
      name: Broderad täckningsnivå
      description: Ungefärlig mängd broderad trådtäckning på lappens framsida.
    embroidered_patch_backing_type:
      name: Typ av baksida för broderad lapp
      description: Baksidesmaterialet på den broderade lappen som påverkar hållbarhet
        och appliceringssätt.
    embroidery_hoop_type:
      name: Broderiramtyp
      description: Identifierar broderiringens konstruktionsstil och dess primära
        spännmekanism.
    embroidery_machine_bobbin_type:
      name: Broderimaskinens spoltyp
      description: Typ/laddningssätt för spolsystem.
    emergency_lighting_configuration:
      name: Konfiguration av nödbelysning
      description: Anger den primärt installerade konfigurationen för nödvarningsbelysning
        på fordonet (t.ex. takljusramp, grillbelysning).
    emergency_lighting_package:
      name: Nödbelysningspaket
      description: Anger vilka typer av nödvarningslampor som är installerade.
    emissions_compliance_standard:
      name: Utsläppsstandard
      description: Indikerar utsläppscertifiering/överensstämmelse för motorn där
        så är tillämpligt.
    emissions_standard:
      name: Utsläppsstandard
      description: Utsläppsstandard för fordonet (varierar beroende på region och
        år).
    enclosure_panel_configuration:
      name: Konfiguration av kapslingspanel
      description: Anger vilka kapslingspaneler eller sidor som ingår (täckningskonfiguration),
        till exempel fullständig kapsling, endast sidogardiner eller 3-sidig (öppen
        fram/bak).
    enclosure_window_material:
      name: Material för fönster på kapsling/inhägnad
      description: Identifierar materialet som används för de genomskinliga fönsterpanelerna
        i inhägnaden.
    end_fitting_type:
      name: Ändkopplingstyp
      description: Den anslutningsstil som används i varje ände av fjäderbenet (fordonssidan
        och locksidan), vilket avgör monteringskompatibilitet.
    end_type:
      name: Ändtyp
      description: Anger avslutnings-/fästningsstil vid ändarna på bogserremmen för
        anslutning till bärgningspunkter.
    ends_style_blocking_wires:
      name: Ändstil (spärrtråd)
      description: Hur ändarna på spärrtråden är avslutade för säkerhet och enkel
        trädning genom spetskanterna.
    enduro_bike_suspension_adjustability:
      name: Justerbar fjädring på endurocykel
      description: Indikerar vilka fjädringsjusteringar som är tillgängliga (vanligtvis
        för framgaffel och bakstötdämpare).
    engine_bay_mounting_location:
      name: Monteringsplats i motorrummet
      description: Var expansionstanken är avsedd att monteras i motorrummet (relativ
        position).
    engine_bearing_coating:
      name: Beläggning på motorns lager
      description: Anger eventuell ytbeläggning på lagret (för slitstyrka, inbäddningsförmåga,
        minskad friktion).
    engine_bearing_position:
      name: Motorns lagerposition
      description: Anger lagrets placering/funktion i motorn.
    engine_bearing_size:
      name: Motorlagerstorlek
      description: Anger om lagret är standardstorlek eller en underdimensionerad/överdimensionerad
        variant (vanligtvis kopplad till vevaxelslipning och frigång).
    engine_configuration:
      name: Motorkonfiguration
      description: Beskriver motorns layout/konfiguration (t.ex. rak, V-cylinder,
        flat/boxer).
    engine_cooling_type:
      name: Motorkylningstyp
      description: Anger motorns kylningsmetod.
    engine_degreaser_form:
      name: Motoravfettningens form
      description: Det fysiska formatet/leveransformen för motoravfettningsmedlet.
    engine_degreaser_rinse_requirement:
      name: Sköljningskrav för motoravfettning
      description: Om avfettningsmedlet är avsett att sköljas med vatten efter applicering.
    engine_mount_type:
      name: Motorfästestyp
      description: Anger motorfästets funktionella utformning (t.ex. hydrauliskt,
        solidt, momentstöd).
    engine_oil_formulation:
      name: Motoroljans formulering
      description: Indikerar fokus för motoroljans formulering, såsom standardanvändning,
        hög körsträcka, förlängda bytesintervall eller användning för flotta/tunga
        fordon.
    engine_oil_specification:
      name: Motoroljans specifikation
      description: Specifikationen/standarden som oljan uppfyller (t.ex. API SP, API
        SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Innehåll i motorrenoveringssats
      description: Identifierar vilka huvudkomponenter som ingår i renoveringssatsen.
    engine_rotation_direction:
      name: Motorns rotationsriktning
      description: Anger motorns rotationsriktning som används i marina applikationer.
    engine_timing_system_drive_type:
      name: Drivtyp för motorns kamremssystem
      description: Anger om motorns kamsystem är remdrivet, kedjedrivet eller kugghjulsdrivet
        för kompatibilitetsmatchning.
    engine_valve_coating:
      name: Beläggning på motorns ventiler
      description: Identifierar eventuell ytbehandling eller beläggning som applicerats
        på ventilen för slitage-/värmebeständighet.
    engine_valve_position:
      name: Motorns ventilposition
      description: Anger om motorventilen är avsedd för motorns insugningssida eller
        avgassida.
    engine_valve_stem_tip_type:
      name: Motorns ventilskaftstyp
      description: Anger ventilskaftets spetsstil eller konstruktion vid kontaktpunkten
        med vipparmen eller justeraren.
    engine_valvetrain_type:
      name: Typ av ventilstyrning för motor
      description: Ventilstyrnings-/kamaxelarrangemang.
    enhancement_level:
      name: Förbättringsnivå
      description: 'Ungefärlig volymökning som insatsen ger, uttryckt i kupstorlek:
        Subtil (upp till 1 kupstorlek), Måttlig (1–2 kupstorlekar), Signifikant (2+
        kupstorlekar).'
    entry_zipper_location:
      name: Placering av dragkedjans ingång
      description: Anger var dräktens primära dragkedja eller öppning är placerad
        (t.ex. fram, bak, axel, diagonal).
    epee_point_type:
      name: Spetstyp för värja
      description: Anger märke eller standard för den spets som är installerad på
        bladet, vilket påverkar kompatibilitet och underhåll.
    equestrian_discipline:
      name: Ridsportdisciplin
      description: Anger den riddisciplin som sporren är avsedd för eller mest lämpad
        för.
    equestrian_helmet_safety_certification:
      name: Säkerhetscertifiering för ridhjälmar
      description: Anger den/de säkerhetsstandard(er) eller certifieringar som hjälmen
        uppfyller.
    equine_application_area:
      name: Användningsområde för fordon
      description: Anger den kroppsdel eller det material som produkten är avsedd
        för (t.ex. hov, man, täcke).
    equipment_contact_material_brew_wine:
      name: Kontaktmaterial för utrustning (bryggning/vin)
      description: Primärmaterial i artikeln som kommer i kontakt med vätskan (t.ex.
        glas, rostfritt stål, plast).
    eu_children_clothing_size:
      name: EU-klädstorlek för barn
      description: Anger EU-barnklädstorleken efter längd, till exempel 104 eller
        140
    eu_clothing_size:
      name: EU-klädstorlek
      description: Anger klädstorlekar i EU, till exempel 38 eller 46
    eu_cup_size:
      name: EU-kupstorlek
      description: Anger EU-kupstorleken, såsom C eller E
    eu_ring_size:
      name: EU-ringstorlek
      description: Anger EU-ringstorleken efter omkrets, till exempel 52 eller 63
    eu_shoe_size:
      name: EU-skostorlek
      description: Anger EU-skostorleken, till exempel 42 eller 42 Wide
    euphonium_included_accessories:
      name: Euphonium-tillbehör ingår
      description: Listar medföljande artiklar som vanligtvis ingår med euphonium
        (t.ex. munstycke, fodral).
    euphonium_valve_configuration:
      name: Euphonium-ventilkonfiguration
      description: Anger antalet ventiler och om den fjärde ventilen manövreras för
        hand eller med en sidomekanism.
    european_sword_historical_period:
      name: Historisk period för europeiska svärd
      description: Primär historisk period som svärdsmönstret/replikan är baserad
        på (eller originalets era).
    european_sword_pattern_type:
      name: Europeiskt svärdmönster/typ
      description: Specifikt europeiskt svärdmönster/typ (typologi) representerat
        av samlarsvärdet.
    ev_connector_adapter_direction:
      name: Riktning för EV-kontakt/adapter
      description: Anger vad adaptern konverterar från och till (fordonets inloppssida
        kontra laddarens/kabelns sida), vilket möjliggör noggrann kompatibilitetsfiltrering.
    ev_conversion_kit_completeness_level:
      name: Fullständighetsnivå för EV-konverteringssats
      description: Anger om produkten är ett komplett konverteringskit eller ett delkit
        (t.ex. endast motor + regulator).
    ev_conversion_kit_drivetrain_configuration:
      name: Drivlinekonfiguration för EV-konverteringssats
      description: Anger drivlinearkitekturen för EV-konverteringssatsen, inklusive
        motorplacering/drivlayout och om den befintliga växellådan behålls.
    ev_conversion_kit_voltage_class:
      name: EV- kit spänningsklass
      description: Nominell systemspänningsklass som EV-konverteringssatsen är utformad
        kring. Använd detta för filtrering efter vanliga systemspänningsklasser utöver
        den exakta spänningsmätningen.
    evaporator_core_type:
      name: Förångarens kärntyp
      description: Anger konstruktionsdesignen för en förångare för bil-AC.
    evenweave_fabric_finish_treatment:
      name: Jämnvävd tyg – ytfinish/behandling
      description: Indikerar eventuell förbehandling eller behandling som applicerats
        på tyget som påverkar hantering eller utseende.
    evenweave_fabric_package_format:
      name: Paketformat för evenweave-tyg
      description: Hur tyget säljs (tillskuret stycke eller löpande per meter).
    exercise_bike_accessory_part_type:
      name: Tillbehör/deltyp för motionscykel
      description: Beskriver artikelns primära funktion eller komponenttyp (t.ex.
        pedal, drivrem, flaskhållare, skärmskydd, vevarm).
    exercise_bike_cushion_component:
      name: Dynkomponent för motionscykel
      description: Anger den sitsrelaterade komponenten som medföljer, såsom en sittdyna,
        sadel eller sitsöverdrag
    exercise_bike_metrics_tracked:
      name: Mätvärden som motionscykeln spårat
      description: Listar de träningsdatafält som datorn kan mäta och visa i realtid.
    exercise_mat_accessories_included:
      name: Tillbehör som medföljer träningsmatta
      description: Listar ytterligare komponenter som medföljer mattan, såsom remmar
        eller knäskydd.
    exhaust_cooling_type:
      name: Avgaskylningstyp
      description: Anger om avgaskomponenten är avsedd för våta avgassystem (vattenkylda/vatteninsprutade)
        eller torra avgassystem.
    exhaust_installation_position:
      name: Avgasinstallationsposition
      description: Anger var på fordonet delen är monterad.
    exhaust_outlet_configuration:
      name: Konfiguration av avgasutlopp
      description: Anger avgasutgångens layout baktill på fordonet.
    expansion_tank_cap_connection_type:
      name: Kopplingstyp för expansionstanklock
      description: Den mekaniska kopplingstypen som används för att fästa och täta
        locket till expansionskärlets hals.
    expansion_tank_cap_pressure_relief_feature:
      name: Tryckavlastningsfunktion för expansionstanklock
      description: Huruvida och hur locket fungerar som tryck-/vakuumavlastare.
    expansion_tank_cap_seal_material:
      name: Material för expansionskärlets tätning
      description: Materialet i packningen/tätningen som är i kontakt med expansionskärlets
        hals.
    extension_attachment_method:
      name: Förlängningsfästningsmetod
      description: Indikerar hur förlängningen fästs på cykelns cockpit/styre, vilket
        hjälper cyklister att bekräfta kompatibilitet med deras befintliga konfigurationer.
    extension_bend_type:
      name: Förlängningsböjningstyp
      description: Beskriver den geometriska stilen eller böjningen av styrets förlängning,
        vilket påverkar förarens ergonomi och aerodynamik.
    extension_mechanism:
      name: Förlängningsmekanism
      description: Beskriver metoden som ett bord använder för att förlänga sin längd
        eller yta, om tillämpligt.
    extension_table_features:
      name: Funktioner för förlängningsbord
      description: Framhäver funktionella egenskaper som är specifika för symaskinsförlängningsbord.
    eyelet_grommet_installation_method:
      name: Installationsmetod för öljetter och genomföringar
      description: Anger hur öljetten/genomföringen installeras/fästes i materialet.
    eyewear_lens_shape:
      name: Linsens form
      description: Indikerar linsens geometriska form, såsom cylindrisk eller sfärisk,
        vilket påverkar synfält, distorsion och stil.
    eyewear_strap_material:
      name: Glasögonremmens material
      description: Anger materialet i den justerbara remmen som fäster skyddsglasögon
        eller glasögon på användarens huvud.
    fabric_backing_type:
      name: Typ av tygbaksida
      description: Anger om den utskrivbara bomullen har en stabiliserande pappersbaksida
        (och vilken typ), vilket avgör om den kan matas genom standardskrivare.
    fabric_cut_format:
      name: Tygskärformat
      description: Anger snittet/formatet på canvasduken för nålhandarbete.
    fabric_end_use:
      name: Slutanvändning av tyg
      description: Identifierar tygets primära avsedda användningsområde (vad det
        bäst används till).
    fabric_finish:
      name: Tygfinish
      description: Ytbehandling/finish som appliceras på sidentyget, vilket påverkar
        glans, känsla och prestanda.
    fabric_intended_use:
      name: Avsedd användning av tyg
      description: Primärt rekommenderade användningsområden/projekt för linnetyget.
    fabric_opacity_level:
      name: Tygets opacitetsnivå
      description: Anger hur genomskinligt tyget är, vilket påverkar behovet av skiktning
        och foder.
    fabric_patch_shape:
      name: Tyglappens form
      description: Beskriver formen på plåstren som ingår i kitet.
    fabric_repair_kit_application_method:
      name: Appliceringsmetod för tygreparationssats
      description: Anger hur reparationen appliceras på tyget (t.ex. strykning, syning,
        självhäftning).
    fabric_repair_kit_components_included:
      name: Ingående komponenter i tygreparationssatsen
      description: Listar de specifika komponenterna som medföljer i satsen (t.ex.
        lappar, tråd, nål, lim).
    fabric_repair_kit_intended_use:
      name: Avsedd användning för tygreparationskit
      description: Anger den generella reparationsuppgiften som kitet är avsett för
        (t.ex. revor, hål, fållning).
    fabric_selling_format:
      name: Format för försäljning av tyg
      description: Anger hur tyget säljs (kontinuerlig längd, förskuret stycke, rulle/bult
        eller prov).
    fabric_stretch_level:
      name: Stretch
      description: Beskriver tygets grad av stretch/elasticitet, vilket hjälper kunder
        att välja lämpliga tyger för åtsittande plagg eller strukturerade projekt.
    fabric_stretch_type:
      name: Stretchtyp
      description: Indikerar boardshortstygets stretchegenskaper, vilket är viktigt
        för rörlighet vid surfing eller simning.
    fabric_texture:
      name: Tygstruktur
      description: Beskriver ytkänslan eller den stickade strukturen på tyget som
        används i loungetoppen.
    fabric_use_case:
      name: Tyganvändningsområde
      description: Primär avsedd användning för satintyget (stycke/rulle).
    fabric_weight_class:
      name: Tygets viktklass
      description: Kategoriserar flanell efter typiska viktband för att hjälpa kunder
        att filtrera utan att veta exakt GSM/oz.
    face_mask_material:
      name: Ansiktsmaskens material
      description: Materialsammansättningen för ansiktsmasken som medföljer eller
        är kompatibel med hjälmen.
    face_mask_style:
      name: Typ av ansiktsmask
      description: Definierar den övergripande formen eller konstruktionsstilen för
        den moderiktiga ansiktsmasken, vilket hjälper kunden att hitta sin föredragna
        passform och utseende.
    face_mask_style_code:
      name: Kod för typ av ansiktsmask
      description: Definierar ansiktsmaskens strukturella stagstil eller branschkodsfamilj
        (t.ex. ROPO, OPO, RJOP).
    face_protection_type:
      name: Skyddstyp
      description: Anger typen av ansiktsskydd som medföljer eller är inbyggt i hjälmen,
        såsom burar eller visir.
    faceplate_security_features:
      name: Saknar säkerhetsfunktioner
      description: Anger stöldskydds- och åtkomstfunktioner relaterade till frontplattan
        utöver grunddesignen.
    facing_length:
      name: Vändlängd (för munstycke)
      description: Anger munstyckets vändlängd (kurvlängd), vilket påverkar respons
        och val av rörblad.
    fan_shroud_type:
      name: Typ av fläktkåpa
      description: Anger täcknings-/geometristilen för fläkthöljet (t.ex. hel vs.
        halv vs. ring).
    farming_method:
      name: Jordbruksmetod
      description: Framhäver de djurskydds- eller uppfödningsmetoder som används för
        att föda upp djuren, såsom frigående eller ekologiskt.
    farming_practice:
      name: Jordbrukspraxis
      description: Identifierar den primära odlingsmetoden som används för produkten
        (t.ex. konventionell, ekologisk, hydroponisk).
    fascinator_style:
      name: Fascinator-stil
      description: Beskriver fascinatorns strukturella design eller form så att kunder
        snabbt kan filtrera efter populära hattstilar.
    fastener_grade:
      name: Fästelementkvalitet
      description: Anger bultens hållfasthetsgrad/klass, såsom grad 8 eller klass
        10.9, vilket avgör lastkapacitet.
    fat_rendering_state:
      name: Utsmältningsgrad av fett
      description: Anger om fettet är utsmält, outsmält (rått) eller delvis utsmält,
        vilket påverkar hållbarhet och kulinarisk användning.
    fat_source:
      name: Fettkälla
      description: Identifierar den primära fettkällan som används för att producera
        smör, ghee eller margarin (animaliskt eller växtbaserat), vilket stöder allergi-
        och kostfiltrering.
    faucet_hole_configuration:
      name: Konfiguration av kranhål
      description: Anger antal och placering av förborrade kranhål på kommodens topp.
    feather_application:
      name: Fjäderapplikation
      description: Primär avsedd användning eller tillämpning av kalkonfjädrar för
        hantverk eller tillverkning.
    feather_attachment_format:
      name: Fjäderfäste/format
      description: Hur de syntetiska fjädrarna förbereds/säljs för användning (lösa,
        på sträng, på tejp, etc.).
    feather_coloration_style:
      name: Fjäderfärgningsstil
      description: Beskriver hur färg appliceras/visas på fjädern/fjäderna (t.ex.
        enfärgad, spetsfärgad, tonad), oberoende av basfärgvärdet.
    feather_component:
      name: Fjäderkomponent
      description: Anger vilken del/stil av påfågelfjädern som säljs (t.ex. ögonfjäder
        kontra herl).
    feather_curvature:
      name: Fjäderkrökning
      description: Fjäderns övergripande form/krökningsprofil.
    feather_finish:
      name: Fjäderfinish
      description: Anger om strutsfjädrarna är naturliga eller har bearbetats (t.ex.
        färgats eller blekts) för dekorativt bruk.
    feather_form:
      name: Fjäderform
      description: Anger den fysiska formen på de gåsfjäderbitar som säljs.
    feather_grade:
      name: Fjäderklass
      description: Övergripande kvalitet/urvalsgrad av fjädern för hantverk eller
        utställningsanvändning.
    feather_part:
      name: Del av fjäder
      description: Den del/struktur av kalkonfjädern som säljs (vanligtvis i listor
        över hantverks- och flugbindningsmaterial).
    feather_processing_type:
      name: Typ av fjäderbearbetning
      description: Hur fjädrarna har bearbetats för hantverk (t.ex. färgade, blekta,
        naturliga/ofärgade).
    feather_product_form:
      name: Produktform för fjäder
      description: Den fysiska formen/snittet av fjäderprodukten som den säljs (t.ex.
        lösa fjädrar, boa, fransar).
    feather_quantity_unit:
      name: Enhet för fjädermängd
      description: Definierar hur produkten säljs (t.ex. styckvis, viktmässigt, knippe)
        för att möjliggöra korrekt jämförelse mellan listor.
    feather_source:
      name: Ursprung för fjäder
      description: Anger det animaliska ursprunget för fjädrarna som används i fjäderbollar.
    feather_stiffness:
      name: Fjäderstyvhet
      description: Relativ styvhet/stelhet hos fjäderhullingarna/strukturen.
    feed_mechanism:
      name: Matningsmekanism
      description: Anger hur bollar matas in i kastmaskinen.
    feed_purpose:
      name: Syfte med fodret
      description: Beskriver det primära näringsmässiga eller funktionella målet med
        fodret eller tillskottet.
    feeder_mechanism_type:
      name: Betalningsmekanismtyp
      description: Identifierar den utmatningsmekanism som mataren använder för att
        frigöra foder.
    feijoa_cultivar:
      name: Feijoa-kultivar
      description: Identifierar den specifika kultivaren eller sorten av feijoa, eftersom
        olika kultivarer erbjuder distinkta smaker, storlekar och skördetider.
    felt_duty:
      name: Filtens belastningsklass
      description: Anger tennisbollens filtklassificering (t.ex. extra duty, regular
        duty) vilket påverkar livslängden på olika underlag.
    felting_mold_intended_use:
      name: Avsedd användning av filtform
      description: Vad formen är avsedd att skapa eller användas till i tovningsprojekt.
    felting_pad_surface_material:
      name: Ytmaterial på filtdynan
      description: Material som används på arbetsytan på tovningsdynan/mattan som
        är i kontakt med fibern/nålen.
    fencing_certification:
      name: Certifiering för fäktning
      description: Listar officiella styrande organs godkännanden som fäktningsvapnet
        uppfyller (t.ex. FIE, USFA), vilket anger tävlingslegalitet och kvalitetsstandarder.
    fencing_connector_type:
      name: Typ av stängselanslutning
      description: Anger anslutningskonfigurationen för fäktningssladdar, uttag eller
        rullar (t.ex. 2-polig, 3-polig, bajonett), vilket säkerställer komponentkompatibilitet.
    fencing_discipline:
      name: Stängseltyp
      description: Anger det fäktningsvapen eller den disciplin som produkten är designad
        för eller kompatibel med.
    fencing_weapon_type:
      name: Typ av fäktningsvapen
      description: Anger den fäktnings- eller övningsvapenstil som träningshjälpmedlet
        är kompatibelt med eller representerar, vilket hjälper användare att hitta
        lämplig utrustning.
    fender_finish_state:
      name: Ytbehandlingsstatus för skärm
      description: Indikerar skärmens ytbehandlingsstatus för lackering och monteringsberedskap.
    fender_pieces_included:
      name: Medföljande Fender-delar
      description: Listar de komponenter som medföljer produkten för att förtydliga
        om det är en enskild skärm eller en komplett sats med tillbehör.
    fender_type:
      name: Skärmtyp
      description: Klassificerar skärmens övergripande design eller stil.
    fennel_trimming:
      name: Fänkålsansning
      description: Anger vilka växtdelar som ingår i fänkålslöken (t.ex. med blad,
        trimmad topp och rot).
    fennel_variety:
      name: Fänkålssort
      description: Anger sort eller marknadssort för de fänkålslökar som säljs.
    fermentation_application:
      name: Fermenteringsanvändning
      description: Identifierar det primära livsmedel eller den dryck som kulturen
        är avsedd att fermentera (t.ex. ost, yoghurt, mjölkkefir, surdeg).
    fermentation_method:
      name: Fermenteringsmetod
      description: Anger hur sojasåsen produceras eller fermenteras (t.ex. naturligt
        bryggd, kemiskt hydrolyserad).
    fermentation_vessel_material:
      name: Material för jäsningskärl
      description: Primärmaterial i jäsningskärlet som ingår i satsen (om sådant finns).
    ferrule_material:
      name: Hylsmaterial
      description: Anger materialet som används för axelns hylsa (t.ex. Juma, fenol,
        polykarbonat, XTC eller inget), vilket påverkar hållbarhet och träffkänsla.
    fia_homologation_certification:
      name: FIA-homologering/certifiering
      description: Anger om bilen (eller säkerhetscellen) är certifierad/homologerad
        och enligt vilken standard.
    fiber_animal_source_type:
      name: Ursprungstyp för fiber
      description: Djuret eller primärkällan som rovingen kommer ifrån (eller är syntetisk),
        såsom merinoull, alpacka eller växtfibrer.
    fiber_luster_level:
      name: Fiberns glansnivå
      description: Fiberns visuella glans, från matt till hög glans.
    fiber_preparation_processing_stage:
      name: Fiberberedning/bearbetningssteg
      description: Anger hur strimman har förberetts/bearbetats för användning (t.ex.
        kardad vs. kammad, blandad, superwash).
    fiber_preparation_type:
      name: Typ av fiberberedning
      description: Identifierar hur fibern har förberetts för hantverk (t.ex. kortad
        vadd, trumkardad, förfiltat ark).
    field_hockey_ball_playing_surface:
      name: Spelyta för landhockey
      description: Identifierar spelytan eller miljön som bollen är avsedd för.
    field_hockey_ball_type:
      name: Typ av landhockeyboll
      description: Kategoriserar landhockeybollen efter dess avsedda användning eller
        speciella egenskap.
    field_hockey_goal_size_standard:
      name: Storleksstandard för landhockeymål
      description: Klassificerar målet enligt vanliga landhockeystandarder eller träningsstorlekar
        (t.ex. FIH:s utomhusregler, ungdom, mini).
    field_hockey_training_objective:
      name: Mål för landhockeyträning
      description: Definierar den primära kompetensen eller fokusområdet som träningshjälpmedlet
        är utformat för att förbättra.
    field_point_attachment_method:
      name: Metod för fältpunktsfästning
      description: Anger hur fältspetsen är fixerad på pilskaftet eller insatsen (t.ex.
        inskruvad, limmad).
    field_point_tip_style:
      name: Spetsstil för fältspets
      description: Definierar den geometriska stilen eller funktionella profilen för
        fältspetsen, vilket påverkar penetration, borttagningssvårighet och laglighet.
    fielding_glove_position:
      name: Handskposition för fielding
      description: Identifierar den defensiva position eller användning som handsken
        är avsedd för i baseboll eller softboll.
    fielding_training_focus:
      name: Träningsfokus för fielding
      description: Anger det primära kompetensområdet som träningshjälpmedlet riktar
        sig mot under övningspass.
    fig_variety:
      name: Fikonsort
      description: Identifierar den specifika sort eller variant av fikon som säljs.
    figure_8_device_design:
      name: Figur 8 enhetsdesign
      description: Identifierar den specifika konfigurationen av figur 8-enheten,
        vilket påverkar hanteringsegenskaper och avsedd användning.
    figure_finish_type:
      name: Finishtyp för figur
      description: Anger ytan/lackeringen på hästmodellfiguren (hur den ser ut/känns
        som samlarobjekt).
    figurine_scale:
      name: Figurens skala
      description: Skala/förhållande mellan figurinen och det verkliga motivet (i
        tillämpliga fall), t.ex. 1:6.
    fill_status:
      name: Fyllningsstatus
      description: Anger om gripdockan säljs förfylld, ofylld eller delvis fylld,
        vilket avgör leveranskostnaden och köpareansträngningen.
    filling_consistency:
      name: Fyllningskonsistens
      description: Beskriver fyllningens konsistens eller viskositet som medföljer
        (t.ex. len grädde, klumpig frukt, pasta).
    filling_type:
      name: Fyllningstyp
      description: Anger huvudfyllningen eller krämen inuti kakorna, om någon.
    filtration_and_mother_status:
      name: Filtrering och "moder"-status
      description: Anger om vinägern är filtrerad, ofiltrerad, rå eller innehåller
        "modervinägern", vilket riktar sig till konsumenter som söker probiotiska
        eller råa alternativ.
    filtration_method:
      name: Filtreringsmetod
      description: Material eller teknik som används för att filtrera och rena vodkan
        efter destillation.
    fin_box_system:
      name: Finbox-system
      description: Anger vilken fenlåda eller monteringsgränssnitt som kortet använder,
        vilket avgör kompatibilitet med eftermarknadsfenor.
    fin_buoyancy:
      name: Flytkraft för fenor
      description: Indikerar om fenan har positiv, neutral eller negativ flytförmåga
        i vatten, vilket påverkar dykares balans och utrustningsbalans.
    fin_flex_rating:
      name: Fena – flexibilitetsgrad
      description: Indikerar fenans relativa styvhet eller flexnivå, vilket påverkar
        den totala prestandan.
    fin_mounting_system:
      name: Fästsystem för fena
      description: Definierar fästgränssnittet eller standarden som används för att
        fästa fenan på kiteboarden (t.ex. FCS II, skruvbar, 4-håls), vilket säkerställer
        kompatibilitet mellan fenor och brädor.
    fin_position:
      name: Fenposition
      description: Anger fenans avsedda monteringsposition på kortet.
    fin_strap_type:
      name: Hakremstyp
      description: Anger typen av rem eller kundlojalitetssystem som används för att
        fästa fenan vid hälen/foten.
    fin_template:
      name: Fenans mall/profil
      description: Kategoriserar den hydrodynamiska mallen eller konturen av surfbrädans
        fena, vilket påverkar svängstil, hastighet och övergripande brädkänsla.
    finger_count:
      name: Antal fingrar
      description: Anger antalet fingrar som handsken, fliken eller utlösaren är utformad
        för att stödja.
    finger_coverage:
      name: Fingertäckning
      description: Anger hur mycket av fingrarna som är täckta.
    finger_grip_adjustability:
      name: Justerbarhet i fingergreppet
      description: Indikerar hur fingergreppet fästs eller justeras för att passa
        olika handstorlekar.
    finger_hole_configuration:
      name: Fingerhålskonfiguration
      description: Anger handens orientering för fingerhålen (högerhänt, vänsterhänt
        eller ambidextrous).
    finger_hole_count:
      name: Antal fingerhål
      description: Anger antalet fingerhål i grepplädret, en viktig stilskillnad mellan
        fingerlösa, 2-håls, 3-håls och 4-hålsmodeller.
    finger_pick_band_style:
      name: Bandstil för fingerplektrum
      description: Stilen på bandet/öglan som fästs på fingret, vilket påverkar komfort
        och justerbarhet.
    finger_pick_blade_length:
      name: Bladlängd för fingerplektrum
      description: Längden på plockbladet som sträcker sig från bandet.
    finger_pick_blade_shape:
      name: Fingerplektrum – bladform
      description: Form/profil på plockytan (bladet) som är i kontakt med strängen.
    finger_pick_size:
      name: Fingerplockarstorlek
      description: Storleksanpassning av fingerplockarens band/ögla för att passa
        olika finger- eller tumomkretsar (ej instrumentets storlek).
    finger_pick_wear_location:
      name: Användningsposition för fingerplektrum
      description: Anger vilket finger fingerplektrumet är avsett att bäras på, eller
        om produkten är ett tum- och fingerset.
    finger_protection:
      name: Fingerskydd
      description: Anger om handsken har fingerskydd och om skydden är avtagbara.
    fingerboard_bearing_type:
      name: Lagertyp för greppbräda
      description: Anger vilken lagertyp som används i greppbrädeshjul.
    fingerboard_grip_type:
      name: Greppbräda – typ av grepp
      description: Anger greppytans material/typ som används på fingerbrädans däck.
    fining_agent_active_ingredient:
      name: Aktiv ingrediens i klarningsmedel
      description: Primärt klarningsmedel som används i produkten.
    fining_agent_type:
      name: Typ av klarningsmedel
      description: Anger kemin eller materialet för klarningsmedlet för produkter
        som klarnar rödvin.
    finish_after_baking:
      name: Ytfinish efter bakning
      description: Beskriver det typiska ytutseendet efter härdning/bakning.
    finish_effect:
      name: Finish-effekt
      description: Beskriver speciella yt-/optiska effekter som applicerats på strassstenen.
    finish_type:
      name: Typ av finish
      description: Ytbehandling applicerad på ukulelekroppen.
    finished_product_format:
      name: Format för färdig produkt
      description: Anger vilken typ av doftprodukt som kitet är avsett att tillverka.
    fire_pit_accessories_included:
      name: Medföljande tillbehör till eldstad
      description: Listar viktiga tillbehör som medföljer eldstaden, såsom gnistskydd
        eller lavastenar, för att tydliggöra vad som finns i lådan.
    firework_assortment_launch_type:
      name: Avfyrningstyp för fyrverkerisortiment
      description: Beskriver hur de ingående fyrverkerierna vanligtvis antänds/avfyras.
    firework_assortment_types_included:
      name: Ingående fyrverkerityper
      description: Identifierar de primära fyrverkerityperna som ingår i sortimentet
        för att hjälpa kunder att jämföra paketens innehåll (t.ex. fontäner, romerska
        ljus, smällare).
    firework_effect_types:
      name: Typer av fyrverkerieffekter
      description: Primära visuella och/eller sensoriska effektfamiljer producerade
        av sortimentet (välj alla som gäller).
    firework_ignition_method:
      name: Fyrverkerietändningsmetod
      description: Anger hur fyrverkeriet antänds eller initieras (t.ex. tändrör eller
        elektrisk tändsticka).
    firework_visual_intensity_level:
      name: Fyrverkeriets visuella intensitetsnivå
      description: Övergripande visuell intensitet/volym av gnistor för fontäneffekten.
    firing_mode:
      name: Avfyrningsläge
      description: Listar de valbara eller primära avfyrningslägen som airsoftvapnet
        stöder.
    first_day_cover_cachet_type:
      name: Typ av förstadagastämpel
      description: Typ av cachet på det första dagskuvertet (t.ex. tryckt, handmålat).
    first_day_cover_cancellation_type:
      name: Stämpeltyp för förstadagskuvert
      description: Typ/stil av poststämpel som applicerats på förstadagskuvertet (t.ex.
        maskinstämpel, handstämpel).
    first_day_cover_set_type:
      name: Typ av förstadagskuvert-set
      description: Anger om kuvertet representerar ett enskilt nummer, en fullständig
        uppsättning eller en delmängd/kombination.
    fishing_hook_size:
      name: Krokstorlek
      description: 'Anger den standardiserade storleksbeteckningen för fiskekroken
        (t.ex. #4, 1/0, 10/0), vilket hjälper sportfiskare att matcha krokens dimensioner
        med målart och bete.'
    fishing_hook_style:
      name: Krokmodell
      description: Identifierar den specifika designen eller böjmönstret för den enskilda
        kroken, vilket påverkar presentation, krokningseffektivitet och avsedd tillämpning.
    fishing_hook_type:
      name: Typ av krok
      description: Beskriver krokkonfigurationen som medföljer fiskeskeden (om sådan
        finns).
    fishing_line_application:
      name: Användningsområde för fiskelina
      description: Identifierar den avsedda användningen av fiskelinan eller tafsmaterialet
        (t.ex. tafs, huvudlina, spetslina)
    fishing_line_buoyancy_type:
      name: Typ av flytkraft för fiskelina
      description: Klassificerar hur linan beter sig i vattenpelaren (t.ex. flytande,
        halvsjunkande, sjunkande), vilket hjälper sportfiskare att välja en lämplig
        djuppresentation.
    fishing_needle_purpose:
      name: Syfte med fiskenålar
      description: Identifierar nålens primära användningsområde vid fiskeutrustning.
    fishing_needle_types_included:
      name: Typ av betesnål som ingår
      description: Listar de specifika betesnåls- eller riggverktygstyperna som medföljer
        i setet så att kunder snabbt kan se innehållet.
    fit_profile:
      name: Passformsprofil
      description: Beskriver den övergripande skärningen och silhuetten av padden
        vilket påverkar rörlighet och täckning.
    fit_volume_classification:
      name: Klassificering av passformsvolym
      description: Kategoriserar stövelns totala inre volym som märkt efter varumärke
        (t.ex. LV för låg volym).
    fitting_angle:
      name: Monteringsvinkel
      description: Anger böjningsvinkeln för kopplingskroppen (t.ex. rak, 45°, 90°).
        Använd ”Justerbar / vridbar” för beslag med variabel vinkel och ”Annat” för
        ovanliga vinklar.
    flag_base_type:
      name: Typ av flaggbas
      description: Definierar förankrings- eller basstilen som används för att säkra
        hörnflaggan på olika spelytor.
    flag_design_theme:
      name: Designtema för flagga
      description: Beskriver det primära designtemat som representeras på flaggan
        (t.ex. land/nation, sportlag, helgdag), vilket stöder upptäckt och filtrering
        för avsiktsbaserad shopping.
    flag_mounting_method:
      name: Flaggmonteringsmetod
      description: Anger hur flaggan fästs på fordonet (t.ex. antennmontering, dragkroksmontering,
        magnetisk).
    flag_type:
      name: Flaggform
      description: Klassificerar golfflaggans specifika syfte eller stil, såsom pinflagga,
        cartflagga eller träningsflagga.
    flame_resistance_standard:
      name: Standard för flamskydd
      description: Anger den specifika standard/certifiering för flamskydd eller ljusbågsblixt
        som plagget uppfyller.
    flamenco_cajon_snare_system:
      name: Virveltrumsystem för flamenco cajon
      description: Anger den interna virveltrummekanism som används för att skapa
        det karakteristiska flamenco-surret (eller ingen alls).
    flammability_compliance:
      name: Flamskyddscertifiering
      description: Anger tillämpliga brandfarlighetsstandarder som tyget uppfyller
        för fordonsinteriörer.
    flannel_brushing_finish:
      name: Borstad finish för flanell
      description: Anger om flanellen är borstad och på vilken/vilka sidor, vilket
        påverkar mjukhet, värme och utseende.
    flannel_use_type:
      name: Användningstyp för flanell
      description: Primärt avsett användningsområde för flanellskärningen/bulten.
    flap_configuration:
      name: Utformning av flärp
      description: Anger sadelns klaffstil, till exempel monoflap eller tvillingklaff.
    flare_color:
      name: Blossfärg
      description: Färgen på det avgivna ljuset/lågan (eller linsfärgen för LED-bloss).
    flash_card_included_features:
      name: Blixtkort – funktioner
      description: Framhäver funktionella inlärnings-/användningsfunktioner som ingår
        i blixtkorten.
    flavor_intensity:
      name: Smakintensitet
      description: Anger hur koncentrerad smaksättningsprodukten är, vilket hjälper
        användarna att bestämma lämplig dosering (t.ex. standardstyrka, superstyrka).
    flavor_solvent_base:
      name: Lösningsmedelsbas för smakämne
      description: Identifierar den primära bäraren eller lösningsmedlet som används
        i smakämnet (t.ex. alkohol, propylenglykol, glycerin).
    fleece_fiber_animal_type:
      name: Djurtyp för fleecefiber
      description: Den animaliska källan till fleecefibern (art).
    fleece_finish_surface:
      name: Fleece-finish / yta
      description: Beskriver ytan/finishen på fleece (t.ex. noppfri, borstad) vilket
        påverkar noppning, mjukhet och utseende.
    fleece_preparation_method:
      name: Fleece-beredningsmetod
      description: Hur fleece förbereds/bearbetas för hantverk och spinning (fiberns
        tillstånd).
    flesh_color:
      name: Köttfärg
      description: Anger melonens inre köttfärg.
    fletching_orientation:
      name: Orientering av pilfjädring
      description: Anger hur fjädringarna är placerade på skaftet (t.ex. raka, förskjutna,
        spiralformade), vilket påverkar pilens rotation och flykt.
    fletching_profile:
      name: Profil för pilfjädring
      description: Definierar den geometriska formen eller snittet på pilfjädringen,
        vilket påverkar luftmotstånd, frigång, ljud och pilens övergripande flygegenskaper.
    flight_system_type:
      name: Typ av Flygsystem
      description: Identifierar flygets konstruktionsstil och skiljer mellan vikbara,
        gjutna och integrerade flyg- och skaftsystem.
    float_attachment_method:
      name: Fästmetod för flöte
      description: Beskriver hur flötet är fäst vid linan (t.ex. slip eller fast),
        vilket gör det möjligt för sportfiskare att filtrera efter riggstil.
    float_design:
      name: Flötesdesign
      description: Klassificerar den övergripande stilen eller typen av fiskeflöte
        (t.ex. bobber, waggler, pencil) så att sportfiskare snabbt kan välja en modell
        som passar deras teknik och förhållanden.
    float_raft_use_environment:
      name: Användningsmiljö för flotte
      description: Primärt avsedd vattenmiljö för den uppblåsbara produkten (pool
        vs lugnt öppet vatten vs bränning)
    floatation:
      name: Flytförmåga
      description: Om fyren är konstruerad för att flyta i vatten.
    floor_construction_type:
      name: Typ av stolpkonstruktion
      description: Anger utformningen av flottgolvet (t.ex. självlänsande, droppstygn)
        vilket påverkar dränering, styvhet och prestanda.
    floor_design:
      name: Golvdesign
      description: Typ av markbeläggning som medföljer inhägnaden.
    floor_inclusion:
      name: Ingående golv
      description: Anger om vestibulen har ett golv och om det golvet är avtagbart.
    floor_mat_cleaning_method:
      name: Metod för rengöring av golvmattor
      description: Anger tillverkarens rekommenderade primära rengöringsmetod för
        golvmattan.
    floor_mat_edge_style:
      name: Golvmattans kantstil
      description: Beskriver om mattan har upphöjda kanter/läppar för att fånga upp
        spill och skräp.
    floor_mat_format:
      name: Golvmatteformat
      description: Definierar det fysiska formatet eller stilen på golvskyddsprodukten
        (t.ex. enkel matta, sammankopplande platta, rulle).
    floor_mat_retention_system:
      name: Fastsättningssystem för golvmatta
      description: Anger vilken metod som används för att hålla mattan på plats.
    floor_mat_set_configuration:
      name: Konfiguration av golvmattset
      description: Anger vilka positioner som ingår i paketet (t.ex. endast främre
        par, komplett set).
    floss_sugar_granulation_grade:
      name: Malningsgrad för sockervaddsocker
      description: Beskriver kristallstorleken hos sockerblandningen (fin, medel,
        grov), vilket kan påverka maskinprestanda och slutlig konsistens.
    floss_sugar_product_form:
      name: Produktform för sockervaddsocker
      description: Anger om sockervaddsockret är klart att använda, ett smakkoncentrat
        som måste blandas med bassocker eller ett färglöst bassocker.
    flour_grind_texture:
      name: Malningstextur för mjöl
      description: Indikerar mjölets malningsgrad eller konsistens, såsom superfin,
        medelgrov, grov eller stenmalen, vilket kan påverka receptets kvalitet.
    flour_processing_method:
      name: Metod för bearbetning av nötter
      description: Fångar upp anmärkningsvärda bearbetnings- eller behandlingsmetoder
        som tillämpas på mjölet (t.ex. stenmalet, blekt, groddat, berikat) som påverkar
        smak, färg eller näringsinnehåll.
    flower_care_instructions:
      name: Instruktioner för blomskötsel
      description: Innehåller rekommenderade skötselsteg specifika för färska snittblommor
        (t.ex. trimning av stjälkar, vattenbyte).
    flugelhorn_leadpipe_material:
      name: Flygelhornets ledningsrörmaterial
      description: Materialet för blyrörskomponenten (om det anges separat från de
        andra instrumentmaterialen).
    flugelhorn_trigger_type:
      name: Typ av trigger för flygelhorn
      description: Anger om flygelhornet inkluderar en stämningsutlösare och vilken
        slid/ventil den styr.
    fluorescence_grade:
      name: Fluorescensgrad
      description: Indikerar diamantens fluorescensintensitet när den utsätts för
        UV-ljus.
    fluorescence_under_uv:
      name: Fluorescens under UV
      description: Anger om/vilken typ av fluorescenspreparatet uppvisas i ultraviolett
        ljus.
    fluorocarbon_content:
      name: Fluorocarbon-innehåll
      description: Anger om vaxet innehåller fluorkarbontillsatser och i vilken grad.
    flute_case_capacity:
      name: Förvaringskapacitet för flöjtfodral
      description: Anger vad fodralet är avsett att rymma utöver flöjtens huvudkropp
        (t.ex. flöjt + piccolaflöjt, extra huvudstycke).
    flute_cleaning_rod_tip_type:
      name: Typ av spets på rengöringsstång för flöjt
      description: Beskriver utformningen av stångänden som håller duken/rengöringstrasan
        eller är i kontakt med instrumentet (t.ex. slitsad, gängad, ögla).
    flute_footjoint_type:
      name: Typ av fotstycke för flöjt
      description: Anger flöjtens fotstyckeskonfiguration.
    flute_headjoint_cork_type:
      name: Korktyp för flöjtens huvudstycke
      description: Anger material/typ för kork/propp som medföljer huvudstycket.
    flute_key_system:
      name: Tvärflöjt – klaffsystem
      description: Identifierar det mekaniska/klaffsystem som används av flöjten (t.ex.
        Boehm-systemet) där så är tillämpligt.
    flute_keywork_material:
      name: Tangentmaterial till flöjt
      description: Material och/eller plätering av klaffarna (mekaniken), när det
        specificeras separat från kroppsmaterialet.
    flute_offset_g:
      name: Offset G för flöjt
      description: Anger om flöjten har en förskjuten G-klaff.
    flute_wall_thickness:
      name: Flöjtväggstjocklek
      description: Väggtjocklekskategori för flöjtröret (tunnväggig, standard, tjockväggig).
    fly_pattern_type:
      name: Flugmönster
      description: Klassificerar den konstgjorda flugan efter dess fiskestil eller
        insekts-/foderimitation för att hjälpa sportfiskare att snabbt filtrera fram
        rätt flugstil.
    fly_rod_style:
      name: Typ av flugspö
      description: Klassificerar spöt efter dess avsedda kastdisciplin eller tillämpning
        (t.ex. enhandsfiske, switchfiske, speyfiske).
    fly_style:
      name: Flugmodell
      description: Anger typen av gylf eller främre öppning på long-john-bottnarna.
    fly_tying_tools_included:
      name: Flugbindningsverktyg som ingår
      description: Listar de specifika flugbindningsverktygen som ingår i setet så
        att kunden vet exakt vad som ingår och kan jämföra paketen.
    fly_type:
      name: Flugtyp
      description: Anger om långkalsongerna har en funktionell gylf och vilken typ
        av gylf.
    flyer_hook_mounting_method:
      name: Monteringsmetod för flyer-krok
      description: Hur kroken fästs på flyern (t.ex. skruvmontering kontra presspassning),
        vilket påverkar installationsbarhet och kompatibilitet.
    flyer_hook_orientation:
      name: Flyerkrokens orientering
      description: Om kroken är avsedd för vänster eller höger sida av flyern, eller
        om den är vändbar/universell.
    flyer_kit_finish_coating:
      name: Ytfinish/beläggning för flyer-kit
      description: Ytbehandling applicerad på komponenterna för flyer-kit.
    flyer_kit_included_components:
      name: Komponenter för Flyer-kit som ingår
      description: Anger vilka delar som ingår i kitet.
    flyer_orifice_type:
      name: Typ av flyeröppning
      description: Anger vilken typ av öppning som används på spinnvingen.
    flying_disc_feature_set:
      name: Funktionsuppsättning för flygande skiva
      description: Anmärkningsvärda funktionella egenskaper hos den flygande skivan.
    flysheet_material:
      name: Yttertältsmaterial
      description: Identifierar det huvudsakliga tyget som används för yttertältet/yfertältet,
        Impact , hållbarhet och väderbeständighet.
    flywheel_balance_type:
      name: Typ av svänghjulsbalansering
      description: Indikerar om svänghjulet är neutralt balanserat eller använder
        en extern obalansvikt.
    foam_blocks_size_class:
      name: Storleksklass för skumblock
      description: Anger den allmänna storleksklassen för block i setet.
    foam_blocks_surface_texture:
      name: Ytstruktur för skumblock
      description: Beskriver skumblockens yttre känsla/finish.
    foam_surface_effect:
      name: Yteffekt för skum
      description: Beskriver vanliga dekorativa yteffekter som appliceras på hantverksskum
        eller frigolit, såsom glitter, metalliska eller holografiska ytor.
    foil_color:
      name: Foliefärg
      description: Anger vilken folieaccentfärg som används på certifikatet (om tillämpligt).
    foil_curtain_mounting_method:
      name: Monteringsmetod för foliegardiner
      description: Hur foliegardinen är avsedd att installeras eller hängas (t.ex.
        självhäftande remsa, öljetter).
    foil_discipline:
      name: Foliedisciplin
      description: Identifierar den primära åkstilen eller disciplinen som foilen
        är utformad för.
    foil_mast_board_mounting_type:
      name: Monteringstyp för foliemast på bräda
      description: Definierar gränssnittet högst upp på masten som fästs vid brädan
        eller foilspåran.
    foil_mast_fuselage_connection_type:
      name: Kopplingstyp mellan foliemast och flygkropp
      description: Anger hur masten ansluts till flygkroppen eller den främre vingenheten.
    foil_mounting_interface:
      name: Foliefäste – gränssnitt
      description: Identifierar den kopplingsstandard som delen använder för att fästa
        på kortet eller andra foliekomponenter.
    foil_mounting_system:
      name: System för foliefäste
      description: Anger monteringsgränssnittet för foiler eller fenor på brädan,
        vilket säkerställer kompatibilitet med åkarens befintliga utrustning.
    foil_mounting_type:
      name: Typ av foliefäste
      description: Identifierar gränssnittssystemet som används för att fästa folien
        på kortet, vilket säkerställer kompatibilitet mellan komponenterna.
    fold_over_elastic_application:
      name: Användningsområde för vikbart resårband
      description: Primär avsedd användning/applikation för knapphålsresår.
    foldability:
      name: Vikbarhet
      description: Beskriver om och hur avdelaren kan vikas eller fällas ihop för
        förvaring eller omkonfigurering.
    foldability_stow:
      name: Vikbarhet (för förvaring)
      description: Om hyllstället kan fällas ihop/lägga undan när det inte används
        (t.ex. fälls upp mot fordonet).
    folding_style:
      name: Typ av hopfällning
      description: Indikerar hur kraschplattan fälls ihop för transport och förvaring,
        vilket påverkar landningsytans jämnhet och packbarhet.
    food_basket_items_included:
      name: Livsmedel som ingår i matkorg
      description: Listar de viktigaste typerna av matartiklar som ingår i korgen
        för att hjälpa kunder att välja korgar som matchar mottagarnas smak eller
        kostbehov.
    food_coloring_form:
      name: Typ av livsmedelsfärg
      description: Anger den fysiska formen eller leveransformatet i vilket livsmedelsfärgen
        levereras (t.ex. gel, vätska, pulver, spray).
    food_contact_material:
      name: Material i kontakt med livsmedel
      description: Primärmaterial i vinframställningsutrustning (jäskärl, sifoner,
        tratt) som används med must/vin.
    food_packing_medium:
      name: Förpackningsmedium för livsmedel
      description: Anger det medium i vilket frukt eller grönsaker förpackas (t.ex.
        vatten, saltlake, sirap, olja).
    foosball_rod_type:
      name: Typ av bordsfotbollsspö
      description: Indikerar spöets mekaniska konfiguration som påverkar spelkänslan
        och säkerheten.
    foot_arch_type_compatibility:
      name: Kompatibilitet mellan fotvalvstyper
      description: Identifierar fotvalvsprofilen som inlägget är utformat för.
    foot_arch_type_suitability:
      name: Passform för fotvalv
      description: Anger vilken fotvalvsprofil inlägget är avsett att stödja.
    foot_coverage:
      name: Fotskydd
      description: Anger om benskyddet är med fot, utan fot, med stigbygel eller med
        öppen klack.
    foot_guard_type:
      name: Typ av fotskydd
      description: Anger om ett benskydd inkluderar en tå-/fotkappa och anger om kappan
        är fast eller avtagbar.
    foot_support_level:
      name: Fotstödsnivå
      description: Anger nivån av strukturellt stöd eller fasthet som ett skoinlägg
        ger, såsom låg, medel, hög eller extra hög.
    footbag_play_style:
      name: Spelstil för fotbag
      description: Primärt avsedd spelstil för fotbaggen.
    football_ball_type:
      name: Typ av fotbollsboll
      description: Anger den primära avsedda användningen eller sammanhanget för fotbollen,
        såsom spel, träning eller samlingsvisning.
    football_dummy_type:
      name: Typ av träningsdocka för fotboll
      description: Klassificerar dockans stil eller funktionella design för att återspegla
        dess specifika träningssyfte.
    football_glove_certification:
      name: Certifiering för fotbollshandskar
      description: Anger den certifiering eller standardefterlevnad som krävs för
        tävlingsspel (t.ex. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Monteringstyp för fotplatta
      description: Anger hur fotgaveln fästs vid sängramen eller golvet, vilket hjälper
        köpare att välja kompatibel hårdvara och installationsmetoder.
    footboard_style:
      name: Modell av fotbräda
      description: Definierar fotbrädans strukturella eller estetiska designstil.
    footrest_adjustability:
      name: Justering av fotstöd
      description: Anger om och hur fotstöden kan justeras för att passa barns olika
        benlängder.
    footrest_type:
      name: Typ av fotstöd
      description: Identifierar förekomsten och utformningen av ett fotstöd på pallen.
    footstrap_configuration:
      name: Utformning av fotrem
      description: Anger fotremmens infästningsmönster på brädans däck.
    footswitch_action_style:
      name: Fotpedal – funktionsstil
      description: Anger om brytarfunktionen är momentan eller låsande, och om den
        stöder båda.
    footswitch_power_source:
      name: Strömkälla för fotpedal
      description: Anger hur fotpedalen strömförsörjs, om tillämpligt (passiv via
        förstärkaruttag, batteri, extern adapter, USB, etc.).
    footwear_construction_method:
      name: Skokonstruktion
      description: Definierar tekniken som används för att fästa ovandelen på sulan,
        vilket påverkar hållbarhet, möjligheter till omsulning och pris.
    footwear_cut:
      name: Skoskaftets höjd
      description: Indikerar fotledskragens höjd (lågskuren, mellanskuren, högskuren),
        vilket balanserar rörlighet och stöd.
    footwear_size_system:
      name: Storlekssystem för skor
      description: Identifierar den regionala storleksstandarden som används för den
        angivna skostorleken (t.ex. USA, EU, Storbritannien).
    footwear_support_type:
      name: Typ av stöd för skor
      description: Anger det biomekaniska stödet eller pronationskontrollnivån som
        skon ger (t.ex. neutral, stabilitet, rörelsekontroll).
    fork_material:
      name: Gaffelmaterial
      description: Anger materialet som används till en cykels framgaffel, vilket
        påverkar styvhet, vikt och åkkvalitet.
    form_factor:
      name: Formfaktor
      description: Primär hårdvaruformfaktor för DMX-kontrollern.
    formula_car_series_class:
      name: Formelbilserie/klass
      description: Anger den racingserie eller klass som formelbilen är byggd för
        att tävla i.
    formulation_style:
      name: Formuleringstyp
      description: Framhäver specialiserade formuleringar utformade för specifika
        användningsområden eller preferenser (t.ex. Barista, Extra Creamy).
    formulation_type:
      name: Formuleringstyp
      description: Desinfektionssprayens formuleringsstil.
    fossil_preparation_level:
      name: Beredningsnivå för fossil
      description: Grad av preparering/rengöring som utförts på provet (t.ex. oberett
        i berggrund kontra fullständigt preparerat).
    fossil_preservation_type:
      name: Fossil bevarandetyp
      description: Typ av fossilbevaring (t.ex. permineraliserad, avgjutning, avtryck,
        impregnering).
    fossil_restoration_status:
      name: Status för fossilrestaurering
      description: Huruvida och hur preparatet har reparerats/restaurerats (t.ex.
        limmats, rekonstruerats, kompositerats).
    foundation_configuration:
      name: Fundament – konfiguration
      description: Anger om bottenplattan tillverkas i ett stycke eller som ett delat/tvådelat
        set för större madrasser.
    foundation_profile:
      name: Profil för bottenplatta
      description: Klassificerar den totala höjdkategorin för fundamentet – t.ex.
        ultralåg, låg, standard eller hög profil – så att kunden snabbt kan matcha
        madrasshöjd, preferenser och lakanpassning.
    frame_adjustability:
      name: Ramjustering
      description: Anger om och hur ramen kan justeras (t.ex. bredd/höjd, rotation/lutning),
        vilket påverkar ergonomi och passform för projektet.
    frame_drum_jingle_configuration:
      name: Konfiguration av ramtrummans bjällror
      description: Huruvida ramtrumman innehåller bjällror och i så fall den allmänna
        konfigurationen.
    frame_drum_tuning_system:
      name: Stämningssystem för ramtrumma
      description: Hur Frame trumman är stämd eller om den är stämbar.
    frame_finish:
      name: Ytfinish på ram
      description: Anger den skyddande beläggningen eller ytfinishen som applicerats
        på ramen, vilket påverkar hållbarhet och utseende.
    frame_mounting_standard:
      name: Standard för ramfäste
      description: Definierar specifikationen för boots-till-ram-gränssnittet (t.ex.
        195 mm 2-punkts, Trinity 3-punkts), avgörande för ramkompatibilitet.
    frame_steel_gauge:
      name: Ståltjocklek för ram
      description: Identifierar tjockleken (gauge) på stålröret som används i hyllställets
        stolpar, en viktig indikator på styrka och stabilitet.
    frame_suspension_type:
      name: Ramens fjädringstyp
      description: Indikerar cykelramens fjädringsdesign, såsom stel, hardtail eller
        fulldämpad, för att hjälpa köpare att välja ramar som matchar deras avsedda
        bygge.
    free_reed_instrument_orientation:
      name: Orientering av fritt rörbladsinstrument
      description: Anger hur instrumentet hålls/spelas (handhållet med bälg, axelband,
        etc.) för ergonomi och användningsfiltrering.
    free_weight_rack_type:
      name: Typ av hantelställ
      description: Klassificerar hyllställets strukturella stil eller funktion (t.ex.
        skivstångsställ, kettlebellställ, viktskivsträd).
    freehub_body_type:
      name: Frihjulsnav – kroppstyp
      description: Anger vilken frihjulsnavkropp eller standarden för kassettdrivare
        som stöds av cykelns bakre nav.
    freehub_driver_standard:
      name: Standard för frihjulsdrivare
      description: Identifierar kassett-/drivergränssnittet som navdelen stöder (t.ex.
        Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Gängstandard för frihjul
      description: Anger navtrådsstandarden eller -storleken som frihjulet är kompatibelt
        med.
    french_horn_bell_construction:
      name: Konstruktion av valthornsklocka
      description: Anger hur klockan är konstruerad och om den kan tas bort för transport/service.
    french_horn_bell_material:
      name: Material för valthornstratt
      description: Anger materialet/legeringen för klockan (och ofta klockutvidgningen)
        som används på valthornet.
    french_horn_bell_type:
      name: Typ av valthornsklocka
      description: Klockans konstruktionsstil.
    french_horn_finish:
      name: Valthornsfinish
      description: Instrumentets utvändiga ytbehandling/plätering.
    french_horn_included_accessories:
      name: Ingående tillbehör för valthorn
      description: Tillbehör som medföljer valthornet (fodral, munstycke etc.).
    french_horn_leadpipe_material:
      name: Material för valthornsrör
      description: Anger materialet/legeringen för ledningsröret.
    french_horn_wrap_type:
      name: Vindningstyp för valthorn
      description: Övergripande lindning/form på valthornet.
    fretboard_radius_fit:
      name: Greppbrädans radiepassning
      description: Anger om capons dynkrumning är utformad för platta eller radierade
        greppbrädor, eller är justerbar för att passa flera greppbrädesradier.
    friction_surface_included:
      name: Friktionsyta som ingår
      description: Huruvida svänghjulet har en utbytbar/installerad friktionsyta (t.ex.
        insats, ring) eller är en friktionsyta i ett stycke.
    fringe_curtain_finish:
      name: Ytfinish för fransgardin
      description: Beskriver den visuella finishen på fransytan (glans/textur).
    fringe_curtain_material:
      name: Material för fransgardiner
      description: Anger det primära materialet för gardinlisterna (t.ex. PET-folie,
        plast, papper, tyg).
    fringe_curtain_use_location:
      name: Användningsplats för fransgardin
      description: Anger om fransgardinen är avsedd för inomhusbruk, utomhusbruk eller
        båda.
    fringe_trim_style:
      name: Franskantstil
      description: Anger konstruktionen/stilen på franskanten (hur trådarna eller
        öglorna formas och presenteras).
    front_axle_standard:
      name: Standard för framaxel
      description: Listar axeldiametern och avståndet som gaffeln är konstruerad för
        att acceptera (t.ex. 15 x 110 mm Boost), vilket säkerställer navkompatibilitet.
    front_button_configuration:
      name: Knappkonfiguration fram
      description: Indikerar en jackas främre knappstyling, och anger om den är enkel-
        eller dubbelknäppt och antalet främre knappar.
    front_closure_style:
      name: Typ av stängning på framsida
      description: Anger stilen på trenchcoatens framsida, såsom enkel- eller dubbelknäppt,
        öppen, omlott eller blixtlås.
    front_decoration_type:
      name: Typ av dekoration framtill
      description: Identifierar typen av utsmyckning eller lapp som finns på hattens
        framsida (t.ex. broderad lapp, läderlapp).
    front_point_configuration:
      name: Utformning av främre spets
      description: Anger utformningen av frontpunkterna (enpunkt, dubbelpunkt, modulär,
        utbytbar), vilket påverkar penetrationsprecisionen på is och blandad terräng.
    front_seat_position:
      name: Framsätets position
      description: Vilken sida/position i främre raden sätet är avsett för.
    front_style:
      name: Frontstil
      description: Beskriver chinosens konstruktion framtill och anger om byxorna
        är platta, veckade eller har andra detaljer.
    frosting_or_icing_type:
      name: Frosting eller glasyrtyp
      description: Anger vilken typ av frosting eller glasyr som appliceras på kakan
        eller dessertbaren.
    fruit_cultivar_or_variety:
      name: Fruktkultivar eller sort
      description: Anger fruktens specifika kultivar eller sortnamn (t.ex. Gala, Granny
        Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Typ av fruktskärning
      description: Beskriver hur frukten är beredd eller skuren (t.ex. hel, skivad,
        tärnad).
    fruit_mix_variety:
      name: Fruktblandning
      description: Namnger temablandningen eller den allmänna varianten av fruktblandningen
        (t.ex. Tropical Mix, Berry Medley).
    fruit_piece_form:
      name: Form på fruktbitar
      description: Beskriver den fysiska styckningen eller presentationen av torkade
        fruktbitar, t.ex. hela, skivade, pulveriserade.
    fruit_snack_form:
      name: Form på fruktsnacks
      description: Klassificerar den fysiska formen eller stilen i vilken fruktsnackset
        presenteras.
    fruit_topping_format:
      name: Format för frukttopping
      description: Beskriver den fysiska formen, konsistensen eller stilen på toppingen
        så att kunden kan välja mellan såser, sirap, grova fruktbitar, poppande pärlor
        etc.
    fruit_variety:
      name: Fruktsort
      description: Anger den primära frukten som används i ett recept/sats/tillbehör
        för fruktvin (t.ex. äpple, körsbär, björnbär).
    fuel_cap_gasket_seal_material:
      name: Packning/tätningsmaterial för bränslelock
      description: Anger materialet som används för tätningspackningen/O-ringen på
        tanklocket.
    fuel_cap_locking_mechanism:
      name: Verktygslös låsmekanism
      description: Indikerar låsningsmetoden som används av ett låsbart tanklock.
    fuel_cap_type:
      name: Typ av glödlampssockel
      description: Anger den funktionella typen/utformningen av tanklocket som används
        för ett fordons bränslepåfyllningshals.
    fuel_cap_venting:
      name: Ventilering av bränslelock
      description: Anger om tanklocket är ventilerat och, i förekommande fall, ventilationsstil.
    fuel_filter_features:
      name: Bränslefilterets funktioner
      description: Listar viktiga funktionella egenskaper hos bränslefiltret (vattenseparation,
        dräneringsventil, sensorport etc.).
    fuel_filter_media_material:
      name: Material för filtermedia
      description: Anger det primära filtermaterialet som används inuti bränslefilterelementet.
    fuel_filter_mounting_connection_type:
      name: Bränslefiltermontering/kopplingstyp
      description: Anger hur bränslefiltret ansluts/installeras (gängat/påskruvbar,
        snabbkoppling, slangnippel, banjo etc.).
    fuel_injection_cleaning_method:
      name: Rengöringsmetod för bränsleinsprutningssystem
      description: Indikerar hur kit används för att rengöra bränsleinsprutningssystemet.
    fuel_injector_electrical_connector_type:
      name: Typ av elektrisk anslutning för bränsleinsprutare
      description: Anger injektorns elektriska anslutningsstandard/form.
    fuel_injector_seat_type:
      name: Typ av säte för bränslespridare
      description: Anger den typ av gränssnitt mellan insprutningsmunstycke/säte som
        används för tätning vid insugnings-/bränsleinsprutningsröret.
    fuel_injector_spray_pattern:
      name: Spridningsmönster för bränsleinsprutare
      description: Identifierar insprutarens bränslesprut-/distribution med hjälp
        av tillverkare eller branschterminologi (t.ex. kon, fläkt, pennstråle, flerhåls).
    fuel_level_sensor_mounting_type:
      name: Monteringstyp för bränslenivåsensor
      description: Anger det fysiska monteringsgränssnittet som används för att fästa
        bränslenivåsensorn/sändaren till bränsletanken eller pumpmodulen.
    fuel_level_sensor_sensing_mechanism:
      name: Bränslenivåsensorns avkänningsmekanism
      description: Anger den avkänningsmekanism/teknik som används för att mäta bränslenivån
        i en bränslenivåsensor eller sändarenhet.
    fuel_line_compliance_standard:
      name: Standard för bränsleledningskompatibilitet
      description: Identifierar den regel- eller branschstandard som bränsleledningen
        uppfyller (vanligt i marina applikationer).
    fuel_line_connector_interface_type:
      name: Anslutningsgränssnittstyp för bränsleledning
      description: Anger kopplings-/gränssnittstypen vid änden/ändarna av bränsleledningen
        eller kopplingen.
    fuel_pressure_regulator_body_material:
      name: Material för bränsletrycksregulatorns hus
      description: Anger regulatorhusets/regulatorkroppens material för hållbarhet
        och korrosionsbeständighet.
    fuel_pressure_regulator_mounting_type:
      name: Monteringstyp för bränsletrycksregulator
      description: Anger hur bränsletrycksregulatorn är monterad eller installerad,
        vilket påverkar passform och kompatibilitet.
    fuel_pump_inlet_type:
      name: Bränslepumpsinloppstyp
      description: Kopplingsstil vid pumpinloppet.
    fuel_pump_mounting_location:
      name: Monteringsplats för bränslepump
      description: Där bränslepumpen är installerad på/i fordonets bränslesystem.
    fuel_pump_outlet_connection_type:
      name: Typ av utloppskoppling för bränslepump
      description: Anger den fysiska kopplingstypen vid bränslepumpens utlopp för
        kompatibilitet med montering/installation.
    fuel_system_application:
      name: Användningsområde för bränslesystem
      description: Bränsleleveranssystemarkitektur som bränslepumpen är konstruerad
        för att stödja (t.ex. förgasare, EFI, GDI, dieselpump/transfer).
    fuel_system_connection_type:
      name: Bränslesystemkopplingstyp
      description: Anger den/de bränslesystemkopplingsstandard(er) eller adaptergränssnitt
        som stöds av satsen.
    fuel_system_type:
      name: Typ av bränslesystem
      description: Anger motorns bränslematningssystem (t.ex. förgasare eller bränsleinsprutning).
    fuel_tank_installation_position:
      name: Monteringsläge för bränsletank
      description: Anger den typiska installationspositionen för bränsletanken på
        fordonet.
    fuel_tank_orientation:
      name: Bränsletankens orientering
      description: Anger om bränsletanken är avsedd att installeras horisontellt eller
        vertikalt.
    fuel_tank_shape:
      name: Bränsletankens form
      description: Beskriver bränsletankens övergripande form för att stödja fysisk
        passform och matchning vid utbyte
    fur_type:
      name: Pälstyp
      description: Identifierar arten eller det konstgjorda materialet för eventuell
        päls på utsidan av muffen eller väskan.
    furniture_finish:
      name: Möbelfinish
      description: Beskriver ytbehandlingen eller finishen som applicerats på möbeln,
        vilket påverkar dess utseende och underhållskrav.
    fuse_form_factor:
      name: Säkring – format
      description: Anger den fysiska säkringens typ/passform för att säkerställa att
        den passar den avsedda säkringshållaren eller säkringsblocket (t.ex. blad
        kontra patron).
    fuse_terminal_or_mount_style:
      name: Typ av säkringsterminal eller monteringsstil
      description: Anger hur säkringen ansluts mekaniskt/elektriskt (plug-in vs. bultmonterad
        vs. inline).
    fusible_application_method:
      name: Metod för applicering av smältlim
      description: Anger hur ett smältbart lim aktiveras/appliceras (t.ex. strykvärme,
        press, förstärkningssömnad).
    fusible_hem_tape_application_method:
      name: Appliceringsmetod för smältbart fållband
      description: Beskriver hur tejpen aktiveras/appliceras (t.ex. strykning, värmepress).
    fusible_seam_tape_activation_method:
      name: Aktiveringsmetod för sömsmältband
      description: Indikerar hur limmet aktiveras under applicering.
    fusible_seam_tape_application:
      name: Användningsområde för smältbar sömtejp
      description: Anger den primära avsedda användningen för smältbar sömtejp.
    fusible_seam_tape_material:
      name: Smältbart sömbandsmaterial
      description: Material eller sammansättning av tejpen/vävden/bäraren (inte tyget
        den fäster mot).
    fusible_seam_tape_washability:
      name: Tvättbarhet för smältbara sömmar
      description: Anger om den sammansvetsade sömmen förblir intakt efter tvätt eller
        rengöring.
    fusible_seam_tape_waterproof_rating:
      name: Vattentäthetsklassificering för smältbar sömtejp
      description: Anger om sömtejpen är avsedd att skapa en vattentät eller vattenavvisande
        söm efter applicering.
    fusible_tape_backing_type:
      name: Baksidetyp för smältbar tejp
      description: Anger om tejpen har en släppappersbaksida/foder och vilken form
        den har, vilket påverkar hantering och applicering.
    futon_frame_conversion_mechanism:
      name: Växlingsmekanism för futonram
      description: Definierar mekanismen eller den strukturella stilen som används
        för att omvandla ramen mellan soff-, loung- och sängpositioner.
    gaiter_height_type:
      name: Typ av damaskhöjd
      description: Klassificerar damasker efter hur högt de täcker benet, såsom fotled,
        mellanvad, knähöga eller lårhöga.
    game_variation:
      name: Spelvariant
      description: Anger vilken spelstil setet är utformat för (t.ex. klassisk tetherboll,
        tethertennis, speedboll).
    garlic_preparation_style:
      name: Vitlöksberedning
      description: Anger hur vitlöken bereds eller bearbetas före försäljning (t.ex.
        hel, hackad, pulveriserad).
    garlic_variety:
      name: Vitlökssort
      description: Identifierar den botaniska eller kommersiella sorten/kultivar av
        vitlök som erbjuds.
    garment_back_style:
      name: Plaggets ryggstil
      description: Identifierar designen eller konstruktionen av plaggets baksida
        (t.ex. öppen rygg, racerback, korsrygg).
    garment_pattern_type:
      name: Plaggmönstertyp
      description: Anger vilken typ av klädesplagg som sömnadsmönstret är avsett för.
    garnish_type:
      name: Garneringstyp
      description: Identifierar vilken garnering (ingrediens eller garneringsstil)
        som används för att avsluta en cocktail.
    gas_lift_class:
      name: Klass för gaslyft
      description: Anger säkerhets- och hållfasthetsklassificeringen för gaslyftcylindern
        som används för justering av sitshöjden.
    gas_propellant_type:
      name: Typ av gasdrivmedel
      description: Anger vilken typ av gasdrivmedel som rekommenderas eller är kompatibelt
        när blästerpistolen är gasdriven.
    gatta_tabla_tuning_block_material:
      name: Gatta (tabla-stämblock) material
      description: Materialet i stämblocken (gatta) som används mellan stämremmen
        och skalet.
    gauge_mounting_type:
      name: Fästtyp för mätare
      description: Hur bränslemätaren är monterad/installerad på vattenfarkosten.
    gauge_style:
      name: Typ av mätare
      description: Anger vilken typ av tryckmätare pumpen använder, till exempel analog
        urtavla, digital avläsning eller ingen.
    gear_oil_api_classification:
      name: API-klassificering av växellådsolja
      description: API GL-klassificering för växellådsoljor som används i differentialer/manuella
        växellådor.
    gel_wax_density_grade:
      name: Densitetsgrad för gelvax
      description: Indikerar densitetsgraden för gelvax, vilket påverkar klarhet,
        doft och lämplighet för inbäddning.
    gel_wax_transparency_level:
      name: Gelvaxets transparensnivå
      description: Beskriver gelvaxets klarhet/opacitet vid avsett användning.
    gelatin_form:
      name: Gelatinform
      description: Anger den fysiska formen av gelatinet så att användare kan välja
        rätt format för recept och industriella applikationer.
    gelatin_or_gelling_agent_source:
      name: Källa för gelatin eller geleringsmedel
      description: Anger Origin eller typen av geleringsmedel som används i produkten,
        viktigt av kost- och religiösa skäl.
    gelatin_source:
      name: Gelatinkälla
      description: Anger gelatinets animaliska, växtbaserade eller syntetiska ursprung
        så att kunden kan verifiera kompatibilitet med kost-, etiska eller religiösa
        krav.
    gelling_agent:
      name: Geleringsmedel
      description: Identifierar det primära ämnet som används för att stelna eller
        tjockna desserten, viktigt för kostmässig lämplighet och konsistens.
    gemstone_clarity_grade:
      name: Ädelstenens klarhetsgrad
      description: Ädelstenens klarhetsgrad (när den är graderad).
    gemstone_creation_method:
      name: Framställningsmetod för ädelsten
      description: Anger om ädelstenen är naturlig, labskapad eller en imitation/simulant.
    gemstone_cut_style:
      name: Ädelstensslipning
      description: Beskriver slipningsstilen/finishen på ädelstensprovet.
    gemstone_treatment_status:
      name: Behandlingsstatus för ädelsten
      description: Anger om och hur ädelstenen har behandlats/förbättrats.
    geological_period:
      name: Geologisk period
      description: Geologisk period (och eventuell epok) för fossilet när den är känd
        (t.ex. jura, krita, eocen).
    gift_box_tin_insert_type:
      name: Insatstyp för presentask/plåtask
      description: Invändig insatskonfiguration för att organisera/skydda artiklar
        inuti lådan/plåtasken.
    gift_box_tin_sustainability_features:
      name: Hållbarhetsfunktioner för presentask/plåtask
      description: Hållbarhetsrelaterade egenskaper hos presentaskens/plåtaskens förpackning.
    gift_box_tin_window_type:
      name: Typ av fönster på presentask/-burk
      description: Om presentasken har ett skyltfönster och i sådana fall dess stil.
    gift_message_option:
      name: Alternativ för presentmeddelande
      description: Anger om det går att inkludera ett presentmeddelande eller en hälsning
        och i sådana fall hur (ej tillämpligt, ingår, anpassningsbar).
    ginger_maturity:
      name: Mognadsgrad för ingefära
      description: Indikerar ingefärans skördestadium, såsom ung eller mogen, vilket
        påverkar smakintensiteten och föredragen kulinarisk applicering.
    ginger_variety:
      name: Ingefära sort
      description: Anger sort, typ eller besläktad jordstam inom ingefärafamiljen
        för att särskilja smakprofiler och kulinariska användningsområden.
    glass_kiln_controller_type:
      name: Typ av styrenhet för glasugn
      description: Typ av temperatur-/styrningsenhet som ingår i ugnen.
    glass_kiln_firing_application:
      name: Användningsområde för glasugnsbränning
      description: Primära glasbearbetningsapplikationer som ugnen är avsedd för.
    glass_stone_application_method:
      name: Appliceringsmetod för glassten
      description: Anger hur glasstenarna är avsedda att fästas/appliceras i projekt
        (t.ex. limning, värmeapplicering, sömnad).
    glass_tint:
      name: Glasfärg
      description: Glas-/plastfärgen som används till flaskan för att hantera ljusexponering
        (vanligt vid bryggning/vinframställning).
    glaze_firing_atmosphere:
      name: Glasyrbränningsatmosfär
      description: Den/de bränningsatmosfär(er) som glasyren är avsedd för.
    glaze_opacity:
      name: Glasyrens opacitet
      description: Hur transparent glasyren ser ut efter bränning.
    glaze_product_form:
      name: Glasyr – produktform
      description: Den fysiska form i vilken glasyrprodukten levereras (t.ex. vätska,
        torrt pulver, koncentrat, spray).
    glider_avionics_package:
      name: Avionikpaket för glidflygplan
      description: Indikerar den övergripande nivån av navigerings- och flyginstrument
        som är installerade i segelflygplanet.
    glider_certification_rating:
      name: Certifieringsbetyg för glidflygplan
      description: Officiell certifieringsklass som anger glidflygplanets säkerhets-
        och prestationsnivå (t.ex. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Konfiguration av landningsställ för glidflygplan
      description: Anger landningsställskonfigurationen som används av glidflygplanet.
    glider_launch_method:
      name: Uppskjutningsmetod för glidflygplan
      description: Anger hur segelflygplanet vanligtvis startas eller självstartar.
    glider_performance_class:
      name: Prestandaklass för glidflygplan
      description: Tävlings-/prestandaklass eller kategori som vanligtvis används
        för segelflygplan.
    glitter_application_method:
      name: Appliceringsmetod för glitter
      description: Anger den avsedda tekniken för att applicera/använda hantverksglitter
        (t.ex. strö/skaka, blanda i, gnugga på, applicera över lim, pensla på, spraya
        på, värmefixera/prägla).
    glitter_eco_friendly_claim:
      name: Glitter – hållbarhetsanspråk
      description: Miljö-/ekologiska påståenden specifika för lösa glitterformuleringar.
    glitter_effect_type:
      name: Glittereffekttyp
      description: Beskriver den visuella effekten av glittret/paljetterna utöver
        basfärgen (t.ex. holografisk, iriserande).
    glitter_glue_base_solvent_type:
      name: Glitterlimbas/lösningsmedelstyp
      description: Beskriver den primära basen för glitterlimmet (rengöring och materialkompatibilitet
        utgör vanlig oro hos kunder).
    glitter_opacity_coverage:
      name: Opacitet/täckning för glitter
      description: Anger hur ogenomskinlig glittereffekten ser ut när den appliceras.
    glitter_use_suitability:
      name: Lämplighet för glitteranvändning
      description: Anger den primära avsedda eller godkända användningskontexten för
        glitterpulvret (t.ex. endast för hantverk, kosmetisk kvalitet/kroppssäker
        eller livsmedelssäker).
    glove_armor_placement:
      name: Placering av handskskydd
      description: Identifierar var skyddsutrustningen är placerad på handsken.
    glove_cuff_length:
      name: Handskmanschettlängd
      description: Indikerar manschettens täckningslängd på en racinghandske vid handleden/underarmen.
    glove_finger_coverage:
      name: Täckning av handskars fingrar
      description: Beskriver graden av fingertäckning som handsken ger, från helfingerdesign
        till fingerlös design.
    glove_finger_design:
      name: Handskefingerdesign
      description: Anger handskens fingerkonfiguration, till exempel femfingerig eller
        vante.
    glove_fit_profile:
      name: Passformsprofil för handske
      description: Beskriver handskens inre form och övergripande silhuett så att
        spelarna kan välja den känsla de föredrar.
    glove_insulation:
      name: Isolering för handske
      description: Anger handskens isolering/värmekonstruktion eller uppvärmning (t.ex.
        isoleringsnivå, foder-/isoleringsteknik eller uppvärmd typ).
    glove_palm_material:
      name: Handske – material för handflatan
      description: Anger det primära materialet som används på handskens handflata
        (huvudkontakt/greppytan), vilket kan skilja sig från bakhanden.
    glove_size:
      name: Handskar – storlek
      description: Indikerar den allmänna handstorlek som väskvantarna är utformade
        för att passa, ofta uttryckt med kläder-liknande storlekskoder eller ungdomsstorlekar.
    glove_webbing_style:
      name: Typ av webbing i handsken
      description: Definierar utformningen av handskens webb eller ficka, vilket påverkar
        bollkontroll, positionslämplighet och spelarens preferenser.
    glow_effect:
      name: Glödeffekt
      description: Anger om gelbollarna är självlysande eller har spårämnen för spel
        i svagt ljus.
    glow_plug_connector_type:
      name: Kopplingstyp för glödstift
      description: Elektrisk terminal/anslutningstyp på glödstiftet som används för
        att ansluta till fordonets kabelhärva.
    glow_plug_heating_element_type:
      name: Typ av glödstiftsvärmeelement
      description: Typ/teknik för värmeelementet som används av glödstiftet.
    glue_application_format:
      name: Appliceringsformat för lim
      description: Anger applikator-/dispenseringsformat som används för att applicera
        skollim.
    glue_applicator_type:
      name: Typ av limapplikator
      description: Anger den inbyggda applikator-/dispenseringsspetsstil som används
        för att applicera flytande lim.
    glue_base_formulation:
      name: Limbasformulering
      description: Identifierar den primära kemiska/basformuleringen för hobbylimmet
        (för prestanda, säkerhet och rengöringsförväntningar).
    glue_gun_nozzle_style:
      name: Typ av limpistolmunstycke
      description: Anger den fysiska munstycksspetsen på en limpistol, vilket påverkar
        appliceringsprecision och limtäckning.
    glue_safety_standard:
      name: Säkerhetsstandard för lim
      description: Anger om limmet är giftfritt/barnsäkert enligt märkning och vanliga
        standarder.
    goal_frame_material:
      name: Material för målram
      description: Identifierar materialet i målstolparna/ramen, vilket påverkar vikt,
        bärbarhet och väderbeständighet.
    goal_size:
      name: Målstorlek
      description: Klassificerar ett fotbollsmål i en vanlig reglerings- eller träningsstorleksgrupp
        för snabbare val än enbart rådimensioner.
    goal_size_classification:
      name: Klassificering för målstorlek
      description: Anger målets standardiserade storleksklass (t.ex. fullstorlek,
        ungdom, mini) så att användare snabbt kan välja utrustning som är lämplig
        för deras spelnivå.
    goal_size_standard:
      name: Standard för målstorlek
      description: Anger vilken officiell standard eller åldersgruppsstandard målet
        uppfyller (t.ex. World Aquatics, 12U).
    goalie_configuration:
      name: Målvaktskonfiguration
      description: Anger antalet målvakter per lag som är konfigurerade på bordet
        (amerikansk 3-målvaktsstil kontra europeisk 1-målvaktsstil).
    goalie_playing_surface:
      name: Spelunderlag för målvakt
      description: Anger den primära spelytan eller miljön som hockeymålvaktsutrustningen
        är avsedd för.
    goalkeeper_glove_cut:
      name: Modell av målvaktshandske
      description: Indikerar handflatans/fingrets konstruktionsstil (skärning) på
        målvaktshandskar, vilket påverkar passform, bollkänsla och kontroll.
    goalkeeper_training_aid_type:
      name: Typ av hjälpmedel för målvaktsträning
      description: Identifierar stilen på målvaktsträningsstödet, vilket möjliggör
        exakt filtrering.
    goblet_drum_playing_style:
      name: Spelstil för bägartrumma
      description: Om instrumentet främst är utformat för handspel eller för användning
        med pinnar/klubbor.
    gobo_format:
      name: Gobo-format
      description: Anger den gobostandard/storlek som projektorn accepterar (diameter-
        och tjockleksfamilj), vilket säkerställer kompatibilitet med ersättnings-/anpassade
        gobos.
    gobo_root_variety:
      name: Gobo rotsort
      description: Identifierar den specifika kultivaren eller sorten av gobo (kardborre)
        rot.
    gobo_rotation:
      name: Gobo-rotation
      description: Anger om gobon kan rotera och vilken riktning som stöds.
    goggle_accessory_type:
      name: Typ av tillbehör för skyddsglasögon
      description: Klassificerar typen av tillbehör (t.ex. fodral, väska, rem) så
        att kunden kan filtrera de olika produktgrupperna inom denna kategori.
    goggle_features:
      name: Egenskaper för skyddsglasögon
      description: Listar speciella funktionella eller designmässiga egenskaper som
        erbjuds av skyddsglasögon.
    goggle_fit_design:
      name: Passformsdesign för skyddsglasögon
      description: Beskriver hur skyddsglasögonen är avsedda att passa eller bäras,
        inklusive OTG-kompatibilitet (över glasögon).
    goggle_gasket_material:
      name: Material för skyddsglasögonspackning
      description: Materialet i tätningen som sitter mot ansiktet, vilket påverkar
        komfort, allergiproblem och läckageförebyggande.
    goggle_integration:
      name: Integration av skyddsglasögon
      description: Huruvida hjälmen är utformad för att användas med skyddsglasögon
        och/eller inkluderar integrerade funktioner för att hålla skyddsglasögon på
        plats.
    goggle_lens_shape:
      name: Linsform för skyddsglasögon
      description: Definierar krökningsprofilen för ersättningslinsen, vilket påverkar
        distorsion och synfält (t.ex. cylindrisk, sfärisk, torisk).
    goggle_lens_tint:
      name: Färg på glasögonlinser
      description: Definierar linsens nyans eller finish, vilket påverkar ljustransmission,
        färguppfattning och estetiskt utseende.
    goggle_strap_material:
      name: Material för skyddsglasögonremmen
      description: Primärmaterial som används för huvudremmen, vilket påverkar hållbarhet
        och komfort.
    golf_accessory_set_purpose:
      name: Syfte med golftillbehörsset
      description: Identifierar den primära avsedda användningen eller temat för golftillbehörssetet.
    golf_bag_style:
      name: Golfbagstil
      description: Anger golfbagens primära design eller användningsstil (t.ex. stativ,
        vagn, caddie).
    golf_ball_alignment_design:
      name: Riktningsdesign för golfboll
      description: Anger eventuella inbyggda visuella hjälpmedel för riktning som
        är tryckta eller gjutna på bollens yta.
    golf_ball_construction:
      name: Golfbollskonstruktion
      description: Anger antalet lager/delar som används i golfbollens konstruktion,
        vilket påverkar spinn, känsla och längd.
    golf_ball_cover_material:
      name: Material för golfbollens ytterhölje
      description: Identifierar golfbollens yttre höljesmaterial, vilket påverkar
        spinn, hållbarhet och känsla.
    golf_cart_cover_climate_use:
      name: Klimatanpassad användning för golfbilsskydd
      description: Indikerar det primära klimatet/årstiden som förvaringsöverdraget
        är konstruerat för att motstå.
    golf_cart_enclosure_fit_type:
      name: Passformstyp för golfbilskapsling
      description: Anger om höljet är utformat för ett specifikt antal sittplatser/utformning
        eller erbjuder en universell/justerbar passform.
    golf_cart_intended_use:
      name: Avsedd användning för golfbil
      description: Primär avsedd användning - låda som golfvarukorgen är utformad
        eller konfigurerad för.
    golf_club_number:
      name: Golfklubbsnummer
      description: Identifierar det specifika numret eller wedgebeteckningen som är
        tryckt på klubban (t.ex. 5, PW, GW).
    golf_club_part_type:
      name: Typ av golfklubbdel
      description: Kategoriserar golfklubbstillbehöret eller komponenten i vanliga
        undertyper (t.ex. adapterhylsa, hylsa, vikt).
    golf_grip_size:
      name: Golfgreppstorlek
      description: Anger den övergripande externa storlekskategorin för golfgreppet,
        vilket indikerar hur tjockt greppet känns i handen.
    golf_shoe_spike_type:
      name: Typ av golfskospikar
      description: Identifierar vilken typ av greppsystem som används på yttersulan
        på golfskor (t.ex. spikade eller spiklösa modeller).
    golf_tee_style:
      name: Golftee-modell
      description: Beskriver den strukturella eller funktionella stilen/designen på
        golftee, vilket påverkar bollhöjd, hållbarhet eller spinnreducering.
    golf_training_focus:
      name: Fokus på golfträning
      description: Klassificerar de primära kompetenserna eller aspekterna som produkten
        är avsedd att förbättra.
    golf_training_objective:
      name: Målsättning för golfträning
      description: Identifierar golfträningsredskapets fokusområde.
    gong_profile_type:
      name: Gong-profiltyp
      description: Beskriver operagongens fysiska profil (t.ex. platt kontra upphöjd
        mitt), vilket starkt påverkar ton och spelstil.
    grading_scale:
      name: Betygsskala
      description: Graderingsskalan som används på ett graderat bullionmynt (t.ex.
        Sheldon 1–70).
    grading_service:
      name: Graderingstjänst
      description: Tredjepartsgraderings-/certifieringstjänst för myntet eller sedeln
        (t.ex. PCGS, NGC).
    graduation_increment:
      name: Gradindelning
      description: Anger den minsta tryckta/graverade indelningen på sömmätarskalan
        (markeringarnas upplösning).
    grain_processing_method:
      name: Bearbetningsmetod för säd
      description: Identifierar den primära bearbetningsmetod som tillämpats på spannmålen
        (t.ex. förkokt, valsad, grodd), vilket påverkar tillagningstid, konsistens
        och näringsvärde.
    grand_piano_soundboard_material:
      name: Material för pianots resonansbotten
      description: Primärt material som används för pianots resonansplatta (resonansplattan),
        vilket påverkar ton och hållbarhet.
    grappling_dummy_pose:
      name: Grapplingdockans position/pose
      description: Beskriver dockans standardkroppsposition/hållning, vilket avgör
        vilka övningar och tekniker den stöder.
    grease_application:
      name: Användningsområde för fett
      description: Anger den primära fordonskomponenten eller användningen som fettet
        är avsett för.
    grease_consistency_grade_nlgi:
      name: Fettkonsistensgrad (NLGI)
      description: Anger NLGI-konsistensnumret som anger fettets fasthet (t.ex. NLGI
        2 är vanligt multifunktionellt).
    grease_thickener_type:
      name: Typ av fettförtjockare
      description: Identifierar det förtjockningsmedel/tvålsystem som används i fettformuleringen.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Ventiltyp för blåsrör på Great Highland-säckpipa
      description: Anger det backventilsystem som används i blåsröret.
    great_highland_bagpipes_drone_configuration:
      name: Dronekonfiguration för Great Highland-säckpipa
      description: Anger vilka typer av drone-pipor som ingår i setet.
    great_highland_bagpipes_mounting_material:
      name: Material för dekorativa beslag på Great Highland-säckpipa
      description: Anger materialet för de dekorativa fästena på säckpiporna (t.ex.
        silver, imiterat elfenben).
    greens_maturity_stage:
      name: grönt mognadsstadium
      description: Indikerar bladgrönsakernas utvecklingsstadium vid skörd.
    greens_preparation_state:
      name: Bearbetningsgrad för bladgrönt
      description: Beskriver hur de bladgröna bearbetas eller förpackas (t.ex. förtvättade,
        hackade, färdiga att äta).
    grenade_effect_type:
      name: Typ av granateffekt
      description: Indikerar den primära funktionella effekten som paintballgranaten
        producerar när den aktiveras (t.ex. rök, färg, flashbang).
    grid_unit:
      name: Rutnätsenhet
      description: Det primära mätsystemet som är tryckt på mattan (om ett rutnät/skala
        finns).
    grille_emblem_provision:
      name: Stöd för grillemblem
      description: Anger om grillen stöder ett OEM-emblem/märke och hur.
    grille_mounting_method:
      name: Monteringsmetod för galler
      description: Anger hur grillen installeras på fordonet (t.ex. direkt utbyte
        kontra insats/överlägg; bultning kontra klämma/snäppning; borrning krävs kontra
        ingen borrning krävs).
    grille_style:
      name: Gallerstil
      description: Anger den visuella/designmässiga stilen på fordonsgrillen.
    grip_chalk_form:
      name: Gripkritform
      description: Identifierar den fysiska formen av kritan som medföljer eller används
        med påsen.
    grip_coverage:
      name: Grepptäckning
      description: Identifierar förekomsten och placeringen av silikon- eller gummerade
        greppelement på strumpan.
    grip_design:
      name: Greppdesign
      description: Anger plattans handtags- eller hålkonfiguration för enklare bärning
        och mångsidig träning.
    grip_enhancer_effect:
      name: Greppförstärkande effekt
      description: Beskriver den primära prestandaegenskapen som produkten erbjuder
        (t.ex. fuktabsorption eller klibbig hartsyta).
    grip_enhancer_form:
      name: Greppförbättrare – form
      description: Identifierar den fysiska formen eller formatet på greppförstärkarprodukten
        så att idrottare kan välja lämplig appliceringsmetod.
    grip_features:
      name: Greppfunktioner
      description: Indikerar inbyggda grepp-/handtagsfunktioner avsedda att förbättra
        grepp, komfort eller kontroll under spel.
    grip_material:
      name: Greppmaterial
      description: Identifierar materialet som används för byxornas greppyta.
    grip_shape:
      name: Greppform
      description: Beskriver greppets tvärsnittsform eller stil, särskilt relevant
        för puttergrepp.
    grip_surface_type:
      name: Typ av greppyta
      description: Beskriver pedalytans slitbana/greppytas design som påverkar grepp
        och känsla.
    grip_tackiness_level:
      name: Klibbighetsnivå för grepp
      description: Mäter hur klibbig eller kladdig greppytan är, vilket hjälper spelare
        att välja mellan en torr känsla och ultraklibbig kontroll.
    grip_tape_form:
      name: Grepptejp – form
      description: Anger leveransformen av grepptejpprodukten (t.ex. ark, rulle, kit).
    grip_wax_form:
      name: Greppvaxform
      description: Klassificerar den fysiska formen i vilken greppvaxet säljs.
    gripper_coverage:
      name: Täckningsgrad för grepp
      description: Anger greppytans stil på den glidfria skon, vilket indikerar yttäckning
        och borttagningsbarhet.
    grommet_application_material:
      name: Material för underlaget där öljetter installeras
      description: Primärmaterial som öljetterna är avsedda att installeras i (t.ex.
        tyg, läder, vinyl, presenning/canvas).
    grommet_duty_rating:
      name: Hållfasthetsklass för öljetter
      description: Indikerar den avsedda hållfastheten/användningsklassen för genomföringen.
    grommet_style:
      name: Öljettstil
      description: Konstruktionsstil för öljettsetet (hur det monteras/används).
    grooming_glove_texture_type:
      name: Texturtyp för groominghandskar
      description: Identifierar den primära ytstrukturen som används för grooming,
        vilket indikerar avsett syfte såsom skrubbning, polering eller tvättning.
    groove_orientation:
      name: Spårorientering
      description: Beskriver riktningen/placeringen av spår eller åsar på instrumentet.
    groove_sampler_onboard_effects:
      name: Inbyggda effekter för groove-sampler
      description: Anger kategorierna för inbyggda effektbearbetningar som är tillgängliga
        på groove-samplern (insert/master), såsom reverb, delay, komprimering, distorsion,
        EQ, filtrering.
    groove_sampler_storage_expansion_type:
      name: Typ av Expanderingslagring för groove-sampler
      description: Anger flyttbara/expanderbara lagringsalternativ som stöds av groove-samplern.
    ground_attachment_method:
      name: Metod för infästning i mark
      description: Beskriver hur passningsbågen är fäst vid spelytan, vilket påverkar
        stabilitet och ytkompatibilitet.
    groupset_components_included:
      name: Medföljande delar i gruppset
      description: Listar de specifika drivlinekomponenterna som ingår i gruppsetet
        så att kunderna förstår paketets innehåll.
    gt_racing_class:
      name: GT-racingklass
      description: Anger GT-kategorin/klassen som bilen är byggd eller homologerad
        för.
    guard_construction_type:
      name: Typ av konstruktion för skydd
      description: Anger om skyddet är ett hårt skalskydd, ett mjukt pansarinlägg
        eller en ärm-/remdesign.
    guard_size_measurement_basis:
      name: Mätgrund för skyddsstorlek
      description: Vilket mått storleken baseras på (t.ex. armbågsomkrets, handledsomkrets,
        underarmsomkrets).
    guard_style:
      name: Typ av skydd
      description: Klassificerar konstruktionen eller typen av skridskoskydd för att
        hjälpa kunder att snabbt skilja mellan hårda gångskydd, mjuka skydd, fjäderbelastade
        skydd och andra designer.
    guava_flesh_color:
      name: Färgat guavakött
      description: Guavans fruktköttsfärg
    guava_variety:
      name: Guavasort
      description: Identifierar den specifika kultivar eller marknadssort av guava
        som säljs (t.ex. äppelguava, mexikansk cream, thai, rosa, kärnfri, vit).
    guide_material:
      name: Guidematerial
      description: Material som används till spöets linstyrningar eller insatser.
    guide_type:
      name: Typ av linstyrning
      description: Anger typen av linstyrningar som är installerade på ett fiskespö,
        till exempel enkelfots, rull- eller ormstyrningar.
    guideline_markings:
      name: Riktlinjemarkeringar
      description: Typ av visuella inriktningsmarkeringar tryckta eller inlagda på
        pitchingmattans yta för att underlätta pitchingövningar.
    guiro_scraper_material:
      name: Material för guiro-skrapa
      description: Material i den medföljande eller rekommenderade skrapan/slagstiftet
        som används med guiron.
    guiro_surface_style:
      name: Guiro-ytans stil
      description: Beskriver spelytans mönster/geometri som skrapas för att producera
        ljud.
    guitar_body_finish_type:
      name: Gitarrkroppsfinishtyp
      description: Anger vilken finish som används på gitarrkroppen.
    guitar_bridge_system_type:
      name: Typ av gitarrbrygga
      description: Stallets/stränghållarens systemdesignfamilj för kompatibilitet
        och navigering.
    guitar_case_style:
      name: Typ av gitarrfodral
      description: Anger det övergripande skyddet/strukturstilen för gitarrväskan
        eller gigbagen.
    guitar_humidifier_placement:
      name: Placering av gitarrfuktare
      description: Anger var gitarrfuktaren är avsedd att användas/placeras i förhållande
        till instrumentet eller omgivningen.
    guitar_pedal_i_o_configuration:
      name: Gitarrpedalens I/O-konfiguration
      description: Anger om pedalen stöder mono eller stereo in-/utgångsrouting.
    guitar_pedal_output_connector_type:
      name: Typ av utgångsanslutning för gitarrpedal
      description: Anger vilken typ av ljudutgångsanslutning som används av pedalen.
    guitar_slide_finish:
      name: Slide för gitarr – finish
      description: Ytfinish på sliden som påverkar känsla och friktion mot sträng.
    guitar_slide_style:
      name: Gitarrslide-modell
      description: Anger formfaktorn för gitarrsliden eller tonlisten och hur den
        bärs/används.
    guitar_stand_type:
      name: Gitarrstativtyp
      description: Anger gitarrstativets primära utformning (hur det stöder/förvarar
        gitarren).
    guitar_strap_attachment_type:
      name: Typ av fäste för gitarrrem
      description: Anger hur remmen fästs på gitarren (eller remknappen), inklusive
        om den använder traditionella ändar eller snabbkopplingssystem.
    guitar_strap_end_material:
      name: Material i ändarna på gitarrremmen
      description: Material som används vid remmarnas ändar/flik (de delar som fästs
        vid remknappar eller remlåsningssystem).
    guitar_strap_features:
      name: Gitarrrem – egenskaper
      description: Anmärkningsvärda funktionella egenskaper hos gitarrremmen utöver
        grundläggande storlek/material (flerval).
    guitar_string_coating:
      name: Gitarrsträngbeläggning
      description: Anger om strängarna har en skyddande beläggning och, om tillämpligt,
        beläggningsstil.
    guitar_string_gauge_type:
      name: Typ av tjockleksmätare för gitarrsträng
      description: Den angivna tjocklekskategorin för ett strängset för akustisk gitarr
        (t.ex. extra lätt, lätt, medium). Ofta approximerad av den höga E-strängtjockleken;
        Exakt mätområde kan variera beroende på tillverkare.
    guitar_string_set_gauge_category:
      name: Tjocklekskategori för gitarrsträngset
      description: Vanliga marknadsföringsmässiga tjockleksfamiljer för ett gitarrsträngset
        (typiskt härlett från höga E-/1:a strängen).
    guitar_string_winding_type:
      name: Gitarrstränglindningstyp
      description: Anger den yttre lindningsstilen för lindade strängar i setet.
    guitar_tuning_peg_button_shape:
      name: Form på gitarrstämskruvarnas rattar
      description: Stämskruvsrattens form/stil.
    guitar_tuning_peg_configuration:
      name: Konfiguration av stämskruvar för gitarr
      description: Stämskruvarnas layout på huvudet.
    guitar_tuning_peg_mounting_style:
      name: Monteringssätt för stämskruv (gitarr)
      description: Hur en stämskruv monteras på huvudet (bussningstyp och vridningsskyddsmetod).
    guitar_tuning_peg_shaft_type:
      name: Typ av stämskruv för gitarr
      description: Om strängstolpen är solid eller delad, och hur strängen är säkrad.
    guitar_tuning_peg_style:
      name: Stämskruvsmodell (gitarr)
      description: Den fysiska stämskruvens stil och monteringsformat som används
        på ett instruments huvud (t.ex. förseglad mekanism kontra öppen mekanism,
        låsande, delad stolpe).
    gum_condition:
      name: Gummits skick (för frimärke)
      description: Skick/status för stämpelgummit på baksidan (t.ex. aldrig gångjärnsförsett,
        gångjärnsförsett, inget gummi).
    gun_action_type:
      name: Typ av vapenmekanism
      description: Mekanisk funktionstyp som används för att ladda/avfyra (t.ex. slutstycksmekanism,
        hävstångsmekanism).
    gun_operational_status:
      name: Vapnets funktionsstatus
      description: Anger om samlarvapnet är inaktiverat/icke-fungerande (och hur det
        presenteras).
    gun_type:
      name: Vapentyp
      description: Identifierar den allmänna skjutvapnets formfaktor för det antika
        vapnet.
    gusset_material:
      name: Kilmaterial
      description: Anger materialet som används i gren-/kilfodret, vilket påverkar
        andningsförmåga, hygien och komfort.
    gymnastics_discipline:
      name: Gymnastikdisciplin
      description: Anger vilken gymnastikinriktning produkten är avsedd för (t.ex.
        artistisk, rytmisk, akrobatisk).
    hair_extension_texture:
      name: Hårförlängningstextur
      description: Beskriver lock-, våg- eller texturmönstret hos förlängningsslingorna.
    hair_net_style:
      name: Hårnätsstil
      description: Identifierar designen eller konstruktionsstilen för hårnätet (t.ex.
        bouffant, snood, knut).
    hair_quality_grade:
      name: Hårkvalitetsgrad
      description: Anger hårets branschkvalitet/ursprung.
    halter_style:
      name: Grimmodell
      description: Identifierar grimmans funktionella eller designmässiga stil (t.ex.
        rep, breakaway, show), vilket hjälper kunden att välja en grimma som passar
        deras avsedda användning.
    hammock_style:
      name: Hängmatta-stil
      description: Beskriver hängmattans strukturella stil eller konstruktion.
    hand_and_foot_coverage:
      name: Hand- och fotskydd
      description: Beskriver integrerade eller avtagbara vantar och tossor som täcker
        händer och/eller fötter.
    hand_cymbal_set_configuration:
      name: Konfiguration av handcymbal-set
      description: Anger om produkten säljs som en matchande parkoppla, en enskild
        cymbal eller ett större set.
    hand_drum_head_material:
      name: Material för handtrumskinn
      description: Materialet i trumskinnet (membranet) som används på goblettrumman.
    hand_exerciser_style:
      name: Handtränare – typ
      description: Klassificerar den övergripande stilen eller mekanismen för handtränaren.
    hand_guard_backbone_material:
      name: Handskyddets ryggradsmaterial
      description: Materialet i den strukturella stommen/ryggraden (om sådan finns),
        vilket avgör styrka och skydd.
    hand_guard_coverage_style:
      name: Handskyddsstil
      description: Beskriver handskyddets täckning/profil, vilket påverkar vind-/stötskydd.
    hand_guard_mounting_type:
      name: Monteringstyp för handskydd
      description: Anger hur handskydden fästs på motorcykeln (t.ex. styrände med
        innerklämma kontra endast klämma).
    hand_guard_set_configuration:
      name: Utformning av handskydd-set
      description: Anger om produkten säljs som ett vänster/höger-par eller en enkelsidig.
    hand_guard_style:
      name: Handskyddsstil
      description: Beskriver skyddets design eller stil (t.ex. Stängd, Öppen, Full,
        Lätt, Standard).
    hand_guard_weather_protection:
      name: Väderskydd för handskydd
      description: Indikerar det avsedda väderskyddet som handskydden ger.
    hand_paddle_strap_type:
      name: Typ av rem för handpaddlar
      description: Anger vilken typ av rem, eller avsaknad av rem, som används för
        att fästa handpaddeln i användarens hand.
    hand_percussion_mount_attachment_mechanism:
      name: Fästmekanism för handslagverk
      description: Anger hur fästet fästs på ett stativ, hyllställ eller annan utrustning
        (t.ex. klämfäste kontra stångfäste).
    hand_percussion_mounting_handling:
      name: Montering/hantering av handhållet slagverksinstrument
      description: Anger om instrumentet är handhållet, buret, monterat eller placerat
        på bord/golv vid normal användning.
    hand_percussion_pitch_type:
      name: Typ av tonhöjd för handhållet slagverk
      description: Anger om instrumentet producerar en bestämd tonhöjd (stämbar/toner)
        eller en obestämd tonhöjd.
    hand_percussion_playing_method:
      name: Spelmetod för handhållet slagverk
      description: Hur instrumentet vanligtvis spelas för att producera ljud (t.ex.
        skakat kontra skrapat).
    hand_percussion_set_configuration:
      name: Konfiguration av handslagverksset
      description: Anger om produkten är ett enskilt instrument, ett matchande par
        eller ett flerdelat set.
    hand_percussion_size_class:
      name: Storleksklass för handhållet slagverk
      description: Allmän kategori för instrumentet när en exakt mätning inte tillhandahålls
        eller för enkel filtrering.
    hand_sewing_needle_point_type:
      name: Typ av nålspetstyp för handsömnad
      description: Form/stil på handsömnadsnålens spets som används för att tränga
        igenom olika material (t.ex. vävt tyg, stickat, läder) eller garn.
    hand_support_level:
      name: Stödnivå för handled
      description: Anger graden av stöd eller kompression som handsken, omslaget eller
        remmen ger.
    hand_support_size:
      name: Storlek på handstöd
      description: Tillverkardeklarerad storlek på handsken, remmen eller lindningsskyddet
        (XS-XXL eller en storlek).
    handball_ball_type:
      name: Typ av handboll
      description: Anger den avsedda användningskategorin för handbollen, såsom match,
        träning eller strand.
    handball_playing_surface:
      name: Handbollsspelyta
      description: Anger den/de spelytor som handbollen är optimerad för.
    handball_target_type:
      name: Typ av handbollsmål
      description: Anger stilen eller designen på skjutmålet avsett för handbollsträning.
    handbrake_actuation_type:
      name: Typ av handbromsaktivering
      description: Anger hur parkeringsbromsen aktiveras.
    handbrake_orientation:
      name: Handbromsens orientering
      description: Anger om handbromsen är avsedd för vänster- eller högerstyrda fordon,
        eller om den är universell.
    handgun_grip_material:
      name: Material för pistolgrepp
      description: Primärmaterial i pistolgrepp/paneler.
    handle_configuration:
      name: Utformning av handtag
      description: Beskriver den strukturella stilen på wakeboardhandtaget (t.ex.
        singel, dubbel, Deep-V, T-wrap) så att kunden kan matcha kompetens, tricks
        eller brädtyp.
    handle_ergonomics:
      name: Handtagets ergonomi
      description: Beskriver ergonomiska funktioner hos handtaget som syftar till
        att förbättra komfort och kontroll.
    handle_grip_material:
      name: Handtagsmaterial
      description: Anger materialet som används på handtagets greppyta, vilket påverkar
        komfort och grepp, särskilt när det är vått.
    handle_grip_type:
      name: Typ av handtagsgrepp
      description: Anger handtagets greppbeläggning/material eller yttyp avsedd att
        förbättra komfort och kontroll.
    handle_shape:
      name: Handtagets form
      description: Form eller profil på handtaget.
    handlebar_design:
      name: Styrets design
      description: Anger typen av handtag på steppern, såsom inga, fasta, höjdjusterbara,
        fällbara eller med motståndsband.
    handlebar_type:
      name: Styrtyp
      description: Identifierar stilen på styret som är monterat på cykeln, vilket
        påverkar körhållning, kontroll och komfort.
    handslide_bore_type:
      name: Typ av borrning i handslide
      description: Anger om bastrombonen använder en enkel- eller dubbelborrig slid.
    handwear_cuff_style:
      name: Manschettstil för handskar
      description: Beskriver manschett- eller handledskonstruktionen på handskar eller
        vantar, vilket påverkar täckning och passform.
    handwear_insulation_material:
      name: Isoleringsmaterial för handkläder
      description: Identifierar det isolerande eller fodermaterial som används inuti
        handskar eller vantar.
    handwear_size:
      name: Storlek på handskar
      description: Anger storleken på handskar eller andra handkläder för att säkerställa
        korrekt passform.
    hang_glider_design:
      name: Hangglider-design
      description: Klassificerar glidflygplanets strukturella stil (t.ex. flexvingar,
        stela vingar, motordrivna).
    hanger_thread_size:
      name: Gängstorlek för upphängning
      description: Indikerar den skruvtrådsstorlek/standard som används för att montera
        upphängningen på bankpinnar eller bitvarnare, för att säkerställa kompatibilitet.
    hanging_suspension_method:
      name: Upphängningsmetod
      description: Definierar den primära utrustningen eller systemet som används
        för att hänga upp gungan (t.ex. rep, kedja, stativ, ram).
    hardtop_finish_type:
      name: Typ av hårdtop-finish
      description: Anger det yttre ytbehandlingstillståndet på hårdtoppen (t.ex. grundmålad
        kontra målad), vilket påverkar monteringsberedskap och utseende.
    hardtop_shell_material:
      name: Material för hardtop-skal
      description: Anger det primära materialet i ett fordons hårda tak styva skal
        (inte något överdragstyg), såsom glasfiber eller aluminium.
    hardtop_window_configuration:
      name: Konfiguration av hardtop-fönster
      description: Beskriver vilka fönster som ingår i det hårda taket och deras konfiguration.
    harmonica_comb_material:
      name: Munspelskammens material
      description: Material som används till munspelskammen (luftkammarkroppen).
    harmonica_cover_plate_finish:
      name: Ytfinish på munspels täckplattor
      description: Anger finishen eller beläggningen på munspelets täckplattor.
    harmonica_cover_plate_material:
      name: Munspelsskalets material
      description: Material som används till de yttre täckplattorna.
    harmonica_finish:
      name: Munspel – ytfinish
      description: Ytbehandling på munspelets täckplattor/kropp.
    harmonica_included_accessories:
      name: Munspel – tillbehör som medföljer
      description: Anger vilka tillbehör som medföljer munspelet.
    harmonica_note_range:
      name: Munspelets tonomfång
      description: Instrumentomfångsklassificering som används i orkestersammanhang
        (t.ex. bas, baryton, tenor).
    harmonica_reed_plate_material:
      name: Material för munspels rörbladplattor
      description: Material som används till rörbladsplattorna (t.ex. mässing, rostfritt
        stål, aluminium).
    harmonica_system_type:
      name: Harmonikasystem/typ
      description: Identifierar orkesterharmonikasystemet eller formfaktorn (t.ex.
        Chord, bas, baryton, polyfoni).
    harmonica_tuning_system:
      name: Stämningssystem för munspel
      description: Anger layout/systemet som används av munspelet (t.ex. Richter-,
        Solo-, Orkesterstämning).
    harness_shell_type:
      name: Skaltyp för sele
      description: Beskriver selens skalkonstruktionsstyvhet (t.ex. Softshell, Hardshell,
        Hybrid).
    harness_style:
      name: Selestil
      description: Definierar selens strukturella stil/design, t.ex. midja, säte,
        bröst/väst, vingbälte, boardshorts eller hybrid.
    harness_type:
      name: Seltyp
      description: Klassificerar klätterselens strukturella stil, såsom sittsele,
        helkroppssele eller bröstsele.
    harp_action_type:
      name: Typ av harpmekanism
      description: Primär mekanism som används för att ändra tonhöjd/förtecken på
        harpan.
    harp_finish:
      name: Harpfinish
      description: Ytbehandling av harpkroppen (t.ex. naturlig, betsad, målad, lackerad).
    harp_included_accessories:
      name: Harpa – tillbehör som medföljer
      description: Listar tillbehör som ingår i pedalharpan.
    harvest_method:
      name: Skördemetod
      description: Anger om skaldjuren är vildfångade, odlade eller erhållna via någon
        annan metod.
    harvest_stage:
      name: Skördestadiet
      description: Anger tillväxtstadiet då ruccolan skördades, såsom mikrogrönt,
        baby leaf eller mogen knippe.
    hat_style:
      name: Hattmodell
      description: Konstruktionen/stilen på festhatten (t.ex. konhatt, krona, hög
        hatt, visir) för att återspegla hur artikeln i grunden ser ut.
    hazard_signal_mode:
      name: Varningsljusläge
      description: Valbara ljusmönster/lägen för LED/elektroniska vägblinkers.
    head_configuration:
      name: Huvudkonfiguration
      description: Anger om yxhuvudet har en dägga (adze), hammare, båda eller ingen,
        vilket direkt påverkar funktionen på is och blandad terräng.
    head_material:
      name: Huvudmaterial
      description: Material i slagskinnet som medföljer quinton.
    head_movement_type:
      name: Typ av huvudrörelse
      description: Riktad rörelsekapacitet för tvåfoten eller spakhuvudet (t.ex. panorering,
        lutning, snedställning).
    head_side:
      name: Sida av trumskinn
      description: Anger om trumskinnet är avsett för slagsidan, resonanssidan (framsidan)
        eller endera.
    head_weight_style:
      name: Huvudviktsstil
      description: Identifierar viktkonfigurationen vid flugans huvud, vilket påverkar
        sjunkhastighet och presentation.
    headband_embellishment:
      name: Utsmyckning av huvudband
      description: Identifierar dekorativa element som är fästa på pannbandet (t.ex.
        rosetter, pärlor, kristaller, djuröron).
    headboard_style:
      name: Huvudgavelns stil
      description: Beskriver designen eller konstruktionsstilen på huvudgaveln som
        medföljer sängen.
    headgear_strap_configuration:
      name: Remkonfiguration för hjälm
      description: Anger antalet remmar som används för att fästa brottarhjälm
    headjoint_crown_style:
      name: Kronstil för flöjthuvud
      description: Anger stilen eller designen på flöjthuvudets krona (ändkåpa), vilket
        kan påverka estetik och vikt/balans.
    headjoint_pitch_standard:
      name: Tonhöjdsstandard för flöjthuvud
      description: Anger designstandarden för huvudet (t.ex. A=440 vs A=442).
    headliner_product_form:
      name: Takklädsel – form
      description: Anger om produkten är en komplett gjuten innertaksenhet, en ersättningstyg
        eller en reparations-/klädselkomponent.
    headrest_mount_attachment_method:
      name: Fästmetod för nackstödsmontering
      description: Anger hur fästet fästs på nackstödet/sätesstolparna.
    headrest_provision:
      name: Förekomst av nackstöd
      description: Anger om nackstöd ingår och/eller om det finns fästpunkter för
        nackstöd.
    headset_standard:
      name: Headsetstandard
      description: Typ av gränssnitt mellan styrrör/styrlager som används av ramen.
    headstall_style:
      name: Grimstil
      description: Klassificerar den strukturella designen eller öron-/pannkonfigurationen
        på grimman.
    headwear_intended_use:
      name: Avsedd användning av huvudbonad
      description: Indikerar det primära syftet eller sammanhanget för att bära turbanen
        (t.ex. cellgiftsbehandling, håravfall, simning, religiös aktivitet).
    hearing_enhancer_style:
      name: Typ av hörselförstärkare
      description: Beskriver enhetens fysiska formfaktor så att användare kan välja
        mellan over-ear, in-ear, bakom huvudet och andra designer.
    heart_rate_monitoring_method:
      name: Metod för pulsmätning
      description: Identifierar hur maskinen samlar in pulsdata under träningspass.
    heart_rate_sensing_technology:
      name: Teknik för pulsmätning
      description: Anger den fysiologiska mätmetod som monitorn använder för att detektera
        hjärtfrekvens (t.ex. elektriskt EKG kontra optisk PPG).
    heart_rate_sensor_placement:
      name: Placering av pulssensor
      description: Indikerar var sensorn bärs eller är placerad (på kroppen eller
        cykeln), vilket påverkar komfort och mätnoggrannhet.
    heat_retention_technology:
      name: Värmebevarande teknik
      description: Beskriver all teknik, beläggning eller material som förbättrar
        svettning eller termisk aktivitet för träningsfokuserade midjecincher (t.ex.
        neoprenbastueffekt).
    heated_glass_feature:
      name: Uppvärmt glas
      description: Anger om fönsterglaset inkluderar integrerade elektriska element
        såsom ett bakre avfrostningsgaller och/eller en antenn inbäddad i glaset.
    heater_control_actuation_method:
      name: Styrningsmetod för värmare/HVAC
      description: Anger hur värmaren/HVAC-kontrollen aktiverar fordonets HVAC-enhet
        (t.ex. kabelaktiverad, vakuumaktiverad eller elektronisk signalering).
    heater_control_electrical_connector_type:
      name: Typ av elektrisk anslutning för värmestyrning
      description: Anger den elektriska anslutningsstil/gränssnitt som används av
        värmestyrenheten (t.ex. pigtail- kontra kontakttyp).
    heating_technology:
      name: Uppvärmningsteknik
      description: Identifierar den primära uppvärmningsmekanismen som förångaren
        använder för att omvandla material till ånga.
    heel_shape:
      name: Klackform
      description: Anger den geometriska stilen eller silhuetten av själva hälen,
        vilket hjälper kunden att filtrera efter strukturellt utseende och stabilitet.
    helicopter_mission_type:
      name: Helikopteruppdragstyp
      description: Helikopterns primära avsedda användning/roll.
    helicopter_rotor_configuration:
      name: Helikopterrotorkonfiguration
      description: Anger helikopterns layout (huvudrotor/stjärtrotorarrangemang),
        såsom enkel huvudrotor + stjärtrotor, koaxial, tandem eller sammanväxande.
    helmet_accessory_type:
      name: Typ av hjälmtillbehör
      description: Identifierar den specifika typen av cykelhjälmsdel eller tillbehör
        så att kunden omedelbart kan hitta rätt artikel.
    helmet_audio_connector_type:
      name: Typ av ljudanslutning för hjälm
      description: Anger vilken typ av ljudanslutning som används av hjälmens kabel,
        om sådan finns.
    helmet_communication_system_readiness:
      name: Kommunikationssystemberedskap för hjälm
      description: Om hjälmen är utformad för att acceptera ett intercom-/Bluetooth-kommunikationssystem.
    helmet_construction_type:
      name: Typ av hjälmkonstruktion
      description: Beskriver hjälmskalets och fodrets byggstil (t.ex. skum, hårt skal,
        hybrid).
    helmet_fit_head_shape:
      name: Passform för hjälm (huvudform)
      description: Den interna passformsprofilen avsedd för olika huvudformer.
    helmet_interior_liner_type:
      name: Typ av innerfoder för hjälm
      description: Typ av komfortfoder och om det är avtagbart/tvättbart.
    helmet_liner_material:
      name: Hjälmfodrets material
      description: Anger materialet i det inre fodret eller stoppningen som ger komfort
        och stötdämpning.
    helmet_retention_closure_type:
      name: Stängningstyp för hjälmens hakrem
      description: Anger hjälmens hakremsstängningsmekanism (t.ex. dubbel D-ring,
        mikrometrisk spärrhake).
    helmet_safety_certification:
      name: Säkerhetscertifiering för hjälmar
      description: Listar de säkerhetsstandarder eller certifieringar som hjälmen
        uppfyller.
    helmet_safety_certification_standard:
      name: Säkerhetsstandard för hjälm
      description: Säkerhets-/homologeringsstandarder som motorcykelhjälmen är certifierad
        för att uppfylla.
    helmet_shell_material:
      name: Hjälmskalets material
      description: Primärt yttre skalmaterial eller konstruktion som används för hjälmen.
    helmet_size_system:
      name: Hjälmstorlekssystem
      description: Storleksschemat som används för att uttrycka hjälmstorlek.
    helmet_sun_visor_type:
      name: Typ av solvisir för hjälm
      description: Anger om hjälmen inkluderar ett invändigt solvisir, ett tonat utvändigt
        skydd, båda eller ingetdera.
    helmet_vehicle_fit:
      name: Fordonspassning för hjälm
      description: Typ av fordon/användningsområde som hjälmen är avsedd för.
    helmet_ventilation_adjustability:
      name: Justerbar hjälmventilation
      description: Anger hur hjälmens ventilation kan styras av föraren.
    helmet_ventilation_configuration:
      name: Hjälmventilationskonfiguration
      description: Beskriver hjälmens layout och justerbarhet (t.ex. hakventil, panna-/insugningsventiler,
        stängbara ventiler).
    helmet_visor_peak_adjustability:
      name: Justerbarhet av hjälmvisir/skärm
      description: Om hjälmens terrängskärm/visir är justerbart och/eller avtagbart.
    helmet_visor_shield_optical_features:
      name: Hjälmvisirets optiska egenskaper
      description: Optiska funktioner och kompatibilitetsfunktioner för huvudansiktsskyddet/visiret.
    helmet_visor_shield_type:
      name: Hjälmvisir/-skyddstyp
      description: Primär ansiktsskydd/visirkonfiguration som ingår med hjälmen.
    hem_style:
      name: Fållmodell
      description: Identifierar den finish som benöppningen har – såsom ren, rullad
        eller rå – som starkt påverkar plaggets utseende.
    hemisphere_compatibility:
      name: Halvklotskompatibilitet
      description: Anger vilket halvklot stjärnkartan är utformad för, baserat på
        synliga konstellationer.
    hemline_style:
      name: Fållmodell
      description: Definierar snittet eller designen på klänningens nederkant.
    herbal_infusion_function:
      name: Funktion för örtinfusion
      description: Indikerar den primära hälso- eller funktionella fördelen för vilken
        infusionen marknadsförs.
    hex_size:
      name: Insexnyckelstorlek
      description: Insexnyckel krävs för att montera/ta bort glödstiftet.
    hi_hat_pair_type:
      name: Typ av hihat-par
      description: Anger om listningen är för en matchande övre/nedre parkoppla eller
        en enskild cymbalkomponent.
    hi_hat_sound_character:
      name: Hi-hat – ljudkaraktär
      description: Beskriver den övergripande tonprofilen för att hjälpa kunder att
        filtrera efter det ljud de vill ha.
    high_visibility_class:
      name: Reflexklass
      description: Anger plaggets synlighetsklassificeringsnivå enligt ANSI/ISEA 107.
    highback_style:
      name: Typ av highback
      description: Beskriver den strukturella stilen/designen hos highbacken som påverkar
        åkningskaraktäristiken.
    hitch_ball_diameter:
      name: Dragkrokens diameter
      description: Diameter på dragkrokens kulhuvud (sfär) som passar till en släpvagnskoppling
        (t.ex. 1 7/8 tum, 2 tum, 2 5/16 tum, 50 mm).
    hitch_ball_mounting_style:
      name: Monteringsstil för dragkrokkula
      description: Anger om dragkulan är en standard muttermonterad kula, en fast/pressad
        modell för specifika draghuvuden, eller inkluderar integrerad hårdvara.
    hobby_horse_handle_type:
      name: Typ av handtag för hobbyhäst
      description: Anger grepp-/handtagskonstruktionen som används för att hålla eller
        styra hobbyhästen.
    hobby_horse_sound_features:
      name: Ljudfunktioner för hobbyhäst
      description: Anger om hobbyhästen inkluderar ljudeffekter och vilken typ.
    hockey_goal_type:
      name: Typ av hockeymål
      description: Anger stilen eller den avsedda användningen av hockeymålet (t.ex.
        ordinarie is, gatumål, mini).
    hockey_size_category:
      name: Hockeystorlekskategori
      description: Anger det standardiserade utrustningssegmentet som delen passar
        till (Ungdom, Junior, Mellannivå, Senior).
    hockey_size_segment:
      name: Hockeystorlekssegment
      description: Anger det standardiserade segmentet för hockeyutrustning som avgör
        den totala dimensionen och passformen för benskydden
    hold_surface_texture:
      name: Greppyta
      description: Beskriver grovheten eller den taktila finishen på greppets greppyta.
    home_decor_sewing_pattern_project_type:
      name: Projekttyp för heminredningssymönster
      description: Identifierar vilken typ av heminredningsartikel som sömnadsmönstret
        är för (t.ex. örngott, gardin, bordslöpare).
    homologation_rule_set:
      name: Homologering / regeluppsättning
      description: Anger det sanktionsorgan eller den regeluppsättning som bilen uppfyller
        (i förekommande fall).
    honey_form:
      name: Honungsform
      description: Anger den fysiska formen eller presentationen av honungsprodukten.
    honey_processing_method:
      name: Process för honungsframställning
      description: Anger hur honungen behandlades eller bearbetades före förpackning.
    honey_variety:
      name: Honungssort
      description: Identifierar honungens botaniska eller florala källa — oavsett
        om den är monofloral eller polyfloral — vilket direkt påverkar smak, färg
        och pris.
    hood_configuration:
      name: Utformning av huva
      description: Beskriver huvens design och justerbarhetsfunktioner.
    hood_design:
      name: Huvdesign
      description: Anger om plagget har en huva samt vilken modell/stil den har
    hood_style:
      name: Modell av huva
      description: Indikerar närvaron och stilen på en huva på plagget.
    hood_type:
      name: Typ av huva
      description: Indikerar speciella designegenskaper hos plaggets huva.
    hook_and_eye_size_hook_number:
      name: Hyska- och hake-storlek (kroknummer)
      description: Standardiserad hyska- och hake-storlek/numrering (där så är tillämpligt)
        som används på förpackningen för att indikera den totala hyske-/hakstorleken.
    hook_and_loop_fastener_duty_rating:
      name: Hållfasthetsklass för kardborreband
      description: Indikerar avsedd hållfasthetsklass för kardborrebandet.
    hook_and_loop_fastener_format:
      name: Kardborrebandsformat
      description: Anger den fysiska formen eller förpackningsformatet för kardborreprodukten
        (t.ex. rulle/tejp, prickar, remsor).
    hook_and_loop_fastener_side:
      name: Kardborresida
      description: Anger om produkten endast inkluderar kroksidan, endast öglesidan
        eller en uppsättning som innehåller båda sidorna.
    hook_coating_finish:
      name: Finish på krok
      description: Ytbehandling eller plätering applicerad på kroken för korrosionsbeständighet,
        diskretion eller färg (t.ex. svart nickel, blank tenn).
    hook_configuration:
      name: Krokkonfiguration
      description: Beskriver förekomst och typ av på krokar som medföljer lockbetet.
    hook_eye_style:
      name: Krokögla – modell
      description: Anger formen eller orienteringen för krokögat, vilket påverkar
        hur kroken knyts eller fästs.
    hook_eye_type:
      name: Typ av krokögla
      description: Anger kroköglans design, vilket påverkar knutval och riggning.
    hook_loop_format:
      name: Kardborreformat
      description: Anger den fysiska formfaktorn för det påsydda kardborrebandet.
    hook_loop_side:
      name: 'Kardborresida '
      description: Anger om produkten är kardsidan, öglesidan eller ett matchande
        kardborrebandsset.
    hook_material:
      name: Krokmaterial
      description: Identifierar materialet som specifikt används för gaffkroken/huvudet,
        en nyckelfaktor för styrka och korrosionsbeständighet vid användning i saltvatten.
    hook_organizer_style:
      name: Krokorganisatörsstil
      description: Den fysiska stilen eller formfaktorn för krokorganisatören (t.ex.
        låda, rulle eller påse), som används för att stödja bläddring och filtrering
        efter organisatörstyp.
    hook_point_configuration:
      name: Utformning av Krokspets
      description: Anger om kroken har två uddar (dubbel) eller tre uddar (treble).
    hook_point_type:
      name: Typ av krokspets
      description: Beskriver slipningen eller formen på en fiskekroks spets, vilket
        påverkar penetrations- och hållförmågan.
    hook_shank_length:
      name: Krokskaftlängd
      description: Indikerar krokskaftets relativa längdklassificering (t.ex. kort,
        lång) för snabb visuell och funktionell jämförelse.
    hooks_eyes_attachment_method:
      name: Fästningsmetod för hyskor och hakar
      description: Hur hyskor och öglor är fästa på plagget eller projektet.
    hop_up_type:
      name: Hop-up-typ
      description: Definierar hop-up-systemet som används för att ge bakspinn på BBs
        för räckvidd och precision.
    horse_blanket_type:
      name: Typ av hästtäcke
      description: Anger den primära stilen eller det avsedda användningsområdet för
        hästtäcket.
    horse_brush_type:
      name: Typ av hästborste
      description: Klassificerar borsten efter dess specifika groomingstil eller avsedda
        syfte, vilket gör att kunder kan filtrera utan att fragmentera kategorihierarkin.
    horse_care_purpose:
      name: Syfte med hästvård
      description: Produktens primära funktionella syfte inom hästvård, som omfattar
        hälsa, putsning och skötselbehov.
    horse_feed_stage:
      name: Livsstadium för hästfoder
      description: Anger hästens livsstadium eller fysiologiska status för vilket
        fodret är formulerat.
    horse_groomer_type:
      name: Typ av hästskötare
      description: Klassificerar trimmarens stil så att kunden snabbt kan hitta det
        specifika verktyg de behöver.
    horse_leg_protection_type:
      name: Typ av benskydd för häst
      description: Klassificerar den specifika stilen eller funktionen hos hästskyddet,
        lindan eller bandaget.
    horse_model_breed:
      name: Ras för hästmodell
      description: Anger hästrasen som avbildas av skalamodellen (om tillämpligt).
    hosiery_toe_style:
      name: Tåstil för strumpor
      description: Definierar konstruktionen av strumpornas tåområde, viktigt för
        hållbarhet och kompatibilitet med skor med öppen tå.
    hot_air_balloon_basket_type:
      name: Typ av korg för varmluftsballonger
      description: Anger den primära korgkonfigurationen/stilen (t.ex. standard sport,
        kommersiell hög kapacitet, avdelad, tillgänglig/dörr) som används för ombordstigning
        och avsedd drift.
    hot_air_balloon_burner_type:
      name: Typ av brännare för varmluftsballong
      description: Typ/konfiguration av brännarsystem installerat på ballongen.
    hot_air_balloon_envelope_material:
      name: Material för varmluftsballongens hölje
      description: Primärt tyg/material som används till ballonghöljet.
    hotfix_application_tool:
      name: Appliceringsverktyg för värmeöverföring (hotfix)
      description: Rekommenderat verktyg eller värmekälla som används för att applicera
        strass med värmefixering.
    hub_axle_type:
      name: Navaxeltyp
      description: Identifierar det axelgränssnitt/fastsättningssystem som navet är
        konstruerat för (snabbkoppling, genomgående axel, etc.).
    hub_motor_type:
      name: Navmotortyp
      description: Beskriver navmotorns konstruktionsstil (växeldriven, direktdriven,
        borstad, borstlös) för att informera kunden om vridmoment, vikt och effektivitetsegenskaper.
    hula_hoop_construction_type:
      name: Hula-ringkonstruktionstyp
      description: Beskriver hur bågen är konstruerad/monterad.
    hula_hoop_features:
      name: Hula-ringfunktioner
      description: Anger utmärkande funktionella eller designmässiga egenskaper för
        rockring.
    hull_design:
      name: Skrovdesign
      description: Beskriver skrovformen som påverkar prestanda och hanteringsegenskaper.
    hull_type:
      name: Skrovtyp
      description: Beskriver skrovformen som påverkar prestanda och stabilitet.
    humidifier_refill_medium_type:
      name: Typ av påfyllningsmedium för luftfuktare
      description: Identifierar det fukthållande/påfyllningsmedium som används av
        luftfuktaren (vad som fuktas eller byts ut).
    humidifier_refill_method:
      name: Metod för påfyllning av luftfuktare
      description: Beskriver hur luftfuktaren fylls på med fukt eller byts ut.
    humidifying_medium:
      name: Befuktande medium
      description: Identifierar det befuktningselement/medium som används av produkten
        (vad som fuktas/aktiveras).
    hummus_base_ingredient:
      name: Basingrediens för hummus
      description: Identifierar den primära baljväxt- eller grönsaksbasen som används
        för att göra hummusen.
    hunting_call_type:
      name: Typ av lockrop (jakt)
      description: Klassificerar lockropets primära funktionsstil eller mekanism (t.ex.
        munblåst, elektroniskt, låda) så att jägare snabbt kan välja det format som
        bäst passar deras behov och kompetensnivå.
    hunting_dog_collar_function:
      name: Jakthundhalsband – egenskaper
      description: Klassificerar halsbandets primära funktionella stil eller syfte,
        vilket hjälper kunder att filtrera produkter för funktioner som spårning,
        träning, synlighet eller standardanvändning.
    hvac_control_functions:
      name: Funktioner för HVAC-styrning
      description: Anger vilka HVAC/avfrostnings-/luftflödesfunktioner som styrs av
        enheten (mekaniska eller elektroniska).
    hybrid_drivetrain_configuration:
      name: Hybrid drivlinakonfiguration
      description: Indikerar PHEV-systemets arkitektur som beskriver hur elmotorn/elmotorerna
        och förbränningsmotorn tillhandahåller framdrivning.
    hybrid_system_type:
      name: Hybridsystemtyp
      description: Klassificerar hybridiseringsarkitekturen som används av fordonet.
    hybrid_truck_cab_type:
      name: Hytttyp för hybridlastbil
      description: Anger lastbilens hyttkonfiguration, vilket påverkar sittkapacitet
        och innerutrymme.
    hydration_bag_features:
      name: Funktioner på vätskepåsen
      description: Framhäver anmärkningsvärda design- eller funktionella egenskaper
        som är specifika för vätskepåsar.
    hydration_belt_features:
      name: Egenskaper för vätskebälte
      description: Listar anmärkningsvärda funktioner som förbättrar användbarheten,
        säkerheten eller bekvämligheten hos vätskebältet.
    hydration_bladder_compatibility:
      name: Kompatibilitet med vätskeblåsa
      description: Anger om västen inkluderar eller stöder ett vätskesystem.
    hydration_mouthpiece_style:
      name: Munstyckstyp för vätskesystem
      description: Anger designen eller den funktionella stilen för ett munstycke
        eller en ventil i vätskesystemet, vilket hjälper kunder att välja sitt föredragna
        dricksgränssnitt och säkerställa kompatibilitet.
    hydration_pack_style:
      name: Typ av vätskepaket
      description: Anger vätskepaketets struktur, till exempel ryggsäck eller väst,
        för att underlätta passform och filtrering av användningsområdet.
    hydration_system_insulation:
      name: Isolering av vätskesystem
      description: Anger om behållaren och/eller dricksslangen är isolerade för att
        bibehålla vätsketemperaturen i varma eller kalla förhållanden.
    hydration_valve_type:
      name: Typ av vätskeventil
      description: Identifierar typen av dricksventil eller munstycke som medföljer
        systemet eller flaskan, vilket täcker vanliga bettventiler och högtflödesmunstycken.
    hydraulic_fluid_type:
      name: Typ av hydraulvätska
      description: Anger vilken typ av bromsvätska som ett hydrauliskt cykelbromsreglage
        är avsett att använda. Denna information är avgörande för underhåll och säkerhet.
    hydrogenation_level:
      name: Hydrogeneringsnivå
      description: Anger om fettet är ohärdat, delvis härdat eller helt härdat, vilket
        påverkar transfettinnehåll och bakprestanda.
    hydrophobicity_level:
      name: Hydrofobicitetsnivå
      description: Indikerar graden av vattenpärlning/skiktning som produkten marknadsförs
        med.
    ice_cream_format:
      name: Glassformat
      description: Beskriver den fysiska formen eller presentationen av glassprodukten
        (t.ex. pint, bar, mochi).
    ice_skate_sharpener_type:
      name: Typ av skridskoslipmaskin
      description: Klassificerar den övergripande designen eller formatet på slipmaskinen
        (handhållen slipsten, elektrisk maskin, jigg, etc.).
    ice_temperature_suitability:
      name: Lämplighet för istemperatur
      description: Anger istemperaturintervallet för vilket hockeyklubbsvaxet är framtaget,
        vilket påverkar prestanda och snöavvisande egenskaper.
    icing_sugar_variety:
      name: Florsockervariant
      description: Klassificerar formuleringen eller funktionella typen av florsocker
        (t.ex. fondant, icke-smältande snöpulver, färgat, smaksatt).
    ignition_coil_configuration:
      name: Tändspolens konfiguration
      description: Anger tändspolens formfaktor (enkelspole/spole-på-tändstift, flertornsspolpaket
        efter cylinderantal, spolskena/kassett eller fördelartyp).
    ignition_lead_compliance_standard:
      name: Efterlevnadsstandard för tändkabel
      description: Formell branschstandard eller certifiering som tändkablarna uppfyller,
        enligt vad som anges av tillverkaren (t.ex. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Isoleringsmaterial för tändkabel
      description: Primärisolering/mantelmaterial som används på tändkabeln (yttre
        kabelisolering).
    ignition_lead_set_type:
      name: Typ av tändkabelset
      description: Om produkten är en enskild tändkabel eller ett komplett set, och
        vad setet är avsett för.
    ignition_lead_terminal_type:
      name: Terminaltyp för tändkabel
      description: Terminal/anslutningstyp som används vid ändarna av tändkabeln (t.ex.
        tändstiftsterminal och spole-/fördelarterminal).
    illumination_type:
      name: Belysningstyp
      description: Anger om och hur bollen är upplyst för spel på natten (t.ex. fosforescerande
        sken, stötaktiverad LED).
    immobilizer_installation_type:
      name: Installationstyp för startspärr
      description: Anger hur startspärren är installerad eller ansluten till fordonet.
    immobilizer_unlock_method:
      name: Metod för upplåsning av startspärr
      description: Anger hur startspärren aktiveras/avaktiveras eller upplåses.
    impact_protection_certifications:
      name: Stötskyddscertifieringar
      description: Anger den/de specifika säkerhetsstandard(er) som skyddsdynan uppfyller
        eller överträffar.
    impact_protection_level:
      name: Stötskyddsnivå
      description: Anger stötskyddsnivån eller tekniken som erbjuds av suspensoariet.
    impact_protection_rating:
      name: Stötskyddsklassificering
      description: Anger den certifierade stötskyddsnivån enligt standarder (t.ex.
        EN 1621-1 Nivå 1, EN 14120 Nivå 2), vilket hjälper cyklister att filtrera
        efter högre skyddsnivå.
    impact_surface_material:
      name: Kontaktytans material
      description: Beskriver det primära materialet för stötyta/träffyta för säkerhet
        och känsla (t.ex. skum, plast).
    incense_base_material:
      name: Rökelsebasmaterial
      description: Primärt bas-/bindemedelsmaterial som används för att tillverka
        rökelsen (pulverbasen) i kit.
    incense_making_method:
      name: Rökelsetillverkningsmetod
      description: Den avsedda tillverkningsprocess som satsen är gjord för.
    incense_tool_type:
      name: Typ av redskap för rökelse
      description: Anger vilken typ av rökelseredskap denna produkt är (används för
        att forma, mäta, pressa, blanda eller torka rökelse).
    incline_adjustment_type:
      name: Typ av lutningsjustering
      description: Beskriver hur (eller om) lutningen kan ändras under träningspass.
    included_accessories:
      name: Medföljande tillbehör
      description: Listorna inkluderade tillbehör som reservhuvuden/bits, förvaringslåda,
        Charge eller nätadapter.
    included_case_type:
      name: Typ av fodral som medföljer
      description: Typ av bär-/förvaringslåda som ingår med bas-saxofonen (om sådan
        finns).
    included_components:
      name: Inkluderade komponenter
      description: Listar vad som ingår i paketet (användbart för verktygssatser och
        paket).
    included_fastener_components:
      name: Fästelement som ingår
      description: Anger om produkten är ett set med hyskor och hakar, endast hyskor,
        endast öglor eller en relaterad variant av plaggstängning.
    included_hydration_vessel_type:
      name: Typ av vätskebehållare som medföljer
      description: Identifierar typen av vätskebehållare som medföljer eller stöds
        av bältet.
    included_items_woodwind_instrument:
      name: Medföljande tillbehör (träblåsinstrument)
      description: Listar de vanliga tillbehör som ingår i paketet med bas-saxofonen.
    included_materials:
      name: Inkluderat material
      description: Anger vilka komponenter som ingår i mönstret (endast mönster vs.
        mönster + material).
    included_mounting_accessories:
      name: Inkluderade monteringstillbehör
      description: Listar vilka monterings-/anslutningstillbehör som medföljer högtalartelefonen.
    included_pump_type:
      name: Inkluderad pumptyp
      description: Identifierar typen av pump som medföljer eller är integrerad med
        luftmadrassen.
    included_scraper_implement_type:
      name: Inkluderad typ av skrapredskap
      description: Anger vilket/vilka spelredskap som medföljer musikskrapan (t.ex.
        skrapstång/-pinne, stålborste).
    indicator_design:
      name: Design Indikator
      description: Klassificerar den fysiska formen eller stilen på fiskebettindikatorn.
    indicator_functions_tracked:
      name: Spårade indikatorfunktioner
      description: Listar de specifika matchmätvärden som indikatorn spårar, såsom
        bollar, strikes, outs, innings, pitch count, overs, wickets, score eller downs.
    indoor_outdoor_use:
      name: Inomhus-/utomhusbruk
      description: Anger om bowlingleksaken är avsedd för användning inomhus, utomhus
        eller båda.
    inflatable_decoration_items_included:
      name: Uppblåsbar dekorationsartikel ingår
      description: Listar viktiga tillbehör som ingår i den uppblåsbara dekorationen
        (t.ex. fläkt, pålar, förtöjningslinor).
    inflatable_decoration_type:
      name: Uppblåsbar dekorationstyp
      description: Anger vilken typ av uppblåsbar festdekoration (form/formfaktor)
        för att stödja bläddring och filtrering.
    inflatable_raft_float_features:
      name: Egenskaper för uppblåsbar flotte/flytmadrass
      description: Funktionella egenskaper för den uppblåsbara flotten/flytmadrass
    inflation_method_included:
      name: Medföljande inflationsmetod
      description: Anger vilken typ av däckinflationslösning som ingår i reparationssatsen,
        om sådan finns.
    infused_scent:
      name: Tillsatt doft
      description: Identifierar doft- eller smaktillsatser som är impregnerade i betesmaterialet.
    ingredient_base_type:
      name: Typ av basingrediens
      description: Identifierar den primära basen som tillhandahålls för jäsning (t.ex.
        druvjuicekoncentrat kontra färsk juice kontra fruktkoncentrat).
    ingredient_physical_form:
      name: Ingrediensens fysiska form
      description: Anger den fysiska form som doftingrediensen levereras i (används
        för hantering, mätning och formulering).
    ingredient_processing_method:
      name: Bearbetningsmetod för ingredienser
      description: Anger den primära bearbetningsteknik som tillämpats på ingrediensen
        (t.ex. frystorkad, rostad, fermenterad).
    ink_colors_included:
      name: Bläckfärger som ingår
      description: Anger vilka färger som ingår i stämpeldynan/stämpeldynorna i setet.
    ink_pad_application_method:
      name: Appliceringsmetod för stämpeldyna
      description: Hur bläcket doseras/används från dynan (traditionell stämpeldyna
        kontra dauber kontra penselspetsdyna).
    ink_pad_permanence:
      name: Beständighet för stämpeldyna
      description: Huruvida det stämplade bläcket är permanent och/eller arkivbeständigt
        (motståndskraft mot blekning och vatten när det har torkat).
    ink_pad_size:
      name: Stämpeldynans storlek
      description: Standardiserad storlek/formfaktor på bläckdynans yta/låda.
    ink_pad_special_effects:
      name: Specialeffekter för bläckdynor
      description: Särskilda visuella/funktionella effekter av bläcket vid stämpling
        (t.ex. metallic, glitter).
    ink_permanence:
      name: Bläckbeständighet
      description: Anger om det torkade sumibläcket är avsett att vara permanent/arkiveringsbart
        kontra tvättbart/icke-permanent.
    ink_preparation_required:
      name: Nödvändig beredning av bläck
      description: Anger om sumibläcket är klart att använda eller behöver spädas
        med vatten eller malas före användning.
    inline_skate_brake_type:
      name: Bromstyp för inlines
      description: Anger bromskonfigurationen som ingår i inlines, till exempel en
        avtagbar hälbroms eller ingen broms.
    inner_tent_configuration:
      name: Innertältkonfiguration
      description: Anger innertältets konfiguration eller stil, till exempel heldäck,
        nätinlägg eller termiskt foder.
    innerspring_coil_type:
      name: Typ av spiralfjäder
      description: Anger konstruktionsstilen för innerfjädersystemet inuti madrassen,
        vilket påverkar stöd, rörelseisolering och pris.
    input_connector_type:
      name: Typ av ingångskontakt
      description: Anger vilken typ av ljudingångskontakt som används av pedalen (vanligtvis
        6,3 mm TS-kontakt).
    input_valve_type:
      name: Typ av ingångsventil
      description: Indikerar den ventilstandard som finns på cykelslangen/hjulet som
        adaptern ansluter från.
    insecticide_treatment:
      name: Insektsmedelsbehandling
      description: Anger om nätets har fabriksbehandlats med insektsmedel och i så
        fall vilken typ av behandling som används för ytterligare skydd.
    insert_coverage_area:
      name: Inläggets täckningsområde
      description: Anger vilken del av foten inlägget är utformat för att täcka (t.ex.
        hela foten, endast hälen).
    insert_length_type:
      name: Typ av insatslängd
      description: Anger hur mycket av fotbädden som stödet täcker.
    inside_message_type:
      name: Typ av internt meddelande
      description: Anger om kortet har ett förtryckt meddelande på insidan och om
        det är anpassningsbart.
    insole_attachment_method:
      name: Infästningsmetod för innersula
      description: Anger hur stödet sitter på plats inuti skon (lös inläggning, självhäftande,
