      name: Tangentmaterial för akustiskt piano
      description: Anger det primära materialet som används för pianotangenterna.
    acoustic_piano_lid_type:
      name: Typ av lock till akustiskt piano
      description: Anger stilen på lock-/täckmekanismen som används på det akustiska
        pianot (för skillnader mellan flygel/upprätt/topplock).
    acoustic_piano_plate_frame_material:
      name: Akustisk piano – material för platta/ram
      description: Anger huvudmaterialet för pianots ram, vanligtvis gjutjärn.
    acoustic_piano_soundboard_material:
      name: Akustiskt piano – material för resonansbotten
      description: Anger det primära materialet som används för pianots resonansbotten.
    action_figure_scale:
      name: Actionfigurens skala
      description: Anger skalförhållandet (t.ex. 1:12) som tillbehöret är avsett att
        passa.
    action_type:
      name: Actiontyp
      description: Beskriver vapnets avfyrnings- eller laddmekanism (t.ex. slutstycke,
        brytpipa, hävstångsmekanism).
    actuation_mechanism:
      name: Aktiveringsmekanism
      description: 'Anger hur spaken aktiverar bromssystemet: rent mekaniskt med vajer,
        fullt hydrauliskt, hydrauliskt med vajer eller elektroniskt/trådlöst.'
    actuation_method:
      name: Aktiveringsmetod
      description: Hur dämpningssystemet aktiveras eller laddas ur.
    adapter_orientation:
      name: Adapterorientering
      description: Anger vinkeln eller konfigurationen för en cykeldäcksventiladapter,
        vilket påverkar pumpens tillgänglighet (t.ex. rak, 90°).
    additive_application_stage:
      name: Additiv tillämpningsfas
      description: Anger när i processen produkten är avsedd att användas.
    adhesive_backing:
      name: Självhäftande baksida
      description: Om det utskrivbara sidenet har en självhäftande baksida för applicering.
    adhesive_formulation:
      name: Limsammansättning
      description: Anger den kemiska basen eller sammansättningen av limmet, såsom
        cyanoakrylat eller epoxi.
    adhesive_sides:
      name: Självhäftande sidor
      description: Anger om limmet sitter på ena eller båda sidorna av tejpen/nätet.
    adjunct_grain_processing_form:
      name: Tilläggsform för spannmålsbearbetning
      description: Anger den fysiska/bearbetningsformen av det tillsatta spannmålet
        som sålts för bryggning (t.ex. flingat, torrifierat, mältat, rått).
    adjustability_type:
      name: Justerbarhetstyp
      description: Anger vilken typ av justering av fjäderställbenet som finns, om
        någon.
    adjustable_cup_mutes:
      name: Justerbara ljuddämpare
      description: Anger om kupan är justerbar/avtagbar samt justeringsstil.
    adjustable_zones:
      name: Justerbara zoner
      description: Identifierar vilka delar av basen som kan justeras oberoende av
        varandra.
    adjustment_type:
      name: Justeringstyp
      description: Anger om regulatorn är justerbar och hur justeringen utförs.
    administration_method:
      name: Administreringsmetod
      description: Anger hur avmaskningsmedlet administreras till hästen (t.ex. oralt
        eller via injektion), vilket hjälper kunden att följa veterinärens anvisningar
        och välja en hanterbar appliceringsmetod.
    advice_card_prompt_type:
      name: Typ av kortprompt
      description: Typ av prompt som är tryckt på kortet (eller avsaknad av prompt).
    aeration_method:
      name: Ventileringsmetod
      description: Beskriver den typ av luftning som tillhandahålls eller stöds av
        behållaren, vilket säkerställer tillräckligt med syre för levande bete.
    aero_package_components:
      name: Aeropaketets komponenter
      description: Anger vilka viktiga aerodynamiska komponenter som är installerade
        på fordonet (välj alla som gäller).
    aerodynamic_elements_included:
      name: Aerodynamiska element som ingår
      description: Anger vilka aerodynamiska komponenter som ingår i formelbilen (välj
        alla som gäller, om det stöds).
    aftertouch_support:
      name: Aftertouch-support
      description: Om kontrollen stöder aftertouch (kanal eller polyfonisk) på tangenter/pekplatta.
    agave_content_classification:
      name: Klassificering av agaveinnehållet
      description: Anger om tequilan är tillverkad av 100 % Blue Weber-agave eller
        om det är en blandning som innehåller minst 51 % agavesocker.
    aida_cloth_count:
      name: Aida-tygantal
      description: Anger tygantalet för Aida-tyg (antal rutor/stygn per tum), vilket
        avgör stygnstorleken och designskalan.
    aida_cloth_pre_cut_format:
      name: Aida-tyg i färdigskuret format
      description: Anger om Aida-tyget säljs som en färdigskuren bit, en kontinuerligt
        utskuren bit eller på rulle.
    air_bag_material:
      name: Krockkuddens material
      description: Anger materialet i säcken på den irländska krigspipan.
    air_bed_internal_construction:
      name: Luftmadrassens inre konstruktion
      description: Beskriver det interna stödet eller tekniken som används inuti luftmadrassen
        för komfort och stabilitet.
    air_dry_clay_color_form:
      name: Lufttorkande lera i färg
      description: Oavsett om leran säljs färdigfärgad, vit/neutral för att målas
        eller som en blandning.
    air_hockey_items_included:
      name: Airhockeyartikel ingår
      description: Listar de specifika tillbehören som ingår i ett set så att kunden
        vet exakt vad de får (t.ex. 2 pushers, 4 puckar, 2 filtkuddar).
    air_intake_temperature_sensor_mounting_style:
      name: Monteringsstil för luftintagstemperatursensor
      description: Den fysiska monteringsstilen för IAT-sensorn i insugningssystemet.
    air_integration_capability:
      name: Luftintegrationskapacitet
      description: Anger om och hur dykdatorn stöder trådlösa tanktrycksgivare.
    air_mattress_valve_type:
      name: Luftmadrassens ventiltyp
      description: Anger vilken ventiltyp ett tillbehör passar till eller innehåller,
        vilket säkerställer kompatibilitet mellan pumpar, ventiler och reservdelar.
    air_water_rocket_kit_items_included:
      name: Delar till luft- och vattenraketskit som ingår
      description: Viktiga delar ingår i raketsetet (uppskjutningsramp, pump, fenor,
        påfyllningsdelar).
    air_water_rocket_launch_method:
      name: Uppskjutningsmetod för luft- och vattenraket
      description: Hur raketen trycksätts/skjuts upp (användarinteraktion och utrustningens
        stil).
    airbag_position:
      name: Krockkuddens position
      description: Anger den avsedda positionen/området för krockkudden.
    aircraft_ads_b_capability:
      name: Flygplanets ADS-B-kapacitet
      description: Anger om flygplanet är utrustat för ADS-B-kapacitet.
    aircraft_airframe_material:
      name: Flygplansskrovets material
      description: Primärmaterial som används i konstruktionen av flygplanets skrov.
    aircraft_cabin_configuration:
      name: Konfiguration av flygplanskabin
      description: Anger flygplanets kabinupplägg (t.ex. divan, konferensgruppering,
        kabin indelad i fyra zoner).
    aircraft_documentation_included:
      name: Flygplansdokumentation som ingår
      description: Listar vilka dokument som medföljer delen (t.ex. 8130-3).
    aircraft_galley_configuration:
      name: Konfiguration av flygplanskabyss
      description: Förekomst och typ av kabyss/kök i kabinen.
    aircraft_installation_location:
      name: Flygplanets installationsplatser
      description: Var på flygplanet delen eller tillbehöret är installerat eller
        används.
    aircraft_internet_connection:
      name: Internetkoppling på flygplanet
      description: Indikerar förekomst/typ av internetanslutning i kabinen.
    aircraft_landing_gear_type:
      name: Typ av landningsställ för flygplan
      description: Anger landningsställskonfigurationen för autogyron.
    aircraft_lavatory_configuration:
      name: Konfiguration av flygplanstoaletter
      description: Typ av toalettkonfiguration ombord.
    aircraft_maintenance_program_enrollment:
      name: Registrering i flygplansunderhållsprogram
      description: Anger om flygplanet är registrerat i ett program för motor- och/eller
        skrovunderhåll, och i så fall vilken typ av försäkring som gäller (motor,
        skrov eller båda).
    aircraft_operational_certification:
      name: Driftcertifiering av flygplan
      description: Anger den reglerings- eller operativa certifieringsgrunden enligt
        vilken flygplanet lyder (jurisdiktionsberoende, t.ex. FAA Del 91/135/121,
        EASA AOC).
    aircraft_protective_gear_certification:
      name: Certifiering av flygskyddsutrustning
      description: Anger vilken standard (flyg, regulatorisk eller bransch) som skyddsutrustningen
        är certifierad att uppfylla.
    aircraft_system_application:
      name: App för flygplanssystem
      description: Identifierar vilket flygplanssystem eller område delen/tillbehöret
        tillhör (används för att bläddra bland och filtrera olika flygplansdelar).
    airflow_resistance_level:
      name: Nivå av luftmotstånd
      description: Indikerar hur begränsande dämparen känns vad gäller mottryck/luftmotstånd.
    airship_envelope_material:
      name: Flygplanets höljematerial
      description: Primärt material i luftskeppets hölje (hud).
    airsoft_part_type:
      name: Typ av airsoftdel
      description: Identifierar den funktionella komponenten eller tillbehörstypen
        för airsoftvapen (t.ex. magasin, pipa, handskydd).
    airworthiness_approval_basis:
      name: Underlag för godkännande av flygduglighet
      description: Anger underlaget för godkännande/certifiering av delen där så är
        tillämpligt (t.ex. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Justerbar larmvolym
      description: Anger om och hur larmets ljudstyrka kan justeras av användaren.
    alcohol_ink_finish_effect:
      name: Alkoholbläckeffekt
      description: Beskriver den visuella effekten som produceras av alkoholbläckets
        sammansättning (utöver färgen), såsom metallisk eller pärlemorskimrande.
    alignment_aid_style:
      name: Justeringsguider
      description: Beskriver vilken typ av justeringsguider som är tryckta eller inbäddade
        på mattytan (t.ex. raka linjer, avståndsmarkörer).
    alternator_cooling_type:
      name: Generatorkylningstyp
      description: Beskriver hur generatorn kyls och ventileras.
    alternator_marine_ignition_protection_rating:
      name: Skyddsklassning för marin tändning av generator
      description: Anger om generatorn är antändningsskyddad för marina motorrum (t.ex.
        SAE J1171- / ISO 8846-kompatibel).
    alternator_mounting_configuration:
      name: Monteringskonfiguration för generator
      description: Anger den fysiska monteringskonfiguration som används för att fästa
        generatorn på ett motorfäste.
    alternator_pulley_type:
      name: Typ av generatorremskiva
      description: Anger remskivans/kopplingens design på generatorn (eller indikerar
        att ingen remskiva ingår).
    alternator_regulator_type:
      name: Typ av generatorregulator
      description: Anger om spänningsregulatorn är intern eller extern i generatorn,
        och om den är OEM-styrd (dator-/PCM-styrd).
    alternator_terminal_connection_type:
      name: Generatorns terminalkopplingstyp
      description: Primär elektrisk kopplingstyp för generatorutgång/utgångsterminal
        för att säkerställa kablagekompatibilitet.
    altitude_suitability:
      name: Lämplighet för höjd
      description: Indikerar om bollen är konstruerad för specifika höjdförhållanden,
        vilket påverkar hastighet och studs.
    ambulance_stretcher_mount_type:
      name: Typ av monteringsplats för ambulansbår
      description: Anger vilken typ av system för bårlastning/montering som ambulansen
        stöder.
    american_football_safety_certification:
      name: Säkerhetscertifiering för amerikansk fotboll
      description: Anger de säkerhetscertifieringar eller standarder för amerikansk
        fotboll som produkten uppfyller.
    amplifier_tube_function:
      name: Förstärkarrörets funktion
      description: Anger rörets funktionella roll i en instrumentförstärkarkrets (t.ex.
        förförstärkare eller effekt).
    analog_synthesizer_cv_gate_i_o:
      name: Analog synt CV/Gate I/O
      description: Anger de typer av styrspänning och gate-kopplingar som stöds för
        integration med modulära/analoga växlar.
    analog_synthesizer_keybed_configuration:
      name: Konfiguration av analog synttangenter
      description: Beskriver om synten har inbyggda tangenter och, i så fall, antalet
        tangenter.
    anchor_configuration:
      name: Ankarkonfiguration
      description: Anger om upphängningssystemet använder en enda centraliserad förankringspunkt
        eller flera oberoende förankringspunkter, vilket påverkar variationen i träningen
        och konfigurationens komplexitet.
    animal_raising_method:
      name: Djuruppfödningsmetod
      description: Beskriver jordbruks- eller djurhållningsmetoder som används för
        källdjuret.
    animal_species:
      name: Djurarter
      description: Anger djuret eller varelsen som representeras av gosedjuret (t.ex.
        björn, kanin, dinosaurie).
    animal_trap_jaw_style:
      name: Djurfälla saxstil
      description: Konfiguration av saxen, påverkar hållkraft och djurens välbefinnande.
    animal_trap_type:
      name: Typ av djurfälla
      description: Klassificerar fällans mekaniska stil/design, vilket gör att kunderna
        snabbt kan hitta exakt den fångstmetod de behöver eller som föreskrifterna
        tillåter.
    ankle_collar_style:
      name: Fotledskrage
      description: Beskriver stilen eller konstruktionen av en skos fotledskrage,
        såsom lågt skuren, mellanhög, högt skuren, strumpkrage eller snörningslös,
        vilket påverkar stödet, passformen och utseendet.
    ankle_guard_protection_level:
      name: Skyddsnivå för fotleden
      description: Betygsätter den totala mängden stötskydd som fotledsskyddet ger.
    ankle_strap_padding_type:
      name: Fotledsremmens fodertyp
      description: Beskriver dämpningsmaterialet eller fodermetoden som används inuti
        remmen och som påverkar komforten.
    ankle_strap_type:
      name: Typ av ankelrem
      description: Klassificerar konstruktionen eller designen av en fotledsrem för
        snowboard.
    ant_farm_habitat_medium_type:
      name: Medelstort myrhus
      description: Anger det primära tunnelsystemet/observationsmedlet som tillhandahålls
        eller behövs i myrhuset.
    ant_farm_kit_contents:
      name: Innehåll i myrhuskitet
      description: Identifierar vilka komponenter som ingår i kitet (t.ex. myrhus,
        sand/gel, myrkupong, matningsverktyg).
    ant_farm_lighting_type:
      name: Typ av belysning för myrhus
      description: Anger vilken typ av inbyggd belysning (om sådan finns) som används
        för observation.
    antenna_fit_type:
      name: Typ av antennpassform
      description: Vilken antennformfaktor som antennkulan är avsedd för.
    anti_caking_agent:
      name: Klumpförebyggande medel
      description: Anger vilken typ av klumpförebyggande medel som tillsatts för att
        förhindra klumpbildning, information som är viktig för allergiöverväganden
        och receptprecision.
    anti_g_suit_bladder_material:
      name: Anti-G-dräktens material för blåsan
      description: Material som används för den/de inre uppblåsbara blåsan/blåsorna
        inuti anti-G-dräkten. Listar alla som gäller om flera material används.
    anti_g_suit_connector_type:
      name: Kopplingstyp för anti-G-dräkt
      description: Anger typ/standard för luft-/tryckslangens anslutning till flygplanet
        eller regulatorn.
    anti_g_suit_inflation_method:
      name: Metod för uppblåsning av anti-G-dräkt
      description: Visar hur dräktens blåsor trycksätts för att ge skydd mot G-krafter.
    anti_g_suit_size_system:
      name: Förvaringssystem för anti-G-dräkt
      description: Storleksstandard som används för dräktens storlek/passformssystem.
    anti_reverse_type:
      name: Anti-reverse-typ
      description: Anger vilken typ av anti-reverse-mekanism som används, vilken påverkar
        krokinställningar och bakkoppel.
    anti_theft_feature:
      name: Stöldskyddsfunktion
      description: Anger om fästet/hållaren skyddar mot stöld, såsom låsbara fästen
        eller en manipulationssäker design.
    antique_gun_ignition_system:
      name: Antik vapentändningssystem
      description: Anger det historiska avfyrnings-/tändningssystem som används av
        det antika skjutvapnet.
    apple_variety:
      name: Äppelsort
      description: Anger äppelsort eller kultivar (t.ex. Gala, Fuji, Granny Smith),
        vilket hjälper kunder att välja baserat på smak, konsistens och kulinarisk
        användning.
    applique_edge_finish:
      name: Kantfinish
      description: Beskriver hur kanterna är ytbehandlade, vilket påverkar utseendet
        och fransningsmotstånd.
    arbor_type:
      name: Arbor-typ
      description: Klassificerar rullen efter spolaxelns design, vilket påverkar linans
        inmatningshastighet, bakkapacitet och linminne.
    archery_accessory_type:
      name: Typ av bågskyttetillbehör
      description: Anger vilken typ av tillbehör som är avsett för bågskytteverktyg,
        så att kunden snabbt kan filtrera produkterna.
    archery_part_type:
      name: Typ av del för bågskytte
      description: Identifierar den specifika utrustningen eller reservdelen som säljs
        (t.ex. riser, lem, bågsträng), vilket möjliggör exakt filtrering utan att
        utöka kategoriträdet.
    archery_range_accessory_type:
      name: Typ av tillbehör till skytte och skjutbana
      description: Klassificerar den specifika typen av tillbehör som används på en
        bågskyttebana, vilket gör det möjligt för kunder att snabbt filtrera efter
        exakt den artikel de behöver.
    archery_target_features:
      name: Funktioner för bågskytte
      description: Listar specialiserade prestanda eller bekvämlighetsfunktioner som
        inte täcks av andra attribut (t.ex. självläkande skum, bärhandtag).
    archery_tool_type:
      name: Typ av bågskytteverktyg
      description: Klassificerar den specifika typen av bågskytteverktyg eller utrustning.
    armband_features:
      name: Armbandets funktioner
      description: Listar speciella funktionella eller visuella egenskaper som förbättrar
        armbandet.
    armguard_style:
      name: Typ av armskydd
      description: Definierar armskyddets konstruktionsstil eller formfaktor, vilket
        ger insikt i designen och traditionellt eller modernt utseende.
    armor_protection_type:
      name: Typ av pansarskydd
      description: Typ av skydd som tillhandahålls av fordonets pansarsystem.
    armrest_adjustability:
      name: Armstödets justerbarhet
      description: Definierar dimensionsjusterbarheten och konfigurationen av stolens
        armstöd (t.ex. fast, 2D, 3D, uppfällbart).
    armrest_type:
      name: Armstödstyp
      description: Beskriver förekomsten av armstöd och justerbarheten på stolen (t.ex.
        inga armstöd, fasta, justerbara, avtagbara).
    arrow_bolt_point_type:
      name: Pil-/skäktspetstyp
      description: Definierar stilen på spetsen som är installerad på en pil eller
        skäkta.
    arrow_component_type:
      name: Pilkomponenttyp
      description: Klassificerar den specifika delen eller tillbehöret för en pil
        (insats, omslag, bussning, lim, etc.) så att kunder kan filtrera artiklar
        utan att behöva dussintals extra underkategorier.
    arrow_containment_level:
      name: Pilomslutningsnivå
      description: Beskriver om stödet helt, delvis eller inte omsluter pilen.
    arrow_fletching_orientation:
      name: Pilens fletchingsorientering
      description: Anger vinge- eller förskjutningsorienteringen för fletchingen (t.ex.
        vänstervinge, högervinge, spiralformad) som bestämmer pilens rotationsriktning.
    arrow_nock_groove_size:
      name: Pilnockspårets storlek
      description: Anger storleksklassen för nockens strängspår/hals, vilket bestämmer
        kompatibilitet med olika bågsträngsdiametrar.
    arrow_nock_type:
      name: Pilnocktyp
      description: Pilnockens design/stil som samverkar med bågsträngen.
    arrow_rest_style:
      name: Pilstödets stil
      description: Anger den funktionella stilen/mekanismen för pilstödet t.ex. drop-away,
        blade, whisker biscuit). Stilen avgör hur stödet stödjer, omsluter och släpper
        pilen och är ett primärt sätt för kunder att skilja på produkter.
    arrow_shaft_compatibility:
      name: Pilskaftkompatibilitet
      description: Indikerar vilken pilskaft/bushingstandard som nocken passar till
        (t.ex. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Verktygsspets för pyssel
      description: Beskriver formen/profilen på spetsen (t.ex. spetsig eller rundad
        kula) för att indikera vilken typ av präglingsmärken den producerar.
    art_ink_lightfastness_rating:
      name: Konstbläckets ljushäkthetsklassificering
      description: Indikerar bläckets motståndskraft mot blekning vid exponering för
        ljus, vanligtvis uttryckt via standardklassificeringar.
    art_ink_opacity:
      name: Konstbläckets opacitet
      description: Anger täckningsgraden för bläcket efter applicering.
    art_security_rating:
      name: ART-säkerhetsklassificering
      description: Anger den holländska ART-stjärnklassificeringen (1–5 stjärnor)
        som låset har fått.
    artichoke_cut:
      name: Kronärtskockform
      description: Anger vilken del eller beredning av kronärtskockan som erbjuds
        (t.ex. hel, hjärta, botten), så att kunder förstår vad de får och den avsedda
        kulinariska användningen.
    artichoke_variety:
      name: Kronärtskocksort
      description: Anger kronärtskockans botaniska sort för att hjälpa kunden att
        skilja mellan olika sorter, färger, smaker och kulinariska användningsområden.
    articulation_features:
      name: Rörliga funktioner
      description: Anger om dinosauriemodellen har rörliga delar (rörlig käke, lemmar,
        svans) och allmän rörlighet.
    artificial_bait_form:
      name: Konstgjord betesform
      description: Anger den fysiska formen eller presentationsstilen för fiskebetet
        eller -draget.
    asa_mounting_type:
      name: Typ av ASA-montering
      description: Indikerar vilken typ av ASA-gränssnitt (Air Source Adapter) eller
        monteringsstandard som fästet använder (t.ex. svansstjärt, skena, direktmontering).
    ascender_descender_type:
      name: Uppstigande/nedstigande typ
      description: Klassificerar stilen för uppstigande eller nedstigande klättring
        för mer exakt filtrering.
    aspiration_type:
      name: Typ av sug
      description: Indikerar hur motorn suger in/boostar.
    assembly_state:
      name: Monteringsstatus
      description: Anger om skåpet är monteringsklart, förmonterat eller i annan form.
    assistance_mechanism:
      name: Stödmekanism
      description: Anger eventuella inbyggda hjälp- eller motståndssystem som krafttornet
        tillhandahåller för pull-ups, dips eller andra övningar.
