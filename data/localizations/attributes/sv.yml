    leg_material:
      name: Benmaterial
      description: Anger vilket material som används för benen på en produkt, t.ex.
        körsbärsträ eller bambu
    leg_pattern:
      name: Benmönster
      description: 'Definierar designen eller trycket på produktens ben, till exempel
        djur eller geometriskt '
    leg_sections:
      name: Bensektioner
      description: Anger antalet bensektioner på elektroniktillbehör, vanligtvis selfiepinnar,
        t.ex. 5+
    legend_type:
      name: Märkningstyp
      description: Anger om markören är tom eller förtryckt med siffror, bokstäver,
        symboler eller andra markeringar.
    length_adjustability:
      name: Längdjustering
      description: Indikerar om remmen eller kedjans längd kan ändras av användaren
        eller är fast.
    lens/slide_material:
      name: Objektiv/objektglas - material
      description: Anger det material som används vid tillverkningen av linser eller
        objektglas, t.ex. plast eller glas
    lens_cap_compatible_device:
      name: Enhet kompatibel med objektivlock
      description: Anger vilken utrustning som är kompatibel med linsskydd, till exempel
        monokulär eller digitalkamera
    lens_case_accessories_included:
      name: Inkluderade tillbehör för linsfodral
      description: Listar ytterligare föremål som medföljer fodralet (t.ex. pincett,
