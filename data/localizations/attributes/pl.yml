      name: Styl zakładki
      description: Określa styl zakładek w akcesoriach do segregatorów, np. wstępnie
        wydrukowane, numerowane
    tablet_case_functional_features:
      name: Funkcjonalne cechy etui na tablet
      description: Podkreśl najważniejsze elementy funkcjonalne dołączone do etui
        na tablet
    tabletop_color:
      name: Kolor blatu
      description: Określa kolor powierzchni blatu stołu, np. czarny lub biały
    tabletop_material:
      name: Materiał blatu
      description: Określa skład powierzchni blatu stołu, np. sklejka, beton
    tabletop_pattern:
      name: Wzór blatu
      description: Określa wzór lub nadruk na powierzchni blatu stołu, np. Boże Narodzenie
        lub lite
    tabletop_shape:
      name: Kształt blatu
      description: Określa geometryczny kształt powierzchni blatu stołu, np. kwadrat,
        nerka
    tableware_material:
      name: Materiał zastawy stołowej
      description: Określa skład zastawy stołowej, np. porcelana kostna lub fajans
    tack/pushpin_head_design:
      name: Konstrukcja główki pinezki/kołka
      description: Określa kształt główki pinezki lub kołka, np. okrągły lub ozdobny
    tag_fastening:
      name: Zapięcie na etykietę
      description: Określa metodę używaną do przymocowania przywieszki do bagażu,
