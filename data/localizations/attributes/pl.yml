    protein_source:
      name: Źródło białka
      description: Identyfikuje główne pochodzenie białka użytego w suplemencie.
    pstn_connectivity_options:
      name: Opcje łączności Pstn
      description: Określa interfejsy publicznej komutowanej sieci telefonicznej (PSTN)
