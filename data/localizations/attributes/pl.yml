    bass_harmonica_mouthpiece_style:
      name: Styl ustnika harmonijki basowej
      description: Wskazuje konfigurację ustnika harmonijki basowej.
    bass_harmonica_reed_material:
      name: Materiał stroików harmonijki basowej
      description: Materiał stroików użytych w harmonijce basowej.
    bass_harmonica_tuning_system:
      name: System strojenia harmonijki basowej
      description: Określa system strojenia/temperację harmonijki basowej.
    bass_recorder_bocal_type:
      name: Typ bocala fletu prostego basowego
      description: Określa typ bocala/kanału powietrznego używanego do dotarcia do
        ustnika fletu prostego basowego.
    bass_recorder_included_accessories:
      name: Akcesoria do fletu prostego basowego w zestawie
      description: Wymienia akcesoria dołączone do zestawu z fletem prostym basowym.
    bass_recorder_keywork_material:
      name: Materiał mechaniki fletu prostego basowego
      description: Określa materiał mechaniki fletu prostego (jeśli występuje).
    bass_trombone_slide_material:
      name: Materiał suwaka puzonu basowego
      description: Określa główny materiał/powłokę zewnętrznych rur suwaka puzonu
