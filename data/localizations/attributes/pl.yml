    telescope_tracking_system:
      name: System śledzenia używany w teleskopie
      description: Określa rodzaj systemu śledzenia w teleskopach, np. ręczny, silnikowy
    television_circuit_board_type:
      name: Typ płytki telewizora
      description: Określa funkcjonalną rolę płytki w telewizorze (np. płyta główna,
        zasilacz, płyta T-Con)
    television_shape:
      name: Kształt telewizora
      description: Określa fizyczny kontur ekranu telewizora, np. zakrzywiony lub
        płaski
    television_speaker_position:
      name: Pozycja głośnika telewizyjnego
      description: Określa fizyczną lokalizację lub rolę głośnika w zespole telewizora
        (np. lewy, prawy, centralny, subwoofer).
    television_specialized_features:
      name: Specjalistyczne funkcje telewizora
      description: Określa unikatowe funkcje telewizora, np. sterowanie głosowe lub
        wbudowana listwa głośnikowa
    temperature:
      name: Temperatura
      description: Określa ustawienia ciepła dla urządzeń takich jak pistolety do
        kleju, np. podwójne, wysokie
    temperature_control:
      name: Regulacja temperatury
      description: 'Określa możliwość regulacji temperatury produktu, zazwyczaj w
        przypadku podgrzewaczy butelek, np. regulowana, wstępnie ustawiona '
    temperature_measurement:
      name: Pomiar temperatury
      description: Określa, czy produkt dokonuje pomiaru w stopniach Fahrenheita czy
        Celsjusza
    template_type:
      name: Typ szablonu
      description: Określa kategorię szablonów dokumentów, np. wizytówka, ulotka
    temple_color:
      name: Kolor zauszników
      description: Określa kolor zausznika okularów, np. czerwony lub przezroczysty
    temple_pattern:
      name: Wzór zauszników
      description: Określa wzór lub motyw na zauszniku okularów, np. logo lub kratka
    tension:
      name: Napięcie
      description: Określa poziom naciągu strun instrumentów muzycznych, np. bardzo
        ciężki
    tensioning_system:
      name: System napinania
      description: Szczegółowe informacje na temat mechanizmu używanego do utrzymywania
        płaskiej powierzchni ekranu bez fałd.
    tent_setup_style:
      name: Styl rozkładania namiotu
      description: Wskazuje, jak namiot jest rozkładany lub montowany.
    tequila_variety:
      name: Odmiana tequili
      description: Określa rodzaj tequili, np. złota, dojrzała
    terminal_operation:
      name: Obsługa terminala
      description: Określa rodzaj obsługi kas fiskalnych, np. ręczny lub elektroniczny
    termination_method:
      name: Metoda łączenia
      description: Określa technikę używaną do podłączania przewodów do styków złącza
        (np. zaciskanie, lutowanie, IDC).
    terrain:
      name: Teren
      description: Określa rodzaj terenu, dla którego przeznaczony jest produkt, zazwyczaj
        dla sprzętu outdoorowego, np. górski, pofałdowany
    test_format:
      name: Format testu
      description: Określa rodzaj testu dla produktów zdrowotnych i kosmetycznych,
        np. cyfrowy, paski testowe
    test_method:
      name: Metoda testowa
      description: Określa procedurę badania medycznego, np. badanie w domu, analiza
        laboratoryjna
    test_sample:
      name: Próbka testowa
      description: Określa rodzaj próbki wymaganej do badań zdrowotnych i medycznych,
        np. wymaz, ślina
    tetherball_equipment_included:
      name: Sprzęt do gry w piłkę na uwięzi w zestawie
      description: Określa niezbędne elementy do gry w piłkę na uwięzi w zestawie,
        np. lina lub piłki na uwięzi
    tethering_policy:
      name: Zasady tetheringu
      description: Wyjaśnia, czy mobilny hotspot lub tethering są dozwolone zgodnie
        z warunkami planu eSIM.
    text_plate_material:
      name: Materiał płyty tekstowej
      description: Określa materiał, z którego wykonano płytkę tekstową na pieczątkach
        biurowych, np. metal lub guma
    textile_craft_machine_features:
      name: Charakterystyka urządzeń do tekstyliów
      description: Określa szczególne cechy urządzeń do tekstyliów, np. regulowane
