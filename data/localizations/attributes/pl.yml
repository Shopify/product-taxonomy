    reading_toy_type:
      name: Rozmiar zabawki do nauki czytania
      description: Określa rodzaj edukacyjnej zabawki do czytania, np. gra ortograficzna,
        tablet do czytania
    receipt_paper_features:
      name: Charakterystyka papieru paragonowego
      description: Określa unikatowe cechy papieru do paragonów, np. wskaźnik końca
        rolki lub wstępnie wydrukowane logo
    reclining_function:
      name: Funkcja odchylania
      description: Opisuje specyficzne funkcje odchylania, np. pełne odchylenie lub
        grawitacja zerowa
    recommended_age_group:
      name: Zalecana grupa wiekowa
      description: Określa właściwy przedział wiekowy dla produktu, zazwyczaj zabawki
        lub gry, np. małe dzieci, nastolatki
    recommended_skill_level:
      name: Zalecany poziom umiejętności
      description: Określa poziom umiejętności, np. początkujący, ekspert
    recommended_use:
      name: Zalecane zastosowanie
      description: Określa główne zastosowanie lub główną domenę, dla której zaprojektowano
        dany produkt sprzętowy, np. przemysłowy, mieszkaniowy
    record_cleaning_components_included:
      name: Dołączone elementy do czyszczenia płyt
      description: Wyszczególnia konkretne elementy dostarczane w zestawie, dzięki
        czemu klienci mogą na pierwszy rzut oka porównać pakiety (np. szczotka, płyn,
        ściereczka).
    recorder_fingering_system:
      name: System palcowania rejestratora
      description: Określa rodzaj systemu palcowania we flecie sopranowym, np. niemiecki,
        barokowy
    recorder_specialized_features:
      name: Specjalistyczne funkcje nagrywarki
      description: Określa zaawansowane cechy rejestratora wideo, np. inteligentny,
        obsługa Dolby Atmos
    recording_accessories_included:
      name: Akcesoria do nagrywania w zestawie
      description: Określa szczegółowo dodatkowe elementy zawarte w zestawach do nagrywania,
        np. słuchawki lub mikrofon
    recording_capability_type:
      name: Typ możliwości nagrywania
      description: Wskazuje, czy odbiornik może nagrywać treści telewizyjne i używaną
        metodę (np. USB PVR, wewnętrzny dysk twardy, chmura).
    recording_functionality:
      name: Funkcjonalność nagrywania
      description: Wskazuje, czy i w jaki sposób odbiornik może nagrywać treści telewizyjne
        (np. DVR na wewnętrzny HDD, zewnętrzny USB)
    recording_mode:
      name: Tryb nagrywania
      description: Wymienia tryby operacyjne obsługiwane przez dyktafon (np. ciągły,
        nagrywanie czasowe)
    recording_quality:
      name: Jakość nagrywania
      description: Określa czystość dźwięku transkryberów i systemów dyktowania, np.
        niska lub wysoka
    recording_speed_modes_supported:
      name: Obsługiwane tryby prędkości nagrywania
      description: Wymienia tryby prędkości taśmy, które magnetowid może nagrywać
        lub odtwarzać, wpływając na czas nagrywania i jakość obrazu
    recreational_vehicle_type:
      name: Typ pojazdu rekreacyjnego
      description: Określa kategorię kampera, np. klasa A lub przyczepa podróżna
    reed_strength:
      name: Wytrzymałość stroika
      description: Określa elastyczność stroików do instrumentów dętych drewnianych,
        np. miękkie, średnie lub twarde
    reel_capacity:
      name: Pojemność szpuli
      description: Określa pojemność szpuli w zbiorniku wywołującym, np. pojedyncza
        lub poczwórna
    reflector_design:
      name: Konstrukcja reflektora
      description: Określa konstrukcję blendy, np. plaster miodu lub parasolka
    regenerative_braking_features:
      name: Charakterystyka hamowania regeneracyjnego
      description: Określa cechy modułów hamowania regeneracyjnego pojazdów elektrycznych,
        np. odporny na warunki atmosferyczne, łatwy do instalacji
    region:
      name: Region
      description: Określa konkretną lokalizację, z której pochodzi produkt, zazwyczaj
        w przypadku wina i napojów spirytusowych, np. Kalifornia, Bordeaux
    region_code:
      name: Kod regionu
      description: Określa region, w którym licencjonowana jest gra wideo, np. Azja
        (AS) lub Globalny (GL)
    release_mechanism:
      name: Mechanizm uwalniania
      description: Wskazuje technologię dostarczania lub wchłaniania witaminy (np.
        przedłużone uwalnianie, liposomalne, do żucia).
    release_schedule:
      name: Harmonogram publikacji
      description: Określa częstość wydawania nowych odcinków lub aktualizacji, np.
        co tydzień, co dwa tygodnie
    remote_control_functions:
      name: Funkcje pilota
      description: Wyświetla listę określonych czynności, które zdalny spust migawki
        może wywołać (poza robieniem zdjęć).
    remote_shutter_form_factor:
      name: Współczynnik kształtu zdalnego spustu migawki
      description: Określa fizyczny wygląd lub obudowę zdalnej migawki, np. pilota/przycisku,
        kontrolera pierścieniowego lub kijka do selfie ze zintegrowaną migawką.
    remote_technology:
      name: Technologia zdalna
      description: Określa technologię używaną w pilotach do aparatów i kamer, np.
        Bluetooth lub tethering
    removable_storage_formats_supported:
      name: Obsługiwane formaty wymiennej pamięci masowej
      description: Określa formaty wymiennej pamięci masowej zgodne z urządzeniem,
        np. SD, microUSB
    removal_target:
      name: Przeznaczenie zmywacza
      description: Określa, które produkty do paznokci zmywacz ma rozpuszczać (np.
        lakier żelowy, paznokcie akrylowe, proszek).
    replacement_lamp_type:
      name: Typ lampy zamiennej
      description: Klasyfikuje styl dostarczonej części zamiennej (np. moduł lampy
        i obudowy, pasek podświetlenia LED, zespół CCFL).
    reptile/amphibian_food_form:
      name: Forma karmy dla gadów i płazów
      description: Określa formę karmy dla gadów/płazów, np. karma liofilizowana lub
        granulat
    reptile/amphibian_habitat_supply_type:
      name: Rodzaj artykułów do terrariów dla gadów i płazów
      description: Określa rodzaj ogrzewania lub oświetlenia terrarium dla gadów i
        płazów, np. lampa grzewcza lub lampa UVB
    research_focus:
      name: Obszar badań
      description: Określa główny obszar badań w artykułach akademickich, np. biologia
        lub ekonomia
    research_methodology:
      name: Metodologia badań
      description: Określa rodzaj metod badawczych użytych w artykułach akademickich,
        np. ankietowe lub jakościowe
    resistance_level:
      name: Poziom oporu
      description: Określa poziom oporu produktu, typowy dla taśm do ćwiczeń, np.
        bardzo duży
    resistance_system:
      name: Układ oporowy
      description: Określa mechanizm stosowany do tworzenia oporu w sprzęcie fitness,
        np. woda, powietrze
    resistance_tolerance:
      name: Tolerancja rezystancji
      description: Określa dopuszczalne odchylenie rzeczywistej rezystancji od jej
        wartości nominalnej, wyrażone jako procent (np. ±1%)
    restrictor_gate_shape:
      name: Kształt bramki ogranicznika
      description: Określa geometryczny kształt bramki ogranicznika dołączonej do
        joysticka lub wymaganej przez niego.
    result_display:
      name: Wyświetlanie wyników
      description: Określa format testu ciążowego, np. liniowy, cyfrowy
    retail/sale_sign_design:
      name: Projekt znaku handlu/sprzedaży detalicznej
      description: Określa rodzaj wiadomości na znakach stosowanych w sklepach lub
        punktach sprzedaży, np. wyprzedaż, oferta specjalna
    reticle_plane:
      name: Płaszczyzna siatki
      description: Określa płaszczyznę ogniskową siatki celowniczej w lunetach i celownikach,
        np. pierwsza lub druga
    reticle_type:
      name: Typ siatki
      description: Określa rodzaj siatki celowniczej w lunetach teleskopowych, np.
        Duplex lub Mildot
    rewinder_operation_mode:
      name: Tryb działania przewijarki
      description: Określa tryby funkcjonalne obsługiwane przez przewijarkę (np. tylko
        przewijanie, przewijanie i szybkie przewijanie do przodu)
    rf_output_standard:
      name: Standard wyjścia RF
      description: Określa standard transmisji telewizyjnej lub radiowej, który modulator
        wyprowadza.
    rfid_frequency:
      name: Częstotliwość RFID
      description: Określa częstotliwość działania produktów RFID, np. niska, bardzo
        wysoka
    riding_style:
      name: Styl jazdy
      description: Określa przeznaczenie lub styl jazdy właściwy dla sprzętu do sportów
        zimowych, np. slalom, styl dowolny
    riding_toy_propulsion_type:
      name: Typ napędu zabawki jeżdżącej
      description: Określa sposób napędzania zabawki do jeżdżenia, np. elektryczny
