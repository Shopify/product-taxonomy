    power_connector_type:
      name: Typ złącza zasilania
      description: Określa dodatkowe złącze (złącza) zasilania wymagane lub dostarczane
        przez pion lub adapter.
    power_conversion_semiconductor_type:
      name: Typ półprzewodnika konwersji mocy
      description: Identyfikuje główny materiał półprzewodnikowy używany w stopniu
        mocy ładowarki, co wpływa na rozmiar, wydajność i wytwarzanie ciepła.
    power_source:
      name: Źródło zasilania
      description: Określa źródło zasilania, którego używa produkt do działania, np.
        energia słoneczna lub baterie
    power_supply_efficiency_rating:
