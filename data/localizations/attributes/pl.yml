    tank_color:
      name: Kolor zbiornika
      description: Określa kolor produktu, zazwyczaj spłuczki, np. czarny, biały
    tank_material:
      name: Materiał zbiornika
      description: Określa materiał zbiornika na produkt, zazwyczaj na narzędzia ogrodnicze,
