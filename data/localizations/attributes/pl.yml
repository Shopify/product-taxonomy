    lens_case_accessories_included:
      name: Dołączone akcesoria do pojemnika na soczewki
      description: Wymienia dodatkowe przedmioty dołączone do pojemnika (np. pęseta,
        buteleczka z płynem).
    lens_characteristic:
      name: Charakterystyka soczewek
      description: Wymienia specjalne cechy funkcjonalne zastosowane w soczewkach
        (np. blokowanie światła niebieskiego, UV400).
    lens_coating:
      name: Powłoka soczewki
      description: Określa rodzaj powłoki na szkłach do okularów, np. antyrefleksyjna,
        odporna na zarysowania
    lens_color:
      name: Kolor soczewki
      description: Określa kolor soczewek okularów, np. żółty lub czarny
    lens_color_combination:
      name: Kombinacja kolorów soczewek
      description: Określa parę kolorów soczewek używaną w okularach anaglifowych
        3D.
    lens_configuration:
      name: Konfiguracja obiektywu
      description: Określa liczbę soczewki w elementach takich jak lupy, np. pojedyncze
        lub wielokrotne
    lens_filter_category:
      name: Kategoria filtrów obiektywu
      description: Określa europejską standardową kategorię filtra (0-4), która klasyfikuje
        obiektywy według ich gęstości zabarwienia i warunków oświetleniowych, do których
        są odpowiednie
    lens_filter_effects:
      name: Efekty filtra obiektywu
      description: Określa konkretne efekty zapewniane przez filtr obiektywu, np.
        korekcja kolorów lub makro
    lens_filter_type:
      name: Typ filtra obiektywu
      description: Określa kategorię filtra obiektywów do aparatu, np. gradient, gęstość
        neutralna
    lens_kit_accessories_included:
      name: Akcesoria do obiektywu w zestawie
      description: Wyszczególnia akcesoria dołączone do obiektywu telefonu lub zestawu
        filtrów, aby kupujący dokładnie wiedzieli, co otrzymują i mogli porównać poszczególne
        pakiety.
    lens_material:
      name: Materiał soczewki
      description: Określa podstawowy materiał użyty do wykonania elementów optycznych
        lub obudowy obiektywu, taki jak szkło optyczne, tworzywo sztuczne lub stop
        aluminium.
    lens_pattern:
      name: Wzór soczewki
      description: Określa wzór lub wygląd soczewek okularowych, np. jednolity lub
        tekstura
    lens_polarization:
      name: Polaryzacja soczewki
      description: Określa typ polaryzacji soczewki w okularach, np. z fotopolaryzacją
    lens_protector_coverage_style:
      name: Styl osłony obiektywu
      description: Określa fizyczny kształt lub konstrukcję osłony obiektywu aparatu
        telefonu komórkowego.
    lens_protector_features:
      name: Funkcje osłony obiektywu
      description: Wymienia specjalne funkcje oferowane przez osłonę.
    lens_refractive_index:
      name: Współczynnik załamania soczewki
      description: Określa numeryczny współczynnik załamania światła (np. 1,50, 1,60,
        1,67), który bezpośrednio koreluje z grubością i wagą soczewki.
    lens_storage_type:
      name: Rodzaj przechowywania obiektywu
      description: Określa rodzaj miejsca przechowywania obiektywu do aparatu, np.
        futerał na obiektyw lub pokrowiec na obiektyw
    lens_tint_type:
      name: Typ zabarwienia soczewek
      description: Opisuje odcień nałożony na soczewkę w celu zapewnienia widoczności
        podczas obsługi lub w celach kosmetycznych.
    lens_type:
      name: Typ soczewki
      description: Określa typ soczewek w okularach, np. polaryzacyjne lub progresywne
    license_type:
      name: Typ licencji
      description: Określa rodzaj licencji na oprogramowanie, np. open-source lub
        jednorazowy zakup
    lid_material:
      name: Materiał pokrywy
      description: Określa rodzaj materiału, z którego wykonano pokrywę produktu,
        np. szkło lub stal nierdzewna
    lid_type:
      name: Typ pokrywy
      description: Określa rodzaj używanego zamknięcia, np. krachla lub zatrzask
    life_jacket_features:
      name: Charakterystyka kamizelki ratunkowej
      description: Określa unikatowe cechy kamizelek ratunkowych, np. odblaskowa lub
        utrzymująca się na powierzchni
    light_attachment_type:
      name: Typ mocowania lekkiego
      description: Opisuje sposób mocowania lampki do książek, np. elastyczny lub
        stały
    light_color:
      name: Jasny kolor
      description: Określa kolor lub odcień światła, np. białe lub wielokolorowe
    light_control:
      name: Sterowanie oświetleniem
      description: Określa poziom blokowania światła przez dekoracje okienne, np.
        zaciemnienie, przezroczyste
    light_design:
      name: Lekka konstrukcja
      description: Opisuje rodzaj konstrukcji oświetlenia w akcesoriach do aparatu,
        np. dioda LED lub pierścień
    light_exposure_modes:
      name: Tryby ekspozycji na światło
      description: Określa opcje regulacji światła w aparatach, np. AE priorytet migawki
        AF lub priorytet przysłony AE
    light_filtering:
      name: Filtrowanie światła
      description: Określa możliwości filtrowania światła przez produkt, np. rozpraszanie
        lub zaciemnianie
    light_options:
      name: Opcje oświetlenia
      description: Określa cechy oświetlenia produktu, np. miękki blask lub zmiana
        kolorów
    light_pattern:
      name: Wzór światła
      description: Określa wizualny motyw produktów oświetleniowych, np. geometryczny
        lub tęczowy
    light_rejection_type:
      name: Typ odrzucania światła
      description: Wskazuje, czy i w jaki sposób ekran odrzuca światło otoczenia lub
        sufitowe, poprawiając kontrast obrazu w jasnym otoczeniu.
    light_source:
      name: Źródło światła
      description: Określa rodzaj żarówki użytej w produkcie, np. LED lub fluorescencyjne
    light_spectrum:
      name: Widmo światła
      description: Określa zakres długości fal świetlnych, które produkt może wytwarzać,
        np. światło niebieskie, podczerwień
    light_temperature:
      name: Temperatura światła
      description: Określa charakterystykę kolorystyczną źródeł światła, np. ciepła
        biel lub światło dzienne
    light_therapy_device_form_factor:
      name: Współczynnik kształtu urządzenia do terapii światłem
      description: Opisuje fizyczny styl lub konfigurację urządzenia (np. panel, maska,
        urządzenie ręczne).
    light_type:
      name: Typ światła
      description: Określa konkretny rodzaj światła stosowanego w jednostkach pływających,
        np. nawigacyjne, podwodne
    lighting_features:
      name: Charakterystyka oświetlenia
      description: Określa szczególne cechy oświetlenia, np. regulacja jasności lub
        oświetlenie LED
    lighting_options:
      name: Opcje oświetlenia
      description: Określa rodzaj podświetlenia dla oznakowania, np. podświetlane
        lub niepodświetlane
    lighting_type:
      name: Typ oświetlenia
      description: Opisuje wszelkie wbudowane funkcje oświetlenia zestawu słuchawkowego
    line/rope_type:
      name: Typ liny/sznurka
      description: Określa styl konstrukcji lin do kotwic, np. trójżyłowy lub podwójny
        splot
    line_spacing_options:
      name: Opcje odstępów między wierszami
      description: Określa opcje odstępów między wierszami, typowe dla maszyn do pisania,
        np. podwójne, regulowane
    liner_features:
      name: Charakterystyka konturówki
      description: Określa konkretne właściwości wykładzin, np. nieprzeciekające lub
        biodegradowalne
    lip_balm_tint_level:
      name: Poziom zabarwienia balsamu do ust
      description: Klasyfikuje poziom odcienia lub koloru, jaki zapewnia balsam.
    lip_gloss_applicator_type:
      name: Typ aplikatora błyszczyka
      description: Określa styl aplikatora dołączonego do błyszczyka, który wpływa
        na łatwość aplikacji i preferencje użytkownika.
    lip_gloss_effect:
      name: Efekt błyszczyka do ust
      description: Opisuje efekt lub wykończenie, jakie zapewnia błyszczyk do ust,
        np. wygładzenie, powiększenie
    lip_gloss_formulation:
      name: Formuła błyszczyka do ust
      description: Określa podstawową teksturę lub format błyszczyka do ust.
    lip_liner_design:
      name: Konstrukcja konturówki do ust
      description: Określa rodzaj konturówki do ust, np. wysuwana lub stała
    lip_makeup_opacity:
      name: Krycie produktu do ust
      description: Wskazuje poziom krycia lub nieprzezroczystości produktu po nałożeniu.
    lip_plate_material:
      name: Materiał płyty ustnikowej
      description: Określa materiał, z którego wykonana jest płyta ustnikowa fletu,
        np. srebro lub drewno
    lipstick_coverage:
      name: Krycie pomadki do ust
      description: Opisuje poziom krycia koloru zapewniany przez pomadkę (np. bezbarwny,
        średni, pełny).
    lipstick_effect:
      name: Efekt szminki
      description: Określa efekt lub wykończenie, jakie zapewnia pomadka, np. wygładzenie,
        powiększenie
    liqueur_variety:
      name: Odmiana likieru
      description: Klasyfikuje likiery według ich podstawowych profili aromatu, np.
        orzechowy, śmietankowy
    livestock_food_ingredients:
      name: Składniki żywności dla zwierząt gospodarskich
      description: Określa podstawowe składniki paszy dla zwierząt, np. jęczmień lub
        mączka sojowa
    lnb_output:
      name: Wyjście Lnb
      description: Określa liczbę połączeń odbiornika satelitarnego, np. pojedyncze
        lub poczwórne
    lnb_technology:
      name: Technologia Lnb
      description: Określa rodzaj technologii stosowanej w konwerterach satelitarnych,
        np. uniwersalna lub niski poziom hałasu
    load_capacity:
      name: Ładowność
      description: Określa limit wagi, jaki produkt może obsłużyć, np. lekki lub ciężki
    loading_ramp_type:
      name: Typ rampy załadunkowej
      description: Określa styl rampy załadunkowej, np lub składana pojedynczo lub
        składana potrójnie
    loading_type:
      name: Typ ładowania
      description: Określa sposób ładowania urządzeń pralniczych, np. ładowanie od
        przodu lub od góry
    lock_placement:
      name: Umieszczenie blokady
      description: Określa położenie blokady na częściach silnika jednostki pływającej,
        takich jak silnik zaburtowy lub wewnętrzny
    lock_type:
      name: Typ zamka
      description: Określa mechanizm blokujący używany przez produkt, np. klucz lub
        kod
    locking_mechanism:
      name: Mechanizm blokujący
      description: Określa rodzaj używanej blokady, zazwyczaj dla produktów zabezpieczających,
        np. automatyczne zamykanie, zasuwanie
    logic_family:
      name: Rodzina układów logicznych
      description: Określa rodzinę półprzewodnikowych układów logicznych lub technologię
        układu scalonego.
    lovibond:
      name: Lovibond
      description: Wskazuje intensywność koloru zbóż browarniczych i słodów, np. jasny
        lub ciemny
    lubricant_application:
      name: Aplikacja środka nawilżającego
      description: Określa właściwe obszary zastosowania lubrykantu osobistego, np.
        masaż lub dopochwowy
    lubricant_composition:
      name: Skład środka nawilżającego
      description: Określa podstawowy składnik lubrykantów osobistych, np. na bazie
        wody lub na bazie silikonu
    lubricant_dispenser_type:
      name: Typ dozownika smaru
      description: Określa rodzaj opakowania lub pojemnika na smary, np. beczka i
        butelka
    lubricant_effect:
      name: Efekt lubrykantu
      description: Wskazuje efekt funkcjonalny lub styl zapewniany przez nawilżenie
        prezerwatywy.
    lubricant_form:
      name: Forma smaru
      description: Określa konsystencję środka smarnego, np. żel lub pasta
    luggage/bag_closure:
      name: Zamknięcie bagażu/torby
      description: Określa rodzaj zamknięcia bagażu lub torby, np. zamek błyskawiczny
        lub zatrzask
    lumber/wood_type:
      name: Rodzaj tarcicy/drewna
      description: Określa konkretny gatunek drewna lub tarcicy, z którego wykonany
        jest produkt, np. dąb lub sosna
    lyre/flip_folder_attachment_type:
      name: Typ załącznika folderu z lirą/z systemem przewracania stron
      description: Określa rodzaj mocowania dla pulpicików i przenośnych pulpitów
        na nuty, np. pasek lub zacisk lirowy
    m_2_drive_length_supported:
      name: Obsługiwana długość dysku M.2
      description: Określa, jakie długości kart M.2 mogą być obsługiwane przez obudowę
        lub adapter.
    magnet_type:
      name: Typ magnesu
      description: Określa rodzaj magnesu użytego w produkcie, np. ceramiczny, tytanowy
    magnification:
      name: Powiększenie
      description: Określa moc powiększenia produktu, np. 1x lub 100x
    magsafe_compatibility:
      name: Kompatybilność z MagSafe
      description: Wskazuje, czy akcesorium obsługuje magnetyczne mocowanie lub ekosystem
        ładowania MagSafe firmy Apple.
    makeup_brush_application:
      name: Zastosowanie pędzla do makijażu
      description: Określa główne zastosowanie kosmetyczne lub obszar, do którego
        przeznaczony jest pędzel (np. podkład, cienie do powiek, konturowanie).
    makeup_features:
      name: Charakterystyka makijażu
      description: Określa kluczowe cechy kosmetyków, np. wysoka pigmentacja lub bezzapachowy
    makeup_shade:
      name: Odcień makijażu
      description: Określa odcień kosmetyków, np. średni róż lub głęboki brąz
    mallet_material:
      name: Materiał kija typu mallet
      description: Określa rodzaj materiału, z którego wykonane są młotki perkusyjne,
        np. mosiądz lub guma
    management_type:
      name: Typ zarządzania
      description: Opisuje poziom zarządzania urządzeniem (np. w pełni zarządzane,
        inteligentnie zarządzane, niezarządzane), dzięki czemu kupujący mogą dopasować
        możliwości produktu do wymagań sieci.
    mandibular_device_fitting_method:
      name: Metoda dopasowania aparatu żuchwowego
      description: Opisuje, w jaki sposób urządzenie jest dopasowywane lub formowane
        do zębów użytkownika.
    mandolin_back_shape:
      name: Kształt tyłu mandoliny
      description: Określa krzywiznę i konstrukcję tylnej części mandoliny, np. płaska
        lub archtop
    manufacturer_type:
      name: Typ producenta
      description: Określa źródło części lub akcesoriów do pojazdu, np. oryginalne
        lub pochodzące od osoby trzeciej
    map_update_policy:
      name: Zasady aktualizacji map
      description: Określa, w jaki sposób aktualizacje map są dostarczane lub wyceniane
        dla urządzenia.
    marine_navigator_features:
      name: Funkcje urządzenia nawigacyjnego
      description: Określa funkcje narzędzi do nawigacji morskiej, np. ekran dotykowy
        lub wodoszczelność
    marker_format:
      name: Format znacznika
      description: Określa fizyczny styl lub konstrukcję znacznika.
    marker_text_color:
      name: Kolor tekstu znacznika
      description: Określa kolor wydrukowanej legendy lub tekstu na powierzchni znacznika
        (odróżniając od koloru korpusu znacznika).
    marker_tip_design:
      name: Konstrukcja końcówki markera
      description: Opisuje kształt końcówki markera, np. pocisk lub dłuto
    marquee_substrate:
      name: Materiał markizy
      description: Określa fizyczny nośnik, na którym wydrukowano lub dostarczono
        kompozycję (np. folia translite, akryl z odwrotnym nadrukiem, naklejka winylowa).
    mascara_brush_shape:
      name: Kształt szczoteczki tuszu do rzęs
      description: Określa kształt lub konstrukcję wbudowanej szczoteczki lub szczoteczki
        podkładu, co ma duży wpływ na aplikację i efekty.
    mascara_effect:
      name: Efekt tuszu do rzęs
      description: Określa oczekiwany rezultat lub oczekiwaną cechę tuszu do rzęs,
        np. podkręcanie, wydłużanie
    mascara_formulation:
      name: Formulacja tuszu
      description: Wskazuje podstawowy skład produktu lub specjalną technologię (np.
        płynną, z włóknami, kanalikową), która wpływa na teksturę, zużycie i usuwanie.
    mask_cushion_material:
      name: Materiał poduszki maski
      description: Szczegółowe informacje na temat konkretnego materiału użytego do
        wykonania poduszki lub uszczelki maski.
    mask_size:
      name: Rozmiar maski
      description: Określa oznaczenie rozmiaru podane przez producenta.
    mask_type:
      name: Typ maski
      description: Określa konstrukcję masek, zazwyczaj przeznaczonych do ochrony
        dróg oddechowych, np. ustne, nosowe
    masonry_material:
      name: Materiał murarski
      description: Określa skład produktów murarskich, np. cement lub wapień
    masonry_product_form:
      name: Forma produktu murarskiego
      description: Określa postać produktów murarskich, np. pasta lub proszek
    massage_area:
      name: Strefa masażu
      description: Określa część ciała, do masażu której produkt jest przeznaczony,
        np. stopy lub kark
    massage_mechanism_dimensionality:
      name: Wymiarowość mechanizmu masażu
      description: Określa liczbę osi ruchu, w których działają rolki masujące (np.
        2D, 3D, 4D, 5D).
    massage_stone_texture:
      name: Tekstura kamienia do masażu
      description: Określa wrażenia dotykowe powierzchni kamieni do masażu, np. gładkie
        lub szorstkie
    massage_technique:
      name: Technika masażu
      description: Określa techniki masażu oferowane przez produkt, np. masaż opukowy,
        masaż tkanek głębokich
    mat/rug_shape:
      name: Kształt maty/dywanu
      description: Określa formę mat lub dywaników, np. okrągłe lub kwadratowe
    mat_base_material:
      name: Materiał bazowy maty
      description: Określa rodzaj materiału, z którego wykonana jest podstawa maty,
        np. korek, pianka pamięciowa
    mat_features:
      name: Charakterystyka maty
      description: Określa konkretne cechy mat do domu lub biura, np. antypoślizgowa
        podstawa lub wodoszczelność
    material:
      name: Materiał
      description: Określa podstawowy materiał produktu, np. bawełnę lub wełnę
    material_firmness:
      name: Sztywność materiału
      description: Określa twardość lub miękkość produktu, np. sztywny, elastyczny
    material_hardness:
      name: Twardość materiału
      description: Określa twardość produktu, typową dla sprzętu sportowego lub fitness,
        np. bardzo miękki, o wysokiej odporności
    material_origin:
      name: Pochodzenie materiału
      description: Wskazuje formę lub stan, w jakim dostarczane są cenne materiały
        (np. luzem/nieoprawione, gotowa biżuteria, drukowana/cyfrowa karta podarunkowa).
    material_treatment:
      name: Obróbka materiału
      description: Określa obróbkę chemiczną lub fizyczną zastosowaną do materiałów
        w celu ich konserwacji lub zapewnienia bezpieczeństwa (np. obróbka cieplna,
        fumigacja, obróbka chemiczna).
    maternity_clothing_features:
      name: Charakterystyka odzieży ciążowej
      description: Określa unikatowe cechy odzieży ciążowej, np. miejsce na wzrost
        brzucha, miseczki podtrzymujące
    maternity_sleepwear_style:
      name: Styl koszul nocnych ciążowych
      description: Określa styl ciążowych koszuli nocnych, np. onesie lub koszula
        do spania
    mattress_features:
      name: Charakterystyka materaca
      description: Określa szczególne cechy materaca, np. hipoalergiczny lub funkcja
        chłodzenia
    maximum_bit_depth:
      name: Maksymalna głębia bitowa
      description: Określa najwyższą długość słowa cyfrowego (w bitach) obsługiwaną
        przez konwerter, wpływając na zakres dynamiki i rozdzielczość.
    maximum_magnification:
      name: Maksymalne powiększenie
      description: Określa najwyższy współczynnik powiększenia, jaki może osiągnąć
        mikroskop, np. 10x lub 100x
    maximum_reel_diameter_supported:
      name: Maksymalna obsługiwana średnica szpuli
      description: Określa największą średnicę szpuli, jaką magnetofon może pomieścić
    measured_parameters:
      name: Mierzone parametry
      description: Wyszczególnia wskaźniki elektryczne lub dotyczące baterii, które
        urządzenie może mierzyć lub wyświetlać.
    measuring_method:
      name: Metoda pomiaru
      description: Określa technikę stosowaną do ilościowego oznaczania tkanki tłuszczowej,
        np. optyczna, suwmiarka
    measuring_tool_features:
      name: Charakterystyka narzędzia pomiarowego
      description: Określa szczególne cechy narzędzi pomiarowych, np. wbudowana kamera
        lub przenośne
    measuring_type:
      name: Typ pomiaru
      description: Określa metodę pomiaru stosowaną przez urządzenia medyczne, np.
        czoło, palec
    meat_cut:
      name: Kawałek mięsa
      description: Ułatwia identyfikację konkretnego kawałka lub stylu mięsa, np.
        burger, skrzydełko
    meat_type:
      name: Typ mięsa
      description: Określa źródło pochodzenia produktów mięsnych, np. roślinne, kurczak
    media_access:
      name: Dostęp do mediów
      description: Określa sposób, w jaki klienci mogą uzyskać dostęp do mediów, np.
        subskrypcja cyfrowa, druk i online
    media_content_type:
      name: Typ treści medialnej
      description: Określa gatunek lub kategorię treści medialnych, np. reality TV
        lub stand-up
    media_format:
      name: Format nośnika
      description: Określa zgodne formaty mediów dla urządzenia, np. winylowe lub
        VHS
    media_physical_size:
      name: Rozmiar fizyczny nośnika
      description: Określa znormalizowany rozmiar fizyczny lub współczynnik kształtu
        pustego nośnika.
    media_player_form_factor:
      name: Format odtwarzacza multimedialnego
      description: Opisuje fizyczny styl urządzenia, pomagając kupującym wybrać między
        kompaktowymi odtwarzaczami a większymi dekoderami.
    media_section:
      name: Sekcja mediów
      description: Określa konkretną tematykę gazety lub czasopisma, np. sport lub
        polityka
    media_theme:
      name: Motyw medialny
      description: Określa kategorię treści medialnych według ich głównego tematu,
        np. podróże lub gry
    medical_alarm_features:
      name: Charakterystyka alarmu medycznego
      description: Określa możliwości systemu alarmów medycznych, np. długi czas pracy
        na baterii lub dwukierunkowa komunikacja
    medical_device_certification:
      name: Certyfikacja urządzenia medycznego
      description: Wymienia zatwierdzenia regulacyjne lub standardy, z którymi monitor
        biometryczny jest zgodny (np. CE, FDA 510(k)).
    medical_identification_type:
      name: Rodzaj identyfikatora medycznego
      description: Określa formę identyfikatora medycznego, np. bransoletka lub naszyjnik
    medical_symbol:
      name: Symbol medyczny
      description: Określa symbol wyświetlany na biżuterii lub zawieszce, pomagający
        w szybkim rozpoznaniu przez ratowników.
    medical_syringe_purpose:
      name: Przeznaczenie strzykawki medycznej
      description: Określa docelowe zastosowanie strzykawki medycznej, np. iniekcja
        lub irygacja
    medical_tape_material:
      name: Materiał taśmy medycznej
      description: Określa skład taśmy medycznej, np. tworzywo sztuczne lub lateks
    medicine/drug_form:
      name: Forma leku
      description: Określa fizyczną postać leku, np. tabletki lub płyn
    medicine/supplement_form:
      name: Forma leku/suplementu
      description: Określa fizyczną postać leku lub suplementu, np. kapsułki lub płyn
    medium:
      name: Środek
      description: Określa rodzaj przedmiotu kolekcjonerskiego, np. memorabilia lub
        karty kolekcjonerskie
    melodica_style:
      name: Styl melodyki
