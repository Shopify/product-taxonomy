    puppet_type:
      name: Typ marionetki
      description: Określa styl lalki, np. kukiełka na rękę lub marionetka
    push_button_terminal_type:
      name: Typ terminala przycisku
      description: Określa styl połączenia elektrycznego na przycisku, zapewniając
