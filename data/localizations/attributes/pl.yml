    leg_material:
      name: Materiał nogi
      description: Określa materiał, z którego wykonane są nogi produktu, np. drewno
        wiśniowe lub bambus
    leg_pattern:
      name: Wzór na nodze
      description: 'Określa wzór lub nadruk na nóżkach produktu, np. zwierzęta lub
        geometryczny '
    leg_sections:
      name: Sekcje nóg
      description: Określa liczbę sekcji nóżek w akcesoriach elektronicznych, zazwyczaj
