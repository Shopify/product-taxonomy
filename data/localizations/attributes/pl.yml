    rack_type:
      name: Typ szafy
      description: Określa styl bagażnika pojazdu, np. tylny lub dachowy
    rack_width_standard:
      name: Standard szerokości szafy rack
      description: Określa standardową szerokość montażu poziomego produktu.
    racket_balance:
      name: Balans rakiety
      description: Oznacza rozkład ciężaru rakiety, np. ciężka w główce lub równomiernie
