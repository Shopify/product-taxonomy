      description: Określa wysokość obcasa buta, np. płaski lub wysoki
    heel_shoe_type:
      name: Rodzaj buta na obcasie
      description: Określa styl obcasów butów, np. obcasy na platformie lub koturny
    height_adjustment:
      name: Regulacja wysokości
