    pottery/sculpting_project_type:
      name: Typ projektu z zakresu ceramiki/rzeźby
      description: Określa szczególny rodzaj projektu garncarskiego lub rzeźbiarskiego,
        np. modelowanie lub produkcja masek
    potty/toilet_seat_design:
      name: Projekt nocnika/deski sedesowej
      description: Określa styl lub strukturę nocników lub desek sedesowych, np. składane
        lub standardowe
    potty_training_kit_components:
      name: Elementy zestawu do nauki korzystania z nocnika
      description: Określa elementy wchodzące w skład zestawu do treningu czystości,
