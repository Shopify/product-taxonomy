    toe_style:
      name: Styl stopki
      description: Określa kształt lub konstrukcję noska buta, np. otwarty lub spiczasty
    toilet/bidet_mounting_type:
      name: Typ mocowania sedesu/bidetu
      description: Określa sposób montażu toalety lub bidetu, np. montowany na podłodze
