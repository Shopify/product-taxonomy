    compatible_makeup:
      name: Pasujący makijaż
      description: Określa zgodne produkty do makijażu, np. szminka, cień do powiek
    compatible_mattress_size:
      name: Zgodny rozmiar materaca
      description: Określa rozmiar materaca pasujący do produktu, tj. king, podwójny
    compatible_memory_cards:
      name: Zgodne karty pamięci
      description: Określa rodzaje kart pamięci, z których może korzystać produkt,
