    keyboard_layout:
      name: Układ klawiatury
      description: Określa układ klawiszy na klawiaturze, np. QWERTY, Workman
    keyboard_mounting_style:
      name: Styl montażu klawiatury
      description: Definiuje metodę montażu płyty wewnętrznej, która wpływa na dźwięk
        i wrażenia dotykowe klawiatur mechanicznych.
    keyboard_port_type:
      name: Typ portu klawiatury
      description: Określa rodzaj portu do podłączenia klawiatury, np. USB typu C
    keyboard_specialized_features:
      name: Specjalistyczne funkcje klawiatury
      description: Określa unikatowe cechy klawiatury, np. regulowany kąt lub podświetlenie
    keyboard_switch_type:
      name: Typ przełącznika klawiatury
      description: Określa styl reakcji klawiatury, np. ruchowy lub klikający
    keyboard_type:
      name: Typ klawiatury
      description: Określa konstrukcję i funkcjonalność klawiatury, np. standardowa,
        podświetlana
    keycap_legend_printing_method:
      name: Metoda drukowania legend na nasadkach klawiszy
      description: Opisuje, w jaki sposób legendy są nakładane na nasadki klawiszy,
        wpływając na ich trwałość i wygląd.
    keycap_material:
      name: Materiał nasadek na klawisze
      description: Wskazuje podstawowy materiał lub proces produkcji nasadek klawiszy,
        który wpływa na trwałość, teksturę i legendy.
    keycap_profile:
      name: Profil nasadki na klawisze
      description: Określa rzeźbę lub rodzinę kształtów zestawu nasadek klawiszy,
        wpływając na sposób pisania i estetykę.
    keypad_style:
      name: Styl klawiatury
      description: Określa metodę wprowadzania danych właściwą dla klawiatur, np.
        cyfrowa lub alfanumeryczna
    keystone_correction_type:
      name: Typ korekcji zniekształceń trapezowych
      description: Opisuje rodzaj korekcji trapezowej lub geometrycznej obsługiwanej
