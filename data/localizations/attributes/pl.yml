    cooking_method:
      name: Technika wykonania
      description: Określa zalecaną technikę gotowania, np. pieczenie na rożnie, smażenie
    cooking_wine_variety:
      name: Odmiana wina do gotowania
      description: Określa różne odmiany wina spożywczego, np. ryżowe, sherry
    cookware/bakeware_features:
