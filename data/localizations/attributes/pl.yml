    tip_material:
      name: Materiał końcówki
      description: Określa materiał zastosowany w końcówce produktu, np. bawełna,
        silikon
    tip_opening:
      name: Otwór końcówki
      description: Określa szerokość otworu ustnika w instrumentach dętych, np. średni
        lub duży
    tip_style:
      name: Styl końcówki
      description: Opisuje konstrukcję końcówki produktu, np. kątowa, zakrzywiona
    tip_type:
      name: Typ końcówki
      description: Określa rodzaj końcówki harpunu, np. dłuto lub podwójne zadziory
    tire_bead_type:
      name: Typ stopki opony
      description: Określa rodzaj stopki w oponach rowerowych, np. składane lub sztywne
    tobacco_type:
      name: Typ tytoniu
      description: Określa odmianę tytoniu, np. turecki, Virginia
    toddler_bed_features:
      name: Charakterystyka łóżka dziecięcego
      description: Określa szczególne cechy łóżek dla dzieci, np. regulowana wysokość
        lub wbudowana lampka nocna
    toe_spacer_design:
      name: Forma separatora palców stopy
      description: Opisuje konstrukcję rozdzielaczy palców stóp stosowanych w pielęgnacji
