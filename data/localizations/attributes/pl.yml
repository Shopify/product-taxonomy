    rim/wheel_design:
      name: Konstrukcja obręczy/koła
      description: Określa styl lub konstrukcję felg lub kół pojazdu, np. aluminiowe
        lub szprychowe
    ring_design:
      name: Konstrukcja pierścionka
      description: Określa styl pierścionka, np. obrączka lub klasyczny z jednym kamieniem
    ring_size:
      name: Rozmiar pierścienia
      description: Określa rozmiar pierścionka, np. L lub 6,5
    rinse_requirement:
      name: Konieczność spłukiwania
      description: Wyjaśnia, czy produkt oczyszczający musi zostać spłukany, czy może
        pozostać na skórze, czy też nie wymaga spłukiwania (np. woda micelarna).
    rise_height_class:
      name: Klasa wysokości podnoszenia
      description: Kategoryzuje, ile dodatkowej wysokości dodaje uchwyt na kciuk w
        stosunku do standardowego drążka (np. niski, średni, wysoki).
    riser_color:
      name: Kolor trzpienia
      description: Określa kolor majdanu łuku, np. czarny lub niebieski
    riser_material:
      name: Materiał trzpienia
      description: Określa materiał, z którego wykonane jest ramię łuku lub kuszy,
        np. włókno węglowe lub drewno
    riser_pattern:
      name: Wzór trzpienia
      description: Określa wzór lub motyw na majdanie łuku lub kuszy, np. kamuflaż
        lub tekstura
    rivet_form:
      name: Forma nitu
      description: Określa kształt nitów, np. pełne, rozdzielne
    road_sign_design:
      name: Projekt znaku drogowego
      description: Określa rodzaj informacji wyświetlanych na znaku drogowym, np.
