    textile_craft_project_type:
      name: Typ projektu rzemiosła tekstylnego
      description: Określa rodzaj projektu rzemiosła tekstylnego, np. dzianie lub
        pikowanie
    texture:
      name: Tekstura
      description: Określa dotyk lub konsystencję produktu, na przykład kremowy, matowy
        lub chłonny
    texture_level:
      name: Stopień konsystencji
      description: Określa gładkość lub szorstkość produktu, zazwyczaj w przypadku
        purée odżywczych, np. poziom 1 (purée), poziom 2 (mielony)
    theme:
      name: Motyw
      description: Określa główny motyw lub temat produktu, np. sport, przestrzeń
