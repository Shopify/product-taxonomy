    joystick_sensor_technology:
      name: Technologia czujnika joysticka
      description: Określa podstawową technologię czujników używaną do wykrywania
        ruchu lub położenia.
    jump_rope_design:
      name: Konstrukcja skakanki
      description: Określa rodzaj skakanki, np. zwykła lub inteligentna
    jumping_surface_color:
      name: Kolor powierzchni do skakania
      description: Określa kolor powierzchni do skakania trampoliny, np. niebieski
