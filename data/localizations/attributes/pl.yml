    rod_pattern:
      name: Wzór wędki
      description: Określa wzór lub nadruk na wędce, np. kamuflaż lub paski
    rod_shape:
      name: Kształt kija
      description: Określa formę lub konfigurację drążków prysznicowych, np. proste,
