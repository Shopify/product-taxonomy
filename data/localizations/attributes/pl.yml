    saddle_base_material:
      name: Materiał bazowy siodła
      description: Określa materiał, z którego wykonano podstawę siodełka rowerowego,
        np. stal lub włókno węglowe
    saddle_base_pattern:
      name: Wzór bazowy siodła
      description: Określa wzór lub nadruk na podstawie siodełka rowerowego, np. abstrakcja
        lub logo
    saddle_material:
      name: Materiał siodełka
      description: Określa materiał używany w siodełkach rowerowych, np. guma lub
        skóra
    saddle_seat_color:
      name: Kolor siedziska siodła
      description: Określa kolor siodełka rowerowego, np. srebrny lub czerwony
    saddle_seat_material:
      name: Materiał siedziska siodła
      description: Określa materiał, z którego wykonano siodełko rowerowe, np. skóra
        lub nylon
    saddle_seat_pattern:
      name: Wzór siedziska siodła
      description: Określa wzór lub nadruk na siodełku rowerowym, np. kwiatowy lub
        geometryczny
    safety_certifications:
      name: Certyfikaty bezpieczeństwa
      description: Określa zgodność produktu z normami bezpieczeństwa, zazwyczaj dla
        produktów dla dzieci, np. nie zawiera BPA
    safety_device_installation:
