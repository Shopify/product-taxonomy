    targeted_pests:
      name: Zwalczane szkodniki
      description: Określa rodzaj szkodników, przeciwko którym produkt jest skuteczny,
        np. pleśń, glony
    targeted_skin_concern:
      name: Docelowy problem skórny
      description: Wskazuje konkretną zmianę lub stan skóry, do leczenia których produkt
        został opracowany.
    targeted_stains:
      name: Usuwane plamy
      description: Określa rodzaje plam, do usuwania których przeznaczony jest produkt,
        np. plamy z żywności lub plamy z błota
    tea_input_type:
      name: Typ surowca herbacianego
      description: Określa sposób przygotowania herbaty, np. torebki, K-cups
    technology_level:
      name: Poziom technologii
      description: Określa złożoność technologii produktu, np. podstawowa, zaawansowana
    teeth_material:
      name: Materiał zębów
      description: Identyfikuje materiał używany w zębach, zwykle w narzędziach ogrodniczych,
        np. plastik, metal
    telephone_cable_interface:
      name: Interfejs kabla telefonicznego
      description: Określa rodzaj wtyczki stosowanej w kablach telefonicznych, np.
        RJ-10
    telephone_cable_second_interface:
      name: Drugi interfejs kabla telefonicznego
      description: Definiuje typ złącza na przeciwległym końcu kabla, gdy różni się
        od głównego interfejsu (np. RJ45 do RJ11).
    telephone_cord_style:
      name: Styl przewodu telefonicznego
      description: Określa fizyczny kształt przewodu telefonicznego, ułatwiając wybór
        klientom, którzy potrzebują prostego, zwiniętego lub specjalnego przewodu
        do słuchawek i uchwytów ściennych.
    telephone_style:
      name: Styl telefonu
      description: Określa wygląd lub estetykę telefonu, np. vintage, nowość
    telescope_level:
      name: Mechanizm poziomujący teleskop
      description: Określa złożoność lub poziom umiejętności wymagany do korzystania
