      description: Określa szczególne cechy garnków lub form do pieczenia, np. nieprzywierająca
        powłoka lub bezpieczne dla piekarnika
    cookware/bakeware_material:
      name: Materiał garnka / formy do pieczenia
      description: Określa główny materiał garnków lub form do pieczenia, np. stal
        nierdzewna lub ceramika
    cookware_features:
      name: Charakterystyka garnka
      description: Określa unikatowe cechy garnków, np. bezpieczny dla piekarnika
        lub uchwyt zapewniający chłód
    cookware_items_included:
      name: Garnki w zestawie
      description: Określa komponenty zestawu garnków, np. kociołek lub patelnia
    cooling_technology:
      name: Technologia chłodzenia
      description: Określa metodę używaną do chłodzenia urządzeń elektronicznych,
        np. powietrze lub radiator
    cord_fastening_system:
      name: System mocowania linki
      description: Określa rodzaj systemu mocowania linek bungee, np. zapięcie kulkowe
        lub zaczep
    cordless_phone_frequency_band:
      name: Pasmo częstotliwości telefonu bezprzewodowego
      description: Określa pasmo częstotliwości radiowej, na którym działa system
        telefonu bezprzewodowego, pomagając klientom zapewnić zgodność regionalną
        i uniknąć zakłóceń.
    core_color:
      name: Kolor rdzenia
      description: Określa podstawowy kolor rdzenia łuku lub kuszy, np. czarny lub
        niebieski
    core_material:
      name: Główny materiał
      description: Określa podstawowy materiał, z którego wykonane są łuki i kusze,
        np. włókno szklane, drewno
    core_pattern:
      name: Wzór rdzenia
      description: Określa główny wzór na rdzeniu łuku lub kuszy, np. kamuflaż lub
        ptaki
    corrector_features:
      name: Charakterystyka korektora
      description: Określa unikatowe cechy korektorów, np. bez czasu schnięcia lub
        końcówka precyzyjna
    corsage/boutonniere_design:
      name: Projekt Corsage/Boutonni√®re
      description: Określa styl bukieciku lub butonierki, np. ręczny lub przypinany
    cosmetic_condition:
      name: Stan kosmetyku
