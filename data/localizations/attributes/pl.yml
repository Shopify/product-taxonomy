    conversion_direction:
      name: Kierunek konwersji
      description: Opisuje typ i kierunek konwersji wykonywanej przez urządzenie
    converter_functionality:
      name: Funkcjonalność konwertera
      description: Określa konkretne funkcje konwerterów do obiektywów, np. wzmacniacz
