        C lub D
    pneumatic_conveyor_operation:
      name: Obsługa przenośnika pneumatycznego
      description: Określa tryb pracy przenośników pneumatycznych, np. faza eko lub
        faza gęsta
    poe_standard:
      name: Standard PoE
      description: Określa protokół PoE (Power over Ethernet), z którym zgodny jest
        produkt, np. pasywny, IEEE 802.3af
    point_design:
      name: Projekt punktu
      description: Określa styl końcówki przyboru biurowego, zazwyczaj pinezki lub
        szpilki, np. ostra, tępa
    pointing_device:
      name: Urządzenie wskazujące
      description: Określa urządzenie służące do nawigacji na ekranie komputera, np.
        przyciski myszy, panel dotykowy
    polar_pattern:
      name: Wzorzec biegunowy
      description: Określa kierunek odbioru dźwięku przez mikrofon, np. dookólny lub
