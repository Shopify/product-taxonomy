    protective_gear_features:
      name: Charakterystyka ochraniaczy
      description: Określa unikatowe cechy sprzętu ochronnego, np. wstrząsoodporny
        lub ograniczający parowanie
    protective_mask_design:
      name: Konstrukcja maski ochronnej
      description: Określa budowę masek ochronnych, np. pełna twarz lub półmaska
    protective_mask_features:
      name: Charakterystyka maski ochronnej
      description: Określa unikatowe cechy masek ochronnych, np. regulowany pasek
