    legend_type:
      name: Typ legendy
      description: Wskazuje, czy znacznik jest pusty, czy wstępnie zadrukowany cyframi,
        literami, symbolami lub innymi oznaczeniami.
    length_adjustability:
      name: Regulacja długości
      description: Wskazuje, czy długość paska lub łańcuszka może być zmieniana przez
