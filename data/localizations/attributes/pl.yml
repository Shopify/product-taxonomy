    sailboat_type:
      name: Typ żaglówki
      description: Określa konkretny projekt lub model żaglówki, np. slup lub kuter
    sandal_style:
      name: Styl sandałów
      description: Określa styl sandałów, np. z paskiem wokół kostki lub sznurowane
    sandblaster_application:
      name: Zastosowanie piaskarki
      description: Określa docelową funkcję narzędzi do piaskowania, np. polerowanie
        lub szlifowanie
    sander_type:
      name: Typ szlifierki
      description: Określa rodzaj szlifierki, np. taśmowa, mimośrodowa
    sanding_application:
      name: Zastosowanie do szlifowania
      description: Określa przeznaczenie akcesoriów do szlifowania, np. prace wykończeniowe
