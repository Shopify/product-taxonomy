    internet_radio_form_factor:
      name: Format radia internetowego
      description: Określa fizyczny styl lub orientację montażu radia internetowego.
    intimate_apparel_features:
      name: Charakterystyka odzieży intymnej
      description: Określa szczególne cechy odzieży intymnej, np. oddychająca konstrukcja
        lub komfortowe dopasowanie
    inverter_type:
