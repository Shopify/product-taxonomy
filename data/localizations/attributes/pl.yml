    hvac_control_type:
      name: Typ sterowania HVAC
      description: Określa rodzaj sterowania HVAC, np. cyfrowe lub ręczne
    ice_pack_type:
      name: Typ opakowania chłodzącego
      description: Określa materiał lub technologię używaną w opakowaniu chłodzącym,
