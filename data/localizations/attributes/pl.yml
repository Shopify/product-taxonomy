    toilet_cover_design:
      name: Konstrukcja nakładki na toaletę
      description: Określa kształt nakładki na toaletę, np. okrągły lub wydłużony
    toilet_cover_features:
      name: Charakterystyka nakładki na toaletę
      description: Określa szczególne cechy nakładki na toaletę, np. szybkie zwalnianie
        lub miękkie zamykanie
    toilet_mounting_type:
      name: Typ montażu toalety
      description: Określa metodę instalacji toalety, np. montowana na ścianie, montowana
        na podłodze
    toilet_shape:
      name: Kształt toalety
      description: Określa kształt toalety, np. okrągła lub prostokątna
    tom_tom_design:
      name: Niestandardowy projekt
      description: Określa rodzaj tom-toma, np. podłogowy lub stojakowy
    tonearm_type:
      name: Typ ramienia
      description: Opisuje geometrię ramienia, która wpływa na wydajność śledzenia
        i użyteczność dla DJ-ów.
    tool/utensil_material:
      name: Materiał narzędzia
      description: Określa główny materiał, z którego wykonano dane narzędzie, np.
        stal nierdzewna lub drewno tekowe
    tool_key_tip:
      name: Końcówka klucza
      description: Określa typ końcówki klucza narzędzia, np. krzyżowe lub klucz płaski
    tool_mobility:
      name: Mobilność narzędzia
      description: Określa, czy narzędzie jest przewodowe czy bezprzewodowe, zazwyczaj
        w przypadku produktów do pielęgnacji zębów
    tool_operation:
      name: Obsługa narzędzia
      description: Określa sposób obsługi narzędzia, np. ręczny lub elektryczny
    toothbrush_head_size:
      name: Rozmiar główki szczoteczki do zębów
      description: Określa względny rozmiar główki szczoteczki, aby dopasować ją do
        różnych rozmiarów jamy ustnej i potrzeb w zakresie czyszczenia.
    toothbrush_head_type:
      name: Typ główki szczoteczki do zębów
      description: Klasyfikuje funkcjonalny styl główki (np. wybielająca, pielęgnacja
        dziąseł, dziecięca).
    toothpaste_type:
      name: Typ pasty do zębów
      description: Określa konkretną funkcję pasty do zębów, np. zapobieganie próchnicy
        lub wybielanie
    toothpick_design:
      name: Forma wykałaczki
      description: Określa kształt wykałaczki, np. okrągła lub płaska
    top_color:
      name: Kolor topu
      description: Określa podstawowy kolor górnej powierzchni produktu, np. przezroczysty,
        brązowy
    top_length_type:
      name: Typ długości topu
      description: Określa długość topów lub koszul, np. odsłaniające brzuch lub długie
    top_material:
      name: Materiał topu
      description: Określa materiał górnej powierzchni produktu, np. drewno, szkło
    top_pattern:
      name: Wzór wierzchni
      description: Określa wzór lub nadruk na powierzchni produktu, np. kwiatowy lub
        pasiasty
    top_surface_material:
      name: Materiał wierzchni
      description: Określa materiał użyty na górnej powierzchni produktu, np. stal
        nierdzewna lub szkło ceramiczne
    top_up_method:
      name: Metoda doładowania
      description: Określa sposób, w jaki klienci mogą dodać dodatkowe środki lub
        odnowić plan na karcie prepaid lub SIM.
    tote_handle_type:
      name: Typ uchwytu torby
      description: Określa styl uchwytów torby tote, np. krótkie lub długie
    totem_design:
      name: Projekt totemu
      description: Określa projekt totemów targowych, np. jednostronny lub dwustronny
    touch_capabilities:
      name: Możliwości dotykowe
      description: Określa rodzaj interakcji dotykowej obsługiwanej przez urządzenie
        elektroniczne, np. pojedyncza lub podwójna
    touchpad_form_factor:
      name: Format panelu dotykowego
      description: Określa zamierzony styl instalacji lub użytkowania panelu dotykowego.
    touchscreen_technology:
      name: Technologia ekranu dotykowego
      description: Określa technologię ekranu dotykowego dla urządzeń interaktywnych,
        np. pojemnościowa lub rezystancyjna
    touchscreen_wire_configuration:
      name: Konfiguracja przewodów ekranu dotykowego
      description: Wskazuje liczbę przewodów lub linii używanych przez digitizery
        rezystancyjne, wpływając na kompatybilność ze sterownikami.
    toy/game_material:
      name: Materiał zabawki/gry
      description: Określa główny materiał, z którego wykonano zabawkę lub grę, np.
        tworzywo sztuczne lub drewno
    toy_figure_features:
      name: Charakterystyka figurki
      description: Określa szczególne cechy figurek, np. ruchome stawy lub realistyczne
        detale
    toy_figure_theme:
      name: Motyw figurki
      description: Określa motyw lub kategorię figurki, np. zwierzę lub sport
    toy_tool_type:
      name: Rodzaj narzędzia do zabawy
      description: Określa rodzaj narzędzia do zabawy w zestawie, np. wiertarka lub
        młotek
    track_configuration:
      name: Konfiguracja ścieżek
      description: Wskazuje format ścieżki taśmy i kanały, które urządzenie może nagrywać
        lub odtwarzać (np. stereo lub mono, liczba ścieżek).
    tracker_form_factor:
      name: Współczynnik formy trackera
      description: Określa fizyczny styl i kształt sprzętu trackera.
    tracking_metrics:
      name: Wskaźniki śledzenia
      description: Określa dane dotyczące zdrowia i kondycji monitorowane przez produkt,
        np. sen, kroki
    tracking_purpose:
      name: Cel śledzenia
      description: Określa przeznaczenie lokalizatorów GPS, np. monitorowanie aktywów
        lub monitorowanie zwierząt domowych
    tractor_accessories_included:
      name: Akcesoria do ciągnika w zestawie
      description: Określa dodatkowe funkcje dostarczane z ciągnikiem, np. zestaw
        do mulczowania lub lemiesz śnieżny
    trade_show_display_features:
      name: Charakterystyka stoiska targowego
      description: Identyfikuje szczególne cechy ekspozycji targowych, np. ekran dotykowy
        lub oświetlenie
    trading_card_packaging:
      name: Opakowanie karty kolekcjonerskiej
      description: Określa sposób pakowania kart kolekcjonerskich, np. blister lub
        booster
    traffic_control_device_features:
      name: Charakterystyka urządzenia sterującego ruchem
      description: Określa unikatowe funkcje elementów kontroli ruchu, np. składane
        lub z obciążoną podstawą
    trail_camera_design:
      name: Konstrukcja kamery terenowej
      description: Określa rodzaj kamery myśliwskiej, np. standardowa lub komórkowa
    trailer_type:
      name: Typ naczepy
      description: Określa konstrukcję lub styl przyczepy, np. otwarta lub zamknięta
    training_data_requirements:
      name: Wymagania dotyczące danych szkoleniowych
      description: Określa rodzaj i jakość danych potrzebnych do efektywnego szkolenia
        mechanizmów sztucznej inteligencji lub uczenia maszynowego, np. oznaczone
        dane
    trampoline_design:
      name: Projekt trampoliny
      description: Określa konstrukcję trampoliny, np. bez sprężyn lub sprężyna śrubowa
    transceiver_form_factor:
      name: Współczynnik formy nadajnika-odbiornika
      description: Określa standard modułu fizycznego nadajnika-odbiornika sieciowego
        (np. SFP, QSFP28).
    transcriber/dictation_system_features:
      name: Charakterystyka transkrybera i systemu dyktowania
      description: Określa szczególne cechy transkryberów lub systemów dyktowania,
        np. obsługiwane przez sztuczną inteligencję lub redukcja szumów
    transfer_aid_type:
      name: Typ pomocy transferowej
      description: Klasyfikuje rodzaj pomocy, odróżniając sztywne płyty od elastycznych
        arkuszy i mat wspomaganych powietrzem.
    transfer_board_shape:
      name: Kształt deski transferowej
      description: Określa profil geometryczny deski lub arkusza, który wpływa na
        ścieżkę transferu i kompatybilność z różnymi wysokościami siedzisk lub stołów.
    transfer_boards_surface_type:
      name: Typ powierzchni płyt transferowych
      description: Określa teksturę powierzchni desek transferowych, np. wyściełana,
        gładka
    transfer_paper_technique:
      name: Technika stosowania papieru transferowego
      description: Określa metodę stosowaną w przypadku papieru transferowego, np.
        druk atramentowy lub naklejanie na gorąco
    transmission_type:
      name: Typ przekładni
      description: Określa rodzaj skrzyni biegów w pojazdach lub części, np. ręczna
        lub automatyczna
    transmitter_form_factor:
      name: Format nadajnika
      description: Klasyfikuje fizyczny styl lub obudowę jednostki nadajnika, aby
        pomóc kupującym szybko znaleźć formę odpowiadającą ich zastosowaniu
    transport_type:
      name: Typ transportu
      description: Określa rodzaj transportu publicznego, na który ważny jest bilet
        lub karnet.
    trash_can_features:
      name: Charakterystyka pojemnika na śmieci
      description: Określa szczególne cechy pojemników na śmieci, np. kontrola zapachu
        lub pedał nożny
    travel_pillow_features:
      name: Cechy poduszki podróżnej
      description: Wymienia specjalne cechy funkcjonalne, akcesoria lub ulepszenia
        konstrukcyjne poduszki podróżnej.
    travel_pillow_shape:
      name: Kształt poduszki podróżnej
      description: 'Opisuje fizyczny kontur poduszek podróżnych, np. J-kształtny '
    tray_compatibility:
      name: Kompatybilność z nakładką
      description: Określa styl nakładki wybielającej lub ustnika, do którego pasuje
        etui.
    treatment_area:
      name: Obszar poddawany zabiegowi
      description: Określa część ciała, na którą ma być ukierunkowany produkt, zazwyczaj
        w przypadku produktów do masażu, np. plecy, szyja
    treatment_method:
      name: Metoda leczenia
      description: Opisuje mechanizm lub technologię stosowania produktu w celu usunięcia
        zmiany (np. krioterapia, kwas chemiczny, plaster mikroigłowy).
    treatment_modes:
      name: Tryby zabiegów
      description: Wymienia tryby funkcjonalne obsługiwane przez urządzenie (np. HR,
        SHR, SR).
    treatment_objective:
      name: Cel leczenia
      description: Określa problem rozwiązywany przez produkt, zazwyczaj w przypadku
        artykułów higieny osobistej, np. chrapanie, gorączka
    treatment_target_area:
      name: Obszar docelowy zabiegu
      description: Wskazuje, czy produkt jest przeznaczony do rzęs, brwi, czy obu
        tych obszarów.
    treatment_texture:
      name: Konsystencja środka
      description: Określa konsystencję produktów pielęgnacyjnych, zazwyczaj kremów
        na wysypkę pieluszkową, np. gęsty, proszek
    treatment_type:
      name: Typ leczenia
      description: Określa metodę leczenia, zazwyczaj w przypadku preparatów przeciw
        wypadaniu włosów, np. laser, miejscowo
    tree_stand_material:
      name: Materiał ambony
      description: Określa, z czego wykonany jest stojak na drzewo, np. tworzywo sztuczne
        lub metal
    trellis_design:
      name: Projekt kraty
      description: Określa wzór kraty w ogrodzeniu lub barierze, np. kwadrat, romb
    tricycle_design:
      name: Konstrukcja roweru trójkołowego
      description: Określa styl napędzania roweru trójkołowego, np. stojący lub leżący
    tricycle_propulsion_type:
      name: Rodzaj napędu roweru trójkołowego
      description: Określa sposób prowadzenia roweru trójkołowego, na przykład napęd
        ręczny lub z napęd przedni
    trip_type:
      name: Typ wycieczki
      description: Określa rodzaj wyzwalacza w wyłączniku, np. niewymienny
    tripod/monopod_attachment_type:
      name: Typ mocowania statywu trójnożnego/jednonożnego
      description: Określa rodzaj połączenia akcesoriów statywu lub monopodu, np.
        3/8 lub uniwersalne
    tripod/monopod_head_type:
      name: Typ głowicy statywu trójnożnego/jednonożnego
      description: Określa mechanizm głowic statywu/monopodu, np. przekładnia lub
        gimbal
    tripod_handle_type:
      name: Typ uchwytu statywu trójnożnego
      description: Określa funkcje uchwytów statywu, np. wielofunkcyjne, chwyt pistoletowy
    trophy_design:
      name: Projekt trofeum
      description: Określa szczególny styl lub kształt trofeum, np. puchar lub gwiazda
    truck_type:
      name: Typ wózka
      description: Określa rodzaj ciężarówki, np. wywrotka lub ciężarówka z platformą
    tube_component:
      name: Komponent rury
      description: Określa rodzaj konstrukcji wspierającej we wzmacniaczach muzycznych,
        np. obudowa, stojak
    tube_configuration:
      name: Konfiguracja rury
      description: Określa rozmieszczenie konstrukcji wspierających we wzmacniaczu
        muzycznym, np. pojedyncze lub dopasowane
    tuner_design:
      name: Konstrukcja tunera
      description: Określa styl stroików elektronicznych do instrumentów muzycznych,
        np. na klips lub pedał
    tuner_type:
      name: Typ tunera
      description: Określa rodzaj odbieranej częstotliwości radiowej, np. AM/FM lub
        radio satelitarne
    tuning_fork_design:
      name: Projekt kamertonu
      description: Określa szczególną konstrukcję kamertonu, np. obciążony lub nieobciążony
    tuning_fork_frequency:
      name: Częstotliwość kamertonu
      description: Określa częstotliwość kamertonu, np. 128 Hz lub 256 Hz
    tuning_modes:
      name: Tryby strojenia
      description: Określa szczególne ustawienia instrumentu dla stroika elektronicznego,
        np. gitara lub skrzypce
    tuning_pitch:
      name: Tonacja strojenia
      description: Określa tonację strojenia instrumentu, np. C# lub Ab
    tuning_range:
      name: Zakres strojenia
      description: Określa zakres dostępnych opcji strojenia, np. standardowe lub
        otwarte
    tv_broadcast_standards_supported:
      name: Obsługiwane standardy transmisji telewizyjnej
      description: Lista określonych standardów transmisji telewizyjnej lub kablowej/satelitarnej,
        które karta lub adapter może dekodować lub odbierać.
    uc_platform_certification:
      name: Certyfikacja platformy UC
      description: Identyfikuje platformy ujednoliconej komunikacji lub spotkań, dla
        których dane urządzenie jest oficjalnie certyfikowane.
    ultrasound_probe_type:
      name: Typ sondy ultradźwiękowej
      description: Identyfikuje cechy konstrukcyjne sondy dostarczanej z monitorem
        (np. wodoodporna, wewnętrzna).
    undershirt_style:
      name: Styl podkoszulka
      description: Określa wzór lub krój podkoszulka, np. okrągły dekolt lub dekolt
        w serek
    underwear_style:
      name: Styl bielizny
      description: Określa wzór i krój bielizny, np. bikini lub figi modelujące
    units_of_measurement:
      name: Jednostki miary
      description: Określa system miar właściwy dla produktu, np. milimetry (mm),
        stopnie Fahrenheita (°F)
    update_frequency:
      name: Częstotliwość aktualizacji
      description: Określa regularność aktualizacji oprogramowania lub danych, np.
        w czasie rzeczywistym, co roku
    upholstery_color:
      name: Kolor tapicerki
      description: Określa kolor tapicerki produktu, np. czerwony lub beżowy
    upholstery_material:
      name: Materiał tapicerki
      description: Określa materiał, z którego wykonano tapicerkę, np. skóra lub aksamit
    upholstery_pattern:
      name: Wzór tapicerki
      description: Określa wizualny wzór na tkaninie meblowej, na przykład paski lub
        kratka
    uplink_port_type:
      name: Typ portu uplink
      description: Określa złącze uplink o najwyższej prędkości obecne na przełączniku
        (np. SFP+, QSFP28, 10GBase-T).
    ups_topology:
      name: Topologia UPS
      description: Wskazuje wewnętrzne podejście projektowe wykorzystywane przez zasilacz
        UPS do kondycjonowania i zasilania (np. tryb gotowości, line-interactive,
        online).
    urinal_mounting_type:
      name: Typ montażu pisuaru
      description: Określa sposób montażu pisuaru, np. montowany na ścianie lub montowany
        na podłodze
    usage_conditions:
      name: Warunki użytkowania
      description: Określa, czy produkt nadaje się do użycia w suchych lub mokrych
        warunkach, zazwyczaj w przypadku maszynek do golenia
    usage_environment:
      name: Środowisko użytkowania
      description: Określa, gdzie produkt do opalania ma być używany.
    usage_frequency:
      name: Częstotliwość użytkowania
      description: Określa zalecaną częstość stosowania produktu, np. codziennie lub
        co tydzień
    usage_type:
      name: Typ użytkowania
      description: Określa zamierzony cykl użycia produktu, np. do wielokrotnego użytku,
        do wielokrotnego napełniania
    usb_connector_type:
      name: Typ złącza USB
      description: Określa fizyczne złącze(a) USB znajdujące się w urządzeniu, służące
        do przesyłania danych i/lub zasilania.
    usb_standard:
      name: Standard USB
      description: Określa wersję złącza USB dla urządzeń elektronicznych, np. USB
        2.0 lub USB 3.1 Gen 1
    user_type:
      name: Typ użytkownika
      description: Określa docelowego użytkownika oprogramowania, np. osoba fizyczna
        lub małe przedsiębiorstwo
    utility/maintenance_task_type:
      name: Typ zadania użyteczności/konserwacji
      description: Określa kategorię zadania wykonywanego przez oprogramowanie, np.
        czyszczenie dysku lub optymalizacja systemu
    uv_blocking_class:
      name: Klasa blokowania promieniowania UV
      description: Wskazuje poziom ochrony przed promieniowaniem UV wbudowany w soczewkę
        kontaktową zgodnie z normami ISO.
    uv_protection:
      name: Ochrona przed promieniowaniem UV
      description: Określa zdolność produktu do blokowania promieni UV, zazwyczaj
        w przypadku okularów przeciwsłonecznych, np. UV400
    uva_protection_grade:
      name: Stopień ochrony UVA
      description: Wskazuje ocenę ochrony UVA produktu, często wyrażaną jako stopnie
        PA.
    vacuum_air_filtering_technology:
      name: Technologia próżniowego filtrowania powietrza
      description: Określa rodzaj filtracji powietrza stosowanej w odkurzaczach, np.
        HEPA lub PET
    valve_type:
      name: Typ zaworu
      description: Określa rodzaj wentyla w częściach rowerowych, np. Presta, Schrader
    van_type:
      name: Typ furgonetki
      description: Określa różne rodzaje furgonetek, np. furgonetka osobowa lub furgonetka
        po przeróbkach
    vaping_style:
      name: Styl wapowania
      description: 'Określa technikę wapowania papierosów elektronicznych, np. bezpośrednio
        do płuc, z ust do płuc '
    varnish/finish_application:
      name: Zastosowanie lakieru/wykończenia
      description: Określa właściwe obszary zastosowania lakieru lub wykończenia,
        np. ściany lub drzwi
    vase_shape:
      name: Kształt wazonu
      description: Opisuje geometryczną lub organiczną formę wazonu, np. okrągła lub
        butelkowa
    vcr_configuration:
      name: Konfiguracja magnetowidu
      description: Określa, czy urządzenie jest samodzielnym magnetowidem, czy urządzeniem
        typu combo z dodatkowymi napędami lub tunerami.
    vdi_protocol_support:
      name: Obsługa protokołu Vdi
      description: Określa obsługiwane protokoły infrastruktury wirtualnego pulpitu
        (VDI), np. PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Charakterystyka alarmu/blokady pojazdu
      description: Określa unikatowe cechy systemu bezpieczeństwa pojazdu, np. zdalne
        uruchamianie lub odporny na warunki atmosferyczne
    vehicle_application_area:
      name: Obszar zastosowań pojazdów
      description: Określa część pojazdu, do której produkt ma zastosowanie, np. tapicerka
        lub części zewnętrzne
    vehicle_audio_system_features:
      name: Charakterystyka systemu audio pojazdu
      description: Określa szczególne cechy systemu audio pojazdu, np. podbicie basów
        lub wyświetlacz LED
    vehicle_braking_features:
      name: Charakterystyka układu hamulcowego
      description: Określa konkretne cechy części układu hamulcowego pojazdu, np.
        odporny na korozję lub nawiercony
    vehicle_cleaning_item_features:
      name: Charakterystyka przedmiotów do czyszczenia pojazdów
      description: Określa korzyści płynące ze stosowania elementów do czyszczenia
        i mycia pojazdów, np. większa oszczędność paliwa czy wysoki połysk
    vehicle_decor_features:
      name: Charakterystyka elementów ozdobnych do pojazdów
      description: Określa cechy elementów ozdobnych pojazdu, np. odporny na promieniowanie
        UV lub wodoszczelny
    vehicle_drive/handling_features:
      name: Charakterystyka napędu/obsługi pojazdu
      description: Określa cechy części do pojazdów silnikowych, zazwyczaj w skrzyni
        biegów oraz układzie napędowym, holowniczym i kołowym, np. wysoka efektywność,
        odporność na wysokie temperatury
    vehicle_engine/part_features:
      name: Charakterystyka części/silnika pojazdu
      description: Określa unikatowe cechy części silnikowych, np. oszczędność paliwa
        lub usprawnienie działania
    vehicle_engine_features:
      name: Charakterystyka silnika pojazdu
      description: Określa szczególne cechy silnika pojazdu, np. wysoka efektywność
        lub oszczędność paliwa
    vehicle_exhaust_type:
      name: Rodzaj układu wydechowego pojazdu
      description: Określa rodzaj układu wydechowego w pojeździe, np. tylna oś lub
        od turbosprężarki
    vehicle_features:
      name: Charakterystyka pojazdu
      description: Określa szczególne cechy lub wyposażenie pojazdu, np. podgrzewane
        fotele lub system nawigacji
    vehicle_floor_configuration:
      name: Konfiguracja podłogi pojazdu
      description: Określa konstrukcję i układ podłogi pojazdu komunikacji zbiorowej,
        np. niskopodłogowy lub częściowo niskopodłogowy
    vehicle_fluid_features:
      name: Charakterystyka płynów eksploatacyjnych pojazdu
      description: Określa specjalne właściwości płynów eksploatacyjnych, np. płyny
        chłodzące lub płyny biodegradowalne
    vehicle_fluid_type:
      name: Rodzaj płynów eksploatacyjnych pojazdu
      description: Określa rodzaj płynu używanego do konserwacji pojazdu, np. koncentrat
        lub rozcieńczony
    vehicle_frame/body_features:
      name: Charakterystyka karoserii/ramy pojazdu
      description: Określa szczególne cechy części nadwozia pojazdu, np. malowane
        lub chromowane wykończenie
    vehicle_mirror_design:
      name: Konstrukcja lusterka samochodowego
      description: Określa cechy konstrukcji lusterek samochodowych, np. wysuwane
        lub składane
    vehicle_mirror_features:
      name: Charakterystyka lusterka samochodowego
      description: Określa szczególne cechy lusterek samochodowych, np. automatycznie
        przyciemniane lub podgrzewane
    vehicle_mirror_type:
      name: Rodzaj lusterka samochodowego
      description: Określa konkretny rodzaj lusterka samochodowego, np. wsteczne lub
        boczne
    vehicle_mounting_location:
      name: Miejsce montażu w pojeździe
      description: Określa obszar w pojeździe, w którym ma zostać zainstalowany uchwyt.
    vehicle_oil_features:
      name: Charakterystyka oleju w pojeździe
      description: Określa unikatowe właściwości oleju silnikowego, np. ochronę przeciwzużyciowa
        lub wysoka skuteczność filtracji
    vehicle_paint_type:
      name: Typ lakieru pojazdu
      description: Określa kategorię lakieru samochodowego, np. zestaw lakierniczy
        lub lakiery do karoserii
    vehicle_placement:
      name: Lokalizacja pojazdów
      description: Określa, gdzie na rowerze można umieścić produkt, np. rama, przód
    vehicle_seating_features:
      name: Charakterystyka foteli i siedzeń
