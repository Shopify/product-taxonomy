        pionowa, automatyczna czteropunktowa).
    kiln_features:
      name: Cechy pieca
      description: Określa możliwości funkcjonalne i cechy konstrukcyjne pieca.
    kiln_loading_style:
      name: Sposób załadunku pieca
      description: Określa metodę umieszczania przedmiotów w komorze pieca i ich wyjmowania.
    kit_construction_type:
      name: Typ konstrukcji zestawu
      description: Określa materiał, z którego wykonana jest powierzchnia do skakania
        na trampolinie, np. syntetyczny, polipropylen
    kitchen/dining_furniture_items_included:
