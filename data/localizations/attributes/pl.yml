    puzzle_theme:
      name: Temat puzzle
      description: Określa główny temat lub motyw puzzli, np. zwierzęta lub kosmos
    puzzle_type:
      name: Rodzaj puzzli
      description: Określa konkretny rodzaj puzzli, np. 3D lub łamigłówka
    quiver_style:
      name: Styl kołczanu
      description: Określa styl kołczanu w łucznictwie, np. na biodro, na plecy
    rack_design:
      name: Konstrukcja szafy
      description: Określa układ lub strukturę stojaka na naczynia szklane, np. otwarty
