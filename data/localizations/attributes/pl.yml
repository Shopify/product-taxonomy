      description: Określa główną metodę, za pomocą której element elektroniczny lub
        płytka jest mocowana do PCB, panelu, obudowy lub szyny
    component_output_type:
      name: Typ wyjścia komponentowego
      description: Określa typ sygnału wyjściowego elementów elektronicznych, np.
        UART lub analogowy
    component_package_type:
      name: Typ pakietu składników
      description: Określa obudowę lub opakowanie komponentów elektronicznych, np.
        SDM (urządzenie do montażu powierzchniowego), DIP (pakiet Dual In-line)
    component_size_code:
      name: Kod rozmiaru komponentu
      description: Określa standardowe oznaczenie rozmiaru SMD lub przewlekanego (np.
        0603, 0805) stosowane dla obudowy kondensatora
    component_tolerance:
      name: Tolerancja komponentu
      description: Określa dopuszczalne odchylenie od wartości nominalnej (rezystancji,
        pojemności, indukcyjności, częstotliwości itp.), wyrażone w procentach
    components_included:
      name: Dołączone komponenty
      description: Wymienia elementy sprzętowe dołączone do zestawu startowego
    compression_circuit_type:
      name: Typ układu kompresji
      description: Opisuje zastosowaną technologię redukcji wzmocnienia (np. VCA,
