    jewelry_finding_type:
      name: Rodzaj zapięcia do biżuterii
      description: Określa konkretny element używany w produkcji biżuterii, np. kopułkę
        z koralików lub kółko montażowe
    jewelry_material:
      name: Materiał biżuterii
      description: Określa główny materiał, z którego wykonano wyroby jubilerskie,
        np. złoto lub emalia
    jewelry_project_type:
      name: Typ projektu biżuterii
      description: Określa rodzaj projektu jubilerskiego, np. wykonanie naszyjnika
        lub owijanie drutem
    jewelry_set_type:
      name: Typ zestawu biżuterii
      description: Określa rodzaj biżuterii w zestawie do wyrobu biżuterii, np. pierścionek
