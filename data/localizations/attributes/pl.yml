      description: Określa standardy nadawania telewizyjnego lub modulacji (satelitarne,
        kablowe, naziemne), które produkt może dekodować lub obsługiwać
    broadhead/field_point_material:
      name: Materiał grotów do strzał
      description: Określa materiał używany w grotach do strzał, np. stal nierdzewna
        lub stal węglowa
    broadhead_design:
      name: Konstrukcja grotu strzały
      description: Określa typ konstrukcji grotu używanego w łucznictwie, np. ostrze
        stałe lub ostrze składane
    brush_application:
      name: Zastosowanie pędzla
      description: Określa docelowe zastosowanie pędzli artystycznych, np. do akryli
        lub do akwareli
    brush_end_type:
      name: Typ końcówki pędzla
      description: Opisuje konstrukcję zakończeń pędzla (np. jednostronne, dwustronne,
        chowane)
    brush_head_shape:
      name: Kształt główki szczoteczki
      description: Określa ogólną formę główki szczoteczki, która wpływa na zasięg
        i wygodę użytkowania
    brush_head_usage:
      name: Zastosowanie główki szczoteczki
      description: Określa oczekiwane zastosowanie główek szczoteczki, zazwyczaj w
        kosmetyce, np. czyszczenie dogłębne, złuszczanie
    brush_material:
      name: Materiał pędzla
      description: Określa rodzaj materiału, z którego wykonana jest szczoteczka,
        np. silikon lub tworzywo sztuczne
    brush_size:
      name: Rozmiar szczotki
      description: Określa rozmiar pędzla artystycznego, np. 0, 12
    brush_type:
      name: Typ szczotki
      description: Określa materiał, z którego wykonany jest pędzel do golenia, np.
        syntetyczne lub sierść borsuka
    brushing_mode:
      name: Tryb szczotkowania
      description: Wymienia wstępnie ustawione programy czyszczenia, przez które szczoteczka
        do zębów może przechodzić (np. czyszczenie, wrażliwa, wybielanie).
    bug_type:
      name: Typ insekta
      description: Określa gatunki owadów, przeciwko którym skierowany jest produkt,
        np. mrówki lub szerszenie
    building_board_material:
      name: Materiał płyty budowlanej
      description: Określa rodzaj materiału, z którego wykonane są płyty konstrukcyjne,
        np. sklejka lub cement
    building_consumable_form:
      name: Budowanie formy użytkowej
      description: Określa formę szpachli, np. płyn lub proszek
    building_toy_type:
      name: Materiał zabawki do budowania
      description: Określa kategorię zabawek do budowania, np. zestawy konstrukcyjne
        STEM, płytki magnetyczne
    bulb_cap_type:
      name: Typ nasadki żarówki
      description: Określa typ oprawy lub podstawy żarówki, np. E12, GU10
    bulb_shape:
      name: Kształt żarówki
      description: Określa kształt produktów oświetleniowych, np. tuba, spirala
    bulb_size:
      name: Rozmiar żarówki
      description: Określa wielkość żarówek, np. A19, C7
    bulb_type:
      name: Typ żarówki
      description: Określa rodzaj żarówki stosowanej w produktach oświetleniowych,
        np. LED, halogen
    bulldozer_blade_type:
      name: Typ lemiesza spycharki
      description: Określa styl lemiesza spycharki, np. kątowy lub prosty (lemiesz
        typu S)
    bullet_protection_level:
      name: Poziom ochrony przed pociskami
      description: Określa poziom kuloodporności kamizelki, np. IIA, IV
    bullhorn_features:
      name: Charakterystyka megafonu
      description: Określa unikatowe funkcje megafonu, np. nagrywanie głosu lub funkcja
        syreny
    bullion_form:
      name: Forma kruszcu
      description: Określa rodzaj sztabek metali szlachetnych, np. okrągła lub sztabka
    bungee_arm_mechanism:
      name: Mechanizm ramienia bungee
      description: Określa technologię używaną do podtrzymywania i prowadzenia przewodu
        myszy (np. ramię sprężynowe, elastyczna linka, zawieszenie magnetyczne)
    burner_material:
      name: Materiał palnika
      description: Określa materiał użyty do budowy palnika do kuchenki lub grilla,
        np. żeliwo lub stal nierdzewna
    butt_cap_color:
      name: Kolor nasadki
      description: Określa kolor nasadki wędki, np. czarny lub niebieski
    butt_cap_material:
      name: Materiał nasadki
      description: Określa skład dolnego końca rękojeści na artykułach sportowych,
        np. EVA (etylen-octan winylu), korek
    butt_cap_pattern:
      name: Wzór nasadki
      description: Określa wzór lub motyw na zaślepce końcowej wędki, np. kamuflaż
        lub motyw kwiatowy
    button/snap_closure_type:
      name: Zapięcie na guziki/zatrzaski
      description: Określa rodzaj zapięcia, np. magnetyczne lub niewidoczne
    button_surface_profile:
      name: Profil powierzchni przycisku
      description: Opisuje fizyczny kontur powierzchni nacisku przycisku, wpływający
        na ergonomię i wygląd elementu
    cabinet_type:
      name: Typ szafki
      description: Określa projekt i formę gier zręcznościowych, np. bartop lub mini
        arcade
    cable_form_factor:
      name: Format przewodu
      description: Opisuje fizyczny styl lub kształt wykonania przewodu
    cable_housing_material:
      name: Materiał obudowy kabla
      description: Określa materiał, z którego wykonana jest obudowa kabla, np. nylon
        lub PVC
    cable_jacket_rating:
      name: Klasyfikacja powłoki przewodu
      description: Określa odporność środowiskową lub klasę bezpieczeństwa zewnętrznej
        powłoki kabla (np. plenum, do bezpośredniego zakopu, odporna na UV)
    cable_shielding:
      name: Ekranowanie kabla
      description: Określa rodzaj zabezpieczenia stosowanego w kablach, np. plecionka
        (STP), folia (FTP)
    cable_style:
      name: Styl przewodu
      description: Opisuje fizyczny sposób wykonania przewodu (np. pleciony, płaski,
        spiralny, zwijany)
    cable_tie_type:
      name: Typ opaski kablowej
      description: Określa styl konstrukcji lub mechanizm zapinania opaski kablowej
    cable_tray_style:
      name: Styl korytka kablowego
      description: Opisuje konstrukcyjny typ odcinka korytka kablowego, który określa
        sposób wentylacji i podparcia przewodów
    cable_type:
      name: Typ kabla
      description: Klasyfikuje rodzaje linek, zwykle stosowane w sprzęcie rowerowym,
        np. linka hamulcowa, linka przerzutki
    cache_level:
      name: Poziom pamięci podręcznej
      description: Wskazuje miejsce pamięci podręcznej w hierarchii (np. L1, L2, L3),
        co wpływa na jej rozmiar, opóźnienia i bliskość względem rdzeni procesora
    caffeine_content:
      name: Zawartość kofeiny
      description: Określa ilość kofeiny obecnej w produkcie, np. bezkofeinowy lub
        o niskiej zawartości kofeiny
    cage_type:
      name: Typ klatki
      description: Określa rodzaj klatki bezpieczeństwa w pojazdach, np. pełna klatka
        lub półklatka
    calculator_accessory_type:
      name: Rodzaj akcesorium do kalkulatorów
      description: Określa rodzaj akcesorium kalkulatora, np. rolka papieru lub adapter
        do drukarek
    calculator_features:
      name: Charakterystyka kalkulatora
      description: Określa funkcje kalkulatora, np. kalkulacja kredytowa lub analiza
        statystyczna
    calendar/organizer_features:
      name: Charakterystyka kalendarza/organizera
      description: Określa szczególne cechy kalendarzy lub organizerów, np. okna czasowe
        spotkań lub oznaczone święta
    calendar_format:
      name: Format kalendarza
      description: Określa ramy czasowe kalendarza, np. dzienny lub miesięczny
    calibration_sensor_type:
      name: Typ czujnika kalibracyjnego
      description: Określa zastosowaną technologię sprzętową lub format konstrukcyjny
        kalibratora
    call_blocking_method:
      name: Metoda blokowania połączeń
      description: Określa, w jaki sposób urządzenie identyfikuje i blokuje niechciane
        połączenia
    caller_id_compatibility:
      name: Kompatybilność identyfikacji numeru dzwoniącego
      description: Stwierdza, czy telefon obsługuje usługi identyfikacji numeru dzwoniącego
        zapewniane przez sieć telefoniczną
    caller_id_standard_compatibility:
      name: Kompatybilność ze standardem identyfikacji dzwoniącego
      description: Wskazuje, które formaty sygnalizacji Caller ID urządzenie potrafi
        dekodować
    cam_system:
      name: System krzywki
      description: Określa system krzywek używany w sprzęcie łuczniczym, np. hybrydowy,
        pojedynczy
    camera_attachment:
      name: Mocowanie aparatu
      description: Określa część kamery lub akcesorium, np. wizjer kątowy lub adapter
        okularu
    camera_button/knob_type:
      name: Typ przycisku/pokrętła aparatu
      description: Określa przycisk lub pokrętło na kamerze, np. przycisk zwalniający
        migawkę lub pokrętło wyboru trybu
    camera_control_type:
      name: Typ sterowania aparatem
      description: Określa rodzaj pilota do kamery, np. przełącznik zdalny lub wyzwalacz
        migawki
    camera_display_technology:
      name: Technologia wyświetlania aparatu
      description: Określa technologię ekranu kamery, np. OLED, Super AMOLED
    camera_features:
      name: Charakterystyka kamery
      description: Określa szczególne możliwości kamery, np. stabilizacja obrazu lub
        wykrywanie twarzy
    camera_gear_type:
      name: Typ sprzętu fotograficznego
      description: Określa konkretny rodzaj osprzętu kamery, np. napęd kamery lub
        śledzenie ostrości
    camera_hd_type:
      name: Typ kamery HD
      description: Określa jakość wideo oferowaną przez kamerę, np. Quad HD lub 8K
        Ultra HD
    camera_lens_material:
      name: Materiał obiektywu kamery
      description: Określa skład kamery lub obiektywu do kamer wideo, np. szkło lub
        tworzywo sztuczne
    camera_lens_type:
      name: Typ obiektywu aparatu
      description: Określa rodzaj obiektywu kamery, np. makro lub teleobiektyw
    camera_mounting_type:
      name: Typ mocowania aparatu
      description: Określa sposób mocowania kamery, np. statyw lub na klips
    camera_sensor_type:
      name: Typ czujnika aparatu
      description: Określa typ czujnika w kamerach lub optyce, np. CMOS, CCD
    camera_shape:
      name: Kształt aparatu
      description: Określa styl projektowania kamer bezpieczeństwa, np. pocisk lub
        pudełko
    candle_kit_items_included:
      name: W zestawie elementy zestawu świec
      description: Określa elementy wchodzące w skład zestawu świec, np. knoty świecowe
        lub tygiel do topienia wosku
    candle_material:
      name: Materiał świecy
      description: Określa rodzaj wosku lub materiału użytego w świecy, np. parafina
        lub wosk pszczeli
    candle_shape:
      name: Kształt świecy
      description: Określa kształt świecy, np. cylindryczny lub kwadratowy
    candle_type:
      name: Typ świecy
      description: Określa konstrukcję świec, np. stożkowe lub do herbaty
    cane_base_design:
      name: Konstrukcja podstawy laski
      description: Określa konfigurację podstawy podpierającej laski
    canned_meat_variety:
      name: Odmiana konserwy mięsnej
      description: Określa odmiany konserw mięsnych, np. indyk czy szynka
    canopy_color:
      name: Kolor baldachimu
      description: Określa odcień czaszy parasola lub parasolki, np. czarny
    canopy_material:
      name: Materiał baldachimu
      description: Określa materiał używany do produkcji parasoli lub zadaszeń, np.
        bawełna lub winyl
    canopy_pattern:
      name: Wzór baldachimu
      description: Określa motyw wizualny na czaszach parasoli lub parasolek, np.
        kratka lub sztuka
    cantilever_material:
      name: Materiał wspornika igły
      description: Wskazuje materiał wspornika utrzymującego igłę, co wpływa na zdolność
        śledzenia rowka i charakter brzmienia
    canvas_finish:
      name: Wykończenie płótna
      description: Określa, czy płótno jest gotowe do malowania, np. zagruntowane,
        niezagruntowane
    canvas_material:
      name: Materiał płócienny
      description: Określa rodzaj tkaniny, z której wykonano płótno, np. bawełna lub
        len
    canvas_texture:
      name: Tekstura płótna
      description: Określa wrażenia dotykowe powierzchni płótna, np. gładkie lub średnioziarniste
    capacitance_tolerance:
      name: Tolerancja pojemności
      description: Określa dopuszczalne odchylenie rzeczywistej pojemności od wartości
        nominalnej, wyrażone w procentach
    capacitor_application:
      name: Zastosowanie kondensatora
      description: Oznacza główne, docelowe przeznaczenie lub klasę zastosowania kondensatora
        (np. rozruchowy/pracy silnika, audio, tłumiący „snubber”)
    capacitor_polarity:
      name: Polaryzacja kondensatora
      description: Określa, czy kondensator jest spolaryzowany, niespolaryzowany lub
        bipolarny, co wpływa na sposób montażu i możliwe miejsca zastosowania w układzie
    car_freshener_fragrance:
      name: Zapach odświeżacza samochodowego
      description: Określa zapach samochodowych odświeżaczy powietrza, np. lawendowy
        lub nowy samochód
    car_seat_installation:
      name: Montaż fotelika samochodowego
      description: Określa metodę instalacji dziecięcego fotelika samochodowego, np.
        zatrzask lub pas bezpieczeństwa
    car_seat_orientation:
      name: Orientacja fotelika samochodowego
      description: Określa kierunek, w którym zwrócony jest dziecięcy fotelik samochodowy,
        np. tyłem lub przodem do kierunku jazdy
    car_type:
      name: Typ samochodu
      description: Określa kategorię pojazdu, np. SUV lub sedan
    carabiner_gate_type:
      name: Typ zasuwy zatrzaśnika
      description: Określa typ zapięcia w karabinkach wspinaczkowych, np. zapięcie
        zakręcane, zapięcie zatrzaskowe
    carabiner_shape:
      name: Kształt karabińczyka
      description: Określa formę karabinków używanych we wspinaczce, np. HMS lub gruszka
    card/adapter_installation:
      name: Instalacja karty/adaptera
      description: Określa sposób instalacji kart lub adapterów we/wy, np. wewnętrzny
        lub zewnętrzny
    card_attributes:
      name: Atrybuty karty
      description: Określa szczególne cechy kart kolekcjonerskich, np. foliowe lub
        holograficzne
    card_design:
      name: Projekt karty
      description: Określa formę karty miejsca lub odpowiedzi, np. złożona lub płaska
    card_format:
      name: Format karty
      description: Określa styl zaproszeń lub kart, np. płaskie lub złożone
    card_holder_design:
      name: Projekt uchwytu na kartę
      description: Określa styl lub formę uchwytu na karty miejsca, np. na klips lub
        stojący
    card_interface_type:
      name: Typ interfejsu karty
      description: Opisuje, czy czytnik komunikuje się za pomocą styków fizycznych,
        łączności bezstykowej RF, czy w obu trybach
    card_rechargeability:
      name: Możliwość doładowywania karty
      description: Wskazuje, czy saldo karty można ponownie doładować po wykorzystaniu
        początkowego salda wraz z podstawową metodą doładowania.
    card_size:
      name: Rozmiar karty
      description: Określa rozmiar kart okolicznościowych, np. A4 lub letter
    card_usage_status:
      name: Status zużycia karty
      description: Wskazuje, czy saldo karty telefonicznej zostało wykorzystane, czy
        pozostaje nienaruszone
    care_instructions:
      name: Instrukcja pielęgnacji
      description: Określa metody konserwacji produktu, np. pranie ręczne lub czyścić
        tylko na sucho
    carry_options:
      name: Opcje przenoszenia
      description: Określa dostępne metody przenoszenia przedmiotów, np. uchwyt lub
        pasek na ramię
    carrying_positions:
      name: Pozycje nośne
      description: Określa różne sposoby noszenia nosidełka, np. na biodrach lub tyłem
    carrying_type:
      name: Typ nośności
      description: Określa metodę przenoszenia produktu, np. do noszenia w ręku lub
        na ramię
    cart_design:
      name: Projekt koszyka
      description: Określa układ lub strukturę wózka medycznego, np. podwójny hak
        lub z podstawą
    cart_type:
      name: Typ koszyka
      description: Określa źródło zasilania wózka golfowego, np. elektryczne lub gazowe
    cartridge_authenticity:
      name: Autentyczność wkładu
      description: Określa, czy materiał eksploatacyjny jest oryginalny, kompatybilny,
        regenerowany lub ponownie napełniany
    cartridge_mounting_style:
      name: Styl mocowania wkładu
      description: Określa sposób mocowania wkładu do ramienia lub headshella (np.
        mocowanie półcalowe, P-mount), zapewniając zgodność mechaniczną
    cartridge_type:
      name: Typ wkładu
      description: Określa technologię głowicy w odtwarzaczach płyt gramofonowych,
        np. ceramiczna lub magnetyczna
    cartridge_yield_type:
      name: Typ wydajności wkładu
      description: Wskazuje klasę pojemności wkładu określoną przez producenta (np.
        standardowa, wysoka wydajność)
    case_color:
      name: Kolor obudowy
      description: Określa kolor opakowania produktu, np. przezroczysty lub biały
    case_pattern:
      name: Wzór obudowy
      description: Określa wzór lub motyw na opakowaniu produktu, np. kwiatowy lub
        geometryczny
    case_transparency_level:
      name: Poziom przejrzystości etui
      description: Wskazuje stopień przezroczystości etui.
    case_type:
      name: Typ sprawy
      description: Określa rodzaj etui na elektronikę i akcesoria, np. portfel lub
        styl książkowy
    cassette_adapter_type:
      name: Typ adaptera kasetowego
      description: Określa rodzaj adaptera do urządzeń kasetowych, np. 3,5 mm do kasety
        lub Bluetooth do kasety
    cat_age_group:
      name: Grupa wiekowa kotów
      description: Określa produkty właściwe dla poszczególnych etapów życia kota,
        np. kociątko, senior
    cat_litter_formula:
      name: Formuła żwirku dla kota
      description: Określa skład żwirku dla kota, np. granulki lub glina
    cbd_ingredients:
      name: Składniki CBD
      description: Określa konkretne składniki związane z CBD w produkcie, np. CBD
        o pełnym spektrum lub substancje słodzące
    celebration_type:
      name: Typ uroczystości
      description: Określa okazję, na którą dany produkt jest właściwy, np. Boże Narodzenie
        lub ukończenie szkoły
    cellular_capability:
      name: Obsługa łączności komórkowej
      description: Wskazuje, czy model obsługuje sieci komórkowe oprócz Wi-Fi
    cervix_height_suitability:
      name: Dopasowanie do wysokości szyjki macicy
      description: Wskazuje, dla jakiej wysokości szyjki macicy (np. niskiej, średniej,
        wysokiej) kubeczek jest optymalizowany, aby zapewnić prawidłowe dopasowanie
    chain_link_type:
      name: Typ ogniwa łańcucha
      description: Określa styl ogniwa łańcuszka do biżuterii, np. linka lub płaski
    chain_type:
      name: Typ łańcucha
      description: Określa typ łańcucha używanego w częściach do jednostek pływających,
        np. BBB lub High Test (HT)
    chair/sofa_features:
      name: Charakterystyka krzesła/sofy
      description: Określa unikatowe cechy mebli do siedzenia, np. odporność na plamy
        lub elektryczne odchylanie
    chair_features:
      name: Charakterystyka krzesła
      description: Określa specjalne funkcje fotela, np. funkcja masażu lub elektryczne
        odchylanie
    chalkboard_surface:
      name: Powierzchnia tablicy
      description: Określa rodzaj podłoża na tablicach kredowych, np. magnetyczne
        lub tradycyjne
    changing_mat/tray_features:
      name: Charakterystyka maty i blatu do przewijania
      description: Określa szczególne cechy przewijaków / mat do przewijania, np.
        wbudowane przegrody lub przenośność
    changing_mat_features:
      name: Charakterystyka maty do przewijania
      description: Określa szczególne cechy mat do przewijania niemowląt, np. wbudowane
        przegrody lub przenośne
    changing_tray_features:
      name: Charakterystyka blatu do przewijania
      description: Określa szczególne cechy mat do przewijania niemowląt, np. wbudowane
