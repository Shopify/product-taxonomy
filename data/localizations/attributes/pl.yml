    heating_pad_design:
      name: Konstrukcja poduszki grzewczej
      description: Określa fizyczny styl lub formę poduszki grzewczej.
    heating_pad_features:
      name: Cechy poduszki grzewczej
      description: Podkreśla specjalne funkcje lub udogodnienia wbudowane w poduszkę
        grzewczą.
    heating_speed:
      name: Szybkość podgrzewania
      description: Określa szybkość podgrzewania produktu, np. szybko, wolno
    heel_height_type:
