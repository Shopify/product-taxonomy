    instrument_color:
      name: Kolor instrumentu
      description: Określa kolor instrumentu muzycznego, np. czarny lub srebrny
    instrument_controller_type:
      name: Typ sterownika instrumentu
      description: Określa instrument muzyczny symulowany przez kontroler do gier,
