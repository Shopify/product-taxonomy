    rotation_direction:
      name: Kierunek obrotów
      description: Wskazuje, czy frezarka do paznokci obsługuje obroty w przód, w
        tył, czy oba kierunki.
    rotator_control_technology:
      name: Technologia sterowania wirnikiem
      description: Określa mechanizm sterowania rotorami antenowymi, np. ręczny lub
