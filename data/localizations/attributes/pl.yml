    bass_trombone_valve_wrap_style:
      name: Styl owinięcia zaworów puzonu basowego
      description: Określa konstrukcję owinięcia zaworów zastosowaną w instrumencie.
    bass_ukulele_string_type:
      name: Typ strun ukulele basowego
      description: Wskazuje ogólny typ strun użytych w ukulele basowym.
    bassinet_cradle_accessory_features:
      name: Funkcje akcesoriów do koszyka i kołyski
      description: Wyróżnia istotne cechy funkcjonalne lub jakościowe akcesoriów do
        kołysek i gondoli (np. wodoodporność, certyfikat organiczny, hipoalergiczność).
    bassoon_bell_material:
      name: Materiał czary fagotu
      description: Określa materiał czary fagotu.
    bassoon_bocal_system:
      name: System bocala fagotu
      description: Wariant/typ bocala używany w różnych systemach fagotu i zastosowaniach.
    bassoon_case_shell_type:
      name: Typ skorupy futerału fagotu
      description: Wskazuje konstrukcję ochronną futerału (miękka, twarda lub hybrydowa).
    bassoon_keywork_material:
      name: Materiał klawiszy fagotu
      description: Materiał i/lub powłoka mechaniki fagotu (klap i elementów mechanicznych).
    bassoon_model_level:
      name: Poziom modelu fagotu
      description: Wskazuje docelowy poziom zaawansowania muzyka dla danego fagotu.
    bassoon_performance_level:
      name: Poziom wykonawczy fagotu
      description: Wskazuje docelowy poziom użytkownika dla modelu fagotu.
    bassoon_reed_scrape_style:
      name: Styl skrobania stroika fagotu
      description: Wskazuje styl skrobania/profil stroika fagotu.
    bassoon_reed_thread_color:
      name: Kolor nici stroika fagotu
      description: Kolor nici wiążącej użytej w stroiku.
    bassoon_reed_type:
      name: Typ stroika fagotu
      description: Określa podtyp stroika fagotu kompatybilny z produktem (jeśli dotyczy).
    bassoon_system:
      name: System fagotu
      description: Określa system klap/tradycję konstrukcyjną zastosowaną w fagocie.
    bat_construction:
      name: Konstrukcja kija
      description: Wskazuje liczbę oddzielnych części lub połączonych sekcji tworzących
        korpus kija (np. jednoczęściowy, dwuczęściowy, hybrydowy), wpływających na
        elastyczność, tłumienie drgań i osiągi.
    bat_handle_size_compatibility:
      name: Kompatybilność rozmiaru uchwytu kija
      description: Wskazuje rozmiary uchwytu kijów krykietowych, do których pasuje
        grip.
    bath_book_interactive_features:
      name: Interaktywne funkcje książeczki kąpielowej
      description: Wbudowane funkcje zabawy/nauki zintegrowane z książeczką kąpielową.
    bath_bubble_machine_features:
      name: Funkcje maszyny do baniek kąpielowych
      description: Główne cechy funkcjonalne urządzenia do produkcji piany do kąpieli
        Beyond Basic Shopify .
    bath_crayon_features:
      name: Funkcje kredek do kąpieli
      description: Kluczowe funkcje użytkowe/bezpieczeństwa kredek do kąpieli.
    bath_squirter_spray_pattern:
      name: Wzór strumienia zabawki kąpielowej
      description: Opisuje sposób rozpylania wody przez zabawkę kąpielową po ściśnięciu
        lub aktywacji.
    bath_toy_molded_drain_design:
      name: Konstrukcja odpływu zabawki kąpielowej
      description: Wskazuje, czy zabawka została zaprojektowana tak, aby odprowadzać
        wodę i szybciej schnąć.
    bath_toy_water_play_function:
      name: Funkcja wodnej zabawy zabawki kąpielowej
      description: Określa główny mechanizm interakcji z wodą w zabawce.
    baton_size_standard:
      name: Standard rozmiaru pałeczki sztafetowej
      description: Klasyfikacja rozmiaru pałeczki sztafetowej używanej w zawodach
        (junior lub senior).
    battery_case_certification_standard:
      name: Certyfikaty/normy walizki na akumulatory
      description: Wymienia odpowiednie certyfikaty transportowe/bezpieczeństwa lub
        normy testowe spełniane przez walizkę do transportu/przechowywania akumulatorów.
    battery_case_interior_padding_material:
      name: Materiał wyściółki wnętrza walizki na akumulatory
      description: Określa główny materiał amortyzujący/wyściełający zastosowany wewnątrz
        walizki (jeśli dotyczy).
    battery_configuration:
      name: Konfiguracja baterii
      description: Wskazuje układ/kształt pakietu akumulatora (form factor), umożliwiając
        dopasowanie do ograniczonej przestrzeni w konkretnych replikach Airsoft.
    battery_group_size:
      name: Rozmiar grupowy akumulatora
      description: Standaryzowany rozmiar obudowy akumulatora (np. BCI Group 24F,
        H6) stosowany do dopasowania w wielu pojazdach.
    battery_polarity:
      name: Polaryzacja akumulatora
      description: Określa polaryzację/orientację zacisków (położenie bieguna dodatniego),
        co stanowi kluczowy parametr dopasowania dla wielu akumulatorów samochodowych
        i powersports.
    battery_standards_supported:
      name: Obsługiwane normy akumulatorów
      description: Określa normy oceny akumulatorów obsługiwane przez tester podczas
        testowania wydajności rozruchowej lub stanu akumulatora.
    battery_voltage_class:
      name: Klasa napięcia akumulatora
      description: Popularna klasa systemu napięciowego akumulatora EV używana do
        szybkiego filtrowania (np. systemy 400 V vs 800 V).
    batting_cage_components_included:
      name: Dołączono elementy tunelu baseballowego
      description: Wymienia poszczególne elementy dołączone do produktu, aby kupujący
        mogli sprawdzić, czy w zestawie znajduje się kompletny system lub określone
        części zamienne.
    batting_helmet_accessories_included:
      name: Akcesoria do kasku baseballowego w zestawie
      description: Wymienia ochronne lub dekoracyjne akcesoria dołączone do kasku
        baseballowego.
    batting_stuffing_form_factor:
      name: Forma watoliny i wypełnienia
      description: Określa, czy produkt jest sprzedawany jako luźne wypełnienie, arkusze,
        rolki, wstępnie przycięte elementy czy gotowe formy.
    batting_stuffing_loft_level:
      name: Poziom puszystości watoliny i wypełnienia
      description: Wskazuje poziom puszystości watoliny lub wypełnienia, zwykle używany
        przy wyborze materiałów do pikowania i wyściełania.
    batting_stuffing_thermal_insulation_level:
      name: Poziom izolacji termicznej watoliny i wypełnienia
      description: Względny poziom ciepła/izolacji watoliny stosowanej w kołdrach,
        kurtkach i kocach.
    batting_tee_base_design:
      name: Konstrukcja podstawy tee baseballowego
      description: Opisuje styl lub konstrukcję podstawy tee wpływającą na stabilność
        i rodzaje powierzchni, do których jest odpowiednia.
    battle_top_arena_stadium_compatibility:
      name: Kompatybilność z areną/stadionem battle top
      description: Wskazuje, z jakim systemem areny/stadionu produkt jest przeznaczony
        do użytku (szczególnie w przypadku zestawów lub specjalnych kształtów aren).
    battle_top_items_included:
      name: Elementy battle top w zestawie
      description: Określa elementy battle top dołączone do opakowania (np. bączek,
        wyrzutnia, arena/stadion, ripcord, części zamienne).
    battle_top_performance_type:
      name: Typ działania battle top
      description: Opisuje ogólny styl działania battle top, zwykle odzwierciedlający
        zachowanie w arenie (agresywny, nastawiony na wytrzymałość itp.).
    bayan_included_accessories:
      name: Akcesoria do bajanu w zestawie
      description: Akcesoria dołączone do bajanu (w pudełku).
    bayan_tuning_system_type:
      name: Typ systemu strojenia bajanu
      description: Sposób napinania/strojenia bajanu (styl konstrukcji), wpływający
        na przenośność i łatwość strojenia.
    bb_gun_action_type:
      name: Typ mechanizmu wiatrówki BB
      description: Wskazuje mechanizm ładowania lub przeładowania wiatrówki BB (np.
        lever action, pump, break-barrel).
    bb_gun_caliber:
      name: Kaliber wiatrówki BB
      description: Określa średnicę kulek BB, do których strzelania przeznaczona jest
        wiatrówka, zapewniając kompatybilność amunicji.
    bb_gun_part_type:
      name: Typ części do wiatrówki BB
      description: Klasyfikuje konkretny komponent lub akcesorium przeznaczone do
        wiatrówek BB, umożliwiając szybkie znalezienie odpowiedniej części zamiennej,
        ulepszenia lub dodatku (np. lufa, uszczelka tłoka, speedloader).
    beach_ball_features:
      name: Cechy piłki plażowej
      description: Charakterystyczne funkcje użytkowe specyficzne dla piłek plażowych.
    beach_bucket_features:
      name: Funkcje wiaderka plażowego
      description: Funkcje wiaderka plażowego wpływające na użytkowanie, trwałość
