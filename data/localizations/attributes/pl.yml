      description: Określa kategorie żywic UV, które drukarka SLA/MSLA może wykorzystywać
    compatible_resolution:
      name: Zgodna rozdzielczość
      description: Określa obsługiwaną rozdzielczość monitora, np. 1080p, full HD
    compatible_satellite_radio_service:
