    roller_material:
      name: Materiał wałka
      description: Określa materiał, z którego wykonany jest roller, zazwyczaj w przypadku
        narzędzi do pielęgnacji skóry, np. jadeit, silikon.
    roller_type:
      name: Typ rolki
      description: Określa typ rollera, zazwyczaj w przypadku narzędzi do pielęgnacji
        skóry, np. lód, mikronakłuwacz
    roof_decor_shape:
      name: Kształt dekoracji dachu
      description: Określa wzór lub formę ozdób dachowych, np. koń lub żaglówka
    room_correction_technology:
      name: Technologia korekcji pomieszczenia
      description: Określa automatyczną kalibrację akustyczną lub system korekcji
        pomieszczenia zintegrowany z odbiornikiem.
    rosin_form:
      name: Forma kalafonii
      description: Opisuje kształt lub formę kalafonii smyczkowej do instrumentów
        smyczkowych, takich jak blok lub ciastko
    rosin_grade:
      name: Klasa kalafonii
      description: Określa rodzaj kalafonii używanej do instrumentów strunowych, np.
        ciemna, średnia
    rotating_direction:
      name: Kierunek obrotu
      description: Określa kierunek obrotu wierteł i wymiennych ostrzy wkrętaków,
