    intended_jewelry_type:
      name: Docelowy typ biżuterii
      description: Wskazuje, do jakiego rodzaju biżuterii przeznaczony jest stojak.
    intended_surface:
      name: Docelowa powierzchnia
      description: Określa główną powierzchnię, którą podkładka ma chronić.
    intercom_communication_type:
      name: Typ komunikacji interkomu
      description: Klasyfikuje podstawowy format komunikacji obsługiwany przez urządzenie
    intercom_wiring_type:
      name: Typ okablowania interkomu
      description: Określa schemat okablowania lub komunikacji, do którego przeznaczony
        jest głośnik interkomu.
    interface_type:
      name: Typ interfejsu
      description: Określa rodzaj połączenia używanego przez produkt, np. Bluetooth
