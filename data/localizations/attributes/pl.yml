    razor_head_design:
      name: Projekt głowicy golarki
      description: Określa liczbę ostrzy w maszynce do golenia, np. pojedyncze, potrójne
    razor_type:
      name: Typ maszynki do golenia
      description: 'Określa konstrukcję golarki, np. prosta lub syntetyczna '
    read/write_speed:
      name: Szybkość odczytu/zapisu
      description: Określa szybkość transferu danych, zazwyczaj w przypadku duplikatorów
