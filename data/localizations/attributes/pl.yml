    hearing_aid_ear_side:
      name: Strona ucha aparatu słuchowego
      description: Określa, czy aparat słuchowy jest przeznaczony dla lewego ucha,
        prawego ucha lub obu uszu.
    hearing_aid_features:
      name: Charakterystyka aparatu słuchowego
      description: Określa szczególne cechy aparatów słuchowych, np. bateria wielokrotnego
