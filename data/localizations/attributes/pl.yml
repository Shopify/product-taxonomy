    product_form:
      name: Forma produktu
      description: Określa format lub prezentację produktu, zazwyczaj produktu dla
        zdrowia i urody, np. balsam, serum
    product_format:
      name: Format produktu
      description: Wskazuje, czy przedmiot jest dostarczany jako produkt fizyczny,
        czy do pobrania w formie cyfrowej.
    product_formulation:
      name: Formuła produktu
      description: Określa skład materiałów eksploatacyjnych dla budownictwa, np.
