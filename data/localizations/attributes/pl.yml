    lamp_type:
      name: Typ lampy
      description: Określa źródło światła w powiększalnikach fotograficznych, np.
        światło zimne, światło dichroiczne
    lancet_mechanism_type:
      name: Typ mechanizmu lancetu
      description: Określa mechanizm działania lub konstrukcję bezpieczeństwa lancetów
