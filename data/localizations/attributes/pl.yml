    bass_drum_beater_shaft_material:
      name: Materiał trzpienia bijaka stopy perkusyjnej
      description: Określa materiał trzpienia/pręta bijaka (nie samej główki).
    bass_drum_head_built_in_muffling:
      name: Wbudowane tłumienie membrany stopy perkusyjnej
      description: Typ zintegrowanego tłumienia zastosowanego w konstrukcji membrany.
    bass_drum_head_configuration:
      name: Konfiguracja membrany stopy perkusyjnej
      description: Opisuje, które membrany są dołączone/zamontowane w stopie perkusyjnej
        przy zakupie.
    bass_drum_head_surface_finish:
      name: Wykończenie powierzchni membrany stopy perkusyjnej
      description: Tekstura/wykończenie powierzchni membrany stopy perkusyjnej.
    bass_drum_head_type:
      name: Typ membrany stopy perkusyjnej
      description: Typ konstrukcji lub specjalna budowa membrany stopy perkusyjnej.
    bass_drum_hoop_material:
      name: Materiał obręczy bębna basowego
      description: Określa materiał obręczy bębna basowego wpływający na trwałość,
        wygląd i wagę.
    bass_drum_mounting_style:
      name: Styl montażu bębna basowego
      description: Wskazuje sposób podparcia/użytkowania bębna basowego (nogi zestawu,
        stojak, uprząż marszowa itp.).
    bass_harmonica_comb_material:
      name: Materiał grzebienia harmonijki basowej
