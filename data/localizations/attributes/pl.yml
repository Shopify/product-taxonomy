    primary_pcie_slot_version:
      name: Wersja głównego gniazda PCIe
      description: Wskazuje generację PCI Express obsługiwaną przez główne gniazdo
        x16 zwykle używane do kart graficznych
    primary_region:
      name: Region podstawowy
      description: Określa główny rynek lub lokalizację dla oprogramowania lub usługi
        w chmurze, np. Ameryka Północna, Azja i Pacyfik
    primer_use:
      name: Użycie podkładu
      description: Określa funkcję podkładu, np. farba bazowa lub uszczelniacz
    print_orientation:
      name: Orientacja druku
      description: Określa, po której stronie materiału drukowana jest grafika.
    print_server_form_factor:
      name: Format serwera wydruku
      description: Wskazuje fizyczną konstrukcję serwera wydruku (np. zewnętrzne urządzenie,
        karta wewnętrzna, klucz USB).
    print_technology:
      name: Technologia druku
      description: Określa proces stosowany przez drukarkę, np. atramentowa lub laserowa
    printer/copier_specialized_features:
      name: Specjalistyczne funkcje drukarki/kopiarki
      description: Określa konkretne cechy drukarek/kopiarek, np. obsługę drukowania
        mobilnego lub sterowanie głosowe
    printer_accessories_included:
      name: Akcesoria do drukarki w zestawie
      description: Określa dodatkowe elementy dołączone do drukarki, kopiarki lub
        faksu, np. zasobnik papieru, nagrzewnica
    printer_color_capability:
      name: Możliwość drukowania w kolorze
      description: Określa, czy urządzenie drukuje tylko w trybie monochromatycznym,
        czy też obsługuje drukowanie i kopiowanie w pełnym kolorze.
    printer_connection_interface:
      name: Interfejs połączenia drukarki
      description: Określa typ portu używanego przez serwer wydruku do połączenia
        z samą drukarką.
    printer_form_factor:
      name: Format drukarki
      description: Klasyfikuje fizyczny styl lub przenośność urządzenia
    printer_functions:
      name: Funkcje drukarki
      description: Określa możliwości drukarek, kopiarek i faksów, np. skanowanie,
        drukowanie fotograficzne
    printing_color:
      name: Kolor druku
      description: Określa gamę kolorów, którą oferują tonery i wkłady do drukarek
        atramentowych, np. czarny, cyjan
    printing_method:
      name: Metoda drukowania
      description: Określa proces drukowania, np. druk offsetowy lub grawerunek
    privacy_filtering_direction:
      name: Kierunek filtrowania prywatności
      description: Wskazuje, z których kierunków filtr blokuje widoczność (np. dwukierunkowy
        poziomy, czterokierunkowy).
    processor_cores:
      name: Rdzenie procesora
      description: Określa liczbę rdzeni w procesorze komputera, np. dwurdzeniowy
    processor_family:
      name: Rodzina procesora
      description: Określa serię lub markę procesora CPU urządzenia elektronicznego,
        np. Intel Core i7
    processor_socket:
      name: Gniazdo procesora
      description: Określa zgodny typ gniazda procesora w urządzeniach elektronicznych,
