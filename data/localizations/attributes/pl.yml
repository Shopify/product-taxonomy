    radar_technology:
      name: Technologia radarowa
      description: Określa technologię radarową stosowaną w produkcie, np. impulsowa,
        półprzewodnikowa
    radio_case_design:
      name: Projekt obudowy radia
      description: Określa styl lub funkcjonalność futerałów na radio, np. stałe lub
