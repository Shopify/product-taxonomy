    jewelry_steam_cleaner_features:
      name: Cechy parowego urządzenia do czyszczenia biżuterii
      description: Lista ważnych wbudowanych funkcji lub funkcji bezpieczeństwa, które
        wyróżniają modele
    jewelry_type:
      name: Typ biżuterii
      description: Określa rodzaje biżuterii, np. szlachetna lub sztuczna
    joint_connection:
      name: Połączenie
      description: Określa połączenie w kijach bilardowych, np. kompozytowe, bez połączenia
    joint_face_type:
