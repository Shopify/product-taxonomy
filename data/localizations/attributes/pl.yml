    leg_color:
      name: Kolor nogi
      description: Określa odcień nóżek produktu, np. biały, brązowy
    leg_lock_type:
      name: Typ blokady nogi
      description: Określa rodzaj blokady nóżek w akcesoriach elektronicznych, zazwyczaj
