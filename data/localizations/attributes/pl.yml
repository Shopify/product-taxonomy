      name: Typ temperatury terapii
      description: Wskazuje, czy produkt zapewnia terapię ciepłem, terapię zimnem
        lub obie te metody.
    thermal_detector_type:
      name: Typ czujki termicznej
      description: Określa technologię stosowaną do wykrywania ciepła w urządzeniach,
