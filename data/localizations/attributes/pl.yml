    projector_light_source:
      name: Źródło światła projektora
      description: Określa rodzaj źródła światła w projektorze, np. LED lub laser
    prop_theme:
      name: Temat rekwizytów
      description: Określa styl lub gatunek rekwizytów filmowych i telewizyjnych,
