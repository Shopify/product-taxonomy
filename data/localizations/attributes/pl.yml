---
pl:
  attributes:
    3d_glasses_fit_design:
      name: Konstrukcja dopasowania okularów 3D
      description: Wskazuje, w jaki sposób okulary są noszone lub mocowane (np. przypinane,
        wiązane, nakładane).
    3d_glasses_material:
      name: Materiał okularów 3D
      description: Określa materiał używany do produkcji okularów 3D, np. bambus lub
        stal nierdzewna
    3d_glasses_technology:
      name: Technologia okularów 3D
      description: Określa technologię obrazu/synchronizacji 3D, do której okulary
        są zaprojektowane, określając kompatybilność z konkretnymi wyświetlaczami
        lub projektorami
    3d_printer_case_style:
      name: Styl etui do drukarki 3D
      description: Klasyfikuje ogólny typ produktu, dzięki czemu kupujący mogą rozróżnić
        między miękkimi torbami do przenoszenia, twardymi obudowami, stacjonarnymi
        osłonami i zwykłymi pokrowcami przeciwpyłowymi
    3d_printer_cleaning_kit_components_included:
      name: Elementy zestawu do czyszczenia drukarki 3D w zestawie
      description: Wymienia poszczególne narzędzia i materiały eksploatacyjne zawarte
        w zestawie, aby kupujący dokładnie wiedzieli, co kupują
    3d_printing_resin_type:
      name: Typ żywicy do druku 3D
      description: Określa formułę lub docelowe zastosowanie żywicy, pomagając kupującym
        szybko zidentyfikować, czy jest to żywica standardowa, inżynieryjna, odlewnicza
        lub innego specjalistycznego typu
    80_plus_efficiency_rating:
      name: Ocena wydajności 80 Plus
      description: Oznacza oficjalny poziom certyfikacji wydajności energetycznej
        80 Plus osiągnięty przez PSU
    abrasive_material:
      name: Materiał ścierny
      description: Określa rodzaj materiału ściernego stosowanego w narzędziach szlifierskich,
        np. diament lub węglik krzemu
    absinthe_style:
      name: Styl absyntu
      description: Określa styl absyntu, np. mieszany, destylowany
    absinthe_variety:
      name: Odmiana absyntu
      description: Określa produkty absyntowe według ich unikatowych odmian, np. rouge,
        verte
    absorbency_level:
      name: Poziom chłonności
      description: Określa pojemność chłonna, zazwyczaj dla artykułów higieny osobistej,
        np. na noc, niska
    absorbent_hygiene_product_features:
      name: Charakterystyka chłonnego produktu higienicznego
      description: Określa szczególne cechy środków higienicznych, np. nieprzeciekające
        lub hipoalergiczne
    academic_level:
      name: Poziom akademicki
      description: Określa poziom akademicki treści medialnych, np. licencjacki lub
        doktorski
    accessibility_design_features:
      name: Cechy konstrukcyjne dotyczące dostępności
      description: Wymienia specjalne elementy konstrukcyjne, które pomagają użytkownikom
        z zaburzeniami słuchu, wzroku lub sprawności manualnej.
    accessory_material:
      name: Materiał akcesorium
      description: Określa rodzaj materiału w akcesoriach (zazwyczaj w przypadku materiałów
        wysyłkowych), np. tworzywo sztuczne, tektura
    accessory_size:
      name: Rozmiar akcesoriów
      description: Określa rozmiar akcesorium, np. jeden rozmiar lub compact
    accordion_tuning:
      name: Strojenie akordeonu
      description: Określa typ strojenia używany w akordeonie, np. suchy lub koncertowy
    activation_mechanism:
      name: Mechanizm aktywacji
      description: Określa podstawową metodę wyzwalania alarmu
    activation_method:
      name: Metoda aktywacji
      description: Opisuje sposób aktywacji doładowania prepaid lub karty SIM przez
        użytkownika.
    active_ingredient:
      name: Składnik aktywny
      description: Identyfikuje podstawowe substancje w produktach do higieny osobistej,
        np. witamina A, retinol
    activewear_clothing_features:
      name: Charakterystyka ubrań sportowych
      description: Określa unikatowe cechy ubrań sportowych, np. czterokierunkowy
        stretch lub oddychająca konstrukcja
    activity:
      name: Czynność
      description: Określa dyscyplinę sportu lub aktywność, do której przeznaczony
        jest produkt, np. tenis lub pilates
    activity_tracker_design:
      name: Design monitora aktywności
      description: Określa sposób noszenia bransoletki do monitorowania aktywności
        fizycznej, np. klips, opaska na ramię
    acupuncture_model_format:
      name: Format modelu akupunktury
      description: Określa rozmiar i skalę modeli do akupunktury, np. naturalna wielkość,
        miniatura
    acupuncture_model_type:
      name: Typ modelu akupunktury
      description: 'Określa część ciała lub gatunek reprezentowany przez model do
        akupunktury, np. głowa, dłoń, zwierzę '
    adapter_directionality:
      name: Kierunkowość adaptera
      description: Wskazuje, czy adapter obsługuje przepływ sygnału w obu kierunkach,
        czy tylko w jednym określonym kierunku
    adapter_operating_modes:
      name: Tryby pracy adaptera
      description: Określa, czy adapter działa jako odbiornik, nadajnik, czy w obu
        trybach jednocześnie
    adaptive_sync_technology:
      name: Technologia synchronizacji adaptacyjnej
      description: Określa technologię zmiennej częstotliwości odświeżania (VRR) obsługiwaną
        przez monitor w celu uzyskania obrazu bez zakłóceń
    adc_resolution:
      name: Rozdzielczość ADC
      description: Określa rozdzielczość (w bitach) zintegrowanego przetwornika analogowo-cyfrowego,
        definiując precyzję pomiaru
    additional_animation_software_features:
      name: Dodatkowe funkcje oprogramowania do animacji
      description: Określa unikatowe funkcje oprogramowania do edycji animacji, np.
        animację postaci lub efekty wizualne
    additional_cleaning_technology:
      name: Dodatkowa technologia czyszczenia
      description: Wymienia wszystkie technologie czyszczenia poza parą (np. ultradźwięki,
        UV, ozon).
    additional_design_software_type:
      name: Dodatkowy typ oprogramowania do projektowania
      description: Określa dodatkowe funkcje oprogramowania do projektowania, np.
        prezentacja wirtualna lub projektowanie krajobrazu
    additional_financial_software_features:
      name: Dodatkowe funkcje oprogramowania finansowego
      description: Określa dodatkowe funkcje oprogramowania finansowego, np. funkcje
        zarządzania aktywami lub audytu i zgodności z przepisami
    additional_graphic_software_features:
      name: Dodatkowe funkcje oprogramowania do przetwarzania grafiki
      description: Określa dodatkowe funkcje oprogramowania graficznego, np. ilustracja
        cyfrowa lub projektowanie układów
    additional_publishing_software_features:
      name: Dodatkowe funkcje oprogramowania do publikowania
      description: Określa dodatkowe funkcje oprogramowania DTP, np. projektowanie
        materiałów drukowanych lub digital publishing
    additional_security_software_features:
      name: Dodatkowe funkcje oprogramowania zabezpieczającego
      description: Określa dodatkowe funkcje oprogramowania zabezpieczającego, np.
        szyfrowanie dysków, wykrywanie włamań
    adhesive_application_type:
      name: Typ zastosowania kleju
      description: Określa zamierzone zastosowanie lub rodzaj usługi dotyczącej rzęs,
        do których przeznaczony jest klej
    adhesive_features:
      name: Cechy kleju
      description: Podkreśla specjalne właściwości kleju zastosowanego w plastrach
        lub taśmach
    adhesive_format:
      name: Format kleju
      description: Wskazuje fizyczną formę, w jakiej klej jest dostarczany do użytku
        naprawczego
    adhesive_strength:
      name: Siła klejenia
      description: Określa poziom przyczepności lub mocy działania kleju w pasku nosowym
        (np. standardowa, o zwiększonej sile)
    adhesive_type:
      name: Typ kleju
      description: Określa rodzaj kleju użytego w produkcie, np. usuwalny lub trwały
    aftershave_product_form:
      name: Forma produktu po goleniu
      description: Określa konsystencję produktu po goleniu, np. balsam lub krem
    age_group:
      name: Grupa wiekowa
      description: Określa docelowy przedział wiekowy produktu, np. dorośli lub dzieci
    age_restrictions:
      name: Ograniczenia wiekowe
      description: Określa minimalny wymagany wiek dla produktu lub wydarzenia, np.
        18 lat lub więcej
    ai_application:
      name: Zastosowanie AI
      description: Określa funkcję sztucznej inteligencji w oprogramowaniu, np. analiza
        predykcyjna lub rozpoznawanie mowy
    air_freshener_form:
      name: Forma odświeżacza powietrza
      description: Określa rodzaj odświeżaczy samochodowych, np. olejek, zacisk odpowietrzający
    air_fryer_functions:
      name: Funkcje frytkownicy beztłuszczowej
      description: Wymienia różne tryby przyrządzania dostępne we frytkownicy beztłuszczowej
        lub podobnym urządzeniu, np. smażenie gorącym powietrzem, pieczenie
    air_mattress_features:
      name: Charakterystyka materaca dmuchanego
      description: Określa unikatowe cechy materaca dmuchanego, np. łatwość nadmuchiwania
        lub odporność na przebicie
    air_tube_configuration:
      name: Konfiguracja przewodów powietrznych
      description: Wskazuje liczbę lub typ przewodów napełniających powietrzem zintegrowanych
        z mankietem
    airbrush_feed_type:
      name: Rodzaj podawania farby w aerografie
      description: Określa metodę podawania farby w aerografach, np. grawitacyjna
        lub syfonowa
    airbrush_operation_method:
      name: Metoda działania aerografu
      description: Określa styl działania aerografu, na przykład podwójne działanie
        lub pojedyncze działanie
    aircraft_engine_configuration:
      name: Konfiguracja silnika samolotu
      description: Określa liczbę silników napędzających samolot, np. pojedynczy lub
        podwójny
    aircraft_engine_type:
      name: Typ silnika samolotu
      description: Określa typ silnika napędzającego samolot, np. odrzutowy lub turbośmigłowy
    airflow_opening_design:
      name: Układ otworów przepływu powietrza
      description: Opisuje konfigurację otworów oddechowych lub wentylacyjnych wbudowanych
        w ustnik
    airsoft_equipment_included:
      name: Sprzęt ASG w zestawie
      description: Określa dodatkowy sprzęt dostarczany z produktami ASG, np. okulary
        ochronne lub kamizelka taktyczna
    album_type:
      name: Typ albumu
      description: Określa styl oprawy zestawów do scrapbookingu lub stemplowania,
        np. oprawa spiralna, scrapbook
    alcohol/solvent_content:
      name: Zawartość alkoholu/rozpuszczalnika
      description: Klasyfikuje produkt na podstawie zawartości alkoholu lub rozpuszczalnika
        do celów transportowych i regulacyjnych (np. alkohol ≤24%, alkohol >24%, rozpuszczalnik
        w małym pojemniku).
    alcohol_content:
      name: Zawartość alkoholu
      description: Wskazuje, czy tonik jest bezzalkoholowy lub, jeśli alkohol występuje,
        przybliżoną jego ilość w formule
    alert_type:
      name: Typ alertu
      description: Określa rodzaj ostrzeżeń generowanych przez produkt, np. alarmy
        dźwiękowe lub powiadomienia na smartfonie
    allergen_information:
      name: Informacje o alergenach
      description: Określa potencjalne alergeny obecne w żywności lub napojach, np.
        pszenica lub orzeszki ziemne
    allergen_test_type:
      name: Typ testu na alergeny
      description: Określa typ alergenu, do wykrywania którego przeznaczony jest zestaw
        testowy, np. pokarmowy lub środowiskowy
    allergens:
      name: Alergeny
      description: Określa potencjalne alergeny w produktach dla zdrowia i urody,
        np. linalol lub limonen
    allergy_friendly_features:
      name: Funkcje przyjazne dla osób cierpiących na alergię
      description: Określa, czy produkt ma właściwości przyjazne dla alergików, np.
        nie zawiera lateksu lub odporny na pleśń
    amino_acid_subtype:
      name: Podtyp aminokwasu
      description: Określa główny typ lub profil aminokwasów zawartych w suplemencie.
    amplifier/booster_suitable_location:
      name: Odpowiednia lokalizacja wzmacniacza/Boostera
      description: Określa najlepsze lokalizacje wzmacniacza, w tym wzmacniacza sygnału,
        np. pojazd lub duża atrakcja
    amplifier_class:
      name: Klasa wzmacniacza
      description: Określa typ wzmacniacza, np. AB lub D
    amplifier_configuration:
      name: Konfiguracja wzmacniacza
      description: Określa konfigurację wzmacniaczy samochodowych, np. dwukanałowe
        lub czterokanałowe
    amputation_level:
      name: Poziom amputacji
      description: Oznacza poziom amputacji, dla którego przeznaczony jest rękaw kompresyjny
    analyte_measured:
      name: Analit mierzony
      description: Określa biomarkery, dla których roztwór kontrolny zapewnia kalibrację
    anamorphic_squeeze_ratio:
      name: Współczynnik ściśnięcia anamorficznego
      description: Wskazuje współczynnik kompresji poziomej obiektywu anamorficznego,
        umożliwiając użytkownikom dopasowanie obiektywów do żądanego efektu desqueeze.
    anatomical_detail_displayed:
      name: Prezentowane szczegóły anatomiczne
      description: Wskazuje, które elementy anatomiczne lub meridiany są wyróżnione
        na modelu
    anchor_type:
      name: Typ kotwy
      description: Określa kotwicę używaną w holowanym sprzęcie do sportów wodnych,
        np. łapy, pług
    anemometer_application:
      name: Zastosowanie anemometru
      description: Określa docelowe zastosowanie anemometru, np. przemysłowy lub meteorologiczny
    angles_supported:
      name: Obsługiwane kąty
      description: Określa zakres kątów, które produkt może obsługiwać, zazwyczaj
        dla urządzeń elektronicznych, np. regulowany, od 0° do 180°
    angling_style:
      name: Styl wędkarski
      description: Określa technikę połowu, dla której przeznaczony jest produkt,
        np. wędkarstwo surfingowe lub wędkarstwo muchowe
    animal_feed_form:
      name: Forma paszy dla zwierząt
      description: Określa formę paszy dla zwierząt, np. płyn lub granulki
    animal_type:
      name: Typ zwierzęcia
      description: Określa rodzaj zwierzęcia, dla którego przeznaczony jest produkt,
        np. kaczki, jelenie lub psy
    answering_machine_type:
      name: Typ sekretarki
      description: Określa obecność i technologię zintegrowanej sekretarki
    antenna_connector_type:
      name: Typ złącza anteny
      description: Określa złącze RF używane do podłączenia anten zewnętrznych
    antenna_rf_connector_type:
      name: Typ złącza RF anteny
      description: Identyfikuje złącze RF używane przez antenę.
    antenna_type:
      name: Typ anteny
      description: Określa rodzaj anteny do urządzeń elektronicznych, np. wielokierunkowa,
        siatka
    anti_agin_skin_care_type:
      name: Rodzaj pielęgnacji przeciwstarzeniowej skóry
      description: Określa rodzaj produktu do pielęgnacji przeciwstarzeniowej skóry,
        np. maseczka, tonik
    anti_perspirant_strength_level:
      name: Poziom mocy antyperspirantu
      description: Określa klasyfikację skuteczności antyperspirantu (np. moc kliniczna,
        moc sportowa).
    antibody_class_tested:
      name: Testowana klasa przeciwciał
      description: Określa immunoglobulinę lub biomarker wykrywany przez zestaw (np.
        IgE, IgG4).
    antifreeze_type:
      name: Typ środka zapobiegającego zamarzaniu
      description: Określa typ płynu do chłodnic samochodowych, np. koncentrat, rozcieńczony
    antique_car_design:
      name: Konstrukcja samochodu zabytkowego
      description: Opisuje podstawowy typ konstrukcji zabytkowego samochodu, np. t-bucket
        lub grand tourer
    antique_vehicle_era:
      name: Era pojazdu zabytkowego
      description: Opisuje okres historyczny pojazdu zabytkowego, np. Brass lub Vintage
    appliance_board_function:
      name: Funkcja płytki elektroniki
      description: Określa rolę funkcjonalną płytki w urządzeniu
    appliance_unit_location:
      name: Lokalizacja modułu urządzenia
      description: Wskazuje fizyczną część urządzenia, do której przeznaczona jest
        płytka (np. jednostka wewnętrzna lub zewnętrzna)
    application_area:
      name: Obszar zastosowania
      description: Określa część lub obszar ciała, na którym produkt ma zostać nałożony,
        np. usta, całe ciało
    application_method:
      name: Metoda zastosowania
      description: Określa sposób nakładania lub stosowania produktu, np. żel, płyn,
        spray
    application_type:
      name: Typ aplikacji
      description: Wskazuje, czy preparat ma pozostać na włosach/skórze, czy ma być
        spłukiwany oraz określa ewentualny specjalny sposób użycia
    applicator_format:
      name: Format aplikatora
      description: Opisuje fizyczną formę lub styl aplikatora balsamu lub kremu przeciwsłonecznego.
    applicator_material:
      name: Materiał aplikatora
      description: Określa materiał stosowany w aplikatorze, zazwyczaj w przypadku
        tamponów, np. tworzywo sztuczne, tektura
    applicator_type:
      name: Rodzaj aplikatora
      description: Określa rodzaj aplikatora dołączonego do tamponów, np. z aplikatorem,
        bez aplikatora
    applique/patch_shape:
      name: Kształt aplikacji/łaty
      description: Określa formę aplikacji lub naszywek, np. zwierzęca lub geometryczna
    applique_shape:
      name: Kształt aplikacji
      description: Określa kształt aplikacji, np. kwiatowa lub zwierzęca
    aquarium_filter_features:
      name: Charakterystyka filtra akwariowego
      description: Określa szczególne cechy filtrów akwariowych, np. szybka wymiana
        wkładu, wielostopniowa filtracja
    aquarium_light_spectrum:
      name: Spektrum światła do akwarium
      description: Określa rodzaj widma światła do oświetlenia akwarium, np. niebieskie,
        światło dzienne
    aquarium_overflow_box_design:
      name: Konstrukcja pudełka przelewowego do akwarium
      description: Określa sposób montażu pudełka przelewowego do akwarium, np. zewnętrzne
        lub podwieszane
    archery_activity:
      name: Łucznictwo
      description: Określa rodzaj działalności łuczniczej, np. polowanie na świeżym
        powietrzu, strzelanie do celu
    archery_equipment_included:
      name: Sprzęt łuczniczy w zestawie
      description: Określa dołączone akcesoria łucznicze, np. mocowanie stabilizatora
        lub strzały z bezpiecznego szkła
    archery_style:
      name: Styl łuczniczy
      description: Określa konkretny rodzaj łucznictwa, dla którego przeznaczony jest
        produkt, np. łucznictwo 3D, polowanie z łukiem
    archery_target_type:
      name: Typ tarczy łuczniczej
      description: Określa typ tarczy łuczniczej przeznaczonej do różnych ćwiczeń
        strzeleckich, np. tarcza 3D lub mata
    aromatherapy:
      name: Aromaterapia
      description: Określa zastosowany zapach lub olejek eteryczny, np. eukaliptus,
        lawenda
    arrangement:
      name: Układ
      description: Określa sposób aranżacji lub prezentacji kwiatów, np. w wazonie,
        w koszu
    arrow/bolt_material:
      name: Materiał strzały/bełtu
      description: Określa materiał, z którego wykonane są strzały lub bełty, np.
        aluminium lub bambus
    arrow_fletching_material:
      name: Materiał lotki strzały
      description: Określa materiał używany w lotkach strzał, np. syntetyczny lub
        plastikowy
    arrow_material:
      name: Materiał strzały
      description: Określa skład strzał, takich jak bambus lub włókno szklane
    art/crafting_tool_material:
      name: Materiał narzędzi dla artystów i rękodzielników
      description: Określa główny materiał, z którego wykonane są narzędzia artystyczne
        lub rzemieślnicze, np. drewno lub metal
    art_fixative_application_method:
      name: Metoda aplikacji utrwalacza artystycznego
      description: Określa sposób nakładania fiksatywy artystycznej, np. aerozol lub
        pędzel
    art_movement:
      name: Ruch artystyczny
      description: Określa styl lub nurt artystyczny obrazu, np. impresjonizm, ekspresjonizm
    art_style:
      name: Styl artystyczny
      description: Określa styl estetyczny produktu, np. secesja lub typografia
    artwork_authenticity:
      name: Autentyczność dzieła sztuki
      description: Określa autentyczność dzieła sztuki, np. oryginalne dzieło lub
        reprodukcja
    artwork_frame_material:
      name: Materiał ramy dzieła sztuki
      description: Określa materiał używany w ramach dzieł sztuki, np. drewno lub
        pozłacany
    artwork_type:
      name: Typ grafiki
