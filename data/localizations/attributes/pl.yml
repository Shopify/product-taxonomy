      description: Określa rodzaj falownika w częściach pojazdu elektrycznego, np.
        czysta fala sinusoidalna lub fala prostokątna
    invitation_personalization_design:
      name: Projekt personalizacji zaproszenia
      description: Określa cechy zaproszenia, np. dołączenie odpowiedzi na zaproszenie
        lub możliwość dostosowania
    ironing_features:
      name: Funkcje prasowania
      description: Określa szczególne cechy żelazka lub systemu prasowania, np. automatyczne
        wyłączanie zasilania lub rozpylacz pary
    item_condition:
      name: Stan przedmiotu
      description: Określa jakość przedmiotu, zazwyczaj pojazdu lub części pojazdu,
        np. używany z certyfikatem, odnowiony
    item_material:
      name: Materiał przedmiotu
      description: Określa podstawowy składnik elementu, zazwyczaj w przypadku części
