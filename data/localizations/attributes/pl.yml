    beach_sand_toy_items_included:
      name: Elementy zabawek plażowych/piaskowych w zestawie
      description: Dodatkowe elementy do zabawy na plaży/w piasku dołączone do wiaderka
        (jeśli sprzedawane jako zestaw).
    bead_breaker_type:
      name: Typ bead breakera
      description: Typ/konstrukcja mechanizmu bead breakera.
    bead_hole_style:
      name: Typ otworu koralika
      description: Określa styl lub konfigurację otworu/szczeliny koralika wpływającą
        na sposób osadzenia na haczyku lub żyłce.
    bead_type:
      name: Typ koralika
      description: Główny typ koralików wymaganych przez wzór.
    bead_type_patch_embellishment:
      name: Typ koralików (ozdoba naszywki)
      description: Główny typ koralików użytych na powierzchni naszywki.
    beaded_accessory_project_type:
      name: Typ projektu akcesorium z koralików
      description: Określa, jakie akcesorium można wykonać według wzoru.
    beading_needle_flexibility:
      name: Elastyczność igły do koralików
      description: Względna elastyczność igły ułatwiająca przechodzenie przez ciasne
        układy koralików.
    beading_pattern_bead_size:
      name: Rozmiar koralików we wzorze
      description: Zalecane rozmiary koralików określone we wzorze (najczęściej rozmiary
        seed beads, np. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Format schematu koralikowego
      description: Sposób wizualnej prezentacji wzoru (np. diagramy lub zdjęcia krok
        po kroku).
    beading_pattern_stitch_technique:
      name: Ścieg/technika koralikowa we wzorze
      description: Główny ścieg lub technika koralikowa używana we wzorze.
    beading_technique_stitch:
      name: Technika / ścieg koralikowy
      description: Określa główną technikę lub ścieg koralikowy używany we wzorze
        (np. ścieg peyote, brick stitch).
    beading_thread_fiber_type:
      name: Typ włókna nici do koralików
      description: Określa rodzaj włókna/materiału nici do koralików istotny dla właściwości
        użytkowych.
    beading_thread_size:
      name: Rozmiar gwintu listwy
      description: Wskazuje oznaczenie rozmiaru producenta/branży używane dla nici
        do koralików (specyficzne dla marki/linii), np. rozmiar D lub 00.
    beading_thread_use_case:
      name: Zastosowanie nici do koralików
      description: Określa główne zalecane zastosowanie nici do koralików, pomagając
        klientom dobrać odpowiedni produkt do projektu.
    beading_wire_coating_material:
      name: Materiał powłoki drutu do koralików
      description: Określa materiał zewnętrznej powłoki drutu do koralików (jeśli
        występuje), wpływający na odczucia, trwałość i odporność na załamania.
    beading_wire_strand_count:
      name: Liczba splotów drutu do koralików
      description: Wskazuje liczbę splotów w wielosplotowym drucie do koralików (np.
        7-, 19-, 49-splotowy), wpływającą na elastyczność i układanie.
    beadlock_type:
      name: Typ beadlocka
      description: Wskazuje, czy koło posiada beadlock i jaki jest jego typ (istotne
        dla użytkowników off-road/UTV).
    beam_material:
      name: Materiał belki
      description: Główny materiał belki/pręta (często inny niż materiał głowic/nasadek).
    beam_pattern:
      name: Wzór wiązki światła
      description: Wzór rozkładu światła używanego do oświetlenia drogowego/off-road.
    bean_bag_fabric_material:
      name: Materiał tkaniny worków bean bag
      description: Określa materiał zewnętrzny worków bean bag dołączonych do zestawu.
    bean_paste_variety:
      name: Odmiana pasty fasolowej
      description: Klasyfikuje konkretny typ pasty fasolowej według stylu produkcji
        lub głównego składnika.
    bean_preparation:
      name: Przygotowanie fasoli
      description: Wskazuje sposób przygotowania lub przetworzenia fasoli przed sprzedażą
        (np. całe strąki, łuskana, siekana, kiełkowana).
    bean_variety:
      name: Odmiana fasoli
      description: Określa botaniczną lub handlową odmianę fasoli (np. fasolka szparagowa,
        edamame, fasola długa).
    beanie_style:
      name: Styl beanie
      description: Określa ogólny projekt, konstrukcję lub sylwetkę czapki beanie,
        umożliwiając szybki wybór spośród popularnych wariantów.
    bearing_clearance:
      name: Luz łożyska
      description: Wskazuje klasę luzu promieniowego wewnętrznego łożyska; klasa C0
        jest również określana jako CN lub luz normalny.
    bearing_construction_type:
      name: Typ konstrukcji łożyska
      description: Określa konstrukcję lub styl łożyska zastosowanego w piaście (np.
        cartridge, loose ball).
    bearing_edge_type:
      name: Typ krawędzi bearing edge
      description: Typ/profil krawędzi bearing edge korpusu, wpływający na atak i
        sustain.
    bearing_lubrication:
      name: Smarowanie łożyska
      description: Wskazuje typ środka smarnego zastosowanego w łożysku podczas produkcji,
        np. smar lub olej.
    bearing_material:
      name: Materiał łożyska
      description: Określa materiał konstrukcyjny łożyska (np. stal, hybryda ceramiczna),
        pomagając użytkownikom wybrać między trwałością, kosztem i wydajnością.
    bearing_rating:
      name: Klasa łożyska
      description: Określa klasę tolerancji lub wydajności łożysk stosowanych w rolkach/wrotkach
        (np. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Kod uszczelnienia łożyska
      description: Wskazuje typ uszczelnienia zastosowanego w łożysku, wpływający
        na trwałość i opory toczenia.
    bearing_seal_type:
      name: Typ uszczelnienia łożyska
      description: Określa konstrukcję uszczelnienia lub osłony chroniącej wnętrze
        łożyska przed zanieczyszczeniami i wpływającej na opór (np. 2RS, ZZ, LLU,
        open).
    bearing_shield_type:
      name: Typ osłony łożyska
      description: Typ osłony lub uszczelnienia chroniącego wnętrze łożyska.
    bearing_size_code:
      name: Kod rozmiaru łożyska
      description: Standaryzowane oznaczenie łożyska (np. 608, 688) obejmujące średnicę
        wewnętrzną, zewnętrzną i szerokość.
    bearing_type:
      name: Typ łożyska
      description: Określa konstrukcję łożysk zastosowanych w sterach rowerowych.
    beater_head_material:
      name: Materiał głowicy bijaka
      description: Określa materiał powierzchni kontaktowej/główki bijaka stopy perkusyjnej
        (np. filc, drewno, guma).
    beaters_included:
      name: Bijaki w zestawie
      description: Określa liczbę bijaków dołączonych/zamontowanych z pedałem perkusyjnym
        (np. pojedynczy lub podwójny bijak) albo brak bijaka.
    bed_base_type:
      name: Typ podstawy łóżka
      description: Określa konstrukcję łóżka lub podstawy divan (np. platformowa,
        sprężynowa listwowa, regulowana).
    bed_storage_type:
      name: Typ przechowywania łóżka
      description: Określa zintegrowany mechanizm przechowywania ramy łóżka.
    bedroom_furniture_items_included:
      name: Dołączono meble do sypialni
      description: Określa elementy meblowe dołączone do zestawu sypialnianego (np.
        łóżko, komoda, stoliki nocne), umożliwiając szybkie sprawdzenie zawartości
        zestawu bez czytania długich opisów.
    bedroom_vanity_items_included:
      name: Elementy toaletki sypialnianej w zestawie
      description: Wymienia elementy dostarczane z zestawem toaletki sypialnianej,
        aby klienci dokładnie wiedzieli, co otrzymają (np. lustro, stołek, zestaw
        oświetlenia).
    beer_based_cocktail_variety:
      name: Odmiana koktajlu na bazie piwa
      description: Klasyfikuje koktajle piwne według konkretnej odmiany, np. Radler,
        Shandy, Michelada.
    beet_variety:
      name: Odmiana buraka
      description: Określa odmianę buraka, pomagając klientom rozpoznać smak, kolor
        i zastosowanie kulinarne (np. Red, Golden, Chioggia).
    bell_actuation_mechanism:
      name: Mechanizm uruchamiania dzwonka
      description: Określa działanie wymagane do użycia dzwonka, pomagając klientom
        wybrać preferowaną ergonomię.
    bell_guard_coverage_area:
      name: Obszar ochrony osłony dzwonka
      description: Wskazuje, którą część dzwonka ma chronić osłona.
    bell_material:
      name: Materiał dzwonka
      description: Materiał elementu dzwonka (jeśli określony oddzielnie od materiału
        całego instrumentu).
    bellhousing_bolt_pattern:
      name: Wzór śrub bellhousingu
      description: Określa standard lub rodzinę wzorów śrub bellhousingu/strony silnika
        stosowanych w obudowie skrzyni biegów.
    bellows_material:
      name: Materiał miecha
      description: Materiał korpusu/pokrycia miecha (jeśli dołączony).
    bellows_orientation:
      name: Orientacja miecha
      description: Wskazuje konfigurację miecha używaną do dostarczania powietrza
        do piszczałek.
    belly_panel_style:
      name: Styl panelu brzusznego
      description: Opisuje konstrukcję pasa lub panelu brzusznego dostosowanego do
        rosnącego brzucha.
    belt_buckle_type:
      name: Typ klamry paska
      description: Opisuje konkretny mechanizm lub konstrukcję klamry zastosowanej
        w pasku.
    beret_style:
      name: Styl beretu
      description: Określa konkretny projekt lub wariant kulturowy beretu.
    berry_species:
      name: Gatunek jagód
      description: Wskazuje gatunek jagód zawartych w produkcie, umożliwiając szybkie
        filtrowanie według preferowanego rodzaju.
    beta_casein_variant:
      name: Wariant beta-kazeiny
      description: Określa wariant białka beta-kazeiny (np. A2) obecny w mleku dla
        konsumentów zwracających uwagę na strawność.
    beverage_sweetness_level:
      name: Poziom słodkości napoju
      description: Klasyfikuje napój według poziomu słodkości lub zawartości cukru.
    bezel_graduation_units:
      name: Jednostki skali bezela
      description: Określa oznaczenia jednostek na obrotowym bezelu (stopnie, mile
        lub podwójna skala).
    bicycle_brake_set_components_included:
      name: Elementy zestawu hamulców rowerowych w komplecie
      description: Wymienia elementy dołączone do zestawu, aby klienci dokładnie wiedzieli,
        co jest zawarte i mogli porównać różne konfiguracje.
    bicycle_cage_mounting_position:
      name: Pozycja montażu koszyka rowerowego
      description: Określa miejsce montażu koszyka na rowerze.
    bicycle_computer_mount_placement:
      name: Miejsce montażu uchwytu komputera rowerowego
      description: Wskazuje miejsce montażu uchwytu komputera rowerowego, np. przed
        kierownicą lub na kapslu mostka.
    bicycle_folding_mechanism:
      name: Mechanizm składania roweru
      description: Określa mechaniczny system składania ramy roweru (np. half fold,
        vertical fold).
    bicycle_frame_design:
      name: Konstrukcja ramy rowerowej
      description: Określa ogólny styl ramy rowerowej wpływający na dostępność, pojemność
        transportową i przechowywanie.
    bicycle_frame_style:
      name: Styl ramy rowerowej
      description: Opisuje konstrukcyjny styl ramy roweru (step-through, lowrider,
        chopper stretch itp.), wpływający na pozycję rowerzysty i estetykę.
    bicycle_handlebar_type:
      name: Typ kierownicy do roweru
      description: Określa konkretny styl lub geometrię kierownicy, pomagając dobrać
        kierownicę do pozycji jazdy i dyscypliny.
    bicycle_headset_configuration:
      name: Konfiguracja sterów rowerowych
      description: Wskazuje konstrukcyjny styl lub standard sterów rowerowych według
        układu misek (np. External Cup, ZeroStack, Integrated, Threaded).
    bicycle_hub_type:
      name: Typ piasty rowerowej
      description: Opisuje mechanizm piasty dołączony do koła, wpływający na kompatybilność
        napędu i styl jazdy.
    bicycle_lock_security_certification:
      name: Certyfikacja zabezpieczenia rowerowego
      description: Niezależna certyfikacja potwierdzająca skuteczność zabezpieczenia
        antykradzieżowego (np. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Typ pedałów rowerowych
      description: Określa ogólny styl działania lub konstrukcję pedałów, np. platformowe,
        zatrzaskowe lub hybrydowe, pomagając dobrać odpowiedni typ do stylu jazdy.
    bicycle_propulsion_type:
      name: Rodzaj napędu roweru
      description: Określa sposób napędu roweru, np. pedałowanie manualne, wspomaganie
        elektryczne lub napęd spalinowy.
    bicycle_pump_type:
      name: Typ pompki do roweru
      description: Określa konstrukcyjny styl pompki, pomagając klientom wybrać model
        odpowiedni do jazdy, przechowywania lub sytuacji awaryjnych.
    bicycle_rack_mounting_type:
      name: Typ montażu bagażnika rowerowego
      description: Opisuje główną metodę lub miejsce montażu bagażnika do roweru,
        pomagając potwierdzić kompatybilność z ramą i osprzętem.
    bicycle_suspension_type:
      name: Typ zawieszenia roweru
      description: Określa obecność i konfigurację zawieszenia w rowerze.
    bicycle_tire_tread_pattern:
      name: Wzór bieżnika opony rowerowej
      description: Określa styl bieżnika opony wpływający na przyczepność i opory
        toczenia na różnych nawierzchniach.
    bidirectional_charging_capability:
      name: Możliwość ładowania dwukierunkowego
      description: Wskazuje, czy pojazd EV obsługuje tryby ładowania dwukierunkowego,
        takie jak V2G i/lub V2H.
    bike_rack_mounting_style:
      name: Styl mocowania uchwytu rowerowego
      description: Sposób podparcia/zabezpieczenia roweru przez bagażnik.
    bike_rack_tilt_function:
      name: Funkcja odchylania bagażnika rowerowego
      description: Wskazuje, czy i jaka funkcja odchylania umożliwia dostęp do tylnej
        przestrzeni bagażowej przy zamontowanym bagażniku.
    bikini_top_style:
      name: Styl góry bikini
      description: Określa projekt lub krój górnej części bikini, pomagając znaleźć
        preferowany fason i sylwetkę.
    billiard_brush_type:
      name: Typ szczotki bilardowej
      description: Określa konkretny typ narzędzia do czyszczenia stołu bilardowego
        (np. szczotka do stołu, szczotka do band, napping block).
    billiard_glove_finger_coverage:
      name: Zakres osłony palców rękawiczki bilardowej
      description: Wskazuje, które palce są zakryte przez rękawiczkę, umożliwiając
        precyzyjne filtrowanie modeli do bilarda.
    billiard_pocket_style:
      name: Styl łuzy bilardowej
      description: Określa konstrukcyjny lub estetyczny styl kieszeni wpływający na
        kompatybilność i wygląd stołu.
    billiard_rack_style:
      name: Styl trójkąta bilardowego
      description: Opisuje fizyczny styl lub mechanizm trójkąta (np. tradycyjna rama,
        szablon, składany).
    billiard_table_type:
      name: Typ stołu bilardowego
      description: Określa dyscyplinę sportu bilardowego lub styl użytkowania, do
        którego przeznaczony jest stół (np. pool, snooker, karambol).
    billiards_discipline:
      name: Dyscyplina bilardowa
      description: Wskazuje konkretną odmianę sportu bilardowego (typ gry), do której
        produkt jest przeznaczony lub z którą jest kompatybilny.
    binding_compatibility_standard:
      name: Standard kompatybilności wiązań
      description: Określa interfejs wiązań (normę podeszwy), dla którego certyfikowany
        jest but narciarski, zapewniając bezpieczne i prawidłowe dopasowanie do wiązań
        narciarskich.
    binding_inclusion:
      name: Wiązania w zestawie
      description: Określa, czy narty są sprzedawane jako płaskie, ze zintegrowanym
        systemem czy z osobnymi wiązaniami w zestawie.
    binding_interface:
      name: Interfejs wiązań
      description: Wskazuje standard płyty lub interfejsu wiązań, z którym narty są
        fabrycznie wyposażone lub kompatybilne, zapewniając kompatybilność butów i
        wiązań.
    binding_liner_type:
      name: Typ wkładki wiązania
      description: Opisuje typ wewnętrznej wkładki zastosowanej w wiązaniu/bucie (np.
        wyjmowana, umożliwiająca chodzenie, termoformowalna).
    binding_mounting_system:
      name: System montażu wiązań
      description: Określa interfejs używany do mocowania wiązania do narty (montaż
        płaski, szyna/prowadnica, płyta itp.).
    binding_position:
      name: Położenie wiązań
      description: Wskazuje zamierzone miejsce lub konfigurację montażu wiązania (np.
        przedni but, tylny but, ARTP).
    binding_strap_position:
      name: Pozycja paska wiązania
      description: Określa miejsce montażu paska na wiązaniu.
    bingo_components_included:
      name: Dołączono elementy do Bingo
      description: Wymienia elementy dołączone do zestawu bingo, takie jak kule bingo,
        karty i markery.
    bingo_number_range:
      name: Zakres numerów bingo
      description: Określa zakres/odmianę numerów bingo obsługiwaną przez zestaw.
    bingo_set_features:
      name: Cechy zestawu bingo
      description: Określa podstawowy format produktu zestawu bingo (fizyczny/manualny
        lub elektroniczny/interaktywny).
    bipod_mounting_interface:
      name: Interfejs montażu dwójnogu
      description: Określa interfejs mocowania używany do połączenia dwójnogu z bronią
        palną lub systemem szyn.
    bit_attachment_type:
      name: Typ mocowania wiertła
      description: Określa sposób połączenia ogłowia z wędzidłem (np. końcówki wiązane,
        końcówki z klamrą, końcówki ze śrubą Chicago).
    bit_mouthpiece_design:
      name: Konstrukcja ustnika wędzidła
      description: Określa styl konstrukcyjny lub konfigurację przegubów ustnika,
        która wpływa na rozkład nacisku, prześwit podniebienia i ogólną ostrość działania.
    bit_ring_style:
      name: Styl pierścienia wędzidła
      description: Określa styl policzka lub pierścienia wędzidła mocowanego do uzdy,
        wpływający na działanie, prowadzenie boczne i odczucie wodzy.
    bladder_material:
      name: Materiał dętki
      description: Określa materiał użyty do wewnętrznego pęcherza utrzymującego powietrze.
    blade_attachment_type:
      name: Typ mocowania ostrza
      description: Określa, czy łyżwa wykorzystuje mechanizm clap (zawiasowy) czy
        stałe mocowanie płozy.
    blade_finish_coating:
      name: Wykończenie/powłoka ostrza
      description: Obróbka powierzchni ostrza stosowana ze względów estetycznych lub
        w celu ochrony przed korozją.
    blade_hosel_type:
      name: Typ hosela łopatki
      description: Określa typ połączenia hosela łopatki pasującego do kija, wpływający
        na kompatybilność (np. Standard lub Tapered).
    blade_length_type:
      name: Typ długości ostrza
      description: Klasyfikuje długość pióra płetwy jako krótką, średnią lub długą,
        z których każda wpływa na kadencję kopnięć i cele treningowe.
    blade_lie:
      name: Lie łopatki
      description: Określa numer lie łopatki kija hokejowego, wskazujący, jak łopatka
        układa się na lodzie względem trzonka.
    blade_sharpness:
      name: Ostrość ostrza
      description: Wskazuje, czy krawędź broni jest zaostrzona czy tępa do treningu.
    blade_size_category:
      name: Kategoria rozmiaru klingi
      description: Standaryzowany międzynarodowy kod rozmiaru klingi szabli (0–5)
        używany do rozróżniania kling młodzieżowych i dla dorosłych.
    blade_size_class:
      name: Klasa rozmiaru łopatki
      description: Klasyfikuje łopatkę według konwencji rozmiarów zawodników, dopasowując
        ją do rozmiarów kijów, takich jak Youth, Junior, Intermediate lub Senior.
    blade_size_number:
      name: Numer rozmiaru klingi
      description: Standardowy numeryczny kod rozmiaru (0–5) określony przepisami
        szermierczymi, determinujący długość klingi i kwalifikację do grup wiekowych.
    blaster_mechanism:
      name: Mechanizm blastera
      description: Określa wewnętrzny mechanizm działania gel blastera (np. GBB, AEG,
        sprężynowy).
    block_edge_style:
      name: Styl krawędzi klocka
      description: Opisuje sposób wykończenia krawędzi/narożników drewnianych klocków
        pod kątem odczuć i bezpieczeństwa.
    blocking_mat_features:
      name: Funkcje maty do blokowania
      description: Funkcje użytkowe charakterystyczne dla mat blokujących (przechowywanie,
        przenośność, użyteczność).
    blocking_mat_grid_unit:
      name: Jednostka siatki maty blokującej
      description: System jednostek używany na nadrukowanej siatce, pomagający dopasować
        wzory i wymiary.
    blocking_mat_surface_markings:
      name: Oznaczenia powierzchni maty blokującej
      description: Typ oznaczeń pomiarowych/prowadzących nadrukowanych lub uformowanych
        na powierzchni maty.
    blocking_wire_coating:
      name: Powłoka drutu blokującego
      description: Obróbka/powłoka powierzchni drutu blokującego wpływająca na odporność
        na rdzę, gładkość i ryzyko zahaczania.
    blocking_wire_end_cap_type:
      name: Typ końcówki drutu blokującego
      description: Określa typ zabezpieczenia/wykończenia końców drutu blokującego
        dla bezpieczeństwa i ochrony tkaniny.
    blocking_wire_set_includes:
      name: Zestaw drutów blokujących zawiera
      description: Określa elementy dołączone do produktu z drutem blokującym (np.
        szpilki T, tuba do przechowywania).
    blocking_wire_usage:
      name: Zastosowanie drutu blokującego
      description: Główne zastosowanie, do którego przeznaczony jest elastyczny drut
        blokujący.
    bloom_stage:
      name: Etap rozkwitu
      description: Wskazuje, jak bardzo rozwinięte są kwiaty stokrotki przy dostawie/wysyłce.
    blower_motor_bearing_type:
      name: Typ łożyska silnika dmuchawy
      description: Określa konstrukcję łożyska zastosowanego w silniku dmuchawy.
    blower_motor_mounting_position:
      name: Pozycja montażu silnika dmuchawy
      description: Miejsce montażu silnika dmuchawy w module HVAC/pojeździe (np. przód,
        tył).
    blowpipe_valve_type:
      name: Typ zaworu rurki do nadmuchiwania
      description: Określa typ zaworu rurki do nadmuchiwania w zestawie (jeśli występuje).
    bo_staff_style:
      name: Styl kija bo
      description: Określa styl konstrukcyjny lub budowę kija (np. prosty, zwężany,
        z piankową wyściółką, składany).
    board_game_theme:
      name: Motyw gry planszowej
      description: Motyw narracyjny/sceneria gry planszowej (używany do odkrywania
        i przeglądania).
    board_rail_shape:
      name: Kształt raili deski
      description: Określa kontur raili deski (np. miękkie, twarde, 50/50), wpływający
        na trzymanie i napęd na fali.
    board_size_classification:
      name: Klasyfikacja rozmiaru deski
      description: Klasyfikuje deskę lub zestaw do cornhole według popularnych standaryzowanych
        rozmiarów.
    board_type_compatibility:
      name: Kompatybilność typu deski
      description: Określa typ deski, do którego przeznaczony jest leash.
    boat_construction_type:
      name: Typ konstrukcji łodzi
      description: Opisuje konstrukcję lub format łodzi wiosłowej (np. pompowana,
        sztywna).
    boat_hook_flotation:
      name: Pływalność bosaka
      description: Wskazuje, czy bosak jest zaprojektowany tak, aby unosić się na
        wodzie po upuszczeniu.
    boat_ladder_stowage_style:
      name: Styl przechowywania drabinki łodziowej
      description: Opisuje sposób przechowywania drabinki, gdy nie jest używana (np.
        składana, chowana, zdejmowana).
    boat_trailer_construction_type:
      name: Typ konstrukcji przyczepy podłodziowej
      description: Wskazuje, czy przyczepa podpiera łódź za pomocą belek, rolek czy
        systemu hybrydowego.
    boat_weaving_shuttle_weft_exit_type:
      name: Typ wyjścia wątku w czółenku łódkowym
      description: Sposób, w jaki przędza wątku wychodzi z czółenka podczas tkania.
    bobbin_loading_type:
      name: Typ ładowania szpulki
      description: Określa sposób wkładania/ładowania szpulki do maszyny do szycia.
    bobbin_system:
      name: System szpulki
      description: System/typ ładowania szpulki używany przez maszynę do szycia.
    bobbin_type:
      name: Typ szpulki
      description: Określa format nośnika przędzy, do którego przeznaczone jest czółenko
        lub który zawiera, co determinuje kompatybilność i typowe zastosowanie (np.
        czółenka łódkowe często używają szpulek, a czółenka do tkanin z pasków mogą
        być otwarte).
    bobbin_winder_winding_direction:
      name: Kierunek nawijania nawijarki szpulek
      description: Określa kierunek nawijania/obrotu obsługiwany przez nawijarkę szpulek.
    bobble_mechanism:
      name: Mechanizm bobble
      description: Określa styl mechanizmu bobble, który wpływa na ruch i trwałość.
    bocal_material:
      name: Materiał esu
      description: Określa materiał dołączonych bocalli.
    bodhr_n_head_material:
      name: Materiał membrany bodhránu
      description: Materiał membrany uderzanej, który silnie wpływa na brzmienie i
        wymagania konserwacyjne.
    bodhr_n_tuning_system_type:
      name: Typ systemu strojenia Bodhrán
      description: Styl wbudowanego mechanizmu strojenia używanego do regulacji napięcia
        membrany (jeśli instrument jest strojony).
    body_armor_coverage_area:
      name: Obszar ochrony pancerza osobistego
      description: Wskazuje strefy ciała chronione przez produkt.
    body_armor_intended_use:
      name: Przeznaczenie pancerza osobistego
      description: Określa główny scenariusz jazdy lub użytkowania, do którego przeznaczony
        jest pancerz osobisty ATV/UTV.
    body_cord_connector_style:
      name: Typ złączy przewodu body cord
      description: Opisuje konfigurację złączy na końcach przewodu (np. liczba pinów
        lub typ bagnetowy), która określa kompatybilność z bronią i aparatami punktującymi.
    body_panel_finish_state:
      name: Stan wykończenia panelu nadwozia
      description: Opisuje stan przygotowania/wykończenia powierzchni ćwiartki panelu
        w momencie sprzedaży pod kątem lakierowania/montażu.
    body_shape:
      name: Kształt korpusu
      description: Określa ogólny kształt/styl korpusu gitary elektrycznej.
    bodysuit_bottom_coverage:
      name: Zakres zakrycia dołu body
      description: Określa krój i stopień zakrycia dolnej części body, wpływając na
        komfort i kompatybilność ze stylizacją.
    boilie_shape:
      name: Kształt kulek proteinowych
      description: Określa kształt kulek proteinowych produkowanych przez rolerkę,
        umożliwiając wędkarzom wybór różnych profili przynęty.
    boilie_stop_buoyancy:
      name: Wyporność stopera do kulek proteinowych
      description: Określa, czy stoper do kulek proteinowych ma pływać, tonąć czy
        zachowywać neutralną wyporność, wpływając na prezentację przynęty w toni wodnej.
    bok_choy_variety:
      name: Odmiana bok choy
      description: Określa odmianę, nazwę handlową lub typ bok choy (np. Baby, Shanghai,
        Nai Bai, Tatsoi, Purple Lady), umożliwiając wybór według smaku, wielkości
        i wyglądu.
    bolt_drive_style:
      name: Typ napędu śruby
      description: Określa typ gniazda śruby montażowej do deskorolki, rozróżniając
        popularne typy łbów/narzędzi, takie jak Allen lub Phillips.
    bone_content:
      name: Zawartość kości
      description: Określa, czy mięso zawiera kości.
    bongo_center_block_material:
      name: Materiał bloku centralnego bongosów
      description: Materiał bloku centralnego łączącego dwa korpusy bongosów (jeśli
        dotyczy).
    bongo_shell_material:
      name: Materiał korpusu bongosów
      description: Materiał korpusów bongosów, z wyłączeniem membran i osprzętu.
    bongo_tuning_system:
      name: System strojenia bongosów
      description: Sposób strojenia/konstrukcji strojenia bongosów (np. tradycyjne
        strojenie śrubami vs strojenie linami), wpływający na konserwację i autentyczność.
    boning_type:
      name: Typ usztywnienia
      description: Określa wewnętrzny system usztywnienia w gorsecie modelującym,
        łączący materiał oraz styl/kształt fiszbin, który bezpośrednio wpływa na poziom
        podtrzymania, elastyczność i trwałość.
    boot_liner_type:
      name: Typ wkładki buta
      description: Opisuje konstrukcję lub możliwość personalizacji wkładki wewnętrznej
        w bucie snowboardowym (np. termoformowalna, wyjmowana).
    boot_sole_compatibility:
      name: Zgodność z podeszwami butów
      description: Wymienia normy podeszwy buta lub systemy interfejsu akceptowane
        przez wiązanie.
    boot_support_level:
      name: Poziom wsparcia buta
      description: Opisuje ogólną sztywność/wsparcie kostki lub buta zapewniane przez
        łyżwę.
    boot_width_code:
      name: Kod szerokości buta
      description: Oznaczenie szerokości oparte na literach producenta, używane konkretnie
        w rozmiarówce łyżew figurowych (np. AAA, AA, B, C, D).
    booth_configuration:
      name: Konfiguracja kabiny
      description: Określa ogólną konfigurację siedzisk booth (np. jednostronna, narożna,
        modułowa).
    bootie_toe_design:
      name: Konstrukcja noska butów neoprenowych
      description: Określa typ konstrukcji noska butów surfingowych i butów na rafę.
    border_type:
      name: Typ obramowania
      description: Wykończenie krawędzi/styl obramowania haftowanej naszywki (wpływa
        na wygląd, odporność na strzępienie i postrzeganą jakość).
    bore_cleaner_format:
      name: Forma czyścika do przewodu lufy
      description: Wskazuje fizyczną formę produktu do czyszczenia przewodu lufy (narzędzie
        vs materiał eksploatacyjny).
    bore_cleaner_safe_for_finish:
      name: Bezpieczny dla wykończenia czyścik do przewodu
      description: Wskazuje, z którymi popularnymi wykończeniami instrumentów dętych
        blaszanych można bezpiecznie używać czyścika do przewodu.
    bottle_cage_loading_direction:
      name: Kierunek wkładania bidonu do koszyka
      description: Opisuje kierunek, z którego bidon jest wkładany do koszyka lub
        z niego wyjmowany.
    bottle_neck_finish_closure_size:
      name: Wykończenie szyjki butelki / rozmiar zamknięcia
      description: Standaryzowany rozmiar otworu/wykończenia butelki zapewniający
        kompatybilność z kapslami, korkami i kapslownicami (np. wykończenie koronowe
        26 mm).
    bottle_style:
      name: Styl butelki
      description: Popularne typy butelek używanych w domowym warzeniu piwa i produkcji
        wina.
    bottom_bracket_interface:
      name: Interfejs suportu
      description: Określa standard osi/suportu, do którego zaprojektowano korbę,
        zapewniając kompatybilność z ramą i suportem.
    bottom_bracket_standard:
      name: Standard suportu
      description: Mufa/interfejs suportu obsługiwany przez ramę, określający kompatybilność
        z mechanizmem korbowym.
    bottom_type_suitability:
      name: Przystosowanie do rodzaju dna
      description: Określa warunki dna morskiego/dna, w których kotwica ma zapewniać
        najlepsze trzymanie.
    bounce_level:
      name: Poziom odbicia
      description: Wskazuje, jak mocno piłka odbija się po upuszczeniu lub rzuceniu,
        pomagając dobrać odpowiednią piłkę do ćwiczeń takich jak rzuty o ścianę lub
        slamy.
    bouncy_ball_surface_finish:
      name: Wykończenie powierzchni piłki do skakania
      description: Określa dotykowe i/lub wizualne wykończenie powierzchni piłki kauczukowej
        (np. gładka, kolczasta, z brokatem).
    boundary_marker_type:
      name: Typ znacznika granicznego
      description: Określa fizyczną formę znacznika lub produktu do oznaczania granic
        boiska/kortu (np. pachołek, taśma, farba, szablon, maszyna).
    bouquet_size_tier:
      name: Rozmiar bukietu
      description: Standaryzowana klasa rozmiaru bukietu/pęku niezależna od liczby
        łodyg (przydatna w przypadku bukietów mieszanych).
    bow_and_yo_yo_edge_finish:
      name: Wykończenie krawędzi kokardy i jojo
      description: Opisuje wykończenie krawędzi/lamówki zastosowane w kokardzie/jojo
        (szczególnie w przypadku kokard ze wstążki).
    bow_case_shell_type:
      name: Typ skorupy pokrowca na łuk
      description: Opisuje konstrukcję zewnętrzną futerału na łuk (np. twarda skorupa
        vs miękki futerał).
    bow_compatibility:
      name: Zgodność łuków
      description: Określa typ łuku, do którego przeznaczony jest grot myśliwski lub
        do którego jest dopuszczony.
    bow_hair_color:
      name: Kolor włosia smyczka
      description: Określa kolor/wygląd włosia użytego w smyczku do orkiestrowego
        instrumentu smyczkowego (np. białe/bielone, naturalnie białe, czarne).
    bow_stick_material:
      name: Materiał łęczyska łuku
      description: Określa materiał użyty do wykonania pręta smyczka (głównego trzonu),
        który silnie wpływa na wagę, odczucia i cenę.
    bow_type:
      name: Typ łuku
      description: Określa konstrukcję łuku młodzieżowego (np. bloczkowy, refleksyjny,
        długi), która silnie wpływa na styl strzelania, wymagane akcesoria i programy
        treningowe.
    bow_winding_material:
      name: Materiał owijki smyczka
      description: Określa materiał użyty do owijki smyczka, wpływający na chwyt i
        wyważenie.
    bow_yo_yo_embellishment_style:
      name: Styl ozdoby kokardy/jojo
      description: Określa konstrukcyjny styl ozdoby (konstrukcja kokardy lub materiałowego
        jojo).
    bowling_ball_core_type:
      name: Typ rdzenia kuli do kręgli
      description: Określa wewnętrzną konstrukcję rdzenia lub symetrię kuli do kręgli,
        wpływającą na ruch kuli i potencjał haka.
    bowling_ball_coverstock_type:
      name: Typ coverstocku kuli do kręgli
      description: Określa materiał lub technologię zewnętrznej powłoki kuli do kręgli,
        która decyduje o przyczepności i potencjale haka.
    bowling_set_style:
      name: Styl zestawu do kręgli
      description: Określa ogólny styl lub zastosowanie zestawu do kręgli.
    box_lid_type:
      name: Typ pokrywy pudełka
      description: Typ pokrywy/mechanizmu otwierania używany w pudełku prezentowym
        lub puszce.
    box_spring_profile:
      name: Profil box spring
      description: Klasyfikuje ogólną wysokość box spring według przyjaznych dla klientów
        kategorii profilu (np. niski profil, standardowy, wysoki profil), aby umożliwić
        szybkie filtrowanie bez znajomości dokładnych wymiarów.
    box_spring_requirement:
      name: Wymaganie dotyczące box spring
      description: Wskazuje, czy materac wymaga dodatkowego box spring lub podstawy.
    boxing_ring_style:
      name: Styl ringu bokserskiego
      description: Klasyfikuje ogólną konstrukcję lub planowane zastosowanie ringu
        (np. zawody vs trening, podwyższony vs podłogowy).
    bra_length_type:
      name: Typ długości biustonosza
      description: Określa klasyfikację długości biustonoszy według pionowego zakrycia,
        np. standardowy, longline, midi lub cropped.
    bra_padding_type:
      name: Typ wypełnienia biustonosza
      description: Opisuje poziom lub obecność wypełnienia w miseczkach
    braces_compatibility:
      name: Zgodność ortez
      description: Określa, czy ochraniacz na zęby można nosić z aparatem ortodontycznym
        i w jakim zakresie.
    brake_band_form:
      name: Forma taśmy hamulcowej
      description: Wskazuje, czy taśma hamulcowa jest dostarczana jako ciągła pętla
        (bez końca) czy jako odcinek wymagający zamocowania.
    brake_band_material_type:
      name: Typ materiału taśmy hamulcowej
      description: Określa funkcjonalny materiał taśmy hamulcowej (np. sznur bawełniany,
        linka nylonowa, stal sprężynowa), który wpływa na trwałość, chwyt, rozciągliwość
        i hałas.
    brake_band_style:
      name: Styl taśmy hamulcowej
      description: Określa system/styl napinania taśmy hamulcowej używany w kołowrotku
        przędzalniczym do naprężania skrzydełka/szpulki.
    brake_bleeding_method:
      name: Metoda odpowietrzania hamulców
      description: Metoda odpowietrzania obsługiwana przez zestaw.
    brake_booster_assist_type:
      name: Typ wspomagania serwa hamulcowego
      description: Wskazuje mechanizm wspomagania używany przez serwo hamulcowe.
    brake_booster_diaphragm_configuration:
      name: Konfiguracja membrany serwa hamulcowego
      description: Wskazuje liczbę/typ membran użytych w serwie.
    brake_caliper_bleeder_screw_position:
      name: Położenie śruby odpowietrzającej zacisku hamulcowego
      description: Określa położenie śruby odpowietrzającej na zamontowanym zacisku
        (służy do sprawdzenia, czy odpowietrznik znajduje się w najwyższym punkcie
        dla prawidłowego odpowietrzania).
    brake_caliper_finish:
      name: Wykończenie zacisku hamulcowego
      description: Określa wykończenie powierzchni lub powłokę ochronną zastosowaną
        na korpusie zacisku hamulcowego (np. lakier, powłoka galwaniczna, anodowanie).
    brake_caliper_included_hardware:
      name: Elementy montażowe zacisku hamulcowego w zestawie
      description: Określa, co jest dołączone do zespołu zacisku.
    brake_caliper_mount_type:
      name: Typ mocowania zacisku hamulcowego
      description: Styl interfejsu montażowego używanego do mocowania zacisku do zwrotnicy/wspornika.
    brake_caliper_paint_base_chemistry:
      name: Chemia bazy farby do zacisków hamulcowych
      description: System farby/żywicy lub rodzina chemiczna użyta w produkcie.
    brake_caliper_paint_kit_contents:
      name: Zawartość zestawu farby do zacisków hamulcowych
      description: Wskazuje, co znajduje się w opakowaniu poza samą farbą.
    brake_circuit_type:
      name: Typ obwodu hamulcowego
      description: Konfiguracja obwodu hydraulicznego obsługiwana przez pompę hamulcową.
    brake_clutch_fluid_base_chemistry:
      name: Skład chemiczny bazy płynu hamulcowego/przekładniowego
      description: Główna baza chemiczna hydraulicznego płynu hamulcowego/sprzęgłowego,
        która wpływa na kompatybilność i mieszalność.
    brake_clutch_fluid_dot_specification:
      name: Specyfikacja DOT płynu hamulcowego/sprzęgłowego
      description: Klasyfikacja wydajności DOT dla hydraulicznych płynów hamulcowych/sprzęgłowych
        (np. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Wykończenie/powłoka bębna hamulcowego
      description: Wykończenie powierzchni lub powłoka ochronna zastosowana na bębnie
        hamulcowym (np. e-coat, lakierowana, ocynkowana).
    brake_drum_type:
      name: Typ bębna hamulcowego
      description: Typ konstrukcji bębna hamulcowego (z lub bez zintegrowanej piasty/łożyska).
    brake_fluid_base:
      name: Baza płynu hamulcowego
      description: Określa formulację wymaganego lub dołączonego hydraulicznego płynu
        hamulcowego.
    brake_fluid_base_chemistry:
      name: Chemia bazy płynu hamulcowego
      description: Określa bazę chemiczną płynu hamulcowego, która determinuje kompatybilność
        i zasady mieszania.
    brake_fluid_dot_specification:
      name: Specyfikacja DOT płynu hamulcowego
      description: Wskazuje klasę/specyfikację DOT płynu hamulcowego (np. DOT 3, DOT
        4) dla produktów z płynem hamulcowym.
    brake_fluid_standards_compliance:
      name: Zgodność płynu hamulcowego z normami
      description: Normy branżowe, które płyn hamulcowy deklaruje spełniać (poza klasyfikacją
        DOT).
    brake_fluid_type:
      name: Typ płynu hamulcowego
      description: Określa płyn hamulcowy wymagany do hydraulicznych zacisków hamulcowych
        rowerowych.
    brake_hose_end_fitting_type:
      name: Typ końcówki przewodu hamulcowego
      description: Typ połączenia na każdym końcu przewodu hamulcowego (np. banjo,
        kielichowe, gwintowane żeńskie/męskie), używany do zapewnienia kompatybilności
        z zaciskami/przewodami.
    brake_lever_pull_type:
      name: Typ ciągu klamki hamulcowej
      description: Określa przełożenie/mechanikę ciągu linki, do której zaprojektowano
        klamkę, zapewniając kompatybilność z określonymi zaciskami hamulcowymi (np.
        hamulce obręczowe short-pull vs V-brake long-pull).
    brake_light_switch_actuation_type:
      name: Typ aktywacji przełącznika świateł hamowania
      description: Określa, jakie zdarzenie fizyczne aktywuje przełącznik (pedał/tłoczek
        vs ciśnienie hydrauliczne itp.).
    brake_light_switch_connector_type:
      name: Typ konektora przełącznika świateł hamowania
      description: Określa styl/format złącza elektrycznego używanego przez włącznik
        świateł stopu do połączenia z wiązką pojazdu.
    brake_light_switch_contact_type:
      name: Typ styku przełącznika świateł hamowania
      description: Konfiguracja/zachowanie styków elektrycznych włącznika świateł
        stopu (np. normalnie otwarty/zamknięty, przełączny lub wieloobwodowy).
    brake_light_switch_mounting_style:
      name: Styl montażu włącznika świateł stopu
      description: Sposób montażu/instalacji włącznika świateł stopu w pojeździe lub
        układzie hamulcowym (np. gwintowany, wciskany, montowany na wsporniku, śruba
        banjo).
    brake_master_cylinder_mounting_type:
      name: Typ montażu pompy hamulcowej
      description: Sposób montażu pompy hamulcowej do pojazdu/serwa hamulcowego (rozstaw
        śrub / styl kołnierza).
    brake_master_cylinder_reservoir_type:
      name: Typ zbiornika pompy hamulcowej
      description: Typ/konfiguracja zbiornika płynu hamulcowego dostarczanego lub
        wymaganego przez pompę hamulcową.
    brake_mount_type:
      name: Typ mocowania hamulca
      description: Określa interfejs hamulcowy wbudowany w widelec, aby rowerzyści
        mogli potwierdzić kompatybilność układu hamulcowego.
    brake_mounting_flange_bolt_pattern:
      name: Wzór śrub kołnierza mocowania hamulca
      description: Określa układ otworów/śrub kołnierza mocowania używany do przymocowania
        tarczy kotwicznej hamulca lub wspornika zacisku do osi przyczepy (np. 4 śruby).
    brake_pad_backing_plate_material:
      name: Materiał płytki nośnej klocka hamulcowego
      description: Określa materiał płytki nośnej klocka hamulcowego, wpływający na
        odprowadzanie ciepła i wagę.
    brake_pad_compatible_rotor_type:
      name: Kompatybilny typ tarczy hamulcowej
      description: Określa typ powierzchni tarczy hamulcowej, z którą klocek jest
        przeznaczony do pracy.
    brake_pad_compound:
      name: Mieszanka klocka hamulcowego
      description: Określa formulację materiału ciernego klocka hamulcowego.
    brake_pad_form_factor:
      name: Forma klocka hamulcowego
      description: Określa układ hamulcowy/formę, do której przeznaczony jest klocek
        (np. hamulec tarczowy, bębnowy, postojowy).
    brake_pad_material:
      name: Materiał klocka hamulcowego
      description: Określa mieszankę cierną/rodzinę materiałów używaną w okładzinie
        klocka hamulcowego.
    brake_pad_shim_included:
      name: Podkładka tłumiąca do klocków hamulcowych w zestawie
      description: Informacja, czy podkładki tłumiące hałas są dołączone lub fabrycznie
        zamontowane.
    brake_pad_wear_indicator_type:
      name: Typ wskaźnika zużycia klocka hamulcowego
      description: Informacja o rodzaju wskaźnika zużycia dołączonego do klocków hamulcowych
        (np. mechaniczny wskaźnik akustyczny lub czujnik elektroniczny).
    brake_position:
      name: Pozycja hamulca
      description: Informacja o miejscu montażu elementu układu hamulcowego w pojeździe.
    brake_rotor_mount_type:
      name: Typ mocowania tarczy hamulcowej
      description: Informacja o sposobie mocowania tarczy hamulcowej do piasty (jeśli
        dotyczy).
    brake_service_kit_components_included:
      name: Elementy zestawu serwisowego hamulców w zestawie
      description: Lista narzędzi/adapterów/materiałów eksploatacyjnych dołączonych
        do zestawu serwisowego hamulców.
    brake_shoe_friction_material:
      name: Materiał cierny szczęki hamulcowe
      description: jMateriał cierny/okładzina zastosowany(-a) na szczęce hamulcowej
        (materiał stykający się z bębnem).
    brake_shoe_set_contents:
      name: Zawartość zestawu szczęk hamulcowych
      description: Informacja o zawartości opakowania (np. same szczęki lub szczęki
        wraz z elementami montażowymi/sprężynami).
    brake_system_type:
      name: Typ układu hamulcowego
      description: Określa technologię mechanizmu hamowania stosowaną do kontrolowania
        obrotu szpuli podczas rzutu.
    brake_type:
      name: Typ hamulca
      description: Typ mechanizmu hamowania/napinania nawoju osnowy.
    brandy_age_classification:
      name: Klasyfikacja rocznika Brandy
      description: Klasyfikuje brandy według standardowych branżowych oznaczeń jakości/wieku
        (np. VS, VSOP, XO), które odzwierciedlają minimalne wymagania dotyczące starzenia.
    brass_cleaning_tool_type:
      name: Typ narzędzia do czyszczenia instrumentów blaszanych
      description: Określa typ narzędzia używanego do czyszczenia lub konserwacji
        instrumentów dętych blaszanych.
    brass_instrument_application_area:
      name: Obszar zastosowania dla instrumentów blaszanych
      description: Część/części instrumentu blaszanego, na których przeznaczony jest
        do stosowania spray dezynfekujący.
    brass_instrument_care_kit_purpose:
      name: Zestaw do pielęgnacji instrumentów dętych blaszanych
      description: Opisuje zamierzone zastosowanie zestawu (rutynowa konserwacja,
        gruntowne czyszczenie, podróż/awaria, zestaw startowy dla ucznia itp.).
    brass_instrument_case_shell_material:
      name: Instrument mosiężny, opakowanie wewnętrzne, materiał powłoki
      description: Podstawowy materiał sztywnej skorupy/ramy (jeśli dotyczy), oddzielony
        od ogólnego materiału torby/futerału.
    brass_instrument_lubricant_additives_features:
      name: Dodatki/cechy smaru do instrumentów blaszanych
      description: Istotne funkcje użytkowe formulacji środka smarnego.
    brass_instrument_lubricant_base_composition:
      name: Skład bazy środka smarnego do instrumentów dętych blaszanych
      description: Główna baza/chemia środka smarnego stosowana w środkach smarnych
        do instrumentów dętych blaszanych.
    brass_instrument_lubricant_viscosity_grade:
      name: Stopień lepkości smaru do instrumentów blaszanych
      description: Względna gęstość/płynność środka smarującego przeznaczonego do
        instrumentów blaszanych.
    brass_instrument_replacement_part_type:
      name: Typ części zamiennej instrumentu dętego blaszanego
      description: Określa rodzaj części zamiennej do instrumentów dętych blaszanych
        (elementy zaworów/suwaków/klapek wodnych, korki/filce, osłony itp.).
    brass_instrument_valve_configuration:
      name: Konfiguracja zaworów instrumentów blaszanych
      description: W jaki sposób instrument zmienia wysokość dźwięku (mechanizm zaworu/suwaka).
    brass_lubricant_application_area:
      name: Obszar zastosowania środka smarującego do instrumentu dętego blaszanego
      description: Mechanizm instrumentu blaszanego, do którego przeznaczony jest
        smar.
    brass_mouthpiece_backbore:
      name: Backbore ustnika do instrumentów dętych blaszanych
      description: Profil/kategoria backbore ustnika (kształt/rozmiar backbore), wpływający
        na brzmienie i intonację.
    brass_mouthpiece_cup_depth:
      name: Głębokość czaszy ustnika do instrumentów blaszanych
      description: Klasyfikacja głębokości czarki ustnika (jak głęboka jest czarka),
        wpływająca na brzmienie i reakcję.
    brass_polishing_cloth_abrasiveness_level:
      name: Poziom ścieralności ściereczki do polerowania instrumentów dętych blaszanych
      description: Wskazuje, jak agresywna jest ściereczka w usuwaniu nalotu w porównaniu
        z delikatnym nabłyszczaniem.
    bread_crumb_base_ingredient:
      name: Składnik bazowy bułki tartej
      description: Wskazuje główny składnik, z którego wykonano okruchy, np. pszenicę,
        ryż, skórki wieprzowe lub migdały.
    bread_variety:
      name: Różnorodność pieczywa
      description: Określa styl lub odmianę chleba albo bułek, pomagając klientom
        znaleźć konkretne typy (np. brioche, bagietka, naan).
    breadstick_style:
      name: Styl paluszków chlebowych
      description: Określa konkretny tradycyjny styl lub format paluszków chlebowych.
    bridge_head_material:
      name: Materiał głowicy mostka
      description: Materiał użyty wyłącznie do główki podpórki, wpływający na wagę,
        odczucia i trwałość.
    bridge_head_type:
      name: Typ główki mostka
      description: Określa styl główki podpórki, pomagając kupującym wybrać preferowane
        kształty podpórki do kija.
    bridle_part_type:
      name: Typ części ogłowia
      description: Identyfikuje konkretny element uzdy, którego dotyczy część zamienna,
        pomagając klientom znaleźć dokładnie tę część, której potrzebują.
    bridle_style:
      name: Styl uzdy
      description: Klasyfikuje ogólny styl lub konstrukcję uzdy, dzięki czemu jeźdźcy
        mogą szybko znaleźć sprzęt odpowiedni do swoich potrzeb lub dyscypliny.
    broadhead_field_point_attachment_style:
      name: Styl mocowania grotu myśliwskiego/grotu polowego
      description: Określa sposób mocowania grotu lub grotu treningowego do strzały.
    broadhead_thread_size:
      name: Rozmiar gwintu grotu myśliwskiego
      description: Wymienia specyfikację gwintu używanego do mocowania grotu lub grotu
        treningowego do insertu lub trzonu strzały.
    broadhead_tip_type:
      name: Typ końcówki grotu myśliwskiego
      description: Określa typ końcówki/tulei grotu inicjującej penetrację, wpływający
        na skuteczność podczas polowania na różną zwierzynę.
    broccoli_cut:
      name: Sposób krojenia brokułów
      description: Określa sposób krojenia lub przygotowania brokułów przed pakowaniem
        (np. cała główka, różyczki, ryżowane).
    broccoli_variety:
      name: Odmiana brokułu
      description: Identyfikuje konkretną odmianę lub odmianę handlową brokułów (np.
        Tenderstem, Romanesco).
    broom_head_material:
      name: Materiał szczotki miotły
      description: Określa skład materiałowy główki miotły, który wpływa na trwałość
        i charakterystykę gry.
    brush_format:
      name: Format pędzla
      description: Wskazuje fizyczny format szczotki do nart lub snowboardu, rozróżniając
        bloki ręczne i formaty rotacyjne napędzane wiertarką, takie jak cylindry roto
        wool lub roto felt.
    brush_shape:
      name: Kształt pędzla
      description: Określa fizyczny kształt lub profil korpusu albo główki szczotki,
        który wpływa na powierzchnię kontaktu i wygodę użytkowania.
    brussel_sprout_preparation:
      name: Sposób przygotowania brukselki
      description: Opisuje fizyczne przygotowanie lub sposób cięcia dostarczanych
        brukselek.
    brussels_sprout_variety:
      name: Odmiana brukselki
      description: Określa odmianę lub kultywar brukselki, uwzględniając obecne i
        przyszłe odmiany.
    bubble_blower_features:
      name: Funkcje dmuchawy do baniek mydlanych
      description: Wymienia typowe funkcje urządzeń do robienia baniek mydlanych.
    bubble_gun_bubble_output_modes:
      name: Tryby wypuszczania baniek mydlanych
      description: Określa tryby pracy pistoletu do baniek, takie jak pojedyncza bańka,
        praca ciągła lub ustawienia wielu prędkości.
    bubble_machine_features:
      name: Funkcje maszynki do baniek
      description: Wyróżnia typowe funkcje użytkowe maszyn do baniek wykraczające
        poza podstawowe działanie.
    bubble_machine_items_included:
      name: Elementy maszyny do baniek w zestawie
      description: Wymienia najważniejsze elementy znajdujące się w zestawie (np.
        płyn do baniek, dodatkowe różdżki, pasek do noszenia, pilot).
    bubble_output_rate:
      name: Szybkość wypuszczania baniek
      description: Oznacza przybliżoną/jakościową szybkość produkcji baniek przez
        urządzenie do robienia baniek (np. niską/średnią/wysoką), wraz z informacją,
        czy wydajność jest regulowana.
    bubble_solution_container_type:
      name: Typ pojemnika na płyn do baniek
      description: Określa sposób podawania/używania płynu do baniek z pistoletem
        do baniek (np. wewnętrzny zbiornik, dołączona butelka, osobna tacka/zanurzenie).
    bubble_toy_included_accessories:
      name: Akcesoria do zabawki do baniek w zestawie
      description: Wymienia typowe elementy dołączone do zabawki do baniek (np. butelka
        z płynem, tacka, zapasowe różdżki).
    buckwheat_processing_method:
      name: Metoda przetwarzania gryki
      description: Opisuje sposób przetwarzania gryki przed sprzedażą (np. prażona,
        kiełkowana, ekspandowana).
    buckwheat_product_form:
      name: Forma produktu gryczanego
      description: Specyficzna dla gryki postać fizyczna, obejmująca formy nieuwzględnione
        na ogólnej liście (np. płatki, ziarna ekspandowane, saszetki instant).
    bug_collecting_kit_items_included:
      name: Dołączono elementy zestawu do zbierania owadów
      description: Narzędzia i materiały edukacyjne zawarte w zestawie do zbierania
        owadów.
    built_in_storage_type:
      name: Typ wbudowanego przechowywania
      description: Określa typy przechowywania wbudowane w ramę łóżka piętrowego (np.
        szuflady, półki, schowki w schodach).
    bumper_finish:
      name: Wykończenie zderzaka
      description: Określa powłokę powierzchniową lub wykończenie zastosowane na zderzaku.
    bumper_sensor_cutouts:
      name: Wycięcia na czujniki zderzaka
      description: Wskazuje, które otwory/wycięcia pod systemy wspomagania OEM zderzak
        zawiera lub obsługuje.
    bunk_bed_configuration:
      name: Konfiguracja łóżka piętrowego
      description: Wskazuje układ konstrukcyjny i kombinację rozmiarów materacy łóżka
        piętrowego.
    buoyancy:
      name: Wyporność
      description: Wskazuje zachowanie przynęty lub wabika pod względem wyporności
        w toni wodnej, np. pływające, tonące lub zawieszone.
    burkini_pieces_included:
      name: Dołączono elementy burkini
      description: Wymienia elementy odzieży znajdujące się w zestawie burkini, aby
        klienci dokładnie wiedzieli, co kupują.
    burn_rate:
      name: Szybkość spalania
      description: Opisuje szybkość spalania bibułki po zapaleniu.
    bus_model_type:
      name: Typ modelu autobusu
      description: Określa rzeczywistą konfigurację/typ autobusu odwzorowanego przez
        model w skali (klasa nadwozia/zastosowania).
    bust_design:
      name: Konstrukcja biustu
      description: Opisuje konfigurację obszaru biustu body i stopień zakrycia dekoltu
        (np. otwarty biust, wbudowany biustonosz, głęboki dekolt).
    butter_variety:
      name: Odmiana masła
      description: Określa styl produkcji lub charakterystyczny rodzaj masła, np.
        fermentowane, śmietankowe, europejskie, klarowane (ghee) lub serwatkowe.
    buttermilk_variety:
      name: Odmiana maślanki
      description: Określa konkretny rodzaj lub formę sprzedawanej maślanki (np. fermentowana,
        tradycyjna, w proszku).
    button_application:
      name: Sposób mocowania guzika
      description: Wskazuje zamierzone zastosowanie lub typ projektu dla guzika (np.
        odzież, tapicerka).
    button_attachment_type:
      name: Typ mocowania przycisku
      description: Określa konstrukcję guzika służącą do mocowania go do materiału
        (np. otwory przelotowe lub trzonek), a nie typ zapięcia.
    button_finish:
      name: Wykończenie guzika
      description: Opisuje wykończenie powierzchni/wygląd guzika (np. matowy lub błyszczący).
    buttonhole_elastic_application:
      name: Zastosowanie gumki do dziurek na guziki
      description: Podstawowe przeznaczenie/zastosowanie ozdobnej gumki składanej.
    cab_type:
      name: Typ kabiny
      description: Określa konfigurację kabiny ciężarówki.
    cabasa_construction_type:
      name: Typ konstrukcji cabasy
      description: Określa fizyczną konstrukcję/styl korpusu cabasy oraz zespołu łańcucha/kulek.
    cabbage_variety:
      name: Odmiana kapusty
      description: Identyfikuje odmianę lub rodzaj kapusty (np. zielona, pekińska,
        włoska), dzięki czemu klienci mogą filtrować produkty według smaku, konsystencji
        i zastosowania kulinarnego.
    cabinet_door_style:
      name: Styl drzwi szafki
      description: Określa wizualny projekt panelu drzwi szafki, np. Shaker lub panel
        wypukły, aby ułatwić dopasowanie do estetyki kuchni.
    cabinet_overlay_type:
      name: Typ nakładania drzwi szafki
      description: Określa, jak drzwi nakładają się na ramę szafki lub są względem
        niej osadzone.
    cable_end_type:
      name: Typ końcówki kabla
      description: Opisuje kształt lub typ końcówki linki albo złącza współpracującego
        z dźwigniami hamulca lub zmiany biegów.
    cable_housing_construction:
      name: Konstrukcja pancerza linki
      description: Opisuje konstrukcję pancerza, np. spiralną, bezkompresyjną lub
        segmentową, która wpływa na odporność na kompresję, elastyczność i odczucia
        podczas jazdy.
    cable_housing_liner_type:
      name: Typ wkładki pancerza linki
      description: Określa, czy obudowa zawiera wewnętrzną wkładkę i/lub warstwę smarującą
        oraz jaki materiał lub technologia zostały zastosowane, wpływając na redukcję
        tarcia i odporność na warunki atmosferyczne.
    cable_management_type:
      name: Typ zarządzania kablami
      description: Określa typ wbudowanych funkcji zarządzania kablami lub zasilaniem
        oferowanych przez stół konferencyjny.
    cable_surface_treatment:
      name: Obróbka powierzchni linki
      description: Określa specjalną powłokę lub wykończenie zastosowane na lince
        w celu zmniejszenia tarcia lub ochrony przed korozją.
    cabochon_back_type:
      name: Typ tylnej części kaboszonu
      description: Określa profil/wykończenie tylnej części kaboszonu, co wpływa na
        metody oprawy/klejenia i kompatybilność.
    cacao_bean_variety:
      name: Odmiana ziaren kakaowca
      description: Określa botaniczną odmianę lub kultywar ziarna kakaowca.
    cacao_roast_level:
      name: Stopień prażenia kakao
      description: Opisuje stopień wypalenia kakao przed mieleniem.
    cage_package_type:
      name: Typ opakowania klatki
      description: Określa, jakie elementy wchodzą w skład zestawu (np. sama siatka,
        zestaw ramy, kompletny pakiet).
    cajon_body_shell_material:
      name: Materiał korpusu/skorupy cajonu
      description: Określa materiał korpusu/skorupy cajonu (z wyłączeniem płyty przedniej).
    cajon_corner_control_system:
      name: System kontroli narożników cajónu
      description: Określa, czy cajon obsługuje regulację brzmienia narożników (np.
        śruby narożne) w celu zmiany reakcji slap.
    cajon_corner_edge_design:
      name: Konstrukcja narożników/krawędzi cajónu
      description: Opisuje konstrukcję narożników/krawędzi wpływającą na komfort i
        wygodę gry.
    cajon_feet_type:
      name: Typ nóżek cajonu
      description: Określa typ nóżek cajonu, wpływający na stabilność i rezonans.
    cajon_snare_adjustability:
      name: Regulacja sprężyn cajonu
      description: Wskazuje, czy i w jaki sposób można regulować efekt werbla (naprężenie,
        aktywację lub oba).
    cajon_snare_system_type:
      name: Typ systemu sprężyn cajonu
      description: Określa wewnętrzny mechanizm sprężyn używany do uzyskania efektu
        werbla.
    cake_shape:
      name: Kształt ciasta
      description: Opisuje fizyczną formę, w jakiej pieczone jest ciasto kawowe.
    cake_topping:
      name: Polewa do ciasta
      description: Określa główną polewę lub wykończenie zastosowane na cieście kawowym.
    cake_type:
      name: Rodzaj ciasta
      description: Opisuje styl lub odmianę ciasta (np. Pound, Sponge, Cheesecake).
    caliper_mount_type:
      name: Typ mocowania zacisku
      description: Określa standard interfejsu ramy lub widelca używanego przez zacisk
        hamulcowy (np. Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Standard mocowania zacisku
      description: Określa interfejs/standard mocowania (np. Flat Mount, Post Mount,
        IS itp.) używany do przymocowania zacisku hamulcowego do ramy lub widelca
        roweru.
    camera_mounting_location_vehicle_exterior:
      name: Lokalizacja mocowania kamery (zewnętrzna część pojazdu)
      description: Miejsce montażu kamery/kamer w pojeździe (np. przedni grill, tył,
        lusterka boczne).
    camouflage_environment_type:
      name: Typ środowiska kamuflażu
      description: Wskazuje główne środowisko, do którego przeznaczony jest wzór kamuflażu,
        np. las, pustynia lub bagna.
    camping_oil_application:
      name: Zastosowanie oleju kempingowego
      description: Określa podstawowe przeznaczenie oleju w zastosowaniach kempingowych
        (np. paliwo do latarni lub do kuchenki).
    camshaft_construction:
      name: Konstrukcja wałka rozrządu
      description: Typ wykonania/półfabrykatu wałka rozrządu.
    camshaft_material:
      name: Materiał wałka rozrządu
      description: Podstawowy materiał rdzenia/wałka wałka rozrządu (materiał bazowy).
    camshaft_position:
      name: Pozycja wałka rozrządu
      description: Określa docelowe położenie/typ wałka rozrządu w silniku (np. dolotowy
        lub wydechowy albo konkretny rząd/pozycję silnika).
    candle_container_type_included:
      name: Typ pojemnika na świecę w zestawie
      description: Określa typ naczynia/naczyń na świecę dołączonych do zestawu, jeśli
        występują.
    candle_dye_form:
      name: Forma barwnika do świec
      description: Określa fizyczną formę barwnika/kolorantu do świec używanego przy
        wytwarzaniu świec.
    candle_fragrance_form:
      name: Forma zapachu do świec
      description: Określa typ/formę składnika zapachowego przeznaczonego do wytwarzania
        świec.
    candle_making_tool_type:
      name: Typ narzędzia do wytwarzania świec
      description: Określa, jakiego rodzaju narzędziem do wytwarzania świec jest produkt
        (np. garnek do nalewania, narzędzie do centrowania knota, termometr).
    candy_texture:
      name: Tekstura cukierka
      description: Opisuje odczucie w ustach lub konsystencję cukierka niezależnie
        od smaku lub kształtu.
    candying_method:
      name: Metoda kandyzowania
      description: Opisuje sposób kandyzowania lub konserwowania owoców cukrem (np.
        krystalizowane, glazurowane, w syropie).
    canned_meat_form:
      name: Forma mięsa w puszce
      description: Klasyfikuje przetworzoną formę lub sposób prezentacji mięsa w opakowaniu.
    canoe_construction_type:
      name: Typ konstrukcji kanu
      description: Rozróżnia style konstrukcji kadłuba kajaka kanadyjskiego, takie
        jak twarda skorupa, pompowany i składany.
    canoe_hull_shape:
      name: Kształt kadłuba kajaka kanadyjskiego
      description: Określa główny przekrój kadłuba lub profil dna, który wpływa na
        stabilność i prowadzenie.
    canoe_stern_design:
      name: Konstrukcja rufy kajaka kanadyjskiego
      description: Określa typ rufy kadłuba, który wpływa na kompatybilność z silnikiem
        i sterowność.
    canopy_type:
      name: Typ baldachimu
      description: Opisuje rodzaj Canopy lub zadaszenia dołączonego do łóżka typu
        cabana.
    canvas_compatible_media:
      name: Kompatybilne media do płótna
      description: Wskazuje, z jakimi mediami artystycznymi/rękodzielniczymi płótno
        jest przeznaczone do użycia.
    canvas_format:
      name: Format płótna
      description: Wskazuje, czy płótno do druku jest sprzedawane jako arkusze, rolki
        czy wstępnie przycięte panele.
    canvas_mounting_format:
      name: Montaż/format płótna
      description: Fizyczny format/styl montażu produktu z płótnem malarskim.
    canvas_stretcher_assembly_type:
      name: Typ montażu blejtramu
      description: Określa, czy blejtram jest sprzedawany jako złożona rama czy jako
        listwy/zestaw wymagający montażu.
    canvas_stretcher_corner_joint_type:
      name: Typ połączenia narożników krosna malarskiego
      description: Sposób łączenia/konstrukcji narożników krosna (np. czop i gniazdo,
        połączenie palczaste, zszywane, klinowane).
    canvas_surface_tone:
      name: Odcień powierzchni płótna
      description: Bazowy odcień/kolor zagruntowanej powierzchni płótna (gruntu),
        a nie nadrukowany wzór lub deseń (np. biały, czarny, tonowany).
    canvas_weave_type:
      name: Rodzaj splotu płótna
      description: Opisuje konstrukcję splotu powierzchni płótna, która wpływa na
        teksturę i pracę farby.
    cap_attachment_style:
      name: Styl mocowania czapki
      description: Określa styl konstrukcji/mocowania kapturka ustnika saksofonowego,
        który może wpływać na ochronę i dopasowanie do futerału.
    cap_construction:
      name: Konstrukcja czapki
      description: Określa konstrukcję czepka peruki (np. lace front, full lace, ręcznie
        wiązany), która wpływa na realizm, komfort i możliwości stylizacji.
    cap_crown_structure:
      name: Konstrukcja korony czapki
      description: Wskazuje, czy korona czapki jest usztywniana czy nieusztywniana.
    cap_fit_type:
      name: Rodzaj dopasowania czapki
      description: Określa sposób dopasowania czapki do głowy użytkownika (np. dopasowana
        lub regulowana).
    cap_seal_type:
      name: Typ uszczelki nakrętki
      description: Określa element uszczelniający używany do zapobiegania wyciekom
        oleju i ulatnianiu się oparów (np. O-ring, uszczelka).
    cap_size:
      name: Rozmiar czapki
      description: Standardowe oznaczenia rozmiaru wskazujące całkowity rozmiar głowy,
        do którego pasuje czepek peruki.
    cap_type:
      name: Rodzaj czapki
      description: Typ interfejsu zakrętki/zamknięcia stosowanego w zbiorniku wyrównawczym.
    caper_size_grade:
      name: Klasa rozmiaru kaparów
      description: Klasyfikuje kapary według standardowych branżowych nazw klas odpowiadających
        średnicy pąków.
    capo_clamping_mechanism:
      name: Mechanizm zaciskowy kapodastra
      description: Określa styl zacisku/aktywacji używany do dociskania strun (sposób
        obsługi kapodastra).
    capo_finish:
      name: Wykończenie kapodastra
      description: Wykończenie powierzchni korpusu kapodastra (wizualne/dotykowe),
        niezależnie od koloru (np. matowe lub błyszczące).
    capo_fit_type:
      name: Typ dopasowania kapodastra
      description: Określa profil gryfu, do którego zaprojektowano kapodaster (w tym
        promień/płaskość), co wpływa na docisk bez brzęczenia i intonację.
    capo_pad_material:
      name: Materiał podkładki kapodastera
      description: Określa materiał podkładki kontaktowej stykającej się ze strunami/podstrunnicą
        (wpływa na chwyt, stabilność strojenia i możliwość pozostawiania śladów na
        wykończeniu).
    capo_tension_mechanism:
      name: Mechanizm napięcia kapodastra
      description: Określa sposób przykładania i regulacji nacisku/naprężenia strun
        w przypadku przesuwnego kapodastra.
    capture_method:
      name: Metoda przechwytywania
      description: Wskazuje, czy pułapka jest przeznaczona do odłowu żywego czy uśmiercania.
    car_ev_conversion_kit_motor_type:
      name: Typ silnika zestawu do konwersji EV samochodu
      description: Określa technologię silnika trakcyjnego zawartą w zestawie do konwersji
        lub wymaganą przez niego (np. silnik indukcyjny AC vs silnik z magnesami trwałymi).
    car_playset_items_included:
      name: Elementy zestawu samochodowego w zestawie
      description: Wymienia główne elementy dołączone do zestawu samochodowego poza
        podstawową konstrukcją (np. samochody, figurki, znaki).
    car_shampoo_application_method:
      name: Metoda aplikacji szamponu samochodowego
      description: Określa sposób stosowania szamponu podczas mycia.
    car_wash_solution_form:
      name: Forma roztworu do mycia samochodu
      description: Określa postać fizyczną środka do mycia samochodu (np. płyn, piana,
        chusteczki).
    car_wash_solution_scent:
      name: Zapach środka do mycia samochodu
      description: Określa zapach/aromat roztworu do mycia samochodu (jeśli jest zapachowy).
    carbonated_water_variety:
      name: Odmiana wody gazowanej
      description: Klasyfikuje wodę gazowaną według popularnych odmian rynkowych i
        formulacji (np. tonik, seltzer, funkcjonalna woda gazowana).
    carbonation:
      name: Nagazowanie
      description: Opisuje poziom lub styl nagazowania napoju (np. niegazowany, lekko
        gazowany, gazowany, nitro).
    carburetor_barrel_count:
      name: Liczba gardzieli gaźnika
      description: Określa liczbę gardzieli/przelotów przepustnicy w gaźniku.
    carburetor_choke_type:
      name: Typ ssania gaźnika
      description: Określa sposób sterowania ssaniem zastosowany w gaźniku.
    carburetor_mounting_flange_type:
      name: Typ kołnierza montażowego gaźnika
      description: Określa typ interfejsu montażowego gaźnika zapewniającego kompatybilność
        z dolotem/kolektorem (np. króciec lub wzór kołnierza/śrub).
    card_binder_page_type:
      name: Typ stron albumu na karty
      description: 'W przypadku segregatorów/portfolio: styl stron używanych do przechowywania
        kart.'
    card_box_holder_type:
      name: Typ pudełka/holdera na karty
      description: Określa funkcjonalną formę produktu do zbierania lub przechowywania
        kart podczas wydarzenia (np. pudełko, pudełko w stylu skrzynki pocztowej,
        koszyk, stojak).
    card_game_accessory_features:
      name: Funkcje akcesoriów do gier karcianych
      description: Istotne funkcje użytkowe akcesoriów do gier karcianych.
    card_lot_type:
      name: Typ zestawu kart
      description: Wskazuje, czy produkt jest pojedynczą kartą czy zestawem/asortymentem
        wielu kart.
    card_sleeve_size_format_compatibility:
      name: Kompatybilność rozmiaru/formatu koszulek na karty
      description: Określa rozmiary kart, do których przeznaczone są koszulki/strony/pudełka
        na talie.
    carding_surface_pin_material:
      name: Materiał igieł powierzchni gręplarskiej
      description: Materiał pinów/zębów używanych do rozczesywania i otwierania włókien.
    care_durability:
      name: Trwałość pielęgnacji
      description: Wskazuje oczekiwaną trwałość etykiety po aplikacji w praniu/pod
        wpływem ciepła.
    care_label_attachment_type:
      name: Typ mocowania etykiety pielęgnacyjnej
      description: Sposób aplikacji etykiety pielęgnacyjnej na produkt (np. wszywana,
        naprasowywana/termotransferowa, samoprzylepna).
    care_label_format:
      name: Format etykiety pielęgnacyjnej
      description: Fizyczny/drukowany format etykiety pielęgnacyjnej.
    care_label_symbol_system:
      name: System symboli etykiet pielęgnacyjnych
      description: Zestaw norm/symboli używanych na etykiecie (np. symbole pielęgnacyjne
        ISO, symbole ASTM/US).
    cargo_area_configuration:
      name: Konfiguracja przestrzeni ładunkowej
      description: Określa styl konstrukcyjny lub położenie przestrzeni ładunkowej
        w rowerze cargo (np. longtail, ładowany od przodu, trójkołowy).
    cargo_net_adjustability:
      name: Regulacja siatki bagażowej
      description: Wskazuje, czy i w jaki sposób można regulować napięcie/dopasowanie
        siatki cargo.
    cargo_net_position:
      name: Położenie siatki transportowej
      description: Miejsce w bagażniku/przestrzeni ładunkowej, w którym siatka jest
        przeznaczona do montażu lub użytkowania.
    cargo_net_stretch_type:
      name: Typ rozciągliwości siatki transportowej
      description: Określa, czy siatka transportowa do bagażnika jest elastyczna/rozciągliwa,
        czy stała/nierozciągliwa.
    cargo_net_style:
      name: Styl siatki transportowej
      description: Określa typ konstrukcji lub formę siatki cargo (np. linka bungee,
        taśma, bariera, hamak).
    cargo_rack_finish:
      name: Wykończenie bagażnika transportowego
      description: Wykończenie/powłoka zewnętrzna bagażnika cargo.
    carpet_cleaner_application_method:
      name: Metoda aplikacji środka do czyszczenia dywanów
      description: Określa zamierzony sposób nakładania produktu na dywan i wcierania
        go w dywan, poza ogólną formą produktu.
    carrier_style:
      name: Styl bagażnika
      description: Mechanizm/styl nośny używany do przewożenia łodzi na pojeździe.
    carrot_size:
      name: Rozmiar marchwi
      description: Klasyfikuje ogólny rozmiar produktu marchwiowego.
    carrot_variety:
      name: Odmiana marchwi
      description: Określa konkretną odmianę lub kultywar marchwi.
    carrying_capacity_pairs_boards:
      name: Pojemność (pary/deski)
      description: Wskazuje, ile par nart lub desek snowboardowych akcesorium umożliwia
        lub ma podtrzymywać podczas użytkowania z bagażnikiem, np. zestawy rozszerzające.
    cartridge_thread_compatibility:
      name: Kompatybilność gwintu kartridża
      description: Wskazuje standard gwintu obsługiwany przez waporyzator lub baterię,
        zapewniając fizyczną kompatybilność kartridży i baterii.
    case_capacity_butts_shafts:
      name: Pojemność etui (butty × shafty)
      description: Określa, ile dolników i szczytówek kijów może pomieścić futerał,
        wyrażone w formacie dolnik × szczytówka (np. 2x4 = 2 dolniki i 4 szczytówki).
    case_features:
      name: Funkcje skrzynki
      description: Wyróżnia funkcjonalne cechy futerału na talerze/zestaw perkusyjny
        związane z ochroną i transportem.
    case_humidifier_refill_type:
      name: Typ wkładu uzupełniającego do nawilżacza w futerale
      description: Wskazuje, czy nawilżacz wykorzystuje nośniki wielokrotnego użytku
        (do ponownego nawilżania/regeneracji), czy jednorazowe wymienne wkłady.
    case_lining_material:
      name: Materiał wyściółki skrzynki
      description: Określa podstawowy materiał wyściółki wewnątrz futerału lub pokrowca,
        który styka się z instrumentem lub zawartością i je chroni.
    case_material:
      name: Materiał skrzynki
      description: Określa podstawowy materiał koperty zegarka, wpływający na trwałość,
        wagę i estetykę.
    case_mounting_method:
      name: Sposób montażu futerału
      description: Określa sposób umieszczenia lub mocowania nawilżacza wewnątrz futerału
        instrumentu.
    case_structure:
      name: Konstrukcja futerału
      description: Wskazuje sztywność konstrukcji futerału.
    case_style_cymbal_drum:
      name: Typ futerału (talerze/perkusja)
      description: Określa, czy produkt jest miękką torbą, twardym futerałem czy konstrukcją
        hybrydową do transportu talerzy lub zestawów perkusyjnych.
    casing_material:
      name: Materiał obudowy
      description: Określa główny materiał użyty w osnowie opony, wpływający na wagę,
        komfort jazdy i ochronę przed przebiciem.
    casino_set_chip_material:
      name: Materiał żetonów w zestawie kasynowym
      description: Podstawowy materiał dołączonych żetonów (jeśli dotyczy).
    casino_set_layout_included:
      name: Dołączony układ w zestawie kasynowym
      description: Określa, jaki rodzaj powierzchni/układu do gry jest dołączony do
        zestawu.
    cask_finish:
      name: Wykończenie beczki
      description: Określa beczkę używaną do finiszowania lub dojrzewania alkoholu,
        np. beczkę po bourbonie lub sherry.
    cassava_variety:
      name: Odmiana manioku
      description: Określa konkretny kultywar lub odmianę juki/manioku, która wpływa
        na smak, kolor i właściwości kulinarne.
    cassette_body_type:
      name: Typ korpusu kasety
      description: Standard bębenka lub drivera obsługiwany przez tylną piastę lub
        koło (np. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Zestaw funkcji magnetofonu kasetowego
      description: Wskazuje funkcje transportu kasety i odtwarzania typowe dla samochodowych
        magnetofonów kasetowych montowanych w desce rozdzielczej.
    cassette_speed_compatibility:
      name: Kompatybilność prędkości kasety
      description: Określa liczbę biegów (np. 7-rzędowa, 12-rzędowa), z którą kompatybilna
        jest kaseta lub wolnobieg, zapewniając zgodność z łańcuchem, manetką i przerzutką.
    castanet_shell_size_class:
      name: Klasa rozmiaru skorupy kastanietów
      description: Standaryzowana klasa rozmiaru muszli kastanietów, często używana
        przez muzyków/nauczycieli do wyboru dopasowania i brzmienia.
    castanets_included_pieces:
      name: Elementy kastanietów w zestawie
      description: Wskazuje, co obejmuje oferta produktu (para lub pojedynczy element
        oraz dodatki).
    castanets_pitch:
      name: Wysokość dźwięku kastanietów
      description: Wskazuje typowe oznaczenie wysokości dźwięku/rozmiaru używane przez
        producentów do opisu zakresu dźwięku.
    castanets_type:
      name: Typ kastanietów
      description: Określa styl kastanietów lub kategorię ich przeznaczenia.
    caster_type:
      name: Typ kółek
      description: Określa styl kółek zamontowanych w wózku, np. skrętne, z blokadą,
        informując o zwrotności i stabilności.
    castle_playset_included_items:
      name: Elementy zestawu zamku w zestawie
      description: Obejmuje główne elementy dołączone do zestawu zamku do zabawy,
        aby kupujący mogli porównać zestawy, np. figurki, meble, pojazdy, akcesoria.
    catcher_equipment_included:
      name: Dołączono wyposażenie dla łapacza
      description: Określa elementy dołączone do zestawu wyposażenia łapacza, takie
        jak kask łapacza lub ochraniacz klatki piersiowej.
    catcher_helmet_style:
      name: Styl kasku łapacza
      description: Wskazuje ogólny styl konstrukcji ochronnego nakrycia głowy łapacza.
    cattle_breed:
      name: Rasa bydła
      description: Określa rasę bydła, z którego pochodzi wołowina (np. Angus, Wagyu,
        Hereford).
    cauliflower_variety:
      name: Odmiana kalafiora
      description: Identyfikuje odmianę, kolor lub specjalną odmianę sprzedawanego
        kalafiora.
    celery_form:
      name: Forma selera
      description: Określa fizyczną formę lub sposób pokrojenia, w jakim sprzedawany
        jest seler.
    celery_variety:
      name: Odmiana selera
      description: Rejestruje konkretną odmianę lub kultywar selera, umożliwiając
        klientom wybór według profilu smakowego, koloru lub zastosowania kulinarnego.
    cereal_bar_texture:
      name: Tekstura batona zbożowego
      description: Opisuje odczucie w ustach i konsystencję batona zbożowego, np.
        ciągnącą lub chrupiącą.
    cereal_type:
      name: Rodzaj płatków śniadaniowych
      description: Klasyfikuje kształt lub format płatków zbożowych albo granoli,
        np. płatki, produkty ekspandowane, klastry granoli, musli, aby ułatwić kupującym
        znalezienie preferowanej tekstury lub sposobu przygotowania.
    certificate_border_style:
      name: Styl obramowania certyfikatu
      description: Opisuje dekoracyjne wykończenie obramowania certyfikatu.
    certificate_personalization_type:
      name: Typ personalizacji certyfikatu
      description: Określa sposób personalizacji certyfikatu (pusty do pisma odręcznego,
        szablon do wydruku, wstępnie wydrukowany z polami zmiennymi itp.).
    certification_service:
      name: Usługa certyfikacyjna
      description: Zewnętrzna firma oceniająca/certyfikująca (jeśli dotyczy).
    certification_standard:
      name: Norma certyfikacji
      description: Określa certyfikat bezpieczeństwa i odporności ogniowej lub normę
        zgodności, według której oceniana jest kominiarka.
    chain_coating_finish:
      name: Powłoka/wykończenie łańcucha
      description: Określa rodzaj lub wykończenie powierzchni stosowane na łańcuchu
        w celu zwiększenia trwałości, zmniejszenia tarcia, zapobiegania korozji lub
        zmiany wyglądu (np. azotek tytanu, DLC, nikiel, powłoka antykorozyjna EPT).
    chain_connection_type:
      name: Typ połączenia łańcucha
      description: Określa metodę zamknięcia zastosowaną lub wymaganą do połączenia
        końców łańcucha.
    chain_tier_configuration:
      name: Konfiguracja poziomu łańcucha
      description: Określa liczbę/układ poziomów łańcuchów w zespole wychwytującym,
        pojedynczy, podwójny lub potrójny.
    chain_tool_type:
      name: Typ narzędzia do łańcucha
      description: Klasyfikuje konkretny rodzaj narzędzia do łańcucha rowerowego,
        aby kupujący mogli szybko znaleźć odpowiednie urządzenie.
    chainring_shape:
      name: Kształt tarczy mechanizmu korbowego
      description: Określa kształt tarczy mechanizmu korbowego, np. okrągły lub owalny/eliptyczny.
    chair_accessories_included:
      name: Dołączono akcesoria do krzesła
      description: Wymienia wbudowane lub dołączone akcesoria zwiększające funkcjonalność
        krzesła.
    chair_sash_care_instructions:
      name: Instrukcje pielęgnacji szarfy na krzesło
      description: Opisuje zalecaną metodę czyszczenia/konserwacji szarfy na krzesło.
    chair_sash_finish:
      name: Wykończenie szarfy na krzesło
      description: Opisuje połysk/wykończenie powierzchni tkaniny szarfy.
    chair_storage_design:
      name: Konstrukcja przechowywania krzeseł
      description: Wskazuje, w jaki sposób krzesło materiałowe ma być przechowywane,
        np. składane, sztaplowane, nieskładane, aby pomóc klientom ocenić przechowywanie
        i przenośność.
    chaise_or_sectional_orientation:
      name: Orientacja szezlonga lub narożnika
      description: Określa stronę, po której znajduje się zintegrowany szezlong lub
        wydłużona część, patrząc na sofę od przodu.
    chamber_size:
      name: Rozmiar komory
      description: Określa rozmiar/objętość komory ustnika, wpływającą na opór i barwę
        dźwięku.
    chanter_finger_spacing:
      name: Rozstaw otworów palcowych piszczałki
      description: Wskazuje profil rozstawu/rozmiaru otworów palcowych piszczałki,
        często określany jako standardowy, dla małych dłoni lub dużych dłoni.
    chanter_type:
      name: Typ piszczałki
      description: Styl/konfiguracja piszczałki dołączonej do instrumentu (lub używanej
        przez instrument), np. otwarta, zamknięta, ćwiczeniowa lub z klapami.
    chard_variety:
      name: Odmiana boćwiny
      description: Określa konkretny kultywar lub odmianę kolorystyczną sprzedawanej
        boćwiny.
    charging_port_location:
      name: Lokalizacja portu ładowania
      description: Fizyczne położenie głównego zewnętrznego gniazda ładowania pojazdu.
    chassis_construction_type:
      name: Typ konstrukcji podwozia
      description: Opisuje podstawową metodę konstrukcji podwozia zastosowaną w pojeździe.
    checkbook_loading_orientation:
      name: Orientacja wkładania książeczki czekowej
      description: Wskazuje, czy etui na książeczkę czekową jest kompatybilne z formatami
        wkładanymi od góry, z boku lub uniwersalnymi.
    cheekpiece_style:
      name: Styl wędzidła zwykłego
      description: Definiuje typ konfiguracji policzków/pierścieni w wędzidle zwykłym,
        która określa działanie wodzy i stabilność boczną.
    cheese_alternative_form:
      name: Forma alternatywy sera
      description: Określa fizyczną formę lub sposób pokrojenia, w jakim sprzedawana
        jest alternatywa sera.
    cheese_form:
      name: Forma sera
      description: Opisuje fizyczną postać produktu serowego (np. krąg, blok, plastry,
        wiórki).
    cheese_texture:
      name: Tekstura sera
      description: Klasyfikuje ser według jego ogólnej tekstury lub twardości.
    cheese_variety:
      name: Odmiana sera
      description: Określa rodzaj sera użytego jako główny aromat przekąski.
    cherimoya_variety:
      name: Odmiana czerymoi
      description: Identyfikuje konkretną odmianę/kultywar czerymoi (np. Fino de Jete,
        El Bumpo).
    cherry_variety:
      name: Odmiana wiśni
      description: Określa kultywar lub odmianę wiśni/czereśni, pomagając kupującym
        wybrać konkretne typy znane ze smaku, koloru, rozmiaru lub zamierzonego zastosowania
        kulinarnego.
    chest_pocket_style:
      name: Styl kieszeni na piersi
      description: Określa obecność i konfigurację kieszeni na piersi w koszuli.
    chewing_tobacco_form:
      name: Forma tytoniu do żucia
      description: Określa fizyczną formę, sposób cięcia lub rozmiar saszetki tytoniu
        do żucia (np. luźne liście, długie cięcie, slim pouch).
    chicory_variety:
      name: Odmiana cykorii
      description: Określa konkretną odmianę lub kultywar cykorii sprzedawanej, np.
        radicchio, cykorię belgijską, endywię.
    chiffon_recommended_use:
      name: Zalecane zastosowanie szyfonu
      description: Główne zalecane zastosowania szyfonu w szyciu/rękodziele.
    child_seat_accessory_type:
      name: Typ akcesorium do fotelika dziecięcego
      description: Definiuje konkretny rodzaj akcesorium lub części zamiennej do fotelika
        dziecięcego (np. poduszka siedziska, podnóżek, adapter montażowy), umożliwiając
        klientom szybkie znalezienie potrzebnego elementu bez tworzenia wielu mikrokategorii.
    child_seat_mounting_type:
      name: Typ mocowania fotelika dziecięcego
      description: Określa sposób mocowania fotelika rowerowego dla dziecka do ramy
        roweru, bagażnika lub kokpitu.
    chime_sound_character:
      name: Charakter brzmienia dzwonków
      description: Opisuje zamierzony charakter/brzmienie dzwonków.
    chin_cup_type:
      name: Typ osłony podbródka
      description: Określa styl lub konstrukcję osłony podbródka, która wpływa na
        komfort i ochronę przed uderzeniami.
    chin_strap_type:
      name: Typ paska podbródkowego
      description: Określa typ paska pod brodę w kapeluszu — brak, stały, regulowany
        lub odpinany — aby pomóc kupującym wybrać modele, które pozostają stabilne
        przy wietrze lub aktywnym użytkowaniu.
    china_cymbal_edge_shape:
      name: Kształt krawędzi talerza china
      description: Opisuje profil krawędzi/kołnierza typowy dla talerzy china (stopień
        wywinięcia obrzeża), który wpływa na odczucie gry i brzmienie.
    china_cymbal_sound_character:
      name: Charakter brzmienia talerza china
      description: Główne określenia charakteru brzmienia/tonu talerza china używane
        do wyszukiwania i filtrowania, np. trashy, ciemny, jasny. Można zastosować
        wiele wartości.
    chinstrap_type:
      name: Typ paska pod brodę
      description: Styl paska pod brodę dołączonego do kasku.
    chip_cut_style:
      name: Styl cięcia chipsów
      description: Określa fizyczny sposób krojenia lub styl tekstury chipsów, np.
        karbowane, smażone w kotle, prażone.
    chip_denomination:
      name: Nominał żetonu
      description: Nominały żetonów (wartości) dołączone do zestawu, nadrukowane lub
        przypisane.
    chocolate_form:
      name: Forma czekolady
      description: Opisuje fizyczną formę, w jakiej sprzedawana jest czekolada do
        wypieków.
    choy_sum_variety:
      name: Odmiana choy sum
      description: Określa konkretną odmianę handlową lub botaniczną sprzedawanej
        kapusty choy sum.
    cigar_wrapper_color:
      name: Kolor pokrywy cygara
      description: Standardowa klasyfikacja kolorystyczna liścia pokrywowego cygara.
    cigarette_filter_type:
      name: Typ filtra papierosowego
      description: Określa, czy papieros ma filtr, a jeśli tak — konstrukcję lub specjalną
        cechę tego filtra.
    cigarette_size:
      name: Wielkość papierosa
      description: Klasyfikuje papierosy według standardowej terminologii branżowej
        dotyczącej długości lub formatu, np. king size, 100s, slim.
    cigarette_strength_descriptor:
      name: Określenie mocy papierosów
      description: Marketingowe oznaczenie mocy używane przez marki do określenia
        intensywności smoły/nikotyny (np. Light, Bold, Silver).
    cinch_liner_material:
      name: Materiał podszycia popręgu
      description: Określa materiał użyty do podszycia lub wyściółki stykającej się
        z koniem.
    circular_knitting_needle_cable_type:
      name: Typ kabla drutów okrągłych
      description: Materiał/zachowanie i konstrukcja linki, np. stal powlekana, nylon,
        wpływające na pamięć kształtu/zaginanie i działanie krętlika.
    circular_knitting_needles_tip_material:
      name: Materiał końcówek drutów okrągłych
      description: Materiał dwóch końcówek drutów (odrębny od materiału kabla).
    circumference_adjustment_mechanism:
      name: Mechanizm regulacji obwodu
      description: Mechanizm używany do regulacji lub blokowania obwodu motka.
    clamp_design:
      name: Konstrukcja zacisku
      description: Opisuje rodzaj konstrukcji lub mechanizmu zacisku.
    clamp_sheet_music_clip_features:
      name: Cechy klipsa zaciskowego do nut
      description: Cechy funkcjonalne i ochronne klipsów zaciskowych do nut, np. wyściółka,
        powierzchnia antypoślizgowa, przegub obrotowy.
    clamping_closure_type:
      name: Typ zacisku/zamknięcia
      description: Określa mechanizm używany do napinania lub zabezpieczania tamborka
        wokół tkaniny.
    clarinet_bell_acoustic_design:
      name: Konstrukcja akustyczna czary klarnetu
      description: Opisuje konstrukcję akustyczną/wentylacyjną czary wpływającą na
        reakcję instrumentu i intonację.
    clarinet_bell_adjustment_mechanism:
      name: Mechanizm regulacji czary klarnetu
      description: Opisuje sposób regulacji długości/geometrii czary głosowej.
    clarinet_bell_ring_material:
      name: Materiał pierścienia czary głosowej klarnetu
      description: Określa materiał ochronnego pierścienia/opaski na krawędzi czary
        głosowej klarnetu, jeśli występuje.
    clarinet_bell_tuning_effect:
      name: Wpływ czary głosowej klarnetu na strojenie
      description: Określa sposób, w jaki czara wpływa na strojenie/intonację (szczególnie
        dźwięki gardłowe i niski rejestr) w porównaniu ze standardową czarą.
    clarinet_body_type:
      name: Rodzaj korpusu klarnetu
      description: Wskazuje podstawowy typ konstrukcji korpusu klarnetu A.
    clarinet_bore_type:
      name: Typ menzury klarnetu
      description: Opisuje konstrukcję menzury klarnetu altowego.
    clarinet_cap_style:
      name: Styl kapturka klarnetu
      description: Styl konstrukcji osłony dołączonej do ligatury klarnetowej i/lub
        ustnika (np. odwrócona lub wentylowana).
    clarinet_care_kit_intended_use:
      name: Przeznaczenie zestawu do pielęgnacji klarnetu
      description: Podstawowy kontekst użytkowania zestawu (np. szybkie codzienne
        osuszanie lub dokładne czyszczenie/konserwacja).
    clarinet_included_accessories:
      name: Akcesoria dołączone do klarnetu
      description: Określa zawartość zestawu do klarnetu Bb.
    clarinet_keywork_material:
      name: Materiał mechaniki klarnetu
      description: Określa materiał mechanizmu klap klarnetu (np. mosiądz, alpaka,
        srebrzony).
    clarinet_keywork_plating:
      name: Pokrycie klawiszy klarnetu
      description: Określa powłokę/materiał wykończenia mechanizmu klap klarnetu.
    clarinet_mouthpiece_baffle_profile:
      name: Profil baffla ustnika klarnetowego
      description: Opisuje wewnętrzny profil przegrody/sklepienia ustnika klarnetu,
        który wpływa na jasność i projekcję dźwięku.
    clarinet_mouthpiece_beak_shape:
      name: Kształt dzioba ustnika klarnetowego
      description: Określa zewnętrzny profil/kąt dzioba ustnika, wpływający na komfort
        gry i odczucie zadęcia.
    clarinet_mouthpiece_chamber_size:
      name: Wielkość komory ustnika do klarnetu
      description: Opisuje względny rozmiar komory ustnika klarnetowego (zgodnie ze
        specyfikacją producenta), który może wpływać na barwę dźwięku i opór gry.
    clarinet_mouthpiece_intended_tone:
      name: Docelowy ton ustnika klarnetu
      description: Opisuje ogólne założenie brzmieniowe promowane dla ustnika.
    clarinet_mouthpiece_player_level:
      name: Poziom zaawansowania gracza ustnika klarnetu
      description: Wskazuje typowy docelowy poziom użytkownika ustnika.
    clarinet_reed_cut:
      name: Cięcie stroika klarnetu
      description: Określa typ/profil stroika (np. frezowany lub niefrezowany oraz
        inne style cięcia), wpływający na reakcję i brzmienie.
    clarinet_reed_material_type:
      name: Typ materiału stroika klarnetowego
      description: Wskazuje, z czego wykonany jest stroik (trzcina lub materiał syntetyczny
        oraz typowe podtypy syntetyczne).
    clarinet_thumb_rest_type:
      name: Typ podpórki pod kciuk w klarnecie
      description: Typ/cecha podpórki pod kciuk prawej ręki.
    classical_guitar_string_3rd_string_type:
      name: Typ trzeciej struny gitary klasycznej
      description: Określa, czy struna G (3.) jest gładka (jednowłóknowa), czy owijkowa.
    classical_guitar_string_bass_winding_material:
      name: Materiał owijki strun basowych do gitary klasycznej
      description: Materiał owijki strun basowych (zazwyczaj struny 4–6).
    classical_guitar_string_set_configuration:
      name: Konfiguracja zestawu strun do gitary klasycznej
      description: Określa, czy produkt stanowi kompletny zestaw czy pojedyncze struny
        (zazwyczaj wiolinowe lub basowe) do gitary klasycznej.
    clay_modeling_dough_base_material:
      name: Materiał bazowy gliny i masy modelarskiej
      description: Podstawowy typ formuły/bazy materiału modelarskiego.
    clay_modeling_dough_curing_method:
      name: Metoda utwardzania gliny i masy modelarskiej
      description: Sposób utwardzania materiału (lub zachowania możliwości ponownego
        użycia), określający wymagane narzędzia i typowe zastosowania.
    clay_paintability:
      name: Możliwość malowania gliny
      description: Wskazuje, czy utwardzoną powierzchnię gliny można malować, oraz
        zalecane typy farb.
    clay_primary_composition:
      name: Podstawowy skład gliny
      description: Podstawowy materiał/spoiwo gliny samoutwardzalnej (np. papierowe,
        mineralne).
    clay_shooting_discipline:
      name: Dyscyplina strzelectwa do rzutków
      description: Określa dyscyplinę lub konkurencję strzelectwa do rzutków, do której
        przeznaczony jest produkt.
    cleaner_format:
      name: Forma środka czyszczącego
      description: Opakowanie/format produktu do czyszczenia slajdów.
    cleaner_sanitizer_intended_area:
      name: Docelowy obszar środka czyszczącego/dezynfekującego
      description: Główna część instrumentu dętego blaszanego, którą produkt ma czyścić/dezynfekować.
    cleaning_formula:
      name: Formuła środka czyszczącego
      description: Określa główną grupę chemiczną środka czyszczącego/dezynfekującego
        (nie markę), aby wspierać filtrowanie pod kątem bezpieczeństwa, kompatybilności
        i zastosowania.
    cleaning_task_focus:
      name: Zakres zastosowania środka czyszczącego
      description: Określa główne problemy związane z czyszczeniem, które ma rozwiązywać
        bezwodny środek do mycia.
    cleanup_method:
      name: Metoda czyszczenia
      description: Określa, jak klej ma być usuwany (gdy jest mokry) z rąk/narzędzi/powierzchni.
    clear_glue_application_method:
      name: Metoda aplikacji kleju przezroczystego
      description: Określa styl dozowania/aplikatora dołączony do opakowania kleju
        przezroczystego.
    clear_glue_finish_after_drying:
      name: Wykończenie kleju przezroczystego po wyschnięciu
      description: Opisuje wygląd kleju po wyschnięciu/utwardzeniu (np. krystalicznie
        przezroczysty lub półprzezroczysty, błyszczący lub matowy).
    cleat_bolt_pattern:
      name: Rozstaw śrub bloków
      description: Określa konfigurację śrub buta używaną do mocowania bloków, która
        decyduje o kompatybilności pedałów i butów, np. 2-śrubowe MTB lub 3-śrubowe
        szosowe.
    cleat_compatibility:
      name: Zgodność kołków
      description: Określa, do których systemów pedałów lub bloków pasuje ochraniacz
        na but.
    cleat_finish:
      name: Wykończenie knagi
      description: Określa wykończenie powierzchni/powłokę knagi pomostowej, wpływającą
        na odporność na korozję i wygląd.
    cleat_receptacle_system:
      name: System mocowania bloków
      description: Określa kompatybilny system mocowania kolców/bloków stosowany w
        butach golfowych z kolcami.
    cleat_release_mechanism:
      name: Mechanizm zwalniania kołków
      description: Określa sposób wypinania bloku rowerowego z pedału, np. wypinanie
        pojedyncze lub wielokierunkowe.
    cleat_stud_type:
      name: Typ kolców bloków
      description: Określa konstrukcję lub styl mocowania kolców/korków na podeszwie
        zewnętrznej butów do futbolu amerykańskiego.
    climate_control_module_function:
      name: Funkcja modułu klimatyzacji
      description: Określa podstawową rolę modułu w układzie HVAC pojazdu.
    climbing_hold_mounting_type:
      name: Typ mocowania chwytu wspinaczkowego
      description: Określa sposób mocowania chwytu do ściany lub tablicy treningowej.
    climbing_hold_type:
      name: Typ uchwytu wspinaczkowego
      description: Kategoryzuje kształt lub styl chwytu określający sposób chwytania.
    climbing_protection_device_type:
      name: Typ ochraniacza wspinaczkowego
      description: Określa styl przyrządu asekuracyjnego, np. friend, kość, hak, pomagając
        wspinaczom szybko zawęzić wybór do odpowiedniego sprzętu dla danej formacji
        skalnej lub stylu wspinaczki.
    climbing_rope_middle_marking:
      name: Oznaczenie środka liny wspinaczkowej
      description: Opisuje sposób oznaczenia środka liny (i/lub końców), aby ułatwić
        bezpieczne zjazdy i opuszczanie.
    climbing_rope_treatment:
      name: Impregnacja liny wspinaczkowej
      description: Wskazuje wszelkie wykończenia wodoodporne, suche lub ochronne zastosowane
        na oplocie i/lub rdzeniu liny.
    climbing_rope_type:
      name: Typ liny wspinaczkowej
      description: Klasyfikuje linę według certyfikacji UIAA i przeznaczenia (np.
        dynamiczna pojedyncza, połówkowa, bliźniacza, statyczna, linka pomocnicza),
        umożliwiając klientom szybkie znalezienie odpowiedniej liny do danej aktywności.
    climbing_safety_certifications:
      name: Certyfikaty bezpieczeństwa wspinaczkowego
      description: Wymienia normy wspinaczkowe i bezpieczeństwa przemysłowego spełniane
        przez urządzenie.
    clip_color:
      name: Kolor klipsa
      description: Główny kolor klipsa zaciskowego do nut.
    clip_mechanism_type:
      name: Typ mechanizmu klipsa
      description: Określa mechanizm zamykania stosowany w klipsie na banknoty lub
        portfelu z klipsem, pomagając klientom wybierać między magnesem, sprężyną,
        dźwignią i innymi rozwiązaniami.
    clip_style:
      name: Styl klipsa
      description: Określa konkretny mechanizm klipsa używany do mocowania uchwytu,
        podając informacje o kompatybilności (np. klips aligatorowy, karabińczyk).
    clipper_motor_technology:
      name: Technologia silnika maszynki
      description: Określa konstrukcję silnika zastosowanego w maszynce, wpływającą
        na moc, hałas, trwałość i konserwację.
    closet_configuration:
      name: Konfiguracja garderoby
      description: Definiuje ogólny kształt lub układ systemu garderoby typu walk-in,
        np. w kształcie litery L, U, z wyspą.
    closing_mechanism:
      name: Mechanizm zamykania
      description: Określa sposób zamykania szuflady, np. standardowy, cichy domyk,
        samodomyk lub push-to-open.
    cloth_construction:
      name: Wykonanie ścierki
      description: Wskazuje splot lub wykończenie tkaniny, które wpływają na szybkość
        i trwałość, np. czesankowe lub zgrzebne.
    cloth_thickness:
      name: Grubość tkaniny
      description: Określa klasę grubości/gramatury ściereczki polerskiej.
    club_head_material:
      name: Materiał główki kija golfowego
      description: Określa główny materiał użyty w konstrukcji główki kija.
    clutch_hydraulic_system_type:
      name: Typ hydraulicznego układu sprzęgła
      description: Określa kompatybilność z układem sterowania/hydraulicznym sprzęgła
        (np. hydrauliczne sprzęgło lub zastosowania konwersji linkowej).
    clutch_line_connection_type:
      name: Typ połączenia przewodu sprzęgła
      description: Określa typ końcówki/złącza przewodu sprzęgła (ważne dla kompatybilności
        z pompą sprzęgła, wysprzęglikiem i przewodami sztywnymi).
    clutch_pressure_plate_actuation_type:
      name: Typ aktywacji tarczy dociskowej sprzęgła
      description: Wskazuje, czy sprzęgło jest zwalniane mechanizmem pchającym, czy
        ciągnącym (uruchamianie sprężyny talerzowej).
    clutch_pressure_plate_release_mechanism_type:
      name: Typ mechanizmu zwalniania docisku sprzęgła
      description: Styl interfejsu zwalniania/uruchamiania używany przez docisk.
    clutch_pressure_plate_surface_type:
      name: Typ powierzchni docisku sprzęgła
      description: Typ powierzchni ciernej docisku sprzęgła.
    clutch_slave_cylinder_connection_type:
      name: Typ podłączenia siłownika hydraulicznego wyprzęgającego
      description: Interfejs połączenia przewodu hydraulicznego na wysprzęgliku, np.
        port gwintowany, szybkozłącze, banjo itp.
    clutch_slave_cylinder_mounting_type:
      name: Typ mocowania wysprzęglika sprzęgła
      description: Sposób mocowania wysprzęglika do skrzyni biegów/obudowy sprzęgła,
        np. przykręcany, zatrzaskowy, zintegrowany koncentryczny.
    coating_type:
      name: Typ powłoki
      description: Określa wszelkie zewnętrzne powłoki, polewy lub glazury zastosowane
        na batoniku zbożowym (np. czekolada, jogurt).
    cocking_mechanism:
      name: Mechanizm napinający
      description: Określa podstawową metodę lub urządzenie używane do naciągania
        lub zwalniania naciągu cięciwy kuszy.
    cocktail_garnish_form:
      name: Forma dekoracji koktajlowej
      description: Opisuje sposób podania/przetworzenia dekoracji do użycia, np. świeża
        lub suszona.
    cocktail_mix_variety:
      name: Odmiana mieszanki koktajlowej
      description: Określa konkretny koktajl, do którego przygotowania przeznaczona
        jest mieszanka (np. Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Funkcje serwetek koktajlowych
      description: Podkreśla funkcjonalne, wygodne i ekologiczne cechy serwetek koktajlowych.
    cocktail_pick_tip_style:
      name: Styl końcówki szpadki koktajlowej
      description: Opisuje kształt/cechę końcówki używanej do przebijania lub przytrzymywania
        dekoracji.
    cocktail_pick_top_handle_style:
      name: Styl góry/uchwytu szpadki koktajlowej
      description: Opisuje dekoracyjny kształt górnej części lub uchwytu używanego
        do chwytania albo prezentacji.
    cocktail_type:
      name: Typ koktajlu
      description: Określa konkretny przepis lub styl koktajlu reprezentowany przez
        gotowy produkt (np. Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Materiał uchwytu/patyczka parasolki koktajlowej
      description: Materiał patyczka/szpadki parasolki koktajlowej (z wyłączeniem
        czaszy).
    cocoa_processing_method:
      name: Metoda przetwarzania kakao
      description: Określa sposób przetworzenia kakao w proszku, np. naturalne, alkalizowane,
        czarne kakao.
    cocoa_product_form:
      name: Forma produktu z kakao
      description: Określa fizyczną postać, w jakiej sprzedawany jest produkt kakaowy.
    coconut_husk_status:
      name: Stan łupiny kokosa
      description: Wskazuje zakres usunięcia zewnętrznej łupiny lub skorupy kokosa,
        wpływający na łatwość użycia, przechowywanie i ilość odpadów.
    coconut_maturity_stage:
      name: Stopień dojrzałości kokosa
      description: Określa etap rozwoju kokosa w momencie zbioru, który silnie wpływa
        na smak, zawartość wody i zastosowanie kulinarne (np. do picia lub gotowania).
    coconut_oil_refinement_type:
      name: Typ rafinacji oleju kokosowego
      description: Określa stopień rafinacji lub klasę oleju kokosowego,np. virgin,
        rafinowany, MCT, frakcjonowany.
    coconut_preparation_form:
      name: Forma przygotowania kokosa
      description: Określa sposób przygotowania lub krojenia kokosa (cały, plasterki,
        wiórki, puree itp.), pomagając klientom szybko znaleźć odpowiednią formę do
        przepisów lub przekąsek.
    coffee_bean_species:
      name: Gatunek ziaren kawy
      description: Określa gatunek ziaren kawy użytych w produkcie.
    coffee_beverage_variety:
      name: Odmiana napoju kawowego
      description: Klasyfikuje gotowe do spożycia lub mieszania napoje kawowe według
        stylu.
    coffee_processing_method:
      name: Metoda przetwarzania kawy
      description: Wskazuje technikę obróbki po zbiorach zastosowaną do ziaren kawy.
    coil_material:
      name: Materiał cewki
      description: Określa podstawowy materiał lub typ siatki użyty w grzałce, wpływający
        na smak, trwałość i kompatybilność z kontrolą temperatury.
    coil_spring_design:
      name: Konstrukcja sprężyny śrubowej
      description: Określa charakterystykę/profil sprężyny śrubowej wpływający na
        właściwości jezdne.
    coil_spring_finish_coating:
      name: Wykończenie/powłoka sprężyny śrubowej
      description: Wykończenie powierzchni lub powłoka stosowana w celu ochrony przed
        korozją.
    coil_spring_material:
      name: Materiał sprężyny śrubowej
      description: Podstawowy materiał/skład sprężyny śrubowej.
    coil_system_type:
      name: Typ systemu sprężyn
      description: Opisuje konkretny system cewek lub sprężyn stosowany w odpowiednich
        materacach, taki jak sprężyny kieszeniowe lub sprężyny Bonnell.
    coil_type:
      name: Typ grzałki
      description: Opisuje konstrukcję lub technologię grzałki, wpływającą na produkcję
        pary i smak.
    coin_grade_numismatic:
      name: Stan monety (numizmatyczny)
      description: Standaryzowana ocena stanu monety (np. skala Sheldona lub ocena
        opisowa).
    coin_strike_or_finish:
      name: Typ bicia lub wykończenie monety
      description: Typ bicia lub wykończenie monety, np. obiegowe, lustrzane.
    coin_strike_type:
      name: Typ bicia monety
      description: Opisuje typ bicia/wykończenia monety, np. lustrzane, obiegowe.
    collar_style:
      name: Styl kołnierza
      description: Określa konstrukcję kołnierza lub dekoltu odzieży.
    collectible_gun_accessories_included:
      name: Akcesoria dołączone do kolekcjonerskiej broni palnej
      description: Wymienia akcesoria i dokumentację dołączone do kolekcjonerskiej
        broni palnej, np. kaburę, futerał, bagnet, dokumenty.
    collectible_gun_firing_mechanism:
      name: Mechanizm strzałowy kolekcjonerskiej broni palnej
      description: Określa typ mechanizmu strzałowego/zapłonowego broni dla kolekcjonerskiej
        broni palnej, zwłaszcza egzemplarzy antycznych i historycznych.
    collectible_knife_blade_finish:
      name: Wykończenie ostrza noża kolekcjonerskiego
      description: Opisuje wykończenie/obróbkę powierzchni ostrza pod kątem wyglądu
        (a czasem odporności na korozję).
    color_code_system:
      name: System kodów kolorów
      description: Określa system kodów kolorów używany do numerycznego oznaczania
        koloru nici, np. DMC, Anchor, jeśli dotyczy.
    color_coding_standard:
      name: Standard kodowania kolorów
      description: Wskazuje, czy talerz jest zgodny z międzynarodowym kodem kolorów,
        np. IWF lub IPF, czy z innym schematem.
    color_effect:
      name: Efekt kolorystyczny
      description: Określa specjalne techniki lub efekty kolorystyczne zastosowane
        w doczepianych włosach.
    color_family:
      name: Rodzina kolorów
      description: Ogólna rodzina kolorów tuszu sumi, przydatna, gdy kolor jest zbyt
        szczegółowy, np. ciepła czerń lub niebieskoczarny.
    color_finish:
      name: Wykończenie kolorystyczne
      description: Określa wykończenie widocznych elementów osłony dłoni, np. matowe
        lub błyszczące, gdy sam kolor nie wystarcza.
    coloring_finish:
      name: Wykończenie kolorystyczne
      description: Określa wykończenie wizualne lub efekt specjalny uzyskiwany przez
        barwienie, np. metaliczne lub neonowe.
    comb_material:
      name: Materiał grzebienia
      description: Materiał grzebienia harmonijki, czyli korpusu tworzącego komory
        powietrzne.
    comb_type:
      name: Rodzaj grzebienia
      description: Klasyfikuje zgrzebła i grzebienie do pielęgnacji koni według ich
        podstawowego stylu funkcjonalnego, np. zgrzebło, grzebień do grzywy, grzebień
        do przerywania grzywy, pomagając kupującym szybko znaleźć odpowiednie narzędzie
        do konkretnych potrzeb pielęgnacyjnych.
    combat_shorts_cut_style:
      name: Krój spodenek do sportów walki
      description: Wskazuje krój lub fason charakterystyczny dla spodenek do sportów
        walki, np. wysokie wycięcie, krój retro, kompresyjne.
    comic_creator_role:
      name: Rola twórcy komiksu
      description: Określa przypisaną rolę twórcy istotną dla oferty, np. scenarzysta,
        rysownik.
    commemorative_coin_finish:
      name: Wykończenie monety okolicznościowej
      description: Opisuje typ bicia/wykończenia monety okolicznościowej.
    commemorative_coin_mint_mark:
      name: Znak mennicy monety okolicznościowej
      description: Wskazuje znak mennicy na monecie lub jego brak.
    commemorative_subject:
      name: Temat upamiętnienia
      description: Główny temat upamiętnienia (wydarzenie, osoba, miejsce, rocznica,
        organizacja itp.).
    commercial_vehicle_class:
      name: Klasa pojazdu użytkowego
      description: Klasa pojazdu użytkowego oparta na DMC (GVWR) stosowana do przeglądania
        i filtrowania według kategorii wagowej.
    compass_damping_medium:
      name: Medium tłumiące kompasu
      description: Określa medium używane do stabilizacji ruchu igły wewnątrz kapsuły
        kompasu.
    compass_illumination_type:
      name: Typ podświetlenia kompasu
      description: Określa, w jaki sposób oznaczenia kompasu są widoczne w warunkach
        słabego oświetlenia, np. farba luminescencyjna, tryt, podświetlenie LED.
    compass_mounting_style:
      name: Styl mocowania kompasu
      description: Opisuje sposób noszenia, przenoszenia lub instalacji kompasu.
    compass_scale_units:
      name: Jednostki skali kompasu
      description: Określa jednostki miary (stopnie, tysięczne lub oba) oznaczone
        na obudowie kompasu.
    compatible_abs_system:
      name: Kompatybilny system ABS
      description: Wskazuje, czy pompa hamulcowa jest przeznaczona do pojazdów wyposażonych
        w ABS.
    compatible_adapter_brand:
      name: Kompatybilna marka adaptera
      description: Określa markę główki kija golfowego, do której pasuje fabrycznie
        skonfigurowany adapter shaftu.
    compatible_airbag_system_type:
      name: Typ kompatybilnego systemu poduszek powietrznych
      description: Wskazuje generację/zestaw funkcji systemu poduszek powietrznych,
        z którym część jest kompatybilna, np. jednostopniowy lub dwustopniowy.
    compatible_amplifier_fit_method:
      name: Metoda dopasowania do kompatybilnego wzmacniacza
      description: Określa sposób definiowania kompatybilności pokrowca/futerału (uniwersalne
        dopasowanie, dedykowane do modelu lub według wymiarów).
    compatible_apparatus:
      name: Kompatybilna aparatura
      description: Określa przyrząd gimnastyczny lub aktywność, do których przeznaczone
        są gripy.
    compatible_archery_tool:
      name: Kompatybilne narzędzie łucznicze
      description: Określa podstawowe narzędzie lub element wyposażenia łuczniczego,
        z którym przeznaczone jest do współpracy akcesorium.
    compatible_axle_size:
      name: Zgodny rozmiar osi
      description: Określa średnicę piasty/osi lub standard gwintu, do którego przeznaczony
        jest peg (np. 10 mm/3⁄8 cala, 14 mm, 3/8 cala 26 TPI).
    compatible_axle_type:
      name: Zgodny typ osi
      description: Określa standardy mocowania tylnej osi obsługiwane przez trenażer,
        takie jak szybkozamykacz lub rozmiary osi przelotowej.
    compatible_axle_weight_rating:
      name: Kompatybilna nośność osi
      description: Określa dopuszczalną masę osi przyczepy, do której przeznaczony
        jest zespół hamulca przyczepy.
    compatible_bait_type:
      name: Zgodny rodzaj przynęty
      description: Określa typy przynęt wędkarskich, z którymi kompatybilne jest wiertło
        do przynęt, aby wędkarze mogli wybrać narzędzie pasujące do preferowanej przynęty.
    compatible_bass_scale_length:
      name: Kompatybilna długość skali basu
      description: Wskazuje długości menzury basu, do których przeznaczony jest zestaw
        strun, co jest ważne dla odpowiedniej długości owijki i dopasowania.
    compatible_battle_top_system:
      name: Kompatybilny system bączków bitewnych
      description: Określa ekosystem lub serię produktów bączków bitewnych, do których
        przeznaczony jest bączek, aby zapewnić kompatybilność części i areny.
    compatible_bb_size:
      name: Zgodny rodzaj BB
      description: Wskazuje średnicę kulek airsoftowych obsługiwaną przez produkt.
    compatible_bed_frame_style:
      name: Kompatybilny typ ramy łóżka
      description: Określa styl łóżka lub ramy, do którego przeznaczone jest akcesorium.
    compatible_bicycle_tire_type:
      name: Kompatybilny typ opony rowerowej
      description: Określa, z jakimi typami opon rowerowych produkt może być używany
        do naprawy lub uszczelniania.
    compatible_bike_component:
      name: Kompatybilny komponent rowerowy
      description: Określa, który element roweru jest przeznaczony do serwisowania
        za pomocą narzędzia lub produktu.
    compatible_billiard_game:
      name: Kompatybilna gra bilardowa
      description: Określa formaty gry bilardowej, do których przeznaczony jest trójkąt,
        aby klienci wybrali trójkąt pasujący do ich gry.
    compatible_billiard_table_size:
      name: Kompatybilny rozmiar stołu bilardowego
      description: Określa standardowe długości stołu, do których pasuje pokrowiec,
        aby kupujący wybrali pokrowiec o odpowiednim rozmiarze do stołu bilardowego.
    compatible_bit_type:
      name: Zgodny typ wiertła
      description: Style wędzideł, z którymi można stosować osłonę.
    compatible_blade_hosel:
      name: Zgodna szyjka ostrza
      description: Określa styl gniazda/taperu ostrza akceptowany przez shaft, zapewniając
        prawidłowe dopasowanie shaftu i ostrza.
    compatible_blade_system:
      name: Zgodny układ ostrzy
      description: Wskazuje system/format wymiennych ostrzy obsługiwany przez nóż,
        np. standardowe ostrze modelarskie nr 11, ostrza segmentowe.
    compatible_boat_weaving_shuttle_loom:
      name: Kompatybilne czółenko tkackie do krosna łódkowego
      description: Określa, z jakimi typami krosien przeznaczone jest do użycia czółenko
        tkackie.
    compatible_bobbin_type:
      name: Zgodny typ cewki
      description: Określa, jaki typ szpulki/bębenka przeznaczone jest do użycia z
        czółenkiem tkackim.
    compatible_bottle_mouth:
      name: Kompatybilny typ gwintu butelki
      description: Typ lub średnica gwintu butelki, do którego pasuje słomka lub nakrętka.
    compatible_bow_attachment_system:
      name: Kompatybilny system mocowania łuku
      description: Wskazuje interfejs ramion lub akcesoriów, do którego przeznaczona
        jest część, np. ILF, mocowanie śrubowe, szybki demontaż.
    compatible_bow_crossbow_type:
      name: Kompatybilny typ łuku/kuszy
      description: Określa typ łuku lub kuszy, do którego przeznaczone jest akcesorium.
    compatible_brake_fluid:
      name: Zgodny płyn hamulcowy
      description: Specyfikacja DOT płynu hamulcowego, z którą kompatybilne są uszczelnienia/materiały
        pompy hamulcowej.
    compatible_brake_pad:
      name: Kompatybilny klocek hamulcowy
      description: Wskazuje, do których mieszanek klocków hamulcowych zatwierdzona
        jest tarcza, zapewniając bezpieczeństwo i optymalne zużycie.
    compatible_brake_service_system:
      name: Kompatybilny system serwisowania hamulców
      description: Określa, czy część jest przeznaczona do hamulców tarczowych, bębnowych
        czy obu typów.
    compatible_brake_system:
      name: Zgodny układ hamulcowy
      description: Określa kluczowe informacje o kompatybilności systemowej dotyczące
        użycia płynu hamulcowego.
    compatible_brake_type:
      name: Zgodny typ hamulca
      description: Określa typ hamulców kompatybilnych z bagażnikiem, np. tarczowe
        lub obręczowe.
    compatible_brass_instrument_finish:
      name: Zgodne wykończenie instrumentu dętego blaszanego
      description: Określa, do których wykończeń instrumentów dętych blaszanych środek
        czyszczący jest bezpieczny i nie uszkadza powierzchni.
    compatible_building_toy_system:
      name: Kompatybilny system klocków konstrukcyjnych
      description: Wskazuje system/standard konstrukcyjny, z którym zabawka jest kompatybilna,
        lub równoważny rozmiar, np. kompatybilny z LEGO lub własny.
    compatible_capo_fretboard_radius:
      name: Kompatybilny promień podstrunnicy dla kapodastra
      description: Określa promień/profil podstrunnicy, do którego przeznaczony jest
        kapodaster, aby zapewnić optymalny docisk i stabilność strojenia.
    compatible_capo_number_of_strings:
      name: Kompatybilna liczba strun kapodastra
      description: Wskazuje, ile strun ma dociskać kapodaster, co jest przydatne w
        przypadku instrumentów 6-, 7-, 8-, 12-strunowych i specjalistycznych.
    compatible_cardio_machine_type:
      name: Zgodny typ urządzeń do ćwiczeń aerobowych
      description: Określa typ urządzenia cardio, z którym przeznaczone jest do współpracy
        akcesorium lub część.
    compatible_chain_link_type:
      name: Kompatybilny typ ogniwa łańcucha
      description: Określa styl ogniwa łańcucha obsługiwany przez narzędzie, np. standardowe,
        półogniwo, spinka itp.
    compatible_chain_size:
      name: Zgodny rozmiar łańcucha
      description: Określa standardy szerokości lub skoku łańcucha (np. 1/8 cala,
        3/32 cala) obsługiwane przez narzędzie.
    compatible_chain_width:
      name: Kompatybilna szerokość łańcucha
      description: Wskazuje, z jakimi rozmiarami łańcucha współpracuje wolnobieg.
    compatible_chip_denomination:
      name: Kompatybilny nominał żetonu
      description: Wskazuje, dla jakich nominałów żetonów tacka/futerał posiada oznaczone
        lub dedykowane miejsca (lub do organizacji których jest przeznaczony).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatybilna ligatura ustnika klarnetu
      description: Określa standard dopasowania ligatury lub uwagi dotyczące kompatybilności
        z ustnikiem.
    compatible_classical_guitar_string_scale_length:
      name: Kompatybilna długość menzury strun do gitary klasycznej
      description: Docelowa długość menzury gitary/długości strun kompatybilnych z
        zestawem.
    compatible_clay_target_size:
      name: Kompatybilny rozmiar rzutka
      description: Wymienia rozmiary lub kształty rzutków obsługiwane przez wyrzutnię
        w celu zapewnienia prawidłowego dopasowania i działania.
    compatible_cleat_system:
      name: Zgodny system korków
      description: Określa interfejs bloku lub układ śrub obsługiwany przez pedał,
        aby rowerzyści mogli dopasować buty do właściwego systemu.
    compatible_clipless_pedal_system:
      name: Kompatybilny system pedałów zatrzaskowych
      description: Określa konkretny standard pedału zatrzaskowego/bloku, z którym
        produkt ma współpracować.
    compatible_clutch_type:
      name: Kompatybilny typ sprzęgła
      description: Kompatybilność interfejsu sprzęgła z kołem zamachowym (jeśli dotyczy).
    compatible_coffee_pod_system:
      name: Zgodny system saszetek z kawą
      description: Określa ekspres do kawy lub system parzenia, do którego przeznaczone
        są saszetki lub kapsułki.
    compatible_construction_set_system:
      name: Kompatybilny system klocków konstrukcyjnych
      description: Wskazuje system konstrukcyjny/ekosystem marki, z którym zestaw
        jest kompatybilny, np. kompatybilny z LEGO, kompatybilny z DUPLO.
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatybilny peg/stojak do klarnetu kontrabasowego
      description: Wskazuje wymagany interfejs stojaka/kołka lub styl podparcia.
    compatible_coolant_chemistry:
      name: Kompatybilna chemia płynu chłodniczego
      description: Określa rodziny chemiczne płynów chłodzących, z którymi dodatek
        jest kompatybilny.
    compatible_cooling_system_material:
      name: Kompatybilny materiał układu chłodzenia
      description: Określa układy chłodzenia/materiały, dla których płukanka do chłodnicy
        jest bezpieczna, np. chłodnice aluminiowe, układy z różnych metali.
    compatible_crib_format:
      name: Zgodny format łóżeczka
      description: Definiuje ogólną kategorię rozmiaru lub kształtu materaca albo
        prześcieradła, do której pasuje akcesorium.
    compatible_cross_stitch_fabric_count:
      name: Kompatybilna gęstość tkaniny do haftu krzyżykowego
      description: Zalecane gęstości tkaniny do wykonania wzoru.
    compatible_cross_stitch_frame:
      name: Kompatybilna rama do haftu krzyżykowego
      description: 'Wskazuje, z czym rama jest przeznaczona do użytku: do pracy w
        ręku, ze stojakiem stołowym, ze stojakiem podłogowym lub uniwersalnie.'
    compatible_crossbar:
      name: Kompatybilna belka poprzeczna
      description: Kompatybilność bagażnika z belkami poprzecznymi bagażnika dachowego
        pojazdu, jeśli jest montowany na dachu, w tym standardy kształtu/profilu belek.
    compatible_cycling_cleat:
      name: Kompatybilny blok rowerowy
      description: Określa system bloków lub pedałów, z którym mają współpracować
        buty rowerowe.
    compatible_cymbal_size:
      name: Zgodny rozmiar talerza perkusyjnego
      description: Określa zamierzoną lub maksymalną średnicę talerza, do której pasuje
        futerał; jest to kompatybilność rozmiaru talerza, a nie zewnętrzna średnica
        futerału.
    compatible_device_type:
      name: Zgodny typ urządzenia
      description: Określa rodzaj urządzenia, które uchwyt jest przeznaczony do podtrzymywania
        (np. monitor/telewizor, tablet, smartfon, przenośny odtwarzacz DVD).
    compatible_dock_structure_type:
      name: Kompatybilny typ konstrukcji pomostu
      description: Typ konstrukcji pomostu, do którego przeznaczone są stopnie.
    compatible_dough_type:
      name: Zgodny rodzaj ciasta
      description: Określa typy/marki masy, z którymi narzędzia są przeznaczone do
        pracy, np. standardowa masa do zabawy, glina modelarska.
    compatible_drawing_ink_surface:
      name: Kompatybilna powierzchnia do tuszu rysunkowego
      description: Wskazuje zalecane powierzchnie/podłoża zapewniające najlepsze działanie.
    compatible_drivetrain_brand:
      name: Zgodna marka układu przeniesienia napędu
      description: Wymienia marki napędów lub układów hamulcowych, z którymi kompatybilna
        jest linka.
    compatible_drivetrain_speeds:
      name: Kompatybilna liczba przełożeń napędu
      description: Określa liczbę przełożeń napędu, np. 10-rzędowy, obsługiwaną przez
        mechanizm korbowy lub tarczę.
    compatible_equipment:
      name: Zgodne wyposażenie
      description: Określa typ sprzętu do sportów zimowych, który imadło ma utrzymywać.
    compatible_evap_system:
      name: Zgodny układ redukcji emisji oparów paliwa (EVAP)
      description: Wskazuje, czy korek wlewu paliwa jest zaprojektowany tak, aby spełniać
        wymagania układu EVAP, np. uszczelnienie zgodne ze specyfikacją OEM, i ograniczać
        zapalanie się kontrolki silnika.
    compatible_exercise_bike_style:
      name: Kompatybilny styl roweru treningowego
      description: Wskazuje, do jakich typów rowerów treningowych przeznaczone jest
        akcesorium lub część zamienna.
    compatible_fencing_weapon:
      name: Kompatybilna broń szermiercza
      description: Określa, do jakiej broni lub dyscypliny szermierczej przeznaczona
        jest kurtka lub lamé.
    compatible_fiber_type:
      name: Zgodny typ włókien
      description: Główne typy włókien, które gręplarka bębnowa ma skutecznie przetwarzać.
    compatible_fin_box_system:
      name: Zgodny układ stateczników
      description: Określa skrzynkę statecznika lub system mocowania, do którego pasuje
        statecznik, pomagając surferom kupić stateczniki kompatybilne z deską surfingową,
        np. FCS II, Futures, US Box.
    compatible_fingerboard_radius:
      name: Zgodny promień fingerboardu
      description: Określa promień podstrunnicy, płaski, zakrzywiony lub złożony,
        do którego dopasowany jest kapodaster, aby zapewnić równomierny docisk i ograniczyć
        brzęczenie.
    compatible_finish_type:
      name: Zgodny typ wykończenia
      description: Wskazuje, dla jakich typów wykończenia instrumentów spray jest
        bezpieczny według deklaracji producenta.
    compatible_fishing_reel_type:
      name: Kompatybilny typ kołowrotka wędkarskiego
      description: Określa styl kołowrotka wędkarskiego, do którego pasuje lub z którym
        współpracuje akcesorium (np. spinningowy, baitcastingowy, muchowy).
    compatible_fly_line_weight:
      name: Kompatybilna waga linki muchowej
      description: Wskazuje wagi linek muchowych AFTMA, które może pomieścić szpula.
    compatible_flywheel_type:
      name: Zgodny typ koła zamachowego
      description: Określa typ koła zamachowego, z którym docisk sprzęgła jest przeznaczony
        do użytku.
    compatible_football_kick_type:
      name: Kompatybilny typ kopnięcia futbolowego
      description: Określa sytuacje kopnięcia, które produkt ma obsługiwać, np. wykop
        początkowy, kopnięcie z pola, pomagając sportowcom szybko znaleźć odpowiedni
        sprzęt.
    compatible_fuel_system_type:
      name: Zgodny typ układu paliwowego
      description: Określa układ zasilania paliwem, do którego przeznaczony jest środek
        czyszczący.
    compatible_gas_type:
      name: Zgodny typ gazu
      description: Określa typ sprężonego gazu, do którego przechowywania przeznaczony
        jest zbiornik paintballowy.
    compatible_gel_wax_additives:
      name: Kompatybilne dodatki do wosku żelowego
      description: Określa typy dodatków kompatybilne z tym woskiem żelowym, np. typ
        barwnika, elementy zatapiane.
    compatible_glaze_layering:
      name: Kompatybilne nakładanie warstw szkliwa
      description: Określa, czy szkliwo jest przeznaczone do nakładania warstwowego
        z innymi szkliwami w celu uzyskania efektów.
    compatible_golf_bag_type:
      name: Zgodny typ torby golfowej
      description: Wskazuje, do jakich typów toreb golfowych pasuje pokrowiec lub
        futerał.
    compatible_ground_polarity:
      name: Kompatybilna polaryzacja masy
      description: Wskazuje, czy regulator napięcia jest przeznaczony do pojazdów
        z ujemnym lub dodatnim biegunem masy (lub jest niewrażliwy na polaryzację).
    compatible_guitar_body_shape:
      name: Kompatybilny kształt korpusu gitary
      description: Wskazuje, do jakiego typu/kształtu korpusu gitary przeznaczony
        jest futerał.
    compatible_guitar_case:
      name: Kompatybilny futerał gitarowy
      description: Określa style futerałów gitarowych, do których nawilżacz jest przeznaczony
        i w których działa prawidłowo.
    compatible_guitar_scale_length:
      name: Zgodna długość skali gitary
      description: Wskazuje długości menzury gitary, do których przeznaczony jest
        zestaw strun, na podstawie długości owijki/całkowitej długości.
    compatible_gun_platform:
      name: Kompatybilna platforma broni
      description: Określa platformę działania lub źródło zasilania, z którym produkt
        jest kompatybilny, np. AEG, GBB, HPA.
    compatible_hair_length:
      name: Kompatybilna długość włosów
      description: Określa maksymalną długość lub objętość włosów, jaką nakrycie głowy
        może wygodnie pomieścić.
    compatible_head_and_neck_restraint_system:
      name: Kompatybilny system ochrony głowy i szyi
      description: Wskazuje, czy kask ma punkty kotwiczenia i/lub jest kompatybilny
        z systemami ochrony głowy i szyi, np. HANS, w tym status dołączenia/montażu
        słupków kotwiczących.
    compatible_helmet_certification_standard:
      name: Kompatybilna norma certyfikacji kasku
      description: Wskazuje standard bezpieczeństwa kasku lub kontekst certyfikacji,
        który akcesorium ma wspierać, np. zrywki do użytku wyścigowego często odnoszą
        się do konkretnych przepisów organizacji sankcjonujących.
    compatible_helmet_shell_size:
      name: Kompatybilny rozmiar skorupy kasku
      description: Wskazuje rozmiary skorupy kasku, do których pasuje wymienna część
        wewnętrzna; rozmiary skorupy często odpowiadają zakresom rozmiarów, np. XS–S,
        M, L–XL.
    compatible_helmet_size:
      name: Zgodny rozmiar kasku
      description: Wskazuje rozmiary kasków, z którymi kompatybilna jest maska ochronna.
    compatible_helmet_type:
      name: Zgodny typ kasku
      description: Kategoria kasku, z którą ma współpracować stabilizator szyi.
    compatible_hitch_receiver_size:
      name: Kompatybilny rozmiar gniazda haka holowniczego
      description: Rozmiar otworu gniazda haka holowniczego, do którego pasuje akcesorium,
        w przypadku akcesoriów do bagażników montowanych na haku.
    compatible_hook_size:
      name: Zgodna wielkość haka
      description: Systemy rozmiarów szydełek i/lub zakres rozmiarów, do których pasuje
        organizer, np. rozmiary literowe/liczbowe US, zakres metryczny w mm.
    compatible_horse_coat_type:
      name: Kompatybilny typ sierści konia
      description: Określa cechy sierści konia, do których najlepiej nadaje się zgrzebło
        do usuwania podszerstka, np. gruba sierść zimowa lub wrażliwa sierść.
    compatible_host_platform:
      name: Zgodna hostowana platforma
      description: Określa platformy hosta lub typy urządzeń, z którymi kompatybilny
        jest kontroler padów, np. Windows, macOS, iOS, Android, albo czy może działać
        samodzielnie bez komputera.
    compatible_inflation_gas:
      name: Kompatybilny gaz do pompowania
      description: Określa, do jakiego gazu przeznaczony jest balon (powietrze, hel
        lub oba).
    compatible_injection_type:
      name: Kompatybilny typ wtrysku
      description: Wskazuje, do jakiego układu wtryskowego przeznaczony jest środek
        czyszczący.
    compatible_instrument_surface_material:
      name: Kompatybilna powierzchnia/materiał instrumentu
      description: Wskazuje powierzchnie/materiały instrumentów, do których przeznaczona
        jest pasta polerska.
    compatible_intercom_system:
      name: Zgodny system interkomu
      description: Wskazuje gotowość/kompatybilność kasku z montażem lub instalacją
        systemu interkomu/komunikacji w kasku.
    compatible_interior_material:
      name: Zgodny materiał wewnętrzny
      description: Wskazuje, dla jakich materiałów wnętrza pojazdu odplamiacz jest
        bezpieczny/skuteczny (np. wykładzina, tapicerka materiałowa, skóra, winyl).
    compatible_kayak_type:
      name: Zgodny typ kajaka
      description: Wymienia ogólne typy kajaków, do których można zamontować zestaw
        żaglowy.
    compatible_license_plate_hole_pattern:
      name: Kompatybilny układ otworów tablicy rejestracyjnej
      description: Określa konfigurację otworów montażowych obsługiwaną przez mocowanie/uchwyt,
        po stronie pojazdu i/lub po stronie tablicy.
    compatible_license_plate_size:
      name: Kompatybilny rozmiar tablicy rejestracyjnej
      description: Wskazuje regionalne lub wymiarowe rozmiary tablic rejestracyjnych,
        do których pasuje uchwyt/mocowanie.
    compatible_loom:
      name: Kompatybilne krosno
      description: Określa typ(y) krosna, z którymi przeznaczony jest do użycia płaski
        ubijak tkacki.
    compatible_loom_type:
      name: Zgodny typ krosna
      description: Wskazuje konfigurację tkacką, z którą przeznaczony jest do użycia
        ubijak (np. krosna sztywno-niciowe lub gobelinowe).
    compatible_machine_type:
      name: Zgodny typ maszyny
      description: Wskazuje, z jakim typem konfiguracji quiltingowej współpracuje
        rama (tylko quilting ręczny, domowa maszyna do szycia, longarm quilting machine).
    compatible_mast_type:
      name: Zgodny typ masztu
      description: 'Określa średnice masztów, do których przeznaczony jest żagiel:
        reduced diameter (RDM), standard diameter (SDM) lub oba.'
    compatible_model_system_train_scale:
      name: Kompatybilny system modeli (skala kolejowa)
      description: Określa skalę/system kolejek modelowych, do których pasuje akcesorium
        (np. HO, N, O).
    compatible_mounting_surface:
      name: Kompatybilna powierzchnia montażowa
      description: Powierzchnia lub obiekt, do którego przeznaczony jest zacisk klipsa.
    compatible_mouthpiece_patch:
      name: Kompatybilna naklejka na ustnik
      description: Wskazuje, czy ustnik jest przeznaczony do używania z nakładkami/podkładkami
        na ustnik oraz sugerowany zakres grubości podkładek.
    compatible_mouthpiece_type:
      name: Zgodny typ ustnika
      description: Wskazuje typ ustnika/czopu ustnika, do którego przystosowany jest
        mellofon, zwykle z odbiornikiem typu waltorniowego lub trąbkowego w zależności
        od modelu.
    compatible_neck_profile_width:
      name: Kompatybilny profil/szerokość gryfu
      description: Wskazuje klasę profilu/szerokości gryfu, do której przeznaczony
        jest kapodaster (np. wąski elektryczny lub szeroki klasyczny).
    compatible_needle_size:
      name: Zgodna wielkość igły
      description: Wskazuje rozmiary/typy igieł, do których przeznaczone jest etui
        (np. igły hafciarskie, gobelinowe, długości igieł ręcznych).
    compatible_needle_system:
      name: Zgodny system igły
      description: System(y) igieł kompatybilnych z maszyną (np. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatybilny mechanizm hamulca postojowego
      description: Wskazuje, czy zacisk jest przeznaczony do współpracy ze zintegrowanym
        mechanizmem hamulca postojowego.
    compatible_pedal_instrument_type:
      name: Kompatybilny typ instrumentu pedałowego
      description: Określa, z czym pedał jest przeznaczony do użytku, np. pianino
        cyfrowe, keyboard/syntezator, kontroler MIDI.
    compatible_pedal_type:
      name: Zgodny typ pedału
      description: Wskazuje styl lub system pedału, do którego pasuje pasek lub klips,
        np. platformowy, SPD, Look Keo.
    compatible_pin_type:
      name: Zgodny typ styku
      description: Określa typ pinów, z którymi przeznaczona jest do użycia mata (lub
        czy można ją przypinać).
    compatible_pipe_filter_size:
      name: Kompatybilny rozmiar filtra do fajki
      description: Wskazuje rozmiar lub styl filtra, który fajka ma przyjmować, albo
        że filtr nie jest wymagany.
    compatible_plate_size:
      name: Zgodna wielkość płyty
      description: Wymiary płyt balistycznych lub standardowe rozmiary kompatybilne
        z kamizelką.
    compatible_play_vehicle_scale:
      name: Zgodna skala pojazdu do zabawy
      description: Wskazuje skalę zabawki, do której pasuje akcesorium, np. 1:64,
        poprawiając dopasowanie/kompatybilność dla kolekcjonerów i systemów torów.
    compatible_playing_surface:
      name: Zgodna powierzchnia do zabawy
      description: Wskazuje typ boiska lub nawierzchni, do których przeznaczone są
        buty do futbolu amerykańskiego.
    compatible_pole_dimensions:
      name: Kompatybilne wymiary słupka
      description: Określa rozmiar przekroju poprzecznego drążka, do którego pasuje
        akcesorium.
    compatible_pole_shape:
      name: Kompatybilny kształt słupka
      description: Określa kształt przekroju słupka lub kolumny, do którego pasuje
        osłona.
    compatible_power_steering_system:
      name: Zgodny układ wspomagania kierownicy
      description: Wskazuje typy układów kierowniczych, do których przeznaczony jest
        płyn.
    compatible_powerplant_type:
      name: Kompatybilny typ napędu
      description: Wskazuje system napędowy wiatrówki BB, do którego przeznaczona
        jest część (np. sprężynowo-tłokowy, CO2, PCP).
    compatible_presser_foot:
      name: Kompatybilna stopka dociskowa
      description: Określa system mocowania/kompatybilności stopki dociskowej obsługiwany
        przez maszynę do szycia (np. zatrzaskowy lub przykręcany; niski/wysoki/skośny
        trzpień). Użyj „Uniwersalny/Wiele”, jeśli obsługiwanych jest wiele systemów
        lub dołączono adaptery.
    compatible_protective_gear:
      name: Kompatybilny sprzęt ochronny
      description: Określa, z jakim innym wyposażeniem ochronnym ma współpracować
        stabilizator szyi.
    compatible_protective_gear_integration:
      name: Kompatybilna integracja z wyposażeniem ochronnym
      description: Opisuje sposób noszenia lub integracji ochraniacza z innym sprzętem,
        np. kieszeń na wkład, samodzielny pasek zakładany.
    compatible_punching_bag_type:
      name: Kompatybilny typ worka treningowego
      description: Określa style worków treningowych lub bokserskich, z którymi produkt
        jest kompatybilny.
    compatible_racing_discipline:
      name: Kompatybilna dyscyplina wyścigowa
      description: Dyscyplina motorsportowa, do której przeznaczony/certyfikowany
        jest kask.
    compatible_rc_scale:
      name: Kompatybilna skala RC
      description: Wskazuje proporcję skali RC, np. 1:10, do której pasuje akcesorium
        lub część.
    compatible_recorder_size:
      name: Zgodny rozmiar fletu prostego
      description: Określa rozmiary fletu prostego, do których przeznaczone jest etui.
    compatible_recorder_type:
      name: Zgodny typ fletu prostego
      description: Określa typ fletu prostego (rodzina/rozmiar), z którym kompatybilne
        jest akcesorium (np. sopranowy, altowy).
    compatible_reed_cut:
      name: Zgodny krój stroika
      description: Określa styl cięcia stroika, z którym przeznaczona jest do współpracy
        ligatura (np. frezowany/French cut lub niefrezowany/American cut).
    compatible_reed_type:
      name: Zgodny typ stroika
      description: Określa typ/cięcie stroika, do którego przeznaczony jest ustnik.
    compatible_reel_type:
      name: Zgodny typ rolki
      description: Określa styl kołowrotka wędkarskiego, do którego pasuje torba,
        futerał lub pokrowiec.
    compatible_refrigerant_type:
      name: Kompatybilny typ czynnika chłodniczego
      description: Wskazuje czynnik chłodniczy, z którym ma być używany parownik klimatyzacji.
    compatible_ride_equipment:
      name: Zgodne wyposażenie jeździeckie
      description: Typy sportów na sprzęcie kołowym, do których przeznaczona jest
        rampa.
    compatible_roof_height:
      name: Kompatybilna wysokość dachu
      description: 'Wskazuje profil dachu, do którego przeznaczony jest pokrowiec:
        standardowy lub przedłużony/wysoki dach.'
    compatible_roof_rail_type:
      name: Kompatybilny typ relingu dachowego
      description: Określa konfigurację dachu, do której ma być mocowany bazowy system
        bagażnika.
    compatible_rope_count:
      name: Kompatybilna liczba lin
      description: Określa konfigurację lin ringu bokserskiego, do której przeznaczona
        jest część, np. ringi 3-linowe, 4-linowe lub uniwersalne dopasowanie.
    compatible_rope_type:
      name: Zgodny typ liny
      description: Określa konstrukcje lin, które mogą być używane z urządzeniem.
    compatible_saddle_type:
      name: Zgodny typ siodła
      description: Określa styl siodła lub dyscyplinę jeździecką, do której przeznaczone
        jest akcesorium, zapewniając kompatybilność z siodłami angielskimi, westernowymi
        i innymi.
    compatible_saxophone_size:
      name: Zgodny rozmiar saksofonu
      description: Wskazuje rozmiar saksofonu, z którym produkt jest kompatybilny,
        np. sopranowy, altowy, tenorowy.
    compatible_saxophone_type:
      name: Zgodny typ saksofonu
      description: Określa saksofon, do którego pasuje ligatura/kapturek.
    compatible_scale_length:
      name: Zgodna długość skali
      description: Określa zakres długości menzury gitary, do którego przeznaczone
        są struny, np. krótka menzura, standardowa, barytonowa.
    compatible_seat_airbag:
      name: Kompatybilna poduszka powietrzna siedzenia
      description: Wskazuje, czy siedzenie obsługuje/zawiera boczne poduszki powietrzne
        lub jest kompatybilne z pojazdami wyposażonymi w poduszki powietrzne montowane
        w siedzeniach.
    compatible_seating_capacity:
      name: Kompatybilna liczba miejsc siedzących
      description: Określa liczbę siedzeń lub konfigurację, do której pasuje akcesorium.
    compatible_sensor_port_type:
      name: Kompatybilny typ portu czujnika
      description: Określa, czy miska olejowa obsługuje czujniki poziomu oleju i/lub
        temperatury oleju oraz typ portu, jeśli dotyczy.
    compatible_shifter_type:
      name: Zgodny typ manetki
      description: Określa typ lub konfigurację lewarka zmiany biegów, do którego
        przeznaczony jest mieszek zmiany biegów.
    compatible_shis:
      name: Kompatybilny SHIS
      description: Wymienia kody Standardized Headset Identification System (SHIS),
        do których pasuje część, np. IS42, EC34, ZS44/28.6.
    compatible_skating_discipline:
      name: Zgodna dyscyplina łyżwiarska
      description: Wskazuje dyscypliny łyżwiarstwa, do których pasuje część lub akcesorium.
    compatible_snowshoe_deck_type:
      name: Kompatybilny typ platformy rakiet śnieżnych
      description: Określa styl ramy lub platformy rakiet śnieżnych, z którym kompatybilne
        jest wiązanie.
    compatible_special_effects_lighting_features:
      name: Kompatybilne funkcje oświetlenia efektów specjalnych
      description: Wyróżnia typowe znaczniki możliwości wpływające na decyzje zakupowe
        dotyczące lamp efektowych, poza kolorem/wzorem, takie jak łączenie jednostek
        lub reakcja na dźwięk.
    compatible_spinning_wheel_drive_system:
      name: Kompatybilny system napędu kołowrotka przędzalniczego
      description: Określa system(y) napędowe kołowrotka przędzalniczego obsługiwane
        przez akcesorium.
    compatible_spoke_gauge:
      name: Kompatybilna grubość szprych
      description: Wskazuje rozmiary grubości drutu szprych kompatybilne z gwintami
        nypli, umożliwiając prawidłowe dopasowanie szprych i nypli.
    compatible_steering_wheel_airbag:
      name: Kompatybilna poduszka powietrzna kierownicy
      description: Wskazuje, czy kierownica obsługuje zachowanie fabrycznego modułu
        poduszki powietrznej, czy jest przeznaczona do zastosowań bez poduszki powietrznej.
    compatible_steering_wheel_control_button:
      name: Kompatybilny przycisk sterowania na kierownicy
      description: Wskazuje kompatybilność z fabrycznymi elementami sterującymi montowanymi
        na kierownicy (audio/tempomat/telefon) oraz powiązanym okablowaniem.
    compatible_stencil_material:
      name: Zgodny materiał wzornika
      description: Materiały, z których maszyna może tworzyć szablony lub które może
        przetwarzać (np. papier, folia plastikowa, mylar).
    compatible_stencil_media_format:
      name: Kompatybilny format materiału szablonowego
      description: 'Wskazuje formaty nośników szablonów obsługiwane przez maszynę:
        arkusze, rolki lub oba.'
    compatible_strap_retractor:
      name: Kompatybilny zwijacz pasa
      description: Wskazuje, czy pas jest kompatybilny z systemami zwijanymi, czy
        przeznaczony do pasów niezwijanych (statycznych).
    compatible_string_instrument_finish:
      name: Zgodne wykończenie instrumentu strunowego
      description: Określa typy wykończenia instrumentów, na których można bezpiecznie
        stosować pastę polerską.
    compatible_substrate_material:
      name: Zgodny materiał podłoża
      description: Materiał/materiały powierzchni, do których przyczepiania się opracowano
        farbę.
    compatible_surface:
      name: Kompatybilna powierzchnia
      description: Określa powierzchnię/materiał, do którego ma przywierać klej rzepowy.
    compatible_surface_material:
      name: Zgodny materiał powierzchni
      description: Materiały powierzchni pojazdu, na których produkt jest przeznaczony
        do stosowania.
    compatible_tear_off_system:
      name: Zgodny system odrywania
      description: Wskazuje, czy gogle obsługują system tear-off i/lub roll-off, w
        tym czy posiadają mocowania do folii tear-off.
    compatible_thermostat_type:
      name: Kompatybilny typ termostatu
      description: Wskazuje, czy króciec/obudowa termostatu jest przystosowana do
        montażu termostatu, a jeśli tak — jakiego typu/rozmiaru.
    compatible_thread:
      name: Kompatybilna nić
      description: Wskazuje, jakie rodzaje nici/przędzy przewlekacz jest przeznaczony
        do obsługi (według grubości/typu).
    compatible_thread_spool_format:
      name: Kompatybilny format nici/szpuli
      description: Wskazuje, jakie formaty nici są przeznaczone do przechowywania
        w pudełku (szpulki, bębenki, bobinki/karty do muliny, stożki itp.).
    compatible_thread_yarn_tool:
      name: Kompatybilne narzędzie do nici i włóczki
      description: Kompatybilność maszyn/systemów w przypadku narzędzi montowanych
        na innym sprzęcie lub używanych z innym sprzętem, np. maszyną do szycia, owerlokiem,
        krosnem, kołowrotkiem.
    compatible_tire_application:
      name: Kompatybilne zastosowanie opony
      description: Wskazuje segment zastosowania opony/koła, do którego przeznaczony
        jest zbijak do opon, na podstawie serwisowanej opony/koła, a nie modelu pojazdu.
    compatible_tom_pad_mounting:
      name: Kompatybilne mocowanie pada tom-tomu
      description: Określa, do czego mocowany jest elektroniczny tom-tom, np. mocowanie
        zaciskowe/prętowe, pręt L, mocowanie do statywu, co wpływa na dopasowanie
        do istniejących systemów rack.
    compatible_toy_vehicle_scale:
      name: Zgodna skala pojazdu do zabawy
      description: Wskazuje skalę pojazdu-zabawki lub przybliżony rozmiar pojazdu,
        z którym kompatybilny jest zestaw do zabawy.
    compatible_tpms_sensor_type:
      name: Kompatybilny typ czujnika TPMS
      description: Określa, czy koło obsługuje czujniki TPMS i/lub wymagany typ zaworu/czujnika.
    compatible_training_equipment:
      name: Zgodne wyposażenie do treningu
      description: Wymienia typy sprzętu treningowego lub fitness, które można zamocować
        do uchwytu.
    compatible_treadmill_design:
      name: Kompatybilna konstrukcja bieżni
      description: Określa konstrukcję bieżni, z którą kompatybilne jest akcesorium,
        np. modele składane lub nieskładane.
    compatible_tube:
      name: Zgodna rurka
      description: Wskazuje typ dętki lub konstrukcji opony, do której przeznaczona
        jest łatka, np. butylowa, lateksowa, TPU lub bezdętkowa.
    compatible_valve_type:
      name: Zgodny typ zaworu
      description: Określa typ zaworu instrumentu dętego blaszanego, z którym kompatybilny
        jest środek smarny.
    compatible_vaporizing_material:
      name: Kompatybilny materiał do waporyzacji
      description: Wskazuje typy materiałów, do których waporyzacji przeznaczone jest
        urządzenie.
    compatible_vehicle_windshield_fluid:
      name: Kompatybilny płyn do spryskiwaczy pojazdu
      description: Deklaracje kompatybilności związane z wyposażeniem pojazdu lub
        powłokami szyb, np. bezpieczny dla powłok hydrofobowych, bezpieczny dla spryskiwaczy
        reflektorów.
    compatible_visor_system:
      name: Zgodny system osłony
      description: Wskazuje typy systemów wizjerów/wkładek, z którymi kompatybilny
        jest kask motocyklowy.
    compatible_water_board_type:
      name: Zgodny typ deski do pływania
      description: Określa, jakie deski do sportów wodnych bagażnik ma przewozić.
    compatible_water_sport_board_type:
      name: Kompatybilny typ deski do sportów wodnych
      description: Wymienia typy desek, do których transportu przeznaczony jest bagażnik.
    compatible_watercraft_communication_standard:
      name: Kompatybilny standard komunikacji jednostek pływających
      description: Określa obsługiwane standardy komunikacji/sieci morskiej lub protokoły
        integracji zapewniające interoperacyjność z elektroniką pokładową.
    compatible_watercraft_engine_type:
      name: Kompatybilny typ silnika jednostki pływającej
      description: 'Wskazuje docelową konfigurację układu napędowego, do której pasuje
        część: zaburtowy, stacjonarny, rufowy lub strugowodny.'
    compatible_weight_plate_diameter:
      name: Kompatybilna średnica obciążenia
      description: Określa średnice obciążeń, które obsługuje maszyna.
    compatible_wheel_finish:
      name: Kompatybilne wykończenie felg
      description: Określa wykończenia/materiały felg, na których można bezpiecznie
        stosować środek czyszczący zgodnie z deklaracją producenta.
    compatible_whorl_drive_band_type:
      name: Kompatybilny typ pasa napędowego krążka
      description: Określa styl pasa napędowego, z którym krążek ma współpracować.
    compatible_wick_series:
      name: Kompatybilna seria knotów
      description: Wskazuje popularne serie/typy knotów, do których pasuje blaszka,
        zgodnie z nazewnictwem branżowym, jeśli sprzedawca to określił.
    compatible_winder_head_bit:
      name: Kompatybilna główka/końcówka nawijarki
      description: Określa styl interfejsu klucza/główki stroika obsługiwanego przez
        nawijarkę, np. główka szczelinowa, wymienne końcówki, główka uniwersalna.
    compatible_windlass_rode:
      name: Kompatybilny typ liny kotwicznej do windy kotwicznej
      description: Określa typ liny kotwicznej, do którego obsługi przeznaczona jest
        winda kotwiczna.
    compatible_windshield_type:
      name: Kompatybilny typ szyby przedniej
      description: Określa konfigurację szyby przedniej, z którą ma współpracować
        obudowa.
    compatible_wood:
      name: Zgodne drewno
      description: Określa rodzaje drewna podstrunnicy, do których pasta polerska
        jest zalecana/bezpieczna.
    compatible_writing_surface:
      name: Zgodna powierzchnia do pisania
      description: Określa powierzchnie/papiery, na których tusz ma działać najlepiej.
    compatible_zipper_size:
      name: Zgodny rozmiar zamka błyskawicznego
      description: 'Wskazuje rozmiar zamka błyskawicznego, do którego pasuje uchwyt
        suwaka, często wyrażany jako #3, #5, #8, #10, co usprawnia filtrowanie kompatybilności.'
    compliance_certification:
      name: Certyfikacja zgodności
      description: Normy zgodności/atestów spełniane przez belkę świetlną w zakresie
        użytkowania drogowego i kompatybilności elektromagnetycznej.
    component_position:
      name: Położenie komponentu
      description: Określa względne położenie części w zespole rozrządu silnika, np.
        przednia lub tylna pokrywa, górna lub dolna. Nie oznacza położenia z przodu/z
        tyłu pojazdu.
    concentration_level:
      name: Poziom koncentracji
      description: 'Jakościowe wskazanie stopnia koncentracji koncentratu pomidorowego:
        pojedynczy, podwójny, potrójny, przydatne przy dopasowaniu do wymagań przepisu.'
    concentration_type:
      name: Typ stężenia
      description: Wskazuje, czy produkt jest gotowy do użycia, czy skoncentrowany,
        a w przypadku koncentratu — typowe wytyczne dotyczące rozcieńczania.
    concert_bass_drum_mounting_stand_type:
      name: Typ statywu montażowego bębna basowego koncertowego
      description: Sposób podparcia lub montażu bębna basowego koncertowego podczas
        występu.
    concert_pitch_standard:
      name: Standard stroju koncertowego
      description: Określa odniesienie stroju koncertowego (A4), do którego nastrojono
        pianino w momencie sprzedaży, np. A440, A442, A444.
    condiment_form:
      name: Forma przyprawy/sosu
      description: Wskazuje fizyczną formę lub konsystencję produktu z chrzanu, np.
        pasta, proszek, krem.
    condiment_texture:
      name: Tekstura przyprawy/sosu
      description: Opisuje fizyczną konsystencję reliszu lub chutneyu, np. kawałki,
        gładka.
    confetti_format:
      name: Format konfetti
      description: Określa format produktu konfetti na podstawie sposobu pakowania
        lub wystrzeliwania konfetti, np. luźne konfetti lub strzelające tuby/armatki.
    conga_head_tensioning_system:
      name: System napinania membrany kongi
      description: Typ osprzętu używanego do napinania/strojenia membrany kongi, np.
        tradycyjne strojenie śrubowe lub nowoczesne mechanizmy szybkiego strojenia.
    conga_set_included_drum_types:
      name: Typy bębnów dołączone do zestawu kong
      description: Określa, które typy kong są dołączone do zestawu kong, np. quinto
        + conga + tumba.
    connector_case_style:
      name: Styl etui na złącza
      description: Klasyfikuje ogólny styl konstrukcji etui na złącza, np. twarda
        skorupa lub miękki pokrowiec, aby oddać poziom ochrony i przenośność.
    console_cover_installation_method:
      name: Metoda montażu osłony konsoli
      description: Określa, jak osłona konsoli mocuje się do konsoli/podłokietnika,
        np. wsuwana, elastyczne paski, rzep, klej, przypinana.
    console_display_type:
      name: Typ wyświetlacza konsoli
      description: Określa styl wyświetlacza użytkownika dostępnego w maszynie, np.
        LCD, LED, ekran dotykowy.
    construction_design:
      name: Projekt budowlany
      description: Wskazuje, z ilu połączonych elementów składa się ochraniacz, co
        wpływa na mobilność, np. 1-częściowy lub 3-częściowy.
    contact_angle:
      name: Kąt styku
      description: Określa kąt styku bieżni łożyska, wyrażony jako pojedynczy kąt
        lub zestaw par kątów, np. 36°/45°.
    contact_juggling_ball_fill_type:
      name: Typ wypełnienia piłki do żonglerki kontaktowej
      description: Określa, czy piłka jest lita, czy wypełniona, a jeśli wypełniona
        — jakim rodzajem wypełnienia, co wpływa na rozkład masy i trwałość.
    contact_juggling_ball_transparency:
      name: Przezroczystość piłki do żonglerki kontaktowej
      description: Określa przezroczystość/wygląd optyczny piłki.
    contact_surface_material:
      name: Materiał powierzchni stykowej
      description: Określa materiał użyty w punktach styku z instrumentem, np. korek/guma,
        aby zapobiegać zarysowaniom i poprawić chwyt.
    container_material:
      name: Materiał pojemnika
      description: Określa podstawowy materiał opakowania detalicznego produktu, np.
        szkło, plastik PET, aluminium.
    contaminant_removal:
      name: Usuwanie zanieczyszczeń
      description: Wymienia klasy zanieczyszczeń, które produkt ma certyfikat usuwać
        lub redukować.
    contra_alto_clarinet_body_configuration:
      name: Konfiguracja korpusu klarnetu kontraaltowego
      description: Opisuje fizyczną formę konstrukcji klarnetu kontraaltowego, np.
        konstrukcję prostą lub zagiętą.
    contra_alto_clarinet_lowest_note_extension:
      name: Rozszerzenie najniższej nuty klarnetu kontraaltowego
      description: Określa rozszerzenie najniższej możliwej do zagrania nuty instrumentu,
        czyli najniższą nutę, na którą pozwala mechanika, powszechnie używane do odróżniania
        modeli do niskiego E♭, niskiego D i niskiego C.
    contra_bass_clarinet_bell_type:
      name: Typ czary głosowej klarnetu kontrabasowego
      description: Konfiguracja czary głosowej stosowana w klarnecie kontrabasowym.
    contra_bass_clarinet_bore_type:
      name: Typ kanału klarnetu kontrabasowego
      description: Konstrukcja menzury instrumentu.
    contra_bass_clarinet_lowest_written_note:
      name: Najniższa zapisana nuta klarnetu kontrabasowego
      description: Najniższa zapisana nuta, którą instrument może zagrać, często zależna
        od rozszerzenia do niskiego C lub niskiego E♭.
    control_arm_bushing_material:
      name: Materiał tulei wahacza
      description: Określa materiał dołączonych/zamontowanych tulei, jeśli występują.
    control_arm_bushings_included:
      name: Tuleje wahacza w zestawie
      description: Wskazuje, czy wahacz jest dostarczany z zamontowanymi tulejami.
    control_arm_finish:
      name: Wykończenie wahacza
      description: Określa wykończenie ochronne zastosowane na wahaczu, zapewniające
        ochronę przed korozją i wygląd.
    control_arm_grease_fitting_type:
      name: Typ smarowniczki wahacza
      description: Określa, czy zespół wahacza/sworzni kulowych zawiera smarowniczkę
        i czy jest serwisowalny.
    control_arm_material:
      name: Materiał wahacza
      description: Określa podstawowy materiał i konstrukcję wykonania korpusu wahacza.
    control_arm_position:
      name: Położenie wahacza
      description: Określa położenie wahacza w zawieszeniu w kontekście narożnika/strony
        osi, np. górny/dolny, przedni/tylny, lewy/prawy.
    control_arm_style:
      name: Styl wahacza
      description: Określa geometryczny/konstrukcyjny styl wahacza stosowany w układzie
        zawieszenia.
    control_cable_connector_type:
      name: Typ złącza linki sterującej
      description: Określa styl końcówki/złącza używany przez linkę/linki sterujące
        do połączenia ze sterowaniem i silnikiem, np. końcówki właściwe dla OEM.
    control_voltage_or_gate_connectivity:
      name: Napięcie sterujące lub łączność bramki
      description: Określa obsługę połączeń control-voltage/gate do integracji ze
        sprzętem modularnym/analogowym.
    controller_function:
      name: Funkcja kontrolera
      description: Definiuje podstawową rolę płyty sterującej bieżni, taką jak sterowanie
        silnikiem, zasilanie lub napęd falownikowy
    controller_type:
      name: Typ kontrolera
      description: ".Określa sterownik silnika/system sterowania dołączony do zestawu
        konwersji skutera na napęd elektryczny lub wymagany do użycia, koncentrując
        się na cechach sterownika istotnych dla kompatybilności i wydajności."
    conversion_kit_cooling_method:
      name: Metoda chłodzenia zestawu konwersyjnego
      description: Podstawowe podejście do zarządzania temperaturą stosowane przy
        integracji silnika/falownika/akumulatora.
    conversion_kit_installation_complexity:
      name: Złożoność montażu zestawu konwersyjnego
      description: Oczekiwany poziom trudności montażu na podstawie typowych umiejętności/narzędzi
        wymaganych od klienta.
    converted_bed_size:
      name: Rozmiar łóżka po konwersji
      description: Wskazuje rozmiar lub konfigurację łóżka, w jaką przekształci się
        łóżeczko po zamontowaniu tego zestawu.
    convertible_configuration:
      name: Konfiguracja konwertowalna
      description: Wskazuje, w ile różnych konfiguracji łóżka produkt może się przekształcić,
        np. łóżeczko 3 w 1 → łóżko dla dziecka → tapczanik.
    convertible_high_chair_modes:
      name: Tryby składanego krzesełka do karmienia
      description: Określa konfiguracje siedzenia, w jakie można przekształcić krzesło.
    cookie_decorating_kit_items_included:
      name: Elementy dołączone do zestawu do dekorowania ciastek
      description: Wymienia poszczególne elementy dekoracyjne, aby klienci dokładnie
        wiedzieli, jakie materiały znajdują się w pudełku, np. tubki z lukrem, posypki,
        foremki do ciastek.
    cookie_variety:
      name: Odmiana ciastek
      description: Określa konkretny styl lub odmianę ciastek, pomagając kupującym
        szybko znaleźć preferowany typ.
    cooking_state:
      name: Stan przygotowania
      description: Wskazuje poziom gotowości produktu z kurczaka w momencie sprzedaży,
        np. surowy, w pełni ugotowany, marynowany.
    coolant_additive_purpose:
      name: Przeznaczenie dodatku do płynu chłodzącego
      description: Podstawowa zamierzona funkcja dodatku do płynu chłodzącego, bez
        płukanek do chłodnicy ani specjalistycznych uszczelniaczy.
    coolant_base_fluid:
      name: Płyn bazowy płynu chłodzącego
      description: Określa podstawową bazę glikolową stosowaną w formule płynu przeciwzamarzaniowego/chłodzącego.
    coolant_outlet_connection_style:
      name: Styl połączenia wylotu płynu chłodzącego
      description: Styl interfejsu połączenia wylotu używany do podłączenia węża chłodnicy
        lub przewodu płynu chłodzącego.
    coolant_outlet_neck_angle:
      name: Kąt króćca wylotu płynu chłodzącego
      description: Kąt/orientacja wylotu króćca względem kołnierza montażowego/silnika,
        przydatne przy prowadzeniu górnego węża chłodnicy.
    coolant_technology:
      name: Technologia płynu chłodzącego
      description: Określa rodzinę chemiczną/technologiczną płynu chłodzącego stosowaną
        w płynie przeciwzamarzaniowym/chłodzącym, zgodnie z typowymi oznaczeniami
        na opakowaniu.
    coolant_temperature_sensor_port:
      name: Port czujnika temperatury płynu chłodzącego
      description: Wskazuje, czy króciec ma port na czujnik lub przełącznik temperatury
        płynu chłodzącego i jakiego interfejsu używa.
    coolant_temperature_sensor_seal_type:
      name: Typ uszczelnienia czujnika temperatury płynu chłodzącego
      description: Typ metody uszczelnienia między czujnikiem a silnikiem/kanałem
        płynu chłodzącego.
    cooling_system_component_included:
      name: Element układu chłodzenia w zestawie
      description: Wymienia dodatkowe elementy układu chłodzenia dołączone do pompy
        wody.
    cooling_system_flush_application_step:
      name: Etap stosowania płukanki do układu chłodzenia
      description: Wskazuje miejsce produktu w procesie serwisowym, np. środek czyszczący
        przed płukaniem lub końcowe płukanie/neutralizator.
    cooling_system_type:
      name: Typ układu chłodzenia
      description: Określa konfigurację układu chłodzenia stosowaną w stacjonarnym
        silniku morskim, np. woda surowa/obieg otwarty, obieg zamknięty/woda słodka
        z wymiennikiem ciepła, chłodzenie kilowe.
    cord_material:
      name: Materiał przewodu
      description: Określa materiał sznurka/linki używanej do przeciągania wyciora
        przez saksofon.
    core_type_bass_strings:
      name: Typ rdzenia (struny basowe)
      description: Określa kształt rdzenia struny, który wpływa na odczucie gry i
        elastyczność.
    cork_grease_base_material:
      name: Materiał bazowy smaru do korka
      description: Podstawowa baza formuły smaru do korka, np. na bazie lanoliny.
    cork_grease_form:
      name: Forma smaru do korka
      description: Fizyczna forma produktu ze smarem do korka.
    corn_presentation:
      name: Forma kukurydzy
      description: Określa fizyczną postać lub formę produktu kukurydzianego, np.
        cała w łusce, ziarna, proszek.
    corn_syrup_variety:
      name: Odmiana syropu kukurydzianego
      description: Określa konkretny styl lub wariant przetwarzania syropu.
    corn_variety:
      name: Odmiana kukurydzy
      description: Określa konkretną odmianę botaniczną lub handlową sprzedawanej
        kukurydzy, umożliwiając kupującym rozróżnianie typów różniących się smakiem,
        teksturą, kolorem i zastosowaniem kulinarnym.
    corner_compatibility:
      name: Zgodność narożnika
      description: Określa kształt narożnika stołu, kwadratowy lub zaokrąglony, do
        którego przeznaczony jest pokrowiec.
    corner_flag_features:
      name: Cechy chorągiewki narożnej
      description: Wyróżnia specjalne cechy funkcjonalne lub ulepszenia chorągiewki
        narożnej, np. składany drążek, materiał odblaskowy.
    cornet_mouthpiece_shank_type:
      name: Typ czopu ustnika kornetu
      description: Określa standard gniazda/czopu ustnika obsługiwany przez kornet
        w celu zapewnienia kompatybilności.
    cornhole_league_certification:
      name: Certyfikacja ligi cornhole
      description: Wskazuje oficjalne certyfikaty lub zatwierdzenia ligowe spełniane
        przez produkt.
    corrosion_resistance:
      name: Odporność na korozję
      description: Określa obróbkę lub klasę odporności na korozję mocowania/uchwytu
        przy ekspozycji zewnętrznej.
    corrosion_resistance_level:
      name: Poziom odporności na korozję
      description: Wskazuje ochronę antykorozyjną odpowiednią do środowiska słodkowodnego/słonowodnego.
    costume_components_included:
      name: Elementy kostiumu w zestawie
      description: Wymienia części odzieży i akcesoria dołączone do kostiumu, wyjaśniając,
        co jest częścią zestawu.
    cotton_weave_type:
      name: Typ splotu bawełny
      description: Opisuje konstrukcję splotu/dzianiny drukowanej powierzchni bawełnianej,
        która wpływa na teksturę i ostrość nadruku.
    counter_type:
      name: Typ licznika
      description: Wskazuje obecność i styl wbudowanego śledzenia powtórzeń lub siły.
    counterweight_fill_material:
      name: Materiał wypełnienia przeciwwagi
      description: Wskazuje substancję, której można użyć do dodania balastu do przeciwwagi
        lub jej wstępnego wypełnienia.
    counterweight_type:
      name: Typ przeciwwagi
      description: Określa styl projektu lub konstrukcji przeciwwagi, np. worek z
        piaskiem lub płyta stalowa, aby ułatwić kompatybilność i montaż.
    coupler_system:
      name: System sprzęgów
      description: Typ/system sprzęgu zamontowany w lokomotywie modelarskiej w celu
        zapewnienia kompatybilności z taborem.
    court_surface_suitability:
      name: Przydatność do nawierzchni boiska
      description: Wskazuje nawierzchnię boiska do koszykówki, do której przeznaczona
        jest podeszwa zewnętrzna buta, pomagając kupującym wybrać odpowiednią przyczepność
        i trwałość do drewnianych boisk halowych, asfaltu/betonu na zewnątrz lub obu
        typów.
    cover_fit_style:
      name: Styl dopasowania pokrowca
      description: Opisuje sposób dopasowania pokrowca do stołu, wpływający na wygląd
        i poziom ochrony.
    cover_fit_type:
      name: Typ dopasowania pokrowca
      description: Wskazuje, czy pokrowiec jest dopasowany (niestandardowy/półniestandardowy),
        czy uniwersalny, oraz czy jest przeznaczony do cumowania na wodzie czy do
        przechowywania/transportu na przyczepie.
    cowbell_beater_type:
      name: Typ pałki do krowiego dzwonka
      description: Zalecany typ narzędzia uderzeniowego do brzmienia/wykończenia krowiego
        dzwonka, jeśli określono w produkcie.
    cowbell_mounting_method:
      name: Metoda mocowania dzwonka krowiego
      description: 'Sposób montażu/użycia krowiego dzwonka: trzymany w dłoni lub montowany
        do osprzętu.'
    cowbell_sound_character:
      name: Charakter dźwięku dzwonka krowiego
      description: Ogólny charakter brzmienia używany w ofertach, wspierający wyszukiwanie
        poza samym rozmiarem.
    cradle_capacity:
      name: Pojemność kołyski
      description: Wskazuje, czy kołyska jest przeznaczona dla jednego niemowlęcia
        czy bliźniąt.
    craft_cutter_embosser_machine_operation:
      name: Sposób działania maszyny do wycinania/wytłaczania
      description: Określa sposób działania maszyny do wycinania/wytłaczania z perspektywy
        przepływu pracy użytkownika, np. ręczna korbka, elektryczny przycisk, sterowanie
        aplikacją.
    craft_decoration_maker_accessories_included:
      name: Akcesoria dołączone do urządzenia do tworzenia dekoracji rękodzielniczych
      description: Wymienia kluczowe akcesoria dołączone do urządzenia do tworzenia
        dekoracji rękodzielniczych, np. taśmę/folię startową, wkłady naklejek, kartridże
        z brokatem, narzędzia do czyszczenia.
    craft_foil_application_method:
      name: Metoda aplikacji folii rękodzielniczej
      description: Określa sposób, w jaki folia rękodzielnicza ma być nakładana/aktywowana,
        np. klej, ciepło, toner/reaktywna.
    craft_foil_format:
      name: Format folii rękodzielniczej
      description: Wskazuje fizyczny format sprzedawanej folii rękodzielniczej, np.
        rolka lub arkusze.
    craft_glue_finish:
      name: Wykończenie kleju rękodzielniczego
      description: Opisuje wygląd kleju po wyschnięciu, np. przezroczysty, biały/nieprzezroczysty,
        półprzezroczysty, błyszczący/matowy.
    craft_magnet_application:
      name: Zastosowanie magnesu rękodzielniczego
      description: Główne zamierzone zastosowanie rękodzielnicze lub powierzchnia
        montażowa produktu magnetycznego.
    craft_magnet_holding_strength_level:
      name: Poziom siły trzymania magnesu rękodzielniczego
      description: Względna kategoria siły magnesów rękodzielniczych, pomagająca kupującym
        wybrać odpowiednią siłę trzymania do projektu.
    craft_organizer_storage_features:
      name: Cechy przechowywania organizera rękodzielniczego
      description: Opisuje cechy organizacyjne i wewnętrzne elementy przechowywania
        organizerów rękodzielniczych, np. regulowane przegrody, szuflady, przezroczyste
        kieszenie.
    craft_scoring_board_included_accessories:
      name: Akcesoria dołączone do tablicy do bigowania
      description: Akcesoria dołączone do tablicy do bigowania, np. rylec do bigowania/kostka
        introligatorska, trójkąt, narzędzie do kopert.
    craft_scoring_board_measurement_system:
      name: System miar tablicy do bigowania
      description: 'Określa system miar oznaczony na tablicy do bigowania: imperialny,
        metryczny, podwójny lub bez oznaczeń'
    craft_wire_finish_coating:
      name: ".Wykończenie/powłoka drutu rękodzielniczego"
      description: Określa wykończenie powierzchni lub powłokę zastosowaną na drucie
        w celu nadania koloru, odporności na matowienie lub ochrony.
    craft_wood_surface_preparation:
      name: Przygotowanie powierzchni drewna rękodzielniczego
      description: Wskazuje, czy powierzchnia drewna jest gotowa do wykończenia/malowania,
        czy wymaga przygotowania, np. szlifowania/gruntowania.
    crank_spindle_interface:
      name: Interfejs osi mechanizmu korbowego
      description: Określa system osi mechanizmu korbowego obsługiwany przez suport,
        np. SRAM DUB, kwadrat, zapewniając kompatybilność między mechanizmem korbowym
        a suportem.
    crankshaft_balance_type:
      name: Typ wyważenia wału korbowego
      description: Wskazuje, czy wał korbowy jest wyważony wewnętrznie (neutralnie),
        czy zewnętrznie (wymaga ciężarków na tłumiku drgań/kołe zamachowym).
    crankshaft_bolt_pattern:
      name: Układ śrub wału korbowego
      description: Układ śrub na tylnym kołnierzu do mocowania koła zamachowego/tarczy
        napędowej.
    crankshaft_sensor_reluctor_type:
      name: Typ reluktora czujnika wału korbowego
      description: Konfiguracja koła wyzwalającego/reluktora czujnika położenia wału
        korbowego, jeśli dotyczy.
    craps_accessories_included:
      name: Dołączono akcesoria do gry w craps
      description: Określa dodatkowe akcesoria właściwe dla gry w kości, dołączone
        poza kośćmi/żetonami/układem.
    crash_cymbal_profile:
      name: Profil talerza crash
      description: Ogólna krzywizna/profil talerza, czyli stopień wygięcia kopuły,
        wpływający na wysokość dźwięku i reakcję.
    crash_cymbal_sound_character:
      name: Charakter dźwięku talerza perkusyjnego Crash
      description: Główne określenia charakteru brzmienia talerza crash.
    crash_pad_size_class:
      name: Klasa rozmiaru materaca asekuracyjnego
      description: Wskazuje ogólną kategorię rozmiaru materaca asekuracyjnego do wspinaczki,
        dając kupującym szybkie pojęcie o powierzchni pokrycia bez konieczności sprawdzania
        dokładnych wymiarów.
    crate_engine_assembly_level:
      name: Poziom kompletacji silnika crate
      description: Określa, jak kompletny jest silnik crate w chwili dostawy, czyli
        jakie główne elementy są dołączone.
    cream_base_ingredient:
      name: Składnik bazowy śmietanki
      description: Określa podstawowe źródło śmietanki, obejmujące zarówno gatunki
        mleczne, jak i alternatywy roślinne.
    cream_cheese_base:
      name: Baza serka śmietankowego
      description: Określa podstawowe źródło mleczne lub roślinne użyte do produkcji
        serka śmietankowego, pomagając kupującym uwzględnić dietę, alergeny i smak.
    cream_cheese_form:
      name: Forma twarożku
      description: Opisuje fizyczną formę lub styl tekstury serka śmietankowego, np.
        blok, ubity, dip, co wpływa na łatwość smarowania i zamierzone użycie.
    cream_variety:
      name: Odmiana śmietanki
      description: Określa konkretny typ śmietanki na podstawie zawartości tłuszczu,
        sposobu przetwarzania lub zamierzonego zastosowania kulinarnego, np. Half
        & Half, śmietanka double, śmietanka do gotowania.
    crib_accessory_features:
      name: Funkcje akcesoriów do łóżeczka
      description: Wymienia funkcjonalne lub komfortowe cechy właściwe dla akcesoriów
        do łóżeczek niemowlęcych i łóżek dla małych dzieci, takie jak oddychalność
        lub elastyczne krawędzie.
    crib_bumper_features:
      name: Cechy ochraniacza do łóżeczka
      description: Podkreśla szczególne cechy funkcjonalne osłonki do łóżeczek
    crib_conversion_kit_components:
      name: Elementy barierek do łóżeczek
      description: Wymienia główne części dołączone do zestawu, aby kupujący mogli
        sprawdzić, czy mają wszystko wymagane do montażu.
    cricket_ball_grade:
      name: Klasa piłki do krykieta
      description: Określa poziom jakości lub zamierzony standard gry piłki.
    cricket_ball_piece_construction:
      name: Konstrukcja części piłki do krykieta
      description: Wskazuje liczbę zewnętrznych części lub formowanych sekcji użytych
        do wykonania powłoki piłki, co jest kluczowym wskaźnikiem jakości i ceny.
    cricket_ball_type:
      name: Typ piłki do krykieta
      description: Określa typ piłki do krykieta dostarczanej z produktem lub wskazuje,
        że piłka nie jest dołączona.
    cricket_bat_accessory_type:
      name: Typ akcesorium do kija do krykieta
      description: Określa typ akcesorium do kija do krykieta lub produktu konserwacyjnego,
        aby kupujący mogli szybko filtrować potrzebny produkt.
    cricket_bat_size:
      name: Rozmiar kija do krykieta
      description: Wskazuje standardową klasyfikację rozmiaru kija do krykieta (0–6,
        Harrow, SH, LH), zwykle wybieraną na podstawie wieku i wzrostu zawodnika.
    cricket_bat_size_compatibility:
      name: Kompatybilność rozmiaru kija do krykieta
      description: Wymienia rozmiary kijów, do których pasuje akcesorium, zapewniając
        właściwą kompatybilność.
    cricket_helmet_role:
      name: Rola kasku do krykieta
      description: Wskazuje rolę w grze, do której przeznaczony jest kask, np. odbijanie
        lub gra na pozycji wicket-keepera.
    cricket_leg_guard_type:
      name: Typ ochraniacza nogi do krykieta
      description: Określa konkretny styl ochrony nóg do krykieta.
    cricket_player_role:
      name: Rola gracza w krykiecie
      description: Określa główną rolę w grze, do której przeznaczony jest but.
    cricket_protection_grade:
      name: Klasa ochrony do krykieta
      description: Określa klasyfikację poziomu ochrony nadaną przez producentów sprzętu
        do krykieta.
    cricket_stump_base_type:
      name: Typ słupków do bramek krykietowych
      description: Wskazuje styl lub materiał podstawy dołączonej do słupków, wpływający
        na stabilność i przydatność do nawierzchni gry.
    cricket_stump_target_features:
      name: Cechy celu treningowego ze słupkami do krykieta
      description: Wyróżnia odrębne cechy funkcjonalne zwiększające użyteczność treningową,
        widoczność, trwałość lub stabilność.
    cricket_stump_type:
      name: Typ słupków do krykieta
      description: Klasyfikuje styl lub konstrukcję słupków, aby pomóc kupującym wybrać
        między tradycyjnymi słupkami meczowymi, wariantami treningowymi lub nowoczesnymi
        modelami podświetlanymi.
    cricket_training_focus:
      name: Zakres treningu krykieta
      description: Główna umiejętność lub dyscyplina krykietowa, którą pomoc treningowa
        ma poprawiać.
    croquet_set_components_included:
      name: Elementy dołączone do zestawu do krokieta
      description: Wymienia wszystkie kluczowe elementy dołączone do zestawu, np.
        bramki, paliki, torbę transportową, aby klienci dokładnie wiedzieli, co kupują.
    cross_country_binding_system:
      name: System wiązań do biegówek
      description: Określa standard wiązań do nart biegowych, pod który produkt jest
        nawiercony lub z którym jest kompatybilny.
    cross_stitch_chart_symbol_type:
      name: Typ symboli schematu haftu krzyżykowego
      description: 'Sposób przedstawienia schematu: symbole, kolory lub oba.'
    cross_stitch_finishing_type:
      name: Typ wykończenia haftu krzyżykowego
      description: Zamierzony typ wykończenia/ekspozycji wyhaftowanego projektu.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mechanizm mocowania tkaniny w ramie do haftu krzyżykowego
      description: Wskazuje sposób mocowania/napinania tkaniny w ramie, np. klipsy,
        zaciski, pinezki, co wpływa na łatwość użycia i kompatybilność tkaniny.
    cross_stitch_frame_included_components:
      name: Elementy dołączone do ramy do haftu krzyżykowego
      description: Wymienia zawartość opakowania, np. sama rama albo rama + zaciski
        + stojak, ograniczając niejasności i zwroty.
    cross_stitch_frame_type:
      name: Typ ramy do haftu krzyżykowego
      description: Określa konstrukcję/typ ramy do haftu krzyżykowego, czyli sposób
        mocowania tkaniny, wpływającą na łatwość użycia i kompatybilność z projektem.
    cross_stitch_pattern_technique:
      name: Technika wzoru haftu krzyżykowego
      description: Technika/styl haftu krzyżykowego wymagany przez schemat.
    crossbar_shape_profile:
      name: Kształt/profil belki poprzecznej
      description: Określa aerodynamiczny kształt/profil belki poprzecznej.
    crossbar_style:
      name: Styl poprzeczki
      description: Określa styl konstrukcji poprzeczki, odróżniając sztywne poprzeczki
        zawodnicze od elastycznych lub hybrydowych poprzeczek treningowych.
    crossbow_type:
      name: Typ kuszy
      description: Określa podstawowy styl konstrukcji kuszy, taki jak bloczkowa,
        refleksyjna lub pistoletowa. Styl konstrukcji wpływa na osiągi, rozmiar i
        zastosowania, dlatego kupujący często filtrują według niego.
    crossover_component_type:
      name: Typ komponentu zwrotnicy
      description: Określa podstawową topologię komponentów zastosowaną w pasywnej
        sieci zwrotnicy.
    crossover_configuration:
      name: Konfiguracja zwrotnicy
      description: Wskazuje, czy zwrotnica wykorzystuje pojedynczy punkt podziału,
        czy wiele punktów, np. konstrukcje 2-drożne lub 3-drożne.
    crossover_type:
      name: Typ zwrotnicy
      description: Typ sieci zwrotnicy dołączonej do zestawu komponentów.
    crown_profile:
      name: Profil główki
      description: Określa wysokość/profil główki czapki nad daszkiem.
    crown_style:
      name: Styl główki
      description: Definiuje ogólną sylwetkę lub profil główki melonika.
    crust_taste_profile:
      name: Profil smakowy spodu
      description: Wskazuje, czy naturalny profil smakowy spodu jest słodki, wytrawny
        czy neutralny.
    crystal_finish:
      name: Wykończenie kryształu
      description: Opisuje wykończenie powierzchni, powłokę lub stan obróbki luźnego
        kryształu, np. surowy, polerowany, bębnowany, fasetowany, oszroniony, z powłoką
        aura, barwiony, poddany obróbce cieplnej.
    crystal_material:
      name: Materiał szkiełka
      description: Określa materiał użyty na szkiełko zegarka chroniące tarczę.
    crystalline_finish_style:
      name: Styl wykończenia krystalicznego
      description: Charakterystyczny krystaliczny/pierzasty wygląd uzyskiwany dzięki
        woskowi palmowemu w gotowych świecach.
    cucumber_variety:
      name: Odmiana ogórka
      description: Określa kultywar lub odmianę handlową ogórka, np. angielski, perski,
        Kirby.
    cue_compatibility:
      name: Zgodność kija bilardowego
      description: Wskazuje konfigurację złącza kija, do której przystosowany jest
        futerał, np. kije jednoczęściowe lub łączone 3/4.
    cue_construction:
      name: Konstrukcja kija bilardowego
      description: Wskazuje konstrukcję kija — liczbę części lub to, czy jest to częściowy
        komponent, np. tylko dolnik albo tylko szczytówka — wpływającą na przenośność
        i kompatybilność.
    cue_head_material:
      name: Materiał końcówki kija bilardowego
      description: Określa materiał główki kija, czyli części stykającej się z krążkiem,
        wpływający na trwałość i ochronę powierzchni.
    cue_sport_compatibility:
      name: Kompatybilność ze sportem bilardowym
      description: Określa, do którego sportu bilardowego przeznaczone jest akcesorium.
    cue_thread_size:
      name: Rozmiar gwintu kija
      description: Określa specyfikację gwintu używaną w przedłużkach, osłonach złączy,
        śrubach obciążających i innych akcesoriach do kijów, aby zapewnić właściwe
        dopasowanie.
    cue_tip_hardness:
      name: Twardość końcówki kija
      description: Określa twardość końcówki kija, która wpływa na kontrolę bili rozgrywającej
        i odczucie gry.
    cuff_height:
      name: Wysokość cholewki
      description: Określa wysokość cholewki buta, niską, średnią, wysoką, zdejmowaną/regulowaną,
        wpływającą na podparcie i elastyczność.
    cuff_position:
      name: Położenie mankietu
      description: Wskazuje miejsce na ciele użytkownika, do którego ma być mocowany
        mankiet linki.
    cultivation_method:
      name: Metoda uprawy
      description: Określa sposób uprawy warzyw liściowych, obejmując techniki uprawy
        i praktyki rolnicze.
    cup_type:
      name: Typ miseczki
      description: Wskazuje profil powierzchni cekina, płaski lub miseczkowy, oraz
        głębokość miseczki, co może wpływać na połysk, teksturę i ułożenie po przyszyciu
        lub przyklejeniu.
    cupcake_size:
      name: Rozmiar babeczki
      description: Określa fizyczną kategorię rozmiaru sprzedawanych babeczek, np.
        mini, standardowe, jumbo.
    curd_size:
      name: Rozmiar ziaren twarogu
      description: Określa rozmiar lub teksturę ziaren twarogu wiejskiego.
    cure_method:
      name: Metoda utwardzania
      description: Opisuje proces wymagany do związania lub utwardzenia kleju, np.
        światło UV, wilgotność powietrza, ciepło.
    curing_or_preparation_method:
      name: Metoda peklowania lub przygotowania
      description: Określa sposób peklowania oliwek lub innego przygotowania, np.
        peklowane w solance, peklowane w oleju, grillowane.
    curling_broom_head_material:
      name: Materiał główki szczotki do curlingu
      description: Określa podstawowy skład materiałowy główki lub pada szczotki.
    curling_broom_head_type:
      name: Typ główki szczotki do curlingu
      description: Określa styl lub konstrukcję główki/pada do szczotkowania.
    curling_shoe_slider_material:
      name: Materiał ślizgu buta do curlingu
      description: Określa podstawowy materiał podeszwy ślizgowej używanej w butach
        do curlingu.
    curling_training_aid_type:
      name: Typ pomocy treningowej do curlingu
      description: Określa typ pomocy treningowej do curlingu.
    curry_variety:
      name: Odmiana curry
      description: Klasyfikuje sosy curry według konkretnego stylu curry lub przepisu,
        który mają tworzyć, np. Tikka Masala, Massaman lub tajskie zielone curry,
        aby umożliwić precyzyjne filtrowanie według smaku/stylu.
    cushion_rubber_profile:
      name: Profil gumy bandy
      description: Kształt lub kod profilu elementów gumowych bandy.
    cushioning_level:
      name: Poziom amortyzacji
      description: Wskazuje ilość wyściółki pod stopą zapewnianej przez skarpetę w
        celu ochrony przed uderzeniami i komfortu.
    custom_label_content_type:
      name: Typ treści etykiety niestandardowej
      description: Określa informacje personalizowane na wszywce, np. imię/nazwę,
        logo, wiadomość, rozmiar, symbole pielęgnacji, dane kontaktowe.
    customization_type:
      name: Typ personalizacji
      description: Określa, czy koszulka jest pusta, zawodnicza, czy personalizowana
        imieniem/nazwiskiem i numerem.
    cut_or_preparation_style:
      name: Styl krojenia lub przygotowania
      description: Określa sposób pokrojenia lub przygotowania kawałków warzyw w puszce
        lub słoiku, np. całe, pokrojone w kostkę, w paski.
    cut_resistance_rating:
      name: Klasa odporności na przecięcie
      description: Określa formalnie przetestowany poziom odporności elementu na przecięcie.
    cut_type:
      name: Typ cięcia
      description: Wskazuje, czy tkanina jest sprzedawana na jardy/metry, jako gotowy
        kawałek czy jako rolka/bela.
    cutting_application:
      name: Zastosowanie do cięcia
      description: Główne zamierzone zastosowanie nożyczek do cięcia.
    cutting_mat_grid_style:
      name: Styl siatki maty do cięcia
      description: Styl nadrukowanych prowadnic na powierzchni maty.
    cutting_mat_intended_use:
      name: Zamierzone zastosowanie maty do cięcia
      description: Główne zastosowanie maty do cięcia jako powierzchni do rękodzieła/pracy.
    cv_boot_clamp_type:
      name: Typ opaski osłony przegubu CV
      description: Określa styl opaski/taśmy używanej do mocowania osłony przegubu
        CV.
    cv_boot_kit_contents:
      name: Zawartość zestawu osłony przegubu CV
      description: Wymienia elementy dołączone do osłony przegubu CV, np. opaski,
        saszetkę ze smarem, taśmy mocujące.
    cv_boot_material:
      name: Materiał osłony przegubu CV
      description: Określa podstawowy materiał konstrukcyjny osłony przegubu CV.
    cv_boot_position:
      name: Położenie osłony przegubu CV
      description: Określa, czy osłona przegubu CV pasuje do położenia wewnętrznego
        czy zewnętrznego przegubu CV na osi.
    cycling_apparel_fit:
      name: Dopasowanie odzieży rowerowej
      description: Opisuje krój odzieży, wskazując zamierzone przyleganie i aerodynamikę,
        np. wyścigowy, luźny.
    cylinder_head_assembly:
      name: Kompletacja głowicy cylindra
      description: Określa poziom kompletności głowicy cylindra w sprzedaży, np. w
        pełni zmontowana z zamontowanymi elementami układu zaworowego lub sam surowy/niezmontowany
        odlew.
    cylinder_head_material_grade:
      name: Klasa materiału głowicy cylindra
      description: Określa materiał i klasę użyte do odlewu głowicy cylindra.
    cylinder_head_position:
      name: Położenie głowicy cylindra
      description: Określa, do którego rzędu/strony lub orientacji pasuje głowica
        cylindra w silnikach wielorzędowych, np. lewa/prawa strona lub rząd 1/rząd
        2.
    cymbal_alloy:
      name: Stop talerza perkusyjnego
      description: Stop/skład talerza lub talerzy w zestawie.
    cymbal_application:
      name: Zastosowanie talerza perkusyjnego
      description: Główne zastosowanie gry, do którego talerz jest zaprojektowany/reklamowany.
    cymbal_arm_mounting_interface:
      name: Interfejs mocowania ramienia talerza
      description: Określa sposób mocowania ramienia talerza do pozostałego osprzętu
        perkusyjnego, np. zacisk, rack, gniazdo statywu.
    cymbal_arm_rotation_positioning_features:
      name: Funkcje obrotu/pozycjonowania ramienia talerza
      description: Określa funkcje pozycjonowania wpływające na możliwość ustawiania
        kąta/obracania ramienia i jego blokowania.
    cymbal_arm_style:
      name: Styl ramienia talerza
      description: Określa, czy ramię talerza jest proste czy typu boom, pod kątem
        preferencji zasięgu i pozycjonowania.
    cymbal_drum_case_wheel_configuration:
      name: Konfiguracja kółek futerału na talerze i bębny
      description: Wskazuje, czy futerał ma kółka, a jeśli tak, konfigurację kółek
        do transportu tocznego.
    cymbal_hammering_style:
      name: Styl młotkowania talerza
      description: Proces/wygląd młotkowania wpływający na złożoność i odczucie gry.
    cymbal_kit_components_included:
      name: Dołączono elementy zestawu talerzy perkusyjnych
      description: Określa, jakie typy talerzy są dołączone do zestawu/pakietu talerza
        ride, oprócz samego talerza ride.
    cymbal_kit_items_included:
      name: Dołączono elementy zestawu talerzy perkusyjnych
      description: Określa, jakie talerze są dołączone do zestawu/pakietu według typu
        talerza.
    cymbal_lathing:
      name: Toczenie talerza
      description: Określa, czy/jak duża część powierzchni talerza jest toczona (rowkowana),
        a jaka nietoczona/surowa.
    cymbal_playing_style_genre:
      name: Styl/gatunek gry na talerzach
      description: Określa typowy kontekst wykonawczy, do którego przeznaczone są
        talerze, np. zills do tańca brzucha lub marszowe/orkiestrowe talerze ręczne.
    cymbal_set_configuration:
      name: Konfiguracja zestawu talerzy
      description: Wskazuje, czy produkt jest sprzedawany jako pojedynczy talerz,
        dopasowana para czy zestaw wielu par, np. do nauki grupowej.
    cymbal_sound_character:
      name: Charakter dźwięku talerza perkusyjnego
      description: Opisuje ogólny profil brzmieniowy/voicing talerza używany do wyszukiwania,
        np. jasny lub ciemny.
    cymbal_sustain:
      name: Wybrzmiewanie talerza
      description: Czas, przez jaki talerz wybrzmiewa po uderzeniu.
    cymbal_type:
      name: Typ talerza
      description: Określa funkcjonalną rolę talerza, którą ma emulować elektroniczny
        pad talerza.
    cymbal_volume_level:
      name: Poziom głośności talerza
      description: Postrzegana kategoria głośności/mocy wyjściowej talerza.
    cymbal_weight_class:
      name: Klasa wagowa talerza
      description: Wskazuje klasę wagową talerza, wpływającą na brzmienie, głośność
        i reakcję.
    dairy_heat_treatment:
      name: Obróbka cieplna nabiału.
      description: Określa poziom obróbki lub pasteryzacji zastosowany w śmietance,
        np. surowa, pasteryzowana, UHT, wpływający na trwałość, smak i właściwości
        ubijania.
    damage_type:
      name: Typ uszkodzenia
      description: Określa typy uszkodzeń szyby przedniej, do których naprawy przeznaczony
        jest zestaw.
    damper_pedal_style:
      name: Styl pedału sustain
      description: Opisuje fizyczny styl pedału sustain używanego z keyboardami/pianinami
        cyfrowymi.
    damping_adjustability:
      name: Regulacja tłumienia
      description: Wskazuje, które parametry tłumienia i/lub wysokości jazdy można
        regulować w amortyzatorze.
    damping_level:
      name: Poziom tłumienia
      description: Wskazuje względny stopień redukcji głośności i wybrzmiewania zapewniany
        przez tłumik.
    dance_occasion:
      name: Okazja taneczna
      description: Wskazuje zamierzony kontekst użycia odzieży podczas ćwiczeń tanecznych
        lub występu.
    darbuka_accessories_included:
      name: Akcesoria dołączone do darbuki
      description: Wymienia typowe akcesoria dołączone do darbuki.
    darbuka_body_finish_type:
      name: Typ wykończenia korpusu darbuki
      description: Opisuje zewnętrzne wykończenie, powłokę lub dekoracyjne opracowanie
        korpusu darbuki.
    darbuka_head_material:
      name: Materiał membrany darbuki
      description: Określa materiał membrany bębna w darbuka.
    dart_barrel_material:
      name: Materiał barrelu lotki
      description: Określa podstawowy materiał barrelu lotki, wpływający na rozkład
        masy, trwałość i cenę.
    dart_shaft_design:
      name: Konstrukcja shaftu lotki
      description: Klasyfikuje mechaniczną konstrukcję shaftu, np. stały, obrotowy,
        teleskopowy lub zintegrowany z piórkiem, co wpływa na osiągi i cenę.
    dart_shaft_thread_type:
      name: Typ gwintu shaftu lotki
      description: Wskazuje rozmiar/typ gwintu używanego do wkręcania shaftu w barrel
        lotki, zapewniając kompatybilność między shaftami a barrelami.
    dart_thread_size:
      name: Rozmiar gwintu strzałki
      description: Określa rozmiar/standard gwintu, z którym część jest kompatybilna,
        zapewniając dopasowanie między shaftami, grotami i barrelami.
    dart_tip_compatibility:
      name: Kompatybilność grotów lotek
      description: Wskazuje, czy część lotki jest przeznaczona do lotek z grotami
        stalowymi, miękkimi czy do obu typów.
    dart_tip_connection_type:
      name: Typ połączenia grotu lotki
      description: Opisuje specyfikację gwintu lub system mocowania używany do połączenia
        grotu z barrelem lub shaftem lotki, zapewniając kompatybilność.
    dartboard_tournament_approval:
      name: Zatwierdzenie tarczy do darta do turniejów
      description: Wskazuje, czy tarcza do darta jest oficjalnie zatwierdzona przez
        konkretne federacje lub ligi darta.
    dartboard_type:
      name: Typ tarczy do darta
      description: Klasyfikuje tarczę do darta według technologii konstrukcji i kompatybilności
        z lotkami, np. sizalowa, elektroniczna, magnetyczna.
    dash_cover_construction_type:
      name: Typ konstrukcji osłony deski rozdzielczej
      description: Opisuje sposób uformowania/konstrukcji osłony deski rozdzielczej,
        np. formowana lub szyta, co wpływa na precyzję dopasowania i wygląd.
    dash_cover_cutout_configuration:
      name: Konfiguracja wycięć osłony deski rozdzielczej
      description: Wskazuje, pod które fabryczne otwory/czujniki deski rozdzielczej
        osłona jest wstępnie wycięta lub ukształtowana.
    dashboard_accessory_position:
      name: Położenie akcesorium na desce rozdzielczej
      description: Określa, gdzie na desce rozdzielczej lub wokół niej akcesorium
        jest przeznaczone do umieszczenia lub montażu.
    date_variety:
      name: Odmiana daktyli
      description: Określa kultywar/odmianę daktyli, np. Medjool, Deglet Noor, Ajwa.
        Odmiana silnie wpływa na smak, rozmiar i teksturę oraz jest podkreślana w
        większości tytułów i opisów produktów, więc jej uwzględnienie poprawia filtrowanie
        i wyszukiwanie.
    dayan_head_material:
      name: Materiał membrany dayanu
      description: Materiał powierzchni gry (pudi), np. rodzaj skóry naturalnej lub
        materiał syntetyczny.
    dayan_strap_material:
      name: Materiał paska dayanu
      description: Materiał pasków napinających (baddhi) używanych do sznurowania
        dayanu.
    dayan_syahi_type:
      name: Typ syahi dayanu
      description: Typ aplikacji syahi, czyli czarnej pasty strojącej, na membranie
        dayanu.
    decaffeination_method:
      name: Metoda dekofeinizacji
      description: Określa proces używany do usuwania kofeiny z kawy bezkofeinowej.
    decal_installation_method:
      name: Metoda montażu naklejki
      description: Sposób nakładania naklejki na powierzchnię pojazdu, np. aplikacja
        na sucho, aplikacja na mokro. Szczegóły dotyczące narzędzi/wymagań, np. taśmy
        transferowej lub opalarki, należy ująć w instrukcjach lub powiązanych atrybutach
        narzędziowych, jeśli dotyczy.
    decal_orientation:
      name: Orientacja naklejki
      description: Wskazuje, czy naklejka jest przeznaczona do aplikacji od wewnętrznej
        strony szyby czy na zewnętrznej powierzchni.
    decal_placement_type:
      name: Typ umiejscowienia naklejki
      description: Wskazuje, gdzie na pojeździe naklejka jest przeznaczona do aplikacji,
        np. panel nadwozia, zderzak, maska.
    decal_visibility_property:
      name: Właściwość widoczności naklejki
      description: Właściwości optyczne/widoczności naklejki mające poprawić widoczność
        lub reakcję na światło, np. odblaskowość, fluorescencja, świecenie w ciemności
        lub cechy przezroczystości.
    deck_concave_level:
      name: Poziom wklęsłości decku
      description: Wskazuje głębokość lub intensywność wklęsłości decku, np. łagodna,
        średnia, głęboka.
    deck_flex_rating:
      name: Ocena elastyczności decku
      description: Jakościowa ocena elastyczności/sztywności decku.
    deck_material:
      name: Materiał blatu
      description: Określa podstawowy materiał konstrukcyjny decku deskorolki.
    decoder_interface_socket_type:
      name: Interfejs/typ gniazda dekodera
      description: Typ interfejsu dekodera cyfrowego lub konfiguracja dekodera pokładowego
        dla modelu lokomotywy.
    decoration_technique:
      name: Technika zdobienia
      description: Określa podstawową metodę nanoszenia grafiki lub ozdób na koszulkę.
    decorative_stamp_form_factor:
      name: Forma stempla dekoracyjnego
      description: Określa fizyczny format stempla i sposób odbijania wzoru, np. pojedynczy
        stempel, zestaw, wałek, tło itp.
    decorative_tape_application:
      name: Zastosowanie taśmy dekoracyjnej
      description: Główne zastosowanie rękodzielnicze, do którego taśma dekoracyjna
        jest przeznaczona lub reklamowana.
    decorative_tape_format:
      name: Format taśmy dekoracyjnej
      description: Określa sposób dostarczenia/zapakowania taśmy dekoracyjnej do użycia.
    decoy_buoyancy:
      name: Wyporność wabika
      description: 'Opisuje zachowanie wabika w toni wodnej: pływający, zawieszony
        lub tonący.'
    decoy_joint_type:
      name: Typ łączenia wabika
      description: Wskazuje, czy korpus wabika jest jednolity czy przegubowy, co wpływa
        na pracę w wodzie.
    decoy_motion_mechanism:
      name: Mechanizm ruchu wabika
      description: Opisuje, w jaki sposób wabik wytwarza ruch lub zaburzenia wody,
        jeśli w ogóle, aby przyciągać zwierzynę.
    decoy_posture:
      name: Pozycja wabika
      description: Wskazuje przedstawioną postawę lub aktywność zwierzęcia odwzorowanego
        przez wabik, np. żerowanie, odpoczynek, czujność.
    decoy_size_class:
      name: Klasa rozmiaru wabika
      description: Klasyfikuje względną skalę wabika w porównaniu z prawdziwym zwierzęciem,
        np. standardowy, magnum, powiększony.
    decoy_style:
      name: Styl wabika
      description: Definiuje fizyczną formę lub klasę konstrukcji wabika, aby pomóc
        myśliwym wybrać właściwą konfigurację.
    deli_meat_variety:
      name: Odmiana wędliny delikatesowej
      description: Klasyfikuje konkretny rodzaj wędliny (np. salami, mortadela, prosciutto,
        rostbef).
    delivery_form:
      name: Forma dostawy
      description: Fizyczna forma podania środka do czyszczenia wtryskiwaczy.
    denim_composition:
      name: Skład denimu
      description: Podstawowy skład włókien denimu (bez barwników i wykończeń).
    denim_finish:
      name: Wykończenie denimu
      description: Wykończenie/obróbka powierzchni zastosowana na tkaninie denimowej.
    denim_intended_use:
      name: Przeznaczenie denimu
      description: Typowe zastosowanie/projekt, do którego przeznaczony jest denim.
    denim_stretch_type:
      name: Typ rozciągliwości denimu
      description: Wskazuje, czy denim ma rozciągliwość mechaniczną, dodany elastan/spandex
        czy brak rozciągliwości.
    denim_wash:
      name: Spranie denimu
      description: Wskazuje odcień lub rodzaj prania zastosowanego na tkaninie denimowej
        (np. jasny, ciemny, raw, acid wash).
    derailleur_cage_length:
      name: Długość wózka przerzutki
      description: Wskazuje długość wózka przerzutki określającą pojemność łańcucha
        (głównie dla tylnych przerzutek).
    derailleur_mounting_style:
      name: Styl mocowania przerzutki
      description: Określa sposób mocowania przerzutki do ramy roweru lub haka (np.
        braze-on, clamp, direct mount, UDH).
    derailleur_type:
      name: Typ przerzutki
      description: Wskazuje, czy produkt jest przerzutką przednią czy tylną.
    deshedder_tool_type:
      name: Typ narzędzia do usuwania podszerstka
      description: Klasyfikuje konstrukcję zgrzebła do wyczesywania sierści, aby klienci
        mogli wybrać preferowaną metodę pielęgnacji (np. ostrze, blok, curry lub rękawica).
    diabolo_axle_system:
      name: System osi diabolo
      description: Określa system/konfigurację osi diabolo, wpływającą na grindowanie,
        stabilność i zużycie sznurka.
    diagnostic_functions_supported:
      name: Obsługiwane funkcje diagnostyczne
      description: Określa funkcje diagnostyczne/serwisowe, które może wykonywać skaner.
    diagnostic_interface_type:
      name: Typ interfejsu diagnostycznego
      description: relacja/interfejs służący do komunikacji z pojazdem lub urządzeniem
        (np. OBD-II, Bluetooth, Wi‑Typ połączenia/interfejsu używanego do komunikacji
        z pojazdem lub urządzeniem (np. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Klasa barwy diamentu
      description: Wskazuje klasę barwy diamentów, od D (bezbarwne) do Z (lekko zabarwione),
        lub oznacza diamenty o barwie fantazyjnej.
    diaper_cover_style:
      name: Styl osłonki na pieluchę
      description: Definiuje sylwetkę wzorniczą lub styl dekoracyjny osłony pieluchy,
        ułatwiając przeglądanie i filtrowanie według stylu.
    diastatic_power_unit:
      name: Jednostka siły diastatycznej
      description: Określa system jednostek używany do podawania wartości siły diastatycznej
        produktu, np. °Lintner lub Windisch-Kolbach.
    diatonic_harmonica_tuning_system:
      name: System strojenia harmonijki diatonicznej
      description: Określa układ dźwięków/system strojenia używany w harmonijce diatonicznej.
    dice_sides:
      name: Liczba ścianek kości
      description: Liczba ścianek (powierzchni) na kostce do gry dołączonej do produktu
        (np. d6, d20). W przypadku zestawów mieszanych użyj dominującego typu lub
        podaj wiele wartości, jeśli jest to obsługiwane.
    didgeridoo_construction_type:
      name: Typ konstrukcji didgeridoo
      description: Sposób konstrukcji lub formowania didgeridoo, tradycyjny lub nowoczesny.
    dietary_formulation_claim:
      name: Deklaracja składu dietetycznego
      description: Wyróżnia kluczowe cechy formuły lub wykluczenia istotne dla żywienia
        koni, np. bez zbóż, niska zawartość skrobi, organiczne.
    dinosaur_playset_scale_figure_size_class:
      name: Skala/klasa rozmiaru figurek w zestawie dinozaurów
      description: Opisuje ogólną skalę dołączonych dinozaurów/figurek, aby zapewnić
        kompatybilność z innymi zestawami.
    dinosaur_species_included:
      name: Gatunki dinozaurów w zestawie
      description: Określa gatunki dinozaurów reprezentowane w zestawie (figurki lub
        odlewane dinozaury).
    dipsy_diver_size_designation:
      name: Oznaczenie rozmiaru dipsy divera
      description: Wskazuje określony przez producenta kod rozmiaru dipsy divera wędkarskiego,
        który koreluje z wagą i głębokością nurkowania.
    disc_brake_rotor_mount_type:
      name: Typ mocowania tarczy hamulca tarczowego
      description: Określa sposób mocowania tarczy hamulcowej do piasty (np. 6-śrubowe,
        Center Lock).
    disc_lock_accessories_included:
      name: Akcesoria do blokady tarczy w zestawie
      description: Określa dodatkowe elementy pakowane z blokadą tarczy rowerowej,
        takie jak linka przypominająca, pokrowiec transportowy, uchwyt montażowy lub
        baterie.
    disco_ball_mirror_tile_material:
      name: Materiał lustrzanych płytek kuli dyskotekowej
      description: Materiał odblaskowych płytek na kuli dyskotekowej, jeśli dotyczy.
    disco_ball_mirror_tile_size:
      name: Rozmiar lustrzanych płytek kuli dyskotekowej
      description: Przybliżony rozmiar pojedynczych lusterek/kafelków na kuli dyskotekowej.
    display_backlight_color:
      name: Kolor podświetlenia wyświetlacza
      description: Kolor podświetlenia/oświetlenia wyświetlacza lub tarczy miernika.
    disposable_compostable_claim:
      name: Deklaracja jednorazowości/kompostowalności
      description: Wskazuje, czy produkt jest kompostowalny, biodegradowalny, nadający
        się do recyklingu czy żaden z nich, jeśli dotyczy.
    distillation_method:
      name: Metoda destylacji
      description: Określa metodę destylacji lub typ alembiku użyty do produkcji alkoholu.
    distilled_water_intended_use:
      name: Zamierzone zastosowanie wody destylowanej
      description: Określa podstawowe zastosowanie wody destylowanej (np. picie, urządzenie
        CPAP, nawilżacz, żelazko parowe).
    distress_transmission_frequency:
      name: Częstotliwość transmisji alarmowej
      description: Główna częstotliwość/częstotliwości radiowe używane do sygnalizacji
        alarmowej.
    distressing_level:
      name: Poziom postarzenia
      description: Określa ilość celowych przetarć, rozdarć lub postrzępień zastosowanych
        na tkaninie.
    distressing_style:
      name: Styl postarzenia
      description: Wskazuje typ lub poziom przetarć jeansów, np. ripped lub whiskered.
    distributor_advance_mechanism:
      name: Mechanizm wyprzedzenia zapłonu w aparacie zapłonowym
      description: Określa typ mechanizmu wyprzedzenia zapłonu zastosowanego w aparacie
        zapłonowym.
    distributor_cap_terminal_type:
      name: Typ zacisków kopułki aparatu zapłonowego
      description: Określa styl zacisków kopułki aparatu zapłonowego.
    distributor_gear_material:
      name: Materiał koła zębatego aparatu zapłonowego
      description: Określa materiał koła zębatego napędu aparatu zapłonowego.
    distributor_ignition_type:
      name: Typ zapłonu aparatu zapłonowego
      description: Określa, czy aparat zapłonowy jest przeznaczony do układów z przerywaczem,
        zapłonem elektronicznym czy typu HEI.
    distributor_kit_contents:
      name: Zawartość zestawu aparatu zapłonowego
      description: Wskazuje, które elementy są dołączone do aparatu zapłonowego (np.
        kopułka, palec rozdzielacza, moduł zapłonowy, uszczelka/O-ring, koło napędowe,
        okablowanie/złącze).
    dive_computer_form_factor:
      name: Forma komputera nurkowego
      description: Określa konstrukcję fizyczną lub sposób montażu komputera nurkowego,
        np. montowany w konsoli lub w formie zegarka.
    diving_mask_design:
      name: Konstrukcja maski nurkowej
      description: Definiuje ogólny styl konstrukcji maski do nurkowania, wpływający
        na dopasowanie, pole widzenia i zamierzone użycie.
    divot_tool_prong_configuration:
      name: Konfiguracja zębów narzędzia do naprawy divotów
      description: Określa liczbę i układ zębów narzędzia do naprawy divotów, używanych
        do naprawy uszkodzeń murawy.
    divot_tool_style:
      name: Typ narzędzia do naprawy divotów
      description: Definiuje ogólny styl konstrukcji lub rozkładania narzędzia do
        naprawy divotów, taki jak stałe, wysuwane/składane, wielofunkcyjne lub akcesoria
        przypinane do czapki albo kija.
    djembe_shell_construction:
      name: Konstrukcja korpusu djembe
      description: Opisuje metodę konstrukcji korpusu djembe.
    djembe_tuning_system:
      name: System strojenia djembe
      description: Określa sposób napinania/strojenia djembe.
    dmx_output_connector_type:
      name: Typ złącza wyjściowego DMX
      description: Format fizycznego złącza wyjściowego DMX kontrolera.
    doctor_playset_items_included:
      name: Elementy dołączone do zestawu lekarza
      description: Określa zabawkowe narzędzia medyczne i akcesoria do odgrywania
        ról dołączone do zestawu lekarskiego (np. stetoskop, strzykawka, młotek neurologiczny).
    doctor_playset_role_play_setting:
      name: Sceneria zabawy w lekarza
      description: Określa główny kontekst odgrywania ról reprezentowany przez zestaw
        lekarski.
    doctor_playset_wearable_items_included:
      name: Dołączone elementy do noszenia w zestawie lekarza
      description: Wskazuje elementy kostiumu do noszenia dołączone do zestawu.
    doll_accessory_type:
      name: Typ akcesorium dla lalki
      description: Definiuje, jakiego rodzaju akcesorium do lalki lub figurki akcji
        stanowi produkt, np. odzież, buty, meble, stojaki ekspozycyjne, umożliwiając
        kupującym przeglądanie i filtrowanie w tej kategorii akcesoriów.
    doll_eye_type:
      name: Typ oczu lalki
      description: Określa styl konstrukcji oczu lalki (np. akrylowe osadzane, malowane,
        podświetlane LED).
    doll_hair_fiber_type:
      name: Typ włókna włosów lalki
      description: Typ włosów/włókien użytych w lalce lub ich brak, wpływający na
        realizm, stylizację i pielęgnację.
    doll_making_kit_components_included:
      name: Elementy dołączone do zestawu do tworzenia lalek
      description: Wymienia kluczowe materiały i narzędzia dołączone do zestawu do
        robienia lalek, aby kupujący mogli porównać zestawy i wiedzieli, co muszą
        zapewnić samodzielnie.
    dollhouse_installation_placement_type:
      name: Typ instalacji/ustawienia domku dla lalek
      description: Określa sposób użytkowania lub ustawienia domku dla lalek (np.
        stołowy, wolnostojący lub ścienny).
    dollhouse_items_included:
      name: Elementy domku dla lalek w zestawie
      description: 'Określa, co znajduje się w opakowaniu z domkiem dla lalek: meble,
        lalki, akcesoria.'
    dollhouse_lighting_type:
      name: Typ oświetlenia domku dla lalek
      description: Typ oświetlenia dołączonego do domku dla lalek lub przez niego
        obsługiwanego.
    dollhouse_room_type:
      name: Typ pomieszczenia w domku dla lalek
      description: Określa pomieszczenie/obszar w domku dla lalek, w którym akcesorium
        jest zazwyczaj używane.
    dollhouse_scale:
      name: Skala domku dla lalek
      description: Skala domku dla lalek lub akcesoriów do domku dla lalek (np. 1:12)
        zapewniająca kompatybilność między domkami, meblami i figurkami.
    dollhouse_style_theme:
      name: Styl/motyw domku dla lalek
      description: Ogólny styl lub motyw domku dla lalek do przeglądania i wyboru
        prezentu, np. nowoczesny lub wiktoriański.
    donnos_playing_technique:
      name: Technika gry na donnos
      description: Sposób gry/obsługi donnos (tylko ręce lub z pałką/uderzaczem),
        zgodny z oczekiwaniami kupującego i dołączonymi akcesoriami.
    donnos_tuning_system:
      name: System strojenia Donnos
      description: Podstawowa metoda używana do strojenia lub zmiany wysokości dźwięku
        (np. linki napinające/mechanizm ściskający).
    door_assembly_type:
      name: Typ zespołu drzwi
      description: 'Wskazuje, co jest dołączone: sama skorupa drzwi, poszycie drzwi
        czy kompletny zespół drzwi.'
    door_closure_mechanism:
      name: Mechanizm zamykania drzwi
      description: Definiuje mechanizm sterujący zamykaniem drzwi, np. cichy domyk,
        zatrzask magnetyczny.
    door_handle_components_included:
      name: Elementy klamki drzwi w zestawie
      description: Wskazuje, które kluczowe elementy są dołączone do klamki drzwi
        (np. wkładka zamka, uszczelka, osłona wykończeniowa, elementy montażowe, wiązka
        przewodów, zatrzask/siłownik).
    door_handle_operation:
      name: Działanie klamki drzwi
      description: Określa podstawowy styl uruchamiania/działania zespołu klamki drzwi
        pojazdu, np. mechaniczne cięgno, wkładka klucza, bezkluczykowy dotyk/przycisk,
        elektryczne wysuwanie.
    door_lock_knob_attachment_method:
      name: Metoda mocowania gałki blokady drzwi
      description: Określa, jak gałka blokady drzwi mocuje się do pręta zamka, np.
        gwintowana, wciskana.
    door_lock_position:
      name: Położenie zamka drzwi
      description: Określa, do której pozycji drzwi/otwarcia przeznaczony jest zamek
        drzwi lub jego część w pojeździe.
    door_seal_feature_set:
      name: Zestaw cech uszczelki drzwi
      description: Cechy funkcjonalne uszczelki drzwi.
    door_seal_material_type:
      name: Typ materiału uszczelki drzwi
      description: Podstawowa rodzina elastomerów/materiałów użytych do uszczelki
        drzwi (poza ogólnym określeniem materiału).
    door_seal_product_form:
      name: Forma produktu uszczelki drzwi
      description: Wskazuje formę sprzedaży/opakowania uszczelki drzwi.
    door_window_operation:
      name: Działanie okien w drzwiach
      description: Określa, czy system okienny drzwi jest przeznaczony do obsługi
        ręcznej, elektrycznej lub czy drzwi nie posiadają okna.
    double_decker_bus_deck_configuration:
      name: Konfiguracja pokładów autobusu piętrowego
      description: Określa konfigurację dostępu do pokładu/dachu autobusu piętrowego.
    double_drum_pedal_linkage_medium:
      name: Medium połączenia podwójnego pedału perkusyjnego
      description: Określa medium używane do połączenia pedału pomocniczego z głównym
        (np. wał napędowy, łańcuch, pasek).
    double_end_bag_core_type:
      name: Typ rdzenia gruszki refleksowej
      description: Określa konstrukcję wewnętrznego rdzenia uderzeniowego, która decyduje
        o szybkości odbicia, odczuciu i wymaganiach konserwacyjnych.
    double_pointed_needle_point_style:
      name: Typ końcówki drutów pończoszniczych
      description: Opisuje ostrość/kształt końcówki przeznaczonej do różnych typów
        włóczek i stylów dziania.
    dough_extruder_accessories_included:
      name: Akcesoria do wyciskarki do ciasta w zestawie
      description: Dodatkowe elementy dołączone do wyciskarki do masy.
    dough_extruder_operation_type:
      name: Typ działania wyciskarki do masy
      description: Sposób przepychania masy przez wyciskarkę w celu formowania kształtów.
    dough_extruder_shape_disc_included:
      name: Tarcze z kształtami dołączone do wyciskarki do masy
      description: Kształty, które wyciskarka może tworzyć za pomocą dołączonych dysz/tarcz.
    dough_format:
      name: Format ciasta
      description: Określa fizyczną postać/kształt ciasta w opakowaniu (np. kula,
        arkusz, krążek, rozdrobnione paski).
    doumbek_accessories_included:
      name: Dołączono akcesoria do darbuki
      description: Akcesoria dołączone do darbuki (np. klucz do strojenia, futerał).
    doumbek_head_material:
      name: Materiał membrany darbuki
      description: Materiał naciągu bębna (membrany) w doumbeku.
    doumbek_head_type:
      name: Typ naciągu doumbeku
      description: Konstrukcja/typ membrany darbuki (sposób wykonania lub montażu
        membrany).
    doumbek_playing_style_technique:
      name: Styl/technika gry na darbuce
      description: Docelowy kontekst/styl gry powszechnie kojarzony z darbuką.
    doumbek_tuning_system:
      name: System strojenia darbuki
      description: Sposób napinania/strojenia darbuki (lub informacja, że nie podlega
        strojeniu).
    dowel_end_style:
      name: Typ zakończenia kołka
      description: Opisuje cięcie/kształt końców kołka, wpływające na łatwość wkładania,
        bezpieczeństwo i zamierzone zastosowanie rękodzielnicze.
    dowel_surface_texture:
      name: Faktura powierzchni kołka
      description: Opisuje stan powierzchni kołka, taki jak gładki lub ryflowany,
        który wpływa na wygląd i przyczepność kleju.
    drafting_compass_adjustment_mechanism:
      name: Mechanizm regulacji cyrkla kreślarskiego
      description: Podstawowy mechanizm precyzyjnej regulacji używany do dokładnego
        ustawiania promienia.
    drafting_compass_fine_adjustment_mechanism:
      name: Mechanizm precyzyjnej regulacji cyrkla
      description: Typ precyzyjnej regulacji używanej do dokładnego ustawienia promienia
        (jeśli występuje).
    drafting_compass_lead_holder_type:
      name: Typ uchwytu grafitu w cyrklu kreślarskim
      description: Typ wkładu/uchwytu rysunkowego dołączonego do cyrkla lub przez
        niego obsługiwanego.
    drag_system_material:
      name: Materiał systemu hamulca
      description: Określa materiał lub technologię zastosowaną w stosie hamulca,
        wpływającą na odporność na ciepło i płynność działania.
    drag_system_type:
      name: Typ systemu prowadzenia
      description: Określa styl mechanizmu hamulca używanego w kołowrotku, np. przedni,
        tylny, dźwigniowy, gwiazdowy, magnetyczny lub tarczowy.
    drag_type:
      name: Typ hamulca
      description: Określa styl mechanizmu hamulca zastosowanego w kołowrotku (lokalizacja
        lub sposób działania).
    drawer_features:
      name: Cechy szuflady
      description: Opisuje specjalne elementy konstrukcyjne lub funkcje szuflady (np.
        cichy domyk, wyściółka filcowa).
    drawer_slide_type:
      name: Typ prowadnicy szuflady
      description: Określa styl montażu i wysuwu prowadnic szuflady (np. podblatowe,
        pełen wysuw).
    drawing_ink_compatible_tools:
      name: Narzędzia kompatybilne z tuszem rysunkowym
      description: Określa narzędzia aplikacyjne, do których przeznaczony jest tusz,
        np. stalówka lub pędzel.
    drawing_ink_permanence:
      name: Trwałość tuszu rysunkowego
      description: Wskazuje cechy trwałości istotne dla gotowych prac artystycznych
        i reprodukcji.
    dress_embellishment:
      name: Ozdoby sukienki
      description: Wyróżnia główne elementy dekoracyjne zastosowane w projekcie sukienki.
    dress_train_type:
      name: Typ trenu sukienki
      description: Wskazuje obecność oraz długość/styl trenu sukienki, informując
        o formalności i odpowiedniości do miejsca wydarzenia.
    dried_surface_finish:
      name: Suche wykończenie powierzchni
      description: Opisuje typowy wygląd powierzchni po wyschnięciu (połysk/tekstura).
    drink_tube_insulation:
      name: Izolacja rurki do picia
      description: Wskazuje, czy rurka do picia posiada izolację lub osłonę termiczną
        zapobiegającą nagrzewaniu lub zamarzaniu płynów.
    drive_band_cross_section_shape:
      name: Kształt przekroju pasa napędowego
      description: Kształt profilu pasa napędowego, np. okrągły, płaski itp.
    drive_band_join_type:
      name: Typ łączenia pasa napędowego
      description: Sposób łączenia/konstrukcji pasa napędowego (bezkońcowy lub wymagający
        wiązania itp.).
    drive_band_material_type:
      name: Typ materiału cięgna napędowego
      description: Określa materiał/typ pasa napędowego używanego w kołowrotkach przędzalniczych.
    drive_location:
      name: Lokalizacja napędu
      description: Określa położenie koła zamachowego/mechanizmu napędowego w orbitreku,
        wpływające na zajmowaną przestrzeń i odczucia podczas ruchu.
    drive_mechanism:
      name: Mechanizm napędowy
      description: Określa typ układu napędowego używanego do przenoszenia mocy z
        pedałów na koło zamachowe.
    drive_shaft_material:
      name: Materiał wału napędowego
      description: Określa podstawowy materiał wału napędowego lub kompletnego zespołu.
    drive_system:
      name: Układ napędowy
      description: Określa mechanizm przenoszący siłę pedałowania do systemu oporu.
    drivetrain_configuration:
      name: Konfiguracja układu napędowego
      description: Określa konfigurację napędu roweru, wskazując, czy tylna piasta
        jest typu fixed, jednobiegowa z wolnobiegiem czy flip-flop.
    drivetrain_speed_compatibility:
      name: Kompatybilność liczby przełożeń napędu
      description: Wymienia liczby rzędów kaset, z którymi tarcza mechanizmu korbowego
        została zaprojektowana do współpracy, zapewniając prawidłowy profil zębów
        i rozstaw.
    drone_positioning_system:
      name: System pozycjonowania drona
      description: Obsługiwana pokładowa technologia pozycjonowania/utrzymywania pozycji
        drona do nawigacji i stabilnego zawisu.
    drone_transmission_type:
      name: Typ transmisji drona
      description: Podstawowa metoda używana do sterowania i/lub łącza wideo między
        dronem a kontrolerem/urządzeniem.
    drop_spindle_whorl_position:
      name: Pozycja przęślika wrzeciona drop spindle
      description: Położenie krążka na osi.
    drum_carder_accessories_included:
      name: Dołączono akcesoria do gręplarki bębnowej
      description: Typowe elementy dołączane do zestawu gręplarki bębnowej.
    drum_clamp_locking_mechanism:
      name: Mechanizm blokowania zacisku perkusyjnego
      description: Określa sposób blokowania/dokręcania zacisku do rury/obręczy, np.
        śruba motylkowa, śruba na klucz perkusyjny, szybkozamykacz.
    drum_clamp_mount_interface:
      name: Interfejs mocowania zacisku gręplarki bębnowej
      description: Określa, co zacisk zapewnia do mocowania akcesoriów, np. gniazdo
        pręta L, przegub kulowy, uchwyt talerza.
    drum_clamp_type:
      name: Typ zacisku perkusyjnego
      description: Określa funkcjonalny styl zacisku używanego w osprzęcie montażowym
        zestawu perkusyjnego, np. zacisk do obręczy lub zacisk do racka/rury.
    drum_head_application_batter_resonant:
      name: Zastosowanie naciągu perkusyjnego (uderzeniowy/rezonansowy)
      description: 'Określa, do której strony/roli na bębnie przeznaczony jest naciąg:
        górna powierzchnia do gry lub dolna rezonansowa/werblowa.'
    drum_head_collar_type:
      name: Typ kołnierza naciągu perkusyjnego
      description: Określa, czy naciąg ma standardowy kołnierz, niski kołnierz czy
        specjalny profil kołnierza pasujący do określonych krawędzi nośnych/korpusów.
    drum_head_damping_control:
      name: Kontrola tłumienia naciągu perkusyjnego
      description: Wbudowane funkcje kontroli alikwotów lub styl tłumienia uwzględnione
        w konstrukcji naciągu.
    drum_head_film_material:
      name: Materiał folii naciągu perkusyjnego
      description: Podstawowy materiał membrany naciągu (najczęściej PET/Mylar, ale
        mogą występować materiały specjalistyczne).
    drum_head_hoop_collar_type:
      name: Typ obręczy do korpusu bębna
      description: Określa konstrukcję obręczy i kołnierza naciągu perkusyjnego (np.
        profil kołnierza i materiał obręczy), co może wpływać na dopasowanie i stabilność
        strojenia w niektórych korpusach i obręczach.
    drum_head_hoop_rim_material:
      name: Materiał obręczy naciągu perkusyjnego
      description: Materiał obręczy naciągu, czyli wbudowanej obręczy wewnątrz naciągu,
        który może wpływać na trwałość i stabilność strojenia.
    drum_head_included:
      name: Naciąg perkusyjny w zestawie
      description: Wskazuje, czy z bębnem dołączone są naciągi uderzeniowe i/lub rezonansowe.
    drum_head_muffling_feature:
      name: Funkcja tłumienia korpusu bębna
      description: Wbudowane funkcje kontroli alikwotów zintegrowane z naciągiem perkusyjnym.
    drum_head_muffling_type:
      name: Typ tłumienia naciągu perkusyjnego
      description: Wskazuje, czy naciąg perkusyjny zawiera wbudowane elementy kontroli
        alikwotów/tłumienia.
    drum_head_ply_count:
      name: Liczba warstw naciągu perkusyjnego
      description: Liczba warstw folii zastosowanych w konstrukcji naciągu perkusyjnego
        (np. 1-warstwowy, 2-warstwowy).
    drum_head_position:
      name: Pozycja naciągu perkusyjnego
      description: Wskazuje, czy naciąg perkusyjny jest przeznaczony jako naciąg uderzeniowy
        (górny/uderzany), rezonansowy (dolny), werblowy dolny, czy może być używany
        w obu rolach.
    drum_head_reinforcement_type:
      name: Typ wzmocnienia naciągu perkusyjnego
      description: Określa, czy naciąg werblowy posiada elementy wzmacniające, takie
        jak centralna kropka lub pierścień kontrolny zwiększające trwałość i skupienie
        brzmienia.
    drum_head_surface_finish:
      name: Wykończenie powierzchni korpusu bębna
      description: Tekstura/wykończenie powierzchni naciągu wpływające na atak i reakcję
        szczotek.
    drum_head_type:
      name: Typ naciągu perkusyjnego
      description: Określa konstrukcję/typ naciągu używanego na bębnie, głównie dla
        dołączonych naciągów uderzeniowych/rezonansowych.
    drum_key_design_type:
      name: Typ konstrukcji kluczy do strojenia perkusji
      description: Opisuje funkcjonalną konstrukcję klucza do strojenia bębnów, np.
        standardowy, z grzechotką, z uchwytem T.
    drum_key_drive_type:
      name: Typ napędu klucza perkusyjnego
      description: Określa styl napędu/interfejsu klucza perkusyjnego używanego do
        współpracy ze śrubą naciągową lub osprzętem montażowym.
    drum_key_handle_style:
      name: Styl uchwytu klucza perkusyjnego
      description: Opisuje styl uchwytu/ergonomii klucza perkusyjnego, wpływający
        na komfort i siłę dźwigni podczas strojenia.
    drum_kit_included_items:
      name: Elementy zestawu perkusyjnego w zestawie
      description: Wymienia główne elementy dołączone do zestawu perkusyjnego poza
        korpusami/padami, np. osprzęt, talerze, stołek.
    drum_kit_portability:
      name: Mobilność zestawu perkusyjnego
      description: Wskazuje, czy zestaw został zaprojektowany z myślą o kompaktowym
        przechowywaniu/transporcie (np. podróżny, kompaktowy, składany).
    drum_kit_shell_construction_features:
      name: Cechy konstrukcyjne korpusów zestawu perkusyjnego
      description: Sposób konstrukcji korpusów, np. liczba/typ warstw, wpływający
        na brzmienie i trwałość.
    drum_mount_clamp_type:
      name: Typ zacisku do mocowania bębna
      description: Opisuje typ zacisku stosowanego w osprzęcie montażowym perkusji.
    drum_multi_clamp_clamp_type:
      name: Typ zacisku multiclampa perkusyjnego
      description: Funkcjonalny styl/konfiguracja multi-clampu, czyli sposób zaciskania
        i łączenia elementów.
    drum_mute_material:
      name: Materiał tłumika perkusyjnego
      description: Określa podstawowy materiał tłumika perkusyjnego stykającego się
        z naciągiem i/lub tłumiącego drgania.
    drum_pad_triggering_zones:
      name: Strefy wyzwalania pada perkusyjnego
      description: Wskazuje liczbę/typ stref triggera obsługiwanych przez pad tomu
        (np. tylko naciąg lub naciąg + obręcz), co wpływa na ekspresję i kompatybilność
        z modułem.
    drum_pedal_accessories_included:
      name: Dołączono akcesoria do stopy perkusyjnej
      description: Wymienia najważniejsze akcesoria i elementy dołączone do pedału
        perkusyjnego.
    drum_pedal_baseplate_type:
      name: Typ podstawy pedału perkusyjnego
      description: Wskazuje, czy pedał wykorzystuje konstrukcję z podstawą czy pływającą/bezramową.
    drum_pedal_bearing_type:
      name: Typ łożyska pedału perkusyjnego
      description: Określa mechanizm łożyskowania stosowany w głównych punktach obrotu,
        np. rocker, pięta, krzywka.
    drum_pedal_cam_type:
      name: Typ krzywki stopy perkusyjnej
      description: Określa kształt/geometrię krzywki pedału perkusyjnego, która wpływa
        na odczucie gry i reakcję, np. liniowa lub przyspieszająca.
    drum_pedal_chain_configuration:
      name: Konfiguracja łańcucha pedału perkusyjnego
      description: Określa układ łańcucha stosowany w pedale perkusyjnym z napędem
        łańcuchowym, np. pojedynczy łańcuch, podwójny łańcuch lub łańcuch przesunięty.
    drum_pedal_chain_type:
      name: Typ łańcucha stopy perkusyjnej
      description: Wskazuje styl łańcucha używanego w napędzie, np. łańcuch rolkowy
        lub łańcuch typu rowerowego, który może wpływać na płynność i trwałość.
    drum_pedal_clamp_type:
      name: Typ zacisku pedału perkusyjnego
      description: Określa sposób mocowania pedału do obręczy bębna basowego.
    drum_pedal_intended_use:
      name: Zamierzone zastosowanie pedału perkusyjnego
      description: Wskazuje główny kontekst gry, do którego przeznaczony/reklamowany
        jest pedał z napędem paskowym.
    drum_pedal_spring_adjustment_method:
      name: Metoda regulacji sprężyny pedału perkusyjnego
      description: Wskazuje sposób regulacji napięcia sprężyny w pedale.
    drum_pedal_spring_type:
      name: Typ sprężyny stopy perkusyjnej
      description: Określa mechanizm sprężyny używany do powrotu pedału.
    drum_shell_material:
      name: Materiał korpusu bębna
      description: Określa podstawowy materiał korpusu bębnów akustycznych (np. klon,
        brzoza, akryl).
    drum_shell_wood_species:
      name: Gatunek drewna korpusu bębna
      description: Określa gatunek drewna użyty do korpusu bębna, wpływający na brzmienie
        i rezonans.
    drumhead_type:
      name: Typ naciągu perkusyjnego
      description: Konfiguracja/typ naciągu zastosowanego w octobanie.
    drumstick_model:
      name: Model pałek perkusyjnych
      description: Standaryzowane oznaczenie modelu/rozmiaru pałeczek perkusyjnych
        używane przez wiele marek (np. 5A, 7A).
    drumstick_taper:
      name: Stożkowanie pałeczki perkusyjnej
      description: Opisuje profil zwężenia od trzonka do końcówki, wpływający na odbicie
        i wyważenie.
    drysuit_footwear_style:
      name: Typ obuwia suchego skafandra
      description: Opisuje zintegrowane wykończenie dolnej części nogawek suchego
        skafandra, np. wbudowane buty, skarpety neoprenowe, stopa skarpetowa lub same
        uszczelnienia przy kostkach.
    dumbbell_style:
      name: Styl hantli
      description: Określa podstawową konstrukcję hantli — czy jest to model stały,
        regulowany czy z możliwością obciążania — co silnie wpływa na decyzje zakupowe
        i zastosowanie treningowe.
    dundun_playing_position:
      name: Pozycja gry na dundunie
      description: Docelowa pozycja gry/noszenia bębna.
    dye_status:
      name: Status barwienia
      description: Wskazuje, czy owata jest barwiona, niebarwiona/naturalna, czy zawiera
        wiele kolorów/mieszanek.
    dye_style:
      name: Styl barwienia
      description: Określa, czy kolor nici jest jednolity, cieniowany czy wykonany
        inną specjalną techniką barwienia.
    dye_technique:
      name: Technika barwienia
      description: Metoda użyta do barwienia włókna, np. barwienie ręczne, barwienie
        w kąpieli, barwienie odcinkowe.
    dye_type_needlecraft_fabric:
      name: Typ barwienia tkaniny do haftu
      description: Wskazuje, czy tkanina lniana jest jednolita, barwiona ręcznie czy
        barwiona specjalistycznie.
    dyeing_color_processing:
      name: Barwienie / obróbka kolorystyczna
      description: Opisuje, czy i w jaki sposób włókno zostało zabarwione (np. niebarwione,
        bielone/białe lub określone techniki farbowania).
    e_bike_certification_class:
      name: Klasa certyfikacji roweru elektrycznego
      description: Określa oficjalny indeks prędkości opony do rowerów elektrycznych,
        np. E-25, E-50.
    e_bike_speed_rating:
      name: Klasa prędkości roweru elektrycznego
      description: Podaje oficjalny poziom certyfikacji E-bike opony, np. E25 dla
        ≤25 km/h, E50 dla ≤50 km/h.
    e_scooter_connector_type:
      name: Typ złącza hulajnogi elektrycznej
      description: Określa styl złącza elektrycznego lub wtyczki używanej przez komponent
        do połączeń zasilających lub sygnałowych.
    e_scooter_throttle_type:
      name: Typ manetki gazu do hulajnogi elektrycznej
      description: Określa typ manetki gazu używanej do sterowania przyspieszeniem
        w hulajnodze elektrycznej.
    ear_coverage:
      name: Zakrycie uszu
      description: Określa, czy kask posiada ochronę uszu i czy można ją zdemontować.
    ear_coverage_style:
      name: Styl osłony uszu
      description: Opisuje, czy i w jaki sposób uszy są zakryte przez maskę przeciw
        owadom.
    ear_coverage_type:
      name: Typ zakrycia uszu
      description: Określa sposób, w jaki czapka zakrywa lub chroni uszy, w tym obecność
        i styl nauszników.
    ear_guard_type:
      name: Typ osłony uszu
      description: Opisuje styl ochrony uszu zintegrowanej z czapką, np. twarde plastikowe
        osłony, wyściełane lub zdejmowane ochraniacze.
    earmuff_style:
      name: Styl nauszników
      description: Określa sposób noszenia nauszników lub ich konstrukcję (np. nagłowne
        lub zakładane za głowę).
    earring_closure_type:
      name: Styl zapięcia kolczyków
      description: Określa mechanizm mocowania kolczyka do ucha, np. sztyft z zatyczką,
        zapięcie angielskie, klips.
    easel_art_desk_features:
      name: Cechy sztalugi i biurka artystycznego
      description: Wyróżnia typowe funkcje dołączone do sztalugi lub biurka artystycznego.
    easel_art_desk_surface_type:
      name: Typ powierzchni sztalugi i biurka artystycznego
      description: Określa dostępne powierzchnie do rysowania/pisania (np. tablica
        kredowa, tablica suchościeralna, rolka papieru, tablica magnetyczna).
    eb_clarinet_body_type:
      name: Typ korpusu klarnetu Eb
      description: Określa, czy klarnet Es jest wariantem sopranowym czy altowym.
    eco_material_type:
      name: Typ materiału ekologicznego
      description: Wyróżnia przyjazną środowisku technologię pianki lub materiału
        zastosowaną w padzie.
    edge_construction:
      name: Konstrukcja krawędzi
      description: Wskazuje, czy narta ma metalową krawędź na żadnej, części czy całej
        długości.
    edge_tuner_type:
      name: Typ ostrzałki krawędzi
      description: Klasyfikuje styl ostrzałki krawędzi nart lub snowboardu, np. prowadnica
        pilnika lub urządzenie elektryczne.
    edible_plant_part:
      name: Jadalna część rośliny
      description: Wskazuje, która część rośliny jest sprzedawana do spożycia.
    educational_guide_included:
      name: Przewodnik edukacyjny w zestawie
      description: Wskazuje, jakie materiały edukacyjne są dołączone do modelu.
    educational_topic:
      name: Temat edukacyjny
      description: Główny temat edukacyjny wspierany przez materiały edukacyjne farmy
        mrówek.
    egg_component:
      name: Składnik jaja
      description: Określa, którą część jaja zawiera produkt, np. całe jajo, samo
        białko, żółtka lub mieszanki/zamienniki.
    egg_component_replaced:
      name: Zastępowany składnik jaja
      description: Wskazuje, którą część jajka produkt ma zastępować, np. całe jajko,
        białko jajka.
    egg_enrichment:
      name: Wzbogacenie jaj
      description: Wskazuje dodatkowe wzbogacenie odżywcze jaj, np. Omega-3 lub witamina
        D.
    egg_farming_method:
      name: Metoda chowu kur niosek
      description: Wskazuje metodę produkcji lub chowu zastosowaną w przypadku jaj,
        np. bezklatkowe, z wolnego wybiegu, ekologiczne.
    egg_grade:
      name: Klasa jakości jaj
      description: Wskazuje klasę jakości przyznaną przez organy regulacyjne lub branżowe.
    egg_processing_state:
      name: Stan przetworzenia jaj
      description: Wskazuje przetwarzanie zastosowane do jaj przed sprzedażą, np.
        świeże, solone, stuletnie jajo.
    egg_production_method:
      name: Metoda produkcji jaj
      description: Określa system chowu lub utrzymania stosowany do produkcji jaj
        (np. bezklatkowy, wolny wybieg, ekologiczny).
    egg_replacer_main_ingredient:
      name: Główny składnik zamiennika jaj
      description: Wskazuje podstawowy składnik, z którego wykonano zamiennik jaj,
        pomagając użytkownikom dobrać produkt do potrzeb dietetycznych lub właściwości
        pieczenia.
    egg_size:
      name: Rozmiar jaj
      description: Klasyfikuje jaja według standardowych oznaczeń rozmiaru rynkowego.
    egg_source_animal:
      name: Zwierzę będące źródłem jaj
      description: Określa gatunek zwierzęcia, od którego pochodzą jaja.
    egg_white_processing_method:
      name: Metoda przetwarzania białka jaja
      description: Wskazuje sposób przetwarzania białek jaj po pozyskaniu (np. pasteryzowane,
        suszone rozpyłowo), wpływający na bezpieczeństwo żywności, trwałość i zastosowanie.
    eggplant_variety:
      name: Odmiana bakłażana
      description: Określa kultywar lub odmianę handlową bakłażana, pozwalając kupującym
        wybrać typy różniące się rozmiarem, smakiem, kolorem i zastosowaniem kulinarnym.
    eggshell_color:
      name: Kolor skorupki jaj
      description: Określa dominujący kolor skorupek jaj.
    elastic_edge_finish_type:
      name: Wykończenie/typ elastycznej krawędzi
      description: Określa konstrukcję krawędzi tkanej gumy wpływającą na komfort
        i zastosowanie.
    elastic_intended_use:
      name: Zamierzone zastosowanie gumy
      description: Podstawowe zastosowanie gumy (ułatwia wyszukiwanie i ogranicza
        błędne dopasowania).
    elastic_recovery_performance:
      name: Wydajność powrotu gumy
      description: Opisuje, jak dobrze tkana guma wraca do pierwotnej długości po
        rozciągnięciu.
    elastic_recovery_quality:
      name: Jakość powrotu gumy
      description: Wskazuje powrót gumy po rozciągnięciu, czyli jak dobrze wraca ona
        do pierwotnej długości po rozciągnięciu.
    elastic_stretch_level:
      name: Poziom rozciągliwości gumy
      description: Określa, jak bardzo guma może się rozciągnąć pod napięciem, często
        wyrażane jako poziomy względne, gdy nie podano dokładnego %.
    elastic_structure:
      name: Struktura gumy
      description: Określa konstrukcję strukturalną gumy dziurkowanej, np. dziana,
        tkana, pleciona, która może wpływać na rozciągliwość, powrót i właściwości
        szycia.
    elastic_type:
      name: Typ elastyczny
      description: Określa typ konstrukcji gumy, np. guma lamówkowa (FOE), pleciona,
        dziana, tkana.
    electric_assist_type:
      name: Typ wspomagania elektrycznego
      description: Wskazuje, czy rower posiada wspomaganie silnikiem oraz jaki rodzaj
        wspomagania oferuje.
    electric_bicycle_motor_position:
      name: Położenie silnika roweru elektrycznego
      description: Lokalizacja silnika napędowego roweru elektrycznego, np. centralny,
        przednia piasta, tylna piasta lub podwójna piasta.
    electric_bike_class:
      name: Klasa roweru elektrycznego
      description: Klasyfikuje rower elektryczny według klas regulacyjnych określających
        limity prędkości i wspomaganie manetką.
    electric_guitar_bridge_type:
      name: Typ mostka gitary elektrycznej
      description: Określa typ mostka/systemu vibrato w gitarze elektrycznej.
    electric_instrument_output_connection_type:
      name: Typ wyjścia instrumentu elektrycznego
      description: Określa fizyczne złącza wyjścia audio dostępne w wiolonczeli elektrycznej.
    electric_riding_vehicle_control_options:
      name: Opcje sterowania elektrycznym pojazdem jeżdżącym
      description: Opcje sterowania/obsługi dostępne dla użytkownika/rodzica (np.
        pedały, kierownica, sterowanie zdalne).
    electric_spinning_wheel_speed_control_type:
      name: Typ regulacji prędkości elektrycznego kołowrotka przędzalniczego
      description: Opisuje sposób regulacji prędkości przędzenia przez użytkownika
        w kołowrotku elektrycznym.
    electric_ukulele_output_jack_type:
      name: Typ gniazda wyjściowego elektrycznego ukulele
      description: Określa fizyczne złącze wyjściowe używane przez elektryczne ukulele.
    electric_van_body_length_class:
      name: Klasa długości nadwozia furgonetki elektrycznej
      description: Powszechna klasa rozmiaru vana oparta na rozstawie osi/długości,
        używana w ofertach.
    electric_van_roof_height_class:
      name: Klasa wysokości dachu vana elektrycznego
      description: Standardowa klasyfikacja wysokości dachu stosowana dla vanów (szczególnie
        dostawczych).
    electric_vehicle_drivetrain_layout:
      name: Układ napędowy pojazdu elektrycznego
      description: Konfiguracja silnika/osi opisująca liczbę silników i ich położenie,
        wykraczająca poza proste AWD/FWD/RWD.
    electric_winder_accessories_included:
      name: Akcesoria do nawijarki elektrycznej w zestawie
      description: Wymienia akcesoria dołączone do elektrycznej nawijarki, np. zaciski,
        adaptery.
    electrical_connector_type:
      name: Typ złącza elektrycznego
      description: Określa styl złącza używanego przez zamek drzwi/system zamykania
        do integracji elektrycznej, jeśli dotyczy.
    electrical_system_voltage:
      name: Napięcie instalacji elektrycznej
      description: Wskazuje nominalne napięcie instalacji elektrycznej pojazdu, do
        którego przeznaczony jest regulator.
    electronic_cymbal_trigger_zones:
      name: Strefy wyzwalania talerza elektronicznego
      description: Określa liczbę niezależnych stref triggera dostępnych w padzie
        talerza (np. bow/edge/bell).
    electronic_drum_module_audio_interface_functionality:
      name: Funkcjonalność interfejsu audio modułu perkusji elektronicznej
      description: Wskazuje, czy moduł może działać jako interfejs audio USB do nagrywania/odtwarzania,
        oprócz MIDI.
    electronic_drum_module_metronome_features:
      name: Funkcje metronomu modułu perkusji elektronicznej
      description: Określa wbudowane funkcje ćwiczeniowe/metronomu.
    electronic_drum_module_power_source:
      name: Źródło zasilania modułu perkusji elektronicznej
      description: Określa wymagane lub obsługiwane źródło zasilania modułu sterującego.
    electronic_drum_module_sample_import_support:
      name: Obsługa importu sampli przez moduł perkusji elektronicznej
      description: Wskazuje, czy moduł umożliwia import próbek użytkownika oraz w
        jaki sposób.
    electronic_drum_pad_playing_surface_type:
      name: Typ powierzchni gry pada perkusji elektronicznej
      description: Opisuje konstrukcję powierzchni gry pada tomu (np. siatkowy naciąg
        lub guma), wpływającą na odbicie, hałas i odczucia podczas gry.
    electronic_features:
      name: Funkcje elektroniczne
      description: Wskazuje funkcje elektroniczne/interaktywne dołączone do zabawki
        bankowej, jeśli występują.
    electronic_lights_and_sound:
      name: Elektroniczne światła i dźwięk
      description: Wskazuje, czy zestaw domku dla lalek zawiera elektroniczne funkcje
        światła i/lub dźwięku, np. światła, dźwięk dzwonka do drzwi, muzykę, efekty
        dźwiękowe.
    electronics_power_source:
      name: Źródło zasilania elektroniki
      description: Określa sposób zasilania aktywnej elektroniki (jeśli dotyczy).
    eligible_race_series:
      name: Kwalifikująca seria wyścigowa
      description: Seria wyścigowa lub organ sankcjonujący, w których samochód może
        startować.
    elliptical_trainer_part_type:
      name: Typ części trenażera eliptycznego
      description: Klasyfikuje konkretny rodzaj akcesoriów lub części zamiennych do
        trenażera eliptycznego (np. pas, konsolę, pedały), dzięki czemu klient może
        szybko filtrować je do potrzebnych pozycji bez konieczności przeglądania wielu
        mikrokategorii.
    embellishment_technique:
      name: Technika zdobienia
      description: szczegółowo opisywać główne zdobienia lub powierzchnie odzieży,
        takie jak haft, nadruk lub koraliki.
    embellishment_type:
      name: Typ ozdoby
      description: Określa rodzaj elementu dekoracyjnego zastosowanego do podwiązki,
        np. koronka, kokardy lub perły.
    embossing_pen_ink_color:
      name: Kolor tuszu pisaka do embossingu
      description: Określa kolor tuszu nakładanego przez pióro do wytłaczania (może
        być przezroczysty/lepki lub pigmentowany). Różni się od koloru pióra/obudowy.
    embossing_stylus_tip_shape:
      name: Kształt końcówki dłutka do embossingu
      description: Opisuje geometrię końcówki do embossingu używanej do tworzenia
        różnych efektów, np. kulkowa lub spiczasta.
    embroidered_coverage_level:
      name: Poziom pokrycia haftem
      description: Przybliżona ilość haftu pokrywającego powierzchnię naszywki.
    embroidered_patch_backing_type:
      name: Rodzaj naszywki haftowanej
      description: Techniczna warstwa podkładowa/pomocnicza na odwrocie haftowanej
        naszywki, która wpływa na jej trwałość i możliwość aplikacji.
    embroidery_hoop_type:
      name: Typ tamborka
      description: Określa styl konstrukcji tamborka i jego główny mechanizm napinania.
    embroidery_machine_bobbin_type:
      name: Typ szpulki do maszyny do haftu
      description: Typ/sposób ładowania szpulki.
    emergency_lighting_configuration:
      name: Konfiguracja oświetlenia awaryjnego
      description: Określa podstawową konfigurację oświetlenia ostrzegawczego zamontowanego
        w pojeździe (np. oświetlenie dachowe, oświetlenie atrapy chłodnicy).
    emergency_lighting_package:
      name: Pakiet oświetlenia awaryjnego
      description: Określa typy zainstalowanych świateł ostrzegawczych.
    emissions_compliance_standard:
      name: Norma zgodności emisji
      description: Oznacza certyfikat/zgodność z normami emisji dla silnika, tam gdzie
        ma to zastosowanie.
    emissions_standard:
      name: Norma emisji
      description: Norma zgodności emisji dla pojazdu, różniąca się w zależności od
        regionu i roku.
    enclosure_panel_configuration:
      name: Konfiguracja panelu obudowy
      description: Określa, które panele lub boki obudowy są dołączone (konfiguracja
        pokrycia), np. pełna obudowa, tylko zasłony boczne lub 3-stronna (otwarty
        przód/tył).
    enclosure_window_material:
      name: Materiał okna obudowy
      description: Określa materiał użyty do przezroczystych paneli okiennych obudowy.
    end_fitting_type:
      name: Typ końcówki
      description: Styl złącza używany na każdym końcu siłownika (po stronie pojazdu
        i po stronie klapy), decydujący o kompatybilności mocowania.
    end_type:
      name: Typ końcowy
      description: Określa sposób zakończenia/mocowania na końcach pasa holowniczego
        w celu połączenia z punktami odzyskiwania.
    ends_style_blocking_wires:
      name: Styl końców (druty blokujące)
      description: Sposób wykończenia końców drutu blokującego dla bezpieczeństwa
        i łatwego przewlekania przez brzegi koronki.
    enduro_bike_suspension_adjustability:
      name: Regulacja zawieszenia roweru enduro
      description: Wskazuje dostępne regulacje zawieszenia, zwykle przedniego widelca
        i tylnego amortyzatora.
    engine_bay_mounting_location:
      name: Lokalizacja mocowania silnika wnęka
      description: Miejsce montażu zbiornika wyrównawczego w komorze silnika (położenie
        względne).
    engine_bearing_coating:
      name: Powłoka łożyska silnika
      description: Określa powłokę powierzchniową łożyska (zapewniającą odporność
        na zużycie, możliwość osadzenia, zmniejszone tarcie).
    engine_bearing_position:
      name: Położenie łożyska silnika
      description: Określa położenie/Functions łożyska w silniku.
    engine_bearing_size:
      name: Rozmiar łożyska silnika
      description: Określa, czy łożysko ma rozmiar standardowy, czy wariant podwymiarowy/nadwymiarowy,
        często związany ze szlifowaniem wału i luzem.
    engine_configuration:
      name: Konfiguracja silnika
      description: Opisuje układ/konfigurację cylindrów silnika (np. rzędowy, widlasty,
        płaski/bokser).
    engine_cooling_type:
      name: Typ chłodzenia silnika
      description: Określa metodę chłodzenia silnika.
    engine_degreaser_form:
      name: Forma środka do odtłuszczania silnika
      description: Format fizyczny / forma dostawy odtłuszczacza do silników.
    engine_degreaser_rinse_requirement:
      name: Wymagania dotyczące płukania odtłuszczaczem silnika
      description: Wskazuje, czy środek odtłuszczający jest przeznaczony do spłukiwania
        wodą po aplikacji.
    engine_mount_type:
      name: Typ poduszki silnika
      description: Określa funkcjonalną konstrukcję poduszki silnika, np. hydrauliczna,
        pełna, reakcyjna.
    engine_oil_formulation:
      name: Skład oleju silnikowego
      description: Wskazuje ukierunkowanie formuły oleju silnikowego, takie jak standardowe
        użytkowanie, kondycjonowanie przy dużym przebiegu, wydłużone okresy wymiany
        lub zastosowania flotowe/ciężkie.
    engine_oil_specification:
      name: Specyfikacja oleju silnikowego
      description: Specyfikacja/norma, którą spełnia olej (np. API SP, API SN Shopify
        Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Zawartość zestawu do remontu silnika
      description: Określa główne elementy dołączone do zestawu do remontu silnika.
    engine_rotation_direction:
      name: Kierunek obrotu silnika
      description: Określa kierunek obrotu silnika używany w zastosowaniach morskich.
    engine_timing_system_drive_type:
      name: Typ napędu układu rozrządu silnika
      description: Określa, czy układ rozrządu silnika jest napędzany paskiem, łańcuchem
        czy przekładnią zębatą, w celu zapewnienia zgodności.
    engine_valve_coating:
      name: Powłoka zaworu silnika
      description: Określa kierunek obrotu silnika używany w zastosowaniach morskich.
    engine_valve_position:
      name: Pozycja zaworu silnika
      description: Określa, czy zawór silnika jest przeznaczony na stronę dolotową
        czy wydechową silnika.
    engine_valve_stem_tip_type:
      name: Typ końcówki trzonka zaworu silnika
      description: Określa styl lub konstrukcję końcówki trzonka zaworu w punkcie
        styku z dźwigienką zaworową lub regulatorem.
    engine_valvetrain_type:
      name: Typ układu rozrządu silnika
      description: Układ rozrządu/wałka rozrządu.
    enhancement_level:
      name: Poziom ulepszenia
      description: 'Przybliżone zwiększenie objętości zapewniane przez wkładkę, wyrażone
        w rozmiarach miseczki: subtelne (do 1 miseczki), umiarkowane (1–2 miseczki),
        znaczne (2+ miseczki).'
    entry_zipper_location:
      name: Lokalizacja zamka wejściowego
      description: Określa położenie głównego zamka wejściowego lub otworu kombinezonu,
        np. z przodu, z tyłu, na ramieniu, ukośnie.
    epee_point_type:
      name: Typ końcówki szpady
      description: Określa markę lub standard końcówki zamontowanej na głowni, co
        wpływa na kompatybilność i konserwację.
    equestrian_discipline:
      name: Dyscyplina jeździecka
      description: Określa dyscyplinę jeździecką, do której ostroga jest przeznaczona
        lub najbardziej odpowiednia.
    equestrian_helmet_safety_certification:
      name: Certyfikacja bezpieczeństwa kasku jeździeckiego
      description: Określa normy bezpieczeństwa lub certyfikaty, z którymi zgodny
        jest kask.
    equine_application_area:
      name: Obszar wykorzystania konia
      description: Określa region ciała lub materiał, dla którego przeznaczony jest
        produkt (np. kopyto, grzywa, sprzęt).
    equipment_contact_material_brew_wine:
      name: Materiał stykający się ze sprzętem (browar/wino)
      description: Podstawowy materiał elementu mającego kontakt z płynem, np. szkło,
        stal nierdzewna, plastik.
    eu_children_clothing_size:
      name: Rozmiar EU odzieży dziecięcej
      description: Określa rozmiar EU odzieży dziecięcej według wzrostu, np. 104 lub
        140
    eu_clothing_size:
      name: EU rozmiar ubrań
      description: Określa rozmiar ubrania używany w UE, np. 38 lub 46
    eu_cup_size:
      name: Rozmiar miseczki EU
      description: Określa rozmiar miseczki biustonosza EU, np. C lub E
    eu_ring_size:
      name: Rozmiar pierścionka EU
      description: Określa rozmiar pierścionka EU według obwodu, np. 52 lub 63
    eu_shoe_size:
      name: Rozmiar buta EU
      description: Określa rozmiar buta w UE, np. 42 lub 42 Wide
    euphonium_included_accessories:
      name: Akcesoria w zestawie z eufonium
      description: Wymienia dołączone elementy często oferowane w zestawie z eufonium,
        np. ustnik, futerał.
    euphonium_valve_configuration:
      name: Konfiguracja wentyli eufonium
      description: Określa liczbę zaworów i czy czwarty zawór jest obsługiwany ręcznie
        czy za pomocą mechanizmu bocznego.
    european_sword_historical_period:
      name: Okres historyczny miecza europejskiego
      description: Główny okres historyczny, na którym oparty jest wzór/replika miecza,
        lub epoka oryginału.
    european_sword_pattern_type:
      name: Wzór/typ miecza europejskiego
      description: Konkretny wzór/typ (typologia) europejskiego miecza reprezentowany
        przez kolekcjonerski miecz.
    ev_connector_adapter_direction:
      name: Kierunek konektora/adaptera EV
      description: Określa, do którego portu adapter konwertuje TO FROM (od gniazda
        samochodowego do ładowarki/kabla), umożliwiając dokładne filtrowanie zgodności.
    ev_conversion_kit_completeness_level:
      name: Poziom kompletności zestawu konwersja EV
      description: Wskazuje, czy produkt jest kompletnym zestawem do konwersji czy
        częściowym zestawem/pakietem (np. tylko silnik i sterownik).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfiguracja układu napędowego zestawu do konwersji na EV
      description: Określa architekturę układu napędowego pojazdu elektrycznego, w
        tym położenie silnika/układ napędowy oraz to, czy zachowuje istniejącą skrzynię
        biegów.
    ev_conversion_kit_voltage_class:
      name: Klasa napięcia zestawu do konwersji na EV
      description: Nominalna klasa napięcia systemu, wokół której zaprojektowano zestaw
        do konwersji na EV. Użyj tego do filtrowania według popularnych klas napięcia
        systemu oprócz dokładnego pomiaru napięcia.
    evaporator_core_type:
      name: Typ rdzenia parownika
      description: Określa projekt konstrukcyjny rdzenia parownika klimatyzacji samochodowej.
    evenweave_fabric_finish_treatment:
      name: Wykończenie/wariant tkaniny o równomiernym splocie
      description: Oznacza wszelkie wstępne wykończenie lub wariant zastosowane na
        tkaninie, które mają wpływ na jej wygląd.
    evenweave_fabric_package_format:
      name: Format opakowania tkaniny typu evenweave
      description: Sposób sprzedaży tkaniny (w kawałkach czy na metry).
    exercise_bike_accessory_part_type:
      name: Typ akcesorium/części do roweru treningowego
      description: Opisuje podstawową funkcję lub typ elementu produktu (np. pedał,
        pasek napędowy, uchwyt na bidon, osłona ekranu, ramię korby).
    exercise_bike_cushion_component:
      name: Element poduszki roweru treningowego
      description: Określa dostarczony element związany z siedzeniem, taki jak podkładka
        na siedzisko, siodełko lub pokrowiec na siodełko.
    exercise_bike_metrics_tracked:
      name: Rower treningowy metryka śledzony
      description: Wyświetla listę pól danych treningowych, które komputer może mierzyć
        i wyświetlać w czasie rzeczywistym.
    exercise_mat_accessories_included:
      name: W zestawie akcesoria do maty do ćwiczeń
      description: Wymienia dodatkowe elementy dołączone do maty, takie jak paski
        lub podkładki pod kolana.
    exhaust_cooling_type:
      name: Typ chłodzenia wydechu
      description: Wskazuje, czy element układu wydechowego jest przeznaczony do układów
        wydechowych mokrych (chłodzonych wodą/z wtryskiem wody) czy suchych.
    exhaust_installation_position:
      name: Pozycja montażu układu wydechowego
      description: Wskazuje miejsce montażu części w pojeździe.
    exhaust_outlet_configuration:
      name: Konfiguracja wylotu wydechu
      description: Określa układ wylotu spalin z tyłu pojazdu.
    expansion_tank_cap_connection_type:
      name: Typ połączenia korka zbiornika wyrównawczego
      description: Mechaniczny styl połączenia używany do mocowania i uszczelniania
        korka na szyjce zbiornika wyrównawczego.
    expansion_tank_cap_pressure_relief_feature:
      name: Funkcja upustu ciśnienia korka zbiornika wyrównawczego
      description: Określa, czy i w jaki sposób korek zapewnia funkcję upustu ciśnienia/podciśnienia.
    expansion_tank_cap_seal_material:
      name: Materiał uszczelniający pokrywę zbiornika wyrównawczego
      description: Materiał uszczelki/uszczelnienia mającego kontakt z szyjką zbiornika
        wyrównawczego.
    extension_attachment_method:
      name: Metoda mocowania przedłużki
      description: Wskazuje, jak przedłużka mocuje się do kokpitu/kierownicy roweru,
        pomagając rowerzystom potwierdzić kompatybilność z istniejącą konfiguracją.
    extension_bend_type:
      name: Typ gięcia przedłużki
      description: Opisuje styl geometryczny lub wygięcie przedłużki kierownicy, wpływające
        na ergonomię i aerodynamikę rowerzysty.
    extension_mechanism:
      name: Mechanizm przedłużenia
      description: Opisuje metodę, którą stół stosuje do rozwinięcia swojej długości
        lub powierzchni, jeśli ma to zastosowanie.
    extension_table_features:
      name: Funkcje stołu rozsuwanego
      description: Wyróżnia funkcjonalne cechy właściwe dla stolików przedłużających
        do maszyn do szycia.
    eyelet_grommet_installation_method:
      name: Metoda montażu oczek i przelotek
      description: Określa, jak oczko/przelotka jest montowana/zabezpieczana w materiale.
    eyewear_lens_shape:
      name: Kształt soczewki okularów
      description: Wskazuje geometryczny kształt soczewki, taki jak cylindryczny lub
        sferyczny, wpływający na pole widzenia, zniekształcenia i styl.
    eyewear_strap_material:
      name: Materiał sznurka do okularów
      description: Określa materiał regulowanego paska mocującego gogle lub okulary
        na głowie użytkownika.
    fabric_backing_type:
      name: Rodzaj podszewki z tkaniny
      description: Określa, czy bawełna do zadruku ma stabilizujący papierowy podkład,
        i jaki, co decyduje o tym, czy można ją podawać przez standardowe drukarki.
    fabric_cut_format:
      name: Format cięcia tkaniny
      description: Określa krój/format kawałka kanwy do haftu.
    fabric_end_use:
      name: Zastosowanie końcowe tkaniny
      description: Określa główne zamierzone zastosowanie tkaniny, czyli do czego
        najlepiej się nadaje.
    fabric_finish:
      name: Wykończenie tkaniny
      description: Wykończenie powierzchni/wariant stosowany do tkaniny jedwabnej,
        wpływający na połysk, dotyk i wytrzymałość.
    fabric_intended_use:
      name: Przeznaczenie tkaniny
      description: Główne zalecane zastosowania/projekty dla tkaniny lnianej.
    fabric_opacity_level:
      name: Poziom krycia tkaniny
      description: Informuje o stopniu przezroczystości materiału, co ma wpływ na
        konieczność stosowania warstw i podszewki.
    fabric_patch_shape:
      name: Kształt naszywki
      description: Opisuje kształt naszywek zawartych w zestawie.
    fabric_repair_kit_application_method:
      name: Metoda aplikacji do naprawy tkaniny
      description: Określa sposób nanoszenia naprawy na tkaninę, np. do naprasowania,
        do przyszycia, samoprzylepna.
    fabric_repair_kit_components_included:
      name: Elementy dołączone do zestawu naprawczego do tkanin
      description: Wymienia poszczególne komponenty zawarte w zestawie (np. plastry,
        elektrozawór, igła, klej).
    fabric_repair_kit_intended_use:
      name: Zestaw do naprawy tkanin przeznaczony do użytku
      description: Określa typowe czynności naprawcze, do których przeznaczony jest
        zestaw (np. rozdarcia, dziury, podwinięcia).
    fabric_selling_format:
      name: Format sprzedaży tkanin
      description: 'Określa sposób sprzedaży tkaniny: długość ciągła, gotowy kawałek,
        rolka/bela lub próbka.'
    fabric_stretch_level:
      name: Poziom elastyczności tkaniny
      description: Opisuje stopień rozciągliwości/elastyczności tkaniny, pomagając
        kupującym wybrać odpowiednie tkaniny do dopasowanej odzieży lub strukturalnych
        projektów.
    fabric_stretch_type:
      name: Typ elastyczności tkaniny
      description: Wskazuje na rozciągliwość materiału spodenek, co jest ważne dla
        zapewnienia swobody ruchów podczas surfowania lub pływania.
    fabric_texture:
      name: Tekstura tkaniny
      description: Określa fakturę powierzchni lub strukturę dzianiny użytej w górnej
        części odzieży domowej.
    fabric_use_case:
      name: Zastosowanie tkaniny w opakowaniu wewnętrznym
      description: Podstawowe przeznaczenie kawałka/belki tkaniny satynowej.
    fabric_weight_class:
      name: Klasa gramatury tkaniny
      description: Klasyfikuje flanelę według typowych pasków o różnej gramaturze,
        co ułatwia filtrowanie klientom nieznającym dokładnej gramatury/oz.
    face_mask_material:
      name: Materiał maseczki
      description: Skład materiałowy maski dołączonej do kasku lub kompatybilnej z
        kaskiem.
    face_mask_style:
      name: Styl maseczki
      description: Definiuje ogólny kształt lub styl konstrukcji modowej maski na
        twarz, pomagając kupującym znaleźć preferowane dopasowanie i estetykę.
    face_mask_style_code:
      name: Kod stylu maski na twarz
      description: Definiuje styl prętów konstrukcyjnych lub branżową rodzinę kodów
        maski na twarz, np. ROPO, OPO, RJOP.
    face_protection_type:
      name: Typ ochrony twarzy
      description: Wskazuje typ ochrony twarzy dołączonej do kasku lub wbudowanej
        w kask, takiej jak kratki lub wizjery.
    faceplate_security_features:
      name: Funkcje zabezpieczające panelu przedniego
      description: Obejmuje funkcje zabezpieczenia przed kradzieżą i dostępu związane
        z panelem przednim, wykraczające poza podstawowy projekt.
    facing_length:
      name: Długość lica
      description: Określa długość krzywizny ustnika, wpływającą na reakcję i dobór
        stroika.
    fan_shroud_type:
      name: Typ osłony wentylatora
      description: Określa styl pokrycia/geometrii osłony wentylatora, np. pełna,
        półosłona, pierścieniowa.
    farming_method:
      name: Metoda uprawy
      description: Wyróżnia praktyki dobrostanu zwierząt lub hodowlane stosowane przy
        chowie zwierząt, np. wolny wybieg lub ekologiczne.
    farming_practice:
      name: Praktyka rolnicza
      description: Określa podstawową metodę uprawy zastosowaną dla produktu, np.
        konwencjonalna, ekologiczna, hydroponiczna.
    fascinator_style:
      name: Styl fascynatora
      description: Opisuje konstrukcję i kształt kapelusza, dzięki czemu klient może
        szybko filtrować produkty według popularnych stylów kapelusznictwa.
    fastener_grade:
      name: Klasa elementu złącznego
      description: Oznacza klasę wytrzymałości śruby, np. klasa 8 lub klasa 10.9,
        która decyduje o zdolności ładowania.
    fat_rendering_state:
      name: Stan wytopienia tłuszczu
      description: Określa, czy tłuszcz jest wytopiony, niewytopiony (surowy) czy
        częściowo wytopiony, co wpływa na trwałość i zastosowania kulinarne.
    fat_source:
      name: Źródło tłuszczu
      description: Określa podstawowe źródło tłuszczu użytego do produkcji masła,
        ghee lub margaryny (zwierzęce albo roślinne), wspierając filtrowanie pod kątem
        alergii i diety.
    faucet_hole_configuration:
      name: Konfiguracja otworu kranu
      description: Oznacza liczbę i rozmieszczenie wstępnie wywierconych otworów na
        baterię w blacie umywalki.
    feather_application:
      name: Zastosowanie piór
      description: Podstawowe zastosowanie piór indyczych do rękodzieła lub produkcji.
    feather_attachment_format:
      name: Mocowanie/format piór
      description: W jaki sposób pióra syntetyczne są przygotowywane/sprzedawane do
        użytku (luzem, na ciąg znaków, na taśmie itp.).
    feather_coloration_style:
      name: Styl ubarwienia piór
      description: Opisuje sposób nakładania/pojawiania się koloru na piórze(-ach)
        (np. jednolity, barwiony na końcach, gradientowy) niezależnie od wartości
        koloru bazowego.
    feather_component:
      name: Element pióra
      description: Określa, która część/styl pawiego pióra jest sprzedawany, np. pióro
        z oczkiem lub promienie.
    feather_curvature:
      name: Krzywizna pióra
      description: Ogólny kształt/profil krzywizny pióra.
    feather_finish:
      name: Wykończenie piórkowe
      description: Wskazuje, czy pióra strusie są naturalne, czy zostały przetworzone,
        np. barwione lub bielone, do użytku dekoracyjnego.
    feather_form:
      name: Forma piór
      description: Określa formę fizyczną sprzedawanych kawałków pierza gęsiego.
    feather_grade:
      name: Stopień piór
      description: Ogólna klasa jakości/selekcji piór do rękodzieła lub ekspozycji.
    feather_part:
      name: Część z piór
      description: Część/struktura pióra indyka będąca przedmiotem sprzedaży, często
        w ofertach materiałów do rękodzieła i wiązania much.
    feather_processing_type:
      name: Typ przetwarzania piór
      description: Sposób przetworzenia/obróbki piór do użytku rękodzielniczego, np.
        barwione, bielone, naturalne/niebarwione.
    feather_product_form:
      name: Forma produktu z piór
      description: Fizyczna forma/cięcie produktu z piór w sprzedaży, np. luźne pióra,
        boa, frędzle.
    feather_quantity_unit:
      name: Jednostka ilości piór
      description: Definiuje sposób sprzedaży produktu (np. na sztuki, na wagę, w
        pęczkach), co ułatwia techniczne i dokładne porównanie ofert.
    feather_source:
      name: Źródło piór
      description: Określa zwierzęce pochodzenie piór używanych w lotkach z piór.
    feather_stiffness:
      name: Sztywność piór
      description: Względna sztywność/sztywność zadziorów/struktury piór.
    feed_mechanism:
      name: Mechanizm podający
      description: Wskazuje, w jaki sposób piłki są podawane do maszyny do narzucania.
    feed_purpose:
      name: Cel podawania
      description: Opisuje podstawowy cel żywieniowy lub funkcjonalny paszy albo suplementu.
    feeder_mechanism_type:
      name: Typ mechanizmu podającego
      description: Określa mechanizm dozowania używany przez karmnik do uwalniania
        karmy.
    feijoa_cultivar:
      name: Kultywar feijoa
      description: Określa konkretny kultywar lub odmianę feijoa, ponieważ różne kultywary
        oferują odmienne smaki, rozmiary i terminy zbioru.
    felt_duty:
      name: Klasa filcu
      description: Określa klasyfikację filcu piłki tenisowej, np. extra duty, regular
        duty, która wpływa na trwałość na różnych nawierzchniach.
    felting_mold_intended_use:
      name: Przeznaczenie formy do filcowania
      description: Do czego służy foremka, służy do tworzenia lub wykorzystania w
        projektach filcowych.
    felting_pad_surface_material:
      name: Materiał powierzchniowy podkładki filcowej
      description: Materiał użyty na roboczej powierzchni podkładki/maty do filcowania,
        która styka się z włóknem/igłą.
    fencing_certification:
      name: Certyfikacja szermierki
      description: Wymienia oficjalne zatwierdzenia organów zarządzających, które
        spełnia broń szermiercza, np. FIE, USFA, wskazując legalność turniejową i
        standardy jakości.
    fencing_connector_type:
      name: Typ konektora ogrodzeniowego
      description: Określa konfigurację złącza używaną do podłączania przewodów, gniazd
        lub zwijaczy szermierczych, np. 2-pinowe, 3-pinowe, bagnetowe, zapewniając
        kompatybilność elementów.
    fencing_discipline:
      name: Dyscyplina szermierki
      description: Określa broń lub dyscyplinę szermierczą, do której produkt jest
        przeznaczony lub z którą jest kompatybilny.
    fencing_weapon_type:
      name: Typ broni szermierczej
      description: Określa styl broni szermierczej lub treningowej, z którą pomoc
        treningowa jest kompatybilna lub którą reprezentuje, pomagając użytkownikom
        znaleźć odpowiedni sprzęt.
    fender_finish_state:
      name: Stan wykończenia błotnika
      description: Oznacza stan Supply /wykończenia błotnika, umożliwiający przygotowanie
        go do malowania i montażu.
    fender_pieces_included:
      name: Dołączono elementy błotnika
      description: Wypisuje komponenty Supply do produktu, aby wyjaśnić, czy jest
        to pojedynczy błotnik czy kompletny zestaw z akcesoriami.
    fender_type:
      name: Typ błotnika
      description: Klasyfikuje ogólny projekt lub styl błotnika.
    fennel_trimming:
      name: Przycięcie kopru włoskiego
      description: Wskazuje, które części rośliny są dołączone do bulwy kopru włoskiego,
        np. z nacią, z przyciętą górą i korzeniem.
    fennel_variety:
      name: Odmiana kopru włoskiego
      description: Określa odmianę lub odmianę cebul kopru włoskiego przeznaczonych
        do sprzedaży.
    fermentation_application:
      name: Zastosowanie fermentacyjne
      description: Identyfikuje podstawową żywność lub napój, który dana kultura ma
        fermentować (np. ser, jogurt, kefir mleczny, zakwas).
    fermentation_method:
      name: Metoda fermentacji
      description: Określa, jak sos sojowy został wyprodukowany lub sfermentowany,
        np. warzony naturalnie, hydrolizowany chemicznie.
    fermentation_vessel_material:
      name: Materiał naczynia fermentacyjnego
      description: Główny materiał naczynia fermentacyjnego w zestawie (jeśli dotyczy).
    ferrule_material:
      name: Materiał ferruli
      description: Określa materiał użyty na ferrulę szczytówki, np. Juma, fenol,
        poliwęglan, XTC lub brak, wpływający na trwałość i odczucie uderzenia.
    fia_homologation_certification:
      name: Homologacja/certyfikacja FIA
      description: Wskazuje, czy samochód (lub klatka bezpieczeństwa) posiada certyfikację/homologację
        oraz zgodnie z jaką normą.
    fiber_animal_source_type:
      name: Typ zwierzęcia/źródła włókna
      description: Źródło pierwotne, zwierzęce, z którego pochodzi włóczka (lub syntetyczne),
        np. wełna merynosów, alpaka lub włókna roślinne.
    fiber_luster_level:
      name: Poziom połysku włókna
      description: Połysk wizualny włókna, od matowego po wysoki połysk.
    fiber_preparation_processing_stage:
      name: Etap przygotowania/przetwarzania włókien
      description: Wskazuje sposób przygotowania/przetworzenia srebra do użycia (np.
        karta, czesanie, mieszanie, superwash).
    fiber_preparation_type:
      name: Typ przygotowania włókna
      description: Określa sposób przygotowania włókna do rękodzieła, np. owata gręplowana,
        gręplowana bębnowo, arkusz prefilcu.
    field_hockey_ball_playing_surface:
      name: Nawierzchnia gry piłki do hokeja na trawie
      description: Określa rodzaj nawierzchni lub środowisko gry, dla którego piłka
        jest przeznaczona.
    field_hockey_ball_type:
      name: Typ piłki do hokeja na trawie
      description: Klasyfikuje piłkę do hokeja na trawie według zamierzonego zastosowania
        lub specjalnej cechy.
    field_hockey_goal_size_standard:
      name: Bramka do hokeja na trawie rozmiar standardowy
      description: Klasyfikuje bramkę według powszechnych standardów hokeja na trawie
        lub rozmiarów treningowych, np. regulaminowa zewnętrzna FIH, młodzieżowa,
        mini.
    field_hockey_training_objective:
      name: Cel treningu hokeja na trawie
      description: Definiuje główną umiejętność lub obszar treningowy, który pomoc
        treningowa ma poprawiać.
    field_point_attachment_method:
      name: Metoda mocowania grotu field point
      description: Wskazuje sposób mocowania grotu strzałki do trzonu lub wkładki
        (np. wkręcanie, wklejanie).
    field_point_tip_style:
      name: Styl końcówki grotu field point
      description: Definiuje styl geometryczny lub profil funkcjonalny końcówki punktu
        polowego, wpływając na penetrację, wysiłek przy usuwaniu i legalność.
    fielding_glove_position:
      name: Pozycja rękawicy do gry w polu
      description: Określa pozycję obronną lub przeznaczenie rękawicy podczas gry
        w baseball lub softball.
    fielding_training_focus:
      name: Cel treningu gry w polu
      description: Określa główny obszar umiejętności, na który ukierunkowana jest
        pomoc podczas sesji treningowych.
    fig_variety:
      name: Odmiana fig
      description: Określa konkretny kultywar lub konkretną odmianę sprzedawanych
        fig.
    figure_8_device_design:
      name: Konstrukcja przyrządu ósemkowego
      description: Identyfikuje konkretną konfigurację urządzenia ósemkowego, która
        wpływa na obsługę jego właściwości i przeznaczenie.
    figure_finish_type:
      name: Rodzaj wykończenia figury
      description: Oznacza wykończenie powierzchni/farby figurki konia (jak wygląda/sprawia
        wrażenie przedmiotu kolekcjonerskiego).
    figurine_scale:
      name: Figurka skala
      description: skala/stosunek figurki do rzeczywistego przedmiotu (jeśli ma zastosowanie),
        np. 1:6.
    fill_status:
      name: Status wypełnienia
      description: Wskazuje, czy manekin zapaśniczy jest sprzedawany jako wypełniony,
        niewypełniony czy częściowo wypełniony, co określa koszt wysyłki i nakład
        pracy kupującego.
    filling_consistency:
      name: Konsystencja nadzienia
      description: Opisuje teksturę lub lepkość nadzienia jako Supply (np. gładki
        krem, kawałki owoców, pasta).
    filling_type:
      name: Rodzaj wypełnienia
      description: Określa główne nadzienie lub krem wewnątrz pliku cookie, jeśli
        taki istnieje.
    filtration_and_mother_status:
      name: Filtracja i status matki
      description: Wskazuje, czy ocet jest filtrowany, niefiltrowany, surowy lub zawiera
        „matkę”, odpowiadając potrzebom konsumentów szukających produktów probiotycznych
        lub surowych.
    filtration_method:
      name: Metoda filtracji
      description: Materiał lub technika stosowana do filtrowania i oczyszczania wódki
        po destylacji.
    fin_box_system:
      name: System skrzynki statecznika
      description: Określa skrzynkę statecznika lub interfejs mocowania używany przez
        deskę, decydujący o kompatybilności ze statecznikami z rynku wtórnego.
    fin_buoyancy:
      name: Wyporność płetw
      description: Wskazuje, czy płetwa ma dodatnią, neutralną czy ujemną pływalność
        w wodzie, co wpływa na trym nurka i wyważenie sprzętu.
    fin_flex_rating:
      name: Ocena elastyczności płetwy
      description: Wskazuje względną sztywność lub poziom elastyczności statecznika,
        co wpływa na ogólne osiągi.
    fin_mounting_system:
      name: System mocowania płetwy
      description: Definiuje interfejs lub standard mocowania używany do mocowania
        statecznika do deski kitesurfingowej (np. FCS II, przykręcany, 4-otworowy),
        zapewniając kompatybilność stateczników i desek.
    fin_position:
      name: Pozycja płetwy
      description: Określa przewidywaną pozycję montażu płetwy na desce.
    fin_strap_type:
      name: Styl paska do płetwy
      description: Określa styl paska lub systemu mocowania używanego do zabezpieczenia
        płetwy na pięcie/stopie.
    fin_template:
      name: Fin szablon
      description: Klasyfikuje hydrodynamiczny szablon lub obrys statecznika surfingowego,
        wpływający na styl skręcania, prędkość i ogólne odczucie deski.
    finger_count:
      name: Liczba palców
      description: Oznacza liczbę palców, na którą rękawica, karta lub identyfikator
        są przeznaczone.
    finger_coverage:
      name: Zasięg palców
      description: Wskazuje, jaka część palców jest zakryta.
    finger_grip_adjustability:
      name: Regulacja chwytu palców
      description: Wskazuje, w jaki sposób uchwyt na palce mocuje się lub reguluje,
        aby pasować do różnych rozmiarów dłoni.
    finger_hole_configuration:
      name: Konfiguracja otworów na palce
      description: 'Określa orientację dłoni otworów na palce: dla praworęcznych,
        leworęcznych lub oburęczne.'
    finger_hole_count:
      name: Liczba otworów na palce
      description: Określa liczbę otworów na palce w skórze uchwytu, co stanowi kluczową
        różnicę między modelami bez palców, z 2, 3 i 4 otworami.
    finger_pick_band_style:
      name: Styl opaski pazurka na palec
      description: Styl opaski/pętelki mocowanej do palca, mający wpływ na wygodę
        i możliwość regulacji.
    finger_pick_blade_length:
      name: Długość ostrza noża palcowego
      description: Długość płytki szarpiącej wystającej z opaski.
    finger_pick_blade_shape:
      name: Kształt pazurka do gry na gitarze
      description: Kształt/profil powierzchni szarpiącej (płytki), która styka się
        ze strunami.
    finger_pick_size:
      name: Rozmiar kostki palcowej
      description: Rozmiar opaski/pętli pazurka na palec, dopasowany do różnych obwodów
        palca lub kciuka, a nie do rozmiaru instrumentu.
    finger_pick_wear_location:
      name: Miejsce noszenia pazurka na palec
      description: Wskazuje, na którym palcu pazurek ma być noszony lub czy produkt
        jest zestawem na kciuk i palce.
    finger_protection:
      name: Ochrona palców
      description: Wskazuje, czy rękawica ma ochronę palców typu spine i czy elementy
        usztywniające są wyjmowane.
    fingerboard_bearing_type:
      name: Typ łożyska podstrunnicy
      description: Określa typ łożyska stosowanego w kółkach fingerboardu.
    fingerboard_grip_type:
      name: Typ taśmy do fingerboardu
      description: Określa materiał/typ powierzchni chwytnej używanej na podstrunnicy.
    fining_agent_active_ingredient:
      name: Składnik aktywny środka klarującego
      description: Podstawowy środek klarujący użyty w produkcie.
    fining_agent_type:
      name: Typ środka klarującego
      description: Określa skład chemiczny lub materiał środka klarującego/klarującego
        dla produktów klarujących czerwone wino.
    finish_after_baking:
      name: Zakończ po upieczeniu
      description: Opisuje typowy wygląd powierzchni po utwardzeniu/wypieczeniu.
    finish_effect:
      name: Efekt wykończenia
      description: Opisuje specjalne efekty powierzchniowe/optyczne zastosowane na
        kamieniu ozdobnym.
    finish_type:
      name: Typ wykończenia
      description: Wykończenie powierzchni korpusu ukulele.
    finished_product_format:
      name: Format gotowego produktu
      description: Określa typ produktu zapachowego, do którego wykonania przeznaczony
        jest zestaw.
    fire_pit_accessories_included:
      name: Dołączono akcesoria do paleniska
      description: Wymienia ważne akcesoria Supply wraz z paleniskiem, takie jak osłony
        Spark lub kamienie lawowe, dzięki czemu wiadomo, co znajduje się w pudełku.
    firework_assortment_launch_type:
      name: Asortyment fajerwerków Typ Launch
      description: Opisuje typowy sposób odpalania/Launch fajerwerków.
    firework_assortment_types_included:
      name: W zestawie rodzaje asortymentu fajerwerków
      description: Określa podstawowe typy fajerwerków dołączone do zestawu, aby ułatwić
        kupującym porównanie zawartości pakietu, np. fontanny, rzymskie ognie, petardy.
    firework_effect_types:
      name: Typy efektów fajerwerków
      description: Główne rodziny efektów wizualnych i/lub sensorycznych wytwarzanych
        przez zestaw; można wybrać wiele wartości.
    firework_ignition_method:
      name: Metoda zapłonu fajerwerków
      description: Określa sposób odpalenia lub inicjacji fajerwerku (np. za pomocą
        lontu lub zapałki elektrycznej).
    firework_visual_intensity_level:
      name: Poziom intensywności wizualnej fajerwerków
      description: Ogólna intensywność wizualna/ilość iskier efektu fontanny.
    firing_mode:
      name: Modestrzelania
      description: Wymienia wybieralne lub podstawowe tryby ognia obsługiwane przez
        replikę airsoftową.
    first_day_cover_cachet_type:
      name: Typ ilustracji koperty pierwszego dnia obiegu
      description: Rodzaj pieczęci na kopercie pierwszego dnia (np. drukowana, malowana
        ręcznie).
    first_day_cover_cancellation_type:
      name: Rodzaj anulowania ubezpieczenia na pierwszy dzień
      description: Typ/styl kasownika pocztowego zastosowanego na kopercie pierwszego
        dnia obiegu, np. kasownik maszynowy, kasownik ręczny.
    first_day_cover_set_type:
      name: Zestaw okładek na pierwszy dzień
      description: Wskazuje, czy okładka przedstawia pojedyncze wydanie, pełny zestaw
        czy podzbiór/kombinację.
    fishing_hook_size:
      name: Rozmiar haczyka wędkarskiego
      description: 'Określa standardowe oznaczenie rozmiaru haczyka wędkarskiego (np.
        #4, 1/0, 10/0), pomagając wędkarzom dopasować wymiary haczyka do gatunku docelowego
        i przynęty.'
    fishing_hook_style:
      name: Styl haczyka do łowienia ryb
      description: Identyfikuje konkretną konstrukcję lub wzór zagięcia pojedynczego
        haka, który ma wpływ na prezentację, skuteczność haczenia i zamierzony efekt.
    fishing_hook_type:
      name: Typ haczyka do łowienia ryb
      description: Opisuje konfigurację haczyka dostarczaną z błystką wahadłową, jeśli
        występuje.
    fishing_line_application:
      name: Zastosowanie żyłki wędkarskiej
      description: Określa zamierzone zastosowanie żyłki wędkarskiej lub materiału
        przyponowego (np. przyponu, żyłki głównej, tippetu).
    fishing_line_buoyancy_type:
      name: Typ wyporności żyłki wędkarskiej
      description: Klasyfikuje zachowanie żyłki w toni wodnej, np. pływająca, pośrednia,
        tonąca, pomagając wędkarzom wybrać odpowiednią prezentację na danej głębokości.
    fishing_needle_purpose:
      name: Przeznaczenie igły wędkarskiej
      description: Określa podstawowe zastosowanie igły w zadaniach związanych z osprzętem
        wędkarskim.
    fishing_needle_types_included:
      name: W zestawie różne rodzaje igieł wędkarskich
      description: Wymienia konkretne style igieł lub narzędzi do zestawów końcowych
        dostarczane w zestawie, aby klienci szybko widzieli zawartość zestawu.
    fit_profile:
      name: Profil dopasowania
      description: Opisuje ogólny krój i sylwetkę podpaski, które wpływają na mobilność
        i zasięg.
    fit_volume_classification:
      name: Klasyfikacja objętości dopasowania
      description: Klasyfikuje ogólną objętość wewnętrzną buta według określeń marek,
        np. LV dla niskiej objętości.
    fitting_angle:
      name: Kąt złączki
      description: Określa kąt zagięcia korpusu złączki, np. prosty, 45°, 90°. Użyj
        „regulowane/obrotowe” dla złączek o zmiennym kącie i „inne” dla nietypowych
        kątów.
    flag_base_type:
      name: Typ podstawy flagi
      description: Definiuje styl kotwienia lub podstawy używany do mocowania chorągiewki
        narożnej na różnych nawierzchniach gry.
    flag_design_theme:
      name: Szablon projektu flagi
      description: Opisuje podstawowy szablon projektu przedstawiony na fladze (np.
        kraj/narodowy, drużyna sportowa, święto), wspomagający wyszukiwanie i filtrowanie
        w przypadku zakupów opartych na intencji.
    flag_mounting_method:
      name: Metoda mocowania flagi
      description: Określa, jak flaga mocuje się do pojazdu, np. mocowanie do anteny,
        mocowanie do haka, magnetyczne.
    flag_type:
      name: Typ flagi
      description: Klasyfikuje konkretne przeznaczenie lub styl flagi golfowej, np.
        flaga do dołka, flaga do wózka golfowego lub flaga treningowa.
    flame_resistance_standard:
      name: Norma odporności na płomień
      description: Wskazuje konkretną normę/certyfikację odporności na płomień lub
        łuk elektryczny spełnianą przez odzież.
    flamenco_cajon_snare_system:
      name: System werblowy cajon flamenco
      description: Określa wewnętrzny mechanizm werbla używany do wydawania charakterystycznego
        dla flamenco brzęczenia (lub jego braku).
    flammability_compliance:
      name: Zgodność w zakresie palności
      description: Określa stosowne normy palności, jakie spełnia tkanina stosowana
        we wnętrzach pojazdów.
    flannel_brushing_finish:
      name: Wykończenie szczotkowania flaneli
      description: Wskazuje, czy flanela jest szczotkowana i po której stronie/stronach,
        co wpływa na miękkość, ciepło i wygląd.
    flannel_use_type:
      name: Typ zastosowania flaneli
      description: Podstawowa aplikacja przeznaczona do cięcia/łączenia flaneli.
    flap_configuration:
      name: Konfiguracja klapek
      description: Określa styl klapy siodła, np. pojedyncza lub podwójna.
    flare_color:
      name: Kolor flary
      description: kolor emitowanego światła/płomienia (lub kolor soczewki w przypadku
        flar LED).
    flash_card_included_features:
      name: Karta Flash zawiera funkcje
      description: Wyróżnia funkcjonalne cechy nauki/użytkowania dołączone do fiszek.
    flavor_intensity:
      name: Intensywność smaku
      description: Wskazuje stopień koncentracji produktu aromatyzującego, pomagając
        użytkownikom określić odpowiednie dawkowanie, np. standardowa moc, supermocny.
    flavor_solvent_base:
      name: Baza rozpuszczalnika aromatu
      description: Identyfikuje główny środek lub rozpuszczalnik użyty w aromatyzatorze
        (np. alkohol, glikol propylenowy, gliceryna).
    fleece_fiber_animal_type:
      name: Typ zwierzęcego włókna runa
      description: Zwierzęce źródło włókna runa (gatunek).
    fleece_finish_surface:
      name: Wykończenie/powierzchnia runa
      description: Opisuje powierzchnię/wykończenie runa (np. antypillingowe, szczotkowane),
        które Impact na wydajność, miękkość i wygląd.
    fleece_preparation_method:
      name: Metoda przygotowania runa
      description: Sposób przygotowania/przetworzenia runa do rękodzieła i przędzenia
        (stan włókna).
    flesh_color:
      name: Kolor ciała
      description: Określa kolor miąższu melona.
    fletching_orientation:
      name: Orientacja lotek
      description: Określa sposób osadzenia lotek na promieniu, np. prosto, z przesunięciem,
        spiralnie, co wpływa na obrót i lot strzały.
    fletching_profile:
      name: Profil lotki strzały
      description: Definiuje geometryczny kształt lub cięcie lotki, wpływające na
        opór, prześwit, hałas i ogólną charakterystykę lotu strzały.
    flight_system_type:
      name: Typ systemu lotu
      description: Określa styl konstrukcji piórka lotki, odróżniając systemy składane,
        formowane i zintegrowane piórko-z-shaftem.
    float_attachment_method:
      name: Metoda mocowania pływaka
      description: Opisuje sposób mocowania spławika do żyłki (np. zatrzaskowy lub
        stały), co umożliwia wędkarzom filtrowanie według sposobu mocowania.
    float_design:
      name: Konstrukcja spławika
      description: Klasyfikuje ogólny styl lub typ spławika wędkarskiego, np. bobber,
        waggler, ołówkowy, aby wędkarze mogli szybko wybrać model odpowiedni do techniki
        i warunków.
    float_raft_use_environment:
      name: Środowisko użytkowania pontonów/tratw
      description: 'Główne zamierzone środowisko wodne dla produktu dmuchanego: basen,
        spokojna woda otwarta lub fale, odzwierciedlające oczekiwania dotyczące trwałości
        i konstrukcji.'
    floatation:
      name: Wyporność
      description: Wskazuje, czy nadajnik jest zaprojektowany tak, aby unosić się
        na wodzie.
    floor_construction_type:
      name: Typ konstrukcji podłogi
      description: Określa konstrukcję podłogi tratwy (np. samoodprowadzająca, Drop-stitch),
        która ma wpływ na drenaż, sztywność i amortyzacja.
    floor_design:
      name: Wzór podłogi
      description: Styl pokrycia podłoża dostarczanego z obudową.
    floor_inclusion:
      name: Podłoga w zestawie
      description: Określa, czy przedsionek ma podłogę i czy podłogę tę można usunąć.
    floor_mat_cleaning_method:
      name: Metoda czyszczenia maty podłogowej
      description: Oznacza zalecaną przez producenta metodę podstawowego czyszczenia
        dywanika podłogowego.
    floor_mat_edge_style:
      name: Styl krawędzi maty podłogowej
      description: Opisuje, czy mata ma podwyższone krawędzie/rant zatrzymujące rozlane
        płyny i zanieczyszczenia.
    floor_mat_format:
      name: Format maty podłogowej
      description: Definiuje fizyczny format lub styl produktu do ochrony podłogi,
        np. pojedyncza mata, płytka łączona, rolka.
    floor_mat_retention_system:
      name: Mata podłogowa systemu retencji klientów
      description: Określa metodę utrzymywania maty na miejscu.
    floor_mat_set_configuration:
      name: Konfiguracja zestawu mat podłogowych
      description: Oznacza, które pozycje wchodzą w skład pakietu (np. tylko parować
        z przodu, pełny zestaw).
    floss_sugar_granulation_grade:
      name: Granulacja cukru w proszku
      description: Opisuje rozmiar kryształków mieszanki cukru, drobny, średni, gruby,
        co może wpływać na działanie maszyny i końcową teksturę.
    floss_sugar_product_form:
      name: Forma produktu cukru do waty cukrowej
      description: Wskazuje, czy cukier do waty cukrowej jest gotowy do użycia, stanowi
        koncentrat smakowy wymagający zmieszania z bazowym cukrem czy jest bezbarwnym
        cukrem bazowym.
    flour_grind_texture:
      name: Tekstura mielenia mąki
      description: Wskazuje rozmiar przemiału lub teksturę mąki, np. bardzo drobna,
        średnia, gruba lub mielona na kamieniu, co może wpływać na efekty w przepisach.
    flour_processing_method:
      name: Metoda przetwarzania mąki
      description: Obejmuje istotne metody przetwarzania lub obróbki zastosowane do
        mąki, np. mielenie na kamieniu, bielenie, kiełkowanie, wzbogacanie, które
        wpływają na smak, kolor lub wartości odżywcze.
    flower_care_instructions:
      name: Instrukcje pielęgnacji kwiatów
      description: Podaje zalecane kroki pielęgnacji właściwe dla świeżych kwiatów
        ciętych, np. przycinanie łodyg, częstotliwość wymiany wody.
    flugelhorn_leadpipe_material:
      name: Materiał na rurę ołowianą flugelhornu
      description: Materiał elementu rurki ustnikowej (jeśli różni się od materiału
        wykonania całego instrumentu).
    flugelhorn_trigger_type:
      name: Flugelhornwyzwalacz typu
      description: Wskazuje, czy flugelhorn ma trigger stroikowy i na który krąglik/zawór
        działa.
    fluorescence_grade:
      name: Klasa fluorescencji
      description: Wskazuje intensywność fluorescencji diamentu pod wpływem promieniowania
        UV.
    fluorescence_under_uv:
      name: Fluorescencja w świetle UV
      description: Wskazuje, czy/jaki rodzaj fluorescencji okaz wykazuje pod światłem
        ultrafioletowym.
    fluorocarbon_content:
      name: Fluorocarbon Treść
      description: Wskazuje, czy wosk zawiera dodatki fluorowęglowe i na jakim poziomie.
    flute_case_capacity:
      name: Pojemność futerału na flet
      description: Oznacza to, do czego przeznaczone jest opakowanie wewnętrzne, Beyond
        głównym korpusem fletu (np. flet + piccolo, dodatkowa główka).
    flute_cleaning_rod_tip_type:
      name: Typ końcówki wyciora do fletu
      description: Opisuje budowę końcówki pręta, która trzyma szmatkę/wacik lub styka
        się z instrumentem (np. szczelinowa, ekspres, oczko).
    flute_footjoint_type:
      name: Typ stopki fletowej
      description: Określa konfigurację stopki fletu.
    flute_headjoint_cork_type:
      name: Główka fletu typu korkowego
      description: Określa materiał/typ zespołu korka/zatyczki główki dostarczanego
        z główką.
    flute_key_system:
      name: System klawiszy fletu
      description: Identyfikuje system mechaniczny/kluczowy używany przez flet (np.
        system Boehma), gdzie ma to zastosowanie.
    flute_keywork_material:
      name: Materiał klawiszy fletu
      description: Materiał i/lub powłoka klap, jeśli podano je oddzielnie od materiału
        korpusu.
    flute_offset_g:
      name: Przesunięcie fletu G
      description: Określa, czy flet ma układ klapy G przesunięty względem osi.
    flute_wall_thickness:
      name: Grubość ścianki fletu
      description: Kategoria grubości ścianek rury rowkowej (cienkościenna, standardowa,
        grubościenna).
    fly_pattern_type:
      name: Typ wzoru muchy
      description: Klasyfikuje sztuczną muchę według stylu wędkowania lub imitacji
        owada/pokarmu, aby pomóc wędkarzom szybko filtrować odpowiedni styl muchy.
    fly_rod_style:
      name: Styl wędki muchowej
      description: Klasyfikuje wędkę ze względu na jej zamierzony rodzaj lub aplikację
        (np. jednoręczna, przełącznikowa, spey).
    fly_style:
      name: Styl muchy
      description: Określa typ rozporka lub przedniego otworu w dolnej części kalesonów.
    fly_tying_tools_included:
      name: Narzędzia do wiązania much w zestawie
      description: Wymienia konkretne narzędzia do wiązania much dołączone do zestawu,
        aby kupujący dokładnie wiedzieli, co jest w zestawie i mogli porównać pakiety.
    fly_type:
      name: Typ rozporka
      description: Określa, czy dolna część kalesonów ma funkcjonalny rozporek i jaki
        jest jego styl.
    flyer_hook_mounting_method:
      name: Metoda mocowania haczyka skrzydełka
      description: Sposób mocowania haczyka do skrzydełka, np. wkręcany lub wciskany,
        wpływający na łatwość montażu i kompatybilność.
    flyer_hook_orientation:
      name: Orientacja haka Flyer
      description: Wskazuje, czy haczyk jest przeznaczony do lewej lub prawej strony
        skrzydełka, czy jest odwracalny/uniwersalny.
    flyer_kit_finish_coating:
      name: Wykończenie/powłoka zestawu skrzydełka
      description: Wykończenie powierzchni zastosowane na elementach zestawu skrzydełka.
    flyer_kit_included_components:
      name: Elementy dołączone do zestawu skrzydełka
      description: Określa, jakie części znajdują się w zestawie.
    flyer_orifice_type:
      name: Typ otworu skrzydełka
      description: Określa rodzaj otworu użytego w ulotce.
    flying_disc_feature_set:
      name: Zestaw funkcji latającego dysku
      description: Istotne cechy funkcjonalne dysku latającego.
    flysheet_material:
      name: Materiał tropiku
      description: Określa główny materiał użyty do wykonania namiotu zewnętrznego/tropiku,
        ciężar Impact , trwałość i odporność na warunki atmosferyczne.
    flywheel_balance_type:
      name: Typ saldo koła zamachowego
      description: Wskazuje, czy koło zamachowe jest wyważone neutralnie czy wykorzystuje
        zewnętrzne obciążenie niewyważające.
    foam_blocks_size_class:
      name: Klasa rozmiaru bloków piankowych
      description: Wskazuje ogólną klasę rozmiaru bloków w zestawie.
    foam_blocks_surface_texture:
      name: Tekstura powierzchni bloków piankowych
      description: Opisuje wygląd/wykończenie zewnętrznej powierzchni bloków piankowych.
    foam_surface_effect:
      name: Efekt powierzchni piankowej
      description: Opisuje powszechnie stosowane efekty dekoracyjne stosowane na powierzchniach
        Craft i styropianowych, takie jak brokat, metaliczne lub holograficzne wykończenia.
    foil_color:
      name: Kolor folii
      description: Określa kolor akcentu z folii użytego na certyfikacie, jeśli dotyczy.
    foil_curtain_mounting_method:
      name: Sposób montażu kurtyny foliowej
      description: Sposób montażu lub zawieszenia kurtyny foliowej, np. pasek samoprzylepny,
        oczka.
    foil_discipline:
      name: Dyscyplina floretu
      description: Określa główny styl jazdy lub dyscyplinę, do której przeznaczony
        jest foil.
    foil_mast_board_mounting_type:
      name: Typ mocowania masztu foil do deski
      description: Definiuje interfejs na szczycie masztu, który mocuje się do płyty
        lub folii.
    foil_mast_fuselage_connection_type:
      name: Typ połączenia masztu foil z kadłubem
      description: Określa sposób połączenia masztu z kadłubem lub przednim skrzydłem.
    foil_mounting_interface:
      name: Technika mocowania folii
      description: Określa standard połączenia używany przez część do mocowania do
        deski lub innych elementów foil.
    foil_mounting_system:
      name: System mocowania folii
      description: Określa interfejs montażowy foil lub stateczników na desce, zapewniając
        kompatybilność z istniejącym osprzętem użytkownika.
    foil_mounting_type:
      name: Typ mocowania folii
      description: Identyfikuje system interfejsu używany do mocowania folii do płytki,
        zapewniając kompatybilność pomiędzy komponentami.
    fold_over_elastic_application:
      name: Zastosowanie gumy lamówkowej
      description: Główne zamierzone zastosowanie gumy dziurkowanej.
    foldability:
      name: Składalność
      description: Opisuje, czy i w jaki sposób przegroda składa się lub zapada do
        przechowywania albo rekonfiguracji.
    foldability_stow:
      name: Możliwość składania (składzania)
      description: Wskazuje, czy bagażnik składa się/chowa, gdy nie jest używany,
        np. składa się przy pojeździe.
    folding_style:
      name: Styl składany
      description: Wskazuje, jak materac asekuracyjny składa się do transportu i przechowywania,
        co wpływa na jednolitość powierzchni lądowania i pakowność.
    food_basket_items_included:
      name: W cenę wliczona jest pozycja koszyka z jedzeniem
      description: Wymienia główne typy produktów spożywczych dołączonych do kosza,
        aby pomóc kupującym wybrać kosze odpowiadające gustom lub potrzebom dietetycznym
        odbiorców.
    food_coloring_form:
      name: Barwnik spożywczy
      description: Określa formę fizyczną lub format dostawy, w jakim Supply jest
        barwnik spożywczy (np. żel, płyn, proszek, spray).
    food_contact_material:
      name: Materiał mający kontakt z żywnością
      description: Podstawowy materiał elementów sprzętu winiarskiego (fermentorów,
        syfonów, lejków) używanych z moszczem/winem.
    food_packing_medium:
      name: Medium pakowania żywności
      description: Określa medium, w którym pakowane są owoce lub warzywa (np. woda,
        solanka, syrop, olej).
    foosball_rod_type:
      name: Typ pręta do piłkarzyków
      description: Oznacza konfigurację mechaniczną wędki, która wpływa na odczucia
        podczas gry i bezpieczeństwo.
    foot_arch_type_compatibility:
      name: Kompatybilność z typem łuku stopy
      description: Określa profil łuku stopy, do którego przeznaczona jest wkładka.
    foot_arch_type_suitability:
      name: Odpowiedni typ łuku stopy
      description: Określa, do jakiego profilu łuku stopy wkładka ma pomóc.
    foot_coverage:
      name: Zakrycie stóp
      description: Wskazuje, czy odzież na nogi ma stopy, jest bez stóp, ze strzemiączkiem
        czy z otwartą piętą.
    foot_guard_type:
      name: Typ osłony stopy
      description: Wskazuje, czy ochraniacz nogi zawiera osłonę palców/stopy i czy
        osłona jest stała czy zdejmowana.
    foot_support_level:
      name: Poziom wsparcia stopy
      description: Oznacza poziom wsparcia strukturalnego, technicznego lub twardości,
        jaki zapewnia wkładka do butów, np. niski, średni, wysoki lub bardzo wysoki.
    footbag_play_style:
      name: Styl gry footbagiem
      description: Podstawowy styl gry w footbag.
    football_ball_type:
      name: Typ piłki futbolowej
      description: Określa główne zamierzone zastosowanie lub kontekst piłki futbolowej,
        np. gra meczowa, trening lub ekspozycja kolekcjonerska.
    football_dummy_type:
      name: Typ manekina futbolowego
      description: Klasyfikuje styl lub funkcjonalną konstrukcję manekina, aby oddać
        jego konkretne przeznaczenie treningowe.
    football_glove_certification:
      name: Certyfikacja rękawic piłkarskich
      description: Oznacza certyfikat lub zgodność ze standardami wymaganymi do gry
        w zawodach (np. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Typ montażu podnóżka
      description: Określa sposób mocowania podnóżka do Frame łóżka lub podłogi, pomagając
        użytkownikowi w wyborze kompatybilnego sprzętu i metod instalacji.
    footboard_style:
      name: Styl podnóżka
      description: Definiuje styl strukturalny i estetyczny podnóżka.
    footrest_adjustability:
      name: Możliwość regulacji podnóżka
      description: Określa, czy i w jaki sposób podnóżki można regulować, aby dopasować
        je do różnej długości nóg dziecka.
    footrest_type:
      name: Typ podnóżka
      description: Określa obecność i konstrukcję podnóżka w stołku.
    footstrap_configuration:
      name: Konfiguracja footstrapów
      description: Określa wzór wkładki footstrap na pokładzie deski.
    footswitch_action_style:
      name: Styl działania przełącznika nożnego
      description: Wskazuje, czy działanie przełącznika jest chwilowe czy zatrzaskowe
        oraz czy obsługuje oba tryby.
    footswitch_power_source:
      name: Źródło zasilania przełącznika nożnego
      description: Określa sposób zasilania przełącznika nożnego, jeśli ma to zastosowanie
        (pasywnie poprzez gniazdo wzmacniacza, z baterii, za pomocą zewnętrznego zasilacza,
        przez USB itp.).
    footwear_construction_method:
      name: Metoda wykonania obuwia
      description: Definiuje technikę mocowania cholewki do podeszwy, wpływającą na
        trwałość, możliwość wymiany podeszwy i cenę.
    footwear_cut:
      name: Krój obuwia
      description: Wskazuje wysokość kołnierza przy kostce, niski, średni lub wysoki,
        równoważąc mobilność i wsparcie.
    footwear_size_system:
      name: System rozmiarów obuwia
      description: Określa regionalny standard rozmiarów używany dla podanego rozmiaru
        buta, np. US, EU, UK.
    footwear_support_type:
      name: Typ wsparcia obuwia
      description: Określa poziom wsparcia biomechanicznego, technicznego lub kontroli
        pronacji, jaki zapewnia but (np. neutralność, stabilność, kontrola Motion
        ).
    fork_material:
      name: Materiał widelca
      description: Określa materiał użyty na przedni widelec roweru, wpływający na
        sztywność, wagę i jakość jazdy.
    form_factor:
      name: Współczynnik kształtu
      description: Podstawowa forma sprzętowa kontrolera DMX.
    formula_car_series_class:
      name: Seria/klasa samochodu Formuły
      description: Określa serię lub klasę wyścigową, do której samochód Formuły jest
        zbudowany.
    formulation_style:
      name: Styl formuły
      description: Wyróżnia specjalistyczne formuły opracowane do konkretnych zastosowań
        lub preferencji, np. Barista, Extra Creamy.
    formulation_type:
      name: Typ formuły
      description: Styl formuły sprayu dezynfekującego.
    fossil_preparation_level:
      name: Poziom przygotowania skamieniałości
      description: Stopień przygotowania/oczyszczenia próbki (np. nieprzygotowana
        w matrycy lub w pełni przygotowana).
    fossil_preservation_type:
      name: Typ konserwacji skamieniałości
      description: Typ zachowania skamieniałości, np. permineralizacja, odlew, forma,
        odcisk.
    fossil_restoration_status:
      name: Status renowacji skamieniałości
      description: Czy i w jaki sposób okaz został naprawiony/odrestaurowany (np.
        sklejony, zrekonstruowany, skomponowany).
    foundation_configuration:
      name: Konfiguracja Foundations
      description: Określa, czy Foundations są produkowane jako pojedynczy element
        czy jako zestaw Split/dwuczęściowy w przypadku większych rozmiarów materacy.
    foundation_profile:
      name: Profil podkładu
      description: Klasyfikuje ogólną kategorię wysokości Foundations— np. ultra niskie,
        niskie, standardowe lub wysokie — dzięki czemu klient może szybko dopasować
        preferencje dotyczące wysokości materaca i dopasowania prześcieradła.
    frame_adjustability:
      name: Możliwość regulacji ramy
      description: Wskazuje, czy i w jaki sposób ramę można regulować, np. regulacja
        szerokości/wysokości, obrót/pochylenie, co wpływa na ergonomię i dopasowanie
        projektu.
    frame_drum_jingle_configuration:
      name: Konfiguracja dzwonka Frame
      description: Wskazuje, czy bęben obręczowy zawiera brzękadła, a jeśli tak, ich
        ogólną konfigurację.
    frame_drum_tuning_system:
      name: System strojenia bębna obręczowego
      description: Sposób strojenia bębna obręczowego lub informacja, czy jest strojony.
    frame_finish:
      name: Wykończenie Frame
      description: Określa powłokę ochronną lub wykończenie materiału stosowanego
        do Frame, Influence trwałość i estetykę.
    frame_mounting_standard:
      name: Standard mocowania ramy
      description: Określa specyfikację interfejsu but–rama, np. 195 mm 2-punktowy,
        Trinity 3-punktowy, kluczową dla kompatybilności ramy.
    frame_steel_gauge:
      name: Grubość stali ramy
      description: Określa grubość (średnicę) rur stalowych użytych w słupkach regału,
        co jest krytycznym wskaźnikiem wytrzymałości i stabilności.
    frame_suspension_type:
      name: Typ zawieszenia ramy
      description: Oznacza rodzaj zawieszenia Frame roweru, np. sztywne, hardtail
        lub z pełnym zawieszeniem, aby pomóc użytkownikowi wybrać Frame odpowiadającą
        jego planowanej budowie ciała.
    free_reed_instrument_orientation:
      name: Orientacja instrumentu stroikowego
      description: Określa sposób trzymania/grania na instrumencie (ręczny z miechem,
        na ramieniu itp.) ze względu na ergonomię i użytkowanie - opakowanie wewnętrzne
        filtrujące.
    free_weight_rack_type:
      name: Wolne ciężary typu regał
      description: Klasyfikuje strukturalny styl lub Functions regału (np. regał sztangowy,
        regał kettlebell, regał talerzowy).
    freehub_body_type:
      name: Typ korpusu wolnobiegu
      description: Określa standard bębenka piasty lub drivera kasety obsługiwany
        przez tylną piastę rowerową.
    freehub_driver_standard:
      name: Standard drivera bębenka
      description: Określa interfejs kasety/drivera obsługiwany przez część piasty,
        np. Shimano HG, SRAM XD.
    freewheel_thread_standard:
      name: Standard gwintu wolnobiegu
      description: Określa standard lub rozmiar gwintu piasty, z którym kompatybilny
        jest wolnobieg.
    french_horn_bell_construction:
      name: Konstrukcja czary głosowej waltorni
      description: Określa sposób konstrukcji czary głosowej i to, czy można ją zdjąć
        do transportu/serwisu.
    french_horn_bell_material:
      name: Materiał dźwięcznika waltorni
      description: Określa materiał/stop, z którego wykonana jest czara (a często
        także rozbłysk czary) stosowana w waltorni.
    french_horn_bell_type:
      name: Typ czary głosowej waltorni
      description: Styl konstrukcji czary głosowej.
    french_horn_finish:
      name: Wykończenie waltorni
      description: Wykończenie zewnętrzne/powłoka galwaniczna instrumentu.
    french_horn_included_accessories:
      name: W zestawie akcesoria do waltorni
      description: Akcesoria dołączone do waltorni, np. futerał, ustnik itp.
    french_horn_leadpipe_material:
      name: Materiał rurki ustnikowej waltorni
      description: Określa materiał/stop rury ołowianej.
    french_horn_wrap_type:
      name: Typ powłoki waltorni
      description: Ogólna konfiguracja układu/kształtu waltorni.
    fretboard_radius_fit:
      name: Dopasowanie promienia podstrunnicy
      description: Wskazuje, czy krzywizna podkładki kapodastra jest przeznaczona
        do płaskich lub zaokrąglonych podstrunnic, czy też jest regulowana i dostosowana
        do różnych promieni podstrunnicy.
    friction_surface_included:
      name: W zestawie powierzchnia cierna
      description: Czy koło zamachowe zawiera wymienną/zamontowaną powierzchnię cierną
        (np. wkładkę, pierścień), czy też jest jednoczęściową powierzchnią cierną.
    fringe_curtain_finish:
      name: Wykończenie zasłony frędzlami
      description: Opisuje wizualne wykończenie powierzchni frędzli (połysk/faktura).
    fringe_curtain_material:
      name: Materiał na zasłony z frędzlami
      description: Określa materiał podstawowy pasów zasłonowych (np. folia politereftalowa
        etylenowa, plastik, Paper, tkanina).
    fringe_curtain_use_location:
      name: Miejsce użycia kurtyny z frędzli
      description: Określa, czy zasłona frędzlowa jest przeznaczona do użytku wewnątrz,
        na zewnątrz, czy do obu zastosowań.
    fringe_trim_style:
      name: Styl taśmy z frędzlami
      description: Określa konstrukcję/styl taśmy z frędzlami, czyli sposób formowania
        i prezentacji pasm lub pętelek.
    front_axle_standard:
      name: Standard przedniej osi
      description: Wymienia średnicę osi i rozstaw, do których zaprojektowany jest
        widelec, np. 15 x 110 mm Boost, zapewniając kompatybilność piasty.
    front_button_configuration:
      name: Konfiguracja przycisków przednich
      description: Określa styl przednich przycisków marynarki, określając, czy jest
        ona jedno- czy dwurzędowa, a także liczbę przednich przycisków.
    front_closure_style:
      name: Styl zapięcia z przodu
      description: Określa styl konstrukcji przodu trencza, np. jedno- lub dwurzędowy,
        otwarty, kopertowy lub wiązany.
    front_decoration_type:
      name: Typ dekoracji z przodu
      description: Określa rodzaj ozdoby lub naszywki umieszczonej na przodzie czapki
        (np. naszywka haftowana, naszywka skórzana).
    front_point_configuration:
      name: Konfiguracja punktów przednich
      description: Określa konstrukcję przednich punktów (Mono-punktowy, dual-punktowy,
        Modular, wymienny), Influence precyzję penetracji na lodzie i terenie mieszanym.
    front_seat_position:
      name: Pozycja na przednim siedzeniu
      description: Strona/położenie w przednim rzędzie, do którego przeznaczone jest
        siedzenie.
    front_style:
      name: Styl przodu
      description: Opisuje konstrukcję przodu chinosów, wskazując, czy spodnie mają
        płaski przód, zakładki lub inne detale.
    frosting_or_icing_type:
      name: Typ kremu lub lukru
      description: Określa typ kremu lub lukru nałożonego na ciasto albo baton deserowy.
    fruit_cultivar_or_variety:
      name: Odmiana lub odmiana owoców
      description: Określa konkretny kultywar lub nazwę odmianową owocu, np. Gala,
        Granny Smith, Monthong, Cavendish.
    fruit_cut_style:
      name: Styl krojenia owoców
      description: Opisuje sposób przygotowania lub pokrojenia owocu, np. cały, w
        plasterkach, w kostkę.
    fruit_mix_variety:
      name: Mieszanka owoców
      description: Nazywa mieszankę Szablony lub ogólną odmianę mieszanki owocowej
        (np. Tropical Mix, Berry Medley).
    fruit_piece_form:
      name: Forma kawałka owocu
      description: Opisuje fizyczny sposób pokrojenia lub podania kawałków suszonych
        owoców, np. całe, w plasterkach, sproszkowane.
    fruit_snack_form:
      name: Forma przekąski owocowej
      description: Klasyfikuje fizyczną formę lub styl, w jakim prezentowana jest
        przekąska owocowa.
    fruit_topping_format:
      name: Format dodatku owocowego
      description: Opisuje fizyczną formę, teksturę lub styl dodatku, aby kupujący
        mogli wybierać między sosami, syropami, kawałkami owoców, pękającymi kuleczkami
        itp.
    fruit_variety:
      name: Odmiana owocu
      description: Określa podstawowy owoc użyty do przepisu/zestawu/materiałów na
        wino owocowe, np. jabłko, wiśnia, jeżyna.
    fuel_cap_gasket_seal_material:
      name: Materiał uszczelki korka wlewu paliwa
      description: Określa materiał użyty na uszczelkę/O-ring korka wlewu paliwa.
    fuel_cap_locking_mechanism:
      name: Mechanizm zamykający korka wlewu paliwa
      description: Wskazuje sposób blokowania stosowany w zamykanym korku wlewu paliwa.
    fuel_cap_type:
      name: Typ korka wlewu paliwa
      description: Określa funkcjonalny typ/konstrukcję korka wlewu paliwa używanego
        w szyjce wlewu paliwa pojazdu.
    fuel_cap_venting:
      name: Odpowietrzanie korka wlewu paliwa
      description: Wskazuje, czy korek wlewu paliwa jest odpowietrzany, a jeśli tak
        — styl odpowietrzania.
    fuel_filter_features:
      name: Cechy filtra paliwa
      description: Wymienia najważniejsze cechy funkcjonalne filtra paliwa (separacja
        wody, zawór spustowy, port czujnika itp.).
    fuel_filter_media_material:
      name: Materiał medium filtra paliwa
      description: Określa podstawowe multimedia filtracyjne stosowane wewnątrz elementu
        filtra paliwa.
    fuel_filter_mounting_connection_type:
      name: Typ mocowania/połączenia filtra paliwa
      description: Określa sposób podłączenia/montażu filtra paliwa, np. gwintowany/nakręcany,
        szybkozłącze, króciec do węża, banjo itp.
    fuel_injection_cleaning_method:
      name: Metoda czyszczenia wtrysku paliwa
      description: Wskazuje, jak zestaw jest używany do czyszczenia układu wtrysku
        paliwa.
    fuel_injector_electrical_connector_type:
      name: Typ złącza elektrycznego wtryskiwacza paliwa
      description: Określa standard/Shapes złącza elektrycznego wtryskiwacza.
    fuel_injector_seat_type:
      name: Typ gniazda wtryskiwacza paliwa
      description: Określa styl interfejsu końcówki/gniazda wtryskiwacza używany do
        uszczelnienia przy dolocie/listwie paliwowej.
    fuel_injector_spray_pattern:
      name: Wzór rozpylania wtryskiwacza paliwa
      description: Określa wzór rozpylania/rozprowadzania paliwa przez wtryskiwacz
        według terminologii producenta lub branżowej, np. stożek, wachlarz, strumień
        punktowy, wielootworowy.
    fuel_level_sensor_mounting_type:
      name: Typ mocowania czujnika poziomu paliwa
      description: Określa fizyczny interfejs montażowy służący do przymocowania czujnika/czujnika
        poziomu paliwa do Modules zbiornika paliwa lub pompy.
    fuel_level_sensor_sensing_mechanism:
      name: Mechanizm pomiarowy czujnika poziomu paliwa
      description: Określa mechanizm/technologię pomiaru poziomu paliwa w czujniku
        poziomu paliwa lub jednostce nadawczej.
    fuel_line_compliance_standard:
      name: Norma zgodności przewodu paliwowego
      description: Określa normę regulacyjną lub branżową spełnianą przez przewód
        paliwowy, często w zastosowaniach morskich.
    fuel_line_connector_interface_type:
      name: Typ interfejsu złącza przewodu paliwowego
      description: Określa styl relacji/interfejsu na końcu(ach) przewodu paliwowego
        lub złączki.
    fuel_pressure_regulator_body_material:
      name: Materiał korpusu regulatora ciśnienia paliwa
      description: Określa materiał obudowy/korpusu regulatora zapewniający trwałość
        i odporność na korozję.
    fuel_pressure_regulator_mounting_type:
      name: Typ mocowania regulatora ciśnienia paliwa
      description: Określa sposób mocowania lub montażu regulatora ciśnienia paliwa,
        wpływający na dopasowanie i kompatybilność.
    fuel_pump_inlet_type:
      name: Typ wlotu pompy paliwa
      description: Styl połączenia na wlocie pompy.
    fuel_pump_mounting_location:
      name: Lokalizacja mocowania pompy paliwa
      description: Miejsce montażu pompy paliwa w układzie paliwowym pojazdu.
    fuel_pump_outlet_connection_type:
      name: Typ wyjścia pompy paliwa
      description: Określa fizyczny styl połączenia na wylocie pompy paliwa w celu
        zapewnienia kompatybilności dopasowania/montażu.
    fuel_system_application:
      name: Generator układu paliwowego
      description: Architektura układu dostarczania paliwa Pompa paliwa jest zaprojektowana
        do pomocy technicznej (np. gaźnik, EFI, GDI, podnośnik/transfer oleju napędowego).
    fuel_system_connection_type:
      name: Typ układu paliwowego
      description: Określa standard(y) układu paliwowego lub interfejs(y) adaptera
        obsługiwane przez zestaw.
    fuel_system_type:
      name: Typ układu paliwowego
      description: Określa układ zasilania paliwem silnika, np. gaźnik lub architektura
        wtrysku paliwa.
    fuel_tank_installation_position:
      name: Pozycja montażu zbiornika paliwa
      description: Określa typowe miejsce montażu zbiornika paliwa w pojeździe.
    fuel_tank_orientation:
      name: Orientacja zbiornika paliwa
      description: Określa, czy zbiornik paliwa jest przeznaczony do montażu poziomego
        czy pionowego.
    fuel_tank_shape:
      name: Kształt zbiornika paliwa
      description: Opisuje ogólną formę/kształt zbiornika paliwa, aby wspierać fizyczne
        dopasowanie i dobór zamiennika.
    fur_type:
      name: Typ futra
      description: Określa gatunek lub materiał syntetyczny futra na zewnątrz kopertówki
        lub torebki.
    furniture_finish:
      name: Wykończenie mebli
      description: Opisuje rodzaj powierzchni lub wykończenie zastosowane do danego
        mebla, mające wpływ na jego wygląd i wymagania konserwacyjne.
    fuse_form_factor:
      name: Współczynnik kształtu bezpiecznika
      description: Określa fizyczny styl/obrys bezpiecznika, aby mieć pewność, że
        będzie pasował do zamierzonego uchwytu lub bloku bezpieczników (np. bezpiecznika
        płaskiego czy wkładkowego).
    fuse_terminal_or_mount_style:
      name: terminal bezpiecznika lub styl montażu
      description: Określa sposób łączenia bezpiecznika mechanicznie/elektrycznie
        (wtyczka, przykręcany, liniowy).
    fusible_application_method:
      name: Metoda nakładania materiału niskotopliwego
      description: Określa sposób aktywacji/nakładania kleju termotopliwego, np. ciepło
        żelazka, prasa, wzmocnienie szyciem.
    fusible_hem_tape_application_method:
      name: Metoda aplikacji taśmy termicznej do podwijania
      description: Opisuje sposób aktywacji/nakładania taśmy, np. żelazkiem, prasą
        termiczną.
    fusible_seam_tape_activation_method:
      name: Metoda aktywacji taśmy naprawczej
      description: Wskazuje sposób aktywacji kleju podczas aplikacji.
    fusible_seam_tape_application:
      name: Aplikacja termicznej taśmy do szwów
      description: Określa podstawowe przeznaczenie opakowań wewnętrznych dla taśmy
        klejącej.
    fusible_seam_tape_material:
      name: Materiał na taśmę łączącą
      description: Materiał lub skład taśmy/siatki/nośnika, a nie tkaniny, którą łączy.
    fusible_seam_tape_washability:
      name: Odporność termicznej taśmy do szwów na pranie
      description: Wskazuje, czy sklejony szew pozostaje nienaruszony po praniu lub
        czyszczeniu.
    fusible_seam_tape_waterproof_rating:
      name: Wodoodporność termicznej taśmy do szwów
      description: Określa, czy taśma łącząca ma za zadanie utworzyć wodoodporny lub
        wodoodporny szew po aplikacji.
    fusible_tape_backing_type:
      name: Typ podkładu taśmy termicznej
      description: Określa, czy taśma ma papier/podkład zabezpieczający i jaką ma
        formę, co wpływa na obsługę i aplikację.
    futon_frame_conversion_mechanism:
      name: Mechanizm konwersja Futon Frame
      description: Definiuje mechanizm lub styl konstrukcji używany do przekształcania
        ramy między pozycjami sofy, leżanki i łóżka.
    gaiter_height_type:
      name: Typ wysokości stuptutów
      description: Ochraniacze klasyfikuje się według wysokości zakrycia, jakie zapewniają
        na nodze, np. do kostki, do połowy łydki, do kolana lub do uda.
    game_variation:
      name: Wariacja gry
      description: Określa styl rozgrywki, do którego przeznaczony jest zestaw, np.
        klasyczny tetherball, tether tennis, speedball.
    garlic_preparation_style:
      name: Styl przygotowania czosnku
      description: Określa sposób przygotowania lub przetwarzania czosnku przed sprzedażą
        (np. cały, mielony, sproszkowany).
    garlic_variety:
      name: Odmiana czosnku
      description: Określa oferowaną botaniczną lub handlową odmianę/kultywar czosnku.
    garment_back_style:
      name: Styl tyłu odzieży
      description: Określa konstrukcję lub konstrukcję tylnej części ubrania (np.
        odkryte plecy, tył typu racerback, skrzyżowane plecy).
    garment_pattern_type:
      name: Typ wzoru odzieży
      description: Określa rodzaj odzieży, którą wykrój ma wykonać.
    garnish_type:
      name: Typ dekoracji
      description: 'Określa, czym jest dekoracja używana do wykończenia koktajlu:
        składnik lub styl dekoracji.'
    gas_lift_class:
      name: Klasa podnośnika gazowego
      description: Określa klasę bezpieczeństwa i wytrzymałości siłownika gazowego
        używanego do regulacji wysokości siedziska.
    gas_propellant_type:
      name: Rodzaj paliwa gazowego
      description: Określa typ gazu pędnego zalecany lub kompatybilny, gdy blaster
        jest zasilany gazem.
    gatta_tabla_tuning_block_material:
      name: Materiał Gatta (blok strojenia tabli)
      description: Materiał klocków stroikowych (gatta) używanych między paskiem stroikowym
        a korpusem.
    gauge_mounting_type:
      name: Typ mocowania przyrządu pomiarowego
      description: Jak zamontować/zainstalować licznik paliwa na jednostce pływającej.
    gauge_style:
      name: Styl przyrządu pomiarowego
      description: Określa typ manometru używanego w pompce, np. analogowa tarcza,
        odczyt cyfrowy lub brak.
    gear_oil_api_classification:
      name: Klasyfikacja API oleju przekładniowego
      description: Klasyfikacja API GL olejów przekładniowych używanych w mechanizmach
        różnicowych/ręcznych skrzyniach biegów.
    gel_wax_density_grade:
      name: Klasa gęstości wosku żelowego
      description: Wskazuje klasę gęstości wosku żelowego, która wpływa na przejrzystość,
        pojemność zapachową i przydatność do elementów zatapianych.
    gel_wax_transparency_level:
      name: Poziom przezroczystości wosku żelowego
      description: Opisuje przejrzystość/nieprzezroczystość wosku żelowego przy użyciu
        zgodnym z przeznaczeniem.
    gelatin_form:
      name: Forma żelatynowa
      description: Opisuje fizyczną postać żelatyny, aby użytkownicy mogli wybrać
        właściwy format do przepisów i zastosowań przemysłowych.
    gelatin_or_gelling_agent_source:
      name: Źródło żelatyny lub środka żelującego
      description: Wskazuje pochodzenie lub typ środka żelującego użytego w produkcie,
        istotne ze względów dietetycznych i religijnych.
    gelatin_source:
      name: Źródło żelatyny
      description: Wskazuje zwierzęce, roślinne lub syntetyczne pochodzenie żelatyny,
        aby kupujący mogli sprawdzić zgodność z wymaganiami dietetycznymi, etycznymi
        lub religijnymi.
    gelling_agent:
      name: Środek żelujący
      description: Określa główną substancję użytą do zagęszczenia deseru, co jest
        istotne dla jego przydatności dietetycznej i konsystencji.
    gemstone_clarity_grade:
      name: Klasa czystości kamienia szlachetnego
      description: Stopień czystości kamienia szlachetnego (w momencie klasyfikacji).
    gemstone_creation_method:
      name: Metoda tworzenia kamieni szlachetnych
      description: Wskazuje, czy kamień szlachetny jest naturalny, laboratoryjny czy
        imitacją/symulantem.
    gemstone_cut_style:
      name: Styl szlifu kamienia szlachetnego
      description: Opisuje styl cięcia/wykończenia okazu kamienia szlachetnego.
    gemstone_treatment_status:
      name: Status obróbki kamienia szlachetnego
      description: Wskazuje, czy i w jaki sposób kamień szlachetny został poddany
        obróbce/ulepszeniu.
    geological_period:
      name: Okres geologiczny
      description: Okres geologiczny (i opcjonalnie epoka) skamieniałości, jeśli jest
        znana (np. jura, kreda, eocen).
    gift_box_tin_insert_type:
      name: Typ wkładu pudełka/puszki prezentowej
      description: Konfiguracja wkładu wewnętrznego do organizowania/ochrony przedmiotów
        wewnątrz pudełka/puszki.
    gift_box_tin_sustainability_features:
      name: Cechy zrównoważonego rozwoju pudełka/puszki prezentowej
      description: Charakterystyka ekologiczna pudełka/numeru odbioru podatkowego
        opakowania.
    gift_box_tin_window_type:
      name: Typ okienka pudełka/puszki prezentowej
      description: Czy pudełko na prezent ma okienko wystawowe i w jakim jest stylu.
    gift_message_option:
      name: opcja wiadomości prezentowej
      description: 'Określa, czy można dołączyć wiadomość/notatkę prezentową i w jaki
        sposób: brak, dołączona, personalizowana.'
    ginger_maturity:
      name: Dojrzałość imbiru
      description: Wskazuje na etap zbioru imbiru, np. czy jest młody czy dojrzały,
        co wpływa na intensywność smaku i preferowany smak kulinarny.
    ginger_variety:
      name: Odmiana imbiru
      description: Określa odmianę, typ lub spokrewnione kłącze w obrębie rodziny
        imbirowatych, co pozwala na różnicowanie profili smakowych i zastosowań kulinarnych.
    glass_kiln_controller_type:
      name: Typ sterownika pieca do szkła
      description: Typ sterownika temperatury/wypału dołączonego do pieca.
    glass_kiln_firing_application:
      name: Zastosowanie wypału w piecu do szkła
      description: Podstawowe urządzenia do obróbki szkła, do których piec jest przeznaczony.
    glass_stone_application_method:
      name: Metoda tworzenia szklanych kamieni
      description: Określa sposób mocowania/nakładania szklanych kamieni w projektach,
        np. przyklejane, hotfix, przyszywane.
    glass_tint:
      name: Przyciemnienie szkła
      description: Przyciemnienie szkła/plastiku użytego w butelce do zarządzania
        ekspozycją na światło, typowe w browarnictwie/winiarstwie.
    glaze_firing_atmosphere:
      name: Atmosfera wypału szkliwa
      description: Atmosfera wypału, do której przeznaczone jest szkliwo.
    glaze_opacity:
      name: Nieprzezroczystość szkliwa
      description: Stopień przezroczystości szkliwa po wypaleniu.
    glaze_product_form:
      name: Forma produktu glazurniczego
      description: Fizyczna forma, w jakiej dostarczane jest szkliwo, np. płyn, suchy
        proszek, koncentrat, spray.
    glider_avionics_package:
      name: Pakiet awioniki szybowca
      description: Oznacza ogólny poziom nawigacji i przyrządów pokładowych zainstalowanych
        w szybowcu.
    glider_certification_rating:
      name: Ocena certyfikacji szybowca
      description: Oficjalna klasa certyfikacji określająca poziom bezpieczeństwa
        i osiągów szybowca, np. EN-A, EN-B.
    glider_landing_gear_configuration:
      name: Konfiguracja podwozia szybowca
      description: Określa konfigurację podwozia używaną przez szybowiec.
    glider_launch_method:
      name: Metoda Launch szybowca
      description: 'Określa typowy sposób startu szybowca: Launch samodzielny lubLaunch
        własny.'
    glider_performance_class:
      name: Klasa wydajności szybowca
      description: Klasa lub kategoria wyczynowa/sportowa powszechnie używana dla
        szybowców.
    glitter_application_method:
      name: Metoda nakładania brokatu
      description: Oznacza zamierzoną technikę nakładania/używania brokatu Craft (np.
        posypywanie/wstrząsanie, mieszanie, wcieranie, nakładanie na klej, nakładanie
        pędzlem, natryskiwanie, utrwalanie termiczne/tłoczenie).
    glitter_eco_friendly_claim:
      name: Brokat jest ekologiczny
      description: Deklaracje środowiskowe/ekologiczne właściwe dla sypkich formuł
        brokatu.
    glitter_effect_type:
      name: Typ efektu brokatu
      description: Opisuje efekt wizualny brokatu/cekinów Beyond kolorem bazowym (np.
        holograficzny, opalizujący).
    glitter_glue_base_solvent_type:
      name: Baza kleju brokatowego/typ rozpuszczalnika
      description: Opisuje podstawową bazę kleju brokatowego, istotną dla kupujących
        ze względu na czyszczenie i kompatybilność materiałową.
    glitter_opacity_coverage:
      name: Krycie/pokrycie brokatu
      description: Wskazuje, jak nieprzezroczysty jest efekt brokatu po nałożeniu.
    glitter_use_suitability:
      name: Przydatność brokatu
      description: Wskazuje główny zamierzony lub zatwierdzony Context wykorzystania
        proszku brokatowego (np. tylko do użytku Craft , jakość kosmetyczna/bezpieczny
        dla ciała lub bezpieczny dla żywności).
    glove_armor_placement:
      name: Rozmieszczenie ochraniaczy w rękawicy
      description: Określa, w którym miejscu rękawicy znajduje się element ochronny.
    glove_cuff_length:
      name: Długość mankietu rękawicy
      description: Oznacza długość mankietu/rękawicy rękawic wyścigowych na nadgarstku/przedramieniu.
    glove_finger_coverage:
      name: Zakrycie palców rękawicy
      description: Opisuje poziom zakrycia palców zapewniany przez rękawicę, od modeli
        z pełnymi palcami po bezpalcowe.
    glove_finger_design:
      name: Konstrukcja palców rękawicy
      description: Określa konfigurację palców rękawicy, np. pięciopalczasta lub mitenka.
    glove_fit_profile:
      name: Profil dopasowania rękawic
      description: Opisuje wewnętrzny Shapes i ogólną sylwetkę rękawicy, dzięki czemu
        gracze mogą wybrać preferowane przez siebie odczucie.
    glove_insulation:
      name: Izolacja rękawicy
      description: Określa konstrukcję izolacyjną/termiczną lub ogrzewanie rękawicy
        (np. poziom izolacji, technologię podszewki/izolacji lub typ podgrzewania).
    glove_palm_material:
      name: Materiał wewnętrznej strony dłoni rękawicy
      description: Określa podstawowy materiał użyty po wewnętrznej stronie dłoni
        rękawicy, czyli głównej powierzchni kontaktu/chwytu, który może różnić się
        od materiału grzbietu dłoni.
    glove_size:
      name: Rozmiar rękawic
      description: Wskazuje ogólny rozmiar dłoni, do którego przeznaczone są rękawice
        do worka, często wyrażony kodami rozmiarów odzieży lub rozmiarami młodzieżowymi.
    glove_webbing_style:
      name: Styl siatki rękawicy
      description: Definiuje konstrukcję siatki lub kieszeni rękawicy, która wpływa
        na kontrolę piłki, przydatność do pozycji i preferencje gracza.
    glow_effect:
      name: Efekt świecenia
      description: Określa, czy kulki żelowe świecą w ciemności lub mają właściwości
        śledzące, co ułatwia grę przy słabym oświetleniu.
    glow_plug_connector_type:
      name: Typ konektora świecy żarowej
      description: terminalelektryczne na świecy żarowej, służące do podłączenia do
        wiązki przewodów pojazdu.
    glow_plug_heating_element_type:
      name: Typ elementu grzejnego świecy żarowej
      description: Rodzaj/technologia elementu grzejnego zastosowanego w świecy żarowej.
    glue_application_format:
      name: Format aplikacji kleju
      description: Określa format aplikatora/dozownika używany do nakładania kleju
        szkolnego.
    glue_applicator_type:
      name: Typ aplikatora kleju
      description: Określa styl wbudowanego aplikatora/końcówki dozującej używanej
        do nakładania kleju w płynie.
    glue_base_formulation:
      name: Formuła bazowa kleju
      description: Określa podstawową formułę chemiczną/bazową kleju płynnego Craft
        (pod kątem wydajności, bezpieczeństwa i oczekiwań dotyczących czyszczenia).
    glue_gun_nozzle_style:
      name: Styl dyszy pistoletu do kleju
      description: Określa fizyczny styl końcówki dyszy pistoletu do kleju, który
        wpływa na precyzję aplikacji i pokrycie klejem.
    glue_safety_standard:
      name: Norma bezpieczeństwa kleju
      description: Wskazuje, czy klej jest nietoksyczny / bezpieczny dla dzieci zgodnie
        z oznaczeniem i powszechnie obowiązującymi normami.
    goal_frame_material:
      name: Materiał Frame bramki
      description: Określa materiał słupków/ramy bramki, który wpływa na wagę, przenośność
        i odporność na warunki atmosferyczne.
    goal_size:
      name: Rozmiar bramki
      description: Klasyfikuje bramki piłkarskie według powszechnych przepisów lub
        rozmiarów treningowych, co umożliwia szybszy wybór niż w przypadku surowych
        wymiarów.
    goal_size_classification:
      name: Klasyfikacja wielkości bramki
      description: Określa standardową klasę rozmiaru bramki, np. pełnowymiarowa regulaminowa,
        młodzieżowa, mini, aby użytkownicy mogli szybko wybrać sprzęt odpowiedni do
        poziomu gry.
    goal_size_standard:
      name: Standard rozmiaru bramki
      description: Wskazuje, który oficjalny lub wiekowy standard spełnia bramka,
        np. regulamin World Aquatics, 12U.
    goalie_configuration:
      name: Konfiguracja bramkarza
      description: Oznacza liczbę bramkarzy w każdej drużynie skonfigurowaną w tabeli
        (amerykański styl z 3 bramkarzami vs europejski styl z 1 bramkarzem).
    goalie_playing_surface:
      name: Powierzchnia gry bramkarza
      description: Określa główną nawierzchnię lub środowisko gry, do którego przeznaczony
        jest zestaw wyposażenia bramkarza hokejowego.
    goalkeeper_glove_cut:
      name: Krój rękawic bramkarskich
      description: Wskazuje styl konstrukcji dłoni/palców rękawic bramkarskich (krój),
        który wpływa na dopasowanie, czucie piłki i kontrolę.
    goalkeeper_training_aid_type:
      name: Typ sprzętu do treningu bramkarskiego
      description: Określa styl pomocy treningowej dla bramkarza, umożliwiając precyzyjne
        filtrowanie.
    goblet_drum_playing_style:
      name: Styl gry na bębnie kielichowym
      description: Wskazuje, czy instrument jest przeznaczony głównie do gry rękami
        czy do gry pałkami/malletami.
    gobo_format:
      name: Format gobo
      description: Określa rozmiar/standard gobo obsługiwany przez projektor (rodzina
        średnicy i grubości), zapewniając kompatybilność z zamiennymi/niestandardowymi
        gobo.
    gobo_root_variety:
      name: Odmiana korzenia gobo
      description: Określa konkretny kultywar lub odmianę korzenia gobo (łopianu).
    gobo_rotation:
      name: Obrót gobo
      description: Określa, czy gobo może się obracać i jaka kierunkowość jest obsługiwana.
    goggle_accessory_type:
      name: Typ akcesoriów do gogli
      description: Klasyfikuje rodzaj akcesoriów (np. pokrowiec, opakowanie wewnętrzne,
        pasek), dzięki czemu klient może filtrować różnorodne zestawy produktów w
        ramach tej kategorii parasoli.
    goggle_features:
      name: Cechy gogli
      description: Wymienia specjalne cechy funkcjonalne lub projektowe oferowane
        przez gogle.
    goggle_fit_design:
      name: Konstrukcja dopasowania gogli
      description: Opisuje, jak gogle mają pasować lub być noszone, w tym kompatybilność
        OTG, czyli z okularami.
    goggle_gasket_material:
      name: Materiał uszczelki gogli
      description: Materiał uszczelki przylegającej do twarzy, wpływający na komfort,
        kwestie alergiczne i zapobieganie przeciekaniu.
    goggle_integration:
      name: Integracja gogli
      description: Wskazuje, czy kask jest przeznaczony do użycia z goglami i/lub
        ma zintegrowane funkcje przytrzymywania gogli.
    goggle_lens_shape:
      name: Kształt soczewki gogli
      description: Definiuje profil krzywizny soczewki zamiennej, wpływający na zniekształcenia
        i pole widzenia, np. cylindryczny, sferyczny, toryczny.
    goggle_lens_tint:
      name: Przyciemnienie soczewki gogli
      description: Definiuje przyciemnienie lub wykończenie soczewki, które wpływa
        na przepuszczalność światła, postrzeganie kolorów i wygląd estetyczny.
    goggle_strap_material:
      name: Materiał paska gogli
      description: Podstawowy materiał użyty na pasek na głowę, wpływający na trwałość
        i komfort.
    golf_accessory_set_purpose:
      name: Przeznaczenie zestawu akcesoriów golfowych
      description: Określa główne zamierzone zastosowanie lub motyw zestawu akcesoriów
        golfowych.
    golf_bag_style:
      name: Styl torby golfowej
      description: Wskazuje podstawowy styl konstrukcji lub zastosowania torby golfowej,
        np. stojąca, na wózek, zawodnicza.
    golf_ball_alignment_design:
      name: Wzór wyrównujący piłki golfowej
      description: Określa wbudowaną pomoc wizualną do wyrównania nadrukowaną lub
        uformowaną na powierzchni piłki.
    golf_ball_construction:
      name: Konstrukcja piłki golfowej
      description: Określa liczbę warstw/części użytych w konstrukcji piłki golfowej,
        co wpływa na rotację, odczucie i odległość.
    golf_ball_cover_material:
      name: Materiał powłoki piłki golfowej
      description: Określa zewnętrzny materiał powłoki piłki golfowej, który wpływa
        na rotację, trwałość i odczucie.
    golf_cart_cover_climate_use:
      name: Zastosowanie klimatyczne pokrowca na wózek golfowy
      description: Wskazuje podstawowe warunki klimatyczne/sezonowe, które pokrowiec
        do przechowywania ma wytrzymać.
    golf_cart_enclosure_fit_type:
      name: Typ dopasowania obudowy wózka golfowego
      description: Określa, czy obudowa jest przeznaczona do konkretnej liczby siedzeń/formy,
        czy oferuje dopasowanie uniwersalne/regulowane.
    golf_cart_intended_use:
      name: Zamierzone zastosowanie wózka golfowego
      description: Główne zamierzone zastosowanie, do którego wózek golfowy jest zaprojektowany
        lub skonfigurowany.
    golf_club_number:
      name: Numer kija golfowego
      description: Określa konkretny numer lub oznaczenie wedge’a nadrukowane na kiju,
        np. 5, PW, GW.
    golf_club_part_type:
      name: Typ części kija golfowego
      description: Klasyfikuje akcesorium lub komponent kija golfowego według typowych
        podtypów, np. tuleja adaptera, ferrula, obciążnik.
    golf_grip_size:
      name: Rozmiar gripu golfowego
      description: Określa ogólną kategorię zewnętrznego rozmiaru gripu golfowego,
        wskazującą, jak gruby grip jest w dłoni.
    golf_shoe_spike_type:
      name: Typ kolców butów golfowych
      description: Określa typ systemu trakcji użytego na podeszwie zewnętrznej butów
        golfowych, np. konstrukcje z kolcami lub bez kolców.
    golf_tee_style:
      name: Styl koszulki do golfa
      description: Opisuje konstrukcyjny lub funkcjonalny styl/projekt tee golfowego,
        który wpływa na wysokość piłki, trwałość lub redukcję rotacji.
    golf_training_focus:
      name: Cel treningu golfowego
      description: Klasyfikuje główną umiejętność lub aspekt, który produkt ma poprawiać.
    golf_training_objective:
      name: Cel treningowy w golfie
      description: Określa główną umiejętność lub główny aspekt związane z golfem,
        które sprzęt pomaga rozwijać.
    gong_profile_type:
      name: Typ profilu gongu
      description: Opisuje fizyczny profil gongu operowego, np. płaski lub z podniesionym
        środkiem, który silnie wpływa na brzmienie i styl gry.
    grading_scale:
      name: Skala klasyfikacji
      description: Skala klasyfikacji używana na certyfikowanej monecie bulionowej,
        np. Sheldon 1–70.
    grading_service:
      name: Usługa klasyfikacji
      description: Zewnętrzna usługa klasyfikacji/certyfikacji monety lub banknotu,
        np. PCGS, NGC.
    graduation_increment:
      name: Podziałka
      description: Określa najmniejszy nadrukowany/grawerowany podział na skali miarki
        krawieckiej, czyli rozdzielczość oznaczeń.
    grain_processing_method:
      name: Metoda przetwarzania zboża
      description: Określa podstawową metodę przetwarzania zastosowaną do ziarna,
        np. parboiled, płatkowane, kiełkowane, która wpływa na czas gotowania, teksturę
        i wartości odżywcze.
    grand_piano_soundboard_material:
      name: Materiał płyty rezonansowej fortepianu
      description: Podstawowy materiał użyty na płytę rezonansową pianina, wpływający
        na brzmienie i trwałość.
    grappling_dummy_pose:
      name: Poza manekina zapaśniczego
      description: Opisuje domyślną pozycję/postawę ciała manekina, określającą, jakie
        ćwiczenia i techniki obsługuje.
    grease_application:
      name: Zastosowanie smaru
      description: Określa podstawowy komponent pojazdu lub zastosowanie, do którego
        przeznaczony jest smar.
    grease_consistency_grade_nlgi:
      name: Klasa konsystencji smaru (NLGI)
      description: Określa numer konsystencji NLGI wskazujący twardość smaru, np.
        NLGI 2 jest powszechny w smarach uniwersalnych.
    grease_thickener_type:
      name: Typ zagęszczacza smaru
      description: Określa system zagęszczacza/mydła użyty w formule smaru.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Typ zaworu ustnika dud Great Highland
      description: Określa system zaworu zwrotnego używany w ustniku.
    great_highland_bagpipes_drone_configuration:
      name: Konfiguracja burdonów dud Great Highland
      description: Określa typy burdonów dołączonych do zestawu.
    great_highland_bagpipes_mounting_material:
      name: Materiał ozdobnych elementów dud Great Highland
      description: Określa materiał ozdobnych elementów dud, np. nowe srebro, imitacja
        kości słoniowej.
    greens_maturity_stage:
      name: Etap dojrzałości warzyw liściowych
      description: Wskazuje etap rozwoju warzyw liściowych w momencie zbioru.
    greens_preparation_state:
      name: Stan przygotowania warzyw liściowych
      description: Opisuje sposób przetworzenia lub pakowania warzyw liściowych, np.
        wstępnie umyte, posiekane, gotowe do spożycia.
    grenade_effect_type:
      name: Typ efektu granatu
      description: Wskazuje główny efekt funkcjonalny wytwarzany przez granat paintballowy
        po aktywacji, np. dym, farba, hukowo-błyskowy.
    grid_unit:
      name: Jednostka siatki
      description: Podstawowy system miar nadrukowany na macie, jeśli występuje siatka/skala.
    grille_emblem_provision:
      name: Miejsce na emblemat w grillu
      description: Określa, czy grill obsługuje fabryczny emblemat/znaczek i w jaki
        sposób.
    grille_mounting_method:
      name: Metoda mocowania kratki
      description: Określa sposób montażu grilla w pojeździe, np. bezpośredni zamiennik
        albo wkładka/nakładka; przykręcany albo na klips/zatrzask; wymagane wiercenie
        albo bez wiercenia.
    grille_style:
      name: Styl kratki
      description: Określa wizualny/projektowy styl grilla pojazdu.
    grip_chalk_form:
      name: Forma kredy do chwytu
      description: Określa fizyczną formę kredy dołączonej do woreczka lub używanej
        z nim.
    grip_coverage:
      name: Pokrycie antypoślizgowe
      description: Określa obecność i położenie silikonowych lub gumowanych elementów
        antypoślizgowych na skarpecie.
    grip_design:
      name: Konstrukcja uchwytu
      description: Określa konfigurację uchwytów lub otworów talerza, ułatwiającą
        przenoszenie i zwiększającą wszechstronność ćwiczeń.
    grip_enhancer_effect:
      name: Efekt środka poprawiającego chwyt
      description: Opisuje podstawową cechę wydajności zapewnianą przez produkt, np.
        wchłanianie wilgoci lub lepkie wykończenie żywiczne.
    grip_enhancer_form:
      name: Forma środka poprawiającego chwyt
      description: Określa fizyczną formę lub format środka poprawiającego chwyt,
        aby sportowcy mogli wybrać odpowiednią metodę aplikacji.
    grip_features:
      name: Funkcje chwytu
      description: Wskazuje wbudowane cechy chwytu/uchwytu mające poprawić trzymanie,
        komfort lub kontrolę podczas gry.
    grip_material:
      name: Materiał chwytu
      description: Określa materiał użyty na powierzchnię chwytną spodni.
    grip_shape:
      name: Kształt chwytu
      description: Opisuje kształt przekroju lub styl chwytu, szczególnie istotny
        dla gripów do puttera.
    grip_surface_type:
      name: Typ powierzchni chwytu
      description: Opisuje wzór bieżnika/powierzchni trakcyjnej pedału, który wpływa
        na chwyt i odczucie.
    grip_tackiness_level:
      name: Poziom lepkości chwytu
      description: Określa, jak lepka lub klejąca jest powierzchnia chwytu, pomagając
        graczom wybrać między suchym odczuciem a bardzo lepką kontrolą.
    grip_tape_form:
      name: Forma grip tape’u
      description: Wskazuje formę dostawy taśmy gripowej, np. arkusz, rolka, zestaw
        natryskowy.
    grip_wax_form:
      name: Forma wosku do chwytu
      description: Klasyfikuje fizyczną formę, w jakiej sprzedawany jest wosk do chwytu.
    gripper_coverage:
      name: Zakres pokrycia grippera
      description: Określa styl elementu antypoślizgowego na bucie nieślizgającym
        się, wskazując pokrycie powierzchni i możliwość zdejmowania.
    grommet_application_material:
      name: Materiał zastosowania przelotek
      description: Podstawowe materiały, w których przelotki są przeznaczone do montażu,
        np. tkanina, skóra, winyl, plandeka/płótno.
    grommet_duty_rating:
      name: Klasa wytrzymałości przelotki
      description: Wskazuje zamierzoną klasę wytrzymałości/użytkowania przelotki.
    grommet_style:
      name: Styl przelotki
      description: Styl konstrukcji zestawu przelotek, czyli sposób montażu/użycia.
    grooming_glove_texture_type:
      name: Typ tekstury rękawicy pielęgnacyjnej
      description: Określa podstawową teksturę powierzchni używaną do pielęgnacji,
        wskazującą zamierzone zastosowanie, takie jak szorowanie, polerowanie lub
        mycie.
    groove_orientation:
      name: Orientacja rowków
      description: Opisuje kierunek/układ rowków lub wypukłości na instrumencie.
    groove_sampler_onboard_effects:
      name: Efekty pokładowe groove samplera
      description: Wskazuje kategorie wbudowanego przetwarzania efektów dostępnego
        w groove samplerze (insert/master), takie jak pogłos, delay, kompresja, distortion,
        korektor, filtrowanie.
    groove_sampler_storage_expansion_type:
      name: Typ rozszerzenia pamięci groove samplera
      description: Określa wymienne/rozszerzalne opcje pamięci obsługiwane przez groove
        sampler.
    ground_attachment_method:
      name: Metoda mocowania do podłoża
      description: Opisuje sposób mocowania łuku podań do nawierzchni gry, wpływający
        na stabilność i kompatybilność z nawierzchnią.
    groupset_components_included:
      name: Elementy grupy osprzętu w zestawie
      description: Wymienia konkretne komponenty napędu dołączone do grupy osprzętu,
        aby klienci rozumieli zawartość pakietu.
    gt_racing_class:
      name: Klasa wyścigowa GT
      description: Określa kategorię/klasę GT, do której samochód jest zbudowany lub
        homologowany.
    guard_construction_type:
      name: Typ konstrukcji osłony
      description: Wskazuje, czy ochraniacz jest twardą skorupą, miękkim wkładem ochronnym
        czy konstrukcją rękawa/paska.
    guard_size_measurement_basis:
      name: Podstawa pomiaru rozmiaru ochraniacza
      description: Wskazuje, na jakim pomiarze opiera się rozmiar, np. obwód łokcia,
        nadgarstka, przedramienia.
    guard_style:
      name: Styl ochraniacza
      description: Klasyfikuje konstrukcję lub typ ochraniacza ostrza łyżwy, aby pomóc
        kupującym szybko odróżnić twarde ochraniacze do chodzenia, miękkie osłony,
        ochraniacze sprężynowe i inne konstrukcje.
    guava_flesh_color:
      name: Kolor miąższu guawy
      description: Wskazuje wewnętrzny kolor miąższu owocu guawy.
    guava_variety:
      name: Odmiana gujawy
      description: Określa konkretny kultywar lub odmianę handlową sprzedawanej guawy,
        np. guawa jabłkowa, Mexican cream, tajska, różowa, bezpestkowa, biała.
    guide_material:
      name: Materiał prowadnicy
      description: Materiał użyty na przelotki wędki lub ich wkładki.
    guide_type:
      name: Typ przelotki
      description: Określa styl przelotek zamontowanych na wędce, np. jednostopkowe,
        rolkowe lub snake.
    guideline_markings:
      name: Oznaczenia pomocnicze
      description: Typ wizualnych oznaczeń wyrównujących nadrukowanych lub wbudowanych
        w powierzchnię maty do narzucania, pomagających w ćwiczeniach narzucania.
    guiro_scraper_material:
      name: Materiał skrobaka do guiro
      description: Materiał dołączonego lub zalecanego skrobaka/pałeczki używanego
        z guiro.
    guiro_surface_style:
      name: Styl powierzchni guiro
      description: Opisuje wzór/geometrię powierzchni gry, po której pociera się w
        celu wydobycia dźwięku.
    guitar_body_finish_type:
      name: Typ wykończenia korpusu gitary
      description: Określa wykończenie zastosowane na korpusie gitary.
    guitar_bridge_system_type:
      name: Typ systemu mostka gitary
      description: Rodzina konstrukcji mostka/strunociągu do celów kompatybilności
        i przeglądania.
    guitar_case_style:
      name: Styl futerału gitarowego
      description: Określa ogólny styl ochrony/konstrukcji futerału gitarowego lub
        pokrowca.
    guitar_humidifier_placement:
      name: Umiejscowienie nawilżacza gitarowego
      description: Określa miejsce, w którym nawilżacz ma być używany/umieszczony
        względem instrumentu lub otoczenia.
    guitar_pedal_i_o_configuration:
      name: Konfiguracja wejść/wyjść pedału gitarowego
      description: Wskazuje, czy pedał obsługuje monofoniczne czy stereofoniczne prowadzenie
        wejścia/wyjścia.
    guitar_pedal_output_connector_type:
      name: Typ złącza wyjściowego pedału gitarowego
      description: Określa typ złącza wyjścia audio używany przez pedał.
    guitar_slide_finish:
      name: Wykończenie slide’u gitarowego
      description: Wykończenie powierzchni slide’u, które wpływa na odczucie gry i
        tarcie o struny.
    guitar_slide_style:
      name: Styl slidera do gitary
      description: Określa formę slide’u gitarowego lub tone bara oraz sposób jego
        noszenia/używania.
    guitar_stand_type:
      name: Typ stojaka gitarowego
      description: Określa podstawową formę stojaka gitarowego, czyli sposób podpierania/przechowywania
        gitary.
    guitar_strap_attachment_type:
      name: Typ mocowania paska gitarowego
      description: Określa sposób mocowania paska do gitary lub zaczepów paska, w
        tym czy używa tradycyjnych końcówek czy systemów szybkiego wypinania.
    guitar_strap_end_material:
      name: Materiał końcówek paska gitarowego
      description: Materiał użyty na końcówkach/języczkach paska, czyli częściach
        mocowanych do zaczepów paska lub systemów strap-lock.
    guitar_strap_features:
      name: Cechy paska gitarowego
      description: Istotne cechy funkcjonalne paska gitarowego wykraczające poza podstawowy
        rozmiar/materiał; można wybrać wiele wartości.
    guitar_string_coating:
      name: Powłoka strun gitarowych
      description: Wskazuje, czy struny mają powłokę ochronną, a jeśli tak — styl
        powłoki.
    guitar_string_gauge_type:
      name: Typ grubości strun gitarowych
      description: Marketingowa kategoria grubości zestawu strun do gitary akustycznej,
        np. extra light, light, medium. Często przybliżana na podstawie grubości struny
        wysokiego E; dokładne zakresy grubości mogą różnić się w zależności od producenta.
    guitar_string_set_gauge_category:
      name: Kategoria grubości zestawu strun gitarowych
      description: Typowe marketingowe rodziny grubości zestawu strun gitarowych,
        zwykle określane na podstawie struny wysokiego E / 1. struny.
    guitar_string_winding_type:
      name: Typ owijki strun gitarowych
      description: Określa styl zewnętrznej owijki strun owijanych w zestawie.
    guitar_tuning_peg_button_shape:
      name: Kształt guzika klucza gitarowego
      description: Kształt/styl guzika klucza stroikowego.
    guitar_tuning_peg_configuration:
      name: Konfiguracja kluczy gitarowych
      description: Układ zestawu kluczy na główce.
    guitar_tuning_peg_mounting_style:
      name: Styl montażu klucza stroikowego gitary
      description: Sposób mocowania klucza stroikowego do główki, typ tulei i metoda
        zapobiegania obracaniu.
    guitar_tuning_peg_shaft_type:
      name: Typ trzpienia klucza gitarowego
      description: Wskazuje, czy trzpień struny jest pełny czy rozcięty oraz jak mocowana
        jest struna.
    guitar_tuning_peg_style:
      name: Styl klucza stroikowego gitary
      description: Fizyczny styl klucza stroikowego/kołka i format mocowania używany
        na główce instrumentu, np. przekładnia zamknięta lub otwarta, blokowany, trzpień
        rozcięty.
    gum_condition:
      name: Stan gumy
      description: Stan/status gumy znaczka na odwrocie, np. nigdy niepodlepiony,
        podlepiony, bez gumy.
    gun_action_type:
      name: Typ działania broni
      description: Typ mechanicznego działania używany do ładowania/strzelania, np.
        zamek czterotaktowy, dźwigniowy.
    gun_operational_status:
      name: Status operacyjny broni
      description: Wskazuje, czy broń kolekcjonerska jest dezaktywowana/niezdolna
        do strzału i jak jest prezentowana.
    gun_type:
      name: Typ broni
      description: Określa ogólną formę broni palnej dla broni antycznej.
    gusset_material:
      name: Materiał blachy węzłowej
      description: Określa materiał użyty w wyściółce kroku/klina, który wpływa na
        oddychalność, higienę i komfort.
    gymnastics_discipline:
      name: Dyscyplina gimnastyczna
      description: Określa dziedzinę gimnastyki, do której przeznaczony jest produkt,
        np. sportowa, artystyczna, akrobatyczna.
    hair_extension_texture:
      name: Tekstura doczepianych włosów
      description: Opisuje skręt, falę lub wzór tekstury pasm doczepianych włosów.
    hair_net_style:
      name: Styl siatki na włosy
      description: Określa styl konstrukcji lub projekt siatki na włosy, np. bouffant,
        snood, osłona koka.
    hair_quality_grade:
      name: Klasa jakości włosia
      description: Oznacza branżowe oznaczenia jakości/pochodzenia włosów.
    halter_style:
      name: Styl kantara
      description: Określa funkcjonalny lub projektowy styl kantara, np. sznurkowy,
        bezpieczny, pokazowy, pomagając kupującym wybrać kantar odpowiedni do zamierzonego
        użycia.
    hammock_style:
      name: Styl hamaka
      description: Opisuje styl konstrukcji lub budowę hamaka.
    hand_and_foot_coverage:
      name: Zakrycie dłoni i stóp
      description: Opisuje zintegrowane lub odpinane rękawiczki i buciki zakrywające
        dłonie i/lub stopy.
    hand_cymbal_set_configuration:
      name: Konfiguracja zestawu ręcznych talerzy perkusyjnych
      description: Wskazuje, czy produkt jest sprzedawany jako dobrana para, pojedynczy
        talerz czy większy zestaw.
    hand_drum_head_material:
      name: Materiał membrany bębna ręcznego
      description: Materiał membrany bębna używanej w bębnie kielichowym.
    hand_exerciser_style:
      name: Styl przyrządu do ćwiczenia dłoni
      description: Klasyfikuje ogólny styl lub mechanizm przyrządu do ćwiczenia dłoni.
    hand_guard_backbone_material:
      name: Materiał szkieletu osłony dłoni
      description: Materiał konstrukcyjnego grzbietu/szkieletu, jeśli występuje, który
        określa wytrzymałość i ochronę.
    hand_guard_coverage_style:
      name: Styl pokrycia osłony dłoni
      description: Opisuje pokrycie/profil osłony dłoni, wpływający na ochronę przed
        wiatrem/uderzeniami.
    hand_guard_mounting_type:
      name: Typ mocowania osłony dłoni
      description: Określa sposób mocowania osłon dłoni do motocykla, np. koniec kierownicy
        z wewnętrznym zaciskiem albo tylko zacisk.
    hand_guard_set_configuration:
      name: Konfiguracja zestawu osłon dłoni
      description: Wskazuje, czy produkt jest sprzedawany jako para lewa/prawa czy
        pojedyncza strona.
    hand_guard_style:
      name: Styl osłony dłoni
      description: Opisuje konstrukcję lub styl osłony, np. zamknięta, otwarta, pełna,
        lite, standardowa.
    hand_guard_weather_protection:
      name: Ochrona pogodowa osłony dłoni
      description: Wskazuje zamierzoną ochronę przed warunkami pogodowymi zapewnianą
        przez osłony dłoni.
    hand_paddle_strap_type:
      name: Typ paska łapki pływackiej
      description: Określa typ paska lub jego brak, używany do mocowania łapki pływackiej
        do dłoni użytkownika.
    hand_percussion_mount_attachment_mechanism:
      name: Mechanizm mocowania uchwytu do ręcznych instrumentów perkusyjnych
      description: Określa sposób mocowania uchwytu do statywu, racka lub innego osprzętu,
        np. zaciskowo lub na pręt.
    hand_percussion_mounting_handling:
      name: Mocowanie/trzymanie ręcznego instrumentu perkusyjnego
      description: Określa, czy instrument jest trzymany w dłoni, noszony, montowany
        czy ustawiany na stole/podłodze podczas typowego użycia.
    hand_percussion_pitch_type:
      name: Typ wysokości dźwięku ręcznego instrumentu perkusyjnego
      description: Wskazuje, czy instrument wydaje dźwięki o określonej wysokości
        (strojalne/nuty), czy o nieokreślonej wysokości.
    hand_percussion_playing_method:
      name: Sposób gry na ręcznym instrumencie perkusyjnym
      description: Sposób typowej gry na instrumencie w celu wydobycia dźwięku, np.
        potrząsanie lub skrobanie.
    hand_percussion_set_configuration:
      name: Konfiguracja zestawu ręcznych instrumentów perkusyjnych
      description: Określa, czy produkt jest pojedynczym instrumentem, dobraną parą
        czy zestawem wieloelementowym.
    hand_percussion_size_class:
      name: Klasa rozmiaru ręcznego instrumentu perkusyjnego
      description: Ogólna kategoria rozmiaru instrumentu, gdy nie podano dokładnego
        wymiaru lub w celu łatwego filtrowania.
    hand_sewing_needle_point_type:
      name: Typ czubka igły do szycia ręcznego
      description: Kształt/styl czubka igły do szycia ręcznego używany do przebijania
        różnych materiałów, np. tkanin, dzianin, skóry, lub włóczek.
    hand_support_level:
      name: Poziom wsparcia dłoni
      description: Określa stopień wsparcia lub kompresji zapewnianej przez rękawicę,
        owijkę lub pasek.
    hand_support_size:
      name: Rozmiar wsparcia dłoni
      description: Rozmiar rękawicy, paska lub owijki deklarowany przez producenta,
        XS–XXL lub uniwersalny.
    handball_ball_type:
      name: Typ piłki ręcznej
      description: Wskazuje zamierzoną kategorię użycia piłki ręcznej, np. meczowa,
        treningowa lub plażowa.
    handball_playing_surface:
      name: Nawierzchnia gry piłki ręcznej
      description: Wskazuje nawierzchnie gry, do których piłka ręczna jest zoptymalizowana.
    handball_target_type:
      name: Typ celu do piłki ręcznej
      description: Określa styl lub konstrukcję celu strzeleckiego przeznaczonego
        do treningu zespołowej piłki ręcznej.
    handbrake_actuation_type:
      name: Typ uruchamiania hamulca ręcznego
      description: Określa sposób uruchamiania hamulca postojowego.
    handbrake_orientation:
      name: Orientacja hamulca ręcznego
      description: Określa, czy hamulec ręczny jest przeznaczony do pojazdów z kierownicą
        po lewej stronie, po prawej stronie, czy jest uniwersalny.
    handgun_grip_material:
      name: Materiał chwytu broni krótkiej
      description: Podstawowy materiał chwytu/paneli broni krótkiej.
    handle_configuration:
      name: Konfiguracja uchwytu
      description: Opisuje styl konstrukcji uchwytu wakeboardowego, np. pojedynczy,
        podwójny, Deep-V, T-wrap, aby kupujący mogli dopasować go do umiejętności,
        trików lub typu deski.
    handle_ergonomics:
      name: Ergonomia uchwytu
      description: Opisuje ergonomiczne cechy uchwytu mające poprawić komfort i kontrolę.
    handle_grip_material:
      name: Materiał chwytu uchwytu
      description: Określa materiał użyty na powierzchni chwytnej uchwytu, który wpływa
        na komfort i przyczepność, szczególnie gdy jest mokry.
    handle_grip_type:
      name: Typ chwytu uchwytu
      description: Określa pokrycie/materiał chwytu uchwytu lub styl powierzchni mający
        poprawić komfort i kontrolę.
    handle_shape:
      name: Kształt uchwytu
      description: Kształt przekroju lub profil uchwytu.
    handlebar_design:
      name: Konstrukcja uchwytów
      description: Określa typ uchwytów w stepperze, np. brak, stałe, z regulacją
        wysokości, składane lub uchwyty taśm oporowych.
    handlebar_type:
      name: Typ kierownicy
      description: Określa styl kierownicy zamontowanej w rowerze, wpływający na pozycję
        jazdy, kontrolę i komfort.
    handslide_bore_type:
      name: Typ menzury suwaka ręcznego
      description: Określa, czy puzon basowy ma suwak o pojedynczej czy podwójnej
        menzurze.
    handwear_cuff_style:
      name: Styl mankietu rękawic
      description: Opisuje konstrukcję mankietu lub nadgarstka rękawic albo mitenek,
        wpływającą na zakrycie i dopasowanie.
    handwear_insulation_material:
      name: Materiał izolacji rękawic
      description: Określa materiał izolacyjny lub podszewkowy użyty wewnątrz rękawic
        albo mitenek.
    handwear_size:
      name: Rozmiar rękawic
      description: Określa rozmiar rękawic lub innej odzieży na dłonie w celu zapewnienia
        właściwego dopasowania.
    hang_glider_design:
      name: Konstrukcja lotni
      description: Klasyfikuje styl konstrukcji lotni, np. skrzydło elastyczne, sztywne,
        z napędem.
    hanger_thread_size:
      name: Rozmiar gwintu hangera
      description: Wskazuje rozmiar/standard gwintu śruby używany do mocowania hangera
        do podpórek lub sygnalizatorów brań, zapewniając kompatybilność.
    hanging_suspension_method:
      name: Metoda zawieszenia
      description: Definiuje podstawowy osprzęt lub system używany do zawieszenia
        huśtawki, np. lina, łańcuch, rama stojąca.
    hardtop_finish_type:
      name: Typ wykończenia hardtopu
      description: Określa stan wykończenia zewnętrznego hardtopu, np. zagruntowany
        lub lakierowany, wpływający na gotowość do montażu i wygląd.
    hardtop_shell_material:
      name: Materiał skorupy hardtopu
      description: Określa podstawowy materiał sztywnej skorupy hardtopu pojazdu,
        nie materiału pokrowca, np. włókno szklane lub aluminium.
    hardtop_window_configuration:
      name: Konfiguracja szyb hardtopu
      description: Opisuje, jakie szyby są dołączone do hardtopu i ich konfigurację.
    harmonica_comb_material:
      name: Materiał korpusu harmonijki
      description: Materiał użyty na korpus harmonijki, czyli korpus komór powietrznych.
    harmonica_cover_plate_finish:
      name: Wykończenie pokryw harmonijki
      description: Określa wykończenie lub powłokę pokryw harmonijki.
    harmonica_cover_plate_material:
      name: Materiał płytek osłonowych harmonijki
      description: Materiał użyty na zewnętrzne pokrywy.
    harmonica_finish:
      name: Wykończenie harmonijki
      description: Wykończenie powierzchni pokryw/korpusu harmonijki.
    harmonica_included_accessories:
      name: Akcesoria dołączone do harmonijki ustnej
      description: Wskazuje, jakie akcesoria są dołączone do harmonijki.
    harmonica_note_range:
      name: Zakres dźwięków harmonijki
      description: Klasyfikacja zakresu instrumentu używana w kontekstach orkiestrowych,
        np. basowy, barytonowy, tenorowy.
    harmonica_reed_plate_material:
      name: Materiał płytki stroikowej harmonijki
      description: Materiał użyty na płytki stroikowe, np. mosiądz, stal nierdzewna,
        aluminium.
    harmonica_system_type:
      name: System/typ harmonijki
      description: Określa orkiestrowy system lub formę harmonijki, np. akordowa,
        basowa, barytonowa, polifoniczna.
    harmonica_tuning_system:
      name: System strojenia harmonijki
      description: Określa układ/system strojenia używany przez harmonijkę, np. Richter,
        solo, strojenie orkiestrowe.
    harness_shell_type:
      name: Typ skorupy uprzęży
      description: Opisuje sztywność konstrukcji skorupy uprzęży, np. softshell, hardshell,
        hybrydowa.
    harness_style:
      name: Styl uprzęży
      description: Definiuje styl/konstrukcję uprzęży, np. biodrowa, siedzeniowa,
        piersiowa/kamizelkowa, wing belt, boardshort lub hybrydowa.
    harness_type:
      name: Typ uprzęży
      description: Klasyfikuje styl konstrukcji uprzęży wspinaczkowej, np. biodrowa,
        pełna lub piersiowa.
    harp_action_type:
      name: Typ mechanizmu harfy
      description: Podstawowy mechanizm używany do zmiany wysokości dźwięku/półtonów
        w harfie.
    harp_finish:
      name: Wykończenie harfy
      description: Wykończenie powierzchni korpusu harfy, np. naturalne, bejcowane,
        malowane, lakierowane.
    harp_included_accessories:
      name: Akcesoria dołączone do harfy
      description: Wymienia akcesoria dołączone przy zakupie harfy pedałowej.
    harvest_method:
      name: Metoda połowu/zbioru
      description: Wskazuje, czy owoce morza pochodzą z połowu dzikiego, hodowli czy
        innej metody pozyskania.
    harvest_stage:
      name: Etap zbioru
      description: Określa etap wzrostu, na którym zebrano rukolę, np. mikroliście,
        młode liście lub dojrzały pęczek.
    hat_style:
      name: Styl czapki
      description: Konstrukcja/styl czapeczki imprezowej, np. stożkowa, korona, cylinder,
        daszek, odzwierciedlająca podstawowy wygląd produktu.
    hazard_signal_mode:
      name: Tryb sygnału ostrzegawczego
      description: Wybieralne wzory/tryby świecenia drogowych flar LED/elektronicznych.
    head_configuration:
      name: Konfiguracja głowicy
      description: Określa, czy głowica czekana ma łopatkę, młotek, oba elementy czy
        żaden z nich, co bezpośrednio wpływa na funkcjonalność w lodzie i terenie
        mikstowym.
    head_material:
      name: Materiał membrany
      description: Materiał membrany do gry dostarczanej z quinto.
    head_movement_type:
      name: Typ ruchu głowicy
      description: Zakres ruchu kierunkowego głowicy bipodu lub podpórki, np. obrót
        w poziomie, pochylenie, przechył.
    head_side:
      name: Strona membrany
      description: Określa, czy membrana bębna jest przeznaczona na stronę uderzeniową,
        rezonansową/przednią czy dowolną.
    head_weight_style:
      name: Styl obciążenia główki
      description: Określa konfigurację obciążenia przy główce muchy, która wpływa
        na szybkość tonięcia i prezentację.
    headband_embellishment:
      name: Ozdoba opaski na głowę
      description: Określa elementy dekoracyjne przymocowane do opaski, np. kokardy,
        perły, kryształy, zwierzęce uszy.
    headboard_style:
      name: Styl zagłówka łóżka
      description: Opisuje styl projektu lub konstrukcji zagłówka dostarczanego z
        łóżkiem.
    headgear_strap_configuration:
      name: Konfiguracja pasków ochraniacza głowy
      description: Wskazuje liczbę pasków używanych do mocowania ochraniacza głowy
        do zapasów.
    headjoint_crown_style:
      name: Styl korony główki fletu
      description: Określa styl lub wzór korony główki fletu (zaślepki końcowej),
        który może wpływać na estetykę oraz wagę/równowagę.
    headjoint_pitch_standard:
      name: Standard wysokości stroju główki fletu
      description: Wskazuje standard strojenia konstrukcyjnego główki, np. A=440 lub
        A=442.
    headliner_product_form:
      name: Forma produktu podsufitki
      description: Określa, czy produkt jest kompletnym formowanym zespołem podsufitki,
        tkaniną zamienną czy elementem naprawczym/wykończeniowym.
    headrest_mount_attachment_method:
      name: Metoda mocowania uchwytu do zagłówka
      description: Określa sposób mocowania uchwytu do zagłówka/słupków siedzenia.
    headrest_provision:
      name: Obecność zagłówków
      description: Wskazuje, czy zagłówki są dołączone i/lub czy występują punkty
        montażowe zagłówków.
    headset_standard:
      name: Standard sterów
      description: Typ interfejsu główki ramy/stery używany przez ramę.
    headstall_style:
      name: Styl ogłowia
      description: Klasyfikuje konstrukcję lub konfigurację uszu/naczółka ogłowia.
    headwear_intended_use:
      name: Przeznaczenie nakrycia głowy
      description: Wskazuje główny cel lub kontekst noszenia turbanu, np. utrata włosów
        po chemioterapii, pływanie, cele religijne.
    hearing_enhancer_style:
      name: Styl wzmacniacza słuchu
      description: Opisuje fizyczną formę urządzenia, aby użytkownicy mogli wybrać
        między modelami nausznymi, dousznymi, zakładanymi za głowę i innymi konstrukcjami.
    heart_rate_monitoring_method:
      name: Metoda monitorowania tętna
      description: Określa, w jaki sposób urządzenie rejestruje dane tętna podczas
        treningu.
    heart_rate_sensing_technology:
      name: Technologia pomiaru tętna
      description: Określa fizjologiczną metodę pomiaru używaną przez monitor do wykrywania
        tętna, np. elektryczne EKG lub optyczne PPG.
    heart_rate_sensor_placement:
      name: Umiejscowienie czujnika tętna
      description: Wskazuje, gdzie czujnik jest noszony lub umieszczony, na ciele
        lub rowerze, co wpływa na komfort i dokładność pomiaru.
    heat_retention_technology:
      name: Technologia zatrzymywania ciepła
      description: Opisuje technologię, powłokę lub materiał zwiększające pocenie
        albo aktywność termiczną w pasach modelujących do treningu, np. efekt sauny
        z neoprenu.
    heated_glass_feature:
      name: Funkcja podgrzewania szyby
      description: Wskazuje, czy szyba zawiera zintegrowane elementy elektryczne,
        takie jak siatka odmrażania tylnej szyby i/lub antena wbudowana w szybę.
    heater_control_actuation_method:
      name: Metoda uruchamiania sterowania ogrzewaniem
      description: Określa, w jaki sposób sterowanie ogrzewaniem/HVAC uruchamia skrzynkę
        HVAC pojazdu, np. linkowo, podciśnieniowo lub sygnałem elektronicznym.
    heater_control_electrical_connector_type:
      name: Typ złącza elektrycznego sterowania ogrzewaniem
      description: Określa styl/interfejs złącza elektrycznego używany przez zespół
        sterowania ogrzewaniem, np. pigtail lub typ wtyczki.
    heating_technology:
      name: Technologia ogrzewania
      description: Określa podstawowy mechanizm grzewczy używany przez waporyzator
        do przekształcania materiału w parę.
    heel_shape:
      name: Kształt obcasa
      description: Określa geometryczny styl lub sylwetkę samego obcasa, pomagając
        kupującym filtrować według wyglądu konstrukcji i preferencji stabilności,
        np. szpilka lub klocek.
    helicopter_mission_type:
      name: Typ misji śmigłowca
      description: Główne zamierzone zastosowanie/rola śmigłowca.
    helicopter_rotor_configuration:
      name: Konfiguracja wirników śmigłowca
      description: Określa układ systemu wirników śmigłowca (układ wirnika głównego/ogonowego),
        np. pojedynczy główny + ogonowy, współosiowy, tandemowy lub zazębiający się.
    helmet_accessory_type:
      name: Typ akcesorium do kasku
      description: Określa konkretny rodzaj części lub akcesorium do kasku rowerowego,
        aby kupujący mogli od razu znaleźć właściwy produkt.
    helmet_audio_connector_type:
      name: Typ złącza audio kasku
      description: Określa typ złącza audio lotniczego używanego przez przewód komunikacyjny
        kasku, jeśli występuje.
    helmet_communication_system_readiness:
      name: Gotowość kasku do systemu komunikacji
      description: Wskazuje, czy kask jest przystosowany do montażu systemu komunikacji
        interkom/Bluetooth.
    helmet_construction_type:
      name: Typ konstrukcji kasku
      description: Opisuje styl konstrukcji skorupy i wyściółki kasku, np. piankowy,
        hardshell, hybrydowy.
    helmet_fit_head_shape:
      name: Dopasowanie kasku (kształt głowy)
      description: Wewnętrzny profil dopasowania przeznaczony do różnych kształtów
        głowy.
    helmet_interior_liner_type:
      name: Typ wewnętrznej wyściółki kasku
      description: Typ wyściółki komfortowej oraz informacja, czy jest wyjmowana/możliwa
        do prania.
    helmet_liner_material:
      name: Materiał wyściółki kasku
      description: Określa materiał wewnętrznej wyściółki lub wkładki, który zapewnia
        komfort i pochłanianie uderzeń.
    helmet_retention_closure_type:
      name: Typ zapięcia systemu retencyjnego kasku
      description: Określa mechanizm zapięcia/retencji paska pod brodę kasku, np.
        podwójne zapięcie typu D, mikrometryczna zapadka.
    helmet_safety_certification:
      name: Certyfikacja bezpieczeństwa kasku
      description: Wymienia normy bezpieczeństwa lub certyfikaty, z którymi zgodny
        jest kask.
    helmet_safety_certification_standard:
      name: Norma certyfikacji bezpieczeństwa kasku
      description: Normy bezpieczeństwa/homologacji, które spełnia kask motocyklowy.
    helmet_shell_material:
      name: Materiał skorupy kasku
      description: Podstawowy materiał lub konstrukcja zewnętrznej skorupy kasku.
    helmet_size_system:
      name: System rozmiarów kasku
      description: Schemat rozmiarów używany do określania rozmiaru kasku.
    helmet_sun_visor_type:
      name: Typ blendy przeciwsłonecznej kasku
      description: Określa, czy kask ma wewnętrzną opuszczaną blendę przeciwsłoneczną,
        przyciemnianą zewnętrzną szybę, oba elementy czy żaden z nich.
    helmet_vehicle_fit:
      name: Dopasowanie kasku do pojazdu
      description: Typ pojazdu/użytkowania podczas jazdy, do którego przeznaczony
        jest kask.
    helmet_ventilation_adjustability:
      name: Regulacja wentylacji kasku
      description: Określa, w jaki sposób użytkownik może sterować wentylacją kasku.
    helmet_ventilation_configuration:
      name: Konfiguracja wentylacji kasku
      description: Opisuje układ wentylacji kasku i możliwość jej regulacji, np. wentylacja
        podbródka, wloty nad brwiami/wlotowe, zamykane otwory wentylacyjne.
    helmet_visor_peak_adjustability:
      name: Regulacja daszka/wizjera kasku
      description: Wskazuje, czy terenowy daszek/wizjer kasku jest regulowany i/lub
        zdejmowany.
    helmet_visor_shield_optical_features:
      name: Cechy optyczne wizjera/szyby kasku
      description: Cechy optyczne i kompatybilności głównej szyby/wizjera.
    helmet_visor_shield_type:
      name: Typ wizjera/szyby kasku
      description: Podstawowa konfiguracja szyby/wizjera twarzy dołączona do kasku.
    hem_style:
      name: Styl dołu nogawki
      description: Określa styl wykończenia otworu nogawki, np. czysty, podwinięty
        lub surowy, który silnie wpływa na wygląd odzieży.
    hemisphere_compatibility:
      name: Kompatybilność z półkulą
      description: Określa, dla której półkuli zaprojektowano mapę nieba, na podstawie
        widocznych gwiazdozbiorów.
    hemline_style:
      name: Styl linii dołu
      description: Definiuje krój lub projekt dolnej krawędzi sukienki.
    herbal_infusion_function:
      name: Funkcja naparu ziołowego
      description: Wskazuje główną korzyść wellness lub funkcjonalną, z którą napar
        jest reklamowany.
    hex_size:
      name: Rozmiar sześciokąta
      description: Rozmiar klucza sześciokątnego wymagany do montażu/demontażu świecy
        żarowej.
    hi_hat_pair_type:
      name: Typ pary hi-hat
      description: Wskazuje, czy oferta dotyczy dobranej pary góra/dół czy pojedynczego
        elementu talerza.
    hi_hat_sound_character:
      name: Charakter dźwięku talerza hi-hat
      description: Opisuje ogólny profil brzmieniowy, aby pomóc kupującym filtrować
        według pożądanego brzmienia.
    high_visibility_class:
      name: Klasa wysokiej widoczności
      description: Określa poziom klasyfikacji widoczności odzieży ANSI/ISEA 107.
    highback_style:
      name: Styl highbacku
      description: Opisuje styl/konstrukcję highbacku, który wpływa na charakterystykę
        jazdy.
    hitch_ball_diameter:
      name: Średnica kuli haka
      description: Średnica kuli haka holowniczego współpracującej ze sprzęgiem przyczepy,
        np. 1 7/8 cala, 2 cale, 2 5/16 cala, 50 mm.
    hitch_ball_mounting_style:
      name: Styl mocowania kuli haka
      description: Wskazuje, czy kula haka jest standardową kulą mocowaną nakrętką,
        stałym/wprasowanym typem do określonych głowic haka, czy zawiera zintegrowany
        osprzęt.
    hobby_horse_handle_type:
      name: Typ uchwytu konika na kiju
      description: Określa konstrukcję chwytu/uchwytu używanego do trzymania lub sterowania
        konikiem na kiju.
    hobby_horse_sound_features:
      name: Funkcje dźwiękowe konika na kiju
      description: Wskazuje, czy konik na kiju ma efekty dźwiękowe i jakiego rodzaju.
    hockey_goal_type:
      name: Typ bramki hokejowej
      description: Określa styl lub zamierzone zastosowanie bramki hokejowej, np.
        regulaminowa do hokeja na lodzie, uliczna, mini.
    hockey_size_category:
      name: Kategoria wielkości artykułu do hokeja
      description: 'Oznacza standardowy segment rozmiaru sprzętu, do którego pasuje
        część: Youth, Junior, Intermediate, Senior.'
    hockey_size_segment:
      name: Segment rozmiaru hokejowego
      description: Określa standardowy segment rozmiaru sprzętu hokejowego, który
        determinuje ogólne wymiary ochraniacza i dopasowanie.
    hold_surface_texture:
      name: Faktura powierzchni uchwytu
      description: Opisuje szorstkość lub dotykowe wykończenie powierzchni chwytu.
    home_decor_sewing_pattern_project_type:
      name: Typ projektu wykroju krawieckiego do dekoracji domu
      description: Określa typ elementu dekoracji domu, który powstaje z wykroju krawieckiego,
        np. poszewka na poduszkę, zasłona, bieżnik.
    homologation_rule_set:
      name: Homologacja / zestaw przepisów
      description: Określa organ sankcjonujący lub zestaw przepisów, z którym samochód
        jest zgodny, jeśli dotyczy.
    honey_form:
      name: Forma miodu
      description: Określa fizyczną formę lub sposób prezentacji produktu miodowego.
    honey_processing_method:
      name: Metoda przetwarzania miodu
      description: Wskazuje, jak miód został poddany obróbce lub przetworzony przed
        pakowaniem.
    honey_variety:
      name: Odmiana miodu
      description: Określa botaniczne lub kwiatowe źródło miodu — jednokwiatowe lub
        wielokwiatowe — które bezpośrednio wpływa na smak, kolor i cenę.
    hood_configuration:
      name: Konfiguracja kaptura
      description: Opisuje konstrukcję kaptura i funkcje regulacji.
    hood_design:
      name: Konstrukcja kaptura
      description: Określa obecność i styl kaptura będącego elementem odzieży.
    hood_style:
      name: Styl kaptura
      description: Wskazuje obecność i styl kaptura w odzieży.
    hood_type:
      name: Typ kaptura
      description: Wskazuje specjalne cechy konstrukcyjne części kapturowej odzieży.
    hook_and_eye_size_hook_number:
      name: Rozmiar haftki (numer haftki)
      description: Standardowy rozmiar/numer haftki, jeśli dotyczy, używany na opakowaniu
        do określenia ogólnego rozmiaru haczyka i oczka.
    hook_and_loop_fastener_duty_rating:
      name: Klasa wytrzymałości rzepu
      description: Wskazuje zamierzony poziom wytrzymałości/obciążenia rzepu.
    hook_and_loop_fastener_format:
      name: Format rzepu
      description: Określa fizyczną formę lub format opakowania produktu rzepowego,
        np. rolka/taśma, kropki, paski.
    hook_and_loop_fastener_side:
      name: Strona z zapięciem na rzep
      description: Określa, czy produkt zawiera tylko stronę haczykową, tylko stronę
        pętelkową, czy zestaw zawierający obie strony.
    hook_coating_finish:
      name: Powłoka/wykończenie haka
      description: Obróbka powierzchni lub powłoka zastosowana na haczyku w celu odporności
        na korozję, maskowania lub nadania koloru, np. czarny nikiel, jasna cyna.
    hook_configuration:
      name: Konfiguracja haczyków
      description: Opisuje obecność i styl haczyków dostarczanych z wabikiem.
    hook_eye_style:
      name: Styl oczka haczyka
      description: Określa kształt lub orientację oczka haczyka, co wpływa na sposób
        wiązania lub mocowania haczyka.
    hook_eye_type:
      name: Typ oczka haczyka
      description: Określa konstrukcję oczka haczyka, wpływającą na wybór węzła i
        zestawu.
    hook_loop_format:
      name: Format rzepu
      description: Określa fizyczną formę rzepu do przyszywania.
    hook_loop_side:
      name: Strona z rzepem
      description: Określa, czy produkt jest stroną haczykową, stroną pętelkową czy
        dopasowanym zestawem haczykowo-pętelkowym.
    hook_material:
      name: Materiał haka
      description: Określa materiał użyty konkretnie na hak/głowicę bosaka, co jest
        kluczowe dla wytrzymałości i odporności na korozję w słonej wodzie.
    hook_organizer_style:
      name: Styl organizera na haczyki
      description: Fizyczny styl lub forma organizera na haczyki, np. etui, rolka
        lub woreczek, używana do przeglądania i filtrowania według typu organizera.
    hook_point_configuration:
      name: Konfiguracja ostrza haczyka
      description: Wskazuje, czy haczyk ma dwa ostrza (podwójny), czy trzy ostrza
        (kotwiczka).
    hook_point_type:
      name: Typ ostrza haczyka
      description: Opisuje szlif lub kształt ostrza haczyka wędkarskiego, który wpływa
        na penetrację i zdolność trzymania.
    hook_shank_length:
      name: Długość trzonka haczyka
      description: Wskazuje względną klasyfikację długości trzonka haczyka, np. krótki,
        długi, do szybkiego porównania wizualnego i funkcjonalnego.
    hooks_eyes_attachment_method:
      name: Metoda mocowania haftek
      description: Sposób mocowania haftek do odzieży lub projektu.
    hop_up_type:
      name: Typ hop-up
      description: Definiuje system hop-up używany do nadawania kulkom BB rotacji
        wstecznej dla zasięgu i celności.
    horse_blanket_type:
      name: Typ derki dla konia
      description: Określa podstawowy styl lub zamierzone zastosowanie derki albo
        okrycia dla konia.
    horse_brush_type:
      name: Typ szczotki dla konia
      description: Klasyfikuje szczotkę według konkretnego stylu pielęgnacji lub zamierzonego
        zastosowania, umożliwiając klientom filtrowanie bez rozdrabniania hierarchii
        kategorii.
    horse_care_purpose:
      name: Cel pielęgnacji konia
      description: Podstawowy cel funkcjonalny produktu w pielęgnacji konia, obejmujący
        potrzeby zdrowotne, pielęgnacyjne i związane z zarządzaniem.
    horse_feed_stage:
      name: Etap żywienia konia
      description: Wskazuje etap życia konia lub stan fizjologiczny, do którego opracowano
        paszę.
    horse_groomer_type:
      name: Typ narzędzia pielęgnacyjnego dla konia
      description: Klasyfikuje styl narzędzia pielęgnacyjnego, aby kupujący mogli
        szybko znaleźć potrzebne narzędzie.
    horse_leg_protection_type:
      name: Typ ochrony nóg konia
      description: Klasyfikuje konkretny styl lub funkcję buta, owijki albo bandaża
        dla konia.
    horse_model_breed:
      name: Rasa modelu konia
      description: Określa rasę konia przedstawioną przez model w skali, jeśli dotyczy.
    hosiery_toe_style:
      name: Styl palców w wyrobach pończoszniczych
      description: Definiuje konstrukcję obszaru palców w wyrobach pończoszniczych,
        istotną dla trwałości i kompatybilności z obuwiem z odkrytymi palcami.
    hot_air_balloon_basket_type:
      name: Typ kosza balonu na ogrzane powietrze
      description: Określa podstawową konfigurację/styl kosza, np. standardowy sportowy,
        komercyjny o dużej pojemności, z przegrodami, dostępny/z drzwiami, używany
        do wsiadania i zamierzonej eksploatacji.
    hot_air_balloon_burner_type:
      name: Typ palnika balonu na ogrzane powietrze
      description: Typ/konfiguracja systemu palników zamontowanego w balonie.
    hot_air_balloon_envelope_material:
      name: Materiał powłoki balonu na ogrzane powietrze
      description: Podstawowa tkanina/materiał użyty na powłokę balonu.
    hotfix_application_tool:
      name: Narzędzie do aplikacji hotfix
      description: Zalecane narzędzie lub źródło ciepła używane do aplikacji cyrkonii
        hotfix.
    hub_axle_type:
      name: Typ osi piasty
      description: Określa interfejs/system mocowania osi, do którego zaprojektowana
        jest piasta, np. szybkozamykacz, oś przelotowa itp.
    hub_motor_type:
      name: Typ silnika w piaście
      description: Opisuje styl konstrukcji silnika w piaście, np. przekładniowy,
        bezpośredni, szczotkowy, bezszczotkowy, aby poinformować kupujących o momencie
        obrotowym, wadze i efektywności.
    hula_hoop_construction_type:
      name: Typ konstrukcji hula-hop
      description: Opisuje sposób konstrukcji/montażu obręczy.
    hula_hoop_features:
      name: Cechy hula-hop
      description: Wyróżnia istotne cechy funkcjonalne lub konstrukcyjne hula-hop.
    hull_design:
      name: Konstrukcja kadłuba
      description: Opisuje kształt kadłuba wpływający na osiągi i właściwości prowadzenia.
    hull_type:
      name: Typ kadłuba
      description: Opisuje formę kadłuba wpływającą na osiągi i stabilność.
    humidifier_refill_medium_type:
      name: Typ medium wkładu nawilżacza
      description: Określa medium zatrzymujące wilgoć/wkład używany przez nawilżacz
        w futerale, czyli element zwilżany lub wymieniany.
    humidifier_refill_method:
      name: Metoda uzupełniania nawilżacza
      description: Opisuje sposób ponownego nawilżania nawilżacza lub jego wymiany.
    humidifying_medium:
      name: Medium nawilżające
      description: Określa element/medium nawilżające używane przez produkt, czyli
        element zwilżany/aktywowany.
    hummus_base_ingredient:
      name: Składnik bazowy hummusu
      description: Określa podstawową roślinę strączkową lub warzywo użyte do produkcji
        hummusu.
    hunting_call_type:
      name: Typ wabika myśliwskiego
      description: Klasyfikuje podstawowy styl działania lub mechanizm wabika, np.
        ustny, elektroniczny, pudełkowy, aby myśliwi mogli szybko wybrać format najlepiej
        dopasowany do potrzeb i umiejętności.
    hunting_dog_collar_function:
      name: Funkcja obroży dla psa myśliwskiego
      description: Klasyfikuje podstawowy styl funkcjonalny lub przeznaczenie obroży,
        pomagając kupującym filtrować produkty według funkcji takich jak śledzenie,
        szkolenie, widoczność lub standardowe użycie.
    hvac_control_functions:
      name: Funkcje sterowania klimatyzacją
      description: Wskazuje, które funkcje HVAC/odszraniania/przepływu powietrza są
        sterowane przez jednostkę, mechaniczną lub elektroniczną.
    hybrid_drivetrain_configuration:
      name: Konfiguracja hybrydowego układu napędowego
      description: Wskazuje architekturę systemu PHEV opisującą, jak silnik/silniki
        elektryczne i silnik spalinowy zapewniają napęd.
    hybrid_system_type:
      name: Typ systemu hybrydowego
      description: Klasyfikuje architekturę hybrydyzacji stosowaną w pojeździe.
    hybrid_truck_cab_type:
      name: Typ kabiny ciężarówki hybrydowej
      description: Określa konfigurację kabiny ciężarówki, która wpływa na liczbę
        miejsc i przestrzeń wewnętrzną.
    hydration_bag_features:
      name: Cechy bukłaka/torby hydracyjnej
      description: Wyróżnia istotne cechy projektowe lub funkcjonalne właściwe dla
        toreb hydracyjnych.
    hydration_belt_features:
      name: Funkcje pasa z systemem nawadniania
      description: Wymienia istotne wbudowane cechy zwiększające użyteczność, bezpieczeństwo
        lub wygodę pasa hydracyjnego.
    hydration_bladder_compatibility:
      name: Kompatybilność z bukłakiem hydracyjnym
      description: Wskazuje, czy kamizelka zawiera lub obsługuje system bukłaka hydracyjnego.
    hydration_mouthpiece_style:
      name: Styl ustnika systemu hydracyjnego
      description: Określa konstrukcję lub styl funkcjonalny ustnika albo zaworu systemu
        hydracyjnego, pomagając kupującym wybrać preferowany interfejs picia i zapewnić
        kompatybilność.
    hydration_pack_style:
      name: Styl plecaka hydracyjnego
      description: Określa styl konstrukcji plecaka hydracyjnego, np. plecak lub kamizelka,
        aby ułatwić filtrowanie według dopasowania i zastosowania.
    hydration_system_insulation:
      name: Izolacja systemu hydracyjnego
      description: Wskazuje, czy zbiornik i/lub rurka do picia są izolowane, aby pomagać
        utrzymać temperaturę płynu w gorących lub zimnych warunkach.
    hydration_valve_type:
      name: Typ zaworu hydracyjnego
      description: Określa styl zaworu do picia lub ustnika dostarczanego z systemem
        albo butelką, obejmując popularne zawory zgryzowe i dysze o wysokim przepływie.
    hydraulic_fluid_type:
      name: Typ płynu hydraulicznego
      description: Określa typ płynu hamulcowego, do którego przeznaczona jest hydrauliczna
        klamka hamulca rowerowego. Ta informacja jest kluczowa dla konserwacji i bezpieczeństwa.
    hydrogenation_level:
      name: Poziom uwodornienia
      description: Wskazuje, czy tłuszcz jest nieuwodorniony, częściowo uwodorniony
        czy w pełni uwodorniony, co wpływa na zawartość tłuszczów trans i właściwości
        wypiekowe.
    hydrophobicity_level:
      name: Poziom hydrofobowości
      description: Wskazuje stopień efektu kropelkowania/spływania wody deklarowany
        dla produktu.
    ice_cream_format:
      name: Format lodów
      description: Opisuje fizyczną formę lub sposób prezentacji produktu lodowego,
        np. pint, baton, mochi.
    ice_skate_sharpener_type:
      name: Typ ostrzałki do łyżew
      description: Klasyfikuje ogólną konstrukcję lub format ostrzałki, np. kamień
        ręczny, maszyna elektryczna, przyrząd prowadzący itp.
    ice_temperature_suitability:
      name: Przydatność do temperatury lodu
      description: Wskazuje zakres temperatury lodu, do którego opracowano wosk do
        kija hokejowego, wpływający na osiągi i właściwości odpychania śniegu.
    icing_sugar_variety:
      name: Odmiana cukru pudru
      description: Klasyfikuje formułę lub typ funkcjonalny cukru pudru, np. fondant,
        nietopniejący puder śnieżny, barwiony, aromatyzowany.
    ignition_coil_configuration:
      name: Konfiguracja cewki zapłonowej
      description: 'Określa formę cewki zapłonowej: pojedyncza cewka/cewka na świecy,
        wielowyjściowy pakiet cewek według liczby cylindrów, listwa/kaseta cewek lub
        typ do aparatu zapłonowego.'
    ignition_lead_compliance_standard:
      name: Norma zgodności przewodu zapłonowego
      description: Formalna norma branżowa lub certyfikacja spełniana przez przewód/przewody
        zapłonowe zgodnie z deklaracją producenta, np. SAE J2031, ISO 3808.
    ignition_lead_insulation_material:
      name: Materiał izolacji przewodu zapłonowego
      description: Podstawowy materiał izolacji/płaszcza użyty na przewodzie zapłonowym,
        czyli zewnętrzna izolacja kabla.
    ignition_lead_set_type:
      name: Typ zestawu przewodów zapłonowych
      description: Wskazuje, czy produkt jest pojedynczym przewodem zapłonowym czy
        kompletnym zestawem oraz do czego zestaw jest przeznaczony.
    ignition_lead_terminal_type:
      name: Typ końcówki przewodu zapłonowego
      description: Styl końcówki/złącza używany na końcach przewodu zapłonowego, np.
        styl końcówki świecy zapłonowej i cewki/aparatu zapłonowego.
    illumination_type:
      name: Typ podświetlenia
      description: Określa, czy i w jaki sposób piłka jest podświetlana do gry nocnej,
        np. fosforyzująca poświata, dioda LED aktywowana uderzeniem.
    immobilizer_installation_type:
      name: Typ instalacji immobilisera
      description: Wskazuje, jak immobilizer jest montowany lub podłączany do pojazdu.
    immobilizer_unlock_method:
      name: Metoda odblokowania immobilizera
      description: Określa, jak immobilizer jest uzbrajany/rozbrajany lub odblokowywany.
    impact_protection_certifications:
      name: Certyfikacje ochrony przed uderzeniami
      description: Wymienia konkretne normy bezpieczeństwa, które ochraniacz spełnia
        lub przewyższa.
    impact_protection_level:
      name: Poziom ochrony przed uderzeniem
      description: Określa poziom lub technologię ochrony przed uderzeniami oferowaną
        przez ochraniacz krocza.
    impact_protection_rating:
      name: Klasa ochrony przed uderzeniami
      description: Określa certyfikowany poziom ochrony przed uderzeniami zgodnie
        z normami, np. EN 1621-1 Level 1, EN 14120 Level 2, pomagając rowerzystom
        filtrować ochronę wyższej klasy.
    impact_surface_material:
      name: Materiał powierzchni chroniącej przed uderzeniem
      description: Opisuje podstawowy materiał powierzchni uderzeniowej/kontaktowej
        dla bezpieczeństwa i odczucia, np. pianka, plastik.
    incense_base_material:
      name: Materiał bazowy kadzidła
      description: Podstawowy materiał bazowy/spoiwo używane do wykonania kadzidła
        (baza proszkowa) w zestawie.
    incense_making_method:
      name: Metoda wykonywania kadzidła
      description: Zamierzony proces rękodzielniczy obsługiwany przez zestaw.
    incense_tool_type:
      name: Typ narzędzia do kadzideł
      description: 'Określa, jakiego rodzaju narzędziem do wykonywania kadzideł jest
        produkt: do kształtowania, odmierzania, prasowania, mieszania lub suszenia
        kadzidła.'
    incline_adjustment_type:
      name: Typ regulacji nachylenia
      description: Opisuje, jak i czy można zmieniać nachylenie podczas treningu.
    included_accessories:
      name: Dołączone akcesoria
      description: Wymienia dołączone dodatki, takie jak zapasowe głowice/końcówki,
        etui, kabel do ładowania lub zasilacz sieciowy.
    included_case_type:
      name: Typ dołączonej obudowy
      description: Typ futerału transportowego/przechowywania dołączonego do saksofonu
        basowego, jeśli występuje.
    included_components:
      name: Dołączone elementy
      description: Wymienia elementy dołączone do opakowania, przydatne w przypadku
        zestawów narzędzi i pakietów.
    included_fastener_components:
      name: Dołączone elementy zapięcia
      description: Określa, czy produkt jest zestawem haftek, samymi haczykami, samymi
        oczkami czy powiązanym wariantem zapięcia odzieżowego.
    included_hydration_vessel_type:
      name: Typ dołączonego naczynia hydracyjnego
      description: Określa styl pojemnika na napój dostarczanego z pasem lub przez
        niego obsługiwanego.
    included_items_woodwind_instrument:
      name: Dołączone elementy (instrument dęty drewniany)
      description: Wymienia typowe elementy pakietu dołączone do saksofonu basowego.
    included_materials:
      name: Dołączone materiały
      description: 'Wskazuje, jakie elementy są dołączone przy zakupie wykroju: sam
        wykrój czy wykrój + materiały.'
    included_mounting_accessories:
      name: Dołączone akcesoria montażowe
      description: Wymienia akcesoria montażowe/mocujące dołączone do zestawu głośnomówiącego.
    included_pump_type:
      name: Typ dołączonej pompki
      description: Określa typ pompki dostarczanej lub zintegrowanej z materacem dmuchanym.
    included_scraper_implement_type:
      name: Typ dołączonego skrobaka
      description: Wskazuje, jakie akcesoria do gry są dołączone do skrobaka muzycznego,
        np. patyczek/pręt do skrobania, szczotka druciana.
    indicator_design:
      name: Konstrukcja wskaźnika
      description: Klasyfikuje fizyczną formę lub styl sygnalizatora brań.
    indicator_functions_tracked:
      name: Śledzone funkcje wskaźnika
      description: Wymienia konkretne statystyki gry śledzone przez wskaźnik, takie
        jak piłki, strike’i, auty, inningi, liczba narzutów, overy, wickety, wynik
        lub próby.
    indoor_outdoor_use:
      name: Użycie wewnątrz/na zewnątrz
      description: Wskazuje, czy kręgle dla dzieci są przeznaczone do użytku wewnętrznego,
        zewnętrznego czy w obu środowiskach.
    inflatable_decoration_items_included:
      name: Elementy dołączone do dekoracji dmuchanej
      description: Wymienia kluczowe akcesoria dołączone do dekoracji dmuchanej, np.
        dmuchawę, kołki, linki mocujące.
    inflatable_decoration_type:
      name: Typ dekoracji dmuchanej
      description: Określa rodzaj dmuchanej dekoracji imprezowej, czyli kształt/formę,
        aby wspierać przeglądanie i filtrowanie.
    inflatable_raft_float_features:
      name: Cechy dmuchanego pontonu/materaca
      description: Cechy funkcjonalne obecne w dmuchanym pontonie/materacu.
    inflation_method_included:
      name: Dołączona metoda pompowania
      description: Określa typ rozwiązania do pompowania opon dołączonego do zestawu
        naprawczego, jeśli występuje.
    infused_scent:
      name: Dodany zapach
      description: Określa dodatki zapachowe lub smakowe zaimpregnowane w materiale
        przynęty.
    ingredient_base_type:
      name: Typ bazy składnika
      description: Określa podstawową bazę dostarczaną do fermentacji, np. koncentrat
        soku winogronowego, świeży sok lub koncentrat owocowy.
    ingredient_physical_form:
      name: Fizyczna forma składnika
      description: Określa fizyczną formę, w jakiej dostarczany jest składnik zapachowy,
        używaną do obsługi, odmierzania i komponowania formuły.
    ingredient_processing_method:
      name: Metoda przetwarzania składników
      description: Określa podstawową technikę przetwarzania zastosowaną do składnika,
        np. liofilizacja, prażenie, fermentacja.
    ink_colors_included:
      name: Kolory tuszu w zestawie
      description: Określa kolory tuszu dołączone w poduszkach tuszujących w zestawie.
    ink_pad_application_method:
      name: Metoda aplikacji poduszki tuszującej
      description: 'Sposób dozowania/używania tuszu z poduszki: tradycyjna poduszka
        tuszująca, dauber lub poduszka z końcówką pędzelkową.'
    ink_pad_permanence:
      name: Trwałość poduszki tuszującej
      description: Wskazuje, czy odbity tusz jest trwały i/lub archiwalny, czyli odporny
        na blaknięcie i wodę po wyschnięciu.
    ink_pad_size:
      name: Rozmiar poduszki tuszującej
      description: Standardowy rozmiar/forma powierzchni lub obudowy poduszki tuszującej.
    ink_pad_special_effects:
      name: Efekty specjalne poduszki tuszującej
      description: Specjalne efekty wizualne/funkcjonalne tuszu po odbiciu, np. metaliczny,
        brokatowy.
    ink_permanence:
      name: Trwałość tuszu
      description: Wskazuje, czy wyschnięty tusz sumi ma być trwały/archiwalny czy
        zmywalny/nietrwały.
    ink_preparation_required:
      name: Wymagane przygotowanie tuszu
      description: Wskazuje, czy tusz sumi jest gotowy do użycia, czy wymaga rozcieńczenia
        wodą lub roztarcia przed użyciem.
    inline_skate_brake_type:
      name: Typ hamulca rolek inline
      description: Określa konfigurację hamulca dołączoną do rolek inline, np. zdejmowany
        hamulec piętowy lub brak hamulca.
    inner_tent_configuration:
      name: Konfiguracja namiotu wewnętrznego
      description: Określa konfigurację lub styl namiotu wewnętrznego, np. pełny wkład,
        wkład z siatki lub wkład termiczny.
    innerspring_coil_type:
      name: Typ sprężyn wewnętrznych
      description: Określa styl konstrukcji systemu sprężyn wewnętrznych w materacu,
        wpływający na podparcie, izolację ruchu i cenę.
    input_connector_type:
      name: Typ złącza wejściowego
      description: Określa typ złącza wejścia audio używany przez pedał, zwykle 1/4
        cala TS.
    input_valve_type:
      name: Typ zaworu wejściowego
      description: Wskazuje standard zaworu obecny w dętce/kole rowerowym, OD którego
        podłączany jest adapter.
    insecticide_treatment:
      name: Obróbka insektycydowa
      description: Wskazuje, czy siatka została fabrycznie zabezpieczona środkiem
        owadobójczym oraz jaki rodzaj impregnacji zastosowano w celu zapewnienia dodatkowej
        ochrony.
    insert_coverage_area:
      name: Obszar pokrycia wkładki
      description: Określa, którą część stopy ma zakrywać wkładka, np. całą długość,
        tylko piętę.
    insert_length_type:
      name: Typ długości wkładki
      description: Wskazuje, jak dużą część wkładki obejmuje podparcie łuku stopy.
    inside_message_type:
      name: Typ wiadomości wewnątrz
      description: Wskazuje, czy kartka zawiera wstępnie nadrukowaną wiadomość w środku
        i czy można ją personalizować.
    insole_attachment_method:
      name: Metoda mocowania podeszwy wewnętrznej
      description: Określa, w jaki sposób podparcie łuku stopy pozostaje na miejscu
        w bucie, np. luźno wkładane, z warstwą samoprzylepną, rzep itp.
    insole_material:
      name: Materiał wkładki
      description: Opisuje materiał podłoża pod stopę lub wkładki, na którym opiera
        się stopa, wpływający na amortyzację i podparcie.
    installation_fabrication_level:
      name: Poziom prac adaptacyjnych przy montażu
      description: Wskazuje typową ilość niestandardowych prac adaptacyjnych lub modyfikacji
        wymaganych do montażu zestawu.
    installation_location:
      name: Miejsce montażu
      description: Określa typowy punkt montażu czujnika ciśnienia oleju w układzie
        olejowym silnika, np. port kanału olejowego w bloku, obudowa filtra, płytka
        sandwich lub zdalny montaż na przewodzie.
    installation_method:
      name: Metoda montażu
      description: Określa sposób mocowania lub montażu maty albo płytki na podłodze.
    instant_coffee_form:
      name: Forma kawy rozpuszczalnej
      description: Opisuje fizyczną formę, w jakiej dostarczana jest kawa rozpuszczalna,
        wpływającą na sposób przygotowania i trwałość.
    instep_coverage:
      name: Pokrycie podbicia
      description: Określa, czy produkt chroni tylko goleń czy zarówno goleń, jak
        i podbicie/stopę.
    instruction_format:
      name: Format instrukcji
      description: Format instrukcji dołączonych do zestawu.
    instrument_cleaning_swab_form_factor:
      name: Forma wyciora do instrumentu
      description: Określa fizyczny styl wyciora, np. przeciągana ściereczka lub system
        pręta/szczotki, aby dopasować go do preferencji muzyka i ograniczeń instrumentu.
    instrument_dimensions_unit_context:
      name: Kontekst jednostek wymiarów instrumentu
      description: Wyjaśnia, czego dotyczą podane wymiary wysokości/szerokości/długości,
        np. całego instrumentu, długości pojedynczej rury, wysokości statywu.
    instrument_electronics_type:
      name: Typ elektroniki instrumentu
      description: Wskazuje, czy system przetwornika/przedwzmacniacza instrumentu
        jest aktywny czy pasywny.
    instrument_key:
      name: Klawisz instrumentu
      description: Określa oznaczenie tonacji instrumentu dla fletu prostego używane
        w katalogach, zwykle C lub F dla większych fletów prostych.
    instrument_level:
      name: Poziom instrumentu
      description: Docelowy poziom zaawansowania muzyka dla oferowanego instrumentu.
    instrument_part_mounting_method:
      name: Metoda montażu części instrumentu
      description: Określa sposób mocowania lub instalacji części, np. zaciskowo,
        samoprzylepnie, na śruby.
    instrument_parts_included:
      name: Dołączone części instrumentu
      description: Wymienia główne komponenty/części dołączone w pudełku dla klarnetu
        A.
    instrument_playing_technique:
      name: Technika gry na instrumencie
      description: Sposób typowej gry/uruchamiania instrumentu, np. potrząsanie, uderzanie,
        klekotanie.
    instrument_size_class:
      name: Klasa rozmiaru instrumentu
      description: Ogólny rozmiar instrumentu wyrażony jako przyjazna kupującemu klasa
        zamiast dokładnych wymiarów.
    insulation_fill_material:
      name: Izolacyjny materiał wypełniający
      description: Określa podstawowy materiał użyty do ocieplenia kurtki lub kamizelki.
    integrated_bottom_type:
      name: Typ zintegrowanego spodu
      description: Wskazuje, czy odzież posiada wbudowane figi, spodenki, trykot lub
        podobne warstwy wewnętrzne zapewniające zakrycie podczas ruchu.
    integrated_charging_options:
      name: Zintegrowane opcje ładowania
      description: Wymienia wbudowane interfejsy zasilania lub ładowania dostępne
        w szafce nocnej.
    integrated_furniture_function:
      name: Zintegrowana funkcja mebla
      description: Określa dodatkowe wbudowane elementy meblowe dołączone do łóżka
        składanego na ścianę lub ramy, np. biurko, sofę, półki.
    integrated_locking:
      name: Zintegrowane zamykanie
      description: Czy regał obejmuje zintegrowaną blokadę umożliwiającą połączenie
        regału z pojazdem i/lub roweru z regałem.
    integrated_power_options:
      name: Zintegrowane opcje zasilania
      description: Oznacza typ wbudowanego zasilania lub funkcji Charge , jakie zapewnia
        dana toaletka.
    integrated_storage_features:
      name: Zintegrowane funkcje przechowywania
      description: Określa dodatkowe funkcje przechowywania lub akcesoria, które kij
        bilardowy Regał obejmuje Beyond gniazdami na kije.
    integrated_tool_functions:
      name: Zintegrowane Functionsnarzędzia
      description: Dodatkowe funkcje narzędziowe zintegrowane z dźwignią (np. hak
        do szprych, narzędzie do wyjmowania wkładów wentyli, przyrząd do zdejmowania
        stopki).
    intended_board_type:
      name: Przeznaczony typ płyty
      description: Określa styl deski do kitesurfingu, do której przeznaczony jest
        statecznik (np. twin tip, kierunkowy do surfowania, hydrofoil).
    intended_consumption:
      name: Przewidziane spożycie
      description: Określa sposób, w jaki produkt będzie spożywany, wskazując, czy
        jest bezpieczny do spożycia na surowo, czy wymaga pieczenia, czy jest częściowo
        upieczony.
    intended_craft:
      name: Przeznaczony Craft
      description: Podstawowy Context Craft , dla którego ten przewodnik po włóczkach
        jest przeznaczony.
    intended_culinary_use:
      name: Przeznaczenie kulinarne
      description: Oznacza główny sposób przygotowania sosu, taki jak maczanie, gotowanie
        lub glazurowanie.
    intended_handlebar_style:
      name: Przeznaczony styl kierownicy
      description: Opisuje przeznaczenie drążka lub zastosowanie -opakowanie wewnętrzne
        dźwigni w określonym stylu (np. flat-bar, Drop-bar, aero). Dzięki temu szybko
        zawęża się zakres kompatybilności bez konieczności tworzenia dodatkowych podkategorii.
    intended_player_role:
      name: Przewidywana rola gracza
      description: Określa rolę na boisku, do której przeznaczony jest dany kask (np.
        łapacz, sędzia).
    intended_playing_surface:
      name: Przeznaczona powierzchnia do gry
      description: Powierzchnia, na której jest przeznaczony krążek, piłka lub pierścień,
        np. lód, asfalt, podłoga w sali gimnastycznej lub lód syntetyczny.
    intended_repair_location:
      name: Przewidziana lokalizacja naprawy
      description: Miejsce na oponie, do którego zestaw jest przeznaczony, aby dokonać
        naprawy.
    intended_seating_position:
      name: Przewidziana pozycja siedząca
      description: Określa pozycję siedzenia w pojeździe, w której pas bezpieczeństwa
        ma być zamontowany lub używany.
    intended_sewing_application:
      name: Przeznaczony do szycia
      description: 'Przeznaczenie: aplikacja do szycia, do której przeznaczony jest
        ekspres (np. szycie odzieży uniwersalnej, pikowanie, tapicerstwo).'
    intended_technique:
      name: Zamierzona technika
      description: Podstawowa technika filcowania, do której przeznaczona jest podkładka/mata.
    intended_use:
      name: Przeznaczenie
      description: Podstawowe zastosowanie Context instrumentu.
    intended_use_fleece_fabric:
      name: Przeznaczenie (materiał polarowy)
      description: Podstawowy projekt/aplikacja, dla której polar jest przeznaczony
        na rynek.
    intended_user:
      name: Przeznaczony użytkownik
      description: Wskazuje, dla kogo przeznaczony jest sprzęt ochronny samolotu.
    intended_yarn_form:
      name: Przewidywana forma przędzy
      description: Określa sposób prezentacji włóczki najlepiej obsługiwany przez
        miskę na włóczkę.
    interaction_mode:
      name: Modeinterakcji
      description: Podstawowa metoda interakcji służąca do wywoływania dźwięków lub
        czynności.
    interactive_effects:
      name: Efekty interaktywne
      description: Identyfikuje interaktywne efekty elektroniczne i mechaniczne zawarte
        w zestawie kuchennym.
    interfacing_application_area:
      name: Obszar aplikacji interfejsu
      description: Identyfikuje typowe obszary szycia/Craft , w których interfejs
        ma pomóc technicznie.
    interfacing_color_family:
      name: Rodzina kolorów interfejsu
      description: Oznacza typowy kolor bazowy międzywarstwy stosowany pod jasnymi
        lub ciemnymi tkaninami.
    interfacing_selling_format:
      name: Format sprzedaży interfejsowej
      description: Opisuje format sprzedaży międzywłókien (na przykład cięcie ciągłe
        na określoną długość, wstępnie pocięte kawałki, rolki lub próbka).
    interfacing_stiffness_level:
      name: Poziom sztywności interfejsu
      description: Opisuje stopień sztywności/twardości zapewniany przez interfejs.
    interior_padding_type:
      name: Typ wnętrza
      description: Rodzaj systemu wkładów wewnętrznych lub wkładek stosowanych wewnątrz
        opakowania wewnętrznego w celu zabezpieczenia i uporządkowania Treści.
    interior_stall_configuration:
      name: Konfiguracja kabiny wewnętrznej
      description: Określa układ/konfigurację wnętrza do transportu zwierząt (orientację
        boksu i styl przedziałów).
    invitation_printing_coverage:
      name: Zakres druku zaproszeń
      description: Która strona(y) zaproszenia są zadrukowane (tylko przód czy strona
        dwustronna)?
    iodization:
      name: Jodowanie
      description: Wskazuje, czy i w jakim stopniu sól została wzbogacona jodem.
    iridescence_level:
      name: Poziom opalizacji
      description: Opisuje intensywność naturalnego/obrobionego opalizującego połysku,
        typowego dla piór pawia.
    irish_warpipe_set_configuration:
      name: Konfiguracja irlandzkiego zestawu warpipe
      description: Wskazuje, jaka konfiguracja jest sprzedawana (pełny instrument
        czy też części/częściowy zestaw), specjalnie przeznaczona dla irlandzkich
        rur warpiowych.
    iron_on_applique_application_method:
      name: Aplikacja do naprasowania metodą aplikacji
      description: Określa sposób, w jaki aplikacja do prasowania ma być nakładana
        na podłoże.
    ironing_center_features:
      name: Funkcje centrum prasowania
      description: Wymienia specjalistyczne cechy centrów prasowalniczych, które zwiększają
        ich użyteczność i wygodę.
    jacket_breast_style:
      name: Styl kurtki na piersi
      description: Określa, czy marynarka jest jedno- czy dwurzędowa.
    jacket_vent_style:
      name: Styl wentylacji kurtki
      description: Oznacza rodzaj otworu wentylacyjnego z tyłu marynarki.
    jam_and_jelly_consistency:
      name: Konsystencja dżemu i galaretki
      description: Określa konsystencję smarowidła, wskazując na obecność kawałków
        owoców lub nasion.
    jaw_shape:
      name: Shapesszczęki
      description: Geometria szczęk lub ich końcówek (np. proste, wygięte, długie
        noski) wpływająca na precyzję i zasięg.
    jerky_form:
      name: forma suszonego mięsa
      description: Opisuje formę fizyczną lub rodzaj kawałków suszonego mięsa (np.
        paski, patyczki, kawałki).
    jersey_style:
      name: Styl koszulki
      description: Określa współczynnik kształtu koszulki lub styl noszenia koszulek
        dla kibiców.
    jew_harp_accessories_included:
      name: Dołączono akcesoria drumli
      description: Listy zawierały pozycje zapakowane z drumlą (np. opakowanie wewnętrzne,
        woreczek, instrukcja).
    jew_s_harp_frame_style:
      name: Harfa żydowska w stylu Frame
      description: Opisuje styl konstrukcji Frame/korpusu harfy żydowskiej, który
        Influence odczucia, trwałość i ergonomię gry.
    jew_s_harp_tongue_profile:
      name: Profil języka harfy żydowskiej
      description: Opisuje profil/geometrię języka (stroika) harfy żydowskiej, która
        wpływa na reakcję i barwę dźwięku.
    jewelry_pieces_included:
      name: Dołączono elementy biżuterii
      description: Wypisuje konkretne pozycje biżuterii zawartej w zestawie, dzięki
        czemu klient dokładnie wie, jaką biżuterię kupuje.
    jigsaw_puzzle_piece_shape:
      name: Shapeselementów układanki
      description: Ogólny styl cięcia/Shapes elementów i profil krawędzi.
    jockstrap_design_features:
      name: Cechy konstrukcyjne pasów stabilizujących
      description: Rejestruje specjalne elementy konstrukcyjne charakterystyczne dla
        pasów biodrowych, które Influence Functions i estetykę.
    juggling_club_construction_type:
      name: Typ konstrukcji maczugi żonglerskiej
      description: Określa ogólny typ konstrukcji kija żonglerskiego (np. jednoczęściowy
        formowany czy składany z wielu części), co może mieć wpływ na trwałość, odczucia
        i konserwację.
    juggling_club_core_material:
      name: Materiał na rdzeń kija żonglerskiego
      description: Główny materiał rdzenia używany wewnątrz kija (odmienny od zewnętrznego
        owinięcia/taśmy).
    juggling_prop_set_size:
      name: Rozmiar zestawu rekwizytów do żonglowania
      description: Liczba podstawowych rekwizytów wchodzących w skład zestawu (np.
        zestaw 3 piłek, parowanie lub poi).
    juggling_ring_edge_style:
      name: Styl krawędzi pierścienia żonglerskiego
      description: Profil krawędzi pierścienia, który Influence komfort i chwyt.
    juice_form:
      name: Forma soku
      description: Określa formę fizyczną lub etap przetwarzania produktu (np. płyn
        o pojedynczej mocy, koncentrat, proszek).
    juice_processing_method:
      name: Metoda przetwarzania soku
      description: Określa podstawową technikę przetwarzania zastosowaną do soku lub
        napoju, Impact smaku, wartość odżywczą klientów i żywotność półki.
    jump_rope_style:
      name: Styl skakania na skakance
      description: Klasyfikuje rodzaj konstrukcji liny/kabla (np. koralikowa, materiałowa,
        szybka), który ma duży wpływ na zamierzone zastosowanie i wydajność.
    kale_variety:
      name: Odmiana jarmużu
      description: Identyfikuje konkretną odmianę lub odmianę jarmużu (np. kędzierzawa,
        Lacinato/Dinosaur, czerwona rosyjska). Pomaga to klientom dokonać wyboru na
        podstawie smaku, konsystencji i zastosowania kulinarnego.
    kaleidoscope_viewing_type:
      name: Typ oglądania kalejdoskopu
      description: Określa format oglądania lub styl działania kalejdoskopu, np. klasyczna
        tubusowa luneta, teleidoskop oparty na soczewce, obsługa kołem, projekcja.
    kayak_construction_type:
      name: Typ konstrukcji kajaku
      description: Określa podstawowy styl konstrukcji kajaka, np. twarda skorupa
        lub nadmuchiwany.
    kayak_design_type:
      name: Typ konstrukcji kajaka
      description: Klasyfikuje podstawowe zamierzenie konstrukcyjne kajaka, np. surfski,
        playboat, turystyczny.
    kayak_hull_design:
      name: Konstrukcja kadłuba kajaka
      description: Określa podstawowy kształt kadłuba, który wpływa na właściwości
        prowadzenia, takie jak stabilność i zwrotność w warunkach surfingu.
    kayak_storage_bag_type:
      name: Typ torby do przechowywania kajaka
      description: Określa styl lub format torby do przechowywania kajaka, np. worek
        wodoszczelny lub torba na wiosło.
    kayak_style:
      name: Styl kajaka
      description: Określa podstawowy styl konstrukcji lub użytkowania kajaka, np.
        rekreacyjny, turystyczny, nadmuchiwany.
    keel_type:
      name: Typ kila
      description: Określa konfigurację kila żaglówki.
    kettlebell_style:
      name: Styl kettlebella
      description: Określa wariant konstrukcji lub stylu kettlebella, np. zawodniczy,
        regulowany, miękki, pomagając kupującym wybrać odpowiedni odważnik do potrzeb
        treningowych.
    key_attachment_mechanism:
      name: Mechanizm mocowania kluczy
      description: Określa osprzęt używany do zabezpieczania kluczy wewnątrz etui,
        np. kółka, klipsy lub słupki śrubowe.
    key_retention_when_unlocked:
      name: Utrzymywanie klucza po odblokowaniu
      description: Wskazuje, czy klucz można wyjąć z zamka, gdy znajduje się on w
        pozycji odblokowanej.
    keyboard_amplifier_inputs:
      name: Wejścia wzmacniacza klawiszowego
      description: Wymienia połączenia wejściowe obsługiwane przez wzmacniacz klawiszowy,
        np. 1/4 cala TRS, wejście MIDI, Bluetooth.
    keyboard_amplifier_output_types:
      name: Typy wyjść wzmacniacza klawiszowego
      description: Określa podstawowe typy złączy wyjściowych obsługiwane przez wzmacniacz
        klawiszowy do kierowania dźwięku do innych systemów.
    keyboard_case_handle_type:
      name: Typ uchwytu futerału na keyboard
      description: Podstawowy system uchwytów używany do przenoszenia futerału na
        keyboard, oprócz pasków.
    keyboard_case_interior_padding_type:
      name: Typ wewnętrznej wyściółki futerału na keyboard
      description: Podstawowy sposób amortyzacji/wyściełania wnętrza twardego futerału.
    keyboard_case_protection_level:
      name: Poziom ochrony futerału na keyboard
      description: Ogólna klasa ochrony/sztywności twardego futerału, odróżniająca
        formowane twarde futerały od wytrzymałych futerałów typu flight/ATA.
    keyboard_case_wheel_type:
      name: Typ kół futerału na keyboard
      description: Konfiguracja kółek w twardych futerałach, które mają kółka.
    keyboard_pedal_connector_type:
      name: Typ złącza pedału klawiszowego
      description: Określa typ złącza/wtyczki używany do podłączania pedału sustain
        do keyboardu lub pianina cyfrowego.
    keyboard_power_supply_type:
      name: Typ zasilania keyboardu
      description: 'Podstawowa metoda zasilania keyboardu: bateria, zasilacz sieciowy,
        zasilanie USB.'
    keyboard_stand_tier_type:
      name: Typ poziomów statywu na keyboard
      description: Określa, czy stojak jest sprzedawany wyłącznie jako podstawa, czy
        zawiera/dodaje dodatkowy element mocujący.
    keyboard_stand_tiers:
      name: Poziomy statywu na keyboard
      description: Liczba poziomów gry obsługiwanych przez statyw typu Z, np. jednopoziomowy
        lub dwupoziomowy.
    keychain_attachment_type:
      name: Typ mocowania breloka
      description: Określa podstawowy osprzęt mocujący używany do przypinania breloka
        do kluczy, toreb lub pasków.
    keychain_style:
      name: Styl breloka
      description: Opisuje ogólną formę breloka, czyli czym fizycznie jest.
    keywork_finish:
      name: Wykończenie mechaniki
      description: Opisuje wykończenie/powłokę konkretnie na mechanice (klapach),
        oddzielnie od wykończenia korpusu.
    kick_point:
      name: Punkt ugięcia
      description: Określa położenie punktu ugięcia trzonka kija hokejowego, wpływające
        na szybkość oddania strzału i odczucie.
    kick_zone_grip_system:
      name: System przyczepności w strefie odbicia
      description: Określa technologię używaną w strefie odbicia narty do zapewnienia
        przyczepności.
    kickboard_features:
      name: Cechy deski do nauki pływania
      description: Wyróżnia specjalne cechy deski do nauki pływania, które poprawiają
        trening lub komfort, w tym teksturę powierzchni i opcje chwytów na dłonie.
    kickboard_handle_style:
      name: Styl uchwytu deski do nauki pływania
      description: Określa, czy i w jaki sposób deska do nauki pływania zapewnia uchwyty
        na dłonie lub wykończenia powierzchni wpływające na trzymanie i komfort.
    kickstand_mounting_position:
      name: Położenie mocowania podpórki rowerowej
      description: Określa miejsce mocowania podpórki do ramy roweru, np. mocowanie
        centralne, mocowanie do dolnych widełek, mocowanie do tylnej osi.
    kickstand_type:
      name: Typ podpórki rowerowej
      description: Opisuje styl konstrukcji lub mechanizm podpórki, np. jednostronna
        podpórka boczna, dwunożna podpórka centralna, teleskopowa.
    kidney_belt_support_level:
      name: Poziom wsparcia pasa nerkowego
      description: Ogólny poziom wsparcia deklarowany przez producenta, zapewniany
        przez pas nerkowy do stabilizacji dolnej części pleców i brzucha.
    kiln_firing_atmosphere:
      name: Atmosfera wypału pieca
      description: Określa atmosfery wypału, które piec może obsługiwać podczas pracy,
        np. utleniającą lub redukcyjną.
    kiln_heating_element_type:
      name: Typ elementu grzejnego pieca
      description: Typ/materiał elementów grzejnych używanych w piecu.
    kingpin_design:
      name: Konstrukcja kingpina
      description: Opisuje styl konstrukcji osprzętu kingpina, wpływający na wagę
        i prześwit przy grindach.
    kingpin_orientation:
      name: Orientacja kingpina
      description: Określa orientację kingpina trucka, która wpływa na charakterystykę
        jazdy i kompatybilność z deską.
    kit_components_included:
      name: Dołączono elementy zestawu
      description: Wymienia poszczególne elementy osprzętu dostarczone w zestawie,
        np. kotwy gruntowe, śruby, pasy, narzędzie montażowe, aby kupujący dokładnie
        wiedzieli, co kupują.
    kit_format:
      name: Format zestawu
      description: Określa sposób zapakowania i przenoszenia zestawu, np. saszetka,
        futerał, pudełko.
    kit_items_included:
      name: Dołączono elementy zestawu
      description: Wymienia główne urządzenia i materiały dołączone do zestawu do
        produkcji wina, aby kupujący mogli odróżnić zestawy startowe od samych uzupełnień
        składników.
    kit_pouch_case_type:
      name: Typ saszetki/futerału zestawu
      description: Określa typ dołączonego rozwiązania do przechowywania zestawu pielęgnacyjnego,
        jeśli występuje.
    kit_tools_included:
      name: Narzędzia dołączone do zestawu
      description: Wymienia podstawowe narzędzia dostarczone w zestawie, jeśli występują,
        potrzebne do wykonania projektu.
    kite_inflation_system:
      name: System pompowania latawca
      description: Wskazuje, jak pompowana jest krawędź natarcia i listwy latawca.
    kite_line_configuration:
      name: Konfiguracja linek latawca
      description: Wskazuje liczbę linek nośnych/sterujących, do których użycia zaprojektowano
        czaszę latawca, co jest częstą specyfikacją do prawidłowego dopasowania barów
        i linek.
    kite_type:
      name: Typ latawca
      description: Definiuje kategorię konstrukcji latawca, czyli kształt i styl uzdy.
    kiteboard_bag_style:
      name: Styl torby na kiteboard
      description: Konkretny styl lub podtyp futerału na kiteboard, np. boardbag,
        torba golfowa, torba podróżna, torba na foil.
    kiwifruit_variety:
      name: Odmiana kiwi
      description: 'Określa konkretny kultywar lub odmianę kolorystyczną kiwi: zielone,
        złote, czerwone itp.'
    knee_pad_pocket_type:
      name: Typ kieszeni na nakolanniki
      description: Wskazuje, czy i w jaki sposób odzież mieści ochronne nakolanniki.
    knee_pad_style:
      name: Styl ochraniaczy na kolana
      description: Opisuje styl konstrukcji lub formę ochrony kolan, np. rękaw, stabilizator,
        ochraniacz.
    knee_protection_design:
      name: Konstrukcja ochrony kolan
      description: Wskazuje liczbę przegubowych sekcji kolana wbudowanych w ochraniacz
        nogi.
    kneeboard_construction:
      name: Konstrukcja kneeboardu
      description: Określa podstawową technikę konstrukcji lub kompozytową budowę
        deski, np. plastik formowany rotacyjnie, formowanie kompresyjne, włókno węglowe.
    kneeboard_strap_type:
      name: Typ paska kneeboardu
      description: Opisuje styl systemu paska kolanowego używanego do mocowania użytkownika
        do deski.
    knife_lock_mechanism:
      name: Mechanizm blokady noża
      description: Określa mechanizm używany do zabezpieczania ostrza noża składanego
        w pozycji otwartej lub wskazuje konstrukcje bez blokady.
    knife_locking_mechanism:
      name: Mechanizm blokowania noża
      description: Określa typ mechanizmu zabezpieczającego ostrze w pozycji otwartej,
        bezpośrednio definiujący bezpieczeństwo, wytrzymałość i łatwość użycia noży
        z blokowanym ostrzem.
    knife_opening_mechanism:
      name: Mechanizm otwierania noża
      description: Opisuje sposób wysuwania ostrza z rękojeści, odróżniając style
        otwierania ręczne, wspomagane, automatyczne i specjalistyczne.
    knife_system:
      name: Układ noży
      description: Wskazuje, czy i w jaki sposób nóż tnący działa w owerloku.
    knit_elastic_application:
      name: Zastosowanie gumy dzianej
      description: Określa zamierzone zastosowanie krawieckie/rękodzielnicze dzianej
        taśmy elastycznej.
    knit_pattern:
      name: Wzór dzianiny
      description: Określa główny ścieg lub teksturę dzianiny użyte w materiale kardiganu,
        np. warkocz, ściągacz lub wafel, pozwalając kupującym znaleźć konkretne tekstury
        i właściwości termiczne.
    knit_style:
      name: Styl dzianiny
      description: Określa główną konstrukcję dzianiny, teksturę lub dekoracyjny wzór
        widoczny na materiale swetra.
    knitting_marker_counter_type:
      name: Typ znacznika/licznika dziewiarskiego
      description: Określa funkcjonalny typ produktu wśród znaczników i liczników
        dziewiarskich.
    knitting_needle_tip_style:
      name: Styl końcówki drutu dziewiarskiego
      description: Ostrość/kształt końcówki zoptymalizowane pod różne włóczki i techniki.
    knock_sensor_technology:
      name: Technologia czujnika stuków silnika
      description: Technologia pomiarowa używana w czujniku spalania stukowego.
    knurl_aggressiveness:
      name: Agresywność radełkowania
      description: Opisuje ostrość lub teksturę wzoru radełkowania na gryfie, wpływającą
        na komfort i pewność chwytu.
    knurl_marking_standard:
      name: Standard oznaczeń radełkowania
      description: Określa położenie pierścieni referencyjnych radełkowania używanych
        do ustawienia dłoni, np. oznaczenia IPF lub IWF.
    kohlrabi_variety:
      name: Odmiana kalarepy
      description: Określa kultywar lub odmianę handlową bulwy kalarepy, pozwalając
        klientom wybierać między różnymi profilami smakowymi, rozmiarami i kolorami.
    koji_mold_type:
      name: Typ pleśni koji
      description: Wskazuje typ lub szczep pleśni koji używany podczas fermentacji,
        który wpływa na aromat i smak.
    kumquat_variety:
      name: Odmiana kumkwatu
      description: Określa kultywar lub odmianę oferowanych kumkwatów, pozwalając
        kupującym wybrać owoce według profilu smakowego, rozmiaru lub zastosowania
        kulinarnego.
    label_edge_type:
      name: Typ krawędzi etykiety
      description: Określa styl wykończenia krawędzi użyty do zapobiegania strzępieniu
        i określenia estetyki.
    label_finish:
      name: Wykończenie etykiety
      description: Określa wykończenie powierzchni, teksturę lub ochronną powłokę/obróbkę
        zastosowaną na etykiecie.
    label_finish_edge_style:
      name: Wykończenie/styl krawędzi etykiety
      description: Sposób wykończenia krawędzi, wpływający na komfort i trwałość,
        np. krawędź tkana lub cięta laserowo.
    label_fold_type:
      name: Typ złożenia etykiety
      description: Określa konstrukcję wszywki pod kątem wszycia w przedmiot, np.
        złożenie końcowe lub środkowe, wpływającą na sposób aplikacji i umiejscowienie.
    label_text_type:
      name: Typ tekstu etykiety
      description: Wskazuje, czy etykieta jest pusta, wstępnie nadrukowana czy przeznaczona
        do personalizacji/dostosowania.
    lace_area_size:
      name: Rozmiar obszaru koronki
      description: Definiuje rozmiar lub konfigurację sekcji koronki, np. closure
        4×4, frontal 13×6, co określa dostępną przestrzeń przedziałka.
    lace_tightener_style:
      name: Styl zaciskacza sznurowadeł
      description: Określa mechaniczną konstrukcję lub formę urządzenia do zaciskania
        sznurowadeł.
    lace_type:
      name: Typ koronki
      description: Opisuje materiał lub wykończenie koronki przy linii włosów/czepku,
        które wpływa na realizm i dopasowanie do odcienia skóry.
    lacrosse_ball_certification:
      name: Certyfikacja piłki do lacrosse
      description: Określa zatwierdzenia organów sportowych lub normy spełniane przez
        piłkę do lacrosse.
    lacrosse_goal_regulation_certification:
      name: Certyfikacja regulaminowa bramki lacrosse
      description: Wskazuje, czy bramka lub siatka do lacrosse spełnia wymagania określonej
        organizacji regulującej (np. NCAA lub NFHS).
    lacrosse_pocket_type:
      name: Typ kieszeni lacrosse
      description: Określa ogólny styl kieszeni lub siatki wplecionej w główkę, wpływający
        na kontrolę piłki i wyrzut.
    lacrosse_string_type:
      name: Typ sznurka lacrosse
      description: Klasyfikuje dokładną formę lub zamierzone użycie sznurka albo siatki,
        aby klienci mogli rozróżniać kawałki siatki, zestawy i konkretne role sznurków
        w kieszeni.
    ladder_position:
      name: Położenie drabinki
      description: Określa, gdzie znajduje się dostęp po drabince lub schodkach w
        podwyższonym łóżku dziecięcym.
    lanyard_attachment_hardware:
      name: Osprzęt mocujący smycz
      description: Wskazuje styl osprzętu na końcu smyczy, który łączy się z kluczami,
        identyfikatorami, telefonami lub innymi akcesoriami.
    lanyard_style:
      name: Styl smyczy
      description: Określa sposób noszenia lub przenoszenia smyczy.
    lanyard_type:
      name: Typ smyczy
      description: Opisuje styl smyczy dostarczanej z gwizdkiem lub z nim kompatybilnej.
    lap_hand_loom_accessories_included:
      name: Akcesoria dołączone do ręcznego krosna naręcznego
      description: Akcesoria dołączone do zestawu ręcznego krosna naręcznego.
    lapel_style:
      name: Styl klap
      description: Określa projekt klapy marynarki garniturowej, np. otwarta, zamknięta,
        szalowa.
    laser_safety_class:
      name: Klasa bezpieczeństwa lasera
      description: Klasyfikacja bezpieczeństwa lasera produktu, np. klasa 2, 3R, 3B,
        4, zgodnie z dokumentacją/oznakowaniem urządzenia.
    latex_processing_method:
      name: Metoda przetwarzania lateksu
      description: Określa proces produkcji używany do wytwarzania pianki lateksowej,
        zwykle Dunlop lub Talalay, który wpływa na odczucie, sprężystość i cenę.
    latex_type:
      name: Typ lateksu
      description: 'Wskazuje pochodzenie i skład lateksu użytego w materacu: naturalny,
        organiczny, syntetyczny lub mieszany, informując kupujących o trwałości, ekologiczności
        i potencjalnych alergenach.'
    launch_profile:
      name: Profil startu
      description: Wskazuje typową trajektorię startu, niską, średnią lub wysoką,
        którą ma generować shaft kija golfowego.
    launcher_mounting_configuration:
      name: Konfiguracja mocowania wyrzutni
      description: Określa sposób montażu lub konfiguracji wyrzutni do użycia, pomagając
        kupującym, którzy potrzebują opcji samodzielnej, podlufowej lub montowanej
        na szynie.
    layer_construction:
      name: Konstrukcja warstwowa
      description: Określa konstrukcję laminatu tkaniny, np. 2-warstwową, 2,5-warstwową,
        3-warstwową, która wpływa na wagę, pakowność i trwałość.
    layer_design:
      name: Konstrukcja warstwowa
      description: Opisuje konstrukcję siatki na włosy pod kątem warstw lub dwustronności.
    lazy_kate_tension_control_type:
      name: Typ kontroli napięcia lazy kate
      description: Sposób, w jaki lazy kate stosuje opór/napięcie na szpulkach podczas
        skręcania lub nawijania.
    lead_hardware_type:
      name: Typ osprzętu linki prowadzącej
      description: Definiuje styl mocowania lub zapięcia na końcu linki prowadzącej,
        np. zatrzask, klips, pętla, łańcuch itp., wpływający na łatwość użycia, bezpieczeństwo
        i przydatność do dyscypliny.
    leaf_gelatin_grade:
      name: Klasa żelatyny w listkach
      description: Określa standardową klasę mocy używaną dla listków żelatyny.
    leaf_preparation:
      name: Przygotowywanie liści
      description: Opisuje sposób przygotowania liści przed pakowaniem, np. siekane,
        szatkowane lub krojone w julienne.
    leaf_spring_material:
      name: Materiał resoru
      description: Podstawowy materiał konstrukcyjny pakietu resoru piórowego.
    leak_protection_layer:
      name: Warstwa ochrony przed przeciekaniem
      description: Wskazuje, czy wbudowany system pieluchy w jammerach pływackich
        wykorzystuje jedno- czy dwuwarstwową konstrukcję ochrony przed przeciekaniem.
    leash_clip_type:
      name: Typ klipsa smyczy
      description: Określa styl klipsa lub osprzętu używanego do mocowania smyczy
        do obroży lub uprzęży, np. karabińczyk z zamkiem, karabinek, klips obrotowy.
    leash_style:
      name: Styl smyczy
      description: Opisuje konfigurację linki lub styl zwinięcia smyczy.
    leash_type:
      name: Typ smyczy
      description: Klasyfikuje ogólny styl lub konfigurację smyczy opartą na przeznaczeniu
        do szybkiego filtrowania według zamierzonego użycia.
    leavening_action_type:
      name: Typ działania środka spulchniającego
      description: Określa formułę chemiczną lub styl działania proszku do pieczenia,
        np. jednokrotnie działający, dwukrotnie działający, bez aluminium. Ma to bezpośredni
        wpływ na efekty pieczenia i przydatność w przepisach.
    leavening_agent:
      name: Środek spulchniający
      description: Określa podstawowy mechanizm spulchniania używany w cieście.
    led_color_options:
      name: Opcje kolorów LED
      description: Wymienia dostępne do wyboru kolory LED alarmu do wizualnej sygnalizacji
        brań.
    led_indicator_color:
      name: Kolor wskaźnika LED
      description: Określa kolor wskaźnika LED produktu, pomagając wędkarzom dopasować
        wiele alarmów lub osobiste preferencje.
    led_light_color:
      name: Kolor światła LED
      description: Określa kolor wbudowanego oświetlenia LED.
    leek_variety:
      name: Odmiana pora
      description: Określa kultywar lub odmianę pora, umożliwiając rozróżnienie według
        smaku, rozmiaru i sezonu uprawy.
    leg_coverage:
      name: Osłona nóg
      description: Określa, jaką część nogi zakrywa element pianki, np. krótki, pełnej
        długości.
    leg_cuff_style:
      name: Styl mankietu nogawki
      description: Określa styl wykończenia przy otworze nogawki na kostce.
    leg_cut_height:
      name: Wysokość wycięcia nogawki
      description: Wskazuje, jak wysoko wycięty jest otwór na nogę w dole bikini.
    leg_cut_style:
      name: Styl wycięcia nogawki
      description: Opisuje kształt otworu na nogę, który wpływa na wygląd, komfort
        i ślady opalenizny.
    leg_length:
      name: Długość nogawki
      description: Klasyfikuje kąpielówki według względnej długości nogawki, krótkie,
        średnie, długie, aby kupujący mogli wybrać preferowany poziom zakrycia bez
        dzielenia kategorii.
    leg_loop_type:
      name: Typ pętli udowej
      description: Opisuje konstrukcję pętli udowych.
    leg_opening_style:
      name: Styl otworu nogawki
      description: Określa sposób wykończenia otworów nogawek w joggerach, np. elastyczne
        mankiety, doły z zamkiem lub otwarte doły.
    leg_style:
      name: Styl nóg
      description: Definiuje styl projektu lub konstrukcji nóg albo podstawy ławki.
    legging_foot_design:
      name: Konstrukcja stóp w legginsach
      description: Określa, czy legginsy są bez stóp, ze stopami czy konwertowalne
        między oboma stylami.
    leggings_waistband_style:
      name: Styl pasa legginsów
      description: Określa konstrukcję pasa legginsów, wpływającą na komfort, podparcie
        i estetykę.
    lei_closure_style:
      name: Styl zapięcia lei
      description: Opisuje, czy naszyjnik jest ciągłą pętlą, czy ma otwarte końce,
        które można zawiązać lub spiąć wstążką.
    lemon_variety:
      name: Odmiana cytryny
      description: Identyfikuje konkretną odmianę lub odmianę cytryn (np. Eureka,
        Meyer, Amalfi).
    length_adjustment_method:
      name: Metoda regulacji długości
      description: Wskazuje, czy i w jaki sposób można regulować długość skakanki
        w celu dopasowania do użytkownika.
    lens_color_tint:
      name: Kolor/odcień soczewki
      description: kolor lub odcień soczewek okularów ochronnych Supply wraz z produktem.
    lens_construction:
      name: Konstrukcja szybki
      description: Określa budowę strukturalną soczewki (np. pojedyncza szyba, podwójna
        szyba termiczna) w celu określenia odporności na zaparowanie i wydajności
        optycznej.
    lens_tint_category:
      name: Kategoria przyciemnienia szybki
      description: Klasyfikuje ciemność soczewek na podstawie międzynarodowych kategorii
        odcieni, pomagając klientom wybrać soczewki dostosowane do różnych warunków
        oświetleniowych.
    lettuce_variety:
      name: Odmiana sałaty
      description: Identyfikuje konkretną odmianę uprawową sałaty (np. lodową, rzymską,
        masłową), co umożliwia precyzyjne filtrowanie i porównywanie.
    level_of_play:
      name: Poziom gry
      description: Producent podał poziom wydajności, który Align z konkurencyjnością
        i budżetem gracza.
    lever_configuration:
      name: Konfiguracja dźwigni
      description: Oznacza konfigurację dźwigni/identyfikatora sterowania silnikiem
        jednostki pływającej (np. pojedyncza dźwignia lub podwójna dźwignia).
    lever_type:
      name: Typ dźwigni
      description: Rodzaj/mechanizm dźwigni zmiany wysokości dźwięku zamontowanych
        na harfie ciąg znaków.
    license_plate_cover_style:
      name: tabliczka informatyczna styl okładki
      description: Określa rodzaj konstrukcji tabliczki znamionowej (np. pełna tabliczka
        czy zakrętka).
    license_plate_personalization_type:
      name: tabliczka identyfikacyjna typ personalizacji
      description: Określa, czy tabliczka identyfikacyjna jest pusta, wstępnie wydrukowana
        lub stanowi pomoc techniczną konsumenta - dostarczoną w celu dostosowania
        (tekst i/lub grafika).
    license_usage_terms:
      name: Warunki licencji/użytkowania
      description: Prawa do wykorzystania wzoru (np. wyłącznie do użytku osobistego
        lub ograniczonego użytku komercyjnego).
    licensed_sports_property:
      name: Licencjonowany obiekt sportowy
      description: Wskazuje, czy produkt posiada oficjalną licencję ligi/drużyny/organizacji.
    lid_hinge_mechanism:
      name: Mechanizm zawiasu pokrywy
      description: Określa mechanizm zawiasów stosowany w pokrywie, bezpieczeństwo
        Impact i łatwość użytkowania.
    lid_support_positions:
      name: Pokrywa pomocnicza w pozycjach technicznych
      description: Określa obsługiwane pozycje drążka pokrywy fortepianu koncertowego
        (jak daleko można otworzyć pokrywę).
    lie_angle_color_code:
      name: Kod kolorów kąta położenia
      description: Oznacza system kątów położenia oznaczony kolorem stosowany przez
        producenta na niektórych kijach (np. czarna kropka, zielona kropka).
    life_jacket_certification_standard:
      name: Norma certyfikacji kamizelki ratunkowej
      description: Oficjalna klasyfikacja bezpieczeństwa lub norma, którą spełnia
        produkt, np. typ USCG lub poziomy ISO/AS.
    life_raft_certification_standard:
      name: Norma certyfikacji tratwy ratunkowej
      description: Norma bezpieczeństwa/certyfikat, zgodnie z którym tratwa jest budowana
        i serwisowana.
    life_raft_container_type:
      name: Typ kontenera na tratwę ratunkową
      description: Jak spakować tratwę ratunkową do przechowywania i rozładunku.
    life_vest_approval_standard:
      name: Norma zatwierdzenia kamizelki ratunkowej
      description: Określa normę certyfikacji/zatwierdzenia, którą spełnia kamizelka
        ratunkowa.
    life_vest_intended_user:
      name: Kamizelka ratunkowa przeznaczona dla użytkownika
      description: Wskazuje docelową kategorię użytkownika na potrzeby dopasowania
        i zaopatrzenia.
    lifebuoy_approval_standard:
      name: Koło ratunkowe zatwierdzenie standardu
      description: Zatwierdzenie bezpieczeństwa lub norm, z którymi koło ratunkowe
        jest zgodne (np. USCG/SOLAS).
    lifebuoy_features:
      name: Funkcje koła ratunkowego
      description: Bezpieczeństwo funkcjonalne, montaż/obsługa i dołączone akcesoria
        do kół ratunkowych.
    lift_mechanism_type:
      name: Typ mechanizmu podnoszącego
      description: Określa mechanizm wspomagający podnoszenie/opuszczanie lub otwieranie/zamykanie
        łóżka chowanego w ścianie.
    lift_stand_support_point:
      name: Podnośnik/stojak pomoc punktu technicznego
      description: Miejsce styku podnośnika/stanowiska/pomocy technicznej pojazdu.
    lifting_gas_type:
      name: Rodzaj gazu podnoszącego
      description: Określa podstawowy gaz nośny lub ośrodek wypornościowy używany
        przez sterowiec.
    lifting_support_type:
      name: Pomoc w podnoszeniu typu technicznego
      description: Wskazuje, czy podnośnik wykorzystuje najazdy, czy ramiona/podpory
        stykające się z ramą/punktami podnoszenia.
    ligature_and_cap_component_type:
      name: Typ elementu ligatury i nasadki
      description: Wskazuje, czy produkt jest ligaturą, osłoną czy zestawem zawierającym
        oba elementy.
    ligature_material:
      name: Materiał ligaturowy
      description: Główny materiał, z którego wykonana jest ligatura, stykająca się
        z stroikiem i mocująca go (np. metal, skóra, tkanina).
    ligature_plating_or_finish:
      name: Powłoka lub wykończenie ligaturowe
      description: Określa rodzaj powłoki i/lub wykończenia powierzchni stosowanego
        do metalowej ligatury i/lub nasadki do klarnetu.
    ligature_reed_contact_style:
      name: Styl kontaktu z stroikiem ligaturowym
      description: Określa sposób, w jaki ligatura styka się z stroikiem (np. minimalny
        kontakt, wielopunktowy, owijany).
    ligature_screw_position_relative_to_reed:
      name: Pozycja śruby ligaturowej (względem stroika)
      description: Oznacza położenie śruby(śrub) mocującej ligaturę względem strony
        zwróconej w stronę stroika/grającego, po zamontowaniu na ustniku.
    ligature_tension_adjustment_mechanism:
      name: Mechanizm regulacji naprężenia ligatury
      description: Opisuje sposób, w jaki ligatura wywiera/reguluje nacisk na stroik
        (konstrukcja zapięcia).
    ligature_tightening_mechanism_type:
      name: Typ mechanizmu napinającego ligaturę
      description: Określa mechanizm, za pomocą którego ligatura zaciska się wokół
        ustnika i stroika (np. pojedyncza śruba, podwójna śruba, dźwignia/szybkie
        zwalnianie).
    light_bar_housing_material:
      name: Materiał obudowy listwy świetlnej
      description: Główny materiał obudowy/korpusu listwy świetlnej, odporność Impact
        i rozpraszanie ciepła.
    light_bar_lens_material:
      name: Materiał pokrywy listwy świetlnej
      description: Główny materiał soczewki/osłony listwy świetlnej, który może mieć
        wpływ na odporność Impact i przejrzystość optyczną.
    light_bar_mounting_location:
      name: Miejsce mocowania listwy świetlnej
      description: Podstawowe miejsce montażu na pojeździe.
    light_stand_style:
      name: Styl statywu oświetleniowego
      description: Określa styl strukturalny lub współczynnik kształtu stojaka używany
        do mocowania technicznych świateł do efektów specjalnych (np. statyw, uchwyt
        w kształcie litery T, korbka), a nie powierzchnię montażu (ściana/sufit),
        która jest określana przez typ montażu.
    light_switch_function:
      name: Functionsprzełącznika światła
      description: Określa, który obwód(y) oświetleniowy(e) lub Functions(e) steruje
        przełącznikiem.
    lighting_control_protocols_supported:
      name: Obsługiwane protokoły sterowania oświetleniem
      description: Sterowanie/sieć protokołów administratora pomoc techniczną oprócz
        lub zamiast DMX512.
    lighting_effects:
      name: Efekty świetlne
      description: Określa wszelkie zintegrowane funkcje oświetlenia, które poprawiają
        rozgrywkę lub estetykę.
    lighting_mode:
      name: Modeoświetlenia
      description: Wymienia dostępne tryby oświetlenia, takie jak światło stałe, błyskowe,
        stroboskopowe i SOS.
    lily_variety:
      name: Odmiana lilii
      description: Określa komercyjną/botaniczną odmianę lilii sprzedawanej jako Fresh
        cięty kwiat (np. azjatycka, orientalna).
    limb_articulation:
      name: Staw kończyn
      description: Oznacza stopień elastyczności i zginania kończyn manekina (brak,
        stały, półelastyczny, w pełni zginany).
    limb_material:
      name: Materiał kończyny
      description: Materiał podstawowy, z którego wykonane są ramiona łuku lub kuszy,
        Influence wagę, trwałość, wibracje i ogólną wydajność.
    lime_variety:
      name: Odmiana limonki
      description: Identyfikuje konkretną odmianę botaniczną lub handlową sprzedawanej
        limonki.
    line_buoyancy:
      name: Wyporność liny
      description: Opisuje, czy plecionka naturalnie unosi się na wodzie czy tonie,
        a jeśli tak, to w jakim tempie, co ma wpływ na prezentację przynęty i prowadzenie
        żyłki.
    line_purpose:
      name: Cel linii
      description: Definiuje zamierzone Functions linki w systemie latawca (np. przednia
        linka latawca, linka depowera, linka uzdy).
    linen_finish_treatment:
      name: Wykończenie lniane/wariant
      description: Każdy proces wykańczania tkaniny lnianej, który zmienia jej fakturę,
        wygląd lub wytrzymałość.
    linen_weave_type:
      name: Rodzaj splotu lnianego
      description: Określa strukturę splotu tkaniny lnianej, która ma wpływ na jej
        fakturę, oddychalność i układanie się.
    liner_padding_type:
      name: Typ wypełnienia liniowego
      description: Określa konstrukcję lub styl amortyzacji wkładki (np. siateczka,
        lekkie wyściełanie, pikowanie).
    liner_shape:
      name: Shapesliniowe
      description: Opisuje ogólny Shapes wkładu do śpiwora, dzięki czemu klienci mogą
        dopasować go do swojego śpiwora i preferencji dotyczących komfortu.
    liner_type:
      name: Typ wkładki
      description: Wskazuje, czy spodenki posiadają wewnętrzną podszewkę oraz jaki
        jest jej typ.
    lining:
      name: Podkład
      description: Wskazuje, czy i w jaki sposób slipy pływackie są podszyte, w tym
        jaki zakres odzieży obejmuje podszewka wewnątrz.
    lining_material:
      name: Materiał wyściółki
      description: Określa materiał użyty do wewnętrznej wyściółki buta, mający wpływ
        na komfort, oddychalność i ciepło.
    lining_type:
      name: Rodzaj podszewki
      description: Określa, czy strój kąpielowy jest podszyty, a jeśli tak, to w jakim
        zakresie.
    link_connection_style:
      name: Link relacja style
      description: Klasyfikuje sposób łączenia ogniw łańcucha (np. ogniwo szybkozłączne,
        przypięte łączące), umożliwiając rowerzystom wybór właściwej metody montażu
        lub części zamiennej.
    live_bait_form:
      name: Forma żywej przynęty
      description: Określa fizyczną formę lub stan utrwalenia przynęty, np. żywa,
        mrożona lub suszona.
    living_room_furniture_items_included:
      name: Dołączono meble do salonu
      description: Określa poszczególne meble wchodzące w skład zestawu do salonu,
        pomagając kupującym szybko zrozumieć dokładnie, jakie elementy, np. sofa,
        dwuosobowa sofa, stolik kawowy, są dołączone.
    load_mechanism:
      name: Mechanizm ładowania
      description: Określa podstawową metodę generowania lub dodawania oporu w maszynie,
        np. selekcyjny stos obciążeń, obciążenie talerzami, obciążenie taśmami.
    lock_cylinder_type:
      name: Typ cylindra zamka
      description: Określa typ cylindra/rdzenia klucza, istotny dla odporności na
        otwieranie wytrychem i kluczy zamiennych.
    lock_security_level:
      name: Poziom zabezpieczenia zamka
      description: Opisuje cechy odporności zabezpieczeń zamka/cylindra na otwieranie
        wytrychem i wiercenie.
    lock_system:
      name: System blokady
      description: Typ systemu blokady bezpieczeństwa używanego do utrzymywania podnośnika
        na wysokości.
    locker_bench_configuration:
      name: Konfiguracja ławki do szatni
      description: Opisuje orientację lub konfigurację konstrukcyjną ławki do szatni,
        np. jednostronna, dwustronna wyspowa, montowana do ściany.
    locomotive_prototype_power_type:
      name: Typ napędu pierwowzoru lokomotywy
      description: Określa typ napędu rzeczywistej lokomotywy przedstawionej przez
        model.
    locomotive_wheel_arrangement_whyte_notation:
      name: Układ osi lokomotywy według notacji Whyte’a
      description: Układ osi pierwowzoru lokomotywy, np. 4-6-2 Pacific.
    loft_bed_height_classification:
      name: Klasyfikacja wysokości łóżka antresolowego
      description: 'Wskazuje ogólny styl wysokości łóżka antresolowego: niskie, średnie,
        wysokie, bardzo wysokie, pomagając kupującym dopasować wysokość sufitu i wymagania
        dotyczące przestrzeni pod łóżkiem.'
    logo_application_method:
      name: Metoda nakładania logo
      description: Opisuje sposób naniesienia herbu szkoły lub logo na odzież, np.
        haftowane lub drukowane.
    logo_label_compatible_fabric_weight:
      name: Kompatybilna gramatura tkaniny dla etykiety z logo
      description: Zalecana kategoria gramatury tkaniny do mocowania etykiety bez
        zniekształceń lub nadmiernej objętości.
    logo_label_edge_finish:
      name: Wykończenie krawędzi etykiety z logo
      description: Określa konstrukcję/wykończenie krawędzi etykiety, które wpływa
        na odporność na strzępienie i komfort przy skórze.
    logo_label_print_production_method:
      name: Metoda druku/produkcji etykiety z logo
      description: Sposób naniesienia/utworzenia logo na powierzchni etykiety.
    long_block_completeness:
      name: Kompletność long blocku
      description: Określa, jakie główne komponenty są dołączone do zespołu long blocku.
    long_john_pieces_included:
      name: Elementy kompletu bielizny termicznej
      description: Wyjaśnia, czy produkt obejmuje tylko dół, tylko górę czy obie części
        kompletu bielizny termicznej.
    longan_variety:
      name: Odmiana longanu
      description: Określa kultywar lub odmianę handlową owocu longanu, np. Kohala,
        Biew Kiew, pomagając kupującym rozpoznać pożądane cechy smaku, rozmiaru i
        słodyczy.
    loom_accessories_included:
      name: Dołączono akcesoria do krosna
      description: Kluczowe akcesoria dołączone do krosna w pudełku/opakowaniu.
    loom_finish:
      name: Wykończenie krosna
      description: Wykończenie powierzchni krosna, głównie w przypadku krosien drewnianych.
    loom_folding_portability_design_type:
      name: Typ konstrukcji składania/przenośności krosna
      description: Wskazuje, czy i w jaki sposób krosno składa się/zapada do transportu
        lub kompaktowego przechowywania.
    loom_frame_folding_design:
      name: Konstrukcja składania ramy krosna
      description: Określa, czy i w jaki sposób rama krosna stołowego składa się,
        zapada lub demontuje do przechowywania albo transportu.
    loom_tension_adjustment_method:
      name: Metoda regulacji napięcia krosna
      description: Podstawowa metoda używana do regulacji napięcia osnowy na krośnie.
    loom_tie_up_system:
      name: System podwiązania krosna
      description: Typ systemu podwiązania/połączenia używanego między pedałami, lammami
        i nicielnicami, np. Texsolv lub metalowy łańcuch.
    loquat_variety:
      name: Odmiana nieśplika
      description: Określa kultywar lub odmianę nieśplika, odzwierciedlając różnice
        w rozmiarze, smaku, sezonie dojrzewania i wyglądzie.
    lubricant_features:
      name: Cechy smaru
      description: Wyróżnia specjalne cechy użytkowe, dodatki lub korzyści smaru.
    lubrication_requirement:
      name: Wymóg smarowania
      description: Wskazuje, czy pas bieżni jest fabrycznie zabezpieczony/niewymagający
        konserwacji czy wymaga regularnego smarowania lub woskowania.
    lubrication_type:
      name: Typ smarowania
      description: Wskazuje, czy pas bieżni jest wstępnie przygotowany/bezobsługowy,
        czy wymaga regularnego smarowania lub woskowania.
    lug_nut_seat_profile:
      name: Profil gniazda nakrętki koła
      description: Określa profil gniazda nakrętki koła wymagany przez felgę, aby
        zapewnić prawidłową kompatybilność nakrętki i bezpieczny montaż.
    lumbar_support_type:
      name: Typ podparcia lędźwiowego
      description: Opisuje styl podparcia lędźwiowego zapewnianego przez krzesło,
        np. odpinana poduszka, regulowany mechanizm, masaż.
    lunge_trainer_style:
      name: Styl trenażera do lonżowania
      description: Definiuje konstrukcję trenażera do lonżowania.
    lure_buoyancy:
      name: Wyporność przynęty
      description: Określa zachowanie przynęty w toni wodnej w spoczynku lub podczas
        prowadzenia, np. unoszenie się na powierzchni, zawieszenie w pół wody lub
        opadanie.
    luster:
      name: Połysk
      description: Opisuje sposób oddziaływania światła z powierzchnią okazu, np.
        szklisty, metaliczny.
    lychee_cultivar:
      name: Kultywar liczi
      description: Określa konkretną odmianę lub kultywar liczi, np. Brewster, Hak
        Ip lub Mauritius, które mogą różnić się smakiem, rozmiarem pestki, sezonem
        zbioru i ceną.
    lyre_flip_folder_mounting_location:
      name: Miejsce montażu liry/flip folderu
      description: Miejsce, w którym lira lub flip folder mają być zamontowane na
        instrumencie albo akcesorium, np. czara głosowa, rurka ustnikowa, statyw.
    lyrics_display_type:
      name: Typ wyświetlania tekstu piosenki
      description: Sposób wyświetlania tekstu piosenki, jeśli jest obsługiwany, podczas
        karaoke.
    magazine_compatibility:
      name: Kompatybilność z magazynkami
      description: Określa podstawowe kalibry magazynków lub typy magazynków, do których
        przechowywania zaprojektowano wbudowane ładownice kamizelki.
    magnet_requirement:
      name: Wymóg magnesu
      description: Wskazuje, czy czujnik wymaga zewnętrznego magnesu do działania.
    magnet_toy_storage_included:
      name: Dołączone przechowywanie zabawki magnetycznej
      description: Typ pojemnika/futerału dołączonego do zabawki magnetycznej do organizacji
        na biurku i podróży.
    malanga_variety:
      name: Odmiana malangi
      description: Określa konkretną odmianę malangi/korzenia taro w sprzedaży, pomagając
        kupującym wybrać pożądany smak, kolor lub zastosowanie kulinarne.
    malt_color_rating_system:
      name: System oceny koloru słodu
      description: 'Określa, do której skali odnosi się podany kolor: Lovibond, SRM
        lub EBC.'
    malt_crush:
      name: Śrutowanie słodu
      description: Wskazuje, czy słód bazowy jest sprzedawany w całości/nieśrutowany
        czy wstępnie śrutowany, a jeśli tak, jaki jest styl śrutowania.
    malt_form:
      name: Forma słodu
      description: Wskazuje, czy produkt jest sprzedawany jako całe ziarna czy przetworzony
        do zacierania, np. śrutowany.
    malt_intended_use:
      name: Przeznaczenie słodu
      description: 'Zamierzone podstawowe zastosowanie słodu: browarnictwo, destylacja
        lub podwójne zastosowanie.'
    malt_treatment:
      name: Obróbka słodu
      description: Opisuje sposób przetworzenia ziarna/słodu poza standardowym suszeniem
        w piecu, typowe procesy specjalistyczne.
    malt_usage_purpose:
      name: Przeznaczenie użycia słodu
      description: Opisuje podstawowy wkład funkcjonalny słodu specjalnego w recepturę
        piwa.
    man_overboard_system_type:
      name: Typ systemu człowiek za burtą
      description: Określa podstawową kategorię rozwiązania człowiek za burtą (MOB)
        zapewnianą przez produkt.
    mandolin_back_sides_wood:
      name: Drewno tyłu i boków mandoliny
      description: Określa gatunek drewna użyty na tył i boki mandoliny.
    mandolin_body_top_wood:
      name: Drewno płyty wierzchniej mandoliny
      description: Podstawowe drewno/materiał użyty na płytę rezonansową mandoliny.
    mandolin_bridge_type:
      name: Typ mostka mandoliny
      description: Określa styl mostku użytego w mandolinie.
    mandolin_pickup_configuration:
      name: Konfiguracja przetworników mandoliny
      description: Wskazuje, czy mandolina ma elektronikę i jaki typ systemu przetwornika
        jest zainstalowany.
    mandolin_string_configuration:
      name: Konfiguracja strun mandoliny
      description: Określa konfigurację strun mandoliny według łącznej liczby strun
        i liczby chórów, np. 8 strun / 4 chóry.
    mangosteen_variety:
      name: Odmiana mangostanu
      description: Określa konkretny gatunek lub kultywar mangostanu albo blisko spokrewnionego
        owocu Garcinia w sprzedaży.
    mannequin_style:
      name: Styl manekina
      description: Opisuje projekt konstrukcyjny lub styl budowy manekina treningowego.
    manufacturing_process:
      name: Proces produkcji
      description: Podstawowa metoda produkcji korpusu lub szpuli kołowrotka, np.
        obróbka CNC, odlew ciśnieniowy.
    map_coverage_sky_planet_body:
      name: Pokrycie mapy (niebo/ciało planetarne)
      description: 'Wskazuje, co przedstawia mapa: nocne niebo (konstelacje) lub konkretne
        ciało planetarne.'
    map_format:
      name: Format mapy
      description: Definiuje fizyczną lub cyfrową formę prezentacji map i przewodników
        myśliwskich.
    map_sensor_output_signal_type:
      name: Typ sygnału wyjściowego czujnika MAP
      description: Określa typ sygnału wyjściowego, który czujnik MAP przekazuje do
        jednostki sterującej silnika (ECU).
    map_size_sheet:
      name: Rozmiar mapy (arkusz)
      description: Określa końcowy rozmiar arkusza mapy/plakatu/planisfery, aby pomóc
        w ekspozycji i kompatybilności, np. rozmiar ramy, przestrzeń na ścianie.
    marabou_feather_form:
      name: Forma piór marabuta
      description: Forma produktu z piór marabuta w sprzedaży.
    marabou_feather_treatment:
      name: Obróbka piór marabuta
      description: Sposób przetworzenia lub wykończenia piór marabuta do zastosowań
        rękodzielniczych.
    marble_track_set_feature_modules:
      name: Moduły funkcji zestawu toru kulkowego
      description: Wyróżnia specjalne moduły funkcjonalne dołączone do zestawu, np.
        windę, wyrzutnię, zwrotnice.
    marine_flare_certification_standard:
      name: Certyfikacja/norma flary morskiej
      description: Wskazuje, jakie certyfikacje lub normy bezpieczeństwa morskiego
        deklaruje flara.
    marine_safety_standard_compliance:
      name: Zgodność z normami bezpieczeństwa morskiego
      description: Wskazuje, jakie formalne normy lub dopuszczenia dotyczące bezpieczeństwa
        na wodzie spełnia akcesorium.
    marine_transmission_type:
      name: Typ przekładni morskiej
      description: Określa typ przekładni morskiej sparowanej z silnikiem stacjonarnym,
        np. napęd bezpośredni lub V-drive.
    marker_action_type:
      name: Typ działania znacznika
      description: Opisuje podstawowy mechanizm strzelania/działania markera.
    marker_caliber:
      name: Kaliber markera
      description: Określa średnicę kulek paintballowych, do których wystrzeliwania
        zaprojektowano marker.
    marking_durability:
      name: Trwałość oznakowania
      description: Wskazuje, jak długo namalowana linia ma pozostać widoczna w normalnych
        warunkach, np. tymczasowo (do 3 tygodni), półtrwale (do 6 miesięcy) lub trwale
        (ponad 6 miesięcy).
    marking_tip_type:
      name: Typ końcówki znakującej
      description: Typ wkładu znakującego używanego przez cyrkiel do rysowania, np.
        uchwyt na grafit, tusz lub rylec.
    marshmallow_processing_method:
      name: Metoda przetwarzania pianek marshmallow
      description: Opisuje specjalną obróbkę zastosowaną do pianek marshmallow, która
        wpływa na teksturę, trwałość lub smak.
    marshmallow_size:
      name: Rozmiar pianki
      description: Klasyfikuje względny rozmiar pojedynczych kawałków pianek marshmallow.
    martial_arts_belt_rank:
      name: Stopień pasa sztuk walki
      description: Wskazuje poziom umiejętności/rangę reprezentowaną przez kolor pasa
        lub specjalną kombinację kolorów.
    mask_bib_type:
      name: Typ śliniaka maski
      description: Określa typ śliniaka w masce szermierczej, np. standardowy materiałowy,
        przewodzący, zdejmowany lub brak.
    mask_cage_material:
      name: Materiał kratki maski
      description: Materiał użyty konkretnie na kratkę twarzową lub ramę maski.
    mask_goggle_design:
      name: Konstrukcja maski/gogli
      description: Definiuje ogólną konstrukcję lub styl zakrycia sprzętu ochronnego.
    mask_skirt_material:
      name: Materiał brzegu maski
      description: Określa materiał miękkiego fartucha, który zapewnia wodoszczelne
        uszczelnienie między maską a twarzą.
    mask_strap_material:
      name: Materiał paska maski
      description: Określa materiał paska mocującego maskę na głowie.
    mass_air_flow_sensor_measurement_type:
      name: Typ pomiaru przepływomierza masowego powietrza
      description: Określa technologię pomiarową/typ sygnału wyjściowego używany przez
        czujnik MAF.
    mass_air_flow_sensor_mounting_type:
      name: Typ montażu czujnika masowego przepływu powietrza
      description: Sposób montażu/instalacji czujnika MAF lub zespołu czujnika w układzie
        dolotowym.
    massage_feature:
      name: Funkcja masażu
      description: Wskazuje, czy regulowana podstawa ma zintegrowaną funkcję masażu,
        a jeśli tak, ile stref masażu oferuje.
    mast_attachment_interface:
      name: Interfejs mocowania masztu
      description: Określa standard połączenia między kadłubem a masztem, pomagając
        kupującym zapewnić dopasowanie komponentów.
    mast_base_type:
      name: Typ podstawy masztu
      description: Określa interfejs montażowy łączący maszt z deską lub adapterem.
    mast_bend_curve:
      name: Krzywa ugięcia masztu
      description: Profil ugięcia masztu, który określa kompatybilność z żaglem i
        prowadzenie.
    mast_diameter_type:
      name: Typ średnicy masztu
      description: Standardowa klasyfikacja średnicy masztu windsurfingowego, np.
        RDM, SDM, MDM, używana do sprawdzania kompatybilności.
    mat_backing_type:
      name: Typ spodu maty
      description: Określa typ spodu na spodniej stronie maty, który pomaga utrzymać
        ją na miejscu na różnych powierzchniach.
    mat_installation_method:
      name: Metoda instalacji maty
      description: Wskazuje, jak mata jest instalowana lub mocowana na miejscu.
    mat_style:
      name: Styl maty
      description: Definiuje styl konstrukcji lub formę maty, np. mata składana, płytka
        łączona, crash pad.
    maternity_panel_type:
      name: Typ panelu ciążowego
      description: Wskazuje styl elastycznego panelu lub pasa zaprojektowanego tak,
        aby dopasowywał się do rosnącego brzucha w ciąży.
    maternity_waistband_style:
      name: Styl pasa ciążowego
      description: Wskazuje konstrukcję i umiejscowienie pasa lub panelu brzusznego
        właściwego dla spodni ciążowych, opisując, jak odzież podtrzymuje rosnący
        brzuch.
    mattress_top_type:
      name: Typ górnej warstwy materaca
      description: Określa styl górnej warstwy lub konstrukcji powierzchni materaca,
        np. pillow top lub tight top.
    maturation_vessel_material:
      name: Materiał naczynia do leżakowania
      description: Określa podstawowy materiał naczynia lub beczki używanej do starzenia
        shochu.
    maximum_quilt_size_supported:
      name: Maksymalny obsługiwany rozmiar kołdry
      description: Maksymalny rozmiar kołdry/projektu, jaki może pomieścić rama, zwykle
        opisywany rozmiarami łóżek lub maksymalną szerokością.
    meal_course:
      name: Pora posiłku
      description: Określa typową okazję posiłkową dla produktu.
    meal_preparation_state:
      name: Stan przygotowania posiłku
      description: Wskazuje, ile przygotowania jest wymagane przed spożyciem, np.
        gotowe do spożycia, zestaw posiłkowy.
    meat_processing_state:
      name: Stan przetworzenia mięsa
      description: Wskazuje stopień ugotowania lub peklowania produktu mięsnego przed
        sprzedażą.
    meat_quality_grade:
      name: Klasa jakości mięsa
      description: Wskazuje klasę jakości lub klasyfikację przypisaną mięsu przez
        uznany organ klasyfikacyjny, np. USDA, MSA, Wagyu.
    meat_raising_claim:
      name: Deklaracja dotycząca chowu mięsa
      description: Wyróżnia typowe deklaracje dotyczące dobrostanu zwierząt lub praktyk
        hodowlanych związane z mięsem, np. karmione trawą, z wolnego wybiegu.
    mechanical_loom_assembly_status:
      name: Stan złożenia krosna mechanicznego
      description: Sposób wysyłki lub dostarczenia krosna pod względem wymaganego
        montażu.
    mechanical_loom_weaving_type:
      name: Typ tkania krosna mechanicznego
      description: Podstawowy mechanizm/typ tkania obsługiwany przez krosno.
    mechanical_puzzle_primary_mechanism:
      name: Podstawowy mechanizm łamigłówki mechanicznej
      description: Podstawowa interakcja/mechanizm używany do rozwiązania łamigłówki
        mechanicznej.
    mechanical_puzzle_solution_format:
      name: Format rozwiązania łamigłówki mechanicznej
      description: Format, w jakim podawane są wskazówki/rozwiązania, jeśli są dołączone.
    medal_attachment_style:
      name: Styl mocowania medalu
      description: Określa, w jaki sposób medal ma być noszony lub eksponowany, np.
        wstążka na szyję, zapięcie na pin.
    medal_award_level:
      name: Poziom nagrody medalu
      description: Określa poziom nagrody reprezentowany przez medal, np. 1. miejsce,
        uczestnik.
    medal_finish:
      name: Wykończenie medalu
      description: Określa wykończenie powierzchni medalu, czyli wizualny połysk/teksturę,
        niezależnie od materiału.
    medal_packaging:
      name: Opakowanie medalu
      description: Wskazuje typ opakowania prezentacyjnego dołączonego do medalu.
    melodica_accessory_set_included:
      name: Dołączony zestaw akcesoriów do melodyki
      description: Wskazuje, które typowe akcesoria są dołączone do zestawu z melodyką.
    melodica_air_chamber_material:
      name: Materiał komory powietrznej melodyki
      description: Materiał komory powietrznej/korpusu melodyki, np. ABS, drewno itp.,
        gdy sprzedawcy odróżniają go od innych części.
    melodica_included_accessories:
      name: Akcesoria dołączone do harmonijki klawiszowej
      description: Akcesoria dołączone do melodyjki klawiszowej w pudełku.
    melodica_key_color_scheme:
      name: Schemat kolorów klawiszy melodyki
      description: Schemat kolorów klawiszy, nie korpusu, który wpływa na czytelność,
        zwłaszcza dla dzieci/początkujących.
    melodica_mouthpiece_configuration:
      name: Konfiguracja ustnika melodyki
      description: Wskazuje, które interfejsy dmuchania są dołączone/używane do gry
        na melodyce.
    melodica_mouthpiece_type:
      name: Typ ustnika melodyki
      description: Styl interfejsu dmuchania dołączonego do melodyki, czyli ustnik
        i/lub elastyczna rurka.
    melodica_reed_plate_material:
      name: Materiał płyty stroika harmonijki klawiszowej
      description: Materiał płytki stroikowej, odrębny od materiału korpusu całego
        instrumentu, który może wpływać na trwałość i brzmienie.
    melodica_size_class:
      name: Klasa rozmiaru melodyki
      description: Ogólna klasa rozmiaru/przenośności melodyki, zwykle oparta na grupach
        liczby klawiszy i formie, np. modele mini/uczniowskie, standardowe lub o rozszerzonej
        skali.
    melon_variety:
      name: Odmiana melona
      description: Określa konkretny typ melona w produkcie, aby pomóc kupującym szybko
        rozpoznać preferowaną odmianę.
    memory_foam_infusion_material:
      name: Materiał infuzji pianki memory
      description: Określa specjalne substancje dodane do pianki memory w celu chłodzenia,
        kontroli zapachu lub działania przeciwdrobnoustrojowego.
    memory_wire_gauge:
      name: Grubość drutu pamięciowego
      description: Określa rozmiar American Wire Gauge (AWG) drutu pamięciowego.
    memory_wire_project_size:
      name: Rozmiar projektu drutu pamięciowego
      description: Określa zamierzoną formę biżuterii/rozmiar zwoju, do którego ukształtowano
        drut pamięciowy, np. bransoletka, naszyjnik, pierścionek.
    metal_purity:
      name: Próba metalu
      description: Wskazuje próbę lub stopień czystości metalu użytego w biżuterii,
        zwykle wyrażony w karatach (K) lub częściach na tysiąc.
    metrics_counted:
      name: Zliczane metryki
      description: Wymienia poszczególne statystyki lub zdarzenia, które licznik ma
        śledzić.
    metronome_display_style:
      name: Styl wyświetlania metronomu
      description: Określa sposób wyświetlania/wskazywania tempa użytkownikowi, np.
        wskazówka/wahadło, numeryczny wyświetlacz LED/LCD lub migające światło.
    metronome_output_method:
      name: Metoda wyjścia metronomu
      description: Określa dostępne metody wyjścia dźwięku/sygnału rytmu metronomu.
    microphone_toy_feature_set:
      name: Zestaw funkcji mikrofonu zabawkowego
      description: Kluczowe funkcje mikrofonu zabawkowego związane z zabawą, np. efekty
        głosowe, wzmocnienie, nagrywanie itp.
    midi_output_type:
      name: Typ wyjścia MIDI
      description: Określa typy wyjścia MIDI zapewniane przez moduł triggerów.
    military_branch:
      name: Rodzaj sił zbrojnych
      description: Określa rodzaj sił zbrojnych, dla którego mundur jest wydany lub
        którym jest inspirowany.
    milk_base_type:
      name: Typ bazy mlecznej
      description: Określa podstawowe mleko lub alternatywę mleka użyte w napoju,
        jeśli występuje.
    milk_feeding_method:
      name: Metoda żywienia zwierząt mlecznych
      description: Wskazuje, jak karmiono zwierzęta źródłowe, np. trawą lub zbożem,
        co może wpływać na smak i profil odżywczy.
    milk_processing_method:
      name: Metoda przetwarzania mleka
      description: Określa obróbkę lub technikę przetwarzania mleka, której zostało
        poddane, wpływającą na bezpieczeństwo, trwałość i właściwości odżywcze.
    milk_source_animal:
      name: Pochodzenie zwierzęce mleka
      description: Określa zwierzę, od którego pozyskano mleko, pomagając konsumentom
        wybrać nabiał krowi, kozi, bawoli lub inny pochodzenia zwierzęcego.
    millet_processing_method:
      name: Metoda przetwarzania prosa
      description: Wskazuje podstawową metodę przetwarzania lub stan ziarna prosa,
        np. niepolerowane, łuskane, kiełkowane.
    millet_variety:
      name: Odmiana prosa
      description: Określa konkretny typ ziarna prosa zawartego w produkcie, np. perłowe,
        włośnica ber, palczaste.
    milling_process:
      name: Proces mielenia
      description: Wskazuje metodę produkcji użytą do mielenia mączki, która może
        wpływać na smak, ekspozycję na ciepło i profil odżywczy.
    mint_mark:
      name: Znak mennicy
      description: Znak mennicy widoczny na monecie, jeśli dotyczy.
    mirror_configuration:
      name: Konfiguracja luster
      description: Określa styl lub konstrukcję lustra dołączonego do zestawu toaletki.
    mirror_coverage:
      name: Pokrycie lustrami
      description: Opisuje zakres paneli lustrzanych na drzwiach przesuwnych.
    mirror_curvature_type:
      name: Typ krzywizny lustra
      description: Określa, czy powierzchnia lustra jest wypukła, płaska czy wklęsła,
        wpływając na pole widzenia.
    mirror_mounting_location:
      name: Miejsce montażu lusterka
      description: Określa, gdzie na rowerze lub użytkowniku lusterko ma być zamontowane.
    mirror_shape:
      name: Kształt lustra
      description: Wskazuje geometryczny kształt lub styl głównego lustra dołączonego
        do zestawu toaletki.
    mix_ratio:
      name: Proporcja mieszania
      description: Określa zalecaną proporcję rozcieńczenia płynu chłodzącego z wodą
        w przypadku koncentratów lub potwierdza stałą proporcję gotowej mieszanki
        dla produktów wstępnie rozcieńczonych.
    mma_glove_type:
      name: Typ rękawic MMA
      description: Wskazuje podstawowe zamierzone zastosowanie lub styl rękawicy w
        treningu albo zawodach MMA.
    mobility_features:
      name: Cechy mobilności
      description: Wskazuje wbudowane elementy ułatwiające przemieszczanie lub przenoszenie,
        takie jak kółka lub składane nogi.
    model_aircraft_assembly_level:
      name: Poziom montażu modelu samolotu
      description: Wskazuje, ile składania jest wymagane, zanim samolot będzie można
        użyć.
    model_making_kit_items_included:
      name: Elementy zestawu do modelarstwa
      description: Wymienia elementy dołączone do zestawu lub pakietu modelarskiego,
        np. farbę, klej, pędzel.
    model_making_product_type:
      name: Typ produktu modelarskiego
      description: 'Określa, czym zasadniczo jest produkt w modelarstwie: zestawem,
        akcesorium, narzędziem lub materiałem, aby usprawnić przeglądanie i filtrowanie
        różnych typów produktów w modelarstwie.'
    model_rocket_kit_contents:
      name: Zawartość zestawu rakiety modelarskiej
      description: Wskazuje, czy produkt jest kompletnym wielostopniowym zestawem
        rakiety modelarskiej czy dodatkiem/modułem/zestawem części, np. komponentami
        stopnia przyspieszającego lub podtrzymującego.
    model_rocket_kit_format:
      name: Format zestawu modelu rakiety
      description: Określa, czy rakieta jest sprzedawana jako zestaw oraz poziom gotowości
        do montażu.
    model_rocket_motor_impulse_class:
      name: Klasa impulsu silnika rakiety modelarskiej
      description: Wskazuje standardową klasę całkowitego impulsu silnika rakiety
        modelarskiej, np. A, B, C itd.
    model_rocket_motor_mount_size:
      name: Rozmiar mocowania silnika rakiety modelarskiej
      description: Określa średnicę obudowy silnika, do której przyjęcia zaprojektowano
        mocowanie silnika rakiety.
    model_rocket_power_source_required:
      name: Wymagane źródło zasilania rakiety modelarskiej
      description: Wskazuje, czy produkt wymaga baterii/zewnętrznego zasilania i jakiego
        rodzaju.
    model_rocket_propellant_type:
      name: Typ paliwa rakiety modelarskiej
      description: Określa paliwo/system silnikowy używany do napędu produktów rakiet
        modelarskich.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Zalecany rozmiar pręta lub szyny startowej rakiety modelarskiej
      description: Określa średnicę pręta startowego lub rozmiar szyny, do których
        rakieta jest zaprojektowana, np. pręt 1/8 cala, szyna startowa 1010.
    model_rocket_recovery_method:
      name: Metoda odzysku rakiety modelarskiej
      description: Główny system służący do bezpiecznego odzyskiwania rakiety po locie.
    model_rocket_recovery_system_type:
      name: Typ systemu odzysku rakiety modelarskiej
      description: Określa podstawową metodę odzysku używaną do bezpiecznego sprowadzenia
        rakiety po locie.
    model_rocket_staging:
      name: Stopniowanie rakiety modelarskiej
      description: Wskazuje, z iloma napędzanymi stopniami rakieta modelarska jest
        zaprojektowana do lotu.
    model_train_accessory_electrical_connection_type:
      name: Typ połączenia elektrycznego akcesorium kolejki modelarskiej
      description: Określa styl złącza lub zacisku używany do podłączania zasilanych
        akcesoriów kolejki modelarskiej do makiety, jeśli dotyczy.
    model_train_coupler_type:
      name: Typ sprzęgu kolejki modelarskiej
      description: Określa standard sprzęgu zamontowanego w taborze lub lokomotywie
        kolejki modelarskiej.
    model_train_gauge:
      name: Skala do porównywania wielkości modeli pociągów
      description: Określa system rozstawu kolejki modelarskiej, do którego akcesorium
        jest przeznaczone, jeśli dotyczy, pomagając zapewnić fizyczną kompatybilność
        z torem i makietą użytkownika.
    model_train_lighting_features:
      name: Funkcje oświetlenia modelu pociągu
      description: Określa funkcje oświetlenia dołączone w kolejce/lokomotywie modelarskiej.
    model_train_power_pickup_method:
      name: Metoda poboru zasilania kolejki modelarskiej
      description: 'Określa, w jaki sposób model pobiera zasilanie do pracy: z toru,
        z baterii itp.'
    model_train_scale:
      name: Skala modelu pociągu
      description: Określa standard skali/rozmiaru kolejki modelarskiej, czyli relację
        między modelem a rzeczywistym pociągiem.
    model_train_sound_features:
      name: Funkcje dźwiękowe kolejki modelarskiej
      description: Wskazuje, czy model zawiera pokładowe efekty dźwiękowe i jaki typ
        dźwięku oferuje.
    model_train_track_gauge:
      name: Rozstaw toru kolejki modelarskiej
      description: Określa rozstaw toru/system torów, po którym model jest zaprojektowany
        do jazdy, np. rozstaw standardowy, warianty wąskotorowe lub rozstawy właściwe
        dla marki/systemu, jeśli dotyczy.
    modeling_dough_base_material:
      name: Materiał bazowy masy modelarskiej
      description: Podstawowa baza/skład masy modelarskiej, np. na bazie pszenicy/mąki
        lub na bazie polimerów.
    modeling_dough_features:
      name: Cechy masy modelarskiej
      description: Kluczowe cechy funkcjonalne masy modelarskiej, według których kupujący
        często filtrują produkty.
    modification_level:
      name: Poziom modyfikacji
      description: Wskazuje stopień modyfikacji słodu, czyli jak dokładnie rozłożono
        bielmo/białka jęczmienia, często podsumowywany jako niedomodyfikowany, zmodyfikowany
        lub przemodyfikowany.
    molasses_base_ingredient:
      name: Składnik bazowy melasy
      description: Określa podstawowe źródło roślinne lub owocowe, z którego produkowana
        jest melasa.
    molasses_grade:
      name: Klasa melasy
      description: Klasyfikuje melasę według etapu ekstrakcji/rafinacji, co bezpośrednio
        wpływa na intensywność smaku, kolor i profil odżywczy.
    mold_material:
      name: Materiał formy
      description: Podstawowy skład materiałowy samej formy, np. silikon, plastik,
        metal.
    molle_compatibility:
      name: Kompatybilność z MOLLE
      description: Wskazuje, czy kamizelka ma taśmy MOLLE/PALS do mocowania modułowych
        ładownic i akcesoriów.
    motor_belt_type:
      name: Typ paska silnika
      description: Definiuje konstrukcję/profil pasa stosowanego w układzie napędowym
        bieżni.
    motor_configuration:
      name: Konfiguracja silnika
      description: Wskazuje liczbę niezależnych silników napędowych wykorzystywanych
        w skuterze.
    motor_mounting_configuration:
      name: Konfiguracja mocowania silnika
      description: Opisuje sposób montażu/implementacji silnika w zestawie konwersja
        do skutera.
    motor_mounting_position:
      name: Położenie montażu silnika
      description: Wskazuje, w którym miejscu hulajnogi elektrycznej zamontowany jest
        silnik, np. w piaście koła przedniego, piaście koła tylnego, piaście koła
        podwójnego lub napędzie MID.
    motor_position:
      name: Pozycja silnika
      description: Wskazuje gdzie znajduje się silnik w rowerze elektrycznym, Influence
        obsługę i konserwację.
    motor_vehicle_a_v_integration_features:
      name: Funkcje integracji systemów audiowizualnych w pojazdach silnikowych
      description: Funkcje integracji smartfona z pojazdem obsługiwane przez jednostkę
        główną (np. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Aplikacja/pozycja żarówki samochodowej
      description: Określa docelowe położenie oświetlenia pojazdu lub Functions do
        których żarówka jest przeznaczona (np. światła mijania, światła hamowania).
    motor_vehicle_bulb_approval_standard:
      name: Żarówka samochodowa zatwierdzenie standardu
      description: Wskazuje zgodność z przepisami/zatwierdzenie oznakowania do użytku
        drogowego na rynku ukrytym.
    motor_vehicle_oxygen_sensor_bank:
      name: Zespół czujników tlenu do pojazdu silnikowego
      description: Wskazuje, do którego rzędu cylindrów silnika pasuje czujnik tlenu
        (np. Bank 1 czy Bank 2) w przypadku silników w układzie V/bokser. Nie dotyczy
        silników rzędowych.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Liczba przewodów czujnika tlenu w pojeździe silnikowym
      description: Liczba przewodów w wiązce czujnika tlenu.
    motor_vehicle_oxygen_sensor_position:
      name: Pozycja czujnika tlenu w pojeździe silnikowym
      description: Określa miejsce montażu czujnika tlenu (O2) w układzie wydechowym
        względem katalizatora.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Numer czujnika tlenu w pojeździe silnikowym
      description: Oznacza numer czujnika (np. Czujnik 1 lub Czujnik 2) w ramach danego
        banku/pozycji.
    motor_vehicle_oxygen_sensor_type:
      name: Typ czujnika tlenu do pojazdu silnikowego
      description: Określa konstrukcję/technologię czujnika tlenu.
    motor_vehicle_paint_application_method:
      name: Lakierowanie pojazdów silnikowych metoda aplikacji
      description: W jaki sposób farba ma być nakładana na powierzchnię pojazdu.
    motor_vehicle_paint_system_step:
      name: Krok po kroku system lakierowania pojazdu silnikowego
      description: Wskazuje, do którego etapu lub komponentu systemu lakierowania
        pojazdów przeznaczony jest produkt (np. podkład, warstwa bazowa, lakier bezbarwny).
    motor_vehicle_speaker_mounting_type:
      name: Typ montażu głośnika w pojeździe silnikowym
      description: Sposób montażu głośnika w pojeździe (forma montażu).
    motor_vehicle_subwoofer_size:
      name: Rozmiar subwoofera do pojazdu silnikowego
      description: Nominalna średnica przetwornika subwoofera (np. 8 cali, 10 cali,
        12 cali), używana w celu dopasowania przestrzeni pojazdu i kompatybilności
        z obudową.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfiguracja cewki drgającej subwoofera pojazdu silnikowego
      description: Liczba/konfiguracja cewek drgających używana w celu dopasowania
        opcji okablowania wzmacniacza (np. SVC lub DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedancja cewki drgającej subwoofera pojazdu silnikowego (na cewkę)
      description: Impedancja znamionowa każdej cewki drgającej (nie ostateczna obciążaj
        przewodem), używana do obliczeń okablowania.
    motor_vehicle_voltage_regulator_type:
      name: Typ regulatora napięcia pojazdu silnikowego
      description: Oznacza technologię/formę regulatora stosowaną w pojazdach silnikowych.
    motorcycle_armor_certification_standard:
      name: Norma certyfikacji kamizelki ochronnej na motocykl
      description: Oznacza formalną normę(y) bezpieczeństwa, które ochraniacz spełnia
        (np. EN 1621-2 dla ochraniaczy pleców, EN 1621-3 dla ochraniaczy klatki piersiowej).
    motorcycle_cover_size_class:
      name: Pokrowiec na motocykl klasy rozmiarowej
      description: Standaryzowane rozmiary kubełków do przechowywania motocykli, dostosowane
        do typowej kategorii/zakresu długości motocykla, do którego pasują.
    motorcycle_glove_certification_standard:
      name: Norma certyfikacji rękawic motocyklowych
      description: Określa certyfikat/normę ochronną, z którą zgodne są rękawice (np.
        poziomy EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Wodoodporna konstrukcja rękawic motocyklowych
      description: Określa rodzaj metody impregnacji wodoodpornej zastosowanej w rękawicach
        (jeśli jest stosowana).
    motorcycle_guard_coverage_area:
      name: Obszar zasięgu osłony motocykla
      description: Podstawowy obszar pokrycia zapewniany przez produkt (łokieć, nadgarstek,
        przedramię, kombinacja).
    motorcycle_kidney_belt_construction_type:
      name: Typ konstrukcji pasa nerkowego motocykla
      description: Styl konstrukcji pasa nerkowego, który wpływa na sztywność, przepływ
        powietrza i ochronę.
    motorcycle_kidney_belt_purpose:
      name: Cel pasa nerkowego motocyklowego
      description: Określa główny styl jazdy lub sytuację, do której przeznaczony
        jest pas nerkowy motocyklisty.
    motorcycle_luggage_capacity_class:
      name: Klasa pojemności bagażu motocyklowego
      description: Oznacza pojemność bagażnika motocyklowego wyrażoną w litrach.
    motorcycle_luggage_mounting_system:
      name: System mocowania bagażu motocyklowego
      description: System mocowania/montażu służący do zabezpieczenia torby/sakwy
        na motocyklu (np. paski do zakładania, szybkozłączka montowana na regałach).
    motorcycle_luggage_side:
      name: Bagaż boczny motocykla
      description: W przypadku sakw/sakw wskazuje czy pozycja dotyczy lewej strony,
        prawej strony czy zestawu/parowania.
    motorcycle_protective_gear_size_system:
      name: System rozmiarów odzieży ochronnej dla motocyklistów
      description: Oznacza system rozmiarów stosowany w przypadku danego produktu
        (np. rozmiary alfabetyczne, numeryczne, jeden rozmiar).
    motorcycle_rack_carrier_style:
      name: Regał motocyklowy w prostym stylu
      description: Opisuje funkcjonalny styl transportu motocykla lub skutera (platforma,
        szyna, podnośnik itp.).
    motorcycle_riding_discipline:
      name: Dyscyplina jazdy motocyklem
      description: Określa główny rodzaj jazdy/użytkowania, do którego jest przeznaczony
        stabilizator szyi.
    motorcycle_tire_speed_rating:
      name: Indeks prędkości opon motocyklowych
      description: Określa maksymalną stałą prędkość, do jakiej przystosowana jest
        opona, wykorzystując standardowy kod literowy (np. H, V, W).
    motorsport_window_net_certification:
      name: Certyfikacja siatek okiennych do sportów motorowych
      description: Certyfikat bezpieczeństwa wyścigowego lub homologacja, jaką spełnia
        siatka okienna (np. SFI lub FIA), w tym numer specyfikacji, jeśli ma to zastosowanie.
    mound_usage_type:
      name: Typ wykorzystania kopca
      description: Określa docelowe środowisko aplikacji kopca, takie jak Trening,
        Mecz, Bullpen lub Wielofunkcyjne.
    mount_attachment_method:
      name: Metoda mocowania uchwytu
      description: Określa sposób mocowania uchwytu do powierzchni/konstrukcji pojazdu.
    mountainboard_truck_type:
      name: Typ ciężarówki Mountainboard
      description: Klasyfikuje styl trucków dołączonych do deski, co ma wpływ na reakcję
        na skręt i trwałość.
    mounting_attachment_method:
      name: Sposób montażu/przymocowania
      description: Sposób zaprojektowania uchwytu/torby w celu przymocowania jej do
        bębna, stojaka, paska lub innej powierzchni.
    mounting_attachment_type:
      name: Typ mocowania
      description: Sposób mocowania lub współpracy akcesorium przełożenia z kołem
        obrotowym.
    mounting_hardware_included_for_installation:
      name: W zestawie sprzęt montażowy (do instalacji)
      description: Określa, czy w zestawie z produktem znajdują się elementy montażowe
        niezbędne do zainstalowania tylnego siedzenia (np. wsporniki, śruby, szyny).
    mounting_location:
      name: Montaż lokalizacji
      description: Określa miejsce, w którym światło/odblask ma zostać umieszczone
        na sprzęcie lub ciele (np. widelec przedni, kask, szprychy koła).
    mounting_method:
      name: Metoda montażu
      description: Sposób montażu i mocowania uchwytu na pałeczki/szczotki (np. za
        pomocą zacisku, paska, kleju).
    mounting_position:
      name: Położenie montażu
      description: Określa, w którym miejscu kabiny pojazdu ma być zamontowany/zainstalowany
        element sterujący hamulcem ręcznym.
    mounting_rail_type:
      name: Typ szyny montażowej
      description: Określa standard szyny lub interfejsu, do którego mocuje się akcesorium,
        np. Picatinny lub M-LOK.
    mounting_receiver_size:
      name: Rozmiar odbiornika montażowego
      description: Rozmiar zaczepu odbiorczego wymagany dla regałów towarowych montowanych
        na zaczepie.
    mounting_storage_type:
      name: Typ montażu/przechowywania
      description: W jaki sposób urządzenie ma być zamontowane lub składowane na statku/osobie.
    mouth_grip_type:
      name: Typ uchwytu ustnego
      description: Opisuje rodzaj uchwytu lub osłony gwizdka, zapewniającej wygodę
        i higienę.
    mouthguard_mold_type:
      name: Typ formy ochraniacza na zęby
      description: Opisuje sposób dopasowania ochraniacza do zębów sportowca (np.
        ochraniacz typu „boil-and-bite”, indywidualne dopasowanie).
    mouthpiece_facing_length:
      name: Długość ustnika
      description: Oznacza kategorię długości krzywizny ustnika (nie całkowitą długość
        ustnika), która ma wpływ na reakcję, opór i kompatybilność z stroikami.
    mouthpiece_material:
      name: Materiał ustnika
      description: Określa materiał, z którego wykonana jest część ustnika/końcówki
        dmuchawy, mającej kontakt z ustami, który może różnić się od materiału głównego
        korpusu.
    mouthpiece_shank_receiver_size:
      name: Trzpień ustnika/rozmiar korpusu
      description: Określa standard ustnika/trzpienia zgodny z flugelhornem.
    mouthpiece_shank_size:
      name: Rozmiar trzonka ustnika
      description: Określa standard dopasowania trzonka ustnika/gniazda w celu zapewnienia
        kompatybilności z zamierzonym instrumentem dętym.
    mouthpiece_shank_type:
      name: Typ stopki ustnika
      description: Określa standard odbiornika/trzpienia ustnika w celu zapewnienia
        kompatybilności (jeśli ma to zastosowanie).
    mouthpiece_style:
      name: Styl ustnika
      description: Klasyfikuje konstrukcję/Shapes części kiełzna munsztukowego, które
        Influence punkty nacisku, intensywność i preferencje konia.
    mouthpiece_type:
      name: Typ ustnika
      description: Rodzaj ustnika po stronie dmuchającej (wbudowany, wyjmowany lub
        dołączany).
    movement_mechanism:
      name: Mechanizm ruchu
      description: Definiuje sposób ruchu ławki podczas użytkowania, np. kołysanie,
        przesuwanie, bujanie itp.
    muffin_size:
      name: Rozmiar muffina
      description: Klasyfikuje fizyczny format rozmiaru muffina, np. mini, standardowy,
        jumbo.
    mushroom_variety:
      name: Odmiana grzyba
      description: Określa konkretny gatunek lub odmianę grzyba albo trufli zawartą
        w produkcie, np. shiitake, boczniak królewski, czarna trufla.
    music_stand_desk_tilt_adjustment:
      name: Regulacja nachylenia pulpitu statywu na nuty
      description: Wskazuje, czy i w jaki sposób można regulować kąt pulpitu.
    music_stand_intended_use:
      name: Zamierzone użycie statywu na nuty
      description: Wskazuje podstawowe zamierzone środowisko/przypadek użycia statywu.
    musical_block_pitch_type:
      name: Typ wysokości dźwięku bloku muzycznego
      description: Opisuje, czy blok muzyczny wytwarza określoną wysokość dźwięku
        (strojony) czy nieokreśloną wysokość.
    musical_box_mechanism_type:
      name: Typ mechanizmu pozytywki
      description: Sposób, w jaki pozytywka wytwarza/odtwarza dźwięk, np. mechanizm
        nakręcany lub odtwarzanie elektroniczne.
    musical_keyboard_case_fit_type:
      name: Typ dopasowania futerału na instrument klawiszowy
      description: Opisuje, jak futerał jest dobrany rozmiarem do instrumentu, np.
        uniwersalny/ogólny zakres rozmiarów lub dopasowanie do konkretnego modelu/niestandardowe.
    musical_ratchet_sound_character:
      name: Charakter dźwięku terkotki muzycznej
      description: Ogólny opis barwy/głośności terkotki.
    musical_scraper_groove_surface_material:
      name: Materiał rowkowanej powierzchni skrobaka muzycznego
      description: Określa materiał żłobionej/rowkowanej powierzchni skrobiącej, który
        może różnić się od materiału korpusu.
    musical_scraper_type:
      name: Typ skrobaka muzycznego
      description: Określa styl/konstrukcję instrumentu typu skrobak muzyczny, np.
        guiro lub reco-reco, co wpływa na dźwięk i technikę gry.
    mute_attachment_method:
      name: Metoda mocowania tłumika
      description: Określa sposób mocowania lub utrzymywania tłumika talerza na talerzu,
        np. żel, przyczepność statyczna, magnes, klips.
    mute_attenuation_level:
      name: Poziom tłumienia tłumika
      description: Wskazuje, jak bardzo tłumik zmniejsza odczuwaną głośność, szczególnie
        istotne w przypadku tłumików do ćwiczeń.
    mute_cork_padding_material:
      name: Materiał korka/wyściółki tłumika
      description: Określa materiał wyściółki kontaktowej tłumika, np. paski/podkładki
        korkowe, używany do chwytu/dopasowania i ochrony czary głosowej.
    mute_coverage_type:
      name: Typ osłony tłumika
      description: Wskazuje styl/zakres pokrycia tłumika na powierzchni gry, od małych
        punktowych tłumików po pełnopowierzchniowe tłumiki ćwiczebne.
    mute_finish:
      name: Wykończenie tłumika
      description: Wykończenie powierzchni tłumika, które może wpływać na trwałość
        i estetykę, np. polerowane lub satynowe.
    name_label_text_template:
      name: Szablon tekstu etykiety imiennej
      description: Określa wstępnie ustawiony tekst lub szablon nadrukowany na etykiecie
        imiennej, np. „Należy do”, „Wykonane przez”.
    napkin_ply:
      name: Liczba warstw serwetki
      description: Wskazuje grubość serwetki koktajlowej według liczby warstw.
    neck_brace_fit_system:
      name: System dopasowania kołnierza ochronnego
      description: Wskazuje podstawową metodę regulacji i mocowania kołnierza ochronnego
        do motocyklisty.
    neck_brace_size_basis:
      name: Podstawa doboru rozmiaru kołnierza ochronnego
      description: Wskazuje podstawę rozmiarówki używaną do wyboru właściwego rozmiaru
        kołnierza ochronnego.
    neck_configuration:
      name: Konfiguracja szyjki
      description: Określa styl/konfigurację fajki dostarczanej z saksofonem, wpływającą
        na ergonomię i grywalność.
    neck_coverage_type:
      name: Typ osłony szyjki
      description: Określa styl osłony szyi dostarczanej z kocem.
    neck_support_size_system:
      name: System rozmiarów podparcia szyi
      description: Określa konwencjonalną kategorię długości naszyjnika, np. choker
        lub opera, aby ułatwić zakupy według stylu.
    necklace_length_type:
      name: Typ długości naszyjnika
      description: Określa konwencjonalną kategorię długości naszyjnika, np. choker
        lub opera, aby ułatwić zakupy według stylu.
    needle_balance_zone:
      name: Strefa wyważenia igły
      description: Wskazuje strefę wyważenia magnetycznego lub półkulę, do której
        dostrojona jest igła kompasu, zapewniając dokładne odczyty na całym świecie.
    needle_case_format:
      name: Format etui na igły
      description: Ogólna forma organizera etui na igły.
    needle_damping_type:
      name: Typ tłumienia igły
      description: Opisuje sposób stabilizacji igły kompasu, np. wypełnienie cieczą,
        sucha lub stabilizowana elektronicznie, wpływający na czas ustalania i trwałość.
    needle_felting_needle_profile:
      name: Profil igły do filcowania
      description: Przekrój/profil igły do filcowania, który wpływa na sposób przemieszczania
        włókien i uzyskiwane wykończenie.
    needle_holder_features:
      name: Cechy uchwytu na igły
      description: Najważniejsze cechy funkcjonalne uchwytu igły.
    needle_holder_mounting_attachment_method:
      name: Metoda montażu/mocowania uchwytu na igły
      description: Sposób, w jaki uchwyt na igły ma być mocowany lub używany podczas
        przechowywania, np. magnetycznie, klipsem, paskiem.
    needle_holder_style:
      name: Styl uchwytu igły
      description: Fizyczny styl/konstrukcja przechowywania lub przenoszenia uchwytu
        na igły.
    needle_pushing_surface_type:
      name: Typ powierzchni do pchania igły
      description: Typ/konstrukcja powierzchni do pchania igły na naparstku krawieckim
        dłoniowym, np. metalowe wgłębienie, krążek lub wzmocniona łatka.
    needle_requirement_beading_pattern:
      name: Wymóg igły (wzór koralikowy)
      description: Typ/rozmiar igły zalecany przez wzór.
    needle_size_system:
      name: System rozmiarów igieł
      description: Standard rozmiarówki używany w oznaczaniu rozmiaru igły.
    needle_threader_compatible_needle_type:
      name: Kompatybilny typ igły nawlekacza
      description: Określa, z jakimi typami igieł nawlekacz jest zaprojektowany do
        pracy, według kategorii/zastosowania igły.
    needle_threader_mechanism_type:
      name: Typ mechanizmu nawlekacza do nici
      description: Opisuje, jak nawlekacz chwyta/przeciąga nić przez ucho igły.
    needle_threader_packaging_type:
      name: Typ opakowania nawlekacza
      description: 'Sposób sprzedaży/opakowania produktu: pojedynczy, wielopak lub
        zestaw.'
    needlecraft_fabric_color_family:
      name: Rodzina kolorów tkaniny do haftu
      description: Znormalizowana rodzina kolorów tkaniny evenweave, używana obok
        koloru do filtrowania.
    needlecraft_fabric_composition:
      name: Skład tkaniny do haftu
      description: Określa skład włókien/mieszankę tkaniny do haftu, np. 100% bawełna,
        mieszanka lnu i bawełny.
    needlecraft_fabric_weave_type:
      name: Typ splotu tkaniny do haftu
      description: Określa splot/konstrukcję lnu do haftu, np. evenweave lub tradycyjny
        len, wpływającą na zachowanie ściegów i wygląd.
    needlecraft_kit_items_included:
      name: Elementy dołączone do zestawu do haftu
      description: Wymienia główne elementy dołączone do zestawu do haftu, narzędzia
        i materiały eksploatacyjne.
    needlecraft_kit_project_type:
      name: Typ projektu zestawu do haftu
      description: Określa, jaki gotowy przedmiot powstaje z zestawu, czyli rezultat
        projektu.
    needlecraft_stitching_coverage:
      name: Pokrycie ściegiem w hafcie
      description: Wskazuje, czy tkanina jest haftowana przez 1 nitkę/kratkę czy przez
        2 nitki, co jest typowe dla evenweave i lnu.
    needlepoint_canvas_mesh_count:
      name: Gęstość siatki kanwy needlepoint
      description: Docelowa siatka/gęstość kanwy (liczba nitek na cal), dla której
        rozrysowano wzór, często nazywana countem kanwy.
    needlepoint_frame_canvas_attachment_method:
      name: Metoda mocowania kanwy do ramy needlepoint
      description: Opisuje sposób mocowania kanwy needlepoint do ramy needlepoint.
    needlepoint_frame_compatible_stand_type:
      name: Kompatybilny typ stojaka ramy needlepoint
      description: Jeśli rama jest zaprojektowana do montażu na stojaku, określa typy
        stojaków, z którymi jest kompatybilna.
    needlepoint_frame_contents:
      name: Zawartość ramy needlepoint
      description: Określa komponenty i akcesoria dołączone do ramy needlepoint, np.
        ramę, dodatkowe listwy/pręty, pinezki/szpilki, paski chwytne, torbę transportową.
    needlepoint_frame_tension_adjustment_type:
      name: Typ regulacji napięcia ramy needlepoint
      description: Wskazuje, jak i czy można regulować napięcie ramy podczas użytkowania.
    needlepoint_pattern_chart_format:
      name: Format wzorów haftu gobelinowego
      description: 'Sposób przedstawienia wzoru needlepoint do haftowania: jako schemat
        lub nadrukowana/malowana prowadnica.'
    needlepoint_project_type:
      name: Typ projektu needlepoint
      description: Zamierzony gotowy przedmiot/kategoria, do której przeznaczony jest
        wzór needlepoint.
    net_design:
      name: Konstrukcja siatki
      description: Określa styl konstrukcji siatki, wskazując, czy może się zwijać
        lub składać dla przenośności.
    net_mesh_pattern:
      name: Wzór oczek siatki
      description: Określa geometryczny kształt oczek siatki, który może wpływać na
        widoczność i wytrzymałość.
    net_twine_gauge:
      name: Grubość sznurka siatki
      description: Wskazuje grubość lub wytrzymałość sznurka siatki, tradycyjnie wyrażaną
        jako numer grubości, np. 18, 36.
    nicotine_source:
      name: Źródło nikotyny
      description: Wskazuje, czy nikotyna w produkcie pochodzi z tytoniu, jest syntetyczna,
        czy produkt nie zawiera nikotyny.
    nipple_drive_interface:
      name: Interfejs napędu nypla
      description: Określa styl/standard interfejsu napędu lub główki nypla, zewnętrzny
        lub wewnętrzny, determinujący wymagane narzędzie i metodę zaplatania koła.
    nock_activation_method:
      name: Metoda aktywacji nocka
      description: Określa mechanizm włączania lub wyłączania diody LED w podświetlanym
        nocku strzały, np. nacisk cięciwy, czujnik ruchu, przełącznik ręczny.
    nock_fitment_code:
      name: Kod dopasowania nocka
      description: Kod producenta lub branżowy identyfikujący rodzinę/serię nocka.
    nock_throat_size:
      name: Rozmiar gardzieli nocka
      description: Określa rozmiar gardzieli nocka (rowka), która zatrzaskuje się
        na cięciwie.
    nock_transparency_level:
      name: Poziom przezroczystości wycięcia
      description: 'Opisuje przezierność materiału nocka: przezroczysty, półprzezroczysty,
        nieprzezroczysty lub świecący w ciemności, wpływającą na widoczność i estetykę.'
    nock_type:
      name: Typ nocka
      description: Określa konstrukcję nocka używanego w strzale lub bełcie, np. pin,
        half-moon lub podświetlany.
    noise_reduction_type:
      name: Rodzaj redukcji hałasu
      description: Określa technologię redukcji hałasu używaną, jeśli dotyczy, w zintegrowanym
        zestawie słuchawkowym kasku.
    noise_suppression_technology:
      name: Technologia tłumienia hałasu
      description: Określa, czy produkt wykorzystuje pasywne tłumienie czy aktywne
        układy elektroniczne kompresujące głośne dźwięki i/lub wzmacniające dźwięki
        otoczenia.
    non_slip_base_features:
      name: Cechy antypoślizgowej podstawy
      description: Wskazuje funkcje antypoślizgowe zastosowane, aby pedał nie przesuwał
        się podczas występu.
    nose_bridge_type:
      name: Typ mostka nosowego
      description: Wskazuje konstrukcję mostka nosowego, wpływającą na dopasowanie
        do różnych rozmiarów twarzy.
    nose_clip_accessories_included:
      name: Akcesoria dołączone do klipsa na nos
      description: Wymienia dodatkowe akcesoria dostarczane z pływackim klipsem na
        nos, np. zatyczki do uszu, etui do przechowywania.
    nose_clip_features:
      name: Cechy klipsa na nos
      description: Wyróżnia ogólne cechy funkcjonalne lub komfortowe klipsa na nos.
    nose_coverage_style:
      name: Styl osłony nosa
      description: Wskazuje obecność i typ panelu ochronnego na nos lub pysk w masce
        przeciw owadom dla konia.
    noseband_type:
      name: Typ nachrapnika
      description: Określa konstrukcję nachrapnika, jeśli występuje, dostarczanego
        z ogłowiem.
    number_of_canvas_meshes:
      name: Liczba oczek kanwy
      description: Rozmiar oczek arkusza kanwy plastikowej, wyrażony jako liczba otworów
        na cal (HPI) lub count, który określa rozmiar ściegu i szczegółowość projektu.
    number_of_chainrings:
      name: Liczba tarcz mechanizmu korbowego
      description: Wskazuje, ile tarcz mechanizmu korbowego korba jest zaprojektowana
        mocować lub z iloma jest dostarczana.
    number_of_control_stations:
      name: Liczba stanowisk sterowania
      description: Wskazuje liczbę stanowisk sterowania/sterówek obsługiwanych przez
        zestaw sterowania, np. jedno stanowisko lub dwa stanowiska.
    number_of_digits:
      name: Liczba cyfr
      description: Liczba cyfr wyświetlanych przez licznik, np. 1-cyfrowy, 2-cyfrowy,
        3-cyfrowy.
    number_of_guitar_slots:
      name: Liczba miejsc na gitary
      description: Wskazuje, ile gitar futerał/pokrowiec gig bag jest zaprojektowany
        mieścić.
    number_of_needlecraft_fabrics:
      name: Gęstość tkaniny do haftu
      description: Określa gęstość kanwy/tkaniny do haftu, zwykle wyrażony jako liczba
        kratek/nitek na cal, np. 14-count.
    number_of_plastic_canvas_meshes:
      name: Liczba oczek kanwy plastikowej
      description: Określa count oczek kanwy plastikowej, czyli liczbę otworów na
        cal, który określa rozmiar ściegu i poziom szczegółowości projektu.
    number_of_quilting_frame_rails:
      name: Liczba szyn ramy do pikowania
      description: Liczba szyn/wałków dołączonych do ramy do pikowania, np. systemy
        2-szynowe lub 3-szynowe.
    number_of_rope_slots:
      name: Liczba szczelin na linę
      description: Wskazuje, czy przyrząd asekuracyjny jest zaprojektowany do użycia
        z pojedynczą czy podwójną liną.
    number_of_switch_poles:
      name: Liczba biegunów przełącznika
      description: Liczba torów przełącznikaLiczba oddzielnych obwodów (torów) kontrolowanych
        przez przełącznik, np. SPST, DPST.
    number_of_switch_throws:
      name: Liczba pozycji przełącznika
      description: Liczba ścieżek wyjściowych (pozycji) na tor, np. SPDT.
    number_of_timing_chain_rows:
      name: Liczba rzędów łańcucha rozrządu
      description: Wskazuje, czy łańcuch rozrządu jest jednorzędowy czy wielorzędowy.
    number_of_trailer_axles:
      name: Liczba osi przyczepy
      description: Liczba osi przyczepy.
    number_of_wheel_pieces:
      name: Liczba części felgi
      description: Określa, czy felga ma konstrukcję 1-częściową, 2-częściową czy
        3-częściową.
    numbering_style:
      name: Styl numeracji
      description: Wskazuje, czy i w jaki sposób znaczniki są wstępnie ponumerowane
        do identyfikacji drużyny, np. bez numerów, 1–10, niestandardowe.
    nunchuck_connector_type:
      name: Typ złącza nunchucka
      description: Sposób łączenia dwóch elementów nunchaku (np. lina, łańcuch, łańcuch
        obrotowy).
    nursing_access:
      name: Dostęp do karmienia
      description: Określa metodę dostępu do karmienia piersią zintegrowaną z sukienką
        kąpielową, jeśli dotyczy.
    nursing_access_type:
      name: Typ dostępu do karmienia
      description: Określa, w jaki sposób odzież zapewnia dostęp do piersi do karmienia
        lub odciągania pokarmu.
    nut_butter_texture:
      name: Tekstura masła orzechowego
      description: Opisuje fizyczną konsystencję masła orzechowego, aby kupujący mogli
        łatwo wybierać między gładkim, chrupiącym itp.
    nutrient_fortification:
      name: Wzbogacenie składnikami odżywczymi
      description: Określa kluczowe składniki odżywcze, którymi wzbogacono napój lub
        produkt spożywczy.
    oak_product_form:
      name: Forma produktu dębowego
      description: Określa fizyczną formę dębu używanego do starzenia/aromatyzowania
        produktów.
    oak_toast_level:
      name: Stopień opiekania dębu
      description: Określa stopień opiekania produktów dębowych.
    oboe_case_capacity:
      name: Pojemność pokrowca na obój
      description: Wskazuje, do przenoszenia jakich instrumentów i głównych komponentów
        zaprojektowano futerał.
    oboe_case_carry_configuration:
      name: Konfiguracja noszenia futerału na obój
      description: Wskazuje podstawową konfigurację noszenia oferowaną przez futerał/pokrowiec
        gig bag.
    oboe_case_design:
      name: Konstrukcja futerału na obój
      description: Klasyfikuje konstrukcję/sztywność futerału lub pokrowca gig bag
        na obój, np. twardy, półsztywny, miękki, aby wskazać poziom ochrony.
    oboe_case_internal_fit_type:
      name: Typ wewnętrznego dopasowania futerału na obój
      description: Wskazuje, czy wnętrze jest formowane pod konkretną konfigurację
        instrumentu, czy wykorzystuje regulowane przegródki.
    oboe_keywork_plating:
      name: Powłoka mechaniki oboju
      description: Określa powłokę/wykończenie mechaniki oboju (klap), oddzielnie
        od materiału korpusu.
    oboe_strap_padding:
      name: Wyściółka paska oboju
      description: Opisuje obecność/typ wyściółki w obszarze kontaktu paska/podparcia
        dla komfortu, np. wyściełany obszar ramienia/szyi.
    oboe_swab_style:
      name: Styl wyciora do oboju
      description: Określa funkcjonalny styl/konstrukcję wyciora do czyszczenia oboju,
        np. przeciągany, jedwabny z obciążnikiem.
    observation_window_material:
      name: Materiał okna obserwacyjnego
      description: Określa materiał paneli/okna podglądowego, często wpływający na
        przejrzystość i trwałość.
    ocarina_accessories_included:
      name: Dołączono akcesoria do okaryny
      description: Akcesoria dołączone do okaryny, takie jak futerał, pasek na szyję
        lub tabela palcowania.
    ocarina_chamber_count:
      name: Liczba komór okaryny
      description: Wskazuje, ile komór ma okaryna inline, co wpływa na zakres i złożoność
        gry, np. pojedyncza, podwójna, potrójna itd.
    ocarina_fingering_system:
      name: System otworów okaryny
      description: Określa system/standard palcowania okaryny wisiorkowej, jeśli dotyczy.
    ocarina_finish_type:
      name: Typ wykończenia okaryny
      description: Wykończenie powierzchni korpusu okaryny, które wpływa na odczucie
        i estetykę.
    occupant_classification_sensor_support:
      name: Obsługa czujnika klasyfikacji pasażera
      description: Wskazuje, czy siedzenie zawiera czujnik klasyfikacji pasażera/wagi
        albo ma możliwość przeniesienia/zainstalowania czujnika OEM, zwykle w przypadku
        przednich foteli pasażera.
    octave_harmonica_cover_plate_material:
      name: Materiał płyty obudowy harmonijki oktawowej
      description: Materiał zewnętrznych płytek osłonowych harmonijki oktawowej.
    octave_harmonica_tuning_system:
      name: System strojenia harmonijki oktawowej
      description: Strój/temperament używany w harmonijce oktawowej.
    octoban_mounting_system_type:
      name: Typ systemu montażu octobanu
      description: Sposób montażu/ustawienia octobanu podczas gry, czyli konfiguracja
        mocowania/wspornika/statywu.
    odor_control_features:
      name: Cechy kontroli zapachu
      description: Wskazuje, czy produkt zapewnia neutralizację/dezodoryzację zapachu
        i w jaki sposób.
    office_furniture_items_included:
      name: Dołączono meble biurowe
      description: Określa konkretne meble biurowe dołączone do zestawu, takie jak
        biurko lub szafka na dokumenty.
    oil_cooler_core_type:
      name: Typ rdzenia chłodnicy oleju
      description: Określa wewnętrzną konstrukcję rdzenia chłodnicy oleju, wpływającą
        na efektywność chłodzenia, spadek ciśnienia i trwałość.
    oil_cooler_mounting_style:
      name: Styl montażu chłodnicy oleju
      description: Opisuje sposób, w jaki chłodnica oleju ma być zamontowana/zainstalowana
        w pojeździe.
    oil_dipstick_component_type:
      name: Typ komponentu bagnetu oleju
      description: Określa, który komponent do pomiaru poziomu oleju jest sprzedawany,
        np. samo ostrze/pręt bagnetu, sama rączka, kompletny zespół, rurka bagnetu
        itp.
    oil_dipstick_measurement_markings:
      name: Oznaczenia pomiarowe bagnetu oleju
      description: Określa, jakie oznaczenia/skale znajdują się na bagnecie służącym
        do odczytu poziomu oleju.
    oil_dipstick_tube_mounting_type:
      name: Typ mocowania rurki bagnetu poziomu oleju
      description: Określa sposób mocowania rurki wskaźnika poziomu oleju do silnika
        lub bloku silnika.
    oil_drain_plug_head_drive_type:
      name: Typ napędu głowicy korka spustowego oleju
      description: Określa interfejs włączania narzędzia na głowicy korka spustowego
        oleju, używany do montażu i demontażu.
    oil_drain_plug_magnet_type:
      name: Korek spustowy oleju typu magnetycznego
      description: Określa, czy korek spustowy jest magnetyczny, a jeśli tak, to jakiego
        typu.
    oil_fill_cap_type:
      name: Rodzaj korka wlewu oleju
      description: Styl/rodzaj interfejsu korka wlewu oleju używanego przez pokrywę
        zaworów (jeśli dotyczy).
    oil_filler_cap_attachment_type:
      name: Typ mocowania korka wlewu oleju
      description: Określa sposób mocowania korka wlewu oleju na silniku/wlewie oleju
        (np. zawór, bagnet, wcisk).
    oil_filler_cap_installation_position:
      name: Pozycja montażu korka wlewu oleju
      description: Określa, gdzie należy użyć korka, gdy istnieje wiele punktów wlewu
        oleju (np. pokrywa zaworów, odległa rura wlewowa).
    oil_filler_cap_locking_type:
      name: Typ zamykania korka wlewu oleju
      description: Określa, czy korek wlewu oleju nie jest zabezpieczony blokadą,
        czy też można go otworzyć za pomocą blokady/zabezpieczenia (np. za pomocą
        klucza lub narzędzia), aby zapobiec manipulacji/kradzieży lub przypadkowemu
        otwarciu.
    oil_filler_cap_tether_type:
      name: Typ mocowania korka wlewu oleju
      description: Określa, czy korek wlewu oleju jest przymocowany/zamocowany, aby
        zapobiec jego zgubieniu, a także jaki typ mocowania został zastosowany.
    oil_filler_cap_venting_type:
      name: Korek wlewu oleju z odpowietrzeniem
      description: Określa, czy nakrętka jest odpowietrzana i jaki jest mechanizm
        odpowietrzania (jeśli dotyczy).
    oil_filter_style:
      name: Styl filtra oleju
      description: Określa typ filtra oleju oraz sposób montażu/instalacji w celu
        zapewnienia zgodności z mocowaniem filtra silnika.
    oil_pan_baffle_windage_features:
      name: Elementy przegrody/osłony miski olejowej
      description: Oznacza wewnętrzne elementy kontroli oleju znajdujące się w misce
        olejowej.
    oil_pan_finish_coating:
      name: Wykończenie/powłoka miski olejowej
      description: Opisuje wykończenie powierzchni lub powłokę miski olejowej (malowaną,
        proszkową, galwanizowaną, surową itp.).
    oil_pressure_sensor_function_type:
      name: Czujnik ciśnienia oleju Typ Functions
      description: Określa, czy część jest czujnikiem ciśnienia oleju o zmiennym wyjściu
        do wskaźnika/ECU, czy też wyłącznikiem ciśnienia oleju Wł./Wył. wyłączającym
        kontrolkę ostrzegawczą.
    oil_pressure_sensor_signal_output_type:
      name: Typ sygnału wyjściowego czujnika ciśnienia oleju
      description: Określa styl sygnału/wyjścia elektrycznego wytwarzanego przez czujnik/nadajnik
        ciśnienia oleju.
    oil_processing_method:
      name: Metoda przetwarzania oleju
      description: Określa sposób produkcji lub rafinacji oleju (np. tłoczony na zimno,
        nierafinowany, rafinowany), co Influence smak, wartości odżywcze i przydatność
        do gotowania.
    oil_pump_drive_method:
      name: Metoda napędu pompy olejowej
      description: Oznacza element napędzający pompę olejową w silniku.
    oil_pump_mounting_style:
      name: Styl mocowania pompy leju
      description: Określa, gdzie i w jaki sposób pompa oleju jest montowana w silniku
        (np. wewnętrzna czy zewnętrzna/zdalna, mocowanie pokrywy, mocowanie miski
        olejowej).
    oil_system_connection_thread_standard:
      name: Układ olejowy relacja wątek standard
      description: Określa standard gwintu/połączenia używany przez interfejs układu
        olejowego danej części w celu zapewnienia instalacji/kompatybilności (np.
        M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Klasa lepkości oleju
      description: Opisuje względną gęstość oleju przędzalniczego dla sprzętu Craft
        (nie klasy SAE stosowanej w motoryzacji).
    okra_variety:
      name: Odmiana okry
      description: Identyfikuje konkretną odmianę lub odmianę okry, np. Clemson Spineless,
        czerwony Burgundy lub Baby Okra.
    olfactory_arts_material_form:
      name: Forma materiałów do sztuki olfaktorycznej
      description: Określa formę fizyczną sprzedawanego materiału.
    olfactory_arts_tool_kit_content:
      name: Zestaw narzędzi do sztuki węchowej Treść
      description: Zawiera listę komponentów, które wchodzą w skład produktu sprzedawanego
        jako zestaw lub komplet do wyrobu świec/kadzideł/perfum.
    olive_variety:
      name: Odmiana oliwek
      description: Określa odmianę użytych oliwek, która ma wpływ Taste, konsystencję,
        kolor i autentyczność regionalną.
    onion_variety:
      name: Odmiana cebuli
      description: Określa konkretny rodzaj cebuli, dzięki czemu klient może szybko
        zlokalizować preferowany kolor, smak i profile zastosowania, a jednocześnie
        umożliwia sprzedawcy dokładne wylistowanie produktów.
    opacity_level:
      name: Poziom krycia
      description: Określa stopień przezroczystości lub nieprzezroczystości tkaniny.
    operating_modes:
      name: Tryby pracy
      description: Podstawowy wbudowany efekt/ Mode Motion obsługiwany przez światło
        lasera.
    operating_voltage:
      name: Napięcie robocze
      description: Określa nominalne napięcie układu, dla którego zaprojektowano wtryskiwacz.
    optical_toy_features:
      name: Funkcje zabawki optycznej
      description: Highlight główny efekt wizualny/optyczny wywoływany przez zabawkę.
    orchestral_string_core_material:
      name: Ciąg znaków orkiestrowych materiału rdzenia
      description: Określa rdzeń materiału konstrukcyjnego ciągu znaku (rdzenia),
        który ma duży wpływ na odczucia, reakcję i brzmienie.
    orchestral_string_end_type:
      name: Ciąg znaków orkiestrowych typu end
      description: Określa styl mocowania na końcu znaku ciągowego.
    orchestral_string_included_strings:
      name: Dołączone struny instrumentu smyczkowego orkiestrowego
      description: Wykazuje, jakie konkretne ciągi znaków znajdują się w pakowaniu
        (różni się w zależności od instrumentu).
    orchestral_string_instrument_fitting_part_type:
      name: Ciąg znaków orkiestrowych typu mocowania/części instrumentu
      description: Określa rodzaj okucia/części produktu (np. mostek, strunnik, podbródek).
    orchestral_string_instrument_mute_type:
      name: Typ tłumika instrumentu smyczkowego orkiestrowego
      description: Określa typ funkcjonalny ciągu znaków instrumentu orkiestrowego
        wyciszenie (np. praktyka/hotel vs wydajność/koncert) i/lub powszechny styl
        projektowania.
    orchestral_string_instrument_part_position:
      name: Ciąg znaków orkiestrowych pozycji części instrumentu
      description: Wskazuje, gdzie dana część powinna znaleźć się na instrumencie
        (przydatne, gdy części znajdują się w położeniu górnym/dolnym lub lewym/prawym
        wariant).
    orchestral_string_winding_material:
      name: Materiał owijki struny smyczkowej orkiestrowej
      description: Określa materiał zewnętrznego uzwojenia/owijki stosowany na znaku
        ciąg.
    organza_finish_sheen:
      name: Wykończenie organza / połysk
      description: Opisuje wygląd powierzchni organzy (efekt matowy lub błyszczący/opalizujący).
    organza_ribbon_transparency_level:
      name: Poziom przezroczystości wstążki organzy
      description: Opisuje jak przezroczysta jest wstążka organzowa.
    organza_transparency_level:
      name: Poziom przezroczystości organzy
      description: Opisuje, jak przezroczysta jest tkanina organzowa po jednokrotnym
        nałożeniu.
    origami_paper_shape:
      name: Shapes Paper origami
      description: Określa Shapes arkusza używane do składania.
    origami_paper_sidedness:
      name: Dwustronność Paper origami
      description: Określa, czy Paper origami ma ten sam kolor/wzór po obu stronach,
        czy też strony kontrastujące.
    ostrich_feather_part:
      name: Część pióra strusia
      description: Identyfikuje styl/część pióra strusia, która została użyta (np.
        pióropusz lub matowe), co Impact miękkość, gęstość i typową aplikację Craft
        .
    outboard_motor_shaft_type:
      name: Typ wału silnika zaburtowego
      description: Standardowa klasa długości wału stosowana w silnikach zaburtowych
        (Forma Label stosowana w przemyśle morskim).
    outboard_motor_steering_type:
      name: Typ sterowania silnikiem zaburtowym
      description: Określa interfejs/mechanizm sterujący używany przez silnik zaburtowy
        (np. rumpel lub układ sterowania zdalnego).
    outdoor_table_functionality:
      name: Funkcjonalność stołu zewnętrznego
      description: Identyfikuje specjalistyczne, wbudowane Functions wykraczające
        Beyond zwykłą powierzchnię blatu (np. chłodziarka, półka do przechowywania,
        pokrywa zbiornika paliwa, podstawa parasola, konektor do krzesła, składana
        konstrukcja, sejf w basenie, regulowana wysokość, zintegrowane koła, oświetlenie
        LED).
    outerwear_length_type:
      name: Typ długości odzieży wierzchniej
      description: Klasyfikuje całkowitą długość odzieży wierzchniej według standardowych
        zakresów opisowych.
    outerwear_pieces_included:
      name: Dołączono elementy odzieży zewnętrznej
      description: Wyświetla listę części garderoby dostępnych w przypadku, gdy produkt
        sprzedawany jest jako zestaw.
    outfit_attachment_mechanism:
      name: Mechanizm mocowania odzieży
      description: Określa sposób, w jaki elementy stroju lub akcesoriów są mocowane
        do lalki (np. za pomocą karty, kleju, magnesów).
    outfit_items_included:
      name: Dołączono elementy odzieży
      description: Wypisuje konkretne pozycje odzieży zawartej w zestawie (np. body,
        spodenki, opaska na głowę).
    outlet_thread_type:
      name: Wylot typu ekspres
      description: standardowy ekspres stosowany w portach wylotowych przewodu hamulcowego
        cylindra głównego (np. kielich bąbelkowy metryka vs. odwrócony kielich SAE).
    output_jack_type_instrument:
      name: Typ gniazda wyjściowego (instrumentalnego)
      description: Określa typ gniazda wyjściowego audio w mandolinie elektrycznej.
    output_signal_type:
      name: Typ sygnału wyjściowego
      description: Typ/charakter sygnału wyjściowego wytwarzanego przez czujnik (np.
        rezystancja analogowa termistora NTC).
    outsole_marking_type:
      name: Rodzaj oznaczenia podeszwy zewnętrznej
      description: Informuje, czy podeszwa zewnętrzna buta pozostawia ślady na powierzchni
        kortu, co jest kwestią kluczową w przypadku sportów rakietowych uprawianych
        w pomieszczeniach.
    outsole_material:
      name: Materiał podeszwy zewnętrznej
      description: Określa materiał podeszwy zewnętrznej buta, który ma kontakt z
        podłożem i wpływa na przyczepność, elastyczność i trwałość.
    outsole_stud_type:
      name: Rodzaj podeszwy zewnętrznej
      description: Opisuje konfigurację podeszwy zewnętrznej/korków (np. formowane
        korki, gumowe wypustki, wypustki przypominające trawę), która zapewnia przyczepność
        na wybranej nawierzchni.
    oven_bake_clay_formulation:
      name: Formuła glinki do wypieku w piecu
      description: Identyfikuje rodzinę formulacji gliny wypiekanej w piecu (np. glina
        polimerowa kontra glina żywiczna), która Impact na reakcje, zachowanie utwardzania
        i właściwości końcowe.
    oven_housing_configuration:
      name: Konfiguracja obudowy piekarnika
      description: Definiuje planowany układ urządzeń, które mają być umieszczone
        w szafce (np. pojedynczy piekarnik, podwójny piekarnik lub kombinacja piekarnika
        i kuchenki mikrofalowej).
    overhead_mount_installation_method:
      name: Metoda montażu sufitowego
      description: Sposób mocowania uchwytu sufitowego do pojazdu (sprzęt/sposób mocowania).
    oversize_or_undersize_grade:
      name: Gatunek ponadgabarytowy lub podgabarytowy
      description: Określa klasę rozmiaru zestawu (tłoki/pierścienie o większych rozmiarach
        i/lub łożyska o mniejszych rozmiarach) w odniesieniu do standardowego rozmiaru
        OEM.
    p_tex_application_method:
      name: Metoda nakładania wosku P-Tex
      description: Opisuje sposób nakładania materiału P-Tex na ślizg narty lub snowboardu.
    p_tex_form:
      name: Forma P-Tex
      description: Określa, jakie oznaczenia/skala znajdują się na bagnecie do odczytu
        poziomu oleju.
    packability:
      name: Pakowność
      description: Wskazuje, czy i w jaki sposób kamizelkę można spakować lub schować,
        gdy nie jest używana.
    packaging_format:
      name: Format opakowania
      description: Sposób pakowania/sprzedaży strun, np. pojedyncze koperty, opakowanie
        zbiorcze itp.
    packaging_material:
      name: Materiał opakowania
      description: Określa podstawowy materiał butelki lub pojemnika, w którym znajduje
        się woda.
    packaging_type:
      name: Typ opakowania
      description: Opisuje sposób pakowania figurki bobblehead do sprzedaży detalicznej/ekspozycji/przechowywania
        kolekcjonerskiego.
    packing_medium:
      name: Medium zalewy
      description: Wskazuje płyn lub medium, np. wodę, różne syropy, sok lub solankę,
        używane do konserwowania owoców w pojemniku.
    pad_components_included:
      name: Dołączono elementy podkładki
      description: Określa, które elementy są dołączone, gdy produkt jest sprzedawany
        jako zestaw, np. ochraniacze kolan i łokci, tylko ochraniacze nadgarstków.
    pad_controller_additional_control:
      name: Dodatkowe sterowanie kontrolera padów
      description: Typy dodatkowych fizycznych elementów sterujących poza padami,
        np. pokrętła, fadery, przyciski, obecnych w urządzeniu.
    pad_controller_performance_features:
      name: Funkcje wykonawcze kontrolera padów
      description: Kluczowe funkcje padów związane z grą i ekspresyjną kontrolą.
    pad_coverage_area:
      name: Obszar chroniony przez ochraniacze
      description: Określa strefy ciała chronione przez zintegrowane ochraniacze w
        pasie ochronnym.
    pad_material_or_technology:
      name: Materiał lub technologia ochraniacza
      description: Określa zastrzeżoną technologię pochłaniania uderzeń lub markowy
        materiał użyty w ochraniaczu.
    pad_mounting_or_holding_style:
      name: Styl mocowania lub utrzymywania ochraniacza
      description: Wskazuje, jak ochraniacz jest utrzymywany, noszony lub instalowany
        podczas użycia.
    pad_saver_style:
      name: Styl pad savera
      description: Wskazuje fizyczny styl/konstrukcję pad savera używanego do suszenia
        poduszek i kanału instrumentu.
    pad_shape:
      name: Kształt podkładki
      description: Definiuje geometryczną formę lub krzywiznę powierzchni uderzeniowej
        albo całego korpusu pada, np. okrągły, zakrzywiony, prostokątny, płaski, pomagając
        użytkownikom dopasować pady do celów treningowych i typów uderzeń.
    pad_shell_type:
      name: Typ skorupy ochraniacza
      description: Klasyfikuje styl konstrukcji zewnętrznej powierzchni ochraniacza,
        np. twarda skorupa, miękka skorupa, wewnętrzny wkład.
    pad_style:
      name: Styl podkładki
      description: Określa typ lub konstrukcję podkładki dostarczanej z saniami.
    padding_layers:
      name: Warstwy wyściółki
      description: Wskazuje liczbę warstw pianki użytych do pochłaniania uderzeń.
    padding_level:
      name: Poziom wyściółki
      description: Wskazuje ilość wyściółki zintegrowanej z obszarami kontaktu paska/podparcia,
        np. szyi, ramienia, pleców.
    padding_material:
      name: Materiał wyściółki
      description: Określa wewnętrzny materiał wypełnienia lub wyściółki pochłaniający
        uderzenia wewnątrz toreb, tarcz, łap i manekinów.
    paddle_ball_attachment_type:
      name: Typ mocowania piłki do paletki
      description: Określa sposób połączenia piłki z paletką lub wskazuje, że nie
        jest na uwięzi.
    paddle_leash_style:
      name: Styl smyczy do wiosła
      description: Określa styl lub konstrukcję linki smyczy do wiosła.
    paddle_shape:
      name: Kształt wiosła
      description: Definiuje ogólny kształt główki/korpusu paletki, np. standardowy,
        wydłużony, szeroki, który wpływa na zasięg, wielkość sweet spotu i zwrotność.
    paddleboard_intended_use:
      name: Zamierzone użycie paddleboardu
      description: Klasyfikuje podstawowe przeznaczenie konstrukcyjne lub aktywność,
        do której deska jest zbudowana, np. touring, joga, racing.
    paint_application_method:
      name: Metoda nakładania farby
      description: Podstawowy sposób aplikacji produktu na zacisk hamulcowy.
    paint_by_number_surface_type:
      name: Typ powierzchni do malowania po numerach
      description: Powierzchnia, na której nadrukowany jest ponumerowany wzór, np.
        płótno, papier, panel drewniany.
    paint_medium_application_method:
      name: Metoda aplikacji medium malarskiego
      description: Wskazuje zalecany sposób nakładania medium.
    paint_medium_intended_effect:
      name: Zamierzony efekt medium malarskiego
      description: Określa podstawowy rezultat, jaki medium ma tworzyć, np. tekstura,
        połysk, laserunek, płynność.
    paint_safe_bristles:
      name: Włosie bezpieczne dla lakieru
      description: Wskazuje, czy włosie szczotki jest opisywane jako bezpieczne do
        użycia na lakierze samochodowym/lakierze bezbarwnym, bez ryzyka zarysowań.
    paintable_surface:
      name: Powierzchnia do malowania
      description: Wskazuje, czy forma z papier mâché jest gotowa do malowania w obecnym
        stanie, np. zagruntowana/uszczelniona, czy wymaga przygotowania.
    paintball_caliber:
      name: Kaliber paintballowy
      description: Określa średnicę/kaliber kulek paintballowych lub kompatybilnego
        sprzętu.
    paintball_feed_system:
      name: System podawania kulek paintballowych
      description: Definiuje sposób podawania kulek paintballowych do markera.
    paintball_fill_color:
      name: Kolor wypełnienia kulki paintballowej
      description: Wskazuje kolor wewnętrznego wypełnienia znakującego, który może
        różnić się od zewnętrznej skorupki i określa kolor pozostawiany po trafieniu.
    paintball_fill_type:
      name: Typ wypełnienia kulek paintballowych
      description: Opisuje specjalną formułę lub właściwość wypełnienia, np. zmywalne,
        świecące w ciemności, proszkowe.
    paintball_grade:
      name: Klasa kulek paintballowych
      description: Opisuje klasę osiągów lub zamierzony poziom użycia, np. podstawowy,
        terenowy, zawodniczy, zimowy.
    paintball_mask_coverage_level:
      name: Poziom ochrony maski paintballowej
      description: 'Wskazuje, które części twarzy lub głowy chronią gogle albo maska
        paintballowa: tylko gogle, pół twarzy, cała twarz lub cała głowa.'
    paintball_tank_valve_type:
      name: Typ zaworu butli paintballowej
      description: Opisuje interfejs zaworu lub regulatora obecny na butli.
    painting_surface_priming_type:
      name: Typ gruntowania powierzchni malarskiej
      description: Określa grunt/powłokę na powierzchni malarskiej, poza samym podziałem
        na zagruntowaną/niezagruntowaną, co wpływa na przyczepność farby i kompatybilność
        z techniką.
    palette_knife_blade_edge_profile:
      name: Profil krawędzi ostrza szpachelki malarskiej
      description: Opisuje profil roboczej krawędzi ostrza szpachelki malarskiej,
        nie ostrość, który wpływa na tworzenie śladów i mieszanie.
    palette_knife_flexibility:
      name: Elastyczność szpachelki malarskiej
      description: Opisuje sztywność/elastyczność ostrza szpachelki malarskiej.
    palette_surface_finish:
      name: Wykończenie powierzchni palety
      description: Opisuje wykończenie/powłokę powierzchni do mieszania, która wpływa
        na odporność na plamy i łatwość czyszczenia.
    palm_padding_level:
      name: Poziom wypełnienia dłoni
      description: Opisuje ilość amortyzacji w obszarze dłoni rękawicy lub podkładki
        chwytnej.
    palm_padding_type:
      name: Typ wypełnienia dłoni
      description: Wskazuje materiał lub konstrukcję używaną do amortyzacji dłoni,
        np. żel, pianka, dwuwarstwowa.
    palm_wax_blend_readiness:
      name: Gotowość mieszanki wosku palmowego
      description: Wskazuje, czy produkt jest czystym woskiem palmowym czy wstępnie
        zmieszaną formułą przeznaczoną do określonych właściwości użytkowych.
    palm_wax_form:
      name: Forma wosku palmowego
      description: Fizyczna forma wosku palmowego w sprzedaży, która wpływa na łatwość
        odmierzania, szybkość topnienia i obsługę.
    pan_flute_tuning_standard:
      name: Standard strojenia fletni Pana
      description: Częstotliwość referencyjna używana do strojenia, np. A4=440 Hz,
        ważna przy grze z innymi instrumentami.
    pannier_configuration:
      name: Konfiguracja sakw
      description: Wskazuje, czy produkt jest sprzedawany jako pojedyncza sakwa, połączona
        podwójna sakwa czy para/zestaw trzech sakw.
    pannier_mounting_system:
      name: System mocowania sakwy
      description: Definiuje mechanizm używany do mocowania sakwy do bagażnika lub
        ramy roweru, zapewniając kompatybilność z różnymi konfiguracjami.
    pant_cuff_style:
      name: Styl mankietu spodni
      description: Wskazuje wykończenie lub regulację przy kostce spodni, np. elastyczne
        mankiety, zamki przy kostkach, otwarty dół.
    pant_leg_conversion_type:
      name: Typ konwersji nogawek spodni
      description: Wskazuje, czy i w jaki sposób nogawki spodni można konwertować
        lub regulować do różnych długości.
    pantyhose_crotch_style:
      name: Styl kroku rajstop
      description: Definiuje konstrukcję obszaru kroku, rozróżniając standardowy zamknięty
        krok, otwarty krok lub wersje ze wzmocnionym klinem.
    papaya_variety:
      name: Odmiana papai
      description: Określa kultywar lub odmianę handlową papai, np. Solo, Maradol.
    paper_and_magnetic_doll_format:
      name: Format lalki papierowej i magnetycznej
      description: Określa, czy produkt jest tradycyjnym zestawem lalek papierowych,
        zestawem lalek magnetycznych czy formatem hybrydowym.
    paper_color_family:
      name: Rodzina kolorów papieru
      description: Określa, czy pakiet jest jednokolorowy, wielokolorowy czy zawiera
        mieszanki specjalne, przydatne, gdy kolor jest przypisany do pojedynczego
        elementu, ale pakiety są mieszane.
    paper_magnetic_doll_set_contents:
      name: Zawartość zestawu lalek papierowych i magnetycznych
      description: Wskazuje główne komponenty dołączone do zestawu.
    paper_opacity:
      name: Nieprzezroczystość papieru
      description: Wskazuje, jak bardzo papier prześwituje, od bardzo przezroczystego
        do nieprzezroczystego, przydatne przy kalkowaniu.
    paraglider_certification_rating:
      name: Klasa certyfikacji paralotni
      description: Określa oficjalną ocenę dopuszczenia do lotu przypisaną skrzydłu
        paralotni, np. klasy EN lub LTF.
    parasite_types_controlled:
      name: Typy zwalczanych pasożytów
      description: Wymienia pasożyty wewnętrzne, przeciwko którym produkt jest skuteczny,
        aby kupujący mogli dopasować program odrobaczania do konkretnych infestacji.
    parking_camera_mounting_location:
      name: Miejsce montażu kamery parkowania
      description: Miejsce w pojeździe, w którym kamera ma być zamontowana, np. okolica
        tablicy rejestracyjnej, montaż powierzchniowy z tyłu, montaż wpuszczany.
    parking_camera_night_vision_technology:
      name: Technologia noktowizji kamery parkingowej
      description: Metoda wspomagania przy słabym oświetleniu używana przez kamerę.
    parking_camera_orientation:
      name: Orientacja kamery parkingowej
      description: Wskazuje, czy kamera jest przeznaczona do widoku tylnego/cofania,
        widoku przedniego czy użycia wybieralnego/lustrzanego.
    parking_sensor_finish:
      name: Wykończenie czujnika parkowania
      description: Wskazuje wykończenie powierzchni czoła/nakładki czujnika parkowania,
        np. do malowania/zagruntowane, matowe, błyszczące, aby pomóc dopasować wygląd
        do zderzaka.
    parking_sensor_type:
      name: Typ czujnika parkowania
      description: Określa technologię pomiarową używaną przez czujnik parkowania,
        np. ultradźwiękową, elektromagnetyczną, radarową, optyczną.
    parsley_root_variety:
      name: Odmiana pietruszki korzeniowej
      description: Określa kultywar lub odmianę pietruszki korzeniowej, gdy podaje
        ją dostawca.
    parsnip_variety:
      name: Odmiana pasternaku
      description: Określa konkretną odmianę lub kultywar pasternaku, np. Hollow Crown
        lub White Gem, pozwalając kupującym wybierać według różnic w smaku, słodyczy
        lub rozmiarze.
    part_condition:
      name: Stan części
      description: Wskazuje, czy część jest nowa, używana, po remoncie itp.
    part_placement:
      name: Umiejscowienie części
      description: Wskazuje, gdzie w maszynie, np. stair climberze lub stepperze,
        część jest zamontowana, np. po lewej, po prawej, z przodu lub z tyłu.
    partial_capo_covered_strings:
      name: Zakres strun obejmowany przez kapodaster częściowy
      description: 'Określa zakres strun, które obejmuje partial capo, używając standardowej
        numeracji gitary 6-strunowej: 1 = wysokie E, 6 = niskie E.'
    parting_style:
      name: Styl przedziałka
      description: Wskazuje, jak peruka jest lub może być rozdzielona, np. przedziałek
        na środku, z boku, dowolny przedziałek, co wpływa na elastyczność stylizacji.
    party_favor_type:
      name: Typ upominku imprezowego
      description: Określa, jakim rodzajem upominku imprezowego jest produkt, np.
        naklejki, minizabawki, bańki, aby umożliwić przeglądanie/filtrowanie w kategorii
        upominków imprezowych.
    party_game_format:
      name: Format gry imprezowej
      description: Podstawowy fizyczny format gry imprezowej.
    party_horn_mouthpiece_type:
      name: Typ ustnika trąbki imprezowej
      description: Określa konstrukcję ustnika, która wpływa na higienę i komfort.
    party_horn_style:
      name: Styl trąbki imprezowej
      description: Opisuje konstrukcję/sposób działania trąbki imprezowej, czyli jak
        się rozwija lub wytwarza dźwięk.
    passenger_car_type:
      name: Typ wagonu pasażerskiego
      description: Określa konkretny typ taboru pasażerskiego (wagonu pasażerskiego)
        w modelu, np. wagon osobowy, sypialny, używany do przeglądania i kompletowania
        zestawów.
    passion_fruit_variety:
      name: Odmiana marakui
      description: Określa botaniczną lub handlową odmianę oferowanej marakui, np.
        fioletowa, żółta, granadilla.
    pasta_sauce_texture:
      name: Tekstura sosu do makaronu
      description: Opisuje konsystencję sosu, np. gładki, z kawałkami, kremowy, aby
        dopasować preferencje konsumentów dotyczące odczucia w ustach.
    pasta_sauce_variety:
      name: Odmiana sosu do makaronu
      description: Klasyfikuje sosy do makaronu według receptury lub stylu, aby kupujący
        mogli szybko znaleźć klasyki, takie jak marinara, lub sosy specjalne, takie
        jak vodka albo pesto.
    pastry_crust_state:
      name: Stan spodu ciasta
      description: Opisuje stan przygotowania lub wypieczenia spodu w momencie zakupu.
    pastry_crust_style:
      name: Styl spodu ciasta
      description: Określa konkretny styl wypieku lub typ ciasta spodu.
    pastry_filling_type:
      name: Typ nadzienia wypieku
      description: Określa podstawowe nadzienie wewnętrzne wypieku lub scone’a.
    patch_adhesion_method:
      name: Metoda klejenia łatki
      description: Określa sposób przywierania łatki do dętki lub opony, np. samoprzylepna,
        wulkanizowana klejem lub aktywowana ciepłem.
    patch_backing_material:
      name: Materiał podkładki naszywki
      description: Materiał użyty na spodzie/bazie naszywki, np. filc, diagonal, stykający
        się z ozdabianym przedmiotem.
    patch_backing_type:
      name: Typ podkładki naszywki
      description: Podkład używany w naszywce, np. termozgrzewalny/do naprasowania,
        samoprzylepny peel-and-stick, rzep, brak.
    patch_base_material:
      name: Materiał podstawowy naszywki
      description: Podstawowy materiał tekstylny bazy/podkładu naszywki z motywem,
        nie dekoracyjnych zdobień.
    patch_border_edge_finish:
      name: Wykończenie obramowania/krawędzi naszywki
      description: Metoda wykończenia krawędzi naszywki, np. krawędź merrowana/owerlokowa,
        krawędź cięta laserowo, wpływająca na trwałość i wygląd.
    patch_placement_area:
      name: Obszar umieszczenia naszywki
      description: Typowy zamierzony obszar umieszczenia naszywki na odzieży/akcesoriach.
    pathogen_removal_capability:
      name: Zdolność usuwania patogenów
      description: Określa, które klasy mikroorganizmów, np. bakterie, pierwotniaki,
        wirusy, pompa ma certyfikację usuwać.
    pattern_sizing_system:
      name: System rozmiarów wykroju
      description: Określa regionalny system lub standard rozmiarów używany w tabeli
        rozmiarów wykroju, np. US, UK, EU.
    peak_style:
      name: Styl daszka
      description: Określa styl daszka w kasku, wpływający na zakres osłony, estetykę
        i przepisy dyscypliny.
    pear_variety:
      name: Odmiana gruszki
      description: Określa kultywar lub odmianę gruszek, np. Bartlett, Bosc, Conference,
        pozwalając kupującym wybrać preferowany smak, teksturę i zastosowanie kulinarne.
    pearl_luster_grade:
      name: Klasa połysku perły
      description: Jakościowa klasa połysku/blasku powierzchni perły.
    pearl_matching_level:
      name: Poziom dopasowania pereł
      description: Wskazuje, jak dobrze perły są dopasowane w partii lub sznurze,
        np. według koloru, rozmiaru i połysku.
    pearl_shape:
      name: Kształt perły
      description: Ogólna kategoria kształtu perły.
    pearl_surface_condition:
      name: Stan powierzchni perły
      description: Wskazuje widoczny stan powierzchni perły na podstawie obecności
        i nasilenia skaz lub plamek.
    pearl_treatment:
      name: Obróbka perły
      description: Ujawnia wszelką obróbkę zastosowaną do perły, wpływającą na kolor/wygląd.
    pearl_type:
      name: Typ perły
      description: Określa odmianę/pochodzenie perły, np. słodkowodna, Akoya, tahitańska,
        South Sea, dla pereł luzem.
    peat_level:
      name: Poziom torfowości
      description: Opisuje intensywność wpływu dymu torfowego w whiskey, od nietorfowej
        po mocno torfową.
    pedal_and_cleat_system_compatibility:
      name: Kompatybilność z systemem pedałów i bloków
      description: Określa, z jakimi standardami pedałów lub bloków zaprojektowano
        podkładkę regulacyjną albo klin, zapewniając kupującym wybór produktu pasującego
        do pedałów i butów.
    pedal_configuration:
      name: Konfiguracja pedałów
      description: Wskazuje, czy krzesło ma pojedynczy pedał, dzielone/niezależne
        pedały czy konstrukcję konwertowalną.
    pedal_mounting_style:
      name: Styl montażu pedału
      description: Określa, w jaki sposób pedał albo nakładka/osłona pedału mocuje
        się do pojazdu, czyli metodę montażu/mocowania.
    pedal_set_components:
      name: Elementy zestawu pedałów
      description: Określa, które pedały są dołączone do zestawu.
    pedal_spindle_material:
      name: Materiał osi pedału
      description: Materiał użyty na oś/wrzeciono pedału, wpływający na wytrzymałość,
        wagę i odporność na korozję.
    pedal_spindle_thread_size:
      name: Rozmiar gwintu osi pedału
      description: Określa standard gwintu osi pedału wkręcanej w ramię korby.
    pedal_type:
      name: Typ pedałów
      description: Opisuje styl pedałów dostarczanych z rowerem, wskazując kompatybilność
        z obuwiem i styl jazdy.
    pellet_accessory_type:
      name: Typ akcesorium z granulatu
      description: Określa konkretny rodzaj akcesorium do pelletu, aby wędkarze mogli
        szybko znaleźć wiertła, bandery lub stopery według potrzeb związanych z budową
        zestawu.
    pellet_grade:
      name: Klasa pelletu
      description: Wskazuje precyzję produkcji lub klasę osiągów kulek airsoftowych.
    pen_ink_color:
      name: Kolor tuszu długopisu
      description: Wskazuje rzeczywisty kolor tuszu podawanego przez długopis, który
        może różnić się od koloru zewnętrznego korpusu.
    penalty_card_accessories_included:
      name: Akcesoria dołączone do kartek kar
      description: Wymienia dodatkowe akcesoria sędziowskie dołączone do kartek kar,
        takie jak portfel, notes wyników, ołówek, moneta, gwizdek lub saszetka.
    penalty_card_colors_included:
      name: Dołączone kolory kartek karnych
      description: Wymienia kolory kartek kar zawartych w zestawie produktu.
    penalty_flag_throw_distance:
      name: Dystans rzutu flagi karnej
      description: Klasyfikacja konstrukcyjna wskazująca zamierzony zasięg rzutu flagi.
    pendant_cutter_safety_features:
      name: Funkcje bezpieczeństwa nożyka-wisiorka
      description: Określa zintegrowane elementy bezpieczeństwa zmniejszające ryzyko
        przypadkowego skaleczenia podczas noszenia/przenoszenia.
    pendant_cutter_wear_method:
      name: Sposób noszenia nożyka-wisiorka
      description: Określa, w jaki sposób nożyk-wisiorek ma być przenoszony lub noszony.
    pepper_variety:
      name: Odmiana pieprzu
      description: Określa odmianę lub gatunek pieprzu użytego w produkcie, pozwalając
        kupującym rozróżniać różne profile smakowe i poziomy ostrości.
    percussion_case_style:
      name: Styl futerału na instrument perkusyjny
      description: Klasyfikuje ogólny styl/konstrukcję futerału, np. miękka torba,
        twardy/sztywny futerał, hybrydowy.
    percussion_instruments_included:
      name: Dołączone instrumenty perkusyjne
      description: Wymienia typy instrumentów perkusyjnych dołączonych, gdy produkt
        jest wieloinstrumentowym zestawem zabawkowym.
    percussion_mallet_handle_grip_style:
      name: Styl chwytu trzonka pałki perkusyjnej
      description: Określa typ wykończenia chwytu na trzonku, poza samą teksturą,
        np. surowe drewno, lakierowane, gumowany chwyt lub owijka.
    percussion_mallet_head_construction:
      name: Konstrukcja główki pałki perkusyjnej
      description: Opisuje budowę/styl konstrukcji główki pałki, np. owinięta włóczką,
        owinięta filcem, gumowa, surowe drewno, co wpływa na dźwięk i trwałość.
    perfumery_base_carrier_type:
      name: Typ nośnika bazy perfumeryjnej
      description: Określa system nośnika/rozpuszczalnika bazy perfumeryjnej, czyli
        z czego baza jest głównie wykonana pod kątem rozcieńczania i właściwości użytkowych.
    perfumery_base_intended_application:
      name: Zamierzone zastosowanie bazy perfumeryjnej
      description: Wskazuje format końcowego użycia, do którego baza jest zaprojektowana,
        np. spray perfumeryjny lub roll-on.
    perfumery_ingredient_carrier_solvent:
      name: Nośnik/rozpuszczalnik składnika perfumeryjnego
      description: Określa nośnik/rozpuszczalnik, w którym dostarczany jest składnik,
        jeśli jest rozcieńczony, np. etanol, DPG, olej jojoba.
    perfumery_ingredient_form:
      name: Forma składnika perfum
      description: Określa fizyczną formę/stan składnika perfumeryjnego w momencie
        dostawy.
    perfumery_ingredient_type:
      name: Typ składnika perfum
      description: Klasyfikuje składnik perfumeryjny według tego, czym jest w praktyce
        perfumeryjnej, np. olejek eteryczny, aromat chemiczny.
    perfumery_ingredient_usage_note:
      name: Nuta użytkowa składnika perfumeryjnego
      description: 'Wskazuje typową rolę w strukturze zapachu: nuta głowy, serca lub
        bazy, uwzględniając, że materiały mogą obejmować różne nuty.'
    perfumery_ingredients:
      name: Składniki perfum
      description: Wymienia typy zużywalnych materiałów zapachowych dołączonych do
        zestawu, np. olejki eteryczne, olejki zapachowe, baza alkoholowa.
    perfumery_note_position:
      name: Pozycja nuty perfumeryjnej
      description: 'Wskazuje typową rolę składnika w strukturze zapachu: głowy, serca
        lub bazy.'
    persimmon_variety:
      name: Odmiana persymony
      description: Określa kultywar lub odmianę persymony, ponieważ różne odmiany,
        takie jak Fuyu lub Hachiya, różnią się teksturą, smakiem, cierpkością i zastosowaniem
        kulinarnym.
    personalization_type:
      name: Typ personalizacji
      description: Określa, czy i w jaki sposób produkt można spersonalizować na wydarzenie,
        np. monogram, imię/data, wkładka ze zdjęciem.
    phonics_focus:
      name: Zakres foniki
      description: Określa, na których umiejętnościach fonicznych i czytania słów
        skupia się zabawka do czytania.
    physalis_variety:
      name: Odmiana miechunki
      description: Określa konkretny gatunek botaniczny, kultywar lub popularną odmianę
        miechunki w sprzedaży.
    pi_ata_filler_type_included:
      name: Typ dołączonego wypełnienia piniaty
      description: Jeśli wypełnienie jest dołączone, określa typ zawartości.
    pi_ata_hanging_method:
      name: Metoda zawieszania piniaty
      description: Sposób, w jaki piniata jest zaprojektowana do zawieszenia lub podparcia,
        np. pętla, haczyk, dołączony sznurek itp.
    pi_ata_opening_type:
      name: Typ otwarcia piniaty
      description: Sposób dostępu do otworu na wypełnienie i jego zamykania, np. klapka,
        rzep, zamek, wstępnie zamknięte itp.
    piccolo_key_system:
      name: System klap pikolo
      description: Określa system/projekt mechaniki używany w pikolo, zwykle system
        Boehma w nowoczesnych pikolo.
    piccolo_keywork_features:
      name: Cechy mechaniki pikolo
      description: Określa istotne mechanizmy i opcje mechaniki pikolo.
    pick_grip_aid:
      name: Ułatwienie chwytu kostki
      description: Wskazuje podstawowe wbudowane ułatwienie chwytu kostki poza ogólnym
        odczuciem/teksturą powierzchni, np. otwory chwytne, wytłoczone logo, gumowa
        wstawka.
    pickleball_construction_type:
      name: Rodzaj wykonania piłki do pickleballa
      description: Konstrukcja produkcyjna piłki, np. bezszwowa jednoczęściowa lub
        spawana dwuczęściowa, która wpływa na trwałość i powtarzalność lotu.
    pickling_method:
      name: Metoda kiszenia/marynowania
      description: Określa medium lub technikę konserwowania używaną do kiszenia/marynowania,
        np. zalewa octowa lub fermentacja mlekowa.
    pickup_and_preamp_configuration:
      name: Konfiguracja przetwornika i przedwzmacniacza
      description: Wskazuje, czy altówka ma wbudowany przetwornik i/lub aktywny przedwzmacniacz
        do gry ze wzmocnieniem albo nagrywania.
    pickup_configuration:
      name: Konfiguracja przetworników
      description: Opisuje ogólny układ przetworników gitary elektrycznej przy użyciu
        popularnych skrótów, np. SSS, HSS, HH.
    pickup_cover_material:
      name: Materiał pokrycia przetworników
      description: Określa podstawowy materiał osłony przetwornika, jeśli występuje,
        w tym typowe wykończenia platerowane, gdy tak określa je producent.
    pickup_cover_type:
      name: Typ osłony przetwornika
      description: Określa, czy przetwornik gitary elektrycznej ma osłonę oraz jej
        materiał/styl, np. metalowa lub plastikowa.
    pickup_string_spacing:
      name: Rozstaw strun przetwornika
      description: Standard rozstawu nabiegunników/strun, do którego wykonano przetwornik,
        np. Fender/F-spaced lub Gibson/standard, wpływający na wyrównanie w gitarach
        z tremolo.
    pie_crust_type:
      name: Typ spodu do tarty
      description: Określa styl lub typ spodu używanego do tarty albo pie, np. kruche
        ciasto listkujące, spód z krakersów graham lub spód bezglutenowy.
    piece_configuration:
      name: Konfiguracja części
      description: Wskazuje, z ilu oddzielnych części składa się kij bilardowy, shaft
        lub podpórka, wpływając na przenośność i styl gry.
    pillow_form_size:
      name: Rozmiar formy poduszki
      description: Standardowe oznaczenie gotowego rozmiaru formy/wkładu poduszki,
        np. 18” × 18”.
    pilot_helmet_communications_integration:
      name: Integracja komunikacji kasku pilota
      description: Wskazuje, czy kask zawiera komponenty komunikacji lotniczej lub
        jest do nich wstępnie skonfigurowany.
    pilot_helmet_visor_configuration:
      name: Konfiguracja wizjera kasku pilota
      description: Określa konfigurację wizjera/osłony twarzy dołączoną do kasku pilota.
    pin_attachment_type:
      name: Typ mocowania pina
      description: Określa mechanizm zapięcia/podkładu pina używany do mocowania pina
        do odzieży lub powierzchni, np. zapięcie motylkowe, podkład magnetyczny.
    pin_backing_type:
      name: Typ podkładu pina
      description: Określa mechanizm zapięcia/podkładu używany do mocowania pina do
        odzieży lub akcesoriów.
    pin_cushion_attachment_style:
      name: Styl mocowania poduszeczki na szpilki
      description: Sposób noszenia, mocowania lub ustawiania poduszeczki na szpilki
        podczas użycia.
    pin_cushion_features:
      name: Cechy poduszeczki na szpilki
      description: Funkcje wykraczające poza podstawowe przechowywanie szpilek.
    pin_face_customization_method:
      name: Metoda personalizacji frontu pina
      description: Określa sposób wykonania przedniego wzoru, np. emalia twarda, emalia
        miękka, nadruk.
    pin_type:
      name: Typ pina
      description: Określa styl lub format produktu typu pin używanego jako kolekcjonerski
        gadżet kibicowski.
    ping_pong_certification:
      name: Certyfikacja ping-ponga
      description: Deklaruje oficjalny standard lub poziom zatwierdzenia produktu
        przez organ zarządzający.
    ping_pong_competition_certification:
      name: Certyfikacja turniejowa ping-ponga
      description: Wskazuje oficjalny status certyfikacji piłeczki pingpongowej do
        gry regulaminowej, np. zatwierdzona przez ITTF.
    ping_pong_paddle_handle_style:
      name: Styl uchwytu paletki pingpongowej
      description: Definiuje kształt/styl uchwytu paletki, który wpływa na komfort
        chwytu i technikę gry.
    ping_pong_robot_accessory_type:
      name: Typ akcesorium do robota pingpongowego
      description: Określa funkcjonalny podtyp akcesorium, aby kupujący mogli szybko
        zawęzić wyniki, np. siatki lub zasilacze.
    ping_pong_rubber_surface_type:
      name: Typ powierzchni okładziny pingpongowej
      description: Określa styl/teksturę gumowej powierzchni zastosowanej na paletce,
        wpływającą na charakterystykę rotacji i szybkości.
    ping_pong_rubber_type:
      name: Typ okładziny pingpongowej
      description: Określa styl konstrukcji powierzchni arkusza okładziny pingpongowej,
        wpływający na charakterystykę gry.
    ping_pong_table_type:
      name: Rodzaj stołu do tenisa stołowego
      description: Klasyfikuje ogólny styl lub format stołu dla łatwiejszego porównania,
        np. turniejowy, nakładka konwersyjna, mini.
    pipe_instrument_voicing_sound_production_method:
      name: Brzmienie/metoda wytwarzania dźwięku instrumentu piszczałkowego
      description: Określa sposób wytwarzania dźwięku przez instrument, czyli mechanizm
        przepływu powietrza, pomagając rozróżniać fletnie Pana, piszczałki stroikowe
        i rodziny piszczałek organowych w filtrach.
    piston_application_type:
      name: Typ zastosowania tłoka
      description: Zamierzone zastosowanie/obciążenie tłoka, np. zamiennik, performance/wyścigowy,
        heavy-duty.
    piston_crown_dish_style:
      name: Kształt denka/komory tłoka
      description: Kształt denka tłoka, który wpływa na objętość komory spalania i
        stopień sprężania, np. płaski, wypukły, wklęsły.
    piston_pin_retention_type:
      name: Typ zabezpieczenia sworznia tłoka
      description: Określa sposób zabezpieczenia sworznia tłoka w zespole tłoka/korbowodu.
    pit_configuration:
      name: Konfiguracja zeskoku
      description: Definiuje format konstrukcyjny strefy lądowania, jednoczęściowy
        lub wielomodułowy, a tym samym liczbę dostarczanych sekcji albo modułów.
    pit_cover_type:
      name: Typ pokrowca zeskoku
      description: Określa powierzchnię lub arkusz ochronny dostarczany z zeskokiem,
        wpływający na odporność na kolce, ochronę przed warunkami pogodowymi i preferencje
        zawodników.
    pitahaya_flesh_color:
      name: Kolor miąższu pitahai
      description: Określa kolor wewnętrznego miąższu pitahai, czyli smoczego owocu,
        np. biały, czerwony, magenta, będący kluczowym wyróżnikiem wpływającym na
        smak, wygląd i postrzeganą wartość odżywczą.
    pitch_mat_coverage_length:
      name: Długość pokrycia maty pitch
      description: Klasyfikuje matę pitch do krykieta według części wicketu, którą
        pokrywa, np. pełny lub pół pitch.
    pitch_range:
      name: Zakres wysokości dźwięku
      description: Opisuje postrzegany zakres wysokości/jasność dźwięku shakera.
    pitch_standard:
      name: Standard stroju
      description: Określa standard stroju, czyli odniesienie strojenia, dla którego
        zbudowano flet prosty, np. A=440, A=442, A=415.
    pitching_rubber_size_designation:
      name: Oznaczenie rozmiaru płyty miotacza
      description: Wskazuje standardową klasyfikację rozmiaru boiska dla płyty miotacza,
        ułatwiając wybór bez konieczności znajomości dokładnych wymiarów.
    pitching_screen_style:
      name: Styl ekranu do narzutu
      description: Definiuje konstrukcję ekranu, aby kupujący mogli szybko wybrać
        właściwy układ ochronny do swojego scenariusza treningowego.
    pitching_target_design:
      name: Konstrukcja celu do narzutu
      description: Klasyfikuje ogólny styl lub konfigurację celu do narzutu.
    pitching_wheel_count:
      name: Liczba kół maszyny do narzutu
      description: Wskazuje liczbę kół napędowych używanych przez maszynę do narzutu.
    pivot_adjustability:
      name: Regulacja pivotu
      description: Wskazuje, czy nożyczki mają regulowaną śrubę pivotu do dostrajania
        napięcia cięcia.
    pivot_piece_type:
      name: Typ elementu pivotu
      description: Rozróżnia różne dostarczane kształty interfejsu pivotu, takie jak
        tradycyjne miseczki lub styl rurowy.
    place_card_holder_closure_mechanism:
      name: Mechanizm zamknięcia uchwytu na winietkę
      description: Określa, w jaki sposób uchwyt chwyta lub zabezpiecza kartę.
    place_card_orientation:
      name: Orientacja winietki
      description: Określa orientację winietki podczas użycia/ekspozycji.
    place_card_printing_status:
      name: Status nadruku winietki
      description: Wskazuje, czy winietka jest pusta do ręcznego wypisania/nadruku,
        wstępnie nadrukowana (imiona niespersonalizowane) czy spersonalizowana/drukowana
        na zamówienie.
    placket_type:
      name: Typ plisy
      description: Określa styl przedniego rozcięcia w koszulce polo, w tym liczbę
        guzików lub alternatywne zapięcia.
    planetarium_content_theme:
      name: Temat treści planetarium
      description: Podstawowa treść wyświetlana przez projektor planetarium.
    planetarium_projection_content_format:
      name: Format treści projekcji planetarium
      description: Określa mechanizm treści projekcji używany przez planetarium, np.
        fizyczne dyski/slajdy lub efekt cyfrowy/LED.
    plant_fiber_type:
      name: Typ włókna roślinnego
      description: Konkretny typ włókna pochodzenia roślinnego, gdy źródłem włókna
        ciętego jest roślina.
    plaster_gauze_finish:
      name: Wykończenie gazy gipsowej
      description: Tendencja końcowego wykończenia powierzchni po aplikacji i wygładzeniu.
    plaster_gauze_grade:
      name: Klasa gazy gipsowej
      description: Klasa zamierzonego użycia gazy gipsowej, np. rękodzielnicza/uczniowska
        lub profesjonalna.
    plaster_gauze_weave_density:
      name: Gęstość splotu gazy gipsowej
      description: Względna otwartość/ścisłość splotu gazy, wpływająca na wytrzymałość
        i wchłanianie gipsu.
    plastic_canvas_finish:
      name: Wykończenie kanwy plastikowej
      description: Obróbka powierzchni/wykończenia rolki kanwy plastikowej.
    plastic_canvas_sheet_finish:
      name: Wykończenie arkusza kanwy plastikowej
      description: Obróbka powierzchni/krawędzi arkusza kanwy plastikowej.
    plastic_canvas_transparency:
      name: Przezierność kanwy plastikowej
      description: Stopień przezroczystości/nieprzezroczystości kanwy plastikowej.
    plate_bottom_design:
      name: Konstrukcja spodu płyty
      description: Opisuje konstrukcję spodniej części płyty, która wpływa na przyczepność,
        stabilność i bezpieczeństwo na różnych nawierzchniach gry.
    plate_compatibility_standard:
      name: Norma zgodności płyty
      description: Wskazuje standard talerzy obciążeniowych, do którego zaprojektowano
        gryf, np. olimpijski 50 mm, standardowy 25 mm.
    plate_installation_type:
      name: Typ montażu płyty
      description: Określa, w jaki sposób płyta jest mocowana lub ustawiana na boisku,
        np. w gruncie, na kolcach, przenośna, pozwalając kupującym wybierać między
        opcjami stałymi i przenośnymi.
    plate_size_category:
      name: Kategoria rozmiaru płyty
      description: Klasyfikuje płytę według poziomu gry lub standardu regulaminowego,
        aby kupujący mogli szybko znaleźć sprzęt zgodny z wymogami ligi.
    play_dough_putty_kit_contents:
      name: Zawartość zestawu ciastoliny i masy plastycznej
      description: Określa główne dołączone komponenty poza samą masą, np. narzędzia,
        foremki, ekstruder, pojemnik do przechowywania.
    play_dough_tool_set_items_included:
      name: Elementy zestawu narzędzi do ciastoliny
      description: Określa typy narzędzi i akcesoriów dołączonych do zestawu narzędzi
        do ciastoliny, np. wałki, wykrawacze, foremki.
    play_environment_suitability:
      name: Przydatność środowiska zabawy
      description: Określa zamierzone środowisko zabawy dla zestawu, np. wewnątrz,
        na zewnątrz, w wodzie.
    play_food_features:
      name: Cechy zabawkowego jedzenia
      description: Specjalne funkcje lub cechy realizmu elementów zabawkowego jedzenia.
    play_food_items_included:
      name: Dołączone elementy zabawkowego jedzenia
      description: Wskazuje typy zabawkowego jedzenia dołączonego do zestawu kuchni
        do zabawy.
    play_food_size_scale:
      name: Skala rozmiaru zabawkowego jedzenia
      description: Wskazuje przybliżoną skalę rozmiaru elementów udawanego jedzenia
        pod kątem kompatybilności z kuchniami do zabawy, lalkami i zestawami do zabawy.
    play_money_set_components_included:
      name: Elementy dołączone do zestawu pieniędzy do zabawy
      description: Określa, które typy komponentów są dołączone do zestawu pieniędzy
        do zabawy/bankowości.
    play_pattern:
      name: Wzorzec zabawy
      description: Podstawowy sposób użycia zabawki, np. fidget/antystresowa, rzeźba/sztuka
        na biurko, konstrukcja/budowanie lub łamigłówki.
    play_sprinkler_mounting_type:
      name: Typ montażu zraszacza do zabawy
      description: Sposób ustawiania/mocowania zraszacza do zabawy podczas użytkowania.
    play_vehicle_lights_and_sounds:
      name: Światła i dźwięki pojazdu do zabawy
      description: Wskazuje, czy pojazd zabawkowy ma elektroniczne efekty zabawy,
        takie jak światła i/lub dźwięki.
    play_vehicle_scale:
      name: Skala pojazdu do zabawy
      description: Wskazuje proporcję skali pojazdu zabawkowego, często używaną dla
        pojazdów die-cast i zabawek podobnych do modeli.
    player_size_category:
      name: Kategoria rozmiaru odtwarzacza
      description: Definiuje zamierzony rozmiar/przedział wiekowy gracza, do którego
        pasuje zestaw wyposażenia łapacza, np. Tee Ball, młodzieżowy, pośredni, dla
        dorosłych.
    player_size_range:
      name: Zakres rozmiaru gracza
      description: Określa zamierzony zakres rozmiaru użytkownika dla paska/podparcia,
        np. dziecięcy, dla dorosłych, uniwersalny.
    playing_environment:
      name: Środowisko gry
      description: Określa podstawową nawierzchnię lub kontekst gry, do którego zaprojektowano
        piłkę hokejową.
    playing_method:
      name: Metoda gry
      description: Podstawowy sposób gry/uruchamiania instrumentu.
    playing_surface_material:
      name: Materiał powierzchni do zabawy
      description: Określa materiał przedniej powierzchni gry cajonu (tapy), który
        silnie wpływa na brzmienie i odczucie gry.
    playing_surface_type:
      name: Typ powierzchni gry
      description: Opisuje konstrukcję/odczucie powierzchni gry pada treningowego.
    playset_activities_included:
      name: Dołączone aktywności zestawu do zabawy
      description: Określa główne aktywności/elementy zabawy wbudowane w zestaw huśtawek/zestaw
        do zabawy, aby pomóc kupującym filtrować według tego, co dzieci mogą robić
        na konstrukcji.
    playset_installation_type:
      name: Typ montażu zestawu do zabawy
      description: Określa sposób montażu lub zabezpieczenia zestawu huśtawek/zestawu
        do zabawy.
    playset_items_included:
      name: Dołączone elementy zestawu do zabawy
      description: Określa typy elementów do zabawy w udawanie dołączonych do piknikowego
        zestawu do zabawy, np. jedzenie, zastawa, koc, koszyk.
    pliers_jaw_style:
      name: Styl szczęk szczypiec
      description: Opisuje podstawową konfigurację szczęk lub funkcjonalny styl szczypiec.
    plum_variety:
      name: Odmiana śliwki
      description: Określa konkretny kultywar lub odmianę śliwki, umożliwiając kupującym
        wybór według smaku, koloru i zamierzonego zastosowania kulinarnego.
    plumcot_variety:
      name: Odmiana śliwomoreli
      description: Określa konkretny kultywar lub odmianę handlową plumcota, np. Flavor
        King, Dapple Dandy, co może wpływać na smak, kolor i sezonowość.
    plunger_mute_handle_type:
      name: Typ uchwytu tłumika plunger
      description: Określa styl uchwytu lub chwytu używanego do trzymania i manipulowania
        tłumikiem plunger w celu uzyskania efektów wa-wa.
    pocket_closure_type:
      name: Typ zapięcia kieszeni
      description: Definiuje sposób zabezpieczenia każdej kieszeni, pomagając użytkownikom
        znaleźć spodnie z bezpiecznym przechowywaniem podczas aktywności.
    pocket_knife_opening_mechanism:
      name: Mechanizm otwierania scyzoryka
      description: Sposób wysuwania/otwierania ostrza, np. ręczny nail nick, kołek
        pod kciuk, flipper, wspomagany, automatyczny itp.
    pocket_style:
      name: Styl kieszeni
      description: Określa główną konstrukcję kieszeni występującą w spodniach.
    pocket_type:
      name: Typ łuzy
      description: Określa styl lub obecność kieszeni na odzieży.
    pod_retention_system:
      name: System utrzymywania podów
      description: Opisuje, w jaki sposób pody paintballowe są utrzymywane na miejscu
        i uwalniane z uprzęży lub pasa.
    pogo_stick_footrest_type:
      name: Typ podnóżka pogo sticka
      description: Opisuje konstrukcję platformy/kołka pod stopę używaną do stania
        na pogo sticku.
    pogo_stick_suspension_type:
      name: Typ zawieszenia pogo sticka
      description: Określa mechanizm odbicia pogo sticka, który wpływa na odczucie,
        trwałość i konserwację.
    poi_handle_type:
      name: Typ uchwytu poi
      description: Określa styl uchwytu/chwytu/mocowania używanego do trzymania poi.
    poi_light_source:
      name: Źródło światła poi
      description: W przypadku podświetlanych poi określa technologię oświetlenia.
    poi_tether_type:
      name: Typ uwięzi poi
      description: Wskazuje typ uwięzi łączącej głowicę poi z uchwytem, gałką lub
        pętlą nadgarstkową, np. sznurek, lina, łańcuch.
    poi_type:
      name: Typ poi
      description: Określa podstawową konstrukcję/zastosowanie poi, np. treningowe,
        LED, ogniowe.
    point_type:
      name: Typ punktu
      description: Kształt/styl czubka używanego w igle do haftu.
    pointe_shoe_shank_length:
      name: Długość podeszwy usztywniającej pointy
      description: Część długości buta, którą wspiera podeszwa usztywniająca, np.
        pełna długość lub 3/4 długości.
    pointe_shoe_shank_strength:
      name: Twardość podeszwy usztywniającej pointy
      description: Poziom sztywności podeszwy usztywniającej pointy, wpływający na
        podparcie i czas rozchodzenia.
    poker_accessory_storage_included:
      name: Dołączone przechowywanie akcesoriów pokerowych
      description: Wskazuje, dla których dodatkowych elementów pokerowych akcesorium
        zapewnia dedykowane przechowywanie.
    poker_chip_tray_rack_configuration:
      name: Konfiguracja tacki/stojaka na żetony pokerowe
      description: Opisuje styl organizacji wewnętrznej tacki/stojaka na żetony, czyli
        rzędy i pojemność na rząd.
    pole_anchoring_method:
      name: Metoda kotwienia słupka
      description: Definiuje sposób mocowania słupka do podłoża lub nawierzchni gry.
    pole_basket_type:
      name: Typ talerzyka kijka
      description: Klasyfikuje styl lub rozmiar talerzyka zamocowanego przy końcówce
        kijka narciarskiego, wskazując zamierzone warunki śniegowe.
    pole_connection_system:
      name: System łączenia tyczek
      description: Określa mechanizm łączący segmenty tyczki, np. linka elastyczna,
        gwint lub system hub, pomagając użytkownikom ocenić szybkość rozstawiania
        i kompatybilność.
    pole_system_type:
      name: Typ systemu tyczek
      description: Opisuje system podpory konstrukcyjnej lub styl rozstawiania namiotu,
        np. aluminiowe stelaże, nadmuchiwane rurki powietrzne, rozstawianie na kijkach
        trekkingowych.
    police_equipment_fitment:
      name: Dopasowanie wyposażenia policyjnego
      description: Określa, jakie wyposażenie organów ścigania pojazd jest skonfigurowany
        lub wstępnie okablowany obsługiwać.
    police_vehicle_equipment_package:
      name: Pakiet wyposażenia pojazdu policyjnego
      description: Wskazuje policyjną zabudowę/wyposażenie dołączone do pojazdu w
        momencie sprzedaży.
    police_vehicle_light_siren_equipment:
      name: Wyposażenie świetlno-dźwiękowe pojazdu policyjnego
      description: Określa, jakie awaryjne urządzenia ostrzegawcze są zainstalowane
        w samochodzie policyjnym.
    police_vehicle_upfit_level:
      name: Poziom zabudowy pojazdu policyjnego
      description: Opisuje, jakie policyjne wyposażenie/zabudowa są zainstalowane
        w trucku.
    polish_formulation:
      name: Formuła politury
      description: Wskazuje bazę/skład chemiczny politury do podstrunnicy, nie metodę
        aplikacji.
    polish_purpose:
      name: Przeznaczenie politury
      description: Podstawowy zamierzony efekt politury na powierzchni instrumentu.
    pollen_level:
      name: Poziom pyłku
      description: Wskazuje ilość/prawdopodobieństwo plamienia pyłkiem przez odmianę
        lilii.
    polymer_clay_firmness_level:
      name: Poziom twardości glinki polimerowej
      description: Względna twardość/miękkość glinki polimerowej przed wypiekaniem,
        czyli podatność na obróbkę.
    polymer_clay_translucency:
      name: Przezierność glinki polimerowej
      description: Wizualna nieprzezroczystość/przezroczystość glinki polimerowej
        po utwardzeniu.
    pom_pom_handle_style:
      name: Styl uchwytu pomponu
      description: Opisuje styl lub konstrukcję uchwytu/chwytu używanego do trzymania
        pomponu.
    pom_pom_trim_backing_tape_material:
      name: Materiał taśmy/podkładu lamówki z pomponami
      description: Określa materiał wszywanej taśmy lub plecionki, do której przymocowane
        są pompony, czyli bazę lamówki.
    pom_pom_type:
      name: Typ pomponu
      description: Wskazuje obecność i konkretny typ pomponu lub bobble na czapce.
    pomegranate_product_form:
      name: Forma produktu z granatu
      description: Opisuje oferowaną fizyczną formę, np. cały owoc, obrane osnówki,
        nasiona, mrożone osnówki.
    pomegranate_variety:
      name: Odmiana granatu
      description: Określa konkretny kultywar lub odmianę owocu granatu, np. Wonderful,
        Bhagwa, Kandhari.
    ponytail_holder_style:
      name: Styl gumki do kucyka
      description: Opisuje konkretną konstrukcję lub formę gumki do kucyka, aby kupujący
        mogli wybrać preferowany styl.
    popcorn_form:
      name: Forma popcornu
      description: Wskazuje fizyczną lub przygotowaną formę produktu popcornowego,
        np. gotowy do spożycia, ziarna, opakowanie do mikrofalówki, zestaw przypraw
        lub puszka prezentowa.
    pork_rind_form:
      name: Forma skórek wieprzowych
      description: Klasyfikuje fizyczną formę lub styl przekąsek ze skórek wieprzowych,
        np. skórka, skwarki, chrupki, pellet itp.
    portability_features:
      name: Funkcje poprawiające przenośność
      description: Wymienia wbudowane elementy ułatwiające przemieszczanie, przenoszenie
        lub przechowywanie leżaka.
    portability_frame_type:
      name: Typ przenośności/ramy
      description: Wskazuje, czy dzwony orkiestrowe są przenośne/w stylu ramy marszowej
        czy stacjonarne/w stylu ramy koncertowej.
    portable_electronic_game_features:
      name: Cechy przenośnej gry elektronicznej
      description: Kluczowe funkcje rozgrywki/sprzętowe obsługiwane przez urządzenie.
    post_surgery_stage_suitability:
      name: Przydatność po etapie pooperacyjnym
      description: Wskazuje, do którego etapu rekonwalescencji, jeśli dotyczy, zaprojektowano
        body, co jest ważne dla kupujących medyczną bieliznę modelującą.
    postage_stamp_format:
      name: Format znaczka pocztowego
      description: Sposób oferowania/pakowania znaczka definitywnego, np. pojedynczy,
        para, pasek, blok, arkusz, panel książeczkowy, rolka itp.
    postmark_type:
      name: Typ stempla pocztowego
      description: Typ kasownika/stempla pocztowego obecnego na używanych znaczkach
        definitywnych.
    potato_cut_style:
      name: Styl krojenia ziemniaków
      description: Wskazuje fizyczny styl krojenia lub przygotowania ziemniaków, gdy
        nie są sprzedawane w całości.
    potato_intended_use:
      name: Zamierzone zastosowanie ziemniaków
      description: Odróżnia ziemniaki przeznaczone do natychmiastowego spożycia od
        sadzeniaków lub mrożonych produktów przetworzonych.
    potato_variety:
      name: Odmiana ziemniaków
      description: Określa kultywar/odmianę ziemniaków, pozwalając kupującym znaleźć
        konkretne typy, takie jak „Yukon Gold”, „Maris Piper” lub „Purple Majesty”.
    pottery_clay_firing_required:
      name: Wymagany wypał gliny ceramicznej
      description: Wskazuje, czy materiał wymaga wypału w piecu, aby osiągnąć zamierzoną
        końcową twardość/wykończenie.
    pottery_slip_application_method:
      name: Metoda aplikacji angoby ceramicznej
      description: Określa zamierzoną technikę aplikacji angoby.
    pottery_slip_compatible_clay_body:
      name: Kompatybilny korpus gliny dla angoby ceramicznej
      description: Wskazuje typy korpusu gliny, do których angoba jest zaprojektowana
        lub z którymi współpracuje.
    pottery_slip_form:
      name: Forma angoby ceramicznej
      description: Wskazuje, czy angoba jest sprzedawana jako gotowy do użycia płyn
        czy jako sucha mieszanka/proszek wymagający wymieszania.
    pouch_design:
      name: Konstrukcja kieszeni przedniej
      description: Opisuje konstrukcję lub cechy ulepszeń przedniej kieszeni.
    pouch_style:
      name: Styl kieszeni przedniej
      description: Określa konstrukcję przedniej kieszeni, uwzględniając komfort,
        podparcie i preferencje estetyczne.
    powdered_beverage_variety:
      name: Odmiana napoju w proszku
      description: Klasyfikuje produkt według typu napoju, który przygotowuje, np.
        lemoniada, napój sportowy, shake proteinowy.
    power_rack_style:
      name: Styl racka treningowego
      description: Określa ogólną konstrukcję/konfigurację racka, pomagając kupującym
        odróżnić pełne klatki, half racki i warianty oszczędzające miejsce.
    power_steering_fluid_formulation:
      name: Formuła płynu do wspomagania kierownicy
      description: Ogólna rodzina formuły płynu, np. na bazie ATF, dedykowany hydrauliczny/CHF
        lub uniwersalny, używana do filtrowania kompatybilności na wysokim poziomie.
    practice_mute_audio_output:
      name: Wyjście audio tłumika ćwiczebnego
      description: Określa typ połączenia wyjścia audio dostępnego w tłumiku ćwiczebnym
        do monitorowania i/lub nagrywania, często w cichych/elektronicznych tłumikach
        ćwiczebnych.
    practice_mute_intonation_impact:
      name: Wpływ tłumika ćwiczebnego na intonację
      description: Opisuje oczekiwany wpływ na strój/intonację podczas używania tłumika
        ćwiczebnego.
    practice_mute_venting_valve_type:
      name: Typ odpowietrzania/zaworu tłumika ćwiczebnego
      description: Określa, czy i w jaki sposób tłumik ćwiczebny jest wentylowany
        lub zawiera regulowany zawór do zmiany oporu/głośności.
    practice_pad_features:
      name: Cechy pada treningowego
      description: Wyróżnia funkcjonalne cechy pada treningowego poza rozmiarem/materiałem.
    practice_pad_mounting_style:
      name: Styl montażu pada treningowego
      description: Wskazuje, jak pad treningowy ma być ustawiany lub mocowany podczas
        użycia.
    practice_pad_rebound_level:
      name: Poziom odbicia pada treningowego
      description: Wskazuje względne odbicie/reakcję pada treningowego w porównaniu
        z typowymi naciągami perkusyjnymi.
    practice_pad_surface_configuration:
      name: Konfiguracja powierzchni pada treningowego
      description: Opisuje, czy pad ma jedną czy wiele powierzchni gry i czy różnią
        się odczuciem.
    pregnancy_stage_suitability:
      name: Przydatność na etap ciąży
      description: Wskazuje, do których etapów ciąży lub okresu poporodowego zaprojektowano
        odzież.
    preparation_state:
      name: Stan przygotowania
      description: Wskazuje poziom przygotowania lub gotowania wymagany przed spożyciem.
    preparation_style:
      name: Styl przygotowania
      description: Definiuje stan krojenia lub przetworzenia kasztanów wodnych w sprzedaży,
        np. całe, krojone, prażone, mrożone.
    preservation_medium:
      name: Medium konserwujące
      description: Określa podstawowy płyn lub medium, w którym konserwowane są oliwki
        albo kapary, np. solanka, oliwa z oliwek, ocet.
    presser_foot_attachment_method:
      name: Metoda mocowania stopki dociskowej
      description: Wskazuje, jak stopka dociskowa maszyny do szycia mocuje się do
        uchwytu/trzppienia stopki, np. zatrzaskowo lub na śrubę, co wpływa na kompatybilność.
    pressure_gauge_type:
      name: Typ manometru
      description: Wskazuje typ manometru dołączonego do pompki rowerowej, jeśli występuje.
    pressure_measurement_unit:
      name: Jednostka pomiaru ciśnienia
      description: Wskazuje jednostkę używaną do odczytu lub kalibracji czujnika ciśnienia,
        przydatną do porównywania produktów i zapewnienia kompatybilności wskaźnika/ECU.
    pressure_plate_balance_type:
      name: Typ wyważenia docisku sprzęgła
      description: Wskazuje, czy docisk sprzęgła jest wyważony wewnętrznie czy wymaga/zakłada
        zewnętrzne wyważenie dopasowane do konfiguracji silnika/koła zamachowego.
    pressure_plate_components_included:
      name: Dołączone komponenty docisku sprzęgła
      description: Określa, co jest dołączone do oferty docisku sprzęgła.
    pressure_sensor_application:
      name: Zastosowanie czujnika ciśnienia
      description: Określa układ pojazdu/punkt pomiarowy, do którego zaprojektowano
        czujnik ciśnienia.
    pressure_sensor_port_thread_standard:
      name: Standard portu/gwintu czujnika ciśnienia
      description: Określa mechaniczny standard portu/gwintu używany do montażu czujnika
        w układzie pojazdu.
    pressurization_method:
      name: Metoda zwiększania ciśnienia
      description: Określa, w jaki sposób ciśnienie jest generowane lub utrzymywane
        wewnątrz urządzenia.
    pretend_housekeeping_set_items_included:
      name: Elementy dołączone do zestawu do udawania sprzątania
      description: Wymienia akcesoria do sprzątania dołączone do zestawu, np. mop,
        miotła, szufelka, butelka ze spryskiwaczem.
    pretend_play_electronic_features:
      name: Elektroniczne funkcje zabawy w udawanie
      description: Funkcje elektroniczne/interaktywne dołączone do produktu do zabawy
        w udawanie.
    pretend_play_set_pieces_included:
      name: Elementy dołączone do zestawu do zabawy w udawanie
      description: Kluczowe rekwizyty/komponenty dołączone do zestawu do zabawy w
        udawanie, np. kasa fiskalna, zabawkowe jedzenie, narzędzia.
    pretend_play_set_theme:
      name: Motyw zestawu do zabawy w udawanie
      description: Podstawowy scenariusz/motyw zabawy w udawanie reprezentowany przez
        produkt, przydatny do przekrojowego wyszukiwania wśród wszystkich produktów
        Pretend Play dla dzieci.
    pretzel_coating:
      name: Polewa precla
      description: Określa przyprawę lub polewę zewnętrzną na preclu, obejmującą zarówno
        opcje wytrawne, np. solone, przyprawione, jak i słodkie, np. czekolada, jogurt,
        karmel.
    pretzel_shape:
      name: Kształt precla
      description: Określa fizyczną formę precla, np. skręcony, paluszek, kąsek, która
        jest kluczowym wyróżnikiem używanym przez klientów podczas wyszukiwania lub
        filtrowania.
    primary_component_material:
      name: Podstawowy materiał komponentu
      description: Podstawowy materiał bloku silnika.
    primary_dish_application:
      name: Podstawowe zastosowanie dania
      description: Określa główne danie lub sposób przygotowania, do którego przeznaczone
        jest ciasto.
    primary_plant_base:
      name: Podstawowa baza roślinna
      description: Wskazuje główne składniki niemleczne użyte do stworzenia alternatywy
        sera.
    primary_plant_protein_source:
      name: Podstawowe źródło białka roślinnego
      description: Określa główny składnik roślinny dostarczający białko w produkcie.
    primary_sweetener_source:
      name: Podstawowe źródło słodzika
      description: Określa roślinę lub surowiec, z którego otrzymano syrop.
    print_placement:
      name: Położenie nadruku
      description: Wskazuje, gdzie na koszulce umieszczona jest główna grafika/logo.
    print_technique:
      name: Technika nadruku
      description: Określa metodę zdobienia/nadruku używaną na grafice koszulki.
    printable_canvas_intended_use:
      name: Zamierzone zastosowanie płótna do druku
      description: Podstawowe zastosowanie, do którego zoptymalizowano płótno do druku.
    printable_fabric_format:
      name: Format tkaniny do druku
      description: Określa, w jakiej formie dostarczana jest bawełna do druku, jako
        pojedyncze arkusze czy ciągła rolka, co wpływa na podawanie w drukarce i przebieg
        pracy nad projektem.
    prism_material:
      name: Materiał pryzmatu
      description: Określa materiał samego elementu optycznego, czyli pryzmatu, który
        wpływa na przejrzystość, trwałość i odporność na zarysowania.
    prisoner_transport_configuration:
      name: Konfiguracja transportu więźniów
      description: Określa, czy i w jaki sposób van jest skonfigurowany do transportu
        zatrzymanych/więźniów.
    prisoner_transport_partition_type:
      name: Typ przegrody do transportu więźniów
      description: Typ wewnętrznej przegrody/klatki oddzielającej przedni i tylny
        przedział.
    privacy_or_acoustic_feature:
      name: Funkcja prywatności lub akustyczna
      description: Określa wbudowane elementy prywatności lub akustyczne, takie jak
        panele działowe, ekrany akustyczne lub pełne zabudowy.
    processing_state:
      name: Stan przetworzenia
      description: Wskazuje, czy pióra są sterylizowane/myte lub w inny sposób przygotowane
        do użycia w rękodziele.
    produce_grade:
      name: Klasa produktu rolnego
      description: Klasyfikuje klasę jakości przypisaną kiwi na podstawie rozmiaru,
        wyglądu i stanu.
    produce_growth_stage:
      name: Etap wzrostu produktu rolnego
      description: Określa etap wzrostu, w którym produkt rolny jest sprzedawany,
        np. mikroliście, młode liście, dojrzałe liście, żywa roślina, nasiona.
    produce_washing_state:
      name: Stan mycia produktu rolnego
      description: Wskazuje, czy warzywa liściaste zostały umyte i są gotowe do spożycia.
    profile_shape:
      name: Profil/kształt
      description: Ogólna krzywizna/profil talerza perkusyjnego, czyli jak stromo
        wznosi się od krawędzi do kopułki.
    projectile_ammunition_type:
      name: Typ pocisku/amunicji
      description: Określa typ pocisków lub materiałów eksploatacyjnych używanych
        przez broń zabawkową, jeśli dotyczy.
    projectile_finish:
      name: Wykończenie pocisku
      description: Określa powłokę powierzchniową zastosowaną na kulce BB, wspomagającą
        odporność na korozję lub widoczność, np. pokrycie miedzią, cynkowanie, malowanie.
    projectile_type:
      name: Typ pocisku
      description: Określa rodzaj pocisku, którego produkt używa lub do którego jest
        przeznaczony.
    pronation_support:
      name: Wsparcie pronacji
      description: Wskazuje typ chodu lub wzorzec pronacji, do którego dostosowano
        sneakersy.
    propellant_type:
      name: Typ propelentu
      description: Określa propelent, do którego użycia zaprojektowano część lub akcesorium.
    propeller_blade_cup:
      name: Cup łopaty śruby napędowej
      description: Wskazuje wielkość cupu, czyli podwinięcia krawędzi spływu, na łopatach.
    propeller_hub_type:
      name: Typ piasty śruby napędowej
      description: Określa system piasty/tulei używany przez śrubę napędową, np. wymienne
        zestawy piast lub wciskane.
    propeller_rotation:
      name: Kierunek obrotu śruby napędowej
      description: Określa kierunek obrotu śruby napędowej.
    protectant_formula_base:
      name: Baza formuły środka ochronnego
      description: Określa bazową formułę środka ochronnego, która wpływa na połysk,
        odczucie i czyszczenie, np. na bazie wody lub rozpuszczalnika.
    protection_coverage_area:
      name: Obszar pokrycia ochronnego
      description: Określa, które części zegarka zakrywa akcesorium ochronne.
    protection_level:
      name: Poziom ochrony
      description: Wskazuje zamierzony poziom ochrony futerału podczas transportu
        i przechowywania instrumentu.
    protective_case_interior_protection_type:
      name: Typ ochrony wewnętrznej futerału ochronnego
      description: Opisuje główną metodę ochrony wewnętrznej używaną do zabezpieczania
        i amortyzowania zawartości.
    protective_case_shell_type:
      name: Typ skorupy futerału ochronnego
      description: Określa ogólny styl konstrukcji zewnętrznej futerału, czyli sztywność
        wpływającą na ochronę przed zgnieceniem i przenośność.
    protective_contact_padding_material:
      name: Materiał ochronnej wyściółki kontaktowe
      description: Materiał używany w punktach kontaktu z instrumentem, np. uchwycie
        lub wkładzie do czary, aby zapobiegać zarysowaniom, np. filc, guma.
    protective_cup_configuration:
      name: Konfiguracja suspensora ochronnego
      description: Określa, czy ochraniacz krocza jest dołączony, wyjmowany, czy odzież
        ma tylko kieszeń na ochraniacz.
    protective_eyewear_standard_compliance:
      name: Zgodność z normą okularów ochronnych
      description: Określa normy lub certyfikacje bezpieczeństwa albo odporności na
        uderzenia, które okulary spełniają lub przewyższają do zastosowań sportowych.
    protective_gear_certification_standard:
      name: Standard certyfikacji sprzętu ochronnego
      description: 'Wskazuje standard bezpieczeństwa/certyfikacji, z którym sprzęt
        jest zgodny, zależny od typu produktu: normy kasków, normy kombinezonów, normy
        ochraniaczy przeciwuderzeniowych.'
    protective_gear_items_included:
      name: Dołączone elementy sprzętu ochronnego
      description: Wymienia poszczególne elementy zawarte w wieloczęściowym zestawie
        sprzętu ochronnego.
    protective_gear_padding_type:
      name: Typ wyściółki sprzętu ochronnego
      description: Określa typ wyściółki używanej w sprzęcie ochronnym do ochrony
        przed uderzeniami.
    protective_gear_safety_certifications:
      name: Certyfikacje bezpieczeństwa sprzętu ochronnego
      description: Wymienia uznane normy bezpieczeństwa lub osiągów właściwe dla sportu
        spełniane przez produkt, takie jak normy NOCSAE lub ASTM dla kasków do hokeja
        na trawie.
    protective_pad_components_included:
      name: Dołączone elementy ochraniaczy
      description: Określa konkretne elementy ochronne dołączone do wieloczęściowego
        zestawu, aby kupujący wiedzieli dokładnie, które części ciała są chronione.
    protective_shorts_intended_use:
      name: Zamierzone użycie spodenek ochronnych
      description: Podstawowa dyscyplina jazdy/wyścigów, do której zaprojektowano
        spodenki ochronne.
    protective_shorts_padding_type:
      name: Typ wypełnienia spodenek ochronnych
      description: Określa konstrukcję/format elementów ochronnych użytych w spodenkach.
    protective_shorts_padding_zones:
      name: Strefy wypełnienia spodenek ochronnych
      description: Określa, które obszary ciała mają zintegrowaną wyściółkę/ochraniacze
        w spodenkach ochronnych.
    protective_treatment:
      name: Obróbka ochronna
      description: Określa wykończenie lub obróbkę ochronną zastosowaną w celu odporności
        na plamy, wodę lub UV, np. Teflon.
    protector_coverage_area:
      name: Obszar pokrycia ochraniacza
      description: Określa, które obszary tułowia ochraniacz ma zakrywać, np. klatkę
        piersiową, plecy, boki.
    puck_bottom_style:
      name: Styl spodu krążka
      description: Opisuje profil spodniej części krążka, który wpływa na szybkość
        i kontrolę na różnych nawierzchniach do shuffleboardu.
    puck_type:
      name: Typ krążka
      description: Klasyfikuje funkcjonalny styl lub zamierzone użycie krążka hokejowego,
        od oficjalnej gry po pamiątki kolekcjonerskie.
    pull_buoy_style:
      name: Styl pull buoy
      description: Wskazuje funkcjonalny styl lub konfigurację pull buoy, np. standardowy,
        na kostki lub combo pullkick.
    pull_through_weight_material:
      name: Materiał obciążnika wyciora przeciąganego
      description: W przypadku wyciorów przeciąganych określa materiał obciążnika
        używanego do przeprowadzenia wyciora przez instrument.
    pulp_content:
      name: Zawartość miąższu
      description: Wskazuje ilość miąższu owocowego lub warzywnego w napoju.
    pump_accessories_included:
      name: Dołączone akcesoria do pompki
      description: Wymienia dodatkowe elementy dostarczane z pompką do piłek, aby
        kupujący mogli zrozumieć zawartość zestawu.
    pumping_compatibility:
      name: Kompatybilność z odciąganiem pokarmu
      description: Wskazuje, czy biustonosz do karmienia jest zaprojektowany także
        do bezdotykowego odciągania pokarmu.
    punch_pad_type:
      name: Typ tarczy treningowej
      description: Określa konstrukcję lub styl tarczy do uderzeń/treningu, aby kupujący
        mogli wybrać właściwą tarczę do swoich potrzeb treningowych.
    punching_training_bag_shape:
      name: Kształt worka bokserskiego/treningowego
      description: Określa geometryczny styl worka ciężkiego, pomagając kupującym
        wybrać modele odpowiednie do konkretnych ćwiczeń uderzeń, np. podbródkowych,
        na korpus.
    puncture_protection_technology:
      name: Technologia ochrony przed przebiciem
      description: Wymienia zastrzeżone lub ogólne warstwy antyprzebiciowe albo technologie
        wzmocnienia ścian bocznych/karkasu zastosowane w oponie, np. EXO, SnakeSkin,
        pasek Kevlar.
    puppet_features:
      name: Cechy pacynki
      description: Wyróżnia funkcjonalne lub wykonawcze cechy pacynki, np. ruchome
        usta, efekty dźwiękowe, dwustronność.
    puppet_puppet_theater_accessory_type:
      name: Typ akcesorium do pacynki i teatrzyku kukiełkowego
      description: Określa, jakiego rodzaju akcesorium stanowi produkt, np. rekwizyt
        sceniczny, kostium dla pacynki, drążek sterujący, zapasowy sznurek.
    purity_unit:
      name: Jednostka czystości
      description: 'Sposób wyrażenia czystości monety: próba lub karat.'
    push_up_bar_design:
      name: Konstrukcja uchwytów do pompek
      description: Wskazuje funkcjonalny styl konstrukcji uchwytów do pompek, np.
        stałe, obrotowe, paraletki.
    pushrod_end_type:
      name: Typ końcówki popychacza
      description: Określa styl końcówki/mocowania popychacza używanego przy interfejsie
        pedału lub pompy hamulcowej/sprzęgła.
    putty_glow_activation_method:
      name: Metoda aktywacji świecenia putty
      description: Sposób ładowania/aktywowania putty do świecenia, np. światłem słonecznym,
        UV/blacklight.
    putty_glow_color:
      name: Kolor świecenia putty
      description: Określa kolor emitowany przez putty podczas świecenia w ciemności.
    putty_inclusions:
      name: Dodatki w putty
      description: Istotne dodatki wymieszane z putty, np. brokat, konfetti, kulki
        piankowe.
    putty_texture:
      name: Tekstura putty
      description: Podstawowe zachowanie putty podczas manipulacji, np. sprężysta,
        rozciągliwa, przypominająca płyn.
    puzzle_accessory_features:
      name: Cechy akcesorium do puzzli
      description: Funkcjonalne cechy i elementy konstrukcyjne akcesoriów do puzzli,
        różniące się w zależności od typu akcesorium.
    pyrometric_cone_range:
      name: Zakres stożków pirometrycznych
      description: Zalecane stożki pirometryczne, do których wypału opracowano szkliwo,
        np. Cone 06–04, Cone 5–6.
    quarter_panel_coverage_type:
      name: Typ pokrycia ćwiartki nadwozia
      description: Określa, jak dużą część obszaru ćwiartki nadwozia produkt zastępuje/naprawia.
    quarter_panel_set_contents:
      name: Zawartość zestawu ćwiartki nadwozia
      description: 'Określa konfigurację zestawu ćwiartki nadwozia w ofercie: pojedyncza
        strona, para lub z dodatkowymi sekcjami naprawczymi.'
    quilting_ruler_markings:
      name: Oznaczenia linijki do patchworku
      description: Określa typy nadrukowanych oznaczeń na linijce do patchworku używanych
        do cięcia/wyrównywania.
    quilting_ruler_non_slip_feature:
      name: Funkcja antypoślizgowa linijki do patchworku
      description: Wskazuje, czy linijka ma antypoślizgowy spód/obróbkę powierzchni
        ograniczającą przesuwanie się po tkaninie.
    quilting_ruler_transparency:
      name: Przezierność linijki do patchworku
      description: Wskazuje przezierność/widoczność materiału linijki, aby można było
        widzieć tkaninę i oznaczenia pod spodem.
    quilting_thread_usage:
      name: Zastosowanie nici do pikowania
      description: Wskazuje zamierzone zastosowanie nici w pikowaniu, czyli jak ma
        być używana.
    quilting_thread_weight_system:
      name: System grubości nici do pikowania
      description: Określa system rozmiaru/grubości nici używany do wyrażania grubości
        nici, np. wt, Tex, Denier, aby można było poprawnie interpretować wartość
        liczbową.
    quince_variety:
      name: Odmiana pigwy
      description: Określa konkretny kultywar lub odmianę pigwy, ponieważ smak, aromat
        i przydatność kulinarna mogą różnić się w zależności od odmiany.
    quinoa_variety:
      name: Odmiana komosy ryżowej
      description: Określa konkretny kolor lub odmianę komosy ryżowej, ponieważ różne
        odmiany mają odmienny smak, teksturę i czas gotowania.
    quinto_tuning_system:
      name: System strojenia Quinto
      description: Sposób strojenia/naciągania quinto.
    race_car_class:
      name: Klasa samochodu wyścigowego
      description: Klasa/kategoria zawodów, do której zbudowano samochód, czyli grupa
        regulaminowa/homologacyjna.
    racing_balaclava_face_opening_style:
      name: Styl otworu na twarz kominiarki wyścigowej
      description: Konfiguracja otworu na twarz w kominiarce, która wpływa na dopasowanie
        kasku, uszczelnienie i komfort.
    racing_balaclava_neck_coverage_length:
      name: Długość osłony szyi kominiarki wyścigowej
      description: Długość osłony szyi/fartucha zaprojektowanego do wsunięcia w kombinezon/podparcie
        szyi dla uszczelnienia i ochrony.
    racing_balaclava_ventilation_zones:
      name: Strefy wentylacji kominiarki wyścigowej
      description: Umiejscowienie wyznaczonych oddychających/siatkowych lub wentylowanych
        stref poprawiających przepływ powietrza pod kaskiem.
    racing_chest_guard_intended_use:
      name: Zamierzone użycie ochraniacza klatki piersiowej do wyścigów
      description: Podstawowa dyscyplina motorsportu lub kontekst, do którego zaprojektowano
        ochraniacz klatki piersiowej.
    racing_chest_guard_size_type:
      name: Typ rozmiaru ochraniacza klatki piersiowej do wyścigów
      description: Wskazuje, czy produkt ma rozmiar dziecięcy/młodzieżowy, dla dorosłych
        czy jest uniwersalny/regulowany.
    racing_glove_certification_standard:
      name: Norma certyfikacji rękawic wyścigowych
      description: Określa certyfikację/normę bezpieczeństwa, z którą zgodne są rękawice
        wyścigowe, np. FIA, SFI, CE, oraz opcjonalnie klasę/poziom, jeśli dotyczy.
    racing_goggles_lens_system:
      name: System soczewek gogli wyścigowych
      description: Określa system wymiany soczewek/gotowości na zrywki obsługiwany
        przez gogle.
    racing_helmet_certification_standard:
      name: Norma certyfikacji kasku wyścigowego
      description: Certyfikacje bezpieczeństwa spełniane przez kask wyścigowy.
    racing_kart_brake_type:
      name: Typ hamulca gokarta wyścigowego
      description: Podstawowy typ układu hamulcowego zamontowany w gokarcie.
    racing_kart_class:
      name: Klasa gokarta wyścigowego
      description: Klasa zawodów lub regulamin, z którym gokart jest zbudowany zgodnie.
    racing_kart_frame_material:
      name: Materiał ramy gokarta wyścigowego
      description: Podstawowy materiał ramy/podwozia gokarta.
    racing_kart_seat_size:
      name: Rozmiar siedziska gokarta wyścigowego
      description: Oznaczenie rozmiaru fotela gokarta używane do określenia rozmiaru.
    racing_neck_support_style:
      name: Wyścigi szyi pomagają w stylu technicznym
      description: Styl strukturalny kasku wyścigowego, pomoc techniczna/usztywniająca
        i sposób, w jaki łączy się on z tułowiem/kaskiem kolarza.
    racing_suit_certification_standard:
      name: Norma certyfikacji kombinezonu wyścigowego
      description: Określa certyfikat bezpieczeństwa wyścigowego/homologację, jaką
        spełnia dany kombinezon (np. normy FIA lub SFI).
    racing_suit_cuff_design:
      name: Projekt mankietu kombinezonu wyścigowego
      description: Rodzaj mankietu na kostkę/nadgarstki stosowanego do łączenia z
        rękawicami/butami i poprawiającego uszczelnienie/komfort.
    racing_suit_size_system:
      name: System rozmiarów kombinezonu wyścigowego
      description: System rozmiarów stosowany dla danego kostiumu (np. Alpha S-XXL,
        Numeric EU/US, Youth).
    racing_truck_discipline:
      name: Dyscyplina wyścigów ciężarówek
      description: Określa główną dyscyplinę wyścigową/format, do udziału w którym
        przeznaczony jest dany samochód ciężarowy.
    rack_side_configuration:
      name: Konfiguracja boczna racka
      description: Określa, czy maty regałowe znajdują się po jednej czy po obu stronach,
        co ma wpływ na efektywne wykorzystanie przestrzeni i dostęp.
    rack_system_configuration:
      name: konfiguracja systemu Regały
      description: Opisuje cały układ regałów. Shapes systemu regałów bębnowych.
    racket_dampener_type:
      name: Typ tłumika rakiety
      description: Określa mechanizm instalacji lub styl działania tłumika drgań rakiety.
    racket_grip_size:
      name: Rozmiar uchwytu rakiety
      description: Określa klasyfikację rozmiaru rakiety na podstawie obwodu (np.
        G1–G6), aby zapewnić odpowiednie dopasowanie do dłoni i wygodę.
    racket_sport_shoe_court_surface:
      name: Nawierzchnia kortu do butów sportowych
      description: Określa nawierzchnię kortu tenisowego, do której but jest przeznaczony
        lub zoptymalizowany, pomagając graczom wybrać obuwie z odpowiednim wzorem
        podeszwy zewnętrznej i mieszanką gumy do typowej nawierzchni, na której grają.
    racket_string_pattern:
      name: Układ strun rakiety
      description: Określa liczbę znaków ciągu głównego i poprzecznego w układzie
        znaków ciągu (np. 16 x 18), które Influence kontrolę, rotację i trwałość.
    racket_stringing_status:
      name: Stan naciągu rakiety
      description: Wskazuje, czy rakieta jest sprzedawana jako ciąg znaków, unstrung
        lub pre-ciąg znaków.
    racket_weight_class:
      name: Kategoria wagowa rakiety
      description: Zapewnia standardowe kategorie wagowe „U” do badmintona, pozwalając
        graczom wybierać rakiety w preferowanym przez nich zakresie wagowym.
    racquet_toy_set_equipment_included:
      name: W zestawie znajduje się zestaw zabawek rakietowych
      description: Wypisuje pozycje zawarte w zabawce lub zestawie (np. siatka, piłki,
        paletki/rakietki).
    racquetball_squash_training_aid_type:
      name: Typ przyrządu treningowego do racquetballa i squasha
      description: Klasyfikuje konkretny rodzaj pomocy szkoleniowej lub akcesoriów,
        dzięki czemu klient może szybko znaleźć potrzebną mu pozycję.
    radiator_cap_gasket_material:
      name: Materiał uszczelki korka chłodnicy
      description: Materiał uszczelki(ek) stosowanej(ych) na korku chłodnicy.
    radiator_cap_pressure_relief_style:
      name: Korek chłodnicy z odciążeniem ciśnieniowym
      description: Określa sposób odciążenia/odpowietrzania/działania korka chłodnicy,
        który może mieć wpływ na obsługę, bezpieczeństwo i zamierzone działanie.
    radiator_expansion_tank_cap_application:
      name: Aplikacja korka chłodnicy/zbiornika wyrównawczego
      description: Określa, czy korek jest przeznaczony do wlewu chłodnicy czy do
        zbiornika wyrównawczego/przelewowego płynu chłodzącego.
    radiator_fan_control_type:
      name: Typ sterowania wentylatorem chłodnicy
      description: Określa sposób sterowania/wyzwalacza wentylatora chłodnicy.
    radiator_fan_mounting_pattern:
      name: Wzór montażu wentylatora chłodnicy
      description: Określa styl/wzór montażu używany do mocowania wentylatora lub
        zespołu wentylatorów.
    radiator_fan_type:
      name: Typ wentylatora chłodnicy
      description: Określa typ funkcjonalny/konfigurację zespołu wentylatora chłodnicy.
    radiator_hose_end_type:
      name: Typ końcówki węża chłodnicy
      description: Określa podstawową relację/styl uszczelnienia stosowany na końcu(ach)
        węża chłodnicy w celu połączenia z portami chłodnicy/silnika.
    radiator_hose_position:
      name: Pozycja węża chłodnicy
      description: Pozycja funkcjonalna/typ węża chłodnicy w układzie chłodzenia.
    radiator_hose_shape:
      name: Shapeswęży chłodnicy
      description: Całkowita geometria/współczynnik kształtu węża używany do prowadzenia
        instalacji i montażu.
    radiator_overflow_tank_level_sensor_provision:
      name: Zapewnienie czujnika poziomu w zbiorniku przelewowym chłodnicy
      description: Określa, czy zbiornik jest wyposażony w czujnik poziomu płynu chłodzącego.
    radiator_overflow_tank_shape:
      name: Kształt zbiornika przelewowego chłodnicy
      description: Ogólny współczynnik kształtu korpusu zbiornika przelewowego.
    radish_variety:
      name: Odmiana rzodkiewki
      description: Określa odmianę lub rodzaj rzodkiewki, dzięki czemu klient może
        wybrać konkretny smak, kolor lub rozmiar (np. Daikon, Arbuz, French Breakfast).
    radius_of_hollow:
      name: Promień wydrążenia
      description: Określa pusty profil ostrza wytwarzany przez ostrzałkę, wyrażony
        w postaci zwykłych dyskretnych rozmiarów lub płaski.
    rail_coverage_configuration:
      name: Konfiguracja pokrycia szynowego
      description: Wskazuje, którą część (lub części) łóżeczka chroni zestaw osłon,
        precyzując, czy zakupiony jest pojedynczy panel przedni czy wieloczęściowy
        zestaw obwodowy.
    rail_mount_standard:
      name: Standardowy montaż na szynie
      description: Określa standard szyny lub interfejsu montażowego używanego do
        mocowania akcesoriów (np. celownika, latarki) do pistoletu BB.
    rail_side:
      name: Strona kolejowa
      description: Określa, czy szyna zamienna jest na lewą stronę, prawą stronę,
        czy sprzedawana jest jako parowanie.
    rail_style:
      name: Styl szynowy
      description: Klasyfikuje ogólny projekt lub konfigurację szyny (np. A-Frame,
        tęczowa, zagięta), co determinuje możliwości wykonania trików i wymaganą przestrzeń.
    rail_system:
      name: System kolejowy
      description: Identyfikuje interfejs montażowy akcesoriów obecny w pistolecie
        (np. Picatinny, M-LOK).
    rain_sensor_technology:
      name: Technologia czujnika deszczu
      description: Zasada działania czujnika służąca do wykrywania wody na przedniej
        szybie.
    rain_suit_configuration:
      name: Konfiguracja kombinezonu przeciwdeszczowego
      description: Określa, czy produkt jest kombinezonem jednoczęściowym, zestawem
        wieloczęściowym, czy inną konfiguracją.
    rainstick_construction_type:
      name: Typ konstrukcji Rainstick
      description: Opisuje, jak zbudowana jest deszczownica (tradycyjna tuba z kaktusa/drewna
        i nowoczesne alternatywy).
    rainstick_fill_material:
      name: Materiał wypełniający Rainstick
      description: Określa wewnętrzne wypełnienie używane do Utworzenia dźwięku Cascade
        (np. nasiona, koraliki).
    rainstick_playing_technique:
      name: Technika gry Rainstickiem
      description: Oznacza zalecaną technikę(y) gry lub styl obsługi używany do uzyskania
        zamierzonego efektu za pomocą pałka deszczowego.
    rainstick_sound_character:
      name: Charakter dźwiękowy Rainstick
      description: Opisuje ogólną charakterystykę dźwięku wytwarzanego przez patyk
        deszczowy.
    raising_method:
      name: Metoda podnoszenia
      description: Opisuje sposób hodowli i wykańczania zwierząt przed przetworzeniem
        (np. karmienie trawą, chów na pastwisku, wykaszanie zbożem).
    rally_competition_class:
      name: Klasa zawodów rajdowych
      description: Klasa organu sankcjonującego lub zbiór przepisów, zgodnie z którymi
        zbudowano samochód rajdowy (jeśli znana).
    rally_surface_setup:
      name: Konfiguracja powierzchni rajdu
      description: Podstawowa powierzchnia/teren konfiguracji samochodu rajdowego
        lub cele budowy.
    ramp_surface_texture:
      name: Faktura powierzchni rampy
      description: Opisuje wykończenie lub poziom przyczepności powierzchni jezdnej
        rampy.
    ratchet_mounting_style:
      name: Styl montażu mechanizmu zapadkowego
      description: W jaki sposób trzyma się lub montuje grzechotkę muzyczną podczas
        gry lub konfiguracji.
    rattle_element_material:
      name: Materiał elementu grzechotki
      description: Materiał elementów grzechotających (np. zębów, brzęczyków, koralików),
        który wydaje charakterystyczny dźwięk.
    rattle_type:
      name: Typ grzechotki
      description: Informuje, czy przynęta zawiera wewnętrzną grzechotkę lub komorę
        dźwiękową, a jeśli tak, to jaki rodzaj grzechotki jest w niej zastosowany.
    rc_airship_lifting_gas_type:
      name: Sterowiec RC z podnośnikiem gazowym
      description: Oznacza, jakim gazem ma być wypełniona powłoka sterowca/sterowca
        (jeśli ma to zastosowanie).
    rc_helicopter_control_frequency:
      name: Częstotliwość sterowania helikopterem RC
      description: Pasmo częstotliwości radiowych używane pomiędzy administratorem
        i śmigłowcem, mające wpływ na odporność na zakłócenia i kompatybilność (np.
        2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Funkcje stabilizacji helikoptera RC
      description: Wyświetla listę funkcji wspomagających stabilność/kontrolę, które
        ułatwiają lot lub go uniemożliwiają.
    rc_motorcycle_controller_type:
      name: Typ kontrolera zdalnie sterowanego motocykla
      description: Współczynnik kształtu dołączonego administratora.
    rc_plane_takeoff_launch_method:
      name: Metoda startu/Launch samolotu RC
      description: Jak zwykle wygląda samolot? Launch/ Impact , gdzie i jak można
        go wykorzystać.
    rc_vehicle_controller_type:
      name: Typ administratora pojazdu RC
      description: Określa typ formularza administratora używany do obsługi pojazdu
        zdalnie sterowanego.
    rc_vehicle_scale:
      name: Skala zdalnego sterowanego pojazdu
      description: Określa współczynnik skali (klasę rozmiaru) samochodu/ciężarówki
        zdalnie sterowanej (np. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Typ terenu pojazdu RC
      description: Oznacza podstawowy teren, na którym samochód/ciężarówka zdalnie
        sterowana jest zaprojektowana.
    reach_adjustment_type:
      name: Typ regulacji zasięgu
      description: Informuje, czy odległość między dźwignią a kierownicą można regulować,
        a jeśli tak, to czy regulacja odbywa się bez użycia narzędzi, czy też wymaga
        użycia narzędzi.
    rear_axle_spacing:
      name: Rozstaw osi tylnej
      description: Rozmiar haków/osi, do którego przyjęcia zaprojektowano tył ramy,
        wpływający na kompatybilność kół.
    rear_axle_standard:
      name: Standard tylnej osi
      description: Definiuje interfejs/format osi używany przez tylne koło, np. szybkozamykacz,
        różne rozmiary osi przelotowych.
    rear_axle_type:
      name: Typ tylnej osi
      description: Określa system mocowania i średnicę osi używane do mocowania tylnego
        koła do ramy.
    rear_coverage:
      name: Pokrycie z tyłu
      description: Określa, jak dużą część pośladków zakrywa dół bikini, np. cheeky,
        pełne zakrycie.
    rear_opening_type:
      name: Typ tylnego otwarcia
      description: Opisuje styl tylnego dostępu lub klapy na pośladkach ułatwiającej
        korzystanie z toalety, np. drop seat lub pełny tylny zamek.
    rear_seat_configuration:
      name: Konfiguracja tylnego siedzenia
      description: Określa konfigurację zespołu tylnego siedzenia, aby wspierać dobór
        dopasowania i układu wnętrza.
    rear_view_mirror_ornament_attachment_type:
      name: Typ mocowania ozdoby lusterka wstecznego
      description: Określa, jak ozdoba mocuje się do trzpienia lub obudowy lusterka
        wstecznego, np. pętelka ze sznurka, klips, haczyk.
    rearview_mirror_mount_attachment_type:
      name: Typ mocowania uchwytu lusterka wstecznego
      description: Definiuje, jak uchwyt fizycznie mocuje się do zespołu lusterka
        wstecznego, czyli korpusu lub trzpienia lusterka, np. zacisk, klips, pasek,
        podkładka samoprzylepna lub przykręcany wspornik.
    rebound_board_face_type:
      name: Typ powierzchni rebound boardu
      description: Opisuje konfigurację powierzchni określającą zachowanie odbicia,
        np. płaska, pod kątem lub wielopłaszczyznowa.
    rebound_level:
      name: Poziom odbicia
      description: Wskazuje, jak mocno piłka wall ball odbija się po uderzeniu, pomagając
        użytkownikom wybrać między konstrukcjami bez odbicia i o umiarkowanym odbiciu.
    rebound_surface_configuration:
      name: Konfiguracja powierzchni odbijającej
      description: Określa układ powierzchni odbijających i przewidywalność odbić,
        np. jedno-, dwu- lub wielostronna; przewidywalna lub nieprzewidywalna.
    rebounder_design:
      name: Konstrukcja odbijacza
      description: Definiuje styl konstrukcyjny lub konfigurację powierzchni odbijającej
        produktu.
    rebounder_design_type:
      name: Typ konstrukcji reboundera
      description: Określa podstawowy mechanizm odbicia lub styl konstrukcji trenażera,
        np. podstawa z elastycznych linek, siatka w ramie, wyskakujący cel.
    rebounder_sides:
      name: Strony reboundera
      description: Wskazuje, czy rebounder może odsyłać piłki z jednej czy z obu stron.
    rebounding_mechanism_type:
      name: Typ mechanizmu odbijającego
      description: Określa technologię używaną do zwracania krążka lub piłki, np.
        gumowy bumper, linka bungee.
    recipient_relationship:
      name: Relacja z odbiorcą
      description: Zamierzona relacja z odbiorcą kartki okolicznościowej, np. mama,
        tata, przyjaciel.
    recliner_control_type:
      name: Typ sterowania fotelem rozkładanym
      description: Określa sposób obsługi mechanizmu rozkładania, np. ręczna dźwignia,
        elektryczny panel przycisków, pilot.
    recliner_motion_type:
      name: Typ ruchu fotela rozkładanego
      description: Definiuje podstawową funkcję ruchu fotela rozkładanego, np. bujany,
        ślizgowy, obrotowy, przyścienny, z funkcją podnoszenia.
    reclining_mechanism:
      name: Mechanizm rozkładania
      description: Określa mechanizm używany do obsługi funkcji rozkładania sofy.
    recommended_candle_format:
      name: Zalecany format świecy
      description: Wskazuje zalecane formaty świec, do których przeznaczone są te
        samoprzylepne blaszki do knotów.
    recommended_container_type:
      name: Zalecany typ pojemnika
      description: Materiały pojemników zalecane/bezpieczne do świec z wosku żelowego.
    recommended_fabric_type:
      name: Zalecany typ materiału
      description: Zalecane tkaniny do uzyskania najlepszych efektów z wykrojem.
    recommended_fabric_weight:
      name: Zalecana gramatura tkaniny
      description: Wskazuje zalecaną kategorię gramatury tkaniny dla wykroju.
    recommended_food_pairing:
      name: Zalecane połączenia kulinarne
      description: Określa podstawowe białka lub dania, do których sos jest przeznaczony,
        np. kurczak, wieprzowina, wołowina, ryby, warzywa.
    recommended_lane_condition:
      name: Zalecany stan toru
      description: Wskazuje wzór olejowania lub stan toru, do którego zaprojektowano
        kulę.
    recommended_motor_impulse_class:
      name: Zalecana klasa impulsu silnika
      description: Określa zalecaną klasę całkowitego impulsu silnika rakiety modelarskiej
        dla bezpiecznego/optymalnego lotu.
    recommended_reading_level:
      name: Zalecany poziom odczytu
      description: Wskazuje zalecany etap/poziom umiejętności czytania dla produktu,
        aby pomóc kupującym dopasować go do aktualnego rozwoju czytelniczego dziecka.
    recommended_sleep_position:
      name: Zalecana pozycja snu
      description: Określa, które pozycje snu materac ma komfortowo wspierać, np.
        spanie na boku lub na plecach.
    recommended_storage:
      name: Zalecane przechowywanie
      description: Wskazuje, jak produkt należy przechowywać, aby zachować świeżość.
    recommended_surfaces:
      name: Zalecane powierzchnie
      description: Określa zamierzone powierzchnie/materiały klejenia dla kleju, poza
        ogólną kompatybilnością rękodzielniczą, np. tylko papier lub wiele powierzchni.
    recommended_use_case:
      name: Zalecane zastosowanie
      description: 'Podstawowy zamierzony scenariusz użycia uszczelniacza: tymczasowy/awaryjny
        lub długoterminowa naprawa.'
    recommended_use_location:
      name: Zalecane miejsce użycia
      description: Zamierzone środowisko użycia huśtawki równoważnej, np. przydomowy
        ogród lub komercyjny plac zabaw.
    recommended_vehicle_surfaces:
      name: Zalecane powierzchnie pojazdu
      description: Określa powierzchnie/wykończenia pojazdu, dla których szczotka
        ma być bezpieczna, np. lakier bezbarwny, lakier matowy/satynowy, folia winylowa/PPF,
        szkło, koła.
    recorder_accessories_included:
      name: Dołączono akcesoria do fletu prostego
      description: Wymienia dołączone akcesoria zapakowane z fletem prostym great
        bass.
    recorder_bore_design:
      name: Konstrukcja kanału fletu prostego
      description: Wewnętrzny profil kanału korpusu fletu prostego.
    recorder_bore_type:
      name: Typ otworów fletu prostego
      description: Określa styl kanału fletu prostego.
    recorder_case_shell_type:
      name: Typ skorupy futerału na flet prosty
      description: Opisuje sztywność konstrukcyjną futerału.
    recorder_finish:
      name: Wykończenie fletu prostego
      description: Wykończenie/obróbka powierzchni korpusu fletu prostego, szczególnie
        istotne w przypadku drewnianych fletów altowych.
    recorder_hole_type:
      name: Typ otworów fletu prostego
      description: Wskazuje, czy otwory palcowe są pojedyncze, bez podwójnych otworów,
        czy obejmują podwójne otwory dla lepszego palcowania chromatycznego.
    recorder_joint_configuration:
      name: Konfiguracja segmentów fletu prostego
      description: Opisuje, z ilu sekcji korpusu składa się flet prosty, co wpływa
        na przenośność, czyszczenie i wymianę części.
    recorder_joint_style:
      name: Styl łączenia fletu prostego
      description: Styl połączenia między sekcjami fletu prostego, jeśli dotyczy.
    recorder_keywork:
      name: Mechanika fletu prostego
      description: Wskazuje, czy flet prosty ma klapy, metalowe/plastikowe mechanizmy
        do niskich dźwięków, typowe dla fletów tenorowych, basowych i dużych.
    recorder_mouthpiece_type:
      name: Typ ustnika do fletu prostego
      description: Opisuje, czy ustnik/główka fletu prostego jest zintegrowana, jednoczęściowa,
        czy zdejmowana/wymienna.
    recorder_pitch_standard_a4:
      name: Standard stroju fletu prostego (A4)
      description: Wskazuje odniesienie strojenia, dla którego zbudowano flet prosty,
        np. A=440 Hz, strój współczesny, lub A=415 Hz, strój barokowy.
    recorder_thumb_hole_type:
      name: Typ otworu na kciuk fletu prostego
      description: Określa, czy flet prosty ma pojedynczy otwór kciukowy czy konstrukcję
        z podwójnym otworem kciukowym.
    recreational_vehicle_holding_tank_type:
      name: Typ zbiornika kampera
      description: Wskazuje, jakie zbiorniki na nieczystości ma kamper.
    recreational_vehicle_leveling_system:
      name: System poziomowania kampera
      description: Typ zainstalowanego systemu poziomowania/stabilizacji.
    recycled_material_content:
      name: Zawartość materiałów z recyklingu
      description: Wskazuje udział odzieży wykonany z włókien lub przędzy z recyklingu.
    reed_dent_material:
      name: Materiał ząbków płochy
      description: Materiał ząbków płochy, czyli elementów rozdzielających nitki osnowy,
        który wpływa na trwałość i ścieranie przędzy.
    reed_type:
      name: Typ stroika
      description: Określa typ konstrukcji stroika używanego przez piszczałkę melodyczną
        i burdony dud.
    reeds_included:
      name: Dołączone stroiki
      description: Określa, które stroiki są dołączone do zestawu dud Great Highland,
        do piszczałki melodycznej i/lub burdonów, oraz czy są trzcinowe czy syntetyczne.
    reefing_method:
      name: Metoda refowania
      description: Wskazuje mechanizm, jeśli występuje, do zmniejszania lub składania
        żagla na wodzie.
    reel_profile:
      name: Profil kołowrotka
      description: Klasyfikuje styl konstrukcji/profil korpusu kołowrotka castingowego.
    reel_seat_material:
      name: Materiał siedziska rolki
      description: Określa materiał konstrukcyjny uchwytu kołowrotka, wpływający na
        wagę, czułość i odporność na korozję.
    reel_seat_type:
      name: Typ uchwytu kołowrotka
      description: Określa styl mechanizmu blokującego mocującego kołowrotek muchowy
        do wędki.
    reel_size_class:
      name: Klasa wielkości rolki
      description: Rozmiar kołowrotka określony przez producenta, np. 1000, 3000,
        5000, wskazujący pojemność szpuli i ogólną konstrukcję kołowrotka.
    referee_wallet_accessories_included:
      name: Akcesoria dołączone do portfela sędziowskiego
      description: Wymienia dodatkowe elementy dołączone do portfela sędziowskiego,
        takie jak czerwone/żółte kartki, arkusze wyników lub przybory do pisania,
        aby kupujący wiedzieli, czy portfel jest sprzedawany jako kompletny zestaw.
    refinement_level:
      name: Stopień rafinacji
      description: Wskazuje stopień rafinacji oleju, wpływający na smak, kolor, wartości
        odżywcze i punkt dymienia.
    reflective_finish:
      name: Wykończenie odblaskowe
      description: Określa wariant powierzchni odblaskowej kuli dyskotekowej (np.
        lustrzanego kafelek w porównaniu z efektami holograficznymi/opalizującymi).
    reflective_or_glow_effect:
      name: Efekt odbicia lub świecenia
      description: Określa, czy antena kulista posiada elementy poprawiające widoczność,
        takie jak materiał odblaskowy, świecenie w ciemności lub elementy świecące/LED.
    reflective_tape_pattern:
      name: Wzór taśmy odblaskowej
      description: Opisuje konfigurację taśmy odblaskowej na odzieży, stosowanej w
        celu spełnienia wymagań dotyczących widoczności.
    regulation_standard:
      name: Norma regulacyjna
      description: Określa oficjalny standard lub wymiar/certyfikat organu zarządzającego,
        który spełnia sieć.
    regulator_diaphragm_material:
      name: Materiał membrany regulatora
      description: Określa materiał membrany, który ma wpływ na zgodność paliwa z
        etanolem (np. E85) i trwałość.
    regulator_port_thread_standard:
      name: Standardowy gwint przyłącza regulatora
      description: Określa standard portu ekspres/relacja stosowany na korpusie regulatora
        dla portów wlotowego/wylotowego/powrotnego.
    rein_features:
      name: Funkcje lejców
      description: Highlight szczególne cechy funkcjonalne i bezpieczeństwa wodzy.
    rein_style:
      name: Styl wodzy
      description: Określa konstrukcję i konfigurację wodzy, umożliwiając jeźdźcom
        wybór właściwego typu dla ich dyscypliny i osobistych preferencji.
    reinforced_areas:
      name: Wzmocnione obszary
      description: Określa, które części odzieży zostały wzmocnione, aby zwiększyć
        odporność na ścieranie.
    reinforcement_type:
      name: Rodzaj zbrojenia
      description: Wzmocnienie konstrukcyjne stosowane w wężu chłodnicy zapewniające
        wytrzymałość oraz odporność na temperaturę i ciśnienie.
    release_activation_method:
      name: Metoda aktywacji wydania
      description: Określa sposób, w jaki łucznik uruchamia wyzwalacz łuku.
    release_bearing_material:
      name: Materiał łożyska zwalniającego
      description: Materiał podstawowy elementów łożyska/czołowych (jeśli jest określony
        przez producenta).
    release_jaw_style:
      name: Styl szczęki zwalniającej
      description: Opisuje budowę szczęk lub haka głowicy zwalniającej.
    release_strap_type:
      name: Typ paska zwalniającego
      description: Identyfikuje pasek lub system łączności Supply wraz z przyrządem
        do zwalniania łuku.
    remote_control_airship_envelope_material:
      name: Materiał na powłokę sterowca zdalnie sterowanego
      description: Określa podstawowy materiał powłoki sterowca/statku powietrznego
        (worek gazowy), odrębny od ogólnego materiału zabawki.
    remote_control_motorcycle_scale:
      name: Skala zdalnie sterowanego motocykla
      description: skala motocykla RC w stosunku do prawdziwego motocykla (jeśli jest
        on modelowany jako pojazd skala).
    remote_control_motorcycle_terrain_suitability:
      name: Zdalnie sterowany motocykl przystosowany do jazdy w terenie
      description: Podstawowy teren, na którym motocykl RC jest przystosowany do jazdy.
    remote_control_motorcycle_water_resistance:
      name: Wodoodporność motocykla zdalnie sterowanego
      description: Poziom ochrony przed wodą dla elektroniki motocyklowej RC.
    remote_control_plane_kit_completion_level:
      name: Poziom realizacji zestawu zdalnego sterowania płaszczyzną
      description: Wskazuje, co jest zawarte w zestawie i jak kompletny jest zestaw
        (np. gotowy do lotu czy wymaga osobnego nadajnika/odbiornika/baterii).
    remote_control_plane_landing_gear_type:
      name: Typ podwozia samolotu zdalnie sterowanego
      description: Wskazuje konfigurację podwozia mającą wpływ na trwałość oraz powierzchnię
        startu/lądowania.
    remote_control_plane_power_type:
      name: Typ zasilania samolotu zdalnie sterowanego
      description: Określa sposób zasilania/napędzania samolotu (elektryczny, spalinowy/gazowy/nitro),
        co ma wpływ na konserwację, hałas i miejsca, w których można latać.
    remote_control_watercraft_features:
      name: Funkcje zdalnie sterowanego pojazdu wodnego
      description: Highlight najważniejsze cechy charakterystyczne dla skuterów wodnych
        RC, które mają wpływ na ich użyteczność i trwałość.
    remote_control_watercraft_propulsion_drive_type:
      name: Napęd/typ napędu jednostki pływającej zdalnie sterowanej
      description: Określa sposób prowadzenia pojazdu wodnego zdalnie sterowanego
        w wodzie.
    remote_control_watercraft_water_environment:
      name: Zdalnie sterowany pojazd wodny do środowiska wodnego
      description: Wskazuje docelowy poziom wody, w którym pojazd pływający RC zapewnia
        najlepsze osiągi.
    remote_keyless_system_programming_method:
      name: Metoda programowania zdalnego systemu bezkluczykowego
      description: Sposób programowania lub parowania pilota/systemu z pojazdem (np.
        wdrażanie procedury vs. profesjonalne narzędzie).
    repair_compound_type:
      name: Typ związku naprawczego
      description: Rodzaj/formuła użytego materiału naprawczego (np. rodzaj szpachli
        do karoserii, rodzaj żywicy do szyb samochodowych, rodzaj kleju/uszczelniacza
        do korków opon).
    repair_kit_components:
      name: Zestaw naprawczy komponentów
      description: Wypisuje konkretne pozycje zawarte w zestawie naprawczym, umożliwiając
        klientowi zrozumienie Treści i porównanie pakietu.
    repair_method:
      name: Metoda naprawy
      description: Określa podstawową metodę naprawy stosowaną w zestawie, np. zastosowanie
        łatek samoprzylepnych lub wymiana zaworu.
    replacement_part_purpose:
      name: Przeznaczenie części zamiennej
      description: Wskazuje, czy pozycja jest częścią zamienną OEM, częścią uaktualnić/wydajność,
        czy dodatkiem dodatkowym.
    replacement_part_type:
      name: Typ części zamiennej
      description: Identyfikuje kategorię funkcjonalną części trenażera eliptycznego,
        umożliwiając klientowi filtrowanie według potrzebnego mu komponentu.
    replacement_parts_availability:
      name: Dostępność części zamiennych
      description: Określa, czy dla nawlekacza obsługiwane są części eksploatacyjne/wymienne
        (np. zapasowe haczyki/druty).
    replica_gun_action_type:
      name: Typ repliki broni palnej
      description: Określa typ działania/akcji repliki broni palnej (jak pokazano),
        np. zamek ślizgowy lub dźwigniowy.
    replica_gun_firing_mechanism:
      name: Replika mechanizmu strzelającego pistoletu
      description: Określa, czy i w jaki sposób replika symuluje strzelanie. Functions
        (nieśmiercionośne), takie jak strzelanie z kapiszonu lub niestrzelanie.
    replica_gun_moving_parts:
      name: Ruchome części repliki broni
      description: Wskazuje, które części repliki są funkcjonalne/ruchome.
    reservoir_orientation:
      name: Orientacja zbiornika
      description: Określa zamierzony kierunek lub profil pęcherza wewnątrz opakowania.
    reservoir_type:
      name: Typ zbiornika
      description: Rodzaj konfiguracji zbiornika głównego cylindra sprzęgła.
    resin_suitability:
      name: Przydatność żywicy
      description: Określa, czy piłka ręczna jest przeznaczona do stosowania z żywicą
        (klejem), czy nie zawiera żywicy.
    resistance_adjustability:
      name: Możliwość regulacji oporu
      description: Określa, czy użytkownik może zmienić opór oddechowy.
    resistance_band_design:
      name: Projekt taśmy oporowej
      description: Opisuje fizyczną formę lub styl taśmy oporowej (np. pętla, rurka
        z identyfikatorem, ósemka), pomagając klientowi wybrać odpowiedni wzór do
        swojego planu ćwiczeń.
    resistance_loading_type:
      name: Typ obciążenia rezystancyjnego
      description: Wskazuje sposób stawiania oporu/ciężaru lub jego ładowania na maszynę
        Smitha (np. obciążenie talerzami lub selektywny stos ciężarów).
    response_fields_included:
      name: Dołączono pola odpowiedzi
      description: Określa, które standardowe pola/opcje odpowiedzi są obecne na karcie
        odpowiedzi (np. akceptacja/odrzucenie, wybór posiłku).
    restoration_status:
      name: Stan odtworzenia
      description: Określa, czy furgonetka jest oryginalna, odrestaurowana, restomodowana
        czy projektowa.
    rhinestone_base_color_family:
      name: Rodzina kolorów bazowych kryształków
      description: Identyfikuje rodzinę kolorów bazowego kryształu górskiego (np.
        przezroczysty/krystaliczny, złoty/żółty, niebieski).
    rhinestone_facet_style:
      name: Styl akcentów kryształowych
      description: Wzór powierzchni/aspektu kryształu górskiego wpływający na blask
        i wygląd (np. Xilion rose, brylantowy szlif, aspekt vs gładki).
    rhinestone_hole_reinforcement_material:
      name: Materiał wzmacniający otwory z kryształkami
      description: Materiał wokół/przy otworach (np. metalowa przelotka, formowany
        plastik) Influence trwałość podczas szycia.
    rhinestone_setting_type:
      name: Typ ustawień kryształu górskiego
      description: Sposób mocowania/obrzegu kamienia do szycia (np. kołki, ustawienia,
        oprawki, ustawienia).
    rhubarb_product_cut_type:
      name: Produkt rabarbarowy w postaci ciętej
      description: Opisuje fizyczne przygotowanie lub krojenie produktu rabarbarowego.
    ribbon_construction:
      name: Konstrukcja wstęgowa
      description: Opisuje główne cechy konstrukcyjne wstążki grosgrain, takie jak
        drutowanie lub elastyczność, co zmienia jej zastosowanie (np. kokardki lub
        szycie).
    ribbon_packaging_type:
      name: Rodzaj opakowania wstążkowego
      description: Wskazuje sposób Supply/sprzedaży wstążki.
    ribbon_pattern_style:
      name: Styl wzoru wstążki
      description: Klasyfikuje metodę tworzenia wzorów powszechnie stosowaną na wstążkach
        grosgrainowych.
    ribbon_sheen_level:
      name: Poziom połysku wstążki
      description: Oznacza połysk wizualny powierzchni wstążki satynowej.
    ribbon_style:
      name: Styl wstążki
      description: Określa wzór wizualny/styl wstążki (np. jednolita, w paski, trójkolorowa).
    ribbon_trim_backing_type:
      name: Typ podkładu wstążki/lamówki
      description: Wskazuje, czy wstążka/lamówka ma podkład i jakiego rodzaju, dla
        łatwej aplikacji.
    ribbon_trim_edge_finish:
      name: Wykończenie krawędzi wstążki/lamówki
      description: Opisuje konstrukcję/wykończenie krawędzi wstążki/lamówki, przydatne
        pod kątem strzępienia i zamierzonego zastosowania.
    ric_rac_wave_size:
      name: Rozmiar fali zygzaka
      description: Opisuje amplitudę/skalę fali zygzaka, czyli jak duże są zygzaki/fale.
    rice_grain_length:
      name: Długość ziarna ryżu
      description: Klasyfikuje produkty ryżowe według długości ziarna, np. krótko-,
        średnio- lub długoziarnisty, co wpływa na właściwości gotowania i zastosowanie
        kulinarne.
    rice_processing_method:
      name: Metoda obróbki ryżu
      description: Opisuje sposób przetworzenia lub przygotowania ryżu, np. parboiled,
        kiełkowany, płatkowany, wpływający na czas gotowania, wartości odżywcze i
        zastosowanie.
    rice_variety:
      name: Odmiana ryżu
      description: Określa konkretną odmianę lub kultywar ryżu, pozwalając kupującym
        wybrać ziarna o preferowanym smaku, aromacie, teksturze i kuchni docelowej.
    riding_toy_features:
      name: Cechy jeździka
      description: Wyróżnia typowe funkcje użytkowe/bezpieczeństwa właściwe dla jeździków.
    rifle_action_type:
      name: Typ działania karabinu
      description: Mechanizm działania karabinu, czyli sposób ładowania/strzelania/wyrzucania
        łusek, ważny dla identyfikacji i zainteresowania kolekcjonerów.
    rifle_finish:
      name: Wykończenie karabinu
      description: Podstawowe zewnętrzne wykończenie/powłoka elementów metalowych.
    rifle_magazine_type:
      name: Typ magazynka karabinu
      description: Typ systemu podawania karabinu.
    rifle_stock_material:
      name: Materiał kolby karabinu
      description: Podstawowy materiał użyty na kolbę/osadę karabinu, np. orzech,
        polimer.
    rim_clamping_method:
      name: Metoda mocowania obręczy
      description: Sposób, w jaki maszyna mocuje koło/obręcz podczas montażu i demontażu.
    rim_strip_type:
      name: Typ opaski na obręcz
      description: Klasyfikuje opaskę/taśmę według stylu, konstrukcji lub konkretnego
        zastosowania, np. taśma do obręczy bezdętkowych lub ochronna opaska gumowa.
    rim_tubeless_compatibility:
      name: Kompatybilność obręczy z systemem bezdętkowym
      description: Wskazuje, czy obręcz, taśma lub koło są zaprojektowane do konfiguracji
        z oponami bezdętkowymi.
    ripeness_stage:
      name: Etap dojrzałości
      description: Wskazuje poziom dojrzałości owocu w momencie sprzedaży, np. niedojrzały,
        dojrzały, gotowy do spożycia.
    riser_pad_type:
      name: Typ podkładki riser
      description: Klasyfikuje funkcjonalny styl podkładki, np. standardowy dystans,
        amortyzująca, klin pod kątem.
    roasted_malt_processing_type:
      name: Typ przetwarzania słodu palonego
      description: Konkretny sposób przetwarzania lub wariant użyty do wytworzenia
        słodu palonego albo palonego ziarna, np. niesłodowany palony jęczmień, słód
        czarny, warianty odgoryczone lub pozbawione łuski.
    robotic_toy_interaction_mode:
      name: Tryb interakcji zabawki robotycznej
      description: Opisuje podstawowy sposób, w jaki robot wchodzi w interakcję lub
        porusza się podczas zabawy.
    robotic_toy_light_features:
      name: Funkcje oświetlenia zabawkowego robota
      description: Wskazuje, czy i w jaki sposób zabawka wykorzystuje światła jako
        element zabawy, np. LED, projekcję.
    robotic_toy_programming_supported:
      name: Obsługiwane programowanie zabawki robotycznej
      description: Określa, jakie podejście do programowania, jeśli występuje, obsługuje
        zabawka.
    robotic_toy_skill_level:
      name: Poziom umiejętności zabawki robotycznej
      description: Wskazuje poziom złożoności obsługi/programowania oczekiwany od
        użytkownika.
    robotic_toy_sound_features:
      name: Funkcje dźwiękowe zabawki robotycznej
      description: Wskazuje możliwości dźwiękowe zabawki robotycznej.
    rod_butt_style:
      name: Styl dolnika wędki
      description: Definiuje konfigurację końca dolnika wędki używaną w zastosowaniach
        trollingowych.
    rod_construction_type:
      name: Typ konstrukcji wędki
      description: Wskazuje ogólny styl budowy wędki pod względem liczby części i
        składania.
    rod_guide_material:
      name: Materiał przelotek wędki
      description: Określa materiał użyty na przelotki wędki lub ich wkładki, wpływający
        na trwałość, wagę i tarcie żyłki.
    rod_guide_type:
      name: Typ przelotek wędki
      description: Określa podstawowy styl przelotek zamontowanych na wędce.
    rod_handle_type:
      name: Typ uchwytu wędki
      description: Określa konfigurację chwytu wędki, pomagając dobrać komfort i technikę.
    roll_cage_tubing_material:
      name: Materiał rur klatki bezpieczeństwa
      description: Określa materiał/stop rur użytych do klatki bezpieczeństwa/pałąka
        bezpieczeństwa, np. stal DOM lub chromomolibden 4130.
    roller_skate_brake_shape:
      name: Kształt hamulca wrotki
      description: Opisuje geometryczny kształt/profil głowicy hamulca pod kątem osiągów
        lub preferencji estetycznych.
    roller_skate_brake_type:
      name: Typ hamulca wrotek
      description: Określa system hamowania używany we wrotkach.
    roller_ski_technique:
      name: Technika nartorolek
      description: Określa technikę narciarstwa biegowego, do której zaprojektowano
        nartorolki.
    roller_technology:
      name: Technologia rolki
      description: Wskazuje zintegrowaną technologię poprawiającą skuteczność masażu,
        np. wibracje lub ciepło.
    rolling_case_wheel_configuration:
      name: Konfiguracja kółek futerału na kółkach
      description: Określa konfigurację kółek stosowaną w futerałach na instrumenty
        klawiszowe na kółkach.
    rolling_paper_format:
      name: Format bibułek
      description: Określa fizyczną formę produktu, np. płaskie arkusze, gotowe stożki,
        wrapy.
    rolling_paper_gum_type:
      name: Typ kleju bibułki
      description: Określa klej użyty na krawędzi bibułki do zamykania, który może
        wpływać na smak i właściwości użytkowe.
    rolling_paper_size:
      name: Rozmiar bibułki
      description: Oznacza standardową klasyfikację rozmiaru bibułki lub stożka, pozwalając
        kupującym szybko wybrać właściwą szerokość/długość do swoich potrzeb.
    rolling_stock_type:
      name: Typ taboru
      description: Określa, jakiego rodzaju pociągiem/pojazdem szynowym jest model,
        np. lokomotywa albo wagon pasażerski/towarowy i popularne podtypy wagonów.
    roof_cargo_net_hook_fastener_style:
      name: Styl haka/zapięcia siatki transportowej na dach
      description: Określa styl osprzętu końcowego używanego do mocowania siatki do
        punktów kotwiczenia, np. hak S, karabinek, hak J.
    roof_height_class:
      name: Klasa wysokości zadaszenia
      description: Klasyfikuje wysokość dachu powszechnie stosowaną w vanach, szczególnie
        istotną przy konwersjach/kamperach.
    roof_type:
      name: Typ dachu
      description: Konfiguracja sekcji dachu lub sufitu obudowy.
    root_variety:
      name: Odmiana korzenia
      description: Określa odmianę lub popularny typ korzenia, np. chrzan albo prawdziwe
        odmiany wasabi.
    rope_buoyancy:
      name: Wyporność liny
      description: Wskazuje, czy lina jest zaprojektowana tak, aby unosiła się na
        powierzchni wody, pomagając użytkownikom unikać zaplątania i ułatwiając wyciąganie.
    rope_construction:
      name: Konstrukcja liny
      description: Określa szczegóły konstrukcji włókien poza stylem oplotu, takie
        jak rdzeń/oplot skręcany lub pleciony oraz czy lina ma konstrukcję kernmantle.
    rope_material:
      name: Materiał linki
      description: Określa materiał linki/sznurka do strojenia.
    rope_strand_compatibility:
      name: Kompatybilność z typami lin
      description: 'Wskazuje, jakie konfiguracje lin obsługuje przyrząd asekuracyjny:
        pojedyncze, połówkowe/podwójne, bliźniacze lub ich kombinacje.'
    rope_stretch_type:
      name: Typ rozciągliwości liny
      description: Opisuje właściwości rozciągania liny, odróżniając style nierozciągliwe,
        niskorozciągliwe, standardowe lub bungee.
    rose_bloom_stage:
      name: Etap rozkwitu róży
      description: Wskazuje, jak bardzo rozwinięte są kwiaty róż przy dostawie/odbiorze,
        od pąka po pełny rozkwit.
    rose_grade:
      name: Klasa róży
      description: Handlowa klasa jakości ciętych róż.
    rosette_center_type:
      name: Typ środka rozety
      description: Określa typ centralnego detalu lub wkładki na przedniej stronie
        rozety.
    rosin_dust_level:
      name: Poziom pylenia kalafonii
      description: Wskazuje przewidywaną ilość pyłu kalafonii powstającego podczas
        normalnego użycia.
    rosin_formula_additives:
      name: Formuła/dodatki kalafonii
      description: Określa istotne cechy formuły, takie jak hipoalergiczna, niskopyląca
        lub mieszanki z dodatkiem metalu.
    rosin_hardness:
      name: Twardość kalafonii
      description: Wskazuje względną twardość/miękkość kalafonii smyczkowej, która
        może wpływać na chwyt i pylenie w różnych warunkach klimatycznych i stylach
        gry.
    rotation_mechanism_type:
      name: Typ mechanizmu obrotowego
      description: Określa mechanizm umożliwiający obrót linki, wpływający na płynność
        i osiąganą prędkość, np. łożyska kulkowe lub tuleje.
    rotation_motion_features:
      name: Funkcje obrotu/ruchu
      description: Wskazuje, czy planety/orbity obracają się lub poruszają i w jaki
        sposób.
    rotor_configuration_type:
      name: Typ konfiguracji wirnika
      description: Określa konfigurację wirników i styl sterowania helikoptera RC,
        np. współosiowy, jednowirnikowy ze stałym skokiem lub ze skokiem ogólnym,
        wielowirnikowy, co istotnie wpływa na charakterystykę lotu i przydatność dla
        różnych poziomów umiejętności.
    rotor_construction_type:
      name: Typ konstrukcji wirnika
      description: Określa styl budowy tarczy, który wpływa na wagę, sztywność i odprowadzanie
        ciepła.
    rotor_mounting_interface:
      name: Technika montażu wirnika
      description: Definiuje standard interfejsu piasty używany do mocowania tarczy
        do koła.
    rotor_mounting_standard:
      name: Standard montażu wirnika
      description: Określa standard interfejsu używany do mocowania tarczy do piasty,
        np. 6-śrubowy lub Center Lock.
    roulette_set_components_included:
      name: Dołączono elementy zestawu do gry w ruletkę
      description: Kluczowe elementy związane z ruletką dołączone do koła/zestawu.
    roulette_wheel_ball_track_type:
      name: Typ toru kulki koła ruletki
      description: Opisuje styl toru kulki używanego w kole, który wpływa na realizm
        i odczucie gry.
    roulette_wheel_numbering_system:
      name: System numeracji koła ruletki
      description: Wskazuje numerację koła ruletki i konfigurację zer pod kątem kompatybilności
        z rozgrywką/szansami.
    rounders_equipment_included:
      name: Dołączone wyposażenie do rounders
      description: Wymienia konkretne elementy lub akcesoria do rounders dostarczane
        z zestawem albo pakietem pomocy treningowej, aby kupujący dokładnie wiedzieli,
        co jest w pudełku.
    rounders_governing_body_approval:
      name: Zatwierdzenie przez organ zarządzający rounders
      description: Wskazuje certyfikację lub zatwierdzenie przez oficjalny organ zarządzający
        rounders albo innym sportem.
    row_counter_format:
      name: Format licznika rzędów
      description: Określa format/styl licznika rzędów dziewiarskich, np. pierścionek,
        łańcuszek, kliker, cyfrowy.
    row_counter_mechanism:
      name: Mechanizm licznika rzędów
      description: Określa, w jaki sposób liczba rzędów jest zwiększana/zapisywana
        w narzędziu.
    row_counter_mounting_method:
      name: Metoda mocowania licznika rzędów
      description: Sposób mocowania licznika/znacznika podczas użycia, np. do drutu,
        palca, projektu itp.
    rowel_type:
      name: Typ gwiazdki ostrogi
      description: Opisuje kształt lub profil krawędzi gwiazdki ostrogi pod kątem
        preferencji jeźdźca i wrażliwości konia.
    rowing_machine_part_type:
      name: Typ części maszyny wioślarskiej
      description: Określa konkretny komponent, który produkt ma zastępować w maszynie
        wioślarskiej, aby kupujący mogli szybko znaleźć dokładnie potrzebną część
        bez nadmiernego mnożenia mikrokategorii.
    rubber_ducky_character_theme:
      name: Motyw/postać gumowej kaczuszki
      description: Motyw lub stylizacja postaci gumowej kaczuszki, przydatne w przypadku
        kaczuszek ozdobnych/kolekcjonerskich.
    rubber_ducky_features:
      name: Cechy gumowej kaczuszki
      description: Funkcje użytkowe/konstrukcyjne właściwe dla gumowych zabawek do
        kąpieli.
    rubber_ducky_size_class:
      name: Klasa rozmiaru gumowej kaczuszki
      description: Przyjazna dla kupującego grupa rozmiaru gumowych kaczuszek oparta
        na typowym zastosowaniu, np. zabawka do kąpieli, topper na ciasto, jumbo.
    ruffle_style:
      name: Styl falbany
      description: Opisuje konstrukcję lub wizualny styl falbany na szarfie na krzesło.
    rugby_headgear_safety_certification:
      name: Certyfikacja bezpieczeństwa ochraniacza głowy do rugby
      description: Wskazuje, czy ochraniacz głowy spełnia oficjalne normy bezpieczeństwa
        rugby lub ogólne normy bezpieczeństwa sportowego.
    rugby_size:
      name: Rozmiar rugby
      description: Klasyfikuje sprzęt według popularnych oznaczeń rozmiaru właściwych
        dla rugby, używanych w tytułach produktów.
    rugby_variant:
      name: Odmiana rugby
      description: Określa odmianę rugby (kod lub format), do której produkt jest
        przeznaczony.
    ruler_edge_type:
      name: Typ krawędzi linijki
      description: Określa profil/funkcję krawędzi używaną do mierzenia lub znakowania,
        np. prosta krawędź, fazowana, z rantem.
    ruler_marking_style:
      name: Styl oznaczeń linijki
      description: Opisuje układ oznaczeń/prowadnic nadrukowany na linijce poza podstawowymi
        kreskami podziałki.
    runner_configuration:
      name: Konfiguracja prowadnicy
      description: Opisuje liczbę i układ płóz w sankach.
    runner_material:
      name: Materiał prowadnicy
      description: Określa materiał użyty na płozy sanek lub listwy ślizgowe.
    saddle_cover_style:
      name: Styl pokrowca na siodło
      description: Klasyfikuje ogólny styl konstrukcji lub użytkowania produktu, np.
        pokrowiec do przechowywania, pokrowiec do jazdy, torba transportowa.
    saddle_design:
      name: Konstrukcja siodełka
      description: Klasyfikuje ogólny ergonomiczny lub odciążający styl/konstrukcję
        siodełka, np. z wycięciem, bez nosa, z dzielonym nosem, sprężynowe.
    saddle_discipline:
      name: Dyscyplina dla siodła
      description: Określa główną dyscyplinę jeździecką lub zamierzone zastosowanie/styl
        siodła.
    saddle_mounting_type:
      name: Typ mocowania siodła
      description: Określa interfejs między siodełkiem a sztycą pod kątem kompatybilności,
        np. na prętach, pivotal, I-Beam.
    saddle_pad_shape:
      name: Kształt czapraka
      description: Opisuje fizyczny krój/obrys czapraka, który wpływa na kompatybilność
        z siodłem i preferencje estetyczne.
    saddle_pad_style:
      name: Styl podkładki pod siodło
      description: Określa funkcjonalny styl czapraka lub zamierzoną dyscyplinę, umożliwiając
        jeźdźcom wybór właściwej konstrukcji do aktywności lub typu siodła.
    saddle_padding_material:
      name: Materiał wyściółki siodełka
      description: Wskazuje podstawowy materiał amortyzujący lub technologię wewnątrz
        siodełka, wpływającą na komfort i odczucie jazdy.
    saddle_rail_material:
      name: Materiał sztycy podsiodłowej
      description: Określa materiał użyty na pręty pod siodełkiem rowerowym, który
        wpływa na wytrzymałość, komfort, wagę i cenę.
    saddle_tree_material:
      name: Materiał terlicy siodła
      description: Określa materiał użyty na terlicę siodła, czyli wewnętrzną ramę
        siodła.
    saddle_tree_width:
      name: Szerokość terlicy siodła
      description: Opisuje klasyfikację szerokości terlicy siodła, określającą dopasowanie
        do kłębu konia.
    safety_documentation_available:
      name: Dostępna dokumentacja bezpieczeństwa
      description: Wskazuje, jakie dokumenty zgodności/bezpieczeństwa są dostarczane
        dla składnika, np. karta charakterystyki, certyfikat/oświadczenie IFRA, oświadczenie/deklaracja
        alergenów.
    safety_equipment_included:
      name: Dołączono sprzęt zabezpieczający
      description: Elementy bezpieczeństwa/ochronne dołączone do zestawu.
    safety_features:
      name: Środki bezpieczeństwa
      description: Wskazuje wbudowane funkcje bezpieczeństwa mające ograniczać przypadkowe
        skaleczenia lub chronić ostrze podczas przechowywania.
    safety_harness_type:
      name: Typ uprzęży bezpieczeństwa
      description: Wskazuje styl i konfigurację uprzęży przytrzymującej dziecko dostarczanej
        z siedziskiem.
    safety_mechanism_type:
      name: Typ mechanizmu zabezpieczającego
      description: Opisuje styl wbudowanego systemu bezpieczeństwa używanego do przechwytywania
        sztangi podczas nieudanego podnoszenia.
    safety_restraint_type:
      name: Typ zabezpieczenia
      description: Typ wbudowanego zabezpieczenia dziecka w siedzisku huśtawki, jeśli
        występuje.
    safety_warning:
      name: Ostrzeżenie dotyczące bezpieczeństwa
      description: Wskazuje, czy produkt zawiera typowe ostrzeżenia bezpieczeństwa
        dotyczące zabawek istotne dla kulek, np. ryzyko zadławienia.
    sail_shape:
      name: Kształt żagla
      description: Opisuje geometryczny styl żagla kajakowego, który wpływa na wydajność,
        prowadzenie i montaż.
    salad_dressing_type:
      name: Typ sosu sałatkowego
      description: Określa podstawowy styl lub teksturę sosu, np. kremowy, winegret,
        na bazie jogurtu, pomagając kupującym rozróżniać różne bazy i konsystencje.
    salad_topping_base_ingredient:
      name: Składnik bazowy posypki do sałatki
      description: Określa podstawową grupę składników tworzących posypkę, pomagając
        klientom filtrować według preferencji żywieniowych, kwestii alergenów lub
        pożądanej tekstury.
    salt_level:
      name: Poziom soli
      description: Wskazuje ilość soli lub sodu dodaną do orzechów lub nasion.
    sand_cup_features:
      name: Cechy kubka do piasku
      description: Funkcjonalne/fizyczne cechy kubków do piasku, które wpływają na
        zabawę i użytkowanie.
    sand_shovel_handle_style:
      name: Styl uchwytu łopatki do piasku
      description: Opisuje kształt uchwytu/chwytu na końcu rączki łopatki/szufelki.
    sand_toy_set_pieces_included:
      name: Dołączono elementy zestawu zabawek do piasku
      description: Wymienia typy elementów zabawek do piasku dołączone do zestawu,
        np. wiaderko, łopatka, foremki, aby pomóc kupującym porównać zestawy według
        zawartości.
    sand_water_mill_items_included:
      name: Elementy młynka do piasku i wody w zestawie
      description: Wymienia kluczowe akcesoria dołączone do zabawki z młynkiem, np.
        wiaderka, łopatki, foremki itp.
    sandbag_style:
      name: Styl worka treningowego z piaskiem
      description: Określa konkretną konstrukcję i zamierzone zastosowanie treningowe
        worka z piaskiem, np. bułgarski, strongman, power, pomagając kupującym wybierać
        między różnymi rodzajami treningu.
    sandbox_bottom_type:
      name: Typ dna piaskownicy
      description: Typ konstrukcji podstawy/dna użytej pod piaskiem.
    sandbox_drainage_type:
      name: Typ odpływu piaskownicy
      description: Sposób odprowadzania wody z piaskownicy, jeśli dotyczy, np. otwory
        odpływowe lub wyjmowany korek.
    sandbox_seating_type:
      name: Typ siedziska do piaskownicy
      description: Wskazuje, czy piaskownica ma zintegrowane siedziska i jakiego typu.
    sapodillo_variety:
      name: Odmiana sapodilli
      description: Określa konkretny kultywar lub odmianę sapodilli/chikoo, np. „Alano”,
        „Prolific”, umożliwiając entuzjastom wybór preferowanych profili smakowych
        i cech.
    sapote_variety:
      name: Odmiana owocu sapota
      description: Określa konkretny gatunek/typ sapoty w ofercie, np. czarna, biała,
        mamey, pozwalając kupującym rozróżniać różne rodzaje.
    satin_ribbon_face_type:
      name: Typ strony wstążki satynowej
      description: Określa, czy wstążka ma satynowe wykończenie po jednej stronie
        czy po obu stronach.
    sauce_consistency:
      name: Konsystencja sosu
      description: Opisuje teksturę lub gęstość sosu do pizzy.
    sauce_product_form:
      name: Forma produktu w postaci sosu
      description: Wskazuje fizyczną formę produktu sosowego, np. płyn, olej, pasta,
        proszek, płatki lub syrop.
    sauce_variety:
      name: Odmiana sosu
      description: Określa konkretny styl lub rodzinę receptur białego albo śmietanowego
        sosu, np. Alfredo, beszamel, holenderski.
    saxophone_body_finish:
      name: Wykończenie korpusu saksofonu
      description: Opisuje podstawowe wykończenie/powłokę korpusu saksofonu, oddzielnie
        od mechaniki.
    saxophone_body_type:
      name: Typ korpusu saksofonu
      description: Opisuje ogólną fizyczną konfigurację korpusu saksofonu basowego
        i orientację czary głosowej.
    saxophone_construction_style:
      name: Styl konstrukcji saksofonu
      description: Wskazuje typowe cechy konstrukcji saksofonu, które wpływają na
        trwałość, rezonans i serwisowanie.
    saxophone_included_accessories:
      name: Akcesoria dołączone do saksofonu
      description: Wymienia akcesoria zwykle dołączane do zestawu z saksofonem altowym.
    saxophone_key_system:
      name: System klap saksofonu
      description: Określa system mechaniki saksofonu, czyli standard układu/mechanizmu
        zastosowany w instrumencie.
    saxophone_key_touch_material:
      name: Materiał nakładek klap saksofonu
      description: Określa materiał użyty na nakładki klap saksofonu, np. perłowe
        nakładki.
    saxophone_mouthpiece_baffle_type:
      name: Typ przegrody ustnika saksofonowego
      description: Opisuje konstrukcję przegrody kształtującą przepływ powietrza i
        jasność brzmienia.
    saxophone_neck_type:
      name: Typ fajki saksofonu
      description: Określa konfigurację fajki dostarczanej z saksofonem basowym.
    saxophone_package_contents:
      name: Zawartość pakietu saksofonu
      description: Wymienia kluczowe akcesoria dołączone do saksofonu, np. futerał,
        ustnik, ligaturę, pasek na szyję, zestaw do czyszczenia.
    saxophone_reed_cut:
      name: Cięcie stroika saksofonowego
      description: Określa cięcie/styl stroika saksofonowego, który wpływa na reakcję,
        brzmienie i odczucie gry.
    saxophone_reed_material_type:
      name: Typ materiału stroika saksofonowego
      description: Określa kategorię materiału stroika, np. trzcinowy lub syntetyczny.
    saxophone_reed_strength_scale:
      name: Skala twardości stroika saksofonowego
      description: Określa system/skalę numeracji twardości używaną dla stroika, często
        zależną od marki, umożliwiając wyraźniejsze porównanie ofert.
    saxophone_small_part_thread_size:
      name: Rozmiar gwintu drobnej części saksofonu
      description: Określa rozmiar/standard gwintu dla gwintowanych drobnych części
        saksofonu, głównie śrub, umożliwiając wybór właściwego dopasowania.
    saxophone_swab_application_area:
      name: Obszar zastosowania wyciora do saksofonu
      description: Wskazuje, którą część saksofonu wycior ma czyścić/suszyć.
    scabbard_material:
      name: Materiał pochwy
      description: Określa główny materiał osłony/pochwy (o ile jest obecna).
    scale_model_assembly_status:
      name: Stan złożenia modelu w skali
      description: Wskazuje, czy model w skali jest gotowy do ekspozycji, czy wymaga
        składania/malowania.
    scale_model_car_features:
      name: Cechy modelu samochodu w skali
      description: Istotne cechy modelu samochodu w skali, takie jak otwierane drzwi/maska,
        skrętne koła, zawieszenie itp.
    scale_model_kit_assembly_requirements:
      name: Wymagania montażowe zestawu modelu w skali
      description: Określa, jakie dodatkowe etapy montażu/materiały są zwykle wymagane
        poza podstawowym montażem zatrzaskowym.
    scale_model_kit_components_included:
      name: Elementy dołączone do zestawu modelu w skali
      description: Wymienia elementy dołączone do modelu/zestawu czołgu w skali, np.
        kalkomanie, figurki, elementy fototrawione.
    scale_model_paint_status:
      name: Stan malowania modelu w skali
      description: Wskazuje, czy model śmigłowca jest wstępnie pomalowany/wykończony,
        czy wymaga malowania.
    scale_model_pose:
      name: Ustawienie modelu redukcyjnego
      description: Określa przedstawioną pozę modelu konia do dopasowania ekspozycji/dioramy.
    scale_model_rotor_configuration:
      name: Konfiguracja wirników modelu w skali
      description: Określa konfigurację wirników śmigłowca przedstawioną przez model.
    scale_model_truck_era:
      name: Epoka modelu ciężarówki w skali
      description: Wskazuje epokę/okres rzeczywistej ciężarówki przedstawionej przez
        model, przydatne dla kolekcjonerów szukających ciężarówek zabytkowych lub
        nowoczesnych.
    scale_model_truck_propulsion_type:
      name: Typ napędu modelu ciężarówki w skali
      description: Określa, czy przedstawiona ciężarówka ma napęd wysokoprężny, benzynowy,
        elektryczny, hybrydowy lub inny, zgodnie z przedstawieniem/opisem modelu.
    scale_units:
      name: Jednostki skali
      description: Jednostki miary nadrukowane/wygrawerowane na belce do ustawiania
        promienia/średnicy.
    scent_function:
      name: Funkcja zapachu
      description: Definiuje podstawową funkcję produktu zapachowego, aby myśliwi
        mogli szybko zawęzić wybór do właściwego narzędzia, np. wabik zapachowy lub
        neutralizator zapachu.
    scent_source:
      name: Źródło zapachu
      description: Wymienia podstawowe źródło biologiczne lub aromatyczne użyte w
        formule produktu, obejmujące typy moczu, zapachy spożywcze, aromaty roślinne
        itp.
    school_bus_body_type:
      name: Typ nadwozia autobusu szkolnego
      description: Klasyfikuje autobus szkolny według powszechnych formatów nadwozia/klas
        stosowanych na rynku, np. typ A–D.
    school_bus_safety_feature:
      name: Cechy bezpieczeństwa autobusu szkolnego
      description: Istotne wyposażenie bezpieczeństwa zamontowane w autobusie szkolnym.
    school_glue_washability:
      name: Zmywalność kleju szkolnego
      description: Wskazuje, jak łatwo suchy/mokry klej można usunąć ze skóry/odzieży/powierzchni.
    scissors_application:
      name: Zastosowanie nożyczek
      description: Główne zamierzone zastosowanie/materiał cięcia nożyczek.
    scooter_brake_pad_material:
      name: Materiał klocków hamulcowych hulajnogi
      description: Określa mieszankę zastosowaną w klockach hamulcowych, wpływającą
        na osiągi, hałas i żywotność.
    scoring_method:
      name: Metoda punktacji
      description: Określa, jak liczone są punkty na stole do piłkarzyków, np. ręczne
        liczniki koralikowe lub elektroniczne tablice wyników.
    scoring_pattern:
      name: Wzór punktacji
      description: Układ stref punktacji nadrukowanych na polu gry.
    scoring_system_type:
      name: Typ systemu punktacji
      description: Opisuje styl mechanizmu liczenia punktów dołączonego do stołu,
        np. ręczne suwaki lub różne wyświetlacze elektroniczne.
    scottish_smallpipes_bag_material:
      name: Materiał worka dud szkockich smallpipes
      description: Określa materiał worka, czyli zbiornika powietrza, dostarczanego
        z dudami smallpipes.
    scottish_smallpipes_drone_tuning_configuration:
      name: Konfiguracja strojenia burdonów dud szkockich smallpipes
      description: Określa konfigurację strojenia burdonów dostarczoną z instrumentem,
        czyli wysokości dźwięków/role burdonów względem toniki.
    scottish_smallpipes_reed_type:
      name: Typ stroika dud szkockich smallpipes
      description: Określa typ stroika używany w piszczałce melodycznej i/lub to,
        czy stroiki są syntetyczne czy trzcinowe.
    scraping_surface_type:
      name: Typ powierzchni skrobiącej
      description: Określa konstrukcję/geometrię powierzchni skrobiącej wytwarzającej
        dźwięk, np. rowkowana, grzebieniowa/ząbkowana, falista.
    screw_drive_type:
      name: Typ napędu śruby
      description: Określa rodzaj wgłębienia na śrubie lub łbie śruby, wskazując narzędzie
        potrzebne do jej dokręcenia lub wykręcenia (np. klucz imbusowy, z gniazdem
        sześciokątnym lub z końcówkąTorx).
    screw_thread_size:
      name: Rozmiar gwintu śruby
      description: Określa standard rozmiaru gwintu dołączonych lub zgodnych śrub
        (np. M4, M5, M6).
    sculpting_clay_base_type:
      name: Typ podstawy z gliny rzeźbiarskiej
      description: Opisuje podstawową formułę/bazę gliny rzeźbiarskiej.
    seafood_cut:
      name: Porcja owoców morza
      description: Opisuje fizyczny podział lub prezentację produktu z owoców morza
        (np. cały, polędwica, stek).
    seafood_processing_method:
      name: Metoda przetwarzania owoców morza
      description: Określa podstawową technikę konserwacji lub przetwarzania stosowaną
        w przypadku owoców morza, np. wędzenie, solenie lub liofilizacja.
    seafood_source:
      name: Źródło owoców morza
      description: Informuje, czy owoce morza pochodzą od organizmów dzikich, hodowanych
        na farmie, roślinnych lub z innego źródła, co pomaga klientowi ocenić ich
        zrównoważony charakter i jakość.
    seal_material:
      name: Materiał uszczelniający
      description: Materiał używany do uszczelnień szyi, nadgarstków i kostek, które
        zapewniają wodoszczelność skafandra.
    seal_type:
      name: Rodzaj uszczelnienia
      description: Określa metodę uszczelniania zastosowaną w celu zapobiegania wyciekom
        płynu chłodzącego.
    sealant_formulation:
      name: Skład uszczelniacza
      description: Oznacza podstawowy skład chemiczny lub technologię dodatków uszczelniacza
        do opon rowerowych (np. na bazie lateksu, wzmocniony włóknem, akrylowy itd.).
    seals_leak_type:
      name: Typ wycieku uszczelniacza
      description: Rodzaj/lokalizacja wycieku z układu chłodzenia, który produkt ma
        uszczelnić.
    seam_construction:
      name: Konstrukcja szwu
      description: Opisuje, w jaki sposób utworzono szew piłki, co wpływa na rozpęd,
        trwałość i czucie.
    seam_design:
      name: Konstrukcja szwów
      description: Określa konstrukcję szwu lub właściwości ozdobne szwu wyrobu pończoszniczego.
    seam_gauge_scale_type:
      name: Typ skali miarki do szwów
      description: Wskazuje, jakie skale/oznaczenia są zawarte na miarce krawieckiej
        poza podstawową skalą linijki.
    seam_gauge_slider_material:
      name: Materiał suwaka miarki do szwów
      description: Określa materiał regulowanego elementu suwaka/wskaźnika, jeśli
        występuje.
    seam_ripper_tip_style:
      name: Typ końcówki nożyka do szwów
      description: Opisuje funkcjonalną konstrukcję końcówki, która jest wsuwana pod
        szwy w celu bezpiecznego przecinania nici.
    seam_sealing_type:
      name: Typ uszczelnienia szwu
      description: Opisuje metodę zapobiegającą przedostawaniu się wody przez szwy
        kompletu przeciwdeszczowego (np. całkowite uszczelnienie, zgrzewanie itp.).
    seam_type:
      name: Typ szwu
      description: Opisuje styl szycia piłki baseballowej, który wpływa na przyczepność,
        aerodynamikę i docelowy poziom gry.
    season_condition_protection:
      name: Sezon / ochrona przed warunkami atmosferycznymi
      description: Wskazuje podstawową pogodę/warunki, przed którymi ma chronić osłona
        szyby przedniej.
    season_rating:
      name: Ocena sezonowości
      description: Określa ocenę sezonowości namiotu, wskazując jego przydatność do
        użytkowania w różnych warunkach pogodowych (np. 3-sezonowy, 4-sezonowy lub
        5-sezonowy/ekspedycyjny).
    seasoning_variety:
      name: Odmiana przypraw
      description: Klasyfikuje przyprawy według sposobu przygotowania lub tradycyjnego
        zastosowania kulinarnego.
    seat_adjustment_power_type:
      name: Typ regulacji fotela
      description: Określa sposób uruchamiania mechanizmów regulacji fotela (dźwignie
        ręczne lub silniki elektryczne), co może mieć wpływ na okablowanie/kompatybilność.
    seat_belt_attachment_type:
      name: Rodzaj mocowania pasa bezpieczeństwa
      description: Określa sposób mocowania paska do pojazdu / elementów pasa
    seat_belt_buckle_electrical_connector_type:
      name: Typ elektrycznego złącza klamry pasa bezpieczeństwa
      description: Określa złącze/interfejs używany do podłączenia przełącznika klamry/napinacza,
        jeśli ma to zastosowanie.
    seat_belt_buckle_mounting_type:
      name: Typ mocowania klamry pasa bezpieczeństwa
      description: Opisuje, jak klamra/gniazdo mocuje się do pojazdu, siedzenia lub
        zaczepu pasa, np. przykręcane, wpinane.
    seat_belt_buckle_release_button_color:
      name: Kolor przycisku zwalniania klamry pasa bezpieczeństwa
      description: Określa kolor przycisku zwalniania klamry.
    seat_belt_cover_placement:
      name: Położenie osłony pasa bezpieczeństwa
      description: Określa miejsce na pasie bezpieczeństwa, w którym osłona jest przeznaczona
        do użycia.
    seat_belt_integration:
      name: Integracja pasa bezpieczeństwa
      description: Określa, czy fotel jest wyposażony w zintegrowany pas bezpieczeństwa
        i/lub gniazdo klamry, czy też oryginalne gniazdo klamry pojazdu musi być zostać
        przeniesione do montażu.
    seat_belt_provision:
      name: Obecność pasa bezpieczeństwa
      description: Określa, czy pasy bezpieczeństwa i/lub powiązane elementy (na przykład
        klamry) są dołączone do tylnego siedzenia, czy też muszą być przeniesione
        z oryginalnego siedzenia.
    seat_belt_strap_installation_location:
      name: Miejsce montażu paska pasa bezpieczeństwa
      description: Wskazuje miejsce montażu paska w układzie pasa.
    seat_cover_placement:
      name: Położenie pokrowca na siedzenie
      description: Wskazuje, na które miejsca siedzące w pojeździe przeznaczony jest
        pokrowiec.
    seat_cover_securement_method:
      name: Metoda mocowania pokrowca na siedzenie
      description: Oznacza podstawowy sposób mocowania pokrowca na siedzeniu. Jeżeli
        stosuje się więcej niż jedną metodę, należy wybrać metodę główną/podstawową.
    seat_cover_set_contents:
      name: Zawartość zestawu pokrowców na siedzenia
      description: Opisuje, jakie elementy wchodzą w skład zestawu (np. tylko siedziska
        czy całe siedzisko + zagłówki).
    seat_fabric:
      name: Tkanina siedziska
      description: Podstawowy materiał używany do produkcji siedziska i oparcia.
    seat_height_category:
      name: Kategoria wysokości siedziska
      description: Klasyfikuje stołki według typowego zakresu wysokości siedziska
        (np. wysokość kontuaru lub baru), aby ułatwić wybór.
    seat_material:
      name: Materiał siedziska
      description: Określa główny materiał powierzchni siedziska ławki.
    seat_mounting_type:
      name: Typ mocowania fotela
      description: Konfiguracja mocowania/szyny do przymocowania fotela do podłogi
        pojazdu.
    seating_surface_material:
      name: Materiał powierzchni siedziska
      description: Określa materiał, z którego jest wykonana część, o którą opiera
        się człowiek (np. siatka Textilene, tkanina, wiklina lub tapicerka wyściełana).
    seatpost_clamp_mechanism:
      name: Mechanizm zacisku sztycy
      description: Rodzaj systemu zaciskowego/zamykającego, który zabezpiecza sztycę.
    section_orientation_compatibility:
      name: Zgodność orientacji sekcji
      description: Określa, czy akcesorium pasuje do sekcji skierowanej na lewe ramię,
        na prawe ramię, czy do sekcji o orientacji uniwersalnej.
    sectional_configuration:
      name: Konfiguracja mebla modułowego
      description: Określa konkretny moduł lub orientację mebla modułowego (np. narożnik,
        koniec z lewym ramieniem lub szezlong), tak aby klient mógł uzyskać żądany
        układ.
    sectional_shape:
      name: Kształt mebla modułowego
      description: Określa ogólną konfigurację geometryczną/układ sofy modułowej.
    secured_components:
      name: Zabezpieczone elementy
      description: Wymienia konkretne części roweru, które są chronione przez blokadę
        lub nakrętki zabezpieczające (np. koło przednie, koło tylne lub sztyca).
    seed_content:
      name: Zawartość pestek
      description: Informuje, czy owoc cytrusowy jest bezpestkowy, ma niewiele pestek,
        czy też jest całkowicie drylowany.
    seed_size_classification:
      name: Klasyfikacji wielkości ziaren
      description: Wskazuje względny rozmiar niejadalnej pestki wewnątrz liczi, który
        wpływa na ilość jadalnego miąższu.
    self_adhesive_backing_format:
      name: Format podkładu samoprzylepnego
      description: Format fizyczny podkładu klejącego dostarczonego z blaszką do knotów
        (wstępnie naklejona podkładka lub oddzielne naklejki itp.).
    self_adhesive_hook_loop_backing_type:
      name: Typ samoprzylepnego podkładu z rzepem
      description: Określa konstrukcję podkładu/warstwy i system klejenia stosowany
        po stronie samoprzylepnej.
    self_adhesive_hook_loop_fastener_shape:
      name: Kształt samoprzylepnego rzepa
      description: Określa cięcie/kształt dostarczonych elementów łączących.
    self_hardening_clay_finish:
      name: Samoutwardzalna glina wykończeniowa
      description: Opisuje wygląd/połysk powierzchni po całkowitym utwardzeniu (przydatne
        przy wyborze między naturalnym matem, satyną itp.).
    self_hardening_clay_water_resistance_after_curing:
      name: Odporność na wodę samoutwardzalnej gliny po utwardzeniu
      description: Wskazuje odporność na kontakt z wodą po pełnym utwardzeniu, bez
        dodatkowego uszczelniacza.
    sensor_functions:
      name: Funkcje czujnika
      description: Wskazuje, jakie parametry mierzy czujnik podczas jazdy na rowerze.
    sensor_measurement_mode:
      name: Tryb pomiaru czujnika
      description: Wskazuje, jakie dane pomiarowe może rejestrować czujnik (np. tylko
        tempo, tylko prędkość, podwójna prędkość i tempo itp.).
    sensor_mounting_position:
      name: Położenie montażu czujnika
      description: Określa miejsce na rowerze lub użytkowniku, w którym montowany
        jest czujnik, np. ramię korby, piasta koła lub but. Wpływa to na kompatybilność
        z różnymi konfiguracjami roweru.
    sensor_mounting_type:
      name: Typ mocowania czujnika
      description: Określa sposób montażu czujnika MAP do kolektora dolotowego/silnika
        (np. za pomocą kołnierza przykręcanego lub przelotki wciskanej).
    sensor_or_gauge_mounting_location:
      name: Miejsce montażu czujnika lub wskaźnika
      description: Określa, w którym miejscu pojazdu ma być zamontowany czujnik lub
        wskaźnik (na poziomie układu/lokalizacji, nie strony lewej/prawej).
    sensory_modality:
      name: Wrażenia sensoryczne
      description: Podstawowe doświadczenia sensoryczne, które ma zapewnić zabawka
        (może obejmować kilka zmysłów).
    sensory_toy_fidget_mechanism:
      name: Mechanizm poruszania się zabawki sensorycznej
      description: Podstawowy sposób interakcji / mechanizm odpowiedzialny za poruszanie
        się i samoregulację.
    sensory_toy_light_features:
      name: Funkcje świetlne zabawki sensorycznej
      description: Efekty/zachowania świetlne oferowane przez zabawkę.
    sensory_toy_texture_type:
      name: Typ faktury zabawki sensorycznej
      description: Dominujące elementy faktury / odczucia służące do stymulacji dotykowej.
    sequin_application_method:
      name: Metoda nakładania cekinów
      description: W jaki sposób cekiny mają być nakładane/używane (naszywanie, klejenie,
        utrwalanie termicznie itp.).
    sequin_finish:
      name: Wykończenie cekinami
      description: Opisuje wykończenie powierzchni/wizualne i efekt odbicia cekinów
        użytych na naszywce, np. matowe, metaliczne, holograficzne, a nie podkład
        naszywki ani metodę mocowania.
    serger_stitch_functions:
      name: Funkcje ściegu owerlokowego
      description: Funkcje ściegów obsługiwane przez owerlok, czyli warianty overlock/obrębiania
        i specjalistyczne ściegi owerlokowe.
    serger_thread_count:
      name: Gęstość ściegu owerlokowego
      description: Liczba nici, jaką może zawierać ścieg owerlokowy (np. 2, 3, 4 lub
        5 nici).
    service_interval:
      name: Okres między przeglądami
      description: Zalecany maksymalny czas między wymaganymi przeglądami/serwisowaniem
        przez zatwierdzoną stację serwisową.
    serving_temperature:
      name: Temperatura podawania
      description: Oznacza przewidywaną temperaturę podania lub stan produktu w momencie
        spożycia.
    sesame_seed_hull_status:
      name: Status łupin nasion sezamu
      description: Określa, czy tahini jest zrobione z łuskanych czy niełuskanych
        nasion sezamu, co ma wpływ na kolor, smak i wartości odżywcze.
    sesame_seed_roast_level:
      name: Stopień prażenia nasion sezamu
      description: Informuje o stopniu uprażenia nasion sezamu przed zmieleniem, co
        pomaga klientowi wybrać preferowany poziom intensywności smaku.
    sesame_seed_variety:
      name: Odmiana nasion sezamu
      description: Określa kolor lub odmianę nasion sezamu użytych do produkcji oleju.
    set_classification:
      name: Klasyfikacja zestawu
      description: Określa docelowy poziom gry lub styl zestawu do krokieta (np. turniejowy,
        rekreacyjny, podróżny itp.).
    set_components:
      name: Elementy zestawu
      description: Wskazuje, jakie elementy są zawarte w produkcie (np. tylko drążek
        środkowy lub cały zestaw).
    set_items_included:
      name: Dołączono elementy zestawu
      description: Określa elementy ubioru i dodatki wchodzące w skład zestawu, takie
        jak materiał na sari, dupatta lub pasek.
    setup_mechanism:
      name: Mechanizm rozstawiania
      description: Opisuje główny sposób rozstawiania namiotu (np. system pop-up,
        namiot nadmuchiwany/pneumatyczny, namiot dachowy itd.).
    setup_type:
      name: Typ rozstawiania
      description: Sposób składania lub rozkładania namiotu/tunelu do zabawy.
    sew_in_interfacing_elasticity:
      name: Elastyczność zszywania
      description: Określa, czy wszywana wkładka jest elastyczna, a jeśli tak, to
        w jakim kierunku, aby pasowała do projektów dzianych lub tkanych.
    sew_in_label_placement:
      name: Umiejscowienie wszywki
      description: Wskazuje zamierzone miejsce umieszczenia na gotowym przedmiocie.
    sew_on_edge_finish:
      name: Wykończenie krawędzi do przyszycia
      description: Wskazuje, czy krawędzie rzepu są surowe/cięte czy wykończone, aby
        zapobiegać strzępieniu.
    sew_on_rhinestone_hole_orientation:
      name: Orientacja otworów na kryształki do przyszycia
      description: Układ/orientacja otworów względem kryształków (np. obok siebie,
        naprzeciwlegle, na krzyż) ułatwiająca wykonywanie różnych stylów ściegu.
    sewing_kit_components_included:
      name: Dołączono elementy zestawu do szycia
      description: Zawiera listę akcesoriów/narzędzi do szycia zawartych w zestawie
        do szycia, dzięki czemu klient może porównać, co znajduje się w każdym zestawie.
    sewing_machine_bobbin_class:
      name: Klasa szpulki maszyny do szycia
      description: Określa klasę lub system szpulki zgodne z maszyną do szycia; dla
        szpulek i obudów szpulek.
    sewing_machine_buttonhole_type:
      name: Typ dziurek maszyny do szycia
      description: Metoda wykonywania dziurek obsługiwana przez maszynę.
    sewing_machine_display_type:
      name: Typ wyświetlacza maszyny do szycia
      description: Rodzaj interfejsu sterowania/wyświetlacza w maszynie do szycia.
    sewing_machine_needle_point_type:
      name: Typ igły maszyny do szycia
      description: Definiuje geometrię czubka/rodzinę czubków igły, która określa
        sposób przebijania różnych tkanin, np. ostra, kulkowa, klinowa.
    sewing_machine_needle_system:
      name: System igły w maszynie do szycia
      description: Standardowy system/numer modelu igły określający kompatybilność
        z maszyną, często zapisywany jako 130/705 H, HAx1, DBx1, 15x1 itp.
    sewing_machine_needle_type:
      name: Typ igły w maszynie do szycia
      description: Określa docelowy styl/zastosowanie igły (np. uniwersalna, kulkowa
        lub do jeansów), co ma wpływ na jakość ściegu i przydatność dla danego materiału.
    sewing_machine_shank_type:
      name: Typ uchwytu do stopek w maszynie do szycia
      description: Określa standard interfejsu trzpienia/kostki stopki dociskowej,
        dla którego zaprojektowano stopkę, zapewniając jej kompatybilność z maszyną
        do szycia (np. niski trzpień, wysoki trzpień lub skośny trzpień).
    sewing_pattern_accessory_type:
      name: Typ akcesorium do wykroju krawieckiego
      description: Określa, jakie akcesoria zawiera wzór do szycia.
    sewing_pattern_notions_required:
      name: Wymagane dodatki do wykroju krawieckiego
      description: Wymienia istotne dodatkowe materiały/osprzęt wymagane do wykonania
        projektu poza tkaniną i nicią.
    sewing_pattern_recommended_fabric:
      name: Zalecany materiał wzoru do szycia
      description: Zawiera listę zalecanych rodzajów i gramatur tkanin dla danego
        wykroju (zgodnie z zaleceniami projektanta wykroju).
    sewing_pattern_size_range:
      name: Zakres rozmiarów wykroju
      description: Określa zakres rozmiarów, który obejmuje wzór (np. od niemowlęcego
        do dorosłego, duży rozmiar itp.).
    sewing_thread_size_system:
      name: System rozmiarów nici do szycia
      description: Standard rozmiarów stosowany do wyrażania grubości nici (np. Tex,
        Denier, Ticket, wartość wagowa lub rozmiar V).
    shaft_curvature:
      name: Krzywizna rękojeści
      description: Opisuje ogólny kształt rękojeści, który wpływa prześwit, wymach
        i ergonomię.
    shaft_kick_point:
      name: Punkt odbicia trzonka
      description: Określa miejsce na trzonku, w którym wygina się on najbardziej
        podczas wymachu, wpływając na trajektorię lotu piłki.
    shaft_length_type:
      name: Typ długości trzonka
      description: Branżowe standardowe oznaczenie kategorii rozmiaru shaftów do lotek,
        np. Short, Medium, używane, gdy nie podano dokładnych wymiarów w milimetrach.
    shaft_shape:
      name: Kształt shaftu
      description: Definiuje profil przekroju poprzecznego trzonka tonfy (np. okrągły,
        kwadratowy lub ośmiokątny).
    shaker_fill_material:
      name: Materiał wypełnienia shakera
      description: Określa podstawowe wypełnienie wewnętrzne używane do wydawania
        dźwięku grzechotki (jeśli ma to zastosowanie), np. koraliki, nasiona lub kulki.
    shaker_shell_material:
      name: Materiał skorupy shakera
      description: Określa główny materiał korpusu/skorupy (obudowy zewnętrznej) grzechotki.
    shallot_variety:
      name: Odmiana szalotki
      description: Określa konkretne kultywar, typ rynku lub odmianę produktu szalotkowego.
    shank_style:
      name: Styl czanka
      description: Opisuje ogólny kształt/konfigurację czanek munsztuku (np. proste,
        zakrzywione lub opadające).
    shapewear_enhancement_feature:
      name: Funkcja wysmuklająca bielizny modelującej
      description: Podkreśla najważniejsze udoskonalenia funkcjonalne oferowane przez
        dany element garderoby (np. modelowanie brzucha, podnoszenie pośladków lub
        szczelna podszewka).
    sheath_type:
      name: Rodzaj pochwy
      description: Typ pochwy/futerału dołączonego do noża kolekcjonerskiego.
    sheet_music_clip_padding_material:
      name: Materiał wyściółki klipsa do nut
      description: Materiał ewentualnej wyściółki szczęk/chwytu stykającej się z papierem
        lub krawędzią statywu, aby zapobiegać rozdarciu i ślizganiu.
    sheet_music_clip_spring_tension_level:
      name: Poziom naprężenia sprężyny klipsa do nut
      description: Względna wytrzymałość sprężyny / siła zacisku klipsa.
    sheet_music_clip_use_environment:
      name: Środowisko użytkowania klipsa do nut
      description: Podstawowe miejsce, w którym klips sprawdzi się najlepiej.
    shell_construction:
      name: Konstrukcja korpusu
      description: Określa sposób budowy korpusu bębna basowego, co ma duży wpływ
        na brzmienie i wagę.
    shell_finish:
      name: Wykończenie korpusu
      description: Wykończenie zewnętrzne korpusu bębna doumbek.
    shell_hull_status:
      name: Stan skorupy/łupiny
      description: Określa, czy orzechy lub nasiona są sprzedawane z łupinami/osłonkami
        czy bez nich.
    shift_boot_attachment_method:
      name: Metoda mocowania mieszka drążka zmiany biegów
      description: Określa sposób mocowania mieszka drążka zmiany biegów do konsoli
        pojazdu / elementu wykończeniowego dźwigni zmiany biegów (np. za pomocą zatrzaskowej
        ramki, pierścienia mocującego lub kleju).
    shift_boot_installation_hardware_included:
      name: Osprzęt montażowy mieszka zmiany biegów w zestawie
      description: Wymienia elementy i osprzęt montażowy dołączone do mieszka drążka
        zmiany biegów.
    shift_knob_illumination:
      name: Podświetlenie gałki zmiany biegów
      description: Określa, czy gałka zmiany biegów ma podświetlenie, a także metodę/typ
        podświetlenia (np. fotoluminescencyjne, LED, światłowodowe lub z podświetlanym
        wzorem).
    shift_knob_installation_method:
      name: Sposób montażu gałki zmiany biegów
      description: Określa sposób mocowania gałki zmiany biegów do dźwigni zmiany
        biegów.
    shift_knob_shape:
      name: Kształt gałki zmiany biegów
      description: Opisuje ogólną ergonomię gałki zmiany biegów.
    shift_pattern_type:
      name: Typ wzoru zmiany biegów
      description: Określa styl oznaczenia biegów na gałce zmiany biegów (jeśli występuje).
    shifter_compatibility:
      name: Zgodność manetki
      description: Określa, czy przedłużenie kierownicy jest zgodne z manetkami elektronicznymi,
        mechanicznymi, obydwoma typami, czy też niekompatybilne z manetkami.
    shifter_mounting_interface:
      name: Technika montażu manetki
      description: Opisuje sposób mocowania manetki do roweru (np. mały zacisk, I-Spec,
        MatchMaker, koniec kierownicy, dolna rura ramy lub bezprzewodowo).
    shifting_actuation_type:
      name: Typ mechanizmu zmiany przerzutek
      description: Identyfikuje mechanizm zmiany przerzutek w grupie sprzętowej (mechaniczny,
        elektroniczny przewodowy, elektroniczny bezprzewodowy lub hydrauliczny).
    shifting_mechanism:
      name: Mechanizm zmiany przerzutek
      description: Określa, czy manetka działa mechanicznie czy elektronicznie, a
        także czy jest indeksowana czy typu friction.
    shim_purpose:
      name: Przeznaczenie podkładki regulacyjnej
      description: Określa typ funkcjonalny produktu (np. podkładka, klin lub przekładka),
        dzięki czemu rowerzyści mogą szybko znaleźć właściwe rozwiązanie do regulacji,
        bez potrzeby tworzenia oddzielnych podkategorii.
    shin_guard_attachment_method:
      name: Metoda mocowania ochraniacza na goleń
      description: Klasyfikuje ogólny format ochraniacza na golenie, w tym integrację
        z ochraniaczem z kostkę lub konstrukcję skarpety.
    shirt_cuff_style:
      name: Styl mankietu koszuli
      description: Określa konstrukcję mankietu rękawa, która ma wpływ na wygodę,
        formalny charakter i dopasowanie do spinek do mankietów.
    shochu_base_ingredient:
      name: Składnik bazowy shochu
      description: Określa podstawowe źródło skrobi lub cukru użyte do produkcji shochu.
    shochu_soju_variety:
      name: Odmiana shochu i soju
      description: Klasyfikuje produkt według stylu lub rodzaju produkcji.
    shock_absorber_bushing_material:
      name: Materiał tulei amortyzatora
      description: Materiał tulei montażowych/izolatorów dostarczanych z amortyzatorem
        lub wbudowanych w amortyzator.
    shock_absorber_charge_type:
      name: Typ wypełnienia amortyzatora
      description: Określa technologię wypełnienia / tłumienia ruchu amortyzatora
        (np. hydrauliczne/olejowe, gazowe lub powietrzne) i/lub powiązaną konstrukcję
        rury, jeśli ma to zastosowanie.
    shock_absorber_mount_type_lower:
      name: Typ mocowania amortyzatora (dolny)
      description: Styl dolnego mocowania amortyzatora, umożliwiający dopasowanie.
    shock_absorber_mount_type_upper:
      name: Typ mocowania amortyzatora (górny)
      description: Określa sposób górnego mocowania amortyzatora pojazdu silnikowego
        w celu zapewnienia dopasowania/zgodności.
    shock_absorber_position:
      name: Pozycja amortyzatora
      description: Określa, czy amortyzator jest przeznaczony do przedniego, tylnego,
        lewego lub prawego położenia w pojeździe, bardziej szczegółowo niż samo położenie
        osi.
    shock_absorption_system:
      name: Układ amortyzacji
      description: Definiuje mechanizm stosowany w celu ograniczenia wibracji i hałasu
        przy odbiciu.
    shoe_collar_height:
      name: Wysokość kołnierza cholewki
      description: Klasyfikuje buty według wysokości kołnierza/kroju (niski, średni
        lub wysoki), aby ustalić krycie i wsparcie kostki.
    shoe_cover_height:
      name: Wysokość ochraniacza na but
      description: Określa poziom ochrony pokrowców na buty rowerowe, odróżniając
        nakładki na palce od pełnych, wysokich pokrowców na buty rowerowe.
    shoe_sizing_system:
      name: System opisu rozmiaru butów
      description: Określa standard opisu rozmiarów (US, UK, EU, JP, Mondopoint itp.)
        stosowany dla podanego rozmiaru buta.
    shoelace_aglet_material:
      name: Materiał skuwki sznurowadeł
      description: Określa materiał, z którego są wykonane końcówki (skuwki) sznurowadeł,
        co wpływa na styl i trwałość.
    shooting_rest_design:
      name: Konstrukcja podpórki strzeleckiej
      description: Klasyfikuje styl konstrukcji podpory, np. podpora workowa, sanie,
        trójnóg, imadło do broni itp.
    shooting_stick_yoke_design:
      name: Konstrukcja widełek podpórki pod broń
      description: Określa styl kołyski lub widełek, które mają styczność z bronią
        lub optyką.
    shooting_target_style:
      name: Styl tarczy strzeleckiej
      description: Klasyfikuje styl lub konstrukcję tarcz strzeleckich do jazdy figurowej
        na lodzie i hokeja, dzięki czemu klienci mogą wybrać odpowiednią dla siebie
        formę treningu.
    shooting_target_type:
      name: Typ tarczy strzeleckiej
      description: Klasyfikuje tarcze strzeleckie według stylu konstrukcji, materiału
        lub projektu (np. gong, sylwetka, papierowy środek tarczy lub spinner), umożliwiając
        strzelcom szybkie zlokalizowanie właściwego celu dla ich dyscypliny i rodzaju
        broni palnej.
    short_block_assembly_balance_type:
      name: Typ wyważenia zespołu krótkiego bloku
      description: Określa, czy zespół obrotowy jest wyważony wewnętrznie czy zewnętrznie.
    short_block_intended_use:
      name: Przeznaczenie krótkiego bloku
      description: Podstawowe zastosowanie krótkiego bloku.
    short_block_rotating_assembly_included:
      name: W zestawie krótki blok obrotowy
      description: Określa, które główne elementy zespołu wirującego są dołączone
        do short blocku.
    shot_size:
      name: Wielkość śrutu
      description: Określa oznaczenie wielkości śrutu dla luźnych elementów śrutu
        lub amunicji.
    shotgun_action_type:
      name: Typ działania strzelby
      description: Określa mechanizm/działanie strzelby.
    shotgun_choke_type:
      name: Typ czoka strzelby
      description: Określa konfigurację czoka luf(y) strzelby.
    shotgun_gauge:
      name: Kaliber strzelby
      description: Określa kaliber strzelby (oraz średnicę 0,410 cala, jeśli ma to
        zastosowanie) w celu identyfikacji i filtrowania oferty przedmiotów kolekcjonerskich.
    shotgun_stock_material:
      name: Materiał kolby strzelby
      description: Określa podstawowy materiał kolby/czółenka.
    shuffleboard_speed_rating:
      name: Ocena prędkości do gry w shuffleboard
      description: Oznacza względną prędkość ślizgu, jaką proszek do gry w shuffleboard
        lub inny środek konserwujący zapewnia na stole, umożliwiając graczom wybór
        odpowiedniej prędkości do ich poziomu umiejętności i długości stołu.
    shuffleboard_table_length_compatibility:
      name: Zgodność długości stołu do gry w shuffleboard
      description: Standardowa długość stołu do gry w shuffleboard, do której pasuje
        produkt lub którą produkt ma uzupełniać.
    shuttlecock_base_material:
      name: Materiał podstawy lotki
      description: Określa materiał użyty na nosek/podstawę lotki do badmintona, który
        wpływa na trwałość, odczucie i odbicie.
    shuttlecock_feather_material:
      name: Materiał piór lotki
      description: Określa główne źródło piór lub typ konstrukcji zastosowany na brzegu
        lotki. Wpływa na cenę, spójność i trwałość.
    shuttlecock_grade:
      name: Klasa lotki
      description: Określa zamierzony poziom gry lub klasyfikację jakości, np. treningowa,
        klubowa, turniejowa.
    shuttlecock_speed_rating:
      name: Ocena prędkości lotki
      description: Określa prędkość lub klasę lotki podaną przez producenta, umożliwiając
        graczom wybór właściwej prędkości lotu do warunków, temperatury i wysokości.
    side_panel_installation_state:
      name: Stan instalacji panelu bocznego
      description: Określa, czy panel boczny jest dostarczony w stanie surowym, zagruntowanym,
        pomalowanym lub w inny sposób wykończony/przygotowany do instalacji.
    side_wall_mechanism:
      name: Mechanizm ścianki bocznej
      description: Opisuje sposób otwierania lub opuszczania ścianki bocznej gondoli
        w celu zapewnienia dostępu do dziecka.
    signal_source:
      name: Źródło sygnału
      description: Wskazuje, w jaki sposób licznik kilometrów odbiera/wyprowadza informacje
        o dystansie lub czasie.
    silk_fiber_type:
      name: Rodzaj włókna jedwabiu
      description: Rodzaj/źródło włókien jedwabnych użytych do produkcji tkaniny (np.
        morwa lub tussah), co wpływa na cenę, fakturę i jednorodność.
    simulated_game_species:
      name: Symulowane gatunki łowne
      description: Oznacza konkretnego ptaka lub konkretne zwierzę łowne, które replika
        odwzorowuje, co zapewnia realistyczny trening.
    singlet_cut_style:
      name: Krój koszulki zapaśniczej
      description: Określa krój/styl koszulki zapaśniczej, biorąc pod uwagę wysokość
        pasków, wykończenie tyłu oraz wersję dla danej płci lub konkretnego wieku.
    sink_material:
      name: Materiał zlewu
      description: Określa materiał wbudowanego zlewu (lub zlewów) dołączonego do
        szafki łazienkowej.
    sinker_attachment_style:
      name: Styl mocowania ciężarka
      description: Opisuje mechanizm dostępny w ciężarku bank sinker do mocowania
        go do żyłki lub zestawu.
    sinker_finish:
      name: Wykończenie ciężarka
      description: Określa powłokę zewnętrzną lub wariant powierzchni ciężarka.
    sinker_shape:
      name: Kształt ciężarka
      description: Definiuje formę geometryczną ciężarka (np. kula, walec lub łezka),
        dzięki czemu wędkarze mogą uzyskać optymalną prezentację i odporność na zaczepienie.
    siren_system_included:
      name: W zestawie system syreny
      description: Wskazuje, czy zamontowano system syreny/nagłaśniający i jego typ.
    siren_system_type:
      name: Typ systemu syreny
      description: Określa konfigurację systemu syreny/nagłaśniającego ciężarówki
        policyjnej.
    size_designation:
      name: Oznaczenie rozmiaru
      description: Standardowa etykieta rozmiaru dla trójkąta.
    size_system:
      name: System opisu rozmiaru
      description: Określa system opisu rozmiaru lub standard regionalny, któremu
        odpowiada etykieta rozmiaru (np. US, UK, EU lub litera).
    sizzle_mechanism:
      name: Mechanizm brzęczący
      description: Określa, w jaki sposób talerz perkusyjny generuje efekt dźwiękowy
        (np. nity zamontowane w talerzu, dołączony łańcuszek/sizzler lub brak dołączonego
        osprzętu).
    skate_blade_discipline:
      name: Dyscyplina łyżwiarska
      description: Określa dyscyplinę łyżwiarską lub zastosowanie, do którego jest
        przeznaczone dane ostrze, np. hokej lub łyżwiarstwo figurowe, umożliwiając
        klientowi filtrowanie według odpowiednich ostrzy.
    skate_brake_type:
      name: Typ hamulca łyżw
      description: Określa rodzaj mechanizmu zatrzymującego zastosowanego w łyżwach.
    skateboard_nut_thread_size:
      name: Rozmiar gwintu nakrętki do deskorolki
      description: Określa rozmiar gwintu (średnicę i skok) nakrętki, aby zapewnić
        zgodność z osiami, kingpinami lub osprzętem montażowym deskorolki.
    skein_winder_bearing_bushing_type:
      name: Typ łożyska/tulei nawijarki przędzy
      description: Określa typ łożyska lub tulei w obrotowym zespole nawijarki przędzy.
    skein_winder_drive_type:
      name: Typ napędu nawijarki przędzy
      description: Określa, w jaki sposób nawijarka przędzy jest napędzana/obracana
        podczas użytkowania.
    ski_binding_mechanism:
      name: Mechanizm wiązań narciarskich
      description: Określa podstawową konstrukcję mechaniczną lub przeznaczenie wiązań
        (np. alpejskie, z systemem tech/pin lub telemarkowe).
    ski_binding_part_type:
      name: Typ części wiązań narciarskich
      description: Określa konkretny element lub akcesorium wiązań narciarskich, umożliwiając
        szybkie filtrowanie wielu typów części.
    ski_boot_sole_standard:
      name: Standard podeszew butów narciarskich
      description: Określa normę czy też standard zgodności wiązań, zgodnie z którym
        certyfikowano buty narciarskie.
    skill_focus:
      name: Skupienie uwagi
      description: Określa podstawową umiejętność koszykarską, którą dany przyrząd
        treningowy ma rozwijać.
    skimboard_construction:
      name: Konstrukcja deski skimboardowej
      description: Opisuje podstawową budowę płyty, ze szczególnym uwzględnieniem
        rdzenia i techniki laminowania (np. rdzeń piankowy lub rdzeń drewniany).
    skin_presence:
      name: Obecność skórki
      description: Określa, czy kurczak jest sprzedawany ze skórą, bez skóry czy z
        częściowo usuniętą skórą.
    slapstick_handle_type:
      name: Typ uchwytu bata
      description: Opisuje styl uchwytu zintegrowanego z batem, mający wpływ na ergonomię
        i komfort gry.
    slapstick_playing_surface_material:
      name: Materiał powierzchni akustycznej bata
      description: Określa materiał uderzających o siebie elementów, które wskutek
        kontaktu wytwarzają dźwięk.
    sled_brake_type:
      name: Typ hamulca sanek
      description: Określa mechanizm hamulcowy sań, jeśli występuje.
    sled_towing_method:
      name: Metoda ciągnięcia sań
      description: Oznacza główny sposób ciągnięcia lub holowania sań.
    sleep_position_suitability:
      name: Odpowiednia pozycja do snu
      description: Wskazuje, do jakiej pozycji materac jest najbardziej odpowiedni,
        by zapewnić jak najlepsze podparcie w czasie snu.
    sleeping_bag_shape:
      name: Kształt śpiwora
      description: Ogólny krój śpiwora, który wpływa na masę, ciepło i przestronność.
    sleeping_pad_type:
      name: Typ karimaty
      description: Określa rodzaj konstrukcji karimaty (np. pianka o zamkniętych komórkach
        lub wypełnienie powietrzem), który wpływa bezpośrednio na masę, komfort i
        izolację.
    sleepwear_set_pieces_included:
      name: Dołączono elementy zestawu odzieży do spania
      description: Wskazuje poszczególne elementy wchodzące w skład wieloczęściowego
        zestawu odzieży do spania lub stroju domowego.
    sleeve_bearing_type:
      name: Typ łożyska ślizgowego
      description: Określa technologię umożliwiającą obrót tulei, co wpływa na jakość
        obrotu podczas podnoszenia ciężarów w dyscyplinach olimpijskich.
    sleeve_style:
      name: Styl rękawa
      description: Określa styl rękawa inny niż długość (np. raglan).
    slide_board_accessories_included:
      name: W zestawie akcesoria do deski ślizgowej
      description: Wskazuje dodatkowe elementy dołączone do deski ślizgowej, dzięki
        czemu klient dokładnie wie, co zawiera zestaw, i może porównać pakiety.
    slide_installation_type:
      name: Typ montażu zjeżdżalni
      description: Sposób montażu lub mocowania zjeżdżalni (wolnostojąca, przymocowana
        do zestawu itp.).
    slide_intended_finger:
      name: Docelowy palec slide’u
      description: Wskazuje, na którym palcu slide ma być noszony lub czy nie dotyczy,
        np. tone bar.
    slide_safety_features:
      name: Zabezpieczenia zjeżdżalni
      description: Elementy konstrukcji związane z bezpieczeństwem, które wykorzystano
        w zjeżdżalni.
    slide_type:
      name: Typ suwaka
      description: Określa typ suwaka mosiężnego instrumentu dętego, do czyszczenia
        którego produkt jest przeznaczony.
    slide_water_use_capability:
      name: Możliwość korzystania ze zjeżdżalni wodnej
      description: Wskazuje, czy ślizgawka jest przeznaczona do użycia z wodą, np.
        z podłączeniem węża, i w jaki sposób.
    slime_putty_kit_components_included:
      name: W zestawie znajdują się elementy zestawu ze śluzem i plasteliną
      description: Wskazuje narzędzia i dodatki dołączone do produktu ze śluzem i
        plasteliną (szczególnie dla zestawów/pakietów).
    sling_material:
      name: Materiał temblaka
      description: Określa włókno/materiał tekstylny użyty w pasie ekspresu (dog-bone).
    smith_machine_bar_path:
      name: Tor ruchu gryfu maszyny Smitha
      description: Opisuje stały tor ruchu gryfu, informując użytkowników o biomechanice
        i wymaganej przestrzeni.
    smoke_color:
      name: Kolor dymu
      description: Kolor dymu wytwarzanego przez flarę/sygnał dymny (inny niż kolor
        korpusu produktu).
    smoked_malt_smoking_material:
      name: Materiał wędzenia słodu wędzonego
      description: W przypadku słodów wędzonych identyfikuje materiał użyty w procesie
        wędzenia (np. konkretny gatunek drewna lub torf).
    snack_mix_variety:
      name: Odmiana przekąski
      description: Klasyfikuje produkt według stylu mieszanki, np. trail mix, mieszanka
        orzechów, namkeen, sev.
    snack_processing_method:
      name: Metoda przetwarzania przekąski
      description: Oznacza podstawową technikę przetwarzania lub konserwacji użytą
        do przygotowania przekąski (np. liofilizacja, pieczenie lub prażenie).
    snack_texture:
      name: Faktura przekąski
      description: Oznacza fizyczny smak lub konsystencję paluszków sezamowych.
    snap_installation_method:
      name: Metoda montażu na zatrzask
      description: Określa, w jaki sposób zatrzask jest mocowany do materiału.
    snare_drum_bearing_edge_profile:
      name: Profil krawędzi nośnej werbla
      description: Profil krawędzi nośnej korpusu werbla.
    snare_drum_finish_type:
      name: Typ wykończenia werbla
      description: Wysokiej jakości typ wykończenia/konstrukcji korpusu werbla.
    snare_drum_hoop_type:
      name: Typ obręczy werbla
      description: Typ obręczy używanych w werblu.
    snare_drum_mounting_type:
      name: Typ mocowania werbla
      description: Sposób montażu i użytkowania werbla.
    snare_drum_shell_material:
      name: Materiał korpusu werbla
      description: Określa metal/stop użyty do wykonania korpusu (głównej części)
        werbla, co ma duży wpływ na masę, brzmienie i trwałość.
    snare_drum_strainer_mechanism:
      name: Mechanizm naciągu werbla
      description: Typ mechanizmu naciągania/odciągania używanego do zaczepiania/zwalniania
        sprężyn werbla.
    snare_drum_strainer_type:
      name: Typ naciągu werbla
      description: Typ mechanizmu naciągania/odciągania używanego do zaczepiania/zwalniania
        sprężyn werbla.
    snare_hoop_type:
      name: Typ obręczy werbla
      description: Typ obręczy/krawędzi werbla.
    snare_throw_off_type:
      name: Typ odciągu werbla
      description: Typ mechanizmu naciągania/odciągania używanego do zaczepiania/zwalniania
        sprężyn werbla.
    snip_cutter_spring_mechanism:
      name: Mechanizm sprężynowy przecinarki
      description: Wskazuje, czy przecinarka wykorzystuje mechanizm sprężynowy/powrotny
        i jaki jest jego typ.
    snorkel_mount_position:
      name: Pozycja mocowania rurki do nurkowania
      description: Opisuje położenie rurki na głowie użytkownika podczas jej używania.
    snorkel_top_type:
      name: Typ górnej części rurki do nurkowania
      description: Opisuje rodzaj zabezpieczenia przed wnikaniem wody, znajdującego
        się w górnej części rurki dołączonej do zestawu.
    snow_condition_suitability:
      name: Odpowiednie warunki śniegowe
      description: Opisuje podstawowe warunki śniegowe, do których jest przeznaczony
        dany wosk.
    snow_sports_helmet_safety_certification:
      name: Certyfikacja bezpieczeństwa kasku do sportów zimowych
      description: Określa normy bezpieczeństwa, jakie spełnia kask podczas jazdy
        na nartach i snowboardzie.
    snowboard_base_material:
      name: Materiał ślizgu deski snowboardowej
      description: Określa skład lub wykończenie ślizgu (wytłaczany, spiekany lub
        zastrzeżony), co wpływa na prędkość, trwałość i konserwację.
    snowboard_width_class:
      name: Klasa szerokości deski snowboardowej
      description: Klasyfikuje całkowitą szerokość deski w stosunku do rozmiaru buta
        (np. Regular lub Wide).
    soccer_ball_compartment_type:
      name: Typ przegrody na piłkę do piłki nożnej
      description: Określa, w jaki sposób (i czy w ogóle) plecak mieści piłkę do piłki
        nożnej.
    soccer_ball_type:
      name: Typ piłki do piłki nożnej
      description: Określa przeznaczenie lub styl piłki do piłki nożnej (np. meczowa,
        treningowa lub futsalu), dzięki czemu klient może szybko znaleźć odpowiedni
        wariant, bez potrzeby przechodzenia przez wiele podkategorii.
    soccer_dummy_base_type:
      name: Typ podstawy manekina piłkarskiego
      description: Opisuje rodzaj podstawy lub mechanizmu kotwiącego wykorzystanego
        w manekinie.
    soccer_dummy_design:
      name: Konstrukcja manekina piłkarskiego
      description: Określa styl konstrukcji manekina do bramki piłkarskiej, np. sztywna
        lub nadmuchiwana.
    soccer_goal_target_style:
      name: Styl siatki celowniczej do bramki piłkarskiej
      description: Określa fizyczną wielkość lub konstrukcję siatki celowniczej, dzięki
        czemu klient może wybrać styl najlepiej odpowiadający swoim treningom.
    soccer_goal_type:
      name: Typ bramki do piłki nożnej
      description: Wskazuje rodzaj konstrukcji lub przeznaczenie bramki (np. rozkładana,
        odbijak, uliczna itp.).
    sock_cushioning:
      name: Amortyzacja skarpety
      description: Określa stopień i rodzaj amortyzacji pod stopą lub wypełnienia
        skarpety.
    sock_cushioning_level:
      name: Poziom amortyzacji skarpety
      description: Określa stopień amortyzacji podeszwy skarpety.
    sock_grip_type:
      name: Typ powierzchni antypoślizgowej skarpety
      description: Opisuje wszelkie właściwości przyczepne i antypoślizgowe spodu
        skarpety.
    sock_toe_style:
      name: Styl części przedniej skarpety
      description: Opisuje konstrukcję części przedniej skarpety.
    soft_bait_style:
      name: Styl miękkiej przynęty
      description: Klasyfikuje budowę lub profil korpusu przynęty z miękkiego plastiku
        (np. robak, swimbait lub larwa).
    soft_top_attachment_type:
      name: Typ mocowania miękkiego dachu
      description: Określa sposób mocowania miękkiego dachu do pojazdu (kanały, zatrzaski,
        rzepy itp.).
    soft_top_includes_frame_hardware:
      name: Miękki dach zawiera ramę/osprzęt
      description: Określa, czy produkt zawiera ramę/pałąki i/lub osprzęt montażowy
        do miękkiego dachu.
    soft_top_installation_type:
      name: Typ montażu miękkiego dachu
      description: Określa sposób montażu/mocowania miękkiego dachu w pojeździe, wskazując
        oczekiwaną metodę montażu i wymagany nakład pracy.
    soft_top_window_configuration:
      name: Konfiguracja okien miękkiego dachu
      description: Wskazuje, ile okien znajduje się w miękkim dachu i w jakich pozycjach
        się one znajdują.
    softball_certification:
      name: Certyfikacja piłki do softballu
      description: Wskazuje pieczątki organu zarządzającego lub zatwierdzeń wydrukowanych
        na piłce, które decydują o dopuszczeniu do danej ligi lub danego turnieju.
    softness_level:
      name: Poziom miękkości
      description: Wskazuje miękkość/profil strony z pętlą, co ma znaczenie dla objętości
        i komfortu w kontakcie ze skórą.
    solar_system_model_included_bodies:
      name: Ciała niebieskie dołączone do modelu układu słonecznego
      description: Wskazuje, jakie ciała niebieskie są reprezentowane w zestawie.
    solar_system_model_scaling:
      name: Skala modelu Układu Słonecznego
      description: Określa, czy model Układu Słonecznego jest zgodny ze skalą pod
        względem wielkości planet, odległości/orbit, obu tych parametrów, czy też
        stanowi reprezentację schematyczną/niezgodną ze skalą.
    sold_secure_certification_level:
      name: Poziom certyfikacji Sold Secure
      description: Określa ocenę Sold Secure przyznaną zamkowi przez niezależną brytyjską
        instytucję testującą (brązowy, srebrny, złoty lub diamentowy).
    sold_secure_rating:
      name: Ocena Sold Secure
      description: Oznacza poziom certyfikacji Sold Secure przypisany do zamka.
    sole_construction:
      name: Konstrukcja podeszwy
      description: Określa, jak wykonana jest podeszwa buta (pełna, dzielona, dwuczęściowa
        itp.), co bezpośrednio wpływa na elastyczność, kontakt z podłożem i przydatność
        do określonych technik tańca.
    sole_type:
      name: Typ podeszwy
      description: Opisuje rodzaj konstrukcji podeszwy, wskazując jej elastyczność
        i przeznaczenie.
    soprano_saxophone_body_style:
      name: Rodzaj korpusu saksofonu sopranowego
      description: Opisuje fizyczną budowę pudła rezonansowego saksofonu sopranowego.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Typ przegrody ustnika saksofonu sopranowego
      description: Opisuje konstrukcję przegrody/daszku ustnika (kontur za końcówką),
        mającą wpływ na światło, projekcję i reakcję.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Rozmiar komory ustnika saksofonu sopranowego
      description: Opisuje rozmiar wewnętrznej komory ustnika saksofonu sopranowego,
        który wpływa na opór i barwę dźwięku.
    soprano_saxophone_mouthpiece_finish:
      name: Wykończenie ustnika saksofonu sopranowego
      description: Wykończenie powierzchni/powłoka nakładana na ustnik (jeśli ma zastosowanie).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Akcesoria dołączone do ustnika do saksofonu sopranowego
      description: Określa, jakie akcesoria są dołączone do ustnika.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Charakter brzmienia ustnika saksofonu sopranowego
      description: Ogólny profil brzmieniowy powszechnie kojarzony z konstrukcją ustnika.
    sound_character:
      name: Charakter dźwiękowy
      description: Opisuje ogólną barwę dźwięku wytwarzanego przez bat.
    sound_expansion_method:
      name: Metoda zwiększenia liczebności dźwięków
      description: Określa w jaki sposób można dodawać lub rozwijać wewnętrzną bibliotekę
        dźwięków modułu poza dźwiękami fabrycznymi (np. paczki z zawartością, importowanie
        próbek lub karty rozszerzeń).
    sound_module_sound_library_focus:
      name: Koncentracja na bibliotece dźwięków modułu brzmieniowego
      description: Główny nacisk położony jest na fabryczny zestaw dźwięków, aby pomóc
        klientowi znaleźć właściwy moduł dźwiękowy do swojego stylu/zastosowania.
    sound_port_type:
      name: Typ portu audio
      description: Opisuje budowę portu/otworu rezonansowego z tyłu cajonu, która
        wpływa projekcję i niskie tony.
    sound_sensitivity_control:
      name: Kontrola czułości na dźwięk
      description: Wskazuje, czy i w jaki sposób można regulować czułość na dźwięk.
    sound_synthesizer_patch_memory:
      name: Pamięć ustawień syntezatora dźwięku
      description: Określa, czy syntezator może przechowywać i przywracać ustawienia
        wstępne.
    sound_type:
      name: Rodzaj dźwięku
      description: Podstawowe typy dźwięków lub sygnały audio wydawane przez matę
        (np. instrumenty, piosenki lub komunikaty głosowe), służące do kierowania
        grą.
    soundboard_material:
      name: Materiał płyty rezonansowej
      description: Materiał użyty do wykonania (górnej) płyty rezonansowej harfy,
        odpowiadający za drgania i dźwięk.
    soup_or_broth_variety:
      name: Odmiana zupy lub bulionu
      description: Określa styl, przepis lub sposób przygotowania zupy lub bulionu,
        dzięki czemu klient może szybko znaleźć preferowany przez siebie rodzaj.
    sour_cream_variety:
      name: Odmiana śmietany
      description: Klasyfikuje produkty śmietanowe według ich konkretnej odmiany lub
        rodzaju kultur, np. crème fraîche lub meksykańska crema.
    soy_sauce_variety:
      name: Odmiana sosu sojowego
      description: Identyfikuje konkretny styl lub recepturę sosu sojowego (np. jasny,
        ciemny, tamari lub ponzu), umożliwiając klientowi szybkie filtrowanie według
        profilu smakowego i zastosowania kulinarnego.
    spark_plug_electrode_material:
      name: Materiał elektrody świecy zapłonowej
      description: Materiał/technologia końcówek elektrod zapłonowych (środkowa i/lub
        uziemiająca), np. miedź, platyna lub iryd.
    spark_plug_seat_type:
      name: Typ gniazda świecy zapłonowej
      description: Styl uszczelnienia/gniazda świecy zapłonowej na styku głowicy cylindra.
    spark_plug_terminal_type:
      name: Typ końcówki świecy zapłonowej
      description: Typ górnego zacisku używanego do podłączania przewodów zapłonowych/rozrusznika.
    sparkler_shape:
      name: Kształt zimnych ogni
      description: Ogólny kształt lub ogólna wielkość zimnych ogni.
    speaker_cone_material:
      name: Materiał membrany głośnika
      description: Podstawowy materiał membrany głośnika (membrana niskotonowa/średniotonowa).
    speaker_size:
      name: Rozmiar głośnika
      description: Nominalny rozmiar przetwornika / rozmiar dopasowania głośnika składowego
        (np. 6,5 cala, 6x9 cali), stosowany w celu dopasowania umiejscowienia fabrycznego
        i adapterów głośnikowych.
    special_effects_output_interface:
      name: Interfejs wyjściowy efektów specjalnych
      description: Określa złącze/interfejs wyjściowy używany do sterowania urządzeniem
        do efektów specjalnych.
    special_effects_stand_stability_features:
      name: Funkcje stabilizujące stojaka urządzenia do efektów specjalnych
      description: Określa wbudowane funkcje stabilizujące i zabezpieczające, mające
        zapobiegać przewróceniu lub poślizgnięciu podczas wydarzeń.
    specialty_malt_name_type:
      name: Nazwa/typ słodu specjalnego
      description: Określa konkretny rodzaj słodu specjalnego (często stosowany jako
        nazwa handlowa).
    specimen_presentation:
      name: Sposób prezentacji próbki
      description: Oznacza sposób przygotowania lub prezentacji okazu kolekcjonerskiego
        (np. surowy/nieprzygotowany, polerowany, cięty lub oprawiony).
    speed_bag_accessories_included:
      name: W zestawie akcesoria do worka bokserskiego
      description: Wskazuje dodatkowe elementy dołączone do worka bokserskiego, takie
        jak rękawice, pompki, obrotniki, łańcuchy lub stojaki.
    speed_rating:
      name: Klasa prędkości
      description: Określa prędkość powierzchni do gry zapewnianą przez sukno bilardowe
        (np. wolna, średnia lub szybka).
    speedometer_backlight_type:
      name: Typ podświetlenia prędkościomierza
      description: Określa, czy i w jaki sposób prędkościomierz jest podświetlany
        w celu zapewnienia widoczności w nocy.
    speedometer_display_type:
      name: Typ wyświetlacza prędkościomierza
      description: 'Określa sposób odczytu prędkości na prędkościomierzu: analogowa
        wskazówka/tarcza, cyfrowy odczyt numeryczny lub połączenie elementów analogowych
        i cyfrowych.'
    speedometer_unit_of_measure:
      name: Jednostka miary prędkościomierza
      description: Określa jednostki prędkości wyświetlane na tarczy/wyświetlaczu.
    spike_replaceability:
      name: Możliwość wymiany kolców
      description: Informuje, czy kolce w bucie są wymienne, stałe, czy też but nie
        ma kolców.
    spike_shape:
      name: Kształt kolców
      description: Określa wzór geometryczny końcówki kolca, który wpływa przyczepność
        i przydatność do różnych powierzchni.
    spike_thread_size:
      name: Rozmiar gwintu kolca
      description: Określa rozmiar lub standard podstawy gwintowanej wkręcanej do
        buta (np. 1/4-20).
    spin_classification:
      name: Klasyfikacja ruchu obrotowego
      description: Oznacza profil rotacji, pod kątem którego zaprojektowano dysk (niski,
        średni, wysoki lub hiperspin).
    spin_profile:
      name: Profil ruchu obrotowego
      description: Określa względne właściwości rotacji, jakie obsługuje wałek.
    spin_types_supported:
      name: Obsługiwane typy rotacji
      description: Wskazuje rodzaje rotacji, jakie maszyna może nadawać piłkom, dzięki
        czemu gracze mogą ćwiczyć różne style uderzeń.
    spinach_preparation_style:
      name: Styl przygotowania szpinaku
      description: Opisuje fizyczną obróbkę liści szpinaku lub format produktu (np.
        całe liście, siekane lub kostki).
    spinach_variety:
      name: Odmiana szpinaku
      description: Określa odmianę botaniczną lub rynkową szpinaku (np. baby, włoski,
        wodny lub czerwony), umożliwiając klientowi wybór dokładnie takiego rodzaju,
        jakiego potrzebuje.
    spindle_bearing_surface_material:
      name: Materiał powierzchni łożyska wrzeciona
      description: Materiał powierzchni nośnej/punktowej stosowany we wrzecionach
        z podstawą (wierzchołek/dno), mający wpływ na gładkość i zużycie.
    spindle_bearing_type:
      name: Typ łożyska wrzeciona
      description: Rodzaj interfejsu końcówki wrzeciona/łożyska, który zmniejsza tarcie
        o powierzchnię podstawy misy/skorupy.
    spindle_finish:
      name: Wykończenie wrzeciona
      description: Wykończenie powierzchni/powłoka wrzeciona mająca wpływ na wyczucie,
        trwałość i estetykę.
    spindle_hook_type:
      name: Typ haka wrzeciona
      description: Mechanizm chwytający przędzę, znajdujący się na górze wrzeciona,
        służący do zabezpieczenia prowadnicy/przędzy.
    spindle_support_method:
      name: Metoda podparcia wrzeciona
      description: W jaki sposób wrzeciono powinno być podparte podczas rotacji.
    spindle_tip_style:
      name: Styl końcówki wrzeciona
      description: Kształt/konstrukcja punktu w misie/skorupie (powierzchnia nośna),
        wpływająca na tarcie i płynność rotacji.
    spindle_whorl_position:
      name: Położenie przęślika wrzeciona
      description: Miejsce, w którym zwój sprali znajduje się na wale wrzeciona.
    spinner_blade_shape:
      name: Kształt ostrza spinnera
      description: Określa podstawowy kształt ostrza spinnera, który wpływa na drgania,
        błysk i głębokość łowienia.
    spinner_control_card_design_type:
      name: Typ/konstrukcja karty do kołowrotków
      description: Opisuje rodzaj karty do kołowrotków pod względem sposobu prezentacji
        informacji sterujących (np. współczynnik odniesienia, napięcie lub tabela
        konwersji).
    spinner_subtype:
      name: Podtyp błystki
      description: Klasyfikuje ogólną konstrukcję lub gamę spinnerów (np. błystka
        obrotowa lub spinnerbait).
    spinning_oil_application_area:
      name: Obszar zastosowania oleju do kołowrotków
      description: Określa docelowy punkt (lub punkty) nakładania oleju na obracającym
        się kole.
    spinning_oil_application_tool:
      name: Narzędzie do aplikacji oleju przędzalniczego
      description: Wskazuje rodzaj końcówki aplikatora/opakowania służącej do nakładania
        oleju na części obracającego się koła w celu kontrolowanego dawkowania.
    spinning_oil_features:
      name: Cechy oleju do kołowrotków
      description: Podkreśla właściwości funkcjonalne olejów do kołowrotków (pozostałości,
        plamy, utlenianie i zmywalność).
    spinning_top_features:
      name: Cechy bączka
      description: Specjalne sposoby zabawy oferowane przez bączek poza klasycznym
        obracaniem się.
    spinning_top_launch_mechanism:
      name: Mechanizm wprawiania bączka w ruch
      description: Określa, jak bączek jest napędzany lub wprawiany w ruch.
    spinning_wheel_brake_tension_system_type:
      name: Typ układu hamulcowego/napinającego kołowrotka
      description: Określa układ naprężenia/hamowania stosowany do kontrolowania pobierania
        przędzy.
    spinning_wheel_drive_system:
      name: System napędu kołowrotka przędzalniczego
      description: Oznacza układ napędowy, do którego jest przeznaczona szpulka.
    spinning_wheel_hook_system:
      name: Układ haków do kołowrotka
      description: Określa sposób prowadzenia przędzy wzdłuż ramion przędzarki.
    spinning_wheel_part_application:
      name: Zastosowanie części kołowrotka
      description: Określa, do których części kołowrotka jest przeznaczony olej.
    spinning_wheel_portability_foldability:
      name: Możliwość przenoszenia/składania kołowrotka
      description: Określa czy kołowrotek jest przystosowany do składania na czas
        transportu.
    spinning_wheel_tension_adjustment_type:
      name: Rodzaj regulacji naciągu kołowrotka
      description: W jaki sposób reguluje się naciąg kołowrotka w celu kontroli pobierania.
    splice_termination_type:
      name: Typ złącza/zakończenia
      description: Określa zakończenie przewidziane na linie kotwicznej (np. oczko,
        nasadka lub hak łańcuchowy).
    split_shot_cut_type:
      name: Rodzaj kształtu ciężarka ołowianego
      description: Określa rodzaj rowka lub otworu umożliwiający przymocowanie do
        linki.
    split_shot_shape:
      name: Kształt śruciny split shot
      description: Opisuje fizyczną formę ciężarka ołowianego, mającą wpływ na hydrodynamikę
        i odporność na zaczepienie.
    split_shot_size:
      name: Wielkość ciężarka ołowianego
      description: Standaryzowany alfanumeryczny kod rozmiaru (np. SSG, AAA, BB, 1)
        używany przez producentów i wędkarzy do klasyfikacji ciężarków ołowianych.
        Uzupełnia dokładne pomiary masy.
    spoiler_adjustability:
      name: Możliwość regulacji spoilera
      description: Określa, czy można regulować kąt/wysokość spoilera.
    spoke_accessory_function:
      name: Funkcja akcesorium do szprych
      description: Klasyfikuje podstawowe funkcje akcesorium do kół, takie jak zdobienie,
        odblask lub podświetlenie.
    spoke_butting_profile:
      name: Profil cieniowania szprych
      description: Opisuje, w jaki sposób średnica szprychy zmienia się na jej długości
        (jednolita, pojedynczo, podwójnie, potrójnie lub poczwórnie cieniowana), co
        wpływa na jej masę i wytrzymałość.
    spoke_gauge:
      name: Przymiar do szprych
      description: Wskazuje szprychy (na podstawie oceny grubości drutu), z którymi
        nypel jest kompatybilny.
    spoke_interface_type:
      name: Typ interfejsu szprychy
      description: Oznacza typ główki szprychy, do którego jest przeznaczona piasta
        (J-bend, Straight-pull lub T-head).
    spoke_shape:
      name: Kształt szprych
      description: Określa zewnętrzny przekrój drutu szprychy, który wpływa na estetykę
        i aerodynamikę.
    spool_form_factor:
      name: Forma szpuli
      description: Fizyczny styl korpusu szpuli i sposób utrzymania nici/przędzy (np.
        kołnierzowy lub stożkowy).
    spoon_style:
      name: Styl błystki
      description: Wskazuje funkcjonalny podtyp lub styl błystki, np. castingowa,
        trollingowa lub typu flutter.
    sports_bra_padding_type:
      name: Typ wypełnienia biustonosza sportowego
      description: Określa rodzaj wypełnienia biustonosza sportowego.
    sports_cap_style:
      name: Styl czapki sportowej
      description: Określa ogólną konstrukcję/styl czapki (np. czapka z daszkiem lub
        snapback), niezależnie od elementów wizualnych drużyny.
    sports_governing_body_certification:
      name: Certyfikacja organów zarządzających sportem
      description: Wskazuje oficjalne certyfikaty lub zatwierdzenia uznanych organizacji
        zarządzających sportem, które potwierdzają, że produkt spełnia standardy zawodów.
    sports_surface_compatibility:
      name: Kompatybilność z nawierzchniami sportowymi
      description: Wskazuje rodzaje zabaw i powierzchni, z którymi można bezpiecznie
        używać farby.
    sports_toy_set_contents:
      name: Zawartość zestawu zabawek sportowych
      description: Określa, jakie elementy wchodzą w skład zestawu zabawek sportowych
        (np. piłka, kij, siatka lub tarcze).
    spray_string_cleanup_method:
      name: Metoda usuwanie serpentyny w sprayu
      description: Zalecany sposób usuwania/czyszczenia pozostałości po serpentynie
        w sprayu.
    spray_string_finish_effect:
      name: Wykończenie/efekt serpentyny w sprayu
      description: Efekt wizualny serpentyny w sprayu po wypuszczeniu (połysk/odblaskowość
        i efekty specjalne).
    spray_string_formulation_type:
      name: Rodzaj składu serpentyny w sprayu
      description: Jak produkt zachowuje się w trakcie wypuszczania i po wypuszczeniu
        (np. czy jest zmywalny, czy też ma charakter trwały).
    spray_string_recommended_surface:
      name: Zalecana powierzchnia dla serpentyny w sprayu
      description: Rodzaje powierzchni, do których jest przeznaczona serpentyna w
        sprayu (i z których prawdopodobnie można ją usunąć).
    spray_string_scent:
      name: Zapach serpentyny w sprayu
      description: Zapach lub profil zapachu serpentyny w sprayu, jeśli występuje.
    spray_string_suitable_age_group:
      name: Odpowiednia grupowa wiekowa serpentyny w sprayu
      description: Zalecany minimalny wiek użytkownika / grupa wiekowa dla bezpiecznego
        użytkowania.
    spread_consistency:
      name: Konsystencja pasty
      description: Opisuje fakturę/konsystencję sosu lub pasty, aby określić oczekiwania
        co do konsystencji i sposobu użycia (np. gładka, grudkowata lub ubita).
    spread_variety:
      name: Odmiana pasty
      description: Klasyfikuje konkretne rodzaje past owocowych (np. dżem, galaretka,
        marmolada lub twaróg), dzięki czemu klient może odróżnić różne sposoby ich
        przygotowywania i konsystencje.
    spreader_bar_type:
      name: Typ spreader baru
      description: Wskazuje typ drążka rozporowego lub systemu haków dołączonych do
        uprzęży lub zgodnych z uprzężą.
    sprint_canoe_class:
      name: Klasa krótkodystansowej kanadyjki wyścigowej
      description: Określa oficjalną klasę wyścigową krótkodystansowej kanadyjki wyścigowej.
    sprout_presentation:
      name: Wygląd kiełków
      description: Określa fizyczny wygląd produktu (np. świeże kiełki, mikrolistki,
        w doniczce lub w proszku).
    squash_and_gourd_variety:
      name: Odmiana dyni i tykwy
      description: Wskazuje konkretne kultywar lub odmianę dyni lub tykwy, pomagając
        klientowi szybko znaleźć szukany gatunek.
    stability_class:
      name: Klasa stabilności
      description: Ogólna kategoria stabilności oparta na ocenach lotu lub oświadczeniach
        marketingowych.
    stabilizer_thread_size:
      name: Rozmiar gwintu stabilizatora
      description: Specyfikacja gwintu służącego do przymocowania stabilizatora lub
        akcesorium łuku lub kuszy.
    stabilizer_type:
      name: Typ stabilizatora
      description: Określa styl lub klasyfikację pozycyjną stabilizatora łuku lub
        kuszy.
    stages_supported:
      name: Obsługiwane odcinki
      description: Wskazuje, ile odcinków ma mieć rakieta lub zestaw, który ma latać.
    stain_remover_format:
      name: Format odplamiacza
      description: Określa dostawę/format produktu używanego do usuwania plam z pojazdów
        (spryskiwacz, aerozol, piana, żel, proszek, chusteczki, długopis lub marker).
    stake_shape:
      name: Kształt śledzia
      description: Określa przekrój lub styl konstrukcji śledzia namiotu, co ma wpływ
        na siłę trzymania w różnych rodzajach podłoża.
    stamp_block_features:
      name: Funkcje bloczku do stempli
      description: Podkreśla cechy funkcjonalne bloczku do stempli, takie jak siatka
        do pomiarów, uchwyty lub powierzchnie antypoślizgowe.
    stamp_block_type:
      name: Typ bloczku do stempli
      description: Określa konstrukcję/styl bloczku do stempli używanego do mocowania
        stempli (np. przezroczysty bloczek akrylowy, bloczek na drewnie lub bloczek
        pozycjonujący).
    stamp_set_pieces_included:
      name: Elementy dołączone do zestawu stempli
      description: Określa, jakie elementy wchodzą w skład zestawu stempla i poduszki
        do stempli (np. stemple, poduszki z tuszem i markery).
    stand_padding_material:
      name: Materiał wyściółki stojaka
      description: Materiał stosowany w punktach styku w celu ochrony wykończenia
        instrumentu (np. pianka, guma lub silikon).
    staple_fiber_animal_fiber_type:
      name: Typ zwierzęcego włókna odcinkowego
      description: Konkretny typ włókna pochodzenia zwierzęcego, gdy źródło włókna
        ciętego jest zwierzęce.
    staple_fiber_crimp_level:
      name: Poziom zagniecenia włókna odcinkowego
      description: Stopień naturalnego zagniecenia/pofalowania włókna.
    staple_fiber_preparation_type:
      name: Typ przygotowania włókna odcinkowego
      description: Stan przygotowania/przetworzenia włókna w momencie sprzedaży (sposób
        ułożenia/obsługi), który ma duży wpływ na metodę przędzenia, łatwość ciągnięcia
        i efekt końcowy.
    staple_fiber_source_type:
      name: Rodzaj źródła włókna odcinkowego
      description: Ogólna kategoria pochodzenia włókna.
    starch_processing_type:
      name: Typ przetwarzania skrobi
      description: Określa, czy skrobia jest naturalna, czy też została zmodyfikowana
        fizycznie lub chemicznie (np. instant, wstępnie żelowana) w celu uzyskania
        określonych właściwości funkcjonalnych, takich jak szybkość zagęszczania lub
        tolerancja na temperaturę.
    starch_source:
      name: Źródło skrobi
      description: Określa źródło botaniczne, z którego pochodzi skrobia kuchenna
        lub zagęszczacz (np. kukurydza, ziemniaki lub tapioka). Źródło jest podstawowym
        czynnikiem różnicującym skrobie przy gotowaniu i ma bezpośredni wpływ na przydatność
        przepisu, kwestię alergenów i zachowania konsumentów w zakresie wyszukiwania.
    starfruit_variety:
      name: Odmiana karamboli
      description: Określa konkretny kultywar lub odmianę karamboli (np. Arkin lub
        Fwang Tung).
    starter_drive_type:
      name: Typ napędu rozrusznika
      description: Typ mechanizmu napędowego/rozrusznika służącego do zasprzęglania
        zębatki z kołem koronowym.
    starter_pistol_action_type:
      name: Typ działania pistoletu startowego
      description: Identyfikuje mechanizm wystrzeliwania/działania pistoletu startowego
        (np. jednostrzałowy, dwustrzałowy lub półautomatyczny).
    starter_pistol_caliber:
      name: Kaliber pistoletu startowego
      description: Określa kaliber ślepej amunicji lub naboju, do którego przystosowany
        jest pistolet startowy.
    starter_terminal_type:
      name: Typ zacisku rozrusznika
      description: Określa styl końcówki/złącza używanego do podłączenia elektrycznego
        rozrusznika lub elektromagnesu rozrusznika (np. złącze kołkowe, widełkowe
        lub wtykowe).
    starting_block_anchoring_method:
      name: Metoda kotwiczenia bloku startowego
      description: Opisuje sposób mocowania bloków do powierzchni toru (np. za pomocą
        kolców, przyssawek lub podkładek gumowych).
    steerer_tube_design:
      name: Konstrukcja rury sterowej
      description: Opisuje konstrukcję rury sterowej (prosta, stożkowa, gwintowana
        itp.), która decyduje o kompatybilności łożyska sterowego i ramy.
    steering_cable_end_fitting_type:
      name: Typ końcówki linki sterowniczej
      description: Określa styl zakończenia/mocowania na końcach linki sterowniczej
        do jednostki pływającej (od strony steru i od strony silnika/rumpla), aby
        zapewnić zgodność z punktami mocowania steru i silnika. W stosownych przypadkach
        należy użyć oznaczenia normy lub producenta.
    steering_column_adjustability_features:
      name: Funkcje regulacji kolumny kierownicy
      description: Oznacza, że funkcje regulacji są wbudowane w kolumnę kierownicy.
    steering_column_ignition_provision:
      name: Uwzględnienie zapłonu w kolumnie kierownicy
      description: Określa, czy kolumna kierownicza jest przystosowana do zamontowania
        cylindra/przełącznika blokady zapłonu i/lub blokady kierownicy.
    steering_column_shaft_end_interface_type:
      name: Typ gniazda końcowego wału kolumny kierownicy
      description: Określa rodzaj gniazda końcowego wału kolumny kierownicy (np. wielowypustowe,
        podwójne typu D lub klinowe).
    steering_column_shift_type:
      name: Typ mechanizmu zmiany biegów w kolumnie kierownicy
      description: Określa, czy kolumna kierownicy uwzględnia mechanizm zmiany biegów
        montowany na kolumnie, a także typ przekładni.
    steering_component_drive_type:
      name: Typ napędu elementu sterującego
      description: Określa mechanizm napędowy/wspomagający odnoszący się do podzespołów
        układu kierowniczego (w szczególności układów pomp i EPS).
    steering_position:
      name: Pozycja kierownicy
      description: Określa, czy furgonetka ma kierownicę po lewej, czy po prawej stronie.
    steering_pump_pulley_type:
      name: Typ koła pasowego pompy układu kierowniczego
      description: Określa typ napędu/gniazda koła pasowego używanego z pompą układu
        kierowniczego.
    steering_rack_finish_coating:
      name: Wykończenie/powłoka przekładni kierowniczej
      description: Określa zewnętrzne wykończenie lub zewnętrzną powłokę zabezpieczające
        przed korozją.
    steering_rack_position:
      name: Położenie przekładni kierowniczej
      description: Określa miejsce montażu/użytkowania przekładni w układzie kierowniczym
        pojazdu.
    steering_wheel_cover_installation_type:
      name: Typ mocowania pokrowca na kierownicę
      description: Określa sposób montażu lub mocowania pokrowca na kierownicy.
    steering_wheel_grip_material:
      name: Materiał uchwytu kierownicy
      description: Określa materiał uchwytu kierownicy (miejsce styczności z dłońmi),
        który może różnić się od materiału rdzenia/szprych koła.
    steering_wheel_mounting_pattern:
      name: Wzorzec montażu kierownicy
      description: Określa wzorzec śrub lub otworów do mocowania kierownicy do piasty
        lub adaptera (np. 3 śruby lub 5 śrub).
    steering_wheel_rim_material_grip_surface:
      name: Materiał obręczy kierownicy (powierzchnia chwytna)
      description: Określa główny materiał pokrycia chwytu/obręczy (inny od ogólnego
        materiału konstrukcyjnego).
    stem_material:
      name: Materiał cybucha
      description: Określa materiał, z którego jest wykonany cybuch lub ustnik fajki
        (np. akryl, ebonit lub szkło akrylowe).
    stencil_machine_consumable_type:
      name: Typ materiału eksploatacyjnego maszynki do szablonów
      description: Określa materiały eksploatacyjne niezbędne do działania (jeśli
        takie są).
    step_surface_texture:
      name: Tekstura powierzchni stopnia
      description: Określa rodzaj stopnia lub materiał/konstrukcję powierzchni mającej
        na celu poprawę przyczepności i komfortu w warunkach wilgoci.
    stepper_motion_type:
      name: Typ ruchu steppera
      description: Definiuje podstawowy ruch krokowy oferowany przez urządzenie.
    stick_bow_profile:
      name: Profil łuku kijowego
      description: Określa profil krzywizny (lub „typ wygiętego łuku”) trzonka kija
        do hokeja na trawie, co jest kluczowym czynnikiem wpływającym na kontrolę
        piłki, opór i styl gry.
    stick_construction:
      name: Konstrukcja kija
      description: Określa rodzaj konstrukcji kija do hokeja, np. jednoczęściowy kompozyt,
        dwuczęściowy kompozyt lub drewno.
    stick_curvature_type:
      name: Rodzaj krzywizny bumerangu
      description: Opisuje profil krzywizny bumerangu, który ma wpływ na odległość
        i celność rzutu.
    stick_head_shape:
      name: Kształt kosza kija
      description: Określa kształt kosza kija, co wpływa na chwytność, styl uderzenia
        i kontrolę nad piłką.
    stick_size_compatibility:
      name: Kompatybilność rozmiaru kija
      description: Określa rozmiar grupy kijów do hokeja, z którymi produkt jest zgodny
        (np. młodzieżowy, juniorski, średniozaawansowany, seniorski, bramkarski lub
        uniwersalny).
    sticker_decal_features:
      name: Cechy naklejek/kalkomanii
      description: Wskazuje zastosowanie i parametry naklejek/kalkomanii (np. brak
        pęcherzyków powietrza lub możliwość ponownego umiejscowienia).
    sticker_finish:
      name: Wykończenie naklejki
      description: Opisuje wykończenie powierzchni / efekt wizualny naklejek.
    sticker_format:
      name: Format naklejki
      description: Określa format naklejek ozdobnych (np. arkusz, rolka, pojedyncza
        sztuka lub książka) w sprzedaży detalicznej.
    sticker_material_type:
      name: Rodzaj materiału naklejki
      description: Określa główne podłoże/materiał naklejki ozdobnej (nie ozdoby).
    stilt_foot_attachment_type:
      name: Typ mocowania stopy szczudła
      description: Określa sposób, w jaki stopa użytkownika jest mocowana do szczudła
        (np. za pomocą paska ze sprzączką, rzepu lub sznurowania).
    stirrup_style:
      name: Styl strzemiona
      description: Klasyfikuje style strzemion specyficzne dla danej konstrukcji lub
        dyscypliny, uwzględniając różnice pod względem bezpieczeństwa, dyscypliny
        i konstrukcji.
    stirrup_tread_material:
      name: Materiał bieżnika strzemienia
      description: Określa materiał, z którego wykonana jest stopka lub bieżnik strzemienia,
        co ma wpływ na przyczepność, wygodę i zużycie.
    stitch_marker_and_counter_style:
      name: Styl znacznika i licznika rzędów
      description: Określa styl lub wielkość znacznika ściegów lub licznika ściegów/rzędów
        (np. znacznik blokujący, marker typu split ring, licznik pierścieniowy lub
        licznik cyfrowy).
    stitch_types:
      name: Rodzaje ściegów
      description: Rodzaje ściegów (funkcjonalne i dekoracyjne), które może wykonać
        maszyna.
    stitching_method:
      name: Metoda szycia
      description: Wskazuje sposób łączenia ze sobą płatów piłki.
    stitching_state:
      name: Stan szycia
      description: Wskazuje, czy elementy odzieży są dostarczane w stanie niezszytym,
        częściowo zszytym, zszytym czy gotowym do noszenia.
    stock_car_race_series:
      name: Zawody samochodów seryjnych
      description: Określa instytucję sankcjonującą lub serię/klasę wyścigów, do udziału
        w których jest przeznaczony dany samochód seryjny.
    stone_adhesion:
      name: Przyleganie pestki
      description: Określa, czy pestka brzoskwini lub nektarynki jest swobodna, przylegająca
        czy półswobodna.
    stone_creation_method:
      name: Metoda tworzenia kamienia
      description: Określa, czy pestka jest naturalna, wyhodowana laboratoryjnie,
        imitowana czy poddana recyklingowi.
    stone_cut_grade:
      name: Gatunek kamienia ciętego
      description: Oznacza ogólną ocenę jakości szlifu kamienia.
    stone_cut_style:
      name: Styl szlifu kamienia
      description: Styl szlifu/fasety kamienia szklanego (np. faseta czy kaboszon).
    stone_fruit_cultivar:
      name: Kultywar owocu pestkowego
      description: Określa konkretną odmianę/kultywar brzoskwini lub nektarynki.
    stone_fruit_variety:
      name: Odmiana owocu pestkowego
      description: Rozróżnia podtyp w ramach kategorii (np. brzoskwinia, nektarynka
        lub brzoskwinia płaskoowocowa Saturn).
    stone_setting_type:
      name: Typ mocowania kamienia
      description: Określa sposób mocowania kamienia w danym elemencie (oprawa, ząb,
        pavé itp.).
    stone_transparency:
      name: Przezroczystość kamienia
      description: Przezroczystość/nieprzezroczystość optyczna kamienia szklanego.
    storage_case_type:
      name: Typ etui do przechowywania
      description: Oznacza rodzaj etui do przechowywania i transportu zestawu (np.
        pudełko, opakowanie wewnętrzne lub torba).
    storage_compartment_type:
      name: Rodzaj schowka
      description: Określa rodzaj schowka na rzeczy osobiste w bojce do pływania.
    storage_media_and_transfer_methods_supported:
      name: Obsługiwane metody przechowywania i przesyłania multimediów
      description: Obsługiwane formaty multimediów i połączeń w celu importowania/eksportowania
        sampli oraz zapisywania/ładowania projektów.
    storage_requirements:
      name: Wymagania dotyczące przechowywania
      description: Określa, w jaki sposób produkt powinien być przechowywany przed
        otwarciem i/lub po otwarciu, aby zachować jakość i bezpieczeństwo.
    stove_jack_compatibility:
      name: Zgodność z kuchenką
      description: Określa, czy namiot ma ognioodporny otwór na rurę kuchenki.
    straight_pin_application:
      name: Zastosowanie szpilki
      description: Określa przeznaczenie szpilek.
    straight_pin_finish:
      name: Wykończenie szpilki
      description: Opisuje wykończenie powierzchni lub powłokę szpilki (np. niklowanie),
        co wpływa na poślizg i odporność na korozję.
    straight_pin_head_material:
      name: Materiał główki szpilki
      description: Określa materiał, z którego jest wykonana główka szpilki (jeśli
        występuje), np. plastik lub szkło.
    straight_pin_head_shape:
      name: Kształt główki szpilki
      description: Opisuje kształt/styl główki szpilki pod kątem użyteczności i widoczności.
    strand_configuration:
      name: Konfiguracja pasma
      description: Wskazuje, ile oddzielnych rzędów lub włókien tworzy łańcuch portfela
        (pojedynczy, podwójny lub potrójny).
    strand_material:
      name: Materiał pasm
      description: Określa materiał użyty do wykonania pojedynczych pasm/serpentyn.
    strap_attachment_hardware:
      name: Osprzęt mocowania paska
      description: Określa rodzaj/konstrukcję narzędzia służącego do mocowania paska
        do instrumentu / punktu podparcia.
    strap_configuration:
      name: Konfiguracja paska
      description: Oznacza liczbę punktów mocowania kasku na pasku (np. 2-punktowy,
        4-punktowy), co jest istotne ze względu na dopasowanie, bezpieczeństwo i wymagania
        ligi.
    strap_functionality:
      name: Funkcjonalność paska
      description: Określa główne przeznaczenie lub konstrukcję paska do maty do jogi.
    strap_padding:
      name: Wyściełanie paska
      description: Oznacza poziom wyściełania paska, mający na celu poprawę komfortu
        i rozłożenie ciężaru.
    strap_side:
      name: Strona paska
      description: Określa, czy pasek jest przeznaczony do wiązania lewego, prawego,
        czy sprzedawany jako para.
    strap_width:
      name: Szerokość paska
      description: Wskazuje względną szerokość pasków naramiennych (cienkie, średnie,
        szerokie), aby pomóc klientom poszukującym konkretnego rodzaju osłony lub
        wsparcia.
    strength_classification:
      name: Klasyfikacja wytrzymałości
      description: Marketingowe oznaczenie wytrzymałości stosowane powszechnie przez
        markę (np. lekki, mocny lub bardzo mocny).
    strength_grade:
      name: Klasa wytrzymałości
      description: Opisuje przewidywaną siłę trzymania/wytrzymałości zapięcia na rzep.
    stretch_level:
      name: Poziom rozciągliwości
      description: Wskazuje, w jakim stopniu tkanina rozciąga się podczas użytkowania.
    stretch_type:
      name: Rodzaj rozciągliwości
      description: Określa, czy tkanina rozciąga się mechanicznie lub elastycznie,
        a także w jakim kierunku.
    stretcher_bar_material:
      name: Materiał krosna malarskiego
      description: Materiał użyty do wykonania ramy / krosna malarskiego (np. sosna,
        jodła, topola, brzoza, płyta MDF lub drewno modyfikowane).
    strike_shield_shape:
      name: Materiał tarczy treningowej
      description: Określa ogólny współczynnik kształtu powierzchni uderzeniowej tarczy
        treningowej.
    string_core_shape:
      name: Kształt rdzenia strun
      description: Określa kształt drucianego rdzenia strun z owijką, co wpływa na
        wyczucie i stabilność.
    string_coverage:
      name: Osłona strun
      description: Określa, które struny mają być zakryte przez częściowy kapodaster
        (według liczby lub wspólnego zestawu).
    string_end_type:
      name: Rodzaj zakończenia struny
      description: Określa, jak struna jest zakończona przy mostku/strunniku w celu
        zapewnienia zgodności (szczególnie ważne w przypadku gitar akustycznych/elektrycznych
        i niektórych gitar basowych).
    string_set_type:
      name: Typ zestawu strun
      description: Określa, czy produkt stanowi pełny zestaw, czy zawiera pojedyncze
        wymienne struny.
    strung_status:
      name: Stan siatki
      description: Wskazuje, czy kosz kija do lacrosse jest sprzedawany z siatką,
        z kieszenią, czy bez siatki.
    strut_placement:
      name: Położenie rozpórek
      description: Określa przewidywane miejsce montażu kolumny amortyzatora w pojeździe
        (przód/tył i strona lewa/prawa).
    stud_attachment_type:
      name: Typ mocowania kołka
      description: Określa sposób mocowania i konfiguracji kołków/korków w podeszwie
        zewnętrznej, co wpływa na konserwację i zgodność z przepisami ligi.
    stud_configuration:
      name: Konfiguracja kołków
      description: Określa kształt i rozmieszczenie kołków/korków w podeszwie zewnętrznej,
        co wpływa na przyczepność i stabilność na różnych nawierzchniach.
    stud_material:
      name: Materiał kołka
      description: Określa główny materiał kołków/korków, informując o trwałości,
        masie i zgodności z przepisami bezpieczeństwa.
    stuffed_animal_features:
      name: Cechy pluszowego zwierzęcia
      description: Podkreśla cechy pluszowego zwierzęcia, które oferują wygodę i zabawę.
    stump_base_type:
      name: Typ podstawy słupków
      description: Określa styl podstawy lub systemu mocowania słupków do krykieta
        (kolce, sprężyna powrotna, obciążona guma itp.).
    stump_mechanism:
      name: Mechanizm palika
      description: Określa mechanizm powrotny lub mocujący słupków do krykieta (np.
        sprężynowy lub stały).
    stump_size:
      name: Rozmiar słupków
      description: Etykieta z kategorią rozmiaru używana do oznaczania słupków do
        krykieta, wskazująca typową wysokość i odpowiednią grupę wiekową zawodników.
    subwoofer_installation_type:
      name: Typ montażu subwoofera
      description: Określa sposób instalacji subwoofera w systemie audio pojazdu.
    sugar_cane_variety:
      name: Odmiana trzciny cukrowej
      description: Określa konkretny kultywar lub konkretną odmianę trzciny cukrowej,
        która może wpływać na barwę, słodkość i zawartość błonnika.
    sugar_content_level:
      name: Poziom zawartości cukru
      description: Klasyfikuje ogólny poziom cukru lub skład koncentratu napoju, umożliwiając
        klientowi szybkie znalezienie opcji zwykłej, o obniżonej zawartości cukru
        lub bez cukru.
    sugar_refinement_level:
      name: Poziom rafinacji cukru
      description: Oznacza stopień lub styl rafinacji (kolor, zawartość melasy lub
        poziom przetworzenia).
    sugar_source:
      name: Źródło cukru
      description: Identyfikuje źródło botaniczne lub materiałowe, z którego pochodzi
        cukier.
    suit_fit:
      name: Dopasowanie garnituru
      description: Ogólny krój garnituru, określający przyleganie do ciała.
    suit_pieces:
      name: Elementy garnituru
      description: Określa, ile dopasowanych do siebie elementów znajduje się w zestawie
        garnituru (np. 2-częściowy, 3-częściowy lub 4-częściowy).
    suitable_for_anchoring_use:
      name: Nadaje się do kotwiczenia
      description: Określa zastosowanie związane z kotwiczeniem liny.
    suitable_for_craft_type:
      name: Odpowiednie do typu rękodzieła
      description: Podstawowe zastosowanie rękodzielnicze drutu do blokowania.
    suitable_for_paint_type:
      name: Odpowiednie do typu farby
      description: Określa, jakiego rodzaju farb można bezpiecznie używać z płótnem.
    suitable_for_swim_stroke:
      name: Odpowiedni styl pływacki
      description: Wskazuje, do jakiego stylu/stylów pływackich łopatka treningowa
        jest przeznaczona lub zoptymalizowana.
    suitable_mounting_surface_material:
      name: Odpowiedni materiał powierzchni montażowej
      description: Określa docelową powierzchnię lub docelowy materiał montażowy,
        do których ma być przyklejona warstwa klejąca.
    suitable_play_location:
      name: Odpowiednie miejsce do zabawy
      description: Podstawowe środowisko do zabawy młynem na piasek i wodę.
    suitable_riding_conditions:
      name: Odpowiednie warunki jazdy
      description: Określa warunki jazdy (np. suche, mokre lub zimowe), do których
        jest przeznaczony smar lub środek czyszczący do roweru.
    suitable_snow_conditions:
      name: Odpowiednie warunki śniegowe
      description: Oznacza podstawowe warunki śniegowe, dla których opracowano dany
        wosk antypoślizgowy.
    suitable_surface_type:
      name: Odpowiedni rodzaj powierzchni
      description: Określa rodzaj powierzchni, do której jest przeznaczony uchwyt.
    suitable_table_size:
      name: Odpowiedni rozmiar stołu
      description: Określa długość/długości stołu bilardowego lub snookerowego, do
        których oświetlenia przeznaczona jest lampa.
    sun_protection_rating_upf:
      name: Stopień ochrony przeciwsłonecznej (UPF)
      description: Zapewnia certyfikowany poziom ochrony przeciwsłonecznej UPF.
    sun_shade_attachment_method:
      name: Metoda mocowania osłony przeciwsłonecznej
      description: Określa, w jaki sposób osłona przeciwsłoneczna jest mocowana do
        okna lub szyby przedniej.
    sun_shade_style:
      name: Styl osłony przeciwsłonecznej
      description: Konstrukcja/format produktu umożliwiający montaż i przechowywanie
        osłony przeciwsłonecznej.
    sunchoke_variety:
      name: Odmiana topinamburu
      description: Oznacza konkretny kultywar lub konkretną odmianę topinamburu (słonecznika
        bulwiastego), dostarczając szczegółowych informacji ogrodnikom, szefom kuchni
        i wymagającym klientom.
    sunflower_oil_variety:
      name: Odmiana oleju słonecznikowego
      description: Klasyfikuje profil kwasów tłuszczowych lub odmianę oleju słonecznikowego
        (np. wysokoileinowy, średniooleinowy, linolowy).
    sunflower_variety:
      name: Odmiana słonecznika
      description: Odmiana/kultywar słonecznika (popularna odmiana na rynku przeznaczona
        na kwiat cięty).
    support_brace_features:
      name: Funkcje ortezy
      description: Wskazuje istotne cechy funkcjonalne ortezy nadgarstka, takie jak
        oddychający materiał, wyjmowana szyna lub regulowana metalowa płytka.
    support_leg_count:
      name: Liczba wsporników
      description: Liczba wsporników mających kontakt z podłożem podczas używania
        podpórki pod broń (np. monopod, dwójnóg lub trójnóg).
    support_padding:
      name: Wyściółka podparcia
      description: Określa, czy pasek/podpórka zawiera zintegrowane wyścielanie w
        punktach styku (szyja/ramię/kciuk).
    support_structure_type:
      name: Typ konstrukcji wsporczej
      description: Oznacza metodę konstrukcyjną służącą utrzymaniu osłony przed wiatrem
        w pozycji pionowej.
    supported_bowling_delivery_types:
      name: Obsługiwane rodzaje kręgli
      description: Określa odmiany kręgli do krykieta, które maszyna może symulować,
        np. inswing, outswing i spin.
    supported_dive_modes:
      name: Obsługiwane tryby nurkowania
      description: Określa tryby nurkowania, w których komputer nurkowy może pracować,
        np. Air, Nitrox lub Gauge.
    supported_equipment_type:
      name: Obsługiwany rodzaj sprzętu
      description: Identyfikuje sprzęt do sportów zimowych, do którego zaprojektowano
        regał (np. narty, deski snowboardowe lub kijki narciarskie).
    supported_spin_types:
      name: Obsługiwane rodzaje rotacji
      description: Określa warianty rotacji piłki, jakie może stosować wyrzutnia.
    supported_spool_bobbin_types:
      name: Obsługiwane typy szpul/szpulek
      description: Określa formaty szpul/szpulek, które może obsługiwać nawijarka
        elektryczna.
    surf_wax_temperature_rating:
      name: Temperatura wosku do deski surfingowej
      description: Określa zakres temperatur wody, do którego opracowano wosk, zapewniając
        optymalną przyczepność w różnych warunkach klimatycznych.
    surface_coating_or_finish:
      name: Powlekanie lub wykończenie powierzchni
      description: Określa wszystkie powłoki ochronne lub zwiększające wytrzymałość
        użyte na szczypcach.
    surface_coating_or_wrap:
      name: Powłoka lub wykończenie powierzchni
      description: Zewnętrzna powierzchnia służąca do chwytu/kontroli drążka środkowego
        (i czasami drążków ręcznych).
    surface_finish:
      name: Wykończenie powierzchni
      description: Opisuje charakter lub fakturę powierzchni piłki, które wpływają
        na chwyt i ruch podczas żonglerki kontaktowej.
    surface_finish_prep:
      name: Wykończenie/przygotowanie powierzchni
      description: Wskazuje stan powierzchni ciernej w momencie sprzedaży (np. po
        regeneracji, obróbce mechanicznej, w stanie surowym po odlewie).
    surface_types_included:
      name: Typy powierzchni w zestawie
      description: Określa, jakie powierzchnie do rysowania/malowania znajdują się
        w zestawie (jeśli występują), np. płótno, blok papieru, panele drewniane lub
        brak.
    surfboard_construction:
      name: Konstrukcja deski surfingowej
      description: Określa podstawową technologię konstrukcji lub układu deski surfingowej.
    surfboard_tail_shape:
      name: Kształt taila deski surfingowej
      description: Określa kształt taila deski, który wpływa na zwrotność i przyczepność.
    suspension_bushing_type:
      name: Typ tulei zawieszenia
      description: Określa styl funkcjonalny/montażowy tulei zawieszenia.
    suspension_configuration:
      name: Konfiguracja zawieszenia
      description: Opisuje, czy trójkołowiec ma zawieszenie i gdzie się ono znajduje.
    suspension_material:
      name: Materiał zawieszenia
      description: Określa materiał łańcuchów, lin lub kabli użytych do zawieszenia
        huśtawki.
    suspension_trainer_accessories_included:
      name: Akcesoria do trenażera podwieszanego w zestawie
      description: Wymienia dodatkowe elementy dołączone do zestawu trenażera (np.
        kotwa do drzwi, pas przedłużający, torba do przechowywania), pomagając klientom
        zrozumieć zawartość opakowania i porównać wartość zestawu.
    suspension_trainer_anchor_type:
      name: Typ mocowania trenażera podwieszanego
      description: Określa rodzaj mocowania lub punktu zaczepienia, do którego przeznaczone
        są pasy (np. drzwi, sufit, drzewo), informując o zgodności z otoczeniem użytkownika.
    suspension_type:
      name: Typ zawieszenia
      description: Określa, czy widelec jest sztywny, czy wykorzystuje określony system
        amortyzacji (powietrzny, sprężynowy, hybrydowy, elastomerowy itp.), pomagając
        rowerzystom dopasować widelec do stylu jazdy.
    sustain_pedal_form_factor:
      name: Forma pedału sustain
      description: Opisuje fizyczną konstrukcję pedału sustain (np. pedał nożny w
        stylu fortepianowym lub kompaktowy przełącznik nożny), która wpływa na komfort
        użytkowania i przeznaczenie.
    sustain_pedal_switch_type:
      name: Typ przełącznika pedału sustain
      description: Wskazuje, czy pedał wysyła sygnał chwilowy (sustain podczas naciskania),
        czy przełączający (toggle).
    sustainability_certification:
      name: Certyfikacja zrównoważonego rozwoju
      description: Certyfikat środowiskowy lub dotyczący pozyskiwania drewna.
    swab_intended_bassoon_section:
      name: Przeznaczenie wyciora do fagotu
      description: Określa, do czyszczenia której części fagotu przeznaczony jest
        wycior (różne przewody/części wymagają różnych kształtów i rozmiarów wyciorów).
    swab_style:
      name: Typ wyciora
      description: Opisuje konstrukcję/format wyciora używanego do czyszczenia lub
        docierania do części saksofonu.
    swab_weight_material:
      name: Materiał do wymazów
      description: Materiał, z którego wykonany jest ciężarek/przypon (jeśli występuje),
        mający wpływ na ryzyko zarysowania i trwałość.
    swab_weight_style:
      name: Styl obciążenia wyciora
      description: Określa sposób obciążenia wymazówki, aby przeszła przez kanał fagotu.
    sway_bar_adjustability:
      name: Możliwość regulacji drążka stabilizatora
      description: Czy i w jaki sposób można regulować sztywność drążka stabilizatora
        (zazwyczaj za pomocą wielu otworów montażowych w łącznikach końcowych).
    sway_bar_coating:
      name: Powłoka stabilizatora
      description: Powierzchnia wariant lub powłoka na drążku stabilizatora zapewniająca
        odporność na korozję i wygląd.
    sway_bar_fitment_front_rear_kit:
      name: Montaż drążka stabilizatora (przód/tył/zestaw)
      description: Określa, czy drążek stabilizatora jest przeznaczony do przedniej
        osi, tylnej osi, czy jest sprzedawany jako zestaw na przód i tył.
    sweatshirt_pocket_type:
      name: Typ kieszeni bluzy
      description: Opisuje styl kieszeni znajdujących się na bluzie.
    sweet_potato_variety:
      name: Odmiana słodkiego ziemniaka
      description: Identyfikuje konkretną odmianę lub odmianę słodkiego ziemniaka.
    sweet_spot_position:
      name: Pozycja sweet spot
      description: Określa, w którym miejscu na ostrzu znajduje się „sweet spot” kija,
        co ma wpływ na styl gry i ustawienie piłki.
    sweetener_presence:
      name: Obecność słodzika
      description: Określa, czy w maśle orzechowym znajdują się dodane substancje
        słodzące i w jakiej ilości.
    sweetening_type:
      name: Rodzaj słodzenia
      description: Opisuje sposób słodzenia produktu lub poziom jego słodkości.
    swim_armband_construction_type:
      name: Typ konstrukcji opaski pływackiej
      description: Definiuje styl strukturalny lub mechanizm unoszenia się rękawków
        (nadmuchiwane, piankowe, hybrydowe itp.).
    swim_belt_purpose:
      name: Przeznaczenie pasa do pływania
      description: Klasyfikacja funkcjonalna pasa pływackiego (np. pomoc techniczna
        do wyporności, aqua jogging, trening oporowy, uwięzi statyczne, mocowanie
        spadochronu ratunkowego, balast, bezpieczne brodzenie).
    swim_board_features:
      name: Cechy deski do pływania
      description: Highlight szczególne cechy lub ulepszenia deski do pływania, które
        zwiększają jej użyteczność i bezpieczeństwo.
    swim_bottom_length:
      name: Długość dołu stroju kąpielowego
      description: Klasyfikuje całkowity zasięg nogawek bokserek do pływania (np.
        krótkie spodenki lub długość do kolan).
    swim_buoy_features:
      name: Cechy boi pływackiej
      description: Rejestruje dodatkowe, godne uwagi cechy lub dodatki, które zwiększają
        widoczność, bezpieczeństwo lub użyteczność boi pływackiej.
    swim_cap_style:
      name: Styl czepka pływackiego
      description: Określa styl konstrukcji lub projektu czepka pływackiego (np. z
        długimi włosami, kopułkowy/wyścigowy, bąbelkowy/turban).
    swim_diaper_feature:
      name: Cechy pieluszki do pływania
      description: Informuje, czy brief mają zintegrowaną pieluchę zapobiegającą przeciekaniu,
        czy wymagają/nie wymagają stosowania osobnej pieluchy do pływania.
    swim_trainer_features:
      name: Funkcje trenera pływania
      description: Highlight dodatkowe cechy funkcjonalne i zapewniające wygodę trenażera
        pływackiego.
    swim_trainer_type:
      name: Typ trenera pływackiego
      description: Definiuje strukturalny styl lub format trenażera pływackiego, aby
        ułatwić filtrowanie według projektu i celu treningu.
    swim_training_focus:
      name: Zakres treningu pływackiego
      description: Określa główny cel treningu, do którego dąży wiosło (np. technika,
        siła, izolacja mięśni).
    swim_weight_style:
      name: Styl ciężarka pływackiego
      description: Klasyfikuje współczynnik kształtu ciężaru pływackiego, pomagając
        klientowi odróżnić zasadniczo różne typy produktów, pozostając jednocześnie
        w tej samej kategorii.
    swimbait_buoyancy:
      name: Wyporność swimbaita
      description: Informuje jak swimbait zachowuje się w kolumnie wodnej (pływa,
        wisi, tonie itp.), umożliwiając wędkarzowi wybór właściwej przynęty do docelowej
        głębokości oraz odzyskiwanie, wywoływanie stylu.
    swimbait_style:
      name: Styl swimbait
      description: Klasyfikuje konstrukcję lub projekt działania przynęty typu swimbait,
        takiej jak przynęta z ogonkiem wiosłowym lub przynęta ślizgowa.
    swimwear_pieces_included:
      name: Dołączone elementy stroju kąpielowego
      description: Wypisuje składniki ubioru osoba fizyczna. Supply w zestawie burkini,
        aby klient dokładnie wiedział, co znajduje się w opakowaniu.
    swimwear_set_pieces_included:
      name: Elementy dołączone do zestawu stroju kąpielowego
      description: Zawiera listę elementów ubioru wchodzących w skład zestawu burkini,
        dzięki czemu klient dokładnie wie, co otrzyma (np. top, legginsy, hidżab/czepek).
    swing_attachment_connection_type:
      name: Typ mocowania/relacji huśtawki
      description: Rodzaj zawieszenia huśtawki na jakim jest zawieszona (np. lina,
        łańcuch, paski).
    swing_trainer_type:
      name: Typ trenażera swingu
      description: Klasyfikuje styl lub mechanizm trenażera huśtawki, dzięki czemu
        klient może szybko zlokalizować urządzenie odpowiadające jego celom treningowym.
    swing_training_objective:
      name: Cel treningu swingu
      description: Klasyfikuje główny cel treningu, mechanizm lub cel trenera zamachu
        (np. tempo, szybkość, chwyt).
    switch_electrical_positions:
      name: Przełącz pozycje elektryczne
      description: Określa liczbę i zachowanie pozycji elektrycznych przełącznika
        (np. 3-pozycyjny, chwilowy).
    swivel_type:
      name: Typ obrotowy
      description: Określa konfigurację obrotową, która zapobiega zaplątywaniu się
        smyczy.
    sword_scabbard_material:
      name: Materiał pochwy miecza
      description: Określa główny materiał osłony/pochwy (o ile jest obecna).
    synthesizer_form_factor:
      name: Współczynnik kształtu syntezatora
      description: Opisuje format fizycznego/odtwarzanego interfejsu syntezatora.
    synthetic_feather_style:
      name: Styl syntetycznego pióra
      description: Styl/krój piór syntetycznych stosowany w różnych stylach i technikach
        Craft .
    synthetic_formulation_type:
      name: Rodzaj formulacji syntetycznej
      description: Określa syntetyczną bazę surowcową/typ formulacji (np. PAO, ester,
        hydrokrakowana grupa III).
    syrup_base_ingredient:
      name: Składnik bazowy syropu
      description: Określa główne źródło rośliny lub cukru, z którego pozyskiwany
        jest syrop lub nektar (np. klon, agawa, cukier trzcinowy).
    syrup_variety:
      name: Odmiana syropu
      description: Definiuje ogólny styl lub kategorię syropu na podstawie jego składu
        lub tradycyjnego zastosowania (np. klonowy, o smaku kawy, owocowy, leczniczy).
    t_shirt_fit:
      name: Dopasowanie koszulki
      description: Opisuje zamierzony ogólny krój/krój koszulki.
    tabla_included_components:
      name: Tabla zawiera komponenty
      description: Wskazuje, które kluczowe pozycje znajdują się w tabeli oferty produktu
        (pojedynczy bęben czy zestaw, osłony/opakowanie wewnętrzne, młotek tuningowy
        itp.).
    tabla_set_pieces_included:
      name: Dołączono elementy zestawu stołu
      description: Wskazuje, jakie elementy wchodzą w skład zestawu tabla (np. dajan,
        bajan, pierścienie, pokrowce, narzędzia do strojenia, torba).
    tabla_tonal_pitch_range_bayan:
      name: Zakres tonalny/wysokości dźwięku tabli (bayan)
      description: Opisuje typowy zakres wysokości/barwy dźwięku bębnów bayan (basowych)
        w zależności od rozmiaru i konstrukcji.
    table_base_material:
      name: Materiał podstawy stołu
      description: Identyfikuje główny materiał podstawy lub cokołu stołu (w odróżnieniu
        od nóg lub blatu stołu), ułatwiając filtrowanie według materiału.
    table_base_type:
      name: Typ podstawy stołu
      description: Określa konstrukcję podtrzymującą blat stołu (np. podstawa centralna,
        kozłowa, w kształcie litery X).
    table_coverage_position:
      name: Pozycja pokrycia stołu
      description: 'Wskazuje, do jakiej pozycji stołu do tenisa stołowego przeznaczone
        jest pokrycie: złożonej, do gry lub obu.'
    table_hockey_part_type:
      name: Typ części do hokeja stołowego
      description: Określa konkretny typ elementu w systemach do hokeja stołowego
        / cymbergaja.
    table_leg_design:
      name: Projekt nogi stołu
      description: Określa styl konstrukcji lub geometrię nogi, umożliwiając klientowi
        dopasowanie konkretnej estetyki i zaspokojenie potrzeb.
    table_size:
      name: Wielkość stołu
      description: Wskazany całkowity rozmiar stołu bilardowego (w stopach), umożliwiający
        klientowi szybki wybór popularnych opcji, takich jak stoły barowe o długości
        7 stóp lub stoły turniejowe o długości 9 stóp.
    table_size_category:
      name: Kategoria wielkości stołu
      description: Klasyfikuje stoły do piłkarzyków według ich całkowitej powierzchni,
        aby pomóc klientowi dopasować dostępną przestrzeń bez konieczności obliczania
        wymiarów.
    table_tennis_certification:
      name: Certyfikat do tenisa stołowego
      description: Wskazuje listę oficjalnych norm lub organów nadzorujących, które
        potwierdzają, że produkt spełnia wymagania (np. ITTF, klasy EN 14468-2).
    tabletop_tilt_function:
      name: Funkcja przechylania stołu
      description: Określa, czy blat stołu można przechylać, obracać lub nachylać
        pod różnymi kątami.
    tackle_components_included:
      name: Dołączone elementy sprzętu wędkarskiego
      description: Zawiera listę konkretnych elementów sprzętu wędkarskiego zawartych
        w zestawie, aby klient dokładnie wiedział, co kupuje.
    talking_drum_accessories_included:
      name: Akcesoria bębna gadającego w zestawie
      description: Wskazuje akcesoria dołączone do bębna gadającego (w opakowaniu).
    talking_drum_cord_material:
      name: Materiał sznurka bębna gadającego
      description: Materiał używany do produkcji sznurków/linek napinających łączących
        membrany bębnów.
    talking_drum_tuning_mechanism:
      name: Mechanizm strojenia bębna gadającego
      description: Określa, jak zmienia się wysokość tonu/napięcie bębna podczas gry
        (lub ustawiania).
    tam_tam_construction_style:
      name: Rodzaj konstrukcji tam-tamu
      description: Sposób budowy/uderzania tam-tamu.
    tam_tam_items_included:
      name: Elementy dołączone do tam-tamu
      description: Akcesoria dołączone do tam-tamu (np. młoteczek, stojak lub pokrowiec).
    tamarillo_variety:
      name: Odmiana tamarillo
      description: Określa konkretną odmianę lub wariant kolorystyczny owocu tamarillo.
    tamarind_variety:
      name: Odmiana tamaryndowca
      description: Określa odmianę botaniczną lub handlową tamaryndowca, która może
        wpływać na smak, konsystencję i zastosowanie kulinarne.
    tambourine_frame_style:
      name: Rodzaj obręczy tamburynu
      description: Opisuje fizyczną konfigurację obręczy służącej do trzymania tamburynu
        i grania na tamburynie.
    tambourine_head_material:
      name: Materiał membrany tamburynu
      description: Określa materiał membrany w tamburynach z membraną.
    tambourine_jingle_configuration:
      name: Konfiguracja blaszek tamburynu
      description: W jaki sposób blaszki są ułożone lub wbudowane w tamburyn.
    tambourine_jingle_material:
      name: Materiał blaszek tamburynu
      description: Określa materiał, z którego wykonane są blaszki tamburynu (metalowe
        krążki), co wpływa na brzmienie i trwałość.
    tambourine_mounting_type:
      name: Typ trzymania tamburynu
      description: Sposób trzymania lub montażu tamburynu podczas gry.
    tambourine_tuning_mechanism:
      name: Mechanizm strojenia tamburynu
      description: Określa system strojenia stosowany w strojonych tamburynach ręcznych
        (jeśli ma to zastosowanie).
    tank_model_scale:
      name: Skala modelu czołgu
      description: Określa współczynnik skali modelu czołgu (np. 1:35, 1:72).
    tank_top_back_style:
      name: Wykończenie pleców koszulki na ramiączkach
      description: Określa kształt lub krój tylnej części koszulki na ramiączkach,
        co wpływa na wsparcie, mobilność i estetykę.
    tape_application_area:
      name: Obszar zastosowania taśmy
      description: Określa część sprzętu lub odtwarzacza, do której ma zostać zastosowana
        taśma, pomagając klientowi wybrać właściwy styl.
    tape_finish:
      name: Wykończenie taśmy
      description: Wykończenie powierzchni/wizualne (połysk lub faktura) taśmy.
    tape_purpose:
      name: Przeznaczenie taśmy
      description: Określa podstawowe zastosowanie funkcjonalne taśmy przy konserwacji
        lub personalizacji rakiety.
    tape_type:
      name: Typ taśmy
      description: Klasyfikuje styl funkcjonalny lub wykonanie taśmy do kijów hokejowych,
        np. materiał, przezroczysty polietylen, taśma antypoślizgowa, taśma elastyczna,
        ochraniacz na goleń lub zamsz.
    tapenade_main_ingredients:
      name: Główne składniki tapenady
      description: Określa podstawowy składnik bazowy definiujący tapenadę (oliwki,
        pomidor, bakłażan, papryka itp.), przydatny dla klientów z określonymi preferencjami
        lub ograniczeniami dotyczącymi składników.
    tapestry_loom_loom_format:
      name: Format krosna do gobelinów
      description: Ogólny styl lub współczynnik kształtu ręcznego krosna do gobelinów.
    tapestry_loom_shedding_method:
      name: Metoda przeciągania na krośnie do gobelinów
      description: W jaki sposób krosno tworzy przesmyk (oddziela nici osnowy) do
        przeciągnięcia wątku.
    tapestry_loom_tensioning_system:
      name: System naciągania krosna do gobelinów
      description: Metoda stosowana do naciągania i zabezpieczania osnowy na krośnie
        do gobelinów.
    tar_head_material:
      name: Materiał membrany taru
      description: Określa materiał membrany bębna tar, co ma duży wpływ na odczucia,
        trwałość i brzmienie.
    tar_playing_style:
      name: Styl gry na bębnie tar
      description: Określa podstawową pozycję/technikę gry, do której jest przeznaczony
        bęben tar.
    tar_tuning_system:
      name: System strojenia bębna tar
      description: Określa sposób dostrajania bębna tar (sposób regulacji naprężenia
        membrany).
    target_components:
      name: Elementy celu
      description: Określa, do jakich elementów układu dolotu paliwa/powietrza jest
        przeznaczony produkt czyszczący.
    target_relative_humidity_rh:
      name: Docelowa wilgotność względna (RH)
      description: Docelowa wilgotność względna, jaką produkt ma utrzymać wewnątrz
        urządzenia/opakowania wewnętrznego.
    target_resetting_mechanism:
      name: Mechanizm przywracania pozycji tarczy
      description: Opisuje, w jaki sposób, lub czy w ogóle, tarcza powraca do swojej
        pierwotnej pozycji po trafieniu.
    target_trainer_type:
      name: Typ trenażera celności
      description: Klasyfikuje ogólny styl lub format treningu z tarczą w racquetballu
        lub squashu.
    targeted_contaminants:
      name: Atakowane zanieczyszczenia
      description: Rodzaje drobnoustrojów i pasożytów, które produkt eliminuje zgodnie
        z certyfikacją.
    targeted_muscle_group:
      name: Docelowa grupa mięśni
      description: Podstawowa grupa mięśni, na które oddziałuje akcesorium do treningu.
    taro_variety:
      name: Odmiana taro
      description: Określa odmianę, gatunek lub nazwę rynkową oferowanego korzenia
        taro (np. taro fioletowe, eddo lub kolokazja).
    tassel_trim_header_type:
      name: Typ brzegu taśmy z frędzlami
      description: Określa budowę górnej części służącej do mocowania taśmy z frędzlami
        do powierzchni (np. taśmy, plecionki lub sznurka).
    tassel_trim_use_case:
      name: Zastosowanie taśmy z frędzlami
      description: Podstawowy obszar zastosowania taśmy z frędzlami.
    taste_profile:
      name: Profil smakowy
      description: Opisuje dominujące cechy smakowe odmiany jabłek.
    tea_variety:
      name: Odmiana herbaty
      description: Klasyfikuje konkretny rodzaj lub styl herbaty lub naparu (np. czarna,
        zielona, matcha, rooibos), dzięki czemu klient może odfiltrować preferowane
        odmiany.
    teasing_tool_style:
      name: Styl narzędzia do wyczesywania
      description: Fizyczny styl lub współczynnik kształtu narzędzia do wyczesywania,
        używanego do otwierania i mieszania włókien (np. szczotka, grabie, grzebień).
    tee_base_style:
      name: Styl dołu podstawki pod piłkę
      description: Określa konstrukcję dolnej części podstawki, która podtrzymuje
        piłkę do rugby.
    temper_hardness:
      name: Stopień twardości
      description: Wskazuje, jak miękki lub twardy jest drut (jak dobrze zachowuje
        kształt).
    temperature_control_type:
      name: Typ sterowania temperaturą
      description: Określa, jak kontrolowana/regulowana jest temperatura narzędzia.
    tenkara_action_ratio:
      name: Współczynnik ugięcia Tenkara
      description: Oznacza tradycyjny współczynnik ugięcia Tenkara, który wskazuje
        miejsce, w którym wędka wygina się pod obciążeniem (np. 6:4).
    tennis_ball_court_surface:
      name: Nawierzchnia kortu do tenisa ziemnego
      description: Określa rodzaj nawierzchni kortu, do którego jest przeznaczona
        piłka, aby zapewnić optymalną wydajność i trwałość.
    tennis_ball_pressure_type:
      name: Typ ciśnienia piłki tenisowej
      description: Określa wewnętrzne ciśnienie piłki lub jej konstrukcję (pod ciśnieniem,
        bez ciśnienia, niski poziom ciśnienia lub pianka), co ma wpływ na odbicie
        i trwałość.
    tennis_racket_grip_size:
      name: Rozmiar rękojeści rakiety tenisowej
      description: Określa standardowy obwód rakiety (L0–L5 lub odpowiedniki w calach),
        aby zapewnić odpowiednie dopasowanie do dłoni i wygodę.
    tenor_flutophone_fingering_system:
      name: System palcowania flutofonu tenorowego
      description: Określa system palcowania używany we flutofonie tenorowym (konwencja
        nauczania/notacji).
    tenor_recorder_joint_type:
      name: Typ łączenia fletu prostego tenorowego
      description: Określa typ łączenia/relacji sekcji fletu prostego tenorowego.
    tenor_saxophone_key_system:
      name: System klawiszy saksofonu tenorowego
      description: Określa stosowany system/standard klawiszy (często określany jako
        styl francuski/Boehma dla saksofonów).
    tenor_saxophone_pad_material:
      name: Materiał podkładek do saksofonu tenorowego
      description: Określa podstawowy materiał używany na poduszki instrumentu.
    tenor_trombone_slide_type:
      name: Typ suwaka puzonu tenorowego
      description: Rodzaj suwaka stosowanego w puzonie tenorowym (np. standardowy/prosty
        lub z zaworem kwartowym/kwartwentylem).
    tenor_trombone_valve_configuration:
      name: Konfiguracja zaworu puzonu tenorowego
      description: Określa, czy puzon tenorowy ma zamontowany zawór/wentyl obrotowy
        i jaką konfigurację wykorzystuje.
    tension_control_type:
      name: Typ kontroli naprężenia
      description: Określa w jaki sposób (lub czy w ogóle) czółenko zapewnia regulowany
        opór/naprężenie szpulki/igły podczas podawania.
    tension_mechanism:
      name: Mechanizm napinający
      description: Metoda napinania stosowana w celu kontrolowania przepływu wątku
        ze szpulki podczas tkania.
    tension_pitch_modulation_system:
      name: System modulacji tonu/napięcia
      description: W jaki sposób bęben gadający zmienia ton/napięcie podczas gry (na
        przykład poprzez ściskanie sznurków).
    tension_system:
      name: System naprężania
      description: System napinania/podnoszenia kołowrotka przędzalniczego, do którego
        jest przeznaczony jest zestaw przelotek.
    tent_fabric_material:
      name: Materiał poszycia namiotu
      description: Określa główny materiał użyty w tropiku lub korpusie namiotu, mający
        wpływ na masę, oddychalność i odporność na warunki atmosferyczne.
    tent_season_rating:
      name: Ocena sezonowości namiotu
      description: Klasyfikuje namiot według liczby pór roku lub warunków pogodowych,
        do których jest przeznaczony (np. 3-sezonowy, 4-sezonowy lub ekspedycyjny).
    tent_setup_type:
      name: Sposób rozkładania namiotu
      description: Oznacza sposób rozstawiania namiotu, np. wolnostojący, półwolnostojący,
        niewolnostojący, nadmuchiwany/samonośny lub rozkładany.
    tent_style:
      name: Styl namiotu
      description: Opisuje konstrukcję namiotu (np. kopuła, tunel lub dwuspadowy).
    test_result_output_method:
      name: Metoda prezentowania wyników testu
      description: Określa sposób, w jaki tester akumulatorów samochodowych prezentuje
        lub dostarcza użytkownikowi wyniki testów (np. za pomocą wskaźnika, ekranu,
        wydruku, aplikacji lub raportu z oprogramowania).
    tether_strap_system:
      name: System uwięzi/pasków
      description: Rodzaj systemu uwięzi lub pasków służących do mocowania kasku do
        kasku/uprzęży (jeśli dotyczy).
    text_color:
      name: Kolor tekstu
      description: Kolor nadrukowanego lub wyszytego tekstu na etykiecie, różniący
        się od koloru tła etykiety.
    textile_craft_machine_operation_type:
      name: Typ operacji urządzenia do tekstyliów
      description: Jak obsługiwana jest urządzenie (napędzane ręcznie, nogą, silnikiem/elektrycznie).
    textile_finish_treatment:
      name: Wykończenie/obróbka tkaniny
      description: Określa główny rodzaj obróbki stosowanej w materiale tekstylnym.
    texture_inclusions:
      name: Dodatki wpływające na fakturę
      description: Określa dodane składniki wpływające na fakturę, takie jak miąższ
        aloesowy, nasiona bazylii, nata de coco, popping boba lub kawałki owoców.
    therapeutic_technology:
      name: Technologia terapeutyczna
      description: Określa wszelkie zintegrowane funkcje terapeutyczne, np. żel chłodzący,
        paski magnetyczne lub promiennik podczerwieni.
    thermal_set_components:
      name: Elementy zestawu odzieży termoaktywnej
      description: Określa, czy produkt zawiera tylko cześć dolną, tylko część górną,
        czy oba elementy tworzące zestaw.
    thermal_weight:
      name: Masa warstwy termicznej
      description: Oznacza kategorię cieplną materiału kominiarki.
    thermostat_type:
      name: Typ termostatu
      description: Projekt funkcjonalny termostatu lub styl sterowania termostatem
        układu chłodzenia pojazdu silnikowego.
    thimble_guide_size:
      name: Rozmiar prowadnika naparstkowego
      description: Oznaczenie rozmiaru prowadnika naparstkowego (rozmiar dopasowania/pokrycia);
        zwykle sprzedawane jako małe/średnie/duże, a nie z wymiarami liczbowymi.
    thread_connection_size:
      name: Rozmiar połączenia gwintowanego
      description: Określa specyfikację gwintu łączącego wałki, końcówki i adaptery
        (np. 6 mm lub 5/16"-24).
    thread_construction:
      name: Wykonanie nici
      description: Jak wykonana lub obrabiana jest nić (np. mulina haftowana a nić
        klejona).
    thread_cord_type_beading_pattern:
      name: Typ nici/sznurka (wzór koralikowy)
      description: Zalecany rodzaj sznurka lub nici do wykonania wzoru.
    thread_cutter_form_factor:
      name: Forma obcinacza nici
      description: Określa fizyczny styl obcinacza do nici, np. nożyczki ręczne, wiszące
        lub pierścieniowe.
    thread_cutter_mechanism:
      name: Mechanizm obcinacza do nici
      description: Opisuje działanie tnące lub mechanizm cięcia stosowany przez obcinacz
        do nici.
    thread_cutter_safety_features:
      name: Funkcje bezpieczeństwa obcinacza nici
      description: Określa wbudowane funkcje zabezpieczające, które zmniejszają ryzyko
        przypadkowego przecięcia lub chronią ostrza podczas przechowywania.
    thread_cutter_usage_application:
      name: Zastosowanie obcinacza do nici
      description: Oznacza podstawowe przeznaczenie obcinacza do nici w rzemiośle.
    thread_finish_treatment:
      name: Wykończenie/obróbka nici
      description: Wykończenie powierzchni lub powłoka zastosowana do nici, co wpływa
        na pracę i właściwości (np. woskowana, klejona lub merceryzowana).
    thread_material:
      name: Materiał nici
      description: Zawartość materiału / włókna pierwotnego nici/włókna (nie tkanina).
    thread_material_fiber:
      name: Materiał nici (włókno)
      description: Określa materiał / włókno pierwotne samej nici (nie tkanina).
    thread_package_format:
      name: Format opakowania nici
      description: Współczynnik kształtu opakowania nici do szycia (np. szpula, szpulka
        lub stożek).
    thread_rack_compatible_spool_type:
      name: Rodzaj szpuli zgodnej ze stojakiem na nici
      description: Rodzaj opakowania nici, pod kątem którego zaprojektowano stojak
        na nici (szpule, stożki itp.).
    thread_standard_size:
      name: Standardowy rozmiar nici
      description: Określa standard rozmiaru/masy nici użyty na etykiecie produktu
        (np. wt, Tex lub Denier).
    thread_type:
      name: Typ nici
      description: Określa typ/wykonanie nici do haftu krzyżykowego.
    thread_weight_system:
      name: System określania masy nici
      description: Standard stosowany do wyrażania masy/grubości nici.
    thread_yarn_guide_mounting_attachment_style:
      name: Sposób mocowania prowadnicy nici i przędzy
      description: Opisuje sposób mocowania lub montażu prowadnicy podczas użytkowania.
    thread_yarn_guide_tension_control:
      name: Kontrola naprężenia prowadnicy nici i przędzy
      description: Określa, czy i w jaki sposób prowadnica zapewnia regulowane naprężenie/opór
        nici lub przędzy.
    thread_yarn_organizer_features:
      name: Funkcje organizera nici i przędzy
      description: Podkreśla praktyczne funkcje do porządkowania i transportu związane
        z przechowywaniem nici/przędzy.
    threader_intended_use:
      name: Przeznaczenie nawlekacza
      description: Wskazuje podstawowy kontekst korzystania z ręcznego nawlekacza
        do nici.
    threading_system:
      name: System nawlekania
      description: Oznacza metodę i wyposażenie do tworzenia ściegu owerlokowego (np.
        ręczne, oznaczone kolorami, prowadzone lub nawlekanie pneumatyczne).
    threading_type:
      name: Typ nawlekania
      description: Określa, czy biżuteria wykorzystuje wewnętrzne nici, zewnętrzne
        nici, nie wykorzystuje nici lub nie ma zastosowania.
    throttle_type_scooter_conversion:
      name: Typ manetki gazu (konwersja hulajnogi)
      description: Określa złącze lub współczynnik kształtu manetki gazu wymagane
        lub uwzględnione w zestawie do konwersji.
    throw_rope_end_attachment:
      name: Zaczep końcowy liny ratunkowej
      description: Osprzęt końcowy/mocujący lub pętla na roboczym końcu (lub końcach)
        liny ratunkowej.
    throw_rope_storage_packaging_type:
      name: Sposób przechowywania/pakowania liny ratunkowej
      description: Określa sposób przechowywania lub rozwijania liny ratunkowej (np.
        torba lub szpula).
    throw_rope_visibility_features:
      name: Funkcje poprawiające widoczność liny ratunkowej
      description: Funkcje mające poprawić widoczność i ułatwić identyfikację liny
        w wodzie lub przy słabym oświetleniu.
    thrower_operation_type:
      name: Typ działania wyrzutni
      description: Klasyfikuje właściwości mechaniczne lub sposób rzucania liny w
        celu szybkiego odfiltrowania mechanizmów ręcznych i automatycznych.
    thumb_design:
      name: Projekt kciuka
      description: Opisuje projekt kciuka rękawic, co wpływa na chwyt i bezpieczeństwo.
    tiara_design:
      name: Konstrukcja tiary
      description: Wskazuje ogólną konstrukcję lub kształt tiary.
    tie_down_points_straps_included:
      name: Punkty/pasy mocujące w zestawie
      description: Określa, czy stojak jest wyposażony w zintegrowane punkty mocowania
        i/lub pasy do zabezpieczenia motocykla/skutera.
    tiling_format:
      name: Format kafelków
      description: Określa styl układu PDF do składania wydrukowanych stron.
    time_current_characteristic:
      name: Charakterystyka czasowo-prądowa
      description: Wskazuje charakterystykę czasowo-prądową bezpiecznika (np. szybkie
        zadziałanie lub opóźnienie czasowe), która ma wpływ na jego przydatność w
        obwodach prądu rozruchowego.
    timer_count_mode:
      name: Sposób odmierzania czasu
      description: Określa, w jaki sposób licznik odmierza czas, np. odliczanie, zliczanie
        (stoper), oba tryby lub odstępy/powtarzanie.
    timer_display_type:
      name: Sposób pokazywania czasu przez licznik
      description: Określa, w jaki sposób licznik czasu gry pokazuje pozostały czas
        (np. na ekranie cyfrowym, za pomocą tarczy analogowej, w formie klepsydry
        lub bez wyświetlacza).
    timer_operating_modes:
      name: Tryby pracy timera
      description: Obsługiwane działanie licznika na potrzeby aktywowania efektów.
    timing_belt_construction_material_rubber_compound:
      name: Materiał konstrukcyjny paska rozrządu (mieszanka gumowa)
      description: Podstawowy rodzaj gumy paska (np. HNBR), który wpływa na odporność
        na olej/ciepło i długotrwałość.
    timing_belt_profile:
      name: Profil paska rozrządu
      description: Profil/kształt zębów paska rozrządu (np. trapezowy lub krzywoliniowy).
    timing_belt_reinforcement_cord_material:
      name: Materiał wzmacniający pasek rozrządu
      description: Określa materiał wewnętrznego wzmocnienia paska rozrządu (np. włókno
        szklane lub aramid), co ma wpływ na wytrzymałość i rozciągliwość.
    timing_component_material:
      name: Materiał komponentu rozrządu
      description: Główny materiał elementu rozrządu (mieszanka gumy paska, metal
        łańcucha/zębatki lub materiał osłony).
    tin_whistle_body_material:
      name: Materiał korpusu flażoletu
      description: Wskazuje powszechnie stosowane materiały korpusu flażoletu w sposób
        dokładniejszy niż lista materiałów instrumentu, gdy jest to potrzebne.
    tin_whistle_bore_type:
      name: Typ otworów flażoletu
      description: Określa wzór otworów flażoletu.
    tin_whistle_included_accessories:
      name: Akcesoria flażoletu w zestawie
      description: Akcesoria dołączone do flażoletu (np. pokrowiec lub wycior).
    tip_finish_coating:
      name: Wykończenie/powłoka końcówki
      description: Określa rodzaj obróbki powierzchni na końcu roboczym (np. chromowana
        lub malowana proszkowo), który wpływa na odporność na korozję i powstawanie
        rys na obręczy.
    tip_shape:
      name: Kształt końcówki
      description: Opisuje kształt i ostrość końcówki kostki gitarowej, co wpływa
        na wydobywanie dźwięku i czucie gry.
    tippet_rating:
      name: Ocena tippetu
      description: Maksymalna zalecana wytrzymałość tippetu z oznaczeniem X dla wędkarstwa
        muchowego (np. 4X).
    tire_changer_operation_type:
      name: Sposób obsługi montażownicy
      description: Określa sposób uruchamiania/obsługi montażownicy (np. ręczny, pneumatyczny
        lub hydrauliczny). Odrębny od ogólnego atrybutu „Źródło zasilania”; używany
        przy opisywaniu sposobu uruchamiania narzędzia.
    tire_changer_type:
      name: Typ montażownicy
      description: Ogólny sposób obsługi, konstrukcja i poziom automatyzacji montażownicy.
    tire_compound_type:
      name: Typ mieszanki opony
      description: Określa klasyfikację mieszanki gumowej stosowanej w oponach (np.
        miękka, do jazdy w deszczu lub do śliskich nawierzchni), która wpływa na przyczepność
        i trwałość w różnych warunkach.
    tire_load_range:
      name: Zakres nośności opony
      description: Wskazuje zakres nośności / liczbę warstw osnowy opony (najczęściej
        w oponach do samochodów dostawczych), co odzwierciedla ładowność.
    tire_position:
      name: Pozycja opony
      description: Zalecane położenie montażu w pojeździe.
    tire_repair_kit_components:
      name: Elementy zestawu do naprawy opon
      description: Określa elementy wchodzące w skład zestawu, umożliwiając klientom
        porównanie zawartości pakietów.
    tire_sidewall_type:
      name: Typ ściany bocznej opony
      description: Określa styl i cechy konstrukcyjne ściany bocznej.
    tire_speed_rating:
      name: Ocena prędkości opony
      description: Litera określająca prędkość opony (np. H, V lub W), wskazująca
        maksymalną stałą prędkość.
    tire_spoon_type:
      name: Typ łyżki do opon
      description: Klasyfikuje łyżkę do opon według kształtu końcówki i przeznaczenia.
    tire_system_compatibility:
      name: Zgodność układu opon
      description: Określa, czy uszczelniacz jest przeznaczony do opon bezdętkowych,
        dętkowych czy obu typów.
    tire_temperature_rating_utqg:
      name: Ocena temperatury opon (UTQG)
      description: Ocena odporności temperaturowej UTQG dla opon samochodowych (np.
        A, B, C).
    tire_traction_rating_utqg:
      name: Ocena przyczepności opon (UTQG)
      description: Ocena przyczepności UTQG wskazująca skuteczność hamowania na mokrej
        nawierzchni.
    tire_tread_style:
      name: Styl bieżnika opony
      description: Opisuje ogólny wzór bieżnika opony dętkowej, odzwierciedlający
        zamierzone warunki terenowe i właściwości trakcyjne.
    tire_tube_type:
      name: Typ dętki
      description: Określa, czy opona jest przeznaczona do użytku bez dętki, czy z
        dętką.
    title_status:
      name: Status tytułu
      description: Status prawny lub rejestracji pojazdu.
    tobacco_application:
      name: Przeznaczenie tytoniu
      description: Oznacza zamierzony sposób spożycia lub wyposażenie do palenia tytoniu
        sypkiego.
    tobacco_cut_type:
      name: Typ cięcia tytoniu
      description: Określa sposób cięcia lub przygotowywania tytoniu sypkiego, mający
        wpływ na szybkość spalania, metodę pakowania i ogólne wrażenia z palenia.
    tobacco_strength:
      name: Moc tytoniu
      description: Wskazuje odczuwalną intensywność lub moc nikotyny czy tytoniu po
        spaleniu, pomagając klientowi wybrać intensywność odpowiadającą jego preferencjom.
    toe_construction:
      name: Konstrukcja noska
      description: Określa konstrukcję obszaru palców w butach do pływania, która
        ma wpływ na ciepło, równowagę i czucie deski.
    toe_coverage:
      name: Zakrycie palców
      description: Określa rodzaj osłony palców oferowany przez skarpetę.
    toe_pick_style:
      name: Styl ząbków
      description: Opisuje budowę ostrzy łyżew do jazdy figurowej.
    toe_protection_type:
      name: Typ ochrony palców
      description: Wskazuje, czy i w jaki sposób obszar palców jest wzmocniony w celach
        ochronnych (np. stalowy nosek lub miękki nosek).
    toe_reinforcement_type:
      name: Typ wzmocnienia palców
      description: Wskazuje konstrukcję obszaru palców, która wpływa na wytrzymałość
        i zgodność obuwia.
    toe_stop_stem_thread_size:
      name: Rozmiar gwintu trzpienia stopera
      description: Określa rozmiar gwintów trzpieni stoperów w celu zapewnienia zgodności
        z płytką.
    tofu_preparation_style:
      name: Styl przygotowania tofu
      description: Klasyfikuje tradycyjny styl lub podtyp tofu, wykraczając poza stopień
        twardości (np. jedwabiste, blokowe, pulchne, ze skórką, węzłowe lub fermentowane).
    tom_mount_adjustment_features:
      name: Funkcje regulacji mocowania tom-tomu
      description: Określa możliwości regulacji mocowania tom-tomu w celu ustawienia
        bębna (np. pochylenie, obrót lub wysokość).
    tom_mount_components_included:
      name: Elementy mocowania toma w zestawie
      description: Określa, jakie części są dołączone do mocowania tom-tomu (gniazdo,
        ramię, kula, zaciski, memory locki itp.).
    tom_mount_mounting_position:
      name: Pozycja montażowa mocowania tom-tomu
      description: Określa miejsce, w którym ma zostać zamontowany uchwyt tom-tomu
        (np. bęben basowy, statyw talerzy lub stojak).
    tonneau_cover_mounting_style:
      name: Styl montażu pokrywy tonneau
      description: Oznacza sposób montażu/mocowania plandeki skrzyni ładunkowej do
        szyn skrzyni ładunkowej samochodu ciężarowego.
    tool_case_form_factor:
      name: Format walizki narzędziowej
      description: Określa fizyczny styl walizki narzędziowej, który wpływa na przenoszenie
        i przechowywanie (np. walizka lub twardy pokrowiec).
    tool_functions_included:
      name: Funkcje narzędzi w zestawie
      description: Wskazuje konkretne zastosowania naprawcze lub konserwacyjne narzędzia
        wielofunkcyjnego lub zestawu narzędzi.
    top_bunk_access_method:
      name: Metoda dostępu do górnego łóżka
      description: Wskazuje, w jaki sposób użytkownicy mogą dostać się do górnego
        łóżka, co ma znaczenie dla bezpieczeństwa i oszczędności miejsca.
    top_fit:
      name: Krój topu
      description: Określa ogólną sylwetkę lub ogólny krój topu (np. dopasowany lub
        oversize).
    top_hat_style:
      name: Styl cylindra
      description: Określa konkretny rodzaj cylindra.
    top_soundboard_material:
      name: Materiał pudła rezonansowego
      description: Określa materiał pudła rezonansowego gitary (głównej płyty wytwarzającej
        dźwięk).
    topping_form:
      name: Forma polewy
      description: Określa fizyczną formę i konsystencję polewy deserowej, aby pomóc
        klientowi szybko zawęzić wybór do żądanego zastosowania.
    topping_type:
      name: Rodzaj przybrania
      description: Oznacza podstawowe przybranie lub zewnętrzne wykończenie pączka.
    tow_hook_type:
      name: Typ haczyka do ciągnięcia
      description: Określa, czy kneeboard ma zintegrowany haczyk i określa jego mechanizm.
    tow_point_configuration:
      name: Konfiguracja punktów holowniczych
      description: Określa konfigurację punktów zaczepienia (jeden, dwa lub kilka)
        dostępnych w dmuchanym pontonie dla różnych pozycji w czasie pływania.
    tow_strap_protective_features:
      name: Funkcje ochronne pasa holowniczego
      description: Rozwiązania konstrukcyjne zapewniające bezpieczeństwo i trwałość
        pasa holowniczego.
    tow_strap_type:
      name: Typ pasa holowniczego
      description: Określa funkcjonalną konstrukcję pasa holowniczego, np. pas holowniczy
        statyczny lub pas kinetyczny.
    towable_tube_style:
      name: Styl dmuchanego pontonu
      description: Określa ogólny projekt lub współczynnik kształtu dmuchanego pontonu,
        co wpływa na pozycję i doświadczenia podczas użytkowania.
    towed_water_sport_discipline:
      name: Dyscyplina sportów wodnych holowanych
      description: Określa podstawową czynność związaną z holowaniem w wodzie, do
        której są przeznaczone rękawice.
    towel_features:
      name: Cechy ręcznika
      description: Wskazuje cechy szczególne i dodatki dołączone do ręcznika.
    towel_style:
      name: Styl ręcznika
      description: Określa projekt funkcjonalny lub format ręcznika golfowego.
    toy_airplane_control_type:
      name: Rodzaj sterowania zabawkowym samolotem
      description: Określa sposób sterowania samolotem zabawkowym przez użytkownika.
    toy_airplane_features:
      name: Funkcje samolotu zabawkowego
      description: Podkreśla najważniejsze funkcje oferowane przez samolot zabawkowy.
    toy_airplane_flight_capability:
      name: Możliwość lotu samolotu zabawkowego
      description: Określa, czy zabawkowy samolot jest przeznaczony do rzeczywistego
        latania/szybowania, czy też służy głównie do zabawy na ziemi/prezentacji.
    toy_audio_features:
      name: Funkcje dźwiękowe zabawki
      description: Wskazuje efekty i opcje dźwiękowe wbudowane w zabawkę.
    toy_boat_play_features:
      name: Funkcje zabawkowej łodzi
      description: Podkreśla najważniejsze interaktywne funkcje zabawkowych łodzi,
        aby ułatwić ich odkrywanie i filtrowanie.
    toy_boat_recommended_play_environment:
      name: Zalecane środowisko zabawkowej łodzi
      description: Określa docelowe środowisko użytkowania zabawkowej łodzi, aby pomóc
        spełnić oczekiwania klienta i zapewnić bezpieczeństwo (np. wanna lub otwarta
        woda).
    toy_bowling_equipment_included:
      name: Wyposażenie kręgli dla dzieci w zestawie
      description: Określa, jakie elementy kręgli wchodzą w skład zestawu kręgli dla
        dzieci (np. kręgle, kula, tor/mata lub torba transportowa).
    toy_car_features:
      name: Funkcje samochodu zabawkowego
      description: Podkreśla funkcje samochodu zabawkowego (niezależne od napędu),
        takie jak światła, dźwięki lub otwierane części.
    toy_drawing_tablet_accessories_included:
      name: Akcesoria dołączone do zabawkowego tabletu do rysowania
      description: Dodatkowe akcesoria w zestawie oprócz samego tabletu (np. dodatkowy
        rysik lub pieczątki).
    toy_drawing_tablet_erase_method:
      name: Metoda zmazywania zabawkowego tabletu do rysowania
      description: Sposób czyszczenia lub wymazywania powierzchni do rysowania.
    toy_drawing_tablet_screen_type:
      name: Typ ekranu zabawkowego tabletu do rysowania
      description: Rodzaj używanej powierzchni do rysowania/wyświetlania obrazu (np.
        tablet LCD lub magnetyczny).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Przyrząd do pisania/rysowania na zabawkowym tablecie do rysowania
      description: Podstawowe narzędzie służące do rysowania na tablecie (rodzaj rysika).
    toy_figure_sound_feature:
      name: Funkcja dźwiękowa figurki
      description: Określa, czy figurka zwierzęcia wydaje dźwięki, a jeśli tak — to
        jakie (np. ryk lub inne realistyczne odgłosy wydawane przez zwierzę).
    toy_game_features:
      name: Funkcje gry/zabawki
      description: Podkreśla charakterystyczne cechy zabawek na plażę i do piasku,
        które służą do zabawy i budowania.
    toy_gift_basket_items_included:
      name: Elementy dołączone do kosza prezentowego z zabawkami
      description: 'Wskazuje główne rodzaje zabawek, które można znaleźć w koszyku
        prezentowym (np.: pluszowa zabawka, zestaw do budowania lub puzzle).'
    toy_glider_launch_method:
      name: Metoda startu szybowca zabawkowego
      description: Określa sposób wystrzeliwania zabawkowego szybowca, co wpływa na
        sposób zabawy i oczekiwania klienta.
    toy_helicopter_control_type:
      name: Rodzaj sterowania zabawkowym helikopterem
      description: Sposób sterowania lub obsługi zabawkowego helikoptera (niezależnie
        od napędu), np. za pomocą pilota ręcznego czy aplikacji lub brak sterowania
        (swobodny lot).
    toy_helicopter_features:
      name: Funkcje zabawkowego helikoptera
      description: Główne funkcje zabawkowego helikoptera (szczególnie modeli zdalnie
        sterowanych), które wpływają na użyteczność i potencjał zabawy.
    toy_jacks_set_items_included:
      name: Elementy do gry w kości w zestawie
      description: Określa, jakie podstawowe elementy są zawarte w zestawie do gry
        w kości (np. kości, piłka lub worek).
    toy_keyboard_learning_mode:
      name: Tryb nauki zabawkowego keyboardu
      description: Określa podejście do nauki oferowane przez zabawkowy keyboard (np.
        podświetlane klawisze, piosenki do naśladowania, lekcje wspomagane lub nauka
        z aplikacją).
    toy_keyboard_sound_theme:
      name: Motywy dźwiękowe zabawkowego keyboardu
      description: Rodzaje wbudowanych głosów/dźwięków oferowanych przez instrument
        (oprócz zwykłego pianina).
    toy_kitchen_appliances_included:
      name: Zabawkowe urządzenia kuchenne w zestawie
      description: Określa urządzenia kuchenne w zestawie, gdy produkt jest urządzeniem
        lub zestawem urządzeń AGH.
    toy_kitchen_assembly_requirement:
      name: Wymagania dotyczące składania zabawkowej kuchni
      description: Określa, czy konieczne jest składanie, a także przybliżoną trudność
        składania.
    toy_kitchen_interactive_features:
      name: Interaktywne funkcje zabawkowej kuchni
      description: Podkreśla interaktywne elementy spotykane zazwyczaj w zabawkowych
        kuchniach i powiązane akcesoria.
    toy_motorcycle_feature_set:
      name: Zbiór funkcji zabawkowego motocykla
      description: Najważniejsze funkcje zabawkowego motocykla (należy wybrać wszystkie
        pasujące elementy).
    toy_motorcycle_scale:
      name: Skala zabawkowego motocykla
      description: Współczynnik skali zabawkowych/kolekcjonerskich motocykli (np.
        1:12).
    toy_parachute_launch_method:
      name: Metoda wystrzeliwania zabawkowego spadochronu
      description: Określa, jak zabawka powinna być wystrzeliwana/rozkładana do lotu.
    toy_piano_and_keyboard_accessories_included:
      name: Akcesoria zabawkowego pianina i keyboardu w zestawie
      description: Akcesoria dołączone do zabawkowego pianina lub keyboardu.
    toy_playset_assembly_required:
      name: Wymóg składania zestawu do zabawy
      description: Informuje, czy przed rozpoczęciem zabawy wymagane jest złożenie
        przez osobę dorosłą (poza prostym łączeniem na zatrzask).
    toy_playset_items_included:
      name: Elementy dołączone do zestawu do zabawy
      description: Wskazuje najważniejsze elementy zestawu do zabawy (co znajduje
        się w pudełku).
    toy_safety_certification:
      name: Certyfikat bezpieczeństwa zabawki
      description: Normy/znaki bezpieczeństwa i zgodności obowiązujące w przypadku
        zabawek na rynku klienta (np. EN 71, ASTM F963 lub UKCA).
    toy_spaceship_features:
      name: Funkcje zabawkowego statku kosmicznego
      description: Oznacza typowe możliwości lub funkcje interaktywne zabawkowego
        statku kosmicznego.
    toy_spaceship_size_class:
      name: Klasa rozmiaru zabawkowego statku kosmicznego
      description: Oznacza przybliżoną klasę rozmiaru zabawkowego statku kosmicznego,
        co ułatwia szybkie filtrowanie; niezależna od dokładnych wymiarów (długość/szerokość/wysokość),
        nie oznacza liczbowego współczynnika skali modelu (np. 1:72).
    toy_tableware_pieces_included:
      name: Dołączone elementy zabawkowej zastawy stołowej
      description: Określa, jakie elementy zabawkowej zastawy stołowej są uwzględnione
        (talerze, kubki, sztućce lub naczynia do serwowania).
    toy_tool_electronic_features:
      name: Funkcje zabawkowego narzędzia elektrycznego
      description: Opisuje interaktywne/elektroniczne funkcje zabawkowego narzędzia
        (światła, dźwięki, ruch obrotowy itp.).
    toy_tool_set_components_included:
      name: Dołączone elementy zestawu zabawkowych narzędzi
      description: Wskazuje konkretne zabawkowe narzędzia w opakowaniu (szczególnie
        w przypadku zestawów narzędzi).
    toy_train_scale:
      name: Skala modelu pociągu
      description: Określa standard skali zabawkowego pociągu / modelu pociągu (lub
        rozmiar układu torów), aby zapewnić zgodność z istniejącymi pociągami i torami.
    toy_train_track_layout_type:
      name: Typ układu torów zabawkowego pociągu
      description: Opisuje układ/kształt torów dołączonych do zestawu pociągu lub
        dodatkowych torów.
    toy_weapon_gadget_features:
      name: Funkcje zabawkowych broni i gadżetów
      description: Podkreśla typowe interaktywne i praktyczne funkcje zabawkowych
        broni i gadżetów szpiegowskich.
    tpms_sensor_frequency_band:
      name: Pasmo częstotliwości czujnika TPMS
      description: Pasmo częstotliwości radiowych obsługiwane przez akcesoria związane
        z układem TPMS (jeśli ma zastosowanie).
    track_and_field_discipline:
      name: Konkurencja lekkoatletyczna
      description: Określa konkretną konkurencję lub dyscyplinę sportowe, do której
        jest przeznaczony produkt (np. pchnięcie kulą, skok o tyczce lub sprint).
    track_event_specialization:
      name: Docelowa konkurencja biegowa
      description: Wskazuje typ konkurencji, pod kątem której zoptymalizowano buty
        z kolcami.
    track_field_event_suitability:
      name: Dopasowanie do konkurencji lekkoatletycznej
      description: Określa konkretną konkurencję lekkoatletyczną, do której jest przeznaczony
        sprzęt treningowy.
    track_set_special_features:
      name: Specjalne funkcje zestawu torów
      description: Podkreśla główne funkcje zestawu torów, poza podstawowymi torami
        i wagonikami.
    track_surface_compatibility:
      name: Kompatybilność z nawierzchnią toru
      description: Określa nawierzchnię do biegania, pod kątem której zaprojektowano
        buty lub kolce.
    tracking_aid_type:
      name: Typ urządzenia do utrzymania kursu
      description: Określa, czy kajak jest wyposażony w urządzenie pomagające utrzymać
        prosty kurs.
    traction_pattern_type:
      name: Rodzaj wzoru bieżnika
      description: Opisuje podstawowy wzór rowków lub bieżnika zapewniający przyczepność
        na padzie.
    trading_card_league:
      name: Liga kart kolekcjonerskich
      description: Identyfikuje ligę sportową powiązaną z zestawem kart lub tematem
        (jeśli ma to zastosowanie).
    trailer_construction:
      name: Konstrukcja przyczepy
      description: Określa podstawową konstrukcję przyczepy w odniesieniu do ramy/nadwozia
        (np. aluminiowa, stalowa lub mieszana).
    trailer_coupler_size:
      name: Rozmiar zaczepu przyczepy
      description: Określa rozmiar zaczepu przyczepy wymaganego do holowania.
    trailer_hitch_mounting_location_method:
      name: Lokalizacja/sposób mocowania zaczepu holowniczego do przyczepy
      description: Określa, gdzie i w jaki sposób zaczep holowniczy jest montowany
        w pojeździe (np. w tylnym gnieździe, w przednim gnieździe, na ramie, na zderzaku
        lub na skrzyni ładunkowej).
    trailer_light_function:
      name: Funkcja oświetlenia przyczepy
      description: Podstawowe funkcje/położenie świateł przyczepy.
    trailer_suspension_type:
      name: Typ zawieszenia przyczepy
      description: Określa rodzaj układu zawieszenia zastosowanego w przyczepce rowerowej,
        np. sprężyny śrubowe lub resory piórowe, w celu zwiększenia komfortu jazdy
        i ochrony ładunku.
    trailer_wiring_circuit:
      name: Obwód okablowania przyczepy
      description: Wskazuje obwody/sygnały oświetlenia, hamulców i pomocnicze w okablowaniu
        przyczepy (tj. jakie linie zasilania/masy i sygnałowe są obecne).
    trailer_wiring_connector_type:
      name: Typ złącza okablowania przyczepy
      description: Określa standard wtyczki po stronie przyczepy/pojazdu stosowany
        w wiązkach przewodów i adapterach przyczepy.
    train_whistle_intended_use:
      name: Przeznaczenie gwizdka pociągu
      description: Podstawowe przewidziane zastosowanie gwizdka.
    train_whistle_sound_character:
      name: Dźwięk gwizdka pociągu
      description: Opisuje odczuwaną barwę dźwięku gwizdka.
    trainer_mounting_type:
      name: Typ mocowania trenażera
      description: Opisuje sposób współpracy roweru z trenażerem (np. napęd Wheel-on
        lub napęd bezpośredni).
    training_dummy_shape:
      name: Kształt manekina do szkolenia
      description: Określa ogólny projekt lub sylwetkę manekina, co ma wpływ na chwyt
        psa i realizm szkolenia.
    training_focus:
      name: Zakres szkoleniowy
      description: Opisuje główny obszar umiejętności, jaki ma rozwijać wyposażenie
        do treningu (np. odruchy, praca nóg lub koordynacja wzrokowo-ruchowa).
    training_focus_area:
      name: Obszar szkoleniowy
      description: Określa główną umiejętność, którą ma rozwijać wyposażenie do lacrosse.
    training_objective:
      name: Cel szkoleniowy
      description: Określa główną umiejętność lub technikę, którą ma rozwijać produkt.
    training_surface_suitability:
      name: Odpowiednia nawierzchnia do treningu
      description: Określa nawierzchnie, na których można używać trenażera.
    training_surface_usage:
      name: Wykorzystanie nawierzchni do treningu
      description: Określa podstawowe czynności, jakie powinna umożliwiać nawierzchnia
        do treningu, rozróżniając syntetyczne panele do jazdy na łyżwach od paneli
        typu Dryland lub wielofunkcyjnych.
    training_usage_type:
      name: Typ zastosowania do treningu
      description: Określa podstawowy okres zamierzonego użytkowania lub zastosowanie
        spodni treningowych, np. trening dzienny lub wieczorny.
    trampoline_enclosure_type:
      name: Typ obudowy trampoliny
      description: Określa konfigurację obudowy trampoliny, w tym sposób i miejsce
        montażu siatki.
    trampoline_safety_certifications:
      name: Certyfikacje bezpieczeństwa trampoliny
      description: Wskazuje, z którymi normami/certyfikatami bezpieczeństwa dotyczącymi
        trampolin ma być zgodny produkt.
    transfer_application_method:
      name: Metoda nakładania poprzez transfer
      description: Określa sposób aplikacji nadruku na tkaninę (np. poprzez prasowanie
        czy nakładanie na gorąco).
    transfer_method:
      name: Metoda transferu
      description: Określa, w jaki sposób wzór ma zostać przeniesiony na tkaninę.
    transfer_peel_temperature:
      name: Temperatura zdejmowania folii transferowej
      description: Określa zalecany stan temperatury, gorący, ciepły lub zimny, w
        którym należy zdjąć arkusz nośny po prasowaniu.
    transmission_cooler_construction:
      name: Konstrukcja chłodnicy skrzyni biegów
      description: Określa konstrukcję rdzenia chłodnicy skrzyni biegów.
    transmission_fluid_specification:
      name: Specyfikacja płynu do skrzyni biegów
      description: Norma/specyfikacja OEM spełniana przez płyn do skrzyni biegów,
        np. rodziny Dexron/Mercon, ATF+4, JWS 3309.
    transmission_mount_bushing_material:
      name: Materiał tulei poduszki skrzyni biegów
      description: Określa elastomer lub materiał izolatora użyty w tulei/izolatorze
        poduszki, czyli elemencie tłumiącym drgania.
    transmission_mount_type:
      name: Typ poduszki skrzyni biegów
      description: Określa konstrukcję/projekt poduszki skrzyni biegów, np. hydrauliczna
        lub pełna, pomagając ustalić dopasowanie, charakterystykę NVH i zamierzone
        użycie.
    transparency_level:
      name: Poziom przezierności
      description: Opisuje, jak bardzo prześwitujące są ścianki pojemnika, pomagając
        kupującym wybrać między dobrą widocznością zawartości a ukrytym przechowywaniem.
    transport_case_type:
      name: Typ futerału transportowego
      description: Klasyfikuje styl konstrukcji/sztywność rozwiązania transportowego,
        odzwierciedlając poziom ochrony i sposób pakowania.
    transposition_modes:
      name: Tryby transpozycji
      description: Określa tryby transpozycji/stroju koncertowego obsługiwane przez
        tuner, np. strój koncertowy i tonacje transponujące, takie jak B♭ lub E♭.
    trap_design:
      name: Konstrukcja pułapki
      description: Określa styl konstrukcyjny lub mechanizm pułapki, który determinuje
        sposób rozstawiania oraz gatunki lub środowiska, do których najlepiej się
        nadaje.
    trap_spring_configuration:
      name: Konfiguracja sprężyn pułapki
      description: Wskazuje liczbę lub układ sprężyn napędzających pułapkę, co wpływa
        na siłę i zgodność z przepisami.
    travel_bassinet_accessories_included:
      name: Akcesoria dołączone do turystycznego łóżeczka niemowlęcego
      description: Wymienia dodatkowe elementy dostarczane z turystycznym łóżeczkiem
        niemowlęcym.
    travel_spinning_wheel_assembly_required:
      name: Wymagany montaż turystycznego kołowrotka przędzalniczego
      description: Wskazuje, czy kołowrotek wymaga montażu/konfiguracji wykraczającej
        poza rozłożenie, np. zamocowania skrzydełka, regulacji napięcia, podnóżków,
        przed użyciem.
    travel_spinning_wheel_portability_features:
      name: Cechy przenośności turystycznego kołowrotka przędzalniczego
      description: Elementy konstrukcyjne związane z przenośnością turystycznych kołowrotków
        przędzalniczych, takie jak składana konstrukcja i dołączone rozwiązania transportowe.
    travel_trailer_appliances_fuel_type:
      name: Typ paliwa urządzeń przyczepy kempingowej
      description: Podstawowe paliwo używane przez pokładowe urządzenia/ogrzewanie/gotowanie,
        nie przez pojazd holujący.
    travel_trailer_holding_tank_type:
      name: Typ zbiornika przyczepy kempingowej
      description: Wskazuje, jakie zbiorniki są obecne w przyczepie kempingowej; wybierz
        wszystkie pasujące.
    travel_trailer_power_hookup_shore_power:
      name: Podłączenie zasilania przyczepy kempingowej (shore power)
      description: Standardy podłączenia elektrycznego obsługiwane dla zasilania zewnętrznego.
    tread_pattern_type:
      name: Typ wzoru bieżnika
      description: Klasyfikuje ogólny wzór bieżnika opony, np. slick, semi-slick lub
        klockowy, który wpływa na przyczepność, opory toczenia i zamierzoną nawierzchnię.
    treadmill_key_type:
      name: Typ klucza bezpieczeństwa bieżni
      description: Opisuje fizyczny styl lub mechanizm działania/podłączenia klucza
        bezpieczeństwa, np. magnetyczny okrągły, plastikowy wkład, przypinany.
    treadmill_part_type:
      name: Typ części bieżni
      description: Określa konkretny komponent bieżni, który produkt ma zastąpić,
        aby kupujący mogli szybko potwierdzić dopasowanie, np. pas lub silnik.
    treadmill_position:
      name: Położenie części bieżni
      description: 'Określa pozycję montażu części na bieżni: przód, tył, góra, dół,
        środek.'
    triangle_striker_material:
      name: Materiał pałeczki do trójkąta
      description: Materiał dołączonej pałeczki/uderzaka.
    trigger_input_connector:
      name: Złącze wejścia triggera
      description: Określa standard fizycznego złącza używanego dla wejść triggerów.
    trigger_input_connector_type:
      name: Typ złącza wejścia triggera
      description: Określa fizyczny typ złącza używany dla wejść triggerów.
    trigger_input_zone_support:
      name: Obsługa stref wejścia triggera
      description: Wskazuje, czy wejścia triggerów obsługują triggery jednostrefowe
        i/lub dwustrefowe, np. naciąg/obręcz, oraz podobne implementacje wielostrefowe.
    trim_application_method:
      name: Metoda nakładania poprzez przycinanie
      description: Wskazuje, w jaki sposób lamówka ma być mocowana do projektu, np.
        przyszywana, do naprasowania, samoprzylepna.
    trim_detail:
      name: Detal wykończenia
      description: Określa wyróżniające się ozdobne krawędzie lub wykończenia odzieży,
        np. chwosty, frędzle, koronkową lamówkę.
    trim_elasticity:
      name: Elastyczność lamówki
      description: Wskazuje, czy lamówka zygzakowa ma rozciągliwość do zastosowań
        w dzianinach/odzieży aktywnej.
    trim_finish:
      name: Wykończenie lamówki
      description: Obróbka powierzchni zastosowana na lamówce, np. metaliczna, brokatowa,
        odblaskowa.
    trim_tilt_type:
      name: Typ trimu i tiltu
      description: Wskazuje, czy i w jaki sposób silnik obsługuje regulację trimu/tiltu.
    trolleybus_power_supply_type:
      name: Typ zasilania trolejbusu
      description: Określa, w jaki sposób trolejbus pobiera energię trakcyjną z sieci
        elektrycznej.
    truck_bed_body_type:
      name: Typ skrzyni/ zabudowy pickupa
      description: Konfiguracja przestrzeni ładunkowej lub zabudowy za kabiną.
    truck_bed_length_class:
      name: Klasa długości skrzyni pickupa
      description: Wskazuje klasę długości skrzyni pickupa, do której zaprojektowano
        siatkę transportową, zwykle określaną jako krótka, standardowa lub długa skrzynia.
    truck_mounting_hole_pattern:
      name: Układ otworów montażowych trucków
      description: Określa układ otworów używany do montażu trucków do decku, np.
        Old school, New school, Universal.
    truck_mounting_style:
      name: Styl mocowania w ciężarówce
      description: Sposób mocowania trucków do decku, np. top mount, drop-through
        itp., wpływający na wysokość jazdy i stabilność.
    truck_profile:
      name: Profil trucka
      description: Wskazuje klasyfikację wysokości trucka deskorolki względem decku,
        wpływającą na prześwit kół i odczucie deski.
    trumpet_bell_material:
      name: Materiał czary trąbki
      description: Materiał użyty na sekcję czary, czasem różniący się od reszty instrumentu.
    trumpet_leadpipe_material:
      name: Materiał rurki ustnikowej trąbki
      description: Materiał lub obróbka użyta na rurkę ustnikową, czyli główną rurkę
        od ustnika do wentyli.
    trundle_mechanism:
      name: Mechanizm łóżka wysuwanego
      description: Opisuje sposób wysuwania dodatkowego łóżka z głównej ramy.
    trunk_part_type:
      name: Typ części bagażnika
      description: Określa, jaki element nadwozia związany z bagażnikiem jest sprzedawany,
        np. pokrywa bagażnika, zawias, zamek.
    tuba_leadpipe_material:
      name: Materiał rurki ustnikowej tuby
      description: Określa materiał użyty na sekcję rurki ustnikowej tuby.
    tube_base_type:
      name: Typ podstawy tuby
      description: Określa rodzinę podstawy/gniazda lampy używaną do fizycznego/elektrycznego
        dopasowania, np. Octal, Noval/9-pin.
    tube_matching_grade:
      name: Klasa dopasowania lamp
      description: Wskazuje, czy lampy są testowane/dopasowane jako zestaw oraz jaki
        typ dopasowania zapewniono.
    tube_weight_category:
      name: Kategoria wagi tuby
      description: Klasyfikuje dętkę według konstrukcji/wagi, np. ultralekka, standardowa,
        heavy duty, w celu szybkiego porównania trwałości i osiągów.
    tubeless_compatible:
      name: Kompatybilność z systemem bezdętkowym
      description: Wskazuje, czy koło jest zaprojektowane do użycia bez dętki w połączeniu
        z oponami bezdętkowymi.
    tubing_shape:
      name: Kształt rurki
      description: Określa kształt przekroju poprzecznego rurki podporowej stojaka.
    tubular_construction_type:
      name: Typ konstrukcji tubularnej
      description: Określa styl konstrukcji szytek rowerowych, rozróżniając tradycyjne
        szytki klejone i nowsze warianty.
    tulip_type_flower_form:
      name: Typ tulipana (forma kwiatu)
      description: Określa ogrodniczy typ/formę kwiatu tulipanów w bukiecie, np. pojedyncze,
        pełne, papuzie.
    tuner_input_method:
      name: Metoda wejścia tunera
      description: 'Określa sposób wykrywania wysokości dźwięku przez tuner: mikrofon,
        czujnik wibracyjny/klips, wejście kabla instrumentu, przetwornik kontaktowy.'
    tuning_mechanism:
      name: Mechanizm strojenia
      description: Sposób naciągania/strojenia membran bongosów.
    tuning_system:
      name: System strojenia
      description: Jak stroi się bęben kielichowy i czy da się go nastroić.
    turn_signal_lens_color:
      name: Kolor klosza kierunkowskazu
      description: Kolor widocznego klosza/osłony na obudowie kierunkowskazu, nie
        kolor emitowanego światła.
    turn_signal_lighting_style:
      name: Styl świecenia kierunkowskazu
      description: Wizualny styl/animacja sygnalizacji zapewniana przez kierunkowskaz.
    turnip_and_rutabaga_variety:
      name: Odmiana rzepy i brukwi
      description: Określa konkretny kultywar lub odmianę rzepy albo brukwi.
    tweeter_crossover_type:
      name: Typ zwrotnicy tweetera
      description: Wskazuje typ zwrotnicy górnoprzepustowej i/lub elementu ochronnego
        dołączonego do tweetera, jeśli występuje.
    tweeter_material:
      name: Materiał głośnika wysokotonowego
      description: Podstawowy materiał membrany/kopułki tweetera.
    tweeter_mount_type:
      name: Typ montażu tweetera
      description: Określa sposób montażu tweetera w pojeździe, czyli metodę/osprzęt
        montażowy.
    twill_direction:
      name: Kierunek diagonalny
      description: Wskazuje kierunek linii diagonalnej w splocie denimu.
    twist_direction:
      name: Kierunek przekręcania
      description: 'Kierunek skrętu przędzy/nici: skręt S lub skręt Z.'
    u_joint_series_size:
      name: Seria/rozmiar przegubu krzyżakowego
      description: Określa serię lub standard rozmiaru przegubu krzyżakowego, np.
        seria 1310.
    uilleann_pipes_bag_material:
      name: Materiał worka dud uilleann
      description: Materiał worka powietrznego, jeśli jest dołączony, wpływający na
        odczucie, trwałość i konserwację.
    uilleann_pipes_handedness:
      name: Stronność dud uilleann
      description: Wskazuje, czy zestaw jest skonfigurowany do gry praworęcznej czy
        leworęcznej.
    uilleann_pipes_set_configuration:
      name: Konfiguracja zestawu dud uilleann
      description: Określa konfigurację dud uilleann w zestawie na podstawie obecności
        regulatorów i burdonów.
    uk_childrens_shoe_size:
      name: Brytyjski rozmiar butów dziecięcych
      description: Określa rozmiar buta dziecięcego używany w Wielkiej Brytanii, np.
        4 lub 4 Wide
    uk_clothing_size:
      name: Rozmiar ubrania UK
      description: Określa rozmiar ubrania używany w Wielkiej Brytanii, np. 12 lub
        18
    uk_cup_size:
      name: Rozmiar miseczki UK
      description: Określa rozmiar miseczki biustonosza używany w Wielkiej Brytanii,
        np. C lub FF
    uk_mens_shoe_size:
      name: Rozmiar buta męskiego UK
      description: Określa rozmiar buta męskiego używany w Wielkiej Brytanii, np.
        9 lub 9 Wide
    uk_womens_shoe_size:
      name: Brytyjski rozmiar butów damskich
      description: Określa brytyjski rozmiar butów damskich, np. 6 lub 6 Wide.
    ukulele_back_and_sides_wood:
      name: Drewno płyty tylnej i boków ukulele
      description: Określa drewno/materiał użyty na płytę tylną i boki ukulele.
    ukulele_body_cutaway:
      name: Wycięcie korpusu ukulele
      description: Wskazuje, czy korpus ukulele koncertowego ma cutaway ułatwiający
        dostęp do wyższych progów.
    ukulele_body_shape:
      name: Kształt korpusu ukulele
      description: Ogólny styl/kształt korpusu ukulele.
    ukulele_bridge_material:
      name: Materiał mostka ukulele
      description: Określa materiał użyty na mostek ukulele.
    ukulele_construction_type:
      name: Typ konstrukcji ukulele
      description: 'Sposób konstrukcji płyty wierzchniej, płyty tylnej i boków instrumentu:
        lite lub laminowane.'
    ukulele_electronics_configuration:
      name: Konfiguracja elektroniki ukulele
      description: Wskazuje, czy ukulele jest wyłącznie akustyczne, czy ma wbudowaną
        elektronikę, np. przetwornik i/lub przedwzmacniacz, do nagłośnienia.
    ukulele_string_re_entrant_tuning:
      name: Strój re-entrant ukulele
      description: Wskazuje, czy ukulele jest ustawione w stroju re-entrant (high-G)
        czy liniowym/low-G; to częsta preferencja kupujących i wpływa na brzmienie.
    ukulele_top_wood:
      name: Drewno płyty wierzchniej ukulele
      description: Określa drewno/materiał użyty na płytę wierzchnią/płytę rezonansową
        ukulele.
    ukulele_tuner_mechanism:
      name: Mechanizm stroików ukulele
      description: Określa styl/mechanizm stroików używanych w ukulele.
    ukulele_tuner_type:
      name: Typ stroików ukulele
      description: Styl kluczy stroikowych używanych na główce ukulele.
    ukulele_tuning:
      name: Strój ukulele
      description: Określa zamierzony standardowy strój ukulele kieszonkowego.
    ultralight_aircraft_wing_configuration:
      name: Konfiguracja skrzydeł samolotu ultralekkiego
      description: Położenie i konfiguracja głównego skrzydła względem kadłuba/konstrukcji.
    under_bed_features:
      name: Cechy przestrzeni pod łóżkiem
      description: Określa podstawowy element funkcjonalny znajdujący się pod platformą
        łóżka.
    underfoot_strap_type:
      name: Typ paska pod stopą
      description: Określa materiał lub konstrukcję paska biegnącego pod obuwiem.
    underwear_fit:
      name: Dopasowanie bielizny
      description: Wskazuje ogólny profil dopasowania bokserek, np. slim, luźne, kompresyjne.
    underwear_pieces_included:
      name: Dołączone elementy bielizny
      description: 'Określa, które elementy odzieży są dołączone: góra, dół, oba lub
        jednoczęściowy kombinezon, aby klienci wiedzieli, czy kupują kompletny zestaw
        czy pojedynczy element.'
    uniform_pieces_included:
      name: Dołączone elementy munduru
      description: Określa, które elementy odzieży są dostarczane, np. koszula, spodnie,
        kamizelka, wyjaśniając zawartość pakietu przy zakupach hurtowych lub zestawach.
    uniform_role:
      name: Rola munduru
      description: Określa rolę zawodową lub służbę, do której przeznaczony jest element
        munduru, np. policja, szeryf, EMS.
    update_method:
      name: Metoda aktualizacji
      description: Sposób dostarczania aktualizacji firmware’u/oprogramowania skanera.
    upholstery_fabric_backing_type:
      name: Typ podkładu tkaniny obiciowej
      description: Określa podkład/laminację tkaniny obiciowej, wpływające na montaż
        i odczucie.
    upholstery_fabric_water_resistance:
      name: Wodoodporność tkaniny obiciowej
      description: Wskazuje odporność powierzchni tkaniny obiciowej na wodę i rozlane
        płyny.
    upper_material:
      name: Materiał cholewki
      description: Określa podstawowy materiał użyty w górnej części sneakersa, wpływający
        na oddychalność, trwałość i estetykę.
    upright_bass_pickup_system:
      name: System przetwornika kontrabasu
      description: Wskazuje, czy kontrabas ma zainstalowany system przetwornika/przedwzmacniacza
        przeznaczony do nagłośnienia.
    upright_piano_power_source:
      name: Źródło zasilania pianina
      description: Sposób zasilania pianina, mający zastosowanie zarówno do pianin
        akustycznych bez zasilania, jak i pianin z systemami silent/hybrydowymi wymagającymi
        prądu.
    urination_device_features:
      name: Cechy urządzenia do oddawania moczu
      description: Wyróżnia specjalne cechy konstrukcyjne zwiększające funkcjonalność
        lub wygodę.
    us_childrens_shoe_size:
      name: Rozmiar buta dziecięcego US
      description: Określa rozmiar buta dziecięcego używany w Stanach Zjednoczonych
        np. 5 lub 5 Wide
    us_clothing_size:
      name: Rozmiar ubrania US
      description: Określa rozmiar ubrania używany w Stanach Zjednoczonych, np. 8
        lub 14
    us_cup_size:
      name: Rozmiar miseczki US
      description: Określa rozmiar miseczki biustonosza używany w Stanach Zjednoczonych,
        np. C lub DDD
    us_mens_shoe_size:
      name: Rozmiar buta męskiego US
      description: Określa rozmiar buta męskiego używany w Stanach Zjednoczonych,
        np. 10 lub 10 Wide
    us_ring_size:
      name: Rozmiar pierścionka US
      description: Określa rozmiar pierścionka używany w Stanach Zjednoczonych, np.
        7 lub 9.5
    us_womens_shoe_size:
      name: Rozmiar buta damskiego US
      description: Określa rozmiar buta męskiego używany w Stanach Zjednoczonych,
        np. 8 lub 8 Wide
    usage:
      name: Zastosowanie
      description: Opisuje zamierzone zastosowanie/charakterystykę wałka rozrządu.
    usda_honey_grade:
      name: Klasa miodu USDA
      description: Wskazuje oficjalną klasę miodu przyznaną przez Departament Rolnictwa
        Stanów Zjednoczonych (USDA).
    user_control_method:
      name: Metoda sterowania przez użytkownika
      description: Wskazuje sposób interakcji użytkownika z maszyną, np. wbudowany
        panel sterowania, pilot, aplikacja, głos, informując o łatwości użytkowania.
    vacuum_boost_reference_port:
      name: Port referencyjny podciśnienia/doładowania
      description: Wskazuje, czy regulator ma port referencyjny kolektora dla podciśnienia/doładowania
        i jakiego jest typu.
    valve_base_shape:
      name: Kształt podstawy zaworu
      description: Określa geometrię interfejsu między podstawą zaworu a obręczą,
        np. okrągła, stożkowa, boczny port, T-kształtna, co wpływa na uszczelnienie
        i kompatybilność z wkładkami piankowymi.
    valve_core_type:
      name: Typ rdzenia zaworu
      description: Wskazuje, czy wkład zaworu jest wyjmowany, stały czy bezrdzeniowy,
        co wpływa na procedury konserwacji i kompatybilność z narzędziami do wstrzykiwania
        uszczelniacza.
    valve_cover_gasket_material:
      name: Materiał uszczelki pokrywy zaworów
      description: Określa materiał uszczelki pokrywy zaworów dołączonej do pokrywy
        zaworów lub zalecany materiał uszczelki, gdy produkt jest sprzedawany bez
        uszczelki, jeśli dotyczy.
    valve_cover_material:
      name: Materiał osłony zaworu
      description: Podstawowy materiał konstrukcyjny pokrywy zaworów.
    valve_design:
      name: Konstrukcja zaworu
      description: Określa konstrukcję/projekt zaworu silnika.
    valve_guard_coverage_area:
      name: Obszar pokrycia osłony zaworu
      description: Wskazuje, które części sekcji zaworów chroni osłona.
    valvetrain_configuration:
      name: Konfiguracja układu zaworowego
      description: Określa układ wałka rozrządu/układu zaworowego.
    varnish_formulation_base:
      name: Baza formuły lakieru
      description: Określa podstawową formułę/skład chemiczny lakieru do instrumentów
        smyczkowych, wpływające na wygląd, odwracalność i kompatybilność z istniejącymi
        wykończeniami.
    varnish_transparency_tint:
      name: Przezierność/odcień lakieru
      description: Opisuje, czy lakier jest bezbarwny czy barwiony, a jeśli barwiony
        — ogólną rodzinę odcienia.
    vegetable_matter_vm_content:
      name: Zawartość zanieczyszczeń roślinnych (VM)
      description: Ilość resztek roślinnych/zanieczyszczeń obecnych we włóknie.
    vegetable_preparation_style:
      name: Sposób przygotowania warzywa
      description: Opisuje, jak warzywo jest prezentowane, krojone lub inaczej przygotowane
        przed sprzedażą, np. całe, w kostce, różyczki.
    vehicle_audio_dsp_form_factor:
      name: Forma samochodowego procesora DSP
      description: Określa fizyczny format/montaż jednostki DSP.
    vehicle_battery_charger_features:
      name: Cechy ładowarki do akumulatora pojazdu
      description: Wymienia tryby pracy i wbudowane funkcje ładowarki do akumulatora
        pojazdu, np. tryb podtrzymania, odsiarczanie.
    vehicle_body_filler_form:
      name: Forma szpachli samochodowej
      description: Fizyczna forma/styl opakowania produktu szpachli do karoserii.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominalny rozmiar samochodowego głośnika współosiowego
      description: Nominalny rozmiar głośnika używany do dopasowania, np. 6,5 cala,
        6 × 9 cali.
    vehicle_cover_size_class:
      name: Klasa rozmiaru pokrowca na pojazd
      description: Ogólna grupa rozmiaru wskazująca, do jakiej wielkości pojazdu zaprojektowano
        pokrowiec.
    vehicle_decor_set_items_included:
      name: Elementy dołączone do zestawu dekoracji pojazdu
      description: Wymienia typy elementów dekoracyjnych dołączonych do zestawu akcesoriów,
        zapewniając kupującym widoczność na poziomie komponentów.
    vehicle_door_lock_actuation_method:
      name: Metoda uruchamiania zamka drzwi pojazdu
      description: Wskazuje, w jaki sposób zamek drzwi pojazdu jest uruchamiany lub
        sterowany.
    vehicle_door_lock_actuator_kit_contents:
      name: Zawartość zestawu siłownika zamka drzwi pojazdu
      description: 'Wskazuje, co jest dołączone do siłownika: sam siłownik albo osprzęt/cięgna/wsporniki/wiązka.'
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfiguracja okablowania siłownika zamka drzwi pojazdu
      description: Określa styl okablowania wymagany do montażu, czyli liczbę przewodów
        i ich funkcję.
    vehicle_door_lock_included_components:
      name: Dołączone komponenty zamka drzwi pojazdu
      description: Wymienia komponenty dołączone do opakowania, przydatne w przypadku
        zestawów/zespołów.
    vehicle_electrical_connector_type:
      name: Typ złącza elektrycznego pojazdu
      description: Określa styl złącza lub wtyczki elektrycznej regulatora/pola alternatora,
        z wyłączeniem głównej śruby wyjściowej B+.
    vehicle_equipment_fit_out_level:
      name: Poziom wyposażenia pojazdu
      description: Wskazuje poziom policyjnej zabudowy dołączonej do vana.
    vehicle_glass_cleaner_form:
      name: Forma środka do szyb samochodowych
      description: Fizyczny format produktu środka do szyb samochodowych, np. spray,
        pianka, chusteczki, żel, koncentrat.
    vehicle_hitch_cover_illumination_type:
      name: Typ podświetlenia osłony haka pojazdu
      description: Określa, czy osłona haka ma podświetlenie i jakiego rodzaju.
    vehicle_hitch_cover_mounting_type:
      name: Typ mocowania osłony haka pojazdu
      description: Wskazuje metodę utrzymywania/mocowania osłony haka w gnieździe
        haka.
    vehicle_license_plate_finish:
      name: Wykończenie tablicy rejestracyjnej pojazdu
      description: Wykończenie powierzchni tablicy.
    vehicle_license_plate_frame_anti_theft_design:
      name: Konstrukcja antykradzieżowa ramki tablicy rejestracyjnej pojazdu
      description: Elementy konstrukcyjne związane z bezpieczeństwem, mające utrudniać
        demontaż lub manipulację.
    vehicle_license_plate_frame_plate_standard:
      name: Standard tablicy rejestracyjnej dla ramki
      description: Standard/region tablicy rejestracyjnej, do którego dopasowana jest
        ramka.
    vehicle_license_plate_frame_profile:
      name: Profil ramki tablicy rejestracyjnej pojazdu
      description: Sposób, w jaki ramka otacza tablicę, czyli zakres zakrycia/kształt,
        wpływający na czytelność i zgodność z przepisami.
    vehicle_license_plate_mounting_hole_count:
      name: Liczba otworów montażowych tablicy rejestracyjnej pojazdu
      description: Liczba otworów montażowych w tablicy.
    vehicle_license_plate_mounting_hole_pattern:
      name: Układ otworów montażowych tablicy rejestracyjnej pojazdu
      description: Układ rozmieszczenia otworów montażowych w tablicy.
    vehicle_license_plate_reflectivity:
      name: Odblaskowość tablicy rejestracyjnej pojazdu
      description: Wskazuje, czy i w jaki sposób powierzchnia tablicy odbija światło,
        co jest ważne dla widoczności i zgodności z przepisami w przypadku niektórych
        tablic dekoracyjnych.
    vehicle_license_plate_size_standard:
      name: Standard rozmiaru tablicy rejestracyjnej pojazdu
      description: Wskazuje regionalny/pojazdowy standard, do którego dopasowany jest
        rozmiar tablicy, z uwzględnieniem rozstawu otworów montażowych i wymiarów
        całkowitych.
    vehicle_license_plate_text_style:
      name: Styl tekstu tablicy rejestracyjnej pojazdu
      description: Styl znaków na tablicy, jeśli występują, w tym wypukłe lub nadrukowane.
    vehicle_license_plate_theme:
      name: Motyw tablicy rejestracyjnej pojazdu
      description: Ogólny motyw graficzny tablicy.
    vehicle_lift_actuation_method:
      name: Metoda uruchamiania podnośnika pojazdu
      description: Sposób zasilania/uruchamiania podnośnika lub lewarka w celu podniesienia
        pojazdu.
    vehicle_lift_mounting_type:
      name: Typ montażu podnośnika pojazdu
      description: Wskazuje, w jaki sposób podnośnik jest instalowany lub kotwiony
        w miejscu pracy.
    vehicle_lift_type:
      name: Typ podnośnika pojazdu
      description: Określa styl konstrukcji podnośnika pojazdu używanego do serwisowania
        lub przechowywania, np. 2-kolumnowy, 4-kolumnowy, nożycowy.
    vehicle_magnet_attachment_type:
      name: Typ mocowania magnesu samochodowego
      description: Określa podstawową metodę mocowania/montażu produktów sprzedawanych
        jako magnesy samochodowe, np. wyłącznie magnetyczne lub magnetyczne ze wspomaganiem
        klejem.
    vehicle_magnet_intended_use:
      name: Zamierzone użycie magnesu samochodowego
      description: Wskazuje podstawowy zamierzony sposób użycia magnesu samochodowego.
    vehicle_mirror_adjustment_type:
      name: Typ regulacji lusterka pojazdu
      description: Określa sposób regulacji/sterowania lusterkiem.
    vehicle_mirror_glass_type:
      name: Typ szkła lusterka pojazdu
      description: Określa typ optyczny/kształt powierzchni szkła lusterka.
    vehicle_organizer_features:
      name: Cechy organizera samochodowego
      description: Kluczowe funkcje organizerów samochodowych, takie jak składanie,
        wodoodporna podszewka, kieszenie termoizolacyjne lub antypoślizgowy spód.
    vehicle_paint_chemistry_base:
      name: Skład chemiczny/baza lakieru samochodowego
      description: Wskazuje formułę/skład chemiczny lakieru samochodowego.
    vehicle_polish_application_method:
      name: Metoda aplikacji politury samochodowej
      description: Określa zalecaną metodę lub narzędzie do nakładania politury samochodowej.
    vehicle_pursuit_package:
      name: Pakiet pościgowy pojazdu
      description: Wskazuje, czy pojazd jest wyposażony w pakiet osiągów do służby
        pościgowej przeznaczony do użytku policyjnego, np. ulepszone chłodzenie, hamulce,
        zawieszenie i kalibrację.
    vehicle_safety_equipment_position:
      name: Położenie wyposażenia bezpieczeństwa pojazdu
      description: Określa, gdzie na pojeździe lub w pojeździe wyposażenie bezpieczeństwa
        ma być używane albo zamontowane.
    vehicle_safety_equipment_visibility_features:
      name: Cechy widoczności wyposażenia bezpieczeństwa pojazdu
      description: Wskazuje cechy poprawiające widoczność, zaprojektowane w celu zwiększenia
        zauważalności.
    vehicle_seat_row:
      name: Rząd siedzenia pojazdu
      description: Wskazuje, do którego tylnego rzędu przeznaczone jest siedzenie,
        np. drugi lub trzeci rząd, w tym zastosowania z tylnym siedzeniem składanym.
    vehicle_steering_assist_type:
      name: Typ wspomagania kierownicy pojazdu
      description: Określa system wspomagania kierownicy, do którego zaprojektowano
        komponent.
    vehicle_steering_wheel_lock_form_factor:
      name: Forma blokady kierownicy pojazdu
      description: Opisuje fizyczny styl blokady i sposób jej współpracy z kierownicą
        oraz opcjonalnie innymi elementami sterowania.
    vehicle_wax_polish_product_form:
      name: Forma wosku/politury samochodowej
      description: Fizyczna forma/sposób dozowania wosku, politury, środka ochronnego
        lub sealantu.
    vehicle_wheel_valve_stem_type:
      name: Typ wentyla koła pojazdu
      description: Określa obsługiwany lub dołączony typ wentyla.
    vehicle_windshield_fluid_formula:
      name: Formuła płynu do spryskiwaczy
      description: Podstawowy zakres czyszczenia/usuwania zabrudzeń formuły płynu
        do spryskiwaczy.
    veil_length_type:
      name: Typ długości welonu
      description: Klasyfikuje welon z użyciem standardowej terminologii długości
        zamiast pomiaru liczbowego.
    vellum_opacity_level:
      name: Poziom nieprzezroczystości welinu
      description: Wskazuje, jak półprzezroczysty lub nieprzezroczysty jest arkusz
        welinu.
    ventilation_configuration:
      name: Konfiguracja wentylatora
      description: Podstawowa konfiguracja wentylacji/wlotów i wylotów powietrza kasku.
    ventilation_control_type:
      name: Typ sterowania wentylatorem
      description: Określa styl zarządzania przepływem powietrza wbudowany w kask.
    ventilation_level:
      name: Poziom wentylacji
      description: Wskazuje względny przepływ powietrza/konstrukcję wentylacji ochraniacza.
    venting_design:
      name: Konstrukcja wentylacji
      description: Określa, czy i w jaki sposób pokrowiec jest wentylowany, aby ograniczać
        kondensację i pleśń podczas przechowywania.
    vestibule_type:
      name: Typ przedsionka
      description: Klasyfikuje układ przedsionka względem namiotu.
    vibraphone_bar_material:
      name: Materiał sztabek wibrafonu
      description: Materiał sztabek/klawiszy dźwiękowych wibrafonu, czyli elementów
        wytwarzających dźwięk.
    vibraphone_motor_type:
      name: Typ silnika wibrafonu
      description: Typ silnika używanego do napędzania obracających się wentylatorów
        rezonatorów dla efektu vibrato, jeśli występuje.
    vibraphone_range_octaves:
      name: Zakres wibrafonu (oktawy)
      description: Zakres wysokości dźwięku wibrafonu wyrażony w oktawach, np. 3 oktawy,
        3,5 oktawy.
    vibraphone_resonator_tube_material:
      name: Materiał rur rezonatorowych wibrafonu
      description: Materiał rur rezonatorowych wibrafonu znajdujących się pod sztabkami.
    vibraphone_tuning_standard:
      name: Standard stroju wibrafonu
      description: Wysokość referencyjna używana do strojenia, np. A=440 Hz.
    viewing_sides:
      name: Strony wyświetlania
      description: 'Określa, na ilu stronach tablica wyników wyświetla informacje:
        jednostronna, dwustronna, czterostronna itp.'
    vintage_advertisement_decade:
      name: Dekada reklamy vintage
      description: Określa dekadę, w której reklama została pierwotnie wydrukowana
        lub wyprodukowana, w przybliżeniu, jeśli dokładny rok nie jest znany.
    vintage_advertisement_format:
      name: Format reklamy w stylu vintage
      description: Określa fizyczny format lub nośnik kolekcjonerskiej reklamy vintage.
    vintage_advertisement_subject_category:
      name: Kategoria tematu reklamy vintage
      description: Określa kategorię produktu/usługi reklamowanej w reklamie, czyli
        czego dotyczy reklama.
    vintage_classic_truck_cab_type:
      name: Typ kabiny ciężarówki vintage/klasycznej
      description: Konfiguracja kabiny/styl nadwozia przedziału pasażerskiego ciężarówki.
    virginia_tech_helmet_star_rating:
      name: Ocena gwiazdkowa kasku Virginia Tech
      description: Ocena bezpieczeństwa przyznana przez Virginia Tech Helmet Lab,
        od 0 do 5 gwiazdek.
    virtual_analog_synthesizer_form_factor:
      name: Forma syntezatora virtual analog
      description: 'Określa fizyczny format obudowy syntezatora: klawiatura lub moduł/rack.'
    viscosity_thickness:
      name: Lepkość/gęstość
      description: Opisuje, jak gęsta lub płynna jest angoba w sprzedaży lub przy
        zalecanej konsystencji roboczej.
    vise_configuration:
      name: Konfiguracja imadła
      description: Określa układ konstrukcyjny lub liczbę elementów w zestawie imadła,
        co wpływa na przenośność i złożoność konfiguracji.
    visibility_features:
      name: Funkcje poprawiające widoczność
      description: Wyróżnia elementy konstrukcyjne zwiększające widoczność rowerzysty
        w ruchu drogowym.
    visor_brim_type:
      name: Typ daszka/osłony
      description: Określa obecność i styl daszka lub ronda na kasku.
    visor_configuration:
      name: Konfiguracja osłony
      description: Opisuje obecność i styl wbudowanego daszka lub osłony twarzy.
    visor_lens_finish:
      name: Wykończenie soczewki wizjera
      description: Określa przyciemnienie, wykończenie optyczne lub styl graficzny
        zastosowany na soczewce wizjera.
    visor_style:
      name: Styl daszka
      description: Wskazuje, czy kaptur ma daszek i jaka jest jego konfiguracja.
    voc_compliance_standard:
      name: Standard zgodności VOC
      description: Deklaracja zgodności produktu z przepisami VOC, jeśli dotyczy.
    voc_regulatory_class:
      name: Klasa regulacyjna VOC
      description: Deklarowana klasa regulacyjna/zgodności VOC produktu, zgodnie z
        etykietą/SDS, używana do regionalnych ograniczeń regulacyjnych i środowiskowych.
    vodka_base_ingredient:
      name: Składnik bazowy wódki
      description: Podstawowy składnik rolny, z którego destylowana jest wódka, np.
        pszenica, ziemniaki, kukurydza.
    voice_coil_configuration:
      name: Konfiguracja cewki drgającej
      description: Liczba/układ cewek drgających dla elastyczności okablowania i opcji
        impedancji.
    voice_effects:
      name: Efekty głosowe
      description: Wbudowane typy efektów głosowych obsługiwane przez zestaw karaoke.
    voltage_rating_type:
      name: Typ znamionowego napięcia
      description: Określa, czy napięcie znamionowe bezpiecznika dotyczy AC, DC czy
        obu.
    voltage_regulator_connector_type:
      name: Typ złącza regulatora napięcia
      description: Określa styl połączenia/zacisku używany do podłączenia regulatora
        do okablowania pojazdu/alternatora/prądnicy.
    wader_foot_type:
      name: Typ stopy woderów
      description: Określa, czy wodery mają zintegrowane buty czy oddzielne stopy
        skarpetowe.
    wader_sole_type:
      name: Typ podeszwy woderów
      description: Określa materiał podeszwy zewnętrznej lub typ przyczepności używany
        w butach do brodzenia albo woderach z butami.
    waistband_style:
      name: Styl pasa
      description: Opisuje konstrukcję pasa i sposób jego zapinania lub regulacji
        pod kątem dopasowania i komfortu.
    wakeboard_binding_mounting_pattern:
      name: Układ mocowań wiązań wakeboardu
      description: Określa układ insertów/płytek na wakeboardzie, z którym kompatybilne
        są wiązania.
    wakeboard_riding_style:
      name: Styl jazdy na wakeboardzie
      description: Klasyfikuje zamierzone środowisko lub styl użytkowania wakeboardu.
    wall_decal_style:
      name: Styl naklejki ściennej
      description: Określa sposób wykonania/aplikacji naklejki, np. wycinana po obrysie,
        transferowa, arkusz naklejek.
    wallyball_equipment_included:
      name: Wyposażenie do wallyballa w zestawie
      description: Wymienia konkretne elementy dostarczane w zestawie do wallyballa,
        aby kupujący dokładnie wiedzieli, co kupują, i mogli porównać pakiety.
    warp_beam_type:
      name: Typ wału osnowowego
      description: Określa konfigurację wału osnowowego dołączoną lub zainstalowaną
        w krośnie, czyli układ wału dostarczany z krosnem.
    washability:
      name: Możliwość prania
      description: Wskazuje, czy klej można zmyć wodą i/lub czy jest zmywalny po aplikacji.
    watch_band_design:
      name: Konstrukcja paska do zegarka
      description: Opisuje styl konstrukcji lub wzór paska do zegarka, np. NATO, mediolański,
        bransoletowy.
    watch_movement:
      name: Mechanizm zegarka
      description: Określa mechanizm napędzający zegarek, co jest kluczowym elementem,
        na podstawie którego klienci rozróżniają poszczególne modele.
    water_activation:
      name: Aktywacja wody
      description: Określa, czy sygnalizator może zostać automatycznie aktywowany
        po zanurzeniu w wodzie (typowe dla nadajników EPIRB kategorii I/II).
    water_chamber_configuration:
      name: Konfiguracja komory wodnej
      description: Opisuje wewnętrzny układ zbiornika elastycznego, taki jak pojedyncza
        lub podwójna komora, który wpływa na podparcie, kontrolę temperatury i komfort
        partnera.
    water_dispensing_mechanism:
      name: Mechanizm dozowania wody
      description: Określa sposób, w jaki woda jest uwalniana z elementu, np. przez
        krany, dysze natryskowe lub wylew grawitacyjny.
    water_exposure_protection_level:
      name: Poziom ochrony przed wodą
      description: Określa poziom ochrony produktu w przypadku narażenia na działanie
        wody (np. zachlapanie lub chwilowe zanurzenie). Jeśli dostępny jest oficjalny
        kod IP, należy stosować klasę ochrony IP.
    water_fed_design:
      name: Konstrukcja z zasilaniem wodą
      description: Wskazuje, czy szczotka jest zaprojektowana do użycia z bieżącą
        wodą przez uchwyt przepływowy lub podłączenie węża.
    water_gun_features:
      name: Cechy pistoletu na wodę
      description: Godne uwagi cechy funkcjonalne oraz możliwości pistoletu na wodę.
    water_gun_operating_mechanism:
      name: Mechanizm działania pistoletu na wodę
      description: W jaki sposób pistolet na wodę spręża i wyrzuca wodę podczas użytkowania.
    water_gun_spray_pattern:
      name: Wzór strumienia wody z pistoletu na wodę
      description: Rodzaj strumienia wody wytwarzanego przez dyszę podczas wystrzeliwania.
    water_heating_method:
      name: Metoda podgrzewania wody
      description: Opisuje, jak i czy woda jest podgrzewana przed użyciem, np. przez
        absorpcję słoneczną, palniki propanowe, elementy elektryczne, ogrzewanie bateryjne,
        izolację utrzymującą ciepło lub bez podgrzewania.
    water_mattress_construction:
      name: Konstrukcja materaca wodnego
      description: Określa styl konstrukcji materaca wodnego, np. hardside lub softside,
        który determinuje kompatybilność z ramą i ogólne odczucie.
    water_play_features:
      name: Cechy zabawki do wody
      description: Elementy do aktywności wodnych dołączone do parku wodnego/zjeżdżalni.
    water_polo_competition_approval:
      name: Zatwierdzenie piłki do water polo
      description: Określa organ zarządzający lub poziom rozgrywek, dla którego piłka
        jest oficjalnie zatwierdzona lub certyfikowana.
    water_polo_goal_type:
      name: Typ bramki do water polo
      description: Klasyfikuje konfigurację konstrukcyjną lub montażową bramki, np.
        pływająca, montowana do brzegu basenu, przenośna.
    water_pump_drive_type:
      name: Typ napędu pompy wody
      description: Określa sposób napędzania/uruchamiania pompy wody w układzie chłodzenia
        pojazdu.
    water_pump_housing_material:
      name: Materiał obudowy pompy wody
      description: Materiał obudowy/korpusu pompy wody.
    water_pump_impeller_material:
      name: Materiał wirnika pompy wody
      description: Określa materiał wirnika pompy wody, czyli wewnętrznego rotora/łopatek
        przemieszczających płyn chłodzący.
    water_pump_mounting_type:
      name: Typ montażu pompy wody
      description: Określa styl montażu/formę pompy wody pod kątem dopasowania do
        silnika, np. przykręcana obudowa lub wkład/kaseta.
    water_purification_method:
      name: Metoda oczyszczania wody
      description: Określa podstawowy mechanizm, dzięki któremu produkt uzdatnia wodę
        do picia w terenie, np. pompka, przepływ grawitacyjny lub światło UV.
    water_resistance:
      name: Wodoodporność
      description: Informuje o stopniu ochrony przed warunkami pogodowymi, np. wodoodporność
        lub hydrofobowość.
    water_resistance_level:
      name: Poziom wodoodporności
      description: Wskazuje, czy tkanina odpycha wodę i na jakim poziomie.
    water_resistance_rating_case_protection_level:
      name: Klasa wodoodporności (poziom ochrony futerału)
      description: Wskazuje poziom wodoodporności/ochrony zapewnianej przez futerał
        na kółkach, na poziomie marketingowym, nie jako uszczelnienie elektroniki
        IP, np. hydrofobowy lub wodoodporny.
    water_rocket_kit_items_included:
      name: Elementy dołączone do zestawu rakiety wodnej
      description: Główne komponenty dołączone do opakowania produktu.
    water_rocket_propulsion_type:
      name: Typ napędu rakiety wodnej
      description: Podstawowe źródło napędu/energii używane do wystrzelenia rakiety.
    water_rocket_recovery_system:
      name: System odzysku rakiety wodnej
      description: Metoda odzyskiwania rakiety po starcie.
    water_ski_base_design:
      name: Konstrukcja spodu nart wodnych
      description: Określa profil dolnej części nart wodnych, który wpływa na właściwości
        prowadzenia.
    water_ski_fin_type:
      name: Typ statecznika narty wodnej
      description: Określa konfigurację statecznika narty wodnej, która wpływa na
        trzymanie toru i zwrotność.
    water_source:
      name: Źródło wody
      description: Określa pochodzenie wody przed nasyceniem dwutlenkiem węgla.
    water_sports_safety_standard:
      name: Norma bezpieczeństwa sportów wodnych
      description: Wymienia formalne normy bezpieczeństwa lub wyporności spełniane
        przez produkt, np. CE EN 1385 dla kasków, ISO 12402-5 dla kamizelek asekuracyjnych,
        USCG Type III.
    water_table_feature_set:
      name: Zestaw funkcji stolika wodnego
      description: Wyróżnia wbudowane funkcje zabawy stolika wodnego, takie jak wodospady,
        spryskiwacze, pompki lub wielopoziomowe baseny.
    water_table_items_included:
      name: Elementy dołączone do stolika wodnego
      description: Określa akcesoria dołączone do zestawu stolika wodnego, np. łódki,
        kubeczki, lejki, figurki.
    water_table_water_source_type:
      name: Typ źródła wody stolika wodnego
      description: Określa, jak stolik wodny jest napełniany lub zasilany wodą.
    waterbed_stabilization_level:
      name: Poziom stabilizacji łóżka wodnego
      description: Wskazuje stopień redukcji falowania lub kontroli ruchu zapewniany
        przez materac łóżka wodnego.
    watercolor_ink_water_resistance_after_drying:
      name: Wodoodporność tuszu akwarelowego po wyschnięciu
      description: Wskazuje, czy tusz akwarelowy staje się wodoodporny po wyschnięciu,
        zgodnie z deklaracją producenta.
    watercraft_care_application_area:
      name: Obszar zastosowania środka do pielęgnacji jednostki pływającej
      description: Wskazuje główny obszar lub komponent jednostki pływającej, do którego
        produkt jest przeznaczony.
    watercraft_drive_mechanism:
      name: Mechanizm napędu jednostki pływającej
      description: Opisuje konkretny pokładowy mechanizm napędowy zainstalowany lub
        obsługiwany.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Układ czujnika poziomu paliwa zbiornika jednostki pływającej
      description: Określa wzór/standard montażu czujników poziomu paliwa w zbiorniku
        i kompatybilnych wskaźników, np. popularne morskie układy śrub.
    watercraft_fuel_tank_shape:
      name: Kształt zbiornika paliwa jednostki pływającej
      description: Opisuje ogólną formę fizyczną zbiornika paliwa, aby ułatwić planowanie
        miejsca/dopasowania.
    watercraft_hull_material:
      name: Materiał kadłuba jednostki pływającej
      description: Określa podstawowy materiał konstrukcji kadłuba.
    watercraft_ignition_part_voltage:
      name: Napięcie części zapłonowej jednostki pływającej
      description: Nominalne napięcie znamionowe/wymagane dla części zapłonowej, jeśli
        dotyczy, np. systemy 12 V.
    watercraft_impeller_material_grade:
      name: Klasa materiału wirnika jednostki pływającej
      description: Określa materiał wirnika jednostki pływającej, np. guma neoprenowa,
        nitryl, brąz.
    watercraft_lighting_certification_compliance:
      name: Certyfikacja/zgodność oświetlenia jednostki pływającej
      description: Wskazuje zgodność z przepisami/normami, do których certyfikowano
        światło do użytku morskiego, np. zgodne z USCG/ABYC/COLREGs.
    watercraft_motor_mount_adjustment_features:
      name: Funkcje regulacji mocowania silnika jednostki pływającej
      description: Możliwości regulacji mocowania, np. tilt, podnoszenie, przesuw,
        wpływające na wygodę użycia i dopasowanie.
    watercraft_piston_part_type:
      name: Typ części tłoka jednostki pływającej
      description: Określa, jakiego komponentu związanego z tłokiem dotyczy oferta.
    watercraft_propeller_blade_rake:
      name: Rake łopaty śruby napędowej jednostki pływającej
      description: Określa rake łopaty, czyli kąt łopaty względem piasty, wpływający
        na unoszenie dziobu i osiągi.
    watercraft_propeller_rotation_direction:
      name: Kierunek obrotu śruby napędowej jednostki pływającej
      description: Wskazuje wymagany kierunek obrotu/stronność śruby napędowej pod
        kątem kompatybilności z układem napędowym, np. prawoskrętna/standardowa lub
        lewoskrętna/przeciwbieżna.
    watercraft_pump_stage_impeller_role:
      name: Stopień pompy / rola wirnika jednostki pływającej
      description: Określa, czy wirnik jest przeznaczony do konkretnej roli w pompie,
        np. pompa wody surowej/morskiej, obieg płynu chłodzącego, pompa jet.
    watercraft_registration_status:
      name: Status rejestracji jednostki pływającej
      description: Wskazuje, czy żaglówka obejmuje dokumenty własności i/lub rejestracyjne.
    watercraft_safety_equipment_activation_type:
      name: Typ aktywacji wyposażenia bezpieczeństwa jednostki pływającej
      description: Podstawowa metoda aktywacji urządzenia bezpieczeństwa, np. dla
        beaconów, alarmów MOB lub PLB, odrębna od inflacji.
    watercraft_steering_cable_core_material:
      name: Materiał rdzenia linki sterowej jednostki pływającej
      description: Określa materiał wewnętrznej linki/rdzenia przenoszącego siłę.
    watercraft_steering_cable_hardware_included:
      name: Osprzęt dołączony do linki sterowej jednostki pływającej
      description: Określa osprzęt montażowy i akcesoria dołączone do linki sterowej.
    watercraft_steering_cable_system_type:
      name: Typ systemu linki sterowej jednostki pływającej
      description: Określa architekturę systemu sterowania, do której zaprojektowano
        linkę, np. rotary, rack.
    watercraft_steering_wheel_hub_bore_type:
      name: Typ piasty/otworu kierownicy jednostki pływającej
      description: Określa styl centralnego mocowania/interfejsu otworu, np. stożkowy,
        wielowypustowy, w miejscu połączenia koła z piastą lub adapterem.
    watercress_variety:
      name: Odmiana rukwi wodnej
      description: Określa konkretną odmianę lub typ rzeżuchy w sprzedaży.
    waterproof_level:
      name: Poziom wodoodporności
      description: Wskazuje poziom ochrony obuwia przed wodą, w tym deklaracje wodoodporności
        objęte gwarancją.
    wax_blend_composition:
      name: Skład mieszanki wosku
      description: Wymienia materiały woskowe zmieszane w produkcie i/lub deklarowany
        typ mieszanki.
    wax_coat_type:
      name: Typ warstwy wosku
      description: Wskazuje, czy wosk jest przeznaczony jako warstwa bazowa, warstwa
        wierzchnia czy formuła uniwersalna/jednowarstwowa.
    wax_hardness:
      name: Twardość wosku
      description: Wskazuje względną twardość wosku, wpływającą na trwałość i poślizg
        na różnych typach śniegu.
    wax_physical_form:
      name: Fizyczna forma wosku
      description: Wskazuje fizyczną formę/kształt surowego wosku do świec w sprzedaży.
    wax_recommended_candle_application:
      name: Zalecane zastosowanie wosku do świec
      description: Wskazuje podstawowe style świec, do których opracowano wosk.
    wax_tackiness_level:
      name: Poziom lepkości wosku
      description: Opisuje poziom lepkości/przyczepności, jaki wosk zapewnia na łopatce
        kija.
    weapon_system_integration:
      name: Integracja z systemem broni
      description: Wskazuje, czy pojazd ma zintegrowane systemy uzbrojenia lub mocowania
        broni.
    weather_suitability:
      name: Przydatność pogodowa
      description: Wskazuje warunki środowiskowe, do których zaprojektowano rękawice,
        np. gra w chłodne dni lub w mokrych warunkach.
    weave_finish:
      name: Splot/wykończenie
      description: Opisuje podstawowy splot tkaniny lub wykończenie powierzchni wpływające
        na teksturę i połysk krawata.
    weave_style:
      name: Styl splotu
      description: Określa tradycyjny wzór splotu używany przy wyrobie kapelusza panama,
        wpływający na oddychalność, elastyczność, wygląd i cenę.
    weave_type:
      name: Typ splotu
      description: Określa styl splotu/konstrukcji tkaniny, czyli handlową nazwę splotu,
        wpływający na teksturę, połysk i układanie się materiału.
    weaving_beater_edge_type:
      name: Typ krawędzi płochy tkackiej
      description: Opisuje profil roboczej krawędzi płaskiej płochy, która styka się
        z wątkiem, np. prosta lub ząbkowana.
    weaving_beater_style:
      name: Styl płochy tkackiej
      description: Określa funkcjonalny styl/format płaskiej płochy tkackiej.
    weaving_shuttle_tip_style:
      name: Styl końcówki czółenka tkackiego
      description: Określa konstrukcję przedniej końcówki/noska czółenka, która wpływa
        na przechodzenie przez przesmyk i ryzyko zaczepiania nitek osnowy.
    weaving_shuttle_use_case:
      name: Zastosowanie czółenka tkackiego
      description: Określa zamierzone zastosowanie tkackie, do którego czółenko jest
        zaprojektowane lub zoptymalizowane.
    webbing_construction_type:
      name: Typ konstrukcji taśmy
      description: Opisuje fizyczny splot lub styl plecenia taśmy, który wpływa na
        obsługę, wytrzymałość i zamierzone użycie.
    webbing_design:
      name: Konstrukcja błony między palcami
      description: Opisuje styl błony między palcami, który wpływa na trening oporowy
        i napęd w wodzie.
    weight_adjustability:
      name: Możliwość regulacji masy
      description: Opisuje, czy opór produktu może być zmieniany przez użytkownika,
        np. selekcyjnie lub przez dokładanie obciążenia, czy jest stały i ma jedną
        wagę.
    weight_integration_system:
      name: System integracji obciążenia
      description: Opisuje, czy i w jaki sposób obciążniki balastowe są zintegrowane
        z jacketem BCD, np. wypinane kieszenie balastowe, brak, opcjonalny dodatek.
    weight_plate_compatibility:
      name: Kompatybilność z talerzami obciążeniowymi
      description: 'Określa, jaką średnicę talerzy obciążeniowych obsługuje maszyna:
        olimpijskie, standardowe lub oba typy.'
    weight_plate_style:
      name: Styl talerza obciążeniowego
      description: Klasyfikuje konstrukcję/typ talerza obciążeniowego, np. olimpijski,
        bumper, selekcyjny, do szybkiego filtrowania kompatybilności.
    weightlifting_belt_style:
      name: Styl pasa do podnoszenia ciężarów
      description: Klasyfikuje ogólną konstrukcję lub konfigurację pasa według przeznaczenia,
        np. pas z klamrą dźwigniową, pas do dipów, pas zwężany.
    weightlifting_federation_certification:
      name: Certyfikacja federacji podnoszenia ciężarów
      description: Oficjalne zatwierdzenie lub zgodność produktu z wymogami federacji
        sportów siłowych, takich jak IPF lub IWF.
    wetsuit_boot_height:
      name: Wysokość buta neoprenowego
      description: Klasyfikuje wysokość/krój buta na nodze, wpływający na zakres zakrycia,
        mobilność i przedostawanie się wody.
    wetsuit_entry_system:
      name: System zakładania pianki
      description: Opisuje typ i położenie otwarcia/systemu zamka używanego do zakładania
        pianki.
    wetsuit_seam_construction:
      name: Konstrukcja szwów pianki
      description: Określa sposób wykonania i uszczelnienia szwów, wpływający na ciepło,
        elastyczność i trwałość.
    wheat_product_form:
      name: Forma produktu pszennego
      description: Określa fizyczną lub przetworzoną formę produktu pszennego.
    wheel_arrangement:
      name: Układ osi
      description: Określa układ osi lokomotywy parowej według notacji Whyte’a, będący
        cechą definiującą i częstym terminem kolekcjonerskim/wyszukiwawczym.
    wheel_brake_type:
      name: Typ hamulca koła
      description: Opisuje konfigurację hamulców kół lub kółek wózka.
    wheel_chock_grip_features:
      name: Cechy przyczepności klina pod koło
      description: Cechy konstrukcyjne trakcji i chwytu poprawiające siłę utrzymania
        na nawierzchniach i przy oponach.
    wheel_cleaner_acidity_ph_category:
      name: Kwasowość/kategoria pH środka do felg
      description: Wskazuje, czy środek do felg jest kwasowy, neutralny czy zasadowy,
        oraz opcjonalnie czy jest opisywany jako zrównoważony pH.
    wheel_cleaner_formula_type:
      name: Typ formuły środka do felg
      description: W przypadku środków do felg i powiązanych preparatów myjących wskazuje
        podstawową kategorię formuły produktu, np. na bazie kwasu, bezkwasowy, neutralny/zrównoważony
        pH lub reagujący z żelazem.
    wheel_construction_type:
      name: Typ konstrukcji koła
      description: Określa metodę produkcji/konstrukcji koła.
    wheel_contaminant_target:
      name: Docelowe zabrudzenia felg
      description: Określa podstawowe typy zabrudzeń, do usuwania których zaprojektowano
        środek.
    wheel_core_type:
      name: Typ rdzenia koła
      description: Opisuje styl konstrukcji rdzenia koła, który wpływa na wagę, sztywność
        i przenoszenie energii.
    wheel_cylinder_inlet_port_thread_standard:
      name: Standard gwintu portu wejściowego cylinderka hamulcowego
      description: Określa standard gwintu portu wejściowego przewodu hamulcowego
        w cylinderku hamulcowym, np. metryczny bubble flare lub SAE inverted flare.
    wheel_fastener_seat_type:
      name: Typ gniazda mocowania koła
      description: Określa styl gniazda nakrętki/śruby koła, które styka się z kołem,
        np. stożkowe, kulowe/radius, płaskie, mag/shank.
    wheel_illumination:
      name: Podświetlenie kół
      description: Wskazuje, czy koło ma wbudowane oświetlenie lub funkcje świecenia.
    wheel_material:
      name: Materiał kół
      description: Określa podstawowy skład kół, wpływający na trwałość, przyczepność
        i tłumienie drgań.
    wheel_profile:
      name: Profil koła
      description: Opisuje kształt przekroju koła, który wpływa na szybkość, przyczepność
        i zwinność.
    wheel_setup_type:
      name: Typ konfiguracji kół
      description: Definiuje styl konfiguracji kół zastosowany w rolkach/wrotkach.
    wheel_system_finish:
      name: Wykończenie systemu kół
      description: Wykończenie powierzchni/powłoka obręczy/kół oraz niektórych części
        i akcesoriów do kół.
    whip_style:
      name: Styl bata
      description: Klasyfikuje produkt według konkretnego stylu bata lub palcata jeździeckiego
        albo zamierzonej dyscypliny.
    whipped_cream_base:
      name: Baza bitej śmietany
      description: Określa podstawowy składnik bazowy używany do produkcji bitej śmietany,
        np. śmietanka mleczna lub kokosowa.
    whipped_cream_form:
      name: Forma bitej śmietany
      description: Wskazuje fizyczny format, w jakim sprzedawana jest bita śmietana.
    whistle_head_material:
      name: Materiał głowicy gwizdka
      description: Określa materiał głowicy/ustnika gwizdka, czyli bloku fipple/głowicy.
    whistle_light_features:
      name: Funkcje świetlne gwizdka
      description: Wskazuje, czy gwizdek ma zintegrowane efekty świetlne na imprezy,
        np. LED.
    whistle_purpose:
      name: Przeznaczenie gwizdka
      description: Określa podstawowe zamierzone zastosowanie gwizdka, np. trening
        sportowy, bezpieczeństwo morskie, szkolenie psów.
    whistle_sound_style:
      name: Styl dźwięku gwizdka
      description: Opisuje styl/charakter dźwięku gwizdka, np. jednotonowy lub wielotonowy.
    white_glue_finish_appearance_when_dry:
      name: Wykończenie/wygląd białego kleju po wyschnięciu
      description: Określa wygląd kleju po wyschnięciu do zastosowań rękodzielniczych/biurowych,
        np. przezroczysty lub nieprzezroczysty.
    white_glue_washability:
      name: Zmywalność białego kleju
      description: Wskazuje, czy wyschnięty klej można wyprać/wyczyścić z tkanin lub
        skóry.
    whitewater_kayak_style:
      name: Styl kajaka górskiego
      description: Podstawowe przeznaczenie konstrukcyjne w segmencie kajaków górskich,
        np. creekboat, river runner, playboat.
    whitewater_rating_class:
      name: Skala trudności rzek górskich
      description: Najwyższa klasa Międzynarodowej Skali Trudności Rzek, do której
        obsługi ponton jest oceniony.
    whorl_mounting_interface:
      name: Interfejs montażowy przęślika
      description: Sposób mocowania przęślika do kołowrotka przędzalniczego, czyli
        styl osi/połączenia.
    wick_construction_type:
      name: Typ konstrukcji knota
      description: 'Konstrukcja/styl knota: pleciony, płaski, kwadratowy, rdzeniowy,
        drewniany itp.'
    wick_core_type:
      name: Typ rdzenia knota
      description: Wskazuje, czy knot jest bezrdzeniowy czy zawiera materiał rdzenia,
        np. papierowy lub cynkowy, co wpływa na sztywność i charakterystykę spalania.
    wick_tab_crimp_type:
      name: Typ zacisku blaszki knota
      description: Sposób mocowania knota przez blaszkę, czyli konstrukcja/styl zacisku.
    wick_tab_material:
      name: Materiał blaszki knota
      description: Materiał dołączonej blaszki/podstawki, zwykle blacha cynowana,
        istotny dla odporności na korozję i preferencji regulacyjnych, np. unikania
        ołowiu.
    wick_tab_shape:
      name: Kształt blaszki knota
      description: Kształt/forma płytki blaszki knota.
    wick_type_included:
      name: Typ dołączonego knota
      description: Określa materiał/typ knota dołączonego do zestawu.
    wig_fiber_material:
      name: Materiał włókna peruki
      description: Określa podstawowe włókno użyte na włosy peruki, aby kupujący mogli
        łatwo wybierać między odmianami włosów naturalnych i opcjami syntetycznymi
        o różnych właściwościach stylizacji i trwałości.
    wildlife_attractant_scent:
      name: Zapach wabika na dziką zwierzynę
      description: Określa podstawowy zapach używany do wabienia dzikiej zwierzyny,
        obejmujący naturalne zapachy pokarmowe i zapachy typu feromonowego.
    willow_grade:
      name: Klasa wierzby
      description: Określa klasę jakości wierzby, wskazującą strukturę słojów i ogólny
        poziom osiągów.
    willow_type:
      name: Typ wierzby
      description: Określa rodzaj wierzby lub alternatywnego materiału użytego na
        pióro kija, co znacząco wpływa na osiągi, trwałość i cenę.
    wind_up_mechanism_type:
      name: Typ mechanizmu nakręcanego
      description: Określa sposób nakręcania lub aktywacji zabawki.
    wind_up_toy_movement_pattern:
      name: Wzorzec ruchu zabawki nakręcanej
      description: Opisuje główny ruch wykonywany po nakręceniu.
    windbreak_purpose:
      name: Przeznaczenie parawanu
      description: Definiuje podstawowe zamierzone zastosowanie parawanu.
    windfoil_board_mounting_system:
      name: System mocowania deski windfoil
      description: Określa skrzynkę foila lub interfejs montażowy wbudowany w deskę
        windfoil.
    windfoil_sail_style:
      name: Styl żagla windfoil
      description: Klasyfikuje żagiel według zamierzonego stylu jazdy lub dyscypliny.
    winding_direction:
      name: Kierunek nakręcania
      description: 'Wskazuje schemat obrotu obsługiwany przez rotomat: zgodnie z ruchem
        wskazówek zegara, przeciwnie do ruchu wskazówek zegara lub dwukierunkowo.'
    winding_method:
      name: Metoda nawijania
      description: Sposób, w jaki wątek ma być nawijany/ładowany do użycia w czółenku.
    winding_speed_control_type:
      name: Typ kontroli prędkości nawijania
      description: Wskazuje metodę kontrolowania prędkości nawijania podczas użycia.
    winding_type:
      name: Typ owijki
      description: Określa konstrukcję owijki strun basowych, czyli profil zewnętrznego
        oplotu.
    windlass_control_station_type:
      name: Typ stanowiska sterowania windą kotwiczną
      description: Typ interfejsu sterowania dołączony lub obsługiwany do obsługi
        windy kotwicznej.
    windlass_mount_type:
      name: Typ montażu windy kotwicznej
      description: Miejsce/sposób montażu windy kotwicznej na łodzi.
    window_component_location:
      name: Położenie komponentu szyby
      description: Określa, której szyby/otworu dotyczy część w pojeździe, np. szyby
        przedniej, szyby drzwi, szyby tylnej lub szyby bocznej tylnej.
    window_configuration:
      name: Konfiguracja okna
      description: Wskazuje obecność i względny rozmiar przezroczystych okien widoczności
        w skrzydle wingfoil.
    window_glass_construction:
      name: Konstrukcja szyby
      description: Określa bezpieczną/laminowaną konstrukcję szyby pojazdu silnikowego.
    window_glass_features:
      name: Cechy szyby
      description: Wskazuje, czy szyba obsługuje zintegrowane technologie pojazdu,
        np. podkładkę czujnika deszczu, uchwyt kamery.
    window_glass_finish:
      name: Wykończenie szyby
      description: Określa wykończenie/przyciemnienie/obróbkę prywatności szyby pojazdu
        silnikowego.
    window_glass_tint_color:
      name: Kolor przyciemnienia szyby okiennej
      description: Określa odcień koloru przyciemnienia obecny w szybie, a nie ogólny
        kolor produktu.
    window_glass_tint_level:
      name: Poziom przyciemnienia szyby
      description: Wskazuje przybliżony poziom fabrycznego/przyciemniającego przyciemnienia
        szyby, a nie przyciemnienia wykonanego później folią. Użyć opisowych poziomów,
        gdy dokładny VLT nie jest znany.
    window_net_latch_mechanism:
      name: Mechanizm zatrzasku siatki okiennej
      description: Określa mechanizm zatrzasku/zwalniania używany w siatce okiennej,
        np. przycisk, dźwignia, klamra w stylu pasa bezpieczeństwa.
    window_net_mounting_hardware:
      name: Osprzęt montażowy siatki okiennej
      description: Określa typ osprzętu montażowego lub metodę mocowania używaną do
        instalacji siatki okiennej, np. klipsy, śruby, styl hak/pręt, lub czy osprzęt
        jest dołączony.
    window_net_opening_direction:
      name: Kierunek otwierania siatki okiennej
      description: Określa, jak siatka okienna otwiera się/zwalnia względem użytkownika,
        aby umożliwić wyjście i zgodność z przepisami.
    window_regulator_operation:
      name: Działanie regulatora szyb
      description: Określa sposób obsługi regulatora szyb (ręczny korbowy lub elektryczny).
    windshield_coverage_area:
      name: Obszar pokrycia szyby przedniej
      description: Określa, które części przedniej części nadwozia pojazdu ma chronić
        osłona szyby przedniej (np. tylko szyba przednia lub także wycieraczki, lusterka,
        szyby boczne lub krawędź maski).
    windshield_mount_attachment_method:
      name: Metoda mocowania uchwytu na szybę przednią
      description: Określa, w jaki sposób mocowanie przylega do powierzchni przedniej
        szyby lub ją chwyta.
    windshield_washer_fluid_seasonality:
      name: Sezonowość płynu do spryskiwaczy
      description: Wskazuje zamierzony sezon/klimat lub główne zastosowanie formulacji
        płynu do spryskiwaczy (np. zimowy odmrażacz, letni płyn na owady, całoroczny).
    windsurf_fin_style:
      name: Styl statecznika windsurfingowego
      description: Klasyfikuje statecznik według zamierzonej dyscypliny lub stylu
        użytkowania (np. wave, slalom, weed).
    windsurfing_connection_standard:
      name: Standard połączenia windsurfingowego
      description: Interfejs mechaniczny lub typ skrzynki używany do mocowania części
        do deski lub pędnika.
    windsurfing_sail_style:
      name: Styl żagla windsurfingowego
      description: Klasyfikuje zamierzoną dyscyplinę lub zastosowanie żagla, takie
        jak wave, freeride lub foil.
    wine_additive_type:
      name: Typ dodatku do wina
      description: Określa, jakiego rodzaju produktem do wyrobu czerwonego wina jest
        dany produkt (składnik, dodatek, drożdże, środek klarujący, zestaw itp.).
    wine_body:
      name: Ciało wina
      description: Opisuje odczuwalną ciężkość i teksturę wina w ustach.
    wine_carbonation:
      name: Nagazowanie wina
      description: Wskazuje, czy wino jest spokojne, półmusujące czy musujące oraz,
        w stosownych przypadkach, intensywność musowania.
    wine_making_ingredient_type:
      name: Typ składnika do produkcji wina
      description: Określa funkcjonalną kategorię składnika dla spożywczych dodatków
        i składników do produkcji wina.
    wine_making_stage:
      name: Etap produkcji wina
      description: Określa etap procesu produkcji wina, do którego produkt jest przeznaczony.
    wine_style:
      name: Styl wina
      description: Klasyfikuje szeroki styl produkcji wina poza kolorem, np. spokojne,
        musujące lub wzmacniane.
    winemaking_process_stage:
      name: Etap procesu produkcji wina
      description: Wskazuje główny etap procesu produkcji wina, do którego przeznaczony
        jest materiał.
    wing_count:
      name: Liczba skrzydeł
      description: Liczba skrzydeł/ramion bumerangu.
    wing_handle_type:
      name: Typ uchwytu skrzydła
      description: Określa styl systemu uchwytu ręcznego na skrzydle wingfoilowym.
    wing_part_type:
      name: Typ części skrzydła
      description: Określa konkretny komponent lub część zamienną do skrzydła wingfoilowego.
    wingfoiling_style:
      name: Styl wingfoilingu
      description: Wskazuje konkretną dyscyplinę wingfoilingu lub styl jazdy, do którego
        skierowany jest produkt.
    wiper_arm_finish:
      name: Wykończenie ramienia wycieraczki
      description: Wykończenie powierzchni lub powłoka ochronna zastosowana na ramieniu
        wycieraczki, wpływająca na odporność na korozję i wygląd.
    wiper_arm_pivot_mount_type:
      name: Typ mocowania osi ramienia wycieraczki
      description: Określa sposób mocowania ramienia wycieraczki do mechanizmu lub
        osi wycieraczki pojazdu.
    wiper_blade_attachment_type:
      name: Typ mocowania pióra wycieraczki
      description: Określa typ złącza/mocowania używany do montażu pióra wycieraczki
        na ramieniu wycieraczki.
    wiper_blade_rubber_material:
      name: Materiał gumy pióra wycieraczki
      description: Materiał elementu wycierającego (wkładu/refillu), który styka się
        ze szkłem.
    wiper_system_position:
      name: Pozycja układu wycieraczek
      description: Wskazuje pozycję montażu układu wycieraczek w pojeździe.
    wire_coating_material:
      name: Materiał powłoki drutu
      description: Określa materiał zewnętrznej powłoki/otuliny drutu (nie materiał
        rdzenia), który może wpływać na odporność na ścieranie i płynność przechodzenia
        przez otwory koralików.
    wire_coating_type:
      name: Typ powłoki drutu
      description: Określa, czy i w jaki sposób drut jest powlekany/osłonięty (dla
        koloru, ochrony i tekstury).
    wire_construction_type:
      name: Typ konstrukcji drutu
      description: Określa fizyczną konstrukcję drutu do koralików, np. wielosplotowy
        lub lity oraz czy jest powlekany.
    wire_finish:
      name: Wykończenie drutu
      description: Określa wykończenie powierzchni, powłokę lub platerowanie zastosowane
        na drucie (np. polerowany, emaliowany, galwanizowany, platerowany), wpływające
        na wygląd i odporność na matowienie/korozję.
    wire_gauge_awg:
      name: Grubość drutu (AWG)
      description: Rozmiar przewodników użytych w wiązce przewodów według American
        Wire Gauge (AWG).
    wire_insulation_material:
      name: Materiał izolacji drutu
      description: Materiał izolacji/otuliny przewodu użytej w wiązce (wpływa na odporność
        na temperaturę i chemikalia).
    wire_packaging_type:
      name: Typ opakowania drutu
      description: Określa sposób sprzedaży/pakowania drutu.
    wire_shape_profile:
      name: Kształt/profil drutu
      description: Opisuje kształt przekroju poprzecznego drutu.
    wiring_configuration:
      name: Konfiguracja okablowania
      description: Wskazuje, czy szpada szermiercza jest dostarczana fabrycznie okablowana
        do punktacji elektrycznej, nieokablowana, bezprzewodowa czy przeznaczona do
        treningu nieelektrycznego.
    wobbler_style:
      name: Styl woblera
      description: Określa konkretny styl konstrukcji/akcji woblera, np. crankbait
        lub jerkbait.
    wood_block_surface_preparation:
      name: Przygotowanie powierzchni drewnianego bloczka
      description: Wskazuje gotowy do użycia stan powierzchni drewnianego bloczka
        do wykańczania i rękodzieła.
    wood_grain_direction:
      name: Kierunek słojów drewna
      description: Kierunek słojów drewna względem najdłuższego wymiaru produktu (ważny
        dla wytrzymałości, zachowania podczas cięcia i wyglądu).
    wood_slice_edge_style:
      name: Styl krawędzi plastra drewna
      description: Stan krawędzi plastra, np. naturalna krawędź z korą lub gładka/szlifowana
        krawędź.
    wooden_block_special_features:
      name: Cechy specjalne drewnianych klocków
      description: Istotne funkcje użytkowe dołączone do zestawu drewnianych klocków.
    woodwind_body_construction:
      name: Konstrukcja korpusu instrumentu dętego drewnianego
      description: Wskazuje, czy instrument jest wykonany z jednego elementu czy z
        kilku części (np. 2- lub 3-częściowy), co wpływa na czyszczenie, przechowywanie
        i przenośność.
    woodwind_polishing_cloth_intended_use:
      name: Przeznaczenie ściereczki do polerowania instrumentów dętych drewnianych
      description: Określa, do czyszczenia/polerowania której części instrumentu dętego
        drewnianego ściereczka jest głównie przeznaczona.
    woodwind_small_part_type:
      name: Typ małej części do instrumentu dętego drewnianego
      description: Określa rodzaj małej części zamiennej do klarnetu (np. elementy
        mechaniki, poduszki/korki/filce, pierścienie).
    woofer_mounting_type:
      name: Typ montażu woofera
      description: Sposób montażu/użytkowania woofera (free-air lub w obudowie) oraz
        typowe formy montażu samochodowego.
    woofer_surround_material:
      name: Materiał resora górnego woofera
      description: Materiał użyty do wykonania resora górnego woofera (zewnętrznego
        pierścienia zawieszenia).
    worn_on_finger:
      name: Palec noszenia
      description: Określa, na którym palcu należy nosić prowadnik naparstka.
    wrap_style:
      name: Styl owijania
      description: Wskazuje, ile razy pasek ma owijać się wokół talii.
    wrapping_occasion:
      name: Okazja do pakowania
      description: Główna okazja prezentowa/uroczystość, do której przeznaczony jest
        papier do pakowania.
    wrapping_paper_features:
      name: Cechy papieru do pakowania
      description: Właściwości funkcjonalne i związane ze zrównoważonym rozwojem papieru
        do pakowania, takie jak odporność na rozdarcie, zawartość materiałów z recyklingu
        lub formaty wstępnie przyciętych arkuszy.
    wrestling_dummy_design:
      name: Konstrukcja manekina zapaśniczego
      description: Ogólny kształt ciała lub pozycja manekina, np. stojąca sylwetka
        człowieka lub worek do rzutów, co określa możliwe ćwiczenia treningowe.
    wrestling_mat_safety_certifications:
      name: Certyfikaty bezpieczeństwa maty zapaśniczej
      description: Wymienia certyfikaty lub normy bezpieczeństwa organizacji branżowych
        lub sportowych spełniane przez matę.
    wrist_strap_style:
      name: Styl paska na nadgarstek
      description: Opisuje styl paska na nadgarstek (lub jego brak), który wpływa
        na podtrzymanie i dopasowanie.
    wrist_support_style:
      name: Styl wsparcia nadgarstka
      description: Określa konstrukcję lub styl wsparcia nadgarstka, np. stabilizator,
        rękawica, taśma lub opaska, aby ułatwić wybór według preferencji i zastosowania.
    xylophone_range_octaves:
      name: Zakres ksylofonu (oktawy)
      description: Całkowity zakres ksylofonu wyrażony w oktawach (np. 2,5 oktawy,
        3 oktawy, 4 oktawy).
    xylophone_resonator_type:
      name: Typ rezonatora ksylofonu
      description: Typ systemu rezonatorów używanego do wzmocnienia brzmienia (jeśli
        występuje).
    yam_variety:
      name: Odmiana pochrzynu
      description: Określa kultywar lub popularną odmianę pochrzynu w sprzedaży (np.
        fioletowy, żółty, słoniowa stopa).
    yarn_cutter_physical_style:
      name: Forma obcinacza do włóczki
      description: Określa fizyczną formę obcinacza do włóczki (np. wisiorek, pierścień,
        nożyczki), aby ułatwić przeglądanie i filtrowanie w tej kategorii.
    yarn_finish_or_effect:
      name: Wykończenie lub efekt włóczki
      description: Wyróżnia specjalne zabiegi wizualne lub funkcjonalne zastosowane
        we włóczce, takie jak fluorescencja lub metaliczny połysk.
    yarn_guide_style:
      name: Styl prowadnika włóczki
      description: Fizyczna forma elementu prowadzącego włóczkę.
    yarn_swift_adjustability:
      name: Regulacja motowidła do włóczki
      description: Wskazuje, czy i w jaki sposób motowidło można regulować (rozsuwane,
        składane), co wpływa na przechowywanie i zakres obsługiwanych rozmiarów motków.
    yarn_swift_bearing_type:
      name: Typ łożyska motowidła do włóczki
      description: Opisuje mechanizm podparcia obrotu (np. łożysko kulkowe), który
        wpływa na płynność i szybkość nawijania.
    yeast_application:
      name: Zastosowanie drożdży
      description: Wskazuje główne zamierzone zastosowanie kulinarne lub fermentacyjne
        drożdży.
    yo_yo_accessory_part_type:
      name: Typ akcesorium/części do jojo
      description: Określa rodzaj części zamiennej lub akcesorium do jojo (np. sznurek,
        łożysko, pady response).
    yo_yo_axle_system_type:
      name: Typ systemu osi jojo
      description: Konstrukcja osi jojo (np. oś stała lub transaxle), wpływająca na
        odczucia podczas zabawy i konserwację.
    yo_yo_bearing_size_class:
      name: Klasa rozmiaru łożyska jojo
      description: Standaryzowana klasa rozmiaru łożyska stosowanego w jojo, jeśli
        dotyczy.
    yo_yo_bearing_type:
      name: Typ łożyska jojo
      description: Konfiguracja łożyska wpływająca na responsywność i charakterystykę
        obrotu.
    yo_yo_play_style:
      name: Styl zabawy jojo
      description: Główny zamierzony styl zabawy jojo, odzwierciedlający dyscyplinę
        sznurkową/trickową, do której produkt jest przeznaczony.
    yo_yo_response_system:
      name: System powrotu jojo
      description: Określa mechanizm powrotu jojo, do którego przeznaczona jest ta
        część (kompatybilność).
    yo_yo_responsiveness:
      name: Responsywność jojo
      description: Wskazuje, czy jojo wraca do ręki po szarpnięciu (responsywne),
        czy wymaga bindu (nieresponsywne).
    yo_yo_string_material:
      name: Materiał sznurka jojo
      description: Skład materiałowy sznurka jojo.
    yogurt_base_ingredient:
      name: Składnik bazowy jogurtu
      description: Określa główne źródło mleczne lub roślinne użyte do produkcji jogurtu,
        kluczowe dla preferencji dietetycznych i kwestii alergenów.
    yoke_type:
      name: Typ podpórki
      description: Określa styl uchwytu lub podpórki podtrzymującej broń palną na
        monopodzie.
    zill_playing_style:
      name: Styl gry na zillach
      description: Zamierzony kontekst/styl gry (najczęściej taniec brzucha lub warianty
        orkiestrowe/kulturowe).
    zill_strap_material:
      name: Materiał pasków talerzyków zilli
      description: Materiał paska/gumki na palce używanej do trzymania talerzyków
        zills (jeśli jest dołączona), wpływający na komfort, trwałość i chwyt.
    zills_strap_adjustability:
      name: Regulacja paska talerzyków zills
      description: Wskazuje, czy i w jaki sposób dołączony pasek/gumka umożliwia dopasowanie.
    zipper_application:
      name: Zastosowanie zamka błyskawicznego
      description: Określa projekt lub zastosowanie, do którego przeznaczony jest
        zamek błyskawiczny.
    zipper_chain_type:
      name: Typ taśmy ząbkowej zamka błyskawicznego
      description: Określa konstrukcję/typ taśmy ząbkowej/zębów zamka błyskawicznego.
    zipper_end_type:
      name: Typ zakończenia zamka błyskawicznego
      description: Wskazuje sposób zakończenia zamka oraz to, czy jest rozdzielczy
        (open-end) czy nierozdzielczy (closed-end), w tym popularne elementy końcowe
        zamków rozdzielczych używanych w rękodziele.
    zipper_gauge:
      name: Rozmiar zamka błyskawicznego
      description: 'Wskazuje oznaczenie rozmiaru taśmy ząbkowej zamka, zwykle wyrażone
        liczbą z # (np. #3 lub #5), które odpowiada szerokości zębów/spirali i zamierzonemu
        zastosowaniu.'
    zipper_opening_length:
      name: Długość otwarcia zamka błyskawicznego
      description: Określa, jaka część przedniego otwarcia jest zapinana na zamek,
        rozróżniając fasony z pełnym zamkiem, zamkiem do połowy lub zamkiem do jednej
        czwartej.
    zipper_pull_material:
      name: Materiał suwaka zamka błyskawicznego
      description: Określa materiał uchwytu suwaka zamka błyskawicznego (części chwytanej),
        odrębny od zębów/taśmy ząbkowej i taśmy nośnej zamka.
    zipper_pull_side:
      name: Strona uchwytu suwaka
      description: Określa, z której strony lub stron zamka dostępny jest uchwyt suwaka.
    zipper_pull_strap_cord_tab_material:
      name: Materiał paska/sznurka/uchwytu przy suwaku zamka
      description: Materiał paska/sznurka/uchwytu/chwosta przymocowanego do suwaka
        zamka błyskawicznego (jeśli występuje), z wyłączeniem głównego korpusu/okucia
        suwaka.
    zipper_reversibility_mechanism:
      name: Mechanizm dwustronności zamka błyskawicznego
      description: Określa, w jaki sposób zamek jest dwustronny (np. dwustronny suwak
        lub suwak flip/auto-lock przeznaczony do odzieży dwustronnej).
    zipper_separating_type:
      name: Typ rozdzielności zamka błyskawicznego
      description: Wskazuje, czy zamek rozdziela się u dołu/góry czy jest nierozdzielczy,
        aby dopasować go do kurtek, śpiworów, toreb itp.
    zipper_side:
      name: Strona zamka błyskawicznego
      description: Określa stronę, po której znajduje się główny zamek, gdy śpiwór
        leży przodem do góry.
    zipper_slider_material:
      name: Materiał mechanizmu suwaka zamka
      description: Określa materiał suwaka zamka błyskawicznego (ruchomego mechanizmu),
        który może wpływać na wytrzymałość i odporność na korozję.
    zipper_slider_pull_configuration:
      name: Konfiguracja suwaka/uchwytu zamka
      description: Wskazuje, czy zamek ma jeden czy dwa suwaki/uchwyty oraz czy uchwyty
        znajdują się po jednej czy po obu stronach suwaka.
    zipper_style:
      name: Styl zamka błyskawicznego
      description: Wskazuje długość lub obecność zamka w odzieży (np. bez zamka, zamek
        do jednej czwartej, do połowy, pełny zamek).
    zipper_tape_material:
      name: Materiał taśmy zamka błyskawicznego
      description: Określa główny materiał taśmy nośnej zamka błyskawicznego (boków
        z tkaniny), która jest wszywana w projekt.
    zipper_teeth_type:
      name: Typ ząbków zamka błyskawicznego
      description: Określa konstrukcję taśmy ząbkowej/zębów zamka (np. spiralna, z
        formowanego tworzywa, metalowa, kryta), która wpływa na elastyczność, wytrzymałość
        i typowe zastosowania.
    assembly_required:
      name: Wymagany montaż
      description: Wskazuje, czy produkt wymaga montażu przed użyciem
    organic_certification:
      name: Certyfikat ekologiczny
      description: Określa, jaki certyfikat ekologiczny lub zrównoważonego rozwoju
        posiada produkt.
