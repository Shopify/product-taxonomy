      description: Podaje oficjalny stopień odporności obudowy na wodę/kurz (np. IP68).
    ink_application_technique:
      name: Technika aplikacji tuszu
      description: Określa metodę stosowaną do nakładania atramentu w sztuce i rzemiośle,
