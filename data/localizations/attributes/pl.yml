        kolekcjonerski, biżuteria, karta podarunkowa).
    program_format:
      name: Format programu
      description: Określa układ programów wydarzeń, np. broszura lub pojedynczy arkusz
    projection_design:
      name: Projekt projekcji
      description: Określa wzór lub obraz generowany przez filtr światła lub filtr
