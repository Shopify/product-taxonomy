    compatible_oboe_type:
      name: Kompatybilny typ oboju
      description: Określa rodzaj oboju, do którego przeznaczony jest produkt, np.
        obój uniwersalny lub rożek angielski
    compatible_operating_system:
      name: Zgodny system operacyjny
      description: Określa zgodność produktu z oprogramowaniem, np. Windows, macOS
    compatible_orchestral_string_instrument:
      name: Kompatybilny orkiestrowy instrument smyczkowy
      description: Określa konkretny orkiestrowy instrument smyczkowy, do którego
