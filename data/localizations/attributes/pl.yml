    heat_settings:
      name: Ustawienia nagrzewania
      description: Określa poziomy regulacji temperatury produktu, np. niski, średni,
        wysoki
    heat_source:
      name: Źródło ciepła
      description: Określa rodzaj źródła ciepła w podkładkach rozgrzewających, np.
