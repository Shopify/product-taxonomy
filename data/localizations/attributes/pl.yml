    scaffolding_mounting_type:
      name: Typ montażu rusztowania
      description: Określa styl ustawienia rusztowania, np. ramowe, ruchome
    scale_material:
      name: Materiał skali
      description: Określa materiał, z którego wykonana jest skala, zazwyczaj średnicomierz,
        np. stal nierdzewna, tworzywo sztuczne
    scale_model_accessory_type:
      name: Typ akcesoriów do modelarstwa redukcyjnego
      description: Określa rodzaj akcesoriów do modeli redukcyjnych, np. budynki lub
        figurki
    scale_model_kit_type:
      name: Rodzaj zestawów do modelarstwa redukcyjnego
      description: Określa kategorię zestawu do modelarstwa redukcyjnego, np. czołg
        lub statek kosmiczny
    scale_model_material:
      name: Materiał modelu redukcyjnego
      description: Określa główny materiał używany w modelach redukcyjnych, np. drewno
        lub karton
    scale_model_theme:
      name: Temat do modelarstwa redukcyjnego
      description: Określa motyw modelu redukcyjnego, np. fantastyka lub historia
    scalp_concern:
      name: Problem skóry głowy
      description: Określa główny problem skóry głowy lub włosów, któremu ma zaradzić
        kuracja.
    scalpel_blade_material:
      name: Materiał ostrza skalpela
      description: Określa skład ostrzy do skalpeli, np. stal nierdzewna lub tytan
    scalpel_blade_number:
      name: Numer ostrza skalpela
      description: Określa właściwy numer lub rodzaj ostrza do skalpela, np. 10 lub
        15A
    scalpel_blade_shape:
      name: Kształt ostrza skalpela
      description: Określa kształt ostrza do skalpela, np. zakrzywione lub proste
    scalpel_handle_number:
      name: Numer rękojeści skalpela
      description: Określa konkretny numer rękojeści skalpela, np. 4 lub 3L
    scan_converter_features:
      name: Charakterystyka konwertera skanującego
      description: Określa unikatowe cechy konwertera skanującego, np. automatyczna
        kalibracja obrazu lub zdalne sterowanie
    scanner_features:
      name: Charakterystyka skanera
      description: Określa specjalne funkcje skanera, np. sztuczna inteligencja lub
        skanowanie do chmury
