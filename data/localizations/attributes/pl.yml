        użytkowania.
    radio_scanner_form_factor:
      name: Format skanera radiowego
      description: Wskazuje fizyczną konfigurację lub styl montażu skanera radiowego
        (np. ręczny, bazowy, biurkowy, montowany w pojeździe)
    radiology_compatibility:
      name: Kompatybilność radiologiczna
      description: Wskazuje, czy orteza może pozostać na pacjencie podczas procedur
        obrazowania (np. MRI, CT, RTG).
    raid_levels_supported:
      name: Obsługiwane poziomy RAID
      description: Wymienia wszystkie konfiguracje RAID, które macierz dysków twardych
        może tworzyć lub zarządzać.
    ramp_type:
      name: Typ rampy
      description: Określa projekt lub styl ramp dla deskorolkarzy, np. half-pipe
        lub fun box
    range_type:
      name: Typ zasięgu
      description: Określa zasięg urządzeń takich jak niania elektroniczna, np. daleki
