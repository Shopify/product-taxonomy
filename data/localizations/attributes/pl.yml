    compression_format:
      name: Format kompresji
      description: Określa rodzaj stosowanej kompresji plików wideo, np. MPEG-4, AVI
    compression_level:
      name: Poziom kompresji
      description: Określa intensywność nacisku w produktach do kompresji, np. lekki,
        mocny
    computer_accessories_included:
      name: Akcesoria komputerowe w zestawie
      description: Określa dostarczane dodatkowe akcesoria komputerowe, np. mysz lub
