    ticket_class:
      name: Klasa biletu
      description: Określa poziom usługi lub klasę miejsca dołączoną do biletu.
    ticket_type:
      name: Typ biletu
      description: Określa kategorię biletów na wydarzenie, np. wstęp ogólny lub miejsca
        zarezerwowane
    tile_design:
      name: Projekt płytek
      description: Określa wzór lub styl kafelka, np. geometryczny lub w jodełkę
    tile_game_type:
      name: Rodzaj gry z żetonami
      description: Określa konkretny rodzaj gry z płytkami, np. domino lub mahjong
    tile_installation_method:
      name: Metoda instalacji kafelków
      description: Określa sposób montażu produktu, zazwyczaj płytek sufitowych lub
        ściennych, np. instalacja nakładana
    tile_look:
      name: Wygląd płytek
      description: Określa wygląd lub styl kafelka, np. marmur lub 3D
    tile_material:
      name: Materiał kafelków
      description: Określa skład kafelków, np. ceramiczne lub kamienne
    tile_texture:
      name: Tekstura płytek
      description: Określa wrażenia dotykowe powierzchni kafelka, np. gładki lub teksturowany
    time_period:
      name: Okres
      description: Określa ramy czasowe związane z badaniami lub artykułami akademickimi,
        np. średniowiecze lub rewolucja przemysłowa
    time_signatures:
      name: Sygnatury czasowe
      description: Określa strukturę rytmu, zazwyczaj dla metronomów, np. 4/4, 3/4
    time_weighting:
      name: Ważenie czasem
      description: Określa, jak szybko miernik dźwięku reaguje na wahania dźwięku,
        np. wolno, szybko
    timepiece_features:
      name: Charakterystyka czasomierza
      description: Określa szczególne cechy czasomierza, np. regulowany czas lub podświetlenie
    timer_design:
      name: Projekt timera
      description: Określa rodzaj timera używanego w ciemni, np. cyfrowy lub analogowy
    timer_features:
      name: Charakterystyka timera
      description: Określa szczególne funkcje timera, np. regulowany czas lub wbudowany
