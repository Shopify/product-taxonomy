    pole_material:
      name: Materiał słupa
      description: Określa materiał użyty do budowy słupa, np. stal, drewno
    pole_pattern:
      name: Wzór słupka
      description: Określa wzór lub motyw na rurce parasola, np. kwiatowy lub geometryczny
    policy_sign_design:
      name: Projekt znaku polityki
      description: Określa konkretną wiadomość wyświetlaną na oznaczeniu zasad, np.
        zakaz palenia, zakaz używania telefonów komórkowych
    polish_dry_form:
      name: Forma produktu przyspieszającego schnięcie lakieru do paznokci
      description: Określa skład produktów suszących lakier do paznokci, np. na bazie
        rozpuszczalników, na bazie silikonu
    polish_remover_form:
      name: Forma zmywacza do paznokci
      description: Określa rodzaj zmywacza do paznokci, np. płyn, owijki usuwające
    polish_remover_formulation:
      name: Formulacja zmywacza do paznokci
      description: Wskazuje skład chemiczny zmywacza, zwłaszcza zawartość acetonu
        lub alternatywne bazy.
    polish_type:
      name: Typ polerki
      description: Określa rodzaj polerki stosowanej do konserwacji i pielęgnacji
        jednostek pływających, np. metalowa lub winylowa
    polyphony:
      name: Polifonia
      description: Określa zdolność syntezatora do jednoczesnego generowania dźwięków,
        np. polifoniczny, wielobrzmieniowy
    portability:
      name: Przenośność
      description: Określa łatwość przemieszczania lub przenoszenia produktu, zazwyczaj
        w przypadku laktatorów, np. przenośny, kompaktowy rozmiar
    post_material:
      name: Materiał słupa
      description: Określa rodzaj materiału słupków z różnych kategorii, np. aluminium
        lub włókno szklane
    postage_stamp_features:
      name: Charakterystyka znaczka pocztowego
      description: Określa szczególne cechy znaczków pocztowych, np. nadruk lub znak
