    tank_pattern:
      name: Wzór zbiornika
      description: Określa wizualny motyw na spłuczkach, np. jednolity lub abstrakcja
    tape_cartridge_format:
      name: Format kasety taśmowej
      description: Określa technologie kaset z taśmą (np. LTO, DAT, DLT), które napęd
        może odczytywać lub zapisywać.
    tape_cartridge_generation:
      name: Generacja kasety taśmowej
      description: Wskazuje konkretną generację lub wersję w ramach rodziny technologii
        taśm (najczęściej generacje LTO), którą obsługuje napęd.
    tape_material:
      name: Materiał taśmy
      description: Określa rodzaj materiału użytego w taśmach, np. winyl lub tworzywo
        sztuczne
    tape_speed_supported:
      name: Obsługiwana prędkość taśmy
      description: Lista prędkości odtwarzania i nagrywania taśmy (cale na sekundę),
        z jakimi może pracować urządzenie szpulowe.
    target_audience:
      name: Grupa odbiorców
      description: Określa, dla kogo produkt jest odpowiedni, np. dzieci lub wszystkie
        grupy wiekowe
    target_facial_zone:
      name: Obszar twarzy
      description: Określa strefę twarzy, do leczenia której przeznaczony jest pasek
        do usuwania porów (np. nos, podbródek, strefa T).
    target_gender:
      name: Docelowa płeć
      description: Określa płeć, do której skierowany jest produkt, np. damska, męska
