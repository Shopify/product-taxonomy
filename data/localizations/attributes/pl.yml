    power_supply_form_factor:
      name: Format zasilacza
      description: Określa fizyczny rozmiar i standard montażu PSU (np. ATX, SFX).
    power_supply_modularity:
      name: Modularność zasilacza
      description: Wskazuje, czy kable PSU są nieusuwalne, częściowo usuwalne czy
        w pełni usuwalne.
    pregnancy_test_sensitivity:
      name: Czułość testu ciążowego
      description: Określa zdolność testu do wykrycia ciąży, np. wczesne wykrywanie,
