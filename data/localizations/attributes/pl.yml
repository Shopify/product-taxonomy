      description: Określa styl uchwytów w kształcie litery J w sprzęcie do podnoszenia
        ciężarów, np. płaskie, sandwich
    jaw_advancement_adjustability:
      name: Regulacja wysunięcia szczęk
      description: Wskazuje, czy i w jaki sposób pozycja dolnej szczęki zapewniana
        przez urządzenie może być regulowana przez użytkownika.
    jaw_material:
      name: Materiał szczęki
      description: Określa materiał. z którego wykonano szczękę narzędzia, np. stal
