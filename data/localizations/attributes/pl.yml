      description: Określa współczynnik kontrastu wyświetlacza, np. 3000:1
    control_functions:
      name: Funkcje sterowania
      description: Określa możliwości sterowania przełącznikami nożnymi do wzmacniacza,
        np. przełączanie kanałów
    control_interface:
      name: Interfejs sterowania
      description: Określa sposób konfiguracji lub obsługi urządzenia (np. oprogramowanie
