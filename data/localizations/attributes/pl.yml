    hearing_aid_material:
      name: Materiał aparatu słuchowego
      description: Określa główny materiał, z którego wykonane są aparaty słuchowe,
        np. tworzywo sztuczne lub silikon
    hearing_loss_level:
      name: Poziom ubytku słuchu
      description: Określa stopień ubytku słuchu, który aparat słuchowy ma za zadanie
        korygować.
    hearing_protection_class:
      name: Klasa ochrony słuchu
      description: Określa lokalną klasę certyfikacji, która wskazuje wydajność tłumienia
