    pump_accessories:
      name: Akcesoria do laktatorów
      description: Określa elementy dołączone do laktatorów, np. etui lub butelki
    pump_speed_settings:
      name: Ustawienia prędkości pompki
      description: Określa funkcje kontroli prędkości, zazwyczaj dla laktatorów, np.
