    instrument_string_color:
      name: Kolor struny instrumentu
      description: Określa kolor strun instrumentów muzycznych, np. złoty lub srebrny
    instrument_string_material:
      name: Materiał struny instrumentu
      description: Określa skład strun do instrumentów muzycznych, np. brąz lub perfluorowęglowodór
    instrument_string_pattern:
      name: Wzór struny instrumentu
      description: Określa wzór na strunach gitary, np. jednolity lub geometryczny
    instrument_support_type:
      name: Pomoc techniczna do instrumentu
      description: Określa rodzaj wspornika instrumentu muzycznego, np. pasek na szyję
