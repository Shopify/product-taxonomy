      name: Przecięcie łącznika czołowego
      description: Określa kształt końcówki ustnika fletu, np. fala lub Z-cut
    headphone_cushion_shape:
      name: Kształt poduszki słuchawek
      description: Opisuje fizyczny kontur poduszki, aby pomóc klientom dopasować
        geometrię nauszników.
    headphone_driver_technology:
      name: Technologia przetwornika słuchawek
      description: Określa typ przetwornika używany do tworzenia dźwięku w słuchawkach
    headphone_jack_type:
      name: Typ gniazda słuchawkowego
      description: Określa rodzaj rozmiaru gniazda słuchawkowego, np. 3,5 mm, USB
        typu C
    headphone_style:
      name: Styl słuchawek
      description: Określa konstrukcję słuchawek, np. z tyłu za szyją, słuchawki dokanałowe
    headset_connection_type:
      name: Typ połączenia zestawu słuchawkowego
      description: Określa interfejs(y) dostępny(e) do podłączania zewnętrznych zestawów
        słuchawkowych do telefonu.
    headwear_features:
      name: Charakterystyka nakrycia głowy
      description: Określa unikatowe cechy nakryć głowy, np. składane, uniwersalne
    hearing_aid_compatibility:
      name: Kompatybilność z aparatami słuchowymi
      description: Określa, czy telefon spełnia wymagania kompatybilności z aparatami
