    postpartum_stage:
      name: Etap poporodowy
      description: Określa ramy czasowe po porodzie, dla których podkładka jest przeznaczona.
    potential_extract:
      name: Potencjalne wyodrębnienie
      description: Określa potencjalny poziom ekstraktu w ziarnach i słodach browarniczych,
