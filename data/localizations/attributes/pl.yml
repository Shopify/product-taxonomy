    animal_care_set_components_included:
      name: Elementy do pielęgnacji zwierząt w zestawie
      description: Wymienia wszystkie akcesoria i nasadki do pielęgnacji i czyszczenia
        dołączone do zestawu, aby klient dokładnie wiedział, co otrzymuje.
    apron_features:
      name: Cechy fartucha
      description: Wskazuje szczególne cechy funkcjonalne fartucha.
    apron_style:
      name: Typ fartucha
      description: Określa ogólny krój i konstrukcję fartucha.
    aquatic_plant_growth_habit:
      name: Forma wzrostu roślin wodnych
      description: Klasyfikuje rośliny wodne według ich typowego miejsca i formy wzrostu
        w kolumnie wodnej.
    arbor_top_design:
      name: Konstrukcja górnej części altany
      description: Określa kształty lub typ górnej części altany, pomagając klientom
        dopasować ją do swoich preferencji architektonicznych.
    ashtray_type:
      name: Typ popielniczki
      description: Klasyfikuje popielniczkę według jej głównego zastosowania lub kontekstu.
    attractant_type:
      name: Typ wabika
      description: Określa mechanizm wabienia zintegrowany z klejem, jeśli występuje,
        pomagając klientowi wybrać najskuteczniejszą pułapkę w danym otoczeniu.
    awning_operation_type:
      name: Typ obsługi markizy
      description: Opisuje mechanizm służący do rozkładania i zwijania markizy.
    bag_clip_style:
      name: Typ klipsa
      description: Opisuje typ mechanizmu zamykającego klips.
    bag_configuration:
      name: Konfiguracja worka
      description: Opisuje liczbę i rodzaj worków wchodzących w skład systemu zbierania
        trawy.
    bag_insulation:
      name: Izolacja torby
      description: Określa, czy torba na wino jest izolowana termicznie, aby pomóc
        utrzymać temperaturę butelki.
    baking_liner_size:
      name: Rozmiar foremki do pieczenia
      description: Kategoria określająca wielkość babeczek, stosowana przez piekarzy
        w celu opisania pojemności foremek w stosunku do standardowych rozmiarów babeczek.
    baking_sheet_style:
      name: Typ blachy do pieczenia
      description: Określa rodzaj konstrukcji blachy, np. obramowany lub perforowany.
    ballast_material:
      name: Materiał balastowy
      description: Określa materiały, które można wykorzystać do balastowania (wypełnienia)
        bębna walca, pomagając klientowi wybrać modele zgodne z preferowanym przez
        niego wypełnieniem.
    base_features:
      name: Funkcje podstawy
      description: Podkreślają stabilność i przyczepność podstawy, co przydaje się
        użytkownikom, którzy potrzebują funkcji antypoślizgowych lub przyssawkowych
        na powierzchniach roboczych.
    baster_tip_type:
      name: Typ końcówki do bastera
      description: Klasyfikuje rodzaj końcówki lub nasadki bastera, umożliwiając klientowi
        filtrowanie między standardowymi końcówkami gruszkowymi, igłowymi i pędzelkowymi.
    bathroom_accessories_included:
      name: Akcesoria łazienkowe w zestawie
      description: Określa pozycje zestawu akcesoriów łazienkowych, aby klient dokładnie
        wiedział, jakie elementy są w nim zawarte.
    bathroom_accessory_compatibility:
      name: Kompatybilność akcesoriów łazienkowych
      description: Wskazuje, do jakich akcesoriów lub urządzeń łazienkowych uchwyt
        jest przeznaczony.
    battery_backup_support:
      name: Obsługa zasilania awaryjnego
      description: Wskazuje, czy awaryjne zasilanie bateryjne jest dołączone, opcjonalne
        czy nieobsługiwane.
    bedskirt_corner_style:
      name: Typ lambrekinu łóżkowego
      description: Określa sposób wykończenia lambrekinu łóżkowego, co ma wpływ na
        dopasowanie do łóżek z zagłówkiem lub słupkami.
    bedskirt_style:
      name: Typ lambrekinu łóżkowego
      description: Określa konstrukcję i wygląd lambrekinu łóżkowego, pomagając klientowi
        dokonać wyboru pomiędzy typem falbaniastym lub dopasowanym.
    beer_glass_type:
      name: Rodzaj szklanki do piwa
      description: Określa konkretny typ lub kształt szklanki do piwa, pomagając klientowi
        znaleźć idealne naczynie do preferowanego przez niego piwa (np. pinta, pilsner,
        weizen).
    belt_profile:
      name: Profil pasa
      description: Określa przekrój lub typ pasa, aby zapewnić właściwe dopasowanie
        do konstrukcji koła pasowego.
    beverage_tub_features:
      name: Funkcje pojemnika na napoje
      description: Podkreśla wyróżniające się cechy konstrukcyjne lub dołączone elementy,
        które zwiększają funkcjonalność lub wygodę pojemnika na napoje.
    blade_construction_method:
      name: Budowa ostrza
      description: Określa sposób wykonania ostrza.
    blade_finish:
      name: Wykończenie ostrza
      description: Obróbka powierzchni lub wykończenie estetyczne ostrza.
    blade_shape:
      name: Kształt ostrza
      description: Opisuje kształty geometryczne/profile ostrza łopaty.
    blade_sidedness:
      name: Stronność ostrza
      description: Określa, czy ostrze nożyc do żywopłotów ma zęby tnące tylko po
        jednej stronie czy po obu stronach.
    bleach_formulation:
      name: Formuła wybielacza
      description: Oznacza bazę chemiczną wybielacza (np. na bazie chloru lub tlenu).
    bleach_type:
      name: Typ wybielacza
      description: Określa obecność i rodzaj środka wybielającego zastosowanego w
        odplamiaczu.
    blender_jar_material:
      name: Materiał dzbanka blendera
      description: Określa materiał użyty do wykonania głównego pojemnika/dzbanka
        blendera.
    blooming_season:
      name: Sezon kwitnienia
      description: Oznacza porę roku (pory roku), w której (w których) roślina zazwyczaj
        kwitnie.
    booster_pump_requirement:
      name: Wymagania dotyczące pompy wspomagającej
      description: Wyjaśniają, czy do działania zamiatarki potrzebna jest osobna pompa
        wspomagająca.
    bore_type:
      name: Typ otworu
      description: Określa rodzaj otworu lub interfejs używany do montażu koła pasowego
        na wale.
    bottle_cap_gasket_material:
      name: Materiał uszczelki w nakrętkach butelek
      description: Określa materiał uszczelki stykającej się z krawędzią butelki.
    bottle_cap_liner_type:
      name: Typ wkładki do nakrętki butelki
      description: Określa rodzaj lub materiał wkładki wewnątrz nakrętki butelki,
        co ma wpływ na szczelność i zgodność produktu.
    bottle_fill_state:
      name: Stan napełnienia butelki
      description: Informuje, czy butelka jest sprzedawana pusta czy napełniona wodą
        pitną.
    bottle_stopper_mechanism:
      name: Mechanizm korka do butelki
      description: Określa mechanizm lub typ uszczelniania stosowany w korku lub zabezpieczeniu.
    bowl_type:
      name: Typ miski
      description: Klasyfikuje główne przeznaczenie lub typ miski.
    bread_storage_ventilation:
      name: Wentylacja chlebaka
      description: Opisuje, czy i w jaki sposób pojemnik umożliwia przepływ powietrza,
        aby zachować świeżość pieczywa.
    brew_strength_options:
      name: Opcje mocy parzenia
      description: Określa dostępne poziomy mocy parzenia, które dostosowują czas
        ekstrakcji lub przepływ w celu uzyskania łagodniejszej lub mocniejszej kawy.
    bridge_railing_style:
      name: Typ poręczy mostku
      description: Określa obecność i typ balustrad na mostku, który ma wpływ na bezpieczeństwo
        oraz wygląd.
    briquette_ignition_type:
      name: Metoda rozpalania brykietu
      description: Informuje, czy brykiet zawiera elementy ułatwiające rozpalanie,
        czy jest standardowy, pomagając użytkownikom określić wygodę rozpalania.
    bristle_stiffness:
      name: Sztywność włosia
      description: Określa sztywność włosia szczotki, która ma wpływ na siłę szorowania
        i przydatność do różnych wykończeń muszli klozetowej.
    bristle_tip_type:
      name: Typ końcówki z włosiem
      description: Określa, czy końcówki włosia są rozszczepione (poszarpane) w celu
        zbierania drobniejszego pyłu, czy też pozostają nierozszczepione w celu zbierania
        większych zanieczyszczeń.
    bucket_features:
      name: Funkcje wiadra
      description: Podkreślają szczególne cechy lub udoskonalenia funkcjonalne wiadra,
        aby klient mógł szybko znaleźć produkty o wymaganych funkcjach.
    bulb_finish:
      name: Wykończenie żarówki
      description: Opisuje zewnętrzną powłokę lub wykończenie szkła żarówki, które
        ma wpływ na rozpraszanie światła i jego typ.
    burner_shape:
      name: Kształt palnika
      description: Opisuje geometryczną budowę palnika grilla, która decyduje o dopasowaniu
        i dystrybucji ciepła wewnątrz grilla.
    burr_shape:
      name: Kształty żaren
      description: Określa geometrię żarna w młynkach żarnowych, która wpływa na jednolitość
        mielenia i generowanie ciepła.
    butterfly_feeder_food_type:
      name: Rodzaj karmnika dla motyli
      description: Określa rodzaj pożywienia lub wabika, który ma znaleźć się w karmniku.
    cabinet_light_fixture_style:
      name: Typ szafkowej oprawy oświetleniowej
      description: Opisuje typ lub kształt szafkowej oprawy oświetleniowej.
    candle_container_material:
      name: Materiał pojemnika na świece
      description: Wskazuje materiał naczynia lub pojemnika na świece (świece w słoiku/puszce).
    canner_type:
      name: Typ urządzenia do konserwowania żywności
      description: Określa metodę lub typ konserwowania, do którego służy urządzenie
        do konserwowania żywności.
    canopy_shape:
      name: Kształt baldachimu
      description: Określa kształty geometryczne otwartego baldachimu.
    canopy_venting:
      name: Wentylacja baldachimu
      description: Określa konfigurację wentylacji baldachimu, która ma wpływ na opór
        powietrza i rozpraszanie ciepła.
    car_cleaning_kit_items_included:
      name: Zestaw do czyszczenia samochodu
      description: Zawiera listę konkretnych narzędzi i akcesoriów zawartych w zestawie,
        dzięki czemu klient wie dokładnie, co kupuje i może porównać pakiet.
    carbonation_level_adjustment:
      name: Regulacja poziomu nasycenia dwutlenkiem węgla
      description: Określa, czy saturator zapewnia stały czy regulowany poziom nasycenia
        dwutlenkiem węgla.
    catalytic_combustor_type:
      name: Typ komory spalania katalitycznego
      description: Wskazuje, czy piec wykorzystuje katalityczny, niekatalityczny czy
        hybrydowy system spalania, co wpływa na wydajność i emisję.
    ceiling_light_fixture_style:
      name: Styl sufitowej oprawy oświetleniowej
      description: Określa podstawowy typ strukturalny / konfigurację oprawy oświetleniowej
        sufitowej.
    center_hole_shape:
      name: Kształt otworu centralnego
      description: Opisuje kształty geometryczne otworu montażowego/centralnego, które
        określają kompatybilność z konkretnymi wrzecionami kosiarki.
    chainsaw_bar_mount_type:
      name: Typ mocowania prowadnicy piły łańcuchowej
      description: Określa typ mocowania lub rodzaj nacięcia prowadnicy piły łańcuchowej,
        aby zapewnić jej dopasowanie do głowicy piły.
    chainsaw_bar_nose_type:
      name: Typ szpica prowadnicy do piły łańcuchowej
      description: Określa typ końcówki prowadnicy, który ma wpływ na wydajność cięcia
        i konserwację.
    chainsaw_bar_type:
      name: Typ prowadnicy do piły łańcuchowej
      description: Klasyfikuje konstrukcję i przeznaczenie prowadnicy.
    chainsaw_cutter_type:
      name: Typ piły łańcuchowej
      description: Określa profil piły / konstrukcję łańcucha, która ma wpływ na prędkość
        cięcia, trwałość i charakterystykę odrzutu.
    champagne_glass_type:
      name: Rodzaj kieliszka do szampana
      description: Określa konkretny kształt kieliszka do szampana, umożliwiając klientowi
        rozróżnianie kształtów zoptymalizowanych pod kątem różnych doznań podczas
        picia.
    chandelier_shape:
      name: Kształt żyrandola
      description: Określa ogólną formę strukturalną żyrandola.
    charcoal_chimney_features:
      name: Cechy komina węglowego
      description: Określają najważniejsze cechy funkcjonalne komina węglowego.
    charcoal_ignition_type:
      name: Metoda rozpalania węgla drzewnego
      description: Informuje, czy węgiel drzewny został poddany obróbce lub modyfikacji
        w celu łatwiejszego rozpalania lub czystszego spalania.
    chopstick_style:
      name: Typ pałeczek
      description: Określa typ regionalny lub kulturowy pałeczek, który może mieć
        wpływ na ich długość, kształt i zdobienia.
    chopstick_trainer_design:
      name: Konstrukcja pomocnika do pałeczek
      description: Opisuje konstrukcję mechaniczną lub metodę wspomagania stosowaną
        przez pomocnika.
    cigar_cutter_type:
      name: Typ obcinacza do cygar
      description: Określa mechanizm lub typ cięcia używany do obcinania końcówki
        cygara.
    cigar_punch_type:
      name: Typ obcinacza do cygar
      description: Określa mechanizm i typ obcinacza do cygar.
    clay_pot_material:
      name: Materiał na gliniane garnki
      description: Określa skład gliny lub typ naczynia, np. gliniane lub kamionkowe.
    cleaner_concentration:
      name: Stężenie środka czyszczącego
      description: Informuje, czy środek czyszczący jest sprzedawany w postaci gotowej
        do użycia czy jako koncentrat, który należy rozcieńczyć przed użyciem.
    cleaning_cloth_features:
      name: Cechy ściereczki czyszczącej
      description: Wskazuje szczególne właściwości wytrzymałościowe tkanin.
    cleaning_solution_concentration:
      name: Stężenie roztworu czyszczącego
      description: Wskazuje, czy produkt jest sprzedawany w postaci gotowej do użycia,
        skoncentrowanej czy w innej formie rozcieńczenia.
    clock_chime_melody:
      name: Melodia dzwonka zegara
      description: Określa melodię lub wzór uderzeń odgrywanych przez zegar co godzinę
        lub kwadrans.
    clock_display_type:
      name: Typ wyświetlacza zegara
      description: Określa sposób prezentacji czasu, co jest przydatne dla klientów,
        którzy preferują tryb cyfrowy, analogowy, klapkowy itp.
    clock_hand_mounting_type:
      name: Typ mocowania wskazówki zegara
      description: Określa typ interfejsu używany do mocowania wskazówek zegara do
        mechanizmu.
    clock_hand_style:
      name: Typ wskazówek zegara
      description: Określa wygląd wskazówek, umożliwiając klientowi znalezienie wskazówek,
        które pasują do estetyki jego zegara.
    clock_movement_type:
      name: Typ mechanizmu zegara
      description: Określa wewnętrzny mechanizm pomiaru czasu zegara.
    clothespin_type:
      name: Rodzaj klamerki do bielizny
      description: Określa konstrukcję / typ klamerki.
    co2_cylinder_compatibility:
      name: Kompatybilność z butlami CO2
      description: Określa typ lub rozmiar butli CO2 pasującej do saturatora, zapewniając
        klientowi możliwość znalezienia kompatybilnych wkładów wymiennych.
    co2_supplementation_requirement:
      name: Zapotrzebowanie na suplementację CO2
      description: Wskazuje poziom suplementacji dwutlenku węgla niezbędny do zapewnienia
        optymalnego zdrowia roślin w akwariach.
    coaster_features:
      name: Charakterystyka podkładki
      description: Określa unikalne cechy podstawek, takie jak chłonna lub antypoślizgowa
        podstawa.
    cocktail_strainer_type:
      name: Typ sitka do koktajli
      description: Określa konstrukcję sitka do koktajli, która ma wpływ na kompatybilność
        z shakerami, i sposób użytkowania.
    code_technology:
      name: Technologia kodowania
      description: Określa kod lub technologię bezpieczeństwa, której używa pilot
        do komunikacji z mechanizmem otwierania bramy garażowej.
    coffee_decanter_warmer_features:
      name: Funkcje podgrzewacza do karafek do kawy
      description: Podkreśla istotne cechy funkcjonalne i bezpieczeństwa charakterystyczne
        dla podgrzewaczy karafek do do kawy.
    coffee_filter_basket_size:
      name: Rozmiar uchwytu na filtr do kawy
      description: Określa standardowe oznaczenie rozmiaru, które obsługuje koszyk,
        zapewniając kompatybilność z filtrami i urządzeniami.
    coffee_filter_shape:
      name: Kształty filtrów do kawy
      description: Określa kształt geometryczny filtra do kawy, aby zapewnić kompatybilność
        z różnymi ekspresami do kawy.
    coffee_filter_type:
      name: Typ filtra do kawy
      description: Określa rodzaj filtra odpowiedni lub zawarty w przelewowym ekspresie
        do kawy, który może mieć wpływ na smak i bieżący koszt materiałów eksploatacyjnych.
    coffee_grinder_accessory_type:
      name: Typ akcesorium do młynka do kawy
      description: Klasyfikuje konkretny rodzaj akcesoriów, co ułatwia filtrowanie
        i wyszukiwanie.
    colander_style:
      name: Typ cedzaka
      description: Klasyfikuje konstrukcję cedzaka, np. miska na nóżce lub montowany
        nad zlewem.
    compatible_air_conditioner_type:
      name: Kompatybilny typ klimatyzatora
      description: Określa typ klimatyzatora, do którego akcesorium jest przeznaczone.
    compatible_awning_rail_type:
      name: Kompatybilny typ szyny markizy
      description: Określa szynę markizy lub system szyn, do którego pasuje klips
        wieszakowy.
    compatible_beverage_type:
      name: Zgodny typ napoju
      description: Określa rodzaj napoju, który ma być chroniony za pomocą korka lub
        zatyczki.
    compatible_can_size:
      name: Zgodny rozmiar puszki
      description: Określa rozmiary puszek na napoje, jakie może obsługiwać zgniatarka.
    compatible_cigarette_size:
      name: Kompatybilny rozmiar papierosów
      description: Określa standardowe długości i formaty papierosów pasujące do cygarniczki.
    compatible_coffee_capsule_system:
      name: Kompatybilny system kapsułek do kawy
      description: Określa system kapsułek lub podów, do którego jest przeznaczony
        adapter, dzięki czemu klient ma pewność, że wybierze adapter odpowiedni do
        preferowanego przez siebie formatu kawy.
    compatible_coffee_maker_type:
      name: Kompatybilny typ ekspresu do kawy
      description: Określa typ ekspresu do kawy lub espresso, do którego akcesorium
        jest przeznaczone.
    compatible_cooking_thermometer_type:
      name: Kompatybilny typ termometru kuchennego
      description: Określa typy termometrów kuchennych, do których regulacji lub weryfikacji
        jest przeznaczone to narzędzie kalibracyjne.
    compatible_coupler_size:
      name: Zgodny rozmiar złącza
      description: Określa rozmiar łącznika, do którego pasuje woreczek dekoracyjny
        bez przycinania.
    compatible_dehumidifier_technology:
      name: Kompatybilna technologia osuszania
      description: Oznacza technologię osuszania, z którą filtr jest kompatybilny,
        np. sprężarka lub osuszacz.
    compatible_feeder_type:
      name: Zgodny typ podajnika
      description: Określa typy podajników, do których pasuje dana tacka.
    compatible_footwear_material:
      name: Kompatybilny materiał obuwia
      description: Wymienia rodzaje materiałów obuwniczych, do których nadaje się
        pasta lub wosk.
    compatible_fuel_type:
      name: Zgodny typ paliwa
      description: Określa rodzaj paliwa, do którego akcesorium jest przeznaczone,
        zapewniając właściwe dopasowanie do grzejników tarasowych zasilanych propanem,
        gazem ziemnym, energią elektryczną lub innym paliwem.
    compatible_garment_steamer_design:
      name: Kompatybilna konstrukcja parownicy do ubrań
      description: Określa typy parownic do ubrań, do których uchwyt na przewód jest
        przeznaczony.
    compatible_grill_type:
      name: Zgodny typ kratki
      description: Określa rodzaje grilli, do których akcesorium jest przeznaczone.
    compatible_hazardous_waste_type:
      name: Kompatybilny typ odpadów niebezpiecznych
      description: Określa rodzaj odpadów niebezpiecznych, jakie można umieszczać
        w danym pojemniku.
    compatible_ironing_board_type:
      name: Zgodny typ deski do prasowania
      description: Określa typ deski do prasowania, do której pasuje dana część, pomagając
        klientowi określić zgodność.
    compatible_lawn_mower_type:
      name: Kompatybilny typ kosiarki
      description: Określa typ kosiarki, do której pasuje zestaw do tworzenia pasów.
    compatible_leaf_blower_style:
      name: Kompatybilny typ dmuchawy do liści
      description: Określa typ dmuchawy do liści, z którą akcesorium jest kompatybilne.
    compatible_mailbox_size:
      name: Zgodny rozmiar skrzynki pocztowej
      description: Oznacza rozmiar(y) skrzynki pocztowej, do której pasuje akcesorium,
        zgodnie z powszechną klasyfikacją USPS/branżową.
    compatible_mailbox_type:
      name: Zgodny typ skrzynki pocztowej
      description: Określa typ skrzynki pocztowej, która pasuje do wnętrza obudowy
        lub jest z nią zgodna – dzięki tej informacji kupujący może sprawdzić, czy
        produkt będzie odpowiednich rozmiarów.
    compatible_napkin_size:
      name: Zgodny rozmiar serwetki
      description: Określa wymiary lub format serwetek, do których przeznaczony jest
        uchwyt/dozownik.
    compatible_outdoor_grill_style:
      name: Kompatybilny z grillem zewnętrznym
      description: Określa typ lub konfigurację grilla zewnętrznego, do którego jest
        przeznaczona osłona.
    compatible_radiator_style:
      name: Kompatybilny typ grzejnika
      description: Wymienia typy grzejników, do których przeznaczony jest dany element
        wyposażenia, np. grzejnik płytowy, grzejnik kolumnowy, grzejnik drabinkowy
        lub grzejnik przypodłogowy.
    compatible_refrigerator_compartment:
      name: Kompatybilna komora lodówki
      description: Określa, w którym miejscu lodówki akcesorium będzie używane.
    compatible_stove_fuel_type:
      name: Zgodny typ paliwa do kuchenki
      description: Określa rodzaje paliwa, z którymi kompatybilne jest akcesorium
        do kuchenki przenośnej, pomagając klientom dopasować je do posiadanej kuchenki
        (np. butla z gazem lub alkoholem).
    compatible_stove_type:
      name: Zgodny typ kuchenki
      description: Określa rodzaje przenośnych kuchenek, do których przeznaczona jest
        podstawa.
    compatible_tissue_box_type:
      name: Kompatybilny typ pudełka na chusteczki
      description: Określa typ/rozmiar pudełka na chusteczki, do którego pasuje dany
        uchwyt.
    compatible_tractor_type:
      name: Kompatybilny typ ciągnika
      description: Określa kategorię ciągnika, do którego przeznaczona jest część/akcesorium.
    compatible_umbrella_type:
      name: Zgodny typ parasolki
      description: Określa typ parasola ogrodowego, do którego pasuje pokrowiec.
    compatible_washing_machine_type:
      name: Zgodny typ pralki
      description: Określa, do jakich typów pralek nadaje się dany środek czyszczący
        (np. z ładowaniem od przodu, z ładowaniem od góry, o wysokiej wydajności).
    compatible_waste_container_type:
      name: Kompatybilny typ pojemnika na odpady
      description: Określa rodzaj zbiornika, do którego pasuje lub jest zaprojektowane
        akcesorium.
    compatible_water_cooler_type:
      name: Zgodny typ schładzacza wody
      description: Wskazuje, z którym typem automatu z wodą akcesorium jest kompatybilne,
        pomagając klientom wybrać właściwe części do swojego urządzenia.
    compatible_water_heater_type:
      name: Zgodny typ podgrzewacza wody
      description: Określa typ podgrzewacza wody, z którym produkt jest kompatybilny.
    compatible_wrap_material:
      name: Zgodny materiał folii
      description: Wymienia rodzaje opakowań do żywności, które można przechowywać
        w dozowniku.
    compost_aerator_design:
      name: Konstrukcja aeratora kompostu
      description: Określa konstrukcję mechaniczną lub typ aeratora, opisując sposób,
        w jaki miesza on kompost.
    compost_form:
      name: Forma kompostu
      description: Opisuje fizyczną formę lub typ pakowania produktu kompostowego.
    compost_source_material:
      name: Materiał źródła kompostu
      description: Określa główny(-e) materiał(y) organiczny(-e) do pozyskiwania kompostu.
    compression_method:
      name: Metoda kompresji
      description: Oznacza technikę stosowaną w celu wydalenia powietrza lub oszczędzania
        przestrzeni w worku.
    cooking_gel_fuel_base:
      name: Baza paliwa żelowego do gotowania
      description: Określa podstawową bazę chemiczną paliwa żelowego, umożliwiając
        użytkownikom wybór pomiędzy paliwem na bazie etanolu, metanolu, glikolu i
        innymi formułami paliwa, które różnią się zapachem, wydzielanym ciepłem i
        przydatnością do stosowania wewnątrz i na zewnątrz.
    cooking_surface_texture:
      name: Tekstura powierzchni do gotowania
      description: Określa fakturę powierzchni do gotowania, np. płaską, karbowaną
        lub o podwójnym przeznaczeniu.
    cooking_thermometer_design:
      name: Konstrukcja termometru kuchennego
      description: Określa sposób obsługi termometru kuchennego, np. analogowy lub
        cyfrowy.
    cookware_coating_material:
      name: Materiał powłoki naczyń kuchennych
      description: Określa rodzaj powłoki wewnętrznej lub zewnętrznej zastosowanej
        w naczyniach kuchennych, dostarczając informacji na temat skuteczności zapobiegania
        przywieraniu, trwałości i wymagań dotyczących pielęgnacji.
    cookware_coating_type:
      name: Rodzaj powłoki naczynia kuchennego
      description: Określa powłokę wewnętrzną lub powierzchniową naczyń kuchennych.
    cookware_lid_style:
      name: Typ pokrywki naczynia kuchennego
      description: Opisuje ogólny typ i funkcjonalną konstrukcję pokrywki.
    cooler_style:
      name: Rodzaj lodówki
      description: Określa konstrukcję przenośnej lodówki na żywność/napoje, pomagając
        klientowi dokonać wyboru między twardymi skrzynkami, miękkimi torbami, plecakami
        itp.
    corkscrew_accessories_included:
      name: Akcesoria do korkociągów w zestawie
      description: Określa dodatkowe komponenty dołączone do korkociągu.
    corkscrew_hinge_type:
      name: Zawias korkociągowy
      description: Określa, czy korkociąg wykorzystuje mechanizm dźwigniowy z pojedynczym
        czy podwójnym zawiasem.
    corkscrew_tools_included:
      name: Narzędzia korkociągowe w zestawie
      description: Wymienia narzędzia i akcesoria dołączone do korkociągu (np. obcinacz
        do folii, otwieracz do butelek, ostrze noża), aby klient mógł zobaczyć, co
        jest w zestawie.
    crushing_method:
      name: Metoda zgniatania
      description: Opisuje mechanizm służący do zgniatania puszek.
    crust_browning_level:
      name: Stopień zrumienienia skórki
      description: Określa dostępne opcje koloru/zarumienienia skórki oferowane przez
        maszynę do pieczenia chleba.
    cultivar_type:
      name: Typ odmiany uprawnej
      description: Określa typ odmiany uprawnej, wskazując, czy jest to odmiana tradycyjna,
        mieszana, otwarcie zapylana czy modyfikowana genetycznie.
    cultivator_type:
      name: Typ kultywatora
      description: Klasyfikuje konstrukcję kultywatora, np. z zębami z przodu lub
        z tyłu.
    cup_warmer_features:
      name: Charakterystyka podgrzewacza do kubków
      description: Wskazuje specjalne cechy konstrukcyjne i wygodę charakterystyczne
        dla podgrzewaczy do kubków.
    curtain_heading_style:
      name: Typ górnej krawędzi zasłony
      description: Określa typ górnej krawędzi używanej do zawieszania zasłony lub
        draperii, co determinuje wymagany sprzęt i ogólny wygląd.
    curtain_lining_type:
      name: Rodzaj podszewki zasłonowej
      description: Określa, czy zasłona jest podszyta, a także jaki jest rodzaj użytej
        podszewki, co ma wpływ na izolację, układanie się zasłony oraz stopień widoczności.
    curtain_rod_type:
      name: Typ karnisza
      description: Klasyfikuje typ konstrukcyjny karnisza, aby klienci mogli szybko
        znaleźć karnisz, który pasuje do ich wymagań montażowych.
    cutting_disc_function:
      name: Funkcje tarczy tnącej
      description: Określa konkretną czynność przetwarzania żywności wykonywaną przez
        tarczę.
    cutting_head_type:
      name: Typ głowicy tnącej
      description: Określa typ elementu tnącego używanego przez osprzęt.
    cutting_mechanism_type:
      name: Typ mechanizmu tnącego
      description: Opisuje typ mechanizmu tnącego zintegrowanego z dozownikiem.
    cylinder_connector_type:
      name: Typ złącza cylindrycznego
      description: Określa podłączenie lub gwint cylindra, ustalając kompatybilność
        z konkretnymi modelami saturatora.
    decorating_bag_features:
      name: Cechy torebki ozdobnej
      description: Wskazuje szczególną konstrukcję i cechy funkcjonalne torebki ozdobnej.
    dehumidifier_refill_form:
      name: Forma wkładu do osuszacza
      description: Określa fizyczną formę/format wkładu, dzięki czemu klienci mogą
        wybierać kompatybilne typy.
    desiccant_material:
      name: Materiał pochłaniający wilgoć
      description: Określa substancję pochłaniającą wilgoć, co jest ważne ze względu
        na wydajność, możliwość ponownego użycia i bezpieczeństwo.
    dial_finish:
      name: Wykończenie tarczy
      description: Opisuje wykończenie powierzchni tarczy, co ma wpływ na połysk i
        typ.
    dinnerware_features:
      name: Cechy naczyń stołowych
      description: Wskazuje szczególne cechy funkcjonalne naczyń stołowych.
    dish_detergent_features:
      name: Funkcje detergentu do naczyń
      description: Wymieniają godne uwagi formuły i właściwości ekologiczne, które
        pomagają klientom filtrować i porównywać produkty.
    dishwasher_accessory_type:
      name: Typ akcesorium do zmywarki
      description: Klasyfikuje konkretny rodzaj akcesoriów, umożliwiając klientowi
        szybkie filtrowanie.
    dishwasher_wash_programs:
      name: Programy mycia w zmywarce
      description: Wymienia wstępnie ustawione cykle mycia dostępne w zmywarce, umożliwiając
        klientom filtrowanie według wszechstronności programu.
    dispensing_mechanism:
      name: Mechanizm dozujący
      description: Opisuje sposób dozowania napoju z termosu, co wpływa na użyteczność
        w różnych warunkach.
    dispensing_temperature_options:
      name: Opcje temperatury dozowania
      description: Wskazuje opcje temperatury, jakie może zaoferować dystrybutor wody.
    displayed_character:
      name: Wyświetlany znak
      description: Określa znak alfanumeryczny reprezentowany przez dany element.
    diving_board_surface_texture:
      name: Tekstura powierzchni trampoliny
      description: Opisuje fakturę górnej powierzchni trampoliny, mającą wpływ na
        przyczepność i odporność na poślizg.
    door_configuration:
      name: Konfiguracja drzwi
      description: Wskazuje, ile drzwi dostępowych ma pułapka
    door_hinge_orientation:
      name: Orientacja zawiasów drzwi
      description: Określa położenie zawiasu lub kierunek otwierania drzwi lub pokrywy
        zamrażarki.
    door_hinge_position:
      name: Umiejscowienie zawiasów drzwi
      description: Określa stronę drzwi, po której znajduje się zawias, lub, czy jest
        on odwracalny, co wpływa na montaż i rozplanowanie przestrzeni.
    draft_gas_type:
      name: Rodzaj gazu ssącego
      description: Określa rodzaj systemu gazowego używanego do nalewania, co ma znaczenie
        w przypadku nasycenia dwutlenkiem węgla i rodzaju napoju.
    drainage_design:
      name: Rodzaj drenażu
      description: Oznacza sposób, w jaki mydelniczka radzi sobie ze spływaniem wody,
        dzięki czemu mydło pozostaje suche.
    drainage_method:
      name: Metoda drenażu
      description: Opisuje sposób odprowadzania zebranej wody i wskazuje, czy wymagane
        jest ręczne opróżnianie.
    drawer_organizer_features:
      name: Charakterystyka organizera do szuflady
      description: Wskazuje najważniejsze cechy funkcjonalne organizera do szuflady.
    drinkware_crystal_composition:
      name: Skład kryształowych naczyń do picia
      description: Określa konkretną zastosowaną formułę szkła/kryształu, wskazując
        zawartość ołowiu i charakterystykę przejrzystości.
    drinkware_holder_style:
      name: Stojak/uchwyt na naczynia do napojów
      description: Klasyfikuje ogólną konstrukcję lub konfigurację stojaka/uchwytu
        na naczynia do napojów.
    drinkware_insulation:
      name: Izolacja naczyń do napojów
      description: Określa konstrukcję izolacyjną naczyń do napojów, wpływając na
        utrzymanie temperatury.
    dripper_design:
      name: Konstrukcja drippera
      description: Określa ogólne kształty drippera lub metodę drenażu, która ma wpływ
        na charakterystykę parzenia.
    drum_grating_styles_included:
      name: Bębny tnące w zestawie
      description: Wymienia różne typy bębnów tnących i szatkujących dostępne w zestawie,
        dzięki czemu użytkownicy mogą szybko zapoznać się z oferowanymi funkcjami.
    dryer_drum_material:
      name: Materiał bębna suszarki
      description: Oznacza materiał, z którego wykonany jest wewnętrzny bęben, mający
        wpływ na trwałość, gromadzenie się ładunków elektrostatycznych i hałas.
    dryer_sheet_features:
      name: Cechy chusteczek do suszarek
      description: Podkreśla szczególne cechy charakterystyczne lub zalety chusteczek
        do suszarki.
    dryer_venting_type:
      name: Typ odpowietrznika suszarki
      description: Klasyfikuje metodę odpowietrzania stosowaną w suszarce, która ma
        wpływ na wymagania instalacyjne i efektywność energetyczną.
    drying_system:
      name: System suszenia
      description: Oznacza technologię, którą zmywarka wykorzystuje do suszenia naczyń
        na koniec cyklu.
    duster_head_material:
      name: Materiał główki miotełki do kurzu
      description: Określa materiał głowicy zbierającej kurz, który ma znaczenie dla
        wydajności i alergików.
    dustpan_type:
      name: Typ szufelki
      description: Klasyfikuje ogólny typ/formę szufelki.
    edge_finish:
      name: Wykończenie krawędzi
      description: Opisuje technikę wykończenia krawędzi bieżnika, co wpływa na estetykę
        i trwałość.
    egg_cooker_functions:
      name: Funkcje urządzenia do gotowania jajek
      description: Określa tryb gotowania obsługiwany przez jajowar.
    egg_cup_design:
      name: Konstrukcja kieliszka na jajko
      description: Określa typ podstawki na jajko, np. na nóżce lub cokole.
    electric_kettle_features:
      name: Charakterystyka czajnika elektrycznego
      description: Wymienia istotne funkcje zapewniające wygodę i bezpieczeństwo czajnika.
    emergency_blanket_features:
      name: Cechy koca ratunkowego
      description: Podkreśla szczególne cechy funkcjonalne koca.
    emergency_lighting_operating_mode:
      name: Tryb pracy oświetlenia awaryjnego
      description: Określa zachowanie się awaryjnej oprawy oświetleniowej podczas
        normalnego stanu zasilania oraz przerw w dostawie prądu.
    entrance_slot_design:
      name: Konstrukcja otworu wejściowego
      description: Opisuje rodzaj otworów, przez które motyle mogą dostać się do domu.
    espresso_boiler_type:
      name: Typ bojlera do espresso
      description: Opisuje konfigurację systemu grzewczego używanego do wytwarzania
        naparu oraz pary.
    fabric_care_product_form:
      name: Forma produktu do pielęgnacji tkanin
      description: Określa formę fizyczną środka do pielęgnacji tkanin, np. płynu
        do zmiękczania tkanin lub dodatku do suszarki bębnowej.
    fabric_softener_features:
      name: Funkcje płynu do zmiękczania tkanin
      description: Podkreśla szczególne cechy funkcjonalne lub zalety zmiękczaczy
        do tkanin.
    fabric_stiffness_level:
      name: Poziom sztywności tkaniny
      description: Określa stopień sztywności i świeżości, jaki krochmal nadaje tkaninie
        po prasowaniu.
    fabric_weave:
      name: Splot tkaniny
      description: Oznacza specyficzną konstrukcję splotu tkaniny, mającą wpływ na
        jej wygląd i fakturę.
    feeder_design:
      name: Konstrukcja podajnika
      description: Określa typ strukturalny podajnika.
    fermentation_crock_type:
      name: Typ pojemnika do fermentacji
      description: Określa podstawową konstrukcję garnka.
    filament_style:
      name: Styl włókna
      description: Określa wewnętrzną konfigurację żarników, która wpływa na estetykę
        i dystrybucję światła.
    film_reusability:
      name: Możliwość ponownego wykorzystania folii
      description: Określa, czy folia jest przeznaczona do jednorazowego użytku, czy
        można ją zdjąć, przechowywać i ponownie założyć.
    filter_bleaching_method:
      name: Metoda wybielania filtracyjnego
      description: Określa stan wybielenia i proces stosowany w filtrze, informując
        o preferencjach dotyczących smaku i zrównoważonego rozwoju.
    filter_technology:
      name: Technologia filtrowania
      description: Określa zastosowaną technologię kontroli i filtracji zapachów.
    fire_alarm_panel_type:
      name: Typ panelu alarmu pożarowego
      description: Określa architekturę systemu panelu.
    fire_protection_class:
      name: Klasa ochrony przeciwpożarowej
      description: Oznacza klasę certyfikacji określającą maksymalną dopuszczalną
        temperaturę wewnętrzną podczas testów ogniowych (np. UL Class 350).
    fire_starter_type:
      name: Typ podpałki
      description: Określa podstawową formę lub mechanizm działania podpałki, pomagając
        klientowi znaleźć dokładnie taki typ rozpalania, jakiego potrzebuje.
    fireplace_fuel_form:
      name: Forma paliwa kominkowego
      description: Określa formę fizyczną lub postać paliwa, umożliwiając klientowi
        wybór pomiędzy kawałkami drewna, peletem, brykietem, pojemnikami z żelem i
        innymi opcjami odpowiednimi do jego urządzenia.
    fireplace_tool_items_included:
      name: Narzędzia kominkowe w zestawie
      description: Wskazuje konkretne narzędzia lub akcesoria do kominków dołączone
        do produktu, aby klienci wiedzieli dokładnie, co otrzymują, a także by mogli
        łatwo porównać pakiety.
    firewood_seasoning:
      name: Sezonowanie drewna opałowego
      description: Wskazuje stan wysuszenia drewna opałowego, który ma wpływ na poziom
        wilgotności, łatwość zapłonu i sprawność cieplną.
    flag_attachment_style:
      name: Sposób mocowania flagi
      description: Opisuje sposób mocowania flagi lub chorągiewki do masztu lub punktu
        montażowego.
    flame_adjustment:
      name: Regulacja płomienia
      description: Wskazuje, czy i w jaki sposób można regulować intensywność płomienia.
    flask_insulation_type:
      name: Typ izolacji butelki
      description: Oznacza konstrukcję izolacji termicznej butelki, mającą wpływ na
        utrzymanie temperatury.
    flatware_finish:
      name: Wykończenie sztućców
      description: Opisuje stopień połysku lub wariantu powierzchni sztućców, co wpływa
        na estetykę i widoczność zarysowań.
    floor_protection_transparency_level:
      name: Poziom przezroczystości zabezpieczenia podłogi
      description: Określa stopień przezroczystości folii lub materiału, od przezroczystego
        do nieprzezroczystego.
    floor_scrubber_brush_type:
      name: Typ szczotki do szorowania podłóg
      description: Określa główną konfigurację szczotki lub zastosowanej podkładki.
    floor_surface_compatibility:
      name: Kompatybilność z powierzchnią podłogi
      description: Określa materiały powierzchni podłogi, dla których ochraniacz jest
        bezpieczny i które ma chronić.
    flow_control_type:
      name: Typ regulacji przepływu
      description: Opisuje, czy szpikulec jest wyposażony w regulowany mechanizm umożliwiający
        zmianę ilości podawanej wody.
    flue_outlet_position:
      name: Umiejscowienie wylotu spalin
      description: Określa miejsce, w którym przewód kominowy wychodzi z korpusu pieca,
        co ma wpływ na układ instalacji i połączenie komina.
    flue_pipe_connection_type:
      name: Typ przewodu kominowego
      description: Opisuje mechanizm używany do łączenia przedłużenia z innymi elementami
        w celu zarządzania pyłami.
    fluorescent_tube_output_type:
      name: Typ wyjścia świetlówki
      description: Określa podtyp wyjścia świetlówki, co ma znaczenie dla kompatybilności
        statecznika i jasności.
    fly_swatter_type:
      name: Typ łapki na muchy
      description: Oznacza sposób lub mechanizm działania łapki na muchy.
    foil_duty_rating:
      name: Ocena wytrzymałości folii
      description: Klasyfikuje wytrzymałość lub klasę folii pod kątem zamierzonego
        zastosowania.
    foliage_color:
      name: Kolor liści
      description: Określa dominujący kolor liści rośliny, wspierając wybór rośliny
        ozdobnej w uzupełnieniu do koloru kwiatów.
    fondue_pot_type:
      name: Typ naczynia do fondue
      description: Klasyfikuje sposób grzania i przeznaczenie zestawu do fondue.
    fondue_set_pieces_included:
      name: Elementy do fondue w zestawie
      description: Określa elementy wchodzące w skład zestawu do fondue, np. naczynie
        do fondue lub widelce.
    food_carrier_insulation_type:
      name: Typ izolacji pojemnika na żywność
      description: Określa, czy produkt jest izolowany i jaka technologia izolacji
        została zastosowana.
    food_dehydrator_surface_type:
      name: Typ powierzchni suszarki do żywności
      description: Opisuje rodzaj powierzchni arkuszy/tacek, który ma wpływ na przepływ
        powietrza i uwalnianie żywności.
    food_dehydrator_tray_type:
      name: Typ tacki do suszarek do żywności
      description: Określa konkretny typ lub projekt funkcjonalny tacy.
    food_grater_type:
      name: Typ tarki do żywności
      description: Wskazuje styl konstrukcji tarki.
    food_processor_attachments_included:
      name: Akcesoria do robota kuchennego w zestawie
      description: Określa konkretne typy osprzętu zawarte w zestawie, dzięki czemu
        klienci dokładnie wiedzą, jakie funkcje zyskają po dokonaniu zakupu.
    food_storage_bag_features:
      name: Cechy worka do przechowywania żywności
      description: Podkreśla godne uwagi cechy funkcjonalne torby.
    food_storage_bag_type:
      name: Typ worka do przechowywania żywności
      description: Określają podstawowy typ lub klasyfikację przeznaczenia worka do
        przechowywania żywności.
    food_storage_features:
      name: Charakterystyka rozwiązania do przechowywania żywności
      description: Wskazują szczególne cechy, które zwiększają funkcjonalność i wygodę
        produktu do przechowywania żywności.
    food_wrap_features:
      name: Charakterystyka rozwiązania do zawijania żywności
      description: Wskazują szczególne cechy, które wpływają na użytkowanie i zrównoważony
        rozwój.
    footwear_type_compatibility:
      name: Kompatybilność typu obuwia
      description: Określa rodzaj obuwia, do którego przeznaczone jest prawidło.
    formulation_concentration:
      name: Stężenie preparatu
      description: Określa, czy produkt jest koncentratem, czy preparatem gotowym
        do użycia.
    fountain_design:
      name: Konstrukcja fontanny
      description: Klasyfikuje typ strukturalny lub formę fontanny.
    fragrance_oil_application:
      name: Zastosowanie olejku zapachowego
      description: Określa zalecane lub powszechne zastosowanie olejku, co pomaga
        majsterkowiczom i hobbystom w wyborze odpowiedniego składu.
    fragrance_oil_composition:
      name: Skład olejku zapachowego
      description: Określa, czy formuła zawiera wyłącznie naturalny olejek eteryczny,
        syntetyczny olejek zapachowy czy mieszankę obu.
    fragrance_refill_type:
      name: Typ wkładu zapachowego
      description: Określa format wkładów zapachowych pasujących do dyfuzora.
    freezer_configuration:
      name: Konfiguracja jednostki mrożącej
      description: Określa fizyczną orientację/typ jednostki mrożącej.
    freezing_method:
      name: Metoda zamrażania
      description: Opisuje technologię stosowaną do mrożenia mieszanki w maszynce
        do lodów, pomagając klientom odróżnić modele kompresorowe, urządzenia z misą
        do wstępnego mrożenia, ręczne maszyny do mrożenia soli i lodu oraz inne konstrukcje.
    fuel_compatibility:
      name: Kompatybilność paliwowa
      description: Określa rodzaje paliwa, których można bezpiecznie używać z rusztem.
    funnel_type:
      name: Typ komina
      description: Klasyfikuje komin na podstawie jego konstrukcji i przeznaczenia.
    furnace_configuration:
      name: Konfiguracja pieca
      description: Określa fizyczny kierunek przepływu powietrza w obudowie pieca
        na potrzeby instalacji.
    furniture_anchor_type:
      name: Typ kotwy meblowej
      description: Określa typ strukturalny zestawu kotew meblowych, wskazując na
        mechanizm ich działania.
    garage_floor_mat_style:
      name: Garażowa mata podłogowa
      description: Określa format lub typ garażowej maty podłogowej.
    garbage_disposal_feed_type:
      name: Typ podajnika do utylizacji odpadów
      description: Określa sposób, w jaki odpady żywnościowe trafiają do urządzenia
        – w sposób ciągły podczas pracy lub w partiach.
    garbage_disposal_stopper_style:
      name: Zatyczka do utylizatora odpadów
      description: Oznacza typ funkcjonalny zatyczki.
    garden_hose_design:
      name: Typ węża ogrodowego
      description: Określa typ strukturalny węża, który determinuje jego przeznaczenie
        i właściwości.
    garden_hose_fitting_type:
      name: Typ przyłącza węża ogrodowego
      description: Określa typ lub funkcje przyłącza węża ogrodowego, takiego jak
        adapter lub rozdzielacz Y, co ułatwia przeglądanie i filtrowanie.
    gardening_fork_type:
      name: Typ wideł ogrodowych
      description: Klasyfikuje konkretny styl lub przeznaczenie widelca.
    garland_style:
      name: Typ girlandy
      description: Klasyfikuje, w jaki sposób skonstruowana lub ozdobiona jest girlanda.
    gas_type:
      name: Rodzaj gazu
      description: Określa rodzaj sprężonego gazu zawartego w cylindrze ładowarki.
    gasket_profile_type:
      name: Typ profilu uszczelki
      description: Określa standardowy profil lub przekrój uszczelki.
    gazebo_roof_material:
      name: Materiał na dach altany
      description: Określa materiał, z którego wykonane są panele lub twarde pokrycie
        dachowe altany.
    glass_and_surface_cleaner_features:
      name: Funkcje środka do czyszczenia szkła i powierzchni
      description: Wskazuje szczególne cechy i zalety środka do czyszczenia szkła
        i powierzchni.
    glass_cleaner_features:
      name: Funkcje środka do czyszczenia szkła
      description: Wskazuje szczególne właściwości i cechy preparatu charakterystyczne
        dla środków do czyszczenia szkła.
    glazing_material:
      name: Materiał tworzywa szklistego
      description: Określa materiał pokrywający obszar zdjęcia (np. szkło, akryl lub
        brak).
    globe_map_content:
      name: Typ globusa
      description: Opisuje podstawową treść kartograficzną prezentowaną na globusie.
    glue_trap_design:
      name: Konstrukcja pułapki klejowej
      description: Określa fizyczny typ lub format pułapki, pomagając w doborze jej
        do miejsca ustawienia i rodzaju szkodnika.
    grab_bar_shape:
      name: Kształt poręczy
      description: Określa projekt konstrukcyjny poręczy, wpływając na położenie montażowe
        i wsparcie dla użytkownika.
    grass_discharge_type:
      name: Typ wyrzutu trawy
      description: Określa sposób, w jaki kosiarka usuwa skoszoną trawę (np. wyrzut
        boczny, zbieranie do tylnego worka).
    grate_design:
      name: Konstrukcja tarki
      description: Wskazuje styl konstrukcji rusztu.
    grater_design:
      name: Konstrukcja tarki
      description: Klasyfikuje fizyczną budowę lub mechanizm działania tarki lub obieraczki.
    grating_surface_coarseness:
      name: Chropowatość powierzchni kratki
      description: Określa rozmiar/teksturę otworów tnących lub wypustek na powierzchni
        tarki.
    grill_grate_material:
      name: Materiał rusztu grillowego
      description: Określa materiał lub powłokę głównego rusztu do grillowania.
    grill_thermometer_type:
      name: Typ termometru do grilla
      description: Wskazuje na podstawową konstrukcję lub technologię termometru do
        grilla, pomagając klientowi szybko znaleźć typ odpowiadający jego metodzie
        grillowania.
    grinding_mechanism_material:
      name: Materiał mechanizmu mielącego
      description: Określa materiał wewnętrznego mechanizmu mielącego/żaren, które
        faktycznie mielą przyprawy.
    grinding_mechanism_type:
      name: Typ mechanizmu mielenia
      description: Określa wewnętrzny mechanizm odpowiedzialny za rozgniatanie lub
        mielenie.
    growing_media_buffering:
      name: Buforowanie podłoża
      description: Wskazuje, czy włókno kokosowe zostało zbuforowane w celu usunięcia
        nadmiaru soli, co może mieć wpływ na zarządzanie składnikami odżywczymi.
    growing_media_form:
      name: Forma podłoża
      description: Określa fizyczną postać włókna kokosowego, pomagając plantatorom
        określić potrzeby dotyczące obsługi i nawodnienia.
    growing_medium_type:
      name: Rodzaj podłoża
      description: Określa podłoże niezbędne do kiełkowania i wzrostu nasion.
    growth_habit:
      name: Typ wzrostu
      description: Opisuje ogólną formę rośliny, pomagając klientom w podejmowaniu
        decyzji dotyczących rozmieszczenia i pojemników.
    hand_dryer_accessory_type:
      name: Typ akcesorium suszarki do rąk
      description: Określa konkretny rodzaj akcesorium do suszarki do rąk, dzięki
        czemu klient może szybko zorientować się, z jakim produktem ma do czynienia.
    handle_connection_type:
      name: Typ podłączenia uchwytu
      description: Określa mechanizm używany do mocowania do szczotki, mopa lub innych
        głowic czyszczących w celu zapewnienia kompatybilności.
    handle_grip_style:
      name: Typ rękojeści
      description: Określa kształty i ergonomię rękojeści widelca.
    handle_length_adjustability:
      name: Regulacja długości uchwytu
      description: Opisuje, czy i w jaki sposób można dostosować długość uchwytu,
        umożliwiając klientowi filtrowanie między opcjami stałymi i teleskopowymi.
    handle_position:
      name: Położenie uchwytu
      description: Opisuje położenie lub typ uchwytu na konewce, co wpływa na ergonomię
        podczas nalewania oraz wykorzystanie przestrzeni podczas przechowywania.
    handrail_configuration:
      name: Konfiguracja poręczy
      description: Wskazuje, czy produkt jest wyposażony w poręcze i określa sposób
        ich rozmieszczenia.
    hanging_attachment_type:
      name: Typ podwieszenia
      description: Określa sprzęt lub metodę zawieszenia łapacza słońca.
    hardiness_zone:
      name: Strefa mrozoodporności
      description: Określa strefę klimatyczną USDA (lub porównywalną), w której roślina
        może przetrwać na zewnątrz.
    hazards_detected:
      name: Wykryto zagrożenia
      description: Wymienia konkretne zagrożenia, które urządzenie ma wykrywać.
    heating_stages:
      name: Etapy ogrzewania
      description: Określa liczbę etapów grzania lub poziom modulacji, jakie urządzenie
        obsługuje.
    home_alarm_features:
      name: Funkcje alarmu domowego
      description: Określa specjalne funkcje systemu alarmowego, takie jak kopia zapasowa
        baterii czy profesjonalny monitoring.
    hook_style:
      name: Styl haka
      description: Klasyfikuje konstrukcję/funkcje haka w celu łatwiejszego dopasowania
        wizualnego i funkcjonalnego.
    humidifier_features:
      name: Funkcje nawilżacza
      description: Wskazuje istotne dodatkowe funkcje lub opcje, które wyróżniają
        modele nawilżaczy i ułatwiają filtrowanie.
    humidifier_filter_type:
      name: Typ filtra nawilżacza
      description: Określa typ i konstrukcję filtra, dzięki czemu klienci mogą dopasować
        właściwy zamiennik do swojego nawilżacza.
    humidor_accessory_type:
      name: Typ akcesorium humidora
      description: Klasyfikuje konkretny rodzaj akcesoriów, umożliwiając klientowi
        szybkie filtrowanie w obrębie kategorii ogólnej.
    hydroponic_nutrient_system:
      name: System odżywiania hydroponicznego
      description: Oznacza liczbę części systemu hydroponicznego zawierającego składniki
        odżywcze (np. jedna część, dwie części), które należy połączyć przed użyciem.
    hygrometer_type:
      name: Typ higrometru
      description: Określa rodzaj higrometru dołączonego do humidora, jeśli jest on
        zamontowany.
    ice_bucket_accessories_included:
      name: Akcesoria do wiaderka na lód w zestawie
      description: Określa dodatkowe pozycje akcesoriów barmańskich dołączone do wiaderka
        na lód.
    ice_bucket_insulation:
      name: Izolacja wiaderka na lód
      description: Wskazuje na konstrukcję ścianki lub poziom izolacji pojemnika na
        lód, co ma wpływ na to, jak długo lód pozostaje zamrożony.
    ice_cream_maker_accessories_included:
      name: W zestawie akcesoria do maszynki do lodów
      description: Określa dodatkowe pozycje w zestawie akcesoriów składającym się
        z wielu elementów, dzięki czemu klienci dokładnie wiedzą, co otrzymają.
    ice_shape:
      name: Kształt lodu
      description: Opisuje kształt lodu produkowanego przez maszynę, pomagając użytkownikom
        wybierać maszyny, które produkują preferowany przez nich rodzaj lodu.
    incense_holder_style:
      name: Typ kadzielnicy
      description: Określa konstrukcję kadzielnicy, pomagając klientowi dokonać wyboru
        pomiędzy różnymi formatami funkcjonalnymi i estetycznymi.
    infuser_type:
      name: Typ zaparzacza
      description: Informuje, czy w zestawie znajduje się zaparzacz do owoców lub
        herbaty, a także określa jego typ.
    inner_pot_coating:
      name: Powłoka wewnętrzna garnka
      description: Określa rodzaj powierzchni wewnętrznej garnka, wskazując na właściwości
        zapobiegające przywieraniu i łatwość czyszczenia.
    insulation_capability:
      name: Możliwość izolacji
      description: Określa, czy i w jaki sposób rękaw izoluje napoje, odróżniając
        rękawy czysto dekoracyjne od tych, które kontrolują temperaturę.
    insulation_status:
      name: Status izolacji
      description: Informuje, czy menażka jest izolowana, aby pomóc utrzymać temperaturę
        napojów.
    insulation_technology:
      name: Technologia izolacji
      description: Określa konstrukcję izolacji służącą do utrzymania temperatury.
    insulation_type:
      name: Rodzaj izolacji
      description: Określa, czy i w jaki sposób izolowany jest pojemnik na napoje
        lub chłodziarka, co ma wpływ na kontrolę wydajności i kondensację lodu.
    intended_beverage_type:
      name: Rodzaj napoju
      description: Oznacza główny typ napoju, do którego przeznaczona jest karafka
        lub do którego najczęściej jest używana.
    internal_membrane_type:
      name: Typ membrany wewnętrznej
      description: Określa konstrukcję wewnętrznego rozdzielenia, która utrzymuje
        wodę i powietrze w zbiorniku oddzielnie.
    iron_cleaner_purpose:
      name: Środek do czyszczenia żelazka
      description: Określa podstawowe przeznaczenie środka czyszczącego.
    ironing_board_form_factor:
      name: Forma deski do prasowania
      description: Klasyfikuje ogólny typ/instalację płyty, aby pomóc klientowi znaleźć
        właściwy typ.
    ironing_board_pad_shape:
      name: Kształt deski do prasowania
      description: Wskazuje ogólny kształt/profil deski, aby zapewnić jej dopasowanie
        do różnych modeli desek do prasowania.
    jar_shape:
      name: Kształt słoja
      description: Opisuje ogólną geometryczną lub tradycyjną formę słoja dekoracyjnego.
    juicer_type:
      name: Typ wyciskarki
      description: Klasyfikuje mechanizm, który wyciskarka wykorzystuje do wyciskania
        soku.
    key_blade_type:
      name: Typ ostrza klucza
      description: Klasyfikuje fizyczny typ ostrza klucza, taki jak płaski/bity, rurkowy
        lub zagłębiony.
    kitchen_layout:
      name: Układ kuchni
      description: Określa ogólną konfigurację gotowej kuchni (np. pojedyncza ściana
        lub w kształcie litery L), aby pomóc klientowi znaleźć zestawy pasujące do
        jego pomieszczenia i preferencji dotyczących wykonania.
    kitchen_linen_items_included:
      name: W zestawie tekstylia kuchenne
      description: Wymienia konkretne elementy składowe ściereczek kuchennych zawarte
        w zestawie, pomagając klientowi dokładnie określić, jaki produkt kupuje.
    label_content_type:
      name: Typ zadruku etykiety
      description: Określa, czy powierzchnia etykiety jest pusta, wstępnie zadrukowana
        za pomocą szablonu, czy też sformatowana w inny sposób.
    lamp_arm_style:
      name: Typ ramienia lampy
      description: Opisuje konstrukcję ramienia/szyjki lampy, która ma wpływ na możliwość
        regulacji i położenie (np. ramię zakrzywione lub obrotowe).
    lamp_post_base_mounting_type:
      name: Typ mocowania podstawy lampy
      description: Określa sposób montażu i mocowania podstawy do podłoża lub powierzchni.
    lamp_shade_fitter_type:
      name: Typ montażu klosza lampy
      description: Określa mechanizm mocowania klosza i lampy, zapewniając pewność
        w zakresie kompatybilności.
    lamp_shade_shape:
      name: Kształt abażuru
      description: Określa geometryczną formę klosza, umożliwiając klientom szybkie
        odnalezienie pożądanych form.
    lamp_shade_translucency:
      name: Przezroczystość klosza
      description: Opisuje ilość światła przechodzącego przez klosz, pomagając użytkownikom
        wybrać pożądany nastrój.
    lampshade_shape:
      name: Kształt abażuru
      description: Opisuje kształt geometryczny lub formę abażuru.
    laundry_ball_texture:
      name: Tekstura kuli do prania
      description: Opisuje rodzaj powierzchni kuli, który wpływa na poruszanie tkaniną
        i usuwanie kłaczków.
    laundry_wash_accessory_type:
      name: Typ akcesorium do prania
      description: Określa konkretny typ siatki lub worka do prania.
    lawn_aerator_type:
      name: Typ aeratora trawnikowego
      description: Klasyfikuje aeratory trawnikowe według ich podstawowej konstrukcji
        i kształtu.
    lawn_mower_belt_type:
      name: Typ paska do kosiarki
      description: Klasyfikuje konstrukcję lub profil pasa.
    lawn_mower_blade_type:
      name: Typ ostrza kosiarki
      description: Określa konstrukcję i przeznaczenie ostrza kosiarki do trawy, jego
        sposób cięcia lub podnoszenia.
    lawn_spreader_type:
      name: Typ siewnika do trawników
      description: Określa mechanizm lub konfigurację działania rozsiewacza nawozu
        do trawników/ogrodów, np. rzutowy lub rzędowy.
    lawn_tractor_tread_type:
      name: Typ bieżnika traktora ogrodowego
      description: Opisuje wzór bieżnika przeznaczony do konkretnych nawierzchni lub
        zapewniający odpowiednią przyczepność.
    lid_features:
      name: Cechy pokrywy
      description: Wskazuje wszelkie specjalne elementy funkcjonalne pokrywki, które
        ułatwiają gotowanie i czyszczenie.
    lid_vent_type:
      name: Typ odpowietrznika pokrywy
      description: Określa, czy i w jaki sposób pokrywka umożliwia uchodzenie pary.
    lift_mechanism:
      name: Mechanizm podnoszenia
      description: Oznacza mechanizm operacyjny służący do podnoszenia, opuszczania
        lub pochylania żaluzji lub rolety.
    light_exposure_requirement:
      name: Wymagania dotyczące ekspozycji na światło
      description: Określa poziom światła, jakiego ekosfera potrzebuje, aby pozostać
        zdrową, nie przegrzewając się i nie narażając organizmów na stres.
    liner_installation_method:
      name: Metoda instalacji okładziny
      description: Opisuje sposób utrzymywania się okładziny na powierzchni.
    lint_roller_type:
      name: Typ wałka do usuwania kłaczków
      description: Klasyfikuje mechanizm lub konstrukcję czyszczącą wałka do usuwania
        kłaczków.
    live_trap_design:
      name: Konstrukcja pułapki żywej
      description: Klasyfikuje ogólny typ strukturalny pułapki
    lock_keying_option:
      name: Opcja zamykania na klucz
      description: Określa sposób kodowania zamka, co jest pomocne dla kupujących,
        którzy potrzebują obsługiwać wiele zamków jednym kluczem lub potrzebują oddzielnych
        kluczy do każdego zamka.
    lubricant_requirement:
      name: Wymagania dotyczące środka smarującego
      description: Określa rodzaj smaru zalecanego lub wymaganego podczas ostrzenia.
    lunch_set_items_included:
      name: Elementy zestawu obiadowego
      description: Wymienia elementy wchodzące w skład zestawu pojemnika na lunch.
    machete_blade_style:
      name: Typ ostrza maczety
      description: Określa tradycyjny regionalny lub funkcjonalny typ ostrza maczety.
    map_style:
      name: Typ mapy
      description: Określa typ kartograficzny lub tematykę przedstawioną na globusie.
    masher_head_design:
      name: Konstrukcja główki tłuczka do ziemniaków
      description: Klasyfikuje konstrukcję powierzchni zacierania, która ma wpływ
        na teksturę i wymagany nakład pracy.
    mattress_protector_features:
      name: Charakterystyka ochraniacza na materac
      description: Wskazuje funkcjonalne lub ochronne cechy charakterystyczne dla
        ochraniaczy na materac, umożliwiając klientowi filtrowanie produktów pod kątem
        takich cech jak wodoodporność lub materiały hipoalergiczne.
    measuring_spoon_features:
      name: Funkcje łyżki miarowej
      description: Wskazuje szczególne cechy konstrukcyjne lub funkcjonalne łyżki
        miarowej (łyżek miarowych).
    meat_tenderizer_face_type:
      name: Rodzaj powierzchni tłuczka do mięsa
      description: Opisuje fakturę powierzchni roboczej końcówki tłuczka.
    meat_tenderizer_mechanism:
      name: Mechanizm tłuczka do mięsa
      description: Klasyfikuje główny mechanizm działania tłuczka do mięsa.
    medical_specialty:
      name: Specjalizacja medyczna
      description: Określa specjalizację medyczną lub dziedzinę medycyny, dla której
        przeznaczony jest sprzęt
    merv_rating:
      name: Ocena MERV
      description: Określa minimalną wartość raportowania wydajności (MERV), która
        wskazuje zdolność filtra do wychwytywania cząstek o różnych rozmiarach.
    microwave_compatibility:
      name: Możliwość stosowania w kuchenkach mikrofalowych
      description: Określa, czy produkt można bezpiecznie stosować w kuchence mikrofalowej.
    microwave_oven_functions:
      name: Funkcje kuchenki mikrofalowej
      description: Wskazują wstępnie ustawione lub zaawansowane tryby gotowania, dzięki
        czemu klienci mogą znaleźć modele z funkcją gotowania konwekcyjnego, grillowania,
        czujnika gotowania itp.
    milk_frother_type:
      name: Typ spieniacza do mleka
      description: Klasyfikuje produkt według mechanizmu spieniania lub formy.
    milk_frothing_method:
      name: Metoda spieniania mleka
      description: Określa technologię lub mechanizm stosowany do spieniania mleka.
    milk_frothing_system:
      name: System spieniania mleka
      description: Określa typ mechanizmu spieniania lub wytwarzania pary do mleka
        zastosowanego w urządzeniu.
    mirror_curvature:
      name: Krzywizna lustra
      description: Określa krzywiznę powierzchni odbijającej, która ma wpływ na kąt
        widzenia oraz zniekształcenie.
    mirror_type:
      name: Typ lustra
      description: Klasyfikuje ogólny typ lub kategorię funkcjonalną lustra.
    mist_output_mode:
      name: Tryb wytwarzania mgiełki
      description: Wskazuje dostępne na dyfuzorze typy i natężenia wytwarzania mgiełki.
    mixing_bowl_features:
      name: Cechy miski do mieszania
      description: Wskazuje szczególne cechy funkcjonalne miski, które wpływają na
        jej użyteczność i pielęgnację.
    mixing_mechanism:
      name: Mechanizm mieszający
      description: Opisuje wewnętrzny mechanizm służący do mieszania składników sosu.
    mochi_maker_functions:
      name: Funkcje maszynki do mochi
      description: Wskazują wbudowany tryb działania lub programy, które urządzenie
        obsługuje.
    mode_of_action:
      name: Tryb działania
      description: Wyjaśnia w jaki sposób działa fungicyd, odróżniając środki ochronne
        kontaktowe od produktów systemowych lub translaminarnych.
    moisture_absorber_form:
      name: Forma pochłaniacza wilgoci
      description: Opisuje fizyczny format produktu umożliwiający klientowi wybór
        worków wiszących, pojemników, pakietów itp.
    money_retrieval_method:
      name: Metoda wyjmowania pieniędzy
      description: Opisuje sposób wyjmowania zaoszczędzonych pieniędzy ze skarbonki.
    mop_head_type:
      name: Typ głowicy mopa
      description: Wskazuje na konstrukcję głowicy mopa lub wkładu, pomagając klientowi
        dobrać odpowiedni typ do swoich potrzeb w zakresie sprzątania.
    mop_wringing_mechanism:
      name: Mechanizm wyżymania mopa
      description: Wskazuje sposób usuwania nadmiaru płynu z mopa, pomagając użytkownikowi
        wybrać preferowany sposób wyżymania.
    mounting_bolt_pattern:
      name: Rozstaw śrub montażowych
      description: Określa liczbę i układ otworów montażowych na śruby w obudowie
        wrzeciona (np. trójkątny na 3 śruby, kwadratowy na 4 śruby).
    mouthpiece_shape:
      name: Kształt ustnika
      description: Określa kształt końcówki ustnika w cygarniczce.
    mower_deck_material:
      name: Materiał obudowy kosiarki
      description: Oznacza materiał konstrukcyjny kosiarki, który ma wpływ na jej
        trwałość i wagę.
    mulch_form:
      name: Forma ściółki
      description: Opisuje formę fizyczną lub konsystencję ściółki.
    nap_mat_items_included:
      name: Zestaw maty do spania
      description: Określa konkretne elementy i akcesoria dołączone do maty do spania.
    napkin_edge_finish:
      name: Wykończenie krawędzi serwetki
      description: Określa rodzaj przeszycia lub wykończenia dekoracyjnego wzdłuż
        krawędzi lub brzegu serwetki.
    noodle_core_design:
      name: Rodzaj rdzenia makaronu
      description: Określa, czy makaron ma rdzeń pełny czy pusty.
    nozzle_adjustability:
      name: Możliwość regulacji dyszy
      description: Określa, czy dyszę można regulować w celu zmiany wzoru natrysku
        lub natężenia przepływu.
    nozzle_material:
      name: Materiał dyszy
      description: Określa materiał dysz zraszających pod kątem trwałości i odporności
        na zatykanie.
    nozzle_style:
      name: Styl dyszy
      description: Określa funkcjonalne kształty lub typ zakończenia dyszy rury.
    nozzle_types_included:
      name: Typy dysz w zestawie
      description: Określa kształty/typy dysz dostarczanych z pistoletem do suszonego
        mięsa, pomagając konsumentom zorientować się, jakie formy produktu mogą powstać.
    number_of_compartments:
      name: Liczba przegródek
      description: Wskazuje, ile oddzielnych przegródek znajduje się w pojemniku na
        odpady w celu sortowania odpadów lub materiałów nadających się do recyklingu.
    numeral_style:
      name: Typ numeryczny
      description: Określa typ wizualny lub obecność cyfr na tarczy zegara.
    oil_dispenser_spout_design:
      name: Konstrukcja wylewki dozownika oleju
      description: Opisuje typ wylewki lub dyszy, który ma wpływ na kontrolę przepływu
        i zapobieganie kapaniu.
    organizer_application:
      name: Przeznaczenie organizera
      description: Określa podstawowy typ przedmiotów, do przechowywania których służy
        organizer.
    ornament_hook_style:
      name: Typ haczyka ozdobnego
      description: Określa typ i kształty haczyków do wieszania ozdób.
    oscillation_mode:
      name: Tryb oscylacji
      description: Opisuje, czy i w jaki sposób wentylator oscyluje, aby rozprowadzać
        powietrze.
    oscillation_type:
      name: Typ oscylacji
      description: Określa, czy i w jaki sposób wentylator oscyluje, pomagając klientom
        potrzebującym szerokiej cyrkulacji powietrza.
    outdoor_grill_rack_type:
      name: Typ stojaka do grilla zewnętrznego
      description: Określa typ funkcjonalny stojaka określający jego przeznaczenie.
    oxygen_indicator_type:
      name: Typ wskaźnika tlenu
      description: Określa, czy zostanie dołączony wskaźnik wizualny pokazujący, czy
        pakiet absorbujący jest nadal aktywny i jaką ma formę.
    pad_cleaning_action:
      name: Działanie czyszczące nakładki
      description: Opisuje podstawowe funkcje czyszczące nakładki i efekt końcowy.
    pan_bottom_type:
      name: Rodzaj dna patelni
      description: Określa, czy patelnia ma wyjmowane dno, czy też stałe dno.
    pan_perforation_type:
      name: Typ perforacji patelni
      description: Określa, czy dno/boki naczynia są pełne czy perforowane, aby umożliwić
        odpływ cieczy.
    parasol_opening_mechanism:
      name: Mechanizm otwierania parasola
      description: Opisuje sposób otwierania i zamykania parasola.
    parchment_paper_coating:
      name: Powłoka papieru pergaminowego
      description: Określa rodzaj powierzchni, na którą nakłada się papier pergaminowy,
        aby zapewnić właściwości zapobiegające przywieraniu.
    particle_size_grade:
      name: Stopień wielkości cząstek
      description: Opisuje klasyfikację wielkości granulek wermikulitu, która wpływa
        na napowietrzenie i właściwości retencji wody.
    patio_heater_safety_features:
      name: Funkcje bezpieczeństwa grzejnika tarasowego
      description: Wskazują wbudowane mechanizmy bezpieczeństwa mające na celu zapobieganie
        wypadkom i zapewnienie bezpiecznej pracy.
    pattern_match_type:
      name: Typ dopasowania wzoru
      description: Określa sposób ułożenia wzoru pomiędzy paskami podczas montażu.
    pendulum_compatibility:
      name: Kompatybilność wahadła
      description: Wskazuje, czy ruch może napędzać wahadło i czy wahadło jest w nim
        zawarte.
    perch_design:
      name: Konstrukcja żerdzi
      description: Opisuje typ strukturalny lub formę żerdzi.
    perch_surface_texture:
      name: Tekstura powierzchni żerdzi
      description: Określa wykończenie/fakturę powierzchni żerdzi, która ma wpływ
        na zużywanie się uchwytów i gwoździ.
    pet_safety:
      name: Bezpieczeństwo zwierząt domowych
      description: Określa, czy roślina jest toksyczna czy nietoksyczna dla typowych
        zwierząt domowych.
    pet_toxicity:
      name: Toksyczność dla zwierząt domowych
      description: Stwierdza, czy roślina jest toksyczna dla typowych zwierząt domowych,
        zapewniając bezpieczeństwo klientom posiadającym zwierzęta domowe.
    ph_adjustment_direction:
      name: Kierunek regulacji pH
      description: Określa, czy produkt ma za zadanie podnieść (wyższe pH) czy obniżyć
        (niższe pH) poziom pH roztworu.
    pie_pan_edge_style:
      name: Typ krawędzi blachy do ciasta
      description: Opisuje budowę krawędzi, która ma wpływ na wygląd i łatwość odrywania
        skórki.
    pin_shape:
      name: Kształt szpilki
      description: Opisuje ogólną formę szpilki, która mocuje tkaninę.
    pipe_connection_method:
      name: Metoda podłączenia rury
      description: Określa typ końcówki łuku rurowego (np. męski, żeński, wciskany,
        gwintowany) w celu zapewnienia kompatybilności instalacji.
    piping_tip_shape:
      name: Kształt końcówki do szprycowania
      description: Określa kształt i wzór końcówki do szprycowania/dekorowania.
    pitcher_spout_style:
      name: Typ wylewki dzbanka
      description: Określa kształt dzióbka, który wpływa na precyzję parzenia kawy
        latte i kontrolę nalewania.
    pizza_cutter_design:
      name: Konstrukcja noża do pizzy
      description: Określa typ strukturalny noża do pizzy, pomagając klientom dokonać
        wyboru pomiędzy różnymi mechanizmami krojenia.
    pizza_pan_style:
      name: Typ formy do pizzy
      description: Określa typ konstrukcji/rodzaju formy do pizzy, wskazując sposób
        pieczenia ciasta i rodzaj pizzy, do której jest przeznaczona.
    plant_care_difficulty:
      name: Poziom trudności pielęgnacji roślin
      description: Wskazuje poziom trudności pielęgnacji potrzebny do utrzymania rośliny,
        pomagając początkującym i ekspertom dokonać odpowiedniego wyboru.
    plant_container_type:
      name: Typ pojemnika na rośliny
      description: Określa rodzaj pojemnika dołączonego do sztucznego krzewu, jeśli
        występuje.
    plant_life_cycle:
      name: Cykl życia rośliny
      description: Określa, czy roślina jest jednoroczna, dwuletnia czy wieloletnia.
    planter_material:
      name: Materiał donicy
      description: Oznacza materiał, z którego wykonana jest doniczka (jeśli znajduje
        się w zestawie).
    plate_coupling_pattern:
      name: Wzór sprzężenia płyt
      description: Określa konfigurację dolnej piasty, która współpracuje ze sprzęgłem
        silnika talerza obrotowego kuchenki mikrofalowej, zapewniając prawidłowy obrót.
    plate_purpose:
      name: Rola talerza
      description: Określa funkcjonalną rolę talerza w układzie kosiarki.
    plate_style:
      name: Styl talerza
      description: Określa konkretny typ lub przeznaczenie talerza obiadowego.
    pole_construction_type:
      name: Typ konstrukcji tyczki
      description: Określa typ strukturalny basenu, wpływając na jego konfigurację
        i możliwość przenoszenia.
    pool_chemical_type:
      name: Rodzaj chemikaliów basenowych
      description: Klasyfikuje podstawowe funkcje lub skład chemiczny produktu basenowego.
    pool_filter_type:
      name: Typ filtra basenowego
      description: Określa technologię filtracji lub typ konstrukcji stosowany w filtrze
        basenowym lub spa.
    pool_game_type:
      name: Rodzaj zabawy/gry basenowej
      description: Określa konkretny rodzaj gry lub sportu, do którego przeznaczony
        jest produkt.
    pool_ladder_design:
      name: Konstrukcja drabinki basenowej
      description: Klasyfikuje ogólną konstrukcję drabinki basenowej.
    pool_liner_installation_style:
      name: Typ instalacji wyściółki basenowej
      description: Określa metodę mocowania służącą do zabezpieczenia wyściółki na
        ścianie basenu.
    pool_lounge_style:
      name: Typ leżaka basenowego
      description: Klasyfikuje typ strukturalny leżaka basenowego w celu filtrowania
        pod kątem cech wizualnych i funkcjonalnych.
    pool_lounger_features:
      name: Funkcje leżaka basenowego
      description: Wskazują specjalne wbudowane funkcje, które dodają leżakowi funkcjonalności
        lub wygody.
    pool_skimmer_type:
      name: Typ odpływu basenowego
      description: Klasyfikuje konstrukcję oczyszczacza wody, pomagając klientom porównywać
        siatki ręczne z oczyszczaczami automatycznymi lub pływającymi.
    pool_toy_features:
      name: Funkcje zabawki basenowej
      description: Wskazują istotne cechy funkcjonalne i konstrukcyjne charakterystyczne
        dla zabawek basenowych.
    pool_type:
      name: Typ basenu
      description: Klasyfikuje typ konstrukcyjny basenu.
    pool_vacuum_type:
      name: Typ odkurzacza basenowego
      description: Oznacza sposób działania lub mechanizm napędowy odkurzacza basenowego.
    popcorn_kernel_variety:
      name: Odmiana ziaren popcornu
      description: Określa naturalną różnorodność lub kształty ziaren popcornu.
    portafilter_type:
      name: Typ kolby ekspresu
      description: Określa typ strukturalny kolby ekspresu, który ma wpływ na metodę
        ekstrakcji i przepływ pracy.
    post_installation_method:
      name: Metoda montażu tyczki
      description: Określa sposób montażu i mocowania słupka skrzynki pocztowej.
    pour_spout_design:
      name: Konstrukcja wylewki
      description: Określa specjalne cechy lub typ wylewki, które wpływają na kontrolę
        przepływu.
    pour_spout_style:
      name: Typ wylewki dozownika
      description: Opisuje konstrukcję wylewki dozownika, która ma wpływ na kontrolę
        przepływu i odporność na kapanie.
    power_equipment_hitch_type:
      name: Typ zaczepu do sprzętu mechanicznego
      description: Określa interfejs osprzętu do montażu na ciągnikach lub jednostkach
        napędowych.
    predator_guard_style:
      name: Typ osłony przed drapieżnikami
      description: Klasyfikuje konstrukcję osłony, pomagając klientowi szybko znaleźć
        rozwiązania w postaci stożka, tarczy, klatki lub płyty otworowej.
    preferred_soil_type:
      name: Preferowany rodzaj gleby
      description: Wskazuje skład gleby, w którym roślina dobrze się rozwija.
    preparation_type:
      name: Sposób przygotowania
      description: Opisuje metodę niezbędną do przygotowania jedzenia do spożycia.
    preservation_method:
      name: Metoda konserwacji
      description: Wyszczególnia technikę suszenia i konserwowania kwiatów.
    pressure_cooker_handle_type:
      name: Typ uchwytu szybkowaru
      description: Oznacza typ lub lokalizację wymiennego uchwytu szybkowaru.
    pressure_cooker_safety_features:
      name: Funkcje bezpieczeństwa szybkowaru
      description: Wymienia wbudowane mechanizmy bezpieczeństwa zapobiegające wypadkom,
        takie jak blokada pokrywy lub zawory bezpieczeństwa.
    pressure_settings:
      name: Ustawienia ciśnienia
      description: Określa, ile różnych poziomów ciśnienia szybkowar oferuje użytkownikowi.
    pressure_washer_outlet_connector_type:
      name: Typ złącza wyjściowego myjki ciśnieniowej
      description: Określa specyfikację złącza znajdującego się z przodu głowicy pistoletu,
        służącego do mocowania lanc lub dysz.
    pressure_washer_spray_pattern:
      name: Wzór natrysku myjki ciśnieniowej
      description: Określa kąt lub wzór strumienia wytwarzany przez dyszę myjki ciśnieniowej.
    print_edition_type:
      name: Typ wydania drukowanego
      description: Klasyfikuje typ wydania drukowanego, określając rzadkość i wartość.
    printed_sides:
      name: Zadrukowanie boków
      description: Określa, czy produkt jest zadrukowany jednostronnie czy dwustronnie.
    procedure:
      name: Procedura medyczna
      description: Określa procedurę medyczną lub rodzaj szkolenia, do którego przeznaczony
        jest sprzęt
    protected_item_type:
      name: Typ chronionego produktu
      description: Określa rodzaj dokumentu lub obiektu, który ma chronić etui RFID.
    pulley_groove_profile:
      name: Profil rowka koła pasowego
      description: Określa typ interfejsu pasa koła napinającego.
    pulp_ejection_type:
      name: Typ wyrzutu miazgi
      description: Wskazuje sposób, w jaki miąższ jest wyrzucany z maszyny.
    pump_type:
      name: Typ pompy
      description: Określa konstrukcję mechanizmu pompy myjki ciśnieniowej.
    punch_bowl_components_included:
      name: Elementy miski do ponczu w zestawie
      description: Wymienia dodatkowe pozycje, które są dołączone do miski do ponczu,
        umożliwiając klientowi zapoznanie się z zestawem.
    quilt_construction_type:
      name: Sposób wykonania kołdry
      description: Opisuje metodę wewnętrznego szycia lub przeszycia stosowaną w kołdrze,
        która wpływa na dystrybucję ciepła i trwałość.
    radiator_design_type:
      name: Typ konstrukcji grzejnika
      description: Wskazuje styl konstrukcji kaloryfera.
    rain_barrel_design:
      name: Konstrukcja beczki na deszczówkę
      description: Klasyfikuje styl konstrukcji zbiornika na deszczówkę.
    rain_chain_style:
      name: Typ łapacza wody deszczowej
      description: Określa konstrukcję łapacza wody deszczowej, dzięki czemu klienci
        mogą filtrować według preferencji wizualnych i wydajności przepływu wody.
    range_hood_filter_type:
      name: Typ filtra okapu kuchennego
      description: Klasyfikuje rodzaj filtra zamiennego, aby zapewnić prawidłowe dopasowanie
        i wydajność.
    range_installation_type:
      name: Typ montażu pieca
      description: Opisuje konfigurację montażu kuchenki w kuchni.
    recorder_type:
      name: Typ rejestratora
      description: Określa użytą technologię nagrywania (np. DVR, NVR), co ułatwia
        porównanie rozwiązań analogowych i IP.
    refrigerator_configuration:
      name: Konfiguracja lodówki
      description: Określa ogólny układ drzwi i komór lodówki.
    release_type:
      name: Typ uwalniania
      description: Wskazuje, jak szybko składniki odżywcze są uwalniane z nawozu.
    relief_style:
      name: Typ rzeźby
      description: Określa, czy wysokości powierzchni na globusie są podwyższone,
        wcięte czy płaskie.
    repellent_mechanism:
      name: Mechanizm odstraszający
      description: Określa główny mechanizm odstraszający stosowany przez produkt,
        np. zapach chemiczny, ultradźwięki lub migające światło.
    replaceable_brush_head:
      name: Wymienna główka szczoteczki
      description: Określa, czy głowicę szczoteczki można odłączyć i wymienić, gdy
        ulegnie zużyciu.
    rib_material:
      name: Materiał żeberkowy
      description: Określa materiał używany do budowy żeber lub szprych parasola,
        np. włókno szklane lub aluminium.
    rice_cooker_functions:
      name: Funkcje ryżowaru
      description: Wskazuje wstępnie ustawione programy gotowania lub tryby dostępne
        w urządzeniu do gotowania ryżu, co umożliwia klientom porównanie funkcjonalności
        urządzeń.
    roaster_oven_functions:
      name: Funkcje piekarnika
      description: Wskazuje wstępnie ustawione lub obsługiwane funkcje pieczenia dostępne
        w piekarniku.
    roasting_rack_shape:
      name: Kształt rusztu do pieczenia
      description: Określa kształty konstrukcyjne lub konstrukcję rusztu, które mają
        wpływ na dopasowanie i wydajność pieczenia.
    rockwool_form:
      name: Forma wełny mineralnej
      description: Określa formę fizyczną lub konfigurację produktu z wełny mineralnej.
    roof_style:
      name: Typ dachu
      description: Określa typ architektoniczny lub kształty dachu.
    rose_attachment:
      name: Zdejmowana głowica rozpylająca
      description: Określa, czy puszka posiada odłączaną głowicę rozpylającą/spryskiwacz,
        jest zamocowana na stałe, czy nie ma rozety w ogóle.
    safety_mirror_features:
      name: Funkcje lusterka bezpieczeństwa
      description: Wskazuje specjalne cechy poprawiające trwałość i widoczność.
    salad_spinner_mechanism:
      name: Mechanizm obrotowy suszarki do sałaty
      description: Określa mechanizm wirowania używany do suszenia zieleniny, pomagając
        klientowi wybrać preferowaną metodę działania.
    sand_color:
      name: Kolor piasku
      description: Określa kolor piasku lub ziarnistego wypełnienia wewnątrz klepsydry,
        niezależnie od koloru obudowy zewnętrznej.
    sand_type:
      name: Rodzaj piasku
      description: Określa rodzaj piasku na podstawie jego składu lub typowego zastosowania.
    saucer_functionality:
      name: Funkcjonalność spodka
      description: Określa typ funkcjonalny podstawki lub tacy, np. z funkcją samonawadniania
        lub ze zbiornikiem na wodę.
    sauna_form_factor:
      name: Format sauny
      description: Określa ogólny typ strukturalny sauny.
    sauna_heater_type:
      name: Typ pieca do sauny
      description: Oznacza typ grzejnika dołączonego lub obsługiwanego przez zestaw
        do sauny.
    scoop_release_mechanism:
      name: Mechanizm zwalniający czerpak
      description: Opisuje typ mechanizmu uwalniania produktu wbudowany w czerpak.
    scoop_surface_design:
      name: Typ powierzchni czerpaka
      description: Opisuje, czy powierzchnia czerpaka jest pełna czy perforowana,
        aby umożliwić odpływ oleju.
    scoop_wall_design:
      name: Typ ścianki czerpaka
      description: Opisuje, czy powierzchnia czerpaka jest pełna, czy też perforowana/nacinana,
        aby umożliwić przedostawanie się małych kawałków oleju.
    scrubber_head_type:
      name: Typ głowicy szorującej
      description: Opisuje działanie mechaniczne lub konstrukcję głowicy maszyny szorującej.
    scrubbing_strength:
      name: Siła szorowania
      description: Oznacza względny poziom szorowania/ścierności zapewniany przez
        produkt.
    seafood_utensil_items_included:
      name: W zestawie przybory kuchenne do owoców morza
      description: Wymienia dodatkowe narzędzia do obsługi skorupiaków w pakiecie
        z łamaczem, umożliwiając klientowi porównywanie osobnych łamaczy z całym zestawem.
    sealing_modes:
      name: Sposób uszczelniania
      description: Określa programy uszczelniania operacyjnego dostępne w urządzeniu.
    security_sensor_subtype:
      name: Podtyp czujnika bezpieczeństwa
      description: Określa konkretne funkcje / typ czujnika bezpieczeństwa.
    seed_treatment:
      name: Obróbka ziaren
      description: Określa wszelkie specjalne procesy, którym poddawane są nasiona.
    self_cleaning_method:
      name: Metoda samoczyszczenia
      description: Określa rodzaj technologii samoczyszczenia stosowanej w piekarniku.
    serveware_pieces_included:
      name: W zestawie naczynia do serwowania żywności
      description: Wymienia różne elementy zastawy stołowej wchodzące w skład zestawu
        wieloczęściowego.
    shaker_set_pieces_included:
      name: W zestawie elementy zestawu shakera
      description: Wymienia elementy wchodzące w skład zestawu w uzupełnieniu do solniczki
        i pieprzniczki.
    sheath_material:
      name: Typ osłony
      description: Materiał osłony sondy termoparowej, mający wpływ na odporność na
        korozję i maksymalną temperaturę pracy.
    shelf_location_in_appliance:
      name: Lokalizacja półki w urządzeniu
      description: Oznacza miejsce wewnątrz urządzenia, w którym półka będzie montowana.
    shoe_brush_type:
      name: Rodzaj szczotki do butów
      description: Klasyfikuje typ funkcjonalny szczotek do butów, umożliwiając klientowi
        znalezienie szczotek przeznaczonych do konkretnych zadań.
    shoe_dryer_technology:
      name: Technologia suszarki do butów
      description: Określa podstawową technologię suszenia stosowaną w suszarce do
        butów.
    shoe_organizer_design:
      name: Konstrukcja organizera na buty
      description: Określa ogólny typ i format organizera na buty, aby pomóc klientowi
        w filtrowaniu pozycji.
    shoe_polish_form:
      name: Formularz pasty do butów
      description: Określa formę fizyczną lub metodę nakładania pasty do butów.
    shoe_treatment_purpose:
      name: Cel pielęgnacji obuwia
      description: Określa podstawową funkcję lub zaletę produktu do pielęgnacji obuwia.
    shoe_tree_design:
      name: Konstrukcja prawideł do butów
      description: Określa typ strukturalny lub mechanizm prawidła, który ma wpływ
        na możliwość regulacji, typ obuwia, który ma być zastosowany, oraz użyteczność.
    shot_glass_style:
      name: Typ kieliszka do shotów
      description: Klasyfikuje konkretny typ lub format kieliszka do shotów.
    shovel_handle_grip_type:
      name: Typ uchwytu szufli
      description: Określa typ rączki na końcu uchwytu.
    shovel_head_type:
      name: Typ głowicy łopaty
      description: Klasyfikuje funkcjonalne kształty/typy głowicy łopaty lub szpadla.
    shower_curtain_ring_type:
      name: Typ pierścieni zasłon prysznicowych
      description: Określa typ funkcjonalny kółka do zasłony prysznicowej.
    shrub_shape:
      name: Kształty krzewów
      description: Opisują ogólną rzeźbioną/strzyżoną formę sztucznego krzewu.
    signature_presence:
      name: Obecność podpisu
      description: Określa, czy i w jaki sposób obraz został podpisany przez artystę.
    sink_caddy_features:
      name: Funkcje półki do zlewu
      description: Wskazuje szczególne elementy funkcjonalne półki do zlewu.
    size_adjustability:
      name: Możliwość regulacji rozmiaru
      description: Wskazuje, czy długość/szerokość produktu można dostosować, aby
        pasował do różnych rozmiarów buta.
    skewer_tip_type:
      name: Typ końcówki szpikulca
      description: Określa rodzaj końcówki szpikulca, który ma wpływ na łatwość nakłuwania
        jedzenia i jego ogólną postać.
    sleeping_position_suitability:
      name: Odpowiednia pozycja do spania
      description: Wskazuje, do jakiej pozycji spania przeznaczona jest dana poduszka.
    sleeve_insulation:
      name: Izolacja rękawa
      description: Określa, czy rękaw zapewnia izolację termiczną, utrzymując napoje
        zimne lub gorące.
    slice_style:
      name: Typ krojenia
      description: Określa podstawowy typ krojenia, jaki wykonuje krajalnica kuchenna,
        np. słupki lub gofr.
    slipcover_stretch_type:
      name: Pokrowiec typu stretch
      description: Określa stopień i kierunek elastyczności tkaniny użytej w pokrowcu.
    smoker_type:
      name: Typ wędzarki
      description: Klasyfikuje wędzarkę według jej konstrukcji lub metody wędzenia.
    smoking_chip_size:
      name: Rozmiar chip do palenia
      description: Oznacza fizyczny kształt/rozmiar wiórów drzewnych do wędzenia,
        który ma wpływ na szybkość spalania i przydatność do różnych grilli lub wędzarni.
    snow_blower_stage_type:
      name: Typ odśnieżarki stopniowej
      description: Oznacza liczbę stopni ślimaka/wirnika używanych do przemieszczania
        i usuwania śniegu; podstawowa specyfikacja służąca do rozróżniania maszyn
        jedno-, dwu- i trzystopniowych.
    soap_dispenser_operation_type:
      name: Typ działania dozownika mydła
      description: Określa mechanizm aktywacji używany do dozowania mydła lub balsamu.
    soil_texture:
      name: Tekstura gleby
      description: Opisuje dominujący rozmiar/skład cząstek gleby mający wpływ na
        drenaż i napowietrzanie.
    spa_installation_type:
      name: Typ instalacji spa
      description: Klasyfikuje spa na podstawie sposobu jego instalacji i konfiguracji
        na miejscu.
    space_heater_safety_features:
      name: Charakterystyka zabezpieczenia piecyka przenośnego
      description: Wskazuje wbudowane mechanizmy bezpieczeństwa, które chronią użytkowników
        i mienie.
    spice_organizer_features:
      name: Charakterystyka pudełek na przyprawy
      description: Podkreśla szczególne cechy funkcjonalne pudełek na przyprawy.
    spray_pattern:
      name: Wzór natrysku
      description: Określa rodzaj rozpylenia oleju wytwarzanego przez dyszę rozpylacza.
    sprayer_operation_mechanism:
      name: Mechanizm działania opryskiwacza
      description: Określa sposób generowania ciśnienia w celu dozowania oleju z opryskiwacza.
    spring_type:
      name: Typ sprężynowy
      description: Określa typ sprężyny stosowanej w mechanizmie krawędziowym.
    sprinkle_opening_style:
      name: Wielkość otworów
      description: Określa grubość lub typ perforacji/siatki używanej do dozowania
        kakao (drobna siatka w porównaniu z dużymi otworami itp.).
    sprinkler_orientation:
      name: Orientacja zraszaczy
      description: Wskazuje kierunek i typ montażu głowicy tryskacza przeciwpożarowego.
    sprinkler_response_type:
      name: Typ reakcji zraszacza
      description: Określa charakterystykę reakcji termicznej głowicy zraszacza.
    sprinkler_type:
      name: Typ zraszacza
      description: Klasyfikuje działanie mechaniczne lub typ rozprysku zraszacza w
        celu łatwiejszego porównywania i filtrowania.
    sprinkler_valve_type:
      name: Typ zaworu zraszacza
      description: Określa typ funkcjonalny lub typ uruchamiania zaworu zraszacza.
    squirrel_feed_type:
      name: Rodzaj karmy dla wiewiórek
      description: Określa rodzaje karmy, do jakich przystosowany jest karmnik. Umożliwia
        dopasowanie do właściwego pożywienia dla wiewiórek.
    squirrel_resistance:
      name: Zabezpieczenie przed wiewiórkami
      description: Wskazuje, czy karmnik na kule tłuszczowe jest wyposażony w elementy
        mające na celu uniemożliwienie wiewiórkom dostępu do pokarmu.
    stackability:
      name: Możliwość układania w stosy
      description: Wskazuje, czy możliwe jest bezpieczne układanie wielu jednostek
        w stosy w celu efektywnego wykorzystania przestrzeni magazynowej.
    stackable_design:
      name: Konstrukcja umożliwiająca układanie w stosy
      description: Określa, czy kontener jest zaprojektowany tak, aby można było bezpiecznie
        układać go w stosy, gdy jest pełny lub pusty.
    stacking_capability:
      name: Możliwość układania w stosy
      description: Określa, czy kontener może być układany w stos, zagnieżdżany, nakładany
        na inne kontenery.
    stainless_steel_cleaner_features:
      name: Funkcje środka czyszczącego do stali nierdzewnej
      description: Określają szczególne właściwości produktu, które są wyjątkowe lub
        szczególnie istotne w kontekście pielęgnacji stali nierdzewnej.
    staple/pin_shape:
      name: Kształt zszywki/szpilki
      description: Określa ogólny kształt zapięcia, pomagając klientom dokonać wyboru
        pomiędzy zszywkami w kształcie litery U, szpilkami o okrągłej końcówce itp.
    staple_coating:
      name: Powłoka zszywki
      description: Opisuje każdą powłokę ochronną nakładaną na zszywki lub przypięte
        elementy w celu zabezpieczenia przed rdzą lub zwiększenia trwałości.
    steam_nozzle_type:
      name: Typ dyszy parowej
      description: Określa typ funkcjonalny końcówki dyszy odkurzacza parowego.
    steam_table_pan_cover_features:
      name: Cechy pokrywy wkładu do podgrzewacza żywności
      description: Wskazuje szczególne cechy funkcjonalne pokryw wkładów do podgrzewaczy
        żywności, które ułatwiają obsługę gastronomiczną.
    steam_table_pan_size:
      name: Rozmiar wkładu do podgrzewacza żywności
      description: Oznacza standardową wielkość pojemników gastronomicznych/hotelowych
        (np. pełna, 1/2, 1/3), do której pasuje wkład lub pokrywka.
    steam_table_pan_size_compatibility:
      name: Rozmiary wkładów do podgrzewaczy żywności
      description: Określa standardowe rozmiary naczyń, jakie można umieścić w urządzeniu.
    steam_table_pan_type:
      name: Typ wkładu do podgrzewacza żywności
      description: Określa typ konstrukcji naczynia mający wpływ na wydajność odprowadzania
        wody i podgrzewania.
    stemware_design:
      name: Konstrukcja kieliszków
      description: Określa, czy naczynie ma tradycyjną nóżkę, czy nie.
    stick_tip_style:
      name: Typ końcówki patyczka
      description: Określa konstrukcję końca patyczka, wpływając na sposób jego przebijania
        lub pomoc w technicznym pozycjonowaniu jedzenia.
    stocking_toe_orientation:
      name: Orientacja palców u stóp pończochy
      description: Określa kierunek, w którym skierowany jest nosek pończochy po zawieszeniu,
        wpływając na symetrię wizualną podczas eksponowania wielu pończoch.
    stopper_type:
      name: Typ korka
      description: Określa rodzaj zamknięcia dostarczonego wraz z karafką, jeśli występuje.
    strainer_style:
      name: Styl sitka
      description: Klasyfikuje konstrukcję sita lub durszlaka.
    strainer_type:
      name: Typ sitka
      description: Określa typ lub konstrukcję sitka, wskazując jego przeznaczenie
        kulinarne i budowę oczek.
    strap_end_fitting_type:
      name: Typ końcówki paska
      description: Określa sprzęt lub osprzęt znajdujący się na końcu paska naciągowego,
        który ułatwia mocowanie, zakotwiczenie lub regulację.
    straw_dispensing_mechanism:
      name: Mechanizm dozowania słomek
      description: Opisuje metodę dozowania słomek, ułatwiającą klientom znalezienie
        konkretnych rozwiązań higienicznych lub zapewniających wygodę.
    sugar_dispenser_mechanism:
      name: Mechanizm dozownika cukru
      description: Szczegółowo opisuje sposób dozowania cukru z pojemnika, pomagając
        klientom w wyborze preferowanej metody dozowania.
    suitable_for_pool_shape:
      name: Kształt odpowiedni do basenu
      description: Wskazuje, do jakiego kształtu basenu pasuje dane akcesorium, pomagając
        użytkownikom zapewnić jego właściwe dopasowanie.
    suitable_pool_surface_type:
      name: Odpowiedni rodzaj powierzchni basenu
      description: Określa materiały powierzchni basenu, do których przeznaczona jest
        dana szczotka/miotła, zapobiegając uszkodzeniom powierzchni i zapewniając
        optymalne czyszczenie.
    suitable_spread_material:
      name: Odpowiedni materiał do rozsiewu
      description: Określa rodzaje materiałów, do których dozowania przeznaczony jest
        rozsiewacz.
    sundial_type:
      name: Typ zegara słonecznego
      description: Określa typ konstrukcji lub naukową konfigurację zegara słonecznego.
    supplement_function:
      name: Funkcje uzupełniające
      description: Klasyfikuje suplementy według ich głównego przeznaczenia, pomagając
        klientom wybrać właściwy dodatek dostosowany do konkretnych potrzeb roślin.
    surface_reflectivity:
      name: Odbicie powierzchniowe
      description: Określa, czy powierzchnia znaku jest zaprojektowana tak, aby odbijać
        światło w celu zwiększenia widoczności w nocy.
    sweetener_type:
      name: Rodzaj słodzika
      description: Określa główny środek słodzący stosowany w syropie.
    table_skirt_pleat_style:
      name: Plisowana falbana do stołu
      description: Określa dekoracyjny typ plisowania lub marszczenia falbany, pomagając
        klientowi w dopasowaniu estetycznym.
    tablecloth_clip_design:
      name: Konstrukcja klipsa do obrusu
      description: Opisuje mechanizm i typ klipsa do obrusu.
    tablecloth_features:
      name: Cechy obrusu
      description: Wskazuje szczególne cechy konstrukcyjne i użytkowe obrusu.
    tamper_evident_feature:
      name: Funkcja zabezpieczająca przed manipulacją
      description: Oznacza obecność i typ zabezpieczenia przed manipulacją wbudowanego
        w nakrętkę.
    tang_type:
      name: Typ trzpienia
      description: Oznacza kształt trzpienia noża, określający jak daleko metal ostrza
        sięga do uchwytu.
    teapot_spout_style:
      name: Typ wylewki czajnika
      description: Opisuje budowę dzióbka czajnika, która ma wpływ na kontrolę nalewania
        i estetykę.
    temperature_zones:
      name: Strefy temperaturowe
      description: Określa liczbę niezależnie sterowanych stref temperaturowych dostępnych
        w lodówce na wino.
    thermocouple_junction_type:
      name: Typ złącza termopary
      description: Oznacza konstrukcję złącza czujnikowego, mającą wpływ na czas reakcji
        i izolację elektryczną.
    thermometer_design:
      name: Konstrukcja termometru
      description: Określa podstawowy typ obsługi lub technologię termometru domowego.
    thermos_handle_type:
      name: Typ uchwytu termosu
      description: Opisuje typ uchwytu lub rączki zintegrowanej z termosem.
    thread_standard:
      name: Standard bieżnika
      description: Określa specyfikację napięcia zastosowaną w podłączeniu akcesorium,
        aby zapewnić kompatybilność z elementami instalacyjnymi.
    tilt_mechanism:
      name: Mechanizm przechylania
      description: Określa mechanizm umożliwiający pochylenie baldachimu w celu optymalnego
        ustawienia zacienienia.
    time_format:
      name: Format czasu
      description: Określa, czy zegar może wyświetlać czas w formacie 12-godzinnym,
        24-godzinnym czy obu formatach.
    timer_mechanism:
      name: Mechanizm czasomierza
      description: Określa mechanizm leżący u podstaw pomiaru czasu.
    tine_position:
      name: Pozycja zębów
      description: Opisuje konfigurację zębów względem kół/silnika, która ma wpływ
        na zwrotność i penetrację gleby.
    tire_construction:
      name: Konstrukcja opony
      description: Określa wewnętrzną metodę budowy korpusu opony.
    tire_construction_type:
      name: Typ konstrukcji opony
      description: Określa, czy opona ma konstrukcję diagonalną czy radialną, co ma
        wpływ na elastyczność, pojemność ładunkową i jakość Ride .
    tire_tread_pattern:
      name: Wzór bieżnika opony
      description: Opisuje typ bieżnika opony, wskazując jej przydatność do różnych
        nawierzchni i potrzeb w zakresie przyczepności.
    tissue_lotion_content:
      name: Nasączenie chusteczek balsamem
      description: Informuje, czy chusteczki są nasączone balsamem lub innymi dodatkami
        łagodzącymi.
    toaster_features:
      name: Funkcje tostera
      description: Wymienia funkcje specjalne i elementy konstrukcyjne dostępne w
        tosterze.
    tong_type:
      name: Typ szczypiec
      description: Określa główny typ lub zamierzone zastosowanie szczypiec.
    toothbrush_holder_features:
      name: Cechy uchwytu na szczoteczkę do zębów
      description: Wskazuje specjalne funkcje lub elementy konstrukcji, które wyróżniają
        uchwyt.
    toothpick_dispensing_mechanism:
      name: Mechanizm dozowania wykałaczek
      description: Określa mechanizm dozowania wykałaczek.
    topographical_relief:
      name: Rzeźba topograficzna
      description: Wskazuje, czy powierzchnia globu charakteryzuje się wypukłą topografią.
    towel_holder_design:
      name: Konstrukcja uchwytu na ręczniki
      description: Opisuje typ strukturalny uchwytu na ręczniki, np. drążek lub pierścień.
    towel_weave:
      name: Splot tkaniny ręcznika
      description: Opisuje konstrukcję lub sposób splotu tkaniny ręcznika, który wpływa
        na jej fakturę, chłonność i czas schnięcia.
    track_lighting_rail_type:
      name: Rodzaj szyny oświetleniowej
      description: Określa standardy mechaniczne/elektryczne szyny, ustalając, które
        elementy mocujące i złącza są kompatybilne.
    track_lighting_system_compatibility:
      name: Kompatybilność z systemem oświetleniowym
      description: Określa normę elektryczną i mechaniczną, do której zaprojektowano
        urządzenie lub akcesorium.
    track_rail_circuit_configuration:
      name: Konfiguracja obwodu szynowego
      description: Oznacza liczbę lub rodzaj obwodów elektrycznych na szynie technicznej,
        wpływających na niezależne sterowanie grupą urządzeń.
    track_system_standard:
      name: Standard systemu szynowego
      description: Określa fizyczny standard szyn, do którego pasuje źródło zasilania,
        umożliwiając klientowi dopasowanie elementów do swojej szyny (np. w kształcie
        litery H, J lub L).
    tractor_tire_application:
      name: Zastosowanie opon do ciągników
      description: Oznacza podstawowe zastosowanie lub środowisko, dla którego opona
        jest przeznaczona.
    tractor_tire_tread_classification:
      name: Klasyfikacja bieżnika opon ciągnikowych
      description: Klasyfikuje wzór bieżnika opon ciągników zgodnie z normami rolniczymi
        i przemysłowymi.
    tree_shape:
      name: Kształt drzewa
      description: Opisuje ogólną sylwetkę lub profil sztucznego drzewa.
    trigger_type:
      name: Typ wyzwalacza
      description: Określa mechanizm czujnika służący do sterowania przepływem wody
        w dyszy.
    trimmer_line_feed_system:
      name: System podawania żyłki trymera
      description: Określa na ile żyłka tnąca jest oddalona od głowicy podczas pracy.
    trimmer_line_shape:
      name: Kształt żyłki trymera
      description: Opisuje kształt przekroju żyłki tnącej, który wpływa na wydajność
        i hałas cięcia.
    turntable_type:
      name: Typ talerza obrotowego
      description: Określa typ powierzchni do gotowania, rozróżniając tradycyjne szklane
        talerze obrotowe od konstrukcji płaskich i nieobrotowych.
    ultrasonic_cleaner_accessories_included:
      name: Akcesoria do myjki ultradźwiękowej w zestawie
      description: Wymienia dodatkowe elementy dostarczane wraz z myjką, aby klient
        dokładnie wiedział, co znajduje się w pudełku.
    umbrella_base_type:
      name: Typ podstawy parasola
      description: Określa typ strukturalny lub sposób montażu podstawy.
    umbrella_opening_mechanism:
      name: Mechanizm otwierania parasola
      description: Określa sposób rozkładania i chowania parasola.
    umbrella_type:
      name: Typ parasola
      description: Określa ogólną konstrukcję lub formę parasola.
    upf_rating:
      name: Współczynnik UPF
      description: Oznacza współczynnik ochrony przed promieniowaniem ultrafioletowym
        (UPF) materiału parasola, określający jego skuteczność w blokowaniu szkodliwych
        promieni UV.
    utensil_flexibility:
      name: Elastyczność naczynia
      description: Określa, jak sztywny lub elastyczny jest korpus skrobaka, co ma
        wpływ na możliwość zastosowania w przypadku zakrzywionych mis lub twardego
        ciasta.
    utensil_holder_features:
      name: Cechy pojemnika na przybory kuchenne
      description: Opisuje szczególne cechy funkcjonalne pojemnika na przybory kuchenne.
    utensil_tray_features:
      name: Cechy tacy na przybory kuchenne
      description: Wskazują szczególne cechy, które zwiększają funkcjonalność tacy.
    vacuum_hose_connection_type:
      name: Typ węża próżniowego
      description: Opisuje typ złącza na końcach węża, zapewniającego prawidłowe dopasowanie
        mechaniczne do odkurzacza lub akcesoriów.
    valance_style:
      name: Typ falbany
      description: Określa dekoracyjny wzór lambrekinu, pomagając klientom wybrać
        typ pasujący do wystroju wnętrza.
    valet_organizer_features:
      name: Charakterystyka organizera na przedmioty podręczne
      description: Wskazuje konkretne cechy organizacyjne zintegrowane ze stacją dokującą.
    valve_configuration:
      name: Konfiguracja zaworu
      description: Określa typ funkcjonalny zaworu węża ogrodowego, pomagając użytkownikowi
        szybko wybrać właściwe rozwiązanie dla jego konfiguracji podlewania.
    valve_stem_angle:
      name: Kąt nakładki na wentyl
      description: Określa orientację/kąt wentyla względem dętki, co ma wpływ na łatwość
        pompowania i dopasowania do obręczy.
    vase_filler_type:
      name: Typ wypełniacza wazonu
      description: Klasyfikuje produkt według konkretnego rodzaju materiału wypełniającego
        lub formy.
    vent_pipe_type:
      name: Typ rury odpowietrzającej
      description: Klasyfikuje typ konstrukcji komina lub rury odpowietrzającej.
    vent_style:
      name: Typ odpowietrznika
      description: Klasyfikuje typ strukturalny lub cel elementu odpowietrznika.
    waffle_style:
      name: Typ waflowy
      description: Określa lub wzór siatkowy lub waflowy wytwarzany przez płytki.
    wallpaper_removal_type:
      name: Kategoria łatwości usuwania tapety
      description: Oznacza łatwość usunięcia w przypadku wymiany.
    wallpaper_washability_rating:
      name: Ocena zmywalności tapety
      description: Określa sposób czyszczenia powierzchni tapety po jej przyklejeniu.
    warmer_type:
      name: Typ podgrzewacza
      description: Określa główny mechanizm ogrzewania lub zamierzone zastosowanie
        podgrzewacza do świec lub olejków.
    warmth_level:
      name: Poziom ciepła
      description: Klasyfikuje ogólny poziom ciepła lub sezonową przydatność kołdry.
    warmth_rating:
      name: Ocena ciepła
      description: Wskazuje poziom izolacji koca, podobnie jak wskaźniki TOG w przypadku
        pościeli.
    waste_container_lid_features:
      name: Cechy pokrywy pojemnika na odpady
      description: Wskazuje specjalne funkcjonalności lub ulepszenia wbudowane w pokrywę.
    waste_container_sign_message:
      name: Znak informujący o kontenerze na odpady
      description: Określa konkretny strumień odpadów lub tekst ostrzegawczy wydrukowany
        na etykiecie lub oznaczeniu.
    water_filtration_technology:
      name: Technologia filtracji wody
      description: Opisuje podstawową technologię lub mechanizm stosowany do oczyszczania
        wody.
    water_heater_element_connection_type:
      name: Rodzaj połączenia elementu podgrzewacza wody
      description: Określa typ montażu elementu, rozróżniając montaż wkręcany i różne
        typy kołnierzowe.
    water_sensor_design:
      name: Konstrukcja czujnika wody
      description: Określa formę fizyczną elementu wykrywającego wodę.
    water_supply_type:
      name: Typ instalacji wodociągowej
      description: Określa, w jaki sposób urządzenie pobiera wodę, rozróżniając zbiorniki
        napełniane ręcznie i podłączone przewody wodne.
    watering_needs:
      name: Zapotrzebowanie na wodę
      description: Opisuje typowe zapotrzebowanie rośliny na wodę.
    wax_paper_form:
      name: Forma papieru woskowanego
      description: Określa, czy papier woskowany sprzedawany jest w rolkach czy w
        arkuszach ciętych.
    weather_guard_mounting_method:
      name: Sposób montażu osłony przed warunkami atmosferycznymi
      description: Określa sposób mocowania osłony do podajnika lub innej konstrukcji
        technicznej.
    wheel_bearing_type:
      name: Typ łożyska koła
      description: Określa wewnętrzną konstrukcję łożyska lub tulei koła, mającą wpływ
        na płynność toczenia i wymagania konserwacyjne.
    wheel_tread_style:
      name: Typ bieżnika koła
      description: Określa wzór bieżnika koła, który ma wpływ na przyczepność, poziom
        hałasu i potencjalne oznakowanie podłoża.
    whistling:
      name: Gwizdek
      description: Określa, czy czajnik będzie wydawał dźwięk gwizdka, gdy woda osiągnie
        temperaturę wrzenia.
    wick_material:
      name: Materiał knota
      description: Określa skład użytego knota (np. bawełna, włókno szklane).
    window_film_installation_surface:
      name: Powierzchnia montażu folii okiennej
      description: Określa, czy folia jest przeznaczona do zastosowań wewnętrznych,
        zewnętrznych czy dwustronnych.
    window_film_type:
      name: Rodzaj folii okiennej
      description: Klasyfikuje typ funkcjonalny folii (np. prywatność kontra bezpieczeństwo).
    window_rod_type:
      name: Typ drążka okiennego
      description: Klasyfikuje typ funkcjonalny drążka okiennego.
    window_screen_type:
      name: Typ moskitiery okiennej
      description: Określa typ strukturalny lub metodę działania ekranu.
    window_treatment_lining_type:
      name: Typ podszycia tkaniny okiennej
      description: Określa, czy lambrekin lub falbana jest podszyta, a także jaki
        rodzaj podszycia został zastosowany.
    wine_aerator_type:
      name: Typ napowietrzacza do wina
      description: Określa formę lub sposób działania napowietrzacza do wina.
    wine_glass_style:
      name: Styl kieliszka do wina
      description: Określa rodzaj wina lub kształt kieliszka, który ma pomóc w uzyskaniu
        optymalnego aromatu i smaku.
    wok_bottom_type:
      name: Typ spodu woka
      description: Określa kształt podstawy woka, określając kompatybilność z różnymi
        płytami kuchennymi i pierścieniami do woka.
    wood_grain_orientation:
      name: Orientacja słojów drewna
      description: Określa orientację słojów drewna w produkcie, np. słoje czołowe,
        słoje krawędziowe lub słoje płaskie. Orientacja słojów, która wpływa na trwałość
        i wygodę użytkowania noża.
    wood_seasoning_method:
      name: Metoda sezonowania drewna
      description: Wskazuje w jaki sposób drewno opałowe było suszone lub sezonowane,
        co wpływa na wilgotność drewna i jakość spalania.
    wrap_format:
      name: Format zawijania
      description: Określa formę fizyczną, w jakiej dostarczany jest papier do pakowania
        żywności, np. rolki lub wstępnie pocięte arkusze.
    abacus_bead_material:
      name: Materiał na koraliki abakusa
      description: Podstawowy materiał koralików abakusa.
    abec_rating:
      name: Ocena ABEC
      description: Określa klasę dokładności łożysk na podstawie klasyfikacji ABEC,
        wskazując poziomy gładkości i tolerancji.
    abrasive_level:
      name: Poziom ścierności
      description: Względna wytrzymałość ścierna pasty/związku polerskiego na powierzchniach
        samochodowych.
    absinthe_accessories_included:
      name: Dołączono akcesoria do absyntu
      description: Wyszczególnia wszystkie akcesoria dołączone do produktu, takie
        jak łyżeczki, szklanki lub kostki cukru.
    ac_compressor_mounting_style:
      name: Sposób montażu sprężarki AC
      description: Opisuje styl montażu mechanicznego/mocowania lub połączenie wspornika
        sprężarki i silnika/układu napędowego akcesoriów.
    ac_compressor_oil_type:
      name: Typ oleju sprężarki klimatyzacji
      description: Określa skład chemiczny oleju smarującego wymaganego/używanego
        przez sprężarkę AC (najczęstsze typy to PAG i POE).
    accent_modes:
      name: Tryby akcentowania
      description: Określa, w jaki sposób metronom może akcentować uderzenia w takcie
        (poza podstawowym stukaniem).
    access_mechanism:
      name: Sposób dostępu
      description: Opisuje, jak użytkownik może dostać się do podwyższonej przestrzeni
        sypialnianej.
    accessibility_features:
      name: Funkcje dostępności
      description: Określa wyposażenie i konfiguracje związane z dostępnością w minibusie.
    accessories_included:
      name: Dołączono akcesoria
      description: Przedstawia dodatkowe elementy, które są dostępne w pakiecie z
        krzesłem (np. podnóżek lub poduszka lędźwiowa), dając klientowi pełny obraz
        wartości dodanej.
    accessory_pieces_included:
      name: Dołączono elementy akcesoriów
      description: Przedstawia elementy akcesoriów wchodzące w skład wieloczęściowego
        pakietu lub zestawu prezentowego.
    acoustic_amplifier_feedback_control_features:
      name: Funkcje sterowania sprzężeniem zwrotnym wzmacniacza akustycznego
      description: Określa wbudowane narzędzia zapobiegające sprzężeniu zwrotnemu
        instrumentów akustycznych (np. filtr środkowozaporowy, przełącznik fazowy,
        automatyczne tłumienie sprzężenia zwrotnego itp.).
    acoustic_drum_kit_components_included:
      name: Dołączone elementy akustycznego zestawu perkusyjnego
      description: Wskazuje, które główne komponenty są zawarte w zestawie (w zestawie
        typu shell pack oraz w zestawie kompletnym; dołączono talerze/narzędzia).
    acoustic_guitar_body_shape:
      name: Kształt korpusu gitary akustycznej
      description: Opisuje kształt/zarys korpusu gitary akustycznej, który wpływa
        na brzmienie, wygodę i typowe użytkowanie.
    acoustic_guitar_string_core_design:
      name: Konstrukcja rdzenia strun gitary akustycznej
      description: Podstawowa konstrukcja strun z owijką.
    acoustic_piano_key_material:
      name: Materiał klawiszy fortepianu akustycznego
      description: Określa główny materiał użyty w klawiszach fortepianu.
    acoustic_piano_lid_type:
      name: Typ pokrywy fortepianu akustycznego
      description: Określa styl mechanizmu pokrywy/osłony w fortepianie akustycznym
        (w celu rozróżnienia klapy i górnej pokrywy fortepianu).
    acoustic_piano_plate_frame_material:
      name: Materiał ramy/płyty fortepianu akustycznego
      description: Określa główny materiał płyty/ramy fortepianu (układ akustyczny);
        zwykle używane jest żeliwo.
    acoustic_piano_soundboard_material:
      name: Materiał płyty rezonansowej fortepianu akustycznego
      description: Określa podstawowy materiał użyty do wykonania płyty rezonansowej
        fortepianu.
    action_figure_scale:
      name: Skala figurki kolekcjonerskiej
      description: Oznacza współczynnik skali figurki kolekcjonerskiej (np. 1:12),
        do której ma pasować dane akcesorium.
    action_type:
      name: Typ działania
      description: Opisuje mechanizm odpalania lub odwodzenia kurka broni (np. zamek
        czterotaktowy, mechanizm łamany lub dźwigniowy).
    actuation_mechanism:
      name: Mechanizm uruchamiania
      description: 'Określa sposób, w jaki dźwignia uruchamia układ hamulcowy: w pełni
        mechaniczny z linką, w pełni hydrauliczny, hydrauliczny z linką lub elektroniczny/bezprzewodowy.'
    actuation_method:
      name: Metoda uruchamiania
      description: W jaki sposób system tłumienia jest aktywowany lub zwalniany.
    adapter_orientation:
      name: Ustawienie złączki
      description: Określa kąt lub konfigurację złączki zaworu opony rowerowej, która
        wpływa na dostępność pompki (np. prosty, ustawiony pod kątem 90° itp.).
    additive_application_stage:
      name: Etap stosowania dodatku
      description: Wskazuje, na jakim etapie procesu produkt ma zostać użyty.
    adhesive_backing:
      name: Podkład klejący
      description: Określa, czy jedwab z możliwością zadrukowania ma warstwę klejącą
        pozwalającą na odklejanie i przyklejanie.
    adhesive_formulation:
      name: Skład kleju
      description: Wskazuje bazę chemiczną lub skład kleju, np. cyjanoakrylan lub
        epoksyd.
    adhesive_sides:
      name: Boki klejące
      description: Określa, czy klej topliwy znajduje się po jednej czy po obu stronach
        taśmy/siatki.
    adjunct_grain_processing_form:
      name: Forma przetworzenia ziarna dodatkowego
      description: Oznacza formę fizyczną/przetwórczą dodatkowego ziarna sprzedawanego
        do warzenia piwa (np. płatki, prażone, słodowane lub surowe).
    adjustability_type:
      name: Typ regulacji
      description: Określa, jakiego rodzaju regulację umożliwia rozpórka (o ile jest
        to możliwe).
    adjustable_cup_mutes:
      name: Regulowane tłumiki cup
      description: Określa, czy tłumik cup jest regulowany/zdejmowany oraz jaki jest
        sposób jego regulacji.
    adjustable_zones:
      name: Regulowane strefy
      description: Określa, które odcinki podstawy można regulować niezależnie od
        siebie.
    adjustment_type:
      name: Rodzaj regulacji
      description: Określa, czy stabilizator umożliwia regulację i w jaki sposób odbywa
        się regulacja.
    administration_method:
      name: Metoda podawania
      description: Wskazuje, w jaki sposób należy podawać koniowi środek odrobaczający
        (np. doustnie lub w formie zastrzyku), pomagając klientowi stosować się do
        zaleceń weterynaryjnych i wybrać odpowiednią metodę podawania.
    advice_card_prompt_type:
      name: Typ treści na karcie okolicznościowej z sentencją
      description: Rodzaj treści nadrukowanej na karcie (lub brak treści).
    aeration_method:
      name: Metoda napowietrzania
      description: Opisuje typ napowietrzania zapewnianego lub wspomaganego przez
        pojemnik, zapewniając odpowiednią ilość tlenu dla żywej przynęty.
    aero_package_components:
      name: Elementy pakietu Aero
      description: Wskazuje, które kluczowe elementy aerodynamiczne są zamontowane
        w pojeździe (należy wybrać wszystkie elementy, które mają zastosowanie).
    aerodynamic_elements_included:
      name: Zawiera elementy aerodynamiczne
      description: Określa, które elementy aerodynamiczne są zawarte w samochodzie
        sportowym (należy wybrać wszystkie elementy, które mają zastosowanie, o ile
        są obsługiwane).
    aftertouch_support:
      name: Obsługa funkcji Aftertouch
      description: Określa, czy kontroler obsługuje funkcję Aftertouch (kanałowa lub
        polifoniczna) na klawiszach/padach.
    agave_content_classification:
      name: Klasyfikacja zawartości agawy
      description: Określa, czy tequila jest produkowana w 100% z agawy Blue Weber,
        czy jest mieszanką zawierającą minimum 51% cukru z agawy.
    aida_cloth_count:
      name: Liczba krzyżyków kanwy
      description: Określa liczbę krzyżyków/ściegów na cal kanwy, co determinuje rozmiar
        ściegu i skalę wzoru.
    aida_cloth_pre_cut_format:
      name: Format wstępnie dociętej kanwy
      description: Określa, czy kanwa jest sprzedawana w mniejszych kawałkach, w postaci
        ciągłego kawałka odcinanego z belki czy w rolce.
    air_bag_material:
      name: Materiał poduszki powietrznej
      description: Określa materiał poduszki/zbiornika używanego w irlandzkich dudach
        wojennych.
    air_bed_internal_construction:
      name: Budowa wewnętrzna materaca nadmuchiwanego
      description: Opisuje wewnętrzną konstrukcję lub technologię wykorzystywaną wewnątrz
        materaca nadmuchiwanego w celu zapewnienia komfortu i stabilności.
    air_dry_clay_color_form:
      name: Forma kolorowej glinki samoutwardzalnej
      description: Określa, czy glinka jest sprzedawana w postaci kolorowej, białej/bezbarwnej
        do malowania lub jako mieszanka/zestaw.
    air_hockey_items_included:
      name: Dołączone elementy do cymbergaja
      description: Wskazuje konkretne akcesoria zawarte w zestawie, dzięki czemu klienci
        dokładnie wiedzą, co otrzymują (np. 2 grzybki, 4 krążki i 2 podkładki filcowe).
    air_intake_temperature_sensor_mounting_style:
      name: Sposób montażu czujnika temperatury wlotu powietrza
      description: Sposób fizycznego montażu czujnika IAT w układzie dolotowym.
    air_integration_capability:
      name: Możliwość integracji powietrza
      description: Wskazuje, czy i w jaki sposób komputer nurkowy obsługuje bezprzewodowe
        nadajniki ciśnienia w butli.
    air_mattress_valve_type:
      name: Typ zaworu materaca nadmuchiwanego
      description: Określa styl zaworu, do którego pasuje lub który zawiera dane akcesorium,
        zapewniając kompatybilność pompek, zaworów i części zamiennych.
    air_water_rocket_kit_items_included:
      name: Dołączone elementy zestawu rakiet powietrznych i wodnych
      description: Główne elementy zestawu rakiet (wyrzutnia, pompka, stateczniki
        i części do napełniania).
    air_water_rocket_launch_method:
      name: Metoda wystrzeliwania rakiet powietrznych i wodnych
      description: Określa, jak rakieta jest poddawana działaniu ciśnienia / wystrzeliwana
        (działanie użytkownika i sposób obsługi).
    airbag_position:
      name: Pozycja poduszki powietrznej
      description: Określa przewidywaną pozycję/strefę zabezpieczenia poduszki powietrznej.
    aircraft_ads_b_capability:
      name: Obsługa technologii ADS-B przez statek powietrzny
      description: Określa, czy statek powietrzny jest wyposażony w urządzenie obsługujące
        technologię ADS-B Out.
    aircraft_airframe_material:
      name: Materiał płatowca samolotu
      description: Podstawowe materiały stosowane w konstrukcji płatowca samolotu.
    aircraft_cabin_configuration:
      name: Konfiguracja kabiny samolotu
      description: Określa układ kabiny statku powietrznego (np. grupa konferencyjna,
        kanapa lub kabina czterostrefowa).
    aircraft_documentation_included:
      name: Dołączona dokumentacja statku powietrznego
      description: Wyświetla listę dokumentów dostarczanych wraz z częścią (np. 8130-3).
    aircraft_galley_configuration:
      name: Konfiguracja kuchni samolotu
      description: Obecność i rodzaj wyposażenia kuchennego/gastronomicznego w kabinie.
    aircraft_installation_location:
      name: Miejsce instalacji w statku powietrznym
      description: Miejsce montażu lub użytkowania części lub akcesorium w statku
        powietrznym.
    aircraft_internet_connection:
      name: Połączenie internetowe w statku powietrznym
      description: Wskazuje dostępność/rodzaj połączenia internetowego w kabinie.
    aircraft_landing_gear_type:
      name: Typ podwozia statku powietrznego
      description: Określa konfigurację podwozia wiatrakowca.
    aircraft_lavatory_configuration:
      name: Konfiguracja toalety w statku powietrznym
      description: Rodzaj konfiguracji toalety pokładowej.
    aircraft_maintenance_program_enrollment:
      name: Rejestracja w programie obsługi technicznej statków powietrznych
      description: Wskazuje, czy statek powietrzny jest objęty programem konserwacji
        silnika i/lub płatowca, a jeśli tak — jaki typ ochrony ma zastosowanie (silnik,
        płatowiec lub oba elementy).
    aircraft_operational_certification:
      name: Certyfikacja użytkowania statku powietrznego
      description: Określa podstawę prawną lub operacyjną certyfikacji, na podstawie
        której statek powietrzny jest użytkowany (zależna od jurysdykcji, np. FAA
        Part 91/135/121 lub EASA AOC).
    aircraft_protective_gear_certification:
      name: Certyfikacja sprzętu ochronnego do statków powietrznych
      description: Określa normę lotniczą/regulacyjną lub branżową, która musi spełniać
        certyfikowany sprzęt ochronny.
    aircraft_system_application:
      name: Wykorzystany system statku powietrznego
      description: Określa system lub obszar statku powietrznego, do którego należy
        część/akcesorium (służy do przeglądania i filtrowania różnych części statku
        powietrznego).
    airflow_resistance_level:
      name: Poziom oporu przepływu powietrza
      description: Wskazuje, w jakim stopniu tłumik ogranicza ciśnienie wsteczne /
        opór powietrza.
    airship_envelope_material:
      name: Materiał powłoki sterowca
      description: Podstawowy materiał powłoki (poszycia) sterowca.
    airsoft_part_type:
      name: Typ części ASG
      description: Określa element funkcjonalny lub typ akcesorium do replik broni
        strzeleckiej (ASG) (np. magazynek, lufę lub nakładka lufy).
    airworthiness_approval_basis:
      name: Podstawa zatwierdzenia zdatności do lotu
      description: Określa podstawę zatwierdzeń/certyfikacji dla części, jeśli ma
        to zastosowanie (np. PMA, TSO, STC itd.).
    alarm_volume_adjustability:
      name: Możliwość regulacji głośności alarmu
      description: Określa, czy i w jaki sposób użytkownik może dostosować głośność
        alarmu.
    alcohol_ink_finish_effect:
      name: Efekt wykończenia tuszem alkoholowym
      description: Opisuje efekt wizualny/wykończenie uzyskiwane dzięki zastosowaniu
        tuszu alkoholowego (poza samym kolorem), np. metaliczny lub perłowy.
    alignment_aid_style:
      name: Typ elementów ułatwiających wyrównanie
      description: Opisuje typ prowadnic wyrównujących nadrukowanych lub umieszczonych
        na powierzchni maty (np. linie proste, znaczniki odległości).
    alternator_cooling_type:
      name: Typ chłodzenia alternatora
      description: Opisuje sposób chłodzenia i wentylacji alternatora.
    alternator_marine_ignition_protection_rating:
      name: Stopień ochrony zapłonu alternatora morskiego
      description: Wskazuje, czy alternator posiada zabezpieczenie zapłonowe do komór
        silnikowych jednostek pływających (np. zgodność z SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Konfiguracja montażu alternatora
      description: Określa fizyczną konfigurację montażu służącą do przymocowania
        alternatora do wspornika silnika.
    alternator_pulley_type:
      name: Typ koła pasowego alternatora
      description: Określa konstrukcję koła pasowego/sprzęgła alternatora (lub informuje
        o braku koła pasowego w zestawie).
    alternator_regulator_type:
      name: Typ regulatora alternatora
      description: Wskazuje, czy regulator napięcia jest zintegrowany z alternatorem
        czy zewnętrzny oraz czy jest sterowany OEM/PCM.
    alternator_terminal_connection_type:
      name: Typ złącza zacisków alternatora
      description: Główny typ połączenia elektrycznego zacisków wyjściowych/wzbudzenia
        alternatora pomagający zapewnić kompatybilność wiązki przewodów.
    altitude_suitability:
      name: Przystosowanie do gry na wysokości
      description: Wskazuje, czy piłka została zaprojektowana do określonych warunków
        wysokościowych wpływających na prędkość i odbicie.
    ambulance_stretcher_mount_type:
      name: Typ mocowania noszy w ambulansie
      description: Określa typ systemu załadunku/mocowania noszy obsługiwanego przez
        ambulans.
    american_football_safety_certification:
      name: Certyfikat bezpieczeństwa do futbolu amerykańskiego
      description: Wskazuje certyfikaty lub normy bezpieczeństwa dotyczące futbolu
        amerykańskiego, które spełnia produkt.
    amplifier_tube_function:
      name: Funkcja lampy wzmacniacza
      description: Określa funkcję lampy w układzie wzmacniacza instrumentalnego (np.
        przedwzmacniacz lub końcówka mocy).
    analog_synthesizer_cv_gate_i_o:
      name: Wejścia/wyjścia CV/Gate syntezatora analogowego
      description: Wskazuje typy połączeń CV i Gate obsługiwanych w celu integracji
        z modułowym/analogowym sprzętem.
    analog_synthesizer_keybed_configuration:
      name: Konfiguracja klawiatury syntezatora analogowego
      description: Opisuje, czy syntezator posiada wbudowaną klawiaturę oraz liczbę
        klawiszy.
    anchor_configuration:
      name: Konfiguracja punktów mocowania
      description: Wskazuje, czy system podwieszenia wykorzystuje pojedynczy centralny
        punkt mocowania czy wiele niezależnych punktów mocowania, co wpływa na różnorodność
        ćwiczeń i złożoność montażu.
    animal_raising_method:
      name: Metoda hodowli zwierząt
      description: Opisuje praktyki hodowlane stosowane wobec zwierzęcia źródłowego.
    animal_species:
      name: Gatunek zwierzęcia
      description: Określa zwierzę lub stworzenie przedstawione jako pluszak (np.
        niedźwiedź, królik, dinozaur).
    animal_trap_jaw_style:
      name: Typ szczęk pułapki na zwierzęta
      description: Konfiguracja szczęk pułapki wpływająca na siłę chwytu i dobrostan
        zwierząt.
    animal_trap_type:
      name: Typ pułapki na zwierzęta
      description: Klasyfikuje mechaniczny styl/konstrukcję pułapki, umożliwiając
        szybkie znalezienie odpowiedniej metody odławiania zgodnej z potrzebami lub
        przepisami.
    ankle_collar_style:
      name: Styl kołnierza wokół kostki
      description: Opisuje styl lub konstrukcję kołnierza buta wokół kostki, np. niski,
        średni, wysoki, skarpetowy lub bezsznurowy, co wpływa na wsparcie, dopasowanie
        i wygląd.
    ankle_guard_protection_level:
      name: Poziom ochrony ochraniacza kostki
      description: Określa ogólny poziom ochrony przed uderzeniami zapewniany przez
        ochraniacz kostki.
    ankle_strap_padding_type:
      name: Typ wyściółki paska kostki
      description: Opisuje materiał amortyzujący lub sposób wyściełania zastosowany
        wewnątrz paska wpływający na komfort.
    ankle_strap_type:
      name: Typ paska na kostkę
      description: Klasyfikuje konstrukcję lub projekt paska kostki wiązań snowboardowych.
    ant_farm_habitat_medium_type:
      name: Typ medium w farmie mrówek
      description: Określa główne medium do drążenia tuneli/obserwacji dostarczane
        lub wymagane przez farmę mrówek.
    ant_farm_kit_contents:
      name: Zawartość zestawu farmy mrówek
      description: Określa komponenty dołączone do zestawu farmy mrówek (np. pojemnik,
        piasek/żel, voucher na mrówki, narzędzia do karmienia).
    ant_farm_lighting_type:
      name: Typ oświetlenia farmy mrówek
      description: Określa typ wbudowanego oświetlenia/iluminacji używanego do obserwacji.
    antenna_fit_type:
      name: Typ mocowania anteny
      description: Określa typ kompatybilności kulki antenowej z anteną.
    anti_caking_agent:
      name: Substancja przeciwzbrylająca
      description: Określa rodzaj substancji przeciwzbrylającej dodanej w celu zapobiegania
        zbrylaniu, co ma znaczenie przy alergiach i precyzji receptur.
    anti_g_suit_bladder_material:
      name: Materiał komór kombinezonu przeciwprzeciążeniowego
      description: Materiał użyty do wykonania wewnętrznych pompowanych komór kombinezonu
        przeciwprzeciążeniowego; należy wymienić wszystkie zastosowane materiały.
    anti_g_suit_connector_type:
      name: Typ złącza kombinezonu przeciwprzeciążeniowego
      description: Określa typ/standard złącza przewodu powietrznego/ciśnieniowego
        używanego do połączenia z samolotem lub regulatorem.
    anti_g_suit_inflation_method:
      name: Metoda pompowania kombinezonu przeciwprzeciążeniowego
      description: Wskazuje sposób napełniania komór kombinezonu w celu zapewnienia
        ochrony przed przeciążeniami.
    anti_g_suit_size_system:
      name: System rozmiarów kombinezonu przeciwprzeciążeniowego
      description: Standard rozmiarów używany do określania rozmiaru/dopasowania kombinezonu.
    anti_reverse_type:
      name: Typ blokady obrotu wstecznego
      description: Określa typ zastosowanego mechanizmu blokady obrotu wstecznego
        wpływającego na zacięcie haczyka i luz wsteczny.
    anti_theft_feature:
      name: Funkcja antykradzieżowa
      description: Wskazuje, czy uchwyt/mocowanie zapewnia zabezpieczenia antykradzieżowe,
        takie jak śruby blokujące lub konstrukcja odporna na manipulację.
    antique_gun_ignition_system:
      name: System zapłonu broni zabytkowej
      description: Określa historyczny system odpalania/zapłonu używany w zabytkowej
        broni palnej.
    apple_variety:
      name: Odmiana jabłka
      description: Określa odmianę jabłka (np. Gala, Fuji, Granny Smith), pomagając
        klientom wybrać produkt według smaku, tekstury i zastosowania kulinarnego.
    applique_edge_finish:
      name: Wykończenie krawędzi aplikacji
      description: Opisuje sposób wykończenia krawędzi, wpływający na wygląd i odporność
        na strzępienie.
    arbor_type:
      name: Typ szpuli
      description: Klasyfikuje kołowrotek według konstrukcji szpuli, co wpływa na
        szybkość zwijania żyłki, pojemność podkładu i pamięć żyłki.
    archery_accessory_type:
      name: Typ akcesorium łuczniczego
      description: Określa typ akcesorium przeznaczonego do sprzętu łuczniczego, umożliwiając
        szybkie filtrowanie produktów.
    archery_part_type:
      name: Typ części do łucznictwa
      description: Określa konkretny element sprzętu lub część zamienną będącą przedmiotem
        sprzedaży (np. majdan, ramię, cięciwa), umożliwiając precyzyjne filtrowanie
        bez nadmiernego rozbudowywania drzewa kategorii.
    archery_range_accessory_type:
      name: Typ akcesorium z gamy do łucznictwa
      description: Klasyfikuje konkretny typ akcesorium używanego na strzelnicy łuczniczej,
        umożliwiając szybkie filtrowanie dokładnie tego elementu, którego potrzebuje
        klient.
    archery_target_features:
      name: Cechy tarczy łuczniczej
      description: Wymienia specjalistyczne cechy użytkowe lub funkcjonalne nieuwzględnione
        w innych atrybutach (np. samoregenerująca się pianka, uchwyt do przenoszenia).
    archery_tool_type:
      name: Typ narzędzia łuczniczego
      description: Klasyfikuje konkretny typ narzędzia lub elementu wyposażenia łuczniczego.
    armband_features:
      name: Cechy opaski
      description: Wymienia specjalne funkcje wizualne lub użytkowe zwiększające funkcjonalność
        opaski.
    armguard_style:
      name: Styl ochraniacza przedramienia
      description: Określa konstrukcję lub formę ochraniacza przedramienia, dostarczając
        informacji o zakresie ochrony i klasycznym lub nowoczesnym wyglądzie.
    armor_protection_type:
      name: Typ ochrony pancerza
      description: Typ ochrony zapewnianej przez system opancerzenia pojazdu.
    armrest_adjustability:
      name: Regulacja podłokietników
      description: Określa zakres regulacji wymiarów i konfigurację podłokietników
        fotela (np. stałe, 2D, 3D, składane).
    armrest_type:
      name: Typ podłokietników
      description: Opisuje obecność i możliwość regulacji podłokietników fotela (np.
        brak, stałe, regulowane, zdejmowane).
    arrow_bolt_point_type:
      name: Typ grotu strzały/bełtu
      description: Określa styl grotu lub końcówki zamontowanej w strzale lub bełcie.
    arrow_component_type:
      name: Typ elementu strzały
      description: Klasyfikuje konkretną część lub akcesorium do strzały (insert,
        owijka, tuleja, klej itp.), umożliwiając filtrowanie produktów bez potrzeby
        tworzenia wielu dodatkowych podkategorii.
    arrow_containment_level:
      name: Poziom utrzymania strzały
      description: Opisuje, czy podstawka całkowicie utrzymuje strzałę, częściowo
        ją utrzymuje, czy jej nie utrzymuje.
    arrow_fletching_orientation:
      name: Orientacja lotek strzały
      description: Określa orientację lotek lub offsetu (np. lewe, prawe, helikalne),
        która determinuje kierunek obrotu strzały.
    arrow_nock_groove_size:
      name: Rozmiar rowka nasadki strzały
      description: Określa klasyfikację rozmiaru rowka/gardzieli nasadki wpływającą
        na kompatybilność z różnymi średnicami cięciwy.
    arrow_nock_type:
      name: Typ nasadki strzały
      description: Konstrukcja/styl nasadki strzały współpracującej z cięciwą łuku.
    arrow_rest_style:
      name: Styl podstawki pod strzałę
      description: Określa funkcjonalny styl/mechanizm podstawki pod strzałę (np.
        opadająca, ostrzowa, whisker biscuit). Styl określa sposób podtrzymywania,
        utrzymywania i wypuszczania strzały i stanowi główne kryterium rozróżniania
        produktów przez klientów.
    arrow_shaft_compatibility:
      name: Kompatybilność trzonu strzały
      description: Wskazuje standard trzonu/tulei strzały kompatybilny z podświetlaną
        nasadką (np. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Styl końcówki narzędzia artystycznego/rękodzielniczego
      description: Opisuje kształt/profil końcówki roboczej (np. spiczasta lub zaokrąglona
        kulka), wskazując rodzaj wykonywanych tłoczeń.
    art_ink_lightfastness_rating:
      name: Odporność tuszu artystycznego na światło
      description: Wskazuje odporność tuszu na blaknięcie pod wpływem światła, zwykle
        wyrażaną za pomocą standardowych ocen.
    art_ink_opacity:
      name: Krycie tuszu artystycznego
      description: Określa poziom krycia tuszu po aplikacji.
    art_security_rating:
      name: Klasa bezpieczeństwa ART
      description: Określa holenderską klasę bezpieczeństwa ART (1–5 gwiazdek) przyznaną
        zamkowi.
    artichoke_cut:
      name: Forma karczocha
      description: Wskazuje, która część lub forma przygotowania karczocha jest oferowana
        (np. cały, serce, spód), aby klienci rozumieli wydajność i zastosowanie kulinarne.
    artichoke_variety:
      name: Odmiana karczocha
      description: Określa odmianę lub botaniczną varietę karczocha, pomagając klientom
        odróżnić wielkość, kolor, smak i zastosowanie kulinarne.
    articulation_features:
      name: Cechy ruchomych elementów
      description: Wskazuje, czy model dinozaura posiada ruchome części (ruchoma szczęka,
        kończyny, ogon) oraz ogólną możliwość ustawiania pozycji.
    artificial_bait_form:
      name: Forma sztucznej przynęty
      description: Wskazuje fizyczną formę lub sposób prezentacji przynęty wędkarskiej.
    asa_mounting_type:
      name: Typ mocowania ASA
      description: Wskazuje styl interfejsu lub standard mocowania adaptera Air Source
        Adapter (ASA) używanego przez drop forward (np. dovetail, szyna, mocowanie
        bezpośrednie).
    ascender_descender_type:
      name: Typ przyrządu zaciskowego/zjazdowego
      description: Klasyfikuje styl przyrządu zaciskowego lub zjazdowego do bardziej
        precyzyjnego filtrowania.
    aspiration_type:
      name: Typ doładowania silnika
      description: Wskazuje sposób zasysania/doładowania silnika.
    assembly_state:
      name: Stan montażu
      description: Wskazuje, czy szafka dostarczana jest do samodzielnego montażu,
        wstępnie zmontowana czy w innej formie.
    assistance_mechanism:
      name: Mechanizm wspomagający
      description: Określa wbudowany system wspomagania lub oporu zapewniany przez
        wieżę treningową do podciągania, dipów lub innych ćwiczeń.
    atemoya_cultivar:
      name: Odmiana atemoi
      description: Określa nazwę odmiany owocu atemoi, umożliwiając klientom wybór
        owoców według smaku, wielkości lub liczby pestek.
    athletic_cup_size:
      name: Rozmiar suspensora ochronnego
      description: Wskazuje rozmiar ochraniacza ochronnego określony przez producenta
        w celu zapewnienia odpowiedniego dopasowania dla sportowca.
    attachment_position:
      name: Miejsce mocowania
      description: Określa miejsce mocowania torby do siodła lub rowerzysty.
    attractant_scent_profile:
      name: Profil zapachowy wabika
      description: Opisuje konkretny zapach lub aromat stosowany do wabienia zwierząt
        lub maskowania ludzkiego zapachu.
    atv_utv_intended_use:
      name: Przeznaczenie ATV/UTV
      description: Podstawowe przeznaczenie/styl ATV/UTV.
    audio_channel_configuration:
      name: Konfiguracja kanału audio
      description: Liczba niezależnych kanałów audio obsługiwanych przez korektor/DSP
        (np. stereo 2-kanałowe, 4-kanałowe przód/tył, 6-kanałowe).
    audio_inputs:
      name: Wejścia audio
      description: Określa typy wejść audio dostępnych do samplowania/nagrywania (np.
        jack 1/4 cala, XLR, 3,5 mm, przedwzmacniacz mikrofonowy, phono).
    audio_output:
      name: Wyjście audio
      description: Wskazuje, czy zabawka zapewnia dźwięk i w jaki sposób jest on odtwarzany.
    audio_outputs:
      name: Wyjścia audio
      description: Określa dostępne wyjścia audio, w tym wyjścia główne i przypisywalne/pomocnicze.
    audio_playback_source:
      name: Źródło odtwarzania audio
      description: Główne źródła multimediów, z których zestaw karaoke może odtwarzać
        muzykę.
    autograph_authentication:
      name: Uwierzytelnienie autografu
      description: Wskazuje status lub typ uwierzytelnienia autografu na karcie.
    autograph_format:
      name: Format autografu
      description: Opisuje, czy podpis jest oryginalnym autografem odręcznym, nadrukowaną
        facsimile czy dodatkową inskrypcją.
    autogyro_cockpit_enclosure:
      name: Typ zabudowy kokpitu wiatrakowca
      description: Określa, czy kokpit jest otwarty czy zabudowany.
    available_firing_modes:
      name: Dostępne tryby strzału
      description: Wymienia dostępne tryby strzału obsługiwane przez marker po wyjęciu
        z pudełka.
    avocado_variety:
      name: Odmiana awokado
      description: Określa odmianę awokado, pomagając klientom rozróżnić smak, teksturę,
        wielkość i zawartość tłuszczu.
    award_customization_included:
      name: Personalizacja nagrody w zestawie
      description: Wskazuje, jaka personalizacja/dostosowanie jest zawarte w zakupie
        nagrody.
    award_material:
      name: Materiał nagrody
      description: Określa główny materiał nagrody (trofeum, tabliczka, medal, przypinka,
        elementy wstążki).
    award_mounting_display_type:
      name: Typ montażu/ekspozycji nagrody
      description: Określa sposób prezentacji lub montażu nagrody (ścienna, biurkowa,
        do noszenia).
    award_plaque_plate_material:
      name: Materiał tabliczki nagrody
      description: Określa materiał tabliczki z nazwą/grawerem przymocowanej do plakiety
        (odrębny od materiału podstawy).
    award_ribbon_attachment_type:
      name: Typ mocowania wstążki nagrody
      description: Określa sposób mocowania lub noszenia wstążki.
    award_ribbon_imprint_method:
      name: Metoda nadruku na wstążce nagrody
      description: Określa sposób nanoszenia tekstu/grafiki na wstążkę.
    award_ribbon_material:
      name: Materiał wstążki nagrody
      description: Główny materiał tkaniny wstążki (np. satyna, poliester).
    award_ribbon_placement_title:
      name: Miejsce/tytuł na wstążce nagrody
      description: Standardowe miejsce lub tytuł przekazywany przez wstążkę (np. 1.
        miejsce, uczestnik).
    axle_compatibility:
      name: Kompatybilność osi
      description: Wskazuje standard osi obsługiwany przez koło, zapewniając kompatybilność
        z ramą i widelcem roweru.
    back_beam_type:
      name: Typ tylnej belki
      description: Typ/możliwość regulacji tylnej belki (np. standardowa lub regulowana
        na wysokość).
    back_design:
      name: Konstrukcja pleców
      description: Określa charakterystyczne konstrukcje tylnej części odzieży wpływające
        na styl i wsparcie.
    back_panel_type:
      name: Typ tylnego panelu
      description: Określa styl lub materiał tylnego panelu szafki wpływający na widoczność
        ekspozycji i dopasowanie do wystroju.
    back_sides_material:
      name: Materiał tyłu i boków
      description: Określa materiał użyty do wykonania tyłu i boków korpusu gitary
        klasycznej.
    backing_type:
      name: Typ podkładu
      description: Opisuje typ podkładu/sposób mocowania sprzedawanego elementu z
        cyrkoniami (dla produktów samoprzylepnych).
    backup_camera_mounting_location:
      name: Miejsce montażu kamery cofania
      description: Wskazuje docelowe miejsce montażu kamery cofania w pojeździe.
    backup_camera_video_interface:
      name: Interfejs wideo kamery cofania
      description: Określa wyjście/interfejs/złącze wideo używane przez kamerę cofania
        do połączenia z monitorem, rejestratorem DVR lub jednostką główną (np. composite
        RCA, OEM LVDS, IP over Ethernet).
    badminton_set_components_included:
      name: Elementy zestawu do badmintona w komplecie
      description: Wymienia elementy dołączone do zestawu do badmintona.
    bag_attachment_method:
      name: Metoda mocowania torby
      description: Wskazuje główną metodę mocowania torby/uchwytu na bukłak do innego
        wyposażenia (np. system MOLLE, pętla na pasek, karabińczyk).
    bag_case_carrying_style:
      name: Styl noszenia torby/pokrowca
      description: Określa główną formę przenoszenia pokrowca/gigbagu (sposób konstrukcji
        do noszenia).
    bag_cover_material:
      name: Materiał pokrycia torby
      description: Określa materiał pokrowca torby (zewnętrznej warstwy), wpływający
        na trwałość, chwyt i wygląd.
    bag_embellishment:
      name: Ozdoby torby
      description: Opisuje charakterystyczne elementy dekoracyjne na zewnętrznej części
        torby, takie jak chwosty, ćwieki lub pikowanie.
    bag_fill_medium:
      name: Medium wypełnienia worka
      description: Określa substancję używaną do wypełniania lub sprężania worka (np.
        powietrze, woda, piasek).
    bag_material:
      name: Materiał worka
      description: Materiał worka/pęcherza powietrznego.
    bag_padding_level:
      name: Poziom wyściółki torby
      description: Określa stopień lub styl wyściółki zastosowanej w torbie lub pokrowcu.
    bag_size_descriptor:
      name: Określenie rozmiaru torby
      description: Marketingowe określenie rozmiaru torby typu bucket (np. mini, duża),
        uzupełniające dokładne wymiary.
    bagel_size:
      name: Rozmiar bajgla
      description: Określa ogólny rozmiar bajgla, np. mini, cienki, standardowy, duży,
        bardzo duży lub jumbo.
    bagpipe_accessories_included:
      name: Dołączono akcesoria do dud
      description: Wymienia główne komponenty/akcesoria dołączone do dud poza samym
        instrumentem, np. futerał, practice chanter, pokrowiec, sznury, system kontroli
        wilgoci.
    bagpipes_playing_mode:
      name: Tryb gry na dudach
      description: Sposób dostarczania powietrza do instrumentu podczas gry.
    bait_compatibility:
      name: Zgodność przynęt
      description: Wymienia typy przynęt, z którymi kompatybilne jest akcesorium do
        pelletu, pomagając wędkarzom dobrać narzędzie do preferowanej przynęty.
    bait_species:
      name: Gatunek przynęty
      description: Określa główny organizm oferowany jako przynęta, pomagając wędkarzom
        zapewnić zgodność z przepisami i skuteczność wobec docelowych gatunków.
    baking_chip_form:
      name: Forma kawałków do pieczenia
      description: Opisuje fizyczny rozmiar lub kształt kawałków do pieczenia wpływający
        na topnienie i wygląd wypieków.
    balance_board_style:
      name: Typ deski balansującej
      description: Klasyfikuje deski balansujące według mechanizmu lub konstrukcji,
        wskazując sposób ruchu deski i poziom trudności treningu.
    balance_cushion_accessories_included:
      name: Akcesoria do poduszki balansującej w zestawie
      description: Wymienia akcesoria dołączone do poduszki, umożliwiając klientom
        porównanie wartości zestawu.
    balance_type:
      name: Typ wyważenia
      description: Wskazuje stan/stopień wyważenia wału napędowego w momencie sprzedaży
        (np. fabrycznie wyważony, wyważony do wysokich prędkości, niewyważony).
    ball_bladder_material:
      name: Materiał pęcherza piłki
      description: Określa materiał użyty do wykonania wewnętrznego pęcherza piłki
        ręcznej, wpływający na utrzymanie powietrza, odbicie i trwałość.
    ball_certification:
      name: Certyfikacja piłki
      description: Wskazuje oficjalne certyfikaty lub homologacje uzyskane przez piłkę.
    ball_construction:
      name: Konstrukcja piłki
      description: Wskazuje metodę produkcji używaną do łączenia paneli piłki, wpływającą
        na trwałość, czucie, nasiąkanie wodą i cenę.
    ball_core_construction:
      name: Konstrukcja rdzenia piłki
      description: Opisuje wewnętrzną konstrukcję piłki wpływającą na odbicie i czucie.
    ball_core_type:
      name: Typ rdzenia piłki
      description: Wskazuje wewnętrzną konstrukcję piłki wpływającą na odbicie i rozkład
        masy.
    ball_cup_game_included_pieces:
      name: Elementy gry ball & cup w zestawie
      description: Określa elementy dołączone do zestawu gry typu ball & cup.
    ball_drilling_state:
      name: Stan wiercenia piłki
      description: Wskazuje, czy piłka posiada wywiercone otwory na palce i w jakim
        zakresie.
    ball_holder_type:
      name: Typ uchwytu na piłkę
      description: Określa styl konstrukcyjny lub formę uchwytu na piłkę.
    ball_pit_ball_surface_finish:
      name: Wykończenie powierzchni piłek do suchego basenu
      description: Opisuje dotykowe/wizualne wykończenie powierzchni piłek wpływające
        na chwyt, komfort zabawy i czyszczenie.
    ball_pit_safety_features:
      name: Funkcje bezpieczeństwa suchego basenu z piłkami
      description: Funkcje konstrukcyjne związane z bezpieczeństwem suchego basenu.
    ball_pump_accessory_type:
      name: Typ akcesorium do pompki do piłek
      description: Określa konkretny rodzaj akcesorium do pompki do piłek, umożliwiając
        sprzedawcom oznaczanie manometrów, wężyków, smarów i innych dodatków w jednej
        kategorii nadrzędnej.
    ball_return_mechanism:
      name: Mechanizm zwrotu piłki
      description: Określa typ mechanizmu zwrotu piłki zastosowanego w macie, jeśli
        występuje.
    ball_return_type:
      name: Typ zwrotu piłki
      description: Typ kieszeni/systemu zwrotu zbierającego piłki podczas gry.
    ball_speed_rating:
      name: Klasa prędkości piłki
      description: Kategoria prędkości określona przez producenta wskazująca szybkość
        gry piłką w standardowych warunkach.
    ball_surface_texture:
      name: Faktura powierzchni piłki
      description: Opisuje zewnętrzną teksturę lub wzór żłobień piłek, które mogą
        wpływać na chwyt i wygląd.
    ball_surface_type:
      name: Typ powierzchni piłki
      description: Opisuje zewnętrzne wykończenie lub amortyzację piłki wskazujące
        odczucie uderzenia i chwyt.
    ballonet_configuration:
      name: Konfiguracja ballonetu
      description: Typ/konfiguracja systemu ballonetu używanego do trymowania i zarządzania
        ciśnieniem (dla sterowców półsztywnych i niesztywnych).
    balloon_closure_valve_type:
      name: Typ zamknięcia/zaworu balonu
      description: Określa sposób zamykania balonu po napompowaniu (np. wiązanie,
        samozamykający zawór).
    balloon_kit_finish:
      name: Wykończenie zestawu balonów
      description: Opisuje powierzchnię/wykończenie wizualne balonów dołączonych do
        zestawu.
    balloon_kit_material:
      name: Materiał zestawu balonów
      description: Określa główny materiał balonów dołączonych do zestawu.
    banana_variety:
      name: Odmiana banana
      description: Określa odmianę lub typ banana.
    banjo_head_type:
      name: Typ membrany banjo
      description: Typ/materiał membrany banjo wpływający na jasność brzmienia, głośność
        i odczucia podczas gry.
    banjo_neck_material:
      name: Materiał szyjki banjo
      description: Materiał gryfu wpływający na odczucia, stabilność i brzmienie.
    banjo_pickup_configuration:
      name: Konfiguracja przetworników banjo
      description: Wskazuje, czy banjo posiada wbudowany przetwornik i jaką technologię
        przetwarzania wykorzystuje.
    banjo_rim_material:
      name: Materiał obręczy banjo
      description: Materiał obręczy/korpusu banjo silnie wpływający na brzmienie i
        wagę instrumentu.
    banjo_tone_ring_type:
      name: Typ tone ring banjo
      description: Określa konstrukcję/materiał tone ring wpływający na barwę i głośność.
    banjo_tuning_machine_type:
      name: Typ kluczy stroikowych banjo
      description: Typ mechanizmów strojenia zastosowanych w banjo.
    banknote_authentication_grading:
      name: Uwierzytelnienie/ocena banknotu
      description: Usługa zewnętrzna (jeśli dotyczy), która uwierzytelniła/oceniła
        banknot.
    banknote_grade:
      name: Ocena banknotu
      description: Standaryzowana ocena banknotu według skali kolekcjonerskiej.
    banknote_holder_type:
      name: Typ holdera banknotu
      description: Wskazuje fizyczny stan/przechowywanie banknotu (np. luzem lub w
        holderze gradingowym).
    banknote_material:
      name: Materiał banknotu
      description: Główny materiał/podłoże użyte do produkcji banknotu.
    banknote_security_features:
      name: Zabezpieczenia banknotów
      description: Charakterystyczne cechy zabezpieczeń/wzornictwa obecne na banknocie.
    banknote_serial_number_type:
      name: Typ numeru seryjnego banknotu
      description: Wskazuje, czy numer seryjny jest obecny i/lub posiada szczególne
        cechy kolekcjonerskie (nie sam numer).
    banner_display_location:
      name: Miejsce ekspozycji banera
      description: Określa docelowe miejsce zastosowania banera (np. drzwi, ściana,
        tło stołu).
    banner_hanging_hardware_type:
      name: Typ elementów do zawieszenia banera
      description: Określa główny typ elementów do zawieszania/mocowania wbudowanych
        lub dołączonych do banera (np. oczka, tunel na drążek, lina).
    banner_message_type:
      name: Typ komunikatu na banerze
      description: Wskazuje, czy tekst/komunikat na banerze jest nadrukowany fabrycznie
        (stały) czy pusty/do personalizacji.
    banner_shape:
      name: Kształt banera
      description: Określa ogólny kształt/wykrój banera sportowego dla kibiców.
    banquette_configuration:
      name: Konfiguracja siedziska typu banquette
      description: Ogólny kształt lub orientacja siedziska typu banquette.
    bar_coating:
      name: Powłoka pręta
      description: Określa zewnętrzną jadalną powłokę zastosowaną na batonie, jeśli
        występuje.
    bar_pad_style:
      name: Styl osłony drążka
      description: Styl konstrukcji osłony drążka i pokrowca.
    bar_texture:
      name: Tekstura batona
      description: Opisuje ogólną teksturę lub konsystencję batona.
    barb_type:
      name: Typ zadziora haczyka
      description: Wskazuje, czy haczyk posiada zadzior i jaki jest jego typ.
    barbell_finish:
      name: Wykończenie sztangi
      description: Opisuje ochronne lub estetyczne wykończenie/powłokę zastosowaną
        na gryfie i/lub tulejach, wpływające na odporność na korozję, chwyt i cenę.
    barbell_knurling_pattern:
      name: Wzór radełkowania sztangi
      description: Opisuje styl i agresywność radełkowanego uchwytu sztangi, w tym
        oznaczenia do trójboju siłowego lub podnoszenia ciężarów.
    barista_suitability:
      name: Przydatność dla baristów
      description: Opisuje, czy produkt jest przeznaczony do przygotowywania i spieniania
        kawy.
    barre_rail_configuration:
      name: Konfiguracja drążków barre
      description: Wskazuje liczbę poziomych drążków dołączonych do drążka baletowego.
    barrel_or_cask_type:
      name: Typ beczki lub baryłki
      description: Określa typ beczki lub baryłki używanej do starzenia lub wykańczania
        tequili (np. amerykański dąb, beczka po bourbonie, beczka po sherry).
    barrel_profile:
      name: Profil barrela
      description: Opisuje ogólny kształt lub wyważenie barrela lotki.
    barrel_thread_standard:
      name: Standard gwintu barrela
      description: Określa gwint barrela używany w markerze dla kompatybilności z
        barrelami aftermarketowymi.
    base_anchoring_method:
      name: Metoda kotwiczenia podstawy
      description: Określa sposób mocowania podstawy do podłoża, wskazując przydatność
        do różnych nawierzchni i warunków gry.
    base_ballast_method:
      name: Metoda obciążenia podstawy
      description: Wskazuje, w jaki sposób podstawa treningowa jest obciążana dla
        stabilności (np. wypełnienie wodą, piaskiem).
    base_configuration:
      name: Konfiguracja podstawy
      description: Wskazuje konstrukcję panelowej podstawy.
    base_fill_material:
      name: Materiał wypełnienia podstawy
      description: Określa substancję używaną do wypełnienia lub obciążenia podstawy
        manekina koszykarskiego, wpływającą na stabilność i łatwość montażu.
    base_ingredient:
      name: Składnik bazowy
      description: Określa główny składnik rolniczy, z którego destylowane jest shochu
        lub soju.
    base_oil_type:
      name: Typ oleju bazowego
      description: Określa formulację oleju bazowego płynu przekładniowego (np. w
        pełni syntetyczny, półsyntetyczny, mineralny).
    base_storage_type:
      name: Typ przechowywania podstawy
      description: Określa, czy podstawa zapewnia zintegrowane miejsce do przechowywania
        i jaki mechanizm wykorzystuje.
    baseball_glove_type:
      name: Typ rękawicy baseballowej
      description: Klasyfikuje rękawicę lub mitt według pozycji zawodnika lub przeznaczenia
        funkcjonalnego.
    baseball_softball_league_certification:
      name: Certyfikacja ligi baseballowej/softballowej
      description: Określa organizację lub standardy ligowe spełniane przez produkt.
    baseball_softball_usage_role:
      name: Rola w baseballu/softballu
      description: Określa rolę na boisku lub typ użytkownika, dla którego przeznaczony
        jest ochraniacz nóg (np. catcher, batter, umpire, fielder).
    baseball_toy_set_components_included:
      name: Dołączono elementy zestawu zabawkowego do baseballa
      description: Określa elementy gry baseballowej dołączone do produktu (np. kij,
        piłka, tee, bazy).
    baseplate_construction:
      name: Konstrukcja baseplate’u
      description: Wskazuje metodę produkcji baseplate’u trucka, wpływającą na wytrzymałość
        i wagę.
    basketball_hoop_accessory_type:
      name: Typ akcesorium do obręczy koszykarskiej
      description: Klasyfikuje konkretny typ części lub akcesorium do obręczy koszykarskiej
        do filtrowania i porównywania.
    basketball_padding_location:
      name: Miejsce montażu osłony koszykarskiej
      description: Określa część systemu koszykarskiego przeznaczoną do osłonięcia
        poduszką ochronną.
    basketball_rim_type:
      name: Typ obręczy koszykarskiej
      description: Określa konstrukcyjny lub wydajnościowy typ obręczy koszykarskiej,
        umożliwiając wybór odpowiedniego modelu do poziomu gry i instalacji.
    basketball_toy_features:
      name: Cechy zabawki koszykarskiej
      description: Wyróżnia funkcje użytkowe lub elementy zabawy w zabawkach koszykarskich
        wykraczające poza podstawowe wymiary.
    bass_clarinet_body_material:
      name: Materiał korpusu klarnetu basowego
      description: Główny materiał korpusu klarnetu basowego (bez klap, słupków i
        innych metalowych elementów).
    bass_clarinet_lowest_written_note:
      name: Najniższy zapisany dźwięk klarnetu basowego
      description: Najniższy dźwięk możliwy do zagrania na klarnecie basowym (często
        określany jako niskie E♭, D, C lub rozszerzenie do niskiego B).
    bass_drum_beater_head_shape:
      name: Kształt główki bijaka stopy perkusyjnej
      description: Opisuje geometryczny kształt/profil powierzchni bijaka stopy perkusyjnej
