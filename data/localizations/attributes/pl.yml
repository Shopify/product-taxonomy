    processor_technology:
      name: Technologia procesorowa
      description: Określa technologię procesora typową dla sprzętu audio, np. programowa,
        rurka/zawór
    product_benefits:
      name: Zalety produktu
      description: Opisuje korzyści oferowane przez produkt, zazwyczaj w zakresie
        zdrowia i urody, np. wygładzanie, ujędrnianie
    product_certifications_standards:
      name: Certyfikaty i standardy produktu
      description: Określa certyfikaty lub standardy, które spełnia produkt, np. produkt
