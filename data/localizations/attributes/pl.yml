    control_method:
      name: Metoda sterowania
      description: Określa technikę sterowania elementami automatyki, np. bezpośredni
        moment obrotowy lub skalarny (V/f)
    control_solution_level:
      name: Poziom w roztworze kontrolnym
      description: Wskazuje poziom stężenia glukozy w roztworze kontrolnym
    control_technology:
      name: Technologia sterowania
      description: Określa metodę działania, zazwyczaj w przypadku dekoracji okiennych,
        np. ręczna, silnikowa
    control_type:
      name: Typ sterowania
      description: Określa typ mechanizmu sterującego, np. czujnik lub przycisk
    controller_design:
      name: Projekt sterownika
      description: Określa formę obudów kontrolerów automatyki, np. kompaktowe lub
        montowane w stelażu
    controller_drive_type:
      name: Typ napędu sterownika
      description: Określa rodzaj zasilania używanego w napędach kontroli automatyki,
