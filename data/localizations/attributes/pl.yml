      description: Określa poziom grubości elementów, np. cienki, średni lub gruby
    thinner_application:
      name: Zastosowanie rozcieńczalnika
      description: Określa rodzaj substancji, do której stosowany jest rozcieńczalnik,
        np. farba lub epoksyd
    thread_direction:
      name: Kierunek gwintu
      description: Określa kierunek gwintu na elementach sprzętowych, np. lewoskrętny
