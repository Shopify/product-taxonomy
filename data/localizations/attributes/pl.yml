    compatible_instrument:
      name: Kompatybilny instrument
      description: Określa instrument muzyczny, do którego przeznaczony jest produkt,
        np. gitara lub pianino
    compatible_keyboard_configuration:
      name: Kompatybilna konfiguracja klawiatury
      description: Określa zgodny z produktem układ klawiatury, np. 61-klawiszowy
