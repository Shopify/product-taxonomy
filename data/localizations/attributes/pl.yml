    compatible_play_vehicle_type:
      name: Kompatybilny typ pojazdu do zabawy
      description: Określa rodzaj pojazdu do zabawy, do którego nadaje się produkt,
        np. samochód lub łódź
    compatible_player:
      name: Kompatybilny odtwarzacz
      description: Określa urządzenia, które mogą być używane z adapterem kasetowym,
