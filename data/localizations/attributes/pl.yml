    tampon_absorbency_level:
      name: Poziom chłonności tamponu
      description: Określa chłonność tamponów, np. niska lub wysoka
    tampon_features:
      name: Charakterystyka tamponu
      description: Określa szczególne cechy tamponów, np. komfortowa budowa lub nieprzeciekające
    tan_type:
      name: Typ opalenizny
      description: Określa intensywność koloru i sposób aplikacji produktów do opalania,
