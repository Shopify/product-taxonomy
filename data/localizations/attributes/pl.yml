    product_sterility:
      name: Sterylność produktu
      description: Określa, czy produkt jest sterylny dla zdrowia i bezpieczeństwa
    product_use:
      name: Zastosowanie produktu
      description: Określa podstawowe przeznaczenie lub cel szlachetnych materiałów
