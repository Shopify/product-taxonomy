    pretend_electronics_toy_type:
      name: Rodzaj imitacji urządzeń elektronicznych do zabawy
      description: Określa kategorię imitacji urządzeń elektronicznych, np. aparat
        fotograficzny, telefon komórkowy
    pretend_housekeeping_toy_type:
      name: Rodzaj zabawek do sprzątania
      description: Określa rodzaj zabawki do sprzątania, np. zestaw do sprzątania
