    prescription_status:
      name: Dostępność na receptę
      description: Wskazuje, czy krople do uszu są dostępne bez recepty, czy wymagają
        recepty od pracownika służby zdrowia.
    presentation_supply_features:
      name: Charakterystyka sprzętu do prezentacji
      description: Określa unikatowe cechy sprzętu do prezentacji, np. regulowana
        wysokość lub powierzchnia ścieralna
    preservation_type:
      name: Typ zabezpieczenia
      description: Określa metodę stosowaną do przechowywania próbek laboratoryjnych,
