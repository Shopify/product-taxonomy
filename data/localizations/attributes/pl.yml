    keyboard_assembly_type:
      name: Typ zespołu klawiatury
      description: Definiuje dostarczony zespół fizyczny (np. samodzielna klawiatura,
        podpórka pod dłonie z klawiaturą, pojedynczy zestaw klawiszy).
    keyboard_backlight_type:
      name: Typ podświetlenia klawiatury
      description: Określa technologię lub styl podświetlenia klawiszy lub obudowy
        klawiatury.
    keyboard_format:
      name: Format klawiatury
      description: Określa rozmiar i układ klawiatury, np. pełnowymiarowa lub kompaktowa
    keyboard_key_type:
      name: Rodzaj klawisza
      description: Określa reakcję lub odczucie klawiszy na klawiaturach muzycznych,
        np. ważona, częściowo ważona
    keyboard_language:
      name: Język klawiatury
      description: Określa układ językowy klawiatury, np. ENG (angielski) lub DEU
