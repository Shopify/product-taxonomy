    racket_gauge:
      name: Skrajnia rakiety
      description: Określa grubość naciągu rakiety tenisowej, np. 16
    racket_head_shape:
      name: Kształt główki rakiety
      description: Określa kształt główki rakiety, np. owalny lub izometryczny
    racket_material:
      name: Materiał rakiety
      description: Określa rodzaj materiału, z którego wykonana jest rakieta sportowa,
        np. drewno lub włókno węglowe
    racket_string_design:
      name: Konstrukcja naciągu do rakiet
      description: Określa konstrukcję naciągu w rakietach tenisowych, np. monofilament
