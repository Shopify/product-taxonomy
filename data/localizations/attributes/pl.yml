    satellite_messaging_capability:
      name: Możliwość przesyłania wiadomości satelitarnych
      description: Wskazuje, czy produkt obsługuje jednostronne (tylko wychodzące)
        czy dwustronne (wysyłanie i odbieranie) przesyłanie wiadomości satelitarnych
    satellite_navigation_systems_supported:
      name: Obsługiwane systemy nawigacji satelitarnej
      description: Określa, które globalne systemy nawigacji satelitarnej (GNSS) telefon
        może obsługiwać w celu ustalania położenia i śledzenia.
    satellite_network_type:
      name: Typ sieci satelitarnej
      description: Określa dostawcę usług dla telefonów satelitarnych, np. Inmarsat,
