      description: Menunjukkan bahan non-susu utama yang digunakan untuk membuat alternatif
        keju.
    primary_plant_protein_source:
      name: Sumber protein nabati utama
      description: Mengidentifikasi bahan nabati utama yang menyediakan protein dalam
        produk tersebut.
    primary_sweetener_source:
      name: Sumber pemanis utama
      description: Mengidentifikasi tanaman atau bahan baku dari mana sirup tersebut
        berasal.
    print_placement:
      name: Penempatan cetakan
      description: Menunjukkan letak grafik/logo utama pada kaos.
    print_technique:
      name: Teknik cetak
      description: Menentukan metode dekorasi/pencetakan yang digunakan di grafis
        kaos.
    printable_canvas_intended_use:
      name: Kanvas yang dapat dicetak, tujuan penggunaan
      description: Aplikasi utama yang dioptimalkan untuk kanvas yang dapat dicetak.
    printable_fabric_format:
      name: Format kain yang dapat dicetak
      description: Menentukan cara pemasokan kain katun yang dapat dicetak (lembaran
        tunggal vs gulungan kontinu), yang memengaruhi cara pengumpanan printer dan
        alur kerja proyek.
    prism_material:
      name: Bahan prisma
      description: Menentukan bahan dari elemen optik itu sendiri (prisma), yang memengaruhi
        kejernihan, daya tahan, dan ketahanan terhadap goresan.
    prisoner_transport_configuration:
      name: Konfigurasi transportasi tahanan
      description: Menentukan apakah dan bagaimana van dikonfigurasi untuk transportasi
        tahanan/narapidana.
    prisoner_transport_partition_type:
      name: Jenis partisi pengangkutan tahanan
      description: Jenis partisi/sangkar interior yang memisahkan kompartemen depan
        dan belakang.
    privacy_or_acoustic_feature:
      name: Fitur privasi atau akustik
      description: Menentukan elemen privasi atau akustik bawaan seperti panel pembatas,
        layar akustik, atau penutup penuh.
    processing_state:
      name: Tahap pemrosesan
      description: Apakah bulu-bulu terkait sudah disterilkan/dicuci atau dipersiapkan
        untuk digunakan dalam kerajinan.
    produce_grade:
      name: Kelas produk
      description: Mengklasifikasikan tingkat kualitas yang diberikan pada buah kiwi
        berdasarkan ukuran, tampilan, dan kondisinya.
    produce_growth_stage:
      name: Tahap pertumbuhan produk
      description: Menentukan tahap pertumbuhan produk saat dijual (misalnya, microgreen,
        baby leaf, mature leaf, live plant, seed).
    produce_washing_state:
      name: Kondisi pencucian produk
      description: Menunjukkan apakah sayuran sudah dicuci dan siap dimakan.
    profile_shape:
      name: Profil/bentuk
      description: Kelengkungan/profil keseluruhan simbal (seberapa landai lengkungan
        dari tepi luar ke bagian tengah).
    projectile_ammunition_type:
      name: Jenis proyektil/amunisi
      description: Menentukan jenis proyektil atau bahan habis pakai yang digunakan
        oleh senjata mainan, jika ada.
    projectile_finish:
      name: Hasil akhir proyektil
      description: Menentukan lapisan permukaan apa pun yang diterapkan pada BB, yang
        membantu ketahanan terhadap korosi atau visibilitas (misalnya, dilapisi tembaga,
        dilapisi seng, dicat).
    projectile_type:
      name: Jenis proyektil
      description: Mengidentifikasi jenis proyektil yang digunakan atau ditujukan
        untuk produk tersebut.
    pronation_support:
      name: Dukungan pronasi
      description: Menunjukkan jenis gaya berjalan atau pola pronasi yang dirancang
        untuk diakomodasi oleh sepatu sneaker.
    propellant_type:
      name: Jenis propelan
      description: Menentukan jenis propelan yang dirancang untuk digunakan oleh komponen
        atau aksesori tersebut.
    propeller_blade_cup:
      name: Cup bilah baling-baling
      description: Menunjukkan jumlah lekukan (kerutan tepi belakang) pada mata pisau.
    propeller_hub_type:
      name: Jenis hub baling-baling
      description: Menentukan sistem hub/bushing yang digunakan oleh baling-baling
        (kit hub yang dapat diganti vs yang dipasang dengan cara ditekan).
    propeller_rotation:
      name: Rotasi baling-baling
      description: Menentukan arah rotasi baling-baling.
    protectant_formula_base:
      name: Basis formula pelindung
      description: Menentukan formulasi dasar pelindung, yang memengaruhi kilau, tekstur,
        dan pembersihan (misalnya, berbasis air vs berbasis pelarut).
    protection_coverage_area:
      name: Area cakupan perlindungan
      description: Mengidentifikasi bagian-bagian jam tangan mana yang dilindungi
        oleh aksesori pelindung tersebut.
    protection_level:
      name: Tingkat perlindungan
      description: Menunjukkan tingkat perlindungan yang dimaksudkan dari casing untuk
        pengangkutan dan penyimpanan instrumen.
    protective_case_interior_protection_type:
      name: Jenis perlindungan interior casing pelindung
      description: Menjelaskan metode perlindungan interior utama yang digunakan untuk
        mengamankan dan melindungi isi di dalamnya.
    protective_case_shell_type:
      name: Jenis cangkang pelindung
      description: Mengidentifikasi gaya konstruksi keseluruhan bagian luar casing
        (kekakuan) yang memengaruhi perlindungan terhadap benturan dan portabilitas.
    protective_contact_padding_material:
      name: Bahan bantalan kontak pelindung
      description: Bahan yang digunakan pada titik kontak instrumen (penyisipan yoke/bell)
        untuk mencegah goresan (misalnya kain felt, karet).
    protective_cup_configuration:
      name: Konfigurasi cangkir pelindung
      description: Menentukan apakah cup pelindung disertakan, dapat dilepas, atau
        pakaian tersebut hanya memiliki kantong untuk menampung cup.
    protective_eyewear_standard_compliance:
      name: Kepatuhan terhadap standar kacamata pelindung
      description: Menentukan standar atau sertifikasi keselamatan atau ketahanan
        benturan yang dipenuhi atau dilampaui oleh kacamata tersebut untuk penggunaan
        olahraga.
    protective_gear_certification_standard:
      name: Standar sertifikasi perlengkapan pelindung
      description: 'Menunjukkan standar keselamatan/sertifikasi yang dipatuhi oleh
        perlengkapan tersebut (bervariasi tergantung jenis barang: standar helm, standar
        pakaian, standar pelindung benturan).'
    protective_gear_items_included:
      name: Perlengkapan pelindung termasuk di dalamnya
      description: Mencantumkan bagian-bagian individual yang termasuk dalam set perlengkapan
        pelindung beberapa bagian.
    protective_gear_padding_type:
      name: Jenis bantalan perlengkapan pelindung
      description: Menentukan jenis bantalan yang digunakan dalam perlengkapan pelindung
        untuk perlindungan terhadap benturan.
    protective_gear_safety_certifications:
      name: Sertifikasi keselamatan alat pelindung diri
      description: Mencantumkan standar keselamatan atau performa khusus olahraga
        yang dipatuhi produk, seperti standar helm hoki lapangan NOCSAE atau ASTM.
    protective_pad_components_included:
      name: Komponen bantalan pelindung yang disertakan
      description: Menentukan item pelindung spesifik apa saja yang termasuk dalam
        set beberapa bagian sehingga pembeli tahu bagian tubuh mana yang terlindungi.
    protective_shorts_intended_use:
      name: Celana pendek pelindung yang dimaksudkan untuk digunakan
      description: Disiplin berkuda/balapan utama yang menjadi fokus desain celana
        pelindung.
    protective_shorts_padding_type:
      name: Jenis bantalan celana pendek pelindung
      description: Menentukan konstruksi/format elemen pelindung yang digunakan untuk
        celana pelindung.
    protective_shorts_padding_zones:
      name: Zona bantalan celana pendek pelindung
      description: Mengidentifikasi area tubuh mana yang memiliki bantalan/pelindung
        terintegrasi pada celana pendek pelindung.
    protective_treatment:
      name: Perawatan pelindung
      description: Menentukan lapisan pelindung atau perawatan apa pun yang diterapkan
        untuk ketahanan terhadap noda, air, atau sinar UV (misalnya, Teflon).
    protector_coverage_area:
      name: Area cakupan pelindung
      description: Menentukan area tubuh mana yang dirancang untuk ditutupi oleh pelindung
        (misalnya, dada, punggung, samping).
    puck_bottom_style:
      name: Gaya dasar keping hoki
      description: Menggambarkan profil bagian bawah keping hoki, yang memengaruhi
        kecepatan dan kontrol pada permukaan papan shuffleboard yang berbeda.
    puck_type:
      name: Jenis keping hoki
      description: Mengklasifikasikan gaya fungsional atau tujuan penggunaan keping
        hoki, mulai dari permainan resmi hingga suvenir koleksi.
    pull_buoy_style:
      name: Gaya pull buoy
      description: Menunjukkan gaya fungsional atau konfigurasi pull buoy, seperti
        standar, pergelangan kaki, atau kombinasi pullkick.
    pull_through_weight_material:
      name: Bahan pemberat tarik
      description: Untuk swab tarik-melalui, identifikasi bahan pemberat yang digunakan
        untuk memandu swab melalui instrumen.
    pulp_content:
      name: Kandungan pulp
      description: Menunjukkan jumlah serat buah atau sayuran yang terdapat dalam
        minuman.
    pump_accessories_included:
      name: Termasuk aksesori pompa
      description: Mencantumkan barang tambahan yang disertakan bersama pompa bola
        agar pembeli dapat memahami isi paket.
    pumping_compatibility:
      name: Kompatibilitas pemompaan
      description: Menunjukkan apakah bra menyusui dirancang untuk mendukung proses
        memompa ASI tanpa menggunakan tangan serta untuk menyusui.
    punch_pad_type:
      name: Jenis bantalan berlubang
      description: Menentukan desain atau gaya bantalan tinju/latihan sehingga pembeli
        dapat memilih bantalan yang tepat untuk kebutuhan latihan mereka.
    punching_training_bag_shape:
      name: Bentuk samsak tinju/latihan
      description: Menentukan gaya geometris dari samsak tinju, membantu pembeli memilih
        model yang sesuai dengan latihan pukulan tertentu (misalnya, pukulan uppercut,
        pukulan ke badan).
    puncture_protection_technology:
      name: Teknologi perlindungan terhadap tusukan
      description: Mencantumkan lapisan anti bocor eksklusif atau generik, atau teknologi
        penguatan dinding samping/casing yang terdapat pada ban (misalnya EXO, SnakeSkin,
        Kevlar belt).
    puppet_features:
      name: Fitur boneka
      description: Menyoroti fitur fungsional atau performa boneka (misalnya, mulut
        yang dapat digerakkan, efek suara, dapat dibalik).
    puppet_puppet_theater_accessory_type:
      name: Jenis aksesori boneka & teater boneka
      description: Menentukan jenis aksesori produk tersebut (misalnya, properti panggung,
        kostum boneka, tuas kontrol, tali pengganti).
    purity_unit:
      name: Satuan kemurnian
      description: Menjelaskan bagaimana kemurnian koin dinyatakan (kemurnian vs karat).
    push_up_bar_design:
      name: Desain palang push-up
      description: Menunjukkan gaya desain fungsional dari palang push-up (misalnya,
        statis, dapat diputar, berbentuk paralel).
    pushrod_end_type:
      name: Tipe ujung batang dorong
      description: Menentukan gaya ujung/sambungan batang pendorong yang digunakan
        pada antarmuka pedal atau silinder utama.
    putty_glow_activation_method:
      name: Metode aktivasi cahaya putty
      description: Menjelaskan bagaimana putty diisi/diaktifkan agar berpendar (misalnya
        menggunakan sinar matahari, UV/blacklight).
    putty_glow_color:
      name: Warna cahaya putty
      description: Mengidentifikasi warna yang dipancarkan oleh putty saat bersinar
        dalam gelap.
    putty_inclusions:
      name: Inklusi putty
      description: Bahan tambahan yang dicampurkan dalam putty (misalnya gliter, konfeti,
        manik-manik busa).
    putty_texture:
      name: Tekstur dempul
      description: Perilaku penanganan utama dari dempul (misalnya, kenyal, elastis,
        seperti cairan).
    puzzle_accessory_features:
      name: Fitur aksesori puzzle
      description: Fitur fungsional dan elemen desain aksesori permainan menyusun
        gambar (bervariasi sesuai jenis aksesori).
    pyrometric_cone_range:
      name: Rentang pyrometric cone
      description: Pyrometric cone yang direkomendasikan untuk formulasi pembakaran
        glasir (misalnya Cone 06–04, Cone 5–6).
    quarter_panel_coverage_type:
      name: Jenis cakupan panel seperempat
      description: Menentukan seberapa besar area panel seperempat bagian yang diganti/diperbaiki
        oleh produk.
    quarter_panel_set_contents:
      name: Isi set panel seperempat
      description: Menentukan konfigurasi bundel panel seperempat yang termasuk dalam
        daftar (satu sisi, sepasang, atau dengan bagian perbaikan tambahan).
    quilting_ruler_markings:
      name: Tanda pada penggaris quilting
      description: Menentukan jenis tanda cetak pada penggaris quilting yang digunakan
        untuk memotong/menyelaraskan.
    quilting_ruler_non_slip_feature:
      name: Penggaris jahit dengan fitur anti selip
      description: Menunjukkan apakah penggaris memiliki lapisan/permukaan anti selip
        untuk mengurangi pergeseran di atas kain.
    quilting_ruler_transparency:
      name: Transparansi penggaris quilting
      description: Menunjukkan tingkat transparansi/visibilitas bahan penggaris untuk
        melihat kain dan tanda di bawahnya.
    quilting_thread_usage:
      name: Penggunaan benang jahit
      description: Menunjukkan aplikasi menjahit yang dimaksudkan untuk benang tersebut
        (bagaimana benang tersebut seharusnya digunakan).
    quilting_thread_weight_system:
      name: Sistem berat benang jahit
      description: Menentukan sistem peringkat ukuran/berat ulir yang digunakan untuk
        menyatakan ketebalan ulir (misalnya, wt, Tex, Denier), sehingga ukuran numerik
        dapat diinterpretasikan dengan benar.
    quince_variety:
      name: Varietas quince
      description: Mengidentifikasi kultivar atau varietas spesifik dari quince, karena
        rasa, aroma, dan kesesuaian kuliner dapat berbeda-beda tergantung varietasnya.
    quinoa_variety:
      name: Varietas kinoa
      description: Mengidentifikasi warna atau varietas quinoa tertentu, karena varietas
        yang berbeda memiliki rasa, tekstur, dan waktu memasak yang berbeda.
    quinto_tuning_system:
      name: Sistem penyeteman quinto
      description: Cara penyetelan/penegangan quinto.
    race_car_class:
      name: Kelas mobil balap
      description: Kelas/kategori kompetisi yang menjadi tujuan pembuatan mobil (aturan/pengelompokan
        homologasi).
    racing_balaclava_face_opening_style:
      name: Balaclava balap dengan gaya bukaan wajah
      description: Konfigurasi bukaan wajah pada balaclava, yang memengaruhi kesesuaian,
        penyegelan, dan kenyamanan helm.
    racing_balaclava_neck_coverage_length:
      name: Balaclava balap dengan panjang penutup leher
      description: Panjang kain pelindung leher dirancang untuk dimasukkan ke dalam
        pakaian/penahan leher demi penyegelan dan perlindungan.
    racing_balaclava_ventilation_zones:
      name: Zona ventilasi balaclava balap
      description: Penempatan zona berlubang/berpori atau berventilasi yang dirancang
        untuk meningkatkan aliran udara di bawah helm.
    racing_chest_guard_intended_use:
      name: Tujuan penggunaan pelindung dada balap
      description: Disiplin atau konteks olahraga motor utama yang menjadi fokus desain
        pelindung dada ini.
    racing_chest_guard_size_type:
      name: Jenis ukuran pelindung dada balap
      description: 'Mengidentifikasi kategori ukuran produk: anak, dewasa, atau universal/dapat
        disesuaikan.'
    racing_glove_certification_standard:
      name: Standar sertifikasi sarung tangan
      description: Menentukan sertifikasi/standar keselamatan yang dipatuhi oleh sarung
        tangan balap (misalnya FIA, SFI, CE) dan opsional peringkat/rating jika berlaku.
    racing_goggles_lens_system:
      name: Sistem lensa kacamata balap
      description: Menentukan sistem kesiapan penggantian/pelepasan lensa yang didukung
        oleh kacamata pelindung tersebut.
    racing_helmet_certification_standard:
      name: Standar sertifikasi helm balap
      description: Sertifikasi keselamatan yang dipenuhi oleh helm balap tersebut.
    racing_kart_brake_type:
      name: Jenis rem kart balap
      description: Jenis sistem pengereman utama yang dipasang pada gokar.
    racing_kart_class:
      name: Kelas balap kart
      description: Kelas kompetisi atau aturan yang harus dipatuhi oleh gokar.
    racing_kart_frame_material:
      name: Bahan rangka gokart balap
      description: Material rangka/sasis utama gokar.
    racing_kart_seat_size:
      name: Ukuran jok gokart
      description: Penunjukan ukuran jok gokar yang digunakan untuk pemasangan.
    racing_neck_support_style:
      name: Gaya penyangga leher balap
      description: Gaya struktural penyangga/penahan leher balap dan bagaimana penyangga
        tersebut berinteraksi dengan tubuh/helm pengendara.
    racing_suit_certification_standard:
      name: Standar sertifikasi pakaian balap
      description: Menentukan sertifikasi/homologasi keselamatan balap yang dipenuhi
        oleh pakaian balap tersebut (misalnya, standar FIA atau SFI).
    racing_suit_cuff_design:
      name: Desain manset baju balap
      description: Jenis manset pergelangan kaki/tangan yang digunakan sebagai penghubung
        dengan sarung tangan/sepatu bot dan meningkatkan penyegelan/kenyamanan.
    racing_suit_size_system:
      name: Sistem ukuran baju balap
      description: Sistem ukuran yang digunakan untuk setelan (misalnya Alpha S-XXL,
        UE/AS Numerik, Anak).
    racing_truck_discipline:
      name: Kategori balap truk
      description: Menentukan kategori/format balap utama yang dirancang untuk diikuti
        oleh truk tersebut.
    rack_side_configuration:
      name: Konfigurasi sisi rak
      description: Menunjukkan apakah rak menyimpan tikar di satu sisi atau kedua
        sisi, yang memengaruhi efisiensi ruang dan akses.
    rack_system_configuration:
      name: Konfigurasi sistem rak
      description: Menjelaskan tata letak/bentuk rak secara keseluruhan dari sistem
        rak drum.
    racket_dampener_type:
      name: Jenis peredam raket
      description: Menentukan mekanisme pemasangan atau gaya fungsional peredam getaran
        raket.
    racket_grip_size:
      name: Ukuran pegangan raket
      description: Menentukan klasifikasi ukuran gagang raket berdasarkan lingkarnya
        (misalnya G1–G6) untuk memastikan kesesuaian dan kenyamanan tangan yang tepat.
    racket_sport_shoe_court_surface:
      name: Raket olahraga sepatu lapangan permukaan
      description: Menentukan permukaan lapangan tenis yang menjadi dasar desain atau
        pengoptimalan sepatu, membantu pemain memilih alas kaki dengan pola sol luar
        dan komposisi karet yang tepat untuk permukaan lapangan yang biasa digunakan.
    racket_string_pattern:
      name: Pola senar raket
      description: Menentukan jumlah senar utama dan senar silang pada bidang senar
        (misalnya 16 x 18), yang memengaruhi kontrol, putaran, dan daya tahan.
    racket_stringing_status:
      name: Status pemasangan senar raket
      description: Menunjukkan apakah raket dijual dalam keadaan senar sudah terpasang
        sesuai permintaan, belum terpasang, atau menggunakan senar dari pabrik.
    racket_weight_class:
      name: Kelas berat raket
      description: Menyediakan kategori berat standar bulu tangkis "U", sehingga memungkinkan
        pemain memilih raket sesuai preferensi rentang massa.
    racquet_toy_set_equipment_included:
      name: Perlengkapan set mainan raket disertakan
      description: Mencantumkan item apa saja yang termasuk dalam mainan atau set
        tersebut (misalnya, jaring, bola, dayung/raket).
    racquetball_squash_training_aid_type:
      name: Jenis alat bantu latihan racquetball & squash
      description: Mengklasifikasikan jenis alat bantu atau aksesori pelatihan tertentu
        sehingga pembeli dapat dengan cepat menemukan barang yang mereka butuhkan.
    radiator_cap_gasket_material:
      name: Bahan gasket tutup radiator
      description: Bahan dari gasket penyegel yang digunakan pada tutup radiator.
    radiator_cap_pressure_relief_style:
      name: Gaya pelepas tekanan tutup radiator
      description: Menentukan gaya pelepasan tekanan/ventilasi/aktuasi tutup radiator,
        yang dapat memengaruhi penanganan, keselamatan, dan tujuan penggunaan.
    radiator_expansion_tank_cap_application:
      name: Aplikasi tutup radiator/tangki ekspansi
      description: Menunjukkan apakah tutup tersebut ditujukan untuk leher pengisi
        radiator atau untuk tangki ekspansi/luapan cairan pendingin.
    radiator_fan_control_type:
      name: Jenis kontrol kipas radiator
      description: Menentukan cara kipas radiator dikendalikan/dipicu.
    radiator_fan_mounting_pattern:
      name: Pola pemasangan kipas radiator
      description: Menentukan gaya/pola pemasangan yang digunakan untuk memasang kipas
        atau rakitan kipas.
    radiator_fan_type:
      name: Jenis kipas radiator
      description: Menentukan tipe/konfigurasi fungsional dari rakitan kipas radiator.
    radiator_hose_end_type:
      name: Jenis ujung selang radiator
      description: Menentukan gaya sambungan/penyegelan utama yang digunakan pada
        ujung selang radiator untuk terhubung dengan port radiator/mesin.
    radiator_hose_position:
      name: Posisi selang radiator
      description: Posisi/tipe fungsional selang radiator dalam sistem pendingin.
    radiator_hose_shape:
      name: Bentuk selang radiator
      description: Geometri/faktor bentuk selang secara keseluruhan digunakan untuk
        penentuan rute pemasangan dan penyesuaian.
    radiator_overflow_tank_level_sensor_provision:
      name: Penyediaan sensor level tangki luapan radiator
      description: Menunjukkan apakah tangki tersebut menyertakan atau mendukung sensor
        level cairan pendingin.
    radiator_overflow_tank_shape:
      name: Bentuk tangki overflow radiator
      description: Bentuk keseluruhan badan tangki luapan.
    radish_variety:
      name: Varietas lobak
      description: Menentukan kultivar atau jenis lobak sehingga pembeli dapat memilih
        karakteristik rasa, warna, atau ukuran tertentu (misalnya, Daikon, Semangka,
        French Breakfast).
    radius_of_hollow:
      name: Radius cekungan
      description: Menentukan profil cekungan pisau yang dihasilkan oleh alat pengasah,
        yang dinyatakan dalam ukuran khusus umum atau datar.
    rail_coverage_configuration:
      name: Konfigurasi cakupan rel
      description: Menunjukkan bagian boks bayi yang dilindungi oleh set penutup,
        yang menjelaskan apakah pembelian berupa panel depan tunggal atau set penutup
        keliling yang terdiri dari beberapa bagian.
    rail_mount_standard:
      name: Standar pemasangan rel
      description: Mengidentifikasi standar rel atau antarmuka pemasangan yang digunakan
        untuk memasang aksesori (misalnya bidikan, senter) pada senapan angin/BB gun.
    rail_side:
      name: Sisi rel
      description: Menunjukkan apakah rel pengganti digunakan untuk sisi kiri, sisi
        kanan, atau dijual berpasangan.
    rail_style:
      name: Gaya rel
      description: Mengkategorikan desain atau konfigurasi keseluruhan rel (misalnya,
        A-frame, pelangi, bengkok), yang menentukan kemungkinan trik dan ruang yang
        dibutuhkan.
    rail_system:
      name: Sistem kereta api
      description: Mengidentifikasi antarmuka pemasangan aksesori yang ada pada senjata
        (misalnya Picatinny, M-LOK).
    rain_sensor_technology:
      name: Teknologi sensor hujan
      description: Prinsip penginderaan yang digunakan untuk mendeteksi air pada kaca
        depan.
    rain_suit_configuration:
      name: Konfigurasi jas hujan
      description: Mengidentifikasi apakah produk berupa pakaian terusan satu bagian,
        setelan multi bagian, atau konfigurasi lainnya.
    rainstick_construction_type:
      name: Jenis konstruksi tongkat hujan
      description: Menjelaskan cara pembuatan rainstick (tabung kaktus/kayu tradisional
        vs alternatif modern).
    rainstick_fill_material:
      name: Bahan pengisi rainstick
      description: Menentukan isi internal yang digunakan untuk menghasilkan suara
        berderai (misalnya biji, manik-manik).
    rainstick_playing_technique:
      name: Teknik memainkan rainstick
      description: Menunjukkan teknik bermain atau gaya penanganan yang direkomendasikan
        untuk menghasilkan efek yang diinginkan pada rainstick.
    rainstick_sound_character:
      name: Karakter suara rainstick
      description: Menggambarkan karakter suara keseluruhan yang dihasilkan oleh rainstick.
    raising_method:
      name: Metode pengangkatan
      description: Menjelaskan bagaimana hewan dibesarkan dan dipelihara hingga siap
        diproses (misalnya diberi makan rumput, dipelihara di padang rumput, diberi
        makan biji-bijian).
    rally_competition_class:
      name: Kelas kompetisi reli
      description: Badan penyelenggara atau aturan kelas reli yang menjadi acuan pembuatan
        mobil reli (jika diketahui).
    rally_surface_setup:
      name: Pengaturan permukaan reli
      description: Permukaan/medan utama tempat mobil reli diatur atau dibangun untuk
        mencapai target.
    ramp_surface_texture:
      name: Tekstur permukaan ramp
      description: Menjelaskan tingkat kehalusan atau daya cengkeram permukaan lintasan
        ramp.
    ratchet_mounting_style:
      name: Gaya pemasangan ratchet
      description: Menjelaskan cara memegang atau memasang ratchet musik selama bermain
        atau disiapkan.
    rattle_element_material:
      name: Bahan elemen bergetar
      description: Bahan dari elemen yang berderak (misalnya gigi/lonceng/manik-manik)
        yang menghasilkan suara dengung/berderak yang khas.
    rattle_type:
      name: Jenis gemerincing
      description: Menunjukkan apakah umpan mengeluarkan bunyi berderak internal atau
        memiliki ruang suara dan, jika ada, jenis bunyi berderak yang digunakan.
    rc_airship_lifting_gas_type:
      name: Pesawat udara RC tipe pengangkat gas
      description: Menunjukkan jenis gas yang akan digunakan untuk mengisi selubung
        pesawat udara/balon udara (jika ada).
    rc_helicopter_control_frequency:
      name: Frekuensi kontrol helikopter RC
      description: Pita frekuensi radio yang digunakan antara pengendali dan helikopter,
        yang memengaruhi ketahanan terhadap interferensi dan kompatibilitas (misalnya,
        2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Fitur stabilisasi helikopter RC
      description: Mencantumkan fitur-fitur bantuan stabilitas/kontrol yang mempermudah
        penerbangan atau menambah kemampuan.
    rc_motorcycle_controller_type:
      name: Jenis pengendali motor RC
      description: Faktor bentuk pengontrol yang disertakan.
    rc_plane_takeoff_launch_method:
      name: Metode lepas landas/peluncuran pesawat RC
      description: Menjelaskan cara pesawat biasanya diluncurkan/lepas landas, yang
        memengaruhi lokasi dan cara penggunaannya.
    rc_vehicle_controller_type:
      name: Jenis pengontrol kendaraan RC
      description: Menentukan faktor bentuk pengontrol yang digunakan untuk mengoperasikan
        kendaraan RC.
    rc_vehicle_scale:
      name: Skala kendaraan RC
      description: Menentukan rasio skala (kelas ukuran) mobil/truk kendali jarak
        jauh (misalnya 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Jenis medan kendaraan RC
      description: Menunjukkan medan utama yang dirancang untuk mobil/truk kendali
        jarak jauh tersebut.
    reach_adjustment_type:
      name: Jenis penyesuaian jangkauan
      description: Menunjukkan apakah jarak antara bilah tuas dan setang dapat disesuaikan
        dan, jika dapat disesuaikan, apakah penyesuaian tersebut tanpa alat atau memerlukan
        alat.
    rear_axle_spacing:
      name: Jarak poros belakang
      description: Ukuran dropout/as roda belakang yang dirancang untuk diterima oleh
        rangka, memengaruhi kompatibilitas roda.
    rear_axle_standard:
      name: Standar poros belakang
      description: Menentukan antarmuka/format poros yang digunakan oleh roda belakang
        (misalnya pelepasan cepat, berbagai ukuran thru-axle).
    rear_axle_type:
      name: Tipe gandar belakang
      description: Menentukan sistem pengencang dan diameter poros yang digunakan
        untuk mengamankan roda belakang ke rangka.
    rear_coverage:
      name: Cakupan belakang
      description: Menentukan seberapa banyak bagian bokong yang ditutupi oleh celana
        bikini (misalnya tertutup sebagian, tertutup penuh).
    rear_opening_type:
      name: Jenis bukaan belakang
      description: Menjelaskan gaya akses belakang atau fitur 'bukaan belakang' untuk
        akses praktis kamar mandi yang nyaman, seperti bagian yang bisa dilipat atau
        ritsleting belakang penuh.
    rear_seat_configuration:
      name: Konfigurasi kursi belakang
      description: Menentukan konfigurasi susunan jok belakang untuk mendukung pemasangan
        dan pemilihan tata letak interior.
    rear_view_mirror_ornament_attachment_type:
      name: Jenis pemasangan ornamen kaca spion belakang
      description: Menentukan cara ornamen dipasang pada batang atau wadah kaca spion
        (misalnya simpul tali, klip, pengait).
    rearview_mirror_mount_attachment_type:
      name: Jenis pemasangan cermin spion
      description: Menentukan bagaimana dudukan terpasang secara fisik di rakitan
        kaca spion (badan atau tangkai kaca), seperti penjepit, klip, tali, bantalan
        perekat, atau braket baut.
    rebound_board_face_type:
      name: Jenis permukaan papan pantul
      description: Menjelaskan konfigurasi permukaan yang menentukan perilaku pantulan,
        seperti desain datar, miring, atau multi permukaan.
    rebound_level:
      name: Tingkat pantulan
      description: Menunjukkan seberapa banyak bola memantul kembali setelah benturan,
        yang membantu pengguna memilih antara desain tanpa pantulan dan pantulan sedang.
    rebound_surface_configuration:
      name: Konfigurasi permukaan pantul
      description: Menentukan tata letak permukaan pantulan dan perkiraan pantulan
        (satu sisi, dua sisi, atau multi sisi; dapat diprediksi vs. tidak dapat diprediksi).
    rebounder_design:
      name: Desain rebounder
      description: Menentukan gaya struktural atau konfigurasi permukaan pantul produk.
    rebounder_design_type:
      name: Jenis desain rebounder
      description: Menentukan mekanisme pantulan utama atau gaya konstruksi alat latihan
        (misalnya, alas tali elastis, jaring berbingkai, target yang muncul tiba-tiba).
    rebounder_sides:
      name: Sisi pemantul
      description: Menunjukkan apakah rebounder dapat mengembalikan bola dari satu
        sisi atau kedua sisi.
    rebounding_mechanism_type:
      name: Jenis mekanisme pantulan
      description: Menentukan teknologi yang digunakan untuk mengembalikan keping
        hoki atau bola (misalnya, bumper karet, tali elastis).
    recipient_relationship:
      name: Hubungan penerima
      description: Hubungan penerima yang dituju (misalnya Ibu, Ayah, Teman) untuk
        kartu ucapan.
    recliner_control_type:
      name: Jenis kontrol kursi sandaran
      description: Menentukan cara pengoperasian mekanisme sandaran (misalnya, tuas
        manual, panel tombol elektrik, remote).
    recliner_motion_type:
      name: Jenis gerakan sandaran
      description: Menentukan kemampuan gerakan utama kursi malas (misalnya, goyang,
        meluncur, putar, menempel dinding, angkat).
    reclining_mechanism:
      name: Mekanisme sandaran
      description: Menentukan mekanisme yang digunakan untuk mengoperasikan fungsi
        sandaran sofa.
    recommended_candle_format:
      name: Format lilin yang direkomendasikan
      description: Menunjukkan format lilin yang direkomendasikan untuk tab sumbu
        berperekat ini.
    recommended_container_type:
      name: Jenis wadah yang direkomendasikan
      description: Bahan wadah yang direkomendasikan/aman untuk lilin gel wax.
    recommended_fabric_type:
      name: Jenis kain yang direkomendasikan
      description: Kain yang direkomendasikan untuk hasil terbaik dengan pola jahitan.
    recommended_fabric_weight:
      name: Berat kain yang direkomendasikan
      description: Menunjukkan kategori berat kain yang direkomendasikan untuk pola
        tersebut.
    recommended_food_pairing:
      name: Paduan makanan yang direkomendasikan
      description: Mengidentifikasi protein utama atau hidangan yang ditujukan untuk
        saus (misalnya ayam, babi, sapi, ikan, sayuran).
    recommended_lane_condition:
      name: Kondisi lintasan yang direkomendasikan
      description: Menunjukkan pola oli atau kondisi lintasan yang menjadi target
        desain bola tersebut.
    recommended_motor_impulse_class:
      name: Kelas impulse motor yang direkomendasikan
      description: Menentukan kelas impuls total motor roket model yang direkomendasikan
        untuk penerbangan yang aman/optimal.
    recommended_reading_level:
      name: Tingkat bacaan yang direkomendasikan
      description: Menunjukkan tingkat/kemampuan membaca yang direkomendasikan untuk
        produk tersebut, untuk membantu pembeli mencocokkannya dengan perkembangan
        membaca anak saat ini.
    recommended_sleep_position:
      name: Posisi tidur yang direkomendasikan
      description: Menunjukkan posisi tidur yang dirancang agar nyaman ditopang oleh
        kasur (misalnya tidur miring atau telentang).
    recommended_storage:
      name: Penyimpanan yang direkomendasikan
      description: Menunjukkan cara penyimpanan produk agar tetap segar.
    recommended_surfaces:
      name: Permukaan yang direkomendasikan
      description: Menentukan permukaan/kategori material yang dimaksudkan untuk perekat,
        di luar kompatibilitas umum untuk kerajinan tangan (misalnya, hanya kertas
        vs multi-permukaan).
    recommended_use_case:
      name: Kasus penggunaan yang direkomendasikan
      description: Skenario penggunaan utama yang dimaksudkan untuk penyegel (perbaikan
        sementara/darurat vs perbaikan jangka panjang).
    recommended_use_location:
      name: Lokasi penggunaan yang direkomendasikan
      description: Lingkungan yang dituju untuk jungkat-jungkit (halaman belakang
        rumah vs taman bermain komersial, dll.).
    recommended_vehicle_surfaces:
      name: Permukaan kendaraan yang direkomendasikan
      description: Menentukan permukaan/lapisan kendaraan yang aman untuk digunakan
        dengan kuas ini (misalnya, cat lapisan bening, cat matte/satin, lapisan vinil/PPF,
        kaca, velg).
    recorder_accessories_included:
      name: Termasuk aksesori perekam
      description: Mencantumkan aksesori yang disertakan dalam paket great bass recorder.
    recorder_bore_design:
      name: Desain recorder bore
      description: Desain profil lubang bagian dalam bodi perekam.
    recorder_bore_type:
      name: Jenis lubang perekam
      description: Menentukan gaya lubang perekam.
    recorder_case_shell_type:
      name: Jenis cangkang wadah perekam
      description: Menjelaskan kekakuan struktural dari casing.
    recorder_finish:
      name: Perekam selesai
      description: Pelapisan/perlakuan permukaan badan seruling (terutama relevan
        untuk seruling alto kayu).
    recorder_hole_type:
      name: Jenis lubang recorder
      description: Apakah lubang nada tersebut tunggal (tidak ada lubang ganda) atau
        mencakup lubang ganda untuk penjarian kromatik yang lebih baik.
    recorder_joint_configuration:
      name: Konfigurasi sambungan recorder
      description: Menjelaskan berapa banyak bagian bodi yang dimiliki recorder, yang
        memengaruhi portabilitas, pembersihan, dan penggantian bagiannya.
    recorder_joint_style:
      name: Gaya sambungan perekam
      description: Jenis sambungan/koneksi antar bagian recorder, jika ada.
    recorder_keywork:
      name: Cara kerja tuas kunci recorder
      description: Menunjukkan apakah perekam tersebut memiliki tuas kunci (mekanisme
        logam/plastik) untuk nada rendah, biasanya terdapat pada recorder tenor/bass/ukuran
        besar.
    recorder_mouthpiece_type:
      name: Jenis mouthpiece recorder
      description: Menjelaskan apakah corong tiup/bagian kepala recorder terintegrasi
        (satu bagian) atau dapat dilepas/diganti.
    recorder_pitch_standard_a4:
      name: Standar nada perekam (A4)
      description: Menunjukkan referensi nada yang digunakan recorder (misalnya A=440
        Hz nada modern vs A=415 Hz nada barok).
    recorder_thumb_hole_type:
      name: Jenis lubang jempol perekam
      description: Menentukan apakah recorder memiliki desain lubang jempol tunggal
        atau lubang jempol ganda.
    recreational_vehicle_holding_tank_type:
      name: Jenis tangki penampung kendaraan rekreasi
      description: Menunjukkan tangki penampung limbah yang dimiliki RV.
    recreational_vehicle_leveling_system:
      name: Sistem perataan kendaraan rekreasi
      description: Jenis sistem leveling/stabilisasi yang terpasang.
    recycled_material_content:
      name: Kandungan bahan daur ulang
      description: Menunjukkan proporsi pakaian yang terbuat dari serat atau benang
        daur ulang.
    reed_dent_material:
      name: Bahan gigi reed
      description: Bahan dari gigi/gerigi reed (elemen yang memisahkan ujung benang
        lungsin), yang memengaruhi daya tahan dan abrasi benang.
    reed_type:
      name: Jenis reed
      description: Menentukan jenis konstruksi reed yang digunakan oleh chanter dan
        drone pada alat musik bagpipe.
    reeds_included:
      name: Reed yang disertakan
      description: Menentukan buluh mana yang termasuk dalam set bagpipe Great Highland
        (chanter dan/atau drone) dan apakah buluh tersebut terbuat dari tebu atau
        sintetis.
    reefing_method:
      name: Metode reefing
      description: Menunjukkan mekanisme (jika ada) untuk mengurangi atau menyimpan
        layar saat berada di atas air.
    reel_profile:
      name: Profil reel
      description: Mengklasifikasikan gaya/profil struktural dari bodi reel baitcasting.
    reel_seat_material:
      name: Bahan dudukan gulungan
      description: Menentukan bahan konstruksi dudukan reel, yang memengaruhi berat,
        sensitivitas, dan ketahanan terhadap korosi.
    reel_seat_type:
      name: Jenis dudukan reel
      description: Menentukan jenis mekanisme penguncian yang mengamankan reel pancing
        ke joran.
    reel_size_class:
      name: Kelas ukuran reel
      description: Peringkat ukuran yang ditentukan oleh produsen (misalnya, 1000,
        3000, 5000) yang menunjukkan kapasitas spool dan konstruksi reel secara keseluruhan.
    referee_wallet_accessories_included:
      name: Aksesori dompet wasit yang disertakan
      description: Mencantumkan barang-barang tambahan yang disertakan bersama dompet
        wasit, seperti kartu merah/kuning, lembar skor, atau alat tulis, sehingga
        pembeli mengetahui apakah dompet tersebut dijual sebagai perlengkapan lengkap.
    refinement_level:
      name: Tingkat penyempurnaan
      description: Menunjukkan tingkat pemurnian minyak yang telah dilakukan, yang
        memengaruhi rasa, warna, nilai gizi, dan titik asap.
    reflective_finish:
      name: Hasil akhir reflektif
      description: Menentukan perlakuan permukaan reflektif pada bola disko (misalnya
        ubin cermin vs efek holografik/berkilau).
    reflective_or_glow_effect:
      name: Efek pantulan atau cahaya
      description: Menunjukkan apakah bola antena memiliki efek visibilitas seperti
        bahan reflektif, berpendar dalam gelap, atau elemen menyala/LED.
    reflective_tape_pattern:
      name: Pola pita reflektif
      description: Menjelaskan konfigurasi pita reflektif di pakaian yang digunakan
        untuk memenuhi persyaratan visibilitas.
    regulation_standard:
      name: Standar peraturan
      description: Menentukan standar resmi atau dimensi/sertifikasi dari badan pengatur
        yang dipenuhi oleh jaring.
    regulator_diaphragm_material:
      name: Bahan diafragma regulator
      description: Menentukan material diafragma, yang memengaruhi kompatibilitas
        bahan bakar/etanol (misalnya E85) dan daya tahannya.
    regulator_port_thread_standard:
      name: Ulir port regulator standar
      description: Menentukan standar ulir/sambungan port yang digunakan pada badan
        regulator untuk port masuk/keluar/kembali.
    rein_features:
      name: Fitur penguat
      description: Menyoroti fitur fungsional atau keselamatan khusus yang terdapat
        pada tali kekang.
    rein_style:
      name: Gaya tali kendali
      description: Mengidentifikasi desain atau konfigurasi struktural dari tali kekang,
        yang memungkinkan pengendara memilih jenis yang sesuai dengan kategori dan
        preferensi pribadi.
    reinforced_areas:
      name: Area yang diperkuat
      description: Mengidentifikasi bagian pakaian yang diperkuat untuk ketahanan
        terhadap abrasi.
    reinforcement_type:
      name: Jenis penguat
      description: Penguatan konstruksi yang digunakan pada selang radiator untuk
        kekuatan serta ketahanan terhadap suhu/tekanan.
    release_activation_method:
      name: Metode aktivasi rilis
      description: Menentukan bagaimana alat bantu pelepasan anak panah dipicu oleh
        pemanah.
    release_bearing_material:
      name: Bahan bantalan alat pelepas
      description: Bahan utama komponen bantalan/permukaan (jika ditentukan oleh pabrikan).
    release_jaw_style:
      name: Bentuk penjepit pada alat pelepas
      description: Menjelaskan desain rahang atau pengait kepala pelepas.
    release_strap_type:
      name: Jenis tali pada alat pelepas
      description: Mengidentifikasi tali atau sistem penghubung yang disertakan dengan
        alat pelepas anak panah.
    remote_control_airship_envelope_material:
      name: Bahan selubung pesawat udara kendali jarak jauh
      description: Menentukan bahan utama dari selubung balon udara/pesawat udara
        (kantong gas), yang berbeda dari bahan mainan secara keseluruhan.
    remote_control_motorcycle_scale:
      name: Skala motor dengan remote kontrol
      description: Skala sepeda motor RC relatif terhadap sepeda motor asli (jika
        dimodelkan sebagai kendaraan skala).
    remote_control_motorcycle_terrain_suitability:
      name: Kesesuaian medan untuk sepeda motor kendali jarak jauh
      description: Medan utama yang dirancang untuk dioperasikan oleh sepeda motor
        RC ini.
    remote_control_motorcycle_water_resistance:
      name: Ketahanan air untuk sepeda motor kendali jarak jauh
      description: Tingkat perlindungan air untuk elektronik sepeda motor RC.
    remote_control_plane_kit_completion_level:
      name: tingkat penyelesaian kit pesawat kendali jarak jauh
      description: Menunjukkan apa saja yang termasuk dan seberapa lengkap set tersebut
        (misalnya, Siap Terbang vs memerlukan pemancar/penerima/baterai terpisah).
    remote_control_plane_landing_gear_type:
      name: Jenis roda pendaratan pesawat kendali jarak jauh
      description: Menunjukkan konfigurasi roda pendaratan, yang memengaruhi daya
        tahan serta kemampuan lepas landas/pendaratan di berbagai permukaan.
    remote_control_plane_power_type:
      name: Jenis daya pesawat kendali jarak jauh
      description: Menentukan bagaimana pesawat ditenagai/digerakkan (listrik vs glow/gas/nitro),
        yang memengaruhi perawatan, tingkat kebisingan, dan lokasi penerbangan.
    remote_control_watercraft_features:
      name: Fitur perahu kendali jarak jauh
      description: Menyoroti fitur-fitur utama khusus untuk perahu RC yang memengaruhi
        kegunaan dan daya tahan.
    remote_control_watercraft_propulsion_drive_type:
      name: Jenis propulsi/penggerak perahu kendali jarak jauh
      description: Menentukan cara menggerakkan perahu kendali jarak jauh di air.
    remote_control_watercraft_water_environment:
      name: Lingkungan perairan untuk perahu kendali jarak jauh
      description: Menunjukkan kondisi perairan yang dituju agar perahu RC dapat berkinerja
        terbaik.
    remote_keyless_system_programming_method:
      name: Metode pemrograman sistem kunci jarak jauh tanpa kunci manual
      description: Cara kendali jarak jauh/sistem diprogram atau dipasangkan ke kendaraan
        (misalnya prosedur onboard vs alat profesional).
    repair_compound_type:
      name: Jenis senyawa perbaikan
      description: Jenis/formulasi bahan perbaikan habis pakai yang disertakan (misalnya,
        jenis dempul bodi, jenis resin kaca depan, jenis semen/perekat penambal ban).
    repair_kit_components:
      name: Komponen kit perbaikan
      description: Mencantumkan item spesifik yang termasuk dalam kit perbaikan, sehingga
        pembeli dapat memahami isi dan membandingkan paket yang ada.
    repair_method:
      name: Metode perbaikan
      description: Menentukan pendekatan perbaikan utama yang digunakan kit, seperti
        patch perekat tempel atau penggantian katup.
    replacement_part_purpose:
      name: Tujuan suku cadang pengganti
      description: Menunjukkan apakah barang tersebut merupakan suku cadang pengganti
        OEM, suku cadang peningkatan/performa, atau aksesori tambahan.
    replacement_part_type:
      name: Jenis suku cadang pengganti
      description: Mengidentifikasi kategori fungsional bagian alat elliptical trainer,
        memungkinkan pembeli untuk menyaring komponen yang mereka butuhkan.
    replacement_parts_availability:
      name: Ketersediaan suku cadang pengganti
      description: Menunjukkan apakah suku cadang habis pakai/yang dapat diganti didukung
        untuk alat threader (misalnya pengait/kawat pengganti).
    replica_gun_action_type:
