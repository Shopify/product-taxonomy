    tapestry_loom_tensioning_system:
      name: Sistem penegangan alat tenun permadani
      description: Metode yang digunakan untuk menegangkan dan mengamankan benang
        lusi pada alat tenun permadani.
    tar_head_material:
      name: Bahan kepala tar
      description: Mengidentifikasi bahan membran (lapisan luar) drumhead, yang sangat
