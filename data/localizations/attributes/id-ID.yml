    mechanical_loom_weaving_type:
      name: Jenis tenun alat tenun mekanis
      description: Mekanisme/tipe tenun utama yang didukung oleh alat tenun.
    mechanical_puzzle_primary_mechanism:
      name: Mekanisme utama teka-teki mekanik
      description: Interaksi/mekanisme utama yang digunakan untuk memecahkan teka-teki
