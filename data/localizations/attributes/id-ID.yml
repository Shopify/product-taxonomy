    tiara_design:
      name: Desain tiara
      description: Menentukan gaya struktural keseluruhan atau siluet tiara.
    tie_down_points_straps_included:
      name: Titik/tali pengikat disertakan
      description: Menentukan apakah rak tersebut dilengkapi dengan titik pengikat
