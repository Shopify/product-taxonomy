    seam_gauge_slider_material:
      name: Bahan penggeser pengukur jahitan
      description: Mengidentifikasi material komponen penggeser/penunjuk yang dapat
        disesuaikan jika ada.
    seam_ripper_tip_style:
      name: gaya ujung pembuka jahitan
      description: Menjelaskan desain ujung fungsional yang digunakan untuk menyelipkan
        di bawah jahitan dan memotong benang dengan aman.
    seam_sealing_type:
      name: Jenis penyegelan jahitan
      description: Menjelaskan metode yang digunakan untuk mencegah masuknya air pada
        jahitan jas hujan (misalnya direkatkan atau dilas sepenuhnya).
    seam_type:
      name: Jenis jahitan
      description: Menjelaskan gaya jahitan pada bola bisbol, yang memengaruhi cengkeraman,
        aerodinamika, dan tingkat permainan yang diinginkan.
    season_condition_protection:
      name: Perlindungan musim/kondisi
      description: Menunjukkan cuaca/kondisi utama yang ingin dilindungi oleh penutup
