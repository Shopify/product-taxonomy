        tiang jangkar.
    compatible_helmet_certification_standard:
      name: Standar sertifikasi helm yang kompatibel
      description: Menunjukkan segala standar keselamatan helm atau konteks sertifikasi
        yang dirancang untuk didukung aksesori tersebut (misalnya, tear-off untuk
        penggunaan balap sering kali merujuk pada aturan sanksi tertentu).
    compatible_helmet_shell_size:
      name: Ukuran cangkang helm yang kompatibel
      description: Menunjukkan ukuran cangkang helm mana yang sesuai dengan bagian
        interior pengganti (ukuran cangkang sering kali sesuai dengan rentang ukuran
        seperti XS–S, M, L–XL).
    compatible_helmet_size:
      name: Ukuran helm yang kompatibel
      description: Menunjukkan ukuran helm yang kompatibel dengan masker wajah.
    compatible_helmet_type:
      name: Jenis helm yang kompatibel
      description: Kategori helm yang dirancang untuk penyangga leher.
    compatible_hitch_receiver_size:
      name: Ukuran penerima pengait yang kompatibel
      description: Ukuran bukaan penerima pengait yang dirancang agar sesuai dengan
        aksesori (untuk aksesori rak yang dipasang pada pengait).
    compatible_hook_size:
      name: Ukuran kait yang kompatibel
      description: Sistem ukuran jarum rajut dan/atau rentang ukuran yang sesuai dengan
        organizer ini (misalnya, ukuran huruf/angka AS, rentang mm metrik).
    compatible_horse_coat_type:
      name: Jenis mantel kuda yang kompatibel
      description: Menentukan karakteristik bulu kuda yang paling cocok untuk deshedder
        (misalnya, bulu tebal di musim dingin atau bulu yang sensitif).
    compatible_host_platform:
      name: Platform host yang kompatibel
      description: Menentukan platform host atau jenis perangkat mana yang kompatibel
        dengan pengontrol pad (misalnya, Windows, macOS, iOS, Android) atau apakah
        dapat beroperasi secara mandiri tanpa komputer.
    compatible_inflation_gas:
      name: Gas inflasi yang kompatibel
      description: Menentukan bahan apa yang akan digunakan untuk mengisi balon (udara,
        helium, atau keduanya).
    compatible_injection_type:
      name: Jenis injeksi yang kompatibel
      description: Menunjukkan sistem injeksi bahan bakar mana yang dirancang untuk
        dibersihkan oleh produk ini.
    compatible_instrument_surface_material:
      name: Permukaan/bahan alat musik yang kompatibel
      description: Menunjukkan permukaan/bahan instrumen mana yang dimaksudkan untuk
        digunakan dengan polesan.
    compatible_intercom_system:
      name: Sistem interkom yang kompatibel
      description: Menunjukkan kesiapan/kompatibilitas helm untuk pemasangan atau
        instalasi sistem interkom/komunikasi helm.
    compatible_interior_material:
      name: Bahas interior yang kompatibel
      description: Menunjukkan jenis bahan interior kendaraan yang aman/efektif untuk
        penghilang noda ini (misalnya, karpet, pelapis kain, kulit, vinil).
    compatible_kayak_type:
      name: Jenis kayak yang kompatibel
      description: Daftar gaya kayak umum yang dirancang untuk dipasangi perlengkapan
        layar.
    compatible_license_plate_hole_pattern:
      name: Pola lubang pelat nomor yang kompatibel
      description: Menentukan konfigurasi lubang pemasangan yang didukung oleh dudukan/penyangga
        (sisi kendaraan dan/atau sisi pelat).
    compatible_license_plate_size:
      name: Ukuran pelat nomor yang kompatibel
      description: Menunjukkan ukuran pelat nomor regional atau dimensi yang sesuai
        dengan dudukan/penyangga yang dirancang.
    compatible_loom:
      name: Alat tenun yang kompatibel
      description: Menentukan jenis alat tenun yang akan digunakan bersama pemukul
        tenun datar ini.
    compatible_loom_type:
      name: Jenis alat tenun yang kompatibel
      description: Menunjukkan jenis alat tenun yang dimaksudkan untuk digunakan bersama
        pemukul tersebut (misalnya, alat tenun heddle kaku vs alat tenun permadani).
    compatible_machine_type:
      name: Jenis mesin yang kompatibel
      description: Menunjukkan jenis perlengkapan menjahit quilting yang dirancang
        untuk digunakan dengan rangka ini (hanya quilting tangan, mesin jahit rumahan,
        mesin quilting longarm).
    compatible_mast_type:
      name: Jenis tiang yang kompatibel
      description: 'Menentukan diameter tiang mana yang dirancang untuk layar tersebut:
        diameter diperkecil (RDM), diameter standar (SDM), atau keduanya.'
    compatible_model_system_train_scale:
      name: Sistem model yang kompatibel (skala kereta api)
      description: Menentukan skala/sistem kereta api model yang sesuai dengan aksesori
        tersebut jika berlaku (misalnya, HO, N, O).
    compatible_mounting_surface:
      name: Permukaan pemasangan yang kompatibel
      description: Permukaan atau objek yang dituju tempat klip tersebut dirancang
        untuk menjepit.
    compatible_mouthpiece_patch:
      name: Patch mouthpiece yang kompatibel
      description: Menunjukkan apakah mouthpiece dirancang untuk digunakan dengan
        bantalan/penutup mouthpiece dan kisaran ketebalan penutup yang disarankan.
    compatible_mouthpiece_type:
      name: Jenis corong yang kompatibel
      description: Menunjukkan jenis/tangkai mouthpiece yang dirancang untuk digunakan
        pada melofon (umumnya penerima bergaya French horn atau trompet, tergantung
        modelnya).
    compatible_neck_profile_width:
      name: Profil/lebar leher yang kompatibel
      description: Menunjukkan profil/kelas lebar leher gitar yang sesuai dengan capo
        tersebut (misalnya, gitar elektrik sempit vs gitar klasik lebar).
    compatible_needle_size:
      name: Jenis jarum yang kompatibel
      description: Menunjukkan ukuran/jenis jarum yang sesuai dengan wadah ini (misalnya,
        jarum bordir, jarum permadani, jarum jahit tangan).
    compatible_needle_system:
      name: Sistem jarum yang kompatibel
      description: Sistem jarum yang kompatibel dengan mesin ini (misalnya, 130/705H).
    compatible_parking_brake_mechanism:
      name: Mekanisme rem parkir yang kompatibel
      description: Menunjukkan apakah kaliper dirancang untuk bekerja dengan mekanisme
        rem parkir terintegrasi.
    compatible_pedal_instrument_type:
      name: Jenis instrumen pedal yang kompatibel
      description: Menentukan perangkat apa yang dimaksudkan untuk menggunakan pedal
        tersebut (misalnya, piano digital, keyboard/synth, pengontrol MIDI).
    compatible_pedal_type:
      name: Jenis pedal yang kompatibel
      description: Menunjukkan gaya pedal atau sistem yang sesuai dengan tali atau
        klip tersebut (misalnya, platform, SPD, Look Keo).
    compatible_pin_type:
      name: Jenis pin yang kompatibel
      description: Jenis pin apa yang dirancang untuk digunakan dengan alas tersebut
        (atau apakah alas tersebut dapat dipasangi pin).
    compatible_pipe_filter_size:
      name: Ukuran filter pipa yang kompatibel
      description: Menunjukkan ukuran atau gaya filter yang dirancang untuk pipa tersebut
        (atau filter tidak diperlukan).
    compatible_plate_size:
      name: Ukuran piring yang kompatibel
      description: Dimensi pelat balistik atau ukuran standar yang dapat ditampung
        oleh rompi tersebut.
    compatible_play_vehicle_scale:
      name: Skala kendaraan mainan yang kompatibel
      description: Menunjukkan skala mainan yang sesuai dengan aksesori tersebut (misalnya,
        1:64), sehingga meningkatkan kecocokan/kompatibilitas untuk kolektor dan sistem
        rel.
    compatible_playing_surface:
      name: Permukaan bermain yang kompatibel
      description: Menunjukkan jenis lapangan atau permukaan bermain yang sesuai untuk
        sepatu sepak bola Amerika.
    compatible_pole_dimensions:
      name: Dimensi tiang yang kompatibel
      description: Menentukan ukuran penampang tiang yang sesuai dengan aksesori tersebut.
    compatible_pole_shape:
      name: Bentuk tiang yang kompatibel
      description: Menentukan bentuk penampang tiang atau kolom yang akan dipasangi
        bantalan.
    compatible_power_steering_system:
      name: Sistem power steering yang kompatibel
      description: Menunjukkan jenis sistem kemudi yang ditujukan untuk cairan tersebut.
    compatible_powerplant_type:
      name: Jenis pembangkit listrik yang kompatibel
      description: Menunjukkan sistem pendorong senapan BB yang sesuai dengan komponen
        ini (misalnya, pegas-piston, CO2, PCP).
    compatible_presser_foot:
      name: Kaki penekan yang kompatibel
      description: Menentukan sistem pemasangan/kompatibilitas kaki penekan yang didukung
        oleh mesin jahit (misalnya, sistem jepret vs sistem ulir; tangkai rendah/tinggi/miring).
        Gunakan 'Universal/Multiple' jika beberapa sistem didukung atau adaptor disertakan.
    compatible_protective_gear:
      name: Perlengkapan pelindung yang kompatibel
      description: Menentukan peralatan pelindung lain apa yang dirancang untuk digunakan
        bersama penyangga leher ini.
    compatible_protective_gear_integration:
      name: Integrasi perlengkapan pelindung yang kompatibel
      description: Menjelaskan bagaimana pelindung tersebut dimaksudkan untuk dikenakan
        atau diintegrasikan dengan perlengkapan lain (misalnya, kantong sisipan, tali
        pengikat terpisah).
    compatible_punching_bag_type:
      name: Jenis samsak tinju yang kompatibel
      description: Menentukan gaya samsak tinju atau samsak latihan mana yang kompatibel
        dengan produk ini.
    compatible_racing_discipline:
      name: Disiplin balap yang kompatibel
      description: Disiplin olahraga motor yang menjadi tujuan/sertifikasi helm ini.
    compatible_rc_scale:
      name: Skala RC yang kompatibel
      description: Menunjukkan rasio skala RC (misalnya, 1:10) yang dirancang agar
        sesuai dengan aksesori atau komponen tersebut.
    compatible_recorder_size:
      name: Ukuran perekam yang kompatibel
      description: Menentukan ukuran recorder mana yang sesuai dengan wadah tersebut.
    compatible_recorder_type:
      name: Jenis perekam yang kompatibel
      description: Menentukan jenis recorder (keluarga/ukuran) yang kompatibel dengan
        aksesori tersebut (misalnya, soprano, alto).
    compatible_reed_cut:
      name: Potongan bilah yang kompatibel
      description: Menentukan gaya potongan reed mana yang dimaksudkan agar kompatibel
        dengan ligatur (misalnya, potongan yang dikikir/gaya Prancis vs potongan yang
        tidak dikikir/gaya Amerika).
    compatible_reed_type:
      name: Jenis reed yang kompatibel
      description: Menentukan jenis/potongan reed yang sesuai dengan desain mouthpiece
        tersebut.
    compatible_reel_type:
      name: Jenis gulungan yang kompatibel
      description: Menentukan gaya gulungan pancing yang sesuai dengan tas, kotak,
        atau penutup.
    compatible_refrigerant_type:
      name: Jenis refrigeran yang kompatibel
      description: Menunjukkan jenis refrigeran yang dimaksudkan untuk digunakan dengan
        evaporator AC.
    compatible_ride_equipment:
      name: Peralatan seluncur yang kompatibel
      description: Jenis peralatan olahraga beroda yang ditujukan untuk ramp ini.
    compatible_roof_height:
      name: Tinggi atap yang kompatibel
      description: Menunjukkan profil atap mana yang dirancang untuk penutup tersebut
        (standar vs atap tinggi/diperpanjang).
    compatible_roof_rail_type:
      name: Jenis roof tail yang kompatibel
      description: Menentukan konfigurasi atap mana yang dirancang untuk dipasangi
        sistem rak dasar.
    compatible_rope_count:
      name: Jumlah tali yang kompatibel
      description: Menentukan konfigurasi tali ring tinju yang sesuai dengan desain
        komponen tersebut, seperti ring 3 tali, ring 4 tali, atau ukuran universal.
    compatible_rope_type:
      name: Jenis tali yang kompatibel
      description: Menentukan jenis konstruksi tali yang dapat digunakan dengan perangkat.
    compatible_saddle_type:
      name: Jenis sadel yang kompatibel
      description: Menentukan gaya pelana atau disiplin berkuda yang sesuai dengan
        aksesori tersebut, memastikan kompatibilitas yang tepat di berbagai pelana,
        termasuk pelana gaya Inggris, Western, dan lainnya.
    compatible_saxophone_size:
      name: Ukuran saksofon yang kompatibel
      description: Menunjukkan ukuran saksofon yang kompatibel dengan produk (misalnya,
        soprano, alto, tenor).
    compatible_saxophone_type:
      name: Jenis saksofon yang kompatibel
      description: Menentukan saksofon mana yang sesuai dengan ligatur/cap tersebut.
    compatible_scale_length:
      name: Panjang skala yang kompatibel
      description: Mengidentifikasi rentang panjang skala gitar yang sesuai untuk
        senar tersebut (misalnya, skala pendek, standar, bariton).
    compatible_seat_airbag:
      name: Kantong udara kursi yang kompatibel
      description: Menunjukkan apakah jok tersebut mendukung/berisi airbag samping
        atau kompatibel dengan kendaraan yang dilengkapi airbag yang terpasang di
        jok.
    compatible_seating_capacity:
      name: Kapasitas tempat duduk yang kompatibel
      description: Menentukan jumlah kursi atau konfigurasi yang sesuai dengan desain
        aksesori tersebut.
    compatible_sensor_port_type:
      name: Jenis porta sensor yang kompatibel
      description: Menentukan apakah bak oli mendukung sensor level oli dan/atau suhu
        oli serta tipe port jika ada.
    compatible_shifter_type:
      name: Jenis shifter yang kompatibel
      description: Mengidentifikasi tipe atau konfigurasi tuas persneling yang sesuai
        dengan desain penutup tuas persneling.
    compatible_shis:
      name: SHIS yang kompatibel
      description: Mencantumkan kode Sistem Identifikasi Headset Standar (SHIS) yang
        sesuai dengan komponen tersebut (misalnya, IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Disiplin skating yang kompatibel
      description: Menunjukkan disiplin skating yang sesuai dengan rancangan komponen
        atau aksesori tersebut.
    compatible_snowshoe_deck_type:
      name: Jenis dek sepatu salju yang kompatibel
      description: Menentukan gaya rangka atau dek sepatu salju yang kompatibel dengan
        pengikatnya.
    compatible_special_effects_lighting_features:
      name: Fitur pencahayaan efek khusus yang kompatibel
      description: Menyoroti fitur-fitur umum yang memengaruhi keputusan pembelian
        lampu efek (selain warna/pola), seperti menghubungkan unit atau bereaksi terhadap
        audio.
    compatible_spinning_wheel_drive_system:
      name: Sistem penggerak roda pemintal yang kompatibel
      description: Menentukan sistem penggerak roda mana yang didukung oleh aksesori
        ini.
    compatible_spoke_gauge:
      name: Pengukur jari-jari yang kompatibel
      description: Menunjukkan ukuran kawat jari-jari yang sesuai dengan ulir nipel,
        sehingga pembeli dapat mencocokkan jari-jari dan nipel dengan benar.
    compatible_steering_wheel_airbag:
      name: Airbag roda kemudi yang kompatibel
      description: Menunjukkan apakah roda kemudi mendukung pemasangan modul kantong
        udara OEM (atau ditujukan untuk aplikasi tanpa kantong udara).
    compatible_steering_wheel_control_button:
      name: Tombol kontrol roda kemudi yang kompatibel
      description: Menunjukkan kompatibilitas dengan kontrol yang terpasang di roda
        kemudi bawaan pabrik (audio/cruise control/telepon) dan kabel terkait.
    compatible_stencil_material:
      name: Bahan stensil yang kompatibel
      description: Bahan-bahan yang dapat digunakan mesin untuk membuat stensil atau
        memprosesnya (misalnya, kertas, film plastik, mylar).
    compatible_stencil_media_format:
      name: Format media stensil yang kompatibel
      description: 'Menunjukkan jenis media stensil yang didukung mesin: lembaran,
        gulungan, atau keduanya.'
    compatible_strap_retractor:
      name: Penarik tali yang kompatibel
      description: Menunjukkan apakah tali kompatibel dengan sistem yang dapat ditarik
        atau dirancang untuk sabuk yang tidak dapat ditarik (statis).
    compatible_string_instrument_finish:
      name: Finishing alat musik senar yang kompatibel
      description: Menentukan jenis finis instrumen mana yang aman untuk dipoles.
    compatible_substrate_material:
      name: Bahan substrat yang kompatibel
      description: Permukaan yang dapat ditempeli cat sesuai formulanya.
    compatible_surface:
      name: Permukaan yang kompatibel
      description: Menentukan permukaan/bahan yang akan direkatkan oleh perekat hook-and-loop.
    compatible_surface_material:
      name: Bahan permukaan yang kompatibel
      description: Bahan permukaan kendaraan yang dirancang untuk digunakan dengan
        produk ini.
    compatible_tear_off_system:
      name: Sistem tear-off yang kompatibel
      description: Menunjukkan apakah kacamata tersebut mendukung tear-off dan/atau
        roll-off, termasuk apakah kacamata tersebut memiliki tiang pemasangan untuk
        tear-off.
    compatible_thermostat_type:
      name: Jenis termostat yang kompatibel
      description: Apakah leher/wadah air dirancang untuk menerima termostat dan,
        jika ya, jenis/ukuran apa.
    compatible_thread:
      name: Ulir yang kompatibel
      description: Menunjukkan jenis benang/benang rajut apa yang dirancang untuk
        ditangani oleh alat pemasang benang (berdasarkan ketebalan/jenis).
    compatible_thread_spool_format:
      name: Format benang/gulungan yang kompatibel
      description: Menunjukkan format benang apa yang dirancang untuk disimpan di
        dalam kotak (gulungan, kumparan, kumparan/kartu benang, kerucut, dll.).
    compatible_thread_yarn_tool:
      name: Alat benang & tali yang kompatibel
      description: Kompatibilitas mesin/sistem untuk alat yang dipasang pada atau
        digunakan bersama peralatan lain (misalnya, mesin jahit, mesin obras/overlock,
        alat tenun, roda pemintal).
    compatible_tire_application:
      name: Aplikasi ban yang kompatibel
      description: Menunjukkan segmen aplikasi ban/roda yang menjadi target desain
        alat pembuka ban (berdasarkan ban/roda yang sedang diperbaiki, bukan model
        kendaraan).
    compatible_tom_pad_mounting:
      name: Dudukan tom pad yang kompatibel
      description: Menentukan pada perangkat apa tom-tom elektronik dipasang (misalnya,
        dudukan clamp/rod, L-rod, dudukan penyangga), yang memengaruhi apakah perangkat
        akan cocok dengan sistem rak yang ada.
    compatible_toy_vehicle_scale:
      name: Skala kendaraan mainan yang kompatibel
      description: Menunjukkan skala kendaraan mainan atau perkiraan ukuran kendaraan
        yang kompatibel dengan playset tersebut.
    compatible_tpms_sensor_type:
      name: Jenis sensor TPMS yang kompatibel
      description: Menentukan apakah roda mendukung sensor TPMS dan/atau segala jenis
        katup/sensor yang dibutuhkan.
    compatible_training_equipment:
      name: Peralatan latihan yang kompatibel
      description: Mencantumkan jenis-jenis peralatan latihan atau kebugaran yang
        dapat dipasang pada dudukan tersebut.
    compatible_treadmill_design:
      name: Desain treadmill yang kompatibel
      description: Menentukan desain treadmill yang kompatibel dengan aksesori tersebut,
        seperti model lipat atau tidak lipat.
    compatible_tube:
      name: Tabung yang kompatibel
      description: Menunjukkan jenis ban dalam atau konstruksi ban yang dirancang
        untuk tambalan tersebut, seperti butil, lateks, TPU, atau tubeless.
    compatible_valve_type:
      name: Jenis katup yang kompatibel
      description: Menentukan jenis katup pada alat musik tiup logam yang kompatibel
        dengan pelumas.
    compatible_vaporizing_material:
      name: Bahan penguap yang kompatibel
      description: Menunjukkan jenis material yang dirancang untuk diuapkan oleh perangkat
        tersebut.
    compatible_vehicle_windshield_fluid:
      name: Cairan pembersih kaca depan kendaraan yang kompatibel
      description: Klaim kompatibilitas terkait dengan peralatan kendaraan atau perawatan
        kaca (misalnya, aman untuk lapisan anti-air hujan, aman untuk alat pencuci
        lampu depan).
    compatible_visor_system:
      name: Sistem pelindung wajah yang kompatibel
      description: Menunjukkan jenis sistem visor/inset mana yang kompatibel dengan
        helm sepeda motor.
    compatible_water_board_type:
      name: Jenis papan air yang kompatibel
      description: Rak ini dirancang untuk membawa papan olahraga air apa saja.
    compatible_water_sport_board_type:
      name: Jenis papan olahraga air yang kompatibel
      description: Mencantumkan jenis papan yang dirancang untuk diangkut oleh rak
        ini.
    compatible_watercraft_communication_standard:
      name: Standar komunikasi kapal air yang kompatibel
      description: Menentukan standar komunikasi/jaringan maritim yang didukung atau
        protokol integrasi untuk interoperabilitas dengan elektronik di atas kapal.
    compatible_watercraft_engine_type:
      name: Jenis mesin perahu yang kompatibel
      description: Menunjukkan konfigurasi sistem penggerak yang sesuai dengan komponen
        tersebut (outboard/inboard/sterndrive/jet drive).
    compatible_weight_plate_diameter:
      name: Diameter pelat beban yang kompatibel
      description: Menentukan diameter pelat beban mana yang dapat diterima oleh mesin.
    compatible_wheel_finish:
      name: Finis roda yang kompatibel
      description: Menentukan finis/bahan pelek yang aman untuk dibersihkan dengan
        pembersih ini (sebagaimana diklaim oleh produsen).
    compatible_whorl_drive_band_type:
      name: Jenis tali penggerak whorl yang kompatibel
      description: Menentukan gaya pita penggerak mana yang dimaksudkan untuk digunakan
        dengan whorl tersebut.
    compatible_wick_series:
      name: Seri sumbu yang kompatibel
      description: Menunjukkan seri/tipe sumbu umum yang dirancang agar sesuai dengan
        tab tersebut (penamaan industri), jika ditentukan oleh penjual.
    compatible_winder_head_bit:
      name: Kepala/mata bor penggulung yang kompatibel
      description: Menentukan gaya antarmuka kunci/kepala tuner yang didukung oleh
        winder (misalnya, kepala slot, bit yang dapat diganti, kepala universal).
    compatible_windlass_rode:
      name: Rode windlass yang kompatibel
      description: Menentukan jenis rode jangkar yang dapat ditangani oleh windlass.
    compatible_windshield_type:
      name: Jenis kaca depan yang kompatibel
      description: Menentukan konfigurasi kaca depan mana yang dirancang agar kompatibel
        dengan penutup tersebut.
    compatible_wood:
      name: Kayu yang kompatibel
      description: Menentukan jenis kayu fingerboard mana yang direkomendasikan/aman
        untuk penggunaan polesan.
    compatible_writing_surface:
      name: Permukaan tulis yang kompatibel
      description: Menentukan permukaan/kertas mana yang paling cocok untuk tinta
        tersebut.
    compatible_zipper_size:
      name: Ukuran ristleting yang kompatibel
      description: 'Menunjukkan ukuran ritsleting yang dimaksudkan agar sesuai dengan
        tarikan ritsleting (sering dinyatakan sebagai #3, #5, #8, #10), sehingga meningkatkan
        penyaringan kompatibilitas.'
    compliance_certification:
      name: Sertifikasi kepatuhan
      description: Standar kepatuhan/persetujuan yang dipenuhi oleh lampu sorot kendaraan
        untuk penggunaan di jalan raya dan kompatibilitas elektromagnetik.
    component_position:
      name: Posisi komponen
      description: Menentukan posisi relatif komponen tersebut dalam rakitan timing
        mesin (misalnya, penutup depan vs belakang, atas vs bawah). Bukan penempatan
        depan/belakang kendaraan.
    concentration_level:
      name: Tingkat konsentrasi
      description: Indikasi kualitatif seberapa pekat pasta tomat (tunggal, dobel,
        tripel), yang berguna untuk mencocokkan dengan kebutuhan resep.
    concentration_type:
      name: Jenis konsentrasi
      description: Menunjukkan apakah produk siap pakai atau berupa konsentrat, dan
        (jika berupa konsentrat) panduan pengenceran umum.
    concert_bass_drum_mounting_stand_type:
      name: Jenis dudukan pemasangan drum bas konser
      description: Cara penyanggaan atau pemasangan drum bas konser untuk pertunjukan.
    concert_pitch_standard:
      name: Standar nada konser
      description: Menentukan referensi nada konser (A4) yang digunakan pada piano
        saat dijual (misalnya, A440, A442, A444).
    condiment_form:
      name: Bentuk kondimen
      description: Menunjukkan bentuk fisik atau konsistensi produk lobak pedas (misalnya,
        pasta, bubuk, krim).
    condiment_texture:
      name: Tekstur bumbu
      description: Menjelaskan konsistensi fisik dari relish atau chutney (misalnya,
        kasar, halus).
    confetti_format:
      name: Format confetti
      description: Menentukan format produk konfeti berdasarkan cara pengemasan atau
        peluncuran konfeti (misalnya, taburan lepas vs. alat pelempar/meriam).
    conga_head_tensioning_system:
      name: Sistem pengencangan kepala conga
      description: Jenis perangkat keras yang digunakan untuk mengencangkan/menyetel
        membran conga (misalnya, penyetelan lug tradisional vs mekanisme penyetelan
        cepat modern).
    conga_set_included_drum_types:
      name: Set conga termasuk berbagai jenis drum
      description: Jenis conga mana yang disertakan dalam satu set conga (misalnya
        quinto + conga + tumba).
    connector_case_style:
      name: Gaya casing konektor
      description: Mengklasifikasi gaya konstruksi keseluruhan dari wadah konektor
        (misalnya, cangkang keras vs kantong lunak) untuk mencerminkan tingkat perlindungan
        dan portabilitas.
    console_cover_installation_method:
      name: Metode pemasangan penutup konsol
      description: Menentukan cara penutup konsol terpasang pada konsol/sandaran tangan
        (misalnya, diselipkan, tali elastis, pengait & simpul, perekat, penjepit).
    console_display_type:
      name: Jenis tampilan konsol
      description: Mengidentifikasi gaya tampilan pengguna yang disediakan pada mesin
        (misalnya, LCD, LED, layar sentuh).
    construction_design:
      name: Desain konstruksi
      description: Menunjukkan berapa banyak bagian yang tersusun membentuk bantalan,
        yang memengaruhi mobilitas (misalnya, 1 bagian vs 3 bagian).
    contact_angle:
      name: Sudut kontak
      description: Menentukan sudut kontak pada race bearing, yang dinyatakan sebagai
        sudut tunggal atau set sudut berpasangan (misalnya, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Jenis pengisian bola juggling kontak
      description: Mengidentifikasi apakah bola tersebut padat atau berisi (dan jika
        berisi, jenis isian apa), yang memengaruhi distribusi berat dan daya tahan.
    contact_juggling_ball_transparency:
      name: Transparansi bola juggling kontak
      description: Menentukan transparansi/penampilan optik bola.
    contact_surface_material:
      name: Bahan permukaan kontak
      description: Mengidentifikasi bahan yang digunakan pada titik kontak yang menyentuh
        instrumen (misalnya, gabus/karet) untuk mencegah goresan dan meningkatkan
        cengkeraman.
    container_material:
      name: Bahan wadah
      description: Menentukan bahan utama wadah ritel produk (misalnya, kaca, plastik
        PET, aluminium).
    contaminant_removal:
      name: Penghilangan kontaminan
      description: Mencantumkan kelas kontaminan yang telah disertifikasi dapat dihilangkan
        atau dikurangi oleh produk.
    contra_alto_clarinet_body_configuration:
      name: Konfigurasi badan klarinet kontra-alto
      description: Menjelaskan bentuk fisik dari klarinet kontra-alto (misalnya, desain
        lurus vs desain lipat).
    contra_alto_clarinet_lowest_note_extension:
      name: Ekstensi nada terendah klarinet kontra-alto
      description: Menentukan ekstensi nada terendah yang dapat dimainkan oleh alat
        musik (nada terendah yang diizinkan oleh mekanisme tuts), yang biasanya digunakan
        untuk membedakan model E♭ rendah vs D rendah vs C rendah.
    contra_bass_clarinet_bell_type:
      name: Jenis corong klarinet kontra-bas
      description: Konfigurasi bel yang digunakan pada klarinet kontrabas.
    contra_bass_clarinet_bore_type:
      name: Jenis lubang klarinet kontra-bass
      description: Desain lubang instrumen.
    contra_bass_clarinet_lowest_written_note:
      name: Nada terendah yang ditulis untuk klarinet kontra-bass
      description: Nada terendah yang tertulis yang dapat dimainkan oleh alat musik
        tersebut (seringkali bergantung pada ekstensi C rendah vs Eb rendah).
    control_arm_bushing_material:
      name: Bahan bushing lengan kontrol
      description: Menentukan material dari bushing yang disertakan/dipasang, jika
        ada.
    control_arm_bushings_included:
      name: Bushing lengan kontrol yang disertakan
      description: Menunjukkan apakah lengan kontrol dikirim dengan bushing yang sudah
        terpasang.
    control_arm_finish:
      name: Finis lengan kontrol
      description: Menentukan finis pelindung yang diterapkan pada lengan kontrol
        (perlindungan terhadap korosi dan penampilan).
    control_arm_grease_fitting_type:
      name: Jenis fitting gemuk lengan kontrol
      description: Menentukan apakah rakitan lengan kontrol/ball joint mencakup fitting
        gemuk (zerk) dan apakah fitting tersebut dapat diservis.
    control_arm_material:
      name: Bahan lengan kontrol
      description: Menentukan material utama dan konstruksi manufaktur dari bodi lengan
        kontrol.
    control_arm_position:
      name: Posisi lengan kontrol
      description: Menentukan posisi suspensi yang dirancang untuk lengan kontrol
        dalam konteks sudut/sisi poros (misalnya, atas/bawah, depan/belakang, kiri/kanan).
    control_arm_style:
      name: Gaya lengan kontrol
      description: Mengidentifikasi gaya geometris/desain lengan kontrol yang digunakan
        dalam tata letak suspensi.
    control_cable_connector_type:
      name: Jenis konektor kabel kontrol
      description: Menentukan jenis ujung/konektor yang digunakan oleh kabel kontrol
        untuk berinteraksi dengan kontrol dan mesin (misalnya, fitting ujung khusus
        OEM).
    control_voltage_or_gate_connectivity:
      name: Tegangan kontrol atau konektivitas gerbang
      description: Menentukan dukungan koneksi tegangan kontrol/gate untuk integrasi
        dengan peralatan modular/analog.
    controller_function:
      name: Fungsi pengontrol
      description: Menentukan peran utama papan kontrol treadmill, seperti kontrol
        motor, catu daya, atau penggerak inverter.
    controller_type:
      name: Jenis pengendali
      description: Menentukan pengontrol motor/sistem kontrol yang disertakan dalam
        kit konversi skuter listrik (atau yang dibutuhkan untuk penggunaan), dengan
        fokus pada karakteristik pengontrol yang relevan dengan kompatibilitas dan
        kinerja.
    conversion_kit_cooling_method:
      name: Metode pendinginan kit konversi
      description: Pendekatan manajemen termal utama yang digunakan untuk integrasi
        motor/inverter/baterai.
    conversion_kit_installation_complexity:
      name: Kompleksitas pemasangan kit konversi
      description: Perkiraan tingkat kesulitan pemasangan berdasarkan keterampilan/peralatan
        yang biasanya dibutuhkan pelanggan.
    converted_bed_size:
      name: Ukuran tempat tidur yang dikonversi
      description: Menunjukkan ukuran atau konfigurasi tempat tidur yang akan dihasilkan
        dari konversi ranjang bayi setelah kit ini dipasang.
    convertible_configuration:
      name: Konfigurasi yang dapat diubah
      description: Menunjukkan berapa banyak konfigurasi tempat tidur berbeda yang
        dapat dihasilkan dari produk ini (misalnya, tempat tidur bayi 3-in-1 → tempat
        tidur balita → tempat tidur siang).
    convertible_high_chair_modes:
      name: Mode kursi tinggi yang dapat diubah
      description: Menentukan konfigurasi tempat duduk yang dapat diubah pada kursi
        tersebut.
    cookie_decorating_kit_items_included:
      name: Perlengkapan menghias kue termasuk di dalamnya
      description: Mencantumkan komponen dekorasi individual yang disediakan sehingga
        pelanggan tahu persis perlengkapan apa saja yang ada di dalam kotak (misalnya,
        tabung krim hiasan, taburan, cetakan kue).
    cookie_variety:
      name: Aneka jenis kue kering
      description: Mengidentifikasi gaya atau jenis kue tertentu, membantu pembeli
        menemukan jenis yang mereka sukai dengan cepat.
    cooking_state:
      name: Kondisi memasak
      description: Menunjukkan tingkat kesiapan produk ayam saat dijual (mentah, matang
        sepenuhnya, dimarinasi, dll.).
    coolant_additive_purpose:
      name: Tujuan aditif cairan pendingin
      description: Fungsi utama yang dimaksudkan dari aditif cairan pendingin (bukan
        cairan pembersih radiator atau produk penyegel khusus).
    coolant_base_fluid:
      name: Cairan dasar pendingin
      description: Mengidentifikasi basis glikol utama yang digunakan dalam formulasi
        antibeku/pendingin.
    coolant_outlet_connection_style:
      name: gaya koneksi outlet pendingin
      description: Jenis antarmuka koneksi outlet yang digunakan untuk memasang selang
        radiator atau saluran cairan pendingin.
    coolant_outlet_neck_angle:
      name: Sudut leher outlet cairan pendingin
      description: Sudut/orientasi outlet leher air relatif terhadap flensa pemasangan/mesin
        (berguna untuk mengarahkan selang radiator atas).
    coolant_technology:
      name: Teknologi cairan pendingin
      description: Menentukan jenis/teknologi kimia pendingin yang digunakan oleh
        cairan antibeku/pendingin (seperti yang umumnya tertera pada kemasan).
    coolant_temperature_sensor_port:
      name: Port sensor suhu pendingin
      description: Apakah leher air tersebut memiliki port untuk sensor atau sakelar
        suhu cairan pendingin, dan antarmuka apa yang digunakannya.
    coolant_temperature_sensor_seal_type:
      name: Jenis segel sensor suhu pendingin
      description: Jenis metode penyegelan yang digunakan antara sensor dan saluran
        mesin/cairan pendingin.
    cooling_system_component_included:
      name: Komponen sistem cairan pendingin disertakan
      description: Mencantumkan komponen sistem pendingin tambahan yang disertakan
        dengan pompa air.
    cooling_system_flush_application_step:
      name: Langkah aplikasi pembilasan sistem pendingin
      description: Menunjukkan posisi produk dalam proses servis (misalnya, pembersih
        pra-bilas vs bilas akhir/penetralisir).
    cooling_system_type:
      name: Jenis sistem pendingin
      description: Menentukan konfigurasi sistem pendingin yang digunakan oleh mesin
        kapal inboard (misalnya, air mentah/sistem terbuka, sistem tertutup/air tawar
        dengan penukar panas, pendinginan lambung).
    cord_material:
      name: Bahan kabel
      description: Menentukan bahan tali/benang yang digunakan untuk menarik kapas
        pembersih melalui saksofon.
    core_type_bass_strings:
      name: Jenis inti (senar bass)
      description: Menentukan bentuk inti senar, yang memengaruhi rasa dan fleksibilitas.
    cork_grease_base_material:
      name: Bahan dasar gemuk gabus
      description: Bahan dasar utama dalam formulasi gemuk gabus (misalnya, berbasis
        lanolin).
    cork_grease_form:
      name: Bentuk gemuk gabus
      description: Bentuk fisik produk gemuk gabus.
    corn_presentation:
      name: Presentasi jagung
      description: Menentukan tampilan fisik atau bentuk produk jagung (misalnya,
        utuh dengan sekam, biji, bubuk).
    corn_syrup_variety:
      name: Berbagai jenis sirup jagung
      description: Menentukan gaya atau varian pengolahan sirup tertentu.
    corn_variety:
      name: Varietas jagung
      description: Mengidentifikasi varietas botani atau varietas pasar spesifik dari
        jagung yang dijual, memungkinkan pembeli untuk membedakan antara jenis-jenis
        yang berbeda dalam rasa, tekstur, warna, dan penggunaan kuliner.
    corner_compatibility:
      name: Kompatibilitas sudut
      description: Menentukan bentuk sudut meja (persegi atau bulat) yang menjadi
        dasar desain penutup tersebut.
    corner_flag_features:
      name: Fitur bendera sudut
      description: Menyoroti karakteristik fungsional khusus atau peningkatan pada
        bendera sudut (misalnya, tiang yang dapat dilipat, bahan reflektif).
    cornet_mouthpiece_shank_type:
      name: Jenis tangkai mouthpiece kornet
      description: Menentukan standar penerima/tangkai mouthpiece yang didukung oleh
        kornet untuk kompatibilitas.
    cornhole_league_certification:
      name: Sertifikasi liga Cornhole
      description: Menunjukkan sertifikasi resmi atau persetujuan liga yang dipenuhi
        oleh produk tersebut.
    corrosion_resistance:
      name: Ketahanan korosi
      description: Menentukan perlakuan atau peringkat ketahanan korosi pada dudukan/penyangga
        untuk paparan di luar ruangan.
    corrosion_resistance_level:
      name: Tingkat ketahanan korosi
      description: Menunjukkan perlindungan korosi yang cocok untuk lingkungan air
        tawar/air asin.
    costume_components_included:
      name: Komponen kostum disertakan
      description: Mencantumkan potongan pakaian dan aksesori yang termasuk dalam
        kostum, serta menjelaskan apa saja yang termasuk dalam set tersebut.
    cotton_weave_type:
      name: Jenis tenunan katun
      description: Menjelaskan konstruksi anyaman/rajutan permukaan katun yang dapat
        dicetak yang memengaruhi tekstur dan ketajaman hasil cetak.
    counter_type:
      name: Jenis meja
      description: Menunjukkan keberadaan dan gaya pengulangan bawaan atau pelacakan
        gaya.
    counterweight_fill_material:
      name: Bahan pengisi penyeimbang
      description: Menunjukkan zat yang dapat digunakan untuk menambah pemberat atau
        mengisi terlebih dahulu penyeimbang.
    counterweight_type:
      name: Jenis penyeimbang
      description: Menentukan desain atau gaya konstruksi penyeimbang, seperti karung
        pasir atau pelat baja, untuk membantu kompatibilitas dan pemasangan.
    coupler_system:
      name: Sistem penghubung
      description: Jenis/sistem penghubung yang dipasang pada model lokomotif agar
        kompatibel dengan gerbong kereta api.
    court_surface_suitability:
      name: Kesesuaian permukaan lapangan
      description: Menunjukkan permukaan lapangan basket yang sesuai dengan desain
        sol luar sepatu, membantu pembeli memilih daya cengkeram dan ketahanan yang
        tepat untuk lapangan kayu dalam ruangan, aspal/beton luar ruangan, atau keduanya.
    cover_fit_style:
      name: Gaya pas penutup
      description: Menjelaskan bagaimana penutup tersebut terpasang di atas meja,
        memengaruhi tampilan dan tingkat perlindungan.
    cover_fit_type:
      name: Jenis pemasangan penutup
      description: Menunjukkan apakah penutup tersebut dibuat khusus (custom/semi-custom)
        atau universal, dan apakah ditujukan untuk penambatan di dalam air atau penggunaan
        penyimpanan/trailer.
    cowbell_beater_type:
      name: Jenis pemukul cowbell
      description: Jenis alat pemukul yang direkomendasikan untuk menghasilkan suara/finishing
        cowbell (jika ditentukan oleh produk).
    cowbell_mounting_method:
      name: Metode pemasangan cowbell
      description: Cara pemasangan/penggunaan cowbell yang tepat (digenggam vs dipasang
        pada perangkat keras).
    cowbell_sound_character:
      name: Karakter suara lonceng sapi
      description: Karakter nada umum yang digunakan dalam daftar (mendukung penemuan
        di luar ukuran).
    cradle_capacity:
      name: Kapasitas dudukan
      description: Menunjukkan apakah buaian tersebut dirancang untuk menampung satu
        bayi atau bayi kembar.
    craft_cutter_embosser_machine_operation:
      name: Pengoperasian mesin pemotong/pengembos kerajinan tangan
      description: Menentukan cara kerja mesin pemotong/pencetak timbul dari perspektif
        alur kerja pengguna (misalnya, engkol manual, tombol tekan listrik, dikontrol
        melalui aplikasi).
    craft_decoration_maker_accessories_included:
      name: Aksesori pembuat dekorasi kerajinan disertakan
      description: Daftar aksesori utama yang disertakan dengan alat pembuat dekorasi
        kerajinan (misalnya, pita/film awal, isi ulang stiker, kartrid glitter, alat
        pembersih).
    craft_foil_application_method:
      name: Metode aplikasi kertas foil kerajinan
      description: Menjelaskan bagaimana kertas foil kerajinan tersebut dimaksudkan
        untuk diaplikasikan/diaktifkan (perekat, panas, toner/reaktif, dll.).
    craft_foil_format:
      name: Format kertas foil kerajinan
      description: Menunjukkan format fisik kertas foil kerajinan tangan seperti yang
        dijual (misalnya, gulungan vs lembaran).
    craft_glue_finish:
      name: Lapisan akhir lem kerajinan
      description: Menggambarkan tampilan lem setelah mengering (misalnya, bening,
        putih/buram, tembus cahaya, mengkilap/matte).
    craft_magnet_application:
      name: Aplikasi magnet kerajinan
      description: Penggunaan utama yang dimaksudkan untuk kerajinan tangan atau permukaan
        pemasangan produk magnet tersebut.
    craft_magnet_holding_strength_level:
      name: Level kekuatan daya rekat magnet kerajinan
      description: Kategori kekuatan relatif untuk magnet kerajinan tangan untuk membantu
        pembeli memilih daya rekat yang sesuai untuk proyek mereka.
    craft_organizer_storage_features:
      name: Fitur penyimpanan organizer kerajinan
      description: Menjelaskan fitur pengorganisasian dan elemen penyimpanan internal
        dari organiser kerajinan (misalnya, pembatas yang dapat disesuaikan, laci,
        kantong transparan).
    craft_scoring_board_included_accessories:
      name: Aksesori yang disertakan bersama papan skor kerajinan tangan
      description: Aksesori yang disertakan dengan papan penggaris (misalnya, stylus
        penggaris/pelipat kertas, segitiga, alat amplop).
    craft_scoring_board_measurement_system:
      name: Sistem pengukuran papan skor kerajinan
      description: Menentukan sistem pengukuran yang tertera pada papan skor (imperial,
        metrik, ganda, atau tanpa tanda).
    craft_wire_finish_coating:
      name: Lapisan/pelapis kawat kerajinan
      description: Menentukan lapisan permukaan atau pelapis yang diterapkan pada
        kawat untuk warna, ketahanan terhadap korosi, atau perlindungan.
    craft_wood_surface_preparation:
      name: Persiapan permukaan kayu kerajinan
      description: Menunjukkan apakah permukaan kayu sudah siap untuk lapisan akhir/pengecatan
        atau memerlukan persiapan (misalnya, pengampelasan/pemberian lapisan dasar).
    crank_spindle_interface:
      name: Antarmuka poros engkol
      description: Menentukan sistem poros engkol yang didukung oleh braket bawah
        (misalnya, SRAM DUB, Square Taper), memastikan kompatibilitas antara crankset
        dan braket bawah.
    crankshaft_balance_type:
      name: Tipe keseimbangan poros engkol
      description: Menunjukkan apakah poros engkol seimbang secara internal (netral)
        atau seimbang secara eksternal (membutuhkan penyeimbang harmonik/bobot flywheel).
    crankshaft_bolt_pattern:
      name: Pola baut poros engkol
      description: Pola baut pada flensa belakang untuk pemasangan flywheel/pelat
        fleksibel.
    crankshaft_sensor_reluctor_type:
      name: Sensor poros engkol tipe reluktor
      description: Konfigurasi pemicu/roda reluktor sensor posisi poros engkol yang
        digunakan (jika berlaku).
    craps_accessories_included:
      name: Aksesori craps disertakan
      description: Mengidentifikasi aksesori tambahan khusus craps yang disertakan
        selain dadu/chip/tata letak.
    crash_cymbal_profile:
      name: Profil simbal crash
      description: Kelengkungan/profil keseluruhan simbal (seberapa menonjol lengkungannya),
        yang memengaruhi nada dan respons.
    crash_cymbal_sound_character:
      name: Karakter suara simbal crash
      description: Deskripsi karakter nada utama untuk suara simbal crash.
    crash_pad_size_class:
      name: Kelas ukuran matras panjat tebing
      description: Menunjukkan kategori ukuran umum dari matras panjat tebing, memberikan
        pembeli gambaran cepat tentang cakupan permukaan tanpa memerlukan dimensi
        yang tepat.
    crate_engine_assembly_level:
      name: Tingkat perakitan mesin dalam peti
      description: Seberapa lengkap mesin dalam peti kemasan saat dikirim (komponen
        utama apa saja yang disertakan).
    cream_base_ingredient:
      name: Bahan dasar krim
      description: Mengidentifikasi sumber utama krim, mencakup spesies susu dan alternatif
        nabati.
    cream_cheese_base:
      name: Dasar keju krim
      description: Mengidentifikasi sumber utama susu atau nabati yang digunakan untuk
        membuat keju krim, membantu pembeli dalam mempertimbangkan aspek diet, alergi,
        dan cita rasa.
    cream_cheese_form:
      name: Bentuk keju krim
      description: Menggambarkan bentuk fisik atau gaya tekstur keju krim (misalnya,
        balok, kocok, saus celup), yang memengaruhi kemudahan pengolesan dan tujuan
        penggunaannya.
    cream_variety:
      name: Ragam krim
      description: Mengidentifikasi jenis krim tertentu berdasarkan kandungan lemak,
        metode pengolahan, atau tujuan penggunaan kuliner (misalnya, Half & Half,
        Krim ganda, Krim masak).
    crib_accessory_features:
      name: Fitur aksesori tempat tidur bayi
      description: Mencantumkan fitur fungsional atau berorientasi pada kenyamanan
        yang spesifik untuk aksesori tempat tidur bayi dan balita, seperti sirkulasi
        udara atau tepi elastis.
    crib_bumper_features:
      name: Fitur pelindung ranjang bayi
      description: Menyoroti karakteristik fungsional khusus dari bantalan tempat
        tidur bayi.
    crib_conversion_kit_components:
      name: Komponen kit konversi tempat tidur bayi
      description: Mencantumkan bagian-bagian utama yang termasuk dalam kit sehingga
        pembeli dapat memverifikasi bahwa mereka memiliki semua yang dibutuhkan untuk
        pemasangan.
    cricket_ball_grade:
      name: Kelas bola kriket
      description: Menentukan tingkat kualitas atau standar permainan yang diinginkan
        dari bola tersebut.
    cricket_ball_piece_construction:
      name: Konstruksi bagian bola kriket
      description: Menunjukkan jumlah bagian luar atau bagian cetakan yang digunakan
        untuk membangun cangkang bola, indikator utama kualitas dan harga.
    cricket_ball_type:
      name: Jenis bola kriket
      description: Menentukan jenis bola kriket yang disertakan dengan produk atau
        menunjukkan jika tidak ada bola yang disertakan.
    cricket_bat_accessory_type:
      name: Jenis aksesori pemukul kriket
      description: Menentukan jenis aksesori atau perlengkapan perawatan pemukul kriket
        sehingga pembeli dapat dengan cepat memfilter produk yang mereka butuhkan.
    cricket_bat_size:
      name: Ukuran pemukul kriket
      description: Menunjukkan klasifikasi ukuran pemukul kriket standar (0–6, Harrow,
        SH, LH), yang biasanya dipilih berdasarkan usia dan tinggi badan pemain.
    cricket_bat_size_compatibility:
      name: Kompatibilitas ukuran pemukul kriket
      description: Mencantumkan ukuran pemukul bisbol yang sesuai dengan aksesori
        ini, untuk memastikan kompatibilitas yang tepat.
    cricket_helmet_role:
      name: Peran helm kriket
      description: Menunjukkan peran bermain yang dirancang untuk helm tersebut, seperti
        memukul bola atau menjaga gawang.
    cricket_leg_guard_type:
      name: Tipe pelindung kaki kriket
      description: Menunjukkan gaya spesifik pelindung kaki dalam kriket.
    cricket_player_role:
      name: Peran pemain kriket
      description: Menentukan peran utama yang dirancang untuk sepatu tersebut.
    cricket_protection_grade:
      name: Tingkat perlindungan cricket
      description: Menentukan klasifikasi tingkat perlindungan yang diberikan oleh
        produsen peralatan kriket.
    cricket_stump_base_type:
      name: Jenis dasar tiang kriket
      description: Menunjukkan gaya atau bahan dasar yang disertakan dengan tiang
        gawang, yang memengaruhi stabilitas dan kesesuaian dengan permukaan lapangan.
    cricket_stump_target_features:
      name: Fitur target tiang kriket
      description: Menyoroti fitur fungsional khas yang meningkatkan kegunaan, visibilitas,
        daya tahan, atau stabilitas pelatihan.
    cricket_stump_type:
      name: Jenis tiang kriket
      description: Mengkategorikan gaya atau konstruksi tiang gawang untuk membantu
        pembeli memilih antara tiang gawang pertandingan tradisional, varian latihan,
        atau model modern yang dilengkapi lampu.
    cricket_training_focus:
      name: Fokus latihan kriket
      description: Keterampilan atau disiplin dasar kriket yang dirancang untuk ditingkatkan
        oleh alat bantu ini.
    croquet_set_components_included:
      name: Komponen set kroket yang disertakan
      description: Mencantumkan semua komponen utama yang disertakan dalam set (misalnya,
        gawang, tiang, tas jinjing) sehingga pelanggan memahami dengan tepat apa yang
        mereka beli.
    cross_country_binding_system:
      name: Sistem pengikat lintas alam
      description: Menentukan standar pengikat ski lintas alam yang sesuai dengan
        lubang yang tersedia atau kompatibel dengan produk tersebut.
    cross_stitch_chart_symbol_type:
      name: Jenis simbol bagan sulaman silang
      description: Bagaimana bagan tersebut direpresentasikan (simbol, warna, atau
        keduanya).
    cross_stitch_finishing_type:
      name: Jenis penyelesaian sulaman silang
      description: Jenis lapisan akhir/penampilan yang diinginkan untuk proyek yang
        dijahit.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mekanisme penahan kain bingkai sulaman silang
      description: Menunjukkan bagaimana kain diamankan/ditegangkan pada bingkai (misalnya,
        klip, penjepit, paku payung), yang memengaruhi kemudahan penggunaan dan kompatibilitas
        kain.
    cross_stitch_frame_included_components:
      name: Bingkai sulaman silang termasuk komponen-komponennya
      description: Mencantumkan apa saja yang ada di dalam kotak (misalnya, hanya
        bingkai vs bingkai + penjepit + penyangga), mengurangi ambiguitas dan pengembalian
        barang.
    cross_stitch_frame_type:
      name: Jenis bingkai sulaman silang
      description: Menentukan konstruksi/tipe bingkai sulaman silang (cara kain dipegang),
        yang memengaruhi kegunaan dan kompatibilitas proyek.
    cross_stitch_pattern_technique:
      name: Teknik pola jahitan silang
      description: Teknik/gaya sulaman silang yang dibutuhkan sesuai dengan pola.
    crossbar_shape_profile:
      name: Bentuk/profil palang
      description: Menentukan bentuk aerodinamis/profil palang melintang.
    crossbar_style:
      name: Gaya palang
      description: Mengidentifikasi gaya konstruksi palang horizontal, membedakan
        palang kompetisi yang kaku dari palang latihan yang fleksibel atau hibrida.
    crossbow_type:
      name: Jenis busur silang
      description: Mengidentifikasi gaya desain fundamental busur silang, seperti
        compound, recurve, atau pistol. Gaya konstruksi menentukan kinerja, ukuran,
        dan kegunaan, sehingga pembeli sering kali memfilter berdasarkan hal tersebut.
    crossover_component_type:
      name: Jenis komponen crossover
      description: Mengidentifikasi topologi komponen utama yang digunakan dalam jaringan
        crossover pasif.
    crossover_configuration:
      name: Konfigurasi silang
      description: Menunjukkan apakah crossover menggunakan satu titik crossover atau
        beberapa titik (misalnya, desain 2 arah vs 3 arah).
    crossover_type:
      name: Jenis crossover
      description: Jenis jaringan crossover yang disertakan dalam set komponen.
    crown_profile:
      name: Profil bagian atas
      description: Menentukan tinggi/profil bagian atas tutup topi di atas pinggiran.
    crown_style:
      name: Gaya bagian atas
      description: Menentukan siluet atau profil keseluruhan bagian atas topi bowler.
    crust_taste_profile:
      name: Profil rasa kulit
      description: Menunjukkan apakah orientasi rasa bawaan dari kulit tersebut manis,
        gurih, atau netral.
    crystal_finish:
      name: Lapisan akhir kristal
      description: Menggambarkan lapisan akhir permukaan, lapisan, atau kondisi pemrosesan
        kristal lepas (misalnya, mentah, dipoles, diasah, dipotong segi, buram, dilapisi
        aura, diwarnai, diberi perlakuan panas).
    crystal_material:
      name: Bahan kristal
      description: Menentukan bahan yang digunakan untuk kristal pelindung jam tangan
        yang melindungi bagian muka jam.
    crystalline_finish_style:
      name: Gaya lapisan akhir kristal
      description: Tampilan kristal/berbulu yang khas yang dihasilkan oleh lilin sawit
        pada lilin yang sudah jadi.
    cucumber_variety:
      name: Varietas mentimun
      description: Menentukan kultivar atau varietas pasar mentimun (misalnya, Inggris,
        Persia, Kirby).
    cue_compatibility:
      name: Kompatibilitas tongkat
      description: Menunjukkan konfigurasi sambungan stik biliar yang dirancang untuk
        ditampung oleh wadah tersebut, seperti stik biliar satu bagian atau stik biliar
        dengan sambungan 3/4.
    cue_construction:
      name: Konstruksi tongkat
      description: Menunjukkan bagaimana stik biliar tersebut dibuat—jumlah bagian
        atau apakah itu komponen sebagian seperti hanya bagian pangkal atau hanya
        bagian poros—yang memengaruhi portabilitas dan kompatibilitas.
    cue_head_material:
      name: Bahan kepala tongkat
      description: Mengidentifikasi bahan kepala stik (bagian yang bersentuhan dengan
        keping hoki), yang memengaruhi daya tahan dan perlindungan permukaan.
    cue_sport_compatibility:
      name: Kompatibilitas olahraga biliar
      description: Menunjukkan cabang olahraga biliar mana yang menjadi target desain
        aksesori tersebut.
    cue_thread_size:
      name: Ukuran ulir stik biliar
      description: Menentukan spesifikasi ulir yang digunakan pada ekstensi, pelindung
        sambungan, baut pemberat, dan aksesori stik biliar lainnya untuk memastikan
        kesesuaian yang tepat.
    cue_tip_hardness:
      name: Kekerasan ujung stik biliar
      description: Menilai kekerasan ujung stik biliar yang memengaruhi kontrol dan
        umpan balik bola putih.
    cuff_height:
      name: Tinggi manset
      description: Menunjukkan ketinggian manset sepatu bot (rendah, sedang, tinggi,
        dapat dilepas/disesuaikan), yang memengaruhi dukungan dan fleksibilitas.
    cuff_position:
      name: Posisi manset
      description: Menunjukkan di bagian tubuh pengendara mana manset tali kekang
        dirancang untuk dipasang.
    cultivation_method:
      name: Metode budidaya
      description: Menjelaskan bagaimana sayuran tersebut dibudidayakan, mencakup
        teknik penanaman dan praktik pertanian.
    cup_type:
      name: Jenis cekungan
      description: Menunjukkan profil permukaan payet (datar vs cekung) dan kedalaman
        cekungan, yang dapat memengaruhi kilauan, tekstur, dan bagaimana posisinya
        saat dijahit atau dilekatkan.
    cupcake_size:
      name: Ukuran cupcake
      description: Menentukan kategori ukuran fisik kue cupcake yang dijual (misalnya,
        mini, standar, jumbo).
    curd_size:
      name: Ukuran curd
      description: Menentukan ukuran atau tekstur dadih keju cottage.
    cure_method:
      name: Metode pengawetan
      description: Menjelaskan proses yang diperlukan agar perekat mengeras atau mengering
        (misalnya, sinar UV, kelembapan udara, panas).
    curing_or_preparation_method:
      name: Metode pengawetan atau persiapan
      description: Menentukan bagaimana buah zaitun tersebut diawetkan atau dipersiapkan
        dengan cara lain (misalnya, diawetkan dengan air garam, diawetkan dengan minyak,
        dipanggang).
    curling_broom_head_material:
      name: Bahan kepala sapu curling
      description: Mengidentifikasi komposisi bahan utama dari kepala atau bantalan
        sapu.
    curling_broom_head_type:
      name: Jenis kepala sapu curling
      description: Menentukan gaya atau konstruksi kepala/bantalan sapu.
    curling_shoe_slider_material:
      name: Bahan slider sepatu curling
      description: Mengidentifikasi bahan utama sol sliding yang digunakan pada sepatu
        curling.
    curling_training_aid_type:
      name: Jenis alat bantu latihan curling
      description: Mengidentifikasi jenis alat bantu latihan curling.
    curry_variety:
      name: Varietas kari
      description: Mengklasifikasikan produk saus kari berdasarkan gaya atau resep
        kari spesifik yang dimaksudkan untuk dibuat, seperti Tikka Masala, Massaman,
        atau kari hijau Thailand, untuk memungkinkan penyaringan rasa/gaya yang tepat.
    cushion_rubber_profile:
      name: Profil karet bantalan
      description: Kode bentuk atau profil dari potongan karet bantalan rel.
    cushioning_level:
      name: Tingkat bantalan
      description: Menunjukkan jumlah bantalan di bawah kaki yang diberikan oleh kaus
        kaki untuk perlindungan terhadap benturan dan kenyamanan.
    custom_label_content_type:
      name: Jenis konten label kustom
      description: Menentukan informasi apa yang akan dikustomisasi pada label yang
        dijahit (misalnya, nama, logo, pesan, ukuran, simbol perawatan, informasi
        kontak).
    customization_type:
      name: Jenis kustomisasi
      description: Menentukan apakah jersey tersebut polos, jersey yang dikeluarkan
        pemain, atau jersey kustom dengan nama/nomor yang dipersonalisasi.
    cut_or_preparation_style:
      name: Gaya pemotongan atau penyiapan
      description: Menentukan bagaimana potongan sayuran dipotong atau disiapkan di
        dalam kaleng atau toples (misalnya, utuh, dadu, potongan memanjang).
    cut_resistance_rating:
      name: Peringkat ketahanan potong
      description: Menentukan tingkat ketahanan terhadap sayatan yang telah diuji
        secara formal pada barang tersebut.
    cut_type:
      name: Jenis potongan
      description: Menunjukkan apakah kain tersebut dijual per yard/meter, sebagai
        potongan siap pakai, atau dalam bentuk gulungan/bolt.
    cutting_application:
      name: Aplikasi pemotongan
      description: Kegunaan utama penggunaan gunting.
    cutting_mat_grid_style:
      name: Gaya grid alas potong
      description: Gaya panduan tercetak pada permukaan alas.
    cutting_mat_intended_use:
      name: Penggunaan yang dimaksudkan untuk alas pemotong
      description: Penggunaan utama alas potong ini adalah untuk permukaan kerja/kerajinan.
    cv_boot_clamp_type:
      name: Tipe penjepit bot CV
      description: Menentukan jenis klem/pita yang digunakan untuk mengencangkan karet
        pelindung CV.
    cv_boot_kit_contents:
      name: Isi kit bot CV
      description: Mencantumkan apa saja yang termasuk dalam paket bot CV (misalnya,
        klem, paket gemuk, tali pengikat).
    cv_boot_material:
      name: Bahan bot CV
      description: Menentukan konstruksi bahan utama dari bot CV.
    cv_boot_position:
      name: Posisi bot CV
      description: Menentukan apakah bot CV cocok untuk posisi sambungan CV bagian
        dalam (inboard) atau luar (outboard) pada poros.
    cycling_apparel_fit:
      name: Kesesuaian pakaian bersepeda
      description: Menjelaskan potongan pakaian, menunjukkan kekencangan dan aerodinamika
        yang diinginkan (misalnya, Race, Relaxed).
    cylinder_head_assembly:
      name: Rakitan kepala silinder
      description: Menentukan tingkat kelengkapan kepala silinder saat dijual (misalnya,
        dirakit lengkap dengan komponen valvetrain terpasang dibandingkan dengan cetakan
        kosong/belum dirakit).
    cylinder_head_material_grade:
      name: Kelas material kepala silinder
      description: Menentukan material dan mutu yang digunakan untuk pengecoran kepala
        silinder.
    cylinder_head_position:
      name: Posisi kepala silinder
      description: Mengidentifikasi bank/sisi atau orientasi mana kepala silinder
        cocok pada mesin multi-bank (misalnya, sisi kiri/kanan atau bank 1/bank 2).
    cymbal_alloy:
      name: Paduan simbal
      description: Paduan/komposisi simbal dalam perangkat drum.
    cymbal_application:
      name: Aplikasi simbal
      description: Aplikasi permainan utama yang menjadi tujuan desain/pemasaran simbal
        ini.
    cymbal_arm_mounting_interface:
      name: Antarmuka pemasangan lengan simbal
      description: Menentukan bagaimana lengan simbal terpasang pada bagian perangkat
        keras drum lainnya (misalnya, penjepit, rak, penerima dudukan).
    cymbal_arm_rotation_positioning_features:
      name: Fitur rotasi/pemosisian lengan simbal
      description: Menentukan fitur pemosisian yang memengaruhi bagaimana lengan dapat
        diatur sudut/diputar dan dikunci.
    cymbal_arm_style:
      name: Gaya lengan simbal
      description: Menentukan apakah lengan simbal lurus atau melengkung, untuk preferensi
        jangkauan dan penempatan.
    cymbal_drum_case_wheel_configuration:
      name: Konfigurasi roda wadah simbal dan drum
      description: Menunjukkan apakah peti tersebut memiliki roda dan (jika ada) konfigurasi
        roda untuk pengangkutan dengan cara digerakkan.
    cymbal_hammering_style:
      name: Gaya pukulan simbal
      description: Proses penempaan/tampilan memengaruhi kompleksitas dan nuansa.
    cymbal_kit_components_included:
      name: Termasuk komponen kit simbal
      description: Menentukan jenis simbal apa saja yang termasuk dalam kit/paket
        simbal ride (selain simbal ride itu sendiri).
    cymbal_kit_items_included:
      name: Termasuk item kit simbal
      description: Mengidentifikasi simbal mana yang termasuk dalam kit/paket (berdasarkan
        jenis simbal).
    cymbal_lathing:
      name: Pembubutan simbal
      description: Menentukan apakah/seberapa banyak permukaan simbal yang dibubut
        (dialur) dibandingkan dengan yang tidak dibubut/mentah.
    cymbal_playing_style_genre:
      name: Gaya/genre permainan simbal
      description: Mengidentifikasi konteks pertunjukan khas yang dirancang untuk
        simbal tersebut (misalnya, simbal tari perut vs simbal tangan marching/orkestra).
    cymbal_set_configuration:
      name: Konfigurasi set simbal
      description: Menunjukkan apakah produk tersebut dijual sebagai simbal tunggal,
        sepasang yang serasi, atau satu set multi-pasangan (misalnya, untuk instruksi
        kelompok).
    cymbal_sound_character:
      name: Karakter suara simbal
      description: Menjelaskan profil nada/karakteristik keseluruhan simbal yang digunakan
        untuk pendeteksian (misalnya, cerah vs gelap).
    cymbal_sustain:
      name: Durasi bunyi simbal
      description: Durasi bunyi simbal setelah dipukul.
    cymbal_type:
      name: Jenis simbal
      description: Menentukan peran fungsional simbal yang ingin ditiru oleh pad simbal
        elektronik.
    cymbal_volume_level:
      name: Tingkat volume simbal
      description: Kategori kekerasan/output suara simbal yang dirasakan.
    cymbal_weight_class:
      name: Kelas berat simbal
      description: Menunjukkan kelas berat simbal, yang memengaruhi nada, volume,
        dan respons.
    dairy_heat_treatment:
      name: Perlakuan panas pada produk susu.
      description: Mengidentifikasi tingkat pemrosesan atau pasteurisasi yang diterapkan
        pada krim (misalnya, Mentah, Dipasteurisasi, UHT), yang memengaruhi umur simpan,
        rasa, dan kinerja pengocokan.
    damage_type:
      name: Jenis kerusakan
      description: Menentukan jenis kerusakan kaca depan yang dimaksudkan untuk diperbaiki
        oleh kit ini.
    damper_pedal_style:
      name: Gaya pedal peredam
      description: Menjelaskan gaya fisik pedal peredam yang digunakan pada keyboard/piano
        digital.
    damping_adjustability:
      name: Pengaturan peredaman
      description: Menunjukkan parameter peredaman dan/atau ketinggian ride mana yang
        dapat disesuaikan pada peredam kejut.
    damping_level:
      name: Tingkat peredaman
      description: Menunjukkan jumlah relatif pengurangan volume dan sustain yang
        diberikan oleh mute.
    dance_occasion:
      name: Acara dansa
      description: Menunjukkan konteks penggunaan yang dimaksudkan dari pakaian tersebut
        dalam praktik atau pertunjukan tari.
    darbuka_accessories_included:
      name: Termasuk aksesori darbuka
      description: Daftar aksesori umum yang disertakan bersama darbuka.
    darbuka_body_finish_type:
      name: Jenis finishing bodi darbuka
      description: Menjelaskan lapisan luar, pelapis, atau perlakuan dekoratif pada
        badan darbuka.
    darbuka_head_material:
      name: Bahan kepala darbuka
      description: Menentukan bahan membran drumhead pada darbuka.
    dart_barrel_material:
      name: Bahan barel panah lempar
      description: Menentukan bahan utama barel panah lempar, yang memengaruhi distribusi
        berat, daya tahan, dan harga.
    dart_shaft_design:
      name: Desain batang panah lempar
      description: Mengklasifikasikan desain mekanis batang, seperti apakah batang
        tersebut tetap, berputar, teleskopik, atau terintegrasi dengan ulir, yang
        memengaruhi kinerja dan harga.
    dart_shaft_thread_type:
      name: Jenis ulir batang panah lempar
      description: Menunjukkan ukuran/tipe ulir yang digunakan untuk memasang batang
        ke dalam barel panah lempar, memastikan kompatibilitas antara batang dan barel.
    dart_thread_size:
      name: Ukuran ulir dart
      description: Menentukan ukuran/standar ulir yang kompatibel dengan komponen
        tersebut, memastikan kecocokan antara batang, ujung, dan barel.
    dart_tip_compatibility:
      name: Kompatibilitas ujung panah lempar
      description: Menunjukkan apakah bagian panah lempar tersebut ditujukan untuk
        panah lempar berujung baja, berujung lunak, atau kedua jenis panah lempar
        tersebut.
    dart_tip_connection_type:
      name: Jenis koneksi ujung panah lempar
      description: Menjelaskan spesifikasi ulir atau sistem pemasangan yang digunakan
        ujung panah lempar untuk menempel pada barel atau batang panah lempar, sehingga
        memastikan kompatibilitas.
    dartboard_tournament_approval:
      name: Persetujuan turnamen papan panah lempar
      description: Menunjukkan apakah papan panah lempar tersebut secara resmi disetujui
        oleh federasi atau liga panah lempar tertentu.
    dartboard_type:
      name: Jenis papan panah lempar
      description: Mengklasifikasikan papan panah lempar berdasarkan teknologi konstruksi
        dan kompatibilitas panah lempar (misalnya, bulu, elektronik, magnetik).
    dash_cover_construction_type:
      name: Jenis konstruksi penutup dasbor
      description: Menjelaskan bagaimana penutup dasbor dibentuk/distrukturkan (misalnya,
        dicetak vs dijahit) yang memengaruhi ketepatan pemasangan dan penampilan.
    dash_cover_cutout_configuration:
      name: Konfigurasi potongan penutup dasbor
      description: Menunjukkan lubang/sensor dasbor OEM mana yang sesuai dengan potongan
        atau bentuk penutupnya.
    dashboard_accessory_position:
      name: Posisi aksesori dasbor
      description: Menentukan di mana pada/di sekitar dasbor aksesori tersebut dimaksudkan
