      name: Hidangan makan
      description: Mengidentifikasi waktu makan yang umum untuk produk tersebut.
    meal_preparation_state:
      name: Kondisi persiapan makanan
      description: Menunjukkan berapa banyak persiapan yang dibutuhkan sebelum dikonsumsi
