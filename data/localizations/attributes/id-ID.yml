    teasing_tool_style:
      name: Gaya alat menggoda
      description: Gaya fisik atau bentuk alat penata rambut yang digunakan untuk
        membuka dan memadukan serat rambut (misalnya, sikat, sisir, garpu).
    tee_base_style:
      name: Gaya dasar kaos
      description: Mengidentifikasi desain struktural dasar penyangga bola pada alat
