    tar_tuning_system:
      name: Sistem penyetelan Tar
      description: Menentukan cara penyetelan tar (cara pengaturan tegangan kepala).
    target_components:
      name: Komponen target
      description: Menentukan komponen saluran masuk bahan bakar/udara mana yang dimaksudkan
