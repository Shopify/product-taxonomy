    satin_ribbon_face_type:
      name: Jenis permukaan pita satin
      description: Menentukan apakah pita memiliki lapisan satin di satu atau kedua
        sisinya.
    sauce_consistency:
      name: Konsistensi saus
      description: Menjelaskan tekstur atau tingkat kekentalan saus pizza.
    sauce_product_form:
      name: Bentuk produk saus
      description: Menunjukkan bentuk fisik produk saus, seperti cair, minyak, pasta,
        bubuk, serpihan, atau sirup.
    sauce_variety:
      name: Varietas saus
      description: Mengidentifikasi gaya atau keluarga resep spesifik dari saus putih
        atau krim (misalnya, Alfredo, Béchamel, Hollandaise).
    saxophone_body_finish:
      name: Lapisan akhir bodi saksofon
      description: Menjelaskan lapisan/pelapisan utama pada badan saksofon (terpisah
