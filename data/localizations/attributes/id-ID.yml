      name: Jenis ujung kail
      description: Menjelaskan bentuk atau jenis penajaman ujung kail pancing, yang
        memengaruhi daya penetrasi dan kemampuan menahan ikan.
    hook_shank_length:
      name: Panjang tangkai kail
      description: Menunjukkan klasifikasi panjang relatif tangkai kail (misalnya,
        pendek, panjang) untuk perbandingan visual dan fungsional yang cepat.
    hooks_eyes_attachment_method:
      name: Metode pemasangan kait & lubang
      description: Cara memasang kait & lubang pada pakaian atau proyek.
    hop_up_type:
      name: Jenis hop-up
      description: Menjelaskan sistem hop-up yang digunakan untuk memberikan putaran
        balik pada BB untuk jangkauan dan akurasi.
    horse_blanket_type:
      name: Jenis selimut kuda
      description: Menentukan gaya utama atau tujuan penggunaan selimut atau kain
        penutup kuda.
    horse_brush_type:
      name: Jenis sikat kuda
      description: Mengklasifikasi sikat berdasarkan gaya perawatan atau tujuan penggunaannya,
        yang memungkinkan pelanggan untuk memfilter tanpa mengganggu hierarki kategori.
    horse_care_purpose:
      name: Tujuan perawatan kuda
      description: Tujuan fungsional utama produk ini dalam perawatan kuda yang meliputi
        kebutuhan kesehatan, perawatan, dan pengelolaan.
    horse_feed_stage:
      name: Tahap pemberian pakan kuda
      description: Menunjukkan tahap kehidupan atau status fisiologis kuda yang menjadi
        dasar formulasi pakan tersebut.
    horse_groomer_type:
      name: Jenis alat perawatan kuda
      description: Mengklasifikasi gaya alat perawatan sehingga pembeli dapat dengan
        cepat menemukan alat spesifik yang mereka butuhkan.
    horse_leg_protection_type:
      name: Jenis pelindung kaki kuda
      description: Mengklasifikasi gaya atau fungsi spesifik dari sepatu kuda, perban,
        atau balutan kaki kuda.
    horse_model_breed:
      name: Ras model kuda
      description: Menentukan ras kuda yang digambarkan oleh model skala (jika ada).
    hosiery_toe_style:
      name: Gaya ujung kaki hosiery
      description: Menentukan konstruksi bagian ujung kaki hosiery, yang penting untuk
        daya tahan dan kompatibilitas dengan alas kaki ujung terbuka.
    hot_air_balloon_basket_type:
      name: Jenis keranjang balon udara panas
      description: Menentukan konfigurasi/gaya keranjang utama (misalnya, standar
        olahraga, komersial berkapasitas tinggi, terpartisi, aksesibel/pintu) yang
        digunakan untuk naik dan pengoperasian yang dimaksudkan.
    hot_air_balloon_burner_type:
      name: Jenis pembakar balon udara panas
      description: Jenis/konfigurasi sistem pembakar yang terpasang pada balon.
    hot_air_balloon_envelope_material:
      name: Bahan selubung balon udara panas
      description: Kain/bahan utama yang digunakan untuk selubung balon (kanopi).
    hotfix_application_tool:
      name: Alat aplikasi hotfix
      description: Alat aplikasi hotfix yang direkomendasikan atau sumber panas yang
        digunakan untuk memasang rhinestone hotfix.
    hub_axle_type:
      name: Jenis poros hub
      description: Mengidentifikasi sistem antarmuka/penahan poros yang dirancang
        untuk hub tersebut (rilis cepat, poros tembus, dll.).
    hub_motor_type:
      name: Jenis motor hub
      description: Menjelaskan gaya konstruksi motor hub (dengan roda gigi, penggerak
        langsung, sikat, tanpa sikat) untuk memberi informasi kepada pembeli tentang
        karakteristik torsi, berat, dan efisiensi.
    hula_hoop_construction_type:
      name: Jenis konstruksi hula hoop
      description: Menjelaskan cara pembuatan/perakitan hoop.
    hula_hoop_features:
      name: Fitur hula hoop
      description: Menyoroti fitur fungsional atau desain penting dari hula hoop.
    hull_design:
      name: Desain lambung
      description: Menjelaskan bentuk lambung yang memengaruhi kinerja dan karakteristik
        penanganan.
    hull_type:
      name: Jenis lambung
      description: Menjelaskan bentuk lambung yang memengaruhi kinerja dan stabilitas.
    humidifier_refill_medium_type:
      name: Jenis media isi ulang humidifier
      description: Mengidentifikasi media penahan kelembapan/isi ulang yang digunakan
        oleh humidifier casing (bagian yang dibasahi atau diganti).
    humidifier_refill_method:
      name: Metode pengisian ulang humidifier
      description: Menjelaskan cara mengisi ulang humidifier dengan uap air atau menggantinya.
    humidifying_medium:
      name: Media pelembap
      description: Mengidentifikasi elemen/media pelembap yang digunakan oleh produk
        (apa yang dibasahi/diaktifkan).
    hummus_base_ingredient:
      name: Bahan dasar hummus
      description: Mengidentifikasi jenis kacang-kacangan atau sayuran utama yang
        digunakan untuk membuat hummus.
    hunting_call_type:
      name: Jenis panggilan berburu
      description: Mengklasifikasi gaya atau mekanisme pengoperasian utama dari alat
        panggil (misalnya, ditiup dengan mulut, elektronik, kotak) sehingga pemburu
        dapat dengan cepat memilih format yang paling sesuai dengan kebutuhan dan
        tingkat keahlian mereka.
    hunting_dog_collar_function:
      name: Fungsi kalung anjing pemburu
      description: Mengklasifikasi gaya atau tujuan fungsional utama dari kalung tersebut,
        yang membantu pembeli menyaring produk berdasarkan fungsi seperti pelacakan,
        pelatihan, visibilitas, atau penggunaan standar.
    hvac_control_functions:
      name: Fungsi kontrol HVAC
      description: Menunjukkan fungsi HVAC/pencairan es/aliran udara mana yang dikendalikan
        oleh unit (mekanis atau elektronik).
    hybrid_drivetrain_configuration:
      name: Konfigurasi penggerak hibrida
      description: Menunjukkan arsitektur sistem PHEV yang menjelaskan bagaimana motor
        listrik dan mesin pembakaran menyediakan tenaga penggerak.
    hybrid_system_type:
      name: Jenis sistem hibrida
      description: Mengklasifikasi arsitektur hibridisasi yang digunakan oleh kendaraan.
    hybrid_truck_cab_type:
      name: Tipe kabin truk hibrida
      description: Menentukan konfigurasi kabin truk, yang memengaruhi kapasitas tempat
        duduk dan ruang interior.
    hydration_bag_features:
      name: Fitur tas hidrasi
      description: Menyoroti fitur desain atau fungsional penting yang khusus untuk
        kantong hidrasi.
    hydration_belt_features:
      name: Fitur sabuk hidrasi
      description: Mencantumkan fitur bawaan penting yang meningkatkan kegunaan, keamanan,
        atau kenyamanan sabuk hidrasi.
    hydration_bladder_compatibility:
      name: Kompatibilitas kantong hidrasi
      description: Menunjukkan apakah rompi menyertakan atau mendukung sistem kantong
        hidrasi.
    hydration_mouthpiece_style:
      name: Gaya corong hidrasi
      description: Menentukan desain atau gaya fungsional corong atau katup sistem
        hidrasi, yang membantu pembeli memilih antarmuka minum yang mereka sukai dan
        memastikan kompatibilitas.
    hydration_pack_style:
      name: Gaya paket hidrasi
      description: Menentukan gaya struktural paket hidrasi, seperti ransel atau rompi,
        untuk membantu penyaringan kecocokan dan kasus penggunaan.
    hydration_system_insulation:
      name: Insulasi sistem hidrasi
      description: Menunjukkan apakah wadah dan/atau selang minum diinsulasi untuk
        membantu menjaga suhu cairan dalam kondisi panas atau dingin.
    hydration_valve_type:
      name: Jenis katup hidrasi
      description: Mengidentifikasi gaya katup minum atau corong yang disertakan dengan
        sistem atau botol, mencakup desain katup gigit dan nozel aliran tinggi yang
        umum.
    hydraulic_fluid_type:
      name: Jenis cairan hidrolik
      description: Menentukan jenis cairan rem yang dirancang untuk digunakan pada
        tuas rem hidrolik sepeda. Informasi ini sangat penting untuk pemeliharaan
        dan keselamatan.
    hydrogenation_level:
      name: Tingkat hidrogenasi
      description: Menunjukkan apakah lemak tidak terhidrogenasi, terhidrogenasi sebagian,
        atau terhidrogenasi sepenuhnya, yang memengaruhi kandungan lemak trans dan
        kinerja dalam memanggang.
    hydrophobicity_level:
      name: Tingkat hidrofobisitas
      description: Menunjukkan tingkat efek air yang membentuk butiran/mengalir sebagai
        lapisan yang diklaim oleh produk.
    ice_cream_format:
      name: Format es krim
      description: Menjelaskan bentuk fisik atau penyajian produk es krim (misalnya,
        pint, batangan, mochi).
    ice_skate_sharpener_type:
      name: Jenis pengasah sepatu luncur es
      description: Mengklasifikasi desain atau format keseluruhan alat pengasah (batu
        asah genggam, mesin listrik, jig, dll.).
    ice_temperature_suitability:
      name: Kesesuaian suhu es
      description: Menunjukkan kisaran suhu es yang menjadi target formulasi lilin
        tongkat hoki, yang memengaruhi kinerja dan sifat anti-salju.
    icing_sugar_variety:
      name: Ragam gula halus
      description: Mengklasifikasi formulasi atau jenis fungsional gula halus (misalnya,
        fondant, bubuk salju yang tidak meleleh, berwarna, beraroma).
    ignition_coil_configuration:
      name: Konfigurasi koil pengapian
      description: Menentukan bentuk koil pengapian (koil tunggal/koil pada busi,
        paket koil multi-tower berdasarkan jumlah silinder, rel/kaset koil, atau tipe
        distributor).
    ignition_lead_compliance_standard:
      name: Standar kepatuhan kabel pengapian
      description: Standar industri formal atau sertifikasi yang dipenuhi oleh kabel
        pengapian, sebagaimana diklaim oleh produsen (misalnya, SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Bahan insulasi kabel pengapian
      description: Bahan insulasi/selubung utama yang digunakan pada kabel pengapian
        (insulasi kabel luar).
    ignition_lead_set_type:
      name: Jenis set kabel pengapian
      description: Apakah produk berupa kabel pengapian tunggal atau satu set lengkap,
        dan apa tujuan penggunaan set tersebut.
    ignition_lead_terminal_type:
      name: Jenis terminal kabel pengapian
      description: Jenis terminal/konektor yang digunakan di ujung kabel pengapian
        (misalnya, terminal busi dan gaya terminal koil/distributor).
    illumination_type:
      name: Jenis iluminasi
      description: Menentukan apakah dan bagaimana bola diterangi untuk permainan
        malam hari (misalnya, cahaya berpendar, LED yang diaktifkan oleh benturan).
    immobilizer_installation_type:
      name: Jenis pemasangan immobilizer
      description: Menunjukkan bagaimana immobilizer dipasang atau dihubungkan ke
        kendaraan.
    immobilizer_unlock_method:
      name: Metode membuka kunci immobilizer
      description: Menentukan cara mengaktifkan/menonaktifkan atau membuka kunci immobilizer.
    impact_protection_certifications:
      name: Sertifikasi perlindungan benturan
      description: Menyebutkan standar keselamatan spesifik yang dipenuhi atau dilampaui
        oleh bantalan pelindung.
    impact_protection_level:
      name: Tingkat perlindungan benturan
      description: Menentukan tingkat perlindungan benturan atau teknologi yang ditawarkan
        oleh pelindung kemaluan atletik.
    impact_protection_rating:
      name: Peringkat perlindungan benturan
      description: Menentukan tingkat perlindungan benturan yang tersertifikasi sesuai
        standar (misalnya, EN 1621-1 Level 1, EN 14120 Level 2), yang membantu pengendara
        menyaring untuk mendapatkan perlindungan tingkat yang lebih tinggi.
    impact_surface_material:
      name: Bahan permukaan benturan
      description: Menjelaskan bahan permukaan benturan/tumbukan utama untuk keamanan
        dan rasa (misalnya, busa, plastik).
    incense_base_material:
      name: Bahan dasar dupa
      description: Bahan dasar/pengikat utama yang digunakan untuk membuat dupa (berbasis
        bubuk) dalam kit ini.
    incense_making_method:
      name: Metode pembuatan dupa
      description: Proses pembuatan kerajinan yang didukung oleh kit ini.
    incense_tool_type:
      name: Jenis alat dupa
      description: Menentukan jenis alat pembuatan dupa yang digunakan pada produk
        ini (digunakan untuk membentuk, mengukur, menekan, mencampur, atau mengeringkan
        dupa).
    incline_adjustment_type:
      name: Jenis penyesuaian kemiringan
      description: Menjelaskan bagaimana (atau apakah) kemiringan dapat diubah selama
        latihan.
    included_accessories:
      name: Termasuk aksesori
      description: Daftar tersebut mencakup aksesori tambahan seperti kepala/mata
        bor cadangan, kotak penyimpanan, kabel pengisi daya, atau adaptor AC.
    included_case_type:
      name: Termasuk jenis kotak
      description: Jenis tas pembawa/penyimpanan yang disertakan dengan saksofon bas
        (jika ada).
    included_components:
      name: Komponen yang disertakan
      description: Mencantumkan apa saja yang termasuk dalam paket (berguna untuk
        set peralatan dan bundel).
    included_fastener_components:
      name: Komponen pengikat yang disertakan
      description: Menentukan apakah produk berupa set kait dan lubang, hanya kait,
        hanya lubang, atau varian penutup pakaian terkait.
    included_hydration_vessel_type:
      name: Jenis wadah hidrasi yang disertakan
      description: Mengidentifikasi gaya wadah hidrasi yang disediakan atau didukung
        oleh sabuk.
    included_items_woodwind_instrument:
      name: Barang yang disertakan (alat musik tiup kayu)
      description: Daftar barang yang umumnya disertakan dalam paket saksofon bas.
    included_materials:
      name: Material yang disertakan
      description: Menunjukkan komponen apa saja yang termasuk dalam pembelian pola
        (hanya pola vs pola + bahan).
    included_mounting_accessories:
      name: Aksesori pemasangan yang disertakan
      description: Daftar aksesori pemasangan/sambungan yang disertakan dengan speakerphone.
    included_pump_type:
      name: Jenis pompa yang disertakan
      description: Mengidentifikasi jenis pompa yang disertakan atau terintegrasi
        dengan kasur udara.
    included_scraper_implement_type:
      name: Jenis penggesek yang disertakan
      description: Menunjukkan alat permainan yang disertakan dengan alat musik scraper
        (misalnya, stik/rod gesek, sikat kawat).
    indicator_design:
      name: Desain indikator
      description: Mengklasifikasi bentuk fisik atau gaya indikator gigitan ikan.
    indicator_functions_tracked:
      name: Fungsi indikator yang dilacak
      description: Mencantumkan metrik permainan spesifik yang dilacak oleh indikator,
        seperti bola, strike, out, inning, jumlah lemparan, over, wicket, skor, atau
        down.
    indoor_outdoor_use:
      name: Penggunaan di dalam/luar ruangan
      description: Menunjukkan apakah mainan bowling ini ditujukan untuk penggunaan
        di dalam ruangan, di luar ruangan, atau keduanya.
    inflatable_decoration_items_included:
      name: Barang dekorasi tiup yang disertakan
      description: Mencantumkan aksesori utama yang disertakan dengan dekorasi tiup
        (misalnya, kipas peniup, pasak, tali pengikat).
    inflatable_decoration_type:
      name: Jenis dekorasi tiup
      description: Menentukan jenis dekorasi pesta tiup (bentuk/faktor ukuran) untuk
        mendukung penelusuran dan penyaringan.
    inflatable_raft_float_features:
      name: Fitur rakit/pelampung tiup
      description: Fitur fungsional yang terdapat pada rakit/pelampung tiup.
    inflation_method_included:
      name: Metode inflasi yang disertakan
      description: Menentukan jenis solusi inflasi ban yang disertakan dalam perlengkapan
        perbaikan, jika ada.
    infused_scent:
      name: Aroma infusi
      description: Mengidentifikasi aditif aroma atau rasa yang diresapkan ke dalam
        bahan umpan.
    ingredient_base_type:
      name: Jenis bahan dasar
      description: Mengidentifikasi bahan dasar utama yang disediakan untuk fermentasi
        (misalnya, konsentrat jus anggur vs jus segar vs konsentrat buah).
    ingredient_physical_form:
      name: Bentuk fisik bahan
      description: Menentukan bentuk fisik bahan pewangi yang disediakan (digunakan
        untuk penanganan, pengukuran, dan formulasi).
    ingredient_processing_method:
      name: Metode pengolahan bahan
      description: Menentukan teknik pengolahan utama yang diterapkan pada bahan (misalnya,
        dikering-bekukan, dipanggang, difermentasi).
    ink_colors_included:
      name: Warna tinta yang disertakan
      description: Menentukan warna tinta yang disertakan pada bantalan stempel dalam
        set.
    ink_pad_application_method:
      name: Metode aplikasi bantalan tinta
      description: Cara tinta dikeluarkan/digunakan dari bantalan (bantalan stempel
        tradisional vs aplikator vs bantalan ujung kuas).
    ink_pad_permanence:
      name: Ketahanan bantalan tinta
      description: Apakah tinta yang dicap bersifat permanen dan/atau arsip (tahan
        pudar dan air setelah kering).
    ink_pad_size:
      name: Ukuran bantalan tinta
      description: Ukuran/bentuk standar permukaan/wadah bantalan tinta.
    ink_pad_special_effects:
      name: Efek khusus bantalan tinta
      description: Efek visual/fungsional khusus dari tinta saat dicap (misalnya,
        metalik, berkilau).
    ink_permanence:
      name: Ketahanan tinta
      description: Menunjukkan apakah tinta sumi kering dimaksudkan bersifat permanen/arsip
        atau dapat dicuci/tidak permanen.
    ink_preparation_required:
      name: Persiapan tinta yang diperlukan
      description: Menunjukkan apakah tinta sumi siap pakai atau perlu diencerkan
        dengan air atau digiling sebelum digunakan.
    inline_skate_brake_type:
      name: Jenis rem sepatu roda inline
      description: Menentukan konfigurasi rem yang disertakan pada sepatu roda inline,
        seperti rem tumit yang dapat dilepas atau tanpa rem.
    inner_tent_configuration:
      name: Konfigurasi tenda bagian dalam
      description: Menentukan konfigurasi atau gaya tenda bagian dalam, misalnya sisipan
        penuh, sisipan jaring, atau lapisan termal.
    innerspring_coil_type:
      name: Jenis pegas innerspring
      description: Menentukan gaya konstruksi sistem pegas innerspring di dalam kasur,
        yang memengaruhi penopang, isolasi gerakan, dan harga.
    input_connector_type:
      name: Jenis konektor input
      description: Menentukan jenis konektor input audio yang digunakan oleh pedal
        (biasanya 1/4 inci TS).
    input_valve_type:
      name: Jenis katup masukan
      description: Menunjukkan standar katup yang ada pada ban/roda sepeda yang dihubungkan
        oleh adaptor.
    insecticide_treatment:
      name: Perawatan insektisida
      description: Menunjukkan apakah kelambu telah diberi perlakuan insektisida di
        pabrik dan, jika ya, jenis perlakuan yang digunakan untuk perlindungan tambahan.
    insert_coverage_area:
      name: Area cakupan inset
      description: Menentukan bagian kaki mana yang dirancang untuk ditutupi oleh
        inset (misalnya, sepanjang kaki, hanya tumit).
    insert_length_type:
      name: Jenis panjang sisipan
      description: Menunjukkan seberapa banyak bagian alas kaki yang ditutupi oleh
        penyangga lengkung.
    inside_message_type:
      name: Jenis pesan internal
      description: Menunjukkan apakah kartu menyertakan pesan yang sudah dicetak di
        bagian dalam, dan apakah pesan tersebut dapat disesuaikan.
    insole_attachment_method:
      name: Metode pemasangan insole
      description: Menentukan bagaimana penyangga lengkung kaki tetap berada di tempatnya
        di dalam sepatu (lepas-masuk, berperekat, velkro, dll.).
    insole_material:
      name: Bahan sol dalam
      description: Menjelaskan bahan alas kaki atau sol bagian dalam yang menjadi
        tumpuan kaki, yang memengaruhi bantalan dan dukungan.
    installation_fabrication_level:
      name: Tingkat fabrikasi instalasi
      description: Menunjukkan jumlah tipikal fabrikasi atau modifikasi khusus yang
        diperlukan untuk memasang kit tersebut.
    installation_location:
      name: Lokasi pemasangan
      description: Menentukan titik pemasangan tipikal untuk sensor tekanan oli dalam
        sistem oli mesin (misalnya, lubang saluran oli blok mesin, rumah filter, pelat
        sandwich, atau pemasangan saluran jarak jauh).
    installation_method:
      name: Metode pemasangan
      description: Menentukan bagaimana alas atau ubin dipasang atau diintal di lantai.
    instant_coffee_form:
      name: Bentuk kopi instan
      description: Menjelaskan bentuk fisik kopi instan yang disediakan, yang memengaruhi
        metode penyajian dan usia simpan.
    instep_coverage:
      name: Cakupan punggung kaki
      description: Menentukan apakah produk tersebut hanya melindungi tulang kering
        atau melindungi tulang kering dan punggung kaki/telapak kaki.
    instruction_format:
      name: Format instruksi
      description: Format petunjuk yang disertakan dalam kit.
    instrument_cleaning_swab_form_factor:
      name: Bentuk faktor kapas pembersih instrumen
      description: Menentukan gaya fisik swab (misalnya, kain tarik vs sistem batang/sikat)
        agar sesuai dengan preferensi pemain dan batasan instrumen.
    instrument_dimensions_unit_context:
      name: Konteks unit dimensi instrumen
      description: Menjelaskan apa yang dimaksud dengan pengukuran Tinggi/Lebar/Panjang
        yang diberikan (misalnya, keseluruhan instrumen, panjang tabung tunggal, tinggi
        dudukan).
    instrument_electronics_type:
      name: Jenis elektronik instrumen
      description: Menunjukkan apakah sistem pickup/preamp instrumen tersebut aktif
        atau pasif.
    instrument_key:
      name: Kunci instrumen
      description: Menentukan penanda nada dasar recorder yang digunakan dalam katalog
        (umumnya C atau F untuk recorder berukuran besar).
    instrument_level:
      name: Tingkat instrumen
      description: Target level pemain untuk instrumen yang ditawarkan.
    instrument_part_mounting_method:
      name: Metode pemasangan bagian instrumen
      description: Menentukan bagaimana bagian tersebut dipasang atau diinstal (misalnya,
        dijepit vs direkatkan vs disekrup).
    instrument_parts_included:
      name: Bagian instrumen yang disertakan
      description: Mencantumkan komponen/bagian utama yang disertakan dalam kotak
        untuk klarinet A.
    instrument_playing_technique:
      name: Teknik memainkan instrumen
      description: Cara instrumen biasanya dimainkan/dioperasikan (misalnya, digoyang,
        dipukul, diketuk).
    instrument_size_class:
      name: Kelas ukuran instrumen
      description: Ukuran umum instrumen dinyatakan dalam kelas yang mudah dipahami
        pembeli, bukan dimensi yang tepat.
    insulation_fill_material:
      name: Bahan pengisi isolasi
      description: Mengidentifikasi bahan utama yang digunakan untuk menginsulasi
