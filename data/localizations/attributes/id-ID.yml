        atau penghangat minyak.
    warmth_level:
      name: Tingkat kehangatan
      description: Mengklasifikasikan tingkat kehangatan keseluruhan atau kesesuaian
        selimut atau duvet dengan musim.
    warmth_rating:
      name: Rating kehangatan
      description: Menunjukkan tingkat insulasi selimut, mirip dengan peringkat TOG
