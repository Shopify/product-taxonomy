    decoy_joint_type:
      name: Jenis sambungan decoy
      description: Menunjukkan apakah badan umpan tersebut padat atau bersendi, yang
        memengaruhi aksi berenang.
    decoy_motion_mechanism:
      name: Mekanisme gerak decoy
      description: Menjelaskan bagaimana, jika ada, decoy tersebut menghasilkan gerakan
        atau gangguan air untuk menarik buruan.
    decoy_posture:
      name: Postur decoy
      description: Menunjukkan posisi atau aktivitas hewan yang dimodelkan oleh decoy
        (misalnya, makan, beristirahat, waspada).
    decoy_size_class:
      name: Kelas ukuran decoy
      description: Mengkategorikan skala relatif decoy dibandingkan dengan hewan aslinya
        (misalnya, Standar, Magnum, Ukuran Besar).
    decoy_style:
      name: Gaya decoy
      description: Menentukan bentuk fisik atau kelas desain umpan untuk membantu
        pemburu memilih pengaturan yang tepat.
    deli_meat_variety:
      name: Varietas daging olahan
      description: Mengklasifikasikan jenis daging olahan tertentu (misalnya, salami,
        bologna, prosciutto, daging sapi panggang).
    delivery_form:
      name: Bentuk pengiriman
      description: Bentuk fisik dari cairan pembersih injektor.
    denim_composition:
      name: Komposisi denim
      description: Komposisi serat utama denim (serat dasar tidak termasuk pewarna/finishing).
    denim_finish:
      name: Lapisan akhir denim
      description: Lapisan akhir/pemrosesan yang diterapkan pada kain denim.
    denim_intended_use:
      name: Tujuan penggunaan denim
      description: Proyek/penggunaan umum yang menjadi fokus pemasaran denim ini.
    denim_stretch_type:
      name: Jenis denim elastis
      description: Apakah denim tersebut memiliki peregangan mekanis, tambahan elastane/spandex,
        atau tanpa peregangan sama sekali.
    denim_wash:
      name: Pencucian denim
      description: Menunjukkan warna atau perlakuan pencucian yang diterapkan pada
        kain denim (misalnya, terang, gelap, mentah, asam).
    derailleur_cage_length:
      name: Panjang sangkar derailleur
      description: Menunjukkan panjang sangkar derailleur yang menentukan kapasitas
        rantai (terutama untuk derailleur belakang).
    derailleur_mounting_style:
      name: Gaya pemasangan derailleur
      description: Menentukan bagaimana derailleur terpasang pada rangka atau gantungan
        sepeda (misalnya, dilas, dijepit, dipasang langsung, UDH).
    derailleur_type:
      name: Jenis derailleur
      description: Menunjukkan apakah produk tersebut adalah derailleur depan atau
        belakang.
    deshedder_tool_type:
      name: Jenis alat penghilang bulu
      description: Mengklasifikasikan gaya struktural alat penghilang bulu rontok
        sehingga pembeli dapat memilih metode perawatan yang mereka sukai (misalnya,
        pisau, balok, sisir, atau sarung tangan).
    diabolo_axle_system:
      name: Sistem poros diabolo
      description: Menentukan sistem/konfigurasi poros diabolo yang memengaruhi gerakan
        menggerinda, stabilitas, dan keausan senar.
    diagnostic_functions_supported:
      name: Fungsi diagnostik yang didukung
      description: Menentukan fungsi diagnostik/pemeliharaan yang dapat dilakukan
        oleh pemindai.
    diagnostic_interface_type:
      name: Jenis antarmuka diagnostik
      description: Koneksi/antarmuka yang digunakan untuk berkomunikasi dengan kendaraan
        atau perangkat (misalnya, OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Tingkat warna berlian
      description: Menunjukkan tingkat warna berlian, dari D (tidak berwarna) hingga
        Z (warna terang), atau menunjukkan berlian warna mewah.
    diaper_cover_style:
      name: Model penutup popok
      description: Menentukan siluet desain atau gaya dekoratif penutup popok untuk
        membantu penelusuran dan penyaringan berdasarkan gaya.
    diastatic_power_unit:
      name: Unit daya diastatik
      description: Menentukan sistem satuan yang digunakan untuk melaporkan nilai
        daya diastatik suatu produk (misalnya, °Lintner vs Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Sistem penyetelan harmonika diatonik
      description: Menentukan tata letak not/sistem tuning yang digunakan oleh harmonika
        diatonik.
    dice_sides:
      name: Sisi dadu
      description: Jumlah sisi (muka) per dadu untuk dadu yang termasuk dalam produk
        (misalnya, d6, d20). Untuk set campuran, gunakan nilai dominan atau daftar
        sebagai beberapa nilai jika didukung.
    didgeridoo_construction_type:
      name: Jenis konstruksi didgeridoo
      description: Cara pembuatan atau pembentukan didgeridoo (pendekatan konstruksi
        tradisional atau modern).
    dietary_formulation_claim:
      name: Klaim formulasi makanan
      description: Menyoroti atribut atau pengecualian formulasi utama yang relevan
        dengan nutrisi kuda (misalnya, Bebas biji-bijian, Rendah pati, Organik).
