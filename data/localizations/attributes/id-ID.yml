    neck_configuration:
      name: Konfigurasi leher
      description: Menentukan gaya/konfigurasi leher yang disertakan dengan saksofon,
        yang memengaruhi ergonomi dan kemudahan bermain.
    neck_coverage_type:
      name: Jenis penutup leher
      description: Menentukan gaya penutup leher yang disertakan dengan selimut.
    neck_support_size_system:
      name: Sistem ukuran penyangga leher
      description: Menunjukkan sistem ukuran yang digunakan untuk penyangga/penopang
        leher balap (misalnya, dewasa, remaja, atau satu ukuran).
    necklace_length_type:
      name: Jenis panjang kalung
      description: Menentukan kategori panjang kalung konvensional, seperti choker
        atau opera, untuk membantu berbelanja berdasarkan gaya.
    needle_balance_zone:
      name: Zona keseimbangan jarum
      description: Menunjukkan zona keseimbangan magnetik atau belahan bumi tempat
        jarum kompas disetel, yang memastikan pembacaan yang akurat di seluruh dunia.
    needle_case_format:
      name: Format kotak jarum
      description: Bentuk keseluruhan organizer pada kotak jarum.
    needle_damping_type:
      name: Jenis peredam jarum
      description: Menjelaskan bagaimana jarum kompas distabilkan (misalnya, diisi
        cairan, kering, atau distabilkan secara elektronik), yang memengaruhi waktu
        stabilisasi dan daya tahannya.
    needle_felting_needle_profile:
      name: Profil jarum felting
      description: Penampang/profil jarum felting yang memengaruhi cara serat digerakkan
        dan finis yang dihasilkan.
    needle_holder_features:
      name: Fitur pemegang jarum
      description: Fitur fungsional penting pada needle holder.
    needle_holder_mounting_attachment_method:
      name: Metode pemasangan/penempelan pemegang jarum
      description: Cara pemegang jarum dimaksudkan untuk dipasang atau digunakan selama
        penyimpanan (misalnya, magnet, klip, tali).
    needle_holder_style:
      name: Gaya pemegang jarum
      description: Gaya/desain penyimpanan atau pembawaan fisik dari pemegang jarum.
    needle_pushing_surface_type:
      name: Jenis permukaan pendorong jarum
      description: Jenis/desain permukaan pendorong jarum pada telapak tangan mesin
        jahit (misalnya, lekukan logam, koin, atau tambalan yang diperkuat).
    needle_requirement_beading_pattern:
      name: Kebutuhan jarum (pola manik-manik)
      description: Jenis/ukuran jarum yang direkomendasikan oleh pola tersebut.
    needle_size_system:
      name: Sistem ukuran jarum
      description: Standar ukuran yang digunakan untuk pelabelan ukuran jarum.
    needle_threader_compatible_needle_type:
      name: Jenis jarum yang kompatibel dengan alat pemasang benang jarum
      description: Menentukan jenis jarum mana yang dirancang untuk digunakan oleh
        alat pemasang benang (berdasarkan kategori/penggunaan jarum).
    needle_threader_mechanism_type:
      name: Jenis mekanisme penusuk jarum
      description: Menjelaskan bagaimana alat pemasang benang menangkap/menarik benang
        melalui lubang jarum.
    needle_threader_packaging_type:
      name: Jenis kemasan alat pemasang benang jarum
      description: Cara produk dijual/dikemas (satuan vs multipak vs set).
    needlecraft_fabric_color_family:
      name: Kelompok warna kain kerajinan jarum
      description: Kelompok warna standar untuk kain evenweave (digunakan bersama
        dengan Warna untuk faceting).
    needlecraft_fabric_composition:
      name: Komposisi kain kerajinan jarum
      description: Menentukan komposisi/campuran serat kain kerajinan jarum (misalnya,
        100% katun, campuran linen/katun).
    needlecraft_fabric_weave_type:
      name: Jenis tenunan kain kerajinan jarum
      description: Menentukan jenis anyaman/konstruksi kain linen kerajinan jarum
        (misalnya, evenweave vs linen tradisional), yang memengaruhi perilaku dan
        tampilan jahitan.
    needlecraft_kit_items_included:
      name: Perlengkapan kerajinan jarum yang disertakan
      description: Mencantumkan komponen utama yang disertakan dalam perlengkapan
        kerajinan jarum (alat dan bahan habis pakai).
    needlecraft_kit_project_type:
      name: Jenis proyek kit kerajinan jarum
      description: Mengidentifikasi produk jadi apa yang dihasilkan dari kit tersebut
        (hasil proyek).
    needlecraft_stitching_coverage:
      name: Cakupan jahitan kerajinan jarum
      description: Menunjukkan apakah kain dijahit di atas 1 benang/kotak atau di
        atas 2 benang (umum untuk evenweave dan linen).
    needlepoint_canvas_mesh_count:
      name: Jumlah mesh kanvas needlepoint
      description: Jumlah/mesh kanvas yang ditujukan untuk desain (benang per inci),
        yang biasa disebut jumlah kanvas.
    needlepoint_frame_canvas_attachment_method:
      name: Metode pemasangan kanvas bingkai needlepoint
      description: Menjelaskan cara kanvas needlepoint dipasang pada bingkai needlepoint.
    needlepoint_frame_compatible_stand_type:
      name: Jenis dudukan yang kompatibel dengan bingkai needlepoint
      description: Jika bingkai dirancang untuk dipasang pada dudukan, menentukan
        jenis dudukan yang kompatibel.
    needlepoint_frame_contents:
      name: Isi bingkai needlepoint
      description: Menentukan komponen dan aksesori yang disertakan dengan bingkai
        needlepoint (misalnya, bingkai, batang/tiang ekstra, paku/peniti, strip pegangan,
        tas pembawa).
    needlepoint_frame_tension_adjustment_type:
      name: Jenis penyesuaian tegangan bingkai needlepoint
      description: Menunjukkan bagaimana (atau apakah) ketegangan bingkai dapat disesuaikan
        selama penggunaan.
    needlepoint_pattern_chart_format:
      name: Format bagan pola sulaman
      description: Menentukan bagaimana desain needlepoint ditampilkan untuk proses
        penyulaman (berupa bagan vs panduan cetak/dicat).
    needlepoint_project_type:
      name: Jenis proyek needlepoint
      description: Produk/kategori jadi yang dituju untuk desain needlepoint.
    net_design:
      name: Desain jaring
      description: Mengidentifikasi gaya konstruksi jaring, yang menunjukkan apakah
        jaring dapat ditarik atau dilipat agar mudah dibawa.
    net_mesh_pattern:
      name: Pola jala jaring
      description: Menentukan bentuk geometris dari bukaan jaring, yang dapat memengaruhi
        visibilitas dan kekuatan.
    net_twine_gauge:
      name: Gauge benang jaring
      description: Menunjukkan ketebalan atau kekuatan benang pada jaring, yang biasanya
        dinyatakan dalam angka gauge (misalnya 18, 36).
    nicotine_source:
      name: Sumber nikotin
      description: Menunjukkan apakah nikotin dalam produk berasal dari tembakau,
        sintetis, atau apakah produk tidak mengandung nikotin.
    nipple_drive_interface:
      name: Antarmuka penggerak nipple
      description: Mengidentifikasi gaya/standar antarmuka penggerak atau kepala nipple
        (eksternal atau internal), yang menentukan alat yang diperlukan dan metode
        perakitan roda.
    nock_activation_method:
      name: Metode aktivasi nock
      description: Menentukan mekanisme yang digunakan untuk menghidupkan atau mematikan
        LED pada nock anak panah yang menyala (misalnya, tekanan tali busur, sensor
        gerak, sakelar manual).
    nock_fitment_code:
      name: Kode pemasangan nock
      description: Kode pabrikan atau industri yang mengidentifikasi keluarga/seri
        nock tempat nock berada.
    nock_throat_size:
      name: Ukuran lubang nock
      description: Menentukan ukuran alur (lekukan) nock yang terpasang pada tali
        busur.
    nock_transparency_level:
      name: Tingkat transparansi nock
      description: Menjelaskan seberapa transparan bahan nock tersebut—bening, tembus
        cahaya, buram, atau berpijar dalam gelap—yang memengaruhi visibilitas dan
        estetika.
    nock_type:
      name: Jenis nok
      description: Menentukan desain nock yang digunakan pada anak panah atau baut,
        seperti pin, setengah bulan, atau bercahaya.
    noise_reduction_type:
      name: Jenis peredam kebisingan
      description: Menentukan teknologi pengurangan kebisingan yang digunakan (atau
        tidak digunakan) pada headset yang terintegrasi pada helm, jika ada.
    noise_suppression_technology:
      name: Teknologi peredam kebisingan
      description: Menentukan apakah produk menggunakan peredaman pasif atau sirkuit
        elektronik aktif yang menekan suara keras dan/atau memperkuat suara sekitar.
    non_slip_base_features:
      name: Fitur alas anti-selip
      description: Menunjukkan fitur anti-selip yang disertakan untuk mencegah pedal
        bergeser selama penggunaan.
    nose_bridge_type:
      name: Jenis bridge hidung
      description: Menunjukkan desain bridge hidung, yang memengaruhi kesesuaian pada
        berbagai ukuran wajah.
    nose_clip_accessories_included:
      name: Aksesori klip hidung yang disertakan.
      description: Mencantumkan aksesori tambahan apa pun yang disertakan dengan klip
        hidung renang (misalnya, penyumbat telinga, kotak penyimpanan).
    nose_clip_features:
      name: Fitur klip hidung
      description: Menyoroti fitur fungsional atau kenyamanan umum dari klip hidung.
    nose_coverage_style:
      name: Gaya penutup hidung
      description: Menunjukkan keberadaan dan jenis panel pelindung hidung atau moncong
        pada masker lalat.
    noseband_type:
      name: Jenis tali hidung
      description: Menentukan desain tali hidung (jika ada) yang disertakan dengan
        kekang.
    number_of_canvas_meshes:
      name: Jumlah mesh kanvas
      description: Ukuran jala lembaran kanvas plastik, yang dinyatakan sebagai lubang
        per inci (HPI) atau hitungan, menentukan ukuran jahitan dan detail proyek.
    number_of_chainrings:
      name: Jumlah gir rantai
      description: Menunjukkan jumlah gir rantai yang dirancang untuk dipasang pada
        crank atau yang sudah disertakan.
    number_of_control_stations:
      name: Jumlah stasiun kontrol
      description: Menunjukkan jumlah stasiun kemudi/kontrol yang didukung oleh perangkat
        kontrol (stasiun tunggal vs stasiun ganda, dll.).
    number_of_digits:
      name: Jumlah digit
      description: Berapa banyak digit yang ditampilkan oleh penghitung (misalnya,
        1 digit, 2 digit, 3 digit).
    number_of_guitar_slots:
      name: Jumlah slot gitar
      description: Menunjukkan jumlah gitar yang dapat ditampung oleh wadah/tas gitar
        tersebut.
    number_of_needlecraft_fabrics:
      name: Jumlah kain untuk kerajinan tangan
      description: Menentukan jumlah benang pada kanvas/kain untuk kerajinan tangan,
        biasanya dinyatakan sebagai kotak/benang per inci (misalnya, 14-count).
    number_of_plastic_canvas_meshes:
      name: Jumlah jaring kanvas plastik
      description: Menentukan jumlah lubang pada kanvas plastik (lubang per inci),
        yang menentukan ukuran jahitan dan tingkat detail proyek.
    number_of_quilting_frame_rails:
      name: Jumlah rel bingkai quilting
      description: Jumlah rel/rol yang terdapat pada rangka quilting (misalnya, sistem
        2 rel vs 3 rel).
    number_of_rope_slots:
      name: Jumlah slot tali
      description: Menunjukkan apakah alat pengaman dirancang untuk penggunaan tali
        tunggal atau tali ganda.
    number_of_switch_poles:
      name: Jumlah kutub sakelar
      description: Jumlah sirkuit terpisah (kutub) yang dikendalikan oleh sakelar
        (misalnya, SPST, DPST).
    number_of_switch_throws:
      name: Jumlah jalur sakelar
      description: Jumlah jalur keluaran (lemparan) per kutub (misalnya, SPDT).
    number_of_timing_chain_rows:
      name: Jumlah baris rantai timing
      description: Menunjukkan apakah rantai timing tersebut satu baris atau banyak
        baris.
    number_of_trailer_axles:
      name: Jumlah gandar trailer
      description: Jumlah gandar pada trailer.
    number_of_wheel_pieces:
      name: Jumlah potongan roda
      description: Menunjukkan apakah roda tersebut merupakan konstruksi 1 bagian,
        2 bagian, atau 3 bagian.
    numbering_style:
      name: Gaya penomoran
      description: Menunjukkan apakah dan bagaimana nomor dada sudah diberi nomor
        sebelumnya untuk identifikasi tim (misalnya, tanpa nomor, 1-10, khusus).
    nunchuck_connector_type:
      name: Jenis konektor Nunchuck
      description: Jenis sambungan antara kedua gagang nunchaku (misalnya, tali, rantai,
        rantai putar).
    nursing_access:
      name: Akses keperawatan
      description: Mengidentifikasi metode akses menyusui yang terintegrasi ke dalam
        pakaian renang, jika ada.
    nursing_access_type:
      name: Jenis akses keperawatan
      description: Menjelaskan bagaimana pakaian tersebut memberikan akses ke payudara
        untuk menyusui atau memompa ASI.
    nut_butter_texture:
      name: Tekstur selai kacang
      description: Menjelaskan konsistensi fisik selai kacang sehingga pembeli dapat
        dengan mudah memilih antara tekstur halus, renyah, dan lain sebagainya.
    nutrient_fortification:
      name: Penguatan nutrisi
      description: Mengidentifikasi nutrisi utama yang ditambahkan ke dalam minuman
        atau produk makanan tersebut.
    oak_product_form:
      name: Bentuk produk kayu ek
      description: Mengidentifikasi bentuk fisik kayu ek yang digunakan untuk proses
        penuaan/pemberian rasa pada produk.
    oak_toast_level:
      name: Tingkat pemanggangan kayu ek
      description: Menentukan tingkat pemanggangan produk kayu oak.
    oboe_case_capacity:
      name: Kapasitas kotak oboe
      description: Menunjukkan instrumen dan komponen utama apa yang dirancang untuk
        dibawa oleh wadah tersebut.
    oboe_case_carry_configuration:
      name: Konfigurasi pembawaan kotak oboe
      description: Menunjukkan konfigurasi pembawaan utama yang ditawarkan oleh casing/gigbag.
    oboe_case_design:
      name: Desain kotak oboe
      description: Mengklasifikasikan konstruksi/kekakuan wadah oboe atau tas jinjing
        (misalnya, keras, semi-kaku, lunak) untuk menunjukkan tingkat perlindungan.
    oboe_case_internal_fit_type:
      name: Jenis pemasangan internal kotak oboe
      description: Menunjukkan apakah bagian interior dibentuk untuk konfigurasi instrumen
        tertentu atau menggunakan kompartemen yang dapat disesuaikan.
    oboe_keywork_plating:
      name: Pelapisan kunci oboe
      description: Menentukan pelapisan/finishing pada bagian tuts (keys) oboe, terpisah
        dari bahan bodinya.
    oboe_strap_padding:
      name: Bantalan tali oboe
      description: Menjelaskan keberadaan/jenis bantalan pada area kontak tali/penyangga
        untuk kenyamanan (misalnya, bantalan di area bahu/leher).
    oboe_swab_style:
      name: Gaya usap oboe
      description: Menentukan gaya/konstruksi fungsional dari kain pembersih oboe
        (misalnya, tarik-melalui, sutra berbobot).
    observation_window_material:
      name: Bahan jendela pengamatan
      description: Menentukan bahan panel/jendela tampilan (seringkali memengaruhi
        kejernihan dan daya tahan).
    ocarina_accessories_included:
      name: Termasuk aksesori Ocarina
      description: Aksesoris yang disertakan bersama ocarina, seperti wadah, tali
        leher, atau bagan penempatan jari.
    ocarina_chamber_count:
      name: jumlah ruang ocarina
      description: Menunjukkan jumlah ruang yang dimiliki ocarina inline, yang memengaruhi
        jangkauan dan kompleksitas permainan (tunggal/ganda/tiga, dll.).
    ocarina_fingering_system:
      name: Sistem penekanan jari ocarina
      description: Menentukan sistem/standar penjarian yang digunakan oleh ocarina
        pendant (jika ada).
    ocarina_finish_type:
      name: Jenis finishing Ocarina
      description: Lapisan permukaan badan ocarina yang memengaruhi rasa dan estetika.
    occupant_classification_sensor_support:
      name: Dukungan sensor klasifikasi penghuni
      description: Menunjukkan apakah jok tersebut dilengkapi dengan sensor klasifikasi/berat
        penumpang atau memiliki fasilitas untuk memindahkan/memasang sensor OEM (biasanya
        untuk jok penumpang depan).
    octave_harmonica_cover_plate_material:
      name: Bahan pelat penutup harmonika oktaf
      description: Bahan pelat penutup luar harmonika oktaf.
    octave_harmonica_tuning_system:
      name: Sistem penyetelan harmonika oktaf
      description: Penyetelan/temperamen yang digunakan untuk harmonika oktaf.
    octoban_mounting_system_type:
      name: Jenis sistem pemasangan Octoban
      description: Cara pemasangan/penempatan octoban selama bermain (pengaturan dudukan/braket/penyangga).
    odor_control_features:
      name: Fitur pengendalian bau
      description: Menunjukkan apakah produk tersebut menyediakan fungsi penetralan
        bau/penghilang bau dan melalui pendekatan apa.
    office_furniture_items_included:
      name: Termasuk perabot kantor
      description: Mengidentifikasi item furnitur kantor spesifik yang termasuk dalam
        set tersebut, seperti meja atau lemari arsip.
    oil_cooler_core_type:
      name: Tipe inti pendingin oli
      description: Menentukan konstruksi inti internal pendingin oli, yang memengaruhi
        efisiensi pendinginan, penurunan tekanan, dan daya tahan.
    oil_cooler_mounting_style:
      name: Gaya pemasangan pendingin oli
      description: Menjelaskan cara pemasangan/instalasi pendingin oli pada kendaraan.
    oil_dipstick_component_type:
      name: jenis komponen pengukur oli
      description: Menentukan komponen pengukur level oli mana yang dijual (misalnya,
        hanya bilah/batang pengukur oli, hanya pegangan, rakitan lengkap, tabung pengukur
        oli, dll.).
    oil_dipstick_measurement_markings:
      name: Tanda pengukuran pada tongkat pengukur oli
      description: Menentukan tanda/skala apa yang ada pada tongkat pengukur untuk
        membaca level oli.
    oil_dipstick_tube_mounting_type:
      name: tipe pemasangan tabung pengukur oli
      description: Menentukan bagaimana tabung pengukur oli ditahan atau dipasang
        pada mesin atau blok mesin.
    oil_drain_plug_head_drive_type:
      name: tipe penggerak kepala sumbat pembuangan oli
      description: Menentukan antarmuka pengait alat pada kepala baut pembuangan oli
        yang digunakan untuk pemasangan dan pelepasan.
    oil_drain_plug_magnet_type:
      name: Baut pembuangan oli tipe magnet
      description: Menentukan apakah baut pembuangan air bersifat magnetis dan, jika
        ya, jenisnya seperti apa.
    oil_fill_cap_type:
      name: Jenis tutup pengisi oli
      description: Gaya/tipe antarmuka tutup pengisian oli yang digunakan oleh penutup
        katup (jika ada).
    oil_filler_cap_attachment_type:
      name: Jenis pemasangan tutup pengisi oli
      description: Menentukan bagaimana tutup pengisi oli ditahan pada mesin/leher
        pengisi oli (misalnya, berulir, bayonet/putar seperempat putaran, tekan pas).
    oil_filler_cap_installation_position:
      name: Posisi pemasangan tutup pengisi oli
      description: Menentukan di mana tutup tersebut digunakan jika terdapat beberapa
        titik pengisian oli (misalnya, penutup katup, pipa pengisian jarak jauh).
    oil_filler_cap_locking_type:
      name: Jenis pengunci tutup pengisi oli
      description: Menentukan apakah tutup pengisi oli tidak terkunci atau menggunakan
        metode penguncian/pelepasan yang aman (misalnya, menggunakan kunci atau alat
        bantu) untuk membantu mencegah perusakan/pencurian atau pembukaan yang tidak
        disengaja.
    oil_filler_cap_tether_type:
      name: Jenis pengikat tutup pengisian oli
      description: Menentukan apakah tutup pengisi oli diikat/ditahan untuk mencegah
        kehilangan dan jenis pengikat apa yang digunakan.
    oil_filler_cap_venting_type:
      name: Tutup pengisi oli tipe ventilasi
      description: Menentukan apakah tutupnya berventilasi dan mekanisme ventilasinya
        (jika ada).
    oil_filter_style:
      name: Jenis filter oli
      description: Menentukan bentuk dan gaya pemasangan/instalasi filter oli agar
        kompatibel dengan dudukan filter mesin.
    oil_pan_baffle_windage_features:
      name: Fitur penyekat/penghalang angin pada bak oli
      description: Menunjukkan fitur kontrol oli internal yang terdapat di dalam bak
        oli.
    oil_pan_finish_coating:
      name: Finishing/lapisan bak oli
      description: Describes the surface finish or coating of the oil pan (painted,
        powder-coated, plated, raw, etc.).
    oil_pressure_sensor_function_type:
      name: Jenis fungsi sensor tekanan oli
      description: Menunjukkan apakah komponen tersebut merupakan sensor tekanan oli
        keluaran variabel untuk pengukur/ECU, atau sakelar tekanan oli hidup/mati
        yang memicu lampu peringatan.
    oil_pressure_sensor_signal_output_type:
      name: Jenis keluaran sinyal sensor tekanan oli
      description: Menentukan tipe keluaran/sinyal listrik yang dihasilkan oleh sensor/pengirim
        tekanan oli.
    oil_processing_method:
      name: Metode pengolahan minyak
      description: Menentukan bagaimana minyak tersebut diproduksi atau dimurnikan
        (misalnya, perasan dingin, murni, olahan), yang memengaruhi rasa, nutrisi,
        dan aplikasi memasak yang sesuai.
    oil_pump_drive_method:
      name: Metode penggerak pompa oli
      description: Menunjukkan apa yang menggerakkan pompa oli di dalam mesin.
    oil_pump_mounting_style:
      name: Gaya pemasangan pompa oli
      description: Menentukan di mana dan bagaimana pompa oli dipasang di dalam mesin
        (misalnya, internal vs eksternal/terpisah, pemasangan pada penutup, pemasangan
        pada bak oli).
    oil_system_connection_thread_standard:
      name: Ulir standar sambungan sistem oli
      description: Menentukan standar ulir/sambungan yang digunakan oleh antarmuka
        sistem oli komponen untuk pemasangan/kompatibilitas (misalnya, M12x1.5, 1/8-27
        NPT, BSPP).
    oil_viscosity_grade:
      name: Tingkat kekentalan oli
      description: Menjelaskan kekentalan relatif oli pemintal untuk peralatan kerajinan
        (bukan standar SAE otomotif).
    okra_variety:
      name: Varietas okra
      description: Mengidentifikasi kultivar atau varietas okra spesifik yang ditawarkan
        di pasaran, seperti Clemson Spineless, Red Burgundy, atau Baby Okra.
    olfactory_arts_material_form:
      name: Bentuk bahan seni penciuman
      description: Menentukan bentuk fisik material saat dijual.
    olfactory_arts_tool_kit_content:
      name: Isi perangkat alat seni penciuman
      description: Daftar komponen yang disertakan saat produk dijual sebagai kit
        atau set untuk pembuatan lilin/dupa/parfum.
    olive_variety:
      name: Varietas zaitun
      description: Menentukan varietas zaitun yang digunakan, yang memengaruhi rasa,
        tekstur, warna, dan keaslian regional.
    onion_variety:
      name: Varietas bawang
      description: Menentukan jenis bawang tertentu sehingga pembeli dapat dengan
        cepat menemukan warna, rasa, dan profil penggunaan yang diinginkan, sekaligus
        memungkinkan pedagang untuk mencantumkan produk secara akurat.
    opacity_level:
      name: Tingkat opasitas
      description: Menunjukkan seberapa tipis atau tebal kain tersebut.
    operating_modes:
      name: Mode operasi
      description: Mode efek/gerakan bawaan utama yang didukung oleh cahaya laser.
    operating_voltage:
      name: Tegangan operasi
      description: Menentukan tegangan sistem nominal yang dirancang untuk injektor
        tersebut.
    optical_toy_features:
      name: Fitur mainan optik
      description: Menyoroti efek visual/optik utama yang dihasilkan oleh mainan tersebut.
    orchestral_string_core_material:
      name: Bahan inti senar orkestra
      description: Menentukan bahan konstruksi inti senar (core), yang sangat memengaruhi
        rasa, respons, dan nada.
    orchestral_string_end_type:
      name: Jenis ujung senar orkestra
      description: Menentukan gaya pemasangan pada ujung ekor tali.
    orchestral_string_included_strings:
      name: Senar orkestra termasuk senar
      description: Daftar senar spesifik mana yang termasuk dalam paket (berbeda-beda
        tergantung instrumen).
    orchestral_string_instrument_fitting_part_type:
      name: Jenis/bagian instrumen gesek orkestra
      description: Menentukan jenis perlengkapan/bagian produk tersebut (misalnya,
        bridge, tailpiece, chinrest).
    orchestral_string_instrument_mute_type:
      name: Jenis peredam alat musik gesek orkestra
      description: Menentukan jenis fungsional peredam suara instrumen gesek orkestra
        (misalnya, latihan/hotel vs pertunjukan/konser) dan/atau gaya desain umum.
    orchestral_string_instrument_part_position:
      name: Posisi bagian instrumen gesek orkestra
      description: Menunjukkan letak bagian tersebut pada instrumen (berguna jika
        bagian-bagian tersebut tersedia dalam varian atas/bawah atau kiri/kanan).
    orchestral_string_winding_material:
      name: Bahan lilitan senar orkestra
      description: Menentukan bahan lilitan/pembungkus luar yang digunakan pada senar.
    organza_finish_sheen:
      name: Hasil akhir/kilap Organza
      description: Menjelaskan tampilan permukaan kain organza (matte vs efek mengkilap/berkilau).
    organza_ribbon_transparency_level:
      name: Tingkat transparansi pita organza
      description: Menjelaskan seberapa tembus pandang pita organza tersebut.
    organza_transparency_level:
      name: Tingkat transparansi organza
      description: Menggambarkan seberapa tipis kain organza tersebut ketika dilapiskan
        sekali.
    origami_paper_shape:
      name: Bentuk kertas origami
      description: Menentukan bentuk lembaran yang digunakan untuk dilipat.
    origami_paper_sidedness:
      name: Sisi kertas origami
      description: Menunjukkan apakah kertas origami memiliki warna/pola yang sama
        di kedua sisi atau sisi yang kontras.
    ostrich_feather_part:
      name: Bagian bulu burung unta
      description: Mengidentifikasi gaya/bagian bulu burung unta yang digunakan (misalnya,
        bulu mengembang vs bulu kusam) yang memengaruhi kelembutan, kepadatan, dan
        aplikasi kerajinan yang umum.
    outboard_motor_shaft_type:
      name: Jenis poros motor tempel
      description: Kelas panjang poros standar yang digunakan oleh mesin tempel (bentuk
        label yang digunakan dalam industri kelautan).
    outboard_motor_steering_type:
      name: Jenis kemudi motor tempel
      description: Menentukan antarmuka/mekanisme kemudi yang digunakan oleh motor
        tempel (misalnya, kemudi tuas atau sistem kemudi jarak jauh).
    outdoor_table_functionality:
      name: Fungsionalitas meja luar ruangan
      description: Mengidentifikasi fungsi bawaan khusus yang melampaui permukaan
        meja sederhana (misalnya, kompartemen pendingin, rak penyimpanan, penutup
        tangki gas, alas payung, konektor kursi, desain lipat, brankas di dalam kolam,
        tinggi yang dapat disesuaikan, roda terintegrasi, pencahayaan LED).
    outerwear_length_type:
      name: Jenis panjang pakaian luar
      description: Mengklasifikasikan panjang keseluruhan pakaian luar ke dalam rentang
        deskriptif standar.
    outerwear_pieces_included:
      name: Termasuk potongan kain luar
      description: Mencantumkan bagian-bagian pakaian yang disertakan saat produk
        dijual sebagai satu set.
    outfit_attachment_mechanism:
      name: Mekanisme pemasangan pakaian
      description: Menentukan cara pakaian atau aksesori dipasang pada boneka (misalnya,
        kancing, perekat, magnet).
    outfit_items_included:
      name: Termasuk item pakaian
      description: Mencantumkan item pakaian spesifik yang termasuk dalam set (misalnya,
        pakaian ketat, celana pendek, ikat kepala).
    outlet_thread_type:
      name: Jenis ulir outlet
      description: Standar ulir yang digunakan pada lubang keluar saluran rem master
        silinder (misalnya, ulir gelembung metrik vs ulir terbalik SAE).
    output_jack_type_instrument:
      name: Jenis jack output (instrumen)
      description: Menentukan jenis jack output audio pada mandolin elektrik.
    output_signal_type:
      name: Jenis sinyal keluaran
      description: Perilaku/tipe keluaran listrik yang dihasilkan oleh sensor (misalnya,
        resistansi analog termistor NTC).
    outsole_marking_type:
      name: Jenis penandaan sol luar
      description: Menunjukkan apakah sol luar sepatu meninggalkan bekas di permukaan
        lapangan, pertimbangan penting untuk olahraga raket dalam ruangan.
    outsole_material:
      name: Bahan sol luar
      description: Menunjukkan bahan sol luar sepatu yang bersentuhan dengan tanah,
        memengaruhi daya cengkeram, fleksibilitas, dan daya tahan.
    outsole_stud_type:
      name: Jenis stud sol luar
      description: Menjelaskan konfigurasi sol luar/paku (misalnya, paku cetak, tonjolan
        karet, tonjolan untuk lapangan rumput buatan) yang memberikan traksi pada
        permukaan lapangan yang dipilih.
    oven_bake_clay_formulation:
      name: Formulasi tanah liat yang dipanggang dalam oven
      description: Mengidentifikasi kelompok formulasi tanah liat yang dipanggang
        dalam oven (misalnya, tanah liat polimer vs. tanah liat resin), yang memengaruhi
        penanganan, perilaku pengerasan, dan sifat-sifat hasil akhir.
    oven_housing_configuration:
      name: Konfigurasi rumah oven
      description: Menentukan tata letak peralatan yang dimaksudkan agar dapat ditampung
        oleh kabinet (misalnya, oven tunggal, oven ganda, atau kombinasi oven dan
        microwave).
    overhead_mount_installation_method:
      name: Metode pemasangan di atas kepala
      description: Cara dudukan di atas kepala dipasang ke kendaraan (perangkat keras/gaya
        pemasangan).
    oversize_or_undersize_grade:
      name: Ukuran terlalu besar atau terlalu kecil
      description: Menentukan tingkatan ukuran kit (piston/ring ukuran lebih besar
        dan/atau bantalan ukuran lebih kecil) relatif terhadap ukuran standar OEM.
    p_tex_application_method:
      name: Metode aplikasi P-Tex
      description: Menjelaskan bagaimana material P-Tex diaplikasikan pada dasar ski
        atau papan seluncur salju.
    p_tex_form:
      name: Formulir P-Tex
      description: Mengidentifikasi bentuk fisik di mana bahan perbaikan tersebut
        dipasok.
    packability:
      name: Kemudahan pengemasan
      description: Menunjukkan apakah dan bagaimana rompi dapat dikemas atau disimpan
        saat tidak digunakan.
    packaging_format:
      name: Format kemasan
      description: Cara pengemasan/penjualan senar (amplop individual, massal, dll.).
    packaging_material:
      name: Bahan kemasan
      description: Menentukan bahan utama botol atau wadah yang menampung air.
    packaging_type:
      name: Jenis pengemasan
      description: Menjelaskan bagaimana boneka bobblehead dikemas untuk penjualan
        ritel/pajangan/penyimpanan kolektor.
    packing_medium:
      name: media pengemas
      description: Menunjukkan cairan atau media (seperti air, berbagai sirup, jus,
        atau air garam) yang digunakan untuk mengawetkan buah di dalam wadah.
    pad_components_included:
      name: Termasuk komponen bantalan
      description: Menentukan bagian mana yang termasuk saat produk dijual sebagai
        satu set (misalnya, pelindung lutut dan siku, hanya pelindung pergelangan
        tangan).
    pad_controller_additional_control:
      name: Kontrol tambahan pengontrol pad
      description: Jenis-jenis kontrol fisik tambahan selain pad (kenop, fader, tombol)
        yang ada pada unit.
    pad_controller_performance_features:
      name: Fitur performa pengontrol pad
      description: Fitur-fitur pad utama yang berkaitan dengan performa untuk bermain
        dan kontrol ekspresif.
    pad_coverage_area:
      name: Area cakupan bantalan
      description: Menentukan zona tubuh yang dilindungi oleh bantalan terintegrasi
        pada korset.
    pad_material_or_technology:
      name: Bahan atau teknologi bantalan
      description: Menentukan teknologi penyerap benturan eksklusif atau material
        bermerek yang digunakan pada bantalan tersebut.
    pad_mounting_or_holding_style:
      name: Gaya pemasangan atau penahan bantalan
      description: Menunjukkan cara bantalan dipegang, dikenakan, atau dipasang selama
        penggunaan.
    pad_saver_style:
      name: gaya penghemat bantalan
      description: Menunjukkan gaya/desain fisik dari pelindung bantalan yang digunakan
        untuk mengeringkan bantalan dan lubang laras.
    pad_shape:
      name: Bentuk bantalan
      description: Menentukan bentuk geometris atau kelengkungan permukaan pemukul
        atau keseluruhan badan bantalan (misalnya, bulat, melengkung, persegi panjang,
        datar), membantu pengguna mencocokkan bantalan dengan tujuan latihan dan jenis
        pukulan.
    pad_shell_type:
      name: Jenis cangkang bantalan
      description: Mengklasifikasikan gaya konstruksi permukaan luar bantalan (misalnya,
        cangkang keras, cangkang lunak, sisipan internal).
    pad_style:
      name: Gaya bantalan
      description: Menentukan jenis atau desain bantalan yang disertakan dengan kereta
        luncur.
    padding_layers:
      name: Lapisan bantalan
      description: Menunjukkan jumlah lapisan busa yang digunakan untuk menyerap benturan.
    padding_level:
      name: Tingkat bantalan
      description: Menunjukkan jumlah bantalan yang terintegrasi ke dalam area kontak
        tali/penopang (leher/bahu/punggung).
    padding_material:
      name: Bahan bantalan
      description: Menentukan bahan pengisi atau bantalan internal yang menyerap benturan
        di dalam tas, pelindung, sarung tangan, dan boneka latihan.
    paddle_ball_attachment_type:
      name: jenis lampiran bola dayung
      description: Menentukan bagaimana bola terhubung ke raket (atau jika tidak terhubung).
    paddle_leash_style:
      name: Gaya tali pengikat dayung
      description: Mengidentifikasi gaya atau desain tali pengikat dayung.
    paddle_shape:
      name: Bentuk dayung
      description: Menentukan siluet keseluruhan kepala/badan raket (misalnya, standar,
        memanjang, badan lebar), yang memengaruhi jangkauan, ukuran sweet spot, dan
        kemampuan manuver.
    paddleboard_intended_use:
      name: Penggunaan yang dimaksudkan untuk papan dayung
      description: Mengklasifikasikan tujuan desain utama atau aktivitas yang menjadi
        dasar pembuatan papan tersebut (misalnya, Tur, Yoga, Balap).
    paint_application_method:
      name: Metode aplikasi cat
      description: Cara utama produk ini dimaksudkan untuk diaplikasikan pada kaliper.
    paint_by_number_surface_type:
      name: Jenis permukaan melukis berdasarkan angka
      description: Permukaan tempat desain bernomor dicetak (misalnya, kanvas, kertas,
        panel kayu).
    paint_medium_application_method:
      name: Metode aplikasi media cat
      description: Menunjukkan cara yang direkomendasikan untuk mengaplikasikan media
        tersebut.
    paint_medium_intended_effect:
      name: Efek yang diinginkan dari media cat
      description: Menggambarkan hasil utama yang ingin dihasilkan oleh media tersebut
        (tekstur, kilap, lapisan mengkilap, aliran, dll.).
    paint_safe_bristles:
      name: Bulu sikat yang aman untuk cat
      description: Menunjukkan apakah bulu sikat dipasarkan aman untuk digunakan pada
        cat/lapisan bening otomotif (anti gores).
    paintable_surface:
      name: Permukaan yang dapat dicat
      description: Menunjukkan apakah bentuk papier mache siap dicat apa adanya (misalnya,
        sudah dilapisi cat dasar/segel) atau memerlukan persiapan.
    paintball_caliber:
      name: Kaliber paintball
      description: Menentukan diameter/kaliber bola cat atau peralatan yang kompatibel.
    paintball_feed_system:
      name: Sistem pengumpanan paintball
      description: Menjelaskan cara memasukkan bola cat ke dalam penanda.
    paintball_fill_color:
      name: Warna isi paintball
      description: Menunjukkan warna isian penandaan interior, yang mungkin berbeda
        dari cangkang eksterior dan menentukan warna yang tertinggal saat terjadi
        benturan.
    paintball_fill_type:
      name: Jenis isi bola cat
      description: Menjelaskan formulasi atau sifat khusus dari bahan pengisi (misalnya,
        bisa dicuci, bercahaya dalam gelap, berbentuk bedak).
    paintball_grade:
      name: Kualitas bola cat
      description: Menjelaskan kelas performa atau tingkat penggunaan yang dimaksud
        (misalnya, pemula, lapangan, kompetisi, musim dingin).
    paintball_mask_coverage_level:
      name: Tingkat perlindungan masker paintball
      description: Menunjukkan bagian wajah atau kepala mana yang dilindungi oleh
        kacamata atau masker paintball (hanya kacamata, setengah wajah, seluruh wajah,
        atau seluruh kepala).
    paintball_tank_valve_type:
      name: Jenis katup tangki paintball
      description: Menjelaskan antarmuka katup atau regulator yang ada pada tangki.
    painting_surface_priming_type:
      name: Jenis lapisan dasar cat
      description: Menentukan lapisan dasar/pelapisan pada permukaan yang akan dicat
        (lebih dari sekadar dilapisi dasar/tidak dilapisi dasar), yang memengaruhi
        daya rekat cat dan kompatibilitas teknik pengecatan.
    palette_knife_blade_edge_profile:
      name: Profil tepi mata pisau palet
      description: Menggambarkan profil tepi kerja mata pisau palet (bukan ketajamannya),
        yang memengaruhi pembuatan goresan dan pencampuran warna.
    palette_knife_flexibility:
      name: Fleksibilitas pisau palet
      description: Menjelaskan kekakuan/kelenturan mata pisau palet.
    palette_surface_finish:
      name: Lapisan permukaan palet
      description: Menjelaskan lapisan/finishing permukaan campuran yang memengaruhi
        ketahanan terhadap noda dan kemudahan pembersihan.
    palm_padding_level:
      name: Tingkat bantalan telapak tangan
      description: Menjelaskan tingkat bantalan pada area telapak tangan sarung tangan
        atau bantalan pegangan.
    palm_padding_type:
      name: Jenis bantalan telapak tangan
      description: Menunjukkan bahan atau konstruksi yang digunakan untuk bantalan
        telapak tangan (misalnya, gel, busa, lapisan ganda).
    palm_wax_blend_readiness:
      name: Kesiapan campuran lilin sawit
      description: Baik produk tersebut berupa lilin sawit murni atau formulasi campuran
        yang ditujukan untuk karakteristik kinerja tertentu.
    palm_wax_form:
      name: bentuk lilin sawit
      description: Bentuk fisik lilin sawit seperti yang dijual, yang memengaruhi
        kemudahan pengukuran, kecepatan peleburan, dan penanganan.
    pan_flute_tuning_standard:
      name: Standar penyetelan seruling pan
      description: Frekuensi referensi yang digunakan untuk penyetelan (misalnya,
        A4=440 Hz), penting untuk dimainkan bersama instrumen lain.
    pannier_configuration:
      name: Konfigurasi pannier
      description: Menunjukkan apakah produk tersebut dijual sebagai tas tunggal,
        tas ganda yang terhubung, atau sepasang/tiga tas.
    pannier_mounting_system:
      name: Sistem pemasangan pannier
      description: Menentukan mekanisme yang digunakan untuk memasang tas samping
        ke rak atau rangka sepeda, memastikan kompatibilitas dengan berbagai konfigurasi.
    pant_cuff_style:
      name: Gaya manset celana
      description: Menunjukkan penyelesaian atau penyesuaian pada pergelangan kaki
        celana (misalnya, manset elastis, ritsleting pergelangan kaki, ujung bawah
        terbuka).
    pant_leg_conversion_type:
      name: Jenis konversi kaki celana
      description: Menunjukkan apakah dan bagaimana bagian kaki celana dapat diubah
        atau disesuaikan untuk panjang yang berbeda.
    pantyhose_crotch_style:
      name: Model celana ketat di bagian selangkangan
      description: Menentukan desain area selangkangan, membedakan versi selangkangan
        tertutup standar, tanpa selangkangan, atau dengan lapisan penguat di bagian
        selangkangan.
    papaya_variety:
      name: Varietas pepaya
      description: Menentukan kultivar atau varietas pasar pepaya (misalnya, Solo,
        Maradol).
    paper_and_magnetic_doll_format:
      name: Format boneka kertas dan magnet
      description: Menentukan apakah produk tersebut berupa set boneka kertas tradisional,
        set boneka magnetik, atau format hibrida.
    paper_color_family:
      name: Kelompok warna kertas
      description: Menentukan apakah kemasan tersebut satu warna, campuran warna,
        atau campuran khusus (berguna jika warna ditentukan per item tetapi kemasannya
        campuran).
    paper_magnetic_doll_set_contents:
      name: Isi set boneka kertas & magnet
      description: Menunjukkan komponen utama apa saja yang termasuk dalam set tersebut.
    paper_opacity:
      name: Opasitas kertas
      description: Menunjukkan seberapa tembus pandang kertas tersebut, dari sangat
        transparan hingga buram (berguna untuk menjiplak).
    paraglider_certification_rating:
      name: Peringkat sertifikasi paralayang
      description: Menyatakan peringkat kelayakan terbang resmi yang diberikan pada
        sayap paralayang (misalnya, kelas EN atau LTF).
    parasite_types_controlled:
      name: Jenis parasit yang dikendalikan
      description: Mencantumkan parasit internal yang dapat diatasi oleh produk ini
        sehingga pembeli dapat menyesuaikan program pengobatan cacingan dengan infestasi
        spesifik.
    parking_camera_mounting_location:
      name: Lokasi pemasangan kamera parkir
      description: Di bagian kendaraan tempat kamera akan dipasang (misalnya, area
        plat nomor, pemasangan di permukaan belakang, pemasangan rata).
    parking_camera_night_vision_technology:
      name: Teknologi penglihatan malam pada kamera parkir
      description: Metode bantuan cahaya rendah yang digunakan oleh kamera.
    parking_camera_orientation:
      name: Orientasi kamera parkir
      description: Apakah kamera tersebut dirancang untuk tampilan belakang (cadangan),
        tampilan depan, atau penggunaan yang dapat dipilih/dicerminkan.
    parking_sensor_finish:
      name: Sensor parkir selesai
      description: Menunjukkan jenis permukaan penutup/muka sensor parkir (misalnya,
        dapat dicat/dilapisi cat dasar, doff, mengkilap) untuk membantu menyesuaikan
        estetika bumper.
    parking_sensor_type:
      name: Jenis sensor parkir
      description: Menentukan teknologi penginderaan yang digunakan oleh sensor parkir
        (misalnya, ultrasonik, elektromagnetik, radar, optik).
    parsley_root_variety:
      name: varietas akar peterseli
      description: Menentukan kultivar atau varietas akar peterseli jika disediakan
        oleh pemasok.
    parsnip_variety:
      name: Varietas lobak putih
      description: Mengidentifikasi varietas atau kultivar parsnip tertentu, seperti
        Hollow Crown atau White Gem, memungkinkan pembeli untuk memilih berdasarkan
        perbedaan rasa, kemanisan, atau ukuran.
    part_condition:
      name: Kondisi bagian
      description: Menunjukkan apakah suku cadang tersebut baru, bekas, diperbaiki,
        dll.
    part_placement:
      name: Penempatan komponen
      description: Menunjukkan di mana bagian tersebut dipasang pada mesin (misalnya,
        alat latihan menaiki tangga atau alat latihan langkah), seperti kiri, kanan,
        depan, atau belakang.
    partial_capo_covered_strings:
      name: Senar tertutup sebagian oleh capo
      description: Menentukan rentang senar yang dicakup oleh capo parsial menggunakan
        penomoran gitar 6 senar standar (1 = E tinggi, 6 = E rendah).
    parting_style:
      name: Gaya pemisahan
      description: Menunjukkan bagaimana wig tersebut terbelah atau dapat dibelah
        (misalnya, tengah, samping, belahan bebas), yang memengaruhi fleksibilitas
        penataan gaya.
    party_favor_type:
      name: Jenis suvenir pesta
      description: Menentukan jenis barang suvenir pesta (misalnya, stiker, mainan
        mini, gelembung sabun), untuk memungkinkan penelusuran/pemfilteran dalam Suvenir
        Pesta.
    party_game_format:
      name: Format permainan pesta
      description: Format fisik utama dari permainan pesta tersebut.
    party_horn_mouthpiece_type:
      name: Jenis corong terompet pesta
      description: Menentukan konstruksi corong, yang memengaruhi kebersihan dan kenyamanan.
    party_horn_style:
      name: gaya terompet pesta
      description: Menjelaskan konstruksi/gaya perilaku terompet pesta (bagaimana
        cara mengeluarkan suara atau bersuara).
    passenger_car_type:
      name: Jenis mobil penumpang
      description: Mengidentifikasi jenis gerbong penumpang (kereta api penumpang)
        spesifik untuk model tersebut (misalnya, kereta penumpang biasa, kereta tidur),
        yang digunakan untuk penelusuran dan pembuatan set.
    passion_fruit_variety:
      name: Varietas buah markisa
      description: Mengidentifikasi/menentukan varietas botani atau komersial buah
        markisa yang ditawarkan (misalnya, Ungu, Kuning, Granadilla).
    pasta_sauce_texture:
      name: Tekstur saus pasta
      description: Menjelaskan konsistensi saus (misalnya, halus, kasar, lembut) agar
        sesuai dengan preferensi rasa di mulut konsumen.
    pasta_sauce_variety:
      name: Aneka saus pasta
      description: Mengklasifikasikan saus pasta berdasarkan resep atau gaya sehingga
        pembeli dapat dengan cepat menemukan saus klasik seperti marinara atau saus
        spesial seperti vodka atau pesto.
    pastry_crust_state:
      name: Kondisi kerak kue kering
      description: Menjelaskan kondisi persiapan atau pemanggangan adonan pada saat
        pembelian.
    pastry_crust_style:
      name: Gaya kulit kue
      description: Mengidentifikasi gaya kue atau jenis adonan tertentu untuk bagian
        kulitnya.
    pastry_filling_type:
      name: Jenis isian kue
      description: Menentukan isian utama bagian dalam kue atau scone.
    patch_adhesion_method:
      name: Metode perekatan patch
      description: Menentukan bagaimana tambalan menempel pada ban dalam atau ban
        luar (misalnya, perekat sendiri, vulkanisasi dengan semen, atau diaktifkan
        oleh panas).
    patch_backing_material:
      name: Bahan penopang tambalan
      description: Bahan yang digunakan di bagian belakang/dasar patch (misalnya,
        kain felt, kain twill) yang bersentuhan dengan barang yang dihias.
    patch_backing_type:
      name: Jenis lapisan belakang tambalan
      description: Jenis perekat yang digunakan pada patch (misalnya, perekat panas/setrika,
        perekat tempel, perekat kait dan loop, tanpa perekat).
    patch_base_material:
      name: Bahan dasar tambalan
      description: Bahan tekstil dasar/penopang utama dari tambalan motif (bukan hiasan
        dekoratif).
    patch_border_edge_finish:
      name: Penyelesaian tepi/pinggir tambalan
      description: Metode penyelesaian tepi pada patch (misalnya, tepi merrowed/overlocked,
        tepi potongan laser) memengaruhi daya tahan dan penampilan.
    patch_placement_area:
      name: Area penempatan tambalan
      description: Area penempatan umum yang dimaksudkan untuk tempelan pada pakaian/aksesoris.
    pathogen_removal_capability:
      name: Kemampuan menghilangkan patogen
      description: Menentukan kelas mikroorganisme (bakteri, protozoa, virus) mana
        yang mampu dihilangkan oleh pompa tersebut dan telah tersertifikasi.
    pattern_sizing_system:
      name: Sistem penentuan ukuran pola
      description: Menentukan sistem atau standar ukuran regional yang digunakan untuk
        bagan ukuran pola (misalnya, AS, Inggris, UE).
    peak_style:
      name: Gaya puncak
      description: Menentukan gaya pelindung mata atau bagian atas helm, yang memengaruhi
        perlindungan, estetika, dan aturan disiplin.
    pear_variety:
      name: Varietas pir
      description: Mengidentifikasi kultivar atau varietas buah pir (misalnya, Bartlett,
        Bosc, Conference), sehingga pembeli dapat memilih rasa, tekstur, dan penggunaan
        kuliner yang mereka sukai.
    pearl_luster_grade:
      name: Tingkat kilau mutiara
      description: Tingkat kilau/cahaya kualitatif permukaan mutiara.
    pearl_matching_level:
      name: Tingkat kecocokan mutiara
      description: Menunjukkan seberapa baik kesamaan mutiara dalam satu lot atau
        untaian (misalnya, berdasarkan warna, ukuran, dan kilau).
    pearl_shape:
      name: Bentuk mutiara
      description: Kategori bentuk keseluruhan mutiara.
    pearl_surface_condition:
      name: Kondisi permukaan mutiara
      description: Menunjukkan kondisi permukaan mutiara yang terlihat, berdasarkan
        ada atau tidaknya noda atau bercak.
    pearl_treatment:
      name: Perawatan mutiara
      description: Mengungkapkan setiap perlakuan yang diterapkan pada mutiara yang
        memengaruhi warna/penampilan.
    pearl_type:
      name: Jenis mutiara
      description: Menentukan jenis/asal mutiara (misalnya, air tawar, Akoya, Tahiti,
        Laut Selatan) untuk mutiara lepas.
    peat_level:
      name: Tingkat gambut
      description: Menggambarkan intensitas pengaruh asap gambut dalam wiski, dari
        tanpa gambut hingga dengan gambut yang sangat kuat.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilitas sistem pedal dan cleat
      description: Menentukan standar pedal atau cleat mana yang kompatibel dengan
        shim atau wedge tersebut, sehingga pembeli dapat memilih produk yang sesuai
        dengan pedal dan sepatu mereka.
    pedal_configuration:
      name: Konfigurasi pedal
      description: Menunjukkan apakah kursi tersebut memiliki pedal tunggal, pedal
        terpisah/independen, atau desain yang dapat diubah.
    pedal_mounting_style:
      name: Gaya pemasangan pedal
      description: Menentukan cara pedal atau penutup/bantalan pedal terpasang pada
        kendaraan (metode pemasangan/pengikatan).
    pedal_set_components:
      name: Komponen set pedal
      description: Menentukan pedal mana saja yang termasuk dalam set tersebut.
    pedal_spindle_material:
      name: bahan poros pedal
      description: Material yang digunakan untuk poros/spindel pedal, memengaruhi
        kekuatan, berat, dan ketahanan terhadap korosi.
    pedal_spindle_thread_size:
      name: Ukuran ulir poros pedal
      description: Menentukan standar ulir poros pedal yang dipasang ke lengan engkol.
    pedal_type:
      name: Jenis pedal
      description: Menjelaskan gaya pedal yang disertakan dengan sepeda, menunjukkan
        kompatibilitas sepatu dan gaya berkendara.
    pellet_accessory_type:
      name: Jenis aksesori pellet
      description: Mengidentifikasi jenis aksesori pelet tertentu sehingga pemancing
        dapat dengan cepat menemukan alat bor, pengikat, atau penghenti sesuai dengan
        kebutuhan pembuatan rangkaian pancing mereka.
    pellet_grade:
      name: Kelas pelet
      description: Menunjukkan tingkat presisi pembuatan atau kualitas performa peluru
        airsoft.
    pen_ink_color:
      name: Warna tinta pena
      description: Menunjukkan warna tinta sebenarnya yang dikeluarkan oleh pena,
        yang dapat berbeda dari warna bodi luar pena.
    penalty_card_accessories_included:
      name: Aksesoris kartu penalti disertakan
      description: Daftar aksesoris tambahan yang disertakan bersama kartu penalti,
        seperti dompet, buku catatan skor, pensil, koin, peluit, atau kantong.
    penalty_card_colors_included:
      name: Termasuk warna kartu penalti
      description: Mencantumkan warna-warna kartu penalti yang terdapat dalam set
        produk.
    penalty_flag_throw_distance:
      name: Jarak lemparan bendera penalti
      description: Klasifikasi desain yang menunjukkan jangkauan lemparan bendera
        yang dimaksud.
    pendant_cutter_safety_features:
      name: Fitur keselamatan pemotong liontin
      description: Mengidentifikasi elemen keselamatan terintegrasi yang mengurangi
        risiko luka akibat kecelakaan saat membawa/memakai.
    pendant_cutter_wear_method:
      name: Metode keausan pemotong liontin
      description: Menentukan cara membawa atau mengenakan alat pemotong liontin tersebut.
    pepper_variety:
      name: Varietas cabai
      description: Menentukan varietas atau spesies cabai yang digunakan dalam produk,
        sehingga memungkinkan pembeli untuk membedakan antara profil rasa dan tingkat
        kepedasan yang berbeda.
    percussion_case_style:
      name: Gaya kotak perkusi
      description: Mengklasifikasikan gaya/konstruksi keseluruhan tas (tas lunak vs
        tas keras/kaku vs hibrida).
    percussion_instruments_included:
      name: Termasuk alat musik perkusi
      description: Mencantumkan jenis-jenis alat musik perkusi yang disertakan ketika
        produk tersebut merupakan set mainan multi-instrumen.
    percussion_mallet_handle_grip_style:
      name: Gaya pegangan palu perkusi
      description: Mengidentifikasi jenis perlakuan pegangan pada gagang (selain tekstur),
        seperti kayu polos, dipernis, pegangan berlapis karet, atau dibungkus.
    percussion_mallet_head_construction:
      name: Konstruksi kepala palu perkusi
      description: Menjelaskan gaya pembuatan/konstruksi kepala palu (misalnya, benang
        yang dililit, kain felt yang dililit, karet, kayu mentah), yang memengaruhi
        suara dan daya tahan.
    perfumery_base_carrier_type:
      name: Jenis pembawa dasar parfum
      description: Menentukan sistem pembawa/pelarut dari basis parfum (bahan-bahan
        utama yang membentuk basis tersebut untuk pengenceran dan kinerja).
    perfumery_base_intended_application:
      name: Penggunaan yang dimaksudkan untuk bahan dasar parfum.
      description: Menunjukkan format penggunaan akhir yang dirancang untuk basis
        tersebut (misalnya, semprotan parfum halus vs roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Pembawa/pelarut bahan parfum
      description: Mengidentifikasi pembawa/pelarut yang digunakan dalam bahan tersebut,
        jika diencerkan (misalnya, etanol, DPG, minyak jojoba).
    perfumery_ingredient_form:
      name: Bentuk bahan parfum
      description: Menentukan bentuk/kondisi fisik bahan parfum sebagaimana yang dipasok.
    perfumery_ingredient_type:
      name: Jenis bahan parfum
      description: Mengklasifikasikan bahan parfum berdasarkan fungsinya dalam praktik
        pembuatan parfum (misalnya, minyak esensial, bahan kimia aroma).
    perfumery_ingredient_usage_note:
      name: Catatan penggunaan bahan-bahan parfum
      description: Menunjukkan peran tipikal dalam struktur wewangian (atas, tengah/inti,
        dasar), dengan mengakui bahwa bahan-bahan dapat mencakup berbagai notanya.
    perfumery_ingredients:
      name: Bahan parfum
      description: Mencantumkan jenis-jenis bahan pewangi habis pakai yang termasuk
        dalam kit (misalnya, minyak esensial, minyak wangi, basis alkohol).
    perfumery_note_position:
      name: Posisi not aroma parfum
      description: Menunjukkan peran khas bahan tersebut dalam struktur wewangian
        (atas/tengah/dasar).
    persimmon_variety:
      name: Varietas kesemek
      description: Mengidentifikasi kultivar atau varietas kesemek, karena varietas
        yang berbeda seperti Fuyu atau Hachiya berbeda dalam tekstur, rasa, tingkat
        kesat, dan penggunaan kuliner.
    personalization_type:
      name: Jenis personalisasi
      description: Menentukan apakah dan bagaimana produk dapat disesuaikan untuk
        suatu acara (misalnya, monogram, nama/tanggal, sisipan foto).
    phonics_focus:
      name: Fokus fonetik
      description: Menentukan keterampilan fonetik dan membaca kata mana yang menjadi
        target mainan membaca ini.
    physalis_variety:
      name: Varietas Physalis
      description: Mengidentifikasi spesies botani spesifik, kultivar, atau varietas
        umum physalis yang dijual.
    pi_ata_filler_type_included:
      name: Jenis isian piñata disertakan
      description: Jika terdapat konten pengisi, jenis konten yang disediakan.
    pi_ata_hanging_method:
      name: Metode menggantung piñata
      description: Cara piñata dirancang untuk digantung atau ditopang (termasuk lingkaran,
        kait, tali, dll.).
    pi_ata_opening_type:
      name: Jenis pembukaan piñata
      description: Cara mengakses/menutup lubang pengisian (penutup, Velcro, ritsleting,
        sudah disegel, dll.).
    piccolo_key_system:
      name: Sistem kunci Piccolo
      description: Mengidentifikasi sistem/desain kunci yang digunakan pada piccolo
        (biasanya sistem Boehm untuk piccolo modern).
    piccolo_keywork_features:
      name: Fitur-fitur pada mekanisme tuts piccolo
      description: Menjelaskan mekanisme dan opsi kunci penting pada piccolo.
    pick_grip_aid:
      name: Alat bantu pegangan pick
      description: Menunjukkan fitur utama yang membantu pegangan pada pick selain
        tekstur/rasa permukaan secara umum (misalnya, lubang pegangan, logo timbul,
        lapisan karet).
    pickleball_construction_type:
      name: Jenis konstruksi pickleball
      description: Konstruksi pembuatan bola, seperti bola satu bagian tanpa sambungan
        atau bola dua bagian yang dilas, memengaruhi daya tahan dan konsistensi penerbangan.
    pickling_method:
      name: Metode pengawetan
      description: Menentukan media pengawetan atau teknik yang digunakan untuk pengawetan,
        seperti larutan cuka atau fermentasi laktat.
    pickup_and_preamp_configuration:
      name: Konfigurasi pickup dan preamp
      description: Menunjukkan apakah biola tersebut dilengkapi dengan pickup internal
        dan/atau preamp aktif untuk pertunjukan atau perekaman yang diperkuat.
    pickup_configuration:
      name: Konfigurasi pickup
      description: Menjelaskan tata letak pickup secara keseluruhan pada gitar listrik
        menggunakan singkatan umum (misalnya, SSS, HSS, HH).
    pickup_cover_material:
      name: Bahan penutup pickup
      description: Menentukan bahan utama penutup pickup (jika ada), termasuk lapisan
        pelapis umum jika itu yang ditentukan oleh pabrikan.
    pickup_cover_type:
      name: Jenis penutup pickup
      description: Menentukan apakah pickup gitar listrik memiliki penutup dan bahan/gaya
        penutupnya (misalnya, logam vs plastik).
    pickup_string_spacing:
      name: Jarak antar senar pickup
      description: Standar jarak kutub/senar yang digunakan untuk pembuatan pickup
        (misalnya, Fender/F-spaced vs Gibson/standar), memengaruhi penyelarasan pada
        gitar yang dilengkapi tremolo.
    pie_crust_type:
      name: Jenis kerak pai
      description: Menentukan gaya atau jenis kulit pai atau tart yang digunakan,
        seperti kulit pai berlapis, kulit pai biskuit graham, atau kulit pai bebas
        gluten.
    piece_configuration:
      name: Konfigurasi bagian
      description: Menunjukkan berapa banyak bagian terpisah yang membentuk stik,
        poros, atau jembatan, yang memengaruhi portabilitas dan gaya bermain.
    pillow_form_size:
      name: Ukuran bentuk bantal
      description: Penamaan ukuran jadi standar untuk bentuk/isian bantal (misalnya,
        18" x 18").
    pilot_helmet_communications_integration:
      name: Integrasi komunikasi helm pilot
      description: Menunjukkan apakah helm tersebut sudah termasuk atau telah dikonfigurasi
        sebelumnya untuk komponen komunikasi penerbangan.
    pilot_helmet_visor_configuration:
      name: Konfigurasi visor helm pilot
      description: Menentukan konfigurasi pelindung wajah/visor yang disertakan dengan
        helm pilot.
    pin_attachment_type:
      name: Jenis pengikat pin
      description: Menentukan jenis peniti/mekanisme pendukung yang digunakan untuk
        menempelkan peniti ke pakaian atau permukaan (misalnya, penjepit kupu-kupu,
        peniti magnetik).
    pin_backing_type:
      name: Jenis penopang pin
      description: Menentukan mekanisme pengikat/penyangga yang digunakan untuk mengamankan
        peniti pada pakaian atau aksesori.
    pin_cushion_attachment_style:
      name: Gaya pemasangan bantalan jarum
      description: Cara bantalan jarum dikenakan, dipasang, atau diposisikan selama
        penggunaan.
    pin_cushion_features:
      name: Fitur bantalan jarum
      description: Fitur fungsional yang melampaui fungsi dasar penahan pin.
    pin_face_customization_method:
      name: Metode kustomisasi tampilan pin
      description: Menentukan bagaimana desain bagian depan diproduksi (misalnya,
        enamel keras, enamel lunak, dicetak).
    pin_type:
      name: Jenis pin
      description: Menentukan gaya atau format produk pin yang digunakan untuk koleksi
        penggemar olahraga.
    ping_pong_certification:
      name: Sertifikasi tenis meja
      description: Menyatakan standar resmi atau tingkat persetujuan badan pengatur
        untuk produk tersebut.
    ping_pong_competition_certification:
      name: Sertifikasi kompetisi pingpong
      description: Menunjukkan status sertifikasi resmi bola pingpong untuk permainan
        resmi (misalnya, disetujui ITTF).
    ping_pong_paddle_handle_style:
      name: Gaya pegangan raket pingpong
      description: Menentukan bentuk/gaya pegangan raket, yang memengaruhi kenyamanan
        genggaman dan teknik bermain.
    ping_pong_robot_accessory_type:
      name: Jenis aksesori robot pingpong
      description: Mengidentifikasi subtipe fungsional aksesori sehingga pembeli dapat
        dengan cepat mempersempit hasil pencarian (misalnya, jaring vs. adaptor daya).
    ping_pong_rubber_surface_type:
      name: Jenis permukaan karet pingpong
      description: Mengidentifikasi gaya/tekstur permukaan karet yang diaplikasikan
        pada raket, yang memengaruhi karakteristik putaran dan kecepatan.
    ping_pong_rubber_type:
      name: Jenis karet pingpong
      description: Menentukan gaya konstruksi permukaan lembaran karet pingpong, yang
        memengaruhi karakteristik permainan.
    ping_pong_table_type:
      name: Jenis meja pingpong
      description: Mengklasifikasikan gaya atau format keseluruhan tabel untuk memudahkan
        perbandingan (misalnya, kompetisi, konversi teratas, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Metode pengucapan/produksi suara instrumen pipa
      description: Menentukan bagaimana instrumen menghasilkan suara (mekanisme aliran
        udara), membantu membedakan seruling pan, pipa buluh, dan keluarga pipa organ
        dalam filter.
    piston_application_type:
      name: Jenis aplikasi piston
      description: Tujuan penggunaan/fungsi piston (penggantian vs performa/balap
        vs tugas berat).
    piston_crown_dish_style:
      name: Gaya mahkota/piringan piston
      description: Bentuk mahkota piston yang memengaruhi volume ruang bakar dan kompresi
        (misalnya, bagian atas datar, kubah, cekung).
    piston_pin_retention_type:
      name: Jenis penahan pin piston
      description: Menentukan bagaimana pin pergelangan tangan (piston) ditahan di
        dalam rakitan piston/batang penghubung.
    pit_configuration:
      name: Konfigurasi lubang
      description: Menentukan format struktural area pendaratan (satu bagian vs. multi-modul)
        dan, secara tidak langsung, jumlah bagian atau modul yang dipasok.
    pit_cover_type:
      name: Jenis penutup lubang
      description: Menentukan permukaan atau lembaran pelindung yang disertakan dengan
        lubang, yang memengaruhi ketahanan terhadap paku sepatu, perlindungan terhadap
        cuaca, dan preferensi atlet.
    pitahaya_flesh_color:
      name: warna daging buah Pitahaya
      description: Menentukan warna daging bagian dalam buah pitahaya (buah naga)
        (misalnya, putih, merah, magenta), pembeda utama yang memengaruhi rasa, penampilan,
        dan nilai gizi yang dirasakan.
    pitch_mat_coverage_length:
      name: Panjang cakupan alas lapangan
      description: Mengklasifikasikan alas lapangan kriket berdasarkan bagian gawang
        yang ditutupinya (misalnya, lapangan penuh atau setengah lapangan).
    pitch_range:
      name: Rentang nada
      description: Menggambarkan rentang nada/kecerahan suara shaker yang dirasakan.
    pitch_standard:
      name: Standar nada
      description: Menentukan standar nada (penyetelan referensi) yang digunakan untuk
        pembuatan perekam (misalnya, A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Penunjukan ukuran karet pelempar
      description: Menunjukkan klasifikasi ukuran standar lapangan untuk karet pelempar,
        menyederhanakan pemilihan tanpa mengharuskan pembeli untuk mengetahui ukuran
        yang tepat.
    pitching_screen_style:
      name: Gaya layar pitching
      description: Menentukan desain struktural layar sehingga pembeli dapat dengan
        cepat memilih tata letak pelindung yang tepat untuk skenario pelatihan mereka.
    pitching_target_design:
      name: Desain target lemparan
      description: Mengklasifikasikan gaya atau konfigurasi keseluruhan target lemparan.
    pitching_wheel_count:
      name: Jumlah roda pelempar
      description: Menunjukkan jumlah roda penggerak yang digunakan oleh mesin pelempar.
    pivot_adjustability:
      name: Kemampuan penyesuaian poros
      description: Menunjukkan apakah gunting tersebut memiliki sekrup poros yang
        dapat disetel untuk mengatur ketegangan pemotongan.
    pivot_piece_type:
      name: Jenis bagian poros
      description: Membedakan antara berbagai bentuk antarmuka poros yang disediakan,
        seperti bentuk cangkir tradisional atau bentuk tabung.
    place_card_holder_closure_mechanism:
      name: mekanisme penutup tempat kartu nama
      description: Menentukan bagaimana pemegang kartu mencengkeram atau mengamankan
        kartu.
    place_card_orientation:
      name: Orientasi kartu tempat duduk
      description: Menentukan orientasi kartu tempat duduk saat digunakan/ditampilkan.
    place_card_printing_status:
      name: Status pencetakan kartu tempat duduk
      description: Menunjukkan apakah kartu tempat duduk kosong untuk tulisan tangan/cetak,
        sudah dicetak (nama tidak dipersonalisasi), atau dipersonalisasi/dicetak sesuai
        pesanan.
    placket_type:
      name: Jenis placket
      description: Menentukan gaya bukaan depan pada polo, termasuk jumlah kancing
        atau penutup alternatif.
    planetarium_content_theme:
      name: Tema konten planetarium
      description: Konten utama yang ditampilkan oleh proyektor planetarium.
    planetarium_projection_content_format:
      name: Format konten proyeksi planetarium
      description: Menentukan mekanisme konten proyeksi yang digunakan planetarium
        (cakram/slide fisik vs efek digital/LED).
    plant_fiber_type:
      name: Jenis serat tumbuhan
      description: Jenis serat spesifik asal tumbuhan ketika jenis sumber serat stapel
        adalah Tumbuhan.
    plaster_gauze_finish:
      name: Lapisan kasa plester
      description: Kecenderungan hasil akhir permukaan setelah pengaplikasian dan
        perataan.
    plaster_gauze_grade:
