        biliar mereka.
    compatible_bit_type:
      name: Jenis mata bot yang kompatibel
      description: Jenis-jenis mata bor yang dapat digunakan bersama pelindung tersebut.
    compatible_blade_hosel:
      name: Hosel bilah yang kompatibel
      description: Menunjukkan tipe hosel/taper mata pisau yang sesuai dengan poros,
        memastikan poros dan mata pisau terpasang dengan benar.
    compatible_blade_system:
      name: Sistem bilah yang kompatibel
      description: 'Menunjukkan sistem/format mata pisau pengganti yang diterima pisau
        (misalnya, mata pisau standar hobi #11, mata pisau segmen yang dapat dipatahkan).'
    compatible_boat_weaving_shuttle_loom:
      name: Alat tenun shuttle perahu yang sesuai
      description: Jenis alat tenun apa yang cocok untuk menggunakan shuttle perahu.
    compatible_bobbin_type:
      name: Jenis spul yang kompatibel
      description: Menunjukkan jenis bobbin/gulungan yang dirancang untuk digunakan
        oleh alat tenun perahu.
    compatible_bottle_mouth:
      name: Mulut botol yang kompatibel
      description: Jenis atau diameter mulut botol yang dirancang agar sesuai dengan
        sedotan atau tutupnya.
    compatible_bow_attachment_system:
      name: Sistem pemasangan busur yang kompatibel
      description: Menunjukkan antarmuka anggota tubuh atau aksesori yang dirancang
        untuk bagian tersebut (misalnya, ILF, pemasangan sekrup, pelepasan cepat).
    compatible_bow_crossbow_type:
      name: Jenis busur/busur silang yang kompatibel
      description: Menunjukkan gaya busur atau busur silang yang dirancang agar sesuai
        dengan aksesori tersebut.
    compatible_brake_fluid:
      name: Cairan rem yang kompatibel
      description: Spesifikasi DOT cairan rem yang sesuai dengan desain/bahan segel
