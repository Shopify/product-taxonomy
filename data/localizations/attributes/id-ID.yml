    weather_guard_mounting_method:
      name: Metode pemasangan pelindung cuaca
      description: Menentukan cara pelindung terpasang pada feeder atau struktur penyangga.
    wheel_bearing_type:
      name: Jenis bantalan roda
      description: Mengidentifikasi konstruksi bantalan atau bushing internal roda,
