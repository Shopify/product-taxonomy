    tiling_format:
      name: Format ubin
      description: Menentukan gaya tata letak PDF untuk menyusun halaman yang dicetak.
    time_current_characteristic:
      name: Karakteristik waktu-arus
      description: Menunjukkan perilaku waktu-arus sekering (misalnya, kerja cepat
        vs penundaan waktu), yang memengaruhi kesesuaian untuk rangkaian arus masuk.
    timer_count_mode:
      name: Mode penghitung waktu
      description: Menentukan mode penghitungan pengatur waktu, seperti hitung mundur,
        hitung maju (stopwatch), keduanya, atau interval/pengulangan.
    timer_display_type:
      name: Jenis tampilan pengatur waktu
      description: Menunjukkan bagaimana penghitung waktu permainan menampilkan waktu
        yang tersisa (misalnya, layar digital, jarum analog, jam pasir, atau tanpa
        tampilan visual).
    timer_operating_modes:
      name: Mode operasi timer
      description: Perilaku pengatur waktu didukung untuk memicu efek.
    timing_belt_construction_material_rubber_compound:
      name: Bahan konstruksi sabuk penggerak (senyawa karet)
      description: Kompon karet sabuk utama yang digunakan (misalnya, HNBR), yang
        memengaruhi ketahanan terhadap panas/minyak dan umur pakai.
    timing_belt_profile:
      name: Profil sabuk penggerak
      description: Profil/bentuk gigi standar pada timing belt (misalnya, trapesium
