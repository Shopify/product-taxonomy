        sebagian besar judul dan deskripsi produk, sehingga menangkapnya akan meningkatkan
        penyaringan dan penemuan.
    dayan_head_material:
      name: Bahan kepala dayan
      description: Bahan permukaan lapangan (pudi), seperti jenis kulit alami atau
        sintetis.
    dayan_strap_material:
      name: Bahan tali dayan
      description: Bahan tali penegang (baddhi) yang digunakan untuk mengikat dayan.
    dayan_syahi_type:
      name: Tepi dayan syahi
      description: Jenis penggunaan syahi (pasta tuning warna hitam) pada kepala dayan.
    decaffeination_method:
      name: Metode dekafeinasi
      description: Mengidentifikasi proses yang digunakan untuk menghilangkan kafein
        dari kopi tanpa kafein.
    decal_installation_method:
      name: Metode pemasangan stiker
      description: Cara pemasangan stiker pada permukaan kendaraan (misalnya, pemasangan
