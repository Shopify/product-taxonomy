      description: Bagaimana melodi-melodi tersebut disusun atau dibangun pada rebana.
    tambourine_jingle_material:
      name: Bahan gemerincing tamborin
      description: Menentukan bahan lonceng rebana (cakram logam), yang memengaruhi
