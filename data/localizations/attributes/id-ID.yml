    waste_container_lid_features:
      name: Fitur tutup wadah sampah
      description: Menyoroti fungsi atau peningkatan khusus yang terintegrasi pada
        tutupnya.
    waste_container_sign_message:
      name: Pesan tanda tempat sampah
      description: Menentukan jenis limbah spesifik atau teks peringatan yang tercetak
        pada label atau tanda.
    water_filtration_technology:
      name: Teknologi filtrasi air
      description: Menjelaskan teknologi atau mekanisme inti yang digunakan untuk
