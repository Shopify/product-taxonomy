    compatible_battle_top_system:
      name: Sistem battle top yang kompatibel
      description: Mengidentifikasi ekosistem atau seri produk battle top yang dirancang
        untuk gasing (digunakan untuk memastikan kompatibilitas komponen dan arena).
    compatible_bb_size:
      name: Ukuran BB yang kompatibel
      description: Menunjukkan diameter peluru airsoft yang didukung produk.
    compatible_bed_frame_style:
      name: Gaya rangka tempat tidur yang kompatibel
      description: Menentukan gaya tempat tidur atau rangka yang sesuai dengan aksesori
        tersebut.
    compatible_bicycle_tire_type:
      name: Jenis ban sepeda yang kompatibel
      description: Menentukan jenis ban sepeda mana yang dapat diperbaiki atau disegel
        oleh produk ini.
    compatible_bike_component:
      name: Komponen sepeda yang kompatibel
      description: Menentukan komponen sepeda mana yang dirancang untuk diperbaiki
        oleh alat atau produk tersebut.
    compatible_billiard_game:
      name: Permainan biliar yang kompatibel
      description: Mengidentifikasi format permainan biliar yang sesuai dengan desain
        rak, yang memastikan pelanggan memilih rak yang sesuai dengan permainan mereka.
    compatible_billiard_table_size:
      name: Ukuran meja biliar yang kompatibel
      description: Menentukan panjang meja standar yang sesuai dengan desain penutup,
