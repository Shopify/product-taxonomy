    mechanical_puzzle_solution_format:
      name: Format solusi teka-teki mekanik
      description: Format yang digunakan untuk memberikan petunjuk/solusi bila disertakan.
    medal_attachment_style:
      name: Gaya pemasangan medali
      description: Menentukan bagaimana medali dimaksudkan untuk dikenakan atau dipajang
