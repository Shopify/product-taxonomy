    thread_connection_size:
      name: Ukuran sambungan ulir
      description: Menentukan spesifikasi ulir yang menghubungkan poros, ujung, dan
        adaptor (misalnya, 6 mm, 5/16"-24).
    thread_construction:
      name: Konstruksi benang
      description: Bagaimana benang tersebut dibuat atau diproses (misalnya, benang
