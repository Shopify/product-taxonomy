    mandolin_back_sides_wood:
      name: Kayu bagian belakang & samping mandolin
      description: Menentukan jenis kayu yang digunakan untuk bagian belakang dan
        samping mandolin.
    mandolin_body_top_wood:
      name: Kayu top badan mandolin
      description: Kayu/bahan utama yang digunakan untuk papan suara (top) mandolin.
    mandolin_bridge_type:
      name: Jenis bridge mandolin
      description: Menentukan gaya bridge yang digunakan pada mandolin.
    mandolin_pickup_configuration:
      name: Konfigurasi pickup mandolin
      description: Menunjukkan apakah mandolin dilengkapi dengan komponen elektronik
        dan jenis sistem pickup apa yang terpasang.
    mandolin_string_configuration:
      name: Konfigurasi senar mandolin
      description: Menentukan konfigurasi senar mandolin berdasarkan jumlah total
        senar dan jumlah course (misalnya, 8 senar / 4 course).
    mangosteen_variety:
      name: Varietas manggis
      description: Mengidentifikasi spesies atau kultivar spesifik dari buah manggis
