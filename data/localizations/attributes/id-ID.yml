      name: Sistem tegangan
      description: Sistem penggulung/penegangan roda pemintal yang menjadi tujuan
        dari kit penggulung ini.
    tent_fabric_material:
      name: Bahan kain tenda
      description: Mengidentifikasi bahan utama yang digunakan pada bagian luar atau
        badan tenda, yang memengaruhi berat, kemampuan bernapas, dan ketahanan terhadap
        cuaca.
    tent_season_rating:
      name: Peringkat musim tenda
      description: Mengklasifikasikan tenda berdasarkan jumlah musim atau kondisi
        cuaca yang dirancang untuknya (misalnya, 3 musim, 4 musim, ekspedisi).
    tent_setup_type:
      name: Jenis pemasangan tenda
      description: Menunjukkan gaya pemasangan struktur tenda, seperti berdiri sendiri,
        semi-berdiri sendiri, tidak berdiri sendiri, tiup/rangka udara, atau pop-up.
