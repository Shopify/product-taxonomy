      description: Mengidentifikasi bahan utama alas atau tumpuan meja (berbeda dari
        kaki atau permukaan meja), membantu penyaringan berdasarkan bahan tertentu.
    table_base_type:
      name: Jenis dasar meja
      description: Mengidentifikasi desain struktural yang menopang permukaan meja
