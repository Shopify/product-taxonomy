        tampilan visual).
    timer_operating_modes:
      name: Mode operasi timer
      description: Perilaku pengatur waktu didukung untuk memicu efek.
    timing_belt_construction_material_rubber_compound:
      name: Bahan konstruksi sabuk penggerak (senyawa karet)
      description: Kompon karet sabuk utama yang digunakan (misalnya, HNBR), yang
