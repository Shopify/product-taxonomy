    tenor_recorder_joint_type:
      name: Jenis sambungan perekam tenor
      description: Menentukan jenis sambungan/koneksi antara bagian-bagian recorder
        tenor.
    tenor_saxophone_key_system:
      name: Sistem kunci saksofon tenor
      description: Menentukan sistem/standar kunci yang digunakan (sering disebut
        sebagai gaya Prancis/Boehm untuk saksofon).
    tenor_saxophone_pad_material:
      name: Bahan bantalan saksofon tenor
      description: Menentukan bahan utama yang digunakan untuk bantalan instrumen.
    tenor_trombone_slide_type:
      name: Trombon tenor tipe geser
      description: Jenis slide yang digunakan pada trombon tenor (misalnya, standar/lurus
        vs pemicu/aliran aksial).
    tenor_trombone_valve_configuration:
      name: Konfigurasi katup trombon tenor
      description: Menunjukkan apakah trombon tenor memiliki perlengkapan katup/rotor
        dan konfigurasi apa yang digunakan.
    tension_control_type:
      name: Jenis pengatur tegangan
      description: Menunjukkan bagaimana (atau apakah) alat tenun menyediakan pengaturan
        tarikan/tegangan pada kumparan/batang benang selama proses pengumpanan.
    tension_mechanism:
      name: Mekanisme tegangan
      description: Gaya penegangan yang digunakan untuk mengontrol pemasukan benang
        pakan dari kumparan/pilin saat menenun.
    tension_pitch_modulation_system:
      name: Sistem modulasi tegangan/nada
      description: Bagaimana gendang bicara mengubah nada/ketegangan selama dimainkan
