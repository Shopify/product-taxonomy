    compatible_ground_polarity:
      name: Polaritas ground yang kompatibel
      description: Menunjukkan apakah regulator tegangan tersebut ditujukan untuk
        sistem kelistrikan kendaraan dengan ground negatif atau ground positif (atau
        tidak sensitif terhadap polaritas).
    compatible_guitar_body_shape:
      name: Bentuk bodi gitar yang kompatibel
      description: Menunjukkan jenis bodi/bentuk gitar yang sesuai dengan desain wadah
        tersebut.
    compatible_guitar_case:
      name: Kotak gitar yang kompatibel
      description: Menentukan jenis-jenis kotak gitar mana yang kompatibel dan dapat
        digunakan dengan benar oleh pelembap udara ini.
    compatible_guitar_scale_length:
      name: Panjang skala gitar yang kompatibel
      description: Menunjukkan panjang skala gitar mana yang sesuai dengan set senar
        tersebut (berdasarkan panjang lilitan/panjang keseluruhan).
    compatible_gun_platform:
      name: Platform senjata api yang kompatibel
      description: Menentukan platform pengoperasian atau sumber daya yang kompatibel
        dengan produk tersebut (misalnya, AEG, GBB, HPA).
    compatible_hair_length:
      name: Panjang rambut yang sesuai
      description: Menentukan panjang atau volume rambut maksimal yang dapat ditampung
        dengan nyaman oleh penutup kepala tersebut.
    compatible_head_and_neck_restraint_system:
      name: Sistem penahan kepala dan leher yang kompatibel
      description: Menunjukkan apakah helm memiliki titik jangkar dan/atau kompatibel
