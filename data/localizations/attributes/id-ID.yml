      name: Gaya tenda
      description: Menjelaskan desain struktural tenda (misalnya, kubah, terowongan,
        rangka A).
    test_result_output_method:
      name: Metode keluaran hasil uji
      description: Menentukan bagaimana alat penguji baterai kendaraan menampilkan
