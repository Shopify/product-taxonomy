    compatible_brake_pad:
      name: Kampas rem yang kompatibel
      description: Menunjukkan jenis kompon kampas rem yang disetujui untuk rotor,
        sehingga menjamin keamanan dan keausan yang optimal.
    compatible_brake_service_system:
      name: Sistem servis rem yang kompatibel
      description: Menentukan apakah komponen tersebut ditujukan untuk rem cakram,
        rem tromol, atau keduanya.
    compatible_brake_system:
      name: Sistem rem yang kompatibel
      description: Menentukan catatan kompatibilitas sistem utama untuk penggunaan
        cairan rem.
    compatible_brake_type:
      name: Jenis rem yang kompatibel
      description: Menentukan jenis rem yang kompatibel dengan rak tersebut, seperti
        rem cakram atau rem pelek.
    compatible_brass_instrument_finish:
      name: Finishing alat musik tiup yang kompatibel
      description: Menentukan finis alat musik tiup logam mana yang aman dibersihkan
        oleh pembersih tanpa merusak finis.
    compatible_building_toy_system:
      name: Sistem mainan bangunan yang kompatibel
      description: Menunjukkan sistem/standar bangunan apa yang kompatibel dengan
        mainan tersebut (atau ukuran yang setara), seperti kompatibel dengan LEGO
        atau milik merek tertentu.
    compatible_capo_fretboard_radius:
      name: Radius fretboard capo yang kompatibel
      description: Menentukan radius/profil fretboard yang dirancang agar capo pas
        untuk kontak optimal dan stabilitas penyetelan.
    compatible_capo_number_of_strings:
      name: Jumlah senar yang kompatibel dengan capo
      description: Menunjukkan berapa banyak senar yang dirancang untuk dijepit oleh
        capo (berguna untuk instrumen 6, 7, 8, 12 senar, dan instrumen khusus).
    compatible_cardio_machine_type:
      name: Jenis mesin kardio yang kompatibel
      description: Mengidentifikasi jenis mesin kardio yang dirancang agar aksesori
        atau suku cadang tersebut dapat bekerja dengan baik.
    compatible_chain_link_type:
      name: Jenis mata rantai yang kompatibel
      description: Mengidentifikasi jenis mata rantai yang didukung alat tersebut
        (standar, setengah mata rantai, mata rantai cepat, dll.).
    compatible_chain_size:
      name: Ukuran rantai kompatibel
      description: Menentukan lebar rantai atau standar jarak antar mata rantai (misalnya,
        1/8 inci, 3/32 inci) yang didukung oleh alat tersebut.
    compatible_chain_width:
      name: Lebar rantai yang kompatibel
      description: Menunjukkan ukuran rantai mana yang dirancang untuk bekerja dengan
        freewheel tersebut.
    compatible_chip_denomination:
      name: Denominasi chip yang kompatibel
      description: Menunjukkan denominasi chip mana yang tersedia di baki/wadah yang
        memiliki posisi berlabel atau khusus (atau dimaksudkan untuk ditata).
    compatible_clarinet_mouthpiece_ligature:
      name: Ligatur mouthpiece klarinet yang kompatibel
      description: Mengidentifikasi standar kecocokan ligatur atau catatan kompatibilitas
        untuk mouthpiece.
    compatible_classical_guitar_string_scale_length:
      name: Panjang skala senar gitar klasik yang kompatibel
      description: Kompatibilitas panjang skala gitar/panjang senar yang dimaksudkan
        untuk set ini.
    compatible_clay_target_size:
      name: Ukuran target tanah liat yang kompatibel
      description: Mencantumkan ukuran atau bentuk target tanah liat yang dapat diterima
        oleh pelempar agar sesuai dan berkinerja baik.
    compatible_cleat_system:
      name: Sistem cleat yang kompatibel
      description: Menentukan antarmuka cleat atau pola baut yang didukung pedal sehingga
        pengendara dapat mencocokkan sepatu mereka dengan sistem yang tepat.
    compatible_clipless_pedal_system:
      name: Sistem pedal tanpa klip yang kompatibel
      description: Mengidentifikasi standar pedal/cleat tanpa klip spesifik yang dirancang
        untuk berinteraksi dengan produk.
    compatible_clutch_type:
      name: Jenis kopling yang kompatibel
      description: Kompatibilitas antarmuka kopling untuk flywheel (jika ada).
    compatible_coffee_pod_system:
      name: Sistem pod kopi yang kompatibel
      description: Menentukan mesin kopi atau sistem penyeduh yang sesuai dengan desain
        pod atau kapsul tersebut.
    compatible_construction_set_system:
      name: Sistem set konstruksi yang kompatibel
      description: Menunjukkan sistem bangunan/ekosistem merek mana yang kompatibel
        dengan set tersebut (misalnya, kompatibel dengan LEGO, kompatibel dengan DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Penyangga/pasak klarinet kontrabas yang kompatibel
      description: Menunjukkan antarmuka stand/peg atau gaya penyangga yang dibutuhkan.
    compatible_coolant_chemistry:
      name: Komposisi cairan pendingin yang kompatibel
      description: Menentukan keluarga kimia cairan pendingin mana yang kompatibel
        dengan aditif.
    compatible_cooling_system_material:
      name: Bahan sistem pendingin yang kompatibel
      description: Menentukan sistem/material pendingin mana yang aman untuk penggunaan
        cairan penguras radiator (misalnya, radiator aluminium, sistem logam campuran).
    compatible_crib_format:
      name: Format tempat tidur bayi yang kompatibel
      description: Menentukan kategori ukuran atau bentuk umum kasur atau sprei yang
        dirancang agar sesuai dengan aksesori tersebut.
    compatible_cross_stitch_fabric_count:
      name: Jumlah benang kain sulam silang yang kompatibel
      description: Jumlah benang kain yang disarankan untuk menyulam desain.
    compatible_cross_stitch_frame:
      name: Bingkai sulam silang yang kompatibel
      description: Menunjukkan untuk apa bingkai tersebut dirancang untuk digunakan
        (penggunaan genggam, dudukan meja, dudukan lantai, atau universal).
    compatible_crossbar:
      name: Palang yang kompatibel
      description: Kompatibilitas rak dengan palang atap kendaraan (jika dipasang
        di atap), termasuk standar bentuk/profil palang.
    compatible_cycling_cleat:
      name: Cleat bersepeda yang kompatibel
      description: Menentukan sistem cleat atau pedal yang dirancang untuk digunakan
        dengan sepatu bersepeda.
    compatible_cymbal_size:
      name: Ukuran simbal yang kompatibel
      description: Menentukan diameter simbal yang dimaksudkan (atau maksimum) yang
        dirancang agar sesuai dengan kotak; ini adalah kompatibilitas untuk ukuran
        simbal, bukan diameter luar kotak.
    compatible_device_type:
      name: Jenis perangkat yang kompatibel
      description: Menunjukkan jenis perangkat yang akan digunakan oleh dudukan tersebut
        (misalnya, monitor/TV, tablet, ponsel pintar, pemutar DVD portabel).
    compatible_dock_structure_type:
      name: Jenis struktur dock yang kompatibel
      description: Konstruksi dock tempat anak tangga dirancang untuk dipasang.
    compatible_dough_type:
      name: Jenis adonan yang kompatibel
      description: Menentukan jenis/merek adonan apa yang dirancang untuk digunakan
        dengan alat tersebut (misalnya, adonan mainan standar, tanah liat pemodelan).
    compatible_drawing_ink_surface:
      name: Permukaan tinta gambar yang kompatibel
      description: Menunjukkan permukaan/substrat yang direkomendasikan untuk kinerja
        terbaik.
    compatible_drivetrain_brand:
      name: Merek drivetrain yang kompatibel
      description: Mencantumkan merek sistem penggerak atau pengereman yang dirancang
        untuk bekerja dengan kabel tersebut.
    compatible_drivetrain_speeds:
      name: Kecepatan drivetrain yang kompatibel
      description: Menentukan jumlah kecepatan drivetrain (misalnya, 10 kecepatan)
        yang didukung crank atau chainring.
    compatible_equipment:
      name: Peralatan yang kompatibel
      description: Menentukan jenis peralatan olahraga musim dingin yang dirancang
        untuk ditahan oleh ragum tersebut.
    compatible_evap_system:
      name: Sistem EVAP yang kompatibel
      description: Menunjukkan apakah tutup bahan bakar dirancang untuk memenuhi persyaratan
        sistem EVAP (misalnya, penyegelan sesuai spesifikasi OEM) dan mengurangi lampu
        indikator mesin menyala.
    compatible_exercise_bike_style:
      name: Gaya sepeda statis yang kompatibel
      description: Menunjukkan model sepeda statis mana yang sesuai dengan aksesori
        atau suku cadang pengganti tersebut.
    compatible_fencing_weapon:
      name: Senjata anggar yang kompatibel
      description: Menentukan senjata atau disiplin anggar mana yang ditujukan untuk
        jaket atau kain lamé tersebut.
    compatible_fiber_type:
      name: Jenis serat yang kompatibel
      description: Jenis serat utama yang dirancang untuk diproses secara efektif
        oleh mesin carding drum.
    compatible_fin_box_system:
      name: Sistem kotak sirip yang kompatibel
      description: Mengidentifikasi kotak sirip atau sistem pemasangan yang dirancang
        agar sesuai dengan sirip, yang membantu peselancar membeli sirip yang kompatibel
        dengan papan selancar mereka (misalnya, FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Radius papan jari yang kompatibel
      description: Menentukan radius fingerboard (datar, melengkung, atau compound)
        yang dirancang agar sesuai dengan capo untuk tekanan yang merata dan mengurangi
        dengung.
    compatible_finish_type:
      name: Jenis finishing yang kompatibel
      description: Menunjukkan jenis lapisan akhir instrumen mana yang dinyatakan
        aman untuk disemprot.
    compatible_fishing_reel_type:
      name: Jenis gulungan pancing yang kompatibel
      description: Menentukan jenis reel pancing yang sesuai atau kompatibel dengan
        aksesori tersebut (misalnya, spinning, baitcasting, fly).
    compatible_fly_line_weight:
      name: Berat senar pancing yang kompatibel
      description: Menunjukkan berat senar pancing AFTMA yang dirancang untuk ditampung
        oleh gulungan tersebut.
    compatible_flywheel_type:
      name: Jenis flywheel yang kompatibel
      description: Menentukan jenis roda gila yang akan digunakan bersama pelat penekan
        kopling.
    compatible_football_kick_type:
      name: Jenis tendangan sepak bola yang kompatibel
      description: Mengidentifikasi situasi tendangan yang dirancang untuk didukung
        produk ini (misalnya, kickoff, field goal), yang membantu atlet dengan cepat
        menemukan perlengkapan yang sesuai.
    compatible_fuel_system_type:
      name: Jenis sistem bahan bakar yang kompatibel
      description: Menentukan sistem penyampaian bahan bakar yang dirancang untuk
        pembersih tersebut.
    compatible_gas_type:
      name: Jenis gas yang kompatibel
      description: Mengidentifikasi jenis gas bertekanan yang dirancang untuk disimpan
        di dalam tangki udara paintball.
    compatible_gel_wax_additives:
      name: Aditif lilin gel yang kompatibel
      description: Menentukan jenis aditif mana yang kompatibel dengan lilin gel ini
