    scabbard_material:
      name: Bahan sarung pedang
      description: Menentukan bahan utama sarung/selubung yang disertakan (jika ada).
    scale_model_assembly_status:
      name: Status perakitan model skala
      description: Menunjukkan apakah model skala tersebut siap dipajang atau memerlukan
