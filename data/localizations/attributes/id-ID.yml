        putaran, daya tahan, dan rasa.
    golf_cart_cover_climate_use:
      name: Penutup kereta golf untuk penggunaan di iklim tertentu
      description: Menunjukkan kondisi iklim/musim utama yang dirancang untuk ditahan
        oleh penutup penyimpanan.
    golf_cart_enclosure_fit_type:
      name: Jenis fit penutup kereta golf
      description: Menentukan apakah penutup dirancang untuk jumlah/faktor bentuk
        tempat duduk tertentu atau menawarkan kesesuaian universal/yang dapat diatur.
    golf_cart_intended_use:
      name: Penggunaan yang dimaksudkan untuk kereta golf
      description: Tujuan penggunaan utama dari desain atau konfigurasi kereta golf.
    golf_club_number:
      name: Nomor stik golf
      description: Mengidentifikasi nomor spesifik atau penamaan wedge yang tercetak
        pada stik golf (misalnya, 5, PW, GW).
    golf_club_part_type:
      name: Jenis bagian stik golf
      description: Mengategorikan aksesori atau komponen stik golf ke dalam subtipe
        umum (misalnya, selongsong adaptor, ferrule, pemberat).
    golf_grip_size:
      name: Ukuran grip golf
      description: Menentukan kategori ukuran eksternal keseluruhan dari grip golf,
        menunjukkan seberapa tebal grip tersebut terasa di tangan.
    golf_shoe_spike_type:
      name: Jenis paku sepatu golf
      description: Mengidentifikasi jenis sistem traksi yang digunakan pada sol luar
        sepatu golf (misalnya, desain berpaku atau tanpa paku).
    golf_tee_style:
      name: Gaya tee golf
      description: Menjelaskan gaya/desain struktural atau fungsional dari tee golf,
        yang memengaruhi ketinggian bola, daya tahan, atau pengurangan spin.
    golf_training_focus:
      name: Fokus pelatihan golf
      description: Mengklasifikasi keterampilan atau aspek utama yang ingin ditingkatkan
        oleh produk tersebut.
    golf_training_objective:
      name: Tujuan pelatihan golf
      description: Mengidentifikasi keterampilan atau aspek utama golf yang ingin
        ditingkatkan oleh alat bantu latihan ini.
    gong_profile_type:
      name: Jenis profil gong
      description: Menjelaskan profil fisik gong opera (misalnya, bagian tengah datar
        vs terangkat), yang sangat memengaruhi nada dan gaya bermain.
    grading_scale:
      name: Skala penilaian
      description: Skala penilaian yang digunakan pada koin emas batangan yang telah
        dinilai (misalnya, Sheldon 1–70).
    grading_service:
      name: Layanan penilaian
      description: Layanan penilaian/sertifikasi pihak ketiga untuk koin atau uang
        kertas (misalnya, PCGS, NGC).
    graduation_increment:
      name: Satuan pembagian terkecil
      description: Menentukan satuan pembagian terkecil yang tercetak/ terukir pada
        skala pengukur jahitan (resolusi tanda ukurannya).
    grain_processing_method:
      name: Metode pengolahan biji-bijian
      description: Mengidentifikasi metode pengolahan utama yang diterapkan pada biji-bijian
        (misalnya, direbus setengah matang, digiling, dikecambah), yang memengaruhi
        waktu memasak, tekstur, dan nilai gizi.
    grand_piano_soundboard_material:
      name: Bahan papan resonansi piano grand
      description: Bahan utama yang digunakan untuk papan suara piano (papan resonansi),
        yang memengaruhi nada dan daya tahan.
    grappling_dummy_pose:
      name: Pose boneka latihan grappling
      description: Menjelaskan posisi/postur tubuh standar boneka latihan, yang menentukan
        latihan dan teknik apa yang didukungnya.
    grease_application:
      name: Pengaplikasian gemuk
      description: Menentukan komponen kendaraan utama atau kasus penggunaan yang
        ditujukan untuk gemuk tersebut.
    grease_consistency_grade_nlgi:
      name: Tingkat konsistensi gemuk (NLGI)
      description: Menentukan nomor konsistensi NLGI yang menunjukkan kekentalan gemuk
        (misalnya, NLGI 2 yang umum untuk penggunaan serbaguna).
    grease_thickener_type:
      name: Jenis pengental gemuk
      description: Mengidentifikasi sistem pengental/sabun yang digunakan dalam formulasi
        gemuk.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Jenis katup pada blowpipe Great Highland bagpipe
      description: Menentukan sistem katup satu arah yang digunakan pada blowpipe.
    great_highland_bagpipes_drone_configuration:
      name: Konfigurasi drone Great Highland bagpipe
      description: Menentukan jenis-jenis drone yang disertakan dalam set tersebut.
    great_highland_bagpipes_mounting_material:
      name: Bahan dudukan Great Highland bagpipe
      description: Menentukan bahan dudukan dekoratif pada bagpipe (misalnya, perak
        nikel, imitasi gading).
    greens_maturity_stage:
      name: Tahap kematangan sayuran hijau
      description: Menunjukkan tahap perkembangan sayuran hijau saat dipanen.
    greens_preparation_state:
      name: Status persiapan sayuran hijau
      description: Menjelaskan bagaimana sayuran berdaun hijau diproses atau dikemas
        (misalnya, sudah dicuci, dipotong, siap dimakan).
    grenade_effect_type:
      name: Jenis efek granat
      description: Menunjukkan efek fungsional utama yang dihasilkan oleh granat paintball
        setelah diaktifkan (misalnya, asap, cat, flashbang).
    grid_unit:
      name: Satuan grid
      description: Sistem pengukuran utama yang tercetak pada alas (jika terdapat
        kisi/skala).
    grille_emblem_provision:
      name: Provisi emblem gril
      description: Menentukan apakah gril mendukung emblem/lencana OEM dan bagaimana
        caranya.
    grille_mounting_method:
      name: Metode pemasangan kisi
      description: Menentukan cara pemasangan gril pada kendaraan (misalnya, penggantian
        langsung vs inset/overlay; baut vs klip/jepit; memerlukan pengeboran vs tidak
        memerlukan pengeboran).
    grille_style:
      name: Gaya gril
      description: Menentukan gaya visual/desain gril kendaraan.
    grip_chalk_form:
      name: Bentuk kapur grip
      description: Mengidentifikasi bentuk fisik kapur yang disertakan atau digunakan
        bersama dengan kemasan.
    grip_coverage:
      name: Cakupan grip
      description: Mengidentifikasi keberadaan dan lokasi elemen pegangan silikon
        atau karet pada kaus kaki.
    grip_design:
      name: Desain grip
      description: Menentukan konfigurasi pegangan atau lubang pada pelat untuk memudahkan
        dibawa dan fleksibilitas latihan.
    grip_enhancer_effect:
      name: Efek penguat grip
      description: Menjelaskan fitur kinerja utama yang ditawarkan produk (misalnya,
        penyerapan kelembapan atau finis resin lengket).
    grip_enhancer_form:
      name: Bentuk penguat cengkeraman
      description: Mengidentifikasi bentuk fisik atau format produk penambah daya
        cengkeram sehingga atlet dapat memilih metode aplikasi yang sesuai.
    grip_features:
      name: Fitur pegangan
      description: Menunjukkan fitur pegangan/grip bawaan yang dirancang untuk meningkatkan
        genggaman, kenyamanan, atau kontrol selama bermain.
    grip_material:
      name: Bahan grip
      description: Mengidentifikasi bahan yang digunakan untuk permukaan pegangan
        celana.
    grip_shape:
      name: Bentuk grip
      description: Menjelaskan bentuk penampang atau gaya grip, terutama relevan untuk
        grip putter.
    grip_surface_type:
      name: Jenis permukaan pegangan
      description: Menjelaskan desain permukaan pijakan/traksi pedal yang memengaruhi
        cengkeraman dan rasa.
    grip_tackiness_level:
      name: Tingkat kelengketan grip
      description: Menilai seberapa lengket permukaan grip, yang membantu pemain memilih
        antara rasa kering dan kontrol yang sangat lengket.
    grip_tape_form:
      name: Bentuk pita genggam
      description: Menunjukkan bentuk pengiriman produk grip tape (misalnya, lembaran,
        gulungan, kit semprot).
    grip_wax_form:
      name: Bentuk lilin grip
      description: Mengklasifikasi bentuk fisik penjualan lilin grip.
    gripper_coverage:
      name: Cakupan gripper
      description: Menentukan gaya gripper pada sepatu anti-selip, yang menunjukkan
        cakupan permukaan dan kemudahan pelepasan.
    grommet_application_material:
      name: Bahan aplikasi grommet
      description: Bahan utama tempat grommet akan dipasang (misalnya, kain, kulit,
        vinil, terpal/kanvas).
    grommet_duty_rating:
      name: Peringkat beban grommet
      description: Menunjukkan kelas kekuatan/penggunaan yang dimaksudkan untuk grommet
        tersebut.
    grommet_style:
      name: Gaya grommet
      description: Gaya konstruksi set grommet (cara perakitan/penggunaannya).
    grooming_glove_texture_type:
      name: Jenis tekstur sarung tangan perawatan
      description: Mengidentifikasi tekstur permukaan utama yang digunakan untuk perawatan,
        yang menunjukkan tujuan yang dimaksud seperti menggosok, memoles, atau mencuci.
    groove_orientation:
      name: Orientasi alur
      description: Menjelaskan arah/tata letak alur atau tonjolan pada instrumen.
    groove_sampler_onboard_effects:
      name: Efek onboard groove sampler
      description: Menunjukkan kategori pemrosesan efek bawaan yang tersedia pada
        groove sampler (insert/master), seperti reverb, delay, kompresi, distorsi,
        EQ, filter.
    groove_sampler_storage_expansion_type:
      name: Jenis ekspansi penyimpanan groove sampler
      description: Menentukan opsi penyimpanan yang dapat dilepas/diperluas yang didukung
        oleh groove sampler.
    ground_attachment_method:
      name: Metode pemasangan ke tanah
      description: Menjelaskan bagaimana busur passing dipasang pada permukaan permainan,
        yang memengaruhi stabilitas dan kompatibilitas permukaan.
    groupset_components_included:
      name: Termasuk komponen grup-set
      description: Mencantumkan komponen drivetrain spesifik yang disertakan dalam
        groupset sehingga pelanggan memahami isi paket tersebut.
    gt_racing_class:
      name: Kelas balap GT
      description: Menentukan kategori/kelas GT yang menjadi dasar pembuatan atau
        homologasi mobil tersebut.
    guard_construction_type:
      name: Jenis konstruksi pelindung
      description: Apakah pelindung berupa protektor cangkang keras, sisipan pelindung
        lunak, atau desain gaya lengan/tali.
    guard_size_measurement_basis:
      name: Dasar pengukuran ukuran pelindung
      description: Pengukuran apa yang menjadi dasar penentuan ukuran (misalnya, lingkar
        siku, lingkar pergelangan tangan, lingkar lengan bawah).
    guard_style:
      name: Gaya pelindung
      description: Mengklasifikasi konstruksi atau jenis pelindung blade sepatu luncur
        untuk membantu pembeli dengan cepat membedakan antara pelindung keras untuk
        berjalan, soaker lembut, pelindung pegas, dan desain lainnya.
    guava_flesh_color:
      name: Warna daging jambu biji
      description: Menunjukkan warna daging bagian dalam buah jambu biji.
    guava_variety:
      name: Varietas jambu biji
      description: Mengidentifikasi kultivar atau varietas pasar jambu biji spesifik
        yang dijual (misalnya, jambu biji Apel, krim Meksiko, Thailand, Pink, Tanpa
        Biji, Putih).
    guide_material:
      name: Bahan pemandu
      description: Bahan yang digunakan untuk pemandu atau sisipan senar joran.
    guide_type:
      name: Jenis pemandu
      description: Menentukan jenis pemandu yang dipasang pada joran pancing, seperti
        single foot, roller, atau snake.
    guideline_markings:
      name: Tanda panduan
      description: Jenis tanda penyelarasan visual yang dicetak atau ditanam pada
        permukaan matras pitching untuk membantu latihan pitching.
    guiro_scraper_material:
      name: Bahan alat gesek guiro
      description: Bahan alat gesek/pukul yang disertakan atau direkomendasikan untuk
        digunakan bersama guiro.
    guiro_surface_style:
      name: Gaya permukaan guiro
      description: Menggambarkan pola/geometri permukaan guiro yang digesek untuk
        menghasilkan suara.
    guitar_body_finish_type:
      name: Jenis finis bodi gitar
      description: Menentukan jenis finis yang digunakan pada bodi gitar.
    guitar_bridge_system_type:
      name: Jenis sistem bridge gitar
      description: Keluarga desain sistem bridge/tailpiece untuk kompatibilitas dan
        penelusuran.
    guitar_case_style:
      name: Gaya kotak gitar
      description: Menentukan gaya perlindungan/struktur keseluruhan kotak gitar atau
        tas gig.
    guitar_humidifier_placement:
      name: Penempatan humidifier gitar
      description: Menentukan di mana humidifier dimaksudkan untuk digunakan/ditempatkan
        relatif terhadap instrumen atau lingkungan sekitar.
    guitar_pedal_i_o_configuration:
      name: Konfigurasi I/O pedal gitar
      description: Menunjukkan apakah pedal mendukung perutean input/output mono atau
        stereo.
    guitar_pedal_output_connector_type:
      name: Jenis konektor output pedal gitar
      description: Menentukan jenis konektor output audio yang digunakan oleh pedal.
    guitar_slide_finish:
      name: Finis slide gitar
      description: Finis permukaan slide yang memengaruhi rasa dan gesekan terhadap
        senar.
    guitar_slide_style:
      name: Gaya slide gitar
      description: Menentukan bentuk fisik dari slide atau tone bar gitar dan cara
        pemakaian/penggunaannya.
    guitar_stand_type:
      name: Jenis dudukan gitar
      description: Menentukan bentuk utama dudukan gitar (bagaimana dudukan tersebut
        menopang/menyimpan gitar).
    guitar_strap_attachment_type:
      name: Jenis pengait tali gitar
      description: Menentukan cara tali terpasang pada gitar (atau kancing tali),
        termasuk apakah menggunakan ujung tradisional atau sistem pelepas cepat.
    guitar_strap_end_material:
      name: Bahan ujung tali gitar
      description: Bahan yang digunakan pada ujung/tab tali (bagian yang terhubung
        ke kancing tali atau sistem pengunci tali).
    guitar_strap_features:
      name: Fitur tali gitar
      description: Fitur fungsional penting dari tali gitar di luar ukuran/bahan dasar
        (multi-select).
    guitar_string_coating:
      name: Lapisan senar gitar
      description: Menunjukkan apakah senar memiliki lapisan pelindung dan, jika ada,
        jenis lapisannya.
    guitar_string_gauge_type:
      name: Jenis ukuran ketebalan senar gitar
      description: Kategori ukuran senar yang dipasarkan untuk satu set senar gitar
        akustik (misalnya, ekstra ringan, ringan, sedang). Ketebalan senar E tinggi
        seringkali didekati; rentang ukuran pastinya dapat bervariasi tergantung produsen.
    guitar_string_set_gauge_category:
      name: Kategori ukuran ketebalan set senar gitar
      description: Kelompok ukuran ketebalan senar gitar yang umum digunakan dalam
        pemasaran (biasanya berasal dari senar E tinggi / senar ke-1).
    guitar_string_winding_type:
      name: Jenis lilitan senar gitar
      description: Menentukan gaya lilitan luar senar yang terpasang pada set tersebut.
    guitar_tuning_peg_button_shape:
      name: Bentuk tombol penyetel gitar
      description: Bentuk/gaya kunci/tombol penyetel.
    guitar_tuning_peg_configuration:
      name: Konfigurasi penyetel gitar
      description: Tata letak set tuner untuk headstock.
    guitar_tuning_peg_mounting_style:
      name: Gaya pemasangan tuner gitar
      description: Cara pemasangan mesin penyetel pada headstock (tipe bushing dan
        metode anti-rotasi).
    guitar_tuning_peg_shaft_type:
      name: Jenis poros penyetel gitar
      description: Apakah tiang senar tersebut padat atau terbelah, dan bagaimana
        senar dipasang.
    guitar_tuning_peg_style:
      name: Jenis tuner gitar
      description: Jenis mesin/pasak penyetel fisik dan format pemasangan yang digunakan
        pada headstock instrumen (misalnya, roda gigi tertutup vs roda gigi terbuka,
        pengunci, tiang terpisah).
    gum_condition:
      name: Kondisi gusi
      description: Kondisi/status perekat prangko di bagian belakang (misalnya, belum
        pernah ditempel, sudah ditempel, tanpa perekat).
    gun_action_type:
      name: Jenis aksi senapan
      description: Jenis aksi mekanis yang digunakan untuk memuat/menembak (misalnya,
        aksi baut, aksi tuas).
    gun_operational_status:
      name: Status operasional senjata api
      description: Menunjukkan apakah senjata koleksi tersebut dinonaktifkan/tidak
        dapat menembak (dan bagaimana cara penyajiannya).
    gun_type:
      name: Jenis senjata api
      description: Mengidentifikasi bentuk umum senjata api untuk senjata antik.
    gusset_material:
      name: Bahan gusset
      description: Menentukan bahan yang digunakan pada lapisan crotch/gusset, yang
        memengaruhi sirkulasi udara, kebersihan, dan kenyamanan.
    gymnastics_discipline:
      name: Disiplin senam
      description: Menentukan cabang senam yang ditujukan untuk produk ini (misalnya,
        Artistik, Ritmik, Akrobatik).
    hair_extension_texture:
      name: Tekstur ekstensi rambut
      description: Menggambarkan pola ikal, gelombang, atau tekstur dari helai rambut
        ekstensi.
    hair_net_style:
      name: Gaya jaring rambut
      description: Mengidentifikasi desain atau gaya konstruksi jaring rambut (misalnya,
        bouffant, snood, penutup sanggul).
    hair_quality_grade:
      name: Tingkat kualitas rambut
      description: Menunjukkan penamaan kualitas/asal industri dari rambut tersebut.
    halter_style:
      name: Gaya halter
      description: Mengidentifikasi gaya fungsional atau desain dari tali kekang (misalnya,
        tali tambang, breakaway, show), yang membantu pembeli memilih tali kekang
        yang sesuai dengan tujuan penggunaan mereka.
    hammock_style:
      name: Gaya tempat tidur gantung
      description: Menjelaskan gaya struktural atau konstruksi tempat tidur gantung.
    hand_and_foot_coverage:
      name: Perlindungan tangan dan kaki
      description: Menjelaskan sarung tangan dan sepatu bot terintegrasi atau yang
        dapat dilepas yang menutupi tangan dan/atau kaki.
    hand_cymbal_set_configuration:
      name: Konfigurasi set simbal tangan
      description: Menunjukkan apakah produk tersebut dijual sebagai sepasang, simbal
        tunggal, atau satu set yang lebih besar.
    hand_drum_head_material:
      name: Bahan kepala gendang tangan
      description: Bahan membran (penutup) gendang yang digunakan pada gendang piala.
    hand_exerciser_style:
      name: Alat latihan tangan
      description: Mengklasifikasi gaya atau mekanisme keseluruhan dari alat latihan
        tangan.
    hand_guard_backbone_material:
      name: Bahan tulang belakang pelindung tangan
      description: Material struktur tulang belakang (jika ada), yang menentukan kekuatan
        dan perlindungan.
    hand_guard_coverage_style:
      name: Gaya perlindungan pelindung tangan
      description: Menjelaskan cakupan/profil pelindung tangan, yang memengaruhi perlindungan
        terhadap angin/benturan.
    hand_guard_mounting_type:
      name: Jenis pemasangan pelindung tangan
      description: Menentukan cara pelindung tangan dipasang ke sepeda motor (misalnya,
        ujung setang dengan penjepit bagian dalam vs hanya penjepit).
    hand_guard_set_configuration:
      name: Konfigurasi set pelindung tangan
      description: Apakah produk tersebut dijual sebagai pasangan kiri/kanan atau
        satu sisi saja.
    hand_guard_style:
      name: Gaya pelindung tangan
      description: Menjelaskan desain atau gaya perlindungan (misalnya, Tertutup,
        Terbuka, Penuh, Ringan, Standar).
    hand_guard_weather_protection:
      name: Pelindung tangan untuk perlindungan terhadap cuaca
      description: Menunjukkan tingkat perlindungan cuaca yang diberikan oleh pelindung
        tangan.
    hand_paddle_strap_type:
      name: Jenis tali dayung tangan
      description: Menentukan jenis tali pengikat, atau ketiadaan tali pengikat, yang
        digunakan untuk mengamankan dayung tangan ke tangan pengguna.
    hand_percussion_mount_attachment_mechanism:
      name: Mekanisme pemasangan dudukan perkusi tangan
      description: Menentukan cara dudukan terpasang pada penyangga, rak, atau perangkat
        keras lainnya (misalnya, penjepit vs dudukan batang).
    hand_percussion_mounting_handling:
      name: Pemasangan/penanganan perkusi tangan
      description: Apakah instrumen tersebut dipegang, dikenakan, dipasang, atau diletakkan
        di atas meja/lantai selama penggunaan normal.
    hand_percussion_pitch_type:
      name: Jenis nada perkusi tangan
      description: Menunjukkan apakah instrumen tersebut menghasilkan nada yang pasti
        (dapat disetel/not) atau nada yang tidak pasti.
    hand_percussion_playing_method:
      name: Metode memainkan perkusi tangan
      description: Cara instrumen tersebut biasanya dimainkan untuk menghasilkan suara
        (misalnya, digoyang vs digesek).
    hand_percussion_set_configuration:
      name: Konfigurasi set perkusi tangan
      description: Apakah produk tersebut berupa satu instrumen, sepasang, atau satu
        set yang terdiri dari beberapa bagian.
    hand_percussion_size_class:
      name: Kelas ukuran perkusi tangan
      description: Kategori ukuran umum instrumen ketika pengukuran yang tepat tidak
        diberikan atau untuk memudahkan penyaringan.
    hand_sewing_needle_point_type:
      name: Jenis ujung jarum jahit tangan
      description: Bentuk/gaya ujung jarum jahit tangan yang digunakan untuk menembus
        berbagai bahan (misalnya, kain tenun, rajutan, kulit) atau benang.
    hand_support_level:
      name: Tingkat dukungan tangan
      description: Menentukan tingkat sokongan atau kompresi yang diberikan oleh sarung
        tangan, balutan, atau tali pengikat.
    hand_support_size:
      name: Ukuran penyangga tangan
      description: Ukuran sarung tangan, tali, atau balutan yang dinyatakan oleh produsen
        (XS-XXL atau satu ukuran).
    handball_ball_type:
      name: Jenis bola handball
      description: Menunjukkan kategori penggunaan yang dimaksudkan untuk bola tangan,
        seperti pertandingan, latihan, atau pantai.
    handball_playing_surface:
      name: Permukaan permainan bola tangan
      description: Menunjukkan permukaan permainan yang paling sesuai untuk bola tangan.
    handball_target_type:
      name: Jenis target bola tangan
      description: Menentukan gaya atau desain sasaran tembak yang dimaksudkan untuk
        latihan bola tangan tim.
    handbrake_actuation_type:
      name: Jenis pengoperasian rem tangan
      description: Menentukan cara kerja rem parkir.
    handbrake_orientation:
      name: Orientasi rem tangan
