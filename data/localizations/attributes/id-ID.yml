      description: Menjelaskan gaya geometris layar kayak, yang memengaruhi efisiensi,
        penanganan, dan pemasangan.
    salad_dressing_type:
      name: Jenis saus salad
      description: Mengidentifikasi gaya atau tekstur dasar saus (misalnya Krim lembut,
        Cuka minyak, Berbasis yogurt), membantu pembeli membedakan antara berbagai
        bahan dasar dan konsistensi.
    salad_topping_base_ingredient:
      name: Bahan dasar topping salad
      description: Menentukan kelompok bahan utama yang membentuk topping, membantu
        pelanggan menyaring berdasarkan preferensi nutrisi, perhatian terhadap alergen,
        atau tekstur yang diinginkan.
    salt_level:
