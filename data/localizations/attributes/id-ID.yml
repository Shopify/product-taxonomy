    window_film_type:
      name: Jenis film jendela
      description: Mengkategorikan gaya fungsional film (misalnya, privasi vs keamanan).
    window_rod_type:
      name: Jenis batang jendela
      description: Mengklasifikasikan gaya fungsional batang gorden jendela.
    window_screen_type:
      name: Jenis kasa jendela
      description: Menentukan gaya struktural atau metode operasi layar.
    window_treatment_lining_type:
      name: Jenis lapisan jendela
      description: Menunjukkan apakah tirai atau lis jendela dilapisi dan jenis lapisan
