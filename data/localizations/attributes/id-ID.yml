    tambourine_mounting_type:
      name: Jenis pemasangan tamborin
      description: Cara memegang atau menempatkan rebana saat dimainkan.
    tambourine_tuning_mechanism:
      name: Mekanisme penyetel tamborin
      description: Menentukan sistem penyetelan yang digunakan pada tamborin genggam
