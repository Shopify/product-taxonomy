      description: Menentukan fungsi utama suatu produk aroma sehingga pemburu dapat
        dengan cepat memilih alat yang tepat (misalnya, penarik perhatian vs. penghilang
        bau).
    scent_source:
      name: Sumber aroma
      description: Mencantumkan sumber biologis atau aromatik utama yang digunakan
        dalam formulasi produk, meliputi jenis urin, aroma berbasis makanan, aroma
        tumbuhan, dll.
    school_bus_body_type:
      name: Tipe bodi bus sekolah
      description: Mengklasifikasikan bus sekolah berdasarkan format bodi/kelas umum
        yang digunakan di pasaran (misalnya, Tipe A–D).
    school_bus_safety_feature:
      name: Fitur keselamatan bus sekolah
      description: Peralatan keselamatan penting terpasang di dalam bus sekolah.
    school_glue_washability:
      name: Daya cuci lem sekolah
      description: Menunjukkan seberapa mudah lem kering/basah dapat dibersihkan dari
        kulit/pakaian/permukaan.
    scissors_application:
      name: Penggunaan gunting
      description: Aplikasi/bahan utama yang dimaksudkan untuk memotong menggunakan
        gunting ini.
    scooter_brake_pad_material:
      name: Bahan kampas rem skuter
      description: Menentukan senyawa yang digunakan dalam kampas rem, yang memengaruhi
        kinerja, kebisingan, dan masa pakai.
    scoring_method:
      name: Metode penilaian
      description: Menentukan bagaimana skor dilacak di meja foosball, seperti penghitung
        manik-manik manual atau papan skor elektronik.
    scoring_pattern:
      name: Pola skor
      description: Tata letak zona skor yang tercetak di lapangan permainan.
    scoring_system_type:
      name: Jenis sistem penilaian
      description: Menjelaskan gaya mekanisme pencatatan skor yang disertakan dengan
        meja, seperti penggeser manual atau berbagai tampilan elektronik.
    scottish_smallpipes_bag_material:
      name: bahan kantung untuk alat musik smallpipe Skotlandia
      description: Menentukan bahan kantung (penampung udara) yang disertakan dengan
        pipa kecil.
    scottish_smallpipes_drone_tuning_configuration:
      name: Konfigurasi penyetelan drone smallpipe Skotlandia
      description: Menentukan pengaturan penyetelan drone yang disertakan dengan instrumen
        (nada/peran drone relatif terhadap nada dasar).
    scottish_smallpipes_reed_type:
      name: Jenis buluh untuk alat musik smallpipes Skotlandia
      description: Mengidentifikasi jenis reed yang digunakan untuk chanter (dan/atau
        apakah reed tersebut terbuat dari bahan sintetis vs tebu).
    scraping_surface_type:
      name: Jenis permukaan pengikis
      description: Menentukan konstruksi/geometri permukaan pengikis yang menghasilkan
        suara (misalnya, beralur, sisir/gigi, bergelombang).
    screw_drive_type:
      name: Jenis penggerak sekrup
