    temperature_control_type:
      name: Jenis pengatur suhu
      description: Bagaimana suhu alat dikontrol/disesuaikan.
    tenkara_action_ratio:
      name: Rasio aksi Tenkara
      description: Menunjukkan rasio lentur Tenkara tradisional yang menggambarkan
        di mana joran menekuk di bawah beban (misalnya, 6:4).
    tennis_ball_court_surface:
      name: Permukaan lapangan bola tenis
      description: Menentukan permukaan lapangan yang dirancang untuk bola tersebut
        guna memastikan kinerja dan daya tahan yang optimal.
    tennis_ball_pressure_type:
      name: Jenis tekanan bola tenis
      description: Mengidentifikasi tekanan internal atau konstruksi bola (bertekanan,
