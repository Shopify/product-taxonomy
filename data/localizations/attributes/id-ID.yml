      description: Menentukan bentuk atau potongan bagian belakang tank top, yang
        memengaruhi dukungan, mobilitas, dan estetika.
    tape_application_area:
      name: Area pemasangan pita
      description: Menentukan bagian peralatan atau pemutar tempat pita tersebut dimaksudkan
