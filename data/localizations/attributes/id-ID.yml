    saxophone_body_type:
      name: Jenis badan saksofon
      description: Menjelaskan konfigurasi fisik keseluruhan dari bodi dan orientasi
        corong saksofon bass.
    saxophone_construction_style:
      name: Gaya konstruksi saksofon
      description: Menunjukkan fitur konstruksi pembuatan saksofon umum yang memengaruhi
        daya tahan, resonansi, dan perawatan.
    saxophone_included_accessories:
      name: Termasuk aksesori saksofon
      description: Mencantumkan aksesori yang umumnya disertakan dalam paket pembelian
        saksofon alto.
    saxophone_key_system:
      name: Sistem kunci saksofon
      description: Mengidentifikasi sistem tuas kunci saksofon (tata letak/standar
        mekanisme) yang digunakan pada instrumen.
    saxophone_key_touch_material:
      name: Bahan sentuh tuts saksofon
      description: Menentukan bahan yang digunakan untuk penutup tuts saksofon (misalnya,
        penutup tuts dari mutiara).
    saxophone_mouthpiece_baffle_type:
      name: Jenis penyekat corong saksofon
      description: Menjelaskan desain penyekat yang membentuk aliran udara dan kecerahan.
    saxophone_neck_type:
      name: Jenis leher saksofon
      description: Menentukan konfigurasi leher yang disertakan dengan saksofon bas.
    saxophone_package_contents:
      name: Isi paket saksofon
      description: Daftar aksesoris utama yang disertakan dengan saksofon (misalnya,
        kotak penyimpanan, corong, ligatur, tali leher, perlengkapan pembersih).
    saxophone_reed_cut:
      name: Potongan reed saksofon
      description: Menentukan potongan/gaya reed saksofon yang memengaruhi respons,
        nada, dan rasa ketika bermain.
    saxophone_reed_material_type:
      name: Jenis bahan reed saksofon
      description: Menentukan kategori bahan buluh (misalnya, tebu vs sintetis).
    saxophone_reed_strength_scale:
      name: Skala kekuatan buluh saksofon
      description: Menentukan sistem/skala penomoran kekuatan yang digunakan untuk
        reed (seringkali bergantung pada merek), sehingga memungkinkan perbandingan
        antar daftar yang lebih jelas.
    saxophone_small_part_thread_size:
      name: Ukuran ulir bagian kecil saksofon
      description: Menentukan ukuran/standar ulir untuk bagian kecil saksofon yang
        berulir (terutama sekrup), sehingga memungkinkan pemilihan ukuran yang tepat.
    saxophone_swab_application_area:
      name: Area aplikasi swab saksofon
      description: Menunjukkan bagian saksofon yang akan dibersihkan/dikeringkan oleh
