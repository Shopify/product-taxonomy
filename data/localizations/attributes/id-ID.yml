      description: Mencantumkan mode pengoperasian dan fitur bawaan pengisi daya baterai
        kendaraan (misalnya, mode mengambang, desulfasi).
    vehicle_body_filler_form:
      name: Bentuk dempul bodi kendaraan
      description: Bentuk fisik/gaya kemasan produk pengisi tubuh.
    vehicle_coaxial_speaker_nominal_size:
      name: Ukuran nominal speaker koaksial kendaraan
      description: Ukuran speaker nominal yang digunakan dalam pemasangan (misalnya,
        6,5 inci, 6x9 inci).
    vehicle_cover_size_class:
      name: Kelas ukuran penutup kendaraan
      description: Pengelompokan ukuran umum yang menunjukkan ukuran kendaraan yang
        sesuai dengan desain penutup tersebut.
    vehicle_decor_set_items_included:
      name: Set dekorasi kendaraan termasuk item-item yang disertakan
      description: Menampilkan daftar jenis item dekorasi yang termasuk dalam set
        aksesori (visibilitas tingkat komponen untuk pembeli).
    vehicle_door_lock_actuation_method:
      name: Metode pengaktifan kunci pintu kendaraan
      description: Menunjukkan cara kerja atau pengoperasian kunci pintu kendaraan.
    vehicle_door_lock_actuator_kit_contents:
      name: Isi kit aktuator kunci pintu kendaraan
      description: Menunjukkan apa saja yang termasuk dalam paket aktuator (hanya
        aktuator vs perangkat keras/batang/braket/kabel).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfigurasi pengkabelan aktuator kunci pintu kendaraan
      description: Menentukan gaya pengkabelan yang dibutuhkan untuk instalasi (jumlah
        kabel dan fungsinya).
    vehicle_door_lock_included_components:
      name: Komponen yang termasuk dalam kunci pintu kendaraan
      description: Mencantumkan komponen apa saja yang termasuk dalam paket (berguna
        untuk kit/rakitan).
    vehicle_electrical_connector_type:
      name: Jenis konektor listrik kendaraan
      description: Menentukan jenis konektor atau colokan listrik regulator/medan
        alternator (tidak termasuk stud keluaran B+ utama).
    vehicle_equipment_fit_out_level:
      name: Tingkat perlengkapan kendaraan
      description: Menunjukkan tingkat perlengkapan kepolisian yang disertakan pada
        van tersebut.
    vehicle_glass_cleaner_form:
      name: Cairan pembersih kaca kendaraan
      description: Format produk fisik pembersih kaca kendaraan (misalnya, semprot,
        busa, tisu, gel, konsentrat).
    vehicle_hitch_cover_illumination_type:
      name: Jenis penerangan penutup pengait kendaraan
      description: Menentukan apakah penutup pengait memiliki penerangan dan jenisnya.
    vehicle_hitch_cover_mounting_type:
      name: Jenis pemasangan plat nomor kendaraan
      description: Menunjukkan metode yang digunakan untuk menahan/memasang penutup
        pengait pada penerima pengait.
    vehicle_license_plate_finish:
      name: penyelesaian pelat nomor kendaraan
      description: Hasil akhir permukaan pelat.
    vehicle_license_plate_frame_anti_theft_design:
      name: Bingkai plat nomor kendaraan dengan desain anti-pencurian
      description: Elemen desain terkait keamanan yang dimaksudkan untuk mencegah
        penghapusan atau perusakan.
    vehicle_license_plate_frame_plate_standard:
      name: Bingkai pelat nomor kendaraan standar
      description: Standar/wilayah plat nomor yang sesuai dengan ukuran bingkai.
    vehicle_license_plate_frame_profile:
      name: Profil bingkai plat nomor kendaraan
      description: Bagaimana bingkai membatasi pelat (cakupan/bentuk) yang memengaruhi
        keterbacaan dan kepatuhan.
    vehicle_license_plate_mounting_hole_count:
      name: jumlah lubang pemasangan plat nomor kendaraan
      description: Jumlah lubang pemasangan pada pelat.
    vehicle_license_plate_mounting_hole_pattern:
      name: Pola lubang pemasangan plat nomor kendaraan
      description: Pola penempatan lubang pemasangan pada pelat.
    vehicle_license_plate_reflectivity:
      name: Reflektivitas pelat nomor kendaraan
      description: Apakah dan bagaimana permukaan pelat memantulkan cahaya (penting
        untuk visibilitas dan kepatuhan pada beberapa pelat nomor unik).
    vehicle_license_plate_size_standard:
      name: Standar ukuran plat nomor kendaraan
      description: Menunjukkan standar regional/kendaraan yang sesuai dengan ukuran
        pelat tersebut (jarak antar lubang pemasangan dan dimensi keseluruhan).
    vehicle_license_plate_text_style:
      name: Gaya teks plat nomor kendaraan
      description: Gaya karakter pada plat (jika ada), termasuk yang timbul versus
        yang dicetak.
    vehicle_license_plate_theme:
      name: Tema plat nomor kendaraan
      description: Tema desain tingkat tinggi untuk karya seni pada piring tersebut.
    vehicle_lift_actuation_method:
      name: Metode pengoperasian lift kendaraan
      description: Bagaimana dongkrak/pengangkat tersebut digerakkan/diaktifkan untuk
        mengangkat kendaraan.
    vehicle_lift_mounting_type:
      name: Jenis pemasangan pengangkat kendaraan
      description: Menunjukkan bagaimana lift dipasang atau ditambatkan di ruang kerja.
    vehicle_lift_type:
      name: Jenis pengangkat kendaraan
      description: Menentukan gaya struktur dongkrak kendaraan yang digunakan untuk
        servis atau penyimpanan (misalnya, 2 tiang, 4 tiang, gunting).
    vehicle_magnet_attachment_type:
      name: Jenis pemasangan magnet kendaraan
      description: Menentukan metode pemasangan/penempelan utama untuk produk yang
        dijual sebagai magnet kendaraan (misalnya, hanya magnet vs magnet dengan bantuan
        perekat).
    vehicle_magnet_intended_use:
      name: Penggunaan yang dimaksudkan untuk magnet kendaraan
      description: Menunjukkan tujuan utama penggunaan magnet kendaraan tersebut.
    vehicle_mirror_adjustment_type:
      name: Jenis penyesuaian kaca spion kendaraan
      description: Menentukan cara penyesuaian/pengendalian cermin.
    vehicle_mirror_glass_type:
      name: Jenis kaca-spion kendaraan
      description: Menentukan tipe optik/bentuk permukaan kaca cermin.
    vehicle_organizer_features:
      name: Fitur pengatur barang di dalam kendaraan
      description: Fitur fungsional utama dari organizer kendaraan, seperti kemampuan
        dilipat, lapisan tahan air, kantong berinsulasi, atau alas anti selip.
    vehicle_paint_chemistry_base:
      name: Kimia/basis cat kendaraan
      description: Menunjukkan formulasi/kimia cat yang digunakan dalam cat kendaraan.
    vehicle_polish_application_method:
      name: Metode pengaplikasian poles kendaraan
      description: Menentukan metode atau alat yang direkomendasikan untuk mengaplikasikan
        poles kendaraan.
    vehicle_pursuit_package:
      name: Paket pengejaran kendaraan
      description: Menunjukkan apakah kendaraan tersebut dilengkapi dengan paket performa
        tugas pengejaran yang ditujukan untuk penggunaan kepolisian (misalnya, peningkatan
        sistem pendinginan, rem, suspensi, dan kalibrasi).
    vehicle_safety_equipment_position:
      name: Posisi peralatan keselamatan kendaraan
      description: Menentukan di bagian dalam atau di luar kendaraan tempat peralatan
        keselamatan tersebut dimaksudkan untuk digunakan atau dipasang.
    vehicle_safety_equipment_visibility_features:
      name: Fitur visibilitas peralatan keselamatan kendaraan
      description: Menunjukkan fitur-fitur yang dirancang untuk meningkatkan visibilitas
        dan daya tarik.
    vehicle_seat_row:
      name: deretan kursi kendaraan
      description: Menunjukkan baris belakang mana yang diperuntukkan bagi kursi tersebut
        (baris kedua vs baris ketiga), termasuk aplikasi kursi lipat belakang.
    vehicle_steering_assist_type:
      name: Jenis bantuan kemudi kendaraan
      description: Menentukan sistem bantuan kemudi yang dirancang untuk komponen
        tersebut.
    vehicle_steering_wheel_lock_form_factor:
      name: Faktor bentuk kunci roda kemudi kendaraan
      description: Menjelaskan gaya fisik kunci dan bagaimana cara kerjanya dengan
        roda kemudi (dan secara opsional kontrol lainnya).
    vehicle_wax_polish_product_form:
      name: Bentuk produk lilin/pemoles kendaraan
      description: Bentuk fisik/format penyajian lilin, poles, pelindung, atau penyegel.
    vehicle_wheel_valve_stem_type:
      name: Jenis batang katup roda kendaraan
      description: Menentukan jenis batang katup yang didukung atau disertakan.
    vehicle_windshield_fluid_formula:
      name: Formula cairan pembersih kaca depan kendaraan
      description: Fokus utama pembersihan/penghilangan kotoran pada formulasi cairan
        pembersih kaca depan.
    veil_length_type:
      name: Jenis panjang tirai
      description: Mengklasifikasikan kerudung menggunakan terminologi panjang standar,
        bukan pengukuran numerik.
    vellum_opacity_level:
      name: Tingkat opasitas vellum
      description: Menunjukkan seberapa tembus cahaya atau buram lembaran perkamen
        tersebut.
    ventilation_configuration:
      name: Konfigurasi ventilasi
      description: Konfigurasi ventilasi/pemasukan dan pembuangan udara utama pada
        helm.
    ventilation_control_type:
      name: Jenis kontrol ventilasi
      description: Menentukan gaya pengaturan aliran udara yang terintegrasi dalam
        helm.
    ventilation_level:
      name: Tingkat ventilasi
      description: Menunjukkan desain aliran udara/ventilasi relatif dari pelindung
        tersebut.
    venting_design:
      name: Desain ventilasi
      description: Menentukan apakah dan bagaimana penutup tersebut berventilasi untuk
        mengurangi kondensasi dan jamur selama penyimpanan.
    vestibule_type:
      name: Tipe serambi
      description: Mengklasifikasikan tata letak serambi relatif terhadap tenda.
    vibraphone_bar_material:
      name: Bahan batang vibrafon
      description: Bahan dari bilah/kunci nada vibrafon (bilah penghasil suara).
    vibraphone_motor_type:
      name: Jenis motor vibrafon
      description: Jenis motor yang digunakan untuk menggerakkan kipas resonator berputar
        untuk vibrato (jika dilengkapi).
    vibraphone_range_octaves:
      name: Rentang vibrafon (oktaf)
      description: Rentang nada vibrafon dinyatakan dalam oktaf (misalnya, 3 oktaf,
        3,5 oktaf).
    vibraphone_resonator_tube_material:
      name: Bahan tabung resonator vibrafon
      description: Bahan tabung resonator vibrafon di bawah palang.
    vibraphone_tuning_standard:
      name: Standar penyetelan vibrafon
      description: Nada referensi yang digunakan untuk penyetelan (A=440 Hz, dll.).
    viewing_sides:
      name: Sisi pandang
      description: Menentukan berapa banyak sisi papan skor yang menampilkan informasi
        (satu sisi, dua sisi, empat sisi, dll.).
    vintage_advertisement_decade:
      name: Iklan vintage dekade
      description: Menentukan dekade iklan tersebut pertama kali dicetak atau diproduksi
        (perkiraan jika tahun pastinya tidak diketahui).
    vintage_advertisement_format:
      name: Format iklan vintage
      description: Menentukan format fisik atau media dari barang koleksi iklan vintage
        tersebut.
    vintage_advertisement_subject_category:
      name: Kategori subjek iklan vintage
      description: Mengidentifikasi kategori produk/layanan yang diiklankan (untuk
        apa iklan tersebut).
    vintage_classic_truck_cab_type:
      name: Tipe kabin truk vintage & klasik
      description: Konfigurasi kabin/gaya bodi kompartemen penumpang truk.
    virginia_tech_helmet_star_rating:
      name: Peringkat bintang helm Virginia Tech
      description: Peringkat keselamatan yang diberikan oleh Virginia Tech Helmet
        Lab (0–5 bintang).
    virtual_analog_synthesizer_form_factor:
      name: Faktor bentuk synthesizer analog virtual
      description: Menentukan format fisik sasis synthesizer (keyboard vs modul/rak).
    viscosity_thickness:
      name: Viskositas/kekentalan
      description: Menjelaskan seberapa kental atau encer slip tersebut saat dijual
        atau pada kekentalan kerja yang direkomendasikan.
    vise_configuration:
      name: Konfigurasi penjepit
      description: Menentukan tata letak struktural atau jumlah bagian dalam set ragum,
        yang memengaruhi portabilitas dan kompleksitas pemasangan.
    visibility_features:
      name: Fitur visibilitas
      description: Menyoroti elemen desain yang meningkatkan visibilitas pengendara
        di lalu lintas.
    visor_brim_type:
      name: Jenis pelindung mata/tepi
      description: Menunjukkan keberadaan dan gaya pelindung wajah atau pinggiran
        pada helm.
    visor_configuration:
      name: Konfigurasi visor
      description: Menjelaskan keberadaan dan gaya pelindung mata atau pelindung wajah
        bawaan.
    visor_lens_finish:
      name: Lapisan lensa visor
      description: Menentukan warna, lapisan optik, atau gaya grafis yang diterapkan
        pada lensa pelindung mata.
    visor_style:
      name: Gaya pelindung mata
      description: Menunjukkan apakah tudung tersebut memiliki pinggiran/pelindung
        dan konfigurasinya.
    voc_compliance_standard:
      name: Standar kepatuhan VOC
      description: Klaim kepatuhan VOC regulasi untuk produk (jika berlaku).
    voc_regulatory_class:
      name: Kelas regulasi VOC
      description: Klasifikasi VOC yang dinyatakan untuk produk (sesuai label/SDS),
        digunakan untuk pembatasan peraturan dan lingkungan regional.
    vodka_base_ingredient:
      name: Bahan dasar vodka
      description: Bahan pertanian utama yang digunakan untuk menyuling vodka (misalnya,
        gandum, kentang, jagung).
    voice_coil_configuration:
      name: Konfigurasi kumparan suara
      description: Jumlah/susunan kumparan suara untuk fleksibilitas pengkabelan dan
        pilihan impedansi.
    voice_effects:
      name: Efek suara
      description: Jenis efek vokal bawaan yang didukung oleh perangkat karaoke.
    voltage_rating_type:
      name: Jenis peringkat tegangan
      description: Menentukan apakah peringkat tegangan sekering berlaku untuk AC,
        DC, atau keduanya.
    voltage_regulator_connector_type:
      name: Jenis konektor regulator tegangan
      description: Menentukan jenis koneksi/terminal yang digunakan untuk menghubungkan
        regulator ke kabel/alternator/generator kendaraan.
    wader_foot_type:
      name: Jenis alas kaki wader
      description: Menentukan apakah celana pancing tersebut memiliki sepatu bot terintegrasi
        atau bagian kaki berupa kaus kaki terpisah.
    wader_sole_type:
      name: Jenis sol sepatu wader
      description: Menentukan bahan sol luar atau jenis traksi yang digunakan pada
        sepatu bot atau sepatu bot khusus untuk berjalan di air dangkal.
    waistband_style:
      name: Gaya ikat pinggang
      description: Menjelaskan konstruksi ikat pinggang dan cara mengencangkan atau
        menyesuaikannya agar pas dan nyaman.
    wakeboard_binding_mounting_pattern:
      name: Pola pemasangan pengikat wakeboard
      description: Menentukan pola sisipan/pelat pada wakeboard yang kompatibel dengan
        binding tersebut.
    wakeboard_riding_style:
      name: gaya berkendara wakeboard
      description: Mengklasifikasikan lingkungan yang dituju atau gaya penggunaan
        wakeboard.
    wall_decal_style:
      name: Gaya stiker dinding
      description: Menentukan bagaimana stiker diproduksi/diaplikasikan (misalnya,
        dipotong dengan mesin, transfer, lembaran stiker).
    wallyball_equipment_included:
      name: Termasuk peralatan Wallyball
      description: Mencantumkan komponen spesifik yang disertakan dalam set wallyball
        sehingga pembeli tahu persis apa yang mereka beli dan dapat membandingkan
        paket-paket tersebut.
    warp_beam_type:
      name: Jenis balok lusi
      description: Menentukan konfigurasi balok lusi yang disertakan atau terpasang
        pada alat tenun (susunan balok yang disediakan bersama alat tenun).
    washability:
      name: Kemudahan dicuci
      description: Menunjukkan apakah lem tersebut dapat dibersihkan dengan air dan/atau
        dapat dicuci setelah diaplikasikan.
    watch_band_design:
      name: Desain tali jam tangan
      description: Menjelaskan gaya konstruksi atau pola desain tali jam tangan (misalnya,
        NATO, Milanese, Link).
    watch_movement:
      name: Pergerakan jam
      description: Menentukan mekanisme yang menggerakkan jam tangan, faktor kunci
        yang digunakan pembeli untuk membedakan antar model.
    water_activation:
      name: Aktivasi air
      description: Apakah suar tersebut dapat aktif secara otomatis saat terendam
        air (umum untuk EPIRB Kategori I/II).
    water_chamber_configuration:
      name: Konfigurasi ruang air
      description: Menjelaskan tata letak bagian dalam kasur, seperti ruang tunggal
        atau ganda, yang memengaruhi daya dukung, pengaturan suhu, dan gangguan terhadap
        pasangan.
    water_dispensing_mechanism:
      name: Mekanisme penyaluran air
      description: Menentukan bagaimana air dikeluarkan dari unit, seperti keran,
        nosel semprot, atau aliran gravitasi.
    water_exposure_protection_level:
      name: Tingkat perlindungan terhadap paparan air
      description: Menunjukkan tingkat perlindungan produk saat terkena air (misalnya,
        cipratan vs perendaman sementara). Gunakan peringkat Ingress Protection (IP)
        jika kode IP resmi tersedia.
    water_fed_design:
      name: Desain yang diberi makan air
      description: Menunjukkan apakah sikat dirancang untuk digunakan dengan air mengalir
        melalui pegangan aliran atau sambungan selang.
    water_gun_features:
      name: Fitur pistol air
      description: Fitur fungsional penting dan kemampuan yang disertakan pada pistol
        air.
    water_gun_operating_mechanism:
      name: mekanisme pengoperasian pistol air
      description: Cara kerja pistol air dalam memompa dan menyemburkan air saat digunakan.
    water_gun_spray_pattern:
      name: Pola semprotan pistol air
      description: Jenis aliran air yang dihasilkan oleh nosel selama penembakan.
    water_heating_method:
      name: Metode pemanasan air
      description: Menjelaskan bagaimana, atau apakah, air dipanaskan sebelum digunakan—misalnya,
        penyerapan tenaga surya, kompor propana, elemen listrik, pemanas bertenaga
        baterai, isolasi penahan panas, atau tanpa pemanasan.
    water_mattress_construction:
      name: Konstruksi kasur air
      description: Menentukan gaya konstruksi kasur air (misalnya, sisi keras atau
        sisi lunak), yang menentukan kompatibilitas rangka dan keseluruhan rasa.
    water_play_features:
      name: Fitur permainan air
      description: Komponen aktivitas air yang termasuk dalam taman air/seluncuran
        air.
    water_polo_competition_approval:
      name: Persetujuan kompetisi polo air
      description: Mengidentifikasi badan pengatur atau tingkat kompetisi tempat bola
        tersebut secara resmi disetujui atau disertifikasi.
    water_polo_goal_type:
      name: Jenis gawang polo air
      description: Mengklasifikasikan konfigurasi struktural atau pemasangan gawang
        (misalnya, mengambang, terpasang di dek, portabel).
    water_pump_drive_type:
      name: Jenis penggerak pompa air
      description: Menentukan bagaimana pompa air digerakkan/diaktifkan dalam sistem
        pendingin kendaraan.
    water_pump_housing_material:
      name: Bahan rumah pompa air
      description: Bahan dari wadah/badan pompa air.
    water_pump_impeller_material:
      name: Bahan impeler pompa air
      description: Menentukan material impeler pompa air (rotor/baling-baling internal
        yang menggerakkan cairan pendingin).
    water_pump_mounting_type:
      name: Jenis pemasangan pompa air
      description: Menentukan gaya pemasangan/bentuk pompa air agar sesuai dengan
        mesin (misalnya, rumah yang dipasang dengan baut vs kartrid/sisipan).
    water_purification_method:
      name: Metode pemurnian air
      description: Mengidentifikasi mekanisme utama yang digunakan produk untuk membuat
        air aman untuk diminum di lapangan (misalnya, pompa versus aliran gravitasi
        versus sinar UV).
    water_resistance:
      name: Ketahanan air
      description: Mengkomunikasikan tingkat perlindungan terhadap cuaca yang diberikan,
        seperti tahan air atau kedap air.
    water_resistance_level:
      name: Tingkat ketahanan air
      description: Menunjukkan apakah tekstil tersebut menolak air dan pada tingkat
        berapa.
    water_resistance_rating_case_protection_level:
      name: Tingkat ketahanan air (tingkat perlindungan casing)
      description: Menunjukkan tingkat ketahanan/perlindungan air yang diberikan oleh
        wadah beroda (tingkat pemasaran, bukan penyegelan IP elektronik), misalnya,
        tahan air vs kedap air.
    water_rocket_kit_items_included:
      name: Perlengkapan roket air termasuk di dalamnya
      description: Komponen utama yang termasuk dalam paket produk.
    water_rocket_propulsion_type:
      name: Jenis propulsi roket air
      description: Sumber tenaga/propulsi utama yang digunakan untuk meluncurkan roket.
    water_rocket_recovery_system:
      name: Sistem pemulihan roket air
      description: Metode yang digunakan untuk memulihkan roket setelah peluncuran.
    water_ski_base_design:
      name: Desain dasar ski air
      description: Menentukan profil lambung bagian bawah ski air, yang memengaruhi
        karakteristik penanganan.
    water_ski_fin_type:
      name: Jenis sirip ski air
      description: Menentukan konfigurasi sirip pada ski air, yang memengaruhi pelacakan
        dan kemampuan manuver.
    water_source:
      name: Sumber air
      description: Mengidentifikasi asal air sebelum proses karbonasi.
    water_sports_safety_standard:
      name: Standar keselamatan olahraga air
      description: Mencantumkan standar keselamatan atau daya apung formal yang dipenuhi
        produk (misalnya, CE EN 1385 untuk helm, ISO 12402-5 untuk alat bantu daya
        apung, USCG Tipe III).
    water_table_feature_set:
      name: Set fitur meja air
      description: Menyoroti fitur permainan bawaan dari meja air seperti air terjun,
        penyemprot, pompa, atau kolam bertingkat.
    water_table_items_included:
      name: Barang-barang yang termasuk dalam meja air
      description: Menentukan aksesori apa saja yang disertakan dalam set meja air
        (misalnya, perahu, cangkir, corong, figur).
    water_table_water_source_type:
      name: Jenis sumber air tanah
      description: Menentukan bagaimana muka air tanah diisi atau disuplai dengan
        air.
    waterbed_stabilization_level:
      name: Tingkat stabilisasi kasur air
      description: Menunjukkan tingkat pengurangan gelombang atau pengendalian gerakan
        yang diberikan oleh kasur air.
    watercolor_ink_water_resistance_after_drying:
      name: Ketahanan air tinta cat air (setelah kering)
      description: Menunjukkan apakah tinta cat air menjadi tahan air/kedap air setelah
        kering (sesuai klaim produsen).
    watercraft_care_application_area:
      name: Bidang aplikasi perawatan perahu
      description: Menunjukkan area atau komponen utama dari sebuah kapal air tempat
        produk tersebut dimaksudkan untuk digunakan.
    watercraft_drive_mechanism:
      name: mekanisme penggerak perahu
      description: Menjelaskan mekanisme penggerak spesifik yang terpasang atau didukung
        di atas kapal.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Pola unit pengirim tangki bahan bakar perahu
      description: Menentukan pola/standar pemasangan untuk unit pengirim bahan bakar
        tangki dan pengukur yang kompatibel (misalnya, pola baut kapal umum).
    watercraft_fuel_tank_shape:
      name: Bentuk tangki bahan bakar perahu
      description: Menjelaskan bentuk fisik keseluruhan tangki bahan bakar untuk mendukung
        perencanaan ruang/penempatan.
    watercraft_hull_material:
      name: Bahan lambung kapal
      description: Menentukan material utama konstruksi lambung kapal.
    watercraft_ignition_part_voltage:
      name: tegangan bagian pengapian perahu
      description: Tegangan nominal/persyaratan untuk bagian pengapian (jika berlaku),
        seperti sistem 12 V.
    watercraft_impeller_material_grade:
      name: Kelas material impeler perahu
      description: Menentukan bahan impeler perahu (misalnya, karet neoprena, nitril,
        perunggu).
    watercraft_lighting_certification_compliance:
      name: Sertifikasi/kepatuhan penerangan kapal air
      description: Menunjukkan kepatuhan terhadap peraturan/standar yang telah disertifikasi
        untuk penggunaan di lingkungan laut (misalnya, sesuai dengan USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Fitur penyesuaian dudukan motor perahu
      description: Kemampuan penyesuaian dudukan (misalnya, kemiringan, pengangkatan,
        pergeseran) yang memengaruhi kegunaan dan kesesuaian.
    watercraft_piston_part_type:
      name: Jenis suku cadang piston perahu
      description: Mengidentifikasi komponen terkait piston mana yang diwakili oleh
        daftar tersebut.
    watercraft_propeller_blade_rake:
      name: penggaruk bilah baling-baling kapal air
      description: Menentukan kemiringan bilah (sudut bilah relatif terhadap poros),
        yang memengaruhi daya angkat haluan dan kinerja.
    watercraft_propeller_rotation_direction:
      name: arah putaran baling-baling kapal air
      description: Menunjukkan arah/kecenderungan putaran baling-baling yang dibutuhkan
        untuk kompatibilitas sistem penggerak (misalnya, kanan/standar vs kiri/berlawanan
        arah putaran).
    watercraft_pump_stage_impeller_role:
      name: Peran tahap pompa/impeller pada perahu
      description: Mengidentifikasi apakah impeller tersebut ditujukan untuk peran
        pompa tertentu (misalnya, pompa air mentah/laut, sirkulasi pendingin, pompa
        jet).
    watercraft_registration_status:
      name: Status pendaftaran perahu
      description: Menunjukkan apakah perahu layar tersebut menyertakan dokumen kepemilikan
        dan/atau registrasi.
    watercraft_safety_equipment_activation_type:
      name: Jenis aktivasi peralatan keselamatan perahu
      description: Metode utama pengaktifan perangkat keselamatan (untuk suar/alarm
        MOB/PLB), berbeda dari pengembungan.
    watercraft_steering_cable_core_material:
      name: Bahan inti kabel kemudi perahu
      description: Menentukan material kabel/inti bagian dalam yang mentransmisikan
        gaya.
    watercraft_steering_cable_hardware_included:
      name: Termasuk perangkat keras kabel kemudi perahu.
      description: Menentukan perangkat keras dan aksesori pemasangan apa saja yang
        disertakan dengan kabel kemudi.
    watercraft_steering_cable_system_type:
      name: Sistem kabel kemudi perahu
      description: Menentukan arsitektur sistem kemudi yang dirancang untuk kabel
        tersebut (misalnya, putar, rak).
    watercraft_steering_wheel_hub_bore_type:
      name: Jenis poros/lubang roda kemudi perahu
      description: Menentukan gaya antarmuka pemasangan/lubang tengah (misalnya, tirus,
        bergerigi) tempat roda terhubung ke hub atau adaptor.
    watercress_variety:
      name: Varietas selada air
      description: Mengidentifikasi varietas atau jenis selada air spesifik yang dijual.
    waterproof_level:
      name: Tingkat tahan air
      description: Menunjukkan tingkat perlindungan air pada alas kaki, termasuk klaim
        tahan air yang didukung garansi.
    wax_blend_composition:
      name: Komposisi campuran lilin
      description: Mencantumkan bahan lilin yang dicampur dalam produk dan/atau jenis
        campuran yang dipasarkan.
    wax_coat_type:
      name: Jenis lapisan lilin
      description: Menunjukkan apakah wax tersebut dimaksudkan sebagai lapisan dasar
        (basecoat), lapisan atas (topcoat), atau formula serbaguna/lapisan tunggal.
    wax_hardness:
      name: Kekerasan lilin
      description: Menunjukkan tingkat kekerasan relatif lilin, yang memengaruhi daya
        tahan dan kelancaran luncuran pada berbagai jenis salju.
    wax_physical_form:
      name: Bentuk fisik lilin
      description: Menunjukkan bentuk fisik/rupa lilin mentah yang dipasok.
    wax_recommended_candle_application:
      name: Penggunaan lilin yang direkomendasikan
      description: Menunjukkan gaya lilin utama yang menjadi dasar pembuatan lilin
        tersebut.
    wax_tackiness_level:
      name: Tingkat kelengketan lilin
      description: Menjelaskan tingkat daya rekat/cengkeraman lilin pada mata pisau.
    weapon_system_integration:
      name: Integrasi sistem senjata
      description: Menunjukkan apakah kendaraan tersebut mencakup sistem atau dudukan
        senjata terintegrasi.
    weather_suitability:
      name: Kesesuaian cuaca
      description: Menunjukkan kondisi lingkungan tempat sarung tangan tersebut dirancang,
        seperti cuaca dingin atau bermain dalam cuaca basah.
    weave_finish:
      name: Tenun/finishing
      description: Menjelaskan jenis tenunan kain atau lapisan permukaan utama yang
        memengaruhi tekstur dan kilau dasi.
    weave_style:
      name: Gaya tenun
      description: Menjelaskan pola tenun tradisional yang digunakan dalam pembuatan
        topi Panama, yang memengaruhi sirkulasi udara, fleksibilitas, penampilan,
        dan harga.
    weave_type:
      name: Jenis anyaman
      description: Mengidentifikasi gaya tenun/konstruksi kain (nama tenun dagang)
        yang memengaruhi tekstur, kilau, dan jatuhnya kain.
    weaving_beater_edge_type:
      name: Jenis tepi pemukul tenun
      description: Menjelaskan profil tepi kerja pemukul datar yang bersentuhan dengan
        benang pakan (misalnya, lurus vs bergerigi).
    weaving_beater_style:
      name: Gaya pemukul tenun
      description: Mengidentifikasi gaya/format fungsional dari pemukul tenun datar.
    weaving_shuttle_tip_style:
      name: Gaya ujung alat tenun
      description: Menentukan desain ujung/hidung depan alat tenun, yang memengaruhi
        cara alat tenun melewati celah tenun dan kemungkinan tersangkutnya benang
        lusi.
    weaving_shuttle_use_case:
      name: Studi kasus penggunaan alat tenun ulang-alik
      description: Menentukan aplikasi tenun yang dituju, di mana alat tenun tersebut
        dirancang atau dioptimalkan.
    webbing_construction_type:
      name: Jenis konstruksi anyaman
      description: Menjelaskan gaya anyaman atau jalinan fisik dari bahan anyaman,
        yang memengaruhi penanganan, kekuatan, dan tujuan penggunaan.
    webbing_design:
      name: Desain anyaman
      description: Menjelaskan gaya selaput di antara jari-jari, yang memengaruhi
        latihan resistensi dan daya dorong.
    weight_adjustability:
      name: Kemampuan penyesuaian berat
      description: Menjelaskan apakah resistansi produk dapat diubah oleh pengguna
        (misalnya, dapat dipilih atau dapat diberi beban) atau tetap pada satu berat
        tertentu.
    weight_integration_system:
      name: Sistem integrasi berat
      description: Menjelaskan apakah dan bagaimana pemberat terintegrasi ke dalam
        BCD (misalnya, kantong pemberat yang dapat dilepas, tidak ada, tambahan opsional).
    weight_plate_compatibility:
      name: Kompatibilitas pelat beban
      description: Menentukan diameter pelat beban yang dapat diterima mesin (Olimpiade,
        Standar, atau keduanya).
    weight_plate_style:
      name: Gaya pelat beban
      description: Mengklasifikasikan desain/tipe pelat beban (misalnya, Olimpiade,
        bumper, selektor) untuk penyaringan kompatibilitas cepat.
    weightlifting_belt_style:
      name: Gaya sabuk angkat beban
      description: Mengkategorikan desain keseluruhan atau konfigurasi sabuk yang
        didorong oleh tujuan (misalnya, sabuk tuas, sabuk celup, sabuk tirus).
    weightlifting_federation_certification:
      name: Sertifikasi federasi angkat besi
      description: Persetujuan resmi atau kesesuaian produk oleh federasi olahraga
        kekuatan, seperti IPF atau IWF.
    wetsuit_boot_height:
      name: Tinggi sepatu bot pakaian selam
      description: Mengklasifikasikan tinggi/potongan sepatu bot pada kaki, yang memengaruhi
        cakupan, mobilitas, dan masuknya air.
    wetsuit_entry_system:
      name: Sistem masuk pakaian selam
      description: Menjelaskan jenis dan lokasi sistem bukaan/ritsleting yang digunakan
        untuk mengenakan pakaian selam.
    wetsuit_seam_construction:
      name: Konstruksi jahitan pakaian selam
      description: Menentukan bagaimana jahitan dibuat dan disegel, yang memengaruhi
        kehangatan, fleksibilitas, dan daya tahan.
    wheat_product_form:
      name: Bentuk produk gandum
      description: Menentukan bentuk fisik atau olahan dari produk gandum.
    wheel_arrangement:
      name: Susunan roda
      description: Menentukan susunan roda lokomotif uap (notasi Whyte), yang merupakan
        ciri khas dan istilah umum yang digunakan kolektor/pencari.
    wheel_brake_type:
      name: Jenis rem roda
      description: Menjelaskan konfigurasi pengereman yang terdapat pada roda atau
        kastor gerobak.
    wheel_chock_grip_features:
      name: Fitur pegangan ganjal roda
      description: Fitur desain traksi dan cengkeraman yang meningkatkan daya cengkeram
        pada permukaan dan terhadap ban.
    wheel_cleaner_acidity_ph_category:
      name: Kategori keasaman/pH pembersih roda
      description: Menunjukkan apakah pembersih roda bersifat asam, netral, atau basa
        (dan opsional apakah dipasarkan sebagai produk dengan pH seimbang).
    wheel_cleaner_formula_type:
      name: Jenis formula pembersih roda
      description: Untuk pembersih roda dan larutan pencuci terkait, menunjukkan kategori
        formula utama produk (misalnya, berbasis asam, non-asam, pH netral/seimbang,
        atau reaktif terhadap besi).
    wheel_construction_type:
      name: Jenis konstruksi roda
      description: Menentukan metode pembuatan/konstruksi roda.
    wheel_contaminant_target:
      name: Target kontaminan roda
      description: Menentukan jenis kontaminasi utama yang dirancang untuk dihilangkan
        oleh pembersih tersebut.
    wheel_core_type:
      name: Jenis inti roda
      description: Menjelaskan gaya konstruksi inti roda, yang memengaruhi berat,
        kekakuan, dan transfer energi.
    wheel_cylinder_inlet_port_thread_standard:
      name: Ulir standar lubang masuk silinder roda
      description: Menentukan standar ulir port masuk saluran rem pada silinder roda
        (misalnya, ulir gelembung metrik vs ulir terbalik SAE).
    wheel_fastener_seat_type:
      name: tipe dudukan pengikat roda
      description: Menentukan gaya dudukan mur/baut roda yang sesuai dengan roda (misalnya,
        kerucut/tapered, bola/radius, datar, mag/shank).
    wheel_illumination:
      name: Penerangan roda
      description: Menunjukkan apakah roda tersebut memiliki fitur pencahayaan atau
        cahaya bawaan.
    wheel_material:
      name: Bahan roda
      description: Mengidentifikasi komposisi utama roda, yang memengaruhi daya tahan,
        cengkeraman, dan peredaman getaran.
    wheel_profile:
      name: Profil roda
      description: Menjelaskan bentuk penampang roda yang memengaruhi kecepatan, cengkeraman,
        dan kelincahan.
    wheel_setup_type:
      name: Jenis pengaturan roda
      description: Menentukan gaya konfigurasi roda yang digunakan pada sepatu roda.
    wheel_system_finish:
      name: Sistem roda selesai
      description: Pelapisan/penyelesaian permukaan pelek/roda dan bagian/aksesoris
        roda tertentu.
    whip_style:
      name: Gaya cambuk
      description: Mengklasifikasikan produk berdasarkan gaya cambuk atau pecut berkuda
        spesifik atau disiplin yang dituju.
    whipped_cream_base:
      name: Basis krim kocok
      description: Mengidentifikasi bahan dasar utama yang digunakan untuk membuat
        krim kocok, seperti krim susu atau kelapa.
    whipped_cream_form:
      name: Bentuk krim kocok
      description: Menunjukkan format fisik tempat krim kocok tersebut dijual.
    whistle_head_material:
      name: Bahan kepala peluit
      description: Menentukan bahan kepala/corong peluit (blok/kepala fipple).
    whistle_light_features:
      name: Fitur lampu peluit
      description: Menunjukkan apakah peluit tersebut dilengkapi dengan efek cahaya
        terintegrasi untuk pesta (misalnya, LED).
    whistle_purpose:
      name: Tujuan peluit
      description: Mengidentifikasi aplikasi utama yang dimaksudkan dari peluit tersebut
        (pelatihan olahraga, keselamatan maritim, pelatihan anjing, dll.).
    whistle_sound_style:
      name: Gaya suara siulan
      description: Menjelaskan gaya/karakter suara yang dihasilkan dari peluit (misalnya,
        nada tunggal vs nada ganda).
    white_glue_finish_appearance_when_dry:
      name: Hasil akhir/tampilan lem putih setelah kering
      description: Menentukan tampilan lem setelah kering untuk penggunaan kerajinan/kantor
        (misalnya, bening vs buram).
    white_glue_washability:
      name: Kemampuan pencucian lem putih
      description: Menunjukkan apakah lem yang sudah kering dapat dicuci/dibersihkan
        dari kain atau kulit.
    whitewater_kayak_style:
      name: Gaya kayak arung jeram
      description: Tujuan desain utama dalam segmen arung jeram (misalnya, Creekboat,
        River Runner, Playboat).
    whitewater_rating_class:
      name: Peringkat arung jeram (kelas)
      description: Tingkat kesulitan sungai tertinggi dalam Skala Internasional yang
        mampu ditangani oleh rakit tersebut.
    whorl_mounting_interface:
      name: Antarmuka pemasangan whorl
      description: Cara roda pemintal terpasang pada roda pemintal (gaya/sambungan
        poros).
    wick_construction_type:
      name: Jenis konstruksi sumbu
      description: Konstruksi/gaya sumbu (kepang, pipih, kepang persegi, berinti,
        kayu, dll.).
    wick_core_type:
      name: Jenis inti sumbu
      description: Apakah sumbu tersebut tanpa inti atau memiliki inti (misalnya,
        inti kertas atau inti seng) yang memengaruhi kekakuan dan karakteristik pembakaran.
    wick_tab_crimp_type:
      name: Tipe jepit tab sumbu
      description: Cara tab sumbu mengamankan sumbu (gaya konstruksi/jepit).
    wick_tab_material:
      name: Bahan tab sumbu
      description: Bahan dari tab/penyangga yang terpasang (umumnya pelat timah),
        yang relevan untuk ketahanan terhadap korosi dan preferensi peraturan (misalnya,
        menghindari timbal).
    wick_tab_shape:
      name: Bentuk tab sumbu
      description: Bentuk/faktor ukuran pelat tab sumbu.
    wick_type_included:
      name: Jenis sumbu disertakan
      description: Menentukan jenis/material sumbu yang disertakan dalam kit.
    wig_fiber_material:
      name: Bahan serat wig
      description: Mengidentifikasi serat utama yang digunakan untuk rambut wig sehingga
        pembeli dapat dengan mudah memilih antara berbagai jenis rambut manusia dan
        pilihan sintetis dengan karakteristik penataan dan daya tahan yang berbeda.
    wildlife_attractant_scent:
      name: Aroma penarik satwa liar
      description: Mengidentifikasi aroma utama yang digunakan untuk memikat satwa
        liar, meliputi aroma makanan alami dan aroma jenis feromon.
    willow_grade:
      name: Kelas Willow
      description: Menentukan tingkat kualitas kayu willow yang digunakan, menunjukkan
        struktur serat dan tingkat kinerja secara keseluruhan.
    willow_type:
      name: Jenis willow
      description: Mengidentifikasi jenis kayu willow atau bahan alternatif yang digunakan
        untuk bilah pemukul bisbol, yang sangat memengaruhi kinerja, daya tahan, dan
        harga.
    wind_up_mechanism_type:
      name: Jenis mekanisme putar
      description: Menentukan cara mainan tersebut diputar atau diaktifkan.
    wind_up_toy_movement_pattern:
      name: Pola gerakan mainan putar
      description: Menggambarkan gerakan utama yang dihasilkan saat diputar.
    windbreak_purpose:
      name: Tujuan penahan angin
      description: Menentukan tujuan utama penggunaan penahan angin tersebut.
    windfoil_board_mounting_system:
      name: Sistem pemasangan papan Windfoil
      description: Menentukan kotak foil atau antarmuka pemasangan yang terpasang
        pada papan windfoil.
    windfoil_sail_style:
      name: Gaya layar windfoil
      description: Mengklasifikasikan layar berdasarkan gaya atau disiplin berkendara
        yang dimaksud.
    winding_direction:
      name: Arah putaran
      description: Menunjukkan pola putaran yang didukung oleh alat pemutar jam (searah
        jarum jam, berlawanan arah jarum jam, atau dua arah).
    winding_method:
      name: Metode penggulungan
      description: Cara benang pakan dimaksudkan untuk digulung/dimuat untuk digunakan
        di dalam alat tenun.
    winding_speed_control_type:
      name: Jenis kontrol kecepatan penggulungan
      description: Menunjukkan metode yang digunakan untuk mengontrol kecepatan penggulungan
        selama penggunaan.
    winding_type:
      name: Jenis gulungan
      description: Menentukan konstruksi lilitan senar bass (profil lilitan luar).
    windlass_control_station_type:
      name: Jenis stasiun kontrol kerekan
      description: Jenis antarmuka kontrol yang disertakan atau didukung untuk mengoperasikan
        kerekan.
    windlass_mount_type:
      name: Jenis dudukan kerekan
      description: Di mana/bagaimana kerekan jangkar dimaksudkan untuk dipasang di
        perahu.
    window_component_location:
      name: Lokasi komponen jendela
      description: Menentukan jendela/bukaan mana yang berlaku untuk bagian tersebut
        di dalam kendaraan (misalnya, kaca depan vs kaca pintu vs kaca belakang vs
        kaca samping).
    window_configuration:
      name: Konfigurasi jendela
      description: Menunjukkan keberadaan dan ukuran relatif jendela visibilitas transparan
        pada sayap wingfoil.
    window_glass_construction:
      name: Konstruksi kaca jendela
      description: Menentukan konstruksi pengaman/laminasi kaca jendela kendaraan
        bermotor.
    window_glass_features:
      name: Fitur kaca jendela
      description: Menunjukkan apakah kaca tersebut mendukung teknologi kendaraan
        terintegrasi (misalnya, bantalan sensor hujan, braket kamera).
    window_glass_finish:
      name: Finishing kaca jendela
      description: Menentukan jenis lapisan/warna/perlakuan privasi pada kaca jendela
        kendaraan bermotor.
    window_glass_tint_color:
      name: Warna kaca film jendela
      description: Menentukan corak warna dari lapisan warna yang ada di dalam kaca
        (bukan warna produk secara umum).
    window_glass_tint_level:
      name: Tingkat pewarnaan kaca jendela
      description: Menunjukkan perkiraan tingkat kegelapan kaca jendela bawaan pabrik/privasi
        (bukan film aftermarket). Gunakan tingkat deskriptif bila nilai VLT yang tepat
        tidak diketahui.
    window_net_latch_mechanism:
      name: Mekanisme pengunci jaring jendela
      description: Menentukan mekanisme pengunci/pelepas yang digunakan untuk jaring
        jendela (misalnya, tombol tekan, tuas, gesper bergaya sabuk pengaman).
    window_net_mounting_hardware:
      name: Perangkat keras pemasangan jaring jendela
      description: Mengidentifikasi jenis perangkat keras pemasangan atau metode pemasangan
        yang digunakan untuk memasang jaring jendela (misalnya, klip, sekrup, gaya
        kait/batang), atau apakah perangkat keras disertakan.
    window_net_opening_direction:
      name: Arah bukaan jaring jendela
      description: Menentukan bagaimana jaring jendela membuka/menutup relatif terhadap
        penghuni untuk keperluan evakuasi dan kepatuhan terhadap peraturan.
    window_regulator_operation:
      name: Pengoperasian pengatur jendela
      description: Menentukan cara pengoperasian pengatur jendela (engkol manual atau
        elektrik).
    windshield_coverage_area:
      name: Area cakupan kaca depan
      description: Menentukan bagian mana dari eksterior depan kendaraan yang dirancang
        untuk dilindungi oleh penutup kaca depan (misalnya, hanya kaca depan vs termasuk
        wiper, kaca spion, jendela samping, atau tepi kap mesin).
    windshield_mount_attachment_method:
      name: Metode pemasangan pada kaca depan
      description: Menentukan bagaimana dudukan tersebut menempel atau mencengkeram
        permukaan kaca depan.
    windshield_washer_fluid_seasonality:
      name: musiman cairan pembersih kaca depan
      description: Menunjukkan musim/iklim yang dituju atau penggunaan utama dari
        formulasi cairan pembersih kaca depan (misalnya, penghilang es di musim dingin,
        pembersih serangga di musim panas, sepanjang tahun).
    windsurf_fin_style:
      name: Gaya sirip selancar angin
      description: Mengklasifikasikan sirip berdasarkan disiplin berlayar atau gaya
        penggunaan yang dimaksud (misalnya, ombak, slalom, rumput laut).
    windsurfing_connection_standard:
      name: Standar koneksi selancar angin
      description: Antarmuka mekanis atau tipe kotak yang digunakan untuk memasang
        komponen ke papan atau perangkat.
    windsurfing_sail_style:
      name: Gaya layar windsurfing
      description: Mengklasifikasikan disiplin atau penggunaan yang dimaksudkan untuk
        layar tersebut, seperti selancar ombak, freeride, atau foil.
    wine_additive_type:
      name: Jenis aditif anggur
      description: Menentukan jenis produk pembuatan anggur merah ini (bahan, aditif,
        ragi, zat penjernih, kit, dll.).
    wine_body:
      name: Tubuh anggur
      description: Menggambarkan berat dan sensasi di mulut yang dirasakan saat meminum
        anggur.
    wine_carbonation:
      name: Karbonasi anggur
      description: Menunjukkan apakah anggur tersebut tidak bersoda, semi-bersoda,
        atau bersoda dan, jika relevan, intensitas buihnya.
    wine_making_ingredient_type:
      name: Jenis bahan pembuatan anggur
      description: Menentukan kategori bahan fungsional untuk aditif dan bahan yang
        dapat dikonsumsi dalam pembuatan anggur.
    wine_making_stage:
      name: Tahap pembuatan anggur
      description: Mengidentifikasi tahapan proses pembuatan anggur mana yang ditujukan
        untuk produk tersebut.
    wine_style:
      name: Gaya anggur
      description: Mengklasifikasikan gaya produksi anggur secara luas di luar warna,
        seperti anggur diam (still wine), anggur bersoda (sparkling wine), atau anggur
        yang diperkuat (fortified wine).
    winemaking_process_stage:
      name: Tahapan proses pembuatan anggur
      description: Menunjukkan tahapan utama proses pembuatan anggur yang menjadi
        sasaran pasokan tersebut.
    wing_count:
      name: Jumlah sayap
      description: Jumlah sayap/lengan pada bumerang.
    wing_handle_type:
      name: Jenis pegangan sayap
      description: Menentukan gaya sistem pegangan tangan pada sayap wingfoil.
    wing_part_type:
      name: Jenis bagian sayap
      description: Mengidentifikasi komponen atau suku cadang khusus untuk sayap wingfoil.
    wingfoiling_style:
      name: Gaya wingfoiling
      description: Menunjukkan disiplin wingfoiling atau gaya berkendara spesifik
        yang ditargetkan oleh produk tersebut.
    wiper_arm_finish:
      name: finishing lengan wiper
      description: Lapisan permukaan atau pelapis pelindung yang diaplikasikan pada
        lengan wiper, memengaruhi ketahanan terhadap korosi dan penampilan.
    wiper_arm_pivot_mount_type:
      name: Tipe dudukan poros lengan wiper
      description: Menentukan bagaimana lengan wiper dipasang ke mekanisme atau poros
        wiper kendaraan.
    wiper_blade_attachment_type:
      name: Jenis pemasangan bilah penghapus kaca
      description: Menentukan jenis konektor/pemasangan yang digunakan untuk memasang
        bilah penghapus kaca ke lengan penghapus kaca.
    wiper_blade_rubber_material:
      name: Bahan karet bilah penghapus kaca
      description: Bahan dari elemen pembersih (sisipan/isi ulang) yang bersentuhan
        dengan kaca.
    wiper_system_position:
      name: Posisi sistem wiper
      description: Menunjukkan posisi pemasangan sistem wiper pada kendaraan.
    wire_coating_material:
      name: Bahan pelapis kawat
      description: Menentukan bahan lapisan luar/selubung yang diterapkan pada kawat
        (bukan bahan inti kawat), yang dapat memengaruhi ketahanan abrasi dan seberapa
        lancar kawat tersebut melewati lubang manik-manik.
    wire_coating_type:
      name: Jenis pelapis kawat
      description: Menentukan apakah dan bagaimana kawat tersebut dilapisi/ditutupi
        (untuk warna, perlindungan, dan tekstur).
    wire_construction_type:
      name: Jenis konstruksi kabel
      description: Menentukan konstruksi fisik kawat manik-manik, seperti kawat serabut
        atau kawat padat dan apakah kawat tersebut dilapisi atau tidak.
    wire_finish:
      name: Lapisan kawat
      description: Menentukan lapisan permukaan, pelapis, atau penyepuhan yang diterapkan
        pada kawat (misalnya, dipoles, dilapisi enamel, digalvanis, dilapisi), yang
        memengaruhi penampilan dan ketahanan terhadap noda/korosi.
    wire_gauge_awg:
      name: Ukuran kawat (AWG)
      description: Ukuran American Wire Gauge (AWG) dari konduktor yang digunakan
        dalam rangkaian kabel.
    wire_insulation_material:
      name: Bahan isolasi kabel
      description: Bahan isolasi/selubung kawat yang digunakan pada rangkaian kabel
        (memengaruhi ketahanan terhadap suhu/bahan kimia).
    wire_packaging_type:
      name: Jenis kemasan kawat
      description: Menentukan cara penjualan/pengemasan kawat tersebut.
    wire_shape_profile:
      name: Bentuk/profil kawat
      description: Menggambarkan bentuk penampang kawat.
    wiring_configuration:
      name: Konfigurasi pengkabelan
      description: Menunjukkan apakah pedang anggar tersebut dipasok dengan kabel
        pra-instal untuk penilaian elektrik, tanpa kabel, nirkabel, atau ditujukan
        untuk latihan tanpa listrik.
    wobbler_style:
      name: Gaya Wobbler
      description: Menentukan desain/gaya aksi spesifik dari umpan wobbler, seperti
        crankbait atau jerkbait.
    wood_block_surface_preparation:
      name: Persiapan permukaan balok kayu
      description: Menunjukkan kondisi permukaan balok kayu yang siap digunakan untuk
        penyelesaian dan pembuatan kerajinan.
    wood_grain_direction:
      name: Arah serat kayu
      description: Arah serat kayu relatif terhadap dimensi terpanjang produk (penting
        untuk kekuatan, perilaku pemotongan, dan penampilan).
    wood_slice_edge_style:
      name: Gaya tepi potongan kayu
      description: Kondisi tepi irisan, seperti tepi kulit kayu alami versus tepi
        yang halus/diamplas.
    wooden_block_special_features:
      name: Fitur khusus balok kayu
      description: Fitur fungsional penting yang disertakan dalam set balok kayu ini.
    woodwind_body_construction:
      name: Konstruksi badan alat musik tiup kayu
      description: Menunjukkan apakah instrumen tersebut dibuat dalam satu bagian
        atau beberapa bagian (misalnya, 2 bagian/3 bagian), yang memengaruhi pembersihan,
        penyimpanan, dan portabilitas.
    woodwind_polishing_cloth_intended_use:
      name: Kegunaan kain pembersih alat musik tiup
      description: Menentukan fungsi utama kain tersebut untuk membersihkan/memoles
        instrumen musik tiup kayu.
    woodwind_small_part_type:
      name: Jenis bagian kecil alat musik tiup kayu
      description: Menentukan jenis suku cadang kecil pengganti klarinet yang dimaksud
        (misalnya, perangkat keras kunci, bantalan/gabus/felt, cincin).
    woofer_mounting_type:
      name: Jenis pemasangan woofer
      description: Cara pemasangan/penggunaan woofer yang tepat (bebas udara vs. dalam
        kotak) dan bentuk pemasangan umum pada kendaraan.
    woofer_surround_material:
      name: Bahan pelapis woofer
      description: Bahan yang digunakan untuk bingkai woofer (cincin suspensi luar).
    worn_on_finger:
      name: Jari yang aus
      description: Menentukan jari mana yang dimaksudkan untuk mengenakan panduan
        bidal.
    wrap_style:
      name: Gaya bungkus
      description: Menunjukkan berapa kali ikat pinggang tersebut dimaksudkan untuk
        dililitkan di pinggang.
    wrapping_occasion:
      name: Acara pembungkus
      description: Acara pemberian hadiah/perayaan utama yang menjadi tujuan penggunaan
        kertas kado tersebut.
    wrapping_paper_features:
      name: Fitur kertas pembungkus
      description: Sifat fungsional dan terkait keberlanjutan dari kertas pembungkus,
        seperti ketahanan terhadap sobekan, kandungan daur ulang, atau format lembaran
        yang sudah dipotong.
    wrestling_dummy_design:
      name: Desain boneka latihan gulat
      description: Bentuk tubuh atau postur keseluruhan boneka latihan, seperti bentuk
        manusia berdiri atau bentuk karung lempar, yang menentukan latihan yang sesuai.
    wrestling_mat_safety_certifications:
      name: Sertifikasi keselamatan matras gulat
      description: Mencantumkan sertifikasi atau standar keselamatan industri atau
        badan olahraga apa pun yang dipenuhi oleh matras tersebut.
    wrist_strap_style:
      name: Gaya tali pergelangan tangan
      description: Menjelaskan gaya tali pergelangan tangan (atau ketiadaan tali tersebut)
        yang memengaruhi dukungan dan kesesuaian.
    wrist_support_style:
      name: Gaya penyangga pergelangan tangan
      description: Mengidentifikasi konstruksi atau gaya penyangga pergelangan tangan,
        seperti penyangga, sarung tangan, plester, atau perban, untuk membantu preferensi
        pengguna dan pemilihan kinerja.
    xylophone_range_octaves:
      name: Rentan xilofon (oktaf)
      description: Rentang nada total xilofon dinyatakan dalam oktaf (misalnya, 2,5
        oktaf, 3 oktaf, 4 oktaf).
    xylophone_resonator_type:
      name: Jenis resonator xilofon
      description: Jenis sistem resonator yang digunakan untuk memperkuat nada (jika
        ada).
    yam_variety:
      name: Varietas ubi
      description: Menentukan kultivar atau varietas umum ubi yang dijual (misalnya,
        ungu, kuning, kaki gajah).
    yarn_cutter_physical_style:
      name: Gaya fisik pemotong benang
      description: Mengidentifikasi gaya fisik pemotong benang (misalnya, liontin,
        cincin, gunting) untuk mendukung penelusuran dan penyaringan dalam kategori
        ini.
    yarn_finish_or_effect:
      name: Hasil akhir atau efek benang
      description: Menyoroti perlakuan visual atau fungsional khusus yang diterapkan
        pada benang, seperti fluoresensi atau kilauan metalik.
    yarn_guide_style:
      name: Panduan gaya benang
      description: Gaya fisik komponen pemandu benang.
    yarn_swift_adjustability:
      name: Kemampuan penyesuaian penggulung benang
      description: Menunjukkan apakah dan bagaimana alat penggulung benang dapat disesuaikan
        (dapat diperluas, dilipat/dikempiskan), yang memengaruhi penyimpanan dan rentang
        ukuran benang yang dapat ditanganinya.
    yarn_swift_bearing_type:
      name: Jenis bantalan penggulung benang
      description: Menjelaskan mekanisme pendukung rotasi (misalnya, bantalan bola)
        yang memengaruhi kelancaran dan kecepatan pengguliran.
    yeast_application:
      name: Aplikasi ragi
      description: Menunjukkan tujuan utama penggunaan ragi untuk keperluan kuliner
        atau fermentasi.
    yo_yo_accessory_part_type:
      name: Jenis aksesori/bagian yo-yo
      description: Mengidentifikasi jenis suku cadang atau aksesori pengganti yo-yo
        yang sesuai dengan produk tersebut (misalnya, tali, bantalan, bantalan respons).
    yo_yo_axle_system_type:
      name: Tipe sistem poros yo-yo
      description: Pendekatan konstruksi untuk poros yo-yo (misalnya, poros tetap
        vs poros transaxle), yang memengaruhi sensasi bermain dan perawatan.
    yo_yo_bearing_size_class:
      name: Kelas ukuran bantalan yo-yo
      description: Kelas ukuran bantalan standar yang digunakan oleh yo-yo, jika berlaku.
    yo_yo_bearing_type:
      name: Jenis bantalan yo-yo
      description: Konfigurasi bantalan yang memengaruhi daya tanggap dan karakteristik
        putaran.
    yo_yo_play_style:
      name: Gaya bermain yo-yo
      description: Gaya permainan utama yang dimaksudkan untuk yo-yo ini, mencerminkan
        disiplin tali/trik yang menjadi tujuan desain produk ini.
    yo_yo_response_system:
      name: Sistem respons yo-yo
      description: Menentukan mekanisme respons yo-yo yang dirancang untuk bagian
        ini (kompatibilitas).
    yo_yo_responsiveness:
      name: Responsivitas yo-yo
      description: Apakah yo-yo kembali ke tangan dengan tarikan (responsif) atau
        membutuhkan ikatan (tidak responsif).
    yo_yo_string_material:
      name: Bahan tali yo-yo
      description: Komposisi material tali yo-yo.
    yogurt_base_ingredient:
      name: Bahan dasar yogurt
      description: Mengidentifikasi sumber utama susu atau nabati yang digunakan untuk
        membuat yogurt, yang sangat penting untuk preferensi diet dan pertimbangan
        alergi.
    yoke_type:
      name: Jenis kuk
      description: Mengidentifikasi jenis dudukan atau penyangga yang menopang senjata
        api pada monopod.
    zill_playing_style:
      name: Gaya bermain zill
      description: Konteks/gaya permainan yang dimaksud (umumnya tari perut vs varian
        orkestra/budaya).
    zill_strap_material:
      name: Bahan tali zill
      description: Bahan tali/karet pengikat jari yang digunakan untuk menahan zill
        (jika ada), memengaruhi kenyamanan, daya tahan, dan cengkeraman.
    zills_strap_adjustability:
      name: Penyesuaian tali Zills
      description: Apakah dan bagaimana tali/karet elastis yang disertakan dapat disesuaikan
        agar pas.
    zipper_application:
      name: Aplikasi ritsleting
      description: Menentukan proyek atau aplikasi yang dituju untuk ritsleting tersebut.
    zipper_chain_type:
      name: Jenis rantai ritsleting
      description: Menentukan konstruksi/tipe rantai/gigi ritsleting.
    zipper_end_type:
      name: Jenis ujung ritsleting
      description: Menunjukkan bagaimana ujung ritsleting berakhir dan apakah ritsleting
        tersebut terpisah (ujung terbuka) atau ujung tertutup (tidak terpisah), termasuk
        perangkat keras ujung terpisah yang umum digunakan pada ritsleting kerajinan.
    zipper_gauge:
      name: Pengukur ritsleting
      description: 'Menunjukkan ukuran/ketebalan rantai ritsleting, biasanya dinyatakan
        sebagai angka dengan tanda # (misalnya, #3 atau #5), yang berkorelasi dengan
        lebar gigi/kumparan dan tujuan penggunaan.'
    zipper_opening_length:
      name: Panjang bukaan ritsleting
      description: Menentukan seberapa banyak bagian bukaan depan yang menggunakan
        ritsleting, membedakan model ritsleting penuh dari model ritsleting setengah
        atau seperempat.
    zipper_pull_material:
      name: Bahan penarik ritsleting
      description: Menentukan bahan dari tarikan ritsleting atau tab penarik (bagian
        yang Anda pegang), berbeda dari gigi/rantai ritsleting dan pita ritsleting.
    zipper_pull_side:
      name: Sisi tarikan ritsleting
      description: Menentukan sisi mana dari ritsleting tempat tali penarik ritsleting
        dapat diakses.
    zipper_pull_strap_cord_tab_material:
      name: Bahan tali/kabel/tab penarik ritsleting
      description: Bahan komponen tali/kabel/tab/rumbai yang terpasang pada tarikan
        ritsleting (jika ada), tidak termasuk perangkat keras/badan utama tarikan
        ritsleting.
    zipper_reversibility_mechanism:
      name: Mekanisme reversibilitas ritsleting
      description: Menentukan bagaimana ritsleting dapat dibalik (misalnya, penggeser
        dua sisi vs penggeser flip/pengunci otomatis yang dirancang untuk pakaian
        yang dapat dibalik).
    zipper_separating_type:
      name: Jenis pemisah ritsleting
      description: Menunjukkan apakah ritsleting terpisah di bagian bawah/atas atau
        tertutup, agar sesuai dengan jaket, kantong tidur, tas, dll.
    zipper_side:
      name: Sisi ritsleting
      description: Menentukan sisi tempat ritsleting utama berada ketika kantong tidur
        diletakkan menghadap ke atas.
    zipper_slider_material:
      name: Bahan penggeser ritsleting
      description: Menentukan bahan dari penggeser ritsleting (mekanisme yang bergerak),
        yang dapat memengaruhi kekuatan dan ketahanan terhadap korosi.
    zipper_slider_pull_configuration:
      name: Konfigurasi penggeser/tarikan ritsleting
      description: Menunjukkan apakah ritsleting memiliki satu penggeser/tarikan atau
        dua, dan apakah tarikan berada di satu sisi atau kedua sisi penggeser.
    zipper_style:
      name: Gaya ritsleting
      description: Menunjukkan panjang atau keberadaan ritsleting pada pakaian (misalnya,
        tanpa ritsleting, ritsleting seperempat, ritsleting setengah, ritsleting penuh).
    zipper_tape_material:
      name: Bahan pita ritsleting
      description: Menentukan bahan utama pita ritsleting (sisi kain) yang dijahit
        ke dalam proyek.
    zipper_teeth_type:
      name: Jenis gigi ritsleting
      description: Menentukan gaya konstruksi rantai/gigi ritsleting (misalnya, kumparan,
        plastik cetakan, logam, tak terlihat), yang memengaruhi fleksibilitas, kekuatan,
        dan aplikasi tipikal.
    assembly_required:
      name: Perlu dirakit
      description: Menunjukkan apakah produk perlu dirakit sebelum digunakan
    organic_certification:
      name: Sertifikasi organik
      description: Mengidentifikasi sertifikasi organik atau keberlanjutan yang dimiliki
        produk
