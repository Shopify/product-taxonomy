    lyrics_display_type:
      name: Jenis tampilan lirik
      description: Bagaimana lirik ditampilkan (jika didukung) selama karaoke.
    magazine_compatibility:
      name: Kompatibilitas magazen
      description: Mengidentifikasi kaliber magazen utama atau jenis magazen yang
        dirancang untuk ditampung oleh kantong bawaan rompi.
    magnet_requirement:
