      description: Menentukan jumlah benang pada kain Aida (jumlah kotak/jahitan per
        inci), yang menentukan ukuran jahitan dan skala desain.
    aida_cloth_pre_cut_format:
      name: Kain Aida format pra-potong
      description: Menunjukkan apakah kain Aida dijual sebagai potongan yang sudah
        dipotong, potongan utuh dari gulungan, atau dalam bentuk rol.
    air_bag_material:
      name: Bahan kantong udara
      description: Menentukan bahan kantong udara/wadah yang digunakan pada Irish
        warpipe.
    air_bed_internal_construction:
      name: Konstruksi internal kasur angin
      description: Menjelaskan struktur pendukung internal atau teknologi yang digunakan
        di dalam kasur udara untuk kenyamanan dan stabilitas.
    air_dry_clay_color_form:
      name: Bentuk warna tanah liat kering udara
      description: Apakah tanah liat dijual dalam keadaan sudah diwarnai, putih/netral
        untuk dilukis, atau sebagai campuran/beragam warna.
    air_hockey_items_included:
      name: Perlengkapan hoki udara yang disertakan
      description: Mencantumkan detail aksesori spesifik yang terdapat dalam satu
        set sehingga pelanggan tahu persis apa yang mereka terima (misalnya, 2 pusher,
        4 puck, 2 felt pad).
    air_intake_temperature_sensor_mounting_style:
      name: Gaya pemasangan sensor suhu udara masuk
      description: Gaya pemasangan fisik sensor IAT pada sistem intake.
    air_integration_capability:
      name: Kemampuan integrasi udara
      description: Menunjukkan apakah dan bagaimana komputer selam mendukung pemancar
        tekanan tangki nirkabel.
    air_mattress_valve_type:
      name: Jenis katup kasur udara
      description: Menentukan gaya katup yang sesuai atau terdapat pada aksesori,
        sehingga memastikan kompatibilitas antara pompa, katup, dan suku cadang perbaikan.
    air_water_rocket_kit_items_included:
      name: Item kit roket udara & air yang disertakan
      description: Komponen utama yang disertakan dalam set roket (peluncur, pompa,
        sirip, suku cadang isi ulang).
    air_water_rocket_launch_method:
      name: Metode peluncuran roket udara & air
      description: Cara roket diberi tekanan/diluncurkan (interaksi pengguna dan gaya
        peralatan).
    airbag_position:
      name: Posisi kantong udara
      description: Menentukan posisi/zona penahan yang didukung oleh bagian kantong
        udara.
    aircraft_ads_b_capability:
      name: Kemampuan ADS-B pesawat terbang
      description: Menentukan apakah pesawat dilengkapi untuk memenuhi standar ADS-B
        Out.
    aircraft_airframe_material:
      name: Bahan rangka pesawat terbang
      description: Bahan utama yang digunakan dalam konstruksi rangka pesawat terbang.
    aircraft_cabin_configuration:
      name: Konfigurasi kabin pesawat
      description: Menentukan tata letak kabin pesawat terbang (misalnya, kelompok
        konferensi, divan, kabin empat zona).
    aircraft_documentation_included:
      name: Dokumentasi pesawat terbang yang disertakan
      description: Mencantumkan dokumen mana yang disertakan bersama suku cadang (misalnya,
        8130-3).
    aircraft_galley_configuration:
      name: Konfigurasi dapur pesawat
      description: Keberadaan dan jenis fasilitas dapur/katering di dalam kabin.
    aircraft_installation_location:
      name: Lokasi instalasi pesawat terbang
      description: Di bagian pesawat terbang mana suku cadang atau aksesori tersebut
        dipasang atau digunakan.
    aircraft_internet_connection:
      name: Koneksi internet pesawat terbang
      description: Menunjukkan keberadaan/jenis konektivitas internet di dalam kabin.
    aircraft_landing_gear_type:
      name: Jenis perangkat pendaratan pesawat terbang
      description: Menentukan konfigurasi perangkat pendaratan autogyro.
    aircraft_lavatory_configuration:
      name: Konfigurasi toilet pesawat terbang
      description: Jenis konfigurasi toilet di dalam pesawat terbang.
    aircraft_maintenance_program_enrollment:
      name: Pendaftaran program perawatan pesawat terbang
      description: Menunjukkan apakah pesawat terbang terdaftar dalam program perawatan
        mesin dan/atau badan pesawat, dan jika ya, jenis pertanggungan mana yang berlaku
        (mesin, badan pesawat, atau keduanya).
    aircraft_operational_certification:
      name: Sertifikasi operasional pesawat terbang
      description: Menentukan dasar sertifikasi regulasi atau operasional di mana
        pesawat terbang dioperasikan (tergantung yurisdiksi, misalnya, FAA Bagian
        91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Sertifikasi perlengkapan pelindung pesawat terbang
      description: Menentukan standar penerbangan/regulasi atau industri yang dipenuhi
        oleh perlengkapan pelindung.
    aircraft_system_application:
      name: Aplikasi sistem pesawat terbang
      description: Mengidentifikasi sistem atau area pesawat terbang mana yang menjadi
        tempat suku cadang/aksesori tersebut (digunakan untuk menelusuri dan memfilter
        berbagai suku cadang pesawat terbang).
    airflow_resistance_level:
      name: Tingkat hambatan aliran udara
      description: Menunjukkan seberapa ketat peredam suara terasa dalam hal tekanan
        balik/hambatan udara.
    airship_envelope_material:
      name: Bahan selubung kapal udara
      description: Bahan utama selubung (kulit) kapal udara.
    airsoft_part_type:
      name: Jenis suku cadang airsoft
      description: Mengidentifikasi komponen fungsional atau jenis aksesori untuk
        senapan airsoft (misalnya, magasen, laras, pelindung tangan).
    airworthiness_approval_basis:
      name: Dasar persetujuan kelaikan udara
      description: Menentukan dasar persetujuan/sertifikasi untuk bagian tersebut
        jika berlaku (misalnya, PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Pengaturan volume alarm
      description: Menunjukkan apakah dan bagaimana volume alarm dapat disesuaikan
        oleh pengguna.
    alcohol_ink_finish_effect:
      name: Efek finis tinta alkohol
      description: Menjelaskan efek visual/finis yang dihasilkan oleh formulasi tinta
        alkohol (selain sekadar warna), seperti metalik atau mutiara.
    alignment_aid_style:
      name: Gaya alat bantu penyelarasan
      description: Menjelaskan jenis panduan penyelarasan yang dicetak atau tertanam
        pada permukaan alas (misalnya, garis lurus, penanda jarak).
    alternator_cooling_type:
      name: Jenis pendinginan alternator
      description: Menjelaskan bagaimana alternator didinginkan dan diberi ventilasi.
    alternator_marine_ignition_protection_rating:
      name: Peringkat perlindungan pengapian alternator kelautan
      description: Menunjukkan apakah alternator terlindungi dari percikan api untuk
        kompartemen mesin kapal (misalnya, sesuai dengan standar SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Konfigurasi pemasangan alternator
      description: Menentukan konfigurasi pemasangan fisik yang digunakan untuk memasang
        alternator ke braket mesin.
    alternator_pulley_type:
      name: Jenis katrol alternator
      description: Menentukan desain katrol/kopling pada alternator (atau menunjukkan
        tidak ada katrol yang disertakan).
    alternator_regulator_type:
      name: Jenis regulator alternator
      description: Menunjukkan apakah regulator tegangan berada di dalam alternator
        atau di luar, dan apakah dikendalikan oleh OEM (dikendalikan oleh komputer/PCM).
    alternator_terminal_connection_type:
      name: Jenis koneksi terminal alternator
      description: Gaya koneksi listrik utama untuk terminal output/exciter alternator
        untuk membantu memastikan kompatibilitas rangkaian kabel.
    altitude_suitability:
      name: Kesesuaian ketinggian
      description: Menunjukkan apakah bola dirancang untuk kondisi ketinggian tertentu,
        yang memengaruhi kecepatan dan pantulan.
    ambulance_stretcher_mount_type:
      name: Jenis dudukan tandu ambulans
      description: Menentukan jenis sistem pemuatan/pemasangan tandu yang didukung
        oleh ambulans.
    american_football_safety_certification:
      name: Sertifikasi keselamatan sepak bola Amerika
      description: Menunjukkan sertifikasi atau standar keselamatan khusus sepak bola
        Amerika yang dipenuhi oleh produk tersebut.
    amplifier_tube_function:
      name: Fungsi tabung penguat
      description: Menentukan peran fungsional tabung di dalam rangkaian penguat instrumen
        (misalnya, preamp vs power).
    analog_synthesizer_cv_gate_i_o:
      name: I/O CV/Gate synthesizer analog
      description: Menunjukkan jenis tegangan kontrol dan koneksi gerbang yang didukung
        untuk integrasi dengan peralatan modular/analog.
    analog_synthesizer_keybed_configuration:
      name: Konfigurasi papan tuts synthesizer analog
      description: Menjelaskan apakah synthesizer memiliki papan tuts bawaan dan,
        jika ada, jumlah tutsnya.
    anchor_configuration:
      name: Konfigurasi jangkar
      description: Menunjukkan apakah sistem suspensi menggunakan satu titik jangkar
        terpusat atau beberapa titik jangkar independen, yang memengaruhi variasi
        latihan dan kompleksitas pengaturan.
    animal_raising_method:
      name: Metode pemeliharaan hewan
      description: Menjelaskan praktik pertanian atau peternakan yang digunakan untuk
        hewan sumber.
    animal_species:
      name: Spesies hewan
      description: Menentukan hewan atau makhluk yang diwakili oleh boneka tersebut
        (misalnya, beruang, kelinci, dinosaurus).
    animal_trap_jaw_style:
      name: Perangkap hewan model rahang
      description: Konfigurasi rahang perangkap, yang memengaruhi daya cengkeram dan
        kesejahteraan hewan.
    animal_trap_type:
      name: Jenis perangkap hewan
      description: Mengklasifikasi gaya/desain mekanis perangkap, memungkinkan pembeli
        untuk dengan cepat menemukan metode perangkap tepat yang mereka butuhkan atau
        yang diizinkan regulasi.
    ankle_collar_style:
      name: Gaya kerah pergelangan kaki
      description: Menjelaskan gaya atau konstruksi kerah pergelangan kaki sepatu,
        seperti potongan rendah, potongan sedang, potongan tinggi, kerah kaus kaki,
        atau tanpa tali, yang memengaruhi sokongan, kesesuaian, dan estetika.
    ankle_guard_protection_level:
      name: Tingkat perlindungan pergelangan kaki
      description: Menilai tingkat perlindungan benturan secara keseluruhan yang diberikan
        oleh pelindung pergelangan kaki.
    ankle_strap_padding_type:
      name: Jenis bantalan tali pergelangan kaki
      description: Menjelaskan bahan bantalan atau pendekatan pelapis yang digunakan
        di dalam tali pengikat yang memengaruhi kenyamanan.
    ankle_strap_type:
      name: Jenis tali pergelangan kaki
      description: Mengklasifikasi konstruksi atau desain tali pengikat pergelangan
        kaki pada papan seluncur salju.
    ant_farm_habitat_medium_type:
      name: Jenis media habitat sarang semut
