        memungkinkan pelanggan untuk memilih di antara berbagai profil rasa, ukuran,
        dan warna.
    koji_mold_type:
      name: Jenis kapang koji
      description: Menunjukkan jenis atau galur kapang koji yang digunakan selama
        fermentasi, yang memengaruhi aroma dan rasa.
    kumquat_variety:
      name: Varietas kumquat
      description: Mengidentifikasi kultivar atau varietas kumquat yang ditawarkan,
        yang memungkinkan pembeli untuk memilih buah berdasarkan profil rasa, ukuran,
        atau kegunaan kuliner.
    label_edge_type:
      name: Jenis tepi label
      description: Menentukan gaya finishing tepi yang digunakan untuk mencegah rumbai
        dan menentukan estetika.
    label_finish:
      name: Finishing label
      description: Menentukan finis permukaan, tekstur, atau lapisan pelindung/perlakuan
        yang diterapkan pada label.
    label_finish_edge_style:
      name: Gaya finis/tepi label
      description: Cara penyelesaian tepian, yang memengaruhi kenyamanan dan daya
        tahan (misalnya, tepi anyaman vs potongan laser).
    label_fold_type:
      name: Jenis lipatan label
      description: Menentukan bagaimana label jahit dibuat untuk dijahit ke suatu
        barang (misalnya, lipatan ujung vs lipatan tengah), yang memengaruhi cara
        pemasangan dan posisinya.
    label_text_type:
      name: Jenis teks label
      description: Menunjukkan apakah label tersebut kosong, sudah dicetak, atau dimaksudkan
        untuk dipersonalisasi/dikustomisasi.
    lace_area_size:
      name: Ukuran area renda
      description: Menentukan ukuran atau konfigurasi bagian renda (misalnya, penutupan
        4×4, frontal 13×6), yang menentukan ruang belahan yang tersedia.
    lace_tightener_style:
      name: Gaya pengencang tali sepatu
      description: Mengidentifikasi desain mekanis atau faktor bentuk dari alat pengencang
        tali sepatu.
    lace_type:
      name: Jenis renda
      description: Menjelaskan bahan atau finis renda pada garis rambut/penutup kepala,
        yang memengaruhi realisme dan kesesuaian warna kulit.
    lacrosse_ball_certification:
      name: Sertifikasi bola lacrosse
      description: Menentukan persetujuan atau standar badan pengatur olahraga yang
        dipenuhi oleh bola lacrosse.
    lacrosse_goal_regulation_certification:
      name: Sertifikasi peraturan gawang lacrosse
      description: Menunjukkan apakah gawang atau jaring lacrosse memenuhi spesifikasi
        badan pengatur tertentu (misalnya, NCAA atau NFHS).
    lacrosse_pocket_type:
      name: Jenis saku lacrosse
      description: Mengidentifikasi gaya umum saku atau jaring yang terpasang pada
        kepala raket, yang memengaruhi kontrol dan rilis bola.
    lacrosse_string_type:
      name: Jenis senar lacrosse
      description: Mengklasifikasi bentuk atau tujuan penggunaan yang tepat dari senar
        atau jaring sehingga pelanggan dapat membedakan antara potongan jaring, perlengkapan,
        dan peran senar tertentu di dalam saku.
    ladder_position:
      name: Posisi tangga
      description: Menunjukkan lokasi tangga atau akses anak tangga pada tempat tidur
        loteng balita.
    lanyard_attachment_hardware:
      name: Perangkat keras pemasangan lanyard
      description: Menunjukkan jenis perangkat keras di ujung tali lanyard yang terhubung
        ke kunci, lencana, telepon, atau aksesori lainnya.
    lanyard_style:
      name: Gaya tali pengikat
      description: Menentukan cara tali lanyard dikenakan atau dibawa.
    lanyard_type:
      name: Jenis lanyard
      description: Menjelaskan gaya tali lanyard yang disertakan atau kompatibel dengan
        peluit.
    lap_hand_loom_accessories_included:
      name: Aksesori yang disertakan pada alat tenun tangan pangkuan
      description: Aksesori yang disertakan dalam paket alat tenun tangan pangkuan.
    lapel_style:
      name: Gaya lapel
      description: Menentukan desain lapel jas (misalnya, notch, peak, shawl).
    laser_safety_class:
      name: Kelas keamanan laser
      description: Klasifikasi keamanan laser dari produk (misalnya, Kelas 2, 3R,
        3B, 4) seperti yang tertera pada dokumentasi/label perangkat.
    latex_processing_method:
      name: Metode pengolahan lateks
      description: Menentukan proses manufaktur yang digunakan untuk menghasilkan
        busa lateks—biasanya Dunlop atau Talalay—yang memengaruhi rasa, responsivitas,
        dan harga.
    latex_type:
      name: Jenis lateks
      description: Menunjukkan asal dan komposisi lateks yang digunakan dalam kasur
        (alami, organik, sintetis, atau campuran), yang memberi tahu pembeli tentang
        daya tahan, keramahan lingkungan, dan potensi alergen.
    launch_profile:
      name: Profil luncur
      description: Menunjukkan lintasan luncur tipikal (rendah, menengah, tinggi)
        yang dirancang untuk dihasilkan oleh poros stik golf.
    launcher_mounting_configuration:
      name: Konfigurasi pemasangan peluncur
      description: Menjelaskan cara peluncur dipasang atau dikonfigurasi untuk digunakan,
        membantu pembeli yang membutuhkan opsi pemasangan mandiri, under-barrel, atau
        yang dipasang pada rel.
    layer_construction:
      name: Konstruksi lapisan
      description: Menentukan konstruksi laminasi kain (misalnya, 2 lapis, 2,5 lapis,
        3 lapis) yang memengaruhi berat, kemudahan pengemasan, dan daya tahan.
    layer_design:
      name: Desain lapisan
      description: Menjelaskan konstruksi jaring rambut dalam hal lapisan atau kemampuan
        untuk dibalik.
    lazy_kate_tension_control_type:
      name: Tipe kontrol tegangan lazy kate
      description: Cara kerja lazy kate dalam menerapkan tarikan/tegangan pada bobbin
        selama proses memintal atau menggulung benang.
    lead_hardware_type:
      name: Jenis perangkat keras lead
      description: Menentukan gaya pengait atau pengencang di ujung lead (jepret,
        klip, simpul, rantai, dll.), yang memengaruhi kemudahan penggunaan, keamanan,
        dan kesesuaian dengan disiplin.
    leaf_gelatin_grade:
      name: Grade gelatin lembaran
      description: Menentukan tingkat kekuatan standar yang digunakan untuk lembaran
        gelatin.
    leaf_preparation:
      name: Pengolahan daun
      description: Menjelaskan bagaimana daun disiapkan sebelum dikemas, seperti dicincang,
        diparut, atau julienne.
    leaf_spring_material:
      name: Bahan pegas daun
      description: Bahan konstruksi utama dari paket pegas daun.
    leak_protection_layer:
      name: Lapisan perlindungan bocor
      description: Menunjukkan apakah sistem popok bawaan pada swim jammer menggunakan
        desain lapisan tunggal atau ganda untuk mencegah kebocoran.
    leash_clip_type:
      name: Jenis klip tali kekang
      description: Menentukan jenis klip atau perangkat keras yang digunakan untuk
        memasang tali kekang ke kerah atau tali pengikat (misalnya, kait jepret, karabiner,
        klip putar).
    leash_style:
      name: Gaya tali kekang
      description: Menjelaskan konfigurasi tali atau gaya penggulungan tali kekang.
    leash_type:
      name: Jenis tali pengikat
      description: Mengklasifikasi gaya keseluruhan atau konfigurasi tali kekang yang
        berorientasi pada tujuan untuk penyaringan cepat berdasarkan penggunaan yang
        dimaksudkan.
    leavening_action_type:
      name: Jenis aksi pengembang
      description: Mengidentifikasi formulasi kimia atau gaya pengembang dari baking
        powder (misalnya, aksi tunggal, aksi ganda, bebas aluminium). Hal ini secara
        langsung memengaruhi kinerja pemanggangan dan kesesuaian resep.
    leavening_agent:
      name: Bahan pengembang
      description: Menentukan mekanisme pengembang utama yang digunakan dalam adonan.
    led_color_options:
      name: Pilihan warna LED
      description: Menampilkan daftar warna LED yang dapat dipilih pada alarm untuk
        indikasi gigitan visual.
    led_indicator_color:
      name: Warna indikator LED
      description: Mengidentifikasi warna indikator LED produk, yang membantu pemancing
        mencocokkan beberapa alarm atau sesuai dengan preferensi pribadi.
    led_light_color:
      name: Warna lampu LED
      description: Menentukan warna pencahayaan LED terintegrasi.
    leek_variety:
      name: Varietas bawang prei
      description: Menentukan kultivar atau varietas bawang prei, yang memungkinkan
        pembedaan berdasarkan rasa, ukuran, dan musim tanam.
    leg_coverage:
      name: Cakupan kaki
      description: Menentukan seberapa banyak bagian kaki yang ditutupi oleh pakaian
        selam (misalnya, pendek, panjang penuh).
    leg_cuff_style:
      name: Gaya manset kaki
      description: Menentukan gaya finishing pada bukaan pergelangan kaki celana.
    leg_cut_height:
      name: Tinggi potongan kaki
      description: Menunjukkan seberapa tinggi potongan bukaan kaki pada bawahan bikini.
    leg_cut_style:
      name: Gaya potongan kaki
      description: Menjelaskan bentuk bukaan kaki, yang memengaruhi penampilan, kenyamanan,
        dan garis berjemur.
    leg_length:
      name: Panjang kaki
      description: Mengategorikan trunk berdasarkan panjang kaki relatif (pendek,
        sedang, panjang) agar pembeli dapat memilih cakupan yang mereka sukai tanpa
        perlu memisahkan kategori.
    leg_loop_type:
      name: Jenis loop kaki
      description: Menjelaskan desain loop kaki.
    leg_opening_style:
      name: Gaya bukaan kaki
      description: Menentukan bagaimana finishing bukaan kaki pada celana jogger,
        seperti manset elastis, kelim ritsleting, atau kelim terbuka.
    leg_style:
      name: Gaya kaki
      description: Menentukan gaya desain atau konstruksi kaki atau alas bangku.
    legging_foot_design:
      name: Desain kaki legging
      description: Menentukan apakah legging tersebut tanpa kaki, dengan kaki, atau
        dapat diubah antara kedua gaya tersebut.
    leggings_waistband_style:
      name: Gaya ban pinggang legging
      description: Menentukan desain struktural ban pinggang legging, yang memengaruhi
        kenyamanan, sokongan, dan estetika.
    lei_closure_style:
      name: Gaya penutup lei
      description: Menjelaskan apakah lei berbentuk lingkaran tertutup atau memiliki
        ujung terbuka yang diikat atau dikencangkan dengan pita.
    lemon_variety:
      name: Varietas lemon
      description: Mengidentifikasi kultivar atau varietas spesifik dari lemon (misalnya,
        Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Metode penyesuaian panjang
      description: Menunjukkan apakah dan bagaimana panjang tali lompat dapat diatur
        agar sesuai dengan pengguna.
    lens_color_tint:
      name: Warna/corak lensa
      description: Warna atau corak lensa kacamata pelindung yang disertakan dengan
        produk.
    lens_construction:
      name: Konstruksi lensa
      description: Menentukan konstruksi struktural lensa (misalnya, panel tunggal,
        panel ganda termal) untuk menunjukkan ketahanan terhadap kabut dan kinerja
        optik.
    lens_tint_category:
      name: Kategori warna lensa
      description: Mengklasifikasi tingkat kegelapan lensa berdasarkan kategori warna
        internasional, yang membantu pelanggan memilih lensa yang sesuai dengan kondisi
        pencahayaan yang berbeda-beda.
    lettuce_variety:
      name: Varietas selada
      description: Mengidentifikasi varietas hortikultura spesifik dari selada (misalnya,
        Iceberg, Romaine, Butterhead), yang memungkinkan penyaringan dan perbandingan
        yang tepat.
    level_of_play:
      name: Tingkat permainan
      description: Tingkat performa yang dinyatakan oleh produsen yang sesuai dengan
        daya saing pemain dan anggaran.
    lever_configuration:
      name: Konfigurasi tuas
      description: Menunjukkan konfigurasi tuas/pegangan kontrol mesin perahu (misalnya,
        tuas tunggal vs tuas ganda).
    lever_type:
      name: Jenis tuas
      description: Jenis/mekanisme tuas pengubah nada yang dipasang pada senar harpa.
    license_plate_cover_style:
      name: Gaya penutup pelat nomor
      description: Menentukan gaya konstruksi penutup pelat nomor (misalnya, penutup
        penuh vs tutup sekrup).
    license_plate_personalization_type:
      name: Jenis personalisasi pelat nomor
      description: Menentukan apakah pelat nomor tersebut kosong, sudah dicetak, atau
        mendukung kustomisasi yang disediakan pembeli (teks dan/atau grafik).
    license_usage_terms:
      name: Ketentuan lisensi/penggunaan
      description: Hak penggunaan pola tersebut (misalnya, hanya untuk penggunaan
        pribadi vs penggunaan komersial terbatas).
    licensed_sports_property:
      name: Properti olahraga berlisensi
      description: Menunjukkan apakah produk tersebut berlisensi resmi dari liga/tim/organisasi.
    lid_hinge_mechanism:
      name: Mekanisme engsel tutup
      description: Menentukan mekanisme engsel yang digunakan untuk tutup, yang memengaruhi
        keamanan dan kemudahan penggunaan.
    lid_support_positions:
      name: Posisi penyangga tutup
      description: Menentukan posisi stik penyangga tutup yang didukung untuk piano
        grand (seberapa jauh tutup piano dapat dibuka).
    lie_angle_color_code:
      name: Kode warna sudut kemiringan
      description: Menunjukkan sistem kode warna sudut kemiringan yang digunakan pabrikan
        pada beberapa stik golf (misalnya, titik hitam, titik hijau).
    life_jacket_certification_standard:
      name: Standar sertifikasi jaket pelampung
      description: Klasifikasi atau standar keselamatan resmi yang dipenuhi produk,
        seperti Tipe USCG atau level ISO/AS.
    life_raft_certification_standard:
      name: Standar sertifikasi rakit penyelamat
      description: Standar/sertifikasi keselamatan yang dipenuhi oleh rakit saat dibangun
        dan diservis.
    life_raft_container_type:
      name: Jenis kontainer rakit penyelamat
      description: Cara pengemasan rakit penyelamat untuk penyimpanan dan penggunaan.
    life_vest_approval_standard:
      name: Standar persetujuan rompi pelampung
      description: Menentukan standar sertifikasi/persetujuan yang dipenuhi oleh rompi
        penyelamat.
    life_vest_intended_user:
      name: Pengguna yang dituju untuk rompi penyelamat
      description: Menunjukkan kategori pemakai yang dituju untuk kesesuaian dan penyediaan.
    lifebuoy_approval_standard:
      name: Standar persetujuan pelampung penyelamat
      description: Persetujuan keselamatan atau standar yang dipatuhi oleh pelampung
        penyelamat (misalnya, USCG/SOLAS).
    lifebuoy_features:
      name: Fitur pelampung penyelamat
      description: Fitur keselamatan fungsional, pemasangan/penanganan, dan aksesori
        yang disertakan untuk pelampung penyelamat.
    lift_mechanism_type:
      name: Jenis mekanisme pengangkat
      description: Menentukan mekanisme yang membantu menaikkan/menurunkan atau membuka/menutup
        tempat tidur dinding.
    lift_stand_support_point:
      name: Titik tumpuan dongkrak/penyangga
      description: Tempat di mana dongkrak/penyangga bersentuhan/menopang kendaraan.
    lifting_gas_type:
      name: Jenis gas pengangkat
      description: Menentukan gas pengangkat utama atau media pengapung yang digunakan
        oleh pesawat udara.
    lifting_support_type:
      name: Jenis penyangga pengangkat
      description: Menunjukkan apakah pengangkat dijalankan melalui landasan atau
        diangkat melalui lengan/pelat yang bersentuhan dengan rangka/titik angkat.
    ligature_and_cap_component_type:
      name: Jenis komponen ligatur dan tutup
      description: Menunjukkan apakah produk tersebut berupa ligatur, tutup, atau
        satu set yang mencakup keduanya.
    ligature_material:
      name: Bahan ligatur
      description: Bahan utama dari badan ligatur yang bersentuhan dan mengamankan
        reed (misalnya, logam, kulit, kain).
    ligature_plating_or_finish:
      name: Pelapisan atau finis ligatur
      description: Menentukan pelapisan dan/atau finis permukaan yang diterapkan pada
        ligatur dan/atau tutup klarinet logam.
    ligature_reed_contact_style:
      name: Gaya kontak reed ligatur
      description: Menentukan bagaimana ligatur bersentuhan dengan reed (misalnya,
        kontak minimal, multi-titik, melingkar).
    ligature_screw_position_relative_to_reed:
      name: Posisi sekrup ligatur (relatif terhadap reed)
      description: Menunjukkan posisi sekrup pengencang ligatur relatif terhadap sisi
        reed/pemain saat dipasang pada mouthpiece.
    ligature_tension_adjustment_mechanism:
      name: Mekanisme penyesuaian tegangan ligatur
      description: Menjelaskan bagaimana ligatur menerapkan/menyesuaikan tekanan pada
        reed (desain pengencang).
    ligature_tightening_mechanism_type:
      name: Jenis mekanisme pengencangan ligatur
      description: Menentukan mekanisme pengencangan ligatur di sekitar mouthpiece
        dan reed (misalnya, sekrup tunggal, sekrup ganda, tuas/rilis cepat).
    light_bar_housing_material:
      name: Bahan rumah light bar
      description: Bahan utama dari rumah/badan light bar, yang memengaruhi daya tahan
        dan pembuangan panas.
    light_bar_lens_material:
      name: Bahan lensa lampu bar
      description: Bahan utama lensa/penutup light bar, yang dapat memengaruhi ketahanan
        terhadap benturan dan kejernihan optik.
    light_bar_mounting_location:
      name: Lokasi pemasangan light bar
      description: Posisi pemasangan utama yang dimaksudkan pada kendaraan.
    light_stand_style:
      name: Gaya dudukan lampu
      description: Menentukan gaya struktural atau faktor bentuk dudukan yang digunakan
        untuk menopang lampu efek khusus (misalnya, tripod, T-bar, engkol), bukan
        permukaan pemasangan (dinding/langit-langit), yang diwakili oleh jenis pemasangan.
    light_switch_function:
      name: Fungsi sakelar lampu
      description: Mengidentifikasi sirkuit pencahayaan atau fungsi mana yang dikendalikan
        oleh sakelar.
    lighting_control_protocols_supported:
      name: Protokol kontrol pencahayaan yang didukung
      description: Protokol kontrol/jaringan yang didukung oleh pengontrol selain
        atau sebagai pengganti DMX512.
    lighting_effects:
      name: Efek pencahayaan
      description: Menentukan segala fitur pencahayaan terintegrasi yang meningkatkan
        permainan atau estetika.
    lighting_mode:
      name: Mode pencahayaan
      description: Menjelaskan pola pencahayaan operasional yang tersedia, seperti
        stabil, flash, strobo, atau SOS.
    lily_variety:
      name: Varietas lili
      description: Menentukan varietas komersial/botani bunga lili yang dijual sebagai
        bunga potong segar (misalnya, Asiatic, Oriental).
    limb_articulation:
      name: Artikulasi anggota tubuh
      description: Menunjukkan tingkat fleksibilitas atau artikulasi anggota tubuh
        pada boneka (tidak ada, tetap, semi-fleksibel, artikulasi penuh).
    limb_material:
      name: Bahan anggota tubuh
      description: Bahan utama yang digunakan pada lengan busur atau crossbow, yang
        memengaruhi berat, daya tahan, getaran, dan kinerja keseluruhan.
    lime_variety:
      name: Varietas jeruk nipis
      description: Mengidentifikasi varietas botani atau komersial spesifik dari jeruk
        nipis yang dijual.
    line_buoyancy:
      name: Daya apung senar/tali
      description: Menjelaskan apakah jalinan senar secara alami mengapung atau tenggelam
        dan pada kecepatan berapa, yang memengaruhi penyajian umpan dan pengelolaan
        senar.
    line_purpose:
      name: Tujuan tali
      description: Menentukan fungsi yang dimaksudkan dari tali dalam sistem layang-layang
        (misalnya, front flying line, depower line, bridle line).
    linen_finish_treatment:
      name: Finis/perlakuan linen
      description: Segala proses finishing yang diterapkan pada kain linen yang mengubah
        tekstur, tampilan, atau kinerja.
    linen_weave_type:
      name: Jenis tenun linen
      description: Menentukan konstruksi tenunan kain linen, yang memengaruhi tekstur,
        sirkulasi udara, dan jatuhnya kain.
    liner_padding_type:
      name: Jenis bantalan pelapis
      description: Menunjukkan konstruksi atau gaya bantalan pelapis (misalnya, jaring,
        bantalan tipis, berlapis).
    liner_shape:
      name: Bentuk pelapis
      description: Menjelaskan bentuk keseluruhan lapisan dalam kantong tidur sehingga
        pelanggan dapat mencocokkannya dengan kantong tidur dan preferensi kenyamanan
        mereka.
    liner_type:
      name: Jenis pelapis
      description: Menunjukkan apakah celana pendek memiliki lapisan dalam dan, jika
        ya, modelnya seperti apa.
    lining:
      name: Pelapis
      description: Menunjukkan apakah dan bagaimana celana renang dilapisi, termasuk
        seberapa luas pelapis yang menutupi bagian dalam pakaian.
    lining_material:
      name: Bahan pelapis
      description: Menentukan bahan yang digunakan untuk lapisan dalam sepatu, yang
        memengaruhi kenyamanan, sirkulasi udara, dan kehangatan.
    lining_type:
      name: Jenis pelapis
      description: Menentukan apakah pakaian renang dilapisi dan sejauh mana.
    link_connection_style:
      name: Gaya koneksi mata rantai
      description: Mengklasifikasi cara mata rantai menyambung rantai (misalnya, sambungan
        cepat, pin penghubung), sehingga pengendara dapat memilih metode pemasangan
        atau suku cadang pengganti yang tepat.
    live_bait_form:
      name: Bentuk umpan hidup
      description: Menentukan bentuk fisik atau kondisi pengawetan umpan, seperti
        hidup, beku, atau kering.
    living_room_furniture_items_included:
      name: Item furnitur ruang tamu yang disertakan
      description: Menentukan setiap bagian furnitur yang termasuk dalam set ruang
        tamu, sehingga membantu pembeli memahami dengan cepat komponen apa saja yang
        disertakan (misalnya sofa, loveseat, meja kopi).
    load_mechanism:
      name: Mekanisme pemuatan
      description: Menentukan metode utama yang digunakan untuk menghasilkan atau
        menambahkan resistensi pada mesin (misalnya, tumpukan beban yang dapat dipilih,
        beban pelat, beban karet).
    lock_cylinder_type:
      name: Jenis silinder gembok
      description: Menentukan jenis silinder/inti kunci yang digunakan (relevan dengan
        ketahanan terhadap pembobolan dan kunci pengganti).
    lock_security_level:
      name: Tingkat keamanan gembok
      description: Menjelaskan fitur ketahanan keamanan gembok/silinder terhadap upaya
        pembobolan dan pengeboran.
    lock_system:
      name: Sistem kunci
      description: Jenis sistem pengunci pengaman yang digunakan untuk menahan lift
        pada ketinggian.
    locker_bench_configuration:
