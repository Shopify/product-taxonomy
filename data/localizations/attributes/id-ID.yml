    lunge_trainer_style:
      name: Gaya alat latihan lunge
      description: Menjelaskan desain struktural dari alat latihan lunge.
    lure_buoyancy:
      name: Kekuatan apung umpan
      description: Menentukan bagaimana perilaku umpan dalam kolom air saat diam atau
