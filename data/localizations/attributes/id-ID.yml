    wine_aerator_type:
      name: Jenis aerator anggur
      description: Menentukan bentuk atau gaya pengoperasian aerator anggur.
    wine_glass_style:
      name: Gaya gelas anggur
      description: Menentukan jenis anggur atau desain gelas yang diinginkan untuk
        mengoptimalkan aroma dan rasa.
    wok_bottom_type:
      name: Jenis dasar wajan
      description: Menentukan bentuk dasar wajan, sehingga kompatibel dengan berbagai
        jenis kompor dan cincin wajan.
    wood_grain_orientation:
      name: Orientasi serat kayu
      description: Menentukan orientasi serat kayu pada produk, seperti serat ujung,
        serat tepi, atau serat permukaan. Orientasi serat kayu memengaruhi daya tahan
        dan kemudahan penggunaan oleh pisau.
    wood_seasoning_method:
      name: Metode penyiapain kayu
      description: Menunjukkan bagaimana kayu bakar dikeringkan atau disiapkan, yang
        memengaruhi kadar air dan kualitas pembakaran.
    wrap_format:
      name: Format pembungkus
      description: Menentukan bentuk fisik kemasan makanan, seperti gulungan atau
        lembaran yang sudah dipotong.
    abacus_bead_material:
      name: Bahan manik-manik abakus
      description: Bahan utama manik-manik abakus.
    abec_rating:
      name: Peringkat ABEC
      description: Menentukan tingkat presisi bantalan berdasarkan peringkat ABEC,
        yang menunjukkan tingkat kelancaran dan toleransi.
    abrasive_level:
      name: Tingkat abrasif
      description: Kekuatan abrasi relatif dari pasta poles/kompon pada lapisan cat
        otomotif.
    absinthe_accessories_included:
      name: Aksesori absinthe yang disertakan
      description: Memerinci segala aksesori yang disertakan dalam kemasan produk,
        seperti sendok, gelas, atau gula kubus.
    ac_compressor_mounting_style:
      name: Gaya mounting kompresor AC
      description: Menjelaskan gaya pemasangan/penyambungan mekanis atau antarmuka
        braket kompresor ke sistem penggerak mesin/aksesori.
    ac_compressor_oil_type:
      name: Jenis oli kompresor AC
      description: Menentukan jenis kimia oli pelumas yang dibutuhkan/digunakan oleh
        kompresor AC (jenis umum meliputi PAG dan POE).
    accent_modes:
      name: Mode aksen
      description: Menentukan bagaimana metronom dapat memberi aksen pada ketukan
        dalam satu birama (di luar bunyi klik dasar).
    access_mechanism:
      name: Mekanisme akses
      description: Menjelaskan cara pengguna mencapai platform tidur yang berada di
        tempat tinggi.
    accessibility_features:
      name: Fitur aksesibilitas
      description: Menentukan peralatan dan konfigurasi terkait aksesibilitas pada
        minibus.
    accessories_included:
      name: Aksesori yang disertakan
      description: Mencantumkan barang-barang tambahan yang disertakan bersama kursi
        (misalnya, ottoman, bantal pinggang), memberikan gambaran yang jelas kepada
        pembeli tentang nilai tambah yang diberikan.
    accessory_pieces_included:
      name: Item aksesori yang disertakan
      description: Daftar item aksesori yang termasuk dalam set atau paket hadiah
        aksesori pakaian yang terdiri dari beberapa bagian.
    acoustic_amplifier_feedback_control_features:
      name: Fitur kontrol umpan balik penguat akustik
      description: Menunjukkan adanya fitur anti-umpan balik bawaan untuk instrumen
        akustik (misalnya, filter notch, sakelar fase, penekan umpan balik otomatis).
    acoustic_drum_kit_components_included:
      name: Termasuk komponen perangkat drum akustik
      description: Menunjukkan komponen utama apa saja yang termasuk dalam kit (hanya
        shell pack vs kit lengkap; termasuk simbal/hardware).
    acoustic_guitar_body_shape:
      name: Bentuk badan gitar akustik
      description: Menjelaskan bentuk/garis luar bodi gitar akustik, yang memengaruhi
        nada, kenyamanan, dan penggunaan umum.
    acoustic_guitar_string_core_design:
      name: Desain inti senar gitar akustik
      description: Konstruksi inti dari senar yang dililit.
    acoustic_piano_key_material:
      name: Bahan tuts piano akustik
      description: Menentukan bahan utama yang digunakan untuk permukaan tuts piano/gading.
    acoustic_piano_lid_type:
      name: Jenis penutup piano akustik
      description: Menentukan gaya mekanisme penutup/tutup yang digunakan pada piano
        akustik (untuk perbedaan antara piano grand dan piano tegak/penutup atas).
    acoustic_piano_plate_frame_material:
      name: Bahan pelat/rangka piano akustik
      description: Menentukan bahan utama pelat/rangka piano (harpa), umumnya besi
        cor.
    acoustic_piano_soundboard_material:
      name: Bahan papan suara piano akustik
      description: Menentukan bahan utama yang digunakan untuk papan suara piano.
    action_figure_scale:
      name: Skala figur aksi
      description: Menunjukkan rasio skala kolektor (misalnya, 1:12) yang sesuai dengan
        aksesori tersebut.
    action_type:
      name: Jenis aksi
      description: Menjelaskan mekanisme penembakan atau pengokangan senjata (misalnya,
        bolt action, break-barrel, lever action).
    actuation_mechanism:
      name: Mekanisme aktuasi
      description: 'Menunjukkan bagaimana tuas mengaktifkan sistem rem: kabel mekanis
        murni, hidrolik penuh, hidrolik yang diaktifkan kabel, atau elektronik/nirkabel.'
    actuation_method:
      name: Metode aktuasi
      description: Bagaimana sistem supresi diaktifkan atau dinonaktifkan.
    adapter_orientation:
      name: Orientasi adaptor
      description: Menentukan sudut atau konfigurasi adaptor katup ban sepeda, yang
        memengaruhi aksesibilitas pompa (misalnya, lurus, 90°).
    additive_application_stage:
      name: Tahap aplikasi aditif
      description: Menunjukkan kapan produk dimaksudkan untuk digunakan dalam proses
        tersebut.
    adhesive_backing:
      name: Lapisan perekat belakang
      description: Apakah sutra yang dapat dicetak memiliki lapisan perekat belakang
        untuk pemasangan kupas-tempel.
    adhesive_formulation:
      name: Formulasi perekat
      description: Menunjukkan basis kimia atau formulasi perekat, seperti sianoakrilat
        atau epoksi.
    adhesive_sides:
      name: Sisi perekat
      description: Menunjukkan apakah perekat lebur berada di satu sisi atau kedua
        sisi pita/lembaran.
    adjunct_grain_processing_form:
      name: Bentuk pengolahan biji-bijian tambahan
      description: Menunjukkan bentuk fisik/pengolahan biji-bijian tambahan yang dijual
        untuk pembuatan bir (misalnya, serpihan, dipanggang, dimalt, mentah).
    adjustability_type:
      name: Jenis penyesuaian
      description: Menentukan jenis penyesuaian yang didukung strut, jika ada.
    adjustable_cup_mutes:
      name: Peredam suara cangkir yang dapat disesuaikan
      description: Menunjukkan apakah cangkir dapat disesuaikan/dilepas dan gaya penyesuaiannya.
    adjustable_zones:
      name: Zona yang dapat disesuaikan
      description: Mengidentifikasi bagian mana dari alas yang dapat disesuaikan secara
        independen.
    adjustment_type:
      name: Jenis penyesuaian
      description: Menunjukkan apakah regulator dapat disesuaikan dan bagaimana cara
        penyesuaian dilakukan.
    administration_method:
      name: Metode administrasi
      description: Menunjukkan cara pemberian obat cacing pada kuda (misalnya, secara
        oral atau melalui suntikan), membantu pembeli mematuhi petunjuk dokter hewan
        dan memilih metode pemberian yang mudah dikelola.
    advice_card_prompt_type:
      name: Jenis petunjuk kartu saran
      description: Jenis petunjuk yang tercetak pada kartu (atau ketiadaan petunjuk).
    aeration_method:
      name: Metode aerasi
      description: Menjelaskan jenis aerasi yang disediakan atau didukung oleh wadah,
        untuk memastikan oksigen yang cukup bagi umpan hidup.
    aero_package_components:
      name: Komponen paket aero
      description: Menunjukkan komponen aerodinamis utama mana yang terpasang pada
        kendaraan (pilih semua yang sesuai).
    aerodynamic_elements_included:
      name: Elemen aerodinamis yang disertakan
      description: Menentukan komponen aerodinamis mana yang disertakan pada mobil
        formula (pilih semua yang berlaku, jika didukung).
    aftertouch_support:
      name: Dukungan aftertouch
      description: Apakah pengontrol mendukung aftertouch (kanal atau polifonik) pada
