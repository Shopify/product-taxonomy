      description: Bentuk keseluruhan/gaya penyangga alat tenun permadani tangan.
    tapestry_loom_shedding_method:
      name: Metode pembukaan benang pada alat tenun permadani
      description: Cara alat tenun menciptakan celah (memisahkan benang lusi) untuk
