      description: Finis permukaan alat tenun (terutama untuk alat tenun kayu).
    loom_folding_portability_design_type:
      name: Jenis desain lipat/portabel alat tenun
      description: Apakah dan bagaimana alat tenun dapat dilipat/dirapatkan untuk
