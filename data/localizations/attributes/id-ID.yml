    tin_whistle_bore_type:
      name: Jenis lubang peluit timah
      description: Menentukan desain lubang pada peluit timah.
    tin_whistle_included_accessories:
      name: Peluit timah termasuk aksesoris.
      description: Aksesoris yang disertakan bersama peluit timah (misalnya, wadah,
        tongkat pembersih).
    tip_finish_coating:
      name: Finishing/lapisan ujung
      description: Menentukan perlakuan permukaan pada ujung kerja (misalnya, dilapisi
        krom, dilapisi bubuk) yang memengaruhi ketahanan terhadap korosi dan kerusakan
        pada pelek.
    tip_shape:
      name: Bentuk ujung
      description: Menggambarkan bentuk atau ketajaman ujung pick gitar, yang memengaruhi
        artikulasi dan sensasi memetik.
    tippet_rating:
      name: Peringkat tippet
      description: Kekuatan tippet maksimum yang direkomendasikan dinyatakan dalam
        penunjukan X memancing lalat (misalnya, 4X).
    tire_changer_operation_type:
      name: jenis operasi pengganti ban
      description: Menentukan cara pengoperasian/penyambungan mesin pengganti ban
        (misalnya, manual, pneumatik, hidrolik). Berbeda dari atribut umum "Sumber
        daya"; gunakan saat menjelaskan metode pengoperasian aktuasi mesin.
    tire_changer_type:
      name: Jenis alat pengganti ban
      description: Gaya pengoperasian umum, desain, atau tingkat otomatisasi mesin
        pengganti ban.
    tire_compound_type:
      name: Jenis campuran ban
      description: Menentukan klasifikasi senyawa karet yang digunakan pada ban (misalnya,
        lunak, hujan, licin), yang memengaruhi traksi dan daya tahan dalam berbagai
        kondisi.
    tire_load_range:
      name: Rentang beban ban
      description: Menunjukkan peringkat lapisan ban/rentang beban (umumnya untuk
        ban LT) yang mencerminkan kapasitas daya dukung beban.
    tire_position:
      name: Posisi ban
      description: Posisi pemasangan yang disarankan pada kendaraan.
    tire_repair_kit_components:
      name: Komponen kit perbaikan ban
      description: Menentukan item-item yang termasuk dalam paket, memungkinkan pelanggan
        untuk membandingkan kelengkapan bundel.
    tire_sidewall_type:
      name: Jenis dinding samping ban
      description: Menentukan gaya atau fitur konstruksi dinding samping.
    tire_speed_rating:
      name: Peringkat kecepatan ban
      description: Huruf peringkat kecepatan ban (misalnya, H, V, W) yang menunjukkan
        kemampuan kecepatan maksimum yang dapat dipertahankan.
    tire_spoon_type:
      name: Jenis sendok ban
      description: Mengkategorikan alat pembuka ban berdasarkan bentuk ujung dan tujuan
        penggunaannya.
    tire_system_compatibility:
      name: Kompatibilitas sistem ban
      description: Menunjukkan apakah cairan penutup ban tersebut ditujukan untuk
        ban tubeless, ban tipe tabung, atau keduanya.
    tire_temperature_rating_utqg:
      name: Peringkat suhu ban (UTQG)
      description: Tingkat ketahanan suhu UTQG untuk ban otomotif (misalnya, A, B,
        C).
    tire_traction_rating_utqg:
      name: Peringkat traksi ban (UTQG)
      description: Tingkat traksi UTQG untuk performa pengereman basah.
    tire_tread_style:
      name: Gaya tapak ban
      description: Menjelaskan pola tapak umum ban tubular, yang mencerminkan medan
        yang dituju dan karakteristik traksi.
    tire_tube_type:
      name: Jenis ban dalam
      description: Apakah ban tersebut dirancang untuk penggunaan tubeless atau tipe
        ban dalam.
    title_status:
      name: Status judul
      description: Status kepemilikan/registrasi kendaraan secara hukum.
    tobacco_application:
      name: Aplikasi tembakau
      description: Menunjukkan metode konsumsi atau alat hisap yang dimaksudkan untuk
        tembakau curah tersebut.
    tobacco_cut_type:
      name: Jenis potongan tembakau
      description: Menentukan potongan fisik atau gaya persiapan tembakau lepas, yang
        memengaruhi laju pembakaran, metode pengemasan, dan pengalaman merokok secara
        keseluruhan.
    tobacco_strength:
      name: Kekuatan tembakau
      description: Menunjukkan sensasi atau efek nikotin yang dirasakan dari tembakau
        saat dikonsumsi, membantu pembeli memilih intensitas yang sesuai dengan preferensi
        mereka.
    toe_construction:
      name: Konstruksi toe
      description: Menentukan konfigurasi area ujung kaki pada sepatu selam, yang
        memengaruhi keseimbangan, sensasi di atas papan, dan kehangatan.
    toe_coverage:
      name: Cakupan toe
      description: Menunjukkan jenis perlindungan jari kaki yang diberikan oleh kaus
        kaki.
    toe_pick_style:
      name: Gaya ujung jari kaki
      description: Menjelaskan desain ujung bilah sepatu seluncur es.
    toe_protection_type:
      name: Jenis pelindung ujung
      description: Menunjukkan apakah dan bagaimana area ujung sepatu diperkuat untuk
        tujuan keselamatan (misalnya, ujung sepatu baja, ujung sepatu lunak).
    toe_reinforcement_type:
      name: Jenis penguat ujung
      description: Menjelaskan detail konstruksi area ujung kaki, yang memengaruhi
        daya tahan dan kompatibilitas sepatu.
    toe_stop_stem_thread_size:
      name: Ukuran ulir batang penghenti jari kaki
      description: Menentukan ukuran ulir batang penahan jari kaki untuk memastikan
        kompatibilitas pelat.
    tofu_preparation_style:
      name: Gaya pengolahan tahu
      description: Mengkategorikan gaya tradisional atau subtipe tahu di luar kekenyalan
        (misalnya, tahu sutra, tahu balok, tahu kembung, tahu kulit, tahu simpul,
        tahu fermentasi).
    tom_mount_adjustment_features:
      name: Fitur penyesuaian dudukan Tom
      description: Menentukan penyesuaian apa saja yang disediakan oleh dudukan tom
        untuk memposisikan drum (misalnya, kemiringan, rotasi, tinggi).
    tom_mount_components_included:
      name: Termasuk komponen pemasangan Tom
      description: Menentukan bagian-bagian apa saja yang termasuk dalam paket dudukan
        tom (receiver, lengan, bola, klem, pengunci memori, dll.).
    tom_mount_mounting_position:
      name: Posisi pemasangan dudukan Tom
      description: Menentukan di mana dudukan tom akan dipasang (misalnya, drum bass,
        dudukan simbal, rak).
    tonneau_cover_mounting_style:
      name: Gaya pemasangan penutup tonneau
      description: Menunjukkan cara memasang/menempelkan penutup bak truk ke rel bak
        truk.
    tool_case_form_factor:
      name: faktor bentuk kotak perkakas
      description: Mengidentifikasi gaya fisik kotak perkakas, yang memengaruhi portabilitas
        dan penyimpanan (misalnya, tas kerja, kotak keras).
    tool_functions_included:
      name: Fungsi alat meliputi
      description: Mencantumkan fungsi perbaikan atau perawatan spesifik yang dapat
        dilakukan oleh alat multifungsi atau seperangkat alat.
    top_bunk_access_method:
      name: Metode akses ke ranjang atas
      description: Menunjukkan bagaimana penghuni mencapai ranjang atas, membantu
        dalam hal keselamatan dan pertimbangan ruang.
    top_fit:
      name: Sangat pas
      description: Menentukan siluet keseluruhan atau kesesuaian atasan pada tubuh
        (misalnya, ramping atau longgar).
    top_hat_style:
      name: Gaya topi tinggi
      description: Mengidentifikasi variasi gaya spesifik dari topi tinggi.
    top_soundboard_material:
      name: Bahan atas (papan suara)
      description: Menentukan bahan bagian atas/papan suara gitar (plat penghasil
        nada utama).
    topping_form:
      name: Bentuk topping
      description: Menentukan bentuk fisik atau konsistensi topping makanan penutup
        untuk membantu pembeli dengan cepat menemukan aplikasi yang diinginkan.
    topping_type:
      name: Jenis topping
      description: Menunjukkan lapisan atau topping eksterior utama yang diaplikasikan
        pada donat.
    tow_hook_type:
      name: Jenis kait penarik
      description: Menunjukkan apakah kneeboard tersebut dilengkapi dengan kait penarik
        terintegrasi dan menentukan gaya mekanismenya.
    tow_point_configuration:
      name: Konfigurasi titik penarik
      description: Menentukan konfigurasi titik penarik (tunggal, ganda, banyak) yang
        ditawarkan oleh tabung yang dapat ditarik untuk posisi berkendara yang berbeda.
    tow_strap_protective_features:
      name: Fitur pelindung tali derek
      description: Fitur konstruksi yang mengutamakan keselamatan dan daya tahan yang
        terintegrasi pada tali derek.
    tow_strap_type:
      name: Jenis tali penarik
      description: Menunjukkan konstruksi tali penarik fungsional, seperti tali penarik
        statis versus tali penarik kinetik.
    towable_tube_style:
      name: Model tabung yang dapat ditarik
      description: Mengidentifikasi desain umum atau faktor bentuk dari tabung yang
        dapat ditarik, yang menentukan posisi pengendara dan pengalaman berkendara.
    towed_water_sport_discipline:
      name: Disiplin olahraga air yang ditarik
      description: Menentukan aktivitas air yang ditarik utama yang dirancang untuk
        sarung tangan ini.
    towel_features:
      name: Fitur handuk
      description: Mencantumkan karakteristik khusus atau fitur tambahan yang disertakan
        bersama handuk.
    towel_style:
      name: Gaya handuk
      description: Mengklasifikasikan desain fungsional atau format handuk golf.
    toy_airplane_control_type:
      name: Pesawat mainan kendali tipe
      description: Menentukan cara pengguna mengendalikan pesawat mainan tersebut.
    toy_airplane_features:
      name: Fitur pesawat mainan
      description: Menyoroti fitur-fitur permainan menarik yang ada pada pesawat mainan
        tersebut.
    toy_airplane_flight_capability:
      name: Kemampuan terbang pesawat mainan
      description: Menunjukkan apakah pesawat mainan tersebut dirancang untuk benar-benar
        terbang/meluncur atau terutama untuk dimainkan/dipajang di darat.
    toy_audio_features:
      name: Fitur audio mainan
      description: Mencantumkan kemampuan audio dan efek suara yang terpasang pada
        mainan tersebut.
    toy_boat_play_features:
      name: Fitur permainan perahu mainan
      description: Menyoroti fitur interaktif penting dari perahu mainan untuk penemuan
        dan penyaringan.
    toy_boat_recommended_play_environment:
      name: Perahu mainan direkomendasikan untuk lingkungan bermain yang nyaman.
      description: Menentukan lingkungan bermain yang dimaksudkan untuk perahu mainan
        guna mendukung harapan dan keselamatan pembeli (misalnya, bak mandi vs perairan
        terbuka).
    toy_bowling_equipment_included:
      name: Termasuk peralatan bowling mainan
      description: Menentukan komponen bowling apa saja yang termasuk dalam set mainan
        bowling (misalnya, pin, bola, lintasan/matras, tas pembawa).
    toy_car_features:
      name: Fitur mobil mainan
      description: Fitur unggulan yang terintegrasi ke dalam mobil mainan (terpisah
        dari sistem penggerak), seperti lampu, suara, atau bagian yang dapat dibuka.
    toy_drawing_tablet_accessories_included:
      name: Termasuk aksesori tablet gambar mainan
      description: Aksesori tambahan yang disertakan selain tablet itu sendiri (misalnya,
        stylus tambahan, perangko).
    toy_drawing_tablet_erase_method:
      name: Metode penghapusan tablet gambar mainan
      description: Cara membersihkan/menghapus permukaan gambar.
    toy_drawing_tablet_screen_type:
      name: Jenis layar tablet gambar mainan
      description: Jenis permukaan gambar/tampilan yang digunakan (misalnya, tablet
        tulis LCD vs magnetik).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Tablet gambar mainan, alat tulis/gambar
      description: Alat utama yang digunakan untuk menggambar di tablet (jenis stylus).
    toy_figure_sound_feature:
      name: Fitur suara figur mainan
      description: Menunjukkan apakah figur hewan tersebut menghasilkan suara dan
        jenis suara apa (misalnya, raungan, suara hewan realistis).
    toy_game_features:
      name: Fitur mainan/permainan
      description: Menyoroti fitur permainan atau konstruksi penting yang relevan
        dengan mainan pantai dan pasir.
    toy_gift_basket_items_included:
      name: Item kerangan hadiah mainan yang disertakan
      description: 'Mencantumkan jenis-jenis mainan utama yang termasuk dalam keranjang
        hadiah (misalnya: mainan boneka, set bangunan, puzzle).'
    toy_glider_launch_method:
      name: Metode peluncuran pesawat luncur mainan
      description: Menentukan cara peluncuran pesawat layang mainan, yang memengaruhi
        gaya bermain dan harapan pembeli.
    toy_helicopter_control_type:
      name: Helikopter mainan tipe kendali
      description: Cara helikopter mainan dikendalikan/dioperasikan (terlepas dari
        penggerak), seperti remote genggam, kontrol aplikasi, atau tanpa kontrol (terbang
        bebas).
    toy_helicopter_features:
      name: Fitur helikopter mainan
      description: Fitur fungsional utama dari helikopter mainan (khususnya model
        RC) yang memengaruhi kegunaan dan nilai permainan.
    toy_jacks_set_items_included:
      name: Set mainan jacks termasuk item-item berikut
      description: Menentukan item inti apa saja yang termasuk dalam set mainan jacks
        (misalnya, jacks, bola, tas).
    toy_keyboard_learning_mode:
      name: Mode pembelajaran keyboard mainan
      description: Menunjukkan pendekatan pendidikan/pembelajaran yang didukung oleh
        keyboard mainan (misalnya, tombol yang menyala, lagu pengiring, pelajaran
        terpandu, pembelajaran dengan bantuan aplikasi).
    toy_keyboard_sound_theme:
      name: Tema suara keyboard mainan
      description: Jenis-jenis suara instrumen/tema suara bawaan yang ditawarkan (selain
        piano biasa).
    toy_kitchen_appliances_included:
      name: Termasuk peralatan dapur mainan
      description: Menentukan peralatan dapur yang diwakili dalam playset ketika produk
        tersebut adalah peralatan atau playset yang berfokus pada peralatan.
    toy_kitchen_assembly_requirement:
      name: Persyaratan perakitan dapur mainan
      description: Menunjukkan apakah perakitan diperlukan dan perkiraan kompleksitas
        perakitan.
    toy_kitchen_interactive_features:
      name: Fitur interaktif dapur mainan
      description: Menyoroti elemen interaktif yang umum ditemukan pada dapur mainan
        dan aksesori terkait.
    toy_motorcycle_feature_set:
      name: Set fitur sepeda motor mainan
      description: Fitur-fitur utama mainan sepeda motor (pilih semua yang sesuai).
    toy_motorcycle_scale:
      name: Skala mainan sepeda motor
      description: Rasio skala untuk sepeda motor mainan/koleksi (misalnya, 1:12).
    toy_parachute_launch_method:
      name: Metode peluncuran parasut mainan
      description: Cara mainan tersebut dirancang untuk diluncurkan/diterbangkan.
    toy_piano_and_keyboard_accessories_included:
      name: Termasuk piano mainan dan aksesoris keyboard.
      description: Aksesoris yang disertakan bersama piano mainan atau keyboard mainan.
    toy_playset_assembly_required:
      name: Mainan set ini perlu dirakit.
      description: Menunjukkan apakah perakitan oleh orang dewasa diperlukan sebelum
        dimainkan (selain perakitan sederhana dengan cara menjepit).
    toy_playset_items_included:
      name: Item set mainan yang disertakan
      description: Mencantumkan komponen utama yang termasuk dalam playset (apa saja
        yang ada di dalam kotak).
    toy_safety_certification:
      name: Sertifikasi keamanan mainan
      description: Standar/tanda keselamatan dan kepatuhan yang berlaku untuk mainan
        di pasar konsumen (misalnya, EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Fitur pesawat ruang angkasa mainan
      description: Menunjukkan fitur interaktif/permainan umum yang terintegrasi dalam
        mainan pesawat luar angkasa.
    toy_spaceship_size_class:
      name: Kelas ukuran pesawat ruang angkasa mainan
      description: Menunjukkan kelas ukuran kasar untuk pesawat ruang angkasa mainan
        guna mendukung penyaringan cepat, terpisah dari dimensi pasti (panjang/lebar/tinggi)
        dan bukan rasio skala model numerik (misalnya, 1:72).
    toy_tableware_pieces_included:
      name: Termasuk peralatan makan mainan
      description: Menentukan item peralatan makan mainan apa saja yang disertakan
        (piring, cangkir, sendok garpu, peralatan saji).
    toy_tool_electronic_features:
      name: Fitur elektronik alat mainan
      description: Menjelaskan fungsi interaktif/elektronik dari alat mainan tersebut
        (lampu, suara, gerakan berputar, dll.).
    toy_tool_set_components_included:
      name: Termasuk komponen set alat termasuk
      description: Mencantumkan item alat bermain pura-pura spesifik yang termasuk
        dalam paket (khususnya untuk set alat).
    toy_train_scale:
      name: Skala kereta mainan
      description: Menentukan standar skala kereta mainan/model (atau ukuran sistem
        rel) untuk memastikan kompatibilitas dengan kereta dan rel yang sudah ada.
    toy_train_track_layout_type:
      name: Jenis tata letak rel kereta mainan
      description: Menjelaskan tata letak/bentuk rel yang disertakan untuk set kereta
        api atau paket rel tambahan.
    toy_weapon_gadget_features:
      name: Fitur senjata & gadget mainan
      description: Menyoroti fitur interaktif dan fungsional umum yang khusus untuk
        senjata mainan dan alat mata-mata.
    tpms_sensor_frequency_band:
      name: Pita frekuensi sensor TPMS
      description: Pita frekuensi radio yang didukung oleh aksesori terkait TPMS (jika
        berlaku).
    track_and_field_discipline:
      name: Disiplin atletik
      description: Mengidentifikasi cabang olahraga atau disiplin atletik spesifik
        yang menjadi sasaran produk ini (misalnya, lempar cakram, lompat galah, lari
        cepat).
    track_event_specialization:
      name: Spesialisasi acara trek
      description: Menunjukkan jenis acara yang menjadi fokus pengoptimalan sepatu
        berduri tersebut.
    track_field_event_suitability:
      name: Kesesuaian untuk cabang olahraga atletik
      description: Mengidentifikasi cabang olahraga atletik spesifik yang menjadi
        tujuan penggunaan alat bantu latihan ini.
    track_set_special_features:
      name: Fitur spesial set trek
      description: Menyoroti fitur permainan unggulan yang disertakan dalam set lintasan
        ini, selain lintasan dan mobil dasar.
    track_surface_compatibility:
      name: Kompatibilitas permukaan rel
      description: Menunjukkan permukaan lari yang sesuai untuk sepatu atau paku lari
        tersebut.
    tracking_aid_type:
      name: Jenis alat bantu pelacakan
      description: Menunjukkan apakah kayak tersebut dilengkapi dengan perangkat yang
        meningkatkan kemampuan melaju lurus.
    traction_pattern_type:
      name: Jenis pola traksi
      description: Menjelaskan alur permukaan utama atau pola tapak yang memberikan
        cengkeraman pada bantalan.
    trading_card_league:
      name: Liga kartu perdagangan
      description: Mengidentifikasi liga olahraga yang terkait dengan set kartu atau
        subjek (jika ada).
    trailer_construction:
      name: Konstruksi trailer
      description: Mengidentifikasi konstruksi utama trailer untuk rangka/badan (misalnya,
        aluminium, baja, atau konstruksi campuran).
    trailer_coupler_size:
      name: Ukuran kopling trailer
      description: Menentukan ukuran bola pengait trailer yang dibutuhkan untuk penarikan.
    trailer_hitch_mounting_location_method:
      name: Lokasi/metode pemasangan pengait trailer
      description: Menentukan di mana dan bagaimana pengait trailer dipasang pada
        kendaraan (misalnya, penerima belakang, penerima depan, dipasang pada rangka,
        dipasang pada bemper, dipasang pada bak).
    trailer_light_function:
      name: Fungsi lampu trailer
      description: Fungsi/posisi utama lampu trailer.
    trailer_suspension_type:
      name: Jenis suspensi trailer
      description: Menentukan jenis sistem suspensi yang digunakan pada trailer sepeda,
        seperti pegas koil atau pegas daun, untuk meningkatkan kenyamanan berkendara
        dan perlindungan muatan.
    trailer_wiring_circuit:
      name: Rangkaian kabel trailer
      description: Mencantumkan sirkuit/sinyal penerangan, rem, dan tambahan yang
        dibawa oleh kabel trailer (yaitu, jalur daya/arde dan sinyal mana yang ada).
    trailer_wiring_connector_type:
      name: Jenis konektor kabel trailer
      description: Menentukan standar colokan sisi trailer/sisi kendaraan yang digunakan
        untuk rangkaian kabel dan adaptor trailer.
    train_whistle_intended_use:
      name: Penggunaan yang dimaksudkan untuk peluit kereta api
      description: Konteks penggunaan utama yang dimaksudkan untuk peluit tersebut.
    train_whistle_sound_character:
      name: Karakter suara peluit kereta api
      description: Menggambarkan karakter nada yang dirasakan dari suara peluit (timbre).
    trainer_mounting_type:
      name: Jenis pemasangan kereta
      description: Menjelaskan bagaimana sepeda terhubung dengan trainer (misalnya,
        Wheel-on atau Direct drive).
    training_dummy_shape:
      name: Bentuk boneka latihan
      description: Menentukan desain atau siluet keseluruhan boneka latihan, yang
        memengaruhi pegangan anjing dan realisme pelatihan.
    training_focus:
      name: Fokus pelatihan
      description: Menjelaskan area keterampilan utama yang ditargetkan oleh alat
        bantu tersebut (misalnya, refleks, gerakan kaki, koordinasi mata-tangan).
    training_focus_area:
      name: Area fokus pelatihan
      description: Menentukan keterampilan lacrosse utama yang dirancang untuk dikembangkan
        oleh alat bantu ini.
    training_objective:
      name: Tujuan pelatihan
      description: Menentukan keterampilan atau teknik utama yang dirancang untuk
        ditingkatkan oleh produk tersebut.
    training_surface_suitability:
      name: Kesesuaian permukaan latihan
      description: Menentukan permukaan mana yang dapat digunakan untuk alat latihan
        ini.
    training_surface_usage:
      name: Penggunaan permukaan latihan
      description: Menentukan aktivitas utama yang didukung oleh permukaan latihan,
        membedakan panel es sintetis yang dapat digunakan untuk bermain seluncur es
        dari matras untuk latihan di darat atau matras multi-olahraga.
    training_usage_type:
      name: Jenis penggunaan pelatihan
      description: Menentukan periode atau konteks penggunaan utama yang dimaksudkan
        untuk celana latihan, seperti latihan siang hari atau latihan semalaman.
    trampoline_enclosure_type:
      name: Jenis pagar trampolin
      description: Menentukan konfigurasi pagar yang digunakan pada trampolin, termasuk
        cara/tempat pemasangan jaring.
    trampoline_safety_certifications:
      name: Sertifikat keamanan trampolin
      description: Menunjukkan standar/sertifikasi keselamatan terkait trampolin mana
        yang diklaim dipenuhi oleh produk tersebut.
    transfer_application_method:
      name: Metode aplikasi transfer
      description: Menentukan cara transfer diterapkan pada kain (misalnya, disetrika
        vs dipress panas).
    transfer_method:
      name: Metode transfer
      description: Menentukan bagaimana desain tersebut akan ditransfer ke kain.
    transfer_peel_temperature:
      name: Suhu pengupas transfer
      description: Menentukan kondisi suhu yang direkomendasikan (panas, hangat, atau
        dingin) di mana lembaran pembawa harus dilepas setelah pengepresan.
    transmission_cooler_construction:
      name: Konstruksi pendingin transmisi
      description: Menentukan desain konstruksi inti pendingin transmisi.
    transmission_fluid_specification:
      name: Spesifikasi cairan transmisi
      description: Cairan transmisi memenuhi standar OEM/spesifikasi (misalnya, keluarga
        Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Bahan bushing dudukan transmisi
      description: Menentukan jenis elastomer atau isolator yang digunakan pada bushing/isolator
        dudukan (elemen peredam getaran).
    transmission_mount_type:
      name: Jenis dudukan transmisi
      description: Menentukan konstruksi/desain dudukan transmisi (misalnya, hidrolik
        vs padat) untuk membantu menentukan kesesuaian, karakteristik NVH, dan tujuan
        penggunaan.
    transparency_level:
      name: Tingkat transparansi
      description: Menjelaskan seberapa transparan dinding wadah tersebut, membantu
        pembeli memutuskan antara visibilitas yang jelas dan penyimpanan yang tersembunyi.
    transport_case_type:
      name: Jenis kotak transportasi
      description: Mengklasifikasikan gaya/kekakuan struktural solusi transportasi,
        yang mencerminkan tingkat perlindungan dan metode pengemasan.
    transposition_modes:
      name: Mode transposisi
      description: Menentukan mode transposisi/nada standar yang didukung oleh tuner
        (misalnya, nada standar dan kunci transposisi seperti B♭ atau E♭).
    trap_design:
      name: Desain perangkap
      description: Mengidentifikasi gaya struktural atau mekanisme perangkap, yang
        menentukan metode pemasangan dan spesies atau lingkungan yang paling sesuai
        untuknya.
    trap_spring_configuration:
      name: Konfigurasi pegas jebakan
      description: Menunjukkan jumlah atau susunan pegas yang menggerakkan perangkap,
        yang memengaruhi kekuatan dan legalitasnya.
    travel_bassinet_accessories_included:
      name: Aksesoris tempat tidur bayi portabel disertakan
      description: Daftar barang tambahan yang disertakan dengan keranjang bayi portabel.
    travel_spinning_wheel_assembly_required:
      name: Diperlukan rakitan roda pemintal portabel.
      description: Apakah roda tersebut memerlukan perakitan/penyiapan lebih lanjut
        selain membuka lipatannya (misalnya, memasang roda penggerak, tegangan, pedal)
        sebelum digunakan.
    travel_spinning_wheel_portability_features:
      name: Fitur portabilitas roda pemintal saat bepergian
      description: Elemen desain terkait portabilitas untuk roda pemintal perjalanan,
        seperti konstruksi lipat dan solusi transportasi yang disertakan.
    travel_trailer_appliances_fuel_type:
      name: Jenis bahan bakar peralatan trailer perjalanan
      description: Bahan bakar utama yang digunakan untuk peralatan/pemanas/memasak
        di atas kapal (bukan kendaraan penarik).
    travel_trailer_holding_tank_type:
      name: tipe tangki penampung trailer perjalanan
      description: Menunjukkan tangki penampung mana yang ada di dalam trailer perjalanan
        (pilih semua yang sesuai).
    travel_trailer_power_hookup_shore_power:
      name: Sambungan listrik untuk trailer wisata (listrik dari darat)
      description: Standar sambungan listrik yang didukung untuk koneksi daya dari
        darat.
    tread_pattern_type:
      name: Jenis pola tapak
      description: Mengklasifikasikan desain tapak ban secara keseluruhan, seperti
        licin, semi-licin, atau bergerigi, yang memengaruhi traksi, hambatan gelinding,
