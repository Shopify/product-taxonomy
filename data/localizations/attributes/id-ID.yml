    seat_belt_buckle_electrical_connector_type:
      name: Jenis konektor listrik gesper sabuk pengaman
      description: Menentukan konektor/antarmuka yang digunakan untuk jalur kabel
        sensor gesper/pretensioner, jika berlaku.
    seat_belt_buckle_mounting_type:
      name: Jenis pemasangan gesper sabuk pengaman
      description: Menjelaskan cara gesper/pengait terpasang pada kendaraan, jok,
        atau tangkai sabuk pengaman (misalnya, dibaut, dijepit).
    seat_belt_buckle_release_button_color:
      name: warna tombol pelepas gesper sabuk pengaman
      description: Menentukan warna tombol pelepas gesper.
    seat_belt_cover_placement:
      name: Penempatan penutup sabuk pengaman
      description: Menentukan di bagian mana sabuk pengaman penutup dimaksudkan untuk
        digunakan.
    seat_belt_integration:
      name: Integrasi sabuk pengaman
      description: Menentukan apakah jok tersebut sudah termasuk tempat penyimpanan
        sabuk pengaman dan/atau gesper yang terintegrasi, atau apakah tempat penyimpanan
        gesper bawaan kendaraan harus dipindahkan untuk pemasangan.
    seat_belt_provision:
      name: Penyediaan sabuk pengaman
      description: Menunjukkan apakah sabuk pengaman dan/atau perangkat sabuk terkait
        (misalnya gesper) sudah termasuk dalam paket jok belakang atau harus dipindahkan
        dari jok asli.
    seat_belt_strap_installation_location:
      name: Lokasi pemasangan tali sabuk pengaman
      description: Menunjukkan di mana tali pengikat dipasang di dalam sistem sabuk.
    seat_cover_placement:
      name: Penempatan penutup kursi
      description: Menunjukkan posisi jok yang ditujukan untuk penutup ini pada kendaraan.
    seat_cover_securement_method:
      name: Metode pengamanan penutup jok
      description: Menunjukkan cara utama penutup jok dipasang ke jok. Jika beberapa
        metode digunakan, pilih metode utama.
    seat_cover_set_contents:
      name: Isi set sarung jok
      description: Menjelaskan bagian yang termasuk dalam paket (misalnya hanya bagian
        bawah jok vs jok lengkap + sandaran kepala).
    seat_fabric:
      name: Kain jok
      description: Kain utama yang digunakan untuk sling dudukan dan sandaran jok.
    seat_height_category:
      name: Kategori tinggi tempat duduk
      description: Mengklasifikasikan kursi berdasarkan rentang ketinggian tempat
        duduk yang umum (misalnya, ketinggian meja dapur atau bar) untuk menyederhanakan
        pemilihan.
    seat_material:
      name: Bahan dudukan
      description: Mengidentifikasi bahan utama permukaan dudukan bangku.
    seat_mounting_type:
      name: Jenis pemasangan jok
      description: Konfigurasi pemasangan/rel yang digunakan untuk memasang jok ke
        lantai kendaraan.
    seating_surface_material:
      name: Bahan permukaan tempat duduk
      description: Menentukan bahan dari area tempat seseorang berbaring (misalnya
        jaring Textilene, kain sling, anyaman, pelapis empuk).
    seatpost_clamp_mechanism:
      name: Mekanisme penjepit tiang sadel
      description: Jenis sistem penjepit/penutup yang mengamankan tiang sadel.
    section_orientation_compatibility:
      name: Kesesuaian orientasi bagian
      description: Menunjukkan apakah aksesori tersebut cocok untuk bagian dengan
        orientasi lengan kiri, orientasi lengan kanan, atau orientasi universal.
    sectional_configuration:
      name: Konfigurasi sectional
      description: Menentukan modul atau orientasi spesifik dari unit sectional (misalnya
        sudut, ujung lengan kiri, chaise) sehingga pembeli dapat menyusun tata letak
        yang diinginkan.
    sectional_shape:
      name: Bentuk penampang
      description: Menentukan konfigurasi/tata letak geometris keseluruhan dari sofa
        modular.
    secured_components:
      name: Komponen yang diamankan
      description: Mencantumkan bagian-bagian sepeda spesifik yang dilindungi oleh
        pengunci roda atau mur pengaman (misalnya roda depan, roda belakang, tiang
        sadel).
    seed_content:
      name: Isi biji
      description: Menunjukkan apakah buah jeruk tidak berbiji, memiliki sedikit biji,
        atau berbiji banyak.
    seed_size_classification:
      name: Klasifikasi ukuran benih
      description: Menunjukkan ukuran relatif biji yang tidak dapat dimakan di dalam
        buah leci, yang memengaruhi jumlah daging buah yang dapat dimakan.
    self_adhesive_backing_format:
      name: Format lapisan perekat
      description: Format fisik dari lapisan belakang perekat yang disertakan dengan
        tab sumbu (bantalan yang sudah terpasang vs stiker terpisah, dll.).
    self_adhesive_hook_loop_backing_type:
      name: Jenis lapisan kait dan loop berperekat
      description: Menentukan konstruksi lapisan belakang/lapisan pelindung dan sistem
        perekat yang digunakan pada sisi berperekat.
    self_adhesive_hook_loop_fastener_shape:
      name: Bentuk pengikat hook & loop perekat
      description: Menentukan potongan/bentuk dari komponen pengikat yang disediakan.
    self_hardening_clay_finish:
      name: Lapisan tanah liat yang mengeras sendiri
      description: Menjelaskan tampilan/kilap permukaan setelah benar-benar mengering
        (berguna untuk memilih antara hasil akhir matte alami, satin, dll.).
    self_hardening_clay_water_resistance_after_curing:
      name: Tanah liat yang mengeras sendiri tahan air setelah pengeringan
      description: Menunjukkan ketahanan terhadap paparan air setelah benar-benar
        mengering (tanpa bahan penyegel tambahan).
    sensor_functions:
      name: Fungsi sensor
      description: Menunjukkan metrik bersepeda mana yang diukur oleh sensor.
    sensor_measurement_mode:
      name: Mode pengukuran sensor
      description: Menunjukkan metrik yang dapat ditangkap oleh sensor (misalnya hanya
        irama kayuhan, hanya kecepatan, atau kecepatan & irama kayuhan sekaligus).
    sensor_mounting_position:
      name: Posisi pemasangan sensor
      description: Menentukan lokasi pemasangan sensor pada sepeda atau pengendara,
        seperti lengan engkol, hub roda, atau sepatu. Hal ini memengaruhi kompatibilitas
        dengan berbagai konfigurasi sepeda.
    sensor_mounting_type:
      name: Jenis pemasangan sensor
      description: Menentukan cara pemasangan sensor MAP ke manifold intake/mesin
        (misalnya, flensa baut vs grommet tekan).
    sensor_or_gauge_mounting_location:
      name: Lokasi pemasangan sensor atau pengukur
      description: Menentukan di mana pada kendaraan sensor atau pengukur tersebut
        akan dipasang (tingkat sistem/lokasi, bukan kiri/kanan).
    sensory_modality:
      name: Modalitas sensorik
      description: Pengalaman sensorik utama yang dirancang dari mainan (dapat berupa
        multi sensorik).
    sensory_toy_fidget_mechanism:
      name: Mainan sensorik dengan mekanisme pereda kegelisahan
      description: Interaksi/mekanisme utama yang digunakan untuk fidgeting dan pengaturan
        diri.
    sensory_toy_light_features:
      name: Fitur cahaya mainan sensorik
      description: Perilaku/efek pencahayaan yang disediakan oleh mainan.
    sensory_toy_texture_type:
      name: Jenis tekstur mainan sensorik
      description: Elemen dominan yang memberikan sensasi/tekstur permukaan yang digunakan
        untuk stimulasi taktil.
    sequin_application_method:
      name: Metode pemasangan payet
      description: Cara pemakaian/penggunaan payet yang tepat (dijahit vs dilekatkan
        dengan lem vs dipanaskan, dll.).
    sequin_finish:
      name: Lapisan payet
      description: Menjelaskan permukaan/hasil akhir visual dan efek reflektif dari
        payet yang digunakan pada patch (misalnya, matte, metalik, holografik), bukan
        lapisan belakang patch atau metode pemasangannya.
    serger_stitch_functions:
      name: Fungsi jahitan mesin obras
      description: Fungsi jahitan yang didukung oleh mesin obras (variasi obras/tepi
        dan jahitan obras khusus).
    serger_thread_count:
      name: Jumlah benang mesin obras
      description: Jumlah benang yang dapat digunakan mesin obras untuk menjahit (misalnya
        kemampuan 2/3/4/5 benang).
    service_interval:
      name: Interval servis
      description: Jangka waktu maksimum yang disarankan antara pemeriksaan/servis
        yang diperlukan oleh bengkel resmi.
    serving_temperature:
      name: Suhu penyajian
      description: Menunjukkan suhu atau kondisi penyajian produk yang disarankan
        saat dikonsumsi.
    sesame_seed_hull_status:
      name: Status kulit biji wijen
      description: Menentukan apakah tahini terbuat dari biji wijen yang sudah dikupas
        atau belum dikupas, yang memengaruhi warna, rasa, dan nilai gizinya.
    sesame_seed_roast_level:
      name: Tingkat sangrai biji wijen
      description: Menunjukkan seberapa lama biji wijen dipanggang sebelum digiling,
        sehingga membantu pembeli memilih intensitas rasa yang mereka sukai.
    sesame_seed_variety:
      name: Varietas biji wijen
      description: Mengidentifikasi warna atau varietas biji wijen yang digunakan
        untuk membuat minyak.
    set_classification:
      name: Klasifikasi himpunan
      description: Menentukan tingkat atau gaya permainan yang dimaksudkan untuk set
        kriket (misalnya turnamen, rekreasi, perjalanan).
    set_components:
      name: Komponen set
      description: Menunjukkan item apa saja yang termasuk dalam produk (misalnya,
        hanya stik tengah vs set lengkap).
    set_items_included:
      name: Item yang termasuk dalam set
      description: Menentukan pakaian atau aksesori yang termasuk dalam set, seperti
        kain saree, dupatta, atau ikat pinggang.
    setup_mechanism:
      name: Mekanisme pengaturan
      description: Menjelaskan metode pemasangan utama tenda (misalnya, pop-up, tiup/airbeam,
        clamshell atap).
    setup_type:
      name: Jenis pengaturan
      description: Cara merakit atau memasang tenda/terowongan bermain.
    sew_in_interfacing_elasticity:
      name: Elastisitas lapisan penguat yang dijahit
      description: Menunjukkan apakah kain pelapis yang dijahit memiliki daya regang
        dan, jika ya, ke arah mana, agar sesuai dengan proyek rajutan atau tenunan.
    sew_in_label_placement:
      name: Penempatan label yang dijahit
      description: Menunjukkan lokasi penempatan yang diinginkan pada barang jadi.
    sew_on_edge_finish:
      name: Penyelesaian tepi dengan jahitan
      description: Menunjukkan apakah tepi perekat kait dan loop masih mentah/terpotong
        atau sudah difinishing agar tidak mudah berjumbai.
    sew_on_rhinestone_hole_orientation:
      name: Orientasi lubang rhinestones yang dijahit
      description: Susunan/orientasi lubang relatif terhadap batu (misalnya, berdampingan,
        berlawanan, bersilang) untuk mendukung berbagai gaya jahitan.
    sewing_kit_components_included:
      name: Komponen kit jahit termasuk
      description: Mencantumkan perlengkapan/alat jahit yang termasuk dalam satu set
        alat jahit sehingga pembeli dapat membandingkan isi setiap set.
    sewing_machine_bobbin_class:
      name: Kelas kumparan mesin jahit
      description: Menentukan kelas/sistem kumparan yang kompatibel dengan mesin jahit
        untuk kumparan dan casing kumparan.
    sewing_machine_buttonhole_type:
      name: Jenis lubang kancing mesin jahit
      description: Metode pembuatan lubang kancing yang didukung oleh mesin.
    sewing_machine_display_type:
      name: Jenis tampilan mesin jahit
      description: Jenis antarmuka kontrol/tampilan pada mesin jahit.
    sewing_machine_needle_point_type:
      name: Jenis ujung jarum mesin jahit
      description: Menentukan geometri ujung/jenis ujung jarum yang menentukan bagaimana
        jarum tersebut menembus berbagai jenis kain (misalnya, ujung tajam vs ujung
        bulat vs ujung baji).
    sewing_machine_needle_system:
      name: Sistem jarum mesin jahit
      description: Sistem jarum/nomor model standar yang menentukan kompatibilitas
        mesin (sering ditulis sebagai 130/705 H, HAx1, DBx1, 15x1, dll.).
    sewing_machine_needle_type:
      name: Jenis jarum mesin jahit
      description: Menentukan aplikasi/gaya jarum yang dimaksud (misalnya, universal,
        ballpoint, jeans/denim), yang memengaruhi kualitas jahitan dan kesesuaian
        kain.
    sewing_machine_shank_type:
      name: Jenis batang jarum mesin jahit
      description: Menentukan standar antarmuka batang/pergelangan sepatu penekan
        yang dirancang untuk sepatu penekan tersebut guna memastikan kompatibilitas
        dengan mesin jahit (misalnya batang rendah, batang tinggi, batang miring).
    sewing_pattern_accessory_type:
      name: Jenis aksesori pola jahit
      description: Menentukan aksesori apa yang dibuat oleh pola jahitan tersebut.
    sewing_pattern_notions_required:
      name: Perlengkapan pola jahit yang dibutuhkan
      description: Daftar bahan/perangkat keras tambahan penting yang dibutuhkan untuk
        menyelesaikan proyek (selain kain dan benang).
    sewing_pattern_recommended_fabric:
      name: Kain yang direkomendasikan untuk pola jahitan
      description: Mencantumkan jenis/berat kain yang direkomendasikan untuk pola
        jahitan (sebagaimana diberikan oleh perancang pola).
    sewing_pattern_size_range:
      name: Rentang ukuran pola jahit
      description: Menentukan rentang ukuran yang dicakup oleh pola tersebut (misalnya,
        bayi hingga dewasa, ukuran besar).
    sewing_thread_size_system:
      name: Sistem ukuran benang jahit
      description: Standar ukuran yang digunakan untuk menyatakan ukuran benang (misalnya
        Tex, Denier, Ticket, nomor berat, ukuran V).
    shaft_curvature:
      name: Kelengkungan poros
      description: Menjelaskan bentuk keseluruhan poros, yang memengaruhi jarak bebas,
        ayunan, dan ergonomi.
    shaft_kick_point:
      name: Titik lentur poros
      description: Mengidentifikasi posisi di sepanjang poros yang paling banyak menekuk
        selama ayunan, yang memengaruhi lintasan terbang bola.
    shaft_length_type:
      name: Jenis panjang poros
      description: Penamaan ukuran kategorikal standar industri untuk batang anak
        panah (misalnya, Pendek, Sedang) digunakan ketika pengukuran milimeter yang
        tepat tidak diberikan.
    shaft_shape:
      name: Bentuk poros
      description: Menentukan profil penampang poros tonfa (misalnya bulat, persegi,
        segi delapan).
    shaker_fill_material:
      name: Bahan pengisi shaker
      description: Menentukan bahan pengisi internal utama yang digunakan untuk menciptakan
        suara shaker (jika ada), seperti manik-manik, biji, atau butiran timah.
    shaker_shell_material:
      name: Bahan cangkang pengocok
      description: Menentukan bahan utama badan/cangkang pengocok telur (wadah luar).
    shallot_variety:
      name: Varietas bawang merah
      description: Mengidentifikasi kultivar, jenis pasar, atau varietas spesifik
        dari produk bawang merah.
    shank_style:
      name: Gaya tangkai
      description: Menjelaskan bentuk/konfigurasi keseluruhan dari logam tempat tali
        kendali kuda dipasang (misalnya lurus, melengkung, atau melengkung ke belakang).
    shapewear_enhancement_feature:
      name: Fitur peningkatan pakaian dalam elastis
      description: Menyoroti peningkatan fungsi utama yang ditawarkan oleh pakaian
        (misalnya pengontrol perut, pengencang bokong, lapisan anti bocor).
    sheath_type:
      name: Jenis selubung
      description: Jenis sarung/selubung yang disertakan dengan pisau koleksi tersebut.
    sheet_music_clip_padding_material:
      name: bahan bantalan klip lembaran musik
      description: Bahan bantalan rahang/pegangan apa pun yang bersentuhan dengan
        kertas atau bibir penyangga untuk mencegah robek dan tergelincir.
    sheet_music_clip_spring_tension_level:
      name: Tingkat tegangan pegas klip partitur
      description: Kekuatan relatif pegas klip/gaya penjepitan.
    sheet_music_clip_use_environment:
      name: Lingkungan penggunaan klip partitur
      description: Pengaturan utama yang dituju di mana klip tersebut dirancang untuk
        berkinerja terbaik.
    shell_construction:
      name: Konstruksi shell
      description: Menentukan bagaimana shell drum bass dibuat, yang sangat memengaruhi
        nada dan berat.
    shell_finish:
      name: Pemberian lapisan cangkang
      description: Perawatan finishing eksterior pada cangkang doumbek.
    shell_hull_status:
      name: Status lambung/perut
      description: Menentukan apakah kacang atau biji-bijian tersebut dijual dengan
        cangkang atau kulitnya masih utuh atau sudah dilepas.
    shift_boot_attachment_method:
      name: Metode pemasangan penutup tuas persneling
      description: Menentukan cara penutup tuas persneling terpasang pada konsol/trim
        tuas persneling kendaraan (misalnya bezel trim jepit, cincin penahan, perekat).
    shift_boot_installation_hardware_included:
      name: Perangkat keras pemasangan penutup tuas persneling disertakan.
      description: Mencantumkan perangkat keras dan komponen pemasangan yang disertakan
        dengan penutup tuas persneling.
    shift_knob_illumination:
      name: Pencahayaan kenop persneling
      description: Menentukan apakah kenop persneling dilengkapi dengan pencahayaan
        dan metode/jenis pencahayaan (misalnya fotoluminescent, LED, serat optik,
        pola lampu latar).
    shift_knob_installation_method:
      name: Metode pemasangan kenop persneling
      description: Menentukan cara kenop persneling dipasang ke tuas/pemindah gigi.
    shift_knob_shape:
      name: Bentuk kenop persneling
      description: Menjelaskan faktor bentuk ergonomis keseluruhan dari kenop persneling.
    shift_pattern_type:
      name: Jenis pola persneling
      description: Menentukan gaya penandaan gigi pada kenop persneling (jika ada).
    shifter_compatibility:
      name: Kompatibilitas shifter
      description: Menunjukkan apakah ekstensi setang kompatibel dengan tuas elektronik,
        mekanis, keduanya, atau tidak kompatibel dengan tuas tersebut.
    shifter_mounting_interface:
      name: Antarmuka pemasangan shifter
      description: Menjelaskan cara pemasangan shifter ke sepeda (misalnya, ukuran
        penjepit yang spesifik, I-Spec, MatchMaker, ujung stang, tabung bawah, nirkabel).
    shifting_actuation_type:
      name: Jenis penggerak pemindah gigi
      description: Mengidentifikasi mekanisme yang digunakan untuk memindahkan gigi
        pada groupset (mekanis, elektronik berkabel, elektronik nirkabel, hidrolik).
    shifting_mechanism:
      name: Mekanisme pemindah gigi
      description: Mengidentifikasi apakah tuas pemindah gigi beroperasi secara mekanis
        atau elektronik, dan apakah berbasis indeks atau gesekan.
    shim_purpose:
      name: Tujuan shim
      description: Menentukan tipe fungsional produk (misalnya shim, wedge, spacer)
        sehingga pengendara sepeda dapat dengan cepat menemukan solusi penyesuaian
        yang tepat tanpa memerlukan subkategori terpisah.
    shin_guard_attachment_method:
      name: Metode pemasangan pelindung tulang kering
      description: Mengklasifikasikan format desain keseluruhan pelindung tulang kering,
        termasuk integrasi pelindung pergelangan kaki atau konstruksi berbahan kaus
        kaki.
    shirt_cuff_style:
      name: Gaya manset kemeja
      description: Mengidentifikasi konstruksi manset lengan, yang memengaruhi tingkat
        formalitas, kesesuaian dengan kancing manset, dan kenyamanan.
    shochu_base_ingredient:
      name: Bahan dasar Shochu
      description: Mengidentifikasi sumber pati atau gula utama yang digunakan untuk
        memproduksi shochu.
    shochu_soju_variety:
      name: Variasi shochu & soju
      description: Mengklasifikasikan produk berdasarkan gaya atau jenis produksinya
        yang diakui.
    shock_absorber_bushing_material:
      name: Bahan bushing peredam kejut
      description: Material dari bushing/isolator pemasangan yang disertakan atau
        terpasang pada peredam kejut.
    shock_absorber_charge_type:
      name: Jenis pengisian peredam kejut
      description: Menentukan teknologi pengisian/peredaman peredam kejut (misalnya,
        hidrolik/oli, gas bertekanan, udara) dan/atau desain tabung terkait jika berlaku.
    shock_absorber_mount_type_lower:
      name: Jenis pemasangan peredam kejut (bawah)
      description: Gaya antarmuka pemasangan bagian bawah peredam kejut untuk pencocokan
        pemasangan.
    shock_absorber_mount_type_upper:
      name: Jenis pemasangan peredam kejut (atas)
      description: Menentukan gaya antarmuka pemasangan bagian atas (paling atas)
        dari peredam kejut kendaraan bermotor untuk pencocokan pemasangan/kompatibilitas.
    shock_absorber_position:
      name: Posisi peredam kejut
      description: Menentukan apakah peredam kejut ditujukan untuk posisi depan, belakang,
        kiri, atau kanan pada kendaraan (lebih rinci daripada hanya penempatan pada
        poros roda).
    shock_absorption_system:
      name: Sistem peredam kejut
      description: Menjelaskan mekanisme yang digunakan untuk mengurangi getaran dan
        kebisingan saat memantul.
    shoe_collar_height:
      name: Tinggi kerah sepatu
      description: Mengklasifikasikan sepatu berdasarkan tinggi kerah/potongan (low-top,
        mid-top, high-top) untuk menunjukkan cakupan dan dukungan pergelangan kaki.
    shoe_cover_height:
      name: Tinggi penutup sepatu
      description: Menentukan tingkat cakupan penutup sepatu sepeda, membedakan penutup
        jari kaki dari overshoes potongan tinggi penuh.
    shoe_sizing_system:
      name: Sistem ukuran sepatu
      description: Mengidentifikasi standar ukuran (AS, Inggris, UE, Jepang, Mondopoint,
        dll.) yang digunakan untuk ukuran sepatu yang disebutkan.
    shoelace_aglet_material:
      name: bahan ujung tali sepatu
      description: Mengidentifikasi bahan yang digunakan untuk ujung tali sepatu (aglet),
        yang memengaruhi daya tahan dan gaya.
    shooting_rest_design:
      name: Desain penopang tembakan
      description: Mengklasifikasikan gaya struktural penyangga (penyangga tas, penyangga
        kereta luncur, penyangga tripod, penjepit senjata, dll.).
    shooting_stick_yoke_design:
      name: Desain stik yoke penembak
      description: Menentukan jenis dudukan atau yoke yang terhubung dengan senjata
        api atau alat bidik.
    shooting_target_style:
      name: Gaya target tembak
      description: Mengklasifikasikan gaya atau desain target tembak untuk seluncur
        es dan hoki sehingga pelanggan dapat memilih fokus pelatihan yang mereka butuhkan.
    shooting_target_type:
      name: Jenis target tembak
      description: Mengklasifikasikan sasaran tembak berdasarkan gaya struktural,
        material, atau desain (misalnya, gong, siluet, sasaran kertas, sasaran berputar),
        memungkinkan penembak untuk dengan cepat menemukan sasaran yang tepat untuk
        disiplin dan jenis senjata api mereka.
    short_block_assembly_balance_type:
      name: Jenis keseimbangan rakitan blok pendek
      description: Menunjukkan apakah rakitan yang berputar tersebut seimbang di dalam
        dan di luar.
    short_block_intended_use:
      name: Penggunaan yang dimaksudkan untuk blok pendek
      description: Penggunaan utama yang dimaksudkan untuk blok pendek ini.
    short_block_rotating_assembly_included:
      name: Rakitan putar blok pendek sudah termasuk
      description: Menentukan komponen rakitan berputar utama mana yang disertakan
        dengan blok mesin pendek.
    shot_size:
      name: Ukuran shot
      description: Menentukan ukuran shot untuk shot lepas atau komponen amunisi.
    shotgun_action_type:
      name: Jenis aksi senapan
      description: Menentukan mekanisme/aksi pengoperasian senapan.
    shotgun_choke_type:
      name: Jenis choke senapan
      description: Menentukan konfigurasi choke pada laras senapan.
    shotgun_gauge:
      name: Ukuran senapan
      description: Menentukan ukuran laras senapan (dan .410 jika ada) untuk identifikasi
        dan penyaringan dalam daftar barang koleksi.
    shotgun_stock_material:
      name: Bahan stok shotgun
      description: Menentukan bahan utama dari popor/bagian depan (furnitur).
    shuffleboard_speed_rating:
      name: Peringkat kecepatan shuffleboard
      description: Menunjukkan kecepatan luncur relatif yang diberikan oleh bubuk
        shuffleboard atau produk perawatan lainnya di atas meja, sehingga pemain dapat
        memilih kecepatan yang sesuai dengan tingkat keahlian dan panjang meja mereka.
    shuffleboard_table_length_compatibility:
      name: Kompatibilitas panjang meja shuffleboard
      description: Panjang standar meja shuffleboard yang dirancang agar produk dapat
        pas atau melengkapi.
    shuttlecock_base_material:
      name: Bahan dasar kok
      description: Mengidentifikasi bahan yang digunakan untuk bagian depan/dasar
        kok bulu tangkis, yang memengaruhi daya tahan, rasa, dan pantulan.
    shuttlecock_feather_material:
      name: Bahan bulu kok
      description: Mengidentifikasi sumber bulu utama atau jenis konstruksi yang digunakan
        pada bagian bawah kok, yang memengaruhi daya tahan, konsistensi, dan harga.
    shuttlecock_grade:
      name: Tingkat kok
      description: Menentukan tingkat permainan atau klasifikasi kualitas yang dimaksud
        (misalnya, latihan, klub, kompetisi).
    shuttlecock_speed_rating:
      name: Peringkat kecepatan kok
      description: Menentukan kecepatan atau peringkat kok yang ditetapkan oleh produsen,
        sehingga pemain dapat memilih kecepatan terbang yang tepat sesuai dengan kondisi
        bermain, suhu, dan ketinggian tempat.
    side_panel_installation_state:
      name: Kondisi pemasangan panel samping
      description: Menentukan apakah panel samping dipasok dalam keadaan polos, sudah
        dilapisi cat dasar, dicat, atau dilapisi/dipersiapkan untuk pemasangan.
    side_wall_mechanism:
      name: Mekanisme dinding samping
      description: Menjelaskan cara buaian samping ranjang terbuka atau diturunkan
        untuk mengakses bayi.
    signal_source:
      name: Sumber sinyal
      description: Menunjukkan bagaimana odometer menerima/mendapatkan informasi jarak
        atau waktu.
    silk_fiber_type:
      name: Jenis serat sutra
      description: Jenis/sumber serat sutra yang digunakan untuk membuat kain (misalnya,
        murbei atau tussah), yang memengaruhi tekstur, keseragaman, dan harga.
    simulated_game_species:
      name: Spesies game simulasi
      description: Menunjukkan jenis burung atau hewan buruan spesifik yang ditiru
        oleh boneka tersebut untuk pelatihan yang realistis.
    singlet_cut_style:
      name: Model potongan singlet
      description: Menentukan potongan/gaya singlet gulat, termasuk tinggi tali bahu,
        gaya punggung, dan variasi untuk pria/wanita dan anak-anak.
    sink_material:
      name: Bahan bak
      description: Menentukan bahan wastafel terintegrasi yang termasuk dalam meja
        rias.
    sinker_attachment_style:
      name: Gaya pemasangan pemberat
      description: Menjelaskan mekanisme yang terdapat pada pemberat pancing untuk
        memasangkannya ke tali pancing atau rangkaian pancing.
    sinker_finish:
      name: Finishing pemberat
      description: Menentukan lapisan luar atau perlakuan permukaan pada pemberat.
    sinker_shape:
      name: Bentuk pemberat
      description: Menentukan bentuk geometris pemberat (misalnya, Peluru, Silinder,
        Tetesan air mata) sehingga pemancing dapat memilih presentasi dan ketahanan
        terhadap snag yang optimal.
    siren_system_included:
      name: Sistem sirene disertakan
      description: Menunjukkan apakah sistem sirene/PA terpasang dan jenisnya.
    siren_system_type:
      name: Jenis sistem sirene
      description: Menentukan konfigurasi sirene/PA yang terpasang pada truk polisi.
    size_designation:
      name: Penentuan ukuran
      description: Label ukuran standar untuk instrumen segitiga.
    size_system:
      name: Sistem ukuran
      description: Menentukan sistem ukuran atau standar regional yang sesuai dengan
        label ukuran (misalnya, AS, Inggris, Uni Eropa, huruf internasional).
    sizzle_mechanism:
      name: Mekanisme mendesis
      description: Menentukan cara simbal menghasilkan efek desis (misalnya, paku
        keling yang dipasang di simbal, rantai/peredam suara yang dapat dipasang,
        atau tanpa perangkat keras).
    skate_blade_discipline:
      name: Disiplin bilah seluncur
      description: Mengidentifikasi disiplin atau aplikasi seluncur yang dirancang
        untuk mata pisau tersebut, seperti hoki atau seluncur indah, sehingga pembeli
        dapat memfilter mata pisau yang relevan.
    skate_brake_type:
      name: Jenis rem sepatu roda
      description: Mengidentifikasi gaya mekanisme pengereman yang disertakan pada
        sepatu roda.
    skateboard_nut_thread_size:
      name: Ukuran ulir mur skateboard
      description: Menentukan ukuran ulir (diameter dan jarak ulir) mur untuk memastikan
        kompatibilitas dengan poros, kingpin, atau perangkat keras pemasangan skateboard.
    skein_winder_bearing_bushing_type:
      name: Jenis bantalan/bushing penggulung skein
      description: Menentukan jenis bantalan atau bushing yang digunakan pada rakitan
        putar penggulung skein.
    skein_winder_drive_type:
      name: Jenis penggerak penggulung skein
      description: Cara penggulung skein digerakkan/diputar saat digunakan.
    ski_binding_mechanism:
      name: Mekanisme pengikat ski
      description: Menentukan desain mekanis dasar atau disiplin pengikat (misalnya,
        alpine, tech/pin, telemark).
    ski_binding_part_type:
      name: Jenis komponen pengikat ski
      description: Mengidentifikasi komponen atau aksesori spesifik untuk pengikat
