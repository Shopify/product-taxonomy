      name: Subtipe spinner
      description: Mengklasifikasikan desain atau keluarga spinner secara keseluruhan
        (misalnya, inline spinner, spinnerbait).
    spinning_oil_application_area:
      name: Area aplikasi minyak pemintal
      description: Menentukan titik aplikasi yang dimaksud pada roda pemintal untuk
        minyak.
    spinning_oil_application_tool:
      name: Alat aplikasi minyak pemintal
      description: Menunjukkan jenis ujung aplikator/kemasan yang digunakan untuk
        mengoleskan minyak ke bagian roda pemintal dengan dosis terkendali.
    spinning_oil_features:
      name: Fitur minyak pemintal
      description: Menyoroti sifat fungsional yang relevan dengan minyak roda pemintal
        (residu, noda, oksidasi, dan kemampuan pencucian).
    spinning_top_features:
      name: Fitur mainan pemintal
      description: Fitur permainan khusus yang disertakan dalam gasing ini melampaui
        putaran dasar.
    spinning_top_launch_mechanism:
      name: Mekanisme peluncuran gasing
      description: Cara gasing dijalankan/digerakkan agar dapat berputar.
    spinning_wheel_brake_tension_system_type:
      name: Jenis sistem rem/tegangan roda pemintal
      description: Menentukan sistem tegangan pengereman/pengambilan yang digunakan
        untuk mengontrol pengambilan benang.
    spinning_wheel_drive_system:
      name: Sistem penggerak roda pemintal
      description: Menunjukkan sistem penggerak yang ditujukan untuk kumparan tersebut.
    spinning_wheel_hook_system:
      name: Sistem kait roda pemintal
      description: Menentukan bagaimana benang diarahkan sepanjang lengan penggulung.
    spinning_wheel_part_application:
      name: Aplikasi bagian roda pemintal
      description: Menentukan komponen roda pemintal mana yang ditujukan untuk penggunaan
        oli tersebut.
    spinning_wheel_portability_foldability:
      name: Kemudahan dibawa/dilipatnya roda pemintal
      description: Menunjukkan apakah roda tersebut dirancang untuk dilipat/dikempiskan
        untuk keperluan transportasi.
    spinning_wheel_tension_adjustment_type:
      name: Jenis penyesuaian tegangan roda pemintal
      description: Cara tegangan disesuaikan pada roda untuk kontrol pengambilan benang.
    splice_termination_type:
      name: Jenis sambungan/terminasi
      description: Menentukan jenis penghentian ujung yang disediakan pada tali jangkar
        (misalnya, mata yang disambung, bidal, kait rantai).
    split_shot_cut_type:
      name: Jenis potongan split shot
      description: Menentukan jenis alur atau bukaan yang memungkinkan pemasangan
        ke saluran.
    split_shot_shape:
      name: Bentuk split shot
      description: Menjelaskan bentuk fisik split shot, yang memengaruhi hidrodinamika
        dan ketahanan snag.
    split_shot_size:
      name: Ukuran split shot
      description: Kode ukuran alfanumerik standar (misalnya SSG, AAA, BB, 1) yang
        digunakan oleh produsen dan pemancing untuk mengklasifikasikan sinker split
        shot. Melengkapi pengukuran berat yang tepat.
    spoiler_adjustability:
      name: Kemampuan penyesuaian spoiler
      description: Menunjukkan apakah sudut/tinggi spoiler dapat disesuaikan.
    spoke_accessory_function:
      name: Fungsi aksesori jari-jari
      description: Mengklasifikasikan fungsi utama aksesori pada roda, seperti dekoratif,
        reflektif, atau bercahaya.
    spoke_butting_profile:
      name: Profil butting jari-jari
      description: Menjelaskan bagaimana diameter jari-jari berubah sepanjang panjangnya
        (polos, satu lapis, dua lapis, tiga lapis, atau empat lapis), yang memengaruhi
        berat dan kekuatan.
    spoke_gauge:
      name: Pengukur jari-jari
      description: Menentukan pengukur (ketebalan kawat) jari-jari yang kompatibel
        dengan nipple tersebut.
    spoke_interface_type:
      name: Jenis antarmuka jari-jari
      description: Menunjukkan gaya kepala jari-jari yang dirancang untuk hub tersebut
        (J-bend, straight-pull, T-head).
    spoke_shape:
      name: Bentuk jari-jari
      description: Menentukan penampang luar kawat jari-jari, yang memengaruhi aerodinamika
        dan estetika.
    spool_form_factor:
      name: Faktor bentuk spool
      description: Bentuk fisik badan kumparan dan cara benang/serat ditahan (misalnya,
        berflensa vs. kerucut).
    spoon_style:
      name: Gaya sendok
      description: Menunjukkan subtipe fungsional atau gaya sendok pancing, seperti
        casting, flutter, atau trolling.
    sports_bra_padding_type:
      name: Jenis bantalan bra olahraga
      description: Menentukan jenis bantalan yang terdapat pada bra olahraga.
    sports_cap_style:
      name: Gaya topi olahraga
      description: Mengidentifikasi konstruksi/gaya topi secara keseluruhan (misalnya,
        topi baseball, snapback), terlepas dari merek tim.
    sports_governing_body_certification:
      name: Sertifikasi badan olahraga
      description: Menunjukkan sertifikasi atau persetujuan resmi dari badan olahraga
        yang diakui, yang mengonfirmasi bahwa produk tersebut memenuhi standar kompetisi.
    sports_surface_compatibility:
      name: Kompatibilitas permukaan olahraga
      description: Mencantumkan jenis area bermain atau permukaan yang dapat dicat
        dengan aman menggunakan produk ini.
    sports_toy_set_contents:
      name: Isi set mainan olahraga
      description: Mengidentifikasi komponen apa saja yang termasuk dalam set mainan
        olahraga (misalnya, bola, pemukul, jaring, sasaran).
    spray_string_cleanup_method:
      name: Metode pembersihan tali semprot
      description: Cara yang direkomendasikan untuk menghilangkan/membersihkan residu
        tali semprot.
    spray_string_finish_effect:
      name: Semprotan benang finishing/efek
      description: Efek visual dari benang yang disemprot setelah diaplikasikan (kilau/reflektivitas
        dan efek khusus).
    spray_string_formulation_type:
      name: Jenis formulasi tali semprot
      description: Bagaimana perilaku produk selama dan setelah disemprot (misalnya,
        dapat dicuci vs gaya permanen).
    spray_string_recommended_surface:
      name: Permukaan yang direkomendasikan untuk tali semprot
      description: Jenis permukaan yang dimaksud untuk penggunaan tali semprot (dan
        mudah dibersihkan).
    spray_string_scent:
      name: Semprotkan aroma tali
      description: Profil aroma atau bau, jika ada, dari tali semprot.
    spray_string_suitable_age_group:
      name: Tali semprot yang sesuai untuk kelompok usia tertentu
      description: Usia/kelompok usia minimum pengguna yang direkomendasikan untuk
        penggunaan yang aman.
    spread_consistency:
      name: Konsistensi olesan
      description: Menjelaskan tekstur/konsistensi saus atau olesan untuk memberikan
        gambaran sensasi di mulut dan cara penggunaannya (misalnya, halus, kasar,
        lembut).
    spread_variety:
      name: Variasi olesan
      description: Mengklasifikasikan jenis selai buah tertentu (misalnya, selai,
        jeli, marmalade, curd) sehingga pembeli dapat membedakan berbagai gaya penyajian
        dan teksturnya.
    spreader_bar_type:
      name: Jenis batang penyebar
      description: Menunjukkan jenis palang penyebar atau sistem pengait yang disertakan
        atau kompatibel dengan sabuk pengaman.
    sprint_canoe_class:
      name: Kelas kano sprint
      description: Menentukan penunjukan kelas resmi balap kano sprint.
    sprout_presentation:
      name: Tampilan kecambah
      description: Mengidentifikasi tampilan fisik produk (misalnya, kecambah segar,
        sayuran mikro, pot tanam hidup, bubuk).
    squash_and_gourd_variety:
      name: Varietas labu dan waluh
      description: Mengidentifikasi kultivar atau varietas pasar tertentu dari labu
        atau waluh, membantu pembeli cepat menemukan jenis yang mereka inginkan.
    stability_class:
      name: Kelas stabilitas
      description: Kategorisasi stabilitas umum yang diperoleh dari peringkat penerbangan
        atau klaim pemasaran.
    stabilizer_thread_size:
      name: Ukuran ulir stabilisator
      description: Spesifikasi ulir yang digunakan untuk memasang penstabil atau aksesori
        pada busur atau panah.
    stabilizer_type:
      name: Jenis stabilisator
      description: Mengidentifikasi gaya atau klasifikasi posisi stabilisator busur
        atau panah.
    stages_supported:
      name: Tahapan yang didukung
      description: Menunjukkan jumlah tahap yang dirancang untuk diterbangkan oleh
        roket atau kit.
    stain_remover_format:
      name: Format penghilang noda
      description: Menentukan bentuk/format produk yang digunakan untuk membersihkan
        noda pada kendaraan (botol semprot, aerosol, busa, gel, bubuk, tisu basah,
        pena/spidol).
    stake_shape:
      name: Bentuk pasak
      description: Menentukan penampang atau gaya desain pasak tenda, yang memengaruhi
        kekuatan penahan di berbagai jenis tanah.
    stamp_block_features:
      name: Fitur blok perangko
      description: Menyoroti fitur fungsional pada blok stempel seperti kisi pengukuran,
        pegangan, atau permukaan antiselip.
    stamp_block_type:
      name: Jenis blok stempel
      description: Menentukan konstruksi/gaya blok stempel yang digunakan untuk memasang
        stempel untuk pencetakan (misalnya, blok akrilik bening, blok yang dipasang
        pada kayu, atau blok penempatan).
    stamp_set_pieces_included:
      name: Termasuk potongan set stempel
      description: Menunjukkan komponen apa saja yang termasuk dalam set stempel &
        bantalan tinta (misalnya, stempel, bantalan tinta, spidol).
    stand_padding_material:
      name: Bahan bantalan dudukan
      description: Bahan yang digunakan pada titik kontak untuk melindungi permukaan
        instrumen (misalnya, busa, karet, silikon).
    staple_fiber_animal_fiber_type:
      name: Serat pokok jenis serat hewani
      description: Jenis serat asal hewan tertentu jika jenis sumber serat stapel
        adalah Hewan.
    staple_fiber_crimp_level:
      name: Tingkat crimp serat stapel
      description: Tingkat kekerutan/gelombang alami pada serat.
    staple_fiber_preparation_type:
      name: Jenis persiapan serat stapel
      description: Kondisi persiapan/pemrosesan serat saat dijual (bagaimana penataan/penanganannya),
        yang sangat memengaruhi metode pemintalan, kemudahan penarikan, dan hasil
        akhir.
    staple_fiber_source_type:
      name: Jenis sumber serat stapel
      description: Kategori asal yang luas untuk kandungan serat.
    starch_processing_type:
      name: Jenis pemrosesan pati
      description: Menunjukkan apakah pati tersebut alami atau telah dimodifikasi
        secara fisik atau kimia (misalnya, instan, pragelatinisasi) untuk memberikan
        sifat fungsional tertentu seperti kecepatan pengentalan atau ketahanan suhu.
    starch_source:
      name: Sumber pati
      description: Menentukan sumber botani asal pati atau pengental masakan (misalnya,
        jagung, kentang, tapioka). Sumber menjadi pembeda utama untuk pati dalam masakan
        dan secara langsung memengaruhi kesesuaian resep, pertimbangan alergen, serta
        perilaku pencarian konsumen.
    starfruit_variety:
      name: Varietas belimbing
      description: Mengidentifikasi kultivar atau varietas khusus dari belimbing (misalnya,
        Arkin, Fwang Tung).
    starter_drive_type:
      name: Jenis penggerak starter
      description: Jenis mekanisme penggerak/pengait starter yang digunakan untuk
        mengaitkan pinion dengan roda gigi cincin.
    starter_pistol_action_type:
      name: Jenis aksi pistol starter
      description: Mengidentifikasi mekanisme penembakan/aksi pistol starter (misalnya,
        aksi tunggal, aksi ganda, semi-otomatis).
    starter_pistol_caliber:
      name: Kaliber pistol starter
      description: Menentukan kaliber amunisi kosong atau peluru yang digunakan pada
        pistol starter.
    starter_terminal_type:
      name: Jenis terminal starter
      description: Menentukan jenis terminal/konektor yang digunakan untuk sambungan
        listrik pada starter atau solenoid starter (misalnya, stud, spade, konektor
        steker).
    starting_block_anchoring_method:
      name: Metode penjangkaran blok start
      description: Menjelaskan bagaimana balok-balok tersebut terpasang pada permukaan
        lintasan (misalnya, paku, pengisap, bantalan karet).
    steerer_tube_design:
      name: Desain tabung kemudi
      description: Menjelaskan desain struktural tabung kemudi—lurus, meruncing, berulir,
        dll.—yang menentukan kompatibilitas headset dan rangka.
    steering_cable_end_fitting_type:
      name: Jenis fitting ujung kabel kemudi
      description: Mengidentifikasi gaya terminasi/sambungan pada ujung kabel kemudi
        perahu (ujung helm dan ujung mesin/tiller) untuk memastikan kompatibilitas
        dengan helm kemudi dan titik sambungan mesin. Gunakan penyebutan standar atau
        pabrikan jika berlaku.
    steering_column_adjustability_features:
      name: Fitur penyesuaian tiang kemudi
      description: Menunjukkan fungsi pengaturan apa saja yang terintegrasi ke dalam
        tiang kemudi.
    steering_column_ignition_provision:
      name: Penyediaan pengapian tiang kemudi
      description: Menunjukkan apakah tiang kemudi dirancang untuk menerima silinder/sakelar
        kunci pengapian dan/atau kunci kemudi.
    steering_column_shaft_end_interface_type:
      name: Tipe antarmuka ujung poros kolom kemudi
      description: Mengidentifikasi gaya antarmuka ujung poros kolom kemudi (misalnya,
        beralur, D ganda, berpasak).
    steering_column_shift_type:
      name: Jenis perpindahan kolom kemudi
      description: Menentukan apakah kolom kemudi mencakup mekanisme perpindahan gigi
        yang terpasang pada kolom dan jenis transmisinya.
    steering_component_drive_type:
      name: Jenis penggerak komponen kemudi
      description: Menentukan mekanisme penggerak/bantuan yang relevan dengan komponen
        kemudi (khususnya pompa dan sistem EPS).
    steering_position:
      name: Posisi kemudi
      description: Menentukan apakah van tersebut menggunakan kemudi kiri atau kemudi
        kanan.
    steering_pump_pulley_type:
      name: Jenis katrol pompa kemudi
      description: Menentukan jenis/antarmuka penggerak puli yang digunakan dengan
        pompa kemudi.
    steering_rack_finish_coating:
      name: Lapisan/pelapis rak kemudi
      description: Menentukan lapisan/pelapis eksterior untuk perlindungan terhadap
        korosi.
    steering_rack_position:
      name: Posisi rack steering
      description: Menentukan di mana rak dipasang/digunakan dalam sistem kemudi kendaraan.
    steering_wheel_cover_installation_type:
      name: Jenis pemasangan sarung roda kemudi
      description: Cara sarung roda kemudi dipasang/dikencangkan pada roda.
    steering_wheel_grip_material:
      name: Bahan pegangan roda kemudi
      description: Menentukan bahan pada pelek/pegangan roda (bagian yang disentuh
        tangan), yang dapat berbeda dari inti/jari-jari roda.
    steering_wheel_mounting_pattern:
      name: Pola pemasangan roda kemudi
      description: Menentukan pola pemasangan baut/lubang yang digunakan untuk memasang
        roda kemudi ke hub atau adaptor (misalnya, 3 baut, 5 baut).
    steering_wheel_rim_material_grip_surface:
      name: Bahan pelek roda kemudi (permukaan pegangan)
      description: Menentukan bahan utama dari sarung pegangan/pelek (berbeda dari
        bahan konstruksi secara keseluruhan).
    stem_material:
      name: Bahan batang
      description: Menentukan bahan yang digunakan secara spesifik untuk batang pipa
        atau mouthpiece (misalnya, akrilik, ebonit, lucite).
    stencil_machine_consumable_type:
      name: Jenis bahan habis pakai mesin stensil
      description: Menentukan bahan habis pakai yang dibutuhkan untuk pengoperasian
        (jika ada).
    step_surface_texture:
      name: Tekstur permukaan pijakan
      description: Menentukan pola tapak atau desain/bahan permukaan anak tangga yang
        dimaksudkan untuk meningkatkan daya cengkeram dan kenyamanan saat basah.
    stepper_motion_type:
      name: Jenis gerakan pemanjat tangga
      description: Menentukan gerakan langkah utama yang ditawarkan oleh mesin.
    stick_bow_profile:
      name: Profil busur stik
      description: Menentukan profil kelengkungan (atau "tipe busur") dari poros tongkat
        hoki lapangan, faktor penting yang memengaruhi kontrol bola, performa drag-flick,
        dan gaya bermain.
    stick_construction:
      name: Konstruksi batang
      description: Menentukan gaya konstruksi stik hoki, seperti komposit satu bagian,
        komposit dua bagian, atau kayu.
    stick_curvature_type:
      name: Jenis kelengkungan batang
      description: Menjelaskan profil kelengkungan stik lempar, yang memengaruhi jarak
        dan akurasi lemparan.
    stick_head_shape:
      name: Bentuk kepala tongkat
      description: Menentukan bentuk kepala tongkat, memengaruhi kemampuan mengontrol
        bola, gaya memukul, dan kontrol bola jarak dekat.
    stick_size_compatibility:
      name: Kompatibilitas ukuran batang
      description: Mengidentifikasi kelompok ukuran stik hoki yang kompatibel dengan
        produk tersebut (misalnya, Anak, Junior, Menengah, Senior, Kiper, Universal).
    sticker_decal_features:
      name: Fitur stiker/decal
      description: Menangkap karakteristik aplikasi dan kinerja khusus untuk stiker/decal
        (misalnya, bebas gelembung, dapat diposisikan ulang).
    sticker_finish:
      name: Finishing stiker
      description: Menjelaskan finishing permukaan/efek visual pada stiker.
    sticker_format:
      name: Format stiker
      description: Menentukan format kemasan ritel stiker dekoratif (misalnya, lembaran,
        gulungan, satuan, buku).
    sticker_material_type:
      name: Jenis bahan stiker
      description: Menentukan substrat/bahan utama stiker dekoratif (bukan hiasannya).
    stilt_foot_attachment_type:
      name: Jenis alat bantu kaki penyangga
      description: Menentukan bagaimana kaki pengguna terhubung ke tongkat penyangga
        (misalnya, tali gesper, pengait & perekat, tali pengikat).
    stirrup_style:
      name: Gaya sanggurdi
      description: Mengklasifikasikan gaya sanggurdi yang spesifik untuk desain atau
        disiplin, meliputi variasi keselamatan, disiplin, dan konstruksi.
    stirrup_tread_material:
      name: Bahan pijakan sanggurdi
      description: Menentukan bahan yang digunakan untuk bantalan kaki atau pijakan
        sanggurdi, yang memengaruhi daya cengkeram, kenyamanan, dan keausan.
    stitch_marker_and_counter_style:
      name: Gaya penanda dan penghitung jahitan
      description: Menentukan gaya atau faktor bentuk penanda jahitan atau penghitung
        jahitan/baris (misalnya, penanda pengunci, penanda cincin terpisah, penghitung
        cincin, penghitung digital).
    stitch_types:
      name: Jenis jahitan
      description: Jenis-jenis jahitan (fungsional dan dekoratif) yang dapat dihasilkan
        mesin.
    stitching_method:
      name: Metode menjahit
      description: Menunjukkan bagaimana panel-panel bola tersebut disambungkan.
    stitching_state:
      name: Keadaan jahitan
      description: Menunjukkan apakah potongan pakaian tersebut disediakan dalam keadaan
        belum dijahit, setengah dijahit, sudah dijahit, atau siap pakai.
    stock_car_race_series:
      name: Seri balap mobil stok
      description: Menentukan badan penyelenggara atau seri/kelas balap tempat mobil
        stok tersebut dirancang untuk berkompetisi.
    stone_adhesion:
      name: Pelekatan batu
      description: Menunjukkan apakah biji buah persik atau nektarin termasuk jenis
        freestone, clingstone, atau semi-freestone.
    stone_creation_method:
      name: Metode pembuatan batu
      description: Menentukan apakah batu tersebut alami, buatan laboratorium, simulasi,
        atau daur ulang.
    stone_cut_grade:
      name: Batu potong berkualitas tinggi
      description: Menunjukkan penilaian kualitas pemotongan batu secara keseluruhan.
    stone_cut_style:
      name: Gaya potongan batu
      description: Gaya potongan/faset batu kaca (misalnya, berfaset vs cabochon).
    stone_fruit_cultivar:
      name: Kultivar stone fruit
      description: Mengidentifikasi kultivar/varietas spesifik dari buah persik atau
        nektarin.
    stone_fruit_variety:
      name: Varietas stone fruit
      description: Membedakan subtipe dalam kategori tersebut (misalnya, persik, nektarin,
        persik bulat/pipih).
    stone_setting_type:
      name: Jenis pengaturan batu
      description: Menentukan bagaimana batu permata dipasang pada perhiasan (bezel,
        prong, pavé, dll.).
    stone_transparency:
      name: Transparansi batu
      description: Transparansi/opasitas optik dari batu kaca tersebut.
    storage_case_type:
      name: Jenis kotak penyimpanan
      description: Menunjukkan jenis wadah tempat set tersebut dikemas untuk penyimpanan
        dan pengiriman (misalnya, kotak, peti, tas).
    storage_compartment_type:
      name: Jenis kompartemen penyimpanan
      description: Menentukan jenis kompartemen penyimpanan yang disediakan oleh pelampung
        renang untuk barang-barang pribadi.
    storage_media_and_transfer_methods_supported:
      name: Media penyimpanan dan metode transfer yang didukung
      description: Metode media atau koneksi yang didukung untuk mengimpor/mengekspor
        sampel dan menyimpan/memuat proyek.
    storage_requirements:
      name: Persyaratan penyimpanan
      description: Menentukan cara penyimpanan produk sebelum dan/atau setelah dibuka
        untuk menjaga kualitas dan keamanannya.
    stove_jack_compatibility:
      name: Kompatibilitas lubang cerobong asap
      description: Menunjukkan apakah tenda tersebut memiliki lubang tahan api untuk
        cerobong kompor.
    straight_pin_application:
      name: Penggunaan pin lurus
      description: Menentukan tujuan penggunaan pin lurus.
    straight_pin_finish:
      name: Finishing pin lurus
      description: Menjelaskan lapisan permukaan atau pelapis pin (misalnya, berlapis
        nikel) yang memengaruhi ketahanan korosi dan kelancaran pergerakan.
    straight_pin_head_material:
      name: Bahan kepala peniti lurus
      description: Menentukan bahan kepala pin (jika ada), seperti plastik atau kaca.
    straight_pin_head_shape:
      name: Bentuk kepala peniti lurus
      description: Menjelaskan bentuk/gaya kepala pin untuk kemudahan penggunaan dan
        visibilitas.
    strand_configuration:
      name: Konfigurasi untaian
      description: Menunjukkan berapa banyak baris atau untaian terpisah yang membentuk
        rantai dompet (tunggal, ganda, rangkap tiga).
    strand_material:
      name: Bahan untaian
      description: Menentukan bahan yang digunakan untuk masing-masing untaian/pita.
    strap_attachment_hardware:
      name: Perangkat pengikat tali
      description: Menentukan jenis/desain perangkat keras yang digunakan untuk memasang
        tali pengikat ke instrumen/titik penopang.
    strap_configuration:
      name: Konfigurasi tali
      description: Menunjukkan jumlah titik pengait helm pada tali pengikat (misalnya,
        2 titik, 4 titik), yang sangat penting untuk kesesuaian, keamanan, dan persyaratan
        liga.
    strap_functionality:
      name: Fungsi tali
      description: Menentukan tujuan utama penggunaan atau desain tali matras yoga.
    strap_padding:
      name: Bantalan tali
      description: Menunjukkan tingkat konstruksi bantalan pada tali yang dirancang
        untuk meningkatkan kenyamanan dan mendistribusikan berat.
    strap_side:
      name: Sisi tali
      description: Menunjukkan apakah tali pengikat dirancang untuk pengikat kiri,
        pengikat kanan, atau dijual berpasangan.
    strap_width:
      name: Lebar tali
      description: Menunjukkan lebar relatif tali bahu (tipis, sedang, lebar) untuk
        memandu pembeli yang mencari cakupan atau dukungan tertentu.
    strength_classification:
      name: Klasifikasi kekuatan
      description: Label kekuatan pemasaran yang umum digunakan oleh merek (misalnya,
        Ringan, Kuat, Ekstra Kuat).
    strength_grade:
      name: Tingkat kekuatan
      description: Menjelaskan tingkat kekuatan/daya cengkeram yang dimaksudkan dari
        pengencang kait dan loop.
    stretch_level:
      name: Tingkat peregangan
      description: Menunjukkan seberapa banyak tekstil tersebut meregang saat digunakan.
    stretch_type:
      name: Jenis peregangan
      description: Menunjukkan apakah kain tersebut memiliki peregangan mekanis atau
        elastis dan ke arah mana.
    stretcher_bar_material:
      name: Bahan palang penyangga
      description: Bahan yang digunakan untuk palang/rangka penyangga (misalnya, pinus,
        cemara, poplar, birch, MDF/kayu olahan).
    strike_shield_shape:
      name: Bentuk perisai serang
      description: Menentukan faktor bentuk keseluruhan permukaan benturan perisai
        pelindung.
    string_core_shape:
      name: Bentuk inti tali
      description: Menentukan bentuk kawat inti yang digunakan pada senar lilitan,
        yang memengaruhi rasa dan stabilitas.
    string_coverage:
      name: Cakupan tali
      description: Menentukan senar mana yang dirancang untuk ditekan/ditutupi oleh
        capo parsial (berdasarkan hitungan atau set umum).
    string_end_type:
      name: Tipe ujung tali
      description: Menentukan bagaimana senar berakhir di bridge/tailpiece agar kompatibel
        (sangat penting untuk gitar akustik/listrik dan beberapa jenis bass).
    string_set_type:
      name: Jenis set tali
      description: Menentukan apakah produk tersebut berupa satu set lengkap atau
        senar pengganti satuan.
    strung_status:
      name: Status senar
      description: Menunjukkan apakah kepala lacrosse sudah dilengkapi dengan kantong
        atau dijual tanpa senar.
    strut_placement:
      name: Penempatan strut
      description: Menentukan posisi pemasangan yang dimaksudkan pada kendaraan (depan/belakang
        dan kiri/kanan) untuk strut.
    stud_attachment_type:
      name: Jenis pemasangan stud
      description: Menentukan bagaimana stud/cleat dipasang atau dikonfigurasi pada
        sol luar, yang memengaruhi traksi, perawatan, dan kepatuhan terhadap peraturan
        liga.
    stud_configuration:
      name: Konfigurasi stud
      description: Menentukan bentuk dan susunan stud/cleat pada sol luar, yang memengaruhi
        traksi dan performa pada berbagai permukaan.
    stud_material:
      name: Bahan stud
      description: Mengidentifikasi bahan utama dari paku/penjepit sepatu, memberikan
        informasi tentang daya tahan, berat, dan kepatuhan terhadap peraturan keselamatan.
    stuffed_animal_features:
      name: Fitur-fitur boneka binatang
      description: Menyoroti fitur bermain dan kenyamanan bawaan dari boneka hewan.
    stump_base_type:
      name: Jenis dasar tiang
      description: Menentukan gaya alas atau sistem pemasangan yang digunakan pada
        tiang gawang kriket (paku, pegas pengembalian, karet berbobot, dll.).
    stump_mechanism:
      name: Mekanisme tunggul
      description: Menentukan mekanisme pengembalian atau pemasangan tiang kriket
        (misalnya, pegas balik, tetap).
    stump_size:
      name: Ukuran tiang
      description: Label ukuran kategorikal yang digunakan untuk tiang kriket, menunjukkan
        tinggi tipikal dan kelompok usia pemain yang sesuai.
    subwoofer_installation_type:
      name: Jenis instalasi subwoofer
      description: Cara pemasangan subwoofer yang tepat pada sistem audio kendaraan.
    sugar_cane_variety:
      name: Varietas tebu
      description: Mengidentifikasi kultivar atau varietas tebu tertentu yang dipasarkan,
        yang dapat memengaruhi warna, rasa manis, dan kandungan serat.
    sugar_content_level:
      name: Tingkat kandungan gula
      description: Mengklasifikasikan kadar gula keseluruhan atau formulasi konsentrat
        minuman, memungkinkan pembeli untuk dengan cepat menemukan pilihan biasa,
        rendah gula, atau bebas gula.
    sugar_refinement_level:
      name: Tingkat pemurnian gula
      description: Menunjukkan tingkat atau gaya pemurnian (warna, kandungan molase,
        atau tingkat pemrosesan).
    sugar_source:
      name: Sumber gula
      description: Mengidentifikasi asal botani atau asal bahan gula tersebut.
    suit_fit:
      name: Cocok untuk setelan jas.
      description: Potongan keseluruhan setelan jas, menunjukkan seberapa pas setelan
        tersebut di tubuh.
    suit_pieces:
      name: Setelan jas
      description: Menentukan berapa banyak pakaian yang serasi yang termasuk dalam
        setelan jas (misalnya, 2 potong, 3 potong, 4 potong).
    suitable_for_anchoring_use:
      name: Cocok untuk penggunaan sebagai jangkar
      description: Menunjukkan kasus penggunaan yang dimaksudkan untuk tali/tali penahan.
    suitable_for_craft_type:
      name: Cocok untuk jenis kerajinan
      description: Kawat penahan (blocking wire) ditujukan untuk penggunaan utama
        dalam kerajinan menjahit.
    suitable_for_paint_type:
      name: Cocok untuk jenis cat
      description: Menunjukkan jenis cat apa yang aman/sesuai untuk digunakan pada
        kanvas tersebut.
    suitable_for_swim_stroke:
      name: Cocok untuk gaya renang
      description: Menunjukkan gaya renang mana yang dirancang atau dioptimalkan untuk
        dayung tangan tersebut.
    suitable_mounting_surface_material:
      name: Bahan permukaan pemasangan yang sesuai
      description: Menentukan permukaan/bahan pemasangan yang dimaksudkan agar perekat
        dapat menempel.
    suitable_play_location:
      name: Lokasi bermain yang sesuai
      description: Lingkungan bermain utama yang dituju untuk mainan kincir pasir
        dan air.
    suitable_riding_conditions:
      name: Kondisi berkendara yang sesuai
      description: Menunjukkan kondisi berkendara (misalnya, kering, basah, musim
        dingin) yang diformulasikan untuk pelumas atau pembersih sepeda.
    suitable_snow_conditions:
      name: Kondisi salju yang sesuai
      description: Menunjukkan kondisi salju utama yang diformulasikan untuk lilin
        grip.
    suitable_surface_type:
      name: Jenis permukaan yang sesuai
      description: Menentukan permukaan pijakan yang sesuai untuk pegangan tersebut.
    suitable_table_size:
      name: Ukuran meja yang sesuai
      description: Menunjukkan panjang meja biliar/snooker yang dirancang untuk diterangi
        oleh lampu tersebut.
    sun_protection_rating_upf:
      name: Peringkat perlindungan matahari (UPF)
      description: Menunjukkan tingkat perlindungan matahari UPF bersertifikat pada
        pakaian tersebut.
    sun_shade_attachment_method:
      name: Metode pemasangan peneduh matahari
      description: Cara memasang pelindung matahari ke jendela/kaca depan.
    sun_shade_style:
      name: Gaya sun shade
      description: Konstruksi/format produk untuk memasang dan menyimpan kerai matahari.
    sunchoke_variety:
      name: Varietas sunchoke
      description: Menunjukkan kultivar atau varietas spesifik dari sunchoke (artichoke
        Yerusalem), memberikan informasi terperinci untuk tukang kebun, koki, dan
        pembeli yang cerdas.
    sunflower_oil_variety:
      name: Varietas minyak bunga matahari
      description: Mengklasifikasikan profil asam lemak atau kultivar minyak bunga
        matahari (misalnya, Asam Oleat Tinggi, Asam Oleat Sedang, Linoleat).
    sunflower_variety:
      name: Varietas bunga matahari
      description: Kultivar/varietas bunga matahari (varietas umum di pasaran untuk
        penggunaan bunga potong).
    support_brace_features:
      name: Fitur penyangga
      description: Mencantumkan fitur fungsional penting dari penyangga pergelangan
        tangan seperti kain yang dapat bernapas, bidai yang dapat dilepas, atau pelat
        logam yang dapat disesuaikan.
    support_leg_count:
      name: Hitungan kaki pendukung
      description: Jumlah kaki yang menyentuh tanah saat stik menembak digunakan (misalnya,
        monopod, bipod, tripod).
    support_padding:
      name: Bantalan penyangga
      description: Menunjukkan apakah tali/penyangga tersebut memiliki bantalan terintegrasi
        pada titik kontak (leher/bahu/jempol).
    support_structure_type:
      name: Jenis struktur pendukung
      description: Menunjukkan metode konstruksi yang digunakan untuk menjaga agar
        penahan angin tetap tegak.
    supported_bowling_delivery_types:
      name: Jenis lemparan bowling yang didukung
      description: Menentukan variasi bowling kriket yang dapat disimulasikan oleh
        mesin, seperti jenis inswing, outswing, dan spin.
    supported_dive_modes:
      name: Mode menyelam yang didukung
      description: Menentukan mode penyelaman operasional yang didukung oleh komputer
        selam, seperti Udara, Nitrox, atau Pengukur.
    supported_equipment_type:
      name: Jenis peralatan yang didukung
      description: Menunjukkan jenis peralatan olahraga musim dingin yang dirancang
        untuk ditampung oleh rak tersebut (misalnya, ski, papan seluncur salju, tongkat
        ski).
    supported_spin_types:
      name: Jenis spin yang didukung
      description: Menentukan variasi putaran bola yang dapat diterapkan oleh peluncur.
    supported_spool_bobbin_types:
      name: Jenis gulungan/kumparan yang didukung
      description: Menentukan format gulungan/kumparan mana yang dirancang untuk diterima
        oleh mesin penggulung listrik.
    surf_wax_temperature_rating:
      name: Peringkat suhu lilin papan selancar
      description: Menentukan kisaran suhu air yang sesuai dengan formulasi lilin,
        guna memastikan daya cengkeram optimal di berbagai iklim.
    surface_coating_or_finish:
      name: Lapisan atau finishing permukaan
      description: Menentukan perlakuan permukaan pelindung atau peningkat kinerja
        apa pun yang diterapkan pada tang.
    surface_coating_or_wrap:
      name: Lapisan atau bungkus permukaan
      description: Perawatan permukaan luar yang digunakan untuk daya cengkeram/kontrol
        pada stik utama (dan terkadang stik tangan).
    surface_finish:
      name: Finishing permukaan
      description: Menggambarkan rasa/tekstur permukaan bola yang memengaruhi cengkeraman
        dan gerakan selama juggling kontak.
    surface_finish_prep:
      name: Finishing/penyiapan permukaan
      description: Menunjukkan kondisi permukaan gesekan (misalnya, dilapisi ulang,
        dikerjakan dengan mesin, hasil pengecoran) saat penjualan.
    surface_types_included:
      name: Jenis permukaan yang disertakan
      description: Menentukan permukaan apa yang disertakan dalam kit untuk menggambar/melukis
        (jika ada), seperti kanvas, kertas pembersih, panel kayu, atau tidak ada.
    surfboard_construction:
      name: Konstruksi papan selancar
      description: Menentukan teknologi konstruksi utama atau susunan lapisan papan
        selancar.
    surfboard_tail_shape:
      name: Bentuk ekor papan selancar
      description: Menentukan garis luar bagian ekor papan, yang memengaruhi kemampuan
        manuver dan daya cengkeram.
    suspension_bushing_type:
      name: Jenis bushing suspensi
      description: Menentukan gaya fungsional/pemasangan bushing suspensi.
    suspension_configuration:
      name: Konfigurasi suspensi
      description: Jelaskan apakah becak tersebut memiliki suspensi dan di mana letaknya.
    suspension_material:
      name: Bahan suspensi
      description: Menentukan bahan rantai, tali, atau kabel yang digunakan untuk
        menggantung ayunan.
    suspension_trainer_accessories_included:
      name: Aksesoris alat latihan suspensi disertakan
      description: Mencantumkan item tambahan yang disertakan dalam paket pelatihan
        (misalnya, jangkar pintu, tali ekstensi, tas penyimpanan), membantu pembeli
        memahami isi kotak dan membandingkan nilai paket.
    suspension_trainer_anchor_type:
      name: Jenis jangkar alat latihan suspensi
      description: Menentukan gaya pemasangan atau titik jangkar yang dirancang untuk
        tali pengikat (misalnya, pintu, langit-langit, pohon), yang menunjukkan kompatibilitas
        dengan lingkungan pengguna.
    suspension_type:
      name: Jenis suspensi
      description: Menentukan apakah garpu tersebut kaku atau menggunakan sistem suspensi
        tertentu (udara, pegas, hibrida, elastomer, dll.), membantu pengendara mencocokkan
        garpu dengan gaya berkendara mereka.
    sustain_pedal_form_factor:
      name: Faktor bentuk pedal sustain
      description: Menjelaskan gaya fisik pedal sustain (misalnya, pedal kaki bergaya
        piano vs sakelar kaki kompak), yang memengaruhi nuansa dan tujuan penggunaannya.
    sustain_pedal_switch_type:
      name: Jenis sakelar pedal sustain
      description: Menunjukkan apakah pedal mengirimkan sinyal sesaat (bertahan selama
        ditekan) atau sinyal pengunci (beralih).
    sustainability_certification:
      name: Sertifikasi keberlanjutan
      description: Sertifikasi lingkungan atau sumber pengadaan untuk bahan kayu tersebut.
    swab_intended_bassoon_section:
      name: Usap bagian fagot yang mau dibersihkan
      description: Menunjukkan bagian mana dari fagot yang dirancang untuk dibersihkan
        oleh kain (bagian/lubang yang berbeda perlu bentuk dan ukuran kain yang berbeda).
    swab_style:
      name: Gaya usap
      description: Menjelaskan desain/format fisik dari kain yang digunakan untuk
        melewati atau menjangkau area-area pada saksofon.
    swab_weight_material:
      name: Bahan pemberat kapas
      description: Bahan pemberat/tali penarik (jika ada), yang memengaruhi risiko
        goresan dan daya tahan.
    swab_weight_style:
      name: Gaya bobot swab
      description: Menentukan bagaimana kapas pembersih diberi pemberat agar dapat
        melewati lubang fagot.
    sway_bar_adjustability:
      name: Penyesuaian batang penyeimbang
      description: Apakah dan bagaimana kekakuan batang penyeimbang dapat disesuaikan
        (biasanya melalui beberapa lubang pemasangan ujung penghubung).
    sway_bar_coating:
      name: Lapisan batang penyeimbang
      description: Perawatan permukaan atau pelapisan pada batang penyeimbang untuk
        ketahanan terhadap korosi dan penampilan.
    sway_bar_fitment_front_rear_kit:
      name: Pemasangan penyeimbang (depan/belakang/kit)
      description: Menunjukkan apakah batang penyeimbang ditujukan untuk gandar depan,
        gandar belakang, atau dijual sebagai satu set lengkap untuk depan dan belakang.
    sweatshirt_pocket_type:
      name: Jenis kantong sweatshirt
      description: Menjelaskan gaya saku yang terdapat pada sweatshirt tersebut.
    sweet_potato_variety:
      name: Varietas ubi jalar
      description: Mengidentifikasi kultivar spesifik atau varietas pasar dari ubi
        jalar.
    sweet_spot_position:
      name: Posisi titik optimal
      description: Mengidentifikasi letak titik pukul optimal (sweet spot) pada pemukul,
        yang memengaruhi gaya bermain dan kondisi lapangan.
    sweetener_presence:
      name: Kehadiran pemanis
      description: Menentukan apakah selai kacang mengandung pemanis tambahan dan
        pada kadar berapa.
    sweetening_type:
      name: Jenis pemanis
      description: Menjelaskan bagaimana produk tersebut dimaniskan atau tingkat kemanisannya.
    swim_armband_construction_type:
      name: Jenis konstruksi ban lengan renang
      description: Menentukan model struktur atau mekanisme pengapungan pelampung
        lengan (tiup vs busa padat, hibrida, dll.).
    swim_belt_purpose:
      name: Tujuan sabuk renang
      description: Klasifikasi fungsional sabuk renang (misalnya, bantuan pelampung,
        aqua jogging, latihan resistensi, tali statis, pengait parasut penahan arus,
        pemberat, keselamatan saat mengarungi air).
    swim_board_features:
      name: Fitur papan renang
      description: Menyoroti karakteristik khusus atau peningkatan pada papan renang
        yang meningkatkan kegunaan atau keselamatan.
    swim_bottom_length:
      name: Panjang bagian bawah pakaian renang
      description: Mengklasifikasikan cakupan kaki secara keseluruhan pada celana
        renang boxer (misalnya, celana pendek vs celana selutut).
    swim_buoy_features:
      name: Fitur pelampung renang
      description: Mencakup karakteristik atau fitur tambahan penting yang meningkatkan
        visibilitas, keselamatan, atau kegunaan pelampung renang.
    swim_cap_style:
      name: Gaya topi renang
      description: Menentukan konstruksi atau gaya desain topi renang (misalnya, model
        rambut panjang, kubah/balap, gelembung/turban).
    swim_diaper_feature:
      name: Fitur popok renang
      description: Menunjukkan apakah celana renang tersebut memiliki fitur popok
        antibocor terintegrasi atau memerlukan/tidak memerlukan popok renang terpisah.
    swim_trainer_features:
      name: Fitur alat bantu latihan renang
      description: Menyoroti fitur fungsional atau kenyamanan tambahan dari alat bantu
        latihan renang.
    swim_trainer_type:
      name: Jenis pelatih renang
      description: Menentukan gaya struktural atau format alat bantu latihan renang
        untuk membantu penyaringan berdasarkan desain dan tujuan pelatihan.
    swim_training_focus:
      name: Fokus pelatihan renang
      description: Mengidentifikasi tujuan pelatihan utama yang ditargetkan oleh dayung
        (misalnya, teknik, kekuatan, isolasi otot).
    swim_weight_style:
      name: Gaya beban renang
      description: Mengklasifikasikan bentuk dan ukuran pemberat renang, membantu
        pembeli membedakan antara jenis produk yang pada dasarnya berbeda meskipun
        tetap berada dalam kategori yang sama.
    swimbait_buoyancy:
      name: Daya apung umpan renang
      description: Menunjukkan pergerakan umpan renang di dalam kolom air (terapung,
        melayang, tenggelam, dll.), sehingga pemancing dapat memilih umpan yang tepat
        sesuai target kedalaman dan gaya tarikan mereka.
    swimbait_style:
      name: Gaya umpan renang
      description: Mengklasifikasikan konstruksi atau desain aksi umpan renang, seperti
        paddle-tail atau glide bait.
    swimwear_pieces_included:
      name: Termasuk potongan pakaian renang
      description: Mencantumkan komponen pakaian satuan yang disertakan dalam set
        burkini sehingga pembeli tahu persis apa yang ada di dalam paket.
    swimwear_set_pieces_included:
      name: Termasuk potongan set pakaian renang
      description: Mencantumkan komponen pakaian yang disertakan dalam set burkini
        sehingga pembeli tahu persis apa yang akan mereka terima (misalnya, atasan,
        legging, hijab/penutup kepala).
    swing_attachment_connection_type:
      name: Jenis pengait/sambungan ayunan
      description: Jenis sambungan yang digunakan untuk menggantung ayunan dari penyangganya
        (misalnya, tali, rantai, sabuk).
    swing_trainer_type:
      name: Jenis pelatih ayunan
      description: Mengklasifikasi gaya atau mekanisme alat latihan ayunan sehingga
        pembeli dapat dengan cepat menemukan perangkat yang sesuai dengan tujuan latihan
        mereka.
    swing_training_objective:
      name: Tujuan pelatih ayunan
      description: Mengklasifikasikan fokus pelatihan utama, mekanisme, atau tujuan
        dari alat bantu latihan ayunan (misalnya, tempo, kecepatan, pegangan).
    switch_electrical_positions:
      name: Ganti posisi kelistrikan
      description: Menentukan jumlah dan perilaku posisi listrik pada sakelar (misalnya,
        3 posisi, menyala sesaat).
    swivel_type:
      name: Tipe putar
      description: Menentukan konfigurasi putar yang digunakan untuk mengurangi kekusutan
        tali pengikat.
    sword_scabbard_material:
      name: Bahan sarung pedang
      description: Menentukan bahan utama sarung/selubung yang disertakan (jika ada).
    synthesizer_form_factor:
      name: Faktor bentuk synthesizer
      description: Menjelaskan format antarmuka fisik/pemutaran dari synthesizer.
    synthetic_feather_style:
      name: Gaya bulu sintetis
      description: Gaya/potongan bulu sintetis yang digunakan untuk berbagai tampilan
        dan teknik kerajinan.
    synthetic_formulation_type:
      name: Jenis formulasi sintetis
      description: Menentukan jenis bahan dasar/formulasi sintetis (misalnya, PAO,
        ester, Grup III hasil hidrokraking).
    syrup_base_ingredient:
      name: Bahan dasar sirup
      description: Mengidentifikasi tanaman atau sumber gula utama dari mana sirup
        atau nektar tersebut berasal (misalnya, maple, agave, gula tebu).
    syrup_variety:
      name: Berbagai jenis sirup
      description: Menentukan gaya atau kategori umum sirup berdasarkan formulasinya
        atau penggunaan tradisionalnya (misalnya, sirup maple, perisa kopi, buah-buahan,
        obat-obatan).
    t_shirt_fit:
      name: Ukuran kaos
      description: Menjelaskan kesesuaian/potongan keseluruhan kaos yang diinginkan.
    tabla_included_components:
      name: Kelengkapan produk tabla
      description: Menunjukkan barang-barang utama apa saja yang termasuk dalam daftar
        produk tabla (drum tunggal vs satu set, penutup/wadah, palu penyetel, dll.).
