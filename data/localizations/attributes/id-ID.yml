      description: Gaya/konfigurasi fungsional dari multi-clamp (cara penjepitan dan
        apa yang dihubungkan).
    drum_mute_material:
      name: Bahan peredam suara drum
      description: Menentukan bahan utama peredam suara drum yang bersentuhan dengan
        membran drum dan/atau meredam getaran.
    drum_pad_triggering_zones:
      name: Zona pemicu bantalan drum
      description: Menunjukkan jumlah/jenis zona pemicu yang didukung oleh bantalan
        tom (misalnya, hanya membran vs membran+bingkai), yang memengaruhi ekspresivitas
        dan kompatibilitas modul.
    drum_pedal_accessories_included:
      name: Termasuk aksesori pedal drum
      description: Daftar aksesori dan komponen utama yang dikemas bersama pedal drum.
    drum_pedal_baseplate_type:
      name: Jenis pelat dasar pedal drum
      description: Menunjukkan apakah pedal menggunakan pelat dasar atau desain mengambang/tanpa
        rangka.
    drum_pedal_bearing_type:
      name: Jenis bantalan pedal drum
      description: Menentukan mekanisme bantalan yang digunakan pada titik poros utama
        (misalnya, rocker, heel, cam).
    drum_pedal_cam_type:
      name: Jenis cam pedal drum
      description: Menentukan bentuk/geometri cam pada pedal drum yang memengaruhi
        rasa dan respons (misalnya, linier vs akselerator).
    drum_pedal_chain_configuration:
      name: Konfigurasi rantai pedal drum
      description: Menentukan susunan rantai yang digunakan oleh pedal drum penggerak
        rantai (misalnya, rantai tunggal, rantai ganda, atau rantai bergeser).
    drum_pedal_chain_type:
      name: Jenis rantai pedal drum
      description: Menunjukkan jenis rantai yang digunakan pada sistem penggerak (misalnya,
        rantai rol vs. rantai tipe sepeda), yang dapat memengaruhi kelancaran dan
        daya tahan.
    drum_pedal_clamp_type:
      name: Jenis penjepit pedal drum
      description: Menentukan cara pedal terpasang pada lingkaran bass drum.
    drum_pedal_intended_use:
      name: Tujuan penggunaan pedal drum
      description: Menunjukkan konteks permainan utama yang menjadi tujuan desain/pemasaran
        pedal penggerak sabuk tersebut.
    drum_pedal_spring_adjustment_method:
      name: Metode penyesuaian pegas pedal drum
      description: Menunjukkan cara penyetelan tegangan pegas pada pedal.
    drum_pedal_spring_type:
      name: Jenis pegas pedal drum
      description: Menentukan mekanisme pegas yang digunakan untuk aksi pengembalian
        pedal.
    drum_shell_material:
      name: Bahan cangkang drum
      description: Menentukan bahan konstruksi cangkang utama untuk drum akustik (misalnya,
        maple, birch, akrilik).
    drum_shell_wood_species:
      name: Spesies kayu cangkang drum
      description: Mengidentifikasi spesies kayu yang digunakan untuk cangkang drum,
        yang memengaruhi nada dan resonansi.
    drumhead_type:
      name: Jenis membran drum
      description: Konfigurasi/tipe kepala yang digunakan pada octoban.
    drumstick_model:
      name: Model stik drum
      description: Penamaan model/ukuran stik drum standar yang digunakan oleh banyak
        merek (misalnya, 5A, 7A).
    drumstick_taper:
      name: Bentuk stik drum
      description: Menggambarkan profil bentuk dari batang ke ujung, yang memengaruhi
        pantulan dan keseimbangan.
    drysuit_footwear_style:
      name: Gaya alas kaki drysuit
      description: Menjelaskan bagian bawah kaki yang terintegrasi pada drysuit (misalnya,
        sepatu bot terintegrasi, kaus kaki neoprene, stockingfoot, atau segel pergelangan
        kaki tanpa penutup).
    dumbbell_style:
      name: Gaya dumbel
      description: Mengidentifikasi desain dasar dumbel—apakah itu unit tetap, sistem
        yang dapat disesuaikan, atau gaya pegangan yang dapat diberi beban—yang sangat
        memengaruhi keputusan pembelian dan kasus penggunaan latihan.
    dundun_playing_position:
      name: Posisi bermain dundun
      description: Posisi bermain/membawa drum yang dimaksudkan.
    dye_status:
      name: Status pewarna
      description: Menunjukkan apakah serat wol tersebut diwarnai, tidak diwarnai/alami,
        atau terdiri dari beberapa warna/campuran.
    dye_style:
      name: Gaya pewarnaan
      description: Menentukan apakah warna benang padat, beraneka ragam, atau diwarnai
        secara khusus.
    dye_technique:
      name: Teknik pewarnaan
      description: Metode yang digunakan untuk mewarnai serat (misalnya, pewarnaan
        tangan, pewarnaan rendam, pewarnaan ruang).
    dye_type_needlecraft_fabric:
      name: Jenis pewarna (kain kerajinan jarum)
      description: Menunjukkan apakah kain linen tersebut padat, diwarnai dengan tangan,
        atau diwarnai secara khusus.
    dyeing_color_processing:
      name: Pewarnaan / pemrosesan warna
      description: Menjelaskan apakah dan bagaimana serat tersebut diwarnai (misalnya,
        tidak diwarnai, diputihkan/putih, atau teknik pewarnaan tertentu).
    e_bike_certification_class:
      name: Kelas sertifikasi sepeda listrik
      description: Menentukan peringkat kecepatan resmi ban untuk sepeda listrik (misalnya,
        E-25, E-50).
    e_bike_speed_rating:
      name: Peringkat kecepatan sepeda listrik
      description: Menyatakan tingkat sertifikasi resmi E-bike untuk ban (misalnya,
        E25 untuk ≤25 km/jam, E50 untuk ≤50 km/jam).
    e_scooter_connector_type:
      name: Jenis konektor skuter listrik
      description: Mengidentifikasi jenis konektor atau steker listrik yang digunakan
        oleh komponen untuk koneksi daya atau sinyal.
    e_scooter_throttle_type:
      name: Jenis tuas gas skuter listrik
      description: Menentukan jenis tuas gas yang digunakan untuk mengontrol akselerasi
        pada skuter listrik.
    ear_coverage:
      name: Penutup telinga
      description: Menentukan apakah helm tersebut dilengkapi dengan pelindung telinga
        dan apakah pelindung telinga tersebut dapat dilepas.
    ear_coverage_style:
      name: Gaya penutup telinga
      description: Menjelaskan bagaimana, atau apakah, telinga tertutup oleh masker
        penutup wajah.
    ear_coverage_type:
      name: Jenis penutup telinga
      description: Menentukan bagaimana topi menutupi atau melindungi telinga, termasuk
        keberadaan dan gaya penutup telinga.
    ear_guard_type:
      name: Jenis pelindung telinga
      description: Menjelaskan gaya pelindung telinga yang terintegrasi ke dalam topi,
        seperti plastik keras, bantalan, atau pelindung yang dapat dilepas.
    earmuff_style:
      name: Gaya penutup telinga
      description: Menjelaskan cara pemakaian penutup telinga atau gaya desain strukturnya
        (misalnya, dikenakan di atas kepala atau melingkar di belakang kepala).
    earring_closure_type:
      name: Jenis penutup anting
      description: Menentukan mekanisme yang digunakan untuk mengencangkan anting
        ke telinga (misalnya, push-back, leverback, clip-on).
    easel_art_desk_features:
      name: Fitur meja kuda-kuda & meja seni
      description: Menyoroti fitur fungsional umum yang disertakan dengan meja kuda-kuda
        atau meja seni.
    easel_art_desk_surface_type:
      name: Jenis permukaan meja kuda-kuda & meja seni
      description: Mengidentifikasi permukaan gambar/tulis yang dapat digunakan (misalnya,
        papan tulis kapur, papan tulis putih, gulungan kertas, papan magnet).
    eb_clarinet_body_type:
      name: Jenis badan klarinet Eb
      description: Menentukan apakah klarinet Eb merupakan varian soprano atau alto.
    eco_material_type:
      name: Jenis material ramah lingkungan
      description: Menyoroti teknologi busa atau material ramah lingkungan yang digunakan
        dalam bantalan tersebut.
    edge_construction:
      name: Konstruksi tepi
      description: Menunjukkan apakah ski tersebut memiliki tepi logam di sebagiannya,
        seluruhnya, atau tidak ada sama sekali.
    edge_tuner_type:
      name: Jenis penyetel tepi
      description: Mengklasifikasi gaya alat penyetel tepi ski atau papan seluncur
        salju, seperti pemandu kikir atau mesin listrik.
    edible_plant_part:
      name: Bagian tumbuhan yang dapat dimakan
      description: Menunjukkan bagian tumbuhan mana yang dijual untuk dikonsumsi.
    educational_guide_included:
      name: Panduan pendidikan yang disertakan
      description: Menunjukkan materi pembelajaran apa saja yang disertakan dengan
        model tersebut.
    educational_topic:
      name: Topik pendidikan
      description: Topik pembelajaran utama yang didukung oleh konten edukatif dari
        peternakan semut.
    egg_component:
      name: Komponen telur
      description: Mengidentifikasi bagian telur mana yang terkandung dalam produk,
        seperti telur utuh, hanya putih telur, kuning telur, atau campuran/pengganti.
    egg_component_replaced:
      name: Komponen telur yang diganti
      description: Menunjukkan bagian telur mana yang dimaksudkan untuk digantikan
        oleh produk tersebut (misalnya, telur utuh, putih telur).
    egg_enrichment:
      name: Pengayaan telur
      description: Menunjukkan segala penambahan nutrisi pada telur, seperti pengayaan
        Omega-3 atau Vitamin D.
    egg_farming_method:
      name: Metode peternakan telur
      description: Menunjukkan metode produksi atau pemeliharaan yang digunakan untuk
        telur (misalnya, tanpa kandang, bebas berkeliaran, organik).
    egg_grade:
      name: Grade telur
      description: Menunjukkan tingkat kualitas yang ditetapkan oleh badan pengatur
        atau industri.
    egg_processing_state:
      name: Status pengolahan telur
      description: Menunjukkan segala proses yang diterapkan pada telur sebelum dijual
        (misalnya, telur segar, telur asin, telur pitan).
    egg_production_method:
      name: Metode produksi telur
      description: Menentukan sistem peternakan atau kandang yang digunakan untuk
        memproduksi telur (misalnya, tanpa kandang, dipelihara di padang rumput, organik).
    egg_replacer_main_ingredient:
      name: Bahan utama pengganti telur
      description: Menunjukkan bahan dasar utama pembuatan pengganti telur, yang membantu
        pengguna dengan kebutuhan diet atau sifat memanggang yang diinginkan.
    egg_size:
      name: Ukuran telur
      description: Mengklasifikasi telur berdasarkan ukuran standar yang ditetapkan
        untuk pasar.
    egg_source_animal:
      name: Hewan sumber telur
      description: Mengidentifikasi spesies hewan yang menghasilkan telur tersebut.
    egg_white_processing_method:
      name: Metode pengolahan putih telur
      description: Menunjukkan bagaimana putih telur diproses setelah dikumpulkan
        (misalnya, dipasteurisasi, dikeringkan dengan semprotan), yang memengaruhi
        keamanan pangan, umur simpan, dan kegunaannya.
    eggplant_variety:
      name: Varietas terong
      description: Menentukan kultivar atau varietas terong yang dipasarkan, yang
        memungkinkan pembeli untuk memilih jenis yang berbeda dalam ukuran, rasa,
        warna, dan kegunaan kuliner.
    eggshell_color:
      name: Warna cangkang telur
      description: Menentukan warna cangkang telur yang dominan.
    elastic_edge_finish_type:
      name: Jenis/finis tepi elastis
      description: Menentukan konstruksi tepi dari karet elastis tenun yang memengaruhi
        kenyamanan dan penggunaannya.
    elastic_intended_use:
      name: Penggunaan yang dimaksudkan untuk karet elastis
      description: Aplikasi utama untuk karet elastis (membantu penemuan dan mengurangi
        ketidaksesuaian).
    elastic_recovery_performance:
      name: Kinerja pemulihan karet elastis
      description: Menjelaskan seberapa baik karet elastis tenun kembali ke panjang
        aslinya setelah diregangkan.
    elastic_recovery_quality:
      name: Kualitas pemulihan karet elastis
      description: Menunjukkan kemampuan karet elastis untuk kembali ke panjang semula
        setelah diregangkan—seberapa baik karet tersebut kembali ke panjang aslinya.
    elastic_stretch_level:
      name: Tingkat peregangan karet elastis
      description: Seberapa jauh karet elastis dapat meregang di bawah tegangan (sering
        dinyatakan sebagai tingkat relatif jika persentase pastinya tidak diberikan).
    elastic_structure:
      name: Struktur karet elastis
      description: Menentukan konstruksi struktural dari karet elastis lubang kancing
        (misalnya, rajutan, tenunan, kepangan), yang dapat memengaruhi daya regangan,
        daya pulih, dan kinerja jahitan.
    elastic_type:
      name: Jenis elastis
      description: Menentukan jenis konstruksi karet elastis (misalnya, elastis lipat
        (FOE), kepang, rajutan, tenun).
    electric_assist_type:
      name: Tipe bantuan listrik
      description: Menunjukkan apakah sepeda tersebut memiliki bantuan motor dan jenis
        bantuan yang diberikan.
    electric_bicycle_motor_position:
      name: Posisi motor sepeda listrik
      description: Lokasi motor penggerak pada sepeda listrik, seperti mid-drive,
        front hub, rear hub, atau dual hub.
    electric_bike_class:
      name: Kelas sepeda listrik
      description: Mengategorikan sepeda listrik berdasarkan kelas regulasi yang menentukan
        batas kecepatan dan bantuan akselerasi.
    electric_guitar_bridge_type:
      name: Jenis bridge gitar listrik
      description: Menentukan jenis sistem bridge/vibrato pada gitar listrik.
    electric_instrument_output_connection_type:
      name: Jenis koneksi output instrumen listrik
      description: Menentukan koneksi output audio fisik yang tersedia pada cello
        elektrik.
    electric_riding_vehicle_control_options:
      name: Opsi kontrol kendaraan listrik
      description: Opsi kontrol/pengoperasian yang tersedia untuk pengendara/orang
        tua (misalnya, pedal, setir, pengoperasian jarak jauh).
    electric_spinning_wheel_speed_control_type:
      name: Jenis kontrol kecepatan roda pemintal listrik
      description: Menjelaskan cara pengguna menyesuaikan kecepatan putaran pada roda
        listrik.
    electric_ukulele_output_jack_type:
      name: Jenis jack output ukulele elektrik
      description: Menentukan konektor output fisik yang digunakan oleh ukulele elektrik.
    electric_van_body_length_class:
      name: Kelas panjang bodi van listrik
      description: Klasifikasi ukuran van berdasarkan jarak sumbu roda/panjang yang
        umum digunakan dalam daftar.
    electric_van_roof_height_class:
      name: Kelas ketinggian atap van listrik
      description: Klasifikasi ketinggian atap umum yang digunakan untuk van (khususnya
        van kargo).
    electric_vehicle_drivetrain_layout:
      name: Tata letak sistem penggerak kendaraan listrik
      description: Konfigurasi motor/poros yang menjelaskan berapa banyak motor dan
        di mana letaknya (lebih dari sekadar AWD/FWD/RWD).
    electric_winder_accessories_included:
      name: Aksesori penggulung listrik yang disertakan
      description: Daftar aksesori yang disertakan dengan alat penggulung listrik
        (misalnya, penjepit, adaptor).
    electrical_connector_type:
      name: Jenis konektor listrik
      description: Menentukan gaya konektor yang digunakan oleh kunci pintu/sistem
        penguncian untuk integrasi listrik (jika berlaku).
    electrical_system_voltage:
      name: Tegangan sistem kelistrikan
      description: Menunjukkan tegangan nominal sistem kelistrikan kendaraan yang
        dirancang untuk regulator tersebut.
    electronic_cymbal_trigger_zones:
      name: Zona pemicu simbal elektronik
      description: Menentukan berapa banyak zona pemicu independen yang disediakan
        oleh pad simbal (misalnya, bow/edge/bell).
    electronic_drum_module_audio_interface_functionality:
      name: Fungsionalitas antarmuka audio modul drum elektronik
      description: Menunjukkan apakah modul tersebut dapat berfungsi sebagai antarmuka
        audio USB untuk perekaman/pemutaran (selain MIDI).
    electronic_drum_module_metronome_features:
      name: Fitur metronom modul drum elektronik
      description: Menentukan kemampuan latihan/metronom bawaan.
    electronic_drum_module_power_source:
      name: Sumber daya modul drum elektronik
      description: Menentukan sumber daya listrik yang dibutuhkan atau didukung untuk
        modul kontrol.
    electronic_drum_module_sample_import_support:
      name: Dukungan impor sampel modul drum elektronik
      description: Menunjukkan apakah modul dapat mengimpor sampel pengguna dan dengan
        metode apa.
    electronic_drum_pad_playing_surface_type:
      name: Jenis permukaan bermain pad drum elektronik
      description: Menjelaskan konstruksi permukaan bermain pada tom pad (misalnya,
        mesh head vs karet), yang memengaruhi pantulan, kebisingan, dan rasa.
    electronic_features:
      name: Fitur elektronik
      description: Menunjukkan fitur elektronik/interaktif yang disertakan dalam item
        perbankan mainan (jika ada).
    electronic_lights_and_sound:
      name: Lampu dan suara elektronik
      description: Menunjukkan apakah set mainan rumah boneka tersebut mencakup fitur
        lampu dan/atau suara elektronik (misalnya, lampu, bel pintu, musik, efek suara).
    electronics_power_source:
      name: Sumber daya peralatan elektronik
      description: Menentukan bagaimana komponen elektronik aktif diberi daya (jika
        berlaku).
    eligible_race_series:
      name: Seri balap yang memenuhi syarat
      description: Seri balap atau badan penyelenggara tempat mobil tersebut memenuhi
        syarat untuk berlomba.
    elliptical_trainer_part_type:
      name: Jenis bagian alat latihan elips
      description: Mengklasifikasi jenis aksesori atau suku cadang khusus untuk alat
        latihan elips (misalnya, sabuk, konsol, pedal) sehingga pembeli dapat dengan
        cepat memfilter barang yang mereka butuhkan tanpa harus menelusuri banyak
        kategori mikro.
    embellishment_technique:
      name: Teknik penghiasan
      description: Memerinci pekerjaan dekoratif atau permukaan utama yang diterapkan
        pada pakaian, seperti sulaman, cetakan, atau manik-manik.
    embellishment_type:
      name: Jenis hiasan
      description: Mengidentifikasi jenis elemen dekoratif yang diterapkan pada garter,
        seperti renda, pita, atau mutiara.
    embossing_pen_ink_color:
      name: Warna tinta pena emboss
      description: Menentukan warna tinta yang dikeluarkan oleh pena emboss (dapat
        berupa tinta bening/lengket atau berpigmen). Berbeda dengan warna pena/badan
        pena.
    embossing_stylus_tip_shape:
      name: Bentuk ujung stylus emboss
      description: Menjelaskan geometri ujung alat emboss yang digunakan untuk menciptakan
        efek berbeda (misalnya, bulat vs runcing).
    embroidered_coverage_level:
      name: Tingkat cakupan bordir
      description: Perkiraan jumlah benang bordir yang menutupi permukaan patch.
    embroidered_patch_backing_type:
      name: Jenis lapisan belakang patch bordir
      description: Lapisan pendukung/penyangga di sisi belakang patch bordir yang
        memengaruhi daya tahan dan cara pemasangannya.
    embroidery_hoop_type:
      name: Jenis bingkai bordir
      description: Mengidentifikasi gaya konstruksi bingkai bordir dan mekanisme penegangan
        utamanya.
    embroidery_machine_bobbin_type:
      name: Jenis bobin mesin bordir
      description: Jenis/gaya pemuatan sistem bobin.
    emergency_lighting_configuration:
      name: Konfigurasi penerangan darurat
      description: Menentukan konfigurasi lampu peringatan darurat utama yang terpasang
        pada kendaraan (misalnya, lampu sorot atap, lampu gril).
    emergency_lighting_package:
      name: Paket penerangan darurat
      description: Menentukan jenis lampu peringatan darurat yang terpasang.
    emissions_compliance_standard:
      name: Standar kepatuhan emisi
      description: Menunjukkan sertifikasi/kepatuhan emisi untuk mesin, jika berlaku.
    emissions_standard:
      name: Standar emisi
      description: Standar kepatuhan emisi untuk kendaraan (bervariasi menurut wilayah
        dan tahun).
    enclosure_panel_configuration:
      name: Konfigurasi panel penutup
      description: Menentukan panel atau sisi penutup mana yang disertakan (konfigurasi
        cakupan), seperti penutup penuh, hanya tirai samping, atau 3 sisi (depan/belakang
        terbuka).
    enclosure_window_material:
      name: Bahan jendela penutup
      description: Mengidentifikasi bahan yang digunakan untuk panel jendela bening
        pada penutup tersebut.
    end_fitting_type:
      name: Jenis sambungan ujung
      description: Gaya konektor yang digunakan di setiap ujung penyangga (sisi kendaraan
        dan sisi tutup), menentukan kompatibilitas pemasangan.
    end_type:
      name: Jenis ujung
      description: Menentukan gaya terminasi/pengikatan di ujung tali derek untuk
        dihubungkan ke titik pemulihan.
    ends_style_blocking_wires:
      name: Gaya ujung (kawat penahan)
      description: Cara penyelesaian ujung kawat penahan agar aman dan mudah dimasukkan
        melalui tepi renda.
    enduro_bike_suspension_adjustability:
      name: Penyesuaian suspensi sepeda Enduro
      description: Menunjukkan penyesuaian suspensi mana yang tersedia (biasanya untuk
        fork depan dan shock belakang).
    engine_bay_mounting_location:
      name: Lokasi pemasangan di ruang mesin
      description: Lokasi pemasangan tangki luapan di ruang mesin (posisi relatif).
    engine_bearing_coating:
      name: Lapisan bantalan mesin
      description: Menentukan segala lapisan permukaan pada bantalan (untuk ketahanan
        aus, kemampuan tertanam, pengurangan gesekan).
    engine_bearing_position:
      name: Posisi bantalan mesin
      description: Menentukan lokasi/fungsi bantalan di dalam mesin.
    engine_bearing_size:
      name: Ukuran bantalan mesin
      description: Menentukan apakah bantalan tersebut berukuran standar atau varian
        ukuran lebih kecil/lebih besar (biasanya terkait dengan penggerindaan dan
        celah poros engkol).
    engine_configuration:
      name: Konfigurasi mesin
      description: Menjelaskan tata letak/konfigurasi silinder mesin (misalnya, segaris,
        V, datar/kotak).
    engine_cooling_type:
      name: Jenis pendinginan mesin
      description: Menentukan metode pendinginan mesin.
    engine_degreaser_form:
      name: Bentuk degreaser mesin
      description: Format fisik/bentuk pengiriman degreaser mesin.
    engine_degreaser_rinse_requirement:
      name: Persyaratan pembilasan degreaser mesin
      description: Apakah degreaser dimaksudkan untuk dibilas dengan air setelah digunakan.
    engine_mount_type:
      name: Jenis dudukan mesin
      description: Menentukan desain fungsional dudukan mesin (misalnya, hidrolik,
        solid, penopang torsi).
    engine_oil_formulation:
      name: Formulasi oli mesin
      description: Menunjukkan fokus formulasi oli mesin, seperti penggunaan standar,
        perawatan untuk jarak tempuh tinggi, interval penggantian oli yang diperpanjang,
        atau aplikasi armada/tugas berat.
    engine_oil_specification:
      name: Spesifikasi oli mesin
      description: Spesifikasi/standar yang dipenuhi oli tersebut (misalnya, API SP,
        API SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Isi kit rekondisi mesin
      description: Mengidentifikasi komponen-komponen utama yang disertakan dalam
        kit rekondisi mesin.
    engine_rotation_direction:
      name: Arah putaran mesin
      description: Menentukan arah putaran mesin yang digunakan dalam aplikasi kelautan.
    engine_timing_system_drive_type:
      name: Jenis penggerak sistem timing mesin
      description: Menunjukkan apakah sistem penggerak timing mesin menggunakan sabuk,
        rantai, atau roda gigi untuk pencocokan kompatibilitas.
    engine_valve_coating:
      name: Lapisan katup mesin
      description: Mengidentifikasi segala perlakuan permukaan atau lapisan yang diterapkan
        pada katup untuk ketahanan terhadap keausan/panas.
    engine_valve_position:
      name: Posisi katup mesin
      description: Menentukan apakah katup mesin tersebut ditujukan untuk sisi pemasukan
        atau sisi pembuangan mesin.
    engine_valve_stem_tip_type:
      name: Jenis ujung batang katup mesin
      description: Menentukan gaya atau konstruksi ujung batang katup pada titik kontak
        dengan lengan ayun atau penyetel.
    engine_valvetrain_type:
      name: Jenis sistem katup mesin
      description: Susunan katup/poros bubungan.
    enhancement_level:
      name: Tingkat peningkatan
      description: 'Perkiraan peningkatan volume yang diberikan oleh sisipan, dinyatakan
        dalam ukuran cangkir: Sedikit (hingga 1 cangkir), Sedang (1–2 cangkir), Signifikan
        (2+ cangkir).'
    entry_zipper_location:
      name: Lokasi ritsleting masuk
      description: Menentukan lokasi ritsleting atau bukaan utama drysuit (misalnya,
        depan, belakang, bahu, diagonal).
    epee_point_type:
      name: Jenis ujung pedang epee
      description: Menentukan merek atau standar mata pisau yang terpasang pada bilah,
        yang memengaruhi kompatibilitas dan perawatan.
    equestrian_discipline:
      name: Disiplin berkuda
      description: Menentukan disiplin berkuda yang menjadi tujuan atau paling sesuai
        untuk penggunaan taji tersebut.
    equestrian_helmet_safety_certification:
      name: Sertifikasi keselamatan helm berkuda
      description: Menentukan standar keselamatan atau sertifikasi yang dipenuhi oleh
        helm tersebut.
    equine_application_area:
      name: Area aplikasi kuda
      description: Menentukan bagian tubuh atau bahan yang menjadi sasaran produk
        (misalnya, kuku, surai, perlengkapan kuda).
    equipment_contact_material_brew_wine:
      name: Bahan kontak peralatan (bir/anggur)
      description: Bahan utama dari barang yang bersentuhan dengan cairan (misalnya,
        kaca, baja tahan karat, plastik).
    eu_children_clothing_size:
      name: Ukuran pakaian anak-anak Uni Eropa
      description: Menentukan ukuran pakaian anak-anak Uni Eropa berdasarkan tinggi
        badan, misalnya 104 atau 140
    eu_clothing_size:
      name: Ukuran pakaian Uni Eropa
      description: Menentukan ukuran pakaian UE, seperti 38 atau 46
    eu_cup_size:
      name: Ukuran cup Uni Eropa
      description: Menentukan ukuran cup bra Uni Eropa, seperti C atau E
    eu_ring_size:
      name: Ukuran cincin Uni Eropa
      description: Menentukan ukuran cincin Uni Eropa berdasarkan kelilingnya, misalnya
        52 atau 63
    eu_shoe_size:
      name: Ukuran sepatu Uni Eropa
      description: Menentukan ukuran sepatu Uni Eropa, seperti 42 atau 42 Lebar
    euphonium_included_accessories:
      name: Aksesori yang disertakan bersama euphonium
      description: Daftar tersebut mencakup barang-barang yang biasanya disertakan
        bersama euphonium (misalnya, mouthpiece, kotak penyimpanan).
    euphonium_valve_configuration:
      name: Konfigurasi katup euphonium
      description: Menentukan jumlah katup dan apakah katup ke-4 dioperasikan dengan
        tangan atau dengan mekanisme aksi samping.
    european_sword_historical_period:
      name: Periode historis pedang Eropa
      description: Periode sejarah utama yang menjadi dasar pola/replika pedang tersebut
        (atau era aslinya).
    european_sword_pattern_type:
      name: Pola/tipe pedang Eropa
      description: Pola/tipe pedang Eropa spesifik (tipologi) yang diwakili oleh pedang
        koleksi tersebut.
    ev_connector_adapter_direction:
      name: Arah konektor/adaptor kendaraan listrik
      description: Menentukan dari mana adaptor mengkonversi DARI dan KE (sisi saluran
        masuk kendaraan vs sisi pengisi daya/kabel), memungkinkan penyaringan kompatibilitas
        yang akurat.
    ev_conversion_kit_completeness_level:
      name: Tingkat kelengkapan kit konversi kendaraan listrik
      description: Menunjukkan apakah produk tersebut merupakan kit konversi lengkap
        atau kit/bundel parsial (misalnya, hanya motor + kontroler).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfigurasi sistem penggerak kit konversi kendaraan listrik
      description: Menentukan arsitektur sistem penggerak dari kit konversi kendaraan
        listrik, termasuk penempatan motor/tata letak penggerak dan apakah mempertahankan
        transmisi yang ada.
    ev_conversion_kit_voltage_class:
      name: Kelas tegangan kit konversi kendaraan listrik
      description: Kelas tegangan sistem nominal (kategori) yang menjadi acuan desain
        kit konversi kendaraan listrik. Gunakan ini untuk memfilter berdasarkan kelas
        tegangan sistem umum di samping pengukuran tegangan yang tepat.
    evaporator_core_type:
      name: Jenis inti evaporator
      description: Menentukan desain konstruksi inti evaporator A/C otomotif.
    evenweave_fabric_finish_treatment:
      name: Lapisan/perlakuan akhir kain Evenweave
      description: Menunjukkan adanya lapisan akhir atau perlakuan tambahan yang diterapkan
        pada kain yang memengaruhi penanganan atau penampilannya.
    evenweave_fabric_package_format:
      name: Format kemasan kain Evenweave
      description: Cara penjualan kain (potongan vs. per meter/yard).
    exercise_bike_accessory_part_type:
      name: Jenis aksesori/bagian sepeda statis
      description: Menjelaskan fungsi utama atau jenis komponen dari barang tersebut
        (misalnya, Pedal, Sabuk penggerak, Tempat botol, Penutup layar, Lengan engkol).
    exercise_bike_cushion_component:
      name: Komponen bantalan sepeda statis
      description: Menentukan komponen terkait jok yang disertakan, seperti bantalan
        jok, sadel, atau penutup jok.
    exercise_bike_metrics_tracked:
      name: Metrik sepeda statis yang dilacak
      description: Mencantumkan kolom data latihan yang dapat diukur dan ditampilkan
        oleh komputer secara real-time.
    exercise_mat_accessories_included:
      name: Aksesori matras olahraga yang disertakan
      description: Mencantumkan komponen tambahan yang disertakan bersama matras,
        seperti tali pengikat atau bantalan lutut.
    exhaust_cooling_type:
      name: Jenis pendinginan knalpot
      description: Menunjukkan apakah komponen knalpot tersebut ditujukan untuk sistem
        knalpot basah (berpendingin air/injeksi air) atau sistem knalpot kering.
    exhaust_installation_position:
      name: Posisi pemasangan knalpot
      description: Menunjukkan lokasi pemasangan komponen tersebut pada kendaraan.
    exhaust_outlet_configuration:
      name: Konfigurasi outlet knalpot
      description: Menentukan tata letak lubang keluar knalpot di bagian belakang
        kendaraan.
    expansion_tank_cap_connection_type:
      name: Jenis sambungan tutup tangki ekspansi
      description: Jenis sambungan mekanis yang digunakan untuk memasang dan menyegel
        tutup ke leher tangki ekspansi.
    expansion_tank_cap_pressure_relief_feature:
      name: Fitur pelepas tekanan pada tutup tangki ekspansi
      description: Apakah dan bagaimana tutup tersebut menyediakan fungsi pelepasan
        tekanan/vakum.
    expansion_tank_cap_seal_material:
      name: Bahan segel tutup tangki ekspansi
      description: Bahan gasket/segel yang bersentuhan dengan leher tangki ekspansi.
    extension_attachment_method:
      name: Metode pemasangan ekstensi
      description: Menunjukkan cara pemasangan ekstensi ke kokpit/stang sepeda, membantu
        pengendara memastikan kompatibilitas dengan pengaturan yang sudah ada.
    extension_bend_type:
      name: Jenis tekukan ekstensi
      description: Menjelaskan gaya geometris atau lekukan ekstensi setang, yang memengaruhi
        ergonomi dan aerodinamika pengendara.
    extension_mechanism:
      name: Mekanisme ekstensi
      description: Menjelaskan metode yang digunakan meja untuk memperpanjang panjang
        atau luas permukaannya, jika berlaku.
    extension_table_features:
      name: Fitur meja ekstensi
      description: Menyoroti fitur fungsional khusus untuk meja tambahan mesin jahit.
    eyelet_grommet_installation_method:
      name: Metode pemasangan eyelet dan grommet
      description: Menentukan cara pemasangan/pengencangan lubang tali pada bahan.
    eyewear_lens_shape:
      name: Bentuk lensa kacamata
      description: Menunjukkan bentuk geometris lensa, seperti silindris atau bulat,
        yang memengaruhi bidang pandang, distorsi, dan gaya.
    eyewear_strap_material:
      name: Bahan tali kacamata
      description: Menentukan bahan tali pengikat yang dapat disesuaikan yang mengamankan
        kacamata pelindung atau kacamata baca ke kepala pengguna.
    fabric_backing_type:
      name: Jenis lapisan kain
      description: Menentukan apakah kain katun yang dapat dicetak tersebut memiliki
        lapisan kertas penstabil (dan jenisnya), yang menentukan apakah kain tersebut
        dapat dimasukkan ke dalam printer standar.
    fabric_cut_format:
      name: Format potongan kain
      description: Menentukan potongan/format kain kanvas untuk kerajinan tangan.
    fabric_end_use:
      name: Tujuan penggunaan kain
      description: Mengidentifikasi aplikasi utama yang dimaksudkan dari kain tersebut
        (untuk apa kain tersebut paling baik digunakan).
    fabric_finish:
      name: Hasil akhir kain
      description: Lapisan/perlakuan permukaan yang diterapkan pada kain sutra memengaruhi
        kilau, tekstur, dan performanya.
    fabric_intended_use:
      name: Tujuan penggunaan kain
      description: Aplikasi/proyek utama yang direkomendasikan untuk kain linen.
    fabric_opacity_level:
      name: Tingkat opasitas kain
      description: Menunjukkan seberapa tembus pandang kain tersebut, yang memengaruhi
        kebutuhan pelapisan dan penambahan lapisan dalam.
    fabric_patch_shape:
      name: Bentuk tambalan kain
      description: Menjelaskan bentuk tambalan yang disertakan dalam kit.
    fabric_repair_kit_application_method:
      name: Metode penggunaan kit perbaikan kain
      description: Menentukan bagaimana perbaikan diterapkan pada kain (misalnya,
        disetrika, dijahit, perekat).
    fabric_repair_kit_components_included:
      name: Komponen kit perbaikan kain yang disertakan
      description: Mencantumkan komponen spesifik yang disediakan dalam kit (misalnya,
        tambalan, benang, jarum, perekat).
    fabric_repair_kit_intended_use:
      name: Tujuan penggunaan kit perbaikan kain
      description: Menentukan tugas perbaikan umum yang dirancang untuk kit ini (misalnya,
        sobekan, lubang, jahitan).
    fabric_selling_format:
      name: Format penjualan kain
      description: Menentukan bagaimana kain tersebut dijual (panjang berkelanjutan,
        potongan yang sudah dipotong, gulungan/bolt, atau sampel).
    fabric_stretch_level:
      name: Tingkat elastisitas kain
      description: Menjelaskan tingkat kelenturan/elastisitas kain, membantu pembeli
        memilih kain yang sesuai untuk pakaian yang pas di badan atau proyek yang
        terstruktur.
    fabric_stretch_type:
      name: Jenis elastisitas kain
      description: Menunjukkan daya regang kain celana pendek selancar, yang penting
        untuk mobilitas saat berselancar atau berenang.
    fabric_texture:
      name: Tekstur kain
      description: Menggambarkan tekstur permukaan atau struktur rajutan kain yang
        digunakan pada atasan pakaian santai.
    fabric_use_case:
      name: Kasus penggunaan kain
      description: Tujuan utama penggunaan potongan/gulungan kain satin tersebut.
    fabric_weight_class:
      name: Kelas berat kain
      description: Mengkategorikan kain flanel berdasarkan rentang berat penggunaan
        umum untuk membantu pembeli menyaring tanpa mengetahui GSM/oz yang tepat.
    face_mask_material:
      name: Bahan masker wajah
      description: Komposisi material masker wajah yang disertakan atau kompatibel
        dengan helm.
    face_mask_style:
      name: Gaya masker wajah
      description: Menentukan bentuk keseluruhan atau gaya konstruksi masker wajah
        modis, membantu pembeli menemukan ukuran dan estetika yang mereka sukai.
    face_mask_style_code:
      name: Kode gaya masker wajah
      description: Menentukan gaya batang struktural atau keluarga kode industri dari
        masker wajah (misalnya, ROPO, OPO, RJOP).
    face_protection_type:
      name: Jenis pelindung wajah
      description: Menunjukkan jenis perlindungan wajah yang disertakan atau terintegrasi
        dalam helm, seperti pelindung wajah atau visor.
    faceplate_security_features:
      name: Fitur keamanan pelindung wajah
      description: Mencakup fitur pencegahan pencurian dan akses yang terkait dengan
        panel depan di luar desain dasar.
    facing_length:
      name: Panjang muka
      description: Menentukan panjang permukaan (panjang lengkung) dari mouthpiece,
        yang memengaruhi respons dan pilihan reed.
    fan_shroud_type:
      name: Jenis penutup kipas
      description: Menentukan gaya cakupan/geometri penutup kipas (misalnya, penuh
        vs setengah vs melingkar).
    farming_method:
      name: Metode pertanian
      description: Menyoroti praktik kesejahteraan hewan atau peternakan yang digunakan
        untuk memelihara hewan, seperti peternakan bebas atau organik.
    farming_practice:
      name: Praktik pertanian
      description: Mengidentifikasi metode budidaya utama yang digunakan untuk produk
        tersebut (misalnya, konvensional, organik, hidroponik).
    fascinator_style:
      name: Gaya hiasan kepala
      description: Menjelaskan desain struktural atau bentuk hiasan kepala sehingga
        pembeli dapat dengan cepat menyaring berdasarkan gaya topi yang populer.
    fastener_grade:
      name: Kelas pengencang
      description: Menunjukkan tingkat/kelas kekuatan baut, seperti Kelas 8 atau Kelas
        10.9, yang menentukan kapasitas beban.
    fat_rendering_state:
      name: Keadaan pengolahan lemak
      description: Menentukan apakah lemak tersebut sudah diolah, belum diolah (mentah),
        atau sebagian diolah, yang memengaruhi masa simpan dan aplikasi kuliner.
    fat_source:
      name: Sumber lemak
      description: Mengidentifikasi sumber utama lemak yang digunakan untuk memproduksi
        mentega, ghee, atau margarin (hewani atau nabati), mendukung penyaringan alergi
        dan diet.
    faucet_hole_configuration:
      name: Konfigurasi lubang keran
      description: Menunjukkan jumlah dan letak lubang keran yang sudah dibor sebelumnya
        pada permukaan meja rias.
    feather_application:
      name: Aplikasi bulu
      description: Kegunaan atau aplikasi utama bulu kalkun adalah untuk kerajinan
        tangan atau pembuatan barang.
    feather_attachment_format:
      name: Lampiran/format bulu
      description: Cara bulu sintetis dipersiapkan/dijual untuk digunakan (lepas,
        dirangkai, ditempel, dll.).
    feather_coloration_style:
      name: Gaya pewarnaan bulu
      description: Menjelaskan bagaimana warna diaplikasikan/muncul pada bulu (misalnya,
        warna solid, pewarnaan ujung, gradien), terlepas dari nilai Warna dasar.
    feather_component:
      name: Komponen bulu
      description: Menentukan bagian/jenis bulu merak mana yang dijual (misalnya,
        bulu mata vs bulu bagian atas).
    feather_curvature:
      name: Kelengkungan bulu
      description: Profil bentuk/kurvatur keseluruhan bulu.
    feather_finish:
      name: Lapisan akhir bulu
      description: Menunjukkan apakah bulu burung unta tersebut alami atau telah diproses
        (misalnya, diwarnai atau diputihkan) untuk penggunaan dekoratif.
    feather_form:
      name: Bentuk bulu
      description: Menentukan bentuk fisik dari potongan bulu angsa yang dijual.
    feather_grade:
      name: Kelas bulu
      description: Kualitas/tingkat seleksi keseluruhan bulu untuk penggunaan kerajinan
        versus pajangan.
    feather_part:
      name: Bagian bulu
      description: Bagian/struktur bulu kalkun yang dijual (umum ditemukan dalam daftar
        perlengkapan kerajinan dan pembuatan umpan pancing).
    feather_processing_type:
      name: Jenis pengolahan bulu
      description: Bagaimana bulu-bulu tersebut diproses/diperlakukan untuk penggunaan
        kerajinan (misalnya, diwarnai, diputihkan, alami/tidak diwarnai).
    feather_product_form:
      name: Bentuk produk bulu
      description: Bentuk fisik/potongan produk bulu yang dijual (misalnya, bulu lepas
        vs boa vs rumbai).
    feather_quantity_unit:
      name: Satuan kuantitas bulu
      description: Menentukan bagaimana produk dijual (misalnya, per buah, per berat,
        per ikat) untuk mendukung perbandingan yang akurat antar daftar.
    feather_source:
      name: Sumber bulu
      description: Menentukan sumber hewan dari bulu yang digunakan dalam kok bulu
        tangkis.
    feather_stiffness:
      name: Kekakuan bulu
      description: Kekakuan/kekokohan relatif dari duri/struktur bulu.
    feed_mechanism:
      name: Mekanisme pengumpanan
      description: Menunjukkan bagaimana bola dimasukkan ke dalam mesin pelempar bola.
    feed_purpose:
      name: Tujuan penggunaan pakan
      description: Menjelaskan tujuan nutrisi atau fungsional utama dari pakan atau
        suplemen tersebut.
    feeder_mechanism_type:
      name: Jenis mekanisme pengumpan
      description: Mengidentifikasi mekanisme pengeluaran yang digunakan oleh alat
        pemberi pakan untuk melepaskan pakan.
    feijoa_cultivar:
      name: Kultivar feijoa
      description: Mengidentifikasi kultivar atau varietas feijoa tertentu, karena
        kultivar yang berbeda menawarkan rasa, ukuran, dan waktu panen yang berbeda.
    felt_duty:
      name: Kekuatan felt
      description: Menentukan klasifikasi kekuatan felt bola tenis (misalnya, beban
        ekstra, beban reguler) yang memengaruhi daya tahannya di berbagai permukaan.
    felting_mold_intended_use:
      name: Penggunaan cetakan felting
      description: Apa yang ingin dibuat menggunakan atau tujuan penggunaan dari cetakan
        tersebut dalam proyek pembuatan kain felt.
    felting_pad_surface_material:
      name: Bahan permukaan bantalan felt
      description: Bahan yang digunakan pada permukaan kerja bantalan/alas felt yang
        bersentuhan dengan serat/jarum.
    fencing_certification:
      name: Sertifikasi anggar
      description: Mencantumkan persetujuan resmi dari badan pengatur yang dipenuhi
        senjata anggar (misalnya, FIE, USFA), yang menunjukkan legalitas kompetisi
        dan standar kualitas.
    fencing_connector_type:
      name: Jenis konektor anggar
      description: Menentukan konfigurasi konektor yang digunakan untuk memasang kabel,
        soket, atau gulungan pada senjata anggar (misalnya, 2-pin, 3-pin, bayonet),
        memastikan kompatibilitas komponen.
    fencing_discipline:
      name: Disiplin anggar
      description: Menentukan senjata atau disiplin anggar yang sesuai atau kompatibel
        dengan produk tersebut.
    fencing_weapon_type:
      name: Jenis senjata anggar
      description: Menentukan gaya anggar atau senjata latihan yang kompatibel atau
        diwakili oleh alat bantu latihan tersebut, membantu pengguna menemukan perlengkapan
        yang sesuai.
    fender_finish_state:
      name: Kondisi lapisan akhir sepatbor
      description: Menunjukkan kondisi permukaan/lapisan akhir sepatbor yang disediakan
        untuk kesiapan pengecatan dan pemasangan.
    fender_pieces_included:
      name: Potongan pelindung termasuk
      description: Mencantumkan komponen yang disertakan dengan produk untuk memperjelas
        apakah itu hanya sepatbor tunggal atau satu set lengkap dengan aksesori.
    fender_type:
      name: Jenis sepatbor
      description: Mengklasifikasikan desain atau gaya keseluruhan sepatbor.
    fennel_trimming:
      name: Potongan adas
      description: Menunjukkan bagian tanaman mana yang disertakan bersama umbi adas
        (misalnya, dengan daun, pucuk yang dipangkas, dan akar).
    fennel_variety:
      name: Varietas adas
      description: Menentukan kultivar atau varietas pasar dari umbi adas yang dijual.
    fermentation_application:
      name: Aplikasi fermentasi
      description: Mengidentifikasi makanan atau minuman utama yang dirancang untuk
        difermentasi oleh kultur tersebut (misalnya, keju, yogurt, kefir susu, roti
        sourdough).
    fermentation_method:
      name: Metode fermentasi
      description: Menentukan bagaimana kecap asin diproduksi atau difermentasi (misalnya,
        diseduh secara alami, dihidrolisis secara kimia).
    fermentation_vessel_material:
      name: Bahan wadah fermentasi
      description: Bahan utama wadah fermentasi yang termasuk dalam kit (jika ada).
    ferrule_material:
      name: Bahan ferrule
      description: Menentukan bahan yang digunakan untuk ferrule poros (misalnya,
        Juma, Fenolik, Polikarbonat, XTC, atau tanpa bahan), yang memengaruhi daya
        tahan dan sensasi pukulan.
    fia_homologation_certification:
      name: Homologasi/sertifikasi FIA
      description: Menunjukkan apakah mobil (atau sel keselamatan) tersebut telah
        disertifikasi/disemologasi dan sesuai dengan standar apa.
    fiber_animal_source_type:
      name: Jenis hewan/sumber serat
      description: Hewan atau sumber utama asal serat wol tersebut (atau sintetis),
        seperti wol merino, alpaka, atau serat tumbuhan.
    fiber_luster_level:
      name: Tingkat kilau serat
      description: Kilau visual serat, mulai dari matte hingga sangat mengkilap.
    fiber_preparation_processing_stage:
      name: Tahap persiapan/pemrosesan serat
      description: Menunjukkan cara sliver dipersiapkan/diproses untuk digunakan (misalnya,
        carded vs combed, blended, superwash).
    fiber_preparation_type:
      name: Jenis persiapan serat
      description: Mengidentifikasi cara serat dipersiapkan untuk pembuatan kerajinan
        (misalnya, carded batt, drum-carded, prefelt sheet).
    field_hockey_ball_playing_surface:
      name: Permukaan permainan bola hoki lapangan
      description: Mengidentifikasi permukaan atau lingkungan permainan tempat bola
        tersebut dirancang.
    field_hockey_ball_type:
      name: Jenis bola hoki lapangan
      description: Mengategorikan bola hoki lapangan berdasarkan tujuan penggunaannya
        atau fitur khususnya.
    field_hockey_goal_size_standard:
      name: Ukuran standar gawang hoki lapangan
      description: Mengklasifikasi gawang menurut standar hoki lapangan umum atau
        ukuran latihan (misalnya, peraturan FIH outdoor, remaja, mini).
    field_hockey_training_objective:
      name: Tujuan pelatihan hoki lapangan
      description: Menentukan keterampilan utama atau area fokus yang dirancang untuk
        ditingkatkan oleh alat bantu pelatihan tersebut.
    field_point_attachment_method:
      name: Metode pemasangan titik lapangan
      description: Menunjukkan bagaimana field point dipasang pada batang anak panah
        atau insert (misalnya, Screw-in, Glue-in).
    field_point_tip_style:
      name: Gaya ujung field point
      description: Menentukan gaya geometris atau profil fungsional ujung field point,
        yang memengaruhi daya tembus, upaya pengangkatan, dan legalitas.
    fielding_glove_position:
      name: Posisi sarung tangan fielding
      description: Mengidentifikasi posisi bertahan atau penggunaan yang dirancang
        untuk sarung tangan tersebut dalam permainan bisbol atau sofbol.
    fielding_training_focus:
      name: Fokus pelatihan fielding
      description: Menentukan area keterampilan utama yang ditargetkan oleh alat bantu
        tersebut selama sesi latihan.
    fig_variety:
      name: Varietas ara
      description: Mengidentifikasi kultivar atau varietas ara tertentu yang dijual.
    figure_8_device_design:
      name: Desain perangkat figur 8
      description: Mengidentifikasi konfigurasi spesifik dari perangkat figur 8, yang
        memengaruhi karakteristik penanganan dan tujuan penggunaannya.
    figure_finish_type:
      name: Jenis finis figur
      description: Menunjukkan permukaan/finis cat pada figur model kuda (bagaimana
        tampilannya/rasanya sebagai barang koleksi).
    figurine_scale:
      name: Skala figurin
      description: Skala/rasio figurin relatif terhadap objek aslinya (jika ada),
        misalnya, 1:6.
    fill_status:
      name: Status pengisian
      description: Menunjukkan apakah boneka latihan gulat dijual dalam keadaan sudah
        terisi, kosong, atau sebagian terisi, yang menentukan biaya pengiriman dan
        upaya pembeli.
    filling_consistency:
      name: Konsistensi isian
      description: Menggambarkan tekstur atau kekentalan isian yang disediakan (misalnya,
        krim halus, potongan buah, pasta).
    filling_type:
      name: Jenis isian
      description: Menentukan isian utama atau krim di dalam kue, jika ada.
    filtration_and_mother_status:
      name: Filtrasi dan status induk
      description: Menunjukkan apakah cuka tersebut disaring, tidak disaring, mentah,
        atau mengandung 'induk', yang ditujukan untuk konsumen yang mencari pilihan
        probiotik atau mentah.
    filtration_method:
      name: Metode filtrasi
      description: Bahan atau teknik yang digunakan untuk menyaring dan memurnikan
        vodka setelah distilasi.
    fin_box_system:
      name: Sistem kotak sirip
      description: Menentukan kotak sirip atau antarmuka pemasangan yang digunakan
        papan, sehingga menentukan kompatibilitas sirip aftermarket.
    fin_buoyancy:
      name: Daya apung sirip
      description: Menunjukkan apakah sirip tersebut memiliki daya apung positif,
        netral, atau negatif di dalam air, yang memengaruhi posisi tubuh penyelam
        dan keseimbangan peralatan.
    fin_flex_rating:
      name: Nilai fleksibilitas sirip
      description: Menunjukkan tingkat kekakuan atau kelenturan relatif sirip, yang
        memengaruhi kinerja keseluruhan.
    fin_mounting_system:
      name: Sistem pemasangan sirip
      description: Menentukan antarmuka atau standar pemasangan yang digunakan untuk
        memasang sirip ke papan selancar layang (misalnya, FCS II, sekrup, 4 lubang),
        memastikan kompatibilitas antara sirip dan papan.
    fin_position:
      name: Posisi sirip
      description: Menentukan posisi pemasangan sirip pada papan yang ditujukan.
    fin_strap_type:
      name: Jenis tali sirip
      description: Menentukan jenis tali atau sistem retensi yang digunakan untuk
        mengamankan sirip ke tumit/kaki.
    fin_template:
      name: Templat sirip
      description: Mengkategorikan pola hidrodinamik atau garis luar sirip papan selancar,
        yang memengaruhi gaya berbelok, kecepatan, dan keseluruhan sensasi papan.
    finger_count:
      name: Jumlah jari
      description: Menunjukkan jumlah jari yang dirancang untuk ditopang oleh sarung
        tangan, tab, atau pegangan pelepas.
    finger_coverage:
      name: Cakupan jari
      description: Menunjukkan seberapa banyak bagian jari yang tertutup.
    finger_grip_adjustability:
      name: Penyesuaian genggaman jari
      description: Menunjukkan cara pegangan jari terpasang atau disesuaikan agar
        sesuai dengan berbagai ukuran tangan.
    finger_hole_configuration:
      name: Konfigurasi lubang jari
      description: Menentukan orientasi tangan pada lubang jari (tangan kanan, tangan
        kiri, atau ambidekstrus).
    finger_hole_count:
      name: Jumlah lubang jari
      description: Menunjukkan jumlah lubang jari pada kulit pegangan, perbedaan gaya
        utama antara model tanpa jari, 2 lubang, 3 lubang, dan 4 lubang.
    finger_pick_band_style:
      name: Gaya tali pick jari
      description: Gaya tali/pengait yang menempel pada jari, memengaruhi kenyamanan
        dan kemudahan penyesuaian.
    finger_pick_blade_length:
      name: Panjang pick jari
      description: Panjang pick yang memanjang dari tali.
    finger_pick_blade_shape:
      name: Bentuk bilah penunjuk jari
      description: Bentuk/profil permukaan pick (bilah) yang bersentuhan dengan senar.
    finger_pick_size:
      name: Ukuran pick jari
      description: Ukuran tali/lingkaran pick jari disesuaikan agar sesuai dengan
        lingkar jari atau ibu jari yang berbeda (bukan ukuran instrumen).
    finger_pick_wear_location:
      name: Lokasi keausan pick jari
      description: Menunjukkan jari mana yang dimaksudkan untuk dipasangi pick jari,
        atau apakah produk tersebut merupakan set untuk ibu jari dan jari lainnya.
    finger_protection:
      name: Pelindung jari
      description: Menunjukkan apakah sarung tangan tersebut dilengkapi dengan pelindung
        tulang jari dan apakah pelindung tulang tersebut dapat dilepas.
    fingerboard_bearing_type:
      name: Jenis bantalan fingerboard
      description: Menentukan jenis bantalan yang digunakan pada roda fingerboard.
    fingerboard_grip_type:
      name: Jenis pegangan papan jari
      description: Menentukan jenis/material permukaan pegangan yang digunakan pada
        dek fingerboard.
    fining_agent_active_ingredient:
      name: Bahan aktif pemurni
      description: Zat penjernih atau pemurni utama yang digunakan dalam produk.
    fining_agent_type:
      name: Jenis agen pemurni
      description: Menentukan komposisi kimia atau agen penjernih/pemurnian untuk
        produk yang menjernihkan anggur merah.
    finish_after_baking:
      name: Lapisan akhir setelah dipanggang
      description: Menggambarkan tampilan permukaan tipikal setelah pengeringan/pemanggangan.
    finish_effect:
      name: Efek lapisan akhir
      description: Menjelaskan efek permukaan/optik khusus yang diterapkan pada rhinestones.
    finish_type:
      name: Jenis lapisan akhir
      description: Lapisan akhir yang diterapkan pada bodi ukulele.
    finished_product_format:
      name: Format produk jadi
      description: Menentukan jenis produk wewangian yang akan dibuat dengan kit ini.
    fire_pit_accessories_included:
      name: Aksesori tungku api yang disertakan
      description: Mencantumkan aksesori penting yang disertakan bersama lubang api,
        seperti pelindung percikan api atau batu lava, memberikan kejelasan tentang
        apa yang ada di dalam kotak.
    firework_assortment_launch_type:
      name: Jenis peluncuran beragam kembang api
      description: Menjelaskan cara menyalakan/meluncurkan kembang api yang disertakan.
    firework_assortment_types_included:
      name: Jenis-jenis kembang api yang disertakan
      description: Mengidentifikasi jenis-jenis kembang api utama yang termasuk dalam
        paket untuk membantu pembeli membandingkan isi bundel (misalnya, kembang api
        air mancur, kembang api roman candle, petasan).
    firework_effect_types:
      name: Jenis efek kembang api
      description: Kelompok efek visual dan/atau sensorik utama yang dihasilkan oleh
        rangkaian produk (pilih semua yang sesuai).
    firework_ignition_method:
      name: Metode penyalaan kembang api
      description: Menentukan bagaimana kembang api dinyalakan atau diaktifkan (misalnya,
        sumbu atau korek api listrik).
    firework_visual_intensity_level:
      name: Tingkat intensitas visual kembang api
      description: Intensitas/volume visual keseluruhan percikan api untuk efek air
        mancur.
    firing_mode:
      name: Mode penembakan
      description: Mencantumkan mode penembakan yang dapat dipilih atau utama yang
        didukung oleh senapan airsoft.
    first_day_cover_cachet_type:
      name: Jenis cap pada sampul hari pertama
      description: Jenis cap pada sampul hari pertama (misalnya, dicetak, dilukis
        tangan).
    first_day_cover_cancellation_type:
      name: Jenis pembatalan sampul hari pertama
      description: Jenis/gaya cap pos yang diterapkan pada sampul hari pertama (misalnya,
        cap mesin, cap tangan).
    first_day_cover_set_type:
      name: Jenis set sampul hari pertama
      description: Menunjukkan apakah sampul tersebut mewakili satu edisi, satu set
        lengkap, atau sebagian/kombinasi.
    fishing_hook_size:
      name: Ukuran kail pancing
      description: 'Menentukan ukuran standar kail pancing (misalnya, #4, 1/0, 10/0),
        membantu pemancing mencocokkan dimensi kail dengan spesies target dan umpan.'
    fishing_hook_style:
      name: Gaya kail pancing
      description: Mengidentifikasi desain spesifik atau pola tekukan dari kail tunggal,
        yang memengaruhi tampilan, efisiensi pengait, dan aplikasi yang dimaksudkan.
    fishing_hook_type:
      name: Jenis kail pancing
      description: Menjelaskan konfigurasi kail yang disertakan dengan umpan pancing
        (jika ada).
    fishing_line_application:
      name: Aplikasi tali pancing
      description: Mengidentifikasi tujuan penggunaan tali pancing atau bahan leader
        (misalnya, leader, mainline, tippet).
    fishing_line_buoyancy_type:
      name: Jenis daya apung tali pancing
      description: Mengklasifikasikan bagaimana perilaku senar di dalam kolom air
        (misalnya, mengapung, menengah, tenggelam), membantu pemancing memilih kedalaman
        penyajian yang sesuai.
    fishing_needle_purpose:
      name: Kegunaan jarum pancing
      description: Mengidentifikasi aplikasi utama jarum dalam tugas-tugas pemasangan
        peralatan memancing.
    fishing_needle_types_included:
      name: Jenis jarum pancing yang disertakan
      description: Mencantumkan jenis jarum atau alat perlengkapan khusus yang disertakan
        dalam set sehingga pelanggan dapat dengan cepat melihat isi kit.
    fit_profile:
      name: Profil kesesuaian
      description: Menjelaskan potongan dan siluet keseluruhan bantalan yang memengaruhi
        mobilitas dan cakupan.
    fit_volume_classification:
      name: Klasifikasi volume kesesuaian
      description: Mengkategorikan volume internal keseluruhan sepatu bot seperti
        yang dipasarkan oleh merek (misalnya, LV untuk volume rendah).
    fitting_angle:
      name: Sudut pemasangan
      description: Menentukan sudut tekukan badan pemasangan(misalnya, lurus, 45°,
        90°). Gunakan “Dapat disesuaikan/putar” untuk pemasangan dengan sudut yang
        dapat diubah dan “Lainnya” untuk sudut yang tidak umum.
    flag_base_type:
      name: Jenis dasar bendera
      description: Menentukan gaya jangkar atau dasar yang digunakan untuk mengamankan
        bendera sudut pada berbagai permukaan lapangan permainan.
    flag_design_theme:
      name: Tema desain bendera
      description: Menjelaskan tema desain utama yang diwakili pada bendera (misalnya,
        negara/nasional, tim olahraga, hari libur), mendukung penemuan dan penyaringan
        untuk belanja berbasis niat.
    flag_mounting_method:
      name: Metode pemasangan bendera
      description: Menentukan cara bendera dipasang ke kendaraan (misalnya, dudukan
        antena, dudukan pengait, magnet).
    flag_type:
      name: Jenis bendera
      description: Mengklasifikasikan tujuan atau gaya spesifik bendera golf, seperti
        bendera pin, bendera kereta golf, atau bendera latihan.
    flame_resistance_standard:
      name: Standar ketahanan api
      description: Menunjukkan standar/sertifikasi tahan api atau tahan percikan api
        spesifik yang dipenuhi oleh pakaian tersebut.
    flamenco_cajon_snare_system:
      name: Sistem snare cajon flamenco
      description: Menentukan mekanisme snare internal yang digunakan untuk menciptakan
        dengungan khas flamenco (atau tanpa dengungan sama sekali).
    flammability_compliance:
      name: Kepatuhan terhadap standar mudah terbakar
      description: Menentukan standar mudah terbakar yang berlaku yang dipenuhi oleh
        kain tersebut untuk interior kendaraan.
    flannel_brushing_finish:
      name: Lapisan akhir sikat flanel
      description: Menunjukkan apakah kain flanel tersebut disikat dan di sisi mana,
        yang memengaruhi kelembutan, kehangatan, dan penampilan.
    flannel_use_type:
      name: Jenis penggunaan flanel
      description: Aplikasi utama yang dimaksudkan untuk potongan/gulungan flanel.
    flap_configuration:
      name: Konfigurasi penutup
      description: Menentukan gaya penutup pelana, seperti penutup tunggal (monoflap)
        atau penutup ganda (twin flap).
    flare_color:
      name: Warna suar
      description: Warna cahaya/nyala api yang dipancarkan (atau warna lensa untuk
        suar LED).
    flash_card_included_features:
      name: Fitur yang disertakan dalam kartu flash
      description: Menyoroti fitur pembelajaran/penggunaan fungsional yang disertakan
        dalam kartu flash.
    flavor_intensity:
      name: Intensitas rasa
      description: Menunjukkan seberapa pekat produk perasa tersebut, membantu pengguna
        menentukan dosis yang tepat (misalnya, kekuatan standar, kekuatan super).
    flavor_solvent_base:
      name: Basis pelarut rasa
      description: Mengidentifikasi pembawa atau pelarut utama yang digunakan dalam
        bahan perasa (misalnya, alkohol, propilen glikol, gliserin).
    fleece_fiber_animal_type:
      name: Spesies hewan serat bulu domba
      description: Sumber hewan dari serat bulu domba (spesies).
    fleece_finish_surface:
      name: Lapisan akhir/permukaan bulu domba
      description: Menjelaskan permukaan/lapisan akhir kain bulu domba (misalnya,
        anti-pilling, disikat) yang memengaruhi kinerja terhadap pilling, kelembutan,
        dan penampilan.
    fleece_preparation_method:
      name: Metode persiapan bulu domba
      description: Bagaimana bulu domba dipersiapkan/diproses untuk pembuatan kerajinan
        dan pemintalan (kondisi serat).
    flesh_color:
      name: Warna daging buah
      description: Menentukan warna daging buah bagian dalam melon.
    fletching_orientation:
      name: Orientasi bulu anak panah
      description: Menentukan bagaimana bulu anak panah dipasang pada poros (misalnya,
        lurus, miring, spiral), yang memengaruhi putaran dan lintasan anak panah.
    fletching_profile:
      name: Profil bulu anak panah
      description: Menentukan bentuk geometris atau potongan bulu panah, yang memengaruhi
        hambatan udara, jarak bebas, kebisingan, dan karakteristik terbang panah secara
        keseluruhan.
    flight_system_type:
      name: Jenis sistem flight
      description: Mengidentifikasi gaya konstruksi flight yang membedakan antara
        sistem flight dan poros yang dapat dilipat, dicetak, dan terintegrasi.
    float_attachment_method:
      name: Metode pemasangan pelampung
      description: Menjelaskan cara pelampung dipasang pada tali pancing (misalnya,
        geser atau tetap), memungkinkan pemancing untuk menyaring berdasarkan gaya
        pemasangan.
    float_design:
      name: Desain pelampung
      description: Mengklasifikasikan gaya atau jenis pelampung pancing secara keseluruhan
        (misalnya, bobber, waggler, pencil) sehingga pemancing dapat dengan cepat
        memilih model yang sesuai dengan teknik dan kondisi mereka.
    float_raft_use_environment:
      name: Lingkungan penggunaan pelampung/rakit
      description: Lingkungan perairan utama yang dituju untuk produk tiup ini (kolam
        renang vs perairan terbuka yang tenang vs ombak), mencerminkan daya tahan
        dan ekspektasi desain.
    floatation:
      name: Flotasi
      description: Apakah suar tersebut dirancang untuk mengapung di air.
    floor_construction_type:
      name: Jenis konstruksi lantai
      description: Menentukan desain lantai rakit (misalnya, self-bailing, drop-stitch)
        yang memengaruhi drainase, kekakuan, dan kinerja.
    floor_design:
      name: Desain lantai
      description: Jenis penutup dasar yang disertakan dengan penutup.
    floor_inclusion:
      name: Penyertaan lantai
      description: Menyatakan apakah ruang depan tersebut memiliki lantai dan apakah
        lantai tersebut dapat dilepas.
    floor_mat_cleaning_method:
      name: Metode pembersihan alas lantai
      description: Menunjukkan metode pembersihan utama yang direkomendasikan produsen
        untuk alas lantai.
    floor_mat_edge_style:
      name: Gaya tepi alas lantai
      description: Menjelaskan apakah alas tersebut memiliki tepi/bibir yang ditinggikan
        untuk menampung tumpahan dan kotoran.
    floor_mat_format:
      name: Format alas lantai
      description: Menentukan format fisik atau gaya produk pelindung lantai (misalnya,
        alas tunggal, ubin yang saling mengunci, gulungan).
    floor_mat_retention_system:
      name: Sistem penahan alas lantai
      description: Menentukan metode yang digunakan untuk menjaga agar alas tetap
        terpasang dengan aman.
    floor_mat_set_configuration:
      name: Konfigurasi set alas lantai
      description: Menunjukkan posisi mana yang termasuk dalam paket (misalnya, hanya
        pasangan depan, set lengkap).
    floss_sugar_granulation_grade:
      name: Kelas granulasi gula benang
      description: Menjelaskan ukuran kristal campuran gula (halus, sedang, kasar),
        yang dapat memengaruhi kinerja mesin dan tekstur akhir.
    floss_sugar_product_form:
      name: Bentuk produk gula benang
      description: Menunjukkan apakah gula benang siap pakai, konsentrat rasa yang
        harus dicampur dengan gula dasar, atau gula dasar tanpa warna.
    flour_grind_texture:
      name: Tekstur gilingan tepung
      description: Menunjukkan ukuran gilingan atau tekstur tepung, seperti sangat
        halus, sedang, kasar, atau digiling dengan batu, yang dapat memengaruhi kinerja
        resep.
    flour_processing_method:
      name: Metode pengolahan tepung
      description: Mencakup metode pengolahan atau perlakuan penting yang diterapkan
        pada tepung (misalnya, digiling dengan batu, diputihkan, dikecambahkan, diperkaya)
        yang memengaruhi rasa, warna, atau nilai gizi.
    flower_care_instructions:
      name: Petunjuk perawatan bunga
      description: Memberikan rekomendasi langkah-langkah perawatan khusus untuk bunga
        potong segar (misalnya, memangkas batang, mengubah frekuensi penyiraman).
    flugelhorn_leadpipe_material:
      name: Bahan pipa utama flugelhorn
      description: Bahan komponen pipa utama (jika ditentukan terpisah dari bahan
        instrumen secara keseluruhan).
    flugelhorn_trigger_type:
      name: Jenis pemicu flugelhorn
      description: Menunjukkan apakah flugelhorn tersebut memiliki pemicu penyetel
        dan katup/slide mana yang dioperasikannya.
    fluorescence_grade:
      name: Tingkat fluoresensi
      description: Menunjukkan intensitas fluoresensi berlian saat terkena sinar UV.
    fluorescence_under_uv:
      name: Fluoresensi di bawah sinar UV
      description: Menunjukkan apakah/jenis fluoresensi apa yang ditunjukkan spesimen
        di bawah sinar ultraviolet.
    fluorocarbon_content:
      name: Kandungan fluorokarbon
      description: Menunjukkan apakah lilin tersebut mengandung aditif fluorokarbon
        dan pada kadar berapa.
    flute_case_capacity:
      name: Kapasitas wadah flute
      description: Menunjukkan apa yang dirancang untuk disimpan di dalam wadah tersebut,
        selain badan utama flute (misalnya, flute + piccolo, headjoint tambahan).
    flute_cleaning_rod_tip_type:
      name: Jenis ujung batang pembersih flute
      description: Menjelaskan desain ujung batang yang menahan kain/kapas atau bersentuhan
        dengan instrumen (misalnya, berlubang, berulir, berbentuk cincin).
    flute_footjoint_type:
      name: Jenis footjoint flute
      description: Menentukan konfigurasi footjoint flute.
    flute_headjoint_cork_type:
      name: Jenis sumbat headjoint flute
      description: Menentukan bahan/jenis rakitan sumbat/penahan headjoint yang disertakan
        dengan headjoint.
    flute_key_system:
      name: Sistem kunci seruling
      description: Mengidentifikasi sistem mekanis/kunci yang digunakan oleh flute
        (misalnya, sistem Boehm) jika berlaku.
    flute_keywork_material:
      name: Bahan kunci seruling
      description: Bahan dan/atau pelapisan tombol (mekanisme tombol), bila ditentukan
        secara terpisah dari bahan bodi.
    flute_offset_g:
      name: Flute offset G
      description: Menentukan apakah flute memiliki tata letak kunci offset G.
    flute_wall_thickness:
      name: Ketebalan dinding flute
