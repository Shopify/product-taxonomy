    tassel_trim_use_case:
      name: Contoh penggunaan hiasan rumbai
      description: Area aplikasi utama yang dituju untuk hiasan rumbai.
    taste_profile:
      name: Profil rasa
      description: Menjelaskan karakteristik rasa dominan dari varietas apel tersebut.
    tea_variety:
      name: Varietas teh
      description: Mengklasifikasikan jenis atau gaya teh atau infus tertentu (misalnya,
