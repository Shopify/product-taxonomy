    target_trainer_type:
      name: Jenis alat latihan target
      description: Mengklasifikasikan gaya atau format keseluruhan dari alat latihan
        target racquetball atau squash.
    targeted_contaminants:
      name: Kontaminan yang ditargetkan
      description: Jenis mikroba atau parasit yang terbukti dapat dihilangkan oleh
        produk ini.
    targeted_muscle_group:
      name: Kelompok otot yang ditargetkan
      description: Kelompok otot utama yang menjadi sasaran latihan atau dukungan
        otot tambahan ini.
    taro_variety:
      name: Varietas talas
      description: Menentukan kultivar, spesies, atau nama pasar dari umbi talas yang
