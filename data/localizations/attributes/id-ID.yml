    tether_strap_system:
      name: Sistem tali pengikat/tali pengaman
      description: Jenis sistem tali pengikat atau sabuk yang digunakan untuk menghubungkan
        penyangga leher ke helm/sabuk pengaman (jika ada).
    text_color:
      name: Warna teks
      description: Warna teks yang dicetak atau disulam pada label, berbeda dengan
        warna latar belakang label.
    textile_craft_machine_operation_type:
      name: Jenis pengoperasian mesin kerajinan tekstil
      description: Cara pengoperasian mesin (dioperasikan dengan tangan vs dioperasikan
        dengan kaki vs menggunakan motor/listrik).
    textile_finish_treatment:
      name: Penyelesaian/perlakuan tekstil
      description: Menentukan perlakuan permukaan penting yang diterapkan pada bahan
        tekstil.
    texture_inclusions:
      name: Inklusi tekstur
      description: Menentukan komponen tekstur tambahan, seperti daging lidah buaya,
        biji kemangi, nata de coco, popping boba, atau potongan buah.
