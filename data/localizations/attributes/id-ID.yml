    thread_type:
      name: Jenis ulir
      description: Menentukan konstruksi/jenis benang/benang sulam silang.
    thread_weight_system:
      name: Sistem berat benang
      description: Standar yang digunakan untuk menyatakan ketebalan/berat benang.
    thread_yarn_guide_mounting_attachment_style:
      name: Gaya pemasangan/penempelan pemandu benang & benang
      description: Menjelaskan cara pemakaian atau pemasangan alat bantu tersebut
