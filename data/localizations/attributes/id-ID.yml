        atau pistol pemanas) harus dicantumkan dalam instruksi atau atribut alat terkait
        jika berlaku.
    decal_orientation:
      name: Orientasi stiker
      description: Apakah stiker tersebut ditujukan untuk pemasangan di bagian dalam
        kaca atau di permukaan luar.
    decal_placement_type:
      name: Jenis penempatan stiker
      description: Menunjukkan lokasi pemasangan stiker pada kendaraan (misalnya,
        panel bodi, bemper, kap mesin).
    decal_visibility_property:
      name: Properti visibilitas stiker
      description: Sifat optik/visibilitas stiker yang dimaksudkan untuk meningkatkan
        visibilitas atau respons cahaya (misalnya, sifat reflektif, fluoresen, bercahaya
        dalam gelap, atau transparan).
    deck_concave_level:
      name: Tingkat cekungan dek
      description: Menunjukkan kedalaman atau intensitas cekungan dek (misalnya, landai,
        sedang, dalam).
    deck_flex_rating:
      name: Peringkat kelenturan dek
      description: Penilaian kualitatif terhadap fleksibilitas/kekakuan dek.
    deck_material:
      name: Bahan dek
      description: Mengidentifikasi bahan konstruksi utama dari papan skateboard.
    decoder_interface_socket_type:
      name: Antarmuka dekoder / tipe soket
      description: Tipe antarmuka dekoder digital atau konfigurasi dekoder onboard
        untuk model lokomotif.
    decoration_technique:
      name: Teknik dekorasi
      description: Mengidentifikasi metode utama yang digunakan untuk menerapkan grafis
        atau hiasan pada kaus.
    decorative_stamp_form_factor:
      name: Faktor bentuk prangko dekoratif
      description: Mengidentifikasi format fisik prangko dan cara pencetakan desainnya
        (prangko tunggal, set, rol, latar belakang, dll.).
    decorative_tape_application:
      name: Aplikasi pita dekoratif
      description: Penggunaan utama pita dekoratif dalam kerajinan tangan adalah untuk
        tujuan desain atau pemasarannya.
    decorative_tape_format:
      name: Format pita dekoratif
      description: Menentukan bagaimana pita dekoratif tersebut dipasok/dikemas untuk
        digunakan.
    decoy_buoyancy:
      name: Daya apung decoy
      description: Menjelaskan bagaimana decoy berperilaku di dalam kolom air (mengapung,
