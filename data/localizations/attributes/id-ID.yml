    map_sensor_output_signal_type:
      name: Jenis sinyal output sensor MAP
      description: Menentukan jenis sinyal output yang diberikan sensor MAP ke unit
        kontrol mesin (ECU).
    map_size_sheet:
      name: Ukuran peta (lembar)
      description: Menentukan ukuran akhir lembar peta/poster/planisfer untuk membantu
        tampilan dan kompatibilitas (ukuran bingkai, ruang dinding).
    marabou_feather_form:
      name: Bentuk bulu marabou
      description: Bentuk produk bulu marabou seperti yang dijual.
    marabou_feather_treatment:
      name: Perawatan bulu marabou
      description: Bagaimana bulu marabou diproses atau diselesaikan untuk penggunaan
        kerajinan.
    marble_track_set_feature_modules:
      name: Modul fitur set lintasan marmer
      description: Menyoroti modul fungsional khusus yang disertakan dalam set (misalnya
        lift, peluncur, sakelar).
    marine_flare_certification_standard:
      name: Sertifikasi/standar suar maritim
      description: Menunjukkan sertifikasi atau standar keselamatan maritim mana yang
        diklaim dipenuhi oleh suar tersebut.
    marine_safety_standard_compliance:
      name: Kepatuhan terhadap standar keselamatan maritim
      description: Menunjukkan standar atau persetujuan keselamatan air formal mana
