      description: Menentukan serat/bahan utama dari benang itu sendiri (bukan kain).
    thread_package_format:
      name: Format paket thread
      description: Bentuk kemasan benang jahit (misalnya, gulungan, kerucut, kumparan).
    thread_rack_compatible_spool_type:
