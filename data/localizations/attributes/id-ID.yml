    table_size_category:
      name: Kategori ukuran meja
      description: Mengkategorikan meja foosball berdasarkan ukuran keseluruhan untuk
        membantu pembeli mencocokkan ruang yang tersedia tanpa perlu menghitung ukurannya.
    table_tennis_certification:
