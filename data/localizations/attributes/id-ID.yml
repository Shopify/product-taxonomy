    scale_model_paint_status:
      name: Status pengecatan model skala
      description: Menunjukkan apakah model helikopter sudah dicat/selesai atau perlu
        dicat.
    scale_model_pose:
      name: Pose model skala
      description: Menentukan pose yang digambarkan dari model kuda untuk penyesuaian
        tampilan/diorama.
    scale_model_rotor_configuration:
      name: Konfigurasi rotor model skala
      description: Menentukan konfigurasi rotor helikopter yang digambarkan oleh model.
    scale_model_truck_era:
      name: Era truk model skala
      description: Menunjukkan era/periode waktu truk asli yang diwakili oleh model
        (berguna bagi kolektor yang mencari truk vintage vs truk modern).
    scale_model_truck_propulsion_type:
      name: Model skala tipe penggerak truk
      description: Menentukan apakah truk yang digambarkan menggunakan mesin diesel,
        bensin, listrik, hibrida, atau jenis penggerak lainnya (sesuai representasi
        model).
    scale_units:
      name: Satuan skala
      description: Satuan pengukuran yang tercetak/terukir pada balok untuk menentukan
        jari-jari/diameter.
    scent_function:
