      name: Bahan pelapis kawat manik-manik
      description: Menentukan bahan lapisan luar pada kawat manik-manik (jika ada),
        yang memengaruhi rasa, daya tahan, dan ketahanan terhadap tekukan.
    beading_wire_strand_count:
      name: jumlah untaian kawat manik-manik
      description: Menunjukkan jumlah untaian pada kawat manik-manik multi-untaian
        (misalnya, 7 untaian, 19 untaian, 49 untaian), yang memengaruhi fleksibilitas
        dan kelenturan.
    beadlock_type:
      name: Jenis beadlock
      description: Menunjukkan apakah velg tersebut beadlock dan jenisnya (membantu
        pembeli kendaraan off-road/UTV).
    beam_material:
      name: Bahan balik
      description: Bahan utama balok/batang (seringkali berbeda dari kepala/tambahan).
    beam_pattern:
      name: Pola balok
      description: Pola distribusi keluaran cahaya yang digunakan untuk penerangan
        jalan/off-road.
    bean_bag_fabric_material:
      name: Bahan kain bean bag
      description: Mengidentifikasi kain luar yang digunakan untuk bean bag yang disertakan
        dalam set tersebut.
    bean_paste_variety:
      name: Aneka pasta kacang
      description: Mengklasifikasi jenis pasta kacang tertentu berdasarkan gaya produksi
        atau bahan utama.
    bean_preparation:
      name: Persiapan kacang
      description: Menunjukkan bagaimana kacang disiapkan atau diproses sebelum dijual
        (misalnya, biji utuh, dikupas, dicincang, dikecambahkan).
    bean_variety:
      name: Varietas kacang
      description: Menentukan varietas botani atau varietas pasar dari kacang-kacangan
        (misalnya, kacang hijau, edamame, kacang panjang).
    beanie_style:
      name: Gaya topi rajut
      description: Menentukan desain, konstruksi, atau siluet keseluruhan beanie sehingga
        pembeli dapat dengan cepat memilih di antara berbagai variasi yang umum.
    bearing_clearance:
      name: Jarak bebas bantalan
      description: Menunjukkan kelas jarak radial internal bantalan (jumlah kelonggaran
        internal); kelas C0 juga disebut sebagai CN atau celah normal.
    bearing_construction_type:
      name: Jenis konstruksi bantalan
      description: Mengidentifikasi desain bantalan atau gaya konstruksi yang digunakan
        pada hub (misalnya, kartrid, bola lepas).
    bearing_edge_type:
      name: Jenis tepi bantalan
      description: Jenis/profil tepi bantalan cangkang, yang memengaruhi serangan
        dan daya tahan.
    bearing_lubrication:
      name: Pelumas bantalan
      description: Menunjukkan jenis pelumas yang diaplikasikan pada bantalan selama
        proses pembuatan, seperti gemuk atau oli.
    bearing_material:
      name: Bahan bantalan
      description: Mengidentifikasi bahan konstruksi bantalan (misalnya, baja, hibrida
        keramik), yang membantu pengendara memilih antara opsi daya tahan, biaya,
        dan kinerja.
    bearing_rating:
      name: Peringkat bantalan
      description: Menentukan toleransi bantalan atau kelas kinerja yang digunakan
        pada sepatu luncur (misalnya, ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Kode segel bantalan
      description: Menunjukkan gaya penyegelan yang digunakan pada bantalan, yang
        memengaruhi daya tahan dan hambatan gelinding.
    bearing_seal_type:
      name: Jenis segel bantalan
      description: Menentukan desain segel atau pelindung yang melindungi bagian dalam
        bantalan dari kontaminan dan memengaruhi hambatan (misalnya, 2RS, ZZ, LLU,
        terbuka).
    bearing_shield_type:
      name: Jenis pelindung bantalan
      description: Jenis pelindung atau penyegelan yang melindungi bagian dalam bantalan.
    bearing_size_code:
      name: Kode ukuran bantalan
      description: Penamaan bantalan standar (misalnya, 608, 688) yang menggabungkan
        diameter dalam, diameter luar, dan lebar.
    bearing_type:
      name: Jenis bantalan
      description: Menentukan gaya konstruksi bantalan yang digunakan pada headset.
    beater_head_material:
      name: Bahan kepala beater
      description: Menentukan bahan kontak/kepala pemukul drum bas (misalnya, kain
        felt, kayu, karet).
    beaters_included:
      name: Pemukul yang disertakan
      description: Menentukan berapa banyak pemukul yang disertakan/dipasang pada
        pedal drum (misalnya, pemukul tunggal atau ganda), atau jika tidak ada pemukul
        yang disertakan.
    bed_base_type:
      name: Jenis alas kasur
      description: Menentukan gaya struktural dari rangka tempat tidur atau divan
        (misalnya, rangka platform, rangka bilah pegas, rangka yang dapat disesuaikan).
    bed_storage_type:
      name: Jenis penyimpanan kasur
      description: Menjelaskan mekanisme penyimpanan terintegrasi pada rangka tempat
        tidur.
    bedroom_furniture_items_included:
      name: Item furnitur kamar tidur yang disertakan
      description: Menentukan setiap bagian furnitur yang termasuk dalam set kamar
        tidur (misalnya, tempat tidur, lemari pakaian, nakas), memungkinkan pembeli
        untuk dengan cepat melihat apa yang termasuk tanpa harus membaca deskripsi
        yang panjang.
    bedroom_vanity_items_included:
      name: Item meja rias kamar tidur yang disertakan
      description: Mencantumkan item-item individual yang disertakan dalam satu set
        meja rias kamar tidur sehingga pelanggan tahu persis apa yang dikirim (misalnya,
        cermin, bangku, perlengkapan pencahayaan).
    beer_based_cocktail_variety:
      name: Variasi koktail berbahan dasar bir
      description: Mengklasifikasikan koktail berbahan dasar bir berdasarkan jenisnya,
        misalnya, Radler, Shandy, Michelada.
    beet_variety:
      name: Varietas bit
      description: Menentukan kultivar atau varietas bit, membantu pembeli mengidentifikasi
        rasa, warna, dan kegunaan kuliner (misalnya, Merah, Emas, Chioggia).
    bell_actuation_mechanism:
      name: Mekanisme aktuasi lonceng
      description: Menentukan tindakan pengguna yang diperlukan untuk membunyikan
        lonceng, yang membantu pembeli memilih ergonomi yang disukai.
    bell_guard_coverage_area:
      name: Area cakupan pelindung lonceng
      description: Menunjukkan bagian lonceng mana yang dirancang untuk dilindungi
        oleh pelindung tersebut.
    bell_material:
      name: Bahan lonceng
      description: Bahan komponen lonceng (jika ditentukan secara terpisah dari bahan
        instrumen secara keseluruhan).
    bellhousing_bolt_pattern:
      name: Pola baut bellhousing
      description: Menentukan standar pola baut rumah kopling/sisi mesin atau keluarga
        pola yang digunakan oleh casing transmisi.
    bellows_material:
      name: Bahan bellow
      description: Bahan badan/penutup bellow (jika disertakan).
    bellows_orientation:
      name: Orientasi bellow
      description: Menunjukkan konfigurasi bellow yang digunakan untuk memasok udara
        ke pipa.
    belly_panel_style:
      name: Gaya panel perut
      description: Menjelaskan konstruksi ikat pinggang atau panel perut yang mengakomodasi
        perut yang membesar.
    belt_buckle_type:
      name: Jenis gesper sabuk
      description: Menjelaskan mekanisme atau desain gesper khusus yang digunakan
        pada ikat pinggang.
    beret_style:
      name: Gaya baret
      description: Mengidentifikasi desain baret atau varian budaya tertentu.
    berry_species:
      name: Spesies beri
      description: Menunjukkan spesies buah beri yang terkandung dalam produk sehingga
        pembeli dapat dengan cepat memfilter buah beri yang mereka inginkan.
    beta_casein_variant:
      name: Varian beta-kasein
      description: Menentukan varian protein beta-kasein mana (misalnya, A2) yang
        terdapat dalam susu untuk konsumen yang memiliki kekhawatiran tentang daya
        cerna.
    beverage_sweetness_level:
      name: Level kemanisan minuman
      description: Mengklasifikasi minuman berdasarkan tingkat kemanisan atau gula
        yang ditambahkan.
    bezel_graduation_units:
      name: Satuan skala bezel
      description: Menentukan penandaan satuan pada bezel putar (derajat, mil, atau
        skala ganda).
    bicycle_brake_set_components_included:
      name: Komponen set rem sepeda yang disertakan
      description: Mencantumkan komponen-komponen individual yang disertakan dalam
        kit sehingga pembeli tahu persis apa saja yang termasuk dan dapat membandingkan
        berbagai konfigurasi paket.
    bicycle_cage_mounting_position:
      name: Posisi pemasangan sangkar sepeda
      description: Menentukan lokasi pemasangan sangkar pada sepeda.
    bicycle_computer_mount_placement:
      name: Penempatan dudukan komputer sepeda
      description: Menunjukkan di mana dudukan komputer dipasang pada sepeda, misalnya
        di bagian depan setang atau di top cap setang.
    bicycle_folding_mechanism:
      name: Mekanisme pelipatan sepeda
      description: Menentukan sistem pelipatan mekanis yang digunakan pada rangka
        sepeda (misalnya, lipatan setengah, lipatan vertikal).
    bicycle_frame_design:
      name: Desain rangka sepeda
      description: Menentukan gaya keseluruhan rangka sepeda, yang memengaruhi aksesibilitas,
        kapasitas muatan, dan penyimpanan.
    bicycle_frame_style:
      name: Gaya rangka sepeda
      description: Menjelaskan gaya struktural rangka sepeda (step-through, lowrider,
        chopper stretch, dll.) yang memengaruhi postur pengendara dan estetika.
    bicycle_handlebar_type:
      name: Jenis setang sepeda
      description: Mengidentifikasi gaya atau geometri setang tertentu, yang membantu
        pengendara memilih setang yang sesuai dengan posisi berkendara dan disiplin
        mereka.
    bicycle_headset_configuration:
      name: Konfigurasi headset sepeda
      description: Menunjukkan gaya struktural atau standar headset sepeda sesuai
        dengan susunan cup-nya (misalnya, External Cup, ZeroStack, Integrated, Threaded).
    bicycle_hub_type:
      name: Jenis hub sepeda
      description: Menjelaskan mekanisme hub yang disertakan dengan roda, yang memengaruhi
        kompatibilitas sistem penggerak dan gaya berkendara.
    bicycle_lock_security_certification:
      name: Sertifikasi keamanan gembok sepeda
      description: Sertifikasi pihak ketiga independen yang memvalidasi kinerja anti-pencurian
        (misalnya, Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Jenis pedal sepeda
      description: Menentukan gaya pengoperasian atau desain pedal secara keseluruhan,
        seperti platform, varian clipless, atau hibrida, membantu pengendara memilih
        antarmuka yang tepat untuk gaya berkendara mereka.
    bicycle_propulsion_type:
      name: Jenis propulsi sepeda
      description: Menentukan bagaimana sepeda digerakkan, seperti mengayuh pedal
        secara manual, bantuan listrik, atau tenaga mesin pembakaran internal.
    bicycle_pump_type:
      name: Jenis pompa sepeda
      description: Mengidentifikasi gaya struktural pompa, yang membantu pembeli memilih
        desain yang paling sesuai dengan kebutuhan berkendara, penyimpanan, atau keadaan
        darurat mereka.
    bicycle_rack_mounting_type:
      name: Jenis pemasangan rak sepeda
      description: Menjelaskan metode atau lokasi utama yang digunakan untuk memasang
        rak ke sepeda, membantu pengguna dalam memastikan kompatibilitas dengan rangka
        dan perangkat keras mereka.
    bicycle_suspension_type:
      name: Jenis suspensi sepeda
      description: Mengidentifikasi keberadaan dan konfigurasi suspensi pada sepeda.
    bicycle_tire_tread_pattern:
      name: Pola tapak ban sepeda
      description: Menentukan gaya tapak ban, yang memengaruhi traksi dan hambatan
        gelinding pada berbagai permukaan.
    bidirectional_charging_capability:
      name: Kemampuan pengisian daya dua arah
      description: Menunjukkan apakah kendaraan listrik mendukung mode pengisian daya
        dua arah seperti V2G dan/atau V2H.
    bike_rack_mounting_style:
      name: Gaya pemasangan rak sepeda
      description: Bagaimana sepeda ditopang/diamankan oleh rak.
    bike_rack_tilt_function:
      name: Fungsi kemiringan rak sepeda
      description: Apakah ada/apa fungsi kemiringan yang tersedia untuk mengakses
        area kargo belakang saat rak terpasang.
    bikini_top_style:
      name: Model atasan bikini
      description: Menentukan desain atau potongan bagian atas bikini, membantu pembeli
        menemukan ukuran dan siluet yang disukai.
    billiard_brush_type:
      name: Jenis sikat biliar
      description: Menentukan gaya spesifik alat pembersih meja biliar (misalnya,
        sikat meja, sikat rel, balok pembersih).
    billiard_glove_finger_coverage:
      name: Pelindung jari sarung tangan biliar
      description: Mengidentifikasi jari mana yang tertutup oleh desain sarung tangan,
        memberikan penyaringan yang tepat untuk gaya sarung tangan khusus biliar.
    billiard_pocket_style:
      name: Gaya kantong biliar
      description: Menentukan gaya struktural atau estetika kantong, yang memengaruhi
        kompatibilitas dan dekorasi meja.
    billiard_rack_style:
      name: Gaya rak biliar
      description: Menjelaskan gaya fisik atau mekanisme rak (misalnya, rangka tradisional,
        lembaran templat, dapat dilipat).
    billiard_table_type:
      name: Jenis meja biliar
      description: Menentukan disiplin olahraga biliar atau gaya penggunaan yang dirancang
        untuk meja tersebut (misalnya, pool, snooker, carom).
    billiards_discipline:
      name: Disiplin biliar
      description: Menunjukkan variasi olahraga biliar (jenis permainan) spesifik
        yang ditujukan atau kompatibel dengan produk tersebut.
    binding_compatibility_standard:
      name: Standar kompatibilitas pengikatan
      description: Mengidentifikasi antarmuka pengikat (norma sol) yang telah disertifikasi
        untuk sepatu ski, yang memastikan pemasangan yang aman dan tepat dengan pengikat
        ski.
    binding_inclusion:
      name: Inklusi pengikat
      description: Menentukan apakah ski dijual tanpa pengikat, dengan sistem terintegrasi,
        atau dengan pengikat terpisah.
    binding_interface:
      name: Antarmuka pengikat
      description: Menunjukkan pelat pengikat atau standar antarmuka yang telah dipasang
        sebelumnya pada ski atau yang kompatibel dengannya, untuk memastikan kompatibilitas
        sepatu/pengikat.
    binding_liner_type:
      name: Jenis lapisan pengikat
      description: Menjelaskan gaya lapisan dalam yang digunakan pada pengikat/sepatu
        (misalnya, dapat dilepas, dapat digunakan untuk berjalan, dapat dibentuk dengan
        panas).
    binding_mounting_system:
      name: Sistem pemasangan pengikat
      description: Mengidentifikasi antarmuka yang digunakan untuk memasang pengikat
        ke ski (pemasangan datar, rel/jalur, pelat, dll.).
    binding_position:
      name: Posisi binding
      description: Menunjukkan posisi atau konfigurasi pemasangan yang dimaksudkan
        untuk pengikat (misalnya, sepatu depan, sepatu belakang, ARTP).
    binding_strap_position:
      name: Posisi tali pengikat
      description: Menentukan di bagian pengikat mana tali pengikat tersebut akan
        dipasang.
    bingo_components_included:
      name: Komponen bingo yang disertakan
      description: Mencantumkan komponen yang disertakan dalam paket permainan bingo,
        seperti bola bingo, kartu, dan penanda.
    bingo_number_range:
      name: Rentang angka bingo
      description: Mengidentifikasi rentang/varian angka bingo yang didukung oleh
        set tersebut.
    bingo_set_features:
      name: Fitur set Bingo
      description: Mengidentifikasi format produk utama dari perangkat bingo (fisik/manual
        vs elektronik/interaktif).
    bipod_mounting_interface:
      name: Antarmuka pemasangan bipod
      description: Menentukan antarmuka pemasangan yang digunakan untuk menghubungkan
        bipod ke senjata api atau sistem rel.
    bit_attachment_type:
      name: Jenis sambungan bit
      description: Menentukan bagaimana tali kekang terhubung ke kekang (misalnya,
        ujung tali, ujung gesper, ujung sekrup Chicago).
    bit_mouthpiece_design:
      name: Desain corong mulut anjing
      description: Mengidentifikasi gaya struktural atau konfigurasi sambungan mouthpiece,
        yang mengatur distribusi tekanan, jarak bebas langit-langit mulut, dan tingkat
        keparahan secara keseluruhan.
    bit_ring_style:
      name: Gaya cincin bit
      description: Menentukan gaya bagian pipi atau cincin pada kekang yang terhubung
        ke tali kendali, memengaruhi aksi, panduan lateral, dan rasa kendali.
    bladder_material:
      name: Bahan kantung udara
      description: Mengidentifikasi bahan yang digunakan untuk kantong bagian dalam
        yang menampung udara.
    blade_attachment_type:
      name: Jenis sambungan bilah
      description: Menunjukkan apakah sepatu luncur menggunakan mekanisme engsel (clap)
        atau dudukan bilah tetap.
    blade_finish_coating:
      name: Finis/pelapis bilah
      description: Perlakuan permukaan yang diterapkan pada mata pisau untuk tujuan
        estetika atau perlindungan terhadap korosi.
    blade_hosel_type:
      name: Jenis hosel bilah
      description: Menentukan gaya sambungan hosel bilah yang masuk ke poros, yang
        memengaruhi kompatibilitas (misalnya, Standar atau Tapered).
    blade_length_type:
      name: Jenis panjang bilah
      description: Mengklasifikasi panjang bilah sirip sebagai pendek, sedang, atau
        panjang, yang masing-masing memengaruhi irama tendangan dan tujuan latihan.
    blade_lie:
      name: Sudut letak bilah
      description: Menentukan angka lie pada bilah tongkat hoki, yang menunjukkan
        posisi bilah di atas es relatif terhadap porosnya.
    blade_sharpness:
      name: Ketajaman bilah
      description: Menunjukkan apakah mata pisau senjata diasah atau tumpul untuk
        keperluan latihan.
    blade_size_category:
      name: Kategori ukuran mata pisau
      description: Kode ukuran bilah pedang internasional terstandardisasi (0–5) digunakan
        untuk membedakan bilah pedang untuk remaja dan dewasa.
    blade_size_class:
      name: Kelas ukuran mata pisau
      description: Mengklasifikasi bilah berdasarkan konvensi ukuran pemain, mencocokkan
        ukuran poros seperti Youth, Junior, Intermediate, atau Senior.
    blade_size_number:
      name: Nomor ukuran bilah
      description: Kode ukuran numerik standar (0–5) yang ditentukan oleh peraturan
        anggar yang menentukan panjang bilah dan kelayakan kelompok usia.
    blaster_mechanism:
      name: Mekanisme blaster
      description: Menjelaskan mekanisme pengoperasian internal dari gel blaster (misalnya,
        GBB, AEG, pegas).
    block_edge_style:
      name: Gaya tepi blok
      description: Menjelaskan bagaimana finis tepi/sudut balok kayu untuk memberikan
        rasa dan keamanan.
    blocking_mat_features:
      name: Fitut matras pemblokir
      description: Fitur fungsional khusus untuk alas penahan (penyimpanan, portabilitas,
        kegunaan).
    blocking_mat_grid_unit:
      name: Unit kisi alas penahan
      description: Sistem satuan yang digunakan pada kisi tercetak, yang membantu
        pengguna mencocokkan pola dan ukuran.
    blocking_mat_surface_markings:
      name: Memblokir tanda permukaan alas
      description: Jenis tanda pengukuran/panduan yang dicetak atau dibentuk pada
        permukaan alas.
    blocking_wire_coating:
      name: Lapisan kawat penghalang
      description: Perlakuan/pelapisan permukaan pada kawat penahan yang memengaruhi
        ketahanan terhadap karat, kehalusan, dan risiko tersangkut.
    blocking_wire_end_cap_type:
      name: Jenis penutup ujung kawat penahan
      description: Menentukan jenis perlindungan/pelapisan ujung yang digunakan pada
        ujung kawat penahan untuk keselamatan dan perlindungan kain.
    blocking_wire_set_includes:
      name: Set kawat penahan termasuk
      description: Menentukan komponen mana yang disertakan dengan produk kawat penahan
        (misalnya, T-pin, tabung penyimpanan).
    blocking_wire_usage:
      name: Penggunaan kawat penghalang
      description: Penggunaan utama yang menjadi tujuan perancangan kawat penahan
        fleksibel.
    bloom_stage:
      name: Tahap mekar
      description: Menunjukkan seberapa terbuka kelopak bunga daisy saat pengiriman/pendistribusian.
    blower_motor_bearing_type:
      name: Jenis bantalan motor blower
      description: Menentukan desain bantalan yang digunakan pada motor blower.
    blower_motor_mounting_position:
      name: Posisi pemasangan motor blower
      description: Lokasi pemasangan motor blower di modul HVAC/kendaraan (misalnya,
        depan, belakang).
    blowpipe_valve_type:
      name: Jenis katup blowpipe
      description: Menentukan jenis katup blowpipe yang disertakan (jika ada).
    bo_staff_style:
      name: Gaya tongkat Bo
      description: Menentukan gaya struktural atau konstruksi tongkat (misalnya, lurus,
        meruncing, berlapis busa, dapat dilipat).
    board_game_theme:
      name: Tema permainan papan
      description: Tema naratif/latar belakang permainan papan (digunakan untuk penemuan
        dan penelusuran).
    board_rail_shape:
      name: Bentuk rel papan
      description: Menentukan kontur rel papan (misalnya, lunak, keras, 50/50) yang
        memengaruhi daya cengkeram dan dorongan di atas gelombang.
    board_size_classification:
      name: Klasifikasi ukuran papan
      description: Mengklasifikasikan papan atau set permainan cornhole ke dalam ukuran
        standar yang umum.
    board_type_compatibility:
      name: Kompatibilitas jenis papan
      description: Menentukan jenis papan yang sesuai untuk tali pengaman tersebut.
    boat_construction_type:
      name: Jenis konstruksi perahu
      description: Menjelaskan gaya atau format struktural perahu dayung (misalnya,
        tiup, kaku).
    boat_hook_flotation:
      name: Pelampung pengait perahu
      description: Menunjukkan apakah galah perahu dirancang untuk mengapung jika
        dijatuhkan ke dalam air.
    boat_ladder_stowage_style:
      name: Gaya penyimpanan tangga perahu
      description: Menjelaskan cara penyimpanan tangga saat tidak digunakan (misalnya,
        dilipat, ditarik, dilepas).
    boat_trailer_construction_type:
      name: Jenis konstruksi trailer perahu
      description: Menunjukkan apakah trailer menopang perahu dengan bantalan, rol,
        atau sistem hibrida.
    boat_weaving_shuttle_weft_exit_type:
      name: Jenis keluaran benang pakan pada alat tenun anyaman perahu
      description: Bagaimana benang pakan keluar dari alat tenun saat proses menenun.
    bobbin_loading_type:
      name: Jenis pemuatan kumparan
      description: Menentukan cara memasukkan/memuat kumparan benang ke dalam mesin
