    sand_shovel_handle_style:
      name: Gaya gagang sekop pasir
      description: Menggambarkan bentuk pegangan di ujung gagang sekop/cangkul.
    sand_toy_set_pieces_included:
      name: Termasuk set mainan pasir
      description: Mencantumkan jenis komponen mainan pasir yang termasuk dalam set
