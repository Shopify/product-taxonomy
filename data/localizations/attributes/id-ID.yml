    sandbox_bottom_type:
      name: Jenis dasar kotak pasir
      description: Jenis konstruksi dasar/lantai yang digunakan di bawah pasir.
    sandbox_drainage_type:
      name: Jenis drainase kotak pasir
      description: Cara kotak pasir mengalirkan air (jika ada), seperti lubang pembuangan
