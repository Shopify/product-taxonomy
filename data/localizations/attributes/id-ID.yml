    thrower_operation_type:
      name: Jenis pengoperasian pelempar
      description: Mengklasifikasikan gaya mekanis/pengoperasian mesin pelempar untuk
        penyaringan cepat antara mekanisme manual dan otomatis.
    thumb_design:
      name: Desain ibu jari
      description: Menjelaskan bagaimana ibu jari terintegrasi ke dalam sarung tangan,
