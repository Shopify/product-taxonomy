    water_sensor_design:
      name: Desain sensor air
      description: Menentukan gaya fisik elemen pendeteksi air.
    water_supply_type:
      name: Jenis pasokan air
      description: Mengidentifikasi bagaimana alat menerima air, membedakan antara
        wadah pengisian manual dan saluran air yang terpasang permanen.
    watering_needs:
      name: Kebutuhan penyiraman
      description: Menjelaskan kebutuhan air tipikal tanaman.
    wax_paper_form:
      name: Bentuk kertas lilin
      description: Menentukan apakah kertas lilin dijual dalam bentuk gulungan kontinu
