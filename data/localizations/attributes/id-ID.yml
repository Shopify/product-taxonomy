      description: Menentukan peringkat musim tenda, menunjukkan kesesuaiannya untuk
        berbagai kondisi cuaca (misalnya 3 musim, 4 musim, 5 musim/ekspedisi).
    seasoning_variety:
      name: Variasi bumbu
      description: Mengklasifikasikan bumbu berdasarkan cara penyajian atau penggunaan
        kuliner tradisionalnya.
    seat_adjustment_power_type:
      name: Jenis tenaga penyesuaian kursi
      description: Menentukan cara kerja mekanisme pengaturan kursi (tuas manual vs
