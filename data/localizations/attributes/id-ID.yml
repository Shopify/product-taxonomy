    mannequin_style:
      name: Gaya manekin
      description: Menjelaskan desain struktural atau gaya konstruksi manekin pelatihan.
    manufacturing_process:
      name: Proses manufaktur
      description: Metode produksi utama badan gulungan atau kumparan (misalnya, dengan
