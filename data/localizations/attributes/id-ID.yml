    timing_component_material:
      name: Bahan komponen pengatur waktu
      description: Bahan utama komponen penggerak waktu (kompon sabuk, logam rantai/roda
        gigi, bahan penutup).
    tin_whistle_body_material:
      name: bahan badan peluit timah
      description: Mencantumkan bahan-bahan umum untuk badan peluit timah secara lebih
