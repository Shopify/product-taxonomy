      description: Bahan ruang udara/badan melodika (ABS, kayu, dll.) yang digunakan
        penjual untuk membedakannya dari bagian lain.
    melodica_included_accessories:
      name: Termasuk aksesori Melodica
      description: Termasuk aksesori Melodica di dalam kotak.
    melodica_key_color_scheme:
      name: Skema warna tuts melodika
      description: Skema warna tuts (bukan bodi), yang memengaruhi keterbacaan (terutama
        untuk anak-anak/pemula).
    melodica_mouthpiece_configuration:
      name: Konfigurasi mouthpiece melodika
      description: Menunjukkan antarmuka tiup mana yang disertakan/digunakan untuk
        memainkan melodika.
    melodica_mouthpiece_type:
      name: Jenis mouthpiece melodika
      description: Gaya antarmuka tiup yang disertakan dengan melodika (mouthpiece
        dan/atau selang fleksibel).
    melodica_reed_plate_material:
      name: Bahan pelat reed melodica
      description: Bahan pelat reed (berbeda dengan bahan badan instrumen secara keseluruhan),
        yang dapat memengaruhi daya tahan dan nada.
    melodica_size_class:
      name: Kelas ukuran melodika
      description: Klasifikasi ukuran/portabilitas umum untuk melodika, biasanya berdasarkan
        pengelompokan jumlah tuts dan faktor bentuk (misalnya, model mini/pelajar
        vs standar vs jangkauan lebih luas).
    melon_variety:
      name: Varietas melon
      description: Menentukan jenis melon spesifik dalam produk untuk membantu pembeli
        dengan cepat mengidentifikasi varietas yang mereka sukai.
    memory_foam_infusion_material:
      name: Bahan infusi busa memori
      description: Mengidentifikasi zat khusus yang diinfusikan ke dalam busa memori
        untuk pendinginan, pengendalian bau, atau tujuan antimikroba.
    memory_wire_gauge:
      name: Ukuran kawat memori
      description: Menentukan ukuran American Wire Gauge (AWG) dari kawat memori.
    memory_wire_project_size:
      name: Ukuran proyek kawat memori
      description: Menentukan bentuk perhiasan/ukuran gulungan yang dimaksudkan untuk
        kawat memori (misalnya, gelang, kalung, cincin).
    metal_purity:
      name: Kemurnian logam
      description: Menunjukkan tingkat kemurnian atau kadar logam yang digunakan dalam
        perhiasan, biasanya dinyatakan dalam karat (K) atau bagian per seribu.
    metrics_counted:
      name: Metrik yang dihitung
      description: Mencantumkan statistik atau peristiwa individual yang dirancang
        untuk dilacak oleh penghitung.
    metronome_display_style:
      name: Gaya tampilan metronom
      description: Menentukan bagaimana tempo ditampilkan/diindikasikan kepada pengguna
        (jarum/bandul vs LED/LCD numerik vs lampu berkedip).
    metronome_output_method:
      name: Metode output metronom
      description: Menentukan metode output yang tersedia untuk sinyal suara/ketukan
        metronom.
    microphone_toy_feature_set:
      name: Set fitur mainan mikrofon
      description: Kapabilitas utama mikrofon mainan yang berfokus pada permainan
        (efek suara, amplifikasi, perekaman, dll.).
    midi_output_type:
      name: Jenis output MIDI
      description: Menentukan jenis output MIDI yang disediakan oleh modul pemicu.
    military_branch:
      name: Cabang militer
      description: Menunjukkan cabang militer tempat seragam dikeluarkan atau yang
        menjadi inspirasinya.
    milk_base_type:
      name: Jenis bahan dasar susu
      description: Menentukan jenis susu atau alternatif susu utama yang digunakan
        dalam minuman, jika ada.
    milk_feeding_method:
      name: Metode pemberian susu
      description: Menunjukkan bagaimana hewan sumber diberi makan (misalnya, diberi
        makan rumput atau biji-bijian), yang dapat memengaruhi rasa dan profil nutrisi.
    milk_processing_method:
      name: Metode pengolahan susu
      description: Menentukan perlakuan atau teknik pengolahan yang dilakukan pada
        susu, yang memengaruhi keamanan, daya tahan, dan sifat nutrisinya.
    milk_source_animal:
      name: Hewan penghasil susu
      description: Mengidentifikasi hewan dari mana susu diperoleh, yang membantu
        konsumen memilih susu sapi, kambing, kerbau, atau susu dari hewan lainnya.
    millet_processing_method:
      name: Metode pengolahan millet
      description: Menunjukkan metode pengolahan utama atau kondisi biji millet (misalnya,
        belum dipoles, dikupas, atau dikecambahkan).
    millet_variety:
      name: Varietas millet
      description: Mengidentifikasi jenis biji millet spesifik yang terkandung dalam
        produk (misalnya, pearl, foxtail, finger).
    milling_process:
      name: Proses penggilingan
      description: Menunjukkan metode produksi yang digunakan untuk menggiling tepung,
        yang dapat memengaruhi rasa, paparan panas, dan profil nutrisi.
    mint_mark:
      name: Tanda pencetak
      description: Tanda pencetak koin seperti yang terlihat pada koin (jika ada).
    mirror_configuration:
      name: Konfigurasi cermin
      description: Menentukan gaya atau struktur cermin yang disertakan dalam set
        meja rias.
    mirror_coverage:
      name: Cakupan cermin
      description: Menjelaskan luasnya panel cermin pada pintu geser.
    mirror_curvature_type:
      name: Jenis kelengkungan cermin
      description: Menentukan apakah permukaan cermin cembung, datar, atau cekung,
        yang memengaruhi bidang pandang.
    mirror_mounting_location:
      name: Lokasi pemasangan kaca spion
      description: Menentukan kaca spion akan dipasang di bagian mana sepeda atau
        pengendara
    mirror_shape:
      name: Bentuk cermin
      description: Menunjukkan bentuk geometris atau gaya cermin utama yang termasuk
        dalam set meja rias.
    mix_ratio:
      name: Rasio campuran
      description: Menentukan rasio pengenceran cairan pendingin terhadap air yang
        direkomendasikan (untuk konsentrat), atau mengonfirmasi rasio premix tetap
        untuk produk yang sudah diencerkan.
    mma_glove_type:
      name: Jenis sarung tangan MMA
      description: Menunjukkan tujuan utama penggunaan atau gaya sarung tinju dalam
        latihan atau kompetisi MMA.
    mobility_features:
      name: Fitur mobilitas
      description: Menunjukkan elemen pergerakan atau portabilitas bawaan seperti
        roda atau kaki yang dapat dilipat.
    model_aircraft_assembly_level:
      name: Tingkat perakitan model pesawat terbang
      description: Menunjukkan berapa banyak perakitan yang dibutuhkan sebelum pesawat
        terbang dapat digunakan.
    model_making_kit_items_included:
      name: Perlengkapan pembuatan model yang disertakan
      description: Mencantumkan apa saja yang termasuk dalam kit atau paket pembuatan
        model (misalnya, cat, lem, kuas).
    model_making_product_type:
      name: Jenis produk pembuatan model
      description: Mengidentifikasi apa sebenarnya item tersebut dalam pembuatan model
        (kit, aksesori, alat, atau perlengkapan) untuk meningkatkan penelusuran dan
        penyaringan di antara berbagai jenis produk dalam Pembuatan Model.
    model_rocket_kit_contents:
      name: Isi kit roket model
      description: Menunjukkan apakah produk merupakan kit roket model multi-tahap
        lengkap atau kit tambahan/modul/komponen (misalnya, komponen tahap pendorong
        atau penopang).
    model_rocket_kit_format:
      name: Format kit roket model
      description: Menentukan apakah roket dijual dalam bentuk kit dan tingkat kesiapan
        perakitannya.
    model_rocket_motor_impulse_class:
      name: Kelas impuls motor roket model
      description: Menunjukkan kelas impuls total motor roket model standar (misalnya,
        A, B, C ...).
    model_rocket_motor_mount_size:
      name: Ukuran dudukan motor roket model
      description: Menentukan diameter casing motor yang dirancang untuk diterima
        oleh dudukan motor roket.
    model_rocket_power_source_required:
      name: Sumber daya untuk roket model yang diperlukan
      description: Menunjukkan apakah produk memerlukan baterai/daya eksternal, dan
        jenisnya.
    model_rocket_propellant_type:
      name: Jenis propelan roket model
      description: Mengidentifikasi sistem propelan/mesin yang digunakan untuk penggerak
        pada produk roket model.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Ukuran batang atau rel peluncur yang direkomendasikan untuk roket model
      description: Menentukan diameter batang peluncur atau ukuran rel yang dirancang
        untuk roket (misalnya, batang 1/8 inci, rel peluncur 1010).
    model_rocket_recovery_method:
      name: Metode pemulihan roket model
      description: Sistem pemulihan utama yang digunakan untuk mengembalikan roket
        dengan aman setelah penerbangan.
    model_rocket_recovery_system_type:
      name: Jenis sistem pemulihan roket model
      description: Menentukan metode pemulihan utama yang digunakan untuk mengembalikan
        roket dengan aman setelah penerbangan.
    model_rocket_staging:
      name: Tahapan roket model
      description: Menunjukkan jumlah tahap bermotor yang dirancang untuk diterbangkan
        oleh roket model.
    model_train_accessory_electrical_connection_type:
      name: Jenis koneksi listrik aksesori kereta model
      description: Menentukan gaya konektor atau terminal yang digunakan untuk menghubungkan
        aksesori kereta model bermotor ke tata letak (bila berlaku).
    model_train_coupler_type:
      name: Jenis coupler kereta model
      description: Menentukan standar coupler yang terpasang pada gerbong atau lokomotif
        kereta model.
    model_train_gauge:
      name: Gauge kereta model
      description: Menentukan sistem ukuran rel kereta api model yang ditujukan untuk
        aksesori (bila berlaku), yang membantu memastikan kecocokan fisik dengan rel
        dan tata letak pengguna.
    model_train_lighting_features:
      name: Fitur pencahayaan kereta model
      description: Menentukan fungsi pencahayaan yang disertakan pada kereta/lokomotif
        model.
    model_train_power_pickup_method:
      name: Metode pengambilan daya kereta model
      description: Menentukan bagaimana model menerima daya untuk beroperasi (daya
        rel, baterai, dll.).
    model_train_scale:
      name: Skala kereta api model
      description: Menentukan standar skala/ukuran kereta model (hubungan antara model
        dan kereta asli).
    model_train_sound_features:
      name: Fitur suara kereta model
      description: Menunjukkan apakah model menyertakan efek suara onboard dan jenis
        penawaran suara apa yang dimilikinya.
    model_train_track_gauge:
      name: Ukuran rel kereta model
      description: Menentukan ukuran rel/standar sistem rel yang dirancang untuk digunakan
        model (misalnya, ukuran Standar, varian ukuran Sempit, atau ukuran khusus
        merek/sistem bilamana berlaku).
    modeling_dough_base_material:
      name: Bahan dasar adonan pemodelan
      description: Bahan dasar/komposisi utama adonan pemodelan (misalnya, berbasis
        gandum/tepung vs berbasis polimer).
    modeling_dough_features:
      name: Fitur adonan pemodelan
      description: Karakteristik fungsional utama dari adonan pemodelan yang umumnya
        difilter oleh pembeli.
    modification_level:
      name: Tingkat modifikasi
      description: Menunjukkan tingkat modifikasi malt (seberapa menyeluruh endosperma/protein
        jelai dipecah), yang sering diringkas sebagai kurang dimodifikasi/dimodifikasi/dimodifikasi
        berlebih.
    molasses_base_ingredient:
      name: Bahan dasar molase
      description: Mengidentifikasi sumber tanaman atau buah utama dari mana molase
        diproduksi.
    molasses_grade:
      name: Grade molase
      description: Mengklasifikasi molase berdasarkan tahap ekstraksi/pemurnian, yang
        secara langsung memengaruhi intensitas rasa, warna, dan profil nutrisi.
    mold_material:
      name: Bahan cetakan
      description: Komposisi material utama dari cetakan itu sendiri (misalnya, silikon,
        plastik, logam).
    molle_compatibility:
      name: Kompatibilitas MOLLE
      description: Menunjukkan apakah rompi menyediakan anyaman MOLLE/PALS untuk memasang
        kantong modular dan aksesori.
    motor_belt_type:
      name: Jenis sabuk motor
      description: Menentukan desain/profil sabuk yang digunakan dalam sistem penggerak
        treadmill.
    motor_configuration:
      name: Konfigurasi motor
      description: Menunjukkan berapa banyak motor penggerak independen yang digunakan
        skuter.
    motor_mounting_configuration:
      name: Konfigurasi pemasangan motor
      description: Menjelaskan cara pemasangan/implementasi motor pada kit konversi
        untuk skuter.
    motor_mounting_position:
      name: Posisi pemasangan motor
      description: Menunjukkan di mana motor dipasang pada skuter listrik, seperti
        hub roda depan, hub roda belakang, hub roda ganda, atau penggerak tengah.
    motor_position:
      name: Posisi motor
      description: Menunjukkan lokasi motor pada sepeda listrik, yang memengaruhi
        pengendalian dan perawatan.
    motor_vehicle_a_v_integration_features:
      name: Fitur integrasi audio/video kendaraan bermotor
      description: Fitur integrasi in-vehicle dan smartphone yang didukung oleh head
        unit (misalnya, Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Aplikasi/posisi bohlam kendaraan bermotor
      description: Menentukan posisi atau fungsi pencahayaan kendaraan yang dimaksudkan
        sesuai dengan desain bohlam (misalnya, lampu dekat, lampu rem).
    motor_vehicle_bulb_approval_standard:
      name: Standar persetujuan bohlam kendaraan bermotor
      description: Menunjukkan tanda kepatuhan/persetujuan peraturan untuk penggunaan
        jalan di pasar sasaran.
    motor_vehicle_oxygen_sensor_bank:
      name: Bank sensor oksigen kendaraan bermotor
      description: Menunjukkan bank silinder mesin mana tempat sensor oksigen dipasang
        (misalnya, Bank 1 vs Bank 2) untuk mesin tipe V/boxer; Tidak berlaku untuk
        mesin inline.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Jumlah kabel sensor oksigen kendaraan bermotor
      description: Jumlah kabel pada rangkaian sensor oksigen.
    motor_vehicle_oxygen_sensor_position:
      name: Posisi sensor oksigen kendaraan bermotor
      description: Menentukan di mana sensor oksigen (O2) dipasang dalam sistem pembuangan
        relatif terhadap konverter katalitik.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Nomor sensor oksigen kendaraan bermotor
      description: Menunjukkan nomor sensor (misalnya, Sensor 1 atau Sensor 2) dalam
        penunjukan bank/posisi tertentu.
    motor_vehicle_oxygen_sensor_type:
      name: Jenis sensor oksigen kendaraan bermotor
      description: Menentukan desain/teknologi sensor oksigen.
    motor_vehicle_paint_application_method:
      name: Metode pengaplikasian cat kendaraan bermotor
      description: Cara cat dimaksudkan untuk diaplikasikan ke permukaan kendaraan.
    motor_vehicle_paint_system_step:
      name: Langkah sistem pengecatan kendaraan bermotor
      description: Menunjukkan tahapan atau komponen mana dalam sistem pengecatan
        ulang otomotif yang ditujukan untuk produk tersebut (misalnya, primer, basecoat,
        clearcoat).
    motor_vehicle_speaker_mounting_type:
      name: Jenis pemasangan speaker kendaraan bermotor
      description: Cara pemasangan speaker yang tepat di dalam kendaraan (faktor bentuk
        pemasangan).
    motor_vehicle_subwoofer_size:
      name: Ukuran subwoofer kendaraan bermotor
      description: Diameter nominal driver subwoofer (misalnya, 8 inci, 10 inci, 12
        inci), yang digunakan untuk menyesuaikan ruang kendaraan dan kompatibilitas
        kotak speaker.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfigurasi kumparan suara subwoofer kendaraan bermotor
      description: Jumlah/konfigurasi kumparan suara yang digunakan untuk mencocokkan
        opsi pengabelan amplifier (misalnya, SVC vs DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedansi kumparan suara subwoofer kendaraan bermotor (per kumparan)
      description: Nilai impedansi setiap kumparan suara (bukan beban akhir setelah
        dirangkai), yang digunakan untuk perhitungan pengabelan.
    motor_vehicle_voltage_regulator_type:
      name: Jenis regulator tegangan kendaraan bermotor
      description: Menunjukkan teknologi/bentuk regulator yang digunakan pada kendaraan
        bermotor.
    motorcycle_armor_certification_standard:
      name: Standar sertifikasi kendaraan bermotor
      description: Menunjukkan standar keselamatan formal yang telah disertifikasi
        untuk pelindung (misalnya, EN 1621-2 untuk pelindung punggung, EN 1621-3 untuk
        dada).
    motorcycle_cover_size_class:
      name: Kelas ukuran penutup sepeda motor
      description: Ember berukuran standar untuk penutup penyimpanan sepeda motor
        berdasarkan kategori/rentang panjang sepeda motor yang sesuai.
    motorcycle_glove_certification_standard:
      name: Standar sertifikasi sarung tangan sepeda motor
      description: Menentukan sertifikasi/standar perlindungan yang dipenuhi oleh
        sarung tangan (misalnya, tingkat EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Konstruksi sarung tangan sepeda motor tahan air
      description: Menentukan jenis metode kedap air yang digunakan pada sarung tangan
        (jika ada).
    motorcycle_guard_coverage_area:
      name: Area cakupan pelindung sepeda motor
      description: Area cakupan utama yang disediakan oleh produk (siku, pergelangan
        tangan, lengan bawah, kombinasi).
    motorcycle_kidney_belt_construction_type:
      name: Jenis konstruksi sabuk ginjal sepeda motor
      description: Gaya konstruksi sabuk ginjal yang memengaruhi kekakuan, aliran
        udara, dan perlindungan.
    motorcycle_kidney_belt_purpose:
      name: Tujuan sabuk ginjal sepeda motor
      description: Mengidentifikasi gaya atau skenario berkendara utama yang menjadi
        target desain sabuk ginjal sepeda motor.
    motorcycle_luggage_capacity_class:
      name: Kelas kapasitas bagasi sepeda motor
      description: Menunjukkan kapasitas volume bagasi sepeda motor, yang dinyatakan
        dalam kisaran liter.
    motorcycle_luggage_mounting_system:
      name: Sistem pemasangan bagasi sepeda motor
      description: Sistem pemasangan/pengikat yang digunakan untuk mengamankan tas/pannier
        ke sepeda motor (misalnya, tali pengikat gantung, sistem pelepas cepat yang
        dipasang pada rak).
    motorcycle_luggage_side:
      name: Sisi bagasi sepeda motor
      description: Untuk tas samping/tas sadel, menunjukkan apakah barang tersebut
        untuk sisi kiri, sisi kanan, atau sepasang/satu set.
    motorcycle_protective_gear_size_system:
      name: Sistem ukuran perlengkapan pelindung sepeda motor
      description: Menunjukkan sistem ukuran yang digunakan pada produk (misalnya,
        ukuran alfabet, numerik, satu ukuran).
    motorcycle_rack_carrier_style:
      name: Gaya pembawa rak sepeda motor
      description: Menjelaskan gaya pengangkut fungsional untuk mengangkut sepeda
        motor atau skuter (platform vs rel vs bantuan pengangkat, dll.).
    motorcycle_riding_discipline:
      name: Disiplin berkendara sepeda motor
      description: Mengidentifikasi disiplin berkendara/penggunaan utama yang menjadi
        tujuan desain penyangga leher.
    motorcycle_tire_speed_rating:
      name: Peringkat kecepatan ban motor
      description: Mengidentifikasi kecepatan maksimum berkelanjutan yang mampu ditahan
        oleh ban, menggunakan kode huruf standar (misalnya, H, V, W).
    motorsport_window_net_certification:
      name: Sertifikasi jaring jendela olahraga motor
      description: Sertifikasi keselamatan balap atau homologasi yang dipenuhi oleh
        jaring jendela (misalnya, SFI atau FIA), termasuk nomor spesifikasi bilamana
        berlaku.
    mound_usage_type:
      name: Jenis penggunaan gundukan
      description: Mengidentifikasi lingkungan aplikasi yang dimaksudkan untuk gundukan,
        seperti Latihan, Pertandingan, Bullpen, atau Serbaguna.
    mount_attachment_method:
      name: Metode pemasangan dudukan
      description: Menentukan bagaimana dudukan terpasang pada permukaan/struktur
        kendaraan.
    mountainboard_truck_type:
      name: Jenis truk mountainboard
      description: Mengklasifikasi gaya truk yang disertakan dengan papan, yang memengaruhi
        respons belok dan daya tahan.
    mounting_attachment_method:
      name: Metode pemasangan/sambungan
      description: Cara dudukan/tas dirancang untuk dipasang pada drum, penyangga,
        sabuk, atau permukaan lainnya.
    mounting_attachment_type:
      name: Jenis pemasangan/penempelan
      description: Cara aksesori rasio terpasang atau terhubung dengan roda pemintal.
    mounting_hardware_included_for_installation:
      name: Perangkat keras pemasangan yang disertakan (untuk instalasi)
      description: Menunjukkan apakah perangkat keras pemasangan yang diperlukan untuk
        memasang jok belakang (misalnya, braket, baut, rel) disertakan dengan produk.
    mounting_location:
      name: Lokasi pemasangan
      description: Menentukan area penempatan yang dimaksudkan pada peralatan atau
        tubuh untuk lampu/reflektor (misalnya, fork depan, helm, jari-jari roda).
    mounting_method:
      name: Metode pemasangan
      description: Cara dudukan tongkat/kuas dipasang atau ditempelkan (misalnya,
        penjepit, tali pengikat, perekat).
    mounting_position:
      name: Posisi pemasangan
      description: Menentukan di mana kontrol rem tangan akan dipasang/diinstal di
        dalam kabin kendaraan.
    mounting_rail_type:
      name: Jenis rel pemasangan
      description: Menentukan standar rel atau antarmuka tempat aksesori dipasang,
        seperti Picatinny atau M-LOK.
    mounting_receiver_size:
      name: Ukuran penerima pemasangan
      description: Ukuran receiver hitch yang diperlukan untuk rak kargo yang dipasang
        pada hitch.
    mounting_storage_type:
      name: Jenis Pemasangan/Penyimpanan
      description: Cara perangkat dimaksudkan untuk dipasang atau disimpan pada kapal/orang.
    mouth_grip_type:
      name: Jenis grip mulut
      description: Menjelaskan jenis grip atau pelindung mulut pada peluit untuk kenyamanan
        dan kebersihan.
    mouthguard_mold_type:
      name: Jenis cetakan pelindung mulut
      description: Menjelaskan bagaimana pelindung mulut dipasang pada gigi atlet
        (misalnya, metode Rebus dan gigit, pemasangan khusus sesuai bentuk gigi).
    mouthpiece_facing_length:
      name: Panjang facing mouthpiece
      description: Menunjukkan kategori panjang kurva facing (lay) mouthpiece (bukan
        panjang keseluruhan mouthpiece), yang memengaruhi respons, resistansi, dan
        kompatibilitas reed.
    mouthpiece_material:
      name: Bahan mouthpiece
      description: Menentukan bahan bagian mouthpiece/tip yang bersentuhan dengan
        mulut pada blowout (party blower), yang mungkin berbeda dari bahan badan utama.
    mouthpiece_shank_receiver_size:
      name: Ukuran shank/receiver mouthpiece
      description: Menentukan standar shank/receiver mouthpiece yang kompatibel dengan
        flugelhorn.
    mouthpiece_shank_size:
      name: Ukuran shank mouthpiece
      description: Menentukan standar kecocokan shank/receiver mouthpiece untuk memastikan
        kompatibilitas dengan alat musik tiup logam yang dimaksud.
    mouthpiece_shank_type:
      name: Jenis batang pelindung mulut
      description: Menentukan standar receiver/shank mouthpiece untuk kompatibilitas
        (bilamana berlaku).
    mouthpiece_style:
      name: Gaya pelindung mulut
      description: Mengklasifikasi desain/bentuk bagian mulut dari kekang kendali,
        yang memengaruhi titik tekanan, tingkat keparahan, dan preferensi kuda.
    mouthpiece_type:
      name: Jenis mouthpiece
      description: Jenis mouthpiece di ujung peniup (model terintegrasi, dapat dilepas,
        atau tambahan).
    movement_mechanism:
      name: Mekanisme pergerakan
      description: Menentukan bagaimana bangku bergerak saat digunakan (berayun, meluncur,
        bergoyang, dll.).
    muffin_size:
      name: Ukuran muffin
      description: Mengklasifikasi ukuran fisik produk muffin (misalnya, mini, standar,
        jumbo).
    mushroom_variety:
      name: Varietas jamur
      description: Mengidentifikasi spesies atau varietas jamur atau truffle spesifik
        yang terkandung dalam produk (misalnya, Shiitake, King Oyster, Black Truffle).
    music_stand_desk_tilt_adjustment:
      name: Penyesuaian kemiringan meja stand musik
      description: Menunjukkan apakah dan bagaimana sudut meja dapat disesuaikan.
    music_stand_intended_use:
      name: Kegunaan yang dimaksudkan untuk stand musik
      description: Menunjukkan pengaturan/kasus penggunaan utama yang dimaksudkan
        untuk stand.
    musical_block_pitch_type:
      name: Jenis nada blok musik
      description: Menjelaskan apakah blok musik menghasilkan nada yang pasti (disetel)
        atau nada yang tidak pasti.
    musical_box_mechanism_type:
      name: Jenis mekanisme kotak musik
      description: Bagaimana kotak musik menghasilkan/memainkan suara (misalnya, mekanisme
        putar manual vs pemutaran elektronik).
    musical_keyboard_case_fit_type:
      name: Jenis fit kotak keyboard
      description: Menjelaskan bagaimana ukuran kotak disesuaikan dengan instrumen
        (misalnya, rentang ukuran universal/generik vs ukuran model khusus/pesanan).
    musical_ratchet_sound_character:
      name: Karakter suara ratchet musik
      description: Deskripsi umum mengenai karakter timbre/kekerasan suara ratchet.
    musical_scraper_groove_surface_material:
      name: Bahan permukaan galur scraper musik
      description: Menentukan bahan permukaan pengikis bergalur/bertonjol (dapat berbeda
        dari bahan bodi).
    musical_scraper_type:
      name: Jenis scraper musik
      description: Menentukan gaya/desain instrumen scraper musik (misalnya, guiro
        vs reco-reco), yang memengaruhi suara dan teknik bermain.
    mute_attachment_method:
      name: Metode pemasangan mute
      description: Menentukan bagaimana mute simbal dipasang atau ditahan pada simbal
        (misalnya, gel, perekat statis, magnet, klip).
    mute_attenuation_level:
      name: Tingkat peredaman mute
      description: Menunjukkan seberapa besar mute mengurangi volume yang dirasakan,
        terutama relevan untuk mute latihan.
    mute_cork_padding_material:
      name: Bahan gabus/bantalan mute
      description: Menentukan bahan bantalan kontak mute (misalnya, strip/bantalan
        gabus) yang digunakan untuk pegangan/kesesuaian dan perlindungan bell.
    mute_coverage_type:
      name: Jenis cakupan peredam
      description: Menunjukkan gaya/cakupan mute pada permukaan permainan, dari peredam
        titik kecil hingga mute latihan permukaan penuh.
    mute_finish:
      name: Finis mute
      description: Finis permukaan mute yang dapat memengaruhi daya tahan dan estetika
        (misalnya, dipoles vs satin).
    name_label_text_template:
      name: Templat teks label nama
      description: Menentukan teks atau templat preset yang dicetak pada label nama
        (misalnya, 'Milik', 'Dibuat oleh').
    napkin_ply:
      name: Lapisan serbet
      description: Menunjukkan ketebalan serbet koktail berdasarkan jumlah lapisan
        (ply).
    neck_brace_fit_system:
      name: Sistem pemasangan penyangga leher
      description: Menunjukkan metode utama yang digunakan untuk menyesuaikan dan
        mengencangkan penyangga leher pada pengendara.
    neck_brace_size_basis:
      name: Dasar ukuran penyangga leher
      description: Menunjukkan dasar ukuran yang digunakan untuk memilih ukuran penyangga
