    scale_model_car_features:
      name: Fitur model mobil skala
      description: Fitur-fitur penting dari model mobil skala ini antara lain pintu/kap
        mesin yang dapat dibuka, roda yang dapat dikendalikan, suspensi, dan lain-lain.
    scale_model_kit_assembly_requirements:
      name: Persyaratan perakitan kit model skala
      description: Menentukan langkah/perlengkapan perakitan tambahan yang biasanya
        diperlukan di luar perakitan dasar dengan sistem tekan tanpa lem.
    scale_model_kit_components_included:
      name: Komponen kit model skala disertakan
      description: Mencantumkan komponen yang termasuk dalam model/kit tank skala
