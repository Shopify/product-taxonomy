        stijl (bijv. rosborstel, manenkam, uitdunkam), zodat shoppers snel het juiste
        hulpmiddel voor specifieke verzorgingsbehoeften kunnen vinden.
    combat_shorts_cut_style:
      name: Combatshorts snitstijl
      description: Geeft de snit of pasvorm aan die specifiek is voor combat-sportshorts
        (bijv. high cut, retro cut, compressie).
    comic_creator_role:
      name: Stripmaker rol
      description: Specificeert de vermelde rol van de maker die relevant is voor
        de listing (bijv. schrijver, tekenaar).
    commemorative_coin_finish:
      name: Afwerking herdenkingsmunt
      description: Beschrijft het slag-/afwerkingstype van een herdenkingsmunt.
    commemorative_coin_mint_mark:
      name: Herdenkingsmunt muntteken
      description: Geeft het muntteken (of geen muntteken) op de munt aan.
    commemorative_subject:
      name: Herdenking onderwerp
      description: Primair herdacht onderwerp (evenement, persoon, plaats, jubileum,
        organisatie, enz.).
    commercial_vehicle_class:
      name: Bedrijfsvoertuigklasse
      description: Op GVWR gebaseerde wettelijke/industriespecifieke klasse die wordt
        gebruikt om de gewichtsklasse van een bedrijfsvoertuig te beschrijven voor
        browsen en filteren.
    compass_damping_medium:
      name: Kompas dempingsmedium
      description: Specificeert het medium dat wordt gebruikt om de beweging van de
        naald in de kompascapsule te stabiliseren.
    compass_illumination_type:
      name: Kompas verlichtingstype
      description: Specificeert hoe de kompasmarkeringen zichtbaar worden gemaakt
        bij weinig licht (bijv. lichtgevende verf, tritium, led-achtergrondverlichting).
    compass_mounting_style:
      name: Montagestijl kompas
      description: Beschrijft hoe het kompas wordt gedragen, aan het lichaam wordt
        gedragen of geïnstalleerd.
    compass_scale_units:
      name: Kompas schaaleenheden
      description: Geeft de meeteenheden aan (graden, mils of beide) die op de kompasbehuizing
        zijn gemarkeerd.
    compatible_abs_system:
      name: Compatibel ABS-systeem
      description: Geeft aan of de hoofdremcilinder bedoeld is voor voertuigen met
        ABS.
    compatible_adapter_brand:
      name: Compatibel adaptermerk
      description: Geeft het merk van de golfclubkop aan waarvoor de adapter van de
        shaft vooraf is geconfigureerd.
    compatible_airbag_system_type:
      name: Compatibel airbagsysteem type
      description: Geeft de generatie/kenmerkenset van het airbagsysteem aan waarmee
        het onderdeel compatibel is (bijv. single-stage versus dual-stage).
    compatible_amplifier_fit_method:
      name: Compatibele versterker pasmethode
      description: Geeft aan hoe de compatibiliteit is gedefinieerd voor de hoes/case
        (universele pasvorm versus modelspecifiek versus op afmetingen).
    compatible_apparatus:
      name: Compatibel toestel
      description: Specificeert het turntoestel of de activiteit waarvoor de grips
        zijn ontworpen.
    compatible_archery_tool:
      name: Compatibel boogschietgereedschap
      description: Geeft het primaire boogschietgereedschap of uitrustingsstuk aan
        waarvoor het accessoire is ontworpen.
    compatible_axle_size:
      name: Compatibel asformaat
      description: Specificeert de naaf-/asdiameter of schroefdraadnorm waarvoor de
        foot peg is ontworpen (bijv. 10 mm/⅜ inch, 14 mm, 3/8 inch 26 TPI).
    compatible_axle_type:
      name: Compatibel astype
      description: Geeft de achterasbevestigingsnorm(en) aan die de trainer ondersteunt,
        zoals snelspanner- of steekasmaten.
    compatible_axle_weight_rating:
      name: Compatibele as gewichtsklasse
      description: Specificeert de gewichtsklasse van de traileras (capaciteit per
        as) waarvoor de trailerremassemblage is ontworpen.
    compatible_bait_type:
      name: Compatibel aastype
      description: Geeft de soorten visaas aan waarmee de aasboor compatibel is, zodat
        vissers een hulpmiddel kunnen kiezen dat past bij hun voorkeursaas.
    compatible_bass_scale_length:
      name: Compatibele bas mensuurlengte
      description: Geeft de mensuurlengte(s) van de bas aan waarvoor de snarenset
        is bedoeld (belangrijk voor de juiste wikkellengte en pasvorm).
    compatible_battle_top_system:
      name: Compatibel battle top-systeem
      description: Geeft het productecosysteem of de serie van de battle top aan waarvoor
        de tol is ontworpen (gebruikt om compatibiliteit van onderdelen en arena's
        te garanderen).
    compatible_bb_size:
      name: Compatibele BB-maat
      description: Geeft de diameter van airsoftpellets aan die het product ondersteunt.
    compatible_bed_frame_style:
      name: Compatibele bedframe stijl
      description: Specificeert de bed- of framestijl waarvoor het accessoire is ontworpen.
    compatible_bicycle_tire_type:
      name: Compatibel fietsbandtype
      description: Specificeert welke fietsbandtypen het product kan repareren of
        afdichten.
    compatible_bike_component:
      name: Compatibel fietsonderdeel
      description: Specificeert welk onderdeel van de fiets het gereedschap of product
        moet onderhouden.
    compatible_billiard_game:
      name: Compatibel biljartspel
      description: Geeft de biljartspelvorm(en) aan waarvoor het rack is ontworpen,
        zodat klanten een rack kiezen dat bij hun spel past.
    compatible_billiard_table_size:
      name: Compatibele biljarttafel maat
      description: Specificeert de standaard tafellengte(s) waarvoor de hoes is ontworpen,
        zodat shoppers een hoes van de juiste maat voor hun pooltafel kiezen.
    compatible_bit_type:
      name: Compatibel bittype
      description: Stijlen bitten waarmee de guard kan worden gebruikt.
    compatible_blade_hosel:
      name: Compatibel blade-hosel
      description: Geeft de lemmetbus-/taperstijl aan die de shaft accepteert, zodat
        shaft en lemmet goed op elkaar passen.
    compatible_blade_system:
      name: Compatibel messensysteem
      description: 'Geeft het vervangende lemmetsysteem/-formaat aan dat het mes accepteert
        (bijv. standaard hobbymes #11, afbreekbare segmentmessen).'
    compatible_boat_weaving_shuttle_loom:
      name: Compatibel schietspoelgetouw
      description: Voor welke getouwtypen de schietspoel bedoeld is.
    compatible_bobbin_type:
      name: Compatibel spoeltype
      description: Geeft aan voor welke stijl bobijn/spoel de schietspoel is ontworpen.
    compatible_bottle_mouth:
      name: Compatibele flesopening
      description: Type of diameter van de flesopening waarvoor het rietje of de dop
        is ontworpen.
    compatible_bow_attachment_system:
      name: Compatibel boog bevestigingssysteem
      description: Geeft de werparm- of accessoire-interface aan waarvoor het onderdeel
        is ontworpen (bijv. ILF, schroefbevestiging, quick detach).
    compatible_bow_crossbow_type:
      name: Compatibel boog-/kruisboogtype
      description: Geeft de stijl aan van de boog of kruisboog waarvoor het accessoire
        geschikt is.
    compatible_brake_fluid:
      name: Geschikte remvloeistof
      description: DOT-specificatie(s) voor remvloeistof waarmee de afdichtingen/materialen
        van de hoofdremcilinder compatibel zijn.
    compatible_brake_pad:
      name: Compatibel remblok
      description: Geeft aan voor welke remblokcompounds de rotor is goedgekeurd,
        voor veiligheid en optimale slijtage.
    compatible_brake_service_system:
      name: Compatibel remservicesysteem
      description: Specificeert of het onderdeel bedoeld is voor schijfremmen, trommelremmen
        of beide.
    compatible_brake_system:
      name: Compatibel remsysteem
      description: Specificeert belangrijke opmerkingen over systeemcompatibiliteit
        voor het gebruik van remvloeistof.
    compatible_brake_type:
      name: Compatibel remtype
      description: Specificeert het remtype waarmee de drager compatibel is, zoals
        schijfrem of velgrem.
    compatible_brass_instrument_finish:
      name: Compatibele afwerking koperblaasinstrumenten
      description: Specificeert voor welke afwerkingen van koperblaasinstrumenten
        de reiniger veilig te gebruiken is zonder de afwerking te beschadigen.
    compatible_building_toy_system:
      name: Compatibel bouwspeelgoedsysteem
      description: Geeft aan met welk bouwsysteem of welke bouwnorm het speelgoed
        compatibel is (of vergelijkbare maatvoering), zoals LEGO-compatibel of merkgebonden.
    compatible_capo_fretboard_radius:
      name: Compatibel capo toetsradius
      description: Specificeert de toetsradius/het toetsprofiel waarvoor de capo is
        ontworpen, voor optimaal contact en stemstabiliteit.
    compatible_capo_number_of_strings:
      name: Compatibel capo aantal snaren
      description: Geeft aan hoeveel snaren de capo is ontworpen vast te klemmen (handig
        voor 6-, 7-, 8-, 12-snarige en speciale instrumenten).
    compatible_cardio_machine_type:
      name: Compatibel type cardioapparaat
      description: Geeft aan met welk type cardiomachine het accessoire of onderdeel
        is ontworpen om te werken.
    compatible_chain_link_type:
      name: Compatibel kettingschakeltype
      description: Geeft de kettingschakelstijl aan die het gereedschap ondersteunt
        (standaard, half-link, quick link, enz.).
    compatible_chain_size:
      name: Compatibele kettingmaat
      description: Specificeert de kettingbreedte of steeknormen (bijv. 1/8 inch,
        3/32 inch) die het gereedschap ondersteunt.
    compatible_chain_width:
      name: Compatibele kettingbreedte
      description: Geeft aan met welke kettingmaten de freewheel is ontworpen om te
        werken.
    compatible_chip_denomination:
      name: Compatibele chip denominatie
      description: Geeft aan voor welke chipdenominaties de tray/case gelabelde of
        specifieke posities bevat (of bedoeld is om te organiseren).
    compatible_clarinet_mouthpiece_ligature:
      name: Compatibele klarinetmondstuk ligatuur
      description: Geeft de ligatuur pasvormstandaard of compatibiliteitsopmerkingen
        voor het mondstuk aan.
    compatible_classical_guitar_string_scale_length:
      name: Compatibele klassieke gitaar mensuurlengte
      description: De beoogde mensuur-/snaarlengtecompatibiliteit voor de set.
    compatible_clay_target_size:
      name: Compatibele kleiduif maat
      description: Vermeldt de kleiduifmaten of -vormen die de werper kan accepteren
        voor een goede pasvorm en werking.
    compatible_cleat_system:
      name: Compatibel schoenplaatjessysteem
      description: Specificeert de schoenplaatinterface of het boutpatroon dat het
        pedaal ondersteunt, zodat fietsers hun schoenen op het juiste systeem kunnen
        afstemmen.
    compatible_clipless_pedal_system:
      name: Compatibel klikpedaalsysteem
      description: Geeft de specifieke klikpedaal-/schoenplaatstandaard aan waarmee
        het product is ontworpen om te koppelen.
    compatible_clutch_type:
      name: Compatibel koppelingstype
      description: Koppelinginterfacecompatibiliteit voor het vliegwiel (waar van
        toepassing).
    compatible_coffee_pod_system:
      name: Compatibel koffiecapsulesysteem
      description: Specificeert de koffiemachine of het zetsysteem waarvoor de pods
        of capsules zijn ontworpen.
    compatible_construction_set_system:
      name: Compatibel constructiesetsysteem
      description: Geeft aan met welk bouwsysteem of merkecosysteem de set compatibel
        is (bijv. LEGO-compatibel, DUPLO-compatibel).
    compatible_contra_bass_clarinet_peg_stand:
      name: Compatibele contrabasklarinet pen/standaard
      description: Geeft aan welke standaard-/peninterface of steunstijl vereist is.
    compatible_coolant_chemistry:
      name: Compatibele koelvloeistofchemie
      description: Specificeert met welke koelvloeistofchemiefamilies het additief
        compatibel is geformuleerd.
    compatible_cooling_system_material:
      name: Compatibel koelsysteemmateriaal
      description: Specificeert voor welke koelsystemen/materialen de radiatorspoeling
        veilig is (bijv. aluminium radiatoren, systemen met gemengde metalen).
    compatible_crib_format:
      name: Compatibel ledikantformaat
      description: Definieert de algemene maat- of vormcategorie van het matras of
        laken waarvoor het accessoire is ontworpen.
    compatible_cross_stitch_fabric_count:
      name: Compatibele kruissteek stofdraadtelling
      description: Aanbevolen stofdraadtelling(en) voor het borduren van het ontwerp.
    compatible_cross_stitch_frame:
      name: Compatibel kruissteek frame
      description: Geeft aan waarmee het frame is ontworpen om te worden gebruikt
        (handgebruik, tafelstandaard, vloerstandaard of universeel).
    compatible_crossbar:
      name: Compatibele dwarsbalk
      description: Compatibiliteit van de drager met dwarsbalken van autodakdragers
        (bij dakmontage), inclusief normen voor dwarsbalkvorm/-profiel.
    compatible_cycling_cleat:
      name: Compatibel fietsschoenplaatje
      description: Specificeert het schoenplaat- of pedaalsysteem waarvoor de fietsschoenen
        zijn ontworpen.
    compatible_cymbal_size:
      name: Compatibele bekkenmaat
      description: Specificeert de beoogde (of maximale) bekken diameter waarvoor
        de case is ontworpen; dit is compatibiliteit voor bekkenmaat, niet de buitendiameter
        van de case.
    compatible_device_type:
      name: Compatibel apparaattype
      description: Geeft aan welk soort apparaat de houder bedoeld is om vast te houden
        (bijv. monitor/tv, tablet, smartphone, draagbare dvd-speler).
    compatible_dock_structure_type:
      name: Compatibel aanlegsteiger structuurtype
      description: De aanlegsteigerconstructie waarop de treden zijn ontworpen om
        te worden gemonteerd.
    compatible_dough_type:
      name: Compatibel deegtype
      description: Specificeert met welke soorten/merken klei het gereedschap is ontworpen
        om te werken (bijv. standaard speelklei, modelleerklei).
    compatible_drawing_ink_surface:
      name: Compatibel tekeninkt oppervlak
      description: Geeft aanbevolen oppervlakken/substraten aan voor de beste prestaties.
    compatible_drivetrain_brand:
      name: Compatibel merk aandrijfsysteem
      description: Vermeldt de merken van aandrijflijn- of remsystemen waarvoor de
        kabel is ontworpen.
    compatible_drivetrain_speeds:
      name: Compatibele aandrijflijn versnellingen
      description: Specificeert het aantal aandrijflijnversnellingen (bijv. 10-speed)
        dat de crank of het kettingblad ondersteunt.
    compatible_equipment:
      name: Compatibele apparatuur
      description: Specificeert het type wintersportuitrusting waarvoor de bankschroef
        is ontworpen.
    compatible_evap_system:
      name: Compatibel EVAP-systeem
      description: Geeft aan of de tankdop is ontworpen om te voldoen aan de vereisten
        van het EVAP-systeem (bijv. OEM-specificatie afdichting) en check engine-lampjes
        te verminderen.
    compatible_exercise_bike_style:
      name: Compatibele hometrainer stijl
      description: Geeft aan voor welke stijlen hometrainers het accessoire of vervangingsonderdeel
        is ontworpen.
    compatible_fencing_weapon:
      name: Compatibel schermwapen
      description: Specificeert voor welk schermwapen of welke discipline de jas of
        lamé is bedoeld.
    compatible_fiber_type:
      name: Compatibel vezeltype
      description: Primaire vezeltypen die de drumkaarder effectief moet verwerken.
    compatible_fin_box_system:
      name: Compatibel vinbox-systeem
      description: Geeft de vinbox of het montagesysteem aan waarvoor de vin is ontworpen,
        zodat surfers vinnen kunnen kopen die compatibel zijn met hun surfboard (bijv.
        FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Compatibele toetsradius
      description: Specificeert de toetsradius (vlak, gebogen of compound) waarvoor
        de capo is ontworpen, voor gelijkmatige druk en minder buzz.
    compatible_finish_type:
      name: Compatibel type afwerking
      description: Geeft aan voor welke soorten instrumentafwerking de spray veilig
        zou zijn.
    compatible_fishing_reel_type:
      name: Compatibel vismolentype
      description: Specificeert de stijl vismolen waarvoor het accessoire is ontworpen
        of waarmee het werkt (bijv. spinning, baitcasting, fly).
    compatible_fly_line_weight:
      name: Compatibel vliegenlijngewicht
      description: Geeft de AFTMA-vliegenlijngewichten aan waarvoor de spoel is ontworpen.
    compatible_flywheel_type:
      name: Compatibel type vliegwiel
      description: Specificeert het vliegwieltype waarmee de koppelingsdrukplaat bedoeld
        is om te worden gebruikt.
    compatible_football_kick_type:
      name: Compatibel football kicktype
      description: Geeft aan voor welke trappingssituaties het product is ontworpen
        (bijv. kickoff, field goal), zodat atleten snel geschikte uitrusting kunnen
        vinden.
    compatible_fuel_system_type:
      name: Compatibel type brandstofsysteem
      description: Specificeert het brandstoftoevoersysteem waarvoor de reiniger is
        ontworpen.
    compatible_gas_type:
      name: Compatibel type gas
      description: Geeft aan welk type samengeperst gas de paintball-luchttank is
        ontworpen om op te slaan.
    compatible_gel_wax_additives:
      name: Compatibele gel wax additieven
      description: Specificeert welke additieftypen compatibel zijn met deze gel wax
        (bijv. kleurstoftype, embeds).
    compatible_glaze_layering:
      name: Compatibele glazuur gelaagdheid
      description: Of het glazuur bedoeld is om met andere glazuren in lagen te worden
        aangebracht voor effecten.
    compatible_golf_bag_type:
      name: Compatibel type golftas
      description: Geeft aan voor welke golfbagformaten de hoes of case geschikt is.
    compatible_ground_polarity:
      name: Compatibele massapolariteit
      description: Geeft aan of de spanningsregelaar bedoeld is voor elektrische voertuigsystemen
        met negatieve massa of positieve massa (of niet polariteitsgevoelig is).
    compatible_guitar_body_shape:
      name: Compatibele gitaarbody vorm
      description: Geeft aan voor welke gitaarbody/vorm de case is ontworpen.
    compatible_guitar_case:
      name: Compatibele gitaarcase
      description: Specificeert voor welke gitaarcasestijlen de luchtbevochtiger is
        ontworpen om goed in te passen en te werken.
    compatible_guitar_scale_length:
      name: Compatibele gitaarschaallengte
      description: Geeft aan voor welke gitaarmensuurlengte(n) de snarenset bedoeld
        is (op basis van wikkellengte/totale lengte).
    compatible_gun_platform:
      name: Compatibel gun-platform
      description: Specificeert het werkingsplatform of de krachtbron waarmee het
        product compatibel is (bijv. AEG, GBB, HPA).
    compatible_hair_length:
      name: Compatibele haarlengte
      description: Specificeert de maximale haarlengte of het maximale haarvolume
        dat de hoofdbedekking comfortabel ondersteunt.
    compatible_head_and_neck_restraint_system:
      name: Compatibel hoofd- en neksteunsysteem
      description: Geeft aan of de helm ankerpunten bevat en/of compatibel is met
        hoofd- en neksteunsystemen (bijv. HANS), inclusief de status van meegeleverde/geïnstalleerde
        ankerpennen.
    compatible_helmet_certification_standard:
      name: Compatibele helm certificeringsnorm
      description: Geeft aan voor welke helmveiligheidsnorm of certificeringscontext
        het accessoire is ontworpen (bijv. tear-offs voor racegebruik verwijzen vaak
        naar specifieke sanctioneringsregels).
    compatible_helmet_shell_size:
      name: Compatibele helm schaalmaat
      description: Geeft aan op welke helmschaalmaat/-maten een vervangend binnenwerkonderdeel
        past (schaalmaten komen vaak overeen met maatbereiken zoals XS-S, M, L-XL).
    compatible_helmet_size:
      name: Compatibele helmgrootte
      description: Geeft aan met welke helmmaten het gezichtsmasker compatibel is.
    compatible_helmet_type:
      name: Compatibel type helm
      description: Helmcategorie waarvoor de neksteun is ontworpen.
    compatible_hitch_receiver_size:
      name: Compatibele hitch receiver maat
      description: De openingmaat van de hitch receiver waarvoor het accessoire is
        ontworpen (voor op de hitch gemonteerde rackaccessoires).
    compatible_hook_size:
      name: Compatibele haakgrootte
      description: Haaknaald maatsysteem/-systemen en/of maatbereik waarvoor de organizer
        is ontworpen (bijv. Amerikaanse letter-/nummermaten, metrisch mm-bereik).
    compatible_horse_coat_type:
      name: Compatibel type paardenvacht
      description: Specificeert voor welke vachtkenmerken van paarden de ontharer
        het meest geschikt is (bijv. dikke wintervacht of gevoelige vacht).
    compatible_host_platform:
      name: Compatibel hostplatform
      description: Specificeert met welke hostplatforms of apparaattypen de padcontroller
        compatibel is (bijv. Windows, macOS, iOS, Android) en of deze zelfstandig
        zonder computer kan werken.
    compatible_inflation_gas:
      name: Compatibel vulgas
      description: Specificeert waarmee de ballon bedoeld is om te worden gevuld (lucht,
        helium of beide).
    compatible_injection_type:
      name: Compatibel injectietype
      description: Geeft aan voor welk brandstofinjectiesysteem het product is ontworpen
        om te reinigen.
    compatible_instrument_surface_material:
      name: Compatibel instrument oppervlak/materiaal
      description: Geeft aan voor welke instrumentoppervlakken/-materialen het poetsmiddel
        bedoeld is.
    compatible_intercom_system:
      name: Compatibel intercomsysteem
      description: Geeft aan of de helm geschikt/compatibel is voor het monteren of
        installeren van een helm-intercom-/communicatiesysteem.
    compatible_interior_material:
      name: Compatibel interieurmateriaal
      description: Geeft aan voor welke voertuiginterieurmaterialen de vlekverwijderaar
        veilig/effectief is (bijv. tapijt, stoffen bekleding, leer, vinyl).
    compatible_kayak_type:
      name: Compatibel type kajak
      description: Vermeldt de algemene kajakstijlen waarop de zeilkit is ontworpen
        om te worden gemonteerd.
    compatible_license_plate_hole_pattern:
      name: Compatibele kentekenplaat gatenpatroon
      description: Specificeert de montagegatenconfiguratie die door de houder wordt
        ondersteund (voertuigzijde en/of plaatzijde).
    compatible_license_plate_size:
      name: Compatibele kentekenplaat maat
      description: Geeft aan voor welke regionale of dimensionale kentekenplaatmaat/-maten
        de houder is ontworpen.
    compatible_loom:
      name: Compatibel weefgetouw
      description: Specificeert voor welk type of welke typen weefgetouwen de weefklopper
        voor platweven bedoeld is.
    compatible_loom_type:
      name: Compatibel type weefgetouw
      description: Geeft aan voor welke weefopstelling de weefklopper bedoeld is (bijv.
        hevelrietgetouwen vs tapijtweefgetouwen).
    compatible_machine_type:
      name: Compatibel machinetype
      description: Geeft aan met welk type quiltopstelling het frame is ontworpen
        om te werken (handquilten, huishoudelijke naaimachine, longarm quiltmachine).
    compatible_mast_type:
      name: Compatibel masttype
      description: 'Specificeert voor welke mastdiameters het zeil is ontworpen: reduced
        diameter (RDM), standard diameter (SDM) of beide.'
    compatible_model_system_train_scale:
      name: Compatibel modelsysteem (treinschaal)
      description: Specificeert voor welke modeltreinschaal of welk modelsysteem het
        accessoire past, indien van toepassing (bijv. HO, N, O).
    compatible_mounting_surface:
      name: Compatibel montageoppervlak
      description: Het beoogde oppervlak of object waarop de clip is ontworpen om
        te klemmen.
    compatible_mouthpiece_patch:
      name: Compatibele mondstukpatch
      description: Geeft aan of het mondstuk is ontworpen voor gebruik met mondstukkussens/-patches
        en geeft het aanbevolen patchdiktebereik aan.
    compatible_mouthpiece_type:
      name: Compatibel type mondstuk
      description: Geeft aan welk mondstuktype/welke schacht de mellophone is ontworpen
        om te gebruiken (meestal French horn- of trompetachtige receivers, afhankelijk
        van het model).
    compatible_neck_profile_width:
      name: Compatibel halsprofiel/-breedte
      description: Geeft de halsprofiel-/breedteklasse aan waarvoor de capo is ontworpen
        (bijv. smalle elektrische gitaar vs brede klassieke gitaar).
    compatible_needle_size:
      name: Compatibele naaldgrootte
      description: Geeft aan voor welke naaldmaten/-typen de etui bedoeld is (bijv.
        borduur-, tapisserie-, handnaainaaldlengtes).
    compatible_needle_system:
      name: Compatibel naaldsysteem
      description: Naaldsysteem/-systemen waarmee de machine compatibel is (bijv.
        130/705H).
    compatible_parking_brake_mechanism:
      name: Compatibel parkeerremmechanisme
      description: Geeft aan of de remklauw is ontworpen voor gebruik met een geïntegreerd
        parkeerremmechanisme.
    compatible_pedal_instrument_type:
      name: Compatibel pedaalinstrumenttype
      description: Specificeert waarvoor het pedaal bedoeld is om mee te worden gebruikt
        (bijv. digitale piano, keyboard/synth, MIDI-controller).
    compatible_pedal_type:
      name: Compatibel type pedaal
      description: Geeft aan voor welke pedaalstijl of welk pedaalsysteem de strap
        of clip is ontworpen (bijv. platform, SPD, Look Keo).
    compatible_pin_type:
      name: Compatibel pintype
      description: Welk type spelden de mat is ontworpen om mee te worden gebruikt
        (of of erin geprikt kan worden).
    compatible_pipe_filter_size:
      name: Compatibele pijp filtermaat
      description: Geeft aan welke filtermaat of -stijl de pijp kan accepteren (of
        dat er geen filter vereist is).
    compatible_plate_size:
      name: Compatibele plaatgrootte
      description: Ballistische plaat afmetingen of gestandaardiseerde maten die het
        vest kan accepteren.
    compatible_play_vehicle_scale:
      name: Compatibele speelvoertuigschaal
      description: Geeft de speelgoedschaal aan waarvoor het accessoire is ontworpen
        (bijv. 1:64), wat de pasvorm/compatibiliteit voor verzamelaars en railsystemen
        verbetert.
    compatible_playing_surface:
      name: Compatibel speelveld
      description: Geeft aan voor welk type speelveld of oppervlak de American football
        schoenen zijn ontworpen.
    compatible_pole_dimensions:
      name: Compatibele paal afmetingen
      description: Specificeert op welke doorsnedemaat van de paal het accessoire
        past.
    compatible_pole_shape:
      name: Compatibele paal vorm
      description: Specificeert de doorsnedevorm van de paal of kolom waarvoor de
        padding is ontworpen.
    compatible_power_steering_system:
      name: Compatibel stuurbekrachtigingssysteem
      description: Geeft aan voor welk type stuursysteem de vloeistof bedoeld is.
    compatible_powerplant_type:
      name: Compatibel aandrijvingstype
      description: Geeft aan voor welk aandrijfsysteem van het BB-geweer het onderdeel
        bedoeld is (bijv. veerzuiger, CO2, PCP).
    compatible_presser_foot:
      name: Compatibele naaivoet
      description: Specificeert het naaivoetmontage-/compatibiliteitssysteem dat door
        de naaimachine wordt ondersteund (bijv. snap-on vs schroefbevestiging; lage/hoge/schuine
        schacht). Gebruik 'Universeel/Meerdere' als meerdere systemen worden ondersteund
        of adapters zijn meegeleverd.
    compatible_protective_gear:
      name: Compatibele beschermende uitrusting
      description: Specificeert met welke andere beschermende uitrusting de nekbrace
        is ontworpen om te werken.
    compatible_protective_gear_integration:
      name: Compatibele beschermende uitrusting integratie
      description: Beschrijft hoe de beschermer bedoeld is om te worden gedragen of
        geïntegreerd met andere uitrusting (bijv. insteekvak, zelfstandige strap-on).
    compatible_punching_bag_type:
      name: Compatibel bokszaktype
      description: Specificeert met welke boks- of trainingszakstijlen het product
        compatibel is.
    compatible_racing_discipline:
      name: Compatibele racediscipline
      description: De motorsportdiscipline(s) waarvoor de helm bedoeld/gecertificeerd
        is.
    compatible_rc_scale:
      name: Compatibele RC-schaal
      description: Geeft de RC-schaalverhouding aan (bijv. 1:10) waarvoor het accessoire
        of onderdeel is ontworpen.
    compatible_recorder_size:
      name: Compatibel recorderformaat
      description: Specificeert voor welke blokfluitmaat/-maten de etui is ontworpen.
    compatible_recorder_type:
      name: Compatibelrecordertype
      description: Specificeert met welk blokfluittype (familie/maat) het accessoire
        compatibel is (bijv. sopraan, alt).
    compatible_reed_cut:
      name: Compatibele rietsnijstijl
      description: Specificeert met welke rietsnedestijl de ligatuur compatibel bedoeld
        is (bijv. filed/French cut vs unfiled/American cut).
    compatible_reed_type:
      name: Compatibele rietvorm
      description: Specificeert voor welke rietsnee/-type het mondstuk is ontworpen.
    compatible_reel_type:
      name: Compatibel type vismolen
      description: Specificeert voor welke stijl vismolen de tas, etui of hoes is
        ontworpen.
    compatible_refrigerant_type:
      name: Compatibel koudemiddeltype
      description: Geeft aan met welk koudemiddel de AC-verdamper bedoeld is om te
        worden gebruikt.
    compatible_ride_equipment:
      name: Compatibel rijdend materieel
      description: Soorten sportartikelen op wielen waarvoor de hellingbaan bedoeld
        is.Typen rolsportuitrusting waarvoor de ramp bedoeld is.
    compatible_roof_height:
      name: Compatibele dakhoogte
      description: Geeft aan voor welk dakprofiel de hoes is ontworpen (standaard
        vs verhoogd/hoog dak).
    compatible_roof_rail_type:
      name: Compatibel type dakrail
      description: Specificeert aan welke dakconfiguratie het basisdragersysteem is
        ontworpen om te worden bevestigd.
    compatible_rope_count:
      name: Compatibel aantal touwen
      description: Specificeert voor welke touwconfiguratie van een boksring het onderdeel
        is ontworpen, zoals ringen met 3 touwen, ringen met 4 touwen of universele
        pasvorm.
    compatible_rope_type:
      name: Compatibel type touw
      description: Specificeert welke touwconstructies met het apparaat kunnen worden
        gebruikt.
    compatible_saddle_type:
      name: Compatibel type zadel
      description: Specificeert voor welke zadelstijl of rijdiscipline het accessoire
        is ontworpen, zodat juiste compatibiliteit met Engelse, western- en andere
        zadels wordt gewaarborgd.
    compatible_saxophone_size:
      name: Compatibele saxofoongrootte
      description: Geeft aan met welke saxofoonmaat het product compatibel is (bijv.
        sopraan, alt, tenor).
    compatible_saxophone_type:
      name: Compatibel type saxofoon
      description: Specificeert voor welke saxofoon de ligatuur/cap is ontworpen.
    compatible_scale_length:
      name: Compatibele schaallengte
      description: Geeft het bereik van de mensuurlengte van de gitaar aan waarvoor
        de snaren bedoeld zijn (bijv. short scale, standaard, bariton).
    compatible_seat_airbag:
      name: Compatibele stoelairbag
      description: Geeft aan of de stoel zijairbags ondersteunt/bevat of compatibel
        is met voertuigen die zijn uitgerust met in de stoel gemonteerde airbags.
    compatible_seating_capacity:
      name: Compatibele zitcapaciteit
      description: Specificeert het aantal zitplaatsen of de configuratie waarvoor
        het accessoire is ontworpen.
    compatible_sensor_port_type:
      name: Compatibel sensorpoorttype
      description: Specificeert of de oliepan oliepeil- en/of olietemperatuursensoren
        ondersteunt en, indien van toepassing, de poortstijl.
    compatible_shifter_type:
      name: Compatibel type versnellingspook
      description: Geeft aan voor welk schakeltype of welke schakelconfiguratie de
        schakelpookhoes is ontworpen.
    compatible_shis:
      name: Compatibele SHIS
      description: Vermeldt de Standardized Headset Identification System (SHIS)-code(s)
        waarop het onderdeel past (bijv. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Compatibele schaatsdiscipline
      description: Geeft aan voor welke schaatsdiscipline(s) het onderdeel of accessoire
        is ontworpen.
    compatible_snowshoe_deck_type:
      name: Compatibel sneeuwschoen decktype
      description: Specificeert met welke sneeuwschoenframe- of deckstijl de binding
        compatibel is.
    compatible_special_effects_lighting_features:
      name: Compatibele functies voor speciale-effectverlichting
      description: Markeert algemene capaciteitskenmerken die aankoopbeslissingen
        voor effectverlichting ondersteunen, naast kleur/patroon, zoals het koppelen
        van units of reageren op audio.
    compatible_spinning_wheel_drive_system:
      name: Compatibel aandrijfsysteem voor spinwielen
      description: Geeft aan welke aandrijfsystemen voor spinwielen het accessoire
        ondersteunt.
    compatible_spoke_gauge:
      name: Compatibele spaakdikte
      description: Geeft aan op welke spaakdraaddiktes de nippelschroefdraad past,
        zodat kopers spaken en nippels correct kunnen combineren.
    compatible_steering_wheel_airbag:
      name: Compatibele stuurairbag
      description: Geeft aan of het stuur geschikt is voor het behoud van een OEM-airbagmodule
        of bedoeld is voor toepassingen zonder airbag.
    compatible_steering_wheel_control_button:
      name: Compatibele stuurbedieningsknop
      description: Geeft de compatibiliteit aan met fabrieksbediening op het stuur
        voor audio/cruisecontrol/telefoon en de bijbehorende bedrading.
    compatible_stencil_material:
      name: Compatibel sjabloonmateriaal
      description: Materialen waarvan de machine sjablonen kan maken of die de machine
        kan verwerken, bijvoorbeeld papier, plastic folie of mylar.
    compatible_stencil_media_format:
      name: Compatibel mediaformaat voor sjablonen
      description: 'Geeft aan welke mediaformaten voor sjablonen de machine ondersteunt:
        vellen, rollen of beide.'
    compatible_strap_retractor:
      name: Compatibele gordeloproller
      description: Geeft aan of de gordel compatibel is met oprolsystemen of is ontworpen
        voor niet-oprolbare, statische gordels.
    compatible_string_instrument_finish:
      name: Compatibele afwerking snaarinstrument
      description: Geeft aan voor welke soorten instrumentafwerking het polijstmiddel
        veilig kan worden gebruikt.
    compatible_substrate_material:
      name: Compatibel substraatmateriaal
      description: Het oppervlaktemateriaal/de oppervlaktematerialen waarop de verf
        is geformuleerd om te hechten.
    compatible_surface:
      name: Compatibel oppervlak
      description: Specificeert het oppervlak/materiaal waaraan de klittenbandlijm
        moet hechten.
    compatible_surface_material:
      name: Compatibel oppervlakmateriaal
      description: Oppervlaktematerialen van voertuigen waarvoor het product is ontworpen.
    compatible_tear_off_system:
      name: Compatibel afscheursysteem
      description: Geeft aan of de bril tear-offs en/of roll-offs ondersteunt, inclusief
        of deze montagepunten voor tear-offs heeft.
    compatible_thermostat_type:
      name: Compatibel thermostaat type
      description: Of de waternek/behuizing is ontworpen voor een thermostaat en,
        zo ja, welk type/welke maat.
    compatible_thread:
      name: Compatibele draad
      description: Geeft aan welke soorten draad/garen de draadinrijger kan verwerken
        qua dikte/type.
    compatible_thread_spool_format:
      name: Compatibel draad-/spoelformaat
      description: Geeft aan voor welke draadformaten de box is ontworpen, zoals spoelen,
        klossen, floss bobbins/kaartjes, cones, enz.
    compatible_thread_yarn_tool:
      name: Compatibel draad- garengereedschap
      description: Compatibiliteit met machines/systemen voor gereedschappen die op
        andere apparatuur worden gemonteerd of ermee worden gebruikt, bijvoorbeeld
        naaimachine, lockmachine/overlocker, weefgetouw of spinnewiel.
    compatible_tire_application:
      name: Compatibele bandtoepassing
      description: Geeft het toepassingssegment van de band/het wiel aan waarvoor
        de hielbreker is ontworpen, gebaseerd op de band/het wiel waaraan wordt gewerkt,
        niet op het voertuigmodel.
    compatible_tom_pad_mounting:
      name: Compatibele tompadbevestiging
      description: Specificeert waarop de elektronische tomtom wordt bevestigd, bijvoorbeeld
        klem-/stangbevestiging, L-rod of statiefbevestiging, wat bepaalt of deze op
        bestaande racksystemen past.
    compatible_toy_vehicle_scale:
      name: Compatibele speelgoedvoertuigschaal
      description: Geeft de schaal van het speelgoedvoertuig of de geschatte voertuigmaat
        aan waarmee de speelset compatibel is.
    compatible_tpms_sensor_type:
      name: Compatibel TPMS-sensortype
      description: Specificeert of het wiel TPMS-sensoren en/of een vereist ventiel-/sensortype
        ondersteunt.
    compatible_training_equipment:
      name: Compatibele trainingsapparatuur
      description: Vermeldt de soorten trainings- of fitnessapparatuur die aan de
        houder kunnen worden bevestigd.
    compatible_treadmill_design:
      name: Compatibel loopbandontwerp
      description: Specificeert het loopbandontwerp waarmee het accessoire compatibel
        is, zoals inklapbare of niet-inklapbare modellen.
    compatible_tube:
      name: Compatibele band
      description: Geeft de binnenband- of bandconstructie aan waarvoor de plakker
        is ontworpen, zoals butyl, latex, TPU of tubeless.
    compatible_valve_type:
      name: Compatibel type ventiel
      description: Specificeert met welk type koperen ventiel het smeermiddel compatibel
        is.
    compatible_vaporizing_material:
      name: Compatibel verdampingsmateriaal
      description: Geeft aan welke materiaaltypen het apparaat kan verdampen.
    compatible_vehicle_windshield_fluid:
      name: Compatibele ruitensproeiervloeistof voor voertuigen
      description: Compatibiliteitsclaims met betrekking tot voertuiguitrusting of
        glasbehandelingen, bijvoorbeeld veilig voor regenafstotende coatings of koplampsproeiers.
    compatible_visor_system:
      name: Compatibel viziersysteem
      description: Geeft aan met welke typen vizier-/insertsystemen de motorhelm compatibel
        is.
    compatible_water_board_type:
      name: Compatibel type watersportplank
      description: Welke watersportboards het rek moet dragen.
    compatible_water_sport_board_type:
      name: Compatibel type watersportboard
      description: Vermeldt de typen boards die het rek kan vervoeren.
    compatible_watercraft_communication_standard:
      name: Compatibele communicatiestandaard voor vaartuigen
      description: Specificeert ondersteunde maritieme communicatie-/netwerkstandaarden
        of integratieprotocollen voor interoperabiliteit met boordelektronica.
    compatible_watercraft_engine_type:
      name: Compatibel motortype voor vaartuigen
      description: Geeft de beoogde aandrijfconfiguratie aan waarop het onderdeel
        past, zoals buitenboordmotor, binnenboordmotor, sterndrive of jetaandrijving.
    compatible_weight_plate_diameter:
      name: Compatibele diameter gewichtsschijf
      description: Specificeert welke diameters van gewichtsschijven de machine accepteert.
    compatible_wheel_finish:
      name: Compatibele wielafwerking
      description: Specificeert de wielafwerkingen/-materialen waarop de reiniger
        veilig kan worden gebruikt, zoals opgegeven door de fabrikant.
    compatible_whorl_drive_band_type:
      name: Compatibel type aandrijfsnaar voor whorl
      description: Specificeert met welke stijl aandrijfsnaar de whorl bedoeld is
        te werken.
    compatible_wick_series:
      name: Compatibele lontserie
      description: Geeft algemene lontseries/-typen aan waarop het lipje is ontworpen
        te passen volgens de branchenamen, indien gespecificeerd door de verkoper.
    compatible_winder_head_bit:
      name: Compatibele stemknop/-bit
      description: Specificeert de interfacestijl van de stemknop/stemkop die de winder
        ondersteunt, bijvoorbeeld sleufkop, verwisselbare bits of universele kop.
    compatible_windlass_rode:
      name: Compatibele ankerlijn voor ankerlier
      description: Specificeert welk type ankerlijn de ankerlier kan verwerken.
    compatible_windshield_type:
      name: Compatibel type voorruit
      description: Specificeert met welke voorruitconfiguratie de behuizing is ontworpen
        om te werken.
    compatible_wood:
      name: Compatibele houtsoort
      description: Specificeert voor welke houtsoorten van de toets het polijstmiddel
        wordt aanbevolen/veilig is.
    compatible_writing_surface:
      name: Compatibele schrijfondergrond
      description: Specificeert de oppervlakken/papiersoorten waarop de inkt het beste
        werkt.
    compatible_zipper_size:
      name: Compatibele ritssluitingmaat
      description: 'Geeft aan voor welke maat ritstrekker de puller is bedoeld, vaak
        uitgedrukt als #3, #5, #8, #10, wat compatibiliteitsfiltering verbetert.'
    compliance_certification:
      name: Nalevingscertificering
      description: Nalevings-/goedkeuringsnormen waaraan de lichtbalk voldoet voor
        gebruik op de weg en elektromagnetische compatibiliteit.
    component_position:
      name: Componentpositie
      description: Specificeert de relatieve positie van het onderdeel binnen de distributieassemblage
        van de motor, bijvoorbeeld voorste versus achterste kap, boven versus onder.
        Niet de plaatsing aan de voor-/achterzijde van het voertuig.
    concentration_level:
      name: Concentratieniveau
      description: Kwalitatieve aanduiding van hoe geconcentreerd de tomatenpuree
        is, bijvoorbeeld enkel, dubbel of drievoudig geconcentreerd, handig om aan
        receptvereisten te voldoen.
    concentration_type:
      name: Concentratietype
      description: Geeft aan of het product gebruiksklaar of geconcentreerd is en,
        indien geconcentreerd, de gebruikelijke verdunningsrichtlijn.
    concert_bass_drum_mounting_stand_type:
      name: Type montagestandaard voor concertbasdrum
      description: Hoe de concertbasdrum wordt ondersteund of gemonteerd voor een
        optreden.
    concert_pitch_standard:
      name: Stemtoon standaard
      description: Specificeert de concerttoonhoogtereferentie (A4) waarop de piano
        is gestemd op het moment van verkoop (bijv. A440, A442, A444).
    condiment_form:
      name: Specerij vorm
      description: Geeft de fysieke vorm of consistentie van het mierikswortelproduct
        aan (bijv. pasta, poeder, crème).
    condiment_texture:
      name: Specerij textuur
      description: Beschrijft de fysieke consistentie van de relish of chutney (bijv.
        grof, glad).
    confetti_format:
      name: Confetti formaat
      description: Specificeert het confettiproductformaat op basis van hoe de confetti
        is verpakt of wordt gelanceerd (bijv. los strooimateriaal versus poppers/kanonnen).
    conga_head_tensioning_system:
      name: Conga velspansysteem
      description: Type hardware dat wordt gebruikt om het congavel te spannen/stemmen
        (bijv. traditionele lug-tuning versus moderne quick-tune-mechanismen).
    conga_set_included_drum_types:
      name: Congaset meegeleverde drumtypen
      description: Welke congatypen in een congaset zijn inbegrepen (bijv. quinto
        + conga + tumba).
    connector_case_style:
      name: Connector case stijl
      description: Classificeert de algemene constructiestijl van de connector case
        (bijv. hard shell versus soft pouch) om beschermingsniveau en draagbaarheid
        weer te geven.
    console_cover_installation_method:
      name: Mntagemethode voor consolehoes
      description: Specificeert hoe de consolehoes aan de console/armsteun wordt bevestigd
        (bijv. slip-on, elastische banden, klittenband, lijm, clip-on).
    console_display_type:
      name: Consoledisplaytype
      description: Geeft het type gebruikersdisplay aan dat op de machine aanwezig
        is (bijv. LCD, LED, touchscreen).
    construction_design:
      name: Constructieontwerp
      description: Geeft aan uit hoeveel scharnierende delen de pad bestaat, wat de
        mobiliteit beïnvloedt (bijv. 1-delig versus 3-delig).
    contact_angle:
      name: Contacthoek
      description: Specificeert de contacthoek van de lagerbanen, uitgedrukt als één
        hoek of als gekoppelde hoekset (bijv. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Contact jongleerbal vultype
      description: Geeft aan of de bal massief of gevuld is (en indien gevuld, welk
        soort vulling), wat invloed heeft op de gewichtsverdeling en duurzaamheid.
    contact_juggling_ball_transparency:
      name: Contactjongleerbal transparantie
      description: Specificeert de transparantie/optische uitstraling van de bal.
    contact_surface_material:
      name: Materiaal contactoppervlak
      description: Geeft aan welk materiaal wordt gebruikt op de contactpunten die
        het instrument raken (bijv. kurk/rubber), om krassen te voorkomen en de grip
        te verbeteren.
    container_material:
      name: Container materiaal
      description: Specificeert het primaire materiaal van de retailverpakking van
        het product (bijv. glas, PET-kunststof, aluminium).
    contaminant_removal:
      name: Verwijdering van verontreinigingen
      description: Vermeldt de klassen van verontreinigingen waarvoor het product
        is gecertificeerd om ze te verwijderen of te verminderen.
    contra_alto_clarinet_body_configuration:
      name: Contra-altklarinet bodyconfiguratie
      description: Beschrijft de fysieke bouwvorm van de contra-altklarinet (bijv.
        rechte vs gevouwen ontwerpen).
    contra_alto_clarinet_lowest_note_extension:
      name: Contra-altklarinet uitbreiding laagste noot
      description: Specificeert de laagste speelbare nootuitbreiding van het instrument
        (de laagste noot die het mechaniek mogelijk maakt), vaak gebruikt om onderscheid
        te maken tussen lage Eb-, lage D- en lage C-modellen.
    contra_bass_clarinet_bell_type:
      name: Contrabasklarinet bekertype
      description: Bekerconfiguratie gebruikt op de contrabasklarinet.
    contra_bass_clarinet_bore_type:
      name: Type boring contrabasklarinet
      description: Boringontwerp van het instrument.
    contra_bass_clarinet_lowest_written_note:
      name: Laagste genoteerde noot contrabasklarinet
      description: De laagste geschreven noot die het instrument kan spelen (hangt
        vaak af van lage C- vs lage Eb-uitbreiding).
    control_arm_bushing_material:
      name: Regelarmbus materiaal
      description: Specificeert het materiaal van de meegeleverde/geïnstalleerde bussen,
        indien aanwezig.
    control_arm_bushings_included:
      name: Regelarmbussen meegeleverd
      description: Geeft aan of de regelarm wordt geleverd met geïnstalleerde bussen.
    control_arm_finish:
      name: Regelarm afwerking
      description: Specificeert de beschermende afwerking die op de regelarm is aangebracht
        (corrosiebescherming en uiterlijk).
    control_arm_grease_fitting_type:
      name: Regelarm smeernippeltype
      description: Specificeert of de regelarm/fuseekogelassemblage een smeernippel
        (Zerk) bevat en of deze onderhoudbaar is.
