    stone_cut_style:
      name: Slijpvorm van steen
      description: Slijp-/facetstijl van de glassteen (bijv. gefacetteerd vs cabochon).
    stone_fruit_cultivar:
      name: Steenfruit cultivar
      description: Geeft de specifieke cultivar/variëteit van de perzik of nectarine
