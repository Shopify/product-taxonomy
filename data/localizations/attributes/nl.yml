    doumbek_head_material:
      name: Materiaal trommelvel doumbek
      description: Materiaal van het trommelvel/membraan van de doumbek.
    doumbek_head_type:
      name: Doumbek veltype
      description: Constructie/type van het doumbekvel, oftewel hoe het membraan is
        gemaakt of bevestigd.
    doumbek_playing_style_technique:
      name: Doumbek speelstijl/techniek
      description: Beoogde speelcontext/-stijl die vaak met de doumbek wordt geassocieerd.
    doumbek_tuning_system:
      name: Stemsysteem Doumbek
      description: Hoe de doumbek wordt gespannen/gestemd, of dat deze niet stembaar
        is.
    dowel_end_style:
      name: Deuvel uiteindestijl
      description: Beschrijft de snede/vorm van de deuveluiteinden, wat invloed heeft
        op het gemak van plaatsing, de veiligheid en het beoogde hobbygebruik.
    dowel_surface_texture:
      name: Oppervlaktestaat deuvel
      description: Beschrijft de oppervlaktestaat van de deuvel, zoals glad of gegroefd,
        wat invloed heeft op het uiterlijk en de lijmhechting.
    drafting_compass_adjustment_mechanism:
      name: Tekenpasser verstelmechanisme
      description: Primair fijnverstelmechanisme dat wordt gebruikt om de radius nauwkeurig
        in te stellen.
    drafting_compass_fine_adjustment_mechanism:
      name: Fijnafstellingsmechanisme tekenpasser
      description: Type fijnverstelling dat wordt gebruikt om de radius nauwkeurig
        in te stellen, indien aanwezig.
    drafting_compass_lead_holder_type:
      name: Tekenpasser loodhoudertype
      description: Type tekeninzetstuk/-houder dat bij de passer is inbegrepen of
