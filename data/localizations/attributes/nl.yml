    strength_grade:
      name: Sterktegraad
      description: Beschrijft de beoogde houdkracht/sterkteklasse van de klittenbandsluiting.
    stretch_level:
      name: Stretch niveau
      description: Geeft aan hoeveel het textiel rekt tijdens gebruik.
    stretch_type:
