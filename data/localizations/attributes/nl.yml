    scale_model_assembly_status:
      name: Schaalmodel montage status
      description: Geeft aan of het schaalmodel klaar is om tentoon te stellen of
        montage/schilderen vereist.
    scale_model_car_features:
      name: Schaalmodel auto kenmerken
      description: Opvallende kenmerken van het schaalmodelauto, zoals te openen deuren/motorkap,
        bestuurbare wielen, vering, enz.
    scale_model_kit_assembly_requirements:
      name: Schaalmodelkit montagevereisten
      description: Specificeert welke extra montagestappen/-benodigdheden doorgaans
