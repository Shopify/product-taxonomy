    runner_configuration:
      name: Configuratie van glijders
      description: Beschrijft het aantal en de plaatsing van glijders op de slee.
    runner_material:
      name: Glijder materiaal
      description: Specificeert het materiaal dat wordt gebruikt voor de glijders
        of glijstrips van de slee.
    saddle_cover_style:
      name: Zadelhoes stijl
      description: Classificeert het algemene ontwerp of de gebruiksstijl van het
        product (bijv. opberghoes, rijhoes, draagtas).
    saddle_design:
      name: Zadel ontwerp
      description: Classificeert het algemene ergonomische of drukverlagende ontwerp/de
        stijl van het zadel (bijv. cut-out, noseless, split-nose, sprung).
    saddle_discipline:
      name: Zadel discipline
      description: Specificeert de primaire rijdiscipline of het beoogde gebruik/de
        beoogde stijl van het zadel.
    saddle_mounting_type:
      name: Type zadelmontage
      description: Specificeert de interface tussen het zadel en de zadelpen voor
        compatibiliteit (bijv. met rails, pivotal, I-Beam).
    saddle_pad_shape:
      name: Zadeldek vorm
      description: Beschrijft de fysieke snit/omtrek van het dekje, wat invloed heeft
        op zadelcompatibiliteit en esthetische voorkeur.
    saddle_pad_style:
      name: Zadeldekstijl
      description: Geeft de functionele stijl of beoogde discipline van het dekje
        aan, zodat ruiters het juiste ontwerp voor hun activiteit of zadeltype kunnen
        kiezen.
    saddle_padding_material:
      name: Zadel voering materiaal
      description: Geeft het primaire dempingsmateriaal of de technologie in het zadel
        aan die comfort en rijgevoel beïnvloedt.
    saddle_rail_material:
      name: Materiaal zadelrails
      description: Specificeert het materiaal dat wordt gebruikt voor de rails onder
        een fietszadel, wat invloed heeft op sterkte, comfort, gewicht en prijs.
    saddle_tree_material:
      name: Materiaal zadelboom
      description: Specificeert het materiaal dat wordt gebruikt voor de zadelboom,
        het interne frame van het zadel.
    saddle_tree_width:
      name: Zadelboom breedte
      description: Beschrijft de breedteclassificatie van de zadelboom, die de pasvorm
        op de schoft van het paard bepaalt.
    safety_documentation_available:
      name: Veiligheidsdocumentatie beschikbaar
      description: Geeft aan welke nalevings-/veiligheidsdocumenten voor het ingrediënt
        worden verstrekt (bijv. veiligheidsinformatieblad, IFRA-certificaat/-verklaring,
        allergenenverklaring).
    safety_equipment_included:
      name: Veiligheidsuitrusting inbegrepen
      description: Veiligheids-/beschermingsitems meegeleverd in het pakket.
    safety_features:
      name: Veiligheidseigenschappen
      description: Geeft ingebouwde veiligheidskenmerken aan die bedoeld zijn om onbedoelde
        snijwonden te verminderen of het mes tijdens opslag te beschermen.
    safety_harness_type:
      name: Veiligheidsharnas type
      description: Geeft de stijl en configuratie aan van het kinderbeveiligingsharnas
        dat bij het zitje wordt geleverd.
    safety_mechanism_type:
      name: Type veiligheidsmechanisme
      description: Beschrijft de stijl van het ingebouwde veiligheidssysteem dat wordt
        gebruikt om de halterstang op te vangen bij mislukte lifts.
    safety_restraint_type:
      name: Veiligheidsbeperking type
      description: Type ingebouwde kinderbeperking op het schommelzitje, indien aanwezig.
    safety_warning:
      name: Veiligheidswaarschuwing
      description: Geeft aan of het product gangbare speelgoedveiligheidswaarschuwingen
        bevat die relevant zijn voor knikkers (bijv. verstikkingsgevaar).
    sail_shape:
      name: Zeil vorm
      description: Beschrijft de geometrische stijl van het kajakzeil, die invloed
        heeft op efficiëntie, bediening en bevestiging.
    salad_dressing_type:
      name: Saladedressing type
      description: Geeft de basisstijl of textuur van de dressing aan (bijv. romig,
