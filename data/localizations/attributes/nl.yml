      name: Lijnclip type
      description: Specificeert de clip- of hardwarestijl die wordt gebruikt om de
        lijn aan een halsband of tuig te bevestigen (bijv. bolt snap, karabijnhaak,
        swivel clip).
    leash_style:
      name: Lijn stijl
      description: Beschrijft de koordconfiguratie of oprolstijl van de lijn.
    leash_type:
      name: Type riem
      description: Classificeert de algemene stijl of doelgerichte configuratie van
        de lijn voor snel filteren op beoogd gebruik.
    leavening_action_type:
      name: Rijsmiddel werkingstype
      description: Geeft de chemische formulering of rijsmiddelstijl van het bakpoeder
        aan (bijv. enkelwerkend, dubbelwerkend, aluminiumvrij). Dit heeft direct invloed
        op bakprestaties en geschiktheid voor recepten.
    leavening_agent:
      name: Rijsmiddel
      description: Specificeert het primaire rijsmiddelmechanisme dat in het deeg
        wordt gebruikt.
    led_color_options:
      name: LED kleuropties
      description: Vermeldt de selecteerbare LED-kleuren die beschikbaar zijn op het
        alarm voor visuele beetindicatie.
    led_indicator_color:
      name: LED-indicator kleur
      description: Geeft de kleur van de LED-indicator van het product aan, zodat
        vissers meerdere alarmen kunnen matchen of persoonlijke voorkeuren kunnen
        volgen.
    led_light_color:
      name: LED-verlichting kleur
      description: Specificeert de kleur van eventuele geïntegreerde LED-verlichting.
    leek_variety:
      name: Prei variëteit
      description: Specificeert de cultivar of variëteit van de prei, zodat onderscheid
        mogelijk is op basis van smaak, formaat en groeiseizoen.
    leg_coverage:
      name: Beenbedekking
      description: Specificeert hoeveel van het been het wetsuitonderdeel bedekt (bijv.
        shorty, volledige lengte).
    leg_cuff_style:
      name: Beenmanchet stijl
      description: Specificeert de afwerkingsstijl bij de enkelopening van de broek.
    leg_cut_height:
      name: Beenopening hoogte
      description: Geeft aan hoe hoog de beenopening van het bikinibroekje is uitgesneden.
    leg_cut_style:
      name: Beenuitsnijdingsstijl
      description: Beschrijft de vorm van de beenopening, wat invloed heeft op uitstraling,
        comfort en tan lines.
    leg_length:
      name: Beenlengte
      description: Categoriseert trunks op relatieve beenlengte (kort, mid, lang),
        zodat shoppers hun gewenste bedekking kunnen kiezen zonder de categorie op
        te splitsen.
    leg_loop_type:
      name: Type beenlus
      description: Beschrijft het ontwerp van de beenlussen.
    leg_opening_style:
      name: Beenopening stijl
      description: Specificeert hoe de beenopeningen van de joggers zijn afgewerkt,
        zoals elastische boorden, ritszomen of open zomen.
    leg_style:
      name: Beenstijl
      description: Definieert het ontwerp of de constructiestijl van de bankpoten
        of -basis.
    legging_foot_design:
      name: Legging voetontwerp
      description: Specificeert of leggings voetloos, met voet of converteerbaar tussen
        beide stijlen zijn.
    leggings_waistband_style:
      name: Legging taillebandstijl
      description: Specificeert het structurele ontwerp van de tailleband van de legging,
        wat invloed heeft op comfort, steun en esthetiek.
    lei_closure_style:
      name: Lei sluitingsstijl
      description: Beschrijft of de lei een doorlopende lus is of open uiteinden heeft
        die worden vastgeknoopt of met lint worden vastgemaakt.
    lemon_variety:
      name: Citroen variëteit
      description: Geeft de specifieke cultivar of variëteit van citroenen aan (bijv.
        Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Lengteverstellingsmethode
      description: Geeft aan of en hoe de lengte van het springtouw kan worden aangepast
        aan de gebruiker.
    lens_color_tint:
      name: Lens kleur/tint
      description: Kleur of tint van de beschermende brillenglazen die bij het product
        worden geleverd.
    lens_construction:
      name: Lensconstructie
      description: Specificeert de structurele opbouw van de lens (bijv. enkel glas,
        thermisch dubbel glas) om anticondensprestaties en optische prestaties aan
        te geven.
    lens_tint_category:
      name: Lenstintcategorie
      description: Classificeert de donkerte van de lens op basis van internationale
        tintcategorieën, zodat klanten lenzen kunnen kiezen die geschikt zijn voor
        verschillende lichtomstandigheden.
    lettuce_variety:
      name: Sla variëteit
      description: Geeft de specifieke horticulturele variëteit van sla aan (bijv.
        ijsbergsla, romaine, botersla), voor nauwkeurig filteren en vergelijken.
    level_of_play:
      name: Speelniveau
      description: Door de fabrikant opgegeven prestatieniveau dat aansluit bij de
        competitiviteit en het budget van de speler.
    lever_configuration:
      name: Hendelconfiguratie
      description: Geeft de hendel-/handgreepconfiguratie van de motorbediening van
        het vaartuig aan (bijv. enkele hendel vs dubbele hendel).
    lever_type:
      name: Hendel type
      description: Type/mechanisme van toonhoogteveranderende hendels die op de harpsnaren
        zijn geïnstalleerd.
    license_plate_cover_style:
      name: Kentekenplaathoes stijl
      description: Specificeert de constructiestijl van de kentekenplaathoes (bijv.
        volledige hoes vs schroefdoppen).
    license_plate_personalization_type:
      name: Kentekenplaat personalisatietype
      description: Specificeert of de kentekenplaat blanco of voorgedrukt is, of personalisatie
        door de koper ondersteunt (tekst en/of afbeeldingen).
    license_usage_terms:
      name: Licentie-/gebruiksvoorwaarden
      description: Gebruiksrechten voor het patroon (bijv. alleen persoonlijk gebruik
        vs beperkt commercieel).
    licensed_sports_property:
      name: Gelicentieerde sporteigendom
      description: Geeft aan of het product officieel is gelicentieerd door een competitie/team/organisatie.
    lid_hinge_mechanism:
      name: Deksel scharniermechanisme
      description: Specificeert het scharniermechanisme dat voor het deksel wordt
        gebruikt, wat invloed heeft op veiligheid en gebruiksgemak.
    lid_support_positions:
      name: Deksel steunposities
      description: Specificeert de ondersteunde posities van de dekselsteun voor de
        vleugel (hoe ver het deksel geopend kan worden).
    lie_angle_color_code:
      name: Lie angle kleurcode
      description: Geeft het kleurgecodeerde lie-angle-systeem van de fabrikant aan
        dat op sommige clubs wordt gebruikt (bijv. black dot, green dot).
    life_jacket_certification_standard:
      name: Certificeringsnorm reddingsvesten
      description: Officiële veiligheidsclassificatie of norm waaraan het product
        voldoet, zoals USCG Type- of ISO/AS-niveaus.
    life_raft_certification_standard:
      name: Certificeringsnorm reddingsvlotten
      description: De veiligheidsnorm/-certificering waaraan het reddingsvlot volgens
        bouw en onderhoud voldoet.
    life_raft_container_type:
      name: Reddingsvlot containertype
      description: Hoe het reddingsvlot is verpakt voor opslag en inzet.
    life_vest_approval_standard:
      name: Goedkeuringsnorm reddingsvesten
      description: Specificeert de certificerings-/goedkeuringsnorm waaraan het reddingsvest
        voldoet.
    life_vest_intended_user:
      name: Reddingsvest beoogde gebruiker
      description: Geeft de beoogde dragerscategorie aan voor pasvorm en uitrusting.
    lifebuoy_approval_standard:
      name: Reddingsboei goedkeuringsnorm
      description: Veiligheidsgoedkeuring of norm waaraan de reddingsboei voldoet
        (bijv. USCG/SOLAS).
    lifebuoy_features:
      name: Reddingsboei kenmerken
      description: Functionele veiligheids-, montage-/hanterings- en meegeleverde
        accessoirekenmerken voor reddingsboeien.
    lift_mechanism_type:
      name: Type hefmechanisme
      description: Specificeert het mechanisme dat helpt bij het omhoog/omlaag brengen
        of openen/sluiten van het wandbed.
    lift_stand_support_point:
      name: Lift/standaard steunpunt
      description: Waar de lift/standaard contact maakt met het voertuig of het ondersteunt.
    lifting_gas_type:
      name: Heftgas type
      description: Specificeert het primaire hefgas of drijfmedium dat door het luchtschip
        wordt gebruikt.
    lifting_support_type:
      name: Lift ondersteuningstype
      description: Geeft aan of de lift via rijplaten wordt opgereden of lift via
        armen/pads die contact maken met het frame/de liftpunten.
    ligature_and_cap_component_type:
      name: Ligatuur en kap componenttype
      description: Geeft aan of het product een ligatuur, een kap of een set is die
        beide bevat.
    ligature_material:
      name: Ligatuur materiaal
      description: Primair materiaal van de ligatuurbody die contact maakt met het
        riet en dit vastzet (bijv. metaal, leer, stof).
    ligature_plating_or_finish:
      name: Ligatuur plating of afwerking
      description: Specificeert de plating en/of oppervlakafwerking die is toegepast
        op een metalen klarinetligatuur en/of kap.
    ligature_reed_contact_style:
      name: Ligatuur rietcontactstijl
      description: Specificeert hoe de ligatuur contact maakt met het riet (bijv.
        minimaal contact, meerpuntscontact, wraparound).
    ligature_screw_position_relative_to_reed:
      name: Ligatuur schroefpositie (relatief ten opzichte van riet)
      description: Geeft de positie van de spanschroef/-schroeven van de ligatuur
        aan ten opzichte van het riet/de naar de speler gerichte zijde wanneer deze
        op het mondstuk is geïnstalleerd.
    ligature_tension_adjustment_mechanism:
      name: Ligatuur spanningsaanpassingsmechanisme
      description: Beschrijft hoe de ligatuur druk op het riet toepast/aanpast (bevestigingsontwerp).
    ligature_tightening_mechanism_type:
      name: Ligatuur aanspanmechanisme type
      description: Specificeert het mechanisme waarmee de ligatuur rond het mondstuk
        en riet wordt aangespannen (bijv. enkele schroef, dubbele schroef, hendel/snelsluiting).
    light_bar_housing_material:
      name: Lichtbalk behuizing materiaal
      description: Primair materiaal van de behuizing/body van de lichtbalk, wat invloed
        heeft op duurzaamheid en warmteafvoer.
    light_bar_lens_material:
      name: Lensmateriaal lichtbalk
      description: Primair materiaal van de lens/cover van de lichtbalk, wat invloed
        kan hebben op impactbestendigheid en optische helderheid.
    light_bar_mounting_location:
      name: Montagelocatie lichtbalk
      description: Primair beoogde montagepositie op het voertuig.
    light_stand_style:
      name: Lampstatief stijl
      description: Specificeert de structurele stijl of vormfactor van het statief
        dat wordt gebruikt om special effects verlichting te ondersteunen (bijv. tripod,
        T-bar, crank-up), niet het installatieoppervlak (wand/plafond), dat wordt
        vastgelegd door montagetype.
    light_switch_function:
      name: Lichtschakelaar functie
      description: Geeft aan welke lichtcircuits of functies de schakelaar bedient.
    lighting_control_protocols_supported:
      name: Lichtregeling ondersteunde protocollen
      description: Bedienings-/netwerkprotocollen die de controller ondersteunt naast
        of in plaats van DMX512.
    lighting_effects:
      name: Verlichting effecten
      description: Specificeert geïntegreerde verlichtingseigenschappen die gameplay
        of esthetiek verbeteren.
    lighting_mode:
      name: Verlichting modus
      description: Somt de beschikbare operationele lichtpatronen op, zoals constant,
        flitsen, strobe of SOS.
    lily_variety:
      name: Lelievariëteit
      description: Specificeert de commerciële/botanische variëteit van de lelie die
        als verse snijbloem wordt verkocht (bijv. Aziatisch, Oriëntaals).
    limb_articulation:
      name: Ledemaat articulatie
      description: Geeft de mate van flexibiliteit of articulatie van de ledematen
        in de dummy aan (geen, vast, semi-flexibel, volledig gearticuleerd).
    limb_material:
      name: Boogarmmateriaal
      description: Primair materiaal dat wordt gebruikt in de ledematen van een boog
        of kruisboog, wat invloed heeft op gewicht, duurzaamheid, vibratie en algemene
        prestaties.
    lime_variety:
      name: Limoenvariëteit
      description: Geeft de specifieke botanische of commerciële variëteit van de
        aangeboden limoen aan.
    line_buoyancy:
      name: Drijfvermogen lijn
      description: Beschrijft of de braid van nature drijft of zinkt en met welke
        snelheid, wat invloed heeft op aaspresentatie en lijnbeheer.
    line_purpose:
      name: Lijn doel
      description: Definieert de beoogde functie van de lijn binnen het kitesysteem
        (bijv. voorste vlieglijn, depowerlijn, bridlelijn).
    linen_finish_treatment:
      name: Linnen afwerking/behandeling
      description: Elk afwerkingsproces dat op de linnen stof is toegepast en handgevoel,
        uiterlijk of prestaties verandert.
    linen_weave_type:
      name: Linnen weeftype
      description: Specificeert de weefconstructie van de linnen stof, wat invloed
        heeft op textuur, ademend vermogen en valling.
    liner_padding_type:
      name: Liner paddingtype
      description: Geeft de constructie- of dempingsstijl van de liner aan (bijv.
        mesh, licht gewatteerd, doorgestikt).
    liner_shape:
      name: Liner vorm
      description: Beschrijft de algemene vorm van de slaapzakliner, zodat klanten
        deze kunnen afstemmen op hun slaapzak en comfortvoorkeuren.
    liner_type:
      name: Voering type
      description: Geeft aan of de shorts een interne voering bevatten en, zo ja,
        welke stijl dit is.
    lining:
      name: Voering
      description: Geeft aan of en hoe het zwembroekje gevoerd is, inclusief de mate
        van voeringdekking binnen het kledingstuk.
    lining_material:
      name: Bekledingsmateriaal
      description: Specificeert het materiaal dat wordt gebruikt voor de binnenvoering
        van de schoen, wat invloed heeft op comfort, ademend vermogen en warmte.
    lining_type:
      name: Voering type
      description: Specificeert of het zwemkledingstuk gevoerd is en in welke mate.
    link_connection_style:
      name: Schakel verbindingsstijl
      description: Classificeert hoe de schakel de ketting verbindt (bijv. quick link,
        verbindingspin), zodat fietsers de juiste installatiemethode of het juiste
        vervangingsonderdeel kunnen kiezen.
    live_bait_form:
      name: Levend aas vorm
      description: Specificeert de fysieke vorm of conserveringsstaat van het aas,
        zoals levend, bevroren of gedroogd.
    living_room_furniture_items_included:
      name: Inbegrepen woonkamermeubelstukken
      description: Specificeert de afzonderlijke meubelstukken die deel uitmaken van
        de woonkamerset, zodat shoppers snel precies begrijpen welke onderdelen (bijv.
        bank, loveseat, salontafel) zijn inbegrepen.
    load_mechanism:
      name: Laadmechanisme
      description: Specificeert de primaire methode waarmee weerstand wordt gegenereerd
        of toegevoegd aan de machine (bijv. selectorized weight stack, plate-loaded,
        band-loaded).
    lock_cylinder_type:
      name: Slotcilinder type
      description: Specificeert het type sleutelcilinder/kern dat wordt gebruikt (relevant
        voor weerstand tegen lockpicking en vervangende sleutels).
    lock_security_level:
      name: Slot beveiligingsniveau
      description: Beschrijft de beveiligingskenmerken van het slot/de cilinder tegen
        lockpicking en boren.
    lock_system:
      name: Slot systeem
      description: Type veiligheidsvergrendelingssysteem dat wordt gebruikt om de
        lift op hoogte te houden.
    locker_bench_configuration:
      name: Lockerbank configuratie
      description: Beschrijft de oriëntatie of structurele configuratie van de lockerbank
        (bijv. enkelzijdig, dubbelzijdig eiland, wandgemonteerd).
    locomotive_prototype_power_type:
      name: Locomotiefprototype aandrijvingstype
      description: Specificeert het echte locomotiefaandrijvingstype dat door het
        model wordt weergegeven.
    locomotive_wheel_arrangement_whyte_notation:
      name: Locomotief wielopstelling (Whyte-notatie)
      description: Wielopstelling van het locomotiefprototype (bijv. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Hoogslaper hoogteclassificatie
      description: Geeft de algemene hoogtestijl van de hoogslaper aan (laag, midden,
        hoog, extra hoog), zodat shoppers deze kunnen afstemmen op plafondhoogte en
        ruimtevereisten onder het bed.
    logo_application_method:
      name: Aanbrengmethode logo
      description: Beschrijft hoe het schoolwapen of logo op het kledingstuk is aangebracht
        (bijv. geborduurd of bedrukt).
    logo_label_compatible_fabric_weight:
      name: Logo label compatibel stofgewicht
      description: Aanbevolen stofgewichtcategorie voor het bevestigen van het label
        zonder vervorming of bulk.
    logo_label_edge_finish:
      name: Logo label randafwerking
      description: Specificeert de randconstructie/-afwerking van het label, wat invloed
        heeft op rafelbestendigheid en comfort tegen de huid.
    logo_label_print_production_method:
      name: Logo label print-/productiemethode
      description: Hoe het logo op het labeloppervlak wordt aangebracht/gevormd.
    long_block_completeness:
      name: Long block volledigheid
      description: Specificeert welke belangrijke onderdelen bij de long block-montage
        zijn inbegrepen.
    long_john_pieces_included:
      name: Long john meegeleverde delen
      description: Verduidelijkt of het product alleen het onderstuk, alleen het bovenstuk
        of beide delen van de long john-set bevat.
    longan_variety:
      name: Longan variëteit
      description: Specificeert de cultivar of commerciële variëteit van de longanvrucht
        (bijv. Kohala, Biew Kiew), zodat shoppers de gewenste smaak-, maat- en zoetheidskenmerken
        kunnen herkennen.
    loom_accessories_included:
      name: Inbegrepen weefgetouwaccessoires
      description: Belangrijke accessoires die bij het weefgetouw in de doos/verpakking
        zijn inbegrepen.
    loom_finish:
      name: Weefgetouw afwerking
      description: De oppervlakafwerking van het weefgetouw (vooral voor houten weefgetouwen).
    loom_folding_portability_design_type:
      name: Weefgetouw vouw-/draagbaarheidsontwerp type
      description: Of en hoe het weefgetouw kan worden gevouwen/ingeklapt voor transport
        of compacte opslag.
    loom_frame_folding_design:
      name: Opvouwbaar ontwerp van Frame
      description: Specificeert of en hoe het frame van het tafelweefgetouw wordt
        gevouwen, ingeklapt of gedemonteerd voor opslag of transport.
    loom_tension_adjustment_method:
      name: Weefgetouw spanningsaanpassingsmethode
      description: Primaire methode die wordt gebruikt om de kettingspanning op het
        weefgetouw aan te passen.
    loom_tie_up_system:
      name: Weefgetouw aanbindsysteem
      description: Type aanbind-/verbindingssysteem dat wordt gebruikt tussen trappers/lams/schachten
        (bijv. Texsolv of metalen ketting).
    loquat_variety:
      name: Loquat ras
      description: Specificeert de cultivar of variëteit van de loquat, met verschillen
        in maat, smaak, rijpingsseizoen en uiterlijk.
    lubricant_features:
      name: Smeermiddel kenmerken
      description: Benadrukt speciale prestatiekenmerken, additieven of voordelen
        van het smeermiddel.
    lubrication_requirement:
      name: Smering vereiste
      description: Geeft aan of de loopbandband voorbehandeld/onderhoudsvrij is of
        regelmatige smering of waxing vereist.
    lubrication_type:
      name: Type smering
      description: Specificeert de smering/smeerbaarheid van de bus en of deze ontworpen
        is om met vet te worden onderhouden (bijv. groeven of een smeernippel).
    lug_nut_seat_profile:
      name: Wielmoer zittingprofiel
      description: Specificeert het wielmoer zittingprofiel dat door het wiel vereist
        is voor correcte wielmoercompatibiliteit en veilige montage.
    lumbar_support_type:
      name: Lendensteun type
      description: Beschrijft de stijl van de lendensteun die bij de stoel wordt geleverd
        (bijv. afneembaar kussen, verstelbaar mechanisme, massage).
    lunge_trainer_style:
      name: Lunge trainer stijl
      description: Definieert het structurele ontwerp van een lunge trainer.
    lure_buoyancy:
      name: Drijfvermogen kunstaas
      description: Specificeert hoe het kunstaas zich in de waterkolom gedraagt wanneer
        het stilligt of wordt binnengehaald (bijv. drijvend aan het oppervlak, zwevend
        in het midden van het water of zinkend).
    luster:
      name: Glans
      description: Beschrijft de manier waarop licht reageert op het oppervlak van
        het specimen (bijv. glasachtig, metaalachtig).
    lychee_cultivar:
      name: Lychee cultivar
      description: Geeft de specifieke lycheevariëteit of cultivar aan, zoals Brewster,
        Hak Ip of Mauritius, die kunnen verschillen in smaak, pitgrootte, oogstseizoen
        en prijs.
    lyre_flip_folder_mounting_location:
      name: Lyra/flipfolder bevestigingslocatie
      description: Waar de lyra of flipfolder bedoeld is om op het instrument of accessoire
        te worden bevestigd (bijv. beker, mondpijp, standaard).
    lyrics_display_type:
      name: Lyrics weergavetype
      description: Hoe lyrics worden weergegeven (indien ondersteund) tijdens karaoke.
    magazine_compatibility:
      name: Magazijn compatibiliteit
      description: Geeft de primaire magazijnkalibers of magazijntypen aan waarvoor
        de ingebouwde vakken van het vest zijn ontworpen.
    magnet_requirement:
      name: Magneet vereiste
      description: Geeft aan of de sensor een externe magneet nodig heeft om te werken.
    magnet_toy_storage_included:
      name: Magneetspeelgoed meegeleverde opberging
      description: Type opberging/etui dat bij het magneetspeelgoed wordt geleverd
        voor bureau-organisatie en reizen.
    malanga_variety:
      name: Malanga variëteit
      description: Geeft de specifieke variëteit van de malanga/tarowortel aan die
        wordt verkocht om shoppers te helpen de gewenste smaak, kleur of culinaire
        toepassing te kiezen.
    malt_color_rating_system:
      name: Mout kleurbeoordelingssysteem
      description: Specificeert naar welke kleurenschaal de vermelde kleur verwijst
        (Lovibond, SRM of EBC).
    malt_crush:
      name: Mout schroting
      description: Geeft aan of de basismout heel/ongeschroot of voorgeschroot wordt
        verkocht, en zo ja, de schrootstijl.
    malt_form:
      name: Mout vorm
      description: Geeft aan of het product als hele korrels wordt verkocht of is
        verwerkt voor maischen (bijv. geschroot).
    malt_intended_use:
      name: Beoogd gebruik mout
      description: Beoogd primair gebruik voor de mout (brouwen, distilleren of dubbel
        doel).
    malt_treatment:
      name: Mout behandeling
      description: Beschrijft hoe het graan/de mout verder is verwerkt dan standaard
        eesten (veelvoorkomende speciale processen).
    malt_usage_purpose:
      name: Mout gebruiksdoel
