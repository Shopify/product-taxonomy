    scale_units:
      name: Schaaleenheden
      description: De meeteenheden die op de balk zijn gedrukt/gegraveerd voor het
        instellen van straal/diameter.
    scent_function:
      name: Geurfunctie
      description: Definieert de primaire functie van een geurproduct, zodat jagers
