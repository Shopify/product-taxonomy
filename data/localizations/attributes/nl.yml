        kunnen beoordelen.
    seal_material:
      name: Afdichting materiaal
      description: Materiaal dat wordt gebruikt voor de nek-, pols- en enkelafdichtingen
        of pakkingen die het pak waterdicht houden.
    seal_type:
      name: Afdichting type
      description: Specificeert de afdichtingsmethode die door de fitting wordt gebruikt
        om koelvloeistoflekkage te voorkomen.
    sealant_formulation:
      name: Afdichtmiddel formulering
      description: Geeft de primaire chemische formulering of additieftechnologie
