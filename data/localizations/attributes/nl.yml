    saxophone_neck_type:
      name: Saxofoon hals type
      description: Specificeert de halsconfiguratie die bij de bassaxofoon wordt geleverd.
    saxophone_package_contents:
      name: Saxofoon pakketinhoud
      description: Vermeldt welke belangrijke accessoires bij de saxofoon zijn inbegrepen
