        gewichtballast, veilig waden).
    swim_board_features:
      name: Zwembordkenmerken
      description: Benadrukt speciale kenmerken of verbeteringen van het zwembord
        die bruikbaarheid of veiligheid verbeteren.
    swim_bottom_length:
      name: Zwembroek lengte
      description: Geeft een classificatie van de algehele beenbedekking van de zwembroek
        (bijv. korte broek versus knielange broek).
    swim_buoy_features:
      name: Zwemboei kenmerken
      description: Legt aanvullende opvallende kenmerken of extra's vast die de zichtbaarheid,
