    fringe_trim_style:
      name: Franjeafwerking stijl
      description: Specificeert de constructie/stijl van de franjeafwerking (hoe de
        strengen of lussen zijn gevormd en gepresenteerd).
    front_axle_standard:
      name: Voorasstandaard
      description: Vermeldt de asdiameter en inbouwbreedte waarvoor de voorvork is
        ontworpen (bijv. 15 × 110 mm Boost), zodat de naaf compatibel is.
    front_button_configuration:
      name: Knoopsluiting voorzijde
      description: Geeft de knoopsluiting aan de voorkant van een jas aan, met vermelding
        of deze enkel- of double-breasted is en hoeveel knopen er aan de voorkant
        zitten.
    front_closure_style:
      name: Voorsluiting stijl
      description: Geeft de stijl van de constructie aan de voorkant van de trenchcoat
        aan, zoals enkel- of double-breasted, open, overslag of rits.
    front_decoration_type:
      name: Voorkant decoratietype
      description: Identificeert het type versiering of patch op de voorkant van de
        hoed (bijv. geborduurde patch, leren patch).
    front_point_configuration:
      name: Configuratie voorpunten
      description: Specificeert het ontwerp van de voorpunten (mono-point, dual-point,
