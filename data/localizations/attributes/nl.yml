      name: Schoolbus carrosserietype
      description: Classificeert een schoolbus op basis van gangbare carrosserie-/klasse-indelingen
        die in de markt worden gebruikt (bijv. Type A-D).
    school_bus_safety_feature:
      name: Schoolbus veiligheidskenmerk
      description: Opvallende veiligheidsuitrusting die op de schoolbus is geïnstalleerd.
    school_glue_washability:
      name: Schoollijm uitwasbaarheid
      description: Geeft aan hoe gemakkelijk de opgedroogde/natte lijm van huid/kleding/oppervlakken
