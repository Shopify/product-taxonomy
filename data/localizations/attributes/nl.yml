        en gemengd terrein.
    front_seat_position:
      name: Voorstoel positie
      description: Aan welke kant/positie op de voorste rij de stoel bedoeld is.
    front_style:
      name: Voorkant stijl
      description: Beschrijft de constructie aan de voorkant van de chino, waarbij
        wordt aangegeven of de broek een vlakke voorkant, plooien of andere details
        heeft.
    frosting_or_icing_type:
      name: Glazuur- of icingtype
      description: Specificeert het type glazuur of icing dat op de taart of dessertreep
        is aangebracht.
    fruit_cultivar_or_variety:
      name: Fruitcultivar of -variëteit
      description: Specificeert de specifieke cultivar of variëteitsnaam van het fruit
        (bijv. Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Fruit snijstijl
      description: Beschrijft hoe het fruit is bereid of gesneden (bijv. heel, in
        plakjes, in blokjes).
    fruit_mix_variety:
      name: Fruitmix variëteit
      description: Benoemt de thematische mix of algemene variëteit van de fruitmix
        (bijv. Tropical Mix, Berry Medley).
    fruit_piece_form:
      name: Fruitstuk vorm
      description: Beschrijft de fysieke snijvorm of presentatie van gedroogde fruitstukken,
        bijv. heel, in plakjes, poeder.
    fruit_snack_form:
      name: Fruitsnackstijl
      description: Classificeert de fysieke vorm of stijl waarin de fruitsnack wordt
        gepresenteerd.
    fruit_topping_format:
      name: Fruittopping vorm
      description: Beschrijft de fysieke vorm, textuur of stijl van de topping, zodat
        shoppers kunnen kiezen tussen sauzen, siropen, stukjes fruit, popping pearls,
        enz.
    fruit_variety:
      name: Fruitsoort
      description: Identificeert het primaire fruit dat wordt gebruikt voor een fruitwijnrecept/-pakket/-benodigdheid
        (bijv. appel, kers, braam).
    fuel_cap_gasket_seal_material:
      name: Brandstofdop pakking-/afdichtingsmateriaal
      description: Specificeert het materiaal dat wordt gebruikt voor de afdichtingspakking/O-ring
        van de brandstofdop.
    fuel_cap_locking_mechanism:
      name: Vergrendelingsmechanisme brandstofdop
      description: Geeft de vergrendelingsmethode aan die wordt gebruikt door een
        afsluitbare brandstofdop.
    fuel_cap_type:
      name: Type brandstofdop
      description: Specificeert het functionele type/ontwerp van de brandstofdop die
        wordt gebruikt voor de brandstofvulhals van een voertuig.
    fuel_cap_venting:
      name: Brandstofdop ontluchting
      description: Geeft aan of de brandstofdop geventileerd is en, indien van toepassing,
        de ontluchtingsstijl.
    fuel_filter_features:
      name: Brandstoffilter kenmerken
      description: Vermeldt opvallende functionele kenmerken van het brandstoffilter
        (waterafscheiding, aftapkraan, sensorpoort, enz.).
    fuel_filter_media_material:
      name: Brandstoffilter filtermediummateriaal
      description: Specificeert het primaire filtermedium dat in het brandstoffilterelement
        wordt gebruikt.
    fuel_filter_mounting_connection_type:
      name: Brandstoffilter montage-/aansluittype
      description: Specificeert hoe het brandstoffilter wordt aangesloten/geïnstalleerd
        (schroefdraad/spin-on, snelkoppeling, slangtule, banjo, enz.).
    fuel_injection_cleaning_method:
      name: Brandstofinjectie reinigingsmethode
      description: Geeft aan hoe de set wordt gebruikt om het brandstofinjectiesysteem
        te reinigen.
    fuel_injector_electrical_connector_type:
      name: Brandstofinjector type elektrische connector
      description: Specificeert de standaard/vorm van de elektrische connector van
        de injector.
    fuel_injector_seat_type:
      name: Brandstofinjector zittingtype
      description: Specificeert de interface-stijl van de injectortip/-zitting die
        wordt gebruikt voor afdichting bij de inlaat/brandstofrail.
    fuel_injector_spray_pattern:
      name: Brandstofinjector sproeipatroon
      description: Identificeert het brandstofsproei-/verdelingspatroon van de injector
        volgens fabrikant- of brancheterminologie (bijv. kegel, waaier, potloodstraal,
        multi-hole).
    fuel_level_sensor_mounting_type:
      name: Brandstofniveausensor montagetype
      description: Specificeert de fysieke montage-interface waarmee de brandstofniveausensor/-gever
        aan de brandstoftank of pompmodule wordt bevestigd.
    fuel_level_sensor_sensing_mechanism:
      name: Brandstofniveausensor detectiemechanisme
      description: Specificeert het detectiemechanisme/de technologie die wordt gebruikt
        om het brandstofniveau te meten in een brandstofniveausensor of geverunit.
    fuel_line_compliance_standard:
      name: Brandstofleiding conformiteitsnorm
      description: Identificeert de regelgevende of branchenorm waaraan de brandstofleiding
        voldoet (gebruikelijk in maritieme toepassingen).
    fuel_line_connector_interface_type:
      name: Brandstofleiding connector-interfacetype
      description: Specificeert de aansluit-/interfacestijl aan het uiteinde/de uiteinden
        van de brandstofleiding of fitting.
    fuel_pressure_regulator_body_material:
      name: Brandstofdrukregelaar behuizingsmateriaal
      description: Specificeert het materiaal van de behuizing/body van de regelaar
        voor duurzaamheid en corrosiebestendigheid.
    fuel_pressure_regulator_mounting_type:
      name: Brandstofdrukregelaar montagetype
      description: Specificeert hoe de brandstofdrukregelaar wordt gemonteerd of geïnstalleerd,
        wat van invloed is op pasvorm en compatibiliteit.
    fuel_pump_inlet_type:
      name: Brandstofpomp inlaattype
      description: Aansluitstijl bij de pompinlaat.
    fuel_pump_mounting_location:
      name: Brandstofpomp montagelocatie
      description: Waar de brandstofpomp in/op het brandstofsysteem van het voertuig
        is geïnstalleerd.
    fuel_pump_outlet_connection_type:
      name: Brandstofpomp uitlaataansluitingstype
      description: Specificeert de fysieke aansluitstijl bij de brandstofpompuitlaat
        voor montage-/installatiecompatibiliteit.
    fuel_system_application:
      name: Brandstofsysteem toepassing
      description: Brandstoftoevoersysteemarchitectuur waarvoor de brandstofpomp is
        ontworpen om te ondersteunen (bijv. carburateur, EFI, GDI, diesel lift/transfer).
    fuel_system_connection_type:
      name: Brandstofsysteem aansluitingstype
      description: Specificeert de aansluitnorm(en) of adapterinterface(s) van het
        brandstofsysteem die door de kit worden ondersteund.
    fuel_system_type:
      name: Type brandstofsysteem
      description: Specificeert het brandstoftoevoersysteem van de motor (bijv. carburateur
        of brandstofinjectiearchitectuur).
    fuel_tank_installation_position:
      name: Brandstoftank installatiepositie
      description: Specificeert de gebruikelijke installatiepositie van de brandstoftank
        op het voertuig.
    fuel_tank_orientation:
      name: Brandstoftank oriëntatie
      description: Specificeert of de brandstoftank bedoeld is om horizontaal of verticaal
        te worden geïnstalleerd.
    fuel_tank_shape:
      name: Brandstoftank vorm
      description: Beschrijft de algemene vormfactor/vorm van de brandstoftank ter
        ondersteuning van fysieke passing en vervangingsmatching.
    fur_type:
      name: Bonttype
      description: Identificeert de diersoort of het imitatiemateriaal van bont aan
        de buitenkant van de mof, clutch of tas.
    furniture_finish:
      name: Meubelafwerking
      description: Beschrijft de oppervlaktebehandeling of afwerking die op het meubelstuk
        is aangebracht en die van invloed is op het uiterlijk en de onderhoudsvereisten.
    fuse_form_factor:
      name: Vormfactor zekering
      description: Specificeert de fysieke zekeringstijl/voetafdruk om ervoor te zorgen
        dat deze in de beoogde zekeringhouder of zekeringkast past (bijv. steekzekering
        vs. patroonzekering).
    fuse_terminal_or_mount_style:
      name: Zekering aansluit- of montagestijl
      description: Specificeert hoe de zekering mechanisch/elektrisch wordt aangesloten
        (plug-in vs. vastgeschroefd vs. in-line).
    fusible_application_method:
      name: Aanbrengmethode smeltbare lijm
      description: Specificeert hoe een smeltbare lijm wordt geactiveerd/aangebracht
        (bijv. opstrijkwarmte, persen, versteviging door naaien).
    fusible_hem_tape_application_method:
      name: Smeltbare zoomtape applicatiemethode
      description: Beschrijft hoe de tape wordt geactiveerd/aangebracht (bijv. opstrijkbaar,
        hittepers).
    fusible_seam_tape_activation_method:
      name: Activeringsmethode van smeltbare naadband
      description: Geeft aan hoe de lijm tijdens het aanbrengen wordt geactiveerd.
    fusible_seam_tape_application:
      name: Smeltbare naadtape toepassing
      description: Specificeert het primaire beoogde gebruik van de smeltbare naadtape.
    fusible_seam_tape_material:
      name: Smeltbare naadtape materiaal
      description: Materiaal of samenstelling van de tape/web/drager (niet de stof
        waaraan deze hecht).
    fusible_seam_tape_washability:
