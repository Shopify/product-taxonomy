        touch/knop of elektrisch uitschuifbaar.
    door_lock_knob_attachment_method:
      name: Deurslotknop bevestigingsmethode
      description: Specificeert hoe de deurslotknop aan de slotstang wordt bevestigd,
        bijvoorbeeld met schroefdraad of push-on.
    door_lock_position:
      name: Deurslot positie
      description: Specificeert voor welke deur-/openingspositie het deurslot of deurslotonderdeel
        op een voertuig is ontworpen.
    door_seal_feature_set:
      name: Deurafdichting kenmerken set
      description: Functionele kenmerken van de deurafdichting.
    door_seal_material_type:
      name: Deurafdichting materiaaltype
      description: Primaire elastomeer-/materiaalfamilie die voor de deurafdichting
        wordt gebruikt, naast generiek materiaal.
    door_seal_product_form:
      name: Deurafdichting productvorm
      description: Geeft de verkoop-/verpakkingsvorm van de deurafdichting aan.
    door_window_operation:
      name: Bediening deurraam
      description: Specificeert of het raamsysteem van de deur bedoeld is voor handmatige
        of elektrische bediening, of dat de deur geen raam heeft.
    double_decker_bus_deck_configuration:
      name: Dubbeldekkerbus dekconfiguratie
      description: Specificeert de dektoegang-/dakconfiguratie van een dubbeldekkerbus.
    double_drum_pedal_linkage_medium:
      name: Dubbel bassdrumpedaal koppelingsmedium
      description: Specificeert het medium waarmee het secundaire pedaal aan het primaire
        pedaal is gekoppeld, bijvoorbeeld aandrijfas, ketting of riem.
    double_end_bag_core_type:
      name: Dubbelzeidig zak kerntype
      description: Identificeert de constructie van de interne slagkern, die de reboundsnelheid,
        het gevoel en de onderhoudsvereisten bepaalt.
    double_pointed_needle_point_style:
      name: Tweezijdige naald puntstijl
      description: Beschrijft de scherpte/vorm van de punt die bedoeld is voor verschillende
        garens en breistijlen.
    dough_extruder_accessories_included:
      name: Deegextruder meegeleverde accessoires
      description: Extra onderdelen die bij de deegextruder zijn inbegrepen.
    dough_extruder_operation_type:
      name: Deegextruder werkingstype
      description: Hoe het deeg door de extruder wordt geduwd om vormen te maken.
    dough_extruder_shape_disc_included:
      name: Deegextruder vormschijf inbegrepen
      description: De vorm of vormen die de extruder kan produceren met de meegeleverde
        schijven/spuitmonden.
    dough_format:
      name: Deegformaat
      description: Geeft de fysieke presentatie/vorm van het deeg in de verpakking
        aan, bijvoorbeeld bal, vel, schijf of geraspte strengen.
    doumbek_accessories_included:
      name: Inbegrepen doumbekaccessoires
      description: Accessoires die bij de doumbek zijn inbegrepen, bijvoorbeeld stemsleutel
