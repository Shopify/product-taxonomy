      description: Beschrijft het krommingsprofiel van de werpstok, wat invloed heeft
        op werpafstand en nauwkeurigheid.
    stick_head_shape:
      name: Stok kopvorm
      description: Definieert de vorm van de stokkop, wat invloed heeft op vangen,
        slagstijl en balcontrole van dichtbij.
    stick_size_compatibility:
      name: Compatibiliteit hockeystickformaat
      description: Geeft aan met welke hockeystick maatgroep het product compatibel
