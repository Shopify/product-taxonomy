    fringe_curtain_finish:
      name: Franjegordijn afwerking
      description: Beschrijft de visuele afwerking van het franjeoppervlak (glans/textuur).
    fringe_curtain_material:
      name: Franjegordijn materiaal
      description: Specificeert het primaire materiaal van de gordijnstroken (bijv.
        PET-folie, kunststof, papier, stof).
    fringe_curtain_use_location:
      name: Franjegordijn gebruikslocatie
      description: Geeft aan of het franjegordijn bedoeld is voor binnengebruik, buitengebruik
