    drive_system:
      name: Aandrijving systeem
      description: Specificeert het mechanisme dat pedaalkracht overbrengt naar het
        weerstandssysteem.
    drivetrain_configuration:
      name: Configuratie van aandrijving
      description: Specificeert de aandrijflijnconfiguratie op de fiets, waarbij wordt
        aangegeven of de achternaaf vast, freewheel single-speed of flip-flop is.
    drivetrain_speed_compatibility:
      name: Aandrijflijn snelheid compatibiliteit
      description: Vermeldt de cassettesnelheden waarvoor het kettingblad is ontworpen,
        zodat het juiste tandprofiel en de juiste afstand worden gegarandeerd.
    drone_positioning_system:
      name: Drone positioneringssysteem
      description: Positionerings-/houdtechnologie aan boord die door de drone wordt
        ondersteund voor navigatie en stabiel zweven.
    drone_transmission_type:
      name: Drone transmissie type
      description: Primaire methode die wordt gebruikt voor de besturings- en/of videoverbinding
        tussen de drone en controller/het apparaat.
    drop_spindle_whorl_position:
      name: Spintol schijf positie
      description: Locatie van de schijf op de schacht.
    drum_carder_accessories_included:
      name: Inbegrepen accessoires kaardemolen
      description: Veelvoorkomende inbegrepen items bij een trommelkaarde set.
    drum_clamp_locking_mechanism:
      name: Drumklem vergrendelingsmechanisme
      description: Specificeert hoe de klem vergrendelt/aandraait op de buis/spanrand
        (bijv. vleugelbout, drumsleutelbout, snelspanner).
    drum_clamp_mount_interface:
      name: Drumklem montage-interface
      description: Specificeert wat de klem biedt voor het bevestigen van accessoires
        (bijv. L-rod ontvanger, kogelgewricht, bekkenkantelaar).
    drum_clamp_type:
      name: Drumklem type
      description: Specificeert de functionele klemstijl die wordt gebruikt in montagemateriaal
        voor drumstellen (bijv. hoopklem vs rack-/buisklem).
    drum_head_application_batter_resonant:
      name: Drumvel toepassing (slagvel/resonantievel)
      description: Specificeert voor welke kant/rol het vel op een drum is ontworpen
        (bovenste speeloppervlak vs onderste resonantie-/snarezijde).
    drum_head_collar_type:
      name: Drumvel kraag type
      description: Specificeert of het vel een standaardkraag, lage kraag of speciaal
        kraagprofiel heeft dat bij bepaalde draagranden/ketels past.
    drum_head_damping_control:
      name: Drumvel dempingsregeling
      description: Ingebouwde boventoonregelfuncties of dempingsstijl die in het velontwerp
        zijn opgenomen.
    drum_head_film_material:
      name: Drumvel folie materiaal
      description: Primair materiaal van de velfolie (meestal PET/Mylar, maar kan
        ook speciale materialen omvatten).
    drum_head_hoop_collar_type:
      name: Type spanring/kraag van drumvel
      description: Identificeert de spanrand- en kraagconstructie van het drumvel
        (bijv. kraagprofiel en spanrandmateriaal), wat van invloed kan zijn op de
        pasvorm en stemstabiliteit op bepaalde ketels en randen.
    drum_head_hoop_rim_material:
      name: Drumvel spanrand/rand materiaal
      description: Materiaal van de ingewerkte spanrand/rand (de ingebedde rand in
        het vel), wat de duurzaamheid en stemstabiliteit kan beïnvloeden.
    drum_head_included:
      name: Drumvel inbegrepen
      description: Geeft aan of slagvellen en/of resonantievellen bij de drum zijn
        inbegrepen.
    drum_head_muffling_feature:
      name: Dempingseigenschap drumvel
      description: Ingebouwde boventoonregelfuncties die in het drumvel zijn geïntegreerd.
    drum_head_muffling_type:
      name: Drumvel demping type
      description: Geeft aan of het drumvel ingebouwde boventoonregeling/dempingselementen
        bevat.
    drum_head_ply_count:
      name: Drumvel aantal lagen
      description: Aantal folielagen dat in de drumvelconstructie wordt gebruikt (bijv.
        1-laags, 2-laags).
    drum_head_position:
      name: Drumvel positie
      description: Geeft aan of het drumvel bedoeld is als slagvel (boven-/slagvel),
        resonantievel (ondervel), snare-side vel (ondervel), of op beide manieren
        kan worden gebruikt.
    drum_head_reinforcement_type:
      name: Drumvel versteviging type
      description: Specificeert of het snarevel verstevigingsfuncties bevat, zoals
        een center dot of control ring, om de duurzaamheid te verhogen en de toon
        te focussen.
    drum_head_surface_finish:
      name: Oppervlakteafwerking drumvel
      description: Oppervlaktetextuur/afwerking van het vel die de attack en penseelrespons
        beïnvloedt.
    drum_head_type:
      name: Drumvel type
      description: Specificeert de velconstructie/het veltype dat op de drum wordt
        gebruikt (voornamelijk voor meegeleverde slag-/resonantievellen).
    drum_key_design_type:
      name: Ontwerptype stemsleutel
      description: Beschrijft het functionele ontwerp van de spansleutel voor drums
        (bijv. standaard, ratel, T-greep).
    drum_key_drive_type:
      name: Drumsleutel aandrijving type
      description: Specificeert de aandrijving-/interfacestijl van de drumsleutel
        die wordt gebruikt om de spanschroef of het montagemateriaal aan te draaien.
    drum_key_handle_style:
      name: Drumsleutel handvat stijl
      description: Beschrijft de handvat-/ergonomische stijl van de drumsleutel, met
        invloed op comfort en hefboomwerking tijdens het stemmen.
    drum_kit_included_items:
      name: Drumstel inbegrepen items
      description: Vermeldt welke belangrijke items in de drumstelbundel zijn inbegrepen
        naast de ketels/pads (bijv. hardware, bekkens, drumkruk).
    drum_kit_portability:
      name: Drumstel draagbaarheid
      description: Geeft aan of de set is ontworpen voor compacte opslag/transport
        (bijv. reis-/compact-/opvouwbaar formaat).
    drum_kit_shell_construction_features:
      name: Drumstel ketel constructiekenmerken
      description: Hoe de ketels zijn geconstrueerd (aantal/type lagen), wat invloed
        heeft op de klank en duurzaamheid.
    drum_mount_clamp_type:
      name: Type drumklem
      description: Beschrijft de klemvormfactor die wordt gebruikt in montagemateriaal
        voor drums.
    drum_multi_clamp_clamp_type:
      name: Drum multiklem klemtype
      description: De functionele stijl/configuratie van de multiklem (hoe deze klemt
        en wat deze verbindt).
    drum_mute_material:
      name: Drum demper materiaal
      description: Specificeert het primaire materiaal van de drumdemper dat contact
        maakt met het drumvel en/of trillingen dempt.
    drum_pad_triggering_zones:
      name: Drumpad triggerzones
      description: Geeft het aantal/type triggerzones aan dat door de tompad wordt
        ondersteund (bijv. alleen vel vs vel+rand), wat invloed heeft op expressiviteit
        en modulecompatibiliteit.
    drum_pedal_accessories_included:
      name: Inbegrepen accessoires drumpedaal
      description: Vermeldt de belangrijkste accessoires en onderdelen die bij het
        drumpedaal zijn verpakt.
    drum_pedal_baseplate_type:
      name: Drumpedaal basisplaat type
      description: Geeft aan of het pedaal een basisplaat of een zwevend/frameloos
        ontwerp gebruikt.
    drum_pedal_bearing_type:
      name: Drumpedaal lager type
      description: Specificeert het lagermechanisme dat wordt gebruikt bij de primaire
        draaipunten (bijv. rocker, hiel, cam).
    drum_pedal_cam_type:
      name: Type cam drumpedaal
      description: Specificeert de camvorm/geometrie van een drumpedaal die het gevoel
        en de respons beïnvloedt (bijv. lineair vs accelerator).
    drum_pedal_chain_configuration:
      name: Drumpedaal ketting configuratie
      description: Specificeert de kettingopstelling die wordt gebruikt door een drumpedaal
        met kettingaandrijving (bijv. enkele ketting, dubbele ketting of offsetketting).
    drum_pedal_chain_type:
      name: Type ketting drumpedaal
      description: Geeft de stijl van de ketting aan die in de aandrijving wordt gebruikt
        (bijv. rollenketting vs fietsstijlketting), wat de soepelheid en duurzaamheid
        kan beïnvloeden.
    drum_pedal_clamp_type:
      name: Drumpedaal klem type
      description: Specificeert hoe het pedaal aan de spanrand van de basdrum wordt
        bevestigd.
    drum_pedal_intended_use:
      name: Drumpedaal beoogd gebruik
      description: Geeft de primaire speelcontext aan waarvoor het pedaal met riemaandrijving
        is ontworpen/op de markt wordt gebracht.
    drum_pedal_spring_adjustment_method:
      name: Drumpedaal veerspanning afstelmethode
      description: Geeft aan hoe de veerspanning op het pedaal wordt afgesteld.
    drum_pedal_spring_type:
      name: Veermechanisme drumpedaal
      description: Specificeert het veermechanisme dat wordt gebruikt voor de terugkeeractie
        van het pedaal.
    drum_shell_material:
      name: Materiaal drumketel
      description: Specificeert het primaire ketelconstructiemateriaal voor akoestische
        drums (bijv. esdoorn, berken, acryl).
    drum_shell_wood_species:
      name: Drumketel houtsoort
      description: Identificeert de houtsoort die voor de drumketel wordt gebruikt,
        met invloed op klank en resonantie.
    drumhead_type:
      name: Drumvel type
      description: Velconfiguratie/type dat op de octoban wordt gebruikt.
    drumstick_model:
      name: Drumstok model
      description: Gestandaardiseerde model-/maataanduiding voor drumstokken die door
        veel merken wordt gebruikt (bijv. 5A, 7A).
    drumstick_taper:
      name: Drumstok taper
      description: Beschrijft het taperprofiel van schacht tot punt, wat invloed heeft
        op rebound en balans.
    drysuit_footwear_style:
      name: Droogpak schoeisel stijl
      description: Beschrijft de geïntegreerde afwerking van het onderbeen van het
        droogpak (bijv. ingebouwde laarzen, neopreensokken, stockingfoot of blote-enkelafdichtingen).
    dumbbell_style:
      name: Halter stijl
      description: Identificeert het basisontwerp van de halter, of het nu gaat om
        een vaste eenheid, een verstelbaar systeem of een laadbare handgreepstijl,
        wat sterk van invloed is op aankoopbeslissingen en gebruikssituaties voor
        trainingen.
    dundun_playing_position:
      name: Dundun speelpositie
      description: Beoogde speel-/draagpositie voor de drum.
    dye_status:
      name: Verf status
      description: Geeft aan of de batting geverfd, ongeverfd/natuurlijk is of meerdere
        kleuren/mengingen bevat.
    dye_style:
      name: Verf stijl
      description: Specificeert of de garenkleur effen, gemêleerd of anderszins speciaal
        geverfd is.
    dye_technique:
      name: Verf techniek
      description: Methode die wordt gebruikt om de vezel te kleuren (bijv. handgeverfd,
        ketelgeverfd, space-dyed).
    dye_type_needlecraft_fabric:
      name: Verf type (borduurstof)
      description: Geeft aan of de linnen stof effen, handgeverfd of speciaal geverfd
        is.
    dyeing_color_processing:
      name: Verven / kleurverwerking
      description: Beschrijft of en hoe de vezel is gekleurd (bijv. ongeverfd, gebleekt/wit
        of specifieke verftechnieken).
    e_bike_certification_class:
      name: E-bike certificeringsklasse
      description: Specificeert de officiële snelheidsclassificatie van de band voor
        elektrische fietsen (bijv. E-25, E-50).
    e_bike_speed_rating:
      name: E-bike snelheidsclassificatie
      description: Vermeldt het officiële E-bike certificeringsniveau voor de band
        (bijv. E25 voor ≤25 km/u, E50 voor ≤50 km/u).
    e_scooter_connector_type:
      name: E-scooter connector type
      description: Identificeert de stijl van de elektrische connector of stekker
        die door het onderdeel wordt gebruikt voor stroom- of signaalverbindingen.
    e_scooter_throttle_type:
      name: E-scooter gashendel type
      description: Specificeert het type gashendel dat wordt gebruikt om de acceleratie
        op een e-scooter te regelen.
    ear_coverage:
      name: Oorbedekking
      description: Specificeert of de helm oorbescherming heeft en of deze verwijderbaar
        is.
    ear_coverage_style:
      name: Stijl oorbedekking
      description: Beschrijft hoe, of of, de oren door het vliegenmasker worden bedekt.
    ear_coverage_type:
      name: Oorbedekking type
      description: Specificeert hoe de muts de oren bedekt of beschermt, inclusief
        de aanwezigheid en stijl van oorflappen.
    ear_guard_type:
      name: Oorbeschermer type
      description: Beschrijft de stijl van de oorbescherming die in de pet is geïntegreerd,
        zoals hard plastic, gewatteerd of verwijderbare beschermers.
    earmuff_style:
      name: Oorwarmers stijl
      description: Identificeert hoe de oorwarmer wordt gedragen of wat de structurele
        ontwerpstijl is (bijv. over het hoofd of wikkelmodel achter het hoofd).
    earring_closure_type:
      name: Type oorbelsluiting
      description: Specificeert het mechanisme waarmee de oorbel aan het oor wordt
        bevestigd (bijv. poussette, leverback, clip-on).
    easel_art_desk_features:
      name: Ezel & tekentafel functies
      description: Benadrukt veelvoorkomende functionele functies die bij de ezel
        of tekentafel zijn inbegrepen.
    easel_art_desk_surface_type:
      name: Ezel & tekentafel oppervlak type
      description: Identificeert de bruikbare teken-/schrijfoppervlakken die worden
        geboden (bijv. krijtbord, whiteboard, papierrol, magnetisch bord).
    eb_clarinet_body_type:
      name: Type body Es-klarinet
      description: Specificeert of de Eb-klarinet een sopraan- of altvariant is.
    eco_material_type:
      name: Eco materiaal type
      description: Benadrukt het milieubewuste schuim of materiaaltechnologie dat
        in de pad wordt gebruikt.
    edge_construction:
      name: Randconstructie
      description: Geeft aan of de ski een metalen kant heeft over geen, een deel
        van of de volledige lengte.
    edge_tuner_type:
      name: Kantenslijper type
      description: Classificeert de stijl van de ski- of snowboardkantenslijper, zoals
        een vijlgeleider of elektrische machine.
    edible_plant_part:
      name: Eetbaar plantendeel
      description: Geeft aan welk deel van de plant voor consumptie wordt verkocht.
    educational_guide_included:
      name: Educatieve gids inbegrepen
      description: Geeft aan welke leermaterialen bij het model zijn inbegrepen.
    educational_topic:
      name: Educatief onderwerp
      description: Primair leeronderwerp dat wordt ondersteund door de educatieve
        inhoud van de mierenboerderij.
    egg_component:
      name: Ei component
      description: Geeft aan welk deel van het ei het product bevat, zoals heel ei,
        alleen eiwit, eidooiers of mengsels/vervangers.
    egg_component_replaced:
      name: Ei component vervangen
      description: Geeft aan welk deel van het ei het product moet vervangen (bijv.
        heel ei, eiwit).
    egg_enrichment:
      name: Ei verrijking
      description: Geeft aan welke nutritionele verrijking aan de eieren is toegevoegd,
        zoals verrijking met omega 3 of vitamine D.
    egg_farming_method:
      name: Ei houderijmethode
      description: Geeft de productie- of houderijmethode aan die voor de eieren wordt
        gebruikt (bijv. kooi-vrij, vrije uitloop, biologisch).
    egg_grade:
      name: Ei klasse
      description: Geeft de kwaliteitsklasse aan die door regelgevende instanties
        of brancheorganisaties is toegewezen.
    egg_processing_state:
      name: Ei verwerkingstoestand
      description: Geeft aan welke verwerking op de eieren is toegepast vóór verkoop
        (bijv. vers, gezouten, century egg).
    egg_production_method:
      name: Ei productie methode
      description: Specificeert het houderij- of huisvestingssysteem dat wordt gebruikt
        om de eieren te produceren (bijv. kooivrij, weidehouderij, biologisch).
    egg_replacer_main_ingredient:
      name: Eivervanger hoofdingrediënt
      description: Geeft het primaire basisingrediënt aan waaruit de eivervanger is
        gemaakt, zodat gebruikers rekening kunnen houden met dieetbehoeften of gewenste
        bakeigenschappen.
    egg_size:
      name: Ei grootte
      description: Classificeert eieren volgens standaard marktmaten.
    egg_source_animal:
      name: Ei herkomstdier
      description: Identificeert de diersoort die de eieren heeft geproduceerd.
    egg_white_processing_method:
      name: Eiwit verwerkingsmethode
      description: Geeft aan hoe het eiwit na verzameling is verwerkt (bijv. gepasteuriseerd,
        gesproeidroogd), wat invloed heeft op voedselveiligheid, houdbaarheid en gebruikssituaties.
    eggplant_variety:
      name: Aubergine variëteit
      description: Specificeert de cultivar of marktvariëteit van de aubergine, zodat
        klanten soorten kunnen kiezen die verschillen in grootte, smaak, kleur en
        culinair gebruik.
    eggshell_color:
      name: Eierschaal kleur
      description: Specificeert de overheersende schaalkleur van de eieren.
    elastic_edge_finish_type:
      name: Elastiek randafwerking/type
      description: Specificeert de randconstructie van het geweven elastiek die invloed
        heeft op comfort en toepassing.
    elastic_intended_use:
      name: Elastiek beoogd gebruik
      description: Primaire toepassing waarvoor het elastiek is ontworpen (helpt bij
        vindbaarheid en vermindert mismatches).
    elastic_recovery_performance:
      name: Elastiek herstelprestaties
      description: Beschrijft hoe goed het geweven elastiek na uitrekken terugkeert
        naar de oorspronkelijke lengte.
    elastic_recovery_quality:
      name: Elastiek herstelkwaliteit
      description: Geeft het rekherstel van het elastiek aan, oftewel hoe goed het
        na uitrekken terugkeert naar de oorspronkelijke lengte.
    elastic_stretch_level:
      name: Elastiek rekniveau
      description: Hoe ver het elastiek onder spanning kan uitrekken (vaak uitgedrukt
        als relatieve niveaus wanneer geen exact percentage wordt gegeven).
    elastic_structure:
      name: Elastiek structuur
      description: Specificeert de structurele constructie van knoopsgatelastiek (bijv.
        gebreid, geweven, gevlochten), wat invloed kan hebben op rek, herstel en naaiprestaties.
    elastic_type:
      name: Type elastiek
      description: Specificeert het constructietype van het elastiek (bijv. omvouwelastiek
        (FOE), gevlochten, gebreid, geweven).
    electric_assist_type:
      name: Elektrische ondersteuning type
      description: Geeft aan of de fiets motorondersteuning heeft en welk soort ondersteuning
        wordt geboden.
    electric_bicycle_motor_position:
      name: Elektrische fiets motorpositie
      description: Locatie van de aandrijfmotor op de elektrische fiets, zoals middenmotor,
        voornaaf, achternaaf of dubbele naafmotor.
    electric_bike_class:
      name: Elektrische fiets klasse
      description: Categoriseert de e-bike volgens wettelijke klassen die snelheidslimieten
        en gashendelondersteuning bepalen.
    electric_guitar_bridge_type:
      name: Elektrische gitaar brug type
      description: Specificeert het brug-/vibratosysteemtype op de elektrische gitaar.
    electric_instrument_output_connection_type:
      name: Elektrisch instrument uitgangsaansluiting type
      description: Specificeert de fysieke audio-uitgangsaansluiting(en) op de elektrische
        cello.
    electric_riding_vehicle_control_options:
      name: Elektrisch rijvoertuig bedieningsopties
      description: Bedienings-/gebruiksmogelijkheden die beschikbaar zijn voor de
        bestuurder/ouder (bijv. pedaal, stuurwiel, bediening op afstand).
    electric_spinning_wheel_speed_control_type:
      name: Elektrisch spinnewiel snelheidsregeling type
      description: Beschrijft hoe de gebruiker de spinsnelheid op het elektrische
        spinnewiel aanpast.
    electric_ukulele_output_jack_type:
      name: Elektrische ukelele uitgangsjack type
      description: Specificeert de fysieke uitgangsconnector die door de elektrische
        ukelele wordt gebruikt.
    electric_van_body_length_class:
      name: Lengteklasse carrosserie elektrische bestelwagen
      description: Gebruikelijke wielbasis-/lengteklasse voor elektrische vans in
        listings.
    electric_van_roof_height_class:
      name: Elektrische van dakhoogteklasse
      description: Gebruikelijke dakhoogteclassificatie voor vans (vooral bestelwagens).
    electric_vehicle_drivetrain_layout:
      name: Elektrisch voertuig aandrijflijn lay-out
      description: Motor-/asconfiguratie die beschrijft hoeveel motoren er zijn en
        waar ze zich bevinden (meer dan alleen AWD/FWD/RWD).
    electric_winder_accessories_included:
      name: Elektrische winder accessoires inbegrepen
      description: Vermeldt accessoires die bij de elektrische winder zijn inbegrepen
        (bijv. klemmen, adapters).
    electrical_connector_type:
      name: Type elektrishe connector
      description: Specificeert de connectorstijl die door het deurslot/vergrendelingssysteem
        wordt gebruikt voor elektrische integratie (indien van toepassing).
    electrical_system_voltage:
      name: Elektrisch systeem voltage
      description: Geeft de nominale spanning van het elektrische voertuigsysteem
        aan waarvoor de regelaar is ontworpen.
    electronic_cymbal_trigger_zones:
      name: Elektronisch bekken triggerzones
      description: Specificeert hoeveel onafhankelijke triggerzones de bekkenpad biedt
        (bijv. boog/rand/bel).
    electronic_drum_module_audio_interface_functionality:
      name: Elektronische drummodule audio-interface functionaliteit
      description: Geeft aan of de module kan fungeren als USB-audio-interface voor
        opname/afspelen (naast MIDI).
    electronic_drum_module_metronome_features:
      name: Elektronische drummodule metronoomfuncties
      description: Specificeert ingebouwde oefen-/metronoommogelijkheden.
    electronic_drum_module_power_source:
      name: Elektronische drummodule voedingsbron
      description: Specificeert de vereiste of ondersteunde voedingsbron voor de regelmodule.
    electronic_drum_module_sample_import_support:
      name: Elektronische drummodule sample-import ondersteuning
      description: Geeft aan of de module gebruikerssamples kan importeren en via
        welke methode.
    electronic_drum_pad_playing_surface_type:
      name: Elektronische drumpad speeloppervlak type
      description: Beschrijft de constructie van het speeloppervlak van de tompad
        (bijv. mesh head vs rubber), wat invloed heeft op rebound, geluid en gevoel.
    electronic_features:
      name: Elektronische functies
      description: Geeft aan welke elektronische/interactieve functies in het speelbankitem
        zijn inbegrepen (indien aanwezig).
    electronic_lights_and_sound:
      name: Elektronische verlichting en geluid
      description: Geeft aan of de poppenhuis speelset elektronische licht- en/of
        geluidsfuncties bevat (bijv. verlichting, deurbelgeluid, muziek, geluidseffecten).
    electronics_power_source:
      name: Elektronica voedingsbron
      description: Specificeert hoe actieve elektronica wordt gevoed (indien van toepassing).
    eligible_race_series:
      name: Geschikte raceklasse
      description: Raceklasse of sanctionerende organisatie waarin de auto mag deelnemen.
    elliptical_trainer_part_type:
      name: Crosstrainer onderdeel type
      description: Classificeert het specifieke soort accessoire of vervangingsonderdeel
        voor een crosstrainer (bijv. riem, console, pedaal), zodat klanten snel kunnen
        filteren naar het item dat ze nodig hebben zonder door veel microcategorieën
        te navigeren.
    embellishment_technique:
      name: Versiering techniek
      description: Beschrijft de primaire decoratieve of oppervlaktebewerking die
        op het kledingstuk is toegepast, zoals borduurwerk, print of kralenwerk.
    embellishment_type:
      name: Versiering type
      description: Identificeert het type decoratief element dat op de jarretel is
        aangebracht, zoals kant, strikken of parels.
    embossing_pen_ink_color:
      name: Reliëfpen inktkleur
      description: Specificeert de kleur van de inkt die door de reliëfpen wordt aangebracht
        (kan transparant/plakkerig of gepigmenteerd zijn). Te onderscheiden van de
        kleur van de pen/houder.
    embossing_stylus_tip_shape:
      name: Reliëfstylus puntvorm
      description: Beschrijft de vorm van de reliëfpunt die wordt gebruikt om verschillende
        effecten te creëren (bijv. bolvormig vs puntig).
    embroidered_coverage_level:
      name: Geborduurde dekking niveau
      description: Geschatte hoeveelheid dekking met geborduurd garen op de voorkant
        van de patch.
    embroidered_patch_backing_type:
      name: Geborduurde patch achterkant type
      description: De achter-/steunlaag aan de keerzijde van de geborduurde patch
        die invloed heeft op de duurzaamheid en hoe deze kan worden aangebracht.
    embroidery_hoop_type:
      name: Borduurring type
      description: Identificeert de constructiestijl van de borduurring en het primaire
        spanmechanisme.
    embroidery_machine_bobbin_type:
      name: Borduurmachine spoel type
      description: Type/laadstijl van het spoelsysteem.
    emergency_lighting_configuration:
      name: Noodverlichting configuratie
      description: Specificeert de primaire geïnstalleerde waarschuwingsverlichtingsconfiguratie
        op het voertuig (bijv. lichtbalk op het dak, grilleverlichting).
    emergency_lighting_package:
      name: Noodverlichting pakket
      description: Specificeert de typen geïnstalleerde waarschuwingslichten.
    emissions_compliance_standard:
      name: Emissie nalevingsnorm
      description: Geeft waar van toepassing de emissiecertificering/-naleving voor
        de motor aan.
    emissions_standard:
      name: Emissienorm
      description: Emissie nalevingsnorm voor het voertuig (verschilt per regio en
        jaar).
    enclosure_panel_configuration:
      name: Paneelconfiguratie van overkapping
      description: Specificeert welke panelen of zijden van de overkapping zijn inbegrepen
        (dekkingsconfiguratie), zoals volledige overkapping, zijgordijnen of 3-zijdig
        (open voor-/achterkant).
    enclosure_window_material:
      name: Venstermateriaal van overkapping
      description: Identificeert het materiaal dat wordt gebruikt voor de transparante
        vensterpanelen van de overkapping.
    end_fitting_type:
      name: Eindfitting type
      description: De connectorstijl die aan elk uiteinde van de gasveer wordt gebruikt
        (voertuigzijde en klepzijde), en die de montagecompatibiliteit bepaalt.
    end_type:
      name: Uiteinde type
      description: Specificeert de afsluitings-/bevestigingsstijl aan de uiteinden
        van de sleepband voor aansluiting op bergingspunten.
    ends_style_blocking_wires:
      name: Uiteinden stijl (blokkeerdraden)
      description: Hoe de uiteinden van de blokkeerdraad zijn afgewerkt voor veiligheid
        en eenvoudig doorrijgen door kantranden.
    enduro_bike_suspension_adjustability:
      name: Endurofiets vering verstelbaarheid
      description: Geeft aan welke veringafstellingen beschikbaar zijn (meestal voor
        voorvork en achterschokdemper).
    engine_bay_mounting_location:
      name: Motorruimte montagelocatie
      description: Waar de overlooptank in de motorruimte moet worden gemonteerd (relatieve
        positie).
    engine_bearing_coating:
      name: Lagercoating motor
      description: Specificeert eventuele oppervlaktecoating op het lager (voor slijtvastheid,
        inbedbaarheid, verminderde wrijving).
    engine_bearing_position:
      name: Motorlager positie
      description: Specificeert de locatie/functie van het lager binnen de motor.
    engine_bearing_size:
      name: Motorlager maat
      description: Specificeert of het lager een standaardmaat of ondermaat-/overmaatvariant
        is (meestal gekoppeld aan krukasbewerking en speling).
    engine_configuration:
      name: Motorconfiguratie
      description: Beschrijft de cilinderlay-out/configuratie van de motor (bijv.
        lijnmotor, V-motor, vlak/boxer).
    engine_cooling_type:
      name: Motorkoeling type
      description: Specificeert de koelmethode van de motor.
    engine_degreaser_form:
      name: Motorontvetter vorm
      description: De fysieke vorm/leveringsvorm van de motorontvetter.
    engine_degreaser_rinse_requirement:
      name: Motorontvetter spoelvereiste
      description: Of de ontvetter bedoeld is om na toepassing met water te worden
        afgespoeld.
    engine_mount_type:
      name: Motormontage type
      description: Specificeert het functionele ontwerp van de motorsteun (bijv. hydraulisch,
        massief, reactiestang).
    engine_oil_formulation:
      name: Motorolie formulering
      description: Geeft de formuleringsfocus van motorolie aan, zoals standaardgebruik,
        conditionering voor hoge kilometerstanden, langere verversingsintervallen
        of wagenpark-/zware toepassingen.
    engine_oil_specification:
      name: Motorolie specificatie
      description: De specificatie/norm waaraan de olie voldoet (bijv. API SP, API
        SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Motorrevisieset inhoud
      description: Identificeert welke belangrijke onderdelen in de motorrevisieset
        zijn inbegrepen.
    engine_rotation_direction:
      name: Motor draairichting
      description: Specificeert de draairichting van de motor die wordt gebruikt in
        maritieme toepassingen.
    engine_timing_system_drive_type:
      name: Motordistributiesysteem aandrijving type
      description: Geeft aan of het distributiesysteem van de motor riemaangedreven,
        kettingaangedreven of tandwielaangedreven is voor compatibiliteitsmatching.
    engine_valve_coating:
      name: Motorklepcoating
      description: Identificeert eventuele oppervlaktebehandeling of coating die op
        de klep is aangebracht voor slijtage-/hittebestendigheid.
    engine_valve_position:
      name: Motorklep positie
      description: Specificeert of de motorklep bedoeld is voor de inlaat- of uitlaatzijde
        van de motor.
    engine_valve_stem_tip_type:
      name: Motorklep steelpunt type
      description: Specificeert de stijl of constructie van de klepsteelpunt bij het
        contactpunt met de tuimelaar of steller.
    engine_valvetrain_type:
      name: Motorklepbediening type
      description: Klepbediening/nokkenasconfiguratie.
    enhancement_level:
      name: Verbeteringsniveau
      description: 'Geschatte volumetoename die door de insert wordt geboden, uitgedrukt
        in cupmaten: subtiel (tot 1 cup), gemiddeld (1–2 cups), aanzienlijk (2+ cups).'
    entry_zipper_location:
      name: Instaprits locatie
