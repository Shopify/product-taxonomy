        gekozen.
    saxophone_swab_application_area:
      name: Saxofoonwisser toepassingsgebied
      description: Geeft aan welk deel van de saxofoon de wisser bedoeld is om te
        reinigen/drogen.
    scabbard_material:
      name: Schede materiaal
      description: Specificeert het primaire materiaal van de meegeleverde schede
