    scale_model_truck_era:
      name: Schaalmodel vrachtwagen tijdperk
      description: Geeft het tijdperk/de periode aan van de echte vrachtwagen die
        het model vertegenwoordigt (handig voor verzamelaars die vintage vs moderne
        vrachtwagens zoeken).
    scale_model_truck_propulsion_type:
      name: Schaalmodel vrachtwagen aandrijvingstype
      description: Specificeert of de afgebeelde vrachtwagen diesel, benzine, elektrisch,
