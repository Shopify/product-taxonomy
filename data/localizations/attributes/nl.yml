      name: Spiraalveer afwerking/coating
      description: Oppervlakafwerking of coating aangebracht voor corrosiebescherming.
    coil_spring_material:
      name: Spiraalveer materiaal
      description: Primair materiaal/samenstelling van de spiraalveer.
    coil_system_type:
