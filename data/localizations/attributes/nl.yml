        voering.
    batting_stuffing_thermal_insulation_level:
      name: Vulling en wattine thermisch isolatieniveau
      description: Relatieve warmte-/isolatieprestaties van wattine die wordt gebruikt
        in quilts, jassen en dekens.
    batting_tee_base_design:
      name: Slagtee basisontwerp
      description: Beschrijft de stijl of constructie van de basis van de tee, die
        invloed heeft op de stabiliteit en de soorten speeloppervlakken waarvoor deze
        geschikt is.
    battle_top_arena_stadium_compatibility:
      name: Battle top arena-/stadioncompatibiliteit
      description: Geeft aan voor welk arena-/stadionsysteem het product is ontworpen,
        vooral voor sets of speciale arenavormen.
    battle_top_items_included:
      name: Battle top meegeleverde items
      description: Specificeert welke battle top-items in de verpakking zijn inbegrepen,
        bijvoorbeeld top, launcher, stadion/arena, ripcord en reserveonderdelen.
    battle_top_performance_type:
      name: Battle top prestatietype
      description: Beschrijft de algemene prestatiestijl van de battle top, meestal
        gebaseerd op hoe deze zich in de arena gedraagt, bijvoorbeeld agressief versus
        gericht op uithoudingsvermogen.
    bayan_included_accessories:
      name: Bayan meegeleverde accessoires
      description: Accessoires die bij de bayan worden meegeleverd, in de doos.
    bayan_tuning_system_type:
      name: Bayan stemsysteemtype
      description: Geeft aan hoe de bayan wordt gespannen/gestemd, oftewel de constructiestijl,
        wat invloed heeft op de draagbaarheid en het stemgemak.
    bb_gun_action_type:
      name: BB-gun actietype
      description: Geeft het mechanische laad- of cyclingsmechanisme van de BB-gun
        aan, bijvoorbeeld lever action, pompactie of knikloop.
    bb_gun_caliber:
      name: BB-gun kaliber
      description: Definieert de diameter van de BB’s waarvoor het wapen is ontworpen,
        zodat compatibiliteit met munitie wordt gewaarborgd.
    bb_gun_part_type:
      name: BB-gun onderdeeltype
      description: Classificeert het specifieke onderdeel of accessoire dat is ontworpen
        voor BB-guns, zodat shoppers snel het juiste vervangings-, upgrade- of add-on-onderdeel
        kunnen vinden, bijvoorbeeld loop, zuigerafdichting of speedloader.
    beach_ball_features:
      name: Strandbal kenmerken
      description: Opvallende functionele kenmerken die specifiek zijn voor strandballen.
    beach_bucket_features:
      name: Kenmerken van strandemmer
      description: Functionele kenmerken van de strandemmer die invloed hebben op
        gebruik, duurzaamheid en gemak.
    beach_sand_toy_items_included:
      name: Strand- en zandspeelgoed meegeleverde items
      description: Extra strand-/zandspeelonderdelen die bij de emmer worden meegeleverd,
        indien verkocht als set.
    bead_breaker_type:
      name: Bandenlichter type
      description: Type/ontwerp van het bandenlichter-mechanisme.
    bead_hole_style:
      name: Kraalgatstijl
      description: Specificeert de stijl of configuratie van het gat/de sleuf in de
        kraal, wat beïnvloedt hoe deze aan de haak of lijn zit.
    bead_type:
      name: Kraaltype
      description: Primaire kraaltype(n) die voor het patroon vereist zijn.
    bead_type_patch_embellishment:
      name: Kraaltype( patchversiering)
      description: Primaire type kralen dat op het oppervlak van de patch wordt gebruikt.
    beaded_accessory_project_type:
      name: Kralenaccessoire projecttype
      description: Geeft aan welk accessoire met het patroon wordt gemaakt.
    beading_needle_flexibility:
      name: Rijgnaald flexibiliteit
      description: Relatieve flexibiliteit van de naaldschacht voor het volgen van
        krappe paden in kralenwerk.
    beading_pattern_bead_size:
      name: Rijgpatroon kraalmaat
      description: Aanbevolen kraalma(a)t(en) die door het patroon worden gespecificeerd,
        meestal seed bead-maten zoals 11/0 of 8/0.
    beading_pattern_chart_format:
      name: Rijgpatroon diagramformaat
      description: Geeft aan hoe het patroon visueel wordt weergegeven, bijvoorbeeld
        als diagram of met stapsgewijze foto’s.
    beading_pattern_stitch_technique:
      name: Rijgpatroon steek/techniek
      description: Primaire rijgsteek of -techniek die in het patroon wordt gebruikt.
    beading_technique_stitch:
      name: Rijgtechniek/steek
      description: Geeft de primaire rijgtechniek of steek aan die in het patroon
        wordt gebruikt, bijvoorbeeld peyote-steek of brick stitch.
    beading_thread_fiber_type:
      name: Rijggaren vezeltype
      description: Specificeert het vezel-/materiaaltype van het rijggaren, specifieker
        dan algemeen materiaal, dat relevant is voor de prestaties.
    beading_thread_size:
      name: Maat rijggaren
      description: Geeft het maatlabel van de fabrikant/industrie aan dat voor rijggaren
        wordt gebruikt, vaak merk- of lijnspecifiek, zoals maat D of 00.
    beading_thread_use_case:
      name: Rijggaren gebruikstoepassing
      description: Geeft het primaire aanbevolen gebruik van het rijggaren aan, zodat
        shoppers het juiste product voor hun project kunnen kiezen.
    beading_wire_coating_material:
      name: Rijgdraad coatingmateriaal
      description: Specificeert het buitenste coatingmateriaal op de rijgdraad, indien
        aanwezig, dat invloed heeft op gevoel, duurzaamheid en knikbestendigheid.
    beading_wire_strand_count:
      name: Rijgdraad aantal strengen
      description: Geeft het aantal strengen in meerstrengs rijgdraad aan, bijvoorbeeld
        7-strengs, 19-strengs of 49-strengs, wat invloed heeft op flexibiliteit en
        soepelheid.
    beadlock_type:
      name: Beadlock type
      description: Geeft aan of het wiel een beadlock heeft en welke stijl, handig
        voor kopers van offroad-/UTV-onderdelen.
    beam_material:
      name: Balkmateriaal
      description: Primair materiaal van de balk/stang, vaak anders dan dat van de
        koppen/bevestigingen.
    beam_pattern:
      name: Balk materiaal
      description: Primaire materiaal van de balk/stang, vaak anders dan het materiaal
        van de koppen/bevestigingen.
    bean_bag_fabric_material:
      name: Zitzak stof materiaal
      description: Geeft aan welke buitenstof wordt gebruikt voor de zitzakken die
        bij de set worden geleverd.
    bean_paste_variety:
      name: Bonenpasta variëteit
      description: Classificeert het specifieke type bonenpasta op basis van productiestijl
        of hoofdingrediënt.
    bean_preparation:
      name: Bonen bereiding
      description: Geeft aan hoe de bonen vóór verkoop worden bereid of verwerkt,
        bijvoorbeeld heel, in peulen, gedopt, gehakt of gekiemd.
    bean_variety:
      name: Bonenvariëteit
      description: Specificeert de botanische of marktvariëteit van de bonen, bijvoorbeeld
        sperziebonen, edamame of kousenband.
    beanie_style:
      name: Beanie stijl
      description: Specificeert het algemene ontwerp, de constructie of het silhouet
        van de beanie, zodat kopers snel kunnen kiezen uit veelvoorkomende varianten.
    bearing_clearance:
      name: Lager speling
      description: Geeft de interne radiale spelingklasse van het lager aan, oftewel
        de hoeveelheid interne speling. Klasse C0 wordt ook CN of normale speling
        genoemd.
    bearing_construction_type:
      name: Type lageronstructie
      description: Geeft het lagerontwerp of de constructiestijl aan die in de naaf
        wordt gebruikt, bijvoorbeeld cartridge of losse kogellagering.
    bearing_edge_type:
      name: Lager randtype
      description: Type/profiel van de rand van het shell-lager, wat invloed heeft
        op attack en sustain.
    bearing_lubrication:
      name: Lager smering
      description: Geeft het type smeermiddel aan dat tijdens de productie op het
        lager is aangebracht, zoals vet of olie.
    bearing_material:
      name: Lagermateriaal
      description: Geeft het constructiemateriaal van het lager aan, bijvoorbeeld
        staal of keramische hybride, zodat rijders kunnen kiezen op basis van duurzaamheid,
        kosten en prestaties.
    bearing_rating:
      name: Lager classificatie
      description: Specificeert de toleranties of prestatieklasse van het lager dat
        in de skates wordt gebruikt, bijvoorbeeld ABEC 7, ILQ 9 of Swiss.
    bearing_seal_code:
      name: Code lagerafdichting
      description: Geeft het type afdichting van het lager aan, wat invloed heeft
        op duurzaamheid en rolweerstand.
    bearing_seal_type:
      name: Type lagerafdichting
      description: Specificeert het afdichtings- of schildontwerp dat de binnenzijde
        van het lager beschermt tegen verontreinigingen en invloed heeft op de weerstand,
        bijvoorbeeld 2RS, ZZ, LLU of open.
    bearing_shield_type:
      name: Lager afscherming type
      description: Stijl van de afscherming of afdichting die de interne onderdelen
        van het lager beschermt.
    bearing_size_code:
      name: Lager maat code
      description: Gestandaardiseerde lageraanduiding (bijv. 608, 688) die de binnen-
        en buitendiameter en de breedte combineert.
    bearing_type:
      name: Lager type
      description: Geeft de constructiestijl aan van de lagers die in de headset worden
        gebruikt.
    beater_head_material:
      name: Kopmateriaal klopper
      description: Geeft het contact-/kopmateriaal van een basdrumstok aan (bijv.
        vilt, hout, rubber).
    beaters_included:
      name: Inbegrepen kloppers
      description: Geeft aan hoeveel stokken bij het drumpedaal worden meegeleverd/zijn
        geïnstalleerd (bijv. enkele of dubbele stok), of dat er geen stok is meegeleverd.
    bed_base_type:
      name: Type bedbodem
      description: Bepaalt de constructiestijl van het bed of de boxspring (bijv.
        platform, lattenbodem, verstelbaar).
    bed_storage_type:
      name: Type bedopslag
      description: Bepaalt het geïntegreerde opbergmechanisme van het bedframe.
    bedroom_furniture_items_included:
      name: Inbegrepen slaapkamermeubelstukken
      description: Geeft aan welke meubelstukken er in de slaapkamerset zitten (bijv.
        bed, dressoir, nachtkastjes), zodat kopers snel kunnen zien wat erbij zit
        zonder lange beschrijvingen te hoeven lezen.
    bedroom_vanity_items_included:
      name: Slaapkameraccessoires items inbegrepen
      description: Geeft een overzicht van de afzonderlijke items die bij een slaapkameraccessoireset
        worden geleverd, zodat klanten precies weten wat er wordt geleverd (bijv.
        spiegel, krukje, verlichtingsset).
    beer_based_cocktail_variety:
      name: Soorten cocktails op basis van bier
      description: Classificeert cocktails op basis van bier naar hun specifieke soort,
        bijv. Radler, Shandy, Michelada.
    beet_variety:
      name: Bietenvariant
      description: Geeft de cultivar of soort van de biet aan, zodat kopers de smaak,
        kleur en culinaire toepassingen kunnen herkennen (bijv. Rood, Goud, Chioggia).
    bell_actuation_mechanism:
      name: Activeringsmethode bel
      description: Geeft aan welke handeling de gebruiker moet uitvoeren om de bel
        te laten rinkelen, zodat kopers de gewenste ergonomie kunnen kiezen.
    bell_guard_coverage_area:
      name: Bel bescherming dekkignsgebied
      description: Geeft aan welk deel van de bel de bescherming moet beschermen.
    bell_material:
      name: Belmateriaal
      description: Beschrijft de constructie van de tailleband of het buikpaneel dat
        ruimte biedt voor een groeiende buik.
    bellhousing_bolt_pattern:
      name: Koppelingshuis boutpatroon
      description: Geeft het standaard boutpatroon of de patroonreeks aan die het
        koppelingshuis/de motorzijde gebruikt.
    bellows_material:
      name: Balg materiaal
      description: Materiaal van het balglichaam/de bekleding (indien aanwezig).
    bellows_orientation:
      name: Balg oriëntatie
      description: Geeft de configuratie van de balg aan die wordt gebruikt om lucht
        naar de leidingen te voeren.
    belly_panel_style:
      name: Stijl van het buikpaneel
      description: Beschrijft de constructie van de tailleband of het buikpaneel dat
        ruimte biedt aan een groeiende buik.
    belt_buckle_type:
      name: Riemgesp type
      description: Beschrijft het specifieke gespmechanisme of ontwerp dat op de riem
        wordt gebruikt.
    beret_style:
      name: Baret stijl
      description: Geeft het specifieke baretontwerp of de culturele variant aan.
    berry_species:
      name: Bessen soort
      description: Geeft de bessensoort aan die in het product zit, zodat kopers snel
        kunnen filteren op hun gewenste bes.
    beta_casein_variant:
      name: Bèta-caseïne variant
      description: Specificeert welke bèta-caseïne-eiwitvariant, bijvoorbeeld A2,
        aanwezig is in de melk voor consumenten met zorgen over verteerbaarheid.
    beverage_sweetness_level:
      name: Drank zoetheidsniveau
      description: Classificeert de drank op basis van de mate van toegevoegde zoetheid
        of suiker.
    bezel_graduation_units:
      name: Bezel schaalverdelingseenheden
      description: Specificeert de eenheidsmarkeringen op de roterende bezel, bijvoorbeeld
        graden, mils of dubbele schaalverdeling.
    bicycle_brake_set_components_included:
      name: Fietsremset meegeleverde onderdelen
      description: Vermeldt de afzonderlijke onderdelen die in de kit worden meegeleverd,
        zodat shoppers precies weten wat is inbegrepen en verschillende bundelconfiguraties
        kunnen vergelijken.
    bicycle_cage_mounting_position:
      name: Fiets bidonhouder montagepositie
      description: Specificeert waar op de fiets de houder is ontworpen om te worden
        geïnstalleerd.
    bicycle_computer_mount_placement:
      name: Fietscomputerhouder plaatsing
      description: Geeft aan waar op de fiets de computerhouder wordt gemonteerd,
        bijvoorbeeld out-front op het stuur of op de topcap van de stuurpen.
    bicycle_folding_mechanism:
      name: Fiets vouwmechanisme
      description: Specificeert het mechanische vouwsysteem dat in het fietsframe
        wordt gebruikt, bijvoorbeeld half fold, vertical fold.
    bicycle_frame_design:
      name: Fiets frame ontwerp
      description: Specificeert de algemene stijl van een fietsframe, met invloed
        op toegankelijkheid, capaciteit en opslag.
    bicycle_frame_style:
      name: Fiets frame stijl
      description: Beschrijft de structurele stijl van het fietsframe, bijvoorbeeld
        step-through, lowrider, chopper stretch, enz., met invloed op de houding van
        de fietser en de uitstraling.54
    bicycle_handlebar_type:
      name: Stuurstijl fiets
      description: Geeft de specifieke stuurstijl of geometrie aan, zodat fietsers
        een stuur kunnen kiezen dat past bij hun rijpositie en discipline.
    bicycle_headset_configuration:
      name: Fietsstuur configuratie
      description: Geeft de bouwstijl of standaard van het fietsstuur aan op basis
        van de plaatsing van de stuurkoppen (bijv. External Cup, ZeroStack, Integrated,
        Threaded).
    bicycle_hub_type:
      name: Type fietsnaaf
      description: Beschrijft het naafmechanisme dat met het wiel wordt meegeleverd,
        met invloed op compatibiliteit met de aandrijving en rijstijl.
    bicycle_lock_security_certification:
      name: Fiets slot veiligheidscertificering
      description: Onafhankelijke certificering door derden die de antidiefstalprestaties
        bevestigt, bijvoorbeeld Sold Secure, ART, Varefakta.
    bicycle_pedal_type:
      name: Fiets pedaal type
      description: Specificeert de algemene bedieningsstijl of het ontwerp van het
        pedaal, zoals platformpedalen, klikpedalen of hybride varianten, zodat fietsers
        de juiste interface voor hun rijstijl kunnen kiezen.
    bicycle_propulsion_type:
      name: Type fietsaandrijving
      description: Specificeert hoe de fiets wordt aangedreven, zoals handmatig trappen,
        elektrische ondersteuning of een verbrandingsmotor.
    bicycle_pump_type:
      name: Type fietspomp
      description: Geeft de structurele stijl van de pomp aan, zodat shoppers het
        ontwerp kunnen kiezen dat het best past bij hun rij-, opslag- of noodgebruik.
    bicycle_rack_mounting_type:
      name: Fiets bagagedrager montagetype
      description: Beschrijft de primaire methode of locatie die wordt gebruikt om
        de bagagedrager aan de fiets te bevestigen, zodat gebruikers de compatibiliteit
        met hun frame en hardware kunnen controleren.
    bicycle_suspension_type:
      name: Veersysteem fiets
      description: Geeft de aanwezigheid en configuratie van de vering op de fiets
        aan.
    bicycle_tire_tread_pattern:
      name: Fiets band profielpatroon
      description: Specificeert de profielstijl van de band, met invloed op grip en
        rolweerstand op verschillende ondergronden.
    bidirectional_charging_capability:
      name: Bidirectioneel laden mogelijkheid
      description: Geeft aan of het electrische voertuig bidirectionele laadmodi ondersteunt,
        zoals V2G en/of V2H.
    bike_rack_mounting_style:
      name: Montagestijl fietsrek
      description: Hoe de fiets door de fietsendrager wordt ondersteund of vastgezet.
    bike_rack_tilt_function:
      name: Fietsrek kantelfunctie
      description: Geeft aan of en welke kantelfunctie aanwezig is om toegang te krijgen
        tot de bagageruimte achter terwijl de drager is gemonteerd.
    bikini_top_style:
      name: Bikinitop stijl
      description: Geeft het ontwerp of de snit van het bikinitopje aan, zodat kopers
        hun favoriete pasvormen en silhouetten kunnen vinden.
    billiard_brush_type:
      name: Biljartborstel type
      description: Definieert de specifieke stijl van het reinigingsgereedschap voor
        de biljarttafel (bijv. tafelborstel, railborstel, nappingblok).
    billiard_glove_finger_coverage:
      name: Billjart handschoen vingerbedekking
      description: Geeft aan welke vingers door het handschoenontwerp worden bedekt,
        waardoor je nauwkeurig kunt filteren op biljartspecifieke handschoenstijlen.
    billiard_pocket_style:
      name: Blijartpocketstijl
      description: Geeft de structurele of esthetische stijl van de pocket aan, wat
        van invloed is op de compatibiliteit en de uitstraling van de tafel.
    billiard_rack_style:
      name: Biljartrek stijl
      description: Beschrijft de fysieke stijl of het mechanisme van de rek (bijv.
        traditioneel frame, sjabloonplaat, opvouwbaar).
    billiard_table_type:
      name: Biljarttafel type
      description: Geeft de biljartdiscipline of gebruiksstijl aan waarvoor de tafel
        is ontworpen (bijv. pool, snooker, carambole).
    billiards_discipline:
      name: Biljard discipline
      description: Geeft de specifieke biljartvariant (speltype) aan waarvoor het
        product bedoeld is of waarmee het compatibel is.
    binding_compatibility_standard:
      name: Bindingscompatibiliteit norm
      description: Geeft de bindingsinterface (zoolnorm) aan waarvoor de skischoen
        is gecertificeerd, wat zorgt voor een veilige en correcte combinatie met skibindingen.
    binding_inclusion:
      name: Binding meegeleverd
      description: Geeft aan of de ski's plat worden verkocht, met een geïntegreerd
        systeem, of met aparte bindingen meegeleverd.
    binding_interface:
      name: Binding interface
      description: Geeft de bindingsplaat of interfacestandaard aan waarmee de ski's
        vooraf zijn gemonteerd of waarmee ze compatibel zijn, wat de compatibiliteit
        tussen schoen en binding garandeert.
    binding_liner_type:
      name: Binding voering type
      description: Beschrijft het type binnenvoering dat in de binding/schoen wordt
        gebruikt (bijv. uitneembaar, loopbaar, warmtevormbaar).
    binding_mounting_system:
      name: Binding montagesysteem
      description: Geeft de interface aan die wordt gebruikt om de binding aan de
        ski te bevestigen (vlakke montage, rail/rail, plaat, enz.).
    binding_position:
      name: Bindingspositie
      description: Geeft de beoogde montagepositie of configuratie voor de binding
        aan (bijv. voorste schoen, achterste schoen, ARTP).
    binding_strap_position:
      name: Bindingriem positie
      description: Geeft aan waar op de binding de riem bedoeld is om te worden geïnstalleerd.
    bingo_components_included:
      name: Inbegrepen bingo-onderdelen
      description: Geeft een overzicht van de onderdelen die bij de bingoset worden
        geleverd, zoals bingoballen, kaarten en stiften.
    bingo_number_range:
      name: Bingo nummerbereik
      description: Geeft het bingonummerbereik/de variant aan die door de set wordt
        ondersteund.
    bingo_set_features:
      name: Bingo set kenmerken
      description: Geeft het primaire productformaat van de bingo set aan (fysiek/handmatig
        versus elektronisch/interactief).
    bipod_mounting_interface:
      name: Bipod montage interface
      description: Geeft de bevestigingsinterface aan die wordt gebruikt om de bipod
        aan het vuurwapen of railsysteem te bevestigen.
    bit_attachment_type:
      name: Type bitbevestiging
      description: Geeft aan hoe de hoofdband aan het bit wordt bevestigd (bijv. knoopuiteinden,
        gespuiteinden, Chicago-schroefuiteinden).
    bit_mouthpiece_design:
      name: Bit mondstuk ontwerp
      description: Geeft de structurele stijl of verbindingsconfiguratie van het mondstuk
        aan, die bepalend is voor de drukverdeling, de ruimte bij het gehemelte en
        de algehele hardheid.
    bit_ring_style:
      name: Bitring stijl
      description: Bepaalt de stijl van de wang of ring van het bit die aan het hoofdstel
        wordt bevestigd, wat invloed heeft op de werking, zijdelingse geleiding en
        het gevoel aan de teugels.
    bladder_material:
      name: Blaasmateriaal
      description: Geeft het materiaal aan dat wordt gebruikt voor de interne luchtkamer
        die lucht vasthoudt.
    blade_attachment_type:
      name: Type ijzerbevestiging
      description: Geeft aan of de skate een klapmechanisme (scharnierend) of een
        vaste bladbevestiging gebruikt.
    blade_finish_coating:
      name: Blad afwerking/coating
      description: Oppervlaktebehandeling die op het blad is aangebracht voor esthetische
        doeleinden of ter bescherming tegen corrosie.
    blade_hosel_type:
      name: Bladschacht type
      description: Geeft de aansluitstijl aan van de schacht van het blad die in de
        steel past, wat van invloed is op de compatibiliteit (bijv. standaard of taps
        toelopend).
    blade_length_type:
      name: Type bladlengte
      description: Classificeert de bladlengte van de vin als kort, gemiddeld of lang,
        wat elk van invloed is op de trapfrequentie en trainingsdoelen.
    blade_lie:
      name: Blad ligging
      description: Geeft het liggingsnummer van het blad van de hockeystick aan, wat
        aangeeft hoe het blad op het ijs ligt ten opzichte van de schacht.
    blade_sharpness:
      name: Blad scherpte
      description: Geeft aan of de snede van het wapen geslepen is of bot voor training.
    blade_size_category:
      name: Bladmaatcategorie
      description: Gestandaardiseerde internationale sabelbladmaatcode (0–5) die wordt
        gebruikt om jeugd- en volwassenbladen te onderscheiden.
    blade_size_class:
      name: Blad maat klasse
      description: Classificeert het blad volgens de maatconventie voor spelers, afgestemd
        op schachtmaten zoals Jeugd, Junior, Intermediate of Senior.
    blade_size_number:
      name: Blad maatnummer
      description: Standaard numerieke maatcode (0–5) gedefinieerd door schermreglementen
        die de bladlengte en geschiktheid voor leeftijdsgroepen bepaalt.
    blaster_mechanism:
      name: Blaster mechanisme
      description: Definieert het interne werkingsmechanisme van de gelblaster (bijv.
        GBB, AEG, veer).
    block_edge_style:
      name: Blokrand stijl
      description: Beschrijft hoe de randen/hoeken van de houten blokken zijn afgewerkt
        voor gevoel en veiligheid.
    blocking_mat_features:
      name: Kenmerken blokkeermat
      description: Functionele kenmerken specifiek voor blokmatten (opslag, draagbaarheid,
        bruikbaarheid).
    blocking_mat_grid_unit:
      name: Blok matraster eenheid
      description: Het eenheidssysteem dat wordt gebruikt op het gedrukte raster,
        wat gebruikers helpt patronen en afmetingen op elkaar af te stemmen.
    blocking_mat_surface_markings:
      name: Blok mat oppervlakte markeringen
      description: Type meet-/richtmarkeringen die op het matoppervlak zijn gedrukt
        of gegoten.
    blocking_wire_coating:
      name: Blokdraad coating
      description: Oppervlaktebehandeling/coating op de blokdraad die van invloed
        is op roestbestendigheid, gladheid en het risico op haken en ogen.
    blocking_wire_end_cap_type:
      name: Blokdraad eindkap type
      description: Geeft het type eindbescherming/afwerking aan dat op de uiteinden
        van de blokdraad wordt gebruikt voor veiligheid en bescherming van de stof.
    blocking_wire_set_includes:
      name: Blokdraad set inbegrepen
      description: Geeft aan welke onderdelen bij het blokdraadproduct worden geleverd
        (bijv. T-pinnen, opbergbuis).
    blocking_wire_usage:
      name: Blokdraad gebruik
      description: Het belangrijkste gebruik waarvoor de flexibele blokkeerdraad is
        ontworpen.
    bloom_stage:
      name: Bloei stadium
      description: Geeft aan hoe ver de madeliefjes zijn opengegaan bij levering/verzending.
    blower_motor_bearing_type:
      name: Ventilatormotor lager soort
      description: Geeft het lagerontwerp aan dat in de ventilatormotor wordt gebruikt.
    blower_motor_mounting_position:
      name: Ventilatormotor montagepositie
      description: Waar de ventilatormotor in de HVAC-module/het voertuig is geïnstalleerd
        (bijv. voor, achter).
    blowpipe_valve_type:
      name: Blaaspijp ventiel type
      description: Geeft het type blaaspijpventiel aan dat is meegeleverd (indien
        van toepassing).
    bo_staff_style:
      name: Bo-staf type
      description: Bepaalt de structurele stijl of bouw van de staf (bijv. recht,
        taps toelopend, met schuimvulling, inklapbaar).
    board_game_theme:
      name: Bordspel thema
      description: Verhaal/setting thema van het bordspel (gebruikt voor ontdekken
        en bladeren).
    board_rail_shape:
      name: Board rail vorm
      description: Geeft de contouren van de rails van het board aan (bijv. zacht,
        hard, 50/50), die van invloed zijn op de grip en de stuurkracht op een golf.
    board_size_classification:
      name: Boord grootte classificatie
      description: Deelt de cornhole-boards of -sets in op gangbare gestandaardiseerde
        maten.
    board_type_compatibility:
      name: Compatibiliteit boardtype
      description: Geeft aan voor welk type board de leash is ontworpen.
    boat_construction_type:
      name: Type bootconstructie
      description: Beschrijft de bouwstijl of het formaat van de roeiboot (bijv. opblaasbaar,
        stijf).
    boat_hook_flotation:
      name: Boothaakdrijfvermogen
      description: Geeft aan of de boothaak is ontworpen om te drijven als hij in
        het water valt.
    boat_ladder_stowage_style:
      name: Boatladder stijl
      description: Beschrijft hoe de ladder wordt opgeborgen wanneer deze niet in
        gebruik is (bijv. opvouwbaar, intrekbaar, verwijderbaar).
    boat_trailer_construction_type:
      name: Boottrailer constructietype
      description: Geeft aan of de trailer de boot ondersteunt met steunen, rollen
        of een hybride systeem.
    boat_weaving_shuttle_weft_exit_type:
      name: Bootweefschuif inslaguitgangstype
      description: Hoe het inslaggaren tijdens het weven uit de schuif komt.
    bobbin_loading_type:
      name: Spoel plaatsingstype
      description: Geeft aan hoe de spoel in de naaimachine wordt geplaatst/geladen.
    bobbin_system:
      name: Spoel systeem
      description: Het spoelplaatsingssysteem/type dat door de naaimachine wordt gebruikt.
    bobbin_type:
      name: Spoel type
      description: Geeft het formaat van de garendrager aan waarvoor de shuttle is
        ontworpen (of die deze bevat), wat de compatibiliteit en het gebruikelijke
        gebruik bepaalt (bijv. bootshuttles gebruiken vaak spoelen; ragshuttles kunnen
        open zijn voor stroken).
    bobbin_winder_winding_direction:
      name: Spoelopwinder wikkelrichting
      description: Geeft de wikkel-/draairichting aan die door de spoelopwinder wordt
        ondersteund.
    bobble_mechanism:
      name: Bobbel mechanisme
      description: Geeft het type bobbelmechanisme aan, wat van invloed is op de beweging
        en duurzaamheid.
    bocal_material:
      name: Bokaalmateriaal
      description: Geeft het materiaal aan van de meegeleverde bocal(s).
    bodhr_n_head_material:
      name: Bodhrán velmateriaal
      description: Het materiaal van het speelvel (membraan), wat een grote invloed
        heeft op de klank en onderhoudsvereisten.
    bodhr_n_tuning_system_type:
      name: Bodhrán stemsysteem
      description: Het type ingebouwd stemmechanisme dat wordt gebruikt om de velspanning
        aan te passen (indien verstelbaar).
    body_armor_coverage_area:
      name: Kogelwerende bescherming dekkingsgebied
      description: Geeft aan welke lichaamsdelen het product beschermt.
    body_armor_intended_use:
      name: Kogelwerende bescherming beoogd begruik
      description: Geeft aan voor welk primair rij- of gebruiksscenario de kogelwerende
        bescherming voor ATV/UTV is ontworpen.
    body_cord_connector_style:
      name: Lichaamssnoer type connector
      description: Beschrijft de configuratie van de connector aan de uiteinden van
        het snoer (bijv. aantal pinnen of bajonettype) die de compatibiliteit met
        wapens en scoreboxen bepaalt.
    body_panel_finish_state:
      name: Carrosseriepaneel afwerkingsstatus
      description: Beschrijft de staat van de oppervlaktevoorbereiding/afwerking van
        het zijpaneel bij verkoop, voor het schilderen/installeren.
    body_shape:
      name: Carosserie vorm
      description: Geeft de algemene carrosserievorm/stijl van de elektrische gitaar
        aan.
    bodysuit_bottom_coverage:
      name: Bodysuit dekking onderkant
      description: Bepaalt de snit en dekking van het onderste deel van de bodysuit,
        wat van invloed is op het comfort en de compatibiliteit met je outfit.
    boilie_shape:
      name: Boilie vorm
      description: Geeft de vorm aan van de boilies die door de roltafel worden geproduceerd,
        waardoor vissers kunnen kiezen uit verschillende aasprofielen.
    boilie_stop_buoyancy:
      name: Boilie stop drijfvermogen
      description: Geeft aan of de boilie stop is ontworpen om te drijven, te zinken
        of neutraal te blijven drijven, wat invloed heeft op de presentatie van het
        aas in de waterkolom.
    bok_choy_variety:
      name: Paksoi soort
      description: Geeft de cultivar, handelsnaam of variëteit van de paksoi aan (bijv.
        Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), zodat kopers de gewenste smaak,
        grootte en uiterlijk kunnen kiezen.
    bolt_drive_style:
      name: Boutaandrijving type
      description: Geeft het type aandrijving van de bevestigingsbouten voor skateboards
        aan, waarbij onderscheid wordt gemaakt tussen gangbare kop-/schroevendraaiertypes
        zoals inbus of kruiskop.
    bone_content:
      name: Bot gehalte
      description: Geeft aan of het vlees botten bevat.
    bongo_center_block_material:
      name: Bongo middenblok materiaal
      description: Materiaal van het middenblok dat de twee bongo-schalen met elkaar
        verbindt (indien van toepassing).
    bongo_shell_material:
      name: Bongo shell materiaal
      description: Materiaal van de bongo-shells (trommelrompen), exclusief vellen
        en hardware.
    bongo_tuning_system:
      name: Bongo stemsysteem
      description: Hoe de bongo's zijn gestemd/gebouwd voor het stemmen (bijv. traditioneel
        met stemknoppen versus met touw), wat van invloed is op onderhoud en authenticiteit.
    boning_type:
      name: Type baleinen
      description: Geeft het structurele ondersteuningssysteem binnenin de cincher
        aan, waarbij zowel het materiaal als de stijl/vorm van de gebruikte baleinen
        wordt gecombineerd, wat direct van invloed is op het ondersteuningsniveau,
        de flexibiliteit en de duurzaamheid.
    boot_liner_type:
      name: Schoen binnenvoering type
      description: Beschrijft de constructie of de aanpassingen van de binnenvoering
        in de snowboardschoen (bijv. warmtevormbaar, uitneembaar).
    boot_sole_compatibility:
      name: Compatibiliteit schoenzool
      description: Vermelding van de normen voor de zool of de interface-systemen
        die de binding ondersteunt.
    boot_support_level:
      name: Schoen niveau steun
      description: Beschrijft de algehele stijfheid/ondersteuning van de enkel of
        schoen die de schaats biedt.
    boot_width_code:
      name: Schoen breedtecode
      description: Door de fabrikant gebruikte breedteaanduiding op basis van letters,
        specifiek voor de maatvoering van kunstschaatsen (bijv. AAA, AA, B, C, D).
    booth_configuration:
      name: Booth-opstelling
      description: Geeft de algehele opstelling van de cabine aan (bijv. enkelzijdig,
        hoek, modulair).
    bootie_toe_design:
      name: Bootie neus ontwerp
      description: Geeft de constructiestijl van de neus van surfbooties en reefboots
        aan.
    border_type:
      name: Rand type
      description: Afwerking van de rand/stijl van de geborduurde patch (beïnvloedt
        het uiterlijk, de rafelbestendigheid en de waargenomen kwaliteit).
    bore_cleaner_format:
      name: Boringreiniger formaat
      description: Geeft de fysieke vorm van het product voor het reinigen van de
        boring aan (gereedschap versus verbruiksartikel).
    bore_cleaner_safe_for_finish:
      name: Boringreiniger veilig voor afwerking
      description: Geeft aan bij welke gangbare afwerkingen van koperblazers de boringreiniger
        veilig gebruikt kan worden.
    bottle_cage_loading_direction:
      name: Fleshouder laadrichting
      description: Beschrijft de richting waarin een fles in de houder wordt geplaatst
        of eruit wordt gehaald.
    bottle_neck_finish_closure_size:
      name: Fleshalsafwerking / sluitingmaat
      description: De gestandaardiseerde maat van de flesopening/afwerking om compatibiliteit
        met doppen, kurken en sluitmachines te garanderen (bijv. 26 mm kroonafwerking).
    bottle_style:
      name: Fles model
      description: Veelvoorkomende flesvormen die worden gebruikt bij het thuisbrouwen
        en wijnmaken.
    bottom_bracket_interface:
      name: Trapas interface
      description: Geeft de as-/trapasstandaard aan waarvoor de crank is ontworpen,
        zodat het frame en de trapas compatibel zijn.
    bottom_bracket_standard:
      name: Trapas standaard
      description: Trapasbehuizing/interface die door het frame wordt ondersteund
        en die de compatibiliteit van het crankstel bepaalt.
    bottom_type_suitability:
      name: Bodem type geschiktheid
      description: Geeft aan voor welke bodemvoorwaarden het anker is ontworpen om
        het beste vast te houden.
    bounce_level:
      name: Stuiter vermogen
      description: Geeft aan hoeveel de bal stuitert wanneer hij wordt gegooid of
        op de grond valt, zodat je de juiste bal kunt kiezen voor oefeningen zoals
        tegen de muur gooien of slams.
    bouncy_ball_surface_finish:
      name: Oppervlakafwerking stuiterbal
      description: Geeft de tactiele en/of visuele afwerking van het oppervlak van
        een stuiterbal aan (bijv. glad, stekelig, glitter).
    boundary_marker_type:
      name: Grensmarkering type
      description: Bepaalt de fysieke vorm van de grensmarkering of het markeringsproduct
        voor een veld of baan (bijv. kegel, tape, verf, sjabloon, machine).
    bouquet_size_tier:
      name: Boeket grootte niveau
      description: Gestandaardiseerde grootteklasse voor het boeket/de bos, onafhankelijk
        van het aantal stelen, nuttig bij gemengde stelen.
    bow_and_yo_yo_edge_finish:
      name: Bow and yo-yo randafwerking
      description: Beschrijft de afwerking van de rand of bies op de bow/yo-yo, vooral
        bij strikken op basis van lint.
    bow_case_shell_type:
      name: Type buitenkant boogkoffer
      description: Beschrijft de structurele constructie van de buitenkant van de
        boogkoffer, bijvoorbeeld harde schaal versus softcase.
    bow_compatibility:
      name: Type boog
      description: Specificeert het type boog waarvoor de broadhead bedoeld is of
        waarvoor deze geschikt is.
    bow_hair_color:
      name: Strijkstok haarkleur
      description: Geeft de kleur of uitstraling aan van het haar dat wordt gebruikt
        op een strijkstok voor een orkestrale snaarinstrument, bijvoorbeeld wit/gebleekt,
        naturel wit, zwart.
    bow_stick_material:
      name: Materiaal boogstok
      description: Geeft het materiaal aan dat wordt gebruikt voor de strijkstokstok,
        de hoofdschacht, wat sterk van invloed is op gewicht, gevoel en prijs.
    bow_type:
      name: Boog type
      description: Specificeert het structurele ontwerp van de jeugdboog, bijvoorbeeld
        compound, recurve, longbow, wat sterk van invloed is op schietstijl, benodigde
        accessoires en trainingsprogramma’s.
    bow_winding_material:
      name: Boog wikkelmateriaal
      description: Specificeert het materiaal dat wordt gebruikt voor de wikkeling/wrap
        van de boog, met invloed op grip en balans.
    bow_yo_yo_embellishment_style:
      name: Bow/yo-yo decoratiestijl
      description: Geeft de geconstrueerde stijl van de decoratie aan, bow- of stoffen
        yo-yo-constructie.
    bowling_ball_core_type:
      name: Type bowlingbalkern
      description: Geeft het interne kernontwerp of de symmetrie van de bowlingbal
        aan, met invloed op balbeweging en hookpotentieel.
    bowling_ball_coverstock_type:
      name: Bowlingbal buitenlaag type
      description: Geeft het materiaal of de technologie van de buitenlaag van de
        bowlingbal aan, wat de grip en het haakpotentieel bepaalt.
    bowling_set_style:
      name: Bowling set stijl
      description: Bepaalt de algemene stijl of het gebruik van de bowling set.
    box_lid_type:
      name: Deksel type
      description: Type deksel/openingsmechanisme dat wordt gebruikt voor de geschenkdoos
        of het blik.
    box_spring_profile:
      name: Boxspring profiel
      description: Deelt de totale hoogte van de boxspring in in klantvriendelijke
        profielcategorieën (bijv. laag, standaard, hoog), zodat kopers snel kunnen
        filteren zonder de exacte afmetingen te kennen.
    box_spring_requirement:
      name: Boxspring vereiste
      description: Geeft aan of er een extra boxspring of onderstel nodig is voor
        de matras.
    boxing_ring_style:
      name: Boksringstijl
      description: Geeft de algemene bouwstijl of het beoogde gebruiksscenario van
        de ring aan (bijv. wedstrijd versus training, verhoogd versus op de vloer).
    bra_length_type:
      name: Type bh-lengte
      description: Bepaalt de lengteklasse van beha’s op basis van de verticale bedekking,
        zoals standaard, longline, midi of cropped.
    bra_padding_type:
      name: Beha vulling type
      description: Beschrijft de mate of aanwezigheid van vulling in de cups.
    braces_compatibility:
      name: Beugelcompatibiliteit
      description: Geeft aan of de gebitsbeschermer gedragen kan worden met een beugel
        en in hoeverre.
    brake_band_form:
      name: Remband vorm
      description: Geeft aan of de remband wordt geleverd als een doorlopende lus
        (eindeloos) of als een op maat gesneden stuk dat moet worden vastgemaakt.
    brake_band_material_type:
      name: Remband materiaal type
      description: Geeft het functionele materiaal van de remband aan (bijv. katoenen
        koord vs. nylon lijn vs. verenstaal), wat van invloed is op de duurzaamheid,
        grip, rekbaarheid en geluid.
    brake_band_style:
      name: Remband stijl
      description: Geeft het rembandspansysteem/de stijl aan die op een spinnewiel
        wordt gebruikt om spanning op de vliegwiel/klos uit te oefenen.
    brake_bleeding_method:
      name: Rem ontluchting methode
      description: Ontluchtingsmethode die door de set wordt ondersteund.
    brake_booster_assist_type:
      name: Rembekrachtiger type
      description: Geeft het ondersteuningsmechanisme aan dat door de rembekrachtiger
        wordt gebruikt.
    brake_booster_diaphragm_configuration:
      name: Rembekrachtiger membraan configuratie
      description: Geeft het aantal/type membranen aan dat in de rembekrachtiger wordt
        gebruikt.
    brake_caliper_bleeder_screw_position:
      name: Remklauw ontluchtingsschroef positie
      description: Geeft de positie van de ontluchtingsschroef op de remklauw aan
        wanneer deze is gemonteerd (wordt gebruikt om te controleren of de ontluchtingsschroef
        op het hoogste punt is geplaatst voor een goede ontluchting).
    brake_caliper_finish:
      name: Remklauw afwerking
      description: Geeft de oppervlakteafwerking of beschermende coating aan die op
        het remklauwhuis is aangebracht (bijv. verf, beplating, anodiseren).
    brake_caliper_included_hardware:
      name: Remklauw meegeleverde onderdelen
      description: Geeft aan wat er bij de remklauw wordt meegeleverd.
    brake_caliper_mount_type:
      name: Remklauw bevestiging type
      description: Type bevestigingsinterface dat wordt gebruikt om de remklauw aan
        de fusee/beugel te bevestigen.
    brake_caliper_paint_base_chemistry:
      name: Remklauw verf chemische samenstelling
      description: Het gebruikte verf-/harssysteem of de chemische familie.
    brake_caliper_paint_kit_contents:
      name: Remklauw verfset inhoud
      description: Geeft aan wat er naast de verf zelf in de verpakking zit.
    brake_circuit_type:
      name: Remcircuit type
      description: Configuratie van het hydraulische circuit dat door de hoofdremcilinder
        wordt ondersteund.
    brake_clutch_fluid_base_chemistry:
      name: Chemische basis rem-/koppelingsvloeistof
      description: Primaire chemische basis van de hydraulische rem-/koppelingsvloeistof,
        die van invloed is op de compatibiliteit en mengbaarheid.
    brake_clutch_fluid_dot_specification:
      name: Rem-/koppelingsvloeistof DOT-specificatie
      description: DOT-prestatieclassificatie voor hydraulische rem-/koppelingsvloeistoffen
        (bijv. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Remtrommel afwerking/coating
      description: Oppervlakteafwerking of beschermende coating aangebracht op de
        remtrommel (bijv. e-coat, geverfd, verzinkt).
    brake_drum_type:
      name: Type remtrommel
      description: Ontwerptype van de remtrommel (met of zonder geïntegreerde naaf/lager).
    brake_fluid_base:
      name: Samenstelling remvloeistof
      description: Geeft de samenstelling aan van de vereiste of meegeleverde hydraulische
        remvloeistof.
    brake_fluid_base_chemistry:
      name: Remvloeistof chemische basis
      description: Bepaalt de chemische basis van de remvloeistof, die bepalend is
        voor de compatibiliteit en mengregels.
    brake_fluid_dot_specification:
      name: DOT-specificatie remvloeistof
      description: Geeft de DOT-classificatie/specificatie van de remvloeistof aan
        (bijv. DOT 3, DOT 4) voor remvloeistofproducten.
    brake_fluid_standards_compliance:
      name: Remvloeistof normen naleving
      description: Industrienormen waaraan de remvloeistof beweert te voldoen (naast
        de DOT-classificatie).
    brake_fluid_type:
      name: Remvloeistof type
      description: Geeft aan welke remvloeistof nodig is voor hydraulische fietsremklauwen.
    brake_hose_end_fitting_type:
      name: Remleiding eindstuk type
      description: Aansluitingstype aan elk uiteinde van de remleiding (bijv. banjo,
        flare, binnendraad/buitendraad), gebruikt om compatibiliteit met remklauwen/leidingen
        te garanderen.
    brake_lever_pull_type:
      name: Remhendel type
      description: Bepaalt de kabeltrekverhouding/mechanica waarvoor de hendel is
        ontworpen, om compatibiliteit met specifieke remklauwen te garanderen (bijv.
        short-pull velgremmen versus long-pull V-brakes).
    brake_light_switch_actuation_type:
      name: Type activering remlichtschakelaar
      description: Geeft aan welke fysieke gebeurtenis de schakelaar activeert (pedaal/plunjer
        versus hydraulische druk, enz.).
    brake_light_switch_connector_type:
      name: Type connector remlichtschakelaar
      description: Geeft het type/formaat van de elektrische connector aan dat door
        de remlichtschakelaar wordt gebruikt om verbinding te maken met de kabelboom
        van het voertuig.
    brake_light_switch_contact_type:
      name: Type contact van remlichtschakelaar
      description: Configuratie/werking van de elektrische contacten van de remlichtschakelaar
        (bijv. normaal open/gesloten, omschakeling of meervoudig circuit).
    brake_light_switch_mounting_style:
      name: Remlicht schakelaar montagestijl
      description: Hoe de remlichtschakelaar op het voertuig of remsysteem wordt gemonteerd/geïnstalleerd
        (bijv. met schroefdraad, clip-in, beugelbevestiging, banjo-bout).
    brake_master_cylinder_mounting_type:
      name: Rem hoofdcilinder montagestijl
      description: Hoe de hoofdcilinder op het voertuig/de rembekrachtiger wordt gemonteerd
        (boutpatroon/flensuitvoering).
    brake_master_cylinder_reservoir_type:
      name: Type remvloeistofreservoir
      description: Type/configuratie van het remvloeistofreservoir dat door de hoofdcilinder
        wordt geleverd of vereist is.
    brake_mount_type:
      name: Type remmontage
      description: Geeft de reminterface aan die in de vork is ingebouwd, zodat rijders
        de compatibiliteit van het remsysteem kunnen controleren.
    brake_mounting_flange_bolt_pattern:
      name: Rembevestigingsflens boutpatroon
      description: Geeft het gaten-/boutpatroon van de bevestigingsflens aan dat wordt
