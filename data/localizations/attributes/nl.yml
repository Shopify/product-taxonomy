      description: Typen steken (functioneel en decoratief) die de machine kan maken.
    stitching_method:
      name: Stikmethode
      description: Geeft aan hoe de balpanelen aan elkaar zijn bevestigd.
    stitching_state:
      name: Stikstatus
      description: Geeft aan of de kledingstukken ongestikt, half gestikt, gestikt
