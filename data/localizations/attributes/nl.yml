      description: Geeft aan of het vest MOLLE/PALS-webbing heeft voor het bevestigen
        van modulaire pouches en accessoires.
    motor_belt_type:
      name: Motorriem type
      description: Definieert het ontwerp/profiel van de riem die wordt gebruikt in
        het aandrijfsysteem van de loopband.
    motor_configuration:
      name: Motor configuratie
      description: Geeft aan hoeveel onafhankelijke aandrijfmotoren de scooter gebruikt.
    motor_mounting_configuration:
      name: Montageconfiguratie motor
      description: Beschrijft hoe de motor is gemonteerd/geïmplementeerd in de ombouwset
        voor een scooter.
    motor_mounting_position:
      name: Montagepositie motor
      description: Geeft aan waar op de elektrische scooter de motor is gemonteerd,
        zoals in de voorwielnaaf, achterwielnaaf, dubbele wielnaaf of middenaandrijving.
    motor_position:
      name: Motor positie
      description: Geeft aan waar de motor zich op de elektrische fiets bevindt, wat
        invloed heeft op handling en onderhoud.
    motor_vehicle_a_v_integration_features:
      name: Motorvoertuig A/V-integratiekenmerken
      description: Smartphone- en voertuigintegratiekenmerken die door de headunit
        worden ondersteund (bijv. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Motorvoertuiglamp toepassing/positie
      description: Specificeert de beoogde verlichtingspositie of functie van het
        voertuig waarvoor de lamp is ontworpen (bijv. dimlicht, remlicht).
    motor_vehicle_bulb_approval_standard:
      name: Motorvoertuiglamp goedkeuringsnorm
      description: Geeft de wettelijke conformiteits-/goedkeuringsmarkering aan voor
        gebruik op de weg in de doelmarkt.
    motor_vehicle_oxygen_sensor_bank:
      name: Zuurstofsensorbank in motorvoertuig
      description: Geeft aan op welke motorcilinderbank de zuurstofsensor past (bijv.
        Bank 1 vs. Bank 2) voor V-type-/boxermotoren; gebruik Niet van toepassing
        voor lijnmotoren.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Motorvoertuig zuurstofsensor aantal draden
      description: Aantal draden in de kabelboom van de zuurstofsensor.
    motor_vehicle_oxygen_sensor_position:
      name: Motorvoertuig zuurstofsensor positie
      description: Specificeert waar de zuurstofsensor (O2) in het uitlaatsysteem
        ten opzichte van de katalysator is geïnstalleerd.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Motorvoertuig zuurstofsensor sensornummer
      description: Geeft het sensornummer aan (bijv. Sensor 1 of Sensor 2) binnen
        een bepaalde bank/positieaanduiding.
    motor_vehicle_oxygen_sensor_type:
      name: Zuurstofsensortype in motorvoertuig
      description: Specificeert het ontwerp/de technologie van de zuurstofsensor.
    motor_vehicle_paint_application_method:
      name: Motorvoertuig lak applicatiemethode
      description: Hoe de lak bedoeld is om op het voertuigoppervlak te worden aangebracht.
    motor_vehicle_paint_system_step:
      name: Motorvoertuig laksysteem stap
      description: Geeft aan voor welke stap of component van een autospuitlaksysteem
        het product bedoeld is (bijv. primer, basecoat, clearcoat).
    motor_vehicle_speaker_mounting_type:
      name: Motorvoertuig luidspreker montagetype
      description: Hoe de luidspreker bedoeld is om in het voertuig te worden geïnstalleerd
        (montagevormfactor).
    motor_vehicle_subwoofer_size:
      name: Subwoofergrootte motorvoertuig
      description: Nominale diameter van de subwooferdriver (bijv. 8 in, 10 in, 12
        in), gebruikt om compatibiliteit met voertuigruimte en behuizing af te stemmen.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Motorvoertuig subwoofer spreekspoel configuratie
      description: Aantal/configuratie van de spreekspoel, gebruikt om versterkerbekabelingsopties
        af te stemmen (bijv. SVC vs. DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Motorvoertuig subwoofer spreekspoel impedantie (per spoel)
      description: Impedantiewaarde van elke spreekspoel (niet de uiteindelijke bedrade
        belasting), gebruikt voor bedradingsberekeningen.
    motor_vehicle_voltage_regulator_type:
      name: Motorvoertuig spanningsregelaar type
      description: Geeft de regelaartechnologie/-vorm aan die in motorvoertuigen wordt
        gebruikt.
    motorcycle_armor_certification_standard:
      name: Certificeringsnorm motorprotectie
      description: Geeft de formele veiligheidsnorm(en) aan waaraan de beschermer
        gecertificeerd is te voldoen (bijv. EN 1621-2 voor rugbeschermers, EN 1621-3
        voor borstbeschermers).
    motorcycle_cover_size_class:
      name: Motorhoes maatklasse
      description: Gestandaardiseerde maatcategorie voor motorhoezen, gebaseerd op
        de typische motorcategorie/lengteklasse waarvoor deze geschikt is.
    motorcycle_glove_certification_standard:
      name: Motorhandschoen certificeringsnorm
      description: Specificeert de beschermende certificering/norm waaraan de handschoenen
        voldoen (bijv. EN 13594-niveaus).
    motorcycle_glove_waterproof_construction:
      name: Motorhandschoen waterdichte constructie
      description: Specificeert het type waterdichtingsmethode dat in de handschoen
        wordt gebruikt (indien aanwezig).
    motorcycle_guard_coverage_area:
      name: Motorbeschermer dekkingsgebied
      description: Het primaire dekkingsgebied dat door het product wordt geboden
        (elleboog, pols, onderarm, combinatie).
    motorcycle_kidney_belt_construction_type:
      name: Motor niergordel constructietype
      description: Constructiestijl van de niergordel die invloed heeft op stijfheid,
        luchtstroom en bescherming.
    motorcycle_kidney_belt_purpose:
      name: Motor niergordel doel
      description: Geeft de primaire rijstijl of het scenario aan waarvoor de motor
        niergordel is ontworpen.
    motorcycle_luggage_capacity_class:
      name: Motorfiets bagage inhoudsklasse
      description: Geeft de volume-inhoud van de motorfiets bagage aan, uitgedrukt
        als literbereik.
    motorcycle_luggage_mounting_system:
      name: Motorfiets bagage bevestigingssysteem
      description: Bevestigings-/montagesysteem dat wordt gebruikt om de tas/koffer
        aan de motorfiets te bevestigen (bijv. throw-over riemen, rack-mounted quick-release).
    motorcycle_luggage_side:
      name: Motorfiets bagage zijde
      description: Geeft bij koffers/zadeltassen aan of het item voor de linkerzijde,
        rechterzijde of als paar/set is bedoeld.
    motorcycle_protective_gear_size_system:
      name: Motorfiets beschermende uitrusting maatsysteem
      description: Geeft het maatsysteem aan dat op het product wordt gebruikt (bijv.
        alfamaten, numeriek, one size).
    motorcycle_rack_carrier_style:
      name: Motorfiets bagagedrager stijl
      description: Beschrijft de functionele dragerstijl voor het vervoeren van een
        motorfiets of scooter (platform vs rail vs lift-assisted, enz.).
    motorcycle_riding_discipline:
      name: Motorfiets rijdiscipline
      description: Identificeert de primaire rij- of gebruiksdiscipline waarvoor de
        nekbrace is ontworpen.
    motorcycle_tire_speed_rating:
      name: Motorfietsband snelheidsindex
      description: Geeft de maximale aanhoudende snelheid aan waarvoor de band is
        beoordeeld, met de standaard lettercode (bijv. H, V, W).
    motorsport_window_net_certification:
      name: Motorsport raamnet certificering
      description: Raceveiligheidscertificering of homologatie waaraan het raamnet
        voldoet (bijv. SFI of FIA), inclusief specificatienummer indien van toepassing.
    mound_usage_type:
      name: Mound gebruikstype
      description: Geeft de beoogde toepassingsomgeving van de mound aan, zoals Practice,
        Game, Bullpen of Multi-purpose.
    mount_attachment_method:
      name: Bevestigingsmethode steun
      description: Specificeert hoe de mount aan het voertuigoppervlak/de voertuigstructuur
        wordt bevestigd.
    mountainboard_truck_type:
      name: Mountainboard truck type
      description: Classificeert de stijl van de trucks die bij het board worden meegeleverd,
        wat invloed heeft op stuurrespons en duurzaamheid.
    mounting_attachment_method:
      name: Montage-/bevestigingsmethode
      description: Hoe de houder/tas is ontworpen om aan een drum, standaard, riem
        of ander oppervlak te worden bevestigd.
    mounting_attachment_type:
      name: Montage-/bevestigingstype
      description: Hoe het ratio-accessoire aan het spinnewiel wordt bevestigd of
        ermee koppelt.
    mounting_hardware_included_for_installation:
      name: Montagehardware meegeleverd (voor installatie)
      description: Geeft aan of de montagehardware die nodig is om het achterzitje
        te installeren (bijv. beugels, bouten, rails) met het product wordt meegeleverd.
    mounting_location:
      name: Montagelocatie
      description: Specificeert het beoogde plaatsingsgebied op apparatuur of lichaam
        voor het licht/de reflector (bijv. voorvork, helm, wielspaken).
    mounting_method:
      name: Montagemethode
      description: Hoe een stok-/borstelhouder wordt gemonteerd of bevestigd (bijv.
        clamp-on, strap-on, zelfklevend).
    mounting_position:
      name: Montagepositie
      description: Specificeert waar de handrembediening in de voertuigcabine moet
        worden gemonteerd/geïnstalleerd.
    mounting_rail_type:
      name: Montagerail type
      description: Specificeert de rail- of interfacestandaard waaraan het accessoire
        wordt bevestigd, zoals Picatinny of M-LOK.
    mounting_receiver_size:
      name: Montageontvanger maat
      description: Maat van de ontvangerkoppeling die nodig is voor trekhaakgemonteerde
        bagagedragers.
    mounting_storage_type:
      name: Montage-/opslagtype
      description: Hoe het apparaat bedoeld is om op het vaartuig/de persoon te worden
        gemonteerd of opgeborgen.
    mouth_grip_type:
      name: Mondgreep type
      description: Beschrijft het type mondgreep of beschermer op het fluitje voor
        comfort en hygiëne.
    mouthguard_mold_type:
      name: Gebitsbeschermer vormtype
      description: Beschrijft hoe de gebitsbeschermer op het gebit van de sporter
        wordt aangepast (bijv. boil-and-bite, op maat gemaakt door de tandarts).
    mouthpiece_facing_length:
      name: Mondstuk facinglengte
      description: Geeft de lengtecategorie van de facingcurve van het mondstuk aan
        (niet de totale mondstuklengte), wat invloed heeft op respons, weerstand en
        rietcompatibiliteit.
    mouthpiece_material:
      name: Mondstuk materiaal
      description: Specificeert het materiaal van het mondcontactgedeelte van het
        mondstuk/de tip van een blaastoeter, dat kan afwijken van het materiaal van
        het hoofdgedeelte.
    mouthpiece_shank_receiver_size:
      name: Mondstuk schacht/receiver maat
      description: Specificeert de mondstukreceiver-/schachtstandaard die compatibel
        is met de bugel.
    mouthpiece_shank_size:
      name: Mondstuk schachtmaat
      description: Specificeert de pasvormstandaard van de mondstukschacht/receiver
        om compatibiliteit met het beoogde koperblaasinstrument te garanderen.
    mouthpiece_shank_type:
      name: Type mondstukschacht
      description: Specificeert de mondstukreceiver-/schachtstandaard voor compatibiliteit
        (waar van toepassing).
    mouthpiece_style:
      name: Mondstukstijl
      description: Classificeert het ontwerp/de vorm van het mondstukgedeelte van
        het stangbit, wat invloed heeft op drukpunten, scherpte en paardenvoorkeur.
    mouthpiece_type:
      name: Mondstuktype
      description: Type mondstuk aan het blaaseinde (ingebouwd, verwijderbaar of add-on-stijlen).
    movement_mechanism:
      name: Bewegingsmechanisme
      description: Definieert hoe de bank tijdens gebruik beweegt (schommelen, glijden,
        wiegen, enz.).
    muffin_size:
      name: Muffin maat
      description: Classificeert het fysieke maatformat van het muffinproduct (bijv.
        mini, standaard, jumbo).
    mushroom_variety:
      name: Paddenstoel variëteit
      description: Geeft de specifieke soort of variëteit paddenstoel of truffel in
        het product aan (bijv. Shiitake, King Oyster, Black Truffle).
    music_stand_desk_tilt_adjustment:
      name: Muziekstandaard blad kantelverstelling
      description: Geeft aan of en hoe de hoek van het blad kan worden versteld.
    music_stand_intended_use:
      name: Muziekstandaard beoogd gebruik
      description: Geeft de primaire beoogde setting/use-case voor de standaard aan.
    musical_block_pitch_type:
      name: Muziekblok toonhoogte type
      description: Beschrijft of het muziekblok een bepaalde toonhoogte (gestemd)
        of een onbepaalde toonhoogte produceert.
    musical_box_mechanism_type:
      name: Hoe de speeldoos geluid produceert/afspeelt (bijv. opwindmechanisme vs
        elektronische weergave).
      description: Hoe de speeldoos geluid produceert/afspeelt (bijv. opwindmechanisme
        vs elektronische weergave).
    musical_keyboard_case_fit_type:
      name: Keyboard koffer pasvormtype
      description: Beschrijft hoe de koffer is afgestemd op het instrument (bijv.
        universeel/generiek maatbereik vs modelspecifieke/custom pasvorm).
    musical_ratchet_sound_character:
      name: Muzikale ratel klankkarakter
      description: Algemene beschrijving van het timbre/de luidheidskenmerken van
        de ratel.
    musical_scraper_groove_surface_material:
      name: Muzikale schraper groefoppervlak materiaal
      description: Specificeert het materiaal van het geribbelde/gegroefde schraapoppervlak
        (kan afwijken van het materiaal van de body).
    musical_scraper_type:
      name: Muzikale schraper type
      description: Specificeert de stijl/het ontwerp van het muzikale schraapinstrument
        (bijv. guiro vs reco-reco), wat invloed heeft op geluid en speeltechniek.
    mute_attachment_method:
      name: Bevestigingsmethode demper
      description: Specificeert hoe een bekken demper wordt bevestigd of op zijn plaats
        wordt gehouden op het bekken (bijv. gel, static cling, magneet, klem).
    mute_attenuation_level:
      name: Demper verzwakkingsniveau
      description: Geeft aan hoeveel de demper het waargenomen volume vermindert,
        vooral relevant voor oefendempers.
    mute_cork_padding_material:
      name: Demper kurk-/vulmateriaal
      description: Specificeert het materiaal van de contactvulling van de demper
        (bijv. kurkstrip/-pads) dat wordt gebruikt voor grip/pasvorm en bescherming
        van de beker.
    mute_coverage_type:
      name: Type demperbedekking
      description: Geeft de stijl/dekking van de demper op het speeloppervlak aan,
        van kleine spotdempers tot oefendempers voor het volledige oppervlak.
    mute_finish:
      name: Demper afwerking
      description: Oppervlakafwerking van de demper die invloed kan hebben op duurzaamheid
        en esthetiek (bijv. gepolijst vs satijn).
    name_label_text_template:
      name: Naamlabel teksttemplate
      description: Specificeert de vooraf ingestelde tekst of template die op het
        naamlabel is gedrukt (bijv. 'Belongs to', 'Made by').
    napkin_ply:
      name: Servet lagen
      description: Geeft de dikte van het cocktailservet aan op basis van het aantal
        lagen (plies).
    neck_brace_fit_system:
      name: Nekbrace pasvormsysteem
      description: Geeft de primaire methode aan die wordt gebruikt om de nekbrace
        af te stellen en aan de rijder te bevestigen.
    neck_brace_size_basis:
      name: Nekbrace maatbasis
      description: Geeft de maatbasis aan die wordt gebruikt om de juiste nekbrace-maat
        te kiezen.
    neck_configuration:
      name: Halsconfiguratie
      description: Specificeert de halsstijl/-configuratie die bij de saxofoon wordt
        meegeleverd, wat invloed heeft op ergonomie en bespeelbaarheid.
    neck_coverage_type:
      name: Type nekbedekking
      description: Specificeert de stijl van nekbedekking die bij de deken wordt meegeleverd.
    neck_support_size_system:
      name: Neksteun maatsysteem
      description: Geeft het maatsysteem aan dat wordt gebruikt voor de race-neksteun/-brace
        (bijv. volwassenen, jeugd of one size).
    necklace_length_type:
      name: Lengtecategorie ketting
      description: Specificeert de conventionele kettinglengtecategorie, zoals choker
        of opera, ter ondersteuning van stijlgericht shoppen.
    needle_balance_zone:
      name: Naald balanszone
      description: Geeft de magnetische balanszone of hemisfeer aan waarvoor de kompasnaald
        is afgestemd, zodat wereldwijd nauwkeurige metingen mogelijk zijn.
    needle_case_format:
      name: Naald etui formaat
      description: Algemene organizervormfactor van het naald etui.
    needle_damping_type:
      name: Type naalddemping
      description: Beschrijft hoe de kompasnaald wordt gestabiliseerd (bijv. vloeistofgevuld,
        droog of elektronisch gestabiliseerd), wat invloed heeft op insteltijd en
        duurzaamheid.
    needle_felting_needle_profile:
      name: Viltnaald naaldprofiel
      description: Dwarsdoorsnede/profiel van een viltnaald dat beïnvloedt hoe vezels
        worden verplaatst en welke afwerking ontstaat.
    needle_holder_features:
      name: Naaldenhouder kenmerken
      description: Opvallende functionele kenmerken van de naaldhouder.
    needle_holder_mounting_attachment_method:
      name: Naaldenhouder montage-/bevestigingsmethode
      description: Hoe de naaldenhouder bedoeld is om te worden bevestigd of gebruikt
        tijdens opslag (bijv. magnetisch, clip, band).
    needle_holder_style:
      name: Naaldhouderstijl
      description: De fysieke opslag- of draagstijl/het ontwerp van de naaldenhouder.
    needle_pushing_surface_type:
      name: Naald duwoppervlak type
      description: Het type/ontwerp van het duwoppervlak voor de naald op de naaihandpalm
        (bijv. metalen vingerhoedplaatje, munt of verstevigd lapje).
    needle_requirement_beading_pattern:
      name: Naaldvereiste (kralenpatroon)
      description: Naaldtype/-maat aanbevolen door het patroon.
    needle_size_system:
      name: Naald maatsysteem
      description: Maatstandaard die wordt gebruikt voor de maataanduiding van naalden.
    needle_threader_compatible_needle_type:
      name: Naaldinrijger compatibel naaldtype
      description: Specificeert met welke naaldtypen de naaldinrijger is ontworpen
        om te werken (per naaldcategorie/gebruik).
    needle_threader_mechanism_type:
      name: Type mechanisme naaldinrijger
      description: Beschrijft hoe de naaldinrijger de draad opvangt/door het oog van
        de naald trekt.
    needle_threader_packaging_type:
      name: Naaldinrijger verpakkingstype
      description: Hoe het product wordt verkocht/verpakt (los vs multipack vs set).
    needlecraft_fabric_color_family:
      name: Handwerkstof kleurfamilie
      description: Genormaliseerde kleurfamilie voor evenweave-stof / gelijkmatig
        geweven stof (gebruikt naast Kleur voor filtering/facetten).
    needlecraft_fabric_composition:
      name: Handwerkstof 5samenstelling
      description: Geeft de vezelsamenstelling of vezelmix van de handwerkstof aan
        (bijv. 100% katoen, linnen/katoenmix).
    needlecraft_fabric_weave_type:
      name: Handwerkstof weeftype
      description: Geeft de weving/constructie van het handwerklinnen aan (bijv. evenweave/gelijkmatig
        geweven stof versus traditioneel linnen), wat invloed heeft op het steekgedrag
        en het uiterlijk.
    needlecraft_kit_items_included:
      name: Handwerkpakket meegeleverde items
      description: Geeft de belangrijkste onderdelen aan die in het handwerkpakket
        zijn inbegrepen (gereedschap en verbruiksmaterialen).
    needlecraft_kit_project_type:
      name: Handwerkpakket projecttype
      description: Geeft aan welk eindproduct met het pakket wordt gemaakt (het projectresultaat).
    needlecraft_stitching_coverage:
      name: Handwerk steekdekking
      description: Geeft aan of er over 1 draad/vakje of over 2 draden wordt geborduurd
        (gebruikelijk bij evenweave-stof en linnen).
    needlepoint_canvas_mesh_count:
      name: Stramien maaswijdte
      description: De beoogde maaswijdte/count van het stramien (draden per inch)
        waarvoor het ontwerp is uitgetekend (meestal canvas count genoemd).
    needlepoint_frame_canvas_attachment_method:
      name: Stramienraam stramienbevestigingsmethode
      description: Beschrijft hoe het stramien aan het stramienraam wordt bevestigd.
    needlepoint_frame_compatible_stand_type:
      name: Stramienraam compatibel standaardtype
      description: Als het raam is ontworpen om op een standaard te worden gemonteerd,
        specificeert dit met welk(e) standaardtype(n) het compatibel is.
    needlepoint_frame_contents:
      name: Stramienraam inhoud
      description: Specificeert welke onderdelen en accessoires bij het stramienraam
        zijn inbegrepen (bijv. frame, extra latten/stangen, spijkers/pinnen, gripstrips,
        draagtas).
    needlepoint_frame_tension_adjustment_type:
      name: Stramienraam spanningsverstelling type
      description: Geeft aan hoe (of of) de spanning van het frame tijdens gebruik
        kan worden aangepast.
    needlepoint_pattern_chart_format:
      name: Type borduurpatroon
      description: Hoe het tapisserieontwerp wordt weergegeven om te borduren (telpatroon
        vs gedrukte/geschilderde gids).
    needlepoint_project_type:
      name: Stramien projecttype
      description: Het beoogde afgewerkte item/de categorie waarvoor het tapisserieontwerp
        is bedoeld.
    net_design:
      name: Net ontwerp
      description: Geeft de constructiestijl van het net aan, inclusief of het kan
        worden ingetrokken of opgevouwen voor draagbaarheid.
    net_mesh_pattern:
      name: Net maaspatroon
      description: Specificeert de geometrische vorm van de netopeningen, die invloed
        kan hebben op zichtbaarheid en sterkte.
    net_twine_gauge:
      name: Net touw dikte
      description: Geeft de touwdikte of sterkte van het net aan, traditioneel uitgedrukt
        als gauge-nummer (bijv. 18, 36).
    nicotine_source:
      name: Nicotinebron
      description: Geeft aan of de nicotine in het product afkomstig is van tabak,
        synthetisch is of dat het product geen nicotine bevat.
    nipple_drive_interface:
      name: Nippel aandrijfinterface
      description: Identificeert de stijl/standaard van de aandrijfinterface of kop
        van de nippel (extern of intern), die het benodigde gereedschap en de wielbouwmethode
        bepaalt.
    nock_activation_method:
      name: Nok activeringsmethode
      description: Specificeert het mechanisme waarmee de LED van de verlichte pijlnok
        wordt in- of uitgeschakeld (bijv. boogpeesdruk, bewegingssensor, handmatige
        schakelaar).
    nock_fitment_code:
      name: Nok pasvormcode
      description: Fabrikants- of branchecode die aangeeft tot welke nokfamilie/-serie
        deze behoort.
    nock_throat_size:
      name: Nok keelmaat
      description: Specificeert de maat van de nokkeel (groef) die op de boogpees
        klikt.
    nock_transparency_level:
      name: Transparantieniveau van nok
      description: Beschrijft hoe doorschijnend het nokmateriaal is, helder, doorschijnend,
        ondoorzichtig of glow-in-the-dark, wat invloed heeft op zichtbaarheid en esthetiek.
    nock_type:
      name: Noktype
      description: Specificeert het nokontwerp dat op een pijl of bout wordt gebruikt,
        zoals pin, half-moon of verlicht.
    noise_reduction_type:
      name: Type geluidsreductie
      description: Specificeert de ruisonderdrukkingstechnologie die wordt gebruikt
        (of niet wordt gebruikt) in de geïntegreerde headset van de helm, indien van
        toepassing.
    noise_suppression_technology:
      name: Ruisonderdrukkingstechnologie
      description: Specificeert of het product passieve demping of actieve elektronische
        circuitry gebruikt die harde geluiden comprimeert en/of omgevingsgeluid versterkt.
    non_slip_base_features:
      name: Antislipbasis kenmerken
      description: Geeft de antislipkenmerken aan die zijn inbegrepen om te voorkomen
        dat het pedaal tijdens gebruik verschuift.
    nose_bridge_type:
      name: Neusbrug type
      description: Geeft het ontwerp van de neusbrug aan, dat invloed heeft op de
        pasvorm voor verschillende gezichtsmaten.
    nose_clip_accessories_included:
      name: Neusklem meegeleverde accessoires
      description: Vermeldt eventuele extra accessoires die bij de zwemneusklem worden
        geleverd (bijv. oordopjes, opberghoes).
    nose_clip_features:
      name: Neusklem kenmerken
      description: Benadrukt algemene functionele of comfortkenmerken van de neusklem.
    nose_coverage_style:
      name: Stijl neusbedekking
      description: Geeft de aanwezigheid en het type neus- of snuitbeschermingspaneel
        op het vliegenmasker aan.
    noseband_type:
      name: Neusriem type
      description: Specificeert het ontwerp van de neusriem (indien aanwezig) die
        bij het hoofdstel wordt geleverd.
    number_of_canvas_meshes:
      name: Aantal canvas mazen
      description: De maaswijdte van het plastic canvasvel, uitgedrukt als gaten per
        inch (HPI) of count, die de steekgrootte en het projectdetail bepaalt.
    number_of_chainrings:
      name: Aantal kettingbladen
      description: Geeft aan hoeveel kettingbladen de crank is ontworpen om te monteren
        of waarmee deze wordt geleverd.
    number_of_control_stations:
      name: Aantal bedieningsstations
      description: Geeft het aantal helm-/bedieningsstations aan dat door de bedieningsset
        wordt ondersteund (enkel station vs. dubbel station, enz.).
    number_of_digits:
      name: Aantal cijfers
      description: Hoeveel cijfers de teller weergeeft (bijv. 1-cijferig, 2-cijferig,
        3-cijferig).
    number_of_guitar_slots:
      name: Aantal gitaarsleuven
      description: Geeft aan hoeveel gitaren de koffer/gigbag kan bevatten.
    number_of_needlecraft_fabrics:
      name: Aantal borduurstoffen
      description: Specificeert het aantal stoffen voor borduurcanvas/-stof, meestal
        uitgedrukt als vierkanten/draden per inch (bijv. 14-count).
    number_of_plastic_canvas_meshes:
      name: Aantal plastic canvas mazen
      description: Specificeert de maaswijdte van plastic canvas (gaten per inch),
        die de steekgrootte en het detailniveau van het project bepaalt.
    number_of_quilting_frame_rails:
      name: Aantal quiltframe rails
      description: Aantal rails/rollers inbegrepen bij het quiltframe (bijv. 2-rails
        vs. 3-rails systemen).
    number_of_rope_slots:
      name: Aantal touwsleuven
      description: Geeft aan of het zekeringsapparaat is ontworpen voor gebruik met
        enkel touw of dubbel touw.
    number_of_switch_poles:
      name: Aantal schakelaarpolen
      description: Het aantal afzonderlijke circuits (polen) dat door de schakelaar
        wordt aangestuurd (bijv. SPST, DPST).
    number_of_switch_throws:
      name: Aantal schakelaarstanden
      description: Het aantal uitgangspaden (standen) per pool (bijv. SPDT).
    number_of_timing_chain_rows:
      name: Aantal distributiekettingrijen
      description: Geeft aan of de distributieketting enkelrijig of meerrijig is.
    number_of_trailer_axles:
      name: Aantal trailerassen
      description: Aantal assen op de trailer.
    number_of_wheel_pieces:
      name: Aantal wielstukken
      description: Specificeert of het wiel een 1-delige, 2-delige of 3-delige constructie
        heeft.
    numbering_style:
      name: Nummeringsstijl
      description: Geeft aan of en hoe de hesjes vooraf zijn genummerd voor teamidentificatie
        (bijv. ongenummerd, 1-10, aangepast).
    nunchuck_connector_type:
      name: Nunchuck connectortype
      description: Stijl van de verbinding tussen de twee nunchuck-handgrepen (bijv.
        touw, ketting, draaiketting).
    nursing_access:
      name: Voedingstoegang
      description: Identificeert de methode voor borstvoedingstoegang die in de zwemjurk
        is geïntegreerd, indien van toepassing.
    nursing_access_type:
      name: Voedingstoegang type
      description: Specificeert hoe het kledingstuk borsttoegang biedt voor voeden
        of kolven.
    nut_butter_texture:
      name: Notenboter textuur
      description: Beschrijft de fysieke consistentie van de notenboter, zodat shoppers
        gemakkelijk kunnen kiezen tussen glad, crunchy, enz.
    nutrient_fortification:
      name: Verrijking met voedingsstoffen
      description: Identificeert belangrijke voedingsstoffen waarmee de drank of het
        voedingsproduct is verrijkt.
    oak_product_form:
      name: Productform eikenhout
      description: Identificeert de fysieke vorm van eikenhout dat wordt gebruikt
        voor het rijpen/op smaak brengen van producten.
    oak_toast_level:
      name: Eikenhout roosterniveau
      description: Specificeert het roosterniveau van eikenhoutproducten.
    oboe_case_capacity:
      name: Capaciteit hobokoffer
      description: Geeft aan voor welk(e) instrument(en) en belangrijke onderdelen
        de koffer is ontworpen.
    oboe_case_carry_configuration:
      name: Hobo koffer draagconfiguratie
      description: Geeft de primaire draagconfiguratie aan die door de koffer/gigbag
        wordt geboden.
    oboe_case_design:
      name: Hobo koffer ontwerp
      description: Classificeert de constructie/stijfheid van een hobokoffer of gigbag
        (bijv. hard, semi-rigide, zacht) om het beschermingsniveau aan te geven.
    oboe_case_internal_fit_type:
      name: Hobo koffer interne pasvormtype
      description: Geeft aan of het interieur is gevormd voor een specifieke instrumentconfiguratie
        of verstelbare compartimenten gebruikt.
    oboe_keywork_plating:
      name: Hobo mechaniek plating
      description: Specificeert de plating/afwerking van het hobo-mechaniek (kleppen),
        los van het bodymateriaal.
    oboe_strap_padding:
      name: Hobo riem padding
      description: Beschrijft de aanwezigheid/het type padding in het contactgebied
        van de riem/steun voor comfort (bijv. gepolsterd schouder-/nekgedeelte).
    oboe_swab_style:
      name: Hobo swab stijl
      description: Specificeert de functionele stijl/constructie van een hobo-reinigingsswab
        (bijv. pull-through, verzwaarde zijde).
    observation_window_material:
      name: Observatievenster materiaal
      description: Specificeert het materiaal van de kijkpanelen/het venster (heeft
        vaak invloed op helderheid en duurzaamheid).
    ocarina_accessories_included:
      name: Inbegrepen ocarina-accessoires
      description: Accessoires die bij de ocarina worden meegeleverd, zoals een hoes,
        halskoord of vingerzettingstabel.
    ocarina_chamber_count:
      name: Ocarina kamertelling
      description: Geeft aan hoeveel kamers de inline-ocarina heeft, wat invloed heeft
        op bereik en speelcomplexiteit (enkel/dubbel/drievoudig, enz.).
    ocarina_fingering_system:
      name: Vingerzettingssysteem ocarina
      description: Specificeert het vingerzettingssysteem/de vingerzettingsstandaard
        die de hanger-ocarina volgt (indien van toepassing).
    ocarina_finish_type:
      name: Ocarina afwerkingstype
      description: Oppervlakafwerking van de ocarina-body die invloed heeft op gevoel
        en esthetiek.
    occupant_classification_sensor_support:
      name: Ondersteuning voor inzittendeclassificatiesensor
      description: Geeft aan of de stoel een inzittendeclassificatie-/gewichtssensor
        bevat of voorziening heeft om de OEM-sensor over te zetten/te installeren
        (vaak voor voorpassagiersstoelen).
    octave_harmonica_cover_plate_material:
      name: Afdekmateriaal octaafharmonica
      description: Materiaal van de buitenste afdekplaten van de octaafharmonica.
    octave_harmonica_tuning_system:
      name: Stemsysteem octaafharmonica
      description: De stemming/temperatuur die voor de octaafharmonica wordt gebruikt.
    octoban_mounting_system_type:
      name: Octoban montagesysteemtype
      description: Hoe de octoban tijdens het spelen wordt gemonteerd/gepositioneerd
        (montage-/beugel-/statiefsetup).
    odor_control_features:
      name: Geurcontrole kenmerken
      description: Geeft aan of het product geur neutraliseert/deodoriseert en met
        welke aanpak.
    office_furniture_items_included:
      name: Inbegrepen kantoormeubelstukken
      description: Identificeert de specifieke kantoormeubelitems die in de set zijn
        inbegrepen, zoals een bureau of archiefkast.
    oil_cooler_core_type:
      name: Oliekoeler kerntype
      description: Specificeert de interne kernconstructie van de oliekoeler, die
        invloed heeft op koelefficiëntie, drukval en duurzaamheid.
    oil_cooler_mounting_style:
      name: Oliekoeler montagestijl
      description: Beschrijft hoe de oliekoeler bedoeld is om op het voertuig te worden
        gemonteerd/geïnstalleerd.
    oil_dipstick_component_type:
      name: Oliepeilstok componenttype
      description: Specificeert welk oliepeilmeetcomponent wordt verkocht (bijv. alleen
        peilstokblad/-stang, alleen handgreep, complete assemblage, peilstokbuis,
        enz.).
    oil_dipstick_measurement_markings:
      name: Oliepeilstok meetmarkeringen
      description: Specificeert welke markeringen/schaal op de peilstok aanwezig zijn
        om het oliepeil af te lezen.
    oil_dipstick_tube_mounting_type:
      name: Oliepeilstokbuis montagetype
      description: Specificeert hoe de oliepeilstokbuis aan de motor of het motorblok
        wordt vastgezet of gemonteerd.
    oil_drain_plug_head_drive_type:
      name: Olieaftapplug kop aandrijvingstype
      description: Specificeert de gereedschapsinterface op de kop van de olieaftapplug
        die wordt gebruikt voor installatie en verwijdering.
    oil_drain_plug_magnet_type:
      name: Olieaftapplug magneettype
      description: Specificeert of de aftapplug magnetisch is en, zo ja, welke stijl.
    oil_fill_cap_type:
      name: Olievuldop type
      description: Stijl/type olievuldopinterface die door het kleppendeksel wordt
        gebruikt (indien van toepassing).
    oil_filler_cap_attachment_type:
      name: Olievuldop bevestigingstype
      description: Specificeert hoe de olievuldop op de motor/olievulhals wordt vastgezet
        (bijv. schroefdraad, bajonet/kwartslag, press-fit).
    oil_filler_cap_installation_position:
      name: Olievuldop installatiepositie
      description: Specificeert waar de dop wordt gebruikt wanneer er meerdere olievulpunten
        bestaan (bijv. kleppendeksel, externe vulbuis).
    oil_filler_cap_locking_type:
      name: Type vergrendeling olievuldop
      description: Specificeert of de olievuldop niet-vergrendelend is of een vergrendelende/beveiligde
        verwijderingsmethode gebruikt (bijv. met sleutel of gereedschap vereist) om
        manipulatie/diefstal of per ongeluk openen te helpen voorkomen.
    oil_filler_cap_tether_type:
      name: Type bevestiging olievuldop
      description: Specificeert of de olievuldop met een koord vastzit/vastgezet is
        om verlies te voorkomen en welke stijl koord wordt gebruikt.
    oil_filler_cap_venting_type:
      name: Olievuldop ontluchtingstype
      description: Specificeert of de dop ontlucht is en welk ontluchtingsmechanisme
        wordt gebruikt (indien van toepassing).
    oil_filter_style:
      name: Oliefilter stijl
      description: Specificeert de vormfactor en montage-/installatiestijl van het
        oliefilter voor compatibiliteit met de filtermontage van de motor.
    oil_pan_baffle_windage_features:
      name: Oliecarter baffle-/windage-kenmerken
      description: Geeft aan welke interne oliecontrolekenmerken in het carter zijn
        inbegrepen.
    oil_pan_finish_coating:
      name: Afwerking/coating carterpan
      description: Beschrijft de oppervlakafwerking of coating van het oliecarter
        (gelakt, gepoedercoat, geplatineerd, onbehandeld, enz.).
    oil_pressure_sensor_function_type:
      name: Oliedruksensor functietype
      description: Geeft aan of het onderdeel een oliedruksensor/sender met variabele
        output voor een meter/ECU is, of een aan/uit-oliedrukschakelaar die een waarschuwingslampje
        activeert.
    oil_pressure_sensor_signal_output_type:
      name: Oliedruksensor signaal outputtype
      description: Specificeert de elektrische output-/signaalstijl die door de oliedruksensor/sender
        wordt geproduceerd.
    oil_processing_method:
      name: Olieverwerkingsmethode
      description: Specificeert hoe de olie is geproduceerd of geraffineerd (bijv.
        koudgeperst, virgin, geraffineerd), wat invloed heeft op smaak, voeding en
        geschikte kooktoepassingen.
    oil_pump_drive_method:
      name: Oliepomp aandrijfmethode
      description: Geeft aan wat de oliepomp in de motor aandrijft.
    oil_pump_mounting_style:
      name: Montagestijl oliepomp
      description: Specificeert waar en hoe de oliepomp in de motor wordt gemonteerd
        (bijv. intern vs. extern/op afstand, dekselmontage, cartermontage).
    oil_system_connection_thread_standard:
      name: Oliesysteem aansluiting draadstandaard
      description: Specificeert de draad-/aansluitingstandaard die door de oliesysteeminterface
        van het onderdeel wordt gebruikt voor installatie/compatibiliteit (bijv. M12×1.5,
        1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Olie viscositeitsklasse
      description: Beschrijft de relatieve dikte van de draaiende olie voor knutselapparatuur
        (geen SAE-klassen voor auto’s).
    okra_variety:
      name: Okravariëteit
      description: Identificeert de specifieke cultivar of marktvariëteit van de aangeboden
        okra, zoals Clemson Spineless, Red Burgundy of Baby Okra.
    olfactory_arts_material_form:
      name: Materiaalvorm geurkunst
      description: Specificeert de fysieke vorm van het materiaal zoals verkocht.
    olfactory_arts_tool_kit_content:
      name: Geurkunst gereedschapskit inhoud
      description: Vermeldt welke onderdelen zijn inbegrepen wanneer het product wordt
        verkocht als kit of set voor het maken van kaarsen/wierook/parfum.
    olive_variety:
      name: Olijf variëteit
      description: Specificeert de cultivar van de gebruikte olijf, die invloed heeft
        op smaak, textuur, kleur en regionale authenticiteit.
    onion_variety:
      name: Uienvariëteit
      description: Specificeert het specifieke type ui, zodat shoppers snel de gewenste
        kleur, smaak en gebruiksprofielen kunnen vinden, en verkopers producten nauwkeurig
        kunnen vermelden.
    opacity_level:
      name: Opaciteitsniveau
      description: Geeft aan hoe transparant of ondoorzichtig de stof is.
    operating_modes:
      name: Bedrijfsmodi
      description: Primaire ingebouwde effect-/bewegingsmodi die door de laser light
        worden ondersteund.
    operating_voltage:
      name: Bedrijfsspanning
      description: Specificeert de nominale systeemspanning waarvoor de injector is
        ontworpen.
    optical_toy_features:
      name: Optisch speelgoed kenmerken
      description: Benadrukt het primaire visuele/optische effect dat door het speelgoed
        wordt geproduceerd.
    orchestral_string_core_material:
      name: Orkestsnaar kernmateriaal
      description: Specificeert het kernconstructiemateriaal van de snaar (kern),
        dat een sterke invloed heeft op gevoel, respons en klank.
    orchestral_string_end_type:
      name: Orkestsnaar uiteindetype
      description: Specificeert de bevestigingsstijl aan het staartstukuiteinde van
        de snaar.
    orchestral_string_included_strings:
      name: Inbegrepen snaren voor orkeststrijkinstrumenten
      description: Vermeldt welke specifieke snaren in de verpakking zijn inbegrepen
        (verschilt per instrument).
    orchestral_string_instrument_fitting_part_type:
      name: Orkestraal snaarinstrument fitting-/onderdeeltype
      description: Specificeert wat voor soort fitting/onderdeel het product is (bijv.
        kam, staartstuk, kinsteun).
    orchestral_string_instrument_mute_type:
      name: Type demper voor orkeststrijkinstrumenten
      description: Specificeert het functionele type demper voor orkestrale snaarinstrumenten
        (bijv. oefen-/hoteldemper vs. performance-/concertdemper) en/of de gangbare
        ontwerpstijl.
    orchestral_string_instrument_part_position:
      name: Orkestraal snaarinstrument onderdeelpositie
      description: Geeft aan waar het onderdeel op het instrument hoort (handig wanneer
        onderdelen in boven-/onder- of links-/rechtsvarianten komen).
    orchestral_string_winding_material:
      name: Wikkelmateriaal voor strijkinstrumenten
      description: Specificeert het buitenste omwikkelings-/wikkelmateriaal dat op
        de snaar wordt gebruikt.
    organza_finish_sheen:
      name: Organza afwerking / glans
      description: Beschrijft het oppervlakte-uiterlijk van de organza (mat vs. glanzend/iriserende
        effecten).
    organza_ribbon_transparency_level:
      name: Organza lint transparantieniveau
      description: Beschrijft hoe doorschijnend het organzalint is.
    organza_transparency_level:
      name: Transparantieniveau organza
      description: Beschrijft hoe transparant de organzastof is wanneer deze in één
        laag ligt.
    origami_paper_shape:
      name: Origamipapier vorm
      description: Specificeert de velvorm die voor vouwen wordt gebruikt.
    origami_paper_sidedness:
      name: Origamipapier dubbelzijdigheid
      description: Geeft aan of het origamipapier aan beide zijden dezelfde kleur/hetzelfde
        patroon heeft of contrasterende zijden.
    ostrich_feather_part:
      name: Struisvogelveer onderdeel
      description: Identificeert de stijl/het onderdeel van de struisvogelveer dat
        wordt gebruikt (bijv. pluim vs. drab), wat invloed heeft op zachtheid, dichtheid
        en typische ambachtelijke toepassingen.
    outboard_motor_shaft_type:
      name: Type buitenboordmotoras
      description: Standaard schachtlengteklasse die wordt gebruikt bij buitenboordmotoren
        (labelvorm gebruikt in de maritieme sector).
    outboard_motor_steering_type:
      name: Buitenboordmotor besturingstype
      description: Specificeert de besturingsinterface/het besturingsmechanisme dat
        door de buitenboordmotor wordt gebruikt (bijv. helmstok of afstandsbesturingssysteem).
    outdoor_table_functionality:
      name: Buitentafel functionaliteit
      description: Identificeert gespecialiseerde ingebouwde functies die verder gaan
        dan een eenvoudig tafelblad (bijv. koelvak, opbergplank, gastankafdekking,
        parasolvoet, stoelconnector, inklapbaar ontwerp, in-pool veilig, verstelbare
        hoogte, geïntegreerde wielen, LED-verlichting).
    outerwear_length_type:
      name: Bovenkleding lengtetype
      description: Classificeert de totale lengte van een bovenkledingstuk in standaard
        beschrijvende bereiken.
    outerwear_pieces_included:
      name: Inbegrepen kledingstukken
      description: Vermeldt de kledingstukken die worden meegeleverd wanneer het product
        als set wordt verkocht.
    outfit_attachment_mechanism:
      name: Bevestigingsmechanisme outfit
      description: Specificeert hoe outfit- of accessoirestukken aan de pop worden
        bevestigd (bijv. tabs, lijm, magneten).
    outfit_items_included:
      name: Inbegrepen kledingstukken
      description: Vermeldt de specifieke kledingitems die in de set zijn inbegrepen
        (bijv. rompertje, short, haarband).
    outlet_thread_type:
      name: Uitgang draadtype
      description: Draadstandaard die wordt gebruikt bij de remleidinguitgangen van
        de hoofdremcilinder (bijv. metric bubble flare vs SAE inverted flare).
    output_jack_type_instrument:
      name: Output jack type (instrument)
      description: Specificeert het type audio-output jack op de elektrische mandoline.
    output_signal_type:
      name: Uitgangssignaal type
      description: Elektrisch uitgangsgedrag/type dat door de sensor wordt geproduceerd
        (bijv. analoge weerstand van NTC-thermistor).
    outsole_marking_type:
      name: Buitenzool markeringstype
      description: Geeft aan of de buitenzool van de schoen sporen achterlaat op baanoppervlakken,
        een belangrijk aandachtspunt voor indoor- of racketsporten.
    outsole_material:
      name: Buitenzool materiaal
      description: Geeft het materiaal aan van de buitenzool van de schoen die contact
        maakt met de grond, met invloed op grip, flexibiliteit en duurzaamheid.
    outsole_stud_type:
      name: Buitenzool noppen type
      description: Beschrijft de buitenzool-/noppenconfiguratie (bijv. gegoten noppen,
        rubberen noppen, turfnoppen) die grip biedt op het gekozen speeloppervlak.
    oven_bake_clay_formulation:
      name: Ovenbakklei formulering
      description: Identificeert de formuleringsfamilie van de ovenbakklei (bijv.
        polymeerklei vs. harsklei), die invloed heeft op hantering, uithardingsgedrag
        en afgewerkte eigenschappen.
    oven_housing_configuration:
      name: Ovenkast configuratie
      description: Definieert de beoogde apparaatindeling die door de kast wordt ondersteund
        (bijv. enkele oven, dubbele oven of oven-magnetroncombinatie).
    overhead_mount_installation_method:
      name: Bovenmontage installatiemethode
      description: Hoe de bovenmontage aan het voertuig wordt bevestigd (hardware-/bevestigingsstijl).
    oversize_or_undersize_grade:
      name: Overmaat- of ondermaatklasse
      description: Specificeert de maatklasse van de kit (overmaat zuigers/veren en/of
        ondermaat lagers) ten opzichte van de standaard OEM-maat.
    p_tex_application_method:
      name: Aanbrengmethode P-Tex
      description: Beschrijft hoe het P-Tex-materiaal op de ski- of snowboardbasis
        wordt aangebracht.
    p_tex_form:
      name: P-Tex vorm
      description: Identificeert de fysieke vorm waarin het reparatiemateriaal wordt
        geleverd.
    packability:
      name: Inpakbaarheid
      description: Geeft aan of en hoe het vest kan worden ingepakt of opgeborgen
        wanneer het niet in gebruik is.
    packaging_format:
      name: Verpakkingsformaat
      description: Hoe de snaren worden verpakt/verkocht (individuele enveloppen,
        bulk, enz.).
    packaging_material:
      name: Verpakkingsmateriaal
      description: Specificeert het primaire materiaal van de fles of container die
        het water bevat.
    packaging_type:
      name: Verpakkingstype
      description: Beschrijft hoe de bobblehead is verpakt voor verkoop/display/verzamelaarsopslag.
    packing_medium:
      name: Inmaakmedium
      description: Geeft de vloeistof of het medium aan (zoals water, diverse siropen,
        sap of pekel) dat wordt gebruikt om het fruit in de container te conserveren.
    pad_components_included:
      name: Inbegrepen beschermers
      description: Specificeert welke delen zijn inbegrepen wanneer het product als
        set wordt verkocht (bijv. alleen knie- en elleboogbeschermers, polsbeschermers).
    pad_controller_additional_control:
      name: Padcontroller extra bediening
      description: Typen extra fysieke bedieningselementen naast pads (knoppen, faders,
        buttons) die op de unit aanwezig zijn.
    pad_controller_performance_features:
      name: Padcontroller prestatiekenmerken
      description: Belangrijke prestatiegerelateerde padkenmerken voor spelen en expressieve
        bediening.
    pad_coverage_area:
      name: Pad dekkingsgebied
      description: Specificeert de lichaamszones die de geïntegreerde pads van de
        girdle beschermen.
    pad_material_or_technology:
      name: Pad materiaal of technologie
      description: Specificeert de eigen impactabsorberende technologie of het merkmateriaal
        dat in de pad wordt gebruikt.
    pad_mounting_or_holding_style:
      name: Pad montage- of draagstijl
      description: Geeft aan hoe de pad tijdens gebruik wordt vastgehouden, gedragen
        of geïnstalleerd.
    pad_saver_style:
      name: Pad saver stijl
      description: Geeft de fysieke stijl/het ontwerp aan van de pad saver die wordt
        gebruikt om de pads en boring te drogen.
    pad_shape:
      name: Vorm van pad
      description: Definieert de geometrische vorm of kromming van het slagoppervlak
        of de totale body van de pad (bijv. rond, gebogen, rechthoekig, plat), zodat
        gebruikers pads kunnen afstemmen op trainingsdoelen en slagtypen.
    pad_shell_type:
      name: Pad shell type
      description: Classificeert de constructiestijl van het buitenoppervlak van de
        pad (bijv. hard shell, soft shell, intern inzetstuk).
    pad_style:
      name: Pad stijl
      description: Specificeert het padtype of ontwerp dat bij de slee wordt geleverd.
    padding_layers:
      name: Vulmateriaal lagen
      description: Geeft het aantal foamlagen aan dat wordt gebruikt voor impactabsorptie.
    padding_level:
      name: Vulmatriaal niveau
      description: Geeft de hoeveelheid vulmateriaal aan die is geïntegreerd in de
        contactgebieden van de band/steun (nek/schouder/rug).
    padding_material:
      name: Vulmateriaal materiaal
      description: Specificeert de interne vulling of paddingsubstantie die impact
        absorbeert in tassen, schilden, mitts en dummies.
    paddle_ball_attachment_type:
      name: Paddle ball bevestigingstype
      description: Specificeert hoe de bal aan de paddle is bevestigd (of dat deze
        niet met een koord vastzit).
    paddle_leash_style:
      name: Paddle leash stijl
      description: Identificeert de stijl of het ontwerp van het paddle leash-koord.
    paddle_shape:
      name: Paddlevorm
      description: Definieert het algemene silhouet van de paddlekop/body (bijv. standaard,
        verlengd, brede body), dat invloed heeft op bereik, sweetspotmaat en wendbaarheid.
    paddleboard_intended_use:
      name: Paddleboard beoogd gebruik
      description: Classificeert het primaire ontwerpdoel of de activiteit waarvoor
        het board is gebouwd (bijv. Touring, Yoga, Racing).
    paint_application_method:
      name: Aanbrengmethode verf
      description: Primaire manier waarop het product bedoeld is om op de remklauw
        te worden aangebracht.
    paint_by_number_surface_type:
      name: Schilderen-op-nummer oppervlaktype
      description: Het oppervlak waarop het genummerde ontwerp is gedrukt (bijv. canvas,
        papier, houten paneel).
    paint_medium_application_method:
      name: Verfmedium toepassingsmethode
      description: Geeft de aanbevolen manier aan om het medium aan te brengen.
    paint_medium_intended_effect:
      name: Verfmedium beoogd effect
      description: Legt het primaire resultaat vast waarvoor het medium bedoeld is
        (textuur, glans, glaceren, vloei, enz.).
    paint_safe_bristles:
      name: Verfveilige borstelharen
      description: Geeft aan of de borstelharen op de markt worden gebracht als veilig
        voor gebruik op autolak/blanke lak (krasvrij).
    paintable_surface:
      name: Overschilderbaar oppervlak
      description: Geeft aan of de vorm van papier-maché klaar is om direct te beschilderen
        (bijv. gegrond/verzegeld) of voorbereiding vereist.
    paintball_caliber:
      name: Paintball kaliber
      description: Specificeert de diameter/het kaliber van paintballs of compatibele
        uitrusting.
    paintball_feed_system:
      name: Paintball toevoersysteem
      description: Definieert hoe paintballs in de marker worden gevoerd.
    paintball_fill_color:
      name: Paintball vulling kleur
      description: Geeft de kleur aan van de markeervulling binnenin, die kan verschillen
        van de buitenste shell en bepaalt welke kleur bij impact achterblijft.
    paintball_fill_type:
      name: Type paintballvulling
      description: Beschrijft een speciale formulering of eigenschap van de vulling
        (bijv. afwasbaar, glow-in-the-dark, poeder).
    paintball_grade:
      name: Painballklasse
      description: Beschrijft prestatieklasse of beoogd gebruiksniveau (bijv. instapniveau,
        veld, competitie, winter).
    paintball_mask_coverage_level:
      name: Paintballmasker dekkingsniveau
      description: Geeft aan welke delen van het gezicht of hoofd de paintballbril
        of het masker beschermt (alleen bril, half gezicht, volledig gezicht of volledig
        hoofd).
    paintball_tank_valve_type:
      name: Paintballtank ventieltype
      description: Beschrijft het ventiel of de regelaarinterface op de tank.
    painting_surface_priming_type:
      name: Schilderoppervlak gronderingstype
      description: Specificeert de grondering/coating op het schilderoppervlak (naast
        alleen gegrond/ongegrond), die invloed heeft op verfhechting en compatibiliteit
        met technieken.
    palette_knife_blade_edge_profile:
      name: Paletmes lemmet randprofiel
      description: Beschrijft het werkende randprofiel van het lemmet van een paletmes
        (niet de scherpte), dat invloed heeft op markeringen maken en mengen.
    palette_knife_flexibility:
      name: Paletmes flexibiliteit
      description: Beschrijft de stijfheid/flexibiliteit van het lemmet van het paletmes.
    palette_surface_finish:
      name: Palet oppervlakafwerking
      description: Beschrijft de afwerking/coating van het mengoppervlak die invloed
        heeft op vlekbestendigheid en eenvoudig schoonmaken.
    palm_padding_level:
      name: Mate van palmvulling
      description: Beschrijft de hoeveelheid demping in het handpalmgedeelte van de
        handschoen of grip pad.
    palm_padding_type:
      name: Type palmvulling
      description: Geeft het materiaal of de constructie aan die wordt gebruikt voor
        handpalmdemping (bijv. gel, foam, dubbellaags).
    palm_wax_blend_readiness:
      name: Palmwas mengselgereedheid
      description: Of het product pure palmwas is of een vooraf gemengde formule bedoeld
        voor specifieke prestatiekenmerken.
    palm_wax_form:
      name: Palmwas vorm
      description: Fysieke vorm waarin de palmwas wordt verkocht, die invloed heeft
        op het gemak van afmeten, de smeltsnelheid en de hantering.
    pan_flute_tuning_standard:
      name: Panfluit stemstandaard
      description: Referentiefrequentie die wordt gebruikt voor het stemmen (bijv.
        A4=440 Hz), belangrijk voor samenspel met andere instrumenten.
    pannier_configuration:
      name: Fietstasconfiguratie
      description: Geeft aan of het product wordt verkocht als enkele tas, verbonden
        dubbel paar of paar-/drievoudige set fietstassen.
    pannier_mounting_system:
      name: Montagesysteem fietstas
      description: Definieert het mechanisme dat wordt gebruikt om de fietstas aan
        de fietsdrager of het frame te bevestigen, voor compatibiliteit met verschillende
        setups.
    pant_cuff_style:
      name: Broekboord stijl
      description: Geeft de afwerking of versteloptie bij de enkel van de broek aan
        (bijv. elastische boorden, enkelritsen, open zoom).
    pant_leg_conversion_type:
      name: Broekspijp conversietype
      description: Geeft aan of en hoe de broekspijpen kunnen worden omgezet of aangepast
        voor verschillende lengtes.
    pantyhose_crotch_style:
      name: Panty kruis stijl
      description: Definieert het ontwerp van het kruisgedeelte, met onderscheid tussen
        standaard gesloten kruis, open kruis of versies met versterkt inzetstuk.
    papaya_variety:
      name: Papaja variëteit
      description: Specificeert de cultivar of marktvariëteit van een papaja (bijv.
        Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Papieren en magnetische pop formaat
      description: Specificeert of het product een traditionele papieren poppenset,
        een magnetische poppenset of een hybride formaat is.
    paper_color_family:
      name: Papier kleurfamilie
      description: Specificeert of de verpakking één kleur, gesorteerde kleuren of
        speciale mixen bevat (handig wanneer Color per-item is, maar verpakkingen
        gemengd zijn).
    paper_magnetic_doll_set_contents:
      name: Papieren & magnetische poppenset inhoud
      description: Geeft aan welke belangrijke onderdelen bij de set zijn inbegrepen.
    paper_opacity:
      name: Papier opaciteit
      description: Geeft aan hoe doorschijnend het papier is, van zeer transparant
        tot ondoorzichtig (handig voor overtrekken).
    paraglider_certification_rating:
      name: Certificeringsklasse paraglider
      description: Vermeldt de officiële luchtwaardigheidsclassificatie die aan een
        paraglider wing is toegekend (bijv. EN- of LTF-klassen).
    parasite_types_controlled:
      name: Parasiettypen bestreden
      description: Vermeldt de inwendige parasieten waartegen het product effectief
        is, zodat kopers ontwormingsprogramma’s kunnen afstemmen op specifieke besmettingen.
    parking_camera_mounting_location:
      name: Montagelocatie parkeercamera
      description: Waar op het voertuig de camera bedoeld is om te worden geïnstalleerd
        (bijv. kentekenplaatgedeelte, opbouwmontage aan de achterkant, verzonken montage).
    parking_camera_night_vision_technology:
      name: Parkeercamera nachtzichttechnologie
      description: De methode voor ondersteuning bij weinig licht die door de camera
        wordt gebruikt.
    parking_camera_orientation:
      name: Parkeercamera oriëntatie
      description: Of de camera is ontworpen voor zicht naar achteren (achteruitrijden),
        zicht naar voren of selecteerbaar/gespiegeld gebruik.
    parking_sensor_finish:
      name: Parkeersensor afwerking
      description: Geeft de oppervlakafwerking van het parkeersensorvlak/de sensorcap
        aan (bijv. overschilderbaar/gegrond, mat, glanzend) om bij de bumperesthetiek
        te passen.
    parking_sensor_type:
      name: Parkeersensor type
      description: Specificeert de detectietechnologie die door de parkeersensor wordt
        gebruikt (bijv. ultrasoon, elektromagnetisch, radar, optisch).
    parsley_root_variety:
      name: Peterseliewortel variëteit
      description: Specificeert de cultivar of variëteit van de peterseliewortel wanneer
        deze door de leverancier wordt verstrekt.
    parsnip_variety:
      name: Pastinaak variëteit
      description: Identificeert de specifieke variëteit of cultivar van pastinaak,
        zoals Hollow Crown of White Gem, zodat kopers kunnen selecteren op smaak,
        zoetheid of maatverschillen.
    part_condition:
      name: Onderdeel staat
      description: Geeft aan of het onderdeel nieuw, gebruikt, gereviseerd, enz. is.
    part_placement:
      name: Onderdeel plaatsing
      description: Geeft aan waar op de machine (bijv. stair climber of stepper) het
        onderdeel is geïnstalleerd, zoals links, rechts, voor of achter.
    partial_capo_covered_strings:
      name: Partial capo bedekte snaren
      description: Specificeert het snarenbereik dat de partial capo bedekt volgens
        standaard 6-snarige gitaarnummering (1 = hoge E, 6 = lage E).
    parting_style:
      name: Scheiding stijl
      description: Geeft aan hoe de pruik gescheiden is of kan worden (bijv. middenscheiding,
        zijscheiding, vrije scheiding), wat invloed heeft op de stylingflexibiliteit.
    party_favor_type:
      name: Feestbedankje type
      description: Specificeert wat voor soort feestbedankje het is (bijv. stickers,
        minitoys, bellenblaas), om browsen/filteren binnen feestbedankjes mogelijk
        te maken.
    party_game_format:
      name: Gezelschapsspel formaat
      description: Primair fysiek formaat van het gezelschapsspel.
    party_horn_mouthpiece_type:
      name: Feesttoeter mondstuktype
      description: Specificeert de constructie van het mondstuk, die invloed heeft
        op hygiëne en comfort.
    party_horn_style:
      name: Feesttoeter stijl
      description: Beschrijft de constructie-/gedragsstijl van de feesttoeter (hoe
        deze uitrolt of geluid produceert).
    passenger_car_type:
      name: Passagiersrijtuig type
      description: Identificeert het specifieke type passagiersrijtuig voor het model
        (bijv. coupérijtuig, slaaprijtuig), gebruikt voor browsen en set-samenstelling.
    passion_fruit_variety:
      name: Passievrucht variëteit
      description: Identificeert/specificeert de botanische of commerciële variëteit
        van de aangeboden passievrucht (bijv. Purple, Yellow, Granadilla).
    pasta_sauce_texture:
      name: Pastasaus textuur
      description: Beschrijft de consistentie van de saus (bijv. glad, grof, romig)
        om aan te sluiten bij voorkeuren voor mondgevoel van consumenten.
    pasta_sauce_variety:
      name: Pastasaus variëteit
      description: Classificeert pastasauzen op recept of stijl, zodat shoppers klassiekers
        zoals marinara of speciale sauzen zoals wodka of pesto snel kunnen vinden.
    pastry_crust_state:
      name: Deegbodem staat
      description: Beschrijft de voorbereidings- of bakstaat van de bodem bij aankoop.
    pastry_crust_style:
      name: Type deegkorst
      description: Identificeert de specifieke banketstijl of deegsoort van de bodem.
    pastry_filling_type:
      name: Banketvulling type
      description: Specificeert de primaire vulling aan de binnenkant van het gebak
        of de scone.
    patch_adhesion_method:
      name: Patch hechtingsmethode
      description: Specificeert hoe de patch aan de binnenband of band hecht (bijv.
        zelfklevend, vulkaniserend met cement of warmte-geactiveerd).
    patch_backing_material:
      name: Materiaal patch-achterkant
      description: Materiaal dat wordt gebruikt op de achterkant/basis van de patch
        (bijv. vilt, keperstof) die in contact komt met het item dat wordt versierd.
    patch_backing_type:
      name: Type patch-achterkant
      description: De backing die op de patch wordt gebruikt (bijv. heat-seal/strijkbaar,
        peel-and-stick lijm, hook & loop, geen).
    patch_base_material:
      name: Basismateriaal patch
      description: Primair textielmateriaal van de basis/achterkant van de motiefpatch
        (niet de decoratieve versieringen).
    patch_border_edge_finish:
      name: Patch rand-/kantafwerking
      description: De randafwerkingsmethode van de patch (bijv. merrow-/lockrand,
        lasergesneden rand), wat invloed heeft op duurzaamheid en uiterlijk.
    patch_placement_area:
      name: Patch plaatsingsgebied
      description: Gangbaar beoogd plaatsingsgebied voor de patch op kleding/accessoires.
    pathogen_removal_capability:
      name: Ziekteverwekker verwijdering capaciteit
      description: Specificeert welke klassen micro-organismen (bacteriën, protozoa,
        virussen) de pomp gecertificeerd kan verwijderen.
    pattern_sizing_system:
      name: Patroon maatsysteem
      description: Specificeert het regionale maatsysteem of de standaard die wordt
        gebruikt voor de maattabel van het patroon (bijv. VS, VK, EU).
    peak_style:
      name: Klep stijl
      description: Specificeert de stijl van het vizier of de klep op de helm, wat
        invloed heeft op dekking, uitstraling en disciplineregels.
    pear_variety:
      name: Peer variëteit
      description: Geeft de cultivar of variëteit van peren aan (bijv. Bartlett, Bosc,
        Conference), zodat klanten hun gewenste smaak, textuur en culinair gebruik
        kunnen kiezen.
    pearl_luster_grade:
      name: Parel glans klasse
      description: Kwalitatieve glans-/schitteringsklasse van het pareloppervlak.
    pearl_matching_level:
      name: Parel matchingniveau
      description: Geeft aan hoe goed parels binnen een partij of streng bij elkaar
        passen (bijv. op kleur, maat en glans).
    pearl_shape:
      name: Parel vorm
      description: De algemene vormcategorie van de parel.
    pearl_surface_condition:
      name: Parel oppervlakconditie
      description: Geeft de zichtbare oppervlakconditie van een parel aan, op basis
        van de aanwezigheid en ernst van oneffenheden of vlekken.
    pearl_treatment:
      name: Parel behandeling
      description: Geeft eventuele behandeling aan die op de parel is toegepast en
        invloed heeft op kleur/uiterlijk.
    pearl_type:
      name: Parel type
      description: Specificeert de parelvariëteit/herkomst (bijv. zoetwater, Akoya,
        Tahitian, South Sea) voor losse parels.
    peat_level:
      name: Turfgehalte
      description: Beschrijft de intensiteit van de turfrookinvloed in de whisky,
        van niet-geturfd tot sterk geturfd.
    pedal_and_cleat_system_compatibility:
      name: Pedaal- en schoenplaatjessysteem compatibiliteit
      description: Specificeert met welke pedaal- of schoenplaatjestandaarden de shim
        of wig is ontworpen om te werken, zodat klanten een product kiezen dat bij
        hun pedalen en schoenen past.
    pedal_configuration:
      name: Pedaalconfiguratie
      description: Geeft aan of de stoel één pedaal, gesplitste/onafhankelijke pedalen
        of een converteerbaar ontwerp heeft.
    pedal_mounting_style:
      name: Montagestijl pedaal
      description: Specificeert hoe het pedaal of de pedaalcover/-pad aan het voertuig
        wordt bevestigd (installatie-/bevestigingsmethode).
    pedal_set_components:
      name: Pedaalset onderdelen
      description: Specificeert welke pedalen in de set zijn inbegrepen.
    pedal_spindle_material:
      name: Pedaalas materiaal
      description: Materiaal dat wordt gebruikt voor de pedaalas/spindel, wat invloed
        heeft op sterkte, gewicht en corrosiebestendigheid.
    pedal_spindle_thread_size:
      name: Pedaalas schroefdraadmaat
      description: Specificeert de schroefdraadstandaard van de pedaalas die in de
        crankarm wordt geschroefd.
    pedal_type:
      name: Pedaaltype
      description: Beschrijft de stijl van de pedalen die bij de fiets worden geleverd,
        met vermelding van schoencompatibiliteit en rijstijl.
    pellet_accessory_type:
      name: Type pelletaccessoire
      description: Geeft het specifieke type pelletaccessoire aan, zodat vissers snel
        drills, banders of stops kunnen vinden op basis van hun rig-buildingbehoeften.
    pellet_grade:
      name: Pellet kwaliteit
      description: Geeft de productienauwkeurigheid of prestatieklasse van de airsoftpellets
        aan.
    pen_ink_color:
      name: Peninkt kleur
      description: Geeft de werkelijke inktkleur aan die door de pen wordt afgegeven,
        die kan verschillen van de buitenkleur van de pen.
    penalty_card_accessories_included:
      name: Penaltykaart meegeleverde accessoires
      description: Vermeldt de extra scheidsrechteraccessoires die bij de penaltykaarten
        worden meegeleverd, zoals wallet, scoreblok, potlood, munt, fluitje of pouch.
    penalty_card_colors_included:
      name: Inbegrepen kleuren strafschopkaarten
      description: Vermeldt de kleuren van de penaltykaarten in de productset.
    penalty_flag_throw_distance:
      name: Penaltyvlag werpafstand
      description: Ontwerpclassificatie die het beoogde werpbereik van de vlag aangeeft.
    pendant_cutter_safety_features:
      name: Hanger snijder veiligheidskenmerken
      description: Geeft geïntegreerde veiligheidselementen aan die onbedoelde snijwonden
        tijdens dragen/gebruik verminderen.
    pendant_cutter_wear_method:
      name: Hanger snijder draagmethode
      description: Specificeert hoe de hanger snijder bedoeld is om te worden gedragen
        of meegenomen.
    pepper_variety:
      name: Peper variëteit
      description: Specificeert de variëteit of soort peper die in het product wordt
        gebruikt, zodat klanten onderscheid kunnen maken tussen verschillende smaakprofielen
        en pittigheidsniveaus.
    percussion_case_style:
      name: Percussiekoffer stijl
      description: Classificeert de algemene stijl/constructie van de koffer (soft
        bag vs. harde/stijve koffer vs. hybride).
    percussion_instruments_included:
      name: Inbegrepen percussie-instrumenten
      description: Vermeldt de soorten percussie-instrumenten die zijn inbegrepen
        wanneer het product een multi-instrument speelgoedset is.
    percussion_mallet_handle_grip_style:
      name: Percussiestok handgreep gripstijl
      description: Geeft het type gripbehandeling op de handgreep aan (naast textuur),
        zoals onbehandeld hout, gelakt, rubberen grip of wrap.
    percussion_mallet_head_construction:
      name: Percussiestok kopconstructie
      description: Beschrijft de opbouw/constructiestijl van de stokkop (bijv. omwikkeld
        met garen, omwikkeld met vilt, rubber, onbewerkt hout), wat invloed heeft
        op klank en duurzaamheid.
    perfumery_base_carrier_type:
      name: Parfumerie basisdragertype
      description: Specificeert het drager-/oplosmiddelsysteem van een parfumeriebasis
        (waaruit de basis voornamelijk bestaat voor verdunning en prestaties).
    perfumery_base_intended_application:
      name: Parfumeriebasis beoogde toepassing
      description: Geeft het eindgebruiksformaat aan waarvoor de basis is ontworpen
        (bijv. fine fragrance spray vs. roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Parfumerie-ingrediënt drager/oplosmiddel
      description: Specificeert de fysieke vorm/staat waarin het parfumerie-ingrediënt
        wordt geleverd.
    perfumery_ingredient_form:
      name: Vorm parfumingrediënt
      description: Specificeert de fysieke vorm/toestand van het parfumingrediënt
        als Supply.
    perfumery_ingredient_type:
      name: Type parfumingrediënt
      description: Classificeert het parfumerie-ingrediënt op basis van wat het is
        binnen de parfumeriepraktijk (bijv. etherische olie, aromachemicalie).
    perfumery_ingredient_usage_note:
      name: Parfumerie-ingrediënt gebruiksnoot
      description: Geeft de typische rol in een geurstructuur aan (top, midden/hart,
        basis), waarbij wordt erkend dat materialen meerdere noten kunnen omvatten.
    perfumery_ingredients:
      name: Parfumerie-ingrediënten
      description: Vermeldt de soorten verbruikbare geurmaterialen die in de kit zijn
        inbegrepen (bijv. etherische oliën, geuroliën, alcoholbasis).
    perfumery_note_position:
      name: Parfumerienoot positie
      description: Geeft de typische rol van het ingrediënt in een geurstructuur aan
        (top/hart/basis).
    persimmon_variety:
      name: Kaki variëteit
      description: Geeft de cultivar of variëteit van de kaki aan, omdat verschillende
        variëteiten zoals Fuyu of Hachiya verschillen in textuur, smaak, wrangheid
        en culinair gebruik.
    personalization_type:
      name: Personalisatie type
      description: Specificeert of en hoe het product kan worden gepersonaliseerd
        voor een afspraak (bijv. monogram, naam/datum, foto-insert).
    phonics_focus:
      name: Letter-klankfocus
      description: Specificeert op welke letter-klankkoppelingen en woordleesvaardigheden
        het leesspeelgoed is gericht.
    physalis_variety:
      name: Physalis variëteit
      description: Geeft de specifieke botanische soort, cultivar of gangbare variëteit
        van de verkochte physalis aan.
    pi_ata_filler_type_included:
      name: Piñata meegeleverd vultype
      description: Als vulling is inbegrepen, het type inhoud dat wordt geleverd.
    pi_ata_hanging_method:
      name: Piñata ophangmethode
      description: Hoe de piñata is ontworpen om te worden opgehangen of ondersteund
        (lus, haak, koord inbegrepen, enz.).
    pi_ata_opening_type:
      name: Piñata openingstype
      description: Hoe de vulopening wordt geopend/gesloten (flap, klittenband, rits,
        voorgeseald, enz.).
    piccolo_key_system:
      name: Piccolo kleppensysteem
      description: Geeft het kleppensysteem/-ontwerp aan dat op de piccolo wordt gebruikt
        (meestal Boehm-systeem voor moderne piccolo’s).
    piccolo_keywork_features:
      name: Piccolo kleppenwerk kenmerken
      description: Specificeert opvallende kleppenwerkmechanismen en opties op de
        piccolo.
    pick_grip_aid:
      name: Plectrum grip hulp
      description: Geeft de primaire ingebouwde griphulp op het plectrum aan naast
        het algemene oppervlakgevoel/de textuur (bijv. gripgaten, reliëflogo, rubberen
        inlay).
    pickleball_construction_type:
      name: Pickleball-constructietype
      description: Productieconstructie van de bal, zoals naadloos uit één stuk of
        gelast tweedelig, wat invloed heeft op duurzaamheid en vluchtconsistentie.
    pickling_method:
      name: Inlegmethode
      description: Specificeert het conserveringsmedium of de techniek die wordt gebruikt
        voor het inmaken, zoals azijnpekel of lactofermentatie.
    pickup_and_preamp_configuration:
      name: Pickup- en voorversterkerconfiguratie
      description: Geeft aan of de altviool een ingebouwde pickup en/of actieve voorversterker
        heeft voor versterkte weergave of opname.
    pickup_configuration:
      name: Pickupconfiguratie
      description: Beschrijft de algemene pickupindeling van een elektrische gitaar
        met gangbare afkortingen (bijv. SSS, HSS, HH).
    pickup_cover_material:
      name: Materiaal pickup-cover
      description: Specificeert het primaire materiaal van de pickupkap (indien aanwezig),
        inclusief gangbare vergulde afwerkingen wanneer de fabrikant dit zo specificeert.
    pickup_cover_type:
      name: Pickup kap type
      description: Specificeert of een elektrische gitaarpickup een kap heeft en het
        materiaal/de stijl van de kap (bijv. metaal vs. kunststof).
    pickup_string_spacing:
      name: Pickup snaarafstand
      description: De pole piece-/snaarafstandstandaard waarvoor de pickup is gemaakt
        (bijv. Fender/F-spaced vs. Gibson/standard), wat invloed heeft op de uitlijning
        bij gitaren met tremolo.
    pie_crust_type:
      name: Taartbodem type
      description: Specificeert de stijl of het type bodem dat wordt gebruikt voor
        de pie of taart, zoals bladerdeeg, graham cracker of glutenvrije bodem.
    piece_configuration:
      name: Stuk configuratie
      description: Geeft aan uit hoeveel afzonderlijke stukken de keu, shaft of bridge
        bestaat, wat invloed heeft op draagbaarheid en speelstijl.
    pillow_form_size:
      name: Kussen vorm maat
      description: Gestandaardiseerde afgewerkte maataanduiding voor kussenvullingen/inserts
        (bijv. 18" × 18").
    pilot_helmet_communications_integration:
      name: Pilotenhelm communicatie-integratie
      description: Geeft aan of de helm luchtvaartcommunicatieonderdelen bevat of
        hiervoor is voorbereid.
    pilot_helmet_visor_configuration:
      name: Pilotenhelm vizier configuratie
      description: Specificeert de vizier-/gelaatsschermconfiguratie die bij de pilotenhelm
        is inbegrepen.
    pin_attachment_type:
      name: Type pinbevestiging
      description: Specificeert het speldachterkant-/sluitingsmechanisme dat wordt
        gebruikt om de speld aan kleding of een oppervlak te bevestigen (bijv. vlindersluiting,
        magnetische achterkant).
    pin_backing_type:
      name: Type pinachterkant
      description: Specificeert het bevestigings-/achterkantmechanisme dat wordt gebruikt
        om de speld aan kleding of accessoires te bevestigen.
    pin_cushion_attachment_style:
      name: Speldenkussen bevestigingsstijl
      description: Hoe het speldenkussen wordt gedragen, bevestigd of gepositioneerd
        tijdens gebruik.
    pin_cushion_features:
      name: Speldenkussen kenmerken
      description: Functionele kenmerken naast eenvoudig spelden vasthouden.
    pin_face_customization_method:
      name: Speld voorkant personalisatiemethode
      description: Specificeert hoe het ontwerp aan de voorkant wordt geproduceerd
        (bijv. hard emaille, soft emaille, bedrukt).
    pin_type:
      name: Speld type
      description: Specificeert de productstijl of het formaat van de speld voor sportfandom-verzamelobjecten.
    ping_pong_certification:
      name: Tafeltennis certificering
      description: Verklaart de officiële norm of het goedkeuringsniveau van de regelgevende
        instantie voor het product.
    ping_pong_competition_certification:
      name: Tafeltennis wedstrijdbal certificering
      description: Geeft de officiële certificeringsstatus van de tafeltennisbal voor
        gereglementeerd spel aan (bijv. ITTF-goedgekeurd).
    ping_pong_paddle_handle_style:
      name: Tafeltennisbatje handvat stijl
      description: Definieert de vorm/stijl van het handvat van het batje, wat invloed
        heeft op gripcomfort en speeltechniek.
    ping_pong_robot_accessory_type:
      name: Tafeltennisrobot accessoiretype
      description: Geeft het functionele subtype van het accessoire aan, zodat klanten
        snel resultaten kunnen verfijnen (bijv. netten vs. voedingsadapters).
    ping_pong_rubber_surface_type:
      name: Tafeltennisrubber oppervlaktype
      description: Geeft de stijl/textuur aan van het rubberoppervlak dat op het batje
        is aangebracht, wat invloed heeft op spin- en snelheidskenmerken.
    ping_pong_rubber_type:
      name: Tafeltennisrubber type
      description: Specificeert de oppervlakconstructiestijl van een tafeltennisrubbervel,
        wat invloed heeft op de speelkenmerken.
    ping_pong_table_type:
      name: Type pingpongtafel
      description: Classificeert de algemene stijl of het formaat van de tafel voor
        eenvoudigere vergelijking (bijv. wedstrijd, opzetblad, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Pijpinstrument stemming/geluidsproductiemethode
      description: Specificeert hoe het instrument geluid produceert (luchtstroommechanisme),
        zodat panfluiten, rietpijpen en orgelpijpfamilies in filters kunnen worden
        onderscheiden.
    piston_application_type:
      name: Zuiger toepassingstype
      description: Beoogde functie/toepassing van de zuiger (vervanging vs. performance/racing
        vs. heavy-duty).
    piston_crown_dish_style:
      name: Zuigerkroon-/komstijl
      description: Vorm van de zuigerkroon die invloed heeft op het volume van de
        verbrandingskamer en de compressie (bijv. vlak, top, koepel, kom).
    piston_pin_retention_type:
      name: Zuigerpen borgingstype
      description: Specificeert hoe de pols-/zuigerpen in de zuiger-/drijfstangconstructie
        wordt geborgd.
    pit_configuration:
      name: Pitconfiguratie
      description: Definieert het structurele formaat van de landingszone (één stuk
        vs. meerdere modules) en, bij uitbreiding, het aantal geleverde secties of
        modules.
    pit_cover_type:
      name: Type pitafdekking
      description: Specificeert het beschermende oppervlak of doek dat bij de pit
        wordt geleverd, wat invloed heeft op spikebestendigheid, weersbescherming
        en voorkeur van de atleet.
    pitahaya_flesh_color:
      name: Pitahaya vruchtvlees kleur
      description: Specificeert de kleur van het vruchtvlees van de pitahaya (dragon
        fruit) (bijv. wit, rood, magenta), een belangrijk onderscheid dat invloed
        heeft op smaak, uiterlijk en waargenomen voedingswaarde.
    pitch_mat_coverage_length:
      name: Pitchingmat dekkingslengte
      description: Classificeert de cricket-pitchingmat op basis van het deel van
        de wicket dat deze bedekt (bijv. volledige of halve pitch).
    pitch_range:
      name: Toonhoogtebereik
      description: Beschrijft het waargenomen toonhoogtebereik/de helderheid van het
        shakergeluid.
    pitch_standard:
      name: Stemstandaard
      description: Specificeert de stemstandaard (referentiestemming) waarvoor de
        blokfluit is gebouwd (bijv. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Werpplaat maataanduiding
      description: Geeft de standaard veldmaatclassificatie voor de werpplaat aan,
        zodat selectie eenvoudiger wordt zonder dat klanten exacte afmetingen hoeven
        te kennen.
    pitching_screen_style:
      name: Werpscherm stijl
      description: Definieert het structurele ontwerp van het scherm, zodat klanten
        snel de juiste beschermende indeling voor hun trainingsscenario kunnen kiezen.
    pitching_target_design:
      name: Pitching target ontwerp
      description: Classificeert de algemene stijl of configuratie van de pitching
        target.
    pitching_wheel_count:
      name: Werpmachine wielaantal
      description: Geeft het aantal aandrijfwielen aan dat een werpmachine gebruikt.
    pivot_adjustability:
      name: Scharnierpunt verstelbaarheid
      description: Geeft aan of de schaar een verstelbare scharnierschroef heeft om
        de snijspanning af te stellen.
    pivot_piece_type:
      name: Scharnierstuk type
      description: Maakt onderscheid tussen verschillende geleverde vormen van scharnierinterfaces,
        zoals traditionele cups of buisstijl.
    place_card_holder_closure_mechanism:
      name: Plaatskaart houder sluitmechanisme
      description: Specificeert hoe de houder de kaart vastklemt of vastzet.
    place_card_orientation:
      name: Plaatskaart oriëntatie
      description: Specificeert de oriëntatie van de plaatskaart wanneer deze wordt
        gebruikt/weergegeven.
    place_card_printing_status:
      name: Plaatskaart drukstatus
      description: Geeft aan of de plaatskaart blanco is voor handschrift/bedrukking,
        voorgedrukt is (namen niet gepersonaliseerd) of gepersonaliseerd/op maat bedrukt
        is.
    placket_type:
      name: Sluitingstype
      description: Specificeert de stijl van de vooropening van de polo, inclusief
        aantal knopen of alternatieve sluitingen.
    planetarium_content_theme:
      name: Planetarium content thema
      description: Primaire content die door de planetariumprojector wordt weergegeven.
    planetarium_projection_content_format:
      name: Planetarium projectiecontent formaat
      description: Specificeert het projectiecontentmechanisme dat het planetarium
        gebruikt (fysieke discs/dia’s vs. digitaal/LED-effect).
    plant_fiber_type:
      name: Plantaardig vezeltype
      description: Specifiek vezeltype van plantaardige oorsprong wanneer het type
        stapelvezelbron Plant is.
    plaster_gauze_finish:
      name: Gipsgaas afwerking
      description: Neiging van de uiteindelijke oppervlakafwerking na aanbrengen en
        gladstrijken.
    plaster_gauze_grade:
      name: Gipsgaas kwaliteit
      description: Beoogde gebruikskwaliteit van het gipsgaas (bijv. hobby/student
        vs. professioneel).
    plaster_gauze_weave_density:
      name: Gipsgaas weefdichtheid
      description: Relatieve openheid/dichtheid van het gaasweefsel, wat invloed heeft
        op sterkte en gipsopname.
    plastic_canvas_finish:
      name: Plastic canvas afwerking
      description: Oppervlak-/afwerkingsbehandeling van de plastic-canvasrol.
    plastic_canvas_sheet_finish:
      name: Afwerking plastic canvasvel
      description: Oppervlakte-/randafwerking van het plastic canvas-vel.
    plastic_canvas_transparency:
      name: Plastic canvas transparantie
      description: Hoe transparant/dekkend het plastic canvas is.
    plate_bottom_design:
      name: Plaat bodemontwerp
      description: Beschrijft de constructie van de onderkant van de plaat, wat invloed
        heeft op grip, stabiliteit en veiligheid op verschillende speeloppervlakken.
    plate_compatibility_standard:
      name: Standaard plaatcompatibiliteit
      description: Geeft aan voor welke gewichtsschijfstandaard de halterstang is
        ontworpen (bijv. Olympic 50 mm, Standard 25 mm).
    plate_installation_type:
      name: Plaat montage type
      description: Specificeert hoe de plaat op het veld wordt bevestigd of gepositioneerd
        (bijv. in de grond, gespiked, neerlegbaar), zodat kopers kunnen kiezen tussen
        permanente en draagbare opties.
    plate_size_category:
      name: Categorie plaatformaat
      description: Classificeert de plaat op basis van speelniveau of reglementaire
        norm, zodat kopers snel competitie geschikte uitrusting kunnen vinden.
    play_dough_putty_kit_contents:
      name: Speelklei- en puttyset inhoud
      description: Geeft de belangrijkste meegeleverde onderdelen aan naast het materiaal
        zelf (bijv. gereedschap, vormen, extruder, opberging).
    play_dough_tool_set_items_included:
      name: Speelklei gereedschapsset meegeleverde items
      description: Geeft de soorten gereedschappen en accessoires aan die in een speelklei
        gereedschapsset zijn inbegrepen (bijv. rollers, uitstekers, vormen).
    play_environment_suitability:
      name: Speelomgeving geschiktheid
      description: Geeft de beoogde speelomgeving voor de set aan (bijv. binnen, buiten,
        water).
    play_food_features:
      name: Speelgoedeten kenmerken
      description: Speciale functionele of realistische kenmerken van het speelgoedeten.
    play_food_items_included:
      name: Speelgoedeten meegeleverde items
      description: Geeft de soorten speelgoedeten aan die bij de keukenspeelset zijn
        inbegrepen.
    play_food_size_scale:
      name: Speelgoedeten maatschaal
      description: Geeft de geschatte maatschaal van het speelgoedeten aan voor compatibiliteit
        met speelkeukens, poppen en speelsets.
    play_money_set_components_included:
      name: Inbegrepen onderdelen speelgoedgeldset
      description: Specificeert welke componenttypen zijn inbegrepen in de speelgeld-/bankierset.
    play_pattern:
      name: Speelpatroon
      description: De primaire manier waarop het speelgoed bedoeld is om te worden
        gebruikt (bijv. friemelen/stressverlichting, bureausculptuur/kunst, constructie/bouwen
        of puzzels).
    play_sprinkler_mounting_type:
      name: Speelsproeier montagetype
      description: Hoe de speelsproeier tijdens gebruik wordt geplaatst/vastgezet.
    play_vehicle_lights_and_sounds:
      name: Speelvoertuig licht en geluid
      description: Geeft aan of het speelgoedvoertuig elektronische speeleffecten
        bevat, zoals licht en/of geluid.
    play_vehicle_scale:
      name: Speelvoertuig schaal
      description: Geeft de schaalverhouding van het speelgoedvoertuig aan (vaak gebruikt
        voor diecast- en modelachtige speelgoedvoertuigen).
    player_size_category:
      name: Categorie spelersgrootte
      description: Definieert de beoogde spelermaat-/leeftijdscategorie waarvoor de
        catcheruitrustingsset geschikt is (bijv. Tee Ball, Jeugd, Gemiddeld, Volwassen).
    player_size_range:
      name: Speler maatbereik
      description: Specificeert het beoogde maatbereik voor gebruikers van de band/ondersteuning
        (bijv. kind, volwassene, universeel).
    playing_environment:
      name: Speelomgeving
      description: Specificeert het primaire speeloppervlak of de context waarvoor
        de hockeybal is ontworpen.
    playing_method:
      name: Speelmethode
      description: Primaire manier waarop het instrument bedoeld is om te worden bespeeld/geactiveerd.
    playing_surface_material:
      name: Materiaal speeloppervlak
      description: Geeft het materiaal aan van het voorste speeloppervlak (tapa) van
        de cajon, wat sterk van invloed is op klank en gevoel.
    playing_surface_type:
      name: Speeloppervlak type
      description: Beschrijft de constructie/het gevoel van het speeloppervlak van
        de oefenpad.
    playset_activities_included:
      name: Speelset activiteiten inbegrepen
      description: Geeft de belangrijkste speelactiviteiten/onderdelen aan die in
        de schommelset/speelset zijn ingebouwd, zodat klanten kunnen filteren op wat
        kinderen op de structuur kunnen doen.
    playset_installation_type:
      name: Installatietype speeltoestel
      description: Specificeert hoe de schommelset/speelset wordt geïnstalleerd of
        vastgezet.
    playset_items_included:
      name: Inbegrepen speelgoedartikelen
      description: Geeft de soorten fantasiespelitems aan die in de picknickspeelset
        zijn inbegrepen (eten, servies, deken, mand, enz.).
    pliers_jaw_style:
      name: Tang bekstijl
      description: Beschrijft de primaire bekconfiguratie of functionele stijl van
        de tang.
    plum_variety:
      name: Pruim variëteit
      description: Geeft de specifieke cultivar of variëteit van de pruim aan, zodat
        klanten kunnen kiezen op basis van smaak, kleur en beoogd culinair gebruik.
    plumcot_variety:
      name: Type pruim-abrikoos
      description: Geeft de specifieke cultivar of commerciële variëteit van de plumcot
        aan (bijv. Flavor King, Dapple Dandy), wat invloed kan hebben op smaak, kleur
        en seizoensgebondenheid.
    plunger_mute_handle_type:
      name: Plunger mute handgreeptype
      description: Specificeert de handgreep- of gripstijl die wordt gebruikt om een
        plunger mute vast te houden en te bewegen voor wa-wa-effecten.
    pocket_closure_type:
      name: Zaksluiting type
      description: Definieert hoe elke zak wordt afgesloten, zodat gebruikers broeken
        kunnen vinden met veilige opbergruimte tijdens activiteiten.
    pocket_knife_opening_mechanism:
      name: Zakmes openingsmechanisme
      description: Hoe het lemmet wordt uitgeklapt/geopend (handmatige nagelgleuf,
        duimknop, flipper, ondersteund, automatisch, enz.).
    pocket_style:
      name: Zak stijl
      description: Specificeert de belangrijkste zakconstructie op de broek.
    pocket_type:
      name: Zaktype
      description: Geeft de stijl of aanwezigheid van zakken op het kledingstuk aan.
    pod_retention_system:
      name: Pod retentiesysteem
      description: Beschrijft hoe paintballpods op hun plaats worden gehouden en uit
        het harnas of pack worden gehaald.
    pogo_stick_footrest_type:
      name: Pogo stick voetsteuntype
      description: Beschrijft het voetplatform-/pegontwerp waarop men op de pogo stick
        staat.
    pogo_stick_suspension_type:
      name: Pogo stick veringstype
      description: Specificeert het reboundmechanisme van de pogo stick, wat invloed
        heeft op gevoel, duurzaamheid en onderhoud.
    poi_handle_type:
      name: Type poi-handvat
      description: Specificeert de stijl van de handgreep/grip/bevestiging die wordt
        gebruikt om de poi vast te houden.
    poi_light_source:
      name: Poi lichtbron
      description: Specificeert bij verlichte poi de verlichtingstechnologie.
    poi_tether_type:
      name: Poi tether type
      description: Geeft het type tether aan dat de poi-kop verbindt met de handgreep,
        knop of polslus (bijv. koord, touw, ketting).
    poi_type:
      name: Poi type
      description: Specificeert de primaire constructie/het primaire gebruikstype
        van de poi (bijv. oefening, LED, vuur).
    point_type:
      name: Punt type
      description: Vorm/stijl van de punt die op de borduurnaald wordt gebruikt.
    pointe_shoe_shank_length:
      name: Lengte van zool van spitzen
      description: Deel van de schoenlengte dat door de zoolversteviging wordt ondersteund,
        zoals volledige of 3/4-lengte.
    pointe_shoe_shank_strength:
      name: Spitzen schoen zoolversteviging sterkte
      description: Stijfheidsniveau van de zoolversteviging van een spitzenschoen,
        wat invloed heeft op ondersteuning en inlooptijd.
    poker_accessory_storage_included:
      name: Pokeraccessoire meegeleverde opslag
      description: Geeft aan voor welke extra pokeritems het accessoire speciale opbergruimte
        biedt.
    poker_chip_tray_rack_configuration:
      name: Pokerchip tray-/rackconfiguratie
      description: Beschrijft de interne indelingsstijl van een chiptray/-rack (rijen
        en capaciteit per rij).
    pole_anchoring_method:
      name: Paalverankeringsmethode
      description: Definieert hoe de paal aan de grond of het speeloppervlak wordt
        bevestigd.
    pole_basket_type:
      name: Type skistokteller
      description: Classificeert de stijl of maat van de teller die dicht bij de punt
        van de skistok is bevestigd en de beoogde sneeuwcondities aangeeft.
    pole_connection_system:
      name: Paal verbindingssysteem
      description: Geeft het mechanisme aan waarmee paaldelen met elkaar worden verbonden,
        zoals shock-corded, met schroefdraad of naafsystemen, zodat gebruikers montagesnelheid
        en compatibiliteit kunnen beoordelen.
    pole_system_type:
      name: Type stoksysteem
      description: Beschrijft het structurele ondersteuningssysteem of de opzetstijl
        die door de tent wordt gebruikt (bijv. aluminium stokken, opblaasbare luchtbuizen,
        trekking-pole pitch).
    police_equipment_fitment:
      name: Politie-uitrusting pasvorm
      description: Specificeert voor welke wetshandhavingsuitrusting het voertuig
        is geconfigureerd of voorbereid.
    police_vehicle_equipment_package:
      name: Politievoertuig uitrustingspakket
      description: Geeft de politiespecifieke ombouw/uitrusting aan die bij het voertuig
        is inbegrepen zoals verkocht.
    police_vehicle_light_siren_equipment:
      name: Politievoertuig licht-/sirene-uitrusting
      description: Specificeert welke noodwaarschuwingsapparaten op de politieauto
        zijn geïnstalleerd.
    police_vehicle_upfit_level:
      name: Politievoertuig ombouwniveau
