    saxophone_reed_cut:
      name: Saxofoon riet snit
      description: Specificeert de snit/stijl van het saxofoonriet, wat invloed heeft
        op respons, toon en gevoel.
    saxophone_reed_material_type:
      name: Saxofoon riet materiaaltype
      description: Specificeert de materiaalcategorie van het riet (bijv. riet vs
        synthetisch).
    saxophone_reed_strength_scale:
      name: Saxofoon riet sterkteschaal
      description: Specificeert het nummeringssysteem/de schaal voor de sterkte van
        het riet (vaak merkafhankelijk), voor een duidelijkere vergelijking tussen
        listings.
    saxophone_small_part_thread_size:
      name: Saxofoon klein onderdeel schroefdraadmaat
      description: Specificeert de schroefdraadmaat/-standaard voor kleine saxofoononderdelen
