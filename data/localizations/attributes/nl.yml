    sculpting_clay_base_type:
      name: Modelleerklei basistype
      description: Beschrijft de onderliggende formulering/basis van de modelleerklei.
    seafood_cut:
      name: Zeevruchten snijvorm
      description: Beschrijft de fysieke snijvorm of presentatie van het zeevruchtenproduct
        (bijv. heel, filet, steak).
    seafood_processing_method:
      name: Verwerkingsmethode zeevruchten
      description: Specificeert de primaire bewaar- of verwerkingstechniek die op
