    greens_preparation_state:
      name: Bladgroenten bereidingsstaat
      description: Beschrijft hoe de bladgroenten zijn verwerkt of verpakt (bijv.
        voorgewassen, gesneden, klaar om te eten).
    grenade_effect_type:
      name: Granaat effecttype
      description: Geeft het primaire functionele effect aan dat de paintballgranaat
        produceert zodra deze wordt geactiveerd (bijv. rook, verf, flitsknal).
    grid_unit:
      name: Rastereenheid
      description: Het primaire meetsysteem dat op de mat is gedrukt (als er een raster/schaal
        aanwezig is).
    grille_emblem_provision:
      name: Grille embleemvoorziening
      description: Specificeert of en hoe de grille een OEM-embleem/badge ondersteunt.
    grille_mounting_method:
      name: Montagemethode grille
      description: Specificeert hoe de grille op het voertuig wordt gemonteerd (bijv.
        directe vervanging versus inzet/overlay; boutbevestiging versus clip-/klikbevestiging;
        boren vereist versus boren niet nodig).
    grille_style:
      name: Stijl grille
      description: Specificeert de visuele/ontwerpstijl van de voertuiggrille.
    grip_chalk_form:
      name: Gripkrijt vorm
      description: Geeft de fysieke vorm aan van het krijt dat bij de zak wordt geleverd
        of ermee wordt gebruikt.
    grip_coverage:
      name: Gripdekking
      description: Geeft de aanwezigheid en locatie aan van siliconen of rubberen
        gripelementen op de sok.
    grip_design:
      name: Gripontwerp
      description: Specificeert de handgreep- of gatconfiguratie van de schijf voor
        gemakkelijker dragen en meer veelzijdigheid tijdens oefeningen.
    grip_enhancer_effect:
      name: Gripverbeteraar effect
      description: Beschrijft de primaire prestatie-eigenschap die het product biedt
        (bijv. vochtabsorptie of een kleverige harsafwerking).
    grip_enhancer_form:
      name: Fysieke vorm gripversterker
      description: Geeft de fysieke vorm of het formaat van het gripverbeteraarproduct
        aan, zodat sporters de juiste toepassingsmethode kunnen kiezen.
    grip_features:
      name: Gripkenmerken
      description: Geeft ingebouwde grip-/handgreepkenmerken aan die bedoeld zijn
        om houvast, comfort of controle tijdens het spelen te verbeteren.
    grip_material:
      name: Gripmateriaal
      description: Geeft het materiaal aan dat wordt gebruikt voor het gripoppervlak
        van de broek.
    grip_shape:
      name: Gripvorm
      description: Beschrijft de doorsnedevorm of stijl van de grip, vooral relevant
        voor puttergrips.
    grip_surface_type:
      name: Type grip-oppervlak
      description: Beschrijft het profiel-/tractieoppervlakontwerp van het pedaalvlak,
        wat invloed heeft op grip en gevoel.
    grip_tackiness_level:
      name: Grip kleefniveau
      description: Beoordeelt hoe kleverig of plakkerig het gripoppervlak is, zodat
        spelers kunnen kiezen tussen een droog gevoel en ultrakleverige controle.
    grip_tape_form:
      name: Vorm griptape
      description: Geeft de leveringsvorm aan van het griptapeproduct (bijv. vel,
        rol, sprayset).
    grip_wax_form:
      name: Gripwax vorm
      description: Classificeert de fysieke vorm waarin de gripwax wordt verkocht.
    gripper_coverage:
      name: Type gripper-dekking
      description: Specificeert de stijl van de antislipgripper op de antislipschoen,
        met aanduiding van oppervlaktedekking en verwijderbaarheid.
    grommet_application_material:
      name: Zeilring toepassingsmateriaal
      description: Primair materiaal/de primaire materialen waarin de zeilringen moeten
        worden aangebracht (bijv. stof, leer, vinyl, dekzeil/canvas).
    grommet_duty_rating:
      name: Zeilring belastingsklasse
      description: Geeft de beoogde sterkte-/gebruiksklasse van de zeilring aan.
    grommet_style:
      name: Zeilring stijl
      description: Constructiestijl van de zeilringset (hoe deze wordt gemonteerd).
    grooming_glove_texture_type:
      name: Verzorgingshandschoen textuurtype
      description: Geeft de primaire oppervlaktetextuur aan die voor de verzorging
        wordt gebruikt, met aanduiding van het beoogde doel, zoals schrobben, polijsten
        of wassen.
    groove_orientation:
      name: Groeforiëntatie
      description: Beschrijft de richting/lay-out van groeven of ribbels op het instrument.
    groove_sampler_onboard_effects:
      name: Groove-sampler ingebouwde effecten
      description: Geeft de categorieën ingebouwde effectverwerking aan die beschikbaar
        zijn op de groove-sampler (insert/master), zoals galm, delay, compressie,
        distortion, EQ en filtering.
    groove_sampler_storage_expansion_type:
      name: Groove-sampler opslaguitbreidingstype
      description: Specificeert de verwijderbare/uitbreidbare opslagopties die door
        de groove-sampler worden ondersteund.
    ground_attachment_method:
      name: Grondbevestigingsmethode
      description: Beschrijft hoe de passing arc aan het speeloppervlak wordt bevestigd,
        wat invloed heeft op stabiliteit en compatibiliteit met het oppervlak.
    groupset_components_included:
      name: Inbegrepen groepsetonderdelen
      description: Geeft de specifieke aandrijfonderdelen aan die in de groepset zijn
        inbegrepen, zodat klanten de inhoud van de bundel begrijpen.
    gt_racing_class:
      name: GT-raceklasse
      description: Specificeert de GT-categorie/-klasse waarvoor de auto is gebouwd
        of gehomologeerd.
    guard_construction_type:
      name: Type beschermkap
      description: Of de beschermer een hardshellbeschermer, zachte beschermingsinzet
        of hoes-/bandontwerp heeft.
    guard_size_measurement_basis:
      name: Beschermer maat meetbasis
      description: Op welke meting de maatvoering is gebaseerd (bijv. elleboogomtrek,
        polsomtrek, onderarmomtrek).
    guard_style:
      name: Beschermer stijl
      description: Classificeert de constructie of het type schaatsijzerbeschermer
        om shoppers snel onderscheid te laten maken tussen harde loopbeschermers,
        soft soakers, veerbelaste beschermers en andere ontwerpen.
    guava_flesh_color:
      name: Guave vruchtvlees kleur
      description: Geeft de interne vruchtvleeskleur van de guave aan.
    guava_variety:
      name: Guave variëteit
      description: Geeft de specifieke cultivar of marktvariëteit van de verkochte
        guave aan (bijv. Apple guava, Mexican cream, Thai, Pink, Seedless, White).
    guide_material:
      name: Geleideogenmateriaal
      description: Materiaal dat wordt gebruikt voor de geleideogen of inzetstukken
        van de hengel.
    guide_type:
      name: Geleideoog type
      description: Specificeert de stijl van geleideogen die op een hengel zijn aangebracht,
        zoals single foot, roller of snake.
    guideline_markings:
      name: Geleidelijn markeringen
      description: Type visuele uitlijningsmarkeringen die op het oppervlak van de
        pitchingmat zijn gedrukt of ingelegd om te helpen bij pitchingoefeningen.
    guiro_scraper_material:
      name: Guiro schraper materiaal
      description: Materiaal van de meegeleverde of aanbevolen schraper/striker die
        met de guiro wordt gebruikt.
    guiro_surface_style:
      name: Guiro oppervlak stijl
      description: Beschrijft het patroon of de geometrie van het speeloppervlak dat
        wordt geschraapt om geluid te produceren.
    guitar_body_finish_type:
      name: Gitaarbody afwerking type
      description: Specificeert de afwerking die op de gitaarbody wordt gebruikt.
    guitar_bridge_system_type:
      name: Gitaar brug systeemtype
      description: Ontwerpfamilie van het brug-/staartstuksysteem voor compatibiliteit
        en browsen.
    guitar_case_style:
      name: Gitaarhoes stijl
      description: Specificeert de algemene beschermings-/constructiestijl van de
        gitaarkoffer of gigbag.
    guitar_humidifier_placement:
      name: Gitaar luchtbevochtiger plaatsing
      description: Specificeert waar de luchtbevochtiger bedoeld is om te worden gebruikt/geplaatst
        ten opzichte van het instrument of de omgeving.
    guitar_pedal_i_o_configuration:
      name: Gitaarpedaal I/O-configuratie
      description: Geeft aan of het pedaal mono- of stereo-invoer-/uitvoerroutering
        ondersteunt.
    guitar_pedal_output_connector_type:
      name: Gitaarpedaal uitgangsconnector type
      description: Specificeert het type audio-uitgangsconnector dat door het pedaal
        wordt gebruikt.
    guitar_slide_finish:
      name: Gitaarslide afwerking
      description: Oppervlakafwerking van de slide die het gevoel en de wrijving tegen
        de snaren beïnvloedt.
    guitar_slide_style:
      name: Gitaarslidestijl
      description: Specificeert de vormfactor van de gitaarslide of tonebar en hoe
        deze wordt gedragen/gebruikt.
    guitar_stand_type:
      name: Gitaarstandaard type
      description: Specificeert de primaire vormfactor van de gitaarstandaard (hoe
        deze de gitaar ondersteunt/opbergt).
    guitar_strap_attachment_type:
      name: Gitaarband bevestiging type
      description: Specificeert hoe de band aan de gitaar wordt bevestigd (of aan
        strap buttons), inclusief of deze traditionele uiteinden of quick-release-systemen
        gebruikt.
    guitar_strap_end_material:
      name: Gitaarband uiteinde materiaal
      description: Materiaal dat wordt gebruikt aan de uiteinden/lipjes van de band
        (de onderdelen die aan strap buttons of strap-lock-systemen worden bevestigd).
    guitar_strap_features:
      name: Kenmerken gitaarband
      description: Opvallende functionele kenmerken van de gitaarband naast basismaat/-materiaal
        (multi-select).
    guitar_string_coating:
      name: Gitaarsnaar coating
      description: Geeft aan of de snaren een beschermende coating hebben en, indien
        van toepassing, de coatingstijl.
    guitar_string_gauge_type:
      name: Gitaarsnaar dikte type
      description: De verkochte diktecategorie van een akoestische gitaarsnarenset
        (bijv. extra light, light, medium). Vaak benaderd op basis van de dikte van
        de hoge E-snaar; exacte diktebereiken kunnen per fabrikant verschillen.
    guitar_string_set_gauge_category:
      name: Gitaarsnarenset dikte categorie
      description: Gangbare marketingfamilies voor diktes van een gitaarsnarenset
        (meestal afgeleid van de hoge E-/1e snaar).
    guitar_string_winding_type:
      name: Gitaarsnaar wikkeling type
      description: Specificeert de buitenste wikkelstijl van omwonden snaren in de
        set.
    guitar_tuning_peg_button_shape:
      name: Gitaar stemmechaniek knop vorm
      description: De vorm/stijl van de stemsleutel/knop.
    guitar_tuning_peg_configuration:
      name: Gitaar stemmechaniek configuratie
      description: De indeling van de stemmechaniekset op de kop.
    guitar_tuning_peg_mounting_style:
      name: Montagestijl gitaarstemmechaniek
      description: Hoe een stemmechaniek op de kop wordt gemonteerd (type bus en anti-rotatiemethode).
    guitar_tuning_peg_shaft_type:
      name: Gitaar stemmechaniek as type
      description: Of de snaarpen massief of gespleten is, en hoe de snaar wordt vastgezet.
    guitar_tuning_peg_style:
      name: Stijl gitaarstemmechaniek
      description: De fysieke stemmechaniek-/stempenstijl en montagevorm die op de
        kop van een instrument wordt gebruikt (bijv. gesloten mechaniek versus open
        mechaniek, locking, split-post).
    gum_condition:
      name: Gom conditie
      description: Conditie/status van de gom op de achterkant van de postzegel (bijv.
        nooit gescharnierd, gescharnierd, zonder gom).
    gun_action_type:
      name: Type vuurwapenmechanisme
      description: Mechanisch actietype dat wordt gebruikt om te laden/vuren (bijv.
        grendelactie, hefboomactie).
    gun_operational_status:
      name: Vuurwapen operationele status
      description: Geeft aan of het verzamelwapen gedeactiveerd/niet-vurend is (en
        hoe het wordt gepresenteerd).
    gun_type:
      name: Vuurwapen type
      description: Geeft de algemene vormfactor van het antieke vuurwapen aan.
    gusset_material:
      name: Kruisvoering
      description: Specificeert het materiaal dat wordt gebruikt in de kruis-/inzetvoering,
        wat invloed heeft op ademend vermogen, hygiëne en comfort.
    gymnastics_discipline:
      name: Gymnastiek discipline
      description: Specificeert de tak van gymnastiek waarvoor het product bedoeld
        is (bijv. artistiek, ritmisch, acrobatisch).
    hair_extension_texture:
      name: Haarextensie textuur
      description: Beschrijft het krul-, golf- of textuurpatroon van de extensiestrengen.
    hair_net_style:
      name: Haarnetje stijl
      description: Geeft het ontwerp of de constructiestijl van het haarnetje aan
        (bijv. bouffant, snood, knotcover).
    hair_quality_grade:
      name: Kwaliteitsklasse haar
      description: Geeft brancheaanduidingen voor kwaliteit/oorsprong van het haar
        aan.
    halter_style:
      name: Halster stijl
      description: Geeft de functionele of ontwerpstijl van het halster aan (bijv.
        touw, breakaway, show), zodat shoppers een halster kunnen kiezen dat geschikt
        is voor het beoogde gebruik.
    hammock_style:
      name: Hangmat stijl
      description: Beschrijft de structurele stijl of constructie van de hangmat.
    hand_and_foot_coverage:
      name: Hand- en voetbedekking
      description: Beschrijft geïntegreerde of afneembare wanten en slofjes die handen
        en/of voeten bedekken.
    hand_cymbal_set_configuration:
      name: Configuratie handbekkenset
      description: Geeft aan of het product wordt verkocht als bijpassend paar, als
        enkel bekken of als grotere set.
    hand_drum_head_material:
      name: Handtrommel vel materiaal
      description: Materiaal van het trommelvel (membraan) dat wordt gebruikt op de
        bekertrommel.
    hand_exerciser_style:
      name: Handtrainer stijl
      description: Classificeert de algemene stijl of het mechanisme van de handtrainer.
    hand_guard_backbone_material:
      name: Handbeschermer verstevigingsrug materiaal
      description: Materiaal van de structurele rug/versteviging (indien aanwezig),
        die de sterkte en bescherming bepaalt.
    hand_guard_coverage_style:
      name: Handbeschermer bedekking stijl
      description: Beschrijft de bedekking/het profiel van de handbeschermer, wat
        invloed heeft op bescherming tegen wind/impact.
    hand_guard_mounting_type:
      name: Handbeschermer bevestiging type
      description: Specificeert hoe de handbeschermers aan de motorfiets worden bevestigd
        (bijv. stuuruiteinde met binnenklem versus alleen klembevestiging).
    hand_guard_set_configuration:
      name: Configuratie handbeschermerset
      description: Of het product wordt verkocht als links/rechts-paar of als enkele
        zijde.
    hand_guard_style:
      name: Handbeschermer stijl
      description: Beschrijft het bedekkingsontwerp of de stijl van de beschermer
        (bijv. gesloten, open, volledig, lite, standaard).
    hand_guard_weather_protection:
      name: Handbeschermer weersbescherming
      description: Geeft de beoogde weersbescherming aan die de handbeschermers bieden.
    hand_paddle_strap_type:
      name: Handpaddle band type
      description: Specificeert het type band, of het ontbreken van een band, waarmee
        de handpaddle aan de hand van de gebruiker wordt bevestigd.
    hand_percussion_mount_attachment_mechanism:
      name: Handpercussiehouder bevestigingsmechanisme
      description: Specificeert hoe de houder aan een standaard, rack of andere hardware
        wordt bevestigd (bijv. klembevestiging versus stangbevestiging).
    hand_percussion_mounting_handling:
      name: Handpercussie montage/gebruik
      description: Of het instrument tijdens normaal gebruik in de hand wordt gehouden,
        gedragen, gemonteerd of op tafel/vloer wordt geplaatst.
    hand_percussion_pitch_type:
      name: Handpercussie toonhoogte type
      description: Geeft aan of het instrument een bepaalde toonhoogte (stembaar/noten)
        of een onbepaalde toonhoogte produceert.
    hand_percussion_playing_method:
      name: Handpercussie speel methode
      description: Hoe het instrument doorgaans wordt bespeeld om geluid te produceren
        (bijv. schudden versus schrapen).
    hand_percussion_set_configuration:
      name: Handpercussie set configuratie
      description: Of het product een enkel instrument, een bijpassend paar of een
        meerdelige set is.
    hand_percussion_size_class:
      name: Handpercussie maatklasse
      description: Algemene maatcategorie van het instrument wanneer er geen exacte
        meting wordt opgegeven of voor eenvoudige filtering.
    hand_sewing_needle_point_type:
      name: Handnaainaald punt type
      description: Vorm/stijl van de punt van de handnaainaald die wordt gebruikt
        om verschillende materialen te doorboren (bijv. geweven stof, breisels, leer)
        of garens.
    hand_support_level:
      name: Ondersteuningsniveau handschoen
      description: Specificeert de mate van ondersteuning of compressie die door de
        handschoen, wikkel of band wordt geboden.
    hand_support_size:
      name: Ondersteuningsmaat handschoen
      description: Door de fabrikant opgegeven maat van de handschoen, band of wikkel
        (XS-XXL of one-size).
    handball_ball_type:
      name: Handbaltype
      description: Geeft de bedoelde gebruikscategorie van de handbal aan, zoals wedstrijd,
        training of beach.
    handball_playing_surface:
      name: Handbal speeloppervlak
      description: Geeft het speeloppervlak of de speeloppervlakken aan waarvoor de
        handbal is geoptimaliseerd.
    handball_target_type:
      name: Handbal doel type
      description: Specificeert de stijl of het ontwerp van het schietdoel dat bedoeld
        is voor teamhandbaltraining.
    handbrake_actuation_type:
      name: Handrem activering type
      description: Specificeert hoe de parkeerrem wordt geactiveerd.
    handbrake_orientation:
      name: Handrem oriëntatie
      description: Specificeert of de handrem is ontworpen voor links- of rechtsgestuurde
        voertuigen, of universeel is.
    handgun_grip_material:
      name: Handvuurwapen greep materiaal
      description: Primair materiaal van de grepen/greeppanelen van het handvuurwapen.
    handle_configuration:
      name: Handgreepconstructie
      description: Beschrijft de structurele stijl van de wakeboard handgreep (bijv.
        enkel, dubbel, Deep-V, T-wrap), zodat shoppers vaardigheden, trucs of boottype
        kunnen matchen.
    handle_ergonomics:
      name: Handgreep ergonomie
      description: Beschrijft ergonomische kenmerken van de handgreep die bedoeld
        zijn om comfort en controle te verbeteren.
    handle_grip_material:
      name: Handgreepmateriaal
      description: Specificeert het materiaal dat wordt gebruikt op het gripoppervlak
        van de handgreep, wat invloed heeft op comfort en grip, vooral wanneer het
        nat is.
    handle_grip_type:
      name: Type handgreep
      description: Specificeert de gripbekleding/het gripmateriaal of de oppervlak
        stijl van de handgreep die bedoeld is om comfort en controle te verbeteren.
    handle_shape:
      name: Handgreep vorm
      description: Dwarsdoorsnedevorm of profiel van de handgreep.
    handlebar_design:
      name: Stuur ontwerp
      description: Specificeert het type stuur op de stair stepper, zoals geen, vast,
        verstelbare hoogte, inklapbaar of weerstandsbandhandgrepen.
    handlebar_type:
      name: Stuur type
      description: Geeft de stijl aan van het stuur dat op de fiets is gemonteerd,
        met invloed op rijhouding, controle en comfort.
    handslide_bore_type:
      name: Handschuif boring type
      description: Specificeert of de bastrombone een enkele boring of dubbele boring
        schuif gebruikt.
    handwear_cuff_style:
      name: Handmode manchet stijl
      description: Beschrijft de manchet- of polsconstructiestijl van handschoenen
        of wanten, wat invloed heeft op bedekking en pasvorm.
    handwear_insulation_material:
      name: Handmode isolatie materiaal
      description: Geeft het isolerende of voeringmateriaal aan dat aan de binnenkant
        van handschoenen of wanten wordt gebruikt.
    handwear_size:
      name: Handschoenmaat
      description: Specificeert de maat van handschoenen of andere handwear om een
        goede pasvorm te garanderen.
    hang_glider_design:
      name: Deltavlieger ontwerp
      description: Classificeert de structurele stijl van de deltavlieger (bijv. flex-wing,
        rigid-wing, powered).
    hanger_thread_size:
      name: Hanger schroefdraad maat
      description: Geeft de schroefdraadmaat/-standaard aan die wordt gebruikt om
        de hanger op banksticks of beetmelders te monteren, zodat compatibiliteit
        wordt gegarandeerd.
    hanging_suspension_method:
      name: Ophangmethode
      description: Definieert het belangrijkste bevestigingsmateriaal of systeem dat
        wordt gebruikt om de schommel op te hangen (bijv. touw, ketting, standaardframe).
    hardtop_finish_type:
      name: Hardtop afwerking type
      description: Specificeert de afwerkingsstaat van de buitenkant van de hardtop
        (bijv. gegrond versus gelakt), wat invloed heeft op installatiegereedheid
        en uiterlijk.
    hardtop_shell_material:
      name: Hardtop schaal materiaal
      description: Specificeert het primaire materiaal van de stijve schaal van de
        hardtop van een voertuig (niet de stof van een hoes), zoals glasvezel of aluminium.
    hardtop_window_configuration:
      name: Hardtop raam configuratie
      description: Beschrijft welke ramen bij de hardtop zijn inbegrepen en wat hun
        configuratie is.
    harmonica_comb_material:
      name: Kammateriaal harmonica
      description: Materiaal dat wordt gebruikt voor de kam van de mondharmonica (luchtkamerbody).
    harmonica_cover_plate_finish:
      name: Mondharmonica dekplaat afwerking
      description: Specificeert de afwerking of coating op de dekplaten van de mondharmonica.
    harmonica_cover_plate_material:
      name: Afdekmateriaal harmonica
      description: Materiaal dat wordt gebruikt voor de buitenste dekplaten.
    harmonica_finish:
      name: Afwerking harmonica
      description: Oppervlakteafwerking van de dekplaten/body van de mondharmonica.
    harmonica_included_accessories:
      name: Bij harmonica inbegrepen accessoires
      description: Geeft aan welke accessoires bij de mondharmonica zijn inbegrepen.
    harmonica_note_range:
      name: Mondharmonica notenbereik
      description: Bereikclassificatie van het instrument die wordt gebruikt in orkestrale
        contexten (bijv. bas, bariton, tenor).
    harmonica_reed_plate_material:
      name: Mondharmonica tongplaat materiaal
      description: Materiaal dat wordt gebruikt voor de tongplaten (bijv. messing,
        roestvrij staal, aluminium).
    harmonica_system_type:
      name: Mondharmonica systeem/type
      description: Geeft het mondharmonicasysteem of de vormfactor aan (bijv. chord,
        bas, bariton, polyphonia).
    harmonica_tuning_system:
      name: Stemsysteem harmonica
      description: Specificeert de stemmingsindeling/het stemmingssysteem dat door
        de mondharmonica wordt gebruikt (bijv. Richter, Solo, Orkeststemming).
    harness_shell_type:
      name: Harnas schaal type
      description: Beschrijft de stijfheid van de schaalconstructie van het harnas
        (bijv. softshell, hardshell, hybride).
    harness_style:
      name: Harnas stijl
