    collectible_gun_firing_mechanism:
      name: Verzamelwapen afvuurmechanisme
      description: Specificeert het afvuur-/ontstekingsmechanisme van het wapen voor
        verzamelvuurwapens (met name antieke en historische stukken).
    collectible_knife_blade_finish:
      name: Verzamelmes lemmetafwerking
      description: Beschrijft de oppervlakafwerking/behandeling van het lemmet voor
        het uiterlijk (en soms corrosiebestendigheid).
    color_code_system:
      name: Kleurcodesysteem
      description: Geeft het kleurcodesysteem aan dat wordt gebruikt voor de numerieke
        kleurreferentie van de draad (bijv. DMC, Anchor), indien van toepassing.
    color_coding_standard:
      name: Kleurcodering norm
      description: Geeft aan of de plaat een internationale kleurcode volgt (bijv.
        IWF of IPF) of een ander schema.
    color_effect:
      name: Kleureffect
      description: Specificeert speciale kleurtechnieken of -effecten die op hairextensions
