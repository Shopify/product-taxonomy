      description: Geeft aan hoe de keu is opgebouwd, het aantal delen of of het een
        gedeeltelijk onderdeel is zoals alleen butt of alleen shaft, wat invloed heeft
        op draagbaarheid en compatibiliteit.
    cue_head_material:
      name: Materiaal keukop
      description: Identificeert het materiaal van de keukop (het deel dat contact
        maakt met de puck), wat invloed heeft op duurzaamheid en oppervlaktebescherming.
    cue_sport_compatibility:
      name: Keusport compatibiliteit
      description: Identificeert voor welke keusport het accessoire is ontworpen.
    cue_thread_size:
      name: Keu schroefdraadmaat
      description: Specificeert de schroefdraadspecificatie die wordt gebruikt voor
        verlengstukken, gewrichtsbeschermers, gewichtsbouten en andere keuaccessoires
        om een goede pasvorm te garanderen.
    cue_tip_hardness:
      name: Keutip hardheid
      description: Beoordeelt de stevigheid van de keutip, wat invloed heeft op controle
        over de keubal en feedback.
    cuff_height:
      name: Manchethoogte
      description: Vermeldt de hoogte van de laarsmanchet (laag, middelhoog, hoog,
        afneembaar/verstelbaar), wat invloed heeft op ondersteuning en flexibiliteit.
    cuff_position:
      name: Manchetpositie
      description: Geeft aan waar op het lichaam van de rijder de leashmanchet is
        ontworpen om te bevestigen.
    cultivation_method:
      name: Teeltmethode
      description: Specificeert hoe de bladgroenten zijn geteeld, met betrekking tot
        teelttechnieken en landbouwpraktijken.
    cup_type:
      name: Cup type
      description: Geeft het oppervlakteprofiel van de lovertjes aan (vlak versus
        komvormig) en de cupdiepte, wat invloed kan hebben op glans, textuur en hoe
        ze zitten wanneer ze worden vastgenaaid of gelijmd.
    cupcake_size:
      name: Cupcake maat
      description: Specificeert de fysieke maatcategorie van de verkochte cupcakes
        (bijv. mini, standaard, jumbo).
    curd_size:
      name: Wrongel maat
      description: Specificeert de maat of textuur van de cottagecheesewrongel.
    cure_method:
      name: Uithardingsmethode
      description: Beschrijft het proces dat nodig is om de lijm te laten uitharden
        (bijv. uv-licht, luchtvochtigheid, warmte).
    curing_or_preparation_method:
      name: Uithardings- of bereidingsmethode
      description: Specificeert hoe de olijven zijn uitgehard of anderszins bereid
        (bijv. gepekeld, in olie ingelegd, gegrild).
    curling_broom_head_material:
      name: Curlingbezemkop materiaal
      description: Identificeert de primaire materiaalsamenstelling van de bezemkop
        of pad.
    curling_broom_head_type:
      name: Curlingbezemkop type
      description: Specificeert de stijl of constructie van de veegkop/pad.
    curling_shoe_slider_material:
      name: Curlingschoen slider materiaal
      description: Identificeert het primaire materiaal van de glijzool die op curlingschoenen
        wordt gebruikt.
    curling_training_aid_type:
      name: Curling trainingshulpmiddel type
      description: Identificeert het type curling trainingshulpmiddel.
    curry_variety:
      name: Curryvariëteit
      description: Classificeert currysausproducten op basis van de specifieke currystijl
        of het recept dat ze moeten creëren, zoals Tikka Masala, Massaman of Thaise
        groene curry, om nauwkeurig te kunnen filteren op smaak/stijl.
    cushion_rubber_profile:
      name: Stootrubberprofiel
      description: Vorm- of profielcode van stootrubberstukken voor rails.
    cushioning_level:
      name: Dempingsniveau
      description: Geeft de hoeveelheid demping onder de voet aan die de sok biedt
        voor bescherming tegen impact en comfort.
    custom_label_content_type:
      name: Aangepast label content type
      description: Specificeert welke informatie op het innaailabel wordt gepersonaliseerd,
        bijvoorbeeld naam, logo, boodschap, maat, wassymbolen of contactgegevens.
    customization_type:
      name: Personalisatietype
      description: Specificeert of de jersey blanco, door een speler gedragen, of
        gepersonaliseerd is met naam/nummer.
    cut_or_preparation_style:
      name: Snij-/bereidingsstijl
      description: Specificeert hoe de groentestukken in het blik of de pot zijn gesneden
        of bereid, bijvoorbeeld heel, in blokjes of als spears.
    cut_resistance_rating:
      name: Snijbestendigheid classificatie
      description: Specificeert het formeel geteste snijbestendigheidsniveau van het
        item.
    cut_type:
      name: Snijtype
      description: Geeft aan of de stof per yard/meter, als voorgesneden stuk of als
        rol/bout wordt verkocht.
    cutting_application:
      name: Snijtoepassing
      description: Primair beoogde snijtoepassing voor de schaar.
    cutting_mat_grid_style:
      name: Snijmat rasterstijl
      description: De stijl van de gedrukte hulplijnen op het matoppervlak.
    cutting_mat_intended_use:
      name: Snijmat beoogd gebruik
      description: De primaire hobby-/werkoppervlaktoepassing waarvoor de snijmat
        is ontworpen.
    cv_boot_clamp_type:
      name: CV-hoes klemtype
      description: Specificeert het type klem/band dat wordt gebruikt om de aandrijfashoes
        vast te zetten.
    cv_boot_kit_contents:
      name: CV-hoes set inhoud
      description: Vermeldt wat bij de CV-hoes is inbegrepen, bijvoorbeeld klemmen,
        vetzakje en borgringen.
    cv_boot_material:
      name: CV-hoes materiaal
      description: Specificeert de primaire materiaalsamenstelling van de CV-hoes.
    cv_boot_position:
      name: CV-hoes positie
      description: Specificeert of de CV-hoes past op de binnenste of buitenste homokineetpositie
        op de as.
    cycling_apparel_fit:
      name: Fietskleding pasvorm
      description: Beschrijft de snit van het kledingstuk en geeft de beoogde strakheid
        en aerodynamica aan, bijvoorbeeld Race of Relaxed.
    cylinder_head_assembly:
      name: Cilinderkop montage
      description: Specificeert hoe compleet de cilinderkop wordt verkocht, bijvoorbeeld
        volledig gemonteerd met geïnstalleerde kleppentreincomponenten versus kale/niet-gemonteerde
        gietvorm.
    cylinder_head_material_grade:
      name: Cilinderkop materiaalklasse
      description: Specificeert het materiaal en de klasse die worden gebruikt voor
        het gieten van de cilinderkop.
    cylinder_head_position:
      name: Cilinderkop positie
      description: Geeft aan voor welke bank/zijde of oriëntatie de cilinderkop geschikt
        is bij motoren met meerdere banken, bijvoorbeeld linker-/rechterzijde of bank
        1/bank 2.
    cymbal_alloy:
      name: Bekken legering
      description: Legering/samenstelling van de bekken(s) in de set.
    cymbal_application:
      name: Bekken toepassing
      description: Primaire speeltoepassing waarvoor het bekken is ontworpen/in de
        markt wordt gezet.
    cymbal_arm_mounting_interface:
      name: Bekkenarm montage-interface
      description: Specificeert hoe de bekkenarm aan de rest van de drumhardware wordt
        bevestigd, bijvoorbeeld klem, rack of statiefontvanger.
    cymbal_arm_rotation_positioning_features:
      name: Bekkenarm rotatie-/positioneringskenmerken
      description: Specificeert positioneringskenmerken die beïnvloeden hoe de arm
        kan worden gekanteld/gedraaid en vergrendeld.
    cymbal_arm_style:
      name: Bekkenarm stijl
      description: Specificeert of een bekkenarm recht of boom is, voor voorkeuren
        rond bereik en positionering.
    cymbal_drum_case_wheel_configuration:
      name: Bekken- en drumkoffer wielconfiguratie
      description: Geeft aan of de koffer wielen heeft en, indien van toepassing,
        welke wielconfiguratie wordt gebruikt voor rollend transport.
    cymbal_hammering_style:
      name: Bekken hamerstijl
      description: Hamerproces/uiterlijk Impact en gevoel.
    cymbal_kit_components_included:
      name: Inbegrepen onderdelen bekkenset
      description: Specificeert welke bekkentypes in de ridebekkenset/-pack zijn inbegrepen,
        naast het ridebekken zelf.
    cymbal_kit_items_included:
      name: Inbegrepen bekkensetitems
      description: Geeft aan welke bekkens in de set/pack zijn inbegrepen (per bekkentype).
    cymbal_lathing:
      name: Bekken draaigroeven
      description: Specificeert of en in welke mate het bekkenoppervlak is gedraaid,
        oftewel gegroefd, versus onbewerkt/ruw.
    cymbal_playing_style_genre:
      name: Bekken speelstijl/genre
      description: Geeft de typische performancecontext aan waarvoor de bekkens zijn
        ontworpen, bijvoorbeeld buikdanszills of marching-/orkestrale handbekkens.
    cymbal_set_configuration:
      name: Bekken setconfiguratie
      description: Geeft aan of het product wordt verkocht als één bekken, een gematcht
        paar of een set met meerdere paren, bijvoorbeeld voor groepslessen.
    cymbal_sound_character:
      name: Geluidskarakter bekken
      description: Beschrijft het algemene klankprofiel/de voicing van het bekken
        voor ontdekking, bijvoorbeeld bright versus dark.
    cymbal_sustain:
      name: Bekken sustain
      description: Hoe lang het bekken naklinkt nadat het is aangeslagen.
    cymbal_type:
      name: Bekken type
      description: Specificeert de functionele bekkenrol die de elektronische bekkenpad
        moet nabootsen.
    cymbal_volume_level:
      name: Bekken volumeniveau
      description: Waargenomen luidheids-/outputcategorie van het bekken.
    cymbal_weight_class:
      name: Bekken gewichtsklasse
      description: Geeft de gewichtsklasse van het bekken aan, wat invloed heeft op
        toon, volume en respons.
    dairy_heat_treatment:
      name: Zuivel hittebehandeling
      description: Identificeert het verwerkings- of pasteurisatieniveau dat op de
        room is toegepast (bijv. rauw, gepasteuriseerd, UHT), wat invloed heeft op
        houdbaarheid, smaak en opklopprestaties.
    damage_type:
      name: Schadetype
      description: Specificeert de soorten autoruitschade die de kit bedoeld is om
        te repareren.
    damper_pedal_style:
      name: Demperpedaal stijl
      description: Beschrijft de fysieke stijl van het demperpedaal dat wordt gebruikt
        met keyboards/digitale piano’s.
    damping_adjustability:
      name: Demping verstelbaarheid
      description: Geeft aan welke dempings- en/of rijhoogteparameters verstelbaar
        zijn op de schokdemper.
    damping_level:
      name: Dempingsniveau
      description: Geeft de relatieve mate van volume- en sustainreductie aan die
        de demper biedt.
    dance_occasion:
      name: Dansgelegenheid
      description: Geeft de beoogde gebruikscontext van het kledingstuk binnen dansles
        of dansuitvoering aan.
    darbuka_accessories_included:
      name: Inbegrepen Darbuka-accessoires
      description: Vermeldt gangbare accessoires die bij de darbuka zijn inbegrepen.
    darbuka_body_finish_type:
      name: Darbuka body afwerkingstype
      description: Beschrijft de buitenafwerking, coating of decoratieve behandeling
        van de darbukabody.
    darbuka_head_material:
      name: Darbuka velmateriaal
      description: Specificeert het materiaal van het drumvelmembraan op een darbuka.
    dart_barrel_material:
      name: Dartbarrel materiaal
      description: Specificeert het primaire materiaal van de dartbarrel, wat invloed
        heeft op gewichtsverdeling, duurzaamheid en prijs.
    dart_shaft_design:
      name: Dartshaft ontwerp
      description: Classificeert het mechanische ontwerp van de shaft, zoals of deze
        vast, draaiend, telescopisch is of de flight integreert, wat invloed heeft
        op prestaties en prijs.
    dart_shaft_thread_type:
      name: Dartshaft schroefdraadtype
      description: Geeft de schroefdraadmaat/het schroefdraadtype aan dat wordt gebruikt
        om de shaft in de dartbarrel te schroeven, voor compatibiliteit tussen shafts
        en barrels.
    dart_thread_size:
      name: Schroefdraadmaat dartpijl
      description: Specificeert de schroefdraadmaat/standaard waarmee het onderdeel
        compatibel is, voor een goede pasvorm tussen shafts, tips en barrels.
    dart_tip_compatibility:
      name: Dartpunt compatibiliteit
      description: Geeft aan of het dartonderdeel bedoeld is voor steeltip, softtip
        of beide dartstijlen.
    dart_tip_connection_type:
      name: Dartpunt verbindingstype
      description: Beschrijft de schroefdraadspecificatie of het montagesysteem dat
        de punt gebruikt om aan een dartbarrel of shaft te worden bevestigd, voor
        compatibiliteit.
    dartboard_tournament_approval:
      name: Goedkeuring dartbordtoernooi
      description: Geeft aan of het dartbord officieel is goedgekeurd door specifieke
        dartfederaties of competities.
    dartboard_type:
      name: Dartbordtype
      description: Classificeert het dartbord op basis van constructietechnologie
        en dartcompatibiliteit (bijv. bristle, elektronisch, magnetisch).
    dash_cover_construction_type:
      name: Constructietype dashboardbekleding
      description: Hier wordt beschreven hoe de dashboardbekleding is gemaakt (bijv.
        gegoten of genaaid), wat van invloed is op de pasvorm en het uiterlijk.
    dash_cover_cutout_configuration:
      name: Dashboardhoes uitsparing configuratie
      description: Geeft aan voor welke OEM-dashboardopeningen/sensoren de afdekking
        is voorgesneden of gevormd.
    dashboard_accessory_position:
      name: Positie van het dashboardaccessoire
      description: Geeft aan waar op of rond het dashboard het accessoire geplaatst
        of bevestigd moet worden.
    date_variety:
      name: Dadelsoort
      description: Geeft de cultivar/soort van de dadels aan (bijv. Medjool, Deglet
        Noor, Ajwa). De variëteit heeft een grote invloed op de smaak, de grootte
        en de textuur, en wordt in de meeste producttitels en -beschrijvingen benadrukt.
        Door hierop in te spelen, verbeter je de filtermogelijkheden en de vindbaarheid.
    dayan_head_material:
      name: Materiaal dayan-vel
      description: Materiaal van het speelvlak (pudi), zoals natuurlijk vel of synthetisch
        type.
    dayan_strap_material:
      name: Materiaal dayan-spanbanden
      description: Materiaal van de spanriemen (baddhi) die worden gebruikt om de
        dayan te rijgen.
    dayan_syahi_type:
      name: Dayan syahi type
      description: Type syahi (zwarte stempasta) toepassing op het dayanvel.
    decaffeination_method:
      name: Cafeïneverwijdering methode
      description: Geeft aan welk proces wordt gebruikt om cafeïne uit cafeïnevrije
        koffie te verwijderen.
    decal_installation_method:
      name: Decal installatie methode
      description: Hoe de decal op het voertuigoppervlak wordt aangebracht (bijv.
        droog aanbrengen, nat aanbrengen). Details over gereedschap/vereisten (bijv.
        transfertape of heteluchtpistool) moeten waar van toepassing in instructies
        of gerelateerde gereedschap attributen worden vastgelegd.
    decal_orientation:
      name: Decal oriëntatie
      description: Of de decal bedoeld is voor toepassing aan de binnenkant van glas
        of op een buitenoppervlak.
    decal_placement_type:
      name: Decal plaatsing type
      description: Geeft aan waar op het voertuig de decal moet worden aangebracht
        (bijv. carrosseriepaneel, bumper, motorkap).
    decal_visibility_property:
      name: Decal zichtbaarheid eigenschap
      description: Optische/zichtbaarheidseigenschappen van een decal die bedoeld
        zijn om de zichtbaarheid of lichtreactie te verbeteren (bijv. reflecterende,
        fluorescerende, glow-in-the-dark of transparante eigenschappen).
    deck_concave_level:
      name: Deck concave niveau
      description: Geeft de diepte of intensiteit van de concave van het deck aan
        (bijv. mild, medium, diep).
    deck_flex_rating:
      name: Deck flex beoordeling
      description: Kwalitatieve beoordeling van de flexibiliteit/stijfheid van het
        deck.
    deck_material:
      name: Dekmateriaal
      description: Identificeert het primaire constructiemateriaal van het skateboarddeck.
    decoder_interface_socket_type:
      name: Decoderinterface / aansluiting type
      description: Type digitale decoderinterface of ingebouwde decoderconfiguratie
        voor het locomotiefmodel.
    decoration_technique:
      name: Decoratie techniek
      description: Identificeert de primaire methode die wordt gebruikt om graphics
        of versieringen op het T-shirt aan te brengen.
    decorative_stamp_form_factor:
      name: Decoratieve stempel vormfactor
      description: Identificeert de fysieke stempelvorm en hoe deze een ontwerp afdrukt
        (losse stempel, set, roller, achtergrond, enz.).
    decorative_tape_application:
      name: Decoratieve tape toepassing
      description: Primaire knutseltoepassing waarvoor de decoratieve tape is ontworpen
        of op de markt wordt gebracht.
    decorative_tape_format:
      name: Decoratieve tape formaat
      description: Specificeert hoe de decoratieve tape wordt geleverd/verpakt voor
        gebruik.
    decoy_buoyancy:
      name: Lokvogel drijfvermogen
      description: Beschrijft hoe het lokaas zich in de waterkolom gedraagt (drijvend,
        zwevend of zinkend).
    decoy_joint_type:
      name: Lokaas scharnier type
      description: Geeft aan of het lokaaslichaam uit één stuk bestaat of uit meerdere
        delen bestaat, wat van invloed is op de zwembeweging.
    decoy_motion_mechanism:
      name: Lokaas bewegingsmechanisme
      description: Beschrijft hoe de het lokaas, indien van toepassing, beweging of
        waterverstoring produceert om wild aan te trekken.
    decoy_posture:
      name: Lokaas houding
      description: Geeft de afgebeelde houding of activiteit aan van het dier dat
        door het lokaas wordt nagebootst (bijv. eten, rusten, alert).
    decoy_size_class:
      name: Lokaas grootte klasse
      description: Categoriseert de relatieve schaal van het lokaas in vergelijking
        met het echte dier (bijv. Standaard, Magnum, Oversize).
    decoy_style:
      name: Lokaas stijl
      description: Geeft de fysieke vormfactor of ontwerpklasse aan van het lokaas
        om jagers te helpen bij het kiezen van de juiste opstelling.
    deli_meat_variety:
      name: Delicatessenvlees variant
      description: Classificeert de specifieke soort delicatessenvlees (bijv. salami,
        bologna, prosciutto, rosbief).
    delivery_form:
      name: Leveringsvorm
      description: Fysieke leveringsvorm van de injectorreiniger.
    denim_composition:
      name: Denim samenstelling
      description: Primaire vezelsamenstelling van de denim (basisvezels exclusief
        kleurstoffen/afwerkingen).
    denim_finish:
      name: Denim afwerking
      description: Oppervlakte-/verwerkingsafwerking die op denimstof is aangebracht.
    denim_intended_use:
      name: Denim beoogd gebruik
      description: Typisch project/gebruik waarvoor de denim op de markt wordt gebracht.
    denim_stretch_type:
      name: Denim stretch type
      description: Of de denim mechanische stretch heeft, toegevoegd elastaan/spandex
        bevat, of geen stretch heeft.
    denim_wash:
      name: Denim wassing
      description: Geeft de tint of wasbehandeling aan die op denimstof is toegepast
        (bijv. licht, donker, ruw, zuur).
    derailleur_cage_length:
      name: Derailleurkooi lengte
      description: Geeft de lengte van de derailleurkooi aan die bepalend is voor
        de kettingcapaciteit (voornamelijk voor achterderailleurs).
    derailleur_mounting_style:
      name: Derailleur bevestigingswijze
      description: Geeft aan hoe de derailleur aan het fietsframe of de hanger wordt
        bevestigd (bijv. gesoldeerd, klem, direct mount, UDH).
    derailleur_type:
      name: Derailleur type
      description: Geeft aan of het product een voor- of achterderailleur is.
    deshedder_tool_type:
      name: Vachtverzorginghulpmiddel type
      description: Classificeert de structurele stijl van het vachtverzorginghulpmiddel,
        zodat kopers hun voorkeursmethode kunnen kiezen (bijv. mes, blok, roskam of
        handschoen).
    diabolo_axle_system:
      name: Diabolo assysteem
      description: Geeft het diabolo-assysteem/de configuratie aan die van invloed
        is op grinds, stabiliteit en slijtage van de snaren.
    diagnostic_functions_supported:
      name: Ondersteunde diagnostische functies
      description: Geeft de diagnostische/onderhoudsfuncties aan die de scanner kan
        uitvoeren.
    diagnostic_interface_type:
      name: Diagnostisch interface type
      description: Verbinding/interface die wordt gebruikt om te communiceren met
        het voertuig of apparaat (bijv. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Diamant kleur klasse
      description: Geeft de kleurklasse van diamanten aan, van D (kleurloos) tot Z
        (licht van kleur), of duidt op fancy-kleurige diamanten.
    diaper_cover_style:
      name: Luierbroekje stijl
      description: Definieert het silhouet of de decoratieve stijl van het luierbroekje
        om te helpen bij het bladeren en filteren op basis van stijl.
    diastatic_power_unit:
      name: Diastatische krachteenheid
      description: Geeft het eenhedenstelsel aan dat wordt gebruikt om de diastatische
        krachtwaarde van een product weer te geven (bijv. °Lintner versus Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Stemsysteem diatonische mondharmonica
      description: Geeft de toonindeling/stemsysteem aan dat door de diatonische mondharmonica
        wordt gebruikt.
    dice_sides:
      name: Dobbelsteen zijden
      description: Aantal zijden (vlakken) per dobbelsteen voor de dobbelstenen die
        bij het product zijn inbegrepen (bijv. d6, d20). Gebruik voor gemengde sets
        de overheersende waarde of vermeld meerdere waarden indien ondersteund.
    didgeridoo_construction_type:
      name: Didgeridoo constructietype
      description: Hoe de didgeridoo is geconstrueerd of gevormd (traditionele of
        moderne constructiemethode).
    dietary_formulation_claim:
      name: Diervoederclaim
      description: Benadrukt belangrijke eigenschappen of uitsluitingen van de samenstelling
        die relevant zijn voor paardenvoeding (bijv. graanvrij, zetmeelarm, biologisch).
    dinosaur_playset_scale_figure_size_class:
      name: Dinosaurus speelset schaal/figuur grootteklasse
      description: Beschrijft de algemene schaal van de meegeleverde dinosaurussen/figuren
        om de compatibiliteit met andere sets te vergemakkelijken.
    dinosaur_species_included:
      name: Dinosaurus soorten inbegrepen
      description: Geeft aan welke dinosaurussoorten in de speelset zijn vertegenwoordigd
        (figuren of gegoten dinosaurussen).
    dipsy_diver_size_designation:
      name: Dipsy diver maataanduiding
      description: Geeft de door de fabrikant gedefinieerde maatcode van de dipsey-visstok
        aan, die correleert met het gewicht en de duikdiepte.
    disc_brake_rotor_mount_type:
      name: Type montage schijfremmotor
      description: Geeft aan hoe een schijfremrotor aan de naaf wordt bevestigd (bijv.
        6-bouts, Center Lock).
    disc_lock_accessories_included:
      name: Meegeleverde accessoires voor schijfslot
      description: Geeft aan welke extra items bij een fietsschijfslot worden meegeleverd,
        zoals een herinneringskabel, draagtasje, montagebeugel of batterijen.
    disco_ball_mirror_tile_material:
      name: Materiaal reflecterende tegels discobal
      description: Het materiaal van de reflecterende tegels op de discobal (indien
        van toepassing).
    disco_ball_mirror_tile_size:
      name: Discobal grootte spiegeltegels
      description: Geschatte afmeting van individuele spiegeltegels/vierkanten op
        de discobal.
    display_backlight_color:
      name: Display achtergrondverlichting kleur
      description: Kleur van de achtergrondverlichting/verlichting van het meterdisplay/de
        wijzerplaat.
    disposable_compostable_claim:
      name: Wegwerpbaar/composteerbaar claim
      description: Geeft aan of het product composteerbaar, biologisch afbreekbaar,
        recyclebaar of geen van bovenstaande is (indien van toepassing).
    distillation_method:
      name: Distillatie methode
      description: Geeft de distillatiemethode of het type distilleerketel aan dat
        is gebruikt om de sterke drank te produceren.
    distilled_water_intended_use:
      name: Gedestilleerd water beoogd gebruik
      description: Definieert de primaire toepassing van het gedestilleerde water
        (bijv. drinken, CPAP-apparaat, luchtbevochtiger, stoomstrijkijzer).
    distress_transmission_frequency:
      name: Noodzendfrequentie
      description: Primaire radiofrequentie(s) die wordt/worden gebruikt voor noodsignalen.
    distressing_level:
      name: 'Versletenheid '
      description: Geeft de mate van opzettelijke slijtage, scheuren of rafels in
        de stof aan.
    distressing_style:
      name: Stijl van versletenheid
      description: Geeft het type of de mate van versletenheid op jeans aan, zoals
        gescheurde of whisker-effecten.
    distributor_advance_mechanism:
      name: Verdeelmechanisme
      description: Geeft het type ontstekingsvoorloopmechanisme aan dat door de verdeler
        wordt gebruikt.
    distributor_cap_terminal_type:
      name: Distributeurkap aansluiting type
      description: Geeft het type aansluitingen van de distributeurkap aan.
    distributor_gear_material:
      name: Distributeur tandwiel materiaal
      description: Geeft het materiaal van het aandrijftandwiel van de distributeur
        aan.
    distributor_ignition_type:
      name: Distributeur ontstekingstype
      description: Geeft aan of de distributeur is ontworpen voor contactpunten, elektronische
        ontsteking of HEI-achtige systemen.
    distributor_kit_contents:
      name: Distributeurset inhoud
      description: Geeft aan welke onderdelen bij de distributeur zijn inbegrepen
        (bijv. kap, rotor, ontstekingsmodule, pakking/O-ring, aandrijftandwiel, bedrading/connector).
    dive_computer_form_factor:
      name: Duikcomputer vormfactor
      description: Specificeert het fysieke ontwerp of de bevestigingsmethode van
        de duikcomputer, zoals op een console gemonteerd of in horlogestijl.
    diving_mask_design:
      name: Duikmasker ontwerp
      description: Bepaalt de algemene structurele stijl van het duikmasker, wat van
        invloed is op de pasvorm, het gezichtsveld en het beoogde gebruik.
    divot_tool_prong_configuration:
      name: Divot gereedschap tandconfiguratie
      description: Geeft het aantal en de opstelling aan van de tanden op het divot
        gereedschap die worden gebruikt om schade aan het gras te herstellen.
    divot_tool_style:
      name: Divot gereedschaps stijl
      description: Bepaalt de algemene structurele of gebruiksstijl van het divotgereedschap,
        zoals vast, zakmes/opvouwbaar, multitool of accessoires die aan een pet of
        club kunnen worden geklikt.
    djembe_shell_construction:
      name: Djembe shell constructie
      description: Beschrijft de constructiemethode van de djembe-shell/body.
    djembe_tuning_system:
      name: Djembe stemsysteem
      description: Geeft aan hoe de djembe wordt gespannen/gestemd.
    dmx_output_connector_type:
      name: DMX uitgang aansluitingstype
      description: Fysiek connectorformaat dat wordt gebruikt voor de DMX-uitgangspoort(en)
        van de controller.
    doctor_playset_items_included:
      name: Inbegrepen accessoires dokterspeelset
      description: Specificeert de namaakmedische hulpmiddelen en rollenspelaccessoires
        die in de doktersset zijn inbegrepen (bijv. stethoscoop, spuit, reflexhamer).
    doctor_playset_role_play_setting:
      name: Doktersset rollenspel setting
      description: Identificeert de primaire rollenspelcontext die de doktersset vertegenwoordigt.
    doctor_playset_wearable_items_included:
      name: Inbegrepen draagbare items dokterspeelset
      description: Geeft de draagbare kostuumonderdelen aan die bij de speelset zijn
        inbegrepen.
    doll_accessory_type:
      name: Pop accessoire type
      description: Definieert welk type poppen- of actiefiguuraccessoire het product
