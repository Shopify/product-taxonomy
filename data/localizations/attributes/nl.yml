    rugby_size:
      name: Rugby maat
      description: Classificeert uitrusting op basis van gangbare rugbyspecifieke
        maatlabels die in producttitels worden gebruikt.
    rugby_variant:
      name: Rugby variant
      description: Specificeert de rugbyvariant (code of format) waarvoor het product
        bedoeld is.
    ruler_edge_type:
      name: Liniaal randtype
      description: Geeft het randprofiel/de randfunctie aan die wordt gebruikt voor
        meten of markeren (bijv. rechte rand, afgeschuind, lip).
    ruler_marking_style:
      name: Liniaal markeerstijl
      description: Beschrijft de markering/geleiderindeling die op de liniaal is gedrukt
