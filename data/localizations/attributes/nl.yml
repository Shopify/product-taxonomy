        deze accessoirecategorie kunnen browsen en filteren.
    doll_eye_type:
      name: Pop oogtype
      description: Specificeert de constructiestijl van de ogen van de pop (bijv.
        ingezette acrylogen, geschilderd, ledverlichting).
    doll_hair_fiber_type:
      name: Pop haarvezel type
      description: Type haar/vezel dat op de pop wordt gebruikt (of geen), met invloed
        op realisme, styling en verzorging.
    doll_making_kit_components_included:
      name: Inbegrepen onderdelen poppenmaakset
      description: Vermeldt de belangrijkste materialen en gereedschappen die in de
        poppenmaakset zijn inbegrepen, zodat klanten bundels kunnen vergelijken en
        weten wat ze zelf moeten voorzien.
    dollhouse_installation_placement_type:
      name: Poppenhuis installatie/plaatsing type
      description: Hoe het poppenhuis bedoeld is om te worden gebruikt of geplaatst
        (bijv. op tafel vs vrijstaand vs wandgemonteerd).
    dollhouse_items_included:
      name: Poppenhuis items inbegrepen
      description: Geeft aan wat er in de doos bij het poppenhuis zit (meubels, poppen,
        accessoires).
    dollhouse_lighting_type:
      name: Poppenhuis verlichting type
      description: Type verlichting dat bij het poppenhuis is inbegrepen of door het
        poppenhuis wordt ondersteund.
    dollhouse_room_type:
      name: Poppenhuis kamer type
      description: Specificeert de beoogde kamer/ruimte in een poppenhuis waar het
        accessoire doorgaans wordt gebruikt.
    dollhouse_scale:
      name: Poppenhuis schaal
      description: Schaalverhouding van een poppenhuis of poppenhuisaccessoires (bijv.
        1:12) om compatibiliteit tussen huizen, meubels en figuren te garanderen.
    dollhouse_style_theme:
      name: Poppenhuis stijl/thema
      description: Algemene stijl of algemeen thema van het poppenhuis voor browsen
        en cadeaukeuze (bijv. modern vs Victoriaans).
    donnos_playing_technique:
      name: Donnos speeltechniek
      description: Hoe de Donnos wordt bespeeld/geactiveerd (alleen met de hand vs
        met stok/striker), om aan te sluiten op de verwachtingen van kopers en inbegrepen
        accessoires.
    donnos_tuning_system:
      name: Donnos stemsysteem
      description: Primaire methode die wordt gebruikt om de toonhoogte te stemmen
        of te veranderen (bijv. spankoorden/knijpmechanisme).
    door_assembly_type:
      name: Type deuropbouw
      description: 'Geeft aan wat is inbegrepen: alleen deurcasco, deurplaat of complete
        deurassemblage.'
    door_closure_mechanism:
      name: Deur sluitmechanisme
      description: Definieert het mechanisme dat de sluitactie van de deur regelt
        (bijv. softclose, magnetische sluiting).
    door_handle_components_included:
      name: Deurhendel meegeleverde onderdelen
      description: Geeft aan welke belangrijke onderdelen bij de deurhendel zijn inbegrepen,
        bijvoorbeeld slotcilinder, pakking/afdichting, sierafdekking, bevestigingsmateriaal,
        bedrading met connector of grendel/actuator.
    door_handle_operation:
      name: Deurhendel bediening
      description: Specificeert de primaire activerings-/bedieningsstijl van de deurhendelconstructie
