    saxophone_key_system:
      name: Saxofoon kleppensysteem
      description: Geeft het kleppenwerksysteem van de saxofoon aan (standaard voor
        indeling/mechanisme) dat op het instrument wordt gebruikt.
    saxophone_key_touch_material:
      name: Saxofoon key touch materiaal
      description: Specificeert het materiaal dat wordt gebruikt voor de key touches
        van de saxofoon (bijv. parelmoeren key touches).
    saxophone_mouthpiece_baffle_type:
      name: Saxofoon mondstuk baffletype
      description: Beschrijft het baffle-ontwerp dat de luchtstroom en helderheid
