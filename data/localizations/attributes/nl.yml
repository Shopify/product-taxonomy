      name: Hybride aandrijflijn configuratie
      description: Geeft de PHEV-systeemarchitectuur aan die beschrijft hoe de elektromotor(en)
        en verbrandingsmotor voor aandrijving zorgen.
    hybrid_system_type:
      name: Hybride systeem type
      description: Classificeert de hybridisatiearchitectuur die door het voertuig
        wordt gebruikt.
    hybrid_truck_cab_type:
      name: Hybride vrachtwagen cabine type
      description: Specificeert de cabineconfiguratie van de vrachtwagen, die van
        invloed is op zitcapaciteit en binnenruimte.
    hydration_bag_features:
      name: Drinkzak kenmerken
      description: Benadrukt opvallende ontwerp- of functionele kenmerken die specifiek
        zijn voor drinkzakken.
    hydration_belt_features:
      name: Hydratatieriemfuncties
      description: Somt opvallende ingebouwde kenmerken op die de bruikbaarheid, veiligheid
        of het gemak van de drinkriem verbeteren.
    hydration_bladder_compatibility:
      name: Drinkblaas compatibiliteit
      description: Geeft aan of het vest een drinkblaassysteem bevat of ondersteunt.
    hydration_mouthpiece_style:
      name: Drinkslang mondstuk stijl
      description: Specificeert het ontwerp of de functionele stijl van het mondstuk
        of ventiel van een drinksysteem, zodat shoppers hun gewenste drinkinterface
        kunnen kiezen en compatibiliteit kunnen garanderen.
    hydration_pack_style:
      name: Drinkrugzak stijl
      description: Specificeert de structurele stijl van het drinksysteem, zoals rugzak
        of vest, om te helpen bij filteren op pasvorm en gebruikssituatie.
    hydration_system_insulation:
      name: Drinksysteem isolatie
      description: Geeft aan of het reservoir en/of de drinkslang geïsoleerd zijn
        om de vloeistoftemperatuur te helpen behouden bij warme of koude omstandigheden.
    hydration_valve_type:
      name: Drinkventiel type
      description: Geeft de stijl aan van het drinkventiel of mondstuk dat bij het
        systeem of de fles wordt geleverd, inclusief gangbare bijtventiel- en high-flow
        mondstukontwerpen.
    hydraulic_fluid_type:
      name: Hydraulische vloeistof type
      description: Specificeert het type remvloeistof waarvoor een hydraulische fietsremhendel
        is ontworpen. Deze informatie is essentieel voor onderhoud en veiligheid.
    hydrogenation_level:
      name: Hydrogeneringsniveau
      description: Geeft aan of het vet niet-gehydrogeneerd, gedeeltelijk gehydrogeneerd
        of volledig gehydrogeneerd is, wat invloed heeft op het transvetgehalte en
        de bakprestaties.
    hydrophobicity_level:
      name: Hydrofobiciteitsniveau
      description: Geeft de mate van waterpareling-/afvloeiingsprestaties aan die
        door het product wordt vermeld.
    ice_cream_format:
      name: IJs formaat
      description: Beschrijft de fysieke vorm of presentatie van het ijsproduct (bijv.
        pint, reep, mochi).
    ice_skate_sharpener_type:
      name: Schaatsenslijper type
      description: Classificeert het algemene ontwerp of formaat van de slijper (handsteen,
        elektrische machine, mal, enz.).
    ice_temperature_suitability:
      name: IJs temperatuurgeschiktheid
      description: Geeft het ijstemperatuurbereik aan waarvoor de hockeystickwax is
        ontwikkeld, met invloed op de prestaties en sneeuwafstotende eigenschappen.
    icing_sugar_variety:
      name: Icing sugar variant
      description: Classificeert de formulering of functionele soort icing sugar (bijv.
        fondant, non-melting snow powder, gekleurd, gearomatiseerd).
    ignition_coil_configuration:
      name: Bobineconfiguratie
      description: Specificeert de vormfactor van de bobine (enkele bobine/coil-on-plug,
        bobinemodule met meerdere uitgangen per cilinderaantal, bobinerail/-cassette
        of verdelerstijl).
    ignition_lead_compliance_standard:
      name: Ontstekingskabel nalevingsnorm
      description: Formele industrienorm of certificering waaraan de ontstekingskabel(s)
        volgens de fabrikant voldoen (bijv. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Ontstekingskabel isolatiemateriaal
      description: Primair isolatie-/mantelmateriaal dat wordt gebruikt op de ontstekingskabel
        (buitenkabelisolatie).
    ignition_lead_set_type:
      name: Ontstekingskabel set type
      description: Of het product een enkele ontstekingskabel of een complete set
        is, en waarvoor de set bedoeld is.
    ignition_lead_terminal_type:
      name: Ontstekingskabel aansluitklem type
      description: Aansluitklem-/connectorstijl die wordt gebruikt aan de uiteinden
        van de ontstekingskabel (bijv. bougieklem en bobine-/verdelerklemstijl).
    illumination_type:
      name: Verlichting type
      description: Specificeert of en hoe de bal verlicht is voor spelen in het donker
        (bijv. fosforescerende gloed, impact-geactiveerde led).
    immobilizer_installation_type:
      name: Installatietype startonderbreker
      description: Geeft aan hoe de startonderbreker wordt geïnstalleerd of met het
        voertuig wordt verbonden.
    immobilizer_unlock_method:
      name: Startonderbreker ontgrendelingsmethode
      description: Specificeert hoe de startonderbreker wordt ingeschakeld/uitgeschakeld
        of ontgrendeld.
    impact_protection_certifications:
      name: Impactbescherming certificeringen
      description: Noemt de specifieke veiligheidsnorm(en) waaraan de beschermende
        pad voldoet of die deze overtreft.
    impact_protection_level:
      name: Impactbeschermingsniveau
      description: Specificeert het impactbeschermingsniveau of de impactbeschermingstechnologie
        die de tok biedt.
    impact_protection_rating:
      name: Impactbescherming beoordeling
      description: Specificeert het gecertificeerde impactbeschermingsniveau volgens
        normen (bijv. EN 1621-1 Niveau 1, EN 14120 Niveau 2), zodat rijders kunnen
        filteren op beter passende bescherming.
    impact_surface_material:
      name: Impactoppervlakmateriaal
      description: Beschrijft het primaire impact-/slagoppervlakmateriaal voor veiligheid
        en gevoel (bijv. foam, kunststof).
    incense_base_material:
      name: Wierookbasis materiaal
      description: Primair basis-/bindmateriaal dat wordt gebruikt om de wierookbasis
        in de kit te maken.
    incense_making_method:
      name: Wierook maken methode
      description: Het beoogde maakproces dat door de kit wordt ondersteund.
    incense_tool_type:
      name: Wierookgereedschap type
      description: Specificeert welk type wierookmaakgereedschap dit product is (gebruikt
        om wierook te vormen, meten, persen, mengen of drogen).
    incline_adjustment_type:
      name: Hellingsverstelling type
      description: Beschrijft hoe, en of, de helling tijdens trainingen kan worden
        aangepast.Geeft meegeleverde extra’s aan, zoals reservekoppen/-bits, opbergcase,
        oplaadkabel of AC-adapter.
    included_accessories:
      name: Inbegrepen accessoires
      description: De lijst bevatte extra's zoals reservekoppen/bits, opbergdozen,
        een Charge of een netadapter.
    included_case_type:
      name: Inbegrepen type koffer
      description: Type draag-/opbergcase dat bij de bassaxofoon wordt meegeleverd,
        indien van toepassing.
    included_components:
      name: Meegeleverde onderdelen
      description: Geeft aan wat er in de verpakking is inbegrepen, nuttig voor gereedschapssets
        en bundels.
    included_fastener_components:
      name: Meegeleverde sluiting onderdelen
      description: Specificeert of het product een haak-en-oogset, alleen haken, alleen
        ogen of een verwante variant van een kledingsluiting is.
    included_hydration_vessel_type:
      name: Meegeleverd drinkreservoir type
      description: Geeft de stijl aan van het drinkreservoir dat bij de riem wordt
        meegeleverd of door de riem wordt ondersteund.
    included_items_woodwind_instrument:
      name: Meegeleverde items (houtblaasinstrument)
      description: Geeft aan welke vaak gebundelde items bij het bassaxofoonpakket
        worden meegeleverd.
    included_materials:
      name: Meegeleverde materialen
      description: Geeft aan welke onderdelen bij de aankoop van het patroon zijn
        inbegrepen (alleen patroon versus patroon + materialen).
    included_mounting_accessories:
      name: Meegeleverde montageaccessoires
      description: Vermeldt welke montage-/bevestigingsaccessoires bij de speakerphone
        zijn inbegrepen.
    included_pump_type:
      name: Meegeleverd pomp type
      description: Geeft aan welk type pomp bij het luchtbed wordt meegeleverd of
        erin is geïntegreerd.
    included_scraper_implement_type:
      name: Meegeleverd schraapinstrument type
      description: Geeft aan welk(e) speelinstrument(en) bij de muzikale schraper
        zijn inbegrepen (bijv. schraapstok/-staaf, draadborstel).
    indicator_design:
      name: Indicator ontwerp
      description: Classificeert de fysieke vorm of stijl van de visbeetindicator.
    indicator_functions_tracked:
      name: Indicator gevolgde functies
      description: Vermeldt de specifieke wedstrijdstatistieken die de indicator bijhoudt,
        zoals ballen, strikes, outs, innings, pitch count, overs, wickets, score of
        downs.
    indoor_outdoor_use:
      name: Binnen-/buitengebruik
      description: Geeft aan of het bowlingspeelgoed bedoeld is voor gebruik binnenshuis,
        buitenshuis of voor beide.
    inflatable_decoration_items_included:
      name: Meegeleverde opblaasdecoratie items
      description: Vermeldt de belangrijkste accessoires die bij de opblaasdecoratie
        zijn inbegrepen (bijv. blower, grondpennen, scheerlijnen).
    inflatable_decoration_type:
      name: Opblaasdecoratie type
      description: Specificeert het soort opblaasbare feestdecoratie (vorm/factor)
        ter ondersteuning van browsen en filteren.
    inflatable_raft_float_features:
      name: Opblaasbaar vlot/drijver kenmerken
      description: Functionele kenmerken die aanwezig zijn op het opblaasbare vlot/de
        drijver.
    inflation_method_included:
      name: Meegeleverde oppompmethode
      description: Specificeert welk type oplossing voor het oppompen van banden bij
        de reparatieset is inbegrepen, indien van toepassing.
    infused_scent:
      name: Geïnfuseerde geur
      description: Geeft geur- of smaakadditieven aan die in het aasmateriaal zijn
        geïmpregneerd.
    ingredient_base_type:
      name: Ingrediënt basis type
      description: Geeft de primaire basis aan die voor fermentatie wordt geleverd
        (bijv. druivensapconcentraat versus vers sap versus fruitconcentraat).
    ingredient_physical_form:
      name: Ingrediënt fysieke vorm
      description: Specificeert de fysieke vorm waarin het geuringrediënt wordt geleverd
        (gebruikt voor hantering, meten en formulering).
    ingredient_processing_method:
      name: Verwerkingsmethode ingrediënt
      description: Specificeert de primaire verwerkingstechniek die op het ingrediënt
        is toegepast (bijv. gevriesdroogd, geroosterd, gefermenteerd).
    ink_colors_included:
      name: Meegeleverde inktkleuren
      description: Specificeert de inktkleuren die zijn inbegrepen in de stempelkussen(s)
        in de set.
    ink_pad_application_method:
      name: Inktkussen toepassingsmethode
      description: Hoe de inkt vanuit het kussen wordt afgegeven/gebruikt (traditioneel
        stempelkussen versus dabber versus penseelpuntkussen).
    ink_pad_permanence:
      name: Inktkussenpermanentie
      description: Of de gestempelde inkt permanent en/of archiefbestendig is (bestand
        tegen vervaging en water zodra deze droog is).
    ink_pad_size:
      name: Inktkussen maat
      description: Gestandaardiseerde maat/vormfactor van het oppervlak/de behuizing
        van het inktkussen.
    ink_pad_special_effects:
      name: Inktkussen speciale effecten
      description: Speciale visuele/functionele effecten van de inkt wanneer deze
        wordt gestempeld (bijv. metallic, glitter).
    ink_permanence:
      name: Inkt permanentie
      description: Geeft aan of de gedroogde sumi-inkt bedoeld is als permanent/archiefbestendig
        of uitwasbaar/niet-permanent.
    ink_preparation_required:
      name: Inkt voorbereiding vereist
      description: Geeft aan of de sumi-inkt gebruiksklaar is of vóór gebruik moet
        worden verdund met water of gemalen.
    inline_skate_brake_type:
      name: Inline skate rem type
      description: Specificeert de remconfiguratie die bij inline skates is inbegrepen,
        zoals een verwijderbare hielrem of geen rem.
    inner_tent_configuration:
      name: Binnentent configuratie
      description: Specificeert de configuratie of stijl van de binnentent, bijvoorbeeld
        volledige inzet, mesh-inzet of thermische voering.
    innerspring_coil_type:
      name: Binnenvering spoel type
      description: Specificeert de constructiestijl van het binnenveringssysteem in
        de matras, dat invloed heeft op ondersteuning, bewegingsisolatie en prijs.
    input_connector_type:
      name: Type ingangsconnector
      description: Specificeert het type audio-ingangsconnector dat door het pedaal
        wordt gebruikt (meestal 1/4-inch TS).
    input_valve_type:
      name: Inlaatventiel type
      description: Geeft de ventielstandaard aan die aanwezig is op de fietsband/band
        en waarop de adapter wordt aangesloten.
    insecticide_treatment:
      name: Insecticide behandeling
      description: Geeft aan of het net in de fabriek met insecticide is behandeld
        en, zo ja, welk behandelingstype wordt gebruikt voor extra bescherming.
    insert_coverage_area:
      name: Inzet dekking gebied
      description: Specificeert welk deel van de voet de inzet is ontworpen om te
        bedekken (bijv. volledige lengte, alleen hiel).
    insert_length_type:
      name: Type inzetlengte
      description: Geeft aan hoeveel van het voetbed de steunzool bedekt.
    inside_message_type:
      name: Binnenbericht type
      description: Geeft aan of de kaart aan de binnenkant een voorgedrukte boodschap
        bevat en of deze aanpasbaar is.
    insole_attachment_method:
      name: Bevestigingsmethode steunzool
      description: Specificeert hoe de steunzool in de schoen op zijn plaats blijft
        (los inleggen, zelfklevende achterkant, klittenband, enz.).
    insole_material:
      name: Steunzool materiaal
      description: Beschrijft het materiaal van het voetbed of de steunzool waarop
        de voet rust en dat invloed heeft op demping en ondersteuning.
    installation_fabrication_level:
      name: Installatie fabricageniveau
      description: Geeft de gebruikelijke hoeveelheid maatwerkfabricage of aanpassing
        aan die nodig is om de set te installeren.
    installation_location:
      name: Installatie locatie
      description: Specificeert het gebruikelijke installatiepunt voor de oliedruksensor
        in het oliesysteem van de motor (bijv. blokoliekanaal, filterbehuizing, sandwichplaat
        of externe leidingmontage).
    installation_method:
      name: Installatiemethode
      description: Specificeert hoe de mat of tegel op de vloer wordt bevestigd of
        geïnstalleerd.
    instant_coffee_form:
      name: Instantkoffie vorm
      description: Beschrijft de fysieke vorm waarin de instantkoffie wordt geleverd,
        met invloed op bereidingsmethode en houdbaarheid.
    instep_coverage:
      name: Wreef dekking
      description: Specificeert of het product alleen het scheenbeen beschermt of
        zowel het scheenbeen als de wreef/voet.
    instruction_format:
      name: Instructie formaat
      description: Formaat van de instructies die bij de set zijn inbegrepen.
    instrument_cleaning_swab_form_factor:
      name: Instrumentreinigingswisser vormfactor
      description: Specificeert de fysieke stijl van de wisser (bijv. doortrekdoek
        versus staaf-/borstelsysteem), passend bij de voorkeur van de speler en de
        beperkingen van het instrument.
    instrument_dimensions_unit_context:
      name: Instrument afmetingen eenheid context
      description: Verduidelijkt waar de opgegeven hoogte-/breedte-/lengtematen naar
        verwijzen (bijv. volledig instrument, lengte van één buis, standaardhoogte).
    instrument_electronics_type:
      name: Instrument elektronica type
      description: Geeft aan of het pickup-/voorversterkersysteem van het instrument
        actief of passief is.
    instrument_key:
      name: Instrumenttoonaard
      description: Specificeert de instrumenttoonaard van de recorder zoals gebruikt
        in catalogi (meestal C of F voor grotere recorders).
    instrument_level:
      name: Instrument niveau
      description: Beoogd spelersniveau voor het aangeboden instrument.
    instrument_part_mounting_method:
      name: Instrument onderdeel montagemethode
      description: Specificeert hoe het onderdeel wordt bevestigd of geïnstalleerd
        (bijv. klembevestiging versus zelfklevend versus schroefbevestiging).
    instrument_parts_included:
      name: Meegeleverde instrument onderdelen
      description: Vermeldt de belangrijkste meegeleverde componenten/onderdelen in
        de doos voor een A-klarinet.
    instrument_playing_technique:
      name: Instrument speeltechniek
      description: Hoe het instrument meestal wordt bespeeld/geactiveerd (bijv. geschud,
        aangeslagen, geklakt).
    instrument_size_class:
      name: Instrument maat klasse
      description: Algemene maat van het instrument, uitgedrukt als shoppervriendelijke
        klasse in plaats van exacte afmetingen.
    insulation_fill_material:
      name: Isolatievulmateriaal
      description: Geeft het primaire materiaal aan dat wordt gebruikt voor de isolatie
        van de jas of het vest.
    integrated_bottom_type:
      name: Geïntegreerd type onderstuk
      description: Geeft aan of het kledingstuk ingebouwde slips, shorts, een turnpakje
        of vergelijkbare onderlagen bevat voor bedekking tijdens beweging.
    integrated_charging_options:
      name: Geïntegreerde oplaadopties
      description: Vermeldt de ingebouwde stroom- of oplaadinterfaces die beschikbaar
        zijn op het nachtkastje.
    integrated_furniture_function:
      name: Geïntegreerde meubel functie
      description: Geeft aan welke extra ingebouwde meubelelementen bij het wandbed
        of frame zijn inbegrepen (bijv. bureau, bank, planken).
    integrated_locking:
      name: Geïntegreerde vergrendeling
      description: Of het rek een geïntegreerd slot bevat voor rek-naar-voertuig en/of
        fiets-naar-rek.
    integrated_power_options:
      name: Geïntegreerde stroom opties
      description: Geeft aan welk type ingebouwde stroom- of oplaadfuncties de kaptafel
        biedt.
    integrated_storage_features:
      name: Geïntegreerde opberg kenmerken
      description: Geeft aan welke extra opberg- of accessoirefuncties het biljartkeurek
        bevat naast keusleuven.
    integrated_tool_functions:
      name: Geïntegreerde gereedschap functies
      description: Extra gereedschapsfuncties die in de hendel zijn geïntegreerd (bijv.
        spaakhaak, ventielkernverwijderaar, hieldruppelaar).
    intended_board_type:
      name: Beoogd board type
      description: Specificeert de stijl van het kiteboard waarvoor de vin is ontworpen
        (bijv. twin tip, surf directional, hydrofoil).
    intended_consumption:
      name: Beoogde consumptie
      description: Specificeert hoe het product bedoeld is om te worden geconsumeerd
        en geeft aan of het veilig rauw kan worden gegeten, moet worden gebakken of
        gedeeltelijk gebakken is.
    intended_craft:
      name: Beoogde handwerktechniek
      description: Primaire handwerkcontext waarvoor de garengeleider is ontworpen.
    intended_culinary_use:
      name: Beoogd culinair gebruik
      description: Geeft de primaire culinaire toepassing van de saus aan, zoals dippen,
        koken of glaceren.
    intended_handlebar_style:
      name: Beoogde stuurstijl
      description: Beschrijft de beoogde stuur- of gebruiksstijl van de hendel (bijv.
        flat-bar, drop-bar, aero). Dit beperkt de compatibiliteit snel zonder extra
        subcategorieën af te dwingen.
    intended_player_role:
      name: Beoogde spelersrol
      description: Specificeert de rol op het veld waarvoor de hoofdbescherming is
        bedoeld (bijv. catcher, umpire).
    intended_playing_surface:
      name: Beoogd speeloppervlak
      description: Oppervlak waarvoor de puck, bal of ring is ontworpen, zoals ijs,
        asfalt, gymzaalvloeren of synthetisch ijs.
    intended_repair_location:
      name: Beoogde reparatielocatie
      description: Waar op de band de set bedoeld is om te repareren.
    intended_seating_position:
      name: Beoogde zitpositie
      description: Specificeert de zitpositie in het voertuig waarin de gordelriem
        bedoeld is om te worden geïnstalleerd of gebruikt.
    intended_sewing_application:
      name: Beoogde naaitoepassing
      description: Beoogde naaitoepassing waarvoor de draad is ontworpen (bijv. algemeen
        kledingnaaien, quilten, bekleding).
    intended_technique:
      name: Beoogde techniek
      description: Primaire vilttechniek waarvoor de pad/mat is ontworpen.
    intended_use:
      name: Beoogd gebruik
      description: Primaire gebruikscontext voor het instrument.
    intended_use_fleece_fabric:
      name: Beoogd gebruik (fleece stof)
      description: Primair project/toepassing waarvoor de fleece stof op de markt
        wordt gebracht.
    intended_user:
      name: Beoogde gebruiker
      description: Geeft aan voor wie de beschermende luchtvaartuitrusting is ontworpen.
    intended_yarn_form:
      name: Beoogde garenvorm
      description: Specificeert de garenvorm die het beste door de garenkom wordt
        ondersteund.
    interaction_mode:
      name: Interactie modus
      description: Primaire interactiemethode die wordt gebruikt om geluiden of activiteiten
        te activeren.
    interactive_effects:
      name: Interactieve effecten
      description: Geeft aan welke interactieve elektronische of mechanische effecten
        bij de keukenspeelset zijn inbegrepen.
    interfacing_application_area:
      name: Vlieseline toepassingsgebied
      description: Geeft aan voor welke gangbare naai-/handwerkgebieden de vlieseline
        bedoeld is om ondersteuning te bieden.
    interfacing_color_family:
      name: Vlieseline kleur familie
      description: Geeft de typische basiskleur van de vlieseline aan voor gebruik
        onder lichte of donkere stoffen.
    interfacing_selling_format:
      name: Vlieseline verkoopformaat
      description: Beschrijft het verkoopformaat van de vlieseline (bijvoorbeeld doorlopende
        snijlengte, voorgesneden stukken, rollen of stalen).
    interfacing_stiffness_level:
      name: Vlieseline stijfheidsniveau
      description: Beschrijft de mate van stijfheid/stevigheid die door de versteviging
        wordt geboden.
    interior_padding_type:
      name: Interieur vulling type
      description: Type binnenvulling of inzetstuk dat in de koffer wordt gebruikt
        om de inhoud te beschermen en te organiseren.
    interior_stall_configuration:
      name: Interieur stal configuratie
      description: Specificeert de indeling/configuratie van het interieur voor het
        vervoeren van dieren (staloriëntatie en compartimentstijl).
    invitation_printing_coverage:
      name: Uitnodiging bedrukking dekking
      description: Welke zijde(n) van de uitnodiging bedrukt zijn (alleen voorkant
        vs. dubbelzijdig).
    iodization:
      name: Jodering
      description: Geeft aan of en in welke mate jodium aan het zout is toegevoegd.
    iridescence_level:
      name: Iridescentie niveau
      description: Beschrijft de intensiteit van de natuurlijke/behandelde iriserende
