    footwear_size_system:
      name: Schoeisel maatsysteem
      description: Geeft de regionale maatstandaard aan die wordt gebruikt voor de
        vermelde schoenmaat (bijv. VS, EU, VK).
    footwear_support_type:
      name: Schoeisel ondersteuningstype
      description: Specificeert het biomechanische ondersteunings- of pronatiecontroleniveau
        dat de schoen biedt (bijv. neutraal, stabiliteit, bewegingscontrole).
    fork_material:
      name: Voorvork materiaal
      description: Specificeert het materiaal dat wordt gebruikt voor de voorvork
        van een fiets, met invloed op stijfheid, gewicht en rijkwaliteit.
    form_factor:
      name: Vormfactor
      description: Primaire hardwarevormfactor van de DMX-controller.
    formula_car_series_class:
      name: Formuleauto serie/klasse
      description: Specificeert de raceserie of klasse waarvoor de formuleauto is
        gebouwd om in uit te komen.
    formulation_style:
      name: Formuleringsstijl
      description: Benadrukt gespecialiseerde samenstellingen die zijn ontworpen voor
        specifieke toepassingen of voorkeuren (bijv. Barista, Extra Creamy).
    formulation_type:
      name: Samenstellingstype
      description: De samenstellingsstijl van de desinfectiespray.
    fossil_preparation_level:
      name: Fossiel voorbereidingsniveau
      description: Mate van voorbereiding/reiniging die op het specimen is uitgevoerd
        (bijv. onvoorbereid in matrix versus volledig voorbereid).
    fossil_preservation_type:
      name: Fossiel conserveringstype
      description: Type fossiele conservering (bijv. permineralisatie, afdruk, mal,
        impressie).
    fossil_restoration_status:
      name: Fossiel restauratiestatus
      description: Of en hoe het specimen is gerepareerd/gerestaureerd (bijv. gelijmd,
        gereconstrueerd, samengesteld).
    foundation_configuration:
      name: Bedbodem configuratie
      description: Specificeert of de bedbodem als één geheel of als gedeelde/tweedelige
        set voor grotere matrasmaten is vervaardigd.
    foundation_profile:
      name: Bedbodem profiel
      description: Classificeert de algemene hoogtecategorie van de bedbodem, bijv.
        ultralaag, laag, standaard of hoog profiel, zodat shoppers snel voorkeuren
        voor matrashoogte en de pasvorm van lakens kunnen afstemmen.
    frame_adjustability:
      name: Verstelbaarheid frame
      description: Geeft aan of en hoe het frame kan worden versteld (bijv. verstelbare
        breedte/hoogte, rotatie/kanteling), wat invloed heeft op ergonomie en pasvorm
        voor projecten.
    frame_drum_jingle_configuration:
      name: Raamtrommel jingles-configuratie
      description: Of de raamtrommel jingles bevat en, zo ja, wat de algemene configuratie
        is.
    frame_drum_tuning_system:
      name: Frametrommel stemsysteem
      description: Hoe de frametrommel wordt gestemd en of deze stembaar is.
    frame_finish:
      name: Frame afwerking
      description: Specificeert de beschermende coating of materiaalafwerking die
        op het frame is aangebracht en invloed heeft op duurzaamheid en esthetiek.
    frame_mounting_standard:
      name: Montagestandaard frame
      description: Definieert de interface-specificatie tussen schoen en frame (bijv.
        195 mm 2-punts, Trinity 3-punts), essentieel voor framecompatibiliteit.
    frame_steel_gauge:
      name: Frame staaldikte
      description: Geeft de dikte (gauge) aan van de stalen buizen die worden gebruikt
        voor de staanders van het rek, een belangrijke indicator voor sterkte en stabiliteit.
    frame_suspension_type:
      name: Frame veringstype
      description: Geeft het veringsontwerp van het fietsframe aan, zoals rigid, hardtail
        of full suspension, om kopers te helpen frames te kiezen die passen bij hun
        beoogde opbouw.
    free_reed_instrument_orientation:
      name: Vrijrietinstrument oriëntatie
      description: Specificeert hoe het instrument wordt vastgehouden/bespeeld (in
        de hand met balg, met schouderriem, enz.) voor ergonomie en filtering op gebruikssituatie.
    free_weight_rack_type:
      name: Vrije gewichtenrek type
      description: Classificeert de structurele stijl of functie van het rek (bijv.
        halterstangrek, kettlebellrek, halterschijfrek).
    freehub_body_type:
      name: Freehub-body type
      description: Specificeert de freehub-body of cassette driver-standaard die wordt
        ondersteund door de achterwielnaaf.
    freehub_driver_standard:
      name: Freehub driverstandaard
      description: Identificeert de cassette/driver-interface die het naafonderdeel
        ondersteunt (bijv. Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Freewheel-schroefdraadstandaard
      description: Specificeert de schroefdraadstandaard of maat van de naaf waarmee
        het freewheel compatibel is.
    french_horn_bell_construction:
      name: Hoorn bekerconstructie
      description: Specificeert hoe de beker is opgebouwd en of deze kan worden verwijderd
        voor transport/onderhoud.
    french_horn_bell_material:
      name: Materiaal Franse hoorn
      description: Specificeert het materiaal/de legering van de beker (en vaak de
        bekerrand) die voor de hoorn wordt gebruikt.
    french_horn_bell_type:
      name: Hoorn bekertype
      description: Constructiestijl van de beker.
    french_horn_finish:
      name: Hoorn afwerking
      description: Afwerking/plating van de buitenkant van het instrument.
    french_horn_included_accessories:
      name: Hoorn meegeleverde accessoires
      description: Accessoires die bij de hoorn worden meegeleverd (koffer, mondstuk,
        enz.).
    french_horn_leadpipe_material:
      name: Materiaal van mondpijp Franse hoorn
      description: Specificeert het materiaal/de legering van de leadpipe.
    french_horn_wrap_type:
      name: Bouwwijze van Franse hoorn
      description: Algemene wikkel-/vormconfiguratie van de hoorn.
    fretboard_radius_fit:
      name: Geschiktheid voor toetsradius
      description: Geeft aan of de kromming van het capo-kussen is ontworpen voor
        vlakke of geronde toetsen, of verstelbaar is voor meerdere toetsradiussen.
    friction_surface_included:
      name: Wrijvingsvlak inbegrepen
      description: Of het vliegwiel een vervangbaar/geïnstalleerd wrijvingsvlak heeft
