    seals_leak_type:
      name: Afdichtingen lekkagetype
      description: Type/locatie van koelsysteemlek waarvoor het product bedoeld is
        om af te dichten.
    seam_construction:
      name: Naadconstructie
      description: Beschrijft hoe de naad van de bal is gemaakt, wat van invloed is
        op swing, duurzaamheid en gevoel.
    seam_design:
      name: Naadontwerp
      description: Specificeert de naadconstructie of decoratieve naadkenmerken van
