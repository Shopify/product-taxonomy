      name: Beeldje schaal
      description: Figurine schaal/verhouding ten opzichte van het echte onderwerp
        (indien van toepassing), bijv. 1:6.
    fill_status:
      name: Vulstatus
      description: Geeft aan of de grappling dummy voorgevuld, ongevuld of gedeeltelijk
        gevuld wordt verkocht, wat bepalend is voor verzendkosten en inspanning voor
        de koper.
    filling_consistency:
      name: Vulling consistentie
      description: Beschrijft de textuur of viscositeit van de vulling zoals geleverd
        (bijv. gladde crème, fruit met stukjes, pasta).
    filling_type:
      name: Vulling type
      description: Specificeert de hoofdvulling of crème in het koekje, indien aanwezig.
    filtration_and_mother_status:
      name: Filtratie en moederstatus
      description: Geeft aan of de azijn gefilterd, ongefilterd of rauw is, of een
        ‘moeder’ bevat, voor consumenten die probiotische of rauwe opties zoeken.
    filtration_method:
      name: Filtratiemethode
      description: Materiaal of techniek gebruikt om de wodka na distillatie te filteren
        en te zuiveren.
    fin_box_system:
      name: Fin box-systeem
      description: Specificeert de fin box of montage-interface die het board gebruikt,
        wat bepalend is voor compatibiliteit met aftermarket vinnen.
    fin_buoyancy:
      name: Vin drijfvermogen
      description: Geeft aan of de vin positief, neutraal of negatief drijvend is
        in water, wat invloed heeft op de trim van de duiker en de balans van de uitrusting.
    fin_flex_rating:
      name: Flexibiliteitswaarde vin
      description: Geeft de relatieve stijfheid of flexgraad van de vin aan, wat invloed
        heeft op de algehele prestaties.
    fin_mounting_system:
      name: Montagesysteem vin
      description: Definieert de bevestigingsinterface of standaard die wordt gebruikt
        om de vin aan het kiteboard te bevestigen (bijv. FCS II, screw-on, 4-hole),
        zodat compatibiliteit tussen vinnen en boards wordt gewaarborgd.
    fin_position:
      name: Vin positie
      description: Specificeert de beoogde montagepositie van de vin op het board.
    fin_strap_type:
      name: Type vinband
      description: Specificeert het type band of retentiesysteem dat wordt gebruikt
        om de vin aan de hiel/voet te bevestigen.
    fin_template:
      name: Vin sjabloon
      description: Categoriseert het hydrodynamische sjabloon of de omtrek van de
        surfboardvin, wat invloed heeft op draaistijl, snelheid en het algemene boardgevoel.
    finger_count:
      name: Vinger aantal
      description: Geeft aan voor hoeveel vingers de handschoen, tab of releasehendel
        is ontworpen.
    finger_coverage:
      name: Vinger bedekking
      description: Geeft aan hoeveel van de vingers bedekt is.
    finger_grip_adjustability:
      name: Vingergreep verstelbaarheid
      description: Geeft aan hoe de vingergreep wordt bevestigd of versteld om op
        verschillende handmaten te passen.
    finger_hole_configuration:
      name: Vingergatenconfiguratie
      description: Specificeert de handoriëntatie van de vingergaten (rechtshandig,
        linkshandig of ambidexter).
    finger_hole_count:
      name: Vingergat aantal
      description: Geeft het aantal vingergaten in het grip leather aan, een belangrijk
        stijlverschil tussen modellen zonder vingers, met 2 gaten, met 3 gaten en
        met 4 gaten.
    finger_pick_band_style:
      name: Vingerplectrum bandstijl
      description: Stijl van de band/lus die aan de vinger wordt bevestigd, wat invloed
        heeft op comfort en verstelbaarheid.
    finger_pick_blade_length:
      name: Vingerplectrum bladlengte
      description: Lengte van het plectrumblad dat vanaf de band uitsteekt.
    finger_pick_blade_shape:
      name: Bladvorm vingerplectrum
      description: Vorm/profiel van het aanslagoppervlak (blad) dat de snaren raakt.
    finger_pick_size:
      name: Vingerplectrum maat
      description: Maatvoering van de band/lus van het vingerplectrum voor verschillende
        vinger- of duimomtrekken (niet instrumentmaat).
    finger_pick_wear_location:
      name: Vingerplectrum draaglocatie
      description: Geeft aan op welke vinger het vingerplectrum bedoeld is om te worden
        gedragen, of dat het product een duim- en vingerplectrumset is.
    finger_protection:
      name: Vingerbescherming
      description: Geeft aan of de handschoen vingerbescherming met spalken bevat
        en of de spalken uitneembaar zijn.
    fingerboard_bearing_type:
      name: Fingerboard lagertype
      description: Specificeert het type lager dat wordt gebruikt in fingerboardwielen.
    fingerboard_grip_type:
      name: Type gripvlak vingerboard
      description: Specificeert het materiaal/type van het gripoppervlak dat op het
        fingerboarddeck wordt gebruikt.
    fining_agent_active_ingredient:
      name: Actief ingrediënt klaringsmiddel
      description: Primair klaringsmiddel of klarend middel dat in het product wordt
        gebruikt.
    fining_agent_type:
      name: Type klaringsmiddel
      description: Specificeert de chemische samenstelling of het materiaal van het
        klaringsmiddel voor producten die rode wijn klaren.
    finish_after_baking:
      name: Afwerking na het bakken
      description: Beschrijft het typische uiterlijk van het oppervlak na uitharding/bakken.
    finish_effect:
      name: Afwerkingseffect
      description: Beschrijft speciale oppervlakte- of optische effecten die op de
        strass-steen zijn aangebracht.
    finish_type:
      name: Afwerkingstype
      description: Oppervlakteafwerking aangebracht op de body van de ukelele.
    finished_product_format:
      name: Eindproductformaat
      description: Specificeert het type geurproduct waarvoor de kit bedoeld is.
    fire_pit_accessories_included:
      name: Inbegrepen vuurkorfaccessoires
      description: Vermeldt belangrijke accessoires die bij de vuurkorf worden geleverd,
        zoals vonkenschermen of lavastenen, zodat duidelijk is wat er in de doos zit.
    firework_assortment_launch_type:
      name: Vuurwerkassortiment afsteekwijze
      description: Beschrijft hoe het meegeleverde vuurwerk doorgaans wordt aangestoken/afgeschoten.
    firework_assortment_types_included:
      name: Vuurwerkassortiment inbegrepen typen
      description: Identificeert de belangrijkste vuurwerktypen in het assortiment
        om shoppers te helpen de inhoud van bundels te vergelijken (bijv. fonteinen,
        Romeinse kaarsen, knalvuurwerk).
    firework_effect_types:
      name: Vuurwerkeffecttypen
      description: Belangrijkste visuele en/of zintuiglijke effectfamilies die door
        het assortiment worden geproduceerd (selecteer alles wat van toepassing is).
    firework_ignition_method:
      name: Vuurwerk ontstekingsmethode
      description: Specificeert hoe het vuurwerk wordt aangestoken of geactiveerd
        (bijv. lont of elektrische ontsteker).
    firework_visual_intensity_level:
      name: Vuurwerk visueel intensiteitsniveau
      description: Algehele visuele intensiteit/hoeveelheid vonken voor het fonteineffect.
    firing_mode:
      name: Schietmodus
      description: Vermeldt de selecteerbare of primaire schietmodi die het airsoftwapen
        ondersteunt.
    first_day_cover_cachet_type:
      name: Type stempel eerste-dag-envelop
      description: Type cachet op de eerstedagenvelop (bijv. gedrukt, met de hand
        geschilderd).
    first_day_cover_cancellation_type:
      name: Afstempelingstype eerstedagenvelop
      description: Type/stijl postafstempeling aangebracht op de eerstedagenvelop
        (bijv. machineafstempeling, handafstempeling).
    first_day_cover_set_type:
      name: Settype eerstedagenvelop
      description: Geeft aan of de envelop een enkele uitgave, een volledige set of
        een subset/combinatie vertegenwoordigt.
    fishing_hook_size:
      name: Vishaakmaat
      description: 'Specificeert de gestandaardiseerde maataanduiding van de vishaak
        (bijv. #4, 1/0, 10/0), zodat vissers de haakafmetingen kunnen afstemmen op
        de doelsoort en het aas.'
    fishing_hook_style:
      name: Vishaakstijl
      description: Identificeert het specifieke ontwerp of buigpatroon van de enkele
        haak, wat invloed heeft op presentatie, haakefficiëntie en beoogde toepassingen.
    fishing_hook_type:
      name: Vishaaktype
      description: Beschrijft de haakconfiguratie die bij de vislepel wordt meegeleverd,
        indien aanwezig.
    fishing_line_application:
      name: Vislijn toepassing
      description: Identificeert het beoogde gebruik van de vislijn of het onderlijnmateriaal
        (bijv. onderlijn, hoofdlijn, tippet).
    fishing_line_buoyancy_type:
      name: Vislijn drijfvermogentype
      description: Classificeert hoe de lijn zich in de waterkolom gedraagt (bijv.
        drijvend, intermediate, zinkend), zodat vissers een geschikte dieptepresentatie
        kunnen kiezen.
    fishing_needle_purpose:
      name: Doel visnaald
      description: Identificeert de primaire toepassing van de naald bij vistuigmontage.
    fishing_needle_types_included:
      name: Inbegrepen typen visnaalden
      description: Vermeldt de specifieke naald- of riggingtoolstijlen die in de set
        worden geleverd, zodat klanten snel de inhoud van de kit kunnen zien.
    fit_profile:
      name: Pasvormprofiel
      description: Beschrijft de algehele snit en het silhouet van de pad, wat invloed
        heeft op bewegingsvrijheid en bedekking.
    fit_volume_classification:
      name: Pasvolumeclassificatie
      description: Categoriseert het totale interne volume van de laars zoals door
        merken op de markt gebracht (bijv. LV voor low volume).
    fitting_angle:
      name: Fittinghoek
      description: Specificeert de buighoek van de fittingbehuizing (bijv. recht,
        45°, 90°). Gebruik 'Verstelbaar / draaibaar' voor fittingen met variabele
        hoek en 'Overig' voor ongebruikelijke hoeken.
    flag_base_type:
      name: Type vlagvoet
      description: Definieert de verankerings- of voetstijl die wordt gebruikt om
        de hoekvlag op verschillende speeloppervlakken te bevestigen.
    flag_design_theme:
      name: Ontwerpthema vlag
      description: Beschrijft het primaire ontwerpthema op de vlag (bijv. land/nationaal,
        sportteam, feestdag), ter ondersteuning van vindbaarheid en filtering voor
        doelgericht winkelen.
    flag_mounting_method:
      name: Montagemethode vlag
      description: Specificeert hoe de vlag aan het voertuig wordt bevestigd (bijv.
        antennebevestiging, trekhaakbevestiging, magnetisch).
    flag_type:
      name: Vlagtype
      description: Classificeert het specifieke doel of type van de golfvlag, zoals
        pinvlag, karvlag of trainingsvlag.
    flame_resistance_standard:
      name: Vlamwerendheidsnorm
      description: Geeft aan aan welke specifieke vlamwerende of vlamboogbestendige
        norm/certificering het kledingstuk voldoet.
    flamenco_cajon_snare_system:
      name: Flamenco cajon snare systeem
      description: Specificeert het interne snaremechanisme dat wordt gebruikt om
        de kenmerkende flamenco-buzz te creëren (of geen).
    flammability_compliance:
      name: Brandbaarheidsconformiteit
      description: Specificeert de toepasselijke brandbaarheidsnorm(en) waaraan de
        stof voor voertuiginterieurs voldoet.
    flannel_brushing_finish:
      name: Flanel ruwingsafwerking
      description: Geeft aan of het flanel geruwd is en aan welke zijde(n), wat invloed
        heeft op zachtheid, warmte en uiterlijk.
    flannel_use_type:
      name: Flanel gebruikstype
      description: Primaire beoogde toepassing voor het gesneden flanel/de flanelrol.
    flap_configuration:
      name: Zadelbladconfiguratie
      description: Specificeert de zadelklepstijl, zoals monoflap of dubbele klep.
    flare_color:
      name: Flare kleur
      description: Kleur van het uitgestraalde licht/de vlam (of lenskleur voor LED-flares).
    flash_card_included_features:
      name: Flashcard meegeleverde kenmerken
      description: Benadrukt functionele leer-/gebruikskenmerken die bij de flashcards
        zijn inbegrepen.
    flavor_intensity:
      name: Smaakintensiteit
      description: Geeft aan hoe geconcentreerd het smaakproduct is, zodat gebruikers
        de juiste dosering kunnen bepalen (bijv. standaardsterkte, supersterk).
    flavor_solvent_base:
      name: Smaakstof oplosmiddelbasis
      description: Geeft de primaire drager of het oplosmiddel aan dat in de smaakstof
        wordt gebruikt (bijv. alcohol, propyleenglycol, glycerine).
    fleece_fiber_animal_type:
      name: Fleecevezel diersoort
      description: De dierlijke bron van de fleecevezel (soort).
    fleece_finish_surface:
      name: Fleece afwerking/oppervlak
      description: Beschrijft het oppervlak/de afwerking van fleece (bijv. anti-pilling,
        geruwd), wat invloed heeft op de pilbestendigheid, zachtheid en uitstraling.
    fleece_preparation_method:
      name: Fleece voorbereidingsmethode
      description: Hoe de fleece wordt voorbereid/verwerkt voor handwerken en spinnen
        (staat van de vezel).
    flesh_color:
      name: Vruchtvleeskleur
      description: Specificeert de kleur van het vruchtvlees van de meloen.
    fletching_orientation:
      name: Oriëntatie van de bevedering
      description: Specificeert hoe de bevedering op de schacht is geplaatst (bijv.
        recht, offset, spiraalvormig), wat invloed heeft op de spin en vlucht van
        de pijl.
    fletching_profile:
      name: Profiel van de bevedering
      description: Definieert de geometrische vorm of snit van de bevedering, wat
        invloed heeft op luchtweerstand, speling, geluid en de algemene vluchtkenmerken
        van de pijl.
    flight_system_type:
      name: Flight-systeemtype
      description: Identificeert de constructiestijl van de flight, met onderscheid
        tussen opvouwbare, gegoten en geïntegreerde flight-en-shaft-systemen.
    float_attachment_method:
      name: Bevestigingsmethode dobber
      description: Beschrijft hoe de dobber aan de lijn is bevestigd (bijv. schuivend
        of vast), zodat vissers kunnen filteren op montagestijl.
    float_design:
      name: Dobber ontwerp
      description: Classificeert de algemene stijl of het type visdobber (bijv. ronde
        dobber, waggler, pendobber), zodat vissers snel een model kunnen kiezen dat
        past bij hun techniek en omstandigheden.
    float_raft_use_environment:
      name: Dobber/vlot gebruiksomgeving
      description: Primaire beoogde wateromgeving voor het opblaasbare product (zwembad
        versus rustig open water versus branding), met het oog op verwachtingen rond
        duurzaamheid en ontwerp.
    floatation:
      name: Drijfvermogen
      description: Geeft aan of het baken is ontworpen om in water te blijven drijven.
    floor_construction_type:
      name: Type vloerconstructie
      description: Specificeert het ontwerp van de vlotvloer (bijv. zelflozend, drop-stitch),
        wat invloed heeft op afwatering, stijfheid en prestaties.
    floor_design:
      name: Vloerontwerp
      description: Stijl van de vloerbedekking die bij de omheining wordt meegeleverd.
    floor_inclusion:
      name: Grondzeil inbegrepen
      description: Geeft aan of de voortent een grondzeil bevat en of dit grondzeil
        verwijderbaar is.
    floor_mat_cleaning_method:
      name: Vloermat reinigingsmethode
      description: Geeft de door de fabrikant aanbevolen primaire reinigingsmethode
        voor de vloermat aan.
    floor_mat_edge_style:
      name: Vloermat randstijl
      description: Beschrijft of de mat verhoogde randen/een opstaande rand heeft
        om gemorste vloeistoffen en vuil tegen te houden.
    floor_mat_format:
      name: Vloermat formaat
      description: Definieert het fysieke formaat of de stijl van het vloerbeschermingsproduct
        (bijv. losse mat, kliktegel, rol).
    floor_mat_retention_system:
      name: Vloermat bevestigingssysteem
      description: Specificeert de methode die wordt gebruikt om de mat op zijn plaats
        te houden.
    floor_mat_set_configuration:
      name: Vloermat setconfiguratie
      description: Geeft aan welke posities in de verpakking zijn inbegrepen (bijv.
        alleen voorste paar, volledige set).
    floss_sugar_granulation_grade:
      name: Suikerspinsuiker korrelgrootte
      description: Beschrijft de kristalgrootte van het suikermengsel (fijn, middelgrof,
        grof), wat invloed kan hebben op de prestaties van de machine en de uiteindelijke
        textuur.
    floss_sugar_product_form:
      name: Suikerspinsuiker productvorm
      description: Geeft aan of de suikerspinsuiker gebruiksklaar is, een smaakconcentraat
        is dat met basissuiker moet worden gemengd, of een kleurloze basissuiker is.
    flour_grind_texture:
      name: Meel maalgraadtextuur
      description: Geeft de maalgraad of textuur van het meel aan, zoals superfijn,
        middelgrof, grof of steengemalen, wat invloed kan hebben op de receptprestaties.
    flour_processing_method:
      name: Bloemverwerkingsmethode
      description: Beschrijft opvallende verwerkings- of behandelingsmethoden die
        op het meel zijn toegepast (bijv. steengemalen, gebleekt, gekiemd, verrijkt)
        en die invloed hebben op smaak, kleur of voedingswaarde.
    flower_care_instructions:
      name: Bloemen verzorgingsinstructies
      description: Geeft aanbevolen verzorgingsstappen specifiek voor verse snijbloemen
        (bijv. stelen bijsnijden, water regelmatig verversen).
    flugelhorn_leadpipe_material:
      name: Bugel mondpijpmateriaal
      description: Materiaal van de leadpipe (indien apart gespecificeerd van het
        algehele materiaal van het instrument).
    flugelhorn_trigger_type:
      name: Bugel triggertype
      description: Geeft aan of de bugel een stemtrigger bevat en op welke schuif/ventiel
        deze werkt.
    fluorescence_grade:
      name: Fluorescentiegraad
      description: Geeft de intensiteit van de fluorescentie van de diamant aan wanneer
        deze wordt blootgesteld aan UV-licht.
    fluorescence_under_uv:
      name: Fluorescentie onder UV
      description: Geeft aan of/welk type fluorescentie het specimen vertoont onder
        ultraviolet licht.
    fluorocarbon_content:
      name: Fluorkoolstofgehalte
      description: Geeft aan of de wax fluorkoolstofadditieven bevat en in welke concentratie.
    flute_case_capacity:
      name: Fluit kofferinhoud
      description: Geeft aan waarvoor de koffer is ontworpen, naast de hoofdfluit
        zelf (bijv. fluit + piccolo, extra kopstuk).
    flute_cleaning_rod_tip_type:
      name: Fluit reinigingsstok tiptype
      description: Beschrijft het ontwerp van het uiteinde van de stok dat het doekje/de
        wisser vasthoudt of contact maakt met het instrument (bijv. met sleuf, met
        schroefdraad, met oogje).
    flute_footjoint_type:
      name: Fluit voetstuktype
      description: Specificeert de voetstukconfiguratie van de fluit.
    flute_headjoint_cork_type:
      name: Fluit kopstukkurktype
      description: Specificeert het materiaal/type kopstukkurk/stopperconstructie
        die bij het kopstuk wordt meegeleverd.
    flute_key_system:
      name: Sleutelsysteem fluit
      description: Identificeert het mechaniek-/kleppensysteem dat door de fluit wordt
        gebruikt (bijv. Böhm-systeem), waar van toepassing.
    flute_keywork_material:
      name: Materiaal kleppenmechanisme fluit
      description: Materiaal en/of plating van de kleppen (keywork), wanneer dit afzonderlijk
        van het materiaal van de body wordt gespecificeerd.
    flute_offset_g:
      name: Fluit offset G
      description: Specificeert of de fluit een offset-G-klepindeling heeft.
    flute_wall_thickness:
      name: Fluit wanddikte
      description: Wanddiktecategorie van de fluitbuis (dunwandig, standaard, dikwandig).
    fly_pattern_type:
      name: Type kunstvlieg
      description: Classificeert de kunstvlieg op hengelstijl of imitatie van insect/voedsel,
        zodat vissers snel kunnen filteren op de juiste vliegstijl.
    fly_rod_style:
      name: Vliegenhengel stijl
      description: Classificeert de hengel op basis van de beoogde werpdiscipline
        of toepassing (bijv. single-hand, switch, spey).
    fly_style:
      name: Type gulp
      description: Specificeert het type gulp of opening aan de voorkant van de lange
        onderbroek.
    fly_tying_tools_included:
      name: Meegeleverde vliegbindgereedschappen
      description: Vermeldt de specifieke vliegbindgereedschappen die in de set worden
        meegeleverd, zodat kopers precies weten wat inbegrepen is en sets kunnen vergelijken.
    fly_type:
      name: Gulptype
      description: Specificeert of de lange onderbroek een functionele gulp heeft
        en welke stijl die gulp heeft.
    flyer_hook_mounting_method:
      name: Vluchthaak bevestigingsmethode
      description: Geeft aan hoe de haak aan de vlucht wordt bevestigd (bijv. inschroeven
        of indrukken), wat invloed heeft op installatiegemak en compatibiliteit.
    flyer_hook_orientation:
      name: Vluchthaak oriëntatie
      description: Geeft aan of de haak bedoeld is voor de linker- of rechterzijde
        van de vlucht, of omkeerbaar/universeel is.
    flyer_kit_finish_coating:
      name: Vluchtset afwerking/coating
      description: Oppervlakteafwerking die is aangebracht op de onderdelen van de
        vluchtset.
    flyer_kit_included_components:
      name: Vluchtset meegeleverde onderdelen
      description: Geeft aan welke onderdelen in de set zijn inbegrepen.
    flyer_orifice_type:
      name: Vlucht openingstype
      description: Specificeert de stijl van de opening die op de flyer wordt gebruikt.
    flying_disc_feature_set:
      name: Frisbee functieset
      description: Opvallende functionele kenmerken van de frisbee.
    flysheet_material:
      name: Buitentent materiaal
      description: Geeft de hoofdstof aan die wordt gebruikt voor de buitentent/flysheet,
        met invloed op gewicht, duurzaamheid en weersbestendigheid.
    flywheel_balance_type:
      name: Vliegwiel balanstype
      description: Geeft aan of het vliegwiel neutraal gebalanceerd is of een extern
        onbalansgewicht gebruikt.
    foam_blocks_size_class:
      name: Foamblokken maatklasse
      description: Geeft de algemene maatklasse van blokken in de set aan.
    foam_blocks_surface_texture:
      name: Foamblokken oppervlaktextuur
      description: Beschrijft het gevoel/de afwerking van het buitenoppervlak van
        de foamblokken.
    foam_surface_effect:
      name: Foam oppervlakeffect
      description: Beschrijft veelvoorkomende decoratieve oppervlakeffecten die worden
        aangebracht op knutselfoam of styrofoam, zoals glitter, metallic of holografische
        afwerkingen.
    foil_color:
      name: Folie kleur
      description: Specificeert de folieaccentkleur die op het certificaat wordt gebruikt
        (indien van toepassing).
    foil_curtain_mounting_method:
      name: Foliegordijn bevestigingsmethode
      description: Hoe het foliegordijn bedoeld is om te worden geïnstalleerd of opgehangen
        (bijv. plakstrip, zeilringen).
    foil_discipline:
      name: Foil discipline
      description: Geeft de primaire rijstijl of discipline aan waarvoor de foil is
        ontworpen.
    foil_mast_board_mounting_type:
      name: Foilmast boardbevestigingstype
      description: Definieert de interface aan de bovenkant van de mast die aan het
        board of de foil track wordt bevestigd.
    foil_mast_fuselage_connection_type:
      name: Foilmast fuselage-verbindingstype
      description: Specificeert hoe de mast wordt verbonden met de fuselage of de
        frontwing-assemblage.
    foil_mounting_interface:
      name: Bevestigingsinterface folie
      description: Geeft de verbindingsstandaard aan die het onderdeel gebruikt om
        aan het board of andere foilcomponenten te worden bevestigd.
    foil_mounting_system:
      name: Montagesysteem folie
      description: Specificeert de bevestigingsinterface voor foils of vinnen op het
        board, zodat compatibiliteit met de bestaande hardware van de rijder wordt
        gewaarborgd.
    foil_mounting_type:
      name: Type foliemontage
      description: Geeft het interfacesysteem aan dat wordt gebruikt om de foil aan
        het board te bevestigen, zodat compatibiliteit tussen componenten wordt gewaarborgd.
    fold_over_elastic_application:
      name: Omslagelastiek toepassing
      description: Primaire beoogde toepassing voor knoopsgatelastiek.
    foldability:
      name: Inklapbaarheid
      description: Beschrijft of en hoe de verdeler kan worden ingeklapt voor opslag
        of herconfiguratie.
    foldability_stow:
      name: Inklapbaarheid (opbergen)
      description: Of het rek kan worden ingeklapt/opgeborgen wanneer het niet in
        gebruik is (bijv. omhooggeklapt tegen het voertuig).
    folding_style:
      name: Vouwstijl
      description: Geeft aan hoe de crashpad wordt gevouwen voor transport en opslag,
        met invloed op de gelijkmatigheid van het landingsoppervlak en de meeneembaarheid.
    food_basket_items_included:
      name: Voedselmand meegeleverde items
      description: Vermeldt de belangrijkste typen voedselitems die in de mand zijn
        inbegrepen, zodat shoppers manden kunnen kiezen die aansluiten bij de smaak
        of dieetbehoeften van ontvangers.
    food_coloring_form:
      name: Voedingskleurstof vorm
      description: Specificeert de fysieke vorm of leveringsvorm waarin de voedingskleurstof
        wordt geleverd (bijv. gel, vloeistof, poeder, spray).
    food_contact_material:
      name: Voedselcontactmateriaal
      description: Primair materiaal van wijnbereidingsapparatuuritems (vergistingstanks,
        hevels, trechters) die met most/wijn worden gebruikt.
    food_packing_medium:
      name: Voedsel verpakkingsmedium
      description: Specificeert het medium waarin fruit of groenten zijn verpakt (bijv.
        water, pekel, siroop, olie).
    foosball_rod_type:
      name: Tafelvoetbalstang type
      description: Geeft de mechanische configuratie van de stang aan die invloed
        heeft op het spelgevoel en de veiligheid.
    foot_arch_type_compatibility:
      name: Voetboogtype compatibiliteit
      description: Geeft het voetboogprofiel aan waarvoor de inlegzool is ontworpen.
    foot_arch_type_suitability:
      name: Geschikt voetboogtype
      description: Geeft aan welk voetboogprofiel de inlegzool moet ondersteunen.
    foot_coverage:
      name: Voet bedekking
      description: Geeft aan of de legwear een gesloten voet, geen voet, stirrup of
        open hiel heeft.
    foot_guard_type:
      name: Voetbeschermer type
      description: Geeft aan of een beenbeschermer een teen-/voetkap bevat en specificeert
        of de kap vast of afneembaar is.
    foot_support_level:
      name: Voetondersteuningsniveau
      description: Geeft aan hoeveel structurele ondersteuning of stevigheid een inlegzool
        biedt, zoals laag, medium, hoog of extra hoog.
    footbag_play_style:
      name: Footbag speelstijl
      description: Primaire beoogde speelstijl voor de footbag.
    football_ball_type:
      name: American footballbal type
      description: Specificeert het primaire beoogde gebruik of de context voor de
        American footballbal, zoals wedstrijdspel, training of verzamelobject.
    football_dummy_type:
      name: American football dummy type
      description: Classificeert de stijl of het functionele ontwerp van de dummy
        om het specifieke trainingsdoel weer te geven.
    football_glove_certification:
      name: American football handschoen certificering
      description: Geeft de certificering of naleving van normen aan die vereist is
        voor competitief spel (bijv. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Type voetbordmontage
      description: Specificeert hoe het voetbord aan het bedframe of de vloer wordt
        bevestigd, zodat kopers compatibele hardware en installatiemethoden kunnen
        selecteren.
    footboard_style:
      name: Voetbordstijl
      description: Definieert de structurele of esthetische ontwerpstijl van het voetbord.
    footrest_adjustability:
      name: Verstelbaarheid voetsteun
      description: Specificeert of en hoe de voetsteunen kunnen worden versteld voor
        verschillende beenlengtes van kinderen.
    footrest_type:
      name: Voetsteun type
      description: Geeft de aanwezigheid en het ontwerp van een voetsteun op de kruk
        aan.
    footstrap_configuration:
      name: Voetband configuratie
      description: Specificeert het inzetpatroon van de voetband op het boarddeck.
    footswitch_action_style:
      name: Voetschakelaar actiestijl
      description: Geeft aan of de schakelactie momentaan of vergrendelend is, en
        of beide worden ondersteund.
    footswitch_power_source:
      name: Voetschakelaar voedingsbron
      description: Specificeert hoe de voetschakelaar wordt gevoed, indien van toepassing
        (passief via jackaansluiting, batterij, externe adapter, USB, enz.).
    footwear_construction_method:
      name: Schoenconstructie
      description: Definieert de techniek waarmee het bovenwerk aan de zool wordt
        bevestigd, met invloed op duurzaamheid, verzoolmogelijkheden en prijs.
    footwear_cut:
      name: Schoeisel snit
      description: Geeft de enkelkraaghoogte aan (lage snit, halfhoge snit, hoge snit),
