    salt_level:
      name: Zoutgehalte
      description: Geeft de hoeveelheid zout of natrium aan die aan de noten of zaden
        is toegevoegd.
    sand_cup_features:
      name: Zandbeker kenmerken
      description: Functionele/fysieke kenmerken van de zandbeker(s) die invloed hebben
        op spelen en gebruik.
    sand_shovel_handle_style:
      name: Zandschep handvatstijl
      description: Beschrijft de vorm van het handvat/de grip aan het einde van het
        schep-/spadehandvat.
    sand_toy_set_pieces_included:
      name: Inbegrepen onderdelen zandspeelgoed
      description: Vermeldt de soorten zandspelonderdelen in de set (bijv. emmer,
        schep, vormen), zodat shoppers pakketten kunnen vergelijken op basis van hun
        inhoud.
    sand_water_mill_items_included:
      name: Zand- en watermolen meegeleverde items
      description: Vermeldt de belangrijkste accessoireonderdelen die bij het molenspeelgoed
        zijn inbegrepen (emmers, schepjes, vormen, enz.).
    sandbag_style:
      name: Zandzak stijl
      description: Geeft het specifieke ontwerp en het beoogde trainingsgebruik van
        de zandzak aan (bijv. Bulgarian, Strongman, Power), zodat shoppers kunnen
        kiezen tussen verschillende trainingsmodaliteiten.
    sandbox_bottom_type:
      name: Zandbak bodemtype
      description: Het type basis-/bodemconstructie dat onder het zand wordt gebruikt.
    sandbox_drainage_type:
      name: Zandbak drainagetype
      description: Hoe de zandbak water afvoert (indien van toepassing), zoals via
        afvoergaten of een verwijderbare plug.
    sandbox_seating_type:
      name: Type zitplaatsen zandbak
      description: Of de zandbak geïntegreerde zitplaatsen heeft en welk soort.
    sapodillo_variety:
      name: Sapodilla variëteit
      description: Geeft de specifieke cultivar of variëteit van sapodilla/chikoo
        aan (bijv. "Alano", "Prolific"), zodat liefhebbers voorkeursprofielen en kenmerken
        kunnen selecteren.
    sapote_variety:
      name: Sapotevariëteit
      description: Specificeert de specifieke soort/het specifieke type sapote dat
        wordt aangeboden (bijv. zwarte, witte, mamey), zodat shoppers onderscheid
        kunnen maken tussen verschillende soorten.
    satin_ribbon_face_type:
      name: Satijnlint voorzijde type
      description: Specificeert of het lint aan één kant of aan beide kanten een satijnafwerking
