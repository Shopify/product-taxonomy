      name: Handdoekstof
      description: Beschrijft de maakwijze of weefstijl van de handdoekstof, die van
        invloed is op de textuur, het absorptievermogen en de droogtijd.
    track_lighting_rail_type:
      name: Type rail van railverlichting
      description: Definieert de mechanische/elektrische norm van de rail en bepaalt
        welke armaturen en connectoren compatibel zijn.
    track_lighting_system_compatibility:
      name: Compatibiliteit railsysteem
      description: Specificeert de elektrische en mechanische standaard van de rails
        waarvoor de armatuur of het accessoire is ontworpen.
    track_rail_circuit_configuration:
      name: Circuitconfiguratie van de spanningsrail
      description: Specificeert hoe de elektrische circuits binnen de rail zijn ingedeeld.
        Dit bepaalt hoeveel groepen lampen je onafhankelijk van elkaar kunt bedienen
        op één enkele rail.
    track_system_standard:
      name: Railsysteemstandaard
      description: Identificeert de fysieke railstandaard waar de voedingsadapter
        op past. Dit stelt kopers in staat om componenten af te stemmen op hun specifieke
        rail (bijv. H-, J- of L-rail).
    tractor_tire_application:
      name: Toepassing tractorband
      description: Geeft aan voor welke toepassing of omgeving de band primair is
        ontworpen.
    tractor_tire_tread_classification:
      name: Classificatie van tractorbandprofielen
      description: Classificeert het profiel van tractorbanden volgens landbouw- en
        industriële normen.
    tree_shape:
      name: Boomvorm
      description: Beschrijft het algehele silhouet of profiel van een kunstboom.
    trigger_type:
      name: Triggertype
      description: Specificeert het activeringsmechanisme dat wordt gebruikt om de
        waterstroom op de spuitmond te regelen
    trimmer_line_feed_system:
      name: Draadtoevoersysteem
      description: Identificeert hoe de snijdraad tijdens het gebruik vanuit de maaikop
        wordt geleid.
    trimmer_line_shape:
      name: Vorm van maaidraad
      description: Beschrijft de vorm van de dwarsdoorsnede van de maaidraad. Deze
        vorm is bepalend voor de snijprestaties en het geproduceerde geluidsniveau.
    turntable_type:
      name: Draaiplateautype
      description: Identificeert de stijl van het bereidingsoppervlak en maakt onderscheid
        tussen traditionele roterende glazen draaiplateaus en 'flatbed' of niet-roterende
        ontwerpen.
    ultrasonic_cleaner_accessories_included:
      name: Inbegrepen accessoires voor ultrasone reiniger
      description: Vermeldt extra onderdelen die worden meegeleverd met de reiniger,
        zodat de koper precies weet wat er in de doos zit.
    umbrella_base_type:
      name: Type parasolvoet
      description: Definieert de constructiestijl of het montageontwerp van de voet.
    umbrella_opening_mechanism:
      name: Openingsmechanisme parasol
      description: Definieert hoe de parasol wordt geopend en gesloten.
    umbrella_type:
      name: Type parasol
      description: Specificeert het algehele ontwerp of de vormfactor van de parasol.
    upf_rating:
      name: UPF-classificatie
      description: Geeft de ultravioletbeschermingsfactor (UPF) van het parasol aan.
        Deze waarde kwantificeert hoe effectief het doek schadelijke UV-stralen blokkeert.
    utensil_flexibility:
      name: Flexibiliteit van keukengerei
      description: Geeft aan hoe stijf of buigzaam de schraper is. Dit bepaalt of
        de schraper geschikt is voor ronde kommen of voor stevig deeg
    utensil_holder_features:
      name: Kenmerken van keukengereihouder
      description: Beschrijft de specifieke functionele eigenschappen van een houder
        voor keukengerei.
    utensil_tray_features:
      name: Kenmerken van lade voor keuengerei
      description: Vermeldt de bijzondere kenmerken die de functionaliteit van de
        lade verbeteren.
    vacuum_hose_connection_type:
      name: Type stofzuigerslangkoppeling
      description: Beschrijft het type connector aan de uiteinden van de slang, zodat
        een correcte mechanische aansluiting op stofzuigers of accessoires gegarandeerd
        is.
    valance_style:
      name: Volantstijl
      description: Geeft inzicht in het decoratieve ontwerp van de volant, zodat klanten
        een stijl kunnen kiezen die bij hun decor past.
    valet_organizer_features:
      name: Kenmerken kledingstandaard/valet
      description: Vermeldt de specifieke organisatorische kenmerken die in het oplaadstation
        zijn geïntegreerd.
    valve_configuration:
      name: Klepconfiguratie
      description: Definieert de functionele stijl van de kraan of het ventiel, zodat
        kopers snel de juiste oplossing kunnen selecteren voor hun specifieke bewateringssysteem.
    valve_stem_angle:
      name: Ventielhoek
      description: Specificeert de oriëntatie/hoek van het ventiel ten opzichte van
        de binnenband, wat van invloed is op het gemak van oppompen en de pasvorm
        van de velg.
    vase_filler_type:
      name: Vulmateriaal vaas
      description: Het product wordt gecategoriseerd op basis van het specifieke type
        vulmateriaal of de vorm.
    vent_pipe_type:
      name: Type ontluchtingspijp
      description: Geeft een classificatie van de constructiestijl van de standpijp
        of ontluchtingspijp.
    vent_style:
      name: Ventilatiestijl
      description: Classificeert de constructiestijl of het doel van het ventilatieonderdeel.
    waffle_style:
      name: Wafelstijl
      description: Identificeert de vorm en structuur van het wafelrooster dat door
        de platen wordt gevormd.
    wallpaper_removal_type:
      name: Behangverwijderingsmethode
      description: Geeft aan hoe gemakkelijk het behang te verwijderen is bij het
        opnieuw inrichten.
    wallpaper_washability_rating:
      name: Wasbaarheid van behang
      description: Beschrijft hoe het behangoppervlak na het aanbrengen gereinigd
        kan worden.
    warmer_type:
      name: Verwarmingstype
      description: Specificeert het primaire verwarmingsmechanisme of het beoogde
        gebruik van de kaars- of oliebrander.
    warmth_level:
      name: Warmteniveau
      description: Geeft een indicatie van de algehele warmte-isolatie of de geschiktheid
        van het dekbed of de sprei voor het betreffende seizoen.
    warmth_rating:
      name: Warmteclassificatie
      description: Geeft het isolatievermogen van een deken aan, vergelijkbaar met
        de TOG-waarde van beddengoed.
    waste_container_lid_features:
      name: Kenmerken van afvalcontainerdeksel
      description: Benadrukt de speciale functionaliteiten of verbeteringen die in
        het deksel zijn ingebouwd.
    waste_container_sign_message:
      name: Bericht op bordje afvalcontainer
      description: Definieert de specifieke afvalstroom of waarschuwingstekst die
        op het etiket of bord is afgedrukt.
    water_filtration_technology:
      name: Waterfiltratietechnologie
      description: Beschrijft de kerntechnologie of het mechanisme dat wordt gebruikt
        om water te zuiveren.
    water_heater_element_connection_type:
      name: Aansluitingstype boilerelement
      description: Geeft de montagewijze van het element aan en maakt onderscheid
        tussen inschroefmontage en verschillende flensmontages.
    water_sensor_design:
      name: Watersensorontwerp
      description: Specificeert de fysieke stijl van het watersensorelement.
    water_supply_type:
      name: Type watertoevoer
      description: Geeft aan hoe het apparaat water ontvangt, met onderscheid tussen
        handmatig te vullen reservoirs en aangesloten waterleidingen.
    watering_needs:
      name: Waterbehoefte
      description: Beschrijft de typische waterbehoefte van de plant.
    wax_paper_form:
      name: Bakpapiervorm
      description: Geeft aan of het paper als een doorlopende rol of als voorgesneden
        vellen wordt verkocht.
    weather_guard_mounting_method:
      name: Montagemethode voor weerbescherming
      description: Beschrijft hoe de beschermkap aan de aanvoer- of ondersteuningsconstructie
        wordt bevestigd.
    wheel_bearing_type:
      name: Wiellagertype
      description: Geeft inzicht in de interne lager- of busconstructie van het wiel,
        die van invloed is op de rolweerstand en de onderhoudsvereisten.
    wheel_tread_style:
      name: Wielprofielstijl
      description: Specificeert het profielontwerp van het wiel, wat van invloed is
        op de grip, het geluidsniveau en mogelijke sporen op de vloer.
    whistling:
      name: Fluiten
      description: Geeft aan of de waterkoker een fluitend geluid maakt wanneer het
        water kookt.
    wick_material:
      name: Lontmateriaal
      description: Identificeert de samenstelling van de gebruikte lont (bijv. katoen,
        glasvezel).
    window_film_installation_surface:
      name: Installatieoppervlak voor raamfolie
      description: Geeft aan of de folie bedoeld is voor gebruik binnen, buiten of
        beide.
    window_film_type:
      name: Raamfolietype
      description: Categoriseert de functionele stijl van de folie (bijv. privacy
        versus veiligheid).
    window_rod_type:
      name: Type gordijnroede
      description: Classificeert de functionele stijl van de raamroede.
    window_screen_type:
      name: Vensterschermtype
      description: Definieert de constructiestijl of bedieningsmethode van het scherm.
    window_treatment_lining_type:
      name: Type voering van de raambekleding
      description: Geeft aan of de valance (volant) of koof (cornice) gevoerd is en
        welk type voering is gebruikt.
    wine_aerator_type:
      name: Type wijnbeluchter
      description: Specificeert de vormfactor of de werkingswijze van de wijnbeluchter.
    wine_glass_style:
      name: Type wijnglas
      description: Specificeert het beoogde wijntype of type glas om aroma en smaak
        te optimaliseren.
    wok_bottom_type:
      name: Type wokbodem
      description: Bepaalt de vorm van de wokbodem, wat de compatibiliteit met verschillende
        kookplaten en wokringen bepaalt.
    wood_grain_orientation:
      name: Houtnerfrichting
      description: Specificeert de richting van de houtnerf in het product, zoals
        kopshout, langshout of vlakhout. De nerfrichting beïnvloedt de duurzaamheid
        en de mesvriendelijkheid.
    wood_seasoning_method:
      name: Houtdroogmethode
      description: Geeft aan hoe het brandhout is gedroogd of voorbereid, wat invloed
        heeft op het vochtgehalte en de verbrandingskwaliteit.
    wrap_format:
      name: Verpakkingsvorm
      description: Specificeert de fysieke vorm waarin de vershoudfolie of het verpakkingsmateriaal
        wordt geleverd, zoals rollen of voorgesneden vellen.
    abacus_bead_material:
      name: Abacus kralenmateriaal
      description: Het belangrijkste materiaal van de kralen van een telraam.
    abec_rating:
      name: ABEC-classificatie
      description: Geeft de nauwkeurigheidsklasse van de lagers aan op basis van ABEC-classificaties,
        die de soepelheid en tolerantieniveaus aangeven.
    abrasive_level:
      name: Schuurkracht
      description: Relatieve schuurkracht van een polijstmiddel/schuurpasta op autolakken.
    absinthe_accessories_included:
      name: Inbegrepen absintaccessoires
      description: Vermeld alle accessoires die bij het product worden geleverd, zoals
        lepels, glazen of suikerklontjes.
    ac_compressor_mounting_style:
      name: Bevestigingswijze van de aircocompressor
      description: Beschrijft de manier waarop de compressor mechanisch aan de motor
        of het aandrijfsysteem voor hulpaggregaten is bevestigd, of de bevestigingsinterface.
    ac_compressor_oil_type:
      name: AC-compressorolietype
      description: Geeft aan welke soort smeerolie de aircocompressor nodig heeft
        of gebruikt (veelgebruikte soorten zijn onder andere PAG en POE).
    accent_modes:
      name: Accentueermodi
      description: Geeft aan hoe de metronoom de tel binnen een maat kan accentueren
        (naast de standaardklik).
    access_mechanism:
      name: Toegangsmechanisme
      description: Hier wordt uitgelegd hoe je bij het verhoogde slaapplatform komt.
    accessibility_features:
      name: Toegankelijkheidsfuncties
      description: Geeft aan welke voorzieningen en aanpassingen de minibus heeft
        op het gebied van toegankelijkheid.
    accessories_included:
      name: Inbegrepen accessoires
      description: Geeft een overzicht van de extra's die bij de stoel worden geleverd
        (bijv. voetenbankje, lendekussen), zodat kopers duidelijk zien wat de meerwaarde
        is.
    accessory_pieces_included:
      name: Inbegrepen extra's
      description: Hier vind je een overzicht van de accessoires die in een cadeauset
        of bundel met meerdere kledingaccessoires zitten.
    acoustic_amplifier_feedback_control_features:
      name: Functies voor feedbackregeling bij akoestische versterkers
      description: Geeft aan dat er ingebouwde anti-feedbackfuncties voor akoestische
        instrumenten aanwezig zijn (bijv. notchfilter, faseschakelaar, automatische
        feedbackonderdrukking).
    acoustic_drum_kit_components_included:
      name: Inbegrepen onderdelen van het akoestische drumstel
      description: Geeft aan welke belangrijke onderdelen bij de set zijn inbegrepen
        (alleen een drumstel of een complete set; inclusief bekkens/hardware).
    acoustic_guitar_body_shape:
      name: Vorm van de akoestische gitaar
      description: Beschrijft de vorm en contouren van de akoestische gitaar, die
        van invloed zijn op de klank, het speelcomfort en het gebruiksdoel.
    acoustic_guitar_string_core_design:
      name: Ontwerp van de kern van akoestische gitaarsnaren
      description: De kernconstructie van de gewikkelde snaren.
    acoustic_piano_key_material:
      name: Materiaal van de toetsen van een akoestische piano
      description: Geeft aan welk materiaal er voornamelijk is gebruikt voor de pianotoetsen/witte
        pianotoetsen.
    acoustic_piano_lid_type:
      name: Type deksel van een akoestische piano
      description: Geeft het type deksel-/afdekmechanisme aan dat bij de vleugel wordt
        gebruikt (voor het onderscheid tussen vleugel- en rechtopstaande piano’s wat
        betreft de klapdeksel/bovenste deksel).
    acoustic_piano_plate_frame_material:
      name: Materiaal van de klankkast/het frame van een akoestische piano
      description: Geeft het hoofdmateriaal van de pianoplaat/het frame (harp) aan,
        meestal gietijzer.
    acoustic_piano_soundboard_material:
      name: Materiaal van de klankkast van een akoestische piano
      description: Geeft aan welk materiaal er voornamelijk is gebruikt voor het klankbord
        van de piano.
    action_figure_scale:
      name: Schaal van actiefiguren
      description: Geeft de schaalverhouding van de modelbouwset aan (bijv. 1:12)
        waarvoor het accessoire bedoeld is.
    action_type:
      name: Actietype
      description: Beschrijft het afvuur- of spanmechanisme van het wapen (bijv. grendel,
        klaploop, hefboom).
    actuation_mechanism:
      name: Bedieningsmechanisme
      description: 'Geeft aan hoe de hendel het remsysteem bedient: puur mechanisch
        via een kabel, volledig hydraulisch, hydraulisch met kabelbediening of elektronisch/draadloos.'
    actuation_method:
      name: Activeringsmethode
      description: Hoe het blussysteem wordt geactiveerd of in werking treedt.
    adapter_orientation:
      name: Richting van de adapter
      description: Geeft de hoek of vorm van een ventieladapter voor fietsbanden aan,
        wat van invloed is op de bereikbaarheid voor de pomp (bijv. recht, 90°).
    additive_application_stage:
      name: Toepassingsfase van het additief
      description: Geeft aan in welke fase van het proces het product bedoeld is om
        te worden gebruikt.
    adhesive_backing:
      name: Zelfklevende achterkant
      description: Of de bedrukbare zijde een zelfklevende achterkant heeft voor direct
        aanbrengen.
    adhesive_formulation:
      name: Samenstelling van de lijm
      description: Geeft de chemische basis of samenstelling van de lijm aan, zoals
        cyanoacrylaat of epoxy.
    adhesive_sides:
      name: Zijden met lijm
      description: Geeft aan of de smeltlijm zich aan één kant of aan beide kanten
        van de tape/baan bevindt.
    adjunct_grain_processing_form:
      name: Verwerkingsvorm hulpgranen
      description: Geeft de fysieke/verwerkingsvorm aan van het bijproduct zoals het
        wordt verkocht voor brouwen (bijv. in vlokken, getorrificeerd, gemout, rauw).
    adjustability_type:
      name: Type verstelbaarheid
      description: Geeft aan wat voor soort verstelling de steun mogelijk maakt, indien
        van toepassing.
    adjustable_cup_mutes:
      name: Verstelbare cupdempers
      description: Geeft aan of de cup verstelbaar/verwijderbaar is en hoe je hem
        kunt verstellen.
    adjustable_zones:
      name: Verstelbare zones
      description: Geeft aan welke delen van de basis afzonderlijk kunnen worden versteld.
    adjustment_type:
      name: Type afstelling
      description: Geeft aan of de doseringsregelaar verstelbaar is en hoe je dit
        doet.
    administration_method:
      name: Toedieningsmethode
      description: Geeft aan hoe het ontwormingsmiddel aan het paard wordt toegediend
        (bijv. via de mond of via een injectie), zodat je de aanwijzingen van de dierenarts
        kunt volgen en een handige toedieningswijze kunt kiezen.
    advice_card_prompt_type:
      name: Type prompt advieskaart
      description: Type prompt dat op de kaart is gedrukt, of het ontbreken van een
        prompt.
    aeration_method:
      name: Beluchtingsmethode
      description: Beschrijft het type beluchting dat door de bak wordt geboden of
        ondersteund, waardoor voldoende zuurstof voor levend aas wordt gegarandeerd.
    aero_package_components:
      name: Onderdelen aeropakket
      description: Geeft aan welke belangrijke aerodynamische onderdelen op het voertuig
        zijn gemonteerd (selecteer alle van toepassing zijnde opties).
    aerodynamic_elements_included:
      name: Aerodynamische elementen inbegrepen
      description: Geeft aan welke aerodynamische onderdelen op de formuleauto zijn
        aangebracht (selecteer alle van toepassing zijnde opties, indien ondersteund).
    aftertouch_support:
      name: Aftertouch-ondersteuning
      description: Of de controller aftertouch (kanaalgebonden of polyfoon) ondersteunt
        op toetsen/pads.
    agave_content_classification:
      name: Classificatie van agave-gehalte
      description: Geeft aan of de tequila is geproduceerd van 100% Blue Weber-agave
        of dat het een mixto betreft die minimaal 51% agavesuikers bevat.
    aida_cloth_count:
      name: Dichtheid van Aida-stof
      description: Geeft de dichtheid van Aida-stof aan (aantal vierkantjes/steken
        per inch), wat bepalend is voor de steekgrootte en de schaal van het ontwerp.
    aida_cloth_pre_cut_format:
      name: Aida-stof, voorgesneden formaat
      description: Geeft aan of de Aida-stof wordt verkocht als voorgesneden stuk,
        als doorlopend stuk van de rol of op een rol.
    air_bag_material:
      name: Materiaal luchtzak
      description: Specificeert het materiaal van de luchtzak/het reservoir dat wordt
        gebruikt met de Ierse warpipe.
    air_bed_internal_construction:
      name: Interne constructie luchtbed
      description: Beschrijft de interne ondersteuningsstructuur of technologie in
        het luchtbed voor comfort en stabiliteit.
    air_dry_clay_color_form:
      name: Kleurvorm luchtdrogende klei
      description: Geeft aan of de klei voorgekleurd, wit/neutraal om te beschilderen,
        of als mix/assortiment wordt verkocht.
    air_hockey_items_included:
      name: Meegeleverde airhockey-items
      description: Geeft aan welke specifieke accessoires in een set zitten, zodat
        klanten precies weten wat ze ontvangen, bijvoorbeeld 2 pushers, 4 pucks en
        2 vilten pads.
    air_intake_temperature_sensor_mounting_style:
      name: Montagestijl luchtinlaattemperatuursensor
      description: De fysieke montagestijl van de IAT-sensor in het inlaatsysteem.
    air_integration_capability:
      name: Integratiecapaciteit lucht
      description: Geeft aan of en hoe de duikcomputer draadloze tankdrukzenders ondersteunt.
    air_mattress_valve_type:
      name: Ventieltype luchtbed
      description: Specificeert het ventieltype waarop een accessoire past of dat
        het bevat, zodat compatibiliteit tussen pompen, ventielen en reparatieonderdelen
        wordt gewaarborgd.
    air_water_rocket_kit_items_included:
      name: Meegeleverde items lucht- en water raket kit
      description: Belangrijke onderdelen die bij de raketset worden geleverd, zoals
        lanceerder, pomp, vinnen en navulonderdelen.
    air_water_rocket_launch_method:
      name: Lanceermethode lucht- en waterraketten
      description: Hoe de raket onder druk wordt gezet/gelanceerd, oftewel de gebruikersinteractie
        en uitrustingsstijl.
    airbag_position:
      name: Positie airbag
      description: Specificeert de beoogde beveiligingspositie/-zone die het airbagonderdeel
        ondersteunt.
    aircraft_ads_b_capability:
      name: ADS-B-mogelijkheid vliegtuig
      description: Specificeert of het vliegtuig is uitgerust voor ADS-B Out-conformiteit.
    aircraft_airframe_material:
      name: Materiaal vliegtuigframe
      description: Primaire materiaal/materialen die worden gebruikt in de constructie
        van het vliegtuigframe.
    aircraft_cabin_configuration:
      name: Cabine-indeling vliegtuig
      description: Specificeert de cabine-indeling van het vliegtuig, bijvoorbeeld
        vergadergroep, divan of cabine met vier zones.
    aircraft_documentation_included:
      name: Meegeleverde vliegtuigdocumentatie
      description: Geeft aan welke documenten bij het onderdeel worden geleverd, bijvoorbeeld
        8130-3.
    aircraft_galley_configuration:
      name: Configuratie vliegtuigkombuis
      description: Aanwezigheid en type kombuis-/cateringfaciliteiten in de cabine.
    aircraft_installation_location:
      name: Installatielocatie vliegtuig
      description: Geeft aan waar op het vliegtuig het onderdeel of accessoire wordt
        geïnstalleerd of gebruikt.
    aircraft_internet_connection:
      name: Internetverbinding vliegtuig
      description: Geeft aan of er internetconnectiviteit in de cabine aanwezig is
        en welk type.
    aircraft_landing_gear_type:
      name: Type landingsgestel vliegtuig
      description: Specificeert de configuratie van het landingsgestel van de autogyro.
    aircraft_lavatory_configuration:
      name: Configuratie vliegtuigtoilet
      description: Type configuratie van het toilet aan boord.
    aircraft_maintenance_program_enrollment:
      name: Inschrijving onderhoudsprogramma vliegtuig
      description: Geeft aan of het vliegtuig is ingeschreven voor een onderhoudsprogramma
        voor motor en/of airframe en, zo ja, welk type dekking van toepassing is,
        namelijk motor, airframe of beide.
    aircraft_operational_certification:
      name: Operationele certificering vliegtuig
      description: Specificeert de wettelijke of operationele certificeringsbasis
        waaronder het vliegtuig wordt geëxploiteerd, afhankelijk van de jurisdictie,
        bijvoorbeeld FAA Part 91/135/121 of EASA AOC.
    aircraft_protective_gear_certification:
      name: Certificering beschermende vliegtuiguitrusting
      description: Specificeert aan welke luchtvaart-/regelgevings- of industrienorm
        de beschermende uitrusting voldoet.
    aircraft_system_application:
      name: Toepassing vliegtuigsysteem
      description: Geeft aan tot welk vliegtuigsysteem of gebied het onderdeel/accessoire
        behoort, voor browsen en filteren binnen diverse vliegtuigonderdelen.
    airflow_resistance_level:
      name: Niveau luchtweerstand
      description: Geeft aan hoe beperkend de demper aanvoelt in termen van tegendruk/luchtweerstand.
    airship_envelope_material:
      name: Materiaal luchtschipomhulsel
      description: Primaire materiaal van het luchtschipomhulsel, ook wel de huid
        genoemd.
    airsoft_part_type:
      name: Type airsoftonderdeel
      description: Geeft het functionele onderdeel- of accessoiretype voor airsoftwapens
        aan, bijvoorbeeld magazijn, loop of handbeschermer.
    airworthiness_approval_basis:
      name: Basis luchtwaardigheidsgoedkeuring
      description: Specificeert, waar van toepassing, de goedkeurings-/certificeringsbasis
        voor het onderdeel, bijvoorbeeld PMA, TSO of STC.
    alarm_volume_adjustability:
      name: Instelbaarheid alarmvolume
      description: Geeft aan of en hoe het volume van het alarm door de gebruiker
        kan worden aangepast.
    alcohol_ink_finish_effect:
      name: Afwerkingseffect alcoholinkt
      description: Beschrijft het visuele effect/de afwerking van de alcoholinktformule,
        naast alleen de kleur, zoals metallic of parelmoer.
    alignment_aid_style:
      name: Stijl uitlijnhulp
      description: Beschrijft het type uitlijnhulpen dat op het matoppervlak is gedrukt
        of erin is verwerkt, bijvoorbeeld rechte lijn of afstandsmarkeringen.
    alternator_cooling_type:
      name: Koeltype dynamo
      description: Beschrijft hoe de dynamo wordt gekoeld en geventileerd.
    alternator_marine_ignition_protection_rating:
      name: Ontstekingsbeschermingsklasse dynamo voor maritiem gebruik
      description: Geeft aan of de dynamo ontstekingsbeveiligd is voor maritieme motorruimtes,
        bijvoorbeeld conform SAE J1171 / ISO 8846.
    alternator_mounting_configuration:
      name: Montageconfiguratie dynamo
      description: Specificeert de fysieke montageconfiguratie waarmee de dynamo aan
        een motorsteun wordt bevestigd.
    alternator_pulley_type:
      name: Type dynamopoelie
      description: Specificeert het ontwerp van de poelie/koppeling op de dynamo,
        of geeft aan dat er geen poelie is inbegrepen.
    alternator_regulator_type:
      name: Type dynamoregelaar
      description: Geeft aan of de spanningsregelaar intern of extern aan de dynamo
        is, en of deze OEM-gestuurd is via de computer/PCM.
    alternator_terminal_connection_type:
      name: Type aansluitklem dynamo
      description: Primaire elektrische aansluitstijl voor de uitgangs-/bekrachtigingsklemmen
        van de dynamo, om compatibiliteit met de kabelboom te helpen waarborgen.
    altitude_suitability:
      name: Geschiktheid voor hoogte
      description: Geeft aan of de bal is ontworpen voor specifieke hoogteomstandigheden,
        die snelheid en stuit kunnen beïnvloeden.
    ambulance_stretcher_mount_type:
      name: Type brancardbevestiging ambulance
      description: Specificeert het type laad-/bevestigingssysteem voor brancards
        dat door de ambulance wordt ondersteund.
    american_football_safety_certification:
      name: Veiligheidscertificering American football
      description: Geeft aan aan welke American football-specifieke veiligheidscertificeringen
        of normen het product voldoet.
    amplifier_tube_function:
      name: Functie versterkerbuis
      description: Specificeert de functionele rol van de buis binnen het circuit
        van een instrumentversterker, bijvoorbeeld voorversterker versus eindversterker.
    analog_synthesizer_cv_gate_i_o:
      name: CV/Gate-I/O analoge synthesizer
      description: Geeft aan welke typen control-voltage- en gate-aansluitingen worden
        ondersteund voor integratie met modulaire/analoge apparatuur.
    analog_synthesizer_keybed_configuration:
      name: Toetsenbordconfiguratie analoge synthesizer
      description: Beschrijft of de synthesizer een ingebouwd toetsenbord heeft en,
        zo ja, het aantal toetsen.
    anchor_configuration:
      name: Ankerconfiguratie
      description: Geeft aan of het ophangsysteem één centraal ankerpunt of meerdere
        onafhankelijke ankerpunten gebruikt, wat invloed heeft op de variatie in oefeningen
        en de complexiteit van de opstelling.
    animal_raising_method:
      name: Methode voor het houden van dieren
      description: Beschrijft de landbouw- of veehouderijpraktijken die worden gebruikt
        voor het brondier.
    animal_species:
      name: Diersoorten
      description: Specificeert welk dier of wezen het knuffeldier voorstelt, bijvoorbeeld
        beer, konijn of dinosaurus.
    animal_trap_jaw_style:
      name: Stijl kaakmechanisme dierenval
      description: Configuratie van de kaken van de val, die invloed heeft op de houdkracht
        en het dierenwelzijn.
    animal_trap_type:
      name: Type dierenval
      description: Classificeert de mechanische stijl/het ontwerp van de val, zodat
        shoppers snel de exacte vangmethode kunnen vinden die ze nodig hebben of die
        volgens de regelgeving is toegestaan.
    ankle_collar_style:
      name: Stijl enkelkraag
      description: Beschrijft de stijl of constructie van de enkelkraag van een schoen,
        zoals laag uitgesneden, halfhoog, hoog, sokkraag of veterloos, wat invloed
        heeft op ondersteuning, pasvorm en uitstraling.
    ankle_guard_protection_level:
      name: Beschermingsniveau enkelbeschermer
      description: Geeft de algemene mate van impactbescherming aan die de enkelbeschermer
        biedt.
    ankle_strap_padding_type:
      name: Type vulling enkelband
      description: Beschrijft het dempingsmateriaal of de vullingsmethode in de band
        die van invloed is op het comfort.
    ankle_strap_type:
      name: Type enkelband
      description: Classificeert de constructie of het ontwerp van de enkelband van
        een snowboardbinding.
    ant_farm_habitat_medium_type:
      name: Type habitatmedium mierenboerderij
      description: Specificeert het primaire graaf-/observatiemedium dat bij de mierenboerderij
        wordt geleverd of ervoor nodig is.
    ant_farm_kit_contents:
      name: Inhoud mierenboerderijset
      description: Geeft aan welke onderdelen in de mierenboerderijset zijn inbegrepen,
        bijvoorbeeld habitatcontainer, zand/gel, mierenvoucher en voedergereedschap.
    ant_farm_lighting_type:
      name: Type verlichting mierenboerderij
      description: Specificeert het type ingebouwde verlichting/illuminatie, indien
        aanwezig, dat voor observatie wordt gebruikt.
    antenna_fit_type:
      name: Antennetype
      description: Voor welke antenne-vormfactor de antennebal bedoeld is.
    anti_caking_agent:
      name: Antiklontermiddel
      description: Specificeert het type antiklontermiddel dat is toegevoegd om klonteren
        te voorkomen, informatie die belangrijk is voor allergie-overwegingen en nauwkeurigheid
        in recepten.
    anti_g_suit_bladder_material:
      name: Blaasmateriaal anti-G-pak
      description: Materiaal dat wordt gebruikt voor de binnenste opblaasbare blaas
        of blazen in het anti-G-pak. Vermeld alle toepasselijke materialen als er
        meerdere materialen worden gebruikt.
    anti_g_suit_connector_type:
      name: Type aansluiting anti-G-pak
      description: Specificeert de stijl/standaard van de lucht-/drukslangaansluiting
        die wordt gebruikt voor koppeling met het vliegtuig of de regulator.
    anti_g_suit_inflation_method:
      name: Opblaasmethode anti-G-pak
      description: Geeft aan hoe de blazen van het pak onder druk worden gezet om
        G-bescherming te bieden.
    anti_g_suit_size_system:
      name: Maatsysteem anti-G-pak
      description: Maatstandaard die wordt gebruikt om het maat-/passysteem van het
        pak te specificeren.
    anti_reverse_type:
      name: Anti-retourtype
      description: Specificeert het type anti-retourmechanisme dat aanwezig is, wat
        van invloed is op het zetten van de haak en speling bij terugslag.
    anti_theft_feature:
      name: Antidiefstalfunctie
      description: Geeft aan of de houder antidiefstal biedt, zoals vergrendelbare
        bevestigingen of een manipulatiebestendig ontwerp.
    antique_gun_ignition_system:
      name: Ontstekingssysteem antiek vuurwapen
      description: Specificeert het historische schiet-/ontstekingssysteem dat door
        het antieke vuurwapen wordt gebruikt.
    apple_variety:
      name: Appelras
      description: Specificeert de cultivar of variëteit van de appel, bijvoorbeeld
        Gala, Fuji of Granny Smith, zodat klanten kunnen kiezen op basis van smaak,
        textuur en culinair gebruik.
    applique_edge_finish:
      name: Randafwerking van het appliqué
      description: Beschrijft hoe de randen van het appliqué zijn afgewerkt, wat invloed
        heeft op de uitstraling en de rafelbestendigheid.
    arbor_type:
      name: Type spoelas
      description: Classificeert de molen op basis van het ontwerp van de spoelas,
        wat invloed heeft op de snelheid waarmee de lijn wordt binnengehaald, de backingcapaciteit
        en het lijngeheugen.
    archery_accessory_type:
      name: Type boogschietaccessoire
      description: Specificeert het type accessoire dat bedoeld is voor boogschietuitrusting,
        zodat shoppers producten snel kunnen filteren.
    archery_part_type:
      name: Type boogschietonderdeel
      description: Identificeert het specifieke onderdeel of vervangingsonderdeel
        dat wordt verkocht (bijv. riser, lat, pees), zodat nauwkeurig kan worden gefilterd
        zonder de categorieboom uit te breiden.
    archery_range_accessory_type:
      name: Type boogschietbaanaccessoire
      description: Identificeert het specifieke onderdeel of vervangingsonderdeel
        dat wordt verkocht (bijv. riser, lat, pees), zodat nauwkeurig kan worden gefilterd
        zonder de categorieboom uit te breiden.
    archery_target_features:
      name: Boogschietdoel kenmerken
      description: Vermeldt gespecialiseerde prestatie- of gebruiksgemakkenmerken
        die niet onder andere attributen vallen, bijvoorbeeld zelfherstellend schuim
        of een draaghandgreep.
    archery_tool_type:
      name: Boogschieten gereedschaptype
      description: Classificeert het specifieke type boogschietgereedschap of uitrustingsonderdeel.
    armband_features:
      name: Armband kenmerken
      description: Vermeldt speciale functionele of visuele kenmerken die de armband
        verbeteren.
    armguard_style:
      name: Armbeschermer stijl
      description: Definieert de constructiestijl of vormfactor van de armbeschermer
        en geeft inzicht in de mate van bedekking en traditionele versus moderne uitstraling.
    armor_protection_type:
      name: Pantserbescherming type
      description: Type bescherming dat door het voertuigpantsersysteem wordt geboden.
    armrest_adjustability:
      name: Verstelbaarheid armleuning
      description: Definieert de dimensionale verstelbaarheid en configuratie van
        de armleuningen van de stoel, bijvoorbeeld vast, 2D, 3D of opklapbaar.
    armrest_type:
      name: Type armleuning
      description: Beschrijft de aanwezigheid en verstelbaarheid van armleuningen
        op de stoel, bijvoorbeeld geen armleuningen, vast, verstelbaar of verwijderbaar.
    arrow_bolt_point_type:
      name: Pijl/bolt type punt
      description: Definieert de stijl van de punt of tip die op een pijl of bolt
        is geplaatst.
    arrow_component_type:
      name: Pijlonderdeel type
      description: Classificeert het specifieke onderdeel of accessoire voor een pijl,
        zoals insert, wrap, bushing of lijm, zodat klanten artikelen kunnen filteren
        zonder tientallen extra subcategorieën nodig te hebben.
    arrow_containment_level:
      name: Pijl insluitingsniveau
      description: Beschrijft of de oplegger de pijl volledig, gedeeltelijk of niet
        omsluit.
    arrow_fletching_orientation:
      name: Pijlveren oriëntatie
      description: Specificeert de vleugel- of offsetoriëntatie van de bevedering,
        bijvoorbeeld linksdraaiend, rechtsdraaiend of helicaal, die de draairichting
        van de pijl bepaalt.
    arrow_nock_groove_size:
      name: Pijlnok groefmaat
      description: Specificeert de maatclassificatie van de snaargroef/keel van de
        nok, die de compatibiliteit met verschillende peesdiameters bepaalt.
    arrow_nock_type:
      name: Pijlnok type
      description: Ontwerp/stijl van de pijlnok die contact maakt met de pees.
    arrow_rest_style:
      name: Stijl pijloplegger
      description: Specificeert de functionele stijl/het mechanisme van de pijloplegger,
        bijvoorbeeld drop-away, blad of whisker biscuit. De stijl bepaalt hoe de oplegger
        de pijl ondersteunt, omsluit en loslaat, en is een belangrijke manier waarop
        shoppers producten onderscheiden.
    arrow_shaft_compatibility:
      name: Compatibiliteit pijlschacht
      description: Geeft aan op welke pijlschacht-/bushingstandaard de verlichte nok
        past, bijvoorbeeld X, H, S of GT.
    art_crafting_tool_tip_style:
      name: Puntstijl voor kunst-/hobbygereedschap
      description: Beschrijft de vorm/het profiel van de werkpunt, bijvoorbeeld puntig
        versus rond, om aan te geven welk type reliëfmarkeringen deze maakt.
    art_ink_lightfastness_rating:
      name: Lichtbestendigheidsclassificatie kunstinkt
      description: Geeft aan hoe goed de inkt bestand is tegen vervaging bij blootstelling
        aan licht, meestal uitgedrukt via standaardclassificaties.
    art_ink_opacity:
      name: Kunstinkt dekking
      description: Specificeert het dekkingsniveau van de inkt nadat deze is aangebracht.
    art_security_rating:
      name: ART-beveiligingsclassificatie
      description: Specificeert de Nederlandse ART-sterrenclassificatie van het slot,
        van 1 tot 5 sterren.
    artichoke_cut:
      name: Artisjok snijvorm
      description: Geeft aan welk deel of welke bereiding van de artisjok wordt aangeboden,
        bijvoorbeeld hele artisjok, hart of bodem, zodat klanten de opbrengst en beoogde
        culinaire toepassingen begrijpen.
    artichoke_variety:
      name: Artisjok ras
      description: Specificeert de cultivar of botanische variëteit van de artisjok,
        zodat shoppers onderscheid kunnen maken op basis van formaat, kleur, smaak
        en culinair gebruik.
    articulation_features:
      name: Articulatie kenmerken
      description: Geeft aan of het dinosaurusmodel beweegbare onderdelen heeft, zoals
        een beweegbare kaak, ledematen of staart, en hoe poseerbaar het model in het
        algemeen is.
    artificial_bait_form:
      name: Kunstaas vorm
      description: Geeft de fysieke vorm of presentatiestijl van het visaas/lokmiddel
        aan.
    asa_mounting_type:
      name: Type ASA-montage
      description: Geeft aan welke stijl Air Source Adapter-interface (ASA) of montagestandaard
        de drop forward gebruikt, bijvoorbeeld dovetail, rail of directe montage.
    ascender_descender_type:
      name: Ascender/descender type
      description: Classificeert de stijl van de klimascender of -descender voor nauwkeuriger
        filteren.
    aspiration_type:
      name: Aanzuigingstype
      description: Geeft aan hoe de motor wordt aangezogen of drukgevuld.
    assembly_state:
      name: Montagestaat
      description: Geeft aan of de kast wordt geleverd als zelfmontage, voorgemonteerd
        of in een andere vorm.
    assistance_mechanism:
      name: Ondersteuningsmechanisme
      description: Specificeert elk ingebouwd ondersteunings- of weerstandssysteem
        dat de power tower biedt voor pull-ups, dips of andere oefeningen.
    atemoya_cultivar:
      name: Atemoya cultivar
      description: Specificeert de benoemde cultivar/variëteit van de atemoya, zodat
        shoppers fruit kunnen kiezen op basis van smaak, formaat of zaadeigenschappen.
    athletic_cup_size:
      name: Sport cupmaat
      description: Geeft de door de fabrikant opgegeven maat van de beschermende cup
        aan, om een goede pasvorm voor de sporter te waarborgen.
    attachment_position:
      name: Bevestigingspositie
      description: Specificeert waar op het zadel of de fietser de tas bedoeld is
        om te worden bevestigd.
    attractant_scent_profile:
      name: Lokgeurprofiel
      description: Beschrijft de specifieke geur of smaak die wordt gebruikt om wilde
        dieren aan te trekken of menselijke geur te maskeren.
    atv_utv_intended_use:
      name: ATV/UTV beoogd gebruik
      description: Primair beoogd gebruik/de primaire stijl van de ATV/UTV.
    audio_channel_configuration:
      name: Audiokanaalconfiguratie
      description: Geeft het aantal afzonderlijke audiokanalen aan dat de equalizer/DSP
        ondersteunt, bijvoorbeeld 2-kanaals stereo, 4-kanaals voor/achter of 6-kanaals.
    audio_inputs:
      name: Audio-ingangen
      description: Specificeert de typen audio-ingangsaansluitingen die beschikbaar
        zijn voor sampling/opname, bijvoorbeeld 1/4 inch lijn, XLR, 3,5 mm, microfoonvoorversterker
        of phono.
    audio_output:
      name: Audio-uitgang
      description: Geeft aan of het speelgoed geluid biedt en hoe de audio wordt afgespeeld.
    audio_outputs:
      name: Audio-uitgangen
      description: Specificeert de beschikbare audio-uitgangen, inclusief hoofduitgangen
        en eventuele toewijsbare/aux-uitgangen.
    audio_playback_source:
      name: Audio afspeelbron
      description: Primaire mediabronnen waarvan de karaokeset muziek kan afspelen.
    autograph_authentication:
      name: Handtekening authenticatie
      description: Geeft de authenticatiestatus/het authenticatietype aan van een
        handtekening op de kaart.
    autograph_format:
      name: Handtekening formaat
      description: Beschrijft of de handtekening een origineel met de hand gezette
        handtekening, een gestempelde/gedrukte facsimile of een inscriptie/toevoeging
        is.
    autogyro_cockpit_enclosure:
      name: Autogyro cockpitafsluiting
      description: Specificeert of de cockpit open of afgesloten is.
    available_firing_modes:
      name: Beschikbare schietmodi
      description: Vermeldt de selecteerbare schietmodi die de marker standaard ondersteunt.
    avocado_variety:
      name: Avocado ras
      description: Specificeert de cultivar of variëteit van de avocado, zodat shoppers
        onderscheid kunnen maken op basis van smaak, textuur, formaat en oliegehalte.
    award_customization_included:
      name: Personalisatie award inbegrepen
      description: Geeft aan welke personalisatie/aanpassing bij de aankoop van de
        award is inbegrepen.
    award_material:
      name: Awardmateriaal
      description: Geeft het primaire materiaal of de primaire materialen van de award
        aan, zoals trofee, plaquetteplaat, medaille, pin of lintbeslag.
    award_mounting_display_type:
      name: Award montage-/displaytype
      description: Specificeert hoe de award bedoeld is om te worden weergegeven of
        bevestigd, bijvoorbeeld aan de muur, op een bureau of draagbaar.
    award_plaque_plate_material:
      name: Awardplaquette plaatmateriaal
      description: Specificeert het materiaal van het naamplaatje/de graveerplaat
        die aan de plaquette is bevestigd, los van het basismateriaal.
    award_ribbon_attachment_type:
      name: Awardlint bevestigingstype
      description: Specificeert hoe het lint bedoeld is om te worden bevestigd of
        gedragen.
    award_ribbon_imprint_method:
      name: Awardlint bedrukkingsmethode
      description: Specificeert hoe tekst/afbeeldingen op het lint worden aangebracht.
    award_ribbon_material:
      name: Awardlint materiaal
      description: Primaire materiaal van de lintstof, bijvoorbeeld satijn of polyester.
    award_ribbon_placement_title:
      name: Awardlint plaatsing/titel
      description: De standaardplaatsing of titel die door het lint wordt aangegeven,
        bijvoorbeeld 1e plaats of deelnemer.
    axle_compatibility:
      name: Ascompatibiliteit
      description: Geeft de asstandaard aan die door het wiel wordt ondersteund, zodat
        compatibiliteit met het fietsframe en de voorvork wordt gewaarborgd.
    back_beam_type:
      name: Achterbalk type
      description: Type/verstelbaarheid van de achterbalk, bijvoorbeeld standaard
        of in hoogte verstelbaar.
    back_design:
      name: Rugontwerp
      description: Specificeert opvallende rugconstructies op kledingstukken die invloed
        hebben op styling en ondersteuning.
    back_panel_type:
      name: Achterpaneel type
      description: Specificeert de stijl of het materiaal van het achterpaneel van
        de kast, wat invloed heeft op de zichtbaarheid van de inhoud en de afstemming
        op het interieur.
    back_sides_material:
      name: Achter- en zijkanten materiaal
      description: Specificeert het materiaal dat wordt gebruikt voor de achter- en
        zijkanten van de klassieke gitaarbody.
    backing_type:
      name: Type achterzijde
      description: Beschrijft de stijl van de achterzijde/bevestiging van het strass-steentje
        dat wordt verkocht, voor zelfklevende producten.
    backup_camera_mounting_location:
      name: Achteruitrijcamera montagelocatie
      description: Geeft de beoogde installatielocatie op het voertuig aan voor de
        achteruitrijcamera.
    backup_camera_video_interface:
      name: Achteruitrijcamera video-interface
      description: Specificeert de video-uitgang/interface/aansluiting die door de
        achteruitrijcamera wordt gebruikt om verbinding te maken met een monitor,
        DVR of headunit, bijvoorbeeld composite RCA, LVDS OEM of IP over Ethernet.
    badminton_set_components_included:
      name: Badmintonset meegeleverde onderdelen
      description: Vermeldt de afzonderlijke items die in een badmintonset worden
        meegeleverd.
    bag_attachment_method:
      name: Zakbevestigingsmethode
      description: Geeft de primaire methode aan waarmee de drinkzak/-houder aan andere
        uitrusting wordt bevestigd, bijvoorbeeld MOLLE-band, riemlus of karabijnhaak.
    bag_case_carrying_style:
      name: Tas/koffer draagstijl
      description: Specificeert de algemene draagvorm van de tas/koffer, oftewel hoe
        deze is ontworpen om te worden gedragen.
    bag_cover_material:
      name: Materiaal tashoes
      description: Specificeert het materiaal van de tashoes, oftewel de buitenhoes,
        wat invloed heeft op duurzaamheid, grip en uitstraling.
    bag_embellishment:
      name: Tasversiering
      description: Beschrijft opvallende decoratieve elementen aan de buitenkant van
        de tas, zoals kwastjes, studs of doorgestikte details.
    bag_fill_medium:
      name: Tas vulmedium
      description: Geeft aan welke stof wordt gebruikt om de tas te vullen of onder
        druk te zetten, bijvoorbeeld lucht, water of zand.
    bag_material:
      name: Tas materiaal
      description: Materiaal van de luchtzak/blaas.
    bag_padding_level:
      name: Tas vullingsniveau
      description: Specificeert de mate of stijl van vulling die in de tas of hoes
        is verwerkt.
    bag_size_descriptor:
      name: Tas maataanduiding
      description: Marketingmaatklasse van de bucketbag, bijvoorbeeld mini of large,
        als aanvulling op de exacte afmetingen.
    bagel_size:
      name: Bagel formaat
      description: Specificeert het algemene formaat van de bagel, bijv. mini, dun,
        standaard, large, extra large of jumbo.
    bagpipe_accessories_included:
      name: Doedelzakaccessoires inbegrepen
      description: Vermeldt de belangrijkste onderdelen/accessoires die bij de doedelzak
