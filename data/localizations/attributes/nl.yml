      description: Specificeert de stijl, het recept of de culinaire bereiding van
        de soep of bouillon, zodat klanten snel hun voorkeurstype kunnen vinden.
    sour_cream_variety:
      name: Zure room variëteit
      description: Classificeert zure room-producten op basis van hun specifieke variëteit
        of culturele stijl, zoals crème fraîche of Mexican crema.
    soy_sauce_variety:
      name: Sojasausvariëteit
      description: Geeft de specifieke stijl of formulering van sojasaus aan (bijv.
        licht, donker, tamari, ponzu), zodat klanten snel kunnen filteren op smaakprofiel
        en culinair gebruik.
    spark_plug_electrode_material:
      name: Bougie elektrodemateriaal
      description: Materiaal/technologie van de ontstekingselektrodetip(s) van de
        bougie (midden en/of massa), zoals op de markt gebracht (bijv. koper, platina,
        iridium).
    spark_plug_seat_type:
      name: Bougie zittingtype
      description: Afdichtings-/zittingstijl die door de bougie wordt gebruikt bij
        de interface met de cilinderkop.
    spark_plug_terminal_type:
      name: Type bougieaansluiting
      description: Bovenste aansluitingsstijl die wordt gebruikt om de ontstekingskabel/-dop
        aan te sluiten.
    sparkler_shape:
      name: Sterretje vorm
      description: Algemene speelse vorm/vormfactor van het sterretje.
    speaker_cone_material:
      name: Luidsprekerconus materiaal
      description: Primair materiaal van de luidsprekerconus (woofer-/midconus).
    speaker_size:
      name: Luidspreker maat
      description: Nominale drivermaat / pasmaat voor de componentluidspreker (bijv.
        6,5 in, 6x9 in), gebruikt om fabriekslocaties en luidsprekeradapters te matchen.
    special_effects_output_interface:
      name: Special effects uitgangsinterface
      description: Specificeert de uitgangsconnector/-interface die wordt gebruikt
        om special effects-apparaten te bedienen.
    special_effects_stand_stability_features:
      name: Special effects standaard stabiliteitskenmerken
      description: Specificeert ingebouwde stabiliteits- en veiligheidskenmerken die
        bedoeld zijn om kantelen of wegglijden tijdens evenementen te voorkomen.
    specialty_malt_name_type:
      name: Specialty malt naam/type
      description: Geeft het specifieke benoemde specialty malt-type aan (vaak gebruikt
        als commerciële stijlnaam).
    specimen_presentation:
      name: Specimen presentatie
      description: Geeft aan hoe het verzamelbare specimen is voorbereid of gepresenteerd
        (bijv. rauw/onbewerkt, gepolijst, geslepen of gemonteerd).
    speed_bag_accessories_included:
      name: Inbegrepen accessoires stootbal
      description: Vermeldt extra items die bij de speedbag worden meegeleverd, zoals
        handschoenen, luchtpompen, swivels, kettingen of standaards.
    speed_rating:
      name: Snelheidsclassificatie
      description: Geeft de speelsnelheid van het oppervlak aan die door het biljartlaken
        wordt geboden (bijv. langzaam, medium of snel).
    speedometer_backlight_type:
      name: Snelheidsmeter achtergrondverlichtingstype
      description: Specificeert of en hoe de snelheidsmeter verlicht is voor zichtbaarheid
        in het donker.
    speedometer_display_type:
      name: Snelheidsmeter displaytype
      description: 'Geeft de stijl van de snelheidsweergave van de snelheidsmeter
        aan: analoge naald/wijzerplaat, digitale numerieke weergave of een combinatie
        van analoge en digitale elementen.'
    speedometer_unit_of_measure:
      name: Snelheidsmeter maateenheid
      description: Specificeert de snelheidseenheden die op de wijzerplaat/het display
        worden weergegeven.
    spike_replaceability:
      name: Spike vervangbaarheid
      description: Geeft aan of de spikes op de schoen vervangbaar of vast zijn, of
        dat de schoen spikeless is.
    spike_shape:
      name: Spike vorm
      description: Geeft de geometrische stijl aan van de punt van de spikepin, die
        invloed heeft op grip en geschiktheid voor verschillende baanoppervlakken.
    spike_thread_size:
      name: Schroefdraadmaat spike
      description: Specificeert de maat of standaard van de schroefdraadbasis die
        in de schoen wordt geschroefd (bijv. 1/4-20).
    spin_classification:
      name: Spinclassificatie
      description: Geeft het spinprofiel aan waarvoor de discus is ontworpen (laag,
        medium, hoog, hyper spin).
    spin_profile:
      name: Spinprofiel
      description: Specificeert de relatieve spineigenschappen die de shaft bevordert.
    spin_types_supported:
      name: Spin types ondersteund
      description: Vermeldt de soorten spin die de machine aan ballen kan meegeven,
        zodat spelers tegen verschillende schotstijlen kunnen oefenen.
    spinach_preparation_style:
      name: Bereidingsstijl spinazie
      description: Beschrijft de fysieke voorbereiding van de spinaziebladeren of
        productvorm (bijv. heel blad, gehakt, blokjes).
    spinach_variety:
      name: Spinazie variëteit
      description: Geeft de botanische of marktvariëteit van spinazie aan (bijv. baby,
        savooie, water, rood), zodat klanten het exacte type kunnen selecteren dat
        ze willen.
    spindle_bearing_surface_material:
      name: Spindel lageroppervlak materiaal
      description: Materiaal van het punt-/lageroppervlak dat in steunspindels wordt
        gebruikt (punt/onderkant), en invloed heeft op soepelheid en slijtage.
    spindle_bearing_type:
      name: Type spindellager
      description: Type spindelpunt-/lagerinterface die wrijving tegen de steunkom/-cup
        vermindert.
    spindle_finish:
      name: Spindel afwerking
      description: Oppervlakafwerking/coating van de spindel die invloed heeft op
        gevoel, duurzaamheid en uitstraling.
    spindle_hook_type:
      name: Spindel haaktype
      description: Het garenvangmechanisme bovenaan de spindel dat wordt gebruikt
        om de leader/het garen vast te zetten.
    spindle_support_method:
      name: Spindel ondersteuningsmethode
      description: Hoe de spindel tijdens het spinnen moet worden ondersteund.
    spindle_tip_style:
      name: Spindel punt stijl
      description: Vorm/ontwerp van de punt die in de kom/cup rust (het lageroppervlak),
        en invloed heeft op wrijving en soepel spinnen.
    spindle_whorl_position:
      name: Positie van spinspoel
      description: Waar de spinschijf op de spindelschacht zit.
    spinner_blade_shape:
      name: Spinner blad vorm
      description: Geeft de primaire bladvorm aan die op de spinner wordt gebruikt,
        met invloed op vibratie, flash en zwemdiepte.
    spinner_control_card_design_type:
      name: Spinner control card ontwerp/type
      description: Beschrijft het soort spinner control card op basis van hoe deze
        controle-informatie weergeeft (bijv. verhoudingsreferentie, spanningsreferentie,
        conversietabel).
    spinner_subtype:
      name: Subtype spinner
      description: Classificeert het algemene spinnerontwerp of de spinnerfamilie
        (bijv. inline spinner, spinnerbait).
    spinning_oil_application_area:
      name: Spinolie toepassingsgebied
      description: Specificeert het bedoelde toepassingspunt of de bedoelde toepassingspunten
        op een spinnewiel voor de olie.
    spinning_oil_application_tool:
      name: Applicator spinolie
      description: Geeft de applicator-/verpakkingstip stijl aan die wordt gebruikt
        om olie op onderdelen van een spinnewiel aan te brengen voor gecontroleerde
        dosering.
    spinning_oil_features:
      name: Spinolie kenmerken
      description: Benadrukt functionele eigenschappen die relevant zijn voor spinnewielolie
        (residu, vlekvorming, oxidatie en uitwasbaarheid).
    spinning_top_features:
      name: Tolkenmerken
      description: Speciale speelfuncties die in de spintop zijn opgenomen naast basis
        spinnen.
    spinning_top_launch_mechanism:
      name: Spintop lanceermechanisme
      description: Hoe de spintop wordt gestart/aangedreven voor het spinnen.
    spinning_wheel_brake_tension_system_type:
      name: Spinnewiel rem-/spanningssysteem type
      description: Specificeert het rem-/opnamespanningssysteem dat wordt gebruikt
        om de garenopname te regelen.
    spinning_wheel_drive_system:
      name: Aandrijfsysteem spinwielen
      description: Geeft het aandrijfsysteem aan waarvoor de spoel bedoeld is.
    spinning_wheel_hook_system:
      name: Spinnewiel haaksysteem
      description: Specificeert hoe garen langs de flyerarmen wordt geleid.
    spinning_wheel_part_application:
      name: Spinnewiel onderdeeltoepassing
      description: Specificeert voor welke spinnewielonderdelen de olie bedoeld is.
    spinning_wheel_portability_foldability:
      name: Spinnewiel draagbaarheid/inklapbaarheid
      description: Geeft aan of het wiel is ontworpen om in te klappen voor transport.
    spinning_wheel_tension_adjustment_type:
      name: Spinnewiel spanningsverstelling type
      description: Hoe de spanning op het wiel wordt aangepast voor opnamecontrole.
    splice_termination_type:
      name: Splits-/beëindigingstype
      description: Specificeert de eindbeëindiging op de ankerlijn (bijv. gesplitst
        oog, kous, kettinghaak).
    split_shot_cut_type:
      name: Knijploodje snijtype
      description: Specificeert de groef- of openingstijl waarmee het aan de lijn
        kan worden bevestigd.
    split_shot_shape:
      name: Vorm knijplood
      description: Beschrijft de fysieke vorm van het knijploodje, met invloed op
        hydrodynamica en weerstand tegen vastraken.
    split_shot_size:
      name: Knijploodje maat
      description: SSG, AAA, BB, 1) die door fabrikanten en vissers wordt gebruikt
        om knijploodjes te classificeren. SSG, AAA, BB, 1) worden door fabrikanten
        en vissers gebruikt om Split te classificeren. Vult exacte gewichtsmetingen
        aan.
    spoiler_adjustability:
      name: Spoiler verstelbaarheid
      description: Geeft aan of de hoek/hoogte van de spoiler verstelbaar is.
    spoke_accessory_function:
      name: Spaakaccessoire functie
      description: Classificeert de primaire functie van het accessoire op het wiel,
        zoals decoratief, reflecterend of verlicht.
    spoke_butting_profile:
      name: Spaak verjongingsprofiel
      description: Beschrijft hoe de spaakdiameter over de lengte verandert (recht,
        enkel-, dubbel-, drievoudig of viervoudig verjongd), met invloed op gewicht
        en sterkte.
    spoke_gauge:
      name: Spaak dikte
      description: Specificeert de gauge (draaddikteclassificatie) van spaken waarmee
        de nippel compatibel is.
    spoke_interface_type:
      name: Type spaakinterface
      description: Geeft de spaakkopstijl aan waarvoor de naaf is ontworpen (J-bend,
        straight-pull, T-head).
    spoke_shape:
      name: Spaak vorm
      description: Specificeert de externe dwarsdoorsnede van de spaakdraad, die invloed
        heeft op aerodynamica en uitstraling.
    spool_form_factor:
      name: Spoel vormfactor
      description: De fysieke stijl van het spoellichaam en hoe de draad/het garen
        wordt vastgehouden (bijv. met flens vs. kegel).
    spoon_style:
      name: Lepel stijl
      description: Geeft het functionele subtype of de stijl van de lepel aan, zoals
        casting, flutter of trolling.
    sports_bra_padding_type:
      name: Sportbeha vullingstype
      description: Specificeert het soort vulling in de sportbeha.
    sports_cap_style:
      name: Sportpet stijl
      description: Geeft de algemene constructie/stijl van de pet aan (bijv. baseballpet,
        snapback), los van teambranding.
    sports_governing_body_certification:
      name: Sport overkoepelende organisatie certificering
      description: Geeft de officiële certificeringen of goedkeuringen aan van erkende
        sportorganisaties, waarmee wordt bevestigd dat het product aan wedstrijdnormen
        voldoet.
    sports_surface_compatibility:
      name: Compatibiliteit met sportondergronden
      description: Vermeldt de speel- of oppervlaktypen waarop de verf veilig kan
        worden aangebracht.
    sports_toy_set_contents:
      name: Sport speelgoedset inhoud
      description: Geeft aan welke onderdelen bij de sport speelgoedset zijn inbegrepen
        (bijv. bal, knuppel, net, doelen).
    spray_string_cleanup_method:
      name: Serpentinespray reinigingsmethode
      description: Aanbevolen manier om resten van serpentinespray te verwijderen/reinigen.
    spray_string_finish_effect:
      name: Serpentinespray afwerking/effect
      description: Visueel effect van de gespoten serpentinespray na aanbrengen (glans/reflectiviteit
        en speciale effecten).
    spray_string_formulation_type:
      name: Serpentinespray formuleringstype
      description: Hoe het product zich tijdens en na het spuiten gedraagt (bijv.
        uitwasbaar vs. permanent).
    spray_string_recommended_surface:
      name: Serpentinespray aanbevolen oppervlak
      description: Oppervlaktypen waarop de serpentinespray bedoeld is om te worden
        gebruikt (en waarschijnlijk vanaf kan worden gereinigd).
    spray_string_scent:
      name: Serpentinespray geur
      description: Geur- of geurprofiel, indien aanwezig, van de serpentinespray.
    spray_string_suitable_age_group:
      name: Serpentinespray geschikte leeftijdsgroep
      description: Aanbevolen minimumleeftijd/leeftijdsgroep voor veilig gebruik.
    spread_consistency:
      name: Spread consistentie
      description: Beschrijft de textuur/consistentie van de dip of spread om verwachtingen
        te scheppen voor mondgevoel en gebruik (bijv. glad, grof, opgeklopt).
    spread_variety:
      name: Spread variëteit
      description: Classificeert het specifieke type fruitspread (bijv. jam, gelei,
        marmelade, curd), zodat klanten onderscheid kunnen maken tussen verschillende
        bereidingsstijlen en texturen.
    spreader_bar_type:
      name: Type spreidstang
      description: Geeft het type spreader bar of haaksysteem aan dat wordt meegeleverd
        of compatibel is met het harnas.
    sprint_canoe_class:
      name: Sprintkano klasse
      description: Specificeert de officiële klasseaanduiding voor sprintkanoraces.
    sprout_presentation:
      name: Kiemen presentatie
      description: Geeft de fysieke presentatie van het product aan (bijv. verse scheuten,
        microgreens, levende kweekpot, poeder).
    squash_and_gourd_variety:
      name: Pompoen en kalebas soort
      description: Geeft de specifieke cultivar of marktvariëteit van de pompoen of
        kalebas aan, zodat shoppers snel het gewenste type kunnen vinden.
    stability_class:
      name: Stabiliteitsklasse
      description: Algemene stabiliteitscategorisering afgeleid van vluchtclassificaties
        of marketingclaims.
    stabilizer_thread_size:
      name: Stabilisator draadmaat
      description: Draadspecificatie die wordt gebruikt om een stabilisator of accessoire
        aan een boog of kruisboog te bevestigen.
    stabilizer_type:
      name: Stabilisator type
      description: Geeft de stijl of positionele classificatie van de boog- of kruisboogstabilisator
        aan.
    stages_supported:
      name: Ondersteunde stadia
      description: Geeft aan met hoeveel stadia een raket of kit ontworpen is om te
        vliegen.
    stain_remover_format:
      name: Vlekverwijderaar formaat
      description: Specificeert de productafgifte/-vorm die wordt gebruikt om voertuigvlekken
        te behandelen (sprayflacon, aerosol, schuim, gel, poeder, doekjes, pen/marker).
    stake_shape:
      name: Tentharing vorm
      description: Definieert de doorsnede of ontwerpstijl van een tentharing, wat
        invloed heeft op houdkracht in verschillende grondsoorten.
    stamp_block_features:
      name: Stempelblok kenmerken
      description: Benadrukt functionele kenmerken van stempelblokken, zoals meetrasters,
        handgrepen of antislipoppervlakken.
    stamp_block_type:
      name: Stempelblok type
      description: Specificeert de constructie/stijl van het stempelblok dat wordt
        gebruikt om stempels te bevestigen voor stempelen (bijv. transparant acrylblok,
        blok met houten montage of positioneringsblok).
    stamp_set_pieces_included:
      name: Inbegrepen stempelonderdelen
      description: Geeft aan welke componenten in de stempel- en stempelkussenset
        zijn inbegrepen (bijv. stempels, stempelkussens, markers).
    stand_padding_material:
      name: Standaardbekledingsmateriaal
      description: Materiaal dat op contactpunten wordt gebruikt om de afwerking van
        het instrument te beschermen (bijv. schuim, rubber, silicone).
    staple_fiber_animal_fiber_type:
      name: Stapelvezel dierlijk vezeltype
      description: Specifiek vezeltype van dierlijke oorsprong wanneer het brontype
        van de stapelvezel 'dierlijk' is.
    staple_fiber_crimp_level:
      name: Stapelvezel kroesniveau
      description: Mate van natuurlijke kroes/golving in de vezel.
    staple_fiber_preparation_type:
      name: Stapelvezel voorbereidingstype
      description: De voorbereidings-/verwerkingsstaat van de vezel zoals verkocht
        (hoe uitgelijnd/behandeld), wat sterke invloed heeft op spinmethode, gemak
        van trekken en eindresultaat.
    staple_fiber_source_type:
      name: Stapelvezel brontype
      description: Brede oorsprongscategorie voor de vezelinhoud.
    starch_processing_type:
      name: Zetmeel verwerkingstype
      description: Geeft aan of het zetmeel natief is of fysisch of chemisch gemodificeerd
        is (bijv. instant, voorverstijfseld) om specifieke functionele eigenschappen
        te leveren, zoals verdikkingssnelheid of temperatuurtolerantie.
    starch_source:
      name: Zetmeel bron
      description: Specificeert de botanische bron waaruit het kookzetmeel of verdikkingsmiddel
        afkomstig is (bijv. maïs, aardappel, tapioca). Bron is de primaire onderscheidende
        factor voor kookzetmelen en heeft directe invloed op receptgeschiktheid, allergenenoverwegingen
        en zoekgedrag van consumenten.
    starfruit_variety:
      name: Carambola variëteit
      description: Geeft de specifieke cultivar of variëteit van carambola aan (bijv.
        Arkin, Fwang Tung).
    starter_drive_type:
      name: Type startmotor-aandrijving
      description: Het type aandrijf-/aangrijpmechanisme van de startmotor dat wordt
        gebruikt om het rondsel in de starterkrans te laten grijpen.
    starter_pistol_action_type:
      name: Startpistool actietype
      description: Geeft het schiet-/actiemonisme van het startpistool aan (bijv.
        single action, double action, semi-automatisch).
    starter_pistol_caliber:
      name: Startpistool kaliber
      description: Specificeert het kaliber van de losse munitie of patroon waarvoor
        de kamer van het startpistool geschikt is.
    starter_terminal_type:
      name: Type startmotor-aansluiting
      description: Specificeert de terminal-/connectorstijl die wordt gebruikt voor
        elektrische aansluitingen op de startmotor of startrelais (bijv. stud, spade,
        stekkerconnector).
    starting_block_anchoring_method:
      name: Startblok verankeringsmethode
      description: Beschrijft hoe de blokken aan het baanoppervlak worden bevestigd
        (bijv. spikes, zuignappen, rubberen pads).
    steerer_tube_design:
      name: Stuurbuis ontwerp
      description: Beschrijft het structurele ontwerp van de stuurbuis, zoals recht,
        tapered, threaded enz., wat headset- en framecompatibiliteit bepaalt.
    steering_cable_end_fitting_type:
      name: Stuurkabel eindfittingtype
      description: Geeft de eind-/bevestigingsstijl aan aan de uiteinden van een stuurkabel
        voor vaartuigen (helmzijde en motor-/helmstokzijde) om compatibiliteit met
        de stuurhelm en motorverbindingspunten te garanderen. Gebruik waar van toepassing
        de standaard- of fabrikantaanduiding.
    steering_column_adjustability_features:
      name: Stuurkolom verstelbaarheidskenmerken
      description: Geeft aan welke verstel functies in de stuurkolom zijn ingebouwd.
    steering_column_ignition_provision:
      name: Stuurkolom contactslotvoorziening
      description: Geeft aan of de stuurkolom ontworpen is voor een contactslotcilinder/-schakelaar
        en/of stuurslot.
    steering_column_shaft_end_interface_type:
      name: Stuurkolom aseind interfacetype
      description: Geeft de interfacestijl van het aseinde van de stuurkolom aan (bijv.
        splined, double D, keyed).
    steering_column_shift_type:
      name: Stuurkolom schakelingstype
      description: Specificeert of de stuurkolom een kolomgemonteerd schakelmechanisme
        bevat en welk transmissietype het is.
    steering_component_drive_type:
      name: Stuurcomponent aandrijvingstype
      description: Specificeert het aandrijf-/bekrachtigingsmechanisme dat relevant
        is voor stuurcomponenten (met name pompen en EPS-systemen).
    steering_position:
      name: Stuurpositie
      description: Specificeert of de bestelwagen links- of rechtsgestuurd is.
    steering_pump_pulley_type:
      name: Stuurbekrachtigingspomp poelietype
      description: Specificeert het poelie-aandrijvingstype/de interface die wordt
        gebruikt met de stuurbekrachtigingspomp.
    steering_rack_finish_coating:
      name: Stuurhuis afwerking/coating
      description: Specificeert de buitenafwerking/coating voor corrosiebescherming.
    steering_rack_position:
      name: Stuurhuispositie
      description: Specificeert waar het stuurhuis in het voertuigstuursysteem wordt
        gemonteerd/gebruikt.
    steering_wheel_cover_installation_type:
      name: Stuurwielhoes installatietype
      description: Hoe de stuurwielhoes op het stuurwiel wordt geïnstalleerd/vastgezet.
    steering_wheel_grip_material:
      name: Stuurwiel gripmateriaal
      description: Specificeert het materiaal op de stuurwielrand/grip (waar de handen
        contact maken), dat kan verschillen van de kern/spaken van het stuurwiel.
    steering_wheel_mounting_pattern:
      name: Stuurwiel montagepatroon
      description: Specificeert het bout-/gatmontagepatroon dat wordt gebruikt om
        het stuurwiel aan een naaf of adapter te bevestigen (bijv. 3-bouts, 5-bouts).
    steering_wheel_rim_material_grip_surface:
      name: Stuurwiel randmateriaal (gripoppervlak)
      description: Specificeert het primaire grip-/randbekledingsmateriaal (onderscheiden
        van het algemene constructiemateriaal).
    stem_material:
      name: StammateriaalStem materiaal
      description: Specificeert het materiaal dat specifiek wordt gebruikt voor de
        pijpstem of het mondstuk (bijv. acryl, eboniet, lucite).
    stencil_machine_consumable_type:
      name: Stencilmachine verbruiksartikeltype
      description: Specificeert de verbruiksartikelen die nodig zijn om de machine
        te gebruiken (indien van toepassing).
    step_surface_texture:
      name: Textuur tredevlak
      description: Specificeert het tredeprofiel of oppervlakontwerp/-materiaal dat
        bedoeld is om grip en comfort te verbeteren wanneer nat.
    stepper_motion_type:
      name: Stepper bewegingstype
      description: Definieert de primaire stapbeweging die de machine biedt.
    stick_bow_profile:
      name: Hockeystick bowprofiel
      description: Specificeert het krommingsprofiel (of “bow type”) van de hockeystickshaft,
        een cruciale factor die invloed heeft op balcontrole, drag-flickprestaties
        en speelstijl.
    stick_construction:
      name: Stickconstructie
      description: Specificeert de constructiestijl van de hockeystick, zoals eendelig
