    scoring_pattern:
      name: Scorepatroon
      description: Lay-out van scorezones die op het speelveld zijn gedrukt.
    scoring_system_type:
      name: Type scoresysteem
      description: Beschrijft de stijl van het scoremechanisme dat bij de tafel wordt
        meegeleverd, zoals handmatige schuiven of verschillende elektronische displays.
    scottish_smallpipes_bag_material:
      name: Schotse smallpipes zakmateriaal
      description: Specificeert het materiaal van de zak (luchtreservoir) die met
        de smallpipes wordt meegeleverd.
    scottish_smallpipes_drone_tuning_configuration:
      name: Schotse smallpipes drone-stemconfiguratie
      description: Specificeert de drone-stemopstelling die met het instrument wordt
