    drag_system_material:
      name: Slipremsysteem materiaal
      description: Geeft het materiaal of de technologie aan die in de slipremstapel
        wordt gebruikt, wat invloed heeft op hittebestendigheid en soepelheid.
    drag_system_type:
      name: Type slipremsysteem
      description: Geeft de stijl van het slipremmechanisme in de molen aan, zoals
