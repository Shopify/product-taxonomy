    seam_gauge_slider_material:
      name: Naadmeter schuifmateriaal
      description: Geeft het materiaal van het verstelbare schuif-/aanwijscomponent
        aan, indien aanwezig.
    seam_ripper_tip_style:
      name: Tornmes puntstijl
      description: Beschrijft het functionele puntontwerp dat wordt gebruikt om onder
        steken te schuiven en draad veilig door te snijden.
    seam_sealing_type:
      name: Naadafdichting type
      description: Beschrijft de methode die wordt gebruikt om binnendringen van water
        bij de naden van het regenpak te voorkomen (bijv. volledig getapet, gelast).
    seam_type:
      name: Naadtype
      description: Beschrijft de stikstijl op de honkbal, wat van invloed is op grip,
        aerodynamica en beoogd speelniveau.
    season_condition_protection:
      name: Seizoen-/conditiebescherming
      description: Geeft de primaire weers-/conditie aan waartegen de voorruitafdekking
        moet beschermen.
    season_rating:
      name: Seizoensklasse
      description: Specificeert de seizoensklasse van de tent en geeft aan voor welke
        weersomstandigheden de tent geschikt is (bijv. 3-seizoenen, 4-seizoenen, 5-seizoenen/expeditie).
    seasoning_variety:
      name: Kruidenmix variant
      description: Classificeert de kruidenmix op basis van bereidingsstijl of traditioneel
        culinair gebruik.
    seat_adjustment_power_type:
      name: Stoelverstelling voedingstype
      description: Specificeert hoe de stoelverstellingsmechanismen worden aangedreven
        (handmatige hendels vs. elektrische motoren), wat van invloed kan zijn op
        bedrading/compatibiliteit.
    seat_belt_attachment_type:
      name: Veiligheidsgordel bevestigingstype
      description: Specificeert hoe de gordelband aan de voertuig-/gordelhardware
        wordt bevestigd.
    seat_belt_buckle_electrical_connector_type:
      name: Veiligheidsgordel gesp elektrisch connectortype
      description: Specificeert de connector/interface die wordt gebruikt voor de
        bedrading van de gespschakelaar/gordelspanner, waar van toepassing.
    seat_belt_buckle_mounting_type:
      name: Veiligheidsgordel gesp montagetype
      description: Beschrijft hoe de gesp/ontvanger aan het voertuig, de stoel of
        de gordelsteel wordt bevestigd (bijv. vastgeschroefd, vastgeklikt).
    seat_belt_buckle_release_button_color:
      name: Veiligheidsgordel gesp ontgrendelknop kleur
      description: Specificeert de kleur van de ontgrendelknop van de gesp.
    seat_belt_cover_placement:
      name: Veiligheidsgordel afdekking plaatsing
      description: Geeft aan voor welk deel van de veiligheidsgordel de hoes bedoeld
        is.
    seat_belt_integration:
      name: Integratie veiligheidsgordel
      description: Specificeert of de stoel een geïntegreerde veiligheidsgordel en/of
        gespopening bevat, of dat de OEM-gespopening van het voertuig moet worden
        overgezet voor installatie.
    seat_belt_provision:
      name: Veiligheidsgordel voorziening
      description: Geeft aan of veiligheidsgordels en/of bijbehorende gordelhardware
        (bijvoorbeeld gespen) bij de achterbankconstructie zijn inbegrepen of moeten
        worden overgezet vanaf de originele stoel.
    seat_belt_strap_installation_location:
      name: Veiligheidsgordel band installatielocatie
      description: Geeft aan waar de band binnen het gordelsysteem wordt geïnstalleerd.
    seat_cover_placement:
      name: Plaatsing zitplaatshoes
      description: Geeft aan voor welke zitpositie(s) in het voertuig de hoes bedoeld
        is.
    seat_cover_securement_method:
      name: Stoelhoes bevestigingsmethode
      description: Geeft de primaire manier aan waarop de stoelhoes aan de stoel wordt
        bevestigd. Als er meerdere methoden worden gebruikt, selecteer dan de belangrijkste/primaire
        methode.
    seat_cover_set_contents:
      name: Stoelhoes set inhoud
      description: Beschrijft welke onderdelen in de verpakking zijn inbegrepen (bijv.
        alleen zittingen vs. volledige set + hoofdsteunen).
    seat_fabric:
      name: Stoelstof
      description: Primaire stof die wordt gebruikt voor de zitting en rugleuninghoes
        van de stoel.
    seat_height_category:
      name: Zithoogte categorie
      description: Classificeert de kruk op basis van het gebruikelijke zithoogtebereik
        (bijv. counter- of barhoogte) om selectie te vereenvoudigen.
    seat_material:
      name: Zitting materiaal
      description: Geeft het primaire materiaal van het zitoppervlak van de bank aan.
    seat_mounting_type:
      name: Type stoelmontage
      description: Montage-/railconfiguratie die wordt gebruikt om de stoel aan de
        voertuigvloer te bevestigen.
    seating_surface_material:
      name: Materiaal zitoppervlak
      description: Specificeert het materiaal van het gedeelte waarop iemand achteroverleunt
        (bijv. Textilene mesh, slingstof, wicker, gevoerde bekleding).
    seatpost_clamp_mechanism:
      name: Zadelpenklem mechanisme
      description: Type klem-/sluitsysteem dat de zadelpen vastzet.
    section_orientation_compatibility:
      name: Sectionele oriëntatiecompatibiliteit
      description: Geeft aan of het accessoire past op een linkszijdige, rechtszijdige
        of universele sectionele oriëntatie.
    sectional_configuration:
      name: Sectionele configuratie
      description: Definieert de specifieke module of oriëntatie van de sectionele
        eenheid (bijv. hoek, linker einde, chaise), zodat shoppers kunnen samenstellen
    sectional_shape:
      name: Element vorm
      description: Definieert de algehele geometrische configuratie/indeling van de
        elementenbank.
    secured_components:
      name: Beveiligde onderdelen
      description: Vermeldt de specifieke fietsonderdelen die de vergrendelingspen
        of beveiligingsmoeren beschermen (bijv. voorwiel, achterwiel, zadelpen).
    seed_content:
      name: Zaad inhoud
      description: Geeft aan of de citrusvrucht pitloos is, weinig pitten heeft of
        volledig pitten bevat.
    seed_size_classification:
      name: Classificatie van zaadgrootte
      description: Geeft de relatieve grootte aan van de oneetbare pit in de lychee,
        wat van invloed is op de hoeveelheid eetbaar vruchtvlees.
    self_adhesive_backing_format:
      name: Vorm van zelfklevende achterkant
      description: Fysieke vorm van de zelfklevende achterkant die met de lontplaatje
        wordt meegeleverd (vooraf aangebracht kussentje vs. losse stickers, enz.).
    self_adhesive_hook_loop_backing_type:
      name: Zelfklevende klittenband achterkant type
      description: Specificeert de constructie van de achterkant/liner en het lijmsysteem
        dat aan de zelfklevende zijde wordt gebruikt.
    self_adhesive_hook_loop_fastener_shape:
      name: Vorm van zelfklevende klittenbandsluiting
      description: Specificeert de snit/vorm van de meegeleverde bevestigingsstukken.
    self_hardening_clay_finish:
      name: Zelfhardende klei afwerking
      description: Beschrijft het oppervlak/ de glans zodra de klei volledig is uitgehard
        (handig om te kiezen tussen natuurlijk mat, satijn, enz.).
    self_hardening_clay_water_resistance_after_curing:
      name: Zelfhardende klei waterbestendigheid na uitharding
      description: Geeft de bestendigheid tegen blootstelling aan water aan zodra
        de klei volledig is uitgehard (zonder extra sealer).
    sensor_functions:
      name: Sensor functies
      description: Geeft aan welke fietsstatistieken de sensor meet.
    sensor_measurement_mode:
      name: Sensor meetmodus
      description: Geeft aan welke metriek de sensor kan registreren (bijv. alleen
        cadans, alleen snelheid, dubbele snelheid & cadans).
    sensor_mounting_position:
      name: Montagepositie sensor
      description: Specificeert de locatie op de fiets of fietser waar de sensor wordt
        geïnstalleerd, zoals crankarm, wielnaaf of schoen. Dit is van invloed op de
        compatibiliteit met verschillende fietsopstellingen.
    sensor_mounting_type:
      name: Type sensormontage
      description: Specificeert hoe de MAP-sensor op het inlaatspruitstuk/de motor
        wordt gemonteerd (bijv. opschroefflens vs. indrukrubber).
    sensor_or_gauge_mounting_location:
      name: Sensor- of metermontagelocatie
      description: Specificeert waar op het voertuig de sensor of meter bedoeld is
        om te worden geïnstalleerd (systeem-/locatieniveau, niet links/rechts).
    sensory_modality:
      name: Sensorische modaliteit
      description: Primaire sensorische ervaring(en) waarvoor het speelgoed is ontworpen
        (kan multisensorisch zijn).
    sensory_toy_fidget_mechanism:
      name: Sensorisch speelgoed fidgetmechanisme
      description: Primaire interactie/mechanisme dat wordt gebruikt voor friemelen
        en zelfregulatie.
    sensory_toy_light_features:
      name: Sensorisch speelgoed lichtkenmerken
      description: Lichtgedrag/-effecten die het speelgoed biedt.
    sensory_toy_texture_type:
      name: Sensorisch speelgoed textuurtype
      description: Dominant oppervlaktegevoel/dominante textuurelementen die worden
        gebruikt voor tactiele stimulatie.
    sequin_application_method:
      name: Aanbrengmethode pailletten
      description: Hoe de paillet bedoeld is om te worden aangebracht/gebruikt (vastnaaien
        vs. vastlijmen vs. warmtefixatie, enz.).
    sequin_finish:
      name: Paillet afwerking
      description: Beschrijft de oppervlakte-/visuele afwerking en het reflecterende
        effect van de pailletten die op de patch worden gebruikt (bijv. mat, metallic,
        holografisch), niet de achterkant van de patch of bevestigingsmethode.
    serger_stitch_functions:
      name: Lockmachine steekfuncties
      description: De steekfuncties die de lockmachine ondersteunt (overlock-/overedge-variaties
        en speciale lockmachinesteken).
    serger_thread_count:
      name: Lockmachine draadaantal
      description: Aantal draden dat de lockmachine kan gebruiken om te naaien (bijv.
        2/3/4/5-draads capaciteit).
    service_interval:
      name: Service-interval
      description: Aanbevolen maximale tijd tussen vereiste inspecties/onderhoudsbeurten
        door een erkend servicestation.
    serving_temperature:
      name: Serveertemperatuur
      description: Geeft de beoogde serveertemperatuur of toestand van het product
        aan wanneer het wordt geconsumeerd.
    sesame_seed_hull_status:
      name: Sesamzaad hulsstatus
      description: Specificeert of de tahin is gemaakt van gepeld of ongepeld sesamzaad,
        wat van invloed is op kleur, smaak en voedingswaarde.
    sesame_seed_roast_level:
      name: Sesamzaad roosteringsniveau
      description: Geeft aan hoe sterk het sesamzaad vóór het malen is geroosterd,
        zodat shoppers hun gewenste smaakintensiteit kunnen kiezen.
    sesame_seed_variety:
      name: Sesamzaad variant
      description: Geeft de kleur of variant aan van het sesamzaad dat wordt gebruikt
        om de olie te maken.
    set_classification:
      name: Set classificatie
      description: Definieert het beoogde speelniveau of de stijl van de croquetset
        (bijv. toernooi, recreatief, reizen).
    set_components:
      name: Set onderdelen
      description: Geeft aan welke items met het product worden meegeleverd (bijv.
        alleen middenstok vs. volledige set).
    set_items_included:
      name: Inbegrepen items
      description: Specificeert de kledingstukken of accessoires die in de set zijn
        inbegrepen, zoals sareestof, dupatta of riem.
    setup_mechanism:
      name: Opzetmechanisme
      description: Beschrijft de primaire uitvouwmethode van de tent (bijv. pop-up,
        opblaasbaar/airbeam, rooftop clamshell).
    setup_type:
      name: Opzettype
      description: Hoe de speeltent/tunnel wordt gemonteerd of opgezet.
    sew_in_interfacing_elasticity:
      name: Innaaibare tussenvoering elasticiteit
      description: Geeft aan of de innaaibare tussenvoering rek heeft en, zo ja, in
        welke richting(en), om aan te sluiten op gebreide of geweven projecten.
    sew_in_label_placement:
      name: Innaaibaar label plaatsing
      description: Geeft de beoogde plaatsingslocatie op het afgewerkte item aan.
    sew_on_edge_finish:
      name: Opnaaibare randafwerking
      description: Geeft aan of de randen van het klittenband onafgewerkt/gesneden
        of afgewerkt zijn om rafelen tegen te gaan.
    sew_on_rhinestone_hole_orientation:
      name: Opnaaibare strasssteen gat oriëntatie
      description: Opstelling/oriëntatie van gaten ten opzichte van de steen (bijv.
        naast elkaar, tegenover elkaar, kruislings) ter ondersteuning van verschillende
        steekstijlen.
    sewing_kit_components_included:
      name: Inbegrepen naaibenodigdheden
      description: Vermeldt de naaibenodigdheden/-gereedschappen die in een naaiset
        zijn inbegrepen, zodat shoppers kunnen vergelijken wat er in elke set zit.
    sewing_machine_bobbin_class:
      name: Naaimachine spoelklasse
      description: Specificeert de spoelklasse/het spoelsysteem dat compatibel is
        met de naaimachine voor spoelen en spoelhuisjes.
    sewing_machine_buttonhole_type:
      name: Naaimachine knoopsgattype
      description: Methode voor het maken van knoopsgaten die door de machine wordt
        ondersteund.
    sewing_machine_display_type:
      name: Naaimachine displaytype
      description: Type bedienings-/display-interface op de naaimachine.
    sewing_machine_needle_point_type:
      name: Naaimachine naaldpunttype
      description: Definieert de puntgeometrie/puntfamilie van de naald die bepaalt
        hoe deze verschillende stoffen binnendringt (bijv. scherpe punt vs. ballpoint
        vs. wigpunt).
    sewing_machine_needle_system:
      name: Naaldsysteem naaimachine
      description: Het gestandaardiseerde naaldsysteem/modelnummer dat de compatibiliteit
        met de machine bepaalt (vaak geschreven als 130/705 H, HA×1, DB×1, 15×1, enz.).
    sewing_machine_needle_type:
      name: Type naald naaimachine
      description: Specificeert de beoogde toepassing/stijl van de naald (bijv. universeel,
        ballpoint, jeans/denim), wat van invloed is op de steekkwaliteit en geschiktheid
        voor stoffen.
    sewing_machine_shank_type:
      name: Type naaimachineschacht
      description: Specificeert de persvoetstang-/enkel-interfacestandaard waarvoor
        de voet is ontworpen, voor compatibiliteit met de naaimachine (bijv. lage
        schacht, hoge schacht, schuine schacht).
    sewing_pattern_accessory_type:
      name: Naaipatroon accessoiretype
      description: Specificeert welk accessoire het naaipatroon maakt.
    sewing_pattern_notions_required:
      name: Naaipatroon benodigde fournituren
      description: Vermeldt opvallende aanvullende materialen/hardware die nodig zijn
        om het project te voltooien (naast stof en draad).
    sewing_pattern_recommended_fabric:
      name: Naaipatroon aanbevolen stof
      description: Vermeldt de aanbevolen stoftypes/-gewichten voor het naaipatroon
        (zoals opgegeven door de patroonontwerper).
    sewing_pattern_size_range:
      name: Naaipatroon maatbereik
      description: Specificeert het beoogde maatbereik dat het patroon dekt (bijv.
        baby tot volwassene, plusmaten).
    sewing_thread_size_system:
      name: Naaigaren maatsysteem
      description: De maatstandaard die wordt gebruikt om de garendikte aan te geven
        (bijv. Tex, Denier, Ticket, gewichtnummer, V-maat).
    shaft_curvature:
      name: Schacht kromming
      description: Beschrijft de algehele vorm van de shaft, wat van invloed is op
        speling, swing en ergonomie.
    shaft_kick_point:
      name: Schacht kickpoint
      description: Geeft de positie langs de shaft aan waar deze tijdens een swing
        het meest buigt, wat de balvlucht beïnvloedt.
    shaft_length_type:
      name: Type schachtlengte
      description: Industriestandaard categorische maataanduiding voor dartshafts
        (bijv. Short, Medium) die wordt gebruikt wanneer exacte millimetermaten niet
        worden vermeld.
    shaft_shape:
      name: Schacht vorm
      description: Definieert het dwarsdoorsnedeprofiel van de tonfa-shaft (bijv.
        rond, vierkant, achthoekig).
    shaker_fill_material:
      name: Vulmateriaal shaker
      description: Specificeert de primaire interne vulling die wordt gebruikt om
        het shakergeluid te creëren (waar van toepassing), zoals kralen, zaden of
        hagel.
    shaker_shell_material:
      name: Materiaal shakerbehuizing
      description: Specificeert het primaire materiaal van de body/schaal van de egg
        shaker (de buitenbehuizing).
    shallot_variety:
      name: Sjalot variant
      description: Geeft de specifieke cultivar, het markttype of de variant van het
        sjalotproduct aan.
    shank_style:
      name: Bit schachtstijl
      description: Beschrijft de algehele vorm/configuratie van de schachten van het
        stangbit (bijv. recht, gebogen, grazing).
    shapewear_enhancement_feature:
      name: Shapewear verbeteringskenmerk
      description: Benadrukt de primaire functionele verbetering die het kledingstuk
        biedt (bijv. buikcontrole, billift, lekvrije voering).
    sheath_type:
      name: Schede type
      description: Type schede/foedraal dat bij het verzamelmes wordt meegeleverd.
    sheet_music_clip_padding_material:
      name: Bladmuziek klem voeringmateriaal
      description: Materiaal van eventuele bek-/greepvulling die contact maakt met
        papier of de rand van de standaard om scheuren en wegglijden te voorkomen.
    sheet_music_clip_spring_tension_level:
      name: Bladmuziekklem veerspanningsniveau
      description: Relatieve sterkte van de klemveer / klemkracht.
    sheet_music_clip_use_environment:
      name: Bladmuziekklem gebruiksomgeving
      description: Primaire beoogde omgeving waarin de klem optimaal moet presteren.
    shell_construction:
      name: Ketelconstructie
      description: Specificeert hoe de bassdrumketel is geconstrueerd, wat sterk van
        invloed is op klank en gewicht.
    shell_finish:
      name: Ketelafwerking
      description: Buitenafwerking behandeling van de doumbekketel.
    shell_hull_status:
      name: Schaal/huls status
      description: Specificeert of de noten of zaden worden verkocht met intacte of
        verwijderde schalen of hulzen.
    shift_boot_attachment_method:
      name: Schakelhoes bevestigingsmethode
      description: Specificeert hoe de schakelhoes wordt bevestigd aan de console-/schakelpookafwerking
        van het voertuig (bijv. vastklikbare afwerkingsrand, borgring, lijm).
    shift_boot_installation_hardware_included:
      name: Schakelhoes meegeleverd installatiemateriaal
      description: Vermeldt het installatiemateriaal en de onderdelen die met de schakelhoes
        worden meegeleverd.
    shift_knob_illumination:
      name: Pookknop verlichting
      description: Specificeert of de pookknop verlichting bevat en de verlichtingsmethode/het
        verlichtingstype (bijv. fotoluminescent, LED, glasvezel, patroon met achtergrondverlichting).
    shift_knob_installation_method:
      name: Pook knop montagemethode
      description: Specificeert hoe de pookknop aan de versnellingspook wordt bevestigd.
    shift_knob_shape:
      name: Pookknop vorm
      description: Beschrijft de algehele ergonomische vormfactor van de pookknop.
    shift_pattern_type:
      name: Schakelpatroon type
      description: Specificeert de stijl van de versnellingsmarkering op de pookknop
        (indien aanwezig).
    shifter_compatibility:
      name: Compatibiliteit met schakelaars
      description: Geeft aan of de stuurextensie compatibel is met elektronisch schakelen,
        mechanisch schakelen, beide of niet compatibel is met schakelen.
    shifter_mounting_interface:
      name: Montage-interface schakelaar
      description: Beschrijft hoe de shifter aan de fiets wordt bevestigd (bijv. afzonderlijke
        klemmaat, I-Spec, MatchMaker, stuureinde, onderbuis, draadloos).
    shifting_actuation_type:
      name: Schakelbediening type
      description: Geeft aan welk mechanisme wordt gebruikt om in de groepset te schakelen
        (mechanisch, elektronisch bedraad, elektronisch draadloos, hydraulisch).
    shifting_mechanism:
      name: Schakelmechanisme
      description: Geeft aan of de shifter mechanisch of elektronisch werkt en of
        deze geïndexeerd of op frictie gebaseerd is.
    shim_purpose:
      name: Shim doel
      description: Definieert het functionele type van het product (bijv. shim, wig,
        afstandsstuk), zodat fietsers snel de juiste afsteloplossing kunnen vinden
        zonder aparte subcategorieën nodig te hebben.
    shin_guard_attachment_method:
      name: Scheenbeschermer bevestigingsmethode
      description: Classificeert de algehele ontwerpvorm van de scheenbeschermer,
        inclusief integratie van enkelbescherming of sokconstructie.
    shirt_cuff_style:
      name: Manchetstijl
      description: Geeft aan hoe de mouwmanchet is geconstrueerd, wat van invloed
        is op formaliteit, combinatie met manchetknopen en comfort.
    shochu_base_ingredient:
      name: Shochu basisingrediënt
      description: Geeft aan welke primaire zetmeel- of suikerbron wordt gebruikt
        om de shochu te produceren.
    shochu_soju_variety:
      name: Shochu en soju variant
      description: Classificeert het product op basis van de erkende stijl of het
        productietype.
    shock_absorber_bushing_material:
      name: Schokdemper busmateriaal
      description: Materiaal van de montagebussen/isolatoren die met de schokdemper
        worden meegeleverd of erin zijn ingebouwd.
    shock_absorber_charge_type:
      name: Schokdemper vullingstype
      description: Specificeert de vul-/dempingstechnologie van de schokdemper (bijv.
        hydraulisch/olie, gasgevuld, lucht) en/of het bijbehorende buisontwerp waar
        van toepassing.
    shock_absorber_mount_type_lower:
      name: Bevestigingstype schokdemper
      description: Onderste bevestigingsinterface stijl van de schokdemper voor passing.
    shock_absorber_mount_type_upper:
      name: Schokdemper bevestigingstype (boven)
      description: Specificeert de bovenste bevestigingsinterface stijl van een motorvoertuigschokdemper
        voor passing/compatibiliteitsmatching.
    shock_absorber_position:
      name: Schokdemper positie
      description: Specificeert of de schokdemper bedoeld is voor de voor-, achter-,
        linker- of rechterpositie op het voertuig (gedetailleerder dan alleen plaatsing
        per as).
    shock_absorption_system:
      name: Schokabsorptiesysteem
      description: Definieert het mechanisme dat wordt gebruikt om trillingen en geluid
        bij terugvering te verminderen.
    shoe_collar_height:
      name: Schoenkraag hoogte
      description: Classificeert schoenen op kraag-/schachthoogte (laag, halfhoog,
        hoog) om enkelbedekking en ondersteuning aan te geven.
    shoe_cover_height:
      name: Hoogte schoenhoes
      description: Specificeert het bedekkingsniveau van de fietsschoenovertrek, waarbij
        teenhoezen worden onderscheiden van hoge overschoenen met volledige bedekking.
    shoe_sizing_system:
      name: Schoen maatsysteem
      description: Geeft aan welke maatstandaard (US, UK, EU, JP, Mondopoint, enz.)
        wordt gebruikt voor de vermelde schoenmaat.
    shoelace_aglet_material:
      name: Schoenveter agletmateriaal
      description: Geeft aan welk materiaal wordt gebruikt voor de uiteinden (aglets)
        van de schoenveters, wat van invloed is op duurzaamheid en stijl.
    shooting_rest_design:
      name: Schietsteun ontwerp
