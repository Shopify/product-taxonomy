      name: Waterbestendigheid classificatie (beschermingsniveau koffer)
      description: Geeft het niveau van waterbestendigheid/bescherming aan dat de
        rolkoffer biedt (marketingniveau, geen IP-afdichting voor elektronica), bijv.
        waterbestendig vs waterdicht.
    water_rocket_kit_items_included:
      name: Waterraket items inbegrepen
      description: Belangrijke inbegrepen onderdelen in de productverpakking.
    water_rocket_propulsion_type:
      name: Type aandrijving waterraket
      description: Primaire aandrijf-/energiebron die wordt gebruikt om de raket te
        lanceren.
    water_rocket_recovery_system:
      name: Waterraket terugwinningssysteem
      description: Methode die wordt gebruikt om de raket na de lancering terug te
        halen.
    water_ski_base_design:
      name: Waterski basisontwerp
      description: Specificeert het bodemprofiel van waterski’s, wat invloed heeft
        op de vaareigenschappen.
    water_ski_fin_type:
      name: Waterski vin type
      description: Specificeert de vinconfiguratie van een waterski, wat invloed heeft
        op tracking en wendbaarheid.
    water_source:
      name: Waterbron
      description: Identificeert de herkomst van het water vóór carbonisatie.
    water_sports_safety_standard:
      name: Watersport veiligheidsnorm
      description: Vermeldt formele veiligheids- of drijfvermogensnormen waaraan het
        product voldoet (bijv. CE EN 1385 voor helmen, ISO 12402-5 voor drijfhulpmiddelen,
        USCG Type III).
    water_table_feature_set:
      name: Watertafel functieset
      description: Benadrukt ingebouwde speelfuncties van de watertafel, zoals watervallen,
        sproeiers, pompen of bakken met meerdere niveaus.
    water_table_items_included:
      name: Watertafel items inbegrepen
      description: Specificeert welke accessoires bij de watertafelset worden geleverd
        (bijv. bootjes, bekers, trechters, figuren).
    water_table_water_source_type:
      name: Watertafel waterbron type
      description: Specificeert hoe de watertafel wordt gevuld of van water wordt
        voorzien.
    waterbed_stabilization_level:
      name: Waterbed stabilisatieniveau
      description: Geeft de mate van golfreductie of bewegingscontrole aan die door
        het waterbedmatras wordt geboden.
    watercolor_ink_water_resistance_after_drying:
      name: Aquarelinkt waterbestendigheid (na drogen)
      description: Geeft aan of de aquarelinkt na drogen waterbestendig/waterproof
        wordt (volgens de claim van de fabrikant).
    watercraft_care_application_area:
      name: Watervaartuig onderhoud toepassingsgebied
      description: Geeft het hoofdgebied of onderdeel van een watervaartuig aan waarvoor
        het product bedoeld is.
    watercraft_drive_mechanism:
      name: Watervaartuig aandrijfmechanisme
      description: Beschrijft het specifieke aandrijfmechanisme aan boord dat is geïnstalleerd
        of wordt ondersteund.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Watervaartuig brandstoftankzender patroon
      description: Specificeert het montagepatroon/de montagenorm voor brandstoftankzenders
        en compatibele meters (bijv. gangbare maritieme boutpatronen).
    watercraft_fuel_tank_shape:
      name: Watervaartuig brandstoftank vorm
      description: Beschrijft de algemene fysieke vormfactor van de brandstoftank
        ter ondersteuning van ruimte-/pasvormplanning.
    watercraft_hull_material:
      name: Watervaartuig romp materiaal
      description: Specificeert het primaire materiaal van de rompconstructie.
    watercraft_ignition_part_voltage:
      name: Watervaartuig ontstekingsonderdeel voltage
      description: Nominale spanningswaarde/-vereiste voor het ontstekingsonderdeel
        (indien van toepassing), zoals 12V-systemen.
    watercraft_impeller_material_grade:
      name: Watervaartuig waaier materiaalklasse
      description: Specificeert het materiaal van de watervaartuigwaaier (bijv. neopreenrubber,
        nitril, brons).
    watercraft_lighting_certification_compliance:
      name: Watervaartuig verlichting certificering/naleving
      description: Geeft aan voor welke regelgeving/normen de verlichting is gecertificeerd
        voor maritiem gebruik (bijv. conform USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Watervaartuig motorsteun afstelfuncties
      description: Afstelmogelijkheden van de steun (bijv. kantelen, heffen, schuiven)
        die invloed hebben op bruikbaarheid en pasvorm.
    watercraft_piston_part_type:
      name: Watervaartuig zuiger onderdeel type
      description: Identificeert welk zuigergerelateerd onderdeel de listing vertegenwoordigt.
    watercraft_propeller_blade_rake:
      name: Watervaartuig propellerblad rake
      description: Specificeert de blad-rake (bladhoek ten opzichte van de naaf),
        wat invloed heeft op boeglift en prestaties.
    watercraft_propeller_rotation_direction:
      name: Watervaartuig propeller draairichting
      description: Geeft de vereiste draairichting/handigheid van de propeller aan
        voor compatibiliteit met de aandrijflijn (bijv. rechtsdraaiend/standaard vs
        linksdraaiend/contraroterend).
    watercraft_pump_stage_impeller_role:
      name: Watervaartuig pompstadium / waaierrol
      description: Identificeert of de waaier bedoeld is voor een specifieke pomprol
        (bijv. ruw-/zeewaterpomp, koelvloeistofcirculatie, jetpomp).
    watercraft_registration_status:
      name: Watervaartuig registratiestatus
      description: Geeft aan of de zeilboot eigendoms- en/of registratiedocumentatie
        bevat.
    watercraft_safety_equipment_activation_type:
      name: Watervaartuig veiligheidsuitrusting activeringstype
      description: Primaire methode voor het activeren van het veiligheidsapparaat
        (voor bakens/MOB-alarmen/PLB’s), anders dan inflatie.
    watercraft_steering_cable_core_material:
      name: Watervaartuig stuurkabel kernmateriaal
      description: Specificeert het materiaal van de binnenkabel/kern die kracht overbrengt.
    watercraft_steering_cable_hardware_included:
      name: Watervaartuig stuurkabel hardware inbegrepen
      description: Specificeert welke installatiehardware en accessoires bij de stuurkabel
        zijn inbegrepen.
    watercraft_steering_cable_system_type:
      name: Watervaartuig stuurkabel systeemtype
      description: Specificeert de stuurinrichtingarchitectuur waarvoor de kabel is
        ontworpen (bijv. roterend, tandheugel).
    watercraft_steering_wheel_hub_bore_type:
      name: Naaf-/boorgattype vaartuigstuurwiel
      description: Specificeert de centrale montage-/boringinterfacestijl (bijv. conisch,
        gegroefd) waar het stuur aansluit op een naaf of adapter.
    watercress_variety:
      name: Waterkers variëteit
      description: Identificeert de specifieke variëteit of het type waterkers dat
        wordt verkocht.
    waterproof_level:
      name: Waterproof niveau
      description: Geeft het waterbeschermingsniveau van het schoeisel aan, inclusief
        eventuele door garantie ondersteunde claims over waterbestendigheid.
    wax_blend_composition:
      name: Was mengsel samenstelling
      description: Geeft een overzicht van de wassoorten die in het product zijn gemengd
        en/of het type mengsel dat op de markt wordt gebracht.
    wax_coat_type:
      name: Was laag type
      description: Geeft aan of de wax bedoeld is als basislaag, toplaag of als universele/enkelvoudige
        formule.
    wax_hardness:
      name: Was hardheid
      description: Geeft de relatieve hardheid van de wax aan, wat van invloed is
        op de duurzaamheid en het glijgedrag op verschillende soorten sneeuw.
    wax_physical_form:
      name: Was fysieke vorm
      description: Geeft de fysieke vorm/vorm aan waarin de ruwe kaarsenwas wordt
        geleverd.
    wax_recommended_candle_application:
      name: Was aanbevolen kaarsengebruik
      description: Geeft de primaire kaarsenstijl(en) aan waarvoor de wax is samengesteld.
    wax_tackiness_level:
      name: Kleverigheid wax
      description: Beschrijft de mate van kleverigheid/grip die de wax op het blad
        biedt.
    weapon_system_integration:
      name: Integratie wapensysteem
      description: Geeft aan of het voertuig geïntegreerde wapensystemen of bevestigingen
        bevat.
    weather_suitability:
      name: Geschiktheid voor weersomstandigheden
      description: Geeft de omgevingsomstandigheden aan waarvoor de handschoenen zijn
        ontworpen, zoals spelen bij koud of nat weer.
    weave_finish:
      name: Weefsel/afwerking
      description: Beschrijft het primaire weefpatroon of de oppervlakteafwerking
        die de textuur en glans van de stropdas beïnvloedt.
    weave_style:
      name: Weefstijl
      description: Specificeert het traditionele weefpatroon dat wordt gebruikt bij
        het vervaardigen van de panamahoed, wat van invloed is op het ademend vermogen,
        de flexibiliteit, het uiterlijk en de prijs.
    weave_type:
      name: Weefsel type
      description: Geeft het weefpatroon/de constructiestijl (handelsnaam van het
        weefsel) aan die van invloed is op de textuur, glans en valling.
    weaving_beater_edge_type:
      name: Weefklopper rand type
      description: Beschrijft het profiel van de werkende rand van de platte weefklopper
        die in contact komt met de inslag (bijv. recht versus gekarteld).
    weaving_beater_style:
      name: Weefklopperstijl
      description: Geeft de functionele stijl/vorm van de platte weefklopper aan.
    weaving_shuttle_tip_style:
      name: Weefschietspoel punt stijl
      description: Specificeert het ontwerp van de voorste punt/neus van de weefschuif,
        wat invloed heeft op hoe deze door de schacht gaat en de kans dat hij kettingdraden
        vastpakt.
    weaving_shuttle_use_case:
      name: Weefschietspoel toepassing
      description: Geeft aan voor welke weeftoepassing de schietspoel is ontworpen
        of geoptimaliseerd.
    webbing_construction_type:
      name: Type bandweefselconstructie
      description: Beschrijft de fysieke weef- of vlechtstijl van de band, wat invloed
        heeft op de hantering, sterkte en het beoogde gebruik.
    webbing_design:
      name: Weefselontwerp
      description: Beschrijft de stijl van de band tussen de vingers, wat invloed
        heeft op weerstandstraining en voortstuwing.
    weight_adjustability:
      name: Aanpasbaarheid weerstand
      description: Beschrijft of de weerstand van het product door de gebruiker kan
        worden aangepast (bijv. met een selector of door gewichten toe te voegen)
        of vaststaat op één gewicht.
    weight_integration_system:
      name: Gewichtsintegratiesysteem
      description: Beschrijft of en hoe ballastgewichten in de BCD zijn geïntegreerd
        (bijv. afneembare gewichtszakken, geen, optionele toevoeging).
    weight_plate_compatibility:
      name: Halterschijven compatibiliteit
      description: Bepaalt welke diameter halterschijven de machine accepteert (Olympisch,
        standaard of beide).
    weight_plate_style:
      name: Halterschijf stijl
      description: Classificeert het ontwerp/type van de halterschijf (bijv. Olympisch,
        bumper, met gewichtsselectie) voor snelle compatibiliteitsfiltering.
    weightlifting_belt_style:
      name: Gewichthef riem stijl
      description: Categoriseert het algemene ontwerp of de doelgerichte configuratie
        van de riem (bijv. hefboomriem, dip-riem, taps toelopende riem).
    weightlifting_federation_certification:
      name: Gewichthef federatie certificering
      description: Officiële goedkeuring of conformiteit van het product door federaties
        voor krachtsporten, zoals IPF of IWF.
    wetsuit_boot_height:
      name: Wetsuit laars hoogte
      description: Classificeert de hoogte/snit van de laars op het been, wat invloed
        heeft op de bedekking, bewegingsvrijheid en het binnendringen van water.
    wetsuit_entry_system:
      name: Wetsuit instapsysteem
      description: Beschrijft het type en de locatie van het openings-/ritssysteem
        dat wordt gebruikt om de wetsuit aan te trekken.
    wetsuit_seam_construction:
      name: Wetsuit naadconstructie
      description: Geeft aan hoe de naden zijn gemaakt en afgedicht, wat invloed heeft
        op warmte, flexibiliteit en duurzaamheid.
    wheat_product_form:
      name: Tarweproductvorm
      description: Geeft de fysieke of bewerkte vorm van het tarweproduct aan.
    wheel_arrangement:
      name: Wiel opstelling
      description: Geeft de wielopstelling van de stoomlocomotief aan (Whyte-notatie),
        wat een kenmerkend kenmerk en een veelgebruikte verzamel-/zoekterm is.
    wheel_brake_type:
      name: Type wielrem
      description: Geeft details over de remconfiguratie op de wielen of zwenkwielen
        van de kar.
    wheel_chock_grip_features:
      name: Wielblok grip functies
      description: Ontwerpkenmerken voor tractie en grip die de houvast op oppervlakken
        en tegen banden verbeteren.
    wheel_cleaner_acidity_ph_category:
      name: Zuurtegraad/pH-categorie van wielreiniger
      description: Geeft aan of de wielreiniger zuur, neutraal of alkalisch is (en
        eventueel of deze op de markt wordt gebracht als pH-gebalanceerd).
    wheel_cleaner_formula_type:
      name: Wiel reiniger formule type
      description: Geeft voor wielreinigers en aanverwante wasoplossingen de primaire
        formulecategorie van het product aan (bijv. op zuurbasis, niet-zuur, pH-neutraal/gebalanceerd
        of ijzerreactief).
    wheel_construction_type:
      name: Type wielconstructie
      description: Geeft de fabricage-/constructiemethode van het wiel aan.
    wheel_contaminant_target:
      name: Wiel verontreiniging doel
      description: Geeft de belangrijkste soorten verontreiniging aan die de reiniger
        is ontworpen om te verwijderen.
    wheel_core_type:
      name: Type wielkern
      description: Beschrijft de constructiestijl van de wielkern, die van invloed
        is op het gewicht, de stijfheid en de energieoverdracht.
    wheel_cylinder_inlet_port_thread_standard:
      name: Wielcilinder inlaatpoort schroefdraadstandaard
      description: Geeft de schroefdraadstandaard van de remleiding-inlaatpoort op
        de wielcilinder aan (bijv. metrische bubble flare versus SAE inverted flare).
    wheel_fastener_seat_type:
      name: Wiel bevestiging zitting type
      description: Geeft het type wielmoer-/boutzitting aan dat op het wiel past (bijv.
        conisch/taps toelopend, kogel/radius, vlak, mag/schacht).
    wheel_illumination:
      name: Wiel verlichting
      description: Geeft aan of het wiel is voorzien van ingebouwde verlichting of
        lichtgevende elementen.
    wheel_material:
      name: Wiel materiaal
      description: Geeft de primaire samenstelling van de wielen aan, wat van invloed
        is op de duurzaamheid, grip en trillingsdemping.
    wheel_profile:
      name: Wielprofiel
      description: Beschrijft de dwarsdoorsnede van het wiel die van invloed is op
        snelheid, grip en wendbaarheid.
    wheel_setup_type:
      name: Type wielconfiguratie
      description: Definieert de wielconfiguratie die op de skates wordt gebruikt.
    wheel_system_finish:
      name: Wiel systeem afwerking
      description: Oppervlakteafwerking/coating van velgen/wielen en bepaalde wielonderdelen/accessoires.
    whip_style:
      name: Zweep stijl
      description: Classificeert het product op basis van de specifieke stijl van
        de paardenzweep of -rijzweep of de beoogde discipline.
    whipped_cream_base:
      name: Basisingrediënt slagroom
      description: Geeft het belangrijkste basisingrediënt aan dat wordt gebruikt
        om de slagroom te maken, zoals melkroom of kokos.
    whipped_cream_form:
      name: Slagroom vorm
      description: Geeft de fysieke vorm aan waarin de slagroom wordt verkocht.
    whistle_head_material:
      name: Mondstukmateriaal fluitje
      description: Geeft het materiaal aan van de kop/het mondstuk van het fluitje
        (fipple block/kop).
    whistle_light_features:
      name: Fluit lichtfuncties
      description: Geeft aan of het fluitje geïntegreerde lichteffecten heeft voor
        feestjes (bijv. LED).
    whistle_purpose:
      name: Fluitje doel
      description: Geeft de primaire beoogde toepassing van het fluitje aan (sportcoaching,
        maritieme veiligheid, hondentraining, enz.).
    whistle_sound_style:
      name: Fluit geluid stijl
      description: Beschrijft de stijl/het karakter van het fluitgeluid (bijv. enkelvoudige
        toon versus meervoudige toon).
    white_glue_finish_appearance_when_dry:
      name: Afwerking/uiterlijk van witte lijm na drogen
      description: Geeft aan hoe de lijm eruitziet na het drogen voor knutsel- of
        kantoorgebruik (bijv. transparant versus ondoorzichtig).
    white_glue_washability:
      name: Uitwasbaarheid witte lijm
      description: Geeft aan of opgedroogde lijm uit stoffen of van de huid kan worden
        gewassen/verwijderd.
    whitewater_kayak_style:
      name: Wildwaterkajak stijl
      description: Belangrijkste ontwerpdoel binnen het wildwatersegment (bijv. Creekboat,
        River Runner, Playboat).
    whitewater_rating_class:
      name: Wildwater classificatie (klasse)
      description: Hoogste klasse op de internationale schaal voor riviermoeilijkheidsgraad
        waarvoor de raft is gecertificeerd.
    whorl_mounting_interface:
      name: Type spoelbevestiging
      description: Hoe de spoel aan het spinnewiel wordt bevestigd (asstijl/verbinding).
    wick_construction_type:
      name: Type lontconstructie
      description: De constructie/stijl van de lont (gevlochten, plat, vierkant gevlochten,
        met kern, houten, enz.).
    wick_core_type:
      name: Lont kern type
      description: Of de lont kernloos is of een kernmateriaal bevat (bijv. met papieren
        kern of zinkkern), wat van invloed is op de stijfheid en de brandkenmerken.
    wick_tab_crimp_type:
      name: Lont lipje krimpverbinding
      description: Hoe het lontlipje de lont vastzet (constructie/krimpstijl).
    wick_tab_material:
      name: Materiaal lontplaatje
      description: Materiaal van het bevestigde lipje/de houder (meestal blik), relevant
        voor corrosiebestendigheid en wettelijke voorschriften (bijv. het vermijden
        van lood).
    wick_tab_shape:
      name: Lont lipje vorm
      description: Vorm/vormfactor van het lontlipje.
    wick_type_included:
      name: Lont type inbegrepen
      description: Geeft aan welk materiaal/type lont in de set zit.
    wig_fiber_material:
      name: Pruik vezel materiaal
      description: Geeft aan welke vezel het meest wordt gebruikt voor het pruikhaar,
        zodat je makkelijk kunt kiezen tussen varianten van echt haar en synthetische
        opties met verschillende eigenschappen qua styling en levensduur.
    wildlife_attractant_scent:
      name: Lokgeur wilde dieren
      description: Geeft de belangrijkste geur aan die wordt gebruikt om wilde dieren
        te lokken, waaronder natuurlijke voedselgeuren en feromoonachtige geuren.
    willow_grade:
      name: Wilg kwaliteit
      description: Geeft de kwaliteitsklasse van de gebruikte wilgenhout aan, met
        vermelding van de nerfstructuur en het algehele prestatieniveau.
    willow_type:
      name: Wilg type
      description: Geeft het soort wilgenhout of alternatief materiaal aan dat voor
        het batblad wordt gebruikt, wat een grote invloed heeft op de prestaties,
        duurzaamheid en prijs.
    wind_up_mechanism_type:
      name: Type opwindmechanisme
      description: Geeft aan hoe het speelgoed wordt opgewonden of geactiveerd.
    wind_up_toy_movement_pattern:
      name: Opeenwindbaar speelgoed bewegingspatroon
      description: Beschrijft de belangrijkste beweging die ontstaat wanneer het wordt
        opgewonden.
    windbreak_purpose:
      name: Windscherm doel
      description: Definieert het belangrijkste beoogde gebruik van het windscherm.
    windfoil_board_mounting_system:
      name: Windfoil-board bevestigingssysteem
      description: Geeft de foilbox of bevestigingsinterface aan die in het windfoil-board
        is ingebouwd.
    windfoil_sail_style:
      name: Windfoil zeil stijl
      description: Classificeert het zeil op basis van de beoogde rijstijl of discipline.
    winding_direction:
      name: Opwindrichting
      description: Geeft het rotatiepatroon aan dat door de horlogewinder wordt ondersteund
        (met de klok mee, tegen de klok in of in beide richtingen).
    winding_method:
      name: Opwindmethode
      description: Hoe de inslagdraad bedoeld is om te worden opgewonden/geladen voor
        gebruik in de shuttle.
    winding_speed_control_type:
      name: Type regeling van de opwindsnelheid
      description: Geeft de methode aan die wordt gebruikt om de opwindsnelheid tijdens
        het gebruik te regelen.
    winding_type:
      name: Type opwinding
      description: Geeft de opwindconstructie van de bas snaren aan (profiel van de
        buitenste omwikkeling).
    windlass_control_station_type:
      name: Type bedieningsstation voor de ankerlier
      description: Type bedieningsinterface dat is meegeleverd of wordt ondersteund
        voor het bedienen van de ankerlier.
    windlass_mount_type:
      name: Ankerlier type bevestiging
      description: Waar/hoe de ankerlier op de boot moet worden gemonteerd.
    window_component_location:
      name: Raam onderdeel locatie
      description: Geeft aan op welk raam/welke opening het onderdeel van toepassing
        is in het voertuig (bijv. voorruit versus deurruit versus achterruit versus
        zijruit).
    window_configuration:
      name: Vensterconfiguratie
      description: Geeft de aanwezigheid en relatieve grootte aan van transparante
        zichtvensters op de wingfoil-vleugel.
    window_glass_construction:
      name: Ruit glas constructie
      description: Geeft de veiligheids-/laminatieconstructie van het ruitglas van
        het motorvoertuig aan.
    window_glass_features:
      name: Ruit glas kenmerken
      description: Geeft aan of het glas geïntegreerde voertuigtechnologieën ondersteunt
        (bijv. regensensor, camerabevestiging).
    window_glass_finish:
      name: Ruit glas afwerking
      description: Geeft de afwerking/tint/privacybehandeling van het ruitglas van
        het motorvoertuig aan.
    window_glass_tint_color:
      name: Tintkleur vensterglas
      description: Geeft de kleurtint van de tint in het glas aan (niet de algemene
        productkleur).
    window_glass_tint_level:
      name: Ruit glas tint niveau
      description: Geeft de geschatte fabrieks-/privacytintdonkerheid van het raamglas
        aan (geen aftermarket-folie). Gebruik beschrijvende niveaus als de exacte
        VLT niet bekend is.
    window_net_latch_mechanism:
      name: Raamnet vergrendelingsmechanisme
      description: Specificeert het vergrendelings-/ontgrendelingsmechanisme dat wordt
        gebruikt voor het raamnet (bijv. drukknop, hendel, gesp in veiligheidsgordelstijl).
    window_net_mounting_hardware:
      name: Raamnet bevestigingsmateriaal
      description: Geeft het type bevestigingsmateriaal of bevestigingsmethode aan
        dat wordt gebruikt om het raamnet te installeren (bijv. clip-on, schroeven,
        haak/stang), of dat het bevestigingsmateriaal is meegeleverd.
    window_net_opening_direction:
      name: Raamnet openingsrichting
      description: Geeft aan hoe het raamnet opent/ontgrendelt ten opzichte van de
        inzittende voor het verlaten van het voertuig en naleving van de regels.
    window_regulator_operation:
      name: Raamregelaar werking
      description: Geeft aan hoe de raamregelaar wordt bediend (handmatige slinger
        of elektrisch).
    windshield_coverage_area:
      name: Voorruit dekking gebied
      description: Geeft aan welke delen van de voorkant van de auto de voorruitbescherming
        moet beschermen (bijv. alleen de voorruit of inclusief ruitenwissers, spiegels,
        zijruiten of motorkaprand).
    windshield_mount_attachment_method:
      name: Bevestigingsmethode voorruitsteun
      description: Geeft aan hoe de bevestiging aan het oppervlak van de voorruit
        hecht of vastgrijpt.
    windshield_washer_fluid_seasonality:
      name: Ruitensproeiervloeistof seizoensgebondenheid
      description: Geeft het beoogde seizoen/klimaat of het primaire gebruik van de
        samenstelling van de ruitensproeiervloeistof aan (bijv. ontdooimiddel voor
        de winter, insectenverwijderaar voor de zomer, voor alle seizoenen).
    windsurf_fin_style:
      name: Windsurfvin type
      description: Classificeert de vin op basis van de beoogde zeildiscipline of
        gebruiksstijl (bijv. golf, slalom, zeewier).
    windsurfing_connection_standard:
      name: Windsurf verbindingsstandaard
      description: Mechanische interface of box-type dat wordt gebruikt om het onderdeel
        aan het board of de tuigage te bevestigen.
    windsurfing_sail_style:
      name: Stijl windsurfzeil
      description: Classificeert de beoogde discipline of het beoogde gebruik van
        het zeil, zoals golf, freeride of foil.
    wine_additive_type:
      name: Wijn additief type
      description: Geeft aan wat voor soort product voor de productie van rode wijn
        dit is (ingrediënt, additief, gist, klaringsmiddel, kit, enz.).
    wine_body:
      name: Wijn body
      description: Beschrijft het waargenomen gewicht en mondgevoel van de wijn.
    wine_carbonation:
      name: Wijn koolzuurgehalte
      description: Geeft aan of de wijn stil, halfmousserend of mousserend is en,
        indien van toepassing, de intensiteit van de bruis.
    wine_making_ingredient_type:
      name: Wijn bereidings ingrediënt type
      description: Geeft de categorie van functionele ingrediënten aan voor consumptieve
        wijnbereidingsadditieven en -ingrediënten.
    wine_making_stage:
      name: Wijn bereiding fase
      description: Geeft aan voor welke stap in het wijnbereidingsproces het product
        bedoeld is.
    wine_style:
      name: Wijn stijl
      description: Classificeert de algemene productiestijl van de wijn, los van de
        kleur, zoals stil, mousserend of versterkt.
    winemaking_process_stage:
      name: Fase in het wijnbereidingsproces
      description: Geeft de primaire fase van het wijnbereidingsproces aan waarvoor
        het product bedoeld is.
    wing_count:
      name: Aantal vleugels
      description: Aantal vleugels/armen op de boemerang.
    wing_handle_type:
      name: Type handgreep vleugel
      description: Specificeert het type handgreep op de wingfoil-vleugel.
    wing_part_type:
      name: Vleugel onderdeel type
      description: Geeft het specifieke onderdeel of vervangingsonderdeel voor een
        wingfoil-vleugel aan.
    wingfoiling_style:
      name: Wingfoil stijl
      description: Geeft de specifieke wingfoil-discipline of rijstijl aan waarvoor
        het product bedoeld is.
    wiper_arm_finish:
      name: Ruitenwisserarm afwerking
      description: Oppervlakteafwerking of beschermende coating die op de ruitenwisserarm
        is aangebracht, wat van invloed is op de corrosiebestendigheid en het uiterlijk.
    wiper_arm_pivot_mount_type:
      name: Ruitenwisserarm draaibare bevestiging type
      description: Geeft aan hoe de ruitenwisserarm aan de ruitenwisserhefboom of
        het draaipunt van het voertuig wordt bevestigd.
    wiper_blade_attachment_type:
      name: Ruitenwisser blad bevestigingstype
      description: Geeft het type connector/bevestiging aan dat wordt gebruikt om
        het ruitenwisserblad aan de ruitenwisserarm te bevestigen.
    wiper_blade_rubber_material:
      name: Ruitenwisserblad rubber materiaal
      description: Materiaal van het wisse-element (inzetstuk/vulling) dat in contact
        komt met het glas.
    wiper_system_position:
      name: Ruitenwisser systeem positie
      description: Geeft de montagepositie van het ruitenwissersysteem op het voertuig
        aan.
    wire_coating_material:
      name: Draad coating materiaal
      description: Geeft het materiaal aan van de buitenste coating/mantel die op
        de draad is aangebracht (niet het materiaal van de kerndraad), wat van invloed
        kan zijn op de slijtvastheid en hoe soepel de draad door de gaatjes in de
        rand loopt.
    wire_coating_type:
      name: Draad coating type
      description: Geeft aan of en hoe de draad is gecoat/bedekt (voor kleur, bescherming
        en textuur).
    wire_construction_type:
      name: Type draadconstructie
      description: Geeft de fysieke constructie van de randdraad aan, zoals gevlochten
        versus massief en of deze gecoat is.
    wire_finish:
      name: Draad afwerking
      description: Geeft de oppervlakteafwerking, coating of beplating aan die op
        de draad is aangebracht (bijv. gepolijst, geëmailleerd, gegalvaniseerd, geplateerd),
        wat van invloed is op het uiterlijk en de weerstand tegen aanslag/corrosie.
    wire_gauge_awg:
      name: Draad dikte (AWG)
      description: American Wire Gauge (AWG)-maat van de geleiders die in de kabelboom
        worden gebruikt.
    wire_insulation_material:
      name: Draadisolatiemateriaal
      description: Materiaal van de draadisolatie/mantel die in de kabelboom wordt
        gebruikt (Impact , temperatuurbestendigheid/chemische bestendigheid).
    wire_packaging_type:
      name: Type draadverpakking
      description: Geeft aan hoe de draad wordt verkocht/verpakt.
    wire_shape_profile:
      name: Draad vorm/profiel
      description: Beschrijft de vorm van de dwarsdoorsnede van de draad.
    wiring_configuration:
      name: Bedrading configuratie
      description: Geeft aan of de schermdraad wordt geleverd met voorbedrading voor
        elektrische puntentelling, zonder bedrading, draadloos, of bedoeld is voor
        niet-elektrische training.
    wobbler_style:
      name: Wobbler stijl
      description: Bepaalt het specifieke ontwerp/de bewegingsstijl van de wobbler,
        zoals een crankbait of jerkbait.
    wood_block_surface_preparation:
      name: Voorbereiding van het oppervlak van het houtblok
      description: Geeft aan of het oppervlak van het houtblok klaar is voor gebruik,
        afwerking en bewerking.
    wood_grain_direction:
      name: Houtnerf richting
      description: Richting van de houtnerf ten opzichte van de langste afmeting van
        het product (belangrijk voor sterkte, zaaggedrag en uiterlijk).
    wood_slice_edge_style:
      name: Houtplak rand stijl
      description: Toestand van de rand van de plak, zoals een natuurlijke schorsrand
        versus een gladde/geschuurde rand.
    wooden_block_special_features:
      name: Houten blok speciale kenmerken
      description: Opvallende functionele kenmerken van de set houten blokken.
    woodwind_body_construction:
      name: Houten blaasinstrument constructie
      description: Geeft aan of het instrument uit één stuk of uit meerdere delen
        bestaat (bijv. 2-delig/3-delig), wat van invloed is op het schoonmaken, opbergen
        en meenemen.
    woodwind_polishing_cloth_intended_use:
      name: Houten blaasinstrument poetsdoek beoogd gebruik
      description: Geeft aan waarvoor de doek in de eerste plaats is bedoeld om een
        houten blaasinstrument mee schoon te maken/te poetsen.
    woodwind_small_part_type:
      name: Houten blaasinstrument type klein onderdeel
      description: Geeft aan wat voor soort klein vervangingsonderdeel voor een klarinet
        het item is (bijv. klepwerk, polsters/kurk/vilt, ringen).
    woofer_mounting_type:
      name: Type woofermontage
      description: Hoe de woofer bedoeld is om te worden gemonteerd/gebruikt (in de
        open lucht versus in een behuizing) en gangbare montagevormen voor auto's.
    woofer_surround_material:
      name: Woofer rand materiaal
      description: Materiaal dat wordt gebruikt voor de wooferrand (buitenste ophangring).
    worn_on_finger:
      name: Vinger waarop gedragen
      description: Geeft aan aan welke vinger de vingerhoedgids bedoeld is om te worden
        gedragen.
    wrap_style:
      name: Wikkel stijl
      description: Geeft aan hoe vaak de riem bedoeld is om rond de taille te worden
        gewikkeld.
    wrapping_occasion:
      name: Verpakking gelegenheid
      description: Belangrijkste cadeau-/feestgelegenheid waarvoor het inpakpapier
        bedoeld is.
    wrapping_paper_features:
      name: Inpakpapier kenmerken
      description: Functionele en duurzaamheidsgerelateerde eigenschappen van inpakpapier,
        zoals scheurweerstand, gerecycled materiaal of voorgesneden vellen.
    wrestling_dummy_design:
      name: ontwerp van een worstelpop
      description: De algehele Shapes of houding van de dummy, zoals een staande menselijke
        Shapes of een werpzak, bepaalt welke trainingsoefeningen van toepassing zijn.
    wrestling_mat_safety_certifications:
      name: Certificeringen voor de veiligheid van worstelmatten
      description: Vermeldt alle branche- of sportorganisatiecertificeringen of -normen
        voor veiligheid waaraan de mat voldoet.
    wrist_strap_style:
      name: Polsbandstijl
      description: Beschrijft het type polsbandje (of het ontbreken ervan) dat van
        invloed is op de ondersteuning en pasvorm.
    wrist_support_style:
      name: Polsondersteunende stijl
      description: Geeft de constructie of stijl van de polsondersteuning aan, zoals
        een brace, handschoen, tape of verband, om de gebruiker te helpen bij het
        maken van de juiste keuze.
    xylophone_range_octaves:
      name: Xylofoonbereik (octaven)
      description: Het totale bereik van de xylofoon wordt uitgedrukt in octaven (bijvoorbeeld
        2,5 octaven, 3 octaven, 4 octaven).
    xylophone_resonator_type:
      name: Xylofoon resonator type
      description: Welk type resonantiesysteem wordt gebruikt om de toon te versterken
        (indien van toepassing).
    yam_variety:
      name: Yamvariëteit
      description: Geeft aan om welk ras of welke gangbare variëteit van de verkochte
        yam het gaat (bijv. paars, geel, elephant foot).
    yarn_cutter_physical_style:
      name: garensnijder fysieke stijl
      description: Identificeert de fysieke stijl van een garenknipper (bijv. hangend,
        ring, kniptang) om het bladeren en filteren binnen deze categorie te ondersteunen.
    yarn_finish_or_effect:
      name: Garenafwerking of -effect
      description: Highlight de speciale visuele of functionele behandelingen die
        op het garen zijn toegepast, zoals fluorescentie of metaalglans.
    yarn_guide_style:
      name: Garen geleide stijl
      description: De fysieke vorm van het garengeleidingscomponent.
    yarn_swift_adjustability:
      name: Aanpasbaarheid van de garensnelspanner
      description: Geeft aan of en hoe de garenmolen verstelbaar is (uitbreidbaar,
        inklapbaar/opvouwbaar), wat van invloed is op de opbergruimte en het aantal
        strengen dat hij handle.
    yarn_swift_bearing_type:
      name: garenmolen lagertype
      description: Beschrijft het rotatieondersteuningsmechanisme (bijv. kogellager)
        dat de soepelheid en de wikkelsnelheid beïnvloedt.
    yeast_application:
      name: Gisttoepassing
      description: Geeft het primaire beoogde culinaire of fermentatiegebruik van
        het product aan.
    yo_yo_accessory_part_type:
      name: Yo-yo accessoire/onderdeel type
      description: Geeft aan welk type jojo-vervangingsonderdeel of accessoire het
        product is (bijv. tekenreeks, lager, respons pads).
    yo_yo_axle_system_type:
      name: Yo-yo assysteem type
      description: Constructiemethode voor de yo-yo-as (bijv. vaste as versus transaxle),
        Impact tijdens het spelen en onderhoud.
    yo_yo_bearing_size_class:
      name: Yo-yo lager maatklasse
      description: Gestandaardiseerde lagerklasse die door de jojo wordt gebruikt,
        indien van toepassing.
    yo_yo_bearing_type:
      name: Yo-yo lagertype
      description: Lagerconfiguratie die van invloed is op de responsiviteit en draai-eigenschappen.
    yo_yo_play_style:
      name: Speelstijl van de jojo
      description: De belangrijkste beoogde speelstijl van de jojo, die aangeeft voor
        welke touw- of trucdiscipline het product is ontworpen.
    yo_yo_response_system:
      name: Responssysteem van de jojo
      description: Geeft aan voor welk responsmechanisme van de jojo dit onderdeel
        is ontworpen (compatibiliteit).
    yo_yo_responsiveness:
      name: Responsiviteit van de jojo
      description: Of de jojo met een ruk terugkeert naar de hand (responsief) of
        een bind vereist (niet-responsief).
    yo_yo_string_material:
      name: Materiaal van het jojo-koord
      description: Materiaalsamenstelling van het jojo-koord.
    yogurt_base_ingredient:
      name: Basisingrediënt yoghurt
      description: Geeft aan of de yoghurt voornamelijk op basis van melk of plantaardige
        ingrediënten is gemaakt, wat cruciaal is voor voedingsvoorkeuren en allergieoverwegingen.
    yoke_type:
      name: Type juk
      description: Geeft aan welk type houder of juk het vuurwapen op de monopod ondersteunt.
    zill_playing_style:
      name: Zill-speelstijl
      description: Beoogde speelcontext/stijl (meestal buikdans versus orkestrale/culturele
        varianten).
    zill_strap_material:
      name: Materiaal zillband
      description: Materiaal van de vingerband/elastiek die wordt gebruikt om de zills
        vast te houden (indien meegeleverd), wat van invloed is op comfort, duurzaamheid
        en grip.
    zills_strap_adjustability:
      name: Verstelbaarheid van de zills-band
      description: Of en hoe de meegeleverde band/elastiek kan worden aangepast voor
        een goede pasvorm.
    zipper_application:
      name: Toepassing van de rits
      description: Specificeert het beoogde project of de toepassing waarvoor de rits
        is ontworpen.
    zipper_chain_type:
      name: Ritssluiting met ketting
      description: Specificeert de constructie/het type van de ritssluitingketting/tanden.
    zipper_end_type:
      name: Ritssluiting uiteinde type
      description: Geeft aan hoe de rits eindigt en of deze open (open uiteinde) of
        gesloten (niet-openend) is, inclusief de gangbare open-uiteinde hardware die
        gebruikt wordt bij Craft ritsen.
    zipper_gauge:
      name: Ritssluitingsmeter
      description: 'Geeft de maataanduiding van de ritssluiting aan, meestal weergegeven
        als een getal met een # (bijvoorbeeld #3 of #5), wat overeenkomt met de tand-/spoelbreedte
        en het beoogde gebruik.'
    zipper_opening_length:
      name: Lengte van de ritssluiting
      description: Geeft aan hoeveel van de opening aan de voorkant is voorzien van
        een ritssluiting, waarmee onderscheid wordt gemaakt tussen de volledige postcode,
        de halve postcode en de kwart-postcode modellen.
    zipper_pull_material:
      name: Materiaal van de ritssluitingtrekker
      description: Specificeert het materiaal van de ritssluiting of het lipje (het
        deel dat je vastpakt), los van de ritssluiting zelf (de tanden/ketting) en
        het bandje.
    zipper_pull_side:
      name: Kant van treklipje
      description: Geeft aan vanaf welke kant(en) van de ritssluiting het treklipje
        bereikbaar is.
    zipper_pull_strap_cord_tab_material:
      name: Ritssluiting / koord / tabbladmateriaal
      description: Materiaal van het bandje/koord/lipje/kwastje dat aan de ritssluiting
        is bevestigd (indien aanwezig), exclusief het hardwarevan de ritssluiting.
    zipper_reversibility_mechanism:
      name: Ritssluiting omkeermechanisme
      description: Geeft aan hoe de rits omkeerbaar is (bijv. dubbelzijdige schuif
        versus omklapbare/automatische schuif, ontworpen voor omkeerbare kledingstukken).
    zipper_separating_type:
      name: Ritssluiting
      description: Geeft aan of de ritssluiting aan de onder-/bovenkant open is of
        aan het uiteinde gesloten is, voor een goede pasvorm met jassen, slaapzakken,
        tassen, enz.
    zipper_side:
      name: Ritssluiting
      description: Geeft aan aan welke kant de hoofdrits zich bevindt wanneer de slaapzak
        met de voorkant naar boven ligt.
    zipper_slider_material:
      name: Materiaal van de ritssluiting
      description: Specificeert het materiaal van de ritssluiting (het bewegende mechanisme),
        dat slagvastheid en corrosiebestendigheid moet kunnen Impact .
    zipper_slider_pull_configuration:
      name: Ritssluiting schuif-/trekmechanisme configuratie
      description: Geeft aan of de rits één of twee schuifjes/trekkers heeft, en of
        de trekkers zich aan één of beide zijden van het schuifje bevinden.
    zipper_style:
      name: Type ritssluiting
      description: Geeft de lengte van de ritssluiting aan of de aanwezigheid ervan
        op het kledingstuk (bijv. zonder ritssluiting, kwart-postcode, half-postcode,
        volledige postcode).
    zipper_tape_material:
      name: Tapemateriaal rijtssluiting
      description: Specificeert het primaire materiaal van de ritssluiting (stoffen
        zijden) dat in het project wordt genaaid.
    zipper_teeth_type:
      name: Type tanden ritssluiting
      description: Specificeert de constructiestijl van de ritssluitingketting/tanden
        (bijv. spiraalvormig, gegoten plastic, metaal, onzichtbaar), wat van invloed
        is op de flexibiliteit, sterkte en typische toepassing.
