      description: Geeft opvallende formulekenmerken aan, zoals hypoallergeen, weinig
        stof of metaalhoudende mengsels.
    rosin_hardness:
      name: Hars hardheid
      description: Geeft de relatieve hardheid/zachtheid van strijkstokkenhars aan,
        wat invloed kan hebben op grip en stofvorming in verschillende klimaten en
        speelstijlen.
    rotation_mechanism_type:
      name: Type rotatiemechanisme
      description: Specificeert het mechanisme waarmee het touw kan draaien, wat invloed
        heeft op soepelheid en haalbare snelheid (bijv. kogellagers vs bussen).
    rotation_motion_features:
      name: Rotatie-/bewegingskenmerken
      description: Geeft aan of planeten/banen draaien of bewegen en hoe.
    rotor_configuration_type:
      name: Type rotorconfiguratie
      description: Geeft de rotorconfiguratie en besturingsstijl van de RC-helikopter
        aan (bijv. coaxiaal, single-rotor fixed pitch vs collective pitch, multirotor),
        wat de vliegeigenschappen en geschiktheid voor verschillende vaardigheidsniveaus
        aanzienlijk beïnvloedt.
    rotor_construction_type:
      name: Type rotorconstructie
      description: Specificeert de constructiestijl van de rotor, wat invloed heeft
        op gewicht, stijfheid en warmtebeheer.
    rotor_mounting_interface:
      name: Type rotorbevestiging
      description: Definieert de naafinterfacestandaard die wordt gebruikt om de rotor
        aan het wiel te bevestigen.
    rotor_mounting_standard:
      name: Montagestandaard rotor
      description: Specificeert de interfacestandaard die wordt gebruikt om de rotor
        aan de naaf te bevestigen (bijv. 6-bolt of Center Lock).
    roulette_set_components_included:
      name: Inbegrepen onderdelen roulette-set
      description: Belangrijkste roulette-gerelateerde onderdelen die bij het wiel/de
        set zijn inbegrepen.
    roulette_wheel_ball_track_type:
      name: Roulette wiel balbaan type
      description: Beschrijft de stijl van de balbaan die op het wiel wordt gebruikt,
        wat invloed heeft op realisme en speelgevoel.
    roulette_wheel_numbering_system:
      name: Roulettewiel nummeringssysteem
      description: Geeft de nummering en nulconfiguratie van het roulettewiel aan
        voor compatibiliteit met gameplay/kansen.
    rounders_equipment_included:
      name: Inbegrepen roundersuitrusting
      description: Vermeldt de specifieke rounders-items of accessoires die bij de
        trainingshulpset of het pakket worden geleverd, zodat kopers precies weten
        wat er in de doos zit.
    rounders_governing_body_approval:
      name: Rounders bestuursorgaan goedkeuring
      description: Geeft certificering of goedkeuring aan door een officieel rounders-
        of ander sportbestuursorgaan.
    row_counter_format:
      name: Rijenteller formaat
      description: Specificeert het formaat/de stijl van een breirijenteller (bijv.
        ring, ketting, klikker, digitaal).
    row_counter_mechanism:
      name: Rijenteller mechanisme
      description: Specificeert hoe het aantal rijen op het hulpmiddel wordt verhoogd/vastgelegd.
    row_counter_mounting_method:
      name: Rijenteller bevestigingsmethode
      description: Hoe de teller/markeerder tijdens gebruik wordt bevestigd (aan naald,
        vinger, project, enz.).
    rowel_type:
      name: Spoorwiel type
      description: Beschrijft de vorm of het randprofiel van het spoorwiel voor ruitervoorkeur
        en gevoeligheid van het paard.
    rowing_machine_part_type:
      name: Roeimachine onderdeeltype
      description: Geeft het specifieke onderdeel aan dat het product op een roeimachine
        moet vervangen, zodat shoppers snel het exacte onderdeel kunnen vinden zonder
        een explosie van microcategorieën te creëren.
    rubber_ducky_character_theme:
      name: Rubberen eendje karakter/thema
      description: Thema- of karakterstyling van het rubberen eendje (handig voor
        novelty-/verzameleendjes).
    rubber_ducky_features:
      name: Rubberen eendje kenmerken
      description: Functionele/ontwerpkenmerken die specifiek zijn voor rubberen badeendjes.
    rubber_ducky_size_class:
      name: Rubberen eendje maatklasse
      description: Een kopervriendelijke maatgroepering voor rubberen eendjes op basis
        van typisch gebruik (badspeelgoed vs taarttopper vs jumbo).
    ruffle_style:
      name: Ruchestijl
      description: Beschrijft de constructie of visuele stijl van de ruche op een
        stoelsjerp.
    rugby_headgear_safety_certification:
      name: Rugbyhoofdbeschermer veiligheidscertificering
      description: Geeft aan of de hoofdbeschermer voldoet aan officiële veiligheidsnormen
