    sauce_consistency:
      name: Saus consistentie
      description: Beschrijft de textuur of dikte van de pizzasaus.
    sauce_product_form:
      name: Productvorm saus
      description: Geeft de fysieke vorm van het sausproduct aan, zoals vloeistof,
        olie, pasta, poeder, vlokken of siroop.
    sauce_variety:
      name: Saus variëteit
      description: Geeft de specifieke stijl of receptfamilie van de witte saus of
