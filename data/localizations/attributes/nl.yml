    scissors_application:
      name: Schaar toepassing
      description: Primaire beoogde kniptoepassing/primair bedoeld knipmateriaal voor
        de schaar.
    scooter_brake_pad_material:
      name: Step remblokmateriaal
      description: Specificeert de compound die in remblokken wordt gebruikt, wat
        van invloed is op prestaties, geluid en levensduur.
    scoring_method:
      name: Scoremethode
      description: Specificeert hoe scores op de tafelvoetbaltafel worden bijgehouden,
