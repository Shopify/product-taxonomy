    scale_model_pose:
      name: Houding schaalmodel
      description: Specificeert de weergegeven pose van het paardmodel voor display-/dioramamatching.
    scale_model_rotor_configuration:
      name: Schaalmodel rotorconfiguratie
      description: Specificeert de helikopterrotorconfiguratie die door het model
