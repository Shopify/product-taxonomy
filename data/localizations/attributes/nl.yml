    drag_type:
      name: Lade type
      description: Specificeert de stijl van het slipremmechanisme dat door de molen
        wordt gebruikt, op basis van locatie of bedieningsmethode.
    drawer_features:
      name: Lade kenmerken
      description: Beschrijft speciale constructie-elementen of functionaliteiten
        van de lade (bijv. softclose, met vilt bekleed).
    drawer_slide_type:
      name: Ladegeleider type
      description: Specificeert de montage- en uitschuifstijl van de ladegeleiders
        (bijv. ondermontage, volledig uittrekbaar).
    drawing_ink_compatible_tools:
      name: Tekeninkt compatibele hulpmiddelen
      description: Specificeert de toepassingshulpmiddelen waarvoor de inkt bedoeld
        is (bijv. kroontjespen vs penseel).
    drawing_ink_permanence:
      name: Tekeninkt permanentie
      description: Geeft permanentiekenmerken aan die belangrijk zijn voor afgewerkte
        kunstwerken en reproductie.
    dress_embellishment:
      name: Jurk versiering
      description: Benadrukt opvallende decoratieve elementen die in het jurkontwerp
        zijn verwerkt.
    dress_train_type:
      name: Jurk sleep type
      description: Geeft de aanwezigheid en lengte/stijl van de sleep van de jurk
        aan, als informatie over formaliteit en geschiktheid voor de locatie.
    dried_surface_finish:
      name: Afwerking gedroogd oppervlak
      description: Beschrijft het typische oppervlak na droging (glans/textuur).
    drink_tube_insulation:
      name: Drinkslang isolatie
      description: Geeft aan of de drinkslang isolatie of een thermische hoes bevat
        om te voorkomen dat vloeistoffen opwarmen of bevriezen.
    drive_band_cross_section_shape:
      name: Aandrijfriem doorsnedevorm
      description: De profielvorm van de aandrijfriem (rond, plat, enz.).
    drive_band_join_type:
      name: Aandrijfriem verbindingstype
      description: Hoe de aandrijfriem wordt verbonden/geconstrueerd (eindloos vs
        moet worden vastgeknoopt, enz.).
    drive_band_material_type:
      name: Type materiaal aandrijfriem
      description: Specificeert het materiaal/type van de aandrijfriem die op spinnewielen
        wordt gebruikt.
    drive_location:
      name: Aandrijving locatie
      description: Geeft aan waar het vliegwiel/aandrijfmechanisme op de crosstrainer
        is geplaatst, wat invloed heeft op de voetafdruk en het bewegingsgevoel.
    drive_mechanism:
      name: Aandrijving mechanisme
      description: Geeft het type aandrijflijn aan dat wordt gebruikt om kracht van
        de pedalen naar het vliegwiel over te brengen.
    drive_shaft_material:
      name: Aandrijfas materiaal
      description: Specificeert het primaire constructiemateriaal van de aandrijfasbuis
