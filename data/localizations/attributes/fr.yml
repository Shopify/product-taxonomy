---
fr:
  attributes:
    3d_glasses_fit_design:
      name: Conception de l’ajustement des lunettes 3D
      description: Indique comment les lunettes sont portées ou attachées (par exemple,
        clip-on, enveloppant, sur-lunettes)
    3d_glasses_material:
      name: Matériau des lunettes 3D
      description: Spécifie le matériau utilisé pour les lunettes 3D, par exemple,
        bambou ou acier inoxydable
    3d_glasses_technology:
      name: Technologie des lunettes 3D
      description: Spécifie la technologie d’image 3D/de synchronisation pour laquelle
        les lunettes sont conçues, déterminant la compatibilité avec des écrans ou
        projecteurs spécifiques
    3d_printer_case_style:
      name: Style de boîtier pour imprimante 3D
      description: Classe le type de produit global pour que les acheteurs puissent
        distinguer entre les sacs de transport souples, les mallettes rigides, les
        boîtiers fixes et les simples housses de protection
    3d_printer_cleaning_kit_components_included:
      name: Composants du kit de nettoyage inclus pour imprimante 3D
      description: Répertorie chacun des outils et consommables fournis dans le kit
        pour que les acheteurs sachent exactement ce qu’ils achètent
    3d_printing_resin_type:
      name: Type de résine pour impression 3D
      description: Spécifie la formulation ou l’application prévue de la résine, aidant
        les acheteurs à identifier rapidement si la résine est standard, de qualité
        technique, moulable ou d’autres types spécialisés
    80_plus_efficiency_rating:
      name: Classification d’efficacité 80 Plus
      description: Indique le niveau de certification d’efficacité énergétique 80
        Plus officiel que le bloc d’alimentation a atteint
    abrasive_material:
      name: Matériau abrasif
      description: Identifie le type d’abrasif utilisé dans les outils de ponçage,
        par exemple, diamant ou carbure de silicium
    absinthe_style:
      name: Type d’absinthe
      description: Définit le style d’absinthe, par exemple mélangée, distillée
    absinthe_variety:
      name: Variété d’absinthe
      description: Différencie les produits d’absinthe selon leurs variétés propres,
        par exemple rouge, verte
    absorbency_level:
      name: Niveau d’absorption
      description: Définit la capacité d’absorption, généralement pour les articles
        de soins personnels ; par exemple nuit, léger
    absorbent_hygiene_product_features:
      name: Caractéristiques du produit d’hygiène absorbant
      description: Identifie les caractéristiques particulières des produits d'hygiène,
        comme étanche ou hypoallergénique
    academic_level:
      name: Niveau académique
      description: Spécifie le niveau académique du contenu multimédia, par exemple,
        premier cycle ou doctorat
    accessibility_design_features:
      name: Caractéristiques d’accessibilité
      description: Répertorie les éléments de conception spéciaux qui aident les utilisateurs
        souffrant de troubles de la vision, de l’audition ou de la motricité
    accessory_material:
      name: Matériau de l’accessoire
      description: Précise le type de matériau des accessoires, généralement destinés
        aux fournitures d'expédition ; par exemple plastique, carton
    accessory_size:
      name: Taille de l’accessoire
      description: Définit la taille d’un produit accessoire, taille unique ou un
        compact par exemple
    accordion_tuning:
      name: Accordage de l’accordéon
      description: Spécifie le type d’accordage utilisé dans un accordéon, par exemple,
        diapason sec ou diapason de concert
    activation_mechanism:
      name: Mécanisme d’activation
      description: Spécifie la méthode principale qui déclenche l’alarme
    activation_method:
      name: Méthode d’activation
      description: Décrit la manière dont l’utilisateur active la carte SIM ou le
        crédit prépayé
    active_ingredient:
      name: Ingrédient actif
      description: Identifie les principales substances présentes dans les articles
        d’hygiène personnelle, par exemple la vitamine A, le rétinol
    activewear_clothing_features:
      name: Caractéristiques des vêtements de sport
      description: Identifie les caractéristiques uniques des vêtements de sport,
        par exemple, extensibilité quadri-directionnelle ou respirabilité
    activity:
      name: Activité physique
      description: Précise le sport ou l’activité pour lequel le produit est conçu,
        comme le tennis ou le Pilates
    activity_tracker_design:
      name: Conception de suivi d’activité
      description: Précise le port du tracker d’activité, par exemple à clipser, sur
        un brassard
    acupuncture_model_format:
      name: Format de modèle d’acupuncture
      description: Définit la taille et l’échelle des modèles d’acupuncture, par exemple
        grandeur nature, miniature
    acupuncture_model_type:
      name: Type de modèle d’acupuncture
      description: 'Précise la partie du corps ou l’espèce que le modèle d’acupuncture
        représente, par exemple la tête, la main, l’animal '
    adapter_directionality:
      name: Directionnalité de l’adaptateur
      description: Indique si l’adaptateur supporte le flux de signal dans les deux
        directions ou seulement dans une direction spécifiée
    adapter_operating_modes:
      name: Modes de fonctionnement de l’adaptateur
      description: Spécifie si l’adaptateur fonctionne comme récepteur Bluetooth,
        émetteur, ou les deux
    adaptive_sync_technology:
      name: Technologie de synchronisation adaptative
      description: Spécifie la technologie de taux de rafraîchissement variable (VRR)
        prise en charge par le moniteur pour des visuels sans déchirement
    adc_resolution:
      name: Résolution du CAN
      description: Spécifie la résolution (en bits) du convertisseur analogique/numérique
        intégré, définissant la précision de mesure
    additional_animation_software_features:
      name: Fonctionnalités supplémentaires du logiciel d’animation
      description: Spécifie les fonctionnalités uniques d’un logiciel d’édition d’animation,
        telles que l’animation de personnages ou les effets visuels
    additional_cleaning_technology:
      name: Technologie de nettoyage supplémentaire
      description: Répertorie toute technologie de nettoyage incluse au-delà de la
        vapeur (par exemple, ultrasonique, UV, ozone)
    additional_design_software_type:
      name: Type de logiciel de conception supplémentaire
      description: Spécifie les fonctionnalités supplémentaires d’un logiciel de conception,
        telles qu’une visite virtuelle ou de l’aménagement paysager
    additional_financial_software_features:
      name: Fonctionnalités supplémentaires du logiciel de gestion financière
      description: Identifie les fonctionnalités supplémentaires d’un logiciel financier,
        telles que la gestion d’actifs ou l’audit de conformité
    additional_graphic_software_features:
      name: Fonctionnalités supplémentaires du logiciel de graphisme
      description: Met en évidence les capacités supplémentaires d’un logiciel de
        graphisme, comme l’illustration numérique ou la conception de mise en page
    additional_publishing_software_features:
      name: Fonctionnalités supplémentaires du logiciel d’édition
      description: Met en évidence les fonctionnalités supplémentaires d’un logiciel
        de publication, telles que le design d’impression ou l’édition numérique
    additional_security_software_features:
      name: Fonctionnalités supplémentaires du logiciel de sécurité
      description: Identifie les fonctionnalités supplémentaires d’un logiciel de
        sécurité, par exemple le chiffrement du disque ou la détection d’intrusions
    adhesive_application_type:
      name: Type d’application de l’adhésif
      description: Définit le service ou le cas d’utilisation prévu de l’adhésif pour
        cils
    adhesive_features:
      name: Caractéristiques de l’adhésif
      description: Met en évidence les propriétés spéciales de l’adhésif utilisé sur
        les patchs ou les bandes
    adhesive_format:
      name: Format de l’adhésif
      description: Indique la forme physique sous laquelle l’adhésif est fourni à
        des fins de réparation
    adhesive_strength:
      name: Force de l’adhésif
      description: Spécifie le niveau de force de collage ou de soulèvement de l’adhésif
        de la bandelette nasale (par exemple, originale, extra forte)
    adhesive_type:
      name: Type d’adhésif
      description: Identifie le type d’adhésif utilisé dans un produit, par exemple,
        repositionnable ou permanent
    aftershave_product_form:
      name: Forme du produit après-rasage
      description: Identifie la consistance d’un produit d’après-rasage, tel qu’un
        baume ou une crème
    age_group:
      name: Tranche d’âge
      description: Définit la tranche d’âge cible pour un produit, comme les adultes
        ou les enfants
    age_restrictions:
      name: Restrictions d’âge
      description: Indique l’âge minimum requis pour un produit ou un événement, par
        exemple, 18 ans ou plus
    ai_application:
      name: Application d’IA
      description: Spécifie la fonction de l’IA dans le logiciel, par exemple, analyse
        prédictive ou reconnaissance vocale
    air_freshener_form:
      name: Forme de désodorisant
      description: Définit le type de désodorisant de voiture, par exemple, huile
        ou pince de ventilation
    air_fryer_functions:
      name: Fonctions de la friteuse à air
      description: Répertorie les différents modes de cuisson disponibles dans une
        friteuse à air ou un électroménager similaire, par exemple, friture à l’air
        ou cuisson au four
    air_mattress_features:
      name: Caractéristiques du matelas pneumatique
      description: Décrit les caractéristiques uniques d’un matelas pneumatique, par
        exemple, facilité de gonflage ou résistance à la perforation
    air_tube_configuration:
      name: Configuration du tube à air
      description: Indique le nombre ou le style de tubes à air de gonflage intégrés
        au brassard
    airbrush_feed_type:
      name: Type d’alimentation de l’aérographe
      description: Identifie la méthode de distribution de peinture dans les aérographes,
        par exemple, gravité ou siphon
    airbrush_operation_method:
      name: Mode de fonctionnement de l’aérographe
      description: Spécifie le style de fonctionnement d’aérographes, par exemple
        simple ou double action
    aircraft_engine_configuration:
      name: Configuration du moteur d’avion
      description: Spécifie le nombre de moteurs qui alimentent l’avion, par exemple
        un ou deux
    aircraft_engine_type:
      name: Type de moteur d’avion
      description: Spécifie le type de moteur qui alimente l’avion, par exemple un
        moteur à réaction ou un turbopropulseur
    airflow_opening_design:
      name: Conception de l’ouverture du flux d’air
      description: Décrit la configuration de respiration ou de ventilation intégrée
        dans l’embout buccal
    airsoft_equipment_included:
      name: Équipement d’airsoft inclus
      description: Spécifie l’équipement supplémentaire fourni avec les produits d’airsoft,
        par exemple, lunettes de protection ou gilet tactique
    album_type:
      name: Type d’album
      description: Décrit le style de reliure des kits de scrapbooking ou d’estampage,
        par exemple, reliure à spirale ou scrapbooking
    alcohol/solvent_content:
      name: Teneur en alcool/solvant
      description: Classe le produit en fonction de sa teneur en alcool ou en solvant
        à des fins d'expédition et de réglementation (par exemple, alcool ≤ 24 %,
        alcool > 24 %, petit contenant de solvant)
    alcohol_content:
      name: Teneur en alcool
      description: Indique si le toner est avec ou sans alcool, et s’il y en a, la
        quantité approximative d’alcool contenue dans la formule
    alert_type:
      name: Type d’alerte
      description: Précise le type d’alerte fournie par un produit, comme des alertes
        sonores ou des notifications sur smartphone
    allergen_information:
      name: Informations sur les allergènes
      description: Indique les allergènes potentiels présents dans les aliments ou
        les boissons, comme le blé ou les cacahuètes
    allergen_test_type:
      name: Type de test d’allergène
      description: Précise le type d’allergène que le kit de test est conçu pour détecter,
        alimentaire ou environnemental par exemple
    allergens:
      name: Allergènes
      description: Indique les allergènes potentiels dans les produits de santé et
        de beauté, par exemple le linalol ou le limonène
    allergy_friendly_features:
      name: Caractéristiques antiallergiques
      description: Identifie si un produit a des propriétés antiallergiques, par exemple,
        sans latex ou résistant aux moisissures
    amino_acid_subtype:
      name: Sous-type d’acide aminé
      description: Spécifie le type ou le profil principal d’acides aminés contenus
        dans le complément
    amplifier/booster_suitable_location:
      name: Emplacement approprié pour l’amplificateur/booster
      description: Précise les meilleurs emplacements pour l’amplificateur ou l’amplificateur
        de signal, comme un véhicule ou une grande salle
    amplifier_class:
      name: Catégorie d’amplificateur
      description: Définit le type d’amplificateur, comme AB ou D
    amplifier_configuration:
      name: Configuration de l’amplificateur
      description: Spécifie la configuration des amplificateurs de véhicules automobiles,
        par exemple, amplificateurs à deux ou quatre canaux
    amputation_level:
      name: Niveau d’amputation
      description: Indique le niveau d’amputation pour lequel le manchon de compression
        est conçu
    analyte_measured:
      name: Analyte mesuré
      description: Identifie le ou les biomarqueurs pour lesquels la solution de contrôle
        fournit un étalonnage
    anamorphic_squeeze_ratio:
      name: Rapport de compression anamorphique
      description: Indique le facteur de compression horizontal d’un objectif anamorphique,
        permettant aux utilisateurs de faire correspondre les objectifs avec la sortie
        de compression souhaitée
    anatomical_detail_displayed:
      name: Détails anatomiques affichés
      description: Indique quelles caractéristiques anatomiques ou méridiennes sont
        mises en évidence sur le modèle
    anchor_type:
      name: Type d’ancre
      description: Définit l’ancre utilisée dans les équipements de sports nautiques
        tractés, comme la patte ou la charrue
    anemometer_application:
      name: Application de l’anémomètre
      description: Identifie l’utilisation prévue d’un anémomètre, par exemple, utilisation
        industrielle ou météorologique
    angles_supported:
      name: Angles pris en charge
      description: Précise la plage d’angles qu’un produit peut prendre en charge,
        généralement pour les appareils électroniques ; par exemple ajustable, de
        0° à 180°
    angling_style:
      name: Style de pêche à la ligne
      description: Définit la technique de pêche pour laquelle le produit est conçu,
        comme le surf casting ou la pêche à la mouche
    animal_feed_form:
      name: Forme d’alimentation animale
      description: Spécifie la forme d’aliment pour animaux, par exemple, liquide
        ou en granulés
    animal_type:
      name: Type d’animal
      description: Précise le type d’animal auquel un produit est destiné, comme les
        canards, les cerfs ou les chiens
    answering_machine_type:
      name: Type de répondeur
      description: Spécifie la présence et la technologie d’un répondeur intégré
    antenna_connector_type:
      name: Type de connecteur d’antenne
      description: Précise le connecteur RF utilisé pour attacher des antennes externes
    antenna_rf_connector_type:
      name: Type de connecteur RF d’antenne
      description: Identifie le connecteur RF utilisé par l’antenne
    antenna_type:
      name: Type d’antenne
      description: Précise le type d’antenne pour les appareils électroniques, comme
        omnidirectionnelle, grille
    anti_agin_skin_care_type:
      name: Type de soin anti-âge
      description: Classifie le type d’article de soin anti-âge pour la peau, par
        exemple masque ou tonifiant
    anti_perspirant_strength_level:
      name: Niveau d’efficacité de l’anti-transpirant
      description: Indique la classification d’efficacité de l’anti-transpirant (par
        exemple, efficacité clinique, efficacité à l’effort)
    antibody_class_tested:
      name: Classe d’anticorps testée
      description: Spécifie l’immunoglobuline ou le biomarqueur que le kit détecte
        (par exemple, IgE, IgG4)
    antifreeze_type:
      name: Type d’antigel
      description: Spécifie le type d’antigel pour l’entretien du véhicule, par exemple,
        concentré ou prédilué
    antique_car_design:
      name: Conception de voiture ancienne
      description: Décrit le style de conception principal d’une voiture ancienne,
        comme une t-bucket ou une voiture de grand tourisme
    antique_vehicle_era:
      name: Époque de véhicule ancien
      description: Décrit la période historique d’un véhicule ancien, comme l’ère
        du laiton ou l’ère vintage
    appliance_board_function:
      name: Fonction de la carte de l’appareil
      description: Spécifie le rôle fonctionnel de la carte dans l’appareil
    appliance_unit_location:
      name: Emplacement de l’unité de l’appareil
      description: Indique la section physique de l’appareil pour laquelle la carte
        est destinée (par exemple, unité intérieure ou extérieure)
    application_area:
      name: Zone d’application
      description: Précise la partie du corps ou la zone où le produit est appliqué,
        par exemple les lèvres, tout le corps
    application_method:
      name: Méthode d’application
      description: Définit le mode d’application ou d’utilisation d’un produit, par
        exemple gel, liquide, vaporisateur
    application_type:
      name: Type d’application
      description: Indique si le traitement est avec ou sans rinçage et tout mode
        d’utilisation spécial
    applicator_format:
      name: Format d’applicateur
      description: Décrit la forme physique ou le style de l’applicateur de la lotion
        ou crème solaire
    applicator_material:
      name: Matériel d’application
      description: Précise le matériau utilisé dans l’applicateur, généralement pour
        les tampons ; par exemple le plastique, le carton
    applicator_type:
      name: Type d’applicateur
      description: Identifie le type d’applicateur inclus avec des tampons, par exemple
        avec ou sans applicateur
    applique/patch_shape:
      name: Forme d’applique/patch
      description: Décrit la forme des décorations ou des motifs, par exemple, animaux
        ou formes géométriques
    applique_shape:
      name: Forme d’applique
      description: Décrit la forme des éléments décoratifs, par exemple, fleurs ou
        animaux
    aquarium_filter_features:
      name: Caractéristiques du filtre d’aquarium
      description: Décrit les caractéristiques particulières des filtres d’aquarium,
        par exemple, changement rapide de la cartouche ou filtration en plusieurs
        étapes
    aquarium_light_spectrum:
      name: Spectre lumineux de l’aquarium
      description: Précise le type de spectre lumineux pour l’éclairage de l’aquarium,
        par exemple bleu, lumière du jour
    aquarium_overflow_box_design:
      name: Conception de la boîte de trop-plein d’aquarium
      description: Décrit le type de configuration d’une boîte de débordement pour
        aquarium, par exemple externe ou suspendue
    archery_activity:
      name: Activité de tir à l’arc
      description: Précise le type d’activité de tir à l’arc, par exemple chasse en
        plein air, pratique des cibles
    archery_equipment_included:
      name: Équipement de tir à l’arc inclus
      description: Spécifie les accessoires de tir à l’arc inclus, par exemple, support
        stabilisateur ou flèches en verre de sécurité
    archery_style:
      name: Style de tir à l’arc
      description: Définit le type spécifique de tir à l’arc pour lequel le produit
        est conçu, par exemple le tir à l’arc 3D, la chasse à l’arc
    archery_target_type:
      name: Type de cible de tir à l’arc
      description: Spécifie le type de cible de tir à l’arc conçu pour différentes
        pratiques de tir, par exemple, cible 3D ou sac cible
    aromatherapy:
      name: Aromathérapie
      description: Précise le parfum ou l’huile essentielle utilisé(e), par exemple
        eucalyptus, lavande
    arrangement:
      name: Bouquet
      description: Spécifie comment les fleurs sont disposées ou présentées, par exemple,
        dans un vase ou un panier
    arrow/bolt_material:
      name: Matériau de la flèche/du boulon
      description: Identifie le matériau de construction des flèches ou des boulons,
        comme l'aluminium ou le bambou
    arrow_fletching_material:
      name: Matériau de l’empennage de flèche
      description: Identifie le matériau utilisé dans les empennages des flèches,
        par exemple, synthétique ou plastique
    arrow_material:
      name: Matériau de la flèche
      description: Identifie la composition des flèches, par exemple, bambou ou fibre
        de verre
    art/crafting_tool_material:
      name: Outil de loisirs créatifs
      description: Identifie le matériau principal des outils d’art ou de loisirs
        créatifs, par exemple, bois ou métal
    art_fixative_application_method:
      name: Méthode d’application du fixateur artistique
      description: Décrit le mode d’application d’un fixateur artistique, par exemple,
        en aérosol ou au pinceau
    art_movement:
      name: Mouvement artistique
      description: Définit l’approche stylistique ou le mouvement artistique d’une
        peinture, par exemple, impressionnisme ou expressionnisme
    art_style:
      name: Style artistique
      description: Décrit le style esthétique d’un produit, par exemple, art nouveau
        ou typographie
    artwork_authenticity:
      name: Authenticité de l’œuvre d’art
      description: Indique l’authenticité de l’œuvre d’art en précisant s’il s’agit
        d’une création originale ou d’une reproduction
    artwork_frame_material:
      name: Matériau d’encadrement d’œuvres d’art
      description: Identifie le matériau utilisé dans l’encadrement d’œuvres d’art,
        par exemple, bois ou plaqué or
    artwork_type:
      name: Type d’œuvre d’art
      description: Spécifie le style des illustrations numériques, par exemple, typographie
        ou peinture numérique
    assisted_braking_technology:
      name: Technologie de freinage assisté
      description: Indique le type d’assistance au freinage dans les systèmes d’assurage,
        par exemple actif ou passif
    attachment_method:
      name: Méthode de fixation
      description: Définit la méthode utilisée pour attacher ou fixer le produit,
        par exemple velcro, clip-on
    attachment_options:
      name: Options de fixation
      description: Précise les méthodes d’attache ou de fixation d’un produit, par
        exemple un cordon
    attachment_type:
      name: Type de fixation
      description: Définit la méthode de fixation ou de connexion du produit, clipsable
        ou boucle du crochet par exemple
    atv/off_road_tire_type:
      name: Type de pneu VTT/tout-terrain
      description: Identifie l’utilisation spécifique des pneus de VTT ou de tout-terrain,
        par exemple, sable ou boue
    audio/scan_converter_features:
      name: Caractéristiques du convertisseur audio/scanner
      description: Décrit les capacités d’un convertisseur audio/scanner, par exemple,
        conversion automatique ou contrôle à distance
    audio/video_cable_connector_type_end_a:
      name: Type de connecteur de câble audio/vidéo (extrémité A)
      description: Spécifie le connecteur ou l’interface exact(e) présent(e) sur la
        première extrémité (extrémité A) du câble
    audio/video_cable_connector_type_end_b:
      name: Type de connecteur de câble audio/vidéo (extrémité B)
      description: Spécifie le connecteur ou l’interface exact(e) présent(e) sur la
        première extrémité (extrémité B) du câble
    audio_bypass_type:
      name: Type de contournement audio
      description: Spécifie comment le signal audio est transmis quand l’effet est
        désactivé (par exemple, true bypass, buffered bypass, relay bypass)
    audio_cassette_tape_type:
      name: Type de bande de cassette audio
      description: Spécifie la formulation IEC des bandes (biais) pour cassettes audio
    audio_codecs/formats_supported:
      name: Codecs audio/formats pris en charge
      description: Précise les types de fichiers audio qu’un produit peut lire, comme
        WAVE ou MP3
    audio_component_form_factor:
      name: Facteur de forme du composant audio
      description: Définit le style physique ou le format d’installation du composant
    audio_connectivity:
      name: Connection audio
      description: Définit les types de connexion audio pris en charge par un produit,
        comme HDMI ou USB
    audio_conversion_direction:
