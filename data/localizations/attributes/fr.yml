    bra_features:
      name: Caractéristiques du soutien-gorge
      description: Précise les caractéristiques uniques des soutiens-gorge, par exemple,
        rembourrage amovible ou tissu évacuant la transpiration
    bra_strap_type:
      name: Type de bretelle de soutien-gorge
      description: Précise le style et la fonctionnalité des bretelles de soutien-gorge,
        comme le dos nageur
    bra_style:
      name: Style de soutien-gorge
      description: Identifie la forme ou le style d’un soutien-gorge, tel que push-up
        ou sans bretelles
    bra_support_level:
      name: Niveau de maintien du soutien-gorge
      description: Indique le niveau de soutien procuré par un soutien-gorge, par
        exemple faible, moyen, élevé
    brace_support_level:
      name: Niveau de maintien de l’orthèse
      description: Indique le niveau global de maintien ou de protection que le fabricant
