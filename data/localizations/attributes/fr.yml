    circuit_breaker_type:
      name: Type de disjoncteur
      description: Identifie le type de disjoncteur, par exemple, standard ou AFCI
    clarinet_key_system:
      name: Système de clé de clarinette
      description: Identifie le système de touches d’une clarinette, par exemple,
