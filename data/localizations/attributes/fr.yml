    compatible_walking_aid_equipment:
      name: Équipement d’aide à la marche compatible
      description: Précise pour quelles aides à la marche le produit est conçu, par
        exemple des béquilles, des déambulateurs
    compatible_wax_container_size:
      name: Taille de contenant à cire compatible
      description: Répertorie les tailles standard de cartouches, boîtes ou pots qui
        peuvent être placées directement dans le chauffe-cire sans transvasement
    compatible_wax_form:
      name: Forme de cire compatible
      description: Spécifie les types de cire dépilatoire que le chauffe-cire est
        conçu pour faire fondre
    compatible_weight_lifting_accessory:
      name: Accessoire d’haltérophilie compatible
      description: Précise l’équipement d’haltérophilie avec lequel le produit est
        compatible, comme un haltère.
    compliance_certifications:
      name: Certifications de conformité
      description: Spécifie les certifications de conformité d’un produit, par exemple,
        HIPAA ou FedRAMP
    component_mounting_style:
      name: Style de montage du composant
      description: Définit la méthode principale utilisée pour fixer un composant
        ou une carte électronique à une carte de circuit imprimé, un panneau, un châssis
        ou un rail
    component_output_type:
      name: Type de sortie du composant
      description: Précise le type de signal de sortie des composants électroniques,
        comme UART ou analogique
    component_package_type:
      name: Type d’emballage du composant
      description: Définit le facteur de forme ou l’emballage des composants électroniques,
        par exemple SDM (Surface Mount Device), DIP (Dual In-line Package)
    component_size_code:
      name: Code de taille du composant
      description: Spécifie la différence moyenne standardisée ou la désignation de
        la taille du trou traversant (par exemple, 0603, 0805) utilisée pour le boîtier
        du condensateur
    component_tolerance:
      name: Tolérance du composant
      description: Définit l’écart admissible par rapport à la valeur nominale (résistance,
        capacité, inductance, fréquence, etc.) exprimé en pourcentage
    components_included:
      name: Composants inclus
      description: Répertorie les pièces matérielles fournies dans le kit de démarrage
    compression_circuit_type:
      name: Type de circuit de compression
      description: Décrit la technologie sous-jacente de réduction de gain (par exemple,
        VCA, FET, optique) qui façonne le son et la réponse du processeur
    compression_format:
      name: Format de compression
      description: Définit le type de compression de fichier vidéo utilisé, par exemple
        MPEG-4, AVI
    compression_level:
      name: Niveau de compression
      description: Indique l’intensité de la pression dans les produits de compression,
        par exemple léger, ferme
    computer_accessories_included:
      name: Accessoires informatiques inclus
      description: Identifie les accessoires pour ordinateurs supplémentaires fournis,
        comme une souris ou une sacoche pour ordinateur portable
    computer_form:
      name: Forme de l’ordinateur
      description: Définit la conception physique ou la disposition d’un ordinateur,
        comme un PC tout-en-un ou un notebook
    computer_server_features:
      name: Fonctionnalités du serveur informatique
      description: Décrit les fonctionnalités spéciales d’un serveur, par exemple,
        alimentation redondante ou prise en charge de la virtualisation
    computer_specialized_features:
      name: Caractéristiques informatiques spécialisées
      description: Met en avant des fonctionnalités spécifiques de l’ordinateur, par
        exemple, système de refroidissement liquide ou éclairage RVB
    concertina_button_configuration:
      name: Configuration des boutons de concertina
      description: Spécifie le nombre et la disposition des boutons sur un concertina,
        par exemple, concertina à 20 boutons de style anglo-saxon
    condition:
      name: État
      description: Décrit l’état ou la qualité d’un produit, par exemple, parfait
        ou médiocre
    conditioner_effect:
      name: Effet conditionneur
      description: Définit les bienfaits d’un après-shampooing, lissant ou antipelliculaire
        par exemple
    condom_compatibility:
      name: Compatibilité des préservatifs
      description: Précise les matières de préservatif avec lesquelles le lubrifiant
        peut être utilisé en toute sécurité
    condom_fit_type:
      name: Type d’ajustement de préservatif
      description: Décrit la taille globale ou le contour anatomique conçu pour améliorer
        le confort et la sensation
    condom_type:
      name: Type de préservatif
      description: Indique si un préservatif est destiné aux hommes ou aux femmes
    conductivity_gel_application:
      name: Application du gel conducteur
      description: Spécifie la procédure médicale ou diagnostique prévue du gel ou
        de la lotion conducteur/conductrice
    conductor_core_type:
      name: Type de cœur conducteur
      description: Indique si le conducteur interne est multibrin ou toronné
    connecting_thread:
      name: Fil de connexion
      description: Spécifie le type de filetage pour l’assemblage des pièces de plomberie,
        par exemple, 1/2 pouce IPS
    connection_method:
      name: Méthode de connexion
      description: Spécifie le type de connexion qu’un produit utilise, par exemple,
        sans fil ou filaire
    connection_type:
      name: Type de connexion
      description: Précise le type de connexion utilisé par les appareils électroniques,
        filaire ou Bluetooth par exemple
    connectivity_technology:
      name: Technologie de connectivité
      description: Définit la méthode de transfert de données dans un produit, par
        exemple Bluetooth, USB
    connectivity_type:
      name: Type de connectivité
      description: Précise si la carte est sans soudure (style platine de prototypage)
        ou conçue pour être soudée
    connector_1_type:
      name: Type de connecteur 1
      description: Spécifie le connecteur ou l’interface présent(e) sur la première
        extrémité de l’adaptateur ou du coupleur
    connector_2_type:
      name: Type de connecteur 2
      description: Spécifie le connecteur ou l’interface présent(e) sur la deuxième
        extrémité de l’adaptateur ou du coupleur
    connector_contact_plating:
      name: Revêtement des contacts du connecteur
      description: Spécifie le placage ou le revêtement de surface appliqué aux contacts
        électriques pour améliorer la conductivité et la résistance à la corrosion
    connector_design:
      name: Conception du connecteur
      description: Identifie la conception des connecteurs ou des raccords, par exemple
        extrémité ouverte ou bouton-pression
    connector_gender:
      name: Genre du connecteur
      description: Précise le genre d’embouts de connecteur électronique, par exemple
        mâle, mâle à femelle
    connector_mounting_style:
      name: Style de montage du connecteur
      description: Indique comment le connecteur est mécaniquement monté ou intégré
        dans un assemblage (par exemple, PCB, panneau, châssis, câble, coupleur)
    connector_orientation:
      name: Orientation du connecteur
      description: Décrit l’orientation physique de l’interface d’accouplement par
        rapport à la surface de montage ou au câble (par exemple, droit, angle droit,
        vertical)
    connector_position:
      name: Position du connecteur
      description: Décrit l’emplacement du connecteur vidéo lorsque l’écran est vu
        de face (par exemple, en bas à droite, en haut à gauche)
    connector_type:
      name: Type de connecteur
      description: Spécifie le style ou la norme de connecteur présent aux extrémités
        du fil de pontage
    console_accessories_included:
      name: Accessoires de console inclus
      description: Répertorie les principaux accessoires ou composants fournis avec
        la console (par exemple, contrôleurs, câbles, dock, jeux)
    console_system:
      name: Système de console
      description: Définit la marque spécifique d’une console de jeu vidéo, comme
        Atari 2600 ou Playstation
    console_type:
      name: Type de console
      description: Classe le facteur de forme physique de la console et l’environnement
        d’utilisation prévu
    constitutive_ingredients:
      name: Ingrédients constitutifs
      description: Précise les principaux composants utilisés dans la formulation
        d’un produit, par exemple la cire d’abeille, l’huile d’églantine
    construction:
      name: Construction
      description: Indique la méthode ou la technique de travail des métaux utilisée
        dans la fabrication de bijoux (par exemple, plaqué, vermeil, laminé, massif)
    construction_set_theme:
      name: Thème du jeu de construction
      description: Identifie le thème d’un jeu de construction, par exemple, pirates
        ou animaux
    contact_lens_case_accessories_included:
      name: Accessoires inclus avec l’étui à lentilles de contact
      description: Répertorie les articles supplémentaires fournis avec l’étui à lentilles
        de contact
    contact_lens_case_features:
      name: Caractéristiques de l’étui à lentilles de contact
      description: Met en évidence les caractéristiques fonctionnelles ou inclusions
        notables de l’étui
    contact_lens_material:
      name: Matière des lentilles de contact
      description: Spécifie la formulation polymère ou la famille de matériaux (par
        exemple, hydrogel, hydrogel de silicone) à partir de laquelle les lentilles
        sont fabriquées
    contact_material:
      name: Matériau de contact
      description: Identifie le métal ou le revêtement utilisé pour les contacts de
        batterie dans le support
    contrast:
      name: Contraste
      description: Utilisé pour spécifier le niveau de contraste de la pellicule de
        l’appareil photo, par exemple, normal ou élevé
    contrast_ratio_typical:
      name: Taux de contraste (standard)
      description: Indique le rapport de contraste de l’écran, par exemple 3000:1
    control_functions:
      name: Fonctions de contrôle
      description: Spécifie les capacités de contrôle des commutateurs au pied de
        l’amplificateur, par exemple, changement de canal
    control_interface:
      name: Interface de contrôle
      description: Identifie comment l’unité peut être configurée ou gérée (par exemple,
        logiciel PC, application mobile, écran LCD intégré, télécommande)
    control_method:
      name: Méthode de contrôle
      description: Décrit la technique de contrôle des composants d’automatisation,
        par exemple, couple direct ou scalaire (V/f)
    control_solution_level:
      name: Concentration de la solution de contrôle
      description: Indique le niveau de concentration de glucose de la solution de
        contrôle
    control_technology:
      name: Technologie de contrôle
      description: Précise la méthode de fonctionnement, généralement pour les habillages
        de fenêtre ; par exemple manuel, motorisé
    control_type:
      name: Type de contrôle
      description: Précise le type de mécanisme de contrôle, comme un capteur ou un
        bouton
    controller_design:
      name: Design de la commande
      description: Décrit le facteur de forme des contrôleurs d’automatisation, par
        exemple, contrôleurs compacts ou montés sur rail
    controller_drive_type:
      name: Type de tête de commande
      description: Identifie le type d’alimentation utilisé dans les entraînements
        de contrôle d’automatisation, par exemple, courant alternatif ou courant continu
    conversion_direction:
      name: Direction de conversion
      description: Décrit le type et la direction de conversion que l’appareil effectue
    converter_functionality:
      name: Fonctionnalité du convertisseur
      description: Identifie la fonction spécifique des convertisseurs d’objectif,
        par exemple, accélérateur de vitesse ou augmentation de la focale
    conveyor_operation:
      name: Fonctionnement du convoyeur
      description: Identifie le fonctionnement d’un système de convoyeur, par exemple,
        alimenté ou entraîné par gravité
    cooking_compartments:
      name: Compartiments de cuisson
      description: Spécifie le nombre de zones de cuisson dans les électroménagers
        de cuisine tels que les friteuses à air, par exemple, simple ou double
    cooking_method:
      name: Méthode de cuisson
      description: Précise la technique de cuisson recommandée, par exemple grillade,
        friture
    cooking_wine_variety:
      name: Variété de vin de cuisine
      description: Fait la distinction entre les différentes variétés de vin de cuisine,
        par exemple le riz, le vinaigre de xérès
    cookware/bakeware_features:
      name: Caractéristiques des ustensiles de cuisson
      description: Identifie les caractéristiques spéciales des ustensiles de cuisine
        ou de cuisson, telles que le revêtement antiadhésif ou allant au four
    cookware/bakeware_material:
      name: Matériau des ustensiles de cuisson
      description: Identifie le matériau principal utilisé dans les ustensiles de
        cuisine ou de cuisson, par exemple, acier inoxydable ou céramique
    cookware_features:
      name: Caractéristiques des ustensiles de cuisine
      description: Met en avant les caractéristiques uniques des ustensiles de cuisine,
        par exemple, poignée qui passe au four ou qui reste froide
    cookware_items_included:
      name: Articles de batterie de cuisine inclus
      description: Détaille les composants d’une batterie de cuisine, tel qu’un faitout
        ou une poêle à frire
    cooling_technology:
      name: Technologie de refroidissement
      description: Précise la méthode utilisée pour refroidir les appareils électroniques,
        comme l’air ou le dissipateur de chaleur
    cord_fastening_system:
      name: Système de fixation
      description: Spécifie le type de système de fixation pour les tendeurs, par
        exemple, boule ou crochet
    cordless_phone_frequency_band:
      name: Bande de fréquence du téléphone sans fil
      description: Spécifie la ou les bandes de fréquences radio sur lesquelles fonctionne
        le système téléphonique sans fil, ce qui aide les acheteurs à garantir la
        compatibilité régionale et à éviter les interférences
    core_color:
      name: Couleur de base
      description: Identifie la couleur primaire du corps d’un arc ou d’une arbalète,
        comme le noir ou le bleu
    core_material:
      name: Matériau de base
      description: Précise le matériau principal utilisé, généralement pour les arcs
        et les arbalètes ; par exemple la fibre de verre, le bois
    core_pattern:
      name: Modèle de base
      description: Décrit le motif principal du corps d’un arc ou d’une arbalète,
        comme du camouflage ou des oiseaux
    corrector_features:
      name: Caractéristiques du correcteur
      description: Décrit les caractéristiques uniques des liquides, des stylos et
        des rubans correcteurs, par exemple, séchage instantané ou pointe de précision
    corsage/boutonniere_design:
      name: Conception de corsage/boutonnière
      description: Décrit le style de corsage ou de boutonnière, par exemple, porté
        à la main ou à épingler
    cosmetic_condition:
      name: Aspect visuel
      description: Définit l’usure et l’état d’un matériel électronique, par exemple
        neuf, ouvert, jamais utilisé
    cosmetic_finish:
      name: Finition cosmétique
      description: Définit la finition cosmétique d’un produit, par exemple mat, naturel
    cosmetic_function:
      name: Fonction cosmétique
      description: Définit le bienfait ou l’effet attendu d’un produit cosmétique,
        par exemple apaisant, cicatrisant
    cosmetic_set_type:
      name: Type du kit de cosmétiques
      description: Classe le kit selon son thème ou son sujet principal
    costume_theme:
      name: Thème des costumes
      description: Identifie le thème ou le concept principal d’un costume, par exemple,
        horreur ou fantaisie
    cotton_ball_size:
      name: Taille de boule de coton
      description: Indique la catégorie de taille relative de chaque boule de coton
        (par exemple, petite, grande, très grande)
    counter_shape:
      name: Forme de comptoir
      description: Décrit la forme d’un comptoir ou d’un bureau, par exemple, droite
        ou incurvée
    country:
      name: Pays
      description: Spécifie le pays associé au produit, par exemple, Japon ou Allemagne
    country_of_issue:
      name: Pays d’émission
      description: Indique le pays dans lequel la carte de téléphone a été émise ou
        est destinée à être utilisée
    cover_closure_design:
      name: Design de la fermeture de la protection
      description: Précise la conception de la fermeture, généralement pour les housses
        d’oreiller ; par exemple enveloppe, fermeture éclair
    cover_color:
      name: Couleur de la couverture
      description: Précise la couleur principale de la couverture d’un produit, par
        exemple transparent, bleu marine
    cover_features:
      name: Caractéristiques de la couverture
      description: Décrit les caractéristiques particulières de la housse d’un produit,
        par exemple, étanchéité ou résistance à la chaleur
    cover_material:
      name: Matériau de couverture
      description: Identifie le type de tissu ou de matériau utilisé dans la couverture
        du produit, comme la soie ou le coton
    cover_pattern:
      name: Modèle de couverture
      description: Précise le motif visuel ou le dessin sur la couverture d’un article,
        comme un motif floral ou une teinture par nœuds
    cover_type:
      name: Type de couverture
      description: Décrit le style ou la fonctionnalité d’une housse de véhicule,
        par exemple, complète ou rétractable
    coverage_area:
      name: Zone de couverture
      description: Indique les pays ou territoires de couverture géographique pour
        le logiciel GPS, par exemple, États-Unis ou Canada
    coverage_country:
      name: Pays de couverture
      description: Spécifie le pays principal dans lequel le crédit prépayé peut être
        utilisé
    coverage_level:
      name: Niveau de couvrance
      description: Indique l’opacité ou l’intensité de la couvrance offerte par le
        produit une fois appliqué (par exemple, légère, moyenne, totale)
    coverage_region:
      name: Région de couverture
      description: Indique la vaste région de couverture géographique du logiciel
        GPS, par exemple, Amérique du Nord ou Océanie
    craft/sculpting_project_type:
      name: Type de projet d’artisanat/sculpture
      description: Identifie le type de projet de loisirs créatifs ou de sculpture,
        par exemple, modélisation ou fabrication de masques
    craft_cutter/embosser_type:
      name: Type de coupeur/gaufreur pour loisirs créatifs
      description: Spécifie le type de découpeur ou de gaufreur artisanal, par exemple
        une machine de découpe ou un pochoir
    craft_decoration_maker_type:
      name: Type de machine à fabriquer des décorations pour loisirs créatifs
      description: Spécifie le type de machine de décoration artisanale, tel qu’une
        machine à tampons ou à autocollants
    craft_knife_design:
      name: Conception de couteau artisanal
      description: Décrit le style spécifique d’un couteau de loisirs créatifs, par
        exemple, droit ou de précision
    craft_pipe_cleaner_design:
      name: Conception de cure-pipe pour loisirs créatifs
      description: Décrit la forme ou le style de cure-pipes artisanaux, tels qu’une
        tige en chenille ou un bâtonnet pelucheux
    craft_project_type:
      name: Type de projet d’artisanat
      description: Identifie le type de projet de loisirs créatifs, par exemple, scrapbooking
        ou fabrication de bijoux
    crafting_frame/stretcher_features:
      name: Caractéristiques du cadre/barre d'étirement pour loisirs créatifs
      description: Décrit les caractéristiques uniques du cadre/des barres d’étirement
        pour loisirs créatifs, comme une prise sûre ou une surface lisse
    crafting_frame_features:
      name: Caractéristiques du cadre pour loisirs créatifs
      description: Décrit les caractéristiques uniques des cadres de loisirs créatifs,
        par exemple, tension réglable ou légèreté
    crafting_hoop_features:
      name: Caractéristiques du cercle pour loisirs créatifs
      description: Met en avant les caractéristiques des cercles à broder, par exemple,
        une prise sûre ou une surface lisse
    crafting_mat/pad_features:
      name: Caractéristiques du tapis/tampon pour loisirs créatifs
      description: Décrit les caractéristiques uniques des tapis ou des coussins de
        loisirs créatifs, par exemple, facile à nettoyer ou envers antidérapant
    crafting_stretcher_features:
      name: Caractéristiques de la barre d'étirement pour loisirs créatifs
      description: Décrit les principales caractéristiques d’une barre d’étirement
        pour loisirs créatifs, comme la tension réglable ou la légèreté
    crampon_attachment_type:
      name: Type de fixation des crampons
      description: Identifie le mode de fixation des crampons à la chaussure, par
        exemple, hybride ou step-in
    creatine_type:
      name: Type de créatine
      description: Spécifie la forme chimique ou la formulation spécialisée de créatine
        utilisée dans le complément
    creative_art_project_type:
      name: Type de projet artistique créatif
      description: Identifie le type de projet artistique créatif, par exemple, dessin
        ou scrapbooking
    crib/toddler_bed_features:
      name: Caractéristiques du lit pour bébé/enfant en bas âge
      description: Décrit les aspects uniques des lits pour bébé et enfant en bas
        âge, par exemple, conception convertible ou mécanisme à bascule
    crib_features:
      name: Caractéristiques du berceau
      description: Met en avant les caractéristiques uniques des berceaux, par exemple,
        convertible ou possibilités de rangement
    cricket_equipment_included:
      name: Équipement de cricket inclus
      description: Identifie les articles de cricket spécifiques inclus dans un ensemble,
        par exemple, casque ou souches
    crutch_folding_type:
      name: Type de pliage de la béquille
      description: Spécifie si et comment la béquille se plie pour le transport ou
        le rangement
    crutch_type:
      name: Type de béquille
      description: Fait la distinction entre les différents styles de béquilles, par
        exemple avant-bras, aisselles
    crystal_system:
      name: Système de cristaux
      description: Identifie la structure géométrique d’un cristal, par exemple, hexagonale
        ou cubique
    cue_style:
      name: Style de queue
      description: Précise le style d’une flèche de billard, par exemple droit, conique
    cue_type:
      name: Type de queue
      description: Précise le type de queue de flèche billard, par exemple break,
        jump
    cue_wrap:
      name: Revêtement de la queue
      description: Identifie le type de revêtement sur une queue de billard, comme
        le lin irlandais ou l’absence de revêtement
    cuff_connector_type:
      name: Type de connecteur du brassard
      description: Définit l’interface mécanique qui relie le tube du brassard au
        tensiomètre
    cuff_size_category:
      name: Catégorie de taille du brassard
      description: Spécifie la classe de taille standardisée du brassard (par exemple,
        nourrisson, adulte, grand adulte)
    cuff_style:
      name: Style de brassard
      description: Décrit le conception du brassard d’avant-bras sur les béquilles
        antébrachiales
    cuisine:
      name: Cuisine
      description: Classifie les produits par style culinaire ou région, par exemple
        sud-ouest des États-Unis, Méditerranéen
    culinary_botanical_name:
      name: Nom botanique culinaire
      description: Précise le nom scientifique des herbes ou plantes culinaires, par
        exemple capsicum annuum, mentha
    cup_size:
      name: Taille du bonnet
      description: Précise le tour de poitrine pour les soutiens-gorge, comme AA ou
        L
    curing_method:
      name: Mode de catalyse
      description: Indique comment la colle prend ou durcit (par exemple, séchage
        à l’air, lampe UV/LED, chaleur)
    curler_pad_material:
      name: Matériau du coussinet du recourbe-cils
      description: Identifie le matériau du coussinet remplaçable qui est pressé contre
        les cils, influant sur le confort, la durabilité et les risques d’allergies
    curler_size_compatibility:
      name: Compatibilité de taille du recourbe-cils
      description: Spécifie la taille ou le style de coussinets du recourbe-cils à
        laquelle/auquel les recharges sont adaptées (par exemple, standard, mini,
        partiel)
    curler_type:
      name: Type de fer à boucler
      description: Précise le type de bigoudi, comme les tiges flexibles ou les rouleaux
        chauffants
    currencies_supported:
      name: Devises prises en charge
      description: Identifie les types de devises acceptées par un produit, par exemple,
        dollar canadien (CAD), yuan chinois (CNY)
    currency:
      name: Devise
      description: Définit le type de devise prise en charge par un produit, comme
        le yuan chinois (CNY) ou le dollar américain (USD)
    currency_type:
      name: Type de devise
      description: Identifie le type de devise gérée par un produit, par exemple,
        pièces ou jetons
    cushion_design:
      name: Conception du coussinet
      description: Décrit le facteur de forme global ou le style du coussinet métatarsien
        (par exemple, pad, bandage, pelote)
    customer_support_channels:
      name: Canaux de service à la clientèle
      description: Spécifie les moyens par lesquels les clients peuvent obtenir de
        l’aide, par exemple, assistance téléphonique ou didacticiels vidéo
    customization:
      name: Personnalisation
      description: Identifie le type de personnalisation disponible sur les tampons
        de bureau, tel que la gravure de texte personnalisé ou de logo
    cutter_options:
      name: Options de coupe
      description: Identifie la fonction de coupe de soudeuses à impulsion, par exemple
        la coupe intégrée
    cutting_method:
      name: Méthode de découpe
      description: Précise la technique de coupe, généralement utilisée pour les outils
        de jardinage ; par exemple contournement, enclume
    cycling_style:
      name: Style de cyclisme
      description: Définit l’utilisation prévue ou le style de conduite des produits
        de cyclisme, comme les courses sur route ou les courses de BMX
    cylinder_size_designation:
      name: Désignation de taille de la bouteille
      description: Identifie la lettre ou le code numérique standard utilisé pour
        identifier les dimensions et la capacité d’une bouteille d’oxygène (par exemple,
        M6, D, E)
    daisy_chain_capability:
      name: Capacité de connexion en série
      description: Indique si plusieurs unités de conférence peuvent être reliées
        ensemble (en série) pour étendre la couverture du microphone et des haut-parleurs,
        et la méthode de connexion utilisée
    dance_style:
      name: Style de danse
      description: Indique le genre ou les types spécifiques de danse, par exemple,
        flamenco ou ballet
    data_network:
      name: Réseau de données
      description: Précise la compatibilité du réseau de données des appareils mobiles,
        comme LTE ou 3G
    data_network_generation:
      name: Génération de réseau de données
      description: Indique la technologie de réseau mobile la plus récente prise en
        charge par la carte prépayée ou la carte SIM (par exemple, 3G, 4G LTE, 5G)
    data_rollover_policy:
      name: Politique de transfert de données
      description: Indique si les données haut débit non utilisées sont reportées
        à la période de validité suivante ou expirent
    decoder/encoder_function:
      name: Fonction décodeur/encodeur
      description: Spécifie la fonction logique mise en œuvre par le circuit intégré
    decoration_material:
      name: Matériau de décoration
      description: Identifie le matériel utilisé pour la décoration, par exemple,
        paillettes ou plumes
    decorative_stamp_design:
      name: Conception de tampons décoratifs
      description: Décrit le motif des tampons décoratifs, par exemple, conte de fées
        ou rétro/vintage
    denomination:
      name: Désignation
      description: Identifie la valeur nominale des objets de collection tels que
        les pièces de monnaie et les timbres, par exemple, 1000 dollars, 1 cent
    dental_appliance_compatibility:
      name: Compatibilité avec les appareils dentaires
      description: Précise pour quels appareils dentaires ou travaux de restauration
        la mousse est sans danger ou prévue (par exemple, aligneurs, appareils orthodontiques,
        facettes)
    dental_floss_format:
      name: Format du fil dentaire
      description: Identifie le format global du produit ou le style de distribution
        du fil dentaire
    dental_floss_shape:
      name: Forme du fil dentaire
      description: Identifie la forme ou le style d’un fil dentaire, tel qu’un ruban
        adhésif ou un ruban simple
    dental_floss_thickness_level:
      name: Niveau d’épaisseur du fil dentaire
      description: Différencie le fil dentaire en fonction du niveau d’épaisseur,
        comme fin ou normal
    dental_floss_type:
      name: Type de fil dentaire
      description: Identifie le type de fil dentaire, tel que ciré ou non ciré
    dental_mouthgard_recommended_use:
      name: Utilisation recommandée du protège-dents
      description: Identifie le rôle de gouttières dentaires, par exemple anti-ronflement
        ou protection orthodontique
    dental_mouthguard_arch_coverage:
      name: Protection de l’arcade dentaire par le protège-dents
      description: Spécifie le ou les types d’arcade dentaire que le protège-dents
        vise à protéger
    dental_mouthguard_certifications:
      name: Certifications des gouttières
      description: Indique les certifications de sécurité et de qualité des gouttières
        dentaires, sans BPA ou certifiées CE par exemple
    dental_paste_flavor:
      name: Goût de dentifrice
      description: Identifie la saveur de la pâte dentaire, par exemple, sans saveur
