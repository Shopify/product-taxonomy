      name: Conception du viseur
      description: Identifie le type de lunettes optiques, tel que coudé ou droit
    scope_lens_type:
      name: Type de lentille du viseur
      description: Identifie le type d’objectif utilisé dans des lunettes, tel que
        HD ou grand angle
    scoreboard_features:
      name: Caractéristiques du tableau d’affichage
      description: Décrit les caractéristiques particulières d’un tableau d’affichage,
