    celebration_type:
      name: Type de célébration
      description: Spécifie l’occasion pour laquelle le produit convient, par exemple,
        Noël ou obtention d’un diplôme
    cellular_capability:
      name: Capacité cellulaire
      description: Indique si le modèle prend en charge les réseaux mobiles en plus
