    fuel_container_features:
      name: Caractéristiques du réservoir de carburant
      description: Décrit les caractéristiques spécifiques des réservoirs de carburant,
        par exemple, bec verseur antiéclaboussures ou jauge
    fuel_grade:
      name: Qualité du carburant
      description: Spécifie la qualité des produits combustibles, par exemple, Bioheat
        ou 2-K
    fuel_purity:
      name: Pureté du carburant
      description: Spécifie le niveau de pureté du carburant propane, par exemple,
        HD-5 ou commercial
    fuel_source:
      name: Source de carburant
      description: Précise la source d’énergie utilisée, généralement pour les piles
        à combustible ; par exemple l’hydrogène, le propane
    fuel_supply:
      name: Réserve de carburant
      description: Spécifie la source de carburant pour les véhicules ou les moteurs,
        par exemple, diesel ou hybride
    furniture/fixture_color:
      name: Couleur du meuble/luminaire
      description: Identifie la couleur de meubles ou d’accessoires, comme le beige
        ou le noir
    furniture/fixture_features:
      name: Caractéristiques du meuble/luminaire
      description: Met en avant les caractéristiques particulières des meubles ou
        des accessoires, par exemple, des étagères réglables ou un miroir intégré
    furniture/fixture_material:
      name: Matériau du meuble/luminaire
      description: Identifie le matériau principal utilisé dans les meubles ou les
        accessoires, par exemple, bois ou métal
    furniture/fixture_pattern:
      name: Modèle de meuble/luminaire
      description: Identifie le thème visuel de meubles, comme des rayures ou des
        carreaux
    game_components:
      name: Composants du jeu
      description: Identifie les pièces incluses dans un ensemble de jeu, par exemple,
        dés ou plateau de jeu
    game_console_skin_coverage:
      name: Surface couverte par les skins de console de jeux
      description: Indique les parties de l’appareil couvertes par l’ensemble de skins
    game_difficulty:
      name: Difficulté du jeu
      description: Décrit le niveau de difficulté dans un jeu de société, par exemple,
        moyen ou difficile
    game_features:
      name: Caractéristiques de jeu
      description: Met en avant les caractéristiques spéciales d’un jeu, par exemple,
        convient aux voyages ou personnalisable
    game_name:
      name: Nom du jeu
      description: Identifie le nom spécifique d’un jeu à boire, par exemple, Beer
        pong ou Kings Cup
    gameplay_skills:
      name: Compétences de jeu
      description: Identifie les compétences renforcées par un jeu, par exemple, réflexion
        stratégique ou mémoire
    games_included:
      name: Jeux inclus
      description: Répertorie les jeux fournis avec le produit, comme les cartes ou
        les dames
    gaming_enhancement_features:
      name: Fonctionnalités d’amélioration du jeu
      description: Indique les technologies de jeu HDMI 2.1 prises en charge par le
        récepteur
    garage_door_material:
      name: Matériau de la porte de garage
      description: Identifie le matériau de construction des portes de garage, par
        exemple, acier ou bois
    gardening_use:
      name: Utilisation pour le jardinage
      description: Définit l’objectif de jardinage d’un produit, par exemple le paillage,
        le paysagisme
    garment_steamer_design:
      name: Design du défroisseur
      description: Définit le style ou le type de défroisseur, portatif ou avec brosse
        à vapeur par exemple
    gases_detected:
      name: Gaz détectés
      description: Identifie les gaz spécifiques qu’un détecteur peut détecter, par
        exemple, méthane ou radon
    gate_mounting_type:
      name: Type de montage de portail
      description: Précise l’endroit où une barrière pour bébé ou animal de compagnie
        est installée, comme un mur ou une porte d’entrée
    gauge_type:
      name: Type de jauge
      description: Spécifie le type de jauge du véhicule, par exemple, niveau de carburant
        ou température
    gear_material:
      name: Matériau des engrenages
      description: Spécifie le matériau utilisé dans la construction des engrenages,
        par exemple, fibre de carbone ou titane
    gear_ratio:
      name: Rapport de vitesse
      description: Définit le rapport de vitesse des moulinets, par exemple 6:1, 1:1
    gearing_type:
      name: Type d’engrenage
      description: Précise le type de système d’engrenage dans les produits de cyclisme,
        comme une chaîne ou une courroie
    gel_strength:
      name: Intensité du gel
      description: Indique la force du gel ou de la prolifération des produits à base
        de gélatine, par exemple une prolifération élevée, une prolifération faible
    gemstone_type:
      name: Type de pierre précieuse
      description: Spécifie la pierre précieuse principale utilisée sur l’article,
        en fonction de la classification minérale ou matérielle de la pierre
    genre:
      name: Genre
      description: Classifie la catégorie ou le style de support multimédia, par exemple,
        horreur ou fantaisie
    geological_era:
      name: Ère géologique
      description: Classifie l’ère géologiques des pierres ou des fossiles de collection,
        par exemple, Mésozoïque ou Cénozoïque
    gift_bag_handle_design:
      name: Conception de poignée de sac cadeau
      description: Décrit le style des poignées des sacs-cadeaux, par exemple, corde
        ou ruban
    gift_set_format:
      name: Format coffret cadeau
      description: Précise le style de présentation des coffrets cadeaux, comme une
        boîte cadeau ou un sac pour cadeau
    gimbal_stabilization_axes:
      name: Axes de stabilisation du cardan
      description: Identifie le nombre d’axes de stabilisation électronique ou mécanique
        fournis lorsque la perche à selfie inclut une fonction cardan
    gin_variety:
      name: Variété de gin
      description: Classe les produits à base de gin selon leur type spécifique, par
        exemple aromatisé, London Dry
    glaze_finish:
      name: Finition émaillée
      description: Indique la texture et la brillance d’une glaçure de céramique ou
        de poterie, par exemple, satinée ou craquelée
    glazing_type:
      name: Type de vitrage
      description: Identifie le type de vitrage, par exemple, double ou simple
    glide_style:
      name: Style de glisse
      description: Indique la caractéristique de glisse prévue des patins (par exemple,
        vitesse, contrôle)
    glitter_particle_size:
      name: Taille des particules de paillettes
      description: Catégorise la taille des particules de paillettes, influant sur
        l’intensité de l’éclat, la texture et la facilité d’application
    glitter_shape:
      name: Forme des paillettes
      description: Définit la forme des paillettes, par exemple, cœur ou étoile
    glucose_measurement_units:
      name: Unités de mesure du glucose
      description: Indique dans quelles unités de mesure (mg/dL ou mmol/L) le lecteur
        peut afficher les résultats
    glucose_meter_features:
      name: Caractéristiques du glucomètre
      description: Décrit les caractéristiques particulières des glucomètres, par
        exemple, portable ou fonction mémoire
    glue_gun_features:
      name: Caractéristiques du pistolet à colle
      description: Met en avant les aspects uniques d’un pistolet à colle, par exemple,
        chauffage rapide ou fonctions de sécurité
    glue_gun_operation:
      name: Fonctionnement du pistolet à colle
      description: Identifie la source d’alimentation d’un pistolet à colle, tel qu’avec
        ou sans fil
    glue_gun_technology:
      name: Technologie du pistolet à colle
      description: Spécifie le type de technologie utilisé dans un pistolet à colle,
        par exemple à chaud ou à froid
    glue_strength:
      name: Résistance de la colle
      description: Indique la capacité de collage d’une colle, par exemple forte,
        douce
    glue_viscosity:
      name: Viscosité de la colle
      description: Décrit l’épaisseur de la colle, influant sur l’écoulement et le
        contrôle de l’application
    golf_ball_type:
      name: Type de balle de golf
      description: Précise les caractéristiques de performance des balles de golf,
        comme les performances tour ou la distance douce
    golf_equipment_included:
      name: Équipement de golf inclus
      description: Identifie les articles de golf supplémentaires inclus dans l’ensemble,
        par exemple, outil de divot ou étui à balles de golf
    gps_compatible_device:
      name: Appareil compatible GPS
      description: Spécifie les appareils pouvant utiliser le logiciel GPS, par exemple,
        ordinateurs portables ou appareils d’aviation
    gps_device_features:
      name: Fonctionnalités de l’appareil GPS
      description: Décrit les capacités spéciales d’un appareil GPS, par exemple,
        doté d’une IA ou caméra embarquée
    gps_map_type:
      name: Type de carte GPS
      description: Spécifie le type de carte utilisée dans un logiciel GPS, comme
        les cartes topographiques ou marines
    gps_software_focus:
      name: Focus sur le logiciel GPS
      description: Identifie l’utilisation principale d’un logiciel GPS, telle que
        la navigation automobile ou l’analyse géospatiale
    grading:
      name: Classement
      description: Indique la qualité ou l’état des cartes à collectionner, par exemple,
        BCCG ou PSA
    grain:
      name: Grain
      description: Indique le niveau de grain de la pellicule de l’appareil photo,
        par exemple, élevé ou fin
    grape_variety:
      name: Cépage
      description: Identifie le type de raisin utilisé dans la vinification, par exemple,
        Cabernet Sauvignon ou Chardonnay
    graphics_card_type:
      name: Type de carte graphique
      description: Précise le type de carte graphique d’un ordinateur, par exemple
        professionnelle, dédiée
    graphics_tablet_accessories_included:
      name: Accessoires pour tablette graphique inclus
      description: Identifie les éléments supplémentaires inclus avec une tablette
        graphique, comme un support ou une attache de stylet
    graphics_tablet_specialized_features:
      name: Fonctionnalités spécialisées de la tablette graphique
      description: Précise les fonctionnalités spéciales d’une tablette graphique,
        par exemple, étanchéité ou rétroéclairage LED
    gravel/substrate_material:
      name: Matériau de gravier/substrat
      description: Spécifie la composition du gravier ou des substrats d’aquarium,
        par exemple, argile ou quartz
    gray_coverage_level:
      name: Niveau de couvrance des cheveux gris
      description: Indique le pourcentage ou le degré de cheveux gris ou blancs que
        le produit peut couvrir ou atténuer
    grease_filter_material:
      name: Matériau du filtre à graisse
      description: Précise le matériau utilisé dans le filtre à graisse d’un produit,
        par exemple le métal, l’acier inoxydable
    grind_size:
      name: Taille de mouture
      description: Indique la grosseur ou la finesse du café moulu, par exemple, extra
        corsé ou fin
    grip_or_holder_style:
      name: Style de poignée ou de support
      description: Identifie la forme physique principale du produit, aidant ainsi
        les clients à filtrer rapidement les modèles qu’ils préfèrent
    grip_texture:
      name: Texture de préhension
      description: Décrit la sensation de la surface de prise d’un produit, par exemple,
        lisse ou texturée
    grip_type:
      name: Type de poignée
      description: Définit le style de prise sur l’équipement d’escrime, par exemple
        le pistolet français
    grit_type:
      name: Type de grain
      description: Spécifie le niveau de grain des outils ou des produits dentaires,
        par exemple, grossier ou ultra fin
    grooming_kit_format:
      name: Format kit de toilettage
      description: Précise le type d’emballage des kits de toilettage, par exemple
        une trousse ou une boîte
    guitar_fitting/part_type:
      name: Type de raccord/pièce de guitare
      description: Spécifie le type de pièce ou de raccord de guitare, comme un pickguard
        ou une cheville d’accordage
    guitar_size:
      name: Taille de la guitare
      description: Spécifie la taille de la guitare, par exemple, taille réelle ou
        taille 3/4
    gutter_fitting_type:
      name: Type de raccord de gouttière
      description: Identifie le type de raccord utilisé dans les systèmes de gouttières,
