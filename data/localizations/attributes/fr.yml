    bidet_mounting_type:
      name: Type de montage du bidet
      description: Spécifie le mode d’installation du bidet, par exemple, au mur ou
        au sol
    binder_ring_shape:
      name: Forme de l’anneau de reliure
      description: Décrit les anneaux de reliure dans les fournitures de bureau, par
        exemple, anneaux ronds ou en forme de D
    binding_mount:
      name: Fixation des skis
      description: Définit le type de fixation pour les équipements de sports d’hiver,
        par exemple disque 2x2
    binding_style:
      name: Style de fixation
      description: Décrit la méthode utilisée pour relier des documents, par exemple,
        spirale ou fil
    binocular/monocular_design:
      name: Conception des jumelles/du monoculaire
      description: Décrit l'utilisation spécifique de jumelles ou de monoculaires,
        comme l'astronomie ou la chasse
    binocular_design:
      name: Conception binoculaire
      description: Décrit l’utilisation ou la fonctionnalité spécifique des jumelles,
        par exemple, chasse ou astronomie
    biometric_authentication_method:
      name: Méthode d’authentification biométrique
      description: Répertorie les options de sécurité biométrique intégrées disponibles
        sur le téléphone, telles que le capteur d’empreintes digitales ou la reconnaissance
        faciale
    biometric_certifications:
      name: Certifications biométriques
      description: Répertorie les certifications biométriques formelles de l’industrie
        ou du gouvernement auxquelles l’appareil est conforme (par exemple, FBI PIV,
        FIPS 201)
    biometric_monitor_accessory_features:
      name: Caractéristiques des accessoires pour moniteurs biométriques
      description: Identifie les fonctions spéciales des accessoires du moniteur biométrique,
        par exemple, fréquence cardiaque ou podomètre
    bios_type:
      name: Type BIOS
      description: Précise le type de BIOS utilisé dans les cartes mères, par exemple
        hybride, hérité
    bird_cage/stand_design:
      name: Conception de cage/perchoir à oiseaux
      description: Identifie le style de cage à oiseaux ou de support, par exemple
        cage en forme de dôme ou support à roulettes
    bird_food_form:
      name: Forme de nourriture pour oiseaux
      description: Décrit la nature de nourriture pour oiseaux, par exemple des graines
        ou des granulés
    bird_food_ingredients:
      name: Ingrédients de la nourriture pour oiseaux
      description: Spécifie le type d’ingrédients contenus dans des aliments pour
        oiseaux, tels que des vers ou des graines de tournesol
    bird_treat_type:
      name: Type de friandise pour oiseaux
      description: Identifie la catégorie de friandises pour oiseaux, tels que des
        biscuits ou des fruits
    birthday_candle_design:
      name: Conception de la bougie d’anniversaire
      description: Décrit le thème visuel des bougies d’anniversaire, par exemple,
        forme d’animal ou personnage de dessin animé
    birthday_candle_type:
      name: Type de bougie d’anniversaire
      description: Identifie les caractéristiques spécifiques de bougies d’anniversaire,
        par exemple parfumées ou étincelantes
    bitter_variety:
      name: Variété amère
      description: Classe les bières foncées en fonction de leurs profils de saveur,
        par exemple floral, épicé
    blade_coating:
      name: Revêtement de la lame
      description: Spécifie tout revêtement de performance appliqué à la lame pour
        améliorer son tranchant ou sa glisse (par exemple, platine, PTFE, titane)
    blade_curve:
      name: Courbe de la lame
      description: Précise la courbe de la lame d’un bâton de hockey, ouverte ou pointe
        par exemple
    blade_design:
      name: Conception de la lame
      description: Spécifie le style de lame des couteaux utilitaires, par exemple,
        rasoir ou couteau à cran d’arrêt
    blade_edge_configuration:
      name: Configuration du tranchant la de lame
      description: Spécifie le profil de tranchant d’une lame individuelle (par exemple,
        simple tranchant, double tranchants, système de cartouches, demi-lames)
    blade_material:
      name: Matériau de la lame
      description: Précise le matériau utilisé dans la construction d’une lame, comme
        l’acier ou l’aluminium
    blade_type:
      name: Type de lame
      description: Définit la forme et le style de la lame d’un produit, comme une
        lame droite ou de type poignard
    blanket_color:
      name: Couleur de la couverture
      description: Identifie la couleur principale d’une couverture, comme bleu marine
        ou multicolore
    blanket_pattern:
      name: Modèle de couverture
      description: Décrit l’imprimé ou le motif d’une couverture, par exemple à fleurs
        ou géométrique
    blending_type:
      name: Type de mélange
      description: Identifie la méthode de mélange utilisée dans les équipements de
        laboratoire, par exemple, continue ou par lots
    blind/shade_style:
      name: Style de store/abat-jour
      description: Identifie la conception ou le type de stores ou de volets, par
        exemple, enroulé ou vertical
    blocked_signal_types:
      name: Types de signaux bloqués
      description: Spécifie les catégories de signaux sans fil que le brouilleur peut
        bloquer
    blood_group_systems_detected:
      name: Systèmes de groupes sanguins détectés
      description: Identifie les systèmes de groupes sanguins que le kit permet de
        détecter
    blood_test_kit_components:
      name: Composants du kit de test sanguin
      description: Précise les éléments inclus dans un kit de test sanguin, par exemple
        une compresse de gaze, des bandages adhésifs
    bluetooth_functionality:
      name: Fonctionnalité Bluetooth
      description: Indique si l’appareil agit en tant qu’émetteur, que récepteur,
        ou les deux (émetteur-récepteur)
    board_concave_shape:
      name: Forme concave de la planche
      description: Définit la courbe concave des planches de surf ou des paddleboards ;
        par exemple concave en V, plate
    board_game_features:
      name: Caractéristiques du jeu de société
      description: Met en avant les aspects uniques d’un jeu de société, par exemple,
        installation rapide ou extension disponible
    board_game_mechanics:
      name: Mécanique du jeu de société
      description: Décrit la structure du gameplay d’un jeu de société, par exemple,
        stratégie ou coopération
    board_material:
      name: Matériel de planche
      description: Spécifie le type de matériau des tableaux de présentation, par
        exemple, acrylique ou porcelaine
    board_mounting_type:
      name: Type de montage du plateau
      description: Spécifie le style d’installation des tableaux de présentation,
        par exemple, portable ou sur chevalet
    board_profile:
      name: Profil de la planche
      description: Définit le profil d’une planche de surf, par exemple plat, rocker
    board_surface:
      name: Surface du tableau
      description: Décrit le type de surface sur un tableau d’affichage, par exemple,
        tissu ou liège
    board_type:
      name: Type de planche
      description: Classifie les skateboards en fonction de leur conception et de
        leur fonction, classique ou croiseur par exemple
    boat_type:
      name: Type de bateau
      description: Identifie la conception ou le modèle spécifique d’une embarcation,
        par exemple, ponton ou bateau ponté
    body/facial_hair_type:
      name: Type de poils du corps/du visage
      description: Permet d’adapter les produits de soins aux types de cheveux comme
        fins ou épais, généralement pour la décoloration des cheveux
    body_area:
      name: Zone du corps
      description: Précise la partie du corps pour laquelle le produit est conçu,
        par exemple le visage, le maillot
    body_color:
      name: Couleur du corps
      description: Spécifie la couleur principale des véhicules ou des pièces, par
        exemple, blanc ou argent
    body_jewelry_type:
      name: Type de bijou corporel
      description: Identifie le type spécifique d’un bijou corporel, par exemple un
        piercing nombril ou un bijou d’oreille
    body_material:
      name: Matériau du corps
      description: Spécifie le matériau principal d’un produit, généralement des cannes
        à pêche, par exemple, composite ou aluminium
    body_paint/foundation_type:
      name: Type de peinture corporelle/fond de teint
      description: Précise la catégorie d’un produit de maquillage pour le corps,
        tel qu’un fond de teint ou du faux sang
    body_paint_formula_base:
      name: Formule de base de peinture corporelle
      description: Identifie la base principale de la formule, influant sur la durabilité,
        le fini et la méthode de retrait
    body_pattern:
      name: Modèle de corps
      description: Décrit le design visuel ou le motif sur la surface principale d’un
        produit, par exemple à fleurs ou géométrique
    body_side:
      name: Côté du corps
      description: Définit si le produit est conçu pour le côté gauche, le côté droit,
        ou est adapté pour une utilisation bilatérale
    bodyboard_features:
      name: Caractéristiques du bodyboard
      description: Décrit les aspects uniques d’un bodyboard, par exemple, rigide
        ou gonflable
    boiler_system:
      name: Système de chaudière
      description: Précise le système de chaudière pour les appareils de chauffage,
        par exemple combiné, solo
    bolt_form:
      name: Forme de boulon
      description: Décrit la forme des boulons de quincaillerie, par exemple, hexagonaux
        ou mécaniques
    bolt_material:
      name: Matériau du boulon
      description: Identifie la composition des flèches de tir à l’arc, par exemple,
        en bambou ou en fibre de verre
    bone_anchored_interface_type:
      name: Type d’interface à ancrage osseux
      description: Définit comment le processeur se fixe à l’implant, distinguant
        les systèmes avec piliers percutanés et les systèmes sous-cutanés aimantés
    book/file_cover_material:
      name: Matériau de la couverture de livre/dossier
      description: Identifie le matériau utilisé dans les couvertures de livres ou
        de dossiers, comme le carton ou le cuir
    book_cover_material:
      name: Matériau de la couverture de livre
      description: Identifie le matériau utilisé pour les couvertures de livres, par
        exemple, cuir ou papier
    book_cover_type:
      name: Type de couverture du livre
      description: Identifie le type de couverture d’un livre, par exemple, rigide
        ou de poche
    bookmark_design:
      name: Conception de marque-pages
      description: Décrit le style ou le type d’un signet, par exemple, magnétique
        ou à pince
    bookmark_shape:
      name: Forme du signet
      description: Décrit la forme ou le contour d’un signet, par exemple, rond ou
        carré
    boombox_lighting_effects:
      name: Effets d’éclairage de l’enceinte portable
      description: Décrit la présence et le style des jeux de lumière LED ou RGB intégrés
        à l’enceinte
    boot_style:
      name: Style de bottes
      description: Précise le style de bottes, bottines par exemple
    boot_type:
      name: Type de chaussure
      description: Classifie le style de démarrage, par exemple démarrage souple,
        démarrage dur
    borescope_design:
      name: Conception d’endoscope
      description: Décrit le type d’endoscope, par exemple, flexible, rigide ou fibroscope
    bottle/container_closure:
      name: Fermeture de bouteille/récipient
      description: Identifie le type de fermeture sur les bouteilles ou les récipients,
        par exemple, pompe ou bouchon rabattable
    bottle_closure_type:
      name: Type de fermeture de bouteille
      description: Identifie le type de fermeture utilisé sur une bouteille, par exemple,
        bouchon en liège ou bouchon couronne
    bottle_design:
      name: Design du biberon
      description: Décrit les caractéristiques d’un biberon, généralement destinée
        aux produits pour bébés ; par exemple facile à tenir
    bottle_material:
      name: Matériau di biberon
      description: Identifie la substance utilisée dans la fabrication d’une bouteille,
        par exemple, verre ou plastique
    bottle_sterilizer_features:
      name: Caractéristiques du stérilisateur de biberon
      description: Met en avant les fonctions spécifiques des stérilisateurs de biberons,
        par exemple, arrêt automatique ou décongélation
    bottle_type:
      name: Type de flacon
      description: Précise le type de fermeture d’une bouteille, pression ou vaporisateur
        par exemple
    bottle_warmer/sterilizer_features:
      name: Caractéristiques du stérilisateur/chauffe-biberon
      description: Met en évidence les fonctionnalités spéciales des chauffe-biberons
        ou des stérilisateurs, comme la mise hors tension automatique ou la minuterie
    bottle_warmer_features:
      name: Caractéristiques du chauffe-biberon
      description: Met en avant les caractéristiques uniques des chauffe-biberons,
        par exemple, écran LCD ou minuterie
    bottom_surface_material:
      name: Matériau de la surface inférieure
      description: Identifie le matériau de la surface inférieure du produit, par
