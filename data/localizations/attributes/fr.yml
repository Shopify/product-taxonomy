    pin_size:
      name: Taille de l’épingle
      description: Spécifie la taille des épingles de sûreté, par exemple, 0 ou 00
    pin_tip_type:
      name: Type de pointe de la pince à cheveux
      description: Décrit la forme de la pointe des pinces à cheveux, influant sur
        le confort, la sécurité et le maintien
    pinata_design:
      name: Conception de la piñata
      description: Décrit le thème visuel d’une piñata, par exemple, traditionnel
        ou animal
    pinball_machine_edition:
      name: Édition du flipper
      description: Identifie le niveau d’édition de production ou de collection spécifique
        du flipper
    pinball_machine_format:
      name: Format du flipper
      description: Spécifie le format physique ou numérique du produit (par exemple,
        mécanique, virtuel, de table, kit)
    ping_pong_equipment_included:
      name: Matériel de ping-pong inclus
      description: Spécifie le type d’équipement de ping-pong inclus dans l’ensemble,
        par exemple, filet ou raquettes
    ping_pong_robot_features:
      name: Caractéristiques du robot de ping-pong
      description: Décrit les fonctionnalités d’un robot de ping-pong, par exemple,
        regroupement d’exercices ou télécommande
    pipe_clamp_design:
      name: Conception de collier de serrage
      description: Décrit la conception d’un collier de serrage, par exemple, collier
        à pression ou collier en C
    pipe_shape:
      name: Forme de la pipe
      description: Définit la forme des pipes, par exemple gourde, billard
    placement_supported:
      name: Emplacement pris en charge
      description: Identifie l’endroit où un produit peut être installé ou utilisé,
        par exemple, mur ou sol
    plan_service_type:
      name: Type de service du forfait
      description: Définit si le forfait SIM consiste uniquement en un service de
        données ou inclut également des services voix et/ou SMS
    plant_characteristics:
      name: Caractéristiques de la plante
      description: Définit les traits spécifiques des plantes, par exemple en floraison,
        comestibles
    plant_class:
      name: Classe de plante
      description: Classifie les plantes en groupes taxonomiques spécifiques, par
        exemple liliopsida, brassicales
    plant_material:
      name: Matériau de la plante
      description: Spécifie si le matériel végétal est vivant, préservé ou artificiel
    plant_name:
      name: Nom de la plante
      description: Identifie le nom botanique ou commun de la plante, comme la rose,
        le basilic ou le concombre
    plant_stage:
      name: Phase de la plante
      description: Identifie la phase spécifique du cycle de croissance d’une plante
        qu’un produit est conçu pour soutenir, par exemple, plantule ou végétatif
    plant_support_material:
      name: Matériau du support pour plantes
      description: Spécifie le matériau utilisé dans les cages ou les supports de
        plantes, par exemple, terre cuite ou pierre
    plate_type:
      name: Type de plaque
      description: Identifie le type de plaque dans les outils de coiffure, par exemple
        en titane, en céramique
    play_equipment_items_included:
      name: Articles d’équipement de jeu inclus
      description: Répertorie les éléments supplémentaires inclus avec l’équipement
        de jeu, comme des jouets suspendus ou un miroir
    play_slide_design:
      name: Conception du toboggan
      description: Décrit le type de toboggan, tel qu’en spirale ou en tube
    play_vehicle_propulsion:
      name: Propulsion du véhicule de jeu
      description: Identifie la manière dont une voiture jouet est alimentée, par
        exemple par friction ou télécommande
    play_yard_design_features:
      name: Caractéristiques de conception de l’aire de jeux
      description: Identifie les caractéristiques spéciales d’une aire de jeux, telles
        que les côtés ou les poches en filet
    playback_disc_formats:
      name: Formats de disque de lecture
      description: Définit les formats de disque compatibles avec un lecteur DVD ou
        Blu-Ray ; par exemple CD audio, JPEG
    playback_speed_supported:
      name: Vitesse de lecture prise en charge
      description: Répertorie les vitesses de rotation des disques auxquelles la platine
        ou le lecteur de disques peut fonctionner
    player/recorder_specialized_features:
      name: Fonctionnalités spécialisées du lecteur/enregistreur
      description: Met en avant les fonctionnalités spécifiques des lecteurs ou enregistreurs
        vidéo, par exemple, doté d’une IA ou contrôle parental
    player_drive_type:
      name: Type de lecteur de reproduction
      description: Précise le mécanisme qui fait tourner un tourne-disque, comme une
        courroie ou un galet
    player_position:
      name: Position du joueur
      description: Précise la position du joueur auquel le produit est destiné, par
        exemple gardien de but, milieu de terrain
    player_specialized_features:
      name: Fonctionnalités spécialisées du lecteur
      description: Identifie les capacités uniques des lecteurs vidéo, par exemple,
        prise en charge de la 4K ou prise en charge du HDR
    playhouse_design:
      name: Conception de la maison de jeu
      description: Spécifie le type de cabane, par exemple, dans les arbres ou sur
        pied
    playset_features:
      name: Caractéristiques du jeu
      description: Met en avant les aspects particuliers d’un ensemble de jeu, par
        exemple, édition limitée ou imperméable
    plug_type:
      name: Type de connecteur
      description: Identifie la compatibilité régionale d’une prise, par exemple US,
        FR
    plug_type_input:
      name: Type de fiche (entrée)
      description: Précise la prise qu’un adaptateur secteur ou un convertisseur peut
        prendre en charge, en fonction du code du pays ou du territoire ; par exemple
        États-Unis, UE
    plug_type_output:
      name: Type de fiche (sortie)
      description: Précise la prise qu’un adaptateur secteur ou un convertisseur peut
        prendre en charge comme sortie, en fonction du code du pays ou du territoire ;
        par exemple États-Unis, UE
    plumbing_primer_application:
      name: Application d’un apprêt de plomberie
      description: Spécifie où l’apprêt pour plomberie peut être utilisé, par exemple,
        tuyaux ou raccords
    plumbing_trap_design:
      name: Conception du siphon de plomberie
      description: Spécifie le type de siphon de plomberie, par exemple, plat ou bouteille
    plunger_shape:
      name: Forme du piston
      description: Spécifie la forme d’une tête de piston, par exemple, coupelle ou
        accordéon
    plywood_grade:
      name: Qualité du contreplaqué
      description: Spécifie la classification du contreplaqué pour les matériaux de
        construction, par exemple, grade C ou D
    pneumatic_conveyor_operation:
      name: Fonctionnement du convoyeur pneumatique
      description: Identifie le mode de fonctionnement des convoyeurs pneumatiques,
        par exemple, phase éco ou phase dense
    poe_standard:
      name: Norme PoE
      description: Identifie le protocole Power over Ethernet (PoE) avec lequel un
        produit est compatible ; par exemple passif, IEEE 802.3af
    point_design:
      name: Design du point
      description: Décrit le style de pointe des fournitures de bureau comme les punaises
        ou les épingle, par exemple, pointu ou arrondi
    pointing_device:
      name: Appareil de pointage
      description: Définit l’appareil utilisé pour naviguer sur un écran d’ordinateur,
        par exemple les boutons de la souris, le pavé tactile
    polar_pattern:
      name: Modèle polaire
      description: Indique l’orientation de prise de son d’un microphone, omnidirectionnel
        ou cardioïde par exemple
    polarity_configuration:
      name: Configuration de la polarité
      description: Décrit l’arrangement de polarité interne pertinent pour les LED,
        les modules d’affichage et les appareils similaires
    polarization:
      name: Polarisation
      description: Définit la direction des ondes des antennes, par exemple verticale,
        circulaire
    pole/post_material:
      name: Matériau du poteau
      description: Spécifie le matériau de construction des mâts de parasol ou de
        parapluie, comme la fibre de verre ou l'acier
    pole_color:
      name: Couleur du poteau
      description: Identifie la couleur du mât dans des produits comme des parapluies,
        par exemple noire ou bronze
    pole_material:
      name: Matériau de la tige
      description: Précise le matériau utilisé dans la construction d’un poteau, par
        exemple l’acier, le bois
    pole_pattern:
      name: Modèle de poteau
      description: Décrit l’imprimé ou le motif d’un mât de parapluie, tel que floral
        ou géométrique
    policy_sign_design:
      name: Conception de panneau de politique
      description: Décrit le message spécifique affiché sur un panneau de règlement,
        par exemple, interdiction de fumer ou pas de téléphone portable
    polish_dry_form:
      name: Forme de vernis à sec
      description: Identifie la formulation des produits de séchage du vernis à ongles,
        par exemple, à base de solvant ou à base de silicone
    polish_remover_form:
      name: Forme du dissolvant
      description: Précise le type de dissolvant pour vernis à ongles, par exemple
        liquide, papillotes de dépose
    polish_remover_formulation:
      name: Formule du dissolvant
      description: Indique la composition chimique du dissolvant, en particulier la
        teneur en acétone ou les bases alternatives
    polish_type:
      name: Type de vernis
      description: Identifie le type spécifique de vernis utilisé pour l’entretien
        des bateaux, par exemple, métal ou vinyle
    polyphony:
      name: Polyphonie
      description: Spécifie la capacité de notes simultanées d’un synthétiseur, par
        exemple, polyphonique ou multitimbral
    portability:
      name: Portabilité
      description: Précise la facilité de déplacement ou de transport d’un produit,
        généralement pour les tire-lait ; par exemple portable, compact
    post_material:
      name: Matériau du poteau
      description: Spécifie le type de matériau pour les poteaux dans diverses catégories,
        par exemple, aluminium ou fibre de verre
    postage_stamp_features:
      name: Caractéristiques du timbre-poste
      description: Identifie les caractéristiques spéciales des timbres-poste, par
        exemple, surimpression ou filigrane
    postpartum_stage:
      name: Post-partum
      description: Spécifie le stade après l’accouchement auquel la serviette est
        adaptée
    potential_extract:
      name: Extrait potentiel
      description: Indique le niveau d’extrait potentiel dans les grains et les malts
        de brasserie, par exemple, faible ou élevé
    pottery/sculpting_project_type:
      name: Type de projet de poterie/sculpture
      description: Identifie le type spécifique de projet de poterie ou de sculpture,
        par exemple, modelage ou fabrication de masques
    potty/toilet_seat_design:
      name: Design du pot/siège de toilette
      description: Définit le style ou la structure des sièges de pots pour enfants
        ou de toilettes, comme pliable ou standard
    potty_training_kit_components:
      name: Composants du kit d’apprentissage de la propreté
      description: Précise les éléments inclus dans un kit d’apprentissage de la propreté,
        par exemple des autocollants, un tabouret-escabeau
    power_connector_type:
      name: Type de connecteur d’alimentation
      description: Spécifie le ou les connecteurs d’alimentation auxiliaires requis
        ou fournis par l’adaptateur ou le câble d’extension
    power_conversion_semiconductor_type:
      name: Type de semi-conducteurs de puissance
      description: Identifie le principal matériau semi-conducteur utilisé dans l’étage
        de puissance du chargeur, influant sur la taille, l’efficacité et la génération
        de chaleur
    power_source:
      name: Source d’énergie
      description: Précise la source d’alimentation qu’un produit utilise pour fonctionner,
        comme l’énergie solaire ou les batteries
    power_supply_efficiency_rating:
      name: Niveau d’efficience de l’alimentation
      description: Indique le niveau de certification 80Plus du bloc d’alimentation
        de l’ordinateur
    power_supply_form_factor:
      name: Facteur de forme d’alimentation
      description: Spécifie la taille physique et la norme de montage du bloc d’alimentation
        (par exemple, ATX, SFX)
    power_supply_modularity:
      name: Modularité de l’alimentation
      description: Indique si les câbles du bloc d’alimentation sont non amovibles,
        partiellement amovibles ou entièrement amovibles
    pregnancy_test_sensitivity:
      name: Sensibilité du test de grossesse
      description: Précise la capacité du test à identifier une grossesse, par exemple
        détection précoce, détection standard
    prescription_status:
      name: Prescription
      description: Indique si les gouttes pour les oreilles sont disponibles sans
        ordonnance ou nécessitent une prescription d’un professionnel de santé
    presentation_supply_features:
      name: Caractéristiques du matériel de présentation et d'affichage
      description: Décrit les caractéristiques uniques du matériel de présentation
        et d’affichage, par exemple, hauteur réglable ou surface effaçable
    preservation_type:
      name: Type de conservation
      description: Identifie la méthode utilisée pour conserver les spécimens de laboratoire,
        par exemple, fixation ou séchage
    pretend_electronics_toy_type:
      name: Type de jouet électronique factice
      description: Spécifie la catégorie d’appareils électroniques factices, par exemple
        un appareil photo ou un téléphone portable
    pretend_housekeeping_toy_type:
      name: Type de jeu de ménage
      description: Identifie le type de jouet d’entretien domestique, comme un kit
        de nettoyage ou un appareil de cuisine
    primary_pcie_slot_version:
      name: Version du slot PCIe principal
      description: Indique la version PCI Express prise en charge par le slot x16
        principal généralement utilisé pour les cartes graphiques
    primary_region:
      name: Région principale
      description: Spécifie le marché ou l’emplacement principal d’un logiciel ou
        d’un service cloud, par exemple, Amérique du Nord ou Asie-Pacifique
    primer_use:
      name: Utilisation de l’apprêt
      description: Spécifie la fonction d’un apprêt, par exemple, peinture de base
        ou scellant
    print_orientation:
      name: Orientation d’impression
      description: Identifie de quel côté du matériau le graphique est imprimé
    print_server_form_factor:
      name: Facteur de forme du serveur d’impression
      description: Indique la conception physique du serveur d’impression (par exemple,
        boîtier externe, carte interne, dongle USB)
    print_technology:
      name: Technologie d’impression
      description: Précise le processus utilisé par une imprimante, comme le jet d’encre
        ou le laser
    printer/copier_specialized_features:
      name: Fonctionnalités spécialisées de l’imprimante/copieur
      description: Met en avant les fonctionnalités spécifiques des imprimantes/copieurs,
        par exemple, prise en charge de l’impression mobile ou commande vocale
    printer_accessories_included:
      name: Accessoires d’imprimante inclus
      description: Détaille les composants supplémentaires inclus avec une imprimante,
        un copieur ou un fax ; par exemple, bac à papier, unité de fusion
    printer_color_capability:
      name: Capacité de couleur de l’imprimante
      description: Spécifie si l’appareil imprime en monochrome uniquement ou prend
        en charge l’impression et la copie en couleur
    printer_connection_interface:
      name: Interface de connexion de l’imprimante
      description: Définit le type de port que le serveur d’impression utilise pour
        se connecter à l’imprimante elle-même
    printer_form_factor:
      name: Facteur de forme de l’imprimante
      description: Classe le style physique ou la portabilité de l’appareil
    printer_functions:
      name: Fonctions de l’imprimante
      description: Définit les capacités des imprimantes, des copieurs et des télécopieurs ;
        par exemple scanner, impression photo
    printing_color:
      name: Couleur d’impression
      description: Définit la sortie couleur des cartouches de toner et à jet d’encre,
        par exemple noir, cyan
    printing_method:
      name: Méthode d’impression
      description: Spécifie le processus d’impression, par exemple, impression offset
        ou gravure
    privacy_filtering_direction:
      name: Angles du filtre de confidentialité
      description: Indique les angles de vision depuis lesquels le filtre bloque la
        visibilité (par exemple, horizontal bidirectionnel, quadridirectionnel)
    processor_cores:
      name: Cœurs de processeur
      description: Indique le nombre de cœurs dans le processeur d’un ordinateur,
        par exemple double
    processor_family:
      name: Famille de processeurs
      description: Identifie la série ou la marque du processeur de l’appareil électronique,
        par exemple Intel Core i7
    processor_socket:
      name: Prise du processeur
      description: Précise le type de prise de processeur compatible dans l’électronique,
        comme LGA 1151 (prise H4) ou prise AM4
    processor_technology:
      name: Technologie du processeur
      description: Définit la technologie du processeur, généralement pour les équipements
        audio ; par exemple, basé sur un logiciel, tube/valve
    product_benefits:
      name: Avantages du produit
      description: Décrit les bienfaits qu’offre un produit, généralement pour la
        santé et la beauté ; par exemple lissant, raffermissant
    product_certifications_standards:
      name: Certifications et normes de produits
      description: Indique les certifications ou normes auxquelles un produit répond,
        comme biologique ou non testé sur les animaux
    product_classification:
      name: Classification des produits
      description: Catégorise le type de matériau précieux, de devise ou d'objet de
        valeur (par exemple, devise, lingots, pierres précieuses, carte-cadeau, NFT)
    product_form:
      name: Forme du produit
      description: Définit le format ou la présentation d’un produit, généralement
        destiné à la santé et à la beauté ; par exemple lotion, sérum
    product_format:
      name: Format du produit
      description: Indique si l’article est livré comme un produit physique ou un
        téléchargement numérique
    product_formulation:
      name: Forme du produit
      description: Identifie la composition des consommables de construction, par
        exemple, substance de base ou prête à l’emploi
    product_manual_area:
      name: Zone du manuel du produit
      description: Spécifie le sujet d’un manuel de produit, par exemple, appareil
        photo et optique ou fournitures de bureau
    product_sterility:
      name: Stérilité du produit
      description: Indique si un produit est stérile pour des raisons de santé et
        de sécurité
    product_use:
      name: Utilisation du produit
      description: Indique l'usage ou la finalité principale prévue des matériaux
        précieux ou des objets de collection (par exemple, monnaie/cours légal, objet
        de collection, bijoux, carte-cadeau)
    program_format:
      name: Format du programme
      description: Décrit la présentation des programmes d’événements, par exemple,
        livret ou feuille simple
    projection_design:
      name: Conception de projection
      description: Décrit le motif ou l’image projetée par un filtre d’éclairage ou
        un gobo, par exemple, texte ou logo
    projector_light_source:
      name: Source lumineuse du projecteur
      description: Identifie le type de source de lumière dans un projecteur, par
        exemple, LED ou laser
    prop_theme:
      name: Thème d’accessoire
      description: Identifie le style ou le genre des accessoires de cinéma et de
        télévision, par exemple historique ou science-fiction
    propane_application:
      name: Application de propane
      description: Spécifie l’usage du propane, par exemple, chauffage ou gril
    propeller_blade_design:
      name: Conception des pales d’hélice
      description: Décrit la configuration des pales d’une hélice d’embarcation, par
        exemple, 3 ou 4 pales
    prophy_cup_design:
      name: Design de la Prophy-Cup
      description: Décrit la conception des cupules de prophylaxie utilisées en dentisterie,
        par exemple, à brosse ou nervurée
    propulsion_type:
      name: Type de propulsion
      description: Précise la méthode de déplacement de l’équipement extérieur, par
        exemple pousser, remorquer
    protected_component:
      name: Composant protégé
      description: Identifie la partie du flipper que la couverture protège
    protection_type:
      name: Type de protection
      description: Identifie le niveau de protection offert par l’équipement de sécurité,
        par exemple, type I ou type II
    protective_gear_features:
      name: Caractéristiques des équipements de protection
      description: Identifie les caractéristiques uniques des équipements de protection,
        par exemple, antichocs ou antibuée
    protective_mask_design:
      name: Conception du masque de protection
      description: Spécifie le type de masques de protection, tels que complets ou
        demi-masques
    protective_mask_features:
      name: Caractéristiques du masque de protection
      description: Détaille les caractéristiques uniques des masques de protection,
        par exemple, sangle réglable ou valve
    protein_processing_type:
      name: Type de traitement des protéines
      description: Spécifie comment la protéine est raffinée ou traitée (par exemple,
        isolat vs. concentré), influant sur la pureté, le taux de digestion et la
        préférence du consommateur
    protein_source:
      name: Source de protéines
      description: Identifie la principale source de protéines présente dans le complément
        alimentaire
    pstn_connectivity_options:
      name: Options de connectivité PSTN
      description: Précise les interfaces du réseau téléphonique public commuté (PSTN)
        prises en charge par un produit, par exemple FXO, POTS
    publication_frequency:
      name: Fréquence de publication
      description: Indique la fréquence de publication d’un magazine ou d’un journal,
        par exemple, quotidienne ou mensuelle
    publication_type:
      name: Type de publication
      description: Identifie le type de publication universitaire ou de recherche,
        par exemple, article de revue ou thèse
    pull_up_bar:
      name: Barre de traction
      description: Précise le type d’adhérence sur l’équipement de fitness, comme
        standard ou brut
    pump_accessories:
      name: Accessoires de pompage
      description: Identifie les éléments inclus avec les tire-lait, comme une mallette
        de transport ou des biberons
    pump_speed_settings:
      name: Paramètres de vitesse de la pompe
      description: Précise les fonctionnalités de contrôle de vitesse, généralement
        pour les tire-lait ; par exemple vitesse réglable
    punching/training_bag_material:
      name: Matériau du sac de boxe/entraînement
      description: Identifie le matériau principal utilisé dans un sac de boxe/entraînement,
        par exemple, cuir ou toile
    puppet_theme:
      name: Type de marionnette
      description: Classe les marionnettes en fonction de leur thème de conception,
        par exemple, humain ou fantastique
    puppet_type:
      name: Type de marionnette
      description: Identifie le style de la marionnette, par exemple, marionnette
        à main ou guignol
    push_button_terminal_type:
      name: Type de borne à bouton-poussoir
      description: Spécifie le style de connexion électrique du bouton, assurant la
        compatibilité avec les faisceaux de câbles et les languettes de connexion
        rapide lors de l’installation
    puzzle_theme:
      name: Thème du puzzle
      description: Décrit le sujet ou le motif principal d’un puzzle, par exemple,
        animaux ou espace
    puzzle_type:
      name: Type de casse-tête
      description: Identifie le type spécifique de puzzle, tel que 3D ou casse-tête
    quiver_style:
      name: Style de carquois
      description: Précise le style du carquois au tir à l’arc, par exemple hanche,
        dos
    rack_design:
      name: Design du rayonnage
      description: Décrit la disposition ou la structure d’un casier à verre, par
        exemple, ouvert ou à compartiments
    rack_format:
      name: Format du rack
      description: Définit le boîtier physique ou la taille standard de la bande de
        canaux pour un placement en rack ou sur bureau
    rack_mounting_style:
      name: Style de montage en rack
      description: Décrit le style structurel du montage en rack (par exemple, étagère
        fixe, étagère coulissante, rails, panneau aveugle)
    rack_type:
      name: Type de bâti
      description: Identifie le style du support de rangement d’un véhicule, par exemple,
        coffre ou toit
    rack_width_standard:
      name: Largeur de rack standard
      description: Définit la largeur de montage horizontal standard à laquelle le
        produit se conforme
    racket_balance:
      name: Équilibre de la raquette
      description: Indique la répartition du poids d’une raquette, par exemple, tête
        lourde ou équilibre en tête
    racket_gauge:
      name: Jauge de la raquette
      description: Précise l’épaisseur des cordes de raquette de tennis, par exemple
        16
    racket_head_shape:
      name: Forme de la tête de la raquette
      description: Définit la forme de la tête de la raquette, par exemple, ovale
        ou isométrique
    racket_material:
      name: Matériau de la raquette
      description: Spécifie le type de matériau à partir duquel une raquette de sport
        est fabriquée, par exemple, bois ou fibre de carbone
    racket_string_design:
      name: Conception du cordage de la raquette
      description: Identifie la structure du cordage des raquettes de tennis, par
        exemple, monofilament et multifilament
    racket_string_material:
      name: Matériau du cordage de la raquette
      description: Spécifie la composition des cordages des raquettes de tennis, par
        exemple, Kevlar ou polyuréthane (PU)
    radar_bands:
      name: Bandes radar
      description: Précise les bandes de fréquences qu’un radar peut détecter, par
        exemple X, K
    radar_technology:
      name: Technologie radar
      description: Spécifie la technologie radar utilisée dans un produit, par exemple
        à impulsions ou semi-conducteur
    radio_case_design:
      name: Design du boîtier radio
      description: Définit le style ou la fonctionnalité des étuis de transport pour
        radio, comme les étuis fixes ou pivot
    radio_features:
      name: Fonctionnalités radio
      description: Spécifie les capacités uniques d’une radio, par exemple, prise
        en charge du GPS ou lecture MP3
    radio_form_factor:
      name: Facteur de forme de la radio
      description: Identifie la classe physique de l’émetteur-récepteur amateur, influant
        sur les options de montage, les exigences d’alimentation et les scénarios
        d’utilisation typiques
    radio_scanner_form_factor:
      name: Facteur de forme du scanner radio
      description: Indique la configuration physique ou le style de montage du scanner
        radio (par exemple, portable, base, bureau, monté sur véhicule)
    radiology_compatibility:
      name: Compatibilité radiologique
      description: Indique si l’orthèse peut rester sur le patient pendant les procédures
        d’imagerie (par exemple, IRM, CT, rayons X)
    raid_levels_supported:
      name: Niveaux RAID supportés
      description: Répertorie toutes les configurations RAID que la matrice de disques
        durs peut créer ou gérer
    ramp_type:
      name: Type de rampe
      description: Précise la conception ou le style des rampes de skateboard, comme
        la demi-lune ou la table de saut
    range_type:
      name: Type de gamme
      description: Définit la zone de couverture des appareils comme les écoute-bébés,
        tels que les appareils longue portée
    rarity:
      name: Rareté
      description: Spécifie le caractère unique des articles, généralement des objets
        de collection, par exemple, édition limitée ou ultra rare
    razor_flexibility:
      name: Flexibilité du rasoir
      description: Indique la flexibilité des rasoirs et tondeuses, par exemple flexibles
        ou fixes
    razor_head_design:
      name: Design de la tête de rasoir
      description: Définit le nombre de lames dans un rasoir, par exemple unique,
        triple
    razor_type:
      name: Type de rasoir
      description: 'Précise la conception du rasoir, par exemple droit ou synthétique '
    read/write_speed:
      name: Vitesse de lecture/écriture
      description: Indique le taux ou la vitesse de transfert de données, généralement
        pour les duplicateurs de disques ; par exemple 4x, 52x
    reading_toy_type:
      name: Type de jouet de lecture
      description: Spécifie le type de jouet d’apprentissage de lecture, par exemple
        jeu d’orthographe ou tablette de lecture
    receipt_paper_features:
      name: Caractéristiques du papier de reçu
      description: Identifie les caractéristiques uniques du papier de reçu, par exemple,
        indicateur de fin de rouleau ou logo pré-imprimé
    reclining_function:
      name: Fonction d’inclination
      description: Décrit les caractéristiques d’inclinaison spécifiques, comme l’inclinaison
        complète ou le zéro gravité
    recommended_age_group:
      name: Tranche d’âge recommandée
      description: Identifie la tranche d’âge appropriée pour un produit, généralement
        pour des jouets et des jeux, par exemple, bébé ou adolescent
    recommended_skill_level:
      name: Niveau de compétence recommandé
      description: Précise le niveau de compétence, par exemple débutant, expert
    recommended_use:
      name: Utilisation recommandée
      description: Identifie l’utilisation ou le domaine principal pour lequel un
        produit matériel a été conçu, par exemple, industriel ou résidentiel
    record_cleaning_components_included:
      name: Composants de nettoyage de disques inclus
      description: Répertorie les articles spécifiques fournis dans le kit pour que
        les clients puissent comparer les lots en un coup d’œil (par exemple, brosse,
        liquide, tissu)
    recorder_fingering_system:
      name: Système de doigté de la flûte à bec
      description: Spécifie le type de système de doigté de la flûte à bec, par exemple,
        allemand ou baroque
    recorder_specialized_features:
      name: Fonctionnalités spécialisées de l’enregistreur
      description: Identifie les fonctionnalités avancées des enregistreurs vidéo,
        par exemple, intelligent ou Dolby Atmos
    recording_accessories_included:
      name: Accessoires d’enregistrement inclus
      description: Détaille les composants supplémentaires inclus dans les ensembles
        d’enregistrement, comme les écouteurs ou un microphone
    recording_capability_type:
      name: Type de capacité d’enregistrement
      description: Indique si le récepteur peut enregistrer du contenu TV et la méthode
        utilisée (par exemple, USB PVR, disque dur interne, cloud)
    recording_functionality:
      name: Fonctionnalité d’enregistrement
      description: Indique si et comment le récepteur peut enregistrer du contenu
        TV (par exemple, DVR sur disque dur interne, USB externe)
    recording_mode:
      name: Mode d’enregistrement
      description: Répertorie les modes opérationnels que l’enregistreur prend en
        charge (par exemple, continu, enregistrement programmé)
    recording_quality:
      name: Qualité d’enregistrement
      description: Décrit la clarté audio des transcripteurs et des systèmes de dictée,
        par exemple, faible ou élevée
    recording_speed_modes_supported:
      name: Modes de vitesse d’enregistrement pris en charge
      description: Répertorie les modes de vitesse de bande que le magnétoscope peut
        enregistrer ou lire, influant sur le temps d’enregistrement et la qualité
        d’image
    recreational_vehicle_type:
      name: Type de véhicule récréatif
      description: Identifie la catégorie d’un véhicule récréatif, par exemple, classe
        A ou caravane
    reed_strength:
      name: Force du roseau
      description: Indique la flexibilité des anches d’instruments à vent, par exemple,
        douce, moyenne ou dure
    reel_capacity:
      name: Capacité de la bobine
      description: Spécifie la capacité d’une bobine dans un réservoir de développement,
        par exemple, simple ou quad
    reflector_design:
      name: Conception du réflecteur
      description: Décrit la conception d’un réflecteur de flash, par exemple, nid
        d’abeille ou parapluie
    regenerative_braking_features:
      name: Fonctionnalités de freinage régénératif
      description: Décrit les caractéristiques des modules de freinage régénératif
        pour véhicules électriques, par exemple, résistant aux intempéries ou facile
        à installer
    region:
      name: Région
      description: Identifie l’emplacement spécifique d’origine du produit, généralement
        pour le vin et les spiritueux ; par exemple Californie, Bordeaux
    region_code:
      name: Code de région
      description: Spécifie la région dans laquelle un logiciel de jeu vidéo est autorisé
        à être utilisé, par exemple, Asie (AS) ou Mondial (GL)
    release_mechanism:
      name: Mécanisme de libération
      description: Indique la technologie de distribution ou d’absorption de la vitamine
        (par exemple, libération prolongée, liposomale, à mâcher)
    release_schedule:
      name: Calendrier de sortie
      description: Spécifie la fréquence à laquelle de nouveaux épisodes ou mises
        à jour sont publiés, par exemple, hebdomadaire ou bihebdomadaire
    remote_control_functions:
      name: Fonctions télécommandées
      description: Répertorie les actions spécifiques que le déclencheur à distance
        peut effecteur au-delà de la prise de vue
    remote_shutter_form_factor:
      name: Facteur de forme du déclencheur à distance
      description: Identifie le type ou le boîtier du déclencheur à distance, tel
        qu’un porte-clés/bouton, un contrôleur annulaire ou une perche à selfie avec
        déclencheur intégré
    remote_technology:
      name: Technologie à distance
      description: Identifie la technologie utilisée dans les télécommandes pour appareils
        photo, par exemple, Bluetooth ou Wi-Fi
    removable_storage_formats_supported:
      name: Formats de stockage amovibles pris en charge
      description: Définit les formats de stockage amovibles avec lesquels un appareil
        est compatible, par exemple SD, microUSB
    removal_target:
      name: Objectif de retrait
      description: Spécifie les produits pour ongles que le dissolvant est conçu pour
        dissoudre (par exemple, gel, acrylique, poudre de trempage)
    replacement_lamp_type:
      name: Type de lampe de remplacement
      description: Classe le style de pièce de rechange fournie (par exemple, module
        lampe et boîtier, bande de rétroéclairage LED, assemblage CCFL)
    reptile/amphibian_food_form:
      name: Forme de nourriture pour reptiles/amphibiens
      description: Spécifie la forme de nourriture pour reptiles/amphibiens, par exemple
        lyophilisée ou en granulés
    reptile/amphibian_habitat_supply_type:
      name: Type de fourniture d’habitat pour les reptiles/amphibiens
      description: Identifie le type de chauffage ou d’éclairage pour les habitats
        des reptiles/amphibiens, comme une lampe chauffante ou une lampe UVB
    research_focus:
      name: Axe de recherche
      description: Identifie le principal domaine d’étude dans les articles universitaires,
        par exemple, biologie ou économie
    research_methodology:
      name: Méthodologie de recherche
      description: Identifie le type de méthodes de recherche utilisées dans les articles
        universitaires, par exemple, enquête ou méthode qualitative
    resistance_level:
      name: Niveau de résistance
      description: Indique le niveau de résistance du produit, généralement pour les
        bandes d’exercice ; par exemple très lourd
    resistance_system:
      name: Système de résistance
      description: Définit le mécanisme utilisé pour créer une résistance dans les
        équipements de fitness, par exemple l’eau, l’air
    resistance_tolerance:
      name: Tolérance de résistance
      description: Définit l’écart admissible de la résistance réelle et sa valeur
        nominale, exprimé en pourcentage (par exemple, ±1 %)
    restrictor_gate_shape:
      name: Forme de la plaque de restriction
      description: Définit la forme géométrique de la plaque de restriction incluse
        avec ou requise par le joystick
    result_display:
      name: Affichage du résultat
      description: Précise le format du test de grossesse, par exemple basé sur une
        ligne, numérique
    retail/sale_sign_design:
      name: Conception d’enseignes de vente au détail/vente
      description: Indique le type de message sur les enseignes de vente au détail
        ou de promotion, par exemple, solde ou offre spéciale
    reticle_plane:
      name: Plan réticulaire
      description: Spécifie le plan focal du réticule de lunettes et de viseurs d’armes,
        par exemple premier ou deuxième
    reticle_type:
      name: Type de réticule
      description: Identifie le type de réticule dans les lunettes de visée, par exemple,
        Duplex ou Mildot
    rewinder_operation_mode:
      name: Mode de fonctionnement de l’enrouleur
      description: Définit les modes fonctionnels que l’enrouleur prend en charge
        (par exemple, rembobinage uniquement, rembobinage et avance rapide)
    rf_output_standard:
      name: Norme de sortie RF
      description: Spécifie la norme de diffusion télévisuelle ou radio que le modulateur
        produit en sortie
    rfid_frequency:
      name: Fréquence RFID
      description: Précise la fréquence de fonctionnement des produits RFID, par exemple
        faible, ultra-haute
    riding_style:
      name: Style de conduite
      description: Précise l’utilisation prévue ou le style de conduite des équipements
        de sports d’hiver, par exemple slalom, freestyle
    riding_toy_propulsion_type:
      name: Type de propulsion du jouet à chevaucher
      description: Identifie le mode de propulsion d’un jouet monté, par exemple,
        électrique ou à pédales
    rim/wheel_design:
      name: Conception de jante/roue
      description: Décrit le style ou la fabrication des jantes/roues d’un véhicule,
        par exemple, alliage ou rayons
    ring_design:
      name: Conception de la bague
      description: Décrit le style d’une bague, tel qu’un anneau ou un solitaire
    ring_size:
      name: Taille de l’anneau
      description: Précise la taille d’une bague, comme L ou 6,5
    rinse_requirement:
      name: Exigence de rinçage
      description: Clarifie si le nettoyant doit être rincé, s’il peut être laissé
        sur la peau ou s’il est sans rinçage (par exemple, eau micellaire)
    rise_height_class:
      name: Classe de hauteur
      description: Catégorise la hauteur supplémentaire qu’ajoute des embout adhérents
        par rapport à la hauteur de la manette d’origine (par exemple, élévation faible,
        moyenne, haute)
    riser_color:
      name: Couleur de la contremarche
      description: Identifie la couleur des contremarches d’arcs de tir, comme le
        noir ou le bleu
    riser_material:
      name: Matériau de la colonne montante
      description: Précise le matériau d’un support d’arc ou d’arbalète, comme la
        fibre de carbone ou le bois
    riser_pattern:
      name: Modèle de contremarche
      description: Décrit l’imprimé ou le motif d’une contremarche d’arcs et d’arbalètes,
        comme à camouflage ou uni
    rivet_form:
      name: Forme de rivet
      description: Décrit la forme des rivets de quincaillerie, par exemple, pleine
        ou fendue
    road_sign_design:
      name: Conception de panneau routier
      description: Identifie le type d’informations affichées sur un panneau routier,
        par exemple, stop ou limite de vitesse
    robe_style:
      name: Style de peignoir
      description: Spécifie le type de conception global ou le style de construction
        du peignoir, comme peignoir de spa ou enveloppant
    rock_composition:
      name: Composition rocheuse
      description: Spécifie la composition géologique d’une roche, par exemple, marbre
        ou calcaire
    rock_formation:
      name: Formation rocheuse
      description: Spécifie la classification géologique des roches, par exemple,
        ignées ou sédimentaires
    rocker_type:
      name: Type de bascule
      description: Précise le style de courbure des planches de snowboard ou des skis,
        par exemple plat, rocker
    rod_color:
      name: Couleur de la tige
      description: Identifie la couleur d’une canne à pêche, par exemple noire ou
        bleue
    rod_material:
      name: Matériau de la canne
      description: Identifie le matériau utilisé dans les articles de sport à cannes,
        comme le graphite ou la fibre de verre
    rod_pattern:
      name: Modèle de tige
      description: Décrit le thème ou l’imprimé d’une canne à pêche, comme à camouflage
        ou à rayures
    rod_shape:
      name: Forme de la tige
      description: Définit la forme ou la configuration des tringles de douche, par
        exemple droites, en forme de U
    roller_head:
      name: Tête du rouleau
      description: Définit le nombre de têtes sur les rouleaux, généralement pour
        les outils de soin de la peau ; par exemple unique, double
    roller_material:
      name: Matériau du rouleau
      description: Précise le matériau utilisé dans un rouleau, généralement pour
        les outils de soins de la peau ; par exemple jade, silicone
    roller_type:
      name: Type de rouleau
      description: Identifie le type de rouleau, généralement destiné aux outils de
        soins de la peau ; par exemple glace, micro-aiguille
    roof_decor_shape:
      name: Forme de décoration du toit
      description: Définit le design ou la forme des décorations de toit, comme un
        cheval ou un voilier
    room_correction_technology:
      name: Technologie de correction acoustique
      description: Spécifie le système de calibrage acoustique automatique ou de correction
        acoustique intégré au récepteur
    rosin_form:
      name: Forme de colophane
      description: Décrit la forme de la colophane pour les instruments à cordes,
        par exemple, bloc ou gâteau
    rosin_grade:
      name: Qualité de la colophane
      description: Spécifie le type de colophane utilisé pour les instruments à cordes,
        par exemple, foncé ou moyen
    rotating_direction:
      name: Sens de rotation
      description: Spécifie le sens de rotation des embouts de perceuse et de tournevis,
        par exemple, à gauche ou à droite
    rotation_direction:
      name: Sens de rotation
      description: Indique si la ponceuse à ongles prend en charge la rotation de
        gauche à droite, la rotation inverse ou les deux
    rotator_control_technology:
      name: Technologie de contrôle du rotateur
      description: Définit le mécanisme de commande des systèmes de rotation pour
        antenne, manuel ou motorisé par exemple
    route_of_administration:
      name: Voie d’administration
      description: Identifie comment le produit est appliqué ou consommé, influant
        sur l’efficacité et la sécurité (par exemple, oral, topique, patch transdermique,
        sublingual, injection intramusculaire)
    rug/mat_features:
      name: Caractéristiques du tapis
      description: Décrit les caractéristiques particulières des tapis/moquette, par
        exemple, base antidérapante ou séchage rapide
    rug/mat_material:
      name: Matériau du tapis
      description: Spécifie le type de matériau utilisé dans les tapis ou les nattes,
        par exemple, caoutchouc ou microfibre
    rug/mat_shape:
      name: Forme du tapis
      description: Spécifie la forme de paillassons et de tapis, par exemple allongé
        ou carré
    rug_features:
      name: Caractéristiques du tapis
      description: Décrit les caractéristiques spécifiques des tapis, par exemple,
        base antidérapante ou couleurs résistantes aux UV
    rug_material:
      name: Matériau du tapis
      description: Identifie le matériau utilisé dans la fabrication d’un tapis, par
        exemple, laine ou jute
    rug_shape:
      name: Forme du tapis
      description: Identifie le modèle géométrique des tapis, par exemple, carré ou
        tapis de couloir
    rum_grade:
      name: Qualité du rhum
      description: Classifie le rhum en fonction de ses caractéristiques ou de sa
        qualité, par exemple premium, épicé
    saddle_base_color:
      name: Couleur de la base de la selle
      description: Identifie la couleur primaire de la base d’une selle de vélo, comme
        le noir ou le bleu
    saddle_base_material:
      name: Matériau de base de la selle
      description: Identifie le matériau utilisé dans la base d’une selle de vélo,
        par exemple, acier ou fibre de carbone
    saddle_base_pattern:
      name: Modèle de base de la selle
      description: Décrit le thème ou l’imprimé d’une base de selle de vélo, comme
        abstrait ou à logos
    saddle_material:
      name: Matériau de la selle
      description: Précise le matériau utilisé dans les selles de vélo, comme le caoutchouc
        ou le cuir
    saddle_seat_color:
      name: Couleur du siège de la selle
      description: Spécifie la couleur du siège d’une selle de vélo, comme l’argent
        ou le rouge
    saddle_seat_material:
      name: Matériau du siège de la selle
      description: Identifie le matériau utilisé dans la fabrication d’une selle de
        vélo, par exemple, cuir ou nylon
    saddle_seat_pattern:
      name: Modèle de siège de la selle
      description: Décrit le thème ou l’imprimé d’une assise de selle de vélo, comme
        à fleurs ou géométrique
    safety_certifications:
      name: Certifications de sécurité
      description: Indique la conformité du produit aux normes de sécurité, généralement
        pour les produits pour bébés ; par exemple sans BPA
    safety_device_installation:
      name: Installation du dispositif de sécurité
      description: Définit la manière dont les produits de sécurité sont montés ou
        fixés, par exemple adhésifs, à visser
    safety_equipment_material:
      name: Matériau de l’équipement de sécurité
      description: Spécifie le type de matériau utilisé dans les équipements de sécurité
        des véhicules, par exemple, nylon ou fibre de verre
    safety_rail_installation:
      name: Installation de garde-corps
      description: Définit le mode d’installation des garde-corps de sécurité, par
        exemple ajustables ou permanents
    sailboat_type:
      name: Type de voilier
      description: Identifie la conception ou le modèle spécifique d’un voilier, par
        exemple, sloop ou cotre
    sandal_style:
      name: Style de sandale
      description: Spécifie le style de sandales, comme à brides ou à lacets
    sandblaster_application:
      name: Application du jet de sable
      description: Définit la fonction prévue des outils de sablage, par exemple,
        polissage ou ponçage
    sander_type:
      name: Type de ponceuse
      description: Classifie le type d’outil de ponçage, par exemple, à bande ou orbital
        aléatoire
    sanding_application:
      name: Application de ponçage
      description: Spécifie l’objectif des accessoires de ponçage, par exemple, travaux
        de finition ou décapage de peinture
    satellite_coverage_area:
      name: Zone de couverture satellite
      description: Définit les régions géographiques auxquelles un téléphone satellite
        peut accéder, comme l’Australie ou l’Afrique
    satellite_messaging_capability:
      name: Capacité de messagerie satellite
      description: Indique si le produit prend en charge la messagerie satellite unidirectionnelle
        (sortant uniquement) ou bidirectionnelle (envoyer et recevoir)
    satellite_navigation_systems_supported:
      name: Systèmes de navigation par satellite pris en charge
      description: Spécifie les systèmes mondiaux de navigation par satellite (GNSS)
        que le téléphone peut utiliser pour le positionnement et le suivi
    satellite_network_type:
      name: Type de réseau satellitaire
      description: Identifie le fournisseur de services pour les téléphones satellites,
        par exemple Inmarsat, Iridium
    sauna_accessories_included:
      name: Accessoires de sauna inclus
      description: Identifie les éléments supplémentaires inclus avec un sauna, comme
        une louche ou des pierres de sauna
    scaffolding_mounting_type:
      name: Type de montage sur échafaudage
      description: Spécifie le style d’installation de l’échafaudage, par exemple,
        cadre ou mobile
    scale_material:
      name: Matériau de la balance
      description: Identifie le matériau utilisé dans une balance, généralement un
        pied à coulisse, par exemple, acier inoxydable ou plastique
    scale_model_accessory_type:
      name: Type d’accessoire de modèle réduit
      description: Identifie le type d’accessoire pour les modèles réduits, par exemple,
        bâtiments ou figurines
    scale_model_kit_type:
      name: Type de kit de modélisme
      description: Spécifie la catégorie d’un kit de modèle réduit, comme un char
        ou un vaisseau spatial
    scale_model_material:
      name: Matériel de modélisme
      description: Identifie le principal matériau utilisé dans les modèles réduits,
        par exemple, bois ou papier cartonné
    scale_model_theme:
      name: Thème de modèle réduit
      description: Identifie le thème d’une maquette, par exemple, fantaisie ou histoire
    scalp_concern:
      name: Problème de cuir chevelu
      description: Spécifie le principal problème de cuir chevelu ou de cheveux que
        le traitement est censé traiter
    scalpel_blade_material:
      name: Matériau de la lame du scalpel
      description: Identifie la composition des lames de scalpel, par exemple, acier
        inoxydable ou titane
    scalpel_blade_number:
      name: Numéro de lame de scalpel
      description: Identifie le nombre spécifique ou le type de lame de scalpel, par
        exemple, 10 ou 15A
    scalpel_blade_shape:
      name: Forme de la lame du scalpel
      description: Décrit la forme de la lame du scalpel, par exemple, courbée ou
        droite
    scalpel_handle_number:
      name: Numéro du manche du scalpel
      description: Identifie le numéro de manche spécifique pour les scalpels, par
        exemple, 4 ou 3L
