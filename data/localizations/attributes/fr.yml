    pad_display_profile:
      name: Profil d’affichage du bloc-notes
      description: Décrit l’affichage couleur des tablettes pour signature numérique,
        par exemple, monochrome ou couleur
    pad_thickness:
      name: Épaisseur de la protection
      description: Classe le profil d’épaisseur global de la protection (par exemple,
