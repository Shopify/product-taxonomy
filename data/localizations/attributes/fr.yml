    package_type:
      name: Type d’emballage
      description: Définit le type d’emballage d’un produit, par exemple bocal, pompe
    packing_materials_included:
      name: Matériaux d’emballage inclus
      description: Identifie le type de matériaux d’emballage fournis, par exemple,
