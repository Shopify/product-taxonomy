    cleanser_type:
      name: Type de nettoyant
      description: Décrit la texture ou le format spécifique du nettoyant
    cleat_type:
      name: Type de taquet
      description: Spécifie le type de taquets utilisés pour l’accostage, par exemple,
        à base rabattable ou à base ouverte
    climbing_activity:
      name: Activité d’escalade
      description: Précise le type d’escalade pour lequel le produit est conçu, comme
        l’alpinisme ou l’escalade sur glace
    clip_type:
      name: Type de clip
      description: Spécifie le style de pince sur des articles tels que les presse-papiers,
