    card_design:
      name: Conception de carte
      description: Spécifie la forme d’une carte de lieu ou de réponse, par exemple,
        pliée ou plate
    card_format:
      name: Format de la carte
      description: Décrit le style des invitations ou des cartes, par exemple, plate
        ou pliée
    card_holder_design:
      name: Conception du porte-carte
      description: Décrit le style ou la forme d’un marque-place, par exemple, à pince
        ou vertical
    card_interface_type:
      name: Type d’interface de la carte
      description: Décrit si le lecteur communique par le biais des contacts physiques,
        RF sans contact, ou les deux
    card_rechargeability:
      name: Rechargeabilité de la carte
      description: Indique si le solde de la carte peut être rechargé après l’utilisation
        du crédit initial, ainsi que la principale méthode de recharge
    card_size:
      name: Taille de la carte
      description: Utilisé pour indiquer la taille des cartes de vœux ou de notes,
        par exemple, A4 ou lettre
    card_usage_status:
      name: Statut d’utilisation de la carte
      description: Indique si le crédit de la carte téléphonique a été utilisé ou
        est intact
    care_instructions:
      name: Instructions d’entretien
      description: Fournit des conseils pour l’entretien du produit, par exemple,
        lavage à la main ou nettoyage à sec uniquement
    carry_options:
      name: Options de transport
      description: Spécifie les méthodes de transport possibles pour les articles,
        par exemple, poignée ou sangle
    carrying_positions:
      name: Positions de transport
      description: Précise les différentes façons de porter un porte-bébé, comme le
        portage sur la hanche ou face vers l’arrière
    carrying_type:
      name: Type de transport
      description: Décrit la méthode de transport d’un produit, par exemple, à la
        main ou en bandoulière
    cart_design:
      name: Design du chariot
      description: Décrit la disposition ou la structure d’un chariot médical, par
        exemple, à double crochet ou avec un socle
    cart_type:
      name: Type de chariot
      description: Identifie la source d’alimentation d’une voiturette de golf, par
        exemple, électricité ou gaz
    cartridge_authenticity:
      name: Authenticité de la cartouche
      description: Identifie si le consommable provient du fabricant d’origine, est
